h-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="3563" rel="bbeabb4af3c646b181823bc308578259"><span data-dcnode-id="3564" instrument_node="">                            The arrival in England in the 1930s of scholars, trained in the German tradition of Kulturwissenschaft, had an immense effect on the study of the history of art in their new country. Yet the intellectual exchange went both ways and the present article, beyond describing the often difficult personal and professional situations these exiles encountered in their new surroundings, examines how much their work was affected by the traditions and opportunities of intellectual enquiry, familiar in England since the middle of the XIXth century. Note is also taken of the public effect of their work, most notably in the activities of Pevsner, both in his editorship of the volumes in the Pelican History of Art and his tireless travels for the series The Buildings of England.                          </span></p><span data-dcnode-id="3562" instrument_node=""> </span></div><span data-dcnode-id="3560" instrument_node=""> </span></div><span data-dcnode-id="3558" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="3532"><span data-dcnode-id="3557" instrument_node=""> </span><ul data-dcnode-id="3534"><span data-dcnode-id="3556" instrument_node=""> </span><li data-dcnode-id="3548"><span data-dcnode-id="3555" instrument_node=""> </span><a data-dcnode-id="3549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/cast.pdf" rel="noopener" target="_blank"><span data-dcnode-id="3554" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="3550" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="3553"></path><polyline data-dcnode-id="3552" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="3551" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="3547" instrument_node=""> </span><li data-dcnode-id="3542"><span data-dcnode-id="3546" instrument_node=""> </span><a data-dcnode-id="3544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="3545" instrument_node="">About the journal</span></a><span data-dcnode-id="3543" instrument_node=""> </span></li><span data-dcnode-id="3541" instrument_node=""> </span><li data-dcnode-id="3536"><span data-dcnode-id="3540" instrument_node="">                            Published by </span><em data-dcnode-id="3538"><span data-dcnode-id="3539" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="3537" instrument_node=""> </span></li><span data-dcnode-id="3535" instrument_node=""> </span></ul><span data-dcnode-id="3533" instrument_node=""> </span></aside><span data-dcnode-id="3531" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="3454"><span data-dcnode-id="3528" instrument_node=""> </span><article class="row" data-dcnode-id="3455"><span data-dcnode-id="3527" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="3484"><span data-dcnode-id="3526" instrument_node=""> </span><header data-dcnode-id="3510"><span data-dcnode-id="3525" instrument_node=""> </span><p class="label" data-dcnode-id="3522"><a data-dcnode-id="3523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="3524" instrument_node="">                            Journal of Art Historiography (Dec 2020)                          </span></a></p><span data-dcnode-id="3521" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="3516"><span data-dcnode-id="3520" instrument_node=""> </span><a class="" data-dcnode-id="3518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/58e2df9096f440cb97698cff31cbffe1" target="_blank"><span data-dcnode-id="3519" instrument_node="">                              Erica Tietze-Conrat, “On leg poses in art history”                            </span></a><span data-dcnode-id="3517" instrument_node=""> </span></h3><span data-dcnode-id="3515" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="3512"><li data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">Karl Johns</span></li></ul><span data-dcnode-id="3511" instrument_node=""> </span></header><span data-dcnode-id="3509" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="3486"><span data-dcnode-id="3508" instrument_node=""> </span><h4 data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="3497"><li data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">motif,&nbsp;</span></li><li data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">identification,&nbsp;</span></li><li data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">description,&nbsp;</span></li><li data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">expressive potential</span></li></ul><span data-dcnode-id="3496" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="3491" rel="58e2df9096f440cb97698cff31cbffe1" type="button"><span data-dcnode-id="3495" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="3492" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="3494" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="3493" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="3490" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="3488" rel="58e2df9096f440cb97698cff31cbffe1"><span data-dcnode-id="3489" instrument_node="">                            Originally published as ‘J. J. Tikannen, “Die Beinstellungen in der Kunstgeschichte. Ein Beitrag zur Geschichte der künstlerischen Motive”, Tom. XLII Nr. 1 of the Acta Societatis Scientiarum Fennicae Helsingfors 1912’, Kunstgeschichtliche Anzeigen Beiblatt der Mitteilungen des Instituts für österreichische Geschichtsforschung, Redigiert von Max Dvořák, Jahrgang 1912 Heft 3/4, Innsbruck: Wagner 1912, pp. 66-69. This book is written so simply and is so pleasantly straightforward that we are tempted to publicly thank the author for such a document of his open humanity; he nowhere suppresses contradictory facts for the sake of his construction, and at every turn lays out the obscurities inherent in the subject. The motifs of the poses of legs in the visual arts are arranged according to characteristic groups: 1. the stance with legs spread, the foot turned to the side and the dance master pose; 2. the stance with knees together; 3. the stance with one foot supported and legs crossed; each of these individual groups is treated in its historical development. The motif of these poses can fill a function as when an executioner stands with his legs apart in order to better wield his axe; on the other hand it can be an expressive motif when a small satyr crosses the supporting leg with his free leg to express his ‘dolce far niente’ as he also does with his inclined small head, his soft body leaning against the trunk of a tree aside from the inactivity of the legs. Yet such a strict distinction is not always possible. There are instances in which a particular pose of the legs has been frequently used without ever having been interpreted as conveying an expression – such as the straddling stance in the Trecento; and then suddenly within the general development of art, the increasing realism during the Quattrocento, the pose began to clearly assume an inherent ‘moral’ context and was used to express this. The motif was savoured. The later generations of artists and spectators were only able to enjoy its perpetuation. In this way it then declined from its character as an expressive motif clearly imparting a concept (in the Filippo Scolari by Castagno, the St. George of Donatello) to a ludicrous distortion of its once so serious implication (pose of Landsknechts). A revival (numerous examples in the work of Jacques-Louis David) can never be achieved without an aftertaste of the caricature once attached to it; we sense that the motif no longer seems comical, but retains a strong tang of theatrical pathos.                          </span></p><span data-dcnode-id="3487" instrument_node=""> </span></div><span data-dcnode-id="3485" instrument_node=""> </span></div><span data-dcnode-id="3483" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="3457"><span data-dcnode-id="3482" instrument_node=""> </span><ul data-dcnode-id="3459"><span data-dcnode-id="3481" instrument_node=""> </span><li data-dcnode-id="3473"><span data-dcnode-id="3480" instrument_node=""> </span><a data-dcnode-id="3474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/karl-trans-etctikannen-1.pdf" rel="noopener" target="_blank"><span data-dcnode-id="3479" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="3475" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="3478"></path><polyline data-dcnode-id="3477" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="3476" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="3472" instrument_node=""> </span><li data-dcnode-id="3467"><span data-dcnode-id="3471" instrument_node=""> </span><a data-dcnode-id="3469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="3470" instrument_node="">About the journal</span></a><span data-dcnode-id="3468" instrument_node=""> </span></li><span data-dcnode-id="3466" instrument_node=""> </span><li data-dcnode-id="3461"><span data-dcnode-id="3465" instrument_node="">                            Published by </span><em data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="3462" instrument_node=""> </span></li><span data-dcnode-id="3460" instrument_node=""> </span></ul><span data-dcnode-id="3458" instrument_node=""> </span></aside><span data-dcnode-id="3456" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="3375"><span data-dcnode-id="3453" instrument_node=""> </span><article class="row" data-dcnode-id="3376"><span data-dcnode-id="3452" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="3405"><span data-dcnode-id="3451" instrument_node=""> </span><header data-dcnode-id="3435"><span data-dcnode-id="3450" instrument_node=""> </span><p class="label" data-dcnode-id="3447"><a data-dcnode-id="3448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="3449" instrument_node="">                            Journal of Art Historiography (Dec 2020)                          </span></a></p><span data-dcnode-id="3446" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="3441"><span data-dcnode-id="3445" instrument_node=""> </span><a class="" data-dcnode-id="3443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/317c00711e89427aaf9e33cff4c9d3c4" target="_blank"><span data-dcnode-id="3444" instrument_node="">                              Erica Tietze-Conrat, “On Drawings”                            </span></a><span data-dcnode-id="3442" instrument_node=""> </span></h3><span data-dcnode-id="3440" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="3437"><li data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">Karl Johns</span></li></ul><span data-dcnode-id="3436" instrument_node=""> </span></header><span data-dcnode-id="3434" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="3407"><span data-dcnode-id="3433" instrument_node=""> </span><h4 data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="3418"><li data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">psychology,&nbsp;</span></li><li data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">representation,&nbsp;</span></li><li data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">surface,&nbsp;</span></li><li data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">line,&nbsp;</span></li><li data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">ground,&nbsp;</span></li><li data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">ornament</span></li></ul><span data-dcnode-id="3417" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="3412" rel="317c00711e89427aaf9e33cff4c9d3c4" type="button"><span data-dcnode-id="3416" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="3413" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="3415" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="3414" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="3411" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="3409" rel="317c00711e89427aaf9e33cff4c9d3c4"><span data-dcnode-id="3410" instrument_node="">                            Originally published as ‘Ueber Handzeichnungen’, Kunstgeschichtliche Anzeigen Beiblatt de Mitteilungen des Instituts für österreichische Geschichtsforschung, edigiert von Max Dvořák, Jahrgang 1913 Heft 1/2, Innsbruck: Wagner 1913, pp. 41-51, signed February 1914. The following remarks have been inspired by the essay by Franz Martin ‘Haberditzl, Über Handzeichnungen’, which appeared in the fourth issue of Die graphischen Künste during 1913; this comprised an essay on distinguishing draftsmanship from the other arts made on flat surfaces and characterizing its unique qualities. The loose disposition of the essay by Haberditzl makes it clear that the present remarks are intended more as a parallel account than as a critical review. We might see the work of art as an example of the eternal law of the only way in which the intellect can present itself within the material world; the painting is bound to a given form of material such as canvas or wooden panel etc., and this material imposes its law – that of the surface. The colours combine to one sort of imaginary illusion or another also balance one another in the surface; this flat nature recalls the canvas. What about in drawings? The paper lies bare and visible; it is not a demand of the material, the flatness is not a product of the colour harmony but the material speaks itself. The unified effect of this combination of intellect and material is dissolved and has become a parallel rather than a coagulated phenomenon. It is so natural and obvious to see that this is paper that this plays no part in the aesthetic impression of the drawing. The material only gains an artistic value as creating space or rhythm by the colour of its paper, whether it is white or coloured, and the comparative emphasis within the drawing. By the elimination of this particular materially bound aspect from consciousness, the other more intellectual aspect is successfully heightened, and we speak of the abstraction of drawings.                          </span></p><span data-dcnode-id="3408" instrument_node=""> </span></div><span data-dcnode-id="3406" instrument_node=""> </span></div><span data-dcnode-id="3404" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="3378"><span data-dcnode-id="3403" instrument_node=""> </span><ul data-dcnode-id="3380"><span data-dcnode-id="3402" instrument_node=""> </span><li data-dcnode-id="3394"><span data-dcnode-id="3401" instrument_node=""> </span><a data-dcnode-id="3395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/karl-trans-etcondrawings.pdf" rel="noopener" target="_blank"><span data-dcnode-id="3400" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="3396" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="3399"></pa -id="3292" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="3243"><span data-dcnode-id="3291" instrument_node=""> </span><header data-dcnode-id="3275"><span data-dcnode-id="3290" instrument_node=""> </span><p class="label" data-dcnode-id="3287"><a data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="3289" instrument_node="">                            Journal of Art Historiography (Dec 2020)                          </span></a></p><span data-dcnode-id="3286" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="3281"><span data-dcnode-id="3285" instrument_node=""> </span><a class="" data-dcnode-id="3283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/5352a3eb350648d5824357c2a804e334" target="_blank"><span data-dcnode-id="3284" instrument_node="">                              Artist interviews and revisionist art history: women of African descent, critical practice and methods of rewriting dominant narratives                            </span></a><span data-dcnode-id="3282" instrument_node=""> </span></h3><span data-dcnode-id="3280" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="3277"><li data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">Lauren Cross</span></li></ul><span data-dcnode-id="3276" instrument_node=""> </span></header><span data-dcnode-id="3274" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="3245"><span data-dcnode-id="3273" instrument_node=""> </span><h4 data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="3256"><li data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">critical theory,&nbsp;</span></li><li data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">black feminist thought,&nbsp;</span></li><li data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">curatorial research,&nbsp;</span></li><li data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">body of knowledge,&nbsp;</span></li><li data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">women artists of african descent,&nbsp;</span></li><li data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">artist interviews,&nbsp;</span></li><li data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">revisionist art history</span></li></ul><span data-dcnode-id="3255" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="3250" rel="5352a3eb350648d5824357c2a804e334" type="button"><span data-dcnode-id="3254" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="3251" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="3253" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="3252" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="3249" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="3247" rel="5352a3eb350648d5824357c2a804e334"><span data-dcnode-id="3248" instrument_node="">                            In the field of art history, critical modes of inquiry prompt the production of new areas of analysis and discovery. Black feminist thought, African art and curatorial history, for instance, offer models for reinterpreting the experiences of hidden and marginalised voices that tend to be overlooked. For women artists and scholars of African descent, the lack of critical artist voices in art-historical scholarship is often detrimental – perpetuating the ways in which communities of colour feel excluded from knowledge production. In this regard, scholars across interdisciplinary fields have proposed artist interviews to be important strategies for documenting and re-narrating art-historical narratives (Jordan; Kreamer; Obrist; Walker; Whitehead). In this article, the researcher will analyse audio/audio-visual recordings and transcripts of interviews with African American artists conducted for narrative inquiry, oral history and documentary film. The paper assesses the potential for artist interviews to be sites for reframing, reclaiming and rewriting art histories by women artists of African descent.                          </span></p><span data-dcnode-id="3246" instrument_node=""> </span></div><span data-dcnode-id="3244" instrument_node=""> </span></div><span data-dcnode-id="3242" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="3216"><span data-dcnode-id="3241" instrument_node=""> </span><ul data-dcnode-id="3218"><span data-dcnode-id="3240" instrument_node=""> </span><li data-dcnode-id="3232"><span data-dcnode-id="3239" instrument_node=""> </span><a data-dcnode-id="3233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/cross.pdf" rel="noopener" target="_blank"><span data-dcnode-id="3238" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="3234" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="3237"></path><polyline data-dcnode-id="3236" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="3235" x1="10" x2="21" y1="14" y2="3"></line></svg></ eu/?index=cw22&amp;url=https%3A//doaj.org/article/dd97f85ab11b439ebbfe36b77ae8f6d4" target="_blank"><span data-dcnode-id="3203" instrument_node="">                              Vocal acts: video art and the artist’s voice                            </span></a><span data-dcnode-id="3201" instrument_node=""> </span></h3><span data-dcnode-id="3199" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="3196"><li data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">Claire M. Holdsworth</span></li></ul><span data-dcnode-id="3195" instrument_node=""> </span></header><span data-dcnode-id="3193" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="3164"><span data-dcnode-id="3192" instrument_node=""> </span><h4 data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="3175"><li data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">interview,&nbsp;</span></li><li data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">voice,&nbsp;</span></li><li data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">video art,&nbsp;</span></li><li data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">performance art,&nbsp;</span></li><li data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">intermedia,&nbsp;</span></li><li data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">atherton,&nbsp;</span></li><li data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">elwes</span></li></ul><span data-dcnode-id="3174" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="3169" rel="dd97f85ab11b439ebbfe36b77ae8f6d4" type="button"><span data-dcnode-id="3173" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="3170" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="3172" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="3171" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="3168" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="3166" rel="dd97f85ab11b439ebbfe36b77ae8f6d4"><span data-dcnode-id="3167" instrument_node="">                            This article explores the iterative ways in which artists’ voices are recorded and revisited in British video art. Examining dialogic speech acts, this multimedia contribution analyses two very different artworks: In Two Minds (made from 1978 onwards) by Kevin Atherton and Kensington Gore (1982) by Catherine Elwes. It discusses the recording and replay of the spoken voice in these works, referring to discourses on sound (Connor, 2000; Dolar, 2006), to re-examine approaches to modernism in the late 1970s and early 1980s, and the archiving (Schneider, 2001; 2005) of such works thereafter.                          </span></p><span data-dcnode-id="3165" instrument_node=""> </span></div><span data-dcnode-id="3163" instrument_node=""> </span></div><span data-dcnode-id="3161" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="3135"><span data-dcnode-id="3160" instrument_node=""> </span><ul data-dcnode-id="3137"><span data-dcnode-id="3159" instrument_node=""> </span><li data-dcnode-id="3151"><span data-dcnode-id="3158" instrument_node=""> </span><a data-dcnode-id="3152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/holdsworth.pdf" rel="noopener" target="_blank"><span data-dcnode-id="3157" instrument_node=""> Read online </span><svg >recording</span></li></ul><span data-dcnode-id="3095" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="3090" rel="835a4e00d08045609b42d6fe2136fecd" type="button"><span data-dcnode-id="3094" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="3091" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="3093" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="3092" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="3089" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="3087" rel="835a4e00d08045609b42d6fe2136fecd"><span data-dcnode-id="3088" instrument_node="">                            This paper examines the ethical and art-historical questions that are raised when conversations with artists are edited for sound clips or transcribed for books and catalogues. Should the reader of an interview be aware of how much has been ‘tidied up’ or redacted? Does it matter that what one is reading is a version of the authentic truth of the original?

Drawing on four contrasting examples, I will trace the significance of the editing process, from the uttered voice to the edited page. Using Gretchen Berg’s interview with Andy Warhol, I discuss the ‘authentic’ artist’s statement. With Warhol’s a: A Novel, I explore the limits of a literal transcription. Discussing my series of interviews with the artist Morten Viskum, I examine the months-long process of determining the psychological underpinnings of his work. Finally, with the artist Nathalia Edenmont, I consider the interview in the context of a traumatic confession.                          </span></p><span data-dcnode-id="3086" instrument_node=""> </span></div><span data-dcnode-id="3084" instrument_node=""> </span></div><span data-dcnode-id="3082" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="3056"><span data-dcnode-id="3081" instrument_node=""> </span><ul data-dcnode-id="3058"><span data-dcnode-id="3080" instrument_node=""> </span><li data-dcnode-id="3072"><span data-dcnode-id="3079" instrument_node=""> </span><a data-dcnode-id="3073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/wainwright.pdf" rel="noopener" target="_blank"><span data-dcnode-id="3078" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="3074" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="3077"></path><polyline data-dcnode-id="3076" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="3075" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="3071" instrument_node=""> </span><li data-dcnode-id="3066"><span data-dcnode-id="3070" instrument_node=""> </span><a data-dcnode-id="3068"           From ‘Portraits d’artistes’ to the interviewer’s portrait: interviews of modern artists by Jacques Guenne in L’art vivant (1925–1930)                            </span></a><span data-dcnode-id="3041" instrument_node=""> </span></h3><span data-dcnode-id="3039" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="3036"><li data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">Poppy Sfakianaki</span></li></ul><span data-dcnode-id="3035" instrument_node=""> </span></header><span data-dcnode-id="3033" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="3002"><span data-dcnode-id="3032" instrument_node=""> </span><h4 data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="3013"><li data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">artists’ interviews,&nbsp;</span></li><li data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">jacques guenne,&nbsp;</span></li><li data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">l’art vivant,&nbsp;</span></li><li data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">mediation,&nbsp;</span></li><li data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">mediatization,&nbsp;</span></li><li data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">art press,&nbsp;</span></li><li data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">art criticism,&nbsp;</span></li><li data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">modern art</span></li></ul><span data-dcnode-id="3012" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="3007" rel="dd531ac4c2c2487e974abe1bc4a0483f" type="button"><span data-dcnode-id="3011" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="3008" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="3010" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="3009" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="3006" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="3004" rel="dd531ac4c2c2487e974abe1bc4a0483f"><span data-dcnode-id="3005" instrument_node="">                            Between 1925 and 1930, when artists’ interviews were still not a regular feature of the art press, the French art critic Jacques Guenne, co-director of one of the most important Parisian art journals for modern art, L’art vivant, published in it a series of illustrated artists’ interviews under the title ‘Portraits d’artistes’. Moreover, in 1927 Guenne edited and reprinted a selection of his interviews in a book. Treating the published interviews as fiction, as the echo of the real interviews, the article examines how they constructed the artists’ public image via the mediating role of Guenne, thus increasing their visibility in the public sphere. Furthermore, it argues that the interviews contributed to the construction of the public image of the interviewer and the promotion of his aesthetic ideal that was also that of the journal that he managed.                          </span></p><span data-dcnode-id="3003" instrument_node=""> </span></div><span data-dcnode-id="3001" instrument_node=""> </span></div><span data-dcnode-id="2999" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="2973"><span data-dcnode-id="2998" instrument_node=""> </span><ul data-dcnode-id="2975"><span data-dcnode-id="2997" instrument_node=""> </span><li data-dcnode-id="2989"><span t_node="">biography,&nbsp;</span></li><li data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">oral history,&nbsp;</span></li><li data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">audio arts,&nbsp;</span></li><li data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">performativity,&nbsp;</span></li><li data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">transcription,&nbsp;</span></li><li data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">archive,&nbsp;</span></li><li data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">dialogic practices</span></li></ul><span data-dcnode-id="2927" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="2922" rel="a67cc32e0bfc4ee3a66b238c4130ace2" type="button"><span data-dcnode-id="2926" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="2923" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="2925" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="2924" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="2921" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="2919" rel="a67cc32e0bfc4ee3a66b238c4130ace2"><span data-dcnode-id="2920" instrument_node="">                            The four documents included in this issue are elaborations of the papers presented
at the 2019 Annual Conference of the Association for Art History. As it is common
practice at academic conferences, each paper in this session was accompanied by a
PowerPoint presentation, which permitted the playback of sound and video
excerpts from original artist interviews. A faithful transposition of these multimedia
presentations in the pages of academic journals is often impossible given their
design constraints. Given the interdisciplinary approach pursued in the session of
The Artist Interview (2019) and the experimental nature of this issue, the following
presentations have been revised as textual/verbal documents of original sound and
video archival material. While the written component of each paper is fully readable
here, some of their original sound and video counterparts are located and accessible
in archives or repositories where these documents can be preserved and accessed in
the future. The papers in this session acknowledge the multiple formats in which
the artist interview exists, including scripts, live dialogue, audio/audio-visual
recordings and transcripts.                          </span></p><span data-dcnode-id="2918" instrument_node=""> </span></div><span data-dcnode-id="2916" instrument_node=""> </span></div><span data-dcnode-id="2914" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="2888"><span data-dcnode-id="2913" instrument_node=""> </span><ul data-dcnode-id="2890"><span data-dcnode-id="2912" instrument_node=""> </span><li data-dcnode-id="2904"><span data-dcnode-id="2911" instrument_node=""> </span><a data-dcnode-id="2905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/commentary.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2910" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="2906" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="2909"></path><polyline data-dcnode-id="2908" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="2907" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="2903" instrument_node=""> </span><li data-dcnode-id="2898"><span data-dcnode-id="2902" instrument_node=""> </span><a data-dcnode-id="2900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="2901" instrument_node="">About the journal</span></a><span data-dcnode-id="2899" instrument_node=""> </span></li><span data-dcnode-id="2897" instrument_node=""> </span><li data-dcnode-id="2892"><span data-dcnode-id="2896" instrument_node="">                            Published by </span><em data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">Department of Art History, Univer 64" instrument_node=""> </span><h4 data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="2849"><li data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">artist interview historiography,&nbsp;</span></li><li data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">artist interview history,&nbsp;</span></li><li data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">halsman,&nbsp;</span></li><li data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">warhol,&nbsp;</span></li><li data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">interview as art,&nbsp;</span></li><li data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">speech event</span></li></ul><span data-dcnode-id="2848" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="2843" rel="4d1522ac4c1b491ab54d89c135e79d88" type="button"><span data-dcnode-id="2847" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="2844" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="2846" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="2845" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="2842" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="2840" rel="4d1522ac4c1b491ab54d89c135e79d88"><span data-dcnode-id="2841" instrument_node="">                            The history of the artist interview is a tantalizing subject, not least because of the breadth of associations with other histories that it involves and invites, such as with journalism, broadcasting technology, psychoanalysis, performance, and literature.  Yet, exactly on account of this constellation of associations, it is a decidedly slippery subject, difficult to grasp.  In this paper, I discuss this impediment to the writing of a history of the artist interview—outlining the sheer quantity of material involved—and then offer some thoughts on how to productively move forward.  I provide a summary historiography, noting how the topic has been reinvented with each decade beginning in the 1990s.  I propose that we envision the writing of the history of the artist interview as a collaborative endeavor and offer suggestions for what form such a collaboration might take.                          </span></p><span data-dcnode-id="2839" instrument_node=""> </span></div><span data-dcnode-id="2837" instrument_node=""> </span></div><span data-dcnode-id="2835" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="2809"><span data-dcnode-id="2834" instrument_node=""> </span><ul data-dcnode-id="2811"><span data-dcnode-id="2833" instrument_node=""> </span><li data-dcnode-id="2825"><span data-dcnode-id="2832" instrument_node=""> </span><a data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/wolf.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2831" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="2827" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="2830"></path><polyline data-dcnode-id="2829" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="2828" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="2824" instrument_node=""> </span><li data-dcnode-id="2819"><span data-dcnode-id="2823" instrument_node=""> </span><a data-dcnode-id="2821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="2822" instrument_node="">About the journal</span></a><span data-dcnode-id="2820" instrument_node=""> </span></li><span data-dcnode-id="2818" instrument_node=""> </span><li data-dcnode-id="2813"><span data-dcnode-id="2817" instrument_node="">                            Published by </span><em data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="2814" instrument_node=""> </span></li><span data-dcnode-id="2812" instrument_node=""> </span></ul><span data-dcnode-id="2810" instrument_node=""> </span></aside><span data-dcnode-id="2808" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="2721"><span data-dcnode-id="2805" instrument_node=""> </span><article class="row" data-dcnode-id="2722"><span data-dcnode-id="2804" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="2751"><span data-dcnode-id="2803" instrument_node=""> </span><header data-dcnode-id="2785"><span data-dcnode-id="2802" instrument_node=""> </span><p class="label" data-dcnode-id="2799"><a data-dcnode-id="2800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="2801" instrument_node="">                            Journal of Art Historiography (Dec 2020)                          </span></a></p><span data-dcnode-id="2798" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="2793"><span data-dcnode-id="2797" instrument_node=""> </span><a class="" data-dcnode-id="2795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/4b1fd52dd87643d1aa191647c10afa3f" target="_blank"><span data-dcnode-id="2796" instrument_node="">                              Mapping the contemporary historiography of the artist interview as a literary and critical genre: a critical introduction                            </span></a><span data-dcnode-id="2794" instrument_node=""> </span></h3><span data-dcnode-id="2792" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="2787"><li data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">Lucia Farinati,&nbsp;</span></li><li data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">Jennifer Thatcher</span></li></ul><span data-dcnode-id="2786" instrument_node=""> </span></header><span data-dcnode-id="2784" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="2753"><span data-dcnode-id="2783" instrument_node=""> </span><h4 data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="2764"><li data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">artist interview,&nbsp;</span></li><li data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">biography,&nbsp;</span></li><li data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">oral history,&nbsp;</span></li><li data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">audio arts,&nbsp;</span></li><li data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">performativity,&nbsp;</span></li><li data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">transcription,&nbsp;</span></li><li data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">archive,&nbsp;</span></li><li data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">dialogic practices</span></li></ul><span data-dcnode-id="2763" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="2758" rel="4b1fd52dd87643d1aa191647c10afa3f" type="button"><span data-dcnode-id="2762" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="2759" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="2761" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="2760" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="2757" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="2755" rel="4b1fd52dd87643d1aa191647c10afa3f"><span data-dcnode-id="2756" instrument_node="">                            Providing context for the two papers and four documents in this issue, this critical introduction explores the case for establishing the artist interview as a critical genre. It examines the status of artist interviews in relation to author interviews and the fields of oral history, art practice, art criticism and art history. The interview’s performative nature is emphasised, and the supposed ‘authenticity’ of the artist’s voice questioned. The potential existence of multiple variants of the ‘same’ interview problematises the artist interview’s status in archives – which is the original interview? A link is made between artist interviews and feminist methodologies, based on valuing the embodied nature of speech. Researching interviews goes to the heart of artists’ involvement in writing art history: the extent to which their words should be valued and trusted.                          </span></p><span data-dcnode-id="2754" instrument_node=""> </span></div><span data-dcnode-id="2752" instrument_node=""> </span></div><span data-dcnode-id="2750" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="2724"><span data-dcnode-id="2749" instrument_node=""> </span><ul data-dcnode-id="2726"><span data-dcnode-id="2748" instrument_node=""> </span><li data-dcnode-id="2740"><span data-dcnode-id="2747" instrument_node=""> </span><a data-dcnode-id="2741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/introduction-to-the-artist-interview.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2746" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="2742" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="2745"></path><polyline data-dcnode-id="2744" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="2743" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="2739" instrument_node=""> </span><li data-dcnode-id="2734"><span data-dcnode-id="2738" instrument_node=""> </span><a data-dcnode-id="2736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="2737" instrument_node="">About the journal</span></a><span data-dcnode-id="2735" instrument_node=""> </span></li><span data-dcnode-id="2733" instrument_node=""> </span><li data-dcnode-id="2728"><span data-dcnode-id="2732" instrument_node="">                            Published by </span><em data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="2729" instrument_node=""> </span></li><span data-dcnode-id="2727" instrument_node=""> </span></ul><span data-dcnode-id="2725" instrument_node=""> </span></aside><span data-dcnode-id="2723" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="2636"><span data-dcnode-id="2720" instrument_node=""> </span><article class="row" data-dcnode-id="2637"><span data-dcnode-id="2719" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="2666"><span data-dcnode-id="2718" instrument_node=""> </span><header data-dcnode-id="2700"><span data-dcnode-id="2717" instrument_node=""> </span><p class="label" data-dcnode-id="2714"><a data-dcnode-id="2715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="2716" instrument_node="">                            Journal of Art Historiography (Dec 2020)                          </span></a></p><span data-dcnode-id="2713" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="2708"><span data-dcnode-id="2712" instrument_node=""> </span><a class="" data-dcnode-id="2710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/fee0211a4584466fb48fd05ec21f747c" target="_blank"><span data-dcnode-id="2711" instrument_node="">                              The Artist Interview – An interdisciplinary approach to its history, process and dissemination: Preface                            </span></a><span data-dcnode-id="2709" instrument_node=""> </span></h3><span data-dcnode-id="2707" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="2702"><li data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">Lucia Farinati,&nbsp;</span></li><li data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">Jennifer Thatcher</span></li></ul><span data-dcnode-id="2701" instrument_node=""> </span></header><span data-dcnode-id="2699" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="2668"><span data-dcnode-id="2698" instrument_node=""> </span><h4 data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="2679"><li data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">artist interview,&nbsp;</span></li><li data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">biography,&nbsp;</span></li><li data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">oral history,&nbsp;</span></li><li data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">audio arts,&nbsp;</span></li><li data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">performativity,&nbsp;</span></li><li data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">transcription,&nbsp;</span></li><li data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">archive,&nbsp;</span></li><li data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">dialogic practices</span></li></ul><span data-dcnode-id="2678" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="2673" rel="fee0211a4584466fb48fd05ec21f747c" type="button"><span data-dcnode-id="2677" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="2674" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="2676" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="2675" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="2672" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="2670" rel="fee0211a4584466fb48fd05ec21f747c"><span data-dcnode-id="2671" instrument_node="">                            Why has there been no history of the artist interview as a critical genre in its own right? The critical introduction, two papers and four documents in this special issue consider the interview’s significance beyond that of a historical source and journalistic tool. They scrutinise the process of conducting and disseminating an interview, from pre-production to post-production, considering the ethics implicated in what is modified. Treating the life of the artist interview – rather than just the life of the artist – as an object of study offers an alternative to the biographic model of interviews (as emphasised in oral history, for example). This approach expands the scope of the artist interview to include more creative uses, such as a form of artistic practice in alternative contemporary art magazines, or in performance, sound and video art. The political potential for artist interviews is also explored, as a means of contesting dominant art-historical narratives.                          </span></p><span data-dcnode-id="2669" instrument_node=""> </span></div><span data-dcnode-id="2667" instrument_node=""> </span></div><span data-dcnode-id="2665" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="2639"><span data-dcnode-id="2664" instrument_node=""> </span><ul data-dcnode-id="2641"><span data-dcnode-id="2663" instrument_node=""> </span><li data-dcnode-id="2655"><span data-dcnode-id="2662" instrument_node=""> </span><a data-dcnode-id="2656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/01/preface.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2661" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="2657" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="htt   </span></a></p><span data-dcnode-id="2628" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="2623"><span data-dcnode-id="2627" instrument_node=""> </span><a class="" data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/2b686f66fa7748f8af29982c09864c4a" target="_blank"><span data-dcnode-id="2626" instrument_node="">                              From Strzygowski’s “Orient oder Rom” to Hans Sedlmayr’s “Closest Orient”                            </span></a><span data-dcnode-id="2624" instrument_node=""> </span></h3><span data-dcnode-id="2622" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="2619"><li data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">Zehra Tonbul</span></li></ul><span data-dcnode-id="2618" instrument_node=""> </span></header><span data-dcnode-id="2616" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="2589"><span data-dcnode-id="2615" instrument_node=""> </span><h4 data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="2600"><li data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">vienna school of art history,&nbsp;</span></li><li data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">oriental art historiography,&nbsp;</span></li><li data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">josef strzygowski,&nbsp;</span></li><li data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">ernst diez,&nbsp;</span></li><li data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">hans sedlmayr,&nbsp;</span></li><li data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">twentieth century academic history</span></li></ul><span data-dcnode-id="2599" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="2594" rel="2b686f66fa7748f8af29982c09864c4a" type="button"><span data-dcnode-id="2598" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="2595" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="2597" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="2596" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="2593" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="2591" rel="2b686f66fa7748f8af29982c09864c4a"><span data-dcnode-id="2592" instrument_node="">                            The article presents a history of art historical studies at the University of Vienna in the first half of the twentieth century in terms of its approach to oriental topics. It takes as its starting point a 1937 letter of Hans Sedlmayr, then-director of the Institute of Art History, to Ernst Diez, previously a professor of oriental studies at the same university. In his letter, Sedlmayr rejected Diez’s request to teach at the University, where he had left in 1926, stating that an academic position for ‘oriental art’ was a utopia. He declared his emphasis as the study of Byzantine and Balkan art, which he characterized as ‘the part of the Orient closest to us’: ‘das uns am nächsten liegende gebiet des Orients’. Sedlmayr’s letter opens perspectives on the changing place of oriental studies at the Institute and hints at its changing geographies. This article works backwards from Sedlmayr’s letter to trace an alternative academic history of the renowned Vienna School that unfolds the controversy between the art historiographical geographies of the Orient and Rome.                          </span></p><span data-dcnode-id="2590" instrument_node=""> </span></div><span data-dcnode-id="2588" instrument_node=""> </span></div><span data-dcnode-id="2586" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="2560"><span data-dcnode-id="2585" instrument_node=""> </span><ul data-dcnode-id="2562"><span data-dcnode-id="2584" instrument_node=""> </span><li data-dcnode-id="2576"><span data-dcnode-id="2583" instrument_node=""> </span><a data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/tonbul.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2582" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="2578" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="2581"></path><polyline data-dcnode-id="2580" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="2579" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="2575" instrument_node=""> </span><li data-dcnode-id="2570"><span data-dcnode-id="2574" instrument_node=""> </span><a data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="2573" instrument_node="">About the journal</span></a><span data-dcnode-id="2571" instrument_node=""> </span></li><span data-dcnode-id="2569" instrument_node=""> </span><li data-dcnode-id="2564"><span data-dcnode-id="2568" instrument_node="">                            Published by </span><em data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="2565" instrument_node=""> </span></li><span data-dcnode-id="2563" instrument_node=""> </span></ul><span data-dcnode-id="2561" instrument_node=""> </span></aside><span data-dcnode-id="2559" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="2478"><span data-dcnode-id="2556" instrument_node=""> </span><article class="row" data-dcnode-id="2479"><span data-dcnode-id="2555" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="2508"><span data-dcnode-id="2554" instrument_node=""> </span><header data-dcnode-id="2536"><span data-dcnode-id="2553" instrument_node=""> </span><p class="label" data-dcnode-id="2550"><a data-dcnode-id="2551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="2552" instrument_node="">                            Journal of Art Historiography (Dec 2020)                          </span></a></p><span data-dcnode-id="2549" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="2544"><span data-dcnode-id="2548" instrument_node=""> </span><a class="" data-dcnode-id="2546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/3ae69fb1f40245a88124882d7ea757a5" target="_blank"><span data-dcnode-id="2547" instrument_node="">                              The Tolnay–Panofsky affair or, loyalty to the youth: Max Dvořák, the Vienna School, and the Sunday Circle                            </span></a><span data-dcnode-id="2545" instrument_node=""> </span></h3><span data-dcnode-id="2543" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="2538"><li data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">Csilla Markója,&nbsp;</span></li><li data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">Kata Balázs</span></li></ul><span data-dcnode-id="2537" instrument_node=""> </span></header><span data-dcnode-id="2535" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="2510"><span data-dcnode-id="2534" instrument_node=""> </span><h4 data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="2521"><li data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">vienna school of art history,&nbsp;</span></li><li data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">györgy lukács,&nbsp;</span></li><li data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">charles de tolnay,&nbsp;</span></li><li data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">erwin panofsky,&nbsp;</span></li><li data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">hierarchy of american academic funding</span></li></ul><span data-dcnode-id="2520" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="2515" rel="3ae69fb1f40245a88124882d7ea757a5" type="button"><span data-dcnode-id="2519" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="2516" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="2518" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="2517" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="2514" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="2512" rel="3ae69fb1f40245a88124882d7ea757a5"><span data-dcnode-id="2513" instrument_node="">                            The conflict between Charles de Tolnay and Erwin Panofsky that grew unprecedentedly acrimonious in the history of the discipline – the so-called Tolnay–Panofsky affair – was more than mere personal bickering. The documents clearly reveal that the ‘affair’, which basically affected financial and professional positions, was based on embarrassingly ordinary, occasionally petty-minded questions instead of scientific arguments, and led to a break of relationship probably in spring 1943. It also directs the attention to the science political consequences of the hierarchic establishment of American science financing and academia in general in the interwar years and the 1940s, and to differences between European and American scholarship. It can be gleaned that Tolnay’s efforts to be allotted raised stipends (often by a great degree, as the documents unanimously testify) and a confirmed position led to the deterioration of his relationship with the Princeton IAS leaders and community – in spite of the fact that the former leader of the Institute Flexner took Tolnay’s side, at times with threats to Panofsky and Oppenheimer, and accusing Panofsky of professional jealousy. Though Tolnay received a raised scholarship up to 4000 dollars for three years, the institute decided to part with him in 1948. In the background of the affair, however, one may discover conflicts based on the diverging views on art history by Panofsky and Tolnay rooted far deeper, in the elementary influences of the Vienna School of Art History on the one hand, and of the Sunday Circle and György Lukács, on the other. The art philosophical aspects and methodological consequences of these dissenting concepts of art history may bear significance for the practitioners of the discipline today as well.                          </span></p><span data-dcnode-id="2511" instrument_node=""> </span></div><span data-dcnode-id="2509" instrument_node=""> </span></div><span data-dcnode-id="2507" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="2481"><span data-dcnode-id="2506" instrument_node=""> </span><ul data-dcnode-id="2483"><span data-dcnode-id="2505" instrument_node=""> </span><li data-dcnode-id="2497"><span data-dcnode-id="2504" instrument_node=""> </span><a data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/markoja.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2503" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="2499" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="2502"></path><polyline data-dcnode-id="2501" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="2500" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="2496" instrument_node=""> </span><li data-dcnode-id="2491"><span data-dcnode-id="2495" instrument_node=""> </span><a data-dcnode-id="2493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="2494" instrument_node="">About the journal</span></a><span data-dcnode-id="2492" instrument_node=""> </span></li><span data-dcnode-id="2490" instrument_node=""> </span><li data-dcnode-id="2485"><span data-dcnode-id="2489" instrument_node="">                            Published by </span><em data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="2486" instrument_node=""> </span></li><span data-dcnode-id="2484" instrument_node=""> </span></ul><span data-dcnode-id="2482" instrument_node=""> </span></aside><span data-dcnode-id="2480" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="2403"><span data-dcnode-id="2477" instrument_node=""> </span><article class="row" data-dcnode-id="2404"><span data-dcnode-id="2476" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="2433"><span data-dcnode-id="2475" instrument_node=""> </span><header data-dcnode-id="2459"><span data-dcnode-id="2474" instrument_node=""> </span><p class="label" data-dcnode-id="2471"><a data-dcnode-id="2472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="2473" instrument_node="">                            Journal of Art Historiography (Dec 2020)                          </span></a></p><span data-dcnode-id="2470" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="2465"><span data-dcnode-id="2469" instrument_node=""> </span><a class="" data-dcnode-id="2467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/fe62b85ceb0d4d16b5bdb9db1b15e4c6" target="_blank"><span data-dcnode-id="2468" instrument_node="">                              The influence of the Vienna School of Art History on Soviet and post-Soviet historiography: Bruegel’s case                            </span></a><span data-dcnode-id="2466" instrument_node=""> </span></h3><span data-dcnode-id="2464" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="2461"><li data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">Stefaniia Demchuk</span></li></ul><span data-dcnode-id="2460" instrument_node=""> </span></header><span data-dcnode-id="2458" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="2435"><span data-dcnode-id="2457" instrument_node=""> </span><h4 data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="2446"><li data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">bruegel,&nbsp;</span></li><li data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">the vienna school of art history,&nbsp;</span></li><li data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">soviet art historiography,&nbsp;</span></li><li data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">post-soviet art history</span></li></ul><span data-dcnode-id="2445" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="2440" rel="fe62b85ceb0d4d16b5bdb9db1b15e4c6" type="button"><span data-dcnode-id="2444" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="2441" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="2443" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="2442" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="2439" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="2437" rel="fe62b85ceb0d4d16b5bdb9db1b15e4c6"><span data-dcnode-id="2438" instrument_node="">                            This essay looks at the longstanding debates over the influence of the Vienna School of Art History on Soviet and post-Soviet Art History. From the beginning, Soviet Art History vacillated between orthodox Marxism, its materialism and approach to culture as a superstructure, and idealism if not transcendentalism of Russian pre-war art history. Despite the ideological split between Europe and the USSR, personal contacts as well as circulation of books and ideas, encouraged Soviet art historians to reconsider and adopt certain methods of the Vienna School. This process was ambiguous. Firstly, it triggered the emergence of a ‘Marxist’ Bruegel (Nikolai Nikulin, Boris Vipper) opposed to his image of an intellectual and humanist created by the Vienna art historians. And, secondly, it inspired scholars as Mikhail Alpatov and Nataliia Gershenson-Chegodaeva to study Bruegel from the perspective of gestalt/macchia or Kunstgeschichte als Geistesgeschichte. In present-day post-soviet Bruegel studies, one can spot how occasional borrowings from Viennese scholars’ writings for interpretation of the separate works replaced the interest for their methodology. Rejection of theory for the purely practical case studies, grounded in Anglo-American publications, often resulted in epigone or insignificant works, deprived of strong argument and novelty.                          </span></p><span data-dcnode-id="2436" instrument_node=""> </span></div><span data-dcnode-id="2434" instrument_node=""> </span></div><span data-dcnode-id="2432" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="2406"><span data-dcnode-id="2431" instrument_node=""> </span><ul data-dcnode-id="2408"><span data-dcnode-id="2430" instrument_node=""> </span><li data-dcnode-id="2422"><span data-dcnode-id="2429" instrument_node=""> </span><a data-dcnode-id="2423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/demchuk.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2428" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="2424" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="2427"></path><polyline data-dcnode-id="2426" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="2425" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><spa
