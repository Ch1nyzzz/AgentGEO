://www.w3.org/2000/svg"><line data-dcnode-id="963" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="962" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="959" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="957" rel="e2575310c7ba47bc801fcbe11bcd15ee"><span data-dcnode-id="958" instrument_node="">                            The increasing global visibility of modern and contemporary African art makes it imperative to determine how art history frames the emergent subject/context. How do emergent theories and analyses of modern/contemporary African art position Africa within global debates about cultural production in general? How do scholars narrate a history of modern and contemporary art in Africa that unfolds from the viewpoint of the African subject / subjectivity rather than from the viewpoint of its negation by Western discourse? What approaches to historical data and interpretation are suitable for such analysis and what kind of art history does it produce? I use Chika Okeke-Agulu’s Postcolonial Modernism to evaluate these issues in relation to the politics of academic writing.                          </span></p><span data-dcnode-id="956" instrument_node=""> </span></div><span data-dcnode-id="954" instrument_node=""> </span></div><span data-dcnode-id="952" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="926"><span data-dcnode-id="951" instrument_node=""> </span><ul data-dcnode-id="928"><span data-dcnode-id="950" instrument_node=""> </span><li data-dcnode-id="942"><span data-dcnode-id="949" instrument_node=""> </span><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/03/ogbechie-rev.pdf" rel="noopener" target="_blank"><span data-dcnode-id="948" instrument_node=""> Read online </span><svg ari ="19"></line><line data-dcnode-id="861" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="858" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="856" rel="22fc3e236aab48c8938dc72934ee2a77"><span data-dcnode-id="857" instrument_node="">                            Reviews two important contributions to the study of Early Modern Northern European art theoretical literature, a dictionary of art terms and an edited volume of case studies on writings on art published between 1600 and 1750 in German, French, English, and Dutch. These two volumes are the first systematic comparison of artistic vocabulary in four languages as the terms appeared in a range of publications indebted to Italian sources. They study the literature from c. 1604, when Karel Van Mander s Schilder-boek was first published, until c. 1750, when Alexander Baumgarten introduced the term “aesthetics” to establish the analytical philosophy of art. Broadening the study to several countries and languages shows both the fragmentation of a received discourse and the emergence of common elements in an evolving, dynamic conception of painting.                          </span></p><span data-dcnode-id="855" instrument_node=""> </span></div><span data-dcnode-id="853" instrument_node=""> </span></div><span data-dcnode-id="851" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="825"><span data-dcnode-id="850" instrument_node=""> </span><ul data-dcnode-id="827"><span data-dcnode-id="849" instrument_node=""> </span><li data-dcnode-id="841"><span data-dcnode-id="848" instrument_node=""> </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/02/farago-rev.pdf" rel="noopener" target="_blank"><span data-dcnode-id="847" instrument_node=""> Read online </span><svg aria- e-id="785"><span data-dcnode-id="786" instrument_node="">methodology</span></li></ul><span data-dcnode-id="783" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="778" rel="4f7f39cf776f40f4be84de265e0952fd" type="button"><span data-dcnode-id="782" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="779" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="781" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="780" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="777" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="775" rel="4f7f39cf776f40f4be84de265e0952fd"><span data-dcnode-id="776" instrument_node="">                            There are conspicuous parallelisms —and symmetries— between the scholarly fates of Walter Benjamin and Arnold Hauser. While the first failed to attain any sort of success during his lifetime, the latter s instant widespread diffusion went hand in hand with an ambiguous academic reception. However, if Benjamin posthumously grew to become a major author, Hauser remained an outsider, whose figure has faded and re-emerged with dubious fortune. In spite of opposite lucks, both authors were marked by a strong anti-positivistic attitude which sought to establish a distinct methodology for the social sciences, striving to understand the present through art criticism. Departing from broad considerations of their philosophical backgrounds, this paper will further illustrate their similarities and differences by examining shared accusations that weight on them: their controversial forms of Marxism point to a conception of art criticism that handles historical narrative as myths, rendering their methods close to psychoanalytical dream interpretation.                          </span></p><span data-dcnode-id="774" instrument_node=""> </span></div><span data-dcnode-id="772" instrument_node=""> </span></div><span data-dcnode-id="770" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="744"><span data-dcnode-id="769" instrument_node=""> </span><ul data-dcnode-id="746"><span data-dcnode-id="768" instrument_node=""> </span><li data-dcnode-id="760"><span data-dcnode-id="767" instrument_node=""> </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/05/saldana.pdf" rel="noopener" target="_blank"><span data-dcnode-id="766" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="762" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="765"></path><polyline data-dcnode-id="764" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="763" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="759" instrument_node=""> </span><li data-dcnode-id="754"><span data-dcnode-id="758" instrument_node=""> </span><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="757" instrument_node="">About the journal</span></a><span data-dcnode-id="755" instrument_node=""> </span></li><span data-dcnode-id="753" instrument_node=""> </span><li data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">                            Published by </span>< an></header><span data-dcnode-id="721" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="680"><span data-dcnode-id="720" instrument_node=""> </span><h4 data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="691"><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">caricature,&nbsp;</span></li><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">performance,&nbsp;</span></li><li data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">artists  self-representation,&nbsp;</span></li><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">mountebanks,&nbsp;</span></li><li data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">bologna,&nbsp;</span></li><li data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">annibale carracci,&nbsp;</span></li><li data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">the carracci students and followers,&nbsp;</span></li><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">carlo cesare malvasia,&nbsp;</span></li><li data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">felsina pittrice,&nbsp;</span></li><li data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">charles rogers,&nbsp;</span></li><li data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">a collection of prints in imitation of drawings,&nbsp;</span></li><li data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">paul oppé,&nbsp;</span></li><li data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">the warburg institute</span></li></ul><span data-dcnode-id="690" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="685" rel="8e93c5c4bd024f54945314d02ce869f0" type="button"><span data-dcnode-id="689" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="686" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="688" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="687" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="684" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="682" rel="8e93c5c4bd024f54945314d02ce869f0"><span data-dcnode-id="683" instrument_node="">                            A Company of Artists, a forgotten caricature of Annibale Carracci s students and followers, represented as a crowd watching a street performance of mountebanks, is closely tied to different stages of the historiography of caricature. It follows the first accounts of its origins and strategies by the Seicento theorists, testifying to its centrality in the Carracci studio in Bologna. The drawing s arrival in British collections coincided with the first Anglophone history of caricature, published by Charles Rogers in 1778, and, later, with the redefinition of caricature studies among the Warburg circle of scholars. This text is an inquiry into the subversive potential of caricature as a critical art form of early modernity. It argues that by adopting bodily deformation as its modus operandi, and by aligning artists with mountebanks, the drawing contributes to the reinvention of the codes of artists  self-representation, renouncing the previous emphasis on their social status to privilege companionship and performativity.                          </span></p><span data-dcnode-id="681" instrument_node=""> </span></div><span data-dcnode-id="679" instrument_node=""> </span></div><span data-dcnode-id="677" instrument_node=""> </span><
