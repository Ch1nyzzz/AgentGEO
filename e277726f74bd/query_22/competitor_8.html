node-id="6822" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="6817"><span data-dcnode-id="6821" instrument_node=""> </span><a class="" data-dcnode-id="6819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/3196c2d8077240ba8ed96ec5f0386ec2" target="_blank"><span data-dcnode-id="6820" instrument_node="">                              Dvořák on the revolutionary temporalities of art                            </span></a><span data-dcnode-id="6818" instrument_node=""> </span></h3><span data-dcnode-id="6816" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="6813"><li data-dcnode-id="6814"><span data-dcnode-id="6815" instrument_node="">Ivan Gerát</span></li></ul><span data-dcnode-id="6812" instrument_node=""> </span></header><span data-dcnode-id="6810" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="6785"><span data-dcnode-id="6809" instrument_node=""> </span><h4 data-dcnode-id="6807"><span data-dcnode-id="6808" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="6796"><li data-dcnode-id="6805"><span data-dcnode-id="6806" instrument_node="">art,&nbsp;</span></li><li data-dcnode-id="6803"><span data-dcnode-id="6804" instrument_node="">temporality,&nbsp;</span></li><li data-dcnode-id="6801"><span data-dcnode-id="6802" instrument_node="">revolution,&nbsp;</span></li><li data-dcnode-id="6799"><span data-dcnode-id="6800" instrument_node="">religion,&nbsp;</span></li><li data-dcnode-id="6797"><span data-dcnode-id="6798" instrument_node="">idolatry</span></li></ul><span data-dcnode-id="6795" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="6790" rel="3196c2d8077240ba8ed96ec5f0386ec2" type="button"><span data-dcnode-id="6794" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="6791" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="6793" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="6792" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="6789" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="6787" rel="3196c2d8077240ba8ed96ec5f0386ec2"><span data-dcnode-id="6788" instrument_node="">                            This text discusses the relations between temporality and art in some elucidative texts written by Max Dvořák (1874–1921) in the last years of his short life. Dvořák did not hesitate to see medieval (or older) art as art but he explicitly talked about a change in the understanding of art, or a new concept of art.  He described the radical multi-level changes of this concept as ‘an imaginative revolution’, which started a departure from ‘a period of decadence’.  However, a closer look at the meanings of ‘revolution’ in several early twentieth century thinkers’ texts and actions (for example these by Lenin, Trotsky and Freud) reveals substantial temporal differences in the way it was understood.                          </span></p><span data-dcnode-id="6786" instrument_node=""> </span></div><span data-dcnode-id="6784" instrument_node=""> </span></div><span data-dcnode-id="6782" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="6756"><span data-dcnode-id="6781" instrument_node=""> </span><ul data-dcnode-id="6758"><span data-dcnode-id="6780" instrument_node=""> </span><li data-dcnode-id="6772"><span data-dcnode-id="6779" instrument_node=""> </span><a data-dcnode-id="6773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/gerat.pdf" rel="noopener" target="_blank"><span data-dcnode-id="6778" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="6774" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="6777"></path><polyline data-dcnode-id="6776" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="6775" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="6771" instrument_node=""> </span><li data-dcnode-id="6766"><span data-dcnode-id="6770" instrument_node=""> </span><a data-dcnode-id="6768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="6769" instrument_node="">About the journal</span></a><span data-dcnode-id="6767" instrument_node=""> </span></li><span data-dcnode-id="6765" instrument_node=""> </span><li data-dcnode-id="6760"><span data-dcnode-id="6764" instrument_node="">                            Published by </span><em data-dcnode-id="6762"><span data-dcnode-id="6763" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="6761" instrument_node=""> </span></li><span data-dcnode-id="6759" instrument_node=""> </span></ul><span data-dcnode-id="6757" instrument_node=""> </span></aside><span data-dcnode-id="6755" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="6670"><span data-dcnode-id="6752" instrument_node=""> </span><article class="row" data-dcnode-id="6671"><span data-dcnode-id="6751" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="6700"><span data-dcnode-id="6750" instrument_node=""> </span><header data-dcnode-id="6734"><span data-dcnode-id="6749" instrument_node=""> </span><p class="label" data-dcnode-id="6746"><a data-dcnode-id="6747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="6748" instrument_node="">                            Journal of Art Historiography (Dec 2021)                          </span></a></p><span data-dcnode-id="6745" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="6740"><span data-dcnode-id="6744" instrument_node=""> </span><a class="" data-dcnode-id="6742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/ef17334a354d4b0db2fb1891e8604900" target="_blank"><span data-dcnode-id="6743" instrument_node="">                              Max Dvořák’s Michelangelo                            </span></a><span data-dcnode-id="6741" instrument_node=""> </span></h3><span data-dcnode-id="6739" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="6736"><li data-dcnode-id="6737"><span data-dcnode-id="6738" instrument_node="">Tomáš Murár</span></li></ul><span data-dcnode-id="6735" instrument_node=""> </span></header><span data-dcnode-id="6733" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="6702"><span data-dcnode-id="6732" instrument_node=""> </span><h4 data-dcnode-id="6730"><span data-dcnode-id="6731" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="6713"><li data-dcnode-id="6728"><span data-dcnode-id="6729" instrument_node="">max dvořák,&nbsp;</span></li><li data-dcnode-id="6726"><span data-dcnode-id="6727" instrument_node="">michelangelo,&nbsp;</span></li><li data-dcnode-id="6724"><span data-dcnode-id="6725" instrument_node="">mannerism,&nbsp;</span></li><li data-dcnode-id="6722"><span data-dcnode-id="6723" instrument_node="">modernism,&nbsp;</span></li><li data-dcnode-id="6720"><span data-dcnode-id="6721" instrument_node="">el greco,&nbsp;</span></li><li data-dcnode-id="6718"><span data-dcnode-id="6719" instrument_node="">pieter bruegel the elder,&nbsp;</span></li><li data-dcnode-id="6716"><span data-dcnode-id="6717" instrument_node="">postwar vienna,&nbsp;</span></li><li data-dcnode-id="6714"><span data-dcnode-id="6715" instrument_node="">vienna school of art history</span></li></ul><span data-dcnode-id="6712" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="6707" rel="ef17334a354d4b0db2fb1891e8604900" type="button"><span data-dcnode-id="6711" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="6708" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="6710" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="6709" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="6706" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="6704" rel="ef17334a354d4b0db2fb1891e8604900"><span data-dcnode-id="6705" instrument_node="">                            It has been shown that it was Max Dvořák who introduced into art-historical research the concept of Mannerism as an independent style that dominated the second half of the 16th century. Dvořák described the art of Raphael’s pupils and of Florentine painters such as Rosso Fiorentino or Jacopo Pontormo not as a decline in artistic development, but as an expression of a change in the cultural mood that needed to be voiced in artistic form. However, the historiography of Dvořák’s conception of Mannerism has to date neglected to devote any attention to how Mannerism actually emerged: what in Dvořák’s conception of art generated the need to describe the art of the late 16th century as a separate artistic style distinct from the Renaissance? As the study shows, the answer to this question may be found in Max Dvořák’s interpretation of the late art of Michelangelo Buonarroti.                          </span></p><span data-dcnode-id="6703" instrument_node=""> </span></div><span data-dcnode-id="6701" instrument_node=""> </span></div><span data-dcnode-id="6699" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="6673"><span data-dcnode-id="6698" instrument_node=""> </span><ul data-dcnode-id="6675"><span data-dcnode-id="6697" instrument_node=""> </span><li data-dcnode-id="6689"><span data-dcnode-id="6696" instrument_node=""> </span><a data-dcnode-id="6690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/murar.pdf" rel="noopener" target="_blank"><span data-dcnode-id="6695" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="6691" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="6694"></path><polyline data-dcnode-id="6693" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="6692" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="6688" instrument_node=""> </span><li data-dcnode-id="6683"><span data-dcnode-id="6687" instrument_node=""> </span><a data-dcnode-id="6685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="6686" instrument_node="">About the journal</span></a><span data-dcnode-id="6684" instrument_node=""> </span></li><span data-dcnode-id="6682" instrument_node=""> </span><li data-dcnode-id="6655" instrument_node="">Rostislav Švácha</span></li></ul><span data-dcnode-id="6652" instrument_node=""> </span></header><span data-dcnode-id="6650" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="6619"><span data-dcnode-id="6649" instrument_node=""> </span><h4 data-dcnode-id="6647"><span data-dcnode-id="6648" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="6630"><li data-dcnode-id="6645"><span data-dcnode-id="6646" instrument_node="">preservation,&nbsp;</span></li><li data-dcnode-id="6643"><span data-dcnode-id="6644" instrument_node="">old towns,&nbsp;</span></li><li data-dcnode-id="6641"><span data-dcnode-id="6642" instrument_node="">modernist architecture,&nbsp;</span></li><li data-dcnode-id="6639"><span data-dcnode-id="6640" instrument_node="">aesthetics,&nbsp;</span></li><li data-dcnode-id="6637"><span data-dcnode-id="6638" instrument_node="">otto wagner,&nbsp;</span></li><li data-dcnode-id="6635"><span data-dcnode-id="6636" instrument_node="">klub za starou prahu,&nbsp;</span></li><li data-dcnode-id="6633"><span data-dcnode-id="6634" instrument_node="">pavel janák,&nbsp;</span></li><li data-dcnode-id="6631"><span data-dcnode-id="6632" instrument_node="">cubism in architecture</span></li></ul><span data-dcnode-id="6629" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="6624" rel="f385c2003eae4bb4a8edd3a34af4add2" type="button"><span data-dcnode-id="6628" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="6625" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="6627" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="6626" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="6623" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="6621" rel="f385c2003eae4bb4a8edd3a34af4add2"><span data-dcnode-id="6622" instrument_node="">                            In the early 20th century, heritage conservation in Central Europe extended the focus of its interest to old towns seen as a whole. Around the same time, the first buildings in the Modernist style began to be introduced into these historical urban settings, and so the question of their ‘contextuality’ arose for the first time. Several texts written by Max Dvořák reacted to both these processes. Dvořák was an opponent of Historicism, and so he did not object to the introduction of Modernism into old towns, but only on condition that a ‘higher architectural unity’ or ‘internal unity’ of old and new was created. Otto Wagner’s designs for the Karlsplatz in Vienna did not meet with Dvořák’s approval because they broke away too radically from the old architectural culture and did not work towards a ‘higher unity’. Dvořák cooperated with the Club for Old Prague on the conservation of heritage sites in Prague. However, the Club had a greater predilection for Modernism than he did. The problem with the terms used by Dvořák lies in their aesthetic nature. This means that they are too open to subjective interpretations.                          </span></p><span data-dcnode-id="6620" instrument_node=""> </span></div><span data-dcnode-id="6618" instrument_node=""> </span></div><span data-dcnode-id="6616" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="6590"><span data-dcnode-id="6615" instrument_node=""> </span><ul data-dcnode-id="6592"><span data-dcnode-id="6614" instrument_node=""> </span><li data-dcnode-id="6606"><span data-dcnode-id="6613" instrument_node=""> </span><a data-dcnode-id="6607" href="https://chat cnode-id="6556"><span data-dcnode-id="6557" instrument_node="">franz ferdinand d’este,&nbsp;</span></li><li data-dcnode-id="6554"><span data-dcnode-id="6555" instrument_node="">heritage value,&nbsp;</span></li><li data-dcnode-id="6552"><span data-dcnode-id="6553" instrument_node="">world heritage</span></li></ul><span data-dcnode-id="6550" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="6545" rel="49901b469f4e432e980651aa41e33e29" type="button"><span data-dcnode-id="6549" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="6546" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="6548" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="6547" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="6544" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="6542" rel="49901b469f4e432e980651aa41e33e29"><span data-dcnode-id="6543" instrument_node="">                            Max Dvořák’s Catechism of conservation [Katechismus der Denkmalpflege], first published during the 1914–18 war, is considered a milestone in the history of heritage conservation. The book emerged out of specific political circumstances, as part of the political agenda of Archduke Franz Ferdinand d’Este, heir to the Austrian imperial throne. Although the archduke’s involvement may complicate the book’s legacy, the mission of the Catechism is humanistic and open to general audiences regardless of nationality, citizenship or class affiliation. The paper examines Catechism of conservation from the standpoint of its relevance for contemporary heritage conservation. Do Dvořák’s main concerns differ from the concerns of the current generation of conservationists? Which of Dvořák’s points seem outdated, and which are still relevant? How does Dvořák’s approach to heritage value meet current challenges?                          </span></p><span data-dcnode-id="6541" instrument_node=""> </span></div><span data-dcnode-id="6539" instrument_node=""> </span></div><span data-dcnode-id="6537" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="6511"><span data-dcnode-id="6536" instrument_node=""> </span><ul data-dcnode-id="6513"><span data-dcnode-id="6535" instrument_node=""> </span><li data-dcnode-id="6527"><span data-dcnode-id="6534" instrument_node=""> </span><a data-dcnode-id="6528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/horacek.pdf" rel="noopener" target="_blank"><span data-dcnode-id="6533" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="6529" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="6532"></path><polyline data-dcnode-id="6531" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="6530" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="6526" instrument_node=""> </span><li data-dcnode-id="6521"><span data-dcnode-id="6525" instrument_node=""> </span><a data-dcnode-id="6523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="6524" instrument_node="">About the journal</span></a><span data-dcnode-id="6522" instrument_node=""> </span></li><span data-dcnode-id="6520" instrument_node=""> </span><li data ode-id="6491"><li data-dcnode-id="6492"><span data-dcnode-id="6493" instrument_node="">Csilla Markója</span></li></ul><span data-dcnode-id="6490" instrument_node=""> </span></header><span data-dcnode-id="6488" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="6463"><span data-dcnode-id="6487" instrument_node=""> </span><h4 data-dcnode-id="6485"><span data-dcnode-id="6486" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="6474"><li data-dcnode-id="6483"><span data-dcnode-id="6484" instrument_node="">vienna school,&nbsp;</span></li><li data-dcnode-id="6481"><span data-dcnode-id="6482" instrument_node="">daily life,&nbsp;</span></li><li data-dcnode-id="6479"><span data-dcnode-id="6480" instrument_node="">johannes wilde,&nbsp;</span></li><li data-dcnode-id="6477"><span data-dcnode-id="6478" instrument_node="">dvořák seminar,&nbsp;</span></li><li data-dcnode-id="6475"><span data-dcnode-id="6476" instrument_node="">methods</span></li></ul><span data-dcnode-id="6473" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="6468" rel="9faa1c43d8a94751bcf084216cf4341a" type="button"><span data-dcnode-id="6472" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="6469" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="6471" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="6470" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="6467" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="6465" rel="9faa1c43d8a94751bcf084216cf4341a"><span data-dcnode-id="6466" instrument_node="">                            Discussing the relationship of Max Dvořák and Johannes Wilde on the previous study (János (Johannes) Wilde  and Max Dvorák or, can we  speak about the Budapest School of art history), I proposed – indirectly – the provocative thesis that “there is no Dvořák without Wilde”. What justifies this polarized statement is the set of documents of source value found a few years ago in Wilde’s estate in archives of Budapest and London. Johannes Wilde cherished a profound relationship with his siblings, Ferenc and Margit, who did not have families of their own but lived with their mother Munisi until her death. They are the addressees of the letters of invaluable importance which Wilde wrote from Vienna and later from various stations of his forced exile. Wilde spent longer periods in Vienna twice: first, between 1915 and 1917, he was the student of the Vienna University department of art history led by Max Dvořák, and then, after the fall of the short-lived communist interlude, the Hungarian Republic of Councils, he returned to the Viennese capital as Dvořák’s protégé, colleague and friend. The few years spent side by side deepened their professional and personal relationship so much that when fate put an end to the life of the Czech-born professor still at an early age, Wilde was at the side of his death-bed and informed posterity of the details of this sorrowful event through his letters. In the this paper I am concentrating on the period of 1915–1917, starting with the moment when young Wilde left Budapest and the team of the drawings-and-prints department in the Museum of Fine Arts who knew Dvořák personally – Simon Meller, Frigyes Antal, Edith Hoffmann – upon his director Elek Petrovics’s encouragement who sent him directly to Dvořák to study. Lengthy passages are to be cited from the letters, since these weekly reports offer a direct insight into the life and daily routine of the Vienna School, particularly of the so-called Dvořák seminar and into Dvořák’s teaching methods.                          </span></p><span data-dcnode-id="6464" instrument_node=""> </span></div><span data-dcnode-id="6462" instrument_node=""> </span></div><span data-dcnode-id="6460" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="6434"><span data-dcnode-id="6459" instrument_node=""> </span><ul data-dcnode-id="6436"><span data-dcnode-id="6458" instrument_node=""> </span><li data-dcnode-id="6450"><span data-dcnode-id="6457" instrument_node=""> </span><a data-dcnode-id="6451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/markoja.pdf" rel="noopener" target="_blank"><span data-dcnode-id="6456" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="6452" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="6455"></path><polyline data-dcnode-id="6454" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="6453" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="6449" instrument_node=""> </span><li data-dcnode-id="6444"><span data-dcnode-id="6448" instrument_node=""> </span><a data-dcnode-id="6446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="6447" instrument_node="">About the journal</span></a><span data-dcnode-id="6445" instrument_node=""> </span></li><span data-dcnode-id="6443" instrument_node=""> </span><li data-dcnode-id="6438"><span data-dcnode-id="6442" instrument_node="">                            Published by </span><em data-dcnode-id="6440"><span data-dcnode-id="6441" instrument_node="">Department of Art ent_node=""> </span></h3><span data-dcnode-id="6340" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="6337"><li data-dcnode-id="6338"><span data-dcnode-id="6339" instrument_node="">Amy C. Smith</span></li></ul><span data-dcnode-id="6336" instrument_node=""> </span></header><span data-dcnode-id="6334" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="6301"><span data-dcnode-id="6333" instrument_node=""> </span><h4 data-dcnode-id="6331"><span data-dcnode-id="6332" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="6312"><li data-dcnode-id="6329"><span data-dcnode-id="6330" instrument_node="">campania,&nbsp;</span></li><li data-dcnode-id="6327"><span data-dcnode-id="6328" instrument_node="">greek vases,&nbsp;</span></li><li data-dcnode-id="6325"><span data-dcnode-id="6326" instrument_node="">felice maria mastrilli,&nbsp;</span></li><li data-dcnode-id="6323"><span data-dcnode-id="6324" instrument_node="">meidias hydria,&nbsp;</span></li><li data-dcnode-id="6321"><span data-dcnode-id="6322" instrument_node="">naples,&nbsp;</span></li><li data-dcnode-id="6319"><span data-dcnode-id="6320" instrument_node="">neoclassicism,&nbsp;</span></li><li data-dcnode-id="6317"><span data-dcnode-id="6318" instrument_node="">nola,&nbsp;</span></li><li data-dcnode-id="6315"><span data-dcnode-id="6316" instrument_node="">joachim von sandrart,&nbsp;</span></li><li data-dcnode-id="6313"><span data-dcnode-id="6314" instrument_node="">johann joachim winckelmann</span></li></ul><span data-dcnode-id="6311" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="6306" rel="3651a7a59ac14f518d189d0fc12b8699" type="button"><span data-dcnode-id="6310" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="6307" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="6309" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="6308" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="6305" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="6303" rel="3651a7a59ac14f518d189d0fc12b8699"><span data-dcnode-id="6304" instrument_node="">                            While Johann Joachim’s Winckelmann influence on the Neoclassical taste for antiquities and its dissemination north of Italy is well known, it is rarely considered with regard to the study, acquisition, and use of ancient Greek vases. This article seeks to redress this lacuna, considering his enthusiasm for ancient Greek vases, known in his time as Campanian because of their findspots, visits to Neapolitan collections, and encouragement of others’ acquisition of these antiquities. It considers his introduction of these vases into his History of the Art of Antiquity (1764) and its revision, the value he and his predecessors put on such archaeological materials for the purposes of autopsy, his comparison of their drawings to those of Raphael, thus elevating the perceived and actual value of these otherwise humble antiquities. It also addresses Winckelmann’s precluded influence on the dissemination of the Neapolitan and Sicilian opinion, based on the evidence of inscriptions, that ‘Campanian’ and some other vases found in Italy were produced by ancient Greeks.                          </span></p><span data-dcnode-id="6302" instrument_node=""> </span></div><span data-dcnode-id="6300" instrument_node=""> </span></div><span data-dcnode-id="6298" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="6272"><span data-dcnode-id="6297" instrument_node=""> </span><ul d head,&nbsp;</span></li><li data-dcnode-id="6240"><span data-dcnode-id="6241" instrument_node="">johann joachim winckelmann,&nbsp;</span></li><li data-dcnode-id="6238"><span data-dcnode-id="6239" instrument_node="">numismatics</span></li></ul><span data-dcnode-id="6236" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="6231" rel="dedf7cecda914c248c16151b0238673f" type="button"><span data-dcnode-id="6235" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="6232" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="6234" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="6233" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="6230" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="6228" rel="dedf7cecda914c248c16151b0238673f"><span data-dcnode-id="6229" instrument_node="">                            Johann Joachim Winckelmann collected coins and cited them extensively in his History of Ancient Art and other works.  An analysis of his use of them shows that, although he had a good knowledge of them and the relevant literature, he regarded them as being of less importance than the other arts. Nevertheless, his interest inaugurated a new art historical approach to the study of ancient coinage, which was adopted or modified by later important numismatists, such as Joseph Eckhel in Vienna in the eighteenth century and Barclay Head in London in the nineteenth century. Consequently, his views were very influential on the subject, having an impact for some two hundred years, until the middle of the twentieth century. an data-dcnode-id="6143" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="6141" rel="670a7055e59443ab9f05f2aabef4a222"><span data-dcnode-id="6142" instrument_node="">                            This essay deals with two much misunderstood aspects of Winckelmann’s work, his notion of the relations between art and climate and the fierce disputes his environmental model of culture engendered in Britain. Revisiting present-day suspicions towards Winckelmann’s climate language as a reductive and determinist ‘curiosity’, this essay aims to restore its historical significance as an interactive way of exploring the interconnectedness between the development of art and its changing material contexts, and to reveal its special place in the birth of art history as a discipline.

The study of the British reception of Winckelmann’s climate theory remains a rich resource in the critical understanding and historiographical evaluation of his contribution in art history. The controversies it generated produced a mixed and fragmented picture. This essay retrieves the many social, professional, and national interests embedded in these climate-related controversies in art and suggests that such competing motivations marked indelibly understandings of Winckelmann’s art historical model as well as his standing in Britain.                          </span></p><span data-dcnode-id="6140" instrument_node=""> </span></div><span data-dcnode-id="6138" instrument_node=""> </span></div><span data-dcnode-id="6136" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="6110"><span data-dcnode-id="6135" instrument_node=""> </span><ul data-dcnode-id="6112"><span data-dcnode-id="6134" instrument_node=""> </span><li data-dcnode-id="6126"><span data-dcnode-id="6133" instrument_node=""> </span><a data-dcnode-id="6127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/sarafianos.pdf" rel="noopener" target="_blank"><span data-dcnode-id="6132" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="6128" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="6131"></path><polyline data-dcnode-id="6130" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="6129" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="6125" instrument_node=""> </span><li data-dcnode-id="6120"><span data-dcnode-id="6124" instrument_node=""> </span><a data-dcnode-id="6122" href="https://chatnoir-webcontent <span data-dcnode-id="6061" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="6058" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="6060" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="6059" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="6056" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="6054" rel="647116bf3d844ad69fe168f3cd351193"><span data-dcnode-id="6055" instrument_node="">                            The paper explores the overlooked attention Johann Joachim Winckelmann gave to clothing and clothed statues. It engages with Winckelmann’s self-fashioning, the costume-based analysis through which he traced the cultural trajectory of antique peoples, and his descriptive and rhetorical passages on dress. It identifies the invisible and immaterial qualities which Winckelmann attributed to ‘tasteful’ clothing, and proposes that the elegance of Greek clothing was a signifier for the manifestation and transposition of perfect bodily form to the Greek ideal. This re-thinking seeks to address the focus on the Greek male nude figure as his emblem of ideal beauty and proposes that we should integrate draped statues as well as nude ones into Winckelmann’s historic and aesthetic framework.                          </span></p><span data-dcnode-id="6053" instrument_node=""> </span></div><span data-dcnode-id="6051" instrument_node=""> </span></div><span data-dcnode-id="6049" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="6023"><span data-dcnode-id="6048" instrument_node=""> </span><ul data-dcnode-id="6025"><span data-dcnode-id="6047" instrument_node=""> </span><li -dcnode-id="5788"><span data-dcnode-id="5868" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="5817"><span data-dcnode-id="5867" instrument_node=""> </span><header data-dcnode-id="5851"><span data-dcnode-id="5866" instrument_node=""> </span><p class="label" data-dcnode-id="5863"><a data-dcnode-id="5864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="5865" instrument_node="">                            Journal of Art Historiography (Jun 2021)                          </span></a></p><span data-dcnode-id="5862" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="5857"><span data-dcnode-id="5861" instrument_node=""> </span><a class="" data-dcnode-id="5859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/47b8ebb93b6c4688b5ca792c93b94080" target="_blank"><span data-dcnode-id="5860" instrument_node="">                              ‘The fringes in and of art historiography in post-1945 Europe’. Review of: Noemi de Haro García, Patricia Mayayo and Jesús Carrillo (eds.), Making Art History in Europe after 1945                            </span></a><span data-dcnode-id="5858" instrument_node=""> </span></h3><span data-dcnode-id="5856" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="5853"><li data-dcnode-id="5854"><span data-dcnode-id="5855" instrument_node="">Arnold Witte</span></li></ul><span data-dcnode-id="5852" instrument_node=""> </span></header><span data-dcnode-id="5850" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="5819"><span data-dcnode-id="5849" instrument_node=""> </span><h4 data-dcnode-id="5847"><span data-dcnode-id="5848" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="5830"><li data-dcnode-id="5845"><span data-dcnode-id="5846" instrument_node="">cold war historiography,&nbsp;</span></li><li data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">eastern europe,&nbsp;</span></li><li data-dcnode-id="5841"><span data-dcnode-id="5842" instrument_node="">southern europe,&nbsp;</span></li><li data-dcnode-id="5839"><span data-dcnode-id="5840" instrument_node="">communism,&nbsp;</span></li><li data-dcnode-id="5837"><span data-dcnode-id="5838" instrument_node="">military regimes,&nbsp;</span></li><li data-dcnode-id="5835"><span data-dcnode-id="5836" instrument_node="">geopolitics,&nbsp;</span></li><li data-dcnode-id="5833"><span data-dcnode-id="5834" instrument_node="">cultural policy,&nbsp;</span></li><li data-dcnode-id="5831"><span data-dcnode-id="5832" instrument_node="">art criticism</span></li></ul><span data-dcnode-id="5829" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="5824" rel="47b8ebb93b6c4688b5ca792c93b94080" type="button"><span data-dcnode-id="5828" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="5825" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="5827" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="5826" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="5823" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="5821" rel="47b8ebb93b6c4688b5ca792c93b94080"><span data-dcnode-id="5822" instrument_node="">                            The volume under review here investigates how politics in post-1945 Europe affected the academic, critical and political discourses on art. It focuses specifically (but not exclusively) on the fringes of the continent: the eastern and southern regions, thus highlighting the role played by the discipline of art history in former Communist countries and erstwhile military (fascist) regimes. The volume also sets out to expand upon the sources of art historiography by tying into the current strand of research on the exhibitionary complex, and by discussing cultural policies and art criticism. The result is an intellectual journey through time and geopolitical space, and across disciplines. Although the volume sets a new agenda in decentralising the approach of art historiography by shifting the focus from a regional to a geopolitical perspective, it has failed to convincingly fill this gap, largely because of the inclusion of criticism and cultural policy, inevitably leading to a fragmented and, at times, superficial view of how politics influences the discourse on the arts.                          </span></p><span data-dcnode-id="5820" instrument_node=""> </span></div><span data-dcnode-id="5818" instrument_node=""> </span></div><span data-dcnode-id="5816" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="5790"><span data-dcnode-id="5815" instrument_node=""> </span><ul data-dcnode-id="5792"><span data-dcnode-id="5814" instrument_node=""> </span><li data-dcnode-id="5806"><span data-dcnode-id="5813" instrument_node=""> </span><a data-dcnode-id="5807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/02/witte-rev.pdf" rel="noopener" target="_blank"><span data-dcnode-id="5812" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="5808" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="5811"></path><polyline data-dcnode-i ode-id="5778" instrument_node=""> </span><a class="" data-dcnode-id="5776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/19ffe2e2e91b46599b7d858e4de1f239" target="_blank"><span data-dcnode-id="5777" instrument_node="">                              ‘Ludwig Hevesi and art in fin-de-siècle Vienna’. Review of: Ilona Sármány-Parsons, Bécs művészeti élete Ferenc József korában, ahogy Hevesi Lajos látta [The artistic life in Vienna in Franz Joseph’s time, as seen by Lajos Hevesi                            </span></a><span data-dcnode-id="5775" instrument_node=""> </span></h3><span data-dcnode-id="5773" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="5770"><li data-dcnode-id="5771"><span data-dcnode-id="5772" instrument_node="">József Sisa</span></li></ul><span data-dcnode-id="5769" instrument_node=""> </span></header><span data-dcnode-id="5767" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="5734"><span data-dcnode-id="5766" instrument_node=""> </span><h4 data-dcnode-id="5764"><span data-dcnode-id="5765" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="5745"><li data-dcnode-id="5762"><span data-dcnode-id="5763" instrument_node="">modern art,&nbsp;</span></li><li data-dcnode-id="5760"><span data-dcnode-id="5761" instrument_node="">nineteenth century,&nbsp;</span></li><li data-dcnode-id="5758"><span data-dcnode-id="5759" instrument_node="">art and society,&nbsp;</span></li><li data-dcnode-id="5756"><span data-dcnode-id="5757" instrument_node="">art criticism,&nbsp;</span></li><li data-dcnode-id="5754"><span data-dcnode-id="5755" instrument_node="">art exhibitions,&nbsp;</span></li><li data-dcnode-id="5752"><span data-dcnode-id="5753" instrument_node="">art patronage in vienna,&nbsp;</span></li><li data-dcnode-id="5750"><span data-dcnode-id="5751" instrument_node="">secession in vienna,&nbsp;</span></li><li data-dcnode-id="5748"><span data-dcnode-id="5749" instrument_node="">ludwig hevesi,&nbsp;</span></li><li data-dcnode-id="5746"><span data-dcnode-id="5747" instrument_node="">art critic</span></li></ul><span data-dcnode-id="5744" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="5739" rel="19ffe2e2e91b46599b7d858e4de1f239" type="button"><span data-dcnode-id="5743" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="5740" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="5742" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="5741" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="5738" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="5736" rel="19ffe2e2e91b46599b7d858e4de1f239"><span data-dcnode-id="5737" instrument_node="">                            Following a biographical outline of Ludwig Hevesi’s career, the volume chronicles the exhibition life of Vienna from the 1870s to 1910 with the help of Hevesi’s art criticism feuilletons examined in strict chronological order. His critiques are contextualized in contemporary art journalism, confronting his views with those of his colleagues (e.g. Albert Ilg, Franz Adalbert Seligmann, Hermann Bahr, Franz Servaes or occasionally Karl Kraus). Apart from the reconstruction of the permanently changing individual styles of the painters, new light is cast on the social network of the artistic sphere, sponsorship and the art market from the 1890s onwards. The decisive role of Hevesi in assisting the breakthrough of the Viennese Secession and in shaping the Austrian Canon in painting is demonstrated with an abundance of quotations from contemporary sources.                          </span></p><span data-dcnode-id="5735" instrument_node=""> </span></div><span data-dcnode-id="5733" instrument_node=""> </span></div><span data-dcnode-id="5731" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="5705"><span data-dcnode-id="5730" instrument_node=""> </span><ul data-dcnode-id="5707"><span data-dcnode-id="5729" instrument_node=""> </span><li data-dcnode-id="5721"><span data-dcnode-id="5728" instrument_node=""> </span><a data-dcnode-id="5722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/03/sisa-rev.pdf" rel="noopener" target="_blank"><span data-dcnode-id="5727" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="5723" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="5726"></path><polyline data-dcnode-id="5725" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="5724" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="5720" instrument_node=""> </span><li data-dcnode-id="5715"><span data-dcnode-id="5719" instrument_node=""> </span><a data-dcnode-id="5717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="5718" instrument_node="">About the journal</span></a><span data-dcnode-id="5716" instrument_node=""> </span></li><span data-dcnode-id="5714" instrument_node=""> </span><li data-dcnode-id="5709"><span data-dcnode-id="5713" instrument_node="">                            Published by </span><em data-dcnode-id="5711"><span data-dcnode-id="5712" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="5710" instrument_node=""> </span></li><span data-dcnode-id="5708" instrument_node=""> </span></ul><span data-dcnode-id="5706" instrument_node=""> </span></aside><span data-dcnode-id="5704" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="5623"><span data-dcnode-id="5701" instrument_node=""> </span><article class="row" data-dcnode-id="5624"><span data-dcnode-id="5700" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="5653"><span data-dcnode-id="5699" instrument_node=""> </span><header data-dcnode-id="5683"><span data-dcnode-id="5698" instrument_node=""> </span><p class="label" data-dcnode-id="5695"><a data-dcnode-id="5696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="5697" instrument_node="">                            Journal of Art Historiography (Jun 2021)                          </span></a></p><span data-dcnode-id="5694" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="5689"><span data-dcnode-id="5693" instrument_node=""> </span><a class="" data-dcnode-id="5691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/0b0937251bc849ba939e4450f089bfbd" target="_blank"><span data-dcnode-id="5692" instrument_node="">                              ‘Unearthing the legacies of art historiography during the Post-War decades’. Review of: A Socialist Realist History? Writing Art History in the Post-War Decades                            </span></a><span data-dcnode-id="5690" instrument_node=""> </span></h3><span data-dcnode-id="5688" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="5685"><li data-dcnode-id="5686"><span data-dcnode-id="5687" instrument_node="">Eva Pluhařová-Grigienė </span></li></ul><span data-dcnode-id="5684" instrument_node=""> </span></header><span data-dcnode-id="5682" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="5655"><span data-dcnode-id="5681" instrument_node=""> </span><h4 data-dcnode-id="5679"><span data-dcnode-id="5680" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="5666"><li data-dcnode-id="5677"><span data-dcnode-id="5678" instrument_node="">post-war,&nbsp;</span></li><li data-dcnode-id="5675"><span data-dcnode-id="5676" instrument_node="">thaw,&nbsp;</span></li><li data-dcnode-id="5673"><span data-dcnode-id="5674" instrument_node="">socialism,&nbsp;</span></li><li data-dcnode-id="5671"><span data-dcnode-id="5672" instrument_node="">marxism-leninism,&nbsp;</span></li><li data-dcnode-id="5669"><span data-dcnode-id="5670" instrument_node="">east central europe,&nbsp;</span></li><li data-dcnode-id="5667"><span data-dcnode-id="5668" instrument_node="">socialist-realism</span></li></ul><span data-dcnode-id="5665" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="5660" rel="0b0937251bc849ba939e4450f089bfbd" type="button"><span data-dcnode-id="5664" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="5661" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="5663" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="5662" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="5659" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="5657" rel="0b0937251bc849ba939e4450f089bfbd"><span data-dcnode-id="5658" instrument_node="">                            A Socialist Realist History? Writing Art History in the Post-War Decades, edited by Krista Kodres, Kristina Jõekalda, and the late Michaela Marek, is of definitive interest to art historians and scholars of intellectual history of Europe for giving insight into the diverse ways in which art and architectural historians  across socialist Central and Eastern Europe engaged with Marxism-Leninism. The wide-ranging contributions reveal that even during Stalinism the discourse on Socialist art history was never static. Slow to modernize during the ensuing Thaw, this discourse evolved in diverse ways within different academic environments. The book makes a highly valuable contribution to the study of art historiography in socialist Europe, deepening our understanding of the complexity and processuality of the discipline’s development, and underlining the need for further in-depth studies. Apart from its interest to art historians, the contributions clearly express the need for a thorough revision of how deeply contemporary art historical research has been shaped by the socialist legacy, particularly with regard to less obvious path dependencies such as methodological approaches.                          </span></p><span data-dcnode-id="5656" instrument_node=""> </span></div><span data-dcnode-id="5654" instrument_node=""> </span></div><span data-dcnode-id="5652" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="5626"><span data-dcnode-id="5651" instrument_node=""> </span><ul data-dcnode-id="5628"><span data-dcnode-id="5650" instrument_node=""> </span><li data-dcnode-id="5642"><span data-dcnode-id="5649" instrument_node=""> </span><a data-dcnode-id="5643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/01/pluharova-rev.pdf" rel="noopener" target="_blank"><span data-dcnode-id="5648" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-l oaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="5618" instrument_node="">                            Journal of Art Historiography (Jun 2021)                          </span></a></p><span data-dcnode-id="5615" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="5610"><span data-dcnode-id="5614" instrument_node=""> </span><a class="" data-dcnode-id="5612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/3b7af7bb6bde4755a9aef54f5d97d4c6" target="_blank"><span data-dcnode-id="5613" instrument_node="">                              ‘Byzantium in Brno: joining an Eastern and Western Middle Ages’. Review of: Byzantium or democracy? &nbsp;Kondakov’s legacy in emigration: the Institutum Kondakovianum and Andre Grabar, 1925-1952                            </span></a><span data-dcnode-id="5611" instrument_node=""> </span></h3><span data-dcnode-id="5609" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="5606"><li data-dcnode-id="5607"><span data-dcnode-id="5608" instrument_node="">Robert Nelson</span></li></ul><span data-dcnode-id="5605" instrument_node=""> </span></header><span data-dcnode-id="5603" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="5578"><span data-dcnode-id="5602" instrument_node=""> </span><h4 data-dcnode-id="5600"><span data-dcnode-id="5601" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="5589"><li data-dcnode-id="5598"><span data-dcnode-id="5599" instrument_node="">n. p. kondakov,&nbsp;</span></li><li data-dcnode-id="5596"><span data-dcnode-id="5597" instrument_node="">institutum kondakovianum,&nbsp;</span></li><li data-dcnode-id="5594"><span data-dcnode-id="5595" instrument_node="">seminarium kondakovianum,&nbsp;</span></li><li data-dcnode-id="5592"><span data-dcnode-id="5593" instrument_node="">andré grabar,&nbsp;</span></li><li data-dcnode-id="5590"><span data-dcnode-id="5591" instrument_node="">byzantine art</span></li></ul><span data-dcnode-id="5588" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="5583" rel="3b7af7bb6bde4755a9aef54f5d97d4c6" type="button"><span data-dcnode-id="5587" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="5584" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="5586" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="5585" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="5582" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="5580" rel="3b7af7bb6bde4755a9aef54f5d97d4c6"><span data-dcnode-id="5581" instrument_node="">                            This book writes the history of a short-lived attempt to create in Prague a home for Byzantine art historians and historians exiled from Russia after the 1917 Revolution.   Named after the distinguished Russian art historian, N. P. Kondakov, the Institutum Kondakovianum had a research library, art collection, a journal, the Seminarium Kondakovianum for Russian, Byzantine, and Migration art, as well as a monograph series that published a book by André Grabar.  He was a student of Kondakov in Russia and the future professor at the Collège de France.  Byzantium or democracy examines the history of the institute from the 1920s until its demise in the early 1950s and juxtaposes to it Grabar’s career in France during the same period, both little studied.                          </span></p><span data-dcnode-id="5579" instrument_node=""> </span></div><span data-dcnode-id="5577" instrument_node=""> </span></div><span data-dcnode-id="5575" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="5549"><span data-dcnode-id="5574" instrument_node=""> </span><ul data-dcnode-id="5551"><span data-dcnode-id="5573" instrument_node=""> </span><li data-dcnode-id="5565"><span data-dcnode-id="5572" instrument_node=""> </span><a data-dcnode-id="5566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/02/nelson-rev.pdf" rel="noopener" target="_blank"><span data-dcnode-id="5571" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="5567" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="5570"></path><polyline data-dcnode-id="5569" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="5568" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="5564" instrument_node=""> </span><li data-dcnode-id="5559"><span data-dcnode-id="5563" instrument_node=""> </span><a data-dcnode-id="5561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="5562" instrument_node="">About the journal</span></a><span data-dcnode-id="5560" instrument_node=""> </span></li><span data-dcnode-id="5558" instrument_node=""> </span><li data-dcnode-id="5553"><span data-dcnode-id="5557" instrument_node="">                            Published by </span><em data-dcnode-id="5555"><span data-dcnode-id="5556" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="5554" instrument_node=""> </span></li><span data-dcnode-id="5552" instrument_node=""> </span></ul><span data-dcnode-id="5550" instrument_node=""> </span></aside><span data-dcnode-id="5548" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="5469"><span data-dcnode-id="5545" instrument_node=""> </span><article class="row" data-dcnode-id="5470"><span data-dcnode-id="5544" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="5499"><span data-dcnode-id="5543" instrument_node=""> </span><header data-dcnode-id="5527"><span data-dcnode-id="5542" instrument_node=""> </span><p class="label" data-dcnode-id="5539"><a data-dcnode-id="5540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="5541" instrument_node="">                            Journal of Art Historiography (Jun 2021)                          </span></a></p><span data-dcnode-id="5538" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="5533"><span data-dcnode-id="5537" instrument_node=""> </span><a class="" data-dcnode-id="5535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/8dad9f64a8eb451c9ea39d1e4f215fb0" target="_blank"><span data-dcnode-id="5536" instrument_node="">                              A fresh look at Spain: urban views through foreign and domestic gazes (16th-19th&nbsp;centuries). Review of: Imago Urbis. Las ciudades españolas vistas por los viajeros (siglos XVI-XIX)                            </span></a><span data-dcnode-id="5534" instrument_node=""> </span></h3><span data-dcnode-id="5532" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="5529"><li data-dcnode-id="5530"><span data-dcnode-id="5531" instrument_node="">Matilde Mateo</span></li></ul><span data-dcnode-id="5528" instrument_node=""> </span></header><span data-dcnode-id="5526" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="5501"><span data-dcnode-id="5525" instrument_node=""> </span><h4 data-dcnode-id="5523"><span data-dcnode-id="5524" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="5512"><li data-dcnode-id="5521"><span data-dcnode-id="5522" instrument_node="">image of spain,&nbsp;</span></li><li data-dcnode-id="5519"><span data-dcnode-id="5520" instrument_node="">travellers in spain,&nbsp;</span></li><li data-dcnode-id="5517"><span data-dcnode-id="5518" instrument_node="">urban views,&nbsp;</span></li><li data-dcnode-id="5515"><span data-dcnode-id="5516" instrument_node="">illustrated books,&nbsp;</span></li><li data-dcnode-id="5513"><span data-dcnode-id="5514" instrument_node="">spanish cities</span></li></ul><span data-dcnode-id="5511" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="5506" rel="8dad9f64a8eb451c9ea39d1e4f215fb0" type="button"><span data-dcnode-id="5510" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="5507" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="5509" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="5508" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="5505" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="5503" rel="8dad9f64a8eb451c9ea39d1e4f215fb0"><span data-dcnode-id="5504" instrument_node="">                            This richly illustrated publication examines urban views of Spanish cities by Spanish and European travellers, from the 16th century to the 19th century. It was published in conjunction with an exhibition at the Museo de Bellas Artes de Asturias, Spain, in 2019 and consists of three introductory essays and a catalogue. The essays examine the specific problems of the illustrated book, a historical survey that provides an unifying narrative for the pieces in the catalogue, and a short history of urban views of Spanish cities in the early modern period. The catalogue entries are substantial, rigorous, updated and remarkably well illustrated. The ambitious time span, number of geographical areas covered, and variety of nationalities of the travellers, set Imago Urbis apart from previous studies, which are generally limited to a specific region, period, artist or nationality of the representations, thereby providing a unique, comprehensive, and cohesive study which is poised to become a fundamental source of information on the topic.                          </span></p><span data-dcnode-id="5502" instrument_node=""> </span></div><span data-dcnode-id="5500" instrument_node=""> </span></div><span data-dcnode-id="5498" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="5472"><span data-dcnode-id="5497" instrument_node=""> </span><ul data-dcnode-id="5474"><span data-dcnode-id="5496" instrument_node=""> </span><li data-dcnode-id="5488"><span data-dcnode-id="5495" instrument_node=""> </span><a data-dcnode-id="5489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/05/mateo-rev.pdf" rel="noopener" target="_blank"><span data-dcnode-id="5494" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="5490" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="5493"></path><polyline data-dcnode-id="5492" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="5491" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><spa 255" instrument_node="">historiography of art,&nbsp;</span></li><li data-dcnode-id="5252"><span data-dcnode-id="5253" instrument_node="">brazilian art and visual culture</span></li></ul><span data-dcnode-id="5250" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="5245" rel="350e5c00640f4acea2276b2b1a5a5c4b" type="button"><span data-dcnode-id="5249" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="5246" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="5248" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="5247" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="5244" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="5242" rel="350e5c00640f4acea2276b2b1a5a5c4b"><span data-dcnode-id="5243" instrument_node="">                            The volume explores the Eurocentrism that has characterised practices and discourses related to Western art phenomena from the sixteenth to the twenty-first century, examining the critical, aesthetic and ideological implications of such a pervasively Eurocentric horizon of references. Through the adoption of alternative parameters of interpretation, like the concepts of ‘third space’ and ‘a-historicity’, the book aims to promote a ‘decolonial perspective’ in the study of art, reassessing well-consolidated narratives that reflect, first and foremost, a hegemonic cultural system directly derived from Europe-centered experiences both in the production as well as in the analysis of artworks.                          </span></p><span data-dcnode-id="5241" instrument_node=""> </sp
