w22&amp;url=https%3A//doaj.org/article/566c316ba46c42eb8795eccd3d38ce74" target="_blank"><span data-dcnode-id="2393" instrument_node="">                              ”Creations of the professor’s fertile mind” – August Hagen’s artists’ novels                            </span></a><span data-dcnode-id="2391" instrument_node=""> </span></h3><span data-dcnode-id="2389" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="2386"><li data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">Christine Hübner</span></li></ul><span data-dcnode-id="2385" instrument_node=""> </span></header><span data-dcnode-id="2383" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="2348"><span data-dcnode-id="2382" instrument_node=""> </span><h4 data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="2359"><li data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">august hagen,&nbsp;</span></li><li data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">romantic art historiography,&nbsp;</span></li><li data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">carl friedrich von rumohr,&nbsp;</span></li><li data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">giorgio vasari,&nbsp;</span></li><li data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">albrecht dürer,&nbsp;</span></li><li data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">lorenzo ghiberti,&nbsp;</span></li><li data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">popular historical novels,&nbsp;</span></li><li data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">pretended authenticity,&nbsp;</span></li><li data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">appropriation,&nbsp;</span></li><li data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">königsberg</span></li></ul><span data-dcnode-id="2358" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="2353" rel="566c316ba46c42eb8795eccd3d38ce74" type="button"><span data-dcnode-id="2357" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="2354" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="2356" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="2355" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="2352" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="2350" rel="566c316ba46c42eb8795eccd3d38ce74"><span data-dcnode-id="2351" instrument_node="">                            August Hagen (1798–1889), professor for history of art and aesthetics at the Prussian university of Königsberg, is the author of a series of historical novels on the subject of artists’ lives. Pretending to be transliterations of newly discovered or translated historical sources, Hagen re-wrote and novelized the lives of artists from the fifteenth and sixteenth century, enriching them with elements of light fiction. This paper focuses on the question of how Hagen’s novels were written, read and reviewed in a period marked by the development of history of art as an academic discipline.                          </span></p><span data-dcnode-id="2349" instrument_node=""> </span></div><span data-dcnode-id="2347" instrument_node=""> </span></div><span data-dcnode-id="2345" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="2319"><span data-dcnode-id="2344" instrument_node=""> </span><ul data-dcnode-id="2321"><span data-dcnode-id="2343" instrument_node=""> </span><li data-dcnode-id="2335"><span data-dcnode-id="2342" instrument_node=""> </span><a data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/huebner1.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2341" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="2337" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="2340"></path><polyline data-dcnode-id="2339" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="2338" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="2334" instrument_node=""> </span><li data-dcnode-id="2329"><span data-dcnode-id="2333" instrument_node=""> </span><a data-dcnode-id="2331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="2332" instrument_node="">About the journal</span></a><span data-dcnode-id="2330" instrument_node=""> </span></li><span data-dcnode-id="2328" instrument_node=""> </span><li data-dcnode-id="2323"><span data-dcnode-id="2327" instrument_node="">                            Published by </span><em data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="2324" instrument_node=""> </span></li><span data-dcnode-id="2322" instrument_node=""> </span></ul><span data-dcnode-id="2320" instrument_node=""> </span></aside><span data-dcnode-id="2318" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="2227"><span data-dcnode-id="2315" instrument_node=""> </span><article class="row" data-dcnode-id="2228"><span data-dcnode-id="2314" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="2257"><span data-dcnode-id="2313" instrument_node=""> </span><header data-dcnode-id="2297"><span data-dcnode-id="2312" instrument_node=""> </span><p class="label" data-dcnode-id="2309"><a data-dcnode-id="2310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="2311" instrument_node="">                            Journal of Art Historiography (Dec 2020)                          </span></a></p><span data-dcnode-id="2308" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="2303"><span data-dcnode-id="2307" instrument_node=""> </span><a class="" data-dcnode-id="2305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/e170c33f1915433cbe6bea88f1a29d1f" target="_blank"><span data-dcnode-id="2306" instrument_node="">                              Refusing to play Vasari: Roger Fry’s Cézannian anecdotes                            </span></a><span data-dcnode-id="2304" instrument_node=""> </span></h3><span data-dcnode-id="2302" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="2299"><li data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">Benjamin Harvey</span></li></ul><span data-dcnode-id="2298" instrument_node=""> </span></header><span data-dcnode-id="2296" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="2259"><span data-dcnode-id="2295" instrument_node=""> </span><h4 data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="2270"><li data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">roger fry,&nbsp;</span></li><li data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">paul cézanne,&nbsp;</span></li><li data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">ambroise vollard,&nbsp;</span></li><li data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">walter sickert,&nbsp;</span></li><li data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">virginia woolf,&nbsp;</span></li><li data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">joachim gasquet,&nbsp;</span></li><li data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">humility,&nbsp;</span></li><li data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">frames,&nbsp;</span></li><li data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">biography,&nbsp;</span></li><li data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">monograph,&nbsp;</span></li><li data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">development</span></li></ul><span data-dcnode-id="2269" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="2264" rel="e170c33f1915433cbe6bea88f1a29d1f" type="button"><span data-dcnode-id="2268" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="2265" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="2267" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="2266" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="2263" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="2261" rel="e170c33f1915433cbe6bea88f1a29d1f"><span data-dcnode-id="2262" instrument_node="">                            This paper explores Roger Fry’s monograph Cézanne: A Study of His Development (1927) in light of the author’s strong resistance to, and strategic use of, an anecdotal approach to art history. Writing a decade before Kris and Kurz identified the anecdote as the ‘primitive cell’ of artists’ biographies, Fry already associated it with problems of originality and authenticity. In his earlier review of Ambroise Vollard’s biography of the artist, Fry complimented the author for playing ‘Vasari to Cézanne’, but Walter Sickert teased Fry for merely repeating Vollard’s stories. Fry’s review, Sickert noted, was ‘filled with personal details extremely amusing, interesting and illuminating; and, on the whole, Mr Fry re-told us in English… what Vollard said.’ Fry had no personal knowledge of Cézanne, no amusing tales of his own to offer; as Sickert’s words suggest, he needed to take a different approach, for the sake of both the market and his own credibility. Instead of anecdotes, his monograph stressed his first-hand experiences of the artist’s paintings, which, when correctly arranged and described, yielded a ‘developmental’ narrative. Fry would only readmit anecdotes—just two to be exact, both culled from Vollard—because they ‘afford[ed] so vivid a contrast’ with each other and reiterated his main theme. While the first demonstrated ‘the sublime arrogance and self-confidence of the youthful Cézanne,’ the second revealed that ‘a lifetime of solitude and neglect’ had taught him ‘the lesson of humility.’ Ultimately, Fry still needed anecdotes to tell his moralizing tale about the humbling of proud Cézanne.                          </span></p><span data-dcnode-id="2260" instrument_node=""> </span></div><span data-dcnode-id="2258" instrument_node=""> </span></div><span data-dcnode-id="2256" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="2230"><span data-dcnode-id="2255" instrument_node=""> </span><ul data-dcnode-id="2232"><span data-dcnode-id="2254" instrument_ -id="2151"><span data-dcnode-id="2225" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="2180"><span data-dcnode-id="2224" instrument_node=""> </span><header data-dcnode-id="2208"><span data-dcnode-id="2223" instrument_node=""> </span><p class="label" data-dcnode-id="2220"><a data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="2222" instrument_node="">                            Journal of Art Historiography (Dec 2020)                          </span></a></p><span data-dcnode-id="2219" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="2214"><span data-dcnode-id="2218" instrument_node=""> </span><a class="" data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/0bbeb9f5868340048df4551015bda591" target="_blank"><span data-dcnode-id="2217" instrument_node="">                              The origin (and decline) of painting: Iaia, Butades and the concept of ‘Women’s Art’ in the 19th Centur                            </span></a><span data-dcnode-id="2215" instrument_node=""> </span></h3><span data-dcnode-id="2213" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="2210"><li data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Anna Frasca-Rath</span></li></ul><span data-dcnode-id="2209" instrument_node=""> </span></header><span data-dcnode-id="2207" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="2182"><span data-dcnode-id="2206" instrument_node=""> </span><h4 data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="2193"><li data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">19th century,&nbsp;</span></li><li data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">artist anecdotes,&nbsp;</span></li><li data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">classical tradition in art,&nbsp;</span></li><li data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">women art,&nbsp;</span></li><li data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">ernst guhl</span></li></ul><span data-dcnode-id="2192" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="2187" rel="0bbeb9f5868340048df4551015bda591" type="button"><span data-dcnode-id="2191" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="2188" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="2190" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="2189" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="2186" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="2184" rel="0bbeb9f5868340048df4551015bda591"><span data-dcnode-id="2185" instrument_node="">                            The 86 paintings by Johann Georg Hiltensperger that decorate the Gallery of the History of Ancient Painting in the New Hermitage in St. Petersburg are all based on anecdotes about ancient artists. These encaustic paintings on copper panels represent the birth, blossoming and decline of ancient painting. The central part of the gallery is dedicated to history painting and its most important practitioners, such as Apelles, Zeuxis and Parrhasios. Interestingly, only the parts on the painting’s origin and decline include depictions of female artists, namely Butades, and Iaia. The positioning of these women artists is the point of departure for this article, as it mirrors concepts of ‘women’s art’ (Frauenkunst) within 19th-century art historiography. Especially the anecdote about the daughter of Butades was discussed by contemporary authors such as Ernst Guhl and Wilhelm Lübke, who used the story to underscore that it was more appropriate for the ‘female temperament’ to copy nature than to invent subject matter. The lack of inventio thus meant that women artists were better suited to the lesser genres, such as self-portraits and landscapes, than to higher art, such as history painting. Iaia perfectly illustrates these ideas, as she is depicted at the moment of beholding herself in a mirror whilst painting her self-portrait. This article addresses questions of gender within anecdotes about ancient artists and their artistic and art-historiographical reception during the 19th century, while also considering earlier depictions by artists such as Sofonisba Anguissola. How did the reception of Butades and Iaia contribute to constructing a notion of ‘women’s art’? How was the question of gender discussed within art historiography?                          </span></p><span data-dcnode-id="2183" instrument_node=""> </span></div><span data-dcnode-id="2181" instrument_node=""> </span></div><span data-dcnode-id="2179" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="2153"><span data-dcnode-id="2178" instrument_node=""> </span><ul data-dcnode-id="2155"><span data-dcnode-id="2177" instrument_node=""> </span><li data-dcnode-id="2169"><span data-dcnode-id="2176" instrument_node=""> </span><a data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/frasca-rath1.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2175" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="2171" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="2174"></path><polyline data-dcnode-id="2173" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="2172" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="2168" instrument_node=""> </span><li data-dcnode-id="2163"><span data-dcnode-id="2167" instrument_node=""> </span><a data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="2166" instrument_node="">About the journal</span></a><span data-dcnode-id="2164" instrument_node=""> </span></li><span data-dcnode-id="2162" instrument_node=""> </span><li data-dcnode-id="2157"><span data-dcnode-id="2161" instrument_node="">                            Published by </span><em data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="2158" instrument_node=""> </span></li><span data-dcnode-id="2156" instrument_node=""> </span></ul><span data-dcnode-id="2154" instrument_node=""> </span></aside><span data-dcnode-id="2152" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="2067"><span data-dcnode-id="2149" instrument_node=""> </span><article class="row" data-dcnode-id="2068"><span data-dcnode-id="2148" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="2097"><span data-dcnode-id="2147" instrument_node=""> </span><header data-dcnode-id="2131"><span data-dcnode-id="2146" instrument_node=""> </span><p class="label" data-dcnode-id="2143"><a data-dcnode-id="2144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="2145" instrument_node="">                            Journal of Art Historiography (Dec 2020)                          </span></a></p><span data-dcnode-id="2142" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="2137"><span data-dcnode-id="2141" instrument_node=""> </span><a class="" data-dcnode-id="2139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/86d7b0e9456a450189a1ca1e2b6b669c" target="_blank"><span data-dcnode-id="2140" instrument_node="">                              ”Vivid presentiments of action and character”: Allan Cunningham’s Anecdotes of British Sculptors                            </span></a><span data-dcnode-id="2138" instrument_node=""> </span></h3><span data-dcnode-id="2136" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="2133"><li data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">Matthew Greg Sullivan</span></li></ul><span data-dcnode-id="2132" instrument_node=""> </span></header><span data-dcnode-id="2130" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="2099"><span data-dcnode-id="2129" instrument_node=""> </span><h4 data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="2110"><li data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">british sculpture,&nbsp;</span></li><li data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">historiography of sculpture,&nbsp;</span></li><li data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">allan cunningham,&nbsp;</span></li><li data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">sir francis chantrey,&nbsp;</span></li><li data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">john bacon,&nbsp;</span></li><li data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">john flaxman,&nbsp;</span></li><li data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">louis-francois roubiliac,&nbsp;</span></li><li data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">anecdotes</span></li></ul><span data-dcnode-id="2109" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="2104" rel="86d7b0e9456a450189a1ca1e2b6b669c" type="button"><span data-dcnode-id="2108" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="2105" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="2107" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="2106" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="2103" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="2101" rel="86d7b0e9456a450189a1ca1e2b6b669c"><span data-dcnode-id="2102" instrument_node="">                            Lively biographies of British artists, with material to instruct and entertain were – as Horace Walpole regretted in 1762 – difficult to construct from the limited materials available to biographers of British art. By the early years of the nineteenth century the situation had changed, with many anecdotes, loosely based on traditional European topoi, becoming both a functioning unit and a battleground in the histories that were being constructed of British art. Allan Cunningham’s Lives of the Most Eminent Artists of 1828-31 was the most influential attempt to date to effectively integrate detailed anecdotes of artists into a narrative of British art that placed ‘Nation’ and ‘Nature’ at its heart. This article examines Cunningham’s varied use of anecdote in the Lives of British Sculptors (vol 3). These stories function within the context of his grand narrative of Nation and Nature, and his lionisation of Chantrey. Sometimes his strategies involved the undermining of known anecdotes told of Roubiliac, Bacon and Damer. Elsewhere he creates new, and usually ironic, versions of recognisable topoi of childhood genius, transcendent inspiration, imitation of the ancients, and the taming of Nature. These anecdotes, and anti-anecdotes, can be contrasted with the un-ironic use of established classic anecdotal forms in the accounts that he gave of Francis Chantrey.                          </span></p><span data-dcnode-id="2100" instrument_node=""> </span></div><span data-dcnode-id="2098" instrument_node=""> </span></div><span data-dcnode-id="2096" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="2070"><span data-dcnode-id="2095" instrument_node=""> </span><ul data-dcnode-id="2072"><span data-dcnode-id="2094" instrument_node=""> </span><li data-dcnode-id="2086"><span data-dcnode-id="2093" instrument_node=""> </span><a data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/sullivan1.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2092" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="2088" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="2091"></path><polyline data-dcnode-id="2090" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="2089" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="2085" instrument_node=""> </span><li data-dcnode-id="2080"><span data-dcnode-id="2084" instrum 057" instrument_node="">                              Monk or lover? A nineteenth-century artist’s dilemma                            </span></a><span data-dcnode-id="2055" instrument_node=""> </span></h3><span data-dcnode-id="2053" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="2050"><li data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Lois Oliver</span></li></ul><span data-dcnode-id="2049" instrument_node=""> </span></header><span data-dcnode-id="2047" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="2022"><span data-dcnode-id="2046" instrument_node=""> </span><h4 data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="2033"><li data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">sacred and the secular,&nbsp;</span></li><li data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">nineteenth-century painting,&nbsp;</span></li><li data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">catholicism,&nbsp;</span></li><li data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">love and spirituality,&nbsp;</span></li><li data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">antigna</span></li></ul><span data-dcnode-id="2032" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="2027" rel="df576b10b65a41c5b7f7bd46e8661724" type="button"><span data-dcnode-id="2031" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="2028" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="2030" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="2029" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="2026" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="2024" rel="df576b10b65a41c5b7f7bd46e8661724"><span data-dcnode-id="2025" instrument_node="">                            Alexandre Antigna’s Scène d’atelier (1848 Paris Salon) depicts the artist with palette in hand, turning away from the sacred work in progress on his easel to enjoy a break with his two models: his ‘monk’ is now playing cards with his ‘angel’, who relaxes in an alluring state of undress. The picture sets up an opposition between the sacred and the secular, the ideal and the real, invenzione and imitatio, wittily addressing the shift towards genre painting in nineteenth-century France, while simultaneously highlighting the creative challenge posed by the competing ideologies of the post-1815 Catholic revival and growing religious scepticism. It also raises a question that concerned many male artists: what was the relationship between art, love, and spirituality? As this paper argues, the question was complicated by conflicting concepts of creativity inherited from the classical and Christian traditions that had become thoroughly entangled in nineteenth-century paintings of the Old Masters.                          </span></p><span data-dcnode-id="2023" instrument_node=""> </span></div><span data-dcnode-id="2021" instrument_node=""> </span></div><span data-dcnode-id="2019" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="1993"><span data-dcnode-id="2018" instrument_node=""> </span><ul data-dcnode-id="1995"><span data-dcnode-id="2017" instrument_node=""> </span><li data-dcnode-id="2009"><span data-dcnode-id="2016" instrument_node=""> </span><a data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com 8" instrument_node="">histories of art,&nbsp;</span></li><li data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">british art,&nbsp;</span></li><li data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">literature</span></li></ul><span data-dcnode-id="1951" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="1946" rel="da624166deea4829ba5df1a3e924497a" type="button"><span data-dcnode-id="1950" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="1947" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="1949" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="1948" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="1945" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="1943" rel="da624166deea4829ba5df1a3e924497a"><span data-dcnode-id="1944" instrument_node="">                            James Northcote was as reputed for his liberality of anecdote as for his parsimony in hospitality. His conversations and recollections, bristling with detail, of his time in Reynolds’ orbit and after, have entertained and misled in equal measure, but in his encounters late in his life with William Hazlitt, now remembered through their restaging in Hazlitt’s Conversations of James Northcote RA in 1830, he found both a match and an irritant, a sensitive ear and an aggressive sparring partner. This paper explores the encounters between these two very different men, the anecdotes and lore they produced and the rifts that eventually came to divide the aging artist and the brilliant but troubled critic. My contention will be that while Northcote owed Hazlitt much, and enjoyed his company greatly, he found himself the victim of his own penchant for anecdote and fable, while Hazlitt brilliantly understood the political and cultural undercurrents that swirled beneath Northcote’s conversations.                          </span></p><span data-dcnode-id="1942" instrument_node=""> </span></div><span data-dcnode-id="1940" instrument_node=""> </span></div><span data-dcnode-id="1938" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="1912"><span data-dcnode-id="1937" instrument_node=""> </span><ul data-dcnode-id="1914"><span data-dcnode-id="1936" instrument_node=""> </span><li data-dcnode-id="1928"><span data-dcnode-id="1935" instrument_node=""> </span><a data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/ledbury.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1934" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="1930" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="1933"></path><polyline data-dcnode-id="1932" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="1931" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="1927" instrument_node=""> </span><li data-dcnode-id="1922"><span data-dcnode-id="1926" instrument_node=""> </span><a data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="1925" instrument_node="">About the journal</span></a><span data-dcnode-id="1923" instrument_node=""> </span></li><span data-dcnode-id="19 data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Hans C. Hönes</span></li></ul><span data-dcnode-id="1891" instrument_node=""> </span></header><span data-dcnode-id="1889" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="1858"><span data-dcnode-id="1888" instrument_node=""> </span><h4 data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="1869"><li data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">anecdotes,&nbsp;</span></li><li data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">enlightenment,&nbsp;</span></li><li data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">raphael,&nbsp;</span></li><li data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">albrecht dürer,&nbsp;</span></li><li data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">nazarenes,&nbsp;</span></li><li data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">vulgarization,&nbsp;</span></li><li data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">art literature,&nbsp;</span></li><li data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">dialogues of the dead</span></li></ul><span data-dcnode-id="1868" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="1863" rel="d3a3357bd3784d2bacf935c5c254db85" type="button"><span data-dcnode-id="1867" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="1864" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="1866" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="1865" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="1862" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="1860" rel="d3a3357bd3784d2bacf935c5c254db85"><span data-dcnode-id="1861" instrument_node="">                            Artist anecdotes are arguably among some of the more informal and entertaining bodies of artistic literature. As such, they frequently become fertile ground for experiments with different literary forms and genres of art writing. This article focuses on one historical case, a short pamphlet by the Nuremberg engraver Georg Wolfgang Knorr, with the title ‘Historic Artist-Entertainment’ (1738). Knorr’s booklet draws on an oft-repeated anecdote – told, among others, by Vasari and Sandrart -, namely the legendary meeting between Albrecht Dürer and Raffael. Knorr reconfigured this anecdote and opted for a novel way of imagining the discussions between the artists: he wrote a ‘dialogue of the dead’, staging this artistic encounter as a posthumous one, with the artists meeting each other in heaven. Knorr’s short work is intriguing for mainly one reason: it is an attempt to ‘vulgarise’ art historical knowledge by moulding it in a literary shape that was incredibly popular in mid-eighteenth-century Germany. Knorr’s text thus can serve as a case study for how authors tried to disseminate art historical knowledge amongst the new, significantly enlarged reading public of Enlightenment Europe, and which literary strategies they employed for doing so. Yet Knorr’s attempt to present art historical knowledge in a new genre – namely the dialogues of the dead – was by and large unsuccessful. Very few other dialogues of the dead with artists as protagonists were written. Moreover, Knorr himself quickly abandoned his original project of publishing a whole volume of such dialogues. The article therefore aims to discuss the reasons behind this failure, and to analyse what this might tell us about the popular appeal of artistic literature, and artist anecdotes in particular.                          </span></p><span data-dcnode-id="1859" instrument_node=""> </span></div><span data-dcnode-id="1857" instrument_node=""> </span></div><span data-dcnode-id="1855" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="1829"><span data-dcnode-id="1854" instrument_node=""> </span><ul data-dcnode-id="1831"><span data-dcnode-id="1853" instrument_node=""> </span><li data-dcnode-id="1845"><span data-dcnode-id="1852" instrument_node=""> </span><a data-dcnode-id="1846" href="httphttps://arthistoriography.files.wordpress.com/2020/11/hones1.pdfs://arthistoriography.files.wordpress.com/2020/11/hones1.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1851" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="1847" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="1850"></path><polyline data-dcnode-id="1849" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="1848" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="1844" instrument_node=""> </span><li data-dcnode-id="1839"><span data-dcnode-id="1843" instrument_node=""> </span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="1842" instrument_node="">About the journal</span></a><span data-dcnode-id="1840" instrument_node=""> </span></li><span data-dcnode-id="1838" instrument_node=""> </span><li data-dcnode-id="1833"><span data-dcnode-id="1837" instrument_node="">                            Published by </span><em data-dcnod  It discusses the development of anecdotes as a literary genre in the eighteenth century, and evaluates recent historiography on artist anecdotes. Focusing on the idiosyncrasies of the genre since the eighteenth century, this essay argues that artist anecdotes should be understood less as a ‘timeless’ carrier of art theoretical topoi, but as a literary genre that needs to be analysed in its situatedness in the publishing market and social historical background of its times.                          </span></p><span data-dcnode-id="1782" instrument_node=""> </span></div><span data-dcnode-id="1780" instrument_node=""> </span></div><span data-dcnode-id="1778" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="1752"><span data-dcnode-id="1777" instrument_node=""> </span><ul data-dcnode-id="1754"><span data-dcnode-id="1776" instrument_node=""> </span><li data-dcnode-id="1768"><span data-dcnode-id="1775" instrument_node=""> </span><a data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/hones-intro1.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1774" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="1770" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="1773"></path><polyline data-dcnode-id="1772" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="1771" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="1767" instrument_node=""> </span><li data-dcnode-id="1762"><span data-dcnode-id="1766" instrument_node=""> </span><a data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4                  </span></a><span data-dcnode-id="1737" instrument_node=""> </span></h3><span data-dcnode-id="1735" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="1732"><li data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Caroline Anjali Ritchie</span></li></ul><span data-dcnode-id="1731" instrument_node=""> </span></header><span data-dcnode-id="1729" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="1700"><span data-dcnode-id="1728" instrument_node=""> </span><h4 data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="1711"><li data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">art theory,&nbsp;</span></li><li data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">composition,&nbsp;</span></li><li data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">cinquecento,&nbsp;</span></li><li data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">mannerism,&nbsp;</span></li><li data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">terminology,&nbsp;</span></li><li data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">vocabulary,&nbsp;</span></li><li data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">aesthetics</span></li></ul><span data-dcnode-id="1710" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="1705" rel="6f97627f1bec4462ae29e6354d1e3022" type="button"><span data-dcnode-id="1709" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="1706" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="1708" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="1707" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="1704" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="1702" rel="6f97627f1bec4462ae29e6354d1e3022"><span data-dcnode-id="1703" instrument_node="">                            This article examines the troubled history of the word confusione as it was employed by a number of well-known art-critical and -theoretical writers of the Italian Renaissance. Beginning with De pictura, the foundational treatise of Leon Battista Alberti, this study traces the applications of the word into the late cinquecento, drawing out its various aesthetic, intellectual, psychological, and theological-devotional associations. In offering this focused study, the article proposes a wider methodological turn towards the vocabulary denoting ‘bad’ pictorial qualities as used both in the Renaissance and in art-theoretical writing at large. Such analyses, this article seeks to elucidate, can yield a wealth of information about language, taste, and ideology as disclosed by the vocabulary of art theory and criticism.                          </span></p><span data-dcnode-id="1701" instrument_node=""> </span></div><span data-dcnode-id="1699" instrument_node=""> </span></div><span data-dcnode-id="1697" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="1671"><span data-dcnode-id="1696" instrument_node=""> </span><ul data-dcnode-id="1673"><span data-dcnode-id="1695" instrument_node=""> </span><li data-dcnode-id="1687"><span data-dcnode-id="1694" instrument_node=""> </span><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/ritchie.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1693" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="1689" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="1692"></path><polyline data-dcnode-id="1691" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="1690" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="1686" instrument_node=""> </span><li data-dcnode-id="1681"><span data-dcnode-id="1685" instrument_node=""> </span><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="1684" instrument_node="">About the journal</span></a><span data-dcnode-id="1682" instrument_node=""> </span></li><span data-dcnode-id="1680" instrument_node=""> </span><li data-dcnode-id="1675"><span data-dcnode-id="1679" instrument_node="">                            Published by </span><em data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="1676" instrument_node=""> </span></li><span data-dcnode-id="1674" instrument_node=""> </span></ul><span data-dcnode-id="1672" instrument_node=""> </span></aside><span data-dcnode-id="1670" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="1589"><span data-dcnode-id="1667" instrument_node=""> </span><article class="row" data-dcnode-id="1590"><span data-dcnode-id="1666" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="1619"><span data-dcnode-id="1665" instrument_node=""> </span><header data-dcnode-id="1649"><span data-dcnode-id="1664" instrument_node=""> </span><p class="label" data-dcnode-id="1661"><a data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="1663" instrument_node="">                            Journal of Art Historiography (Dec 2020)                          </span></a></p><span data-dcnode-id="1660" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="1655"><span data-dcnode-id="1659" instrument_node=""> </span><a class="" data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/d639c197263b498aaaeafc652698ece2" target="_blank"><span data-dcnode-id="1658" instrument_node="">                              On “sensibility”: art, art criticism and Surrealism in New York in the 1960s                            </span></a><span data-dcnode-id="1656" instrument_node=""> </span></h3><span data-dcnode-id="1654" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="1651"><li data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Gavin Parkinson</span></li></ul><span data-dcnode-id="1650" instrument_node=""> </span></header><span data-dcnode-id="1648" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="1621"><span data-dcnode-id="1647" instrument_node=""> </span><h4 data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="1632"><li data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">sensibility,&nbsp;</span></li><li data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">minimalism,&nbsp;</span></li><li data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">surrealism,&nbsp;</span></li><li data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">formalism,&nbsp;</span></li><li data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">sontag,&nbsp;</span></li><li data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">pop</span></li></ul><span data-dcnode-id="1631" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="1626" rel="d639c197263b498aaaeafc652698ece2" type="button"><span data-dcnode-id="1630" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="1627" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="1629" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="1628" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="1625" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="1623" rel="d639c197263b498aaaeafc652698ece2"><span data-dcnode-id="1624" instrument_node="">                            This article details and analyses the uses of the term ‘sensibility’ in New York art circles in the 1960s with the aim of showing the inevitable inconsistency that surrounded that term given the rebirth of Surrealism in that decade. It does so initially in relation to how ‘sensibility’ was used to define a ‘literalist’ mode emerging generally in culture in the United States and France then goes on to examine its applications in art criticism of the time. Susan Sontag’s name is inexorably associated with the term due largely to her widely read essay ‘One Culture and the New Sensibility’ (1965), but Sontag’s writings of the sixties generally serve as the hinge of the article because they demonstrate the tension that is argued for here between a new literalism identified with Pop and Minimalist art and the resurgence of interest in Surrealism as a sensibility and historical paradigm. Ultimately, I show that the inconvenient presence of contemporary Surrealism in exhibitions, protests and political statements in Europe and the US had to be sublimated through discussion of its sensibility in contemporary art and the insistence on its glorious, distant past as an ‘art movement.’                          </span></p><span data-dcnode-id="1622" instrument_node=""> </span></div><span data-dcnode-id="1620" instrument_node=""> </span></div><span data-dcnode-id="1618" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="1592"><span data-dcnode-id="1617" instrument_node=""> </span><ul data-dcnode-id="1594"><span data-dcnode-id="1616" instrument_node=""> </span><li data-dcnode-id="1608"><span data-dcnode-id="1615" instrument_node=""> </span><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/parkinson.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1614" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="1610" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="1613"></path><polyline data-dcnode-id="1612" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="1611" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="1607" instrument_node=""> </span><li data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node=""> </span><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="1605" instrument_node="">About the journal</span></a><span data-dcnode-id="1603" instrument_node=""> </span></li><span data-dcnode-id="1601" instrument_node=""> </span><li data-dcnode-id="1596"><span data-dcnode-id="1600" instrument_node="">                            Published by </span><em data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="1597" instrument_node=""> </span></li><span data-dcnode-id="1595" instrument_node=""> </span></ul><span data-dcnode-id="1593" instrument_node=""> </span></aside><span data-dcnode-id="1591" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="1512"><span data-dcnode-id="1588" instrument_node=""> </span><article class="row" data-dcnode-id="1513"><span data-dcnode-id="1587" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="1542"><span data-dcnode-id="1586" instrument_node=""> </span><header data-dcnode-id="1570"><span data-dcnode-id="1585" instrument_node=""> </span><p class="label" data-dcnode-id="1582"><a data-dcnode-id="1583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="1584" instrument_node="">                            Journal of Art Historiography (Dec 2020)                          </span></a></p><span data-dcnode-id="1581" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="1576"><span data-dcnode-id="1580" instrument_node=""> </span><a class="" data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/32f59e12599642d0883e34ce0cebf084" target="_blank"><span data-dcnode-id="1579" instrument_node="">                              How to write plausibly about Architecture and architectural History, according to A. Rosengarten (1809-1893)                            </span></a><span data-dcnode-id="1577" instrument_node=""> </span></h3><span data-dcnode-id="1575" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="1572"><li data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Stefan Muthesius</span></li></ul><span data-dcnode-id="1571" instrument_node=""> </span></header><span data-dcnode-id="1569" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="1544"><span data-dcnode-id="1568" instrument_node=""> </span><h4 data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="1555"><li data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">nineteenth century,&nbsp;</span></li><li data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">modes of architectural writing,&nbsp;</span></li><li data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">historical and contemporary,&nbsp;</span></li><li data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">uses of the term ‘style’,&nbsp;</span></li><li data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">jewish style for synagogues</span></li></ul><span data-dcnode-id="1554" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="1549" rel="32f59e12599642d0883e34ce0cebf084" type="button"><span data-dcnode-id="1553" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="1550" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="1552" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="1551" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="1548" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="1546" rel="32f59e12599642d0883e34ce0cebf084"><span data-dcnode-id="1547" instrument_node="">                            As an architect A. Rosengarten worked first in his home-town, Kassel, and then in Hamburg. The emphasis here is on Rosengarten’s diverse writings, especially his handbook of architectural history of 1857, entitled Die architektonischen Stylarten (English version 1876), as well as long articles and short books, most of them dealing with contemporary architecture. Rosengarten’s innovative manner of writing offered lively critiques of buildings, old as well as new; it was duly dubbed ‘popular’. Secondly, Rosengarten was most insistent on the term ‘style’. This, too, linked up with contemporary architectural problems, namely with the search for a style for the nineteenth century. For new synagogues in particular Rosengarten opted for an un-ideological, politically – geographically unspecific Rundbogenstil which he had used for his synagogue in Kassel. Should Jewish buildings stand out or integrate? For the writer, analysing and categorising his audiences was a constant concern. At the base of it all, one senses, was Rosengarten’s quest for his own integration into Germany’s Modern bourgeois society.                          </span></p><span data-dcnode-id="1545" instrument_node=""> </span></div><span data-dcnode-id="1543" instrument_node=""> </span></div><span data-dcnode-id="1541" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="1515"><span data-dcnode-id="1540" instrument_node=""> </span><ul data-dcnode-id="1517"><span data-dcnode-id="1539" instrument_node=""> </span><li data-dcnode-id="1531"><span data-dcnode-id="1538" instrument_node=""> </span><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/muthesius.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1537" instrument_node=""> Read online </span><svg aria-hidden="true" class="f =cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="1507" instrument_node="">                            Journal of Art Historiography (Dec 2020)                          </span></a></p><span data-dcnode-id="1504" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="1499"><span data-dcnode-id="1503" instrument_node=""> </span><a class="" data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/88c702656379426590807013b035d591" target="_blank"><span data-dcnode-id="1502" instrument_node="">                              Lost and found in translation: the post-war adaptation strategies of Sigfried Giedion and Alexander Dorneost and found in translation: the post-war adaptation strategies of Sigfried Giedion and Alexander Dorne                            </span></a><span data-dcnode-id="1500" instrument_node=""> </span></h3><span data-dcnode-id="1498" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="1495"><li data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Janno Martens</span></li></ul><span data-dcnode-id="1494" instrument_node=""> </span></header><span data-dcnode-id="1492" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="1455"><span data-dcnode-id="1491" instrument_node=""> </span><h4 data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="1466"><li data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">emigration,&nbsp;</span></li><li data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">postwar architectural history,&nbsp;</span></li><li data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">modern architecture,&nbsp;</span></li><li data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">space,&nbsp;</span></li><li data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">transplanted intellectuals,&nbsp;</span></li><li data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">adaptation,&nbsp;</span></li><li data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">translation,&nbsp;</span></li><li data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">alexander dorner,&nbsp;</span></li><li data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">sigfried giedion,&nbsp;</span></li><li data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">jacqueline tyrwhitt,&nbsp;</span></li><li data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">john dewey</span></li></ul><span data-dcnode-id="1465" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="1460" rel="88c702656379426590807013b035d591" type="button"><span data-dcnode-id="1464" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="1461" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="1463" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="1462" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="1459" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="1457" rel="88c702656379426590807013b035d591"><span data-dcnode-id="1458" instrument_node="">                            Sigfried Giedion’s unparalleled influence as ‘ghost writer’ of the Modern Movement frustrated several colleagues who strove to achieve similar international recognition. Chief among them was Alexander Dorner, who privately bemoaned Giedion’s unaccredited use of his ideas. The latter’s success is often attributed to his role as co-founder and secretary of CIAM, which gave him a professional edge over theoreticians such as Dorner who struggled to popularise their own take on space, history and modern art. However, the approach to linguistic and cultural adaptation taken by these German-speaking intellectuals is often overlooked as a similarly pivotal aspect of the postwar historiographical trajectory of modern art and architecture. Whereas Giedion allowed for his English translations to appeal to a different audience from the outset, Dorner instead opted to integrate additional ‘American’ elements into his already complicated theories. Furthermore, Giedion had a markedly different approach to the translation and copy-editing of his work compared to Dorner, who refused to fully adapt to the conventions of the Anglo-American language and culture.                          </span></p><span data-dcnode-id="1456" instrument_node=""> </span></div><span data-dcnode-id="1454" instrument_node=""> </span></div><span data-dcnode-id="1452" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="1426"><span data-dcnode-id="1451" instrument_node=""> </span><ul data-dcnode-id="1428"><span data-dcnode-id="1450" instrument_node=""> </span><li data-dcnode-id="1442"><span data-dcnode-id="1449" instrument_node=""> </span><a data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/martens.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1448" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="1444" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-i search-results__main" data-dcnode-id="1295"><span data-dcnode-id="1339" instrument_node=""> </span><header data-dcnode-id="1323"><span data-dcnode-id="1338" instrument_node=""> </span><p class="label" data-dcnode-id="1335"><a data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="1337" instrument_node="">                            Journal of Art Historiography (Dec 2020)                          </span></a></p><span data-dcnode-id="1334" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="1329"><span data-dcnode-id="1333" instrument_node=""> </span><a class="" data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/1ba83c2ed09b48cf90a4d6be566844d9" target="_blank"><span data-dcnode-id="1332" instrument_node="">                              Rosalind Krauss: between modernism and post-medium                            </span></a><span data-dcnode-id="1330" instrument_node=""> </span></h3><span data-dcnode-id="1328" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="1325"><li data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Rex Butler </span></li></ul><span data-dcnode-id="1324" instrument_node=""> </span></header><span data-dcnode-id="1322" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="1297"><span data-dcnode-id="1321" instrument_node=""> </span><h4 data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="1308"><li data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">post-medium,&nbsp;</span></li><li data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">modernism,&nbsp;</span></li><li data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">rosalind krauss,&nbsp;</span></li><li data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">diarmuid costello,&nbsp;</span></li><li data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">stanley cavell</span></li></ul><span data-dcnode-id="1307" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="1302" rel="1ba83c2ed09b48cf90a4d6be566844d9" type="button"><span data-dcnode-id="1306" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="1303" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="1305" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="1304" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="1301" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="1299" rel="1ba83c2ed09b48cf90a4d6be566844d9"><span data-dcnode-id="1300" instrument_node="">                            ‘Rosalind Krauss: Between Modernism and Post-Medium’ is a response to an essay, ‘Automat, Automatic, Automatism: Rosalind Krauss and Stanley Cavell on Photography and the Photographically Dependent Arts’, by Irish aesthetic philosopher Diarmuid Costello criticising the prominent American art critic and historian Rosalind Krauss for her notion of “post-medium” art. Costello objects to the fact that in Krauss’ theorisation a particular post-medium can in principle be practised by only one artist and thus does not allow the comparative judgement and sense of artistic or historical development that the notion of medium implies. This essay by contrast contends both that Krauss’ notion of post-medium does allow comparison and that in the very notion of medium on which Costello relies there is a certain moment of non-comparison, of a particular author or artist making something absolutely novel and unprecedented. Indeed, it suggests that these two qualities of the medium cannot be separated and necessarily imply each other. The author does this with reference to the work of the American “ordinary language” philosopher Stanley Cavell, on whom Krauss draws for her theorisation of the post-medium. Also included is an interview with Krauss herself that raises a number of these matters.                          </span></p><span data-dcnode-id="1298" instrument_node=""> </span></div><span data-dcnode-id="1296" instrument_node=""> </span></div><span data-dcnode-id="1294" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="1268"><span data-dcnode-id="1293" instrument_node=""> </span><ul data-dcnode-id="1270"><span data-dcnode-id="1292" instrument_node=""> </span><li data-dcnode-id="1284"><span data-dcnode-id="1291" instrument_node=""> </span><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/butler.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1290" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="1286" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="1289"></path><polyline data-dcnode-id="1288" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="1287" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="1283" instrument_node=""> </span><li data-dcnode-id="1278"><span data-dcnode-id="1282" instrument_node=""> </span><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&a ="">works on paper</span></li></ul><span data-dcnode-id="1216" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="1211" rel="a9693c563b2648c28caade09d41d511a" type="button"><span data-dcnode-id="1215" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="1212" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="1214" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="1213" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="1210" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="1208" rel="a9693c563b2648c28caade09d41d511a"><span data-dcnode-id="1209" instrument_node="">                            This article sheds fresh light on women who have been important benefactors to the National Gallery from its foundation in 1824 to the present (2020), largely in terms of donating paintings but also through financial aid to support the acquisition of paintings and frames, building work, staff posts, publications, exhibitions, and various public events. Through a mixture of case-studies and basic data analysis, the following set of core questions is addressed: (1) Who were the Gallery’s women donors? (2) Which paintings did they give and in what other ways have they been generous to the Gallery? (3) What patterns within their donating can be discerned? (4) What were their motivations for their gift giving? (5) Why have their donations been easy to lose sight of? (6) What is the Gallery doing now, ahead of its 200th anniversary in 2024, to draw attention to the significant contributions of its women donors past and present? It is hoped that the information compiled here will act as a useful reference point for others in the field when probing similar types of provenance records and will encourage readers to share information to help us fill persisting gaps in our data.                          </span></p><span data-dcnode-id="1207" instrument_node=""> </span></div><span data-dcnode-id="1205" instrument_node=""> </span></div><span data-dcnode-id="1203" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="1177"><span data-dcnode-id="1202" instrument_node=""> </span><ul data-dcnode-id="1179"><span data-dcnode-id="1201" instrument_node=""> </span><li data-dcnode-id="1193"><span data-dcnode-id="1200" instrument_node=""> </span><a data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/11/avery-quash-and-riding1.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1199" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="1195" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="1198"></path><polyline data-dcnode-id="1197" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="1196" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="1192" instrument_node=""> </span><li data-dcnode-id="1187"><span data-dcnode-id="1191" instrument_node=""> </span><a data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="1190" instrument_node="">About the journal</span></a><span data-dcnode-id="1188" instrument_node=""> </span></li><span data-dcnode-id="1186" instrument_node=""> ria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="1129" rel="9cff80013da1463d96b6e25c6abdb4bb"><span data-dcnode-id="1130" instrument_node="">                            Organised within the ERC project Art Historiographies in Central and Eastern Europe. An Inquiry from the Perspective of Entangled Histories and hosted by New Europe College – Institute for Advanced Study in Bucharest, the conference  Questions of Periodisation in the Art Historiographies of Central and Eastern Europe  took place in Bucharest from 30 November – 1 December 2019. It assessed the topic of periodisation in central European art historiography with particular reference to early scholars in the discipline and placed specific focus on the way in which art historians from the region mediated between  western  models of periodisation and regional specificities. The keynote speakers were Matthew Rampley (Masaryk University, Brno), and Wojciech Bałus (Jagiellonian University, Krakow).                          </span></p><span data-dcnode-id="1128" instrument_node=""> </span></div><span data-dcnode-id="1126" instrument_node=""> </span></div><span data-dcnode-id="1124" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="1098"><span data-dcnode-id="1123" instrument_node=""> </span><ul data-dcnode-id="1100"><span data-dcnode-id="1122" instrument_node=""> </span><li data-dcnode-id="1114"><span data-dcnode-id="1121" instrument_node=""> </span><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/03/secklehner-report.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1120" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="1116" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-widt ata-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">taste,&nbsp;</span></li><li data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">art market,&nbsp;</span></li><li data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">dealership</span></li></ul><span data-dcnode-id="1054" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="1049" rel="d191b4f3b2684141823776df32f814fe" type="button"><span data-dcnode-id="1053" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="1050" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="1052" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="1051" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="1048" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="1046" rel="d191b4f3b2684141823776df32f814fe"><span data-dcnode-id="1047" instrument_node="">                            A prominent art dealer operating between Paris and New York during the interwar years, René Gimpel (1881-1945) kept a diary which was first published in 1963 and then republished in an extended version in 2011. Using the diary as a tool, albeit acknowledging its sometimes problematic nature as literary object, Diana J. Kostyrko seeks to frame Gimpel’s life and business activity in a vast transdisciplinary account. This valuable book, the second in Harvey Miller s series on Collectors and Dealers, fills some important historiographic gaps in the history of collecting, the history of the art market and more broadly sheds light on the rise of modernity.
