tent" role="main"><article class="post-152 post type-post status-publish format-standard hentry category-history-skills" data-dcnode-id="292" id="post-152"><header class="entry-header" data-dcnode-id="604"><h1 class="entry-title" data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">What is historiography?</span></h1></header><div class="entry-content" data-dcnode-id="293"><figure aria-describedby="caption-attachment-1606" class="wp-caption aligncenter" data-dcnode-id="597" id="attachment_1606" style="width: 300px"><a data-dcnode-id="600" data-featherlight="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alphahistory.com/frontpages/wp-content/uploads/2019/11/jfkschlesinger.jpg"><noscript data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">&lt;img src="https://alphahistory.com/frontpages/wp-content/uploads/2019/11/jfkschlesinger-300x200.jpg" alt="historiography" width="300" height="200" class="size-medium wp-image-1606" srcset="https://alphahistory.com/frontpages/wp-content/uploads/2019/11/jfkschlesinger-300x200.jpg 300w, https://alphahistory.com/frontpages/wp-content/uploads/2019/11/jfkschlesinger.jpg 650w" sizes="(max-width: 300px) 100vw, 300px"&gt;</span></noscript><img alt="historiography" class="size-medium wp-image-1606 lazyloaded" data-dcnode-id="601" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://alphahistory.com/frontpages/wp-content/uploads/2019/11/jfkschlesinger-300x200.jpg" data-srcset="https://alphahistory.com/frontpages/wp-content/uploads/2019/11/jfkschlesinger-300x200.jpg 300w, https://alphahistory.com/frontpages/wp-content/uploads/2019/11/jfkschlesinger.jpg 650w" height="200" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alphahistory.com/frontpages/wp-content/uploads/2019/11/jfkschlesinger-300x200.jpg&amp;raw" srcset="https://alphahistory.com/frontpages/wp-content/uploads/2019/11/jfkschlesinger-300x200.jpg 300w, https://alphahistory.com/frontpages/wp-content/uploads/2019/11/jfkschlesinger.jpg 650w" width="300"></a><figcaption class="wp-caption-text" data-dcnode-id="598" id="caption-attachment-1606"><span data-dcnode-id="599" instrument_node="">Arthur Schlesinger Jnr (centre), who served as an advisor and historian to US president John F. Kennedy</span></figcaption></figure><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="596" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Historiography is the study of how history is written and how our historical understanding changes over time. Historiography considers the approaches used by historians and seeks to understand how and why their theories and interpretations differ.</span></p><div class="lwptoc lwptoc-autoWidth lwptoc-baseItems lwptoc-light lwptoc-notInherit" data-dcnode-id="516" data-lwptoc-initialized="1" data-smooth-scroll="1" data-smooth-scroll-offset="24"><div class="lwptoc_i" data-dcnode-id="517"><div class="lwptoc_header" data-dcnode-id="590"><span data-dcnode-id="593" instrument_node=""> </span><b class="lwptoc_title" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Contents</span></b></div><div class="lwptoc_items lwptoc_items-visible" data-dcnode-id="518"><div class="lwptoc_itemWrap" data-dcnode-id="519"><div class="lwptoc_item" data-dcnode-id="580"><span data-dcnode-id="589" instrument_node=""> </span><a data-dcnode-id="581" href="#History_is_evolving"><span data-dcnode-id="588" instrument_node=""> </span><span class="lwptoc_item_number" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">1</span></span><span data-dcnode-id="585" instrument_node=""> </span><span class="lwptoc_item_label" data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">History is evolving</span></span><span data-dcnode-id="582" instrument_node=""> </span></a></div><div class="lwptoc_item" data-dcnode-id="570"><span data-dcnode-id="579" instrument_node=""> </span><a data-dcnode-id="571" href="#Facts_versus_interpretations"><span data-dcnode-id="578" instrument_node=""> </span><span class="lwptoc_item_number" data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">2</span></span><span data-dcnode-id="575" instrument_node=""> </span><span class="lwptoc_item_label" data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Facts versus interpretations</span></span><span data-dcnode-id="572" instrument_node=""> </span></a></div><div class="lwptoc_item" data-dcnode-id="560"><span data-dcnode-id="569" instrument_node=""> </span><a data-dcnode-id="561" href="#Key_questions"><span data-dcnode-id="568" instrument_node=""> </span><span class="lwptoc_item_number" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">3</span></span><span data-dcnode-id="565" instrument_node=""> </span><span class="lwptoc_item_label" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Key questions</span></span><span data-dcnode-id="562" instrument_node=""> </span></a></div><div class="lwptoc_item" data-dcnode-id="550"><span data-dcnode-id="559" instrument_node=""> </span><a data-dcnode-id="551" href="#A_sports_analogy"><span data-dcnode-id="558" instrument_node=""> </span><span class="lwptoc_item_number" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">4</span></span><span data-dcnode-id="555" instrument_node=""> </span><span class="lwptoc_item_label" data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">A sports analogy</span></span><span data-dcnode-id="552" instrument_node=""> </span></a></div><div class="lwptoc_item" data-dcnode-id="540"><span data-dcnode-id="549" instrument_node=""> </span><a data-dcnode-id="541" href="#New_histories"><span data-dcnode-id="548" instrument_node=""> </span><span class="lwptoc_item_number" data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">5</span></span><span data-dcnode-id="545" instrument_node=""> </span><span class="lwptoc_item_label" data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">‘New histories’</span></span><span data-dcnode-id="542" instrument_node=""> </span></a></div><div class="lwptoc_item" data-dcnode-id="530"><span data-dcnode-id="539" instrument_node=""> </span><a data-dcnode-id="531" href="#The_Lincoln_book_tower"><span data-dcnode-id="538" instrument_node=""> </span><span class="lwptoc_item_number" data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">6</span></span><span data-dcnode-id="535" instrument_node=""> </span><span class="lwptoc_item_label" data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">The Lincoln book tower</span></span><span data-dcnode-id="532" instrument_node=""> </span></a></div><div class="lwptoc_item" data-dcnode-id="520"><span data-dcnode-id="529" instrument_node=""> </span><a data-dcnode-id="521" href="#Handling_historiography"><span data-dcnode-id="528" instrument_node=""> </span><span class="lwptoc_item_number" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">7</span></span><span data-dcnode-id="525" instrument_node=""> </span><span class="lwptoc_item_label" data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Handling historiography</span></span><span data-dcnode-id="522" instrument_node=""> </span></a></div></div></div></div></div><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="515" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><h3 data-dcnode-id="512"><span data-dcnode-id="513" id="History_is_evolving"><span data-dcnode-id="514" instrument_node="">History is evolving</span></span></h3><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">While the past itself never changes, history – in other words, our understanding and interpretations of the past – is always evolving.</span></p><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">New historians explore and interpret the past through their own methods, priorities and values. They develop new theories and conclusions that may change the way we understand the past. Historiography acknowledges and discusses&nbsp;this process of change.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="507" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><p data-dcnode-id="502"><span data-dcnode-id="506" instrument_node="">Historiography is a&nbsp;difficult and complex study. It is an important component of most college or university-level history courses, where students are expected to know about the past </span><em data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">and</span></em><span data-dcnode-id="503" instrument_node=""> how it has been interpreted over time.</span></p><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Many senior secondary and high school courses include some basic historiography, usually through the study of different historians and competing historical interpretations.</span></p><h3 data-dcnode-id="497"><span data-dcnode-id="498" id="Facts_versus_interpretations"><span data-dcnode-id="499" instrument_node="">Facts versus interpretations</span></span></h3><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="496" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">To understand historiography, one must first accept that history is never set in stone. Our understanding of the past is and should never be immune to criticism, challenge or revision.</span></p><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">One must also understand the critical difference between historical facts (things shown conclusively by evidence and accepted as true) and history (the human study and interpretation of these things).&nbsp;</span></p><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">The past certainly contains millions of concrete truths or facts. Abraham Lincoln was shot and killed by John Wilkes Booth in 1865. The Japanese bombed Pearl Harbour in December 1941. Germany was gripped by rampant hyperinflation in 1923. Approximately&nbsp;58,000 American servicemen were killed in the Vietnam War.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="489" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">On the evidence available, these facts are beyond doubt. Taken on their own, however, these facts can be ‘dry’, isolated or devoid of meaning.</span></p><h3 data-dcnode-id="484"><span data-dcnode-id="485" id="Key_questions"><span data-dcnode-id="486" instrument_node="">Key questions</span></span></h3><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">The role of the historian is to make sense of these facts through research and analysis. To do this, they examine and interpret evidence, form conclusions, develop theories and articulate their findings in writing.&nbsp;</span></p><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Historians must answer many questions, including:</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="479" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><ul data-dcnode-id="447"><li data-dcnode-id="474"><span data-dcnode-id="478" instrument_node="">How and why particular actions, events or ideas came to be (</span><em data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">causes</span></em><span data-dcnode-id="475" instrument_node="">).</span></li><li data-dcnode-id="466"><span data-dcnode-id="473" instrument_node="">The outcomes of particular actions, events or ideas (</span><em data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">effects </span></em><span data-dcnode-id="470" instrument_node="">or</span><em data-dcnode-id="468"><span data-dcnode-id="469" instrument_node=""> consequences</span></em><span data-dcnode-id="467" instrument_node="">).</span></li><li data-dcnode-id="461"><span data-dcnode-id="465" instrument_node="">The contributions made by different people, groups and ideas (</span><em data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">actions</span></em><span data-dcnode-id="462" instrument_node="">).</span></li><li data-dcnode-id="456"><span data-dcnode-id="460" instrument_node="">The relative importance or impact of different people, groups or ideas (</span><em data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">significance</span></em><span data-dcnode-id="457" instrument_node="">).</span></li><li data-dcnode-id="448"><span data-dcnode-id="455" instrument_node="">Things that altered and things that stayed the same over a period of time (</span><em data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">change</span></em><span data-dcnode-id="452" instrument_node=""> and </span><em data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">continuity</span></em><span data-dcnode-id="449" instrument_node="">).</span></li></ul><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="446" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Unlike the physical sciences, history often churns out different answers to the same question. Historians frequently study the same sets of facts but&nbsp;end up reaching different explanations or conclusions.&nbsp;</span></p><h3 data-dcnode-id="441"><span data-dcnode-id="442" id="A_sports_analogy"><span data-dcnode-id="443" instrument_node="">A sports analogy</span></span></h3><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Think of a significant historical event as being like a major sporting fixture, such as an important football match watched by thousands of people. Football matches have factual outcomes: scoring charts, a final score, team and player statistics, player injuries and so forth. These are the ‘historical facts’ of the game.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="438" id="AdThrive_Content_8_desktop" style="min-height: 250px;"></div><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Explaining these outcomes, however, can be a very subjective process. Witnesses to a football game might attribute its outcomes to different factors – team selections, the performance of individual players, fitness or injuries, umpiring decisions, weather, ground conditions, ‘home ground advantage’, coaching tactics and so forth. There may be some consensus about these causes but not total agreement.</span></p><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">In some respects, historians are like sports journalists: they explain outcomes after the fact, relying on evidence but also their own judgement and interpretations. These interpretations can vary markedly, to the point where the conclusions of one historian may directly contradict the conclusions of another other.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="433" id="AdThrive_Content_9_desktop" style="min-height: 250px;"></div><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">The word “historiography” can also describe the body of history written about a particular person, period or event. The ‘historiography of the French Revolution’, for example, describes every significant history book written about the revolution.</span></p><h3 data-dcnode-id="428"><span data-dcnode-id="429" id="New_histories"><span data-dcnode-id="430" instrument_node="">‘New histories’</span></span></h3><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Some of these historiographies can be enormous. Millions of history books, articles and reference texts have been written about the topics that appear on our website.</span></p><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">This does not mean, however, that these histories have been ‘exhausted’ or that no new history is being written. This is far from the case.</span></p><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Public interest in historical periods like the American Civil War, Nazi Germany and both World Wars remains high. This interest drives new research and commercial demand for new books.</span></p><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Sometimes these new history books contain no significant new ideas: they simply rehash existing knowledge and present it in a different form (as Max Beerbohm once said: “history doesn’t repeat itself, historians repeat one another”). Some books though do offer new evidence, interpretations or arguments and challenge our existing understanding.</span></p><h3 data-dcnode-id="417"><span data-dcnode-id="418" id="The_Lincoln_book_tower"><span data-dcnode-id="419" instrument_node="">The Lincoln book tower</span></span></h3><p data-dcnode-id="412"><a data-dcnode-id="413" data-featherlight="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alphahistory.com/frontpages/wp-content/uploads/2014/04/lincolnbooktower.jpg"><noscript data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">&lt;img src="https://alphahistory.com/frontpages/wp-content/uploads/2014/04/lincolnbooktower-216x300.jpg" alt="historiography" width="216" height="300" class="aligncenter size-medium wp-image-155" srcset="https://alphahistory.com/frontpages/wp-content/uploads/2014/04/lincolnbooktower-216x300.jpg 216w, https://alphahistory.com/frontpages/wp-content/uploads/2014/04/lincolnbooktower.jpg 492w" sizes="(max-width: 216px) 100vw, 216px"&gt;</span></noscript><img alt="historiography" class="lazyload aligncenter size-medium wp-image-155" data-dcnode-id="414" data-sizes="(max-width: 216px) 100vw, 216px" data-src="https://alphahistory.com/frontpages/wp-content/uploads/2014/04/lincolnbooktower-216x300.jpg" data-srcset="https://alphahistory.com/frontpages/wp-content/uploads/2014/04/lincolnbooktower-216x300.jpg 216w, https://alphahistory.com/frontpages/wp-content/uploads/2014/04/lincolnbooktower.jpg 492w" height="300" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20216%20300%22%3E%3C/svg%3E" width="216"></a></p><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">The image above shows a tower of books in Washington DC, just across from Ford’s Theatre. It is constructed from hundreds of different books on one topic: US president Abraham Lincoln.</span></p><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Among these texts are studies of Lincoln’s childhood, family and personal relationships; his legal career and entry into politics, his presidency and leadership during the US Civil War; his attitudes about slavery and African-Americans.</span></p><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Each book contains the author’s own interpretations of Lincoln. Some&nbsp;have advanced some new evidence, ideas or theories while others have not. This tower demonstrates that history is a living, growing subject, filled with different ideas, voices and perspectives.</span></p><h3 data-dcnode-id="403"><span data-dcnode-id="404" id="Handling_historiography"><span data-dcnode-id="405" instrument_node="">Handling historiography</span></span></h3><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Those in a senior high school or undergraduate history course will find historiography challenging. Learning about the factual detail of the past is difficult enough but learning about different interpretations of the past is even more daunting.</span></p><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Developing an understanding of historiography is a long and difficult task, so the best way to start is with manageable&nbsp;steps.</span></p><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">First, understand that history is an ongoing dialogue, not an unchanging concrete monument to the past.&nbsp;Understand that each historian provides a different view of the past and that no historian is above being questioned or challenged.</span></p><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">As you read historians, think critically about the conclusions they reach and the arguments they present. Ask yourself how other historians might interpret the same set of facts – and ask yourself what conclusions or arguments you might reach.</span></p><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">When researching or studying, compare and contrast the writings of two or more historians on the same topic or issue. When writing about a historical topic, acknowledge that different historians hold different views about it.</span></p><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Most importantly, ease yourself into historiography rather than diving in headfirst. Trying to take in too much information and too many different perspectives will only confuse you and muddy your thinking.</span></p><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">As your skills improve and your understanding of historiography grows, so too will your ability and confidence.</span></p><p data-dcnode-id="342" style="padding:2px 6px 4px 6px; font-size: 14px; color: #555555; background-color: #eeeeee; border: #dddddd 2px solid"><span data-dcnode-id="388" instrument_node=""> </span><strong data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Ci
