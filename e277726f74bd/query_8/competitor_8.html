Mouse, by </span><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Category%3AArt_by_Jen_%40Sprigglebear" title="Category:Art by Jen @Sprigglebear"><span data-dcnode-id="2217" instrument_node="">Jen @Sprigglebear</span></a><span data-dcnode-id="2215" instrument_node="">.</span><sup class="reference" data-dcnode-id="2212" id="cite_ref-11"><a data-dcnode-id="2213" href="#cite_note-11"><span data-dcnode-id="2214" instrument_node="">[art 11]</span></a></sup></p><span data-dcnode-id="2210" instrument_node=""> </span></figcaption><span data-dcnode-id="2208" instrument_node=""> </span></figure><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2205" instrument_node="">'Twas the night before </span><a data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Winter%2527s_Crest" title="Winter's Crest"><span data-dcnode-id="2204" instrument_node="">Winter's Crest</span></a><span data-dcnode-id="2202" instrument_node="">, and all through the </span><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Widogast%2527s_Nascent_Nein-Sided_Tower" title="Widogast's Nascent Nein-Sided Tower"><span data-dcnode-id="2201" instrument_node="">tower</span></a><span data-dcnode-id="2199" instrument_node="">
The </span><a data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Mighty_Nein" title="Mighty Nein"><span data-dcnode-id="2198" instrument_node="">Mighty Nein</span></a><span data-dcnode-id="2196" instrument_node=""> were still stirring, never mind the late hour.
</span><a class="mw-redirect" data-dcnode-id="2194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Yasha" title="Yasha"><span data-dcnode-id="2195" instrument_node="">Yasha</span></a><span data-dcnode-id="2193" instrument_node=""> paced her room nervously, cracking her fists,
Hoping </span><a class="mw-redirect" data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Beau" title="Beau"><span data-dcnode-id="2192" instrument_node="">Beau</span></a><span data-dcnode-id="2190" instrument_node=""> would come knocking, to give her a kiss.
</span><a class="mw-redirect" data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Caleb" title="Caleb"><span data-dcnode-id="2189" instrument_node="">Caleb</span></a><span data-dcnode-id="2187" instrument_node=""> read sadly, absently petting </span><a data-dcnode-id="2185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Frumpkin" title="Frumpkin"><span data-dcnode-id="2186" instrument_node="">his cat</span></a><span data-dcnode-id="2184" instrument_node="">,
While </span><a class="mw-redirect" data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Veth" title="Veth"><span data-dcnode-id="2183" instrument_node="">Veth</span></a><span data-dcnode-id="2181" instrument_node=""> hid in a corner, wishing for </span><a data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Luc_Brenatto" title="Luc Brenatto"><span data-dcnode-id="2180" instrument_node="">her son</span></a><span data-dcnode-id="2178" instrument_node=""> to look at.
</span><a class="mw-redirect" data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Jester" title="Jester"><span data-dcnode-id="2177" instrument_node="">Jester</span></a><span data-dcnode-id="2175" instrument_node=""> (that's me!) </span><i data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Polymorphed</span></i><span data-dcnode-id="2172" instrument_node=""> and went roaming,
While </span><a data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Fjord" title="Fjord"><span data-dcnode-id="2171" instrument_node="">Fjord</span></a><span data-dcnode-id="2169" instrument_node=""> dreamt of the sea, waves crashing and foaming.
</span><a class="mw-redirect" data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Caduceus" title="Caduceus"><span data-dcnode-id="2168" instrument_node="">Caduceus</span></a><span data-dcnode-id="2166" instrument_node=""> sipped calmly his dead people tea,
His thoughts drifting to family and </span><a data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Blooming_Grove" title="Blooming Grove"><span data-dcnode-id="2165" instrument_node="">their cemetery</span></a><span data-dcnode-id="2163" instrument_node="">,
When, from the base of the tower there arose a clamor so great
All of the Nein came out of their rooms to investigate.
"Down!" they thought, and drifted below
To find out what was the noise. They just had to know!
When suddenly before them was a vision so bright:
A banquet and presents piled high! What a sight!
They looked around curiously, wondering who could have done this.
Beau said, "Don't eat anything! It's probably poisonous."
So Fjord flipped the table. Gifts went flying everywhere,
So the room was a mess of torn wrapping and tableware.
"Ho, ho, ho! C'mon!" said a man who appeared before them.
"I tried to give you a party! This is just mayhem."
With a sparkle in his eye, he said, "Dammit, 'tis the season!
"Hasn't anyone ever been nice to you for no reason?
"Oh Yasha! Oh Beau! Oh Caleb, oh Veth,
"Oh Jester, oh Fjord, Caduceus, what the heck?"
Then he patted his belly and raised up his fists.
"Merry Winter's Crest, Mighty Nein. </span><a data-dcnode-id="2161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/How_do_you_want_to_do_this%253F" title="How do you want to do this?"><span data-dcnode-id="2162" instrument_node="">How do you want to do this?</span></a><span data-dcnode-id="2160" instrument_node="">"
</span></p><span data-dcnode-id="2158" instrument_node="">
</span><h3 data-dcnode-id="2153"><span data-dcnode-id="2157" id="Mica's_Story"></span><span class="mw-headline" data-dcnode-id="2154" id="Mica.27s_Story"><b data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Mica's Story</span></b></span></h3><span data-dcnode-id="2152" instrument_node="">
</span><p data-dcnode-id="2137"><b data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Mica Burton Murders Cast of Critical Role</span></b><span data-dcnode-id="2149" instrument_node=""> (</span><a data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="2148" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="2146" instrument_node=""> 2021-01-19)</span><br data-dcnode-id="2145"><span data-dcnode-id="2144" instrument_node="">
So this is a story I was saving to tell Mr. </span><a class="mw-redirect" data-dcnode-id="2142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Caleb" title="Caleb"><span data-dcnode-id="2143" instrument_node="">Caleb</span></a><span data-dcnode-id="2141" instrument_node=""> the next time I saw him, because I know he loves books and stuff. But I think you all might like it too. All the elves in </span><a data-dcnode-id="2139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Uthodurn" title="Uthodurn"><span data-dcnode-id="2140" instrument_node="">Uthodurn</span></a><span data-dcnode-id="2138" instrument_node=""> know this one, so okay, here we go.
</span></p><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">There was once a beautiful elven princess named Elenathriel that lived in Arvandor in Faerûn, and she, on a rare outing away from her kingdom, fell for a human sailor named William Tanner. The seafaring man was struck by her beauty the moment he saw her, and offered her a beautiful conch shell in exchange for just a moment of her time. After spending all afternoon with her new-found love, she returned to her father, King Mallendor, excited to share her happiness with him.
</span></p><p data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">"I met someone, Father!" she exclaimed. "[Many, many elvish sentences.]" [Al hond ebrath, uol tath shantar en tath lalala ol hond ebrath.] 
</span></p><p data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">The king raised an eyebrow at her in disgust as she expressed such a deep connection with this man she just met, in their native tongue, no less. "You think I would allow such a courtship?" he questioned angrily.
</span></p><p data-dcnode-id="2126"><span data-dcnode-id="2130" instrument_node="">Now, you see, it wasn't because the man was a human and she an </span><a data-dcnode-id="2128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Elf" title="Elf"><span data-dcnode-id="2129" instrument_node="">elf</span></a><span data-dcnode-id="2127" instrument_node="">. No, no, no. The king wouldn't dare allow his daughter, an Etriel, to be betrothed to a lowly Faerûnos. She was worthy of nobility, and nobility alone. So, heartbroken, she ran from the castle, mounted her horse, and rode for the beach again.
</span></p><p data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">William was not expecting to see his love so soon and rushed to her in concern. When she told him what happened, he immediately rode Elenathriel back to the kingdom, not wanting to be the cause of the king's contempt.
</span></p><p data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Malandor, at first, thanked William for being so responsible as to bring back his wayward daughter, only to have the Crownsguard immediately seize and execute William on the spot, crimson spray showering all over the throne room.
</span></p><p data-dcnode-id="2117"><span data-dcnode-id="2121" instrument_node="">"Do not dare defy me again, </span><i data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">a'sum</span></i><span data-dcnode-id="2118" instrument_node="">. You will learn your place." The king turned from his sobbing daughter as he left the servants to mop up the horrid remains.
</span></p><p data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">So now, the endings to this story differ. Some say Elenathriel threw herself into the ocean to always be with William's wandering soul. And some say she forgot her dear sailor entirely and went on to marry an elven prince, doing what her father bid. But my favorite ending is the one where she ends up ruling the kingdom after her father fell mysteriously to some poisoned tea when he least expected it.
</span></p><span data-dcnode-id="2114" instrument_node="">
</span><h3 data-dcnode-id="2109"><span data-dcnode-id="2113" id="Liam's_Second_Story"></span><span class="mw-headline" data-dcnode-id="2110" id="Liam.27s_Second_Story"><b data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Liam's Second Story</span></b></span></h3><span data-dcnode-id="2108" instrument_node="">
</span><p data-dcnode-id="2101"><b data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Questions &amp; Quackery</span></b><span data-dcnode-id="2105" instrument_node=""> (</span><a data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="2104" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="2102" instrument_node=""> 2021-02-16)
</span></p><span data-dcnode-id="2100" instrument_node="">
</span><figure class="thumb tright" data-dcnode-id="2080" style="width: 250px"><span data-dcnode-id="2099" instrument_node=""> </span><a class="image" data-dcnode-id="2097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/2/2f/Buddy_with_the_ducks_-_Claire_Turner.jpg/revision/latest%3Fcb%3D20210217183259"><img alt="" class="thumbimage lazyload" data-dcnode-id="2098" data-image-key="Buddy_with_the_ducks_-_Claire_Turner.jpg" data-image-name="Buddy with the ducks - Claire Turner.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/2/2f/Buddy_with_the_ducks_-_Claire_Turner.jpg/revision/latest/scale-to-width-down/250?cb=20210217183259" decoding="async" height="193" src="data:image/gif;base64,R0lGODlhAQABAIABAAAAAP///yH5BAEAAAEALAAAAAABAAEAQAICTAEAOw%3D%3D" width="250"></a><span data-dcnode-id="2096" instrument_node=""> </span><noscript data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">&lt;a href="https://static.wikia.nocookie.net/criticalrole/images/2/2f/Buddy_with_the_ducks_-_Claire_Turner.jpg/revision/latest?cb=20210217183259" class="image"&gt;&lt;img alt="" src="https://static.wikia.nocookie.net/criticalrole/images/2/2f/Buddy_with_the_ducks_-_Claire_Turner.jpg/revision/latest/scale-to-width-down/250?cb=20210217183259" decoding="async" width="250" height="193" class="thumbimage" data-image-name="Buddy with the ducks - Claire Turner.jpg" data-image-key="Buddy_with_the_ducks_-_Claire_Turner.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/2/2f/Buddy_with_the_ducks_-_Claire_Turner.jpg/revision/latest/scale-to-width-down/250?cb=20210217183259" /&gt;&lt;/a&gt;</span></noscript><span data-dcnode-id="2093" instrument_node=""> </span><figcaption class="thumbcaption" data-dcnode-id="2082"><span data-dcnode-id="2092" instrument_node=""> </span><p class="caption" data-dcnode-id="2084"><span data-dcnode-id="2091" instrument_node="">Fan art of Buddy with the ducks, by </span><a data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Category%3AArt_by_Claire_Turner" title="Category:Art by Claire Turner"><span data-dcnode-id="2090" instrument_node="">Claire Turner</span></a><span data-dcnode-id="2088" instrument_node="">.</span><sup class="reference" data-dcnode-id="2085" id="cite_ref-12"><a data-dcnode-id="2086" href="#cite_note-12"><span data-dcnode-id="2087" instrument_node="">[art 12]</span></a></sup></p><span data-dcnode-id="2083" instrument_node=""> </span></figcaption><span data-dcnode-id="2081" instrument_node=""> </span></figure><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2071"><span data-dcnode-id="2078" instrument_node="">Hi! It's me, </span><a data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Buddy" title="Buddy"><span data-dcnode-id="2077" instrument_node="">Buddy the ogre</span></a><span data-dcnode-id="2075" instrument_node="">. Oh, you're pretty. Right, I'm supposed to talk now. </span><a data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Hazel_Copperpot" title="Hazel Copperpot"><span data-dcnode-id="2074" instrument_node="">Hazel</span></a><span data-dcnode-id="2072" instrument_node=""> told me I should use her Copperpot Crank Action Grogomatic for this so we could listen to it later, 'cause it traps your voice inside, but you still have your voice, but it's also in there. Yeah.
</span></p><p data-dcnode-id="2064"><a data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Taryon_Darrington" title="Taryon Darrington"><span data-dcnode-id="2070" instrument_node="">Tary</span></a><span data-dcnode-id="2068" instrument_node=""> told me I should tell you guys a story of how </span><a data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Macaroni_Samsonite" title="Macaroni Samsonite"><span data-dcnode-id="2067" instrument_node="">Macaroni</span></a><span data-dcnode-id="2065" instrument_node=""> and I first met. I don't remember why. Something to do with... uh...
</span></p><p data-dcnode-id="2056"><span data-dcnode-id="2063" instrument_node="">Oh, hey! Do you guys know how to get rid of ducks? My friend </span><a data-dcnode-id="2061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Lionel_Gayheart" title="Lionel Gayheart"><span data-dcnode-id="2062" instrument_node="">Lionel</span></a><span data-dcnode-id="2060" instrument_node="">, he has all these ducks and he had to go on a mission with some of the others to spy on something called the </span><a data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Cerberus_Assembly" title="Cerberus Assembly"><span data-dcnode-id="2059" instrument_node="">Circus Bus Assembly</span></a><span data-dcnode-id="2057" instrument_node="">. And he asked me if I could watch them, because I've got such good eyes. Yeah. Anyway, I was just supposed to babysit them by their pond, but they all followed me home. And they came to me and Mac's place, and now they don't wanna go home. And I don't wanna get in trouble with Lionel, or with Macaroni. 
</span></p><p data-dcnode-id="2047"><span data-dcnode-id="2055" instrument_node="">But I like those ducks, though. I named them all. There's Chester, Quackers, Steve, Reggie, </span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Percival_de_Rolo" title="Percival de Rolo"><span data-dcnode-id="2054" instrument_node="">Percival Frederickstein von Musel Klossowski de Rolo</span></a><span data-dcnode-id="2052" instrument_node=""> the Fourth,</span><sup class="reference" data-dcnode-id="2049" id="cite_ref-13"><a data-dcnode-id="2050" href="#cite_note-13"><span data-dcnode-id="2051" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2048" instrument_node=""> Webby... 
</span></p><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">You ever forget what you were talking about? Oh, gosh, you sure are pretty. I mean, I don't get it. How do the words get trapped inside of the box? My words are out here, but they're also in there.
</span></p><p data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">And the thing about ducks is once one of them starts following you, they all follow you, all in a line. And they're so pretty.
</span></p><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Oh, right! Now I remember! The story of how me and Mac first met. Okay, here goes. Once upon a time--
</span></p><span data-dcnode-id="2040" instrument_node="">
</span><h3 data-dcnode-id="2035"><span data-dcnode-id="2039" id="Dani's_Story"></span><span class="mw-headline" data-dcnode-id="2036" id="Dani.27s_Story"><b data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">Dani's Story</span></b></span></h3><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2007"><b data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">Familiar Feywild Fables</span></b><span data-dcnode-id="2031" instrument_node=""> (</span><a data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="2030" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="2028" instrument_node=""> 2021-03-16)</span><br data-dcnode-id="2027"><span data-dcnode-id="2026" instrument_node="">
In the middle of the </span><a data-dcnode-id="2024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Feywild" title="Feywild"><span data-dcnode-id="2025" instrument_node="">Feywild</span></a><span data-dcnode-id="2023" instrument_node="">, in a grove of purple aspen trees, a sleek Bengal cat has just popped back into existence in the magical realm. Having grown accustomed to returning to the Feywild in this way, he simply stretches, gives a little shake, and trots off into the forest to check in at the FFFPP, the Fey Familiar Foundation and Placement Program. Upon arrival, he greets his old familiar friends, Leeko the Rat, Vesper the Cat, and Gerald the Tegu Lizard, before making his way to Archie the Owl, head of the FFFPP. He dives into his report, describing encounters with an </span><a data-dcnode-id="2021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Gelidon" title="Gelidon"><span data-dcnode-id="2022" instrument_node="">icy dragon</span></a><span data-dcnode-id="2020" instrument_node="">, a </span><a data-dcnode-id="2018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Astral_dreadnought" title="Astral dreadnought"><span data-dcnode-id="2019" instrument_node="">chained monster</span></a><span data-dcnode-id="2017" instrument_node=""> in the </span><a class="mw-redirect" data-dcnode-id="2015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Astral_Sea" title="Astral Sea"><span data-dcnode-id="2016" instrument_node="">Astral Sea</span></a><span data-dcnode-id="2014" instrument_node="">, underwater tangles with a </span><a data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Vokodo" title="Vokodo"><span data-dcnode-id="2013" instrument_node="">psychic fire god</span></a><span data-dcnode-id="2011" instrument_node="">, and a staggering amount of </span><a data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Traveler_Con" title="Traveler Con"><span data-dcnode-id="2010" instrument_node="">green-cloaked cultists</span></a><span data-dcnode-id="2008" instrument_node="">.
</span></p><span data-dcnode-id="2006" instrument_node="">
</span><figure class="thumb tright" data-dcnode-id="1986" style="width: 250px"><span data-dcnode-id="2005" instrument_node=""> </span><a class="image" data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/7/7d/Agent_111_-_superfrumpkin.jpg/revision/latest%3Fcb%3D20210318003457"><img alt="" class="thumbimage lazyload" data-dcnode-id="2004" data-image-key="Agent_111_-_superfrumpkin.jpg" data-image-name="Agent 111 - superfrumpkin.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/7/7d/Agent_111_-_superfrumpkin.jpg/revision/latest/scale-to-width-down/250?cb=20210318003457" decoding="async" height="333" src="data:image/gif;base64,R0lGODlhAQABAIABAAAAAP///yH5BAEAAAEALAAAAAABAAEAQAICTAEAOw%3D%3D" width="250"></a><span data-dcnode-id="2002" instrument_node=""> </span><noscript data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">&lt;a href="https://static.wikia.nocookie.net/criticalrole/images/7/7d/Agent_111_-_superfrumpkin.jpg/revision/latest?cb=20210318003457" class="image"&gt;&lt;img alt="" src="https://static.wikia.nocookie.net/criticalrole/images/7/7d/Agent_111_-_superfrumpkin.jpg/revision/latest/scale-to-width-down/250?cb=20210318003457" decoding="async" width="250" height="333" class="thumbimage" data-image-name="Agent 111 - superfrumpkin.jpg" data-image-key="Agent_111_-_superfrumpkin.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/7/7d/Agent_111_-_superfrumpkin.jpg/revision/latest/scale-to-width-down/250?cb=20210318003457" /&gt;&lt;/a&gt;</span></noscript><span data-dcnode-id="1999" instrument_node=""> </span><figcaption class="thumbcaption" data-dcnode-id="1988"><span data-dcnode-id="1998" instrument_node=""> </span><p class="caption" data-dcnode-id="1990"><span data-dcnode-id="1997" instrument_node="">Fan art of Agent 111, by </span><a data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Category%3AArt_by_superfrumpkin" title="Category:Art by superfrumpkin"><span data-dcnode-id="1996" instrument_node="">superfrumpkin</span></a><span data-dcnode-id="1994" instrument_node="">.</span><sup class="reference" data-dcnode-id="1991" id="cite_ref-14"><a data-dcnode-id="1992" href="#cite_note-14"><span data-dcnode-id="1993" instrument_node="">[art 13]</span></a></sup></p><span data-dcnode-id="1989" instrument_node=""> </span></figcaption><span data-dcnode-id="1987" instrument_node=""> </span></figure><span data-dcnode-id="1985" instrument_node="">
</span><p data-dcnode-id="1980"><span data-dcnode-id="1984" instrument_node="">Before he can continue, Archie speaks up, a concerned look on the owl's face. "Agent 111, your reports, as always, are invaluable, but you speak of innumerable dangers. You've died at least six times. You've been eaten, shot with arrows, kicked, stabbed, and --" He consults a clipboard. "Bitten by a </span><a data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Sprinkle" title="Sprinkle"><span data-dcnode-id="1983" instrument_node="">very angry weasel</span></a><span data-dcnode-id="1981" instrument_node="">. Agent 111, if you need to be reassigned--"
</span></p><p data-dcnode-id="1975"><span data-dcnode-id="1979" instrument_node="">The owl was immediately cut off. "Archie, our job as familiars is to assist our patron with whatever they require. Mine needs me to scout. And sometimes he just needs me to be a warm, fuzzy scarf, a blep in a time of grief. And I want to be those things for him, no matter the odd situations in which my material form is returned here to the Feywild, for he is truly my greatest friend. And he needs me." As light began to surround him, signaling his imminent return to his wizard's side, he turned to the owl, who looked at him no longer with concern, but with pride and understanding. "And, Archie, it's not Agent 111. My name is </span><a data-dcnode-id="1977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Frumpkin" title="Frumpkin"><span data-dcnode-id="1978" instrument_node="">Frumpkin</span></a><span data-dcnode-id="1976" instrument_node="">."
</span></p><p data-dcnode-id="1970"><span data-dcnode-id="1974" instrument_node="">The light swallowed the Fey cat, and through it, he could see the bearded ginger face of </span><a class="mw-redirect" data-dcnode-id="1972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Caleb" title="Caleb"><span data-dcnode-id="1973" instrument_node="">his very favorite person</span></a><span data-dcnode-id="1971" instrument_node="">. As his form solidified, Frumpkin said exactly what they both needed to hear: "Meow."
</span></p><span data-dcnode-id="1969" instrument_node="">
</span><h3 data-dcnode-id="1964"><span data-dcnode-id="1968" id="Travis's_Second_Story"></span><span class="mw-headline" data-dcnode-id="1965" id="Travis.27s_Second_Story"><b data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">Travis's Second Story</span></b></span></h3><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1956"><b data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Chutney's Christmas Vacation</span></b><span data-dcnode-id="1960" instrument_node=""> (</span><a data-dcnode-id="1958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="1959" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="1957" instrument_node=""> 2021-04-20)
</span></p><span data-dcnode-id="1955" instrument_node="">
</span><figure class="thumb tright" data-dcnode-id="1935" style="width: 250px"><span data-dcnode-id="1954" instrument_node=""> </span><a class="image" data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/4/4f/Chutney_on_the_beach_-_ayzenigma.jpg/revision/latest%3Fcb%3D20210421181604"><img alt="" class="thumbimage lazyload" data-dcnode-id="1953" data-image-key="Chutney_on_the_beach_-_ayzenigma.jpg" data-image-name="Chutney on the beach - ayzenigma.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/4/4f/Chutney_on_the_beach_-_ayzenigma.jpg/revision/latest/scale-to-width-down/250?cb=20210421181604" decoding="async" height="200" src="data:image/gif;base64,R0lGODlhAQABAIABAAAAAP///yH5BAEAAAEALAAAAAABAAEAQAICTAEAOw%3D%3D" width="250"></a><span data-dcnode-id="1951" instrument_node=""> </span><noscript data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">&lt;a href="https://static.wikia.nocookie.net/criticalrole/images/4/4f/Chutney_on_the_beach_-_ayzenigma.jpg/revision/latest?cb=20210421181604" class="image"&gt;&lt;img alt="" src="https://static.wikia.nocookie.net/criticalrole/images/4/4f/Chutney_on_the_beach_-_ayzenigma.jpg/revision/latest/scale-to-width-down/250?cb=20210421181604" decoding="async" width="250" height="200" class="thumbimage" data-image-name="Chutney on the beach - ayzenigma.jpg" data-image-key="Chutney_on_the_beach_-_ayzenigma.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/4/4f/Chutney_on_the_beach_-_ayzenigma.jpg/revision/latest/scale-to-width-down/250?cb=20210421181604" /&gt;&lt;/a&gt;</span></noscript><span data-dcnode-id="1948" instrument_node=""> </span><figcaption class="thumbcaption" data-dcnode-id="1937"><span data-dcnode-id="1947" instrument_node=""> </span><p class="caption" data-dcnode-id="1939"><span data-dcnode-id="1946" instrument_node="">Fan art of Chutney on the beach, by </span><a data-dcnode-id="1944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Category%3AArt_by_ayzenigma" title="Category:Art by ayzenigma"><span data-dcnode-id="1945" instrument_node="">ayzenigma</span></a><span data-dcnode-id="1943" instrument_node="">.</span><sup class="reference" data-dcnode-id="1940" id="cite_ref-15"><a data-dcnode-id="1941" href="#cite_note-15"><span data-dcnode-id="1942" instrument_node="">[art 14]</span></a></sup></p><span data-dcnode-id="1938" instrument_node=""> </span></figcaption><span data-dcnode-id="1936" instrument_node=""> </span></figure><span data-dcnode-id="1934" instrument_node="">
</span><p data-dcnode-id="1929"><span data-dcnode-id="1933" instrument_node="">Thwarted again. No! I've come too far. I was just starting to like this tropical town. I'm sure those stupid elves back at the North Pole still think I'm at the bottom of the Halloween tree. Too bad the great Oogie Boogie didn't know that </span><a data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Chutney_Chocolatecane" title="Chutney Chocolatecane"><span data-dcnode-id="1932" instrument_node="">Chutney Chocolatecane</span></a><span data-dcnode-id="1930" instrument_node=""> always keeps a razor blade in his mouth. He does now.
</span></p><p data-dcnode-id="1924"><span data-dcnode-id="1928" instrument_node="">I was here on the beach when I heard some poor lovesick fool talking about the latest performance of the </span><a class="mw-redirect" data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Ruby_of_the_Sea" title="Ruby of the Sea"><span data-dcnode-id="1927" instrument_node="">Ruby of the Sea</span></a><span data-dcnode-id="1925" instrument_node="">. Ruby? Could that be the fat man in his red suit getting his musical theater rocks off in the off season? No, not here! Not now! I had to be sure. I went into town where I became distracted by the most beautiful toy store I had ever seen, when that is when inspiration struck! What is the one thing Saint Nick does over and over on that fateful night? He slides down chimneys and delivers toys. At the bottom of those chimneys is always supposed to be a roaring fire and somehow, conveniently, he never gets burned. Perhaps we could exploit that.
</span></p><p data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">I learned of an arcane rune that when carved into the base of an item, would give its owner increased susceptibility to fire damage. I could carve it on a toy, throw it in Santa's sack, watch him slide down a chimney, and kablooey! no more! 
</span></p><p data-dcnode-id="1914"><span data-dcnode-id="1921" instrument_node="">I went into that toy store and found the first wooden toy I could find, carved my rune, watched it glow before it returned to normal, and treasured my plan, when suddenly the item was taken from me. I turned as a small creature was darting out the front door. A thief! I had to respect it, but I was not to be thwarted. I chased this creature down the street as she headed into a house. As I pressed my face against the window, I saw </span><a class="mw-redirect" data-dcnode-id="1919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Veth" title="Veth"><span data-dcnode-id="1920" instrument_node="">a small female halfling woman</span></a><span data-dcnode-id="1918" instrument_node=""> kneeling in front of </span><a data-dcnode-id="1916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Luc_Brenatto" title="Luc Brenatto"><span data-dcnode-id="1917" instrument_node="">her son</span></a><span data-dcnode-id="1915" instrument_node="">, handing over a very familiar arcane-enchanted wooden crossbow.
</span></p><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">What was I going to do? Steal a toy from a kid? As long as he doesn't go jumping in his fireplace I'm sure it'll be fine. Chutney will have his revenge.
</span></p><span data-dcnode-id="1911" instrument_node="">
</span><h3 data-dcnode-id="1906"><span data-dcnode-id="1910" id="Aabria's_Story"></span><span class="mw-headline" data-dcnode-id="1907" id="Aabria.27s_Story"><b data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Aabria's Story</span></b></span></h3><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1890"><b data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Of Heists and Horses</span></b><span data-dcnode-id="1902" instrument_node=""> (</span><a data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="1901" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="1899" instrument_node=""> 2021-05-18)</span><br data-dcnode-id="1898"><span data-dcnode-id="1897" instrument_node="">
No, no, let our little friend here go, 'cause we need to have a conversation. See, you walked into my fine establishment, a stranger, spouting a lot of big words, heavy words, words with weight and gravity. Names like </span><a data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Myriad" title="Myriad"><span data-dcnode-id="1896" instrument_node="">Myriad</span></a><span data-dcnode-id="1894" instrument_node="">, like </span><a data-dcnode-id="1892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Clasp" title="Clasp"><span data-dcnode-id="1893" instrument_node="">Clasp</span></a><span data-dcnode-id="1891" instrument_node="">. Except we don't use those names anymore. Too messy. See, there's power in a name, but you knew that before you walked in. So were I to assume that that was boldness and not stupidity, I might be inclined to make you an offer. So here's the deal.
</span></p><p data-dcnode-id="1882"><span data-dcnode-id="1889" instrument_node="">The upper-crustiest of </span><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Emon" title="Emon"><span data-dcnode-id="1888" instrument_node="">Emon</span></a><span data-dcnode-id="1886" instrument_node=""> will be headed into the Temple District tomorrow, dressed in their finery and loaded for bear with their coin and gold in tribute for </span><a class="mw-redirect" data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/The_Changebringer" title="The Changebringer"><span data-dcnode-id="1885" instrument_node="">the Changebringer</span></a><span data-dcnode-id="1883" instrument_node="">. But Lady Luck favors the bold, and we're going to use this little promenade of conspicuous consumption to liberate some coinage from the aristocracy. Mulberry, here, is our druid on the inside. Two weeks ago, she snuck into the stables of three noble houses and awakened their horses. So they are now as smart as us, loyal to us, and in on the plan for a 5% cut. We've also got a plant in with the musicians and the temple-- What? No, not a literal plant. Like, a guy. We did this yesterday. You can't-- not everything's about like leaves and shit.
</span></p><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Tomorrow, our man on the inside, once he sees our friendlies trotting into the square, will "accidentally" set off a firework, and our three sets of horses will spook in different directions, each running down a very narrow alley, and in the ensuing chaos, while they try to un-wedge themselves in reverse, we slide into the undercarriages, grab what we can, and get out. Real easy. No one gets seen, no one gets hurt, and one hour later we meet down at the docks to split our treasure, board some boats, lay low for a while. Make sense?
</span></p><p data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">So, are you in? Or is the harbor going to float just a little bit higher tonight?
</span></p><span data-dcnode-id="1877" instrument_node="">
</span><h2 data-dcnode-id="1873"><span class="mw-headline" data-dcnode-id="1874" id="Season_Three"><b data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Season Three</span></b></span></h2><span data-dcnode-id="1872" instrument_node="">
</span><h3 data-dcnode-id="1867"><span data-dcnode-id="1871" id="Robbie's_Story"></span><span class="mw-headline" data-dcnode-id="1868" id="Robbie.27s_Story"><b data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Robbie's Story</span></b></span></h3><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1854"><b data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">The Curious Casanova</span></b><span data-dcnode-id="1863" instrument_node=""> (</span><a data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="1862" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="1860" instrument_node=""> 2021-09-23)</span><br data-dcnode-id="1859"><span data-dcnode-id="1858" instrument_node="">
Handsome! Oh yes, that word, more abhorrent than any known to </span><a data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Goblin" title="Goblin"><span data-dcnode-id="1857" instrument_node="">goblin</span></a><span data-dcnode-id="1855" instrument_node="">-kind. And Flint-tip Bearscat was the most handsome goblin to ever live. Son of a hideous harem helper, a noxious night nurse, grandson of a flatulent flord farmer, nephew to a grotesque grocer, brother to a balding bubonic blacksmith -- where did these gorgeous genes come from? The symmetrical splotches, chiseled chin, aquiline nose, silk-black hair, shredded core, toned, muscular physique, and golden eyes that sparkled like the sun. Would the pain never stop?!
</span></p><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Doomed to a life of ridicule, he eventually succumbed to goblin goading and female failures, and could bear the shame no more. He left his vile little village to trek out into Tal'Dorei. And Flint became a rogue, hid his hideously handsome head under a cloak. He fought foes, and took only the most questionable quests, became a giant-slayer -- anything that might end his miserable existence.
</span></p><p data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Until one day, he could bear it no more. Weary of wandering, he came to a pub in a busy town by the road. The people were kind, and the air smelled of sweet meat pie. The warmth of the tavern fire eased his woes, and in its comfort, he removed his cloak.
</span></p><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">"[Gasps of shock]" "Is that -- a goblin?" "It can't be." "Well, I'll be. He's the most gorgeous creature I've ever seen!"
</span></p><p data-dcnode-id="1843"><span data-dcnode-id="1847" instrument_node="">Flint sunk into his chair, and then, something strange happened. Three beautiful women, a </span><a data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Tiefling" title="Tiefling"><span data-dcnode-id="1846" instrument_node="">tiefling</span></a><span data-dcnode-id="1844" instrument_node="">, an elf, and a human, approached his corner table.
</span></p><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">"Hello, there," said the human. "My name is Aria, and these are my friends Lula and Vy. May we buy you a pint, traveler? I know we're certainly thirsty. Are you?"
</span></p><p data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Well, Flint sat up in his chair, smiled for the first time he could remember, and said, "Why yes, ladies. I think I might just be."
</span></p><span data-dcnode-id="1838" instrument_node="">
</span><h3 data-dcnode-id="1833"><span data-dcnode-id="1837" id="Aimee's_Story"></span><span class="mw-headline" data-dcnode-id="1834" id="Aimee.27s_Story"><b data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Aimee's Story</span></b></span></h3><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1823"><b data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">The Breakup Lettah</span></b><span data-dcnode-id="1829" instrument_node=""> (</span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="1828" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="1826" instrument_node=""> 2021-10-14)</span><br data-dcnode-id="1825"><span data-dcnode-id="1824" instrument_node="">
All right, is this garbage on? Yes? Okay.
</span></p><p data-dcnode-id="1818"><span data-dcnode-id="1822" instrument_node="">Hey, Baby. Do you remember me? It's Deni$e (money sign instead of the S). I spent 2000 gold on this one-way box to tell you to fuck off forever. Consider this a breakup letter. Oh, are you shocked? Well, let's recap. You left my ass in </span><a data-dcnode-id="1820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Westruun" title="Westruun"><span data-dcnode-id="1821" instrument_node="">Westruun</span></a><span data-dcnode-id="1819" instrument_node=""> with a bunch of stolen furs we were supposed to unload for Cosmo Racketface. So imagine my surprise, coming home after a long night of schmoozing and selling, to find Racketface's loser cousin Lighteyes sitting in my good chair looking for you. I says, "I don't know where he is. I'm not his mother." He says you're gone and you took the furs. 
</span></p><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Then Lighteyes gets in my face. He says, "Where's my money, Deni$e?" and he's pointing at me with that gross club finger of his, and you know how I got a thing with stubby things. He gives me three days to cough up the cash, or else.
</span></p><p data-dcnode-id="1811"><span data-dcnode-id="1815" instrument_node="">So what do I do? I take time out of my busy schedule to go looking for you. I go to our old haunts, asking around about you. Faded and Jaded, Whammy's House, The Second Wing -- I go see your brother Taros in butt-fuck </span><a data-dcnode-id="1813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Turst_Fields" title="Turst Fields"><span data-dcnode-id="1814" instrument_node="">Turst Fields</span></a><span data-dcnode-id="1812" instrument_node=""> thinking maybe you grew a conscience and went to go visit your family. No, you haven't been there in months, Taros says, but oh, Deni$e, could you give me a trim? Mind you, I'm heartbroken, and I'm abandoned, but I give the asshole a haircut because I couldn't stand him looking just like you with that long hair, anyway.
</span></p><p data-dcnode-id="1806"><span data-dcnode-id="1810" instrument_node="">I thought we had a good thing going, I really did. Anyway, I made it to Emon, and there's pictures of you everywhere. I see you shaved your mustache, and pissed off </span><a data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Nameless_Ones" title="Nameless Ones"><span data-dcnode-id="1809" instrument_node="">an entire guild of thieves</span></a><span data-dcnode-id="1807" instrument_node="">, so congrats on that. Running with some taller girls, are you? 
</span></p><p data-dcnode-id="1801"><span data-dcnode-id="1805" instrument_node="">Listen, </span><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Dariax_Zaveon" title="Dariax Zaveon"><span data-dcnode-id="1804" instrument_node="">Dariax</span></a><span data-dcnode-id="1802" instrument_node="">, I'm all out of cash, and I'm running from Racketface and Co., so I'd really just prefer it if you'd send me what you owe them, and enough to cover my travel expenses, plus a ten percent wasting-all-my-good-years-on-you fee. Otherwise, I'm going to have to find you and choke you out. And you have seen what these thighs can do. So you choose -- the money, or your head. Talk soon! And fuck you!
</span></p><p data-dcnode-id="1796"><span data-dcnode-id="1800" instrument_node="">Oh, </span><a data-dcnode-id="1798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Shaun_Gilmore" title="Shaun Gilmore"><span data-dcnode-id="1799" instrument_node="">Mr. Gilmore</span></a><span data-dcnode-id="1797" instrument_node=""> says hello. 
</span></p><p data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Deni$e
</span></p><span data-dcnode-id="1793" instrument_node="">
