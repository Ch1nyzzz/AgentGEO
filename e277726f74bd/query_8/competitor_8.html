</span><h3 data-dcnode-id="2974"><span data-dcnode-id="2978" id="Matt's_Story"></span><span class="mw-headline" data-dcnode-id="2975" id="Matt.27s_Story"><b data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Matt's Story</span></b></span></h3><span data-dcnode-id="2973" instrument_node="">
</span><p data-dcnode-id="2966"><b data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">Pumat's Stroll</span></b><span data-dcnode-id="2970" instrument_node=""> (</span><a data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="2969" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="2967" instrument_node=""> 2020-04-06)
</span></p><span data-dcnode-id="2965" instrument_node="">
</span><figure class="thumb tright" data-dcnode-id="2948" style="width: 250px"><span data-dcnode-id="2964" instrument_node=""> </span><a class="image" data-dcnode-id="2962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/b/bd/The_beaked_wolf_-_Elijah_viray.jpg/revision/latest%3Fcb%3D20200711193258"><img alt="" class="thumbimage" data-dcnode-id="2963" data-image-key="The_beaked_wolf_-_Elijah_viray.jpg" data-image-name="The beaked wolf - Elijah viray.jpg" decoding="async" height="182" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/b/bd/The_beaked_wolf_-_Elijah_viray.jpg/revision/latest/scale-to-width-down/250%3Fcb%3D20200711193258&amp;raw" width="250"></a><span data-dcnode-id="2961" instrument_node=""> </span><figcaption class="thumbcaption" data-dcnode-id="2950"><span data-dcnode-id="2960" instrument_node=""> </span><p class="caption" data-dcnode-id="2952"><span data-dcnode-id="2959" instrument_node="">Fan art of cooking the stew, by </span><a data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Category%3AArt_by_Elijah_Viray" title="Category:Art by Elijah Viray"><span data-dcnode-id="2958" instrument_node="">Elijah Viray</span></a><span data-dcnode-id="2956" instrument_node="">.</span><sup class="reference" data-dcnode-id="2953" id="cite_ref-1"><a data-dcnode-id="2954" href="#cite_note-1"><span data-dcnode-id="2955" instrument_node="">[art 1]</span></a></sup></p><span data-dcnode-id="2951" instrument_node=""> </span></figcaption><span data-dcnode-id="2949" instrument_node=""> </span></figure><span data-dcnode-id="2947" instrument_node="">
</span><p data-dcnode-id="2942"><span data-dcnode-id="2946" instrument_node="">'Twas chilled that foggy morning, as enchanter </span><a data-dcnode-id="2944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Pumat_Sol" title="Pumat Sol"><span data-dcnode-id="2945" instrument_node="">Pumat</span></a><span data-dcnode-id="2943" instrument_node=""> wandered the wood in search of fine mushrooms to flavor his food. He plucked a fine fungus when a guttural growl caught his ears, a feral wolf stalking from the shadows. To his surprise, the beast did speak: "'Tis I, the lonely Wildred, and you, my meal."
</span></p><p data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">Pumat recoiled, reaching into his pouch of plenty. "Though wandered I am, friend Wildred, I fear a poor meal would I make. For this humble Pumat is tough on teeth and filled with muscle."
</span></p><p data-dcnode-id="2935"><span data-dcnode-id="2939" instrument_node="">The simple </span><a data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Firbolg" title="Firbolg"><span data-dcnode-id="2938" instrument_node="">firbolg</span></a><span data-dcnode-id="2936" instrument_node="">'s bulging form took hold of the hunter wolf and wrestled powerfully they did across the trees and brooks until an evening's mushroom stew took on a unique, lupine flavor.
</span></p><span data-dcnode-id="2934" instrument_node="">
</span><h3 data-dcnode-id="2929"><span data-dcnode-id="2933" id="Laura's_Story"></span><span class="mw-headline" data-dcnode-id="2930" id="Laura.27s_Story"><b data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">Laura's Story</span></b></span></h3><span data-dcnode-id="2928" instrument_node="">
</span><p data-dcnode-id="2921"><b data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">Jester's Tall Tale</span></b><span data-dcnode-id="2925" instrument_node=""> (</span><a data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="2924" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="2922" instrument_node=""> 2020-04-28)
</span></p><span data-dcnode-id="2920" instrument_node="">
</span><figure class="thumb tright" data-dcnode-id="2903" style="width: 250px"><span data-dcnode-id="2919" instrument_node=""> </span><a class="image" data-dcnode-id="2917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/7/79/Picador%2527s_Plum_-_JustHustina.jpg/revision/latest%3Fcb%3D20200610114854"><img alt="" class="thumbimage" data-dcnode-id="2918" data-image-key="Picador%27s_Plum_-_JustHustina.jpg" data-image-name="Picador's Plum - JustHustina.jpg" decoding="async" height="141" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/7/79/Picador%2527s_Plum_-_JustHustina.jpg/revision/latest/scale-to-width-down/250%3Fcb%3D20200610114854&amp;raw" width="250"></a><span data-dcnode-id="2916" instrument_node=""> </span><figcaption class="thumbcaption" data-dcnode-id="2905"><span data-dcnode-id="2915" instrument_node=""> </span><p class="caption" data-dcnode-id="2907"><span data-dcnode-id="2914" instrument_node="">Fan art of Picador's Plum, by </span><a data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Category%3AArt_by_%40JustHustina" title="Category:Art by @JustHustina"><span data-dcnode-id="2913" instrument_node="">@JustHustina</span></a><span data-dcnode-id="2911" instrument_node="">.</span><sup class="reference" data-dcnode-id="2908" id="cite_ref-2"><a data-dcnode-id="2909" href="#cite_note-2"><span data-dcnode-id="2910" instrument_node="">[art 2]</span></a></sup></p><span data-dcnode-id="2906" instrument_node=""> </span></figcaption><span data-dcnode-id="2904" instrument_node=""> </span></figure><span data-dcnode-id="2902" instrument_node="">
</span><p data-dcnode-id="2894"><span data-dcnode-id="2901" instrument_node="">Oh hi, it's me, Jester. So sometimes when I was little, I wouldn't be able to sleep and </span><a data-dcnode-id="2899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Marion_Lavorre" title="Marion Lavorre"><span data-dcnode-id="2900" instrument_node="">momma</span></a><span data-dcnode-id="2898" instrument_node=""> would be working and </span><a data-dcnode-id="2896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/The_Traveler" title="The Traveler"><span data-dcnode-id="2897" instrument_node="">the Traveler</span></a><span data-dcnode-id="2895" instrument_node=""> would come visit me and he would tell me bedtime stories. And one time, he said, "Jester, what brings sweeter dreams than the promise of a little treasure? Lay back and let me tell you about how to find Picador's Plum."
</span></p><p data-dcnode-id="2886"><span data-dcnode-id="2893" instrument_node="">And he told me that across the sea there's this </span><a data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Ank%2527Harel" title="Ank'Harel"><span data-dcnode-id="2892" instrument_node="">big beautiful city</span></a><span data-dcnode-id="2890" instrument_node=""> ruled by </span><a data-dcnode-id="2888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/J%2527mon_Sa_Ord" title="J'mon Sa Ord"><span data-dcnode-id="2889" instrument_node="">a secret dragon</span></a><span data-dcnode-id="2887" instrument_node=""> (whatever that means). And from there you have to go four days north. On dusk on the fourth day, you will come across a grove of trees, which you know is pretty special in and of itself being in the middle of a desert, but one of the trees in this grove grows an especial Elysian fruit. Now you have to pick this fruit, but don't eat it! If you eat it you'll be doomed to like stay in the grove forever or whatever. And then, from there you head four days to the northwest and you'll come across a boulder the size of a heart. No. The shape of a heart. Yeah, that's what it was. And underneath the boulder lives a hippogriff named Okarna. Now you give her this Elysian fruit, and she will become entranced with love for you. Now after she does that, you have to sing her a beautiful song that goes [sings]. Those notes exactly. And then she'll allow you to get on her back and she will fly to this cave of wonders where you will find the magical treasure.
</span></p><p data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">Now, the Traveler never told me what Picador's Plum was, but I think it's got to be pretty amazing, you know, like maybe a dog in a dress that does a little dance? I'm not sure. But I'm excited to find out.
</span></p><span data-dcnode-id="2883" instrument_node="">
</span><h3 data-dcnode-id="2878"><span data-dcnode-id="2882" id="Sam's_Story"></span><span class="mw-headline" data-dcnode-id="2879" id="Sam.27s_Story"><b data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">Sam's Story</span></b></span></h3><span data-dcnode-id="2877" instrument_node="">
</span><p data-dcnode-id="2868"><b data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">Scanlan's Love Story</span></b><span data-dcnode-id="2874" instrument_node=""> (</span><a data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="2873" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="2871" instrument_node=""> 2020-05-12)</span><br data-dcnode-id="2870"><span data-dcnode-id="2869" instrument_node="">
Scanlan Shorthalt here with a tale for the ages.
</span></p><p data-dcnode-id="2863"><span data-dcnode-id="2867" instrument_node="">Paulay was a poor delivery boy in love with a rich woman named Sudara, her hair the color of daffodil, her eyes deeper than the </span><a data-dcnode-id="2865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Lucidian_Ocean" title="Lucidian Ocean"><span data-dcnode-id="2866" instrument_node="">Lucidian</span></a><span data-dcnode-id="2864" instrument_node="">. She had many suitors, but Paulay knew if he could win his fortune, she would notice him. One day he invented something amazing: silver rimmed glasses -- pince-nez with an ivory inset. These spectacles had the magical ability to see through solid objects. He put the glasses on at a poker hall and could see through everyone else's cards. That night he won a beautiful pewter ring which he presented to Sudara the next day. She loved it. At a carnival, he won the shell game twenty-two times and won himself a puppy, which he also gave to Sudara. She was so impressed that she agreed to marry him as long as he kept bringing her gifts.
</span></p><p data-dcnode-id="2858"><span data-dcnode-id="2862" instrument_node="">Paulay skipped to work the next day. He was excited, but he was asked to deliver a letter from the evil </span><a data-dcnode-id="2860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Goliath" title="Goliath"><span data-dcnode-id="2861" instrument_node="">goliath</span></a><span data-dcnode-id="2859" instrument_node=""> ruler, Prince Rotzi, and coincidentally, it was to Sudara. Curious, he used his magic spectacles to see through the envelope, but was shocked to read, "Has that idiot given you any more gifts? If so, bring them to our tryst tonight at the palace. Your lover, Rotzi."
</span></p><p data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">Alas the moral of the story seems to be: (sings)
</span></p><span data-dcnode-id="2855" instrument_node="">
</span><dl data-dcnode-id="2843"><dd data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">There once was a poor man named Paulay</span></dd><span data-dcnode-id="2852" instrument_node="">
</span><dd data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">Who invented a magical pince-nez.</span></dd><span data-dcnode-id="2849" instrument_node="">
</span><dd data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">It found him love, riches, and glee,</span></dd><span data-dcnode-id="2846" instrument_node="">
</span><dd data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">But when you look too close, you might not like what you see.</span></dd></dl><span data-dcnode-id="2842" instrument_node="">
</span><h3 data-dcnode-id="2837"><span data-dcnode-id="2841" id="Liam's_Story"></span><span class="mw-headline" data-dcnode-id="2838" id="Liam.27s_Story"><b data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">Liam's Story</span></b></span></h3><span data-dcnode-id="2836" instrument_node="">
</span><p data-dcnode-id="2829"><b data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">Widogast's Web of Words</span></b><span data-dcnode-id="2833" instrument_node=""> (</span><a data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="2832" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="2830" instrument_node=""> 2020-05-28)
</span></p><span data-dcnode-id="2828" instrument_node="">
</span><figure class="thumb tright" data-dcnode-id="2808" style="width: 250px"><span data-dcnode-id="2827" instrument_node=""> </span><a class="image" data-dcnode-id="2825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/c/c6/The_Vortex_-_JustHustina.jpg/revision/latest%3Fcb%3D20200602030610"><img alt="" class="thumbimage lazyloaded" data-dcnode-id="2826" data-image-key="The_Vortex_-_JustHustina.jpg" data-image-name="The Vortex - JustHustina.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/c/c6/The_Vortex_-_JustHustina.jpg/revision/latest/scale-to-width-down/250?cb=20200602030610" decoding="async" height="168" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/c/c6/The_Vortex_-_JustHustina.jpg/revision/latest/scale-to-width-down/250%3Fcb%3D20200602030610&amp;raw" width="250"></a><span data-dcnode-id="2824" instrument_node=""> </span><noscript data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">&lt;a href="https://static.wikia.nocookie.net/criticalrole/images/c/c6/The_Vortex_-_JustHustina.jpg/revision/latest?cb=20200602030610" class="image"&gt;&lt;img alt="" src="https://static.wikia.nocookie.net/criticalrole/images/c/c6/The_Vortex_-_JustHustina.jpg/revision/latest/scale-to-width-down/250?cb=20200602030610" decoding="async" width="250" height="168" class="thumbimage" data-image-name="The Vortex - JustHustina.jpg" data-image-key="The_Vortex_-_JustHustina.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/c/c6/The_Vortex_-_JustHustina.jpg/revision/latest/scale-to-width-down/250?cb=20200602030610" /&gt;&lt;/a&gt;</span></noscript><span data-dcnode-id="2821" instrument_node=""> </span><figcaption class="thumbcaption" data-dcnode-id="2810"><span data-dcnode-id="2820" instrument_node=""> </span><p class="caption" data-dcnode-id="2812"><span data-dcnode-id="2819" instrument_node="">Fan art of The Vortex, by </span><a data-dcnode-id="2817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Category%3AArt_by_%40JustHustina" title="Category:Art by @JustHustina"><span data-dcnode-id="2818" instrument_node="">@JustHustina</span></a><span data-dcnode-id="2816" instrument_node="">.</span><sup class="reference" data-dcnode-id="2813" id="cite_ref-3"><a data-dcnode-id="2814" href="#cite_note-3"><span data-dcnode-id="2815" instrument_node="">[art 3]</span></a></sup></p><span data-dcnode-id="2811" instrument_node=""> </span></figcaption><span data-dcnode-id="2809" instrument_node=""> </span></figure><span data-dcnode-id="2807" instrument_node="">
</span><p data-dcnode-id="2796"><span data-dcnode-id="2806" instrument_node="">Every </span><i data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">Junge</span></i><span data-dcnode-id="2803" instrument_node=""> and </span><i data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">Mädchen</span></i><span data-dcnode-id="2800" instrument_node=""> of the Empire knows the story of the dreaded </span><i data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">Waldhexe</span></i><span data-dcnode-id="2797" instrument_node="">.
</span></p><p data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">Most think it is a tale to frighten children, but the wise know better.
</span></p><span data-dcnode-id="2793" instrument_node="">
</span><figure class="thumb tright" data-dcnode-id="2773" style="width: 250px"><span data-dcnode-id="2792" instrument_node=""> </span><a class="image" data-dcnode-id="2790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/b/bf/Die_Waldhexe_-_Nathaniel_Himawan.jpg/revision/latest%3Fcb%3D20211101105531"><img alt="" class="thumbimage lazyloaded" data-dcnode-id="2791" data-image-key="Die_Waldhexe_-_Nathaniel_Himawan.jpg" data-image-name="Die Waldhexe - Nathaniel Himawan.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/b/bf/Die_Waldhexe_-_Nathaniel_Himawan.jpg/revision/latest/scale-to-width-down/250?cb=20211101105531" decoding="async" height="307" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/b/bf/Die_Waldhexe_-_Nathaniel_Himawan.jpg/revision/latest/scale-to-width-down/250%3Fcb%3D20211101105531&amp;raw" width="250"></a><span data-dcnode-id="2789" instrument_node=""> </span><noscript data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">&lt;a href="https://static.wikia.nocookie.net/criticalrole/images/b/bf/Die_Waldhexe_-_Nathaniel_Himawan.jpg/revision/latest?cb=20211101105531" class="image"&gt;&lt;img alt="" src="https://static.wikia.nocookie.net/criticalrole/images/b/bf/Die_Waldhexe_-_Nathaniel_Himawan.jpg/revision/latest/scale-to-width-down/250?cb=20211101105531" decoding="async" width="250" height="307" class="thumbimage" data-image-name="Die Waldhexe - Nathaniel Himawan.jpg" data-image-key="Die_Waldhexe_-_Nathaniel_Himawan.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/b/bf/Die_Waldhexe_-_Nathaniel_Himawan.jpg/revision/latest/scale-to-width-down/250?cb=20211101105531" /&gt;&lt;/a&gt;</span></noscript><span data-dcnode-id="2786" instrument_node=""> </span><figcaption class="thumbcaption" data-dcnode-id="2775"><span data-dcnode-id="2785" instrument_node=""> </span><p class="caption" data-dcnode-id="2777"><span data-dcnode-id="2784" instrument_node="">Fan art of die Waldhexe, by </span><a data-dcnode-id="2782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Category%3AArt_by_Nathaniel_Himawan_%28ninesicks%29" title="Category:Art by Nathaniel Himawan (ninesicks)"><span data-dcnode-id="2783" instrument_node="">Nathaniel Himawan (ninesicks)</span></a><span data-dcnode-id="2781" instrument_node="">.</span><sup class="reference" data-dcnode-id="2778" id="cite_ref-4"><a data-dcnode-id="2779" href="#cite_note-4"><span data-dcnode-id="2780" instrument_node="">[art 4]</span></a></sup></p><span data-dcnode-id="2776" instrument_node=""> </span></figcaption><span data-dcnode-id="2774" instrument_node=""> </span></figure><span data-dcnode-id="2772" instrument_node="">
</span><p data-dcnode-id="2761"><span data-dcnode-id="2771" instrument_node="">Once there were three good children who walked in the light of </span><a class="mw-redirect" data-dcnode-id="2769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/The_Dawnfather" title="The Dawnfather"><span data-dcnode-id="2770" instrument_node="">the Dawnfather</span></a><span data-dcnode-id="2768" instrument_node="">. So noble were they their parents could not help but look upon them with </span><i data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">Stolz</span></i><span data-dcnode-id="2765" instrument_node=""> in their hearts. “Stay close to us, </span><i data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Liebling</span></i><span data-dcnode-id="2762" instrument_node="">. Say your prayers. Serve your king. And always walk in the light of the sun.” And so they did, for a time.
</span></p><p data-dcnode-id="2753"><span data-dcnode-id="2760" instrument_node="">But children are children, and one day they left their prayers and wandered to the edge of the wood, so vast and full of mystery. And though their parents had warned them from ever setting foot in the </span><i data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">Wildnis</span></i><span data-dcnode-id="2757" instrument_node="">, the desire for knowledge beckoned them. Now they no longer walked in the sun. Soon they could see almost nothing. Linking hands, they began to count their steps: </span><i data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">eins, zwei, drei, vier, fünf</span></i><span data-dcnode-id="2754" instrument_node="">...
</span></p><p data-dcnode-id="2748"><span data-dcnode-id="2752" instrument_node="">And then, in the darkness, they heard a voice. “</span><i data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Hunger</span></i><span data-dcnode-id="2749" instrument_node="">...” There before them limped a spindly old crone, hair matted with dirt and twig.
</span></p><p data-dcnode-id="2743"><span data-dcnode-id="2747" instrument_node="">“Who are you, </span><i data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">Großmutter</span></i><span data-dcnode-id="2744" instrument_node=""> and what are you doing in these woods?”
</span></p><p data-dcnode-id="2735"><span data-dcnode-id="2742" instrument_node="">“I </span><i data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">am</span></i><span data-dcnode-id="2739" instrument_node=""> these woods, </span><i data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">Kind</span></i><span data-dcnode-id="2736" instrument_node="">. I am the land and the mountains too. And I hunger, so I think I will eat one of you.”
</span></p><span data-dcnode-id="2734" instrument_node="">
</span><figure class="thumb tright" data-dcnode-id="2714" style="width: 250px"><span data-dcnode-id="2733" instrument_node=""> </span><a class="image" data-dcnode-id="2731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/5/5e/Waldhexe_Mural_-_Ravenno_With_Tea.jpg/revision/latest%3Fcb%3D20200708012603"><img alt="" class="thumbimage lazyloaded" data-dcnode-id="2732" data-image-key="Waldhexe_Mural_-_Ravenno_With_Tea.jpg" data-image-name="Waldhexe Mural - Ravenno With Tea.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/5/5e/Waldhexe_Mural_-_Ravenno_With_Tea.jpg/revision/latest/scale-to-width-down/250?cb=20200708012603" decoding="async" height="162" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/5/5e/Waldhexe_Mural_-_Ravenno_With_Tea.jpg/revision/latest/scale-to-width-down/250%3Fcb%3D20200708012603&amp;raw" width="250"></a><span data-dcnode-id="2730" instrument_node=""> </span><noscript data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">&lt;a href="https://static.wikia.nocookie.net/criticalrole/images/5/5e/Waldhexe_Mural_-_Ravenno_With_Tea.jpg/revision/latest?cb=20200708012603" class="image"&gt;&lt;img alt="" src="https://static.wikia.nocookie.net/criticalrole/images/5/5e/Waldhexe_Mural_-_Ravenno_With_Tea.jpg/revision/latest/scale-to-width-down/250?cb=20200708012603" decoding="async" width="250" height="162" class="thumbimage" data-image-name="Waldhexe Mural - Ravenno With Tea.jpg" data-image-key="Waldhexe_Mural_-_Ravenno_With_Tea.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/5/5e/Waldhexe_Mural_-_Ravenno_With_Tea.jpg/revision/latest/scale-to-width-down/250?cb=20200708012603" /&gt;&lt;/a&gt;</span></noscript><span data-dcnode-id="2727" instrument_node=""> </span><figcaption class="thumbcaption" data-dcnode-id="2716"><span data-dcnode-id="2726" instrument_node=""> </span><p class="caption" data-dcnode-id="2718"><span data-dcnode-id="2725" instrument_node="">Fan art of the Waldhexe mural, by </span><a data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Category%3AArt_by_Joanna_Johnen" title="Category:Art by Joanna Johnen"><span data-dcnode-id="2724" instrument_node="">Joanna Johnen</span></a><span data-dcnode-id="2722" instrument_node="">.</span><sup class="reference" data-dcnode-id="2719" id="cite_ref-5"><a data-dcnode-id="2720" href="#cite_note-5"><span data-dcnode-id="2721" instrument_node="">[art 5]</span></a></sup></p><span data-dcnode-id="2717" instrument_node=""> </span></figcaption><span data-dcnode-id="2715" instrument_node=""> </span></figure><span data-dcnode-id="2713" instrument_node="">
</span><p data-dcnode-id="2708"><span data-dcnode-id="2712" instrument_node="">“Oh, please, </span><i data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">Großmutter</span></i><span data-dcnode-id="2709" instrument_node="">, our parents would surely despair!”
</span></p><p data-dcnode-id="2694"><span data-dcnode-id="2707" instrument_node="">“I must eat, for the land to thrive. If I am not to eat one of you, then I shall eat part of all.” The children, frozen in </span><i data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">Angst</span></i><span data-dcnode-id="2704" instrument_node="">, watched as the </span><i data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">Waldhexe</span></i><span data-dcnode-id="2701" instrument_node=""> stepped forward, stone knife in hand. From one boy, she cut out much of his mind, and ate it, and his thoughts were no longer his own. From the second, a girl, she cut out one eye, and this, too, the </span><i data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">Waldhexe</span></i><span data-dcnode-id="2698" instrument_node=""> ate, and the child never saw true again. And from the last, she swallowed his heart, and he never knew love again. “Now, I am fed, </span><i data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">Kinder</span></i><span data-dcnode-id="2695" instrument_node="">. And the land will flourish and wheat can grow. You may go, as long as you send me your children, and their children after them. Thus will your blood and bones nourish the land, and your kingdom can continue to grow.”
</span></p><p data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">And so it has, for years upon years, unto this very day.
</span></p><span data-dcnode-id="2691" instrument_node="">
</span><h3 data-dcnode-id="2686"><span data-dcnode-id="2690" id="Ashley's_Story"></span><span class="mw-headline" data-dcnode-id="2687" id="Ashley.27s_Story"><b data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Ashley's Story</span></b></span></h3><span data-dcnode-id="2685" instrument_node="">
</span><p data-dcnode-id="2670"><b data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Pike's Purple Jewel Cake</span></b><span data-dcnode-id="2682" instrument_node=""> (</span><a data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="2681" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="2679" instrument_node=""> 2020-06-11)</span><br data-dcnode-id="2678"><span data-dcnode-id="2677" instrument_node="">
Oh! Hi, friends! </span><a class="mw-redirect" data-dcnode-id="2675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Pike" title="Pike"><span data-dcnode-id="2676" instrument_node="">Pike</span></a><span data-dcnode-id="2674" instrument_node=""> here to tell you the recipe to my favorite delicacy in the entire world, the Purple Jewel Cake of </span><a data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Marquet" title="Marquet"><span data-dcnode-id="2673" instrument_node="">Marquet</span></a><span data-dcnode-id="2671" instrument_node="">. But first, I'm going to tell you the tale behind this tasty treat.
</span></p><p data-dcnode-id="2665"><span data-dcnode-id="2669" instrument_node="">There once lived a woman named Madame Marquita Parcata. She was very wealthy, and she lived in a huge castle that overlooked the entire city of Marquet. She draped herself in purple velvets, and wore dresses made of the finest silks. But she was very mean, and </span><i data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">very</span></i><span data-dcnode-id="2666" instrument_node=""> greedy. She was the wealthiest woman in Marquet, but it wasn't enough for her.  
</span></p><p data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">And then, one day, a little girl knocked on her door, and when Marquita answered, the girl said, "I'm sorry to trouble you, ma'am, but I've traveled very far and if I could just have some water and maybe a place to rest my head for the night, I would greatly appreciate it. And in return, I could give you a simple wish."
</span></p><p data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">Madame Parcata replied, "I can give you water, but I have no room for you to rest."
</span></p><p data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">After the girl drank the water, she said, "Thank you, ma'am. Now, what is it that you would like for your wish?"
</span></p><p data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">Madame Parcata said, "Well, I want to be worth all the money in the world. I want people to know of me and be in awe of all of my riches."
</span></p><p data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">The girl said, "Okay. This, I can do for you. And for giving me half of my request, I shall do the same for you." And then she said the words, "Plimpy, drimpy, flompies, and bompies," and in that moment, Marquita was turned the most beautiful sparkling purple jewel, as big as an apple. Forever. But she got her wish. People from all over the world came to see the Purple Jewel of Marquet.
</span></p><p data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">So, be kind to one another. If someone asks for a helping hand, give it to them. And always be careful what you wish for.
</span></p><p data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">Oh! I almost forgot to tell you the recipe! Well, you can figure it out.
</span></p><p data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">That's all for now! 
</span></p><span data-dcnode-id="2648" instrument_node="">
</span><h3 data-dcnode-id="2643"><span data-dcnode-id="2647" id="Marisha's_Story"></span><span class="mw-headline" data-dcnode-id="2644" id="Marisha.27s_Story"><b data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">Marisha's Story</span></b></span></h3><span data-dcnode-id="2642" instrument_node="">
</span><p data-dcnode-id="2635"><b data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Story of Beau's</span></b><span data-dcnode-id="2639" instrument_node=""> (</span><a data-dcnode-id="2637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="2638" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="2636" instrument_node=""> 2020-06-25)
</span></p><span data-dcnode-id="2634" instrument_node="">
</span><figure class="thumb tright" data-dcnode-id="2614" style="width: 200px"><span data-dcnode-id="2633" instrument_node=""> </span><a class="image" data-dcnode-id="2631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/1/10/The_Stassmans%2527_Ad_-_Nomi_Starry.jpg/revision/latest%3Fcb%3D20200711194109"><img alt="" class="thumbimage lazyloaded" data-dcnode-id="2632" data-image-key="The_Stassmans%27_Ad_-_Nomi_Starry.jpg" data-image-name="The Stassmans' Ad - Nomi Starry.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/1/10/The_Stassmans%27_Ad_-_Nomi_Starry.jpg/revision/latest/scale-to-width-down/200?cb=20200711194109" decoding="async" height="232" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/1/10/The_Stassmans%2527_Ad_-_Nomi_Starry.jpg/revision/latest/scale-to-width-down/200%3Fcb%3D20200711194109&amp;raw" width="200"></a><span data-dcnode-id="2630" instrument_node=""> </span><noscript data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">&lt;a href="https://static.wikia.nocookie.net/criticalrole/images/1/10/The_Stassmans%27_Ad_-_Nomi_Starry.jpg/revision/latest?cb=20200711194109" class="image"&gt;&lt;img alt="" src="https://static.wikia.nocookie.net/criticalrole/images/1/10/The_Stassmans%27_Ad_-_Nomi_Starry.jpg/revision/latest/scale-to-width-down/200?cb=20200711194109" decoding="async" width="200" height="232" class="thumbimage" data-image-name="The Stassmans&amp;#39; Ad - Nomi Starry.jpg" data-image-key="The_Stassmans%27_Ad_-_Nomi_Starry.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/1/10/The_Stassmans%27_Ad_-_Nomi_Starry.jpg/revision/latest/scale-to-width-down/200?cb=20200711194109" /&gt;&lt;/a&gt;</span></noscript><span data-dcnode-id="2627" instrument_node=""> </span><figcaption class="thumbcaption" data-dcnode-id="2616"><span data-dcnode-id="2626" instrument_node=""> </span><p class="caption" data-dcnode-id="2618"><span data-dcnode-id="2625" instrument_node="">Fan art of the Stassmans' flier, by </span><a data-dcnode-id="2623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Category%3AArt_by_Nomi_Starry" title="Category:Art by Nomi Starry"><span data-dcnode-id="2624" instrument_node="">Nomi Starry</span></a><span data-dcnode-id="2622" instrument_node="">.</span><sup class="reference" data-dcnode-id="2619" id="cite_ref-6"><a data-dcnode-id="2620" href="#cite_note-6"><span data-dcnode-id="2621" instrument_node="">[art 6]</span></a></sup></p><span data-dcnode-id="2617" instrument_node=""> </span></figcaption><span data-dcnode-id="2615" instrument_node=""> </span></figure><span data-dcnode-id="2613" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2612" instrument_node="">Expositor </span><a data-dcnode-id="2610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Beauregard_Lionett" title="Beauregard Lionett"><span data-dcnode-id="2611" instrument_node="">Beauregard Lionett</span></a><span data-dcnode-id="2609" instrument_node=""> here, and let me tell you about one of my greatest achievements while I still worked for </span><a data-dcnode-id="2607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Thoreau_Lionett" title="Thoreau Lionett"><span data-dcnode-id="2608" instrument_node="">my dad</span></a><span data-dcnode-id="2606" instrument_node=""> in </span><a data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Kamordah" title="Kamordah"><span data-dcnode-id="2605" instrument_node="">Kamordah</span></a><span data-dcnode-id="2603" instrument_node="">. One summer, a rival winery decided to promote their upcoming vintage by posting a bunch of fliers smearing our family name. "Why drink like an animal when you can drink like a king?" it said, while featuring art of a pompous old man in a crown holding a lion in a chain. Needless to say, my father wasn't  impressed, and enlisted me to go talk to the </span><a data-dcnode-id="2601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Stassman_family" title="Stassman family"><span data-dcnode-id="2602" instrument_node="">Stassmans</span></a><span data-dcnode-id="2600" instrument_node=""> about having the fliers removed. Which I did -- in my own way.
</span></p><p data-dcnode-id="2594"><span data-dcnode-id="2598" instrument_node="">I decided to pose as Fiona Alderbrook, an interested distributor who would love to have a tour. But right before I entered the estate, I took a big swig of mycothistle extract, generally used by clerics to induce vomiting within about thirty minutes after ingesting. They walked me through their entire operation, finishing the tour by presenting a giant steel drum filled with this season's vintage, mere days away from being bottled. Eleanor Stassman opened the vat, and just as she finishes waxing poetically on the patience needed over the eighteen months to allow the malolactic fermentation process to fully achieve the perfect nuances of flavors... </span><i data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">(chokes, vomits)</span></i><span data-dcnode-id="2595" instrument_node="">. With expert aim and precision, my haggis and sauerkraut from the night before splashed into the vat of zinfandel. "That's for the Lionetts, you turd bottlers!" I yelled.
</span></p><span data-dcnode-id="2593" instrument_node="">
</span><figure class="thumb tright" data-dcnode-id="2573" style="width: 225px"><span data-dcnode-id="2592" instrument_node=""> </span><a class="image" data-dcnode-id="2590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/8/8e/Beau_and_Boundaries_-_Elaine_Tipping.jpg/revision/latest%3Fcb%3D20200629170408"><img alt="" class="thumbimage lazyload" data-dcnode-id="2591" data-image-key="Beau_and_Boundaries_-_Elaine_Tipping.jpg" data-image-name="Beau and Boundaries - Elaine Tipping.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/8/8e/Beau_and_Boundaries_-_Elaine_Tipping.jpg/revision/latest/scale-to-width-down/225?cb=20200629170408" decoding="async" height="144" src="data:image/gif;base64,R0lGODlhAQABAIABAAAAAP///yH5BAEAAAEALAAAAAABAAEAQAICTAEAOw%3D%3D" width="225"></a><span data-dcnode-id="2589" instrument_node=""> </span><noscript data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">&lt;a href="https://static.wikia.nocookie.net/criticalrole/images/8/8e/Beau_and_Boundaries_-_Elaine_Tipping.jpg/revision/latest?cb=20200629170408" class="image"&gt;&lt;img alt="" src="https://static.wikia.nocookie.net/criticalrole/images/8/8e/Beau_and_Boundaries_-_Elaine_Tipping.jpg/revision/latest/scale-to-width-down/225?cb=20200629170408" decoding="async" width="225" height="144" class="thumbimage" data-image-name="Beau and Boundaries - Elaine Tipping.jpg" data-image-key="Beau_and_Boundaries_-_Elaine_Tipping.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/8/8e/Beau_and_Boundaries_-_Elaine_Tipping.jpg/revision/latest/scale-to-width-down/225?cb=20200629170408" /&gt;&lt;/a&gt;</span></noscript><span data-dcnode-id="2586" instrument_node=""> </span><figcaption class="thumbcaption" data-dcnode-id="2575"><span data-dcnode-id="2585" instrument_node=""> </span><p class="caption" data-dcnode-id="2577"><span data-dcnode-id="2584" instrument_node="">Fan art of Beau and Boundaries, by </span><a data-dcnode-id="2582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Category%3AArt_by_Elaine_Tipping" title="Category:Art by Elaine Tipping"><span data-dcnode-id="2583" instrument_node="">Elaine Tipping</span></a><span data-dcnode-id="2581" instrument_node="">.</span><sup class="reference" data-dcnode-id="2578" id="cite_ref-7"><a data-dcnode-id="2579" href="#cite_note-7"><span data-dcnode-id="2580" instrument_node="">[art 7]</span></a></sup></p><span data-dcnode-id="2576" instrument_node=""> </span></figcaption><span data-dcnode-id="2574" instrument_node=""> </span></figure><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">Needless to say, the ruse was up. "Guards, get her!" Eleanor yelled. I bolted for the gate, popping the first guard with a running haymaker and dodging the second, flipping them off one last time when I got to the street for good measure.
</span></p><p data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">My father didn't really approve of my methods, but he did have a hard time arguing the effectiveness. The next day, with no product left to sell, not a single flier could be found in Kamordah for Stassman wine. Sorry, Eleanor.
</span></p><span data-dcnode-id="2567" instrument_node="">
</span><h3 data-dcnode-id="2562"><span data-dcnode-id="2566" id="Taliesin's_Story"></span><span class="mw-headline" data-dcnode-id="2563" id="Taliesin.27s_Story"><b data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">Taliesin's Story</span></b></span></h3><span data-dcnode-id="2561" instrument_node="">
</span><p data-dcnode-id="2531"><b data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">Caduceus's Cautionary Chronicle </span></b><span data-dcnode-id="2558" instrument_node=""> (</span><a data-dcnode-id="2556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="2557" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="2555" instrument_node=""> 2020-07-07)</span><br data-dcnode-id="2554"><span data-dcnode-id="2553" instrument_node="">
</span><a data-dcnode-id="2551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Caduceus_Clay" title="Caduceus Clay"><span data-dcnode-id="2552" instrument_node="">Caduceus Clay</span></a><span data-dcnode-id="2550" instrument_node=""> here. I'm going to tell you a story about my siblings, and a particularly spooky encounter they experienced. </span><a data-dcnode-id="2548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Clarabelle_Clay" title="Clarabelle Clay"><span data-dcnode-id="2549" instrument_node="">Clarabelle</span></a><span data-dcnode-id="2547" instrument_node="">, Colin*, and </span><a data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Calliope_Clay" title="Calliope Clay"><span data-dcnode-id="2546" instrument_node="">Calliope Clay</span></a><span data-dcnode-id="2544" instrument_node=""> were carting the cadaver of a cleric of </span><a data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Corellon" title="Corellon"><span data-dcnode-id="2543" instrument_node="">Corellon</span></a><span data-dcnode-id="2541" instrument_node="">, named Kristof Kasimar, through the </span><a data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Savalirwood" title="Savalirwood"><span data-dcnode-id="2540" instrument_node="">Savalirwood</span></a><span data-dcnode-id="2538" instrument_node=""> towards its resting place within the </span><a data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Blooming_Grove" title="Blooming Grove"><span data-dcnode-id="2537" instrument_node="">Blooming Grove</span></a><span data-dcnode-id="2535" instrument_node=""> Cemetery. As the Clays made their way beneath the canopy of crooked conifers, they couldn't shake the feeling that they were being watched. Calliope halted the cart and confidently called out, "Whoever follows us in these woods, show yourself! For </span><a data-dcnode-id="2533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Melora" title="Melora"><span data-dcnode-id="2534" instrument_node="">Melora</span></a><span data-dcnode-id="2532" instrument_node=""> help you, I will defend this cleric charged to my care."
</span></p><p data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">From the trees, a whispered voice called out, "Help." Calliope, whose caution was certainly lacking, sprung into action, carelessly leaving her kin to guard their cargo. Minutes passed with no sign of Calliope, making Colin and Clarabelle nervous. Colin, who had seen his fair share of creepiness in his chosen occupation, immediately thought of the cleric in the cart, for Colin knew Corellon the Archeart was known to these woods, and could be calling to their own cleric's cold cadaver.
</span></p><span data-dcnode-id="2528" instrument_node="">
</span><figure class="thumb tright" data-dcnode-id="2508" style="width: 225px"><span data-dcnode-id="2527" instrument_node=""> </span><a class="image" data-dcnode-id="2525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/b/b8/The_Archeart_in_the_Cart_-_Sally_Grew.jpg/revision/latest%3Fcb%3D20200927024800"><img alt="" class="thumbimage lazyload" data-dcnode-id="2526" data-image-key="The_Archeart_in_the_Cart_-_Sally_Grew.jpg" data-image-name="The Archeart in the Cart - Sally Grew.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/b/b8/The_Archeart_in_the_Cart_-_Sally_Grew.jpg/revision/latest/scale-to-width-down/225?cb=20200927024800" decoding="async" height="287" src="data:image/gif;base64,R0lGODlhAQABAIABAAAAAP///yH5BAEAAAEALAAAAAABAAEAQAICTAEAOw%3D%3D" width="225"></a><span data-dcnode-id="2524" instrument_node=""> </span><noscript data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">&lt;a href="https://static.wikia.nocookie.net/criticalrole/images/b/b8/The_Archeart_in_the_Cart_-_Sally_Grew.jpg/revision/latest?cb=20200927024800" class="image"&gt;&lt;img alt="" src="https://static.wikia.nocookie.net/criticalrole/images/b/b8/The_Archeart_in_the_Cart_-_Sally_Grew.jpg/revision/latest/scale-to-width-down/225?cb=20200927024800" decoding="async" width="225" height="287" class="thumbimage" data-image-name="The Archeart in the Cart - Sally Grew.jpg" data-image-key="The_Archeart_in_the_Cart_-_Sally_Grew.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/b/b8/The_Archeart_in_the_Cart_-_Sally_Grew.jpg/revision/latest/scale-to-width-down/225?cb=20200927024800" /&gt;&lt;/a&gt;</span></noscript><span data-dcnode-id="2521" instrument_node=""> </span><figcaption class="thumbcaption" data-dcnode-id="2510"><span data-dcnode-id="2520" instrument_node=""> </span><p class="caption" data-dcnode-id="2512"><span data-dcnode-id="2519" instrument_node="">Fan art of the Archeart in the Cart, by </span><a data-dcnode-id="2517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Category%3AArt_by_Sally_Grew" title="Category:Art by Sally Grew"><span data-dcnode-id="2518" instrument_node="">Sally Grew</span></a><span data-dcnode-id="2516" instrument_node="">.</span><sup class="reference" data-dcnode-id="2513" id="cite_ref-8"><a data-dcnode-id="2514" href="#cite_note-8"><span data-dcnode-id="2515" instrument_node="">[art 8]</span></a></sup></p><span data-dcnode-id="2511" instrument_node=""> </span></figcaption><span data-dcnode-id="2509" instrument_node=""> </span></figure><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Colin bellowed, "Archeart, give me a sign so that I may be of service to you!"
</span></p><p data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">A ghostly voice then called back, "Be of service." 
</span></p><p data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Colin dashed towards the woods, leaving Clarabelle alone with the corpse in her care. Clarabelle carefully considered the curious call. Being the cleverest of all the Clays, she contrived a game to confirm her theory. "Strange voice," she said, "are you near or far?"
</span></p><p data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">"Near," called the whisper.
</span></p><p data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">"Are you before me or behind me?"
</span></p><p data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">"Before."
</span></p><p data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">Clarabelle walked cautiously into the woods. "Am I cold or warm?" 
</span></p><p data-dcnode-id="2488"><span data-dcnode-id="2492" instrument_node="">After a brief stroll into the tree line, she heard, "Warm." Beneath her feet were the ancient bones of a </span><a data-dcnode-id="2490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Kenku" title="Kenku"><span data-dcnode-id="2491" instrument_node="">kenku</span></a><span data-dcnode-id="2489" instrument_node="">.
</span></p><p data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">Clarabelle called out to Colin and Calliope, with the ghostly echo adding to her caterwaul. Calliope asked, "How did you find them?"
</span></p><p data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">Clarabelle explained, "Calliope, you only listened for danger. Colin, you listened for a sign. I simply heard someone who was lost."
</span></p><p data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">The three Clays considered the kenku corpse, causing it to bloom, which in turn, released its spirit. And that spirit still wanders the forest, playfully copying the cries of nervous travelers who stray too deep into the Savalirwood.
</span></p><p data-dcnode-id="2477"><span data-dcnode-id="2481" instrument_node="">* Taliesin noted that he had used an incorrect name for his brother. "Colin" should be "</span><a data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Colton_Clay" title="Colton Clay"><span data-dcnode-id="2480" instrument_node="">Colton</span></a><span data-dcnode-id="2478" instrument_node="">".
</span></p><span data-dcnode-id="2476" instrument_node="">
</span><h3 data-dcnode-id="2471"><span data-dcnode-id="2475" id="Travis's_Story"></span><span class="mw-headline" data-dcnode-id="2472" id="Travis.27s_Story"><b data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Travis's Story</span></b></span></h3><span data-dcnode-id="2470" instrument_node="">
</span><p data-dcnode-id="2458"><b data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">Grog's Vlog </span></b><span data-dcnode-id="2467" instrument_node=""> (</span><a data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="2466" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="2464" instrument_node=""> 2020-07-21)</span><br data-dcnode-id="2463"><span data-dcnode-id="2462" instrument_node="">
GROG: All right, listen up! </span><a data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Grog_Strongjaw" title="Grog Strongjaw"><span data-dcnode-id="2461" instrument_node="">Grog Strongjaw</span></a><span data-dcnode-id="2459" instrument_node=""> here today to talk to you about the importance of health and fitness. Now a lot of people come to me, and they go, “Grog. You have an amazing body. How do you do it?”
</span></p><p data-dcnode-id="2453"><span data-dcnode-id="2457" instrument_node="">And I go, “Well, like, listen. All you got to know is the entire anatomy and musculature of the </span><a data-dcnode-id="2455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Human" title="Human"><span data-dcnode-id="2456" instrument_node="">human</span></a><span data-dcnode-id="2454" instrument_node=""> body.” So let’s start with the upper body. Right, there’s mirror muscles. So you got your traps, your deltoids, your pectorals, your biceps, your triceps, your lats, your abdominals, and of course, your obliques, all very easy to remember. 
</span></p><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">And they’re like, “How can I work out all of those muscles in one easy way?” 
</span></p><p data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">And I say, “You grab your axe, and you reach back, and –" Hey! What do you mean? I didn’t know there was any more ale! I want some!
</span></p><p data-dcnode-id="2435"><span data-dcnode-id="2448" instrument_node="">MACARONI: What a dummy! Leaving such an amazing communication device behind. </span><a data-dcnode-id="2446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Macaroni_Samsonite" title="Macaroni Samsonite"><span data-dcnode-id="2447" instrument_node="">Macaroni Samsonite</span></a><span data-dcnode-id="2445" instrument_node=""> here. Me and my pal </span><a data-dcnode-id="2443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Buddy" title="Buddy"><span data-dcnode-id="2444" instrument_node="">Buddy</span></a><span data-dcnode-id="2442" instrument_node=""> are going to take over all of </span><a class="mw-redirect" data-dcnode-id="2440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Tal%2527Dorei_%28Republic%29" title="Tal'Dorei (Republic)"><span data-dcnode-id="2441" instrument_node="">Tal'Dorei</span></a><span data-dcnode-id="2439" instrument_node="">  under the guise of the </span><a data-dcnode-id="2437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Darrington_Brigade" title="Darrington Brigade"><span data-dcnode-id="2438" instrument_node="">Darrington Brigade</span></a><span data-dcnode-id="2436" instrument_node="">. But first – oh, shit! 
</span></p><span data-dcnode-id="2434" instrument_node="">
</span><figure class="thumb tright" data-dcnode-id="2414" style="width: 200px"><span data-dcnode-id="2433" instrument_node=""> </span><a class="image" data-dcnode-id="2431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/e/e4/Grog%2527s_Vlog_-_SketchingStephanie.jpg/revision/latest%3Fcb%3D20200723204244"><img alt="" class="thumbimage lazyload" data-dcnode-id="2432" data-image-key="Grog%27s_Vlog_-_SketchingStephanie.jpg" data-image-name="Grog's Vlog - SketchingStephanie.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/e/e4/Grog%27s_Vlog_-_SketchingStephanie.jpg/revision/latest/scale-to-width-down/200?cb=20200723204244" decoding="async" height="193" src="data:image/gif;base64,R0lGODlhAQABAIABAAAAAP///yH5BAEAAAEALAAAAAABAAEAQAICTAEAOw%3D%3D" width="200"></a><span data-dcnode-id="2430" instrument_node=""> </span><noscript data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">&lt;a href="https://static.wikia.nocookie.net/criticalrole/images/e/e4/Grog%27s_Vlog_-_SketchingStephanie.jpg/revision/latest?cb=20200723204244" class="image"&gt;&lt;img alt="" src="https://static.wikia.nocookie.net/criticalrole/images/e/e4/Grog%27s_Vlog_-_SketchingStephanie.jpg/revision/latest/scale-to-width-down/200?cb=20200723204244" decoding="async" width="200" height="193" class="thumbimage" data-image-name="Grog&amp;#39;s Vlog - SketchingStephanie.jpg" data-image-key="Grog%27s_Vlog_-_SketchingStephanie.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/e/e4/Grog%27s_Vlog_-_SketchingStephanie.jpg/revision/latest/scale-to-width-down/200?cb=20200723204244" /&gt;&lt;/a&gt;</span></noscript><span data-dcnode-id="2427" instrument_node=""> </span><figcaption class="thumbcaption" data-dcnode-id="2416"><span data-dcnode-id="2426" instrument_node=""> </span><p class="caption" data-dcnode-id="2418"><span data-dcnode-id="2425" instrument_node="">Fan art of Grog's sign-off, by </span><a data-dcnode-id="2423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Category%3AArt_by_%40SketchingSteph" title="Category:Art by @SketchingSteph"><span data-dcnode-id="2424" instrument_node="">@SketchingSteph</span></a><span data-dcnode-id="2422" instrument_node="">.</span><sup class="reference" data-dcnode-id="2419" id="cite_ref-9"><a data-dcnode-id="2420" href="#cite_note-9"><span data-dcnode-id="2421" instrument_node="">[art 9]</span></a></sup></p><span data-dcnode-id="2417" instrument_node=""> </span></figcaption><span data-dcnode-id="2415" instrument_node=""> </span></figure><span data-dcnode-id="2413" instrument_node="">
</span><p data-dcnode-id="2402"><span data-dcnode-id="2412" instrument_node="">GROG: Hey, get away from there, you little weasel dinglebat piece of shit! Oh, hi. What was I talking about? Oh, that’s right. My victory at </span><a data-dcnode-id="2410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/The_Crucible" title="The Crucible"><span data-dcnode-id="2411" instrument_node="">the Crucible</span></a><span data-dcnode-id="2409" instrument_node=""> in </span><a data-dcnode-id="2407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Vasselheim" title="Vasselheim"><span data-dcnode-id="2408" instrument_node="">Vasselheim</span></a><span data-dcnode-id="2406" instrument_node=""> against </span><a data-dcnode-id="2404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Kern" title="Kern"><span data-dcnode-id="2405" instrument_node="">Kern</span></a><span data-dcnode-id="2403" instrument_node=""> – piece of shit. You know, he tried to pull me  lip off after I ripped his off the first time, but it didn’t matter. I just pounded him and pounded him and head buttin' him and head buttin' him and head buttin' him and giving him the elbow– you know, in fighting, variety really is the spice of life. So you know, mix it up. All right, that’s it for me and for more content like this, including tales about why peanut butter and pickles is the best sandwich ever, just remember to like, comment, and prescribe. Bidet!
</span></p><span data-dcnode-id="2401" instrument_node="">
</span><div class="gpt-ad ntv-ad ad-slot" data-dcnode-id="2400" id="ntv_ad"></div><h2 data-dcnode-id="2396"><span class="mw-headline" data-dcnode-id="2397" id="Round_Two"><b data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">Round Two</span></b></span></h2><span data-dcnode-id="2395" instrument_node="">
</span><h3 data-dcnode-id="2390"><span data-dcnode-id="2394" id="Matt's_Second_Story"></span><span class="mw-headline" data-dcnode-id="2391" id="Matt.27s_Second_Story"><b data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Matt's Second Story</span></b></span></h3><span data-dcnode-id="2389" instrument_node="">
</span><p data-dcnode-id="2367"><b data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">Return of the Matt</span></b><span data-dcnode-id="2386" instrument_node=""> (</span><a data-dcnode-id="2384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="2385" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="2383" instrument_node=""> 2020-10-20)</span><br data-dcnode-id="2382"><span data-dcnode-id="2381" instrument_node="">
KRODO: Hello, everyone, I am Krodo Wie</span><sup data-dcnode-id="2375" style="font-size: 75%;"><span data-dcnode-id="2376" style="font-size: inherit;" title="This spelling is unknown or unconfirmed.&nbsp; Please update all instances of the word on this page before removing this template."><span data-dcnode-id="2380" instrument_node="">[</span><i data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">spelling?</span></i><span data-dcnode-id="2377" instrument_node="">]</span></span></sup><span data-dcnode-id="2374" instrument_node=""> of the </span><a data-dcnode-id="2372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Cobalt_Soul" title="Cobalt Soul"><span data-dcnode-id="2373" instrument_node="">Cobalt Soul</span></a><span data-dcnode-id="2371" instrument_node="">, and I am seeking to compile as many truthful, first hand accounts with the group known as </span><a data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Vox_Machina" title="Vox Machina"><span data-dcnode-id="2370" instrument_node="">Vox Machina</span></a><span data-dcnode-id="2368" instrument_node=""> for our historical records, so if you could just speak into this arcanosphere orb? Thank you very much.
</span></p><p data-dcnode-id="2340"><a data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Balgus" title="Balgus"><span data-dcnode-id="2366" instrument_node="">BALGUS</span></a><span data-dcnode-id="2364" instrument_node="">: Yeah, well, you see, those little shitheads came into the </span><a data-dcnode-id="2362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Iron_Hearth_Tavern" title="Iron Hearth Tavern"><span data-dcnode-id="2363" instrument_node="">Iron Hearth</span></a><span data-dcnode-id="2361" instrument_node=""> drinking up all the good ale and snorted a metric fuck-ton of </span><a data-dcnode-id="2359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Suude" title="Suude"><span data-dcnode-id="2360" instrument_node="">suude</span></a><span data-dcnode-id="2358" instrument_node="">, robbed the Bronze Grate Manor</span><sup data-dcnode-id="2352" style="font-size: 75%;"><span data-dcnode-id="2353" style="font-size: inherit;" title="This spelling is unknown or unconfirmed.&nbsp; Please update all instances of the word on this page before removing this template."><span data-dcnode-id="2357" instrument_node="">[</span><i data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">spelling?</span></i><span data-dcnode-id="2354" instrument_node="">]</span></span></sup><span data-dcnode-id="2351" instrument_node=""> of their family jewels, and fucked off to </span><a data-dcnode-id="2349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Marquet" title="Marquet"><span data-dcnode-id="2350" instrument_node="">Marquet</span></a><span data-dcnode-id="2348" instrument_node=""> to hunt some sort of legendary phoenix, a beast of beautiful strange gold and maroon feathers known as the Cavelheart,</span><sup data-dcnode-id="2342" style="font-size: 75%;"><span data-dcnode-id="2343" style="font-size: inherit;" title="This spelling is unknown or unconfirmed.&nbsp; Please update all instances of the word on this page before removing this template."><span data-dcnode-id="2347" instrument_node="">[</span><i data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">spelling?</span></i><span data-dcnode-id="2344" instrument_node="">]</span></span></sup><span data-dcnode-id="2341" instrument_node=""> which you apparently can only train with slaad semen.
</span></p><p data-dcnode-id="2331"><span data-dcnode-id="2339" instrument_node="">FARMER: Then three months later my wife and I caught them getting really friendly with our cows. Then they magically turned themselves into cows and then just flew away on wings of moonlight. It was the damndest thing I'd ever seen. Currently, people say that the flying cow squadron has summoned a great cattle demon called Orphie</span><sup data-dcnode-id="2333" style="font-size: 75%;"><span data-dcnode-id="2334" style="font-size: inherit;" title="This spelling is unknown or unconfirmed.&nbsp; Please update all instances of the word on this page before removing this template."><span data-dcnode-id="2338" instrument_node="">[</span><i data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">spelling?</span></i><span data-dcnode-id="2335" instrument_node="">]</span></span></sup><span data-dcnode-id="2332" instrument_node=""> The Dairy King, who now terrorizes the countryside.
</span></p><p data-dcnode-id="2324"><a data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Kaylie" title="Kaylie"><span data-dcnode-id="2330" instrument_node="">KAYLIE</span></a><span data-dcnode-id="2328" instrument_node="">: After which, the </span><a data-dcnode-id="2326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Chroma_Conclave" title="Chroma Conclave"><span data-dcnode-id="2327" instrument_node="">Conclave</span></a><span data-dcnode-id="2325" instrument_node=""> came, and I wrote a little song about my father and his friends that toppled them.
</span></p><span data-dcnode-id="2323" instrument_node="">
</span><dl data-dcnode-id="2308"><dd data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">♪ Vox Machina is largely known for killing dragons four, ♪</span></dd><span data-dcnode-id="2320" instrument_node="">
</span><dd data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">♪ But those whose lives have crossed with them will know my dad's a whore. ♪</span></dd><span data-dcnode-id="2317" instrument_node="">
</span><dd data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">♪ He'll never miss a greasy chance to jump into your bed. ♪</span></dd><span data-dcnode-id="2314" instrument_node="">
</span><dd data-dcnode-id="2309"><span data-dcnode-id="2313" instrument_node="">♪ I hear that's how Vox Machina had fucked poor </span><a data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Thordak" title="Thordak"><span data-dcnode-id="2312" instrument_node="">Thordak</span></a><span data-dcnode-id="2310" instrument_node=""> dead! ♪</span></dd></dl><span data-dcnode-id="2307" instrument_node="">
</span><p data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">I was there, so it's all true.
</span></p><p data-dcnode-id="2301"><a data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Victor" title="Victor"><span data-dcnode-id="2304" instrument_node="">VICTOR</span></a><span data-dcnode-id="2302" instrument_node="">: Music is fine, but this story needs action. Boom! Traps and bombs in every side! Boom! Not a cultist escaped unblown apart! As to how I survived... who knows? Am I ever really here?
</span></p><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">KRODO: Okay! The Cobalt Soul thanks you all. We'll be in touch.
</span></p><span data-dcnode-id="2298" instrument_node="">
</span><h3 data-dcnode-id="2293"><span data-dcnode-id="2297" id="Brian's_Story"></span><span class="mw-headline" data-dcnode-id="2294" id="Brian.27s_Story"><b data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">Brian's Story</span></b></span></h3><span data-dcnode-id="2292" instrument_node="">
</span><p data-dcnode-id="2280"><b data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Two Brothers, One Coast</span></b><span data-dcnode-id="2289" instrument_node=""> (</span><a data-dcnode-id="2287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="2288" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="2286" instrument_node=""> 2020-11-17)</span><br data-dcnode-id="2285"><span data-dcnode-id="2284" instrument_node="">
</span><a data-dcnode-id="2282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Henry_Crabgrass" title="Henry Crabgrass"><span data-dcnode-id="2283" instrument_node="">Henry Crabgrass</span></a><span data-dcnode-id="2281" instrument_node="">: Hey all, it's me, your friend Henry Crabgrass. Just a little heads up that this episode is extra crass and may not be suitable for the little sproutlings in your life. Okay, enjoy the show!
</span></p><span data-dcnode-id="2279" instrument_node="">
</span><figure class="thumb tright" data-dcnode-id="2259" style="width: 225px"><span data-dcnode-id="2278" instrument_node=""> </span><a class="image" data-dcnode-id="2276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/2/24/We_always_stay_up_-_krzyart.jpg/revision/latest%3Fcb%3D20201215213815"><img alt="" class="thumbimage lazyload" data-dcnode-id="2277" data-image-key="We_always_stay_up_-_krzyart.jpg" data-image-name="We always stay up - krzyart.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/2/24/We_always_stay_up_-_krzyart.jpg/revision/latest/scale-to-width-down/225?cb=20201215213815" decoding="async" height="249" src="data:image/gif;base64,R0lGODlhAQABAIABAAAAAP///yH5BAEAAAEALAAAAAABAAEAQAICTAEAOw%3D%3D" width="225"></a><span data-dcnode-id="2275" instrument_node=""> </span><noscript data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">&lt;a href="https://static.wikia.nocookie.net/criticalrole/images/2/24/We_always_stay_up_-_krzyart.jpg/revision/latest?cb=20201215213815" class="image"&gt;&lt;img alt="" src="https://static.wikia.nocookie.net/criticalrole/images/2/24/We_always_stay_up_-_krzyart.jpg/revision/latest/scale-to-width-down/225?cb=20201215213815" decoding="async" width="225" height="249" class="thumbimage" data-image-name="We always stay up - krzyart.jpg" data-image-key="We_always_stay_up_-_krzyart.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/2/24/We_always_stay_up_-_krzyart.jpg/revision/latest/scale-to-width-down/225?cb=20201215213815" /&gt;&lt;/a&gt;</span></noscript><span data-dcnode-id="2272" instrument_node=""> </span><figcaption class="thumbcaption" data-dcnode-id="2261"><span data-dcnode-id="2271" instrument_node=""> </span><p class="caption" data-dcnode-id="2263"><span data-dcnode-id="2270" instrument_node="">Fan art of Brian's story, by </span><a data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Category%3AArt_by_Janelle_Krzykowski" title="Category:Art by Janelle Krzykowski"><span data-dcnode-id="2269" instrument_node="">Janelle Krzykowski</span></a><span data-dcnode-id="2267" instrument_node="">.</span><sup class="reference" data-dcnode-id="2264" id="cite_ref-10"><a data-dcnode-id="2265" href="#cite_note-10"><span data-dcnode-id="2266" instrument_node="">[art 10]</span></a></sup></p><span data-dcnode-id="2262" instrument_node=""> </span></figcaption><span data-dcnode-id="2260" instrument_node=""> </span></figure><span data-dcnode-id="2258" instrument_node="">
</span><p data-dcnode-id="2251"><a class="mw-redirect" data-dcnode-id="2256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Brian_Wayne_Foster" title="Brian Wayne Foster"><span data-dcnode-id="2257" instrument_node="">Brian</span></a><span data-dcnode-id="2255" instrument_node="">: Somewhere off the Menage à Trois Coast of </span><a data-dcnode-id="2253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Exandria" title="Exandria"><span data-dcnode-id="2254" instrument_node="">Exandria</span></a><span data-dcnode-id="2252" instrument_node="">, there were docked two ships, the Horatio and the Fellatio. Despite being so close to each other, the captains of these ships, however, hadn't spoken in years. What was the dispute? Well, it turns out Horatio and Fellatio were named after their captains, and Horatio and Fellatio were brothers. The dispute was over the heraldry of the ships. Horatio wanted his tagline to be, "We never go down," while Fellatio wanted his tagline to be, "We always stay up." One day, unexpectedly, their father showed up to settle this family dispute once and for all. What did he propose? A fifteen-minute glizzy eating contest. Whoever can eat the most glizzies in fifteen minutes gets to don the title for their ship, but should they lose, their riches, crew, and ship go to their father Ignacio.
</span></p><p data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">The next morning, the entire coast came out to see the show despite only finding out about it hours before. Both men showed up ready and hungry, and before someone could yell "Deep Throat" at it, the glizzy contest was on. Fellatio, living up to his name, was literally sliding glizzies down his throat while Horatio struggled. Fellatio got up to fifteen before Horatio was at three. Why? Horatio was trying to chew the glizzies and wash them down with the contest-approved Morning Dew Glizzy Fuel but it wasn't enough. His color started to change. With minutes left, Fellatio was still sliding glizzies down his throat like he had a hollow leg. Horatio started to turn green. The crowd started to notice. Ignacio even leaned in mysteriously and mischievously to his son when all of a sudden Horatio just started retching glizzies all over the dock. He fled through the crowd in shame.
</span></p><p data-dcnode-id="2244"><span data-dcnode-id="2248" instrument_node="">Meanwhile, Fellatio and Ignacio exchanged a very shady glance and Ignacio dropped his </span><i data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Disguise Self</span></i><span data-dcnode-id="2245" instrument_node=""> and revealed himself to be who he really was: their long-lost sister Susanette. Both captains returned to their ships and sailed off into the sunset for the first time in ages.
</span></p><p data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Family's a son of a bitch.
</span></p><span data-dcnode-id="2241" instrument_node="">
</span><h3 data-dcnode-id="2236"><span data-dcnode-id="2240" id="Laura's_Second_Story"></span><span class="mw-headline" data-dcnode-id="2237" id="Laura.27s_Second_Story"><b data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Laura's Second Story</span></b></span></h3><span data-dcnode-id="2235" instrument_node="">
</span><p data-dcnode-id="2228"><b data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">The Night Before Winter's Crest</span></b><span data-dcnode-id="2232" instrument_node=""> (</span><a data-dcnode-id="2230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criticalrole.fandom.com/wiki/Narrative_Telephone" title="Narrative Telephone"><span data-dcnode-id="2231" instrument_node="">Narrative Telephone</span></a><span data-dcnode-id="2229" instrument_node=""> 2020-12-15)
</span></p><span data-dcnode-id="2227" instrument_node="">
</span><figure class="thumb tright" data-dcnode-id="2207" style="width: 250px"><span data-dcnode-id="2226" instrument_node=""> </span><a class="image" data-dcnode-id="2224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wikia.nocookie.net/criticalrole/images/c/ce/Displacer_mouse_-_Jen%2540Sprigglebear.jpg/revision/latest%3Fcb%3D20201217201112"><img alt="" class="thumbimage lazyload" data-dcnode-id="2225" data-image-key="Displacer_mouse_-_Jen%40Sprigglebear.jpg" data-image-name="Displacer mouse - Jen@Sprigglebear.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/c/ce/Displacer_mouse_-_Jen%40Sprigglebear.jpg/revision/latest/scale-to-width-down/250?cb=20201217201112" decoding="async" height="237" src="data:image/gif;base64,R0lGODlhAQABAIABAAAAAP///yH5BAEAAAEALAAAAAABAAEAQAICTAEAOw%3D%3D" width="250"></a><span data-dcnode-id="2223" instrument_node=""> </span><noscript data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">&lt;a href="https://static.wikia.nocookie.net/criticalrole/images/c/ce/Displacer_mouse_-_Jen%40Sprigglebear.jpg/revision/latest?cb=20201217201112" class="image"&gt;&lt;img alt="" src="https://static.wikia.nocookie.net/criticalrole/images/c/ce/Displacer_mouse_-_Jen%40Sprigglebear.jpg/revision/latest/scale-to-width-down/250?cb=20201217201112" decoding="async" width="250" height="237" class="thumbimage" data-image-name="Displacer mouse - Jen@Sprigglebear.jpg" data-image-key="Displacer_mouse_-_Jen%40Sprigglebear.jpg" data-src="https://static.wikia.nocookie.net/criticalrole/images/c/ce/Displacer_mouse_-_Jen%40Sprigglebear.jpg/revision/latest/scale-to-width-down/250?cb=20201217201112" /&gt;&lt;/a&gt;</span></noscript><span data-dcnode-id="2220" instrument_node=""> </span><figcaption class="thumbcaption" data-dcnode-id="2209"><span data-dcnode-id="2219" instrument_node=""> </span><p class="caption" data-dcnode-id="2211"><span data-dcnode-id="2218" instrument_node="">Fan art of the Displacer
