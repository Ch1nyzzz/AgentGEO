d="2990" instrument_node="">Soviet invasion</span></a><span data-dcnode-id="2988" instrument_node=""> of </span><a data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bukovina" title="Bukovina"><span data-dcnode-id="2987" instrument_node="">Bukovina</span></a><span data-dcnode-id="2985" instrument_node=""> on 28 June 1940 violated the Molotov-Ribbentrop Pact, as it went beyond the Soviet sphere of influence as agreed with </span><a class="mw-redirect" data-dcnode-id="2983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Axis" title="The Axis"><span data-dcnode-id="2984" instrument_node="">the Axis</span></a><span data-dcnode-id="2982" instrument_node="">.</span><sup class="reference" data-dcnode-id="2979" id="cite_ref-27"><a data-dcnode-id="2980" href="#cite_note-27"><span data-dcnode-id="2981" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2978" instrument_node=""> The USSR continued to deny the existence of the Pact's protocols until after the </span><a class="mw-redirect" data-dcnode-id="2976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_USSR" title="Dissolution of the USSR"><span data-dcnode-id="2977" instrument_node="">dissolution of the USSR</span></a><span data-dcnode-id="2975" instrument_node=""> when the </span><a class="mw-redirect" data-dcnode-id="2973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government_of_the_Russian_Federation" title="Government of the Russian Federation"><span data-dcnode-id="2974" instrument_node="">Russian government</span></a><span data-dcnode-id="2972" instrument_node=""> fully acknowledged the existence and authenticity of the secret protocols.</span><sup class="reference" data-dcnode-id="2969" id="cite_ref-28"><a data-dcnode-id="2970" href="#cite_note-28"><span data-dcnode-id="2971" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2968" instrument_node="">
</span></p><span data-dcnode-id="2966" instrument_node="">
</span><h3 data-dcnode-id="2956"><span class="mw-headline" data-dcnode-id="2964" id="End_of_World_War_II"><span data-dcnode-id="2965" instrument_node="">End of World War II</span></span><span class="mw-editsection" data-dcnode-id="2957"><span class="mw-editsection-bracket" data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">[</span></span><a data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSphere_of_influence%26action%3Dedit%26section%3D8" title="Edit section: End of World War II"><span data-dcnode-id="2961" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2955" instrument_node="">
</span><p data-dcnode-id="2937"><span data-dcnode-id="2954" instrument_node="">From 1941 and the </span><a data-dcnode-id="2952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Barbarossa" title="Operation Barbarossa"><span data-dcnode-id="2953" instrument_node="">German attack on the Soviet Union</span></a><span data-dcnode-id="2951" instrument_node="">, the </span><a data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allies_of_World_War_II" title="Allies of World War II"><span data-dcnode-id="2950" instrument_node="">Allied Coalition</span></a><span data-dcnode-id="2948" instrument_node=""> operated on the unwritten assumption that the </span><a class="mw-redirect" data-dcnode-id="2946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Powers" title="Western Powers"><span data-dcnode-id="2947" instrument_node="">Western Powers</span></a><span data-dcnode-id="2945" instrument_node=""> and the </span><a data-dcnode-id="2943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="2944" instrument_node="">Soviet Union</span></a><span data-dcnode-id="2942" instrument_node=""> had each its own sphere of influence. The presumption of the US-British and Soviet unrestricted rights in their respective spheres began to cause difficulties as the Nazi-controlled territory shrank and the allied powers successively liberated other states.</span><sup class="reference" data-dcnode-id="2939" id="cite_ref-Davies_Victory_172-174_29-0"><a data-dcnode-id="2940" href="#cite_note-Davies_Victory_172-174-29"><span data-dcnode-id="2941" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2938" instrument_node="">
</span></p><p data-dcnode-id="2928"><span data-dcnode-id="2936" instrument_node="">The wartime spheres lacked a practical definition and it had never been determined if a dominant allied power was entitled to unilateral decisions only in the area of military activity, or could also force its will regarding political, social and economic future of other states. This overly informal system backfired during the late stages of the war and afterward, when it turned out that the Soviets and the </span><a data-dcnode-id="2934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Bloc" title="Western Bloc"><span data-dcnode-id="2935" instrument_node="">Western Allies</span></a><span data-dcnode-id="2933" instrument_node=""> had very different ideas concerning the administration and future development of the liberated regions and of Germany itself.</span><sup class="reference" data-dcnode-id="2930" id="cite_ref-Davies_Victory_172-174_29-1"><a data-dcnode-id="2931" href="#cite_note-Davies_Victory_172-174-29"><span data-dcnode-id="2932" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2929" instrument_node="">
</span></p><span data-dcnode-id="2927" instrument_node="">
</span><h2 data-dcnode-id="2916"><span data-dcnode-id="2926" id="Cold_War_.281947.E2.80.9391.29"></span><span class="mw-headline" data-dcnode-id="2924" id="Cold_War_(1947–91)"><span data-dcnode-id="2925" instrument_node="">Cold War (1947–91)</span></span><span class="mw-editsection" data-dcnode-id="2917"><span class="mw-editsection-bracket" data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">[</span></span><a data-dcnode-id="2920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSphere_of_influence%26action%3Dedit%26section%3D9" title="Edit section: Cold War (1947–91)"><span data-dcnode-id="2921" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2915" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2901"><div class="thumbinner" data-dcnode-id="2902" style="width:222px;"><a class="image" data-dcnode-id="2913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASoviet_empire_1960.png"><img alt="" class="thumbimage" data-dcnode-id="2914" data-file-height="1000" data-file-width="1000" decoding="async" height="220" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Soviet_empire_1960.png/220px-Soviet_empire_1960.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Soviet_empire_1960.png/330px-Soviet_empire_1960.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Soviet_empire_1960.png/440px-Soviet_empire_1960.png 2x" width="220"></a><span data-dcnode-id="2912" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2903"><div class="magnify" data-dcnode-id="2910"><a class="internal" data-dcnode-id="2911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASoviet_empire_1960.png" title="Enlarge"></a></div><span data-dcnode-id="2909" instrument_node="">Greatest extent of Soviet influence, after the </span><a data-dcnode-id="2907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_Revolution" title="Cuban Revolution"><span data-dcnode-id="2908" instrument_node="">Cuban Revolution</span></a><span data-dcnode-id="2906" instrument_node=""> but before the </span><a class="mw-redirect" data-dcnode-id="2904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Soviet_Split" title="Sino-Soviet Split"><span data-dcnode-id="2905" instrument_node="">Sino-Soviet Split</span></a></div></div></div><span data-dcnode-id="2900" instrument_node="">
</span><p data-dcnode-id="2836"><span data-dcnode-id="2899" instrument_node="">During the </span><a data-dcnode-id="2897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="2898" instrument_node="">Cold War</span></a><span data-dcnode-id="2896" instrument_node="">, the </span><a data-dcnode-id="2894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Empire" title="Soviet Empire"><span data-dcnode-id="2895" instrument_node="">Soviet sphere of influence</span></a><span data-dcnode-id="2893" instrument_node=""> was said to include: the </span><a data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_states" title="Baltic states"><span data-dcnode-id="2892" instrument_node="">Baltic states</span></a><span data-dcnode-id="2890" instrument_node="">, </span><a data-dcnode-id="2888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Europe" title="Central Europe"><span data-dcnode-id="2889" instrument_node="">Central Europe</span></a><span data-dcnode-id="2887" instrument_node="">, some countries in </span><a data-dcnode-id="2885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Europe" title="Eastern Europe"><span data-dcnode-id="2886" instrument_node="">Eastern Europe</span></a><span data-dcnode-id="2884" instrument_node="">, </span><a data-dcnode-id="2882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuba" title="Cuba"><span data-dcnode-id="2883" instrument_node="">Cuba</span></a><span data-dcnode-id="2881" instrument_node="">, </span><a data-dcnode-id="2879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laos" title="Laos"><span data-dcnode-id="2880" instrument_node="">Laos</span></a><span data-dcnode-id="2878" instrument_node="">, </span><a data-dcnode-id="2876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam" title="Vietnam"><span data-dcnode-id="2877" instrument_node="">Vietnam</span></a><span data-dcnode-id="2875" instrument_node="">, </span><a data-dcnode-id="2873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Korea" title="North Korea"><span data-dcnode-id="2874" instrument_node="">North Korea</span></a><span data-dcnode-id="2872" instrument_node="">, and—until the </span><a data-dcnode-id="2870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Soviet_split" title="Sino-Soviet split"><span data-dcnode-id="2871" instrument_node="">Sino-Soviet split</span></a><span data-dcnode-id="2869" instrument_node=""> and </span><a data-dcnode-id="2867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tito%25E2%2580%2593Stalin_split" title="Tito–Stalin split"><span data-dcnode-id="2868" instrument_node="">Tito–Stalin split</span></a><span data-dcnode-id="2866" instrument_node="">—the </span><a class="mw-redirect" data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Republic_of_China" title="People's Republic of China"><span data-dcnode-id="2865" instrument_node="">People's Republic of China</span></a><span data-dcnode-id="2863" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="2861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Federal_Republic_of_Yugoslavia" title="People's Federal Republic of Yugoslavia"><span data-dcnode-id="2862" instrument_node="">People's Federal Republic of Yugoslavia</span></a><span data-dcnode-id="2860" instrument_node="">, among other countries at various times. Meanwhile, </span><a data-dcnode-id="2858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="2859" instrument_node="">United States</span></a><span data-dcnode-id="2857" instrument_node=""> was considered to have a sphere of influence over </span><a data-dcnode-id="2855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Europe" title="Western Europe"><span data-dcnode-id="2856" instrument_node="">Western Europe</span></a><span data-dcnode-id="2854" instrument_node="">, </span><a data-dcnode-id="2852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oceania" title="Oceania"><span data-dcnode-id="2853" instrument_node="">Oceania</span></a><span data-dcnode-id="2851" instrument_node="">, </span><a data-dcnode-id="2849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="2850" instrument_node="">Japan</span></a><span data-dcnode-id="2848" instrument_node="">, and </span><a data-dcnode-id="2846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Korea" title="South Korea"><span data-dcnode-id="2847" instrument_node="">South Korea</span></a><span data-dcnode-id="2845" instrument_node="">, among other places.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2838" style="white-space:nowrap;"><span data-dcnode-id="2844" instrument_node="">[</span><i data-dcnode-id="2840"><a data-dcnode-id="2841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2842" title="This claim needs references to reliable sources. (March 2011)"><span data-dcnode-id="2843" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2839" instrument_node="">]</span></sup><span data-dcnode-id="2837" instrument_node="">
</span></p><p data-dcnode-id="2805"><span data-dcnode-id="2835" instrument_node="">However, the level of control exerted in these spheres varied and was not absolute. For instance, </span><a data-dcnode-id="2833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Fourth_Republic" title="French Fourth Republic"><span data-dcnode-id="2834" instrument_node="">France</span></a><span data-dcnode-id="2832" instrument_node=""> and the </span><a data-dcnode-id="2830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="2831" instrument_node="">United Kingdom</span></a><span data-dcnode-id="2829" instrument_node=""> were able to </span><a data-dcnode-id="2827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suez_Crisis" title="Suez Crisis"><span data-dcnode-id="2828" instrument_node="">act independently to invade</span></a><span data-dcnode-id="2826" instrument_node=""> (with </span><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel" title="Israel"><span data-dcnode-id="2825" instrument_node="">Israel</span></a><span data-dcnode-id="2823" instrument_node="">) the </span><a data-dcnode-id="2821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suez_Canal" title="Suez Canal"><span data-dcnode-id="2822" instrument_node="">Suez Canal</span></a><span data-dcnode-id="2820" instrument_node=""> (they were later forced to withdraw by joint U.S. and Soviet pressure). Later, </span><a data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/France" title="France"><span data-dcnode-id="2819" instrument_node="">France</span></a><span data-dcnode-id="2817" instrument_node=""> was also able to withdraw from the military arm of the </span><a class="mw-redirect" data-dcnode-id="2815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Atlantic_Treaty_Organisation" title="North Atlantic Treaty Organisation"><span data-dcnode-id="2816" instrument_node="">North Atlantic Treaty Organisation</span></a><span data-dcnode-id="2814" instrument_node=""> (NATO). Cuba, as another example, often took positions that put it at odds with its Soviet ally, including momentary alliances with China, economic reorganizations, and providing support for insurgencies in Africa and the Americas without prior approval from the Soviet Union.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2807" style="white-space:nowrap;"><span data-dcnode-id="2813" instrument_node="">[</span><i data-dcnode-id="2809"><a data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2811" title="This claim needs references to reliable sources. (March 2011)"><span data-dcnode-id="2812" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2808" instrument_node="">]</span></sup><span data-dcnode-id="2806" instrument_node="">
</span></p><p data-dcnode-id="2791"><span data-dcnode-id="2804" instrument_node="">With the </span><a class="mw-redirect" data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/End_of_the_Cold_War" title="End of the Cold War"><span data-dcnode-id="2803" instrument_node="">end of the Cold War</span></a><span data-dcnode-id="2801" instrument_node="">, the Eastern Bloc fell apart, effectively ending the Soviet sphere of influence. Then in 1991, the </span><a class="mw-redirect" data-dcnode-id="2799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_USSR" title="Dissolution of the USSR"><span data-dcnode-id="2800" instrument_node="">Soviet Union ceased to exist</span></a><span data-dcnode-id="2798" instrument_node="">, replaced by the </span><a class="mw-redirect" data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Federation" title="Russian Federation"><span data-dcnode-id="2797" instrument_node="">Russian Federation</span></a><span data-dcnode-id="2795" instrument_node=""> and several other </span><a data-dcnode-id="2793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-Soviet_states" title="Post-Soviet states"><span data-dcnode-id="2794" instrument_node="">ex-Soviet Republics</span></a><span data-dcnode-id="2792" instrument_node=""> who became independent states.
</span></p><span data-dcnode-id="2790" instrument_node="">
</span><h2 data-dcnode-id="2779"><span data-dcnode-id="2789" id="Contemporary_Russia_.281990s.E2.80.93present.29"></span><span class="mw-headline" data-dcnode-id="2787" id="Contemporary_Russia_(1990s–present)"><span data-dcnode-id="2788" instrument_node="">Contemporary Russia (1990s–present)</span></span><span class="mw-editsection" data-dcnode-id="2780"><span class="mw-editsection-bracket" data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">[</span></span><a data-dcnode-id="2783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSphere_of_influence%26action%3Dedit%26section%3D10" title="Edit section: Contemporary Russia (1990s–present)"><span data-dcnode-id="2784" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2778" instrument_node="">
</span><link data-dcnode-id="2777" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2764" role="note"><span data-dcnode-id="2776" instrument_node="">See also: </span><a data-dcnode-id="2774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_relations_of_Russia" title="Foreign relations of Russia"><span data-dcnode-id="2775" instrument_node="">Foreign relations of Russia</span></a><span data-dcnode-id="2773" instrument_node="">, </span><a data-dcnode-id="2771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Potential_enlargement_of_the_European_Union" title="Potential enlargement of the European Union"><span data-dcnode-id="2772" instrument_node="">Potential enlargement of the European Union</span></a><span data-dcnode-id="2770" instrument_node="">, </span><a data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enlargement_of_NATO" title="Enlargement of NATO"><span data-dcnode-id="2769" instrument_node="">Enlargement of NATO</span></a><span data-dcnode-id="2767" instrument_node="">, and </span><a data-dcnode-id="2765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Major_non-NATO_ally" title="Major non-NATO ally"><span data-dcnode-id="2766" instrument_node="">Major non-NATO ally</span></a></div><span data-dcnode-id="2763" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2709"><div class="thumbinner" data-dcnode-id="2710" style="width:222px;"><a class="image" data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEU_European_Neighbourhood_Policy_states.svg"><img alt="" class="thumbimage" data-dcnode-id="2762" data-file-height="443" data-file-width="493" decoding="async" height="198" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9b/EU_European_Neighbourhood_Policy_states.svg/220px-EU_European_Neighbourhood_Policy_states.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9b/EU_European_Neighbourhood_Policy_states.svg/330px-EU_European_Neighbourhood_Policy_states.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9b/EU_European_Neighbourhood_Policy_states.svg/440px-EU_European_Neighbourhood_Policy_states.svg.png 2x" width="220"></a><span data-dcnode-id="2760" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2711"><div class="magnify" data-dcnode-id="2758"><a class="internal" data-dcnode-id="2759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEU_European_Neighbourhood_Policy_states.svg" title="Enlarge"></a></div><a data-dcnode-id="2756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Neighbourhood_Policy" title="European Neighbourhood Policy"><span data-dcnode-id="2757" instrument_node="">European Neighbourhood Policy</span></a><span data-dcnode-id="2755" instrument_node=""> (ENP) </span><div class="legend" data-dcnode-id="2747" style="text-align:left;"><span class="legend-color" data-dcnode-id="2751" style="background-color:#3f48cc; color:white; -webkit-column-break-inside: avoid;"><span data-dcnode-id="2752" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2750" instrument_node="">&nbsp;</span><a data-dcnode-id="2748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Member_state_of_the_European_Union" title="Member state of the European Union"><span data-dcnode-id="2749" instrument_node="">EU member states</span></a></div><span data-dcnode-id="2746" instrument_node=""> </span><link data-dcnode-id="2745" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="2739" style="text-align:left;"><span class="legend-color" data-dcnode-id="2743" style="background-color:#00bfff; color:black; -webkit-column-break-inside: avoid;"><span data-dcnode-id="2744" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2742" instrument_node="">&nbsp;</span><a class="mw-redirect" data-dcnode-id="2740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Future_enlargement_of_the_European_Union" title="Future enlargement of the European Union"><span data-dcnode-id="2741" instrument_node="">EU enlargement agenda</span></a></div><span data-dcnode-id="2738" instrument_node=""> </span><link data-dcnode-id="2737" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="2730" style="text-align:left;"><span class="legend-color" data-dcnode-id="2735" style="background-color:#48cc3f; color:black; -webkit-column-break-inside: avoid;"><span data-dcnode-id="2736" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2734" instrument_node="">&nbsp;</span><a data-dcnode-id="2732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Partnership" title="Eastern Partnership"><span data-dcnode-id="2733" instrument_node="">Eastern Partnership</span></a><span data-dcnode-id="2731" instrument_node=""> ENP countries</span></div><span data-dcnode-id="2729" instrument_node=""> </span><link data-dcnode-id="2728" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="2721" style="text-align:left;"><span class="legend-color" data-dcnode-id="2726" style="background-color:#ff8c00; color:black; -webkit-column-break-inside: avoid;"><span data-dcnode-id="2727" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2725" instrument_node="">&nbsp;Other ENP countries (all but Libya are </span><a data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_for_the_Mediterranean" title="Union for the Mediterranean"><span data-dcnode-id="2724" instrument_node="">UfM</span></a><span data-dcnode-id="2722" instrument_node=""> members)</span></div><span data-dcnode-id="2720" instrument_node=""> </span><link data-dcnode-id="2719" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="2712" style="text-align:left;"><span class="legend-color" data-dcnode-id="2717" style="background-color:#fff200; color:black; -webkit-column-break-inside: avoid;"><span data-dcnode-id="2718" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2716" instrument_node="">&nbsp;</span><a data-dcnode-id="2714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_for_the_Mediterranean" title="Union for the Mediterranean"><span data-dcnode-id="2715" instrument_node="">UfM</span></a><span data-dcnode-id="2713" instrument_node=""> member</span></div></div></div></div><span data-dcnode-id="2708" instrument_node="">
</span><p data-dcnode-id="2683"><span data-dcnode-id="2707" instrument_node="">After the </span><a data-dcnode-id="2705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="2706" instrument_node="">fall of the Soviet Union</span></a><span data-dcnode-id="2704" instrument_node="">, the countries of </span><a data-dcnode-id="2702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Europe" title="Eastern Europe"><span data-dcnode-id="2703" instrument_node="">Eastern Europe</span></a><span data-dcnode-id="2701" instrument_node="">, the </span><a data-dcnode-id="2699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caucasus" title="Caucasus"><span data-dcnode-id="2700" instrument_node="">Caucasus</span></a><span data-dcnode-id="2698" instrument_node="">, and </span><a data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Asia" title="Central Asia"><span data-dcnode-id="2697" instrument_node="">Central Asia</span></a><span data-dcnode-id="2695" instrument_node=""> that became independent were often portrayed as part of the </span><a class="mw-redirect" data-dcnode-id="2693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_federation" title="Russian federation"><span data-dcnode-id="2694" instrument_node="">Russian Federation</span></a><span data-dcnode-id="2692" instrument_node="">'s 'sphere of influence'. According to Ulrich Speck, writing for </span><i data-dcnode-id="2689"><a class="mw-redirect" data-dcnode-id="2690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carnegie_Europe" title="Carnegie Europe"><span data-dcnode-id="2691" instrument_node="">Carnegie Europe</span></a></i><span data-dcnode-id="2688" instrument_node="">, "After the breakup of the Soviet Union, the West's focus was on Russia. Western nations implicitly treated the post-Soviet countries (besides the Baltic states) as Russia's sphere of influence."</span><sup class="reference" data-dcnode-id="2685" id="cite_ref-Carnegie141209_30-0"><a data-dcnode-id="2686" href="#cite_note-Carnegie141209-30"><span data-dcnode-id="2687" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2684" instrument_node="">
</span></p><p data-dcnode-id="2671"><span data-dcnode-id="2682" instrument_node="">In 1997, </span><a data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="2681" instrument_node="">NATO</span></a><span data-dcnode-id="2679" instrument_node=""> and Russia signed the </span><i data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">Founding Act on Mutual Relations, Cooperation and Security</span></i><span data-dcnode-id="2676" instrument_node="">, stating the "aim of creating in Europe a common space of security and stability, without dividing lines or spheres of influence limiting the sovereignty of any state."</span><sup class="reference" data-dcnode-id="2673" id="cite_ref-FoundingAct_31-0"><a data-dcnode-id="2674" href="#cite_note-FoundingAct-31"><span data-dcnode-id="2675" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2672" instrument_node="">
</span></p><p data-dcnode-id="2648"><span data-dcnode-id="2670" instrument_node="">On August 31, 2008, Russian president Dmitri Medvedev stated five principles of foreign policy, including the claim of a privileged sphere of influence that comprised "the border region, but not only".</span><sup class="reference" data-dcnode-id="2667" id="cite_ref-32"><a data-dcnode-id="2668" href="#cite_note-32"><span data-dcnode-id="2669" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2666" instrument_node=""> In 2009, Russia asserted that the </span><a data-dcnode-id="2664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="2665" instrument_node="">European Union</span></a><span data-dcnode-id="2663" instrument_node=""> desires a sphere of influence and that the </span><a data-dcnode-id="2661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Partnership" title="Eastern Partnership"><span data-dcnode-id="2662" instrument_node="">Eastern Partnership</span></a><span data-dcnode-id="2660" instrument_node=""> is "an attempt to extend" it.</span><sup class="reference" data-dcnode-id="2657" id="cite_ref-EUO090321_33-0"><a data-dcnode-id="2658" href="#cite_note-EUO090321-33"><span data-dcnode-id="2659" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2656" instrument_node=""> In March that year, Swedish Foreign Minister </span><a data-dcnode-id="2654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carl_Bildt" title="Carl Bildt"><span data-dcnode-id="2655" instrument_node="">Carl Bildt</span></a><span data-dcnode-id="2653" instrument_node=""> stated that the "Eastern Partnership is not about spheres of influence. The difference is that these countries themselves opted to join."</span><sup class="reference" data-dcnode-id="2650" id="cite_ref-EUO090321_33-1"><a data-dcnode-id="2651" href="#cite_note-EUO090321-33"><span data-dcnode-id="2652" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2649" instrument_node="">
</span></p><p data-dcnode-id="2627"><span data-dcnode-id="2647" instrument_node="">
Following the 2008 </span><a data-dcnode-id="2645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russo-Georgian_War" title="Russo-Georgian War"><span data-dcnode-id="2646" instrument_node="">Russo-Georgian War</span></a><span data-dcnode-id="2644" instrument_node="">, </span><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/V%25C3%25A1clav_Havel" title="Václav Havel"><span data-dcnode-id="2643" instrument_node="">Václav Havel</span></a><span data-dcnode-id="2641" instrument_node=""> and other former central and eastern European leaders signed an open letter stating that Russia had "violated the core principles of the </span><a class="mw-redirect" data-dcnode-id="2639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Helsinki_Final_Act" title="Helsinki Final Act"><span data-dcnode-id="2640" instrument_node="">Helsinki Final Act</span></a><span data-dcnode-id="2638" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="2636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charter_of_Paris" title="Charter of Paris"><span data-dcnode-id="2637" instrument_node="">Charter of Paris</span></a><span data-dcnode-id="2635" instrument_node=""> ... all in the name of defending a sphere of influence on its borders."</span><sup class="reference" data-dcnode-id="2632" id="cite_ref-GW090715_34-0"><a data-dcnode-id="2633" href="#cite_note-GW090715-34"><span data-dcnode-id="2634" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2631" instrument_node=""> In April 2014, NATO stated that, contrary to the </span><i data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Founding Act</span></i><span data-dcnode-id="2628" instrument_node="">,</span></p><blockquote data-dcnode-id="2618"><p data-dcnode-id="2619"><span data-dcnode-id="2626" instrument_node="">Russia now appears to be attempting to recreate a sphere of influence by seizing a part of Ukraine, maintaining large numbers of forces on its borders, and demanding, as Russian Foreign Minister </span><a data-dcnode-id="2624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sergey_Lavrov" title="Sergey Lavrov"><span data-dcnode-id="2625" instrument_node="">Sergei Lavrov</span></a><span data-dcnode-id="2623" instrument_node=""> recently stated, that "Ukraine cannot be part of any bloc."</span><sup class="reference" data-dcnode-id="2620" id="cite_ref-NATO140512_35-0"><a data-dcnode-id="2621" href="#cite_note-NATO140512-35"><span data-dcnode-id="2622" instrument_node="">[35]</span></a></sup></p></blockquote><p data-dcnode-id="2602"><span data-dcnode-id="2617" instrument_node="">Criticising Russia in November 2014, German Chancellor </span><a data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angela_Merkel" title="Angela Merkel"><span data-dcnode-id="2616" instrument_node="">Angela Merkel</span></a><span data-dcnode-id="2614" instrument_node=""> said that "old thinking about spheres of influence, which runs roughshod over international law" put the "entire European peace order into question."</span><sup class="reference" data-dcnode-id="2611" id="cite_ref-EUO141117_36-0"><a data-dcnode-id="2612" href="#cite_note-EUO141117-36"><span data-dcnode-id="2613" instrument_node="">[36]</span></a></sup><span data-dcnode-id="2610" instrument_node=""> In January 2017, British Prime Minister </span><a data-dcnode-id="2608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theresa_May" title="Theresa May"><span data-dcnode-id="2609" instrument_node="">Theresa May</span></a><span data-dcnode-id="2607" instrument_node=""> said, "We should not jeopardise the freedoms that President Reagan and Mrs Thatcher brought to Eastern Europe by accepting President Putin's claim that it is now in his sphere of influence."</span><sup class="reference" data-dcnode-id="2604" id="cite_ref-37"><a data-dcnode-id="2605" href="#cite_note-37"><span data-dcnode-id="2606" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2603" instrument_node="">
</span></p><h2 data-dcnode-id="2592"><span class="mw-headline" data-dcnode-id="2600" id="Corporations"><span data-dcnode-id="2601" instrument_node="">Corporations</span></span><span class="mw-editsection" data-dcnode-id="2593"><span class="mw-editsection-bracket" data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">[</span></span><a data-dcnode-id="2596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSphere_of_influence%26action%3Dedit%26section%3D11" title="Edit section: Corporations"><span data-dcnode-id="2597" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2591" instrument_node="">
</span><p data-dcnode-id="2586"><span data-dcnode-id="2590" instrument_node="">In corporate terms, the sphere of influence of a </span><a data-dcnode-id="2588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Business" title="Business"><span data-dcnode-id="2589" instrument_node="">business</span></a><span data-dcnode-id="2587" instrument_node="">, organization, or group can show its power and influence in the decisions of other businesses/organizations/groups. The influence shows in several ways, such as in size, frequency of visits, etc. In most cases, a company described as "bigger" has a larger sphere of influence.
</span></p><p data-dcnode-id="2559"><span data-dcnode-id="2585" instrument_node="">For example, the software company </span><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microsoft" title="Microsoft"><span data-dcnode-id="2584" instrument_node="">Microsoft</span></a><span data-dcnode-id="2582" instrument_node=""> has a </span><a data-dcnode-id="2580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Embrace%2C_extend%2C_and_extinguish" title="Embrace, extend, and extinguish"><span data-dcnode-id="2581" instrument_node="">large sphere of influence</span></a><span data-dcnode-id="2579" instrument_node=""> in the market of </span><a data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operating_system" title="Operating system"><span data-dcnode-id="2578" instrument_node="">operating systems</span></a><span data-dcnode-id="2576" instrument_node="">; any entity wishing to sell a software product may weigh up compatibility with Microsoft's products as part of a marketing plan.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2569" style="white-space:nowrap;"><span data-dcnode-id="2575" instrument_node="">[</span><i data-dcnode-id="2571"><a data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2573" title="This claim needs references to reliable sources. (May 2012)"><span data-dcnode-id="2574" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2570" instrument_node="">]</span></sup><span data-dcnode-id="2568" instrument_node=""> In another example, retailers wishing to make the most profits must ensure they open their stores in the correct location. This is also true for shopping centers that, to reap the most profits, must be able to attract customers to their vicinity.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2561" style="white-space:nowrap;"><span data-dcnode-id="2567" instrument_node="">[</span><i data-dcnode-id="2563"><a data-dcnode-id="2564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2565" title="This claim needs references to reliable sources. (November 2015)"><span data-dcnode-id="2566" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2562" instrument_node="">]</span></sup><span data-dcnode-id="2560" instrument_node="">
</span></p><p data-dcnode-id="2549"><span data-dcnode-id="2558" instrument_node="">There is no defined scale measuring such spheres of influence. However, one can evaluate the spheres of influence of two shopping centers by seeing how far people are prepared to travel to each shopping center, how much time they spend in its vicinity, how often they visit, the order of goods available, etc.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2551" style="white-space:nowrap;"><span data-dcnode-id="2557" instrument_node="">[</span><i data-dcnode-id="2553"><a data-dcnode-id="2554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2555" title="This claim needs references to reliable sources. (November 2015)"><span data-dcnode-id="2556" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2552" instrument_node="">]</span></sup><span data-dcnode-id="2550" instrument_node="">
</span></p><p data-dcnode-id="2527"><span data-dcnode-id="2548" instrument_node="">Corporations have significant influence on the regulations and regulators that monitor them. During the </span><a data-dcnode-id="2546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gilded_Age" title="Gilded Age"><span data-dcnode-id="2547" instrument_node="">Gilded Age</span></a><span data-dcnode-id="2545" instrument_node=""> in the United States, corruption was rampant as business leaders spent significant amounts of money ensuring that government did not regulate their activities.</span><sup class="reference" data-dcnode-id="2542" id="cite_ref-38"><a data-dcnode-id="2543" href="#cite_note-38"><span data-dcnode-id="2544" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2541" instrument_node=""> </span><a data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wall_Street" title="Wall Street"><span data-dcnode-id="2540" instrument_node="">Wall Street</span></a><span data-dcnode-id="2538" instrument_node=""> spent a record $2 billion trying to influence the </span><a data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2016_United_States_elections" title="2016 United States elections"><span data-dcnode-id="2537" instrument_node="">2016 United States elections</span></a><span data-dcnode-id="2535" instrument_node="">.</span><sup class="reference" data-dcnode-id="2532" id="cite_ref-39"><a data-dcnode-id="2533" href="#cite_note-39"><span data-dcnode-id="2534" instrument_node="">[39]</span></a></sup><sup class="reference" data-dcnode-id="2529" id="cite_ref-40"><a data-dcnode-id="2530" href="#cite_note-40"><span data-dcnode-id="2531" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2528" instrument_node="">
</span></p><span data-dcnode-id="2526" instrument_node="">
