</span><div class="hatnote navigation-not-searchable" data-dcnode-id="4007" role="note"><span data-dcnode-id="4011" instrument_node="">For other uses, see </span><a class="mw-disambig" data-dcnode-id="4009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sphere_of_influence_%28disambiguation%29" title="Sphere of influence (disambiguation)"><span data-dcnode-id="4010" instrument_node="">Sphere of influence (disambiguation)</span></a><span data-dcnode-id="4008" instrument_node="">.</span></div><span data-dcnode-id="4006" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3988"><div class="thumbinner" data-dcnode-id="3989" style="width:222px;"><a class="image" data-dcnode-id="4004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMonroe_doctrine.jpg"><img alt="" class="thumbimage" data-dcnode-id="4005" data-file-height="450" data-file-width="403" decoding="async" height="246" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Monroe_doctrine.jpg/220px-Monroe_doctrine.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Monroe_doctrine.jpg/330px-Monroe_doctrine.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/a/ad/Monroe_doctrine.jpg 2x" width="220"></a><span data-dcnode-id="4003" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3990"><div class="magnify" data-dcnode-id="4001"><a class="internal" data-dcnode-id="4002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMonroe_doctrine.jpg" title="Enlarge"></a></div><span data-dcnode-id="4000" instrument_node="">A 1912 newspaper cartoon highlighting the </span><a data-dcnode-id="3998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="3999" instrument_node="">United States</span></a><span data-dcnode-id="3997" instrument_node="">' influence in </span><a data-dcnode-id="3995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latin_America" title="Latin America"><span data-dcnode-id="3996" instrument_node="">Latin America</span></a><span data-dcnode-id="3994" instrument_node=""> following the </span><a data-dcnode-id="3992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monroe_Doctrine" title="Monroe Doctrine"><span data-dcnode-id="3993" instrument_node="">Monroe Doctrine</span></a><span data-dcnode-id="3991" instrument_node="">.</span></div></div></div><span data-dcnode-id="3987" instrument_node="">
</span><p data-dcnode-id="3956"><span data-dcnode-id="3986" instrument_node="">In the field of </span><a data-dcnode-id="3984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_relations" title="International relations"><span data-dcnode-id="3985" instrument_node="">international relations</span></a><span data-dcnode-id="3983" instrument_node="">, a </span><b data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">sphere of influence</span></b><span data-dcnode-id="3980" instrument_node=""> (</span><b data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">SOI</span></b><span data-dcnode-id="3977" instrument_node="">) is a spatial region or concept division over which a state or organization has a level of </span><a class="mw-redirect" data-dcnode-id="3975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural" title="Cultural"><span data-dcnode-id="3976" instrument_node="">cultural</span></a><span data-dcnode-id="3974" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic" title="Economic"><span data-dcnode-id="3973" instrument_node="">economic</span></a><span data-dcnode-id="3971" instrument_node="">, </span><a data-dcnode-id="3969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military" title="Military"><span data-dcnode-id="3970" instrument_node="">military</span></a><span data-dcnode-id="3968" instrument_node="">, or </span><a class="mw-redirect" data-dcnode-id="3966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political" title="Political"><span data-dcnode-id="3967" instrument_node="">political</span></a><span data-dcnode-id="3965" instrument_node=""> exclusivity.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3958" style="white-space:nowrap;"><span data-dcnode-id="3964" instrument_node="">[</span><i data-dcnode-id="3960"><a data-dcnode-id="3961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3962" title="This claim needs references to reliable sources. (January 2020)"><span data-dcnode-id="3963" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3959" instrument_node="">]</span></sup><span data-dcnode-id="3957" instrument_node="">
</span></p><p data-dcnode-id="3945"><span data-dcnode-id="3955" instrument_node="">While there may be a formal </span><a data-dcnode-id="3953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alliance" title="Alliance"><span data-dcnode-id="3954" instrument_node="">alliance</span></a><span data-dcnode-id="3952" instrument_node=""> or other </span><a class="mw-redirect" data-dcnode-id="3950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_treaty" title="International treaty"><span data-dcnode-id="3951" instrument_node="">treaty</span></a><span data-dcnode-id="3949" instrument_node=""> obligations between the influenced and influencer, such formal arrangements are not necessary and the influence can often be more of an example of </span><a data-dcnode-id="3947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soft_power" title="Soft power"><span data-dcnode-id="3948" instrument_node="">soft power</span></a><span data-dcnode-id="3946" instrument_node="">. Similarly, a formal alliance does not necessarily mean that one country lies within another's sphere of influence. High levels of exclusivity have historically been associated with higher levels of conflict.
</span></p><p data-dcnode-id="3918"><span data-dcnode-id="3944" instrument_node="">In more extreme cases, a country within the "sphere of influence" of another may become a subsidiary of that state and serve in effect as a </span><a data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Satellite_state" title="Satellite state"><span data-dcnode-id="3943" instrument_node="">satellite state</span></a><span data-dcnode-id="3941" instrument_node=""> or </span><i data-dcnode-id="3938"><a data-dcnode-id="3939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De_facto" title="De facto"><span data-dcnode-id="3940" instrument_node="">de facto</span></a></i><span data-dcnode-id="3937" instrument_node=""> </span><a data-dcnode-id="3935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colony" title="Colony"><span data-dcnode-id="3936" instrument_node="">colony</span></a><span data-dcnode-id="3934" instrument_node="">. This was the case with the </span><a data-dcnode-id="3932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="3933" instrument_node="">Soviet Union</span></a><span data-dcnode-id="3931" instrument_node=""> and its </span><a data-dcnode-id="3929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Bloc" title="Eastern Bloc"><span data-dcnode-id="3930" instrument_node="">Eastern Bloc</span></a><span data-dcnode-id="3928" instrument_node=""> after World War II. The system of spheres of influence by which powerful nations intervene in the affairs of others continues to the present. It is often analyzed in terms of </span><a data-dcnode-id="3926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Superpower" title="Superpower"><span data-dcnode-id="3927" instrument_node="">superpowers</span></a><span data-dcnode-id="3925" instrument_node="">, </span><a data-dcnode-id="3923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_power" title="Great power"><span data-dcnode-id="3924" instrument_node="">great powers</span></a><span data-dcnode-id="3922" instrument_node="">, and/or </span><a data-dcnode-id="3920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_power" title="Middle power"><span data-dcnode-id="3921" instrument_node="">middle powers</span></a><span data-dcnode-id="3919" instrument_node="">.
</span></p><p data-dcnode-id="3874"><span data-dcnode-id="3917" instrument_node="">Sometimes portions of a single country can fall into two distinct spheres of influence. In the 19th century, the </span><a data-dcnode-id="3915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buffer_state" title="Buffer state"><span data-dcnode-id="3916" instrument_node="">buffer states</span></a><span data-dcnode-id="3914" instrument_node=""> of </span><a data-dcnode-id="3912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="3913" instrument_node="">Iran</span></a><span data-dcnode-id="3911" instrument_node=""> and </span><a data-dcnode-id="3909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thailand" title="Thailand"><span data-dcnode-id="3910" instrument_node="">Thailand</span></a><span data-dcnode-id="3908" instrument_node="">, lying between the empires of </span><a data-dcnode-id="3906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Empire" title="British Empire"><span data-dcnode-id="3907" instrument_node="">Britain</span></a><span data-dcnode-id="3905" instrument_node="">, </span><a data-dcnode-id="3903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_colonial_empire" title="French colonial empire"><span data-dcnode-id="3904" instrument_node="">France</span></a><span data-dcnode-id="3902" instrument_node=""> and </span><a data-dcnode-id="3900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="3901" instrument_node="">Russia</span></a><span data-dcnode-id="3899" instrument_node="">, were divided between the spheres of influence of those three </span><a class="mw-redirect" data-dcnode-id="3897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Power_%28international%29" title="Power (international)"><span data-dcnode-id="3898" instrument_node="">international powers</span></a><span data-dcnode-id="3896" instrument_node="">. Likewise, after </span><a data-dcnode-id="3894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="3895" instrument_node="">World War&nbsp;II</span></a><span data-dcnode-id="3893" instrument_node="">, </span><a data-dcnode-id="3891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany" title="Germany"><span data-dcnode-id="3892" instrument_node="">Germany</span></a><span data-dcnode-id="3890" instrument_node=""> was divided into four </span><a data-dcnode-id="3888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied-occupied_Germany" title="Allied-occupied Germany"><span data-dcnode-id="3889" instrument_node="">occupation zones</span></a><span data-dcnode-id="3887" instrument_node="">, three of which later consolidated into </span><a data-dcnode-id="3885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Germany" title="West Germany"><span data-dcnode-id="3886" instrument_node="">West Germany</span></a><span data-dcnode-id="3884" instrument_node=""> and the remaining one became </span><a data-dcnode-id="3882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Germany" title="East Germany"><span data-dcnode-id="3883" instrument_node="">East Germany</span></a><span data-dcnode-id="3881" instrument_node="">, the former a member of </span><a data-dcnode-id="3879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="3880" instrument_node="">NATO</span></a><span data-dcnode-id="3878" instrument_node=""> and the latter a member of the </span><a data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact" title="Warsaw Pact"><span data-dcnode-id="3877" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="3875" instrument_node="">.
</span></p><p data-dcnode-id="3858"><span data-dcnode-id="3873" instrument_node="">The term is also used to describe non-political situations, e.g., a </span><a data-dcnode-id="3871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shopping_mall" title="Shopping mall"><span data-dcnode-id="3872" instrument_node="">shopping mall</span></a><span data-dcnode-id="3870" instrument_node=""> is said to have a 'sphere of influence' that designates the geographical area where it dominates the </span><a class="mw-redirect" data-dcnode-id="3868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Retail_trade" title="Retail trade"><span data-dcnode-id="3869" instrument_node="">retail trade</span></a><span data-dcnode-id="3867" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3860" style="white-space:nowrap;"><span data-dcnode-id="3866" instrument_node="">[</span><i data-dcnode-id="3862"><a data-dcnode-id="3863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3864" title="This claim needs references to reliable sources. (March 2021)"><span data-dcnode-id="3865" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3861" instrument_node="">]</span></sup><span data-dcnode-id="3859" instrument_node="">
</span></p><span data-dcnode-id="3857" instrument_node="">

Many powerful states in past centuries had subordinate </span><a data-dcnode-id="3640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tributary_state" title="Tributary state"><span data-dcnode-id="3641" instrument_node="">tributary states</span></a><span data-dcnode-id="3639" instrument_node="">, whose native </span><a data-dcnode-id="3637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dynasty" title="Dynasty"><span data-dcnode-id="3638" instrument_node="">dynasty</span></a><span data-dcnode-id="3636" instrument_node=""> acknowledged the </span><a data-dcnode-id="3634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suzerainty" title="Suzerainty"><span data-dcnode-id="3635" instrument_node="">suzerainty</span></a><span data-dcnode-id="3633" instrument_node=""> of the </span><a data-dcnode-id="3631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_power" title="Great power"><span data-dcnode-id="3632" instrument_node="">great power</span></a><span data-dcnode-id="3630" instrument_node="">.</span></p><div class="thumb tright" data-dcnode-id="3620"><div class="thumbinner" data-dcnode-id="3621" style="width:222px;"><a class="image" data-dcnode-id="3627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMap_of_colonial_Africa_in_1897.jpg"><img alt="" class="thumbimage" data-dcnode-id="3628" data-file-height="1668" data-file-width="2150" decoding="async" height="171" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Map_of_colonial_Africa_in_1897.jpg/220px-Map_of_colonial_Africa_in_1897.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Map_of_colonial_Africa_in_1897.jpg/330px-Map_of_colonial_Africa_in_1897.jpg 1.5x, / </span><p data-dcnode-id="3563"><span data-dcnode-id="3618" instrument_node="">Many areas of the world are joined by a </span><a class="mw-redirect" data-dcnode-id="3616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_influence" title="Cultural influence"><span data-dcnode-id="3617" instrument_node="">cultural influence</span></a><span data-dcnode-id="3615" instrument_node=""> inherited from a previous sphere of influence, even if they are no longer under political control.  Examples include </span><a data-dcnode-id="3613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglosphere" title="Anglosphere"><span data-dcnode-id="3614" instrument_node="">Anglosphere</span></a><span data-dcnode-id="3612" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab_World" title="Arab World"><span data-dcnode-id="3611" instrument_node="">Arab World</span></a><span data-dcnode-id="3609" instrument_node="">, </span><a data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greater_Iran" title="Greater Iran"><span data-dcnode-id="3608" instrument_node="">Persosphere</span></a><span data-dcnode-id="3606" instrument_node="">, </span><a data-dcnode-id="3604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eurosphere" title="Eurosphere"><span data-dcnode-id="3605" instrument_node="">Eurosphere</span></a><span data-dcnode-id="3603" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francophonie" title="Francophonie"><span data-dcnode-id="3602" instrument_node="">Francophonie</span></a><span data-dcnode-id="3600" instrument_node="">, </span><a data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fran%25C3%25A7afrique" title="Françafrique"><span data-dcnode-id="3599" instrument_node="">Françafrique</span></a><span data-dcnode-id="3597" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_territorial_entities_where_German_is_an_official_language" title="List of territorial entities where German is an official language"><span data-dcnode-id="3596" instrument_node="">Germanosphere</span></a><span data-dcnode-id="3594" instrument_node="">, </span><a data-dcnode-id="3592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greater_India" title="Greater India"><span data-dcnode-id="3593" instrument_node="">Indosphere</span></a><span data-dcnode-id="3591" instrument_node="">, </span><a data-dcnode-id="3589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hispanidad" title="Hispanidad"><span data-dcnode-id="3590" instrument_node="">Hispanidad</span></a><span data-dcnode-id="3588" instrument_node="">, </span><a data-dcnode-id="3586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Legacy_of_the_Roman_Empire" title="Legacy of the Roman Empire"><span data-dcnode-id="3587" instrument_node="">Latin Europe</span></a><span data-dcnode-id="3585" instrument_node="">/</span><a data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latin_America" title="Latin America"><span data-dcnode-id="3584" instrument_node="">Latin America</span></a><span data-dcnode-id="3582" instrument_node="">, </span><a data-dcnode-id="3580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lusophone" title="Lusophone"><span data-dcnode-id="3581" instrument_node="">Lusophonie</span></a><span data-dcnode-id="3579" instrument_node="">, </span><a data-dcnode-id="3577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pan-Turkism" title="Pan-Turkism"><span data-dcnode-id="3578" instrument_node="">Turkosphere</span></a><span data-dcnode-id="3576" instrument_node="">,  </span><a class="mw-redirect" data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_cultural_sphere" title="Chinese cultural sphere"><span data-dcnode-id="3575" instrument_node="">Sinosphere</span></a><span data-dcnode-id="3573" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavisphere" title="Slavisphere"><span data-dcnode-id="3572" instrument_node="">Slavisphere</span></a><span data-dcnode-id="3570" instrument_node="">, </span><a data-dcnode-id="3568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malay_world" title="Malay world"><span data-dcnode-id="3569" instrument_node="">Malay world</span></a><span data-dcnode-id="3567" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-Soviet_States" title="Post-Soviet States"><span data-dcnode-id="3566" instrument_node="">Post-Soviet States</span></a><span data-dcnode-id="3564" instrument_node=""> and many others.

</span><h2 data-dcnode-id="3551"><span data-dcnode-id="3561" id="Early_United_States_.281820s.29"></span><span class="mw-headline" data-dcnode-id="3559" id="Early_United_States_(1820s)"><span data-dcnode-id="3560" instrument_node="">Early United States (1820s)</span></span><span class="mw-editsection" data-dcnode-id="3552"><span class="mw-editsection-bracket" data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">[</span></span><a data-dcnode-id="3555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSphere_of_influence%26action%3Dedit%26section%3D2" title="Edit section: Early United States (1820s)"><span data-dcnode-id="3556" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3550" instrument_node="">
</span><link data-dcnode-id="3549" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3539" role="note"><span data-dcnode-id="3548" instrument_node="">See also: </span><a data-dcnode-id="3546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_relations_of_the_United_States" title="Foreign relations of the United States"><span data-dcnode-id="3547" instrument_node="">Foreign relations of the United States</span></a><span data-dcnode-id="3545" instrument_node="">, </span><a data-dcnode-id="3543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carter_Doctrine" title="Carter Doctrine"><span data-dcnode-id="3544" instrument_node="">Carter Doctrine</span></a><span data-dcnode-id="3542" instrument_node="">, and </span><a data-dcnode-id="3540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monroe_Doctrine" title="Monroe Doctrine"><span data-dcnode-id="3541" instrument_node="">Monroe Doctrine</span></a></div><span data-dcnode-id="3538" instrument_node="">
</span><p data-dcnode-id="3499"><a data-dcnode-id="3536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_Hamilton" title="Alexander Hamilton"><span data-dcnode-id="3537" instrument_node="">Alexander Hamilton</span></a><span data-dcnode-id="3535" instrument_node="">, first </span><a class="mw-redirect" data-dcnode-id="3533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Secretary_of_the_Treasury" title="U.S. Secretary of the Treasury"><span data-dcnode-id="3534" instrument_node="">U.S. Secretary of the Treasury</span></a><span data-dcnode-id="3532" instrument_node="">, aimed for the </span><a data-dcnode-id="3530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="3531" instrument_node="">United States</span></a><span data-dcnode-id="3529" instrument_node=""> to establish a sphere of influence in </span><a data-dcnode-id="3527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_America" title="North America"><span data-dcnode-id="3528" instrument_node="">North America</span></a><span data-dcnode-id="3526" instrument_node="">.</span><sup class="reference" data-dcnode-id="3523" id="cite_ref-1"><a data-dcnode-id="3524" href="#cite_note-1"><span data-dcnode-id="3525" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3522" instrument_node=""> Hamilton, writing in the </span><a class="mw-redirect" data-dcnode-id="3520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federalist_Papers" title="Federalist Papers"><span data-dcnode-id="3521" instrument_node="">Federalist Papers</span></a><span data-dcnode-id="3519" instrument_node="">, harboured ambitions for the US to rise to </span><a class="mw-redirect" data-dcnode-id="3517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_power" title="World power"><span data-dcnode-id="3518" instrument_node="">world power</span></a><span data-dcnode-id="3516" instrument_node=""> status and gain the strength to expel </span><a class="mw-redirect" data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Powers" title="European Powers"><span data-dcnode-id="3515" instrument_node="">European powers</span></a><span data-dcnode-id="3513" instrument_node=""> from the </span><a data-dcnode-id="3511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Americas" title="Americas"><span data-dcnode-id="3512" instrument_node="">Americas</span></a><span data-dcnode-id="3510" instrument_node="">, taking on the mantle of regional dominance among American nations, although most of the </span><a data-dcnode-id="3508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_World" title="New World"><span data-dcnode-id="3509" instrument_node="">New World</span></a><span data-dcnode-id="3507" instrument_node=""> were </span><a data-dcnode-id="3505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe" title="Europe"><span data-dcnode-id="3506" instrument_node="">European</span></a><span data-dcnode-id="3504" instrument_node=""> colonies during that period.</span><sup class="reference" data-dcnode-id="3501" id="cite_ref-:0_2-0"><a data-dcnode-id="3502" href="#cite_note-:0-2"><span data-dcnode-id="3503" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3500" instrument_node="">
</span></p><p data-dcnode-id="3475"><span data-dcnode-id="3498" instrument_node="">This doctrine, dubbed the '</span><a data-dcnode-id="3496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monroe_Doctrine" title="Monroe Doctrine"><span data-dcnode-id="3497" instrument_node="">Monroe Doctrine</span></a><span data-dcnode-id="3495" instrument_node="">', was formalized under President </span><a data-dcnode-id="3493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Monroe" title="James Monroe"><span data-dcnode-id="3494" instrument_node="">James Monroe</span></a><span data-dcnode-id="3492" instrument_node="">, who asserted that the </span><a data-dcnode-id="3490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_World" title="New World"><span data-dcnode-id="3491" instrument_node="">New World</span></a><span data-dcnode-id="3489" instrument_node=""> was to be established as a Sphere of influence, removed from </span><a data-dcnode-id="3487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe" title="Europe"><span data-dcnode-id="3488" instrument_node="">European</span></a><span data-dcnode-id="3486" instrument_node=""> encroachment. As the U.S. emerged as a world power, few nations dared to trespass on this sphere.</span><sup class="reference" data-dcnode-id="3483" id="cite_ref-Brit1_3-0"><a data-dcnode-id="3484" href="#cite_note-Brit1-3"><span data-dcnode-id="3485" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3482" instrument_node=""> (A notable exception occurred with the </span><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="3481" instrument_node="">Soviet Union</span></a><span data-dcnode-id="3479" instrument_node=""> and the </span><a data-dcnode-id="3477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_Missile_Crisis" title="Cuban Missile Crisis"><span data-dcnode-id="3478" instrument_node="">Cuban Missile Crisis</span></a><span data-dcnode-id="3476" instrument_node="">.)
</span></p><p data-dcnode-id="3451"><span data-dcnode-id="3474" instrument_node="">As of 2018, Secretary of State </span><a data-dcnode-id="3472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rex_Tillerson" title="Rex Tillerson"><span data-dcnode-id="3473" instrument_node="">Rex Tillerson</span></a><span data-dcnode-id="3471" instrument_node=""> continued to refer to the </span><a data-dcnode-id="3469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monroe_Doctrine" title="Monroe Doctrine"><span data-dcnode-id="3470" instrument_node="">Monroe Doctrine</span></a><span data-dcnode-id="3468" instrument_node=""> to tout the </span><a data-dcnode-id="3466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="3467" instrument_node="">United States</span></a><span data-dcnode-id="3465" instrument_node=""> as the region's preferred </span><a data-dcnode-id="3463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade" title="Trade"><span data-dcnode-id="3464" instrument_node="">trade</span></a><span data-dcnode-id="3462" instrument_node=""> partner over other </span><a class="mw-redirect" data-dcnode-id="3460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nations" title="Nations"><span data-dcnode-id="3461" instrument_node="">nations</span></a><span data-dcnode-id="3459" instrument_node=""> such as </span><a data-dcnode-id="3457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="3458" instrument_node="">China</span></a><span data-dcnode-id="3456" instrument_node="">.</span><sup class="reference" data-dcnode-id="3453" id="cite_ref-4"><a data-dcnode-id="3454" href="#cite_note-4"><span data-dcnode-id="3455" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3452" instrument_node="">
</span></p><span data-dcnode-id="3450" instrument_node="">
</span><h2 data-dcnode-id="3439"><span data-dcnode-id="3449" id="New_Imperialism_era_.28late_1800s.E2.80.93early_1900s.29"></span><span class="mw-headline" data-dcnode-id="3447" id="New_Imperialism_era_(late_1800s–early_1900s)"><span data-dcnode-id="3448" instrument_node="">New Imperialism era (late 1800s–early 1900s)</span></span><span class="mw-editsection" data-dcnode-id="3440"><span class="mw-editsection-bracket" data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">[</span></span><a data-dcnode-id="3443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSphere_of_influence%26action%3Dedit%26section%3D3" title="Edit section: New Imperialism era (late 1800s–early 1900s)"><span data-dcnode-id="3444" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3438" instrument_node="">
</span><link data-dcnode-id="3437" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3430" role="note"><span data-dcnode-id="3436" instrument_node="">See also: </span><a data-dcnode-id="3434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Informal_empire" title="Informal empire"><span data-dcnode-id="3435" instrument_node="">Informal empire</span></a><span data-dcnode-id="3433" instrument_node=""> and </span><a data-dcnode-id="3431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Imperialism" title="New Imperialism"><span data-dcnode-id="3432" instrument_node="">New Imperialism</span></a></div><span data-dcnode-id="3429" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3420"><div class="thumbinner" data-dcnode-id="3421" style="width:222px;"><a class="image" data-dcnode-id="3427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMap_Iran_1900-en.png"><img alt="" class="thumbimage" data-dcnode-id="3428" data-file-height="911" data-file-width="1096" decoding="async" height="183" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/02/Map_Iran_1900-en.png/220px-Map_Iran_1900-en.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/02/Map_Iran_1900-en.png/330px-Map_Iran_1900-en.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/02/Map_Iran_1900-en.png/440px-Map_Iran_1900-en.png 2x" width="220"></a><span data-dcnode-id="3426" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3422"><div class="magnify" data-dcnode-id="3424"><a class="internal" data-dcnode-id="3425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMap_Iran_1900-en.png" title="Enlarge"></a></div><span data-dcnode-id="3423" instrument_node="">Delimitation of British and Russian influence in Iran</span></div></div></div><span data-dcnode-id="3419" instrument_node="">
</span><p data-dcnode-id="3398"><span data-dcnode-id="3418" instrument_node="">For Siam (</span><a data-dcnode-id="3416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thailand" title="Thailand"><span data-dcnode-id="3417" instrument_node="">Thailand</span></a><span data-dcnode-id="3415" instrument_node="">), </span><a data-dcnode-id="3413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom_of_Great_Britain_and_Ireland" title="United Kingdom of Great Britain and Ireland"><span data-dcnode-id="3414" instrument_node="">Britain</span></a><span data-dcnode-id="3412" instrument_node=""> and </span><a data-dcnode-id="3410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Third_Republic" title="French Third Republic"><span data-dcnode-id="3411" instrument_node="">France</span></a><span data-dcnode-id="3409" instrument_node=""> signed an agreement in 1904 whereby the British recognised a French sphere of influence to the east of the River Menam's (</span><a data-dcnode-id="3407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chao_Phraya_River" title="Chao Phraya River"><span data-dcnode-id="3408" instrument_node="">Chao Phraya River</span></a><span data-dcnode-id="3406" instrument_node="">) basin; in turn, the French recognised British influence over the territory to the west of the Menam basin and west of the </span><a data-dcnode-id="3404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulf_of_Thailand" title="Gulf of Thailand"><span data-dcnode-id="3405" instrument_node="">Gulf of Thailand</span></a><span data-dcnode-id="3403" instrument_node="">. Both parties disclaimed any idea of annexing Siamese territory.</span><sup class="reference" data-dcnode-id="3400" id="cite_ref-5"><a data-dcnode-id="3401" href="#cite_note-5"><span data-dcnode-id="3402" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3399" instrument_node="">
</span></p><p data-dcnode-id="3380"><span data-dcnode-id="3397" instrument_node="">In the </span><a data-dcnode-id="3395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglo-Russian_Convention" title="Anglo-Russian Convention"><span data-dcnode-id="3396" instrument_node="">Anglo-Russian Convention</span></a><span data-dcnode-id="3394" instrument_node=""> of 1907, Britain and </span><a data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="3393" instrument_node="">Russia</span></a><span data-dcnode-id="3391" instrument_node=""> divided Persia (</span><a data-dcnode-id="3389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="3390" instrument_node="">Iran</span></a><span data-dcnode-id="3388" instrument_node="">) into spheres of influence, with the Russians gaining recognition for influence over most of northern Iran, and Britain establishing a zone in the Southeast.</span><sup class="reference" data-dcnode-id="3385" id="cite_ref-6"><a data-dcnode-id="3386" href="#cite_note-6"><span data-dcnode-id="3387" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="3382" id="cite_ref-7"><a data-dcnode-id="3383" href="#cite_note-7"><span data-dcnode-id="3384" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3381" instrument_node="">
</span></p><span data-dcnode-id="3379" instrument_node="">
</span><h3 data-dcnode-id="3369"><span class="mw-headline" data-dcnode-id="3377" id="China"><span data-dcnode-id="3378" instrument_node="">China</span></span><span class="mw-editsection" data-dcnode-id="3370"><span class="mw-editsection-bracket" data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">[</span></span><a data-dcnode-id="3373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSphere_of_influence%26action%3Dedit%26section%3D4" title="Edit section: China"><span data-dcnode-id="3374" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3368" instrument_node="">
</span><p data-dcnode-id="3344"><span data-dcnode-id="3367" instrument_node="">In China, during the late 19th and early 20th centuries (known in China as the "</span><a data-dcnode-id="3365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Century_of_humiliation" title="Century of humiliation"><span data-dcnode-id="3366" instrument_node="">century of humiliation</span></a><span data-dcnode-id="3364" instrument_node="">"), Britain, France, </span><a data-dcnode-id="3362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Empire" title="German Empire"><span data-dcnode-id="3363" instrument_node="">Germany</span></a><span data-dcnode-id="3361" instrument_node="">, Russia, and </span><a data-dcnode-id="3359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empire_of_Japan" title="Empire of Japan"><span data-dcnode-id="3360" instrument_node="">Japan</span></a><span data-dcnode-id="3358" instrument_node=""> held special powers over large swaths of Chinese territory based on securing "nonalienation commitments" for their "spheres of interest"; only the United States was unable to participate due to their involvement in the </span><a data-dcnode-id="3356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spanish%25E2%2580%2593American_War" title="Spanish–American War"><span data-dcnode-id="3357" instrument_node="">Spanish–American War</span></a><span data-dcnode-id="3355" instrument_node="">. These spheres of influence were acquired by forcing the </span><a data-dcnode-id="3353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government_of_the_Qing_Dynasty" title="Government of the Qing Dynasty"><span data-dcnode-id="3354" instrument_node="">Qing government</span></a><span data-dcnode-id="3352" instrument_node=""> to sign "</span><a data-dcnode-id="3350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unequal_treaty" title="Unequal treaty"><span data-dcnode-id="3351" instrument_node="">unequal treaties</span></a><span data-dcnode-id="3349" instrument_node="">" and long-term leases.</span><sup class="reference" data-dcnode-id="3346" id="cite_ref-8"><a data-dcnode-id="3347" href="#cite_note-8"><span data-dcnode-id="3348" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3345" instrument_node="">
</span></p><p data-dcnode-id="3233"><span data-dcnode-id="3343" instrument_node="">In early 1895, the French laid claim to a sphere in </span><a data-dcnode-id="3341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southwest_China" title="Southwest China"><span data-dcnode-id="3342" instrument_node="">Southwest China</span></a><span data-dcnode-id="3340" instrument_node="">.</span><sup class="reference" data-dcnode-id="3337" id="cite_ref-9"><a data-dcnode-id="3338" href="#cite_note-9"><span data-dcnode-id="3339" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3336" instrument_node=""> By December 1897, German Kaiser </span><a class="mw-redirect" data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wilhelm_II" title="Wilhelm II"><span data-dcnode-id="3335" instrument_node="">Wilhelm II</span></a><span data-dcnode-id="3333" instrument_node=""> declared his intent to seize territory in China, precipitating the scramble to demarcate zones of influence in China. The Germans acquired, in </span><a data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shandong" title="Shandong"><span data-dcnode-id="3332" instrument_node="">Shandong</span></a><span data-dcnode-id="3330" instrument_node=""> province, exclusive control over developmental loans, mining, and railway ownership,</span><sup class="reference" data-dcnode-id="3327" id="cite_ref-10"><a data-dcnode-id="3328" href="#cite_note-10"><span data-dcnode-id="3329" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3326" instrument_node=""> while Russia gained a sphere over all territory north of the </span><a data-dcnode-id="3324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Wall_of_China" title="Great Wall of China"><span data-dcnode-id="3325" instrument_node="">Great Wall</span></a><span data-dcnode-id="3323" instrument_node="">,</span><sup class="reference" data-dcnode-id="3320" id="cite_ref-dallin_11-0"><a data-dcnode-id="3321" href="#cite_note-dallin-11"><span data-dcnode-id="3322" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3319" instrument_node=""> in addition to the previous tax exemption for trade in </span><a data-dcnode-id="3317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mongolia" title="Mongolia"><span data-dcnode-id="3318" instrument_node="">Mongolia</span></a><span data-dcnode-id="3316" instrument_node=""> and </span><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xinjiang" title="Xinjiang"><span data-dcnode-id="3315" instrument_node="">Xinjiang</span></a><span data-dcnode-id="3313" instrument_node="">,</span><sup class="reference" data-dcnode-id="3310" id="cite_ref-12"><a data-dcnode-id="3311" href="#cite_note-12"><span data-dcnode-id="3312" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3309" instrument_node=""> economic powers similar to Germany's over </span><a class="mw-redirect" data-dcnode-id="3307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fengtian_Province" title="Fengtian Province"><span data-dcnode-id="3308" instrument_node="">Fengtian</span></a><span data-dcnode-id="3306" instrument_node="">, </span><a data-dcnode-id="3304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jilin" title="Jilin"><span data-dcnode-id="3305" instrument_node="">Jilin</span></a><span data-dcnode-id="3303" instrument_node="">, and </span><a data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heilongjiang" title="Heilongjiang"><span data-dcnode-id="3302" instrument_node="">Heilongjiang</span></a><span data-dcnode-id="3300" instrument_node=""> provinces. France gained a sphere over </span><a data-dcnode-id="3298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yunnan" title="Yunnan"><span data-dcnode-id="3299" instrument_node="">Yunnan</span></a><span data-dcnode-id="3297" instrument_node="">, as well as most of </span><a data-dcnode-id="3295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guangxi" title="Guangxi"><span data-dcnode-id="3296" instrument_node="">Guangxi</span></a><span data-dcnode-id="3294" instrument_node=""> and </span><a data-dcnode-id="3292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guangdong" title="Guangdong"><span data-dcnode-id="3293" instrument_node="">Guangdong</span></a><span data-dcnode-id="3291" instrument_node=""> provinces;</span><sup class="reference" data-dcnode-id="3288" id="cite_ref-china_13-0"><a data-dcnode-id="3289" href="#cite_note-china-13"><span data-dcnode-id="3290" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3287" instrument_node=""> Japan over </span><a data-dcnode-id="3285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fujian" title="Fujian"><span data-dcnode-id="3286" instrument_node="">Fujian</span></a><span data-dcnode-id="3284" instrument_node=""> province;</span><sup class="reference" data-dcnode-id="3281" id="cite_ref-china_13-1"><a data-dcnode-id="3282" href="#cite_note-china-13"><span data-dcnode-id="3283" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3280" instrument_node=""> and the British over the whole </span><a class="mw-redirect" data-dcnode-id="3278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yangtze_River_valley" title="Yangtze River valley"><span data-dcnode-id="3279" instrument_node="">Yangtze River valley</span></a><sup class="reference" data-dcnode-id="3275" id="cite_ref-china_13-2"><a data-dcnode-id="3276" href="#cite_note-china-13"><span data-dcnode-id="3277" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3274" instrument_node=""> (defined as all provinces adjoining the Yangtze river as well as </span><a data-dcnode-id="3272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henan" title="Henan"><span data-dcnode-id="3273" instrument_node="">Henan</span></a><span data-dcnode-id="3271" instrument_node=""> and </span><a data-dcnode-id="3269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zhejiang" title="Zhejiang"><span data-dcnode-id="3270" instrument_node="">Zhejiang</span></a><span data-dcnode-id="3268" instrument_node=""> provinces),</span><sup class="reference" data-dcnode-id="3265" id="cite_ref-dallin_11-1"><a data-dcnode-id="3266" href="#cite_note-dallin-11"><span data-dcnode-id="3267" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3264" instrument_node=""> parts of </span><a data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guangdong" title="Guangdong"><span data-dcnode-id="3263" instrument_node="">Guangdong</span></a><span data-dcnode-id="3261" instrument_node=""> and </span><a data-dcnode-id="3259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guangxi" title="Guangxi"><span data-dcnode-id="3260" instrument_node="">Guangxi</span></a><span data-dcnode-id="3258" instrument_node=""> provinces,</span><sup class="reference" data-dcnode-id="3255" id="cite_ref-14"><a data-dcnode-id="3256" href="#cite_note-14"><span data-dcnode-id="3257" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3254" instrument_node=""> and part of </span><a class="mw-redirect" data-dcnode-id="3252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Lhasa" title="Treaty of Lhasa"><span data-dcnode-id="3253" instrument_node="">Tibet</span></a><span data-dcnode-id="3251" instrument_node="">.</span><sup class="reference" data-dcnode-id="3248" id="cite_ref-15"><a data-dcnode-id="3249" href="#cite_note-15"><span data-dcnode-id="3250" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3247" instrument_node=""> Only </span><a data-dcnode-id="3245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Italy" title="Kingdom of Italy"><span data-dcnode-id="3246" instrument_node="">Italy</span></a><span data-dcnode-id="3244" instrument_node="">'s request for </span><a data-dcnode-id="3242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zhejiang" title="Zhejiang"><span data-dcnode-id="3243" instrument_node="">Zhejiang</span></a><span data-dcnode-id="3241" instrument_node=""> province was declined by the Chinese government.</span><sup class="reference" data-dcnode-id="3238" id="cite_ref-china_13-3"><a data-dcnode-id="3239" href="#cite_note-china-13"><span data-dcnode-id="3240" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3237" instrument_node=""> These do not include the lease and </span><a class="mw-redirect" data-dcnode-id="3235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Concession_territory" title="Concession territory"><span data-dcnode-id="3236" instrument_node="">concession territories</span></a><span data-dcnode-id="3234" instrument_node=""> where the foreign powers had full authority.
</span></p><span data-dcnode-id="3232" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3223"><div class="thumbinner" data-dcnode-id="3224" style="width:222px;"><a class="image" data-dcnode-id="3230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKCRC_China_spheres_of_influence.jpg"><img alt="" class="thumbimage" data-dcnode-id="3231" data-file-height="419" data-file-width="545" decoding="async" height="169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/73/KCRC_China_spheres_of_influence.jpg/220px-KCRC_China_spheres_of_influence.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/73/KCRC_China_spheres_of_influence.jpg/330px-KCRC_China_spheres_of_influence.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/73/KCRC_China_spheres_of_influence.jpg/440px-KCRC_China_spheres_of_influence.jpg 2x" width="220"></a><span data-dcnode-id="3229" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3225"><div class="magnify" data-dcnode-id="3227"><a class="internal" data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKCRC_China_spheres_of_influence.jpg" title="Enlarge"></a></div><span data-dcnode-id="3226" instrument_node="">Spheres of influence in Chinese empire in early 20th century</span></div></div></div><span data-dcnode-id="3222" instrument_node="">
</span><p data-dcnode-id="3212"><span data-dcnode-id="3221" instrument_node="">The Russian government militarily occupied their zone, imposed their law and schools, seized mining and logging privileges, settled their citizens, and even established their municipal administration on several cities,</span><sup class="reference" data-dcnode-id="3218" id="cite_ref-16"><a data-dcnode-id="3219" href="#cite_note-16"><span data-dcnode-id="3220" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3217" instrument_node=""> the latter without Chinese consent.</span><sup class="reference" data-dcnode-id="3214" id="cite_ref-17"><a data-dcnode-id="3215" href="#cite_note-17"><span data-dcnode-id="3216" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3213" instrument_node="">
</span></p><p data-dcnode-id="3203"><span data-dcnode-id="3211" instrument_node="">The powers (and the United States) might have their own courts, post offices, commercial institutions, railroads, and gunboats in what was on paper Chinese territory. However, the foreign powers and their control in some cases could have been exaggerated; the local government persistently restricted further encroachment.</span><sup class="reference" data-dcnode-id="3208" id="cite_ref-18"><a data-dcnode-id="3209" href="#cite_note-18"><span data-dcnode-id="3210" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3207" instrument_node=""> The system ended after the </span><a class="mw-redirect" data-dcnode-id="3205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_World_War" title="Second World War"><span data-dcnode-id="3206" instrument_node="">Second World War</span></a><span data-dcnode-id="3204" instrument_node="">.
</span></p><p data-dcnode-id="3177"><span data-dcnode-id="3202" instrument_node="">On September 6, 1899, U.S. Secretary of State </span><a data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Hay" title="John Hay"><span data-dcnode-id="3201" instrument_node="">John Hay</span></a><span data-dcnode-id="3199" instrument_node=""> sent notes to the major powers (France, Germany, Britain, Italy, Japan, and Russia), asking them to declare formally that they would uphold Chinese territorial and administrative integrity and would not interfere with the free use of the </span><a data-dcnode-id="3197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_ports" title="Treaty ports"><span data-dcnode-id="3198" instrument_node="">treaty ports</span></a><span data-dcnode-id="3196" instrument_node=""> within their spheres of influence in China, as the United States felt threatened by other powers' much larger spheres of influence in China and worried that it might lose access to the Chinese market should the country be officially partitioned.</span><sup class="reference" data-dcnode-id="3193" id="cite_ref-19"><a data-dcnode-id="3194" href="#cite_note-19"><span data-dcnode-id="3195" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3192" instrument_node=""> Although treaties made after 1900 refer to this "</span><a data-dcnode-id="3190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_Door_Policy" title="Open Door Policy"><span data-dcnode-id="3191" instrument_node="">Open Door Policy</span></a><span data-dcnode-id="3189" instrument_node="">", competition among the various powers for special concessions within China for railroad rights, mining rights, loans, foreign trade ports, and so forth, continued unabated,</span><sup class="reference" data-dcnode-id="3186" id="cite_ref-20"><a data-dcnode-id="3187" href="#cite_note-20"><span data-dcnode-id="3188" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3185" instrument_node=""> with the US itself contradicting the policy by agreeing to recognise the Japanese sphere in the </span><a class="mw-redirect" data-dcnode-id="3183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lansing-Ishii_Agreement" title="Lansing-Ishii Agreement"><span data-dcnode-id="3184" instrument_node="">Lansing-Ishii Agreement</span></a><span data-dcnode-id="3182" instrument_node="">.</span><sup class="reference" data-dcnode-id="3179" id="cite_ref-21"><a data-dcnode-id="3180" href="#cite_note-21"><span data-dcnode-id="3181" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3178" instrument_node="">
</span></p><p data-dcnode-id="3161"><span data-dcnode-id="3176" instrument_node="">In 1910, the great powers, Britain, France, Germany, United States, and later, Russia and Japan, ignored the Open Door Policy to form a banking consortium, consisting of national banking groups backed by respective governments, through which all foreign loans to China were monopolised, granting the powers political influence over China and reducing economic competition between foreigners. This organisation controlled the majority of Chinese tax revenue in a "trust", utilising a small portion to bolster the rule of Chinese warlord </span><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yuan_Shikai" title="Yuan Shikai"><span data-dcnode-id="3175" instrument_node="">Yuan Shikai</span></a><span data-dcnode-id="3173" instrument_node=""> to great effect. The renewed consortium of UK, France, Japan and the U.S. in 1920 effectively vetoed all developmental loans to China, exerting control over the Chinese government by aiming to control all railroads, ports and highways in China.</span><sup class="reference" data-dcnode-id="3170" id="cite_ref-22"><a data-dcnode-id="3171" href="#cite_note-22"><span data-dcnode-id="3172" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="3167" id="cite_ref-23"><a data-dcnode-id="3168" href="#cite_note-23"><span data-dcnode-id="3169" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3166" instrument_node=""> The Consortium helped to contain the political and financial conflict between parties and states over the loans, while imposing foreign control on China's finances during the period of revolutionary upheaval, which the Consortium also helped to precipitate.</span><sup class="reference" data-dcnode-id="3163" id="cite_ref-24"><a data-dcnode-id="3164" href="#cite_note-24"><span data-dcnode-id="3165" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3162" instrument_node="">
</span></p><span data-dcnode-id="3160" instrument_node="">
</span><h2 data-dcnode-id="3149"><span data-dcnode-id="3159" id="World_War_II_.281939.E2.80.9345.29"></span><span class="mw-headline" data-dcnode-id="3157" id="World_War_II_(1939–45)"><span data-dcnode-id="3158" instrument_node="">World War II (1939–45)</span></span><span class="mw-editsection" data-dcnode-id="3150"><span class="mw-editsection-bracket" data-dcnode-id="3155"><span data-dcnode-id="3156" instrument_node="">[</span></span><a data-dcnode-id="3153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSphere_of_influence%26action%3Dedit%26section%3D5" title="Edit section: World War II (1939–45)"><span data-dcnode-id="3154" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3148" instrument_node="">
</span><h3 data-dcnode-id="3138"><span class="mw-headline" data-dcnode-id="3146" id="Empire_of_Japan"><span data-dcnode-id="3147" instrument_node="">Empire of Japan</span></span><span class="mw-editsection" data-dcnode-id="3139"><span class="mw-editsection-bracket" data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">[</span></span><a data-dcnode-id="3142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSphere_of_influence%26action%3Dedit%26section%3D6" title="Edit section: Empire of Japan"><span data-dcnode-id="3143" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3137" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3128"><div class="thumbinner" data-dcnode-id="3129" style="width:252px;"><a class="image" data-dcnode-id="3135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGerman_and_Japanese_spheres_of_influence_at_greatest_extent_World_War_II_1942.jpg"><img alt="" class="thumbimage" data-dcnode-id="3136" data-file-height="516" data-file-width="877" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/21/German_and_Japanese_spheres_of_influence_at_greatest_extent_World_War_II_1942.jpg/250px-German_and_Japanese_spheres_of_influence_at_greatest_extent_World_War_II_1942.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/21/German_and_Japanese_spheres_of_influence_at_greatest_extent_World_War_II_1942.jpg/375px-German_and_Japanese_spheres_of_influence_at_greatest_extent_World_War_II_1942.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/21/German_and_Japanese_spheres_of_influence_at_greatest_extent_World_War_II_1942.jpg/500px-German_and_Japanese_spheres_of_influence_at_greatest_extent_World_War_II_1942.jpg 2x" width="250"></a><span data-dcnode-id="3134" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3130"><div class="magnify" data-dcnode-id="3132"><a class="internal" data-dcnode-id="3133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGerman_and_Japanese_spheres_of_influence_at_greatest_extent_World_War_II_1942.jpg" title="Enlarge"></a></div><span data-dcnode-id="3131" instrument_node="">German and Japanese direct spheres of influence at their greatest extents in fall 1942.</span></div></div></div><span data-dcnode-id="3127" instrument_node="">
</span><p data-dcnode-id="3087"><span data-dcnode-id="3126" instrument_node="">For another example, during the height of its existence in </span><a data-dcnode-id="3124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="3125" instrument_node="">World War II</span></a><span data-dcnode-id="3123" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="3121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japanese_Empire" title="Japanese Empire"><span data-dcnode-id="3122" instrument_node="">Japanese Empire</span></a><span data-dcnode-id="3120" instrument_node=""> had quite a large sphere of influence. The Japanese government directly governed events in </span><a data-dcnode-id="3118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korea" title="Korea"><span data-dcnode-id="3119" instrument_node="">Korea</span></a><span data-dcnode-id="3117" instrument_node="">, </span><a data-dcnode-id="3115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam" title="Vietnam"><span data-dcnode-id="3116" instrument_node="">Vietnam</span></a><span data-dcnode-id="3114" instrument_node="">, </span><a data-dcnode-id="3112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taiwan" title="Taiwan"><span data-dcnode-id="3113" instrument_node="">Taiwan</span></a><span data-dcnode-id="3111" instrument_node="">, and parts of Mainland </span><a data-dcnode-id="3109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="3110" instrument_node="">China</span></a><span data-dcnode-id="3108" instrument_node="">. The "</span><a data-dcnode-id="3106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greater_East_Asia_Co-Prosperity_Sphere" title="Greater East Asia Co-Prosperity Sphere"><span data-dcnode-id="3107" instrument_node="">Greater East Asia Co-Prosperity Sphere</span></a><span data-dcnode-id="3105" instrument_node="">" could thus be quite easily drawn on a map of the </span><a data-dcnode-id="3103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacific_Ocean" title="Pacific Ocean"><span data-dcnode-id="3104" instrument_node="">Pacific Ocean</span></a><span data-dcnode-id="3102" instrument_node=""> as a large "bubble" surrounding the islands of </span><a data-dcnode-id="3100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="3101" instrument_node="">Japan</span></a><span data-dcnode-id="3099" instrument_node=""> and the </span><a data-dcnode-id="3097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asia" title="Asia"><span data-dcnode-id="3098" instrument_node="">Asian</span></a><span data-dcnode-id="3096" instrument_node=""> and Pacific nations it controlled.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3089" style="white-space:nowrap;"><span data-dcnode-id="3095" instrument_node="">[</span><i data-dcnode-id="3091"><a data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3093" title="This claim needs references to reliable sources. (March 2021)"><span data-dcnode-id="3094" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3090" instrument_node="">]</span></sup><span data-dcnode-id="3088" instrument_node="">
</span></p><span data-dcnode-id="3086" instrument_node="">
</span><h3 data-dcnode-id="3075"><span data-dcnode-id="3085" id="Molotov.E2.80.93Ribbentrop_Pact"></span><span class="mw-headline" data-dcnode-id="3083" id="Molotov–Ribbentrop_Pact"><span data-dcnode-id="3084" instrument_node="">Molotov–Ribbentrop Pact</span></span><span class="mw-editsection" data-dcnode-id="3076"><span class="mw-editsection-bracket" data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">[</span></span><a data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSphere_of_influence%26action%3Dedit%26section%3D7" title="Edit section: Molotov–Ribbentrop Pact"><span data-dcnode-id="3080" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3074" instrument_node="">
</span><p data-dcnode-id="3053"><span data-dcnode-id="3073" instrument_node="">According to a secret protocol attached to the </span><a data-dcnode-id="3071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molotov%25E2%2580%2593Ribbentrop_Pact" title="Molotov–Ribbentrop Pact"><span data-dcnode-id="3072" instrument_node="">Molotov–Ribbentrop Pact</span></a><span data-dcnode-id="3070" instrument_node=""> of 1939 (revealed only after Germany's defeat in 1945), </span><a data-dcnode-id="3068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Europe" title="Northern Europe"><span data-dcnode-id="3069" instrument_node="">Northern</span></a><span data-dcnode-id="3067" instrument_node=""> and </span><a data-dcnode-id="3065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Europe" title="Eastern Europe"><span data-dcnode-id="3066" instrument_node="">Eastern Europe</span></a><span data-dcnode-id="3064" instrument_node=""> were divided into </span><a data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Germany" title="Nazi Germany"><span data-dcnode-id="3063" instrument_node="">Nazi</span></a><span data-dcnode-id="3061" instrument_node=""> and </span><a data-dcnode-id="3059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="3060" instrument_node="">Soviet</span></a><span data-dcnode-id="3058" instrument_node=""> spheres of influence:</span><sup class="reference" data-dcnode-id="3055" id="cite_ref-mrtext_25-0"><a data-dcnode-id="3056" href="#cite_note-mrtext-25"><span data-dcnode-id="3057" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3054" instrument_node="">
</span></p><span data-dcnode-id="3052" instrument_node="">
</span><ul data-dcnode-id="3009"><li data-dcnode-id="3038"><span data-dcnode-id="3051" instrument_node="">In the north, </span><a data-dcnode-id="3049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Finland" title="Finland"><span data-dcnode-id="3050" instrument_node="">Finland</span></a><span data-dcnode-id="3048" instrument_node="">, </span><a data-dcnode-id="3046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estonia" title="Estonia"><span data-dcnode-id="3047" instrument_node="">Estonia</span></a><span data-dcnode-id="3045" instrument_node="">, and </span><a data-dcnode-id="3043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latvia" title="Latvia"><span data-dcnode-id="3044" instrument_node="">Latvia</span></a><span data-dcnode-id="3042" instrument_node=""> were assigned to the Soviet sphere.</span><sup class="reference" data-dcnode-id="3039" id="cite_ref-mrtext_25-1"><a data-dcnode-id="3040" href="#cite_note-mrtext-25"><span data-dcnode-id="3041" instrument_node="">[25]</span></a></sup></li><span data-dcnode-id="3037" instrument_node="">
</span><li data-dcnode-id="3021"><a class="mw-redirect" data-dcnode-id="3035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Republic_of_Poland" title="Second Republic of Poland"><span data-dcnode-id="3036" instrument_node="">Poland</span></a><span data-dcnode-id="3034" instrument_node=""> was to be partitioned in the event of its "political rearrangement"—the areas east of the </span><a class="mw-redirect" data-dcnode-id="3032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Narev" title="Narev"><span data-dcnode-id="3033" instrument_node="">Narev</span></a><span data-dcnode-id="3031" instrument_node="">, </span><a data-dcnode-id="3029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vistula" title="Vistula"><span data-dcnode-id="3030" instrument_node="">Vistula</span></a><span data-dcnode-id="3028" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_River" title="San River"><span data-dcnode-id="3027" instrument_node="">San Rivers</span></a><span data-dcnode-id="3025" instrument_node=""> going to the Soviet Union, while Germany would occupy the west.</span><sup class="reference" data-dcnode-id="3022" id="cite_ref-mrtext_25-2"><a data-dcnode-id="3023" href="#cite_note-mrtext-25"><span data-dcnode-id="3024" instrument_node="">[25]</span></a></sup></li><span data-dcnode-id="3020" instrument_node="">
</span><li data-dcnode-id="3010"><a data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuania" title="Lithuania"><span data-dcnode-id="3019" instrument_node="">Lithuania</span></a><span data-dcnode-id="3017" instrument_node="">, adjacent to </span><a data-dcnode-id="3015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Prussia" title="East Prussia"><span data-dcnode-id="3016" instrument_node="">East Prussia</span></a><span data-dcnode-id="3014" instrument_node="">, would be in the German sphere of influence, although a second secret protocol agreed in September 1939 assigned Lithuania to the USSR.</span><sup class="reference" data-dcnode-id="3011" id="cite_ref-christie_26-0"><a data-dcnode-id="3012" href="#cite_note-christie-26"><span data-dcnode-id="3013" instrument_node="">[26]</span></a></sup></li></ul><span data-dcnode-id="3008" instrument_node="">
</span><p data-dcnode-id="2967"><span data-dcnode-id="3007" instrument_node="">Another clause of the treaty stipulated that </span><a data-dcnode-id="3005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bessarabia" title="Bessarabia"><span data-dcnode-id="3006" instrument_node="">Bessarabia</span></a><span data-dcnode-id="3004" instrument_node="">, then part of </span><a data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Romania" title="Kingdom of Romania"><span data-dcnode-id="3003" instrument_node="">Romania</span></a><span data-dcnode-id="3001" instrument_node="">, would join the </span><a data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moldavian_Autonomous_Soviet_Socialist_Republic" title="Moldavian Autonomous Soviet Socialist Republic"><span data-dcnode-id="3000" instrument_node="">Moldovan ASSR</span></a><span data-dcnode-id="2998" instrument_node=""> and become the </span><a data-dcnode-id="2996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moldavian_Soviet_Socialist_Republic" title="Moldavian Soviet Socialist Republic"><span data-dcnode-id="2997" instrument_node="">Moldovan SSR</span></a><span data-dcnode-id="2995" instrument_node=""> under the control of Moscow.</span><sup class="reference" data-dcnode-id="2992" id="cite_ref-mrtext_25-3"><a data-dcnode-id="2993" href="#cite_note-mrtext-25"><span data-dcnode-id="2994" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2991" instrument_node=""> The </span><a data-dcnode-id="2989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_occupation_of_Bessarabia_and_Northern_Bukovina%23Political_and_military_developments" title="Soviet occupation of Bessarabia and Northern Bukovina"><span data-dcnode-i
