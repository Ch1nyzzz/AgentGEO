</span><p data-dcnode-id="9361"><span data-dcnode-id="9367" instrument_node="">Describes attempts by the U.S. Government and the U.S. Army in the reception and care of refugees from Indochina. Covers planning by FORSCOM to receive, house, and care for the Vietnamese refugees until their removal from military jurisdiction. Covers political implications of the program and the selection of appropriate military installations for its implementation; problems created for FORSCOM by the vastness of the program; and covers operations at the Orote Point Camp in Guam, Fort Chaffee in Arkansas, and Fort Indiantown Gap in Pennsylvania. Chapters: Background; Early Fort Chaffee Operations; Early Fort Indiantown Gap Operations; Later Operations; and Summary and Conclusions. Appendices: Commanders of Task Force New Arrivals; Chronology of Significant Events; Selected Problem Areas; Selected Refugee Demographic Characteristics; Highest Educational Level of 67,033 Evacuees Eighteen Years of Age and Over; and Glossary. Includes discussions of: the fall of Vietnam; evacuation from Vietnam; Presidential and State Department decisions; funding; planning; Operation MERCY; Operation BABYLIFT; Reserve Component participation; Operation NEW LIFE; camp organization, operations and administration; processing procedures; Joint Refugee Information Clearing Office; combat support and combat service support; force structure; winter operations; costs; Executive Order 9; civil affairs; 45th Support Group; 46th Support Group; 5th Engineer Battalion; 76th Engineer Battalion; 42d Field Hospital; 524th Adjutant General Company; 553d Army Postal Unit; 501st Infantry; BG James W. Cannon; MAJ R. A. Alexander (Commander, 44th Military History Detachment). Study was based on documents and supported by field collection and oral history interviews conducted by the 44th Military History Detachment. </span><strong data-dcnode-id="9365"><span data-dcnode-id="9366" instrument_node="">[Formerly FORSCOM-81-1]</span> </span><p data-dcnode-id="9043"><span data-dcnode-id="9047" instrument_node="">Consists of a history of the development and fielding of the Tube-launched Optically-tracked Wire-guided (TOW) Heavy Antitank/Assault Weapon (HAW) from mid-1958 through its fielding in September 1970 to 1976 as a replacement for the 106mm recoilless rifle and French ENTAC system and later the helicopter-mounted French SS-11 system. The program was part of a broader generational development of a wide range of antitank systems including the M-72 Light Antitank Weapon (LAW) which began replacing the Bazooka and antitank rifle grenade in 1963; the DRAGON Medium Antitank Weapon (MAW) which began replacing the 90mm recoilless rifle in 1975; and SHILLELAGH combat vehicle armament system fielded in 1967. Chapters: Evolution of Army Antitank Requirements and Weapons; Predevelopment Studies; Project Management Structure; Development of the TOW Weapon System; The TOW Industrial Program; Product Improvement Program; Weapon System Deployment; The TOW/Cobra Program; and Conclusion. Contains information about: World War II tank warfare; D-40 Missile; SS-10; infrared guidance; command guidance; feasibility studies QMR; models; research and development (R&amp;D); night sights; training; Land Combat Support System (LCSS); XM-26/UH-1B Helicopter Armament Subsystem; CHEYENNE; sole-source procurement; validation; costs; United States Marine Corps (USMC); foreign military sales; logistics; Vietnam War; AH-1Q Cobra; XM-65; AH-1J Cobra; M-274 Mechanical Mule; BMG-71A; M-113A1; M-233 Mounting Kit; M-151A2 jeep; XR-311 Combat Support Vehicle; LTC Ben Bedford; Hughie J. McInnish; T-54; Twentynine Palms, California; and Yuma Proving Ground. </span><strong data-dcnode-id="9045"><span data-dcnode-id="9046" instrument_node="">[Formerly AMC-MICOM-9; AMC Project 85M]</span></strong><span data-dcnode-id="9044" instrument_node=""> </span></p><span data-dcnode-id="9042" instrument_node="">

</span><p data-dcnode-id="8645"><span data-dcnode-id="8649" instrument_node="">A compilation of information on the materiel developed by Natick Laboratories in response requirements from Southeast Asia (related to the Vietnam War) to enhance the combat effectiveness of the soldier operating in a tropical environment. Contains fact sheets arranged in six general categories (clothing and personal life support equipment; airdrop engineering; earth sciences; pioneering research; food; and general equipment and packaging) on the following specific items: "Panama" outsole for tropical combat boot; boot last for Thai and Vietnamese soldiers; tropical combat boot, spike protective; tropical combat boot, blast protective; overboot, blast protective; combat tropical uniform camouflage pattern; tropical uniform (coat and trousers combat tropical); rainsuit; tropical hat with detachable headnet; Jungle Hat, Type II; neckerchief; poncho coated nylon, rip-stop, polyurethane coated, lightweight OG 207, with hood; poncho coated nylon, lightweight, camouflage printed pattern (small size); paint, skin camouflage; lightweight loadcarrying equipment; collapsible canteen, two-quart, with cup and cover; jungle rucksack; vest, carrier, grenade, M-79; case, small arms ammunition (for 30-round magazine, M-16); hammock, jungle, lightweight; body armor, aircrewman; body armor, variable protection, ground forces; glareshield for helmets, flying; helmet, flyers, SPH-4; bladder assembly flotation, 5-quart collapsible; liner, rucksack, waterproof; name tapes for identification of personnel; gloves, mosquito; Army aircrewman handwear; Army aircrewman clothing; quick stick-on patches for tropical fatigues; G-13 cargo parachute for jungle operation; troopers' ladder; personnel/cargo lowering system and interim floor anchoring device; Fulton Aerial Retrieval System (Skyhook); individual lightweight survival kits; crewman/gunners safety harness; 3-gallon free fall water container; interim free drop of water (zip top cans/canteens in boxes); tunnel exploration kits; clothing almanac for Southeast Asia; tropical environmental data; geographical and climatological advisory services for Southeast Asia; arthropod geography; climatic atlas; thematic mapping; food geography; tropical terrain analysis; visibility research in Southeast Asia; climatic analogs; anthropometric survey; repellent for snakes; effects of insect infestations on the quality of flour; prevention of microbiological deterioration; human factors and engineering psychology; food acceptance; food packet, long range patrol, FSN 8970-926-9222 (LRRP Rations); ration supplement, beverage pack, FSN 8970-143-0957; military field refrigeration equipment; unit loads of canned nonperishable subsistence and combat rations; packing and packaging of helmets, flying; packaging and packing refrigeration units; packaging for armor, aircrewman, small arms, protective; lightweight insulated shipping containers; packaging and packing of tunnel exploration kit; support to special warfare in providing printing supplies and equipment; drum, fabric, collapsible, potable water, 55-gallon capacity (blivet); drum, fabric, collapsible, potable water, 250-gallon capacity (blivet); can, water, military, plastic, 5-gallon; use of Voc fiberboard for packing of nonperishable subsistence and clothing items; new packages for water purification tablets; leaflet dissemination; intrenching tool, lightweight, LINCLOE; shelter, frame-supported, universal field maintenance; tent, frame-type, expandable, 16-foot by 16-foot; continuous flow ice cream plant; prisoner of war (POW) name identification kit; and chaplain's kits, Catholic and Protestant, lightweight for active combat application. Each fact sheet generally provides background on the development, the specific origin of the request for development, actions taken by the Natick Laboratories, a description of the item (normally with accompanying photograph), a statement of the advantages provided by the new item, and the status of the item as of May of 1969. </span><strong data-dcnode-id="8647"><span data-dcnode-id="8648" instrument_node="">[2 copies] [Formerly AMC-NATICK-8 and second copy Formerly AMC-NATICK-1969-1]</span></strong><span data-dcnode-id="8646" instrument_node=""> </span></p><span data-dcnode-id="8644" instrument_node="">

</span><p data-dcnode-id="8622"><span data-dcnode-id="8623" instrument_node=""> 237 pp., text. 3 tables, 3 maps, 21 charts, 6 reproduced photographs. 2 appendices. Glossary. Bibliographic note. Reproduced. (Regraded UNCLASSIFIED from original SECRET)</span></p><span data-dcnode-id="8621" instrument_node="">
</span><p data-dcnode-id="8616"><span data-dcnode-id="8620" instrument_node="">Sequel to "ARADCOM in the Cuban Crisis, Sept.-Dec. 1962" and to "The Florida Units, Jan.-Dec. 1962." Contains an account of the field Army units from 1 April 1963 (when they were assigned to ARADCOM on a permanent basis) and deals with their position in the unified and international effort to defend North America against air attack. Chapters: The Background; Threat, Missions, and Organization; Command and Control; From Canvas to Concrete: Construction and Housing; Personnel and Morale; Operations and Training; Maintenance, Logistical Support, and Interservice Agreements; and Conclusions. Appendices: Roster of Key Personnel; and HAWK System Characteristics. Includes information on Patrick Air Force Base; MacDill Air Force Base; Homestead Air Force Base; Key West; Miami; Homing-All-The-Way-Killer (HAWK); NIKE HERCULES; "Duster"; MiG-15; MiG-17; MiG-19; MiG-21; radar; surface to air missile (SAM); Hurricane Alma; Hurricane Betsy; 53d Artillery Brigade; 13th Artillery Group; 1st Battalion, 59th Artillery; 6th Battalion, 65th Artillery; 8th Battalion, 15th Artillery; 2d Battalion, 52d Artillery; President John F. Kennedy; Gulf of Mexico; North American Air Defense Command (NORAD); Atlantic Command (LANTCOM); Strike Command (STRICOM); Third US Army; Second US Army; Cape Canaveral; Cape Kennedy; and Florida. </span><strong data-dcnode-id="8618"><span data-dcnode-id="8619" instrument_node="">[Formerly ARADCOM-2 and ARADCOM Historical Monograph 6M]</span></strong><span data-dcnode-id="8617" instrument_node=""> </span></p><span data-dcnode-id="8615" instrument_node="">

</span><p data-dcnode-id="8587"><span data-dcnode-id="8591" instrument_node="">Discussion, from the point of view of the United States Army Air Defense Command (ARADCOM) of the Army National Guard (ARNG) role in the on-site air defense of the Continental United States (CONUS) from 1951 until 1967. Chapters: Impetus and Inception; The Gun Era: Planning and Implementation; On Site with Missiles: Planning and Implementation, 1955-1965; Performance, 1958-1967; Problems, Approaches, and Solutions; and Conclusions. Appendices: Chronology of Major Developments; Collins Memorandum of 10 January 1951; On-Site Gun Battalions of the SSF; On-Site Ajax Units of the ARNG; On-Site Hercules Units of the ARNG; Technician Manning Structure, Ajax System; Technician Manning Structure, Hercules System; ORE Checklist Forms 121 and 122; REDCON Criteria; and Chiefs of the NGB and Cgs ARAACOM/ARADCOM. Contains discussions of: National Guard Bureau (NGB); Army Antiaircraft Command (ARAACOM); NIKE; NIKE-AJAX; NIKE-HERCULES; Korean War; Cold War; antiaircraft artillery gun battalions; missile battalions; Short-Notice Annual Practice (SNAP); Operational Readiness Evaluation (ORE); Annual General Inspection (AGI); REDCON (Readiness Condition); Defense Combat Evaluation (DCE); Command Maintenance Management Inspection (CMMI); Technical Proficiency Inspection (TPI); personnel turbulance; costs; labor relations; site selection; training; awards and trophies; and mention of virtually every unit. </span><strong data-dcnode-id="8589"><span data-dcnode-id="8590" instrument_node="">[Formerly ARADCOM-3 and ARADCOM Historical Monograph 3M] [2 copies]</span></strong><span data-dcnode-id="8588" instrument_node=""> </span></p><span data-dcnode-id="8586" instrument_node="">

tinental United States, DA-OP-US-1-50, 24 November 1950; Detailed Deployment of 66 AAA Battalions--Extract from Command Report-1951; Memorandum of Agreement Between General Collins and General Vandenberg, 1 August 1950, with Change Dated 20 November 1950; DA Letters AGAO-S, G3, 26 March 1951, Army Antiaircraft Command 322 TS; Mutual Agreement for the Air Defense of the United States, 15 July 1952; ARAACOM General Orders 14, 20 May 1955, Discontinuance of Eastern Army Antiaircraft Command; ARAACOM General Orders 19, 27 June 1955 Redesignation of Units; ADOAA-3 Letter from ARAACOM to Region Commanders, 10 August 1955, Increased Combat Readiness of AA Units (U) O&amp;T 370.2; Key Figures in Air Defense 1949-1955; Memorandum, From LTG John T. Lewis to MAJ Roy S. Marnard, 1 May 1972, Answers to questionnaire of March 28, 1972; and Letter from COL Walter F. Ellis to MAJ Roy S. Barnard, 19 June 1971. Contains information on: Cold War; National Security Act of 1947; World War II; Soviet Union; Continental Air Command; antiaircraft artillery; surface to air missile (SAM); planning; rules of engagement; Army National Guard (ARNG); Continental Air Defense Command (CONAD); MG Willard W. Irvine; LTG John T. Lewis; LTG Stanley R. Mickelsen; NIKE; NIKE AJAX; Washington; Hanford; Sault Ste Marie; 40mm antiaircraft gun; 75mm SKYSWEEPER; 90mm antiaircraft gun; and 120mm antiaircraft gun. Provides identifications of all antiaircraft units (gun or missile) involved. </span><strong data-dcnode-id="8560"><span data-dcnode-id="8561" instrument_node="">[Formerly ARADCOM-4 and ARADCOM Historical Project 5M-I] [2 copies of which Copy 1 is the version staffed to the Office of the Chief of Military History (OCMH) in 1972 and Copy 2 is 1971's more abridged 134 pp. version--catalog entries relate to Copy 1]</span></strong><span data-dcnode-id="8559" instrument_node=""> </span></p><span data-dcnode-id="8557" instrument_node="">

</span><p data-dcnode-id="4750"><span data-dcnode-id="4751" instrument_node=""> 158 pp. maps, charts, diagrams, illustrations, notes, bibliography, glossary, appendix, tables. CRESS, under contract with the Department of the Army, prepared a study for a social science research project in support of Army requirements. Views or conclusions contained in the reports are those of its authors and should not be interpreted as representing official policies of the Department of the Army or the U.S. Government. This is a study about terrorism as practiced by the Viet Cong (VC) in South Vietnam from 1963 through 1966. It is concerned with two aspects of (VC) terrorism: those VC actions that can be described as terrorist acts and the nonmilitary targets against which such actions were directed.</span></p><span data-dcnode-id="4749" instrument_node="">
</span><p data-dcnode-id="4747"><span data-dcnode-id="4748" instrument_node="">The document consists of the following: a Foreword: general information; Viet Minh and Viet Cong Terrorism; U.S. Assistance; Plan of the Study; Acknowledgements; a Summary: Problems; Facts: consisting of the Definition of Terrorism; Assumptions, Data: Access and Weaknesses; Methodology; Major Findings; Operational Implications: Insurgency; Counterinsurgency; Part I. Introduction. Chapter 1. Objectives and Methodology: Background; Sources of Data; Methodology. Chapter 2. Conceptual and Historic Considerations: A Survey of the Literature on Terrorism; Propositional Statements consisting of Contexts: Social Conditions and Social Change Processes; Social Groups and Social Institutions; Characteristics of Groups and Institutions; Conflict and Activities: Conflicts Situations, Events, and Activities; Revolutionary Process: Dynamics, Types, and Outcomes of Revolutions; Communications: Activities and Instruments; Nonsocial Elements; Conceptualization and Theory-Building: Social Change and Violence; Social Units and Violence; Violence and Terrorism; Psychological Effects of Terrorism; Terrorism and the Phases of Insurgency; Part II. Viet Cong Terrorism. Chapter 3. Patterns and Characteristics. Actions Defined, VC Strategy, Terrorism: Yearly Totals, Patterns. Targets Defined, Target Patterns and Characteristics. Chapter 4. Political and Military Context. Political and Military Timetable; Political Events and Terrorism: Coups de’Etat; Civil Disturbances: Riots and Demonstrations; National and Local Elections; Martial Law and Government-Imposed Restrictions; Changes in Government; Government Communiqués, Decrees, and Announcements of Plans; Resignations or purges of Government officials; Revolts; Open Arms Policy, Release of Prisoners and Amnesties; Social and Political Reforms; Regional Conferences of International Importance, Other Events; Conclusions; National and Religious Holidays and Terrorism: Tet Tan Sun; Le Van Duyet Day; Hai Ba Trung Day; Birth, Enlightenment, and Death of Buddha: Anniversary of the Fall of Dien Bien Phu; International Labor Day; Hung Vuong Day and Le Loi Day; Birth of Confucius: National Day: the Anniversary of the Namky Insurrection; Foundations of the Liberation Army; the Birth of Christ; Conclusions; Military Developments and VC Terrorism: Operations in 1963 through 1966; Conclusions. Chapter 5. Economic and Geographic Context: Seasonal Cycles and Agricultural Activities and Terrorism. Regional Variations in Agriculture; Five Provinces; Conclusions; Communications Development, Population Concentration, and Geographic Considerations and Terrorism: Northeastern Binh Dinh; Phu My District in Binh Dinh; Qui Nhon in Binh Dinh; South of Qui Nhon in Binh Dinh; Capital City of Tay Ninh; Hieu Thien; Southeast of Tay Ninh; Conclusions </span></p><span data-dcnode-id="4746" instrument_node="">

      </span><p data-dcnode-id="3855"><span data-dcnode-id="3856" instrument_node="">This document was prepared in response to a study request from the Secretary of the Army. This study provides an examination of the mobilization and use of Army National Guard (ARNG) and Army Reserve (USAR) forces for the Vietnam War. Chapter 2 reviews the historical mobilization experiences of the United States in order to gain an appreciation and perspective of the mobilization and use of the Militia/National Guard and Reserves throughout US history. Chapter 3 examines the extent to which the President and his civilian and military advisers consider mobilization during the first 3 years of the Vietnam ground war and the rationale behind the non-mobilization during this period. Chapter 4 focuses on the 1968 mobilization for the Vietnam War and addresses in detail what happened regarding the Army Reserve Component forces involved. Chapter 5 ends the study with conclusions and interpretation relative to mobilization in general and to the partial mobilization for the Vietnam War. Cross Reference: Revolutionary War; War of 1812; Mexican War; Civil War; Spanish-American War; World War I; World War II; Korean War; Berlin Crisis. </span></p><span data-dcnode-id="3854" instrument_node="">

</span><p data-dcnode-id="1338"><span data-dcnode-id="1342" instrument_node="">Major Karcher describes the “victory disease,” which arises from a powerful nation’s overwhelming faith in its previously demonstrated military and industrial power. Such a disease leads to complacency and rigidity of tactics. When a seemingly inferior enemy reacts unpredictably, the victory disease takes effect; the more powerful nation surrenders military initiative to the foe and thus loses. Contents: Foreword; Preface; Chapter 1: Introduction; Chapter 2: The Battle of the Little Bighorn; Chapter 3: Task Force </span><em data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Ranger </span></em><span data-dcnode-id="1339" instrument_node="">in Mogadishu; Chapter 4: The Search for a Vaccine; Chapter 5: Recommendations and Conclusion; Bibliography. </span></p><span data-dcnode-id="1337" instrument_node="">
