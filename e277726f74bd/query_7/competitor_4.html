</span><div class="combi_pagedesc" data-dcnode-id="3619" id="intro"><span data-dcnode-id="3620" instrument_node=""> Howsoever you hate history you cannot deny the fact that it is interesting and exciting to know about historic events that shaped the world and people who were real icons of the past. They were the trailblazers who have directed much of our past, present and our future. While reading history is not everyone’s cup of tea, there are some who take it up professionally. Historians are people who research, study and write about the past. They are involved with continuous research of past events and study history of all times and human race. Every country has its own pool of historians who unleash the past for the mankind’s present and future. American historians have time and again explored the bygone era and brought forth unknown facts about America’s modest past and the events that led it to become a super power. They have covered every aspect of American history right from its African-America past, the Civil War, American liberalism and its global super power status. Eric Foner, Allan Nevins, Arthur M Schlesinger Jr, Francis Parkman, Bruce Catton are some of the celebrated American historians who have brought to limelight the historic past of America. Check this write-up to find in details about the famous American historians, their life and their works. </span></div><span data-dcnode-id="3618" instrument_node="">
