ument_node="">Updated </span><span data-dcnode-id="985" instrument_node="">October 13, 2018 </span></span><span data-dcnode-id="980"><span data-dcnode-id="983" instrument_node="">24</span><span data-dcnode-id="981" instrument_node=""> items</span></span></div></div></div></div></div></div></div></div></header></div></div><div class="container_container__1FDQv" data-dcnode-id="948"><div class="container_innerContainer__3qB8K" data-dcnode-id="949"><div class="description_main__3Ehfh ck-content" data-dcnode-id="950"><div class="description_text__3Xyg2" data-dcnode-id="954" data-testid="expandable-div" style="max-height:105px"><div data-dcnode-id="955"><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">List of notable or famous historians from Australia, with bios and photos, including the top historians born in Australia and even some popular historians who immigrated to Australia. If you're trying to find out the names of famous Australian historians then this list is the perfect resource for you. These historians are among the most prominent in their field, and information about each well-known historian from Australia is included when available. </span></p><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Geoffrey Blainey and Jill Ker Conway are a great starting point for your to rank your favorites on this list </span></p><p data-dcnode-id="960"><span data-dcnode-id="964" instrument_node="">This historic historians from Australia list can help answer the questions "Who are some Australian historians of note?" and "Who are the </span><a class="edS-cl" data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ranker.com/list/famous-historians-from-united-states-of-america/reference%3Fref%3DinternalCrossLinking_keyword"><span data-dcnode-id="963" instrument_node="">most famous historians</span></a><span data-dcnode-id="961" instrument_node=""> from Australia?" These prominent historians of Australia may or may not be currently alive, but what they all have in common is that they're all respected Australian historians.</span></p><span data-dcnode-id="959" instrument_node="">Use this list of renowned Australian historians to discover some new historians that you aren't familiar with. Don't forget to share this list by clicking one of the </span><a class="edS-cl" data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ranker.com/tags/social-media%3Fref%3DinternalCrossLinking_tag"><span data-dcnode-id="958" instrument_node="">social media</span></a><span data-dcnode-id="956" instrument_node=""> icons at the top or bottom of the page. {#nodes}</span></div></div><button class="description_expandButton__3aBFs" data-dcnode-id="951" data-testid="expand-button" type="button"><svg class="description_expandIcon__B4P77" data-dcnode-id="952" fill="none" viewBox="0 0 76 17"><path d="M2.37402 2L37.874 15L73.374 2" data-dcnode-id="953" stroke="black" stroke-linecap="round" stroke-linejoin="round" stroke-width="4"></path></svg></button></div></div></div><div class="container_container__1FDQv" data-dcnode-id="301"><div class="container_innerContainer__3qB8K" data-dcnode-id="302"><div class="list_contentContainer__XVNsa" data-dcnode-id="303"><div class="blogView_main__332IP" data-dcnode-id="304"><div data-dcnode-id="946"><div data-dcnode-id="947" id="MOBILE_GRID_NATIVE_01"></div></div><ul data-dcnode-id="306"><li class="blogItem_container__1XfcA blogItem_content__1sIAv blogItem_noImageAndRank__2xWJT" data-dcnode-id="927" role="listitem"><meta content="//www.ranker.com/review/alec-campbell/424238" data-dcnode-id="945" itemprop="url"><div class="Title_container__20aOq blogItem_title__39YPF" data-dcnode-id="938"><div class="Title_itemNameContainer__36EDp" data-dcnode-id="939"><meta content="Alec Campbell" data-dcnode-id="944" itemprop="name"><meta content="1" data-dcnode-id="943" itemprop="position"><h2 class="Title_title__2P7ae" data-dcnode-id="940"><a class="Title_link__2Ofm7" data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ranker.com/review/alec-campbell/424238%3Fref%3Dnode_name%26pos%3D1%26l%3D1070841" rel="noreferrer" target="_self"><span data-dcnode-id="942" instrument_node="">Alec Campbell</span></a></h2></div></div><div class="richText_container__3rpQz richText_italic__k7KBx blogItem_textContainer__22V8N" data-dcnode-id="935" data-testid="RichText"><span data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Alexander William Campbell (26 February 1899 – 16 May 2002) was the final surviving Australian participant of the Gallipoli campaign during the First World War. Campbell joined the Australian Army at the age of 16 in 1915, and served as a stores carrier for two months during the fighting at Gallipoli. He was invalided home and discharged in 1916. He later worked in large number of roles, was twice married and had nine children. He is the great-grandfather of actress, singer and model Ruby Rose.

Charles Thomas "Tom" Stannage, AM (14 March 1944 – 4 October 2012) was a prominent Western Australian historian, academic, and Australian rules football player. He edited the major work A New History of Western Australia, which was published in 1981.

a content="9" data-dcnode-id="728" itemprop="position"><h2 class="Title_title__2P7ae" data-dcnode-id="725"><a class="Title_link__2Ofm7" data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ranker.com/review/glenn-a-baker/1076936%3Fref%3Dnode_name%26pos%3D9%26l%3D1070841" rel="noreferrer" target="_self"><span data-dcnode-id="727" instrument_node="">Glenn A. Baker</span></a></h2></div></div><div class="richText_container__3rpQz richText_italic__k7KBx blogItem_textContainer__22V8N" data-dcnode-id="720" data-testid="RichText"><span data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Glenn A. Baker  (born 28 July 1952) is an Australian journalist, commentator, author, and broadcaster well known in Australia for his vast knowledge of Rock music. He has written books and magazine articles on rock music and travel, interviewed celebrities, managed bands such as Ol' 55 and promoted tours of international stars. In the mid-1980s, Baker took the BBC's "Rock Brain of the Universe" crown three times. Baker was the Australian editor of Billboard for over 20 years. He won the inaugural Australian Travel Writer of the Year award in 1995 from the Australian Society of Travel Writers, and he won the award again in 2000.</span></span></div><ul class="blogItem_properties__3kQW0" data-dcnode-id="714"><li class="properties_item__7BJZb" data-dcnode-id="715"><strong data-dcnode-id="717"><span data-dcnode-id="719" instrument_node="">Birthplace</span><span data-dcnode-id="718" instrument_node="">: </span></strong><span data-dcnode-id="716" instrument_node="">Coogee, Australia</span></li></ul><div data-dcnode-id="713" style="clear:both"></div></li><li class="blogView_ads__3YSR8" data-dcnode-id="709" data-testid="ADS_TEST_ID"><div class="ad inline" data-dcnode-id="710"><div class="ra-ad-container" data-dcnode-id="711" id="MOBILE_BLOG_BTF_09"></div></div></li><li class="blogItem_container__1XfcA blogItem_content__1sIAv blogItem_noImageAndRank__2xWJT" data-dcnode-id="687" role="listitem"><meta content="//www.ranker.com/review/graham-jenkin/63279883" data-dcnode-id="708" itemprop="url"><div class="Title_container__20aOq blogItem_title__39YPF" data-dcnode-id="701"><div class="Title_itemNameContainer__36EDp" data-dcnode-id="702"><meta content="Graham Jenkin" data-dcnode-id="707" itemprop="name"><meta content="10" data-dcnode-id="706" itemprop="position"><h2 class="Title_title__2P7ae" data-dcnode-id="703"><a class="Title_link__2Ofm7" data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ranker.com/review/graham-jenkin/63279883%3Fref%3Dnode_name%26pos%3D10%26l%3D1070841" rel="noreferrer" target="_self"><span data-dcnode-id="705" instrument_node="">Graham Jenkin</span></a></h2></div></div><div class="richText_container__3rpQz richText_italic__k7KBx blogItem_textContainer__22V8N" data-dcnode-id="695" data-testid="RichText"><span data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Graham Jenkin is an Australian poet, historian, composer, and educator.
Graham Jenkin was born in Adelaide and educated at various country schools and at Prince Alfred College, Wattle Park Teachers College, and the University of Adelaide. He spent two years working as a jackeroo on stations in northern South Australia. In 1961, he founded the Tea and Damper Club which was devoted to the preservation of Australian folklore, music and poetry.
From 1963 to 1965, he was Head Teacher of Coober Pedy Primary School.
In 1966, Graham Jenkin was appointed as a lecturer at Wattle Park Teachers College and then its successor institution the University of South Australia.
