</span></div></div></header><div class="site-inner" data-dcnode-id="355"><section class="hero-section" data-dcnode-id="779" id="hero-section" role="banner"><div class="wrap" data-dcnode-id="780"><h1 class="entry-title" data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">15 Famous Economists and Their Contributions That’ll Truly Amaze You</span></h1><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Economists study the ways a society uses scarce resources such as land, labor, raw materials, and machinery to produce goods and services. They analyze the costs and benefits of distributing and consuming these goods and services. Karl Marx, John Keynes are some of the well known economists of all time.</span></p><div class="breadcrumb" data-dcnode-id="781"><span class="breadcrumb-link-wrap" data-dcnode-id="789"><a class="breadcrumb-link" data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historyplex.com/"><span class="breadcrumb-link-text-wrap" data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Home</span></span></a><meta data-dcnode-id="790"></span><span data-dcnode-id="788" instrument_node=""> / </span><span class="breadcrumb-link-wrap" data-dcnode-id="783"><a class="breadcrumb-link" data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historyplex.com/category/uncategorized"><span class="breadcrumb-link-text-wrap" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Uncategorized</span></span></a><meta data-dcnode-id="784"></span><span data-dcnode-id="782" instrument_node=""> / 15 Famous Economists and Their Contributions That’ll Truly Amaze You</span></div></div></section><div class="content-sidebar-wrap" data-dcnode-id="356"><main class="content" data-dcnode-id="411" id="genesis-content"><article aria-label="15 Famous Economists and Their Contributions That’ll Truly Amaze You" class="post-1690 post type-post status-publish format-standard category-uncategorized grow-content-body entry" data-dcnode-id="532" itemref="hero-section"><div class="entry-content" data-dcnode-id="619"><div class="revbox-inline-the-content-wrapper" data-dcnode-id="627"><div class="bz-card-image" data-dcnode-id="777"><img alt="15 Famous Economists and Their Contributions" data-dcnode-id="778" height="800" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.ibuzzle.com/media/images-en/photos/finance/1200-457981-economists-and-their-contributions.jpg&amp;raw" width="1200"></div><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Economists study the ways a society uses scarce resources such as land, labor, raw materials, and machinery to produce goods and services. They analyze the costs and benefits of distributing and consuming these goods and services. Karl Marx, John Keynes are some of the well known economists of all time.</span></p><span data-dcnode-id="773" instrument_node="">
</span><h3 data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Did You Know?</span></h3><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="769" instrument_node="">The first Nobel Memorial Prize in Economic Sciences was shared by Norwegian economist, Ragnar Frisch, and Dutch economist, Jan Tinbergen, in 1969.</span><br data-dcnode-id="768"><span data-dcnode-id="767" instrument_node="">_________________________________</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Studying, developing, and applying theories and concepts of economics is no easy thing to do, and excellence in this is what it takes to become a good economist. If names like John M. Keynes, Adam Smith, Milton Friedman, David Hume, Ludwig von Mises, and Thomas Malthus feature in any given list of famous economists, it’s because of their immense contribution. Though they came from different parts of the world, they had a key role in shaping the world economy.</span></p><span data-dcnode-id="762" instrument_node="">
</span><h2 data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">15 Famous Economists of the World</span></h2><span data-dcnode-id="759" instrument_node="">
</span><h3 data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">▲ John Maynard Keynes (1883 – 1946)</span></h3><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">John Maynard Keynes was a British economist, best known for spearheading the revolution in economic thinking, which overturned the then existent ideas of neoclassical economics. Keynes is also regarded by many as the founder of modern theoretical macroeconomics. His ideas formed the basis of an independent school of thought, Keynesian economics. His contributions include some of the most useful economic concepts, including liquidity preference, fiscal multiplier, deficit spending, and aggregate demand-aggregate supply model.</span></p><span data-dcnode-id="753" instrument_node="">
</span><h3 data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">▲ Adam Smith (1723 – 1790)</span></h3><span data-dcnode-id="750" instrument_node="">
</span><div class="bz-card-image" data-dcnode-id="745"><span data-dcnode-id="749" instrument_node="">
</span><a class="bz-enlarge remote" data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.ibuzzle.com/media/images-en/gallery/famous-personalities/1200-176963427-adam-smith.jpg" rel="noopener noreferrer nofollow" target="_blank"><img alt="adam-smith" data-dcnode-id="748" data-pin-media="https://media.ibuzzle.com/media/images-en/gallery/famous-personalities/1200-176963427-adam-smith.jpg" height="397" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.ibuzzle.com/media/images-en/gallery/famous-personalities/600-176963427-adam-smith.jpg&amp;raw" width="600"></a><span data-dcnode-id="746" instrument_node="">
</span></div><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Adam Smith was a Scottish philosopher and political economist who is widely considered the father of modern economics and the world’s first free-market capitalist, for he explained how―in a free-market economy―rational self-interest led to economic well-being. Undoubtedly one of the biggest names in this field, he influenced the likes of Karl Marx, John M. Keynes, and Thomas Malthus. Smith’s contribution to economics came in the form of his famous works: The Theory of Moral Sentiments (1759) and The Wealth of Nations (1776); the latter was published as a five-book series.</span></p><span data-dcnode-id="741" instrument_node="">
</span><h3 data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">▲ David Ricardo (1772 – 1823)</span></h3><span data-dcnode-id="738" instrument_node="">
</span><div class="bz-card-image" data-dcnode-id="733"><span data-dcnode-id="737" instrument_node="">
</span><a class="bz-enlarge remote" data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.ibuzzle.com/media/images-en/gallery/famous-personalities/1200-92832774-david-ricardo.jpg" rel="noopener noreferrer nofollow" target="_blank"><img alt="david-ricardo" data-dcnode-id="736" data-pin-media="https://media.ibuzzle.com/media/images-en/gallery/famous-personalities/1200-92832774-david-ricardo.jpg" height="746" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.ibuzzle.com/media/images-en/gallery/famous-personalities/600-92832774-david-ricardo.jpg&amp;raw" width="600"></a><span data-dcnode-id="734" instrument_node="">
</span></div><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">David Ricardo was a British political economist, who together with James Mill, founded classical economics. It was Adam Smith’s The Wealth of Nations that inspired Ricardo to take interest in this subject. He was a believer of monetarism, which was evident from his argument that the propensity of the Bank of England to issue excess banknotes was responsible for the prevailing inflation in the country. His biggest contribution to the field of economics was his theory of comparative advantage.</span></p><span data-dcnode-id="729" instrument_node="">
</span><h3 data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">▲ Milton Friedman (1912 – 2006)</span></h3><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Yet another renowned figure in this field, Milton Friedman was an American economist and statistician. An ardent advocate of laissez-faire capitalism, Friedman was awarded the Nobel Memorial Prize in Economics in 1976. He was best known for his demonstration of the complexity of stabilization policy, which was introduced to stabilize the economy. Some of his prominent contributions to this field include the concept of monetarism, price theory, permanent income hypothesis, floating exchange rates, applied macroeconomics, and the Friedman test.</span></p><span data-dcnode-id="723" instrument_node="">
</span><h3 data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">▲ Karl Marx (1818 – 1883)</span></h3><span data-dcnode-id="720" instrument_node="">
</span><div class="bz-card-image" data-dcnode-id="715"><span data-dcnode-id="719" instrument_node="">
</span><a class="bz-enlarge remote" data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.ibuzzle.com/media/images-en/gallery/famous-personalities/1200-91284866-karl-marx.jpg" rel="noopener noreferrer nofollow" target="_blank"><img alt="karl-marx" data-dcnode-id="718" data-pin-media="https://media.ibuzzle.com/media/images-en/gallery/famous-personalities/1200-91284866-karl-marx.jpg" height="526" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.ibuzzle.com/media/images-en/gallery/famous-personalities/600-91284866-karl-marx.jpg&amp;raw" width="600"></a><span data-dcnode-id="716" instrument_node="">
</span></div><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Though he is more often remembered as a German philosopher and revolutionary sociologist, Karl Marx did a lot for economics as well. He was of the belief that humans were not motivated by grand ideas, but by material concerns related to survival. Marx looked at capitalism negatively and in his book Das Kapital argued that the capitalist’s profits come from exploiting labor. He predicted the end of capitalism and emergence of communism, where people would own the means of production, and thus, there would be no need to exploit labor for profit.</span></p><span data-dcnode-id="711" instrument_node="">
</span><h3 data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">▲ David Hume (1711 – 1776)</span></h3><span data-dcnode-id="708" instrument_node="">
</span><div class="bz-card-image" data-dcnode-id="703"><span data-dcnode-id="707" instrument_node="">
</span><a class="bz-enlarge remote" data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.ibuzzle.com/media/images-en/gallery/famous-personalities/1200-119365056-david-hume.jpg" rel="noopener noreferrer nofollow" target="_blank"><img alt="david-hume" data-dcnode-id="706" data-pin-media="https://media.ibuzzle.com/media/images-en/gallery/famous-personalities/1200-119365056-david-hume.jpg" height="723" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.ibuzzle.com/media/images-en/gallery/famous-personalities/600-119365056-david-hume.jpg&amp;raw" width="600"></a><span data-dcnode-id="704" instrument_node="">
</span></div><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">David Hume was a renowned philosopher and economist hailing from Scotland. Even though he was more of a philosopher, he is regarded as one of the most eminent economists of the world, as his discussions on politics led to the development of several ideas that are prevalent in the field of economics even today. He was of the opinion that foreign trade is a stimulus for economic growth, and therefore, is very important for the development of the nation.</span></p><span data-dcnode-id="699" instrument_node="">
</span><h3 data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">▲ Irving Fisher (1867 – 1947)</span></h3><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">One of the famous American economists, Irving Fisher is best known for economic concepts such as the Fisher equation and Fisher separation theorem. It was his work on quantity theory of money that became the basis for the development of Milton Friedman’s concept of ‘monetarism’. Besides the Fisher equation and Fisher separation theorem, he is also known for contributions such as the equation of exchange, price index, Philips curve, and monetary illusion.</span></p><span data-dcnode-id="693" instrument_node="">
</span><h3 data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">▲ Thomas Robert Malthus (1766 – 1834)</span></h3><span data-dcnode-id="690" instrument_node="">
</span><div class="bz-card-image" data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">
</span><a class="bz-enlarge remote" data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.ibuzzle.com/media/images-en/gallery/famous-personalities/1200-92846118-thomas-robert-malthus.jpg" rel="noopener noreferrer nofollow" target="_blank"><img alt="thomas-robert-malthus" data-dcnode-id="688" data-pin-media="https://media.ibuzzle.com/media/images-en/gallery/famous-personalities/1200-92846118-thomas-robert-malthus.jpg" height="847" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.ibuzzle.com/media/images-en/gallery/famous-personalities/600-92846118-thomas-robert-malthus.jpg&amp;raw" width="600"></a><span data-dcnode-id="686" instrument_node="">
</span></div><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Not many people would need an introduction to the English demographer and political economist, Thomas Robert Malthus; best known for his popularization of the economic theory of rent. He was one of those economists who played a crucial role in the development of classical economics as the first modern school of economic thought. Malthus was one of the most influential and controversial figures in the field of economics and politics. His major contribution to this field came in the form of the Malthusian growth model.</span></p><span data-dcnode-id="681" instrument_node="">
</span><h3 data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">▲ Ludwig von Mises (1881 – 1973)</span></h3><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Ludwig von Mises was one of the most important figures of the Austrian School of economics. He is best known for his work on praxeology, i.e., the deductive study of our actions which suggests that we engage in purposeful behavior. Mises’ contribution to the world of economics came in the form of his works like The Theory of Money and Credit, Socialism: An Economic And Sociological Analysis, Human Action, and the Theory and History. Furthermore, his business cycle theories, which were quite influential in themselves, were developed by his student, Friedrich Hayek.</span></p><span data-dcnode-id="675" instrument_node="">
</span><h3 data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">▲ Friedrich Hayek (1899 – 1992)</span></h3><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Friedrich Hayek was an Austrian-born economist and philosopher, best known for his support of classical liberalism and free-market capitalism. A member of the Austrian School of economics, Hayek was awarded the Nobel Memorial Prize in Economics in 1974, which he shared with the Swedish economist, Gunnar Myrdal. The Hebbian Theory, economic calculation problem, price signal, spontaneous order, catallaxy, and dispersed knowledge were his major contributions to economics.</span></p><span data-dcnode-id="669" instrument_node="">
</span><h3 data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">▲ Jean-Baptiste Say (1767 – 1832)</span></h3><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Jean-Baptiste Say was a French economist, who is best known for the Say’s Law, which suggests that supply creates its own demand. Despite its name, the Say’s Law was not a product of his brain. He only popularized it in his work, the Treatise on Political Economy. Say was in favor of competition, free trade, and lifting restraints on business. Though he was responsible for introducing much of Adam Smith’s work to continental Europe, he was also an ardent critic of some of Smith’s noted work, such as the labor theory of value.</span></p><span data-dcnode-id="663" instrument_node="">
</span><h3 data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">▲ Joan Robinson (1903 – 1983)</span></h3><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="659" instrument_node="">British economist, Joan Robinson was one of the most famous women economists that the world has ever seen. She started off as a supporter of neoclassical economics, but eventually shifted</span><br data-dcnode-id="658"><span data-dcnode-id="657" instrument_node="">
to post-Keynesian economics. Robinson was best known for her knowledge about monetary economics and contributions to economic theory. Her major contributions to post-Keynesian economics came in the form of the Cambridge growth theory and Amoroso-Robinson relation.</span></p><span data-dcnode-id="655" instrument_node="">
</span><h3 data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">▲ James Tobin (1918 – 2002)</span></h3><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">James Tobin was an American economist, who was one of the prominent figures involved in the development of Keynesian economics. He is best known for the Tobit model, which describes the relationship between a non-negative dependent variable and an independent variable. He was awarded the Nobel Memorial Prize in Economic Sciences in 1981. Tobin’s noteworthy contributions to the field of macroeconomics include the modern portfolio theory, Tobin’s q, Tobit model, Tobin tax, and the Mundell-Tobin effect.</span></p><span data-dcnode-id="649" instrument_node="">
</span><h3 data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">▲ Amartya Sen (1933 – Present)</span></h3><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Amartya Sen, hailing from India, is best known for his human development theory, which is a combination of ecological economics, sustainable development, welfare economics, and feminist economics. Dr. Sen’s contributions to welfare economics earned him the Nobel Prize in Economic Sciences in 1998. He was listed as one of the 100 most influential persons in the world by Time Magazine in 2010.</span></p><span data-dcnode-id="643" instrument_node="">
</span><h3 data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Paul Krugman (1953 – Present)</span></h3><span data-dcnode-id="640" instrument_node="">
</span><div class="bz-card-image" data-dcnode-id="635"><span data-dcnode-id="639" instrument_node="">
</span><a class="bz-enlarge remote" data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.ibuzzle.com/media/images-en/gallery/editorials/famous-personalities/1200-83250037-paul-krugman.jpg" rel="noopener noreferrer nofollow" target="_blank"><img alt="paul-krugman" data-dcnode-id="638" data-pin-media="https://media.ibuzzle.com/media/images-en/gallery/editorials/famous-personalities/1200-83250037-paul-krugman.jpg" height="401" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.ibuzzle.com/media/images-en/gallery/editorials/famous-personalities/600-83250037-paul-krugman.jpg&amp;raw" width="600"></a><span data-dcnode-id="636" instrument_node="">
</span></div><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Paul Krugman is an American economist best known for his work on international economics. It is not at all surprising that he features in this list; after all his noteworthy contributions include the international trade theory, new trade theory, new economic geography, etc. His work on the new trade theory and new economic geography earned him a Nobel Memorial Prize in Economics in 2008. A columnist for The New York Times, Krugman has several books and scholarly articles to his credit.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Their work didn’t just help the economy of their respective countries, but was also beneficial for the world economy. If it was not for these economists, several key concepts of the subject would have been a lot more difficult for us to understand or explain.</span></p><span data-dcnode-id="628" instrument_node="">
</span></div><span data-dcnode-id="626" instrument_node="">
</span><div class="pagination-previous alignleft" data-dcnode-id="623"><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historyplex.com/inventions-by-women" rel="prev"><span data-dcnode-id="625" instrument_node="">« Previous Post</span></a></div><div class="pagination-next alignright" data-dcnode-id="620"><a data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historyplex.com/influential-people-of-20th-century" rel="next"><span data-dcnode-id="622" instrument_node="">Next Post »</span></a></div></div><span data-dcnode-id="618" instrument_node=""> </span><p class="dpsp-share-text" data-dcnode-id="616" style="margin-bottom:10px"><span data-dcnode-id="617" instrument_node="">
