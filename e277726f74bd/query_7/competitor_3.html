</span></div></div></div></div><div class="post-title-wrapper" data-dcnode-id="935"><h1 class="post-title" data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">On the Shoulders of Giants: 7 Famous Art Historians Who Changed the Field</span></h1><div class="post-info" data-dcnode-id="936"><div class="date-info" data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">December 5, 2019</span></div><div class="category-info" data-dcnode-id="943"><span data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">|</span></span><span data-dcnode-id="946" instrument_node="">In </span><a data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.academyart.edu/school/art-history/" title="View all posts in Art History"><span data-dcnode-id="945" instrument_node="">Art History</span></a></div><div class="author-info" data-dcnode-id="937"><span data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">|</span></span><span data-dcnode-id="940" instrument_node="">By </span><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.academyart.edu/author/academy-contributor/"><span data-dcnode-id="939" instrument_node="">Academy Contributor</span></a></div></div></div><span data-dcnode-id="934" instrument_node="">
</span><h2 data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">The contributions of these seven famous art historians have changed how we approach works of art today.</span></h2><span data-dcnode-id="931" instrument_node="">
</span><span data-dcnode-id="930" id="more-67376"></span><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Studying the past can often help us better understand how we got
to where we are today. </span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">Art historians in particular examine important works of art to learn about the time period during which the art was created. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academyart.edu/academics/art-history/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="924" instrument_node="">Delving into art history</span></a><span data-dcnode-id="922" instrument_node=""> can also help you connect the dots between major art movements and contextualize the present.</span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="919" instrument_node="">As a result, art historians frequently use problem solving, critical thinking, and research skills. In addition, they must be detail-oriented and familiar with a wide range of art styles. Because of their understanding of art, art historians can </span><a aria-label=" (opens in a new tab)" data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academyart.edu/academics/art-history/careers/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="918" instrument_node="">occupy positions ranging from museum curator to professor</span></a><span data-dcnode-id="916" instrument_node="">.</span></p><span data-dcnode-id="914" instrument_node="">
</span><h3 data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Famous Art Historians</span></h3><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">The analyses and discoveries of art historians can influence and
change how we conceptualize entire art genres. Below are seven of the world’s
most famous art historians:</span></p><span data-dcnode-id="908" instrument_node="">
</span><h4 data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Giorgio Vasari</span></h4><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Born in 1511, Giorgio Vasari was an Italian architect, painter,
and biographer. He is often called “the first art historian.”</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="901" instrument_node="">His book, </span><em data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Lives of the Most
Eminent Painters, Sculptors, and Architects</span></em><span data-dcnode-id="898" instrument_node="">, documents the lives of
Renaissance artists such as Cimabue, Giotto, and Michelangelo. It also opens a
window into conversations about the history and development of Western art
during Vasari’s time.</span></p><span data-dcnode-id="896" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="891"><a data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-giorgio-vasari.jpg" rel="noreferrer noopener" target="_blank"><img alt="Famous Art Historians - Giorgio Vasari" class="wp-image-67383" data-dcnode-id="895" height="536" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-giorgio-vasari-1024x536.jpg&amp;raw" srcset="https://blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-giorgio-vasari-1024x536.jpg 1024w, https://blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-giorgio-vasari-300x157.jpg 300w, https://blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-giorgio-vasari-768x402.jpg 768w, https://blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-giorgio-vasari.jpg 1050w" width="1024"></a><figcaption data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Giorgio Vasari. Image courtesy of the New York Times.</span></figcaption></figure><span data-dcnode-id="890" instrument_node="">
</span><h4 data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Johann Joachim Winckelmann</span></h4><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">A German art historian and archaeologist, Johann Joachim
Winckelmann was born in 1717, two hundred years after Giorgio Vasari. </span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Winckelmann is most famous for his studies of Greek and Roman art,
architecture, and sculpture. In fact, his work shaped the Neoclassical art
movement, which tried to revive Greek and Roman art styles.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Interestingly, he never visited Greece and based his entire
analysis on Roman copies of Greek art.</span></p><span data-dcnode-id="878" instrument_node="">
</span><h4 data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">John Ruskin</span></h4><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="874" instrument_node="">John Ruskin was an English polymath who lived during the Victorian
era. While Ruskin’s </span><em data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Modern Painters</span></em><span data-dcnode-id="871" instrument_node=""> books
catapulted him into fame, his essays advocating for cultural and social change inspired
a great many philosophers, activists, and economists, ranging from Hobson to
Gandhi.</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Ruskin’s writings and theories also heavily influenced the
Pre-Raphaelite movement of the mid-1800s.</span></p><span data-dcnode-id="866" instrument_node="">
</span><h4 data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Bernard Berenson</span></h4><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="862" instrument_node="">Specializing in the art of the Italian Renaissance, American art
historian Bernard Berenson wrote several books outlining the lives and works of
important artists, such as </span><em data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">The Drawings
of the Florentine Painters</span></em><span data-dcnode-id="859" instrument_node="">. </span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Art purchasers frequently sought Berenson’s opinion on paintings,
sculptures, and other works of art. Many of the masterpieces in today’s American
art museums were also purchased on his recommendations.</span></p><span data-dcnode-id="854" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="849"><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-bernard-berenson.jpg" rel="noreferrer noopener" target="_blank"><img alt="Famous Art Historians - Bernard Berenson" class="wp-image-67388" data-dcnode-id="853" height="260" sizes="(max-width: 945px) 100vw, 945px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-bernard-berenson.jpg&amp;raw" srcset="https://blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-bernard-berenson.jpg 945w, https://blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-bernard-berenson-300x83.jpg 300w, https://blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-bernard-berenson-768x211.jpg 768w" width="945"></a><figcaption data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Bernard Berenson. Image courtesy of the Harvard University Center for Italian Renaissance Studies.</span></figcaption></figure><span data-dcnode-id="848" instrument_node="">
</span><h4 data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Kenneth Clark</span></h4><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Kenneth Clark, a British art historian born in 1903, spent some
time studying under Bernard Berenson. </span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">During his career, Clark rose to great heights as director of Oxford’s
Ashmolean Museum and London’s famous National Gallery. Later, he became a distinguished
professor at Oxford. </span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Continuing his career in art education as the first chairman of
the Independent Television Authority, Clark also created and presented several
groundbreaking television programs on art. </span></p><span data-dcnode-id="836" instrument_node="">
</span><h4 data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Henry Geldzahler</span></h4><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="832" instrument_node="">A Belgian immigrant to the United States, Henry Geldzahler is best-known for curating modern art for prominent American museums. &nbsp;He also worked as the Commissioner of Cultural Affairs for New York City. Among his friends were prominent artists such as </span><a aria-label=" (opens in a new tab)" data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.academyart.edu/fine-arts-in-focus-what-is-pop-art/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="831" instrument_node="">major Pop Art figure Andy Warhol</span></a><span data-dcnode-id="829" instrument_node="">, David Hockney, and Jean-Michel Basquiat.</span></p><span data-dcnode-id="827" instrument_node="">
</span><h4 data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Lucy Lippard</span></h4><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Born in 1937, Lucy Lippard is an art historian famous for her
feminist analyses on contemporary art. As a curator, she organized exhibitions
for prestigious galleries and museums such as the Museum of Modern Art in New
York.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">In addition, Lippard played a big role in bringing conceptual art
to widespread attention, and her scholarship changed how conceptual art is
discussed today. Lastly, she also founded the Art Workers’ Coalition, which
worked to allow artists to have more input in how their work was showcased.</span></p><span data-dcnode-id="818" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="813"><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-lucy-lippard.jpg" rel="noreferrer noopener" target="_blank"><img alt="Famous Art Historians - Lucy Lippard" class="wp-image-67395" data-dcnode-id="817" height="450" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-lucy-lippard-3.jpg&amp;raw" srcset="https://blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-lucy-lippard-3.jpg 900w, https://blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-lucy-lippard-3-300x150.jpg 300w, https://blog.academyart.edu/wp-content/uploads/2019/12/famous-art-historians-lucy-lippard-3-768x384.jpg 768w" width="900"></a><figcaption data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Lucy Lippard. Image courtesy of Artspace.</span></figcaption></figure><span data-dcnode-id="812" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="811"><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="809" instrument_node="">Interested in learning more about famous art historians and the field that they work in? Multiple learning options at </span><a aria-label=" (opens in a new tab)" data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academyart.edu/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="808" instrument_node="">Academy of Art University</span></a><span data-dcnode-id="806" instrument_node=""> are available to you, ranging from studying on-campus to </span><a aria-label=" (opens in a new tab)" data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academyart.edu/about-us/news/art-history-school-ranks-among-2019s-best-online-masters-program/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="805" instrument_node="">studying online</span></a><span data-dcnode-id="803" instrument_node="">. So </span><a aria-label=" (opens in a new tab)" data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.academyart.edu/form-request-information/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="802" instrument_node="">reach out for more information</span></a><span data-dcnode-id="800" instrument_node=""> today, or </span><a aria-label=" (opens in a new tab)" data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academyart.edu/admissions/apply/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="799" instrument_node="">get started on your application</span></a><span data-dcnode-id="797" instrument_node="">!</span></p><span data-dcnode-id="795" instrument_node="">
