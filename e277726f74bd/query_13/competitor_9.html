</span><span data-dcnode-id="3578" id="freeTextContainer460973159110597256"><span data-dcnode-id="3582" instrument_node="">Neither William Dalrymple nor 'The Last Mughal' need another positive review after all the prior accolades they have received. This 2006 work continues the amazing metamorphosis of a travel writer into a historian. The writing seems effortless, although a tremendous amount of research has been done. Perhaps this is due to the author's passion for the world of which he writes, but it must be more than that. Greatness is easy to recognize and difficult to describe.</span><br data-dcnode-id="3581"><br data-dcnode-id="3580"><span data-dcnode-id="3579" instrument_node="">The book tells of the last empero</span></span><span data-dcnode-id="3577" instrument_node="">
</span><span data-dcnode-id="3563" id="freeText460973159110597256" style="display:none"><span data-dcnode-id="3576" instrument_node="">Neither William Dalrymple nor 'The Last Mughal' need another positive review after all the prior accolades they have received. This 2006 work continues the amazing metamorphosis of a travel writer into a historian. The writing seems effortless, although a tremendous amount of research has been done. Perhaps this is due to the author's passion for the world of which he writes, but it must be more than that. Greatness is easy to recognize and difficult to describe.</span><br data-dcnode-id="3575"><br data-dcnode-id="3574"><span data-dcnode-id="3573" instrument_node="">The book tells of the last emperor at the time of the Indian rebellion of 1857. In the final days of the dynasty real power had been ceded to the British, but the emperor was allowed to remain as a figurehead. In past centuries descendants of Islamic conquerors ruled partly by consensus, and a degree of religious freedom existed between Muslims and Hindus. The empire and its court were responsible for a great body of architecture and literature that flourished up to the time of its demise.</span><br data-dcnode-id="3572"><br data-dcnode-id="3571"><span data-dcnode-id="3570" instrument_node="">Many earlier British settlers had adapted to local customs and culture, intermarrying and in some cases converting to Islam. In the mid 19th century a wave of Christian evangelism became prevalent, and efforts were made to promote the conversion of native religions. This culminated in a military rebellion when indigenous troops under British command were ordered to trespass religious taboos, such as traveling overseas, mixing castes and breaking dietary restrictions.</span><br data-dcnode-id="3569"><br data-dcnode-id="3568"><span data-dcnode-id="3567" instrument_node="">The religious underpinnings of the rebellion were exacerbated by an untimely British decision to end the Mughal line of succession. The ensuing war was the greatest challenge to colonial power since the American Revolution and resulted in the transfer of East India Company rule to the British crown. After Bahadur Shah II was captured he was tried for aiding the rebellion and exiled to live his remaining years under house arrest in Rangoon, British Burma.</span><br data-dcnode-id="3566"><br data-dcnode-id="3565"><span data-dcnode-id="3564" instrument_node="">This pivotal period of history is delivered in a scholarly but not an overly academic manner. It only covers Delhi, the epicenter of the rebellion. Events in Lucknow and Kanpur must be read about elsewhere. The story is told through eyewitness accounts by British and Indian participants. Many of the sources are new, culled from rediscovered archives written in Farsi and Urdu. The research is greatly complemented by the superb storytelling abilities of the author.</span></span><span data-dcnode-id="3562" instrument_node="">

</span><span class="uitext reviewText" data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">Anyone with a penchant for history and great writing</span></span></div><span data-dcnode-id="3477" instrument_node="">

</span><span data-dcnode-id="3450" id="freeTextContainer12656066289629726309"><span data-dcnode-id="3472" instrument_node="">Author: William Dalrymple </span><br data-dcnode-id="3471"><span data-dcnode-id="3470" instrument_node="">Publishers: Penguin Viking </span><br data-dcnode-id="3469"><span data-dcnode-id="3468" instrument_node="">Published In: 2006 </span><br data-dcnode-id="3467"><span data-dcnode-id="3466" instrument_node="">Price: Rs 695 </span><br data-dcnode-id="3465"><span data-dcnode-id="3464" instrument_node="">Pages: 586 </span><br data-dcnode-id="3463"><span data-dcnode-id="3462" instrument_node="">Genre: Historical </span><br data-dcnode-id="3461"><span data-dcnode-id="3460" instrument_node="">BY Sandhya Iyer </span><br data-dcnode-id="3459"><br data-dcnode-id="3458"><span data-dcnode-id="3457" instrument_node="">Last glow of light </span><br data-dcnode-id="3456"><br data-dcnode-id="3455"><span data-dcnode-id="3454" instrument_node="">Being fairly intrigued by Mughal history, Dalrymple has always been one author whose books I’ve wanted to read. I missed out on his White Mughals but got an opportunity to read The Last Mughal and must say, it turned out to be every bit the rich, luxuriant and fascinating experience I imagined it to be. </span><br data-dcnode-id="3453"><br data-dcnode-id="3452"><span data-dcnode-id="3451" instrument_node="">I must confess here that I have no problems w</span></span><span data-dcnode-id="3449" instrument_node="">
</span><span data-dcnode-id="3384" id="freeText12656066289629726309" style="display:none"><span data-dcnode-id="3448" instrument_node="">Author: William Dalrymple </span><br data-dcnode-id="3447"><span data-dcnode-id="3446" instrument_node="">Publishers: Penguin Viking </span><br data-dcnode-id="3445"><span data-dcnode-id="3444" instrument_node="">Published In: 2006 </span><br data-dcnode-id="3443"><span data-dcnode-id="3442" instrument_node="">Price: Rs 695 </span><br data-dcnode-id="3441"><span data-dcnode-id="3440" instrument_node="">Pages: 586 </span><br data-dcnode-id="3439"><span data-dcnode-id="3438" instrument_node="">Genre: Historical </span><br data-dcnode-id="3437"><span data-dcnode-id="3436" instrument_node="">BY Sandhya Iyer </span><br data-dcnode-id="3435"><br data-dcnode-id="3434"><span data-dcnode-id="3433" instrument_node="">Last glow of light </span><br data-dcnode-id="3432"><br data-dcnode-id="3431"><span data-dcnode-id="3430" instrument_node="">Being fairly intrigued by Mughal history, Dalrymple has always been one author whose books I’ve wanted to read. I missed out on his White Mughals but got an opportunity to read The Last Mughal and must say, it turned out to be every bit the rich, luxuriant and fascinating experience I imagined it to be. </span><br data-dcnode-id="3429"><br data-dcnode-id="3428"><span data-dcnode-id="3427" instrument_node="">I must confess here that I have no problems with a Westerner writing about Indian history --- I say it because this seems to be everyone's pet peeve against Dalrymple-Now, as long as the author approaches his subject with honesty and doesn't adopt a patronizing tone, as the likes of V. S Naipaul, E M Forster so often do, it's really fine by me. And as I see it, this author is not really guilty of any of the above charges. </span><br data-dcnode-id="3426"><span data-dcnode-id="3425" instrument_node=""> </span><br data-dcnode-id="3424"><span data-dcnode-id="3423" instrument_node="">Having read the book, I will say that this is undoubtedly one of the most interesting, informative and entertaining works on Mughal history. No other book probably has approached the 1857 revolt and the disastrous impact it had on a culturally thriving Delhi, the way Dalrymple has in The Last Mughal. </span><br data-dcnode-id="3422"><br data-dcnode-id="3421"><span data-dcnode-id="3420" instrument_node="">Besides the fact that it extensively covers and nostalgically looks back on the wonderful city that Delhi was in the 1850s and 60s under the rule of its benign, tolerant and pluralistic Emperor, Bahadur Shah Zafar, it gives in-depth sketches of the prevailing British officers of the time. Importantly, it directs our attention to several of our presend-day issues and attitudes, a direct result of our legacy. </span><br data-dcnode-id="3419"><br data-dcnode-id="3418"><span data-dcnode-id="3417" instrument_node="">That there's a wealth of historical information to be derived out of this book is a given, but truly astonishing is also Dalrymple's ability to weave in so many cobwebs of events and characters with such clarity. </span><br data-dcnode-id="3416"><span data-dcnode-id="3415" instrument_node="">Not to add, his meticulous, hypnotic attention to detail, with some of the passages sparkling like pure gems -----much like the Mughal arts he describes in his book. </span><br data-dcnode-id="3414"><br data-dcnode-id="3413"><span data-dcnode-id="3412" instrument_node="">The story begins in the early 1850s, a time when Delhi's political fortunes had started to plummet. The Britishers were fast spreading their tentacles and tightening their hold over the Mughals. The bonhomie that existed between the Bitishers and Muslims in the city was starting to wane and Victoria's men were under no obligation to please the Emperor any more. In fact, the king, Zafar Bahadur was rendered powerless now. </span><br data-dcnode-id="3411"><span data-dcnode-id="3410" instrument_node="">Yet, for all its political decline, "the city's reputation as a centre of learning, culture and spirituality had rarely been higher". </span><br data-dcnode-id="3409"><br data-dcnode-id="3408"><span data-dcnode-id="3407" instrument_node="">The peace gets disrupted when rebel sepoys from Meerut (mainly) and some other regiments request Zafar to support them in their fight against the Britishers. As history tells us and the recent Bollywood film, Mangal Pandey showed, there was discontent brewing among sepoys of North-west provinces. Dalrymple records this in detail and abundantly agrees that Victorian Evangelicals had indeed been speeding up their plans to convert Hindus and Muslims. </span><br data-dcnode-id="3406"><br data-dcnode-id="3405"><span data-dcnode-id="3404" instrument_node="">While the sepoys were disgruntled about their low salaries among many other things, it was the issue of religion that really sparked off the revolt. </span><br data-dcnode-id="3403"><span data-dcnode-id="3402" instrument_node="">Now, coming to a point I've always reiterated ---- Mangal Pandey was no icon of the 1857 revolt and the book not only succinctly states that, it adequately proves it. </span><br data-dcnode-id="3401"><br data-dcnode-id="3400"><span data-dcnode-id="3399" instrument_node="">Zafar, already in his 80s, clearly had no real say in whether to support the sepoys against the Britishers or not. But in the end, he lend his tacit support to the rebels and what followed was one of the bloodiest massacres witnessed in Delhi, with Englishmen being pulled out of their homes and killed mercilessly by the sepoys and jehadis. </span><br data-dcnode-id="3398"><br data-dcnode-id="3397"><span data-dcnode-id="3396" instrument_node="">Retribution follows and the Britishers swear to take revenge and destroy everything the city stands for. </span><br data-dcnode-id="3395"><br data-dcnode-id="3394"><br data-dcnode-id="3393"><br data-dcnode-id="3392"><span data-dcnode-id="3391" instrument_node="">Can't put the whole review here for lack of space but if you're still keen, you could read my long ass review on sandyi.blogspot.com</span><br data-dcnode-id="3390"><br data-dcnode-id="3389"><br data-dcnode-id="3388"><br data-dcnode-id="3387"><br data-dcnode-id="3386"><br data-dcnode-id="3385"></span><span data-dcnode-id="3383" instrument_node="">

</span><span data-dcnode-id="3082" id="freeTextContainer9249160943588171356"><span data-dcnode-id="3086" instrument_node="">Wow! A great book! The sort of book that makes you want to read another three or four other books on the same topic, except you know that there are probably not another three or four books that are equal in both scholarship and entertainment value.</span><br data-dcnode-id="3085"><br data-dcnode-id="3084"><span data-dcnode-id="3083" instrument_node="">As the author himself says, it is astonishing that there was an avalanche of fascinating primary source materials (petitions, letters of complaint, official reports, etc.) about the 1857 uprising of the people of India against their colonial masters, a</span></span><span data-dcnode-id="3081" instrument_node="">
</span><span data-dcnode-id="3052" id="freeText9249160943588171356" style="display:none"><span data-dcnode-id="3080" instrument_node="">Wow! A great book! The sort of book that makes you want to read another three or four other books on the same topic, except you know that there are probably not another three or four books that are equal in both scholarship and entertainment value.</span><br data-dcnode-id="3079"><br data-dcnode-id="3078"><span data-dcnode-id="3077" instrument_node="">As the author himself says, it is astonishing that there was an avalanche of fascinating primary source materials (petitions, letters of complaint, official reports, etc.) about the 1857 uprising of the people of India against their colonial masters, all sitting unexamined in official Indian archives until the author came upon them in the early 2000s. Apparently a lot of it was on little slips of paper in difficult-to-decipher handwritten Urdu and Hindi, which proved sufficiently off-putting to the weak of heart and eyesight, especially when you could just as easily attain publication and/or maintain tenure by foregoing original research and simply peppering your work with words like “deconstructing”, “othering”, “gendering”, and similar gerunds.</span><br data-dcnode-id="3076"><br data-dcnode-id="3075"><span data-dcnode-id="3074" instrument_node="">In any case, the author mined these and other documents for thousands of fascinating details. Animated with these glimpses of real life, the narrative gallops along nicely throughout. Those of tender sensibility may be put off by the seemingly endless episodes of slaughter, first by the enraged colonized and by the vengeful colonizers. But…. that </span><i data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">is</span></i><span data-dcnode-id="3071" instrument_node=""> what happened.</span><br data-dcnode-id="3070"><br data-dcnode-id="3069"><span data-dcnode-id="3068" instrument_node="">I scored an old-school hardcover version of this book from my library. I strongly recommend consuming </span><i data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">The Last Mughal</span></i><span data-dcnode-id="3065" instrument_node=""> in hardcover form if you can possibly help it. It’s one of those books you flip back and forth through, with frequent visits to the glossary and endnotes, but also sometimes taking a break from the main narrative to look at the fascinating photos and reproductions of paintings, and did I mention the maps?</span><br data-dcnode-id="3064"><br data-dcnode-id="3063"><span data-dcnode-id="3062" instrument_node="">Sometimes trips to the glossary are less than 100% rewarding. For example, you may run across a sentence like “He stabbed him with his [unknown Anglo-Indian word]”. Reach for your bookmark. Mark your place. Flip to the glossary. Find word. Definition: “A kind of Indian ceremonial knife.” Since you can guess from context that he did not stab his opponent with, say, a piece of statuary, you may end up asking yourself “Was this trip necessary?”</span><br data-dcnode-id="3061"><br data-dcnode-id="3060"><span data-dcnode-id="3059" instrument_node="">In our current environment, this book is also interesting because it shows what happens when a society moves from more tolerant to less tolerant. Apparently, the previous generation of British colonials (so the author maintains) were comparatively enthusiastic about learning and even adopting local habits and customs, sometimes to the point of inter-marriage. The generation that ended up being slaughtered and subsequently slaughtering in this book possessed a sense of cultural superiority and drive to religious conversion that led them both to astonishing examples of cultural insensitivity and to an inability to read the warning signs of trouble when they saw it. </span><br data-dcnode-id="3058"><br data-dcnode-id="3057"><span data-dcnode-id="3056" instrument_node="">From the last paragraph of this book: “... nothing threatens the liberal and moderate aspects of Islam so much as aggressive Western intrusion and interference in the East, just as nothing so dramatically radicalises the ordinary Muslim and feeds the power of extremists….”</span><br data-dcnode-id="3055"><br data-dcnode-id="3054"><span data-dcnode-id="3053" instrument_node="">This is a book which is at the same time a fat dense read but also a fast and entertaining one, so it gets very highly recommended especially for those of us who never really got the chance to study this fascinating historical episode during our inadequate schooling. </span></span><span data-dcnode-id="3051" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2974" title="it was amazing"><span class="staticStar p10" data-dcnode-id="2979" size="15x15"><span data-dcnode-id="2980" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="2978" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2977" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2976" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2975" size="15x15"></span></span><span data-dcnode-id="2973" instrument_node="">

</span><span data-dcnode-id="2959" id="freeTextContainer3748127874521765107"><span data-dcnode-id="2968" instrument_node="">The further backward you look....the further forward you can see." This is what Sir Winston Churchill said when talking about the relevance of history to one's current circumstance.</span><br data-dcnode-id="2967"><br data-dcnode-id="2966"><span data-dcnode-id="2965" instrument_node="">I cannot help but recall these words, after reading William Dalrymple's brilliant</span><br data-dcnode-id="2964"><span data-dcnode-id="2963" instrument_node="">"The Last Mughal".</span><br data-dcnode-id="2962"><br data-dcnode-id="2961"><span data-dcnode-id="2960" instrument_node="">William Dalrymple's latest book uses Bahadur Shah Zafar, the last emperor of the Mughal dynasty, to recreate the vibrant city of Delhi, in the 1850's. A culturally diverse, almost cosmopolitan city, of which Bahadur Shah</span></span><span data-dcnode-id="2958" instrument_node="">
</span><span data-dcnode-id="2923" id="freeText3748127874521765107" style="display:none"><span data-dcnode-id="2957" instrument_node="">The further backward you look....the further forward you can see." This is what Sir Winston Churchill said when talking about the relevance of history to one's current circumstance.</span><br data-dcnode-id="2956"><br data-dcnode-id="2955"><span data-dcnode-id="2954" instrument_node="">I cannot help but recall these words, after reading William Dalrymple's brilliant</span><br data-dcnode-id="2953"><span data-dcnode-id="2952" instrument_node="">"The Last Mughal".</span><br data-dcnode-id="2951"><br data-dcnode-id="2950"><span data-dcnode-id="2949" instrument_node="">William Dalrymple's latest book uses Bahadur Shah Zafar, the last emperor of the Mughal dynasty, to recreate the vibrant city of Delhi, in the 1850's. A culturally diverse, almost cosmopolitan city, of which Bahadur Shah Zafar, was the mere figurehead. A city which epitomized,the India of the Mughals, where the Hindus and Muslims co-existed peacefully. In fact a rich culture and social fabric existed due to this pluralistic co-existence.</span><br data-dcnode-id="2948"><br data-dcnode-id="2947"><span data-dcnode-id="2946" instrument_node="">The mutiny of 1857 proved to be the fall of the Mughal Dynasty, and the end of this vibrant way of life.</span><br data-dcnode-id="2945"><br data-dcnode-id="2944"><span data-dcnode-id="2943" instrument_node="">Dalrymple, researched this book for over 4 years and accessed sources, which were until now, never used to narrate the history of those seminal times. "The Mutiny Papers", which were found on the shelves of National Archives of India, detailed through "great unwieldy mountains of chits, pleas, orders, petitions, complaints, receipts, rolls of attendance and lists of casualties...notes from spies of dubious reliability and letters from eloping lovers...", a very uniquely Indian point of view and perspective. An important voice, which until now has been missing in the retelling of the "Sepoys Mutiny".</span><br data-dcnode-id="2942"><br data-dcnode-id="2941"><span data-dcnode-id="2940" instrument_node="">For me as an Indian, it is very important to understand this point of view. To know about my true cultural heritage, about strands of my identity which were sundered by the British, along their (in)famous "Divide and Rule" policy.</span><br data-dcnode-id="2939"><span data-dcnode-id="2938" instrument_node="">Consider this, most of the history books, have been written by the British in some form...so the opinions I have formed, and the perspectives I have, have been developed by the "British" outlook and essentially the Victorian take on history.</span><br data-dcnode-id="2937"><span data-dcnode-id="2936" instrument_node="">I think, India as a society is richer due to the Mughals and despite the popular opinion and recorded history (who wrote it, you guessed it right...the British !!), they went out of their way to ensure a secular society and a safe environment, for Hindu religion, culture and arts to flourish. In fact as mentioned in the book, the only thing Zafar was decisive about in those trying times was his "refusal to alienate his Hindu subjects by subscribing to the demands of the jihadis."</span><br data-dcnode-id="2935"><br data-dcnode-id="2934"><span data-dcnode-id="2933" instrument_node="">Did you know for instance that most of the Indian intellectuals of the late 19th century and the early 20th century, were schooled in madrassas, including people like Raja Rammohan Roy...The madrassas, were considered to provide well rounded education, not just math and science, but also the humanities, eastern philosophy and the arts...it was only due to the rising influence of Christianity in India, in the late 19th century and the drive for conversions, which lead the madrassas to reinforce the study of Islam in their curriculum, and for them to increasingly move along the path of fundamentalism.</span><br data-dcnode-id="2932"><br data-dcnode-id="2931"><span data-dcnode-id="2930" instrument_node="">It is due to all this and also because of an extremely evocative account of 1857 skirmishes, that this book is a must read.</span><br data-dcnode-id="2929"><br data-dcnode-id="2928"><span data-dcnode-id="2927" instrument_node="">You owe it yourself, as a citizen of the world, living in a these troubled times terrorized by religious fundamentalism.</span><br data-dcnode-id="2926"><br data-dcnode-id="2925"><span data-dcnode-id="2924" instrument_node="">As Sir Churchill, prophesied, it will only help us look "further forward." </span></span><span data-dcnode-id="2922" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2763" title="did not like it"><span class="staticStar p10" data-dcnode-id="2768" size="15x15"><span data-dcnode-id="2769" instrument_node="">did not like it</span></span><span class="staticStar p0" data-dcnode-id="2767" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2766" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2765" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2764" size="15x15"></span></span><span data-dcnode-id="2762" instrument_node="">

</span><span data-dcnode-id="2753" id="freeTextContainer195850400722530861"><span data-dcnode-id="2757" instrument_node="">I just couldn't like this book. A book that promised to be about the last Mughal Bahadur Shah Zafar and the end of the monarchy became a chronological description of the failed 1857 mutiny that saw the end of the East India Company's (mis)adventures in Indian subcontinent and the beginning of the official British monarchy. </span><br data-dcnode-id="2756"><br data-dcnode-id="2755"><span data-dcnode-id="2754" instrument_node="">It is abundantly detailed in its investigation of the events of those few months in Delhi and adequately meandering for the same reason. History needs to be studied through a </span></span><span data-dcnode-id="2752" instrument_node="">
</span><span data-dcnode-id="2734" id="freeText195850400722530861" style="display:none"><span data-dcnode-id="2751" instrument_node="">I just couldn't like this book. A book that promised to be about the last Mughal Bahadur Shah Zafar and the end of the monarchy became a chronological description of the failed 1857 mutiny that saw the end of the East India Company's (mis)adventures in Indian subcontinent and the beginning of the official British monarchy. </span><br data-dcnode-id="2750"><br data-dcnode-id="2749"><span data-dcnode-id="2748" instrument_node="">It is abundantly detailed in its investigation of the events of those few months in Delhi and adequately meandering for the same reason. History needs to be studied through a prism that demonstrates the captive power of the oppressed or the defeated that traditional history will have you neglect. That is history 101.</span><br data-dcnode-id="2747"><br data-dcnode-id="2746"><span data-dcnode-id="2745" instrument_node="">This book does nothing for me. It spends an exorbitant amount of pages on the familial situations of East India Company officers, perhaps in the hope of giving the reader a feeling for the humans that would eventually be responsible for plenty of inhuman acts. I don't want to know any of that. What I know of Bahadur Shah Zafar by page10 remains unchanged by page 560. It has little to offer in terms of insight into palace politics, The Mughal dynasty or, and perhaps the most intriguing aspect of this mutiny, the terrible way Indians were used to fight and kill Indians by the Company. </span><br data-dcnode-id="2744"><br data-dcnode-id="2743"><span data-dcnode-id="2742" instrument_node="">I have to say since Zia Haider Rahman's award winning In the light of what we know I have not felt my time more wasted than now. I finish with Howard Zinn because I kept remembering him while I read this </span><br data-dcnode-id="2741"><span data-dcnode-id="2740" instrument_node="">"</span><br data-dcnode-id="2739"><span data-dcnode-id="2738" instrument_node="">I don’t want to invent victories for people’s movements. But to think that history-writing must aim simply to recapitulate the failures that dominate the past is to make historians collaborators in an endless cycle of defeat. If history is to be creative, to anticipate a possible future without denying the past, it should, I believe, emphasize new possibilities by disclosing those hidden episodes of the past when, even if in brief flashes, people showed their ability to resist, to join together, occasionally to win. I am supposing, or perhaps only hoping, that our future may be found in the past’s fugitive moments of compassion"</span><br data-dcnode-id="2737"><br data-dcnode-id="2736"><span data-dcnode-id="2735" instrument_node="">And finally if noone else says it, I will. I am quite frankly outraged, offended, annoyed by the author's use of the terminology -White Mughal. There is no such thing. Ugh.</span></span><span data-dcnode-id="2733" instrument_node="">

</span><span data-dcnode-id="2643" id="freeTextContainer4882417746852533158"><span data-dcnode-id="2650" instrument_node="">Simply put: This is how history should be written. </span><br data-dcnode-id="2649"><br data-dcnode-id="2648"><span data-dcnode-id="2647" instrument_node="">William Dalrymple, in my opinion, took on a lot when he chose to write a book about the Revolution of 1857. It's a subject visited in Indian history books many, many times, and most people (myself included) think they already know everything there is to be said about that event.</span><br data-dcnode-id="2646"><br data-dcnode-id="2645"><span data-dcnode-id="2644" instrument_node="">The beautiful thing, though, is that he proved me completely wrong, by retelling the tale in a whole new way. Fundamentally, he did two things. First, he used multiple so</span></span><span data-dcnode-id="2642" instrument_node="">
</span><span data-dcnode-id="2627" id="freeText4882417746852533158" style="display:none"><span data-dcnode-id="2641" instrument_node="">Simply put: This is how history should be written. </span><br data-dcnode-id="2640"><br data-dcnode-id="2639"><span data-dcnode-id="2638" instrument_node="">William Dalrymple, in my opinion, took on a lot when he chose to write a book about the Revolution of 1857. It's a subject visited in Indian history books many, many times, and most people (myself included) think they already know everything there is to be said about that event.</span><br data-dcnode-id="2637"><br data-dcnode-id="2636"><span data-dcnode-id="2635" instrument_node="">The beautiful thing, though, is that he proved me completely wrong, by retelling the tale in a whole new way. Fundamentally, he did two things. First, he used multiple sources (many of which were previously unexplored) that allowed his story to be wonderfully unbiased in either direction. The material and facts appeared honest, balanced and most importantly, without any underlying "agenda" to drive. Secondly, he used his flair for writing (something that few authors in fiction or nonfiction possess, but that he clearly possesses in sackfuls) to make every page interesting, every story relevant, every character personal. And in this way, he drew me, as a reader, into his story, and I couldn't put the book down.</span><br data-dcnode-id="2634"><br data-dcnode-id="2633"><span data-dcnode-id="2632" instrument_node="">This is, at its essence, a wonderful, twisted and tragic story, full of characters who are human, whose motivations, fears and even ineptitude you grow to understand through the chapters. It was a sad but wonderful and enlightening look at 1857 once more, one that I have never glimpsed in all the years I studied Indian history in school and college.</span><br data-dcnode-id="2631"><br data-dcnode-id="2630"><span data-dcnode-id="2629" instrument_node="">Like I started by saying, this is how history should be: Alive, relevant, and fair. If Dalrymple wrote more of our textbooks, I've sure young people would stop seeing history as a staid and boring subject, and be able to relate, engage and learn from it. Bravo, William Dalrymple. Bravo!</span><br data-dcnode-id="2628"></span><span data-dcnode-id="2626" instrument_node="">

</span><span data-dcnode-id="2523" id="freeText18399988461810099165" style="display:none"><span data-dcnode-id="2530" instrument_node="">At times, this seems like a cut and paste from archival materials, where excerpts from letters are offered up as evidence for the commentary that precedes them.</span><br data-dcnode-id="2529"><br data-dcnode-id="2528"><span data-dcnode-id="2527" instrument_node="">The book's fundamental premise, though, is intriguing: that Zafar's court represented the last vestige of a tolerant, Indo-Islamic culture; that British imperialism and religious evangelicals replaced a mixed Anglo-Society that was itself part of this pluralistic culture. And that the seeds of the Partition of India at independence, and even today's antipathy between the West and Islamic fundamentalists can be found in the demise of that culture, following the Uprising of 1857. </span><br data-dcnode-id="2526"><br data-dcnode-id="2525"><span data-dcnode-id="2524" instrument_node="">The books comes to that poweful conclusion. But for me, it wasn't the rich and readable prose of other histories I've read.</span></span><span data-dcnode-id="2522" instrument_node="">

</span><span data-dcnode-id="2195" id="freeTextContainer3615406160554613384"><span data-dcnode-id="2196" instrument_node="">Once, during a trip to Delhi, seeing the way history seemed to come 'alive' in the old city at various corners, I asked my friend whether anyone had tracked what had happened to the descendants of the Mughals, and how they saw their legacy . In this book, William Dalrymple does shed some light on it, though a sad one. More than the last Mughal emperor, the book belongs to the First War of Indian Independence to which he was unwittingly bound. Bahadur Shah 2 or Bahadur Shah Zafar as we were taugh</span></span><span data-dcnode-id="2194" instrument_node="">
</span><span data-dcnode-id="2184" id="freeText3615406160554613384" style="display:none"><span data-dcnode-id="2193" instrument_node="">Once, during a trip to Delhi, seeing the way history seemed to come 'alive' in the old city at various corners, I asked my friend whether anyone had tracked what had happened to the descendants of the Mughals, and how they saw their legacy . In this book, William Dalrymple does shed some light on it, though a sad one. More than the last Mughal emperor, the book belongs to the First War of Indian Independence to which he was unwittingly bound. Bahadur Shah 2 or Bahadur Shah Zafar as we were taught in history classes, born in 1775, whose pen name meant 'Victory', and was depicted as the face of the revolution that almost threw out the British. A hapless man who was pulled by a desire to ensure that he did justice to his legacy, when all he wanted to do was write his poetry and live in the company of like-minded souls. A spiritual man who was even considered a sufi saint, and still is, at his grave in Rangoon. </span><br data-dcnode-id="2192"><span data-dcnode-id="2191" instrument_node="">It is now history, but at some point it was the life lived by people like us. 1857 seems like tangible history, an era that can still be felt by its influence, even if minimal. Using records from all kinds of people - common men and chroniclers across Indian and British nationalities, the author creates a vivid portrait of Delhi, before, during, and after the uprising. Characters such as Ghalib sometimes add philosophical layers to this narration, and help us understand the cultural high point that was regained in Zafar's court. It also shows Zafar as a normal human being of his era - with his own superstitions and insecurities, a subject of court intrigue courtesy his wife Zinat Mahal, his son Mirza Mughaal, Hakim Ahsanullah Khan, General Bakht Khan and others, despite being hailed as Padshah, the Lord of the World. </span><br data-dcnode-id="2190"><span data-dcnode-id="2189" instrument_node="">The book also makes a point to showcase the relationship between religious communities before the event, and as the author reinforces many a time, Zafar deserves quite some credit in understanding the fabric that held his city together and maintaining the harmony there. He also points out that the real reason for the uprising was not political, but religious. What started as a fight between Hindu sepoys and the British ended as a fight between a rebel force that was made mostly of Muslim jehadis and British mercenaries made of Sikh, Muslim Punjabi, and Pathans. And it was a war that could have gone wither way. </span><br data-dcnode-id="2188"><span data-dcnode-id="2187" instrument_node="">Late in the book, there is also a mention of a royal survivor - Zafar Sultan, Zafar's brother's son, who refused government pension, and made his living with a brick cart. Once, many years later, in his old age, he was abused and beaten up by a businessman. After quietly taking the first few blows, he hit the businessman hard enough to break his nose. He told the court that sixty years earlier, the man's forefathers would have been his slaves and that he had not forgotten his lineage. Dressed in dirty suits, made to get up and salaam the British (when he used to consider it an insult for anyone to sit in his presence), and verbally abused regularly, Zafar himself was the recipient of several injustices at the hands of the British, who did not even give any consideration for his old age after they 'captured' him.</span><br data-dcnode-id="2186"><span data-dcnode-id="2185" instrument_node="">What remains with me, and this is something I went back to, almost every time I picked up the book to continue, is the photo of Zafar, lying with his face to the camera - the face of a broken old man who through his life saw the dominion of his ancestors taken away from him until all he had was his city and an empty title, who had just been made to undergo a trial and many humiliations before it, eyes expressing melancholy, and resigned to his destiny.</span></span><span data-dcnode-id="2183" instrument_node="">

</span><span data-dcnode-id="2099" id="freeTextContainer9884519286941831995"><span data-dcnode-id="2100" instrument_node="">This book is a timely one on this 150th anniversary of the Great Indian mutiny of 1857. This is also the first ever book that looks at the mutiny from the Indian point of view, though it is written by an Englishman. William Dalrymple has spent much of the past twenty years in India and so is eminently qualified to write this book. Using the extensive and valuable material in the National Archives in Delhi, he pieces together the kind of life that ordinary people lived in Delhi in 1857 and how th</span></span><span data-dcnode-id="2098" instrument_node="">
</span><span data-dcnode-id="2082" id="freeText9884519286941831995" style="display:none"><span data-dcnode-id="2097" instrument_node="">This book is a timely one on this 150th anniversary of the Great Indian mutiny of 1857. This is also the first ever book that looks at the mutiny from the Indian point of view, though it is written by an Englishman. William Dalrymple has spent much of the past twenty years in India and so is eminently qualified to write this book. Using the extensive and valuable material in the National Archives in Delhi, he pieces together the kind of life that ordinary people lived in Delhi in 1857 and how they viewed the uprising of 1857. The picture that emerges is quite different to what one has read in the high school curriculums in India or in the 'accounts' of many Britishers or even that written by Karl Marx right then in 1857, calling it the first Indian war of independence. </span><br data-dcnode-id="2096"><span data-dcnode-id="2095" instrument_node="">Some of the salient points from the research are:</span><br data-dcnode-id="2094"><span data-dcnode-id="2093" instrument_node="">The uprising was triggered off by the insensitivity of the British rulers towards the religious sentiments of both Hindus and Muslims. Initially, it was a composite assault by both Hindus and muslims on the British rule but gradually, the jihadi elements among the muslims took control and when they entered Delhi, they totally massacred the Christians(read British) there brutally, regardless of women and children. When the British eventually gained ascendency, they retaliated with equal and even more brutality with no regard to any of the human rights they professed. They developed most distrust and hatred for the Indian muslim and slaughtered them with no mercy and sowed the seeds of the eventual 'divide and rule' policy in India. The Sikhs and Gurkhas and later the Marwaris aided the British in defeating the mutiny. This is something not highlighted in our history books for obvious reasons.</span><br data-dcnode-id="2092"><span data-dcnode-id="2091" instrument_node="">Emperor Bahadur Shah Zafar was 82 years old when the mutiny started. He was a product of the composite syncretic culture of India and believed strongly in protecting the Hindus against extremist elements among the jihadis. He did not want the mutiny but was too weak and 'poor' to resist it. He was caught in the storm in his final years and sadly he had to preside over the demise of the great Mughal dynasty. </span><br data-dcnode-id="2090"><span data-dcnode-id="2089" instrument_node="">His treason trial by the British was totally illegal because the East India company was at the the emperor's behest and not the other way around. There are so many parallels to what is happening today in Iraq and Guantanamo Bay. </span><br data-dcnode-id="2088"><span data-dcnode-id="2087" instrument_node="">The story Bahadur Shah Zafar is so sad to red. It is also sad that in Indian history books today, the composite heritage of the Indo-islamic culture is not emphasised. Instead, we repeat the oft-repeated British negative view of the Indian muslim.</span><br data-dcnode-id="2086"><span data-dcnode-id="2085" instrument_node="">The book is brilliant and scholarly. All Indians are indebted to Dalrymple for his seminal work.</span><br data-dcnode-id="2084"><span data-dcnode-id="2083" instrument_node="">A must read for all Indians.</span></span><span data-dcnode-id="2081" instrument_node="">

</span><span data-dcnode-id="1982" id="freeText11161672006293732642" style="display:none"><span data-dcnode-id="1986" instrument_node="">The raw material here is grand: the epically momentous dissolution of a glorious dynasty under massive and sometimes odious forces. It is a classic story, tailor-made for the popular historian. The problem is, Dalrymple is not the right sort of historian; he is too calculated, too bloodless, too starchy to imbue his narrative with the life it deserves. He leans heavily on contemporary accounts, which is both an advantage and a disadvantage: it saves us from completely losing the story to his coldly utilitarian style, but it also gives the book an unfocused and disjointed style that often obscures the flow of events.</span><br data-dcnode-id="1985"><br data-dcnode-id="1984"><span data-dcnode-id="1983" instrument_node="">Still, in the end, "The Last Mughal" contains one of the clearest critiques of British imperialism that I've ever read. Dalrymple's sympathies lean distinctly (and rightly, I think) Indian-ward. He provides a corrective to the usual 'glorious empire' myth, giving voice to the indigenous population as real people who suffered greatly under an empire that too often is painted benignly. It's an effective touch, even though it follows a more neutral narrative, making this a worthwhile, if sedate, read. </span></span><span data-dcnode-id="1981" instrument_node="">

</span><span data-dcnode-id="1888" id="freeText307150714622199218" style="display:none"><span data-dcnode-id="1892" instrument_node="">I'm giving this book four stars because although it's very interesting material, I didn't get "hooked" very easily and it took me longer to read than a book this size usually takes me. </span><br data-dcnode-id="1891"><br data-dcnode-id="1890"><span data-dcnode-id="1889" instrument_node="">The book is about Delhi during the Indian Mutiny of 1857, and about the fall of the Mughals. I came out of reading this book disgusted and angry with both sides, and very sad for all the horrible things that happened in Delhi at that time. To think that Chandni Chowk, my favorite spot in Delhi, was the place of such terrible events...it's very sad. But I'm also very glad to have read the book and expanded my knowledge of my husband's home city/country even more. I've always been a history buff, especially British history, and this is one chapter in history that I had no clue about before. I'll definitely read more by this author. </span></span><span data-dcnode-id="1887" instrument_node="">

</span><span data-dcnode-id="1556" id="freeTextContainer2803886897717917878"><span data-dcnode-id="1557" instrument_node="">Fast paced, flashing like an epic movie, round about page 100 I was convinced of Dalrymple's brilliant talent, incorporating Urdu texts and British writings from the era to show how a tolerant creative, if excessive Mughal court was torn asunder by violence and racism; how something so small and inconsiderate as to how bullets were manufactured could erupt into such violence, followed by even greater revenge. I wanted insight into complicated Muslim, Sufi, Hindu, Christian relations and got exac</span></span><span data-dcnode-id="1555" instrument_node="">
</span><span data-dcnode-id="1516" id="freeText2803886897717917878" style="display:none"><span data-dcnode-id="1554" instrument_node="">Fast paced, flashing like an epic movie, round about page 100 I was convinced of Dalrymple's brilliant talent, incorporating Urdu texts and British writings from the era to show how a tolerant creative, if excessive Mughal court was torn asunder by violence and racism; how something so small and inconsiderate as to how bullets were manufactured could erupt into such violence, followed by even greater revenge. I wanted insight into complicated Muslim, Sufi, Hindu, Christian relations and got exactly what I was looking for. </span><br data-dcnode-id="1553"><br data-dcnode-id="1552"><span data-dcnode-id="1551" instrument_node="">--------------------</span><br data-dcnode-id="1550"><br data-dcnode-id="1549"><span data-dcnode-id="1548" instrument_node="">From the Guardian</span><br data-dcnode-id="1547"><br data-dcnode-id="1546"><a data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.guardian.co.uk/commentisfree/2007/dec/30/pakistan.world" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1545" instrument_node="">http://www.guardian.co.uk/commentisfr...</span></a><br data-dcnode-id="1543"><br data-dcnode-id="1542"><span data-dcnode-id="1541" instrument_node=""> One of Benazir Bhutto's more dubious legacies to Pakistan is the Prime Minister's house in the middle of Islamabad. The building is a giddy, pseudo-Mexican ranch house with white walls and a red tile roof. There is nothing remotely Islamic about the building which, as my minder said when I went there to interview the then Prime Minister Bhutto, was 'PM's own design'. Inside, it was the same story. Crystal chandeliers dangled sometimes two or three to a room; oils of sunflowers and tumbling kittens that would have looked at home on the Hyde Park railings hung below garishly gilt cornices.</span><br data-dcnode-id="1540"><br data-dcnode-id="1539"><span data-dcnode-id="1538" instrument_node="">The place felt as though it might be the weekend retreat of a particularly flamboyant Latin-American industrialist, but, in fact, it could have been anywhere. Had you been shown pictures of the place on one of those TV game-shows where you are taken around a house and then have to guess who lives there, you may have awarded this hacienda to virtually anyone except, perhaps, to the Prime Minister of an impoverished Islamic republic situated next door to Iran.</span><br data-dcnode-id="1537"><br data-dcnode-id="1536"><span data-dcnode-id="1535" instrument_node="">Which is, of course, exactly why the West always had a soft spot for Benazir Bhutto. Her neighbouring heads of state may have been figures as unpredictable and potentially alarming as President Ahmadinejad of Iran and a clutch of opium-trading Afghan warlords, but Bhutto has always seemed reassuringly familiar to Western governments - one of us. She spoke English</span><br data-dcnode-id="1534"><span data-dcnode-id="1533" instrument_node="">fluently because it was her first language. She had an English governess, went to a convent run by Irish nuns and rounded off her education with degrees from Harvard and Oxford.</span><br data-dcnode-id="1532"><br data-dcnode-id="1531"><span data-dcnode-id="1530" instrument_node="">'London is like a second home for me,' she once told me. 'I know London well. I know where the theatres are, I know where the shops are, I know where the hairdressers are. I love to browse through Harrods and WH Smith in Sloane Square. I know all my favourite ice cream parlours. I used to particularly love going to the one at Marble Arch: Baskin Robbins.</span><br data-dcnode-id="1529"><span data-dcnode-id="1528" instrument_node="">Sometimes, I used to drive all the way up from Oxford just for an ice cream and then drive back again. That was my idea of sin.'</span><br data-dcnode-id="1527"><br data-dcnode-id="1526"><span data-dcnode-id="1525" instrument_node="">It was difficult to imagine any of her neighbouring heads of state, evenIndia's earnest Sikh economist, Manmohan Singh, talking like this.</span><br data-dcnode-id="1524"><br data-dcnode-id="1523"><span data-dcnode-id="1522" instrument_node="">For the Americans, what Benazir Bhutto wasn't was possibly more attractive even than what she was. She wasn't a religious fundamentalist, she didn'thave a beard, she didn't organise rallies where everyone shouts: 'Death to America' and she didn't issue fatwas against Booker-winning authors, even though Salman Rushdie ridiculed her as the Virgin Ironpants in his novel Shame.</span><br data-dcnode-id="1521"><br data-dcnode-id="1520"><span data-dcnode-id="1519" instrument_node="">However, the very reasons that made the West love Benazir Bhutto are the same that gave many Pakistanis second thoughts. Her English might have been fluent, but you couldn't say the same about her Urdu which she spoke like a well-groomed foreigner: fluently, but ungrammatically. Her Sindhi was even worse; apart from a few imperatives, she was completely at sea.</span><br data-dcnode-id="1518"><br data-dcnode-id="1517"></span><span data-dcnode-id="1515" instrument_node="">

</span><span data-dcnode-id="1324" id="freeTextContainer779375952699631392"><i data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Dilli</span></i><span data-dcnode-id="1342" instrument_node="">.</span><br data-dcnode-id="1341"><span data-dcnode-id="1340" instrument_node="">A city where I would have been residing if not for this pandemic. </span><br data-dcnode-id="1339"><span data-dcnode-id="1338" instrument_node="">Completely ignorant of the importance it held in the past, I would severely curse the city. Everything about the city frustrated me in the short while that I stayed there.</span><br data-dcnode-id="1337"><span data-dcnode-id="1336" instrument_node="">Nonetheless I would always refer to </span><b data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Delhi</span></b><span data-dcnode-id="1333" instrument_node=""> as </span><i data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Ghalib ki Dilli</span></i><span data-dcnode-id="1330" instrument_node="">. Never able to ascertain why. But after reading </span><b data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">The Last Mughal</span></b><span data-dcnode-id="1327" instrument_node=""> I've come to realize that it would be an insult to refer to the city as an individual's property/city. </span><br data-dcnode-id="1326"><span data-dcnode-id="1325" instrument_node="">I would be doing great injust</span></span><span data-dcnode-id="1323" instrument_node="">
</span><span data-dcnode-id="1266" id="freeText779375952699631392" style="display:none"><i data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Dilli</span></i><span data-dcnode-id="1320" instrument_node="">.</span><br data-dcnode-id="1319"><span data-dcnode-id="1318" instrument_node="">A city where I would have been residing if not for this pandemic. </span><br data-dcnode-id="1317"><span data-dcnode-id="1316" instrument_node="">Completely ignorant of the importance it held in the past, I would severely curse the city. Everything about the city frustrated me in the short while that I stayed there.</span><br data-dcnode-id="1315"><span data-dcnode-id="1314" instrument_node="">Nonetheless I would always refer to </span><b data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Delhi</span></b><span data-dcnode-id="1311" instrument_node=""> as </span><i data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Ghalib ki Dilli</span></i><span data-dcnode-id="1308" instrument_node="">. Never able to ascertain why. But after reading </span><b data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">The Last Mughal</span></b><span data-dcnode-id="1305" instrument_node=""> I've come to realize that it would be an insult to refer to the city as an individual's property/city. </span><br data-dcnode-id="1304"><span data-dcnode-id="1303" instrument_node="">I would be doing great injustice to </span><i data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Dilli</span></i><span data-dcnode-id="1300" instrument_node=""> if I ventured out to describe what it stood for. For that simple reason </span><i data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Dilli</span></i><span data-dcnode-id="1297" instrument_node=""> chose Dalrymple as its voice to the outside world. </span><br data-dcnode-id="1296"><span data-dcnode-id="1295" instrument_node="">Oh! And what a voice it has been. </span><br data-dcnode-id="1294"><br data-dcnode-id="1293"><span data-dcnode-id="1292" instrument_node="">It would come as a shock to many that such a magnificent city ever existed in India. A temple of learning and culture razed to the ground by multiple actions of so many savages. </span><br data-dcnode-id="1291"><br data-dcnode-id="1290"><span data-dcnode-id="1289" instrument_node="">I would have preferred the title </span><b data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Anarchy</span></b><span data-dcnode-id="1286" instrument_node=""> for this book. The sheer scale of violence and destruction would make this the most suitable title.</span><br data-dcnode-id="1285"><br data-dcnode-id="1284"><span data-dcnode-id="1283" instrument_node=""> You feel nothing but pity for the king or as he has been referred to </span><i data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">”the last Mughal”</span></i><span data-dcnode-id="1280" instrument_node="">. A frail old </span><i data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">sufi</span></i><span data-dcnode-id="1277" instrument_node=""> living amidst absolute chaos. </span><br data-dcnode-id="1276"><br data-dcnode-id="1275"><i data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Ghalib ki Dilli</span></i><span data-dcnode-id="1272" instrument_node=""> is no longer the norm however, as a credit to the author for introducing this city in a completely new light, </span><i data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Dalrymple ki Dilli</span></i><span data-dcnode-id="1269" instrument_node=""> will only make sense. </span><br data-dcnode-id="1268"><span data-dcnode-id="1267" instrument_node="">Cheers!</span></span><span data-dcnode-id="1265" instrument_node="">

</span><span data-dcnode-id="1178" id="freeTextContainer2824381424598435963"><span data-dcnode-id="1185" instrument_node="">I was putting off reading this book for a long time because I thought it would be very hard and </span><i data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">heavy</span></i><span data-dcnode-id="1182" instrument_node=""> and I am not a big fan of non-fiction as it is, but boy, was I super, super wrong! It was a surprisingly easy, fast-paced read and the writing was flawless, combining letters, newspapers and diary entries to compile a comprehensive (and extremely interesting) account of the famous 1857 sepoy mutiny. As a bonus, it also helped get rid of my fear of non-fiction!</span><br data-dcnode-id="1181"><br data-dcnode-id="1180"><span data-dcnode-id="1179" instrument_node="">It also made me see the monuments li</span></span><span data-dcnode-id="1177" instrument_node="">
</span><span data-dcnode-id="1159" id="freeText2824381424598435963" style="display:none"><span data-dcnode-id="1176" instrument_node="">I was putting off reading this book for a long time because I thought it would be very hard and </span><i data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">heavy</span></i><span data-dcnode-id="1173" instrument_node=""> and I am not a big fan of non-fiction as it is, but boy, was I super, super wrong! It was a surprisingly easy, fast-paced read and the writing was flawless, combining letters, newspapers and diary entries to compile a comprehensive (and extremely interesting) account of the famous 1857 sepoy mutiny. As a bonus, it also helped get rid of my fear of non-fiction!</span><br data-dcnode-id="1172"><br data-dcnode-id="1171"><span data-dcnode-id="1170" instrument_node="">It also made me see the monuments like Red Fort and Jama Masjid in a whole new light, after learning that the British were almost about to demolish these architectural wonders and level Delhi completely, if not for the interference of another British officer, John Lawrence, who had fallen in love with Delhi’s rich architecture and culture.</span><br data-dcnode-id="1169"><br data-dcnode-id="1168"><span data-dcnode-id="1167" instrument_node="">Red Fort: the home of the Mughal Emperors-</span><br data-dcnode-id="1166"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="1165" height="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1545888744i/26815060._SX540_.jpg&amp;raw" width="350"><br data-dcnode-id="1164"><br data-dcnode-id="1163"><span data-dcnode-id="1162" instrument_node="">Jama Masjid</span><br data-dcnode-id="1161"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="1160" height="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.c </span><span data-dcnode-id="436" id="freeTextContainer11621065659030891024"><span data-dcnode-id="443" instrument_node="">William Dalrymple was born in Scotland and brought up on the shores of the Firth of Forth. He wrote the highly acclaimed bestseller </span><i data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">In Xanadu</span></i><span data-dcnode-id="440" instrument_node=""> when he was twenty-two. The book won the 1990 Yorkshire Post Best First Work Award and a Scottish Arts Council Spring Book Award; it was also shortlisted for the John Llewellyn Rhys Memorial Prize.</span><br data-dcnode-id="439"><br data-dcnode-id="438"><span data-dcnode-id="437" instrument_node="">In 1989 Dalrymple moved to Delhi where he lived for six years</span></span><span data-dcnode-id="435" instrument_node="">
</span><span data-dcnode-id="384" id="freeText11621065659030891024" style="display:none"><span data-dcnode-id="434" instrument_node="">William Dalrymple was born in Scotland and brought up on the shores of the Firth of Forth. He wrote the highly acclaimed bestseller </span><i data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">In Xanadu</span></i><span data-dcnode-id="431" instrument_node=""> when he was twenty-two. The book won the 1990 Yorkshire Post Best First Work Award and a Scottish Arts Council Spring Book Award; it was also shortlisted for the John Llewellyn Rhys Memorial Prize.</span><br data-dcnode-id="430"><br data-dcnode-id="429"><span data-dcnode-id="428" instrument_node="">In 1989 Dalrymple moved to Delhi where he lived for six years researching his second book, </span><i data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">City of Djinns</span></i><span data-dcnode-id="425" instrument_node="">, which won the 1994 Thomas Cook Travel Book Award and the Sunday Times Young British Writer of the Year Award. </span><i data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">From the Holy Mountain</span></i><span data-dcnode-id="422" instrument_node="">, his acclaimed study of the demise of Christianity in its Middle Eastern homeland, was awarded the Scottish Arts Council Autumn Book Award for 1997; it was also shortlisted for the 1998 Thomas Cook Award, the John Llewellyn Rhys Prize and the Duff Cooper Prize. A collection of his writings about India, </span><i data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">The Age of Kali</span></i><span data-dcnode-id="419" instrument_node="">, won the French Prix D’Astrolabe in 2005.</span><br data-dcnode-id="418"><br data-dcnode-id="417"><i data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">White Mughals</span></i><span data-dcnode-id="414" instrument_node=""> was published in 2003, the book won the Wolfson Prize for History 2003, the Scottish Book of the Year Prize, and was shortlisted for the PEN History Award, the Kiryama Prize and the James Tait Black Memorial Prize.</span><br data-dcnode-id="413"><br data-dcnode-id="412"><span data-dcnode-id="411" instrument_node="">William Dalrymple is a Fellow of the Royal Society of Literature and of the Royal Asiatic Society, and is the founder and co-director of the Jaipur Literature Festival.</span><br data-dcnode-id="410"><span data-dcnode-id="409" instrument_node=""> </span><br data-dcnode-id="408"><span data-dcnode-id="407" instrument_node="">In 2002 he was awarded the Mungo Park Medal by the Royal Scottish Geographical Society for his ‘outstanding contribution to travel literature’. He wrote and presented the television series </span><i data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Stones of the Raj</span></i><span data-dcnode-id="404" instrument_node=""> and </span><i data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Indian Journeys</span></i><span data-dcnode-id="401" instrument_node="">, which won the Grierson Award for Best Documentary Series at BAFTA in 2002. His Radio 4 series on the history of British spirituality and mysticism, </span><i data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">The Long Search</span></i><span data-dcnode-id="398" instrument_node="">, won the 2002 Sandford St Martin Prize for Religious Broadcasting and was described by the judges as ‘thrilling in its brilliance... near perfect radio’. In December 2005 his article on the madrasas of Pakistan was awarded the prize for Best Print Article of the Year at the 2005 FPA Media Awards. In June 2006 he was awarded the degree of Doctor of Letters </span><i data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">honoris causa</span></i><span data-dcnode-id="395" instrument_node=""> by the University of St Andrews “for his services to literature and international relations, to broadcasting and understanding”. In 2007, </span><i data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">The Last Moghal</span></i><span data-dcnode-id="392" instrument_node=""> won the prestigous Duff Cooper Prize for History and Biography. In November 2007, William received an Honourary Doctorate of Letters, </span><i data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">honoris causa</span></i><span data-dcnode-id="389" instrument_node="">, from the University of Lucknow University “for his outstanding contribution in literature and history”, and in March 2008 won the James Todd Memorial Prize from the Maharana of Udaipur.</span><br data-dcnode-id="388"><br data-dcnode-id="387"><span data-dcnode-id="386" instrument_node="">William is married to the artist Olivia Fraser, and they have three children. They now live on a farm outside Delhi.</span><br data-dcnode-id="385"></span><span data-dcnode-id="383" instrument_node="">
