</span><span data-dcnode-id="5535" id="freeTextContainer8175472109845565964"><span data-dcnode-id="5539" instrument_node="">On a hazy November afternoon in Rangoon, 1862, a shrouded corpse was escorted by a small group of British soldiers to an anonymous grave in a prison enclosure. As the British Commissioner in charge insisted, “No vestige will remain to distinguish where the last of the Great Moghuls rests.” </span><br data-dcnode-id="5538"><br data-dcnode-id="5537"><span data-dcnode-id="5536" instrument_node="">Bahadur Shah Zafar II, the last Mughal Emperor, was a mystic, an accomplished poet a</span></span><span data-dcnode-id="5534" instrument_node="">
</span><span data-dcnode-id="5520" id="freeText8175472109845565964" style="display:none"><span data-dcnode-id="5533" instrument_node="">On a hazy November afternoon in Rangoon, 1862, a shrouded corpse was escorted by a small group of British soldiers to an anonymous grave in a prison enclosure. As the British Commissioner in charge insisted, “No vestige will remain to distinguish where the last of the Great Moghuls rests.” </span><br data-dcnode-id="5532"><br data-dcnode-id="5531"><span data-dcnode-id="5530" instrument_node="">Bahadur Shah Zafar II, the last Mughal Emperor, was a mystic, an accomplished poet and a skilled calligrapher. But while his Mughal ancestors had controlled most of India, the aged Zafar was king in name only. Deprived of real political power by the East India Company, he nevertheless succeeded in creating a court of great brilliance, and presided over one of the great cultural renaissances of Indian history.</span><br data-dcnode-id="5529"><br data-dcnode-id="5528"><span data-dcnode-id="5527" instrument_node="">Then, in 1857, Zafar gave his blessing to a rebellion among the Company’s own Indian troops, thereby transforming an army mutiny into the largest uprising any empire had to face in the entire course of the nineteenth century. The Siege of Delhi was the Raj’s Stalingrad: one of the&nbsp;most horrific events in the history of Empire, in which thousands on both sides died. And when the British took the city—securing their hold on the subcontinent for the next ninety years—tens of thousands more Indians were executed, including all&nbsp;but two&nbsp;of Zafar’s sixteen sons. By the end of the four-month siege, Delhi was reduced to a battered, empty ruin, and Zafar was sentenced to exile in Burma. There he died, the last Mughal ruler in a line that stretched back to the sixteenth century.</span><br data-dcnode-id="5526"><br data-dcnode-id="5525"><span data-dcnode-id="5524" instrument_node="">Award-winning historian and travel writer William Dalrymple shapes his powerful retelling of this fateful course of events from groundbreaking material: previously unexamined Urdu and Persian manuscripts that include Indian eyewitness accounts and records of the Delhi courts, police and administration during the siege. </span><i data-dcnode-id="5522"><span data-dcnode-id="5523" instrument_node="">The Last Mughal</span></i><span data-dcnode-id="5521" instrument_node=""> is a revelatory work—the first to present the Indian perspective on the fall of Delhi—and has as its heart both the dazzling capital personified by Zafar and the stories of the individuals tragically caught up in one of the bloodiest upheavals in history.</span></span><span data-dcnode-id="5519" instrument_node="">

</span><span data-dcnode-id="4699" id="freeTextContainer6310735702124992083"><span data-dcnode-id="4706" instrument_node="">A too brief summary. The book is an overview of the 1857 Mutiny in Delhi. Striking in the early going is the mutual tolerance Muslims and Hindus had for each other. King Zafar was king to all his heterogeneous peoples, or he sought to be. The two faiths were interlarded. Astonishing.</span><br data-dcnode-id="4705"><br data-dcnode-id="4704"><span data-dcnode-id="4703" instrument_node="">“It is clear that [King] Zafar consciously saw his role as a protector of his Hindu subjects, and a moderator of extreme Muslim demands and the chilling Puritanism of many of the </span><i data-dcnode-id="4701"><span data-dcnode-id="4702" instrument_node="">'ulama</span></i><span data-dcnode-id="4700" instrument_node="">. One of Zafar’s verses says ex</span></span><span data-dcnode-id="4698" instrument_node="">
</span><span data-dcnode-id="4645" id="freeText6310735702124992083" style="display:none"><span data-dcnode-id="4697" instrument_node="">A too brief summary. The book is an overview of the 1857 Mutiny in Delhi. Striking in the early going is the mutual tolerance Muslims and Hindus had for each other. King Zafar was king to all his heterogeneous peoples, or he sought to be. The two faiths were interlarded. Astonishing.</span><br data-dcnode-id="4696"><br data-dcnode-id="4695"><span data-dcnode-id="4694" instrument_node="">“It is clear that [King] Zafar consciously saw his role as a protector of his Hindu subjects, and a moderator of extreme Muslim demands and the chilling Puritanism of many of the </span><i data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">'ulama</span></i><span data-dcnode-id="4691" instrument_node="">. One of Zafar’s verses says explicitly that Hinduism and Islam “share the same essence,” and his court lived out this syncretic philosophy, and both celebrated and embodied this composite Hindu–Muslim Indo-Islamic civilization, at every level. The Hindu elite of Delhi went to the Sufi shrine Nizamuddin, could quote Hafiz and we’re fond of Persian poetry. Their children . . . studied under maulvis and attended the more liberal madrasas, bringing offerings of food for their teachers on Hindu festivals. For their part, Muslims followed the emperor in showing honor to Hindu holy men, while many in the court, including Zafar himself, followed the old Mughal custom, borrowed from upper cast Hindus, of drinking only Ganges water. Zafar’s extensive team of Hindu astrologers rarely left his side.</span><br data-dcnode-id="4690"><br data-dcnode-id="4689"><span data-dcnode-id="4688" instrument_node="">“Given the somewhat dubious and sectarian reputation of madrasas today, it is worth remembering that many of the most brilliant Hindu thinkers, including, for example, the great reformer Ram Mohan Roy (1772-1833), were the products of madrasa educations.” (p. 77)</span><br data-dcnode-id="4687"><br data-dcnode-id="4686"><span data-dcnode-id="4685" instrument_node="">The book is masterful, what we’ve come to expect from Dalrymple. By the time the slaughter of the Mutiny occurs, the reader knows the players and their temperaments on both sides. The fighting is harrowing. British evil received it due—though one wishes the women and children could have been spared. But apparently that’s not how religious terror works. These native soldiers were convinced that they were being defiled by various means—that their religions were being assaulted—so the British could convert them to Christianity. And here in Delhi, too, of all places, where freedom of worship was once so revered under the Mughals. The mutineers were both Hindu and Muslim working if haphazardly toward a common goal: the genocide of all Christians.</span><br data-dcnode-id="4684"><br data-dcnode-id="4683"><span data-dcnode-id="4682" instrument_node="">The mutineers had almost no leadership. One of King Zafar’s sons—Mirza Mughal—finagled a commander in chief position but he was almost entirely ineffective. The mutineers acted on whim and anger and showed no cohesion beyond the regimental level. Their greed overcame them. They looted the city incessantly. They never had the sympathy of the general population for it, too, was looted indiscriminately. There was no command and control which the British, after the initial onslaught, were able to restore.</span><br data-dcnode-id="4681"><br data-dcnode-id="4680"><span data-dcnode-id="4679" instrument_node="">“The Gujar and Mewati tribesmen around the city . . . effectively controlled most of Delhi’s hinterland. Robbing anyone who attempted to move along roads in and out of the capital, they kept the city in a far more effective state of blockade than anything achieved by the British to the north.” (p. 242)</span><br data-dcnode-id="4678"><br data-dcnode-id="4677"><span data-dcnode-id="4676" instrument_node="">One of the reasons the Union won the U.S. Civil War was because it had quartermasters who dealt with procurement. Not that it was the most efficient operation by any means. The Confederacy tended to live off the land, as the mutineers did the city, which was unsustainable. Moreover, we are told, the mutineers felt invulnerable because they believed God was working through the King, “...God‘s shadow on earth.” </span><a data-dcnode-id="4674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/search/search%3Fq%3DV.S.%2520Naipaul" rel="nofollow noopener" title="V.S. Naipaul"><span data-dcnode-id="4675" instrument_node="">V.S. Naipaul</span></a><span data-dcnode-id="4673" instrument_node=""> has written about the gift of religious people being their confidence, which is often enviable. (See </span><a data-dcnode-id="4671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/search/search%3Fq%3DAmong%2520the%2520Believers%3A%2520An%2520Islamic%2520Journey" rel="nofollow noopener" title="Among the Believers: An Islamic Journey"><span data-dcnode-id="4672" instrument_node="">Among the Believers: An Islamic Journey</span></a><span data-dcnode-id="4670" instrument_node="">.) The Hindus, too, who comprised the lion’s share of the mutineers, had their own rebellion boosters. Here we had over-confidence and no strategic plan, much less access to a telegraph. But. . .</span><br data-dcnode-id="4669"><br data-dcnode-id="4668"><span data-dcnode-id="4667" instrument_node="">“In the two weeks after the British returned to the Ridge [an artillery perch northwest of Delhi] the rebel forces received several thousand reinforcements—from Ambala and Jalandhar, in the north, and Haryana and Nasirabad, in the west. Larger than any of these was the enormous rebel army heading slowly toward Delhi from Bareilly, 200 miles to the east. Across Hindustan, of the 139,000 sepoys in the Bengal army, all but 7,796 had now risen against the Company, and over half were now either in Delhi or on their way to it.” (p. 244)</span><br data-dcnode-id="4666"><br data-dcnode-id="4665"><span data-dcnode-id="4664" instrument_node="">One knows how it will turn out, but even so one keeps hoping what cannot happen: that the mutineers will somehow prevail. The book invests us in the underdog for he holds the moral right. The British shouldn’t have been there; that’s irrefutable. No argument about the upside of British Colonialism can ever convince us otherwise. (See Niall Ferguson’s </span><a data-dcnode-id="4662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/search/search%3Fq%3DEmpire%3A%2520How%2520Britain%2520Made%2520the%2520Modern%2520World" rel="nofollow noopener" title="Empire: How Britain Made the Modern World"><span data-dcnode-id="4663" instrument_node="">Empire: How Britain Made the Modern World</span></a><span data-dcnode-id="4661" instrument_node="">.) So when Bakht Khan—“a much-garlanded and battle-hardened veteran of the Afghan wars” (p. 263) and the sepoys’s first true strategic thinker—arrives on the scene one is filled with futile hope. But Khan’s reign is brief; lack of discipline soon undermines him. </span><br data-dcnode-id="4660"><br data-dcnode-id="4659"><span data-dcnode-id="4658" instrument_node="">The story of King Zahar, the last Mughal of the title, is the clever biographical thread stitching together the entire narrative. Poor man. It was the British’s own “blunders and insensitivities that had precipitated the outbreak, and the slow hesitant . . . bungling response that had allowed it to spread with such speed.” (p. 283) The king was caught in the middle between the British, who treated him as a vassal, and the mutineers, who believed he was the source of inexhaustible treasure that could fund their poorly conceived and ineptly led revolution.</span><br data-dcnode-id="4657"><br data-dcnode-id="4656"><span data-dcnode-id="4655" instrument_node="">The mutineers’ slaughter of innocents and the British exponentially larger counter-slaughter makes us shudder with revulsion. This is a story that needed to be told. But with so much vivid new archival material compressed into a single volume the book is at times almost more than one can bear. Page after page of hideous massacres, bloated corpses, men shot down in their prime etc. It’s not for the faint of heart.</span><br data-dcnode-id="4654"><br data-dcnode-id="4653"><span data-dcnode-id="4652" instrument_node="">Let’s close with excepts from William Howard Russell, the </span><i data-dcnode-id="4650"><span data-dcnode-id="4651" instrument_node="">Times</span></i><span data-dcnode-id="4649" instrument_node="">’s correspondent, who wrote after visiting King Zafar before his show trial in 1858.</span><br data-dcnode-id="4648"><br data-dcnode-id="4647"><span data-dcnode-id="4646" instrument_node="">“To my mind, the position of the King was one of the most intolerable misery long ere the revolt broke out. His palace was in reality a house of bondage; he knew that the few wretched prerogatives which were left to him, as if in mockery of the departed power they represented, would be taken away from his successors; that they would be deprived even of the right to live in their own palace, and would be exiled to some place outside the walls. We denied permission for his royal relatives to enter our service; we condemned them to a degrading existence, in poverty and debt, inside the purlieus of the palace, and then we reproached them with their laziness, meanness and sensuality. We shut the gates of military preferment upon them — we took from them every object of honorable ambition — and then our papers and our mess rooms teemed with invective against the lazy, slothful and sensuous princes.” (p. 402)</span></span><span data-dcnode-id="4644" instrument_node="">

</span><span data-dcnode-id="4550" id="freeTextContainer16358614020918724785"><b data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">“[A]t the moment of the most crucial decision [King Bahadur Shah] Zafar would ever take, with most of the Delhi elite already instinctively lined up against the looting, mutinous sepoys, Zafar made an uncharacteristically decisive choice: he gave them his blessing. The reason is not hard to guess. With the armed, threatening and excitable sepoys surrounding him on all sides, he had little choice. Moreover, thanks to Simon Fraser and Lord Canning, he had even less to lose. For all his undoubted f</span></b></span><span data-dcnode-id="4549" instrument_node="">
</span><span data-dcnode-id="4478" id="freeText16358614020918724785" style="display:none"><b data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">“[A]t the moment of the most crucial decision [King Bahadur Shah] Zafar would ever take, with most of the Delhi elite already instinctively lined up against the looting, mutinous sepoys, Zafar made an uncharacteristically decisive choice: he gave them his blessing. The reason is not hard to guess. With the armed, threatening and excitable sepoys surrounding him on all sides, he had little choice. Moreover, thanks to Simon Fraser and Lord Canning, he had even less to lose. For all his undoubted fear, anger and irritation with the sepoys, Zafar made the critical choice that would change both the fate of his dynasty and that of the city of Delhi, linking them both with the Uprising…It was at this crucial moment, when the King had just publicly – if hesitantly and reluctantly – given his blessing to the mutineers, and they were settling down into quarters inside the Palace, that the entire city was shaken by a colossal explosion, a report that could be heard 20 miles away. Buildings shook; in the Palace several plaster ceilings collapsed. Half a mile to the north of the Red Fort…Lieutenant Willoughby, besieged by sepoys, had just blown up the magazine, the largest arsenal of guns and ammunition in northern India; and with it the large mob of jihadis, insurgents and sepoys who were attacking it, as well as almost all of its British defenders…”</span></b><br data-dcnode-id="4546"><span data-dcnode-id="4545" instrument_node="">-	William Dalrymple, </span><i data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">The Last Mughal: The Fall of a Dynasty, Delhi, 1857</span></i><br data-dcnode-id="4542"><br data-dcnode-id="4541"><span data-dcnode-id="4540" instrument_node="">The titular figure at the center of William Dalrymple’s </span><i data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">The Last Mughal</span></i><span data-dcnode-id="4537" instrument_node=""> is King Bahadur Shah Zafar II, the final ruler of the Timurid Dynasty. Zafar’s story is a tragic one, featuring an aged, ill-equipped man being thrust into a situation nearly impossible to handle, even for a young, well-equipped man.</span><br data-dcnode-id="4536"><br data-dcnode-id="4535"><span data-dcnode-id="4534" instrument_node="">By way of backstory, the Mughal Empire had ruled over great swaths of Northern and Central India for two centuries. Indeed, their rule began even before the British East India Company had transformed a handful of trading posts into a toxic – and lethal – form of corporate governance. The Mughals – under Babur – had first descended into India from Central Asia, crossing the Hindu Kush and establishing their dynasty in Delhi, in 1526. Despite being Muslim rulers in a mostly Hindu land, the Timurid Dynasty maintained a rather effective administration, especially under their finest leader, Akbar the Great. </span><br data-dcnode-id="4533"><br data-dcnode-id="4532"><span data-dcnode-id="4531" instrument_node="">By the time </span><i data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">The Last Mughal</span></i><span data-dcnode-id="4528" instrument_node=""> opens, however, the Mughal Empire was waning. The East India Company, despite professing loyalty to their “sovereign,” was the real driving force in India. They had, over time, turned the role of Mughal king into an empty figurehead. Yet, even that symbolic job was shrinking. In particular, following King Zafar’s spat with the East India Company over his ability to choose his own heir – rather than the kingship going automatically to the eldest son – Zafar was informed that come what may, he would be the last man to sit upon the throne. </span><br data-dcnode-id="4527"><br data-dcnode-id="4526"><span data-dcnode-id="4525" instrument_node="">The phasing-out of the Mughal Empire occurred – not coincidentally – at a time of growing tension between Indians and Europeans. This tension eventually exploded into a bloody rebellion that is known in the West as “the Indian Mutiny,” and by many in India as “the First War of Independence.” To Dalrymple, it is simply “the Uprising,” and he tells the story of this tumultuous, complicated clash of arms, cultures, and religions by focusing on the personage of King Zafar. </span><br data-dcnode-id="4524"><br data-dcnode-id="4523"><span data-dcnode-id="4522" instrument_node="">According to Dalrymple, Great Britain’s colonization of India was not one discrete thing, but occurred in distinct phases. An earlier phase – the time of the so-called “White Mughals” – displayed some of the same integrationist tendencies of the Timurid Dynasty. That is, British officials worked within the existing culture, rather than attempting to change it wholesale. They married Indian wives, had children, and created a kind of hybrid society. That changed in the 1850s with the arrival of evangelizers who sought to impose Christianity on countless unwilling Hindus and Muslims. At the same time, British officials planned to dissolve the Mughal Empire upon the death of King Zafar. </span><br data-dcnode-id="4521"><br data-dcnode-id="4520"><span data-dcnode-id="4519" instrument_node="">The resulting Uprising of 1857 had many causes, including the aforementioned unwanted missionary zeal, but the spark that finally lit the gunpowder was the issuance of pre-greased paper cartridges to be used in the Enfield rifles given to Indian troops. (The Indian troops were referred to as </span><i data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">sepoys</span></i><span data-dcnode-id="4516" instrument_node="">, from the Persian word for </span><i data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">soldier</span></i><span data-dcnode-id="4513" instrument_node="">). The grease coating these cartridges – which had to be bitten by the soldier to load the rifle – was thought to be derived from beef tallow and pork lard. In other words, it was greased using byproducts of animals that were, respectively, sacred to Hindus and offensive to Muslims. A mutiny in Meerut over these cartridges (barely mentioned by Dalrymple) spread rapidly, eventually engulfing Delhi, where this tale entirely takes place.</span><br data-dcnode-id="4512"><br data-dcnode-id="4511"><span data-dcnode-id="4510" instrument_node="">In Dalrymple’s telling, the Delhi insurgency – as opposed to the Uprising as a whole – was religiously motivated and propelled by Muslims. The Muslim fighters, joined by the sepoys formerly employed by the East India Company, went to King Zafar to seek his approval for their actions. Caught between the possibility of instant death at the hands of his own people, or the future wrath of Great Britain should the Uprising fail, Zafar chose to back the Uprising. </span><br data-dcnode-id="4509"><br data-dcnode-id="4508"><span data-dcnode-id="4507" instrument_node="">The rest is all rather disheartening. The Uprising in Delhi began with the massacre of British men, women, and children by insurgent forces. It ended with a siege by the British, capped by the massacre of men, women, and children by East India Company forces.</span><br data-dcnode-id="4506"><br data-dcnode-id="4505"><span data-dcnode-id="4504" instrument_node="">Dalrymple, who has lived much of his life in India, has a strong reputation as a historian of this period, and has written a number of well-received books. His style – as he specifically explains – is to avoid jargon-laden interpretative schools, and to attempt to present the perspectives of all the various factions. Unlike earlier books on the Uprising, which used mainly British-generated documents and accounts (of which there are many), Dalrymple makes a concerted effort to utilize non-Western and Indian sources. He quotes extensively from Urdu and Persian manuscripts; follows non-British participants, such as the famed poet Asadullah Khan, known as Ghalib (an excellent observer); and uses the voluminous Delhi court records (containing the requests, grievances, and commentary of ordinary Delhi citizens) to wonderful effect (demonstrating that, as in most wars, the ones who suffered the most were the civilians crushed between warring armies).</span><br data-dcnode-id="4503"><br data-dcnode-id="4502"><span data-dcnode-id="4501" instrument_node="">Beyond the rigor and breadth of the scholarship, Dalrymple is a fine writer. He can construct marvelously detailed set-pieces, such as his early narration of the wedding procession of Zafar’s son, Prince Jawan Bakht (which reminded me of Barbara Tuchman’s famed funeral opening to </span><i data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">The Guns of August</span></i><span data-dcnode-id="4498" instrument_node="">). Dalrymple also provides nuanced and sympathetic portraits of the people involved, especially Zafar. Occasionally, he will even sharpen his pen a bit, as when he describes British hero/war criminal John Nicholson as “this great imperial psychopath.” More than anything else, there is Dalrymple’s love of Delhi, and some of the best sections of the book are devoted to evoking the sunset days of the Timurid Dynasty in that great city. </span><br data-dcnode-id="4497"><br data-dcnode-id="4496"><i data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">The Last Mughal</span></i><span data-dcnode-id="4493" instrument_node=""> tries to be user-friendly. The maps are cartoonishly insufficient, but there is a dramatis-personae, which is helpful. </span><br data-dcnode-id="4492"><br data-dcnode-id="4491"><span data-dcnode-id="4490" instrument_node="">Nonetheless, on the whole, this book requires a bit of foreknowledge. Dalrymple has set out to narrate the siege of Delhi as seen through King Zafar’s eyes, and he does not stray from that intent. To that end, there is very little by way of overall context of the Uprising. Events happening elsewhere are barely mentioned, much less described. The opening mutiny in Meerut, for instance, is presented in a frustratingly elliptical manner. Characters such as William Hodson, of Hodson’s Horse, just disappear from the story. You will have to go elsewhere to discover that Hodson died in the Uprising. Since this happened at Lucknow, and not Delhi, Dalrymple doesn’t bother addressing it. In short, unlike Dalrymple’s superior </span><i data-dcnode-id="4488"><span data-dcnode-id="4489" instrument_node="">Return of a King</span></i><span data-dcnode-id="4487" instrument_node="">, about the First Anglo-Afghan War, </span><i data-dcnode-id="4485"><span data-dcnode-id="4486" instrument_node="">The Last Mughal</span></i><span data-dcnode-id="4484" instrument_node=""> is not self-contained. It is a view of an epic and sweeping historical moment taken through a peephole. What you see is very good. Unfortunately, you don’t see nearly enough. </span><br data-dcnode-id="4483"><br data-dcnode-id="4482"><i data-dcnode-id="4480"><span data-dcnode-id="4481" instrument_node="">The Last Mughal</span></i><span data-dcnode-id="4479" instrument_node=""> was published in 2006, at a time when terrorism and the East-West clash was at the forefront of the world’s mind. That locus of attention has obviously changed dramatically, at least for the time being. Still, it is hard to argue with Dalrymple’s ultimate conclusion about the much-maligned King Zafar II. Despite his inability to exert strong leadership during the Uprising, Zafar had a “peaceful and tolerant attitude to life,” and placed an emphasis on pluralistic coexistence, rather than dominance. These are traits that are admirable – even vital – still today.</span></span><span data-dcnode-id="4477" instrument_node="">

</span><span data-dcnode-id="4375" id="freeTextContainer13518476922514613056"><span data-dcnode-id="4382" instrument_node="">The glory days of the Mughal empire were long gone. The dynasty had long been embroiled in a series of wars of succession,as various pretenders to the throne killed each other,and occupied the throne for short periods of time. </span><br data-dcnode-id="4381"><br data-dcnode-id="4380"><span data-dcnode-id="4379" instrument_node="">Meanwhile,the frontiers of the empire kept shrinking,and the British East India Company,kept making steady inroads,to the extent that it actually ruled India.</span><br data-dcnode-id="4378"><br data-dcnode-id="4377"><span data-dcnode-id="4376" instrument_node="">Bahadur Shah Zafar was the last Mughal, a king in name only,one left with just a title and confined to Delhi by the</span></span><span data-dcnode-id="4374" instrument_node="">
</span><span data-dcnode-id="4348" id="freeText13518476922514613056" style="display:none"><span data-dcnode-id="4373" instrument_node="">The glory days of the Mughal empire were long gone. The dynasty had long been embroiled in a series of wars of succession,as various pretenders to the throne killed each other,and occupied the throne for short periods of time. </span><br data-dcnode-id="4372"><br data-dcnode-id="4371"><span data-dcnode-id="4370" instrument_node="">Meanwhile,the frontiers of the empire kept shrinking,and the British East India Company,kept making steady inroads,to the extent that it actually ruled India.</span><br data-dcnode-id="4369"><br data-dcnode-id="4368"><span data-dcnode-id="4367" instrument_node="">Bahadur Shah Zafar was the last Mughal, a king in name only,one left with just a title and confined to Delhi by the British. He was fond of poetry,and could write pretty well. His pen name,ironiclly was Zafar (victory),while there was nothing victorious about his era.</span><br data-dcnode-id="4366"><br data-dcnode-id="4365"><span data-dcnode-id="4364" instrument_node="">William Dalrymple's book is an in-depth look at a turbulent era of Indian history,which included the unsuccessful War of Independence of 1857 (known to the British as the Indian Mutiny).</span><br data-dcnode-id="4363"><br data-dcnode-id="4362"><span data-dcnode-id="4361" instrument_node="">Bahadur Shah sided with the rebels,and as a consequence,was severely punished. He lost family members,his nominal title,and whatever comforts he had.He was exiled.</span><br data-dcnode-id="4360"><br data-dcnode-id="4359"><span data-dcnode-id="4358" instrument_node="">It makes for poignant reading,Bahadur Shah,in exile in Burma. Accompanied by a few servants,and with few possessions,he spent his last days in obscurity.</span><br data-dcnode-id="4357"><br data-dcnode-id="4356"><span data-dcnode-id="4355" instrument_node="">In Burma,the last Mughal breathed his last and penned some immortal verse about the pain of exile.He was buried anonymously and his grave was discovered decades later. </span><br data-dcnode-id="4354"><br data-dcnode-id="4353"><span data-dcnode-id="4352" instrument_node="">He lamented that he was so unfortunate that he could not find a few yards of space for his grave,in his homeland.</span><br data-dcnode-id="4351"><br data-dcnode-id="4350"><span data-dcnode-id="4349" instrument_node="">Dalrymple has done his research,no doubt. But the book is rather heavy going,and not as engaging as Abraham Eraly's books,on the Mughals. Could have done with a fair bit of editing,the detail is overdone.</span></span><span data-dcnode-id="4347" instrument_node="">

</span><span data-dcnode-id="4227" id="freeTextContainer15045273780358107243"><span data-dcnode-id="4231" instrument_node="">I have lived with this book for months. Even now I hesitate to write this review because it feels too much like saying goodbye. I don’t want to leave this world and these people—I don’t want to remember that they are all dead and that a once glorious civilization is gone forever. </span><br data-dcnode-id="4230"><br data-dcnode-id="4229"><span data-dcnode-id="4228" instrument_node="">I had ordered a whole bunch of books on Near East and Islamic history and this one arrived at the library first. My intention was to work forward from ancient times to the present day. But then I saw from the cover that</span></span><span data-dcnode-id="4226" instrument_node="">
</span><span data-dcnode-id="4200" id="freeText15045273780358107243" style="display:none"><span data-dcnode-id="4225" instrument_node="">I have lived with this book for months. Even now I hesitate to write this review because it feels too much like saying goodbye. I don’t want to leave this world and these people—I don’t want to remember that they are all dead and that a once glorious civilization is gone forever. </span><br data-dcnode-id="4224"><br data-dcnode-id="4223"><span data-dcnode-id="4222" instrument_node="">I had ordered a whole bunch of books on Near East and Islamic history and this one arrived at the library first. My intention was to work forward from ancient times to the present day. But then I saw from the cover that most of the action in this happens in the fateful year of 1857--exactly the time setting of novel I was reading </span><a data-dcnode-id="4220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/560535.Shadow_of_the_Moon" rel="nofollow noopener" title="Shadow of the Moon by M.M. Kaye"><span data-dcnode-id="4221" instrument_node="">Shadow of the Moon</span></a><span data-dcnode-id="4219" instrument_node="">. The coincidence was clearly the Working of Fate, so I surrendered to the tides of time and plunged into the waters of the River Jumna to relive the last days of Zafar: mystic, poet, calligrapher--and doomed heir to the Mughal throne.</span><br data-dcnode-id="4218"><br data-dcnode-id="4217"><img class="gr-hostedUserImg" data-dcnode-id="4216" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1438972502i/15777061.jpg&amp;raw"><br data-dcnode-id="4215"><br data-dcnode-id="4214"><span data-dcnode-id="4213" instrument_node="">Dalrymple and his research team spent over four years in India uncovering and often translating for the first time vast treasure troves of documentary material, much of which had not been touched since it was gathered in 1857: The Mutiny Papers (100,000 Persian and Urdu documents from the National Archives of India filled with detail about court and ordinary life in Dehli); Urdu newspaper archives; the Dehli Commissioner’s Office Archive; previously untranslated first person Mughal accounts (including a moving memoire from a court poet); the rarely accessed Punjab and Rangoon Archives; pre-Mutiny records of the British Residency in Delhi (including spies reports and correspondence between the British Resident and his superiors). </span><br data-dcnode-id="4212"><br data-dcnode-id="4211"><span data-dcnode-id="4210" instrument_node="">Yet nothing about this book is dry. This is history at its very best--vivid, immersive and compulsively readable. Dalrymple makes Delhi so real that I, too, heard “in the silence that followed the end of the call to prayer, the songs of the first Delhi birds...the argumentative chuckle of the babblers, the sharp chatter of the mynahs, the alternating clucking and squealing of the rosy parakeets, the angry exclamation of the brain fever bird, and from deep inside the canopy of the fruit trees in Zafar's gardens...the woody hot-weather echo of the koel.” </span><br data-dcnode-id="4209"><br data-dcnode-id="4208"><span data-dcnode-id="4207" instrument_node="">Dalrymple's gift is both erudition--the deep knowledge of a scholar who immerses himself in every possible resource--and empathy. Perhaps above all--empathy. I defy anyone who reads this with an open mind and heart to leave the story of this world-changing moment in history without thinking--</span><b data-dcnode-id="4202"><span data-dcnode-id="4206" instrument_node="">
</span><i data-dcnode-id="4204"><span data-dcnode-id="4205" instrument_node="">if only</span></i><span data-dcnode-id="4203" instrument_node="">
</span></b><span data-dcnode-id="4201" instrument_node="">....</span></span><span data-dcnode-id="4199" instrument_node="">

</span><span data-dcnode-id="4097" id="freeTextContainer4264149965402017836"><span data-dcnode-id="4101" instrument_node="">Why study history, especially the 1857 Indian Mutiny (aka, Sepoy Rebellion or 1st War of Indian Independence)? Because sometimes the threads are just so damn interesting…and even pertinent! Here’s one:</span><br data-dcnode-id="4100"><br data-dcnode-id="4099"><span data-dcnode-id="4098" instrument_node="">The Mughal Empire was known for its tolerance and usually treated Muslims and Hindus equally. At the end of the Delhi battle, the Muslims get the lion's share of the blame while mainly high-caste Hindu sepoys comprised the majority of the rebel forces and were the primary instigators. The Hindus re</span></span><span data-dcnode-id="4096" instrument_node="">
</span><span data-dcnode-id="3855" id="freeText4264149965402017836" style="display:none"><span data-dcnode-id="4095" instrument_node="">Why study history, especially the 1857 Indian Mutiny (aka, Sepoy Rebellion or 1st War of Indian Independence)? Because sometimes the threads are just so damn interesting…and even pertinent! Here’s one:</span><br data-dcnode-id="4094"><br data-dcnode-id="4093"><span data-dcnode-id="4092" instrument_node="">The Mughal Empire was known for its tolerance and usually treated Muslims and Hindus equally. At the end of the Delhi battle, the Muslims get the lion's share of the blame while mainly high-caste Hindu sepoys comprised the majority of the rebel forces and were the primary instigators. The Hindus regain access to Delhi, to housing and positions while the Muslims are shut out. This breaks the long standing era of tolerance and common cause between Hindus and Muslims. One branch of the Muslim community breaks off to study the west and become more modern. Another branches off to establish a madrasa devoted to an orthodox Islam, stripped of any Western or Indian influences. One hundred and forty years later that madrasa gives us the Taliban of our age in Pakistan and Afghanistan. Made me think. </span><br data-dcnode-id="4091"><br data-dcnode-id="4090"><a data-dcnode-id="4088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/124429.The_Last_Mughal_The_Fall_of_a_Dynasty_Delhi__1857" rel="nofollow noopener" title="The Last Mughal The Fall of a Dynasty Delhi, 1857 by William Dalrymple"><span data-dcnode-id="4089" instrument_node="">The Last Mughal: The Fall of a Dynasty: Delhi, 1857</span></a><span data-dcnode-id="4087" instrument_node=""> gets </span><b data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">5 Stars</span></b><span data-dcnode-id="4084" instrument_node=""> to bring it alongside </span><a data-dcnode-id="4082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/926855.Our_Bones_Are_Scattered_The_Cawnpore_Massacres_and_The_Indian_Mutiny_Of_1857" rel="nofollow noopener" title="Our Bones Are Scattered The Cawnpore Massacres and The Indian Mutiny Of 1857 by Andrew Ward"><span data-dcnode-id="4083" instrument_node="">Our Bones Are Scattered: The Cawnpore Massacres and The Indian Mutiny Of 1857</span></a><span data-dcnode-id="4081" instrument_node="">, the history of the same mutiny but in a different location. </span><i data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">The Last Mughal</span></i><span data-dcnode-id="4078" instrument_node=""> brings us the story of the Emperor, the royal family and what happened in Delhi, the epicenter of the entire rebellion. The book gives a short background of what life was like for the royals and the native inhabitants of Delhi. We also see the evolution of the British moving from coexisting and blending into the Indian culture to aggressively imposing British law, rule, Western education and, most alarming, evangelical Christianity.</span><br data-dcnode-id="4077"><br data-dcnode-id="4076"><a class="jsShowSpoiler spoilerAction" data-dcnode-id="4074"><span data-dcnode-id="4075" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="4045" style="display: none"><span data-dcnode-id="4073" instrument_node="">[
  </span><i data-dcnode-id="4050"><span data-dcnode-id="4072" instrument_node=""> The new attitudes of the Evangelicals were only part of a more widespread and visibly growing arrogance on the part of the increasingly powerful British. Since they had finally succeeded in conquering and subduing the Sikhs in 1849, the British at last found themselves the masters of South Asia: every single one of their military rivals had now been conquered—Siraj ud-Daula of Bengal in 1757, the French in 1761, Tipu Sultan of Mysore in 1799, and the Marathas in 1803 and again, finally, in 1819.</span><br data-dcnode-id="4071"><br data-dcnode-id="4070"><span data-dcnode-id="4069" instrument_node="">	For the first time there was a feeling that technologically, economically and politically, as well as culturally, the British had nothing to learn from India and much to teach; it did not take long for imperial arrogance to set in. This arrogance, when combined with the rise of Evangelical Christianity, slowly came to affect all aspects of relations between the British and the Indians.</span><br data-dcnode-id="4068"><br data-dcnode-id="4067"><span data-dcnode-id="4066" instrument_node="">	The Delhi College, initially more a madrasa than a Western university, was remodelled by the Company in 1828 to provide, in addition to its oriental studies, an education in English language and literature. The object was </span><b data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">“to uplift” </span></b><span data-dcnode-id="4063" instrument_node=""> what the new college committee now saw as the </span><b data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node=""> “uneducated and half-barbarous people of India.” </span></b><span data-dcnode-id="4060" instrument_node=""> Behind the move was Charles Trevelyan, the brother-in-law and disciple of Thomas Babingdon Macaulay, the same Macaulay whose minute famously declared that </span><b data-dcnode-id="4051"><span data-dcnode-id="4059" instrument_node="">“a single shelf of a good European library was worth the whole native literature of India and Arabia”:</span><br data-dcnode-id="4058"><br data-dcnode-id="4057"><span data-dcnode-id="4056" instrument_node="">“The historical information which has been collected from all the books written in the Sanscrit language is less valuable than what may be found in the most paltry abridgments used at preparatory schools in England...</span><br data-dcnode-id="4055"><span data-dcnode-id="4054" instrument_node=""> </span><br data-dcnode-id="4053"><span data-dcnode-id="4052" instrument_node="">The languages of Western Europe civilized Russia. I cannot doubt that they will do for the Hindoo what they have done for the Tartar.”</span></b></i><span data-dcnode-id="4049" instrument_node="">
</span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="4046" instrument_node="">]</span></span><br data-dcnode-id="4044"><br data-dcnode-id="4043"><span data-dcnode-id="4042" instrument_node="">Yet even Indians who were educated in the new English colleges found it did little to improve their treatment at British hands. According to Mohan Lal Kashmiri, who was a pupil in the first batch of students taught in the Delhi English College, </span><b data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">“the distant and contemptible manner with which we are treated by the generality of English gentlemen, wounds our hearts and compels us to forget the blessings of the British rule.” </span></b><span data-dcnode-id="4039" instrument_node=""> He added a word of warning: </span><b data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node=""> “You may crush down the populace and keep them in awe with your arms, but until you conquer and win the hearts of the people, the peace and affection will be more an outward word of talk than reality.”</span></b><br data-dcnode-id="4036"><br data-dcnode-id="4035"><span data-dcnode-id="4034" instrument_node="">There were many factors that led to the rebellion but religious conflict was often at the heart of it. Some British officers preached to their soldiers, missionaries became more numerous, shrines and mosques were destroyed or converted to churches (after being confiscated though the “justice” system), etc. Many little inroads over many years built tensions. The introduction of greased cartridges for the new Lee Enfield rifle was only the final straw. Coated with either grease from beef or pork, the end had to be bitten off and the contents poured into the rifle…doing this would make an outcast of either the Hindu or Muslim soldier.</span><br data-dcnode-id="4033"><br data-dcnode-id="4032"><span data-dcnode-id="4031" instrument_node="">Another cause of the revolt was the plan to end the Mughal royal line with the death of the current Emperor, Zafar. I was dumbfounded to read the reasoning for this coming from British subjects of their own monarchy. If anyone should have understood the important symbols of a monarchy, the Brits should have. Instead they decided to demote the royal family en toto, “for their own good”! Un-effing-believable! The royal princes had nothing to lose by supporting, encouraging and leading the revolt, when it came. When the heir apparent dies of cholera (or maybe poisoning?):</span><br data-dcnode-id="4030"><br data-dcnode-id="4029"><a class="jsShowSpoiler spoilerAction" data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="4000" style="display: none"><span data-dcnode-id="4026" instrument_node="">[
  </span><i data-dcnode-id="4005"><span data-dcnode-id="4025" instrument_node=""> The day after the death of Mirza Fakhru, he explained in his letter, he had paid a rare visit to the Palace to commiserate with the Emperor. Far from the scene of mourning that might have been expected, he found instead a dry-eyed Emperor with a letter to the Governor General already written in which he pressed yet again for the succession of Mirza Jawan Bakht; the body of Mirza Fakhru, he heard, had already been interred near the Sufi shrine of Qutb Sabib in Mehrauli. Zafar’s letter argued that Jawan Bakht was suitable for the position, on the basis that his birth was legitimate and that he was, in the eyes of his adoring father at least, </span><b data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node=""> “gifted with all the endowments, qualifications and virtuous habits necessary for a Prince, he having obtained a complete education under my guidance. The rest [of my sons] have no comparison with him. He [alone] merits my favour.” </span></b><br data-dcnode-id="4022"><br data-dcnode-id="4021"><span data-dcnode-id="4020" instrument_node="">Fraser, however, had other ideas. He strongly urged Canning that none of the princes should be recognised as heir apparent—least of all Jawan Bakht—and argued that the death of Mirza Fakhru, following closely upon the momentous annexation of the rich and independent kingdom of Avadh five months earlier, in February 1856, provided the perfect opportunity to prepare the Mughals for the imminent extinction of their line. This, he believed, should take place on the death of Zafar—an event which could not now be far away: </span><b data-dcnode-id="4018"><span data-dcnode-id="4019" instrument_node=""> “It appears to me inexpedient to recognise any of the sons as Heir Apparent,” </span></b><span data-dcnode-id="4017" instrument_node=""> he concluded. </span><b data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node=""> “The princes generally ~are not men of prominent influence or high personal character. . . little public interest is felt in the fortune of the family and a favourable opportunity is presented, by the removal from the scene of the most respected member of the family for the introduction of changes adapted to the altered condition of the family and the Country.” </span></b><br data-dcnode-id="4014"><br data-dcnode-id="4013"><span data-dcnode-id="4012" instrument_node="">It was an idea that the new Lieutenant Governor, C. B. Thornhill, wholeheartedly supported. From his summer retreat in the hills of Nainital he wrote to Calcutta urging Canning to listen to Fraser and seize the moment, saying he would </span><b data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node=""> “much regret if advantage we not taken of the favourable and easy opportunity now afforded for introducing a change which while it is obviously fitting in the actual condition of the Indian Empire, [is also] for the best interests of the Princes themselves.” </span></b><span data-dcnode-id="4009" instrument_node=""> He went on to explain why he believed it was the best interests of the Mughal princes to be expelled from their homes and for them to have their privy purses—their only source of income--immediately stopped: </span><b data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node=""> “The abolition of the names forms of royal state will, it may reasonably be hoped, wean them the more readily from the habits of idle, and too often vicious and discreditable frivolities, with which their lives have hitherto been wasted.” </span></b><span data-dcnode-id="4006" instrument_node=""> </span></i><span data-dcnode-id="4004" instrument_node="">
</span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="4002"><span data-dcnode-id="4003" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="4001" instrument_node="">]</span></span><br data-dcnode-id="3999"><br data-dcnode-id="3998"><span data-dcnode-id="3997" instrument_node="">The rebellion begins and thousands of mutineers head to Delhi, expecting to receive the Emperor’s blessings and, hopefully, pay and leadership. Many terrible things happen to the British and natives who converted to Christianity. If I have one complaint, this book under-emphasized the atrocities committed by the Indians against the British and overemphasized the terrible retribution atrocities by the forces that came to take back the country. ("Our Bones are Scattered" was just the opposite, overmuch on Indian atrocities and underplaying British revenge). Eventually the British led forces (many Afghans, Sikhs and other natives make up a large part) assault Delhi and take it. One young officer wrote to his mother about the assault on Delhi:</span><br data-dcnode-id="3996"><br data-dcnode-id="3995"><b data-dcnode-id="3990"><span data-dcnode-id="3994" instrument_node="">
</span><i data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node=""> “You know what that will be—rush up a ladder, with men trying to push you down, bayonet and shoot you from above. But you must wave your sword and think it capital fun, bring your men up as fast as you can and jump down on top of men ready with fixed bayonets to receive you. All this is not very pleasant to think coolly of, but when the moment comes excitement makes you feel as happy as possible. . . I hope it won’t make me swear, though that is almost allowable for you are mad with excitement, and know not what you are saying. But I will strive against it with all my might.”</span></i><span data-dcnode-id="3991" instrument_node="">
</span></b><br data-dcnode-id="3989"><br data-dcnode-id="3988"><span data-dcnode-id="3987" instrument_node="">The revenge taken by the British against the mutineers is terrible indeed. Everywhere men and boys are killed, guilty or not. It goes on for a very long time, not just in the excitement of the aftermath of battle. Many cruel punishments were meted out:</span><br data-dcnode-id="3986"><br data-dcnode-id="3985"><a class="jsShowSpoiler spoilerAction" data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="3952" style="display: none"><span data-dcnode-id="3982" instrument_node="">[
  </span><i data-dcnode-id="3957"><span data-dcnode-id="3981" instrument_node=""> Ommaney was disgusted to see that, as in Paris during the Revolution, large numbers had gathered to watch the entertainment provided by the executions. The Chowk, he noted, was </span><b data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node=""> “crowded with officers and Europeans.” “How transient seems this life,” </span></b><span data-dcnode-id="3978" instrument_node=""> he wrote in his diary that night, </span><b data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node=""> “when one sees a man so quickly part with it: a few moments and the animated body has separated from that spirit which has gone to appear before its maker, and yet to look at the crowd, how little they feel or seem to understand the awful awful change taking place before their eyes.” </span></b><span data-dcnode-id="3975" instrument_node=""> He also noted that </span><b data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node=""> “there was a very small drop as the Provost Sergeant said the rope would not stand a long one” </span></b><span data-dcnode-id="3972" instrument_node="">—the implication of this being that a short rope meant a slow and more lingering death by throttling; while a long drop would break the neck and bring instant death.</span><br data-dcnode-id="3971"><br data-dcnode-id="3970"><span data-dcnode-id="3969" instrument_node="">	Other observers were gleefully explicit that the short rope was a deliberate strategy to prolong the death of the victim. According to one source, the executioners were bribed by the crowds of British soldiers who were standing around, puffing cigars, making sure that the hangmen kept their victims </span><b data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node=""> “a long time dying. . . as they liked to see the criminals dance ‘a Pandie’s hornpipe’ as they termed the dying struggles of the wretches.” </span></b><span data-dcnode-id="3966" instrument_node=""> One provost-marshal alone put to death </span><b data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node=""> “400 or 500 wretches” </span></b><span data-dcnode-id="3963" instrument_node=""> before “thinking of resigning his office.” Some hangmen even experimented with “artistic” methods of dispatching their victims </span><b data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node=""> “in figures of eight.” </span></b><br data-dcnode-id="3960"><br data-dcnode-id="3959"><span data-dcnode-id="3958" instrument_node="">	It was reports of this sort of thing which began to worry Lord Canning in Calcutta. On 25 September he wrote to Queen Victoria about the violent rancour of a very large proportion of the English Community against every native Indian of every class. There is a rabid and indiscriminate vindictiveness abroad, even amongst many who ought to set a better example, which is impossible to contemplate without something like a feeling of shame for one’s fellow countrymen. </span></i><span data-dcnode-id="3956" instrument_node="">
</span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="3953" instrument_node="">]</span></span><br data-dcnode-id="3951"><br data-dcnode-id="3950"><span data-dcnode-id="3949" instrument_node="">Delhi was the center of learning and excellence for a great civilization. After it was captured, not so much. Here is a verse from a famous Muslim poet:</span><br data-dcnode-id="3948"><br data-dcnode-id="3947"><i data-dcnode-id="3924"><span data-dcnode-id="3946" instrument_node="">
</span><b data-dcnode-id="3926"><span data-dcnode-id="3945" instrument_node="">Every armed British soldier</span><br data-dcnode-id="3944"><span data-dcnode-id="3943" instrument_node="">Can do whatever he wants.</span><br data-dcnode-id="3942"><span data-dcnode-id="3941" instrument_node="">Just going from home to market</span><br data-dcnode-id="3940"><span data-dcnode-id="3939" instrument_node="">Makes one’s heart turn to water.</span><br data-dcnode-id="3938"><span data-dcnode-id="3937" instrument_node="">The Chowk is a slaughter ground</span><br data-dcnode-id="3936"><span data-dcnode-id="3935" instrument_node="">And homes are prisons.</span><br data-dcnode-id="3934"><span data-dcnode-id="3933" instrument_node="">Every grain of dust in Delhi</span><br data-dcnode-id="3932"><span data-dcnode-id="3931" instrument_node="">Thirsts for Muslims’ blood.</span><br data-dcnode-id="3930"><span data-dcnode-id="3929" instrument_node="">Even if we were together</span><br data-dcnode-id="3928"><span data-dcnode-id="3927" instrument_node="">We could only weep over our lives </span></b><span data-dcnode-id="3925" instrument_node="">
</span></i><br data-dcnode-id="3923"><br data-dcnode-id="3922"><span data-dcnode-id="3921" instrument_node="">After Delhi is recaptured, the Emperor is placed under arrest, imprisoned and will be tried for “treason.” Except the legal argument for treason is absolute BS:</span><br data-dcnode-id="3920"><br data-dcnode-id="3919"><i data-dcnode-id="3914"><span data-dcnode-id="3918" instrument_node="">What was never discussed was whether the Company was legally empowered to try Zafar at all. For though the government took the position that Zafar received a pension from the Company, and was therefore the Company’s pensioner and thus subject, the actual legal position was considerably more ambiguous. While the Company’s 1599 charter to trade in the East derived from Parliament and the Crown, its authority to govern in India actually legally flowed from the person of the Mughal Emperor, who had officially taken on the Company as his tax collector in Bengal in the years following the battle of Plassey, on 2 August 1765.</span><br data-dcnode-id="3917"><br data-dcnode-id="3916"><span data-dcnode-id="3915" instrument_node="">	As recently as 1832, when Zafar was fully fifty-eight years old, the Company had acknowledged itself to be the Mughal Emperor’s vassal on its coins and even on its great seal, which was covered with the inscription “Fidvi Shah Alam” (Shah Alam’s devoted dependant); this was removed only under the influence of Sir Charles Metcalfe in 1833. Since then, nothing had happened to change the legal relationship of the two parties, for although the Company had unilaterally ceased to offer nazrs and no longer proclaimed its vassalage on its coins or seal, neither Shah Alam, nor Akbar Shah, nor Zafar himself had ever renounced their sovereignty over the Company. From this point of view, Zafar could certainly be tried as a defeated enemy king; but he had never been a subject, and so could not possibly be called a rebel guilty of treason. Instead, from a legal point of view, a good case could be made that it was the East India Company which was the real rebel, guilty of revolt against a feudal superior to whom it had sworn allegiance for nearly a century…</span></i><br data-dcnode-id="3913"><br data-dcnode-id="3912"><span data-dcnode-id="3911" instrument_node="">I mentioned in the beginning that the great Muslim-Hindu era of tolerance and common understanding came to an end after the Mutiny, primarily driven by how each was treated by the victors:</span><br data-dcnode-id="3910"><br data-dcnode-id="3909"><a class="jsShowSpoiler spoilerAction" data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="3891" style="display: none"><span data-dcnode-id="3906" instrument_node="">[
  </span><i data-dcnode-id="3896"><span data-dcnode-id="3905" instrument_node=""> When Delhi fell in September 1857 it was not just the city and Zafar’s court which were uprooted and destroyed, but the self confidence and authority of the wider Mughal political and cultural world throughout India. The scale of the devastation and defeat, a the depths of the humiliation heaped on the vanquished Mughals, profoundly diminished not just the prestige of the old aristocratic order but also—to at least some extent—the composite Hindu-Muslim Indo-Islamic civilisation of which Zafar’s court had been the flagship and of whose sophisticated, tolerant and open-minded attitude Ghalib’s poems still form such a striking testament.</span><br data-dcnode-id="3904"><br data-dcnode-id="3903"><span data-dcnode-id="3902" instrument_node="">	For the British after 1857, the Indian Muslim became an almost subhuman creature, to be classified in unembarrassedly racist imperial literature alongside such other despised and subject specimens, such Irish Catholics or “the Wandering Jew.” The depth to which Indian Muslims had sunk in British eyes is visible in an 1868 production called The People of India, which contains photographs of the different castes and tribes of South Asia ranging from Tibetans and Aboriginals (illustrated with a picture of a naked tribal) to the Doms of Bihar. The image of “the Mahomedan” is illustrated by a picture of an Aligarh labourer who is given the following caption: </span><b data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node=""> “His features are peculiarly Mahomedan... [and] exemplify in a strong manner the obstinacy, sensuality, ignorance and bigotry of his class. It is hardly possible, perhaps, to conceive features more essentially repulsive.” </span></b><br data-dcnode-id="3899"><br data-dcnode-id="3898"><span data-dcnode-id="3897" instrument_node="">	The profound contempt that the British so openly expressed for Indian Muslim and Mughal culture proved contagious, particularly the ascendant Hindus, who quickly hardened their attitudes to things Islamic, but also to many young Muslims, who now believed that their own ancient and much-cherished civilisation had been irretrievably discredited. </span></i><span data-dcnode-id="3895" instrument_node="">
</span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="3892" instrument_node="">]</span></span><br data-dcnode-id="3890"><br data-dcnode-id="3889"><span data-dcnode-id="3888" instrument_node="">Much of the book covers the role played by the Emperor. He was not particularly good or bad. I don’t have any sympathy for the demise of a monarch or monarchy, wherever or whenever it falls. But it is clear this Emperor did not cause the uprising. If only he could have been strong enough to prevent the terrible excesses and atrocities, maybe history would have treated him better. And maybe some of the worst parts of the partition of India would not have happened.</span><br data-dcnode-id="3887"><br data-dcnode-id="3886"><a class="jsShowSpoiler spoilerAction" data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="3870" style="display: none"><span data-dcnode-id="3883" instrument_node="">[
  </span><i data-dcnode-id="3875"><span data-dcnode-id="3882" instrument_node=""> But while Zafar was certain never cut out to be a heroic or revolutionary leader, he remains, like his ancestor the Emperor Akbar, an attractive symbol of Islamic civilisation at its most tolerant and pluralistic. He was himself a notable poet and calligrapher; his court contained some of the most talented artistic and literary figures in modern South Asian history; and the Delhi he presided over was undergoing one of its great periods of learning, self-confidence, communal amity and prosperity. He is certainly a strikingly liberal and likeable figure when compared to the Victorian Evangelicals whose insensitivity, arrogance and blindness did much to bring the Uprising of 1857 down upon both their own heads and those of the people and court of Delhi, engulfing all of northern India in a religious war of terrible violence.</span><br data-dcnode-id="3881"><br data-dcnode-id="3880"><span data-dcnode-id="3879" instrument_node="">	Above all, Zafar always put huge emphasis on his role as a protector of the Hindus and the moderator of Muslim demands. He never forgot the central importance of preserving the bond between his Hindu and Muslim subjects, which he always recognised was the central stitching that held his capital city together. Throughout the Uprising, his refusal to alienate his Hindu subjects by subscribing to the demands of the jihadis was probably his single most consistent policy.</span><br data-dcnode-id="3878"><br data-dcnode-id="3877"><span data-dcnode-id="3876" instrument_node="">	There was nothing inevitable about the demise and extinction of the Mughals, as the sepoys’ dramatic surge towards the court of Delhi showed. But in the years to come, as Muslim prestige and learning sank, and Hindu confidence, wealth, education and power increased, Hindus and Muslims would grow gradually apart, as British policies of divide and rule found willing collaborators among the chauvinists of both faiths. The rip in the closely woven fabric of Delhi’s composite culture, opened in 1857, slowly widened into a great gash, and at Partition in 1947 finally broke in two. As the Indian Muslim elite emigrated en masse to Pakistan, the time would soon come when it would be almost impossible to imagine that Hindu sepoys could ever have rallied to the Red Fort and the standard of a Muslim emperor, joining with their Muslim brothers in an attempt to revive the Mughal Empire. </span></i><span data-dcnode-id="3874" instrument_node="">
</span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="3871" instrument_node="">]</span></span><br data-dcnode-id="3869"><br data-dcnode-id="3868"><span data-dcnode-id="3867" instrument_node="">I thought this was a perceptive observation:</span><br data-dcnode-id="3866"><br data-dcnode-id="3865"><i data-dcnode-id="3860"><span data-dcnode-id="3864" instrument_node="">
</span><b data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">The histories of Islamic fundamentalism and European imperialism have very often been closely, and dangerously, intertwined. In a curious but very concrete way, the fundamentalists of both faiths have needed each other to reinforce each other’s prejudices and hatreds. The venom of one provides the lifeblood of the other.</span></b><span data-dcnode-id="3861" instrument_node="">
</span></i><br data-dcnode-id="3859"><br data-dcnode-id="3858"><span data-dcnode-id="3857" instrument_node="">HIGHLY RECOMMENDED!!</span><br data-dcnode-id="3856"></span><span data-dcnode-id="3854" instrument_node="">

</span><span data-dcnode-id="3746" id="freeTextContainer313346439993677152"><span data-dcnode-id="3747" instrument_node="">I believe that one of the first things that need to be done after reading a book such as this to literally take a bow to the author for his efforts. You could be an expert in your field, having worked your way through every bit of ponderous tome you could ever read, but when it comes to creating a story out of it, a clear thread that runs through every bit of knowledge that you have - and to be able to share it with a reader, who comes with a background of having been told fuck-all in his school</span></span><span data-dcnode-id="3745" instrument_node="">
</span><span data-dcnode-id="3675" id="freeText313346439993677152" style="display:none"><span data-dcnode-id="3744" instrument_node="">I believe that one of the first things that need to be done after reading a book such as this to literally take a bow to the author for his efforts. You could be an expert in your field, having worked your way through every bit of ponderous tome you could ever read, but when it comes to creating a story out of it, a clear thread that runs through every bit of knowledge that you have - and to be able to share it with a reader, who comes with a background of having been told fuck-all in his school's history books - as if it had only happened yesterday, is no small feat. </span><br data-dcnode-id="3743"><br data-dcnode-id="3742"><span data-dcnode-id="3741" instrument_node="">Lets face it - even for those of us who love history (*raises hand excitedly - like Hermione used to all the time*), it can sometimes get a little boring. Maybe more than a little. You could be reading an e-folio of Abul Fazl's Ain-i-Akbari, hoping to get a sense of what the Mughal-Rajputana relations were actually like. Mr Fazl though, wouldn't haul ass beyond heaping glory on the emperor, with a million titles and one. And so the amateur history enthusiast ends up closing that link - and opens up Netflix yet again.</span><br data-dcnode-id="3740"><br data-dcnode-id="3739"><span data-dcnode-id="3738" instrument_node="">Now that is not a problem with </span><i data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">The Last Mughal</span></i><span data-dcnode-id="3735" instrument_node="">. Just a month and a half ago, I had heaped similar praises on Manu Pillai's </span><a data-dcnode-id="3730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/2436144010" rel="nofollow noopener"><span data-dcnode-id="3734" instrument_node="">
</span><i data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">The Rebel Sultans</span></i><span data-dcnode-id="3731" instrument_node="">
</span></a><span data-dcnode-id="3729" instrument_node="">. And at the risk of sounding like a broken record - </span><b data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">This is how History should be written</span></b><span data-dcnode-id="3726" instrument_node="">. Fluid, Concise and Real. And empathetic to the story and people it covers - not written from a distance (which I believe how almost all accounts of the events of 1857 previously have been). Mr Dalrymple is a guy who is fond of Delhi, and that just shows through on each and every page. Writing this book meant something to him, and that honesty and genuineness shows throughout. There are flaws for sure, and in my humble capacity, I would duly point them out. But just for that genuineness, hats off.</span><br data-dcnode-id="3725"><br data-dcnode-id="3724"><span data-dcnode-id="3723" instrument_node="">To the book itself then. As mentioned in the introduction itself, its not merely a biographical account of The last mughal emperor Bahadur Shah Zafar, but its more a biography of Delhi, in and around the times of 1857 - with our emperor being the central focus, but clearly one among many in an ensemble cast. Wouldn't take a rocket scientist to figure that the book is prima-facie divided into three parts</span><br data-dcnode-id="3722"><br data-dcnode-id="3721"><span data-dcnode-id="3720" instrument_node="">- first focuses on the event leading up to the mutiny, i.e. religious, political, social, cultural and economic causes </span><br data-dcnode-id="3719"><br data-dcnode-id="3718"><span data-dcnode-id="3717" instrument_node="">- part two focuses on the period that Delhi was under the control of Sepoys, with Zafar as the nominal emperor and leader, and until when the British recapture the city</span><br data-dcnode-id="3716"><br data-dcnode-id="3715"><span data-dcnode-id="3714" instrument_node="">-part three focuses on British retribution in the aftermath, and the horrendous treatment meted out to the people, and the city of Delhi itself</span><br data-dcnode-id="3713"><br data-dcnode-id="3712"><span data-dcnode-id="3711" instrument_node="">The third part I believe is the most inconsequential in the larger scheme of things, but the most heart-breaking one too. The atrocities committed by the British (and we find at-length descriptions of these), and the sufferings of the people highlight one thing above everything else. That the moral leadership that West has claimed for decades, rests on grounds shakier than shifting sands of Timbuktu. And this does not include the physical, cultural damage that they did to the city in robbing people like me of our architectural heritage. Officers of the company, members of the British community in Delhi gleefully recorded how monument after monument was robber, looted or plainly pulled down to destroy what was once a beautiful city. Over the years the West has found time, in its collective conscience, to rue the fate of cities like Dresden, Caen and others that were destroyed during the second world war - and remnants of a medieval past that were lost because of it. No such tears were ever shed for Delhi. But we are not here for British-bashing, that can happen maybe someday later.</span><br data-dcnode-id="3710"><br data-dcnode-id="3709"><span data-dcnode-id="3708" instrument_node="">The first part is fairly interesting. I personally always thought that religion was as much a driving force as the economic hardships were. But as this, and </span><a data-dcnode-id="3706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/2375331219" rel="nofollow noopener"><span data-dcnode-id="3707" instrument_node="">another book</span></a><span data-dcnode-id="3705" instrument_node=""> that I read earlier this year point out, that perhaps religious motivations were the biggest drivers behind the great uprising. It also charts out how Mughal power declined in the first half of 19th century, which eventually led to the decisions that Zafar made, sealing the fate of Delhi in 1857. This part in general is an interesting insight into a world that was lost and forgotten after 1857 - when a fair amount of Brits intermingled and lived with Delhi-ites, primarily the elite of the Mughal court (again, a nominal authority by that time), when </span><i data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">mushairas</span></i><span data-dcnode-id="3702" instrument_node=""> and </span><i data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">ghazals</span></i><span data-dcnode-id="3699" instrument_node=""> and </span><i data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">Ghalib</span></i><span data-dcnode-id="3696" instrument_node=""> were all real, and not stuff of urban legend that we sometimes intriguingly look back to.</span><br data-dcnode-id="3695"><br data-dcnode-id="3694"><span data-dcnode-id="3693" instrument_node="">But it is the second part of this book, which occupies most of the story, and is the most startling in its revelations. Personally speaking, and I believe it goes for most people - none of us believe history to be as black and white as it was taught in the school books. But if we were told that the 1857 uprising was a war for independence, then we tend to believe that yes, it was. To what extent, we might question it - but we would not question the veracity of the fact itself. What this book on the other hand tells us is, and quite unequivocally, that </span><b data-dcnode-id="3688"><span data-dcnode-id="3692" instrument_node="">
</span><i data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">it wasn't a war for independence</span></i><span data-dcnode-id="3689" instrument_node="">
</span></b><span data-dcnode-id="3687" instrument_node="">. Ypu'd really have to use your imagination if you have to call it one - definitely in the context of things that happened in India's current capital. </span><br data-dcnode-id="3686"><br data-dcnode-id="3685"><span data-dcnode-id="3684" instrument_node="">The reasons why men picked up arms could not possible have been more varied - a game of thrones </span><br data-dcnode-id="3683"><span data-dcnode-id="3682" instrument_node=""> for a throne that did not matter anymore, Jihad elsewhere against Christian Kafirs, and then the Sepoys - fighting as much against economic exploitation as much against religious persecution that Muslims too were fighting against. And there were also those (Indians, not British) whose sole intention was to profit from the ensuing anarchy. They sat on the fence as long as they could, while others went a step ahead and actively helped the british. That, in essence, is the story of our first war of independence. And amidst all this was Bahadur Shah II, pen-name Zafar - the eighty year old monarch of a once great dynasty that had lost everything. For an old man, you feel bad for him - but you can see that the world had already moved far ahead, and that no matter which side he backed, he and his family were bound to lose. </span><br data-dcnode-id="3681"><br data-dcnode-id="3680"><span data-dcnode-id="3679" instrument_node="">I suppose giving linear narratives to history is almost comforting to some people, for whom its not easy to digest that motives could have been complex, and ulterior in a lot of cases - self serving, and not for the benefit of the country. But such is our history, and I personally find it liberating to know how things really were, instead of living in a bubble.</span><br data-dcnode-id="3678"><br data-dcnode-id="3677"><span data-dcnode-id="3676" instrument_node="">PS - This is kind of a first draft of the review. It's a bit too extensive right now, and does not give voice to all my thoughts - will take a second pass and making this a little more coherent soon.</span></span><span data-dcnode-id="3674" instrument_node="">
