</span><span data-dcnode-id="1227" instrument_node="">
</span><div class="row1 newtabs" data-dcnode-id="1119"><span data-dcnode-id="1226" instrument_node="">

</span><li data-dcnode-id="1222"><a data-dcnode-id="1223" href="#summary"><span data-dcnode-id="1224" instrument_node="">Summary</span></a></li><span data-dcnode-id="1221" instrument_node="">
</span><li data-dcnode-id="1218"><a data-dcnode-id="1219" href="#excerpt"><span data-dcnode-id="1220" instrument_node="">Excerpt</span></a></li><span data-dcnode-id="1217" instrument_node=""> </span><li data-dcnode-id="1214"><a data-dcnode-id="1215" href="#reading_guide"><span data-dcnode-id="1216" instrument_node="">Reading Guide</span></a></li><span data-dcnode-id="1213" instrument_node="">

</span><div class="line" data-dcnode-id="1210"></div><span data-dcnode-id="1209" instrument_node="">
</span><div class="tab_content first" data-dcnode-id="1175" id="summary"><span data-dcnode-id="1208" instrument_node="">
</span><h2 data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Book Summary</span></h2><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1199"><b data-dcnode-id="1200"><span data-dcnode-id="1204" instrument_node="">'Without question, Margaret MacMillan's </span><i data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Paris 1919</span></i><span data-dcnode-id="1201" instrument_node=""> is the most honest and engaging history ever written about those fateful months after World War I when the maps of Europe were redrawn. Brimming with lucid analysis, elegant character sketches, and geopolitical pathos, it is essential reading.'</span></b></p><span data-dcnode-id="1198" instrument_node="">
</span><div class="ad" data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">
</span></div><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1194" instrument_node="">Between January and July 1919, after "the war to end all wars," men and women from around the world converged on Paris to shape the peace. Center stage, for the first time in history, was an American president, Woodrow Wilson, who with his Fourteen Points seemed to promise to so many people the fulfillment of their dreams. Stern, intransigent, impatient when it came to security concerns and wildly idealistic in his dream of a League of Nations that would resolve all future conflict peacefully, Wilson is only one of the larger-than-life characters who fill the pages of this extraordinary book. David Lloyd George, the gregarious and wily British prime minister, brought Winston Churchill and John Maynard Keynes. Lawrence of Arabia joined the Arab delegation. Ho Chi Minh, a kitchen assistant at the Ritz, submitted a petition for an independent Vietnam.</span><br data-dcnode-id="1193"><br data-dcnode-id="1192"><span data-dcnode-id="1191" instrument_node="">

For six months, Paris was effectively the center of the world as the peacemakers carved up bankrupt empires and created new countries. This book brings to life the personalities, ideals, and prejudices of the men who shaped the settlement. They pushed Russia to the sidelines, alienated China, and dismissed the Arabs. They struggled with the problems of Kosovo, of the Kurds, and of a homeland for the Jews.</span><br data-dcnode-id="1190"><br data-dcnode-id="1189"><span data-dcnode-id="1188" instrument_node="">

The peacemakers, so it has been said, failed dismally; above all they failed to prevent another war. Margaret MacMillan argues that they have unfairly been made the scapegoats for the mistakes of those who came later. She refutes received ideas about the path from Versailles to World War II and debunks the widely accepted notion that reparations imposed on the Germans were in large part responsible for the Second World War.</span><br data-dcnode-id="1187"><br data-dcnode-id="1186"><span data-dcnode-id="1185" instrument_node="">

A landmark work of narrative history, </span><i data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Paris 1919</span></i><span data-dcnode-id="1182" instrument_node=""> is the first full-scale treatment of the Peace Conference in more than twenty-five years. It offers a scintillating view of those dramatic and fateful days when much of the modern world was sketched out, when countries were created--Iraq, Yugoslavia, Israel--whose troubles haunt us still.</span><br data-dcnode-id="1181"><br data-dcnode-id="1180"><span data-dcnode-id="1179" instrument_node="">

Winner of the Samuel Johnson Prize, the PEN Hessell Tiltman Prize and the Duff Cooper Prize</span><br data-dcnode-id="1178"></p><span data-dcnode-id="1176" instrument_node="">
</span></div><span data-dcnode-id="1174" instrument_node="">

Chapter 1
</span></p><p class="text" data-dcnode-id="1155"><span data-dcnode-id="1169" instrument_node="">
</span><i data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Woodrow Wilson Comes to Europe</span></i><br data-dcnode-id="1166"><span data-dcnode-id="1165" instrument_node="">
</span><br data-dcnode-id="1164"><span data-dcnode-id="1163" instrument_node="">
On December 4, 1918, the </span><i data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node=""> George Washington</span></i><span data-dcnode-id="1160" instrument_node=""> sailed out of New York with the American delegation to the Peace Conference on board. Guns fired salutes, crowds along the waterfront cheered, tugboats hooted and Army planes and dirigibles circled overhead. Robert Lansing, the American secretary of state, released carrier pigeons with messages to his relatives about his deep hope for a lasting peace. The ship, a former German passenger liner, slid out past the Statue of Liberty to the Atlantic, where an escort of destroyers and battleships stood by to accompany it and its cargo of heavy expectations to Europe.</span><br data-dcnode-id="1159"><span data-dcnode-id="1158" instrument_node="">
</span><br data-dcnode-id="1157"><span data-dcnode-id="1156" instrument_node="">
On board were the best available experts, combed out of the universities and the government; crates of reference materials and special studies; the French and Italian ambassadors to the United States; and Woodrow Wilson. No other American president had ever gone to Europe while in office. His opponents accused him of breaking the ...</span></p><p data-dcnode-id="1154"></p><p data-dcnode-id="1153"></p><span data-dcnode-id="1152" instrument_node="">
</span><div class="more" data-dcnode-id="1148"><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bookbrowse.com/excerpts/index.cfm/book_number/1135/paris-1919%23excerpt"><b data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Read Full Excerpt</span></b></a></div><span data-dcnode-id="1147" instrument_node="">

political, social, and economic turmoil in its wake. The war also had a 
considerable impact on the Middle East and parts of Asia and Africa. What were 
the main issues and concerns facing the peacemakers in 1919? 
</span><br data-dcnode-id="1136"><br data-dcnode-id="1135"></li><li data-dcnode-id="1130"><span data-dcnode-id="1133" instrument_node="">Some historians–Arno Mayer, for example—have argued that the peacemakers 
of 1919 were determined to prevent the spread of revolution westward from 
Russia. To what extent did fear of Bolshevism shape the decisions made in Paris?
</span><br data-dcnode-id="1132"><br data-dcnode-id="1131"></li><li data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">It has often been said that there was a gulf between Woodrow Wilson and 
his new diplomacy, on one side, and the Europeans and their old diplomacy on the 
other. Discuss what is meant by the new and the old ...</span></li></ol><span data-dcnode-id="1126" instrument_node="">

</span><h2 data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Media Reviews</span></h2><span data-dcnode-id="1043" instrument_node="">
</span><div class="spacer" data-dcnode-id="1042"></div><span data-dcnode-id="1041" instrument_node="">
</span><b data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">The Daily Telegraph (UK) - Allan Massie</span></b><span data-dcnode-id="1038" instrument_node=""> </span><div data-dcnode-id="1037" id="fourstar"></div><span data-dcnode-id="1036" instrument_node="">
</span><div class="spacer_5" data-dcnode-id="1035"></div><span data-dcnode-id="1034" instrument_node="">
                            It's easy to get into a war, but ending it is a more arduous matter. It was never more so than in 1919, at the Paris Conference. . . . This is an enthralling book detailed, fair, unfailingly lively. Professor MacMillan has that essential quality of the historian, a narrative gift.</span><br data-dcnode-id="1033"><br data-dcnode-id="1032"><span data-dcnode-id="1031" instrument_node="">
</span><b data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">The Sunday Times (UK)</span></b><span data-dcnode-id="1028" instrument_node=""> </span><div data-dcnode-id="1027" id="fourstar"></div><span data-dcnode-id="1026" instrument_node="">
</span><div class="spacer_5" data-dcnode-id="1025"></div><span data-dcnode-id="1024" instrument_node="">
                            Fascinating and funny . . . Most of the problems treated in this book are still with us today--indeed, some of the most horrific things that have been taking place in Europe and the Middle East in the past decade stem directly from decisions made in Paris in 1919. It is....instructive and sobering to read about the passions, the humbug and the sheer stupidity that gave rise to them.</span><br data-dcnode-id="1023"><br data-dcnode-id="1022"><span data-dcnode-id="1021" instrument_node="">
</span><b data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Financial Times - Richard Vinen</span></b><span data-dcnode-id="1018" instrument_node=""> </span><div data-dcnode-id="1017" id="fourstar"></div><span data-dcnode-id="1016" instrument_node="">
</span><div class="spacer_5" data-dcnode-id="1015"></div><span data-dcnode-id="1014" instrument_node="">
                            MacMillan is brilliant at evoking the atmosphere of the conference. . . . Everyone who was anyone--from Elinor Glyn to Marcel Proust--hung around on the fringes of the conference. MacMillan enlivens her narrative with very funny stories about the regions whose affairs the negotiators sought to settle.</span><br data-dcnode-id="1013"><br data-dcnode-id="1012"><span data-dcnode-id="1011" instrument_node="">
</span><b data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">The Sunday Telegraph (UK) - Andrew Roberts</span></b><span data-dcnode-id="1008" instrument_node=""> </span><div data-dcnode-id="1007" id="fourstar"></div><span data-dcnode-id="1006" instrument_node="">
</span><div class="spacer_5" data-dcnode-id="1005"></div><span data-dcnode-id="1004" instrument_node="">
                            Macmillan's scrupulously researched, very fluidly written and closely argued book forces us to reexamine our assumptions about the supposed myopia of Georges Clemenceau, David Lloyd George, and Woodrow Wilson as they imposed their settlement on the defeated Central Powers and their allies. . . . To blame Versailles for Hitler's war is to let both him and the appeasers off the hook.</span><br data-dcnode-id="1003"><br data-dcnode-id="1002"><span data-dcnode-id="1001" instrument_node="">
</span><b data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Publishers Weekly</span></b><span data-dcnode-id="998" instrument_node=""> </span><div data-dcnode-id="997" id="fourstar"></div><span data-dcnode-id="996" instrument_node="">
</span><div class="spacer_5" data-dcnode-id="995"></div><span data-dcnode-id="994" instrument_node="">
                            MacMillan's lucid prose brings her participants to colorful and quotable life, and the grand sweep of her narrative encompasses all the continents the peacemakers vainly carved up. 16 pages of photos, maps.</span><br data-dcnode-id="993"><br data-dcnode-id="992"><span data-dcnode-id="991" instrument_node="">
</span><b data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Library Journal - Frederic Krome</span></b><span data-dcnode-id="988" instrument_node=""> </span><div data-dcnode-id="987" id="fourstar"></div><span data-dcnode-id="986" instrument_node="">
</span><div class="spacer_5" data-dcnode-id="985"></div><span data-dcnode-id="984" instrument_node="">
                            Viewing events through such a narrow lens can reduce diplomacy to the parochial concerns of individuals. But instead of falling into this trap, MacMillan uses the Big Three as a starting point for analyzing the agendas of the multitude of individuals who came to Versailles to achieve their largely nationalist aspirations. Following her analysis of the forces at work in Europe, MacMillan takes the reader on a tour de force of the postwar battlefields of Asia and the Middle East.</span><br data-dcnode-id="983"><br data-dcnode-id="982"><span data-dcnode-id="981" instrument_node="">
</span><b data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Booklist - Jay Freeman</span></b><span data-dcnode-id="978" instrument_node=""> </span><div data-dcnode-id="977" id="fourstar"></div><span data-dcnode-id="976" instrument_node="">
</span><div class="spacer_5" data-dcnode-id="975"></div><span data-dcnode-id="974" instrument_node="">
                            For those who seek a deeper understanding of one of history's most tragic failures, this book is a treasure.... Absorbing, balanced, and insightful narrative of a seminal event in modern history.</span><br data-dcnode-id="973"><br data-dcnode-id="972"><span data-dcnode-id="971" instrument_node="">
</span><img alt="Author Blurb" border="0" data-dcnode-id="970" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bookbrowse.com/images/bb_blurbs_profile.gif&amp;raw" title="Author Blurb"><span data-dcnode-id="969" instrument_node="">&nbsp;</span><b data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Douglas Brinkley, director of the Eisenhower Center</span></b><span data-dcnode-id="966" instrument_node="">
</span><div class="spacer_5" data-dcnode-id="965"></div><span data-dcnode-id="964" instrument_node="">
                            Without question, Margaret MacMillan's </span><i data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Paris 1919</span></i><span data-dcnode-id="961" instrument_node=""> is the most honest and engaging history ever written about those fateful months after World War I when the maps of Europe were redrawn. Brimming with lucid analysis, elegant character sketches, and geopolitical pathos, </span><i data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Paris 1919</span></i><span data-dcnode-id="958" instrument_node=""> is essential reading--the perfect follow-up to Barbara Tuchman's magisterial </span><i data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Guns of August</span></i><span data-dcnode-id="955" instrument_node="">.</span><br data-dcnode-id="954"><br data-dcnode-id="953"><span data-dcnode-id="952" instrument_node="">
</span><img alt="Author Blurb" border="0" data-dcnode-id="951" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bookbrowse.com/images/bb_blurbs_profile.gif&amp;raw" title="Author Blurb"><span data-dcnode-id="950" instrument_node="">&nbsp;</span><b data-dcnode-id="946"><span data-dcnode-id="949" instrument_node="">Roy Jenkins, author of </span><i data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Churchill</span></i></b><span data-dcnode-id="945" instrument_node="">
</span><div class="spacer_5" data-dcnode-id="944"></div><span data-dcnode-id="943" instrument_node="">
                            Compelling . . . exactly the sort of book I most like written with pace and flavored with impudence based on solid scholarship; illuminating tangled subjects with irreverent pen portraits of the individuals concerned; and with a brilliant eye for quotations.</span><br data-dcnode-id="942"><br data-dcnode-id="941"><span data-dcnode-id="940" instrument_node="">
</span><img alt="Author Blurb" border="0" data-dcnode-id="939" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bookbrowse.com/images/bb_blurbs_profile.gif&amp;raw" title="Author Blurb"><span data-dcnode-id="938" instrument_node="">&nbsp;</span><b data-dcnode-id="934"><span data-dcnode-id="937" instrument_node="">Blanche Wiesen Cook, author of </span><i data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Eleanor Roosevelt</span></i></b><span data-dcnode-id="933" instrument_node="">
</span><div class="spacer_5" data-dcnode-id="932"></div><span data-dcnode-id="931" instrument_node="">
                            Margaret MacMillan's compelling portrait of the heroes and rascals of Versailles, with all their complex and contradictory human and political foibles, breathes life into the most urgent issues still before us. This brilliant and dramatic book rekindles hope in the grand defining themes that emerged as World War I ended economic justice, human rights, and a league to ensure international amity.</span><br data-dcnode-id="930"><br data-dcnode-id="929"><span data-dcnode-id="928" instrument_node="">
</span></div><span data-dcnode-id="926" instrument_node="">
