05" instrument_node=""> </span></div><span data-dcnode-id="2403" instrument_node=""> </span><h3 data-dcnode-id="2400"><span data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Book Description</span></span></h3><span data-dcnode-id="2399" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2394"><span data-dcnode-id="2398" instrument_node=""> </span><span data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">'Among contemporary historians... Barbara Tuchman stands supreme' - The Times</span></span><span data-dcnode-id="2395" instrument_node=""> </span></div><span data-dcnode-id="2393" instrument_node=""> </span><div aria-expanded="false" class="a-expander-content a-expander-extend-content" data-dcnode-id="2381" style="display:none"><span data-dcnode-id="2392" instrument_node=""> </span><h3 data-dcnode-id="2389"><span data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">About the Author</span></span></h3><span data-dcnode-id="2388" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2383"><span data-dcnode-id="2387" instrument_node=""> </span><span data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Barbara Tuchman was one of the great historians of the 20th century. Her works include The Proud Tower, A Distant Mirror and The March of Folly.</span></span><span data-dcnode-id="2384" instrument_node=""> </span></div><span data-dcnode-id="2382" instrument_node=""> </span></div><span data-dcnode-id="2380" instrument_node=""> </span><div class="a-row" data-dcnode-id="2373"><span data-dcnode-id="2379" instrument_node=""> </span><a aria-expanded="false" class="a-expander-header a-declarative a-expander-extend-header" data-a-expander-toggle="{&quot;allowLinkDefault&quot;:true, &quot;expand_prompt&quot;:&quot;Read more&quot;, &quot;collapse_prompt&quot;:&quot;Read less&quot;}" data-action="a-expander-toggle" data-csa-c-fu </span><span data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">
  I bought this book in the Kindle version after it was referenced in an article by William Hague. Not at all what I was expecting. I'm not really clear what was going on with the introduction that seemed more like an executive summary of the book. After a bit about Troy that was rather an average read there seems to be a never-ending discussion of the venality, greed and nepotism of the Renaissance popes. I was looking for more clear-cut, well defined examples of behaviours=&gt;specific situation=&gt;wrong decision arising from previously described behaviour=&gt;calamitous consequence. A good pattern for this sort of book would be 'Hubris' by Alistair Horne, an excellent book. Frankly I just became bored - going round and round the various characters misbehaving in and around the renaissance papacy just became the same thing with different characters and I gave up reading this book 21% of the way through. If this was the style of the book I couldn't be bothered to see what might be in further chapters.

</span><span class="cr-original-review-content" data-dcnode-id="1038"><span data-dcnode-id="1045" instrument_node="">
  Ho sentito parlare di questo libro durante una conferenza sulla strategia, in cui è stato nominato come miglior testo per comprendere il concetto di “dissonanza cognitiva”.</span><br data-dcnode-id="1044"><span data-dcnode-id="1043" instrument_node="">Nel complesso un bel testo, scritto bene e coinvolgente. L’autrice usa una serie di fatti storici (Il cavallo di Troia, la conquista spagnola del Messico, la Riforma, la perdita delle colonie americane da parte dell’Inghilterra e la guerra del Vietnam) per mostrare come la storia sia piena di casi in cui la “follia” politica non ha permesso di comprendere quello che stava accadendo nel mondo circostante, e ha fatto persistere in una linea di condotta “folle”, che ha portato al fallimento di una linea politica, nonostante vi fossero tutti i parametri di riferimento per valutare altrimenti.</span><br data-dcnode-id="1042"><span data-dcnode-id="1041" instrument_node="">I caratteri storici sono presentati molto bene, e tanti personaggi sono splendidamente caratterizzati. Il dubbio è che però, come spesso accade, sia davvero complicato comprendere “in presenza” alcuni segnali deboli.</span><br data-dcnode-id="1040"><span data-dcnode-id="1039" instrument_node="">Un libro comunque da leggere anche per il parallelo, appunto, con tanti errori strategici attuali. E questo nonostante sia del 1984!

  There is a reason this book was awarded The Pulitzer Price. It is an incredible read! Tuchman outlines how authorities can sometimes make terrible mistakes. We often hope or believe, that our fearless leaders have our best interests at heart. We trust that our rulers are intelligent and will make wise decisions. Well, as Tuchman outlines in her book, this is often not the case.</span><br data-dcnode-id="981"><br data-dcnode-id="980"><span data-dcnode-id="979" instrument_node="">  The book covers four episodes in history. The Trojan War, the corruption of the Renaissance Popes, British mismanagement of the American colonies, and the American war in Vietnam. Tuchman lists all sorts of historical details. In particular, the details regarding the Renaissance Popes are jaw-dropping. Corruption is too kind a word for the leading members of a religion. The British elites seem trapped in their own world of arrogance. Both President Johnson and Nixon blindly pursue a war policy, that is devoid of any common sense. Throughout these stories, Tuchman braids together some common themes of human folly. The reader is then better able to understand, how and why these things happen. What are the conditions, that enable humans to act according to utter stupidity? Why do leaders sometimes act against their own best interests? These are the type of questions addressed in the book.</span><br data-dcnode-id="978"><br data-dcnode-id="977"><span data-dcnode-id="976" instrument_node="">  This book is highly recommended.
</span></span><span data-dcnode-id="974" instrument_node="">
