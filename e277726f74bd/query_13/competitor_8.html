</span><span data-dcnode-id="4108" id="freeTextContainer1116339901479398466"><span data-dcnode-id="4109" instrument_node="">Today, 1913 is inevitably viewed through the lens of 1914: as the last year before a war that would shatter the global economic order and tear Europe apart, undermining its global pre-eminence. Our perspectives narrowed by hindsight, the world of that year is reduced to its most frivolous features—last summers in grand aristocratic residences—or its most destructive ones: </span></span><span data-dcnode-id="4107" instrument_node="">
</span><span data-dcnode-id="4092" id="freeText1116339901479398466" style="display:none"><span data-dcnode-id="4106" instrument_node="">Today, 1913 is inevitably viewed through the lens of 1914: as the last year before a war that would shatter the global economic order and tear Europe apart, undermining its global pre-eminence. Our perspectives narrowed by hindsight, the world of that year is reduced to its most frivolous features—last summers in grand aristocratic residences—or its most destructive ones: the unresolved rivalries of the great European powers, the fear of revolution, violence in the Balkans.</span><br data-dcnode-id="4105"><br data-dcnode-id="4104"><span data-dcnode-id="4103" instrument_node="">In this illuminating history, Charles Emmerson liberates the world of 1913 from this “prelude to war” narrative, and explores it as it was, in all its richness and complexity. Traveling from Europe’s capitals, then at the height of their global reach, to the emerging metropolises of Canada and the United States, the imperial cities of Asia and Africa, and the boomtowns of Australia and South America, he provides a panoramic view of a world crackling with possibilities, its future still undecided, its outlook still open.</span><br data-dcnode-id="4102"><br data-dcnode-id="4101"><span data-dcnode-id="4100" instrument_node="">The world in 1913 was more modern than we remember, more similar to our own times than we expect, more globalized than ever before. The Gold Standard underpinned global flows of goods and money, while mass migration reshaped the world’s human geography. Steamships and sub-sea cables encircled the earth, along with new technologies and new ideas. Ford’s first assembly line cranked to life in 1913 in Detroit. The Woolworth Building went up in New York. While Mexico was in the midst of bloody revolution, Winnipeg and Buenos Aires boomed. An era of petro-geopolitics opened in Iran. China appeared to be awaking from its imperial slumber. Paris celebrated itself as the city of light—Berlin as the city of electricity.</span><br data-dcnode-id="4099"><br data-dcnode-id="4098"><span data-dcnode-id="4097" instrument_node="">Full of fascinating characters, stories, and insights, </span><i data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">1913: In Search of the World before the Great War</span></i><span data-dcnode-id="4094" instrument_node=""> brings a lost world vividly back to life, with provocative implications for how we understand our past and how we think about our future. </span><br data-dcnode-id="4093"></span><span data-dcnode-id="4091" instrument_node="">

</span><span class="readable" data-dcnode-id="3523" id="reviewTextContainer1775103838"><span data-dcnode-id="3598" instrument_node="">
</span><span data-dcnode-id="3596" id="freeTextContainer11268285571769521503"><span data-dcnode-id="3597" instrument_node="">The world of 1913 is absolutely fascinating to me. It was an era of marked contradictions. Peace and prosperity walked hand-in-glove with international tension and preparations for catastrophic war. Technological innovations such as airplanes and automobiles gave this world a modern feel. Yet for the majority of people, life continued as it had in the 19th century. There were democratic movements, emerging market economies, and globalization. But there was also colonialism, autocracy, and centur</span></span><span data-dcnode-id="3595" instrument_node="">
</span><span data-dcnode-id="3528" id="freeText11268285571769521503" style="display:none"><span data-dcnode-id="3594" instrument_node="">The world of 1913 is absolutely fascinating to me. It was an era of marked contradictions. Peace and prosperity walked hand-in-glove with international tension and preparations for catastrophic war. Technological innovations such as airplanes and automobiles gave this world a modern feel. Yet for the majority of people, life continued as it had in the 19th century. There were democratic movements, emerging market economies, and globalization. But there was also colonialism, autocracy, and centuries-old empires still holding sway over vast populations. If I were to go back in time, I feel there is a 20% chance of successfully navigating life in this period. I would probably recognize many of the implements of daily life. There is also an 80% chance I’d be run over by a horse, fall into an outhouse, or be arrested by some emperor’s secret police. </span><br data-dcnode-id="3593"><br data-dcnode-id="3592"><span data-dcnode-id="3591" instrument_node="">That world of 1913, with all its hopes and gloom, enlightenment and repression, ended in a cataclysmic reordering that began in August 1914. The upheaval of World War I and its aftermath sealed the antebellum years in the amber of nostalgia. The reality of those years was folded into the gold-hued memories of World Fairs. </span><br data-dcnode-id="3590"><br data-dcnode-id="3589"><span data-dcnode-id="3588" instrument_node="">Charles Emmerson’s </span><i data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">1913: In Search of the World Before the Great War</span></i><span data-dcnode-id="3585" instrument_node=""> tries to brush aside the myths and melancholy of that vanished yesterday, and replace it with a truer vision of the globe as it stood on the brink. </span><br data-dcnode-id="3584"><br data-dcnode-id="3583"><span data-dcnode-id="3582" instrument_node="">This has been tried before, notably in Barbara Tuchman’s </span><i data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">The Proud Tower</span></i><span data-dcnode-id="3579" instrument_node="">. Tuchman’s book promised a “portrait” of the world before 1914. Instead, it delivered a handful of disconnected essays that shared only a temporal proximity. </span><br data-dcnode-id="3578"><br data-dcnode-id="3577"><span data-dcnode-id="3576" instrument_node="">Emmerson doesn’t attempt to paint any kind of portrait, since that implies that such a thing is possible. The world was far too vast and diverse to be captured in such a way. The only reason Tuchman tried is that her definition of “world” encompassed only Western Europe and the United States. </span><br data-dcnode-id="3575"><br data-dcnode-id="3574"><span data-dcnode-id="3573" instrument_node="">Instead, Emmerson decides to take us on a world tour. Since this is an ambitious topic, he can take only a sampling. Thus, he focuses on the major cities. In that way, </span><i data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">1913</span></i><span data-dcnode-id="3570" instrument_node=""> resembles the old </span><i data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">Baedeker’s</span></i><span data-dcnode-id="3567" instrument_node=""> guide books that are often quoted within the text. </span><br data-dcnode-id="3566"><br data-dcnode-id="3565"><span data-dcnode-id="3564" instrument_node="">The thing I most appreciated about this approach is the breadth of coverage. Emmerson divides the book into four sections, each containing a number of chapters devoted to individual cities. He begins with the usual suspects of Europe, such as London, Paris, Berlin, and St. Petersburg. From there, however, the stops become a bit more eclectic and varied. He drops into Mexico City, Buenos Aires, Tehran, Jerusalem, and Tokyo. The diversity of viewpoints is refreshing. My World War I readings have given me a pretty good idea of the mindset of Londoners. It’s interesting, therefore, to see 1913 through the eyes of people living in Bombay, India, or Durban, South Africa. </span><br data-dcnode-id="3563"><br data-dcnode-id="3562"><span data-dcnode-id="3561" instrument_node="">What you get with breadth, of course, you must sacrifice with depth. My paperback version is 457 pages of text, which is not exactly short. But it’s not long enough – no book is long enough – to fully cover all corners of the earth in any kind of detail. Emmerson deals with this challenge rather idiosyncratically. As I noted above, he divides </span><i data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">1913</span></i><span data-dcnode-id="3558" instrument_node=""> into four sections, and each section contains a number of city-chapters. Before each section, Emmerson gives you a short essay on the associations between the cities included under that particular heading. For example, when introducing Europe, Emmerson dwells on the interconnectedness between nations, observing that when war broke out, many people found themselves on the wrong side of the borders. </span><br data-dcnode-id="3557"><br data-dcnode-id="3556"><blockquote data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">For Europe’s leisured classes – and increasingly for the professional middle classes, or at least those who had money and time to spend it – the continent might be experienced as a succession of train journeys from spa town to seaside resort, periodically interrupted, if at all, by the polite enquiries of differently plumed customs officials. These Europeans inhabited a continent of palace hotels, from the newly opened Carlton in St Moritz…to the gold and marble gaudiness of the Negresco in Nice. Those seeking a health retreat might travel to the Radium Kurhaus of St Joachimsthal, where Marie Curie had acquired pitchblende for her studies of radioactivity. Those seeking sun and inspiration might repair to the Grand Hotel des Bains on the Venetian Lido, the setting for a popular German novel of the previous year. In Monte Carlo, say, it would not be surprising to find an English gentleman conversing with an Austrian surgeon in French while he observed the losing streak of a Russian general at cards.</span></blockquote><br data-dcnode-id="3553"><br data-dcnode-id="3552"><span data-dcnode-id="3551" instrument_node="">After this forward, Emmerson dives into the cities themselves. Each of his city-chapters are a bit different, thematically speaking. Sometimes the chapter is about the city itself. It puts you on the ground and shows you around, pointing out places to have a drink or meal, and commenting on the architecture. More often, though, the chapter focuses on a single important or illuminating aspect. Sometimes the focus is on something happening at just that moment. The chapter on Washington, D.C., for instance, discusses Woodrow Wilson and segregated federal employment. At other times, Emmerson gives a broader historical overview. For example, when writing about Peking, Emmerson talks about the Chinese city in light of the Boxer Rebellion of 1900. </span><br data-dcnode-id="3550"><br data-dcnode-id="3549"><span data-dcnode-id="3548" instrument_node="">Emmerson centers his book on the cities, but he is not constrained by their limits. When we are in Algiers, we learn about the French architectural influences in the city. The larger discussion, though, is about French colonialism itself. </span><br data-dcnode-id="3547"><br data-dcnode-id="3546"><span data-dcnode-id="3545" instrument_node="">The downside to this approach is that not all topical discussions are created equally. Some are more interesting than others. There are chapters that easily could have been removed entirely without harming – and perhaps improving – the overall quality. Of course, I can’t really tell you what those are, since they are going to be different for every reader. </span><br data-dcnode-id="3544"><br data-dcnode-id="3543"><span data-dcnode-id="3542" instrument_node="">Anyone who picks this up hoping for a bottom line is going to be disappointed. This is not a book where a thesis is clearly delineated and then argued to a conclusion. Emmerson gives a vague mission statement about historical perspective, but he isn’t out to hammer down. The point of </span><i data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">1913</span></i><span data-dcnode-id="3539" instrument_node=""> is not about a point at all. </span><br data-dcnode-id="3538"><br data-dcnode-id="3537"><span data-dcnode-id="3536" instrument_node="">It’s also important to say that Emmerson is not attempting to explain how this world tumbled off the cliff of World War I. Anyone hoping to learn about naval arms races, entangling alliances, the Schlieffen Plan, the Moroccan Crisis, and all the rest, would do well to pick up one of the many books devoted to these subjects. World War I shadows everything, but is very rarely dealt with directly. There are some rumblings, perhaps, in the European cities. Not so in far off Detroit or Mexico City. </span><br data-dcnode-id="3535"><br data-dcnode-id="3534"><span data-dcnode-id="3533" instrument_node="">I enjoyed </span><i data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">1913</span></i><span data-dcnode-id="3530" instrument_node=""> on the terms it set for itself. At the risk of sounding like the inspirational poster that is hanging above your desk right now, this is about the journey, not the destination. It is a trip through time to a time when time was running out. </span><br data-dcnode-id="3529"></span><span data-dcnode-id="3527" instrument_node="">
</span><a data-dcnode-id="3525" data-text-id="11268285571769521503" href="#" onclick="swapContent($(this));; return false;"><span data-dcnode-id="3526" instrument_node="">...more</span></a><span data-dcnode-id="3524" instrument_node="">

</span><span data-dcnode-id="3440" id="freeTextContainer9153972319301445361"><span data-dcnode-id="3444" instrument_node="">2014 is the hundred year anniversary of the outbreak of the first world war. As a result, history buffs will be treated to a windfall of new books on the wars, many of which appear to be quite good. This is a natural prelude to those books, focusing on the year prior to the outbreak of war.</span><br data-dcnode-id="3443"><br data-dcnode-id="3442"><span data-dcnode-id="3441" instrument_node="">I enjoyed the book, but it was a bit odd. The plan is for Barbara Tuchman (The Proud Tower) to meet the Baedeker guides for the major cities of the world in 1913. The usual suspects are covered - Londen, Paris</span></span><span data-dcnode-id="3439" instrument_node="">
</span><span data-dcnode-id="3425" id="freeText9153972319301445361" style="display:none"><span data-dcnode-id="3438" instrument_node="">2014 is the hundred year anniversary of the outbreak of the first world war. As a result, history buffs will be treated to a windfall of new books on the wars, many of which appear to be quite good. This is a natural prelude to those books, focusing on the year prior to the outbreak of war.</span><br data-dcnode-id="3437"><br data-dcnode-id="3436"><span data-dcnode-id="3435" instrument_node="">I enjoyed the book, but it was a bit odd. The plan is for Barbara Tuchman (The Proud Tower) to meet the Baedeker guides for the major cities of the world in 1913. The usual suspects are covered - Londen, Paris, Berlin, Rome, Washington - as well as a variety of cities in the Western hemisphere, Asia, and the British Empire. Each chapter is a separate portrait of a given city in 1913, that profiles its social and political life, recent history, and other events, along with trends needed for the prewar narrative. The material combines general history with accounts from memoirs, travel books, and local shopping guides. The portraits are well done and all very engaging. I found myself surprised by the range of factoids offered about which I knew fairly little. It is a well done tour of the broader world before the war.</span><br data-dcnode-id="3434"><br data-dcnode-id="3433"><span data-dcnode-id="3432" instrument_node="">OK, so why is it odd? Well, I do not really think the author establishes the discontinuities that are hinted at in the title. The world of 1913 appears at times closer to the world of today than one might expect and in some areas -- for example globalization -- 1913 was well developed and the war was less a discontinuity than a setback. The chapters reveal a series of developments that were well under way by 1913 -- civil rights issues in the US, globalization in world trade, the beginnings of decolonization, the rise of a European consciousness, etc. Sure, the European civil war was a huge interruption between 1914 and 1994 (when the Russians left Poland), especially given the overlapping military, economic, and political conflicts. These have all been written about, however. What is surprising is that in a book looking at 1913 as the year before the war, the picture that emerges is more one of continuity than the author may have intended. He hints at this in his epilog in that the supposed discontinuity between 1913 and the war may be more of a construction and nostalgia than real.</span><br data-dcnode-id="3431"><br data-dcnode-id="3430"><span data-dcnode-id="3429" instrument_node="">The concluding chapter, by the way, was far too little to add much to the book. It is hard to cover the interwar period and afterwards in a few pages, so perhaps discretion was the better part of valor.</span><br data-dcnode-id="3428"><br data-dcnode-id="3427"><span data-dcnode-id="3426" instrument_node="">These chapters provide nice journalistic accounts, but it would have been good for the author to provide more guidance. After all, the pictures in each chapter were chosen after the fact to make some points. I don't think anything would have been lost by putting more cards on the table. The history is well done and the author is an excellent writer. The book, while a bit long, is a quick read and is worth the time.</span></span><span data-dcnode-id="3424" instrument_node="">

</span><span data-dcnode-id="3349" id="freeTextContainer2859019886615683067"><span data-dcnode-id="3350" instrument_node="">Written by Charles Emmerson, an Australian-born scholar connected to London's Chatham House, "1913" is an engaging and fresh take on world affairs on the eve of the First World War. Instead of interpreting or re-interpreting the period through a modern lens informed by what happened during and after the First World War, Emmerson attempts to describe the world as it might have appeared to the people alive at the time--people blissfully unaware of the "Great War" and its destructive consequences. </span></span><span data-dcnode-id="3348" instrument_node="">
</span><span data-dcnode-id="3346" id="freeText2859019886615683067" style="display:none"><span data-dcnode-id="3347" instrument_node="">Written by Charles Emmerson, an Australian-born scholar connected to London's Chatham House, "1913" is an engaging and fresh take on world affairs on the eve of the First World War. Instead of interpreting or re-interpreting the period through a modern lens informed by what happened during and after the First World War, Emmerson attempts to describe the world as it might have appeared to the people alive at the time--people blissfully unaware of the "Great War" and its destructive consequences. To that end, Emmerson offers a series of chapter-length sketches of different cities in 1913. Besides discussing the major European capital cities (London, Paris, Berlin, Rome, St. Petersburg, and Vienna), Emmerson also considers cities in North America (Washington, New York, Detroit, Los Angeles, Mexico City, and Winnipeg) and in the wider world (Buenos Aries, Algiers, Bombay, Durban, Tehran, Jerusalem, Constantinople, Peking, Shanghai, and Tokyo). These city profiles generally are tightly-written and informative, although a few were too short for my taste, particularly the chapter on Rome. Taken together, the city profiles attempt to demonstrate that war in no way was inevitable or even seemed inevitable to the people alive in 1913. In that sense, the book is a reminder that the future is something that human beings make through their choices and actions. </span></span><span data-dcnode-id="3345" instrument_node="">

</span><span data-dcnode-id="3255" id="freeText1323168811969081011" style="display:none"><span data-dcnode-id="3256" instrument_node="">It took me four months to get from end of this book to the other and I feel I could quite easily reread it straight away and get even more out of it. It filled in some gaping holes in my knowledge. Taking a different approach to many histories it stays at the same point in time, on the eve of the First World War, and goes round the world looking at the situation in many different cities. It starts off in London, goes for a jaunt across the various old cities of Europe, on to the New World cities, out to the rest of the world, stops off to look at the "Twilight Powers" cities like Constantinople and Peking, and briefly pops back to London to consider what the next hundred years will bring for the British Empire. I feel a lot of the detail probably went over my head but I still got a lot out of the book. </span></span><span data-dcnode-id="3254" instrument_node="">

</span><span data-dcnode-id="3160" id="freeText16984218441600407449" style="display:none"><span data-dcnode-id="3173" instrument_node="">Emmerson writes a book that seeks the world before World War I as it was actually experienced as opposed to through a retrospective lens. He covers major cities from every populated continent, whether or not they were a major player later. He briefly sketches their past, their contemporary supposed trajectory, the realms of both “high” and “low” politics, as well as the various artistic scenes. There are contemporary quotes that really capture how optimistic some were and how the war was not necessarily inevitable. It is especially interesting to read excerpts from assessments by </span><i data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">The Economist</span></i><span data-dcnode-id="3170" instrument_node="">. It would not be good to take this work as a single source for pre-war information, but it makes a unique companion.</span><br data-dcnode-id="3169"><br data-dcnode-id="3168"><span data-dcnode-id="3167" instrument_node="">Something to ponder for today?</span><br data-dcnode-id="3166"><span data-dcnode-id="3165" instrument_node="">“The consequences of militancy, it contended, were that ‘enthusiasts become apathetic and apathetic people become strong opponents’”.</span><br data-dcnode-id="3164"><span data-dcnode-id="3163" instrument_node="">-Charles Emmerson quoting </span><i data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">The Economist</span></i></span><span data-dcnode-id="3159" instrument_node="">

</span><span class="readable" data-dcnode-id="3062" id="reviewTextContainer2954088483"><span data-dcnode-id="3086" instrument_node="">
</span><span data-dcnode-id="3080" id="freeTextContainer4294562664774671613"><a data-dcnode-id="3084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwhyte.livejournal.com/3236402.html" rel="nofollow noopener"><span data-dcnode-id="3085" instrument_node="">https://nwhyte.livejournal.com/3236402.html</span></a><br data-dcnode-id="3083"><br data-dcnode-id="3082"><span data-dcnode-id="3081" instrument_node="">The author worked alongside me in the International Crisis Group back in the early years of this century, and went on to greater thinktanky things; in this book, he looks at 1913, the last year before the first world war, from the perspective of twenty-three great cities, starting and ending with London, but visiting the Americas, Asia, Africa, Australia and the rest of Europe en route. It's a masterly synthesis of what was going on in global politics, </span></span><span data-dcnode-id="3079" instrument_node="">
</span><span data-dcnode-id="3067" id="freeText4294562664774671613" style="display:none"><a data-dcnode-id="3077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwhyte.livejournal.com/3236402.html" rel="nofollow noopener"><span data-dcnode-id="3078" instrument_node="">https://nwhyte.livejournal.com/3236402.html</span></a><br data-dcnode-id="3076"><br data-dcnode-id="3075"><span data-dcnode-id="3074" instrument_node="">The author worked alongside me in the International Crisis Group back in the early years of this century, and went on to greater thinktanky things; in this book, he looks at 1913, the last year before the first world war, from the perspective of twenty-three great cities, starting and ending with London, but visiting the Americas, Asia, Africa, Australia and the rest of Europe en route. It's a masterly synthesis of what was going on in global politics, pulling together loads of primary sources - newspapers, diaries, etc - to build a clear picture of human politics as it was experienced by the people of the day. It was particularly interesting to get the perspective of cities from outside the European cultural space, such as Bombay, Peking, Shanghai, Tokyo, Tehran. It's quite a long book but a refreshingly quick read.</span><br data-dcnode-id="3073"><br data-dcnode-id="3072"><span data-dcnode-id="3071" instrument_node="">The concentration on individual cities does mean that two aspects of the world in 1913 are underplayed. First, most obviously, the countryside is seen only in relation to the city. Sure, the cities were where change was taking pace most quickly, but the politics of land ownership and agricultural technology are also fairly crucial drivers and are largely not included. Second, of course you can only pick so many cities; Brussels is not listed in the index, though there are a couple of paragraphs on the World's Fair in Ghent; Ireland's impact on England is described, but not from Ireland's pint of view; we hear from Algiers and Durban, but little from the continent they fringe. And third, there is little space for transnational phenomena - for instance, there is a throwaway remark about the meeting of the International Women's Suffrage Alliance in Budapest, which the Persian delegation was unable to attend; Lenin and Stalin pop up very briefly in the chapter on Vienna, as does Adolf Hitler. </span><br data-dcnode-id="3070"><br data-dcnode-id="3069"><span data-dcnode-id="3068" instrument_node="">But I guess you have to take your framing devices where you can find them, and I must admit I liked this a lot more than the last such book I read.</span></span><span data-dcnode-id="3066" instrument_node="">

</span><span data-dcnode-id="2975" id="freeTextContainer9323332088821198721"><span data-dcnode-id="2983" instrument_node="">Publishing this book in 2013 gives the author a tidy, 100-year yardstick between today and 1913: which might be considered the last "innocent" year. The last year before most people knew how effective modern technology would be at killing people.</span><br data-dcnode-id="2982"><br data-dcnode-id="2981"><span data-dcnode-id="2980" instrument_node="">The typical task for the historian is to build a skein of meaning from a list of events. But this is less History than just Inventory: a snapshot of life in many different cities during the year in question.</span><br data-dcnode-id="2979"><span data-dcnode-id="2978" instrument_node=""> </span><br data-dcnode-id="2977"><span data-dcnode-id="2976" instrument_node="">Essentially just long newspaper dispatches fro</span></span><span data-dcnode-id="2974" instrument_node="">
</span><span data-dcnode-id="2953" id="freeText9323332088821198721" style="display:none"><span data-dcnode-id="2973" instrument_node="">Publishing this book in 2013 gives the author a tidy, 100-year yardstick between today and 1913: which might be considered the last "innocent" year. The last year before most people knew how effective modern technology would be at killing people.</span><br data-dcnode-id="2972"><br data-dcnode-id="2971"><span data-dcnode-id="2970" instrument_node="">The typical task for the historian is to build a skein of meaning from a list of events. But this is less History than just Inventory: a snapshot of life in many different cities during the year in question.</span><br data-dcnode-id="2969"><span data-dcnode-id="2968" instrument_node=""> </span><br data-dcnode-id="2967"><span data-dcnode-id="2966" instrument_node="">Essentially just long newspaper dispatches from different parts of the globe.</span><br data-dcnode-id="2965"><br data-dcnode-id="2964"><span data-dcnode-id="2963" instrument_node="">We spot famous names here and there: Hitler is painting houses in Vienna (where Trotsky is also hiding out) - Einstein gets a job and moves to Berlin - etc.</span><br data-dcnode-id="2962"><br data-dcnode-id="2961"><span data-dcnode-id="2960" instrument_node="">But there is no synthesis here. No greater vision. No deep analysis.</span><br data-dcnode-id="2959"><br data-dcnode-id="2958"><span data-dcnode-id="2957" instrument_node="">You'd probably get more insight into pre-war culture by rerunning early episodes of "Downton Abbey".</span><br data-dcnode-id="2956"><br data-dcnode-id="2955"><span data-dcnode-id="2954" instrument_node="">A decent book to take traveling, though. There's no real linkage between the chapters, so you can dip in, and out, at your leisure. Also not particularly compelling (if you have something else you need to be doing)....</span></span><span data-dcnode-id="2952" instrument_node="">

</span><span data-dcnode-id="2699" id="freeTextContainer9155444554134345290"><span data-dcnode-id="2700" instrument_node="">I always hated Sundays as a kid because I knew something was ending despite my efforts to prolong it. My dad's asleep on the couch with golf on the TV, and I'm staring up at a ceiling fan trying to absorb the last gasp of the weekend. I kinda shudder to reinhabit the quiet malaise that accompanied that sense of vaguely perceptible loss. It's associated with images and feelings: the crawl of the afternoon sun, a cool sweat inside my house, and a disappearing window for finishing homework too long</span></span><span data-dcnode-id="2698" instrument_node="">
</span><span data-dcnode-id="2693" id="freeText9155444554134345290" style="display:none"><span data-dcnode-id="2697" instrument_node="">I always hated Sundays as a kid because I knew something was ending despite my efforts to prolong it. My dad's asleep on the couch with golf on the TV, and I'm staring up at a ceiling fan trying to absorb the last gasp of the weekend. I kinda shudder to reinhabit the quiet malaise that accompanied that sense of vaguely perceptible loss. It's associated with images and feelings: the crawl of the afternoon sun, a cool sweat inside my house, and a disappearing window for finishing homework too long delayed.</span><br data-dcnode-id="2696"><br data-dcnode-id="2695"><span data-dcnode-id="2694" instrument_node="">1913 brilliantly captures this feeling, exploring its manifestations across a world whose darker character would be shortly revealed. I find myself currently in a legal academic bubble that yearns for concise, specific, authoritative, and narrow writing; this book provided a welcome break where the historical is allowed to play uncritically with the moral, philosophical, and emotional. Emmerson tries to and succeeds in whisking the reader through a global kaleidoscope, but the mind and heart of both book and author always return to London. It's a fitting angle, because the ultimate symbol of 1913 is an Edwardian midsummer's picnic, a soiree of pomp and circumstance whose revelers preside over a heaving global empire with cracks beginning to show. 1913 (the year, not the book) was Sunday for a long-lost world; I think, in 2019, we're still somewhere in the middle of the week that came after.</span></span><span data-dcnode-id="2692" instrument_node="">

</span><span data-dcnode-id="2592" id="freeText12023780694613926257" style="display:none"><span data-dcnode-id="2598" instrument_node="">2.5 stars [History]</span><br data-dcnode-id="2597"><span data-dcnode-id="2596" instrument_node="">Writing: 3; Use: 3; Truth: 2.5.</span><br data-dcnode-id="2595"><br data-dcnode-id="2594"><span data-dcnode-id="2593" instrument_node="">Emmerson writes a decent and unusual work, which presents a blimp's view of 22 international cities in the year before the first World War. The writing was above average. A few of the truths were notable (3.5 stars), but enough material made its way into the book to counterbalance to a 2.5. These include what seems like an outsider's view of economics, particularly in the realms of capitalist theory and the practice of monopoly. Class and race concerns became so over-represented in the middle of the book that it almost merited being included in the book's subtitle. We understand that a macro-history like this cannot cover all concerns, but Emmerson's treatment of several areas was too superficial, including simplistic representation of colonial attitudes towards the indigenous, Sun Yat-Sen in China, and British Suffragetism.</span></span><span data-dcnode-id="2591" instrument_node="">

</span><span data-dcnode-id="2346" id="freeTextContainer16275391123036720357"><span data-dcnode-id="2353" instrument_node="">An interesting look at the world in 1913, before the Great War. The book doesn't mention the looming war, and that's kind of the point. It goes city-by-city, discussing what was happening in each, on the eve of World War 1.</span><br data-dcnode-id="2352"><br data-dcnode-id="2351"><span data-dcnode-id="2350" instrument_node="">The result is...interesting. The book paints the picture of the world as a flurry of activity and advancement, while you, the reader, know that complete disaster is right around the corner.</span><br data-dcnode-id="2349"><br data-dcnode-id="2348"><span data-dcnode-id="2347" instrument_node="">It's like those pictures that depict "seconds before chaos." We think of the war as this</span></span><span data-dcnode-id="2345" instrument_node="">
</span><span data-dcnode-id="2334" id="freeText16275391123036720357" style="display:none"><span data-dcnode-id="2344" instrument_node="">An interesting look at the world in 1913, before the Great War. The book doesn't mention the looming war, and that's kind of the point. It goes city-by-city, discussing what was happening in each, on the eve of World War 1.</span><br data-dcnode-id="2343"><br data-dcnode-id="2342"><span data-dcnode-id="2341" instrument_node="">The result is...interesting. The book paints the picture of the world as a flurry of activity and advancement, while you, the reader, know that complete disaster is right around the corner.</span><br data-dcnode-id="2340"><br data-dcnode-id="2339"><span data-dcnode-id="2338" instrument_node="">It's like those pictures that depict "seconds before chaos." We think of the war as this massive, looming menace of the time, but we forget that the people in 1913 had little idea what was coming. They were troubled with their own problems, enamored with their own advancements, and blissfully unaware of what was coming and how that would reorient their perspective on everything.</span><br data-dcnode-id="2337"><br data-dcnode-id="2336"><span data-dcnode-id="2335" instrument_node="">In the end, there's a lot here. You don't go very deep on any one city, which makes it a little superficial, even with an overload of information. It's like this huge well of history, and you can only drink so much. I enjoyed reading it, but my only lasting takeaway is likely the unsettling feeling of all those people, ignorant of the future.</span></span><span data-dcnode-id="2333" instrument_node="">

    </span></div><span data-dcnode-id="2045" instrument_node="">
</span><div class="reviewText stacked" data-dcnode-id="1949"><span data-dcnode-id="2044" instrument_node="">
</span><span class="readable" data-dcnode-id="1951" id="reviewTextContainer1486263921"><span data-dcnode-id="2043" instrument_node="">
</span><span data-dcnode-id="2030" id="freeTextContainer13591015583881319574"><span data-dcnode-id="2042" instrument_node="">"A European could survey the world in 1913 as the Greek gods might have surveyed it from the snowy heights of Mount Olympus: themselves above, the teeming earth below. To be a European, from this perspective, was to inhabit the highest stage of human development."</span><br data-dcnode-id="2041"><br data-dcnode-id="2040"><span data-dcnode-id="2039" instrument_node="">So begins Charles Emmerson’s </span><i data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">1913: In Search of the World Before the Great War</span></i><span data-dcnode-id="2036" instrument_node=""> .</span><br data-dcnode-id="2035"><br data-dcnode-id="2034"><i data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">1913</span></i><span data-dcnode-id="2031" instrument_node=""> attempts to paint a picture of each of 20 world capitals in the year before the great war. How did they view the world? What were their expectations fo</span></span><span data-dcnode-id="2029" instrument_node="">
</span><span data-dcnode-id="1956" id="freeText13591015583881319574" style="display:none"><span data-dcnode-id="2028" instrument_node="">"A European could survey the world in 1913 as the Greek gods might have surveyed it from the snowy heights of Mount Olympus: themselves above, the teeming earth below. To be a European, from this perspective, was to inhabit the highest stage of human development."</span><br data-dcnode-id="2027"><br data-dcnode-id="2026"><span data-dcnode-id="2025" instrument_node="">So begins Charles Emmerson’s </span><i data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">1913: In Search of the World Before the Great War</span></i><span data-dcnode-id="2022" instrument_node=""> .</span><br data-dcnode-id="2021"><br data-dcnode-id="2020"><i data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">1913</span></i><span data-dcnode-id="2017" instrument_node=""> attempts to paint a picture of each of 20 world capitals in the year before the great war. How did they view the world? What were their expectations for the future? How did 1913 produce the guns of August? What happened to the promise held out by the previous years of the world’s first brush with globalization?</span><br data-dcnode-id="2016"><br data-dcnode-id="2015"><span data-dcnode-id="2014" instrument_node="">Europe is still, in 1913, the “Center of the Universe”: London, Paris, Berlin, Rome, Vienna, and St. Petersburg. These are the powerhouse cities, linked by history, culture, blood ties, and relatively easy access. Most importantly, they are linked by trade, exemplified by the 1913 Ghent (Belgium) World’s Fair. War, to these nations, was a practical impossibility. Why would anyone, they asked themselves, impede the march of progress?</span><br data-dcnode-id="2013"><br data-dcnode-id="2012"><span data-dcnode-id="2011" instrument_node="">It’s a sober reflection to read how much Americans of that time resemble us. For example, America in 1913 worried about the "overweening power of a money trust of Wall Street squeezing out Main Street in favour of large companies controlled by the banks."</span><br data-dcnode-id="2010"><br data-dcnode-id="2009"><span data-dcnode-id="2008" instrument_node="">A few more illustrative quotes from American cities:</span><br data-dcnode-id="2007"><br data-dcnode-id="2006"><span data-dcnode-id="2005" instrument_node="">Washington, DC –</span><br data-dcnode-id="2004"><span data-dcnode-id="2003" instrument_node="">"At a press conference in May, [President Woodrow} Wilson raised another familiar and related gripe. ‘This town is swarming with lobbyists,’ he complained, ‘so you can’t throw a brick in any direction without hitting one …</span><br data-dcnode-id="2002"><br data-dcnode-id="2001"><span data-dcnode-id="2000" instrument_node="">New York –</span><br data-dcnode-id="1999"><span data-dcnode-id="1998" instrument_node="">"As America became more citified, observers worried, was it to become more dandified, more greedy and more individualistic – more like New York?"</span><br data-dcnode-id="1997"><br data-dcnode-id="1996"><span data-dcnode-id="1995" instrument_node="">Los Angeles – A reader of the Los Angeles Record declared,</span><br data-dcnode-id="1994"><span data-dcnode-id="1993" instrument_node="">"IF you question the EMPLOYERS regarding the continued changing in their staff they will tell you that Los Angeles has a ‘floating population’, apparently failing to realize that the population would be permanent if living wages were paid."</span><br data-dcnode-id="1992"><br data-dcnode-id="1991"><span data-dcnode-id="1990" instrument_node="">Winnepeg, Melbourne, Buenos Aires, Algiers, Bombay, Durban, Tehran, Jerusalem – all of them rising cities of the future in 1913. Constantinople, Peking, Shanghai, and Tokyo – old cities trying to adapt to the new century.</span><br data-dcnode-id="1989"><br data-dcnode-id="1988"><span data-dcnode-id="1987" instrument_node="">"'We live in a time of suprises,' wrote an American observer in 1913, 'Turkey is reforming, China is waking up, the self-satisfied complacency of the white race has received a shock.'"</span><br data-dcnode-id="1986"><br data-dcnode-id="1985"><span data-dcnode-id="1984" instrument_node="">The next four years would see all of Europe standing with both feet in a water-filled trench and both hands clutching the lightning bolt of war. Nothing would ever be the same.</span><br data-dcnode-id="1983"><br data-dcnode-id="1982"><span data-dcnode-id="1981" instrument_node="">"For if the Great War had shown one thing, was it not the European civilization, once hailed as the most progressive and most advanced in the world, was really nothing more than a thin veneer for barbarism? Chinese intellectual Yan Fu noted that 'the European race’s last three hundred years of evolutionary progress have all come down to nothing but four words: selfishness, slaughter, shamelessness and corruption.'"</span><br data-dcnode-id="1980"><br data-dcnode-id="1979"><span data-dcnode-id="1978" instrument_node="">On December 31, 1913, in London, Emmerson relates, the Daily Chronicle published its poem of the year:</span><br data-dcnode-id="1977"><br data-dcnode-id="1976"><br data-dcnode-id="1975"><span data-dcnode-id="1974" instrument_node="">I do not mourn your passing, shed no tear,</span><br data-dcnode-id="1973"><span data-dcnode-id="1972" instrument_node="">As you are whelmed in shadows of the past:</span><br data-dcnode-id="1971"><span data-dcnode-id="1970" instrument_node="">I only sigh and say – Please God next year</span><br data-dcnode-id="1969"><span data-dcnode-id="1968" instrument_node="">Will be more fruitful, fuller than the last …</span><br data-dcnode-id="1967"><br data-dcnode-id="1966"><span data-dcnode-id="1965" instrument_node="">"From me no heavy burdens of farewells;</span><br data-dcnode-id="1964"><span data-dcnode-id="1963" instrument_node="">I turn to watch the year dawn that shall be."</span><br data-dcnode-id="1962"><br data-dcnode-id="1961"><span data-dcnode-id="1960" instrument_node="">"At the stroke of midnight, 1913 died. The year was 1914."</span><br data-dcnode-id="1959"><br data-dcnode-id="1958"><span data-dcnode-id="1957" instrument_node="">How will our future look on December 31, 2016? What are the chances that another year, perhaps 2017, will resonate down the ages as the year when everything changed? Few in 1913 saw anything coming. And no one knew, no one was able to know, all that the future would hold.</span></span><span data-dcnode-id="1955" instrument_node="">

</span><span data-dcnode-id="1855" id="freeText14271039202667375984" style="display:none"><span data-dcnode-id="1865" instrument_node="">Neither here nor there, I'm afraid. I was intrigued by the conceit of examining a dozen or so major world cities in 1913, particularly the fairly broad global selection, but unfortunately the book tends to stray too wide to be really interesting, at least for my tastes. There are snapshots of each city, and those are great, but they're far too brief. Mostly it becomes just a jumping off point for short, tip-of-the-iceberg, ho-hum political histories. So the Tokyo chapter spends a lot of time on the Meiji restoration, Constantinople on the Young Turks, Durban on Ghandi's career, etc. It is a bit of a rock and hard place - for the stuff I was already familiar with, it was just treading water. For the stuff I was unfamiliar with, it was just a dense mess of names and dates I was unlikely to absorb in any meaningful way. </span><br data-dcnode-id="1864"><br data-dcnode-id="1863"><span data-dcnode-id="1862" instrument_node="">The political focus also seems to me to undermine the stated premise of the book, which is to try and look at 1913 </span><i data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">not</span></i><span data-dcnode-id="1859" instrument_node=""> through the lense of what was to follow, but the books can't seem to entirely shy away from the things we know would turn out to be important, like Ghandi or the mass produced car. Secondly, while there's an admirable attempt at global reach, in practice it still often remains a story of the way other places interacted with Europe, again mostly politically. </span><br data-dcnode-id="1858"><br data-dcnode-id="1857"><span data-dcnode-id="1856" instrument_node="">So it's an interesting attempt but ultimately fell flat for me because there just wasn't enough of the kind of daily information about these places, in this time, that I find interesting. There was some, and that made it all the more frustrating when the book segued away from discussing technology, culture, fashion and landscape for another half-hearted account of some major political/military crisis. </span></span><span data-dcnode-id="1854" instrument_node="">

</span><span data-dcnode-id="1767" id="freeTextContainer14333153933741008630"><span data-dcnode-id="1771" instrument_node="">The book attempts to characterize the goings on in 2013 of various cities around the world. London is the capitol if finance. France is the capitol of pleasure. Berlin is the Capitol of industry. Tokyo is a westernized Asia. Shanghai is a westerner's island in an Eastern world. And we get snapshots of Constantinople, Bombay, and several cities in the United States. </span><br data-dcnode-id="1770"><br data-dcnode-id="1769"><span data-dcnode-id="1768" instrument_node="">The choice of cities is not particularly well explained. The focus on cities is not quite adhered to. We get mostly a survey of nati</span></span><span data-dcnode-id="1766" instrument_node="">
</span><span data-dcnode-id="1752" id="freeText14333153933741008630" style="display:none"><span data-dcnode-id="1765" instrument_node="">The book attempts to characterize the goings on in 2013 of various cities around the world. London is the capitol if finance. France is the capitol of pleasure. Berlin is the Capitol of industry. Tokyo is a westernized Asia. Shanghai is a westerner's island in an Eastern world. And we get snapshots of Constantinople, Bombay, and several cities in the United States. </span><br data-dcnode-id="1764"><br data-dcnode-id="1763"><span data-dcnode-id="1762" instrument_node="">The choice of cities is not particularly well explained. The focus on cities is not quite adhered to. We get mostly a survey of national domestic politics several years before 2014. The characterization of cities and their role in the world is oversimplified.</span><br data-dcnode-id="1761"><br data-dcnode-id="1760"><span data-dcnode-id="1759" instrument_node=""> The author sets an interesting goal for himself, but he fails the reader by not connecting the goings on in these cities to the terrible events to follow. Why, for example, is Durban or Bombay included in his survey other than to illuminate the complicated trappings of British colonialism? Sure, the British empire needed resizing, but the author does not go on to connect this need to the events that followed in the Great War. </span><br data-dcnode-id="1758"><br data-dcnode-id="1757"><span data-dcnode-id="1756" instrument_node="">The portraits of the cities were themselves rather banal. We get details of life in each of the cities that are probably too much information for a global survey. What is more interesting is how life in each of the cities is different. But the author focused on one city at a time and does not undertake any kind of deliberate comparison.</span><br data-dcnode-id="1755"><br data-dcnode-id="1754"><span data-dcnode-id="1753" instrument_node="">The book did give me a short history lesson, and made me reflect on the origins of the Mexican revolution or the Great War. But I don't come away from this book terribly enlightened about World War 1.</span></span><span data-dcnode-id="1751" instrument_node="">

</span><span data-dcnode-id="1664" id="freeTextContainer569292274110353126"><span data-dcnode-id="1668" instrument_node="">This is my first foray into a yearlong project, to read about the runup to the Great War, its execution, and its aftermath, in observance of the centenary of that great conflict.</span><br data-dcnode-id="1667"><br data-dcnode-id="1666"><span data-dcnode-id="1665" instrument_node="">The year 1913 is an interesting year, coming as it did just before things went to hell in 1914. The intent here was to take a picture of the world before WWI ushered in mechanized warfare, the rise of dictatorship, and persistent economic unrest. Despite its many flaws and weaknesses, 1913 was a time of relative peace, p</span></span><span data-dcnode-id="1663" instrument_node="">
</span><span data-dcnode-id="1650" id="freeText569292274110353126" style="display:none"><span data-dcnode-id="1662" instrument_node="">This is my first foray into a yearlong project, to read about the runup to the Great War, its execution, and its aftermath, in observance of the centenary of that great conflict.</span><br data-dcnode-id="1661"><br data-dcnode-id="1660"><span data-dcnode-id="1659" instrument_node="">The year 1913 is an interesting year, coming as it did just before things went to hell in 1914. The intent here was to take a picture of the world before WWI ushered in mechanized warfare, the rise of dictatorship, and persistent economic unrest. Despite its many flaws and weaknesses, 1913 was a time of relative peace, prosperity, growing social reform, and technological advancement, especially in the West.</span><br data-dcnode-id="1658"><br data-dcnode-id="1657"><span data-dcnode-id="1656" instrument_node="">The chapters look at either a city or region and chronicle the chief economic, social, and political issues of the day. And here is where the book stumbles; in avoiding placing the world in the context of imminent war, the author is left with little context at all. The chapters read like summaries, without much to unify them or even a unifying concept for each chapter. What I ended up with was a series of snapshots, by region, rather than a portrait of the whole world.</span><br data-dcnode-id="1655"><br data-dcnode-id="1654"><span data-dcnode-id="1653" instrument_node="">The writing sometimes becomes tedious, and some of the chapters are overlong. Overall, without a narrative to unify the entire piece, it turned into a difficult read, even for a history book. But there is a lot of excellent information there; I'd recommend reading this as you might a collection of short stories, rather than as a cover-to-cover project. This is just one of several books covering 1913; I might check out one of them, just to round out reading on the subject.</span><br data-dcnode-id="1652"><br data-dcnode-id="1651"></span><span data-dcnode-id="1649" instrument_node="">

</span><span data-dcnode-id="1574" id="freeTextContainer10699773235925654007"><span data-dcnode-id="1575" instrument_node="">A fascinating book - and I think I can say that the author accomplished his purpose, which was to look at the year 1913 *on its own terms*. Most histories, knowing that WWI was about to begin, would see the events of the year as a natural lead-up to that great war - but one of the major points the author is trying to drive home here is that most of the world in 1913 had no idea what was just around the corner. Indeed many of them were celebrating inevitable progress and peace and the unity of ma</span></span><span data-dcnode-id="1573" instrument_node="">
</span><span data-dcnode-id="1568" id="freeText10699773235925654007" style="display:none"><span data-dcnode-id="1572" instrument_node="">A fascinating book - and I think I can say that the author accomplished his purpose, which was to look at the year 1913 *on its own terms*. Most histories, knowing that WWI was about to begin, would see the events of the year as a natural lead-up to that great war - but one of the major points the author is trying to drive home here is that most of the world in 1913 had no idea what was just around the corner. Indeed many of them were celebrating inevitable progress and peace and the unity of mankind. And so perhaps there is a lesson here - many illustrations in our own time as well - that civilization is more fragile than we'd care to believe, and could be lost in a moment.</span><br data-dcnode-id="1571"><br data-dcnode-id="1570"><span data-dcnode-id="1569" instrument_node="">That may be the forest - the trees are interesting too. Looking at only one year allows the reader to "discover" a lot of history that they probably passed over in their one-semester-for-the-whole-history-of-makind class in high school. In retrospect we also have a habit of making men into clear villains or heroes - in truth, many of their contemporaries, even well-meaning contemporaries, weren't sure how history would judge them (Ghandi is a good example here). (And that is a lesson for our own time as well - perhaps the world was always this confusing.) A recommended book, for sure.</span></span><span data-dcnode-id="1567" instrument_node="">

</span><span data-dcnode-id="1480" id="freeText182760681966472136" style="display:none"><span data-dcnode-id="1481" instrument_node="">This is quite an unusual one really. A brief summary of what the book aims to do is paint a snap shot of several major cities, some up and coming and others well established, before the eruption of the First World War. In this the book definitely succeeded in painting some very interesting scenes. However the thing that confused me slightly is that I feel a better title would have been "In search of the world before the wars". While many of the cities discussed within the book are those that were most affected by the first world war, namely Paris, St Petersburg, Berlin and Vienna the author also discusses several other cities that so far as I can tell were far more caught up in the storm that was the Second World War. My confusion isn't intended as a criticism in any way as this was a thoroughly enjoyable read but it did seem weirdly limited at times. Would gladly recommend for anyone interested in a slightly different approach to the history of WW1.</span></span><span data-dcnode-id="1479" instrument_node="">

</span><span data-dcnode-id="1395" id="freeText13620430365054253452" style="display:none"><span data-dcnode-id="1399" instrument_node="">This was an interesting book. Most history focuses on war, this book looked at an age that preceded the abyss that was WWI. It did this from the perspective of the major cities throughout the world. </span><br data-dcnode-id="1398"><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">Of particular interest for me was the background on the activities in Persia at this time; the assassination of Nassar al-Din Shah in 1896. The activities of his son Muzaffar, who died in 1907 and finally, the mismanagement of Ahmad Shah Qatar (the sweet eater) who caused so much trouble for Persia/Iran leading into the century. I also learned some of the earliest decisions that led to much of what took place later...that it was Churchill's "controversial" decision to convert the British fleet from coal to oil that led to the initiation of the organization we now know as BP...and all the problems it created for Iran.</span></span><span data-dcnode-id="1394" instrument_node="">

</span><span data-dcnode-id="905" id="freeTextContainer1771351249761244781"><span data-dcnode-id="909" instrument_node="">Charles Emmerson has set out to find the world as it was 100 years ago, before the Guns of August [1914] and the theretofore unimaginable carnage unleashed by the first World War. Emmerson's world is one of empires, and it is these building blocks that he uses to construct 1913: In Search of the World Before the Great War.</span><br data-dcnode-id="908"><br data-dcnode-id="907"><span data-dcnode-id="906" instrument_node="">Chapter-by-chapter, the reader is taken on a tour of each empire and outpost: the British, of course, and the American, the Austro-Hungarian, French, Ottoman, Russian, and even</span></span><span data-dcnode-id="904" instrument_node="">
</span><span data-dcnode-id="896" id="freeText1771351249761244781" style="display:none"><span data-dcnode-id="903" instrument_node="">Charles Emmerson has set out to find the world as it was 100 years ago, before the Guns of August [1914] and the theretofore unimaginable carnage unleashed by the first World War. Emmerson's world is one of empires, and it is these building blocks that he uses to construct 1913: In Search of the World Before the Great War.</span><br data-dcnode-id="902"><br data-dcnode-id="901"><span data-dcnode-id="900" instrument_node="">Chapter-by-chapter, the reader is taken on a tour of each empire and outpost: the British, of course, and the American, the Austro-Hungarian, French, Ottoman, Russian, and even the beginnings of the Japanese empire. By examining life, politics, and the zeitgeist in leading cities from London, Washington, Paris, and Vienna, and stopping by Jerusalem, Mexico City, Durban, and Beijing, Emmerson provides an intricate birds-eye view look at the world as it was. (In total he covers 23 cities on all six inhabited continents, an impressive feat.) This is actually the second book on pre-WWI empires that I've set out to read this year and, whether it was the organization or Emmerson's tone and style, I much preferred 1913 to The Age of Empire.</span><br data-dcnode-id="899"><br data-dcnode-id="898"><span data-dcnode-id="897" instrument_node="">Personally, I found the chapter on the Austro-Hungarian Empire to be the most interesting, followed closely by those chapters that chronicled the last days of the Ottoman Empire, likely because I knew the least about these two empires and, therefore, felt I learned the most. For 1913 is an excellent sampler, something to whet the appetite before digging in deeper to anyone of these empires. As Emmerson notes in his closing paragraphs, this book seeks to capture, "a world bathed in the last rays of the dying sun, a world of order and security, a world unknowingly on the brink of the seminal catastrophe of the twentieth century" (p. 456). Of this, he has done an admiral job.</span></span><span data-dcnode-id="895" instrument_node="">
