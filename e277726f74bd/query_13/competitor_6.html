              </span><a class="actionLinkLite" data-dcnode-id="5087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/3593962-kalliope%3Fshelf%3Dmedieval"><span data-dcnode-id="5088" instrument_node="">medieval</span></a><span data-dcnode-id="5086" instrument_node="">, 
              </span><a class="actionLinkLite" data-dcnode-id="5084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/3593962-kalliope%3Fshelf%3Dhistory"><span data-dcnode-id="5085" instrument_node="">history</span></a><span data-dcnode-id="5083" instrument_node="">

</span><span class="readable" data-dcnode-id="4995" id="reviewTextContainer324120074"><span data-dcnode-id="5077" instrument_node="">
</span><span data-dcnode-id="5066" id="freeTextContainer2434705045948827295"><br data-dcnode-id="5076"><img class="gr-hostedUserImg" data-dcnode-id="5075" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1443120378i/16320448.jpg&amp;raw"><br data-dcnode-id="5074"><br data-dcnode-id="5073"><br data-dcnode-id="5072"><br data-dcnode-id="5071"><span data-dcnode-id="5070" instrument_node="">What an extraordinary read it is when one book is as action packed as thirty riveting novels. And if it also contains rich and erudite disquisitions and is narrated in a language as clear and flowing as water from a spring, then the volume must be given a preferential place in one’s library.</span><br data-dcnode-id="5069"><br data-dcnode-id="5068"><span data-dcnode-id="5067" instrument_node="">I am not too keen of including quotes in my reviews. But given the amount of material that marshals in front of one’s eyes, as colorful as overwhelming pageants and breathtaking jousts, and as dense as the ti</span></span><span data-dcnode-id="5065" instrument_node="">
</span><span data-dcnode-id="5000" id="freeText2434705045948827295" style="display:none"><br data-dcnode-id="5064"><img class="gr-hostedUserImg" data-dcnode-id="5063" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1443120378i/16320448.jpg&amp;raw"><br data-dcnode-id="5062"><br data-dcnode-id="5061"><br data-dcnode-id="5060"><br data-dcnode-id="5059"><span data-dcnode-id="5058" instrument_node="">What an extraordinary read it is when one book is as action packed as thirty riveting novels. And if it also contains rich and erudite disquisitions and is narrated in a language as clear and flowing as water from a spring, then the volume must be given a preferential place in one’s library.</span><br data-dcnode-id="5057"><br data-dcnode-id="5056"><span data-dcnode-id="5055" instrument_node="">I am not too keen of including quotes in my reviews. But given the amount of material that marshals in front of one’s eyes, as colorful as overwhelming pageants and breathtaking jousts, and as dense as the tightly woven wefts and warps of a tapestry, there is no way I could attempt to give a glimpse with my own words of what Barbara Tuchman has achieved with this book.</span><br data-dcnode-id="5054"><br data-dcnode-id="5053"><br data-dcnode-id="5052"><img class="gr-hostedUserImg" data-dcnode-id="5051" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1443119980i/16320420._SX540_.jpg&amp;raw"><br data-dcnode-id="5050"><br data-dcnode-id="5049"><br data-dcnode-id="5048"><br data-dcnode-id="5047"><span data-dcnode-id="5046" instrument_node="">But before I present the quote, I would like to draw attention to how shrewd Tuchman has been in the choice of her subject. As she explains in her early pages, she set herself to follow one particular character as he lived during a period in history when the actors were on the count of hundreds, and thereby keep one's focus and walk through the maze and the turmoil without getting lost.</span><br data-dcnode-id="5045"><br data-dcnode-id="5044"><br data-dcnode-id="5043"><img class="gr-hostedUserImg" data-dcnode-id="5042" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1443120378i/16320449._SY540_.jpg&amp;raw"><br data-dcnode-id="5041"><br data-dcnode-id="5040"><br data-dcnode-id="5039"><b data-dcnode-id="5037"><span data-dcnode-id="5038" instrument_node="">Enguerrand de Coucy VII</span></b><span data-dcnode-id="5036" instrument_node=""> was a member of the French nobility at a time when ‘French’ could also mean ‘English’. Enguerrand in fact acted as both French and English as he had acquired double allegiance: to his own King and to the King and father of his wife. And this he did when the two Kingdoms were at war; a war that would last for over one hundred years. Opportunely Enguerrrand is well documented by one of the most striking chroniclers of the time, </span><b data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">Jean Froissart</span></b><span data-dcnode-id="5033" instrument_node="">. As nothing had been written about him in English before Tuchman, she had found a gold vein for her research and pen to exploit.</span><br data-dcnode-id="5032"><br data-dcnode-id="5031"><br data-dcnode-id="5030"><img class="gr-hostedUserImg" data-dcnode-id="5029" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1426678134i/14077946._SX540_.jpg&amp;raw"><br data-dcnode-id="5028"><br data-dcnode-id="5027"><br data-dcnode-id="5026"><span data-dcnode-id="5025" instrument_node="">Here stops my explanation. It is time now for the quote. This passage is better than an the Index to offer a glimpse to that Distant Mirror that Tuchman has approached to us for our close examination. </span><br data-dcnode-id="5024"><br data-dcnode-id="5023"><br data-dcnode-id="5022"><blockquote data-dcnode-id="5017"><span data-dcnode-id="5021" instrument_node="">
</span><i data-dcnode-id="5019"><span data-dcnode-id="5020" instrument_node="">Since he (Enguerrad de Coucy) had first marched at fifteen against the English, and at eighteen hunted down the Jacquerie, the range of Coucy’s experience had extended over an extraordinary variety of combat, diplomacy, government, and social and political relationships. As son-in-law of Edward III, holding double allegiance to two kings at war, his position had been unique. He had seen war as captain or one of the to command in eleven campaigns—in Piedmont, Lombardy, Switzerland, Normandy, Languedoc, Tuscany, northern France, Flanders, Guelders, Tunisia, Genoa; he had commanded mercenaries, and fought as ally or antagonist of the Count of Savoy, Gregory XI, Hawkwood, the Visconti, the Hapsburgs, the Swiss, Navarrese, Gascons, English, Berbers, the Republic of Florence, and nobles of Genoa. As diplomat he had negotiated with Pope Clement VII, the Duke of Brittany, the Count of Flanders, the Queen of Aragon, with the English at peace parleys, and the rebels of Paris. He had had one temperamental and extravagant wife eight years his senior, and a second approximately thirty years his junior. He had served as adviser and agent of the two royal Dukes, Anjou and Orléans, as Lieutenant–General of Picardy and later of Guienne, as member of the Royal Council, as Grand Bouteiller of France, and had wtice been the preferred choice for a Constable. He had known and dealt with every kind of character from the ultra-wicked Charles of Navarre to the ultra-saintly Pierre de Luxemburg.</span></i><span data-dcnode-id="5018" instrument_node="">
</span></blockquote><br data-dcnode-id="5016"><br data-dcnode-id="5015"><span data-dcnode-id="5014" instrument_node="">If to the above adventures, narrated ever so smoothly, one is to add the excellent studies of various chapters of Material Life in late Medieval Europe, that help us to shorten the Distance of the Mirror and make reflections become what is reflected, then one can begin to imagine the sheer pleasure that this book offers to whoever decides to open up its pages and read it.</span><br data-dcnode-id="5013"><br data-dcnode-id="5012"><br data-dcnode-id="5011"><br data-dcnode-id="5010"><img class="gr-hostedUserImg" data-dcnode-id="5009" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1443120216i/16320441.jpg&amp;raw"><br data-dcnode-id="5008"><br data-dcnode-id="5007"><br data-dcnode-id="5006"><span data-dcnode-id="5005" instrument_node="">As it is often claimed, Tuchman may not be a historian of the academic breed, but in this account she has demonstrated her excellent narrative abilities that many historians and novelists would just love to command as well as she.</span><br data-dcnode-id="5004"><br data-dcnode-id="5003"><br data-dcnode-id="5002"><span data-dcnode-id="5001" instrument_node="">Brilliant.</span></span><span data-dcnode-id="4999" instrument_node="">

</span><a class="reviewDate createdAt right" data-dcnode-id="4936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/887978118%3Fbook_show_action%3Dtrue"><span data-dcnode-id="4937" instrument_node="">Mar 21, 2014</span></a><span data-dcnode-id="4935" instrument_node="">

        rated it
        </span><span class="staticStars notranslate" data-dcnode-id="4922" title="it was amazing"><span class="staticStar p10" data-dcnode-id="4927" size="15x15"><span data-dcnode-id="4928" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="4926" size="15x15"></span><span class="staticStar p10" data-dcnode-id="4925" size="15x15"></span><span class="staticStar p10" data-dcnode-id="4924" size="15x15"></span><span class="staticStar p10" data-dcnode-id="4923" size="15x15"></span></span><span data-dcnode-id="4921" instrument_node="">

</span><span class="readable" data-dcnode-id="4859" id="reviewTextContainer887978118"><span data-dcnode-id="4917" instrument_node="">
</span><span data-dcnode-id="4910" id="freeTextContainer10171142662982868161"><img class="gr-hostedUserImg" data-dcnode-id="4916" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1481327784i/21412215.jpg&amp;raw"><br data-dcnode-id="4915"><br data-dcnode-id="4914"><i data-dcnode-id="4912"><span data-dcnode-id="4913" instrument_node="">A Distant Mirror</span></i><span data-dcnode-id="4911" instrument_node="">r by Barbara W. Tuchman is, on one level, a seven hundred page encyclopedia of the 14th century’s political, military, religious, social, cultural and economic history. Since Ms. Tuchman is a first-rate writer, on still another level, the book is a compelling, personalized account of individual men and women living through these turbulent, disastrous times, especially one Enguerrand de Coucy V11 (1340-1397), a high-ranking noble, heralded as “the most experienced and skillful of </span></span><span data-dcnode-id="4909" instrument_node="">
</span><span data-dcnode-id="4864" id="freeText10171142662982868161" style="display:none"><img class="gr-hostedUserImg" data-dcnode-id="4908" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1481327784i/21412215.jpg&amp;raw"><br data-dcnode-id="4907"><br data-dcnode-id="4906"><i data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">A Distant Mirror</span></i><span data-dcnode-id="4903" instrument_node="">r by Barbara W. Tuchman is, on one level, a seven hundred page encyclopedia of the 14th century’s political, military, religious, social, cultural and economic history. Since Ms. Tuchman is a first-rate writer, on still another level, the book is a compelling, personalized account of individual men and women living through these turbulent, disastrous times, especially one Enguerrand de Coucy V11 (1340-1397), a high-ranking noble, heralded as “the most experienced and skillful of all the knights of France”. The focus on Lord Coucy is supremely appropriate since this nobleman repeatedly pops up as a prime player in many of the century’s key events.</span><br data-dcnode-id="4902"><br data-dcnode-id="4901"><span data-dcnode-id="4900" instrument_node="">The 14th century witnessed ongoing devastation, including the little ice age, the hundred years’ war, the papal schism, the peasant’s revolt and, most dramatically, the black death of 1348-1350, which depopulated Europe by as much as half. Ms. Tuchman’s book covers it all in twenty-seven chapters, chapter with such headings as </span><i data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">Decapitated France: The Bourgeois Rising and the Jacquerie</span></i><span data-dcnode-id="4897" instrument_node="">, </span><i data-dcnode-id="4895"><span data-dcnode-id="4896" instrument_node="">The Papal Schism</span></i><span data-dcnode-id="4894" instrument_node="">, </span><i data-dcnode-id="4892"><span data-dcnode-id="4893" instrument_node="">The Worms of the Earth Against the Lions</span></i><span data-dcnode-id="4891" instrument_node=""> and </span><i data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">Dance Macabre</span></i><span data-dcnode-id="4888" instrument_node="">.</span><br data-dcnode-id="4887"><br data-dcnode-id="4886"><span data-dcnode-id="4885" instrument_node="">Many pages are filled with the color and morbidity of the times. By way of example, here is one memorable happening where the French Queen gave a masquerade to celebrate the wedding of a twice widowed lady-in-waiting: six young noblemen, including the King who recently recovered from a bout of madness, disguised themselves as wood savages and entered the masked ball making lewd gestures and howling like wolves as they paraded and capered in the middle of the revelers. When one of the noble spectators came too close with his torch, a spark fell and a few moments later the wood savages, with the exception of the King, were engulfed in flames. Afterwards, the French populace was horrified by this ghastly tragedy, a perverse playing on the edge of madness and death nearly killing their King.</span><br data-dcnode-id="4884"><img class="gr-hostedUserImg" data-dcnode-id="4883" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1481328007i/21412227._SX540_.jpg&amp;raw"><br data-dcnode-id="4882"><br data-dcnode-id="4881"><span data-dcnode-id="4880" instrument_node="">And here is what the author has to say about the young man who concocted the wood savage idea, “The deviser of the affair “cruelest and most insolent of men,” was one Huguet de Guisay, favored in the royal circle for his outrageous schemes. He was a man of “wicked life” who “corrupted and schooled youth in debaucheries,” and held commoners and the poor in hatred and contempt. He called them dogs, and with blows of sword and whip took pleasure in forcing them to imitate barking. If a servant displeased him, he would force the man to lie on the ground and, standing on his back, would kick him with spurs, crying, “Bark, dog!” in response to his cries of pain.” All of the chapters are chock full with such sadistic and violent sketches.</span><br data-dcnode-id="4879"><br data-dcnode-id="4878"><span data-dcnode-id="4877" instrument_node="">Speaking of the populate, there is plenty of detail on the habits and round of daily life of the common people. And, of course, there is a plethora of detail on the lives of the upper classes. Here is a snippet of one description: “In the evening minstrels played with lutes and harps, reed pipes, bagpipes, trumpets, kettle drums, and cymbals. In the blossoming of secular music as an art in the 14th century, as many as thirty-six different instruments had come into use. If no concert or performance was scheduled after the evening meal, the company entertained each other with song and conversation, tales of the day’s hunting, “graceful questions” on the conventions of live, and verbal games.” </span><br data-dcnode-id="4876"><br data-dcnode-id="4875"><span data-dcnode-id="4874" instrument_node="">As in any age, it makes for more comfortable living being at the top rather than at the bottom of the social scale. And all those musical instruments speak volumes about how the 14th century was a world away from the plainchant of the early middle ages. In a way, the 14th century musical avant-garde fit in well with the fashions of the times: extravagant headdresses, multicolored, bejeweled jackets and long pointed shoes. For those who had the florins, overindulgence was all the rage.</span><br data-dcnode-id="4873"><img class="gr-hostedUserImg" data-dcnode-id="4872" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1481328617i/21412333._SX540_.jpg&amp;raw"><br data-dcnode-id="4871"><br data-dcnode-id="4870"><br data-dcnode-id="4869"><span data-dcnode-id="4868" instrument_node="">Ms. Tuchman offers ongoing commentary: for example, regarding military engagement, she cites how the 14th century nobility was too wedded to the idea of glory and riding horses on the battlefield to be effective against the new technology of the long-bow and foot soldiers with pikes. And here is a general, overarching comment about the age, “The times were not static. Loss of confidence in the guarantors of order opened the way to demands for change, and miseria gave force to the impulse. The oppressed were no longer enduring but rebelling, although, like the bourgeois who tried to compel reform, they were inadequate, unready, and unequipped for the task.” Indeed, reading about 14th century economic upheaval one is reminded of Karl Marx’s scathing observations four hundred years later.</span><br data-dcnode-id="4867"><br data-dcnode-id="4866"><span data-dcnode-id="4865" instrument_node="">On a personal note, my primary interests are literature and philosophy; I usually do not read history. However, if I were to recommend one history book, this is the book. Why? Because Ms. Tuchman’s work is not only extremely well written and covers many aspects of the period’s art, music, literature, religion and mysticism, but the turbulent, transitional 14th century does truly mirror our modern world. Quite a time to be alive.</span></span><span data-dcnode-id="4863" instrument_node="">

</span><span data-dcnode-id="4743" id="freeText13465448191962979343" style="display:none"><span data-dcnode-id="4756" instrument_node="">A vivid and detailed look into a lost world. The major players are The Black Death, The Hundred Years War, the sick, uproarious joke of chivalric valor, The Papal Schism, ruinous taxation, serfdom, petty feudal institutions, the utter absence of reason, murderous vengeance, horrendous peculation, brigandry, subjection of women, endless cruelty of mankind, crusade against the "infidel," and so on. A GR friend said that he was disappointed in this book because it did not offer the narrow focus and sleek thematic underpinnings of Tuchman's </span><a data-dcnode-id="4754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/10302.The_March_of_Folly_From_Troy_to_Vietnam" rel="nofollow noopener" title="The March of Folly From Troy to Vietnam by Barbara W. Tuchman"><span data-dcnode-id="4755" instrument_node="">The March of Folly</span></a><span data-dcnode-id="4753" instrument_node="">. I see his point. It should be noted, however, that </span><i data-dcnode-id="4751"><span data-dcnode-id="4752" instrument_node="">Folly</span></i><span data-dcnode-id="4750" instrument_node=""> is a very different kind of book. </span><i data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">Folly</span></i><span data-dcnode-id="4747" instrument_node=""> is a deft study of the almost systematic loss of rational method leaders experience once they are dazzled by the trappings of ultimate power. </span><i data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">A Distant Mirror</span></i><span data-dcnode-id="4744" instrument_node=""> brings before the reader an almost encyclopedic survey of the late Middle Ages. Reading it is like being in thrall to an endless film loop of natural disasters, pitiless murders, and roadside accidents. Tuchman brings order to this concatenation of relentless self-woundings so that try as we might we cannot look away. If there is only one book you read on the Middle Ages it might be this one. It is not for the squeamish or those afraid of the dark. It is not a light beach- or inflight-read. Highly recommended.</span></span><span data-dcnode-id="4742" instrument_node="">

</span><span data-dcnode-id="4550" id="freeTextContainer8020177098396543405"><span data-dcnode-id="4557" instrument_node="">My interest in medieval times is not incredibly strong; it is, in fact, relegated mostly to the hope of someday going to a Medieval Times restaurant. I’ve read Ken Follett’s two Kingsbridge novels, and I’ve been to a few Renaissance Fairs in my time (and eaten more than my share of child-sized turkey legs), but beyond that, I’ve never cared much about the Middle Ages. </span><br data-dcnode-id="4556"><br data-dcnode-id="4555"><span data-dcnode-id="4554" instrument_node="">I read Barbara Tuchman’s </span><i data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">A Distant Mirror: The Calamitous 14th Century</span></i><span data-dcnode-id="4551" instrument_node=""> not for its subject matter, but because Tuchman wrote it. </span></span><span data-dcnode-id="4549" instrument_node="">
</span><span data-dcnode-id="4487" id="freeText8020177098396543405" style="display:none"><span data-dcnode-id="4548" instrument_node="">My interest in medieval times is not incredibly strong; it is, in fact, relegated mostly to the hope of someday going to a Medieval Times restaurant. I’ve read Ken Follett’s two Kingsbridge novels, and I’ve been to a few Renaissance Fairs in my time (and eaten more than my share of child-sized turkey legs), but beyond that, I’ve never cared much about the Middle Ages. </span><br data-dcnode-id="4547"><br data-dcnode-id="4546"><span data-dcnode-id="4545" instrument_node="">I read Barbara Tuchman’s </span><i data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">A Distant Mirror: The Calamitous 14th Century</span></i><span data-dcnode-id="4542" instrument_node=""> not for its subject matter, but because Tuchman wrote it. The winner of two Pulitzer Prizes and a National Book Award, Tuchman was one of the great author/historians of her time, or any time. Her name on the cover demands attention. While </span><i data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">A Distant Mirror</span></i><span data-dcnode-id="4539" instrument_node=""> didn't turn me into an expert in making barley bread or choosing the right kind of alligator for your castle moat, it was nevertheless an utterly fascinating read. </span><br data-dcnode-id="4538"><br data-dcnode-id="4537"><span data-dcnode-id="4536" instrument_node="">Tuchman’s focus on the 14th Century began with an interest in the Black Death of 1348-1350, which she states killed an estimated one-third of the people “living between India and Iceland.” As she explains in the Forward, Tuchman initially wanted to study the effects of such a disaster on society. In researching the answer to that question, her interest grew to include the entirety of the 1300s, “a violent, tormented, bewildered, suffering and disintegrating age.” </span><br data-dcnode-id="4535"><br data-dcnode-id="4534"><span data-dcnode-id="4533" instrument_node="">Certainly there was no shortage of turmoil and strife. There was the aforementioned Black Death – the bubonic plague – that caused pus-and-blood-filled buboes (inflamed lymph nodes) to appear on the groin, neck, and armpit. Millions of people died in this, one of the deadliest pandemics in human history. There was constant war between England and France, part of the so-called Hundred Years’ War, which ravaged the countryside and depleted tax bases. There was a Papal Schism, with three men simultaneously claiming that tall white hat. And to cap things off, in 1396, the Ottomans put a decisive end to the Crusade of Nicopolis. </span><br data-dcnode-id="4532"><br data-dcnode-id="4531"><span data-dcnode-id="4530" instrument_node="">To get an idea of the eventfulness of the 14th Century, let’s take a brief look at the Battle of Poitiers in 1356. It pitted the English forces under Edward, the Black Prince, and the French under King John. The English won, and furthermore, captured King John, decapitating the French monarchy. In John’s absence, the bourgeois rose in France, and the Third Estate attempted to establish constitutional control. Meanwhile, mercenary “free companies” scoured the land, plundering and burning. It’s all the bad parts of Westeros, except there are no dragons coming to the rescue. (Conversely, I suppose, there were no dragons to make things worse). All this takes place in just two chapters (out of 27). </span><br data-dcnode-id="4529"><br data-dcnode-id="4528"><span data-dcnode-id="4527" instrument_node="">Tuchman presents her material with a mixture of thematic sections and chronological sections. Parts of the book are pure overview, touching on what it was like to live during the 14th Century. She describes the lives of peasants and knights and lords; she describes their faith; their clothing; their jobs; their sexual practices (apparently the chastity belt “rests on only the faintest factual support”). The writing is brilliant. Descriptive, alive, witty, and engaging. Take, for instance, her portrait of the peasant:</span><br data-dcnode-id="4526"><br data-dcnode-id="4525"><blockquote data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">What was this peasant who supported the three estates on his back, this bent Atlas of the medieval world…Snub-nosed and rough in belted tunic and long hose, he can be seen in carved stone medallions and illuminated pages representing the twelve months, sowing from a canvas seed bag around his neck, scything hay bare-legged in summer’s heat in loose blouse and straw hat, trampling grapes in a wooden vat, shearing sheep held between his knees, herding swine in the forest, tramping through the snow in hood and sheepskin mantle with a load of firewood on his back, warming himself before a fire in a low hut in February. Alongside him in the fields the peasant woman binds sheaves wearing a skirt caught up at the belt to free her legs and a cloth head-covering instead of a hat.</span></blockquote><br data-dcnode-id="4522"><br data-dcnode-id="4521"><span data-dcnode-id="4520" instrument_node="">Or try this description of the food at a sumptuous wedding: </span><br data-dcnode-id="4519"><br data-dcnode-id="4518"><blockquote data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">The meats and fish, all gilded, paired suckling pigs with crabs, hares with pike, a whole calf with trout, quails and partridges with more trout, ducks and herons with carp, beef and capons with sturgeon, veal and capons with carp in lemon sauce, beef pies and cheese with eel pies, meat aspic with fish aspic, meat galantines with lamprey, and among the remaining courses, roasted kid, venison, peacocks with cabbage, French beans and pickled ox-tongue, junkets and cheese, cherries and other fruit.</span></blockquote><br data-dcnode-id="4515"><br data-dcnode-id="4514"><span data-dcnode-id="4513" instrument_node="">I think I hear George R.R. Martin’s tummy grumbling!</span><br data-dcnode-id="4512"><br data-dcnode-id="4511"><span data-dcnode-id="4510" instrument_node="">The overview sections were my favorite, because I’m more interested in the essence of the 14th Century than in the timeline. That said, her chronological sections are just as engaging, displaying her rare gift for giving life to people who lived hundreds of years ago. In order to anchor her narrative, Tuchman chose a central figure to follow. This man is Enguerrand de Coucy VII. He is like Sean Patrick Flanery in </span><i data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">The Young Indiana Jones Chronicles</span></i><span data-dcnode-id="4507" instrument_node="">, showing up and playing a role in a remarkable number of landmark 14th Century events. Tuchman took pains in choosing him, because she wanted:</span><br data-dcnode-id="4506"><br data-dcnode-id="4505"><blockquote data-dcnode-id="4500"><span data-dcnode-id="4504" instrument_node="">[N]ot a king or queen, because everything about such persons is </span><i data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">ipso facto</span></i><span data-dcnode-id="4501" instrument_node=""> exceptional, and besides, they are overused; nor a commoner, because commoners’ lives in most cases did not take in the wide range that I wanted; nor a cleric or saint, because they are outside the limits of my comprehension; nor a woman, because any medieval woman whose life was adequately documented would be atypical.</span></blockquote><br data-dcnode-id="4499"><br data-dcnode-id="4498"><span data-dcnode-id="4497" instrument_node="">The knock on Tuchman is that she is not a medievalist. That is, she has not devoted her life to getting someone to pay her think about Ye Olden Days. She has been criticized, for among other things, using secondary sources and relying on poor translations. Though I respect the hell out of dogged, elbow-patched professors digging through dusty primary sources, I can’t help but believe that most of this criticism is a mark of Tuchman’s commercial success. Medievalists tend to take themselves rather seriously, so it’s fairly easy to ignore their sniffing (and their dry monographs). If I’m going to have surgery, yes, I want a trained surgeon to do the cutting. But writing about medieval times is not surgery. I feel quite comfortable having a polished writer and historian – if not an expert – guide me through the subject. </span><br data-dcnode-id="4496"><br data-dcnode-id="4495"><span data-dcnode-id="4494" instrument_node="">Tuchman wrote this book – as the title implies – to compare the catastrophes of the 20th Century with those of the 14th. Her book is an elegant way of saying that in times like these, it’s helpful to remember there have always been times like these. And despite the many sorrows of the 14th Century, Tuchman is keen to remind us – at several points in her story – that for most people, life went on as usual. </span><br data-dcnode-id="4493"><br data-dcnode-id="4492"><i data-dcnode-id="4490"><span data-dcnode-id="4491" instrument_node="">A Distant Mirror</span></i><span data-dcnode-id="4489" instrument_node=""> is thoroughly engaging and consistently excellent reading. It creates its own energy; that is, is got me revved about a subject I never really cared about. Tuchman was a special writer, with that magical ability to make the past feel like the present. Critics have called her out on her anachronisms, but I don’t think it’s anachronistic to recognize that even though these people are distant, they were still human, and in that way, closer to us than we realize. </span><br data-dcnode-id="4488"></span><span data-dcnode-id="4486" instrument_node="">

</span><span data-dcnode-id="4381" id="freeTextContainer17908490827261080044"><span data-dcnode-id="4388" instrument_node="">I was a little worried at the start that 600 pages of 14th century history might be, shall we say, </span><i data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node=""> a bit too much</span></i><span data-dcnode-id="4385" instrument_node="">. There is no denying the book is long and very detailed and at times it was a struggle, but every time I was about to give up after yet another pointless battle Tuchman would come up with a telling detail or surprising insight. </span><br data-dcnode-id="4384"><br data-dcnode-id="4383"><span data-dcnode-id="4382" instrument_node="">Example: the invention of chimneys in the 14th century made separate bedrooms possible and introduced notions of privacy that had never before been possible </span></span><span data-dcnode-id="4380" instrument_node="">
</span><span data-dcnode-id="4208" id="freeText17908490827261080044" style="display:none"><span data-dcnode-id="4379" instrument_node="">I was a little worried at the start that 600 pages of 14th century history might be, shall we say, </span><i data-dcnode-id="4377"><span data-dcnode-id="4378" instrument_node=""> a bit too much</span></i><span data-dcnode-id="4376" instrument_node="">. There is no denying the book is long and very detailed and at times it was a struggle, but every time I was about to give up after yet another pointless battle Tuchman would come up with a telling detail or surprising insight. </span><br data-dcnode-id="4375"><br data-dcnode-id="4374"><span data-dcnode-id="4373" instrument_node="">Example: the invention of chimneys in the 14th century made separate bedrooms possible and introduced notions of privacy that had never before been possible in Northern Europe and so she wove her web again, catching me for another hundred pages. There are so many wonderful reviews of this book on Goodreads that I’ll just highlight a few things that struck me as I was reading this masterpiece.</span><br data-dcnode-id="4372"><span data-dcnode-id="4371" instrument_node=""> </span><br data-dcnode-id="4370"><b data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">The Black Death</span></b><br data-dcnode-id="4367"><br data-dcnode-id="4366"><span data-dcnode-id="4365" instrument_node="">About only thing I knew about the 14th century when I started this book was that this was when the bubonic plague spread across Europe from Asia and I only knew this because I’ve read Connie Willis’ superb </span><a data-dcnode-id="4363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/24983.Doomsday_Book__Oxford_Time_Travel___1_" rel="nofollow noopener" title="Doomsday Book (Oxford Time Travel, #1) by Connie Willis"><span data-dcnode-id="4364" instrument_node="">Doomsday Book</span></a><span data-dcnode-id="4362" instrument_node=""> in which a time-traveling historian gets stuck in 1348.</span><br data-dcnode-id="4361"><br data-dcnode-id="4360"><span data-dcnode-id="4359" instrument_node="">One of the surprises for me was that the plague died down and recurred more than once throughout the terrible century “The Black Death returned for the fourth time in 1388-90. Earlier recurrences had affected chiefly children who had not acquired immunity, but in the fourth round a new adult generation fell under the swift contagion. By this time Europe’s population was reduced to between 40 and 50 percent of what it had been when the century opened.”</span><br data-dcnode-id="4358"><br data-dcnode-id="4357"><span data-dcnode-id="4356" instrument_node="">If you want to know what happened during the plague and why, and what it meant read A Distant Mirror. If you want to know what it </span><i data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">felt</span></i><span data-dcnode-id="4353" instrument_node=""> like read the </span><a data-dcnode-id="4351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/24983.Doomsday_Book__Oxford_Time_Travel___1_" rel="nofollow noopener" title="Doomsday Book (Oxford Time Travel, #1) by Connie Willis"><span data-dcnode-id="4352" instrument_node="">Doomsday Book</span></a><span data-dcnode-id="4350" instrument_node="">. Better yet, read them both.</span><br data-dcnode-id="4349"><br data-dcnode-id="4348"><b data-dcnode-id="4346"><span data-dcnode-id="4347" instrument_node="">The Hundred Years War</span></b><br data-dcnode-id="4345"><br data-dcnode-id="4344"><span data-dcnode-id="4343" instrument_node="">Could there be anything more horrifying than the Black Death? Well, yes, actually. Chapter 6 tells the story of the start of the war between France and England that would last for a hundred years. There were more than a few idiots, but no heroes, no chivalrous knights, just ugly opportunists laying waste to their own countryside, killing for no reason, looting, and burning towns to the ground.</span><br data-dcnode-id="4342"><br data-dcnode-id="4341"><span data-dcnode-id="4340" instrument_node="">In fact, death in every form (famine, war, disease) stalked the 14th century and death personified as a pale horseman or as a hawk-like old hag, was a recurrent image in the art and literature of the era.</span><br data-dcnode-id="4339"><img class="gr-hostedUserImg" data-dcnode-id="4338" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1423237729i/13599576._SY540_.jpg&amp;raw"><br data-dcnode-id="4337"><br data-dcnode-id="4336"><b data-dcnode-id="4334"><span data-dcnode-id="4335" instrument_node="">Mercenary Bands</span></b><br data-dcnode-id="4333"><br data-dcnode-id="4332"><span data-dcnode-id="4331" instrument_node="">England and France were not always fighting. So what was an unemployed knight to do? “Left unemployed by the truce the [mercenary] companies reverted to plundering the people they lately liberated." </span><br data-dcnode-id="4330"><br data-dcnode-id="4329"><span data-dcnode-id="4328" instrument_node="">One truce with England was immediately followed by six weeks of plunder. Forty villages were robbed and wrecked, inhabitants killed or raped, monasteries and convents burned to the ground. One French nobleman, the Sire de Coucy who plays a central role in the book, tried to rein them in, hanging culprits daily, but against “men habituated to lawless force punishment failed to bring the violence under control.”</span><br data-dcnode-id="4327"><br data-dcnode-id="4326"><span data-dcnode-id="4325" instrument_node="">Charles V who succeeded to the throne of France in 1364 developed a fairly effective strategy for dealing with the mercenaries, the </span><i data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">tarde venus</span></i><span data-dcnode-id="4322" instrument_node="">--pack them off to fight still more foreign wars! Repeated spasms of the Hundred Years War, a war in Italy, then more Papal wars, then war against the Berbers, and finally a last bloody Crusade would provide employment and plunder for these rapacious bands--and for some a fitting end. </span><br data-dcnode-id="4321"><br data-dcnode-id="4320"><b data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">Knights in Armor</span></b><br data-dcnode-id="4317"><br data-dcnode-id="4316"><span data-dcnode-id="4315" instrument_node="">This aspect of medieval times fascinated me as a child; at New York’s Metropolitan Museum of Art my favorite exhibit was the knights on their great chargers.</span><br data-dcnode-id="4314"><img class="gr-hostedUserImg" data-dcnode-id="4313" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1425308502i/13874526.jpg&amp;raw"><span data-dcnode-id="4312" instrument_node=""> </span><br data-dcnode-id="4311"><br data-dcnode-id="4310"><span data-dcnode-id="4309" instrument_node="">But by the 14th century the international code of chivalry was breaking down and the armor and horses were proving surprisingly vulnerable to such innovations as the long bow. Not to mention the fact that many of the knights were far from chivalrous. New strategies were called for. </span><br data-dcnode-id="4308"><br data-dcnode-id="4307"><span data-dcnode-id="4306" instrument_node="">Slowly, novel approaches towards war were developed. For the aborted 1348 French invasion of England, the French packed a vast prefab camp with numbered panels. “For belligerent purposes, the 14th century, like the 20th, commanded a technology more sophisticated than the mental and moral capacity that guided its use.” </span><br data-dcnode-id="4305"><br data-dcnode-id="4304"><span data-dcnode-id="4303" instrument_node="">There were a handful of sensible strategists and innovators: "It was in truth the non-chivalric qualities of two hard-headed characters, Du Guescline and Charles V, that brought France back from ruin.” </span><br data-dcnode-id="4302"><br data-dcnode-id="4301"><span data-dcnode-id="4300" instrument_node="">But old ways and old knights die hard. The final Crusade against the Turks at the end of the 14th century was on balance a catastrophe. "The crusaders of 1396 started out with a strategic purpose in the expulsion of the Turks from Europe, but their minds were on something else. The young men...born since the Black Death and Poitiers and the nadir of French fortunes, harked back to the pursuit of those strange bewitchment, honor and glory. They thought only of being in the vanguard, to the exclusion of tactical plan and common sense...." </span><br data-dcnode-id="4299"><br data-dcnode-id="4298"><b data-dcnode-id="4296"><span data-dcnode-id="4297" instrument_node="">Pageantry and the Arts</span></b><span data-dcnode-id="4295" instrument_node=""> </span><br data-dcnode-id="4294"><br data-dcnode-id="4293"><span data-dcnode-id="4292" instrument_node="">Not all was grim. For some, the century was a time of plenty—a time when the arts were reborn and new secular themes were suddenly and surprisingly in vogue.</span><br data-dcnode-id="4291"><br data-dcnode-id="4290"><span data-dcnode-id="4289" instrument_node="">“Ostentation and pageantry...was traditionally the habit of princes. But now in the second half of the 14th century it went to extremes as if to defy the increased uncertainty of life. Conspicuous consumption became a frenzied excess, a gilded shroud over the Black Death and lost battles, a desperate desire to show oneself fortunate in a time of advancing misfortune." </span><br data-dcnode-id="4288"><img class="gr-hostedUserImg" data-dcnode-id="4287" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1423237097i/13599521._SY540_.jpg&amp;raw"><br data-dcnode-id="4286"><br data-dcnode-id="4285"><span data-dcnode-id="4284" instrument_node="">"Charles V's three brothers were all compulsively acquisitive...Each put his own interests above the kingdom's each was given to conspicuous consumption...and each was to produce unsurpassed works of art: The Apocalypse series of tapestries for Anjou; the Tres Riches Heures and Belles Heures illuminated for Berry; and the statues of the Well of Moses and the Mourners for Burgundy."</span><br data-dcnode-id="4283"><br data-dcnode-id="4282"><span data-dcnode-id="4281" instrument_node="">"Men and women hawked and hunted and carried a favorite falcon, hooded, on the wrist wherever they went, indoors or out--to church, to the assizes, to meals. On occasion huge pastries were served from which live birds were released to be caught by hawks unleashed in the banquet hall."</span><br data-dcnode-id="4280"><br data-dcnode-id="4279"><span data-dcnode-id="4278" instrument_node="">"In the evening minstrels played with lutes and harps, reed pipes, bagpipes, trumpets, kettle drums, and cymbals. “ Poetry, story-telling and drama were all wildly popular. Literature, written for the first time in the vernacular by masters from Dante to Chaucer, flowered; all was ready for the great leap to print in the next century.</span><br data-dcnode-id="4277"><br data-dcnode-id="4276"><b data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">The Papal Schism and Religious Reformation</span></b><br data-dcnode-id="4273"><br data-dcnode-id="4272"><span data-dcnode-id="4271" instrument_node="">The 14th century was a time of innovative and sometimes bizarre religious practices, prompted in part by the horrors of plague and wars but also by the Papal schism.	</span><br data-dcnode-id="4270"><span data-dcnode-id="4269" instrument_node=""> </span><br data-dcnode-id="4268"><span data-dcnode-id="4267" instrument_node="">"Of all the strange evils and adversities of the 14th century the effect of the Papal schism on the public mind was among the most damaging. When each Pope excommunicated the followers of the other, who could be sure of salvation? Every Christian found himself under penalty of damnation by one or the other Pope, with no way of being sure that the sacraments of their priest were valid or a sacrilege."</span><br data-dcnode-id="4266"><br data-dcnode-id="4265"><span data-dcnode-id="4264" instrument_node="">Mystical sects thrived (some of them seriously weird). On the more practical front some, including a notable number of women, banded together to form communities—lay religious orders like the Beguines that provided not only spiritual solace and a chance to do good but also a not inconsiderable degree of protection and autonomy. </span><br data-dcnode-id="4263"><br data-dcnode-id="4262"><span data-dcnode-id="4261" instrument_node="">Left without solace, without guidance, it must have seemed to far too many ordinary people that there was nowhere sacred to turn. Scientific knowledge was growing, but “could not dispel the sense of a malign influence upon the times. As the century entered its last quarter, the reality and power of demons and witches became a common belief….Women turned to sorcery for the [some of the] same reasons they turned to mysticism. In Paris in 1390 a woman whose lover had jilted her was tried for taking revenge by employing the magical powers of another woman to render him impotent. Both were burned at the stake.” </span><br data-dcnode-id="4260"><br data-dcnode-id="4259"><span data-dcnode-id="4258" instrument_node="">Among the clergy there were those who became obsessed with witchcraft, demonology and heresy—fueling the fires of the Inquisition. Yet at the same time a novel view of religion was emerging; a vision that empowered the individual’s search for God and meaning. The Bible was translated into the vernacular for the first time. Wyclif and others were challenging the power of the clerics. The Protestant Reformation of the 16th century was a natural consequence of default by the Church in the 14th—and the desperate searching of those who felt abandoned by both divine and earthly powers.</span><br data-dcnode-id="4257"><br data-dcnode-id="4256"><b data-dcnode-id="4254"><span data-dcnode-id="4255" instrument_node="">Peasant and Middle Class Uprisings</span></b><br data-dcnode-id="4253"><br data-dcnode-id="4252"><span data-dcnode-id="4251" instrument_node="">Charles V of France succeeded for a time in his war aims against England, but at the cost of a ravaged and exhausted country. Punishing taxes and mercenary bands oppressed the ordinary peasants and the growing middle class. The stage was set for rebellion. </span><br data-dcnode-id="4250"><span data-dcnode-id="4249" instrument_node=""> </span><br data-dcnode-id="4248"><span data-dcnode-id="4247" instrument_node="">Tuchman always knows how to give a nuanced view. In the chapter entitled 'The Worms of the Earth Against the Lions' I was just about to cheer wholeheartedly for the weavers of Ghent until I read of the way they in turn oppressed the lower class fullers; and my sympathy was with commoners of Anjou demanding tax relief until "In a frenzy of triumph and unspent wrath, the people rushed to rob and assault the Jews, the one section of society upon whom the poor could safely vent their aggression.”</span><br data-dcnode-id="4246"><br data-dcnode-id="4245"><span data-dcnode-id="4244" instrument_node="">By the late 1380s defeats in battle, widespread economic malaise, and disenchantment with government had seized Europe. Both England and France were ruled by minors and prey to factions, but the seeds of effective rebellion and reform would lie dormant for many decades more. </span><br data-dcnode-id="4243"><br data-dcnode-id="4242"><b data-dcnode-id="4240"><span data-dcnode-id="4241" instrument_node="">Ordinary Life</span></b><br data-dcnode-id="4239"><br data-dcnode-id="4238"><span data-dcnode-id="4237" instrument_node="">Tuchman’s ability to paint vivid pictures of a far-away time and place is astonishing. Often, I felt that, like Connie Willis’ time traveler, I had suddenly </span><i data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">arrived</span></i><span data-dcnode-id="4234" instrument_node="">, transported through the distant mirror….</span><br data-dcnode-id="4233"><br data-dcnode-id="4232"><span data-dcnode-id="4231" instrument_node="">In a dangerous world night was not a time to be abroad. Even in Paris in the 14th century, “At sundown the curfew bell rang for closing time, work ceased, shops were shuttered, silence succeeded bustle. At eight o'clock, when the Angelus bell signaled bedtime, the city was in darkness. Only the crossroads were lit by flickering candle or lamp placed in a niche holding a stature of Notre Dame or the patron saint of the quarter.”</span><br data-dcnode-id="4230"><br data-dcnode-id="4229"><span data-dcnode-id="4228" instrument_node="">There were also fascinating bits of social history like these:</span><br data-dcnode-id="4227"><br data-dcnode-id="4226"><span data-dcnode-id="4225" instrument_node="">"In everyday life women of noble as well as non-noble class found equality of function, if not of status, thrust on them by circumstances. Peasant women could hold tenancies and in that capacity rendered the same kinds of service for their holdings as men. In the guilds, women had monopolies of certain trades....The chatelaine of a castle more often than not had to manage alone when her husband was away."</span><br data-dcnode-id="4224"><br data-dcnode-id="4223"><span data-dcnode-id="4222" instrument_node="">Although marriage was a sacrament, divorce was frequent and, given the right strings to pull, easily obtained...”lawyers are said to 'make and unmake matrimony to money' and a man might get rid of his wife by giving the judge a fur coat....marriage litigation filled the courts of the Middle Ages.”</span><br data-dcnode-id="4221"><br data-dcnode-id="4220"><span data-dcnode-id="4219" instrument_node="">Who knew? Certainly not me!</span><br data-dcnode-id="4218"><br data-dcnode-id="4217"><b data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">But above all Tuchman’s gifts are her sweeping vision and the poetry of her writing through which we glimpse the wheel of time and human fortunes slowly turning:</span></b><br data-dcnode-id="4214"><br data-dcnode-id="4213"><span data-dcnode-id="4212" instrument_node="">"Yet change as always was taking place….Monarchy, centralized government, the national state gained in strength...Seaborne enterprise liberated by the compass was reaching toward the voyages of discovery that were to burst the confines of Europe….Times were to grow worse over the next fifty odd-years until at some imperceptible moment, by some mysterious chemistry, energies were refreshed, ideas broke out of the mold of the Middle Ages into new realms, and humanity found itself redirected."</span><br data-dcnode-id="4211"><br data-dcnode-id="4210"><span data-dcnode-id="4209" instrument_node="">Four and a half stars, with a half star off because all the battles and political machinations really were a bore, at least for me. Content rating, PG for all the death, destruction, blood and disease.</span></span><span data-dcnode-id="4207" instrument_node="">

</span><span data-dcnode-id="4111" id="freeTextContainer7137330709830531703"><span data-dcnode-id="4112" instrument_node="">My grandmother had this book on her shelf for years and I read it as a kid and loved it. Of course, I knew the King Arthur legends and pretended to be a knight in shining armour like any other young boy, but reading about the insanity of this period, the rage of the Black Death that killed 30-60% of the population of Europe, the grappling for power by the French and English competitors, the epic battles...it was a mind-blower and still is. I visited many of the sites since living here in Paris t</span></span><span data-dcnode-id="4110" instrument_node="">
</span><span data-dcnode-id="4106" id="freeText7137330709830531703" style="display:none"><span data-dcnode-id="4109" instrument_node="">My grandmother had this book on her shelf for years and I read it as a kid and loved it. Of course, I knew the King Arthur legends and pretended to be a knight in shining armour like any other young boy, but reading about the insanity of this period, the rage of the Black Death that killed 30-60% of the population of Europe, the grappling for power by the French and English competitors, the epic battles...it was a mind-blower and still is. I visited many of the sites since living here in Paris that Tuchman mentions in her book and loved having the context to understand why they were standing...or not. An incredibly vibrant and realistic view of this critical and bloody century in Europe.</span><br data-dcnode-id="4108"><span data-dcnode-id="4107" instrument_node="">By the way, I have been up to see the castle of Chaucy which is the epicenter of this book and, unfortunately, there is precious little to see - the chateau was demolished during the World Wars of the 20th C.</span></span><span data-dcnode-id="4105" instrument_node="">

</span><span data-dcnode-id="4015" id="freeTextContainer2747201479607377340"><span data-dcnode-id="4016" instrument_node="">The Four Horsemen had their way in the fourteenth century. Tuchman portrays a brutal decadent European society terrorized and demoralized by the plague, war, violence and deprivation. She focuses on France, England and the Italian city-states from 1350 to 1400. The religious leaders were hypocritical and profane; the aristocracy was arrogant and venal. Kings, nobles, popes and prelates accumulated fantastic wealth at the expense of everyone else for whom it was the worst of times. The century ma</span></span><span data-dcnode-id="4014" instrument_node="">
</span><span data-dcnode-id="3971" id="freeText2747201479607377340" style="display:none"><span data-dcnode-id="4013" instrument_node="">The Four Horsemen had their way in the fourteenth century. Tuchman portrays a brutal decadent European society terrorized and demoralized by the plague, war, violence and deprivation. She focuses on France, England and the Italian city-states from 1350 to 1400. The religious leaders were hypocritical and profane; the aristocracy was arrogant and venal. Kings, nobles, popes and prelates accumulated fantastic wealth at the expense of everyone else for whom it was the worst of times. The century marked the decline of the Roman Catholic Church’s power, the feudal system and the myth of the chivalrous knight.</span><br data-dcnode-id="4012"><br data-dcnode-id="4011"><span data-dcnode-id="4010" instrument_node="">The plague killed 1/3rd of the people of Europe between 1347 and 1350. Thereafter, outbreaks recurred regularly. Those afflicted died agonizing deaths although many succumbed quickly. People became unhinged with most believing God was punishing them. Many scapegoats were targeted. Jews were rounded up and executed or driven off to Eastern Europe. Stories of Jews poisoning wells and killing Christian children for their blood (blood libel) became firmly established. Christians lost faith in the Church as priests too hid in fear or charged exorbitant fees to perform last rites. If God had caused the plague or at least didn’t seem to care, what was the point of the Church? Its vast wealth was resented deeply by many. Pope Clement VI had even started the selling of indulgences. When the plague subsided in 1350 fear was replaced by gloom. A pessimism ensued which would last into the next century.</span><br data-dcnode-id="4009"><br data-dcnode-id="4008"><span data-dcnode-id="4007" instrument_node="">The fight between secular kings and the Papacy was a key conflict of the 14th century. Money and power were at stake. In 1303 King Philip IV of France in conjunction with the anti-papist Italian army captured Pope Boniface VIII, who not surprisingly, soon was dead. Philip felt the many Church fees collected in France were rightfully his. The Pope said Philip was subject to him. The Pope lost. The next Pope, Clement V, set up shop in Avignon and worked hand in glove with Philip. Popes ruled from Avignon from 1307 to 1377 with ever increasing domination by the French kings, which was deeply resented outside of France. </span><br data-dcnode-id="4006"><br data-dcnode-id="4005"><span data-dcnode-id="4004" instrument_node="">Pope Gregory XI returned the papacy to Rome greatly surprising his benefactor, Charles V of France. Gregory shortly thereafter died. The cardinals in Rome elected Urban VI who they believed they could easily control to stay in Rome. Soon they realized he was crazy. They declared it a mistake and elected Clement VII. But Urban wouldn’t quit and soon Clement found it advisable to relocate in Avignon. Now there were two Popes, one in Rome and one in Avignon, with the Christian world split in its support of the two. Thus began the Papal Schism which lasted until 1417 dividing the Christian world. With two Popes issuing orders, selling indulgences and church offices, and with people blessed by one condemned by the other, the legitimacy of the Church was greatly diminished. The Church would never regain its pre-fourteenth century power and prestige. </span><br data-dcnode-id="4003"><br data-dcnode-id="4002"><span data-dcnode-id="4001" instrument_node="">The seeds for the reformation were being sown. In England in the 1370’s and 80’s John Wycliffe began openly criticizing the great wealth and ostentation of the Church and formed a following known as the Lollards who carried his message on after he died. Wycliffe translated the bible into Middle English believing the faithful should approach God directly bypassing the priests. His movement foreshadowed the English break with the Church 150 years later. </span><br data-dcnode-id="4000"><br data-dcnode-id="3999"><span data-dcnode-id="3998" instrument_node="">War between England and France was another key conflict of the fourteenth century. A desire to invade England was one reason Philip needed the church money. But the English King Edward III attacked first. Edward claimed to be the rightful French King but his real goal was to add mainland provinces to his domain. Thus in 1340 began the Hundred Years’ War. The war started badly for the French led by Philip VI with a humiliating defeat at Crecy in 1346. Overconfident French knights charged mindlessly into English infantry whose archers wielded the very effective English longbow. The English longbow with the power to drive heavy arrows accurately came of age at the beginning of the fourteenth century. Much faster to reload than the French crossbow, the longbow proved a decisive advantage, particularly as deployed by the far more organized and disciplined English army. </span><br data-dcnode-id="3997"><br data-dcnode-id="3996"><span data-dcnode-id="3995" instrument_node="">The war continued with another humiliating French defeat. This time Edward III's son, Edward Prince of Wales, faced the French King Jean II at Poitiers in 1356. Again believing in chivalry, Jean used his knights to lead the charge just as Philip VI had done at Crecy with the same result. Jean II was captured and his forces fell apart and scattered. The Prince of Wales took Jean back to England along with other captured nobles and the enormous booty he had seized. Jean and the prisoners were held for ransom. France entered anarchy. In 1357, the merchant class tried but failed to impose its will on the Dauphin, Jean II’s son, with a violent end. Then in 1358 a peasant group, the Jacquerie, led a revolt and after even more carnage and looting they were brutally put down by the nobles. More pillaging, killing, raping and hostage taking ensued from mercenary Free Companies made up of former soldiers, mostly Englishmen who did not want to give up their way of life when the military campaigns ended. Armies of the time lived off the land so these men were used to taking anything and everything they wanted. Brigands from all over Europe joined them and they spread terror all over France, Italy, England and adjacent territories. </span><br data-dcnode-id="3994"><br data-dcnode-id="3993"><span data-dcnode-id="3992" instrument_node="">The free Companies were for hire and employed extensively in the Papal wars in Italy. With the Papacy removed to Avignon, Rome fell into decay. An effective Papal force could not be managed from so far away. Similarly the English could not hold onto the mainland territories they had won by managing them from England. Their conquered subjects began identifying as French in response to the brutal treatment of their English overlords. The Papacy’s location in France exacerbated the English anger against the French. It also diminished the legitimacy of the Church in England. </span><br data-dcnode-id="3991"><br data-dcnode-id="3990"><span data-dcnode-id="3989" instrument_node="">In the years after Charles V death in 1380, France was struck by yet another series of violent revolts led by the merchant class and supported by the peasants sick of high taxes and declining incomes while the rich got richer. The heir, Charles VI was only twelve. The Dukes were in charge and taxed everybody and everything to finance wars to expand their territories. A similar story took place in England where Richard II, only 13 in 1380, was likewise guided by the recently departed Edward III’s relatives. They similarly taxed commoners to the hilt to raise money to acquire new fiefdoms. A huge peasant’s revolt ensued making it all the way to London. Both in France and England the revolts were put down brutally. Throughout the fourteenth century peasants in both France and England were being transformed from serfs to tenant farmers. This transformation from the feudal system enabled the lords to squeeze the peasants mercilessly by charging rents for everything while no longer bearing any responsibility for the peasants’ wellbeing. </span><br data-dcnode-id="3988"><br data-dcnode-id="3987"><span data-dcnode-id="3986" instrument_node="">Another example of the folly of the knight’s search for glory is the Barbary Crusade in 1391. Five thousand mostly French with some English knights encased in their head to toe plate armor attacked the Berber stronghold of Mahdia in Tunisia. The Berbers held fast behind their walls while sending out harassing parties that avoided direct combat. Eventually the knights tired of the suffocating heat gave up and went home. Of course it was the commoners through heavy taxation who as always paid for this ill-conceived effort. At least, the knights might have learned their limits in Mahdia, but they were soon to repeat. This time they were decimated at the hands of the Turks at Nicopolis in 1396. Knights from around Europe took part in this Crusade, again driven by vainglory. While the losses were heavy on both sides, arrogance and overconfidence led to the defeat of the crusaders. Once again the heavy fourteenth century plate armor constricted more than it helped against a disciplined mobile opponent. Although both sides executed prisoners without compunction, the Turks saved important nobles, as was the practice, for ransom. They returned home in humiliation, an appropriate end to their mythical prowess and a disastrous century.</span><br data-dcnode-id="3985"><br data-dcnode-id="3984"><span data-dcnode-id="3983" instrument_node="">The lessons of the fourteenth century were not lost on the monk, Honore Bonet. In his book written in 1387, </span><i data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">The Tree of Battles</span></i><span data-dcnode-id="3980" instrument_node="">, he asked “Whether this world can by nature be without conflict and at peace?” answering “No, it can by no means be so.” The 14th century’s toll of countless wars, rampaging mercenaries, ruthless governance and mindless preoccupation with glory and indulgence of those in power left France and England in serious decline. The killing, dislocation and destruction combined with recurring plague epidemics reduced the population of Europe to half its 1347 count by the end of the century. The tradition of chivalry of the knights was shown to be hollow, the knights themselves to be petty, the Church to be a charade and its leaders self-serving. The Middle Ages were coming to an end as its religious and feudal traditions were undermined. Somehow, miraculously, in the next century the Renaissance was able to spring from this morass. </span><br data-dcnode-id="3979"><span data-dcnode-id="3978" instrument_node=""> </span><br data-dcnode-id="3977"><span data-dcnode-id="3976" instrument_node="">Tuchman’s account of the period is very detailed and a bit daunting to follow. One must take in score after score of kings, nobles, popes, prelates and others and their complex relationships as well as Middle Ages political geography. Tuchman chronicles much more than major events. She carefully crafts pictures of the everyday lives of those at every level of society. These portraits are well done and provide a fascinating look into a time far removed from our own. So despite the unsettling bleakness of the fourteenth century, reading Tuchman’s book is well worth the effort. I could see how the excesses of the fourteenth century set the stage for dramatic changes to follow. </span><i data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">A Distant Mirror</span></i><span data-dcnode-id="3973" instrument_node=""> also provides a sobering frame of reference for the events in our own recent history.</span><br data-dcnode-id="3972"></span><span data-dcnode-id="3970" instrument_node="">

</span><span class="uitext reviewText" data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">medieval history buffs</span></span></div><span data-dcnode-id="3885" instrument_node="">

</span><span data-dcnode-id="3879" id="freeTextContainer17103457764832531280"><span data-dcnode-id="3880" instrument_node="">I'm not quite sure how I came to read this strange and unwieldy book. It just kept popping up in my sights. For a while now, I've had a boyish fascination with the Middle Ages, intensified by a couple of years spent studying Old English in grad school, and nursed along since then with occasional books about the Black Death, the Crusades, castle building, and whatever else seemed interesting to me. Most of what I've read has been deeply thought-provoking, on the one hand, if somewhat tiresome to </span></span><span data-dcnode-id="3878" instrument_node="">
</span><span data-dcnode-id="3870" id="freeText17103457764832531280" style="display:none"><span data-dcnode-id="3877" instrument_node="">I'm not quite sure how I came to read this strange and unwieldy book. It just kept popping up in my sights. For a while now, I've had a boyish fascination with the Middle Ages, intensified by a couple of years spent studying Old English in grad school, and nursed along since then with occasional books about the Black Death, the Crusades, castle building, and whatever else seemed interesting to me. Most of what I've read has been deeply thought-provoking, on the one hand, if somewhat tiresome to read, on the other. Norman Cantor, at his best, is an exception, but even he grows drowsily academic. There are few great writers among medievalists, I've discovered. Steven Runciman, the British historian of the Crusades, is one. But Barbara Tuchman, the author of this book, is in a league entirely of her own.</span><br data-dcnode-id="3876"><br data-dcnode-id="3875"><span data-dcnode-id="3874" instrument_node="">Maybe that's because she wasn't a traditional medievalist. Tuchman was an amateur historian, unaffiliated with any academic institution. She was a writer, first and foremost, who produced gigantic, painstakingly crafted books on a wide variety of subjects. Her history of the events leading up to World War I, "The Guns of August," earned her the first of two Pulitzer Prizes. (Just added to my "to read" list.) From the moment I started in on this hefty 600-pager, I was enthralled by the voice of the consummate stylist guiding me along. Perhaps that's a naive thing to say about a historical account, and perhaps it's the sort of thing that leads to a flawed understanding of historical events. Eloquence isn't everything, and plenty of important books have been the work of rough hands. But it's not so much Tuchman's command of language that draws you in as her infectious enchantment with her subject: the period of Western European history beginning with the Black Death of 1348 and ending with the fall of the Byzantine Empire in the early 1400s, all as seen through the life of a single French nobleman. "People of the Middle Ages existed under mental, moral, and physical circumstances so different from our own as to constitute almost a foreign civilization," Tuchman writes. And indeed the reflection of humanity you see in this "distant mirror" is almost unrecognizable, but all the more fascinating for that.</span><br data-dcnode-id="3873"><br data-dcnode-id="3872"><span data-dcnode-id="3871" instrument_node="">Today, as I finished off the last hundred pages, I found myself reading long passages aloud, the way you do when you read Gabriel Garcia Marquez for the first time, or some other uncannily good novelist. Unlike some authors of ambitiously long and complicated books, Tuchman doesn't peter out near the end and leave the reader feeling cheated. Her culminating chapters are some of her best, and it doesn't even matter that the people and events she's describing are so old and of so little relevance to your daily life that you will probably never hear them mentioned again, not even on Jeopardy. What matters is that she makes them all alive again, more alive than they've been for 600 years.</span></span><span data-dcnode-id="3869" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="3792" title="really liked it"><span class="staticStar p10" data-dcnode-id="3797" size="15x15"><span data-dcnode-id="3798" instrument_node="">really liked it</span></span><span class="staticStar p10" data-dcnode-id="3796" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3795" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3794" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3793" size="15x15"></span></span><span data-dcnode-id="3791" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="3788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/175635-trevor%3Fshelf%3Dhistory"><span data-dcnode-id="3789" instrument_node="">history</span></a><span data-dcnode-id="3787" instrument_node="">
