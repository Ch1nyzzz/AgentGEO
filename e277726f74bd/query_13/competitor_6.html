</span><span data-dcnode-id="1771" id="freeTextContainer3986043883308008043"><span data-dcnode-id="1772" instrument_node="">This is an interesting work of medieval history, full of facts and on the dense side for a work of popular history, but certainly readable. It focuses on the 14th century in France, with sojourns to Italy and England, and uses as a loose focal point the life of a powerful lord, Enguerrand de Coucy, who was involved in many of the military campaigns and diplomatic maneuvers discussed. At the beginning, the book is wide-ranging, with diversions to discuss interesting aspects of medieval life, from</span></span><span data-dcnode-id="1770" instrument_node="">
</span><span data-dcnode-id="1756" id="freeText3986043883308008043" style="display:none"><span data-dcnode-id="1769" instrument_node="">This is an interesting work of medieval history, full of facts and on the dense side for a work of popular history, but certainly readable. It focuses on the 14th century in France, with sojourns to Italy and England, and uses as a loose focal point the life of a powerful lord, Enguerrand de Coucy, who was involved in many of the military campaigns and diplomatic maneuvers discussed. At the beginning, the book is wide-ranging, with diversions to discuss interesting aspects of medieval life, from childrearing (oddly not given much attention at the time; in art, for instance, women were pictured in all sorts of ways but rarely as mothers), to entertainment, to belief in witchcraft (it seems only in the 14th century that people began to see this as a serious crime), to religion. The religious aspect of 14th century life is particularly interesting: the Catholic Church played an enormous role in politics and everyday life, but was so corrupt and political that it had little moral authority. The clergy complained that young people rarely attended church, except on holidays when they were mostly there to see and be seen, and that some people didn’t believe in God at all—quite unlike our modern stereotypes of the medieval period.</span><br data-dcnode-id="1768"><br data-dcnode-id="1767"><span data-dcnode-id="1766" instrument_node="">Sadly, by the second half of the book, those interesting digressions are largely over, and the book becomes a detailed chronicle of military campaigns and diplomatic maneuvers and intrigue, focused on the Hundred Years’ War and France’s turmoil, with various campaigns to other places. I began the book engaged, but by the end felt I was pushing through for the sake of being done. It’s a chunky tome, and not enough is known about any of the players 600 years later for the reader to get much sense of who they were as people; or where we have that sense, they mostly seem to have been awful. This was a time of moral breakdown, with mercenary armies ravaging the countryside both during and between wars, and a ruling class only interested in its own entertainment and enrichment.</span><br data-dcnode-id="1765"><br data-dcnode-id="1764"><span data-dcnode-id="1763" instrument_node="">Interestingly, this book has been cited as inspiration for </span><a data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/13496.A_Game_of_Thrones__A_Song_of_Ice_and_Fire___1_" rel="nofollow noopener" title="A Game of Thrones (A Song of Ice and Fire, #1) by George R.R. Martin"><span data-dcnode-id="1762" instrument_node="">A Game of Thrones</span></a><span data-dcnode-id="1760" instrument_node=""> and its sequels, and the parallels are obvious. The comparisons aren’t entirely in George R.R. Martin’s favor, though they show that the medieval period was more complicated than we give it credit for. What he took: casual violence, rape, sacking of cities, mercenaries ravaging the populace. What he left behind: a society with values and ideals in which it believed passionately (hypocritical though people often were in practice); the crucial importance of money to successful warfare, and the corresponding preference for capturing noblemen for ransom rather than killing them on the field; the role of the Black Death, which by killing a large chunk of the population probably laid the groundwork for the casual violence and impunity that followed (not all the Middle Ages was like this); the role of the church; the representative institutions (Parliament in England, the Estates in France) that were already an indispensable part of their countries’ political landscape; the frequent revolts by peasants and townspeople, who knew very well they were being had, were willing to do something about it, and on a few memorable occasions even defeated armies of knights; the power of universities, particularly in Paris; the ineptitude of most military campaigns; and more. Compared to the people of this history, Martin’s characters are hopelessly out of their depth in their own world, but then one can easily become emotionally invested in them and their stories are gripping, which is after all the goal of a novelist.</span><br data-dcnode-id="1759"><br data-dcnode-id="1758"><span data-dcnode-id="1757" instrument_node="">At any rate, this book is quite good: very informative and detailed, evidently well-researched, bringing out interesting aspects of medieval life. It was too long for me, at least at the time I read it, but I’d certainly recommend to anyone interested in the period.</span></span><span data-dcnode-id="1755" instrument_node="">

</span><span data-dcnode-id="1656" id="freeTextContainer6935041099773585110"><span data-dcnode-id="1666" instrument_node="">Just started. Looks interesting ...</span><br data-dcnode-id="1665"><br data-dcnode-id="1664"><span data-dcnode-id="1663" instrument_node="">Well, it IS interesting, but kind of dry, as at least one other reviewer has noted. It's going to take a while!</span><br data-dcnode-id="1662"><br data-dcnode-id="1661"><span data-dcnode-id="1660" instrument_node="">Continuing to enjoy this book as the author is doing a fine job of combining the informative with reading pleasure. So far it's a bit like reading a sci-fi account of a far-away alien planet and it's weird but familiar culture! Jack Vance-like indeed ...</span><br data-dcnode-id="1659"><br data-dcnode-id="1658"><span data-dcnode-id="1657" instrument_node="">The Black Plague - why can't we have one of those, only more virulent and untreatable? Steve King ha</span></span><span data-dcnode-id="1655" instrument_node="">
</span><span data-dcnode-id="1626" id="freeText6935041099773585110" style="display:none"><span data-dcnode-id="1654" instrument_node="">Just started. Looks interesting ...</span><br data-dcnode-id="1653"><br data-dcnode-id="1652"><span data-dcnode-id="1651" instrument_node="">Well, it IS interesting, but kind of dry, as at least one other reviewer has noted. It's going to take a while!</span><br data-dcnode-id="1650"><br data-dcnode-id="1649"><span data-dcnode-id="1648" instrument_node="">Continuing to enjoy this book as the author is doing a fine job of combining the informative with reading pleasure. So far it's a bit like reading a sci-fi account of a far-away alien planet and it's weird but familiar culture! Jack Vance-like indeed ...</span><br data-dcnode-id="1647"><br data-dcnode-id="1646"><span data-dcnode-id="1645" instrument_node="">The Black Plague - why can't we have one of those, only more virulent and untreatable? Steve King had the right idea in "The Stand." The cure for the many man-made ills the rest of the planet is suffering from could be a plague with a 99.6% non-survival rate.</span><br data-dcnode-id="1644"><br data-dcnode-id="1643"><span data-dcnode-id="1642" instrument_node="">Moving along now into post-Poitiers(a disaster for the French) brigandage. Sounds like the 14th c. was a miserable time to be living(and dying). Sometimes you're just trapped. Not a great time to be a poor "villein"(peasant) either - of course!</span><br data-dcnode-id="1641"><br data-dcnode-id="1640"><span data-dcnode-id="1639" instrument_node="">I was at the local transfer station, where I voluntarily straighten out the book shelves(and get some good ones for myself), and I found a nice hardbound edition of this book. It'll be easier to read than the paperback, so that one will go into the out pile. However, the paperback is better in that the cover image(of an impressive Medieval painting) is in color. My newly acquired hardbound is blank of course. The page numbers correspond exactly ...</span><br data-dcnode-id="1638"><br data-dcnode-id="1637"><span data-dcnode-id="1636" instrument_node="">Part One ends with the papal schism thing. Part Two begins tonight.</span><br data-dcnode-id="1635"><br data-dcnode-id="1634"><span data-dcnode-id="1633" instrument_node="">Lately reading of peasant uprisings in England and on the Continent. Sheesh! Has it not ever been thus? Are we not still fighting the same political/economic battles in this country? The haves versus the have-nots. Republicans versus Democrats. My reading of various history books(this one, "Citizens" by Simon Schama(about the Fr. Rev.), and "The Glory and the Dream"(about the middle of the American 20th century) all feature the same thing. The rich and powerful(and now the corporate) keep wanting more and everyone else getting the shaft. Those f---ers NEVER GIVE UP! The rest of us mean NOTHING to them. When oh when will the rest of the people in this country get that?????</span><br data-dcnode-id="1632"><br data-dcnode-id="1631"><span data-dcnode-id="1630" instrument_node="">Getting towards the end as we reach the 1380's of this action-packed and seemingly chaotic century. SO MUCH detail to attend to, but it's still fascinating. The violence(warfare) is endless and usually no clear outcomes ensue. Just more warfare and intrigue.</span><br data-dcnode-id="1629"><br data-dcnode-id="1628"><span data-dcnode-id="1627" instrument_node="">Finished up last night with this excellent and engrossing read. Yes, there IS an abundance of detail, but then, there was an abundance of dramatic activity during this dysfunctional epoch. As Ms. Tuchman points out, things DID begin to turn around for Europe in the latter half of the 15 c. Whew!</span></span><span data-dcnode-id="1625" instrument_node="">

</span><span data-dcnode-id="1505" id="freeText9494577626112310778" style="display:none"><span data-dcnode-id="1512" instrument_node="">Just got a nice hardbound copy of this for Christmas, so I'm set to read it again ...</span><br data-dcnode-id="1511"><br data-dcnode-id="1510"><span data-dcnode-id="1509" instrument_node="">My dad is a Barbara Tuchman fan, so I grew up around this book. As a small child, I used to ponder with interest the scary cover art, which shows the arrival of the Forth Horseman of the Apocalypse ("and his name was death" for you Johnny Cash fans). I finally read the book when I was in high school, and I have reread it several times since. It is a perfect example of good history writing - absolutely engaging and human. </span><br data-dcnode-id="1508"><br data-dcnode-id="1507"><span data-dcnode-id="1506" instrument_node="">Among other things, this book, along with "Rats, Lice &amp; History," crystalized my interest in the history of disease and epidemiology (you are right to ask - is there anything I'm not interested in?). If you're ever stuck home with a bad flu, I recommend reading the chapter on the Black Death - it really puts things in perspective.</span></span><span data-dcnode-id="1504" instrument_node="">

</span><span data-dcnode-id="1292" id="freeTextContainer7484154044743748587"><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cartoonstock.com/directory/t/triggered.asp" rel="nofollow noopener"><span data-dcnode-id="1301" instrument_node="">This</span></a><span data-dcnode-id="1299" instrument_node=""> is what I thought the Hundred Years' War was all about. Apparently that's wrong. (Or maybe </span><i data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Tuchman</span></i><span data-dcnode-id="1296" instrument_node=""> is wrong, hmmm?)</span><br data-dcnode-id="1295"><br data-dcnode-id="1294"><span data-dcnode-id="1293" instrument_node="">We pretty much all know what the Middle Ages was all about, we all have at least heard tell of the Hundred Years' War or the Black Death or the Papal Schism. Those terms are all familiar. What Tuchman did here was bring all of those familiar terms to life. She filled in the gaps that public education doesn't (whether due to funding or time or the Board of Education doesn't thin</span></span><span data-dcnode-id="1291" instrument_node="">
</span><span data-dcnode-id="1266" id="freeText7484154044743748587" style="display:none"><a data-dcnode-id="1289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cartoonstock.com/directory/t/triggered.asp" rel="nofollow noopener"><span data-dcnode-id="1290" instrument_node="">This</span></a><span data-dcnode-id="1288" instrument_node=""> is what I thought the Hundred Years' War was all about. Apparently that's wrong. (Or maybe </span><i data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Tuchman</span></i><span data-dcnode-id="1285" instrument_node=""> is wrong, hmmm?)</span><br data-dcnode-id="1284"><br data-dcnode-id="1283"><span data-dcnode-id="1282" instrument_node="">We pretty much all know what the Middle Ages was all about, we all have at least heard tell of the Hundred Years' War or the Black Death or the Papal Schism. Those terms are all familiar. What Tuchman did here was bring all of those familiar terms to life. She filled in the gaps that public education doesn't (whether due to funding or time or the Board of Education doesn't think it's as important, whatever), so for myself there were a few "ah-</span><i data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">ha</span></i><span data-dcnode-id="1279" instrument_node="">!" kinds of moments. (Like "Oh, so the War </span><i data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">didn't</span></i><span data-dcnode-id="1276" instrument_node=""> start because of a wedgie!")</span><br data-dcnode-id="1275"><br data-dcnode-id="1274"><span data-dcnode-id="1273" instrument_node="">The additional bonus of reading Tuchman is that she wasn't a dry writer. She did what seems like a thousand years' worth of research and managed to make just about every word of it absolutely fascinating. Yes, my eyes glazed over a time or two; I was in this read primarily to know more about the society, culture, and day-to-day living of folks back in the Late Middle Ages. The battles were of less interest to me, though kudos to Tuchman for the amount of detail she provided. She had that research down to bitch-slaps and other offenses. There are 18 pages of Bibliography and something like 36 pages of Notes. She didn't just make this stuff up here. She did a lot of research, and I appreciate that.</span><br data-dcnode-id="1272"><br data-dcnode-id="1271"><span data-dcnode-id="1270" instrument_node="">So the parts that I signed up to read were especially fascinating to me - how women were treated in society, how so-and-so died (like in a fire after being wrapped in booze-soaked wraps to help his fever - whoops!), the plague and sickness - y'know, totally gruesome stuff like that. It's not a quick read, though it's not a difficult read, if that makes any sense. Most readers will get at least something out of this, no matter what they're going in expecting or wanting. I wanted one thing but came out with so much more. It's action-packed, written in a narrative that doesn't exclude or alienate the reader, and (again!) so freaking well-researched it's insane.</span><br data-dcnode-id="1269"><br data-dcnode-id="1268"><span data-dcnode-id="1267" instrument_node="">This was my first Tuchman, but I have more in my stacks. I'm looking forward to reading those others even more now.</span></span><span data-dcnode-id="1265" instrument_node="">
