</span><span class="readable" data-dcnode-id="3724" id="reviewTextContainer57344310"><span data-dcnode-id="3781" instrument_node="">
</span><span data-dcnode-id="3776" id="freeTextContainer16855367927834981872"><span data-dcnode-id="3780" instrument_node="">I have been recommended this book by many of my good reads friends, and so I’ve read it. My friend Eric’s review says simply, “Normally, I have always enjoyed Barbara Tuchman's books, but this one, while very interesting, I felt I had to struggle a bit”.</span><br data-dcnode-id="3779"><br data-dcnode-id="3778"><span data-dcnode-id="3777" instrument_node="">This is a very uncharacteristic review by Eric. I think Eric is one of the most thoughtful and best reviewers on this site. His reviews generally give valuable insights into a book and unfortunately far too often have me adding books to my ‘to re</span></span><span data-dcnode-id="3775" instrument_node="">
</span><span data-dcnode-id="3729" id="freeText16855367927834981872" style="display:none"><span data-dcnode-id="3774" instrument_node="">I have been recommended this book by many of my good reads friends, and so I’ve read it. My friend Eric’s review says simply, “Normally, I have always enjoyed Barbara Tuchman's books, but this one, while very interesting, I felt I had to struggle a bit”.</span><br data-dcnode-id="3773"><br data-dcnode-id="3772"><span data-dcnode-id="3771" instrument_node="">This is a very uncharacteristic review by Eric. I think Eric is one of the most thoughtful and best reviewers on this site. His reviews generally give valuable insights into a book and unfortunately far too often have me adding books to my ‘to read’ list that I really will probably never get around to reading – but if I ever do read any of them I will read purely due to Eric’s recommendations.</span><br data-dcnode-id="3770"><br data-dcnode-id="3769"><span data-dcnode-id="3768" instrument_node="">Then there is Wendy, another friend here, whose opinion I also respect, value and seek out and who has introduced me to many excellent books. She told me she had read this one three times – now, if that isn’t high praise it is hard to know what is.</span><br data-dcnode-id="3767"><br data-dcnode-id="3766"><span data-dcnode-id="3765" instrument_node="">Then there is Richard who although enjoyed this said that it didn’t feel as historically relevant to him as Tuckman’s WW1 books.</span><br data-dcnode-id="3764"><br data-dcnode-id="3763"><span data-dcnode-id="3762" instrument_node="">So, what to do? I tried to read this one ignoring the advice of friends and plunged in. And my reactions are as mixed as those of my friends. I’ve ended up having to agree with virtually all of them.</span><br data-dcnode-id="3761"><br data-dcnode-id="3760"><span data-dcnode-id="3759" instrument_node="">Like Eric, I find it hard to explain just what my problem with this book is. Really, this should be a book I rave about. I didn’t know very much about the 14th Century before I read this – although I did know enough to know that it was one of those ‘cusp’ centuries – where things that had stayed pretty much the same for a very long time were about to come up against innovations that would make their continuing virtually impossible. In many ways this is the doormat century that welcomes in the modern world. This is very much the last century of the Middle Ages in which (to mix my metaphors appallingly) the birth cries of the modern world are virtually drowned out by the death rattle of the old one. </span><br data-dcnode-id="3758"><br data-dcnode-id="3757"><span data-dcnode-id="3756" instrument_node="">This is the century in which Europe is first confronted with the plague (the black death). It is also the century in which that most lethal of inventions (the long bow) makes its entrance and makes the entire notion of knights and the type of warfare they preferred obsolete overnight (at least, it would have if people knew what was good for them – which, of course, they generally don’t). It was a century in which the undisputed power and unity of the church and the strict boundaries between royalty and peasants was beginning to be usurped by the rising merchant and capitalist classes. It was a century in which peasants revolted shaking the existing order to its core.</span><br data-dcnode-id="3755"><br data-dcnode-id="3754"><span data-dcnode-id="3753" instrument_node="">This book is called ‘A Distant Mirror’ and in some ways that is the problem I had with this book. A mirror reflects an image of the viewer back onto themselves – but this mirror was placed so far away that it was hard to make out any of the images in a way that felt satisfying. As I was reading this one I found myself wondering why I was quite so dissatisfied with it. At first I thought it was because this book lacked a central thesis – her March of Folly, for example, has just such a thesis and it bridges with ease stories from diverse centuries, giving a dreadful perspective on self-destructive foolishness that is all-to-human. So, for a long time I thought this one lacked something like that – a central idea to drive the book forward. But I’ve read other histories that don’t have such a thesis and haven’t felt it necessary. </span><br data-dcnode-id="3752"><br data-dcnode-id="3751"><span data-dcnode-id="3750" instrument_node="">Then I thought perhaps there was just too much focus on wars during the century – but even so, her other books focus solely on wars and I had no problem with them. Maybe Richard is right and the concerns of the 14th Century just seem too far away, too long ago. But then, I’ve read quite a few books on Ancient Greece and Rome and have never felt they are receding too far into the distance (although, admittedly, there is a sense in which Classical Societies do seem closer to us than those in the Middle Ages).</span><br data-dcnode-id="3749"><br data-dcnode-id="3748"><span data-dcnode-id="3747" instrument_node="">The most interesting bits of this book were when she gives a glimpse into the odd lives of people and how they viewed their world. I’ve known since I was a child that there were differences between the Eastern European and Western European calendars – but I had no idea that for a long time the year started at Easter. Think about that for a second and you will understand how hard it would be to know what year you are talking about. Easter isn’t a fixed date – so using that to beginning the year is a deeply strange thing to do.</span><br data-dcnode-id="3746"><br data-dcnode-id="3745"><span data-dcnode-id="3744" instrument_node="">Then there were discussions on religious life. Look, if you are going to have trouble with the idea of people putting their lips to pus filled sores, then you are going to find this part of the book challenging. This was a time when one in three (and perhaps even as many as two in three) children did not make it out of childhood. It was a time when people were dying in droves even without the endless and senseless wars being waged to hurry them along to their graves. The Turks decapitating the French soldiers in front of their masters towards the end of this book – their masters being spared as they could be used to provide ransom – is a disturbing image of the first order. In fact, it is the stuff of nightmares, to be quite frank.</span><br data-dcnode-id="3743"><br data-dcnode-id="3742"><span data-dcnode-id="3741" instrument_node="">The treatment of Jews throughout this century is also something that is designed to induce nightmares. As a case in point – I had heard of the flagellants before, those fun guys who would whip themselves until they were a bleeding mess as their way to seek God’s forgiveness and thereby stop the plague. Now, as a way of stopping plague this is probably not the most obvious or the most effective treatment, and I guess we all know without reading this book that it actually helped to spread the disease. But what I didn’t know was that after their little parades (where people would come over to them and either drink or use their blood as some odd form of ‘protection’ or treatment) they would then generally head around to the local Jewish quarter and kill as many people as they could get their hands on. In fact, killing Jews seems to have been the century’s recreation of choice.</span><br data-dcnode-id="3740"><br data-dcnode-id="3739"><span data-dcnode-id="3738" instrument_node="">Favourite line in the book? Probably the young man who was ‘very religious’ who chastised his brother by telling him off for laughing – as the Bible doesn’t record Jesus every laughing but does say, “Jesus wept”. </span><br data-dcnode-id="3737"><br data-dcnode-id="3736"><span data-dcnode-id="3735" instrument_node="">The increasingly bizarre machinations involving the split in the Catholic Church and the damage this did to both the church and society at large makes for fascinating reading in that it confirms yet again that people are often the last people you can rely on to act in any way that might be in accordance with their own best interests.</span><br data-dcnode-id="3734"><br data-dcnode-id="3733"><span data-dcnode-id="3732" instrument_node="">Like I said, there are lots of things to love about this book – and I should have loved it much more than I did, I really should have, and really wanted to – but there was something missing that I just can’t put my finger on and which just kept me at arm’s length.</span><br data-dcnode-id="3731"><br data-dcnode-id="3730"></span><span data-dcnode-id="3728" instrument_node="">

</span><span data-dcnode-id="3361" id="freeTextContainer17330936325433058829"><span data-dcnode-id="3372" instrument_node="">Tuchman's books are always interesting, but usually they have more than one can absorb. For this reason, reading them is always a bit of a struggle. OK, I am merely speaking for myself. </span><br data-dcnode-id="3371"><br data-dcnode-id="3370"><span data-dcnode-id="3369" instrument_node="">I am going to try to keep this review short, maybe a reaction to having just completed Tuchman's extensive opus. Not every detail need be explained. </span><i data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">A Distant Mirror</span></i><span data-dcnode-id="3366" instrument_node=""> covers thoroughly every single aspect of medieval life. It covers in detail the battles of the Hundred Years' War. What is the Hundred Years' War?</span><br data-dcnode-id="3365"><br data-dcnode-id="3364"><i data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">Th</span></i></span><span data-dcnode-id="3360" instrument_node="">
</span><span data-dcnode-id="3325" id="freeText17330936325433058829" style="display:none"><span data-dcnode-id="3359" instrument_node="">Tuchman's books are always interesting, but usually they have more than one can absorb. For this reason, reading them is always a bit of a struggle. OK, I am merely speaking for myself. </span><br data-dcnode-id="3358"><br data-dcnode-id="3357"><span data-dcnode-id="3356" instrument_node="">I am going to try to keep this review short, maybe a reaction to having just completed Tuchman's extensive opus. Not every detail need be explained. </span><i data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">A Distant Mirror</span></i><span data-dcnode-id="3353" instrument_node=""> covers thoroughly every single aspect of medieval life. It covers in detail the battles of the Hundred Years' War. What is the Hundred Years' War?</span><br data-dcnode-id="3352"><br data-dcnode-id="3351"><i data-dcnode-id="3340"><span data-dcnode-id="3350" instrument_node="">The Hundred Years' War was a series of conflicts waged from 1337 to 1453 pitting the House of Plantagenet, rulers of the Kingdom of England, against the House of Valois for control of the Kingdom of France. Each side drew many allies into the war.....</span><br data-dcnode-id="3349"><br data-dcnode-id="3348"><span data-dcnode-id="3347" instrument_node="">Historians commonly divide the war into three phases separated by truces: 1) the Edwardian Era War (1337–1360); 2) the Caroline War (1369–1389); and 3) the Lancastrian War (1415–1453).</span><br data-dcnode-id="3346"><br data-dcnode-id="3345"><span data-dcnode-id="3344" instrument_node="">Contemporary conflicts in neighbouring areas, which were directly related to this conflict, included the War of the Breton Succession (1341–1364), the Castilian Civil War (1366–1369), the War of the Two Peters (1356–1375) in Aragon, and the 1383–85 Crisis in Portugal. </span><u data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">Later historians invented the term "Hundred Years' War" as a periodization to encompass all of these events</span></u><span data-dcnode-id="3341" instrument_node="">, thus constructing the longest military conflict in history.</span></i><br data-dcnode-id="3339"><br data-dcnode-id="3338"><span data-dcnode-id="3337" instrument_node="">That is taken directly from Wiki. Pay attention to the sentence I have underlined. This is a book where the majority of pages are concerned with war and battles. Tuchman has chosen to follow one man of nobility through his lifetime, Enguerrand de Coucy VII(1340-1397). He is from Picardy, France, and is married to the daughter of the Kind of England. He is a perfect character to follow since he is thus connected to both the French and English nobility, the two warring nations. He took part in many of the decisive battles. The book follows what he DOES. Little attempt is made to understand the psychology of the man. That is not the point of the book. You observe his actions. Who does he marry? What battles did he fight in? Where did he live? How did he die? Through him we study medieval life and the Hundred Years’ War. After his death Tuchman quickly summarizes the end of the Hundred Years' War. So while the Edwardian Era War and the Caroline War are depicted in complete detail as well as related battles with the Bretons, battles in Italy, in Spain, in Belgium and finally in Bulgaria (contemporary country names used), only a quick summary of the Lancastrian War is given. Enguerrand dies in 1397 at the Battle of Nicopolis in Bulgaria. This explains why the Lancastrian War is summarized, in the epilog.</span><br data-dcnode-id="3336"><br data-dcnode-id="3335"><br data-dcnode-id="3334"><span data-dcnode-id="3333" instrument_node="">Approximately the first fourth of the book establishes the setting. Enguerrand was born in 1340. The world he was born into, that is the earlier years of the 14th Century prior to his birth are studied. They provide a general overview of how people behaved and thought during the medieval era, while the remainder of the book covers more closely the battles. I preferred the first part of the book. The Black Death, the Schism of the Church, clothing, foods, mysticism, chivalry and how motherhood was perceived – it’s all here and it is all interesting, but there is too much to grasp given the abundance of details. </span><br data-dcnode-id="3332"><br data-dcnode-id="3331"><span data-dcnode-id="3330" instrument_node="">I listened to the audiobook narrated by Nadia May. This was excellent, but I do NOT recommend the audiobook. There are so many names of places and people! it is hard to keep everything straight. You need maps and genealogical charts which a paper book can easily provide. </span><br data-dcnode-id="3329"><br data-dcnode-id="3328"><span data-dcnode-id="3327" instrument_node="">I learned a lot. It is an excellent book, but in terms of my personal enjoyment I can only say I liked it. I don’t love books describing battles.</span><br data-dcnode-id="3326"></span><span data-dcnode-id="3324" instrument_node="">

</span><span data-dcnode-id="3214" id="freeTextContainer6689192913484134426"><span data-dcnode-id="3232" instrument_node="">Roi ne suis,</span><br data-dcnode-id="3231"><span data-dcnode-id="3230" instrument_node="">Ne prince ne duc ne comte aussi;</span><br data-dcnode-id="3229"><span data-dcnode-id="3228" instrument_node="">Je suis le sire de Coucy</span><br data-dcnode-id="3227"><br data-dcnode-id="3226"><span data-dcnode-id="3225" instrument_node="">"Not king nor prince,</span><br data-dcnode-id="3224"><span data-dcnode-id="3223" instrument_node="">Duke nor count am I;</span><br data-dcnode-id="3222"><span data-dcnode-id="3221" instrument_node="">I am the lord of Coucy"</span><br data-dcnode-id="3220"><br data-dcnode-id="3219"><span data-dcnode-id="3218" instrument_node="">When one is the owner of one of the greatest Baronies in France, there is no need for a title as sheer arrogance will do a fine job of it. With this humble start, we are launched into the world of the 14th Century. The vehicle for this journey is the grand seigneur Coucy family. </span><br data-dcnode-id="3217"><br data-dcnode-id="3216"><span data-dcnode-id="3215" instrument_node="">Founded in 975 when Oderic, Archbishop of Reims ceded the fief (encompassing modern Pica</span></span><span data-dcnode-id="3213" instrument_node="">
</span><span data-dcnode-id="3185" id="freeText6689192913484134426" style="display:none"><span data-dcnode-id="3212" instrument_node="">Roi ne suis,</span><br data-dcnode-id="3211"><span data-dcnode-id="3210" instrument_node="">Ne prince ne duc ne comte aussi;</span><br data-dcnode-id="3209"><span data-dcnode-id="3208" instrument_node="">Je suis le sire de Coucy</span><br data-dcnode-id="3207"><br data-dcnode-id="3206"><span data-dcnode-id="3205" instrument_node="">"Not king nor prince,</span><br data-dcnode-id="3204"><span data-dcnode-id="3203" instrument_node="">Duke nor count am I;</span><br data-dcnode-id="3202"><span data-dcnode-id="3201" instrument_node="">I am the lord of Coucy"</span><br data-dcnode-id="3200"><br data-dcnode-id="3199"><span data-dcnode-id="3198" instrument_node="">When one is the owner of one of the greatest Baronies in France, there is no need for a title as sheer arrogance will do a fine job of it. With this humble start, we are launched into the world of the 14th Century. The vehicle for this journey is the grand seigneur Coucy family. </span><br data-dcnode-id="3197"><br data-dcnode-id="3196"><span data-dcnode-id="3195" instrument_node="">Founded in 975 when Oderic, Archbishop of Reims ceded the fief (encompassing modern Picardy, France) to the Comte d'Eudes, who became the first Lord of Coucy. He established a fierce dynasty on top of that hill, one that will survive for over four centuries. Barbara Tuchman's magisterial work, follows this great family in the service of the great nation of France. At the start of the 1300s, France rules supreme. From chivalry to learning, the "Most Christian King" of France, Philip IV, ruled over a powerful and wealthy nation that led in the various fields of the time.</span><br data-dcnode-id="3194"><br data-dcnode-id="3193"><span data-dcnode-id="3192" instrument_node="">Yet, all is not well. From changes in climate to political changes, all will have far-reaching consequences for the European world. Tuchman's work, which reads like a novel, covers the intricate history of this time. The book is the story of change, from the start of the 14th Century where the King, Country, and Church reigned supreme to the end of the century where the Plague, Famine, and War have brought those pillars of society and society itself to its knees.</span><br data-dcnode-id="3191"><br data-dcnode-id="3190"><span data-dcnode-id="3189" instrument_node="">Full of information and telling an amazing tale about the massive changes that take place over the course of a century. From the high and mighty to the low and overworked, Tuchman touches on all the social, economic, and military changes, and disasters, of the time. We learn about the Plague, the Hundred Years War, and the decline in the power of the Church as it cannibalizes itself in an orgy of unmitigated greed and perniciousness.</span><br data-dcnode-id="3188"><br data-dcnode-id="3187"><span data-dcnode-id="3186" instrument_node="">The end of the century is markedly different than the start. Few books can cover such a vast period of time and still keep the reader enthralled. Tuchman has no such issues as her tome is a vast story that unfolds through the troubled 14th Century. One of the finest examples of top-notch historical writing and one that ought to be read by anyone interested in this calamitous time. Highly recommended.</span></span><span data-dcnode-id="3184" instrument_node="">

</span><span data-dcnode-id="3067" id="freeText10627447702027215457" style="display:none"><span data-dcnode-id="3077" instrument_node="">The Hundred Years War, the Papal Schism, the Black Death, peasant uprisings, the death of chivalry, crusades, assassinations, tournaments, all these things and more Tuchman explores through an examination of the life of one man, Enguerrand de Coucy. Scion of perhaps the most powerful and wealthiest baronial family in France, Coucy lead a fairly amazing life. He fought wars in his homeland of France, Italy, North Africa, Switzerland and Bulgaria, lead important diplomatic missions, twice turned down the title of Constable of France and, for over a decade, was married to the favourite daughter of the King of England, who also happened to be his captor at the time, and died a captive of the Ottoman Sultan after the disastrous Battle of Nicopolis.</span><br data-dcnode-id="3076"><br data-dcnode-id="3075"><span data-dcnode-id="3074" instrument_node="">This isn't a strict biography though, and Tuchman wanders wherever her interests take her. There's a hell of a lot of ground to cover, so this isn't as tight as, say, </span><i data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">Guns of August</span></i><span data-dcnode-id="3071" instrument_node="">, and Tuchman will occasionally get hung up on something, but these are minor faults. Speaking of getting hung up, this book was cited by George R R Martin and the inspiration he drew from it is very apparent. Tuchman really relishes describing feasts, fetes and tournaments in incredible detail, and portrays the major and minor figures of the era with a blend of real ambiguity, grittiness and the occasional larger-than-life anecdote that any reader of A Song of Ice and Fire will find familiar. This book is littered with Barristan Selmys and Gregor Cleganes.</span><br data-dcnode-id="3070"><br data-dcnode-id="3069"><span data-dcnode-id="3068" instrument_node="">I particularly enjoyed Tuchman's sneering portrayal of knighthood and the ruling class. No flower of chivalry here, Tuchman portrays people like the famous Black Prince as the brutal, rapacious, violent thugs they really were, and even her main character, who she is obviously fond of, is not spared, being described as "the least compromised of his class and kind by brutality, venality and reckless indulgence." Not exactly a glowing reccomendation.</span></span><span data-dcnode-id="3066" instrument_node="">

</span><span data-dcnode-id="2982" id="freeTextContainer9131242872925663452"><span data-dcnode-id="2983" instrument_node="">I read a little more than half of this a couple of years ago and stopped. This time I read it all, for the discussion of my local book group. I really liked it--I've never NOT liked a Tuchman book. I admire the way she's able to follow one historical figure and still manage to tell the story of a whole age, especially one person, in this case Enguerrand de Coucy about whom so little is known other than what he did. There exist references to him in contemporary works but never more than a figure </span></span><span data-dcnode-id="2981" instrument_node="">
</span><span data-dcnode-id="2976" id="freeText9131242872925663452" style="display:none"><span data-dcnode-id="2980" instrument_node="">I read a little more than half of this a couple of years ago and stopped. This time I read it all, for the discussion of my local book group. I really liked it--I've never NOT liked a Tuchman book. I admire the way she's able to follow one historical figure and still manage to tell the story of a whole age, especially one person, in this case Enguerrand de Coucy about whom so little is known other than what he did. There exist references to him in contemporary works but never more than a figure who steps out of the background now and then to be seen from a distance. He nevertheless comes alive, particularly toward the end when he seems to be a thoughtful and sensible man in a era which encouraged the opposite. I also liked the book because I know so little about France and am trying to rectify that lack. And before this "the hundred years war" seemed to me an historical stalwart with no detail behind it--except perhaps the picture of Mother Courage pulling her cart.... I know much more English history so it was instructive to see the Black Prince and John of Gaunt and the Peasant Rebellion from the other side and in the context of what was going on on the continent.</span><br data-dcnode-id="2979"><br data-dcnode-id="2978"><span data-dcnode-id="2977" instrument_node="">The focus on Coucy was not like Tuchman's focus on Stillwell in her book on World War II in China. That really was a biography of Stillwell as well as an attempt to understand the US in China in WWII and after. Coucy is, in many ways, a rack--a hat rack not a torture device-- to hang Tuchman's understanding of the 14th century on. Her title in interesting: "distant" is self explanatory--600 years and more ago, but why "mirror"? That I think is because Tuchman found the calamitous 14th century (her term) analogous in many ways to her own century. Understanding that pivotal century might be "consoling in a period of similar disarray" characterized by war, plague, religious schism, irrationality and progress.</span></span><span data-dcnode-id="2975" instrument_node="">

</span><span data-dcnode-id="2852" id="freeTextContainer1652379761811749132"><span data-dcnode-id="2862" instrument_node="">Gore and sensationalism: that was my impression of </span><i data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">A Distant Mirror</span></i><span data-dcnode-id="2859" instrument_node=""> for years before I listened to it. The top Goodreads review, Glenn's, used to contain a quote about one of those savage communal games that involved torturing cats - the sort of thing you'll have heard elsewhere if you've read much medieval and early modern European history - but the paragraph in question must have been removed at some stage. </span><br data-dcnode-id="2858"><br data-dcnode-id="2857"><span data-dcnode-id="2856" instrument_node="">So I was surprised to find that the bulk of </span><i data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">A Distant Mirror</span></i><span data-dcnode-id="2853" instrument_node=""> - about 70% of it, I'd gue</span></span><span data-dcnode-id="2851" instrument_node="">
</span><span data-dcnode-id="2780" id="freeText1652379761811749132" style="display:none"><span data-dcnode-id="2850" instrument_node="">Gore and sensationalism: that was my impression of </span><i data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">A Distant Mirror</span></i><span data-dcnode-id="2847" instrument_node=""> for years before I listened to it. The top Goodreads review, Glenn's, used to contain a quote about one of those savage communal games that involved torturing cats - the sort of thing you'll have heard elsewhere if you've read much medieval and early modern European history - but the paragraph in question must have been removed at some stage. </span><br data-dcnode-id="2846"><br data-dcnode-id="2845"><span data-dcnode-id="2844" instrument_node="">So I was surprised to find that the bulk of </span><i data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">A Distant Mirror</span></i><span data-dcnode-id="2841" instrument_node=""> - about 70% of it, I'd guess - was trad political history, all war and royalty, largely in England and France, with occasional tendrils out to the Italian city-states, Spain, the HRE, the Ottomans and Bohemia where the story necessitated. (Like twentieth-century history textbooks, whose limited coverage in effect projected the Iron Curtain hundreds of years into the past.) Re. Bohemia, we get to hear about a King Wenceslas who wasn't very good at all, and was one of the more memorable episodes in this brisk trot through Edward, Richard, Charleses and Philippes. At least we hear fairly often about how war affected the ordinary people, via the tax burden, by expropriating and destroying crops, (and somewhat further up the social scale, interrupting trade). No doubt thanks to the work of the Marxist economic historians who were one of the main schools of thought when the book was written, and remained influential into the 90s when they were among the interpretations we were advised to always mention at A-level. </span><br data-dcnode-id="2840"><br data-dcnode-id="2839"><span data-dcnode-id="2838" instrument_node="">Though I can't complain too much, as a) I chose a pre-2000 history book because it would fit a reading challenge, and b) I choose relatively familiar topics for audio so that I can follow easily and don't feel compelled to take lots of notes.</span><br data-dcnode-id="2837"><br data-dcnode-id="2836"><span data-dcnode-id="2835" instrument_node="">This is the earliest history book I've encountered which, although its topic is an era, centres itself around the life of an individual who lived successfully in that time. Did Tuchman start this approach? I don't know - but at any rate it reminded me of Orlando Figes' </span><i data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">The Whisperers</span></i><span data-dcnode-id="2832" instrument_node=""> (2007), and its coverage of the career of poet, soldier and party apparachik Konstantin Simonov, much admired in his time, and an exemplary survivor of one of the hardest-to-survive regimes in recorded history, who had a knack for tacking with shifting ideological currents. Tuchman's subject, French nobleman </span><a data-dcnode-id="2830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enguerrand_VII_de_Coucy" rel="nofollow noopener"><span data-dcnode-id="2831" instrument_node="">Enguerrand (VII) de Coucy</span></a><span data-dcnode-id="2829" instrument_node=""> seems to have had great political agility too: a master diplomat by middle age, considered by contemporaries to be one of the greatest knights of his era, and he married Isabella, daughter of Edward III of England despite not being a king's son himself. Isabella seems to have been a fashion tastemaker and shopaholic, and unusually and wilfully independent by the standards of women of her time, refusing a succession of proposals until Enguerrand's, in her thirties. If Isabella were alive now, one can only assume she'd be a very big deal on Instagram.</span><br data-dcnode-id="2828"><br data-dcnode-id="2827"><span data-dcnode-id="2826" instrument_node="">Along those lines, the focus on the upper classes means that some of the most entertaining bits are the celeb scandal and gossip of their day. The Duc du Berry (who commissioned the beautiful </span><i data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">Tres Riches Heures</span></i><span data-dcnode-id="2823" instrument_node="">) was insolvent and personally mediocre. (But hey, if you're a great patron of the arts, do you actually need to be talented yourself in anything except taste?) Charles VI's queen, Isabeau of Bavaria, built a recreational farm nearly 400 years before Marie Antoinette. The two main factions at Charles' court were named the Uncles and the Marmosets - like something out of Lemony Snicket. More seriously, and emphasising the impunity of medieval monarchs in the way that yet another story of executions could not, Edward III was publicly known to have raped the Countess of Salisbury. A totally convincing contemporaneous account of her emotions is given, tallying with modern understanding of PTSD from rape.</span><br data-dcnode-id="2822"><br data-dcnode-id="2821"><span data-dcnode-id="2820" instrument_node="">There's similar salacious material about religious figures too. A lot of people found St. Catherine of Siena </span><i data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">too much</span></i><span data-dcnode-id="2817" instrument_node="">. (Similar to Margery Kempe but with less crying, I guess?) "Even her devoted confessor... sometimes fell asleep" listening to her endless raptures about the sweet blood of Christ. [It all sounds very fetishy - and reminded me how my repetitive childhood reading of Catholic saints' stories had knock-on effects on my sexual and romantic life when I grew up.] Though the gossipy atmosphere makes it easy to infer and guess at what is not actually said: did Jean Gerson's concern, unusual for the time, that children should be children, and that he and his six sisters all remained unmarried point to some kind of childhood abuse - or was this all simply a mixture of moving with the times and medieval high religiosity.</span><br data-dcnode-id="2816"><br data-dcnode-id="2815"><span data-dcnode-id="2814" instrument_node="">Pierre de Luxemburg, a devout child who became a bishop in his teens, now sounds like someone who never had the chance to reject a childhood obsessive special interest because he lived in a society that valued it so highly (and because he was of a social class readily funnelled into the Church) - or, more positively, like a young elite sportsperson of the present, for whom careers follow a similar path. It sounds odd to us because we expect church leaders to have life experience and a wisdom attendant on that. There is perhaps much greater scepticism now that very young people can have such general moral wisdom - though if they are campaigners for a specific cause, such as Greta Thunberg and Malala Yousufzai, there is an exception. Though the conflict around Joan of Arc shows that in the late middle ages it was by no means a given, and could be an even more dangerous political football.</span><br data-dcnode-id="2813"><br data-dcnode-id="2812"><span data-dcnode-id="2811" instrument_node="">Despite the space given to political history, Tuchman is good at showing how different the medieval mindset was from that of late 20th century westerners, even if some of the details don't quite match up with contemporary scholarship. It seems to be unfashionable currently in the history field to connect the youthfulness of the medieval population as a whole, and of rulers and military commanders, to the violence and recklessness of the society as a whole ("a total lack of inhibition was characteristic of persons born to rule", she says, and the brawling of medieval and early modern young men in towns, students and apprentices, is well known to anyone who's had a cursory look at the era). Though I've never seen anything solidly refute this theory, and academic political sociology that connects "youth bulges" in modern populations with popular unrest and revolution, e.g. the Arab Spring, seems to tally with what was said in Tuchman's time about medieval Europe.</span><br data-dcnode-id="2810"><br data-dcnode-id="2809"><span data-dcnode-id="2808" instrument_node="">Those savage communal games I mentioned in my first paragraph were just one of the manifestations of the normality of violence in medieval society. Whilst Tuchman condemns the cruelty, she also says "adults' play requires constant new excesses" - which sounds very 1970s, seen from the perspective of the late 2010s and early 2020s when many educated young people are questioning the mores of the sexual revolution, which held sway for going the previous half century.</span><br data-dcnode-id="2807"><br data-dcnode-id="2806"><span data-dcnode-id="2805" instrument_node="">But her most interesting thesis about medieval culture and mentality is that it was constantly clashing and disharmonious. Emblematic of this is the entire complex ideal and scheme of courtly love: the only romantic love approved of, especially in the aristocratic cultural milieu, was guilty love, which was illegal and shameful in reality. I hadn't looked at the courtly love phenomenon that way before - and whilst it is an interesting theory, I wonder what counter-evidence is omitted: there are always some mentions of love marriages in medieval literature. Civilisation, she says, has always found it difficult to incorporate passionate love. In my twenties, after childhood and teen years absorbing too many of what I thought were social norms from books, films, and the media, I slowly discovered, sometimes via difficult experiences, how different these could be from what was actually acceptable and likeable behaviour in the real world. I'd always thought of this as a phenomenon which couldn't have happened before the 19th century - but Ehrehreich makes it sound as if the literary and musical culture of medieval courtly love was big enough among some social circles for it to create a somewhat similar tension between different layers of norms found in socially influential fiction and in reality and law. </span><br data-dcnode-id="2804"><br data-dcnode-id="2803"><span data-dcnode-id="2802" instrument_node="">Similarly, there were massive contradictions between the pacifist doctrines of original Christianity and the widely sanctioned and normalised violence of the society to which they had been introduced several centuries earlier - and of course many caveats and exceptions were made to allow the two to coexist. Some nobles' projects to mitigate brutality and and going to war - such as endowing monasteries and having prayers said for their souls - sound to me like the medieval version of carbon offsets, used to supposedly make up for environmental damage caused by the lifestyles of the rich and famous and products of large corporations: an artificial exercise in balancing the books which serves only to appease the conscience without actually undoing the effects of actions. But sin was inescapable in everyday life and they were trying to do what they thought was their best, even whilst somewhat humbler others were acting better in reality - it is much like a large carbon footprint is inescapable if you live in a Western country; there are parallels cutting both ways, I think.</span><br data-dcnode-id="2801"><br data-dcnode-id="2800"><span data-dcnode-id="2799" instrument_node="">Away from the political history, there is plenty of interesting material, among them these few metaphors and factoids I liked too much not to note here: the textile industry as the automobile industry of the middle ages; that a few places already had kitchen sinks and drainage pipes; that the dead were expected to rise at age 33 at the Day of Judgement - the age of Christ at his death; that the Husite rebels were the first military force to regularly use handheld firearms. There is also a little analysis of social change as affecting ethnic and religious minorities, though not as much as is now expected: for example, a reminder that the rise of Christian moneylenders like the Lombards was related to the decline in status and expulsion of Jews from many Western European countries.</span><br data-dcnode-id="2798"><br data-dcnode-id="2797"><span data-dcnode-id="2796" instrument_node="">But many readers of the early 2020s may be most interested in a book on 14th century Europe because it inevitably deals with that greatest known human epidemic, the Black Death. And </span><i data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">A Distant Mirror</span></i><span data-dcnode-id="2793" instrument_node=""> does it pretty well, especially considering its age. I've read and heard so much about the Black Death since my teens, before, after and during my history degree, that I don't expect to hear anything new in most popular histories, but I found it interesting that Tuchman pointed out that propitiatory processions could (counterproductively) cause outbreaks. And perhaps not surprising given the turn to Marxist interpretations of history during the twentieth century, but it was good to point out chroniclers who noted that the poor were worse affected by the plague. Looking forward, the sins of greed and personal display (in effect early consumerism) that some blamed for the outbreak can be seen as leading to modernity and worse despoliation of nature. </span><br data-dcnode-id="2792"><br data-dcnode-id="2791"><span data-dcnode-id="2790" instrument_node="">When the material is interesting, Tuchman has a stirring sense of time and place and how people fit in, and are shaped by them: </span><i data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">If there have been mute inglorious Miltons in rural villages, presumably there have been unrealized Washingtons born in unpropitious times.</span></i><span data-dcnode-id="2787" instrument_node=""> (after Grey's Elegy. And her book became famous enough to have spawned its own references, such as Neil Gaiman titling one of his Sandman stories, 'Distant Mirrors - Thermidor'. But, especially nowadays, not all readers will enjoy a book with so much of an old-school aristo-male political focus alongside the social history. If you want to read only one popular general history about life in 14th century Western Europe, it should probably be Ian Mortimer's </span><i data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">Time Traveller's Guide to Medieval England</span></i><span data-dcnode-id="2784" instrument_node=""> (2009), which, whilst still having some male bias, is more recent, therefore more accurate according to current scholarship, and more detailed about social history, and personally involving, yet does also touch on details of politics and nobility.</span><br data-dcnode-id="2783"><br data-dcnode-id="2782"><span data-dcnode-id="2781" instrument_node="">(listened March - April 2021, review May-Oct 2021)</span></span><span data-dcnode-id="2779" instrument_node="">

</span><span data-dcnode-id="2686" id="freeText158178986950969614" style="display:none"><span data-dcnode-id="2687" instrument_node="">One way to get a grip on some history is to take on the personalities of the day. Read around Richard III and - love him or hate him - along the way you’re not only going to get into the foreground detail of the Wars of the Roses, you’ll begin making some sense of the backstory of the Plantaget dynasty. It’s the same with Barbara Tuchman’s terrific idea of approaching the war and politics of 14th century Europe, through just one man - Enguerrand de Coucy - whose lifetime fits so perfectly with the story she wants to relate. It’s a stroke of near-genius, and one that brings an intricate account to sparkling life. There is, after all, so much to tell. The towering, imperious Enguerrand is her path to a sweeping review of international power struggle, intrigue and bloody conflict; the persecutions and plagues, dynastic marriages, petty bickering and shattering squabbles of a bare-knuckle century. In this landscape, no-one escapes the fallout when great names act. The history grips like a vice. The writing of it in A Distant Mirror is magnificent. Read anything Barbara Tuchman puts her pen to. </span></span><span data-dcnode-id="2685" instrument_node="">

</span><span data-dcnode-id="2610" id="freeTextContainer5776715287368217044"><span data-dcnode-id="2611" instrument_node="">A Distant Mirror is a highly readable tour through what the author describes as the “calamitous 14th century.” This is an apt description for a period that included the start of the Hundred Years War, the Black Death, two competing Papacies and popular uprisings like the Peasant’s Revolt in England and the Jacquerie in France. Much of the narrative follows the life of a single French nobleman, the Sire de Coucy. Tuchman has an eye for the bizarre and strange, focusing on the periods many villain</span></span><span data-dcnode-id="2609" instrument_node="">
</span><span data-dcnode-id="2603" id="freeText5776715287368217044" style="display:none"><span data-dcnode-id="2608" instrument_node="">A Distant Mirror is a highly readable tour through what the author describes as the “calamitous 14th century.” This is an apt description for a period that included the start of the Hundred Years War, the Black Death, two competing Papacies and popular uprisings like the Peasant’s Revolt in England and the Jacquerie in France. Much of the narrative follows the life of a single French nobleman, the Sire de Coucy. Tuchman has an eye for the bizarre and strange, focusing on the periods many villains, like the splendidly evil scheming poisoner Charles of Navarre.</span><br data-dcnode-id="2607"><br data-dcnode-id="2606"><span data-dcnode-id="2605" instrument_node="">It is a colourful romp through history, rather than serious scholarship. The writer’s attitudes to the period seems very conventional, conforming to the medieval world I grew up with watching Errol Flynn films and reading Walter Scott. But history at its best should surprise and challenge the assumptions and prejudices of the reader, making them see the past with fresh eyes. That was lacking in A Distant Mirror. It is a fun book, both pacey and interesting and certainly a good read, but falls a little short for me.</span><br data-dcnode-id="2604"></span><span data-dcnode-id="2602" instrument_node="">

</span><span data-dcnode-id="2502" id="freeText6928436381588037130" style="display:none"><span data-dcnode-id="2506" instrument_node="">This introduction to the 14th century uses the biographical framework of the life of the seigneur of Coucy to take in aspects of the hundred years war, the crusade of Nicopolis and late medieval life generally.</span><br data-dcnode-id="2505"><br data-dcnode-id="2504"><span data-dcnode-id="2503" instrument_node="">That's what the book is and that is the problem I suspect, in that the Tuchman style much loved in great fat book about the First World War and the period preceding it does not work in a period without the same wealth of information, you can not recapture the sense of immediacy and driving rapid narrative without the mass of detail to illustrate an intense story taking place over a short length of time. The era of the Black Death, has its drama but it is rather spread out, and while the seigneur of Coucy was a real person, we can't feel that we know him or have been with him on life's journey for all Tuchman's literary skills. </span></span><span data-dcnode-id="2501" instrument_node="">

</span><span data-dcnode-id="2420" id="freeTextContainer4923146755434182040"><span data-dcnode-id="2421" instrument_node="">Beutifully written and very detailed book. Recommended to all people genuinely interested in the history of the period. It is not about knights in gleaming armour rescuing and seducing defenseless ladies, but about a potent and credible mixture of well researched historical truth and good story-telling. A classic. If you want to get a good understanding of 14 Century Europe this is a book for you (it gets a little long and dense at times, but overall it is a rewarding read). </span></span><span data-dcnode-id="2419" instrument_node="">

</span><span data-dcnode-id="2320" id="freeTextContainer16290524775099898315"><span data-dcnode-id="2321" instrument_node="">Look around you, your friends, family, neighborhood, school, town, state, country. Now imagine 40-50% of them are gone forever. Empty chairs, rooms, houses, fields, roads, etc. What you see is what happened in the 14th Century as the Black Death, war, brigandage, famine, poverty ravaged the population of Europe. Tuchman brings this world alive with incredible detail, following the story of one French nobleman. Not always riveting reading but well worth the effort—it took me over a month to final</span></span><span data-dcnode-id="2319" instrument_node="">
</span><span data-dcnode-id="2153" id="freeText16290524775099898315" style="display:none"><span data-dcnode-id="2318" instrument_node="">Look around you, your friends, family, neighborhood, school, town, state, country. Now imagine 40-50% of them are gone forever. Empty chairs, rooms, houses, fields, roads, etc. What you see is what happened in the 14th Century as the Black Death, war, brigandage, famine, poverty ravaged the population of Europe. Tuchman brings this world alive with incredible detail, following the story of one French nobleman. Not always riveting reading but well worth the effort—it took me over a month to finally slog through. The final battle against the Turks was emblematic of the entire period, hubris and the vanity of the so-called nobility is shattered on the battlefield. So much death and destruction. I won’t attempt a detailed review of the book—there are so many good ones already. Just a few excerpts that I found especially interesting. Overall </span><b data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node=""> 5 Stars</span></b><span data-dcnode-id="2315" instrument_node=""> but at times seems like homework rather than fun.</span><br data-dcnode-id="2314"><br data-dcnode-id="2313"><span data-dcnode-id="2312" instrument_node="">Tuchman’s law is now multiplied by a factor of 24/7 X 365 with the advent of talking heads on cable: </span><br data-dcnode-id="2311"><a class="jsShowSpoiler spoilerAction" data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="2299" style="display: none"><span data-dcnode-id="2308" instrument_node="">[
  </span><i data-dcnode-id="2304"><span data-dcnode-id="2307" instrument_node=""> Disaster is rarely as pervasive as it seems from recorded accounts. The fact of being on the record makes it appear continuous and ubiquitous whereas it is more likely to have been sporadic both in time and place. Besides, persistence of the normal is usually greater than the effect of disturbance, as we know from our own times. After absorbing the news of today, one expects to face a world consisting entirely of strikes, crimes, power failures, broken water mains, stalled trains, school shutdowns, muggers, drug addicts, neo-Nazis, and rapists. The fact is that one can come home in the evening-on a lucky day-without having encountered more than one or two of these phenomena. This has led me to formulate Tuchman’s Law, as follows: </span><b data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">“The fact of being reported multiplies the apparent extent of any deplorable development by five to tenfold” (or any figure the reader would care to use)”</span></b></i><span data-dcnode-id="2303" instrument_node="">
</span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="2300" instrument_node="">]</span></span><br data-dcnode-id="2298"><br data-dcnode-id="2297"><span data-dcnode-id="2296" instrument_node="">Illuminating explanation of the eventual corruption of the Catholic Church in the Middle Ages:</span><br data-dcnode-id="2295"><a class="jsShowSpoiler spoilerAction" data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="2270" style="display: none"><span data-dcnode-id="2292" instrument_node="">[
  </span><i data-dcnode-id="2275"><span data-dcnode-id="2291" instrument_node=""> By Constantine’s gift, Christianity was both officially established and fatally compromised. As William Langland wrote, </span><br data-dcnode-id="2290"><br data-dcnode-id="2289"><b data-dcnode-id="2279"><span data-dcnode-id="2288" instrument_node="">When the kindness of Constantine gave Holy Church endowments </span><br data-dcnode-id="2287"><span data-dcnode-id="2286" instrument_node="">In lands and leases, lordships and servants, </span><br data-dcnode-id="2285"><span data-dcnode-id="2284" instrument_node="">The Romans heard an angel cry on high above them, </span><br data-dcnode-id="2283"><span data-dcnode-id="2282" instrument_node="">“This day dos ecclesiae has drunk venom </span><br data-dcnode-id="2281"><span data-dcnode-id="2280" instrument_node="">And all who have Peter’s power are poisoned forever.” </span></b><br data-dcnode-id="2278"><br data-dcnode-id="2277"><span data-dcnode-id="2276" instrument_node="">That conflict between the reach for the divine and the lure of earthly things was to be the central problem of the Middle Ages. The claim of the Church to spiritual leadership could never be made wholly credible to all its communicants when it was founded in material wealth. </span></i><span data-dcnode-id="2274" instrument_node="">
</span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="2271" instrument_node="">]</span></span><br data-dcnode-id="2269"><br data-dcnode-id="2268"><span data-dcnode-id="2267" instrument_node="">The idea of chivalry is much exaggerated. This Century was filled with bloodthirsty men with only one skill:</span><br data-dcnode-id="2266"><a class="jsShowSpoiler spoilerAction" data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="2222" style="display: none"><span data-dcnode-id="2263" instrument_node="">[
  </span><i data-dcnode-id="2227"><span data-dcnode-id="2262" instrument_node=""> …knight-chevalier in French-meant the man on horseback. “A brave man mounted on a good horse,” it was acknowledged, “can do more in an hour of fighting than ten or maybe one hundred could do afoot.” The destrier or war-horse was bred to be “strong, fiery, swift, and faithful” and ridden only in combat. Enroute the knight rode his palfrey, high-bred but of quieter disposition, while his squire led the destrier at his right hand-hence its name, from dexter. In fulfilling military service, horse and knight were considered inseparable; without a mount the knight was a mere man. </span><br data-dcnode-id="2261"><br data-dcnode-id="2260"><span data-dcnode-id="2259" instrument_node="">Battle was his exaltation. “If I had one foot already in Paradise,” exclaimed Garin li Loherains, the hero of a chanson de geste, “I would withdraw it to go and fight!” The troubadour Bertrand de Born, himself a noble, was more explicit. </span><br data-dcnode-id="2258"><br data-dcnode-id="2257"><b data-dcnode-id="2231"><span data-dcnode-id="2256" instrument_node="">My heart is filled with gladness when I see </span><br data-dcnode-id="2255"><span data-dcnode-id="2254" instrument_node="">Strong castles besieged, stockades broken and overwhelmed, many vassals struck down, </span><br data-dcnode-id="2253"><span data-dcnode-id="2252" instrument_node="">Horses of the dead and wounded roving at random. </span><br data-dcnode-id="2251"><span data-dcnode-id="2250" instrument_node="">And when battle is joined, let all men of good lineage </span><br data-dcnode-id="2249"><span data-dcnode-id="2248" instrument_node="">Think of naught but the breaking of heads and arms, </span><br data-dcnode-id="2247"><span data-dcnode-id="2246" instrument_node="">For it is better to die than be vanquished and live. </span><br data-dcnode-id="2245"><span data-dcnode-id="2244" instrument_node="">I tell you I have no such Joy as when I hear the shout </span><br data-dcnode-id="2243"><span data-dcnode-id="2242" instrument_node="">“On! On!” from both sides and the neighing of riderless steeds, And groans of ‘‘Help me! Help me!” </span><br data-dcnode-id="2241"><span data-dcnode-id="2240" instrument_node="">And when I see both great and small </span><br data-dcnode-id="2239"><span data-dcnode-id="2238" instrument_node="">Fall in the ditches and on the grass </span><br data-dcnode-id="2237"><span data-dcnode-id="2236" instrument_node="">And see the dead transfixed by spear shafts! </span><br data-dcnode-id="2235"><span data-dcnode-id="2234" instrument_node="">Lords, mortgage your domains, castles, cities, </span><br data-dcnode-id="2233"><span data-dcnode-id="2232" instrument_node="">But never give up war! </span></b><br data-dcnode-id="2230"><br data-dcnode-id="2229"><span data-dcnode-id="2228" instrument_node="">Dante pictured Bertrand in Hell, carrying his severed head before him as a lantern. </span></i><span data-dcnode-id="2226" instrument_node="">
</span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="2223" instrument_node="">]</span></span><br data-dcnode-id="2221"><br data-dcnode-id="2220"><span data-dcnode-id="2219" instrument_node="">These medieval people had a way with words and were not afraid of a little sexual innuendo:</span><br data-dcnode-id="2218"><a class="jsShowSpoiler spoilerAction" data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="2193" style="display: none"><span data-dcnode-id="2215" instrument_node="">[
  </span><i data-dcnode-id="2198"><span data-dcnode-id="2214" instrument_node=""> Isabella could well have listened to the tales of Jean de Condé, poet in her lifetime at her mother’s native court in Hainault. His style is illustrated by a story about a game of truth-telling played at court before a tournament. A knight, asked by the Queen if he has fathered any children, is forced to admit he has not, and indeed he </span><b data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">“did not have the look of a man who could please his mistress when he held her naked in his arms. For his beard was…little more than the kind of fuzz that ladies have in certain places.”</span></b><span data-dcnode-id="2211" instrument_node=""> The Queen tells him she does not doubt his word, </span><b data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">“for it is easy to judge from the state of the hay whether the pitchfork is any good.”</span></b><span data-dcnode-id="2208" instrument_node=""> In his turn, the knight asks, </span><b data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">“Lady, answer me without deceit. Is there hair between your legs?”</span></b><span data-dcnode-id="2205" instrument_node=""> When she replies, </span><b data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">“None at all,”</span></b><span data-dcnode-id="2202" instrument_node=""> he comments, </span><b data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">“Indeed I do believe you, for grass does not grow on a well-beaten path.”</span></b><span data-dcnode-id="2199" instrument_node=""> </span></i><span data-dcnode-id="2197" instrument_node="">
</span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="2194" instrument_node="">]</span></span><br data-dcnode-id="2192"><br data-dcnode-id="2191"><span data-dcnode-id="2190" instrument_node="">The third wave of the Plague resulted in extreme measures in some places:</span><br data-dcnode-id="2189"><a class="jsShowSpoiler spoilerAction" data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="2179" style="display: none"><span data-dcnode-id="2186" instrument_node="">[
  </span><i data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node=""> With the third advent of the plague, contagion was more strictly controlled if no better understood. While it raged in Milan, Bernabo ordered every victim to be taken out of the city and left to die or recover in the fields. Any person who nursed a plague patient was to be strictly quarantined for ten days; priests were to examine their parishioners for symptoms and report to a special commission under pain of death for failure; anyone who brought the disease into the city was subject to the death penalty and confiscation of property. Venice denied entry to all ships suspected of carrying infection, but with the flea and rat not yet implicated, the precautions, though groping in the right direction, failed to stop the carrier. At Piacenza, where Coucy’s war effort ended, half the population died, and at Pisa, where the plague lasted two years, it was said to have wiped out four fifths of the children. </span></i><span data-dcnode-id="2183" instrument_node="">
</span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="2180" instrument_node="">]</span></span><br data-dcnode-id="2178"><br data-dcnode-id="2177"><span data-dcnode-id="2176" instrument_node="">I thought Tuchman was very effective in explaining the Hundred Years’ War and all the conflicts around the continent. With all the battles and wars, you would think the knights and leaders would gain some expertise in going to war, but they don’t seem to: </span><br data-dcnode-id="2175"><br data-dcnode-id="2174"><a class="jsShowSpoiler spoilerAction" data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="2161" style="display: none"><span data-dcnode-id="2171" instrument_node="">[
  </span><i data-dcnode-id="2166"><span data-dcnode-id="2170" instrument_node=""> Although Anjou had proclaimed his intention to </span><b data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">“promote the fate of the Church by the force of chivalry”</span></b><span data-dcnode-id="2167" instrument_node="">-that is, by force of arms-he failed to exert that force against Urban. Leaving the coast at Ancona to cross the Apennines early in September, he bypassed the road to Rome, although a bold effort might have taken the city at this time. Agents had brought word that Hawkwood’s White Company, promised for Urban’s defense, had been held back by Florence for her own protection. Instead, against the advice of Amadeo of Savoy, Anjou took the lower road for Naples, and as the army passed through defiles and across gorges, between peaks “that touched the sky,” calamity overtook them. Highland brigands, pulled by strings from Naples, attacked the baggage train and the rear guard escorting the treasure, with the result that Anjou arrived at Caserta, within a day’s march of Naples, very much poorer than when he set out. Reconnoitering terrain in advance was not part of medieval warfare because it was not part of tournaments. The clash was everything. </span></i><span data-dcnode-id="2165" instrument_node="">
</span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="2162" instrument_node="">]</span></span><br data-dcnode-id="2160"><br data-dcnode-id="2159"><span data-dcnode-id="2158" instrument_node="">The Germans in WWI destroyed a great castle that helped focus the story in Tuchman’s book:</span><br data-dcnode-id="2157"><i data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">In 1917 Picardy, invaded once more, had been occupied for three years by the German army. Prince Rupprecht of Bavaria, commander of the Sixth Army, urged General Ludendorff, Chief of General Staff, to ensure that the castle of Coucy be spared as a unique architectural treasure of no current military value. Neither side, he pointed out, had attempted to use it for military purposes, and its destruction “would only mean a blow to our own prestige quite uselessly.” Ludendorff did not like appeals to culture. Coucy having been unwisely called to his attention, he decided to make it an example of superior values. Rammed with 28 tons of explosives at his orders, the colossus raised by Enguerrand III in the age of the greatest builders since Greece and Rome was dynamited to the ground. </span></i><br data-dcnode-id="2154"></span><span data-dcnode-id="2152" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="2068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/68583290-jamie-smith%3Fshelf%3Dhistory-medieval"><span data-dcnode-id="2069" instrument_node="">history-medieval</span></a><span data-dcnode-id="2067" instrument_node="">

</span><span data-dcnode-id="2056" id="freeTextContainer4857424959556049486"><span data-dcnode-id="2060" instrument_node="">It seems to every generation that its problems are the worst ever, that no one else has ever seen such an insurmountable combination of dire circumstances. And yet somehow, through all the greed, stupidity, and brutality, civilization has managed to hang on. Well, it has hung on so far, though it makes you wonder when the luck is going to run out….</span><br data-dcnode-id="2059"><br data-dcnode-id="2058"><span data-dcnode-id="2057" instrument_node="">Certainly the people of the fourteenth century would not have been impressed by today’s troubles. If the Black Death, which killed a third of Europe’s</span></span><span data-dcnode-id="2055" instrument_node="">
</span><span data-dcnode-id="2035" id="freeText4857424959556049486" style="display:none"><span data-dcnode-id="2054" instrument_node="">It seems to every generation that its problems are the worst ever, that no one else has ever seen such an insurmountable combination of dire circumstances. And yet somehow, through all the greed, stupidity, and brutality, civilization has managed to hang on. Well, it has hung on so far, though it makes you wonder when the luck is going to run out….</span><br data-dcnode-id="2053"><br data-dcnode-id="2052"><span data-dcnode-id="2051" instrument_node="">Certainly the people of the fourteenth century would not have been impressed by today’s troubles. If the Black Death, which killed a third of Europe’s inhabitants, were not enough, there were also the Hundred Years’ War, the Papal Schism, Islamic expansion, roving bands of killers who freelanced when there wasn’t a war to employ them, and a collection of kings and nobles so shortsighted and blitheringly idiotic that it is a wonder anything survived their incompetent attention.</span><br data-dcnode-id="2050"><br data-dcnode-id="2049"><span data-dcnode-id="2048" instrument_node="">Barbara Tuchman describes it all brilliantly. As with her other history books, it is written in a style that manages to be clear, evocative, and compelling, pulling the reader into the story.</span><br data-dcnode-id="2047"><br data-dcnode-id="2046"><span data-dcnode-id="2045" instrument_node="">Everything seemed to be falling apart. Peasants were taxed to the point of starvation, and the protection their taxes were supposed to provide them was a lie. They were at as much risk from the depredations of their own king’s forces as those of their enemies. Multiple popes were excommunicating each other’s followers, so no one could be sure where salvation lay. Even the local clergy, who might have been a source of comfort and strength, proved cowardly and venal. It is no wonder that people asked what good is religion, if it does nothing but add to people’s troubles.</span><br data-dcnode-id="2044"><br data-dcnode-id="2043"><span data-dcnode-id="2042" instrument_node="">This was the century of the battles of Crecy and Poitiers, dominated by the fearsome English longbow, capable of rapid fire and long range lethality. Both battles were decisive victories for the English but there was no qualitative difference between the nobility of the two countries. It was just a matter of who got to do the looting and exploiting.</span><br data-dcnode-id="2041"><br data-dcnode-id="2040"><span data-dcnode-id="2039" instrument_node="">It seems fitting that the century’s end coincided with the end of the Age of Crusades, in a catastrophic defeat of the Christian forces of France, England, Germany, Hungary and other nations by the Turks at the Battle of Nicopolis in 1396. Defeat was not inevitable but the leaders of the Christian forces were so enthralled by the idea of knight errantry and individual glory that they threw aside a plausible tactical plan to charge headlong into the enemy. The Ottomans made a good profit ransoming back the ones who survived.</span><br data-dcnode-id="2038"><br data-dcnode-id="2037"><span data-dcnode-id="2036" instrument_node="">One is tempted to just say good riddance to a bad century, and move on to the Reformation and the Renaissance. And yet, somehow, people managed to survive during those tumultuous times, albeit with short average lifespans. Families and crops were raised, and for those who could escape disease, starvation, and the depredations of rulers foreign and domestic, life went on. They were hardy people in those days, expecting little (and mostly getting nothing), and they provided the continuity that eventually led to more enlightened times. Barbara Tuchman brilliantly evokes their lives and struggles. There are plenty of other books about medieval times, but for the non-specialist, this is the one to start with.</span></span><span data-dcnode-id="2034" instrument_node="">

</span><span data-dcnode-id="1924" id="freeTextContainer2849980660875957355"><span data-dcnode-id="1927" instrument_node="">"</span><i data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">If the [century] seemed full of brilliance and adventure to a few at the top, to most they were a succession of wayward dangers; of the three galloping evils: pillage, plague, and taxes; of fierce and tragic conflicts, bizarre fates, capricious money, sorcery, betrayals, insurrections, murder, madness, and the downfall of princes; of dwindling labor for the fields, of cleared land reverting to waste; and always the recurring black shadow of pestilence carrying its message of guilt and sin and t</span></i></span><span data-dcnode-id="1923" instrument_node="">
</span><span data-dcnode-id="1871" id="freeText2849980660875957355" style="display:none"><span data-dcnode-id="1922" instrument_node="">"</span><i data-dcnode-id="1918"><span data-dcnode-id="1921" instrument_node="">If the [century] seemed full of brilliance and adventure to a few at the top, to most they were a succession of wayward dangers; of the three galloping evils: pillage, plague, and taxes; of fierce and tragic conflicts, bizarre fates, capricious money, sorcery, betrayals, insurrections, murder, madness, and the downfall of princes; of dwindling labor for the fields, of cleared land reverting to waste; and always the recurring black shadow of pestilence carrying its message of guilt and sin and the hostility of God.</span><br data-dcnode-id="1920"><span data-dcnode-id="1919" instrument_node="">Mankind was not improved by the message. Consciousness of wickedness made behavior worse. Violence threw off restraints. It was a time of default. Rules crumbled, institutions failed in their functions. Knighthood did not protect; the Church, more worldly than spiritual, did not guide the way to God; towns, once the agents of progress and the commonweal, were absorbed in mutual hostilities and divided by class war; the population, depleted by the Black Death, did not recover. The War of England and France and the brigandage it spawned revealed the emptiness of chivalry's military pretensions and the falsity of its moral ones. The [Papal] schism shook the foundations of the central institution, spreading a deep and pervasive uneasiness. People felt subject to events beyond their control, swept, like flotsam at sea, hither and yon in a universe without reason or purpose. They lived through a period which suffered and struggled without visible advance. They longed for a remedy, for a revival of faith, for stability and order that never came.</span></i><span data-dcnode-id="1917" instrument_node="">" </span><br data-dcnode-id="1916"><br data-dcnode-id="1915"><br data-dcnode-id="1914"><span data-dcnode-id="1913" instrument_node="">Don't think I can do better to summarize the topic of the book than the above quote, so that frees me to give general impressions and a sort-of explanation of why I have read it and will be turning my attention to more books on European history for the foreseeable future. </span><br data-dcnode-id="1912"><br data-dcnode-id="1911"><span data-dcnode-id="1910" instrument_node="">This book (and historian) was put to my attention by one </span><a data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/1214964.Ta_Nehisi_Coates" rel="nofollow noopener" title="Ta-Nehisi Coates"><span data-dcnode-id="1909" instrument_node="">Ta-Nehisi Coates</span></a><span data-dcnode-id="1907" instrument_node="">, who read it for similar reasons I have read it. It's charting of the decline of the medieval era is breath-taking. Tuchman, who is known more for her books on 20th century warfare, did an amazing job here. She has written an engaging, down-to-earth history, of the 14th century. Like </span><a data-dcnode-id="1905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/8439908.Edward_E__Baptist" rel="nofollow noopener" title="Edward E. Baptist"><span data-dcnode-id="1906" instrument_node="">Edward E. Baptist</span></a><span data-dcnode-id="1904" instrument_node="">, she recounts the history but is not afraid to commentate on the folly of it. She uses the life of a French nobleman--Enguerrand VII, Sire (Lord) of Coucy &amp; Count of Soissons--to tell the greater story of this time of woe. Rarely do historical eras transition peacefully and the end of the Middle Ages was a very violent 150 years. Though it did have some interesting writers like </span><a data-dcnode-id="1902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/72460.Francesco_Petrarca" rel="nofollow noopener" title="Francesco Petrarca"><span data-dcnode-id="1903" instrument_node="">Petrarch</span></a><span data-dcnode-id="1901" instrument_node="">, </span><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/1838.Geoffrey_Chaucer" rel="nofollow noopener" title="Geoffrey Chaucer"><span data-dcnode-id="1900" instrument_node="">Geoffrey Chaucer</span></a><span data-dcnode-id="1898" instrument_node="">, </span><a data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/29227.Giovanni_Boccaccio" rel="nofollow noopener" title="Giovanni Boccaccio"><span data-dcnode-id="1897" instrument_node="">Giovanni Boccaccio</span></a><span data-dcnode-id="1895" instrument_node="">, and </span><a data-dcnode-id="1893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/242147.William_Langland" rel="nofollow noopener" title="William Langland"><span data-dcnode-id="1894" instrument_node="">William Langland</span></a><span data-dcnode-id="1892" instrument_node="">, it was a time of plague and nearly every person with authority being enslaved to the worst myths of chivalry and their own egos. The three most capable heads of state during the century were King Edward III of England, King Charles V of France, and Duke Gian Galeazzo Visconti of Milan. They weren't "good guys," because such does not exist in the politics of any age, but they were by far the most competent in their prime. The one factor in their favor was that they either subverted or (in the case of Charles V) did not subscribe to the chivalric code--the dominant and destructive ideology of the era. The Sire de Coucy's success during the century was in-part because he only used chivalry as a last resort in all matters. His reliance on practical wisdom and personal charisma saved him from the brutal fate of many of his contemporaries, but his obedience to the code at the end of the century during the Nicopolis Crusade cost him his life. </span><br data-dcnode-id="1891"><br data-dcnode-id="1890"><span data-dcnode-id="1889" instrument_node="">Here is a clip of Tuchman being interviewed on the book and some of her other works: </span><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archive.org/details/openmind_ep1405" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1888" instrument_node="">https://archive.org/details/openmind_...</span></a><br data-dcnode-id="1886"><br data-dcnode-id="1885"><span data-dcnode-id="1884" instrument_node="">My reason for reading this (and my plan for reading more European history) is a rather simple one. In becoming ever more versed in history and growing up being educated in African-American history and </span><s data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">white-American</span></s><span data-dcnode-id="1881" instrument_node=""> mainstream/general-American history, I felt like I was seeing a picture, but not fully. I've spent almost thirty years of my life seeing the "effect," now I want to know the "cause." Sun Tzu says " know your enemy, know yourself." </span><a data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/8113026.Conversations_With_Myself" rel="nofollow noopener" title="Conversations With Myself by Nelson Mandela"><span data-dcnode-id="1880" instrument_node="">I read Nelson Mandela's story</span></a><span data-dcnode-id="1878" instrument_node=""> of studying the works and language of the Afrikaners in jail to better understand the people who he was dealing with. So I have taken-up this challenge. When one reads the news and sees what's happening now, it becomes apparent that the mirror is much closer than it was when Tuchman wrote this book. In </span><a data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/11486.The_Color_Purple" rel="nofollow noopener" title="The Color Purple by Alice Walker"><span data-dcnode-id="1877" instrument_node="">The Color Purple</span></a><span data-dcnode-id="1875" instrument_node="">, the protagonist tells the antagonist that everything he's done to her, he's already done to himself. My educated-guess is that that's true here too, given the treatment of villens and Jews described in this book.</span><br data-dcnode-id="1874"><br data-dcnode-id="1873"><span data-dcnode-id="1872" instrument_node="">I had thought to put more and make this a thorough review, but I think this sums-up my thoughts directly, anymore is just wasting all our time.</span></span><span data-dcnode-id="1870" instrument_node="">
