cnode-id="2242" instrument_node="">D530 .T8 1994</span></td></tr></tbody></table><span data-dcnode-id="2237" instrument_node="">
</span><p data-dcnode-id="2217"><i data-dcnode-id="2234"><b data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">The Guns of August</span></b></i><span data-dcnode-id="2233" instrument_node=""> (1962) (published in the UK as </span><i data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">August 1914</span></i><span data-dcnode-id="2230" instrument_node="">) is a volume of history by </span><a data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barbara_W._Tuchman" title="Barbara W. Tuchman"><span data-dcnode-id="2229" instrument_node="">Barbara W. Tuchman</span></a><span data-dcnode-id="2227" instrument_node="">. It is centered on the first month of </span><a data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="2226" instrument_node="">World War I</span></a><span data-dcnode-id="2224" instrument_node="">. After introductory chapters, Tuchman describes in great detail the opening events of the conflict. Its focus then becomes a </span><a data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_history" title="Military history"><span data-dcnode-id="2223" instrument_node="">military history</span></a><span data-dcnode-id="2221" instrument_node=""> of the contestants, chiefly the </span><a data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_power" title="Great power"><span data-dcnode-id="2220" instrument_node="">great powers</span></a><span data-dcnode-id="2218" instrument_node="">.
</span></p><p data-dcnode-id="2204"><i data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">The Guns of August</span></i><span data-dcnode-id="2214" instrument_node=""> thus provides a narrative of the earliest stages of World War I, from the decisions to go to war, up until the start of the </span><a data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Battle_of_the_Marne" title="First Battle of the Marne"><span data-dcnode-id="2213" instrument_node="">Franco-British offensive</span></a><span data-dcnode-id="2211" instrument_node=""> that stopped the </span><a data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Empire" title="German Empire"><span data-dcnode-id="2210" instrument_node="">German</span></a><span data-dcnode-id="2208" instrument_node=""> advance into </span><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Third_Republic" title="French Third Republic"><span data-dcnode-id="2207" instrument_node="">France</span></a><span data-dcnode-id="2205" instrument_node="">. The result was four years of trench warfare. In the course of her narrative Tuchman includes discussion of the plans, strategies, world events, and international sentiments before and during the war.
</span></p><p data-dcnode-id="2184"><span data-dcnode-id="2203" instrument_node="">The book was awarded the </span><a class="mw-redirect" data-dcnode-id="2201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pulitzer_Prize_for_General_Non-Fiction" title="Pulitzer Prize for General Non-Fiction"><span data-dcnode-id="2202" instrument_node="">Pulitzer Prize for General Non-Fiction</span></a><span data-dcnode-id="2200" instrument_node=""> for publication year 1963,</span><sup class="reference" data-dcnode-id="2197" id="cite_ref-1"><a data-dcnode-id="2198" href="#cite_note-1"><span data-dcnode-id="2199" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2196" instrument_node=""> and proved very popular. Tuchman later returned to the subject of the social attitudes and issues that existed before World War I, which she had touched upon in </span><i data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">The Guns of August</span></i><span data-dcnode-id="2193" instrument_node="">, in a collection of eight essays published in 1966 under the title </span><a data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Proud_Tower" title="The Proud Tower"><i data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">The Proud Tower: A Portrait of the World Before the War, 1890–1914</span></i></a><span data-dcnode-id="2189" instrument_node="">.</span><sup class="reference" data-dcnode-id="2186" id="cite_ref-2"><a data-dcnode-id="2187" href="#cite_note-2"><span data-dcnode-id="2188" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2185" instrument_node="">
</span></p><span data-dcnode-id="2183" instrument_node="">
