</span><h2 data-dcnode-id="2009"><span class="mw-headline" data-dcnode-id="2017" id="Summary"><span data-dcnode-id="2018" instrument_node="">Summary</span></span><span class="mw-editsection" data-dcnode-id="2010"><span class="mw-editsection-bracket" data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">[</span></span><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D1" title="Edit section: Summary"><span data-dcnode-id="2014" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2008" instrument_node="">
</span><h3 data-dcnode-id="1998"><span class="mw-headline" data-dcnode-id="2006" id="A_funeral"><span data-dcnode-id="2007" instrument_node="">A funeral</span></span><span class="mw-editsection" data-dcnode-id="1999"><span class="mw-editsection-bracket" data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">[</span></span><a data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D2" title="Edit section: A funeral"><span data-dcnode-id="2003" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1983"><span data-dcnode-id="1996" instrument_node="">In </span><a class="mw-redirect" data-dcnode-id="1994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Funeral_of_King_Edward_VII" title="Funeral of King Edward VII"><span data-dcnode-id="1995" instrument_node="">May 1910 the funeral of</span></a><span data-dcnode-id="1993" instrument_node=""> </span><a data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_VII" title="Edward VII"><span data-dcnode-id="1992" instrument_node="">Edward VII of the United Kingdom</span></a><span data-dcnode-id="1990" instrument_node=""> drew the presence of nine kings, one being </span><a class="mw-redirect" data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kaiser_Wilhelm_II" title="Kaiser Wilhelm II"><span data-dcnode-id="1989" instrument_node="">Kaiser Wilhelm II</span></a><span data-dcnode-id="1987" instrument_node=""> of Germany. Wilhelm, or William, was Edward's nephew. The opening chapter begins and ends with a description of the royal funeral and in between provides a discussion of the continent's political alliances and the diplomacy of royalty, all amidst the national rivalries, imperialism, and </span><a data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_Darwinism" title="Social Darwinism"><span data-dcnode-id="1986" instrument_node="">social Darwinism</span></a><span data-dcnode-id="1984" instrument_node=""> in the years leading up to the Great War (1914–1918).
</span></p><span data-dcnode-id="1982" instrument_node="">
</span><h3 data-dcnode-id="1972"><span class="mw-headline" data-dcnode-id="1980" id="Plans"><span data-dcnode-id="1981" instrument_node="">Plans</span></span><span class="mw-editsection" data-dcnode-id="1973"><span class="mw-editsection-bracket" data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">[</span></span><a data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D3" title="Edit section: Plans"><span data-dcnode-id="1977" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1971" instrument_node="">
</span><p data-dcnode-id="1963"><span data-dcnode-id="1970" instrument_node="">Chapters 2 to 5 are grouped into a section called "Plans". Addressed is prewar military planning, as done by the major powers in Europe. Included are the German </span><a class="mw-redirect" data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schlieffen_plan" title="Schlieffen plan"><span data-dcnode-id="1969" instrument_node="">Schlieffen plan</span></a><span data-dcnode-id="1967" instrument_node="">, France's offensive </span><a data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plan_XVII" title="Plan XVII"><span data-dcnode-id="1966" instrument_node="">Plan XVII</span></a><span data-dcnode-id="1964" instrument_node="">, joint British and French arrangements, and Russia's approach to a future European war.
</span></p><span data-dcnode-id="1962" instrument_node="">
</span><h3 data-dcnode-id="1952"><span class="mw-headline" data-dcnode-id="1960" id="Outbreak"><span data-dcnode-id="1961" instrument_node="">Outbreak</span></span><span class="mw-editsection" data-dcnode-id="1953"><span class="mw-editsection-bracket" data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">[</span></span><a data-dcnode-id="1956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D4" title="Edit section: Outbreak"><span data-dcnode-id="1957" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1951" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1950" instrument_node="">"Outbreak" starts with a short introduction, which briefly mentions the event that triggered World War I. On June 28, 1914, in </span><a data-dcnode-id="1948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarajevo" title="Sarajevo"><span data-dcnode-id="1949" instrument_node="">Sarajevo</span></a><span data-dcnode-id="1947" instrument_node="">, </span><a data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gavrilo_Princip" title="Gavrilo Princip"><span data-dcnode-id="1946" instrument_node="">Gavrilo Princip</span></a><span data-dcnode-id="1944" instrument_node="">, a Serbian nationalist, </span><a class="mw-redirect" data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assassination_of_Archduke_Franz_Ferdinand_of_Austria" title="Assassination of Archduke Franz Ferdinand of Austria"><span data-dcnode-id="1943" instrument_node="">assassinated</span></a><span data-dcnode-id="1941" instrument_node=""> the heir apparent to the throne of </span><a data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austria-Hungary" title="Austria-Hungary"><span data-dcnode-id="1940" instrument_node="">Austria-Hungary</span></a><span data-dcnode-id="1938" instrument_node="">, the </span><a data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Archduke_Franz_Ferdinand_of_Austria" title="Archduke Franz Ferdinand of Austria"><span data-dcnode-id="1937" instrument_node="">Archduke Franz Ferdinand</span></a><span data-dcnode-id="1935" instrument_node=""> and his wife </span><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sophie%2C_Duchess_of_Hohenberg" title="Sophie, Duchess of Hohenberg"><span data-dcnode-id="1934" instrument_node="">Sophie, Duchess of Hohenberg</span></a><span data-dcnode-id="1932" instrument_node="">. European-wide diplomacy and military preparations during July are then referenced.
</span></p><p data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Chapters 6 to 9 commence with August 1914. Discussed and probed are maneuvers by leading politicians, diplomatic affairs, and actions undertaken by various armies, during the opening days of the war, August 1 to August 4. Covered are the Kaiser's hesitation, the struggle by Russia to ensure that its ally, France, would join in the war, France's attempts to win a guarantee from Britain of her involvement, and Germany's ultimatum to Belgium.
</span></p><span data-dcnode-id="1928" instrument_node="">
</span><h3 data-dcnode-id="1918"><span class="mw-headline" data-dcnode-id="1926" id="Battle"><span data-dcnode-id="1927" instrument_node="">Battle</span></span><span class="mw-editsection" data-dcnode-id="1919"><span class="mw-editsection-bracket" data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">[</span></span><a data-dcnode-id="1922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D5" title="Edit section: Battle"><span data-dcnode-id="1923" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1917" instrument_node="">
</span><p data-dcnode-id="1905"><span data-dcnode-id="1916" instrument_node="">The bulk of the remainder of the book, chapters 10 to 22, is essentially devoted to the battles and tactical planning on two fronts, the </span><a class="mw-redirect" data-dcnode-id="1914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Front_%28WWI%29" title="Western Front (WWI)"><span data-dcnode-id="1915" instrument_node="">Western</span></a><span data-dcnode-id="1913" instrument_node=""> (chapters 11 to 14, 17, and 19 to 22) and the </span><a class="mw-redirect" data-dcnode-id="1911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Front_%28WWI%29" title="Eastern Front (WWI)"><span data-dcnode-id="1912" instrument_node="">Eastern</span></a><span data-dcnode-id="1910" instrument_node=""> (chapters 15 and 16). However, Austria, and the Balkans, are omitted.</span><sup class="reference" data-dcnode-id="1907" id="cite_ref-3"><a data-dcnode-id="1908" href="#cite_note-3"><span data-dcnode-id="1909" instrument_node="">[Notes 1]</span></a></sup><span data-dcnode-id="1906" instrument_node=""> Chapters 10 and 18 are devoted to the war at sea.
</span></p><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Intertwined in the narration are the adverse effects of the vanity of the various leaders and insubordination. Also addressed are some perceptions made among those in the rest of the world, including a critical interpretation of events that cemented various political views (such as chapter 17). The short "Afterword" then reflects on events of August 1914.
</span></p><span data-dcnode-id="1902" instrument_node="">
</span><h4 data-dcnode-id="1892"><span class="mw-headline" data-dcnode-id="1900" id="Mediterranean"><span data-dcnode-id="1901" instrument_node="">Mediterranean</span></span><span class="mw-editsection" data-dcnode-id="1893"><span class="mw-editsection-bracket" data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">[</span></span><a data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D6" title="Edit section: Mediterranean"><span data-dcnode-id="1897" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1867"><span data-dcnode-id="1890" instrument_node="">Tuchman starts the "Battle" section by covering the </span><a data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pursuit_of_Goeben_and_Breslau" title="Pursuit of Goeben and Breslau"><span data-dcnode-id="1889" instrument_node="">search by Allied naval forces</span></a><span data-dcnode-id="1887" instrument_node=""> for the German </span><a data-dcnode-id="1885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battlecruiser" title="Battlecruiser"><span data-dcnode-id="1886" instrument_node="">battlecruiser</span></a><span data-dcnode-id="1884" instrument_node=""> </span><a data-dcnode-id="1881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SMS_Goeben" title="SMS Goeben"><i data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">Goeben</span></i></a><span data-dcnode-id="1880" instrument_node=""> in the Mediterranean (chapter 10). The </span><i data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Goeben</span></i><span data-dcnode-id="1877" instrument_node=""> finally took refuge in the </span><a data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dardanelles" title="Dardanelles"><span data-dcnode-id="1876" instrument_node="">Dardanelles</span></a><span data-dcnode-id="1874" instrument_node="">, waters of the then neutral </span><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman_Empire" title="Ottoman Empire"><span data-dcnode-id="1873" instrument_node="">Ottoman Empire</span></a><span data-dcnode-id="1871" instrument_node="">. Such naval actions set off diplomatic maneuvers, but the event precipitated Turkey's entry into the war on the side of Germany. The development worked to block Russian import/export via its year-round ports on the Black Sea. That, in turn, led to the disastrous </span><a class="mw-redirect" data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gallipoli_Campaign" title="Gallipoli Campaign"><span data-dcnode-id="1870" instrument_node="">Gallipoli Campaign</span></a><span data-dcnode-id="1868" instrument_node="">.
</span></p><span data-dcnode-id="1866" instrument_node="">
</span><h4 data-dcnode-id="1856"><span class="mw-headline" data-dcnode-id="1864" id="Western_Front"><span data-dcnode-id="1865" instrument_node="">Western Front</span></span><span class="mw-editsection" data-dcnode-id="1857"><span class="mw-editsection-bracket" data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">[</span></span><a data-dcnode-id="1860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D7" title="Edit section: Western Front"><span data-dcnode-id="1861" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1855" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1854" instrument_node="">Chapters 11 to 14 cover the war in western Europe. First discussed are the German invasion northeast of Belgium and the general </span><a data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Front_%28World_War_I%29" title="Western Front (World War I)"><span data-dcnode-id="1853" instrument_node="">Western Front</span></a><span data-dcnode-id="1851" instrument_node="">, especially the situation in Alsace. Next, Tuchman describes the arrival in France of the </span><a data-dcnode-id="1849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Expeditionary_Force_%28World_War_I%29" title="British Expeditionary Force (World War I)"><span data-dcnode-id="1850" instrument_node="">British Expeditionary Force</span></a><span data-dcnode-id="1848" instrument_node=""> (chapter 12).
</span></p><p data-dcnode-id="1839"><span data-dcnode-id="1846" instrument_node="">As they crossed the Belgian frontier, the German armies were engaged by the Belgian army in front of Liège, and in the east of France, by five French armies, and in the south of Belgium, by four British divisions (known as the </span><a data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Expeditionary_Force_%28World_War_I%29" title="British Expeditionary Force (World War I)"><span data-dcnode-id="1845" instrument_node="">British Expeditionary Force</span></a><span data-dcnode-id="1843" instrument_node="">). The French were said to be labouring under the delusion that Gallic élan would be crucial in countering German attacks while the British fought hard at the </span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Mons" title="Battle of Mons"><span data-dcnode-id="1842" instrument_node="">Battle of Mons</span></a><span data-dcnode-id="1840" instrument_node="">. In August, each side deployed its armed forces in order to effect its own strategies developed in advance of the war (discussed in "Plans").
</span></p><p data-dcnode-id="1828"><span data-dcnode-id="1838" instrument_node="">The French High Command had made incomplete allowances for dealing with the large massed attack by the German army, which now came quickly bearing down on them. It was perhaps through the decisions of </span><a data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Lanrezac" title="Charles Lanrezac"><span data-dcnode-id="1837" instrument_node="">Charles Lanrezac</span></a><span data-dcnode-id="1835" instrument_node="">, the French Fifth Army commander,who acted in a timely fashion before getting permission from </span><a data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Joffre" title="Joseph Joffre"><span data-dcnode-id="1834" instrument_node="">Joseph Joffre</span></a><span data-dcnode-id="1832" instrument_node="">, that the entire French line was eventually saved from envelopment and general collapse. Although his pleas were ignored, Lanrezac withdrew his forces at </span><a data-dcnode-id="1830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Charleroi" title="Battle of Charleroi"><span data-dcnode-id="1831" instrument_node="">Charleroi</span></a><span data-dcnode-id="1829" instrument_node=""> from an untenable position and probable destruction, and he redeployed them more favorably. He was later relieved of command.
</span></p><p data-dcnode-id="1823"><span data-dcnode-id="1827" instrument_node="">The Battle of the Frontiers was brutal. The Belgian army was rushed against the German army, but the Allies were forced to retreat slowly under the German onslaught until the Germans were within 40 miles (64&nbsp;km) of Paris. The city was saved through the courage and verve of a semiretired territorial general, </span><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Gallieni" title="Joseph Gallieni"><span data-dcnode-id="1826" instrument_node="">Joseph Gallieni</span></a><span data-dcnode-id="1824" instrument_node="">, who marshalled his limited resources and saved the day. The city was preparing for siege and possible complete destruction, and the government had fled south, when two divisions of reserves suddenly arrived and were rushed to the front by the city's fleet of 600 taxi cabs. Tuchman cynically notes that Joffre later took complete credit for saving Paris and the French army after having the commander who ordered the tactical retreat, Lanrezac, relieved of duty and the old commander and his former superior, Gallieni, pushed back into obscurity.
</span></p><p data-dcnode-id="1818"><span data-dcnode-id="1822" instrument_node="">Tuchman is also careful to point out that although many of Joffre's actions were shameful, when he was finally pushed into action, he showed great skill in guiding the hastily improvised counterblow that crashed into the invader's flank. The Germans greatly contributed to their own undoing by outrunning their supply lines, pushing their infantry to the point of physical collapse and deviating from the original invasion plan, which called for the right flank to be protected from counterattack. At that stage of its offensive, the German army lacked the troops used by the siege of the fortress of Antwerp, held by the Belgian army. Both sides were plagued by poor communication and general staffs that were heavily invested with politics and </span><a data-dcnode-id="1820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sycophancy" title="Sycophancy"><span data-dcnode-id="1821" instrument_node="">sycophancy</span></a><span data-dcnode-id="1819" instrument_node="">. Dire warnings from commanders in the field were ignored when they did not fit preconceived notions of quick victory at low cost.
</span></p><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Tuchman introduces all of the key players, both the Allied (French, British, Belgian and Russian) and the German commanders. Their personalities, strengths, and weaknesses are discussed.
</span></p><span data-dcnode-id="1815" instrument_node="">
</span><ul data-dcnode-id="1756"><li data-dcnode-id="1809"><a data-dcnode-id="1813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Joffre" title="Joseph Joffre"><span data-dcnode-id="1814" instrument_node="">Joseph Joffre</span></a><span data-dcnode-id="1812" instrument_node="">, French General, Chief of Staff of the </span><a data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grand_Quartier_G%25C3%25A9n%25C3%25A9ral_%281914%25E2%2580%25931919%29" title="Grand Quartier Général (1914–1919)"><span data-dcnode-id="1811" instrument_node="">Grand Quartier Général</span></a></li><span data-dcnode-id="1808" instrument_node="">
</span><li data-dcnode-id="1802"><a class="mw-redirect" data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Horatio_Kitchener%2C_1st_Earl_Kitchener_of_Khartoum" title="Horatio Kitchener, 1st Earl Kitchener of Khartoum"><span data-dcnode-id="1807" instrument_node="">Lord Kitchener</span></a><span data-dcnode-id="1805" instrument_node="">, the British </span><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secretary_of_State_for_War" title="Secretary of State for War"><span data-dcnode-id="1804" instrument_node="">Secretary of State for War</span></a></li><span data-dcnode-id="1801" instrument_node="">
</span><li data-dcnode-id="1795"><a data-dcnode-id="1799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Helmuth_von_Moltke_the_Younger" title="Helmuth von Moltke the Younger"><span data-dcnode-id="1800" instrument_node="">Helmuth von Moltke</span></a><span data-dcnode-id="1798" instrument_node="">, Chief of the </span><a data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_General_Staff" title="German General Staff"><span data-dcnode-id="1797" instrument_node="">German General Staff</span></a></li><span data-dcnode-id="1794" instrument_node="">
</span><li data-dcnode-id="1790"><a data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_von_Kluck" title="Alexander von Kluck"><span data-dcnode-id="1793" instrument_node="">Alexander von Kluck</span></a><span data-dcnode-id="1791" instrument_node="">, commander of the German far right wing</span></li><span data-dcnode-id="1789" instrument_node="">
</span><li data-dcnode-id="1779"><a class="mw-redirect" data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wilhelm_II_of_Germany" title="Wilhelm II of Germany"><span data-dcnode-id="1788" instrument_node="">Wilhelm II</span></a><span data-dcnode-id="1786" instrument_node="">, </span><a data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Emperor" title="German Emperor"><span data-dcnode-id="1785" instrument_node="">German Emperor</span></a><span data-dcnode-id="1783" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/King_of_Prussia" title="King of Prussia"><span data-dcnode-id="1782" instrument_node="">King of Prussia</span></a><span data-dcnode-id="1780" instrument_node=""> (aka "The Kaiser")</span></li><span data-dcnode-id="1778" instrument_node="">
</span><li data-dcnode-id="1772"><a data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albert_I_of_Belgium" title="Albert I of Belgium"><span data-dcnode-id="1777" instrument_node="">Albert I</span></a><span data-dcnode-id="1775" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/King_of_the_Belgians" title="King of the Belgians"><span data-dcnode-id="1774" instrument_node="">King of the Belgians</span></a></li><span data-dcnode-id="1771" instrument_node="">
</span><li data-dcnode-id="1757"><span data-dcnode-id="1770" instrument_node="">French President </span><a data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raymond_Poincar%25C3%25A9" title="Raymond Poincaré"><span data-dcnode-id="1769" instrument_node="">Raymond Poincaré</span></a><span data-dcnode-id="1767" instrument_node="">, Britain's </span><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Lord_of_the_Admiralty" title="First Lord of the Admiralty"><span data-dcnode-id="1766" instrument_node="">First Lord of the Admiralty</span></a><span data-dcnode-id="1764" instrument_node=""> </span><a data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Winston_Churchill" title="Winston Churchill"><span data-dcnode-id="1763" instrument_node="">Winston Churchill</span></a><span data-dcnode-id="1761" instrument_node="">, and a young soldier named </span><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_de_Gaulle" title="Charles de Gaulle"><span data-dcnode-id="1760" instrument_node="">Charles de Gaulle</span></a><span data-dcnode-id="1758" instrument_node="">, who fought for France</span></li></ul><span data-dcnode-id="1755" instrument_node="">
</span><h4 data-dcnode-id="1745"><span class="mw-headline" data-dcnode-id="1753" id="Russia_and_Germany"><span data-dcnode-id="1754" instrument_node="">Russia and Germany</span></span><span class="mw-editsection" data-dcnode-id="1746"><span class="mw-editsection-bracket" data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">[</span></span><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D8" title="Edit section: Russia and Germany"><span data-dcnode-id="1750" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1733"><span data-dcnode-id="1743" instrument_node="">Only chapters 15 and 16 are devoted to the </span><a class="mw-redirect" data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Front_%28WWI%29" title="Eastern Front (WWI)"><span data-dcnode-id="1742" instrument_node="">Eastern Front</span></a><span data-dcnode-id="1740" instrument_node="">, and center on the Russian invasion of </span><a data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Prussia" title="East Prussia"><span data-dcnode-id="1739" instrument_node="">East Prussia</span></a><span data-dcnode-id="1737" instrument_node=""> and the German reaction to it, culminating in the </span><a class="mw-redirect" data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Tannenberg_%281914%29" title="Battle of Tannenberg (1914)"><span data-dcnode-id="1736" instrument_node="">Battle of Tannenberg</span></a><span data-dcnode-id="1734" instrument_node="">, where the Russian advance was stopped, decisively.
</span></p><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">In the chapters, Tuchman covers the series of errors, faulty plans, poor communications, and poor logistics, which, among other things, decidedly helped the French in the west. For example, the Germans mistakenly transferred, from the west, two corps to defend against what the book refers to as the 'Russian Steam Roller'. The great misery that developed on the Eastern Front is noted.
</span></p><span data-dcnode-id="1730" instrument_node="">
</span><h4 data-dcnode-id="1720"><span class="mw-headline" data-dcnode-id="1728" id="Flames_of_Louvain"><span data-dcnode-id="1729" instrument_node="">Flames of Louvain</span></span><span class="mw-editsection" data-dcnode-id="1721"><span class="mw-editsection-bracket" data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">[</span></span><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D9" title="Edit section: Flames of Louvain"><span data-dcnode-id="1725" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1714"><span data-dcnode-id="1718" instrument_node="">Woven into the text about the battles in Belgium are threads of fact that Allied governments would employ in the formation of the West's eventual opinion that Germany had been </span><i data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">the aggressor nation</span></i><span data-dcnode-id="1715" instrument_node=""> against Belgium. Such facts and conclusions would be repeated for the duration of the war and greatly affect the future involvement of the United States.
</span></p><p data-dcnode-id="1684"><span data-dcnode-id="1713" instrument_node="">Also here in chapter 17 </span><i data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">The Flames of Louvain</span></i><span data-dcnode-id="1710" instrument_node="">, Tuchman places a selection of German views from a variety of sources as to the aims and desires of Germany. She cites </span><a data-dcnode-id="1708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Mann" title="Thomas Mann"><span data-dcnode-id="1709" instrument_node="">Thomas Mann</span></a><span data-dcnode-id="1707" instrument_node=""> as saying the goal was "the establishment of the German idea in history, the enthronement of </span><i data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Kultur</span></i><span data-dcnode-id="1704" instrument_node="">, the fulfillment of Germany's historical mission". She then conveys American reporter </span><a data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irvin_S._Cobb" title="Irvin S. Cobb"><span data-dcnode-id="1703" instrument_node="">Irvin S. Cobb</span></a><span data-dcnode-id="1701" instrument_node="">'s account of an interview with a 'German scientist': "Germany [is] for progress. German </span><i data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Kultur</span></i><span data-dcnode-id="1698" instrument_node=""> will enlighten the world and after this war there will never be another." Yet further, a 'German businessman' opines that the war will give Europe "a new map, and Germany will be at the center of it" (aims similar to the </span><a data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Septemberprogramm" title="Septemberprogramm"><span data-dcnode-id="1697" instrument_node="">Septemberprogramm</span></a><span data-dcnode-id="1695" instrument_node="">).</span><sup class="reference" data-dcnode-id="1692" id="cite_ref-4"><a data-dcnode-id="1693" href="#cite_note-4"><span data-dcnode-id="1694" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1691" instrument_node=""> Such outspoken menace worked to solidify opposition to Germany, caused </span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Bernard_Shaw" title="George Bernard Shaw"><span data-dcnode-id="1690" instrument_node="">George Bernard Shaw</span></a><span data-dcnode-id="1688" instrument_node=""> to become "fed up" at Prussian Militarism, and </span><a class="mw-redirect" data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/H.G._Wells" title="H.G. Wells"><span data-dcnode-id="1687" instrument_node="">H.G. Wells</span></a><span data-dcnode-id="1685" instrument_node=""> to condemn the German "war god" and hope for an end to all armed conflict.
</span></p><p data-dcnode-id="1667"><span data-dcnode-id="1683" instrument_node="">Chapter 17's main focus is the German army's atrocities in Belgium, in particular against the historic </span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_University_of_Leuven_%281834%25E2%2580%25931968%29" title="Catholic University of Leuven (1834–1968)"><span data-dcnode-id="1682" instrument_node="">university</span></a><span data-dcnode-id="1680" instrument_node=""> city of </span><a data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leuven" title="Leuven"><span data-dcnode-id="1679" instrument_node="">Louvain</span></a><span data-dcnode-id="1677" instrument_node="">. Tuchman frames her remarks by describing the </span><a data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schrecklichkeit" title="Schrecklichkeit"><span data-dcnode-id="1676" instrument_node="">Schrecklichkeit</span></a><span data-dcnode-id="1674" instrument_node="">, the German military's "theory of terror". Accordingly, in a failed attempt to suppress the "illegal" </span><a class="mw-redirect" data-dcnode-id="1672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franc-tireur" title="Franc-tireur"><span data-dcnode-id="1673" instrument_node="">franc-tireur</span></a><span data-dcnode-id="1671" instrument_node=""> (civilians shooting at German troops), hundreds of nearby citizens at several Belgium towns had been executed. Her accounts of the ferocity of such German army reprisals against the general population and of the willful burning of Louvain, such as its </span><a data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Academic_libraries_in_Leuven%23The_Library_of_the_Catholic_University_of_Leuven" title="Academic libraries in Leuven"><span data-dcnode-id="1670" instrument_node="">university library</span></a><span data-dcnode-id="1668" instrument_node=""> make it obvious why the Western Allies might feel themselves justified to condemn Germany and Germans wholesale.
</span></p><span data-dcnode-id="1666" instrument_node="">
</span><h4 data-dcnode-id="1656"><span class="mw-headline" data-dcnode-id="1664" id="War_at_sea"><span data-dcnode-id="1665" instrument_node="">War at sea</span></span><span class="mw-editsection" data-dcnode-id="1657"><span class="mw-editsection-bracket" data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">[</span></span><a data-dcnode-id="1660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D10" title="Edit section: War at sea"><span data-dcnode-id="1661" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1655" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="1649" role="note"><span data-dcnode-id="1652" instrument_node="">See also: </span><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naval_warfare_of_World_War_I" title="Naval warfare of World War I"><span data-dcnode-id="1651" instrument_node="">Naval warfare of World War I</span></a></div><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1647" instrument_node="">Chapter 18 describes the British fear that since their island nation was dependent on overseas imports, the German navy could manage to disrupt their international trade. Although Britain's navy was superior in ships and experience, perhaps the German navy's "best opportunity for a successful battle was in the first two or three weeks of the war." However, the </span><a class="mw-redirect" data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_High_Seas_Fleet" title="German High Seas Fleet"><span data-dcnode-id="1646" instrument_node="">German High Seas Fleet</span></a><span data-dcnode-id="1644" instrument_node=""> remained in port and was ordered not to challenge the </span><a class="mw-redirect" data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Grand_Fleet" title="British Grand Fleet"><span data-dcnode-id="1643" instrument_node="">British warships watching the North Sea</span></a><span data-dcnode-id="1641" instrument_node="">. Thus, a substantial control over the world's seaways was then exerted by the British Royal Navy.
</span></p><p data-dcnode-id="1622"><span data-dcnode-id="1639" instrument_node="">Surrounding the neutral role of the United States, diplomatic politicking quickly intensified. On August 6, Washington formally requested the Europeans to agree to follow the 1908 </span><i data-dcnode-id="1636"><a class="mw-redirect" data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Declaration_of_London" title="Declaration of London"><span data-dcnode-id="1638" instrument_node="">Declaration of London</span></a></i><span data-dcnode-id="1635" instrument_node="">, which "favored the neutrals' right to trade as against the belligerents' right to blockade." Germany agreed. Britain "said Yes and meant No" and supplemented an </span><i data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Order of Council</span></i><span data-dcnode-id="1632" instrument_node=""> on August 20 (the 100th anniversary of Britain's burning of Washington). Despite the equitable intent of international law, Britain sought to receive supplies from America while its </span><a class="mw-redirect" data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naval_blockade_of_Germany" title="Naval blockade of Germany"><span data-dcnode-id="1631" instrument_node="">naval blockade of Germany</span></a><span data-dcnode-id="1629" instrument_node=""> denied the supplies to Germany. </span><a data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Woodrow_Wilson" title="Woodrow Wilson"><span data-dcnode-id="1628" instrument_node="">Woodrow Wilson</span></a><span data-dcnode-id="1626" instrument_node=""> had already advised Americans on August 18 to be "neutral in fact as well as in name, impartial in thought as well as in action" so that America might become the "impartial mediator" that could then bring "standards of righteousness and humanity" to the belligerents in order to negotiate "a peace without victory" in Europe. Both wartime paper profits from a nearly fourfold increase in trade with Britain and France and "German folly" eventually would later work to cause </span><a data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_entry_into_World_War_I" title="American entry into World War I"><span data-dcnode-id="1625" instrument_node="">American entry into World War I</span></a><span data-dcnode-id="1623" instrument_node="">.
</span></p><span data-dcnode-id="1621" instrument_node="">
</span><h4 data-dcnode-id="1611"><span class="mw-headline" data-dcnode-id="1619" id="Paris_defended"><span data-dcnode-id="1620" instrument_node="">Paris defended</span></span><span class="mw-editsection" data-dcnode-id="1612"><span class="mw-editsection-bracket" data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">[</span></span><a data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D11" title="Edit section: Paris defended"><span data-dcnode-id="1616" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1609" instrument_node="">The book's last four chapters (19–22) describe the fighting in France up to the beginning of the </span><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Battle_of_the_Marne" title="First Battle of the Marne"><span data-dcnode-id="1608" instrument_node="">First Battle of the Marne</span></a><span data-dcnode-id="1606" instrument_node="">. The French and British forces, united at last, fell on </span><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_von_Kluck" title="Alexander von Kluck"><span data-dcnode-id="1605" instrument_node="">Alexander von Kluck</span></a><span data-dcnode-id="1603" instrument_node="">'s exposed right flank in what would be the first successful offensive by the Allies. In the subsequent attack, the Germans were forced back north, with both sides suffering terrible losses. While Paris had been saved, the war took on a new cast, with both sides settling into a defensive </span><a data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trench_warfare" title="Trench warfare"><span data-dcnode-id="1602" instrument_node="">trench system</span></a><span data-dcnode-id="1600" instrument_node="">, which cut across France and Belgium from the Channel to Switzerland. That became known as the Western Front, and over the next four years, it would consume a generation of young men.
</span></p><span data-dcnode-id="1598" instrument_node="">
</span><h3 data-dcnode-id="1588"><span class="mw-headline" data-dcnode-id="1596" id="Afterword"><span data-dcnode-id="1597" instrument_node="">Afterword</span></span><span class="mw-editsection" data-dcnode-id="1589"><span class="mw-editsection-bracket" data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">[</span></span><a data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D12" title="Edit section: Afterword"><span data-dcnode-id="1593" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Tuchman briefly offers reflections on the First Battle of the Marne and on the war in general. The war's opening "produced deadlock on the Western Front. Sucking up lives at the rate of 5,000 and sometimes 50,000 a day, absorbing munitions, energy, money, brains, and trained men," it ate up its contestants. "The nations were caught in a trap...."
</span></p><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">With time, such a war would become intolerable. "Men could not sustain a war of such magnitude and pain without hope–the hope that its very enormity would ensure that it could never happen again."
</span></p><span data-dcnode-id="1582" instrument_node="">
</span><h2 data-dcnode-id="1572"><span class="mw-headline" data-dcnode-id="1580" id="Miscalculations_leading_to_war"><span data-dcnode-id="1581" instrument_node="">Miscalculations leading to war</span></span><span class="mw-editsection" data-dcnode-id="1573"><span class="mw-editsection-bracket" data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">[</span></span><a data-dcnode-id="1576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D13" title="Edit section: Miscalculations leading to war"><span data-dcnode-id="1577" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Throughout the aforementioned narrative, Tuchman constantly brings up a theme: the numerous misconceptions, miscalculations, and mistakes that she believed resulted in the tragedy of trench warfare, such as:
</span></p><span data-dcnode-id="1568" instrument_node="">
</span><ul data-dcnode-id="1547"><li data-dcnode-id="1563"><span data-dcnode-id="1567" instrument_node="">Economic miscalculation: Tuchman says both European intellectuals and leaders overestimated the power of </span><a data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_trade" title="Free trade"><span data-dcnode-id="1566" instrument_node="">free trade</span></a><span data-dcnode-id="1564" instrument_node="">. They believed that the interconnectedness of European nations through trade would stop a continent-wide war from breaking out, as the economic consequences would be too great. However, the assumption was incorrect. For example, Tuchman noted that Moltke, when warned of such consequences, refused to even consider them in his plans, arguing he was a "soldier," not an "economist."</span></li><span data-dcnode-id="1562" instrument_node="">
</span><li data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Unfounded belief in quick warfare: except for a very few politicians (who were at the time ridiculed and excluded because of their views, with only Lord Kitchener having the authority to act on his anticipation of a long war), all the leaders of the major combatants believed the war would be concluded in a matter of weeks, certainly by the end of 1914. Tuchman recounted the story of a British statesman who, after he warned others that the war might last two or three years, was branded a "pessimist." That false assumption had disastrous effects, especially on logistics (see below).</span></li><span data-dcnode-id="1559" instrument_node="">
</span><li data-dcnode-id="1554"><span data-dcnode-id="1558" instrument_node="">Over-reliance on morale and the offensive: Tuchman details, in depth, how the leaders of the major powers, before the war, developed a </span><a data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cult_of_the_offensive" title="Cult of the offensive"><span data-dcnode-id="1557" instrument_node="">philosophy of warfare</span></a><span data-dcnode-id="1555" instrument_node=""> based almost entirely on morale, a constant offensive, and retaining the initiative. Joffre, in particular, refused to consider going on the defensive/or even to slow the offensive, even when the realities of the battlefield demonstrated that his approach was not working.</span></li><span data-dcnode-id="1553" instrument_node="">
</span><li data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Failure to consider political backlash: many war planners did not take into consideration the political and treaty-based consequences of their offensive actions. As Tuchman argues, the German leaders in particular refused to consider the consequences of moving their armies into Belgium despite that country's neutrality. Despite Moltke's concerns, German generals insisted on moving through Belgium because they needed to maneuver. They failed (or refused) to realize that by invading Belgium, they effectively forced Britain to declare war because of existing treaties and national honor.</span></li><span data-dcnode-id="1550" instrument_node="">
</span><li data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Outdated forms of wartime etiquette: although the technology, aims, methods, and plans of World War I were significantly different from earlier wars, military leaders in occupied territories continued to have an expectation of a form of martial etiquette from civilians, regarding co-operation and obedience of instructions, as a reciprocal part of non-combatant status; which increased resentment between the citizens of the opposing nations. To illustrate, Tuchman repeatedly uses quotes from the diaries of German generals who commandeered the homes and supplies of civilians. One recurrent theme in their diary entries was that they simply could not understand why the property owners refused full co-operation, in line with traditional wartime courtesy. In a somewhat comical passage, Tuchman even quotes from a general who criticized the master of a Belgian house for failing to sit with him at dinner and observe proper mealtime etiquette despite the fact that the Germans had violated his country's neutrality, taken over his house, and stolen or destroyed much of his property.  Similar problems occurred in the practical application of submarine, and later aerial, warfare.</span></li></ul><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1545" instrument_node="">Overall, Tuchman argues that while some of the war's major combatants looked forward to a war, specifically Germany and Austria-Hungary, all of them expected it to be a short one, and none of them desired or anticipated a prolonged war. Likewise, she argues that even successes, such as the </span><a data-dcnode-id="1543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Battle_of_the_Marne" title="First Battle of the Marne"><span data-dcnode-id="1544" instrument_node="">First Battle of the Marne</span></a><span data-dcnode-id="1542" instrument_node="">, a French victory, were to some extent accidental victories that were won despite, and not because of, military leadership or strategy.
</span></p><span data-dcnode-id="1540" instrument_node="">
</span><h2 data-dcnode-id="1530"><span class="mw-headline" data-dcnode-id="1538" id="Cultural_impact"><span data-dcnode-id="1539" instrument_node="">Cultural impact</span></span><span class="mw-editsection" data-dcnode-id="1531"><span class="mw-editsection-bracket" data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">[</span></span><a data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D14" title="Edit section: Cultural impact"><span data-dcnode-id="1535" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1528" instrument_node="">The book was an immediate bestseller and was on the bestseller list of </span><i data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">The New York Times</span></i><span data-dcnode-id="1525" instrument_node=""> for 42 consecutive weeks.</span><sup class="reference" data-dcnode-id="1522" id="cite_ref-dobbs_5-0"><a data-dcnode-id="1523" href="#cite_note-dobbs-5"><span data-dcnode-id="1524" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1521" instrument_node=""> The </span><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pulitzer_Prize" title="Pulitzer Prize"><span data-dcnode-id="1520" instrument_node="">Pulitzer Prize</span></a><span data-dcnode-id="1518" instrument_node=""> nomination committee was unable to award it the prize for outstanding history because </span><a data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Pulitzer" title="Joseph Pulitzer"><span data-dcnode-id="1517" instrument_node="">Joseph Pulitzer</span></a><span data-dcnode-id="1515" instrument_node="">'s will specifically stated that the recipient of the </span><a data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pulitzer_Prize_for_History" title="Pulitzer Prize for History"><span data-dcnode-id="1514" instrument_node="">Pulitzer Prize for History</span></a><span data-dcnode-id="1512" instrument_node=""> must be a book on American history. Instead, Tuchman was given the prize for general nonfiction.
</span></p><p data-dcnode-id="1459"><span data-dcnode-id="1510" instrument_node="">According to the cover notes of an audio version of </span><i data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">The Guns of August</span></i><span data-dcnode-id="1507" instrument_node="">, "[President </span><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_F._Kennedy" title="John F. Kennedy"><span data-dcnode-id="1506" instrument_node="">John F. Kennedy</span></a><span data-dcnode-id="1504" instrument_node="">] was so impressed by the book, he gave copies to his cabinet and principal military advisers, and commanded them to read it."</span><sup class="reference" data-dcnode-id="1501" id="cite_ref-6"><a data-dcnode-id="1502" href="#cite_note-6"><span data-dcnode-id="1503" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1500" instrument_node="">  In his book </span><i data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">One Minute to Midnight</span></i><span data-dcnode-id="1497" instrument_node=""> about the </span><a data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_Missile_Crisis" title="Cuban Missile Crisis"><span data-dcnode-id="1496" instrument_node="">Cuban Missile Crisis</span></a><span data-dcnode-id="1494" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Dobbs_%28American_author%29" title="Michael Dobbs (American author)"><span data-dcnode-id="1493" instrument_node="">Michael Dobbs</span></a><span data-dcnode-id="1491" instrument_node=""> notes the deep impression </span><i data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Guns</span></i><span data-dcnode-id="1488" instrument_node=""> had on Kennedy. He often quoted from it and wanted "every officer in the Army" to read it as well. Subsequently, "[t]he secretary of the Army sent copies to every U.S. military base in the world.</span><sup class="reference" data-dcnode-id="1485" id="cite_ref-dobbs_5-1"><a data-dcnode-id="1486" href="#cite_note-dobbs-5"><span data-dcnode-id="1487" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1484" instrument_node="">  Kennedy drew from </span><i data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">The Guns of August</span></i><span data-dcnode-id="1481" instrument_node=""> to help in dealing with the crisis in Cuba, including the profound and unpredictable implications a rapid escalation of the situation could have.</span><sup class="reference" data-dcnode-id="1478" id="cite_ref-7"><a data-dcnode-id="1479" href="#cite_note-7"><span data-dcnode-id="1480" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="1475" id="cite_ref-8"><a data-dcnode-id="1476" href="#cite_note-8"><span data-dcnode-id="1477" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1474" instrument_node=""> Robert S. McNamara, United States Secretary of Defense during Kennedy's presidency, recalled that "[e]arly in his administration, President Kennedy asked his cabinet officials and members of the National Security Council" to read </span><i data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">The Guns of August</span></i><span data-dcnode-id="1471" instrument_node="">.</span><sup class="reference" data-dcnode-id="1468" id="cite_ref-McNamara_9-0"><a data-dcnode-id="1469" href="#cite_note-McNamara-9"><span data-dcnode-id="1470" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1467" instrument_node=""> McNamara related that Kennedy said </span><i data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">The Guns of August</span></i><span data-dcnode-id="1464" instrument_node=""> graphically portrayed how Europe's leaders had bungled into the debacle of World War I, and that Kennedy told later his cabinet officials that "We are not going to bungle into war."</span><sup class="reference" data-dcnode-id="1461" id="cite_ref-McNamara_9-1"><a data-dcnode-id="1462" href="#cite_note-McNamara-9"><span data-dcnode-id="1463" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1460" instrument_node="">
</span></p><p data-dcnode-id="1450"><span data-dcnode-id="1458" instrument_node="">The British Prime Minister </span><a data-dcnode-id="1456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harold_Macmillan" title="Harold Macmillan"><span data-dcnode-id="1457" instrument_node="">Harold Macmillan</span></a><span data-dcnode-id="1455" instrument_node="">, who had served on the Western Front during the First World War, was also profoundly affected by the book.</span><sup class="reference" data-dcnode-id="1452" id="cite_ref-10"><a data-dcnode-id="1453" href="#cite_note-10"><span data-dcnode-id="1454" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1451" instrument_node=""> In his diary for Monday, 22 October 1962, he wrote:
</span></p><span data-dcnode-id="1449" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="1432"><p data-dcnode-id="1433"><span data-dcnode-id="1446" instrument_node="">Washington, in a rather panicky way, have been urging a NATO 'alert' with all that this implies (in our case, a Royal Proclamation and the call up of Reservists). I told him that we do </span><i data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">not</span></i><span data-dcnode-id="1443" instrument_node=""> repeat </span><i data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">not</span></i><span data-dcnode-id="1440" instrument_node=""> agree at this stage. N. [</span><a data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lauris_Norstad" title="Lauris Norstad"><span data-dcnode-id="1439" instrument_node="">General Norstad</span></a><span data-dcnode-id="1437" instrument_node="">] agreed with this and said he thought NATO powers would take the same view. I said that 'mobilization' had sometimes caused war. Here it was absurd since the additional forces made available by 'Alert' had </span><i data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">no</span></i><span data-dcnode-id="1434" instrument_node=""> military significance.</span></p></blockquote><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1414"><a data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Graham_Allison" title="Graham Allison"><span data-dcnode-id="1430" instrument_node="">Graham Allison</span></a><span data-dcnode-id="1428" instrument_node="">, a </span><a class="mw-redirect" data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_scientist" title="Political scientist"><span data-dcnode-id="1427" instrument_node="">political scientist</span></a><span data-dcnode-id="1425" instrument_node=""> who covered the Cuban Missile Crisis in </span><i data-dcnode-id="1422"><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Essence_of_Decision" title="Essence of Decision"><span data-dcnode-id="1424" instrument_node="">Essence of Decision</span></a></i><span data-dcnode-id="1421" instrument_node="">, noted the effect of the Tuchman's book on Kennedy, but also its implications for the proper study of decision-making and warfare. Allison created an entire model of decision-making, which he called the </span><a data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Essence_of_Decision%23The_Organizational_Process_Model" title="Essence of Decision"><span data-dcnode-id="1420" instrument_node="">Organizational Process Model</span></a><span data-dcnode-id="1418" instrument_node="">, based on such issues as those covered by Tuchman, a model that directly countered </span><a data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Game_theory" title="Game theory"><span data-dcnode-id="1417" instrument_node="">game theory</span></a><span data-dcnode-id="1415" instrument_node=""> and other rationalistic means of explaining events.
</span></p><p data-dcnode-id="1367"><span data-dcnode-id="1413" instrument_node="">After Kennedy was </span><a data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assassination_of_John_F._Kennedy" title="Assassination of John F. Kennedy"><span data-dcnode-id="1412" instrument_node="">assassinated</span></a><span data-dcnode-id="1410" instrument_node=""> on November 22, 1963, </span><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_dignitaries_at_the_state_funeral_of_John_F._Kennedy" title="List of dignitaries at the state funeral of John F. Kennedy"><span data-dcnode-id="1409" instrument_node="">representatives</span></a><span data-dcnode-id="1407" instrument_node=""> from over 90 countries attended the </span><a data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_funeral_of_John_F._Kennedy" title="State funeral of John F. Kennedy"><span data-dcnode-id="1406" instrument_node="">state funeral</span></a><span data-dcnode-id="1404" instrument_node=""> on November 25. They included 19 presidents, prime ministers, and members of royal families, including French President </span><a data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_de_Gaulle" title="Charles de Gaulle"><span data-dcnode-id="1403" instrument_node="">Charles de Gaulle</span></a><span data-dcnode-id="1401" instrument_node="">, Ethiopian Emperor </span><a class="mw-redirect" data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haile_Selassie_I" title="Haile Selassie I"><span data-dcnode-id="1400" instrument_node="">Haile Selassie</span></a><span data-dcnode-id="1398" instrument_node="">, Belgium's </span><a data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baudouin_of_Belgium" title="Baudouin of Belgium"><span data-dcnode-id="1397" instrument_node="">King Baudouin</span></a><span data-dcnode-id="1395" instrument_node="">, West German Chancellor </span><a data-dcnode-id="1393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ludwig_Erhard" title="Ludwig Erhard"><span data-dcnode-id="1394" instrument_node="">Ludwig Erhard</span></a><span data-dcnode-id="1392" instrument_node="">, Britain's </span><a class="mw-redirect" data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_Philip" title="Prince Philip"><span data-dcnode-id="1391" instrument_node="">Prince Philip</span></a><span data-dcnode-id="1389" instrument_node="">, and Greece's </span><a class="mw-redirect" data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Queen_Frederika" title="Queen Frederika"><span data-dcnode-id="1388" instrument_node="">Queen Frederika</span></a><span data-dcnode-id="1386" instrument_node="">. NBC News producer </span><a data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reuven_Frank" title="Reuven Frank"><span data-dcnode-id="1385" instrument_node="">Reuven Frank</span></a><span data-dcnode-id="1383" instrument_node=""> recounted in his autobiography that everybody in the control room had read the book and gasped when seeing the many heads of state marching on foot.</span><sup class="reference" data-dcnode-id="1380" id="cite_ref-11"><a data-dcnode-id="1381" href="#cite_note-11"><span data-dcnode-id="1382" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1379" instrument_node=""> The funeral saw the largest gathering of presidents, prime ministers, and royalty at a state funeral since that of King Edward VII.</span><sup class="reference" data-dcnode-id="1376" id="cite_ref-12"><a data-dcnode-id="1377" href="#cite_note-12"><span data-dcnode-id="1378" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1375" instrument_node=""> In all, 220 foreign dignitaries from 92 countries, five international agencies, and the papacy attended the funeral.</span><sup class="reference" data-dcnode-id="1372" id="cite_ref-13"><a data-dcnode-id="1373" href="#cite_note-13"><span data-dcnode-id="1374" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="1369" id="cite_ref-14"><a data-dcnode-id="1370" href="#cite_note-14"><span data-dcnode-id="1371" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1368" instrument_node="">
</span></p><span data-dcnode-id="1366" instrument_node="">
</span><h2 data-dcnode-id="1356"><span class="mw-headline" data-dcnode-id="1364" id="Tuchman_in_the_narrative"><span data-dcnode-id="1365" instrument_node="">Tuchman in the narrative</span></span><span class="mw-editsection" data-dcnode-id="1357"><span class="mw-editsection-bracket" data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">[</span></span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D15" title="Edit section: Tuchman in the narrative"><span data-dcnode-id="1361" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1354" instrument_node="">While she did not explicitly mention it in </span><i data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">The Guns of August</span></i><span data-dcnode-id="1351" instrument_node="">, Tuchman was present for one of the pivotal events of the book: </span><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pursuit_of_Goeben_and_Breslau" title="Pursuit of Goeben and Breslau"><span data-dcnode-id="1350" instrument_node="">the pursuit of the German battle cruiser </span><i data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Goeben</span></i><span data-dcnode-id="1347" instrument_node=""> and light cruiser </span><i data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Breslau</span></i></a><span data-dcnode-id="1343" instrument_node="">. In her account of the pursuit she wrote, "That morning [August 10, 1914] there arrived in </span><a data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constantinople" title="Constantinople"><span data-dcnode-id="1342" instrument_node="">Constantinople</span></a><span data-dcnode-id="1340" instrument_node=""> the small Italian passenger steamer which had witnessed the </span><i data-dcnode-id="1336"><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HMS_Gloucester_%281909%29" title="HMS Gloucester (1909)"><span data-dcnode-id="1339" instrument_node="">Gloucester</span></a><span data-dcnode-id="1337" instrument_node="">'</span></i><span data-dcnode-id="1335" instrument_node="">s action against </span><i data-dcnode-id="1332"><a data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SMS_Goeben" title="SMS Goeben"><span data-dcnode-id="1334" instrument_node="">Goeben</span></a></i><span data-dcnode-id="1331" instrument_node=""> and </span><i data-dcnode-id="1328"><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SMS_Breslau" title="SMS Breslau"><span data-dcnode-id="1330" instrument_node="">Breslau</span></a></i><span data-dcnode-id="1327" instrument_node="">. Among its passengers were the daughter, son-in-law and three grandchildren of the American ambassador Mr. Henry Morgenthau."</span><sup class="reference" data-dcnode-id="1324" id="cite_ref-15"><a data-dcnode-id="1325" href="#cite_note-15"><span data-dcnode-id="1326" instrument_node="">[14]</span></a></sup><span data-dcnode-id="1323" instrument_node=""> As she was a grandchild of Henry Morgenthau, she is referring to herself, which is confirmed in her later book </span><i data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Practicing History</span></i><span data-dcnode-id="1320" instrument_node="">,</span><sup class="reference" data-dcnode-id="1317" id="cite_ref-16"><a data-dcnode-id="1318" href="#cite_note-16"><span data-dcnode-id="1319" instrument_node="">[15]</span></a></sup><span data-dcnode-id="1316" instrument_node=""> in which she tells the story of her father, </span><a data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maurice_Wertheim" title="Maurice Wertheim"><span data-dcnode-id="1315" instrument_node="">Maurice Wertheim</span></a><span data-dcnode-id="1313" instrument_node="">, traveling from Constantinople to Jerusalem on August 29, 1914, to deliver funds to the Jewish community there. Thus, at age two, Tuchman was present during the pursuit of </span><i data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Goeben</span></i><span data-dcnode-id="1310" instrument_node=""> and </span><i data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Breslau</span></i><span data-dcnode-id="1307" instrument_node="">, which she documented 48 years later.
</span></p><span data-dcnode-id="1305" instrument_node="">
</span><h2 data-dcnode-id="1295"><span class="mw-headline" data-dcnode-id="1303" id="Film_adaptation"><span data-dcnode-id="1304" instrument_node="">Film adaptation</span></span><span class="mw-editsection" data-dcnode-id="1296"><span class="mw-editsection-bracket" data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">[</span></span><a data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Guns_of_August%26action%3Dedit%26section%3D16" title="Edit section: Film adaptation"><span data-dcnode-id="1300" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1293" instrument_node="">The book was the basis for a 1964 documentary film, also titled </span><i data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">The Guns of August</span></i><span data-dcnode-id="1290" instrument_node="">.</span><sup class="reference" data-dcnode-id="1287" id="cite_ref-17"><a data-dcnode-id="1288" href="#cite_note-17"><span data-dcnode-id="1289" instrument_node="">[16]</span></a></sup><span data-dcnode-id="1286" instrument_node="">  The 99-minute film, which premiered in New York City on December 24, 1964, was produced and directed by Nathan Kroll and narrated by </span><a data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fritz_Weaver" title="Fritz Weaver"><span data-dcnode-id="1285" instrument_node="">Fritz Weaver</span></a><span data-dcnode-id="1283" instrument_node="">, with the narration written by Arthur B. Tourtellot. It used film footage found in government archives in Paris, London, Brussels, Berlin, and Washington, DC.</span><sup class="reference" data-dcnode-id="1280" id="cite_ref-18"><a data-dcnode-id="1281" href="#cite_note-18"><span data-dcnode-id="1282" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="1277" id="cite_ref-19"><a data-dcnode-id="1278" href="#cite_note-19"><span data-dcnode-id="1279" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="1274" id="cite_ref-20"><a data-dcnode-id="1275" href="#cite_note-20"><span data-dcnode-id="1276" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1273" instrument_node="">
</span></p><span data-dcnode-id="1271" instrument_node="">
