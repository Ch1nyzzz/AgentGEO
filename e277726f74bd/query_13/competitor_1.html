</span><h1 class="scale--2 contentHeader__sectionTitle" data-dcnode-id="784" id="section-title"><span data-dcnode-id="785" instrument_node="">The Guns of August Summary</span></h1><span data-dcnode-id="783" instrument_node="">
</span><div class="section__purchase" data-dcnode-id="782"></div><span data-dcnode-id="781" instrument_node="">
</span><p class="byline--secondary" data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">These notes were contributed by members of the GradeSaver community.
We are thankful for their contributions and encourage you to make your&nbsp;own.
</span></p><span data-dcnode-id="778" instrument_node="">
</span><p class="byline--secondary" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Written by Polly&nbsp;Barbour
</span></p><span data-dcnode-id="775" instrument_node="">
</span><article class="section__article" data-dcnode-id="715" itemprop="articleBody" role="article"><span data-dcnode-id="774" instrument_node="">
</span><div class="ad js--contentAdMove is--hidden" data-dcnode-id="767" data-placement="1"><span data-dcnode-id="773" instrument_node="">
</span><div data-ad="" data-dcnode-id="769" data-mq="(max-width: 574px)"><span data-dcnode-id="772" instrument_node="">
</span><span data-dcnode-id="770" instrument_node="">
</span></div><span data-dcnode-id="768" instrument_node="">
</span></div><p data-dcnode-id="759"><span data-dcnode-id="766" instrument_node="">The book starts with a funeral; </span><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gradesaver.com/the-guns-of-august/study-guide/character-list%23king-edward-vii"><span data-dcnode-id="765" instrument_node="">King Edward VII</span></a><span data-dcnode-id="763" instrument_node=""> of England was buried with full honors in the presence of nine other kings, one of whom was </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gradesaver.com/the-guns-of-august/study-guide/character-list%23kaiser-wilhelm"><span data-dcnode-id="762" instrument_node="">Kaiser Wilhelm</span></a><span data-dcnode-id="760" instrument_node=""> (nicknamed Kaiser Bill by the British) who as well as being German Kaiser was King Edward's nephew. This leads to a discussion about the intertwining of the nation's different alliances both politically and within the royal families.</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Plans is the section that deals with advanced military planning that all nations undertake regardless of whether or not they are intending to involve themselves in war. The major players in Europe at this time were Germany, with their Schlieffen Plan, France, who have Plan XVII and also an alliance between themselves and the British, and also the Russian's plans for war should it happen and they be called upon to side with one nation over another.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="754" instrument_node="">World War One was triggered when </span><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gradesaver.com/the-guns-of-august/study-guide/character-list%23gavrilo-princip"><span data-dcnode-id="753" instrument_node="">Gavrilo Princip</span></a><span data-dcnode-id="751" instrument_node="">, a Serbian national, assassinated the heir-apparent to the Austria-Hungary throne, on June 28, 1914. This triggered the outbreak of World War One. In August of the same year the strategies and manipulations of politicians and the movement of armies is detailed and it becomes apparent that the Kaiser is vacillating and somewhat reluctant to involve Germany in conflict; Russia, the key player, was trying to maneuver her ally, France, into the war, and France in turn pressured Britain, in a domino rally of political agreement. In turn, Germany pressured Belgium to stand with them.</span></p><span data-dcnode-id="749" instrument_node="">
</span><div class="ad js--contentAdMove" data-dcnode-id="737" data-placement="4"><span data-dcnode-id="748" instrument_node="">
</span><div data-ad="" data-dcnode-id="744" data-mq="(min-width: 575px)"><span data-dcnode-id="747" instrument_node="">
</span><div data-dcnode-id="746" id="div-gpt-ad-1433266440411-3"></div><span data-dcnode-id="745" instrument_node="">
</span></div><span data-dcnode-id="743" instrument_node="">
</span><div data-ad="" data-dcnode-id="739" data-mq="(max-width: 574px)"><span data-dcnode-id="742" instrument_node="">
</span><span data-dcnode-id="740" instrument_node="">
</span></div><span data-dcnode-id="738" instrument_node="">
</span></div><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">The larger portion of the book concentrates on the battles themselves. The war took place on two main tactical fronts, the Western and the Eastern. Much of the war also takes place at sea. The success of the strategies does not rest entirely on the brilliance of military plans. The leaders of each nation are shown to be somewhat egotistical and this egotism sometimes has a very negative effect on the success of the battles and in some cases sends ill-equipped men to their deaths for the sake of sticking to a plan that never had a chance of working. The war is also shown through the eyes and opinions of the rest of the world who were not involved in the conflict.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">The "Battle" section of the book tracks the search for the German battleship Goeben which had taken refuge in the Dardanelles., neutral waters close to Turkey. This unwittingly propelled Turkey into the war on Germany's side which was a big tactical advance for the Germans as it effectively blocked Russia's import and export channels along the Black Sea. This snowballed into the destined-to-fail Gallipoli Campaign.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="730" instrument_node="">The German invasion of Belgium was met by Belgian troops as the crossed into Liege, by French armies as they entered Eastern France, and by the British expeditionary force in the south of Belgium. The French had believed all three forces would work together but in reality the three worked as three independent forces. Each side has its own objectives and therefore deployed its armies accordingly. The French armies were saved from being completely surrounded by the Germans by he quick decisions of </span><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gradesaver.com/the-guns-of-august/study-guide/character-list%23charles-lanrezac"><span data-dcnode-id="729" instrument_node="">Charles Lanrezac</span></a><span data-dcnode-id="727" instrument_node=""> who withdrew his troops from Charleroi without permission. The Battle of Frontiers was one of the most brutal and forced the Allies to retreat as far back as Paris. The city was only saved because a retired general, </span><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gradesaver.com/the-guns-of-august/study-guide/character-list%23joseph-gallieni"><span data-dcnode-id="726" instrument_node="">Joseph Gallieni</span></a><span data-dcnode-id="724" instrument_node="">, who used limited resources to avoid a siege.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Tuchman also highlights how much the German army was responsible for its own demise by pushing their infantry to exhaustion and sending them forward without supplies.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">The Eastern Front battles mainly focus on the Russian invasion of Prussia and the German reaction to it which led to the Battle of Tannenberg which stopped the Russians in their tracks. The Eastern Front campaigns were not successful for the Allies.The book culminates with the fighting in France, which saw the British and French troops fighting together in a new trench system, a system so brutal to the armies that fought within it that an entire generation of young men was lost.</span></p><span data-dcnode-id="716" instrument_node="">
</span></article><span data-dcnode-id="714" instrument_node="">
</span><article class="section__article" data-dcnode-id="684"><span data-dcnode-id="713" instrument_node="">
