</span><h2 data-dcnode-id="3797" id="section---WhatIsThePulitzerPrize"><span data-dcnode-id="3798" instrument_node="">What is the Pulitzer Prize</span></h2><p data-dcnode-id="3796"></p><span data-dcnode-id="3795" instrument_node="">
</span><span data-dcnode-id="3789" instrument_node="">
</span><span data-dcnode-id="3788" instrument_node="">

</span><table border="0" class="imageplugin" data-dcnode-id="3779"><caption align="bottom" data-dcnode-id="3790"><span data-dcnode-id="3794" instrument_node="">
</span><p data-dcnode-id="3792"><span data-dcnode-id="3793" instrument_node="">The Pulitzer Prize is the name given to the prizes awarded annually for outstanding public service in journalism, letters, and musical composition.</span></p><span data-dcnode-id="3791" instrument_node="">
</span></caption><tbody data-dcnode-id="3781"><tr data-dcnode-id="3783"><td data-dcnode-id="3785"><img alt="Image of Pulitzer medal" data-dcnode-id="3786" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/cimages/multimages/16/the_pulitzer_prizes1189515909345704517.jpg&amp;raw"></td></tr></tbody></table><p data-dcnode-id="3778"></p><p data-dcnode-id="3770"><span data-dcnode-id="3777" instrument_node="">The </span><b data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">Pulitzer Prize</span></b><span data-dcnode-id="3774" instrument_node="">, or what is commonly referred to as simply the </span><b data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">Pulitzer</span></b><span data-dcnode-id="3771" instrument_node="">, is the name given to the prizes awarded annually for outstanding public service in journalism, letters, and musical composition. Established by Joseph Pulitzer, the award was first given in 1917 and is awarded by Columbia University in New York City. The awards are made on the recommendation of the Pulitzer Prize board, which is comprised of several judges appointed by the university. While the number of prizes awarded has varied over the years, there are currently fourteen prizes in journalism, six prizes in letters, and one in music. </span></p><span data-dcnode-id="3769" instrument_node="">
</span></article><span data-dcnode-id="3767" instrument_node="">

</span><article class="" data-dcnode-id="2878" id="seo-transcript-container-2"><span data-dcnode-id="3324" instrument_node="">
</span><div class="transcript wikiContent" data-dcnode-id="2997" id="transcriptMain" ng-non-bindable=""><span data-dcnode-id="3323" instrument_node="">
</span><div class="faded-content" data-dcnode-id="3015"><span data-dcnode-id="3322" instrument_node="">
</span><h2 data-dcnode-id="3320" id="section---ThePulitzerPrizeAward"><span data-dcnode-id="3321" instrument_node="">The Pulitzer Prize Award</span></h2><p data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">There are 21 awards handed out each year, and the actual award that is given varies by category. Recipients of 20 of the awards receive a $15,000 monetary award and a certificate. The winner of the other award, the public service journalism award, always receives a gold medal. </span></p><p data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">Award winners are announced in May of each year. A news conference is held by the Pulitzer administration and the awards are announced at 3 pm exactly. An announcement will also be posted on the Pulitzer website and will identify all the winners, the two finalists in each of the twenty-one categories, and the board members and judges who were involved in the decision-making process. </span></p><p data-dcnode-id="3315"></p><span data-dcnode-id="3314" instrument_node="">
</span><span data-dcnode-id="3308" instrument_node="">
</span><span data-dcnode-id="3307" instrument_node="">
</span><span data-dcnode-id="3306" instrument_node="">
</span><span data-dcnode-id="3303" instrument_node="">
</span><span data-dcnode-id="3301" instrument_node="">
</span><span data-dcnode-id="3299" instrument_node="">
</span><table border="0" class="imageplugin" data-dcnode-id="3298"><caption align="bottom" data-dcnode-id="3309"><span data-dcnode-id="3313" instrument_node="">
</span><p data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">Awards are presented to the winners at a small library luncheon at Columbia University.</span></p><span data-dcnode-id="3310" instrument_node="">
</span></caption><tbody data-dcnode-id="3300"><tr data-dcnode-id="3302"><td data-dcnode-id="3304"><img alt="Image of Columbia University and Pulitzer" data-dcnode-id="3305" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fast.wistia.com/cimages/multimages/16/columbia_j-school024992629683352138574.jpg&amp;raw"></td></tr></tbody></table><p data-dcnode-id="3297"></p><p data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">Awards are presented to the winners at a small library luncheon at Columbia University. Attendees include family members, professional associates, board members, and members of the Columbia University School of Journalism. While some feel the ceremony should be a more elaborate production that is televised, the board of the Pulitzer continues to maintain tradition by presenting it in a small and intimate ceremony. </span></p><h2 data-dcnode-id="3293" id="section---HistoryOfThePulitzerPrize"><span data-dcnode-id="3294" instrument_node="">History of the Pulitzer Prize</span></h2><p data-dcnode-id="3292"></p><span data-dcnode-id="3291" instrument_node="">
</span><span data-dcnode-id="3285" instrument_node="">
</span><span data-dcnode-id="3284" instrument_node="">
</span><span data-dcnode-id="3283" instrument_node="">
</span><span data-dcnode-id="3280" instrument_node="">
</span><span data-dcnode-id="3278" instrument_node="">
</span><span data-dcnode-id="3276" instrument_node="">
</span><table border="0" class="imageplugin" data-dcnode-id="3275"><caption align="bottom" data-dcnode-id="3286"><span data-dcnode-id="3290" instrument_node="">
</span><p data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">The Pulitzer Prize was named after Joseph Pulitzer.</span></p><span data-dcnode-id="3287" instrument_node="">
</span></caption><tbody data-dcnode-id="3277"><tr data-dcnode-id="3279"><td data-dcnode-id="3281"><img alt="Statue of Joseph Pulitzer" data-dcnode-id="3282" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fast.wistia.com/cimages/multimages/16/liberty_island_pulitzer_14191871229844034533.jpg&amp;raw"></td></tr></tbody></table><p data-dcnode-id="3274"></p><p data-dcnode-id="3266"><span data-dcnode-id="3273" instrument_node="">The Pulitzer Prize is named after a very famous 19th-century journalist named Joseph Pulitzer. He was born in Hungary in 1847 and emigrated to the United States in 1864. Pulitzer was considered one of the most powerful and widely recognized journalists of his time. He started two newspapers, the </span><i data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">New York World</span></i><span data-dcnode-id="3270" instrument_node=""> and </span><i data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">St.Louis Dispatch</span></i><span data-dcnode-id="3267" instrument_node="">, which helped establish the pattern of the modern newspaper. Never one to shy from the truth, he spent a great portion of his journalistic career fighting corruption, power abuse, and social evils especially when it came to government and big businesses. He fought hard to establish a school where people could go to learn journalism and the establishment of the first journalist program at a university can be attributed to him. </span></p><p data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">Several years before his death, he wrote a will. In his will, he left two million dollars to Columbia University for the establishment of a journalism school as well as money for prizes and scholarships. He stated that there should be four awards for journalism, four for letters and drama, and five traveling scholarships. He established a board to oversee the prizes and gave it the power to make suitable accommodations that might become necessary over the years such as changes, cancellations, suspensions, substitutions, and the authorization to create more categories The Board also had the authority to ensure anyone granted a Pulitzer award met the appropriate standards of excellence. </span></p><h2 data-dcnode-id="3262" id="section---PulitzerPrizeToday"><span data-dcnode-id="3263" instrument_node="">Pulitzer Prize Today</span></h2><p data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">Since its inception in 1917, many revisions have occurred: </span></p><ul data-dcnode-id="3243"><span data-dcnode-id="3259" instrument_node="">
</span><li data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">The board changed its name from overseer advisory board to Pulitzer Prize board. </span></li><span data-dcnode-id="3256" instrument_node="">
</span><li data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">The number of awards rose to 21 awards. </span></li><span data-dcnode-id="3253" instrument_node="">
</span><li data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">New categories, such as music, were introduced while still upholding the spirit of the Pulitzer's original intention. </span></li><span data-dcnode-id="3250" instrument_node="">
</span><li data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">The date of the award changed from April to May. </span></li><span data-dcnode-id="3247" instrument_node="">
</span><li data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">The monetary value of the award changed from $10,000 to $15,000. </span></li><span data-dcnode-id="3244" instrument_node="">
</span></ul><p data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">In 1997, the first substantial changes were made. The board decided to recognize online journalism in addition to traditional journalism forms. In 1998, the music category, which was introduced in 1943 to composers of classical music, was expanded to include other genres in American music. </span></p><h2 data-dcnode-id="3239" id="section---PulitzerPrizeCategories"><span data-dcnode-id="3240" instrument_node="">Pulitzer Prize Categories</span></h2><p data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">As mentioned earlier, there are 21 prizes awarded annually in three categories. </span></p><p data-dcnode-id="3232"><span data-dcnode-id="3236" instrument_node="">The </span><b data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">Journalism</span></b><span data-dcnode-id="3233" instrument_node=""> award categories are: </span></p><ul data-dcnode-id="3188"><span data-dcnode-id="3231" instrument_node="">
</span><li data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">Public service </span></li><span data-dcnode-id="3228" instrument_node="">
</span><li data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">Breaking news reporting </span></li><span data-dcnode-id="3225" instrument_node="">
</span><li data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">Investigative reporting </span></li><span data-dcnode-id="3222" instrument_node="">
</span><li data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">Explanatory reporting </span></li><span data-dcnode-id="3219" instrument_node="">
</span><li data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">Local reporting </span></li><span data-dcnode-id="3216" instrument_node="">
</span><li data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">National reporting </span></li><span data-dcnode-id="3213" instrument_node="">
</span><li data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">International reporting </span></li><span data-dcnode-id="3210" instrument_node="">
</span><li data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">Feature writing </span></li><span data-dcnode-id="3207" instrument_node="">
</span><li data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">Commentary </span></li><span data-dcnode-id="3204" instrument_node="">
</span><li data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">Criticism </span></li><span data-dcnode-id="3201" instrument_node="">
</span><li data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">Editorial writing </span></li><span data-dcnode-id="3198" instrument_node="">
</span><li data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">Editorial cartooning </span></li><span data-dcnode-id="3195" instrument_node="">
</span><li data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">Breaking news photography </span></li><span data-dcnode-id="3192" instrument_node="">
</span><li data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">Feature photography </span></li><span data-dcnode-id="3189" instrument_node="">
</span></ul><p data-dcnode-id="3183"><span data-dcnode-id="3187" instrument_node="">The awards for</span><b data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node=""> Letters</span></b><span data-dcnode-id="3184" instrument_node=""> are: </span></p><ul data-dcnode-id="3163"><span data-dcnode-id="3182" instrument_node="">
</span><li data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">Fiction </span></li><span data-dcnode-id="3179" instrument_node="">
</span><li data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">Drama </span></li><span data-dcnode-id="3176" instrument_node="">
</span><li data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">History </span></li><span data-dcnode-id="3173" instrument_node="">
</span><li data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">Biography or autobiography </span></li><span data-dcnode-id="3170" instrument_node="">
</span><li data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">Poetry </span></li><span data-dcnode-id="3167" instrument_node="">
</span><li data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">General non-fiction </span></li><span data-dcnode-id="3164" instrument_node="">
</span></ul><p data-dcnode-id="3158"><span data-dcnode-id="3162" instrument_node="">The final category award is</span><b data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node=""> Music</span></b><span data-dcnode-id="3159" instrument_node="">. </span></p><span data-dcnode-id="3157" instrument_node="">
</span><div class="hidden" data-dcnode-id="3017" ng-non-bindable=""><h2 data-dcnode-id="3155" id="section---WhoCanWinAPulitzerPrizeAward"><span data-dcnode-id="3156" instrument_node="">Who Can Win A Pulitzer Prize Award</span></h2><p data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">There are certain criteria that must be met to win a Pulitzer: </span></p><ul data-dcnode-id="3145"><span data-dcnode-id="3152" instrument_node="">
</span><li data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">Only U.S. citizens can apply for prizes in books, drama, and music with the exception of one category, history. The book has to be about U.S. history but the author can be of any nationality. </span></li><span data-dcnode-id="3149" instrument_node="">
</span><li data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">For the journalism prize, entrants can be of any nationality but the work they are entering had to appear in a U.S. journal, newspaper, or any regularly published news site. </span></li><span data-dcnode-id="3146" instrument_node="">
</span></ul><p data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">The actual criteria will vary for the three main categories and this information is posted on the Pulitzer website. The applicants submit their application to the 19-member board that selects the winner who has the majority vote from the nominations. They also have the right to bypass the nominations and select a different entry following a 75% majority vote. The board can also vote to issue no award if they feel there are no deserving candidates. </span></p><h2 data-dcnode-id="3141" id="section---NotablePulitzerPriceWinners"><span data-dcnode-id="3142" instrument_node="">Notable Pulitzer Price Winners</span></h2><p data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">Over the years there have been many notable Pulitzer Prize winners including: </span></p><ul data-dcnode-id="3089"><span data-dcnode-id="3138" instrument_node="">
</span><li data-dcnode-id="3133"><span data-dcnode-id="3137" instrument_node="">Robert Frost for </span><i data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">The Collected Poems of Robert Frost</span></i><span data-dcnode-id="3134" instrument_node=""> (1931) </span></li><span data-dcnode-id="3132" instrument_node="">
</span><li data-dcnode-id="3127"><span data-dcnode-id="3131" instrument_node="">Margaret Mitchell for the novel </span><i data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">Gone with the Wind </span></i><span data-dcnode-id="3128" instrument_node="">(1937) </span></li><span data-dcnode-id="3126" instrument_node="">
</span><li data-dcnode-id="3121"><span data-dcnode-id="3125" instrument_node="">Arthur Mitchell for the play </span><i data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Death of a Salesman</span></i><span data-dcnode-id="3122" instrument_node=""> (1949) </span></li><span data-dcnode-id="3120" instrument_node="">
</span><li data-dcnode-id="3115"><span data-dcnode-id="3119" instrument_node="">President John F. Kennedy for his book </span><i data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">Profiles in Courage</span></i><span data-dcnode-id="3116" instrument_node=""> (1957) </span></li><span data-dcnode-id="3114" instrument_node="">
</span><li data-dcnode-id="3109"><span data-dcnode-id="3113" instrument_node="">Harper Lee for her novel </span><i data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">To Kill a Mockingbird</span></i><span data-dcnode-id="3110" instrument_node=""> (1961) </span></li><span data-dcnode-id="3108" instrument_node="">
</span><li data-dcnode-id="3103"><span data-dcnode-id="3107" instrument_node="">Alice Walker for the novel </span><i data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">The Color Purple</span></i><span data-dcnode-id="3104" instrument_node=""> (1983) </span></li><span data-dcnode-id="3102" instrument_node="">
</span><li data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">Hank Williams for his music (2010) </span></li><span data-dcnode-id="3099" instrument_node="">
</span><li data-dcnode-id="3094"><span data-dcnode-id="3098" instrument_node="">Lin-Manuel Miranda for the play </span><i data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">Hamilton</span></i><span data-dcnode-id="3095" instrument_node=""> (2016) </span></li><span data-dcnode-id="3093" instrument_node="">
</span><li data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">The New York Times for its public service award (2021) </span></li><span data-dcnode-id="3090" instrument_node="">
</span></ul><p data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">Some individuals have won the Pulitzer multiple times. People who have won the award four times include: </span></p><ul data-dcnode-id="3073"><span data-dcnode-id="3086" instrument_node="">
</span><li data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">Robert Frost for his poetry </span></li><span data-dcnode-id="3083" instrument_node="">
</span><li data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">Eugene O'Neil for his drama productions </span></li><span data-dcnode-id="3080" instrument_node="">
</span><li data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">Carol Guzy for her photojournalism </span></li><span data-dcnode-id="3077" instrument_node="">
</span><li data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">David Barstow for investigative reporting, public service, and explanatory journalism </span></li><span data-dcnode-id="3074" instrument_node="">
</span></ul><p data-dcnode-id="3068"><span data-dcnode-id="3072" instrument_node="">The most notable award winner is the </span><i data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">New York Times</span></i><span data-dcnode-id="3069" instrument_node=""> who has won the award a total of 132 times. </span></p><h2 data-dcnode-id="3066" id="section---LessonSummary"><span data-dcnode-id="3067" instrument_node="">Lesson Summary</span></h2><p data-dcnode-id="3058"><span data-dcnode-id="3065" instrument_node="">The </span><b data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">Pulitzer Prize</span></b><span data-dcnode-id="3062" instrument_node=""> or </span><b data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">Pulitzer</span></b><span data-dcnode-id="3059" instrument_node=""> is the name given to the prizes awarded annually for outstanding public service in journalism, letters, and musical composition. It was established by Joseph Pulitzer in 1917 who left money in his will for: </span></p><ul data-dcnode-id="3050"><span data-dcnode-id="3057" instrument_node="">
</span><li data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">The establishment of a journalism school at Cambridge University </span></li><span data-dcnode-id="3054" instrument_node="">
</span><li data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">Prizes and scholarships for awards in journalism, letters, and travel scholarships </span></li><span data-dcnode-id="3051" instrument_node="">
</span></ul><p data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">Pulitzer also established a board to oversee the prizes and make suitable changes as and when required. </span></p><p data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">Winners are announced in May at precisely 3 pm, and the actual awards are handed out at a small luncheon at Columbia University. </span></p><p data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">Currently, there are 21 awards in three categories: </span></p><ul data-dcnode-id="3027"><span data-dcnode-id="3043" instrument_node="">
</span><li data-dcnode-id="3039"><b data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">Journalism</span></b><span data-dcnode-id="3040" instrument_node=""> </span></li><span data-dcnode-id="3038" instrument_node="">
</span><li data-dcnode-id="3034"><b data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">Letters</span></b><span data-dcnode-id="3035" instrument_node=""> </span></li><span data-dcnode-id="3033" instrument_node="">
</span><li data-dcnode-id="3029"><b data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">Music</span></b><span data-dcnode-id="3030" instrument_node=""> </span></li><span data-dcnode-id="3028" instrument_node="">
</span></ul><p data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">Twenty categories receive $15,000 dollars and a certificate. The final category, the award for public service journalism, receives a gold medal. </span></p><p data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Only U.S. citizens can apply for prizes in books, drama, and music. The one exception is the history category. In the journalism category, the recipient can be of any nationality as long as the subject matter is about the U.S. The Board makes the decisions about the winners and it is completely at their discretion. </span></p><p data-dcnode-id="3018"><span data-dcnode-id="3022" instrument_node="">There have been many notable prize winners over the years including the most notable winner, the </span><i data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">Wall Street Journal</span></i><span data-dcnode-id="3019" instrument_node="">, which has won a Pulitzer 132 times.</span></p></div><span data-dcnode-id="3016" instrument_node="">
</span></div><span data-dcnode-id="3014" instrument_node="">

</span><h4 data-dcnode-id="2985" itemprop="name"><span data-dcnode-id="2986" instrument_node="">How do you get a Pulitzer Prize?</span></h4><span data-dcnode-id="2984" instrument_node="">
</span><div data-dcnode-id="2976" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="2983" instrument_node="">
</span><div data-dcnode-id="2978" itemprop="text"><span data-dcnode-id="2982" instrument_node="">
</span><p data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">The awards are made on the recommendation of the Pulitzer Prize board which is comprised of several judges appointed by the university. While the number of prizes awarded has varied over the years, there are currently fourteen prizes in journalism, six prizes in letters, and one in music. Award announcements are made in May of each year.</span></p><span data-dcnode-id="2979" instrument_node="">
</span></div><span data-dcnode-id="2977" instrument_node="">
</span></div><span data-dcnode-id="2975" instrument_node="">

</span><div data-dcnode-id="2959" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="2972" instrument_node="">
</span><h4 data-dcnode-id="2970" itemprop="name"><span data-dcnode-id="2971" instrument_node="">What is the Pulitzer Prize and why is it important?</span></h4><span data-dcnode-id="2969" instrument_node="">
</span><div data-dcnode-id="2961" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="2968" instrument_node="">
</span><div data-dcnode-id="2963" itemprop="text"><span data-dcnode-id="2967" instrument_node="">
</span><p data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">The Pulitzer Prize, or Pulitzer, is the name given to the prizes awarded annually for outstanding public service in journalism, letters, and musical composition. Established by Joseph Pulitzer, the award was first given in 1917 and is awarded by Columbia University in New York City. It is important because it recognizes the contributions of people who have upheld a standard of excellence in journalism, letter, and music.</span></p><span data-dcnode-id="2964" instrument_node="">
</span></div><span data-dcnode-id="2962" instrument_node="">
