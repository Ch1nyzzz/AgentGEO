</span><p data-dcnode-id="3359"><span data-dcnode-id="3371" instrument_node="">The </span><b data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">2014 Pulitzer Prizes</span></b><span data-dcnode-id="3368" instrument_node=""> were awarded by the Pulitzer Prize Board for work during the 2013 calendar year.  The deadline for entries was January 25, 2014.</span><sup class="reference" data-dcnode-id="3365" id="cite_ref-1"><a data-dcnode-id="3366" href="#cite_note-1"><span data-dcnode-id="3367" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3364" instrument_node=""> Prize winners and nominated finalists were announced on April 14, 2014.</span><sup class="reference" data-dcnode-id="3361" id="cite_ref-2"><a data-dcnode-id="3362" href="#cite_note-2"><span data-dcnode-id="3363" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3360" instrument_node="">
</span></p><p data-dcnode-id="3315"><i data-dcnode-id="3356"><a data-dcnode-id="3357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Washington_Post" title="The Washington Post"><span data-dcnode-id="3358" instrument_node="">The Washington Post</span></a></i><span data-dcnode-id="3355" instrument_node=""> and </span><i data-dcnode-id="3352"><a data-dcnode-id="3353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guardian_US" title="Guardian US"><span data-dcnode-id="3354" instrument_node="">The Guardian US</span></a></i><span data-dcnode-id="3351" instrument_node=""> shared the </span><a data-dcnode-id="3349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pulitzer_Prize_for_Public_Service" title="Pulitzer Prize for Public Service"><span data-dcnode-id="3350" instrument_node="">Pulitzer Prize for Public Service</span></a><span data-dcnode-id="3348" instrument_node="">, often considered the top prize for journalism.  The two papers were honored for their coverage of the </span><a data-dcnode-id="3346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_surveillance_disclosures_%282013%25E2%2580%2593present%29" title="Global surveillance disclosures (2013–present)"><span data-dcnode-id="3347" instrument_node="">disclosures</span></a><span data-dcnode-id="3345" instrument_node=""> about surveillance done by the US </span><a data-dcnode-id="3343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Security_Agency" title="National Security Agency"><span data-dcnode-id="3344" instrument_node="">National Security Agency</span></a><span data-dcnode-id="3342" instrument_node="">.  </span><a data-dcnode-id="3340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Snowden" title="Edward Snowden"><span data-dcnode-id="3341" instrument_node="">Edward Snowden</span></a><span data-dcnode-id="3339" instrument_node="">, who leaked security documents to the two newspapers, said the award was "vindication for everyone who believes that the public has a role in government."</span><sup class="reference" data-dcnode-id="3336" id="cite_ref-CNN_3-0"><a data-dcnode-id="3337" href="#cite_note-CNN-3"><span data-dcnode-id="3338" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3335" instrument_node="">  Other journalism honored included the </span><i data-dcnode-id="3332"><a class="mw-redirect" data-dcnode-id="3333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boston_Globe" title="Boston Globe"><span data-dcnode-id="3334" instrument_node="">Boston Globe</span></a></i><span class="nowrap" data-dcnode-id="3330" style="padding-left:0.1em;"><span data-dcnode-id="3331" instrument_node="">'</span></span><span data-dcnode-id="3329" instrument_node="">s coverage of the </span><a class="mw-redirect" data-dcnode-id="3327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boston_Marathon_bombings" title="Boston Marathon bombings"><span data-dcnode-id="3328" instrument_node="">Boston Marathon bombings</span></a><span data-dcnode-id="3326" instrument_node="">, </span><a class="new" data-dcnode-id="3324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChris_Hamby%26action%3Dedit%26redlink%3D1" title="Chris Hamby (page does not exist)"><span data-dcnode-id="3325" instrument_node="">Chris Hamby</span></a><span data-dcnode-id="3323" instrument_node=""> for investigative reporting, and </span><a data-dcnode-id="3321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eli_Saslow" title="Eli Saslow"><span data-dcnode-id="3322" instrument_node="">Eli Saslow</span></a><span data-dcnode-id="3320" instrument_node=""> for explanatory reporting.</span><sup class="reference" data-dcnode-id="3317" id="cite_ref-CNN_3-1"><a data-dcnode-id="3318" href="#cite_note-CNN-3"><span data-dcnode-id="3319" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3316" instrument_node="">
</span></p><p data-dcnode-id="3244"><i data-dcnode-id="3312"><a data-dcnode-id="3313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Goldfinch_%28novel%29" title="The Goldfinch (novel)"><span data-dcnode-id="3314" instrument_node="">The Goldfinch</span></a></i><span data-dcnode-id="3311" instrument_node=""> by </span><a data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donna_Tartt" title="Donna Tartt"><span data-dcnode-id="3310" instrument_node="">Donna Tartt</span></a><span data-dcnode-id="3308" instrument_node=""> won the </span><a data-dcnode-id="3306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pulitzer_Prize_for_Fiction" title="Pulitzer Prize for Fiction"><span data-dcnode-id="3307" instrument_node="">Pulitzer Prize for Fiction</span></a><span data-dcnode-id="3305" instrument_node="">.  The judges described the novel, which took Tartt 11 years to write, as "a beautifully written coming-of-age novel with exquisitely drawn characters".</span><sup class="reference" data-dcnode-id="3302" id="cite_ref-Guardian_4-0"><a data-dcnode-id="3303" href="#cite_note-Guardian-4"><span data-dcnode-id="3304" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3301" instrument_node="">  In addition to the award itself, Tartt received a $100,000 cash prize.  She said she was "surprised" and "very happy" to receive the award, her first major literary prize.</span><sup class="reference" data-dcnode-id="3298" id="cite_ref-Guardian_4-1"><a data-dcnode-id="3299" href="#cite_note-Guardian-4"><span data-dcnode-id="3300" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3297" instrument_node="">  Overall, the novel has drawn "mixed reviews" from literary critics.</span><sup class="reference" data-dcnode-id="3294" id="cite_ref-Guardian_4-2"><a data-dcnode-id="3295" href="#cite_note-Guardian-4"><span data-dcnode-id="3296" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3293" instrument_node="">  Other contenders for the fiction prize included  </span><i data-dcnode-id="3290"><a data-dcnode-id="3291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Son_%28Meyer_novel%29" title="The Son (Meyer novel)"><span data-dcnode-id="3292" instrument_node="">The Son</span></a></i><span data-dcnode-id="3289" instrument_node=""> by </span><a data-dcnode-id="3287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philipp_Meyer" title="Philipp Meyer"><span data-dcnode-id="3288" instrument_node="">Philipp Meyer</span></a><span data-dcnode-id="3286" instrument_node=""> and </span><i data-dcnode-id="3283"><a class="new" data-dcnode-id="3284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Woman_Who_Lost_Her_Soul%26action%3Dedit%26redlink%3D1" title="The Woman Who Lost Her Soul (page does not exist)"><span data-dcnode-id="3285" instrument_node="">The Woman Who Lost Her Soul</span></a></i><span data-dcnode-id="3282" instrument_node=""> by </span><a data-dcnode-id="3280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bob_Shacochis" title="Bob Shacochis"><span data-dcnode-id="3281" instrument_node="">Bob Shacochis</span></a><span data-dcnode-id="3279" instrument_node="">.  </span><a data-dcnode-id="3277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vijay_Seshadri" title="Vijay Seshadri"><span data-dcnode-id="3278" instrument_node="">Vijay Seshadri</span></a><span data-dcnode-id="3276" instrument_node=""> won the </span><a data-dcnode-id="3274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pulitzer_Prize_for_Poetry" title="Pulitzer Prize for Poetry"><span data-dcnode-id="3275" instrument_node="">Pulitzer Prize for Poetry</span></a><span data-dcnode-id="3273" instrument_node=""> for his collection </span><i data-dcnode-id="3270"><a class="new" data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D3_Sections%26action%3Dedit%26redlink%3D1" title="3 Sections (page does not exist)"><span data-dcnode-id="3272" instrument_node="">3 Sections</span></a></i><span data-dcnode-id="3269" instrument_node="">.  Other literary winners included </span><i data-dcnode-id="3266"><a data-dcnode-id="3267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Internal_Enemy" title="The Internal Enemy"><span data-dcnode-id="3268" instrument_node="">The Internal Enemy</span></a></i><span data-dcnode-id="3265" instrument_node=""> by </span><a data-dcnode-id="3263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alan_Taylor_%28historian%29" title="Alan Taylor (historian)"><span data-dcnode-id="3264" instrument_node="">Alan Taylor</span></a><span data-dcnode-id="3262" instrument_node="">, </span><i data-dcnode-id="3259"><a class="mw-redirect" data-dcnode-id="3260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toms_River%3A_A_Story_of_Science_and_Salvation" title="Toms River: A Story of Science and Salvation"><span data-dcnode-id="3261" instrument_node="">Toms River: A Story of Science and Salvation</span></a></i><span data-dcnode-id="3258" instrument_node=""> by </span><a data-dcnode-id="3256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dan_Fagin" title="Dan Fagin"><span data-dcnode-id="3257" instrument_node="">Dan Fagin</span></a><span data-dcnode-id="3255" instrument_node="">, and </span><a data-dcnode-id="3253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Megan_Marshall" title="Megan Marshall"><span data-dcnode-id="3254" instrument_node="">Megan Marshall</span></a><span data-dcnode-id="3252" instrument_node="">'s biography of </span><a data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_Fuller" title="Margaret Fuller"><span data-dcnode-id="3251" instrument_node="">Margaret Fuller</span></a><span data-dcnode-id="3249" instrument_node="">.</span><sup class="reference" data-dcnode-id="3246" id="cite_ref-Guardian_4-3"><a data-dcnode-id="3247" href="#cite_note-Guardian-4"><span data-dcnode-id="3248" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3245" instrument_node="">
</span></p><span data-dcnode-id="3243" instrument_node="">
