</span><h1 class="txt-large" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">What is a Pulitzer Prize?</span></h1><span data-dcnode-id="803" instrument_node="">
</span></header><span data-dcnode-id="801" instrument_node="">
</span><section class="about desktop" data-dcnode-id="788"><span data-dcnode-id="800" instrument_node="">
</span><div class="author-info tk-ff-meta-web-pro txt-grey" data-dcnode-id="790"><span data-dcnode-id="799" instrument_node="">
</span><img alt="Mary McMahon" class="avatar circle fleft" data-dcnode-id="798" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.wisegeek.com/res/common/img/avatars/MaryMcMahon.jpg&amp;raw"><span data-dcnode-id="797" instrument_node="">
</span><address class="txt-strong" data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Mary McMahon</span></address><span data-dcnode-id="794" instrument_node="">
</span><time class="txt-small txt-light" data-dcnode-id="792" datetime="2022-06-12T03:31:47-07:00"><span data-dcnode-id="793" instrument_node="">

</span></div><span data-dcnode-id="789" instrument_node="">
</span></section><span data-dcnode-id="787" instrument_node="">
</span><section class="about mobile" data-dcnode-id="774"><span data-dcnode-id="786" instrument_node="">
</span><a class="author-info tk-ff-meta-web-pro popup-open-but" data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wisegeek.com/what-is-a-pulitzer-prize.htm%23authorBox"><span data-dcnode-id="785" instrument_node="">
</span><img alt="Mary McMahon" class="avatar circle fleft" data-dcnode-id="784" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.wisegeek.com/res/common/img/avatars/MaryMcMahon.jpg&amp;raw"><span data-dcnode-id="783" instrument_node="">
</span><address class="txt-strong txt-grey" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Mary McMahon</span></address><span data-dcnode-id="780" instrument_node="">
</span><time class="txt-small txt-light" data-dcnode-id="778" datetime="2022-06-12T03:31:47-07:00"><span data-dcnode-id="779" instrument_node="">
                                    Date: June 12, 2022                                </span></time><span data-dcnode-id="777" instrument_node="">
</span></a><span data-dcnode-id="775" instrument_node="">
</span></section><span data-dcnode-id="773" instrument_node="">
</span><section class="social" data-dcnode-id="767"><span data-dcnode-id="772" instrument_node="">
</span><span data-dcnode-id="770" instrument_node=""> </span><div class="addthis_inline_share_toolbox" data-dcnode-id="769"></div><span data-dcnode-id="768" instrument_node="">
</span></section><span data-dcnode-id="766" instrument_node="">
</span><section class="content floating" data-dcnode-id="660"><span data-dcnode-id="765" instrument_node="">
</span><figure class="fright txt-center" data-dcnode-id="755"><span data-dcnode-id="764" instrument_node="">
</span><a class="popup-open-but" data-dcnode-id="757" data-popup="#slider-image-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wisegeek.com/what-is-a-pulitzer-prize.htm%23imagePopup"><span data-dcnode-id="763" instrument_node="">
</span><img alt="There are 14 Pulitzer Prizes in journalism." data-dcnode-id="762" sizes="calc(50vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.wisegeek.com/slideshow-mobile-small/a-newspaper.jpg&amp;raw" srcset="//images.wisegeek.com/small/a-newspaper.jpg 232w, //images.wisegeek.com/slideshow-mobile-small/a-newspaper.jpg 520w"><span data-dcnode-id="761" instrument_node="">
</span><figcaption class="tk-ff-meta-web-pro txt-small txt-light desktop" data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">
                                        There are 14 Pulitzer Prizes in journalism.                                    </span></figcaption><span data-dcnode-id="758" instrument_node="">
</span></a><span data-dcnode-id="756" instrument_node="">
</span></figure><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">A Pulitzer Prize is an American prize awarded for distinction in the arts. The Pulitzer Prizes are particularly associated with journalism, but prizes are also awarded in the fields of music and literature.  A win is a great honor, especially for a newspaper, with the all time record for Pulitzer Prizes held by the New York Times, with 95 collective Pulitzers as of 2007. Incidentally, the pronunciation, according to Columbia University, is “pull it sir.”</span></p><span data-dcnode-id="751" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="743"><span data-dcnode-id="749" instrument_node="">
</span><span data-dcnode-id="747" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="5480447840" data-dcnode-id="746" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="745" instrument_node="">
</span><span data-dcnode-id="744" instrument_node="">
</span></div><span data-dcnode-id="742" instrument_node="">
</span><figure class="fright txt-center" data-dcnode-id="732"><span data-dcnode-id="741" instrument_node="">
</span><a class="popup-open-but" data-dcnode-id="734" data-popup="#slider-image-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wisegeek.com/what-is-a-pulitzer-prize.htm%23imagePopup"><span data-dcnode-id="740" instrument_node="">
</span><img alt="The journalism Pulitzer Prizes include awards for editorial writing, investigative reporting and commentary." data-dcnode-id="739" sizes="calc(50vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.wisegeek.com/slideshow-mobile-small/man-with-pen-and-book-in-hand-near-brick-wall.jpg&amp;raw" srcset="//images.wisegeek.com/small/man-with-pen-and-book-in-hand-near-brick-wall.jpg 232w, //images.wisegeek.com/slideshow-mobile-small/man-with-pen-and-book-in-hand-near-brick-wall.jpg 520w"><span data-dcnode-id="738" instrument_node="">
</span><figcaption class="tk-ff-meta-web-pro txt-small txt-light desktop" data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">
                                        The journalism Pulitzer Prizes include awards for editorial writing, investigative reporting and commentary.                                    </span></figcaption><span data-dcnode-id="735" instrument_node="">
</span></a><span data-dcnode-id="733" instrument_node="">
</span></figure><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="730" instrument_node="">The prizes are named for Joseph Pulitzer, a prominent late 19th and early 20th century </span><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.practicaladultinsights.com/how-do-i-become-a-journalist.htm"><span data-dcnode-id="729" instrument_node="">journalist</span></a><span data-dcnode-id="727" instrument_node=""> who revolutionized the </span><em data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">New York World</span></em><span data-dcnode-id="724" instrument_node="">, a major New York City newspaper. Under Pulitzer, the paper became renowned for hard-hitting investigative journalism, and it also contributed to public service through a variety of public campaigns. One year after Pulitzer's death in 1911, the Columbia University School of Journalism was founded, and in 1917 the first Pulitzer Prizes were awarded by a panel of judges drawn from this institution and “persons of distinction.” The Pulitzer board continues to include academics and scholars from Columbia University, as well as prestigious members of the news community.</span></p><span data-dcnode-id="722" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="714"><span data-dcnode-id="720" instrument_node="">
</span><span data-dcnode-id="718" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="9332062945" data-dcnode-id="717" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="716" instrument_node="">
</span><span data-dcnode-id="715" instrument_node="">
</span></div><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="712" instrument_node="">There are 21 Pulitzer Prizes: one in music, six in literature, and 14 in journalism. The journalism prizes include awards for investigative reporting, editorial cartooning, breaking news photography, breaking news reporting, explanatory reporting, national reporting, criticism, international reporting, feature photography, editorial writing, commentary, local reporting, feature writing, and public service.  Pulitzer Prize winning photographs in particular have often become extremely famous, chronicling important events in human history or portraying emotional scenes through the lens of a camera. In literature, Pulitzer Prizes are awarded in </span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.languagehumanities.org/what-is-fiction.htm"><span data-dcnode-id="711" instrument_node="">fiction</span></a><span data-dcnode-id="709" instrument_node="">, drama, poetry, history, biography, and general </span><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.languagehumanities.org/what-is-nonfiction.htm"><span data-dcnode-id="708" instrument_node="">nonfiction</span></a><span data-dcnode-id="706" instrument_node="">.</span></p><span data-dcnode-id="704" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="696"><span data-dcnode-id="702" instrument_node="">
</span><span data-dcnode-id="700" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="9592110917" data-dcnode-id="699" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="698" instrument_node="">
</span><span data-dcnode-id="697" instrument_node="">
</span></div><span data-dcnode-id="695" instrument_node=""> </span><div class="ad-block center" data-dcnode-id="689"><span data-dcnode-id="693" instrument_node="">
</span><a class="txt-strong" data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capitaloneshopping.sjv.io/meRVZ%3Fsubid%3Darticle-text-link" onclick="fbq('track','Lead');"><span data-dcnode-id="692" instrument_node="">Is Amazon actually giving you the best price? This little known plugin reveals the answer.</span></a><span data-dcnode-id="690" instrument_node="">
</span></div><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="687" instrument_node="">The winner of a Pulitzer Prize receives a $10,000 US award along with a certificate acknowledging the achievement. The Public Service award is given to newspapers, not individuals, although a specific journalist may be recognized in the text of the citation, and the newspaper receives a Pulitzer medal cast in gold with an image of Pulitzer's face on one side, and a hand-operated </span><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.easytechjunkie.com/what-is-the-printing-press.htm"><span data-dcnode-id="686" instrument_node="">printing press</span></a><span data-dcnode-id="684" instrument_node=""> on the other.</span></p><span data-dcnode-id="682" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="674"><span data-dcnode-id="680" instrument_node="">
</span><span data-dcnode-id="678" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="6965947570" data-dcnode-id="677" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="676" instrument_node="">
</span><span data-dcnode-id="675" instrument_node="">
</span></div><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Typically, newspapers nominate themselves for Pulitzer Prizes by submitting the relevant material along with an entry form. In order to qualify, the newspaper must be published in the United States at least once a week, but the journalist submitted for the prize need not be American. Competitors in the music and literature categories likewise submit their own entries, which include copies of the work that they are nominating.</span></p><span data-dcnode-id="670" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="662"><span data-dcnode-id="668" instrument_node="">
</span><span data-dcnode-id="666" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="5652865908" data-dcnode-id="665" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="664" instrument_node="">
</span><span data-dcnode-id="663" instrument_node="">
</span></div><span data-dcnode-id="661" instrument_node="">

</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">For the literature prizes, I believe that the material must in some way relate to America and American life; beyond that, though, I don't think there are many restrictions on what the works must include, though it explains why very few fantasy or science fiction books win, since they are less likely to involve a world with America and Earth.    </span></p></article><span data-dcnode-id="547" instrument_node="">

</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">The Pulitzer gold medal for public service bears the likeness of Benjamin Franklin, not Joseph Pulitzer. Also, it is now gold-plated silver, and is no longer "cast in gold." One good source for information on the Pulitzers is my 2008 book, "Pulitzer's Gold: Behind the Prize for Public Service Journalism." With regards, R. Harris     </span></p></article><span data-dcnode-id="536" instrument_node="">
