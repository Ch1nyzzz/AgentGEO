</span><div class="a-expander-collapsed-height a-row a-expander-container a-spacing-base a-expander-partial-collapse-container" data-a-expander-collapsed-height="140" data-a-expander-name="book_description_expander" data-dcnode-id="3054" style="max-height: none; height: 140px;"><span data-dcnode-id="3093" instrument_node=""> </span><div aria-expanded="false" class="a-expander-content a-expander-partial-collapse-content" data-dcnode-id="3063" style="padding-bottom: 20px;"><span data-dcnode-id="3092" instrument_node=""> </span><p data-dcnode-id="3089"><span data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">The Secret History is a murder mystery that goes in the reverse order. In the very first chapter, the narrator Richard Papen confesses that he is partly responsible for the death of his college mate Edmund "Bunny" Corcoran. The author does not give away a lot of details initially, but slowly builds up the mystery. Richard talks about his days at Hampden College in New England, where he was a part of a socially isolated group of Classics students. He introduces the readers to the other members, which include the twins Charles and Camilla, Henry Winter, Francis Abernathy, and Edmund Corcoran. Richard and Bunny find out that in the past Henry had once accidently killed a farmer. After having uncovered the truth, Bunny starts to blackmail the others.</span></span></p><p data-dcnode-id="3086"><span data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">In The Secret History, fearing that Bunny might tell the police of the murder, Henry and the gang decide to kill the boy. This novel looks into the aftermath of a crime. It shows how each individual deals with their psychological strains differently, where one becomes abusive and other starts getting panic attacks.</span></span></p><p data-dcnode-id="3083"><span data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">This novel, packed with elements of guilt, fear, friendship, and remorse, will keep readers hooked on till the last page. The Secret History, published by Penguin UK in 1993, is available in paperback.</span></span></p><p data-dcnode-id="3080"><span data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">Key Features:</span></span></p><p data-dcnode-id="3079"></p><ul class="a-unordered-list a-vertical" data-dcnode-id="3066"><li data-dcnode-id="3075"><span class="a-list-item" data-dcnode-id="3076"><span data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">The Secret History is Donna Tartts first novel.</span></span></span></li><li data-dcnode-id="3071"><span class="a-list-item" data-dcnode-id="3072"><span data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">The book has been translated into 24 languages, and is a bestseller.</span></span></span></li><li data-dcnode-id="3067"><span class="a-list-item" data-dcnode-id="3068"><span data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">A feature film is in production at Miramax.</span></span></span></li></ul><p data-dcnode-id="3065"></p><span data-dcnode-id="3064" instrument_node=""> </span></div><span data-dcnode-id="3062" instrument_node=""> </span><div class="a-expander-header a-expander-partial-collapse-header" data-dcnode-id="3056" style="opacity: 1; display: block;"><div class="a-expander-content-fade" data-dcnode-id="3061"></div><a aria-expanded="false" class="a-declarative" data-a-expander-toggle="{&quot;allowLinkDefault&quot;:true, &quot;expand_prompt&quot;:&quot;Read more&quot;, &quot;collapse_prompt&quot;:&quot;Read less&quot;}" data-action="a-expander-toggle" data-csa-c-func-deps="aui-da-a-expander-toggle" data-csa-c-type="widget" data-csa-interaction-events="click" data-dcnode-id="3057" href="javascript:void(0)" role="button"><i class="a-icon a-icon-extender-expand" data-dcnode-id="3060"></i><span class="a-expander-prompt" data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">Read more</span></ </span><div class="a-divider a-divider-section" data-dcnode-id="2389"><div class="a-divider-inner" data-dcnode-id="2390"></div></div><span data-dcnode-id="2388" instrument_node=""> </span><h2 data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node=""> Product description </span></h2><span data-dcnode-id="2385" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-base" data-dcnode-id="2305"><span data-dcnode-id="2384" instrument_node=""> </span><h3 data-dcnode-id="2381"><span data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Review</span></span></h3><span data-dcnode-id="2380" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2318"><span data-dcnode-id="2379" instrument_node=""> </span><span class="a-text-italic" data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">The Secret History</span></span><span data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node=""> succeeds magnificently ... A remarkably powerful novel [and] a ferociously well-paced entertainment ... </span></span><span class="a-text-bold" data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">Forceful, cerebral, and impeccably controlled </span></span><span data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node=""> ― </span></span><span class="a-text-italic" data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">New York Times</span></span><span data-dcnode-id="2366"><br data-dcnode-id="2368"><br data-dcnode-id="2367"></span><span class="a-text-bold" data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">So irresistible and seductive it's almost a guilty pleasure</span></span><span data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node=""> ― </span></span><span class="a-text-italic" data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Guardian</span></span><span data-dcnode-id="2357"><br data-dcnode-id="2359"><br data-dcnode-id="2358"></span><span class="a-text-bold" data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">A huge, mesmerizing, galloping read</span></span><span data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node=""> ― </span></span><span class="a-text-italic" data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Vanity Fair</span></span><span data-dcnode-id="2347"><br data-dcnode-id="2350"><br data-dcnode-id="2349"><span data-dcnode-id="2348" instrument_node="">Donna Tartt is an amazingly good writer. She's dense, she's allusive. </span></span><span class="a-text-bold" data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">She's a gorgeous storyteller</span></span><span data-dcnode-id="2341"><span data-dcnode-id="2344" instrument_node=""> -- Stephen King</span><br data-dcnode-id="2343"><br data-dcnode-id="2342"></span><span class="a-text-bold" data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Takes my breath away</span></span><span data-dcnode-id="2335"><span data-dcnode-id="2338" instrument_node=""> -- Ruth Rendell</span><br data-dcnode-id="2337"><br data-dcnode-id="2336"></span><span class="a-text-bold" data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Brilliant and compulsive</span></span><span data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node=""> ― </span></span><span class="a-text-italic" data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">Evening Standard</span></span><span data-dcnode-id="2326"><br data-dcnode-id="2328"><br data-dcnode-id="2327"></span><span class="a-text-bold" data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">A haunting, compelling, and brilliant piece of fiction</span></span><span data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node=""> ... Packed with literary allusion and told with a sophistication and texture that owes much more to the nineteenth century than to the twentieth ― </span></span><span class="a-text-italic" data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">The Times</span></span><span data-dcnode-id="2319" instrument_node=""> </span></div><span data-dcnode-id="2317" instrument_node=""> </span><h3 data-dcnode-id="2314"><span data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">About the Author</span></span></h3><span data-dcnode-id="2313" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2307"><span data-dcnode-id="2312" instrument_node=""> </span><p data-dcnode-id="2309"><span data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">Donna Tartt, born in 1963, is an American novelist, writer, and critic. She is the winner of the 2014 Pulitzer Prize (Fiction) for The Goldfinch. The author won the 2003 WH Smith Literary Award for The Little Friend. She was born in Greenwood, Mississippi. Tartt joined the University of Mississippi in 1981, but transferred to Bennington College one year later, from where she graduated in 1986. The author’s literary works follow themes such as social stratification, guilt, and aesthetic beauty. Tartt now lives in New York City.</span></span></p><span data-dcnode-id="2308" instrument_node=""> </span></div><span data-dcnode-id="2306" instrument_node=""> </span></div><span data-dcnode-id="2304" instrument_node=""> </span></div><span data-dcnode-id="2302" instrument_node="">

</span></a></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1145" data-hook="review-date"><span data-dcnode-id="1146" instrument_node="">Reviewed in India on 14 November 2017</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1142"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1143" data-hook="avp-badge-linkless"><span data-dcnode-id="1144" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1095"><span class="a-size-base review-text" data-dcnode-id="1096" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1097" style="max-height: none; height: 300px;"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1104" data-hook="review-collapsed" style="padding-bottom: 20px;"><span data-dcnode-id="1141" instrument_node="">
</span><span data-dcnode-id="1106"><span data-dcnode-id="1140" instrument_node="">
  When I first heard that this book is about students of the Classics, I myself being a student of English Literature, felt that I simply HAD to read it. So I began to read in the hopes that this novel would deal with things that I could resonate with and I wasn’t disappointed. This novel refers to the ways of the Greeks, the mythologies, religious beliefs, and histories. In doing so, the writing has an intellectual edge and I’m pleased to say I got what I wanted out of this book. But there’s so much going on in this book. There’s mystery, suspense, and quite a bit of thrill. Did I mention it gets pretty dark in places? After I was done reading this (I finished at the stroke of midnight) and I actually looked around a few times checking for ghosts in my dark room.</span><br data-dcnode-id="1139"><br data-dcnode-id="1138"><span data-dcnode-id="1137" instrument_node="">The first few pages painted a picture similar to the one I had witnessed in the film “Dead Poet’s Society.” A movie starring the loveable Robin Williams who plays the role of a lecturer of poetry. I absolutely LOVED this film. But this book was quite different and has its own uniqueness.</span><br data-dcnode-id="1136"><br data-dcnode-id="1135"><span data-dcnode-id="1134" instrument_node="">Here are a group of highly intellectual students cordoned off to spend a majority of their time taking classes from an erudite teacher. But underneath this seemingly normal facade, lurks disaster. What could possibly happen to this lot in order to plummet all of them into a dark abyss?</span><br data-dcnode-id="1133"><br data-dcnode-id="1132"><span data-dcnode-id="1131" instrument_node="">For the sensitive reader out there, here’s something to be aware of: This novel touches upon twincest, drugs, and cold-blooded murder.</span><br data-dcnode-id="1130"><br data-dcnode-id="1129"><span data-dcnode-id="1128" instrument_node="">I was surprised how the events in the novel made me respond on an emotional level. I felt for the characters, took pity on them and their state of helplessness. At times, I was gripped with fear for them while in other times, I was puzzled by the level of distance that the narrator Richard, seemed to have in the telling of the narrative.The subject matter of this novel really won me over. I have in the past, encountered groups of peers with an extreme passion for a subject. I have also witnessed the obsessiveness with which some scholarly and stoic individuals attempt to tackle the problems in their lives. The attempt to immerse oneself into the subject one has chosen to specialize in. This is exactly what the characters of The Secret History do. For instance, Henry and the twins, Charles and Camilla, really manage to live, breathe, and sleep Greek-The subject they are majoring in.</span><br data-dcnode-id="1127"><br data-dcnode-id="1126"><span data-dcnode-id="1125" instrument_node="">It makes clear that the distinction between intellectuality and sheer barbarism is but a thin line.</span><br data-dcnode-id="1124"><br data-dcnode-id="1123"><span data-dcnode-id="1122" instrument_node="">This novel provides us with a moral dilemma. It makes us question the correctness of some people’s actions/decisions. For instance, I was truly shocked at Julian’s and Henry’s&nbsp; level of eccentricity, their unconventional way of responding to situations they are faced with.</span><br data-dcnode-id="1121"><br data-dcnode-id="1120"><span data-dcnode-id="1119" instrument_node="">I felt that this novel could have been much more if Tartt had given us more background for the narrator, Richard. In the end, I felt like I didn’t know this character any more than I did at the start of the novel. I also hoped there was more information on the time period in which “The Secret History” takes place. I’m aware that this novel was set around 25 years ago but I found it difficult to place it within a particular time frame. Although from what I was able to gather, it is probably set in the period just after the Vietnam War.</span><br data-dcnode-id="1118"><br data-dcnode-id="1117"><span data-dcnode-id="1116" instrument_node="">What really appealed to me about this story was Tartt’s writing. Even though it is at times possible to predict what happens next in the plot, the process or manner in which her writing unravels this event is truly remarkable. This book had me sitting on the edge of my seat from the very beginning. Tartt’s writing is absorbing and expects a level of involvement on part of the reader. With every turn of the page, this novel simply draws you in. Tartt's has this manner of dropping hints about upcoming events and you know it’s going to happen soon, but you can do nothing as a reader except read on to find out what unfolds.</span><br data-dcnode-id="1115"><br data-dcnode-id="1114"><span data-dcnode-id="1113" instrument_node="">The characters are all well rounded and created with utmost care. Tartt’s decision to center the plot around seven main characters is an ambitious one, but she achieves this with flawlessness and ease.</span><br data-dcnode-id="1112"><br data-dcnode-id="1111"><span data-dcnode-id="1110" instrument_node="">The manner in which Tartt chooses to leave some events to the reader’s imagination in the course of this novel is what struck me as utterly brilliant. She only hints at them, leaving the rest up to the reader.</span><br data-dcnode-id="1109"><br data-dcnode-id="1108"><span data-dcnode-id="1107" instrument_node="">Tartt’s novel succeeds in its ability to absolutely dumbfound the reader, leave them speechless. The Secret History left me feeling only partially satiated. Nevertheless, I fell in love with it. This is the sort of book that must be read and re-read. But for now, I’m now looking forward to reading Tartt’s other works, The Little Friend, and The Goldfinch.
</span></span><span data-dcnode-id="1105" instrument_node="">

</span><span data-dcnode-id="1034"><span data-dcnode-id="1041" instrument_node="">
  This is going to be a difficult one to review because majority of the readers loved it and I did not feel the same way. I wanted to DNF this book within 200 pages but I was curious to know what the hype was all about. The narrator, Richard Papen joins a group of five elite, mysterious, obsessed with ancient Greek literature students and shit starts to go down. The book is about about young, self absorbed, vain and abusive bunch of rich kids who go to the extent of killing one of their own while making it all look so easy. The Secret History started with a typical college plot but quickly drifted off to a whole new level of pretentious and pointless waffle.</span><br data-dcnode-id="1040"><br data-dcnode-id="1039"><span data-dcnode-id="1038" instrument_node="">Beauty is terror. Whatever we call beautiful, we quiver before it.</span><br data-dcnode-id="1037"><br data-dcnode-id="1036"><span data-dcnode-id="1035" instrument_node="">In the pretext of Greek literature and philosophy, Donna Tartt has written a boring and vile book which does not offer us any insight to why they are drawn to such extremes. This is a story that could have been told in about 300 pages but instead went on rattling for 600-painful-shoot-me-in-the-head-for-trying-to-finish-this-pages. Extremely weak and poorly developed characters doing all kinds of shit, drugs, stealing, Bacchanalia, drinking, incest, blackmailing and even murder. The characters include, a blackmailing homophobe, a nerd who is still in the closet, a generic female love interest who has a twin, a guy who falls in love with her but his love is not reciprocated, and a stud who thinks he knows everything. The characters were impossible to connect with and lacked depth. Tartt has written a lot about Ancient Greek which is just for show and effect, they talk so much about Plato and Homer in the first few pages but it drifts off very soon. The Secret History is overrated, incomprehensible and shallow. It is a complete waste of time. Because of all the hype, I might consider reading The Goldfinch but I do not recommend this book to anyone.
</span></span><span data-dcnode-id="1033" instrument_node="">

  Here's my review: the epilogue felt earnt. This was because the book felt so very bloody long.</span><br data-dcnode-id="941"><br data-dcnode-id="940"><span data-dcnode-id="939" instrument_node="">It's not a bad book - but it's pretty anemic fare when you look closely. You'd think that ancient Greek would provide a charming and interesting motif. You'd be wrong. Like most of the book, it's thin set dressing for a medium-interesting melodrama that doesn't really go anywhere.</span><br data-dcnode-id="938"><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node="">It's nicely written, but not so much as to ever make you stop and marvel.</span><br data-dcnode-id="935"><br data-dcnode-id="934"><span data-dcnode-id="933" instrument_node="">The characters are strangely thin. The plot seems poised to set them up as being profound, but then fumbles it. I did wonder if this was a thematic point, but I don't really think so, on reflection. The characterisation is also somewhat....bloodless. Again, I don't really this was deliberate *enough*. Meaning: I think it was deliberate, but serves no overarching purpose, like you'd hope.</span><br data-dcnode-id="932"><br data-dcnode-id="931"><span data-dcnode-id="930" instrument_node="">It's fine. I wouldn't go out of my way to recommend it.

</span><span data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">A charming and shocking masterpiece filled with drama, twists, and bygone splendor</span></span><span data-dcnode-id="884" instrument_node="">
</span></span></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="880" data-hook="review-date"><span data-dcnode-id="881" instrument_node="">Reviewed in the United Kingdom on 24 April 2018</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="877"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="878" data-hook="avp-badge-linkless"><span data-dcnode-id="879" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="848"><span class="a-size-base review-text" data-dcnode-id="849" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="850" style="max-height: none; height: 300px;"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="857" data-hook="review-collapsed" style="padding-bottom: 20px;"><span data-dcnode-id="876" instrument_node="">
</span><span data-dcnode-id="859"><span data-dcnode-id="875" instrument_node="">
  I read this book on a recommendation, and have to admit that after reading a few pages I did not expect to enjoy it as much as I did. I do not generally like books that are overly descriptive and feature more 'pretentious' prose, in fact I detest classical literature, yet the description and classical language, is what gives The Secret History it's charm.</span><br data-dcnode-id="874"><br data-dcnode-id="873"><span data-dcnode-id="872" instrument_node="">This book was published in 1992, but harks back to a time more reminiscent of the early 1900's in style. The language used by some of the characters, namely Bunny, is reminiscent of The Great Gatsby. The characters are proper, intelligent, well-spoken,well-dressed, apparently wealthy young people, yet their lives are fueled by drink, drugs, and cigarettes. The drug abuse in this book is merely an undertone of the main story and therefore not as striking, especially considering the characters go about their addictions as though they are of no importance at all. This however, creates an air of mystery - building a world that few of us could ever know. A secret world of intoxication and prose. Of fine restaurants and best suits.</span><br data-dcnode-id="871"><br data-dcnode-id="870"><span data-dcnode-id="869" instrument_node="">***spoilers***</span><br data-dcnode-id="868"><br data-dcnode-id="867"><span data-dcnode-id="866" instrument_node="">The story is better described as a 'whydunnit' - opening with the death of a main character, with Book 1 of the story describing the events leading to the death, and Book 2 describing the events after the death. Our narrator, Richard, arrives at the fictional Hampden College with the intention of continuing his studies in Greek, and there has his first encounter with enigmatic tutor Julian, who eventually permits him to study in his small selective class of only six students. Previously fascinated with these students, Richard soon finds himself drawn into their world of bygone-time splendor. Richard struggles to open himself up to the group, especially as they are all of discernible wealth, and he has entered the school on Financial Aid to the horror of his Californian parents, but soon finds that they are keeping a far bigger secret from him.</span><br data-dcnode-id="865"><br data-dcnode-id="864"><span data-dcnode-id="863" instrument_node="">The relationships between the main characters throughout the book are extremely interesting. At times it seems like everyone is sleeping with everyone, everyone hates everyone, everyone loves everyone. These friends are as family members, and move only together. As events unfold and some characters begin to lose themselves to either love, alcohol, murderous intentions, or drugs, the plot moves fantastically, with barely a dull paragraph. As previously mentioned, the use of such ornate and graceful language builds both atmosphere and suspense. It was a pleasure to read and I have even noticed Donna Tartt's use of language sneaking into my day to day writing and speech.</span><br data-dcnode-id="862"><br data-dcnode-id="861"><span data-dcnode-id="860" instrument_node="">This book is a dark and classical masterpiece, the plot points of which you will never expect until they happen. I look forward to reading more of Tartt's work.
</span></span><span data-dcnode-id="858" instrument_node="">

</span><span data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">
  Wow. This is a heck of a book. Unlike any other I’ve ever read. It’s quite heavy going but I felt it was ultimately worth it although I felt it ran out of steam at the end (hence 4 stars not 5). I suppose it’s ultimately about peer pressure, about the masks we wear when young and about trying to impress. Mainly (simply put) it’s about an intellectual group of university students who feel that the normal rules of society don’t apply to them with horrendous consequences. Written from the point of view of Richard who is desperate to be included into their inner sanctum and has no idea about the darkness at its core. The book stayed with me for quite a while afterwards.
</span></span><span data-dcnode-id="746" instrument_node="">

</span><span data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">
  This book was far too long. I couldn’t relate to the characters and it just lacks something. I wouldn’t describe it as a thriller. I almost gave up but did finish it begrudgingly. I kept hoping there’d be a big twist but *spoiler alert* there wasn’t.  I had read The Little Friend and, although also very long winded, really enjoyed it. Oh well. Don’t think I’ll be reading another Donna Tartt book anytime soon. The reason I still have three stars is she is a good writer in so many ways. The ways she describes even the mundane is amazing. Just a shame she describes the mundane so often 😫
</span></span><span data-dcnode-id="691" instrument_node="">
