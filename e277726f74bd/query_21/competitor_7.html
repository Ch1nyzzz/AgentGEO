            Shelves:
              </span><a class="actionLinkLite" data-dcnode-id="4222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/1232712-matt%3Fshelf%3Dhistory"><span data-dcnode-id="4223" instrument_node="">history</span></a><span data-dcnode-id="4221" instrument_node="">

</span><span class="readable" data-dcnode-id="4129" id="reviewTextContainer182227319"><span data-dcnode-id="4215" instrument_node="">
</span><span data-dcnode-id="4207" id="freeTextContainer11123863850946801865"><span data-dcnode-id="4214" instrument_node="">I bought Daniel Yergin’s </span><i data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">The Prize</span></i><span data-dcnode-id="4211" instrument_node=""> during one of my semi-regular fits of intellectual hunger, which often strike after I’ve read five straight books about Nazi henchman and zero books about anything relevant to today’s world. After the purchase, I put it on the shelf. And there it sat, for a long, long time. It is, after all, a tremendously big tome about oil; it does not scream out to be consumed or embraced or loved. For a long time it just sat there, on my shelf, laughing at me. </span><br data-dcnode-id="4210"><br data-dcnode-id="4209"><span data-dcnode-id="4208" instrument_node="">Finally, one </span></span><span data-dcnode-id="4206" instrument_node="">
</span><span data-dcnode-id="4134" id="freeText11123863850946801865" style="display:none"><span data-dcnode-id="4205" instrument_node="">I bought Daniel Yergin’s </span><i data-dcnode-id="4203"><span data-dcnode-id="4204" instrument_node="">The Prize</span></i><span data-dcnode-id="4202" instrument_node=""> during one of my semi-regular fits of intellectual hunger, which often strike after I’ve read five straight books about Nazi henchman and zero books about anything relevant to today’s world. After the purchase, I put it on the shelf. And there it sat, for a long, long time. It is, after all, a tremendously big tome about oil; it does not scream out to be consumed or embraced or loved. For a long time it just sat there, on my shelf, laughing at me. </span><br data-dcnode-id="4201"><br data-dcnode-id="4200"><span data-dcnode-id="4199" instrument_node="">Finally, one day, I picked it up, and started to read it. Then I quit. Because it was about oil. </span><br data-dcnode-id="4198"><br data-dcnode-id="4197"><span data-dcnode-id="4196" instrument_node="">Sometime later, I came across a certain politically-oriented meme on my brother’s Facebook page. This meme consisted of a picture of a gas pump with a Post-It note stuck next to the digital price-per-gallon screen. The content of the note, summarized, is that gas prices now are higher than when Obama was inaugurated. The message strongly implied that if only we’d get smart and elect a Republican we could all get oil-drunk and drive huge and unnecessary pickup trucks and bathe in oil and pour oil in our cereal and light oil on fire just to laugh at the flames and all for $2 a gallon. </span><br data-dcnode-id="4195"><br data-dcnode-id="4194"><span data-dcnode-id="4193" instrument_node="">I assume I’m not the only one vexed by the question of constantly fluctuating oil prices. And I’m sure I’m not the only one to give a half-informed (if that) opinion about the cause. That’s when it struck me: I have this question about oil; I also have this massive, 800-page oil-opus written by one of the world’s leading energy authorities. </span><br data-dcnode-id="4192"><br data-dcnode-id="4191"><span data-dcnode-id="4190" instrument_node="">Thus had I reached that crucial moment when a sudden, fleeting interest intersected with exactly the right book to satisfy that interest. </span><br data-dcnode-id="4189"><br data-dcnode-id="4188"><span data-dcnode-id="4187" instrument_node="">Unfortunately, Daniel Yergin’s paper doorstop does not answer that fundamental question about oil prices. (That answer has something to do with oil being a global commodity. And also there are Oil Elves). Instead, </span><i data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">The Prize</span></i><span data-dcnode-id="4184" instrument_node=""> positions itself as the history of the world from 1853 to 1991, told from the point of view of black gold, Texas tea, etc. </span><br data-dcnode-id="4183"><br data-dcnode-id="4182"><span data-dcnode-id="4181" instrument_node="">The slowest going comes at the beginning, during Part I, when Yergin details – at extensive length – the “founders” of the great oil companies (many of which exist today). This material is not inherently dramatic, but Yergin’s handling of it ensures that the narrative presents itself as more of a checklist of events than anything else. He jumps quickly from one place to the next, one person to the next, so that it all becomes something of a blur (a chronology in the back does help). </span><br data-dcnode-id="4180"><br data-dcnode-id="4179"><span data-dcnode-id="4178" instrument_node="">Moreover, </span><i data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">The Prize</span></i><span data-dcnode-id="4175" instrument_node=""> has a sort of subject-myopia. It is so intent on touching on the highlights – Rockefeller forms Standard Oil; a gusher at Spindletop – that it never gets into all the other elements that make oil’s story worth telling (or, for that matter, give it context). Yergin never really explains how oil is discovered or recovered; how it evolved from a lighting source to a propulsion source; or the actual mechanics of how an oil company operates. To be sure, some of these topics are mentioned, but none are explored in a truly satisfactory way. </span><br data-dcnode-id="4174"><br data-dcnode-id="4173"><span data-dcnode-id="4172" instrument_node="">For instance, the Organization of Petroleum Exporting Companies (OPEC) dominate the later sections of the book. Yergin is sure to tell you every time OPEC did something that shook up world oil markets. However, he never gets into any true discussion of OPEC’s workings. That is, how and why OPEC was able to accomplish what they accomplished (and still accomplish). In other words, </span><i data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">The Prize</span></i><span data-dcnode-id="4169" instrument_node=""> is about tell, not show. There were many times I sought a deeper, fuller understanding of this subject; instead, there was often only a recitation of facts. </span><br data-dcnode-id="4168"><br data-dcnode-id="4167"><span data-dcnode-id="4166" instrument_node="">The story does pick up pace further on. This uptick coincides with oil’s breakthrough as a fuel source for machinery. Yergin devotes four chapters to World War II, the epochal event that ushered in this sea-change. Especially effective is his look at the Pacific Theater, where the first great blunder was Japanese Admiral Yamamoto’s failure to destroy the oil fields near Pearl Harbor. Yergin’s insights into Japan’s desperate oil shortages has really deepened my understanding of the conflict. These shortages are mentioned – in passing – in every history of World War II. Fleeting references, however, fail to do the situation justice. Japan literally began the war with a timetable based on fuel stocks. When that timetable did not proceed apace, Japan’s ultimate defeat was a mathematical certainty. It forced Japan into numerous desperate measures that appeared fanatical, but which were dictated by oil logic. </span><br data-dcnode-id="4165"><br data-dcnode-id="4164"><span data-dcnode-id="4163" instrument_node="">(Chief among these measures were the kamikaze attacks. These suicide missions were exceedingly effective in terms of resource conservation, since planes only needed enough fuel for a one-way trip. Furthermore, fuel did not have to be expended to train these pilots, since all they needed to know was enough to get them off the ground and headed in the right direction). </span><br data-dcnode-id="4162"><br data-dcnode-id="4161"><span data-dcnode-id="4160" instrument_node="">The post-World War II years was the time when oil took its mantle as the leading natural resource. In Yergin’s phrase, it was the “age of the hydrocarbon man.” It is at this point, when a growing desire for oil butted up against a newly rearranged Middle East, that </span><i data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">The Prize</span></i><span data-dcnode-id="4157" instrument_node=""> really hits its stride. The chapters on the Middle East cover all the flashpoints: the Suez Canal Crisis; the Yom Kippur War; the Iran-Iraq War; the fall of the Shah and the Iranian Revolution; and finally, Gulf War I, touched off by Saddam Hussein’s seizure of tiny, oil-rich Kuwait.</span><br data-dcnode-id="4156"><br data-dcnode-id="4155"><span data-dcnode-id="4154" instrument_node="">Not only are these international crises more interesting reading than earlier tales of wildcatting in Pennsylvania, but Yergin does a better job finding the human drama to accompany the inanimate central character. Interspersed between dry talk of concessions and OPEC and price controls, you get to meet fascinating people such as Mohammed Reza Shah Pahlevi, the Shah of Iran, T. Boone Pickens, the “wacky” billionaire, and J. Paul Getty, at one time the richest man in America: </span><br data-dcnode-id="4153"><br data-dcnode-id="4152"><blockquote data-dcnode-id="4150"><span data-dcnode-id="4151" instrument_node="">As a young man, Getty was already launched on a life of wild romance and sexual adventure, with a special predilection for teenage girls. He married five times. But marriage vows were, for him, not even an inconvenience; to engage in some of his more clandestine affairs, he simply operated under a favored and not all that discreet alias, “Mr. Paul.” He liked to travel to Europe because it was less noticed that he was in “transit flagrante” with two or three women at a time. Yet the only true love of his life may have been a French woman, the wife of a Russian consul general in Asia Minor, with whom he had a passionate affair in Constantinople in 1913. He bade what he hoped was a temporary farewell to her on the dock at Istanbul, but then lost contact with her forever in the turmoil of war and revolution that followed. Even sixty years later, whereas he would discuss his five marriages almost technically, as if they were lawsuits, a mere mention of this lady, Madame Marguerite Tallasou, was enough to bring tears to his eyes.</span></blockquote><span data-dcnode-id="4149" instrument_node=""> </span><br data-dcnode-id="4148"><br data-dcnode-id="4147"><span data-dcnode-id="4146" instrument_node="">It’s strange to think, but there are kids alive today, old enough to carry on conversations, who have never lived in a world in which America was not at war in the Middle East. We’re there, ostensibly, to fight terrorists. But if you follow the trail back into the past, you find we’re there for an entirely different reason. Among other things, terrorism is a response to the West’s continued (often heavy-handed) presence in the Middle East. That presence has included rampantly exploiting natural resources and propping up certain leaders – often to the detriment of their people – in order to create advantageous geopolitical stability. That stability is necessary to the uninterrupted flow of a very precious commodity. </span><br data-dcnode-id="4145"><br data-dcnode-id="4144"><span data-dcnode-id="4143" instrument_node="">In the end, the cliché that “it’s all about oil” is true. </span><i data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">The Prize</span></i><span data-dcnode-id="4140" instrument_node="">, despite what I found to be shortcomings, does a masterful job of explaining just how that happened. In that way, it succeeds in doing what all history books aspire to do: to show the direct link between the past and the present. Even though </span><i data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">The Prize</span></i><span data-dcnode-id="4137" instrument_node=""> ends in 1991 (with a short update chapter), it clearly proves its thesis that oil – and all the struggles surrounding its discovery, acquisition, and distribution – created our modern world. For better and for worse. </span><br data-dcnode-id="4136"><br data-dcnode-id="4135"></span><span data-dcnode-id="4133" instrument_node="">

</span><span class="uitext reviewText" data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">all people who can read</span></span></div><span data-dcnode-id="3862" instrument_node="">
</span><div class="uitext greyText bookshelves" data-dcnode-id="3857"><span data-dcnode-id="3861" instrument_node="">
            Shelves:
              </span><a class="actionLinkLite" data-dcnode-id="3859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/217489-naeem%3Fshelf%3Dmustreads"><span data-dcnode-id="3860" instrument_node="">mustreads</span></a><span data-dcnode-id="3858" instrument_node="">

</span><span class="readable" data-dcnode-id="3812" id="reviewTextContainer3499598"><span data-dcnode-id="3852" instrument_node="">
</span><span data-dcnode-id="3844" id="freeTextContainer13974853680295336081"><span data-dcnode-id="3851" instrument_node="">Be warned that Yergin is an apologist for Oil companies and doesn't have a critical word to say about capitalism in this 800 page plus book.</span><br data-dcnode-id="3850"><br data-dcnode-id="3849"><span data-dcnode-id="3848" instrument_node="">Nevertheless, I consider this a must read (I read it twice). First, Yergin writes like a journalist -- so the reading goes quickly and well. </span><br data-dcnode-id="3847"><br data-dcnode-id="3846"><span data-dcnode-id="3845" instrument_node="">More important, this is a comprehensive and thorough history of the commodity oil. When you review the history of the 20th century from the lens of oil, many things change and everything deepens. The chapters on WWII ar</span></span><span data-dcnode-id="3843" instrument_node="">
</span><span data-dcnode-id="3817" id="freeText13974853680295336081" style="display:none"><span data-dcnode-id="3842" instrument_node="">Be warned that Yergin is an apologist for Oil companies and doesn't have a critical word to say about capitalism in this 800 page plus book.</span><br data-dcnode-id="3841"><br data-dcnode-id="3840"><span data-dcnode-id="3839" instrument_node="">Nevertheless, I consider this a must read (I read it twice). First, Yergin writes like a journalist -- so the reading goes quickly and well. </span><br data-dcnode-id="3838"><br data-dcnode-id="3837"><span data-dcnode-id="3836" instrument_node="">More important, this is a comprehensive and thorough history of the commodity oil. When you review the history of the 20th century from the lens of oil, many things change and everything deepens. The chapters on WWII are spectacular. Yergin shows that much of the strategy of all sides was getting access to oil fields. </span><br data-dcnode-id="3835"><br data-dcnode-id="3834"><span data-dcnode-id="3833" instrument_node="">In addition this is the book that got me to take global warming seriously. Not that this was Yergin's intent.</span><br data-dcnode-id="3832"><br data-dcnode-id="3831"><span data-dcnode-id="3830" instrument_node="">Finally, there some good theoretical material here as well. The particularities of the commodity are grounded on the fact that right from the start of oil's history, the problem for capitalists is that there is too much oil! Yergin thus confirms over and over what Timothy Mitchell argues in his article "McJihad" -- that a glut of oil necessitates the creation of cartels that can reduce the quantity of oil on the world market. Only reduced quantities can sustain profits. (See </span><a data-dcnode-id="3828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/825402.A_Century_Of_War_Anglo_American_Oil_Politics_and_the_New_World_Order" rel="nofollow noopener" title="A Century Of War Anglo-American Oil Politics and the New World Order by F. William Engdahl"><span data-dcnode-id="3829" instrument_node=""> A Century Of War: Anglo-American Oil Politics and the New World Order</span></a><span data-dcnode-id="3827" instrument_node=""> by F. William Engdahl, who argues that this is way the creation of OPEC was okayed by oil corporations and the US government.)</span><br data-dcnode-id="3826"><br data-dcnode-id="3825"><span data-dcnode-id="3824" instrument_node="">This can be a mind blowing read if you can filter out Yergin's glorification of oil capitalists -- as individuals and as a collectivity. </span><br data-dcnode-id="3823"><br data-dcnode-id="3822"><span data-dcnode-id="3821" instrument_node="">Ironically, Yergin does not argue for free markets because this would mean an oil glut, low oil prices, and limited profits for oil companies. What this teaches us is that corporations and their spokespersons are too smart to promote free market ideology in their plans and actions but smart enough to spout that as their rhetoric. Corporate socialism (that is what a cartel is, no?) for the super rich and free markets for the rest of us.)</span><br data-dcnode-id="3820"><br data-dcnode-id="3819"><span data-dcnode-id="3818" instrument_node="">In this sense, Yergin is the honest voice of oil corporations. He argues for the all the good oil companies create even if that means that they have to violate free market ideology.</span></span><span data-dcnode-id="3816" instrument_node="">
</span><a data-dcnode-id="3814" data-text-id="13974853680295336081" href="#" onclick="swapContent($(this));; return false;"><span data-dcnode-id="3815" instrument_node="">...more</span></a><span data-dcnode-id="3813" instrument_node="">

</span><span data-dcnode-id="3729" id="freeTextContainer14198017003870634399"><span data-dcnode-id="3733" instrument_node="">Aaaand time. Take that, Prize. After a mere 2 full months, about 8 flights, and at least 2 pounds of lean muscle mass added from lifting this tome, I have finally taken down The Prize. Mr. Yergin, you are the definition of a worthy adversary, akin to the man in the black pajamas or the value menu at Jack in the Box.</span><br data-dcnode-id="3732"><br data-dcnode-id="3731"><span data-dcnode-id="3730" instrument_node="">The Prize is a book that, upon completion, made me feel completely ridiculous for ever having an opinion on anything (literally, anything) without this base collection of knowledge. W</span></span><span data-dcnode-id="3728" instrument_node="">
</span><span data-dcnode-id="3714" id="freeText14198017003870634399" style="display:none"><span data-dcnode-id="3727" instrument_node="">Aaaand time. Take that, Prize. After a mere 2 full months, about 8 flights, and at least 2 pounds of lean muscle mass added from lifting this tome, I have finally taken down The Prize. Mr. Yergin, you are the definition of a worthy adversary, akin to the man in the black pajamas or the value menu at Jack in the Box.</span><br data-dcnode-id="3726"><br data-dcnode-id="3725"><span data-dcnode-id="3724" instrument_node="">The Prize is a book that, upon completion, made me feel completely ridiculous for ever having an opinion on anything (literally, anything) without this base collection of knowledge. We live in the Age of Oil and, as such, this history of oil becomes the history of the world as we know it. From the World Wars to the oil crisis to the constant flux of oil prices, Yergin dives into the truth behind this complex and critical phenomena in a way that is completely engaging and rife with amusing detail.</span><br data-dcnode-id="3723"><br data-dcnode-id="3722"><span data-dcnode-id="3721" instrument_node="">There is far too much information to summarize in a review, so I won't even attempt, but I will say that the first half of the book was the most entertaining. The explosion of oil exploration with the law-less, wildcatting passion of the fortune-seeking oil men was incredible to read about and contrast with the nationalized, highly bureaucratic oil industry today. Then to see this era capped by the World Wars and oil's scale-tipping effects was riveting in a patriotic way. At one point, I definitely started chanting "USA! USA!" under my breath in a Seattle restaurant. Happy Hour is dangerous.</span><br data-dcnode-id="3720"><br data-dcnode-id="3719"><span data-dcnode-id="3718" instrument_node="">The critical relationship between access to oil and national security (not to mention preservation of way of life) is a theme throughout The Prize. As I read on, I had an interesting thought. Back when the Iraq War (the most recent one) was at its controversial apex, I remember people screaming things along the lines of "this war is only about oil!" and things of that nature. I don't have any interest in getting into the question of whether or not that war was justified, but let's just say for a second that those people were right, and that war was about oil. Is that an inherently bad or immoral reason for a war? Oil is the key to our way of life. Revolutions and wars tend to happen when one group's way of life is threatened or restricted (in reality or simply perception) by another. I don't know the answer, but the thought was interesting.</span><br data-dcnode-id="3717"><br data-dcnode-id="3716"><span data-dcnode-id="3715" instrument_node="">It is a daunting task, without question, but I assure you this book is worth the time. If anyone does decide to pick it up, I recommend grabbing a copy with the updated epilogue, where Daniel Yergin discusses everything that's happened in the last 20 years. It's not as detailed as the rest of the book, but his insight is still appreciated. Good luck to you all. If you need me, I'll be at Jack in the Box...perhaps a more formidable adversary after all.</span></span><span data-dcnode-id="3713" instrument_node="">

</span><span data-dcnode-id="3622" id="freeText10906327758714714411" style="display:none"><span data-dcnode-id="3627" instrument_node="">I’ve been thinking of reading Mr. Yergin’s work since it was first published, though its length proved a mighty and consistent deterrent for nearly three decades. It is a long tug, that’s for sure. Mr. Yergin does a superb job with this history of the petroleum industry. I leave this work mindful of the randomness, the chaos in our world. Folks who were at the right place at the right time are today lionized, their names now adorn the entrances to buildings at coveted universities and are affixed to prestigious endowments and trusts; those at the wrong place at the right time, the right place at the wrong time, or the wrong place at the wrong time are …. Writing with the benefit of hindsight, there seems a logical flow, an orderliness to things, a reflection of Mr. Yergin’s craftsmanship. This is not how the future will present itself, I believe; rather, what lies ahead is very much uncertain.</span><br data-dcnode-id="3626"><br data-dcnode-id="3625"><span data-dcnode-id="3624" instrument_node="">One last note, as someone who knows little about petroleum science, I assumed the chemical origins of petroleum were now settled, proven; this appears not to be the case. Mr. Yergin writes in the endnotes, “By generally accepted theory, crude oil is the residue of organic waste – primarily microscopic plankton floating in seas, and also land plants – that accumulated at the bottom of oceans, lakes, and coastal areas.” “Generally accepted theory?” This reminded me of a meeting in my college days with Prof. Thomas Gold, interestingly a winner of the Royal Astronomical Society’s Gold Medal. It wasn’t that Prof. Gold happened to win the Gold Medal that I found memorable, though. No, Prof. Gold hypothesized that oil and natural gas owed their origins to abiogenic processes rather than the “generally accepted theory” that Mr. Yergin references. What became of Prof. Gold’s hypothesis?</span><br data-dcnode-id="3623"></span><span data-dcnode-id="3621" instrument_node="">

</span><span data-dcnode-id="3352" id="freeTextContainer17880938424250438570"><span data-dcnode-id="3353" instrument_node="">Neither of the novels I’m currently reading is really going anywhere, so I started reading a history of the oil industry instead. As I’d expected, it was totally riveting. I find the role of oil in economic, political, and environmental development fascinating, so clearly was predisposed to like it. The book sustained my interest, even when recounting the technicalities of oil company mergers, through the use of a high quality journalistic approach. Each chapter began with a character vignette o</span></span><span data-dcnode-id="3351" instrument_node="">
</span><span data-dcnode-id="3340" id="freeText17880938424250438570" style="display:none"><span data-dcnode-id="3350" instrument_node="">Neither of the novels I’m currently reading is really going anywhere, so I started reading a history of the oil industry instead. As I’d expected, it was totally riveting. I find the role of oil in economic, political, and environmental development fascinating, so clearly was predisposed to like it. The book sustained my interest, even when recounting the technicalities of oil company mergers, through the use of a high quality journalistic approach. Each chapter began with a character vignette of some key figure, before explaining the bigger strategic picture. Whenever this wider picture started to pall, a new personality was introduced and their important role explained with the help of amusing anecdotes. Such a structure worked beautifully to convey a complicated and lengthy history entertainingly, without sacrificing density and rigour. </span><br data-dcnode-id="3349"><br data-dcnode-id="3348"><span data-dcnode-id="3347" instrument_node="">The whole book was compelling, but I would single out for particular praise the chapters on the two World Wars and how the role of oil differed in each. Oil utterly transformed the nature of war and its availability did much to determine who won and who lost. I hadn’t previously realised, for instance, that Japan’s defeat in the Second World War was precipitated by total oil deprivation. Nor that in the Pearl Harbour attack the fuel stores of the US fleet were not destroyed - which would have placed America in a much more fragile position in the Pacific. Oil came to be equated with mobility in society generally, but the shift was more striking and sudden in conditions of war. The First World War was largely static and began at least with the expectation that movement of troops would be by horse or train. By contrast, the Second World War involved near-constant and massive movements of troops, materiel, and battle lines, all powered by oil. </span><br data-dcnode-id="3346"><br data-dcnode-id="3345"><span data-dcnode-id="3344" instrument_node="">The genesis and fractious history of OPEC was also very well-told and informative. I’d wanted to know more about the extent to which OPEC has, at various times, been able to set world oil prices. Yergin demonstrates that its power has waxed and waned, whilst the structure of the world oil industry has altered considerably in the second half of the twentieth century. In fact, the only quibble I really have with this book is that the edition I read was published in 1993 and there have been massive oil-related changes since then. For a start, prices. When this was published, the record peak price for a barrel of crude was around $40; in 2008 it exceeded $100. According to Bloomberg, today a barrel of Brent crude would cost you $113. I’d love to read Yergin’s analysis of the twenty-first century price increases, so will try and get hold of his later book </span><a data-dcnode-id="3342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/11447065.The_Quest_Energy__Security__and_the_Remaking_of_the_Modern_World" rel="nofollow noopener" title="The Quest Energy, Security, and the Remaking of the Modern World by Daniel Yergin"><span data-dcnode-id="3343" instrument_node="">The Quest: Energy, Security, and the Remaking of the Modern World</span></a><span data-dcnode-id="3341" instrument_node="">. That should also include more detail on the environmental aspects of oil dependence, which this book only touches on briefly. Really, you have to be impressed with a densely printed 800 page non-fiction book that not only holds your attention but leaves you wanting more.</span></span><span data-dcnode-id="3339" instrument_node="">

</span><span data-dcnode-id="3237" id="freeTextContainer11390623872371408848"><span data-dcnode-id="3241" instrument_node="">750 pages of pretty dense prose, originating in </span><a data-dcnode-id="3239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drake_Well" rel="nofollow noopener"><span data-dcnode-id="3240" instrument_node="">Pennsylvania</span></a><span data-dcnode-id="3238" instrument_node="">, spanning the globe (you'll come out knowing more than you did going in about venezuela, bahrain, and azerbaijan) and ending on the shiite plains of iraq's central euphrates region in 1991 (an epilogue addresses the period ending in the second gulf war, but is cursory at best). characters of all ethnicity and nomenclature enter, live for a few pages, and then exit, sometimes referred to again fifty pages later. switches from backroom i</span></span><span data-dcnode-id="3236" instrument_node="">
</span><span data-dcnode-id="3213" id="freeText11390623872371408848" style="display:none"><span data-dcnode-id="3235" instrument_node="">750 pages of pretty dense prose, originating in </span><a data-dcnode-id="3233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drake_Well" rel="nofollow noopener"><span data-dcnode-id="3234" instrument_node="">Pennsylvania</span></a><span data-dcnode-id="3232" instrument_node="">, spanning the globe (you'll come out knowing more than you did going in about venezuela, bahrain, and azerbaijan) and ending on the shiite plains of iraq's central euphrates region in 1991 (an epilogue addresses the period ending in the second gulf war, but is cursory at best). characters of all ethnicity and nomenclature enter, live for a few pages, and then exit, sometimes referred to again fifty pages later. switches from backroom industry intrigue to global strategic strategy to wildcat drillers from chapter to chapter.</span><br data-dcnode-id="3231"><br data-dcnode-id="3230"><span data-dcnode-id="3229" instrument_node="">most striking was the lesson yergin drills home: oil is a strategic asset, unlike most commodities, and thus governments can't ignore it. the american military is the strongest in the world, but it runs on oil. military operations require tremendous drawdowns of stocks, and the ability to move them. power projection, barring nuclear weapons, is limited by where one can deliver oil, and the bandwidth of that delivery. without oil, your nuclear-powered carriers can get somewhere, but your planes can't fly. your trucks can't move materials, your tanks can't roll, and your men are stuck walking. my conclusion: our operations in the middle east were most certainly about oil, but not about oil company profits as so often accused. if we don't invade iraq, and it keeps kuwait, and prices skyrocket as a result, oil companies pass those costs on and do just fine. it's the military that eats it. keeping oil prices at historic lows for a decade may well have offset the cost of the first gulf war (i have done no analysis), especially if a major military adventure had cropped up.</span><br data-dcnode-id="3228"><br data-dcnode-id="3227"><span data-dcnode-id="3226" instrument_node="">also interesting was the desire of governments, even net importers like the united states, to keep oil prices above some minimum. what is that minimum? the cost of producing economically effective domestic oil. otherwise, one's domestic exploration and production infrastructure goes to seed as more cheaply-produced foreign oil swamps the market. you need that domestic production to buffer yourself against sudden foreign supply problems, even if it means oil is more expensive on average.</span><br data-dcnode-id="3225"><br data-dcnode-id="3224"><span data-dcnode-id="3223" instrument_node="">towards the end, he got into how the futures markets allow further buffering and hedging, at least via displacement in time, but the treatment was at a very high level and didn't satisfy me.</span><br data-dcnode-id="3222"><br data-dcnode-id="3221"><span data-dcnode-id="3220" instrument_node="">small details, easy to miss, are deadpanned and hilarious. did you know saddam's maternal uncle and father-in-law (what) wrote a pamphlet entitled </span><i data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">Three Whom God Should Not Have Created: Persians, Jews, and Flies</span></i><span data-dcnode-id="3217" instrument_node="">? i didn't, and my life is better for knowing it now.</span><br data-dcnode-id="3216"><br data-dcnode-id="3215"><span data-dcnode-id="3214" instrument_node="">worth reading, but damn it was long.</span></span><span data-dcnode-id="3212" instrument_node="">

</span><span class="readable" data-dcnode-id="2802" id="reviewTextContainer1710348649"><span data-dcnode-id="2863" instrument_node="">
</span><span data-dcnode-id="2861" id="freeTextContainer18013167746300041497"><span data-dcnode-id="2862" instrument_node="">The measure of success of any democratically elected government in India for a common citizen does not hinge on developmental plans, economic indicators or the advances in diplomacy. It dwells almost singly on the price of a single commodity : oil, the fluctuations of which can wreak havoc on the fiscal management of an average Indian household. Time and again, history has proved that many a voter comes to a conclusion on who to vote for by taking a look at their stance on the price of oil. As a</span></span><span data-dcnode-id="2860" instrument_node="">
</span><span data-dcnode-id="2807" id="freeText18013167746300041497" style="display:none"><span data-dcnode-id="2859" instrument_node="">The measure of success of any democratically elected government in India for a common citizen does not hinge on developmental plans, economic indicators or the advances in diplomacy. It dwells almost singly on the price of a single commodity : oil, the fluctuations of which can wreak havoc on the fiscal management of an average Indian household. Time and again, history has proved that many a voter comes to a conclusion on who to vote for by taking a look at their stance on the price of oil. As an interesting aside, consider this - the title of a book by Neil MacGregor was ‘The history of the world in 100 objects’ but this can very well be reapplied to Daniel Yergin’s book as ‘The history of the world in 1 object – Oil’. Starting from the 1800’s and ending post Operation Desert Storm, this book is a sweeping epic about the one single commodity which can literally bring the world to a standstill if choked off. </span><br data-dcnode-id="2858"><br data-dcnode-id="2857"><span data-dcnode-id="2856" instrument_node="">The initial stages in the life of oil were neither interesting nor earth shattering. From a rather tiny whimper in the American wilderness, oil soon gained momentum and roared into the minds of the public with the advent of motorized transportation. In these first stages, oil did not acquire the position of global significance but the balance slowly started shifting in its favour following WWI. The best parts of this book are the chapters on WWII and how much the war was really about control over oil. Behind the larger than life figures and the frenzied battles, whoever had control over fuel for the vehicles was the one who won the war. The most hard hitting parts of the narrative are the struggles Japan had to go through as their fuel supplies ran out and George Patton’s unforgiving minute during the final offensive on Germany. The only description for the chapter on WWII would be to call it splendid. The slow evolution of oil into a global power centre was also the time of the decline and the fall of the British Empire. Into the vacuum stepped in the Americans and the USSR and here was also when the first prospects of oil came into being in the middle east. The world order has since then undergone a lot of breaking and remoulding with oil remaining the one bargaining chip, incentive and choke hold all rolled into one which the middle east has wielded time and again. If we go by Yergin’s narrative then we also see oil’s evolution in roughly the below format : </span><br data-dcnode-id="2855"><br data-dcnode-id="2854"><span data-dcnode-id="2853" instrument_node="">•Do we really need it ? – Stage 1</span><br data-dcnode-id="2852"><br data-dcnode-id="2851"><span data-dcnode-id="2850" instrument_node="">•Look at all the money Rockefeller is making – Stage 2</span><br data-dcnode-id="2849"><br data-dcnode-id="2848"><span data-dcnode-id="2847" instrument_node="">•He cannot have all this money alone, bring him down and let us on the bandwagon too – Stage 3</span><br data-dcnode-id="2846"><br data-dcnode-id="2845"><span data-dcnode-id="2844" instrument_node="">•WAR ! – Stage 4</span><br data-dcnode-id="2843"><br data-dcnode-id="2842"><span data-dcnode-id="2841" instrument_node="">•WAR ? again ? Oh and while we are at it, goodbye British Empire – Stage 4</span><br data-dcnode-id="2840"><br data-dcnode-id="2839"><span data-dcnode-id="2838" instrument_node="">•Hello Saudi and Kuwait and Iran and Iraq and Libya and Algeria and Nigeria and…. – Stage 5</span><br data-dcnode-id="2837"><br data-dcnode-id="2836"><span data-dcnode-id="2835" instrument_node="">•Arab Nations : What is Israel doing here and are you helping them ? huh ? / America : Ummmm…well – Stage 6</span><br data-dcnode-id="2834"><br data-dcnode-id="2833"><span data-dcnode-id="2832" instrument_node="">•Ohhhh look at all the price rises in Oil ! ( We are rich : Oil producers and exporters / We are screwed : Western Governments) – Stage 7</span><br data-dcnode-id="2831"><br data-dcnode-id="2830"><span data-dcnode-id="2829" instrument_node="">•Let’s form an old boys club : Petroleum Exporting Nations – Stage 8</span><br data-dcnode-id="2828"><br data-dcnode-id="2827"><span data-dcnode-id="2826" instrument_node="">•The Shah or the Ayatollah ? – Stage 9 &amp;</span><br data-dcnode-id="2825"><br data-dcnode-id="2824"><span data-dcnode-id="2823" instrument_node="">•Let’s catch Saddam Hussein – Stage 10</span><br data-dcnode-id="2822"><br data-dcnode-id="2821"><span data-dcnode-id="2820" instrument_node="">While the book has excellent content in terms of understanding the history of oil, the tone is unmistakably capitalistic. Barring a few notes here and there, Yergin does not criticize the oil majors ( read Exxon, Chevron, Texaco, Mobil, BP and Shell). The view point is mostly from the lofty heights of the corporate board rooms or the hallowed halls of policy making. Yergin also adopts a storytelling which has a very readable and journalistic touch wherein the focus is more on the individuals surrounding the oil than the other way around. Another interesting thing is that the entire history of oil is a history of men. Barring Ida Tarbell and Margaret Thatcher, there is not even a single woman in the entire 1000 page narrative.</span><br data-dcnode-id="2819"><br data-dcnode-id="2818"><span data-dcnode-id="2817" instrument_node="">Alternate and more viable fuels might come up in the future but until then : </span><i data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">[..]..ours is a civilization that has been transformed by the modern and mesmerizing alchemy of petroleum. This is what has made it the age of oil. </span></i><br data-dcnode-id="2814"><br data-dcnode-id="2813"><span data-dcnode-id="2812" instrument_node="">Highly recommended but be warned that this book will be a huge investment of your time and effort and it is also unabashedly capitalistic ! </span><br data-dcnode-id="2811"><br data-dcnode-id="2810"><span data-dcnode-id="2809" instrument_node="">Note : I must say that it failed to answer my most important question : Why do oil prices still keep rising even when the price of crude oil goes down ? </span><br data-dcnode-id="2808"></span><span data-dcnode-id="2806" instrument_node="">

</span><span data-dcnode-id="2716" id="freeText7180977956102967983" style="display:none"><span data-dcnode-id="2729" instrument_node="">Knocked the bastard off. The Prize is a tour de force on the history of oil from the 1850s in Pennsylvania through until the Gulf War in 1991. A Pulitzer winner for non-fiction, the book is undoubtedly well researched and written. However, as with many books on this list, The Prize is defined by its length and density. The upside is that the book is split into five sections which can actually be read in isolation (e.g. if you just wanted to understand the role of oil in WWII). This website has great synopses of each chapter, which effectively lays the whole book out:</span><br data-dcnode-id="2728"><a data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www-personal.umich.edu/~twod/oil-ns/articles/yergin_prize_outline.html" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2727" instrument_node="">http://www-personal.umich.edu/~twod/o...</span></a><br data-dcnode-id="2725"><br data-dcnode-id="2724"><span data-dcnode-id="2723" instrument_node="">Oil provides an interesting lens through which to view history since the Industrial Revolution. It tracks the growth of capitalism with tycoons like John D Rockefeller, the strategic importance of energy resources throughout the two world wars, and the Cold War driven geopolitics of the US in the Middle East post WWII. The economics of oil also make it a fascinating commodity. Oil prices are closely tied to inflation and are consistently extremely volatile (prices have more than halved in the past two months of writing this review).</span><br data-dcnode-id="2722"><br data-dcnode-id="2721"><span data-dcnode-id="2720" instrument_node="">One downside of the book is the only brief mention of environmentalism. Oil production and use has been a significant contributor to climate change. Despite being released in 1991, environmental impacts deserve more coverage, especially given the length of the book.</span><br data-dcnode-id="2719"><br data-dcnode-id="2718"><span data-dcnode-id="2717" instrument_node="">The Prize ultimately achieves what it sets out to do - give a comprehensive modern history of oil. I would not recommend this book for everyone, but if the topic interests you this is a solid start. 4 stars.</span></span><span data-dcnode-id="2715" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2638" title="it was amazing"><span class="staticStar p10" data-dcnode-id="2643" size="15x15"><span data-dcnode-id="2644" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="2642" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2641" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2640" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2639" size="15x15"></span></span><span data-dcnode-id="2637" instrument_node="">

</span><a class="lightGreyText" data-dcnode-id="2632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/10903900-the-prize" title="Kindle Edition "><span data-dcnode-id="2633" instrument_node="">review of another edition</span></a><span data-dcnode-id="2631" instrument_node="">

</span><span data-dcnode-id="2619" id="freeTextContainer11659647905633211482"><span data-dcnode-id="2626" instrument_node="">I enjoyed this book a great deal but I think I respect it even more.</span><br data-dcnode-id="2625"><br data-dcnode-id="2624"><span data-dcnode-id="2623" instrument_node="">Yergin presents an exhaustive historical, economic and political epic about oil and the people, companies and countries that had significant roles in its development and policies. The writing is clear and approachable and occasionally funny. (I read the kindle version and highlighted many long passages. All of those highlights are publicly available.) (The stinginess of J. Paul Getty was particularly interesting and funny.) </span><br data-dcnode-id="2622"><br data-dcnode-id="2621"><span data-dcnode-id="2620" instrument_node="">The </span></span><span data-dcnode-id="2618" instrument_node="">
</span><span data-dcnode-id="2607" id="freeText11659647905633211482" style="display:none"><span data-dcnode-id="2617" instrument_node="">I enjoyed this book a great deal but I think I respect it even more.</span><br data-dcnode-id="2616"><br data-dcnode-id="2615"><span data-dcnode-id="2614" instrument_node="">Yergin presents an exhaustive historical, economic and political epic about oil and the people, companies and countries that had significant roles in its development and policies. The writing is clear and approachable and occasionally funny. (I read the kindle version and highlighted many long passages. All of those highlights are publicly available.) (The stinginess of J. Paul Getty was particularly interesting and funny.) </span><br data-dcnode-id="2613"><br data-dcnode-id="2612"><span data-dcnode-id="2611" instrument_node="">The book is mainly focused on the commodity itself and does not get into technical details about refining, discovering or extracting oil. The main characters you'd expect to see are there (except the Koch brothers who are completely absent, very little is said about refining) and lots of characters you've probably never heard of make important appearances as well.</span><br data-dcnode-id="2610"><br data-dcnode-id="2609"><span data-dcnode-id="2608" instrument_node="">The Prize is composed of five main sections. I read a different book between each section as it was a little too much for me to handle at once; that strategy worked well for me. The book is about the economic and political intertwining of oil in the modern world, if you don't think that's worth reading about then this is a book to avoid. If it's a subject you'd like to explore then this should be on your must-read list.</span></span><span data-dcnode-id="2606" instrument_node="">

</span><span data-dcnode-id="2489" id="freeText7660336960329226713" style="display:none"><span data-dcnode-id="2496" instrument_node="">As a history and energy enthusiast I simply adored this mammoth of a book (warning: this book is both huge and has small print. If this intimidates you stear clear because each page is chock full of fascinating and detailed knowledge and stories). What I particulalry liked about it was the level of detail Yergin went into explaining the dyanmics of the oil market thorughout its existence, the major players that moved those markets, and the reasons behind why they made the decisions they did. It was truly illuminating how just a few key decisions (such as how property rights for oil reserves were determined) altered the course of not just the oil industry, but the entire world. </span><br data-dcnode-id="2495"><br data-dcnode-id="2494"><span data-dcnode-id="2493" instrument_node="">The story of oil is the story of the 20th centruty, for better or for worse, and this book does a stupendous job bringing this story to life and making it accessible to the general public. You will get a new perspective on historic events and a better understanding of how we got in the situation we are currently in regarding the oil majors, OPEC, and geopolitical calculations that go into foriegn policy. </span><br data-dcnode-id="2492"><br data-dcnode-id="2491"><span data-dcnode-id="2490" instrument_node="">So, long story short, if you love history and knowing why things turned out the way they did, this book is for you.</span></span><span data-dcnode-id="2488" instrument_node="">

</span><span data-dcnode-id="2273" id="freeTextContainer14632597996196042295"><span data-dcnode-id="2279" instrument_node="">One of the top ten books I've ever read! (right up there with Making of the Atomic Bomb by Rhodes).</span><br data-dcnode-id="2278"><span data-dcnode-id="2277" instrument_node="">It gives a sweeping history of the oil industry, great biographical vignettes of hundreds of the main figures and the business and nation competitions that ensued. </span><br data-dcnode-id="2276"><br data-dcnode-id="2275"><span data-dcnode-id="2274" instrument_node="">Oil is a high-risk, high-reward activity with intrigue, daring, luck, and violence. One of the most lasting takeaways for me was the context it gives to infrastructure and brands (like all the major gasoline companies I'm familiar with) </span></span><span data-dcnode-id="2272" instrument_node="">
</span><span data-dcnode-id="2262" id="freeText14632597996196042295" style="display:none"><span data-dcnode-id="2271" instrument_node="">One of the top ten books I've ever read! (right up there with Making of the Atomic Bomb by Rhodes).</span><br data-dcnode-id="2270"><span data-dcnode-id="2269" instrument_node="">It gives a sweeping history of the oil industry, great biographical vignettes of hundreds of the main figures and the business and nation competitions that ensued. </span><br data-dcnode-id="2268"><br data-dcnode-id="2267"><span data-dcnode-id="2266" instrument_node="">Oil is a high-risk, high-reward activity with intrigue, daring, luck, and violence. One of the most lasting takeaways for me was the context it gives to infrastructure and brands (like all the major gasoline companies I'm familiar with) that I had always had just treated as unchanging bureaucratic behemoths. Now, Royal Dutch Shell, BP, Exxon, Chevron, Arco and other names have gripping stories and personalities associated with them. </span><br data-dcnode-id="2265"><br data-dcnode-id="2264"><span data-dcnode-id="2263" instrument_node="">On a larger scale, the economic and geopolitical pressures of WWII, the Suez crisis, the two Arab-Israeli conflicts, the Iran-Iraq war, and the first Gulf war were all well explained and embedded in a detailed context. As with the Empire of Cotton which was a biography of a global commodity, this too is a biography of a singularly important commodity. And, my favorite way of learning history is through biography. On the whole, this book gave me a new framework to understand the workings of the whole world. Pretty good for one book!</span></span><span data-dcnode-id="2261" instrument_node="">

</span><span data-dcnode-id="2077" id="freeTextContainer15701014419444885301"><span data-dcnode-id="2078" instrument_node="">This book is a very insightful research work about the history of oil since its very beginning in places like the US and Azerbaijan in the middle of the 19th century until 1990 (the year when the book was written) when the Middle East takes central stage - again - with Saddam Hussein invading Kuwait and a US-led coalition ousting Iraqi troops out of the Emirate. Throughout many events of the 20th century, Daniel Yergin shows the strategic importance of oil in the world economy and in geopolitics</span></span><span data-dcnode-id="2076" instrument_node="">
</span><span data-dcnode-id="2063" id="freeText15701014419444885301" style="display:none"><span data-dcnode-id="2075" instrument_node="">This book is a very insightful research work about the history of oil since its very beginning in places like the US and Azerbaijan in the middle of the 19th century until 1990 (the year when the book was written) when the Middle East takes central stage - again - with Saddam Hussein invading Kuwait and a US-led coalition ousting Iraqi troops out of the Emirate. Throughout many events of the 20th century, Daniel Yergin shows the strategic importance of oil in the world economy and in geopolitics. </span><br data-dcnode-id="2074"><span data-dcnode-id="2073" instrument_node="">It started in the 19th century when whale oil, by definition a finite resource, was getting more expensive and petroleum became the new cheap fuel for illumination, and later for the production of electricity and as a fuel for the nascent automobile industry. Fortunes were soon made by fellows like Rockefeller who became the first American billionaire. In the beginning of the 20th century, Rockefeller had cornered the oil industry and controlled 90% of the US market. His dominant position ended with the US Supreme Court ordering in 1911 the dismantlement of his company Standard Oil. It was split into many smaller entities, some of which having survived and thrived to this day, like ExxonMobil, Chevron, etc. Oil had in the meantime already become so strategically important that many countries realised its decisive importance to win any war. </span><br data-dcnode-id="2072"><span data-dcnode-id="2071" instrument_node="">During WWII, it became soon apparent to the allies that oil was actually the Achilles heel of Germany. Germany had no oil of its own, contrary to the Soviet Union and the US. Nazi Germany tried everything to gain access to oil. It first managed to control the oil production of Romania. In 1941, Germany attacked the former Soviet Union, but German troops failed to reach the Caucasus in today Azerbaijan, where the Soviet oil production was concentrated. With the defeat in Stalingrad, Germany will have to abandon its ambition to gain access to Russian oil, and will eventually lose the entire war. </span><br data-dcnode-id="2070"><span data-dcnode-id="2069" instrument_node="">Confronted to this lack of oil, Nazi Germany had also developed the production of synthetic oil, the result of a process that consisted of transforming coal into oil. During WWII, a significant part of the German airforce was flying on synthetic oil. This led the allies to bomb in priority the synthetic fuel factories, even before the landing of Normandy in 1944, as they perfectly knew that oil was the major weakness of Nazi Germany. The lack of natural resources, especially oil, is one of the major reasons why Germany lost the war.</span><br data-dcnode-id="2068"><span data-dcnode-id="2067" instrument_node="">The decisive role that oil has played during WWII helps explain why, over the second half of the 20th century until this day, major world powers will consistently try to either control oil production, or secure in some way the support of those countries where oil is produced. Throughout major events of the 20th century, Daniel Yergin shows the strategic role that oil has been playing in geopolitics and the world economy. Oil, money and geopolitics have by now become completely intertwined.</span><br data-dcnode-id="2066"><br data-dcnode-id="2065"><span data-dcnode-id="2064" instrument_node="">Review by Bruno Gremez</span></span><span data-dcnode-id="2062" instrument_node="">

</span><span data-dcnode-id="1984" id="freeTextContainer1453639418133310719"><span data-dcnode-id="1988" instrument_node="">Oil is the thread connecting 130 years of global history through such characters as John D. Rockefeller, Harry Sinclair, Winston Churchill, King Faisal, Warren G. Harding, T.E. Lawrence and many more. Our oil addiction stemmed from the discovery of oil "seep fields" (think of teh Beverly Hillbillilies "bubblin' crude") in Western Pa. </span><br data-dcnode-id="1987"><br data-dcnode-id="1986"><span data-dcnode-id="1985" instrument_node="">The original oil boom sought to exploit kerosene as an improvement over whale oil burning in lamps. Oil fever waxed and waned until the commercialization of interna</span></span><span data-dcnode-id="1983" instrument_node="">
</span><span data-dcnode-id="1954" id="freeText1453639418133310719" style="display:none"><span data-dcnode-id="1982" instrument_node="">Oil is the thread connecting 130 years of global history through such characters as John D. Rockefeller, Harry Sinclair, Winston Churchill, King Faisal, Warren G. Harding, T.E. Lawrence and many more. Our oil addiction stemmed from the discovery of oil "seep fields" (think of teh Beverly Hillbillilies "bubblin' crude") in Western Pa. </span><br data-dcnode-id="1981"><br data-dcnode-id="1980"><span data-dcnode-id="1979" instrument_node="">The original oil boom sought to exploit kerosene as an improvement over whale oil burning in lamps. Oil fever waxed and waned until the commercialization of internal combustion, which transformed the US in a mere decade and is still transforming the world. </span><br data-dcnode-id="1978"><br data-dcnode-id="1977"><span data-dcnode-id="1976" instrument_node="">The story of oil is the story of huge historical themes and events: the rise and fall and rise of monopolies in the U.S.; the Bolshevik revolution; and the colonization of "protectorates" in Mesopotamia to create states like Iraq. </span><br data-dcnode-id="1975"><br data-dcnode-id="1974"><span data-dcnode-id="1973" instrument_node="">Oil was the lynchpin resource of both World Wars. In WWII the Allies destroyed Rumanian oilfields in a race against time against marching Germans and Turks. </span><br data-dcnode-id="1972"><br data-dcnode-id="1971"><span data-dcnode-id="1970" instrument_node="">In a lesser-known variation on the Miracle of Dunkirk, the French discovered the utility of internal combustion when the military drafted thousands of Parisian cab drivers to transport troops to the front against marching Germans. Without this improvised troop movements (and yes the cabbies were encouraged to run their meters), the Germans could have easily taken the capital and possibly ended the war with a different result. </span><br data-dcnode-id="1969"><br data-dcnode-id="1968"><span data-dcnode-id="1967" instrument_node="">Suddenly cavalry was "out." Tanks (a code name that stuck) were invented to break the gridlock imposed by trench warfare. Internal combustion also fueled dogfights in the sky. In months airplanes went from unreliable toys to 150 mph fighting machines, which were made obsolete by a new generation of war planes in only another six months. </span><br data-dcnode-id="1966"><br data-dcnode-id="1965"><span data-dcnode-id="1964" instrument_node="">In WWII we outproduced the Axis as much as defeated them. </span><br data-dcnode-id="1963"><br data-dcnode-id="1962"><span data-dcnode-id="1961" instrument_node="">Yergin set out to depict a fascinating historical sweep through an oil-filled prism. He is partially successful. He vividly recreates characters like Rockefeller, Teddy Roosevelt, and Marcus Samuel, the founder of Shell Oil who got his start selling curios and souvenirs covered in glued-on sea shells and also became Mayor of London. </span><br data-dcnode-id="1960"><br data-dcnode-id="1959"><span data-dcnode-id="1958" instrument_node="">But the journey feels more episodic than sweeping as this very looonnnggg book is splintered into two- and three-page chapters, almost each commandeered by a new Superhero/Master of the Business or Political Universe. He also over-focuses on the business dealings of Big Oil, sometimes to the point of tedium but often to the exclusion of the social side of the story, such as: What was really happening in Mesopotamia while the region was being pawned between England and France? Oddly Yergin's chapter on the rise of the drive-through gas station is more compelling than his re-creation of this "Great Game" between superpowers. </span><br data-dcnode-id="1957"><br data-dcnode-id="1956"><span data-dcnode-id="1955" instrument_node="">Still there is much fascinating between these pages and I will soldier on through completion--I'm up to about 1928, or page 224. </span></span><span data-dcnode-id="1953" instrument_node="">

</span><span data-dcnode-id="1863" id="freeTextContainer8604155516186460005"><span data-dcnode-id="1864" instrument_node="">This sweeping history of oil takes us from the first strike in Pennsylvania in 1859 to the Gulf War in 1990. Along the way we encounter personalities from John D. Rockefeller to George H. W. Bush, companies from Standard Oil to T. Boone Pickens’ Mesa Petroleum, booms and panics from Titusville Pa and Spindletop Texas to the global energy crises of the 1970’s and 90’s. If at times the detail is a bit overwhelming, it is highly instructive portraying the dynamics of oil’s impact on global economic</span></span><span data-dcnode-id="1862" instrument_node="">
</span><span data-dcnode-id="1853" id="freeText8604155516186460005" style="display:none"><span data-dcnode-id="1861" instrument_node="">This sweeping history of oil takes us from the first strike in Pennsylvania in 1859 to the Gulf War in 1990. Along the way we encounter personalities from John D. Rockefeller to George H. W. Bush, companies from Standard Oil to T. Boone Pickens’ Mesa Petroleum, booms and panics from Titusville Pa and Spindletop Texas to the global energy crises of the 1970’s and 90’s. If at times the detail is a bit overwhelming, it is highly instructive portraying the dynamics of oil’s impact on global economics and politics with particular attention to the Middle East and consistently reactive US policy.</span><br data-dcnode-id="1860"><br data-dcnode-id="1859"><span data-dcnode-id="1858" instrument_node="">Oil was a critical factor in both world wars. Running out of oil undermined the German army in 1918. A major reason Japan attacked Pearl Harbor was to secure access to oil in the Dutch East Indies. Trying to seize oil in the Caucasus led Hitler to split his army invading Russia setting up Germany’s momentum changing defeat at Stalingrad. Oil availability helped decide the fate of US presidents. Carter could never overcome the negative impact of the energy crisis of 1979 and conversely Reagan was gifted with a huge economic tailwind from dramatically lower oil prices. </span><br data-dcnode-id="1857"><br data-dcnode-id="1856"><span data-dcnode-id="1855" instrument_node="">Nowhere more than the Middle East did oil determine the destiny of nations and the world. The quest for oil money and power unleashed centuries of hatred between Arab sects, between Arabs and Persians, and of both Arabs and Persians for the West. The resultant conflicts had profound effects on the world political and economic order and in today’s nuclear and highly interdependent age oil financed wars and terrorism have become even more significant. Detailing how we have arrived at this point, The Prize provides excellent background and a useful perspective for current events. </span><br data-dcnode-id="1854"></span><span data-dcnode-id="1852" instrument_node="">

</span><span data-dcnode-id="1774" id="freeTextContainer7355779669802151562"><span data-dcnode-id="1778" instrument_node="">This book is fantastic. I am a bit of a history buff and have read a fair amount of it, but this book added a whole new dimension to my understanding of the past century. Petrochemicals, and the benefits and security issues that they bring have been central to the way the modern world has formed. This may seem to be an obvious statement, but it is not a story that people focus on much. Yergin has filled this gap. Vital reading. </span><br data-dcnode-id="1777"><br data-dcnode-id="1776"><span data-dcnode-id="1775" instrument_node="">One thing that I found particularly illuminating is the perpetual bo</span></span><span data-dcnode-id="1773" instrument_node="">
</span><span data-dcnode-id="1768" id="freeText7355779669802151562" style="display:none"><span data-dcnode-id="1772" instrument_node="">This book is fantastic. I am a bit of a history buff and have read a fair amount of it, but this book added a whole new dimension to my understanding of the past century. Petrochemicals, and the benefits and security issues that they bring have been central to the way the modern world has formed. This may seem to be an obvious statement, but it is not a story that people focus on much. Yergin has filled this gap. Vital reading. </span><br data-dcnode-id="1771"><br data-dcnode-id="1770"><span data-dcnode-id="1769" instrument_node="">One thing that I found particularly illuminating is the perpetual boom-bust cycle that the book lays out. People have been worrying about "Peak Oil" since the 1870s. Whenever we have been convinced that we were about to run out, some new technological innovation, or discovery is made, and we tip over into massive surplus. This cycle is useful, because the fear of running out teaches us to use the resources more carefully, and makes us innovate. It is striking, however, how almost everybody goes with the crowd. Periods of incredible price inflation are frequently followed by periods where Oil and water cost similar amounts. After Yergin's description here, and in his less impressive but still informative follow-up book, I am fairly confident this cycle will continue. Today's drought will be followed by a glut, and then another drought. </span></span><span data-dcnode-id="1767" instrument_node="">

</span><span data-dcnode-id="1680" id="freeTextContainer12342849706457108108"><span data-dcnode-id="1684" instrument_node="">This book was extremely long but very good. It's fascinating to see how the world of oil grew from tiny "startups" to a massive monopoly within a generation, and then became one of the most politically important industries. Yergin argues that oil drives everything, and I'm largely convinced.</span><br data-dcnode-id="1683"><br data-dcnode-id="1682"><span data-dcnode-id="1681" instrument_node="">Oil is also an amazing case study of political economy. What happens when a cartel tries to raise the price of a commodity? What happens when a government tries to protect local producers, but also help the c</span></span><span data-dcnode-id="1679" instrument_node="">
</span><span data-dcnode-id="1668" id="freeText12342849706457108108" style="display:none"><span data-dcnode-id="1678" instrument_node="">This book was extremely long but very good. It's fascinating to see how the world of oil grew from tiny "startups" to a massive monopoly within a generation, and then became one of the most politically important industries. Yergin argues that oil drives everything, and I'm largely convinced.</span><br data-dcnode-id="1677"><br data-dcnode-id="1676"><span data-dcnode-id="1675" instrument_node="">Oil is also an amazing case study of political economy. What happens when a cartel tries to raise the price of a commodity? What happens when a government tries to protect local producers, but also help the consumer? What happens when all this regulation is suddenly stripped away? How do those who are hurt by deregulation respond? The cycle of energy politics and economics shows how governments and corporations interact when the stakes are high.</span><br data-dcnode-id="1674"><br data-dcnode-id="1673"><span data-dcnode-id="1672" instrument_node="">As others note, Yergin writes with a point of view that is decidedly pro-America and pro-capitalist - there are a few events in the book that can easily be interpreted less charitably than he does. Nonetheless, the book is factual and detailed.</span><br data-dcnode-id="1671"><br data-dcnode-id="1670"><span data-dcnode-id="1669" instrument_node="">The only things I wish this book had was more focus on science and on alternative energy sources. Both make appearances in "The Quest," the pseudo-sequel, and I recommend reading that too.</span></span><span data-dcnode-id="1667" instrument_node="">

</span><span data-dcnode-id="1178" id="freeTextContainer12046926065800674234"><span data-dcnode-id="1182" instrument_node="">I began reading this book with a very limited (and not to my surprise, even incorrect on several aspects) knowledge and understanding of the oil industry. This book is not just the story of oil but rather a detailed narrative of all the major events of late 19th and entire 20th century seen through the lens glazed with oil. This is probably the only book written on oil with so much authority on the subject.</span><br data-dcnode-id="1181"><br data-dcnode-id="1180"><span data-dcnode-id="1179" instrument_node="">Beginning with the early exploration in 1850s with the prime objective of illumination, th</span></span><span data-dcnode-id="1177" instrument_node="">
</span><span data-dcnode-id="1154" id="freeText12046926065800674234" style="display:none"><span data-dcnode-id="1176" instrument_node="">I began reading this book with a very limited (and not to my surprise, even incorrect on several aspects) knowledge and understanding of the oil industry. This book is not just the story of oil but rather a detailed narrative of all the major events of late 19th and entire 20th century seen through the lens glazed with oil. This is probably the only book written on oil with so much authority on the subject.</span><br data-dcnode-id="1175"><br data-dcnode-id="1174"><span data-dcnode-id="1173" instrument_node="">Beginning with the early exploration in 1850s with the prime objective of illumination, the way in which oil transformed itself into a underlying force of all human quest is nothing short of an epic drama. The early years were focused on the stories of hunch driven discovered across US and how it changed the landscape of small unknown towns overnight. I found the entire series of events relating of Standard Oil and its tryst with anti-trust laws very intriguing, sufficient to pick up a book on the history of Rockefeller and Standard Oil. Even after being split up, the resultant SO companies continued to play a major role in the international oil arena. </span><br data-dcnode-id="1172"><br data-dcnode-id="1171"><span data-dcnode-id="1170" instrument_node="">The book progresses with the development of oil industry outside US in Russia, Britain, Netherlands and France. Somewhere around this time is when the politics slowly started seeping into yet a small world of oil. Oil companies were developing themselves for international reach through ingenious responses. To reduce cost of selling oil in the hinterlands, Shell transported its oil in tankers instead of cases and oil was to be received by end-buyers in their already available Standard Oil blue tin cans. But the blue tin cans were prized possession for local economies and were used for everything ranging from roofing to birdcages, opium cups, hibachis and tea strainers. The entrepreneurial genius of Samuel Marcus of Shell immediately dispatched tinplate to be manufactured into tin cans by local Asian partners and the color was "Red". Shells bright and shiny red receptables soon replaced Standard Oil ones and soon roofing to birdcages, opium cups, hibachis and tea strainers in the local hinterlands were all red. </span><br data-dcnode-id="1169"><br data-dcnode-id="1168"><span data-dcnode-id="1167" instrument_node="">Journey of oil through World War 1 is followed by early hints of oil reserves in Gulf, when exploration went into hiatus with World War 2. It was in World War 2 that countries started realizing the real power of oil. Coal was no longer adequate to fight a war of such tremendous proportions. All too familiar narrative of World War 2 when viewed from the perspective of oil presents a more logical picture of the turn of events. No matter how strong a military a country may have, it was no good without oil. If the enough oil was supplied to keep the Third Army under General Patton, maybe many days and lives would have been saved in defeating Germany. Maybe. </span><br data-dcnode-id="1166"><br data-dcnode-id="1165"><span data-dcnode-id="1164" instrument_node="">War was followed by accelerated exploration and discoveries in Gulf. This was immediately followed by tumultuous decades of eccentricities of oil producing countries, their struggle with oil companies and continued government involvement. The development of arrangement with the oil producing countries from initial concession based system to higher share, nationalization, quota and embargoes is an ongoing saga in itself. A minor decision to change the posted prices unilaterally triggered the formation of OPEC, which not so imminent in the beginning but went on tremble the entire world economy. It was a long and troubling journey for the oil industry to finally defer to market forces of demand and supply. In the course, there were murders, coups, proxy wars, invasions, legal suits and so much more. The book does justice in dwelling upon the character sketch of all the key actors of this narrative of history of oil, explorers, entrepreneurs, businessmen, politicians, servants and kings.</span><br data-dcnode-id="1163"><br data-dcnode-id="1162"><span data-dcnode-id="1161" instrument_node="">The ever evolving outlook of oil industry also parlayed into newer corporate models, takeovers, financing and litigation. </span><br data-dcnode-id="1160"><br data-dcnode-id="1159"><span data-dcnode-id="1158" instrument_node="">The entire vacillating see saw of oil is teemed with motorization, new discoveries, conservation, wars, quotas, alternate sources of energy and ephemeral political landscape. It makes you pity the oil companies a little with their everlasting struggle to manage a plethora of elements, but it has to be, because oil is not just another commodity.</span><br data-dcnode-id="1157"><br data-dcnode-id="1156"><span data-dcnode-id="1155" instrument_node="">The only regret I have is that this book was written in 1990 and oil has continued to be a roller-coaster in past 30 years. I would like to know how the story continues. This book also does not cover fracking which has transformed oil industry in recent years. The author has written another book titled "The Quest: Energy, Security and the remaking of the Modern World" which can be considered as a sequel of this book but more from the perspective of global energy and not just oil. Hope to read it soon. </span></span><span data-dcnode-id="1153" instrument_node="">

</span><span data-dcnode-id="405" id="freeTextContainer7416402711398712915"><span data-dcnode-id="406" instrument_node="">Daniel Yergin is the author of the new bestseller The Quest: Energy, Security, and the Remaking of the Modern World which has been hailed as “a fascinating saga” about the “quest for sustainable resources of energy,” and “the book you must read to understand the future of our economy and our way of life,” not to mention “necessary reading for C.E.O.’s, conservationists, lawmakers, generals, spies,</span></span><span data-dcnode-id="404" instrument_node="">
</span><span data-dcnode-id="384" id="freeText7416402711398712915" style="display:none"><span data-dcnode-id="403" instrument_node="">Daniel Yergin is the author of the new bestseller The Quest: Energy, Security, and the Remaking of the Modern World which has been hailed as “a fascinating saga” about the “quest for sustainable resources of energy,” and “the book you must read to understand the future of our economy and our way of life,” not to mention “necessary reading for C.E.O.’s, conservationists, lawmakers, generals, spies, tech geeks, thriller writers. . . and many others.”</span><br data-dcnode-id="402"><br data-dcnode-id="401"><span data-dcnode-id="400" instrument_node="">He received the Pulitzer Prize for The Prize: the Epic Quest for Oil Money and Power, which became a number one New York Times best seller and has been translated into 17 languages.</span><br data-dcnode-id="399"><br data-dcnode-id="398"><span data-dcnode-id="397" instrument_node="">Dr. Yergin is Vice Chairman of IHS and Founder of Cambridge Energy Research Associates and serves as CNBC’s Global Energy Expert.</span><br data-dcnode-id="396"><br data-dcnode-id="395"><span data-dcnode-id="394" instrument_node="">Other books by Dr. Yergin include Commanding Heights: The Battle for the World Economy. Dr. Yergin has also written for The New York Times, Wall Street Journal, Washington Post, Financial Times, Foreign Affairs, Foreign Policy, The Atlantic, Los Angeles Times, International Herald Tribune, and many other publications.</span><br data-dcnode-id="393"><br data-dcnode-id="392"><span data-dcnode-id="391" instrument_node="">Both The Prize and Commanding Heights were made into award winning documentaries. The eight-hour miniseries The Prize was aired on PBS, BBC, and NHK and viewed by 20 million viewers in the United States alone. The 6-hour documentary Commanding Heights that Dr. Yergin produced received three Emmy nominations, and the New York Festivals Gold World Medal for best documentary.</span><br data-dcnode-id="390"><br data-dcnode-id="389"><span data-dcnode-id="388" instrument_node="">Dr. Yergin serves on the U.S. Secretary of Energy Advisory Board and chaired the US Department of Energy’s Task Force on Strategic Energy Research and Development. He is a Trustee of the Brookings Institution, on the Board of the New America Foundation, and on the Advisory Board of the Massachusetts Institute of Technology Energy Initiative.</span><br data-dcnode-id="387"><br data-dcnode-id="386"><span data-dcnode-id="385" instrument_node="">Dr. Yergin holds a BA from Yale University and a PhD from Cambridge University, where he was a Marshall Scholar.</span></span><span data-dcnode-id="383" instrument_node="">
