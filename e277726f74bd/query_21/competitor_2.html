orld, because they had no grasp of the fairly modern idea that the ways of the world might be altered.” Modern readers might be tempted to see Barbara as a prototypical feminist, asserting her own will against patriarchal authority, or, at the very least, as the victim of a social double standard, maligned for having the audacity to give as good as she gets. The ballad folk, however, would have seen only the monstrous pride that prevented a woman from saving the man who, quite literally, loves her to death. “Bonny” Barbara Allan is thus one of the prime literary incarnations of the femme faTate figure: a bewitcher and enslaver of men, an embodiment of the fearful aspect of female sexual power, and a warning to those who would love unwisely or unwell. As Sir John nears death, Barbara seems blase, unmoved by his exhortations, even a little bored by the proceedings—“And sighing said, she could not stay.” In his final farewell, he instructs his friends to be “kind to Barbara Allan,” a generously forgiving gesture considering that she has sealed his fate by refusing to reciprocate his love on demand and reconcile with him. His ominous remark proves that he knows her all too well and can see through her injured pride, for in anticipating the effect his death will have on her, he is capable of seeing her pitilessness as pitiable.</span></p><p data-dcnode-id="908"><span data-dcnode-id="912" instrument_node="">The pivotal eighth stanza corresponds to the recognition scene in a tragedy, for it is here that Barbara realizes, too late, the consequences of her misdeeds. As the ballad moves precipitously toward its hasty conclusion, through a montage of scenes so typical of the genre, Barbara begins to make her way home from her interview with Sir John only to hear his death knell. Each successive ringing of the “dead-bell,” by means of repetition, captures her obsessive self-awareness, her all-too-powerful sense of guilt encapsulated in “‘Woe to Barbara Allan,’” a phrase that also conveys the disapproval and condemnation of the community at large. As Barbara goes home crying to her mother, her transformation from ruthlessly self-possessed woman to chastened and shame-ridden child seems complete. She takes to her bed not simply to mourn her lost love but to give up her life for him—a final reciprocal gesture in a relationship otherwise horribly out of sync. “Barbara Allan” thus upholds the convention that critic Alan Bold claims is almost “a </span><i data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">sine qua non</span></i><span data-dcnode-id="909" instrument_node=""> of romantic balladry, that if one lover dies the other must follow suit.”</span></p><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">With the death of the tragic actors, it falls to the narrator to step in and perform a role similar to that of the chorus in classical tragedy, which is, in Oates’s words, “to translate action into perception” in such a way as to “give universal objective meaning to what has happened.” The final vision is one in which human tragedy is put into perspective, outdistanced by what Oates calls “an ironic consciousness of the way the world is.” “Barbara Allan” is no exception to this rule. It ends with a sweetly sentimental rose-and-brier vignette—a motif used to conclude at least half a dozen other ballads by which lovers are forever joined in a “transcendent love-knot” that stands as a monument to their eternal love. Bitterness and sorrow having been laid to rest with the passing of the winter season, the natural order of things of which the lovers are a part is reasserted along with the seasonal renewal. Though the individual may perish, the flourish of the finale seems to suggest that nature endures. The ballad’s essentially tragic view of life, as enacted through the Tate of the doomed lovers, is ultimately subsumed within the restorative vision of the final stanzas. For all of its brevity and concision, “Barbara Allan” sets forth an expansive view of the realities and possibilities of love, or love, as Oates reflects, as “we might wish it to be.”</span></p><p data-dcnode-id="899"><b data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Source:</span></b><span data-dcnode-id="903" instrument_node=""> Carolyn Meyer, in an essay for </span><i data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Poetry for Students,</span></i><span data-dcnode-id="900" instrument_node=""> Gale Group, 2000.</span></p><h2 data-dcnode-id="896"><a data-dcnode-id="897" id="H"><span data-dcnode-id="898" instrument_node="">Sources</span></a></h2><p data-dcnode-id="888"><span data-dcnode-id="895" instrument_node="">Bronson, Bertrand Harris, “About the Most Favorite British Ballads,” in his </span><i data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">The Ballad As Song,</span></i><span data-dcnode-id="892" instrument_node=""> Berkeley: </span><a class="interlinked" data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/social-sciences-and-law/education/colleges-us/university-california"><span data-dcnode-id="891" instrument_node="">University of California</span></a><span data-dcnode-id="889" instrument_node=""> Press, 1969, p. 167.</span></p><p data-dcnode-id="883"><span data-dcnode-id="887" instrument_node="">Cartwright, Christine A., “‘Barbara Allan’: Love and Death in an Anglo-American Narrative Folksong,” in </span><i data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Narrative Folksong, New Directions,</span></i><span data-dcnode-id="884" instrument_node=""> edited by Carol L. Edwards and Kathleen E. B. Manley, Boulder, CO: Westview Press, 1985, pp. 242-65.</span></p><p data-dcnode-id="878"><span data-dcnode-id="882" instrument_node="">Greer, Germaine, </span><i data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">The Female Eunuch,</span></i><span data-dcnode-id="879" instrument_node=""> St. Louis, MO: McGraw Hill Book Co., 1970.</span></p><p data-dcnode-id="873"><span data-dcnode-id="877" instrument_node="">Jenner, Michael, </span><i data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Scotland Through the Ages,</span></i><span data-dcnode-id="874" instrument_node=""> London: Michael Joseph Ltd., 1987.</span></p><p data-dcnode-id="868"><span data-dcnode-id="872" instrument_node="">Langer, William, ed., </span><i data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">An Encyclopedia of World History,</span></i><span data-dcnode-id="869" instrument_node=""> Boston: Houghton Mifflin Co., 1972.</span></p><p data-dcnode-id="857"><span data-dcnode-id="867" instrument_node="">Pepys, Samuel, </span><i data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">The Diary of Samuel Pepys</span></i><span data-dcnode-id="864" instrument_node=""> written in 1666, as quoted by Alan Bold in </span><i data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">The Ballad,</span></i><span data-dcnode-id="861" instrument_node=""> </span><a class="interlinked" data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/places/united-states-and-canada/us-political-geography/new-york"><span data-dcnode-id="860" instrument_node="">New York</span></a><span data-dcnode-id="858" instrument_node="">: Methueun, 1979, p. 48.</span></p><p data-dcnode-id="849"><span data-dcnode-id="856" instrument_node="">Steel, Tom, </span><i data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Scotland’s Story: A New Perspective,</span></i><span data-dcnode-id="853" instrument_node=""> London: </span><a class="interlinked" data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/literature-and-arts/english-literature-1500-1799-biographies/william-collins"><span data-dcnode-id="852" ins
