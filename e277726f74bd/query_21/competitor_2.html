-dcnode-id="1556" instrument_node="">Historical Context</span></a></p><p data-dcnode-id="1551"><a data-dcnode-id="1552" href="#F"><span data-dcnode-id="1553" instrument_node="">Critical Overview</span></a></p><p data-dcnode-id="1548"><a data-dcnode-id="1549" href="#G"><span data-dcnode-id="1550" instrument_node="">Criticism</span></a></p><p data-dcnode-id="1545"><a data-dcnode-id="1546" href="#H"><span data-dcnode-id="1547" instrument_node="">Sources</span></a></p><p data-dcnode-id="1542"><a data-dcnode-id="1543" href="#I"><span data-dcnode-id="1544" instrument_node="">For Further Study</span></a></p><p data-dcnode-id="1522"><span data-dcnode-id="1541" instrument_node="">“Barbara Allan” is a traditional ballad that originated in Scotland. The first written reference to it occurred in 1666 in </span><i data-dcnode-id="1536"><span data-dcnode-id="1540" instrument_node="">The Diary of </span><a class="interlinked" data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/literature-and-arts/english-literature-1500-1799-biographies/samuel-pepys"><span data-dcnode-id="1539" instrument_node="">Samuel Pepys</span></a><span data-dcnode-id="1537" instrument_node="">,</span></i><span data-dcnode-id="1535" instrument_node=""> where Pepys praises it after watching a stage performance sung by an actress. It appeared in a collection of popular songs compiled in 1740 by </span><a class="interlinked" data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/literature-and-arts/english-literature-1500-1799-biographies/allan-ramsay"><span data-dcnode-id="1534" instrument_node="">Allan Ramsay</span></a><span data-dcnode-id="1532" instrument_node="">, the </span><i data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Tea-Table Miscellany,</span></i><span data-dcnode-id="1529" instrument_node=""> and then it was included in </span><a class="interlinked" data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/literature-and-arts/scholars-antiquarians-and-orientalists-biographies/thomas-percy"><span data-dcnode-id="1528" instrument_node="">Thomas Percy</span></a><span data-dcnode-id="1526" instrument_node="">’s </span><i data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Reliques of Ancient Poetry</span></i><span data-dcnode-id="1523" instrument_node=""> in 1765. But like most ballads, it probably existed in oral tradition long before Pepys’s reference or these eighteenth-century publications.</span></p><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">As are all traditional ballads, “Barbara Allan” is a narrative song, or a song that tells a story. Ballads tell their stories directly, with an emphasis on climactic incidents, by stripping away those details that are not essential to the plot. In this case, the ballad tells of a woman who rejects her lover because he has “slighted” her and hurt her feelings. As is typical, “Barbara Allan” does not give many details about the background incident, but merely refers to it as the event that triggers the action. Barbara’s lover dies of a broken heart from her rejection of him, and after his death, she realizes her mistake. That realization results in her own death, also of a broken heart. Their tragic love seems to live on, though, in the symbolic intertwining of the rose and brier that grow from their graves.</span></p><h2 data-dcnode-id="1517"><a data-dcnode-id="1518" id="A"><span data-dcnode-id="1519" instrument_node="">Poem Text</span></a></h2><p data-dcnode-id="1512"><i data-dcnode-id="1513"><b data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">1</span></b><span data-dcnode-id="1514" instrument_node=""> </span></i></p><pre data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">It&nbsp;was&nbsp;in&nbsp;and&nbsp;about&nbsp;the&nbsp;Martinmas&nbsp;time,</span></pre><pre data-dcnode-id="1502"><span data-dcnode-id="1509" instrument_node="">When&nbsp;the&nbsp;green&nbsp;leaves&nbsp;were&nbsp;a-falling,</span><br data-dcnode-id="1508"><span data-dcnode-id="1507" instrument_node="">That&nbsp;Sir&nbsp;John&nbsp;Graeme,&nbsp;in&nbsp;the&nbsp;West&nbsp;Country,</span><br data-dcnode-id="1506"><span data-dcnode-id="1505" instrument_node="">&nbsp;&nbsp;&nbsp;Fell&nbsp;in&nbsp;love&nbsp;with&nbsp;Barbara&nbsp;Allan.</span><br data-dcnode-id="1504"><span data-dcnode-id="1503" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></pre><p data-dcnode-id="1498"><b data-dcnode-id="1499"><i data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">2</span></i></b></p><pre data-dcnode-id="1488"><span data-dcnode-id="1497" instrument_node="">He&nbsp;sent&nbsp;his&nbsp;man&nbsp;down&nbsp;through&nbsp;the&nbsp;town,&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;5</span><br data-dcnode-id="1496"><span data-dcnode-id="1495" instrument_node="">&nbsp;&nbsp;&nbsp;To&nbsp;the&nbsp;place&nbsp;where&nbsp;she&nbsp;was&nbsp;dwelling:</span><br data-dcnode-id="1494"><span data-dcnode-id="1493" instrument_node="">“O&nbsp;haste&nbsp;and&nbsp;come&nbsp;to&nbsp;my&nbsp;master&nbsp;dear,</span><br data-dcnode-id="1492"><span data-dcnode-id="1491" instrument_node="">&nbsp;&nbsp;&nbsp;Gin&nbsp;ye&nbsp;be&nbsp;Barbara&nbsp;Allan.”</span><br data-dcnode-id="1490"><span data-dcnode-id="1489" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></pre><p data-dcnode-id="1484"><b data-dcnode-id="1485"><i data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">3</span></i></b></p><pre data-dcnode-id="1474"><span data-dcnode-id="1483" instrument_node="">O&nbsp;hooly,&nbsp;hooly&nbsp;rose&nbsp;she&nbsp;up,</span><br data-dcnode-id="1482"><span data-dcnode-id="1481" instrument_node="">&nbsp;&nbsp;&nbsp;To&nbsp;the&nbsp;place&nbsp;where&nbsp;he&nbsp;was&nbsp;lying,&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;10</span><br data-dcnode-id="1480"><span data-dcnode-id="1479" instrument_node="">And&nbsp;when&nbsp;she&nbsp;drew&nbsp;the&nbsp;curtain&nbsp;by:</span><br data-dcnode-id="1478"><span data-dcnode-id="1477" instrument_node="">&nbsp;&nbsp;&nbsp;“Young&nbsp;man,&nbsp;I&nbsp;think&nbsp;you’re&nbsp;dying.”</span><br data-dcnode-id="1476"><span data-dcnode-id="1475" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></pre><p data-dcnode-id="1470"><b data-dcnode-id="1471"><i data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">4</span></i></b></p><pre data-dcnode-id="1460"><span data-dcnode-id="1469" instrument_node="">“O&nbsp;it’s&nbsp;I’m&nbsp;sick,&nbsp;and&nbsp;very,&nbsp;very&nbsp;sick,</span><br data-dcnode-id="1468"><span data-dcnode-id="1467" instrument_node="">&nbsp;&nbsp;&nbsp;And&nbsp;‘tis&nbsp;a’&nbsp;for&nbsp;Barbara&nbsp;Allan.”</span><br data-dcnode-id="1466"><span data-dcnode-id="1465" instrument_node="">“O&nbsp;the&nbsp;better&nbsp;for&nbsp;me&nbsp;ye&nbsp;s’&nbsp;never&nbsp;be,&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;15</span><br data-dcnode-id="1464"><span data-dcnode-id="1463" instrument_node="">&nbsp;&nbsp;&nbsp;Though&nbsp;your&nbsp;heart’s&nbsp;blood&nbsp;were&nbsp;a-spilling.</span><br data-dcnode-id="1462"><span data-dcnode-id="1461" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></pre><p data-dcnode-id="1456"><b data-dcnode-id="1457"><i data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">5</span></i></b></p><pre data-dcnode-id="1446"><span data-dcnode-id="1455" instrument_node="">“O&nbsp;dinna&nbsp;ye&nbsp;mind,&nbsp;young&nbsp;man,”&nbsp;said&nbsp;she,</span><br data-dcnode-id="1454"><span data-dcnode-id="1453" instrument_node="">&nbsp;&nbsp;&nbsp;“When&nbsp;ye&nbsp;was&nbsp;in&nbsp;the&nbsp;tavern&nbsp;a&nbsp;drinking,</span><br data-dcnode-id="1452"><span data-dcnode-id="1451" instrument_node="">That&nbsp;ye&nbsp;made&nbsp;the&nbsp;healths&nbsp;gae&nbsp;round&nbsp;and&nbsp;round,</span><br data-dcnode-id="1450"><span data-dcnode-id="1449" instrument_node="">&nbsp;&nbsp;&nbsp;And&nbsp;slighted&nbsp;Barbara&nbsp;Allan?”&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;20</span><br data-dcnode-id="1448"><span data-dcnode-id="1447" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></pre><p data-dcnode-id="1442"><b data-dcnode-id="1443"><i data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">6</span></i></b></p><pre data-dcnode-id="1432"><span data-dcnode-id="1441" instrument_node="">He&nbsp;turned&nbsp;his&nbsp;face&nbsp;unto&nbsp;the&nbsp;wall,</span><br data-dcnode-id="1440"><span data-dcnode-id="1439" instrument_node="">&nbsp;&nbsp;&nbsp;And&nbsp;death&nbsp;was&nbsp;with&nbsp;him&nbsp;dealing:</span><br data-dcnode-id="1438"><span data-dcnode-id="1437" instrument_node="">“Adieu,&nbsp;adieu,&nbsp;my&nbsp;dear&nbsp;friends&nbsp;all,</span><br data-dcnode-id="1436"><span data-dcnode-id="1435" instrument_node="">&nbsp;&nbsp;&nbsp;And&nbsp;be&nbsp;kind&nbsp;to&nbsp;Barbara&nbsp;Allan.”</span><br data-dcnode-id="1434"><span data-dcnode-id="1433" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></pre><p data-dcnode-id="1428"><b data-dcnode-id="1429"><i data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">7</span></i></b></p><pre data-dcnode-id="1418"><span data-dcnode-id="1427" instrument_node="">And&nbsp;slowly,&nbsp;slowly&nbsp;raise&nbsp;she&nbsp;up,&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;25</span><br data-dcnode-id="1426"><span data-dcnode-id="1425" instrument_node="">&nbsp;&nbsp;&nbsp;And&nbsp;slowly,&nbsp;slowly&nbsp;left&nbsp;him,</span><br data-dcnode-id="1424"><span data-dcnode-id="1423" instrument_node="">And&nbsp;sighing&nbsp;said,&nbsp;she&nbsp;could&nbsp;not&nbsp;stay,</span><br data-dcnode-id="1422"><span data-dcnode-id="1421" instrument_node="">&nbsp;&nbsp;&nbsp;Since&nbsp;death&nbsp;of&nbsp;life&nbsp;had&nbsp;reft&nbsp;him.</span><br data-dcnode-id="1420"><span data-dcnode-id="1419" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></pre><p data-dcnode-id="1414"><b data-dcnode-id="1415"><i data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">8</span></i></b></p><pre data-dcnode-id="1404"><span data-dcnode-id="1413" instrument_node="">She&nbsp;had&nbsp;not&nbsp;gane&nbsp;a&nbsp;mile&nbsp;but&nbsp;twa,</span><br data-dcnode-id="1412"><span data-dcnode-id="1411" instrument_node="">&nbsp;&nbsp;&nbsp;When&nbsp;she&nbsp;heard&nbsp;the&nbsp;dead-bell&nbsp;ringing,&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;30</span><br data-dcnode-id="1410"><span data-dcnode-id="1409" instrument_node="">And&nbsp;every&nbsp;jow&nbsp;that&nbsp;the&nbsp;dead-bell&nbsp;geid,</span><br data-dcnode-id="1408"><span data-dcnode-id="1407" instrument_node="">&nbsp;&nbsp;&nbsp;It&nbsp;cried,&nbsp;“Woe&nbsp;to&nbsp;Barbara&nbsp;Allan!”</span><br data-dcnode-id="1406"><span data-dcnode-id="1405" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></pre><p data-dcnode-id="1400"><b data-dcnode-id="1401"><i data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">9</span></i></b></p><pre data-dcnode-id="1390"><span data-dcnode-id="1399" instrument_node="">“O&nbsp;mother,&nbsp;mother,&nbsp;make&nbsp;my&nbsp;bed!</span><br data-dcnode-id="1398"><span data-dcnode-id="1397" instrument_node="">&nbsp;&nbsp;&nbsp;O&nbsp;make&nbsp;it&nbsp;saft&nbsp;and&nbsp;narrow!</span><br data-dcnode-id="1396"><span data-dcnode-id="1395" instrument_node="">Since&nbsp;my&nbsp;love&nbsp;died&nbsp;for&nbsp;me&nbsp;to-day,&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;35</span><br data-dcnode-id="1394"><span data-dcnode-id="1393" instrument_node="">&nbsp;&nbsp;&nbsp;I’ll&nbsp;die&nbsp;for&nbsp;him&nbsp;to-morrow.”</span><br data-dcnode-id="1392"><span data-dcnode-id="1391" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></pre><p data-dcnode-id="1386"><b data-dcnode-id="1387"><i data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">10</span></i></b></p><pre data-dcnode-id="1376"><span data-dcnode-id="1385" instrument_node="">They&nbsp;buried&nbsp;her&nbsp;in&nbsp;the&nbsp;old&nbsp;churchyard,</span><br data-dcnode-id="1384"><span data-dcnode-id="1383" instrument_node="">&nbsp;&nbsp;&nbsp;And&nbsp;Sir&nbsp;John’s&nbsp;grave&nbsp;was&nbsp;nigh&nbsp;her.</span><br data-dcnode-id="1382"><span data-dcnode-id="1381" instrument_node="">And&nbsp;from&nbsp;his&nbsp;heart&nbsp;grew&nbsp;a&nbsp;red,&nbsp;red&nbsp;rose,</span><br data-dcnode-id="1380"><span data-dcnode-id="1379" instrument_node="">&nbsp;&nbsp;&nbsp;And&nbsp;from&nbsp;her&nbsp;heart&nbsp;a&nbsp;brier.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;40</span><br data-dcnode-id="1378"><span data-dcnode-id="1377" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></pre><p data-dcnode-id="1372"><b data-dcnode-id="1373"><i data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">11</span></i></b></p><pre data-dcnode-id="1364"><span data-dcnode-id="1371" instrument_node="">They&nbsp;grew&nbsp;to&nbsp;the&nbsp;top&nbsp;o’&nbsp;the&nbsp;old&nbsp;church&nbsp;wall,</span><br data-dcnode-id="1370"><span data-dcnode-id="1369" instrument_node="">&nbsp;&nbsp;&nbsp;Till&nbsp;they&nbsp;could&nbsp;grow&nbsp;no&nbsp;higher,</span><br data-dcnode-id="1368"><span data-dcnode-id="1367" instrument_node="">Until&nbsp;they&nbsp;tied&nbsp;a&nbsp;true&nbsp;love’s&nbsp;knot—</span><br data-dcnode-id="1366"><span data-dcnode-id="1365" instrument_node="">&nbsp;&nbsp;&nbsp;The&nbsp;red&nbsp;rose&nbsp;and&nbsp;the&nbsp;brier.</span></pre><h2 data-dcnode-id="1361"><a data-dcnode-id="1362" id="B"><span data-dcnode-id="1363" instrument_node="">Poem Summary</span></a></h2><h3 data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Lines 1-4</span></h3><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">The poem begins by noting that Sir John Graeme fell in love with Barbara Allan in the autumn. The “green leaves” suggest a romantic, pastoral setting appropriate for the lovers, however the fact that they are “falling” suggests a note of sadness to this affair right from its start.</span></p><h3 data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Lines 5-8</span></h3><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Sir John sends a servant to fetch Barbara Allan. The servant asks her to hurry and go to Sir John if she is indeed the woman for whom the message is intended, Barbara Allan.</span></p><h3 data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Lines 9-12</span></h3><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Barbara Allan does not hurry, as shown by the repetition of the word “hooly,” which emphasizes her slow movement. She goes to Sir John and finds him lying behind a curtain, apparently on his deathbed. She does not express any pity for him, but instead states, matter of factly, that he appears to be dying.</span></p><h3 data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Lines 13-14</span></h3><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Sir John agrees with Barbara Allan and adds to her observation the fact that the cause of his sickness is his spurned love for her.</span></p><h3 data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Lines 15-16</span></h3><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Again, instead of expressing sympathy, Barbara Allan replies coldly. She states that even though Sir John is spilling forth his love, it would have been better for her if he had never existed. The phrase “heart’s blood were a-spilling” can suggest several things: Sir John’s death, his broken heart, and his spoken words of love.</span></p><h3 data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Lines 17-20</span></h3><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">In this fifth stanza, Barbara Allan explains her coldness to Sir John by referring to an incident during which her feelings were hurt. She asks whether he remembers that he “slighted” her, or treated with indifference and disdain, at the tavern. One can imagine that Sir John had been drinking too much, toasting too many other people, and ignoring his</span></p><h3 data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Media Adaptations</span></h3><ul data-dcnode-id="1308"><li data-dcnode-id="1330"><span data-dcnode-id="1334" instrument_node="">A film strip titled </span><i data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Three Traditional British Ballads</span></i><span data-dcnode-id="1331" instrument_node=""> was released by Educational Audiovisual, Inc. in 1973.</span></li><li data-dcnode-id="1325"><span data-dcnode-id="1329" instrument_node="">Folkways Records and Service Corp. released audio cassettes of </span><i data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">The English and Scottish Popular Ballads, volumes 1-4</span></i><span data-dcnode-id="1326" instrument_node=""> in 1964.</span></li><li data-dcnode-id="1317"><span data-dcnode-id="1324" instrument_node="">A videotape titled </span><i data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">The Ballad and the Source of Film</span></i><span data-dcnode-id="1321" instrument_node=""> is available from the Center for Media and Independent Living at the </span><a class="interlinked" data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/social-sciences-and-law/education/colleges-us/university-california"><span data-dcnode-id="1320" instrument_node="">University of California</span></a><span data-dcnode-id="1318" instrument_node=""> Extension in Berkely.</span></li><li data-dcnode-id="1309"><span data-dcnode-id="1316" instrument_node="">A </span><a class="interlinked" data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/literature-and-arts/performing-arts/music-history/compact-disc"><span data-dcnode-id="1315" instrument_node="">compact disc</span></a><span data-dcnode-id="1313" instrument_node=""> titled </span><i data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Virginia Traditions: Ballads from the British Tradition</span></i><span data-dcnode-id="1310" instrument_node=""> was released by Global Village Recordings in 1997.</span></li></ul><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">true love. Barbara Allan is unable to forget this incident or forgive him for it.</span></p><h3 data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Lines 21-24</span></h3><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Sir John does not deny the accusation that Barbara Allan makes. He turns away from her, presumably in sorrow for what he has done, and he passively accepts his death. His final words are a farewell to his friends and a request that they treat Barbara Allan with kindness. His gentle, sad acceptance of his fate and his blessing of Barbara Allan strike a sorrowful chord. His use of the foreign word “adieu” characterizes him as a well-bred gentleman. This portrayal of Sir John, along with his passivity, suggest that he deserves Barbara Allan’s pardon, not her continued condemnation. In this stanza, alliteration is used, with a “d” sound occurring in the words “death,” “dealing,” “adieu,” and “dear.”</span></p><h3 data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Lines 25-28</span></h3><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Somewhat reluctantly, Barbara Allan leaves Sir John. Because the word “slowly” is used four times in this stanza, a dramatic tension builds. The listener is made to wait for Barbara Allan’s response to Sir John, since her actions take time to develop. Finally, as she goes, she sighs and remarks that she can not stay since “death” has taken hold of Sir John; it has deprived him of “life.” This is the final occurrence of Barbara Allan’s cruelty, her lack of sympathy for Sir John.</span></p><h3 data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Lines 29-32</span></h3><p data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">When Barbara Allan is only one or two miles away from Sir John, she hears his funeral bell ringing. In each strike of the bell, she hears a mournful note and feels regret for what she has done to cause the death of her true love.</span></p><h3 data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Lines 33-36</span></h3><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Barbara Allan calls out in sadness, asking that her mother prepare a funeral bed for her, because she will die of a broken heart just as she caused Sir John to die for her.</span></p><h3 data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Lines 37-40</span></h3><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Barbara Allan’s body is buried near Sir John, and a brier grows above her grave. The brier is a thorn bush, and it may be associated with Barbara Allan’s sharp treatment of Sir John. Also, like the crown of thorns worn by Jesus, it may be associated with martyrdom—in this case, Barbara Allan’s death for the cause of true love. Above Sir John’s grave, a red rose grows. Repetition of the word “red” emphasizes its symbolic significance; the red rose represents love. Here it stands for the true love that Sir John felt for Barbara Allan, a love strong enough to cause death. “Red” may also remind the reader of blood and pain. Sir John suffered emotional pain because of his love.</span></p><h3 data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Lines 41-44</span></h3><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">The last stanza symbolically represents the eternity of true love. Though Sir John and Barbara Allan have died, their love continues to grow. The brier and the rose bush climb the church wall, suggesting that the love reaches above earthly constraints. There, the two plants join in a lover’s knot, a symbol of eternal unity. In life after death, it seems, Barbara Allan and Sir John have been reunited.</span></p><h2 data-dcnode-id="1279"><a data-dcnode-id="1280" id="C"><span data-dcnode-id="1281" instrument_node="">Themes</span></a></h2><h3 data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Death</span></h3><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Sudden death was much more common in the days when this poem was a popular song than it is today. Medical science had not identified virus or bacteria and had little knowledge of how the body fights disease. To an audience at that time, it would not have seemed at all unusual that a nobleman such as Sir John Graeme could be healthy one day and then be lying near death the next. This poem does not specify whether Sir John knew of his impending death when he sent his man to fetch Barbara Allan, but whether he knew how serious his condition was or not, this information is clearly held back from the reader. At first, there is no clear indication that he actually is dying: his illness is first mentioned by Barbara Allan, who bases her diagnosis on her first glance at him. Throughout stanzas 3 to 5, there is no independent information to let readers know whether Sir John’s condition is an actual illness or if his unrequited love for Barbara Allan is making him appear physically ill. Even after Sir John’s death in stanza 6, Barbara Allan behaves as if they are still engaged in clever banter, saying good-bye as if she were merely leaving for another appointment. The significance of death is played down. However, once the tolling of the dead-bell forces Barbara Allan to accept the reality of Sir John’s death, the shock she suffers brings her death just as swiftly as his appeared. While his fatal illness showed up suddenly in the poem because some information was held back (the poem’s narrator gave no indication of his fragile condition before Barbara Allan arrived to see him), her death is not just told with suddenness, it is sudden. In death, Sir John and Barbara Allan are finally happy with each other and able to achieve a peace in their relationship that they could not agree to in life.</span></p><h3 data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Growth and Development</span></h3><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Barbara Allan matures during the course of this poem. Throughout the first seven stanzas, she treats Sir John Graeme’s love for her, and then his death, lightly. More serious to her than either of these is the insult that she felt when she thought that Sir John was ignoring her at the tavern. Even seeing him die before her eyes does not shake her lighthearted attitude. It is not until she is on her way home and hears the dead-bell ringing that she suddenly becomes aware of the seriousness of death. In that one instant, Barbara Allan realizes the cold, impersonal nature of the world, which carries out the course of life and death regardless of whether she feels it is right or not. This realization of death’s inevitability is so shocking to Barbara Allan that it kills her. Still, when the shock is over, she comes away having learned something from it. It is only after they are both dead that she is prepared to enter into a continuing relationship</span></p><h3 data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Topics for Further Study</span></h3><ul data-dcnode-id="1257"><li data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">This poem tells a story about a doomed love so strong that it is the last thing on Sir John’s mind as he dies and then it causes Barbara Allen to die of grief. Try to write a similar poem of doomed love. Write it in sections—not necessarily like the four-lined, numbered stanza used here—that will show the various elements of misunderstanding that keep lovers from recognizing their love until it’s too late. At the end, include a physical symbol of their love, like the knot of the rose and brier, that will continue after the lovers are gone.</span></li><li data-dcnode-id="1262"><span data-dcnode-id="1266" instrument_node="">There have been numerous recordings of “Barbara Allan,” which was a </span><a class="interlinked" data-dcnode-id="1264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/literature-and-arts/performing-arts/music-popular-and-jazz/folk-song"><span data-dcnode-id="1265" instrument_node="">folk song</span></a><span data-dcnode-id="1263" instrument_node=""> long before it was written out as a poem. If you have not heard it sung, make up your own music to accompany this poem. Add musical instrumentation if you can.</span></li><li data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Search through music that you know from today and find at least four songs that tell stories similar to “Barbara Allan.” Be ready to explain the similarities that you believe are present.</span></li><li data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">“Barbara Allan” is a Scottish ballad published in the eighteenth century. Sir John is obviously a member of the aristocracy, sending “his man” down to the town, apparently from a castle. What do you think Barbara Allan’s social class is?</span></li></ul><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">with Sir John. After their deaths, they both retain the same basic personalities that they had in life. Sir John is represented by the rose, the symbol of love (because he was lovesick for Barbara Allan), and she is represented by the thorny briar, because she was harsh and untouchable in life. Nonetheless, they end up bound together in a knot. In life, Barbara Allan could not accept her love for Sir John, but having lost him, she learns to value his love. By poem’s end, she has grown into a person who can bond with another while retaining her rough personality.</span></p><h3 data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Love and Passion</span></h3><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">The nature of the romance between Barbara Allan and Sir John Graeme is left open to interpretation, which may account for the poem’s enduring popularity throughout different cultures for nearly four centuries. On the surface, it seems to be a one-sided affair. Barbara Allan appears to be cruel to Sir John, withholding the love that he wants so desperately, even as he is drawing his final breaths. It would be easy to be angry at Barbara Allan for being so self-centered and fickle, because she places so much importance on the insult she believes she suffered when he stayed at the tavern with his friends and ignored her. To her, this insult seems more important than Sir John’s life. Barbara Allan only seems more superficial and unsympathetic when it is later revealed that she actually did love him—so much so, that losing him quickly kills her. Once it is clear that she loved him as much as he loved her, her treatment of him on him deathbed becomes more than cruel, but mean to a point of self-destruction. There is another way to look at their relationship, though. It could be that Barbara Allan does not really slight Sir John at all, that her behavior at his bedside is part of their mutual mating ritual. She may be acting properly within the rules of their particular relationship. One indication of this is their union after death, symbolized by the rose and brier: if Sir John felt mistreated in life, it obviously did not hurt his feelings too much to spend eternity bound to her. His dialog in the fourth stanza can be read as his way of flirting, of making light of his serious illness by using it as an opportunity to flatter her, saying that he is sick for Barbara Allan. Her chilly rebuff of him in stanza 5 would not then be a case of mocking the ill, but of returning lighthearted banter with the same. If this is the case, their relationship is quite evenly balanced, a case of opposites—like the rose and brier—attracting, and not the tragedy that it might at first seem.</span></p><h2 data-dcnode-id="1248"><a data-dcnode-id="1249" id="D"><span data-dcnode-id="1250" instrument_node="">Style</span></a></h2><p data-dcnode-id="1243"><span data-dcnode-id="1247" instrument_node="">“Barbara Allan” uses the standard ballad structure, an </span><i data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">abcb</span></i><span data-dcnode-id="1244" instrument_node=""> quatrain (a four-line stanza with rhymes occurring at the end of lines two and four). The ballad stanza also typically alternates in meter, so that the first and third lines of each quatrain have four stresses, and the second and fourth lines have three stresses. “Barbara Allan” holds to this pattern, as is shown in the following example:</span></p><pre data-dcnode-id="1194"><span data-dcnode-id="1242" instrument_node="">They&nbsp;</span><b data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">grew</span></b><span data-dcnode-id="1239" instrument_node="">  &nbsp;to&nbsp;the&nbsp;</span><b data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">top</span></b><span data-dcnode-id="1236" instrument_node="">  &nbsp;o’&nbsp;the&nbsp;</span><b data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">old</span></b><span data-dcnode-id="1233" instrument_node="">  &nbsp;church&nbsp;</span><b data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">wall,</span></b><span data-dcnode-id="1230" instrument_node="">  </span><br data-dcnode-id="1229"><span data-dcnode-id="1228" instrument_node="">&nbsp;&nbsp;&nbsp;Till&nbsp;</span><b data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">they</span></b><span data-dcnode-id="1225" instrument_node="">  &nbsp;could&nbsp;</span><b data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">grow</span></b><span data-dcnode-id="1222" instrument_node="">  &nbsp;no&nbsp;</span><b data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">higher</span></b><span data-dcnode-id="1219" instrument_node="">  ,</span><br data-dcnode-id="1218"><b data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Until</span></b><span data-dcnode-id="1215" instrument_node="">  &nbsp;they&nbsp;</span><b data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">tied</span></b><span data-dcnode-id="1212" instrument_node="">  &nbsp;a&nbsp;</span><b data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">true</span></b><span data-dcnode-id="1209" instrument_node="">  &nbsp;love’s&nbsp;</span><b data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">knot—</span></b><span data-dcnode-id="1206" instrument_node="">  </span><br data-dcnode-id="1205"><span data-dcnode-id="1204" instrument_node="">&nbsp;&nbsp;&nbsp;The&nbsp;</span><b data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">red</span></b><span data-dcnode-id="1201" instrument_node="">  &nbsp;rose&nbsp;</span><b data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">and</span></b><span data-dcnode-id="1198" instrument_node="">  &nbsp;the&nbsp;</span><b data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">brier.</span></b><span data-dcnode-id="1195" instrument_node="">  </span></pre><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">The rhymes in this last stanza are “higher” and “brier,” and the metrical stresses follow the 4-3-4-3 quatrain pattern.</span></p><h2 data-dcnode-id="1189"><a data-dcnode-id="1190" id="E"><span data-dcnode-id="1191" instrument_node="">Historical Context</span></a></h2><p data-dcnode-id="1181"><span data-dcnode-id="1188" instrument_node="">“Barbara Allan” is a piece of Scotland’s history, having been a traditional folk ballad at least through the 1600s (although it did not actually appear in print until 1740). During that time, Scotland and England, which had been linked throughout much of their history, became even more closely united. In 1603, when Queen </span><a class="interlinked" data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/history/british-and-irish-history-biographies/elizabeth-i"><span data-dcnode-id="1187" instrument_node="">Elizabeth I</span></a><span data-dcnode-id="1185" instrument_node=""> of England died, she was followed on the throne by her cousin James, who was the son of the infamous Mary, Queen of Scots. James had been king of Scotland since 1576, when he was ten years old, and he had actively ruled the country since 1581: with his ascension to the English throne, he was, simultaneously, James VI of Scotland and James I of England. At the time, Scotland was a small, poor country in comparison to England. Though it had four major universities, as compared with only two in England, Scotland had no major urban center that could even remotely compare with London, which was arguably the most important center of commerce in the world. Scotland was mostly agricultural, although its land was not entirely suited for growing crops: the most fertile area was the middle valley, where whole harvests were often lost due to a lack of knowledge about crop rotation. In the hills, known as the Highlands, the farming was even worse, and one of the main sources of income was robbery. The average income in Scotland was a fraction of what it was in England. At first, the Scots were happy to see their king going to rule England, believing that it would give them a greater voice in English/Scottish affairs. They found out, however, that James, who had been their king for a quarter of a century, quickly lost interest in them. He only went back to Scotland once between his coronation in England and his death in 1625. In the meantime, he did much to aggravate the Scots. One of their main grievances with him was about religion. Scotland was heavily Presbyterian, and the people resented James’ attempts to make the </span><a class="interlinked" data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/philosophy-and-religion/christianity/protestant-denominations/church-england"><span data-dcnode-id="1184" instrument_node="">Church of England</span></a><span data-dcnode-id="1182" instrument_node=""> the required religion of their country. When James’ son Charles I tried, in 1637,</span></p><h3 data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Compare &amp; Contrast</span></h3><ul data-dcnode-id="1093"><li data-dcnode-id="1160"><b data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">1740:</span></b><span data-dcnode-id="1176" instrument_node=""> The third and last volume of Scottish philosopher </span><a class="interlinked" data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/philosophy-and-religion/philosophy-biographies/david-hume"><span data-dcnode-id="1175" instrument_node="">David Hume</span></a><span data-dcnode-id="1173" instrument_node="">’s three volume </span><i data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">A Treatise of Human Nature</span></i><span data-dcnode-id="1170" instrument_node=""> was published. The public was indifferent, and Hume himself admitted that his work was “dead-born.”</span><br data-dcnode-id="1169"><span data-dcnode-id="1168" instrument_node="">&nbsp;</span><br data-dcnode-id="1167"><b data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Today:</span></b><span data-dcnode-id="1164" instrument_node=""> Hume is considered one of the greatest philosophers in history, and </span><i data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">A Treatise of Human Nature</span></i><span data-dcnode-id="1161" instrument_node=""> is regarded as his most lofty achievement.</span></li><li data-dcnode-id="1129"><b data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">1740:</span></b><span data-dcnode-id="1157" instrument_node=""> America consisted of thirteen states that were ruled by the government of </span><a class="interlinked" data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/places/britain-ireland-france-and-low-countries/british-and-irish-political-geography/great-britain"><span data-dcnode-id="1156" instrument_node="">Great Britain</span></a><span data-dcnode-id="1154" instrument_node="">. The British government fought a series of wars against France and Germany in </span><a class="interlinked" data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/places/oceans-continents-and-polar-regions/oceans-and-continents/north-america"><span data-dcnode-id="1153" instrument_node="">North America</span></a><span data-dcnode-id="1151" instrument_node=""> to determine who would rule the colonies.</span><br data-dcnode-id="1150"><span data-dcnode-id="1149" instrument_node="">&nbsp;</span><br data-dcnode-id="1148"><b data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">1776:</span></b><span data-dcnode-id="1145" instrument_node=""> The </span><a class="interlinked" data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/places/united-states-and-canada/us-political-geography/united-states"><span data-dcnode-id="1144" instrument_node="">United States</span></a><span data-dcnode-id="1142" instrument_node=""> of America declared independence from </span><a class="interlinked" data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/places/britain-ireland-france-and-low-countries/british-and-irish-political-geography/great-britain"><span data-dcnode-id="1141" instrument_node="">Great Britain</span></a><span data-dcnode-id="1139" instrument_node=""> and fought the Revolutionary War in order to sever relationships.</span><br data-dcnode-id="1138"><span data-dcnode-id="1137" instrument_node="">&nbsp;</span><br data-dcnode-id="1136"><b data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Today:</span></b><span data-dcnode-id="1133" instrument_node=""> Although maintaining a good relationship with Great Britain, the </span><a class="interlinked" data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/places/united-states-and-canada/us-political-geography/united-states"><span data-dcnode-id="1132" instrument_node="">United States</span></a><span data-dcnode-id="1130" instrument_node=""> is recognized as the world’s superpower.</span></li><li data-dcnode-id="1113"><b data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">1740:</span></b><span data-dcnode-id="1126" instrument_node=""> The city of Philadelphia was the only city in the </span><a class="interlinked" data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/places/united-states-and-canada/miscellaneous-us-geography/new-england"><span data-dcnode-id="1125" instrument_node="">New England</span></a><span data-dcnode-id="1123" instrument_node=""> colonies to have firefighting capabilities: three years earlier, </span><a class="interlinked" data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/history/us-history-biographies/benjamin-franklin"><span data-dcnode-id="1122" instrument_node="">Benjamin Franklin</span></a><span data-dcnode-id="1120" instrument_node=""> organized a bucket brigade of men who handed buckets of water from one to another to reach the source of a fire.</span><br data-dcnode-id="1119"><span data-dcnode-id="1118" instrument_node="">&nbsp;</span><br data-dcnode-id="1117"><b data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Today:</span></b><span data-dcnode-id="1114" instrument_node=""> Even the smallest municipalities have fire response vehicles. Most areas have water available via underground pipes.</span></li><li data-dcnode-id="1094"><b data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">1740:</span></b><span data-dcnode-id="1110" instrument_node=""> A series of roads connected the </span><a class="interlinked" data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/places/united-states-and-canada/miscellaneous-us-geography/new-england"><span data-dcnode-id="1109" instrument_node="">New England</span></a><span data-dcnode-id="1107" instrument_node=""> colonies from Charleston, </span><a class="interlinked" data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/places/united-states-and-canada/us-political-geography/south-carolina"><span data-dcnode-id="1106" instrument_node="">South Carolina</span></a><span data-dcnode-id="1104" instrument_node="">, to Portsmouth, </span><a class="interlinked" data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/places/united-states-and-canada/us-political-geography/new-hampshire"><span data-dcnode-id="1103" instrument_node="">New Hampshire</span></a><span data-dcnode-id="1101" instrument_node="">. The roads were built to facilitate the growing postal system.</span><br data-dcnode-id="1100"><span data-dcnode-id="1099" instrument_node="">&nbsp;</span><br data-dcnode-id="1098"><b data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Today:</span></b><span data-dcnode-id="1095" instrument_node=""> The federal interstate highway system, inaugurated in 1956, links the forty-eight continuous states.</span></li></ul><p data-dcnode-id="1088"><span data-dcnode-id="1092" instrument_node="">to require that a new prayer book be used throughout Scotland, there was rioting in the streets and violence against ministers as they tried to conduct services using the new book. Influential Scots signed a National Covenant to assert Scotland’s rights, and in 1640, a Scottish Army invaded and occupied several northern counties of England. It was Charles I’s dealings with Parliament to raise money to fight the Scots that brought tensions between the English monarchy and the elected government to a head: the result was the English Revolution, which spanned from 1640-1660. At first, the Scots were allied with the Parliament against the king’s forces. In 1646 Charles surrendered to the Scots, who turned him over to the Parliamentary forces, but he soon escaped. A second civil war began in 1648, when the king promised to stand behind the rights of Presbyterians. This time the Scots were on his side. Parliament’s troops defeated them, though, and England was declared a Commonwealth. The leader of the revolution, </span><a class="interlinked" data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/history/british-and-irish-history-biographies/oliver-cromwell"><span data-dcnode-id="1091" instrument_node="">Oliver Cromwell</span></a><span data-dcnode-id="1089" instrument_node="">, proved just as intolerant of Presbyterianism as the king had been, and Scotland was once again put in the position of being subjected to English rule. Soon after Cromwell died in 1658, the monarchy was restored, and Charles II became king of England and Scotland.</span></p><p data-dcnode-id="1083"><span data-dcnode-id="1087" instrument_node="">In 1707, the Scottish government voted itself out of existence. Scotland became part of the United Kingdom of Great Britain. </span><a class="interlinked" data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/places/britain-ireland-france-and-low-countries/british-and-irish-political-geography/lowland-scots"><span data-dcnode-id="1086" instrument_node="">Lowland Scots</span></a><span data-dcnode-id="1084" instrument_node="">, from the urban areas, supported the merger, because it would give the country representation in Parliament and assure Scotland the freedom to determine its own religion and legal system. Highland Scots resented what they perceived to be the loss of their freedom to England, and they led several violent rebellions, including major uprisings in 1708, 1715, and 1745. Following the 1745 rebellion, the British government forced the breakup of the clan system.</span></p><p data-dcnode-id="1060"><span data-dcnode-id="1082" instrument_node="">When “Barbara Allan” was published, there were many poets writing about death. Known today as the Graveyard School, these poets used imagery that came to be associated in the next century with Gothic writers such as </span><a class="interlinked" data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/literature-and-arts/american-literature-biographies/edgar-allan-poe"><span data-dcnode-id="1081" instrument_node="">Edgar Allan Poe</span></a><span data-dcnode-id="1079" instrument_node="">: graves, churchyards, night, death, crumbling ruins, and ghosts. One of the most familiar poems from this era is </span><a class="interlinked" data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/literature-and-arts/english-literature-1500-1799-biographies/thomas-gray"><span data-dcnode-id="1078" instrument_node="">Thomas Gray</span></a><span data-dcnode-id="1076" instrument_node="">’s “Elegy Written in a Country Churchyard.” Other poets who sometimes worked in this vein include Mark Akenside, </span><a class="interlinked" data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/social-sciences-and-law/law-biographies/william-cowper"><span data-dcnode-id="1075" instrument_node="">William Cowper</span></a><span data-dcnode-id="1073" instrument_node="">, William Shenstone, and Joseph Warton. During the last half of the eighteenth century, Scotland became one of the world’s great centers of intellectual thought. Edinburgh was home to a movement that came to be referred to as the </span><a class="interlinked" data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/history/modern-europe/british-and-irish-history/scottish-enlightenment"><span data-dcnode-id="1072" instrument_node="">Scottish Enlightenment</span></a><span data-dcnode-id="1070" instrument_node="">. Outstanding thinkers who had roots in Scotland and who came out of that time period include philosopher </span><a class="interlinked" data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/philosophy-and-religion/philosophy-biographies/david-hume"><span data-dcnode-id="1069" instrument_node="">David Hume</span></a><span data-dcnode-id="1067" instrument_node="">, novelist Tobias Smollett, biographer </span><a class="interlinked" data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/literature-and-arts/english-literature-1500-1799-biographies/james-boswell"><span data-dcnode-id="1066" instrument_node="">James Boswell</span></a><span data-dcnode-id="1064" instrument_node="">, and Scotland’s most honored poet, </span><a class="interlinked" data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/literature-and-arts/english-literature-1500-1799-biographies/robert-burns"><span data-dcnode-id="1063" instrument_node="">Robert Burns</span></a><span data-dcnode-id="1061" instrument_node="">.</span></p><h2 data-dcnode-id="1057"><a data-dcnode-id="1058" id="F"><span data-dcnode-id="1059" instrument_node="">Critical Overview</span></a></h2><p data-dcnode-id="1049"><span data-dcnode-id="1056" instrument_node="">In his collection of essays titled </span><i data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">The Ballad As Song,</span></i><span data-dcnode-id="1053" instrument_node=""> Bertrand Harris Bronson lists “Barbara Allan” as one of the seven most popular ballads in the world. As he puts it, the popularity of this ballad and most of the others on his list stems from their presentations of “love as a disease from which no one recovers.” The popularity of “Barbara Allan” can also be traced back to the seventeenth century, in a comment in </span><a class="interlinked" data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/literature-and-arts/english-literature-1500-1799-biographies/samuel-pepys"><span data-dcnode-id="1052" instrument_node="">Samuel Pepys</span></a><span data-dcnode-id="1050" instrument_node="">’s diary. Pepys admired the work’s conciseness, its tight narrative structure, and the way that the tragic story is told quickly and with a strong ending. He declared that this song has an “eternal appeal.... It is as if the essence of hundreds of romantic love stories had been distilled into this one ballad. The tantalizing lack of details adds an element of mystery to the tragic Tate.”</span></p><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Attesting to the continued popularity of “Barbara Allan,” twentieth-century critic Christine A. Cartwright examines this ballad in her article “‘Barbara Allen’: Love and Death in an Anglo-American Narrative Folksong.” Cartwright discusses current versions of the ballad that exist in the United States, noting that the ballad’s theme, the tragedy of true love, appears in contemporary country-western music. In her analysis, she points out the existence of opposing forces in the poem’s symbols and in its literal meaning. Since love and death are the paradoxical themes of the ballad, Cartwright calls to her reader’s attention the parallel, opposing images of the green fields and the graveyard, and of the red rose and the thorny “brier.”</span></p><h2 data-dcnode-id="1044"><a data-dcnode-id="1045" id="G"><span data-dcnode-id="1046" instrument_node="">Criticism</span></a></h2><h3 data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">David Kelly</span></h3><p data-dcnode-id="1039"><i data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">David Kelly is an instructor of creative writing at several community colleges in Illinois, as well as a fiction writer and playwright. In the following essay, Kelly explains that the role-playing that goes on in Barbara Allan’s relationship with Sir John Graeme is necessary in order for them to have a relationship at all.</span></i></p><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">The beauty of Barbara Allan’s story, the thing that makes it memorable, is that ultimately, outside of the sphere of life as we know it, she and John Graeme end up being true lovers, as indicated by the way the rose and brier that symbolize the two are intertwined forever more. The tragedy of Barbara Allan’s story is that she and he are unable to express their enduring love for each other while they are alive. Through the centuries, readers have come away from the poem with the simple message that someone who is cold in a love affair will live to regret it, a negative impression of Barbara Allan reinforced by the fact that she becomes, in a sense, a thorny, woody brier. It isn’t really fair, though, to think of her this way. The relationship described in this ballad is much more subtle and nuanced than the simplified understanding that sees her as a headstrong woman turning her back on a weakened, love-stricken man. It may not be an open or loving relationship that they have, but there are clear indications that the roles Barbara Allan and Sir John Graeme play are agreeable to both parties, and that it might be necessary for them to carry on these pretensions if they are to be together at all.</span></p><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">To gain a better appreciation of this ballad (or, really, of any story), readers need to give serious consideration to the differences between what the characters say and what they think. Barbara Allan’s insincerity is portrayed quite openly in this poem: she pretends to be uninterested in John Graeme’s fragile health, but that is a lie: later, when she hears the tolling of the bells, she is so overcome with grief that she knows it will mean the death of her. Some published versions have this ballad ending with stanza 9, after Barbara Allan announces her impending death, leaving out the “true love’s knot” that symbolizes their reunion. This serves to emphasize her regret for the way that she has treated him, but by leaving out this final symbolic act that balances the truth against their words and actions, it reduces this to a common story of misdirected flirtation. Their ultimate union tells us that theirs was a true love, and, therefore, that all of Barbara Allan’s cold behavior throughout the poem is a lie. Throughout the poem, she masks her feelings, but so does John Graeme, and we will have to consider why.</span></p><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">First, however, we should consider the evidence of Sir John’s own lack of sincerity. He does stay consistent with his word throughout the poem—in that their reunion in the afterlife does, in fact, match his claims of love—but, despite the sincerity of his feelings, his claims of love still ring false. For instance, why is he dying? He says in stanza 4 that he is sick for Barbara Allan. While it is true that in poetry emotional distress often manifests itself as physical illness (as it does for Barbara Allan in the end), we are not informed of any great emotional shock that is killing Sir John Graeme. He is deathly ill before her arrival at his sick bed, which seems to indicate two possibilities. He may have been rejected by Barbara Allan earlier, before the time covered by this poem, although it starts with him falling for her in the first stanza; but if she had previously rendered him a flat-out rejection strong enough to kill him, would she come when called for, or be so cheerful when she arrived? The more simple and likely explanation is that Sir John is bedridden with an actual physical ailment, but is attributing his illness to love in an attempt to romantically flatter her by describing the powerful hold she has over him.</span></p><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">The Sir John Graeme we see is a bit of a ham, prone to overstating his love and his sorrow. In the modern world, anyone who tried turning to the wall and groaning, “Adieu, adieu,” would be accused of the worst kind of overreacting; reading other ballads from the sixteenth century, one gets the impression that, even though they were in some ways more sentimental times, Sir John’s flamboyance would have been excessive even then. Readers have to reconcile the John Graeme who we see in the poem, who claims to be wasting away for love, with the one Barbara Allan describes, who has ignored her while drinking with his friends in the tavern. And just why would his realization of his love for her coincide with his dying? Perhaps he is overcome by fever. Perhaps, taking a final inventory of his life and separating the shallow from the meaningful, he can at last see Barbara Allan shine. The most likely answer, though—the one that does not require huge doses of “poetic license” to bend the laws of science or emotion—holds that Sir John’s love for Barbara Allan becomes no more or less superficial than it ever was, but that his exaggerated claims of love are part of the pattern they have established</span></p><h3 data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">What Do I Read Next?</span></h3><ul data-dcnode-id="998"><li data-dcnode-id="1024"><span data-dcnode-id="1028" instrument_node="">The definitive collection of ballads such as “Barbara Allan” is Francis James Childs’s collection </span><i data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">The English and Scottish Popular Ballads.</span></i><span data-dcnode-id="1025" instrument_node=""> It was originally published by Houghton Mifflin in ten volumes between 1882 and 1898. In 1965, Dover Publications issued a condensed five-volume reprint.</span></li><li data-dcnode-id="1019"><span data-dcnode-id="1023" instrument_node="">The poetry of the 1600s, when “Barbara Allan” was a popular song ballad, is collected in Signet Classic’s 1974 collection </span><i data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Poets of the 17th Century,</span></i><span data-dcnode-id="1020" instrument_node=""> edited by John Broadbent. Volume I is arranged by the major poets, while Volume II is organized around themes and historic events.</span></li><li data-dcnode-id="1012"><a class="interlinked" data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/literature-and-arts/american-literature-biographies/katharine-lee-bates"><span data-dcnode-id="1018" instrument_node="">Katharine Lee Bates</span></a><span data-dcnode-id="1016" instrument_node=""> compiled a one-volume collection called </span><i data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Ballad Book</span></i><span data-dcnode-id="1013" instrument_node=""> for publication in 1890. It divides traditional ballads into three categories: “Ballads of Superstition,” “Ballads of Tradition,” and “Romantic and Domestic Ballads,” with the last section including “Barbara Allan.” Books for Libraries Press reissued the book in 1969.</span></li><li data-dcnode-id="1008"><i data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">The Viking Book of Folk Ballads of the English-speaking World</span></i><span data-dcnode-id="1009" instrument_node=""> was edited by Albert B. Friedman and published in 1956.</span></li><li data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">MacEdward Leach’s 1955 collection, </span><i data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">The Ballad Book,</span></i><span data-dcnode-id="1004" instrument_node=""> published by A. S. Barnes and Co., is interesting because it is cross-cultural, with selections from England, Scotland, and the United States.</span></li><li data-dcnode-id="999"><span data-dcnode-id="1002" instrument_node="">Birkinn Publications has issued a recent (1998) paperback by David Kerr Cameron, illustrated by Barbara Robertson, titled </span><i data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">The Ballad and the Plough; A Portrait of the Life of the Old Scottish Farmtowns.</span></i></li></ul><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">for their relationship, just as her forceful rejection of him conforms to her traditional role.</span></p><p data-dcnode-id="991"><span data-dcnode-id="995" instrument_node="">Looking at their relationship as an elaborate masquerade helps us appreciate the complexity of what they have together. John Graeme is not really </span><i data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">dejected:</span></i><span data-dcnode-id="992" instrument_node=""> “dejected” is just a part that he acts out.</span></p><p data-dcnode-id="988"><i data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">“... [Barbara Allan] is an isolated loser in a game that only she and the dead man knew they were playing.”</span></i></p><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Barbara Allan, likewise, is not as uncaring as she pretends to be, which could account for her ultimate grief, when she realizes that the game will not be going on for one more round. Contemporary readers are likely to frown upon such falsehood within a romantic relationship, feeling that these people are treating love less seriously than they should. We should consider, though, that role-playing offers Barbara Allan and John Graeme opportunities.</span></p><p data-dcnode-id="978"><span data-dcnode-id="985" instrument_node="">Writing in her book </span><i data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">The Female Eunuch,</span></i><span data-dcnode-id="982" instrument_node=""> feminist and social critic </span><a class="interlinked" data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/social-sciences-and-law/social-reformers/germaine-greer"><span data-dcnode-id="981" instrument_node="">Germaine Greer</span></a><span data-dcnode-id="979" instrument_node=""> explained unequal romantic relations this way: “Love is not possible between inferior and superior, because the base cannot free their love from selfish interest, as the desire either for security or social advantage, and, being lesser, they themselves cannot comprehend the faculties in the superior which are most worthy of love. The superior being on the other hand cannot demean himself by love for an inferior.” Greer was writing about different social levels assigned to men and women; the same dynamic would be even more intense between unequal parties in a feudal system. It is fair to assume, from the fact that Sir John has a title and a servant, and because Barbara Allan’s home is dismissed lightly as “that place where she was dwelling,” that they belong to different social classes, and, whatever the rules of their class system, this inequity needs to be corrected if they are to have any kind of a meaningful relationship. The roles they play with one another allow them to face each other as equals. As his title empowers him, so too does her callousness empower her; just as he can ignore her in the social setting of the tavern, she can ignore him in the intimacy of his sick room. It is not the healthiest of relationships, but it does create a sort of balance that is absent in bad romances. The problem, of course, is that this charade allows no place for Sir John Graeme or Barbara Allan to directly convey their true feelings. He has to be too sweet and she has to be too sour in order for them to meet in the middle.</span></p><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">When he dies, Barbara Allan is stunned to find herself frozen in the role that she was playing for her momentary advantage: that of the blithe uncaring vixen who laughed off the love that Sir John Graeme professed with his last breath. Like a loser in a game of hot potato or musical chairs, she finds herself isolated, with time having run out before she expected it; she is an isolated loser in a game that only she and the dead man knew they were playing. If one feels that she toyed with Sir John’s love, and that he was powerless under her control, it is difficult to not feel contempt for Barbara Allan. However, if one believes that she is a victim of circumstances who has lost her one true conspirator—as well as her one true love—then it is difficult not to feel pity for her. It is this range of possible interpretations that has allowed this ballad to endure throughout the generations, while others have fallen away. Everyone knows at least one couple like this, who can’t even agree about loving each other and who will go on arguing about their love until the very end.</span></p><p data-dcnode-id="969"><b data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Source:</span></b><span data-dcnode-id="973" instrument_node=""> David Kelly, in an essay for </span><i data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Poetry for Students,</span></i><span data-dcnode-id="970" instrument_node=""> Gale Group, 2000.</span></p><h3 data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Carolyn Meyer</span></h3><p data-dcnode-id="964"><i data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Carolyn Meyer holds a Ph.D. in modern British and Irish literature and has taught contemporary literature at several Canadian universities, including the University of Toronto. In the following essay, Meyer explains the timeless appeal of “Barbara Allan.”</span></i></p><p data-dcnode-id="944"><span data-dcnode-id="963" instrument_node="">No other traditional folk ballad has been so widely dispersed, so variously reinterpreted, nor so thoroughly acculturated as “Barbara Allan.” Number one atop Bertrand Bronson’s list of the most popular ballads, it exists in 98 recorded versions in </span><a class="interlinked" data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/places/united-states-and-canada/us-political-geography/west-virginia"><span data-dcnode-id="962" instrument_node="">West Virginia</span></a><span data-dcnode-id="960" instrument_node=""> alone, and from its English and Scottish origins, it has migrated as far afield as the Caribbean, Canada, and Texas. Barbara, as the archetypal slighted mistress who is both agent and victim of love’s impetuosity and folly, is known worldwide under a range of pseudonyms and aliases, having been reinvented time and time again (and, according to John Minton in a </span><i data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Southern Folklore</span></i><span data-dcnode-id="957" instrument_node=""> article, having even been masculinized as a love-struck African-American teenager named Boberick Allan). Her story has refused to disappear from the margins of modern consciousness and appeals to us today much as it did to eighteenth-century Irish poet </span><a class="interlinked" data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/literature-and-arts/english-literature-1500-1799-biographies/oliver-goldsmith"><span data-dcnode-id="956" instrument_node="">Oliver Goldsmith</span></a><span data-dcnode-id="954" instrument_node="">, Norwegian composer Edvard Greig (who wrote a melody for its lyrics), and English diarist Samuel Pepys, who, in 1666, lauded the “perfect pleasure” he experienced on first hearing the “little Scotch song of Barbara Allan.” Even contemporary American novelist </span><a class="interlinked" data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/literature-and-arts/american-literature-biographies/joyce-carol-oates"><span data-dcnode-id="953" instrument_node="">Joyce Carol Oates</span></a><span data-dcnode-id="951" instrument_node=""> has confessed to being haunted by it, noting in her essay “‘In the Fifth Act’: the Art of the English and Scottish Traditional Ballads” that “If I am alone and I become aware of myself humming or singing under my breath, why is it likely to be ‘Barbara Allan’?” One answer to its eternal and universal appeal may lie in what critic Alan Bold has called “the masterly concision of its narrative,” for no sooner do its lovers meet than they are parted, and no sooner is love spurned than its loss is bitterly repented. Barbara and Sir John Graeme do not merely experience love in all its extremes and malformations, they literally give up their lives for it. This is an intense, uncommon and visceral passion—love on a grand scale in a short span—made more intense through the brevity of the ballad’s eleven stanzas. The volcanic force of its story line is further offset by the ballad idiom itself, with its incongruously sentimental commonplaces, stark simplicity, and childlike naivete. “Barbara Allan,” like the ballads Oates considers more generally in her essay, speaks with primitive authority to the deep recesses of the human imagination, becoming what she calls a “fantasy of the unconscious” where the impossible is presented “as if it were quite natural; as if, in fact, it belonged to the day-side and not the night-side of our existence.” Concise though the ballad may be, the timeless appeal of “Barbara Allan” also resides in its biting dramatic irony and in its distillation of supreme romantic tragedy. It survives not merely as song but as archetype—the essence of every Tate of love gone wrong ever told, a pre-blues blues song for all ages. Its echoes can be heard in everything from Henry James’s “Longstaff’s Marriage,” which appropriates and adapts its plot, to </span><a class="interlinked" data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/literature-and-arts/film-and-television-biographies/william-wyler"><span data-dcnode-id="950" instrument_node="">William Wyler</span></a><span data-dcnode-id="948" instrument_node="">’s 1939 adaptation of </span><i data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Wuthering Heights,</span></i><span data-dcnode-id="945" instrument_node=""> which uses its melody as backdrop to Cathy and Heathcliff’s similarly themed story of frustrated love, destructive pride, and embitterment.</span></p><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">What mattered most to the illiterate and pre-literate folk responsible for ballad composition and transmission was the story itself, told with a sometimes mesmerizing and dream-like discontinuity, a disregard for character motivation, and a singsong repetitiousness that made the twists and turns of its plot easier to remember. No exception to the rule, “Barbara Allan” is written in the standard four-line</span></p><p data-dcnode-id="936"><i data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">“[‘Barbara Allan’] survives not merely as song but as archetype</span></i><span data-dcnode-id="939" instrument_node="">—</span><i data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">the essence of every Tate of love gone wrong ever told, a pre-blues blues song for all ages.”</span></i></p><p data-dcnode-id="928"><span data-dcnode-id="935" instrument_node="">ballad stanza of alternating tetrameter and trimeter, with rhyme between the second and fourth lines. Most ballads begin, as </span><a class="interlinked" data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/people/literature-and-arts/english-literature-1500-1799-biographies/thomas-gray"><span data-dcnode-id="934" instrument_node="">Thomas Gray</span></a><span data-dcnode-id="932" instrument_node=""> observed, “in the fifth act”—in medias res—just as the story reaches its climax. In this regard, the ballad form has much in common with the modern </span><a class="interlinked" data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/literature-and-arts/language-linguistics-and-literary-terms/literature-general/short-story"><span data-dcnode-id="931" instrument_node="">short story</span></a><span data-dcnode-id="929" instrument_node="">, which also begins near its climax and “often doubles back on itself in order to bring the reader into the emotional nexus of the story.” Less typical of the ballad norm, “Barbara Allan” in fact begins when the fifth act is over, “when the tragic actors have left the stage” and only a narrator remains “to give universal and objective meaning to what has happened.” The Tate, in this case, is told in the sparest of ways, making for a tantalizing lack of detail that adds an element of mystery. Few particulars of Barbara and Sir John’s courtship emerge, save that their romance is played out against the end of seasonal cycle—“about the Martinmas time / When the green leaves were a-falling”—a sure sign that their passions are to meet with an untimely end. So abridged is their rather one-sided relationship (for it is the unfortunate Sir John who is besotted), that it occupies barely a single stanza. Nevertheless, the plainness and factuality with which Sir John Graeme’s love for Barbara Allan is stated is characteristic of the earthiness of ballads in general and establishes the sexual motivation for the events that are about to unfold.</span></p><p data-dcnode-id="923"><span data-dcnode-id="927" instrument_node="">If sex and violence, in all of its tabloid-like sensationalism, are the chief mainstays of popular balladry, then a close second is the convention that sees the rich beset by misfortune and, sometimes quite literally, cut down to size. For the ballad folk, this was perhaps the only means to redress the imbalance that left them victims of their social betters. Sir John Graeme is clearly a wealthy landowner of some influence, important enough to have a “man,” most likely a chamberlain, do his bidding. As the action begins, Sir John’s “man” goes “down through the town” to fetch his master’s sweetheart, but the very necessity of his mission underlines the physical as well as the social distance between the two lovers. In </span><i data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">English and Scottish Ballads,</span></i><span data-dcnode-id="924" instrument_node=""> poet and ballad anthologist Robert Graves speculates that Barbara is no ordinary country lass, but in fact a witch who takes vengeful exception to her aristocratic lover’s decision to end their affair and marry a woman of higher social rank. Despite such supernatural overtones, what the ballad folk really derived from the story was the satisfaction of knowing that though Sir John may well be a fine young lord, his lands and riches cannot save him from the agony of lovesickness and heartbreak he suffers for the sake of a country girl.</span></p><p data-dcnode-id="915"><span data-dcnode-id="922" instrument_node="">Two standard ballad features—the deathbed scene and what Alan Bold, in </span><i data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">The Ballad: The Critical Idiom,</span></i><span data-dcnode-id="919" instrument_node=""> refers to as the “pining-away motif”—anchor the poem’s central stanzas (3-7). Though Barbara is willingly escorted to her estranged lover’s bedside, she both arrives and departs with an almost pathological slowness (“O hooly, hooly rose she up / ... O slowly, slowly raise she up”) and exhibits </span><a class="interlinked" data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.encyclopedia.com/social-sciences-and-law/sociology-and-social-reform/sociology-general-terms-and-concepts/body"><span data-dcnode-id="918" instrument_node="">body language</span></a><span data-dcnode-id="916" instrument_node=""> that not only reveals her unshakable resolve and self-possession, but also lends a strange, dream-like quality to their final encounter. On drawing her ex-lover’s bed curtain aside, she observes with stark unemotionalism, “‘Young man, I think you’re dying.’” Poor bedside manner to say the least, her bluntness explains why some versions go by the title “Barbara Allan’s Cruelty” and why she has sometimes been rechris-tened “Barbarous Ellen” and “Barbary Alone.” In the ensuing dialogue so typical of the ballad form, where dialogue accounts for the bulk of the narrative, Barbara’s pitilessness is shown to have been provoked—“When ye was in the tavern drinking, / ... ye made the healths go round and round, / And slighted Barbara Allan”—and it is for this crime of the heart that she is now exacting revenge.</span></p><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Though ballads, as a whole, tend to offer observations of what Oates calls the “grotesque inequities between the lot of men and the lot of women,” “the singers had no wish to alter the ways of the w
