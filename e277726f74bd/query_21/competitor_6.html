</span><span data-dcnode-id="4955" id="freeTextContainer10325304735384684237"><span data-dcnode-id="4963" instrument_node="">In a dugout in northern France, sometime in 1916, three British soldiers try to make sense of one of the most complicated questions of modern history:</span><br data-dcnode-id="4962"><br data-dcnode-id="4961"><blockquote data-dcnode-id="4956"><span data-dcnode-id="4960" instrument_node="">PVT. BALDRICK: The way I see it, these days there's a war on, right? and, ages ago, there wasn't a war on, right? So, there must have been a moment when there not being a war on went away, right? and there being a war on came along. So, what I want to know is: how did we get from the one case of affairs to the other case of affairs?</span><br data-dcnode-id="4959"><br data-dcnode-id="4958"><span data-dcnode-id="4957" instrument_node="">CPT. BLACKADDER:</span></blockquote></span><span data-dcnode-id="4954" instrument_node="">
</span><span data-dcnode-id="4866" id="freeText10325304735384684237" style="display:none"><span data-dcnode-id="4953" instrument_node="">In a dugout in northern France, sometime in 1916, three British soldiers try to make sense of one of the most complicated questions of modern history:</span><br data-dcnode-id="4952"><br data-dcnode-id="4951"><blockquote data-dcnode-id="4907"><span data-dcnode-id="4950" instrument_node="">PVT. BALDRICK: The way I see it, these days there's a war on, right? and, ages ago, there wasn't a war on, right? So, there must have been a moment when there not being a war on went away, right? and there being a war on came along. So, what I want to know is: how did we get from the one case of affairs to the other case of affairs?</span><br data-dcnode-id="4949"><br data-dcnode-id="4948"><span data-dcnode-id="4947" instrument_node="">CPT. BLACKADDER: Do you mean, "How did the war start?"</span><br data-dcnode-id="4946"><br data-dcnode-id="4945"><span data-dcnode-id="4944" instrument_node="">PVT. BALDRICK: Yeah. […] I heard that it started when a bloke called Archie Duke shot an ostrich 'cause he was hungry.</span><br data-dcnode-id="4943"><br data-dcnode-id="4942"><span data-dcnode-id="4941" instrument_node="">CPT. BLACKADDER: …I think you mean it started when the Archduke of Austro-Hungary got shot.</span><br data-dcnode-id="4940"><br data-dcnode-id="4939"><span data-dcnode-id="4938" instrument_node="">PVT. BALDRICK: Nah, there was definitely an ostrich involved, sir.</span><br data-dcnode-id="4937"><br data-dcnode-id="4936"><span data-dcnode-id="4935" instrument_node="">CPT. BLACKADDER: Well, possibly. But the real reason for the whole thing was that it was too much effort </span><i data-dcnode-id="4933"><span data-dcnode-id="4934" instrument_node="">not</span></i><span data-dcnode-id="4932" instrument_node=""> to have a war. […] You see, Baldrick, in order to prevent war in Europe, two superblocs developed: us, the French and the Russians on one side, and the Germans and Austro-Hungary on the other. The idea was to have two vast opposing armies, each acting as the other's deterrent. That way there could never be a war.</span><br data-dcnode-id="4931"><br data-dcnode-id="4930"><span data-dcnode-id="4929" instrument_node="">PVT. BALDRICK: But this is a sort of a war, isn't it, sir?</span><br data-dcnode-id="4928"><br data-dcnode-id="4927"><span data-dcnode-id="4926" instrument_node="">CPT. BLACKADDER: Yes, that's right. You see, there was a tiny flaw in the plan.</span><br data-dcnode-id="4925"><br data-dcnode-id="4924"><span data-dcnode-id="4923" instrument_node="">LT. GEORGE: What was that, sir?</span><br data-dcnode-id="4922"><br data-dcnode-id="4921"><span data-dcnode-id="4920" instrument_node="">CPT. BLACKADDER: It was bollocks.</span><br data-dcnode-id="4919"><br data-dcnode-id="4918"><i data-dcnode-id="4916"><span data-dcnode-id="4917" instrument_node="">(pause)</span></i><br data-dcnode-id="4915"><br data-dcnode-id="4914"><span data-dcnode-id="4913" instrument_node="">PVT. BALDRICK: So the poor old ostrich died for nothing.</span><br data-dcnode-id="4912"><br data-dcnode-id="4911"><span data-dcnode-id="4910" instrument_node="">—Richard Curtis &amp; Ben Elton, </span><i data-dcnode-id="4908"><span data-dcnode-id="4909" instrument_node="">Blackadder Goes Forth</span></i></blockquote><br data-dcnode-id="4906"><br data-dcnode-id="4905"><span data-dcnode-id="4904" instrument_node="">So this is the explanation to beat, so far, in my admittedly very limited understanding of the causes of the First World War. </span><i data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node="">The Sleepwalkers</span></i><span data-dcnode-id="4901" instrument_node=""> is the big modern book to examine the question, and it was greeted with adulatory reviews by a historical community that saw in it a long-awaited replacement for Barbara Tuchman's </span><i data-dcnode-id="4899"><span data-dcnode-id="4900" instrument_node="">The Guns of August</span></i><span data-dcnode-id="4898" instrument_node=""> from way back in 1962.</span><br data-dcnode-id="4897"><br data-dcnode-id="4896"><span data-dcnode-id="4895" instrument_node="">It is often elegantly written, and very extensively researched – it's not unusual to check the footnotes and find nearly a dozen different sources adduced to back up the thread of a single paragraph. This is great. Unfortunately, these feats of compression often result in rather dense, stodgy prose that examines events from a viewpoint that I found far too abstract. Pages and pages of material describe the action on a disembodied state level, like this:</span><br data-dcnode-id="4894"><br data-dcnode-id="4893"><blockquote data-dcnode-id="4891"><span data-dcnode-id="4892" instrument_node="">The French government focused from 1911 onwards on strengthening Russian offensive capacity and, in 1912-13 on ensuring that Russian deployment plans were directed against Germany rather than Austria, the ostensible opponent in the Balkans. Increasingly, intimate military relations were reinforced by the application of powerful financial incentives. This policy was purchased at a certain strategic cost, because betting so heavily on enabling Russia to seize the initiative against Germany inevitably involved a certain reduction in French autonomy. That French policy-makers were willing to accept the resulting constraints is demonstrated by their willingness to extend the terms of the Franco-Russian Alliance specifically in order to cover the Balkan inception scenario, a concession that in effect placed the initiative in Russian hands. The French were willing to accept this risk, because their primary concern was not that Russia would act precipitately, but rather that she would not act at all, would grow so preponderant as to lose interest in the security value of the alliance, or would focus her energies on defeating Austria rather than the ‘principal adversary’, Germany.</span></blockquote><br data-dcnode-id="4890"><br data-dcnode-id="4889"><span data-dcnode-id="4888" instrument_node="">A bit of this is good; whole chapters' worth quickly gets dull. It was probably partly my fault – I happened to read this at a time when I could only really read last thing at night or first thing in the morning, and I found myself constantly nodding off and having to reread paragraphs several times.</span><br data-dcnode-id="4887"><br data-dcnode-id="4886"><span data-dcnode-id="4885" instrument_node="">Attempts to humanise things by sketching the major personalities involved have their own problems, mainly because the major personalities involved number in the hundreds. I normally hate reviews that go on about all the confusing foreign names, but honestly in this one I was still struggling with the cast list by the end of the book. Kokovtsov, now is he the Russian foreign minister? Or is that Sazonov? Or Sukhomlinov? A reference to Hartwig – he's the Austrian ambassador in Berlin, right? No, the German ambassador in Vienna. Oh wait, neither, he's the Russian ambassador in Belgrade…and so on.</span><br data-dcnode-id="4884"><br data-dcnode-id="4883"><span data-dcnode-id="4882" instrument_node="">This isn't just a stylistic issue, I think it points up a fundamental problem with the whole book – there's no narrative thread to help you join it all together. The reason it's so hard to follow some of these discussions is because their relevance to 1914-18 is often very unclear. Most of the book is given over to examining various early-twentieth century diplomatic crises like the Bosnian annexation crisis, the Agadir crisis, the two Balkan wars – but there is an irritating lack of clarification over how these issues bear on 1914. As a result the book had, to me, a rather staccato feel.</span><br data-dcnode-id="4881"><br data-dcnode-id="4880"><span data-dcnode-id="4879" instrument_node="">When, after 400 pages, you finally reach the assassinations in Sarajevo, the effect is like watching a boxed set of Open University lectures and finding </span><i data-dcnode-id="4877"><span data-dcnode-id="4878" instrument_node="">Iron Man 3</span></i><span data-dcnode-id="4876" instrument_node=""> on the last disc. These chapters are fantastic – but they're not really the point of the book.</span><br data-dcnode-id="4875"><br data-dcnode-id="4874"><span data-dcnode-id="4873" instrument_node="">For what it's worth, I took three major lessons from it all. The first is to do with the lumbering mechanism of the alliance system that was in force before the war, whereby countries were roped together like mountaineers for safety: and when one fell, everyone else got dragged down into the crevasse. Hence why England, France, Germany and Russia somehow ended up fighting to the death over a glorified border dispute in the Balkans. Because the alliances had ‘tied the defence policy of three of the world's greatest powers to the uncertain fortunes of Europe's most violent and unstable region’.</span><br data-dcnode-id="4872"><br data-dcnode-id="4871"><span data-dcnode-id="4870" instrument_node="">The second lesson is the sheer amateurishness of contemporary international relations – not just the incompetence of some of the people involved, but the total lack of any trans-national system or process for resolving inter-state disputes. These systemic problems were made even worse by the fact that there was really no clear governmental decision-making process in many of the states involved (as Clark puts it, ‘the volatility inherent in such a constellation was heightened by the fluidity of power within each executive’).</span><br data-dcnode-id="4869"><br data-dcnode-id="4868"><span data-dcnode-id="4867" instrument_node="">And the third lesson – a consequence of the other two – is the utter pointlessness of the conflict. No one had a good idea of what was being fought for, no one really had much to gain, and, in short, the poor old ostrich really did die for nothing.</span></span><span data-dcnode-id="4865" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="4784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/1232712-matt%3Fshelf%3Dworld-war-i"><span data-dcnode-id="4785" instrument_node="">world-war-i</span></a><span data-dcnode-id="4783" instrument_node="">

</span><span class="readable" data-dcnode-id="4699" id="reviewTextContainer607165872"><span data-dcnode-id="4777" instrument_node="">
</span><span data-dcnode-id="4772" id="freeTextContainer6338768351091236733"><span data-dcnode-id="4776" instrument_node="">For the longest time, I avoided reading about World War I because it seemed too complicated. It was fought for convoluted reasons among now-dead empires in a Europe – and a world – that is now vastly reshaped. I figured my time would be better spent reading another book about Gettysburg. </span><br data-dcnode-id="4775"><br data-dcnode-id="4774"><span data-dcnode-id="4773" instrument_node="">When I finally made a concerted effort to learn about the Great War (since the Centennial is fast approaching), I discovered its beginnings were actually deceptively simple. The heir to the Austro-Hungarian thro</span></span><span data-dcnode-id="4771" instrument_node="">
</span><span data-dcnode-id="4704" id="freeText6338768351091236733" style="display:none"><span data-dcnode-id="4770" instrument_node="">For the longest time, I avoided reading about World War I because it seemed too complicated. It was fought for convoluted reasons among now-dead empires in a Europe – and a world – that is now vastly reshaped. I figured my time would be better spent reading another book about Gettysburg. </span><br data-dcnode-id="4769"><br data-dcnode-id="4768"><span data-dcnode-id="4767" instrument_node="">When I finally made a concerted effort to learn about the Great War (since the Centennial is fast approaching), I discovered its beginnings were actually deceptively simple. The heir to the Austro-Hungarian throne was assassinated in Sarajevo. The Austro-Hungarians blame the Serbs and issue Serbia an ultimatum. The Serbs thumb their noses. Austria-Hungary declares war on Serbia. Due to various entangling alliances, a series of national duties and obligations are triggered. Russia joins the war on the side of Serbia. Germany comes in to help Austria-Hungary. France fulfills its obligations to Russia. Germany attacks France through Belgium. Great Britain decides to uphold Belgian neutrality. </span><br data-dcnode-id="4766"><br data-dcnode-id="4765"><span data-dcnode-id="4764" instrument_node="">Afterwards, there was trench warfare, poison gas, millions dead, a “peace” treaty that gutted Germany and reformed the Middle East, the rise of Hitler, and so on and so forth. </span><br data-dcnode-id="4763"><br data-dcnode-id="4762"><span data-dcnode-id="4761" instrument_node="">Christopher Clark’s </span><i data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">The Sleepwalkers: How Europe Went to War in 1914</span></i><span data-dcnode-id="4758" instrument_node=""> is not interested in the mechanistic (and simplified) description that I provided above. Instead, he acknowledges at the outset that my previous instincts were correct: that the causes of World War I are almost impossibly byzantine and complex. Early on, Clark lays out his purpose: </span><br data-dcnode-id="4757"><br data-dcnode-id="4756"><blockquote data-dcnode-id="4748"><span data-dcnode-id="4755" instrument_node="">This book strives to understand the July Crisis of 1914 as a modern event…It is concerned less with why the war happened than with how it came about. Questions of why and how are logically inseparable, but they lead us in different directions. The question of </span><i data-dcnode-id="4753"><span data-dcnode-id="4754" instrument_node="">how</span></i><span data-dcnode-id="4752" instrument_node=""> invites us to look closely at the sequences of interactions that produced certain outcomes. By contrast, the question of </span><i data-dcnode-id="4750"><span data-dcnode-id="4751" instrument_node="">why</span></i><span data-dcnode-id="4749" instrument_node=""> invites us to go in search of remote and categorical causes: imperialism, nationalism, armaments, alliances, high finance, ideas of national honor, the mechanics of mobilization. The why approach brings a certain analytical clarity, but it also has a distorting effect because it creates the illusion of a steadily building causal pressure; the factors pile up on top of each other pushing down on the events; political actors become mere executors of forces long established and beyond their control…The story this book tells is, by contrast, saturated with agency. The key decision-makers…walked towards danger in watchful, calculated steps. The outbreak of war was the culmination of chains of decisions made by political actors with conscious objectives, who were capable of a degree of self-reflection, acknowledged a range of options and formed the best judgments they could on the basis of the best information they had to hand.</span></blockquote><br data-dcnode-id="4747"><br data-dcnode-id="4746"><i data-dcnode-id="4744"><span data-dcnode-id="4745" instrument_node="">The Sleepwalkers</span></i><span data-dcnode-id="4743" instrument_node=""> is divided into three parts. The first part is focused firmly on the Balkans, and specifically Serbia. It struck me as I was reading this that I didn't know anything about Serbia, Serbian history, or the pan-Serbian movement in the years before World War I. I knew that Gavrilo Princip was a Bosnian Serb and a member of a nationalist movement known as the Black Hand. But that was about all. </span><i data-dcnode-id="4741"><span data-dcnode-id="4742" instrument_node="">The Sleepwalkers</span></i><span data-dcnode-id="4740" instrument_node=""> devotes over a hundred pages filling in the context behind the movement. </span><br data-dcnode-id="4739"><br data-dcnode-id="4738"><span data-dcnode-id="4737" instrument_node="">Frankly, it isn’t the easiest thing to follow. Especially if you are like me, and go cross-eyed trying to figure out the Balkans. The names are unfamiliar and hard to pronounce; the historical figures are mostly new; and the geography is hard to keep straight. It’s a testament to Clark that his writing kept me engaged and didn't allow me to become entirely lost. </span><br data-dcnode-id="4736"><br data-dcnode-id="4735"><span data-dcnode-id="4734" instrument_node="">Part two of the book covers more recognizable territory. It deals with a divided Europe sloughing off old antagonisms and forming new ones. Over time, France and Russia became buddies, Germany got wary, and Great Britain tried to stay aloof (while forming a wink-wink-nudge-nudge pact with their old enemies the French). </span><br data-dcnode-id="4733"><br data-dcnode-id="4732"><span data-dcnode-id="4731" instrument_node="">During this period, Europe also became highly acclimated to ramping up to war. In 1904-05, Kaiser Wilhelm touched off the First Moroccan Crisis with an ill-advised speech in Tangiers. In 1911, there was the Second Moroccan crisis, which saw Germany send a gunboat to Agadir; after Britain sided with France, the Germans had to back down. The years 1912 and 1913 saw the Balkan Wars, precipitated by the Young Turk Revolution and the resulting political instability of the Ottoman Empire. Serbia came out the big winner of the Balkan Wars, which made her even more of a threat to the Austro-Hungarian Empire. Following the Balkan Wars, Austria-Hungary’s regional security preparations were in tatters. </span><br data-dcnode-id="4730"><br data-dcnode-id="4729"><span data-dcnode-id="4728" instrument_node="">The last part of the book deals with the July Crisis itself. Clark does a good job handling well-furrowed ground. His narrative of Franz Ferdinand’s assassination, for instance, is fairly gripping: </span><br data-dcnode-id="4727"><br data-dcnode-id="4726"><blockquote data-dcnode-id="4724"><span data-dcnode-id="4725" instrument_node="">At first it appeared the shooter had missed his mark, because Franz Ferdinand and his wife remained motionless and upright in their seats. In reality, they were both already dying. The first bullet had passed through the door of the car into the Duchess’s abdomen, severing the stomach artery; the second had hit the archduke in the neck, tearing the jugular vein. As the car roared away across the river towards the Konak, Sophie teetered sideways until her face was between her husband’s knees. Potiorek initially thought she had fainted with shock; only when he saw blood issuing from the archduke’s mouth did he realize something more serious was afoot. Still straddling the running-board and leaning into the passenger compartment, Count Harrach managed to hold the archduke upright by clutching his collar. He heard Franz Ferdinand speaking in a soft voice words that would become famous throughout the monarch: ‘Sophie, Sophie, don’t die, stay alive for our children!’ The plumed helmet, with the green ostrich feathers, slipped from his head. When Harrach asked him if he was in pain, the archduke repeated several times in a whisper ‘It’s nothing!’ and then lost consciousness.</span></blockquote><br data-dcnode-id="4723"><br data-dcnode-id="4722"><span data-dcnode-id="4721" instrument_node="">For obvious reasons, the final third of the book is the most swiftly-paced and engrossing. With good storytelling ability, combined with keen analysis, Clark takes you through the arrest and trial of Gavrilo Princip and his accomplices; the Austro-Hungarian ultimatum; and the Serbian response. As Clark promised at the beginning, he shies away from a mechanical view of the war’s outbreak. There is not a lot of talk of mobilization timetables, which usually get a lot of play in books about the July Crisis. Certainly, the time it took for a country to prepare its army was an important factor. But Clark is more interested in why the decision-makers felt the need to mobilize at all. The various alliances and treaties, after all, were not death pacts. Even as events began to unfold, somebody could’ve stepped up and said, “Hey, should we maybe not go to war over this?” </span><br data-dcnode-id="4720"><br data-dcnode-id="4719"><span data-dcnode-id="4718" instrument_node="">One thing I’ve definitely learned in spending the last year and a half reading about World War I: No matter how often you hear the story, it never fails to amaze. How an assassination that engendered international sympathy for Austria-Hungary could end – within a month’s time – with most of the world (save Germany) at war with Austria-Hungary. How a murder of an unloved heir in a Balkan backwater could set the world on fire. </span><br data-dcnode-id="4717"><br data-dcnode-id="4716"><span data-dcnode-id="4715" instrument_node="">It is impossible not to try to pin the blame on this bloody mess on a single country. Post-World War II, it’s almost reflexive to fault Germany, who launched an offensive through Belgium. Indeed, it often seems like we view World War I-era Germany with the Nazi regime of the 1930s and 40s. Austria-Hungary is also one of the usual suspects, since she handed Serbia an ultimatum that Serbia had to reject. </span><br data-dcnode-id="4714"><br data-dcnode-id="4713"><span data-dcnode-id="4712" instrument_node="">However, as Clark notes, there was plenty of blame to go around. For instance, France and Russia, two of the world’s great powers, oddly decided to bind their fates to that of a violent and turbulent Serbia. In hindsight, that’s maybe not a great idea. </span><br data-dcnode-id="4711"><br data-dcnode-id="4710"><span data-dcnode-id="4709" instrument_node="">In the end, it’s hard not to reduce the complexities to a rather simple notion. That after years of jockeying for position and forming alliances, the leaders and decision-makers of the various countries </span><i data-dcnode-id="4707"><span data-dcnode-id="4708" instrument_node="">wanted</span></i><span data-dcnode-id="4706" instrument_node=""> to go to war, to settle things for once and all. </span><br data-dcnode-id="4705"></span><span data-dcnode-id="4703" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="4626" title="it was amazing"><span class="staticStar p10" data-dcnode-id="4631" size="15x15"><span data-dcnode-id="4632" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="4630" size="15x15"></span><span class="staticStar p10" data-dcnode-id="4629" size="15x15"></span><span class="staticStar p10" data-dcnode-id="4628" size="15x15"></span><span class="staticStar p10" data-dcnode-id="4627" size="15x15"></span></span><span data-dcnode-id="4625" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="4616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/22308947-dimitri%3Fshelf%3Dmilitary-history"><span data-dcnode-id="4617" instrument_node="">military-history</span></a><span data-dcnode-id="4615" instrument_node="">, 
              </span><a class="actionLinkLite" data-dcnode-id="4613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/22308947-dimitri%3Fshelf%3Dworld-war-one"><span data-dcnode-id="4614" instrument_node="">world-war-one</span></a><span data-dcnode-id="4612" instrument_node="">

</span><span class="readable" data-dcnode-id="4535" id="reviewTextContainer671591313"><span data-dcnode-id="4606" instrument_node="">
</span><span data-dcnode-id="4604" id="freeTextContainer6980958319736800402"><span data-dcnode-id="4605" instrument_node="">Simply one of the best books on the origins of the Great War. Take it from someone who wrote his master thesis on the pre-war military strategies of Belgium and along the way devoted too much time to the European dimension. Christopher Clark’s summary of the transformation of Europe between 1879 and 1907 from non-committed alliances into two military ‘blocs’ in two pages plus maps is a thing of beauty. The author clearly belongs to the revisionist camp. His identification of the hawks within the</span></span><span data-dcnode-id="4603" instrument_node="">
</span><span data-dcnode-id="4540" id="freeText6980958319736800402" style="display:none"><span data-dcnode-id="4602" instrument_node="">Simply one of the best books on the origins of the Great War. Take it from someone who wrote his master thesis on the pre-war military strategies of Belgium and along the way devoted too much time to the European dimension. Christopher Clark’s summary of the transformation of Europe between 1879 and 1907 from non-committed alliances into two military ‘blocs’ in two pages plus maps is a thing of beauty. The author clearly belongs to the revisionist camp. His identification of the hawks within the governments of the Great Powers correponds largely with the portraits in J.H.J. Andriessen’s </span><i data-dcnode-id="4600"><span data-dcnode-id="4601" instrument_node="">“The Other Truth”</span></i><span data-dcnode-id="4599" instrument_node="">: Sir Edward Grey, Conrad von Hötzendorf, Raymond Poincaré…etc.</span><br data-dcnode-id="4598"><br data-dcnode-id="4597"><span data-dcnode-id="4596" instrument_node="">His treatment of the German Empire is the best example. The dogmatic elevation of the Schlieffen plan goes hand in hand with a curiously passive attitude that is a far cry from the Teutonic bombast in the magistral writing of Barbara Tuchman. </span><i data-dcnode-id="4594"><span data-dcnode-id="4595" instrument_node="">Enkreisung</span></i><span data-dcnode-id="4593" instrument_node=""> is not a mere diplomatic cover for ambitions towards world-domination in the controversial vein of Fritz Fischer. Rather, Germany sincerely experienced events as dictated by Russia and its allies. The balance of power slowly but irrevocably swung in their favour, fueled by the French construction of the Entente and the post-1905 Russian rearmament program. “Better war sooner than later” was an attitude found among all Powers, but most prevalent in Berlin. This is well shown in the discussion of the infamous military counsil of december 1912.</span><br data-dcnode-id="4592"><br data-dcnode-id="4591"><span data-dcnode-id="4590" instrument_node="">The familiar story of the clash of interests on the Balkan is set within the long-term Russian desire for domination of the Straits at the expense of the Ottoman Empire, dating back to the aftermath of the Crimean war. Populist Pan-slavism disguised a pragmatical support for whichever Balkan state gained prominence: Bulgaria at first, Serbia later on. It is interesting to note that a minority propagated a Far East policy in order to reverse the losses of the Russo-Japanese war as soon as the rearmaments would be completed, but this view never gained prominence.</span><br data-dcnode-id="4589"><br data-dcnode-id="4588"><span data-dcnode-id="4587" instrument_node="">On the Habsburg side, the political friction in the wake of the Compromise of 1867 adds complexity. Hungary, in spite of agressive maygarisation, always read developments on the peninsula in the light of a possible revolt in Transsylvania. Vienna itself most feared the ascent of a South Slav union, possibly resulting in numerous revolts by minorities within Austria-Hungary. In retrospect, this fear was overrated and the sympathy of future emperor Franz Ferdinand for a South Slav union as a third segment within the multiethnic empire politically quite astute. </span><br data-dcnode-id="4586"><br data-dcnode-id="4585"><span data-dcnode-id="4584" instrument_node="">Many familiar episodes on the road to Ypres situated on the Balkans get the royal treatment: the Balkan Wars, the Baghdad Railway and the German mission to Istanbul, to name a few, are elevated from anecdote to ‘sideshows’ which nonetheless serve as important precedents to 1914. In goes without saying that the story of Sarajevo is explored in depth, with some poignant paralels to the post-9/11 world thrown in for free.</span><br data-dcnode-id="4583"><br data-dcnode-id="4582"><span data-dcnode-id="4581" instrument_node="">France appears in a more traditional light, focused on the next clash with the German army, if less on the repossession of Alsace-Lorraine. Declasé and Poincaré remain the main characters, with the ambassador twins Carbon in support. These men provided a much-needed element of continuity for the foreign policy of a republic plagued by instable cabinets. It is striking how relentlessly France pressured her Entente partners into military commitment. The best example here is her distress at the Russian plan for a Napoleonic defense in depth, with a concentration in the interior while temporarily minimizing the mobilisation at the western frontiers. Sometimes she overestimated her success, traditionally exemplified by the last-minute reluctance of Great Britain to openly acknowledge joint operations against Germany.</span><br data-dcnode-id="4580"><br data-dcnode-id="4579"><span data-dcnode-id="4578" instrument_node="">Great Britain, lastly, receives compartively little attention. Three things stand out. First, the civilian sphere, dominated by party politics, exerciced greater control over the military was greater than in any other European power, which explains to a great extent the lack of commitment in spite of assurances by proponents such as Henry Wilson. Edward Grey and Winston Churchill had to overcome the majority of the cabinet at the last moment. Second, German domination of the Atlantic coast was never a primary concern. Rather, the Great Game and the defense of the Raj loomed largest in imperial policy. The origins of the Entente with France must be understood in this context, regardless of their naval cooperation between the Channel and the Mediterranean. The British Empire was willing to appease its Russian rival at the expense of alienating Germany. </span><br data-dcnode-id="4577"><br data-dcnode-id="4576"><span data-dcnode-id="4575" instrument_node="">This also brings me to the third point, which shocks my Belgian sensibilities. It is commonly presumed that the </span><i data-dcnode-id="4573"><span data-dcnode-id="4574" instrument_node="">Brave Little Belgium</span></i><span data-dcnode-id="4572" instrument_node=""> attitude during WWI was preceeded by a genuine commitment by Great Britain to the preservation of Belgian neutrality. Less commonly known but still within the same attitude is the British preoccupation with the Channel ports and the estuary of the Scheldt, to convenience the assistance of the Royal Navy and an Expeditionary Force to Antwerp, last refuge of the Belgian Army. In reality, Germany was quite right to dismiss the 1831 treaty as a ‘scrap of paper’: Britain was happy to allow a limited intrusion of the German Army through Belgium, preferably south of the Meuse. Ironically, many Belgian politicians likewise considered minimal armed resistance to said intrusion as a fullfillment of their neutrality obligations.</span><br data-dcnode-id="4571"><br data-dcnode-id="4570"><span data-dcnode-id="4569" instrument_node="">The Balkan Wars, including the ‘Winter Crisis’ of 1912-13, provided Austria with trustworthy precedents for july 1914. Serbia seemed to be in the habit of backing down in the face of a military threat and Russia was reluctant to back her up. The other Great Powers univoquely helped difuse tensions rather than activating their military alliances. In addition, the military shows of force strained the finances of an imperial economy in decline. All together, an all-out war with Serbia appeared increasingly the sole solution to the next Balkan crisis. </span><br data-dcnode-id="4568"><br data-dcnode-id="4567"><span data-dcnode-id="4566" instrument_node="">The July crisis highlights the common deficiencies of the Great Powers. It is here that the main theme of </span><i data-dcnode-id="4564"><span data-dcnode-id="4565" instrument_node="">Sleepwalkers </span></i><span data-dcnode-id="4563" instrument_node=""> reasserts itself. Minor remarks by biased diplomats or officials were overinterpreted as expressions of official foreign policy, because each country viewed itself in some way as dominated, even overpowered, by its neighbours. This attitude introduced long-term errors in what appeared to be policies based on reason and precedents. Furthermore, most of the political elite was on holiday and few judged the present Balkan crisis to be in need of closer scrutiny than its predecessors. </span><br data-dcnode-id="4562"><br data-dcnode-id="4561"><span data-dcnode-id="4560" instrument_node="">In a Europe dominated by monarchies, the (in)actions of the sovereigns merrit examination. De facto the book focuses on Wilhelm II and Nicolas II. The Kaiser figures with far less prerogative as traditionally assumed; the Tsar as his equal in indecisiveness. This is pointingly illustrated by their informal mid-river military talk, the implications of which horrified their cabinets back home. George V and emperor Franz Joseph remain virtually invisible. </span><br data-dcnode-id="4559"><br data-dcnode-id="4558"><span data-dcnode-id="4557" instrument_node="">Unfortunately enough, the story remains equally silent on Italy and the neutral countries, save a brief forray during the July crisis about Swedish neutrality. Irregardless of their limited weight within the international alliance system, the secondary points of view could’ve attributed to the perceptions of Great Power policy. Clark made it as far as occasionally citing Dutch &amp; Belgian ambassadors/consuls; the archives are touched upon but not to full use. Paul Kennedy’s </span><a data-dcnode-id="4555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/811863.The_Rise_of_the_Anglo_German_Antagonism__1860_1914" rel="nofollow noopener" title="The Rise of the Anglo-German Antagonism, 1860-1914 by Paul Kennedy"><span data-dcnode-id="4556" instrument_node="">The Rise of the Anglo-German Antagonism, 1860-1914</span></a><span data-dcnode-id="4554" instrument_node=""> appears underused in British naval matters such as the 1902 treaty with Japan and the ill-fated Haldane mission. As it is, the array of sources is impressive, with the inclusion of local studies from Serbia, Bulgaria etc. Classics like Albertini’s 3-volume diplomatic analysis (</span><a data-dcnode-id="4552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/1117163.The_Origins_of_the_War_of_1914" rel="nofollow noopener" title="The Origins of the War of 1914 by Luigi Albertini"><span data-dcnode-id="4553" instrument_node="">The Origins of the War of 1914</span></a><span data-dcnode-id="4551" instrument_node="">, 1941) are used on their own strengths, such as the use of living witnesses to the events of the Belle Epoque.</span><br data-dcnode-id="4550"><br data-dcnode-id="4549"><span data-dcnode-id="4548" instrument_node="">Read James Joll (</span><a data-dcnode-id="4546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/33540.The_Origins_of_the_First_World_War" rel="nofollow noopener" title="The Origins of the First World War by James Joll"><span data-dcnode-id="4547" instrument_node="">The Origins of the First World War</span></a><span data-dcnode-id="4545" instrument_node="">, 3 editions) for the facts. Read Barbara Tuchman (</span><a data-dcnode-id="4543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/11366.The_Guns_of_August" rel="nofollow noopener" title="The Guns of August by Barbara W. Tuchman"><span data-dcnode-id="4544" instrument_node="">The Guns of August</span></a><span data-dcnode-id="4542" instrument_node="">)for the atmosphere. Read Christopher Clark for the understanding.</span><br data-dcnode-id="4541"></span><span data-dcnode-id="4539" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="4440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/3593962-kalliope%3Fshelf%3D2014"><span data-dcnode-id="4441" instrument_node="">2014</span></a><span data-dcnode-id="4439" instrument_node="">

</span><span data-dcnode-id="4430" id="freeTextContainer17445178869318664142"><br data-dcnode-id="4432"><span data-dcnode-id="4431" instrument_node="">In commemoration of the Centennial of WW1, we have also set up a reading group here in GR. Sleepwalkers is one of the suggested books. It deals with the period before the war and is consequently centered on the causes that led to, or I should say brought about, the disaster. But because it is my first book on the political aspects, I felt overwhelmed with the amount of information and baffled by the complexity of the considerations. My judgment has to be taken therefore with more than a pinch of</span></span><span data-dcnode-id="4429" instrument_node="">
</span><span data-dcnode-id="4381" id="freeText17445178869318664142" style="display:none"><br data-dcnode-id="4428"><span data-dcnode-id="4427" instrument_node="">In commemoration of the Centennial of WW1, we have also set up a reading group here in GR. Sleepwalkers is one of the suggested books. It deals with the period before the war and is consequently centered on the causes that led to, or I should say brought about, the disaster. But because it is my first book on the political aspects, I felt overwhelmed with the amount of information and baffled by the complexity of the considerations. My judgment has to be taken therefore with more than a pinch of salt. </span><br data-dcnode-id="4426"><br data-dcnode-id="4425"><span data-dcnode-id="4424" instrument_node="">But I learnt a fair amount and I managed to identify some key issues that I will have to explore further. I may also have to come back to Sleepwalkers to understand Clark’s opinions better as I become more versed in the various controversies.</span><br data-dcnode-id="4423"><br data-dcnode-id="4422"><span data-dcnode-id="4421" instrument_node="">There is a huge quantity of published material on the subject. On the book category there are already thousands and thousands, and many more will be published this year. But even the printed matter has its own history of how the event was interpreted. History is made and remade. Understanding of they whys, the hows, and the whos, is shaped by its own circumstances and settings and </span><i data-dcnode-id="4419"><span data-dcnode-id="4420" instrument_node="">zeitgeist</span></i><span data-dcnode-id="4418" instrument_node="">. And Clark is very aware of the tradition of WW1 writing that precedes his own. He is consciously positing his argument therefore in reference to the past discourses. </span><br data-dcnode-id="4417"><br data-dcnode-id="4416"><span data-dcnode-id="4415" instrument_node="">Stemming from </span><i data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">Article 231</span></i><span data-dcnode-id="4412" instrument_node=""> of the </span><b data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">Versailles Treaty</span></b><span data-dcnode-id="4409" instrument_node="">, early scholarship concentrated on responsibilities and incriminations. It was conceived that there had been a specific determination and an ability to carry out that determination. Related to this it was also believed that the fateful succession of events had been inescapable. Behind these views there is a particular understanding of human volition, human infallibility, and the relative power of the individual. Together with these assumptions Clark reminds us that events seem to bring their own sense of inevitability and that their narrative fashions our way of comprehending. We live with the conviction that happenings prove themselves. They are carriers of their own internal causality.</span><br data-dcnode-id="4408"><br data-dcnode-id="4407"><span data-dcnode-id="4406" instrument_node="">Clark’s choice of a title already reveals what his own alternative narrative is. He maps complex processes in decision-making inside a fragmented network of multiple decision points or agents. In his book he reviews the different power enacting mechanisms in the various countries depending on the degree of autocracy they endured; the different functioning of the various offices of Foreign Affairs; the varying domestic issues and difficulties; the reshuffling and interrelation of social classes; the relative growth in the role of the press and the power of public opinion; the divergent military budgets; the interplay between the political and the military arms of any country; the relative agility of the governments depending on their political structures, etc... Clark presents a splintered setting in which any isolated human act would have to deal with an unpredictable path for reaching its results.</span><br data-dcnode-id="4405"><br data-dcnode-id="4404"><span data-dcnode-id="4403" instrument_node="">In earlier studies there had also been a trend in viewing the Sarajevo assassination not as the cause for the outbreak of the war but as the excuse for starting something that was to happen anyway. Clark reverses that and puts Serbia back on the center stage from the very dramatic start of this book. He shows that before and behind the murder a very militant and very destabilizing activity had already been going in this newly reborn Kingdom. But Serbia had many problems. Foremost were the money matters --economic and financial--, and these were coupled with a rabid and aggressive nationalism. They engaged in direct confrontation with the bigger powers (Austro-Hungary, Russia and the Ottomans) and sold their soul to the French financiers. And they did all this with the purpose of establishing, aggressively, a pan-Serbian state in the region of the Balkans. Clark then sees WW1 really as the third Balkan war.</span><br data-dcnode-id="4402"><br data-dcnode-id="4401"><span data-dcnode-id="4400" instrument_node="">He then proceeds with an account of how the balance of power that existed towards the turn of the century was redrawn with a complex dance of shifting allegiances until the outbreak of the war (and there Clark lost me with the very many interlocking steps). Reading this section felt like watching a magician play tricks with a hat. In goes a set of allegiances with Britain as the perennial bachelor, and out come a peculiar couple of creatures that fly out differently. Et voilà!, Europe is now polarized. </span><br data-dcnode-id="4399"><br data-dcnode-id="4398"><span data-dcnode-id="4397" instrument_node="">In this wizardry he discusses the </span><i data-dcnode-id="4395"><span data-dcnode-id="4396" instrument_node="">Kruger</span></i><span data-dcnode-id="4394" instrument_node=""> telegram; the naval race between Germany and Britain; the complementing combination of capital and science of France with the highly populated Russia; the partition of Africa in the vertical and horizontal axis between Britain and France; the Moroccan crises; the role of perceived masculinity, etc.</span><br data-dcnode-id="4393"><br data-dcnode-id="4392"><span data-dcnode-id="4391" instrument_node="">What I found most interesting is that in tracking these developments, Clark pays a good deal attention to the weakening of the Ottoman Empire and its implications. He identifies Italy’s invasion of Libya in 1911 as the starting signal for a grabbing race. Of course there were other such similar races in the Far and Middle East, but Clark concentrates on the European Continent and the Mediterranean coast. Incidentally, he also sees this Libyan war, the first to see aerial bombardment, as the seed for modern Arab nationalism with which we live today.</span><br data-dcnode-id="4390"><br data-dcnode-id="4389"><span data-dcnode-id="4388" instrument_node="">After having identified the demise of the Ottomans together with the pan-Serbian goals as the detonators and the subsequent recalibration of allegiances, Clark proceeds to review the very rapid succession of events in the few months before the outbreak. That means going back to the Balkans and witnessing, slow motion, the assassination on that fatal 28th of June in Sarajevo. For the Serbian group were not jut shooting the unfortunate individuals, but hitting directly and with a fatal blow the very heart of the then European stabilizing center, the Austro-Hungarian Empire.</span><br data-dcnode-id="4387"><br data-dcnode-id="4386"><span data-dcnode-id="4385" instrument_node="">The book stops then as the curtain falls after he has projected how a whole band of decision makers proceeded blindly over a ground full of obstructions, hurdles, obstacles, and false indications, and all of them walking in an atmosphere of profound mistrust, heading towards a path in which all the possible ways out were being funneled into that single catastrophe.</span><br data-dcnode-id="4384"><br data-dcnode-id="4383"><br data-dcnode-id="4382"></span><span data-dcnode-id="4380" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="4299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/10770371-dan%3Fshelf%3Dwwi"><span data-dcnode-id="4300" instrument_node="">wwi</span></a><span data-dcnode-id="4298" instrument_node="">

</span><span class="readable" data-dcnode-id="4218" id="reviewTextContainer2648345595"><span data-dcnode-id="4292" instrument_node="">
</span><span data-dcnode-id="4286" id="freeTextContainer13543638496703129040"><b data-dcnode-id="4290"><span data-dcnode-id="4291" instrument_node=""> For Austria-Hungary, the Balkan Wars changed everything. Above all, they revealed how isolated Vienna was and how little understanding there was at the foreign chancelleries for its view of Balkan events, St. Petersburg’s hostility to the empire and its utter disregard for Vienna’s interest in the region could be taken for granted. More worrying was the indifference of the other powers.</span></b><br data-dcnode-id="4289"><br data-dcnode-id="4288"><span data-dcnode-id="4287" instrument_node="">The Sleepwalkers: How Europe Went To War in 1914, by Christopher Clark. as its title suggests covers the run-u</span></span><span data-dcnode-id="4285" instrument_node="">
</span><span data-dcnode-id="4223" id="freeText13543638496703129040" style="display:none"><b data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node=""> For Austria-Hungary, the Balkan Wars changed everything. Above all, they revealed how isolated Vienna was and how little understanding there was at the foreign chancelleries for its view of Balkan events, St. Petersburg’s hostility to the empire and its utter disregard for Vienna’s interest in the region could be taken for granted. More worrying was the indifference of the other powers.</span></b><br data-dcnode-id="4282"><br data-dcnode-id="4281"><span data-dcnode-id="4280" instrument_node="">The Sleepwalkers: How Europe Went To War in 1914, by Christopher Clark. as its title suggests covers the run-up to World War 1. This book was published in 2012 so it is a recent addition to World War 1 scholarship. At 562 pages, plus some 100 pages of bibliography and references, it is laid out chronologically, more or less, in twelve self contained chapters.</span><br data-dcnode-id="4279"><br data-dcnode-id="4278"><span data-dcnode-id="4277" instrument_node="">The book does have an academic feel to it at times. It is lengthy and covers a wide berth of nations. As a result, my interest level and engagement while reading was varied. Some chapters were very interesting and what I consider five star material. Others felt academic or were focused too heavily on foreign policy figures such as secretaries of state and chancellors for my liking. There was less material presented on those petulant monarchs, who pushed forward with war, than I was hoping for. After all isn’t Franz Joseph more interesting than Count Leopold Berchtold? </span><br data-dcnode-id="4276"><br data-dcnode-id="4275"><span data-dcnode-id="4274" instrument_node="">I break down the book into the chapters and give a rating where appropriate. The book is lengthy and fragmented, so I think the chapter by chapter approach is warranted. </span><br data-dcnode-id="4273"><br data-dcnode-id="4272"><span data-dcnode-id="4271" instrument_node="">1. Serbian Ghosts - This chapter starts with the royal murder in Belgrade in 1903 some eleven years before the events that caused Austria to declare war on Serbia. The chapter starts out strong with the drama surrounding the gruesome demise of King Alexander and Queen Draga. But after twenty pages, the drama of the regicide ends and the next forty pages are Serbia’s next ten years. Unknown and sometimes obscure characters come at the reader and leave the scene with dizzying frequency. Four stars. Recommended.</span><br data-dcnode-id="4270"><br data-dcnode-id="4269"><span data-dcnode-id="4268" instrument_node="">2. The Empire without Qualities - This chapter disappointed me. Middling marks but only on the strength that there was a fair amount of information I learned about pre-war Hungary which is the overlooked half of Austria-Hungary. However very little on Austria and Franz Joseph. Some good history on Franz Ferdinand’s Czech wife Sophie and that their scandalous marriage initially displeased Franz Joseph and his chamberlain Prince Montenuovo. Sophie was never given the proper title as Archduchess and etiquette that she otherwise deserved. Three stars.</span><br data-dcnode-id="4267"><br data-dcnode-id="4266"><span data-dcnode-id="4265" instrument_node="">3. The Polarization of Europe, 1887-1907. This chapter was also so-so. We learn about the various treaties between Germany and Russia, Germany and Austria and Italy. Then later, because of the Balkan mess in the early oughts, the Russians turn against the Germans and enter into a treaty with the British and French. I really wanted to see more coverage of the royals in this chapter. Three stars. </span><br data-dcnode-id="4264"><span data-dcnode-id="4263" instrument_node=""> </span><br data-dcnode-id="4262"><span data-dcnode-id="4261" instrument_node="">4. The Many Voices of European Foreign Policy. This lengthy seventy five page chapter covered the politicians of the major European nations. I did not enjoy this chapter. One could easily argue it was a necessary chapter. Three stars, grudgingly.</span><br data-dcnode-id="4260"><br data-dcnode-id="4259"><span data-dcnode-id="4258" instrument_node="">5. Balkan Entanglements. This is one of the best chapters, anywhere, that I’ve read on World War One. There is a lengthy discussion of the outsized role that Italy played in escalating the tension in the Balkans starting with their own global conquests in North Africa and the Ottoman empire. As stated, an excellent chapter along with excellent maps. The author details the many nations of the Balkans and emphasizes how the Balkan tension was no more about Muslims vs. Christians than the horrors and inequity of imperialism. The coverage of Russia’s involvement in the Balkans, although thin, was also enlightening. The author objectively presents, as elsewhere in the book, the entanglement as a shared sin that had lasted many centuries. Five stars. Excellent stand alone chapter. </span><br data-dcnode-id="4257"><span data-dcnode-id="4256" instrument_node=""> </span><br data-dcnode-id="4255"><span data-dcnode-id="4254" instrument_node="">6. Last Chance: Detente and Danger, 1912-1914. Some of the better highlights including how Russia and Nicolas, whether intentional or not, sent combative like signals over the Balkans causing consternation to the Kaiser and German officials who felt hemmed in between France and Russia. As a result Germany felt that to strike early should a war break out would be key to a victory. The German’s also believed that Britain would not stand with their treaty partner Belgium, and of course this naive assumption was later to prove to be Germany’s fatal mistake. Too many government officials to keep straight and less coverage of the monarchs than I would have liked in this chapter but otherwise an informative one. Four stars.</span><br data-dcnode-id="4253"><br data-dcnode-id="4252"><span data-dcnode-id="4251" instrument_node="">7. Murder in Sarajevo. Covers the drama of the assassination, the Serbian and Austro-Hungarian responses. Serbian officials, who clearly did not want war, were too cavalier about how they responded to the assassination. Although Sarajevo was not part of Serbia, the assassins were trained in Serbia some claim by members of the Black Hand. The author writes “Despite official assurances, the Serbian authorities never conducted an investigation proportionate to the gravity of the crime and the crisis to which it had given rise.” It is possible that war would have happened anyway but diplomatically Serbia could have done more. Five stars. Excellent chapter.</span><br data-dcnode-id="4250"><br data-dcnode-id="4249"><span data-dcnode-id="4248" instrument_node="">8. The Widening Circle. This is essentially the Sleepwalkers chapter. In this remarkable chapter we learn how blasé many nations were about the events in Sarajevo, especially on the part of countries who were sympathetic to the Serbs. Diplomatic spies for Germany and Austria were reporting that the assassination was being cheered in not just the Balkans but in Russia, where pan-Slav sympathies were genuine, and elsewhere. In some cases the celebrations were exaggerations but clearly diplomacy was failing. Five stars.</span><br data-dcnode-id="4247"><br data-dcnode-id="4246"><span data-dcnode-id="4245" instrument_node="">9. The French in St. Petersburg. I did not really take away much information from this chapter. Yes the French and Russians were Allies and both nations felt threatened by Germany. Largely a setup for the next chapter. Three Stars.</span><br data-dcnode-id="4244"><br data-dcnode-id="4243"><span data-dcnode-id="4242" instrument_node="">10. The Ultimatum. Austria gives a ten point ultimatum to Serbia in late July 1914 with a response required in 48 hours. The ultimatum essentially covers the need for Serbia to take responsibility for the assassinations, cease anti-Austrian sentiment, collaborate with Austria to weed out subversive elements in Serbia’s government and take part in a joint investigation of the assassination at all levels. Predictably since Serbia was a sovereign state and they mistakenly felt that Germany would hold back Austria from starting war, they rejected the ultimatum by diplomatically stating that as written Serbia could not accept the conditions. A few days later Austria mobilized her troops and declared war on Serbia, at the time it was viewed as a local war. Five stars.</span><br data-dcnode-id="4241"><span data-dcnode-id="4240" instrument_node=""> </span><br data-dcnode-id="4239"><span data-dcnode-id="4238" instrument_node="">11. Warning Shots. This chapter covers the week between the Austrian declaration of war and the time it took the other large nations to understand what it all would mean. There was discussion of Russia’s mobilization and Germany's formation of plans for quick strikes against their targets. Germany did not want to not let too much time pass between the assassination and the start of war with the allies. Three to four stars.</span><br data-dcnode-id="4237"><span data-dcnode-id="4236" instrument_node=""> </span><br data-dcnode-id="4235"><span data-dcnode-id="4234" instrument_node="">12. The Last Days. Covers the final few days before the rest of the big five enter into war. Now Russia, Britain, France, Germany, and Italy’s cabinet leaders and monarchs are whipped into a frenzy of activity as they realize the seriousness of the situation. Military mobilization is occurring while peace negotiations are happening by telegraph. Neutral Belgium, who has an alliance with Britain, is discussed to a large extent. Germany’s plan is to invade France by first going through Belgium. Germany, mistakenly and fatally, believed that Britain would not come to Belgium’s aid. A German legate is to have said of the Belgians “Oh the poor fools! Why don’t they get out of the way they will be ground into the dirt. Oh, the poor fools!” Five Stars. </span><br data-dcnode-id="4233"><span data-dcnode-id="4232" instrument_node=""> </span><br data-dcnode-id="4231"><span data-dcnode-id="4230" instrument_node="">13. Conclusion. This chapter summarizes the sleepwalking nature of Europe’s initiation of WW1. The author leaves a more objective persona that we saw in rest of the book and instead offers subjective parallels to later wars in the 20th century and recently in Syria. In effect sleepwalking your way to war is still a problem It dovetails nicely with the importance of diplomacy and for nations to listen to one another, most of those things we were taught in kindergarten. Excellent chapter. Five stars. </span><br data-dcnode-id="4229"><br data-dcnode-id="4228"><span data-dcnode-id="4227" instrument_node="">In summary, the author possesses a great deal of knowledge about the causes of World War 1, has conducted a vast amount of research and synthesized the material all in a manner that has clearly added to the canon of important books of this event. In the end though, at least for me, the differentiation between four star and five star history books boils down to enjoyment. Sometimes the enjoyment can be carried almost exclusively by the novelty of the information and synthesis. However the power of the writing itself and composition does matter. I simply find WW1 historians like Margaret MacMillan and Barbara Tuchman very difficult to match in this regard.</span><br data-dcnode-id="4226"><br data-dcnode-id="4225"><span data-dcnode-id="4224" instrument_node="">Overall. Four stars.</span></span><span data-dcnode-id="4222" instrument_node="">

</span><span data-dcnode-id="4120" id="freeTextContainer10464683177584071927"><span data-dcnode-id="4127" instrument_node="">A forensic study of the lead up to the First World War. Meticulously researched, it takes you into a world where, almost by accident, Europe organised itself into two armed camps, with overlapping obligations and fears.</span><br data-dcnode-id="4126"><br data-dcnode-id="4125"><span data-dcnode-id="4124" instrument_node="">What struck me was that each country felt itself slighted, took unto itself the right to wage an industrialised war, but at the same time abdicated responsibility for the war starting - look what you made me do. </span><br data-dcnode-id="4123"><br data-dcnode-id="4122"><span data-dcnode-id="4121" instrument_node="">Jingoistic media, a newly assertive populace and weak leaders do not </span></span><span data-dcnode-id="4119" instrument_node="">
</span><span data-dcnode-id="4105" id="freeText10464683177584071927" style="display:none"><span data-dcnode-id="4118" instrument_node="">A forensic study of the lead up to the First World War. Meticulously researched, it takes you into a world where, almost by accident, Europe organised itself into two armed camps, with overlapping obligations and fears.</span><br data-dcnode-id="4117"><br data-dcnode-id="4116"><span data-dcnode-id="4115" instrument_node="">What struck me was that each country felt itself slighted, took unto itself the right to wage an industrialised war, but at the same time abdicated responsibility for the war starting - look what you made me do. </span><br data-dcnode-id="4114"><br data-dcnode-id="4113"><span data-dcnode-id="4112" instrument_node="">Jingoistic media, a newly assertive populace and weak leaders do not help - once started on the path to war it became almost impossible to walk back from the precipice. Escalation follows escalation as a fateful "it's going to happen soon, it might as well be now" mindset kicks in.</span><br data-dcnode-id="4111"><br data-dcnode-id="4110"><span data-dcnode-id="4109" instrument_node="">In a sleepy town in the Balkans an assassin awaits the Hapsburg heir, his few shots would become the spark for a conflagration that somehow brings the world to war. Millions die, many millions more are maimed and displaced, three empires fall and a new arc of instability is created in Eastern Europe.</span><br data-dcnode-id="4108"><br data-dcnode-id="4107"><span data-dcnode-id="4106" instrument_node="">Nothing is resolved. Expect a re-match in a generation as WW1 resentments boil to fever pitch.</span></span><span data-dcnode-id="4104" instrument_node="">

</span><span data-dcnode-id="3875" id="freeTextContainer8204688114511022988"><span data-dcnode-id="3882" instrument_node="">"‘I shall never be able to understand how it happened,’ the novelist Rebecca West remarked to her husband as they stood on the balcony of Sarajevo Town Hall in 1936. It was not, she reflected, that there were too few facts available, but that there were too many."</span><br data-dcnode-id="3881"><br data-dcnode-id="3880"><span data-dcnode-id="3879" instrument_node="">I have a masochistic, puritan streak that tells me a serious book should be long, dry, dense and exhaustively referenced to flagellate learning into my ignorant body and soul. Barbara Tuchman's sinfully enjoyable </span><i data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">The Guns of August</span></i><span data-dcnode-id="3876" instrument_node=""> left</span></span><span data-dcnode-id="3874" instrument_node="">
</span><span data-dcnode-id="3848" id="freeText8204688114511022988" style="display:none"><span data-dcnode-id="3873" instrument_node="">"‘I shall never be able to understand how it happened,’ the novelist Rebecca West remarked to her husband as they stood on the balcony of Sarajevo Town Hall in 1936. It was not, she reflected, that there were too few facts available, but that there were too many."</span><br data-dcnode-id="3872"><br data-dcnode-id="3871"><span data-dcnode-id="3870" instrument_node="">I have a masochistic, puritan streak that tells me a serious book should be long, dry, dense and exhaustively referenced to flagellate learning into my ignorant body and soul. Barbara Tuchman's sinfully enjoyable </span><i data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">The Guns of August</span></i><span data-dcnode-id="3867" instrument_node=""> left me craving punishment. Christopher Clark cheerfully provides a whipping. The first 100 pages (or 200, I may have blacked out) contain everything you ever wanted to know about Serbian ethno-nationalism. The 100 pages of notes and references tell you where to go for more. I admit not much of this made it past the retina for further processing. And it goes on. God there must be some happy medium? I'd like to give the people who gave glittering reviews a multiple choice exam on the contents to see if anyone retained anything. Or maybe that's not the point.</span><br data-dcnode-id="3866"><br data-dcnode-id="3865"><span data-dcnode-id="3864" instrument_node="">In lieu of further review, a couple more quotations:</span><br data-dcnode-id="3863"><br data-dcnode-id="3862"><span data-dcnode-id="3861" instrument_node="">"The outbreak of war in 1914 is not an Agatha Christie drama at the end of which we will discover the culprit standing over a corpse in the conservatory with a smoking pistol. There is no smoking gun in this story; or, rather, there is one in the hands of every major character. Viewed in this light, the outbreak of war was a tragedy, not a crime. Acknowledging this does not mean that we should minimize the belligerence and imperialist paranoia of the Austrian and German policy-makers that rightly absorbed the attention of Fritz Fischer and his historiographical allies. But the Germans were not the only imperialists and not the only ones to succumb to paranoia. The crisis that brought war in 1914 was the fruit of a shared political culture. But it was also multipolar and genuinely interactive – that is what makes it the most complex event of modern times and that is why the debate over the origins of the First World War continues, one century after Gavrilo Princip fired those two fatal shots on Franz Joseph Street."</span><br data-dcnode-id="3860"><br data-dcnode-id="3859"><span data-dcnode-id="3858" instrument_node="">---</span><br data-dcnode-id="3857"><br data-dcnode-id="3856"><span data-dcnode-id="3855" instrument_node="">There were isolated expressions of chauvinist enthusiasm for the coming fight, but these were the exception. The myth that European men leapt at the opportunity to defeat a hated enemy has been comprehensively dispelled. In most places and for most people, the news of mobilization came as a profound shock, a ‘peal of thunder out of a cloudless sky’. And the further one moved away from the urban centres, the less sense the news of mobilization seemed to make to the people who were going to fight, die or be maimed or bereaved in the coming war. In the villages of the Russian countryside a ‘stunned silence’ reigned, broken only by the sound of ‘men, women and children weeping’. In Vatilieu, a small commune in the Rhône-Alpes region of south-eastern France, the ringing of the tocsin brought workers and peasants into the village square. Some, who had run straight from the fields, were still carrying their pitchforks. </span><br data-dcnode-id="3854"><br data-dcnode-id="3853"><span data-dcnode-id="3852" instrument_node=""> ‘What can it mean? What is going to happen to us?’ asked the women. Wives, children, husbands, all were overcome by emotion. The wives clung to the arms of their husbands. The children, seeing their mothers weeping, started to cry too. All around us was alarm and consternation. What a disturbing scene. </span><br data-dcnode-id="3851"><br data-dcnode-id="3850"><span data-dcnode-id="3849" instrument_node="">An English traveller recalled the reaction in an Altai (Semipalatinsk) Cossack settlement when the ‘blue flag’ borne aloft by a rider and the noise of bugles playing the alarm brought news of mobilization. The Tsar had spoken, and the Cossacks, with their unique military calling and tradition, ‘burned to fight the enemy’. But who was that enemy? Nobody knew. The mobilization telegram provided no details. Rumours abounded. At first everyone imagined that the war must be with China – ‘Russia had pushed too far into Mongolia and China had declared war.’ Then another rumour did the rounds: ‘It is with England, with England.’ This view prevailed for some time. Only after four days did something like the truth come to us, and then nobody believed it.</span></span><span data-dcnode-id="3847" instrument_node="">

</span><span class="readable" data-dcnode-id="3636" id="reviewTextContainer713803314"><span data-dcnode-id="3755" instrument_node="">
</span><span data-dcnode-id="3746" id="freeTextContainer334864086980673451"><b data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">While the dead are gone, they're not gone. While the dead don't speak, they speak.</span></b><br data-dcnode-id="3752"><i data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node="">St Paul</span></i><br data-dcnode-id="3749"><br data-dcnode-id="3748"><span data-dcnode-id="3747" instrument_node="">Which begs the question, what do they say to us? Last week saw extensive media coverage of the various commemorations of Britain's declaration of war against Germany on August 4, 1914. Naturally, understandably, inevitably, those dignitaries invited to hold speeches on this occasion turned most of their attention to the human cost. The sheer numbers are obscene, beyond anyone's understanding or imagination. </span></span><span data-dcnode-id="3745" instrument_node="">
</span><span data-dcnode-id="3641" id="freeText334864086980673451" style="display:none"><b data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">While the dead are gone, they're not gone. While the dead don't speak, they speak.</span></b><br data-dcnode-id="3742"><i data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">St Paul</span></i><br data-dcnode-id="3739"><br data-dcnode-id="3738"><span data-dcnode-id="3737" instrument_node="">Which begs the question, what do they say to us? Last week saw extensive media coverage of the various commemorations of Britain's declaration of war against Germany on August 4, 1914. Naturally, understandably, inevitably, those dignitaries invited to hold speeches on this occasion turned most of their attention to the human cost. The sheer numbers are obscene, beyond anyone's understanding or imagination. The bare statistics are mere marks on a page; it takes other means to allow us to build a picture of the carnage. There is this magnificent and moving installation in the dry moat of the Tower of London, for example. Entitled 'Blood Swept Lands and Seas of Red' (sic*) it plants a red ceramic poppy to represent each of the service personnel from the UK who died in the 14-18.</span><br data-dcnode-id="3736"><br data-dcnode-id="3735"><a data-dcnode-id="3731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//s1178.photobucket.com/user/kemoll/media/929153_1451357711800880_334534995_s.jpg.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3734" instrument_node="">
</span><img alt=" photo 929153_1451357711800880_334534995_s.jpg" class="gr-hostedUserImg" data-dcnode-id="3733" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1407843528i/10770571.jpg&amp;raw"><span data-dcnode-id="3732" instrument_node="">
</span></a><br data-dcnode-id="3730"><br data-dcnode-id="3729"><span data-dcnode-id="3728" instrument_node="">888,264 poppies.</span><br data-dcnode-id="3727"><span data-dcnode-id="3726" instrument_node="">And that is just servicemen and women. No civilians.</span><br data-dcnode-id="3725"><span data-dcnode-id="3724" instrument_node="">And that does not include the injured, maimed and traumatised. Nor the missing in action.</span><br data-dcnode-id="3723"><span data-dcnode-id="3722" instrument_node="">And that is just one country.</span><br data-dcnode-id="3721"><br data-dcnode-id="3720"><span data-dcnode-id="3719" instrument_node="">It is natural, understandable, inevitable, that this sacrifice should be ennobled and dignified. But how? How to render the carnage manageable, assimilable into a noble narrative of high idealism? The Duke of Cambridge, speaking at the Inter-allied Memorial in Liège, made a valiant effort: </span><i data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">We salute those who died to give us our freedom.</span></i><span data-dcnode-id="3716" instrument_node=""> Laughable really. For if there is one thing I have taken from Christopher Clark's magisterial opus, it is the sense that this was never a war of ideas or ideology. It was not Fascism against Liberalism, Oppression against Freedom. The Prince references Stefan Zweig at the beginning of </span><a data-dcnode-id="3714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.princeofwales.gov.uk/media/speeches/speech-hrh-the-duke-of-cambridge-the-world-war-one-centenary-commemorations-the" rel="nofollow noopener"><span data-dcnode-id="3715" instrument_node="">his speech</span></a><span data-dcnode-id="3713" instrument_node="">. In his memoir </span><a data-dcnode-id="3711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/629429.The_World_of_Yesterday" rel="nofollow noopener" title="The World of Yesterday by Stefan Zweig"><span data-dcnode-id="3712" instrument_node="">The World of Yesterday</span></a><span data-dcnode-id="3710" instrument_node="">, Zweig pinpoints the difference between the two World Wars. The war of '39 had a reason, it was about freedom and preserving the moral good. That of 1914 served only an illusion, a dream, a mania.</span><br data-dcnode-id="3709"><br data-dcnode-id="3708"><span data-dcnode-id="3707" instrument_node="">The idea of a dream is taken up by Clark in his title. Sleepwalkers. That is a fine image as long as it is not meant to convey that the key players were drifting totally unaware towards war. They knew, oh they knew, indeed in some quarters there was a definite attitude that war was not only unavoidable, but maybe even desirable. The necessary way to purify the muddy waters of diplomacy. To temper the steel of national identity. To re-calibrate the balance of power in Europe. No, what those leaders were blind to was the </span><i data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">nature</span></i><span data-dcnode-id="3704" instrument_node=""> of the armed conflict they were groping their way towards. No-one could have envisaged industrial warfare. </span><br data-dcnode-id="3703"><br data-dcnode-id="3702"><span data-dcnode-id="3701" instrument_node="">The image that crossed my mind when reading this was less one of dreamers, more one of a perverse game of Blind Man's Buff, in which not only are ALL of the players blindfold, but also shackled each to the other with a complex system of ropes of differing lengths that at some stage will yank them back ignominiously to a position they never wanted to hold. Blindfold, because all those active in the diplomatic service, all those ambassadors and attachés, the correspondents and representatives, the spies and the message boys, all of them could only attempt to guess at the true motives and intents of those in power. Indeed, a lot of the time it was hard to assess who was in power at all, and who was whispering in his ear. Personal regiments as government, with little sense of making common cause: often the military department was at loggerheads with the Foreign Secretary, the Emperor with his Chancellor, the man in charge of the money with everyone. And shackled through the complex and constantly shifting system of alliances and power blocs.</span><br data-dcnode-id="3700"><br data-dcnode-id="3699"><span data-dcnode-id="3698" instrument_node="">Clark is a thoroughly modern historian, one who scrupulously avoids the over-arching grand narrative which would allot blame to one country or another. He takes a multi-national approach, with an informative emphasis on Serbia. This wide scope of narratives does present a challenge to the reader in the form of the great panoply of names that need to be filed away for future reference. I can only advise anyone embarking on this journey to keep a cheat sheet tucked into the back cover in order to be able to tell your Andrássy from your Clausewitz, your Sazonov from your Aehrenthal and to try to sort out the Kaljevic, the Kálnoky and the Karadzic.</span><br data-dcnode-id="3697"><br data-dcnode-id="3696"><span data-dcnode-id="3695" instrument_node="">So, in the end, what do they say, the dead of 14-18? Thirty seven million altogether, who died, in the end, as a result of a diplomatic meltdown. Surely all they can say is never again. Never again. Never again. And then it all started again barely twenty years later. </span><br data-dcnode-id="3694"><br data-dcnode-id="3693"><i data-dcnode-id="3651"><span data-dcnode-id="3692" instrument_node="">I don’t want to join the army</span><br data-dcnode-id="3691"><span data-dcnode-id="3690" instrument_node="">I don’t want to go to war</span><br data-dcnode-id="3689"><span data-dcnode-id="3688" instrument_node="">I’d rather stay at home</span><br data-dcnode-id="3687"><span data-dcnode-id="3686" instrument_node="">Around the street to roam</span><br data-dcnode-id="3685"><span data-dcnode-id="3684" instrument_node="">Living on the earnings of a lady typist.</span><br data-dcnode-id="3683"><span data-dcnode-id="3682" instrument_node="">I don’t want a bayonet in my belly</span><br data-dcnode-id="3681"><span data-dcnode-id="3680" instrument_node="">I don’t want my bollocks shot away</span><br data-dcnode-id="3679"><span data-dcnode-id="3678" instrument_node="">I’d rather stay in England</span><br data-dcnode-id="3677"><span data-dcnode-id="3676" instrument_node="">Merry merry England</span><br data-dcnode-id="3675"><span data-dcnode-id="3674" instrument_node="">And fornicate my bleedin’ life away</span><br data-dcnode-id="3673"><span data-dcnode-id="3672" instrument_node="">I don’t want to be a soldier</span><br data-dcnode-id="3671"><span data-dcnode-id="3670" instrument_node="">I don’t want to go to war</span><br data-dcnode-id="3669"><span data-dcnode-id="3668" instrument_node="">I’d rather hang around</span><br data-dcnode-id="3667"><span data-dcnode-id="3666" instrument_node="">Piccadilly underground</span><br data-dcnode-id="3665"><span data-dcnode-id="3664" instrument_node="">And live off the earnings</span><br data-dcnode-id="3663"><span data-dcnode-id="3662" instrument_node="">Of a high born lady.</span><br data-dcnode-id="3661"><span data-dcnode-id="3660" instrument_node="">I don’t need no Froggy women</span><br data-dcnode-id="3659"><span data-dcnode-id="3658" instrument_node="">London’s full of girls I’ve never had.</span><br data-dcnode-id="3657"><span data-dcnode-id="3656" instrument_node="">Dear Oh Gawd almighty</span><br data-dcnode-id="3655"><span data-dcnode-id="3654" instrument_node="">I want to stay in Blighty</span><br data-dcnode-id="3653"><span data-dcnode-id="3652" instrument_node="">And follow in the footsteps of me dad.</span></i><br data-dcnode-id="3650"><br data-dcnode-id="3649"><span data-dcnode-id="3648" instrument_node="">Soldiers' Songs of the Great War</span><br data-dcnode-id="3647"><a data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.westernfrontassociation.com/great-war-people/48-brothers-arms/372-songs-war.html" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3646" instrument_node="">http://www.westernfrontassociation.co...</span></a><br data-dcnode-id="3644"><br data-dcnode-id="3643"><span data-dcnode-id="3642" instrument_node="">*bloodswept makes far more sense, surely?</span></span><span data-dcnode-id="3640" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/18181298-tristram-shandy%3Fshelf%3Dhistory"><span data-dcnode-id="3560" instrument_node="">history</span></a><span data-dcnode-id="3558" instrument_node="">
