</span><span class="readable" data-dcnode-id="3507" id="reviewTextContainer894319825"><span data-dcnode-id="3552" instrument_node="">
</span><span data-dcnode-id="3543" id="freeTextContainer3838394708836043105"><b data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">”The outbreak of war in 1914 is not an Agatha Christie drama at the end of which we will discover the culprit standing over a corpse in the conservatory with a smoking pistol.”</span></b><br data-dcnode-id="3549"><br data-dcnode-id="3548"><span data-dcnode-id="3547" instrument_node="">Christopher Clark’s choice of the first bit of the title </span><i data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">The Sleepwalkers. How Europe Went to War in 1914</span></i><span data-dcnode-id="3544" instrument_node=""> may indeed be considered slightly awkward in that it suggests that those who were in charge in European governments at that time are not really to blame for the decisions they took, but nevertheless Clark’s book itself</span></span><span data-dcnode-id="3542" instrument_node="">
</span><span data-dcnode-id="3512" id="freeText3838394708836043105" style="display:none"><b data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">”The outbreak of war in 1914 is not an Agatha Christie drama at the end of which we will discover the culprit standing over a corpse in the conservatory with a smoking pistol.”</span></b><br data-dcnode-id="3539"><br data-dcnode-id="3538"><span data-dcnode-id="3537" instrument_node="">Christopher Clark’s choice of the first bit of the title </span><i data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">The Sleepwalkers. How Europe Went to War in 1914</span></i><span data-dcnode-id="3534" instrument_node=""> may indeed be considered slightly awkward in that it suggests that those who were in charge in European governments at that time are not really to blame for the decisions they took, but nevertheless Clark’s book itself is groundbreaking in its capacity of putting a big question mark behind any attempt at, for whatever reasons, playing the blame game. I have some friends who derive the bulk of their knowledge from the feature pages of newspapers and who are, furthermore, endowed with the remarkable and enviable – shall I say “skill”, or is not “power” the better word? – of knowing everything that is said in a book by having a glance at its title, and naturally these friends are indignant at Clark, whom they consider an apologist trying to make World War I pass as something like a quasi-natural catastrophe for which nobody can be held accountable.</span><br data-dcnode-id="3533"><br data-dcnode-id="3532"><span data-dcnode-id="3531" instrument_node="">Had they read the book itself, and not merely its title, they would know that Clark is far from using scholarly prestidigitation in order to make questions of responsibility vanish into thin air. Quite on the contrary, he casts a very careful look at the agents in that crisis of July 1914, first of all doing away with abstractions like “Germany”, “Russia”, “Serbia” and showing instead that the policy of each of these countries depended on interactions and wrestles for power and influence within the political system of the respective states, which not only made the system of alliances – basically the Triple Entente vs. the Triple Alliance – potentially volatile but also rendered it extremely difficult for any of the major powers to gather reliable information on how the other powers were going to act. It is this atmosphere of mutual distrust and a </span><i data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">bellum omnia contra omnes</span></i><span data-dcnode-id="3528" instrument_node=""> view of foreign affairs, e.g. with regard to geopolitical ambitions such as the Russian interests in the Dardanelles, or the British fear of being pressured in India, that made statesmen of all five powers take unwise decisions which eventually lead towards war. It is at this point, not in the form of picking out one state that is to blame above all others, that questions of accountability come into play.</span><br data-dcnode-id="3527"><br data-dcnode-id="3526"><span data-dcnode-id="3525" instrument_node="">Clark’s investigation into the outbreak of WWI is structured into three major parts. At the outset, the author has a closer look at the two countries Serbia and Austria-Hungary, since it was, after all, the assassination of Austria-Hungary’s heir apparent and his wife that triggered the July Crisis and led into war. Clark elaborates the problematic role of Serbia as a state whose government was infiltrated by regicide terrorists who championed an extremely aggressive variant of nationalism that not only posed a threat to Austria-Hungary but also to other neighbouring states. It also becomes clear that the young men who set out to Sarajewo with the intention of killing Franz Ferdinand did so with the knowledge to at least some of Serbia’s leading militaries and politicians and that later on these politicians would obstruct any investigations into the backgrounds of the killers. Clark’s decision to work out the connection of Gavrilo Princip and the “Black Hand” with Serbian government officials caused some dismay with those who argue that this is mere Serbia-bashing and exaggerates Serbia’s contribution to the war, but when witnessing the erection of a statue to honour the memory of Princip in Sarajewo in June 2014, we might well ask ourselves if word of the background of this vile act of terror has really gotten around everywhere yet.</span><br data-dcnode-id="3524"><br data-dcnode-id="3523"><span data-dcnode-id="3522" instrument_node="">In the second part of his book Clark concentrates on the changing system of alliances in Europe with its many antagonisms. He shows that England did not regard the Triple Entente as an alliance directed against the German Empire (as France did) but predominantly as a way of containing Russia and of avoiding conflicts with Russia in the Middle East and India. He also points out how Russia and Austria-Hungary were vying for the sympathies of certain Balkan states, the former with a view to destabilizing the Balkan situation (and Austria-Hungary’s position), the latter with the contrary intention.</span><br data-dcnode-id="3521"><br data-dcnode-id="3520"><span data-dcnode-id="3519" instrument_node="">Against the background of these preceding events and vying interests Clark finally analyzes the July Crisis itself, which he sees in the light of the so-called Balkan inception scenario, i.e. Poincarés motivation to lead the Entente into war if Vienna attacked Serbia because such a scenario would offer France the best starting position in an armed conflict with Austria-Hungary’s ally Germany. This Balkan inception scenario likewise made it necessary for Russia to mobilize not only against Austria-Hungary but also against Germany, a decision that would further fuel the crisis. However, Clark does not say that any of the major powers had been planning war well in advance. Instead he sees a mixture of shortsightedness and wishful thinking at work, e.g. in Germany infamous “blank cheque” for Austria-Hungary, which is often regarded as proof of Germany’s intention of fuelling the danger of a European war, Clark sees the inapt attempt at limiting Austria’s actions to Serbia only – a calculation that would only work if Russia abstained from backing Serbia, but unfortunately Russia had also given a kind of “blank cheque” to Serbia by assuring the Serbs of her unconditional support.</span><br data-dcnode-id="3518"><br data-dcnode-id="3517"><span data-dcnode-id="3516" instrument_node="">Clark surely interprets the July Crisis in a new way, which he does very convincingly by consulting a variety of sources and by conscientiously reconstructing the decision processes of those statesmen involved. One of the greatest advantages of </span><i data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">The Sleepwalkers</span></i><span data-dcnode-id="3513" instrument_node=""> is that it is not only carefully executed but also, if that can be said of a book with so serious a topic, a page-turner. Clark does not narrate on the level of personal decisions but elaborate the structures in which these decisions could be taken and carried out and yet he uses a style that does not make it easy to put this book aside.</span></span><span data-dcnode-id="3511" instrument_node="">

</span><span data-dcnode-id="3399" id="freeTextContainer10367988083800711614"><i data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">Sleepwalking into destruction</span></i><br data-dcnode-id="3405"><br data-dcnode-id="3404"><span data-dcnode-id="3403" instrument_node="">How was it possible that the shots fired on the 28th of June 1914 escalated into a war that caused the death of 68 million people? In a breathtaking reconstruction of the events Clark shows how this event escalated into catastrophy. His conclusion: the Great War was the fatal result of political ententes and failures of the policy makers.</span><br data-dcnode-id="3402"><br data-dcnode-id="3401"><span data-dcnode-id="3400" instrument_node="">The book is divided in three parts - the first part deals with Serbia and the events running up to the assassination, the second pa</span></span><span data-dcnode-id="3398" instrument_node="">
</span><span data-dcnode-id="3379" id="freeText10367988083800711614" style="display:none"><i data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">Sleepwalking into destruction</span></i><br data-dcnode-id="3395"><br data-dcnode-id="3394"><span data-dcnode-id="3393" instrument_node="">How was it possible that the shots fired on the 28th of June 1914 escalated into a war that caused the death of 68 million people? In a breathtaking reconstruction of the events Clark shows how this event escalated into catastrophy. His conclusion: the Great War was the fatal result of political ententes and failures of the policy makers.</span><br data-dcnode-id="3392"><br data-dcnode-id="3391"><span data-dcnode-id="3390" instrument_node="">The book is divided in three parts - the first part deals with Serbia and the events running up to the assassination, the second part explains how from 1887 to 1907 the groundwork was laid for the divided continent, with the German - Austro Hungarian block on one side, against the Engish - French - Russian entente on the other side. Finally, the third part deals with the events running up to the fateful last days in August.</span><br data-dcnode-id="3389"><br data-dcnode-id="3388"><span data-dcnode-id="3387" instrument_node="">According to Clark, the outbreak of the First World War was the result of a widespread European crisis, and the protagonists in the other countries were equally guilty of it. The idea that it was Germany which was the instigator and mainly responsible for the subsequent events is being questioned by Clark. Instead, he states that all nations were equally guilty, after their failures of keeping thing under control.</span><br data-dcnode-id="3386"><br data-dcnode-id="3385"><span data-dcnode-id="3384" instrument_node="">It could all have turned out very differently and the First World War was not something invevitable, if only the policy makers had taken responsibility for the choice for peace and did not pass on this decision to irresistible external forces outside their influences.</span><br data-dcnode-id="3383"><br data-dcnode-id="3382"><i data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">Read in Dutch</span></i></span><span data-dcnode-id="3378" instrument_node="">

</span><span data-dcnode-id="3151" id="freeTextContainer10111944571344762396"><span data-dcnode-id="3155" instrument_node="">Does history repeat itself? A Cambridge University historian’s study of the causes of World War I</span><br data-dcnode-id="3154"><br data-dcnode-id="3153"><span data-dcnode-id="3152" instrument_node="">Six little boys tussle in a sandbox, pushing and shoving, sometimes openly, sometimes when none of the others are looking. One of them, a runt, is getting the worst of it, but he’s a vicious little guy and manages to hold his own within his own tiny corner of the sandbox. The biggest boys exert the least effort but command the most space. They all look confident, but secretly they’re terrified of one</span></span><span data-dcnode-id="3150" instrument_node="">
</span><span data-dcnode-id="3127" id="freeText10111944571344762396" style="display:none"><span data-dcnode-id="3149" instrument_node="">Does history repeat itself? A Cambridge University historian’s study of the causes of World War I</span><br data-dcnode-id="3148"><br data-dcnode-id="3147"><span data-dcnode-id="3146" instrument_node="">Six little boys tussle in a sandbox, pushing and shoving, sometimes openly, sometimes when none of the others are looking. One of them, a runt, is getting the worst of it, but he’s a vicious little guy and manages to hold his own within his own tiny corner of the sandbox. The biggest boys exert the least effort but command the most space. They all look confident, but secretly they’re terrified of one another, leading them to combine forces in a constantly shifting pattern of partnerships to fend off the others.</span><br data-dcnode-id="3145"><br data-dcnode-id="3144"><span data-dcnode-id="3143" instrument_node="">This is the image that comes to mind of Europe in the summer of 1914 from reading Christopher Clark’s new inquiry into how the First World War came to be. Naturally, Professor Clark had something much more grown-up in mind when he wrote the book. After all, he is a Fellow at St. Catherine’s College at the University of Cambridge, where he received his Ph.D. in History, and we all know that a Cambridge Don would never indulge in such belittling imagery.</span><br data-dcnode-id="3142"><br data-dcnode-id="3141"><span data-dcnode-id="3140" instrument_node="">In all fairness, to put the event in proper perspective, “The conflict that began that summer mobilized 65 million troops, claimed three empires [Russian, Ottoman, and Austro-Hungarian], 20 million military and civilian deaths, and 21 million wounded. The horrors of Europe’s twentieth century were born of this catastrophe.”</span><br data-dcnode-id="3139"><br data-dcnode-id="3138"><span data-dcnode-id="3137" instrument_node="">With The Sleepwalkers, Clark muscles into the seemingly endless debate about why and how all this came to pass. Not that anybody on the street is talking about this stuff, of course. But among modern European historians these questions pass for excitement, and no wonder: the Great War is generally taken as the climax of the well-ordered Victorian Era that launched the human race with a lurch into the 20th Century. The origins of the cataclysm that upended tens of millions of lives are variously found in Prussian militarism, the colliding interests of European empires, the arms race, the profit motive among arms merchants, and other cross-border phenomena, but Professor Clark apparently will have none of this. He’s a practitioner of that brand of history that finds truth in the quotidian details of human interaction — in short, in the day-to-day decisions of living, breathing human beings tossed together in a crisis that nobody foresaw.</span><br data-dcnode-id="3136"><br data-dcnode-id="3135"><span data-dcnode-id="3134" instrument_node="">In the first of its three parts, The Sleepwalkers thus explores the political environment, highlighting the major players in each of the contending nations — Serbia, Austro-Hungary, Russia, Germany, France, and England — in the years running up to 1914. Part II takes a broader look at the Continent, discussing the interplay of the leading states in the closing years of the 19th Century and the beginning of the 20th. In outline, the stable alliances of the late 1880s had given way to a bipolar system by 1907, with the Triple Alliance of Germany, Austria-Hungary, and (loosely) Italy facing off against the interlocking fortunes of Russia, France, and Great Britain. Clark asserts that “[t]he polarization of Europe’s geopolitical system was a crucial precondition for the war that broke out in 1914.” Then, in Part III, Clark delves deeply into the day-by-day, sometimes hour-by-hour, decisions of the leading players from June 28, when Gavrilo Princip shot to death the heir to the Austro-Hungarian throne and his wife, until the early days of August, when all the chips had fallen into place and war was declared on all fronts.</span><br data-dcnode-id="3133"><br data-dcnode-id="3132"><span data-dcnode-id="3131" instrument_node="">In Clark’s view, “1914 is less remote from us — less illegible — now than it was in the 1980s. Since the end of the Cold War, a system of bipolar stability has made way for a more complex and unpredictable array of forces, including declining empires and rising powers — a state of affairs that invites comparison with the Europe of 1914.” Although Clark makes it easy to see history repeating itself in small ways — for example, the genocidal course pursued by Serbia in the 1990s was little different from its behavior in the decades leading up to 1914 — it’s difficult to see the parallels to most of today’s international crises. Surely, Professor Clark wouldn’t pretend that the U.S. invasion of Iraq — one of the seminal events of our times and perhaps the greatest strategic blunder in American history — was anything but the result of hubris and colossal miscalculation on the part of an ideology-driven clique within the U.S. government.</span><br data-dcnode-id="3130"><br data-dcnode-id="3129"><span data-dcnode-id="3128" instrument_node="">Disagreements aside, however, The Sleepwalkers is an outstanding piece of work. Professor Clark’s knowledge of the period he writes about is both broad and deep, and he writes with grace and verve that’s highly unusual in academic circles.</span></span><span data-dcnode-id="3126" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="3049" title="did not like it"><span class="staticStar p10" data-dcnode-id="3054" size="15x15"><span data-dcnode-id="3055" instrument_node="">did not like it</span></span><span class="staticStar p0" data-dcnode-id="3053" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3052" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3051" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3050" size="15x15"></span></span><span data-dcnode-id="3048" instrument_node="">

</span><span data-dcnode-id="3036" id="freeTextContainer17334109050668726328"><span data-dcnode-id="3043" instrument_node="">Four stars and change, guys? Really?</span><br data-dcnode-id="3042"><br data-dcnode-id="3041"><span data-dcnode-id="3040" instrument_node="">The issue of who "really" started the First World War has been the topic of a hell of a lot of books. The immediate assumption (Germans did it), based on a simple reading of universally acknowledged facts, has been challenged in a lot of those books. Some of those books make a pretty solid argument. This is not one of them.</span><br data-dcnode-id="3039"><br data-dcnode-id="3038"><span data-dcnode-id="3037" instrument_node="">This volume tries to revive the thoroughly discredited theory that the war was the result of miscalculations by statesmen and diplomats on </span></span><span data-dcnode-id="3035" instrument_node="">
</span><span data-dcnode-id="2983" id="freeText17334109050668726328" style="display:none"><span data-dcnode-id="3034" instrument_node="">Four stars and change, guys? Really?</span><br data-dcnode-id="3033"><br data-dcnode-id="3032"><span data-dcnode-id="3031" instrument_node="">The issue of who "really" started the First World War has been the topic of a hell of a lot of books. The immediate assumption (Germans did it), based on a simple reading of universally acknowledged facts, has been challenged in a lot of those books. Some of those books make a pretty solid argument. This is not one of them.</span><br data-dcnode-id="3030"><br data-dcnode-id="3029"><span data-dcnode-id="3028" instrument_node="">This volume tries to revive the thoroughly discredited theory that the war was the result of miscalculations by statesmen and diplomats on all sides. Clark consistently downplays egregious German and Austro-Hungarian aggression before and during the July Crisis to the extent of completely omitting extremely significant and well-known events and documents and applying the most sophistic and specious arguments imaginable to try to make his case.</span><br data-dcnode-id="3027"><br data-dcnode-id="3026"><br data-dcnode-id="3025"><br data-dcnode-id="3024"><span data-dcnode-id="3023" instrument_node="">Let's just take a couple of examples from chapter 10:</span><br data-dcnode-id="3022"><br data-dcnode-id="3021"><span data-dcnode-id="3020" instrument_node="">-Compares the Austro-Hungarian ultimatum to Serbia (1914), which scandalized Europe, to the Ramboullet "Agreement" (1999) which would have given NATO an open-ended occupation of Serbia and was called by no less an authority on the rights of sovereign states than Henry Kissinger "an excuse to start bombing." Clark's take? Austria-Hungary was surprisingly moderate.</span><br data-dcnode-id="3019"><br data-dcnode-id="3018"><span data-dcnode-id="3017" instrument_node="">Well yeah, if you compare Charles Manson to Adolf Hitler, Manson is pretty moderate too. </span><br data-dcnode-id="3016"><br data-dcnode-id="3015"><br data-dcnode-id="3014"><br data-dcnode-id="3013"><span data-dcnode-id="3012" instrument_node="">-Talks about Serbian ministers "investing immense effort" in their reply "to create the appearance" of compliance, but the reply was a "subtle cocktail of acceptances, evasions and rejections."</span><br data-dcnode-id="3011"><br data-dcnode-id="3010"><span data-dcnode-id="3009" instrument_node="">It must've been a hell of an appearance, because it was good enough for the Kaiser, who thought the Austro-Hungarians should be satisfied with it. Clark neglects to mention that little detail, of course.</span><br data-dcnode-id="3008"><br data-dcnode-id="3007"><br data-dcnode-id="3006"><br data-dcnode-id="3005"><span data-dcnode-id="3004" instrument_node="">-Talks about Germany having no war policy (except hegemony in the Near East), forgets to mention the Germans were in a near-panic over French and Russian rearmament that was slowly tilting the balance of power in their favor. </span><br data-dcnode-id="3003"><br data-dcnode-id="3002"><span data-dcnode-id="3001" instrument_node="">Oddly he goes on about this very topic at some length in a previous chapter, to justify German fears of a Russian attack at some indeterminate time in the future. Oops! </span><br data-dcnode-id="3000"><br data-dcnode-id="2999"><br data-dcnode-id="2998"><br data-dcnode-id="2997"><span data-dcnode-id="2996" instrument_node="">-Claims German policymakers planned to accept a war if Russia should start one but did not plan a pre-emptive war.</span><br data-dcnode-id="2995"><br data-dcnode-id="2994"><span data-dcnode-id="2993" instrument_node="">PRE-EMPTIVE DECLARATION OF WAR LITERALLY WHAT ACTUALLY HAPPENED.</span><br data-dcnode-id="2992"><br data-dcnode-id="2991"><br data-dcnode-id="2990"><br data-dcnode-id="2989"><br data-dcnode-id="2988"><span data-dcnode-id="2987" instrument_node="">The author dances around the idea (but never actually says it) that Serbia was a rogue terrorist state and that, in the modern world, Austria-Hungary would be completely justified in an invasion and "regime change" such as USA applied to Iraq and Afghanistan in recent years. Of course, the difference there is that, unlike Iraq and Afghanistan, Serbia was, at the time, the client state of a rival power that made it quite clear they would defend Serbia's sovereignty. So it would be more like China invading Taiwan over the attempted assassination of Zhou Enlai and then pretending to be surprised if the USA stepped in.</span><br data-dcnode-id="2986"><br data-dcnode-id="2985"><span data-dcnode-id="2984" instrument_node="">Overall, this book is like the work of a defense attorney defending a murderer who was seen by a dozen witnesses, left fingerprints and DNA all over the murder weapon, and signed a confession. All that's left for them is to try to obfuscate with irrelevant detail, and maybe imply that the son of a bitch had it coming. </span></span><span data-dcnode-id="2982" instrument_node="">

</span><span data-dcnode-id="2885" id="freeTextContainer7893919177927644509"><span data-dcnode-id="2886" instrument_node="">Bosnia, Herzegovina, Dalmatia, Macedonia, Transylvania – the names float like ghosts over a map of early 20th century Europe. It was a map in flux. The Ottoman Empire was disintegrating. The Austro-Hungarian Empire was suddenly threatened by the unrest of it's numerous ethnic minorities: Croats, Slavs, Bosnian Muslims, Slovenes, Serbs, Romanians.... Major European powers were jockeying for colonial dominance: England in Egypt and India; France in North Africa and Southeast Asia. Russia sought co</span></span><span data-dcnode-id="2884" instrument_node="">
</span><span data-dcnode-id="2819" id="freeText7893919177927644509" style="display:none"><span data-dcnode-id="2883" instrument_node="">Bosnia, Herzegovina, Dalmatia, Macedonia, Transylvania – the names float like ghosts over a map of early 20th century Europe. It was a map in flux. The Ottoman Empire was disintegrating. The Austro-Hungarian Empire was suddenly threatened by the unrest of it's numerous ethnic minorities: Croats, Slavs, Bosnian Muslims, Slovenes, Serbs, Romanians.... Major European powers were jockeying for colonial dominance: England in Egypt and India; France in North Africa and Southeast Asia. Russia sought control of the Turkish Straits. The delicately balanced foreign policy of Bismark was jettisoned by his successors (too complicated!) in favor of the “free hand.” Historian Christopher Clark sifts through the changing array of politicians, short-term foreign policy objectives, domestic conflict, misunderstood signals, and flawed assumptions with the goal of understanding how the catastrophe that was World War I could have come about. The over 34 million casualties and the aftermath that paved the way for Hitler in Germany demand an explanation to the logical mind. </span><br data-dcnode-id="2882"><br data-dcnode-id="2881"><span data-dcnode-id="2880" instrument_node="">However, from the outset, he redirects us from the intriguing question: “What caused World War I?” to a more subtle view of causation – one I see as influenced by 20th century chaos theory. Clark seems to implicitly acknowledge this in his introduction: </span><i data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node=""> “...the question of why invites us to go in search of remote and categorical causes: imperialism, nationalism, armaments, alliances, high finance, ideas of national honour, the mechanics of mobilization. The why approach brings a certain analytical clarity, but it also has a distorting effect, because it creates the illusion of a steadily building causal pressure; the factors pile up on top of each other pushing down on the events; political actors become mere executors of forces long established and beyond their control.”</span></i><span data-dcnode-id="2877" instrument_node=""> </span><br data-dcnode-id="2876"><br data-dcnode-id="2875"><span data-dcnode-id="2874" instrument_node="">Clark's exposition reflects this complexity. He begins his story on June 11, 1903, working both backward and forward from this arbitrary event – the assassination of the Serbian king and queen by a conspiracy of Serbian army officers. The violence serves both as an illustration of the instability of the Serbian government (political assassination was almost the norm since the country broke free of the Ottoman Empire), and the beginning of a growth industry – terrorism. </span><br data-dcnode-id="2873"><br data-dcnode-id="2872"><span data-dcnode-id="2871" instrument_node="">One way to follow his narrative is by tracking a few key events leading up to 1914. </span><b data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">1905-1906</span></b><span data-dcnode-id="2868" instrument_node=""> saw commercial relations between Serbia and Austria-Hungary severed in favor of a new alignment with France. With a lucrative armaments contract signed with a French manufacturer rather than its Austrian rival, and a massive military build-up financed by French credit, Serbia signaled a major destabilizing political realignment. Meanwhile a parochial and xenophobic peasantry deterred outside investment in the domestic economy. Clark calls it 'growth without development' and argues that a stagnant ultra-conservative society encouraged jobless youth to join the growing number of pan-Slavic cells funded in part by the Serbian government. </span><br data-dcnode-id="2867"><br data-dcnode-id="2866"><span data-dcnode-id="2865" instrument_node="">In </span><b data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">1908</span></b><span data-dcnode-id="2862" instrument_node=""> Austria-Hungary annexed Bosnia and Herzegovina, provinces that were nominally part of the Ottoman Empire but had been under Austrian occupation for the past 30 years. The annexation was a rallying point for pan-Slavic militants and put Russia in the uncomfortable position of restraining Serbia while seeking to anchor its influence in the Balkan peninsula. It's plan to acquiesce in the Austrian annexation in exchange for access to the Turkish Straits was rejected by England (a disappointment which would influence future decision-making); and it's about-face policy resulted in deteriorated relations with Germany. </span><br data-dcnode-id="2861"><br data-dcnode-id="2860"><b data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">October 1912-May 1913</span></b><span data-dcnode-id="2857" instrument_node=""> marked the First Balkan War. Serbia, Montenegro, Bulgaria and Greece drove Ottoman forces out of Albania, Macedonia and Thrace. The event signaled the end of a foreign policy calculus that saw the preservation of the Ottoman Empire as a stabilizing force, and the beginning of a free-for-all grab for Balkan real estate. The war was almost immediately succeeded by the Second Balkan War from </span><b data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">January to July 1913</span></b><span data-dcnode-id="2854" instrument_node=""> in which Serbia, Greece, Montenegro and Romania fought Bulgaria for territories in Macedonia, Thrace and Dobrudja. This war placed the Austro-Hungarian empire in an awkward position. It could not back Bulgaria against Serbia because it would place the empire in opposition to Romania as well, which would invite unrest among the sizeable Romanian population in Hungarian Transylvania. The war ended in considerably expanding Serbia's borders, and Serbia was still the breeding ground for active anti-Austrian terrorist cells.</span><br data-dcnode-id="2853"><br data-dcnode-id="2852"><span data-dcnode-id="2851" instrument_node="">Clark describes a series of changing defensive postures and understandings which moved with the swiftness of a game of musical chairs. When the music stopped, Berlin suddenly found itself in an isolated position, with Russia and France forming ever closer relations, the Ottoman Empire dissolving, and England issuing maddeningly mixed signals which if not overtly anti-German, were definitely not pro-German. In one of his more lucid passages, Clark notes: </span><i data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node=""> “It was a striking example of what international relations theorists call the 'security dilemma', in which the steps taken by one state to enhance its security 'render the others more insecure and compel them to prepare for the worst'.”</span></i><br data-dcnode-id="2848"><br data-dcnode-id="2847"><span data-dcnode-id="2846" instrument_node="">Overlaid on this chronological schema, Clark embarks on a detailed examination of the principals involved. Nikola Pašić (Prime Minister of Serbia), Nikolai Hartwig (Russian ambassador to Serbia), Edward Grey (British Foreign Secretary), Paul Cambon (French ambassador to England), Alexander Izvolsky (Russian foreign minister), Raymond Poincaré (Prime Minister of France), Sergei Sazonov (Foreign Minister of Russia), Maurice Paléologue (French ambassador to Bulgaria and later to Russia), </span><br data-dcnode-id="2845"><span data-dcnode-id="2844" instrument_node="">and Vladimir Sukhomlinov (Russian war minister), to name but a few. Citing the constellation of players in Paris, St. Petersburg, Belgrade and Vienna, Clark wryly notes: </span><i data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">“One is reminded of a Harold Pinter play where the characters know each other very well and like each other very little.”</span></i><br data-dcnode-id="2841"><span data-dcnode-id="2840" instrument_node="">On a personal note, I was astonished at how influential ambassadors were in influencing and enacting foreign policy.</span><br data-dcnode-id="2839"><br data-dcnode-id="2838"><span data-dcnode-id="2837" instrument_node="">This is a long book. The serious history buff of the period will find this a “must read.” The rest of us perhaps less so. I found the opening chapter on Serbia the most interesting due to the sociological observations Clark makes about “growth without development.” Perhaps beyond that, my concentration began to blur with the ever-growing lists of names and events. Moreover, Clark has a meticulous but annoying style: On the one hand... . On the other hand.... I was able to finish this book only due to a parallel reading experiment with my husband. He is listening to some Dan Carlin podcasts as well as Barbara Tuchman's </span><b data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">Guns of August</span></b><span data-dcnode-id="2834" instrument_node="">. At breakfast we are able to compare notes on the run-up to World War I. It's a delightful way of learning history. As a result, I'm giving this book my ambivalent 3-star rating!</span><br data-dcnode-id="2833"><br data-dcnode-id="2832"><span data-dcnode-id="2831" instrument_node="">Clark does an admirable job of dispelling some popular myths. Not all of the players wanted war; and in fact many realized that war would be long and catastrophic. He critiques the 'Fischer thesis' that blames Germany for engineering the war. Nor does he believe that the Kaiser's belligerent “sabre-rattling” was the driving force of German foreign policy. (A discussion of the Kaiser, though, does lead to one of Clark's livelier passages: </span><i data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node=""> “He was an extreme exemplar of that Edwardian social category, the club bore who is forever explaining some pet project to the man in the next chair. Small wonder that the prospect of being buttonholed by the Kaiser over lunch or dinner, when escape was impossible, struck fear into the hearts of so many European royals”</span></i><span data-dcnode-id="2828" instrument_node="">). Despite the coalescence of two oppositional alliance blocs, the Austrian-Serbian conflict did not automatically dictate world war. A series of conscious decisions were made that led to that result. Inflamed public opinion was more influential in domestic political calculations than a direct contributor to hostilities. </span><br data-dcnode-id="2827"><br data-dcnode-id="2826"><span data-dcnode-id="2825" instrument_node="">NOTE:</span><br data-dcnode-id="2824"><span data-dcnode-id="2823" instrument_node="">Try to read this in hard copy; you will find the maps easier to read.</span><br data-dcnode-id="2822"><br data-dcnode-id="2821"><br data-dcnode-id="2820"></span><span data-dcnode-id="2818" instrument_node="">

</span><a class="left imgcol" data-dcnode-id="2760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/user/show/23350470-tim-evanson" title="Tim Evanson"><img alt="Tim Evanson" data-dcnode-id="2761" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/users/1433970616p2/23350470.jpg&amp;raw"></a><span data-dcnode-id="2759" instrument_node="">

</span><a class="reviewDate createdAt right" data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/702236826%3Fbook_show_action%3Dtrue"><span data-dcnode-id="2756" instrument_node="">Aug 23, 2013</span></a><span data-dcnode-id="2754" instrument_node="">
</span><span data-dcnode-id="2749" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="2753" instrument_node="">
</span><a class="user" data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/user/show/23350470-tim-evanson" itemprop="url" name="Tim Evanson" title="Tim Evanson"><span data-dcnode-id="2752" instrument_node="">Tim Evanson</span></a><span data-dcnode-id="2750" instrument_node="">

        rated it
        </span><span class="staticStars notranslate" data-dcnode-id="2741" title="it was ok"><span class="staticStar p10" data-dcnode-id="2746" size="15x15"><span data-dcnode-id="2747" instrument_node="">it was ok</span></span><span class="staticStar p10" data-dcnode-id="2745" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2744" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2743" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2742" size="15x15"></span></span><span data-dcnode-id="2740" instrument_node="">

</span><span class="readable" data-dcnode-id="2687" id="reviewTextContainer702236826"><span data-dcnode-id="2736" instrument_node="">
</span><span data-dcnode-id="2728" id="freeTextContainer17295657347720772385"><span data-dcnode-id="2735" instrument_node="">Theoretically, the book is about how the various governments of continental Europe got enmeshed in World War I. In fact, the book is an endless (and </span><i data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">ad nauseaum</span></i><span data-dcnode-id="2732" instrument_node="">) series of chapter-long mini-studies of a host of pre-WWI crises that convulsed Europe. Clark really doesn't get to the actual decision-making about WWI until the very end of the book, and then treats it as little different from the other crises.</span><br data-dcnode-id="2731"><br data-dcnode-id="2730"><span data-dcnode-id="2729" instrument_node="">Clark's theory is that foreign policy decision-making in the governments of Europe was diffus</span></span><span data-dcnode-id="2727" instrument_node="">
</span><span data-dcnode-id="2692" id="freeText17295657347720772385" style="display:none"><span data-dcnode-id="2726" instrument_node="">Theoretically, the book is about how the various governments of continental Europe got enmeshed in World War I. In fact, the book is an endless (and </span><i data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">ad nauseaum</span></i><span data-dcnode-id="2723" instrument_node="">) series of chapter-long mini-studies of a host of pre-WWI crises that convulsed Europe. Clark really doesn't get to the actual decision-making about WWI until the very end of the book, and then treats it as little different from the other crises.</span><br data-dcnode-id="2722"><br data-dcnode-id="2721"><span data-dcnode-id="2720" instrument_node="">Clark's theory is that foreign policy decision-making in the governments of Europe was diffuse, and many actors in each government had their fingers in the pie. Some of these actors were quite low-level, and yet were able to wield enormous power over decision-making. To support his thesis, Clark beats the dead horse about 1,000,000 times with endless case studies of crisis after pre-war crisis. Never does Clark show that these mini-crises had an influence on the crisis of July 1914, nor does he show that they locked in the diffuse decision-making processes that he documents so clearly.</span><br data-dcnode-id="2719"><br data-dcnode-id="2718"><span data-dcnode-id="2717" instrument_node="">Perhaps the best part of Clark's book are the early chapters on Serbia. His in-depth and eye-opening discussion of Serbian politics and Black Hand's role in it is excellent. The research is superb, the writing crystal clear, and the enormous cast of characters handled deftly. This section of the book is a terrific addition to WWI studies, for it makes sense out of much of what Serbia did during the July Crisis.</span><br data-dcnode-id="2716"><br data-dcnode-id="2715"><span data-dcnode-id="2714" instrument_node="">I can't say that Clark handles the rest of the book as well. Sometimes, it seems like he's merely name-dropping for the sake of name-dropping, and at other times he becomes so bogged down in relating </span><i data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">yet another crisis</span></i><span data-dcnode-id="2711" instrument_node=""> that you want to just flip 100 pages ahead to get on with the narrative.</span><br data-dcnode-id="2710"><br data-dcnode-id="2709"><span data-dcnode-id="2708" instrument_node="">My biggest problem with the book regards its central thesis: Clark implies repeatedly that the diffuse decision-making structures of pre-war Europe dragged the continent into war. But, quite frankly, my perception of his research and other histories of Europe throughout the 19th and 20th centuries is that </span><b data-dcnode-id="2703"><span data-dcnode-id="2707" instrument_node="">
</span><i data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">this has always been the case.</span></i><span data-dcnode-id="2704" instrument_node="">
</span></b><span data-dcnode-id="2702" instrument_node=""> It's nothing new. Clark implies it is new; indeed, he seems to feel it is something so radically different that it is worth delving deeply into it and devoting several hundred pages to it. But Clark never establishes that it was new, and never addresses the common conclusion that it continued long after the war (and continues to this day). </span><br data-dcnode-id="2701"><br data-dcnode-id="2700"><span data-dcnode-id="2699" instrument_node="">Clark is probably right that diffuse decison-making dragged Europe into war. But so what? Diffuse decision-making structures have been part of governmental processes for millenia. Why is this different now, in World War I? Although Clark shows that diffuse decision-making structures were nothing new and existed for decades prior to WWI, he never says that they worsened (which is why war broke out), or got better (which is why war broke out), or that they got locked in by decades of use (which is why war broke out). I came away from the book with the feeling "guns kill people". Why, yes -- yes, they do. And diffuse decision-making leads to crisis and war. Yes, yes, it does. So?</span><br data-dcnode-id="2698"><br data-dcnode-id="2697"><span data-dcnode-id="2696" instrument_node="">One final complaint: Many reviewers bad-mouth Barbara Tuchman's </span><i data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">The Guns of August</span></i><span data-dcnode-id="2693" instrument_node=""> and compare it unfavorably to Clark's book. Ignore those reviews. Clark is a decent academic writer, but his prose is mediocre for the most part (and often dense, dull, and boring at its worst). Tuchman is eminently more readable, and nothing in Clark's book shows that her factual recounting of the events leading up to World War I is incorrect.</span></span><span data-dcnode-id="2691" instrument_node="">

</span><span data-dcnode-id="2598" id="freeTextContainer18029089078075033583"><span data-dcnode-id="2602" instrument_node="">No review could do this work justice, so this will have to suffice. Clark's book is an exhaustive and intriguing history of the war’s origins and outbreak. Clark’s story is meticulously detailed and quite dense, but still readable. Still, this is not for the casual reader: the narrative requires some concentration. You’ll get bogged down in a lot of parts, but I think it’s worth it.</span><br data-dcnode-id="2601"><br data-dcnode-id="2600"><span data-dcnode-id="2599" instrument_node="">Clark’s coverage of the European alliance system is particularly good. He gives us a readable account of all their </span></span><span data-dcnode-id="2597" instrument_node="">
</span><span data-dcnode-id="2583" id="freeText18029089078075033583" style="display:none"><span data-dcnode-id="2596" instrument_node="">No review could do this work justice, so this will have to suffice. Clark's book is an exhaustive and intriguing history of the war’s origins and outbreak. Clark’s story is meticulously detailed and quite dense, but still readable. Still, this is not for the casual reader: the narrative requires some concentration. You’ll get bogged down in a lot of parts, but I think it’s worth it.</span><br data-dcnode-id="2595"><br data-dcnode-id="2594"><span data-dcnode-id="2593" instrument_node="">Clark’s coverage of the European alliance system is particularly good. He gives us a readable account of all their motivations, interests and policies. Clark gives us a good account of the development of the various secret alliances among the European powers, relating to it the role of the governments, the presses, the diplomats, and the military establishments.</span><br data-dcnode-id="2592"><br data-dcnode-id="2591"><span data-dcnode-id="2590" instrument_node="">Clark also shows what the various secret alliances meant on paper and how they functioned in reality. They were pretty insecure, and never offered any of the powers a true sense of security. He also examines all of the fateful decisions made during the run-up to to the war. Many of them seem pretty dumb when examined on their own, but Clark places them in context so that they all make a perverse sense.</span><br data-dcnode-id="2589"><br data-dcnode-id="2588"><span data-dcnode-id="2587" instrument_node="">If I had one problem, it was the title. The whole “sleepwalkers” concept is a little lame. Supposedly it is a counterbalance to the thesis of Europe being a tinderbox waiting to explode, but is there really that much difference? Clark fails to make solid case for this, but the book is so exhaustive that you forget what his thesis is, anyway.</span><br data-dcnode-id="2586"><br data-dcnode-id="2585"><span data-dcnode-id="2584" instrument_node="">I don’t think anybody “slept-walked” into war. The years leading up to 1914 was full of crises, threats, war talk, war preparations, and proxy wars. In fact, there were so many indirect conflicts that the European powers were desensitized: they thought the war of 1914 would be just another short war.</span></span><span data-dcnode-id="2582" instrument_node="">

</span><a class="reviewDate createdAt right" data-dcnode-id="2528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/594513062%3Fbook_show_action%3Dtrue"><span data-dcnode-id="2529" instrument_node="">Apr 19, 2013</span></a><span data-dcnode-id="2527" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2514" title="really liked it"><span class="staticStar p10" data-dcnode-id="2519" size="15x15"><span data-dcnode-id="2520" instrument_node="">really liked it</span></span><span class="staticStar p10" data-dcnode-id="2518" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2517" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2516" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2515" size="15x15"></span></span><span data-dcnode-id="2513" instrument_node="">

</span><div class="reviewText stacked" data-dcnode-id="2437"><span data-dcnode-id="2510" instrument_node="">
</span><span class="readable" data-dcnode-id="2439" id="reviewTextContainer594513062"><span data-dcnode-id="2509" instrument_node="">
</span><span data-dcnode-id="2507" id="freeTextContainer15242189350222037922"><span data-dcnode-id="2508" instrument_node="">As Clark points out in his Introduction, historians started debating the cause of the First World War even before it began! For it did seem inevitable to many at the time, although the eventual scope – resulting eventually in the mobilization of 65 million troops and ending with the destruction of three empires, 20 million military and civilian deaths, and 21 million more wounded, was unanticipated. Clark notes that while a few leaders warned of “Armageddon” and a “war of extermination” and “the</span></span><span data-dcnode-id="2506" instrument_node="">
</span><span data-dcnode-id="2444" id="freeText15242189350222037922" style="display:none"><span data-dcnode-id="2505" instrument_node="">As Clark points out in his Introduction, historians started debating the cause of the First World War even before it began! For it did seem inevitable to many at the time, although the eventual scope – resulting eventually in the mobilization of 65 million troops and ending with the destruction of three empires, 20 million military and civilian deaths, and 21 million more wounded, was unanticipated. Clark notes that while a few leaders warned of “Armageddon” and a “war of extermination” and “the extinction of civilization”, they didn’t really believe it. They also made glib observations on the glory of arms. To this extent, he opines, “the protagonists of 1914 were sleepwalkers, watchful but unseeing, haunted by dreams, yet blind to the reality of the horror they were about to bring into the world.”</span><br data-dcnode-id="2504"><br data-dcnode-id="2503"><span data-dcnode-id="2502" instrument_node="">Clark bemoans the difficulties of sorting through the oceans of documents on the War to get to the real facts behind its genesis, and of separating history from historical revisionism, an inevitable result of any conflict in which the victors usually control most of the narratives. [He reminds us that our moral compass in our tendency to assign blame on the one hand, or perceive justified actions on the other, has shifted as well.] In addition, there are gaps in the records; the many “secret societies” involved did not keep records, nor did we have the benefit of someone smuggling an IPhone into their proceedings to record them for posterity.</span><br data-dcnode-id="2501"><br data-dcnode-id="2500"><span data-dcnode-id="2499" instrument_node="">Thus, Clark maintains that he is not going to get into </span><em data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">why</span></em><span data-dcnode-id="2496" instrument_node=""> the war happened; rather, his intention is more “to look closely at the sequences of interactions that produced certain outcomes.”</span><br data-dcnode-id="2495"><br data-dcnode-id="2494"><span data-dcnode-id="2493" instrument_node="">This distinction may sound like hair-splitting, but it does serve to allow him to concentrate his history on what actually happened rather than what didn’t happen or what might have happened, the last two “contingent” approaches characterizing a number of recent books about the Great War. On the other hand, he can’t really avoid talking about historical events and the international economic, social, and political situation of the time.</span><br data-dcnode-id="2492"><br data-dcnode-id="2491"><span data-dcnode-id="2490" instrument_node="">The “Sleepwalkers” of the title are the foreign policy decision makers of the major powers. Clark contends that they stumbled into the war, in part because they grossly misunderstood the motivations of the other principal actors. A sub-theme of the book is that the decision-making apparatuses of all the powers except France were diffuse and confused, without clear chains of command. They were all monarchies whose kings or emperors who were no longer absolute rulers, but who exerted an ill-defined amount of power on their countries’ foreign policies. [Nevertheless, the tendency of these rulers to consider prolonged vacations a divine right of office enabled their war ministers to work themselves up into frenzies of paranoia, champing at the bit to effect pre-emptive strikes.]</span><br data-dcnode-id="2489"><span data-dcnode-id="2488" instrument_node=""> </span><br data-dcnode-id="2487"><span data-dcnode-id="2486" instrument_node="">Clark calls the crisis of July 1914 the most complex event of modern times. Much modern scholarship of the War downplays the role of Serbia, implying that the prevailing confusing interlocking system of alliances was bound to produce a widespread conflict eventually. But Clark argues that in the aftermath of the Yugoslav wars of the 1990s, it is more difficult to envision Serbia as “a mere object or victim of great power politics and easier to conceive of Serbian nationalism as an historical force in its own right.” </span><br data-dcnode-id="2485"><br data-dcnode-id="2484"><span data-dcnode-id="2483" instrument_node="">Therefore, Clark begins his narrative not with the Sarajevo assassinations of 1914, but with the assassinations of Serbian King Alexander and Queen Draga in 1903. He observes:</span><br data-dcnode-id="2482"><br data-dcnode-id="2481"><span data-dcnode-id="2480" instrument_node="">"…the conspiratorial network that had come together to murder the royal family did not simply melt away, but remained an important force in Serbian politics and public life.” </span><br data-dcnode-id="2479"><br data-dcnode-id="2478"><span data-dcnode-id="2477" instrument_node="">That network (sometimes known as the “Black Hand”) was still extant in 1908 when Austria-Hungary inflamed Serbian resentment by annexing the formerly Ottoman provinces of Bosnia and Herzegovina. Thus were Belgrade’s aspirations to creating a “Greater Serbia” dashed. The Serbian public was furious, and a new mass movement grew sprang up overnight “powered by this wave of outrage.” This dangerous dynamic in Serbian society still obtained when the unlucky Archduke Francis Ferdinand came visiting the newly absorbed provinces on June 28, 1914.</span><br data-dcnode-id="2476"><br data-dcnode-id="2475"><span data-dcnode-id="2474" instrument_node="">The archduke was murdered in Austrian territory. So what was the role of the Serbian government of Prime Minister Nikola Pašić? Although the Black Hand was not an official organ of the Serbian state, Clark concludes, “It is virtually certain that Pašić was informed of the [assassination] plan in some detail.” The government of Austria-Hungary was understandably incensed by the murder, but was unable to prove Serbian government complicity in the immediate aftermath. Nevertheless, key Austrian decision-makers determined that only a military response would do. The Austrian reaction set in motion the immensely complicated series of diplomatic and military maneuvers (such as making sure that Germany was on board) that ultimately resulted in the outbreak of World War I five weeks later.</span><br data-dcnode-id="2473"><br data-dcnode-id="2472"><span data-dcnode-id="2471" instrument_node="">A simplistic description of the war as a conflict between the Triple Alliance (Germany, Austria-Hungary, and Italy) and the Triple Entente (Russia, France, and Great Britain) does not do justice to the complexities of interlocking alliances and “understandings” that bound the Great Powers to assist one another in the event of mobilization for armed conflict. </span><br data-dcnode-id="2470"><span data-dcnode-id="2469" instrument_node=""> </span><br data-dcnode-id="2468"><span data-dcnode-id="2467" instrument_node="">Clark assiduously describes this maze, stating:</span><br data-dcnode-id="2466"><span data-dcnode-id="2465" instrument_node=""> </span><br data-dcnode-id="2464"><span data-dcnode-id="2463" instrument_node="">"The chaotic interventions of monarchs, ambiguous relationships between civil and military, adversarial competition among key politicians in systems characterized by low levels of ministerial or cabinet solidarity, compounded by the agitations of a critical mass press against a background of intermittent crisis and heightened tension over security issues made this a period of unprecedented uncertainty in international relations.”</span><br data-dcnode-id="2462"><br data-dcnode-id="2461"><span data-dcnode-id="2460" instrument_node="">Clark does not ascribe blame for the war. He says, “There is no smoking gun in this story; or, rather, there is one in the hands of every major character. Viewed in this light, the outbreak of war was a tragedy, not a crime.”</span><br data-dcnode-id="2459"><span data-dcnode-id="2458" instrument_node=""> </span><br data-dcnode-id="2457"><strong data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">Evaluation:</span></strong><span data-dcnode-id="2454" instrument_node=""> This is a long and densely packed history centering on the five weeks leading up to World War I. The emphasis is therefore on relatively minute events rather than sweeping generalizations about historical trends and long-festering causation. Nevertheless, the author includes a comprehensive background description of the military and diplomatic situation in each of the great powers. His description of numerous key individuals is masterful. To summarize this 550+ page account would take many more pages than is appropriate in a review. It is an excellent addition to the voluminous literature of the causes of World War I, but is probably not primarily for the casual reader looking for an overview of the War. </span><br data-dcnode-id="2453"><br data-dcnode-id="2452"><span data-dcnode-id="2451" instrument_node="">Moreover, I should note that his theory of “sleepwalkers” goes against the conviction of other WWI scholars, who tend to see the onset of WWI in a similar light as some analysts view the invasion of Iraq in 2003. Important policy makers wanted this war to happen, and the military-industrial complex supported their enthusiasm. The rest, as they say, is history.</span><br data-dcnode-id="2450"><br data-dcnode-id="2449"><strong data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">Note:</span></strong><span data-dcnode-id="2446" instrument_node=""> Maps, photos, and voluminous notes are included with the text.</span><br data-dcnode-id="2445"></span><span data-dcnode-id="2443" instrument_node="">
</span><a data-dcnode-id="2441" data-text-id="15242189350222037922" href="#" onclick="swapContent($(this));; return false;"><span data-dcnode-id="2442" instrument_node="">...more</span></a><span data-dcnode-id="2440" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2375" title="really liked it"><span class="staticStar p10" data-dcnode-id="2380" size="15x15"><span data-dcnode-id="2381" instrument_node="">really liked it</span></span><span class="staticStar p10" data-dcnode-id="2379" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2378" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2377" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2376" size="15x15"></span></span><span data-dcnode-id="2374" instrument_node="">

            Shelves:
              </span><a class="actionLinkLite" data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/27393403-nadia%3Fshelf%3Dbooks-i-own"><span data-dcnode-id="2372" instrument_node="">books-i-own</span></a><span data-dcnode-id="2370" instrument_node="">, 
              </span><a class="actionLinkLite" data-dcnode-id="2368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/27393403-nadia%3Fshelf%3Dww1"><span data-dcnode-id="2369" instrument_node="">ww1</span></a><span data-dcnode-id="2367" instrument_node="">

</span><span class="readable" data-dcnode-id="2300" id="reviewTextContainer3281840071"><span data-dcnode-id="2361" instrument_node="">
</span><span data-dcnode-id="2352" id="freeTextContainer17169179488937481971"><b data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">”A war between Austria and Serbia did not appear likely in the spring and summer of 1914. The mood in Belgrade was relatively calm in the spring of that year, reflecting the exhaustion and sense of satiation that followed the Balkan Wars.”</span></b><br data-dcnode-id="2358"><br data-dcnode-id="2357"><span data-dcnode-id="2356" instrument_node="">The Austrian declaration of war on Serbia was signed by emperor Franz Joseph on the morning of July 28th 1914. However, the chain of events that had steered Europe into the direction of war was of an incredibly complex nature.</span><br data-dcnode-id="2355"><br data-dcnode-id="2354"><span data-dcnode-id="2353" instrument_node="">The assassination in Sarajevo has b</span></span><span data-dcnode-id="2351" instrument_node="">
</span><span data-dcnode-id="2305" id="freeText17169179488937481971" style="display:none"><b data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">”A war between Austria and Serbia did not appear likely in the spring and summer of 1914. The mood in Belgrade was relatively calm in the spring of that year, reflecting the exhaustion and sense of satiation that followed the Balkan Wars.”</span></b><br data-dcnode-id="2348"><br data-dcnode-id="2347"><span data-dcnode-id="2346" instrument_node="">The Austrian declaration of war on Serbia was signed by emperor Franz Joseph on the morning of July 28th 1914. However, the chain of events that had steered Europe into the direction of war was of an incredibly complex nature.</span><br data-dcnode-id="2345"><br data-dcnode-id="2344"><span data-dcnode-id="2343" instrument_node="">The assassination in Sarajevo has been engraved in public memory as </span><i data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node=""> the </span></i><span data-dcnode-id="2340" instrument_node=""> trigger that pushed the European powers into a war of attrition, inevitable in nature. Christopher Clark challenges this notion, arguing that while the murders in Sarajevo were an important event that was used to create a pretext for war- it was not the major catalyst for the conflict. Contemporary political documents, such as the Matscheko memorandum, are surprisingly enough devoid of hints that </span><i data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">”Vienna regarded war - whether of the limited or more general variety - as imminent, necessary or desirable.”</span></i><br data-dcnode-id="2337"><br data-dcnode-id="2336"><span data-dcnode-id="2335" instrument_node="">The grand scale - not of the conflict itself but of its origin and causes- can be grasped when one considers that half of the book is devoted to issues with roots in the late 19th century and early 20th century, not at all related to what we primarily view as the causes for the Great War. The assassination of Franz Ferdinand and his wife is mentioned in depth for the first time on page 367.</span><br data-dcnode-id="2334"><br data-dcnode-id="2333"><span data-dcnode-id="2332" instrument_node="">Clark paints a picture of a Europe in the early beginning of the twentieth century. A shattered landscape where political intrigue was to be found in every corner. While the débris of eras long gone, such as autocratic monarchies and old-world diplomacy was still much present, he makes the claim that the war was not the result of </span><i data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">"a long-run deterioration"</span></i><span data-dcnode-id="2329" instrument_node=""> - but rather a consequence of </span><i data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">"short-term shocks to the international system."</span></i><span data-dcnode-id="2326" instrument_node=""> The war made its entrance suddenly; in the spring of 1914 two future enemies were planning an exchange of prisoners and relations between Vienna and Belgrade were slightly warming up.</span><br data-dcnode-id="2325"><br data-dcnode-id="2324"><span data-dcnode-id="2323" instrument_node="">The Balkans in pre-war Europe were an intricate and tangled political landscape. The regicide of 1903 had installed former conspirators at the political forefront and the nation’s democracy was fragile, nationalistic currants running amok. The Austrian annexation of Bosnia in 1908 had created a rift in the Vienna-Belgrade relations. </span><i data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">The Sleepwalkers</span></i><span data-dcnode-id="2320" instrument_node=""> begins with detailed focus on the Balkans, and Serbia in particular. Clark discusses how the structure and attitude of the Serbian government towards the murders at Sarajevo and the lassitude towards the organisation and ideology that had orchestrated them was a reason for the agitated Austrian response. </span><i data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">”Perhaps, the Austrians really were demanding the impossible, namely that the official Serbia of the political map shut down the expansionist ethnic Serbia of irredentism. The problem was that the two were interdependent and inseparable.”</span></i><br data-dcnode-id="2317"><br data-dcnode-id="2316"><span data-dcnode-id="2315" instrument_node="">Each chapter is more or less a separate essay, discussing different sides of the origins of the Great War. The chapters are of varying quality, some more academic than others but overall they are well-written, detailed and provide important perspectives to the reader. Since the study is very focused, it allows for elaborate descriptions of international relations and foreign policies at the time. The book also manages to make the arguments and motivations of all key actors clear and understandable. The declarations of war or the somewhat illogical reactions from certain leaders and diplomats are explained in such a way that one begins to understand each and every one of their actions and why they decided to act in a certain manner and what it was that led them there.</span><br data-dcnode-id="2314"><br data-dcnode-id="2313"><span data-dcnode-id="2312" instrument_node="">While it is an excellent book on an immensely complex subject, the narrative can sometimes feel disorganised which is slightly confusing at times. The prose is fine but does at times get quite academic and sometimes very abstract. But on the other hand, is it possible to thoroughly analyze the origins of this conflict without the result being a complex one? The First World War and its mechanisms still perplexe historians to this day and to simplify it would not do the subject justice. Clark does say at the beginning of the book that the July crisis, to this day, is perhaps the most complex event of modern times.</span><br data-dcnode-id="2311"><br data-dcnode-id="2310"><span data-dcnode-id="2309" instrument_node="">The confusion that this intricate tangle of policies, alliances and events resulted in at the outbreak of war is illustrated well at the end of the book. </span><i data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">"As the great alliance blocs prepared for war, the intricate chain of events that had sparked the conflagration was swiftly lost from view."</span></i><span data-dcnode-id="2306" instrument_node=""> The discussion at the end of the book is quite interesting too, on whether it really is important to pin the blame on one, two or all of the actors involved. More interesting, and more rewarding is studying the mechanisms that allowed for the war to happen - which is exactly what Christopher Clark has done.</span></span><span data-dcnode-id="2304" instrument_node="">

</span><span data-dcnode-id="2211" id="freeTextContainer14519926285389327351"><span data-dcnode-id="2215" instrument_node="">A much quoted book (*) which seems to have been something of a landmark in the study of the causes of the Great War. The book concentrates solely on this and closes exactly as war is declared between all the parties. The book is well written and enjoyable to read despite its length with the known final declaration of war giving the book a clear end point and structure and adding a slightly "whodunit" type nature to the narrative. </span><br data-dcnode-id="2214"><br data-dcnode-id="2213"><span data-dcnode-id="2212" instrument_node="">One of Clark's key contentions is that in fact the story doesn't h</span></span><span data-dcnode-id="2210" instrument_node="">
</span><span data-dcnode-id="2184" id="freeText14519926285389327351" style="display:none"><span data-dcnode-id="2209" instrument_node="">A much quoted book (*) which seems to have been something of a landmark in the study of the causes of the Great War. The book concentrates solely on this and closes exactly as war is declared between all the parties. The book is well written and enjoyable to read despite its length with the known final declaration of war giving the book a clear end point and structure and adding a slightly "whodunit" type nature to the narrative. </span><br data-dcnode-id="2208"><br data-dcnode-id="2207"><span data-dcnode-id="2206" instrument_node="">One of Clark's key contentions is that in fact the story doesn't have the satisfactory ending of an Agatha Christie novel with a clear villain; in this he explicitly rejects the common view that the Germans were the key culprits and spreads blame widely across them, Austro-Hungary, France, Russia and especially Serbia (much less so England). </span><br data-dcnode-id="2205"><br data-dcnode-id="2204"><span data-dcnode-id="2203" instrument_node="">Clark's other central thesis is that far from being a pretence for the non Balkan powers to start a war the Balkans had very much become centre stage in European affairs and that the first two Balkan Wars (firstly a concerted attack on Ottoman territory and secondly a war among the aggressors to distribute the spoils) critically changed the political landscape. </span><br data-dcnode-id="2202"><br data-dcnode-id="2201"><span data-dcnode-id="2200" instrument_node="">Some critical factors here included: the alignment of Bulgaria with the French (due to loans) and Russian concerns about the Bulgarians advances close to the Dardanelles (both of which effectively crystallised their decision in a dilemma they were facing between whether to support Serbia or Bulgaria); the acceptance by France (as a way of firming up their alliance) that their understanding with Russia would include supporting them in actions arising from the Balkans and in exchange demanding that Russia strongly committed to a rapid mobilisation against Germany from the east in the event of war; the increasing strains on the dual empire of Austro Hungary meaning it lost its ability to easily partly mobilise; the growing distrust by them of the Serbians whose lack of any prosperous middle or upper class to support democracy meant their politicians were forced to espouse nationalistic ideals of a Greater Serbia (or face military or extremist overthrow) and who as a result were notoriously unwilling to deal with extremism. </span><br data-dcnode-id="2199"><br data-dcnode-id="2198"><span data-dcnode-id="2197" instrument_node="">Other key areas that Clark explores include: the polarization of Europe into twin main alliances which for various complex reasons got stronger and stronger; the complexity of foreign policy making in all the states split between Monarchs, government, military, ambassadors and central Foreign offices; that much of the pre war detente actually worsened the situation as it lead to countries panicking that their allies may switch sides and so look for ways to lock them in closer. </span><br data-dcnode-id="2196"><br data-dcnode-id="2195"><span data-dcnode-id="2194" instrument_node="">In terms of the declaration of war itself: for the Germans Clark argues that they were very aware that the triple Entente allies were much more likely to win a war in 5 years. Rather than this meaning they fought a preventative war now he argues that their logic was that the Russians also knew this and so would either not force a wider war over Serbia (in which case the Austro-Hungarians could afford to be aggressive) or if they did it would prove they were bent on war and so the Germans may as we'll fight it now; he argues for the Russians ( he admits with limited direct evidence) that their Dardanelles fixation and their view that the weakening of the Ottoman empire meant someone would occupy the straights soon meant they were prepared to risk all to back their chosen Balkan ally; France was sticking to the alliance and Balkan commitment it had made to the Russians - it believed the Germans would back down but if they didn't was prepared for war given that a Balkan cause for it would guarantee full Russian commitment and so divide German forces; the English he portrays as less bought in due to the invasion of Belgium (albeit the German decision to invade near to the critically important Channel ports increased British interests) but due to moral pressure from France who pointed out that as part of the Entente France had removed its Channel defenses so that Britain was morally obliged to defend France in this area.</span><br data-dcnode-id="2193"><br data-dcnode-id="2192"><span data-dcnode-id="2191" instrument_node="">Finally the "much-quoted" comment is not restricted to historical non-fiction: the book forms an important role in the Booker shortlisted </span><a data-dcnode-id="2189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/26046318.All_That_Man_Is" rel="nofollow noopener" title="All That Man Is by David Szalay"><span data-dcnode-id="2190" instrument_node="">All That Man Is</span></a><span data-dcnode-id="2188" instrument_node=""> by </span><a data-dcnode-id="2186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/1360792.David_Szalay" rel="nofollow noopener" title="David Szalay"><span data-dcnode-id="2187" instrument_node="">David Szalay</span></a><span data-dcnode-id="2185" instrument_node="">.</span></span><span data-dcnode-id="2183" instrument_node="">

</span><span data-dcnode-id="2099" id="freeTextContainer2151787388272571818"><span data-dcnode-id="2100" instrument_node="">July - August 2014 will mark the Centennial anniversary of the start of World War I. In commemoration, there will no doubt be a lot written and said about the Great War and how the world was changed in its wake. Professor Christopher Clark of the University of Cambridge has written a book entitled "The Sleepwalkers - How Europe Went to War in 1914." In it, Clark scrupulously details the decisions of major and minor actors leading up to the outbreak of war and does something generally ignored by </span></span><span data-dcnode-id="2098" instrument_node="">
</span><span data-dcnode-id="2090" id="freeText2151787388272571818" style="display:none"><span data-dcnode-id="2097" instrument_node="">July - August 2014 will mark the Centennial anniversary of the start of World War I. In commemoration, there will no doubt be a lot written and said about the Great War and how the world was changed in its wake. Professor Christopher Clark of the University of Cambridge has written a book entitled "The Sleepwalkers - How Europe Went to War in 1914." In it, Clark scrupulously details the decisions of major and minor actors leading up to the outbreak of war and does something generally ignored by historians writing about the Great War, that is he describes pre-war events in the Balkans, where the spark for the conflict ignited in the assassination of the heir to the Austrian throne, Franz Ferdinand. He also details Austria-Hungary’s relationship with its Balkan subjects and neighbors in the years leading up to war’s outbreak. Clark’s analysis covers vexing questions, like why Russia, so unprepared for war against its neighbors, would risk it all for Serbia? And why did Britain, for so long a neutral party to Continental conflicts, opt for an alliance with France and Russia, when it was so close to an alliance with Germany?</span><br data-dcnode-id="2096"><span data-dcnode-id="2095" instrument_node="">World War I resulted in more than fifteen million killed (military and civilian combined) or roughly two and a half times the current population of the state of Missouri. It is also blamed in part for increasing the spread of the influenza pandemic of 1918, which is estimated to have taken another fifty million lives worldwide. Add to that the collapse of monarchies in Russia, Austria-Hungary, Germany, and the Ottoman Empire; the subsequent rise of Fascism in Germany, Italy and Spain, and Communism in Russia. Without World War I there is no Second World War, no Nazis, no Holocaust, and no Cold War.</span><br data-dcnode-id="2094"><span data-dcnode-id="2093" instrument_node="">“The Sleepwalkers” “strives to understand the July Crisis of 1914 as a modern event, the most complex of modern times, perhaps of any time so far. It is concerned less with why the war happened than with how.” It is how the decisions made by the great powers that led to war that Clark skillfully teases out of the historical record. So much post war scholarship has centered on German war guilt. The German “Blank Check” supposedly gave its ally Austria-Hungary carte blanche to take whatever action it felt necessary in punishing Serbia, knowing that any punitive action was likely to provoke Russia. While its always satisfying to find a fulcrum upon which a story turns, it is just not possible in this case. The truth is that any of the major powers could have avoided war had they just opted out and in fact, as Clark details, most of the players moved purposefully towards the precipice. Russia suffered a 75% casualty rate among the 12 million soldiers it mobilized for battle. Would Russia, in retrospect, have been willing to sacrifice 9 million casualties, and the loss of its monarchy just to protect tiny Serbia? Would France have been willing to lose an estimated 4-5% of its total pre-war population to protect its ally Russia?</span><br data-dcnode-id="2092"><span data-dcnode-id="2091" instrument_node="">The final cost of World War I to society is difficult to grasp because the losses were just so staggering and it was The event that set the course for the rest of the Twentieth Century. “The Sleepwalkers” and other books confronting this momentous topic are vitally important because they shed much needed light on the ways in which decisions to send young people off to war come about, and they prompt us, the citizens in whose name such actions are taken, to consider the consequences in the present and projected far into the future.</span></span><span data-dcnode-id="2089" instrument_node="">
