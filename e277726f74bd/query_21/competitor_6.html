</span><span data-dcnode-id="2002" id="freeTextContainer4490613868467335106"><span data-dcnode-id="2006" instrument_node="">This exceptionally well-researched and scrupulously thoughtful book is not for the casual reader curious about the Great War. While the events described are certainly dramatic, Clark aims for the rigorous examination of causes, communications (and miscommunications) and diplomatic juggling rather than at drama or pulse-pounding narrative.</span><br data-dcnode-id="2005"><br data-dcnode-id="2004"><span data-dcnode-id="2003" instrument_node="">Even after reading this book, I cannot begin to summarize the war's causes within a brief review; in fact, that's part of Clark's point: he demonstrates time an</span></span><span data-dcnode-id="2001" instrument_node="">
</span><span data-dcnode-id="1993" id="freeText4490613868467335106" style="display:none"><span data-dcnode-id="2000" instrument_node="">This exceptionally well-researched and scrupulously thoughtful book is not for the casual reader curious about the Great War. While the events described are certainly dramatic, Clark aims for the rigorous examination of causes, communications (and miscommunications) and diplomatic juggling rather than at drama or pulse-pounding narrative.</span><br data-dcnode-id="1999"><br data-dcnode-id="1998"><span data-dcnode-id="1997" instrument_node="">Even after reading this book, I cannot begin to summarize the war's causes within a brief review; in fact, that's part of Clark's point: he demonstrates time and again how the causes of the conflict resist neat categorizations or clean assignments of blame. Among the involved parties, no one's motives were pure, few were unambiguously malicious. Confusion, uncertainty and unwillingness to challenge underlying assumptions fueled a conflict that ultimately proved uncontainable. </span><br data-dcnode-id="1996"><br data-dcnode-id="1995"><span data-dcnode-id="1994" instrument_node="">For me, the most frightening aspect of this book was its demonstration of the gulf between intentions and consequences, between reasonable expectations and unreasonable realities. If we could look back and see clean lines of demarcation between the innocent and the guilty, between the forward-thinking and the foolish, we might be able to hope that such a disaster may never happen again. But Clark doesn't allow us any such comfort; that which fogged our ancestors in the past continues to blind us in the present.</span></span><span data-dcnode-id="1992" instrument_node="">

</span><span data-dcnode-id="1896" id="freeText15879130566668433946" style="display:none"><span data-dcnode-id="1903" instrument_node="">"What were the causes of World War One?" is perhaps the most common question in both A level and first year undergraduate history exam papers. As with most questions of this type, there is no simple answer. There are, though, themes and hard facts and, in this book, the distinguished historian Christopher Clark unpicks the complex, often obscure and contradictory, events leading up to August 1914. </span><br data-dcnode-id="1902"><br data-dcnode-id="1901"><span data-dcnode-id="1900" instrument_node="">This is not an easy read, nor should it be. His thesis, including the enticing thought that German aggression and militarism was but one of the reasons, and certainly not the sole factor, behind the cataclysm, is argued with panache. </span><br data-dcnode-id="1899"><br data-dcnode-id="1898"><span data-dcnode-id="1897" instrument_node="">No one with power or influence was innocent, says Clark. Governments, diplomats, generals, journalists, all share the guilt of driving the continent to war. Confusion, not collusion; cock-up, not conspiracy. And, as ever, others paid the butcher's bill. Published on the cusp of the centenary of the war's outbreak, this is an important and sobering work which will be a standard text for more generations of those struggling to answer that age-old question.</span></span><span data-dcnode-id="1895" instrument_node="">

</span><span data-dcnode-id="1808" id="freeText6075826713412043940" style="display:none"><span data-dcnode-id="1815" instrument_node="">Re-read chapters 1 and 2 (on Serbian and Austro-Hungarian developments during 1870-1914) and the conclusion. Still amazed by Clark's skillful and meticulous treatment of this historical epoch. An excellent scholar, he is able to weave together all the political and historical details in an accessible narrative, offering a fresh light on a much debated topic.</span><br data-dcnode-id="1814"><br data-dcnode-id="1813"><span data-dcnode-id="1812" instrument_node="">In general, World War 1 was the outcome of a shared political culture, a multipolar landscape and interactivity between heavily armed power blocs which distrusted each other and were guided by low trust/high risk assessments and a lack of transparency. In other words, this disastrous war was not the outcome of one evil part (the Germans, the Russians, etc.) but a complex contingency.</span><br data-dcnode-id="1811"><br data-dcnode-id="1810"><span data-dcnode-id="1809" instrument_node="">I think we should appreciate Clark's nuanced and empirically driven approach - especially now with tensions running so high in the world regarding the Russian-Ukranian war.</span></span><span data-dcnode-id="1807" instrument_node="">

</span><span data-dcnode-id="1693" id="freeTextContainer3766692221394511017"><span data-dcnode-id="1718" instrument_node="">“</span><i data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">What are you?</span></i><span data-dcnode-id="1715" instrument_node="">”</span><br data-dcnode-id="1714"><br data-dcnode-id="1713"><span data-dcnode-id="1712" instrument_node="">“</span><i data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Bulgarian.</span></i><span data-dcnode-id="1709" instrument_node="">”</span><br data-dcnode-id="1708"><br data-dcnode-id="1707"><span data-dcnode-id="1706" instrument_node="">“</span><i data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">You are not Bulgarian. Fuck your father.</span></i><span data-dcnode-id="1703" instrument_node="">”</span><br data-dcnode-id="1702"><br data-dcnode-id="1701"><b data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">-	Repeated exchange between Crown Prince Alexandar of Serbia and Bulgars in Serb-occupied Macedonia during the First Balkan War</span></b><br data-dcnode-id="1698"><br data-dcnode-id="1697"><br data-dcnode-id="1696"><br data-dcnode-id="1695"><span data-dcnode-id="1694" instrument_node="">It had never occurred to me until reading this book how strange it is that the assassination of the archduke Franz Ferdinand of Austria-Hungary by an ultra-nationalist Serbian terrorist organization with close ties to the Serbian military and intelligence services—a shocking crime which elicited condemn</span></span><span data-dcnode-id="1692" instrument_node="">
</span><span data-dcnode-id="1633" id="freeText3766692221394511017" style="display:none"><span data-dcnode-id="1691" instrument_node="">“</span><i data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">What are you?</span></i><span data-dcnode-id="1688" instrument_node="">”</span><br data-dcnode-id="1687"><br data-dcnode-id="1686"><span data-dcnode-id="1685" instrument_node="">“</span><i data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Bulgarian.</span></i><span data-dcnode-id="1682" instrument_node="">”</span><br data-dcnode-id="1681"><br data-dcnode-id="1680"><span data-dcnode-id="1679" instrument_node="">“</span><i data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">You are not Bulgarian. Fuck your father.</span></i><span data-dcnode-id="1676" instrument_node="">”</span><br data-dcnode-id="1675"><br data-dcnode-id="1674"><b data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">-	Repeated exchange between Crown Prince Alexandar of Serbia and Bulgars in Serb-occupied Macedonia during the First Balkan War</span></b><br data-dcnode-id="1671"><br data-dcnode-id="1670"><br data-dcnode-id="1669"><br data-dcnode-id="1668"><span data-dcnode-id="1667" instrument_node="">It had never occurred to me until reading this book how strange it is that the assassination of the archduke Franz Ferdinand of Austria-Hungary by an ultra-nationalist Serbian terrorist organization with close ties to the Serbian military and intelligence services—a shocking crime which elicited condemnation and expressions of sympathy from around the world and nose-thumbing jubilation among the people and press organs of Serbia and Russia—ignited a war in which most of Europe, as well as the United States three years later, sided </span><i data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">against</span></i><span data-dcnode-id="1664" instrument_node=""> Austria-Hungary and on the side of Serbia. </span><br data-dcnode-id="1663"><br data-dcnode-id="1662"><span data-dcnode-id="1661" instrument_node="">That’s some bullshit, if you ask me; especially when one considers why the murders at Sarajevo were carried out in the first place. The archduke was targeted not because he was a tyrant, but because he was a prospective reformer. He wanted to restructure the federalist system of the empire to give greater autonomy to national minorities—including Serbs—living within its borders. This was deemed a threat to the cause of Serbian irredentists who dreamed of a greater Serbian state that encompassed swathes of Bosnia-Herzegovina, which Austria-Hungary had annexed in 1908 after a long military occupation. As happens so often and so tragically, a symbol of moderation became an object of hatred for people determined to see the world in simple binaries of good and evil. </span><br data-dcnode-id="1660"><br data-dcnode-id="1659"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="1658" height="256" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1556156799i/27410232._SX540_.jpg&amp;raw" width="400"><br data-dcnode-id="1657"><br data-dcnode-id="1656"><span data-dcnode-id="1655" instrument_node="">[Archduke Franz Ferdinand and his wife Sophie leaving the Sarajevo city hall, minutes before the assassination.]</span><br data-dcnode-id="1654"><br data-dcnode-id="1653"><span data-dcnode-id="1652" instrument_node="">Perhaps due to my conservative proclivities, I’ve always been something of an Austrophile when it comes to European history. A staunchly Catholic empire with a Habsburg pedigree stretching back into the murky medieval past, standing guard at the eastern flank of Christendom and policing the liberal decadence of its western neighbors. A nation that was ruled by an EMPEROR, because kings and presidents are for chumps. My affinity makes the imaginary of Sarajevo, of the archduke’s gaudy plumed hat slipping off his head as he slumped in his seat mortally wounded by nineteen-year-old Gavrilo Princip, all the more pitiful. One gets the sense that it was not only a couple who were killed, but two of the last remaining figureheads of an old order that was soon to be borne away forever on tides of blood. </span><br data-dcnode-id="1651"><br data-dcnode-id="1650"><span data-dcnode-id="1649" instrument_node="">But despite our anachronistic biases, an assassination in Europe’s Balkan backwater was not enough of a shock, in and of itself, to ignite a continental war. As Christopher Clark demonstrates in this elaborate work of diplomatic history, the war emerged from a curious interplay of contingencies and inexorabilities. It wasn’t inevitable that the Sarajevo plot would succeed, but given the rabid anti-Austrian sentiment of the Serbian Karađorđević dynasty, which had reclaimed power after the grisly murders of Alexander I and Queen Draga of the pro-Austrian Obrenović family by a radical irredentist movement that subsequently formed the core of the new regime’s foreign policy establishment, it was highly likely that matters between Serbia and Austria-Hungary would have come to a head at some point anyway, just as they had between Serbia and its Ottoman and Bulgarian neighbors in 1912-13. </span><br data-dcnode-id="1648"><br data-dcnode-id="1647"><span data-dcnode-id="1646" instrument_node="">That Austria-Hungary’s declaration of war on Serbia became a tripwire for Russian and French intervention, which prompted German intervention, which eventually inspired British intervention, was largely the result of a long trend of realignment in the European state system, whereby over the preceding forty years the diplomatic structure of the continent transformed from a loose web of overlapping and interlocking bilateral agreements in a constant state of flux and ambiguity into a standoff between two fairly rigid power blocs: what we now call the Triple Entente and the Central Powers. </span><br data-dcnode-id="1645"><br data-dcnode-id="1644"><span data-dcnode-id="1643" instrument_node="">Following the political solidification of central Europe by way of German unification and Austro-Hungarian Balkan expansion, an isolated and recently-whipped France needed a permanent military ally that could credibly attack Germany from the east, thereby dividing the new empire’s superior might. They found one in Russia, with whom the Germans had just fatefully failed to renew a treaty, marking the abandonment of the Bismarckian policy of making (sometimes contradictory) treaty arrangements with nearly every sovereign state in Europe just so that France would have no one to sit with at lunch. </span><br data-dcnode-id="1642"><br data-dcnode-id="1641"><span data-dcnode-id="1640" instrument_node="">Britain got in on the Entente, ending a long period of aloofness from continental affairs, not because it saw a confluence of interests with France and Russia, but rather because the two countries were its primary colonial rivals in Africa and South Asia, respectively. It hoped to secure colonial accords from the two powers that would allow it to undergo a period of consolidation. Ironically, Russia had agreed to the Entente with France in the first place because, among other reasons, it feared that Britain would join the Triple Alliance (Germany, Austria-Hungary, Italy) and wanted to use France as a check that would force Britain to recall some of its forces to defend the home island in the event of an Anglo-Russian clash over Persia or Afghanistan. Germany and Austria-Hungary needed each other to counter Russia’s growing strength, but Germany also sought to use the alliance to inhibit potentially provocative Austro-Hungarian activity in the Balkans. The alliance blocs were founded on apprehension and mistrust; but this made them surprisingly durable, because member states were wary of forgoing their treaty obligations for fear of their vulnerability at the hands of their partners. </span><br data-dcnode-id="1639"><br data-dcnode-id="1638"><span data-dcnode-id="1637" instrument_node="">Austria-Hungary’s declaration of war on Serbia would not likely have prompted Russian intervention had Russia not exchanged its pan-Slavic patronage of Bulgaria for a similar one of Serbia after Bulgaria came worryingly close to gaining permanent control of Constantinople following the Balkan wars of 1912-13, which would have threatened Russia’s right of passage through the Turkish Straits, and thus its ability to project power in the eastern Mediterranean. This change of sponsorship would probably not have occurred if the Balkan Wars had not happened. The Balkan Wars probably would not have happened if the Italian invasion of Libya in 1911 had not exposed the weakness of the Ottoman Empire. Italy would probably not have invaded Libya if the French had not unilaterally seized control of Morocco earlier that year. And all of this could have been avoided if Hannibal had finished off the Romans after the battle of Cannae in 216 BCE. </span><br data-dcnode-id="1636"><br data-dcnode-id="1635"><span data-dcnode-id="1634" instrument_node="">But these things did happen, and in July 1914 my poor Austrians were caught between triggering a world war by punishing Serbia or doing nothing and consequently encouraging the irredentist movements that threatened to (literally) balkanize the empire. I can’t confidently say I wouldn’t have made the same decision if I were in their shoes. Even Montenegro was talking shit.</span></span><span data-dcnode-id="1632" instrument_node="">

</span><span data-dcnode-id="1548" id="freeTextContainer17489170172897289112"><span data-dcnode-id="1552" instrument_node="">On June 28, 1914, the Bosnian Serb Gavrilo Princip assassinated Archduke Franz Ferdinand, heir to the Austro-Hungarian Empire. One month later, World War I began. It caused 20 million deaths and ended three empires.</span><br data-dcnode-id="1551"><br data-dcnode-id="1550"><span data-dcnode-id="1549" instrument_node="">The Unification or Death movement, which was gaining momentum in Serbia, planned the murder. The Austro-Hungarian Empire construed it as an attack on its very existence because Emperor Franz Joseph I was already 83 years old. A harsh ten-point ultimatum followed. Backed by Russia, Ser</span></span><span data-dcnode-id="1547" instrument_node="">
</span><span data-dcnode-id="1521" id="freeText17489170172897289112" style="display:none"><span data-dcnode-id="1546" instrument_node="">On June 28, 1914, the Bosnian Serb Gavrilo Princip assassinated Archduke Franz Ferdinand, heir to the Austro-Hungarian Empire. One month later, World War I began. It caused 20 million deaths and ended three empires.</span><br data-dcnode-id="1545"><br data-dcnode-id="1544"><span data-dcnode-id="1543" instrument_node="">The Unification or Death movement, which was gaining momentum in Serbia, planned the murder. The Austro-Hungarian Empire construed it as an attack on its very existence because Emperor Franz Joseph I was already 83 years old. A harsh ten-point ultimatum followed. Backed by Russia, Serbia equivocally acceded to nine of the ten points but couldn’t agree to “the participation of Austrian officials in the prosecution of implicated persons” as this touched upon its sovereignty. And the war began.</span><br data-dcnode-id="1542"><br data-dcnode-id="1541"><span data-dcnode-id="1540" instrument_node="">However, this is only a tiny portion of what happened. In </span><i data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">The Sleepwalkers</span></i><span data-dcnode-id="1537" instrument_node="">, Christopher Clark attempts to explain the backdrop against which this intricate conflict developed.</span><br data-dcnode-id="1536"><br data-dcnode-id="1535"><span data-dcnode-id="1534" instrument_node="">It was a time of widespread irredentism and chauvinism, fluid political alliances, distrust, and paranoia. Numerous European countries were engaged in a pissing contest to see who could conscript the most soldiers or build the most war machines. To avoid unfavorable wars, major powers were contemplating preventive wars. And everybody believed that the others were to blame.</span><br data-dcnode-id="1533"><br data-dcnode-id="1532"><span data-dcnode-id="1531" instrument_node="">But who was to blame in the end? One of the book’s main ideas is that looking for a culprit is meaningless. The author explores in detail the points of view of the key players. They all had their share of reasons, ulterior motives, blunders, misjudgments, and questionable beliefs. They were all “sleepwalkers, watchful but unseeing, haunted by dreams, yet blind to the reality of the horror they were about to bring to the world.”</span><br data-dcnode-id="1530"><br data-dcnode-id="1529"><span data-dcnode-id="1528" instrument_node="">Could the war have been avoided? Maybe. But it wasn’t. It took place and the lives of many. It showed that bad events can escalate into disasters. And that the world is far too complex for reliable predictions to be made.</span><br data-dcnode-id="1527"><br data-dcnode-id="1526"><span data-dcnode-id="1525" instrument_node="">All in all, </span><i data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">The Sleepwalkers</span></i><span data-dcnode-id="1522" instrument_node=""> is a book worth reading. It tackles problems with eternal relevance. There will always be conflicts and opposing perspectives, and we are not going to stop making emotional decisions anytime soon. Maybe we’ll never fully agree with Falstaff that “honor is a mere scutcheon.” But let’s at least learn from past mistakes and try to avoid them in the future.</span></span><span data-dcnode-id="1520" instrument_node="">

</span><span data-dcnode-id="1436" id="freeTextContainer9713817888574769763"><span data-dcnode-id="1437" instrument_node="">For many reasons I prefer the more contemporary historical books and this I have just read confirms this preference. The main positive thing is their attention to detail and the need of their writers to present as much data is possible about the causes that led to the historical events described. In this book, the author does a very good job in this area, showing us all the underlying causes that led to the beginning of the World War I. For example, to talk about the murder of Franz Ferdinand, h</span></span><span data-dcnode-id="1435" instrument_node="">
</span><span data-dcnode-id="1424" id="freeText9713817888574769763" style="display:none"><span data-dcnode-id="1434" instrument_node="">For many reasons I prefer the more contemporary historical books and this I have just read confirms this preference. The main positive thing is their attention to detail and the need of their writers to present as much data is possible about the causes that led to the historical events described. In this book, the author does a very good job in this area, showing us all the underlying causes that led to the beginning of the World War I. For example, to talk about the murder of Franz Ferdinand, he goes a long way back to the beginning of the Serbian state's existence and the processes within it that led to the creation of nationalist groups that caused political upheaval and in the end were behind this murder. The second element I like in modern historical books is the fact that their writers try to challenge some things that are considered given. In this book we have the questioning of the belief that war was inevitable, with most sides eager to start it, something that is done by reference to many historical facts.</span><br data-dcnode-id="1433"><br data-dcnode-id="1432"><span data-dcnode-id="1431" instrument_node="">These are contained in a book that contains so much data for the days and more generally for the era before the beginning of the World War I to create a more than complete picture of all these things that ultimately brought the destruction. From the political goals of the participating countries, to the psychology of their peoples presenting through the press and from the struggles between the doves and the hawks of the European political scene, to the historical facts that were the background to this situation, all what a reader interested in the subject may want to learn is on these many pages. The only omission I can detect is the relatively small reference to military data, military plans, the strength of the armies and technological developments, but this was rather the choice of the author to focus more on politics, which was the more substantial thing.</span><br data-dcnode-id="1430"><br data-dcnode-id="1429"><span data-dcnode-id="1428" instrument_node="">Για πολλούς λόγους προτιμώ περισσότερο τα σύγχρονα ιστορικά βιβλία και αυτό που μόλις διάβασα επιβεβαιώνει αυτήν την προτίμησή μου. Το βασικότερο θετικό στοιχείο ποιος είναι η προσοχή τους στη λεπτομέρεια και η ανάγκη των συγγραφέων τους να παρουσιάσουν όσο πιο αναλυτικά μπορούν τις αιτίες που οδήγησαν στα ιστορικά γεγονότα που περιγράφονται. Σε αυτό το βιβλίο ο συγγραφέας κάνει πολύ καλή δουλειά σε αυτόν τον τομέα, δείχνοντάς μας όλες τις βαθύτερες αιτίες που οδήγησαν στην έναρξη του πρώτου Παγκοσμίου Πολέμου. Για παράδειγμα για να μιλήσει για την δολοφονία του Franz Ferdinand μας πηγαίνει πολύ πίσω, στην αρχή της ύπαρξής του σερβικού κράτους και στις διεργασίες εντός του που οδήγησαν στην δημιουργία εθνικιστικών ομάδων που προκαλούσαν πολιτικές αναταραχές και στο τέλος βρισκόταν πίσω από αυτήν την δολοφονία. Το δεύτερο στοιχείο που μου αρέσει στα σύγχρονα ιστορικά βιβλία είναι το γεγονός ότι οι συγγραφείς τους προσπαθούν να αμφισβητήσουν κάποια πράγματα που θεωρούνται δεδομένα. Σε αυτό το βιβλίο έχουμε την αμφισβήτηση της πεποίθησης ότι ο πόλεμος ήταν αναπόφευκτος, με τις περισσότερες πλευρές να ανυπομονούν να ξεκινήσει, κάτι που γίνεται με την αναφορά σε πολλά ιστορικά δεδομένα.</span><br data-dcnode-id="1427"><br data-dcnode-id="1426"><span data-dcnode-id="1425" instrument_node="">Αυτά περιέχονται σε ένα βιβλίο που περιέχει τόσα πολλά δεδομένα για τις μέρες και γενικότερα για την εποχή πριν από την έναρξη του πρώτου Παγκοσμίου Πολέμου ώστε να δημιουργείται μία παραπάνω από ολοκληρωμένη εικόνα για όλα αυτά τα πράγματα που στο τέλος έφεραν την καταστροφή. Από τους πολιτικούς στόχους των κρατών που συμμετείχαν, μέχρι την ψυχολογία των λαών τους που παρουσιάζονταν μέσα από τον τύπο και από τις διαμάχες ανάμεσα στα περιστέρια και στα γεράκια της ευρωπαϊκής πολιτικής σκηνής, μέχρι τα ιστορικά δεδομένα που ήταν το φόντο σε αυτή την κατάσταση, όλα όσα μπορεί να θέλει να μάθει ένας αναγνώστης που τον ενδιαφέρει το συγκεκριμένο θέμα υπάρχουν μέσα σε αυτές τις πολλές σελίδες. Η μόνη παράλειψη που μπορώ να εντοπίσω είναι η σχετικά μικρή αναφορά στα στρατιωτικά δεδομένα, στα πολεμικά σχέδια, στη δύναμη των στρατών και στις τεχνολογικές εξελίξεις, αυτή, όμως, ήταν μάλλον επιλογή του συγγραφέα για να επικεντρωθεί περισσότερο στην πολιτική, κάτι που ήταν και το πιο ουσιαστικό.</span></span><span data-dcnode-id="1423" instrument_node="">

</span><span data-dcnode-id="1339" id="freeTextContainer1386628804705533053"><span data-dcnode-id="1343" instrument_node="">This was a fabulous history of the run-up to World War I. I must admit that I am a sucker for reading books about this period. It is like watching a slow developing train wreck over and over. Each time you think this time it will end differently but it never does.</span><br data-dcnode-id="1342"><br data-dcnode-id="1341"><span data-dcnode-id="1340" instrument_node="">The ideal thing about this book is that it places all of the figures in their bureaucratic process so that what looks like a really dumb decision seems logical in context. He cites ample evidence to support these points. Other authors w</span></span><span data-dcnode-id="1338" instrument_node="">
</span><span data-dcnode-id="1327" id="freeText1386628804705533053" style="display:none"><span data-dcnode-id="1337" instrument_node="">This was a fabulous history of the run-up to World War I. I must admit that I am a sucker for reading books about this period. It is like watching a slow developing train wreck over and over. Each time you think this time it will end differently but it never does.</span><br data-dcnode-id="1336"><br data-dcnode-id="1335"><span data-dcnode-id="1334" instrument_node="">The ideal thing about this book is that it places all of the figures in their bureaucratic process so that what looks like a really dumb decision seems logical in context. He cites ample evidence to support these points. Other authors with more conventional outlooks and point to the inevitably of the war also cite evidence, but to anyone who has spent a career on foreign policy issues, this authors views resonate more clearly. In some ways he refutes elements of Massie's Dreadnoughts and Tuchman's The Guns of August.</span><br data-dcnode-id="1333"><br data-dcnode-id="1332"><span data-dcnode-id="1331" instrument_node="">An example of this is traditional histories mention the Austro-Hungarian demarches to the Serbs as something no country could submit to. They also say that nonetheless the Austrian demarche was far milder than the demarche made by NATO at Rambouillet. Moreover, the Serb "acceptance" was a cleverly written document that accepted nothing. </span><br data-dcnode-id="1330"><br data-dcnode-id="1329"><span data-dcnode-id="1328" instrument_node="">I could go on and on about this, but if you are interested in this period of time or the Balkans, put it on your bookshelf.</span></span><span data-dcnode-id="1326" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/55218146-alexandru%3Fshelf%3Dhistory"><span data-dcnode-id="1255" instrument_node="">history</span></a><span data-dcnode-id="1253" instrument_node="">

</span><span data-dcnode-id="1245" id="freeTextContainer1683372602582706745"><span data-dcnode-id="1246" instrument_node="">The Sleepwalkers is an excellent history book about the origins of the First World War. The book starts with the assassination of Serbia's king Alexander I by a radical group which would later form the core of the Black Hand organisation and ends with the declarations of war triggering the First World War. The author goes all the way back to the XIXth century and examines the various events, crises and interactions between the great powers that set the stage for the war. The focus is on the grea</span></span><span data-dcnode-id="1244" instrument_node="">
</span><span data-dcnode-id="1204" id="freeText1683372602582706745" style="display:none"><span data-dcnode-id="1243" instrument_node="">The Sleepwalkers is an excellent history book about the origins of the First World War. The book starts with the assassination of Serbia's king Alexander I by a radical group which would later form the core of the Black Hand organisation and ends with the declarations of war triggering the First World War. The author goes all the way back to the XIXth century and examines the various events, crises and interactions between the great powers that set the stage for the war. The focus is on the great powers of Russia, Austria-Hungary, France, Britain and Germany but also on the politics involving Serbia and Bulgaria.</span><br data-dcnode-id="1242"><br data-dcnode-id="1241"><span data-dcnode-id="1240" instrument_node="">The book also looks at the political organisation of each of the major powers in order to allow for a better understanding about who was actually making the decisions and controlling the foreign policies. This is especially important because the popular view is that the Tsar or the Kaiser directed their countries' foreign policy. However, this was not always the case. </span><br data-dcnode-id="1239"><br data-dcnode-id="1238"><span data-dcnode-id="1237" instrument_node="">In Russia, the Tsar had lost control of the foreign policy after the debacle of the Russo-Japanese war. In Germany the Kaiser was seen as a buffoon and many times the ministers ignored his erratic orders. it was mainly the chancellor and foreign minister that decided on the foreign policy. In France, the ambassadors had a lot of power in deciding the foreign policy, sometimes even more than the foreign minister. But it was the President Raymond Poincare who actually groomed all of the foreign ministers and prime ministers and decided the foreign orientation.</span><br data-dcnode-id="1236"><br data-dcnode-id="1235"><span data-dcnode-id="1234" instrument_node="">The author goes to great lengths to show that the war was not necessary a foregone conclusion. There had been indeed several previous crises where war had been averted at the last minute. There were pro-war and pacifist factions in each country and there was a constant struggle between these parties. This was especially true in Austria where the Archduke Franz Ferdinand headed the pacifist party. It wasn't at all certain until the very last moment that war would break out. In fact, the Serbians were initially prepared to accept the Austrian ultimatum and this would have ended the crisis. However, the changed their position after Russia expressed their unconditional support.</span><br data-dcnode-id="1233"><br data-dcnode-id="1232"><span data-dcnode-id="1231" instrument_node="">The major events and crises leading up to World War I include:</span><br data-dcnode-id="1230"><br data-dcnode-id="1229"><span data-dcnode-id="1228" instrument_node="">- the Russo-Japanese war of 1904-1905 - Russia is defeated by Japan, losing its fleet and causing a change of the Russian empire's outlook away from the Far East. Russia shifted it's focus from Asia to Europe and the Balkans for better avenues of expansion.</span><br data-dcnode-id="1227"><span data-dcnode-id="1226" instrument_node="">- the Bosnian crisis of 1908 - Austria-Hungary formally annexed Bosnia after having occupied it in 1878. Austria's actions severely damaged its relations with Serbia, Italy and Russia.</span><br data-dcnode-id="1225"><span data-dcnode-id="1224" instrument_node="">- the Agadir crisis of 1911 -the French deployed troops in Morocco and turned the country into a Franco-Spanish protectorate. The Germans deployed a gunboat in response.</span><br data-dcnode-id="1223"><span data-dcnode-id="1222" instrument_node="">- the Italo-Turkish War of 1911-1912 - Italy defeated the Ottomans and occupied Libya. This damaged the European balance of power and convinced the Balkan states that the Ottomans are weak and can be defeated.</span><br data-dcnode-id="1221"><span data-dcnode-id="1220" instrument_node="">- the First Balkan War of 1912 - 1913 - Supported by Russia, Serbia and Bulgaria agreed to an alliance against the Ottomans. Eventually Greece and Montenegro joined the alliance known as the Balkan League. Together they defeated the Ottomans. However, several issues were created by the war such as the Bulgarians almost managing to reach Constantinople and the Serbians refusing to cede parts of Macedonia to Bulgaria as agreed before the war.</span><br data-dcnode-id="1219"><span data-dcnode-id="1218" instrument_node="">- the Second Balkan War 1913 - Bulgaria attacked Serbia, Greece and the Ottomans but was defeated when Romania entered the war and the Treaty of Bucharest is signed </span><br data-dcnode-id="1217"><span data-dcnode-id="1216" instrument_node="">- the Albanian crisis of 1913 - after the Balkan wars the Serbians and Montenegrins refused to retreat from Albania. Austria gave the Serbs an ultimatum and they eventually retreated. This created a dangerous precedent when it came to ultimatums.</span><br data-dcnode-id="1215"><span data-dcnode-id="1214" instrument_node="">- the Liman affair of 1913 - ever since the late XIXth century Germany had started providing financial and military aid to the Ottomans. The German general Liman von Sanders was sent in 1913 in order to train but also command the Ottoman army in Constantinople. This provoked a major increase in tensions with Russia who saw this as a threat.</span><br data-dcnode-id="1213"><br data-dcnode-id="1212"><span data-dcnode-id="1211" instrument_node="">It is interesting that all of the major decision makers believed that they were forced by external factors into war. The Austrians believed that they were forced by the Serbians unsatisfactory response to the ultimatum. The Russians believed that they were forced by the Austrian mobilization, even though the mobilization was only aimed towards Serbia. The Germans believed that they were forced by the Russian mobilization, even though initially this was just a partial mobilization. The French and the British believed that they were forced by the Germans. This belief made it easier for the leaders to send their countries into war because they felt that they were not the ones initiating it and that they were responding to an external attack.</span><br data-dcnode-id="1210"><br data-dcnode-id="1209"><span data-dcnode-id="1208" instrument_node="">The book is very informative and is almost exhaustive on the subject. It is worth reading for anyone interested in the origins of the First World War. However, due to the fact that there is a lot of diplomatic negotiations and political machinations it can be a bit dry at times. Would have liked if the end included another chapter about the actual start of the war. The ending actually felt a bit rushed, especially the declarations of war were a bit glossed over. </span><br data-dcnode-id="1207"><br data-dcnode-id="1206"><span data-dcnode-id="1205" instrument_node="">Also, there is very limited information about smaller countries such as Greece, Montenegro or Romania and even the Ottomans. We only find out bits about them when one of the great powers briefly interact with them or when they are involved in some of the crises.</span></span><span data-dcnode-id="1203" instrument_node="">

</span><span class="readable" data-dcnode-id="1028" id="reviewTextContainer3850167425"><span data-dcnode-id="1100" instrument_node="">
</span><span data-dcnode-id="1089" id="freeTextContainer8112605659221525396"><span data-dcnode-id="1099" instrument_node="">Christopher Clark is a contrarian and enjoys it. He likes writing histories that undermine what people think of a given topic. That’s what he did to Prussia in </span><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/4999.Iron_Kingdom_The_Rise_and_Downfall_of_Prussia__1600_1947" rel="nofollow noopener" title="Iron Kingdom The Rise and Downfall of Prussia, 1600–1947 by Christopher Clark"><span data-dcnode-id="1098" instrument_node="">Iron Kingdom</span></a><span data-dcnode-id="1096" instrument_node="">, a book that seems set to become the standard account of Prussia. And here he applies it to the start of the First World War. And if this book doesn’t assume the same role for the topic that </span><i data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Iron Kingdom</span></i><span data-dcnode-id="1093" instrument_node=""> did for Prussia, that’s only because there are so many books on this topic already in existence.</span><br data-dcnode-id="1092"><br data-dcnode-id="1091"><span data-dcnode-id="1090" instrument_node="">What separates this book fr</span></span><span data-dcnode-id="1088" instrument_node="">
</span><span data-dcnode-id="1033" id="freeText8112605659221525396" style="display:none"><span data-dcnode-id="1087" instrument_node="">Christopher Clark is a contrarian and enjoys it. He likes writing histories that undermine what people think of a given topic. That’s what he did to Prussia in </span><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/4999.Iron_Kingdom_The_Rise_and_Downfall_of_Prussia__1600_1947" rel="nofollow noopener" title="Iron Kingdom The Rise and Downfall of Prussia, 1600–1947 by Christopher Clark"><span data-dcnode-id="1086" instrument_node="">Iron Kingdom</span></a><span data-dcnode-id="1084" instrument_node="">, a book that seems set to become the standard account of Prussia. And here he applies it to the start of the First World War. And if this book doesn’t assume the same role for the topic that </span><i data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Iron Kingdom</span></i><span data-dcnode-id="1081" instrument_node=""> did for Prussia, that’s only because there are so many books on this topic already in existence.</span><br data-dcnode-id="1080"><br data-dcnode-id="1079"><span data-dcnode-id="1078" instrument_node="">What separates this book from previous ones is that Clark focuses on the complex mix of factors that caused the actual outbreak of war. He is looking, as he puts it, for the how rather than the why. In truth, this is a very fine and often nonexistent distinction. If I’m explaining my broken nose, the how (I was walking too fast and tripped) is going to require the why (I was walking too fast) as part of the explanation. What he seems to mean though, is that he is not seeking to blame any one country so much as explain what caused the various nations to go to war. His contention is that the war has no simple explanation and can only be understood by looking at a wide array of interconnected considerations that cannot be simplified. To do that he looks at two aspects that are often overlooked:</span><br data-dcnode-id="1077"><span data-dcnode-id="1076" instrument_node="">1.	The Balkan situation and particularly Serbian terrorist activity.</span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">2.	The diplomatic structures and the actors taking part in them.</span><br data-dcnode-id="1073"><br data-dcnode-id="1072"><span data-dcnode-id="1071" instrument_node="">The Balkan section was probably his strongest. His goal here is to show that Sarajevo was neither a pretext for Austrian imperialism nor an unimportant sideshow to the main causes of the conflict. I’d say he makes a strong case for this. One thing he does very well that I don’t think anyone has done before is present Austria’s case for it. It’s genuinely shocking, when you think of it, how little consideration the Great Powers took for Austria’s concerns. They all speak of Austria as a decaying nation whose breakup into ethnic nations is both inevitable and just, and as such they focus on establishing relations with those nations rather than Austria. As if Austria should just bend over and die without the right to help itself!</span><br data-dcnode-id="1070"><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">Serbia is shown up here as the rogue state that it was – an ethnic terrorist organization tied into and often indistinguishable from the highest levels of government. Serbia did </span><i data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">not</span></i><span data-dcnode-id="1065" instrument_node=""> represent all Serbs, although there were certainly those within Serbian regions who felt it did, and they were determined to engage on a campaign of ethnic cleansing against all their neighbors to restore the kingdom of Greater Serbia that had existed for maybe fifty years in the 14th century. They were, in short, nuts in a nationalist way. And deeply problematic in the same way the Germans would turn out to be on an even more dramatic scale a quarter century later.</span><br data-dcnode-id="1064"><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">Anyone who knows anything about the deep-seated ethnic rivalries of the Balkans today should be unsurprised by this. One of my favorite stories from archaeologist friends was from an excavation of a Byzantine settlement in Albania. One of the local bigwigs asked him whether the bones they were uncovering were Albanian or Greek (presumably so they could use the dig to prove ethnic rights to the region). My friend humored them by asking how exactly he should do that, and the bigwig responded quite seriously, “Easy: Greek bones thin and effeminate. Albanian bones strong and masculine.” Yeah, the Balkans is nuts.</span><br data-dcnode-id="1061"><br data-dcnode-id="1060"><span data-dcnode-id="1059" instrument_node="">Anyway, this argument undermines the traditional blaming of Austria because it means that they were facing a quite serious threat which their rivals refused to recognize out of the conviction that Austria was an outdated state that no longer had a right to exist. In fairness, this was a conviction in Austria as well, and it’s one of the questionable elements of his argument that he never considers whether this feeling that they needed to strike out and prove themselves in order to survive influenced their decision to do just that in Serbia. More convincing is what this means for Russia – their intrusion into the Balkans hoping to capitalize on the collapse of the Austro-Hungarian Empire seemed a direct threat to Austria because it </span><i data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">was</span></i><span data-dcnode-id="1056" instrument_node=""> a direct threat to Austria. And if the rival powers weren’t so convinced of Austria’s inevitable demise, they would have seen that. This makes sense to me and explains much of Austrian behavior. Even when they’re being histrionic, they’re not responding solely to imaginary threats.</span><br data-dcnode-id="1055"><br data-dcnode-id="1054"><span data-dcnode-id="1053" instrument_node="">The section on diplomatic structures and state actors is more complicated and intentionally confusing. He emphasizes how difficult it was to identify who was responsible for making decisions, even in the relatively open society of France. And even in Britain, where Foreign Secretary Edward Grey was clearly in charge, it wasn’t certain how much the rest of the government knew about the commitments he was making. This is a long and complex section and I have to wonder at times if he’s making this out to be uniquely confusing in a deliberate way. Most of this is a question of interpretation, and while he clearly gets much of it right, I’m not always sold on his reasoning for other sections. The secret treaties, for example, explain much of British behavior in particular. Only Gray knew in full what Britain’s obligations were and they came as quite a shock to the other ministers when they had to actually make a decision. On the other hand, there’s nothing particularly unusual about different government agencies or even individuals pressuring for different policies. 1914 may have been a particularly bad year for it, but it hardly seems unique.</span><br data-dcnode-id="1052"><br data-dcnode-id="1051"><span data-dcnode-id="1050" instrument_node="">I very much enjoyed his discussion of the reasons behind the formation of the alliance web that ultimately led to pan-European war. By Clark’s reasoning, alliances weren’t deliberately formed to isolate Germany (except by the French). Instead, most of the alliances were made to protect members from the countries they were allying with. Britain and Russia, for example, were seeing their spheres of power increasingly coming into conflict in Afghanistan and elsewhere, and this was a direct threat to British control of India. Had the Russians marched into India there was little Britain could do to block them short of mobilizing for the sort of global conflict that World War I proved to be. So rather than fight them, Britain signed an alliance with them so that both sides could focus on their own interests and work out any conflicts as allies. This also ironically left Russia with only one area to focus their imperialism on – the Balkans. It’s an interesting and persuasive view I hadn’t considered before.</span><br data-dcnode-id="1049"><br data-dcnode-id="1048"><span data-dcnode-id="1047" instrument_node="">These two topics make up the first two parts of the book. The last third follows the actual buildup to war, starting with the assassination at Sarajevo. This section was the least interesting, in large part because its been told before. I did enjoy his description of the assassination itself. It reads like a thriller, and one I’d condemn for its implausibility had it not actually happened. But the gradual move towards war, in the absence of mobilization schedules and military policies of the first strike, seems inexplicable. Which is his thesis. I think that’s rather deceptive in what it leaves out and is a big part of the reason why I wouldn’t recommend this book to anyone as their first look at the subject.</span><br data-dcnode-id="1046"><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">I’m not sure I fully accept his conclusions. On several cases I found his explanation of factors less convincing than the traditional interpretation. For example, Austria’s ultimatum to Serbia seems every bit as severe to me as it seemed to most at the time. His point that without direct Austrian involvement in the investigation there was no way to get accurate results is well taken, but it remains a fact that, even if Austria was behaving more rationally than it is often considered to have been, the document was essentially eliminating the sovereignty of Serbia. No independent state could accept such a demand. He says he’s not trying to apportion blame, and it’s true it’s not his focus, but he does repeatedly suggest that France and particularly Russia based their decision-making on the presumption that Austria-Hungary could have no legitimate interests in the region bordering them (but of course more distant Russia could). Binding their nations’ foreign policy so strongly to a rogue state was, in retrospect, a suicidally reckless thing to do.</span><br data-dcnode-id="1043"><br data-dcnode-id="1042"><span data-dcnode-id="1041" instrument_node="">I enjoyed this book and found that it challenged a lot of my preconceptions about the war. That said, many of them are still in place and as with any book that argues a controversial stance this strongly, I find it to not always be fair in its arguments. Having read other books on the topic I’m familiar with matters it leaves out because they might undermine his argument. I would not recommend this as anyone’s first look at the topic. Barbara Tuchman’s </span><a data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/11366.The_Guns_of_August" rel="nofollow noopener" title="The Guns of August by Barbara W. Tuchman"><span data-dcnode-id="1040" instrument_node="">The Guns of August</span></a><span data-dcnode-id="1038" instrument_node=""> is outdated but remains a good introduction to the topic. And Margaret MacMillan’s </span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/17345257.The_War_That_Ended_Peace_The_Road_to_1914" rel="nofollow noopener" title="The War That Ended Peace The Road to 1914 by Margaret MacMillan"><span data-dcnode-id="1037" instrument_node="">The War That Ended Peace</span></a><span data-dcnode-id="1035" instrument_node=""> provides a very different interpretation from this one. Both are written for a more general audience. But if you know a bit about the start of the war and want a thoroughly different take, I’d recommend giving this book a try. Even if you reject his challenges to the traditional orthodoxy, it will force you to justify your convictions in ways you may not have considered.</span><br data-dcnode-id="1034"></span><span data-dcnode-id="1032" instrument_node="">

mp;page=5', {asynchronous:true, evalScripts:true, method:'get', parameters:'authenticity_token=' + encodeURIComponent('7TKFb33OROu8VxYemXiMLI1o95iOlP5sOoEhXbSZZ3+0UA1umRhCid5O103c3te9hWDJaKJ/PODhsmYO0z0DCw==')}); return false;"><span data-dcnode-id="962" instrument_node="">5</span></a><span data-dcnode-id="960" instrument_node=""> </span><a data-dcnode-id="958" href="#" onclick="new Ajax.Request('/book/reviews/18669169-the-sleepwalkers?hide_last_page=true&amp;amp;language_code=en&amp;amp;page=6', {asynchronous:true, evalScripts:true, method:'get', parameters:'authenticity_token=' + encodeURIComponent('QWU+4KJ6AA1KKT8SmepMhroDtCdrT/yriV/SHTSbjmIYB7bhRqwGbygw/kHcTBcXsguK10ekPidSbJVOUz/qFg==')}); return false;"><span data-dcnode-id="959" instrument_node="">6</span></a><span data-dcnode-id="957" instrument_node=""> </span><a data-dcnode-id="955" href="#" onclick="new Ajax.Request('/book/reviews/18669169-the-sleepwalkers?hide_last_page=true&amp;amp;language_code=en&amp;amp;page=7', {asynchronous:true, evalScripts:true, method:'get', parameters:'authenticity_token=' + encodeURIComponent('Z9I5W8wHube/kRCXK4/qqjCJiUf6/8ufWWNmRRHwawg+sLFaKNG/1d2I0cRuKbE7OIG3t9YUCROCUCEWdlQPfA==')}); return false;"><span data-dcnode-id="956" instrument_node="">7</span></a><span data-dcnode-id="954" instrument_node=""> </span><a data-dcnode-id="952" href="#" onclick="new Ajax.Request('/book/reviews/18669169-the-sleepwalkers?hide_last_page=true&amp;amp;language_code=en&amp;amp;page=8', {asynchronous:true, evalScripts:true, method:'get', parameters:'authenticity_token=' + encodeURIComponent('BrPiMk4y2mP06YHebGj2tUbdFJNwv9SPxrMAMwWeNZ1f0WozquTcAZbwQI0pzq0kTtUqY1xUFgMdgEdgYjpR6Q==')}); return false;"><span data-dcnode-id="953" instrument_node="">8</span></a><span data-dcnode-id="951" instrument_node=""> </span><a data-dcnode-id="949" href="#" onclick="new Ajax.Request('/book/reviews/18669169-the-sleepwalkers?hide_last_page=true&amp;amp;language_code=en&amp;amp;page=9', {asynchronous:true, evalScri </span><span class="readable" data-dcnode-id="249"><span data-dcnode-id="265" instrument_node="">“For a time, the word </span><i data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Weltpolitik</span></i><span data-dcnode-id="262" instrument_node=""> seemed to capture the mood of the German middle classes and the national-minded quality press. The word resonated because it bundled together so many contemporary aspirations. </span><i data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Weltpolitik</span></i><span data-dcnode-id="259" instrument_node=""> meant the quest to expand foreign markets (at a time of declining export growth); it meant escaping from the constraints of the continental alliance system to operate on a broader world arena. It expressed the appetite for genuinely national projects that would help knit together the disparate regions of the German Empire and reflected the almost universal conviction that Germany, a late arrival at the imperial feast, would have to play catch-up if it wished to earn the respect of the other great powers. Yet, while it connoted all these things, </span><i data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Weltpolitik</span></i><span data-dcnode-id="256" instrument_node=""> never acquired a stable or precise meaning. Even Bernhard von Bulow, widely credited with establishing </span><i data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Weltpolitik</span></i><span data-dcnode-id="253" instrument_node=""> as the guiding principle of German foreign policy, never produced a definitive account of what it was. His contradictory utterances on the subject suggest that it was little more than the old policy of the "free hand" with a larger navy and more menacing mood music. "We are supposed to be pursuing </span><i data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Weltpolitik</span></i><span data-dcnode-id="250" instrument_node="">," the former chief of the General Staff General Alfred von Waldersee noted grumpily in his diary in January 1900. "If only I knew what that was supposed to be.”</span></span><span data-dcnode-id="248" instrument_node="">
