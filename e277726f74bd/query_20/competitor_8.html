" title="Flag as inappropriate"><i aria-hidden="true" class="icon icon-flag" data-dcnode-id="5313"></i></a></li></ul><div class="avatar hovercard" data-dcnode-id="5307"><a class="user" data-action="profile" data-dcnode-id="5308" data-tab="" data-username="mike_wehmeyer" href="https://disqus.com/by/mike_wehmeyer/" rel="noopener noreferrer" target="_blank"><img alt="Avatar" data-dcnode-id="5309" data-role="user-avatar" data-user="231863197" src="https://c.disquscdn.com/uploads/users/23186/3197/avatar92.jpg?1480176680"/></a></div><div class="post-body" data-dcnode-id="5209"><header class="comment__header" data-dcnode-id="5289"><span class="post-byline" data-dcnode-id="5300"><span data-dcnode-id="5301"><span data-dcnode-id="5306" instrument_node=""> </span><span class="author publisher-anchor-color" data-dcnode-id="5303"><a data-action="profile" data-dcnode-id="5304" data-tab="" data-username="mike_wehmeyer" href="https://disqus.com/by/mike_wehmeyer/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5305" instrument_node="">Mike</span></a></span><span data-dcnode-id="5302" instrument_node=""> </span></span></span><span data-dcnode-id="5299" instrument_node=""> </span><span class="post-meta" data-dcnode-id="5292"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="5297"><span data-dcnode-id="5298" instrument_node="">•</span></span><span data-dcnode-id="5296" instrument_node=""> </span><a class="time-ago" data-dcnode-id="5294" data-role="relative-time" href="http://www.pprize.com/Discussions.php/2021-Prediction#comment-5194905586" title="Saturday, December 19, 2020 8:08 AM"><span data-dcnode-id="5295" instrument_node="">a year ago</span></a><span data-dcnode-id="5293" instrument_node=""> </span></span><span data-dcnode-id="5291" instrument_node=""> </span><span data-dcnode-id="5290" instrument_node=""> </span></header><div class="post-body-inner" data-dcnode-id="5253"><div class="post-message-container" data-dcnode-id="5256" data-role="message-container" style="height: 374px;"><div class="publisher-anchor-color" data-dcnode-id="5257" data-role="message-content"><div class="post-message" data-dcnode-id="5260" data-role="message" dir="auto"><div data-dcnode-id="5261"><p data-dcnode-id="5287"><span data-dcnode-id="5288" instrument_node="">Okay, it is prediction modeling time. I looked in my files today, and this is the 14th year I've done this! I spent this morning entering data from the 2020 prediction database (that is, books published in 2019) into the main database. This main database has data on 2,035 books beginning with the 1982 Pulitzer Prize winner, RABBIT IS RICH by John Updike. By 'data,' I mean binomial data (0 or 1) for 36 variables that I use as 'predictor' variables in a discriminant function analysis (DFA). I'm going to paste an image of a table below this message (I hope) so you can see the structure matrix and values generated for each variable. A DFA essentially uses predictor (independent) variables to predict membership in a group (dependent variable). In this case, the dependent variable is whether a book has won the Pulitzer or not. The analysis generates a structure matrix that provides 'functions' (numerical values that can range from -1.0 to +1.0). I have the function values for each predictor variable for the 2021 analysis computed. I will now begin to set up a separate database with books published in 2020 and begin filling in data as we get it. So, by way of example, we already have the information on the National Book Award winner, and that book will have .199 entered into the variable column, with all other books in the database (books published in 2020) having 0.00 entered into that column. Or, books on the NY Times 10 Best books will get .402 entered in that column, while books that were not have 0.00. The rankings that I send at periodic intervals are simply sums of total points for any book ranked with highest first.  Here is the table for the 'structure matrix' that provides the function values for each predictor variable so you can see how much each weights on the total calculation. As has been the case every year, the National Book Critic Circle finalist has the highest value, followed by the NBCC winner. If there is not a NBCC award this year (due to the chaos that ensued within that organization's board of directors mid-year), it will open the competition up quite a bit. (The image below is the table. You have to click on it and when it opens, magnify it a bit to see the predictor variables).</span></p><p data-dcnode-id="5262"><span data-dcnode-id="5286" instrument_node="">My hope is to have the second dataset built by the end of the weekend. We'll see!</span><br data-dcnode-id="5285"/><span data-dcnode-id="5284" instrument_node=""> </span><span data-dcnode-id="5283"></span><div class="media-container media-mode-deferred media-activated" data-dcnode-id="5263"><span data-dcnode-id="5282" instrument_node="">

vatar92.jpg?1611745114"/></a></div><div class="post-body" data-dcnode-id="4886"><header class="comment__header" data-dcnode-id="4949"><span class="post-byline" data-dcnode-id="4960"><span data-dcnode-id="4961"><span data-dcnode-id="4966" instrument_node=""> </span><span class="author publisher-anchor-color" data-dcnode-id="4963"><a data-action="profile" data-dcnode-id="4964" data-tab="" data-username="disqus_jGJbzTgQ9U" href="https://disqus.com/by/disqus_jGJbzTgQ9U/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4965" instrument_node="">Jorge Arreola</span></a></span><span data-dcnode-id="4962" instrument_node=""> </span></span></span><span data-dcnode-id="4959" instrument_node=""> </span><span class="post-meta" data-dcnode-id="4952"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="4957"><span data-dcnode-id="4958" instrument_node="">•</span></span><span data-dcnode-id="4956" instrument_node=""> </span><a class="time-ago" data-dcnode-id="4954" data-role="relative-time" href="http://www.pprize.com/Discussions.php/2021-Prediction#comment-5405993496" title="Wednesday, June 2, 2021 12:44 PM"><span data-dcnode-id="4955" instrument_node="">a year ago</span></a><span data-dcnode-id="4953" instrument_node=""> </span></span><span data-dcnode-id="4951" instrument_node=""> </span><span data-dcnode-id="4950" instrument_node=""> </span></header><div class="post-body-inner" data-dcnode-id="4930"><div class="post-message-container" data-dcnode-id="4933" data-role="message-container"><div class="publisher-anchor-color" data-dcnode-id="4934" data-role="message-content"><div class="post-message" data-dcnode-id="4937" data-role="message" dir="auto"><div data-dcnode-id="4938"><p data-dcnode-id="4947"><span data-dcnode-id="4948" instrument_node="">My predictions:</span></p><p data-dcnode-id="4943"><span data-dcnode-id="4946" instrument_node="">Winner - The Vanishing Half </span><br data-dcnode-id="4945"/><span data-dcnode-id="4944" instrument_node="">Finalists: Deacon King Kong &amp; The Office of Historical Corrections by Danielle Evans</span></p><p data-dcnode-id="4941"><span data-dcnode-id="4942" instrument_node="">No guts No glory wild card pick: Run Me to Earth by Paul Yoon. I loved it and have enjoyed his prior work as well. Not sure what the consensus is on this board about The Vanishing Half, but I thoroughly enjoyed it and would deem it a worthy winner.</span></p><p data-dcnode-id="4939"><span data-dcnode-id="4940" instrument_node="">I also wanted to share a personal story and a big thank you to this community. 3 years ago I lost my childhood best friend Tyler to an accidental OD and with his death I lost the only person in my life who loved and appreciated literature the way I have. The Pulitzer announcement was like our super bowl every year. We would spend the prior year reading as many novels as possible to see if we could predict the winner. After his death I was overwhelmed with grief and couldn't pick up a novel for two years. Anytime I tried I would be crumble in sorrow lamenting all the books I would never get to share with Tyler. But, this last year, reading all the insightful posts here and feeling this community's shared love of literature really reinvigorated my love of reading and I was finally able to pick up and finish a novel. In fact, I read 32 in total over a period of 6 months. Maybe I'm ranting, but I guess I just wanted to say thank you to everyone here for helping me find joy again even if you didn't know that you were doing so. I am eternally grateful.</span></p></div></div><span class="post-media" data-dcnode-id="4935"><ul data-dcnode-id="4936" data-role="post-media-list"></ul></span></div></div><a class="see-more hidden" data-action="see-more" data-dcnode-id="4931" title="see more"><span data-dcnode-id="4932" instrument_node="">see more</span></a></div><footer class="comment__footer" data-dcnode-id="4887"><menu class="comment-footer__menu" data-dcnode-id="4888"><li class=" r%20Prize%20Prediction&amp;t_u=http%3A%2F%2Fwww.pprize.com%2FDiscussions.php%2F2021-Prediction&amp;t_d=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;t_t=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;s_o=default#" title="Flag as inappropriate"><i aria-hidden="true" class="icon icon-flag" data-dcnode-id="3793"></i></a></li></ul><div class="avatar hovercard" data-dcnode-id="3787"><a class="user" data-action="profile" data-dcnode-id="3788" data-tab="" data-username="mike_wehmeyer" href="https://disqus.com/by/mike_wehmeyer/" rel="noopener noreferrer" target="_blank"><img alt="Avatar" data-dcnode-id="3789" data-role="user-avatar" data-user="231863197" src="https://c.disquscdn.com/uploads/users/23186/3197/avatar92.jpg?1480176680"/></a></div><div class="post-body" data-dcnode-id="3706"><header class="comment__header" data-dcnode-id="3763"><span class="post-byline" data-dcnode-id="3774"><span data-dcnode-id="3781"><span data-dcnode-id="3786" instrument_node=""> </span><span class="author publisher-anchor-color" data-dcnode-id="3783"><a data-action="profile" data-dcnode-id="3784" data-tab="" data-username="mike_wehmeyer" href="https://disqus.com/by/mike_wehmeyer/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3785" instrument_node="">Mike</span></a></span><span data-dcnode-id="3782" instrument_node=""> </span></span><span data-dcnode-id="3775"><span data-dcnode-id="3780" instrument_node=""> </span><a class="parent-link" data-dcnode-id="3776" data-role="parent-link" href="http://www.pprize.com/Discussions.php/2021-Prediction#comment-5298520009"><i aria-label="in reply to" class="icon-forward" data-dcnode-id="3779" title="in reply to"></i><span data-dcnode-id="3778" instrument_node=""> </span><span data-dcnode-id="3777" instrument_node="">Jonathan</span></a></span></span><span data-dcnode-id="3773" instrument_node=""> </span><span class="post-meta" data-dcnode-id="3766"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="3771"><span data-dcnode-id="3772" instrument_node="">•</span></span><span data-dcnode-id="3770" instrument_node=""> </span><a class="time-ago" data-dcnode-id="3768" data-role="relative-time" href="http://www.pprize.com/Discussions.php/2021-Prediction#comment-5299904013" title="Thursday, March 11, 2021 6:41 AM"><span data-dcnode-id="3769" instrument_node="">a year ago</span></a><span data-dcnode-id="3767" instrument_node=""> </span></span><span data-dcnode-id="3765" instrument_node=""> </span><span data-dcnode-id="3764" instrument_node=""> </span></header><div class="post-body-inner" data-dcnode-id="3750"><div class="post-message-container" data-dcnode-id="3753" data-role="message-container"><div class="publisher-anchor-color" data-dcnode-id="3754" data-role="message-content"><div class="post-message" data-dcnode-id="3757" data-role="message" dir="auto"><div data-dcnode-id="3758"><p data-dcnode-id="3759"><a class="mention" data-action="profile" data-dcnode-id="3761" data-dsq-mention="alexkerner:disqus" data-username="alexkerner" href="https://disqus.com/by/alexkerner/" rel="nofollow noopener" title="https://disqus.com/by/alexkerner/"><span data-dcnode-id="3762" instrument_node="">Alex Kerner</span></a><span data-dcnode-id="3760" instrument_node=""> I don't think the Board votes until much closer to the date of the announcement. I know that for most of the time that the Pulitzers have been awarded, the fiction award was voted on by the full board at the same time all of the other awards are voted on... literally a few days in advance of the announcement. I believe that is still the case. I agree with Jonathan that it would seem imprudent for him to tip his hand, but as you say, he might have mentioned this without thinking. We know that the jury turns in their lists to the Pulitzer administrator in December of the year before the awards are made... but I'm not sure when the list is given to the Board members so they can read. You would think by now, but maybe not. The earlier the Board members get books (or journal articles or any other category), the greater the risk that something would leak. I'm going to be rooting for NIGHT WATCHMAN, and part of me hopes that by having read it recently, Nguyen is inadvertently tipping his hand and is an advocate for Erdrich. But, I think it could also mean that he mentioned the last book he read that wasn't a finalist he has to read. If they've received the list, which is uncertain!</span></p></div></div><span class="post-media" data-dcnode-id="3755"><ul data-dcnode-id="3756" data-role="post-media-list"></ul></span></div></div><a class="see-more hidden" data-action="see-more" data-dcnode-id="3751" title="see more"><span data-dcnode-id="3752" instrument_node="">see more</span></a></div><footer class="comment__footer" data-dcnode-id="3707"><menu class="comment-footer__menu" data-dcnode-id="3708"><li class="voting" data-dcnode-id="3734" data-role="voting"><div class="post-votes" data-dcnode-id="3735"><a class="vote-up count-1" data-action="upvote" data-dcnode-id="3744" href="https://disqus.com/embed/comments/?base=default&amp;f=pprize&amp;t_i=2021%20Pulitzer%20Prize%20Prediction&amp;t_u=http%3A%2F%2Fwww.pprize.com%2FDiscussions.php%2F2021-Prediction&amp;t_d=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;t_t=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;s_o=default#" name="Vote up" title=""><span class="updatable count" data-dcnode-id="3748" data-role="likes"><span data-dcnode-id="3749" instrument_node="">1</span></span><span data-dcnode-id="3747" instrument_node=""> </span><span class="control" data-dcnode-id="3745"><i aria-hidden="true" class="icon icon-arrow-2" data-dcnode-id="3746"></i></span></a><div class="post-votes__separator" data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node=""></span></div><a class="vote-down count-0" data-action="downvote" l="in reply to" class="icon-forward" data-dcnode-id="3341" title="in reply to"></i><span data-dcnode-id="3340" instrument_node=""> </span><span data-dcnode-id="3339" instrument_node="">Alex Kerner</span></a></span></span><span data-dcnode-id="3335" instrument_node=""> </span><span class="post-meta" data-dcnode-id="3328"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">•</span></span><span data-dcnode-id="3332" instrument_node=""> </span><a class="time-ago" data-dcnode-id="3330" data-role="relative-time" href="http://www.pprize.com/Discussions.php/2021-Prediction#comment-5325486478" title="Wednesday, March 31, 2021 12:39 PM"><span data-dcnode-id="3331" instrument_node="">a year ago</span></a><span data-dcnode-id="3329" instrument_node=""> </span></span><span data-dcnode-id="3327" instrument_node=""> </span><span data-dcnode-id="3326" instrument_node=""> </span></header><div class="post-body-inner" data-dcnode-id="3306"><div class="post-message-container" data-dcnode-id="3309" data-role="message-container"><div class="publisher-anchor-color" data-dcnode-id="3310" data-role="message-content"><div class="post-message" data-dcnode-id="3313" data-role="message" dir="auto"><div data-dcnode-id="3314"><p data-dcnode-id="3321"><span data-dcnode-id="3324" instrument_node="">In early February of 2019, I was having dinner with a friend when her aunt called. </span><br data-dcnode-id="3323"/><span data-dcnode-id="3322" instrument_node="">Effusive congratulations and praise all around.  Her aunt had just made final three for the Pulitzer, had been informed that morning via a call. I won’t tell anyone, my friend reassured her aunt.  It’ll be our secret.</span></p><p data-dcnode-id="3317"><span data-dcnode-id="3320" instrument_node="">I feigned little interest of course.  But in the back of my mind, I was surprised that the Pulitzer would even inform the final three before the announcement.  What’s worse is, I know there’s a betting market for the winner of the Pulitzer, so I wondered if the Board knew of such</span><br data-dcnode-id="3319"/><span data-dcnode-id="3318" instrument_node="">a thing, would they be so keen on informing the finalists?  For practicality’s sake, what’s the sense of informing the finalists at all?</span></p><p data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">All of this is to say, that in early February, I am certain that the finalists have already been informed.</span></p></div></div><span class="post-media" data-dcnode-id="3311"><ul data-dcnode-id="3312" data-role="post-media-list"></ul></span></div></div><a class="see-more hidden" data-action="see-more" data-dcnode-id="3307" title="see more"><span data-dcnode-id="3308" instrument_node="">see more</span></a></div><footer class="comment__footer" data-dcnode-id="3263"><menu class="comment-footer__menu" data-dcnode-id="3264"><li class="voting" data-dcnode-id="3290" data-role="voting"><div class="post-votes" data-dcnode-id="3291"><a class="vote-up count-0" data-action="upvote" data-dcnode-id="3300" href="https://disqus.com/embed/comments/?base=default&amp;f=pprize&amp;t_i=2021%20Pulitzer%20Prize%20Prediction&amp;t_u=http%3A%2F%2Fwww.pprize.com%2FDiscussions.php%2F2021-Prediction&amp;t_d=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;t_t=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;s_o=default#" name="Vote up" title="Vote up"><span class="updatable count" data-dcnode-id="3304" data-role="likes"><span data-dcnode-id="3305" instrument_node="">0</span></span><span data-dcnode-id="3303" instrument_node=""> </span><span class="control" data-dcnode-id="3301"><i aria-hidden="true" class="icon icon-arrow-2" data-dcnode-id="3302"></i></span></a><div class="post-votes__separator" data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node=""></span></div><a class="vote-down count-0" data-action="downvote" 0Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;s_o=default#" name="Collapse" title="Expand"><span data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">+</span></span></a></li><li class="post-menu-item" data-dcnode-id="2908" role="menuitem"><a class="dropdown-toggle" data-action="flag" data-dcnode-id="2909" data-role="flag" href="https://disqus.com/embed/comments/?base=default&amp;f=pprize&amp;t_i=2021%20Pulitzer%20Prize%20Prediction&amp;t_u=http%3A%2F%2Fwww.pprize.com%2FDiscussions.php%2F2021-Prediction&amp;t_d=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;t_t=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;s_o=default#" title="Flag as inappropriate"><i aria-hidden="true" class="icon icon-flag" data-dcnode-id="2910"></i></a></li></ul><div class="avatar hovercard" data-dcnode-id="2904"><a class="user" data-action="profile" data-dcnode-id="2905" data-tab="" data-username="johnzulovitz" href="https://disqus.com/by/johnzulovitz/" rel="noopener noreferrer" target="_blank"><img alt="Avatar" data-dcnode-id="2906" data-role="user-avatar" data-user="99661761" src="https://c.disquscdn.com/uploads/users/9966/1761/avatar92.jpg?1436646703"/></a></div><div class="post-body" data-dcnode-id="2823"><header class="comment__header" data-dcnode-id="2886"><span class="post-byline" data-dcnode-id="2897"><span data-dcnode-id="2898"><span data-dcnode-id="2903" instrument_node=""> </span><span class="author publisher-anchor-color" data-dcnode-id="2900"><a data-action="profile" data-dcnode-id="2901" data-tab="" data-username="johnzulovitz" href="https://disqus.com/by/johnzulovitz/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2902" instrument_node="">Writerman</span></a></span><span data-dcnode-id="2899" instrument_node=""> </span></span></span><span data-dcnode-id="2896" instrument_node=""> </span><span class="post-meta" data-dcnode-id="2889"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">•</span></span><span data-dcnode-id="2893" instrument_node=""> </span><a class="time-ago" data-dcnode-id="2891" data-role="relative-time" href="http://www.pprize.com/Discussions.php/2021-Prediction#comment-5418333834" title="Sunday, June 13, 2021 7:11 AM"><span data-dcnode-id="2892" instrument_node="">10 months ago</span></a><span data-dcnode-id="2890" instrument_node=""> </span></span><span data-dcnode-id="2888" instrument_node=""> </span><span data-dcnode-id="2887" instrument_node=""> </span></header><div class="post-body-inner" data-dcnode-id="2867"><div class="post-message-container" data-dcnode-id="2870" data-role="message-container" style="height: 374px;"><div class="publisher-anchor-color" data-dcnode-id="2871" data-role="message-content"><div class="post-message" data-dcnode-id="2874" data-role="message" dir="auto"><div data-dcnode-id="2875"><p data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">How wonderful that Louise Erdrich, one our greatest writers, has finally been recognized by this year's Pulitzer Prize Jury and Board for her novel, THE NIGHT WATCHMAN. Considering the incredible novels she has been writing for decades, it's strange that only one of her novels (THE PLAGUE OF DOVES) was considered for the prize. Until, of course, this year. Which isn't to say Ms. Erdrich hasn't had a wonderful career, given that she has earned a National Book Award, two National Book Critics Circle Awards, and many others. Now that she has a Pulitzer Prize to add to the others makes me very happy indeed.</span></p><p data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">I have not yet read THE NIGHT WATCHMAN. When one becomes disabled, one finds that one's life is greatly reduced in many ways. One of those ways, for me, is that I haven't the money I once did to spend on my passion: books. Prior to the June 11th announcement, however, I saved money so that I would be able to purchase a copy of the winning novel (or story collection) should it turn out that it wasn't already a part of my library. Which is to say that the next book I will be reading is THE NIGHT WATCHMAN. I know mixed feelings about the novel have been articulated on this board. Given Ms. Erdrich's prolific output, this isn't surprising. Art is not an exact science (thank goodness for that!), and when we get right down to it, we all have different aesthetic preferences. Still, I'm excited to begin reading THE NIGHT WATCHMAN. The truth is, I've never read anything written by Louise Erdrich that I haven't enjoyed. Some more than others? Sure. But never have I read something by her and thought, No. Not good. For her writing, I have found, is always informed by passion, intelligence, and empathy. And not only is her work entertaining, it is also informative, providing windows into other worlds and cultural perspectives to which we otherwise would not have been privy. In addition, her prose is both elegant and blunt. Its profundity has a way of sneaking up on you. Which is something I also love as a reader.</span></p><p data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">I think it's also of merit that a woman has won the prize, as they (like many other people from a myriad of cultural backgrounds) are not represented as much as they should be. The fact that it took the Pulitzer Board and Jury another six years before it awarded a woman the prize is rather sad (although there have been a number of women finalists in the intervening years). Even more, I have heard that Ms. Erdrich wrote the novel as a kind of love letter to her grandfather, on whom she based one of the central characters. It's always wonderful when a voice that deserves to be heard is given the chance to do so.</span></p><p data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">When I've read the novel, I'll let all of you know my thoughts.</span></p><p data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">I would be remiss if I didn't thank  Mike for his hard work (it can't be easy), as well as the wonderful people who comment here. I have a lot of challenging days now, and it's always nice to come here, read what others share, and smile.</span></p></div></div><span class="post-media" data-dcnode-id="2872"><ul data-dcnode-id="2873" data-role="post-media-list"></ul></span></div></div><a class="see-more" data-action="see-more" data-dcnode-id="2868" title="see more"><span data-dcnode-id="2869" instrument_node="">see more</span></a></div><footer class="comment__footer" data-dcnode-id="2824"><menu class="comment-footer__menu" data-dcnode-id="2825"><li class="voting" data-dcnode-id="2851" data-role="voting"><div class="post-votes" data-dcnode-id="2852"><a class="vote-up count-7" data-action="upvote" data-dcnode-id="2861" href="https://disqus.com/embed/comments/?base=default&amp;f=pprize&amp;t_i=2021%20Pulitzer%20Prize%20Prediction&amp;t_u=http%3A%2F%2Fwww.pprize.com%2FDiscussions.php%2F2021-Prediction&amp;t_d=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;t_t=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;s_o=default#" name="Vote up" title=""><span class="updatable count" data-dcnode-id="2865" data-role="likes"><span data-dcnode-id="2866" instrument_node="">7</span></span><span data-dcnode-id="2864" instrument_node=""> </span><span class="control" data-dcnode-id="2862"><i aria-hidden="true" class="icon icon-arrow-2" data-dcnode-id="2863"></i></span></a><div class="post-votes__separator" data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node=""></span></div><a class="vote-down count-0" data-action="downvote" data-dcnode-id="2853" href="https://disqus.com/embed/comments/?base=default&amp;f=pprize&amp;t_i=2021%20Pulitzer%20Prize%20Prediction&amp;t_u=http%3A%2F%2Fwww.pprize.com%2FDiscussions.php%2F2021-Pr pan></span><span data-dcnode-id="2787" instrument_node=""> </span><span class="post-meta" data-dcnode-id="2774"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">•</span></span><span data-dcnode-id="2784" instrument_node=""> </span><a class="time-ago" data-dcnode-id="2782" data-role="relative-time" href="http://www.pprize.com/Discussions.php/2021-Prediction#comment-5415996755" title="Friday, June 11, 2021 3:00 AM"><span data-dcnode-id="2783" instrument_node="">10 months ago</span></a><span data-dcnode-id="2781" instrument_node=""> </span><span data-dcnode-id="2775"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">•</span></span><span data-dcnode-id="2778" instrument_node=""> </span><span class="has-edit" data-dcnode-id="2776" data-role="has-edit"><span data-dcnode-id="2777" instrument_node="">edited</span></span></span></span><span data-dcnode-id="2773" instrument_node=""> </span><span data-dcnode-id="2772" instrument_node=""> </span></header><div class="post-body-inner" data-dcnode-id="2758"><div class="post-message-container" data-dcnode-id="2761" data-role="message-container"><div class="publisher-anchor-color" data-dcnode-id="2762" data-role="message-content"><div class="post-message" data-dcnode-id="2765" data-role="message" dir="auto"><div data-dcnode-id="2766"><p data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">Today is a momentous day for some, yet, undisclosed American writer.  That unknown writer's life is about to change dramatically and forever.  Largely irrespective of the fact that their book, published in 2020. does or does not deal with any aspect of American life.  Today, someone will have the first line of their obituary written, or a variant there of, "Pulitzer Prize winning author, (Name), has died." Their stature among their peers and their readers will expand exponentially.  Their bank accounts will soon see balances never imagined, as their speaking fees and publishing contracts are enhanced.  Almost magically, overnight, stickers will emblazon their book and every succeeding book, in perpetuity, will proclaim "Pulitzer Prize Winner."</span></p><p data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">A literary legacy, unimagined only yesterday, is being initiated this afternoon.  Hopefully the Jurors and the Pulitzer Prize Board have shown the wisdom to select a person, and a book, that will be capable and worthy of carrying the mantle that is about to be bestowed on them as the 2021 winner of the Pulitzer Prize for Fiction.</span></p></div></div><span class="post-media" data-dcnode-id="2763"><ul data-dcnode-id="2764" data-role="post-media-list"></ul></span></div></div><a class="see-more hidden" data-action="see-more" data-dcnode-id="2759" title="see more"><span data-dcnode-id="2760" instrument_node="">see more</span></a></div><footer class="comment__footer" data-dcnode-id="2715"><menu class="comment-footer__menu" data-dcnode-id="2716"><li class="voting" data-dcnode-id="2742" data-role="voting"><div class="post-votes" data-dcnode-id="2743"><a class="vote-up count-7" data-action="upvote" data-dcnode-id="2752" href="https://disqus.com/embed/comments/?base=default&amp;f=pprize&amp;t_i=2021%20Pulitzer%20Prize%20Prediction&amp;t_u=http%3A%2F%2Fwww.pprize.com%2FDiscussions.php%2F2021-Prediction&amp;t_d=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;t_t=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;s_o=default#" name="Vote up" title=""><span class="updatable count" data-dcnode-id="2756" data-role="likes"><span data-dcnode-id="2757" instrument_node="">7</span></span><span data-dcnode-id="2755" instrument_node=""> </span><span class="control" data-dcnode-id="2753"><i aria-hidden="true" class="icon icon-arrow-2" data-dcnode-id="2754"></i></span></a><div cla n-forward" data-dcnode-id="2684" title="in reply to"></i><span data-dcnode-id="2683" instrument_node=""> </span><span data-dcnode-id="2682" instrument_node="">Ed Parks</span></a></span></span><span data-dcnode-id="2678" instrument_node=""> </span><span class="post-meta" data-dcnode-id="2665"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">•</span></span><span data-dcnode-id="2675" instrument_node=""> </span><a class="time-ago" data-dcnode-id="2673" data-role="relative-time" href="http://www.pprize.com/Discussions.php/2021-Prediction#comment-5416283716" title="Friday, June 11, 2021 8:21 AM"><span data-dcnode-id="2674" instrument_node="">10 months ago</span></a><span data-dcnode-id="2672" instrument_node=""> </span><span data-dcnode-id="2666"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">•</span></span><span data-dcnode-id="2669" instrument_node=""> </span><span class="has-edit" data-dcnode-id="2667" data-role="has-edit"><span data-dcnode-id="2668" instrument_node="">edited</span></span></span></span><span data-dcnode-id="2664" instrument_node=""> </span><span data-dcnode-id="2663" instrument_node=""> </span></header><div class="post-body-inner" data-dcnode-id="2649"><div class="post-message-container" data-dcnode-id="2652" data-role="message-container"><div class="publisher-anchor-color" data-dcnode-id="2653" data-role="message-content"><div class="post-message" data-dcnode-id="2656" data-role="message" dir="auto"><div data-dcnode-id="2657"><p data-dcnode-id="2658"><a class="mention" data-action="profile" data-dcnode-id="2660" data-dsq-mention="ed_parks:disqus" data-username="ed_parks" href="https://disqus.com/by/ed_parks/" rel="nofollow noopener" title="https://disqus.com/by/ed_parks/"><span data-dcnode-id="2661" instrument_node="">Ed Parks</span></a><span data-dcnode-id="2659" instrument_node=""> I've been ruminating after reading your post about what the biggest surprises were for Pulitzer winners. It's a bit more difficult to judge how much of a surprise the older books really were since there were fewer other awards or lists to see what kind of buzz they had. Paul Harding's TINKERS has to be up there on surprise picks, although it was on the American Library Association Notable book list, so not completely out of the blue. I suppose Jhumpa Lahiri's INTERPRETER OF MALADIES was a surprise pick, but it had won the PEN/Hemingway award already. Richard Russo's EMPIRE FALLS seems to have come out of the blue, but he had published five well-received books before, so he as an author was not unheard of. Geraldine Brooks' MARCH was another surprise, but there was a lot of buzz behind her previous book, YEAR OF WONDERS, and, like EMPIRE FALLS, MARCH had a huge first printing. THE KILLER ANGELS has to rank up there with the most surprising picks. It was published by a publishing company that was best known for publishing comic books, never made the bestseller lists, and quietly went out of hardcover publication before the Pulitzer was announced. What's odd about KILLER ANGELS is that winning the Pulitzer had minimal impact on sales. It never made any best seller list until 1993 when the movie based on the book was released along with a mass paperback edition, which went right up to #1 on the NY Times best seller list. Of course, A CONFEDERACY OF DUNCES was totally out of the blue. It probably has to be the biggest surprise winner. However, several books we now think of as classics--THE GOOD EARTH, TALES OF THE SOUTH PACIFIC, TO KILL A MOCKINGBIRD--were first (or early) books that had almost no visibility before the award.</span></p></div></div><span class="post-media" data-dcnode-id="2654"><ul data-dcnode-id="2655" data-role="post-media-list"></ul></span></div></div><a class="see-more hidden" data-action="see-more" data-dcnode-id="2650" title="see more"><span data-dcnode-id="2651" opriate"><i aria-hidden="true" class="icon icon-flag" data-dcnode-id="2474"></i></a></li></ul><div class="avatar hovercard" data-dcnode-id="2468"><a class="user" data-action="profile" data-dcnode-id="2469" data-tab="" data-username="mike_wehmeyer" href="https://disqus.com/by/mike_wehmeyer/" rel="noopener noreferrer" target="_blank"><img alt="Avatar" data-dcnode-id="2470" data-role="user-avatar" data-user="231863197" src="https://c.disquscdn.com/uploads/users/23186/3197/avatar92.jpg?1480176680"/></a></div><div class="post-body" data-dcnode-id="2379"><header class="comment__header" data-dcnode-id="2444"><span class="post-byline" data-dcnode-id="2461"><span data-dcnode-id="2462"><span data-dcnode-id="2467" instrument_node=""> </span><span class="author publisher-anchor-color" data-dcnode-id="2464"><a data-action="profile" data-dcnode-id="2465" data-tab="" data-username="mike_wehmeyer" href="https://disqus.com/by/mike_wehmeyer/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2466" instrument_node="">Mike</span></a></span><span data-dcnode-id="2463" instrument_node=""> </span></span></span><span data-dcnode-id="2460" instrument_node=""> </span><span class="post-meta" data-dcnode-id="2447"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">•</span></span><span data-dcnode-id="2457" instrument_node=""> </span><a class="time-ago" data-dcnode-id="2455" data-role="relative-time" href="http://www.pprize.com/Discussions.php/2021-Prediction#comment-5405702142" title="Wednesday, June 2, 2021 8:55 AM"><span data-dcnode-id="2456" instrument_node="">a year ago</span></a><span data-dcnode-id="2454" instrument_node=""> </span><span data-dcnode-id="2448"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">•</span></span><span data-dcnode-id="2451" instrument_node=""> </span><span class="has-edit" data-dcnode-id="2449" data-role="has-edit"><span data-dcnode-id="2450" instrument_node="">edited</span></span></span></span><span data-dcnode-id="2446" instrument_node=""> </span><span data-dcnode-id="2445" instrument_node=""> </span></header><div class="post-body-inner" data-dcnode-id="2423"><div class="post-message-container" data-dcnode-id="2426" data-role="message-container" style="height: 374px;"><div class="publisher-anchor-color" data-dcnode-id="2427" data-role="message-content"><div class="post-message" data-dcnode-id="2430" data-role="message" dir="auto"><div data-dcnode-id="2431"><p data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">I was going to wait until early next week to post because I'm halfway through SHUGGIE BAIN, but although I am liking it, I have convinced myself that it won't win the Pulitzer because of the setting and because it has already won visible awards, so I tend to think the jury/Board will look elsewhere. So, with the caveat that except for years that a monkey could have picked the Pulitzer, I have an abysmal record on my personal choices, here are my thoughts:</span></p><p data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Finalist: VALENTINE by Elizabeth Wetmore. The finalists list almost always includes one book from out of left field, and this is my guess for that book. VALENTINE was my favorite read from all 2020 books.</span></p><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Finalist: VANISHING HALF by Brit Bennett. As I've mentioned, I thought this was an important story and a well-written book. I thought it was contrived at times, and the plot turns on an entirely implausible event (I won't spoil anything by mentioning it). But, I would not be opposed to it winning, and I need to respect my prediction list at some level!</span></p><p data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">Winner: THE NIGHT WATCHMAN by Louise Erdrich. The very last large-group event I attended before the world shut down due to COVID was a Louise Erdrich author event at INPRINT in Houston. She was engaging and talked a lot about this book, since the title character was modeled after her grandfather. It was clear that this was a labor of love for her. That experience influenced me as I read the book, I'm sure. I thought this book was more character driven than her other books, but I know there were a lot of characters and it had some plot flaws. I continue to believe that she should have won the Pulitzer Prize for THE ROUND HOUSE. It was a powerful book about an important social issue. To that end, NIGHT WATCHMAN also addressed an important social issue. I grew up in Oklahoma which still has a very strong Native culture... and although Erdrich writes about tribes outside of Oklahoma, I value reading about the Native context. These are issues that are not written about often. Erdrich received the Library of Congress Prize for American Fiction and has received or been nominated for about every major award in literature.</span></p><p data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">I made my case that it was time for a woman to win the Pulitzer a while back, so I won't go into that, but to be honest, I did not limit my selection to women only, it just turned out that way. And, as is also my tendency every year, I always have a few books that I almost put on my list, so to that end, I think OFFICE OF HISTORICAL CORRECTIONS could easily end up as the winner or a finalist, and I think that either DEACON KING KONG or A CHILDREN'S BIBLE might be a finalist or winner.</span></p><p data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">I do hope that next year they get back to the standard mid-May announcement, having to wait until mid-June is a nuisance!</span></p></div></div><span class="post-media" data-dcnode-id="2428"><ul data-dcnode-id="2429" data-role="post-media-list"></ul></span></div></div><a class="see-more" data-action="see-m -id="1932"><header class="comment__header" data-dcnode-id="2009"><span class="post-byline" data-dcnode-id="2020"><span data-dcnode-id="2021"><span data-dcnode-id="2026" instrument_node=""> </span><span class="author publisher-anchor-color" data-dcnode-id="2023"><a data-action="profile" data-dcnode-id="2024" data-tab="" data-username="mike_wehmeyer" href="https://disqus.com/by/mike_wehmeyer/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2025" instrument_node="">Mike</span></a></span><span data-dcnode-id="2022" instrument_node=""> </span></span></span><span data-dcnode-id="2019" instrument_node=""> </span><span class="post-meta" data-dcnode-id="2012"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">•</span></span><span data-dcnode-id="2016" instrument_node=""> </span><a class="time-ago" data-dcnode-id="2014" data-role="relative-time" href="http://www.pprize.com/Discussions.php/2021-Prediction#comment-5336142405" title="Friday, April 9, 2021 6:16 AM"><span data-dcnode-id="2015" instrument_node="">a year ago</span></a><span data-dcnode-id="2013" instrument_node=""> </span></span><span data-dcnode-id="2011" instrument_node=""> </span><span data-dcnode-id="2010" instrument_node=""> </span></header><div class="post-body-inner" data-dcnode-id="1976"><div class="post-message-container" data-dcnode-id="1979" data-role="message-container"><div class="publisher-anchor-color" data-dcnode-id="1980" data-role="message-content"><div class="post-message" data-dcnode-id="1983" data-role="message" dir="auto"><div data-dcnode-id="1984"><p data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">The final prediction list is posted above. SHUGGIE BAIN was a finalist for the PEN/Hemingway award for the debut novel, but did not win. Even if it had won, there were not enough points in that to move SHUGGIE BAIN up past MEMORIAL. Only Jhumpa Lahiri's THE INTERPRETER OF MALADIES has won both the PEN/Hemingway and the Pulitzer Prize, so that doesn't happen very often, obviously. Marilynne Robinson (for HOUSEKEEPING) and Edward P. Jones (for LOST IN THE CITY) won the PEN/Hemingway for their first book and then won the Pulitzer for a subsequent book, so even that hasn't happened often.</span></p><p data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">The next ten books after the top 15 are:</span></p><p data-dcnode-id="1985"><span data-dcnode-id="2004" instrument_node="">Collected Stories by Shirley Hazzard</span><br data-dcnode-id="2003"/><span data-dcnode-id="2002" instrument_node="">Interior Chinatown by Charles Yu</span><br data-dcnode-id="2001"/><span data-dcnode-id="2000" instrument_node="">Temporary</span><br data-dcnode-id="1999"/><span data-dcnode-id="1998" instrument_node="">Run Me to Earth by Paul Yoon</span><br data-dcnode-id="1997"/><span data-dcnode-id="1996" instrument_node="">A Burning by Megha Majumdar</span><br data-dcnode-id="1995"/><span data-dcnode-id="1994" instrument_node="">Sorry for Your Trouble by Richard Ford</span><br data-dcnode-id="1993"/><span data-dcnode-id="1992" instrument_node="">Missionaries by Phil Klay</span><br data-dcnode-id="1991"/><span data-dcnode-id="1990" instrument_node="">What Happens at Night by Peter Cameron</span><br data-dcnode-id="1989"/><span data-dcnode-id="1988" instrument_node="">Transcendent Kingdom by Yaa Gyasi</span><br data-dcnode-id="1987"/><span data-dcnode-id="1986" instrument_node="">Writers &amp; Lovers by Lily King</span></p></div></div><span class="post-media" data-dcnode-id="1981"><ul data-dcnode-id="1982" data-role="post-media-list"></ul></span></div></div><a class="see-more hidden" data-action="see-more" data-dcnode-id="1977" title="see more"><span data-dcnode-id="1978" instrument_node="">see more</span></a></div><footer class="comment__footer" data-dcnode-id="1933"><menu class="comment-footer__menu" data-dcnode-id="1934"><li class="voting" data-dcnode-id="1960" data- rel="noopener noreferrer" target="_blank"><img alt="Avatar" data-dcnode-id="1799" data-role="user-avatar" data-user="117960375" src="https://c.disquscdn.com/uploads/users/11796/375/avatar92.jpg?1499549935"/></a></div><div class="post-body" data-dcnode-id="1712"><header class="comment__header" data-dcnode-id="1773"><span class="post-byline" data-dcnode-id="1790"><span data-dcnode-id="1791"><span data-dcnode-id="1796" instrument_node=""> </span><span class="author publisher-anchor-color" data-dcnode-id="1793"><a data-action="profile" data-dcnode-id="1794" data-tab="" data-username="ed_parks" href="https://disqus.com/by/ed_parks/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1795" instrument_node="">Ed Parks</span></a></span><span data-dcnode-id="1792" instrument_node=""> </span></span></span><span data-dcnode-id="1789" instrument_node=""> </span><span class="post-meta" data-dcnode-id="1776"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">•</span></span><span data-dcnode-id="1786" instrument_node=""> </span><a class="time-ago" data-dcnode-id="1784" data-role="relative-time" href="http://www.pprize.com/Discussions.php/2021-Prediction#comment-5269846893" title="Monday, February 15, 2021 12:19 PM"><span data-dcnode-id="1785" instrument_node="">a year ago</span></a><span data-dcnode-id="1783" instrument_node=""> </span><span data-dcnode-id="1777"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">•</span></span><span data-dcnode-id="1780" instrument_node=""> </span><span class="has-edit" data-dcnode-id="1778" data-role="has-edit"><span data-dcnode-id="1779" instrument_node="">edited</span></span></span></span><span data-dcnode-id="1775" instrument_node=""> </span><span data-dcnode-id="1774" instrument_node=""> </span></header><div class="post-body-inner" data-dcnode-id="1756"><div class="post-message-container" data-dcnode-id="1759" data-role="message-container" style="height: 374px;"><div class="publisher-anchor-color" data-dcnode-id="1760" data-role="message-content"><div class="post-message" data-dcnode-id="1763" data-role="message" dir="auto"><div data-dcnode-id="1764"><p data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Prior to reading IF I HAD TWO WINGS by Randall Kenan and THE OFFICE OF HISTORICAL CORRECTIONS by Danielle Evans, I knew nothing about either author, or their books.  By happenstance, I read the two collections back to back, and as a result this broached the inevitable subject of comparison.</span></p><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">So, without any preconceived notions I read IF I HAD TWO WINGS.  Right out of the box I became pleasantly aware that Kenan was a southern writer and this very much appealed to me.  The other early revelation was that he was a writer of magical realism, that appealed to me considerably less.  I am not a fan of magical realism in any way, shape, or form.  Yet the collection held together very well and I was pleased, and surprised, by the quality of the writing.  I have a tendency to look at reviews after I finish a book.  One online reviewer said of this collection that there were too many characters in Kenan's stories.  In retrospect, and admittedly a minor complaint, I can see that that was so.  And for short stories, a possible cause for concern.</span></p><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Up next, THE OFFICE OF HISTORICAL CORRECTIONS.  I thought this book might be a bit more problematic, and when I saw the pastel colors on the dust jacket I thought that I might be staring at pure, unadulterated  chick lit. Boy, was that an incorrect assumption!  THE OFFICE OF HISTORICAL CORRECTIONS is one of the finest collection of stories that I have read in sometime.  The stories are perfect in tone, mood, and content.  The stories are interesting and the settings are diversely spread across the United States.  The writing is extraordinary and magical, but there is no magical realism.  In my opinion, there is one clunker in the collection, 'Why Won't Women Just Say What They Want'.  It is a Saundersesque story and George seldom works for me and neither did this story.  The best, in my opinion, is the penultimate story, 'Anything Could Disappear'.  Looking at reviews after I completed the collection, as I am prone to do, I was gobsmacked that few selected this story as a favorite. But for me it is the quintessentially perfect story in the collection.  And, ironically, the only story that could even approximate being referred to as chick lit.</span></p><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">In comparing the two collections there is really little to compare as to style, theme, characters, or content.  They are completely different and unique unto themselves. THE OFFICE OF HISTORICAL CORRECTIONS, in my opinion, is the superior book and in all likelihood will be one of my three Pulitzer Prize picks.  And, yet again, my top five books of 2020 needs amendment.</span></p></div></div><span class="post-media" data-dcnode-id="1761"><ul data-dcnode-id="1762" data-role="post-media-list"></ul></span></div></div><a class="see-more" data-action="see-more" data-dcnode-id="1757" title="see more"><span data-dcnode-id="1758" instrument_node="">see more</span></a></div><footer class="comment__footer" data-dcnode-id="1713"><menu class="comment-footer__menu" data-dcnode-id="1714"><li class="voting" data-dcnode-id="1740" data-role="voting"><div class="post-votes" data-dcnode-id="1741"><a class="vote-up count-7" data-action="upvote" data-dcnode-id="1750" href="https://disqus.com/embed/comments/?base=default&amp;f=pprize&amp;t_i=2021%20Pulitzer%20Prize%20Prediction&amp;t_u=http%3A%2F%2Fwww.pprize.com%2FDiscussions.php%2F2021-Prediction&amp;t_d=Pulitzer%20Prize%20First%20Edition%20Collectin le="parent-link" href="http://www.pprize.com/Discussions.php/2021-Prediction#comment-5269846893"><i aria-label="in reply to" class="icon-forward" data-dcnode-id="1575" title="in reply to"></i><span data-dcnode-id="1574" instrument_node=""> </span><span data-dcnode-id="1573" instrument_node="">Ed Parks</span></a></span></span><span data-dcnode-id="1569" instrument_node=""> </span><span class="post-meta" data-dcnode-id="1562"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">•</span></span><span data-dcnode-id="1566" instrument_node=""> </span><a class="time-ago" data-dcnode-id="1564" data-role="relative-time" href="http://www.pprize.com/Discussions.php/2021-Prediction#comment-5272414368" title="Wednesday, February 17, 2021 9:18 AM"><span data-dcnode-id="1565" instrument_node="">a year ago</span></a><span data-dcnode-id="1563" instrument_node=""> </span></span><span data-dcnode-id="1561" instrument_node=""> </span><span data-dcnode-id="1560" instrument_node=""> </span></header><div class="post-body-inner" data-dcnode-id="1546"><div class="post-message-container" data-dcnode-id="1549" data-role="message-container"><div class="publisher-anchor-color" data-dcnode-id="1550" data-role="message-content"><div class="post-message" data-dcnode-id="1553" data-role="message" dir="auto"><div data-dcnode-id="1554"><p data-dcnode-id="1555"><a class="mention" data-action="profile" data-dcnode-id="1557" data-dsq-mention="ed_parks:disqus" data-username="ed_parks" href="https://disqus.com/by/ed_parks/" rel="nofollow noopener" title="https://disqus.com/by/ed_parks/"><span data-dcnode-id="1558" instrument_node="">Ed Parks</span></a><span data-dcnode-id="1556" instrument_node=""> I am thrilled to hear that you also loved Danielle Evan's collection. I read it in November, so I don't quite remember the individual stories anymore, but it was easily my favorite book of 2020. It is true that I have still only read 14 titles eligible for the Pulitzer -- most years, at this time, that would be over 20 -- but I don't think that that should diminish my opinion on the collection. I hope to get through a few more books before April, but I can guarantee that this one will be one of my finalists, if not my long-shot chance to win!</span></p></div></div><span class="post-media" data-dcnode-id="1551"><ul data-dcnode-id="1552" data-role="post-media-list"></ul></span></div></div><a class="see-more hidden" data-action="see-more" data-dcnode-id="1547" title="see more"><span data-dcnode-id="1548" instrument_node="">see more</span></a></div><footer class="comment__footer" data-dcnode-id="1503"><menu class="comment-footer__menu" data-dcnode-id="1504"><li class="voting" data-dcnode-id="1530" data-role="voting"><div class="post-votes" data-dcnode-id="1531"><a class="vote-up count-2" data-action="upvote" data-dcnode-id="1540" href="https://disqus.com/embed/comments/?base=default&amp;f=pprize&amp;t_i=2021%20Pulitzer%20Prize%20Prediction&amp;t_u=http%3A%2F%2Fwww.pprize.com%2FDiscussions.php%2F2021-Prediction&amp;t_d=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;t_t=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;s_o=default#" name="Vote up" title=""><span class="updatable count" data-dcnode-id="1544" data-role="likes"><span data-dcnode-id="1545" instrument_node="">2</span></span><span data-dcnode-id="1543" instrument_node=""> </span><span class="control" data-dcnode-id="1541"><i aria-hidden="true" class="icon icon-arrow-2" data-dcnode-id="1542"></i></span></a><div class="post-votes__separator" data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node=""></span></div><a class="vote-down count-0" data-action="downvote" data-dcnode-id="1532" href="https://disqus.com/embed/comments/?base=default&amp;f=pprize&amp;t_i=2021%20Pulitzer%20Prize%20Prediction&amp;t_u=http%3A%2F%2Fwww.pprize.com%2FDiscussions.php%2F2021-Prediction&am -id="938" data-role="user-avatar" data-user="234539284" src="https://c.disquscdn.com/uploads/users/23453/9284/avatar92.jpg?1485991780"/></a></div><div class="post-body" data-dcnode-id="849"><header class="comment__header" data-dcnode-id="912"><span class="post-byline" data-dcnode-id="929"><span data-dcnode-id="930"><span data-dcnode-id="935" instrument_node=""> </span><span class="author publisher-anchor-color" data-dcnode-id="932"><a data-action="profile" data-dcnode-id="933" data-tab="" data-username="brakiasaurus" href="https://disqus.com/by/brakiasaurus/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="934" instrument_node="">BRAKiasaurus</span></a></span><span data-dcnode-id="931" instrument_node=""> </span></span></span><span data-dcnode-id="928" instrument_node=""> </span><span class="post-meta" data-dcnode-id="915"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">•</span></span><span data-dcnode-id="925" instrument_node=""> </span><a class="time-ago" data-dcnode-id="923" data-role="relative-time" href="http://www.pprize.com/Discussions.php/2021-Prediction#comment-5416864476" title="Friday, June 11, 2021 5:22 PM"><span data-dcnode-id="924" instrument_node="">10 months ago</span></a><span data-dcnode-id="922" instrument_node=""> </span><span data-dcnode-id="916"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">•</span></span><span data-dcnode-id="919" instrument_node=""> </span><span class="has-edit" data-dcnode-id="917" data-role="has-edit"><span data-dcnode-id="918" instrument_node="">edited</span></span></span></span><span data-dcnode-id="914" instrument_node=""> </span><span data-dcnode-id="913" instrument_node=""> </span></header><div class="post-body-inner" data-dcnode-id="893"><div class="post-message-container" data-dcnode-id="896" data-role="message-container" style="height: 374px;"><div class="publisher-anchor-color" data-dcnode-id="897" data-role="message-content"><div class="post-message" data-dcnode-id="900" data-role="message" dir="auto"><div data-dcnode-id="901"><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">I haven't had much time to comment today, however I do have a few thoughts. First, I have only read two Erdrich books: La Rose and The Night Watchman. Based on that alone, I am confident that the latter is not Erdrich's best book. That said, I feel confident suggesting that Erdrich is an author who deserved to win the Pulitzer...I just wish it had been for a different novel. I did love elements of the book, though, and I can understand why others found it to be deserving.</span></p><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">It makes me really happy to think that Erdrich wrote a book based on her father, if I recall correctly, and that that book is the one that will solidify her name in literary history. It must be so meaningful to Erdrich to have won for this novel.</span></p><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">I have heard Perceival Everett mentioned many times--in fact, I bought Telephone earlier this year, because an author (I forget who) enthusiastically endorsed it, and it wasn't the first book by Everett that I had bought, simply because I have always heard how underrated he is. I'm very excited to think that this will bring him to a wider audience. Further, I am always truly dismayed by how unadventurous the Pulitzer usually is compared to other major awards, many of which celebrate innovation and a willingness to play with form. (How many years has it been since something as adventurous as Donald Barthelme's work was considered worthy?) That alone makes me happy that it was a finalist.</span></p><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Finally, I am not familiar with Mason's work. I have one of his novels signed, because I found it used for a few dollars. But I am very happy that a short story collection made the list; and it also is the only book with which I was unfamiliar (coincidentally, I JUST became aware of the book this week, a few days prior to the announcement).</span></p><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Final thought is this: while this was not my favorite novel of the year--and while acknowledging that this is perhaps a leap of logic--when I see books that are lauded by many and yet more widely ignored, I sometimes take that as an indication that an the jurists really did their best to read as many of the contenders as possible....this assertion is certainly founded on shaky ground (in fact, the year Doerr received the award, he won because the three finalists were not only unexpected but were also deemed undeserving, and a mainstream--one might argue, default--selection was chosen, instead of many much more-deserving titles), but this is my initial impression of 2021's finalists. I'll have to read the books to decide if it ultimately holds water for me personally.</span></p></div></div><span class="post-media" data-dcnode-id="898"><ul data-dcnode-id="899" data-role="post-media-list"></ul></span></div></div><a class="see-more" data-action="see-more" data-dcnode-id="894" title="see more"><span data-dcnode-id="895" instrument_node="">see more</span></a></div><footer class="comment__footer" data-dcnode-id="850"><menu class="comment-footer__menu" data-dcnode-id="851"><li class="voting" data-dcnode-id="877" data-role="voting"><div class="post-votes" data-dcnode-id="878"><a class="vote-up count-6" data-action="upvote" data-dcnode-id="887" href="https://disqus.com/embed/comments/?base=default&amp;f=pprize&amp;t_i=2021%20Pulitzer%20Prize%20Prediction&amp;t_u=http%3A%2F%2Fwww.pprize.com%2FDiscussions.php%2F2021-Prediction&amp;t_d=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;t_t=Pulitzer%20Prize%20First%20E in reply to"></i><span data-dcnode-id="595" instrument_node=""> </span><span data-dcnode-id="594" instrument_node="">Mike</span></a></span></span><span data-dcnode-id="590" instrument_node=""> </span><span class="post-meta" data-dcnode-id="583"><span aria-hidden="true" class="bullet time-ago-bullet" data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">•</span></span><span data-dcnode-id="587" instrument_node=""> </span><a class="time-ago" data-dcnode-id="585" data-role="relative-time" href="http://www.pprize.com/Discussions.php/2021-Prediction#comment-5498536796" title="Tuesday, August 17, 2021 7:56 PM"><span data-dcnode-id="586" instrument_node="">8 months ago</span></a><span data-dcnode-id="584" instrument_node=""> </span></span><span data-dcnode-id="582" instrument_node=""> </span><span data-dcnode-id="581" instrument_node=""> </span></header><div class="post-body-inner" data-dcnode-id="569"><div class="post-message-container" data-dcnode-id="572" data-role="message-container"><div class="publisher-anchor-color" data-dcnode-id="573" data-role="message-content"><div class="post-message" data-dcnode-id="576" data-role="message" dir="auto"><div data-dcnode-id="577"><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">I finished Telephone the day after the announcement. For most of the novel I was pretty sure I was hating it and that I couldn't remember the last time I disliked a finalist as much. Everett's choices for the rhythm's of his prose were reading very lopsided in my head. For lack of a better description, I felt myself tripping over the cadences. However, at some point towards the end I realized the story had stealthily won me over. I live in the Pasadena area so it was nice to feel a connection to the novel's landscapes.  It was a strange experience. I can't say it was enjoyable, but I was satisfied. Which ending did you read? There are 3 different ones no?</span></p></div></div><span class="post-media" data-dcnode-id="574"> ce! Erdrich is easily one of the greatest living American writers (second only to Joyce Carol Oates in my opinion), and certainly the most influential Indigenous writer we've got. LaRose is a better novel than The Night Watchman, but I still found the most recent effort to be a really moving piece about how land reclamation helps inform cultural and linguistic revival among the Indigenous communities. I've never read Everett or Mason so I'll have to go through their backlist and see what they're made of.</span></p></div></div><span class="post-media" data-dcnode-id="461"><ul data-dcnode-id="462" data-role="post-media-list"></ul></span></div></div><a class="see-more hidden" data-action="see-more" data-dcnode-id="457" title="see more"><span data-dcnode-id="458" instrument_node="">see more</span></a></div><footer class="comment__footer" data-dcnode-id="413"><menu class="comment-footer__menu" data-dcnode-id="414"><li class="voting" data-dcnode-id="440" data-role="voting"><div class="post-votes" data-dcnode-id="441"><a class="vote-up count-6" data-action="upvote" data-dcnode-id="450" href="https://disqus.com/embed/comments/?base=default&amp;f=pprize&amp;t_i=2021%20Pulitzer%20Prize%20Prediction&amp;t_u=http%3A%2F%2Fwww.pprize.com%2FDiscussions.php%2F2021-Prediction&amp;t_d=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;t_t=Pulitzer%20Prize%20First%20Edition%20Collecting%20Guide%20-%202021%20Prediction&amp;s_o=default#" name="Vote up" title=""><span class="updatable count" data-dcnode-id="454" data-role="likes"><span data-dcnode-id="455" instrument_node="">6</span></span><span data-dcnode-id="453" instrument_node=""> </span><span class="control" data-dcnode-id="451"><i aria-hidden="true" class="icon icon-arrow-2" data-dcnode-id="452"></i></span></a><div class="post-votes__separator" data-dcnode-id="448"><span data-dcnode-id="449" instrument_node=""></span></div><a class="vote-down count-0" data-action="downvote" data-dcnode-id="442" hre
