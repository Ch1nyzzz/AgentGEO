</span><p data-dcnode-id="4851"><span data-dcnode-id="4868" instrument_node="">The </span><b data-dcnode-id="4866"><span data-dcnode-id="4867" instrument_node="">Pulitzer Prize for Music</span></b><span data-dcnode-id="4865" instrument_node=""> is one of seven </span><a class="mw-redirect" data-dcnode-id="4863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pulitzer_Prizes" title="Pulitzer Prizes"><span data-dcnode-id="4864" instrument_node="">Pulitzer Prizes</span></a><span data-dcnode-id="4862" instrument_node=""> awarded annually in Letters, Drama, and Music. It was first given in 1943. </span><a data-dcnode-id="4860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Pulitzer" title="Joseph Pulitzer"><span data-dcnode-id="4861" instrument_node="">Joseph Pulitzer</span></a><span data-dcnode-id="4859" instrument_node=""> arranged for a music </span><a data-dcnode-id="4857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scholarship" title="Scholarship"><span data-dcnode-id="4858" instrument_node="">scholarship</span></a><span data-dcnode-id="4856" instrument_node=""> to be awarded each year, and this was eventually converted into a prize: "For a distinguished musical composition of significant dimension by an American that has had its first performance in the United States during the year."</span><sup class="reference" data-dcnode-id="4853" id="cite_ref-1"><a data-dcnode-id="4854" href="#cite_note-1"><span data-dcnode-id="4855" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4852" instrument_node="">
</span></p><p data-dcnode-id="4845"><span data-dcnode-id="4850" instrument_node="">Because of the requirement that the composition have its world premiere during the year of its award, the winning work had rarely been recorded and sometimes had received only one performance. In 2004 the terms were modified to read, "For a distinguished musical composition by an American that has had its first performance or recording in the United States during the year."</span><sup class="reference" data-dcnode-id="4847" id="cite_ref-2"><a data-dcnode-id="4848" href="#cite_note-2"><span data-dcnode-id="4849" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4846" instrument_node="">

</span><p data-dcnode-id="4663"><span data-dcnode-id="4680" instrument_node="">In his will, dated April 16, 1904, Joseph Pulitzer established annual prizes for a number of creative accomplishments by living Americans, including prizes for journalism, novels, plays, histories and biographies, but did not establish a prize in music, choosing instead to inaugurate an annual scholarship for "the student of music in America whom the Advisory Board shall deem the most talented and deserving, in order that he may continue his studies with the advantage of European instruction."</span><sup class="reference" data-dcnode-id="4677" id="cite_ref-Extracts_3-0"><a data-dcnode-id="4678" href="#cite_note-Extracts-3"><span data-dcnode-id="4679" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4676" instrument_node=""> The Pulitzer Prize for Music was instituted in 1943 to recognize works of "music in its larger forms as composed by an American."</span><sup class="reference" data-dcnode-id="4673" id="cite_ref-Fischer_4-0"><a data-dcnode-id="4674" href="#cite_note-Fischer-4"><span data-dcnode-id="4675" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4672" instrument_node=""> The phrase "music in its larger forms" proved difficult to interpret for the advisory board and the prize's juries, resulting in controversies over the years.</span><sup class="reference" data-dcnode-id="4669" id="cite_ref-Hohenberg_5-0"><a data-dcnode-id="4670" href="#cite_note-Hohenberg-5"><span data-dcnode-id="4671" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4668" instrument_node=""> One critic of the award said, "The Prize Board could hardly have chosen more offensive words to communicate its message."</span><sup class="reference" data-dcnode-id="4665" id="cite_ref-Fischer_4-1"><a data-dcnode-id="4666" href="#cite_note-Fischer-4"><span data-dcnode-id="4667" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4664" instrument_node="">
</span></p><p data-dcnode-id="4643"><span data-dcnode-id="4662" instrument_node="">In 1965, the jury unanimously decided that no major work was worthy of the Pulitzer Prize. Instead, it recommended a special citation be given to </span><a data-dcnode-id="4660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Duke_Ellington" title="Duke Ellington"><span data-dcnode-id="4661" instrument_node="">Duke Ellington</span></a><span data-dcnode-id="4659" instrument_node=""> in recognition of his body of work, but the Pulitzer Board refused and therefore no award was given that year.</span><sup class="reference" data-dcnode-id="4656" id="cite_ref-6"><a data-dcnode-id="4657" href="#cite_note-6"><span data-dcnode-id="4658" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4655" instrument_node=""> Ellington responded: "Fate is being kind to me. Fate doesn't want me to be too famous too young." (He was then 67 years old.)</span><sup class="reference" data-dcnode-id="4652" id="cite_ref-slate1_7-0"><a data-dcnode-id="4653" href="#cite_note-slate1-7"><span data-dcnode-id="4654" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4651" instrument_node=""> Despite this joke, </span><a data-dcnode-id="4649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nat_Hentoff" title="Nat Hentoff"><span data-dcnode-id="4650" instrument_node="">Nat Hentoff</span></a><span data-dcnode-id="4648" instrument_node=""> reported that when he spoke to Ellington about the subject, he was "angrier than I'd ever seen him before", and Ellington said, "I'm hardly surprised that my kind of music is still without, let us say, official honor at home. Most Americans still take it for granted that European-based music—classical music, if you will—is the only really respectable kind."</span><sup class="reference" data-dcnode-id="4645" id="cite_ref-opinionjournal1_8-0"><a data-dcnode-id="4646" href="#cite_note-opinionjournal1-8"><span data-dcnode-id="4647" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4644" instrument_node="">
</span></p><p data-dcnode-id="4607"><span data-dcnode-id="4642" instrument_node="">In 1996, after years of internal debate, the Pulitzer Board announced a change in the criteria for the music prize "so as to attract the best of a wider range of American music."</span><sup class="reference" data-dcnode-id="4639" id="cite_ref-slate1_7-1"><a data-dcnode-id="4640" href="#cite_note-slate1-7"><span data-dcnode-id="4641" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4638" instrument_node=""> The result was that the next year, </span><a data-dcnode-id="4636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wynton_Marsalis" title="Wynton Marsalis"><span data-dcnode-id="4637" instrument_node="">Wynton Marsalis</span></a><span data-dcnode-id="4635" instrument_node=""> became the first jazz artist to win the Pulitzer Prize. But his victory was controversial because, according to the Pulitzer guidelines, his winning work, </span><a data-dcnode-id="4632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blood_on_the_Fields" title="Blood on the Fields"><i data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">Blood on the Fields</span></i></a><span data-dcnode-id="4631" instrument_node="">, a three-hour-long oratorio about slavery, should not have been eligible. Winning works are supposed to have had their first performance during the year of the award, but Marsalis's piece premiered on April 1, 1994, and its recording, released on </span><a data-dcnode-id="4629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Columbia_Records" title="Columbia Records"><span data-dcnode-id="4630" instrument_node="">Columbia Records</span></a><span data-dcnode-id="4628" instrument_node="">, was dated 1995. Yet the piece won the 1997 prize. Marsalis's management had submitted a "revised version" of </span><i data-dcnode-id="4626"><span data-dcnode-id="4627" instrument_node="">Blood on the Fields</span></i><span data-dcnode-id="4625" instrument_node=""> that "premiered" at </span><a data-dcnode-id="4623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yale_University" title="Yale University"><span data-dcnode-id="4624" instrument_node="">Yale University</span></a><span data-dcnode-id="4622" instrument_node=""> after Marsalis made seven small changes.</span><sup class="reference" data-dcnode-id="4619" id="cite_ref-earbox1_9-0"><a data-dcnode-id="4620" href="#cite_note-earbox1-9"><span data-dcnode-id="4621" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4618" instrument_node=""> When asked what would make a revised work eligible, the chairman of that year's </span><a data-dcnode-id="4616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Music_jury" title="Music jury"><span data-dcnode-id="4617" instrument_node="">music jury</span></a><span data-dcnode-id="4615" instrument_node="">, </span><a data-dcnode-id="4613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Ward_%28composer%29" title="Robert Ward (composer)"><span data-dcnode-id="4614" instrument_node="">Robert Ward</span></a><span data-dcnode-id="4612" instrument_node="">, said: "Not a cut here and there...or a slight revision", but rather something that changed "the whole conception of the piece." After being read the list of revisions made to the piece, Ward acknowledged that the minor changes should not have made it eligible, but said, "the list you had here was not available to us, and we did not discuss it."</span><sup class="reference" data-dcnode-id="4609" id="cite_ref-10"><a data-dcnode-id="4610" href="#cite_note-10"><span data-dcnode-id="4611" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4608" instrument_node="">
</span></p><p data-dcnode-id="4555"><span data-dcnode-id="4606" instrument_node="">Nine women have received the Pulitzer Prize: </span><a data-dcnode-id="4604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ellen_Taaffe_Zwilich" title="Ellen Taaffe Zwilich"><span data-dcnode-id="4605" instrument_node="">Ellen Taaffe Zwilich</span></a><span data-dcnode-id="4603" instrument_node=""> in 1983; </span><a data-dcnode-id="4601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shulamit_Ran" title="Shulamit Ran"><span data-dcnode-id="4602" instrument_node="">Shulamit Ran</span></a><span data-dcnode-id="4600" instrument_node=""> in 1991; </span><a data-dcnode-id="4598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Melinda_Wagner" title="Melinda Wagner"><span data-dcnode-id="4599" instrument_node="">Melinda Wagner</span></a><span data-dcnode-id="4597" instrument_node=""> in 1999; </span><a data-dcnode-id="4595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jennifer_Higdon" title="Jennifer Higdon"><span data-dcnode-id="4596" instrument_node="">Jennifer Higdon</span></a><span data-dcnode-id="4594" instrument_node=""> in 2010; </span><a data-dcnode-id="4592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caroline_Shaw" title="Caroline Shaw"><span data-dcnode-id="4593" instrument_node="">Caroline Shaw</span></a><span data-dcnode-id="4591" instrument_node=""> in 2013; </span><a data-dcnode-id="4589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julia_Wolfe" title="Julia Wolfe"><span data-dcnode-id="4590" instrument_node="">Julia Wolfe</span></a><span data-dcnode-id="4588" instrument_node=""> in 2015;  </span><a data-dcnode-id="4586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Du_Yun" title="Du Yun"><span data-dcnode-id="4587" instrument_node="">Du Yun</span></a><span data-dcnode-id="4585" instrument_node=""> in 2017; </span><a data-dcnode-id="4583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ellen_Reid_%28composer%29" title="Ellen Reid (composer)"><span data-dcnode-id="4584" instrument_node="">Ellen Reid</span></a><span data-dcnode-id="4582" instrument_node=""> in 2019; and </span><a data-dcnode-id="4580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tania_Le%25C3%25B3n" title="Tania León"><span data-dcnode-id="4581" instrument_node="">Tania León</span></a><span data-dcnode-id="4579" instrument_node=""> in 2021. In addition to being the first woman to receive the award, Zwilich was also the first woman to receive a Doctor of Musical Arts degree in composition at the </span><a class="mw-redirect" data-dcnode-id="4577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Juilliard_School_of_Music" title="Juilliard School of Music"><span data-dcnode-id="4578" instrument_node="">Juilliard School of Music</span></a><span data-dcnode-id="4576" instrument_node="">.</span><sup class="reference" data-dcnode-id="4573" id="cite_ref-american1_11-0"><a data-dcnode-id="4574" href="#cite_note-american1-11"><span data-dcnode-id="4575" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4572" instrument_node=""> Du is the first woman of color to receive the award.</span><sup class="reference" data-dcnode-id="4569" id="cite_ref-12"><a data-dcnode-id="4570" href="#cite_note-12"><span data-dcnode-id="4571" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="4566" id="cite_ref-13"><a data-dcnode-id="4567" href="#cite_note-13"><span data-dcnode-id="4568" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="4563" id="cite_ref-14"><a data-dcnode-id="4564" href="#cite_note-14"><span data-dcnode-id="4565" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4562" instrument_node=""> </span><a data-dcnode-id="4560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Walker_%28composer%29" title="George Walker (composer)"><span data-dcnode-id="4561" instrument_node="">George Walker</span></a><span data-dcnode-id="4559" instrument_node=""> was the first African American composer to win the Prize, for his work </span><i data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">Lilacs</span></i><span data-dcnode-id="4556" instrument_node=""> in 1996.
</span></p><p data-dcnode-id="4526"><span data-dcnode-id="4554" instrument_node="">In 1992 the music jury, which that year consisted of </span><a data-dcnode-id="4552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Perle" title="George Perle"><span data-dcnode-id="4553" instrument_node="">George Perle</span></a><span data-dcnode-id="4551" instrument_node="">, </span><a data-dcnode-id="4549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roger_Reynolds" title="Roger Reynolds"><span data-dcnode-id="4550" instrument_node="">Roger Reynolds</span></a><span data-dcnode-id="4548" instrument_node="">, and </span><a data-dcnode-id="4546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harvey_Sollberger" title="Harvey Sollberger"><span data-dcnode-id="4547" instrument_node="">Harvey Sollberger</span></a><span data-dcnode-id="4545" instrument_node="">, chose </span><a data-dcnode-id="4543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ralph_Shapey" title="Ralph Shapey"><span data-dcnode-id="4544" instrument_node="">Ralph Shapey</span></a><span data-dcnode-id="4542" instrument_node="">'s </span><i data-dcnode-id="4539"><a data-dcnode-id="4540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Concerto_Fantastique" title="Concerto Fantastique"><span data-dcnode-id="4541" instrument_node="">Concerto Fantastique</span></a></i><span data-dcnode-id="4538" instrument_node=""> for the award. The Pulitzer Board rejected that decision and gave the prize to the jury's second choice, </span><a data-dcnode-id="4536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wayne_Peterson" title="Wayne Peterson"><span data-dcnode-id="4537" instrument_node="">Wayne Peterson</span></a><span data-dcnode-id="4535" instrument_node="">'s </span><i data-dcnode-id="4532"><a data-dcnode-id="4533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Face_of_the_Night%2C_the_Heart_of_the_Dark" title="The Face of the Night, the Heart of the Dark"><span data-dcnode-id="4534" instrument_node="">The Face of the Night, the Heart of the Dark</span></a></i><span data-dcnode-id="4531" instrument_node="">. The jury responded with a public statement that they had not been consulted in that decision and that the Board was not professionally qualified to make such a decision.  The Board responded that the "Pulitzers are enhanced by having, in addition to the professional's point of view, the layman's or consumer's point of view" and did not rescind its decision.</span><sup class="reference" data-dcnode-id="4528" id="cite_ref-american1_11-1"><a data-dcnode-id="4529" href="#cite_note-american1-11"><span data-dcnode-id="4530" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4527" instrument_node="">
</span></p><p data-dcnode-id="4511"><span data-dcnode-id="4525" instrument_node="">In 2004, responding to criticism, </span><a data-dcnode-id="4523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sig_Gissler" title="Sig Gissler"><span data-dcnode-id="4524" instrument_node="">Sig Gissler</span></a><span data-dcnode-id="4522" instrument_node="">, the administrator of the Pulitzer Prizes at the </span><a class="mw-redirect" data-dcnode-id="4520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Columbia_University_School_of_Journalism" title="Columbia University School of Journalism"><span data-dcnode-id="4521" instrument_node="">Columbia University School of Journalism</span></a><span data-dcnode-id="4519" instrument_node="">, announced that the board wanted to "broaden the prize a bit so that we can be more assured that we are getting the full range of the best of America's music". Board member </span><a data-dcnode-id="4517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jay_T._Harris" title="Jay T. Harris"><span data-dcnode-id="4518" instrument_node="">Jay T. Harris</span></a><span data-dcnode-id="4516" instrument_node=""> said, "The prize should not be reserved essentially for music that comes out of the European classical tradition."</span><sup class="reference" data-dcnode-id="4513" id="cite_ref-opinionjournal1_8-1"><a data-dcnode-id="4514" href="#cite_note-opinionjournal1-8"><span data-dcnode-id="4515" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4512" instrument_node="">
</span></p><p data-dcnode-id="4505"><span data-dcnode-id="4510" instrument_node="">The announced rule changes included altering the jury pool to include performers and presenters in addition to composers and critics. Entrants are no longer required to submit a score. Recordings are also accepted, although scores are still "strongly urged." Gissler said, "The main thing is we're trying to keep this a serious prize. We're not trying to dumb it down any way shape or form, but we're trying to augment it, improve it...I think the critical term here is 'distinguished American musical compositions.'"</span><sup class="reference" data-dcnode-id="4507" id="cite_ref-15"><a data-dcnode-id="4508" href="#cite_note-15"><span data-dcnode-id="4509" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4506" instrument_node=""> Reaction among Pulitzer Prize in Music winners has varied.
</span></p><p data-dcnode-id="4487"><span data-dcnode-id="4504" instrument_node="">The Pulitzer Prize Advisory Board officially announced: "After more than a year of studying the Prize, now in its 61st year, the Pulitzer Prize Board declares its strong desire to consider and honor the full range of distinguished American musical compositions—from the contemporary classical symphony to jazz, opera, choral, musical theater, movie scores and other forms of musical excellence...Through the years, the Prize has been awarded chiefly to composers of classical music and, quite properly, that has been of large importance to the arts community. However, despite some past efforts to broaden the competition, only once has the Prize gone to a jazz composition, a musical drama or a movie score. In the late 1990s, the Board took tacit note of the criticism leveled at its predecessors for failure to cite two of the country's foremost jazz composers. It bestowed a Special Citation on </span><a data-dcnode-id="4502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Gershwin" title="George Gershwin"><span data-dcnode-id="4503" instrument_node="">George Gershwin</span></a><span data-dcnode-id="4501" instrument_node=""> marking the 1998 centennial celebration of his birth and </span><a data-dcnode-id="4499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Duke_Ellington" title="Duke Ellington"><span data-dcnode-id="4500" instrument_node="">Duke Ellington</span></a><span data-dcnode-id="4498" instrument_node=""> on his 1999 centennial year. Earlier, in 1976, a Special Award was made to </span><a data-dcnode-id="4496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scott_Joplin" title="Scott Joplin"><span data-dcnode-id="4497" instrument_node="">Scott Joplin</span></a><span data-dcnode-id="4495" instrument_node=""> in the </span><a class="mw-redirect" data-dcnode-id="4493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Bicentennial" title="American Bicentennial"><span data-dcnode-id="4494" instrument_node="">American Bicentennial</span></a><span data-dcnode-id="4492" instrument_node=""> year.  While Special Awards and Citations continue to be an important option, the Pulitzer Board believes that the Music Prize, in its own annual competition, should encompass the nation's array of distinguished music and hopes that the refinements in the Prize's definition, guidelines and jury membership will serve that end.”</span><sup class="reference" data-dcnode-id="4489" id="cite_ref-16"><a data-dcnode-id="4490" href="#cite_note-16"><span data-dcnode-id="4491" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4488" instrument_node="">
</span></p><p data-dcnode-id="4467"><span data-dcnode-id="4486" instrument_node="">In 2006, a posthumous "Special Citation" was given to jazz composer </span><a data-dcnode-id="4484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thelonious_Monk" title="Thelonious Monk"><span data-dcnode-id="4485" instrument_node="">Thelonious Monk</span></a><span data-dcnode-id="4483" instrument_node="">,</span><sup class="reference" data-dcnode-id="4480" id="cite_ref-17"><a data-dcnode-id="4481" href="#cite_note-17"><span data-dcnode-id="4482" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4479" instrument_node=""> and in 2007 the prize went to </span><a data-dcnode-id="4477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ornette_Coleman" title="Ornette Coleman"><span data-dcnode-id="4478" instrument_node="">Ornette Coleman</span></a><span data-dcnode-id="4476" instrument_node="">, a free jazz composer, for his disc </span><i data-dcnode-id="4473"><a data-dcnode-id="4474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sound_Grammar" title="Sound Grammar"><span data-dcnode-id="4475" instrument_node="">Sound Grammar</span></a></i><span data-dcnode-id="4472" instrument_node="">, a recording of a 2005 concert, the first time a recording won the music Pulitzer, and a first for purely improvised music.</span><sup class="reference" data-dcnode-id="4469" id="cite_ref-18"><a data-dcnode-id="4470" href="#cite_note-18"><span data-dcnode-id="4471" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4468" instrument_node="">
</span></p><p data-dcnode-id="4447"><span data-dcnode-id="4466" instrument_node="">In 2018, rapper </span><a data-dcnode-id="4464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kendrick_Lamar" title="Kendrick Lamar"><span data-dcnode-id="4465" instrument_node="">Kendrick Lamar</span></a><span data-dcnode-id="4463" instrument_node=""> won the award for his 2017 </span><a data-dcnode-id="4461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hip_hop_music" title="Hip hop music"><span data-dcnode-id="4462" instrument_node="">hip hop</span></a><span data-dcnode-id="4460" instrument_node=""> album </span><i data-dcnode-id="4457"><a data-dcnode-id="4458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Damn_%28Kendrick_Lamar_album%29" title="Damn (Kendrick Lamar album)"><span data-dcnode-id="4459" instrument_node="">Damn</span></a></i><span data-dcnode-id="4456" instrument_node="">.</span><sup class="reference" data-dcnode-id="4453" id="cite_ref-19"><a data-dcnode-id="4454" href="#cite_note-19"><span data-dcnode-id="4455" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4452" instrument_node=""> The recording was the first musical work not in the jazz or classical genre to win the prize.</span><sup class="reference" data-dcnode-id="4449" id="cite_ref-20"><a data-dcnode-id="4450" href="#cite_note-20"><span data-dcnode-id="4451" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4448" instrument_node="">
</span></p><span data-dcnode-id="4446" instrument_node="">
</span><h2 data-dcnode-id="4436"><span class="mw-headline" data-dcnode-id="4444" id="Criticism"><span data-dcnode-id="4445" instrument_node="">Criticism</span></span><span class="mw-editsection" data-dcnode-id="4437"><span class="mw-editsection-bracket" data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">[</span></span><a data-dcnode-id="4440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPulitzer_Prize_for_Music%26action%3Dedit%26section%3D2" title="Edit section: Criticism"><span data-dcnode-id="4441" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4435" instrument_node="">
</span><p data-dcnode-id="4427"><a data-dcnode-id="4433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Martino" title="Donald Martino"><span data-dcnode-id="4434" instrument_node="">Donald Martino</span></a><span data-dcnode-id="4432" instrument_node="">, the 1974 winner, said, "If you write music long enough, sooner or later, someone is going to take pity on you and give you the damn thing. It is not always the award for the best piece of the year; it has gone to whoever hasn't gotten it before."</span><sup class="reference" data-dcnode-id="4429" id="cite_ref-Dyer_2004_21-0"><a data-dcnode-id="4430" href="#cite_note-Dyer_2004-21"><span data-dcnode-id="4431" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4428" instrument_node="">
</span></p><p data-dcnode-id="4419"><a data-dcnode-id="4425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Corigliano" title="John Corigliano"><span data-dcnode-id="4426" instrument_node="">John Corigliano</span></a><span data-dcnode-id="4424" instrument_node="">, the 2001 winner, said that although the prize was intended for music that meant something to the world, it had become a very different kind of award, "by composers for composers" and "mired in a pool of rotating jurors."</span><sup class="reference" data-dcnode-id="4421" id="cite_ref-earbox1_9-1"><a data-dcnode-id="4422" href="#cite_note-earbox1-9"><span data-dcnode-id="4423" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4420" instrument_node="">
</span></p><p data-dcnode-id="4380"><span data-dcnode-id="4418" instrument_node="">Composer and </span><a class="mw-redirect" data-dcnode-id="4416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Music_critic" title="Music critic"><span data-dcnode-id="4417" instrument_node="">music critic</span></a><span data-dcnode-id="4415" instrument_node=""> </span><a data-dcnode-id="4413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyle_Gann" title="Kyle Gann"><span data-dcnode-id="4414" instrument_node="">Kyle Gann</span></a><span data-dcnode-id="4412" instrument_node=""> complained in his essay "The Uptown Prejudice Against Downtown Music" that the judges for the Pulitzer and other top awards for composition often included "the same seven names over and over as judges": </span><a data-dcnode-id="4410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gunther_Schuller" title="Gunther Schuller"><span data-dcnode-id="4411" instrument_node="">Gunther Schuller</span></a><span data-dcnode-id="4409" instrument_node="">, </span><a data-dcnode-id="4407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Schwantner" title="Joseph Schwantner"><span data-dcnode-id="4408" instrument_node="">Joseph Schwantner</span></a><span data-dcnode-id="4406" instrument_node="">, </span><a data-dcnode-id="4404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacob_Druckman" title="Jacob Druckman"><span data-dcnode-id="4405" instrument_node="">Jacob Druckman</span></a><span data-dcnode-id="4403" instrument_node="">, </span><a data-dcnode-id="4401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Perle" title="George Perle"><span data-dcnode-id="4402" instrument_node="">George Perle</span></a><span data-dcnode-id="4400" instrument_node="">, </span><a data-dcnode-id="4398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Harbison" title="John Harbison"><span data-dcnode-id="4399" instrument_node="">John Harbison</span></a><span data-dcnode-id="4397" instrument_node="">, </span><a data-dcnode-id="4395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mario_Davidovsky" title="Mario Davidovsky"><span data-dcnode-id="4396" instrument_node="">Mario Davidovsky</span></a><span data-dcnode-id="4394" instrument_node="">, and </span><a data-dcnode-id="4392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bernard_Rands" title="Bernard Rands"><span data-dcnode-id="4393" instrument_node="">Bernard Rands</span></a><span data-dcnode-id="4391" instrument_node="">. Gann argued that "Downtown" composers like himself did not win awards because the composer-judges were all "white men, all of them coming pretty much from the same narrow </span><a data-dcnode-id="4389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eurocentrism" title="Eurocentrism"><span data-dcnode-id="4390" instrument_node="">Eurocentric</span></a><span data-dcnode-id="4388" instrument_node=""> </span><a data-dcnode-id="4386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aesthetics" title="Aesthetics"><span data-dcnode-id="4387" instrument_node="">aesthetic</span></a><span data-dcnode-id="4385" instrument_node="">.... These seven men have determined who wins the big prizes in American music for the last two decades. They have made sure that Downtown composers never win."</span><sup class="reference" data-dcnode-id="4382" id="cite_ref-Gann-Downtown_22-0"><a data-dcnode-id="4383" href="#cite_note-Gann-Downtown-22"><span data-dcnode-id="4384" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4381" instrument_node="">
</span></p><p data-dcnode-id="4371"><span data-dcnode-id="4379" instrument_node="">After winning the Pulitzer in 2003, </span><a data-dcnode-id="4377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Adams_%28composer%29" title="John Adams (composer)"><span data-dcnode-id="4378" instrument_node="">John Adams</span></a><span data-dcnode-id="4376" instrument_node=""> expressed "ambivalence bordering on contempt" because "most of the country's greatest musical minds" have been ignored in favor of academic music.</span><sup class="reference" data-dcnode-id="4373" id="cite_ref-earbox1_9-2"><a data-dcnode-id="4374" href="#cite_note-earbox1-9"><span data-dcnode-id="4375" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4372" instrument_node="">
</span></p><p data-dcnode-id="4333"><span data-dcnode-id="4370" instrument_node="">Schuller welcomed the broadening of the eligibility criteria for the prize in 2004: "This is a long overdue sea change in the whole attitude as to what can be considered for the prize. It is an opening up to different styles and not at all to different levels of quality."</span><sup class="reference" data-dcnode-id="4367" id="cite_ref-Dyer_2004_21-1"><a data-dcnode-id="4368" href="#cite_note-Dyer_2004-21"><span data-dcnode-id="4369" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4366" instrument_node=""> Composer </span><a data-dcnode-id="4364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Olly_Wilson" title="Olly Wilson"><span data-dcnode-id="4365" instrument_node="">Olly Wilson</span></a><span data-dcnode-id="4363" instrument_node=""> agreed that the changes were "a move in the right direction" because they acknowledge "a wider spectrum of music, including music that is not written down."</span><sup class="reference" data-dcnode-id="4360" id="cite_ref-Dyer_2004_21-2"><a data-dcnode-id="4361" href="#cite_note-Dyer_2004-21"><span data-dcnode-id="4362" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4359" instrument_node=""> Some other former prize winners disagreed. Harbison called it "a horrible development", adding, "If you were to impose a comparable standard on fiction you would be soliciting entries from the authors of airport novels."</span><sup class="reference" data-dcnode-id="4356" id="cite_ref-Dyer_2004_21-3"><a data-dcnode-id="4357" href="#cite_note-Dyer_2004-21"><span data-dcnode-id="4358" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4355" instrument_node=""> According to Martino, the prize had "already begun to go in the direction of permitting less serious stuff" before the 2004 changes.</span><sup class="reference" data-dcnode-id="4352" id="cite_ref-Dyer_2004_21-4"><a data-dcnode-id="4353" href="#cite_note-Dyer_2004-21"><span data-dcnode-id="4354" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4351" instrument_node=""> </span><a data-dcnode-id="4349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lewis_Spratlan" title="Lewis Spratlan"><span data-dcnode-id="4350" instrument_node="">Lewis Spratlan</span></a><span data-dcnode-id="4348" instrument_node="">, who won the prize in 2000, also objected, saying "The Pulitzer is one of the very few prizes that award artistic distinction in front-edge, risk-taking music. To dilute this objective by inviting the likes of musicals and movie scores, no matter how excellent, is to undermine the distinctiveness and capability for artistic advancement."</span><sup class="reference" data-dcnode-id="4345" id="cite_ref-Dyer_2004_21-5"><a data-dcnode-id="4346" href="#cite_note-Dyer_2004-21"><span data-dcnode-id="4347" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4344" instrument_node=""> In 2018, 1970 winner </span><a data-dcnode-id="4342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Wuorinen" title="Charles Wuorinen"><span data-dcnode-id="4343" instrument_node="">Charles Wuorinen</span></a><span data-dcnode-id="4341" instrument_node=""> denounced the jury for awarding the music award to Lamar, telling the </span><i data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">New York Times</span></i><span data-dcnode-id="4338" instrument_node=""> the decision constituted "the final disappearance of any societal interest in high culture."</span><sup class="reference" data-dcnode-id="4335" id="cite_ref-Associated_Press_23-0"><a data-dcnode-id="4336" href="#cite_note-Associated_Press-23"><span data-dcnode-id="4337" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4334" instrument_node="">
</span></p><span data-dcnode-id="4332" instrument_node="">
</span><h2 data-dcnode-id="4322"><span class="mw-headline" data-dcnode-id="4330" id="Winners"><span data-dcnode-id="4331" instrument_node="">Winners</span></span><span class="mw-editsection" data-dcnode-id="4323"><span class="mw-editsection-bracket" data-dcnode-id="4328"><span data-dcnode-id="4329" instrument_node="">[</span></span><a data-dcnode-id="4326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPulitzer_Prize_for_Music%26action%3Dedit%26section%3D3" title="Edit section: Winners"><span data-dcnode-id="4327" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4324"><span data-dcnode-id="4325" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4321" instrument_node="">
</span><p data-dcnode-id="4315"><span data-dcnode-id="4320" instrument_node="">In its first 71 years, the Music Pulitzer was awarded 67 times; it was never split, and no prize was given in 1953, 1964, 1965, or 1981.</span><sup class="reference" data-dcnode-id="4317" id="cite_ref-prize_24-0"><a data-dcnode-id="4318" href="#cite_note-prize-24"><span data-dcnode-id="4319" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4316" instrument_node="">
</span></p><span data-dcnode-id="4314" instrument_node="">
</span><h3 data-dcnode-id="4304"><span class="mw-headline" data-dcnode-id="4312" id="1940s"><span data-dcnode-id="4313" instrument_node="">1940s</span></span><span class="mw-editsection" data-dcnode-id="4305"><span class="mw-editsection-bracket" data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">[</span></span><a data-dcnode-id="4308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPulitzer_Prize_for_Music%26action%3Dedit%26section%3D4" title="Edit section: 1940s"><span data-dcnode-id="4309" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4303" instrument_node="">
</span><ul data-dcnode-id="4236"><li data-dcnode-id="4295"><span data-dcnode-id="4302" instrument_node="">1943: </span><a data-dcnode-id="4300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Schuman" title="William Schuman"><span data-dcnode-id="4301" instrument_node="">William Schuman</span></a><span data-dcnode-id="4299" instrument_node="">, </span><i data-dcnode-id="4296"><a data-dcnode-id="4297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secular_Cantata_No._2%3A_A_Free_Song" title="Secular Cantata No. 2: A Free Song"><span data-dcnode-id="4298" instrument_node="">Secular Cantata No. 2: A Free Song</span></a></i></li><span data-dcnode-id="4294" instrument_node="">
</span><li data-dcnode-id="4284"><span data-dcnode-id="4293" instrument_node="">1944: </span><a data-dcnode-id="4291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Howard_Hanson" title="Howard Hanson"><span data-dcnode-id="4292" instrument_node="">Howard Hanson</span></a><span data-dcnode-id="4290" instrument_node="">, </span><a data-dcnode-id="4288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Symphony_No._4_%28Hanson%29" title="Symphony No. 4 (Hanson)"><span data-dcnode-id="4289" instrument_node="">Symphony No. 4</span></a><span data-dcnode-id="4287" instrument_node="">, </span><i data-dcnode-id="4285"><span data-dcnode-id="4286" instrument_node="">Requiem</span></i></li><span data-dcnode-id="4283" instrument_node="">
</span><li data-dcnode-id="4272"><span data-dcnode-id="4282" instrument_node="">1945: </span><a data-dcnode-id="4280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aaron_Copland" title="Aaron Copland"><span data-dcnode-id="4281" instrument_node="">Aaron Copland</span></a><span data-dcnode-id="4279" instrument_node="">, </span><i data-dcnode-id="4276"><a data-dcnode-id="4277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Appalachian_Spring" title="Appalachian Spring"><span data-dcnode-id="4278" instrument_node="">Appalachian Spring</span></a></i><span data-dcnode-id="4275" instrument_node="">, </span><a data-dcnode-id="4273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballet" title="Ballet"><span data-dcnode-id="4274" instrument_node="">ballet</span></a></li><span data-dcnode-id="4271" instrument_node="">
</span><li data-dcnode-id="4263"><span data-dcnode-id="4270" instrument_node="">1946: </span><a data-dcnode-id="4268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leo_Sowerby" title="Leo Sowerby"><span data-dcnode-id="4269" instrument_node="">Leo Sowerby</span></a><span data-dcnode-id="4267" instrument_node="">, </span><i data-dcnode-id="4264"><a data-dcnode-id="4265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Canticle_of_the_Sun_%28Sowerby%29" title="The Canticle of the Sun (Sowerby)"><span data-dcnode-id="4266" instrument_node="">The Canticle of the Sun</span></a></i></li><span data-dcnode-id="4262" instrument_node="">
</span><li data-dcnode-id="4255"><span data-dcnode-id="4261" instrument_node="">1947: </span><a data-dcnode-id="4259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Ives" title="Charles Ives"><span data-dcnode-id="4260" instrument_node="">Charles Ives</span></a><span data-dcnode-id="4258" instrument_node="">, </span><a data-dcnode-id="4256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Symphony_No._3_%28Ives%29" title="Symphony No. 3 (Ives)"><span data-dcnode-id="4257" instrument_node="">Symphony No. 3</span></a></li><span data-dcnode-id="4254" instrument_node="">
