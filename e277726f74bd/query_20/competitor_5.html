ta-dcnode-id="1363"><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">The Pulitzer Prize category for Fiction was established in 1948, replacing the Pulitzer Prize for the Novel category and awarding acclaim and $15,000 dollars to American authors of outstanding fiction. There have been 67 winners of this esteemed award to date, building a glittering hall of fame for an incredible array of novels.&nbsp;</span></p><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">(Math whizzes will notice those numbers don't add up to the current year—and that's because the committee occasionally declines to declare a winner from the finalists. That isn't because none of the books are deserving of the prize; this happens when none of the finalists received a majority of the vote.)</span></p><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">The winners of the Pulitzer Prizes are generally announced each April, but any time is a good time to look back on all of the novels that claimed the honor before. Here is a complete list of the Pulitzer Prize winners for Fiction.</span></p><p data-dcnode-id="1364"><strong data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Related: </span></strong><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earlybirdbooks.com/25-classic-must-read-books"><strong data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">35 Must-Read Modern Classics</span></strong></a><span data-dcnode-id="1365" instrument_node="">&nbsp;</span></p></div><div class="header" data-dcnode-id="1359"><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">1940s</span></p><span data-dcnode-id="1360" instrument_node="">

</span><p data-dcnode-id="1110"><strong data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">1961: </span></strong><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Kill-Mockingbird-Harperperennial-Modern-Classics-ebook/dp/B00K0OI42W/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="1116"><em data-dcnode-id="1117"><ins data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">To Kill a Mockingbird</span></ins></em></strong></a><strong data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node=""> by Harper Lee</span></strong><br data-dcnode-id="1112"><span data-dcnode-id="1111" instrument_node="">Amidst the rampant prejudice of the south, a young girl, Scout, comes of age. Meanwhile, her father Atticus, a noble local lawyer, fights for a wrongly accused black man.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1098"><strong data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Related: </span></strong><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earlybirdbooks.com/books-like-to-kill-a-mockingbird" target="_blank"><strong data-dcnode-id="1104"><ins data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Books Like </span></ins></strong><strong data-dcnode-id="1100"><em data-dcnode-id="1101"><ins data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">To Kill a Mockingbird</span></ins></em></strong></a></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1085"><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">1962: </span></strong><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Edge-Sadness-Loyola-Classics-ebook/dp/B002BNKQ8A/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="1091"><em data-dcnode-id="1092"><ins data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">The Edge of Sadness</span></ins></em></strong></a><strong data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node=""> by Edwin O'Connor</span></strong><br data-dcnode-id="1087"><span data-dcnode-id="1086" instrument_node="">Picking himself up from the devastation of his alcoholism, Father Hugh Kennedy returns to Boston to repair his priesthood. Along his journey, he finds himself entangled in the chaos of the Carmody family.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1072"><strong data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">1963: </span></strong><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Reivers-William-Faulkner-ebook/dp/B085ZGW4VJ/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="1078"><em data-dcnode-id="1079"><ins data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">The Reivers</span></ins></em></strong></a><strong data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node=""> by William Faulkner</span></strong><br data-dcnode-id="1074"><span data-dcnode-id="1073" instrument_node="">The young Lucius priest and his family friend Boon Hogganbeck travel to Memphis so Boon can court a prostitute, Corrie, for marriage. Little do they know, they have a stowaway.</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1059"><strong data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">1965: </span></strong><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Keepers-House-Shirley-Ann-Grau-ebook/dp/B007GSU1LC/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="1065"><em data-dcnode-id="1066"><ins data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">The Keepers of the House</span></ins></em></strong></a><strong data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node=""> by Shirley Ann Grau</span></strong><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">The Howland family has accumulated wealth and acclaim in the South for seven generations, but when a mixed-race heritage comes to light, Abigail stands to defend her family at all costs.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1045"><strong data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">1966: </span></strong><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Collected-Stories-Katherine-Anne-Porter/dp/0156188767/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="1052"><em data-dcnode-id="1053"><ins data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">The Collected Stories of Katherine Anne Porter</span></ins></em></strong></a><span data-dcnode-id="1050" instrument_node=""> </span><strong data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">by Katherine Anne Porter</span></strong><br data-dcnode-id="1047"><span data-dcnode-id="1046" instrument_node="">A compilation of stories including “Flowering Judas,” “Pale Horse, Pale Rider,” and “The Leaning Tower.”&nbsp;</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1032"><strong data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">1967: </span></strong><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Fixer-Novel-FSG-Classics-ebook/dp/B006GR7JRS/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="1038"><em data-dcnode-id="1039"><ins data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">The Fixer</span></ins></em></strong></a><strong data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node=""> by Bernard Malamud</span></strong><br data-dcnode-id="1034"><span data-dcnode-id="1033" instrument_node="">In 1911, a Jewish man, Yakov Bok, travels to Kiev to make a living, ultimately shedding his heritage to work as a handyman for a member of an anti-semitic group. But when a young Russian boy is found ritualistically murdered, Yakov is left with the blame.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1019"><strong data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">1968: </span></strong><a data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Confessions-Nat-Turner-Novel-ebook/dp/B00B06NAAA/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="1025"><em data-dcnode-id="1026"><ins data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">The Confessions of Nat Turner</span></ins></em></strong></a><strong data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node=""> by William Styron</span></strong><br data-dcnode-id="1021"><span data-dcnode-id="1020" instrument_node="">A fictional imagining of the real-life Virginia slave revolt of 1831, led by Nat Turner.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1006"><strong data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">1969: </span></strong><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/House-Made-Dawn-50th-Anniversary/dp/0062909959/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="1012"><em data-dcnode-id="1013"><ins data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">House Made of Dawn</span></ins></em></strong></a><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node=""> by N. Scott Momaday</span></strong><br data-dcnode-id="1008"><span data-dcnode-id="1007" instrument_node="">As Abel, a young Native American, returns from war, he finds himself torn between a life full of the history of his people connected deeply to the earth, and the modern and seductive world of industrial America</span></p><span data-dcnode-id="1005" instrument_node="">
</span></div><div class="header" data-dcnode-id="1000"><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">1970s</span></p><span data-dcnode-id="1001" instrument_node="">
</span></div><div class="jsx-fb7aed18a32c0dd1 jsx-3257975100 book-listicle" data-dcnode-id="979"><span data-dcnode-id="999" instrument_node=""></span><div class="jsx-fb7aed18a32c0dd1 jsx-3257975100 info" data-dcnode-id="980"><div class="jsx-fb7aed18a32c0dd1 jsx-3257975100 image" data-dcnode-id="994"><div class="afb__book-cover" data-dcnode-id="995"><figure class="jsx-9900691a49693584" data-dcnode-id="996"><img alt="elbow room james alan mcpherson pulitzer prize winners for fiction" class="undefined lazyloaded" data-dcnode-id="998" data-src="https://orion-uploads.openroadmedia.com/sm_705925060722-elbow-admin.jpg" height="320" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orion-uploads.openroadmedia.com/sm_705925060722-elbow-admin.jpg&amp;raw" style="max-width:100%" title="elbow-room_james-alan-mcpherson" width="210"><figcaption class="jsx-9900691a49693584" data-dcnode-id="997"></figcaption></figure></div></div><div class="jsx-fb7aed18a32c0dd1 jsx-3257975100 afb__description" data-dcnode-id="981"><h3 class="jsx-7103dcf9959a173d afb__title" data-dcnode-id="992"><span class="jsx-7103dcf9959a173d" data-dcnode-id="993"></span></h3><div class="jsx-f618889aca3e9850 content" data-dcnode-id="988"><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">&nbsp;</span></p><span data-dcnode-id="989" instrument_node="">
</span></div><div class="jsx-2859406913 bookListicleAf affiliate-button" data-dcnode-id="982"><div class="jsx-2859406913 large-12" data-dcnode-id="983"><span data-dcnode-id="987" instrument_node=""></span><div class="jsx-2859406913 afb__book-cover" data-dcnode-id="985"><img alt="elbow room james alan mcpherson pulitzer prize winners for fiction" class="jsx-9c42ba2fc62b2e40 lazyload undefined" data-dcnode-id="986" data-src="https://orion-uploads.openroadmedia.com/md_705925060722-elbow-admin.jpg" height="320" title="elbow-room_james-alan-mcpherson" width="210"></div><div class="jsx-2859406913 buttonContainer external" data-dcnode-id="984"></div></div></div></div></div></div><div class="jsx-f618889aca3e9850 content" data-dcnode-id="877"><p data-dcnode-id="965"><strong data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">1970:</span></strong><span data-dcnode-id="976" instrument_node=""> </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Collected-Stories-Jean-Stafford/dp/B081P8WKZY/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="972"><em data-dcnode-id="973"><ins data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">The Collected Stories of Jean Stafford</span></ins></em></strong><span data-dcnode-id="971" instrument_node=""> </span></a><strong data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">by Jean Stafford</span></strong><br data-dcnode-id="967"><span data-dcnode-id="966" instrument_node="">A compilation of short stories centered around the ideas of loneliness, freedom, and the desperate need to belong.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="952"><strong data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">1972: </span></strong><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Angle-Repose-Penguin-Twentieth-Century-Classics-ebook/dp/B002CIY8FG/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="958"><em data-dcnode-id="959"><ins data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Angle of Repose</span></ins></em></strong></a><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node=""> by Wallace Stegner</span></strong><br data-dcnode-id="954"><span data-dcnode-id="953" instrument_node="">Wheelchair-bound ex-historian Lyman Ward begins to write the story of his grandparents’ contributions to the growing civilization of the western frontier. But as a tale of four generations unfolds, Ward learns more about himself than he bargained for.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="939"><strong data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">1973: </span></strong><a data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Optimists-Daughter-Vintage-International-ebook/dp/B004IK8PXW/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="945"><em data-dcnode-id="946"><ins data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">The Optimist's Daughter</span></ins></em></strong></a><strong data-dcnode-id="942"><span data-dcnode-id="943" instrument_node=""> by Eudora Welty</span></strong><br data-dcnode-id="941"><span data-dcnode-id="940" instrument_node="">As her father faces death, Laurel McKelva Hand returns to New Orleans. After her dad’s passing, Laurel ventures even further into her past, traveling with her young stepmother to Mississippi and seeking a deeper understanding of her family history.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="926"><strong data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">1975: </span></strong><a data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Killer-Angels-Classic-Novel-1861-1865-ebook/dp/B003O86Q8U/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="932"><em data-dcnode-id="933"><ins data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">The Killer Angels</span></ins></em></strong></a><strong data-dcnode-id="929"><span data-dcnode-id="930" instrument_node=""> by Michael Shaara</span></strong><br data-dcnode-id="928"><span data-dcnode-id="927" instrument_node="">This dramatic fictional recreation of the Battle of Gettysburg explores the conflicting hopes of the two warring armies, and the four most brutal days of the Civil War.</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="913"><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">1976: </span></strong><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Humboldts-Gift-Saul-Bellow-ebook/dp/B019CT4OJ2/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="919"><em data-dcnode-id="920"><ins data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Humboldt's Gift</span></ins></em></strong></a><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node=""> by Saul Bellow </span></strong><br data-dcnode-id="915"><span data-dcnode-id="914" instrument_node="">Charlie Citrine’s obsessive adoration of literature entangles him in a friendship with poet Von Humboldt Fleisher. However, upon the poet’s death, Charlie spirals down a path of self-implosion.&nbsp;</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="900"><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">1978: </span></strong><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Elbow-Room-James-Alan-McPherson/dp/0449213579/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="906"><em data-dcnode-id="907"><ins data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Elbow Room</span></ins></em></strong></a><strong data-dcnode-id="903"><span data-dcnode-id="904" instrument_node=""> by James Alan McPherson</span></strong><br data-dcnode-id="902"><span data-dcnode-id="901" instrument_node="">A collection of short stories which spans the intricacies and differences of black and white Americans.</span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="887"><strong data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">1979: </span></strong><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Stories-John-Cheever-Vintage-International-ebook/dp/B003WUYQC8/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="893"><em data-dcnode-id="894"><ins data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">The Stories of John Cheever</span></ins></em></strong></a><strong data-dcnode-id="890"><span data-dcnode-id="891" instrument_node=""> by John Cheever</span></strong><br data-dcnode-id="889"><span data-dcnode-id="888" instrument_node="">61 short s tories, including an exploration of city life in “The Enormous Radio,” and a dive into the enigmatic suburbia in “The Housebreaker of Shady Hill.”</span></p><span data-dcnode-id="886" instrument_node="">

</span></div><div class="jsx-2859406913 bookListicleAf affiliate-button" data-dcnode-id="853"><div class="jsx-2859406913 large-12" data-dcnode-id="854"><span data-dcnode-id="858" instrument_node=""></span><div class="jsx-2859406913 afb__book-cover" data-dcnode-id="856"><img alt="the color purple alice walker pulitzer prize winners for fiction" class="jsx-9c42ba2fc62b2e40 lazyload undefined" data-dcnode-id="857" data-src="https://orion-uploads.openroadmedia.com/md_4ac159efe611-color-purple-admin.jpg" height="320" title="the-color-purple_alice-walker" width="210"></div><div class="jsx-2859406913 buttonContainer external" data-dcnode-id="855"></div></div></div></div></div></div><div class="jsx-f618889aca3e9850 content" data-dcnode-id="701"><p data-dcnode-id="838"><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">1980: </span></strong><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Executioners-Song-Norman-Mailer-ebook/dp/B005S9PMMY/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="844"><em data-dcnode-id="845"><ins data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">The Executioner's Song</span></ins></em></strong></a><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node=""> by Norman Mailer</span></strong><br data-dcnode-id="840"><span data-dcnode-id="839" instrument_node="">Gary Gilmore gained notoriety after robbing and murdering two men in 1976. Upon his conviction, he insisted that he would be promptly executed, kicking off a fight against a system that seemed intent on keeping him alive as long as possible.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="825"><strong data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">1981: </span></strong><a data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Confederacy-Dunces-John-Kennedy-Toole-ebook/dp/B008UX2UIO/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="831"><em data-dcnode-id="832"><ins data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">A Confederacy of Dunces</span></ins></em></strong></a><strong data-dcnode-id="828"><span data-dcnode-id="829" instrument_node=""> by John Kennedy Toole</span></strong><br data-dcnode-id="827"><span data-dcnode-id="826" instrument_node="">As the educated but lazy Ignatius J. Reilly seeks employment, he finds himself in the middle of comic antics with a cast of varied characters.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="802"><strong data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">1982: </span></strong><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Rabbit-Rich-John-Updike-ebook/dp/B003WUYRJA/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="818"><em data-dcnode-id="819"><ins data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Rabbit Is Rich</span></ins></em></strong></a><strong data-dcnode-id="815"><span data-dcnode-id="816" instrument_node=""> by John Updike</span></strong><br data-dcnode-id="814"><span data-dcnode-id="813" instrument_node="">This book follows after </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Rabbit-Run-John-Updike-ebook/dp/B003WUYR5E/%3Ftag%3Debb-site1-20" target="_blank"><em data-dcnode-id="810"><ins data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Rabbit, Run</span></ins></em></a><span data-dcnode-id="808" instrument_node=""> and </span><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Rabbit-Redux-John-Updike-ebook/dp/B003WUYRAY/%3Ftag%3Debb-site1-20" target="_blank"><em data-dcnode-id="805"><ins data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Rabbit Redux</span></ins></em></a><span data-dcnode-id="803" instrument_node="">, picking up ten years later as Harry Angstrom works as a chief sales representative for Springer Motors. Life is going swell—until his wayward son Nelson and an old love come back to haunt him.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="789"><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">1983: </span></strong><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Color-Purple-Alice-Walker-ebook/dp/B005NY4QGM/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="795"><em data-dcnode-id="796"><ins data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">The Color Purple</span></ins></em></strong></a><strong data-dcnode-id="792"><span data-dcnode-id="793" instrument_node=""> by Alice Walker </span></strong><br data-dcnode-id="791"><span data-dcnode-id="790" instrument_node="">Celie has grown up in a poor and abusive home in rural Georgia, trying to protect her sister Nettie even as Celie continues further down a path of devastating violence. But as she writes letters to Nettie, who is away on a church mission, she discovers herself through God, her husband’s mistress, and her stepson’s wife.</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="781"><strong data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Related: </span></strong><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earlybirdbooks.com/alice-walker-books" target="_blank"><strong data-dcnode-id="783"><ins data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Beyond The Color Purple: Must-Read Alice Walker Books</span></ins></strong></a></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="768"><strong data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">1984: </span></strong><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Ironweed-William-Kennedy-ebook/dp/B01E7FUSU0/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="774"><em data-dcnode-id="775"><ins data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Ironweed</span></ins></em></strong></a><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node=""> by William Kennedy</span></strong><br data-dcnode-id="770"><span data-dcnode-id="769" instrument_node="">Ex-ballplayer Francis Phelan experienced tragedy like no other when he dropped his infant son, causing the young boy to die. Years later in 1938, Phelan is a gravedigging bum trying to make peace with his past.</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="755"><strong data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">1985: </span></strong><a data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Foreign-Affairs-Novel-Alison-Lurie-ebook/dp/B00CSCNJQA/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="761"><em data-dcnode-id="762"><ins data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Foreign Affairs</span></ins></em></strong></a><strong data-dcnode-id="758"><span data-dcnode-id="759" instrument_node=""> by Alison Lurie</span></strong><br data-dcnode-id="757"><span data-dcnode-id="756" instrument_node="">In London, two American scholars—Vinnie Miner and Fred Turner—find themselves in the middle of unexpected love affairs.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="742"><strong data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">1986: </span></strong><a data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Lonesome-Dove-Novel-Larry-McMurtry-ebook/dp/B003NE6HD4/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="748"><em data-dcnode-id="749"><ins data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Lonesome Dove</span></ins></em></strong></a><strong data-dcnode-id="745"><span data-dcnode-id="746" instrument_node=""> by Larry McMurtry</span></strong><br data-dcnode-id="744"><span data-dcnode-id="743" instrument_node="">A pair of old Texas Rangers set out on one last journey, encountering outlaws, Indians, and their fair share of working girls.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="729"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">1987: </span></strong><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Summons-Memphis-Peter-Taylor/dp/0375701176/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="735"><em data-dcnode-id="736"><ins data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">A Summons to Memphis</span></ins></em></strong></a><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node=""> by Peter Taylor</span></strong><br data-dcnode-id="731"><span data-dcnode-id="730" instrument_node="">Phi llip Carver receives a phone call from his family back in Tennessee, begging him for his help bringing an end to their father’s remarriage. Trudging back home to the south, Philip is overwhelmed by his complicated family and his rocky past.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="716"><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">1988: </span></strong><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Beloved-Vintage-International-Toni-Morrison-ebook/dp/B000TWUTYG/ebb-site1-20" target="_blank"><strong data-dcnode-id="722"><em data-dcnode-id="723"><ins data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Beloved</span></ins></em></strong></a><strong data-dcnode-id="719"><span data-dcnode-id="720" instrument_node=""> by Toni Morrison</span></strong><br data-dcnode-id="718"><span data-dcnode-id="717" instrument_node="">Sethe escaped to Ohio to claw her way out of the slavery she was born into. But freedom is fleeting, as the memories of the farm she worked out haunt her—as well as the ghost of her baby that died during her captivity.</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="703"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">1989: </span></strong><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Breathing-Lessons-Novel-Anne-Tyler-ebook/dp/B004GTLKLY/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="709"><em data-dcnode-id="710"><ins data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Breathing Lessons</span></ins></em></strong></a><strong data-dcnode-id="706"><span data-dcnode-id="707" instrument_node=""> by Anne Tyler</span></strong><br data-dcnode-id="705"><span data-dcnode-id="704" instrument_node="">Ira and Maggie Moran set out on a road trip from Baltimore, Maryland to Deer Lick, Pennsylvania, bound for the funeral of a friend. Along the journey, the two of them reflect upon the ups and downs of their marriage.</span></p><span data-dcnode-id="702" instrument_node="">

</span></div><div class="jsx-fb7aed18a32c0dd1 jsx-3257975100 book-listicle" data-dcnode-id="669"><span data-dcnode-id="696" instrument_node=""></span><div class="jsx-fb7aed18a32c0dd1 jsx-3257975100 info" data-dcnode-id="670"><div class="jsx-fb7aed18a32c0dd1 jsx-3257975100 image" data-dcnode-id="691"><div class="afb__book-cover" data-dcnode-id="692"><figure class="jsx-9900691a49693584" data-dcnode-id="693"><img alt="postimage" class="undefined lazyload" data-dcnode-id="695" data-src="https://book-assets.openroadmedia.com/9780795337604.jpg" height="320" style="max-width:100%" title="https://book-assets.openroadmedia.com/9780795337604.jpg" width="210"><figcaption class="jsx-9900691a49693584" data-dcnode-id="694"></figcaption></figure></div></div><div class="jsx-fb7aed18a32c0dd1 jsx-3257975100 afb__description" data-dcnode-id="671"><h3 class="jsx-7103dcf9959a173d afb__title" data-dcnode-id="688"><span class="jsx-7103dcf9959a173d" data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">The Mambo Kings Play Songs of Love</span></span></h3><p class="jsx-ff72e5293151f05a afb__author" data-dcnode-id="682"><span class="jsx-ff72e5293151f05a" data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">By</span></span><span data-dcnode-id="685" instrument_node=""> </span><span data-dcnode-id="683" instrument_node="">Oscar Hijuelos</span></p><div class="jsx-f618889aca3e9850 content" data-dcnode-id="678"><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">&nbsp;</span></p><span data-dcnode-id="679" instrument_node="">
</span></div><div class="jsx-2183639745 bookListicleAf affiliate-button" data-dcnode-id="672"><div class="jsx-2183639745 large-12" data-dcnode-id="673"><span data-dcnode-id="677" instrument_node=""></span><div class="jsx-2183639745 afb__book-cover" data-dcnode-id="675"><img alt="image" class="jsx-9c42ba2fc62b2e40 lazyload undefined" data-dcnode-id="676" data-src="https://book-assets.openroadmedia.com/9780795337604.jpg" height="320" title="" width="210"></div><div class="jsx-2183639745 buttonContainer" data-dcnode-id="674"></div></div></div></div></div></div><div class="jsx-f618889aca3e9850 content" data-dcnode-id="512"><p data-dcnode-id="657"><strong data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">1990: </span></strong><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Mambo-Kings-Play-Songs-Love-ebook/dp/B07N1C6TKQ/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="663"><em data-dcnode-id="664"><ins data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">The Mambo Kings Play Songs of Love</span></ins></em></strong></a><strong data-dcnode-id="660"><span data-dcnode-id="661" instrument_node=""> by Oscar Hijuelos</span></strong><br data-dcnode-id="659"><span data-dcnode-id="658" instrument_node="">Brothers Nestor  and Caesar Camillo leave Cuba in 1949 to become famous mambo musicians. This novel follows them on their journey through dance halls and clubs in search of that musical fame.</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="641"><strong data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">1991: </span></strong><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Rabbit-at-Rest-John-Updike-ebook/dp/B003WUYQKA/%3Ftag%3Debb-site1-20/" target="_blank"><strong data-dcnode-id="650"><em data-dcnode-id="651"><ins data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Rabbit at Rest</span></ins></em></strong></a><strong data-dcnode-id="647"><span data-dcnode-id="648" instrument_node=""> by John Updike</span></strong><br data-dcnode-id="646"><span data-dcnode-id="645" instrument_node="">This follow up to </span><em data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Rabbit is Rich</span></em><span data-dcnode-id="642" instrument_node=""> follows Harry Angstrom through the trials of middle-age, from the erratic behavior of his son to the decision of his wife to return to work.</span></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="623"><strong data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">1992: </span></strong><a data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Thousand-Acres-Novel-Jane-Smiley-ebook/dp/B004HFRJKI/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="634"><em data-dcnode-id="635"><ins data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">A Thousand Acres</span></ins></em></strong></a><strong data-dcnode-id="631"><span data-dcnode-id="632" instrument_node=""> by Jane Smiley</span></strong><br data-dcnode-id="630"><span data-dcnode-id="629" instrument_node="">In this 21st Century reimagining of </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/King-Lear-Shakespeare-Footnotes-Illustrated-ebook/dp/B01MTF0TLC/%3Ftag%3Debb-site1-20" target="_blank"><em data-dcnode-id="626"><ins data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">King Lear</span></ins></em></a><span data-dcnode-id="624" instrument_node="">, an Iowa farmer attempts to divvy up his farm amongst his three daughters. But a dark and tragic string of events soon unfolds at this decision.</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="610"><strong data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">1993: </span></strong><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Good-Scent-Strange-Mountain-ebook/dp/B008TSRXFU/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="616"><em data-dcnode-id="617"><ins data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">A Good Scent from a Strange Mountain</span></ins></em></strong></a><strong data-dcnode-id="613"><span data-dcnode-id="614" instrument_node=""> by Robert Olen Butler</span></strong><br data-dcnode-id="612"><span data-dcnode-id="611" instrument_node="">This collection of stories all relate back to the aftermath of the Vietnam War, and how the conflict made a mark on the lives of the Vietnamese.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="597"><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">1994: </span></strong><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Shipping-News-Novel-Annie-Proulx-ebook/dp/B00133YTM8/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="603"><em data-dcnode-id="604"><ins data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">The Shipping News</span></ins></em></strong></a><strong data-dcnode-id="600"><span data-dcnode-id="601" instrument_node=""> by Annie Proulx</span></strong><br data-dcnode-id="599"><span data-dcnode-id="598" instrument_node="">After newspaper reporter Quoyle’s abusive and disloyal wife Petal Bear dies, he and his two unstable daughters move in with his aunt. Together the three generations try to cobble together some sense of a normal life.</span></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="584"><strong data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">1995: </span></strong><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Stone-Diaries-Penguin-Classics-Deluxe-ebook/dp/B001GRRHN4/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="590"><em data-dcnode-id="591"><ins data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">The Stone Diaries</span></ins></em></strong></a><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node=""> by Carol Shields </span></strong><br data-dcnode-id="586"><span data-dcnode-id="585" instrument_node="">A fictionalized autobiography of Daisy Goodwill Flett, an ordinary woman with an extraordinary life.</span></p><span data-dcnode-id="583" instrument_node="">

</span><p data-dcnode-id="558"><strong data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">1996: </span></strong><a data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Independence-Day-Bascombe-Trilogy-2-ebook/dp/B0040GJE1G/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="569"><em data-dcnode-id="570"><ins data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Independence Day</span></ins></em></strong></a><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node=""> by Richard Ford </span></strong><br data-dcnode-id="565"><span data-dcnode-id="564" instrument_node="">In this sequel to </span><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Sportswriter-Bascombe-Trilogy-1-ebook/dp/B0049P1M22/%3Ftag%3Debb-site1-20" target="_blank"><em data-dcnode-id="561"><ins data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">The Sportswriter</span></ins></em></a><span data-dcnode-id="559" instrument_node="">, Frank Bascombe struggles for normalcy in the wake of his divorce and crumbling career. Over the Fourth of July holiday, Frank is thrown into the peak strangeness of his new life.</span></p><span data-dcnode-id="557" instrument_node="">

</span><p data-dcnode-id="462"><strong data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">2001: </span></strong><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Amazing-Adventures-Kavalier-bonus-content-ebook/dp/B0070O5F4U/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="468"><em data-dcnode-id="469"><ins data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">The Amazing Adventures of Kavalier &amp; Clay</span></ins></em></strong></a><strong data-dcnode-id="465"><span data-dcnode-id="466" instrument_node=""> by Michael Chabon</span></strong><br data-dcnode-id="464"><span data-dcnode-id="463" instrument_node="">In the loom of World War II, comic books thrive in America. Two boys seek to capitalize on the craze, dreaming up wild and heroic tales.</span></p><span data-dcnode-id="461" instrument_node="">

</span><p data-dcnode-id="441"><strong data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">2002: </span></strong><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Empire-Falls-Vintage-Contemporaries-Richard-ebook/dp/B005WBEGSE/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="447"><em data-dcnode-id="448"><ins data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Empire Falls</span></ins></em></strong></a><strong data-dcnode-id="444"><span data-dcnode-id="445" instrument_node=""> by Richard Russo</span></strong><br data-dcnode-id="443"><span data-dcnode-id="442" instrument_node="">Empire Falls is a blue-collar town full of simple comforts and lifelong feuds. At the center of it all is Miles Roby, stuck slinging burgers at the Empire Grill and living the ultimate ups and downs.</span></p><span data-dcnode-id="440" instrument_node="">

</span><p data-dcnode-id="356"><strong data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">2008: </span></strong><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Brief-Wondrous-Life-Oscar-Wao-ebook/dp/B000UZJRGI/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="362"><em data-dcnode-id="363"><ins data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">The Brief Wondrous Life of Oscar Wao</span></ins></em></strong></a><strong data-dcnode-id="359"><span data-dcnode-id="360" instrument_node=""> by Junot Díaz</span></strong><br data-dcnode-id="358"><span data-dcnode-id="357" instrument_node="">Oscar wants more than  anything to one day become the Dominican equivalent of J.R.R. Tolkien—and of course, ultimately find love—but the curse that’s been hanging over his family for generations may have other ideas.</span></p><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="343"><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">2009: </span></strong><a data-dcnode-id="348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Olive-Kitteridge-Fiction-Elizabeth-Strout-ebook/dp/B0013TRR80/%3Ftag%3Debb-site1-20" target="_blank"><strong data-dcnode-id="349"><em data-dcnode-id="350"><ins data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Olive Kitteridge</span></ins></em></strong></a><strong data-dcnode-id="346"><span data-dcnode-id="347" instrument_node=""> by Elizabeth Strout</span></strong><br data-dcnode-id="345"><span data-dcnode-id="344" instrument_node="">In a collection of 13 stories, a retired school teacher stands at the center of stories about growth, despair, hope, and love.</span></p><span data-dcnode-id="342" instrument_node="">

""> by Donna Tartt</span></strong><br data-dcnode-id="272"><span data-dcnode-id="271" instrument_node="">After the death of his mother, 13-year-old Theo Decker is taken in by family friends. However, as he grows older a painting he clung to as a boy drops him in the center of the criminal art world.</span></p><p data-dcnode-id="259"><strong data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">2015: </span></strong><a data-dcnode-id="264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/All-Light-We-Cannot-See-ebook/dp/B00DPM7TIG/%3Ftag%3Debb-site1-20" target="_blank"><i data-dcnode-id="265"><strong data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">All the Light We Cannot See</span></strong></i></a><strong data-dcnode-id="262"><span data-dcnode-id="263" instrument_node=""> by Anthony Doerr</span></strong><br data-dcnode-id="261"><span data-dcnode-id="260" instrument_node="">In the harrowing wake of World War II, a blind French girl and a German boy struggle to survive in occupied France.</span></p><p data-dcnode-id="248"><strong data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">2016: </span></strong><a data-dcnode-id="253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Sympathizer-Novel-Pulitzer-Prize-Fiction-ebook/dp/B00PSSG4MM/%3Ftag%3Debb-site1-20" target="_blank"><i data-dcnode-id="254"><strong data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">The Sympathizer</span></strong></i></a><strong data-dcnode-id="251"><span data-dcnode-id="252" instrument_node=""> by Viet Thanh Nguyen</span></strong><br data-dcnode-id="250"><span data-dcnode-id="249" instrument_node="">A French-Vietnamese army captain flees Saigon for America. While building a life among Vietnamese refugees in America, the communist double agent reports back to his superiors in Vietnam.</span></p><p data-dcnode-id="237"><strong data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">2017: </span></strong><a data-dcnode-id="242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Underground-Railroad-Pulitzer-Winner-National-ebook/dp/B01A4ATV0A/%3Ftag%3Debb-site1-20" target="_blank"><i data-dcnode-id="243"><strong data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">The Underground Railroad</span></strong></i></a><strong data-dcnode-id="240"><span data-dcnode-id="241" instrument_node=""> by Colson Whitehead</span></strong><br data-dcnode-id="239"><span data-dcnode-id="238" instrument_node="">Young slave Cora is a misfit even amongst her peers on the Georgia plantation. So when the new slave Caesar encourages her to join him on the Underground Railroad, she jumps at the chance.</span></p><p data-dcnode-id="231"><strong data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Related: </span></strong><a data-dcnode-id="232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earlybirdbooks.com/the-complete-oprahs-book-club-list" target="_blank"><strong data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">The Complete Oprah’s Book Club List</span></strong></a></p><p data-dcnode-id="220"><strong data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">2018: </span></strong><a data-dcnode-id="225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Less-Winner-Pulitzer-Prize-Novel-ebook/dp/B01MSICPW3/%3Ftag%3Debb-site1-20" target="_blank"><i data-dcnode-id="226"><strong data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Less</span></strong></i></a><strong data-dcnode-id="223"><span data-dcnode-id="224" instrument_node=""> by Andrew Sean Greer</span></strong><br data-dcnode-id="222"><span data-dcnode-id="221" instrument_node="">In an attempt to avoid the awkwardness of attending his ex-boyfriend’s wedding, failed novelist Arthur Less accepts every li
