factory Essays</span></span></div><ul class="weight-700 padding-left-1 share-block" data-dcnode-id="416"><li data-dcnode-id="420"><span class="text-s" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">150 Words</span></span></li><li data-dcnode-id="417"><span class="text-s" data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">1 Page</span></span></li></ul><div class="margin-top-auto" data-dcnode-id="413"><a class="button button--orange button--squarish text-m" data-dcnode-id="414" data-href="/document/PK2DZVQMGXPT" href="javascript:void(0);" id="ShowMoreButtonExtra" rel="nofollow"><span data-dcnode-id="415" instrument_node="">Open Document</span></a></div></div></div></div><div class="columns small-12 medium-4 large-4 rhino-slot" data-dcnode-id="409" id="AdPreviewRowSidebar"></div></div><div class="row columns padding-bottom-1 menu-essay-writing" data-dcnode-id="399" id="rowNavLinkComponent"><div class="columns large-8" data-dcnode-id="400"><div data-dcnode-id="401" style="float:right"><a class="brand-secondary preview-active-menu" data-dcnode-id="404" href="javascript:void(0);" id="btnShowEssayPreview" rel="nofollow"><span data-dcnode-id="405" instrument_node="">Essay Sample</span></a><a class="brand-secondary" data-dcnode-id="402" href="javascript:void(0);" id="btnShowWritingTool" rel="nofollow"><span data-dcnode-id="403" instrument_node="">Check Writing Quality</span></a></div></div></div><div aria-label="loading.." class="display-none loader-writing" data-dcnode-id="396" id="wrtLoading" role="alert"><div class="loader-writing--bg" data-dcnode-id="398"></div><div class="loader-writing--spinner" data-dcnode-id="397"></div></div><div class="row essay-preview-block" data-dcnode-id="96" id="divPreviewBlock"><div class="columns large-8 paper-container paper-container--with-sidebar position-relative border-box-shadow margin-4 padding-2" data-dcnode-id="191"><div class="" data-dcnode-id="380"><div class="position-relative margin-4 text-xl" data-dcnode-id="381"><div data-dcnode-id="395" id="essay-body-heading-details"></div><div class="document__body white-space--break-spaces text-ellipsis-after break-word" data-dcnode-id="389"><span class="document__preview text-l source-serif" data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Ideas are powerful. Their continuous use has often pushed people to go further - to assess themselves time and time again. Not all ideas succeed, but the ones that do leave a lasting impact on people and challenge established ones to the very core. The Enlightenment was defined by intellectuals who reevaluated existing ideas of rule government and society in a movement that would impact the western world.

Western government and society was influenced by the Enlightenment, a movement where intellectuals developed ideas that challenged and reevaluated established ones. New ideas have constantly forced people to broaden their outlook on the world in the pursuit of the advancement of humanity. History has shown that such realization does not come</span></span></div><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="388"></div><div class="center paper__cta" data-dcnode-id="382"><a class="button text-m" data-dcnode-id="386" data-href="/document/PK2DZVQMGXPT" id="ShowMoreButton" rel="nofollow"><span data-dcnode-id="387" instrument_node="">Get Access</span></a><br data-dcnode-id="385"><a class="button text-m dark-green-bg" data-dcnode-id="383" href="javascript:void(0);" id="btnWtng" rel="nofollow"><span data-dcnode-id="384" instrument_node="">Check Writing Quality</span></a></div></div></div><div class="rhino-slot center" data-dcnode-id="379" id="AdCenterMiddle"></div><div class="paper--related-separator" data-dcnode-id="376"><span class="paper--related-separator-word" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Related</span></span></div><section class="" data-dcnode-id="192"><ul class="unstyled" data-dcnode-id="193" id="RelatedDocumentCenter"><li data-dcnode-id="363"><div class="paper paper--related" data-dcnode-id="364"><a data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Role-Of-The-Enlightenment-A-Turning-PJSCVSKVZT"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">The Role Of The Enlightenment A Turning Point In European Society</span></h2></a><span class="paper--related__details" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">547 Words &nbsp;|&nbsp;3 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">The Enlightenment was a major turning point in European society because it changed the whole outcome of all of Europe. In the beginning, before the Enlightenment, nobody thought for themselves, and it was the monarchy and/or the Catholic Church's job to tell people what to think and do. The Enlightenment resulted in people beginning to think for themselves and start to form their own opinions and beliefs that go against the Church and the monarchy. 
 The Enlightenment thinkers used science and philosophical theories to express what they believed in and used the new thoughts to help them solve their problems.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="368"></div><div class="center paper__cta" data-dcnode-id="365"><a class="button text-m" data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Role-Of-The-Enlightenment-A-Turning-PJSCVSKVZT"><span data-dcnode-id="367" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="350"><div class="paper paper--related" data-dcnode-id="351"><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Enlightenment-And-Imperialism-And-The-Scientific-FKEPLHHESJF6"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">The Enlightenment And Imperialism And The Scientific Revolution</span></h2></a><span class="paper--related__details" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">1004 Words &nbsp;|&nbsp;5 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">The definition of freedom has changed over history. The enlightenment, and imperialism affected the way we see freedom today. Imperialism did sway the freedom back to the past ways, but the outcome of imperialism taught us that it is not a good idea.  The world is more free than it was in the past, because of the ideas of the enlightenment and imperialism, which made the modern day world more free. 
</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="355"></div><div class="center paper__cta" data-dcnode-id="352"><a class="button text-m" data-dcnode-id="353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Enlightenment-And-Imperialism-And-The-Scientific-FKEPLHHESJF6"><span data-dcnode-id="354" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="337"><div class="paper paper--related" data-dcnode-id="338"><a data-dcnode-id="347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Enlightenment-The-World-Todays-Contribution-To-The-P3Q225KRJ4D6"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Enlightenment: The World Today's Contribution To The Enlightenment</span></h2></a><span class="paper--related__details" data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">912 Words &nbsp;|&nbsp;4 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Prior to the events of The Enlightenment, The Scientific Revolution occured. This is a time in which the authority of the church is challenged and long and old traditional ideas about god are challenged by science. This led into the French Revolution because if you can challenge god you are able to challenge monarchs. The French took away power from the monarchs and put more power into the people. However this</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="342"></div><div class="center paper__cta" data-dcnode-id="339"><a class="button text-m" data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Enlightenment-The-World-Todays-Contribution-To-The-P3Q225KRJ4D6"><span data-dcnode-id="341" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="324"><div class="paper paper--related" data-dcnode-id="325"><a data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Ronald-Ingleharts-The-Silent-Revolution-FCFCAFJMGZV"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Ronald Inglehart's The Silent Revolution</span></h2></a><span class="paper--related__details" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">476 Words &nbsp;|&nbsp;2 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Ronald Inglehart’s main focus in The Silent Revolution was the values of individuals in industrialized countries. His main argument was that a fundamental change in values has taken place among western politics. There has been a shift of emphasis on material values to post material values. Material values are values that third world countries, for example, hope to achieve. These place a heavy emphasis on concerns for immediate needs and threats.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="329"></div><div class="center paper__cta" data-dcnode-id="326"><a class="button text-m" data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Ronald-Ingleharts-The-Silent-Revolution-FCFCAFJMGZV"><span data-dcnode-id="328" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="311"><div class="paper paper--related" data-dcnode-id="312"><a data-dcnode-id="321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Symbolism-In-Dostoevskys-The-Brothers-Karamazov-FCYGHA4NSG"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Symbolism In Dostoevsky's The Brothers Karamazov</span></h2></a><span class="paper--related__details" data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">1387 Words &nbsp;|&nbsp;6 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Dimitri is a representation of the romantics of the 1820’s. Specifically those who, like the decemberists, called for violence to incite reform. This generation was overshadowed by the following which was a group of intellectuals that mirrored the enlightened education they had received. They were open to westernization and politically very liberal (Zhivov 21). This is similar to Ivan, though he is an extremist in some arguments.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="316"></div><div class="center paper__cta" data-dcnode-id="313"><a class="button text-m" data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Symbolism-In-Dostoevskys-The-Brothers-Karamazov-FCYGHA4NSG"><span data-dcnode-id="315" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="298"><div class="paper paper--related" data-dcnode-id="299"><a data-dcnode-id="308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Satire-In-Benjamin-Franklins-Age-Of-Reason-PCJRCZUVYT"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Satire In Benjamin Franklin's Age Of Reason</span></h2></a><span class="paper--related__details" data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">801 Words &nbsp;|&nbsp;4 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">“The Enlightenment is the period in the history of western thought and culture… characterized by dramatic revolutions in science, philosophy, society and politics; these revolutions swept away the medieval world-view and ushered in our modern western world” (Bristow). The Enlightenment is also referred to as The Age of Reason because its philosophies were mostly based on logic and reason. One important figure who introduced the Enlightenment to America was Benjamin Franklin. “Many of Franklin’s satires work through logic of inversion, taking an established idea and exposing the assumptions that implicitly frame it by demonstrating how it might appear from a reverse perspective” (Giles 48-49). A simpler way of stating how Franklin uses satire is as placing “the</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="303"></div><div class="center paper__cta" data-dcnode-id="300"><a class="button text-m" data-dcnode-id="301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Satire-In-Benjamin-Franklins-Age-Of-Reason-PCJRCZUVYT"><span data-dcnode-id="302" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="285"><div class="paper paper--related" data-dcnode-id="286"><a data-dcnode-id="295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Role-Of-Rationalism-In-The-Age-PCY7YQRVZT"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">The Role Of Rationalism In The Age Of Enlightenment</span></h2></a><span class="paper--related__details" data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">1153 Words &nbsp;|&nbsp;5 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Historians refer to the climate of thought in eighteenth-century as the Enlightenment. It is a movement happened in the United Kingdom, and developed in France. Rationality was characterized as the main characteristic in the Age of Enlightenment,&nbsp;the philosophers during the enlightenment ages always stressed the ideas that traditional authority like theocracy and royal power is not always correct, therefore humans could and should improve themselves through reason. They also viewed that the natural world was governed by mathematical and scientific laws, which could be understood by humankind through doing researches themselves rather than depend on traditional authority wielded by established religion. Rationalism played an important role in directing human thought and actions, improving science and making political changes in Europe and North America as well as</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="290"></div><div class="center paper__cta" data-dcnode-id="287"><a class="button text-m" data-dcnode-id="288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Role-Of-Rationalism-In-The-Age-PCY7YQRVZT"><span data-dcnode-id="289" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="272"><div class="paper paper--related" data-dcnode-id="273"><a data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Enlightenments-Change-In-The-Enlightenment-Period-FCG6EAC3XG"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Philosophers And The Enlightenment</span></h2></a><span class="paper--related__details" data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">1032 Words &nbsp;|&nbsp;5 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="278"><span data-dcnode-id="279" instrument_node=""> Philosopher’s words mattered because the words brought dramatic changes to government (Race and the Enlightenment). Philosophers are one of the reasons why governments dramatically changed in the Enlightenment Period. John lock was one of the biggest philosophers that had an impact in changing governmental ideas. John Locke defended the claim that all men have the rights of</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="277"></div><div class="center paper__cta" data-dcnode-id="274"><a class="button text-m" data-dcnode-id="275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Enlightenments-Change-In-The-Enlightenment-Period-FCG6EAC3XG"><span data-dcnode-id="276" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="259"><div class="paper paper--related" data-dcnode-id="260"><a data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Charles-Purse-And-Aesthetic-Ideas-PJ4WCN5Z26"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Charles Purse's Aesthetic Ideal</span></h2></a><span class="paper--related__details" data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">824 Words &nbsp;|&nbsp;4 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">During the ancient times, one worldview that was brought up was how reason was used to understand the cosmos. The ancient times were a breaking point because there was a lot more of thought development that was used instead of just thinking of things randomly and having nothing to support them. When attending the colloquia “School of Rock: Songs that Changed our Lives” it was learned that philosopher, Charles Purse, brought up the “Aesthetic Ideal” which mirrored this worldview of the ancient times. The aesthetic ideal was said to be a felt sense of what is good, what is desirable, and what is wanted. This also mirrored the effect that music had on people.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="264"></div><div class="center paper__cta" data-dcnode-id="261"><a class="button text-m" data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Charles-Purse-And-Aesthetic-Ideas-PJ4WCN5Z26"><span data-dcnode-id="263" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="246"><div class="paper paper--related" data-dcnode-id="247"><a data-dcnode-id="256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Enlightenment-The-French-Revolution-PCCELVXTZV"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">The Enlightenment: The French Revolution</span></h2></a><span class="paper--related__details" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">135 Words &nbsp;|&nbsp;1 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">The Enlightenment was a period of time that stressed the importance of reason and individual ideas. Many philosophers published works criticizing a country’s monarch or divulging the flaws they saw in a system within the government, such as the justice system. The Enlightenment also stressed the importance of education, and as a result of this, literacy rates experienced a major upward trend. Now able to read the philosopher’s works, a larger sum of people now were educated on the corruptions within their government. This caused a questioning of traditional practices, and people began to believe they could revise their government.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="251"></div><div class="center paper__cta" data-dcnode-id="248"><a class="button text-m" data-dcnode-id="249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Enlightenment-The-French-Revolution-PCCELVXTZV"><span data-dcnode-id="250" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="233"><div class="paper paper--related" data-dcnode-id="234"><a data-dcnode-id="243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/How-Did-Voltaire-Contribute-To-The-Enlightenment-PCQZ3GRH8AM"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">How Did Voltaire Contribute To The Enlightenment</span></h2></a><span class="paper--related__details" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">302 Words &nbsp;|&nbsp;2 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Page 505 tells how Montesquieu brought a voice for religious toleration and denunciation of slavery. He was a French noble who studied law and felt strongly on the subject of traditional religion being unjust. Voltaire was a middle class French man, who according to page 507, won fame for his plays. The book declares Voltaire the greatest mind of the Enlightenment for his works against royal absolutism and his beliefs in freedom of thought and religious tolerance. Diderot's main contribution to the Enlightenment was his twenty eight volume encyclopedia set about science, art, and trade.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="238"></div><div class="center paper__cta" data-dcnode-id="235"><a class="button text-m" data-dcnode-id="236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/How-Did-Voltaire-Contribute-To-The-Enlightenment-PCQZ3GRH8AM"><span data-dcnode-id="237" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="220"><div class="paper paper--related" data-dcnode-id="221"><a data-dcnode-id="230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Enlightenment-Satire-FCSYDQ8G8AM"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">The Enlightenment Satire</span></h2></a><span class="paper--related__details" data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">738 Words &nbsp;|&nbsp;3 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">The Enlightenment was a quintessential part of shaping the way people think today. Many of the same ideas established during the Enlightenment are still prevalent in modern society. For the first time in history, people thought for themselves. They questioned the validity and accuracy of the information they were told. People advocated for logic and reason as opposed to blind faith.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="225"></div><div class="center paper__cta" data-dcnode-id="222"><a class="button text-m" data-dcnode-id="223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/The-Enlightenment-Satire-FCSYDQ8G8AM"><span data-dcnode-id="224" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="207"><div class="paper paper--related" data-dcnode-id="208"><a data-dcnode-id="217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Compare-And-Contrast-Enlightenment-And-American-Revolutions-FJYFFLC8SB"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Compare And Contrast Enlightenment And American Revolutions</span></h2></a><span class="paper--related__details" data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">907 Words &nbsp;|&nbsp;4 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Enlightenment was a concept that inspired a new way of thinking of the people. In the newly formed United States of America, enlightenment shaped the way the new government was run. Scientific reasoning was applied to politics, religion, and science. Enlightenment saved music, art, and literature programs in colleges. Enlightenment in Europe led to drastically altered views on philosophy, politics, and communications.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="212"></div><div class="center paper__cta" data-dcnode-id="209"><a class="button text-m" data-dcnode-id="210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Compare-And-Contrast-Enlightenment-And-American-Revolutions-FJYFFLC8SB"><span data-dcnode-id="211" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="194"><div class="paper paper--related" data-dcnode-id="195"><a data-dcnode-id="204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/What-Were-The-Philosophers-Trying-To-Change-PJHY87VDSM"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">What Were The Philosophers Trying To Change During The Enlightenment</span></h2></a><span class="paper--related__details" data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">567 Words &nbsp;|&nbsp;3 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">The age of Enlightenment was the period of social awakening. The Enlightenment took place in Europe during the late 17th and 18th century. During that time philosophers were figuring out ways to improve society. What were the philosophers trying to change ? During the Enlightenment the philosophers were also trying to make improvements in society.</span></p><div class="paper__g
