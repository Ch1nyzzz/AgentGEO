</span><div class="a-expander-collapsed-height a-row a-expander-container a-spacing-base a-expander-partial-collapse-container" data-a-expander-collapsed-height="140" data-a-expander-name="book_description_expander" data-dcnode-id="3965" style="max-height: none; height: 140px;"><span data-dcnode-id="4007" instrument_node=""> </span><div aria-expanded="false" class="a-expander-content a-expander-partial-collapse-content" data-dcnode-id="3974" style="padding-bottom: 20px;"><span data-dcnode-id="4006" instrument_node=""> </span><span class="a-text-bold" data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">The classic account of the lead-up to World War I, told with “a&nbsp;rare combination of impeccable scholarship and literary polish” (</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="4002"><span data-dcnode-id="4003" instrument_node="">The New York Times</span></span><span class="a-text-bold" data-dcnode-id="4000"><span data-dcnode-id="4001" instrument_node="">)—from the Pulitzer Prize–winning author of </span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">The Guns of August</span></span><span class="a-text-bold" data-dcnode-id="3995"><br data-dcnode-id="3997"><br data-dcnode-id="3996"></span><span data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">During the fateful quarter century leading up to World War I, the climax of a century of rapid, unprecedented change, a privileged few enjoyed Olympian luxury as the underclass was “heaving in its pain, its power, and its hate.” In </span></span><span class="a-text-italic" data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">The Proud Tower,</span></span><span data-dcnode-id="3986"><span data-dcnode-id="3990" instrument_node=""> Barbara W. Tuchman brings the era to vivid life: the decline of the Edwardian aristocracy; the Anarchists of Europe and America; Germany and its self-depicted hero, Richard Strauss; Diaghilev’s Russian ballet and Stravinsky’s music; the Dreyfus Affair; the Peace Conferences in The Hague; and the enthusiasm and tragedy of Socialism, epitomized by the assassination of Jean Jaurès on the night the Great War began and an epoch came to a close. </span><br data-dcnode-id="3989"><span data-dcnode-id="3988" instrument_node="">&nbsp; </span><br data-dcnode-id="3987"></span><span class="a-text-bold a-text-italic" data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">The Proud Tower,</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">The Guns of August,</span></span><span class="a-text-bold" data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node=""> and </span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">The Zimmermann Telegram</span></span><span class="a-text-bold" data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node=""> comprise Barbara W. Tuchman’s classic histories of the First World War era.</span></span><span data-dcnode-id="3975" instrument_node=""> </span></div><span data-dcnode-id="3973" instrument_node=""> </span><div class="a-expander-header a-expander-partial-collapse-header" data-dcnode-id="3967" style="opacity: 1; display: block;"><div class="a-expander-content-fade" data-dcnode-id="3972"></div><a aria-expanded="false" class="a-declarative" data-a-expander-toggle="{&quot;allowLinkDefault&quot;:true, &quot;expand_prompt&quot;:&quot;Read more&quot;, &quot;collapse_prompt&quot;:&quot;Read less&quot;}" data-action="a-expander-toggle" data-csa-c-func-deps="aui-da-a-expander-toggle" data-csa-c-type="widget" data-csa-interaction-events="click" data-dcnode-id="3968" href="javascript:void(0)" role="button"><i class="a-icon a-icon-extender-expand" data-dcnode-id="3971"></i><span class="a-expander-prompt" data-dcnode-id="3969"><span data-dcnode-id="3970 </span><div class="a-divider a-divider-section" data-dcnode-id="3109"><div class="a-divider-inner" data-dcnode-id="3110"></div></div><span data-dcnode-id="3108" instrument_node=""> </span><h2 data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node=""> Editorial Reviews </span></h2><span data-dcnode-id="3105" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-base" data-dcnode-id="2913"><span data-dcnode-id="3104" instrument_node=""> </span><div class="a-row a-expander-container a-expander-extend-container" data-dcnode-id="2915"><span data-dcnode-id="3103" instrument_node=""> </span><h3 data-dcnode-id="3100"><span data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">Review</span></span></h3><span data-dcnode-id="3099" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="3055"><span data-dcnode-id="3098" instrument_node=""> </span><span data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">“[Barbara W. Tuchman’s] Pulitzer Prize–winning </span></span><span class="a-text-italic" data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">The Guns of August </span></span><span data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">was an expert evocation of the first spasm of the 1914–1918 war. She brings the same narrative gifts and panoramic camera eye to her portrait of the antebellum world.”</span></span><span class="a-text-bold" data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">—</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Newsweek</span></span><span data-dcnode-id="3083"><br data-dcnode-id="3087"><span data-dcnode-id="3086" instrument_node=""> &nbsp;</span><br data-dcnode-id="3085"><span data-dcnode-id="3084" instrument_node=""> “A rare combination of impeccable scholarship and literary polish . . . It would be impossible to read </span></span><span class="a-text-italic" data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">The Proud Tower </span></span><span data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">without pleasure and admiration.”</span></span><span class="a-text-bold" data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">—</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">The New York Times</span></span><span data-dcnode-id="3070"><br data-dcnode-id="3074"><span data-dcnode-id="3073" instrument_node=""> &nbsp;</span><br data-dcnode-id="3072"><span data-dcnode-id="3071" instrument_node=""> “An exquisitely written and thoroughly engrossing work . . . The author’s knowledge and skill are so impressive that they whet the appetite for more.”</span></span><span class="a-text-bold" data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">—</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">Chicago Tribune</span></span><span data-dcnode-id="3061"><br data-dcnode-id="3065"><span data-dcnode-id="3064" instrument_node=""> &nbsp;</span><br data-dcnode-id="3063"><span data-dcnode-id="3062" instrument_node=""> “[Tuchman] tells her story with cool wit and warm understanding.”</span></span><span class="a-text-bold" data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">—</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">Time</span></span><span data-dcnode-id="3056" instrument_node=""> </span></div><span data-dcnode-id="3054" instrument_node=""> </span><h3 data-dcnode-id="3051"><span data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">From the Publisher</span></span></h3><span data-dcnode-id="3050" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="3042"><span data-dcnode-id="3049" instrument_node=""> </span><span data-dcnode-id="3044"><span data-dcnode-id="3048" instrument_node="">THE PROUD TOWER by Barbara Tuchman examines the Western World of approximately 100 years ago. Technologically the world was a very different from today, but the strifes between economic groups and among nations bears many similarities to our own time. Tuchman examines the economic, social, political, and technological world of the period 1890-1914. By this period, the United States had become an important player in world affairs. The Haymarket Affair in Chicago fueled the development of international anarchism which led to the assasinations of political figures in Russia, Italy, France and lastly President McKinley in the United States. Tuchman's unraveling of the the Dreyfus Affair is, in itself, worth the price of the book. In THE PROUD TOWER Tuchman describes the western world that exploded into The Great War (which she describes in THE GUNS OF AUGUST).</span><br data-dcnode-id="3047"><br data-dcnode-id="3046"><span data-dcnode-id="3045" instrument_node="">Randy Hickernell, Ballantine Sales Rep.</span></span><span data-dcnode-id="3043" instrument_node=""> </span></div><span data-dcnode-id="3041" instrument_node=""> </span><div aria-expanded="false" class="a-expander-content a-expander-extend-content" data-dcnode-id="2925" style="display:none"><span data-dcnode-id="3040" instrument_node=""> </span><h3 data-dcnode-id="3037"><span data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">From the Inside Flap</span></span></h3><span data-dcnode-id="3036" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="3017"><span data-dcnode-id="3035" instrument_node=""> </span><span data-dcnode-id="3019"><span data-dcnode-id="3034" instrument_node="">"The diplomatic origins, so-called, of the War are only the fever chart of the patient; they do not tell us what caused the fever. To probe for underlying causes and deeper forces one must operate within the framework of a whole society and try to discover what moved the people in it."</span><br data-dcnode-id="3033"><span data-dcnode-id="3032" instrument_node="">--Barbara W. Tuchman</span><br data-dcnode-id="3031"><span data-dcnode-id="3030" instrument_node="">The fateful quarter-century leading up to the World War I was a time when the world of Privilege still existed in Olympian luxury and the world of Protest was heaving in its pain, its power, and its hate. The age was the climax of a century of the most accelerated rate of change in history, a cataclysmic shaping of destiny.</span><br data-dcnode-id="3029"><span data-dcnode-id="3028" instrument_node="">In The Proud Tower, Barbara Tuchman concentrates on society rather than the state. With an artist's selectivity, Tuchman bings to vivid life the people, places, and events that shaped the years leading up to the Great War: the Edwardian aristocracy and the end of their reign; the Anarchists of Europe and America, who voiced the protest of the oppressed; Germany, as portrayed through the figure of the self-depicted Hero, Richard Strauss; the sudden gorgeous blaze of Diaghilev's Russian Ballet and Stravinsky's music; the Dreyfus Affair; the two Peace Conferences at the Hague; and, finally, the youth, ideals, enthusiasm, and tragedy of Socialism, epitomized in the moment when the heroic Jean Jaurès was shot to death on the night the War began and an epoch ended.</span><br data-dcnode-id="3027"><span data-dcnode-id="3026" instrument_node="">"Tuchman [was] a distinguished historian who [wrote] her books with a rare combination of impeccable scholarship and literary polish. . . . It would be impossible to read The Proud Tower without pleasure and admiration."</span><br data-dcnode-id="3025"><span data-dcnode-id="3024" instrument_node="">--The New York Times</span><br data-dcnode-id="3023"><span data-dcnode-id="3022" instrument_node="">"Tuchman proved in The Guns of August that she could write better military history than most men. In this sequel, she tells her story with cool wit and warm understanding, eschewing both the sweeping generalizations of a Toynbee and the minute-by-minute simplicisms of a Walter Lord."</span><br data-dcnode-id="3021"><span data-dcnode-id="3020" instrument_node="">--Time</span></span><span data-dcnode-id="3018" instrument_node=""> </span></div><span data-dcnode-id="3016" instrument_node=""> </span><h3 data-dcnode-id="3013"><span data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">About the Author</span></span></h3><span data-dcnode-id="3012" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2985"><span data-dcnode-id="3011" instrument_node=""> </span><span class="a-text-bold" data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">Barbara W. Tuchman </span></span><span data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">(1912–1989) achieved prominence as a historian with </span></span><span class="a-text-italic" data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">The Zimmermann Telegram </span></span><span data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">and international fame with </span></span><span class="a-text-italic" data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">The Guns of August</span></span><span data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">—a huge bestseller and winner of the Pulitzer Prize. Her other works include </span></span><span class="a-text-italic" data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">Bible and Sword, The Proud Tower, Stilwell and the American Experience in China </span></span><span data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">(for which Tuchman was awarded a second Pulitzer Prize), </span></span><span class="a-text-italic" data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">Notes from China, A Distant Mirror, Practicing History, The March of Folly, </span></span><span data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">and </span></span><span class="a-text-italic" data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">The First Salute</span></span><span data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">.</span></span><span data-dcnode-id="2986" instrument_node=""> </span></div><span data-dcnode-id="2984" instrument_node=""> </span><h3 data-dcnode-id="2981"><span data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">Excerpt. © Reprinted by permission. All rights reserved.</span></span></h3><span data-dcnode-id="2980" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2927"><span data-dcnode-id="2979" instrument_node=""> </span><span data-dcnode-id="2929"><span data-dcnode-id="2978" instrument_node="">I</span><br data-dcnode-id="2977"><br data-dcnode-id="2976"><span data-dcnode-id="2975" instrument_node="">The Patricians</span><br data-dcnode-id="2974"><br data-dcnode-id="2973"><span data-dcnode-id="2972" instrument_node="">The last government in the Western world to possess all the attributes of aristocracy in working condition took office in England in June of 1895. Great Britain was at the zenith of empire when the Conservatives won the General Election of that year, and the Cabinet they formed was her superb and resplendent image. Its members represented the greater landowners of the country who had been accustomed to govern for generations. As its superior citizens they felt they owed a duty to the State to guard its interests and manage its affairs. They governed from duty, heritage and habit—and, as they saw it, from right.</span><br data-dcnode-id="2971"><br data-dcnode-id="2970"><span data-dcnode-id="2969" instrument_node="">The Prime Minister was a Marquess and lineal descendant of the father and son who had been chief ministers to Queen Elizabeth and James I. The Secretary for War was another Marquess who traced his inferior title of Baron back to the year 1181, whose great-grandfather had been Prime Minister under George III and whose grandfather had served in six cabinets under three reigns. The Lord President of the Council was a Duke who owned 186,000 acres in eleven counties, whose ancestors had served in government since the Fourteenth Century, who had himself served thirty-four years in the House of Commons and three times refused to be Prime Minister. The Secretary for India was the son of another Duke whose family seat was received in 1315 by grant from Robert the Bruce and who had four sons serving in Parliament at the same time. The President of the Local Government Board was a pre-eminent country squire who had a Duke for brother-in-law, a Marquess for son-in-law, an ancestor who had been Lord Mayor of London in the reign of Charles II, and who had himself been a Member of Parliament for twenty-seven years. The Lord Chancellor bore a family name brought to England by a Norman follower of William the Conqueror and maintained thereafter over eight centuries without a title. The Lord Lieutenant for Ireland was an Earl, a grandnephew of the Duke of Wellington and a hereditary trustee of the British Museum. The Cabinet also included a Viscount, three Barons and two Baronets. Of its six commoners, one was a director of the Bank of England, one was a squire whose family had represented the same county in Parliament since the Sixteenth Century, one—who acted as Leader of the House of Commons—was the Prime Minister’s nephew and inheritor of a Scottish fortune of £4,000,000, and one, a notable and disturbing cuckoo in the nest, was a Birmingham manufacturer widely regarded as the most successful man in England.</span><br data-dcnode-id="2968"><br data-dcnode-id="2967"><span data-dcnode-id="2966" instrument_node="">Besides riches, rank, broad acres and ancient lineage, the new Government also possessed, to the regret of the Liberal Opposition and in the words of one of them, “an almost embarrassing wealth of talent and capacity.” Secure in authority, resting comfortably on their electoral majority in the House of Commons and on a permanent majority in the House of Lords, of whom four-fifths were Conservatives, they were in a position, admitted the same opponent, “of unassailable strength.”</span><br data-dcnode-id="2965"><br data-dcnode-id="2964"><span data-dcnode-id="2963" instrument_node="">Enriching their ranks were the Whig aristocrats who had seceded from the Liberal party in 1886 rather than accept Mr. Gladstone’s insistence on Home Rule for Ireland. They were for the most part great landowners who, like their natural brothers the Tories, regarded union with Ireland as sacrosanct. Led by the Duke of Devonshire, the Marquess of Lansdowne and Mr. Joseph Chamberlain, they had remained independent until 1895, when they joined with the Conservative party, and the two groups emerged as the Unionist party, in recognition of the policy that had brought them together. With the exception of Mr. Chamberlain, this coalition represented that class in whose blood, training and practice over the centuries, landowning and governing had been inseparable. Ever since Saxon chieftains met to advise the King in the first national assembly, the landowners of England had been sending members to Parliament and performing the duties of High Sheriff, Justice of the Peace and Lord Lieutenant of the Militia in their own counties. They had learned the practice of government from the possession of great estates, and they undertook to manage the affairs of the nation as inevitably and unquestionably as beavers build a dam. It was their ordained role and natural task.</span><br data-dcnode-id="2962"><br data-dcnode-id="2961"><span data-dcnode-id="2960" instrument_node="">But it was threatened. By a rising rumble of protest from below, by the Radicals of the Opposition who talked about taxing unearned increment on land, by Home Rulers who wanted to detach the Irish island from which so much English income came, by Trade Unionists who talked of Labour representation in Parliament and demanded the legal right to strike and otherwise interfere with the free play of economic forces, by Socialists who wanted to nationalize property and Anarchists who wanted to abolish it, by upstart nations and strange challenges from abroad. The rumble was distant, but it spoke with one voice that said Change, and those whose business was government could not help but hear.</span><br data-dcnode-id="2959"><br data-dcnode-id="2958"><span data-dcnode-id="2957" instrument_node="">Planted firmly across the path of change, operating warily, shrewdly yet with passionate conviction in defence of the existing order, was a peer who was Chancellor of Oxford University for life, had twice held the India Office, twice the Foreign Office and was now Prime Minister for the third time. He was Robert Arthur Talbot Gascoyne-Cecil, Lord Salisbury, ninth Earl and third Marquess of his line.</span><br data-dcnode-id="2956"><br data-dcnode-id="2955"><span data-dcnode-id="2954" instrument_node="">Lord Salisbury was both the epitome of his class and uncharacteristic of it—except insofar as the freedom to be different was a class characteristic. He was six feet four inches tall, and as a young man had been thin, ungainly, stooping and shortsighted, with hair unusually black for an Englishman. Now sixty-five, his youthful lankiness had turned to bulk, his shoulders had grown massive and more stooped than ever, and his heavy bald head with full curly gray beard rested on them as if weighted down. Melancholy, intensely intellectual, subject to sleepwalking and fits of depression which he called “nerve storms,” caustic, tactless, absent-minded, bored by society and fond of solitude, with a penetrating, skeptical, questioning mind, he had been called the Hamlet of English politics. He was above the conventions and refused to live in Downing Street. His devotion was to religion, his interest in science. In his own home he attended private chapel every morning before breakfast, and had fitted up a chemical laboratory where he conducted solitary experiments. He harnessed the river at Hatfield for an electric power plant on his estate and strung up along the old beams of his home one of England’s first electric light systems, at which his family threw cushions when the wires sparked and sputtered while they went on talking and arguing, a customary occupation of the Cecils.</span><br data-dcnode-id="2953"><br data-dcnode-id="2952"><span data-dcnode-id="2951" instrument_node="">Lord Salisbury cared nothing for sport and little for people. His aloofness was enhanced by shortsightedness so intense that he once failed to recognize a member of his own Cabinet, and once, his own butler. At the close of the Boer War he picked up a signed photograph of King Edward and, gazing at it pensively, remarked, “Poor Buller [referring to the Commander-in-Chief at the start of the War], what a mess he made of it.” On another occasion he was seen in prolonged military conversation with a minor peer under the impression that he was talking to Field Marshal Lord Roberts.</span><br data-dcnode-id="2950"><br data-dcnode-id="2949"><span data-dcnode-id="2948" instrument_node="">For the upper-class Englishman’s alter ego, most intimate companion and constant preoccupation, his horse, Lord Salisbury had no more regard. Riding was to him purely a means of locomotion to which the horse was “a necessary but extremely inconvenient adjunct.” Nor was he addicted to shooting. When Parliament rose he did not go north to slaughter grouse upon the moors or stalk deer in Scottish forests, and when protocol required his attendance upon royalty at Balmoral, he would not go for walks and “positively refused,” wrote Queen Victoria’s Private Secretary, Sir Henry Ponsonby, “to admire the prospect or the deer.” Ponsonby was told to have his room in the dismal castle kept “warm”—a minimum temperature of sixty degrees. Otherwise he retired for his holidays to France, where he owned a villa at Beaulieu on the Riviera and where he could exercise his fluent French and lose himself in The Count of Monte Cristo, the only book, he once told Dumas fils, which allowed him to forget politics.</span><br data-dcnode-id="2947"><br data-dcnode-id="2946"><span data-dcnode-id="2945" instrument_node="">His acquaintance with games was confined to tennis, but when elderly he invented his own form of exercise, which consisted in riding a tricycle through St. James’s Park in the early mornings or along paths cemented for the purpose in the park of his estate at Hatfield. Wearing for the occasion a kind of sombrero hat and a short sleeveless cloak with a hole in the middle in which he resembled a monk, he would be accompanied by a young coachman to push him up the hills. At the downhill slopes, the young man would be told to “jump on behind,” and the Prime Minister, with the coachman’s hands on his shoulders, would roll away, cloak flying and pedals whirring.</span><br data-dcnode-id="2944"><br data-dcnode-id="2943"><span data-dcnode-id="2942" instrument_node="">Hatfield, twenty miles north of London in Hertfordshire, had been the home of the Cecils for nearly three hundred years since James I had given it, in 1607, to his Prime Minister, Robert Cecil, first Earl of Salisbury, in exchange for a house of Cecil’s to which the King had taken a fancy. It was the royal residence where Queen Elizabeth had spent her childhood and where, on receiving news of her accession, she held her first council, to swear in William Cecil, Lord Burghley, as her chief Secretary of State. Its Long Gallery, with intricately carved paneled walls and gold-leaf ceiling, was 180 feet in length. The Marble Hall, named for the black and white marble floor, glowed like a jewel case with painted and gilded ceiling and Brussels tapestries. The red King James Drawing Room was hung with full-length family portraits by Romney and Reynolds and Lawrence. The library was lined from floor to gallery and ceiling with 10,000 volumes bound in leather and vellum. In other rooms were kept the Casket Letters of Mary Queen of Scots, suits of armor taken from men of the Spanish Armada, the cradle of the beheaded King, Charles I, and presentation portraits of James I and George III. Outside were yew hedges clipped in the form of crenelated battlements, and the gardens, of which Pepys wrote that he never saw “so good flowers, nor so great gooseberries as big as nutmegs.” Over the entrance hall hung flags captured at Waterloo and presented to Hatfield by the Duke of Wellington, who was a constant visitor and devoted admirer of the Prime Minister’s mother, the second Marchioness. In her honor Wellington wore the hunt coat of the Hatfield Hounds when he was on campaign. The first Marchioness was painted by Sir Joshua Reynolds and hunted till the day she died at eighty-five, when, half-blind and strapped to the saddle, she was accompanied by a groom who would shout, when her horse approached a fence, “Jump, dammit, my Lady, jump!”</span><br data-dcnode-id="2941"><br data-dcnode-id="2940"><span data-dcnode-id="2939" instrument_node="">It was this exceptional person who reinvigorated the Cecil blood, which, after Burghley and his son, had produced no further examples of superior mentality. Rather, the general mediocrity of succeeding generations had been varied only, according to a later Cecil, by instances of “quite exceptional stupidity.” But the second Marquess proved a vigorous and able man with a strong sense of public duty who served in several mid-century Tory cabinets. His second son, another Robert Cecil, was the Prime Minister of 1895. He in turn produced five sons who were to distinguish themselves. One became a general, one a bishop, one a minister of state, one M.P. for Oxford, and one, through service to the government, won a peerage in his own right. “In human beings as in horses,” Lord Birkenhead was moved to comment on the Cecil record, “there is something to be said for the hereditary principle.”</span><br data-dcnode-id="2938"><br data-dcnode-id="2937"><span data-dcnode-id="2936" instrument_node="">At Oxford in 1850 the contemporaries of young Robert Cecil agreed that he would end as Prime Minister either because or in spite of his remorselessly uncompromising opinions. Throughout life he never bothered to restrain them. His youthful speeches were remarkable for their virulence and insolence; he was not, said Disraeli, “a man who measures his phrases.” A “Salisbury” became a synonym for political imprudence. He once compared the Irish in their incapacity for self-government to Hottentots and spoke of an Indian candidate for Parliament as “that black man.” In the opinion of Lord Morley his speeches were always a pleasure to read because “they were sure to contain one blazing indiscretion which it is a delight to remember.” Whether these were altogether accidental is open to question, for though Lord Salisbury delivered his speeches without notes, they were worked out in his head beforehand and emerged clear and perfect in sentence structure. In that time the art of oratory was considered part of the equipment of a statesman and anyone reading from a written speech would have been regarded as pitiable. When Lord Salisbury spoke, “every sentence,” said a fellow member, “seemed as essential, as articulate, as vital to the argument as the members of his body to an athlete.”</span><br data-dcnode-id="2935"><br data-dcnode-id="2934"><span data-dcnode-id="2933" instrument_node="">Appearing in public before an audience about whom he cared nothing, Salisbury was awkward; but in the Upper House, where he addressed his equals, he was perfectly and strikingly at home. He spoke sonorously, with an occasional change of tone to icy mockery or withering sarcasm. When a recently ennobled Whig took the floor to lecture the House of Lords in high-flown and solemn Whig sentiments, Salisbury asked a neighbor who the speaker was and on hearing the whispered identification, replied perfectly audibly, “I thought he was dead.” When he listened to others he could become easily bored, revealed by a telltale wagging of his leg which seemed to one observer to be saying, “When will all this be over?” Or sometimes, raising his heels off the floor, he would set up a sustained quivering of his knees and legs which could last for half an hour at a time. At home, when made restless by visitors, it shook the floor and made the furniture rattle, and in the House his colleagues on the front bench complained it made them seasick. If his legs were at rest his long fingers would be in motion, incessantly twisting and turning a paper knife or beating a tattoo on his knee or on the arm of his chair.</span><br data-dcnode-id="2932"><br data-dcnode-id="2931"><span data-dcnode-id="2930" instrument_node="">He never dined out and rarely entertained beyond one or two political receptions at his town house in Arlington Street and an occasional garden party at Hatfield. He avoided the Carlton, official club of the Conservatives, in favor of the Junior Carlton, where a special luncheon table was set aside for him alone and the library was hung with huge placards inscribed silence. He worked from breakfast to one in the morning, returning to his desk after dinner as if he were beginning a new day. His clothes were drab and often untidy. He wore trousers and waistcoat of a dismal gray under a broadcloth frock coat grown shiny. But though careless in dress, he was particular about the trimming of his beard and carefully directed operations in the barber’s chair, indicating “just a little more off here” while “artist and subject gazed fixedly in the mirror to judge the result.”</span></span><span data-dcnode-id="2928" instrument_node=""> </span></div><span data-dcnode-id="2926" instrument_node=""> </span></div><span data-dcnode-id="2924" instrument_node=""> </span><div class="a-row" data-dcnode-id="2917"><span data-dcnode-id="2923" instrument_node=""> </span><a aria-expanded="false" class="a-expander-header a-declarative a-expander-extend-header" data-a-expander-toggle="{&quot;allowLinkDefault&quot;:true, &quot;expand_prompt&quot;:&quot;Read more&quot;, &quot;collapse_prompt&quot;:&quot;Read less&quot;}" data-action="a-expander-toggle" data-csa-c-func-deps="aui-da-a-expander-toggle" data-csa-c-type="widget" data-csa-interaction-events="click" data-dcnode-id="2919" href="javascript:void(0)" role="button"><i class="a-icon a-icon-extender-expand" data-dcnode-id="2922"></i><span class="a-expander-prompt" data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">Read more</span></span></a><span data-dcnode-id="2918" instrument_node=""> </span></div><span data-dcnode-id="2916" instrument_node=""> </span></div><span data-dcnode-id="2914" instrument_node=""> </span></div><span data-dcnode-id="2912" instrument_node=""> </span></div><span data-dcnode-id="2910" instrument_node="">

</span><span data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">
  The Proud Tower is an haunting tale of the last few decades leading up to World War I and the advent of the modern world, or as Ms. Tuchman puts it,'the terrible twentieth century'.  If you ere looking for a dry, precise, and comprehensive history circa 1890-1914 look elsewhere,what we have here is an engrossing tale of humanity in all its glories and seeming imperfections as seen in the magnifying glass of a short period of time presented in depth by someone who has done her homework.  The author's life is worthy of its own book.  Born into a New York brownstone with a silver spoon in her mouth, she witnessed one of the opening engagments of WW I between the elements of the British and German navies as the ship she was traveling on approached Istanbul/Constantinople on a visit to her grandfather(a Morgenthau who was U.S. ambassador to Turkey at the time).  After a stint working in Japan for the US government she took a job at The Nation(owned by her father) and by the age of 24 was covering the Spanish Civil War on location.  She's knew how to write, she had a passion for research and was able to submerge her class and social prejudices to present an admirably even handed presentation of the facts.  Add to that she was a gifted story teller and thought her purpose in writing was to covey passion and get the reader to turn the page. With The Proud Tower,she has succeeded and written in the early 1960's it continues to shine as an example of 'popular' history as it should be.

</a><span class="a-letter-space" data-dcnode-id="2064"></span><a class="a-size-base a-link-normal review-title a-color-base review-title-content a-text-bold" data-dcnode-id="2059" data-hook="review-title" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//read.amazon.com/gp/customer-reviews/R1674AUM02G2YQ%3FASIN%3D0345405013"><span data-dcnode-id="2063" instrument_node="">

</span></a></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="2056" data-hook="review-date"><span data-dcnode-id="2057" instrument_node="">Reviewed in the United States on October 5, 2020</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="2053"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="2054" data-hook="avp-badge-linkless"><span data-dcnode-id="2055" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="2030"><span class="a-size-base review-text" data-dcnode-id="2031" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="2032" style="max-height: none; height: 300px;"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="2039" data-hook="review-collapsed" style="padding-bottom: 20px;"><span data-dcnode-id="2052" instrument_node="">
</span><span data-dcnode-id="2041"><span data-dcnode-id="2051" instrument_node="">
  This book doesn't move at the speed of "Guns of August," but it's not meant to.  It's a deeper look at the political, social and economic trends that were roiling Europe prior to that calamity.  Tuchman brings us right into the salons and council meetings, the street riots, the opera houses, the courtrooms of the Dreyfuss Affair with the kind of sitting-by-the-campfire storytelling which she was so uniquely expert at.</span><br data-dcnode-id="2050"><br data-dcnode-id="2049"><span data-dcnode-id="2048" instrument_node="">The quarter century leading up to Europe's mass suicide can too often be seen as La Belle Epoch.  It's easy to forget how miserable most people were in those days, when the average worker had virtually no more rights than serfs.  Men and women would literally work 12 hour days, every day except Sunday, of grueling labor, until they were simply physically broken, old by 40.  Most everyone who lived in an urban area was desperately poor.</span><br data-dcnode-id="2047"><br data-dcnode-id="2046"><span data-dcnode-id="2045" instrument_node="">In England, workers could be put in prison if they didn't show up to work, and were regularly stiffed for pay they were owed with no recourse.  The material gulf between the haves and have-nots during this period was almost as astonishing as the social gulf, and the incredible sense of entitlement the nobility had, the deep connection to Old Europe that still controlled what was becoming a modern continent.  There's a reason communism was born during this period, as well as the kind of nihilistic rage which fueled the kinds of anarchist who took the life of Franz Ferdinand and his wife, igniting what was by then a geopolitical powder keg.</span><br data-dcnode-id="2044"><br data-dcnode-id="2043"><span data-dcnode-id="2042" instrument_node="">One thing she spends a great deal on is the Prussian character, and their sense of being looked down upon by the rest of Europe.  They had a socio-cultural chip on their shoulder, and for decades had been planning what they imagined would be the kind of continental showdown which would finally earn Germany the respect it deserved.  It really had become a self-fulfilling prophecy by the time the first shots were fired.

</span><span data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">
  I've been a great fan of Barbara Tuchman's writing ever since I read "A Distant Mirror" years ago. The depth of her research is almost incredible, and the details she reveals about subjects I thought I was fairly well versed in has me frequently saying to myself "Hey! Oh yeah, now that finally makes sense!" or else "Gosh! Humans are lunatics! Nothing they do makes sense!" She recreates other eras and epochs with such mastery, she recreates major characters so that they become familiar--as though one knows them personally, or at least has seen and heard them in person. I love to lose myself in the worlds she writes of. A statement in the "Forward" of this book intrigued me. She writes that the "Grosse Politik," the endless chronologies of WWI, have been used up and are, after all, misleading...because [they] allow us to rest on the easy illusion that it is "they," the naughty statesmen, who are always responsible for war while "we," the innocent people, are merely led. That impression is a mistake." Her book goes on to prove it.

</span><span data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">
  Another tremendous book by Barbara Tuchman.  This one deals with the world, primarily Europe, in the years leading up to the First World War and is a natural prequel to THE GUNS OF AUGUST.  Topics covered include the British ruling class, the rise of Socialism and Anarchism, the United States' shift from Isolationism to Imperialism, and Berlin's "Cultural Neroism" at the turn of the 20th Century.  The major complaint is that it is not a unified history but a set of articles or essays around common themes of social change, surging technology, and rising Democracy.  Read it anyway; it's wonderful.

</span><span data-dcnode-id="1805"><span data-dcnode-id="1815" instrument_node="">
  This is, of course, one of the seminal works of history, and one that laid the foundations for much modern treatment of the conflict whose centenary we are interminably marking this year.</span><br data-dcnode-id="1814"><br data-dcnode-id="1813"><span data-dcnode-id="1812" instrument_node="">It stands, in my view, as one of the most accessible treatments of a complex subject and, even though all of us in some sense know 'what happened next', it manages nevertheless to be a page-turner.</span><br data-dcnode-id="1811"><br data-dcnode-id="1810"><span data-dcnode-id="1809" instrument_node="">Tuchman skewers the principal players with a telling phrase and is, as other reviewers have noted, understanding of human failures (von Moltke the Younger, Sir John French) as, formed in the latter case by a Victorian background, they tried to grapple with the unprecedented potential of early twentieth-century warfare.</span><br data-dcnode-id="1808"><br data-dcnode-id="1807"><span data-dcnode-id="1806" instrument_node="">I suppose that the causes of WW1 will always be a matter for debate, complex as they undoubtedly are, and it may be difficult to arrive at a neutral view of the extent to which Tuchman gets it right. But, right or wrong, this is a tremendous and moving read.
