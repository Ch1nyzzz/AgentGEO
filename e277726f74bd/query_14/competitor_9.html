</span><div class="clearfix text-formatted field field--name-field-body field--type-text-long field--label-hidden field__item" data-dcnode-id="3335"><div class="pagination__controls" data-dcnode-id="3673" style="display: flex; align-items: center;"><ul class="pagination" data-dcnode-id="3676"><li class="prev" data-dcnode-id="3698"><a data-dcnode-id="3699" href="#"><span data-dcnode-id="3700" instrument_node="">«</span></a></li><li class="active" data-dcnode-id="3695"><a data-dcnode-id="3696" href="#1"><span data-dcnode-id="3697" instrument_node="">1</span></a></li><li data-dcnode-id="3692"><a data-dcnode-id="3693" href="#2"><span data-dcnode-id="3694" instrument_node="">2</span></a></li><li data-dcnode-id="3689"><a data-dcnode-id="3690" href="#3"><span data-dcnode-id="3691" instrument_node="">3</span></a></li><li data-dcnode-id="3686"><a data-dcnode-id="3687" href="#4"><span data-dcnode-id="3688" instrument_node="">4</span></a></li><li data-dcnode-id="3683"><a data-dcnode-id="3684" href="#5"><span data-dcnode-id="3685" instrument_node="">5</span></a></li><li data-dcnode-id="3680"><a data-dcnode-id="3681" href="#6"><span data-dcnode-id="3682" instrument_node="">6</span></a></li><li class="next" data-dcnode-id="3677"><a data-dcnode-id="3678" href="#"><span data-dcnode-id="3679" instrument_node="">»</span></a></li></ul><button class="btn btn-default view-all" data-dcnode-id="3674" style="margin-left:auto"><span data-dcnode-id="3675" instrument_node="">View full article</span></button></div><p data-dcnode-id="3666" style="display: block;"><em data-dcnode-id="3669"><strong data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">Editor's Note</span></strong><span data-dcnode-id="3670" instrument_node="">: Amid nationwide protests&nbsp;over racial injustice and a resurgent Black Lives Matter movement, understanding&nbsp;the experience&nbsp;of African Americans in the U.S. is more relevant than ever. So we asked Gerald Early,&nbsp;Merle Kling Professor of Modern Letters in the African and African American Studies Department at Washington University in St. Louis, to recommend his favorite books on the history of black America.&nbsp;</span></em><em data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">What follows is a definitive collection of&nbsp;U.S. black scholarship,&nbsp;from one of the subject's preeminent experts.&nbsp;</span></em></p><span data-dcnode-id="3665" instrument_node="">
</span><p data-dcnode-id="3663" style="display: block;"><img alt="black history books" class="align-center" data-dcnode-id="3664" data-entity-type="file" data-entity-uuid="f07c9eb4-f404-4fb7-bccd-8ec50cd67c6c" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americanheritage.com/sites/default/files/inline-images/blackhistorybooks.jpg&amp;raw"></p><span data-dcnode-id="3662" instrument_node="">
</span><p data-dcnode-id="3660" style="display: block;"><span data-dcnode-id="3661" instrument_node="">African-Americans have experienced a cultural paradox, or a contradiction. For many years, until World War II, they were largely excluded from the official history of the United States. Not in the sense that they went unmentioned; after all, one can hardly conceive a history of the United States that does not deal with slavery, abolitionism, the Civil War, and Reconstruction. But it was certainly possible to talk about blacks largely as objects, not agents, as primitives, as an unfortunate population whose presence was largely an annoyance, a misfortune, or a tragedy. Blacks were usually presented as a people without a history in Africa, and they were presented as contributing nothing historically important to American life. Indeed, Western slavery had brought blacks into the loop of civilization and so was something of a perverse gift.</span></p><span data-dcnode-id="3659" instrument_node="">
</span><p data-dcnode-id="3657" style="display: block;"><span data-dcnode-id="3658" instrument_node="">This neglect, this denial, however, did not stop blacks from being an object of fascination for whites, with stage minstrelsy, with books and commentaries about race and the meaning of racial characteristics and traits, with ritualized lynching and acts of terrorism, with laws against miscegenation and socializing between the races, and against blacks exerting any sort of political presence in the land. Their being a people without a history made them, in the eyes of whites, a people unworthy of respect, which whites reinforced by making them a people without power, but they were not, by any means, a people devoid of interest. Indeed, they had a deviant allure, largely because what whites saw in black people was what they feared to see in themselves. As Ralph Ellison put it, “The white American has charged the Negro American with being without past or tradition (something which strikes the white man with a nameless horror), just as he himself has been so charged by European and American critics with a nostalgia for the stability once typical of European cultures.…”</span></p><span data-dcnode-id="3656" instrument_node="">
</span><p data-dcnode-id="3651" style="display: block;"><span data-dcnode-id="3655" instrument_node="">It was the abolitionist movement in the United States that generated the first histories of blacks. One of the earliest was the white abolitionist and children’s writer Lydia Maria Child’s </span><em data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">An Appeal in Favor of That Class of Americans Called Africans</span></em><span data-dcnode-id="3652" instrument_node="">, first published in 1833, tracing the history of slavery, the general status of the condition of blacks in the United States, their past in Africa, and their contributions to world civilization. It is largely a moral and political defense of the slaves’ right to be free based in good measure on an assessment of their history. So controversial was the subject at the time that Child wrote in her preface: “I am fully aware of the unpopularity of the task I have undertaken; but though I expect ridicule and censure, I cannot fear them.”</span></p><span data-dcnode-id="3650" instrument_node="">
</span><div class="insertable" data-dcnode-id="3648" style="display: block;"><span data-dcnode-id="3649" instrument_node="">Blacks were usually presented as a people without a history in Africa, and they were presented as contributing nothing historically important to American life.</span></div><span data-dcnode-id="3647" instrument_node="">
</span><p data-dcnode-id="3624" style="display: block;"><span data-dcnode-id="3646" instrument_node="">In 1836 the abolitionist Robert Benjamin Lewis published what is credited with being the first black history by a black: </span><em data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">Light and Truth: Collected From the Bible and Ancient and Modern History, Containing the Universal History of the Colored Man and Indian Race, From the Creation of the World to the Present Time</span></em><span data-dcnode-id="3643" instrument_node="">. This was followed in 1841 by the fugitive slave J. W. C. Pennington’s </span><em data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">A Textbook of the Origin and History of the Colored People</span></em><span data-dcnode-id="3640" instrument_node="">. Yet another black abolitionist writer, William C. Nell, wrote</span><em data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node=""> The Colored Patriots of the American Revolution in 1855</span></em><span data-dcnode-id="3637" instrument_node="">. William Wells Brown, who wrote the first black American novel, play, and travel book, produced </span><em data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">The Black Man: His Antecedents, His Genius, and His Achievements</span></em><span data-dcnode-id="3634" instrument_node=""> in 1863, followed by </span><em data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">The Negro in the American Rebellion: His Heroism and His Fidelity</span></em><span data-dcnode-id="3631" instrument_node=""> (1867) and </span><em data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node="">The Rising Son; or The Antecedents and Advancement of the Colored Race</span></em><span data-dcnode-id="3628" instrument_node=""> (1874). (Incidentally, Benjamin Quarles’s </span><em data-dcnode-id="3626"><span data-dcnode-id="3627" instrument_node="">Black Abolitionists</span></em><span data-dcnode-id="3625" instrument_node="">, published in 1969, remains a very solid account of black involvement in the abolitionist movement.)</span></p><span data-dcnode-id="3623" instrument_node="">
</span><p data-dcnode-id="3615" style="display: block;"><span data-dcnode-id="3622" instrument_node="">The first truly professional black historian, or the first black to write something like a professional history of African-Americans, was George Washington Williams, with his two-volume work </span><em data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node="">History of the Negro Race in America From 1619 to 1880</span></em><span data-dcnode-id="3619" instrument_node="">, published in 1882. </span><em data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">The American Negro Academy</span></em><span data-dcnode-id="3616" instrument_node="">, founded in 1897, with members including William H. Crogman, Alain Locke, Carter G. Woodson, James Weldon Johnson, and W. E. B. Du Bois, was something like a combination of salon and think tank. Its members made presentations at the meetings, and although they were not exclusively devoted to history, it was a major topic. After all, Johnson was to write a history of Harlem, and Locke a history of black music; Du Bois and Crogman were to write histories of African-Americans, and Woodson was to become the father of Negro history.</span></p><span data-dcnode-id="3614" instrument_node="">
</span><p data-dcnode-id="3609" style="display: block;"><span data-dcnode-id="3613" instrument_node="">Woodson, who, like Du Bois, earned a doctorate from Harvard, founded the Association for the Study of Negro Life and History in 1915 and the Journal of Negro History four months later. He introduced the idea of Negro history into the mainstream of the culture in 1926 by starting Negro History Week, which became Black History Month in 1976. He also published a number of books dealing with African and African-American history.&nbsp; His most famous and widely read book is </span><em data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">The Mis-Education of the Negro</span></em><span data-dcnode-id="3610" instrument_node="">, an account of how the Negro has been educated against understanding his or her history and his or her best interest, which was published in 1933.</span></p><span data-dcnode-id="3608" instrument_node="">
</span><p data-dcnode-id="3603" style="display: block;"><span data-dcnode-id="3607" instrument_node="">Historically black colleges were important in developing the study of black history, not only by introducing courses in the subject but also by having faculty members who devoted themselves to it: August Meier, Rayford Logan, Alrutheus Taylor, and Charles H. Wesley, among others.&nbsp; John Hope Franklin, the dean of African American historiography with his seminal text, </span><em data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">From Slavery to Freedom: A History of African Americans</span></em><span data-dcnode-id="3604" instrument_node="">, which has gone through many editions, taught for a time at a black college and was a graduate from one.</span></p><span data-dcnode-id="3602" instrument_node="">
</span><p data-dcnode-id="3570" style="display: none;"><span data-dcnode-id="3601" instrument_node="">There has always been a populist strain running through some black historiography that largely consists of the idea that the redemption of the African-American mind, as well as the political salvation of the African-American, will come with a proper understanding of a history that has not only been denied by whites but distorted and stolen. A variety of writers would fit in this school. &nbsp;Du Bois contributed a major volume to this school of history entitled </span><em data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">Black Folk Then and Now: An Essay in the History and Sociology of the Negro Race</span></em><span data-dcnode-id="3598" instrument_node=""> which appeared in 1939.&nbsp; Other works are J. A. Rogers (</span><em data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">Nature Knows No Color-Line and Sex and Race</span></em><span data-dcnode-id="3595" instrument_node="">), George G. M. James (</span><em data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">Stolen Legacy: Greek Philosophy Is Stolen Egyptian Philosophy</span></em><span data-dcnode-id="3592" instrument_node="">, a work that directly inspired Martin Bernal’s two-volume </span><em data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Black Athena</span></em><span data-dcnode-id="3589" instrument_node="">), John Henrik Clarke, St. Clair Drake (</span><em data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">Black Folk Here and There: An Essay in History and Anthropology</span></em><span data-dcnode-id="3586" instrument_node="">), Chancellor Williams, Afrocentric and nationalist-oriented scholars like Molefi Asante, Yosef ben-Jochannan, and Tony Martin, and works like the Nation of Islam’s highly controversial </span><em data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">The Secret Relationship Between Blacks and Jews</span></em><span data-dcnode-id="3583" instrument_node="">.&nbsp; Recent interest in the racial origins of the Jews and in the black presence in the Bible have made books like </span><em data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">The Black Biblical Heritage</span></em><span data-dcnode-id="3580" instrument_node=""> by Dr. John Johnson, </span><em data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">We, the Black Jews: Witness to the “White Jewish Race” Myth</span></em><span data-dcnode-id="3577" instrument_node=""> by Yosef ben-Jochannan, and a series of books by Gert Muller on the secret, suppressed history of black Hebrews popular with black readers. &nbsp;The best historical accounts of this school of black history are Wilson J. Moses’s </span><em data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">Afrotopia: The Roots of African American Popular History</span></em><span data-dcnode-id="3574" instrument_node=""> and Clarence Walker’s </span><em data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">We Can’t Go Home Again</span></em><span data-dcnode-id="3571" instrument_node="">.</span></p><span data-dcnode-id="3569" instrument_node="">
</span><p data-dcnode-id="3567" style="display: none;"><span data-dcnode-id="3568" instrument_node="">There are today far too many able historians, both white and black, who write about black history, from Barbara Fields to Robin D. G. Kelley, from Darlene Clark Hine to Patricia Sullivan, for anyone to be able to pick out just a few. What follows is my list of what I think are classic or essential works.</span></p><span data-dcnode-id="3566" instrument_node="">
</span><h3 data-dcnode-id="3562" style="display: none;"><img alt="souls of black folks" class="align-right" data-dcnode-id="3565" data-entity-type="file" data-entity-uuid="6005e21a-723f-4f49-bba3-a305dd31788b" height="249" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americanheritage.com/sites/default/files/inline-images/souls.jpg&amp;raw" width="175"><a data-dcnode-id="3563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B087SJSZT1/ref%3Ddp-kindle-redirect%3F_encoding%3DUTF8%26btkr%3D1"><span data-dcnode-id="3564" instrument_node="">1. The Souls of Black Folk</span></a></h3><span data-dcnode-id="3561" instrument_node="">
</span><p data-dcnode-id="3559" style="display: none;"><span data-dcnode-id="3560" instrument_node="">by W. E. B. Du Bois (1903; many editions)</span></p><span data-dcnode-id="3558" instrument_node="">
</span><p data-dcnode-id="3547" style="display: none;"><span data-dcnode-id="3557" instrument_node="">W. E. B. Du Bois's is probably the most influential or, at least, most discussed book published by a black American intellectual in the twentieth century, although </span><em data-dcnode-id="3555"><span data-dcnode-id="3556" instrument_node="">The Crisis of the Negro Intellectual</span></em><span data-dcnode-id="3554" instrument_node=""> by Harold Cruse and a few others might rate closely being this masterwork. It is not strictly a history of African-Americans; indeed, it is almost a synthesis of forms: biography, fiction, historical and economic analysis, and autobiography. One might think of some other Du Bois books that are more strictly historical, like </span><em data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">The Suppression of the African Slave-Trade to the United States of America</span></em><span data-dcnode-id="3551" instrument_node="">, 1638–1870 and </span><em data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">Black Reconstruction</span></em><span data-dcnode-id="3548" instrument_node="">, but none seem to have captured the major issues facing the black masses and the black elite as this work did, and none of his other books were as widely read. This is Du Bois’s analysis of the New South and race.</span></p><span data-dcnode-id="3546" instrument_node="">
</span><h3 data-dcnode-id="3543" style="display: none;"><a data-dcnode-id="3544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/White-Over-Black-Attitudes-University/dp/0807871419"><span data-dcnode-id="3545" instrument_node="">2. White Over Black: American Attitudes Toward the Negro, 1550–1812</span></a></h3><span data-dcnode-id="3542" instrument_node="">
</span><p data-dcnode-id="3540" style="display: none;"><span data-dcnode-id="3541" instrument_node="">by Winthrop Jordan&nbsp;(1968; University of North Carolina)</span></p><span data-dcnode-id="3539" instrument_node="">
</span><p data-dcnode-id="3534" style="display: none;"><span data-dcnode-id="3538" instrument_node="">Winthrop Jordan's </span><em data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">White Over Black&nbsp;</span></em><span data-dcnode-id="3535" instrument_node="">is still the most detailed and richly researched account of the development of race as an idea and the creation of racial attitudes and beliefs in the United States during the era of the rise and dominance of slavery.</span></p><span data-dcnode-id="3533" instrument_node="">
</span><h3 data-dcnode-id="3529" style="display: none;"><img alt="Myth of the negro past" class="align-right" data-dcnode-id="3532" data-entity-type="file" data-entity-uuid="c9542f6e-ac77-49bc-b30b-9773952eae7e" height="264" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americanheritage.com/sites/default/files/inline-images/myth.jpg&amp;raw" width="167"><a data-dcnode-id="3530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/1296511588/ref%3Ddp-kindle-redirect%3F_encoding%3DUTF8%26btkr%3D1"><span data-dcnode-id="3531" instrument_node="">3. The Myth of the Negro Past</span></a></h3><span data-dcnode-id="3528" instrument_node="">
</span><p data-dcnode-id="3526" style="display: none;"><span data-dcnode-id="3527" instrument_node="">by Melville Herskovits (1941; Beacon)</span></p><span data-dcnode-id="3525" instrument_node="">
</span><p data-dcnode-id="3520" style="display: none;"><span data-dcnode-id="3524" instrument_node="">The anthropologist Melville Herskovits’s path-breaking study of the retention of African heritage in the New World, meant to refute the work of the sociologist E. Franklin Frazier, who postulated that slavery had destroyed slaves’ African culture and forced them to organize an entirely new one. It should be read with a lesser-known but important book by Du Bois, </span><em data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">Black Folk Then and Now: An Essay in the History and Sociology of the Negro Race</span></em><span data-dcnode-id="3521" instrument_node="">, published in 1939, which deals with some of the same issues but mostly complements Herskovits’s work.</span></p><span data-dcnode-id="3519" instrument_node="">
</span><h3 data-dcnode-id="3516" style="display: none;"><a data-dcnode-id="3517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/When-Where-Enter-Impact-America/dp/0688146503"><span data-dcnode-id="3518" instrument_node="">4. When and Where I Enter: The Impact of Black Women on Race and Sex in America</span></a></h3><span data-dcnode-id="3515" instrument_node="">
</span><p data-dcnode-id="3513" style="display: none;"><span data-dcnode-id="3514" instrument_node="">by Paula Giddings (HarperTrade)</span></p><span data-dcnode-id="3512" instrument_node="">
</span><p data-dcnode-id="3510" style="display: none;"><span data-dcnode-id="3511" instrument_node="">First published in 1984, Paula Giddings wrote the best single-volume history of black women in the United States.</span></p><span data-dcnode-id="3509" instrument_node="">
</span><h3 data-dcnode-id="3505" style="display: none;"><img alt="Before the mayflower" class="align-right" data-dcnode-id="3508" data-entity-type="file" data-entity-uuid="b822bdd2-e484-4cc3-a896-24957f352c7c" height="248" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americanheritage.com/sites/default/files/inline-images/mayflower_0.jpg&amp;raw" width="165"><a data-dcnode-id="3506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Before-Mayflower-History-America-1619-1962/dp/1684115345/ref%3Dtmm_pap_swatch_0%3F_encoding%3DUTF8%26qid%3D%26sr%3D"><span data-dcnode-id="3507" instrument_node="">5. Before the Mayflower</span></a></h3><span data-dcnode-id="3504" instrument_node="">
</span><p data-dcnode-id="3502" style="display: none;"><span data-dcnode-id="3503" instrument_node="">by Lerone Bennett (1962; Johnson Publishers)</span></p><span data-dcnode-id="3501" instrument_node="">
</span><p data-dcnode-id="3496" style="display: none;"><span data-dcnode-id="3500" instrument_node="">Lerone Bennett's is one of the most popular single-volume histories of blacks ever written. Bennett, the executive editor at Ebony for many years, writes with considerable narrative skill. Also, I would mention here, once again, John Hope Franklin’s</span><em data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node=""> From Slavery to Freedom</span></em><span data-dcnode-id="3497" instrument_node="">, first published in 1947 and, like Bennett’s book, reissued many times. It remains the gold standard as the one-volume history of African-Americans. It has probably been read by more students than any other black history book.</span></p><span data-dcnode-id="3495" instrument_node="">
</span><h3 data-dcnode-id="3492" style="display: none;"><a data-dcnode-id="3493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Blues-People-Negro-Music-America/dp/068818474X/ref%3Dsr_1_1%3Fdchild%3D1%26keywords%3DBlues%2BPeople%26qid%3D1593739420%26s%3Dbooks%26sr%3D1-1"><span data-dcnode-id="3494" instrument_node="">6. Blues People</span></a></h3><span data-dcnode-id="3491" instrument_node="">
</span><p data-dcnode-id="3489" style="display: none;"><span data-dcnode-id="3490" instrument_node="">by Amiri Baraka (1963; HarperTrade)</span></p><span data-dcnode-id="3488" instrument_node="">
</span><p data-dcnode-id="3486" style="display: none;"><span data-dcnode-id="3487" instrument_node="">Ralph Ellison never liked this book, and Amiri Baraka is certainly not a historian. Yet the book has held up well over the years. There are points that one can argue with, but on the whole this is a compelling account of the development of African-American people through their music, their transition from African to American, from non-Christian to Christian, from slave to “citizen.” There are certainly others who knew more about black folklore and the blues —Langston Hughes, Zora Neale Hurston, Howard Odum, and Alan Lomax—and sometimes Baraka is a bit superficial. Nevertheless, this book is an important account of the African-American experience in an expressive art that seemed to capture the complexity of that journey more accurately than any other.</span></p><span data-dcnode-id="3485" instrument_node="">
</span><h3 data-dcnode-id="3481" style="display: none;"><img alt="harlem rennasaince" class="align-right" data-dcnode-id="3484" data-entity-type="file" data-entity-uuid="c38f04f7-362e-48d6-85df-059e670f792c" height="236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americanheritage.com/sites/default/files/inline-images/harlem.jpg&amp;raw" width="157"><a data-dcnode-id="3482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Harlem-Renaissance-Nathan-Irvin-Huggins/dp/0195063368"><span data-dcnode-id="3483" instrument_node="">7. Harlem Renaissance</span></a></h3><span data-dcnode-id="3480" instrument_node="">
</span><p data-dcnode-id="3478" style="display: none;"><span data-dcnode-id="3479" instrument_node="">by Nathan Huggins (1971; Oxford)</span></p><span data-dcnode-id="3477" instrument_node="">
</span><p data-dcnode-id="3472" style="display: none;"><span data-dcnode-id="3476" instrument_node="">There have been many books published about the Harlem Renaissance, but this early one by Nathan Huggins remains one of the best interdisciplinary studies of the period. David Levering Lewis’s </span><em data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">When Harlem Was in Vogue</span></em><span data-dcnode-id="3473" instrument_node=""> , first published in 1981, is still the most popular single-volume history of the era, and more broadly comprehensive than Huggins’s book, but Huggins’s astute judgments of the era have yet to be matched by any historian.</span></p><span data-dcnode-id="3471" instrument_node="">
</span><h3 data-dcnode-id="3468" style="display: none;"><a data-dcnode-id="3469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Parting-Waters-America-Years-1954-63/dp/0671687425"><span data-dcnode-id="3470" instrument_node="">8. Parting the Waters: America in the King Years, 1954–63</span></a></h3><span data-dcnode-id="3467" instrument_node="">
</span><p data-dcnode-id="3465" style="display: none;"><span data-dcnode-id="3466" instrument_node="">by Taylor Branch (1988; Simon &amp; Schuster)</span></p><span data-dcnode-id="3464" instrument_node="">
</span><p data-dcnode-id="3462" style="display: none;"><span data-dcnode-id="3463" instrument_node="">This initial volume in Taylor Branch’s epic history is the most compelling, gripping, altogether most powerful narrative available of the first stage of the civil rights movement, an absolutely stunning book.</span></p><span data-dcnode-id="3461" instrument_node="">
</span><h3 data-dcnode-id="3458" style="display: none;"><a data-dcnode-id="3459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Paul-Robeson-Biography-Martin-Duberman-ebook/dp/B00M16RTM8"><span data-dcnode-id="3460" instrument_node="">9. Paul Robeson: A Biography</span></a></h3><span data-dcnode-id="3457" instrument_node="">
</span><p data-dcnode-id="3455" style="display: none;"><span data-dcnode-id="3456" instrument_node="">by Martin Duberman (1988; New Press)</span></p><span data-dcnode-id="3454" instrument_node="">
</span><p data-dcnode-id="3449" style="display: none;"><span data-dcnode-id="3453" instrument_node="">Martin Duberman’s biography of Paul Robeson has incredible historical sweep, telling a textured, amazingly well-researched story of a powerful, uncompromising, and tragic figure in American cultural and political life. It is complemented nicely by Gerald Home’s </span><em data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">Black and Red: W. E. B. Du Bois and the Afro-American Response to the Cold War, 1944–1963</span></em><span data-dcnode-id="3450" instrument_node="">, published in 1986 (State University of New York).</span></p><span data-dcnode-id="3448" instrument_node="">
</span><h3 data-dcnode-id="3445" style="display: none;"><a data-dcnode-id="3446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Labor-Love-Sorrow-Slavery-Present/dp/0465018815"><span data-dcnode-id="3447" instrument_node="">10. Labor of Love, Labor of Sorrow: Black Women, Work, and the Family From Slavery to the Present</span></a></h3><span data-dcnode-id="3444" instrument_node="">
</span><p data-dcnode-id="3442" style="display: none;"><span data-dcnode-id="3443" instrument_node="">by Jacqueline Jones (1985; Knopf)</span></p><span data-dcnode-id="3441" instrument_node="">
</span><p data-dcnode-id="3439" style="display: none;"><span data-dcnode-id="3440" instrument_node="">Jacqueline Jones is one of the finest labor historians of her generation, and this work is a definitive social and economic history of black women and the family. It should be read together with Giddings’s book.</span></p><span data-dcnode-id="3438" instrument_node="">
</span><h3 data-dcnode-id="3434" style="display: none;"><img alt="new jim crow" class="align-right" data-dcnode-id="3437" data-entity-type="file" data-entity-uuid="6dd7dc54-9fac-4142-ba88-fc0158841859" height="259" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americanheritage.com/sites/default/files/inline-images/jimcrow.jpg&amp;raw" width="168"><a data-dcnode-id="3435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B086CFB2NT/ref%3Ddp-kindle-redirect%3F_encoding%3DUTF8%26btkr%3D1"><span data-dcnode-id="3436" instrument_node="">11. The New Jim Crow: Mass Incarceration in the Age of Colorblindness</span></a></h3><span data-dcnode-id="3433" instrument_node="">
</span><p data-dcnode-id="3431" style="display: none;"><span data-dcnode-id="3432" instrument_node="">by Michelle Alexander (2010;&nbsp;The New Press)</span></p><span data-dcnode-id="3430" instrument_node="">
</span><p data-dcnode-id="3425" style="display: none;"><span data-dcnode-id="3429" instrument_node="">Michelle Alexander's </span><em data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">The New Jim Crow&nbsp;</span></em><span data-dcnode-id="3426" instrument_node="">is almost certainly the most influential book published by a black scholar in the 21st century.&nbsp; It holds that the mass incarceration of black males in the United States since the end of the civil rights era, largely as part of the unsuccessful War on Drugs, amounts to a “new” Jim Crow system.&nbsp; The book has clearly challenged the assumptions of the American criminal justice and has clearly led to the social justice of ending incarceration and defunding police departments.</span></p><span data-dcnode-id="3424" instrument_node="">
</span><h3 data-dcnode-id="3421" style="display: none;"><a data-dcnode-id="3422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Broken-Heart-America-Violent-History-ebook/dp/B07W54BHVQ"><span data-dcnode-id="3423" instrument_node="">12. The Broken Heart of America: St. Louis and the Violent History of the United States</span></a></h3><span data-dcnode-id="3420" instrument_node="">
</span><p data-dcnode-id="3418" style="display: none;"><span data-dcnode-id="3419" instrument_node="">by Walter Johnson (2020;&nbsp;Basic Books)</span></p><span data-dcnode-id="3417" instrument_node="">
</span><p data-dcnode-id="3403" style="display: none;"><span data-dcnode-id="3416" instrument_node="">This is a powerful account of the history of systemic racism and racial violence that characterized the history of St Louis.&nbsp; A compelling companion to Andy Theising’s</span><em data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node=""> The Rise and Fall of an Industrial River Town—Made in the U.S.A.</span></em><span data-dcnode-id="3413" instrument_node="">, a history of East St. Louis, one of the poorest black urban communities in America.&nbsp; For more about the historical roots of racism and resistance in St. Louis, George Lipsitz’s </span><em data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">A Life in the Struggle: Ivory Perry and the Culture of Opposition </span></em><span data-dcnode-id="3410" instrument_node="">is a useful book.&nbsp; Classic works on black life in Midwestern cities is Joe Trotter’s </span><em data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">Black Milwaukee: The Making of an Industrial Proletariat</span></em><span data-dcnode-id="3407" instrument_node="">, 1915-1945 and Allan Spear’s</span><em data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node=""> Black Chicago: The Making of a Negro Ghetto</span></em><span data-dcnode-id="3404" instrument_node="">, 1890-1920.</span></p><span data-dcnode-id="3402" instrument_node="">
</span><h3 data-dcnode-id="3398" style="display: none;"><img alt="the half has never been told" class="align-right" data-dcnode-id="3401" data-entity-type="file" data-entity-uuid="48b905e2-1511-4d60-b5fd-33085f5a4b7a" height="247" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americanheritage.com/sites/default/files/inline-images/half.jpg&amp;raw" width="164"><a data-dcnode-id="3399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00N21I40C/ref%3Ddp-kindle-redirect%3F_encoding%3DUTF8%26btkr%3D1"><span data-dcnode-id="3400" instrument_node="">13. The Half Has Never Been Told: Slavery and the Making of American Capitalism</span></a></h3><span data-dcnode-id="3397" instrument_node="">
</span><p data-dcnode-id="3395" style="display: none;"><span data-dcnode-id="3396" instrument_node="">by Edward E. Baptist (2014;&nbsp;Basic Books)&nbsp;</span></p><span data-dcnode-id="3394" instrument_node="">
</span><p data-dcnode-id="3389" style="display: none;"><span data-dcnode-id="3393" instrument_node="">Here is a book that extends and particularizes Eric Williams’s classic 1944 work, </span><em data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">Capitalism and Slavery</span></em><span data-dcnode-id="3390" instrument_node="">, the basic thesis being that slavery in the United States was not an economic outlier or anomaly but rather the major force and source for the country’s wealth and economic supremacy.&nbsp;</span></p><span data-dcnode-id="3388" instrument_node="">
</span><h3 data-dcnode-id="3385" style="display: none;"><a data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B001JMFCS8/ref%3Ddp-kindle-redirect%3F_encoding%3DUTF8%26btkr%3D1"><span data-dcnode-id="3387" instrument_node="">14. The Slave Ship: A Human History</span></a></h3><span data-dcnode-id="3384" instrument_node="">
</span><p data-dcnode-id="3382" style="display: none;"><span data-dcnode-id="3383" instrument_node="">by Marcus Rediker (2007;&nbsp;Penguin)&nbsp;</span></p><span data-dcnode-id="3381" instrument_node="">
</span><p data-dcnode-id="3376" style="display: none;"><span data-dcnode-id="3380" instrument_node="">One of the best of the recent book on the history of the transatlantic slave trade.&nbsp; Sowande'&nbsp;Mustakeem’s </span><em data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">Slavery at Sea: Terror, Sex, and Sickness in the Middle Passage</span></em><span data-dcnode-id="3377" instrument_node=""> (2016: University of Illinois) is an excellent complement.&nbsp;</span></p><span data-dcnode-id="3375" instrument_node="">
</span><h3 data-dcnode-id="3371" style="display: none;"><img alt="medical apartheid " class="align-right" data-dcnode-id="3374" data-entity-type="file" data-entity-uuid="40c7b81c-28ba-40bc-b068-6b5e5b057cc5" height="244" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americanheritage.com/sites/default/files/inline-images/medical.jpg&amp;raw" width="163"><a data-dcnode-id="3372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Medical-Apartheid-Experimentation-Americans-Colonial/dp/076791547X"><span data-dcnode-id="3373" instrument_node="">15. Medical Apartheid: The Dark History of Medical Experimentation on Black Americans from Colonial Times to the Present</span></a></h3><span data-dcnode-id="3370" instrument_node="">
</span><p data-dcnode-id="3368" style="display: none;"><span data-dcnode-id="3369" instrument_node="">by Harriet A. Washington (2008; Anchor)</span></p><span data-dcnode-id="3367" instrument_node="">
</span><p data-dcnode-id="3365" style="display: none;"><span data-dcnode-id="3366" instrument_node="">A shocking historical study of how blacks were used and abused by medical researchers, often with the subjects’ consent, usually without their knowledge.&nbsp; The book reveals how eugenics, propelled by the strong belief in Social Darwinism, not only promoted experimentation on and poor medical treatment for blacks, but justified it as inevitable entitlement of whites to rule as the dominant race.&nbsp;</span></p><span data-dcnode-id="3364" instrument_node="">
