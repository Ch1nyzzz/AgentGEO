</span><div class="entry-content" data-dcnode-id="1532"><span data-dcnode-id="1649" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1646"><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/following-the-call.jpg"><img alt="" class="wp-image-47473" data-attachment-id="47473" data-comments-opened="1" data-dcnode-id="1648" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="following-the-call" data-large-file="https://rtrube54.files.wordpress.com/2022/04/following-the-call.jpg?w=676" data-medium-file="https://rtrube54.files.wordpress.com/2022/04/following-the-call.jpg?w=300" data-orig-file="https://rtrube54.files.wordpress.com/2022/04/following-the-call.jpg" data-orig-size="960,720" data-permalink="https://bobonbooks.com/following-the-call/" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/following-the-call.jpg%3Fw%3D960&amp;raw" srcset="https://rtrube54.files.wordpress.com/2022/04/following-the-call.jpg 960w, https://rtrube54.files.wordpress.com/2022/04/following-the-call.jpg?w=150 150w, https://rtrube54.files.wordpress.com/2022/04/following-the-call.jpg?w=300 300w, https://rtrube54.files.wordpress.com/2022/04/following-the-call.jpg?w=768 768w"></a></figure><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1639"><em data-dcnode-id="1641"><a data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plough.com/en/topics/faith/discipleship/following-the-call" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1644" instrument_node="">Following the Call</span></a><span data-dcnode-id="1642" instrument_node="">, </span></em><span data-dcnode-id="1640" instrument_node="">Edited by Charles E. Moore. Walden, NY: Plough Publishing House, 2021.</span></p><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1635"><em data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Summary: A collection of 52 weeks of readings working through the Sermon on the Mount, meant to be discussed and lived out in community.</span></em></p><span data-dcnode-id="1634" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1633" instrument_node="">Back in 2016, I </span><a data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2016/08/25/review-called-to-community/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1632" instrument_node="">reviewed</span></a><span data-dcnode-id="1630" instrument_node=""> a collection of 52 readings from the same editor and publishing house, titled </span><em data-dcnode-id="1626"><a data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plough.com/en/topics/community/intentional-community/called-to-community" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1629" instrument_node="">Called to Community</span></a><span data-dcnode-id="1627" instrument_node="">. </span></em><span data-dcnode-id="1625" instrument_node="">This book, similar in format, builds on that earlier collection.</span></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Charles E. Moore has edited a collection of readings organized into 52 weeks of readings with contributions from a wide range of Christians throughout history, from Augustine to Tim Keller, from Martin Luther to Martin Luther King, Jr. The readings follow the Sermon on the Mount, section by section, portraying how a wide range of believers have understood and sought to live under this challenging message of Jesus.</span></p><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">A reading at the end of this collection of readings articulates the intent in creating this set of readings. Dietrich Bonhoeffer writes:</span></p><span data-dcnode-id="1617" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1609"><p data-dcnode-id="1610"><em data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">“This word, whose claim we recognize, this word, which issues from his saying ‘I have known thee,</span></em><span data-dcnode-id="1614" instrument_node="">‘</span><em data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node=""> this word which sets us at once to work and obedience, is the rock on which to build our house. The only proper response to this word which Jesus brings with him from eternity is simply to do it. Jesus has spoken: his is the word, ours the obedience. Only in the doing of it does the word of Jesus retain its honor, might, and power among us. Now the storm can rage over the house, but it cannot shatter that union with him, which his word has created” </span></em><span data-dcnode-id="1611" instrument_node="">(p. 332).</span></p></blockquote><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">The assumption throughout is that this is a kingdom manifesto, describing the way Jesus’s followers will actually live, rather than some unrealistic ideal. Furthermore, and this is emphasized in the subtitle, the Sermon on the Mount is meant to be lived together and the book is written to be discussed together. Each weeks readings, from one to four writers and covering five to eight pages, are meant to be read, along with the pertinent portion of the Sermon, in a small group. A study guide at the conclusion of the text offer several probing questions and additional scripture passages to aid discussion. The aim is that a group would help one another take steps to live out the Sermon week by week.</span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">The readings are offered in four sections with an introductory article to each section by Moore. They are:</span></p><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1598"><strong data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Kingdom Character</span></strong><span data-dcnode-id="1599" instrument_node=""> (Matthew 5:1-16). A highlight in this section was the short reading from Oscar Romero on persecution. He observes: “It is very easy to be servants of the word without disturbing the world in any way” (p. 71).</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1593"><strong data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Kingdom Commands</span></strong><span data-dcnode-id="1594" instrument_node=""> (Matthew 5:17-48) Jen Wilkin writes on law and the place of obedience and offers this example: “We don’t train our children to obey us so that they can gain our favor. They already have our favor. We, being evil, train and equip them to obey because it is good and right and safe. And how much more does our heavenly Father love us?” (p. 87).</span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1588"><strong data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Kingdom Devotion </span></strong><span data-dcnode-id="1589" instrument_node="">(Matthew 6:1-18) William H. Willimon and Stanley Hauerwas offer these convicting words: “Those who are being formed by praying, ‘Our Father who art in heaven, holy be your name’ are not permitted to about the holiness of God by attempting to put a leash on God, then dragging God into our crusades and cruelties” (p. 195).</span></p><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1580"><strong data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Kingdom Priorities </span></strong><span data-dcnode-id="1584" instrument_node="">(Matthew 6:19-7:28) Dallas Willard challenged my own understanding of the teaching about pearls before pigs: “Pigs cannot digest pearls, cannot nourish themselves upon them….The reason these animals will finally ‘turn and rend you’ when you one day step up to them with another load of Bibles or pearls, is that </span><em data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">you</span></em><span data-dcnode-id="1581" instrument_node=""> at least are edible” (p. 287).</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">This is but a tiny sampling of the rich fare offered in these readings. You may wonder if you will find enough to discuss in the few pages and short passage for each week. I suspect once you get going, if there is good trust and spiritual openness among you, that you will find there isn’t enough time.</span></p><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">______________________________</span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Disclosure of Material Connection: I received this book free from the publisher via LibraryThing’s Early Reviewer program.&nbsp;I was not required to write a positive review. The opinions I have expressed are my own.</span></p><span data-dcnode-id="1570" instrument_node="">

</span><header class="entry-header" data-dcnode-id="1497"><span data-dcnode-id="1525" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1522"><a data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/20/review-a-christian-field-guide-to-technology-for-engineers-and-designers/" rel="bookmark"><span data-dcnode-id="1524" instrument_node="">Review: A Christian Field Guide to Technology for Engineers and&nbsp;Designers</span></a></h1><span data-dcnode-id="1521" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1500"><span data-dcnode-id="1520" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1514"><a data-dcnode-id="1515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/20/review-a-christian-field-guide-to-technology-for-engineers-and-designers/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1518" datetime="2022-04-20T07:00:00-04:00"><span data-dcnode-id="1519" instrument_node="">April 20, 2022</span></time><time class="updated" data-dcnode-id="1516" datetime="2022-04-19T20:14:43-04:00"><span data-dcnode-id="1517" instrument_node="">April 19, 2022</span></time></a></span><span class="byline" data-dcnode-id="1508"><span class="sep" data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node=""> / </span></span><span class="author vcard" data-dcnode-id="1509"><a class="url fn n" data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/author/rtrube54/"><span data-dcnode-id="1511" instrument_node="">rtrube54</span></a></span></span><span data-dcnode-id="1507" instrument_node=""> </span><span class="comments-link" data-dcnode-id="1502"><span class="sep" data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node=""> / </span></span><a data-dcnode-id="1503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/20/review-a-christian-field-guide-to-technology-for-engineers-and-designers/%23respond"><span data-dcnode-id="1504" instrument_node="">Leave a comment</span></a></span><span data-dcnode-id="1501" instrument_node="">
</span></div><span data-dcnode-id="1498" instrument_node="">
</span></header><span data-dcnode-id="1495" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1402"><span data-dcnode-id="1494" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1491"><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/a-chrjstian-field-guide.jpg"><img alt="" class="wp-image-47467" data-attachment-id="47467" data-comments-opened="1" data-dcnode-id="1493" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="a-chrjstian-field-guide" data-large-file="https://rtrube54.files.wordpress.com/2022/04/a-chrjstian-field-guide.jpg?w=676" data-medium-file="https://rtrube54.files.wordpress.com/2022/04/a-chrjstian-field-guide.jpg?w=300" data-orig-file="https://rtrube54.files.wordpress.com/2022/04/a-chrjstian-field-guide.jpg" data-orig-size="960,720" data-permalink="https://bobonbooks.com/a-chrjstian-field-guide/" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/a-chrjstian-field-guide.jpg%3Fw%3D960&amp;raw" srcset="https://rtrube54.files.wordpress.com/2022/04/a-chrjstian-field-guide.jpg 960w, https://rtrube54.files.wordpress.com/2022/04/a-chrjstian-field-guide.jpg?w=150 150w, https://rtrube54.files.wordpress.com/2022/04/a-chrjstian-field-guide.jpg?w=300 300w, https://rtrube54.files.wordpress.com/2022/04/a-chrjstian-field-guide.jpg?w=768 768w"></a></figure><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1484"><em data-dcnode-id="1486"><a data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ivpress.com/a-christian-field-guide-to-technology-for-engineers-and-designers" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1489" instrument_node="">A Christian Field Guide to Technology for Engineers and Designers</span></a><span data-dcnode-id="1487" instrument_node="">, </span></em><span data-dcnode-id="1485" instrument_node="">Ethan Brue, Derek C Schuurman, and Steven M. Vanderleest. Downers Grove: IVP Academic, 2022.</span></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1480"><em data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Summary: Explores in practical terms the intersection of faith and technology in areas of design norms and ethics and how technology might serve the common good.</span></em></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">It is common in Christian higher education circles to discuss the intersection of faith and learning. Often, this is highly abstract and conceptual and in fields like engineering, computer science, and design, these discussions seem far removed from the technical problems those trained in these fields are trying to solve. The three authors of this work have worked both in industry and academia and bring their experience together with a well-informed faith to offer a work that digs into the specifics of how Christian faith informs design, ethics, and the uses technology serves for the common good. They articulate what they are trying to do and why they call it a “field guide” in their Preface:</span></p><span data-dcnode-id="1476" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1471"><p data-dcnode-id="1472"><span data-dcnode-id="1475" instrument_node=""> </span><em data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">“The vision for this book is to provide a guide for Christian engineers and others working with technology to responsibly navigate today’s technological terrain. A field guide is a resource that helps the reader identify things (usually plants or animals) in their natural environment. We hope this book serves as a field guide interested in engineering and technology to identify and discern technology and its cultural environment. Furthermore, since all readers will be users of technology, and many will be practitioners, this book provides some principles and advice that we hope will be helpful to Christians who wish to be faithful and honor God in the technological aspects of their lives.”</span></em></p></blockquote><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">The authors begin with the underlying hopes that inspired people like the Wright Brothers, Thomas Edison, and Samuel Morse and make the connection between our dreams and hope in a sovereign God who makes all things new. They root this vision in the early chapters of Genesis, a skillful creator who works iteratively to “very good” design standards, who entrusts his creatures with responsible caring and imitating the creator in their care (we were technologists from the start!), who accept deceptively marketed fruit in disobedience to their mandate, introducing futility into work and estrangement into relations, leading to a long term project of redemption and restoration.</span></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">From theological foundations, the authors focus on the responsibility of engineers, beginning with the example of New York’s Robert Moses who designed bridges with low clearances to prevent the poor from riding busses to the parks Moses designed. It was not a mere fluke of neutral bridge design but a deliberately racist and classist decision.  They go on the puncture a number of myths about design neutrality, the most chilling of which was the employment of IBM engineers in the 1930’s to develop calculating devices allowing the complex control of a train system shipping millions to the camps, even after they knew how their work was being used. They point out failures of engineering responsibility in the collapse of Hyatt Regency walkways and exploding gas tanks on Ford Pintos. Beyond the failures is the positive responsibility of Christians to design technology for shalom, the wholeness and flourishing of those served by that technology.</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Christian principles come to bear throughout the design process. The field guide proposes “design norms” that inform the creation and evaluation of technology, detailing analytical, cultural, clarity, social, stewardship, harmony, justice, caring, and faithfulness norms. They recognize that there might be tradeoffs between norms, the place where theologically informed creativity comes into play. They discuss different system of ethics, and the normative standards of the field, and then challenge Christians to an ethics that go beyond these in the pursuit of love of neighbor, care for the creation, and justice.</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1460" instrument_node="">Engineers need to be aware of the hubris of building towers of Babel, monuments to human autonomy and pride, particularly in a</span><em data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node=""> technicism</span></em><span data-dcnode-id="1457" instrument_node=""> that thinks all human problems are reducible to technical solutions. History can teach us and, in one of the most illuminating chapters, they use the example of electric vehicles, which actually </span><em data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">preceded </span></em><span data-dcnode-id="1454" instrument_node="">internal combustion engine powered vehicles. They show all the misconceptions about why this technology failed and our flawed ideas about progress that may actually have been regressive. Looking to futurist ideas is also instructive as Christians thread a way between the unbounded optimism of movements like transhumanism and technological pessimism to view technology as a gift whose use we rehearse for good as we anticipate the new creation.</span></p><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Many Christians struggle with whether to leave off their technology to pursue the mission of Jesus. The authors offer a strong argument for how God may be honored in technological fields. The book then concludes with a fictional exchange of emails between a professor and former student in industry that pull together and apply the different themes of the field guide. </span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">I appreciate the “heavy lifting” these authors have done to identify specific issues of responsibility, design norms, ethical issues, and their thoughtfulness about the uses of technology. I think of many students with whom I wish I’d had the opportunity to discuss this book (a prospect enhanced by the discussion guide that is included with the book). This is quite simply the most useful book I’ve come across for those in technological fields about how they may do their work Christianly. The combination of principles, case studies, and well-known examples make this highly accessible. This will be my “go to” field guide to recommend in the future for engineers and designers.</span></p><span data-dcnode-id="1446" instrument_node="">

</span><header class="entry-header" data-dcnode-id="1367"><span data-dcnode-id="1395" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1392"><a data-dcnode-id="1393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/19/review-the-professors-house/" rel="bookmark"><span data-dcnode-id="1394" instrument_node="">Review: The Professor’s House</span></a></h1><span data-dcnode-id="1391" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1370"><span data-dcnode-id="1390" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1384"><a data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/19/review-the-professors-house/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1388" datetime="2022-04-19T07:00:00-04:00"><span data-dcnode-id="1389" instrument_node="">April 19, 2022</span></time><time class="updated" data-dcnode-id="1386" datetime="2022-04-18T21:12:09-04:00"><span data-dcnode-id="1387" instrument_node="">April 18, 2022</span></time></a></span><span class="byline" data-dcnode-id="1378"><span class="sep" data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node=""> / </span></span><span class="author vcard" data-dcnode-id="1379"><a class="url fn n" data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/author/rtrube54/"><span data-dcnode-id="1381" instrument_node="">rtrube54</span></a></span></span><span data-dcnode-id="1377" instrument_node=""> </span><span class="comments-link" data-dcnode-id="1372"><span class="sep" data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node=""> / </span></span><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/19/review-the-professors-house/%23respond"><span data-dcnode-id="1374" instrument_node="">Leave a comment</span></a></span><span data-dcnode-id="1371" instrument_node="">
</span></div><span data-dcnode-id="1368" instrument_node="">
</span></header><span data-dcnode-id="1365" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1290"><span data-dcnode-id="1364" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1361"><a data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/the-professors-house.jpg"><img alt="" class="wp-image-47462" data-attachment-id="47462" data-comments-opened="1" data-dcnode-id="1363" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="the-professors-house" data-large-file="https://rtrube54.files.wordpress.com/2022/04/the-professors-house.jpg?w=676" data-medium-file="https://rtrube54.files.wordpress.com/2022/04/the-professors-house.jpg?w=300" data-orig-file="https://rtrube54.files.wordpress.com/2022/04/the-professors-house.jpg" data-orig-size="960,720" data-permalink="https://bobonbooks.com/the-professors-house/" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/the-professors-house.jpg%3Fw%3D960&amp;raw" srcset="https://rtrube54.files.wordpress.com/2022/04/the-professors-house.jpg 960w, https://rtrube54.files.wordpress.com/2022/04/the-professors-house.jpg?w=150 150w, https://rtrube54.files.wordpress.com/2022/04/the-professors-house.jpg?w=300 300w, https://rtrube54.files.wordpress.com/2022/04/the-professors-house.jpg?w=768 768w"></a></figure><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1354"><em data-dcnode-id="1356"><a data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.penguinrandomhouse.com/books/25315/the-professors-house-by-willa-cather/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1359" instrument_node="">The Professor’s House</span></a><span data-dcnode-id="1357" instrument_node="">, </span></em><span data-dcnode-id="1355" instrument_node="">Willa Cather. New York: Vintage Classics, 1990 (originally published in 1925).</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1350"><em data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Summary: The move to a new home, academic success and his daughter’s marriages, and a deceased former student and son-in-law, precipitate a crisis for Professor Godfrey St. Peter.</span></em></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1348" instrument_node="">The first sign was when the Professor paid up the rent on his old house so that he could still use his spartan old study, furnished only with a table, a sofa with Tom Outland’s old blanket, a couple seamstress’s forms left by Augusta, the family seamstress, and an unreliable heater that required leaving a window open for safety’s sake. The lavish new home had plenty of room since his daughters had married. But this was the place where he wrote the multi-volume history, </span><em data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Spanish Adventures in North America</span></em><span data-dcnode-id="1345" instrument_node="">, that was the cornerstone of his academic success and the awards that followed that made the new house that Lillian had always wanted possible. Up until then, any niceties had come from her inherited income.</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">St. Peter’s older daughter Rosamond had originally married a former student, Tom Outland, who died in the war, but not before leaving her a patent that her new husband, Louie Marcellus, has commercialized, with lavish profits that he uses to lavish favor on Rosamond and her family. The younger daughter, Kathleen, less vain and more sensitive has married a journalist. There is tension between the two, particularly as the Marcelluses take their parents on trips, including a proposed trip to Paris.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">St. Peter decides not to go, pottering about in his old study, revising Tom Outland’s journals. The book takes a break at this point with Tom speaking in the first person about a magical season of discovering an ancient indigenous people’s village high up on a mesa in the Southwest, cataloging his discoveries. His partner stakes him the funds (gambling winnings) to visit Washington to recruit researchers to come, to no avail. He then returns, only to find his partner sold them out, resulting in their final alienation. Tom then migrates to the college where St. Peter is professor, works with a physics professor on his invention, graduating with a patent. Part three of the book returns to the professor, and a crisis in his life with which the book concludes. </span></p><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">The book is fraught with the tensions that are pulling at St. Peter’s life. There is the spartan life of the scholar (and of Tom on the mesa which St. Peter had visited) in contrast with the life of luxury that both Lillian and her elder daughter Rosamond craved, that St. Peter’s success and Marcellus’ business acumen made possible. There is the tension between the elder and younger daughter and their husbands, the younger of which, St. Peter trusts, despite, or perhaps because of his modest means. There is the growing coolness between Godfrey and Lillian as neither can embrace the life of the other. St. Peter’s stubborn hold on his study and his refusal to go to Paris, which he loves, is a kind of passive resistance after acceding to the life Lillian desires. Tom seems to represent something of an ideal that St. Peter had not had the courage to pursue.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">The summer of the Paris vacation was a last respite before returning to his teaching and the comfortable life Lillian wanted (or perhaps the growing awareness of their estrangement). As their return approaches, he experiences a weariness for which the doctor can find no bodily cause, setting the stage for his final crisis.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">The structure of the book seems disjointed, with the second part a separate narrative in which Tom Outland is the main character. The only thing I can think is that it explains St. Peter’s fixation with Tom by setting their lives in contrast. The question remains of how or whether St. Peter will resolve the tensions in his life, tensions such as all of us live with, tensions that can fray to the breaking or result in creative resolutions.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><div class="sharedaddy sd-like-enabled sd-sharing-enabled" data-dcnode-id="1292" id="jp-post-flair"><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="1305"><div class="robots-nocontent sd-block sd-social sd-social-icon-text sd-sharing" data-dcnode-id="1306"><h3 class="sd-title" data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="1307"><ul data-dcnode-id="1308" data-sharing-events-added="true"><li class="share-twitter" data-dcnode-id="1322"><a class="share-twitter sd-button share-icon" data-dcnode-id="1323" data-shared="sharing-twitter-47460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/19/review-the-professors-house/%3Fshare%3Dtwitter%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Twitter"><span data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Twitter</span></span></a></li><li class="share-facebook" data-dcnode-id="1318"><a class="share-facebook sd-button share-icon" data-dcnode-id="1319" data-shared="sharing-facebook-47460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/19/review-the-professors-house/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Facebook</span></span></a></li><li class="share-tumblr" data-dcnode-id="1314"><a class="share-tumblr sd-button share-icon" data-dcnode-id="1315" data-shared="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/19/review-the-professors-house/%3Fshare%3Dtumblr%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Tumblr"><span data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Tumblr</span></span></a></li><li class="share-linkedin
