</span><header class="entry-header" data-dcnode-id="2588"><span data-dcnode-id="2616" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2613"><a data-dcnode-id="2614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/29/review-enter-a-murderer/" rel="bookmark"><span data-dcnode-id="2615" instrument_node="">Review: Enter a&nbsp;Murderer</span></a></h1><span data-dcnode-id="2612" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="2591"><span data-dcnode-id="2611" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2605"><a data-dcnode-id="2606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/29/review-enter-a-murderer/" rel="bookmark"><time class="entry-date published" data-dcnode-id="2609" datetime="2022-04-29T07:00:00-04:00"><span data-dcnode-id="2610" instrument_node="">April 29, 2022</span></time><time class="updated" data-dcnode-id="2607" datetime="2022-04-28T22:29:39-04:00"><span data-dcnode-id="2608" instrument_node="">April 28, 2022</span></time></a></span><span class="byline" data-dcnode-id="2599"><span class="sep" data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node=""> / </span></span><span class="author vcard" data-dcnode-id="2600"><a class="url fn n" data-dcnode-id="2601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/author/rtrube54/"><span data-dcnode-id="2602" instrument_node="">rtrube54</span></a></span></span><span data-dcnode-id="2598" instrument_node=""> </span><span class="comments-link" data-dcnode-id="2593"><span class="sep" data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node=""> / </span></span><a data-dcnode-id="2594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/29/review-enter-a-murderer/%23respond"><span data-dcnode-id="2595" instrument_node="">Leave a comment</span></a></span><span data-dcnode-id="2592" instrument_node="">
</span></div><span data-dcnode-id="2589" instrument_node="">
</span></header><span data-dcnode-id="2586" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2514"><span data-dcnode-id="2585" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2580"><span data-dcnode-id="2584" instrument_node="">
</span><figure class="aligncenter size-large" data-dcnode-id="2581"><a data-dcnode-id="2582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/enter-a-murderer.jpg"><img alt="" class="wp-image-47511" data-attachment-id="47511" data-comments-opened="1" data-dcnode-id="2583" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="enter-a-murderer" data-large-file="https://rtrube54.files.wordpress.com/2022/04/enter-a-murderer.jpg?w=676" data-medium-file="https://rtrube54.files.wordpress.com/2022/04/enter-a-murderer.jpg?w=300" data-orig-file="https://rtrube54.files.wordpress.com/2022/04/enter-a-murderer.jpg" data-orig-size="960,720" data-permalink="https://bobonbooks.com/enter-a-murderer/" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/enter-a-murderer.jpg%3Fw%3D960&amp;raw" srcset="https://rtrube54.files.wordpress.com/2022/04/enter-a-murderer.jpg 960w, https://rtrube54.files.wordpress.com/2022/04/enter-a-murderer.jpg?w=150 150w, https://rtrube54.files.wordpress.com/2022/04/enter-a-murderer.jpg?w=300 300w, https://rtrube54.files.wordpress.com/2022/04/enter-a-murderer.jpg?w=768 768w"></a></figure></div><span data-dcnode-id="2579" instrument_node="">
</span><p data-dcnode-id="2573"><em data-dcnode-id="2575"><a data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonyandmayhem.com/products/enter-a-murderer" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2578" instrument_node="">Enter a Murderer</span></a><span data-dcnode-id="2576" instrument_node=""> </span></em><span data-dcnode-id="2574" instrument_node="">(Roderick Alleyn #2), Ngaio Marsh. New York: Felony &amp; Mayhem, 2012 (originally published in 1935).</span></p><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2569"><em data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">Summary: Invited to see a play with his sidekick Bathgate, Alleyn actually witnesses the murder he will investigate.</span></em></p><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Nigel Bathgate is friends with the lead actor in a play at the unicorn and receives two tickets to a performance. His friend, and lead partner in crime investigation, Chief Inspector Roderick Alleyn is free and joins him. Before the play, they visit the lead actor, Felix Gardner and witness tensions within the cast as Arthur Subornadier barges into a conversation with Gardner and actress Stephanie Vaughn, a lovers’ triangle with Subornadier the jilted lover. We also learn that Subornadier had threatened the theatre owner, Jacob Saint with blackmail to get the lead part. Are you getting the picture that  Subornadier is not a very likable character. Turns out he has offended most of the cast and crew.</span></p><span data-dcnode-id="2565" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">During the climactic scene, the character played by Subornadier loads a gun (supposedly with dummy bullets) quarrels with Gardner’s character. Gardner gets the gun, fires and kills Subornadier as the stage manager fires a blank shot. Only Gardner really kills Subornadier, and Alleyn sees it all and calls in his crew to investigate. Quickly, they figure out the murder is the one who substitute real bullets for the dummies that were in the top drawer of a desk during a short time when the stage was blacked out. Attention focuses on various characters including Jacob Saint, who is eventually arrested, and Albert Hickson, the property manager who was responsible for the bullets–until Hickson turns up dead while Saint is in jail.</span></p><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">The climax comes when the actors return to the theatre to re-enact their movements in the final scene. In the end the murderer self-exposes, the very person who Alleyn had written down for his newswriting sidekick, Bathgate. And so ends the first of Marsh’s murder mysteries set in a theatre–a favorite location.</span></p><span data-dcnode-id="2559" instrument_node="">
</span><p data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">This is early Alleyn. He and Bathgate are still learning to trust each other. Alleyn seems a bit rougher around the edges than in later novels, and without Troy in the picture, suggestively returns the attentions of lead actress Stephanie Vaughn, who doesn’t seem to mind gathering men around her. At the same time, the trademark qualities of Alleyn emerge, his quiet, commanding character that marshals the efforts of his team, including Bathgate and his focus on details and not appearances until the murderer is revealed.</span></p><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">This was a quick read and great fun with an unexpected twist at the end–all the ingredients for a good mystery, and for one just beginning the series, an indication of the good things to come with thirty more of these to go!</span></p><span data-dcnode-id="2553" instrument_node="">

</span><p data-dcnode-id="2464"><em data-dcnode-id="2466"><a data-dcnode-id="2468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.penguinrandomhouse.com/books/551554/bittersweet-by-susan-cain/"><span data-dcnode-id="2469" instrument_node="">Bittersweet</span></a><span data-dcnode-id="2467" instrument_node="">, </span></em><span data-dcnode-id="2465" instrument_node="">Susan Cain. New York: Crown, 2022.</span></p><span data-dcnode-id="2463" instrument_node="">
</span><p data-dcnode-id="2460"><em data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">Summary: Describes the state of bittersweetness, where sadness and joy, death and life, failure and growth, longing and love intersect and how this deepens our lives and has the power to draw us together.</span></em></p><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2454"><span data-dcnode-id="2458" instrument_node="">About ten years ago, Susan Cain published </span><em data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">Quiet</span></em><span data-dcnode-id="2455" instrument_node="">, helping the extroverted world discover the power of introverts and what they bring us all. In this work, Cain explores why at least some of us like sad songs, rainy days, and react intensely to art?</span></p><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">She helps us enter into understanding bittersweet by telling the story of the cellist of Sarajevo, who during the worst of the shelling, appeared every day and played Albinoni’s Adagio in G Minor. It is a beautiful, sad, and evocative piece that capture both the beauty of pre-war Sarajevo and the terrible loss of the war. This is bittersweet, this embrace of sadness and the longing for beauty, for something beyond our fractured existence. Holding together these seemingly disparate experiences, Cain believes is the pathway to “creativity, transcendence, and love.” Bittersweet can draw us together in the shared experience of longing for the transcendent.</span></p><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">Cain explores the sources of our longings for the good, the true, and the beautiful, the wonder of those moments and yet their transience. She contends that it is the place of creativity. She talks about how we live with bittersweet in a world of relentless positivity whose mantra seems to be, “be happy.” She offers an insight into the mental health crisis on university campuses, where everyone has to project a put-together, perfect Instagram image of effortless perfection that no one can live up to. She contends that our understanding of bittersweet can transform workplaces, where we understand the other side of fantastic success is the risk of failure, where allowing workers to acknowledge their struggles releases them to work more freely and productively, knowing that we’re all strugglers here.</span></p><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">The material of the third part on mortality, impermanence, and grief was the most thought-provoking for me. It is framed with the death of her brother and father from COVID-19 and the descent of her mother into dementia, a mother with whom she has had a bittersweet relationship. In between, she narrates attending RAADfest, a gathering of people into radical life extension, who are in revolt against aging and death. While Cain, like all of us would like to live longer, she doesn’t believe the pursuit of deathlessness will lead to peace and harmony, but rather the acceptance of mortality and walking together in it has the power to draw us together. She believes that the embrace of bittersweet is the way out of inherited trauma, when we face and embrace the pain in the lives of our forebears and live with gratitude for their resilience and the gifts they passed on to us.</span></p><span data-dcnode-id="2444" instrument_node="">
</span><p data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">I found myself reacting in several ways to this book. One was that I recognized a strength Susan Cain has is to name what is often an inchoate sense many of us have. While her “quiz” at the beginning of the book suggests some score higher on the bittersweet scale than others, anyone who has lived enough life, or even through a pandemic grasps this tension of sorrow and wonder, of longing and hope within which we live. Cain’s genius is to name it and give the lie to the American (and often Christian) focus on being happy.</span></p><span data-dcnode-id="2441" instrument_node="">
</span><p data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">Cain develops her ideas through a series of stories of travels around the world and interviews with a number of insightful people. She is a storyteller, and sometimes, it is hard to keep track of the larger story she is rendering for all the stories. Only in going back over the book for this review did I get any sense of the development of her ideas. With that, I also found the book somewhat repetitive as she makes again and again the point that bittersweet gives meaning, and creativity, love and union with others to our existence. It felt to some degree that this is the world she wanted to be so.</span></p><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2433"><span data-dcnode-id="2437" instrument_node="">Cain describes herself as moving from an agnosticism to something different, not exactly faith or belief in a particular conception of God. Yet it seems in the end, in an attempt to identify with universal human experience, all she can do is believe in the longing for something more. She quotes C. S. Lewis from </span><em data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Surprised by Joy</span></em><span data-dcnode-id="2434" instrument_node="">, noting that “we have hunger because we need to eat, we have thirst because we need to drink; so if we have an ‘inconsolable longing’ that can’t be satisfied in this world, it must be because we belong to another, godly one” (pp. 53-54). Yet Lewis found the fulfillment of his longing not in longing but in God.  I fear Cain’s argument is to embrace the hunger and the thirst, but not go on to where there is food and drink. I sense she believes that longing or bittersweet is its own satisfaction. I can’t help but wonder if there is a dark side to bittersweet not discussed here, the disillusionment and despair of a life of longing without finding. I found myself praying that she would find, and have the courage to accept, the “other” that she longs for.</span></p><span data-dcnode-id="2432" instrument_node="">
</span><div class="sharedaddy sd-like-enabled sd-sharing-enabled" data-dcnode-id="2341" id="jp-post-flair"><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="2409"><div class="robots-nocontent sd-block sd-social sd-social-icon-text sd-sharing" data-dcnode-id="2410"><h3 class="sd-title" data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="2411"><ul data-dcnode-id="2412" data-sharing-events-added="true"><li class="share-twitter" data-dcnode-id="2426"><a class="share-twitter sd-button share-icon" data-dcnode-id="2427" data-shared="sharing-twitter-47504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/28/review-bittersweet/%3Fshare%3Dtwitter%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Twitter"><span data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">Twitter</span></span></a></li><li class="share-facebook" data-dcnode-id="2422"><a class="share-facebook sd-button share-icon" data-dcnode-id="2423" data-shared="sharing-facebook-47504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/28/review-bittersweet/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">Facebook</span></span></a></li><li class="share-tumblr" data-dcnode-id="2418"><a class="share-tumblr sd-button share-icon" data-dcnode-id="2419" data-shared="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/28/review-bittersweet/%3Fshare%3Dtumblr%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Tumblr"><span data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Tumblr</span></span></a></li><li class="share-linkedin" data-dcnode-id="2414"><a </span><article class="post-47498 post type-post status-publish format-standard hentry category-on-books tag-apologetics tag-common-grace tag-tim-muehlhoff" data-dcnode-id="2211" id="post-47498"><span data-dcnode-id="2333" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2304"><span data-dcnode-id="2332" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2329"><a data-dcnode-id="2330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/27/review-eyes-to-see/" rel="bookmark"><span data-dcnode-id="2331" instrument_node="">Review: Eyes to&nbsp;See</span></a></h1><span data-dcnode-id="2328" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="2307"><span data-dcnode-id="2327" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2321"><a data-dcnode-id="2322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/27/review-eyes-to-see/" rel="bookmark"><time class="entry-date published" data-dcnode-id="2325" datetime="2022-04-27T07:00:00-04:00"><span data-dcnode-id="2326" instrument_node="">April 27, 2022</span></time><time class="updated" data-dcnode-id="2323" datetime="2022-04-26T22:02:10-04:00"><span data-dcnode-id="2324" instrument_node="">April 26, 2022</span></time></a></span><span class="byline" data-dcnode-id="2315"><span class="sep" data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node=""> / </span></span><span class="author vcard" data-dcnode-id="2316"><a class="url fn n" data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/author/rtrube54/"><span data-dcnode-id="2318" instrument_node="">rtrube54</span></a></span></span><span data-dcnode-id="2314" instrument_node=""> </span><span class="comments-link" data-dcnode-id="2309"><span class="sep" data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node=""> / </span></span><a data-dcnode-id="2310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/27/review-eyes-to-see/%23respond"><span data-dcnode-id="2311" instrument_node="">Leave a comment</span></a></span><span data-dcnode-id="2308" instrument_node="">
</span></div><span data-dcnode-id="2305" instrument_node="">
</span></header><span data-dcnode-id="2302" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2214"><span data-dcnode-id="2301" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2296"><span data-dcnode-id="2300" instrument_node="">
</span><figure class="aligncenter size-large" data-dcnode-id="2297"><a data-dcnode-id="2298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/eyes-to-see.jpg"><img alt="" class="wp-image-47499" data-attachment-id="47499" data-comments-opened="1" data-dcnode-id="2299" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="eyes-to-see" data-large-file="https://rtrube54.files.wordpress.com/2022/04/eyes-to-see.jpg?w=676" data-medium-file="https://rtrube54.files.wordpress.com/2022/04/eyes-to-see.jpg?w=300" data-orig-file="https://rtrube54.files.wordpress.com/2022/04/eyes-to-see.jpg" data-orig-size="960,720" data-permalink="https://bobonbooks.com/eyes-to-see/" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/eyes-to-see.jpg%3Fw%3D960&amp;raw" srcset="https://rtrube54.files.wordpress.com/2022/04/eyes-to-see.jpg 960w, https://rtrube54.files.wordpress.com/2022/04/eyes-to-see.jpg?w=150 150w, https://rtrube54.files.wordpress.com/2022/04/eyes-to-see.jpg?w=300 300w, https://rtrube54.files.wordpress.com/2022/04/eyes-to-see.jpg?w=768 768w"></a></figure></div><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2289"><em data-dcnode-id="2291"><a data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ivpress.com/eyes-to-see" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2294" instrument_node="">Eyes to See</span></a><span data-dcnode-id="2292" instrument_node="">, </span></em><span data-dcnode-id="2290" instrument_node="">Tim Muehlhoff (Foreword by J. P. Moreland). Downers Grove: InterVarsity Press, 2021.</span></p><span data-dcnode-id="2288" instrument_node="">
</span><p data-dcnode-id="2284"><em data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Summary: An exploration of how God acts in the ordinary elements of everyday life, the idea of common grace, and how we may be encouraged as we recognize these ways of God at work</span></em><span data-dcnode-id="2285" instrument_node="">.</span></p><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">When we think of the idea of God at work, we often look for the extraordinary, and we may wonder why we do not see more of that. Tim Muehlhoff believes in this extraordinary work, but he also wants to help us recognize the ordinary, yet beautiful ways God is at work in everyday life. Classically, this is the idea of common grace, the goodness God pours out on all creation: “He causes his sun to rise on the evil and the good, and sends rain on the righteous and the unrighteous” (Matthew 5:45).</span></p><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">Muehlhoff goes beyond the sun and the rain in exploring God’s everyday goodness. He begins with inventions and the instances when human beings arrived at similar solutions to problems, for example the stethoscope. He considers a number of human inventions, and while not arguing this as a proof for God, proposes that there are many instances of this hidden goodness meeting the needs of the world.</span></p><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">In subsequent chapters he turns to different realms in which we see this goodness. In science, we understand the incredible fine-tuning of the universe and our particular location on earth that makes life possible, and also the wonderful breakthroughs to sustain life, such as the accidental discovery of penicillin and the developments of antibiotics and vaccines to complement our amazing immune systems.  He calls our attention to the power of art to help us recognize both providence and fallenness in our world when we are otherwise oblivious to it. He weighs the power of words and communication not only to hurt but to heal and illumine with quotes from Hinduism, Buddha, Muhammad, Confucius, Luther Standing Bear, and even atheist Sam Harris. He does not shrink from addressing the horror of war and even discusses Israel’s war against the Canaanites, drawing on the work of Paul Copan. He observes strong tradition of just war, the Geneva Conventions, and the beginnings of the Red Cross. Amid evil, goodness remains and eventually triumphs.</span></p><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Throughout the book, he addresses objections and comes back to this in the final chapter, preceding his epilogue. He addresses:</span></p><span data-dcnode-id="2271" instrument_node="">
</span><ul data-dcnode-id="2262"><li data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">Is everything common grace?</span></li><li data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">How can we know for sure?</span></li><li data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">Why doesn’t God act sooner?</span></li><li data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">Does common grace limit God’s activity?</span></li></ul><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Muehlhoff offers a discussion that is concise, carefully reasoned and illustrated with numerous examples from contemporary culture. He concludes the book with the hope that knowing God’s abundant work in everyday life will cause us to “see the world with wonder as we encounter good gifts daily” and fill our mouths with telling the deeds of this God.</span></p><span data-dcnode-id="2258" instrument_node="">

</span><header class="entry-header" data-dcnode-id="2179"><span data-dcnode-id="2207" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2204"><a data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/26/review-parable-of-the-talents/" rel="bookmark"><span data-dcnode-id="2206" instrument_node="">Review: Parable of the&nbsp;Talents</span></a></h1><span data-dcnode-id="2203" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="2182"><span data-dcnode-id="2202" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2196"><a data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/26/review-parable-of-the-talents/" rel="bookmark"><time class="entry-date published" data-dcnode-id="2200" datetime="2022-04-26T07:00:00-04:00"><span data-dcnode-id="2201" instrument_node="">April 26, 2022</span></time><time class="updated" data-dcnode-id="2198" datetime="2022-04-25T18:49:56-04:00"><span data-dcnode-id="2199" instrument_node="">April 25, 2022</span></time></a></span><span class="byline" data-dcnode-id="2190"><span class="sep" data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node=""> / </span></span><span class="author vcard" data-dcnode-id="2191"><a class="url fn n" data-dcnode-id="2192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/author/rtrube54/"><span data-dcnode-id="2193" instrument_node="">rtrube54</span></a></span></span><span data-dcnode-id="2189" instrument_node=""> </span><span class="comments-link" data-dcnode-id="2184"><span class="sep" data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node=""> / </span></span><a data-dcnode-id="2185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/26/review-parable-of-the-talents/%23respond"><span data-dcnode-id="2186" instrument_node="">Leave a comment</span></a></span><span data-dcnode-id="2183" instrument_node="">

</span><div class="entry-content" data-dcnode-id="2094"><span data-dcnode-id="2176" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2171"><span data-dcnode-id="2175" instrument_node="">
</span><figure class="aligncenter size-large" data-dcnode-id="2172"><a data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/parable-of-the-talents.jpg"><img alt="" class="wp-image-47495" data-attachment-id="47495" data-comments-opened="1" data-dcnode-id="2174" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="parable-of-the-talents" data-large-file="https://rtrube54.files.wordpress.com/2022/04/parable-of-the-talents.jpg?w=676" data-medium-file="https://rtrube54.files.wordpress.com/2022/04/parable-of-the-talents.jpg?w=300" data-orig-file="https://rtrube54.files.wordpress.com/2022/04/parable-of-the-talents.jpg" data-orig-size="960,720" data-permalink="https://bobonbooks.com/parable-of-the-talents/" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/parable-of-the-talents.jpg%3Fw%3D960&amp;raw" srcset="https://rtrube54.files.wordpress.com/2022/04/parable-of-the-talents.jpg 960w, https://rtrube54.files.wordpress.com/2022/04/parable-of-the-talents.jpg?w=150 150w, https://rtrube54.files.wordpress.com/2022/04/parable-of-the-talents.jpg?w=300 300w, https://rtrube54.files.wordpress.com/2022/04/parable-of-the-talents.jpg?w=768 768w"></a></figure></div><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2164"><em data-dcnode-id="2166"><a data-dcnode-id="2168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openroadmedia.com/ebook/parable-of-the-talents/9781453263624" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2169" instrument_node="">Parable of the Talents</span></a><span data-dcnode-id="2167" instrument_node=""> </span></em><span data-dcnode-id="2165" instrument_node="">(Earthseed #2), Octavia E. Butler. New York: Open Road Media, 2012 (first published in 1998).</span></p><span data-dcnode-id="2163" instrument_node="">
</span><p data-dcnode-id="2160"><em data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Summary: The growth and heartbreaking destruction of Acorn, the Earthseed community founded by Lauren Olamina, and how Earthseed rose from the ashes.</span></em></p><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2151"><span data-dcnode-id="2158" instrument_node="">In </span><em data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">Parable of the Sower</span></em><span data-dcnode-id="2155" instrument_node=""> (</span><a data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2020/04/03/review-parable-of-the-sower/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2154" instrument_node="">review</span></a><span data-dcnode-id="2152" instrument_node="">) Octavia Butler creates a leader, Lauren Olamina, of a new religious movement in a dystopian America, and describes how she gathers a band of refugees into Acorn, a community formed around the principles of Earthseed. This work continues that story through the narration of Lauren’s daughter, who eventually, with the help of her uncle found her mother’s religious writings and journals, after being abducted as an infant by the extremist wing of a Christian nationalist group.</span></p><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">The chapters of the book begin with an Earthseed verse, then a section in bold print by daughter Asha Vere (born Larkin) followed by journal entries of Lauren that tell the story of the growth and heart-breaking destruction of Acorn, and what followed. Acorn was the place where Lauren and her husband Bankole built a community of refugees on his land and formulated the teachings of Earthseed, gradually drawing convinced adherents. Everyone worked and contributed, children were taught, and products of quality were sold in neighboring towns. She began to think about how they could send people out to teach Earthseed elsewhere. Amid this, the child they hoped for so long was born, who they named Larkin.</span></p><span data-dcnode-id="2147" instrument_node="">
</span><p data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">Meanwhile, Christian America, a church-based nationalist movement with political aspirations gained increasing sway in a country that wasn’t working. They brought order, housed the homeless, and their leader, Jarrett, became president on a platform of restoring American greatness by cleansing the country of all “heathen” beliefs. Her half-brother Marcos, rescued from slavers, refuses to join Earthseed, drawn by Christian America and his desire to preach. Bankole sees what is happening and wants to take Lauren and Larkin to a quiet town. Lauren refuses, convinced of the truth of Earthseed and the potential of a movement that would eventually take the human race to the stars. </span></p><span data-dcnode-id="2144" instrument_node="">
</span><p data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Until, that is, the Crusaders, a radical arm of Christian America come, seize Acorn, imprisoning the men and women separately, and taking all the children away, placing them with adoptive parents, including Larkin. The adults were all “collared” with electronic collars. Bankole dies during the attack as does Olamina’s close childhood friend Zahra. They are supposedly being “re-educated” but no one succeeds in being released. Women are assaulted by their Christian captors and expected to be submissive.</span></p><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">How they escaped, overcoming their captors, and how Earthseed arose out of the ashes occupies the later part of the book. It comes down to Lauren’s “talents,” her abilities to lead and persuade people to follow, not blindly, but willingly. It also has to do with her “magnificent obsession” that she pursues, even when her brother won’t follow, or face the evils Christian America had perpetrated. Likewise, she seeks her daughter for years, but ironically, it is Marcos who finds her, misleads her about her mother and educates her, showing her love her adoptive family never did and her mother never could.</span></p><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">There is so much here. Butler presciently anticipates the Christian nationalism and demagoguery of our own day and its appeal, as well as the xenophobia of anything that is “other” and the subjugation of women. That is chilling. Equally interesting is her exploration of what it means to be a founder of a religious group, to know to the core of one’s being that a revelation is true, and how one cannot do other than pursue what one knows in one’s being is true. Persecution, the loss of family, and arduous work are all part of it, but also the forming of a community of the convinced.</span></p><span data-dcnode-id="2135" instrument_node="">
</span><p data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">Butler is a compelling but uneasy read. There are brutal and heartbreaking passages, but also much to provoke thought. In a sense, these books might also be parables that might come with the words of the greatest parable-teller, “Let the one who has ears, hear.”</span></p><span data-dcnode-id="2132" instrument_node="">
</span><div class="sharedaddy sd-like-enabled sd-sharing-enabled" data-dcnode-id="2096" id="jp-post-flair"><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="2109"><div class="robots-nocontent sd-block sd-social sd-social-icon-text sd-sharing" data-dcnode-id="2110"><h3 class="sd-title" data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="2111"><ul data-dcnode-id="2112" data-sharing-events-added="true"><li class="share-twitter" data-dcnode-id="2126"><a class="share-twitter sd-button share-icon" data-dcnode-id="2127" data-shared="sharing-twitter-47494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/26/review-parable-of-the-talents/%3Fshare%3Dtwitter%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Twitter"><span data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Twitter</span></span></a></li><li class="share-facebook" data-dcnode-id="2122"><a class="share-facebook sd-button share-icon" data-dcnode-id="2123" data-shared="sharing-facebook-47494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/26/review-parable-of-the-talents/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Facebook</span></span></a></li><li class="share-tumblr" data-dcnode-id="2118"><a class="share-tumblr sd-button share-icon" data-dcnode-id="2119" data-shared="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/26/review-parable-of-the-talents/%3Fshare%3Dtumblr%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Tumblr"><span data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Tumblr</span></span></a></li><li class="share-li </span><div class="entry-content" data-dcnode-id="1960"><span data-dcnode-id="2056" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2053"><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/the-gap-decade.jpg"><img alt="" class="wp-image-47489" data-attachment-id="47489" data-comments-opened="1" data-dcnode-id="2055" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="the-gap-decade" data-large-file="https://rtrube54.files.wordpress.com/2022/04/the-gap-decade.jpg?w=676" data-medium-file="https://rtrube54.files.wordpress.com/2022/04/the-gap-decade.jpg?w=300" data-orig-file="https://rtrube54.files.wordpress.com/2022/04/the-gap-decade.jpg" data-orig-size="960,720" data-permalink="https://bobonbooks.com/the-gap-decade/" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/the-gap-decade.jpg%3Fw%3D960&amp;raw" srcset="https://rtrube54.files.wordpress.com/2022/04/the-gap-decade.jpg 960w, https://rtrube54.files.wordpress.com/2022/04/the-gap-decade.jpg?w=150 150w, https://rtrube54.files.wordpress.com/2022/04/the-gap-decade.jpg?w=300 300w, https://rtrube54.files.wordpress.com/2022/04/the-gap-decade.jpg?w=768 768w"></a></figure><span data-dcnode-id="2052" instrument_node="">
</span><p data-dcnode-id="2046"><em data-dcnode-id="2048"><a data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ivpress.com/the-gap-decade" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2051" instrument_node="">The Gap Decade</span></a><span data-dcnode-id="2049" instrument_node="">, </span></em><span data-dcnode-id="2047" instrument_node="">Katie Schnack. Downers Grove: InterVarsity Press, 2021.</span></p><span data-dcnode-id="2045" instrument_node="">
</span><p data-dcnode-id="2042"><em data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">Summary: A first-person account of navigating the decade of one’s twenties, the transition from adolescence to adulthood.</span></em></p><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">I first noticed the idea of this book in my work with grad students. They were living on their own, most were working while pursuing grad studies, they had cars, health insurance, paid taxes, and in some cases were married or had even started families. They looked like adults and I thought of them that way. Yet they did not yet feel they were “adults.” Perhaps part was that they saw themselves as “still going to school.” They described some of the things I’ve mentioned in the preceding sentences as “adulting” which suggests a kind of rehearsal for adulthood. I came to discover that this is descriptive of many in their twenties. </span></p><span data-dcnode-id="2038" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2037" instrument_node="">Katie Schnack captures this in her book, </span><em data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">The Gap Decade. </span></em><span data-dcnode-id="2034" instrument_node="">The title comes from the idea of a “gap year,” which many take before or after college as a kind of transition. Schnack suggests that the gap decade isn’t a choice, but a host of transitions “that the universe just dumps in your lap” that come with a ton of emotions from loneliness or even depression to exhilaration and joy and intimacy. </span></p><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">In an informal and quirky style, Schnack describes her own journey through the transitions of this decade. One is the finding of new friends in the places where one moves. Another is the waiting (sometimes literally at tables) one does on the way to find the work one wants to do. Then there is the work (or #werk) and the crazy things that happen like the boss who up and quit, throwing her stapler across the office (how not to quit). She describes a couple years in Austin where she learned to “embrace the stuck” while her husband completed an MFA program. </span></p><span data-dcnode-id="2029" instrument_node="">
</span><p data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">Working on taxes taught her and her husband how to make the hard things like doing taxes more endurable–snacks and pizza with champagne afterwards made it easier–and learned to apply that lesson to other hard things, like Tuesdays. She writes about finding the balance between tidy (which she is not) and good enough, and between taking care of oneself and enjoying one’s body, and going crazy in some exercise program. She describes the new appreciation of her home in Minnesota after living in other places, including knowing how to bait a fishhook and de-ice a windshield. It also means accepting change–that Christmas celebrations, even with family are different than childhood.</span></p><span data-dcnode-id="2026" instrument_node="">
</span><p data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Living in a tiny apartment where both worked from home in New York exposed all their shortcomings, the grace and self-forgiveness they needed to practice, as well as some good life hacks–and the value of a bigger place to live. Like many couples starting out (especially during the recession that began in 2009), finances were tight and lean into their faith:</span></p><span data-dcnode-id="2023" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="2017"><p data-dcnode-id="2018"><span data-dcnode-id="2022" instrument_node="">“When all my go-to comforts are stripped from me–a sense of physical and financial security, an understanding of what outcomes I can expect, my tangible needs and emotional needs being met–I have learned just to lean </span><em data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">hard</span></em><span data-dcnode-id="2019" instrument_node=""> on God, with the expectation he will show up with enough to get me through. How? Just by the good ol’ “cry out to God” method because sometimes that is all we have to offer” (p. 124).</span></p></blockquote><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Another move, this time to Memphis led to a mental health crisis as Katie went through profound depression. She speaks candidly of the stigmas that still exist in the Christian community around mental health–particularly the stigma that one should not need medication. And she writes about the transformative experience of going to a therapist (not a Christian), an elderly woman with an eye problem who she dubs “Dr. Magic Wizard.” She finally was able to process the death of her closest college friend.</span></p><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">The concluding part of the book describes her and her husband’s journey into becoming parents–the deep grief of a miscarriage, carrying and birthing her daughter, and that as a mom it is still OK–or not–to wear a bikini. You can even survive showing up to register your daughter for daycare with a stray piece of pink underwear hanging out the back of your shorts, that you discover only after you leave.</span></p><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">Schnack is real, vulnerable, and funny. She lets you know you are not the only one to go through all of this stuff–a lot of people are. She describes a life of learning that she doesn’t have to have it all together. She tells stories of leaning into her faith in all sorts of practical ways–God shows up and she keeps showing up. The book ends with her turning thirty–far from flawless but also marveling how far she has come.</span></p><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">This is an encouraging book. I enjoyed the quirky writing style as well as the skill of weaving a number of “adulting” transitions into her narrative. This is a great book if you are wondering if you are the “only one” or know someone who is.</span></p><span data-dcnode-id="2004" instrument_node="">
</span><p data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">____________________________</span></p><span data-dcnode-id="2001" instrument_node="">
</span><p data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">Disclosure of Material Connection: I received a complimentary review copy of this book from the publisher in exchange for an honest review. The opinions I have expressed are my own.</span></p><span data-dcnode-id="1998" instrument_node="">
</span><div class="sharedaddy sd-like-enabled sd-sharing-enabled" data-dcnode-id="1962" id="jp-post-flair"><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="1975"><div class="robots-nocontent sd-block sd-social sd-social-icon-text sd-sharing" data-dcnode-id="1976"><h3 class="sd-title" data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="1977"><ul data-dcnode-id="1978" data-sharing-events-added="true"><li class="share-twitter" data-dcnode-id="1992"><a class="share-twitter sd-button share-icon" data-dcnode-id="1993" data-shared="sharing-twitter-47488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/25/review-the-gap-decade/%3Fshare%3Dtwitter%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Twitter"><span data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">Twitter</span></span></a></li><li class="share-facebook" data-dcnode-id="1988"><a class="share-facebook sd-button share-icon" data-dcnode-id="1989" data-shared="sharing-facebook-47488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/25/review-the-gap-decade/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Facebook</span></span></a></li><li class="share-tumblr" data-dcnode-id="1984"><a class="share-tumblr sd-button share-icon" data-dcnode-id="1985" data-shared="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/25/review-the-gap-decade/%3Fshare%3Dtumblr%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Tumblr"><span data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">Tumblr</span></span></a></li><li class="share-linkedin" data-dcnode-id=" </span><article class="post-47482 post type-post status-publish format-standard hentry category-on-youngstown tag-chaney-high-school tag-hubert-h-humphrey tag-working-class tag-youngstown tag-youngstown-events" data-dcnode-id="1818" id="post-47482"><span data-dcnode-id="1954" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1925"><span data-dcnode-id="1953" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1950"><a data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/23/growing-up-in-working-class-youngstown-hubert-h-humphrey-at-chaney-high-school/" rel="bookmark"><span data-dcnode-id="1952" instrument_node="">Growing Up in Working Class Youngstown — Hubert H. Humphrey at Chaney High&nbsp;School</span></a></h1><span data-dcnode-id="1949" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1928"><span data-dcnode-id="1948" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1942"><a data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/23/growing-up-in-working-class-youngstown-hubert-h-humphrey-at-chaney-high-school/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1946" datetime="2022-04-23T07:00:00-04:00"><span data-dcnode-id="1947" instrument_node="">April 23, 2022</span></time><time class="updated" data-dcnode-id="1944" datetime="2022-04-22T20:25:28-04:00"><span data-dcnode-id="1945" instrument_node="">April 22, 2022</span></time></a></span><span class="byline" data-dcnode-id="1936"><span class="sep" data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node=""> / </span></span><span class="author vcard" data-dcnode-id="1937"><a class="url fn n" data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/author/rtrube54/"><span data-dcnode-id="1939" instrument_node="">rtrube54</span></a></span></span><span data-dcnode-id="1935" instrument_node=""> </span><span class="comments-link" data-dcnode-id="1930"><span class="sep" data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node=""> / </span></span><a data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/23/growing-up-in-working-class-youngstown-hubert-h-humphrey-at-chaney-high-school/%23comments"><span data-dcnode-id="1932" instrument_node="">2 Comments</span></a></span><span data-dcnode-id="1929" instrument_node="">
</span></div><span data-dcnode-id="1926" instrument_node="">
</span></header><span data-dcnode-id="1923" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1821"><span data-dcnode-id="1922" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1912"><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/hubert-humphrey-at-chaney-high-school.jpg"><img alt="" class="wp-image-47483" data-attachment-id="47483" data-comments-opened="1" data-dcnode-id="1921" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="hubert-humphrey-at-chaney-high-school" data-large-file="https://rtrube54.files.wordpress.com/2022/04/hubert-humphrey-at-chaney-high-school.jpg?w=676" data-medium-file="https://rtrube54.files.wordpress.com/2022/04/hubert-humphrey-at-chaney-high-school.jpg?w=300" data-orig-file="https://rtrube54.files.wordpress.com/2022/04/hubert-humphrey-at-chaney-high-school.jpg" data-orig-size="960,720" data-permalink="https://bobonbooks.com/hubert-humphrey-at-chaney-high-school/" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/hubert-humphrey-at-chaney-high-school.jpg%3Fw%3D960&amp;raw" srcset="https://rtrube54.files.wordpress.com/2022/04/hubert-humphrey-at-chaney-high-school.jpg 960w, https://rtrube54.files.wordpress.com/2022/04/hubert-humphrey-at-chaney-high-school.jpg?w=150 150w, https://rtrube54.files.wordpress.com/2022/04/hubert-humphrey-at-chaney-high-school.jpg?w=300 300w, https://rtrube54.files.wordpress.com/2022/04/hubert-humphrey-at-chaney-high-school.jpg?w=768 768w"></a><figcaption data-dcnode-id="1913"><span data-dcnode-id="1919" instrument_node="">Hubert Humphrey with Chaney High School students in background. </span><em data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Youngstown Vindicator, </span></em><span data-dcnode-id="1916" instrument_node="">April 27, 1972 via </span><a data-dcnode-id="1914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.google.com/newspapers%3Fnid%3Dpqgf-8x9CmQC%26dat%3D19720427%26printsec%3Dfrontpage%26hl%3Den" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1915" instrument_node="">Google News Archive</span></a></figcaption></figure><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">[This post recalls a personal experience of the visit of a presidential candidate fifty years ago this week. It is meant to remember a Youngstown event at which I was present, not to invite a political discussion. Please refrain from political comments and debates.]</span></p><span data-dcnode-id="1908" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">I cannot identify myself in this picture, but I was in this crowd. It was Thursday, April 27, 1972. Hubert H. Humphrey was in the thick of a primary campaign for the presidency running against Edmund Muskie, who withdrew from the campaign that day, and a field of other Democrats that included George McGovern, Alabama governor George Wallace, Washington Senator Henry “Scoop” Jackson, and Representative Shirley Chisolm, from New York. They were running for the nomination to oppose Richard Nixon, running for his second term. Humphrey had lost to Nixon in 1968, after the disastrous Democrat National Convention in Chicago.</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">In a few months, I would be old enough to register for the draft and vote in my first election. It was the spring of my senior year, and so the chance to get out of class, out of the building, and to hear someone I might be voting for was a draw. It was for roughly 1400 of us out of a crowd of 2000 who watched as Humphrey landed by helicopter and then mounted a truck bed that served as his speaker platform.</span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1901" instrument_node="">Principal John Maluso, who passed just this year (2022), welcomed him. Then a classmate, John Jovich, chairman of the Chaney Political Speakers Bureau, introduced him. After fifty years, I do not remember what Humphrey said and so am relying on the </span><em data-dcnode-id="1897"><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.google.com/newspapers%3Fnid%3Dpqgf-8x9CmQC%26dat%3D19720427%26printsec%3Dfrontpage%26hl%3Den" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1900" instrument_node="">Vindicator</span></a><span data-dcnode-id="1898" instrument_node=""> </span></em><span data-dcnode-id="1896" instrument_node="">account said.</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">He began by a promise designed to win our hearts, to create a cabinet level department of youth affairs. His argument was that “if they are old enough to vote and to serve in the armed forces they are mature enough to hold positions of responsibility.” Remember this was just two years after Kent State and all the demonstrations against the war in Vietnam.</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">He argued for releasing funds for a number of government projects that would create jobs and finance education. He argued that if we rebuilt Europe in World War II, we ought to rebuild America’s cities, as he helped to do in Minneapolis. Like almost every candidate ever, he argued for tax reform. Perhaps more controversial for the time, he favored amnesty for “draft dodgers” who fled to Canada, in exchange for some form of Peace Corps-like service to the country. While he opposed legalization of marijuana, he favored decriminalizing its use (yes, people argued this in 1972). He contended that President Nixon had not gone far enough in withdrawing from Vietnam.</span></p><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Humphrey was just coming off a primary victory in Pennsylvania and would go on to win the primary election in Ohio, and actually won more votes in the primaries than Senator McGovern, but McGovern carried the key state of California in a closely contested election to win the nomination. As it turned out, he wouldn’t be running for a second time against Richard Nixon, who won the general election in 1972 only to resign office in 1974.</span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Still, I am glad I got to see him. He rose from mayor of Minneapolis to the U.S. Senate in 1948, running on a civil rights platform when this was extremely unpopular. He actually was the first to propose legislation to create the Peace Corps in 1957, later accomplished by President Kennedy, and he led the effort to pass the Civil Rights Act in 1964 before becoming Lyndon Johnson’s Vice President. His close association with Johnson’s unpopularity over Vietnam hurt his own political chances. Having failed in his first presidential bid, he returned to the Senate in 1971 where he held his seat until his death in 1978.</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1881" instrument_node="">He was respected by political leaders of both parties and honored in death by former presidents Nixon and Ford, as well as President Carter. He was described as “a happy warrior” who fought for what he believed, but not with vitriol but with a smile. Bill Moyers </span><a data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//billmoyers.com/1988/06/23/the-happy-warrior-june-23-1998/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1880" instrument_node="">wrote</span></a><span data-dcnode-id="1878" instrument_node=""> this of him, based on an interview with him in 1976:</span></p><span data-dcnode-id="1876" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1873"><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">He was called “The Happy Warrior” because he loved politics and because of his natural ebullience and resiliency. I asked him: “Some people say you’re too happy and that this is not a happy world.” He replied: “Well, maybe I can make it a little more happy…I realize and sense the realities of the world in which we live. I’m not at all happy about what I see in the nuclear arms race…and the machinations of the Soviets or the Chinese…the misery that’s in our cities. I’m aware of all that. But I do not believe that people will respond to do better if they are constantly approached by a negative attitude. People have to believe that they can do better. They’ve got to know that there’s somebody that’s with them that wants to help and work with them, and somebody that hasn’t tossed in the towel. I don’t believe in defeat, Bill.”</span></p></blockquote><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">This is the man I saw on a truck bed in back of my high school four years earlier. He is rarely mentioned today and yet he defines for me the ideal of public service in public office. I’m glad I was there.</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1860"><em data-dcnode-id="1864"><span data-dcnode-id="1868" instrument_node="">To read other posts in the Growing Up in Working Class Youngstown series, just click “</span><a data-dcnode-id="1866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/category/on-youngstown/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1867" instrument_node="">On Youngstown</span></a><span data-dcnode-id="1865" instrument_node="">.”</span></em><span data-dcnode-id="1863" instrument_node="">&nbsp;</span><em data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Enjoy!</span></em></p><span data-dcnode-id="1859" instrument_node="">

</span><header class="entry-header" data-dcnode-id="1786"><span data-dcnode-id="1814" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1811"><a data-dcnode-id="1812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/22/review-the-pleasures-of-reading-in-an-age-of-distraction/" rel="bookmark"><span data-dcnode-id="1813" instrument_node="">Review: The Pleasures of Reading in an Age of&nbsp;Distraction</span></a></h1><span data-dcnode-id="1810" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1789"><span data-dcnode-id="1809" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1803"><a data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/22/review-the-pleasures-of-reading-in-an-age-of-distraction/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1807" datetime="2022-04-22T07:00:00-04:00"><span data-dcnode-id="1808" instrument_node="">April 22, 2022</span></time><time class="updated" data-dcnode-id="1805" datetime="2022-04-21T20:10:17-04:00"><span data-dcnode-id="1806" instrument_node="">April 21, 2022</span></time></a></span><span class="byline" data-dcnode-id="1797"><span class="sep" data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node=""> / </span></span><span class="author vcard" data-dcnode-id="1798"><a class="url fn n" data-dcnode-id="1799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/author/rtrube54/"><span data-dcnode-id="1800" instrument_node="">rtrube54</span></a></span></span><span data-dcnode-id="1796" instrument_node=""> </span><span class="comments-link" data-dcnode-id="1791"><span class="sep" data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node=""> / </span></span><a data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/22/review-the-pleasures-of-reading-in-an-age-of-distraction/%23comments"><span data-dcnode-id="1793" instrument_node="">2 Comments</span></a></span><span data-dcnode-id="1790" instrument_node="">
</span></div><span data-dcnode-id="1787" instrument_node="">
</span></header><span data-dcnode-id="1784" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1687"><span data-dcnode-id="1783" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1778"><span data-dcnode-id="1782" instrument_node="">
</span><figure class="aligncenter size-large" data-dcnode-id="1779"><a data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/the-pleasures-of-reading-in-an-age-of-distraction.jpg"><img alt="" class="wp-image-47479" data-attachment-id="47479" data-comments-opened="1" data-dcnode-id="1781" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="the-pleasures-of-reading-in-an-age-of-distraction" data-large-file="https://rtrube54.files.wordpress.com/2022/04/the-pleasures-of-reading-in-an-age-of-distraction.jpg?w=676" data-medium-file="https://rtrube54.files.wordpress.com/2022/04/the-pleasures-of-reading-in-an-age-of-distraction.jpg?w=300" data-orig-file="https://rtrube54.files.wordpress.com/2022/04/the-pleasures-of-reading-in-an-age-of-distraction.jpg" data-orig-size="960,720" data-permalink="https://bobonbooks.com/the-pleasures-of-reading-in-an-age-of-distraction/" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rtrube54.files.wordpress.com/2022/04/the-pleasures-of-reading-in-an-age-of-distraction.jpg%3Fw%3D960&amp;raw" srcset="https://rtrube54.files.wordpress.com/2022/04/the-pleasures-of-reading-in-an-age-of-distraction.jpg 960w, https://rtrube54.files.wordpress.com/2022/04/the-pleasures-of-reading-in-an-age-of-distraction.jpg?w=150 150w, https://rtrube54.files.wordpress.com/2022/04/the-pleasures-of-reading-in-an-age-of-distraction.jpg?w=300 300w, https://rtrube54.files.wordpress.com/2022/04/the-pleasures-of-reading-in-an-age-of-distraction.jpg?w=768 768w"></a></figure></div><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1771"><em data-dcnode-id="1773"><a data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//global.oup.com/academic/product/the-pleasures-of-reading-in-an-age-of-distraction-9780199747498%3Fcc%3Dus%26lang%3Den%26" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1776" instrument_node="">The Pleasures of Reading in an Age of Distraction</span></a><span data-dcnode-id="1774" instrument_node="">, </span></em><span data-dcnode-id="1772" instrument_node="">Alan Jacobs. New York: Oxford University Press, 2011.</span></p><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1767"><em data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Summary: An argument that we should read what we delight in rather than what others think is “good” for us.</span></em></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Alan Jacobs is not among the prophets of reading doom. He believes we should actually read what we want to rather than following prescribed lists of “great” books that we ought to read. He argues that the most important reason for reading is that it is pleasurable rather than it being “good” for us:</span></p><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1759"><em data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">“So this is what I say to my petitioners: for heaven’ sake, don’t turn reading into the intellectual equivalent of eating organic greens, (or shifting the metaphor slightly) some fearfully disciplined appointment with an elliptical trainer of the mind in which you count words or pages the way some people fix their attention on the ‘calories burned’ readout…” </span></em><span data-dcnode-id="1760" instrument_node="">(p. 17).</span></p><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1747"><span data-dcnode-id="1757" instrument_node="">He proposes that we read “at whim,” that is, we read books when we are ready for them. That doesn’t mean we don’t read the great books. It means we don’t read them </span><em data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">too soon</span></em><span data-dcnode-id="1754" instrument_node="">. He also suggests that when we find works we like and wonder what else to read, that rather than reading books inspired by those books, we read </span><em data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">upstream</span></em><span data-dcnode-id="1751" instrument_node="">–that is, we read the books that preceded and inspired them. If we liked Tolkien, we should read </span><em data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Beowulf</span></em><span data-dcnode-id="1748" instrument_node="">, a recommendation I agree with, especially if it is Seamus Heaney’s rendering! Now a more challenging one is his suggestion that, if we like Jane Austen, we read Hume, as many of her ideas come from him–but only under the sign of Whim.</span></p><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Jacobs argues that one of the pleasures of reading is responding to the author and he describes the ways readers annotate their works and the value of this (he uses a mechanical pencil for precise underlines and sharpness of notes). Against those who worry that this will slow them down, he challenges the cult of page and book counts, contending that it is what, and not how much we read, that matters. He argues that many books become more boring the faster we read them, and that we ought to allow ourselves time to re-read, because we often miss much in our first readings.</span></p><span data-dcnode-id="1743" instrument_node="">
</span><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Against those who complain of diminishing attention in an internet age, Jacobs contends that the thing that helped him most was getting a Kindle–it kept him reading, it promoted linearity, and allowed him to concentrate for a long time. Unlike reading on a computer or tablet, there are no notifications and no distractions or temptation to multi-task.</span></p><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1739" instrument_node="">This takes Jacobs into a discussion of attentiveness and he introduces us to Hugh of St. Victor and the counsel of the </span><em data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Didascalion. </span></em><span data-dcnode-id="1736" instrument_node="">He advises reading what we can, moving step by step, first cogitating and then meditating on the text, ruminating on it as a ruminant does its food. He contends that we need both the skills of skimming and deep and long attention, depending on the material and our reasons for engaging it.</span></p><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Against those who want to turn libraries into chat-filled cafes, he argues that silence is often difficult to find, especially for the impoverished, who cannot afford the space. Libraries, or at least reading rooms, can be a place to preserve that. Against the contention that reading is solitary, he observes all the interactive possibilities from our engagement with the author to classrooms to book groups.</span></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">He concludes where he began, with the idea of serendip. Very little of our reading journey may be planned, though it may be cultivated, whether through Amazon recommendations, or the discoveries on the shelves of a bookstore or library. While pleasurable reading involves attention and the elimination of distraction, it should not be shaped by the shame or guilt of what one should read.</span></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Like the author, I’ve been tempted at points by reading plans, and still wrestle, as a reviewer, with reading too fast, sometimes robbing myself of the enjoyment of a book. I no longer worry about reading plans, and usually have one book going that I just read for enjoyment. This was one such book, and I would recommend it for any who remember loving books, but for one reason or another struggle to read or get caught up in the tyranny of “should.”</span></p><span data-dcnode-id="1725" instrument_node="">
</span><div class="sharedaddy sd-like-enabled sd-sharing-enabled" data-dcnode-id="1689" id="jp-post-flair"><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="1702"><div class="robots-nocontent sd-block sd-social sd-social-icon-text sd-sharing" data-dcnode-id="1703"><h3 class="sd-title" data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="1704"><ul data-dcnode-id="1705" data-sharing-events-added="true"><li class="share-twitter" data-dcnode-id="1719"><a class="share-twitter sd-button share-icon" data-dcnode-id="1720" data-shared="sharing-twitter-47478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/22/review-the-pleasures-of-reading-in-an-age-of-distraction/%3Fshare%3Dtwitter%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Twitter"><span data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Twitter</span></span></a></li><li class="share-facebook" data-dcnode-id="1715"><a class="share-facebook sd-button share-icon" data-dcnode-id="1716" data-shared="sharing-facebook-47478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/22/review-the-pleasures-of-reading-in-an-age-of-distraction/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Facebook</span></span></a></li><li class="share-tumblr" data-dcnode-id="1711"><a class="share-tumblr sd-button share-icon" data-dcnode-id="1712" data-shared="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bobonbooks.com/2022/04/22/review-the-pleasures-of-reading-in-an-age-of-distraction/%3Fshare%3Dtumblr%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Tumblr"><span data-dcnode-id="1713"><span data-dcn
