</span><div class="a-expander-collapsed-height a-row a-expander-container a-spacing-base a-expander-partial-collapse-container" data-a-expander-collapsed-height="140" data-a-expander-name="book_description_expander" data-dcnode-id="3683" style="max-height: none; height: 140px;"><span data-dcnode-id="3750" instrument_node=""> </span><div aria-expanded="false" class="a-expander-content a-expander-partial-collapse-content" data-dcnode-id="3692" style="padding-bottom: 20px;"><span data-dcnode-id="3749" instrument_node=""> </span><span class="a-text-bold" data-dcnode-id="3747"><span data-dcnode-id="3748" instrument_node="">Pulitzer Prize–winning historian Barbara W. Tuchman, author of the World War I masterpiece </span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">The Guns of August,</span></span><span class="a-text-bold" data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node=""> grapples with her boldest subject: the pervasive presence, through the ages, of failure, mismanagement, and delusion in government. </span></span><span data-dcnode-id="3740"><br data-dcnode-id="3742"><span data-dcnode-id="3741" instrument_node=""> </span></span><span class="a-text-bold" data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">&nbsp;</span></span><span data-dcnode-id="3735"><br data-dcnode-id="3737"><span data-dcnode-id="3736" instrument_node=""> Drawing on a comprehensive array of examples, from Montezuma’s senseless surrender of his empire in 1520 to Japan’s attack on Pearl Harbor, Barbara W. Tuchman defines folly as the pursuit by government of policies contrary to their own interests, despite the availability of feasible alternatives. In brilliant detail, Tuchman illuminates four decisive turning points in history that illustrate the very heights of folly: the Trojan War, the breakup of the Holy See provoked by the Renaissance popes, the loss of the American colonies by Britain’s George III, and the United States’ own persistent mistakes in Vietnam. Throughout </span></span><span class="a-text-italic" data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">The March of Folly,</span></span><span data-dcnode-id="3727"><span data-dcnode-id="3732" instrument_node=""> Tuchman’s incomparable talent for animating the people, places, and events of history is on spectacular display.</span><br data-dcnode-id="3731"><span data-dcnode-id="3730" instrument_node=""> &nbsp;</span><br data-dcnode-id="3729"><span data-dcnode-id="3728" instrument_node=""> </span></span><span class="a-text-bold" data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">Praise for </span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">The March of Folly</span></span><span data-dcnode-id="3718"><br data-dcnode-id="3722"><span data-dcnode-id="3721" instrument_node=""> &nbsp;</span><br data-dcnode-id="3720"><span data-dcnode-id="3719" instrument_node=""> “A glittering narrative . . . a moral [book] on the crimes and follies of governments and the misfortunes the governed suffer in consequence.”</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">—The New York Times Book Review</span></span><span data-dcnode-id="3713"><br data-dcnode-id="3715"><span data-dcnode-id="3714" instrument_node=""> </span></span><span class="a-text-italic" data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">&nbsp;</span></span><span data-dcnode-id="3708"><br data-dcnode-id="3710"><span data-dcnode-id="3709" instrument_node=""> “An admirable survey . . . I haven’t read a more relevant book in years.”</span></span><span class="a-text-bold" data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">—John Kenneth Galbraith, </span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">The Boston Sunday Globe</span></span><span data-dcnode-id="3701"><br data-dcnode-id="3703"><span data-dcnode-id="3702" instrument_node=""> </span></span><span class="a-text-italic" data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">&nbsp;</span></span><span data-dcnode-id="3696"><br data-dcnode-id="3698"><span data-dcnode-id="3697" instrument_node=""> “A superb chronicle . . . a masterly examination.”</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">—Chicago Sun-Times</span></span><span data-dcnode-id="3693" instrument_node=""> </span></div><span data-dcnode-id="3691" instrument_node=""> </span><div class="a-expander-header a-expander-partial-collapse-header" data-dcnode-id="3685" style="opacity: 1; display: block;"><div class="a-expander-content-fade" data-dcnode-id="3690"></div><a aria-expanded="false" class="a-declarative" data-a-expander-toggle="{&quot;allowLinkDefault&quot;:true, &quot;expand_prompt&quot;:&quot;Read more&quot;, &quot;collapse_prompt&quot;:&quot;Read less&quot;}" data-action="a-expander-toggle" data-csa-c-func-deps="aui-da-a-expander-toggle" data-csa-c-type="widget" data-csa-interaction-events="click" data-dcnode-id="3686" href="javascript:void(0)" role="button"><i class="a-icon a-icon-extender-expand" data-dcnode-id="3689"></i><span class="a-expander-prompt" data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">Read more</span></span></a></div><span data-dcnode-id="3684" instrument_node=""> </span></div><span data-dcnode-id="3682" instrument_node=""> </span></div><span data-dcnode-id="3680" instrument_node="">

</span><div class="a-divider a-divider-section" data-dcnode-id="2809"><div class="a-divider-inner" data-dcnode-id="2810"></div></div><span data-dcnode-id="2808" instrument_node=""> </span><h2 data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node=""> Editorial Reviews </span></h2><span data-dcnode-id="2805" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-base" data-dcnode-id="2634"><span data-dcnode-id="2804" instrument_node=""> </span><div class="a-row a-expander-container a-expander-extend-container" data-dcnode-id="2636"><span data-dcnode-id="2803" instrument_node=""> </span><h3 data-dcnode-id="2800"><span data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">Review</span></span></h3><span data-dcnode-id="2799" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2770"><span data-dcnode-id="2798" instrument_node=""> </span><span data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">“A glittering narrative . . . a moral [book] on the crimes and follies of governments and the misfortunes the governed suffer in consequence.”</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">—The New York Times Book Review</span></span><span data-dcnode-id="2791"><br data-dcnode-id="2793"><span data-dcnode-id="2792" instrument_node=""> </span></span><span class="a-text-italic" data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2786"><br data-dcnode-id="2788"><span data-dcnode-id="2787" instrument_node=""> “An admirable survey . . . I haven’t read a more relevant book in years.”</span></span><span class="a-text-bold" data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">—John Kenneth Galbraith, </span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">The Boston Sunday Globe</span></span><span data-dcnode-id="2779"><br data-dcnode-id="2781"><span data-dcnode-id="2780" instrument_node=""> </span></span><span class="a-text-italic" data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2774"><br data-dcnode-id="2776"><span data-dcnode-id="2775" instrument_node=""> “A superb chronicle . . . a masterly examination.”</span></span><span class="a-text-bold a-text-italic" data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">—Chicago Sun-Times</span></span><span data-dcnode-id="2771" instrument_node=""> </span></div><span data-dcnode-id="2769" instrument_node=""> </span><h3 data-dcnode-id="2766"><span data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">From the Publisher</span></span></h3><span data-dcnode-id="2765" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2755"><span data-dcnode-id="2764" instrument_node=""> </span><span data-dcnode-id="2757"><span data-dcnode-id="2763" instrument_node="">Barbara Tuchman defines folly as "Pursuit of Policy Contrary to Self-Interest." In THE MARCH OF FOLLY, Tuchman examines 4 conflicts: The Trojan Horse, The Protestant Secession, The American Revolution, and The American War in Vietnam. In each example an alternative course of action was available, the actions were endorsed by a group, not just an individual leader, and the actions were perceived as counter productive in their own time. Many individuals are guilty of folly (Tuchman also calls this woodenheadedness), but when governments persist in folly, their actions can adversely affect thousands, even millions of lives. Folly is a child of power. "The power to command frequently causes failure to think."(p.32). THE MARCH OF FOLLY may not be as well known as A DISTANT MIRROR and THE GUNS OF AUGUST, but it is my favorite of her works. I heartily recommend it to any Tuchman fans who have not yet discovered it.</span><br data-dcnode-id="2762"><br data-dcnode-id="2761"><span data-dcnode-id="2760" instrument_node="">Randy Hickernell</span><br data-dcnode-id="2759"><span data-dcnode-id="2758" instrument_node="">Ballantine sales rep</span></span><span data-dcnode-id="2756" instrument_node=""> </span></div><span data-dcnode-id="2754" instrument_node=""> </span><div aria-expanded="false" class="a-expander-content a-expander-extend-content" data-dcnode-id="2646" style="display:none"><span data-dcnode-id="2753" instrument_node=""> </span><h3 data-dcnode-id="2750"><span data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">From the Back Cover</span></span></h3><span data-dcnode-id="2749" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2744"><span data-dcnode-id="2748" instrument_node=""> </span><span data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">er of the Pulitzer Prize, author Barbara Tuchman now tackles the pervasive presence of folly in governments through the ages. Defining folly as the pursuit by governments of policies contrary to their own interersts, despite the availability of feasible alternatives, Tuchman details four decisive turning points in history that illustrate the very heights of folly in government: the Trojan War, the breakup of the Holy See provoked by the Renaissance Popes, the loss of the American colonies by Britain's George III, and the United States' persistent folly in Vietnam. THE MARCH OF FOLLY brings the people, places, and events of history magnificently alive for today's reader.</span></span><span data-dcnode-id="2745" instrument_node=""> </span></div><span data-dcnode-id="2743" instrument_node=""> </span><h3 data-dcnode-id="2740"><span data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">About the Author</span></span></h3><span data-dcnode-id="2739" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2712"><span data-dcnode-id="2738" instrument_node=""> </span><span class="a-text-bold" data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Barbara W. Tuchman </span></span><span data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">(1912–1989) achieved prominence as a historian with </span></span><span class="a-text-italic" data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">The Zimmermann Telegram </span></span><span data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">and international fame with </span></span><span class="a-text-italic" data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">The Guns of August</span></span><span data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">—a huge bestseller and winner of the Pulitzer Prize. Her other works include </span></span><span class="a-text-italic" data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">Bible and Sword, The Proud Tower, Stilwell and the American Experience in China </span></span><span data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">(for which Tuchman was awarded a second Pulitzer Prize), </span></span><span class="a-text-italic" data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">Notes from China, A Distant Mirror, Practicing History, The March of Folly, </span></span><span data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">and </span></span><span class="a-text-italic" data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">The First Salute</span></span><span data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">.</span></span><span data-dcnode-id="2713" instrument_node=""> </span></div><span data-dcnode-id="2711" instrument_node=""> </span><h3 data-dcnode-id="2708"><span data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">Excerpt. © Reprinted by permission. All rights reserved.</span></span></h3><span data-dcnode-id="2707" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2648"><span data-dcnode-id="2706" instrument_node=""> </span><span data-dcnode-id="2650"><span data-dcnode-id="2705" instrument_node="">Chapter One</span><br data-dcnode-id="2704"><br data-dcnode-id="2703"><span data-dcnode-id="2702" instrument_node="">Pursuit of Policy Contrary to Self-­Interest</span><br data-dcnode-id="2701"><br data-dcnode-id="2700"><span data-dcnode-id="2699" instrument_node="">A phenomenon noticeable throughout history regardless of place or period is the pursuit by governments of policies contrary to their own interests. Mankind, it seems, makes a poorer performance of government than of almost any other human activity. In this sphere, wisdom, which may be defined as the exercise of judgment acting on experience, common sense and available information, is less operative and more frustrated than it should be. Why do holders of high office so often act contrary to the way reason points and enlightened self-­interest suggests? Why does intelligent mental process seem so often not to function?</span><br data-dcnode-id="2698"><br data-dcnode-id="2697"><span data-dcnode-id="2696" instrument_node="">Why, to begin at the beginning, did the Trojan rulers drag that suspicious-­looking wooden horse inside their walls despite every reason to suspect a Greek trick? Why did successive ministries of George III insist on coercing rather than conciliating the American colonies though repeatedly advised by many counselors that the harm done must be greater than any possible gain? Why did Charles XII and Napoleon and successively Hitler invade Russia despite the disasters incurred by each predecessor? Why did Montezuma, master of fierce and eager armies and of a city of 300,000, succumb passively to a party of several hundred alien invaders even after they had shown themselves all too obviously human beings, not gods? Why did Chiang Kai-­shek refuse to heed any voice of reform or alarm until he woke up to find his country had slid from under him? Why do the oil-­importing nations engage in rivalry for the available supply when a firm united front vis-­à-­vis the exporters would gain them control of the situation? Why in recent times have British trade unions in a lunatic spectacle seemed periodically bent on dragging their country toward paralysis, apparently under the impression that they are separate from the whole? Why does American business insist on “growth” when it is demonstrably using up the three basics of life on our planet—­land, water and unpolluted air? (While unions and business are not strictly government in the political sense, they represent governing situations.)</span><br data-dcnode-id="2695"><br data-dcnode-id="2694"><span data-dcnode-id="2693" instrument_node="">Elsewhere than in government man has accomplished marvels: invented the means in our lifetime to leave the earth and voyage to the moon; in the past, harnessed wind and electricity, raised earthbound stones into soaring cathedrals, woven silk brocades out of the spinnings of a worm, constructed the instruments of music, derived motor power from steam, controlled or eliminated diseases, pushed back the North Sea and created land in its place, classified the forms of nature, penetrated the mysteries of the cosmos. “While all other sciences have advanced,” confessed our second President, John Adams, “government is at a stand; little better practiced now than three or four thousand years ago.”</span><br data-dcnode-id="2692"><br data-dcnode-id="2691"><span data-dcnode-id="2690" instrument_node="">Misgovernment is of four kinds, often in combination. They are: 1) tyranny or oppression, of which history provides so many well-­known examples that they do not need citing; 2) excessive ambition, such as Athens’ attempted conquest of Sicily in the Peloponnesian War, Philip II’s of ­England via the Armada, Germany’s twice-­attempted rule of Europe by a self-­conceived master race, Japan’s bid for an empire of Asia; 3) incompetence or decadence, as in the case of the late Roman empire, the last Romanovs and the last imperial dynasty of China; and finally 4) folly or perversity. This book is concerned with the last in a specific manifestation; that is, the pursuit of policy contrary to the self-­interest of the constituency or state involved. Self-­interest is whatever conduces to the welfare or advantage of the body being governed; folly is a policy that in these terms is counter-­productive.</span><br data-dcnode-id="2689"><br data-dcnode-id="2688"><span data-dcnode-id="2687" instrument_node="">To qualify as folly for this inquiry, the policy adopted must meet three criteria: it must have been perceived as counter-­productive in its own time, not merely by hindsight. This is important, because all policy is determined by the mores of its age. “Nothing is more unfair,” as an English historian has well said, “than to judge men of the past by the ideas of the present. Whatever may be said of morality, political wisdom is certainly ambulatory.” To avoid judging by present-­day values, we must take the opinion of the time and investigate only those episodes whose injury to self-­interest was recognized by contemporaries.</span><br data-dcnode-id="2686"><br data-dcnode-id="2685"><span data-dcnode-id="2684" instrument_node="">Secondly a feasible alternative course of action must have been available. To remove the problem from personality, a third criterion must be that the policy in question should be that of a group, not an individual ruler, and should persist beyond any one political lifetime. Misgovernment by a single sovereign or tyrant is too frequent and too individual to be worth a generalized inquiry. Collective government or a succession of rulers in the same office, as in the case of the Renaissance popes, raises a more significant problem. (The Trojan Horse, to be examined shortly, is an exception to the time requirement, and Rehoboam to the group requirement, but each is such a classic example and occurs so early in the known history of government as to illustrate how deeply the phenomenon of folly is ingrained.)</span><br data-dcnode-id="2683"><br data-dcnode-id="2682"><span data-dcnode-id="2681" instrument_node="">Folly’s appearance is independent of era or locality; it is timeless and universal, although the habits and beliefs of a particular time and place determine the form it takes. It is unrelated to type of regime: monarchy, oligarchy and democracy produce it equally. Nor is it peculiar to nation or class. The working class as represented by Communist governments functions no more rationally or effectively in power than the middle class, as has been notably demonstrated in recent history. Mao Tse-­tung may be admired for many things, but the Great Leap Forward, with a steel plant in every backyard, and the Cultural Revolution were exercises in unwisdom that greatly damaged China’s progress and stability, not to mention the Chairman’s reputation. The record of the Russian proletariat in power can hardly be called enlightened, although after sixty years of control it must be accorded a kind of brutal success. If the majority of Russians are materially better off than before, the cost in cruelty and tyranny has been no less and probably greater than under the czars.</span><br data-dcnode-id="2680"><br data-dcnode-id="2679"><span data-dcnode-id="2678" instrument_node="">The French Revolution, great prototype of populist government, reverted rapidly to crowned autocracy as soon as it acquired an able administrator. The revolutionary regimes of Jacobins and Directorate could muster the strength to exterminate internal foes and defeat foreign enemies, but they could not manage their own following sufficiently to maintain domestic order, install a competent administration or collect taxes. The new order was rescued only by Bonaparte’s military campaigns, which brought the spoils of foreign wars to fill the treasury, and subsequently by his competence as an executive. He chose officials on the principle of “la carrière ouverte aux talents”—­the desired talents being intelligence, energy, industry and obedience. That worked for a while until he too, the classic victim of hubris, destroyed himself through overextension.</span><br data-dcnode-id="2677"><br data-dcnode-id="2676"><span data-dcnode-id="2675" instrument_node="">It may be asked why, since folly or perversity is inherent in individuals, should we expect anything else of government? The reason for concern is that folly in government has more impact on more people than individual follies, and therefore governments have a greater duty to act according to reason. Just so, and since this has been known for a very long time, why has not our species taken precautions and erected safeguards against it? Some attempts have been made, beginning with Plato’s proposal of selecting a class to be trained as professionals in government. According to his scheme, the ruling class in a just society should be men apprenticed to the art of ruling, drawn from the rational and wise. Since he recognized that in natural distribution these are few, he believed they would have to be eugenically bred and nurtured. Government, he said, was a special art in which competence, as in any other profession, could be acquired only by study of the discipline and could not be acquired otherwise. His solution, beautiful and unattainable, was philosopher-­kings. “The philosophers must become kings in our cities or those who are now kings and potentates must learn to seek wisdom like true philosophers, and so political power and intellectual wisdom will be joined in one.” Until that day, he acknowledged, “there can be no rest from the troubles for the cities, and I think for the whole human race.” And so it has been.</span><br data-dcnode-id="2674"><br data-dcnode-id="2673"><span data-dcnode-id="2672" instrument_node="">Wooden-­headedness, the source of self-­deception, is a factor that plays a remarkably large role in government. It consists in assessing a situation in terms of preconceived fixed notions while ignoring or rejecting any contrary signs. It is acting according to wish while not allowing oneself to be deflected by the facts. It is epitomized in a historian’s statement about Philip II of Spain, the surpassing wooden-­head of all sovereigns: “No experience of the failure of his policy could shake his belief in its essential excellence.”</span><br data-dcnode-id="2671"><br data-dcnode-id="2670"><span data-dcnode-id="2669" instrument_node="">A classic case in action was Plan 17, the French war plan of 1914, conceived in a mood of total dedication to the offensive. It concentrated everything on a French advance to the Rhine, allowing the French left to remain virtually unguarded, a strategy that could only be justified by the fixed belief that the Germans could not deploy enough manpower to extend their invasion around through western Belgium and the French coastal provinces. This assumption was based on the equally fixed belief that the Germans would never use reserves in the front line. Evidence to the contrary which began seeping through to the French General Staff in 1913 had to be, and was, resolutely ignored in order that no concern about a possible German invasion on the west should be allowed to divert strength from a direct French offensive eastward to the Rhine. When war came, the Germans could and did use reserves in the front line and did come the long way around on the west with results that determined a protracted war and its fearful consequences for our century.</span><br data-dcnode-id="2668"><br data-dcnode-id="2667"><span data-dcnode-id="2666" instrument_node="">Wooden-­headedness is also the refusal to benefit from experience, a characteristic in which medieval rulers of the 14th century were supreme. No matter how often and obviously devaluation of the currency disrupted the economy and angered the people, the Valois monarchs of France resorted to it whenever they were desperate for cash until they provoked insurrection by the bourgeoisie. In warfare, the métier of the governing class, wooden-­headedness was conspicuous. No matter how often a campaign that depended on living off a hostile country ran into want and even starvation, as in the English invasions of France in the Hundred Years’ War, campaigns for which this fate was inevitable were regularly undertaken.</span><br data-dcnode-id="2665"><br data-dcnode-id="2664"><span data-dcnode-id="2663" instrument_node="">There was another King of Spain at the beginning of the 17th century, Philip III, who is said to have died of a fever he contracted from sitting too long near a hot brazier, helplessly overheating himself because the functionary whose duty it was to remove the brazier, when summoned, could not be found. In the late 20th century it begins to appear as if mankind may be approaching a similar stage of suicidal folly. Cases come so thick and fast that one can select only the overriding one: why do the superpowers not begin mutual divestment of the means of human suicide? Why do we invest all our skills and resources in a contest for armed superiority which can never be attained for long enough to make it worth having, rather than in an effort to find a modus vivendi with our antagonist—­that is to say, a way of living, not dying?</span><br data-dcnode-id="2662"><br data-dcnode-id="2661"><span data-dcnode-id="2660" instrument_node="">For 2500 years, political philosophers from Plato and Aristotle through Thomas Aquinas, Machiavelli, Hobbes, Locke, Rousseau, Jefferson, Madison and Hamilton, Nietzsche and Marx, have devoted their thinking to the major issues of ethics, sovereignty, the social contract, the rights of man, the corruption of power, the balance between freedom and order. Few, except Machiavelli, who was concerned with government as it is, not as it should be, bothered with mere folly, although folly has been a chronic and pervasive problem. Count Axel Oxenstierna, Chancellor of Sweden during the turmoil of the Thirty Years’ War under the hyperactive Gustavus Adolphus, and actual ruler of the country under his daughter, Christina, had ample experience on which to base his dying conclusion, “Know, my son, with how little wisdom the world is governed.”</span><br data-dcnode-id="2659"><br data-dcnode-id="2658"><span data-dcnode-id="2657" instrument_node="">Because individual sovereignty was government’s normal form for so long, it exhibits the human characteristics that have caused folly in government as far back as we have records. Rehoboam, King of Israel, son of King Solomon, succeeded his father at the age of 41 in approximately 930 b.c., about a century before Homer composed the national epic of his people. Without loss of time, the new King committed the act of folly that was to divide his nation and lose forever its ten northern tribes, collectively called Israel. Among them were many who were disaffected by heavy taxation in the form of forced labor imposed under King Solomon, and had already in his reign made an effort to secede. They had gathered around one of Solomon’s generals, Jeroboam, “a mighty man of valor,” who undertook to lead them into revolt upon a prophecy that he would inherit rule of the ten tribes afterward. The Lord, speaking through the voice of a certain Ahijah the Shilonite, played a part in this affair, but his role then and later is obscure and seems to have been inserted by narrators who felt the Almighty’s hand had to be present. When the revolt failed, Jeroboam fled to Egypt where Shishak, the King of that country, gave him shelter.</span><br data-dcnode-id="2656"><br data-dcnode-id="2655"><span data-dcnode-id="2654" instrument_node="">Acknowledged King without question by the two southern tribes of Judah and Benjamin, Rehoboam, clearly aware of unrest in Israel, traveled at once to Shechem, center of the north, to obtain the people’s allegiance. He was met instead by a delegation of Israel’s representatives who demanded that he lighten the heavy yoke of labor put upon them by his father and said that if he did so they would serve him as loyal subjects. Among the delegates was Jeroboam who had hurriedly been sent for from Egypt as soon as King Solomon died, and whose presence must certainly have warned Rehoboam that he faced a critical situation.</span><br data-dcnode-id="2653"><br data-dcnode-id="2652"><span data-dcnode-id="2651" instrument_node="">Temporizing, Rehoboam asked the delegation to depart and return after three days for his reply. Meanwhile he consulted with the old men of his father’s council, who advised him to accede to the people’s demand, and told him that if he would act graciously and “speak good words to them they will be thy servants forever.” With the first sensation of sovereignty heating his blood, Rehoboam found this advice too tame and turned to the “young men that were grown up with him.” They knew his disposition and, like counselors of any time who wish to consolidate their position in the “Oval Office,” gave advice they knew would be palatable. He should make no concessions but tell the people outright that his rule would be not lighter but heavier than his father’s. They composed for him the famous words that could be any despot’s slogan: “And thus shalt thou say to them: ‘Whereas my father laid upon you a heavy yoke, I will add to your yoke. Whereas my father chastised you with whips, I shall chastise you with scorpions.’ ” Delighted with this ferocious formula, Rehoboam faced the delegation when it returned on the third day and addressed them “roughly,” word for word as the young men had suggested.</span></span><span data-dcnode-id="2649" instrument_node=""> </span></div><span data-dcnode-id="2647" instrument_node=""> </span></div><span data-dcnode-id="2645" instrument_node=""> </span><div class="a-row" data-dcnode-id="2638"><span data-dcnode-id="2644" instrument_node=""> </span><a aria-expanded="false" class="a-expander-header a-declarative a-expander-extend-header" data-a-expander-toggle="{&quot;allowLinkDefault&quot;:true, &quot;expand_prompt&quot;:&quot;Read more&quot;, &quot;collapse_prompt&quot;:&quot;Read less&quot;}" data-action="a-expander-toggle" data-csa-c-func-deps="aui-da-a-expander-toggle" data-csa-c-type="widget" data-csa-interaction-events="click" data-dcnode-id="2640" href="javascript:void(0)" role="button"><i class="a-icon a-icon-extender-expand" data-dcnode-id="2643"></i><span class="a-expander-prompt" data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">Read more</span></span></a><span data-dcnode-id="2639" instrument_node=""> </span></div><span data-dcnode-id="2637" instrument_node=""> </span></div><span data-dcnode-id="2635" instrument_node=""> </span></div><span data-dcnode-id="2633" instrument_node=""> </span></div><span data-dcnode-id="2631" instrument_node="">

  March of Folly cleverly looks at periods in history where leaders have pursued policies against their own interest. The author picks only a handful of events to analyze in detail. This approach allows the author to go into great detail on each of the historical periods, drawing insight from a wide variety of anecdotes and commentary from the time. However, the paucity of examples makes it hard for the author to make broad-sweeping conclusions about folly that feel adequately supported. All in all, an entertaining read and a unique perspective on historical periods where the events are well understood.

</span><span data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">
  I bought this book in the Kindle version after it was referenced in an article by William Hague. Not at all what I was expecting. I'm not really clear what was going on with the introduction that seemed more like an executive summary of the book. After a bit about Troy that was rather an average read there seems to be a never-ending discussion of the venality, greed and nepotism of the Renaissance popes. I was looking for more clear-cut, well defined examples of behaviours=&gt;specific situation=&gt;wrong decision arising from previously described behaviour=&gt;calamitous consequence. A good pattern for this sort of book would be 'Hubris' by Alistair Horne, an excellent book. Frankly I just became bored - going round and round the various characters misbehaving in and around the renaissance papacy just became the same thing with different characters and I gave up reading this book 21% of the way through. If this was the style of the book I couldn't be bothered to see what might be in further chapters.
