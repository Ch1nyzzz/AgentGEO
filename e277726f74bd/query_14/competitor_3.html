</span><span data-dcnode-id="5191" id="freeText9490860251141033665" style="display:none"><span data-dcnode-id="5192" instrument_node="">Twice a winner of the Pulitzer Prize, author Barbara Tuchman now tackles the pervasive presence of folly in governments thru the ages. Defining folly as the pursuit by governments of policies contrary to their own interests, despite the availability of feasible alternatives, Tuchman details four decisive turning points in history that illustrate the very heights of folly in government: the Trojan War, the breakup of the Holy See provoked by Renaissance Popes, the loss of the American colonies by Britain's George III &amp; the USA's persistent folly in Vietnam. THE MARCH OF FOLLY brings the people, places &amp; events of history alive for today's reader.</span></span><span data-dcnode-id="5190" instrument_node="">

/span><br data-dcnode-id="4506"><br data-dcnode-id="4505"><span data-dcnode-id="4504" instrument_node="">You see, Babs writes history in such a colorful, engaging manner that you don't no</span></span><span data-dcnode-id="4502" instrument_node="">
</span><span data-dcnode-id="4385" id="freeText1123036282615604182" style="display:none"><b data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">Babs</span></b><span data-dcnode-id="4499" instrument_node=""> is one </span><b data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">crafty</span></b><span data-dcnode-id="4496" instrument_node="">, talented </span><b data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">instructor</span></b><span data-dcnode-id="4493" instrument_node=""> and this </span><b data-dcnode-id="4491"><span data-dcnode-id="4492" instrument_node="">ranks highly</span></b><span data-dcnode-id="4490" instrument_node=""> among the </span><b data-dcnode-id="4488"><span data-dcnode-id="4489" instrument_node="">BEST</span></b><span data-dcnode-id="4487" instrument_node=""> history books I've had the pleasure of reading. </span><b data-dcnode-id="4485"><span data-dcnode-id="4486" instrument_node="">You</span></b><span data-dcnode-id="4484" instrument_node=""> should be reading it </span><b data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">right now</span></b><span data-dcnode-id="4481" instrument_node="">. </span><br data-dcnode-id="4480"><br data-dcnode-id="4479"><span data-dcnode-id="4478" instrument_node="">Seriously, I mean it. </span><br data-dcnode-id="4477"><br data-dcnode-id="4476"><span data-dcnode-id="4475" instrument_node="">This is the second gem by Barbara Tuchman that I've tackled, after the stellar </span><a data-dcnode-id="4473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/11366.The_Guns_of_August" rel="nofollow noopener" title="The Guns of August by Barbara W. Tuchman"><span data-dcnode-id="4474" instrument_node="">The Guns of August</span></a><span data-dcnode-id="4472" instrument_node="">), and the impressiveness of her work has led to my developing rather intense, and possibly inappropriate, feelings for her. I'm smitten. </span><br data-dcnode-id="4471"><br data-dcnode-id="4470"><span data-dcnode-id="4469" instrument_node="">You see, Babs writes history in such a colorful, engaging manner that you don't notice she's shoveling mounds of knowledge into your memory muscle. You're so interested that you just glide along the pages, absorbed in her narrative web, while she's filling your brain with smarts. It's downright spooky. Honestly, how often can you truly say that you've overdosed on happy reading a history book. Yes, she's that good. </span><br data-dcnode-id="4468"><br data-dcnode-id="4467"><b data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">PLOT SUMMARY</span></b><br data-dcnode-id="4464"><br data-dcnode-id="4463"><span data-dcnode-id="4462" instrument_node="">To qualify as "folly" for this book, Tuchman explains that actions need to meet all four of the following criteria: </span><br data-dcnode-id="4461"><br data-dcnode-id="4460"><i data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">1.</span></i><span data-dcnode-id="4457" instrument_node=""> The actions must be clearly contrary to the self-interest of the organization or group pursuing them; </span><br data-dcnode-id="4456"><br data-dcnode-id="4455"><i data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">2.</span></i><span data-dcnode-id="4452" instrument_node=""> The actions must be conducted over a period of time, not just in a single burst of irrational behavior; </span><br data-dcnode-id="4451"><br data-dcnode-id="4450"><i data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">3.</span></i><span data-dcnode-id="4447" instrument_node=""> The actions must be conducted by a number of individuals, not just one deranged maniac; and</span><br data-dcnode-id="4446"><span data-dcnode-id="4445" instrument_node=""> </span><br data-dcnode-id="4444"><i data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">4.</span></i><span data-dcnode-id="4441" instrument_node=""> </span><u data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">MOST IMPORTANTLY</span></u><span data-dcnode-id="4438" instrument_node="">, there must have been a significant group who </span><b data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">"at the time"</span></b><span data-dcnode-id="4435" instrument_node=""> pointed out, correctly, why the action in question was folly (i.e., no Monday morning quarterbacking or 20/20 hindsight). </span><br data-dcnode-id="4434"><br data-dcnode-id="4433"><span data-dcnode-id="4432" instrument_node="">Tuchman spends some pages at the beginning of the book describing a number of </span><b data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">"bonehead"</span></b><span data-dcnode-id="4429" instrument_node=""> and </span><b data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">"assclowny"</span></b><span data-dcnode-id="4426" instrument_node=""> decisions in history that didn't qualify as folly, either because they were a single instance of governmental psychosis, or because they were carried out at the command of a dictator and not a coordinated governmental policy. </span><br data-dcnode-id="4425"><br data-dcnode-id="4424"><span data-dcnode-id="4423" instrument_node="">Based on the above criteria, Babs looks at four primary examples of </span><s data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">FUBAR</span></s><span data-dcnode-id="4420" instrument_node=""> "folly" in history: </span><br data-dcnode-id="4419"><br data-dcnode-id="4418"><b data-dcnode-id="4414"><u data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">The Fall of Troy</span></u><span data-dcnode-id="4415" instrument_node="">:</span></b><span data-dcnode-id="4413" instrument_node=""> The loss of Troy as a result of the Trojans' failure to question the deployment of the "Trojan Horse" by the Greeks. While interesting, this for me was easily the "weakest" part of the book, mainly because there is just not enough historical knowledge on the subject for Tuchman to analyze convincingly. She managed to keep me engaged with her stylish delivery, but I think this segment was likely included in order to have the book span a larger swatch of world history. </span><br data-dcnode-id="4412"><br data-dcnode-id="4411"><b data-dcnode-id="4407"><u data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">The Renaissance Popes and the Protestant Reformation</span></u><span data-dcnode-id="4408" instrument_node="">:</span></b><span data-dcnode-id="4406" instrument_node=""> The reign of the Renaissance Popes and how their excesses, and their failure to recognize the growing discontent among the Church members, led directly to the Protestant Reformation. I loved this section and it was easily my favorite of the whole book. After finishing this portion, I immediately went about trying to locate other books on the period. It was a fascinating time. Now if I can only get Babs to re-write these other books to make them more interesting. </span><br data-dcnode-id="4405"><br data-dcnode-id="4404"><b data-dcnode-id="4400"><u data-dcnode-id="4402"><span data-dcnode-id="4403" instrument_node="">How the Britsh lost the American colonies</span></u><span data-dcnode-id="4401" instrument_node="">:</span></b><span data-dcnode-id="4399" instrument_node=""> Another superb section of the book. What I found most interesting about this discussion of the major events that led up the American Revolution is that Tuchman spent most of her time looking through the eyes of the British, in contrast to peering through the eyes of the American colonist, which is the more common perspective used in studies of this period. Despite my general familiarity with this period, I found this to be very enlightening. </span><br data-dcnode-id="4398"><br data-dcnode-id="4397"><b data-dcnode-id="4393"><u data-dcnode-id="4395"><span data-dcnode-id="4396" instrument_node="">The failure of America in Vietnam</span></u><span data-dcnode-id="4394" instrument_node="">:</span></b><span data-dcnode-id="4392" instrument_node="">. A terrific end to an amazing survey of history. My only quibble here is that I think Tuchman's "objectivity" may have slipped away to make a sandwich or take a nap because you can readily see that she was strongly against the war. Nothing wrong with that, but I prefer not to be able to read historian's personal views in the work. Still, her analysis is excellent, well supported, and she lays out the history in a very engaging manner. </span><br data-dcnode-id="4391"><br data-dcnode-id="4390"><span data-dcnode-id="4389" instrument_node="">Overall, this is as good as histories get. Engaging, informative and wonderfully delivered. I would call this a must for history fans or fans of military history. </span><br data-dcnode-id="4388"><br data-dcnode-id="4387"><span data-dcnode-id="4386" instrument_node="">6.0 stars. HIGHEST POSSIBLE RECOMMENDATION!!! </span></span><span data-dcnode-id="4384" instrument_node="">

        rated it
        </span><span class="staticStars notranslate" data-dcnode-id="4307" title="liked it"><span class="staticStar p10" data-dcnode-id="4312" size="15x15"><span data-dcnode-id="4313" instrument_node="">liked it</span></span><span class="staticStar p10" data-dcnode-id="4311" size="15x15"></span><span class="staticStar p10" data-dcnode-id="4310" size="15x15"></span><span class="staticStar p0" data-dcnode-id="4309" size="15x15"></span><span class="staticStar p0" data-dcnode-id="4308" size="15x15"></span></span><span data-dcnode-id="4306" instrument_node="">

</span><span class="readable" data-dcnode-id="4207" id="reviewTextContainer295314601"><span data-dcnode-id="4302" instrument_node="">
</span><span data-dcnode-id="4287" id="freeTextContainer3769874177115120066"><br data-dcnode-id="4301"><span data-dcnode-id="4300" instrument_node="">I thought 'The March of Folly' would be a good read to balance out the optimism of </span><a data-dcnode-id="4298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/68143.The_Wisdom_of_Crowds" rel="nofollow noopener" title="The Wisdom of Crowds by James Surowiecki"><span data-dcnode-id="4299" instrument_node="">The Wisdom of Crowds</span></a><span data-dcnode-id="4297" instrument_node="">. Turned out to be a great hunch.</span><br data-dcnode-id="4296"><br data-dcnode-id="4295"><span data-dcnode-id="4294" instrument_node="">Why?</span><br data-dcnode-id="4293"><br data-dcnode-id="4292"><span data-dcnode-id="4291" instrument_node="">Indeed, Tuchman's book does in fact emphasize that very optimism. Tuchman's 'Follies' are committed not by the common people but by closeted leaders, lacking in common-sense and cut-off from ground realities. Do I need to mention the Yes-Men that surround them?</span><br data-dcnode-id="4290"><br data-dcnode-id="4289"><span data-dcnode-id="4288" instrument_node="">Tuchman takes up a panoramic view of human history and exposes these decisions, and wonders with us</span></span><span data-dcnode-id="4286" instrument_node="">
</span><span data-dcnode-id="4212" id="freeText3769874177115120066" style="display:none"><br data-dcnode-id="4285"><span data-dcnode-id="4284" instrument_node="">I thought 'The March of Folly' would be a good read to balance out the optimism of </span><a data-dcnode-id="4282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/68143.The_Wisdom_of_Crowds" rel="nofollow noopener" title="The Wisdom of Crowds by James Surowiecki"><span data-dcnode-id="4283" instrument_node="">The Wisdom of Crowds</span></a><span data-dcnode-id="4281" instrument_node="">. Turned out to be a great hunch.</span><br data-dcnode-id="4280"><br data-dcnode-id="4279"><span data-dcnode-id="4278" instrument_node="">Why?</span><br data-dcnode-id="4277"><br data-dcnode-id="4276"><span data-dcnode-id="4275" instrument_node="">Indeed, Tuchman's book does in fact emphasize that very optimism. Tuchman's 'Follies' are committed not by the common people but by closeted leaders, lacking in common-sense and cut-off from ground realities. Do I need to mention the Yes-Men that surround them?</span><br data-dcnode-id="4274"><br data-dcnode-id="4273"><span data-dcnode-id="4272" instrument_node="">Tuchman takes up a panoramic view of human history and exposes these decisions, and wonders with us how much Folly it took to make these disastrous calls. </span><br data-dcnode-id="4271"><br data-dcnode-id="4270"><span data-dcnode-id="4269" instrument_node="">Surely common-sense would not have allowed these? </span><br data-dcnode-id="4268"><br data-dcnode-id="4267"><span data-dcnode-id="4266" instrument_node="">Given the scope of this exercise, Tuchman has limited herself to the most famous historical examples of these foolish decisions, ranging from the Trojans bringing the Trojan horse into their walls, and the Renaissance popes provoking the Protestant succession, to the German decision to adopt unrestricted submarine warfare in World War I (thereby triggering America’s declaration of war), and Japan’s Pearl Harbor attack that similarly triggered America’s declaration of war in 1941. </span><br data-dcnode-id="4265"><br data-dcnode-id="4264"><span data-dcnode-id="4263" instrument_node="">But we can extrapolate them into any number of follies that we are familiar with in our own countries and see how leaders make the stupid mistakes over and over again, and incomprehensible mistakes at that.</span><br data-dcnode-id="4262"><br data-dcnode-id="4261"><span data-dcnode-id="4260" instrument_node="">This irrationality is what astounds us when we look back on these gross errors of judgment and Tuchman is especially scathing in dealing with the leaders who make such choices: </span><i data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">“Persistence in error,” “wooden-headedness," “refusal to draw inference from negative signs,” and “mental stagnation”</span></i><span data-dcnode-id="4257" instrument_node=""> are a few choice examples.</span><br data-dcnode-id="4256"><br data-dcnode-id="4255"><span data-dcnode-id="4254" instrument_node="">This should make us conclude that the main message of the book, and of history, is one of Tolstoy-ian embrace of the 'Wisdom of the Masses'? It is quite a powerful argument and one we would dearly love to embrace - it gives us the possibility of a future where we can side-step such follies, by avoiding these very decision making practices. And that is very very important too.</span><br data-dcnode-id="4253"><br data-dcnode-id="4252"><span data-dcnode-id="4251" instrument_node="">However, I think there is one more angle to be considered here.</span><br data-dcnode-id="4250"><br data-dcnode-id="4249"><span data-dcnode-id="4248" instrument_node="">Consider Tuchman's emphatic statement:</span><br data-dcnode-id="4247"><br data-dcnode-id="4246"><blockquote data-dcnode-id="4241"><span data-dcnode-id="4245" instrument_node="">
</span><i data-dcnode-id="4243"><span data-dcnode-id="4244" instrument_node="">“Chief among the forces affecting political folly is lust for power, named by Tacitus as ‘the most flagrant of all passions.’ ” </span></i><span data-dcnode-id="4242" instrument_node="">
</span></blockquote><br data-dcnode-id="4240"><br data-dcnode-id="4239"><span data-dcnode-id="4238" instrument_node="">This however, introduces another aspect to the 'folly' we address. It is possible that these 'leaders' were in fact trapped in a competitive spiral - any leader who did not pursue these 'follies' would have been scorned and lost his job - precisely because those were widely held to be the correct things to do. </span><br data-dcnode-id="4237"><br data-dcnode-id="4236"><span data-dcnode-id="4235" instrument_node="">This sort of decision making is in fact quite common - leaders always follow the popular 'wisdom' and usually it turns out to be right. But there are times in history when this normal course of action fails.</span><br data-dcnode-id="4234"><br data-dcnode-id="4233"><span data-dcnode-id="4232" instrument_node="">There are times when the circumstances are too inter-dependent or too much at the edge-of-the-cliff that no-one, not even common-sense, could have anticipated the fall that was coming by taking the steps that should have been matter-of-course at any other point. </span><br data-dcnode-id="4231"><br data-dcnode-id="4230"><span data-dcnode-id="4229" instrument_node="">These are the points when good practices suddenly seem like Follies.</span><br data-dcnode-id="4228"><br data-dcnode-id="4227"><br data-dcnode-id="4226"><span data-dcnode-id="4225" instrument_node="">This is why we have to consider the possibility that these were not just 'follies' arising from the closeted and exclusive nature of these leaders, but from a confluence of pressures that left them little wiggle room - and most importantly, that this is more or less always the case with leaders - their decisions are not always their own. Just as in the modern business world - where the financial sector, market signals and impulses make business leaders slaves to the quarterly bottom lines, irrespective of whether that bottom line is congruent with a company’s, let alone society’s, longer-term well-being.</span><br data-dcnode-id="4224"><br data-dcnode-id="4223"><span data-dcnode-id="4222" instrument_node="">So the March of Folly could well be as unstoppable as it sounds to those leaders as well, especially in the short term when history rushed in on them.</span><br data-dcnode-id="4221"><br data-dcnode-id="4220"><span data-dcnode-id="4219" instrument_node="">This is not (of course!) to say that these leaders were not culpable for their decisions, or even, god forbid, to excuse their 'stupid' advisors and Yes-Men. It is however dangerous to assume the other extreme position - that if only 'common-sense' prevailed, much evil could have been avoided. </span><br data-dcnode-id="4218"><br data-dcnode-id="4217"><span data-dcnode-id="4216" instrument_node="">No. </span><br data-dcnode-id="4215"><br data-dcnode-id="4214"><span data-dcnode-id="4213" instrument_node="">That sort of thinking only allows us to make the same mistakes again, precisely because common-sense would allow it!</span></span><span data-dcnode-id="4211" instrument_node="">
</span><a data-dcnode-id="4209" data-text-id="3769874177115120066" href="#" onclick="swapContent($(this));; return false;"><span data-dcnode-id="4210" instrument_node="">...more</span></a><span data-dcnode-id="4208" instrument_node="">

</span><span data-dcnode-id="4087" id="freeTextContainer15689769157093746493"><b data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">The March of Folly: From Troy to Vietnam, Barbara W. Tuchman</span></b><br data-dcnode-id="4093"><br data-dcnode-id="4092"><span data-dcnode-id="4091" instrument_node="">The March of Folly: From Troy to Vietnam is a book by Barbara W. Tuchman, an American historian and author. It was published on March 19, 1984.</span><br data-dcnode-id="4090"><br data-dcnode-id="4089"><span data-dcnode-id="4088" instrument_node="">It details four major instances of government folly in human history: the Trojans' decision to move the Greek horse into their city, the failure of the Renaissance popes to address the factors that would lead to the Protestant Reformation in the early sixteenth century, England's policies relatin</span></span><span data-dcnode-id="4086" instrument_node="">
</span><span data-dcnode-id="4050" id="freeText15689769157093746493" style="display:none"><b data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">The March of Folly: From Troy to Vietnam, Barbara W. Tuchman</span></b><br data-dcnode-id="4083"><br data-dcnode-id="4082"><span data-dcnode-id="4081" instrument_node="">The March of Folly: From Troy to Vietnam is a book by Barbara W. Tuchman, an American historian and author. It was published on March 19, 1984.</span><br data-dcnode-id="4080"><br data-dcnode-id="4079"><span data-dcnode-id="4078" instrument_node="">It details four major instances of government folly in human history: the Trojans' decision to move the Greek horse into their city, the failure of the Renaissance popes to address the factors that would lead to the Protestant Reformation in the early sixteenth century, England's policies relating to American colonies under King George III, and the United States' mishandling of the conflict in Vietnam.</span><br data-dcnode-id="4077"><br data-dcnode-id="4076"><span data-dcnode-id="4075" instrument_node="">More than half of the book deals with US intervention in the Vietnam War, while the other three case studies are shorter.</span><br data-dcnode-id="4074"><br data-dcnode-id="4073"><span data-dcnode-id="4072" instrument_node="">تاریخ نخستین خوانش سال 1996میلادی</span><br data-dcnode-id="4071"><br data-dcnode-id="4070"><span data-dcnode-id="4069" instrument_node="">عنوان: سیر نابخردی از ترویا تا ویتنام؛ نویسنده: باربارا تاکمن؛ مترجم: حسن کامشاد؛ تهران، ن‍ش‍ر و پ‍ژوه‍ش‌ ف‍رزان‌ روز؛ 1375؛ در 611ص؛ شابک9643212548؛ چاپ دوم 1384؛ موضوع: تاریخ گذشته از نویسندگان ایالات متحده آمریکا - سده 20م</span><br data-dcnode-id="4068"><br data-dcnode-id="4067"><span data-dcnode-id="4066" instrument_node="">عنوان: تاریخ بی‌خردی: از تروا تا ويتنام؛ نویسنده: باربارا تاکمن؛ مترجم: حسن کامشاد؛ تهران، کارنامه، چاپ دوم 1388؛ در 678ص؛ شابک9789644310768؛ چاپ سوم 1391؛ چاپ چهارم 1392؛ چاپ پنجم 1394؛ عنوان دیگر سیر نابخردی از ترویا تا ویتنام؛ </span><br data-dcnode-id="4065"><br data-dcnode-id="4064"><span data-dcnode-id="4063" instrument_node="">عنوان: تاریخ بی‌خردی؛ نویسنده: باربارا تاکمن؛ مترجم: فاطمه شیخ؛ تهران، شاهدخت پائیز، 1400؛ در 432ص؛ شابک 9786226847353؛</span><br data-dcnode-id="4062"><br data-dcnode-id="4061"><span data-dcnode-id="4060" instrument_node="">کتاب «تاریخ بی‌خردی، از تروا تا ویتنام» اثر «باربارا تاکمن» است؛ این پژوهشگر «ایالات متحده آمریکا»، با دستمایه قرار دادن برخی رویدادهای تاریخ جهان از دورهٔ باستان تا امروز کوشش کرده‌ به نقد رفتار فرمان‌روایان در مواجهه با آن رویدادها بپردازد؛ از دیدگاه «باربارا تاکمن» نخستین بی‌خردی شگفت‌آور این است که در کمال بی‌عقلی و نادانی، فرماندهان «تروا»، اسب چوبین را داخل شهر خود بردند و نیرنگ «یونانیان» را درنیافتند و شد آنچه شد؛ </span><br data-dcnode-id="4059"><br data-dcnode-id="4058"><span data-dcnode-id="4057" instrument_node="">کتاب در پنج فصل با عناوین: فصل نخست: «پیگیری سیاست‌های مغایر با منافع خویش»؛ فصل دوم: «نمونه‌های آغازین: اسب تروا»؛ فصل سوم: «پاپ‌های رنسانس و جدا شدن پروتستان‌ها»؛ فصل چهارم: «بریتانیا آمریکا را از دست می‌دهد»؛ و فصل پنجم: «آمریکا در ویتنام به خود خیانت می‌کند»؛</span><br data-dcnode-id="4056"><br data-dcnode-id="4055"><span data-dcnode-id="4054" instrument_node="">در کتاب «تاریخ بی‌خردی»، با زیرعنوان «از تروا تا ویتنام»، نویسنده می‌نویسند: «بی‌خردی از دیرباز مشکلی مزمن و همه‌گیر بوده است.»، «بی‌خردی زمان و مکان نمی‌شناسد؛ جهان‌شمول است –اگرچه عقاید و عادات هر زمان و مکان خاص، شکلی معین به آن می‌دهد؛ ارتباطی به نوع نظام ندارد: هم سلطنت ممکن است موجد آن باشد، هم حکومت یک اقلیت قدرت‌طلب (الیگارشی)، و هم مردم‌سالاری (دموکراسی)؛ ویژه‌ ی ملت یا طبقه‌ ی به‌خصوصی هم نیست؛ طبقه‌ی کارگر و حکومت‌های کمونیستیِ نماینده‌ ی آن، همان‌گونه که تاریخ دوران اخیر به‌ خوبی نشان داد، در مسندِ قدرت بخردانه‌تر یا کارسازتر از طبقه‌ ی متوسط عمل نکردند…»؛</span><br data-dcnode-id="4053"><br data-dcnode-id="4052"><span data-dcnode-id="4051" instrument_node="">تاریخ بهنگام رسانی 30/05/1400هجری خورشیدی؛ ا. شربیانی</span></span><span data-dcnode-id="4049" instrument_node="">

</span><span data-dcnode-id="3848" id="freeTextContainer9531851919359863074"><span data-dcnode-id="3853" instrument_node="">A book which informed my entire world view, and still does. Tuchman posits the existance of folly, or the pursuit of public policy contrary to self-interest–in other words, why nations keep shooting themselves in the foot. She uses the Trojans taking the Greek horse inside the walls of Troy as her template</span><br data-dcnode-id="3852"><br data-dcnode-id="3851"><i data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">...the feasible alternative--that of destroying the Horse--is always open. Capys the Elder advised it before Laocoon's warning, and Cassandra afterward. Notwithstanding the frequent references </span></i></span><span data-dcnode-id="3847" instrument_node="">
</span><span data-dcnode-id="3811" id="freeText9531851919359863074" style="display:none"><span data-dcnode-id="3846" instrument_node="">A book which informed my entire world view, and still does. Tuchman posits the existance of folly, or the pursuit of public policy contrary to self-interest–in other words, why nations keep shooting themselves in the foot. She uses the Trojans taking the Greek horse inside the walls of Troy as her template</span><br data-dcnode-id="3845"><br data-dcnode-id="3844"><i data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">...the feasible alternative--that of destroying the Horse--is always open. Capys the Elder advised it before Laocoon's warning, and Cassandra afterward. Notwithstanding the frequent references in the epic to the fall of Troy being ordained, it was not fate but free choice that took the Horse within the walls. "Fate" as a character in legend represents the fulfillment of man's expectations of himself.</span></i><br data-dcnode-id="3841"><br data-dcnode-id="3840"><span data-dcnode-id="3839" instrument_node="">and then goes on to talk about how the Renaissance popes caused the Reformation</span><br data-dcnode-id="3838"><br data-dcnode-id="3837"><i data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">Their three outstanding attitudes--obliviousness to the growing disaffection of constituents, primacy of self-aggrandizement, illusion of invulnerable status--are persistent aspects of folly. While in the case of the Renaissance popes, these were bred in and exaggerated by the surrounding culture, all are independent of time and recurrent in governorship.</span></i><br data-dcnode-id="3834"><br data-dcnode-id="3833"><span data-dcnode-id="3832" instrument_node="">how the British lost America</span><br data-dcnode-id="3831"><br data-dcnode-id="3830"><i data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">One cannot escape the impression that the level of British intelligence and competence in both civil and military positions in the period 1763-1783 was, on the whole, though not in every case, low. Whether that was bad luck or was owing to the almost exclusive hold of the ultraprivileged on decision-making positions is not clear beyond question. The underprivileged and the middle class often do no better. What is clear is that when incapacity is joined by complacency, the result is the worst possible combination.</span></i><br data-dcnode-id="3827"><br data-dcnode-id="3826"><span data-dcnode-id="3825" instrument_node="">Everyone in the current US Congress is a millionaire. Why would these people vote against their own self-interest now? They're the new British ruling class, and they're as oblivious as the British ruling class and the Renaissance popes were to what was actually going on around them.</span><br data-dcnode-id="3824"><br data-dcnode-id="3823"><span data-dcnode-id="3822" instrument_node="">Lastly, Tuchman writes how the US lost in Vietnam. </span><br data-dcnode-id="3821"><br data-dcnode-id="3820"><i data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">The longest war had come to an end...A contemporary summing up was voiced by a Congressman from Michigan, Donald Riegle. In talking to a couple from his constituency who had lost a son in Vietnam, he faced the stark recognition that he could find no words to justify the boy's death. "There was no way I could say that what had happened was in their interest or in the national interest or in anyone's interest.</span></i><br data-dcnode-id="3817"><br data-dcnode-id="3816"><span data-dcnode-id="3815" instrument_node="">One can only imagine the new bodily orifice Tuchman would have ripped over Iraq and Afghanistan. 'Those who cannot remember the past are condemned to repeat it' only begins to cover it.</span><br data-dcnode-id="3814"><br data-dcnode-id="3813"><span data-dcnode-id="3812" instrument_node="">A lively, engaging prose style with more than a hint of “Lord, what fools these mortals be!” It might be time to reread this book, but then I think it always is.</span></span><span data-dcnode-id="3810" instrument_node="">

</span><span data-dcnode-id="3698" id="freeText15497856995937338502" style="display:none"><span data-dcnode-id="3699" instrument_node="">Tuchman's The March of Folly is spotty. First of all, too much attention is paid to Troy, about which nothing is known, historically speaking. All that section does is provide a simile or two for what follows. Also, she actually is stronger in another classical case not mentioned in the title or in most descriptions of the book, viz. that of King Rehoboam of Israel. Second, the account of the involvements of France and the United States in VietNam is of a journalistic quality not in keeping with the rest of the book, though it may well have been her motive for writing it. I appreciated the refresher course, but it does not have the historical character of her two best studies, viz. that of those Renaissance popes who precipitated the Protestant Reformation and that of the British government which lost most of the American colonies. On the Renaissance popes I appreciated the clear survey of ineptitute as the period is not well-known to me. On the Americas I appreciated the overview of the revolution as she worked so much from the position of England, rather than from the wearisomely familiar perspective of the colonists.</span></span><span data-dcnode-id="3697" instrument_node="">

</span><span data-dcnode-id="3604" id="freeTextContainer17992902060257564229"><span data-dcnode-id="3605" instrument_node="">Barbara Tuchman is a first-rate writer and historian whose books I have much enjoyed. For some years now I have been meaning to get a copy of "The March of Folly," since it is a book which greatly appeals to me in its concept. To look at the history of modern man (since about 1,000 BC) and take examples of real foolishness on the part of a number of key governments, and try to see why they so acted, strikes me as a wonderful idea for a book. However, I can now say, somewhat reluctantly, that "Th</span></span><span data-dcnode-id="3603" instrument_node="">
</span><span data-dcnode-id="3595" id="freeText17992902060257564229" style="display:none"><span data-dcnode-id="3602" instrument_node="">Barbara Tuchman is a first-rate writer and historian whose books I have much enjoyed. For some years now I have been meaning to get a copy of "The March of Folly," since it is a book which greatly appeals to me in its concept. To look at the history of modern man (since about 1,000 BC) and take examples of real foolishness on the part of a number of key governments, and try to see why they so acted, strikes me as a wonderful idea for a book. However, I can now say, somewhat reluctantly, that "The March of Folly" is not up to the standard of Tuchman's earlier books. I find this curious indeed and have been wondering for some time why it is so.</span><br data-dcnode-id="3601"><br data-dcnode-id="3600"><span data-dcnode-id="3599" instrument_node="">Firstly, the writing is not up to par and I can only put this down to sloppy editing. Some of the oddest phrases in the book are so un-Tuchman like, that I imagine they have been written by a researcher and, for whatever reason, have managed to sneak by both the author and her editors. Tuchman is usually crisp and succinct. Some of this text is laborious and redundant; it's most surprising. Perhaps this first fault leads to the second, although not entirely. In "The Guns of August" and "The Proud Tower," Tuchman seems to be in very complete command of both her history and her sources. In "The March of Folly," one begins to wonder if she has not strayed too far afield and is rather unsure of her ground. So it appears to me, especially with reference to the beginning of the book, where she discusses both the siege of Troy and then the Papacy during the Renaissance, when she seems very shaky indeed. Or it may be that this apparent instability is founded on limited research and that that has been allowed to come through in the book. Whatever the reason, I find that the book does not live up to its promise, either conceptually or authorially.</span><br data-dcnode-id="3598"><br data-dcnode-id="3597"><span data-dcnode-id="3596" instrument_node="">The sections on the American Revolution and the Vietnam War are interesting in themselves, but one wonders at times, given the detail involved in both cases, if Tuchman is not actually off the rails. The fact that there is no stated plan at the beginning of the book (chapters and sub-headings and synopses, I mean) makes me wonder indeed, just how much of a plan she had. So I think you can read this book for its individual content (i.e., if you happen to be interested in the particular periods covered), but the disappointment overall is that the really first-rate text that one might have expected, does not materialise. I will say that the essay at the end is very Tuchmanesque and is a brave attempt, quand même, to tie the threads of the book together. Yet I'm unsure of just how far she can get away with a text that smacks so readily of invention and understudy, and in my opinion, the epilogue is hardly sufficient, by itself, to save the whole. I suppose it is just possible that she and I both got carried away by the title. </span></span><span data-dcnode-id="3594" instrument_node="">

</span><span data-dcnode-id="3495" id="freeTextContainer1378182742810150600"><span data-dcnode-id="3499" instrument_node="">Barbara Tuchman is an amazing historian. I love reading her books and then wishing I had even a small fraction of her writing ability. In "The March of Folly: From Troy to Vietnam", she does precisely as the title states and proceeds to take the reader on a journey from 1194–1184 BC all the way to 1973 AD. The uniting theme?</span><br data-dcnode-id="3498"><br data-dcnode-id="3497"><span data-dcnode-id="3496" instrument_node="">"Mankind, it seems, makes a poorer performance of government than of almost any other human activity. In this sphere, wisdom, which may be defined as the exercise of judgment</span></span><span data-dcnode-id="3494" instrument_node="">
</span><span data-dcnode-id="3460" id="freeText1378182742810150600" style="display:none"><span data-dcnode-id="3493" instrument_node="">Barbara Tuchman is an amazing historian. I love reading her books and then wishing I had even a small fraction of her writing ability. In "The March of Folly: From Troy to Vietnam", she does precisely as the title states and proceeds to take the reader on a journey from 1194–1184 BC all the way to 1973 AD. The uniting theme?</span><br data-dcnode-id="3492"><br data-dcnode-id="3491"><span data-dcnode-id="3490" instrument_node="">"Mankind, it seems, makes a poorer performance of government than of almost any other human activity. In this sphere, wisdom, which may be defined as the exercise of judgment acting on experience, common sense and available information, is less operative and more frustrated than it should be. Why do holders of high office so often act contrary to the way reason points and enlightened self-interest suggests? Why do intelligent mental process seem so often not to function?"</span><br data-dcnode-id="3489"><br data-dcnode-id="3488"><span data-dcnode-id="3487" instrument_node="">Though written in 1984, what could be more apropos a thought in our current political choices in 2021? In essence, this is a case study of "misgovernment". Think of "government" as a verb and not a noun. She states that misgovernment can be found in four kinds (often in combination):</span><br data-dcnode-id="3486"><span data-dcnode-id="3485" instrument_node="">1. Tyranny or Oppression</span><br data-dcnode-id="3484"><span data-dcnode-id="3483" instrument_node="">2. Excess ambition</span><br data-dcnode-id="3482"><span data-dcnode-id="3481" instrument_node="">3. Incompetence and decadence</span><br data-dcnode-id="3480"><span data-dcnode-id="3479" instrument_node="">4. Folly or perversity</span><br data-dcnode-id="3478"><br data-dcnode-id="3477"><span data-dcnode-id="3476" instrument_node="">Then as she states "This book is concerned with the last in a specific manifestation; that is, the pursuit of policy contrary to the self-interest of the constituency or state involved. Self-interest is whatever conduces to the welfare or advantage of the body being governed; folly is a policy that in these terms is counter-productive." I loved the fact that she points out that it must be judged counter-productive in its own time, not merely by hindsight. This is important because all policy is determined by the mores of its age. "Nothing is more unfair, than to judge men of the past by the ideas of the present. Whatever may be said of morality, political wisdom is certainly ambulatory."</span><br data-dcnode-id="3475"><br data-dcnode-id="3474"><span data-dcnode-id="3473" instrument_node="">Absolutely and well said. Then she proceeds to show four historical examples of "Wooden-headedness", as she calls it, and what the alternatives could have been. First starting with a chapter showing examples of pursuing contrary policy she then focuses on the first of the four. It is the prototype of future folly, starting in the mists of Time, with the Trojan War. Tuchman looks into why exactly the Trojans took in the Wooden Horse.</span><br data-dcnode-id="3472"><br data-dcnode-id="3471"><span data-dcnode-id="3470" instrument_node="">Then we transition to the year 1470 AD and look at the Renaissance Popes. Especially the stretch of 1470-1530 where the Catholic Church manages to destroy their own credibility and provoke the Protestant Secession. Looking into a string of either corrupt or inept Popes and their reign we are introduced to such fascinating figures as Sixtus IV (Francesco della Rovere, 1471-84); Innocent VIII (Giovanni Battista Cibo, 1484-92); my personal favorite, Alexander VI (Rodrigo Borgia, 1492-1503)..side note, yeah he, father of Lucrezia and Cesare Borgia fame. Also Friar Savonarola's "Bonfire of Vanities". Then we move on to Julius II (Giuliano della Rovere, 1503-13). A warrior Pope, famous for his association with Michelangelo. He also created the crisis with the Indulgences that were to provoke Martin Luther into his protest.</span><br data-dcnode-id="3469"><br data-dcnode-id="3468"><span data-dcnode-id="3467" instrument_node="">We then move on to 1763-83 analysis of why the British Empire lost control of America. Taking into account a variety of players, Tuchman looks at the beliefs and misconceptions that abounded in the minds of the holders of high office in England. </span><br data-dcnode-id="3466"><br data-dcnode-id="3465"><span data-dcnode-id="3464" instrument_node="">Finally, forward to 1945, she looks at the policy that led America to enter Vietnam. Starting with the complexities of the French and their inability to get along with anyone not French, she looks at how the French, in their desire to try to retain Colonial influence, threatened to not cooperate with the US in Europe, unless the US provided support for the French efforts in Vietnam. Tuchman shows how America betrayed its principles in supporting a colonial policy that in turn gradually dragged in the US military and eventually had the US fighting against North Vietnam for seven years, just to leave so that Communists could commit democide on the South Vietnamese anyways. Democide, BTW, is the murder of any person or people by their government, including genocide, politicide, and mass murder. Statistics vary but when the Communists, after victory, in Saigon decided to reduce the population of Saigon, which had become swollen with an influx of people during the war and was now overcrowded with high unemployment. "Re-education classes" for former soldiers in the ARVN indicated that in order to regain full standing in society they would need to move from the city and take up farming. This grand Communist utopian scheme resulted in anywhere from 1.5 million people being displaced. An additional 200,000-300,000 met a grisly end in "Re-Education" camps. Sadly this would have happened regardless, as is the case where any Communist regime rules (remember dissent is not a collective ideal, freedom of speech, belief, and thought are anathema to Communists, just as it is to Nazis.) Something to bear in mind. Leftism, like Far Rightism, is inimical and antitehtical to the normal political gamut of liberal to conservative.</span><br data-dcnode-id="3463"><br data-dcnode-id="3462"><span data-dcnode-id="3461" instrument_node="">Thus ends a fascinating review of folly through the span of man. In this day and age, we do love to forget the past. The idiocy of the past is something we presume to have outgrown. Thus THIS time, they (the leaders, the media, the pundits, etc) have it all right. THIS time humanity will see an era of progress and love and humility...blah blah blah. Obviously, I do not believe it. History does not repeat, but if you study enough of it you'll find a tale that is as detailed and implicit in our very DNA. While the overall arcs of history trend(in certain historical charts of development) to peak upwards, do not forget that the timeline has its peaks and valleys. Woe unto you who dwell in such interesting times. But, hey, no worries at all. THIS time these guys have it ALL figured out (the media says so). Cool beans. Do I believe them? About as much as I believe in God :) Anyways, I'll get off my soapbox... I plan on checking out in about 2 decades or so, thus I shall not be around to see the outcome. Enjoy yourselves! I've got weed to smoke, shit to do, and places I've never seen before to visit. But hey for the rest of you stuck here? Why not read this excellent history book about folly throughout the human ages? It might help you question everything you hear and remember that governments don't always "govern" well to their best advantage and the costs often take decades to manifest. As with anything Tuchman touches-it's magnificent.</span></span><span data-dcnode-id="3459" instrument_node="">

</span><span data-dcnode-id="3371" id="freeTextContainer13580039004944155145"><span data-dcnode-id="3378" instrument_node="">About 8 years ago when I read this book I would have given it 4 stars. It gets a 5 today simply because it is much more pertinent to read it now. </span><br data-dcnode-id="3377"><br data-dcnode-id="3376"><span data-dcnode-id="3375" instrument_node="">Barbara Tuchman is one of the great writers of history. She remembers the first rule of history: Tell a story. In this one she tells several and keeps your attention better. The theme is imaginative and appropriate. It is also not a very long book so you can easily read it in a week. </span><br data-dcnode-id="3374"><br data-dcnode-id="3373"><span data-dcnode-id="3372" instrument_node="">Barbara Tuchman has a way of viewing history as few can. Instead of f</span></span><span data-dcnode-id="3370" instrument_node="">
</span><span data-dcnode-id="3342" id="freeText13580039004944155145" style="display:none"><span data-dcnode-id="3369" instrument_node="">About 8 years ago when I read this book I would have given it 4 stars. It gets a 5 today simply because it is much more pertinent to read it now. </span><br data-dcnode-id="3368"><br data-dcnode-id="3367"><span data-dcnode-id="3366" instrument_node="">Barbara Tuchman is one of the great writers of history. She remembers the first rule of history: Tell a story. In this one she tells several and keeps your attention better. The theme is imaginative and appropriate. It is also not a very long book so you can easily read it in a week. </span><br data-dcnode-id="3365"><br data-dcnode-id="3364"><span data-dcnode-id="3363" instrument_node="">Barbara Tuchman has a way of viewing history as few can. Instead of falling back on just "telling of a story," Tuchman does what few historians are able to pull off without sounding self-rightious. She gives us a comentary. Kind of like the "color-man" while listening to a sporting event, Tuchman examines the idea of "folly," or the persistent pursuit of a policy by government or those in power that is "contradictory to their own interests." Since a topic like this could take volumes, the author chooses 4 primary historical examples: the Fall of Troy, the breakup of of the Holy See in the 16th century, the British monarchy's vain attempt to keep the American colonies, and America's own arrogant persistence during the Vietnam War. </span><br data-dcnode-id="3362"><span data-dcnode-id="3361" instrument_node="">The fault in this book is that this subject matter can be pretty exhausting even with the only 450 page book. The examples used are valid and make sense. The author finds something different within each one that allows us to see the many levels of government folly. However I found the chapters dealing with the six terrible popes to be mind-numbing. Perhaps it's due to the fact that this history is not examined extensively in current day curricula like the American Revolution and Vietnam, but I think this section was tedious and repetitive. Also, within the Vietnam chapters, Ms. Tuchman tends to reveal her adoration towards Kennedy--like many historians of her era--and her disdain of the Johnson and Nixon administrations. This can distort her objective examination of the topic in some areas, but if it is noticed and ignored, the rest of the study is outstanding. Some may read these excerpts and label them as "liberal" but they are ignorant of history. </span><br data-dcnode-id="3360"><br data-dcnode-id="3359"><span data-dcnode-id="3358" instrument_node="">In any event the book is an excellent supplement to studying Machiavellian politics. The governments' "wood-headedness" towards policy that is counter to anything rational (as well as contrary to respected voices of reason) is something that all ordinary members and voters of a democratic society ought to take heed of. </span><br data-dcnode-id="3357"><br data-dcnode-id="3356"><span data-dcnode-id="3355" instrument_node="">The example of Troy is used simply as an example of how Homer and the Greeks had foreseen and probably experienced, the lack of reason when pursuing particular policy. This is usually done because those in power are so consumed by power and what it brings, that their arrogance and ignorance blinds them. </span><br data-dcnode-id="3354"><br data-dcnode-id="3353"><span data-dcnode-id="3352" instrument_node="">Without carrying this review too far into the book's wonderful and biting commentary, I will just say that this book is recommended, but not for those that have no real experience with intellectual historical study. Some areas will be interesting, such as the Vietnam chapters, but otherwise the book would dull the amateur historian. But if you do wish to challenge yourself and your understanding of how power corrupts and destroys after it corrupts, then "March of Folly" will be admired. </span><br data-dcnode-id="3351"><br data-dcnode-id="3350"><span data-dcnode-id="3349" instrument_node="">All politicians should be forced to read this book. Kind of like a supplement instructional manual for their job...paid for by taxpayers. Within 100 years, they might actaully learn something. </span><br data-dcnode-id="3348"><br data-dcnode-id="3347"><br data-dcnode-id="3346"><br data-dcnode-id="3345"><br data-dcnode-id="3344"><br data-dcnode-id="3343"></span><span data-dcnode-id="3341" instrument_node="">

        rated it
        </span><span class="staticStars notranslate" data-dcnode-id="3264" title="it was amazing"><span class="staticStar p10" data-dcnode-id="3269" size="15x15"><span data-dcnode-id="3270" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="3268" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3267" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3266" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3265" size="15x15"></span></span><span data-dcnode-id="3263" instrument_node="">

</span><span data-dcnode-id="3249" id="freeTextContainer13296159290184409622"><b data-dcnode-id="3254"><span data-dcnode-id="3258" instrument_node="">
</span><i data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">The March of Folly</span></i><span data-dcnode-id="3255" instrument_node="">
</span></b><span data-dcnode-id="3253" instrument_node=""> is an unfortunate title. Or maybe not so unfortunate. Because, after all, what is folly?</span><br data-dcnode-id="3252"><br data-dcnode-id="3251"><span data-dcnode-id="3250" instrument_node="">	Barbara Tuchman gives us several examples of the human animal at its worst — but parading at its best. From Ancient Troy right up through Vietnam (can a sequel including Chechnia, the former Yugoslavia, Iraq and Afghanistan be far behind?), we have proved ourselves to be little better than the apes. If there’s a difference, it’s only in the splendor of our rebarbative behavior. Kings, </span></span><span data-dcnode-id="3248" instrument_node="">
</span><span data-dcnode-id="3198" id="freeText13296159290184409622" style="display:none"><b data-dcnode-id="3243"><span data-dcnode-id="3247" instrument_node="">
</span><i data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">The March of Folly</span></i><span data-dcnode-id="3244" instrument_node="">
</span></b><span data-dcnode-id="3242" instrument_node=""> is an unfortunate title. Or maybe not so unfortunate. Because, after all, what is folly?</span><br data-dcnode-id="3241"><br data-dcnode-id="3240"><span data-dcnode-id="3239" instrument_node="">	Barbara Tuchman gives us several examples of the human animal at its worst — but parading at its best. From Ancient Troy right up through Vietnam (can a sequel including Chechnia, the former Yugoslavia, Iraq and Afghanistan be far behind?), we have proved ourselves to be little better than the apes. If there’s a difference, it’s only in the splendor of our rebarbative behavior. Kings, Popes, Ministers, Generals … it’s all the same. And the tragedy? Invariably, the loss of so many young lives to no real purpose other than to serve the interests of ambition, pride, ignorance, stubbornness — in short, of vanity.</span><br data-dcnode-id="3238"><br data-dcnode-id="3237"><span data-dcnode-id="3236" instrument_node="">	Yes, </span><i data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">vanitas, vanitatis.</span></i><span data-dcnode-id="3233" instrument_node=""> It’s all right there in </span><b data-dcnode-id="3228"><span data-dcnode-id="3232" instrument_node="">
</span><i data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">Ecclesiastes,</span></i><span data-dcnode-id="3229" instrument_node="">
</span></b><span data-dcnode-id="3227" instrument_node=""> and not much has changed. We are a prideful, belligerent, deceitful, artful, malignant, umbragious — a word I learned in reading this book—species. In short, we’re prone to folly.</span><br data-dcnode-id="3226"><br data-dcnode-id="3225"><span data-dcnode-id="3224" instrument_node="">	And who pays the ultimate price of that folly? Our youth.</span><br data-dcnode-id="3223"><br data-dcnode-id="3222"><span data-dcnode-id="3221" instrument_node="">	I cannot remember being so disheartened by a book since I read, at a young and impressionable age, </span><b data-dcnode-id="3216"><span data-dcnode-id="3220" instrument_node="">
</span><i data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">A History of Torture</span></i><span data-dcnode-id="3217" instrument_node="">
</span></b><span data-dcnode-id="3215" instrument_node=""> — or more recently, Martha Gellhorn’s </span><b data-dcnode-id="3210"><span data-dcnode-id="3214" instrument_node="">
</span><i data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">The Face of War.</span></i><span data-dcnode-id="3211" instrument_node="">
</span></b><span data-dcnode-id="3209" instrument_node=""> If you want to continue believing that “all is best in the best of all possible worlds,” don’t read this book. If you want to continue believing that we are governed by people who know what’s best for us, don’t read this book. If you want to believe that the march of history is inevitable, don’t read this book.</span><br data-dcnode-id="3208"><br data-dcnode-id="3207"><span data-dcnode-id="3206" instrument_node="">	Ignore my suggestions at your own risk. But if you don’t, be prepared to undertake a life of activism — and don’t expect it to be a happy life. To buck folly is to question our very essence. And our essence would appear — if Ms. Tuchman’s major premise is to be believed — to be tragically farcical. That, or farcically tragic. The case of the former President Lyndon B. Johnson in one of this book’s final chapters could easily rival that of Shakespeare’s King Lear.</span><br data-dcnode-id="3205"><br data-dcnode-id="3204"><span data-dcnode-id="3203" instrument_node="">RRB</span><br data-dcnode-id="3202"><span data-dcnode-id="3201" instrument_node="">07/19/13</span><br data-dcnode-id="3200"><span data-dcnode-id="3199" instrument_node="">Brooklyn, NY</span></span><span data-dcnode-id="3197" instrument_node="">

</span><span class="readable" data-dcnode-id="3068" id="reviewTextContainer294375046"><span data-dcnode-id="3103" instrument_node="">
</span><span data-dcnode-id="3098" id="freeTextContainer12382769158470361323"><span data-dcnode-id="3102" instrument_node="">In this book Tuchman takes a step beyond the traditional historian's story-telling role to provide color-commentary about a specific subset of examples of misgovernment that she classifies as "folly." Not all examples of misgovernment can be classified as folly as explained in the following quotation.</span><br data-dcnode-id="3101"><blockquote data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">"Misgovernment is of four kinds, often in combination. They are: 1) tyranny or oppression ... , 2) excessive ambition ... , 3) incompetence or decadence ... , 4) folly or perversity. This books is c</span></blockquote></span><span data-dcnode-id="3097" instrument_node="">
</span><span data-dcnode-id="3073" id="freeText12382769158470361323" style="display:none"><span data-dcnode-id="3096" instrument_node="">In this book Tuchman takes a step beyond the traditional historian's story-telling role to provide color-commentary about a specific subset of examples of misgovernment that she classifies as "folly." Not all examples of misgovernment can be classified as folly as explained in the following quotation.</span><br data-dcnode-id="3095"><blockquote data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">"Misgovernment is of four kinds, often in combination. They are: 1) tyranny or oppression ... , 2) excessive ambition ... , 3) incompetence or decadence ... , 4) folly or perversity. This books is concerned with the last in a specific manifestation; that is, the pursuit of policy contrary to the self-interest of the constituency or state involved. Self-interest is whatever conduces to the welfare or advantage of the body being governed; folly is a policy that in these terms is counter-productive."</span></blockquote><br data-dcnode-id="3092"><span data-dcnode-id="3091" instrument_node="">Her definition of folly: </span><br data-dcnode-id="3090"><blockquote data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">“To qualify as folly for this enquiry, the policy adopted must meet three criteria: It must have been perceived as counter-productive in its own time, not merely by hindsight. This is important because all policy is determined by the mores of its age...Secondly, a feasible alternative course of action must have been available. To remove the problem from personality, a third criterion must be that the policy in question should be that of a group, not an individual ruler, and should persist beyond any one political lifetime.”</span></blockquote><br data-dcnode-id="3087"><span data-dcnode-id="3086" instrument_node="">The book then examines in detail four events from history that fit her criteria of folly; (1) Actions taken regarding the Trojan horse that led to the subsequent fall of Troy, (2) Actions taken by the Roman Catholic Papacy leading up to the Protestant Reformation, (3) Actions taken by the British government that lead to the American Revolutionary War, and (4) Decisions that led to American involvement in the Vietnam War. The Protestant Reformation and American Revolution are obviously significant turning points in world history. The fall of Troy is profound because it became a founding myth for Western Civilization. Inclusion of the Vietnam War in the book was a tilt toward commentary on a more recent example of folly, and is probably not all that significant in the long view of history. But the Vietnam War was fresh in the minds of readers when this book was first published in 1984, nine years after the fall of Saigon.</span><br data-dcnode-id="3085"><br data-dcnode-id="3084"><span data-dcnode-id="3083" instrument_node="">Implicit in Tuchman's definition of folly is the suggestion that if individuals in power at the time had been wiser the subsequent history could have played out in a peaceful manner. But my impression from the book is one of inevitability (or is it fate?) from the entangled politics of the times of each of the four historical events studied. It's interesting to note that people were present at the time of each event that anticipated and warned of needed reform or change in policy. But in each case the political inertia of the power structure was such to make heeding the warnings impossible.</span><br data-dcnode-id="3082"><br data-dcnode-id="3081"><span data-dcnode-id="3080" instrument_node="">Subsequent history supports the book's view regarding the folly of the Vietnam War. This book's review of U.S. involvement in the Vietnam War was a painful reminder for me of my own memories of living through that era in real life and real time. I see ominous parallels with current events in Afghanistan.</span><br data-dcnode-id="3079"><br data-dcnode-id="3078"><span data-dcnode-id="3077" instrument_node="">The following is a link to an excerpt from the book about "popes, power, and unrestrained lust:</span><br data-dcnode-id="3076"><a data-dcnode-id="3074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//delanceyplace.com/view-archives.php%3F3777" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3075" instrument_node="">https://delanceyplace.com/view-archiv...</span></a></span><span data-dcnode-id="3072" instrument_node="">

</span><span data-dcnode-id="2983" id="freeTextContainer6358747016987388286"><i data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">The March of Folly</span></i><span data-dcnode-id="2990" instrument_node=""> is Barbara Tuchman, a top-flight historian, at her best. It is also history at its best. And it is people at their worst.</span><br data-dcnode-id="2989"><br data-dcnode-id="2988"><span data-dcnode-id="2987" instrument_node="">In nearly all of her books, Tuchman goes well beyond sterile descriptions, facts, and timelines to get to the heart of what happened and why. In </span><i data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">The March of Folly</span></i><span data-dcnode-id="2984" instrument_node="">, she does not propose to examine a specific historical event or time period. Rather, she examines an underlying cause of many historical events, which is that people are stupid. In her introductio</span></span><span data-dcnode-id="2982" instrument_node="">
</span><span data-dcnode-id="2935" id="freeText6358747016987388286" style="display:none"><i data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">The March of Folly</span></i><span data-dcnode-id="2979" instrument_node=""> is Barbara Tuchman, a top-flight historian, at her best. It is also history at its best. And it is people at their worst.</span><br data-dcnode-id="2978"><br data-dcnode-id="2977"><span data-dcnode-id="2976" instrument_node="">In nearly all of her books, Tuchman goes well beyond sterile descriptions, facts, and timelines to get to the heart of what happened and why. In </span><i data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">The March of Folly</span></i><span data-dcnode-id="2973" instrument_node="">, she does not propose to examine a specific historical event or time period. Rather, she examines an underlying cause of many historical events, which is that people are stupid. In her introduction--the most valuable part of the book --she proposes a technical definition of "folly" and applies it to a full range of historical (and mythological) situations: the Trojans bringing in the Greek horse, Rehoboam raising taxes and splitting the Davidic Kingdom, Athens' Sicilian Expedition during the Peloponnesian War, the French and English stumbling into World War I, the Germans stumbling in to World War I, the Japanese bombing Pearl Harbor, and lots of others.</span><br data-dcnode-id="2972"><br data-dcnode-id="2971"><span data-dcnode-id="2970" instrument_node="">These situations constituted "folly" because they met the three criteria that Tuchman proposes:</span><br data-dcnode-id="2969"><br data-dcnode-id="2968"><span data-dcnode-id="2967" instrument_node="">1. They were against the interest of those who pursued them.</span><br data-dcnode-id="2966"><span data-dcnode-id="2965" instrument_node="">2. They were understood at the time, at least by some, to be against the interest of those who pursued them.</span><br data-dcnode-id="2964"><span data-dcnode-id="2963" instrument_node="">3. There were better alternatives available that were known and actively rejected.</span><br data-dcnode-id="2962"><br data-dcnode-id="2961"><span data-dcnode-id="2960" instrument_node="">The march of folly, then, is something like a slow-motion car wreck that could have been avoided, and that everybody saw coming, but that occurred anyway because one or both parties were locked into a course and lacked the will, but not the opportunity, to alter it.</span><br data-dcnode-id="2959"><br data-dcnode-id="2958"><span data-dcnode-id="2957" instrument_node="">The bulk of the book consists of fairly extensive analyses of three clear examples of folly in action: the Renaissance popes who failed to prevent the Protestant Reformation by persisting in depravity and extravagance long after it was clear that such behavior would not be tolerated by the nations of Europe; the arrogant British Empire that lost the American colonies by failing to realize that they could not use military force to compel obedience to people thousands of miles away who were fighting for their freedom; and the arrogant American nation that betrayed its own values and lost the respect of the world by failing to learn the lesson that they taught the British 200 years earlier.</span><br data-dcnode-id="2956"><br data-dcnode-id="2955"><span data-dcnode-id="2954" instrument_node="">Each of the case studies is fascinating in its own right, but Tuchman wisely does not delve deeper than she needs to for the argument she is making. All three of them are the subject of much longer and more detailed histories, and her point in the book is not to uncover history, but to understand it. She structures the three supporting narratives with as much parallelism as possible to distill the elements that they have in common. These elements can be considered the essential ingredients of folly. She does not list them as such, but these are the elements that I found most instructive (and, given our own age, 35 years after the book was published, most frightening):</span><br data-dcnode-id="2953"><br data-dcnode-id="2952"><span data-dcnode-id="2951" instrument_node="">First, in all three situations, the actors exhibited a sort of magical thinking about their own role in the universe. The Popes imagined that, no matter how flagrantly they flouted their offices, they were still chosen, and protected, by God. The British saw themselves as inherently superior to the colonists by virtue of their culture and their status as a global superpower; and the Americans held then, as many do now, a view of themselves as an exceptional, indispensable nation. None of them seriously thought that they could lose.</span><br data-dcnode-id="2950"><br data-dcnode-id="2949"><span data-dcnode-id="2948" instrument_node="">Furthermore, each of the powers had adopted a world view that was tragically incomplete, and they all fundamentally lacked the ability to understand other viewpoints. This attribute occurs in all three case studies, but it does so in different ways. The Popes saw the world largely through the lens of Italian politics, which were brutal, complicated, and all-consuming. They had their own wars with each other and, from time to time, with France and Spain. But they just didn't pay much attention to places like Germany, Sweden, and England, and they didn't understand how their actions were perceived. </span><br data-dcnode-id="2947"><br data-dcnode-id="2946"><span data-dcnode-id="2945" instrument_node="">The British were locked into a class-based view of the world, and they kept promoting inept peers and their inepter sons to important positions on the grounds that commoners could not be good at government or war. And because everybody in America was a commoner, they couldn't imagine being defeated by them. And the Americans were so locked into a bi-polar view of the world in which everybody was a communist or a lover of freedom. Their world view did not permit them to understand that the Vietnamese were interested in self-rule and did not care whether it came in the name of Karl Marx or Adam Smith.</span><br data-dcnode-id="2944"><br data-dcnode-id="2943"><span data-dcnode-id="2942" instrument_node="">In each case study too, the personal and political interests of the key decision-makers were not well-aligned with the interests of the state. During the build-up to Vietnam, for example, both Eisenhower and Kennedy had a strong political incentive to demonstrate their hatred of Communism. And the British ministers served at the pleasure of George III, who was both a doofus and a committed aristocrat. Taking a pro-Colonist position was the fastest way to unemployment.</span><br data-dcnode-id="2941"><br data-dcnode-id="2940"><span data-dcnode-id="2939" instrument_node="">And finally, and perhaps most tragically, the key players in all three scenarios succumbed to the rhetorical force of their own propaganda. Reform would destroy the Church, losing America would be the end of the British Empire, losing Vietnam would give the world to the Soviets. These arguments were initially advanced to further other policy goals, but, in time, they became incontrovertible doctrines that propelled people to continue a course of action for years--and in some cases decades--after it became apparent that the cause was hopeless and the consequences were not as dire as everyone believed.</span><br data-dcnode-id="2938"><br data-dcnode-id="2937"><span data-dcnode-id="2936" instrument_node="">It is true, of course, and Tuchman acknowledges it from the start, that it is easy to see folly in hindsight. But this is something that her initial assumptions control for, as an action cannot be considered "folly" unless there were people at the time saying exactly what people said afterwords. And this is why we should pay a lot of attention to her ingredient list today, as, in 2020, the United States (and much of the world) has all the ingredients in place: magical thinking, uncritical propaganda, a very poor understanding of what really is in our nation's interest, and a venial doofus in a position of great power who will fire anybody who says what he doesn't want to hear.</span></span><span data-dcnode-id="2934" instrument_node="">

</span><span data-dcnode-id="2835" id="freeText5508524651239570362" style="display:none"><span data-dcnode-id="2836" instrument_node="">When I was in the 4th grade I found a book that my Mom had to read for college in the back of a cupboard. That book was Barbara W. Tuchman's "A Distant Mirror", and I do believe that is what led me to all the other history books I've enjoyed in the years since. "The March of Folly" is a study of, in the authors' words, pursuit of policy contrary to self-interest, with four main examples. The Trojan horse, The Renaissance popes, the British loss of America, and America in Vietnam. I particularly enjoyed the Vietnam section, as I've really never read anything about it before. I didn't realize what a long and twisty road it was that led to the actual fighting, but this book explains everything very well, and in detail, but never in a boring way. It's just amazing, the utter blindness and stupidity of some of the people in high places, from way, way back, up to the present time.</span></span><span data-dcnode-id="2834" instrument_node="">

</span><span data-dcnode-id="2744" id="freeTextContainer12933834157090759293"><span data-dcnode-id="2751" instrument_node="">Barbara Tuchman was a journalist before becoming a history author, and despite </span><em data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">The March of Folly</span></em><span data-dcnode-id="2748" instrument_node=""> being a book about certain historical incidents, it is more a work of journalism than history. It is an investigation into the process by which governments embark on self-destructive courses ('folly'), despite recognition of the problem, and alternative courses being available. As such, it is more of a screed against certain practices, rather than a real attempt at balanced or impartial history.</span><br data-dcnode-id="2747"><br data-dcnode-id="2746"><span data-dcnode-id="2745" instrument_node="">The </span></span><span data-dcnode-id="2743" instrument_node="">
</span><span data-dcnode-id="2711" id="freeText12933834157090759293" style="display:none"><span data-dcnode-id="2742" instrument_node="">Barbara Tuchman was a journalist before becoming a history author, and despite </span><em data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">The March of Folly</span></em><span data-dcnode-id="2739" instrument_node=""> being a book about certain historical incidents, it is more a work of journalism than history. It is an investigation into the process by which governments embark on self-destructive courses ('folly'), despite recognition of the problem, and alternative courses being available. As such, it is more of a screed against certain practices, rather than a real attempt at balanced or impartial history.</span><br data-dcnode-id="2738"><br data-dcnode-id="2737"><span data-dcnode-id="2736" instrument_node="">The good news is that we're not treated to the faint sound of axes grinding. Instead, we're given front-row seats to the grinding wheel.</span><br data-dcnode-id="2735"><br data-dcnode-id="2734"><span data-dcnode-id="2733" instrument_node="">The book is split into four parts (with each one being longer than the last) on the Trojan Horse, the (start of) Reformation, the American Revolution, and Vietnam. Each is well written, but are effectively a completely separate work, since they just serve to try to illustrate her point, instead of having any inherent connection to each other.</span><br data-dcnode-id="2732"><br data-dcnode-id="2731"><span data-dcnode-id="2730" instrument_node="">The Trojan Horse section is purely illustrative of her point, since it's a discussion of myth, with little idea of what really happened. But it is a powerful story, and not a bad way to bring up themes, though I don't know that it's overly successful here.</span><br data-dcnode-id="2729"><br data-dcnode-id="2728"><span data-dcnode-id="2727" instrument_node="">The Reformation is really about the ten major Popes in the run up to Martin Luther's 95 Theses. As such, it paints a picture of the excesses and temporal politics of the office while calls for ecclesiastical reform go unheeded. The main problem is that it ignores that high office was seen as a means of self- (or family-) aggrandizement. The idea of the point of office being something bigger than the self is a more modern idea (this </span><em data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">is</span></em><span data-dcnode-id="2724" instrument_node=""> briefly addressed in the epilogue).</span><br data-dcnode-id="2723"><br data-dcnode-id="2722"><span data-dcnode-id="2721" instrument_node="">The American Revolution chapter mostly deals with events before the outbreak of fighting. Tuchman considers the end result of the conflict to be fairly inevitable (and right or wrong, this assumption helps keep her on-topic), and concentrates on how British policy ended up alienating people who </span><em data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">wanted</span></em><span data-dcnode-id="2718" instrument_node=""> to be part of the empire into rebelling. As such, it is a very good Britain-centric analysis of British policy and government.</span><br data-dcnode-id="2717"><br data-dcnode-id="2716"><span data-dcnode-id="2715" instrument_node="">Similarly, the Vietnam chapter is at its best before American troops get directly involved there. Starting with the French, and the unresolved difference in goals between them and our aid to them, it traces through the entire tragedy to the American pullout. The fighting isn't covered in any real sense, but the demands of rabid anti-communism with its fears of all communists everywhere working in concert with Moscow are well pointed out (though not as well developed as I'd like; though that'd probably be going off her topic).</span><br data-dcnode-id="2714"><br data-dcnode-id="2713"><span data-dcnode-id="2712" instrument_node="">An unaddressed theme that comes out of the last two parts is the fact that these crises often grow out of situations that just weren't seen as very important at the time. They were low-priority, low-impact items that only increased in importance after missteps had caused the situation to blow up. The real 'folly' may belong more to being unable to prioritize correctly, but even that is an exercise in hindsight.</span></span><span data-dcnode-id="2710" instrument_node="">
