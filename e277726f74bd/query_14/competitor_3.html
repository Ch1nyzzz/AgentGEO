</span><span data-dcnode-id="2623" id="freeTextContainer8095655376854925856"><span data-dcnode-id="2627" instrument_node="">I always enjoy Barbara Tuchman`s ability to write compelling and accessible history be it the oubreak of WWI or the life of a french aristorcrat in the 14th Century, add to that a job which allows me to experience folly in all its glory, I had sky high expectations of the book.</span><br data-dcnode-id="2626"><br data-dcnode-id="2625"><span data-dcnode-id="2624" instrument_node="">The premise was so promising, noted historian takes a four egregious disatsers the trojan horse, the papal actions in the lead up to Luther, the loss of the american colonies and the Vietnam war to understand what led to t</span></span><span data-dcnode-id="2622" instrument_node="">
</span><span data-dcnode-id="2608" id="freeText8095655376854925856" style="display:none"><span data-dcnode-id="2621" instrument_node="">I always enjoy Barbara Tuchman`s ability to write compelling and accessible history be it the oubreak of WWI or the life of a french aristorcrat in the 14th Century, add to that a job which allows me to experience folly in all its glory, I had sky high expectations of the book.</span><br data-dcnode-id="2620"><br data-dcnode-id="2619"><span data-dcnode-id="2618" instrument_node="">The premise was so promising, noted historian takes a four egregious disatsers the trojan horse, the papal actions in the lead up to Luther, the loss of the american colonies and the Vietnam war to understand what led to the decisions. Not only a fascinating premise but hopefully informative as well. Unfortunately of all her books this one feels the most like a forced fitting of history to make a point which perhaps could be more concisely put and in many cases I thought the desire to make the argument lead her to overstate the individual actions over the broad societal forces.</span><br data-dcnode-id="2617"><br data-dcnode-id="2616"><span data-dcnode-id="2615" instrument_node="">It is hard to really draw lessons from the trojan horse as I would have thought it is rather likely that the whole thing is a myth written by the victors. On the Papal actions in the lead up to the reformation was it really the individual actions of some degenerates who headed up a corrupt system or was it the emergence of nationalism in Europe? Also the popes were extraordinarily consistent in their actions so it is hard to see what was folly versus ingrained admittedly self destructive custom. On the British loss of the American colonies, Tuchman compellingly makes the case that leaving any enterprise in the hands of the amateur nitwits with drinking problems that constituted the British government was not the best of ideas. I would argue that with no reform the same type of nitwit managed go on to build a very large empire and was there really anything wiser council would have done but delay the inevitable.</span><br data-dcnode-id="2614"><br data-dcnode-id="2613"><span data-dcnode-id="2612" instrument_node="">The strongest part of the boook deals with the Vietnam war as it is here that some of the tentatively drawn conclusions from the earlier periods seem most relevant. The dangers of group think, the courage needed to challenge the status quo and above all a ruling body that pursues principle no matter how misguided and no matter how divorced from reality. Having said all of that while interesting the whole book feels like you could have also picked examples where some of those features led to unliekly success. For example the wise thing for Churchill in 1940 would have been to negotiate peace with Nazi Germany. In that case the stand on principle versus pragmatic reality is lauded as courageous and visonary.</span><br data-dcnode-id="2611"><br data-dcnode-id="2610"><span data-dcnode-id="2609" instrument_node="">Interesting but not the brilliant book I was really hoping for.</span></span><span data-dcnode-id="2607" instrument_node="">

</span><span data-dcnode-id="2509" id="freeTextContainer1883956927305492177"><span data-dcnode-id="2524" instrument_node="">I'd love to know what Barbara Tuchman, who wrote this in 1984, would think of the current U.S. political situation.</span><br data-dcnode-id="2523"><br data-dcnode-id="2522"><span data-dcnode-id="2521" instrument_node="">From the epilogue:</span><br data-dcnode-id="2520"><br data-dcnode-id="2519"><i data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">In America, where the electoral process is drowning in commercial techniques of fund-raising and image-making, we may have completed a circle back to a selection process as unconcerned with qualifications as that which made Darius King of Persia.</span></i><br data-dcnode-id="2516"><br data-dcnode-id="2515"><span data-dcnode-id="2514" instrument_node="">And what was that, you might ask?</span><br data-dcnode-id="2513"><br data-dcnode-id="2512"><i data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">When he and six fellow conspirators, as recorded by Herodotus, overthrew the reigning de</span></i></span><span data-dcnode-id="2508" instrument_node="">
</span><span data-dcnode-id="2471" id="freeText1883956927305492177" style="display:none"><span data-dcnode-id="2507" instrument_node="">I'd love to know what Barbara Tuchman, who wrote this in 1984, would think of the current U.S. political situation.</span><br data-dcnode-id="2506"><br data-dcnode-id="2505"><span data-dcnode-id="2504" instrument_node="">From the epilogue:</span><br data-dcnode-id="2503"><br data-dcnode-id="2502"><i data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">In America, where the electoral process is drowning in commercial techniques of fund-raising and image-making, we may have completed a circle back to a selection process as unconcerned with qualifications as that which made Darius King of Persia.</span></i><br data-dcnode-id="2499"><br data-dcnode-id="2498"><span data-dcnode-id="2497" instrument_node="">And what was that, you might ask?</span><br data-dcnode-id="2496"><br data-dcnode-id="2495"><i data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">When he and six fellow conspirators, as recorded by Herodotus, overthrew the reigning despot, they discussed what kind of government - whether a monarchy of one or an oligarchy of the wisest men - they should establish. Darius argued that they should keep to the rule of one and obtain the best government by choosing "the very best man in the whole state." Being persuaded, the group agreed to ride out together next morning and he whose horse was the first to neigh at sunrise should be King. By ruse of a clever groom who tethered a favorite mare at the critical spot, Darius' horse performed on time and his fortunate master, thus singled out as the best man for the job, ascended the throne.</span></i><br data-dcnode-id="2492"><br data-dcnode-id="2491"><span data-dcnode-id="2490" instrument_node="">Sounds like the 2016 election alright, except it was Putin holding a dog-whistle meme pony over the hill and the criteria was whoever made the "libtards" cry harder. #MAGA</span><br data-dcnode-id="2489"><br data-dcnode-id="2488"><span data-dcnode-id="2487" instrument_node="">Books like this don't make my view of humanity less dim. Thanks, Barb! I appreciate your dedication to keeping it real.</span><br data-dcnode-id="2486"><br data-dcnode-id="2485"><span data-dcnode-id="2484" instrument_node="">The final portion was pretty long and hefty on Vietnam and, immediately coming off 18 hours of the Ken Burns documentary, the momentum dragged. However, if anything illustrates Tuchman's thesis brilliantly, it's Vietnam.</span><br data-dcnode-id="2483"><br data-dcnode-id="2482"><span data-dcnode-id="2481" instrument_node="">I think the inclusion of Troy was a bit of a stretch since it relies on literature rather than history to make its point, but as literature is often about human folly, I guess it works. However, I wish she had trimmed the Vietnam portion back and included another historical event of a government pursuing a pointless, defeating goal. Maybe Henry VIII's Dissolution of the Monasteries?</span><br data-dcnode-id="2480"><br data-dcnode-id="2479"><span data-dcnode-id="2478" instrument_node="">All Tuchman is good Tuchman, but this one wasn't as engaging as </span><a data-dcnode-id="2476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/568236.A_Distant_Mirror_The_Calamitous_14th_Century" rel="nofollow noopener" title="A Distant Mirror The Calamitous 14th Century by Barbara W. Tuchman"><span data-dcnode-id="2477" instrument_node="">A Distant Mirror: The Calamitous 14th Century</span></a><span data-dcnode-id="2475" instrument_node="">, but better than </span><a data-dcnode-id="2473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/613792.The_Zimmermann_Telegram" rel="nofollow noopener" title="The Zimmermann Telegram by Barbara W. Tuchman"><span data-dcnode-id="2474" instrument_node="">The Zimmermann Telegram</span></a><span data-dcnode-id="2472" instrument_node="">.</span></span><span data-dcnode-id="2470" instrument_node="">

</span><span data-dcnode-id="2383" id="freeTextContainer13647219702079618243"><span data-dcnode-id="2390" instrument_node="">Man, talk about phoning it in....</span><br data-dcnode-id="2389"><br data-dcnode-id="2388"><span data-dcnode-id="2387" instrument_node="">Years ago I read Barbara Tuchman's famous "Guns of August" and thought it was great. So I'd give this one a shot. Big mistake.</span><br data-dcnode-id="2386"><br data-dcnode-id="2385"><span data-dcnode-id="2384" instrument_node="">She's just slumming it here; not trying very hard. The theme is times in history when a nation engaged in folly - self-defeating behavior. That's a pretty broad theme that in encapsulate tons of examples. She focuses on four items that don't really have much to do w/ each other, but she felt like talking about. Well, really three things (s</span></span><span data-dcnode-id="2382" instrument_node="">
</span><span data-dcnode-id="2365" id="freeText13647219702079618243" style="display:none"><span data-dcnode-id="2381" instrument_node="">Man, talk about phoning it in....</span><br data-dcnode-id="2380"><br data-dcnode-id="2379"><span data-dcnode-id="2378" instrument_node="">Years ago I read Barbara Tuchman's famous "Guns of August" and thought it was great. So I'd give this one a shot. Big mistake.</span><br data-dcnode-id="2377"><br data-dcnode-id="2376"><span data-dcnode-id="2375" instrument_node="">She's just slumming it here; not trying very hard. The theme is times in history when a nation engaged in folly - self-defeating behavior. That's a pretty broad theme that in encapsulate tons of examples. She focuses on four items that don't really have much to do w/ each other, but she felt like talking about. Well, really three things (she spends just one brief chapter on the fourth item, Troy in the Trojan War). </span><br data-dcnode-id="2374"><br data-dcnode-id="2373"><span data-dcnode-id="2372" instrument_node="">The big three are Renaissance Popes, British policies that cost them their 13 North American colonies, and the US stumble into and through Vietnam. Nothing really links these things except "self-defeating folly" and that's just a weak hook to link these things together. I never felt there were any real lessons to be learned in Tuchman's telling. She was just telling tales she felt like rehashing. </span><br data-dcnode-id="2371"><br data-dcnode-id="2370"><span data-dcnode-id="2369" instrument_node="">And it was just rehashing. She was retelling twice-told tales without much original thought to add. The length she devoted to her topics are the ideal bad length. On the one hand, it's too long -- at about 100 pages per part, it becomes a slog to get through each. On the other hand, it's too short. Heck, if she'd just decided to write a book about the US and Vietnam, I'd have more respect for it. At least I'd know what I was getting going into it. If the sections were shorter, the lack of original insight would be acceptable. (This is the approach of many snapshot, for-fun history books that tell you of "100 Greatest Mistakes in History" or whatever). If it was longer, maybe she'd have time to provide insight. But you get neither. It's too long to be fun and too unoriginal to be worth reading.</span><br data-dcnode-id="2368"><br data-dcnode-id="2367"><span data-dcnode-id="2366" instrument_node="">I mostly skimmed over the last two-thirds. I got nothing out of the first third when I tried to read it, and I didn't seem over the parts I skimmed. Just a terrible, terrible book.</span></span><span data-dcnode-id="2364" instrument_node="">

</span><span data-dcnode-id="2264" id="freeTextContainer7782135018925059041"><span data-dcnode-id="2271" instrument_node="">A fascinating attempt by Tuchman to explain or at least illustrate why governments choose the wrong path even when they know it's the wrong path. She begins with the story of the Trojan Horse to illustrate the first written example of governmental folly leading to disaster.</span><br data-dcnode-id="2270"><br data-dcnode-id="2269"><span data-dcnode-id="2268" instrument_node="">The next three examples are of the Renaissance Popes, the British handling of the American Revolution and the American actions before and during the Vietnamese War.</span><br data-dcnode-id="2267"><br data-dcnode-id="2266"><span data-dcnode-id="2265" instrument_node="">The popes, in spite of criticism from many clerics and kings c</span></span><span data-dcnode-id="2263" instrument_node="">
</span><span data-dcnode-id="2246" id="freeText7782135018925059041" style="display:none"><span data-dcnode-id="2262" instrument_node="">A fascinating attempt by Tuchman to explain or at least illustrate why governments choose the wrong path even when they know it's the wrong path. She begins with the story of the Trojan Horse to illustrate the first written example of governmental folly leading to disaster.</span><br data-dcnode-id="2261"><br data-dcnode-id="2260"><span data-dcnode-id="2259" instrument_node="">The next three examples are of the Renaissance Popes, the British handling of the American Revolution and the American actions before and during the Vietnamese War.</span><br data-dcnode-id="2258"><br data-dcnode-id="2257"><span data-dcnode-id="2256" instrument_node="">The popes, in spite of criticism from many clerics and kings continued to enrich themselves and their families, dissipating the power of the papacy, until the Reformation forced a behavioral change.</span><br data-dcnode-id="2255"><br data-dcnode-id="2254"><span data-dcnode-id="2253" instrument_node="">The British arrogantly ignored the reality of the American colonist's unwillingness to be treated as second class citizens and continued to pursue a series of policies that led to a 6 year war, a war they knew they could neither win nor afford after the Battle of Saratoga in 1776.</span><br data-dcnode-id="2252"><br data-dcnode-id="2251"><span data-dcnode-id="2250" instrument_node="">The Americans acted under the illusion that they were fighting against Communism and restraining the so-called domino effect when in reality they were fighting against those who believed they were fighting a war of national liberation. I found this to be the most interesting section as time and time again the politicians chose to ignore the facts and opinions of many to pursue an un-winnable conflict.</span><br data-dcnode-id="2249"><br data-dcnode-id="2248"><span data-dcnode-id="2247" instrument_node="">While this is not the most gripping of Tuchman's writings, it is a very readable exploration of the blindness of those who often lead nations into conflicts they cannot win. </span></span><span data-dcnode-id="2245" instrument_node="">

</span><span data-dcnode-id="2146" id="freeTextContainer10799775337134085875"><b data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Contents (By section)</span></b><br data-dcnode-id="2154"><span data-dcnode-id="2153" instrument_node="">1. Pursuit of Policy Contrary to Self-Interest (This one chapter gives a succinct overview of the rest of the book.)</span><br data-dcnode-id="2152"><span data-dcnode-id="2151" instrument_node="">2. Prototype: The Trojans Take the Wooden Horse Within Their Walls (Again one chapter)</span><br data-dcnode-id="2150"><span data-dcnode-id="2149" instrument_node="">3. The Renaissance Popes Provoke the Protestant Secession 1470-1530 (With one chapter devoted to each of the major popes during this period, the abuses get worse and worse as time goes on.)</span><br data-dcnode-id="2148"><span data-dcnode-id="2147" instrument_node="">4. The British Lose America (20 years of fumbles - not paying any attention to the mood </span></span><span data-dcnode-id="2145" instrument_node="">
</span><span data-dcnode-id="2069" id="freeText10799775337134085875" style="display:none"><b data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Contents (By section)</span></b><br data-dcnode-id="2142"><span data-dcnode-id="2141" instrument_node="">1. Pursuit of Policy Contrary to Self-Interest (This one chapter gives a succinct overview of the rest of the book.)</span><br data-dcnode-id="2140"><span data-dcnode-id="2139" instrument_node="">2. Prototype: The Trojans Take the Wooden Horse Within Their Walls (Again one chapter)</span><br data-dcnode-id="2138"><span data-dcnode-id="2137" instrument_node="">3. The Renaissance Popes Provoke the Protestant Secession 1470-1530 (With one chapter devoted to each of the major popes during this period, the abuses get worse and worse as time goes on.)</span><br data-dcnode-id="2136"><span data-dcnode-id="2135" instrument_node="">4. The British Lose America (20 years of fumbles - not paying any attention to the mood of the people in the colonies, not evaluating how likely their methods are to succeed. Their ineptitude pushes the colonies towards rebellion.)</span><br data-dcnode-id="2134"><span data-dcnode-id="2133" instrument_node="">5. American Betrays Herself in Vietnam (1945-1973 The idiocy of the French is described in the book, and then the American presidents go down the same path.)</span><br data-dcnode-id="2132"><span data-dcnode-id="2131" instrument_node="">6. Epilogue (Is there any hope for doing better?)</span><br data-dcnode-id="2130"><br data-dcnode-id="2129"><span data-dcnode-id="2128" instrument_node="">Barbara Tuchman did a though job of documenting the unwillingness to see and unwillingness to admit mistakes that plague leaders. Prideful, unwilling to admit error, leaders boneheadedly pursue the path they set, unwilling to bear the humiliation of admitting they were wrong.</span><br data-dcnode-id="2127"><br data-dcnode-id="2126"><span data-dcnode-id="2125" instrument_node="">The epilogue mentions several attempts to create a government immune to the plague caused by men possessing power. She doesn’t hold out much hope. </span><br data-dcnode-id="2124"><br data-dcnode-id="2123"><span data-dcnode-id="2122" instrument_node="">I think of the constitution of the United States with it’s system of checks and balances, which has lasted for over 200 years, but is under severe strain. "Our Constitution was made only for a moral and religious people. It is wholly inadequate to the government of any other.” (John Adams in a speech to the military in 1798)</span><br data-dcnode-id="2121"><br data-dcnode-id="2120"><span data-dcnode-id="2119" instrument_node=""> “To qualify as folly for this inquiry, the policy adopted must meet three criteria: it must have been perceived as counter-productive in its own time, not merely by hindsight. … Secondly a feasible alternative course of action must have been available. … a third criterion must be that the policy in question should be that of a group, not an individual ruler, and should persist beyond any one political lifetime." (Page 5) </span><br data-dcnode-id="2118"><br data-dcnode-id="2117"><span data-dcnode-id="2116" instrument_node=""> "[Solon’s] decisions suggest that </span><b data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">an absence of overriding person ambition together with shrewd common sense are among the essential components of wisdom.</span></b><span data-dcnode-id="2113" instrument_node=""> In the notes of his early life, writing of himself in the third person, Solon put it differently: ‘Each day he grew older and learned something new.’” (Page 17)</span><br data-dcnode-id="2112"><br data-dcnode-id="2111"><span data-dcnode-id="2110" instrument_node=""> “Social systems can survive a good deal of folly when circumstances are historically favorable, or when bungling is cushioned by large resources or absorbed by sheer size as in the United States during its period of expansion. Today, when there are no more cushions, folly is less affordable.” (Page 19)</span><br data-dcnode-id="2109"><br data-dcnode-id="2108"><span data-dcnode-id="2107" instrument_node=""> Revocation of the Edict of Nantes in 1685 (Page 19)</span><br data-dcnode-id="2106"><a data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edict_of_Nantes" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2105" instrument_node="">https://en.wikipedia.org/wiki/Edict_o...</span></a><br data-dcnode-id="2103"><br data-dcnode-id="2102"><span data-dcnode-id="2101" instrument_node=""> “Throughout history cases of military folly have been innumerable, but they are outside the scope of this inquiry.” (Page 25)</span><br data-dcnode-id="2100"><br data-dcnode-id="2099"><span data-dcnode-id="2098" instrument_node=""> “A principle that emerges in the cases so far mentioned is that folly is a child of power. We all know, from unending receptions of Lord Acton’s dictum, that power corrupts. We are less aware that it breeds folly; that the power to command frequently causes failure to think;” (Page 32)</span><br data-dcnode-id="2097"><br data-dcnode-id="2096"><span data-dcnode-id="2095" instrument_node=""> “The pages that follow will tell a more familiar and — unhappily for mankind — a more persistent story. The ultimate outcome of a policy is not what determines its qualification as folly. All misgovernment is contrary to self-interest in the long run, but may actually strengthen a regime temporarily. It qualifies as folly when it is a perverse persistence in a policy demonstrably unworkable or counter-productive. It seems almost superfluous to say that the present study stems from the ubiquity of this problem in our time. (Page 33)</span><br data-dcnode-id="2094"><br data-dcnode-id="2093"><span data-dcnode-id="2092" instrument_node=""> “Opulent elegant, unprincipled and endlessly at odds with each other, the rulers of Italian life were, by reason of their disunity and limited territorial scope, no more than potentates of discord. In reproducing their avarice and luxury, the six popes did no better than their models and, because of their superior status, usually worse. (Page 53)</span><br data-dcnode-id="2091"><br data-dcnode-id="2090"><span data-dcnode-id="2089" instrument_node=""> “Prison does not silence ideas whose time has come, a fact that generally escapes despots, who by nature are rulers of little wisdom. (Page 65)</span><br data-dcnode-id="2088"><br data-dcnode-id="2087"><span data-dcnode-id="2086" instrument_node=""> “The most grievous danger for any pope, … lies in the face that encompassed as he is by flatters, he never hears the truth about his own person and ends by not wishing to hear it.” (Page 85)</span><br data-dcnode-id="2085"><br data-dcnode-id="2084"><span data-dcnode-id="2083" instrument_node=""> “Writing in the same years 1510-20, Machiavelli found proof of decadence in the fact ‘that the nearer people are to the Church of Rome, which is the head of our religion, the less religious are they.’” (Page 112)</span><br data-dcnode-id="2082"><br data-dcnode-id="2081"><b data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Chapter 4: The British Lose America</span></b><br data-dcnode-id="2078"><br data-dcnode-id="2077"><span data-dcnode-id="2076" instrument_node=""> “The first thing to be said about the British relation to America was that while the colonies were considered of vital importance to the prosperity and world status of Britain, very little thought or attention was paid to them.” (Page 130)</span><br data-dcnode-id="2075"><br data-dcnode-id="2074"><span data-dcnode-id="2073" instrument_node=""> “Social pleasures tended to come first; office was attended to in the time remaining.” (Page 136) This reminds me of the depiction of men in the novels of Jane Austen. </span><br data-dcnode-id="2072"><br data-dcnode-id="2071"><span data-dcnode-id="2070" instrument_node=""> “That physical exercise and a vegetarian diet were remedial was known, but the theory of opposites, one of the least helpful precepts of 18th-century medicine, was preferred by Chatham’s physician, a Dr. Addington. A specialist in lunacy, or ‘mad-doctor,’ he hoped to induce a violent fit of gout on the theory that this would drive out the mental disorder. … That he survived at all … represents one of man’s occasional triumphs over medicine.” (Page 173-174)</span></span><span data-dcnode-id="2068" instrument_node="">

</span><span data-dcnode-id="1873" id="freeTextContainer473079968858367061"><span data-dcnode-id="1880" instrument_node="">Good topic, but a little dry, fairly dense, and not as good as </span><a data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/11366.The_Guns_of_August" rel="nofollow noopener" title="The Guns of August by Barbara W. Tuchman"><span data-dcnode-id="1879" instrument_node="">The Guns of August</span></a><span data-dcnode-id="1877" instrument_node="">. The author looks at the causes of four historical "folly" events - the Trojan Horse, 6 corrupt Renaissance Popes (leading to the Reformation and a sack of Rome), the lead-up to the American revolution (primarily from the British side), and finally French and American involvement in Vietnam and SE Asia.</span><br data-dcnode-id="1876"><br data-dcnode-id="1875"><span data-dcnode-id="1874" instrument_node="">These follies are chosen because viable alternatives were available and popularly supported, and the decisions wer</span></span><span data-dcnode-id="1872" instrument_node="">
</span><span data-dcnode-id="1861" id="freeText473079968858367061" style="display:none"><span data-dcnode-id="1871" instrument_node="">Good topic, but a little dry, fairly dense, and not as good as </span><a data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/11366.The_Guns_of_August" rel="nofollow noopener" title="The Guns of August by Barbara W. Tuchman"><span data-dcnode-id="1870" instrument_node="">The Guns of August</span></a><span data-dcnode-id="1868" instrument_node="">. The author looks at the causes of four historical "folly" events - the Trojan Horse, 6 corrupt Renaissance Popes (leading to the Reformation and a sack of Rome), the lead-up to the American revolution (primarily from the British side), and finally French and American involvement in Vietnam and SE Asia.</span><br data-dcnode-id="1867"><br data-dcnode-id="1866"><span data-dcnode-id="1865" instrument_node="">These follies are chosen because viable alternatives were available and popularly supported, and the decisions were taken by groups instead of individuals. Her point is that group think and a focus on assumptions despite overwhelming evidence to the contrary leads to a reinforcing spiral of wrong choices. Her hope is that wisdom among leaders could overcome these choices.</span><br data-dcnode-id="1864"><br data-dcnode-id="1863"><span data-dcnode-id="1862" instrument_node="">Regardless of whether one could argue the alternatives convincingly, I found the topics a little dry and the text dense at times. A lot of the information was new to me, and well presented, there was just a lot of it (including a very complete bibliography). Perhaps more than necessary to make the case for folly. Her lesson is applicable down to the school board or family level also, though we have fewer trusted advisors.</span></span><span data-dcnode-id="1860" instrument_node="">

</span><span data-dcnode-id="1777" id="freeTextContainer6993192543982177401"><span data-dcnode-id="1780" instrument_node="">Excellent, excellent examination of the tendency for political policies to continue down damaging pathways though multiple experts advise against it, which Tuchman describes as “folly.” Her description of decadent popes directly encouraging the Protestant Reformation and the resulting loss of Roman power is fun, lively, and intellectually rigorous. </span><br data-dcnode-id="1779"><span data-dcnode-id="1778" instrument_node="">She falters a bit while explaining the British loss of the American colonies as a result of folly. She would have been wise to shave at least 20-30 f</span></span><span data-dcnode-id="1776" instrument_node="">
</span><span data-dcnode-id="1769" id="freeText6993192543982177401" style="display:none"><span data-dcnode-id="1775" instrument_node="">Excellent, excellent examination of the tendency for political policies to continue down damaging pathways though multiple experts advise against it, which Tuchman describes as “folly.” Her description of decadent popes directly encouraging the Protestant Reformation and the resulting loss of Roman power is fun, lively, and intellectually rigorous. </span><br data-dcnode-id="1774"><span data-dcnode-id="1773" instrument_node="">She falters a bit while explaining the British loss of the American colonies as a result of folly. She would have been wise to shave at least 20-30 from that section and tighten it up a bit, although I attribute the boredom more to the tedious reality of the argument (repeated similar debates in Parliament) than her skill as a writer.</span><br data-dcnode-id="1772"><span data-dcnode-id="1771" instrument_node="">American involvement in Vietnam is the subject of the final portion, and it is a wonderfully streamlined overview of the war’s political side while doing a hell of a job of arguing Tuchman’s thesis. This fine book should have become a match strike in causing widespread opposition to folly, and her use of the word should be utilized daily in popular discussion. It’s a real shit stain on this world that the nature of politics nearly eliminates the possibility of political parties examining themselves and their policies as it might damage “the team” to change course on a subject and appear weak.</span><br data-dcnode-id="1770"></span><span data-dcnode-id="1768" instrument_node="">

</span><span data-dcnode-id="1684" id="freeTextContainer6463182780525232998"><span data-dcnode-id="1685" instrument_node="">In the end a fairly depressing book which acknowledges the failures of societies to govern themselves well. The focus is on spectacular failures: the fall of Troy, the spectacular immorality of the Renaissance Popes, the failure of the English to retain its colony when the Americans wanted to leave, and finally, the spectacular stupidity of the US in Vietnam. If you are like me the book will get more and more interesting as it gets closer to home. I remember just about everything about Vietnam, </span></span><span data-dcnode-id="1683" instrument_node="">
</span><span data-dcnode-id="1678" id="freeText6463182780525232998" style="display:none"><span data-dcnode-id="1682" instrument_node="">In the end a fairly depressing book which acknowledges the failures of societies to govern themselves well. The focus is on spectacular failures: the fall of Troy, the spectacular immorality of the Renaissance Popes, the failure of the English to retain its colony when the Americans wanted to leave, and finally, the spectacular stupidity of the US in Vietnam. If you are like me the book will get more and more interesting as it gets closer to home. I remember just about everything about Vietnam, from the fall of Dien Bien Phu when I was still a child to the helicopter escape from the US Embassy in Saigon when I was a young woman raising two children and going to grad school.</span><br data-dcnode-id="1681"><br data-dcnode-id="1680"><span data-dcnode-id="1679" instrument_node="">It is in many ways a depressing book, particularly in the light of the incredible stupidity and even more impressive veniality of the current American government. Doubly depressing because the only leadership trait the book singles out as having promise of good government is moral character. And, in the case of the US at least “educating the electorate to recognize and reward integrity of character and to reject the ersatz.”</span></span><span data-dcnode-id="1677" instrument_node="">

</span><span data-dcnode-id="1524" id="freeTextContainer41622113891665411"><span data-dcnode-id="1525" instrument_node="">A magnificent, astringent and idiosyncratic work of history which I've owned for the best part of three years, and there's no particular reason I'm reading it now, honest. It looks chiefly at four famous examples of folly, defined as a policy which 'must have been perceived as counter-productive in its own time, not merely by hindsight'; equally, 'a feasible alternative course of action must have been available'. The third rule is that it must persist beyond one political lifetime, but little pr</span></span><span data-dcnode-id="1523" instrument_node="">
</span><span data-dcnode-id="1483" id="freeText41622113891665411" style="display:none"><span data-dcnode-id="1522" instrument_node="">A magnificent, astringent and idiosyncratic work of history which I've owned for the best part of three years, and there's no particular reason I'm reading it now, honest. It looks chiefly at four famous examples of folly, defined as a policy which 'must have been perceived as counter-productive in its own time, not merely by hindsight'; equally, 'a feasible alternative course of action must have been available'. The third rule is that it must persist beyond one political lifetime, but little pretence is made of adhering to this; I think it's intended more to separate the sort of folly in which she's interested, the sort requiring complicity and groupthink, from the whim of a lone despot. The main case studies are the fall of Troy; the Reformation in terms of the Papal failings which bolstered it; Britain's loss of the American colonies; and, in the book's last and longest section, the Vietnam War. But an introduction sketches various other contenders, from Rehoboam and Jeroboam, through Germany's resumption of unrestricted submarine warfare, to the attack on Pearl Harbor. You might object that at least two of these examples only debatably belong to the province of the historian, being more a matter of myth, at least as they're commonly understood. Still, I think the idea is that they've been accepted as true for long enough that they offer valuable examples of trends in human foolishness. Besides, without them you'd lose a Hell of a callback when it comes to Laocoon.</span><br data-dcnode-id="1521"><br data-dcnode-id="1520"><span data-dcnode-id="1519" instrument_node="">In this anatomy of folly, one key concept is wooden-headedness, which 'consists in assessing a situation in terms of preconceived fixed notions while ignoring or rejecting any contrary signs. It is acting according to wish while not allowing oneself to be deflected by the facts. It is epitomized in a historian's statement about Philip II of Spain, the surpassing wooden-head of all sovereigns: "No experience of the failure of his policy could shake his belief in its essential excellence."'</span><br data-dcnode-id="1518"><br data-dcnode-id="1517"><span data-dcnode-id="1516" instrument_node="">OK, maybe there was a reason I ended up reading this when I did.</span><br data-dcnode-id="1515"><br data-dcnode-id="1514"><span data-dcnode-id="1513" instrument_node="">Seriously, I was just clearing out my 'phone ahead of this review and there were about 20 screenshots of quotes, which especially regarding the War of Independence chapter, could almost all have been annotated "a bit like Brexit, aaaaah":</span><br data-dcnode-id="1512"><span data-dcnode-id="1511" instrument_node="">- 'George Meredith wrote in a very different context of "drifting into vanities, congregating in absurdities, planning short-sightedly, plotting dementedly"'.</span><br data-dcnode-id="1510"><span data-dcnode-id="1509" instrument_node="">- Lord North would occasionally beg the King to be allowed to resign, insisting that the Prime Minister should be "a man of great abilities, and who is confident of his abilities, who can choose decisively, and carry his determination authoratively into execution...and be capable of forming wise plans and of combining and connecting the whole force and operations of givernment. I am certainly not such a man." Remind you of any other PMs we might know? See also 'Lord North, averse to the definitive, was trying to delay anything irreversible', or demanding ahead of a parley red lines which render it impossible to make any progress.</span><br data-dcnode-id="1508"><span data-dcnode-id="1507" instrument_node="">- Britain betrayed into foolish actions "by the arts of imposition, by its own credulity, through the means of false hope, false pride and promised advantages of the most romantic and improbable nature'.</span><br data-dcnode-id="1506"><span data-dcnode-id="1505" instrument_node="">- And if North is May, Charles Townshend must be Boris, smarter than most of his peers, but unscrupulous, unreliable, and in the end not nearly as smart as he thinks he is.</span><br data-dcnode-id="1504"><span data-dcnode-id="1503" instrument_node="">- Britain's politicians sharing a sense of superiority which leads to ignorance because it suppresses curiosity. Well, thank goodness the last 250 years diversified the composition of Parliament, right? Just a shame it was so very slightly. 'They entered young, were rarely prepaared or trained for the tasks, could become restless or bored under difficulties and usually retreated for half the year to the charms of their country homes'. Or indeed, their writing sheds.</span><br data-dcnode-id="1502"><span data-dcnode-id="1501" instrument_node="">- 'An independent member, Sir William Meredith, found the Government "so perversely, so inflexibly persisting in error on every occasion" as to cause surprise, in Dryden's phrase, "that 'they never deviate into sense' nor stumble upon propriety by downright accident."'</span><br data-dcnode-id="1500"><span data-dcnode-id="1499" instrument_node="">- Britain, in the words of one understandably baffled contemporary observer, "only invented occasionally some miserable tale for the day in order meanly to sneak out of difficulties into which they had proudly strutted... By such management, by the irresistible operation of feeble councils...they have shaken the pillars of commercial empire that circled the globe."</span><br data-dcnode-id="1498"><span data-dcnode-id="1497" instrument_node="">- Of the futile assertion of authority and sovereignty which cannot be exercised: "They tell you that your dignity is tied to it... This dignity is a terrible encumbrance to you for it has of late been ever at war with your interest, your equity and every idea of your policy."</span><br data-dcnode-id="1496"><span data-dcnode-id="1495" instrument_node="">- "The parliamentary cabals, being mere struggles for favour and power, created more real blood and personal rancour between individuals than the great questions of policy and principle."</span><br data-dcnode-id="1494"><span data-dcnode-id="1493" instrument_node="">- Britain, constantly 'asserting a right you know you cannot exert', gradually coming to be seen 'as both despotic in intent and ineffectual in execution'. Coincidentally, those were also the design specs for Gavin Williamson.</span><br data-dcnode-id="1492"><br data-dcnode-id="1491"><span data-dcnode-id="1490" instrument_node="">And there's plenty more where those came from. Not that spotting the horribly applicable prophecies of doom is the only charm. Tuchman displays a beautifully and coldly savage way with words throughout – 'In between flashes of good government, folly has its day. In the Bourbons of France, it burst into brilliant flower.' – and is happy to admit when her field runs up against the limits of human attention. Of Renaissance Italy's baffling period of intercity plot and counterplot - 'The significance of the particulars in history's permanent annals is virtualy nil except as a study in the human capacity for conflict'. Which is deeply reassuring as a 'so it's not just me!' moment for any reader who's struggled to remember which statelet was doing what to whom at any given time, even while reading about it. Despite which, the larger-than-life depravity of the Borgias et al renders the Reformation section by far the most fun – how could it not be when you have things like the Petrucci conspiracy to poison the Pope's arse? Long thought confected, and at the time of writing only recently revealed as probably real, it sounds like something from the George RR Martin reboot of Father Ted. Though at times the reputation of the Renaissance Popes does seem a little unfair when you look at their heirs. In those innocent days, the notorious Alexander VI was frowned upon not for all the shagging per se, but because shagging someone 40 years younger than him was felt to be a bit off. Whereas I was reading that on the day a former Vatican treasurer was finally found guilty of, imagine our surprise, raping choirboys. The age difference there, perfectly, being one year more than that scandalous gap between Rodrigo Borgia and his lover - who was not only willing but, at 19, pretty much a dried-up old spinster in the eye of the average modern priest.</span><br data-dcnode-id="1489"><br data-dcnode-id="1488"><span data-dcnode-id="1487" instrument_node="">As for the Vietnam chapter, the recurring note there is of American generals and politicians making entirely sensible policy statements, which their subsequent actions completely ignore, so I suppose the closest modern comparison for that one would probably be global warming (at least until the last couple of years, when we stopped getting even the sensible if empty verbiage). Far less anti-American and far more anti-communist than is now generally fashionable, this was also the section where I was finding out the most wholly new information, rather than having it arranged for me in illuminating new patterns*. Perhaps this is a generational thing, but in the UK I'm not sure we really get more about Vietnam than that it was a bloody mess which we were well out of, with a few big films filling in the micro detail of that, but never really the macro detail of why the blazes it happened at all. And I tried the Ken Burns show, but concluded that ten hours was possibly a bit more explanation that I needed. The three hours here, though? Ideal. This is also the section most obviously intended as a warning from (then pretty recent) history, but honestly, the whole book reads like a twentieth century Cassandra. When Tuchman talks about rulers misled by the 'illusion of permanence, of the inviolabity of their power and their status'; about how America's system has always succeeded in righting itself though 'Under accelerating incompetence in America, this may change', particularly when paired with a greater shortage of resources...they were sensible enough warnings in 1984, when this was first published, and wouldn't it have been lovely had someone bloody listened, so that they weren't still more relevant and urgent today? Leaving us to cling to a few faint shards of hope. After all, most of these errors were reversed in the end, albeit with far more loss of life and prestige than had error been admitted and courses corrected far sooner. And the worst predictions were generally as off the mark as the earlier assumptions of easy victory had been: Shelburne was wrong to forecast that, with the loss of America, Britain "shall be reduced to a miserable little island, and from a mighty empire sink into as insignificant a country as Denmark or Sardinia!" When Communism conquered the whole of Vietnam, only a few further dominoes fell, and America did not lose the Pacific. Hell, even the Catholic Church persists, somehow, though I do wish it wouldn't. The Earth, for all that it may continue generally to be run by idiots, has abided thus far, even if it does keep justifying its ancient designation as the Meadow of Atë, goddess of folly.</span><br data-dcnode-id="1486"><br data-dcnode-id="1485"><span data-dcnode-id="1484" instrument_node="">*An example: I had already known, because how could I not, that the road to that fateful tax on American tea began after the abandonment of an attempt to tax cider which had aroused the monumental intransigence of the West Country. What I had not realised was that the Chancellor of the Exchequer who quailed was our old friend Sir Francis Dashwood, of Hellfire Club fame. Good lad.</span></span><span data-dcnode-id="1482" instrument_node="">

</span><span data-dcnode-id="1398" id="freeTextContainer17552359580359873589"><span data-dcnode-id="1399" instrument_node="">Another thought-provoking, well-written book by Tuchman. The book considers this question: Why do governments repeatedly and doggedly pursue policies that are contrary to their own interest? Tuchman calls this folly, hence the title. She uses the Trojan War, the Renaissance Popes Britain’s loss of the American colonies and the US’s Vietnam War to illustrate that pride, hubris, unchecked power, fear and outrage are often the drivers of poor policy and decision making. Some of my favorite quotes f</span></span><span data-dcnode-id="1397" instrument_node="">
</span><span data-dcnode-id="1369" id="freeText17552359580359873589" style="display:none"><span data-dcnode-id="1396" instrument_node="">Another thought-provoking, well-written book by Tuchman. The book considers this question: Why do governments repeatedly and doggedly pursue policies that are contrary to their own interest? Tuchman calls this folly, hence the title. She uses the Trojan War, the Renaissance Popes Britain’s loss of the American colonies and the US’s Vietnam War to illustrate that pride, hubris, unchecked power, fear and outrage are often the drivers of poor policy and decision making. Some of my favorite quotes from this book show her thinking to be sharp and insightful: </span><br data-dcnode-id="1395"><br data-dcnode-id="1394"><span data-dcnode-id="1393" instrument_node="">“No one is as sure of his premise as the man who knows too little”</span><br data-dcnode-id="1392"><br data-dcnode-id="1391"><span data-dcnode-id="1390" instrument_node="">“He wanted affirmation rather than information.”</span><br data-dcnode-id="1389"><br data-dcnode-id="1388"><span data-dcnode-id="1387" instrument_node="">“Everything one has a right to do is not best to be done.”</span><br data-dcnode-id="1386"><br data-dcnode-id="1385"><span data-dcnode-id="1384" instrument_node="">“Prison does not silence ideas whose time has come. . . a fact that generally escapes despots who by nature are rulers of little wisdom.”</span><br data-dcnode-id="1383"><br data-dcnode-id="1382"><span data-dcnode-id="1381" instrument_node="">“Policy was not reconsidered because the governing group had no habit of purposeful consultation.”</span><br data-dcnode-id="1380"><br data-dcnode-id="1379"><span data-dcnode-id="1378" instrument_node="">“Folly is a child power.”</span><br data-dcnode-id="1377"><br data-dcnode-id="1376"><span data-dcnode-id="1375" instrument_node="">“Lazy preparation is the product of assumption.” </span><br data-dcnode-id="1374"><br data-dcnode-id="1373"><span data-dcnode-id="1372" instrument_node="">“The attitude was a sense of superiority so dense as to be impenetrable. A feeling of this kind leads to ignorance of the world and others because it suppresses curiosity.” </span><br data-dcnode-id="1371"><br data-dcnode-id="1370"></span><span data-dcnode-id="1368" instrument_node="">

</span><span data-dcnode-id="1119" id="freeText9510527924166223009" style="display:none"><span data-dcnode-id="1120" instrument_node="">History is rife with lessons, but it’s rare to see such lessons stitched together across such disparate events as the Trojan Horse, the Papal States, the American Evolution, and the Vietnam War. But Barbara Tuchman does a phenomenal job of relating history in a way that shows how “human” history is, and how susceptible we all are to unconscious and ultimately damaging biases. Folly is never more than a few bad decisions away. While it might be argued that Tuchman has the academic benefit of 20/20 hindsight, that doesn’t diminish the impact of her cautionary tales. My only critique would be that the depth of her knowledge is such that the lay reader may lose track of characters and events at times. Sadly, but perhaps not surprisingly, many more examples of folly can be recognized in world events since the publication of this book in 1984.</span></span><span data-dcnode-id="1118" instrument_node="">

</span><span data-dcnode-id="1031" id="freeTextContainer9253526812130865452"><span data-dcnode-id="1038" instrument_node="">Based on the current political climate, this book has been in my thoughts. I feel compelled to update my original short review. My first review read: " More pertinent now than ever. Have you ever wondered how powerful governments can make such bad decision? Then this book is for you."</span><br data-dcnode-id="1037"><br data-dcnode-id="1036"><span data-dcnode-id="1035" instrument_node="">Perhaps an inquiring reader will ask why? Allow me, in my small way, to answer that question.</span><br data-dcnode-id="1034"><br data-dcnode-id="1033"><span data-dcnode-id="1032" instrument_node="">"The March of Folly" was published in 1984 by Knopf. Barbara Tuchman, the renowned historian and writer, explores a basic </span></span><span data-dcnode-id="1030" instrument_node="">
</span><span data-dcnode-id="998" id="freeText9253526812130865452" style="display:none"><span data-dcnode-id="1029" instrument_node="">Based on the current political climate, this book has been in my thoughts. I feel compelled to update my original short review. My first review read: " More pertinent now than ever. Have you ever wondered how powerful governments can make such bad decision? Then this book is for you."</span><br data-dcnode-id="1028"><br data-dcnode-id="1027"><span data-dcnode-id="1026" instrument_node="">Perhaps an inquiring reader will ask why? Allow me, in my small way, to answer that question.</span><br data-dcnode-id="1025"><br data-dcnode-id="1024"><span data-dcnode-id="1023" instrument_node="">"The March of Folly" was published in 1984 by Knopf. Barbara Tuchman, the renowned historian and writer, explores a basic failing of governments. She gives this failing a name: Wooden-Headedness. She defines that trait as "the pursuit by governments of policies contrary to their own interests." </span><br data-dcnode-id="1022"><br data-dcnode-id="1021"><span data-dcnode-id="1020" instrument_node="">Before I go further, I must admit that I am a fan of Barbara Tuchman. That is not the case with some of her contemporaries. The author was often criticized, and this book was no exception. She was a historian and writer, but she was also a woman in an academic world very much dominated by male writers, thinkers, and reviewers. Tuchman was born in 1912, and was active as a writer from 1938-1988. This was an era that did not look all that kindly on female academics. Regardless of these criticisms, she is a two-time Pulitzer Prize winning author. </span><br data-dcnode-id="1019"><br data-dcnode-id="1018"><span data-dcnode-id="1017" instrument_node="">"The March of Folly" uses four examples to illuminate the principle of Wooden-headedness. Why did the men of Troy bring the Greek horse into the walls of the city? Why did the Renaissance popes ignore the failings of the Catholic church, failings that would lead to the conflagration of the Reformation? Why did King George III alienate, and finally cause to rebel, the American Colonists, thus killing the cash cow of the colonies? And, finally, why did the government of the United States adopt policies during the Vietnam war that brought about exactly the opposite of their stated aims?</span><br data-dcnode-id="1016"><br data-dcnode-id="1015"><span data-dcnode-id="1014" instrument_node="">I return to the reader's question: "Why should I read this book?" Barbara Tuchman was not only a gifted historian, she was also a gifted writer. Tuchman uses clear, concise prose. Her histories are written in a way that is clearly accessible to non-academic readers. I find her work to be engrossing, captivating, and entertaining. Reading "The March of Folly" is not a slog through the dry annuls of history. Rather, it is an illuminating look at how and why seemingly intelligent leaders can do extraordinarily stupid things. </span><br data-dcnode-id="1013"><br data-dcnode-id="1012"><span data-dcnode-id="1011" instrument_node="">The longest portion of the book deals with the US involvement in the Vietnam War. Given the times and the context, this was also the most controversial portion of the book, and the one most often criticized. I wills set that aside, even though I believe that history has proven the author's point. When I first read Tuchman's theory on the American Revolution, I found a new view of history that I had never encountered during all the long classes I had sat through. The English King, George III, and his advisors, simply could not see the forest for the trees. </span><br data-dcnode-id="1010"><br data-dcnode-id="1009"><span data-dcnode-id="1008" instrument_node="">Prior to the American revolution, the American colonies were a cash cow for England. The colonies shipped much-needed raw materials to the Mother Country. The colonies were also a closed market for England's manufactured goods, forced to buy finished products from England. Financially, England could not do better. They made money both ways. The colonists were, for the most part, loyal subjects of the Crown. They did not want a revolution. When the colonists requested representation in the English Parliament, they were rebuked by the Crown. George III took the view that the colonists were wayward children that needed to be disciplined. </span><br data-dcnode-id="1007"><br data-dcnode-id="1006"><span data-dcnode-id="1005" instrument_node="">There were voices of caution along the road, both in England and the colonies, but the Crown chose to ignore them. The disciplinary measures that the George III invoked would ultimately lead a minority of firebrand colonists to incite a revolt, thus killing the cash cow that England treasured. Tuchman's point is that the road to ruin was not a blind alley without options. There were warning signs, and warning voices, on both sides of the Atlantic Ocean. Despite all evidence to the contrary, George III and his minions pursued a course of action that achieved exactly the opposite of what they wanted. Why? Therein lies the premise of this book.</span><br data-dcnode-id="1004"><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">I mentioned that this book has recently been in my thoughts. There is good reason for this. I think that if Barbara Tuchman were alive today (Tuchman died 1989) she would be compelled to add new sections to "The March of Folly." One has only to look at the current Brexit debacle, or the state of politics in the United States, to see that Wooden-headedness is very much alive and well amongst the governments of the world. The point of this review is not to take a position on either of these current example of Wooden-headedness, but simply to point out that the trait is thriving amongst the governing forces of our times.</span><br data-dcnode-id="1001"><br data-dcnode-id="1000"><span data-dcnode-id="999" instrument_node="">I highly recommend "The March of Folly," as I do the rest of Tuchman's work. She is clear thinker, and a gifted writer. Whether or not one agrees with her premises is a matter of opinion. That a reader of "The march of Folly" will exposed to new and interesting historical perspectives is, I believe, a fact.</span></span><span data-dcnode-id="997" instrument_node="">
