</span><span data-dcnode-id="981" id="freeTextContainer5784384863438595261"><span data-dcnode-id="985" instrument_node="">So I'm writing this fully aware that my rating is going to be an unpopular decision, but I also understand why other people might be much more into this book than me. After seeing this book released last year and seeing five star review after five star review, you might say I had high expectations for this book. And the first half of the book 100% met them. I was super into it But for me it took a sharp dive with one event and honestly never really recovered. </span><br data-dcnode-id="984"><br data-dcnode-id="983"><span data-dcnode-id="982" instrument_node="">The Fifth Surgeon follows Nadia Keat</span></span><span data-dcnode-id="980" instrument_node="">
</span><span data-dcnode-id="940" id="freeText5784384863438595261" style="display:none"><span data-dcnode-id="979" instrument_node="">So I'm writing this fully aware that my rating is going to be an unpopular decision, but I also understand why other people might be much more into this book than me. After seeing this book released last year and seeing five star review after five star review, you might say I had high expectations for this book. And the first half of the book 100% met them. I was super into it But for me it took a sharp dive with one event and honestly never really recovered. </span><br data-dcnode-id="978"><br data-dcnode-id="977"><span data-dcnode-id="976" instrument_node="">The Fifth Surgeon follows Nadia Keating and Ashley Rylan. Nadia and Ashley are both surgeons but couldn't be more different in personality. Nadia is your ice queen, reserved, egotistical, and uncompromising. But Ashley, especially for a surgeon is much more open, emotional, and compassionate about people. These personality types definitely clash over and over but after a blind date throws them together they see each other differently. </span><br data-dcnode-id="975"><br data-dcnode-id="974"><span data-dcnode-id="973" instrument_node="">As I mentioned, I was really into this book from the beginning. And that is based on the characters and the intense medical environment. I wouldn't say medical settings are my favorite, but I definitely do enjoy them. And Faith Prize being a surgeon seemed to amplify how it was written. I loved that part of the book. And even when my overall enjoyment of the book eased, I still enjoyed the medical parts greatly. </span><br data-dcnode-id="972"><br data-dcnode-id="971"><span data-dcnode-id="970" instrument_node="">I also really loved the characters. They are nuanced and interesting and I loved seeing both Ashley and Nadia clash and come together which happens several times. Their chemistry is for real. And whenever they were at each other's throats I really felt that emotion. It was real for me and it was great. </span><br data-dcnode-id="969"><br data-dcnode-id="968"><span data-dcnode-id="967" instrument_node="">I also really enjoyed the inversion of the ice queen character. Typically your ice queens are in positions of authority over the more warm character, then they embrace the warm character. But having Ashley be in a position of power over Nadia was really fun to read. I was here for it. </span><br data-dcnode-id="966"><br data-dcnode-id="965"><span data-dcnode-id="964" instrument_node="">I'm gonna mark my criticisms under a spoiler tag as they are a little plot related. </span><br data-dcnode-id="963"><a class="jsShowSpoiler spoilerAction" data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="944" style="display: none"><span data-dcnode-id="960" instrument_node="">[ </span><br data-dcnode-id="959"><br data-dcnode-id="958"><span data-dcnode-id="957" instrument_node="">So my issues with this book start with the James Barry scene and plotline. If you're reading the spoilers I'm assuming you read the book, but suffice to say James Barry was a person assigned female at birth who lived both publicly and privately as a man and was a surgeon. </span><br data-dcnode-id="956"><br data-dcnode-id="955"><span data-dcnode-id="954" instrument_node="">In The Fifth Surgeon, there is a scene where they are discussing how the head of the surgical department subtly revels to Nadia that she knows Nadia and Ashley are together and to do this she bring sup James Barry. But only refers to James Barry as the first female surgeon in western medicine. And like. Speaking about the true gender identity about gender non-conforming historical figures is a tricky subject, as the concept of being transgender didn't really exist at that point. But to me, as a trans woman, calling someone a woman because they were assigned female at birth despite living both publicly and privately as a man, and had instructions to have no one view his body after his death to be disingenuous. It reads to me like people who claim Sappho wasn't really a lesbian because some writings have her married to a man. And a conversation that doesn't include the nuance to James Barry's identity instead referring to Barry just as the first female surgeon as a plot point really took me out of the book. I don't know Barry's gender identity and neither does anyone else. </span><br data-dcnode-id="953"><br data-dcnode-id="952"><span data-dcnode-id="951" instrument_node="">And I could overlook that scene as just one smaller point in an otherwise enjoyable book if there wasn't the Nadia's cheating and Ashley's unprofessionalism plotline immediately afterward in the next chapter. I don't think I need to go into as many details as to why I didn't love that. </span><br data-dcnode-id="950"><br data-dcnode-id="949"><span data-dcnode-id="948" instrument_node="">So between these two events hitting at about 60% through the book really cast a shadow on the rest of the read for me. The book wasn't ruined but it took my enjoyment definitely down a peg </span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="945" instrument_node="">]</span></span><br data-dcnode-id="943"><br data-dcnode-id="942"><span data-dcnode-id="941" instrument_node="">Despite those issues with the book, this is an enjoyable book with dynamic characters. I'm defintely looking out for other books Prize will give us, because while I had issues here, I don't think they're necessarily the kind that will affect other books she writes. 3.5/5</span></span><span data-dcnode-id="939" instrument_node="">

</span><span data-dcnode-id="851" id="freeText4511015622100803466" style="display:none"><span data-dcnode-id="862" instrument_node=""> Nadia Keating has had fantasies about making love to another woman but refused to act on that particular avenue. She’s starting her cardiothoracic fellowship training but already she has this God complex like most other surgeons. She knows best and has no problem showing others just how wrong they are. In other words she just doesn’t use her time on being nice to her fellow doctors. She tends to keep her private and professional life to herself. She doesn’t want friends. But now she finds herself still having the desire to be with one woman, not in a relationship but in terms of a one night stand. She thinks that is all she needs, period. So she puts herself out there using social media looking for just that, a one time experience. </span><br data-dcnode-id="861"><span data-dcnode-id="860" instrument_node=""> Ashley Rylan is Nadia’s chief in the department and would love to have time for a relationship but a one night stand will have to do because who has time for a long term relationship anyway. Not her. Unlike Nadia she likes people, likes to laugh and interact with her fellow surgeons but there is one in her department who is the complete opposite of her. So when she goes online to make a date she didn’t expect to have Nadia answer her call. So when the two meet at a local pub she is shocked to find Nadia waiting for her. </span><br data-dcnode-id="859"><span data-dcnode-id="858" instrument_node=""> Both go their own way stating they’d never speak of this again. But the attraction is real, but both try to fight against it because of their work relationship. </span><br data-dcnode-id="857"><span data-dcnode-id="856" instrument_node=""> Ms Prize knows how to tell a good story. Great main character’s. Fast paced with an interesting plot. I didn’t want to put this one down. Wonderful story I’m sure you would love to read yourselves. <
