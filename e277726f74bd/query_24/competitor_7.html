</span><span data-dcnode-id="4399" id="freeTextContainer727940190415779139"><span data-dcnode-id="4400" instrument_node="">4.50 Stars. Love and a little frustration sums up my feelings on this book perfectly. This was my kind of book. I love medical romances and an unapologetic ice queen, put them together and this is exactly what I want to read. The frustration part, which I will explain more later, is really because this should have been a full 5 star read. It was so close and had one thing been different, it would have been. Still, this was a fantastic debut and I would definitely consider getting this if it come</span></span><span data-dcnode-id="4398" instrument_node="">
</span><span data-dcnode-id="4378" id="freeText727940190415779139" style="display:none"><span data-dcnode-id="4397" instrument_node="">4.50 Stars. Love and a little frustration sums up my feelings on this book perfectly. This was my kind of book. I love medical romances and an unapologetic ice queen, put them together and this is exactly what I want to read. The frustration part, which I will explain more later, is really because this should have been a full 5 star read. It was so close and had one thing been different, it would have been. Still, this was a fantastic debut and I would definitely consider getting this if it comes out in audio.</span><br data-dcnode-id="4396"><br data-dcnode-id="4395"><span data-dcnode-id="4394" instrument_node="">I love medical romances but I prefer them to have at least as much medical as romance if not even more medical. I want a lot of scenes to take place in the hospital. I want to hear about interesting cases and all the sort of soap opera drama that comes from working in a high stakes environment where relationships can blur work lines. I grew up watching E.R., and I loved Grey’s Anatomy -until the past two seasons that have gotten kind of weird- so I look for a similar vibe in my medical romance reads. I’m happy to say that this was everything that I wanted. The medical scenes where excellent and it was clear the author was writing from a place of knowledge that took this book to another level. </span><br data-dcnode-id="4393"><br data-dcnode-id="4392"><span data-dcnode-id="4391" instrument_node="">While I loved the medical, and clear knowledge that the author had on this subject, that realism was sort of shattered at one point. This was the frustrating part I was talking about. I’m going to keep things vague for spoiler reasons but the author chose to have one of the doctors do something that was so ridiculous, and to me against the code of professionalism and keeping patients alive, that I could just not swallow it. I get why it was done for drama’s sake, and I like drama in my medical romances, but how it was done was a real disappointment. I appreciate all the fantasy around romances, and I would normally not mind this as much, but because the medical was so well done in this book, I couldn’t forgive such an out there moment so I had to take a half star off. </span><br data-dcnode-id="4390"><br data-dcnode-id="4389"><span data-dcnode-id="4388" instrument_node="">Now back to some good stuff. I loved the character of Nadia. She will be a character that I’m not sure if ever reader will like, but I enjoyed her iciness. I loved that she was who she was, blunt and honest, and full of herself like most surgeons are, and I found her to be the perfect ice queen for a medical romance. I was also happy that she didn’t just thaw right away. While we got to know her better we saw new sides of her, but she still was the same person she always was and was not about to apologize for it. </span><br data-dcnode-id="4387"><br data-dcnode-id="4386"><span data-dcnode-id="4385" instrument_node="">I found that I also really enjoyed the romance. It is different than the norm, but I like different and it worked well for me. This is actually enemies to lovers which is another favorite trope of mine. And the romance progresses in a way that is different but very interesting. There is also a bit of an angry sex scene that is pretty steamy too. And while there is a lot of angst in their relationship, even that follows a different timetable than the average romance and I can’t tell you how refreshing it was. I wish more authors would mix it up this way. </span><br data-dcnode-id="4384"><br data-dcnode-id="4383"><span data-dcnode-id="4382" instrument_node="">While I am still a little frustrated, it is only because I really wanted to give this book the full 5 stars it should have had. However, I still loved the story and am very impressed with this debut. This author knows how to write medical romance and I hope there will be many more to come. This book was almost twice the size of a normal romance but I was so into the story that I didn’t even notice. It never felt long and I didn’t feel like parts dragged. Except for the one frustration, I honestly enjoyed everything else. I would absolutely recommend this to medical romance fans. I believe this is a great example of what a book from that genre should be. </span><br data-dcnode-id="4381"><br data-dcnode-id="4380"><span data-dcnode-id="4379" instrument_node="">An ARC was given to me for a honest review.</span></span><span data-dcnode-id="4377" instrument_node="">

</span><span data-dcnode-id="4191" id="freeTextContainer9638210860414768299"><b data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">Sapphic Grey's Anatomy</span></b><br data-dcnode-id="4194"><br data-dcnode-id="4193"><span data-dcnode-id="4192" instrument_node="">This is a good medical romance novel. The medical research done to put the story together is extensive and it’s written well enough for a layman reader to follow and it feels like a sapphic Grey's Anatomy, minus the sleaziness. The romance also has the spark I like. And what’s better is that not only do both the medical and romance storylines have equal opportunity to play out fully, they are also weaved together tightly so much so we never forget that these characters are </span></span><span data-dcnode-id="4190" instrument_node="">
</span><span data-dcnode-id="4172" id="freeText9638210860414768299" style="display:none"><b data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">Sapphic Grey's Anatomy</span></b><br data-dcnode-id="4187"><br data-dcnode-id="4186"><span data-dcnode-id="4185" instrument_node="">This is a good medical romance novel. The medical research done to put the story together is extensive and it’s written well enough for a layman reader to follow and it feels like a sapphic Grey's Anatomy, minus the sleaziness. The romance also has the spark I like. And what’s better is that not only do both the medical and romance storylines have equal opportunity to play out fully, they are also weaved together tightly so much so we never forget that these characters are doctors. I was so engaged that I didn’t even realise this book is twice the length of what I usually read. </span><br data-dcnode-id="4184"><br data-dcnode-id="4183"><span data-dcnode-id="4182" instrument_node="">I love the opposites-attract dynamics and the chemistry is great from the moment Nadia and Ashley meet, both with the intention of hooking up with a stranger on a dating app. It’s refreshing to have the tables turned when the subordinate, instead of the boss, is the ice queen. The power dynamics feels more evenly balanced this way. </span><br data-dcnode-id="4181"><br data-dcnode-id="4180"><span data-dcnode-id="4179" instrument_node="">Nadia is an intriguing character and deliberately designed to be hard to figure out for most parts of the book. The parts of her we do know is that she's a first year cardiothoracic training fellow only in name. In reality, she is a medical genius with such incredible talent and skills, everyone puts her on a pedestal. Nadia is also obnoxious and a persistent ice queen until the end. Ashley is the opposite and I fell for her because of what I do know. She's the chief of Nadia's department and she's nurturing, cheery, a people-person and she's so easy to love. And yes, I love their chemistry very much even though it sometimes bothers me how unapologetic Nadia can appear to be and how forgiving Ashley is. But I also realise that it's their personality and that's why they click. But while we're at it, I would like to say that it also bothers me how unprofessional the characters can get in the most delicate of times. </span><br data-dcnode-id="4178"><br data-dcnode-id="4177"><span data-dcnode-id="4176" instrument_node="">Despite that, this is no doubt a solid debut. I feel like this story hasn't completely ended and it has potential for a short story at least. </span><br data-dcnode-id="4175"><br data-dcnode-id="4174"><span data-dcnode-id="4173" instrument_node="">𝘐 𝘳𝘦𝘤𝘦𝘪𝘷𝘦𝘥 𝘢𝘯 𝘈𝘙𝘊 𝘧𝘳𝘰𝘮 𝘠𝘭𝘷𝘢 𝘗𝘶𝘣𝘭𝘪𝘴𝘩𝘪𝘯𝘨 𝘪𝘯 𝘦𝘹𝘤𝘩𝘢𝘯𝘨𝘦 𝘧𝘰𝘳 𝘢𝘯 𝘩𝘰𝘯𝘦𝘴𝘵 𝘳𝘦𝘷𝘪𝘦𝘸.</span></span><span data-dcnode-id="4171" instrument_node="">

her superior). </span></b><span data-dcnode-id="3981" instrument_node=""> they meet on a dating website and plan to have a one night stand, without knowing that they were eachother and so when they meet up, everything is cancelled, but the tension they have becomes inevitable at the workplace...</span><br data-dcnode-id="3980"><br data-dcnode-id="3979"><b data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">Nadia </span></b><span data-dcnode-id="3976" instrument_node="">is a classic ice-queen and i love her sm. she has strong opinions regarding the way that </span><b data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">Ashley </span></b><span data-dcnode-id="3973" instrument_node="">(or Dr. Rylan, as she insists on calling her) runs her subordinates and how she is as a person: too sweet, too cheerful and lacking authority.</span><br data-dcnode-id="3972"><br data-dcnode-id="3971"><span data-dcnode-id="3970" instrument_node="">and i actually </span><b data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">really liked these characters</span></b><span data-dcnode-id="3967" instrument_node=""> and i really appreciated that it never felt like one of the characters was just a lense that a reader could see out of, they were strong individuals. cute ones too. Nadezhda is probably my fave though because </span><u data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">the mean girl does it for me. every. single. time.</span></u><br data-dcnode-id="3964"><br data-dcnode-id="3963"><span data-dcnode-id="3962" instrument_node="">the </span><b data-dcnode-id="3960"><span data-dcnode-id="3961" instrument_node="">hospital setting</span></b><span data-dcnode-id="3959" instrument_node=""> omgg. it was done so well, you can tell that this was written by a doctor and </span><u data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">wow</span></u><span data-dcnode-id="3956" instrument_node="">, such excellency. i feel like i learned to much and (although i've never watched it) this seemed similar to </span><b data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">grey's anatomy's</span></b><span data-dcnode-id="3953" instrument_node=""> atmosphere, and i loved it. </span><u data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">so dramatic, full of action and romance was fit in there so perfectly. </span></u><span data-dcnode-id="3950" instrument_node=""> i adore how the romance was often occuring in the hospital ughh, so good.</span><br data-dcnode-id="3949"><br data-dcnode-id="3948"><span data-dcnode-id="3947" instrument_node="">now, i'm not going to lie, </span><b data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">i read this book because i heard it had (consistent) sex scenes, which is seems to be (unfortunately) quite rare among lesfic. </span></b><span data-dcnode-id="3944" instrument_node="">i was looking for something to fill the void in my heart after reading </span><a data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/54661258.Tryst_Six_Venom" rel="nofollow noopener" title="Tryst Six Venom by Penelope Douglas"><span data-dcnode-id="3943" instrument_node="">Tryst Six Venom</span></a><span data-dcnode-id="3941" instrument_node="">, and although i really did enjoy this book, it was lacking a bit more in the..."hot" section per se.</span><br data-dcnode-id="3940"><br data-dcnode-id="3939"><b data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">the first sex scene was not my favourite.</span></b><span data-dcnode-id="3936" instrument_node=""> it wasn't awfully bad, but it just wasn't very hot to me sdffkd. Nadia basically let Ashley be "in charge" because Nadia had been disrespectful of Ashey's position and blah blah and you know what? it had potential. but...it started feeling very dom/sub and that is </span><b data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">not</span></b><span data-dcnode-id="3933" instrument_node=""> why i read this book LMAO. the kiss that initiated it was cute though (aww). but then Ashley was all like </span><b data-dcnode-id="3928"><span data-dcnode-id="3932" instrument_node="">
</span><i data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">"clothes off" </span></i><span data-dcnode-id="3929" instrument_node="">
</span></b><span data-dcnode-id="3927" instrument_node="">(kinda hot but then-) </span><b data-dcnode-id="3922"><span data-dcnode-id="3926" instrument_node="">
</span><i data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">"don't make me repeat myself" </span></i><span data-dcnode-id="3923" instrument_node="">
</span></b><span data-dcnode-id="3921" instrument_node="">(getting stranger-) and then she made Nadia kneel at her feet like WHAT. i'm sorry wait let me calm myself. idk 😭😭 like and then she said </span><b data-dcnode-id="3916"><span data-dcnode-id="3920" instrument_node="">
</span><i data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">"i'm in the mood to be pleasured rather than to please"</span></i><span data-dcnode-id="3917" instrument_node="">
</span></b><span data-dcnode-id="3915" instrument_node="">....(*crickets*) like girl...just say "fuck, baby" and that's enough asjdks. idk idk. 'twasn't for me. </span><u data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">(olivia was hotter)</span></u><span data-dcnode-id="3912" instrument_node=""> this was in Ashley's office btw. also, i think i just like it when Nadia's in charge more hm.</span><br data-dcnode-id="3911"><br data-dcnode-id="3910"><span data-dcnode-id="3909" instrument_node="">but </span><b data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">do not be discouraged</span></b><span data-dcnode-id="3906" instrument_node="">, the sex and tension gets muchh better (Nadia had me fanning my face um anyways. doing the whole backing into a wall ANYWAYS). like one time, Nadia was arguing over Ashley not being strict enough with the interns and letting herself get walked over but Ashley was all "he probably does know the answer but was too frightened to tell you" and...</span><br data-dcnode-id="3905"><br data-dcnode-id="3904"><blockquote data-dcnode-id="3878"><span data-dcnode-id="3903" instrument_node="">
</span><i data-dcnode-id="3880"><span data-dcnode-id="3902" instrument_node="">Nadia stepped closer, forcing Ashley to take a step back against the wall. Her legs wobbled as she breathed in Nadia's addictive sent.</span><br data-dcnode-id="3901"><br data-dcnode-id="3900"><span data-dcnode-id="3899" instrument_node="">"So he would have told me what the next step is after the LITA is harvested?" Nadia's breath was hot on her cheek. "Tell me."</span><br data-dcnode-id="3898"><br data-dcnode-id="3897"><span data-dcnode-id="3896" instrument_node="">"Create a pericardial-"</span><br data-dcnode-id="3895"><br data-dcnode-id="3894"><span data-dcnode-id="3893" instrument_node="">Nadia tsked. She brushed a strand of hair away from Ashley's face, her fingers lingering. "Come on, Dr. Rylan. That was the med student's answer. You can do much better than that." She caressed her cheek.</span><br data-dcnode-id="3892"><br data-dcnode-id="3891"><span data-dcnode-id="3890" instrument_node="">"I'd expose the mid-LAD-"</span><br data-dcnode-id="3889"><br data-dcnode-id="3888"><span data-dcnode-id="3887" instrument_node="">"Mm." Nadia pressed against her, short-circuiting Ashley's brain.</span><br data-dcnode-id="3886"><br data-dcnode-id="3885"><span data-dcnode-id="3884" instrument_node="">Ashley gasped softly. A moan rather than words built up in her throat. She gulped, giving her mind a moment to collect itself. "do an end-to-side anastomosis with the LITA and anchor the distal LITA pedicle with stay sutures to avoide tension or kinking of the conduit."</span><br data-dcnode-id="3883"><br data-dcnode-id="3882"><span data-dcnode-id="3881" instrument_node="">Nadia stepped back. "See? If the knowledge is there, you don't need excuses." </span></i><span data-dcnode-id="3879" instrument_node="">
</span></blockquote><br data-dcnode-id="3877"><br data-dcnode-id="3876"><span data-dcnode-id="3875" instrument_node="">my jaw completely fell off. like okay Nadia...😦😦😦. damn. so yes, still read it please, it get's much better. and there are more moments like this that had my eyes widening and throat gulping bc-</span><br data-dcnode-id="3874"><br data-dcnode-id="3873"><b data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">however,</span></b><span data-dcnode-id="3870" instrument_node=""> (another one ikik) </span><b data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">i do wish there had been a little more emotional intimacy</span></b><span data-dcnode-id="3867" instrument_node="">. like i was </span><u data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">desperate for some hurt/comfort</span></u><span data-dcnode-id="3864" instrument_node=""> like </span><i data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">please</span></i><span data-dcnode-id="3861" instrument_node="">. maybe i'm just soft but i just wanted at least one of them to crack and get comforted by the other :(( (maybe it's because TSV did it so well but ugh i need that in my romances idk). i love ice-queens but i tend to like when they're soft for the love interest, not actually mad at them themselves...? sometimes ofc, but i wanted Nadia to be weakk for Ashley.</span><br data-dcnode-id="3860"><br data-dcnode-id="3859"><span data-dcnode-id="3858" instrument_node="">anywhosie, so the rest of the smut was better, (even though sometimes it was lacking a bit of detail. it wasn't vague, like it </span><u data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">was</span></u><span data-dcnode-id="3855" instrument_node=""> explicit but i felt like when we actually got to the part, it happened really quickly). do i wish my girlies had used a strap? ...yes. but it's okay, i forgive them.</span><br data-dcnode-id="3854"><br data-dcnode-id="3853"><span data-dcnode-id="3852" instrument_node="">moving along, </span><b data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">the actual writing, i found to be very good.</span></b><span data-dcnode-id="3849" instrument_node=""> it was concise and descriptive and there was no horribly-dragging inner monologue. this book was </span><b data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">so addicting</span></b><span data-dcnode-id="3846" instrument_node="">, so much so that i was able to read this book </span><u data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">all in one sitting</span></u><span data-dcnode-id="3843" instrument_node=""> and i could not put it down.</span><br data-dcnode-id="3842"><br data-dcnode-id="3841"><span data-dcnode-id="3840" instrument_node="">i really liked the side plots of the patients and Nadia's scientific research. it was really sweet.</span><br data-dcnode-id="3839"><br data-dcnode-id="3838"><span data-dcnode-id="3837" instrument_node="">but,</span><b data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node=""> i didn't absolutely adore the epilogue.</span></b><span data-dcnode-id="3834" instrument_node=""> why must there always be children 😭 even in sapphic romance (?). i just didn't love it. but it did find it super cute how they taught their kids medical history in the form of bedtime stories like AWWW. it was so cute. such girlbosses. and i love how Nadia's demeanor doesn't even change after the 5 years and that she is a strong-minded woman with strong opinions when addressing people who challenge her.</span><br data-dcnode-id="3833"><br data-dcnode-id="3832"><span data-dcnode-id="3831" instrument_node="">now for the real bummer, </span><b data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">the cheating...</span></b><span data-dcnode-id="3828" instrument_node="">. like why. it just made me mad tbh bc you're telling me </span><u data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">we somehow managed to include man-drama in a sapphic romance? </span></u><span data-dcnode-id="3825" instrument_node="">come-onn. it just felt unnecessary and it was so bothering. like </span><b data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">why</span></b><span data-dcnode-id="3822" instrument_node="">. and i also found it funny that they made the guy Nadia cheated on such a nice guy because it is SO unlikely that guys are ever like that LMAO. like he was all "i just want Nadia to be happy blah blah" and idk. and then she had to pick between Ashley and the man, like huh 😭, we can do better than that, please.</span><br data-dcnode-id="3821"><br data-dcnode-id="3820"><span data-dcnode-id="3819" instrument_node="">and unfortunately, because of all of that drama, it made me miss when they were just bickering in the workplace. it was just cuter and more fun :(</span><br data-dcnode-id="3818"><br data-dcnode-id="3817"><span data-dcnode-id="3816" instrument_node="">i don't want to end on a bad note though, because this book was really great, </span><b data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">so here, have this moment because it had me dyinggg. </span></b><span data-dcnode-id="3813" instrument_node="">Ashley has a headache and Nadia studied a type of medical care that was less invasive i think and more natural (i could be wrong) so she offered to give Ashley a neck massage thing (AAAAAAAA). (also remember how i mentioned that the first sex scene was quite dom/sub and BDSMy...well they did joke about it and it was funny lmao so store that in your brain):</span><br data-dcnode-id="3812"><br data-dcnode-id="3811"><blockquote data-dcnode-id="3800"><span data-dcnode-id="3810" instrument_node="">
</span><i data-dcnode-id="3802"><span data-dcnode-id="3809" instrument_node="">"Lie down on the sofa." Nadia kept a straight face, despite recalling the same words used when the roles were reversed.</span><br data-dcnode-id="3808"><br data-dcnode-id="3807"><span data-dcnode-id="3806" instrument_node="">Rylan blushed but complied. Nadia knelt behind her and reached for her neck. She focused on her work despite the conflicting urges to withdraw and bury her fingers into the soft skin playing a tug-of-war game in her mind.</span><br data-dcnode-id="3805"><br data-dcnode-id="3804"><span data-dcnode-id="3803" instrument_node="">Still, she couldn't resist one final dig. She leaned closer to Rylan's ear and whispered, "Do you need a safe word?"</span></i><span data-dcnode-id="3801" instrument_node="">
</span></blockquote><br data-dcnode-id="3799"><br data-dcnode-id="3798"><span data-dcnode-id="3797" instrument_node="">lmaooooo i love them sm. i really enjoyed this book!!</span><br data-dcnode-id="3796"><br data-dcnode-id="3795"><u data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">thankyou to all the wlw/ff accounts on goodreads that write reviews and make these books known to me &lt;3 </span></u><br data-dcnode-id="3792"><br data-dcnode-id="3791"><blockquote data-dcnode-id="3789"><span data-dcnode-id="3790" instrument_node="">━━━━━━━━━━━ ♡ ━━━━━━━━━━━ </span></blockquote></span><span data-dcnode-id="3787" instrument_node="">

</span><span data-dcnode-id="3676" id="freeTextContainer1995863925863860365"><span data-dcnode-id="3683" instrument_node="">5 Stars</span><br data-dcnode-id="3682"><br data-dcnode-id="3681"><span data-dcnode-id="3680" instrument_node="">“The Fifth Surgeon” is the debut medical romance from Faith Prize. Prize is a doctor herself and it shows in the writing. This is well written and I loved just about everything about it. </span><br data-dcnode-id="3679"><br data-dcnode-id="3678"><span data-dcnode-id="3677" instrument_node="">Nadezhda (Nadia) Keating is a brilliant doctor and she knows it. She’s the epitome of an ice queen. She’s direct, aloof, and doesn’t concern herself with people’s feelings. Ashley Rylan is Nadia’s chief and the bane of her existence. Ashley is cheerful and sweet and is just an all-around nice person. They</span></span><span data-dcnode-id="3675" instrument_node="">
</span><span data-dcnode-id="3651" id="freeText1995863925863860365" style="display:none"><span data-dcnode-id="3674" instrument_node="">5 Stars</span><br data-dcnode-id="3673"><br data-dcnode-id="3672"><span data-dcnode-id="3671" instrument_node="">“The Fifth Surgeon” is the debut medical romance from Faith Prize. Prize is a doctor herself and it shows in the writing. This is well written and I loved just about everything about it. </span><br data-dcnode-id="3670"><br data-dcnode-id="3669"><span data-dcnode-id="3668" instrument_node="">Nadezhda (Nadia) Keating is a brilliant doctor and she knows it. She’s the epitome of an ice queen. She’s direct, aloof, and doesn’t concern herself with people’s feelings. Ashley Rylan is Nadia’s chief and the bane of her existence. Ashley is cheerful and sweet and is just an all-around nice person. They accidentally meet up on a dating site and while they try to ignore their chemistry, things don’t go as planned especially when they keep seeing each other in the hospital. </span><br data-dcnode-id="3667"><br data-dcnode-id="3666"><span data-dcnode-id="3665" instrument_node="">Like I said, I really loved this and its main characters. I adored Nadia. She’s got the ice queen thing down and knows it and is unapologetic about it. Her God complex knows no bounds and it’s very rare that she’s wrong. I hate when “ice queen” characters are just misunderstood or something along those lines. If you’re going to write an ice queen, make her icy and mean it. And Nadia is! I also liked that although her feelings change for Ashley, it doesn’t change her personality. I think it made the times when she was proven wrong even better and more fulfilling (for me and for whoever proved her wrong.) I also loved Ashley a lot. And while she is a sweetheart, she has some steel underneath. I mean, she kind of has to put up with Nadia’s strong personality. She will stand up and defend herself if she needs to, she just usually doesn’t see much of a need. I think she was just the right amount of smart and sweet to get underneath Nadia’s skin. Watching them go toe to toe was entertaining and built up their growing tension and chemistry. </span><br data-dcnode-id="3664"><br data-dcnode-id="3663"><span data-dcnode-id="3662" instrument_node="">The medical side of this romance takes up a lot of time. There’s a lot of time spent at the hospital, to be expected, but it’s easy and fun to read. I’m in the middle of the road when it comes to medical romances, I don’t absolutely love them but I don’t hate them either. Prize made this readable and explained things in a way that even if I didn’t understand an exact word, I still got the meaning. My only complaint, like others, was the sometimes-unprofessional actions of the doctors at certain times. It didn’t bother me enough to take away my enjoyment and I saw the melodramatic purposes but it also made me roll my eyes a bit because Ashley is the chief! </span><br data-dcnode-id="3661"><br data-dcnode-id="3660"><span data-dcnode-id="3659" instrument_node="">I would also like to give a shout out to Prize for naming her character Ashley. It’s so weird to me that characters in books always have the rare/cool names. Most of the girls in my class were Ashley, Brittany or Jessica but it seems like we never see the popular names that would fit the age group.</span><br data-dcnode-id="3658"><br data-dcnode-id="3657"><span data-dcnode-id="3656" instrument_node="">I highly recommend this! It’s an impressive debut and I think most romance fans would find something to love about this one. </span><br data-dcnode-id="3655"><br data-dcnode-id="3654"><span data-dcnode-id="3653" instrument_node="">I received an ARC from Ylva Publishing in exchange for an honest review. </span><br data-dcnode-id="3652"></span><span data-dcnode-id="3650" instrument_node="">

</span><span data-dcnode-id="3539" id="freeTextContainer7536124822967750157"><span data-dcnode-id="3540" instrument_node="">4.5 stars. When you start reading this book make sure you have enough time to keep reading, because this is so addictive! Thanks GR friends for recommending this;) Medical romances are always fun and I’m a huge sucker for lots of medical jargon and Miss Prize clearly knows her way around the field of medicine. There are surgeries, complications and there is even some medical research. Add to this an ice queen and lots of interesting power dynamics and there you have it, a story that is almost im</span></span><span data-dcnode-id="3538" instrument_node="">
</span><span data-dcnode-id="3523" id="freeText7536124822967750157" style="display:none"><span data-dcnode-id="3537" instrument_node="">4.5 stars. When you start reading this book make sure you have enough time to keep reading, because this is so addictive! Thanks GR friends for recommending this;) Medical romances are always fun and I’m a huge sucker for lots of medical jargon and Miss Prize clearly knows her way around the field of medicine. There are surgeries, complications and there is even some medical research. Add to this an ice queen and lots of interesting power dynamics and there you have it, a story that is almost impossible to put down. </span><br data-dcnode-id="3536"><br data-dcnode-id="3535"><span data-dcnode-id="3534" instrument_node="">The characters are so well described, they are layered and complex, especially our ice queen Nadia. She’s an ice queen by design, but I have to agree with several other reviewers that I think she could very well be on spectrum as well, as she clearly misses some social cues, perhaps it’s a combination of both. Nadia is brilliant and she knows it, arrogance doesn’t even begin to describe her god complex and… I loved her. She’s unapologetic about her behavior, but the way she shows affection in her own way was very well done. Ashley is sweet and a real people pleaser, always talkative and understanding and in every way the opposite of Nadia. </span><br data-dcnode-id="3533"><br data-dcnode-id="3532"><span data-dcnode-id="3531" instrument_node="">Generally, novels featuring ice-queens portray them in a commanding role, so what I really liked was the fact that Nadia is a fellow and Ashley is the chief. As can be expected, Nadia has a hard time taking orders, especially from the bubbly pushover Ashley, and boy are there some interesting power shifts going on (both on a professional and personal level). Also, the way they really notice each other for the first time outside a professional setting (on a blind date) was immediately setting the tone for their love-hate relationship. </span><br data-dcnode-id="3530"><br data-dcnode-id="3529"><span data-dcnode-id="3528" instrument_node="">There are some things that were not very believable (like the research part, even though it is well thought out and based on current research, important steps are skipped and I wish research could advance that easy, but we can dream) and, as other reviewers also noted, some things were not in line with professional conduct, which was too bad, but I could let it go for drama and entertainment. </span><br data-dcnode-id="3527"><br data-dcnode-id="3526"><span data-dcnode-id="3525" instrument_node="">I can’t believe this is a debut novel, it’s extremely well written and I’m curious to what Prize will come up with next. I definitely recommend this to (medical) romance fans.</span><br data-dcnode-id="3524"></span><span data-dcnode-id="3522" instrument_node="">

</span><span data-dcnode-id="3294" id="freeTextContainer13767136872819180619"><span data-dcnode-id="3300" instrument_node="">This book is a fantastic debut novel. Congratulations Faith Prize, you did a fabulous job.</span><br data-dcnode-id="3299"><span data-dcnode-id="3298" instrument_node="">A medical romance that contains everything it needs. Two MCs who are pretty much opposites, medical action, a glimpse into the organ transplant future, hot sex, and finally love. What more could you ask for?</span><br data-dcnode-id="3297"><br data-dcnode-id="3296"><span data-dcnode-id="3295" instrument_node="">Nadia (Nadezhda) Keating is a medical genius, she thinks she is the medical goddess. She has just begun her training as a cardiothoracic specialist, but she has already invested several years in artifici</span></span><span data-dcnode-id="3293" instrument_node="">
</span><span data-dcnode-id="3266" id="freeText13767136872819180619" style="display:none"><span data-dcnode-id="3292" instrument_node="">This book is a fantastic debut novel. Congratulations Faith Prize, you did a fabulous job.</span><br data-dcnode-id="3291"><span data-dcnode-id="3290" instrument_node="">A medical romance that contains everything it needs. Two MCs who are pretty much opposites, medical action, a glimpse into the organ transplant future, hot sex, and finally love. What more could you ask for?</span><br data-dcnode-id="3289"><br data-dcnode-id="3288"><span data-dcnode-id="3287" instrument_node="">Nadia (Nadezhda) Keating is a medical genius, she thinks she is the medical goddess. She has just begun her training as a cardiothoracic specialist, but she has already invested several years in artificial organ research. She is extremely direct, impersonal, hardly shows any emotions, and believes she is above everyone, she definitely has a God complex.</span><br data-dcnode-id="3286"><br data-dcnode-id="3285"><span data-dcnode-id="3284" instrument_node="">Nadia's boss is Ashley and she is the opposite. She shows heart and feelings, is helpful, and is an extremely good surgeon, not without reason she is the chief of heart surgery. And she absolutely can't stand for the life of her, when someone questions her procedure during an operation, especially when they do not know all the facts.</span><br data-dcnode-id="3283"><br data-dcnode-id="3282"><span data-dcnode-id="3281" instrument_node="">Although a blind date ends disastrously, this begins the lustful story of the two. Nadia wants to explore her attraction to women is despite all differences attracted to Ashley. And damn, the first sex scene was incredibly hot, phew, I almost needed a cold shower afterward.</span><br data-dcnode-id="3280"><br data-dcnode-id="3279"><span data-dcnode-id="3278" instrument_node="">Faith Prize has developed personalities that are very complex and interesting. Nadia is described as an ice queen (but as Gaby from lezreviewbooks.com mentioned, I think rather she is on the spectrum). She is an incredibly talented researcher, but emotionally almost incapable of showing emotion, she has a brash, sometimes harsh way of dealing with colleagues, which makes her difficult to like at times. However, it is all the more exciting to see how Ashley can see more and more behind Nadia's facade and how Nadia can open up to her more and more, but remains true to herself on the outside and doesn't change completely, which would be unbelievable.</span><br data-dcnode-id="3277"><br data-dcnode-id="3276"><span data-dcnode-id="3275" instrument_node="">As much as I like personalities that are loving and funny, I also appreciate when authors develop characters that are complicated and difficult, and I need time to really like them. And as different as Nadia and Ashley are, they complement each other very well as a couple and are believable.</span><br data-dcnode-id="3274"><span data-dcnode-id="3273" instrument_node="">All the medical talk isn't always easy to understand and possibly it can be a bit distracting to a reader, but for me, it was fascinating and exciting. Prize brings a breath of fresh air to this genre and rivals medical romance queen Radclyffe with her very first book. I'm definitely looking forward to reading more from Faith Prize.</span><br data-dcnode-id="3272"><br data-dcnode-id="3271"><span data-dcnode-id="3270" instrument_node="">My rating 5 stars</span><br data-dcnode-id="3269"><span data-dcnode-id="3268" instrument_node="">Many thanks to Ylva Publishing for receiving an ARC for an honest review.</span><br data-dcnode-id="3267"></span><span data-dcnode-id="3265" instrument_node="">

</span><span data-dcnode-id="2842" id="freeTextContainer18082329636947396771"><span data-dcnode-id="2846" instrument_node="">I love medical romances and every time there’s a new release I’m happy to read them. I took a chance with The Fifth Surgeon as this is a debut but I’m glad I did because this book is very well written and has a lot of food for thought.</span><br data-dcnode-id="2845"><br data-dcnode-id="2844"><span data-dcnode-id="2843" instrument_node="">Nadia Keating is a cardiothoracic fellow with incredible potential to make a breakthrough in her specialty but with a huge God complex. Focused on exploring her attraction to women, she embarks on an anonymous search for a one-night stand that unwittingly leads to </span></span><span data-dcnode-id="2841" instrument_node="">
</span><span data-dcnode-id="2824" id="freeText18082329636947396771" style="display:none"><span data-dcnode-id="2840" instrument_node="">I love medical romances and every time there’s a new release I’m happy to read them. I took a chance with The Fifth Surgeon as this is a debut but I’m glad I did because this book is very well written and has a lot of food for thought.</span><br data-dcnode-id="2839"><br data-dcnode-id="2838"><span data-dcnode-id="2837" instrument_node="">Nadia Keating is a cardiothoracic fellow with incredible potential to make a breakthrough in her specialty but with a huge God complex. Focused on exploring her attraction to women, she embarks on an anonymous search for a one-night stand that unwittingly leads to her boss. Ashley Rylan, the chief of Nadia’s department, is exactly the opposite of Nadia, soft-spoken, sweet, and agreeable. A casual fling with her department fellow is a recipe for disaster but Nadia is as annoying as beautiful and the temptation is too much. How will both women be able to navigate the pressures of work, research, and love?</span><br data-dcnode-id="2836"><br data-dcnode-id="2835"><span data-dcnode-id="2834" instrument_node="">This is not a typical medical romance. Starting from the title and continuing to the plot twists, to the main characters’ relationship, and even the amount, type, and detail of the medical scenes. The author’s approach is fresh, original, and brave. Ms. Prize doesn’t shy away from controversy both in the medical scope and in the relationship aspects. It’s a blunt approach that might not satisfy every reader but will make this novel hard to forget for those of us who liked it.</span><br data-dcnode-id="2833"><br data-dcnode-id="2832"><span data-dcnode-id="2831" instrument_node="">Medical romances vary in the ratio of medical scenes against romance and, in some cases, the medical aspects are just reduced to the background with one or two hospital scenes featured as a backdrop. This is not the case as this novel is at least half medical, half romance. The author is a doctor herself and it shows, not only in the level of detail of the medical scenes but also in the amount of medicine history poured into the pages. I was happily surprised that all the information didn’t sound excessive or too technical. The author manages to clarify the medical procedures and terms without sounding preachy or boring. I’m not sure if everyone will enjoy the amount of information but, at least, a non-medical reader will understand everything that is being described. There is also an element of science fiction to the medical plot and some ethical considerations to be made but they make sense in the universe the author created. I’m going to keep it vague to avoid spoilers.</span><br data-dcnode-id="2830"><br data-dcnode-id="2829"><span data-dcnode-id="2828" instrument_node="">In the beginning, I wasn’t as engaged with the romance as with the medical plot. Nadia is a hard-to-like character but I understand why the author fleshed her out that way. I guess that geniuses tend to be full of themselves (surgeons even more) and even though Nadia sounds authentic, she’s initially unlikeable. Some will describe her as an ice queen, but to me she seemed more in the spectrum, ignorant about social clues, lacking communication skills, and sometimes even being outright rude or cruel. Eventually, the reader starts to understand her actions and, hopefully, warm up to her. Kudos to the author for writing her so convincingly and for not falling into the temptation to write a popular character. Cleverly, Ms. Prize writes Ashley as her exact opposite which balances things out and makes them a credible couple as they complement each other well. Their chemistry together is very good and the sex scenes sizzling hot. Well done to the author for getting this so right in her debut novel. Color me impressed with this debut.</span><br data-dcnode-id="2827"><br data-dcnode-id="2826"><span data-dcnode-id="2825" instrument_node="">If you are into medical romances, you should give this a try as it’s original, engaging, and enjoyable. 5 stars.</span></span><span data-dcnode-id="2823" instrument_node="">

</span><span data-dcnode-id="2696" id="freeText10820009476108277088" style="display:none"><span data-dcnode-id="2710" instrument_node="">I think this is my first time reading a book where the younger subordinate is the ice queen. Everything about Nadezhda Keating intrigued me. Even her name is unique. </span><br data-dcnode-id="2709"><br data-dcnode-id="2708"><span data-dcnode-id="2707" instrument_node="">Nadezhda (or Nadia) came off as an obnoxious, stoic, cold person with a God complex who would squash you away if you so much as cross her path (though I thought she might be on the spectrum when reading the book). She is so the opposite of Ashley Rylan, the Chief, and who also happened to be Nadezhda’s boss. Ashley is kind, helpful and way too soft-hearted. She can’t seem to say No and always gets trampled all over by her Attending. Which is the exact reason why Nadezhda didn't like Ashley. But as they say, opposite attracts, and both Nadezhda and Ashley balanced out each other. </span><br data-dcnode-id="2706"><br data-dcnode-id="2705"><span data-dcnode-id="2704" instrument_node="">There were surprises in the book which I didn’t expect at all, and I’ll leave it at that. Overall, The Fifth Surgeon is very impressive, especially for a debut. Very well written with not much medical jargon thrown in that makes readers like me who are not in the medical world understood what the author is relaying.</span><br data-dcnode-id="2703"><br data-dcnode-id="2702"><span data-dcnode-id="2701" instrument_node="">Ratings: 5 ⭐️</span><br data-dcnode-id="2700"><br data-dcnode-id="2699"><span data-dcnode-id="2698" instrument_node="">Available in Scribd </span><br data-dcnode-id="2697"></span><span data-dcnode-id="2695" instrument_node="">

</span><span data-dcnode-id="2575" id="freeTextContainer7482783632609291840"><span data-dcnode-id="2579" instrument_node="">I do love a good medical romance, so when I saw </span><i data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">The Fifth Surgeon</span></i><span data-dcnode-id="2576" instrument_node=""> by Faith Prize about to be published, I grabbed it. It seemed to be a fairly lengthy novel, so I figured it would take me about three days to read it. I’m a slow reader compared to some. I began the story in the afternoon. At 1:45 A.M. that night I finally turned my tablet off. I was over 85% finished. The only reason I didn’t finish the book that night was because I was afraid I would fall asleep and drop my tablet. I woke up ear</span></span><span data-dcnode-id="2574" instrument_node="">
</span><span data-dcnode-id="2558" id="freeText7482783632609291840" style="display:none"><span data-dcnode-id="2573" instrument_node="">I do love a good medical romance, so when I saw </span><i data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">The Fifth Surgeon</span></i><span data-dcnode-id="2570" instrument_node=""> by Faith Prize about to be published, I grabbed it. It seemed to be a fairly lengthy novel, so I figured it would take me about three days to read it. I’m a slow reader compared to some. I began the story in the afternoon. At 1:45 A.M. that night I finally turned my tablet off. I was over 85% finished. The only reason I didn’t finish the book that night was because I was afraid I would fall asleep and drop my tablet. I woke up early the next morning and finished it then. This novel is that good.</span><br data-dcnode-id="2569"><br data-dcnode-id="2568"><span data-dcnode-id="2567" instrument_node="">This is one of the best medical dramas/romances I’ve read in a long time. The author obviously knows her medical terms, and she writes in a way that lets the reader understand them as well. A lot of the medical knowledge is quite involved and some is futuristic, so this is really high praise. The story grabs your interest and won’t let go. The hospital setting is also well-described, adding to the overall realism of the story.</span><br data-dcnode-id="2566"><br data-dcnode-id="2565"><span data-dcnode-id="2564" instrument_node="">For me though, it is the people that really make this tale wonderful. Nadia Keating and Ashley Rylan are the two main characters. Both are surgeons, and also intelligent, driven, and very believable. Ashley is actually Nadia’s boss which causes some friction between the two. In spite of that friction, the chemistry between the two is off the charts. Add in the fact that Nadia is a consummate ice queen with some very personal secrets, and you have all the ingredients for an extremely hot romance.</span><br data-dcnode-id="2563"><span data-dcnode-id="2562" instrument_node="">I believe this may be the author’s debut novel. If it is, I’m even more impressed. Usually with a first novel, you expect a few new author mistakes, but honestly, I can’t find anything. This is an exceptionally well-written novel, and I can’t wait to read more from this author.</span><br data-dcnode-id="2561"><br data-dcnode-id="2560"><span data-dcnode-id="2559" instrument_node="">I received an ARC from Ylva Publishing for an honest review.</span></span><span data-dcnode-id="2557" instrument_node="">

</span><span data-dcnode-id="2344" id="freeTextContainer42005554856309180"><span data-dcnode-id="2347" instrument_node="">The Fifth Surgeon is ripe with doctor lingo and surgical procedures which I thoroughly enjoyed coming from a family of health care professionals. It is also an enemies to lovers romance which is written in a way that I have never quite read before. There are actually a few different romance tropes blended together to make this story very unique and quite enjoyable.</span><br data-dcnode-id="2346"><span data-dcnode-id="2345" instrument_node="">Dr Ashley Rylan is Chief of the cardio thoracic surgical department where osteopathic doctor Nadezhda Keating is doing her fellowship</span></span><span data-dcnode-id="2343" instrument_node="">
</span><span data-dcnode-id="2324" id="freeText42005554856309180" style="display:none"><span data-dcnode-id="2342" instrument_node="">The Fifth Surgeon is ripe with doctor lingo and surgical procedures which I thoroughly enjoyed coming from a family of health care professionals. It is also an enemies to lovers romance which is written in a way that I have never quite read before. There are actually a few different romance tropes blended together to make this story very unique and quite enjoyable.</span><br data-dcnode-id="2341"><span data-dcnode-id="2340" instrument_node="">Dr Ashley Rylan is Chief of the cardio thoracic surgical department where osteopathic doctor Nadezhda Keating is doing her fellowship training. Nadia (Nadezhda) is a very no nonsense and non-emotive person and doctor. She rubs her fellow workers and superiors the wrong way with her always being the smartest person in the room and knowing it attitude. I did not like Nadia at all for the first three quarters of the book. </span><br data-dcnode-id="2339"><span data-dcnode-id="2338" instrument_node="">Ashley is the complete opposite of Nadia in her approach to work colleagues and others. She is warm, supportive and caring. This story starts simply as two women on a dating site agreeing to meet up for a date. When they both show up and recognize each other they realize this is a date from hell.</span><br data-dcnode-id="2337"><span data-dcnode-id="2336" instrument_node="">This is Faith Prize’s first novel and you could not tell. The Fifth Surgeon turns into a complex romance with a kicker of an obstacle which drops, it seems, out of nowhere. </span><br data-dcnode-id="2335"><span data-dcnode-id="2334" instrument_node="">As I mentioned earlier I did not like Nadia until the last quarter of the novel. In fact I fell in love with her then. I read out loud passages of the book to my wife to share my new found love for Nadia and some of the things she says. For example her thoughts on yoga are “Stretching is the warm-up, not the actual exercise. People should stop pretending otherwise.” I am still chuckling over it. </span><br data-dcnode-id="2333"><span data-dcnode-id="2332" instrument_node="">I especially loved the epilogue and the story of the surgeon knights Nadia tells. This epilogue could easily be a stunning short story all on its own. </span><br data-dcnode-id="2331"><span data-dcnode-id="2330" instrument_node="">While I was a bit slow to warm up to the novel I am so very glad I read it. The writing style is smooth and welcoming with the story telling being exceptional. </span><br data-dcnode-id="2329"><span data-dcnode-id="2328" instrument_node="">I plan on rereading this novel again this year for the sheer pleasure of it. You should read it once at the bare minimum.</span><br data-dcnode-id="2327"><br data-dcnode-id="2326"><span data-dcnode-id="2325" instrument_node="">I was given an ARC by Ylva Publishing for an honest review.</span></span><span data-dcnode-id="2323" instrument_node="">

</span><span data-dcnode-id="2236" id="freeTextContainer11387858836453278071"><span data-dcnode-id="2240" instrument_node="">The Fifth Surgeon is the debut novel of Ylva’s new author Faith Prize. I had been looking forward to reading this book ever since I heard about it. It tells the story of Nadia Keating, the very talented but obnoxious cardiothoracic surgeon, and Ashley Rylan, the sweet and kind chief of the department. </span><br data-dcnode-id="2239"><br data-dcnode-id="2238"><span data-dcnode-id="2237" instrument_node="">I’ve always had an affinity for medical romances, and I would say that this was special because of how informative it was. As a reader, I felt that I learned a lot about medicine, osteopathy, and s</span></span><span data-dcnode-id="2235" instrument_node="">
</span><span data-dcnode-id="2215" id="freeText11387858836453278071" style="display:none"><span data-dcnode-id="2234" instrument_node="">The Fifth Surgeon is the debut novel of Ylva’s new author Faith Prize. I had been looking forward to reading this book ever since I heard about it. It tells the story of Nadia Keating, the very talented but obnoxious cardiothoracic surgeon, and Ashley Rylan, the sweet and kind chief of the department. </span><br data-dcnode-id="2233"><br data-dcnode-id="2232"><span data-dcnode-id="2231" instrument_node="">I’ve always had an affinity for medical romances, and I would say that this was special because of how informative it was. As a reader, I felt that I learned a lot about medicine, osteopathy, and surgery. There were a lot of facts and medical information, but they were explained in simple terms and were thus not difficult to digest. </span><br data-dcnode-id="2230"><br data-dcnode-id="2229"><span data-dcnode-id="2228" instrument_node="">I was very impressed with the writing; Faith Prize's style is just to my liking, with the words just flowing easily. What I did struggle with was liking the characters. Even from the start, Nadia was too cold and arrogant. I couldn’t imagine her being nice or falling for anyone. She had her good moments, but then she would go and do something rude, so I really struggled with that almost throughout the whole book. On the other hand, I was cheering for Ashley’s happiness, but I felt like she would go out of character at times. Actually, there were countless moments in the book wherein they both went out of character and did questionable things. </span><br data-dcnode-id="2227"><br data-dcnode-id="2226"><span data-dcnode-id="2225" instrument_node="">There were a lot of sweet and tender moments in the book, but I couldn’t enjoy them 100% because some felt like they came out of nowhere. I have difficulty buying how Nadia suddenly developed feelings for Ashley. Some of the things in the book felt disjointed as well. The science aspect of it was amazing, though! I found myself turning the pages quickly in excitement.</span><br data-dcnode-id="2224"><br data-dcnode-id="2223"><span data-dcnode-id="2222" instrument_node="">Aside from those I have mentioned, I have a few problems with some of the events that transpired in the book. However, I cannot list them as it would be regarded as spoilers. There are actions and decisions that don’t sit well with me, but I think Faith did her best to try and redeem the characters in the end. The ending was really heart-warming. :)</span><br data-dcnode-id="2221"><br data-dcnode-id="2220"><span data-dcnode-id="2219" instrument_node="">The book really has great potential. I truly believe that Faith Prize is talented and can be a great writer. I look forward to reading more of her work! :)</span><br data-dcnode-id="2218"><br data-dcnode-id="2217"><span data-dcnode-id="2216" instrument_node="">An ARC was given in exchange of an honest review. </span></span><span data-dcnode-id="2214" instrument_node="">

</span><span data-dcnode-id="2116" id="freeTextContainer9407547655029923653"><span data-dcnode-id="2119" instrument_node="">4.5 stars</span><br data-dcnode-id="2118"><span data-dcnode-id="2117" instrument_node="">As ice queens go, Nadia Keating is as frigid as they come. And if you're going to write a character like her, she has to be as great as her God complex purports her to be. And new author Faith Prize certainly did that here. I'm a big fan of medical dramas and romance so this was a perfect blend for me. Nadia isn't a character that is immediately likable - at least on the surface. A brilliant cardiothoracic fellow, she's single minded and doesn't suffer fools lightly. She expects everyon</span></span><span data-dcnode-id="2115" instrument_node="">
</span><span data-dcnode-id="2107" id="freeText9407547655029923653" style="display:none"><span data-dcnode-id="2114" instrument_node="">4.5 stars</span><br data-dcnode-id="2113"><span data-dcnode-id="2112" instrument_node="">As ice queens go, Nadia Keating is as frigid as they come. And if you're going to write a character like her, she has to be as great as her God complex purports her to be. And new author Faith Prize certainly did that here. I'm a big fan of medical dramas and romance so this was a perfect blend for me. Nadia isn't a character that is immediately likable - at least on the surface. A brilliant cardiothoracic fellow, she's single minded and doesn't suffer fools lightly. She expects everyone to be extremely competent and she rips to shreds anyone who isn't. And she barely tolerates those who are because they just aren't quite up to the level that she is - never mind that she may be below them in the hospital hierarchy. </span><br data-dcnode-id="2111"><span data-dcnode-id="2110" instrument_node="">The way she meets her boss, Chief Ashley Rylan, outside of their work environment is cringeworthy and sets up an interesting dynamic between the two. It was fun to watch it all play out. Keating reminded me of the other iciest of ice queens Natalya Tsvetnenko from Lee Winter's Requiem for Immortals. Their disdain for pretty much everyone else is almost comical, yet not. It makes them fascinating characters - especially when that one person enters their lives that breaks through their armor, as much as they try to keep them at bay. And while there are a few moments in this story where either a main or secondary character behaves in an irrational (or immature) way, I don't think that's necessarily uncommon. (I was as disappointed in Ashley's best friend and fellow surgeon as anyone in that regard.) Even when you would think their intellect or positions would dictate they behave in a more disciplined manner. But intelligence doesn't always mean that people don't let their emotions get the better of them. </span><br data-dcnode-id="2109"><span data-dcnode-id="2108" instrument_node="">That said - it all added to the drama and I found it an engrossing, entertaining read. And sexy as hell. The medical aspect was especially interesting. Knowing Prize is a surgeon herself certainly added to the integrity of the work. The Fifth Surgeon is an impressive debut and I look forward to more works from Prize in the future!</span></span><span data-dcnode-id="2106" instrument_node="">

</span><span data-dcnode-id="1812" id="freeTextContainer10794771157525901464"><span data-dcnode-id="1813" instrument_node="">Ashley was the chief of the cardiothoracic surgery department. She was intelligent, sweet, compassionate, and friendly. Nadia, a fellow surgeon, spoke and acted in a very direct brusque manner. She was highly intelligent who was seldom wrong and seldom apologized. She had no problem questioning those in charge, especially Ashely. But each woman did have something in common. They were on the same dating app and ended up going on a blind date. It was embarrassing for both women since it was suppos</span></span><span data-dcnode-id="1811" instrument_node="">
</span><span data-dcnode-id="1789" id="freeText10794771157525901464" style="display:none"><span data-dcnode-id="1810" instrument_node="">Ashley was the chief of the cardiothoracic surgery department. She was intelligent, sweet, compassionate, and friendly. Nadia, a fellow surgeon, spoke and acted in a very direct brusque manner. She was highly intelligent who was seldom wrong and seldom apologized. She had no problem questioning those in charge, especially Ashely. But each woman did have something in common. They were on the same dating app and ended up going on a blind date. It was embarrassing for both women since it was supposed to be a one night stand. </span><br data-dcnode-id="1809"><br data-dcnode-id="1808"><span data-dcnode-id="1807" instrument_node=""> Even though the women didn’t seemed to like each other, after that blind date disaster, they couldn’t stop thinking about what could have been if they spent the night together. This was especially true for Nadia who was determined to get that sexual experience with Ashley out of her mind. It wasn’t as easy as she thought. </span><br data-dcnode-id="1806"><span data-dcnode-id="1805" instrument_node=""> </span><br data-dcnode-id="1804"><span data-dcnode-id="1803" instrument_node="">Initially, I liked the women’s connection. But as the story progressed, this lessened. It felt more like a soap opera drama which I don’t particularly enjoy. There was a lot of drama revolving the mains, especially Nadia. There was also drama taking place during operations. For example, a highly intelligent doctor acted in a very unprofessional manner as she barged into an operating room where a groundbreaking procedure took place. This interruption left the surgeon in charge a bit rattled. Scenes like this were unbelievable and took away from the story. These personal drama scenes, with intelligent people acting so unprofessional and in an immature manner, would have been better served anywhere other than the operating room. I know confrontations need to happen but I would have enjoyed this part of the story better if the author kept the characters’ intelligence and professionalism at a respectable level. </span><br data-dcnode-id="1802"><br data-dcnode-id="1801"><span data-dcnode-id="1800" instrument_node="">Now for the best part of the book. I loved the medical aspect of this story. It was very detailed and interesting. Besides the descriptive procedures, the author also had informative tidbits interspersed throughout the story. For example, a presentation was given to medical students describing the four surgeons who won the Pulitzer. Not only was this information interesting, but it also reflected back to the title. This part was nicely done and actually made this story much more enjoyable for me. </span><br data-dcnode-id="1799"><br data-dcnode-id="1798"><span data-dcnode-id="1797" instrument_node="">Even though I had mixed feelings about this story, it was extremely well written. I will definitely read other books by this author. </span><br data-dcnode-id="1796"><br data-dcnode-id="1795"><span data-dcnode-id="1794" instrument_node="">3.5 stars</span><br data-dcnode-id="1793"><br data-dcnode-id="1792"><span data-dcnode-id="1791" instrument_node="">An ARC was given for an honest review. </span><br data-dcnode-id="1790"></span><span data-dcnode-id="1788" instrument_node="">

</span><span data-dcnode-id="1698" id="freeTextContainer4837492232268672016"><span data-dcnode-id="1705" instrument_node="">Giving this 5 ⭐️'s as this might actually be the best book I've read since starting my goodreads wlw reading account! </span><br data-dcnode-id="1704"><br data-dcnode-id="1703"><span data-dcnode-id="1702" instrument_node="">What can I say? I loved the chemistry, I loved the romance, I loved the drama, I looooved the two mains, and I loved how many medical details (and not just medical) Faith Prize added to this book, just making this book rise above the others that I've read so far. It wasn't necessary, but it made the book just that much sweeter to consume.</span><br data-dcnode-id="1701"><br data-dcnode-id="1700"><span data-dcnode-id="1699" instrument_node="">I loved how well the author thought out th</span></span><span data-dcnode-id="1697" instrument_node="">
</span><span data-dcnode-id="1683" id="freeText4837492232268672016" style="display:none"><span data-dcnode-id="1696" instrument_node="">Giving this 5 ⭐️'s as this might actually be the best book I've read since starting my goodreads wlw reading account! </span><br data-dcnode-id="1695"><br data-dcnode-id="1694"><span data-dcnode-id="1693" instrument_node="">What can I say? I loved the chemistry, I loved the romance, I loved the drama, I looooved the two mains, and I loved how many medical details (and not just medical) Faith Prize added to this book, just making this book rise above the others that I've read so far. It wasn't necessary, but it made the book just that much sweeter to consume.</span><br data-dcnode-id="1692"><br data-dcnode-id="1691"><span data-dcnode-id="1690" instrument_node="">I loved how well the author thought out the whole story line, and how happy and fulfilled by the whole book I felt as I turned the last page. </span><br data-dcnode-id="1689"><br data-dcnode-id="1688"><span data-dcnode-id="1687" instrument_node="">Nadia was, of course, my favourite character! Her ice(y) personally and reasoning as to why she was who she was was explained well, although, I would've loved to have read more about her childhood and growing up. Ashley was such a sweetheart, my heart broke for her a few times. Without giving any spoilers, I'm just going to say that I dont know if I could've done what she did after Nadia's "secret" was revealed, I doubt I would've been that strong.</span><br data-dcnode-id="1686"><br data-dcnode-id="1685"><span data-dcnode-id="1684" instrument_node="">I definitely recommend this book to everyone, especially those who enjoy wlw books filled with exquisitely written medical scenes and knowledge. To those who love a good ice queen, opposites attract kind of storyline. I wouldn't but this into a slow burn pile of books, although the main characters' relationship wasn't definite or clear until the almost end. </span></span><span data-dcnode-id="1682" instrument_node="">

</span><span data-dcnode-id="1516" id="freeTextContainer9020433766087867606"><span data-dcnode-id="1517" instrument_node="">3.5 I will probably be the out there review on this one, not that I'm reviewing officially. The first part was fantastic. I'm not even into ice queens, don't get the point of someone being so mean to everyone. Nadia was that and then some. I would say I even enjoyed it, because the medicine was phenomenal. The second part of the book...that was another thing. This is the part where I usually say ok, the ice queen has some sort of feeling in there. Well, Nadia doesn't. She still treated everyone,</span></span><span data-dcnode-id="1515" instrument_node="">
</span><span data-dcnode-id="1507" id="freeText9020433766087867606" style="display:none"><span data-dcnode-id="1514" instrument_node="">3.5 I will probably be the out there review on this one, not that I'm reviewing officially. The first part was fantastic. I'm not even into ice queens, don't get the point of someone being so mean to everyone. Nadia was that and then some. I would say I even enjoyed it, because the medicine was phenomenal. The second part of the book...that was another thing. This is the part where I usually say ok, the ice queen has some sort of feeling in there. Well, Nadia doesn't. She still treated everyone, including the other main awfully. The fact that she gave basically an ultimatum on children too...wow. I feel there was no vindication for that character. The other main deserves better. And that's something that makes me sad as a romance reader.</span><br data-dcnode-id="1513"><span data-dcnode-id="1512" instrument_node="">The medicine, as I mentioned before, was superb...until the whole let's just build him a heart. Now, I've not kept up with the latest in transplant but come on. And yes, this is fiction and the idea is great. I guess I had hoped for it to be a little more realistic as everything else was. For example, yes, the idea was 7yrs in the making but Nadia was still going through her medical training. No time for such a research with the hours needed for surgeon residency. Maybe saying the groundwork was done and she just figured out a final element or something like that.</span><br data-dcnode-id="1511"><span data-dcnode-id="1510" instrument_node="">I absolutely loved the medical history as well-unexpected I will admit. The concept of the Fifth Surgeon was brilliant!</span><br data-dcnode-id="1509"><span data-dcnode-id="1508" instrument_node="">So all in all, I will read this author moving forward and her medical background brought a Radclyffe feel to the book in terms of the knowledge and main medical story. That I can get behind and the reason it was a 4 and not a 3 for me. And the fact that it made me read it in 2 days and write a long review when lately I haven't, that's something.</span></span><span data-dcnode-id="1506" instrument_node="">

</span><span data-dcnode-id="1397" id="freeTextContainer7012099807945847353"><span data-dcnode-id="1402" instrument_node="">4.5 stars</span><br data-dcnode-id="1401"><span data-dcnode-id="1400" instrument_node="">(Much of this review was from the ebook version as my thoughts are very nearly the same except for a few added comments about the audiobook.)</span><br data-dcnode-id="1399"><span data-dcnode-id="1398" instrument_node="">As ice queens go, Nadia Keating is as frigid as they come. And if you're going to write a character like her, she has to be as great as her God complex purports her to be. And new author Faith Prize certainly did that here. I'm a big fan of medical dramas and romance so this was a perfect blend for me. Nadia isn't a character that is immediately li</span></span><span data-dcnode-id="1396" instrument_node="">
</span><span data-dcnode-id="1382" id="freeText7012099807945847353" style="display:none"><span data-dcnode-id="1395" instrument_node="">4.5 stars</span><br data-dcnode-id="1394"><span data-dcnode-id="1393" instrument_node="">(Much of this review was from the ebook version as my thoughts are very nearly the same except for a few added comments about the audiobook.)</span><br data-dcnode-id="1392"><span data-dcnode-id="1391" instrument_node="">As ice queens go, Nadia Keating is as frigid as they come. And if you're going to write a character like her, she has to be as great as her God complex purports her to be. And new author Faith Prize certainly did that here. I'm a big fan of medical dramas and romance so this was a perfect blend for me. Nadia isn't a character that is immediately likable - at least on the surface. A brilliant cardiothoracic fellow, she's single minded and doesn't suffer fools lightly. She expects everyone to be extremely competent and she rips to shreds anyone who isn't. And she barely tolerates those who are because they just aren't quite up to the level that she is - never mind that she may be below them in the hospital hierarchy.</span><br data-dcnode-id="1390"><span data-dcnode-id="1389" instrument_node="">The way she meets her boss, Chief Ashley Rylan, outside of their work environment is cringeworthy and sets up an interesting dynamic between the two. It was fun to watch it all play out. Keating reminded me of the other iciest of ice queens Natalya Tsvetnenko from Lee Winter's Requiem for Immortals. Their disdain for pretty much everyone else is almost comical, yet not. It makes them fascinating characters - especially when that one person enters their lives that breaks through their armor, as much as they try to keep them at bay. And while there are moments in this story where either a main or secondary character behaves in an irrational (or immature) way, I don't think that's necessarily uncommon, even though you would think their intellect or positions would dictate they behave in a more disciplined manner. I was certainly disappointed in Ashley's best friend and fellow surgeon as anyone in that regard. But intelligence doesn't always mean that people don't let their emotions get the better of them. </span><br data-dcnode-id="1388"><span data-dcnode-id="1387" instrument_node="">That said - it all added to the drama and I found this an engrossing, entertaining listen. And while I found the book sexy as hell when I first read it, in the voice of Abby Craden it raised the heat quotient up to sizzling. The couple's first encounter especially had me practically sliding out of my chair! Wow.</span><br data-dcnode-id="1386"><span data-dcnode-id="1385" instrument_node="">The medical aspect - and even the history of medicine - was especially interesting. Knowing Prize is a surgeon herself certainly added to the integrity of the work. </span><br data-dcnode-id="1384"><span data-dcnode-id="1383" instrument_node="">I'm so glad this was released on audio and look forward to what’s next from this talented author.</span></span><span data-dcnode-id="1381" instrument_node="">

</span><span data-dcnode-id="1290" id="freeText5162698275651738384" style="display:none"><span data-dcnode-id="1301" instrument_node="">This book has left me with mixed feelings.&nbsp; On the one hand, I love the subject, I really like books with a hospital environment, even more so if they focus on emergency rooms or operating rooms.&nbsp; But since the focus of this story is a bit incredible and I did not expect it, the result has been a bit confusing. </span><br data-dcnode-id="1300"><br data-dcnode-id="1299"><span data-dcnode-id="1298" instrument_node="">I admit that I liked Nadia, that cocky and haughty attitude, she really has reasons to feel above all. Ashley, on the other hand, I don't know if she's&nbsp; too kind or naive, but she certainly wasn't as attractive to me as Nadia, despite everything. </span><br data-dcnode-id="1297"><br data-dcnode-id="1296"><span data-dcnode-id="1295" instrument_node="">The pace of the story is a bit irregular, with those unexpected situations that turn things upside down.&nbsp; And the ending is too soft maybe, for me at least. </span><br data-dcnode-id="1294"><br data-dcnode-id="1293"><span data-dcnode-id="1292" instrument_node="">But if only for the originality, it deserves a good rating.</span><br data-dcnode-id="1291"></span><span data-dcnode-id="1289" instrument_node="">
