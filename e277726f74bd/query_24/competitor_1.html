</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">ABOUT</span></h2><span data-dcnode-id="679" instrument_node=""> </span></div><span data-dcnode-id="677" instrument_node="">
</span></div><span data-dcnode-id="675" instrument_node="">
</span><div class="elementor-element elementor-element-7c3e99c7 elementor-widget elementor-widget-text-editor" data-dcnode-id="660" data-element_type="widget" data-id="7c3e99c7" data-widget_type="text-editor.default"><span data-dcnode-id="674" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="662"><span data-dcnode-id="673" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="664"><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="671" instrument_node="">Born in Eugene, Oregon on February the 1st, 1968, Debbie Applegate is an American historian and biographer. She is the author of </span><a data-dcnode-id="668" href="#mostfamousman" rel="nofollow"><i data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">The Most Famous Man in America: The Biography of Henry Ward Beecher</span></i></a><span data-dcnode-id="667" instrument_node="">, for which she won the 2007 Pulitzer Prize for Biography for Autobiography. She was raised with her mother, who was a Mormon New Thought minister and an Irish Catholic father. Graduating summa cum laude in 1989 and becoming a Sterling Fellow at Yale University, she then earned a Ph.D. in American studies. She is married to business writer Bruce Tulgen and currently living in New Haven Connecticut.</span></p><span data-dcnode-id="665" instrument_node=""> </span></div><span data-dcnode-id="663" instrument_node="">
</span></div><span data-dcnode-id="661" instrument_node="">
</span></div><span data-dcnode-id="659" instrument_node="">
</span><div class="elementor-element elementor-element-ee9c4ed elementor-widget elementor-widget-heading" data-dcnode-id="651" data-element_type="widget" data-id="ee9c4ed" data-widget_type="heading.default"><span data-dcnode-id="658" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="653"><span data-dcnode-id="657" instrument_node="">
</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Henry Ward Beecher</span></h2><span data-dcnode-id="654" instrument_node=""> </span></div><span data-dcnode-id="652" instrument_node="">
</span></div><span data-dcnode-id="650" instrument_node="">
</span><div class="elementor-element elementor-element-5e19562 elementor-widget elementor-widget-text-editor" data-dcnode-id="633" data-element_type="widget" data-id="5e19562" data-widget_type="text-editor.default"><span data-dcnode-id="649" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="635"><span data-dcnode-id="648" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="637"><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="646" instrument_node="">Taking over 20 years to research and write, her first book </span><em data-dcnode-id="643"><a data-dcnode-id="644" data-wplink-edit="true" href="#mostfamousman" rel="nofollow"><span data-dcnode-id="645" instrument_node="">The Most Famous Man in America: The Biography of Henry Ward Beecher</span></a></em><span data-dcnode-id="642" instrument_node=""> was released in 2006 and went on to win the 2007 Pulitzer Prize for Biography or Autobiography. Henry Ward Beecher, born in 1813 was the son of a fierce fire-and-brimstone puritan minister and the brother of Harriet Beecher Stowe, who penned Uncle tom’s Cabin. Beecher was pushed into the ministry but instead of following his father’s style, he preached a charismatic New Testament gospel of unconditional love and healing. He became well known for his stance on antislavery and women’s suffrage movements and was involved in many controversies ranging from Darwinian evolution to politics. His notorious irreverent humour and melodramatic gestures gained him famous friendships such as Emerson, Thoreau and Twain. However, in 1872 he was accused of adultery with a parishioner.</span></p><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Beecher, who was also the subject of her Ph.D. is said to have helped shape and reflect national preoccupations before, during and after the Civil War. Applegate sees him as one of the great founding fathers of Modern American religion and culture and has stated she, “loved his very modern sense of humour and irreverence toward sacred cows, and his joyful ecumenical approach to religion and life in general”. She has described her book as a psychological thriller and it has been reviewed as a “beautifully written biography of America’s one best known preachers”. Suspenseful and dramatic with new historical evidence, it sheds new light on the culture and conflicts of historic contemporary America.</span></p><span data-dcnode-id="638" instrument_node=""> </span></div><span data-dcnode-id="636" instrument_node="">
</span></div><span data-dcnode-id="634" instrument_node="">
</span></div><span data-dcnode-id="632" instrument_node="">
</span><div class="elementor-element elementor-element-5cdb6fc elementor-hidden-desktop elementor-widget elementor-widget-heading" data-dcnode-id="624" data-element_type="widget" data-id="5cdb6fc" data-widget_type="heading.default"><span data-dcnode-id="631" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="626"><span data-dcnode-id="630" instrument_node="">
</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Awards &amp; Achievements</span></h2><span data-dcnode-id="627" instrument_node=""> </span></div><span data-dcnode-id="625" instrument_node="">
</span></div><span data-dcnode-id="623" instrument_node="">
</span><div class="elementor-element elementor-element-fc63dee elementor-hidden-desktop elementor-widget elementor-widget-text-editor" data-dcnode-id="612" data-element_type="widget" data-id="fc63dee" data-widget_type="text-editor.default"><span data-dcnode-id="622" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="614"><span data-dcnode-id="621" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="616"><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Applegate’s writings have won her numerous awards and prizes. She has taught at Yale and Wesleyan Universities and currently teaches at Marymount Manhattan College in New York. She has served on several literary governing boards and has contributed to publications ranging from The New York Times to The Journal of American History.</span></p><span data-dcnode-id="617" instrument_node=""> </span></div><span data-dcnode-id="615" instrument_node="">

</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">And then it all fell apart. In 1872 Beecher was accused by feminist firebrand Victoria Woodhull of adultery with one of his most pious parishioners. Suddenly the “Gospel of Love” seemed to rationalize a life of lust. The cuckolded husband brought charges of “criminal conversation” in a salacious trial that became the most widely covered event of the century, garnering more newspaper headlines than the entire Civil War. Beecher survived, but his reputation and his causes—from women’s rights to progressive evangelicalism—suffered devastating setbacks that echo to this day.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Featuring the page-turning suspense of a novel and dramatic new historical evidence, Debby Applegate has written the definitive biography of this captivating, mercurial, and sometimes infuriating figure. In our own time, when religion and politics are again colliding and adultery in high places still commands headlines, Beecher’s story sheds new light on the culture and conflicts of contemporary America.</span></p><span data-dcnode-id="387" instrument_node=""> </span></div><span data-dcnode-id="385" instrument_node="">

</span><p data-dcnode-id="316"><span data-dcnode-id="320" instrument_node="">No one predicted success for Henry Ward Beecher at his birth in 1813. The blithe, boisterous son of the last great Puritan minister, he seemed destined to be overshadowed by his brilliant siblings—especially his sister, Harriet Beecher Stowe, who penned the century’s bestselling book </span><i data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Uncle Tom’s Cabin</span></i><span data-dcnode-id="317" instrument_node="">. But when pushed into the ministry, the charismatic Beecher found international fame by shedding his father’s Old Testament–style fire-and-brimstone theology and instead preaching a New Testament–based gospel of unconditional love and healing, becoming one of the founding fathers of modern American Christianity. By the 1850s, his spectacular sermons at Plymouth Church in Brooklyn Heights had made him New York’s number one tourist attraction, so wildly popular that the ferries from Manhattan to Brooklyn were dubbed “Beecher Boats.” </span></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Beecher inserted himself into nearly every important drama of the era—among them the antislavery and women’s suffrage movements, the rise of the entertainment industry and tabloid press, and controversies ranging from Darwinian evolution to presidential politics. He was notorious for his irreverent humor and melodramatic gestures, such as auctioning slaves to freedom in his pulpit and shipping rifles—nicknamed “Beecher’s Bibles”—to the antislavery resistance fighters in Kansas. Thinkers such as Emerson, Thoreau, Whitman, and Twain befriended—and sometimes parodied—him.</span></p><span data-dcnode-id="312" instrument_node=""> </span></div><span data-dcnode-id="310" instrument_node="">
</span></div><span data-dcnode-id="308" instrument_node="">
</span></div><span data-dcnode-id="306" instrument_node="">
</span><div class="elementor-element elementor-element-c76fd87 elementor-hidden-tablet elementor-widget elementor-widget-text-editor" data-dcnode-id="284" data-element_type="widget" data-id="c76fd87" data-widget_type="text-editor.default"><span data-dcnode-id="305" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="286"><span data-dcnode-id="304" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="288"><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="302" instrument_node="">No one predicted success for Henry Ward Beecher at his birth in 1813. The blithe, boisterous son of the last great Puritan minister, he seemed destined to be overshadowed by his brilliant siblings—especially his sister, Harriet Beecher Stowe, who penned the century’s bestselling book </span><i data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Uncle Tom’s Cabin</span></i><span data-dcnode-id="299" instrument_node="">. But when pushed into the ministry, the charismatic Beecher found international fame by shedding his father’s Old Testament–style fire-and-brimstone theology and instead preaching a New Testament–based gospel of unconditional love and healing, becoming one of the founding fathers of modern American Christianity. By the 1850s, his spectacular sermons at Plymouth Church in Brooklyn Heights had made him New York’s number one tourist attraction, so wildly popular that the ferries from Manhattan to Brooklyn were dubbed “Beecher Boats.” </span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Beecher inserted himself into nearly every important drama of the era—among them the antislavery and women’s suffrage movements, the rise of the entertainment industry and tabloid press, and controversies ranging from Darwinian evolution to presidential politics. He was notorious for his irreverent humor and melodramatic gestures, such as auctioning slaves to freedom in his pulpit and shipping rifles—nicknamed “Beecher’s Bibles”—to the antislavery resistance fighters in Kansas. Thinkers such as Emerson, Thoreau, Whitman, and Twain befriended—and sometimes parodied—him.</span></p><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">And then it all fell apart. In 1872 Beecher was accused by feminist firebrand Victoria Woodhull of adultery with one of his most pious parishioners. Suddenly the “Gospel of Love” seemed to rationalize a life of lust. The cuckolded husband brought charges of “criminal conversation” in a salacious trial that became the most widely covered event of the century, garnering more newspaper headlines than the entire Civil War. Beecher survived, but his reputation and his causes—from women’s rights to progressive evangelicalism—suffered devastating setbacks that echo to this day.</span></p><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Featuring the page-turning suspense of a novel and dramatic new historical evidence, Debby Applegate has written the definitive biography of this captivating, mercurial, and sometimes infuriating figure. In our own time, when religion and politics are again colliding and adultery in high places still commands headlines, Beecher’s story sheds new light on the culture and conflicts of contemporary America.</span></p><span data-dcnode-id="289" instrument_node=""> </span></div><span data-dcnode-id="287" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="177"><span data-dcnode-id="184" instrument_node="">
</span><p data-dcnode-id="181"><strong data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Meet the real-life figure to rival the fictional Great Gatsby. From the Pulitzer Prize-winning author of The Most Famous Man in America, the compulsively readable and sometimes jaw-dropping life of the notorious madam who played hostess to every gangster, politician, writer, sports star and Cafe Society swell worth knowing, and who as much as any single figure helped make the twenties roar</span></strong></p><p data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">Simply put: Everybody came to Polly’s. Pearl “Polly” Adler (1900-1962) was a diminutive dynamo whose Manhattan brothels in the Roaring Twenties became places not just for men to have the company of women but were key gathering places where the culturati and celebrity elite mingled with high society and with violent figures of the underworld–and had a good time doing it. As a Jewish immigrant from eastern Europe, Polly Adler’s life is a classic American story of success and assimilation that starts like a novel by Henry Roth and then turns into a glittering real-life tale straight out of F. Scott Fitzgerald. She declared her ambition to be “the best goddam madam in all America” and succeeded wildly. Debby Applegate uses Polly’s story as the key to unpacking just what made the 1920s the appallingly corrupt yet glamorous and transformational era that it was and how the collision between high and low is the unique ingredient that fuels American culture.</span></p><span data-dcnode-id="178" instrument_node=""> </span></div><span data-dcnode-id="176" instrument_node="">
