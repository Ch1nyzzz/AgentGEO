</span><div class="profile-description" data-dcnode-id="1527"><span data-dcnode-id="1696" instrument_node="">
</span><div class="panel-wrapper" data-dcnode-id="1550"><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1678"><span data-dcnode-id="1691" instrument_node="">Bob Woodward gained international attention when he and Carl Bernstein uncovered the Watergate scandal in 1973. Since then, Watergate’s theme of secret government has driven Woodward’s tough but fair and non-partisan reporting. He pulls back the curtain on the inner workings of Washington; revealing in meticulous detail what’s </span><em data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">really</span></em><span data-dcnode-id="1688" instrument_node=""> going on in the halls power. Have the lessons of Watergate been forgotten? Is the media doing its job? Woodward offers a&nbsp;historical perspective as only he can. Woodward has written about the last nine U.S. presidents and chronicled how the power of the presidency has evolved. He is author of 19 bestselling books – 13 were #1 – more than any contemporary nonfiction writer. His bestseller,&nbsp;</span><em data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Fear: Trump in the White House</span></em><span data-dcnode-id="1685" instrument_node="">, is the deepest dive ever made into the first months of any American president. Woodward’s 20th&nbsp;book,&nbsp;</span><em data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Rage</span></em><span data-dcnode-id="1682" instrument_node="">, goes behind the scenes of the Trump presidency like never before. Currently associate editor for&nbsp;</span><em data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">The Washington Post</span></em><span data-dcnode-id="1679" instrument_node="">&nbsp;where he’s worked since 1971, Bob Woodward has won nearly every American journalism award including two Pulitzers.</span></p><span data-dcnode-id="1677" instrument_node="">
</span><p data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Former CIA director and Secretary of Defense Robert Gates wished he’d recruited Woodward into the CIA, “He has an extraordinary ability to get otherwise responsible adults to spill [their] guts to him…his ability to get people to talk about stuff they shouldn’t be talking about is just extraordinary and may be unique.” Therein lays the genius talent of Bob Woodward.</span></p><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1673" instrument_node="">No one else in political investigative journalism has the clout, respect, and reputation of Woodward. He has a way of getting insiders to open up in ways that reveal an intimate yet sweeping portrayal of Washington and the political infighting, how we fight wars, the price of politics, how presidents lead, the homeland security efforts, and so much more. His work is meticulous and draws on internal memos, classified documents, meeting notes and hundreds of hours of recorded interviews with most of the key players, including the president. This is why </span><em data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Fear: Trump in the White House</span></em><span data-dcnode-id="1670" instrument_node=""> sold more than 1.1 million copies in its first week in September 2018 – breaking the 94-year first-week sales record of its publisher Simon &amp; Schuster – and nearly 2 million copies in hardback, ebook and audio in the first four months.</span></p><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">As a speaker, Woodward pulls the curtain back on Washington and its leaders to captivate audiences with stories that are sometimes surprising, at times shocking, and always fascinating. He blends stories that are both up to the minute and from the past (to provide historical context). Woodward speaks as he writes – crisp and concise – and helps people get behind the spin to understand what’s really going on in the halls of power in an age of 24-hour news, social media, and snarky politics.</span></p><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1654"><span data-dcnode-id="1664" instrument_node="">Professionally, Bob Woodward is currently associate editor for&nbsp;</span><em data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">The Washington Post</span></em><span data-dcnode-id="1661" instrument_node="">&nbsp;where he’s worked since 1971. He has won nearly every American journalism award, and the </span><em data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Post</span></em><span data-dcnode-id="1658" instrument_node=""> won the 1973 Pulitzer Prize for his work with Carl Bernstein on the Watergate scandal. In addition, Woodward was the main reporter for the </span><em data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Post</span></em><span data-dcnode-id="1655" instrument_node="">’s articles on the aftermath of the September 11 terrorist attacks that won the National Affairs Pulitzer Prize in 2002.</span></p><span data-dcnode-id="1653" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1652" instrument_node="">Bob Schieffer of CBS News said "Woodward has established himself as the best reporter of our time. He may be the best reporter of all time."</span><strong data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1649" instrument_node="">Lloyd Green wrote in a review for </span><em data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">The Guardian</span></em><span data-dcnode-id="1646" instrument_node=""> that </span><em data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Fear</span></em><span data-dcnode-id="1643" instrument_node=""> “depicts a White House awash in dysfunction, where the </span><em data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Lord of the Flies</span></em><span data-dcnode-id="1640" instrument_node=""> is the closest thing to an owner’s manual.” </span><em data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">The Weekly Standard</span></em><span data-dcnode-id="1637" instrument_node=""> called Woodward “the best pure reporter of his generation, perhaps ever.” In 2003, Al Hunt of </span><em data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">The Wall Street Journal</span></em><span data-dcnode-id="1634" instrument_node=""> called Woodward “the most celebrated journalist of our age.” In listing the all-time 100 best non-fiction books, </span><em data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Time</span></em><span data-dcnode-id="1631" instrument_node=""> magazine has called </span><em data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">All the President’s Men</span></em><span data-dcnode-id="1628" instrument_node="">, by Bernstein and Woodward, “Perhaps the most influential piece of journalism in history.”</span></p><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1625" instrument_node="">Woodward has co-authored or authored 13 #1 national best-selling non-fiction books. They are: </span><em data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">All the President’s Men</span></em><span data-dcnode-id="1622" instrument_node=""> (1974) and </span><em data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">The Final Days</span></em><span data-dcnode-id="1619" instrument_node=""> (1976), both Watergate books, co-authored with Bernstein. </span><em data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">The Brethren: Inside the Supreme Court</span></em><span data-dcnode-id="1616" instrument_node=""> (1979) co-authored with Scott Armstrong, </span><em data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Wired: The Short Life and Fast Times of John Belushi</span></em><span data-dcnode-id="1613" instrument_node=""> (1984), </span><em data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Veil: The Secret Wars of the CIA 1981-87</span></em><span data-dcnode-id="1610" instrument_node=""> (1987), </span><em data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">The Commanders</span></em><span data-dcnode-id="1607" instrument_node=""> (1991), </span><em data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">The Agenda: Inside the Clinton White House</span></em><span data-dcnode-id="1604" instrument_node=""> (1994), </span><em data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Shadow: Five Presidents and the Legacy of Watergate</span></em><span data-dcnode-id="1601" instrument_node=""> (1999), </span><em data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Bush at War </span></em><span data-dcnode-id="1598" instrument_node="">(2002), </span><em data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Plan of Attack</span></em><span data-dcnode-id="1595" instrument_node=""> (2004), </span><em data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">State of Denial: Bush at War Part III</span></em><span data-dcnode-id="1592" instrument_node=""> (2006), and </span><em data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Obama’s Wars </span></em><span data-dcnode-id="1589" instrument_node="">(2010), and </span><em data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Fear: Trump in the White House</span></em><span data-dcnode-id="1586" instrument_node=""> (2018). Woodward’s other national bestselling books: </span><em data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">The Secret Man: The Story of Watergate’s Deep Throat</span></em><span data-dcnode-id="1583" instrument_node=""> (2005), </span><em data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">The Choice</span></em><span data-dcnode-id="1580" instrument_node=""> (1996), </span><em data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Maestro: Greenspan’s Fed and the American Boom</span></em><span data-dcnode-id="1577" instrument_node=""> (2000), </span><em data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">The War Within: A Secret White House History 2006-2008</span></em><span data-dcnode-id="1574" instrument_node=""> (2008), </span><em data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">The Price of Politics</span></em><span data-dcnode-id="1571" instrument_node=""> (2012), and </span><em data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">The Last of the President’s Men </span></em><span data-dcnode-id="1568" instrument_node="">(2015). Newsweek magazine has excerpted six of Woodward’s books in headline-making cover stories; “60 Minutes” has done pieces on seven of his books; three of his books have been made into feature films.</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">In November 2017, the online learning portal MasterClass released “Bob Woodward Teaches Investigative Journalism.” In it Woodward reveals the lessons he’s learned during his career, teaching students what truth means, how to uncover it, and how to build a story with it.</span></p><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1562" instrument_node="">Woodward was born March 26, 1943 in Illinois. He graduated from Yale University in 1965 and served five years as a communications officer in the U.S. Navy before beginning his journalism career at the Montgomery County Sentinel (Maryland), where he was a reporter for one year before joining </span><em data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">The Post</span></em><span data-dcnode-id="1559" instrument_node="">.</span></p><span data-dcnode-id="1557" instrument_node="">

</span><a data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.leadingauthorities.com/print/view/pdf/speaker/topic%3Fview_args%255B%255D%3D17801" target="_blank"><span data-dcnode-id="1378" instrument_node="">

</span><div class="speaker-topics-description" data-dcnode-id="1303"><span data-dcnode-id="1363" instrument_node="">
</span><div class="topics-panel-wrapper" data-dcnode-id="1305"><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1350"><strong data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">How We Got Here –</span></strong><span data-dcnode-id="1359" instrument_node=""> </span><strong data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node=""> Lessons From Ten Presidents.&nbsp;</span></strong><span data-dcnode-id="1351"><span data-dcnode-id="1352"><span data-dcnode-id="1356" instrument_node="">Now reporting on his tenth American president, Bob Woodward’s remarkable perspective is unmatched in journalism. The two-time Pulitzer Prize-winning reporter takes audiences on a journey as only he can. From Nixon to the present, Woodward provides firsthand insights from having penetrated the White House, the Supreme Court, the CIA, the Pentagon, the Congress. He analyzes the successes and messes of the presidents he’s covered and offers important lessons - about governing, about presidential leadership during economic, military, and national crises, about the expanding powers of the presidency, and about the role of the media. Woodward’s content is tailored to the interests of the audience and is an in-depth, non-partisan, fact-driven analysis of America’s current state through the lens of&nbsp;history.&nbsp;In the time since he </span><span data-dcnode-id="1353"><span data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">uncovered the Watergate scandal with Carl Bernstein in 1973, Woodward has worked to shine a light on the inner-workings of secret government. In all, he has written 20 nonfiction bestsellers – 14 of which went on to become #1; more than any modern-day author. Woodward is currently at work on his 21st book about the final days of the Trump presidency and the handoff to Joe Biden. </span></span></span></span></span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1342"><strong data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">The State of The American Presidency. </span></strong><span data-dcnode-id="1346" instrument_node="">Everywhere legendary journalist Bob Woodward goes, he says people ask to know what’s </span><em data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">really</span></em><span data-dcnode-id="1343" instrument_node=""> going on in Washington. Their questions fall into four categories:</span></p><span data-dcnode-id="1341" instrument_node="">
</span><ol data-dcnode-id="1324"><span data-dcnode-id="1340" instrument_node="">
</span><li data-dcnode-id="1335"><span data-dcnode-id="1339" instrument_node="">The presidency: How is President Trump doing and surviving? How does Trump compare with the other eight presidents – Nixon to Obama – that Woodward has reported on for </span><em data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">The Washington Post</span></em><span data-dcnode-id="1336" instrument_node=""> and in his bestselling books?</span></li><span data-dcnode-id="1334" instrument_node="">
</span><li data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">The investigation of special counsel Robert Mueller: Is it like Watergate or will it fade away like Reagan's Iran-Contra scandal?</span></li><span data-dcnode-id="1331" instrument_node="">
</span><li data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Conflict: What is the likelihood of a new war? What are the goals with North Korea, in the Middle East, with the Islamic state, and on terrorism?&nbsp;Will there likely be a major escalation in one of the current conflicts? And</span></li><span data-dcnode-id="1328" instrument_node="">
</span><li data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">The economy: Is the American/global economy sound or are we headed for trouble? How is Trump’s America First agenda playing out with our allies and enemies around the globe?&nbsp;</span></li><span data-dcnode-id="1325" instrument_node="">
</span></ol><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1322" instrument_node="">In Woodward’s speeches, the two-time Pulitzer Prize-winning associate editor of the </span><em data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Post</span></em><span data-dcnode-id="1319" instrument_node=""> offers answers to these questions that audiences won't learn from any other source.&nbsp;Since 1971, he has reported on nine presidencies and immersed himself in their decision-making, scandals, wars, and economic policy like no other reporter. He leveraged a rich network of sources – applying his signature aggressive but fair reporting method&nbsp;for his book on President Trump, his administration, and its many controversies. As with his 19 bestselling books – 13 of which have been #1 (including his most recent book, </span><em data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Fear: Trump in the White House</span></em><em data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">)</span></em><span data-dcnode-id="1314" instrument_node=""> – Bob Woodward’s talks go behind behind-the-scenes to reveal what's really going on and what it means.</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p class="show-more" data-dcnode-id="1307"><span data-dcnode-id="1311" instrument_node="">
