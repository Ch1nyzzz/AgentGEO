</span><h2 class="bs-ov-header p-0" data-dcnode-id="6176"><span data-dcnode-id="6177" instrument_node="">Overview</span></h2><span data-dcnode-id="6175" instrument_node="">
</span><div class="text--medium overview-content p-lg-4 p-sm-0 bookseller-cont" data-dcnode-id="6130"><span data-dcnode-id="6174" instrument_node="">
</span><div class="bs-content bs-expandable-collapse" data-dcnode-id="6135"><span data-dcnode-id="6173" instrument_node="">
</span><div class="overview-cntnt" data-dcnode-id="6137" itemprop="description"><span data-dcnode-id="6172" instrument_node="">
WINNER OF THE 2021 PULITZER PRIZE FOR GENERAL NONFICTION</span><p data-dcnode-id="6171"></p><span data-dcnode-id="6170" instrument_node=""> </span><p data-dcnode-id="6168"><span data-dcnode-id="6169" instrument_node="">From Pulitzer Prize-winner David Zucchino comes a searing account of the Wilmington riot and coup of 1898, an extraordinary event unknown to most Americans.</span></p><span data-dcnode-id="6167" instrument_node=""> </span><p data-dcnode-id="6162"><span data-dcnode-id="6166" instrument_node="">By the 1890s, Wilmington was North Carolina’s largest city and a shining example of a mixed-race community. It was a bustling port city with a burgeoning African American middle class and a Fusionist government of Republicans and Populists that included black aldermen, police officers and magistrates. There were successful black-owned businesses and an African American newspaper, </span><i data-dcnode-id="6164"><span data-dcnode-id="6165" instrument_node="">The Record</span></i><span data-dcnode-id="6163" instrument_node="">. But across the state—and the South—white supremacist Democrats were working to reverse the advances made by former slaves and their progeny.</span></p><span data-dcnode-id="6161" instrument_node=""> </span><p data-dcnode-id="6156"><span data-dcnode-id="6160" instrument_node="">In 1898, in response to a speech calling for white men to rise to the defense of Southern womanhood against the supposed threat of black predators, Alexander Manly, the outspoken young </span><i data-dcnode-id="6158"><span data-dcnode-id="6159" instrument_node="">Record</span></i><span data-dcnode-id="6157" instrument_node=""> editor, wrote that some relationships between black men and white women were consensual. His editorial ignited outrage across the South, with calls to lynch Manly.</span></p><span data-dcnode-id="6155" instrument_node=""> </span><p data-dcnode-id="6153"><span data-dcnode-id="6154" instrument_node="">But North Carolina’s white supremacist Democrats had a different strategy. They were plotting to take back the state legislature in November “by the ballot or bullet or both,” and then use the Manly editorial to trigger a “race riot” to overthrow Wilmington’s multi-racial government. Led by prominent citizens including Josephus Daniels, publisher of the state’s largest newspaper, and former Confederate Colonel Alfred Moore Waddell, white supremacists rolled out a carefully orchestrated campaign that included raucous rallies, race-baiting editorials and newspaper cartoons, and sensational, fabricated news stories.</span></p><span data-dcnode-id="6152" instrument_node=""> </span><p data-dcnode-id="6147"><span data-dcnode-id="6151" instrument_node="">With intimidation and violence, the Democrats suppressed the black vote and stuffed ballot boxes (or threw them out), to win control of the state legislature on November eighth. Two days later, more than 2,000 heavily armed Red Shirts swarmed through Wilmington, torching the </span><i data-dcnode-id="6149"><span data-dcnode-id="6150" instrument_node="">Record</span></i><span data-dcnode-id="6148" instrument_node=""> office, terrorizing women and children, and shooting at least sixty black men dead in the streets. The rioters forced city officials to resign at gunpoint and replaced them with mob leaders. Prominent blacks—and sympathetic whites—were banished. Hundreds of terrified black families took refuge in surrounding swamps and forests.</span></p><span data-dcnode-id="6146" instrument_node=""> </span><p data-dcnode-id="6144"><span data-dcnode-id="6145" instrument_node="">This brutal insurrection is a rare instance of a violent overthrow of an elected government in the U.S. It halted gains made by blacks and restored racism as official government policy, cementing white rule for another half century. It was not a “race riot,” as the events of November 1898 came to be known, but rather a racially motivated rebellion launched by white supremacists.</span></p><span data-dcnode-id="6143" instrument_node=""> </span><p data-dcnode-id="6138"><span data-dcnode-id="6142" instrument_node="">In </span><i data-dcnode-id="6140"><span data-dcnode-id="6141" instrument_node="">Wilmington’s Lie</span></i><span data-dcnode-id="6139" instrument_node="">, Pulitzer Prize-winner David Zucchino uses contemporary newspaper accounts, diaries, letters and official communications to create a gripping and compelling narrative that weaves together individual stories of hate and fear and brutality. This is a dramatic and definitive account of a remarkable but forgotten chapter of American history.</span></p></div><span data-dcnode-id="6136" instrument_node="">
</span></div><span data-dcnode-id="6134" instrument_node="">

DAVID ZUCCHINO is a contributing writer for </span><i data-dcnode-id="4179"><span data-dcnode-id="4180" instrument_node="">The New York Times</span></i><span data-dcnode-id="4178" instrument_node="">. He has covered wars and civil conflicts in more than three dozen countries. Zucchino was awarded a Pulitzer Prize for his dispatches from apartheid South Africa and is a four-time Pulitzer Prize finalist for his reporting from Iraq, Lebanon, Africa and inner-city Philadelphia. He is the author of </span><i data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">Thunder Run</span></i><span data-dcnode-id="4175" instrument_node=""> and </span><i data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">Myth of the Welfare Queen</span></i><span data-dcnode-id="4172" instrument_node="">.</span><p data-dcnode-id="4171"></p></div><span data-dcnode-id="4169" instrument_node="">

</span><h2 class="pb-sm-s pb-md-s" data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">Editorial Reviews</span></h2><span data-dcnode-id="4002" instrument_node="">
</span><blockquote data-dcnode-id="3817"><span data-dcnode-id="4001" instrument_node="">
</span><p data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">WINNER OF THE 2021 PULITZER PRIZE FOR GENERAL NONFICTION</span></p><span data-dcnode-id="3998" instrument_node=""> </span><p data-dcnode-id="3993"><span data-dcnode-id="3997" instrument_node="">Praise for </span><i data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">Wilmington's Lie</span></i><span data-dcnode-id="3994" instrument_node="">:</span></p><span data-dcnode-id="3992" instrument_node=""> </span><p data-dcnode-id="3990"><span data-dcnode-id="3991" instrument_node="">"A gripping account of the overthrow of the elected government of a Black-majority North Carolina city after Reconstruction that untangles a complicated set of power dynamics cutting across race, class and gender." —2021 General Nonfiction Pulitzer Prize Committee</span></p><span data-dcnode-id="3989" instrument_node=""> </span><p data-dcnode-id="3985"><span data-dcnode-id="3988" instrument_node="">“A judicious and riveting new history…The publication of a book like Zucchino’s, [is] a sign that, however late and reluctantly, America is becoming conscious of the racial violence that insured white supremacy after Reconstruction.”—</span><i data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">New Yorker</span></i></p><span data-dcnode-id="3984" instrument_node=""> </span><p data-dcnode-id="3977"><span data-dcnode-id="3983" instrument_node="">“Brilliant…Zucchino, a contributing writer for the </span><i data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">New York Times</span></i><span data-dcnode-id="3980" instrument_node="">, does not overwrite the scenes. His moral judgment stands at a distance. He simply describes what happened and the lies told to justify it all…The details contained in the last part of the book are heart-wrenching. With economy and a cinematic touch, Zucchino recounts the brutal assault on black Wilmington.”—</span><i data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">New York Times</span></i></p><span data-dcnode-id="3976" instrument_node=""> </span><p data-dcnode-id="3966"><span data-dcnode-id="3975" instrument_node="">“In </span><i data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">Wilmington’s Lie</span></i><span data-dcnode-id="3972" instrument_node="">, David Zucchino, a Pulitzer Prize-winning journalist who has covered conflicts around the world, punctures the myths surrounding the insurrection and provides a dynamic and detailed account of the lives of perpetrators and victims…Deeply researched and profoundly relevant, </span><i data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">Wilmington’s Lie</span></i><span data-dcnode-id="3969" instrument_node=""> explains how [the coup] happened and suggests how much work remains to be done to come to terms with what took place.”—</span><i data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">Washington Post</span></i></p><span data-dcnode-id="3965" instrument_node=""> </span><p data-dcnode-id="3961"><span data-dcnode-id="3964" instrument_node="">“This is an amazing story.”—Dave Davies, NPR’s </span><i data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">Fresh Air</span></i></p><span data-dcnode-id="3960" instrument_node=""> </span><p data-dcnode-id="3950"><span data-dcnode-id="3959" instrument_node="">“David Zucchino offers a gripping account of one of the most disturbing, though virtually unknown, political events in American history…Thanks to Mr. Zucchino’s unflinching account, we now have the full, appalling story. As befits a serious journalist, he avoids polemics and lets events speak for themselves. </span><i data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">Wilmington’s Lie</span></i><span data-dcnode-id="3956" instrument_node=""> joins a growing shelf of works that unpeel the brutal realities of the post-Civil War South…it is books such as these, not least </span><i data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">Wilmington’s Lie</span></i><span data-dcnode-id="3953" instrument_node="">, that have redeemed the truth of post-Civil War history from the tenacious mythology of racism.”—</span><i data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">Wall Street Journal</span></i></p><span data-dcnode-id="3949" instrument_node=""> </span><p data-dcnode-id="3945"><span data-dcnode-id="3948" instrument_node="">“In his new book, the Pulitzer Prize-winning journalist David Zucchino illuminates a harrowing historical incident, the Wilmington coup of 1898, that is long forgotten by most. In doing so, he does a lot to explain our own interesting times… In his riveting book, Zucchino retells one horrifying attempt to re-establish the “rightful place” of former slaves: starkly isolated, with scant hope of parity.”—</span><i data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">Guardian</span></i></p><span data-dcnode-id="3944" instrument_node=""> </span><p data-dcnode-id="3937"><span data-dcnode-id="3943" instrument_node="">“</span><i data-dcnode-id="3941"><span data-dcnode-id="3942" instrument_node="">Wilmington’s Lie</span></i><span data-dcnode-id="3940" instrument_node=""> shows how effectively people in power can distort history. And yet it also proves that the past isn’t easily erased. We still don’t know how many black people died in Wilmington, and we also don’t know many of their names. But the truth—much of it—has finally come out.”—</span><i data-dcnode-id="3938"><span data-dcnode-id="3939" instrument_node="">Charlotte Observer</span></i></p><span data-dcnode-id="3936" instrument_node=""> </span><p data-dcnode-id="3932"><span data-dcnode-id="3935" instrument_node="">“Pulitzer Prize-winning journalist David Zucchino cuts through a century of propaganda, myth, and big white lies to unmask the stunning history of the Wilmington coup, its origins in the political climate of the era, and its far-reaching implications for North Carolina and the rest of the resurgent Confederacy in the decades that followed.”—</span><i data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">New York Journal of Books</span></i></p><span data-dcnode-id="3931" instrument_node=""> </span><p data-dcnode-id="3924"><span data-dcnode-id="3930" instrument_node="">“The dumbfounding, true story in David Zucchino’s </span><i data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">Wilmington’s Lie</span></i><span data-dcnode-id="3927" instrument_node=""> [is] so lacerating, so appalling you often can’t believe what you’re reading. I hope this powerful book helps preserve this bad memory for a long time… Zucchino is your ideal guide. The Pulitzer Prize-winner and former Inquirer staffer is a tireless, resourceful reporter, an incisive social analyst, and a direct, often elegant writer.”—</span><i data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">Philadelphia Inquirer</span></i></p><span data-dcnode-id="3923" instrument_node=""> </span><p data-dcnode-id="3916"><span data-dcnode-id="3922" instrument_node="">“Brilliant…Zucchino reports his way through the action and the personal stories with great care, culminating in the central story that has been covered up over the last century: the stunning overthrow of the legitimately elected Wilmington city government…David Zucchino dedicates </span><i data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">Wilmington’s Lie</span></i><span data-dcnode-id="3919" instrument_node=""> “to the dead and banished, known and unknown.” Through this act of documenting, he brings truth to the lie.”—</span><i data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">Southern Review of Books</span></i></p><span data-dcnode-id="3915" instrument_node=""> </span><p data-dcnode-id="3908"><span data-dcnode-id="3914" instrument_node="">“</span><i data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">Wilmington’s Lie</span></i><span data-dcnode-id="3911" instrument_node=""> is a riveting and mesmerizing page turner, with lessons about racial violence that echo loudly today.”—</span><i data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">BookPage </span></i></p><span data-dcnode-id="3907" instrument_node=""> </span><p data-dcnode-id="3902"><span data-dcnode-id="3906" instrument_node="">“Usually, when we read history, we at least have a cursory knowledge of the subject at hand. Sometimes, however, a book comes along that just surprises. How did we not know about this before? we ask ourselves. </span><i data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node="">Wilmington’s Lie</span></i><span data-dcnode-id="3903" instrument_node=""> is such a book…We did not have to wait long for the first great history book of the new decade.” —Chris Schluep, Amazon “Best of January” Selection</span></p><span data-dcnode-id="3901" instrument_node=""> </span><p data-dcnode-id="3894"><span data-dcnode-id="3900" instrument_node="">“Pierces layers of myth and invented history . . . </span><i data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">Wilmington's Lie</span></i><span data-dcnode-id="3897" instrument_node=""> reconstructs the only violent overthrow of an elected government in U.S. history, tying the white supremacist bloodshed to political goals that are still relevant today.”—</span><i data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">Shelf Awareness</span></i></p><span data-dcnode-id="3893" instrument_node=""> </span><p data-dcnode-id="3889"><span data-dcnode-id="3892" instrument_node="">“Extremely compelling and convincing...Even astute readers of history and civil rights will be alarmed by this story, which is why it should be read. For fans of American history, politics, and civil rights.”—</span><i data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">Library Journal</span></i></p><span data-dcnode-id="3888" instrument_node=""> </span><p data-dcnode-id="3883"><span data-dcnode-id="3887" instrument_node="">“Pulitzer Prize–winning journalist Zucchino delivers a searing chronicle of the November 1898 white supremacist uprising in Wilmington, N.C., that overthrew the municipal government…Drawing on a wealth of primary sources, Zucchino paints a disturbing portrait of the massacre and how it was covered up by being described as a “race riot” sparked by African-Americans. This masterful account reveals a shameful chapter in American history.”—</span><i data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">Publishers Weekly</span></i><span data-dcnode-id="3884" instrument_node=""> (starred review)</span></p><span data-dcnode-id="3882" instrument_node=""> </span><p data-dcnode-id="3878"><span data-dcnode-id="3881" instrument_node="">“Pulitzer Prize-winning journalist Zucchino shines his reporter's spotlight on what he aptly calls a murderous coup as well as exploring its background and long-term consequences…The result is both a page-turner and a sobering reminder of democracy's fragility.”—</span><i data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">Booklist</span></i></p><span data-dcnode-id="3877" instrument_node=""> </span><p data-dcnode-id="3872"><span data-dcnode-id="3876" instrument_node="">“A searing and still-relevant tale of racial injustice at the turn of the 20th century… A book that does history a service by uncovering a shameful episode, one that resonates strongly today.”—</span><i data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">Kirkus Reviews </span></i><span data-dcnode-id="3873" instrument_node="">(starred review)</span></p><span data-dcnode-id="3871" instrument_node=""> </span><p data-dcnode-id="3867"><span data-dcnode-id="3870" instrument_node="">“One of the great journalists of our time has placed his discerning eye on the steaming cauldron of our shared racial history. The result is this extraordinary book written with the superb quality and journalistic excellence that is Zucchino’s trademark.” —James McBride, National Book Award–winning author of </span><i data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">The Good Lord Bird</span></i></p><span data-dcnode-id="3866" instrument_node=""> </span><p data-dcnode-id="3861"><span data-dcnode-id="3865" instrument_node="">“David Zucchino is one of the finest foreign correspondents I have ever worked with in 40 years of journalism. Now imagine you take someone with David’s reporting skills and transport him back in history to 1898 and Wilmington, North Carolina. And you tell him to tell us the story of the only violent overthrow of an elected government in American history. It was perpetrated by white supremacists seeking to reverse the remarkable advances in racial pluralism in Wilmington of that day—a positive example that was primed to spread throughout the state, and beyond. What you end up with is a gripping, cannot-put-down book that is both history and a distant mirror on just how much can go wrong in this great country of ours when populist politicians play the race card without restraint.”—Thomas L. Friedman, </span><i data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node=""> New York Times</span></i><span data-dcnode-id="3862" instrument_node=""> columnist</span></p><span data-dcnode-id="3860" instrument_node=""> </span><p data-dcnode-id="3856"><span data-dcnode-id="3859" instrument_node="">“A staggeringly great book, both thrilling and tragic, shining light on a dark passage of American history." —Tim Weiner, National Book Award–winning author of </span><i data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">Legacy of Ashes</span></i></p><span data-dcnode-id="3855" instrument_node=""> </span><p data-dcnode-id="3848"><span data-dcnode-id="3854" instrument_node="">“</span><i data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">Wilmington’s Lie</span></i><span data-dcnode-id="3851" instrument_node=""> is riveting and meticulously reported and powerfully written. It is also scalding and revelatory. As David Zucchino shows with relentless drama, the end of the Civil War was not the end of slavery but the beginning of a period more terrifying, the unchecked rise of white supremacy that culminated in a day of unparalleled blood in a North Carolina coastal town. It is a forgotten chapter in American history. Zucchino has now made it an unforgettable one.” —Buzz Bissinger, author of </span><i data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">Friday Night Lights</span></i></p><span data-dcnode-id="3847" instrument_node=""> </span><p data-dcnode-id="3846"></p><span data-dcnode-id="3845" instrument_node=""> </span><p data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">Praise for David Zucchino:</span></p><span data-dcnode-id="3842" instrument_node=""> </span><p data-dcnode-id="3824"><span data-dcnode-id="3841" instrument_node="">“Even a very short, victorious shooting war against a disorganized, dispirited, vastly outnumbered and underequipped enemy is hell. That is the central message that </span><i data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">Los Angeles Times</span></i><span data-dcnode-id="3838" instrument_node=""> correspondent Zucchino brings home startlingly well in this riveting account of the American military's lightning capture of Baghdad in April 2003…[A] high-quality example of in-depth and evocative war reporting.”—</span><i data-dcnode-id="3836"><span data-dcnode-id="3837" instrument_node="">Publishers Weekly</span></i><span data-dcnode-id="3835" instrument_node="">, on </span><i data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">Thunder Run</span></i><br data-dcnode-id="3832"><br data-dcnode-id="3831"><span data-dcnode-id="3830" instrument_node="">“Zucchino does not obscure the ugliness—including welfare recipients who embrace dependence—that surrounds them, but what stands out is the resilience of these women in the face of events that would be insurmountable tragedies for most middle- and upper-class Americans. It is unlikely this book will engender new and widespread respect for welfare mothers, for the ‘welfare queen’ myth draws its strength from what people want to believe, not misperceptions of reality. But by setting aside presuppositions and moral judgments to simply describe what he finds, Zucchino offers a substantive image of life on welfare.”—</span><i data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">Kirkus Reviews</span></i><span data-dcnode-id="3827" instrument_node="">, on </span><i data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">Myth of the Welfare Queen</span></i></p><p data-dcnode-id="3823"></p><span data-dcnode-id="3822" instrument_node="">
</span><footer data-dcnode-id="3819"><cite data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">From the Publisher</span></cite></footer><span data-dcnode-id="3818" instrument_node="">
</span></blockquote><span data-dcnode-id="3816" instrument_node="">
</span><div aria-expanded="false" class="more-reviews" data-dcnode-id="3755" id="more-reviews" style="display: none;"><span data-dcnode-id="3815" instrument_node="">
</span><blockquote data-dcnode-id="3800"><span data-dcnode-id="3814" instrument_node="">
</span><p data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node="">★ 12/09/2019</span></p><p data-dcnode-id="3807"><span data-dcnode-id="3811" instrument_node="">Pulitzer Prize–winning journalist Zucchino (</span><i data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">Thunder Run</span></i><span data-dcnode-id="3808" instrument_node="">) delivers a searing chronicle of the November 1898 white supremacist uprising in Wilmington, N.C., that overthrew the municipal government. At the time, Zucchino notes, Wilmington’s “thriving population of black professionals” made it, according to one contemporary source, “the freest town for a negro in the country.” Determined to end “Negro rule,” a cabal of white politicians and newspapermen launched a statewide campaign of voter suppression, intimidation, and ballot stuffing that flipped control of North Carolina’s state legislature from a Republican-Populist alliance to Democrats in the 1898 elections. The next day, the white supremacist leader Col. Alfred Waddell read a “White Declaration of Independence” in the Wilmington courthouse; among its seven resolutions was a demand for black newspaper owner Alexander Manly to be banished from the city for publishing an editorial that, Zucchino writes, “upended the core white conviction that any sex act between a black man and a white woman could only be rape.” When Waddell falsely claimed that Wilmington’s black leaders didn’t deliver their written response to the demands by 7:30 the next morning, as was required, nearly 2,000 armed white men burned down Manly’s newspaper offices, killed an estimated 60 African-Americans, and installed Waddell as mayor. Drawing on a wealth of primary sources, Zucchino paints a disturbing portrait of the massacre and how it was covered up by being described as a “race riot” sparked by African-Americans. This masterful account reveals a shameful chapter in American history. Agent: Philippa Brophy, Sterling Lord Literistic. (Jan.) </span></p><p data-dcnode-id="3806"></p><span data-dcnode-id="3805" instrument_node="">
</span><footer data-dcnode-id="3802"><cite data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">Publishers Weekly</span></cite></footer><span data-dcnode-id="3801" instrument_node="">
</span></blockquote><span data-dcnode-id="3799" instrument_node="">
</span><blockquote data-dcnode-id="3776"><span data-dcnode-id="3798" instrument_node="">
</span><p data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">12/01/2019</span></p><p data-dcnode-id="3783"><span data-dcnode-id="3795" instrument_node="">Zucchino (</span><i data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">Thunder Run</span></i><span data-dcnode-id="3792" instrument_node="">) explains a tragic story of denied civil rights. Just two years after the landmark Supreme Court case </span><i data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">Plessy vs. Ferguson</span></i><span data-dcnode-id="3789" instrument_node=""> (1896), in which African Americans were considered to be separate but equal, emboldened white supremacists staged a governmental coup in Wilmington, NC in 1898, setting back civil rights for decades to come. Tactics included ballot stuffing and media manipulation. Zucchino uses personal diaries and testimonies from those present to engage readers. He also aims to illustrate the context of the coup and its repercussions on the following century of disenfranchisement; his account is extremely compelling and convincing. </span><b data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">VERDICT</span></b><span data-dcnode-id="3786" instrument_node=""> Even astute readers of history and civil rights will be alarmed by this story, which is why it should be read. For fans of American history, politics, and civil rights. [See Prepub Alert, 8/5/19.]</span><b data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">—Keith Klang, Port Washington P.L., NY</span></b></p><p data-dcnode-id="3782"></p><span data-dcnode-id="3781" instrument_node="">
</span><footer data-dcnode-id="3778"><cite data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">Library Journal</span></cite></footer><span data-dcnode-id="3777" instrument_node="">
</span></blockquote><span data-dcnode-id="3775" instrument_node="">
</span><blockquote data-dcnode-id="3757"><span data-dcnode-id="3774" instrument_node="">
</span><p data-dcnode-id="3770"><span data-dcnode-id="3773" instrument_node="">★ 2019-09-24</span><br data-dcnode-id="3772"><span data-dcnode-id="3771" instrument_node="">A searing and still-relevant tale of racial injustice at the turn of the 20th century.</span></p><p data-dcnode-id="3765"><span data-dcnode-id="3769" instrument_node="">In 1898, the city of Wilmington, North Carolina, was unusual in the South for having a government that included African Americans. Many moving parts went into that development, including the short-term disenfranchisement of Confederates during Reconstruction, the ratification of the 15th Amendment, and the rise of a prosperous black middle class in the port city. As Pulitzer Prize winner Zucchino (</span><i data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">Thunder Run: The Armored Strike To Capture Baghdad</span></i><span data-dcnode-id="3766" instrument_node="">, 2004, etc.) shows, it was met by an organization that "acquired a formal name proudly embraced by Democrats: the White Supremacy Campaign," the goal of which "was to evict blacks from office and intimidate black voters from going to the polls." The product of a politician and a newspaper editor, the movement took a paramilitary turn when thousands of "Red Shirts" turned up to besiege Wilmington in what amounted to a coup d'état, the only violent change of government in the history of the nation, though certainly not the only instance of racial violence. The author writes, meaningfully, "for whites in Wilmington, blacks had ceased to be slaves, but they had not ceased to be black." The coup, in which at least 60 blacks died, was successful. It replaced the city's government with an all-white one, and it led to widespread disenfranchisement throughout the South. The newspaper editor, Josephus Daniels, moved on to Louisiana and campaigned for white supremacy there, promulgating a voter-suppression law that, in New Orleans, "helped reduce the number of black voters from 14,117 to 1,493." Efforts by the biracial Republican Party in North Carolina to undo the wrong were met with indifference even by Republican President William McKinley. The complexities of racial division and party politics in a time before the Republicans and Democrats effectively switched sides are sometimes challenging to follow, but Zucchino's narrative is clear and appropriately outraged without being strident.</span></p><p data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">A book that does history a service by uncovering a shameful episode, one that resonates strongly today.</span></p><span data-dcnode-id="3762" instrument_node="">
</span><footer data-dcnode-id="3759"><cite data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">Kirkus Reviews</span></cite></footer><span data-dcnode-id="3758" instrument_node="">
</span></blockquote><span data-dcnode-id="3756" instrument_node="">
