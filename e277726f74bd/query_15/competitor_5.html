-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5499" instrument_node="">The Specsavers National Book Awards includes many categories, such as the Book of the Year, Outstanding Achievement, UK Author of the Year, Children's Book of the Year and Thriller &amp; Crime Novel of the Year.</span></span></p><span data-dcnode-id="5496" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5493" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5494" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="5495" instrument_node="">2. Nobel Prize in Literature</span></span></p><span data-dcnode-id="5492" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5489" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5490" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5491" instrument_node="">The Nobel Prize in Literature is only awarded to the best authors from all around the world.</span></span></p><span data-dcnode-id="5488" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5485" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5486" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="5487" instrument_node="">3. Man Booker Prize</span></span></p><span data-dcnode-id="5484" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5481" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5482" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5483" instrument_node="">The Man Booker Prize for Fiction is awarded to writers of full-length novels from the Commonwealth of Nations, Ireland, or Zimbabwe.</span></span></p><span data-dcnode-id="5480" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5477" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5478" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="5479" instrument_node="">4. Pulitzer Prize</span></span></p><span data-dcnode-id="5476" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5473" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5474" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5475" instrument_node="">This US award is given to those in newspaper or online journalism, literature, or music. There are 21 categories including the Pulitzer Prize for Editorial Writing, the Pulitzer Prize for Music and the Pulitzer Prize for Fiction.</span></span></p><span data-dcnode-id="5472" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5469" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5470" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="5471" instrument_node="">5. Costa Book Awards</span></span></p><span data-dcnode-id="5468" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5465" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data- " style="background: none;"><span data-dcnode-id="3915" instrument_node="">What are the main differences between the major fiction literary awards?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="3832" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="3833" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3834" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="3901" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="3835" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="3869" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3870" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="3871" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="3872" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3873" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3890" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3891" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3900" instrument_node="">Thanks for the A2A.</span><br data-dcnode-id="3899"><span data-dcnode-id="3898" instrument_node=""> </span><br data-dcnode-id="3897"><span data-dcnode-id="3896" instrument_node="">The literary awards listed are all for English language works, which ignores some of the richest awards out there (like the Premio Planeta de Novela) but unfortunately I just don't know much about those awards to comment. It also does not include awards which target specific genres, so no Astrid Lindgren. So for the major English language awards, here are the main details:</span><br data-dcnode-id="3895"><span data-dcnode-id="3894" instrument_node=""> </span><br data-dcnode-id="3893"><span data-dcnode-id="3892" instrument_node=""></span></span></p><ul class="q-box" data-dcnode-id="3886" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="3887" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="3888" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3889" instrument_node="">Pulitzer Prize: Awarded for 'distinguished' fiction by an American author. A jury, which changes every year, goes through (almost) all of the entrants and puts forward three finalists to be decided by</span></span></li></ul><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3874" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3875" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3876" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3877" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3878" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3883" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3884" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3885" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3879" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3880"><svg data-dcnode-id="3881" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3882" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3836" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3837" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3838"><span class="q-box qu-userSelect--text" data-dcnode-id="3839" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3858" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3859" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3868" instrument_node="">Thanks for the A2A.</span><br data-dcnode-id="3867"><span data-dcnode-id="3866" instrument_node=""> </span><br data-dcnode-id="3865"><span data-dcnode-id="3864" instrument_node="">The literary awards listed are all for English language works, which ignores some of the richest awards out there (like the Premio Planeta de Novela) but unfortunately I just don't know much about those awards to comment. It also does not include awards which target specific genres, so no Astrid Lindgren. So for the major English language awards, here are the main details:</span><br data-dcnode-id="3863"><span data-dcnode-id="3862" instrument_node=""> </span><br data-dcnode-id="3861"><span data-dcnode-id="3860" instrument_node=""></span></span></p><ul class="q-box" data-dcnode-id="3845" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="3855" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3856" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3857" instrument_node="">Pulitzer Prize: Awarded for 'distinguished' fiction by an American author. A jury, which changes every year, goes through (almost) all of the entrants and puts forward three finalists to be decided by the eighteen person Pulitzer Board, who serve three year terms. The winners should, ideally, comment on and be about American life. </span></span></li><li class="q-relative" data-dcnode-id="3852" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3853" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3854" instrument_node="">Pen/Faulkner: Awarded annually to the best work of fiction by a living American citizen. Three writers are chosen to be the panel of judges, who choose five books as finalists of the award. </span></span></li><li class="q-relative" data-dcnode-id="3849" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3850" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3851" instrument_node="">Man Booker: Awarded to the best original novel, written in English by a citizen of the Commonwealth of Nations. An advisory committee is set up initially which chooses the judging panel, which changes from year to year. The type of book to win is usually related to what is fashionable in the London literary scene at the time, but throws up enormous controvery from time to time. </span></span></li><li class="q-relative" data-dcnode-id="3846" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="3847" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3848" instrument_node="">National Book Award: Awarded for any fiction which is written by an American author and published by an American publisher. Five judges are chosen, who in the past were always writers but from 2013 will be opened up to literary critics, librarians, etc. The award has been criticised in the past for awarding books which have not gotten mainstream attention, and need a 'boost', which sidelines already successful novels.  </span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3840" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3841" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3844" instrument_node=""> </span><br data-dcnode-id="3843"><span data-dcnode-id="3842" instrument_node="">I think the Pulitzer is probably the most prestigious, but it really depends on your view on the merits of the winners of each award. It also depends on how you view the judges that they select. A few years back people savaged the Man Booker prizes because the judges were seen as not literary enough, and more from the lower class of readers.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3768" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3769" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3770" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3784" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3806" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3807" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode "q-box qu-display--none" data-dcnode-id="3245" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3246" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3247"><span class="q-box qu-userSelect--text" data-dcnode-id="3248" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3268" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3269" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3270" instrument_node="">I would assume that most people would say that the Nobel Prize in literature is the highest literary award currently existing. It is one of the oldest such awards around, having been presented annually (with the exception of 1914 and 1940–1943) since 1901 and also entailing a very considerable cash amount, currently slightly over US$1M.</span></span></p><span data-dcnode-id="3267" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3264" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3265" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3266" instrument_node="">However, the Nobel Prize is also encumbered with a number of problems. One is that it’s generally given in consideration of the sum of an author’s life’s work. Another is that the Swedish Academy, which constitutes the prize jury, fairly obviously tries to find some balance among the languages and countries of the recipients, that it tries to avoid controvery (it is notable that for the first hundred years not a single author known to be homosexual received the Prize; is is also notable that no author whose major work has sparked great controversy, either aesthetically or morally, has received the Prize; if you want examples of non-closeted gay authors who have missed out, they include Willa Cather, H.D., W. H. Auden, Virginia Woolf, Gore Vidal, Colette, Christopher Isherwood, Allen Ginsberg; controversial authors include Ezra Pound, Vladimir Nabokov, James Joyce, Graham Greene, Mark Twain), and that it also (as far as works in prose are concerned) awards work within the modernist, social realist mainstream of what is considered serious literature. This last means that generally, work that falls within literary genres (children’s literature, juvenile literature, crime fiction, fantasy, science fiction, and so on) are just not in the running.</span></span></p><span data-dcnode-id="3263" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3260" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3261" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3262" instrument_node="">Apart from the Nobel, there are in most countries numerous literary awards of very different standing. Usually, there is one or more of very high standing, given to what the jury (however it may be constituted) considers the finest literary work published in the country during a given year. In the US, the Pulitzer Prize and the National Book Award both do this, possibly with the Pulitzer having a slightly higher prestige. In Great Britain, there is the Man Booker Prize. In France, the Prix Goncourt and the Grand Prix du roman de l’Académie Française. And so on, endlessly. For genre fiction, there are innumerable special awards: in science fiction, the Nebula Award and the Hugo Award are the two most important, but there are many others; in crime fiction, the American Edgar Allan Poe Award and the British Dagger Awards are the most important, though the French Grand Prix de Littérature Policière is also quite important. In fantasy, the World Fantasy Award is most definitely important, as is the British Fantasy Award; for horror fiction, you have the Bram Stoker Award. And so on.</span></span></p><span data-dcnode-id="3259" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3249" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3257" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3258" instrument_node="">If you’re truly interested in literary awards, you’re welcome to explore the subject further. You’ll find an impresive (but far from complete) list of awards here: </span></span><span class="q-inline" data-dcnode-id="3250" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_literary_awards" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3256" instrument_node="">List of literary awards - Wikipedia</span></a><span class="q-inlineBlock" data-dcnode-id="3251" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3252"><svg data-dcnode-id="3253" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6 rection: ltr;"><span data-dcnode-id="1134" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1137" instrument_node="">Nobel Prize for Literature - Lifetime achievement. Awarded annually</span><br data-dcnode-id="1136"><span data-dcnode-id="1135" instrument_node="">http://www.nobelprize.org/nobel_prizes/literature/</span></span></p><span data-dcnode-id="1132" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1127" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1128" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1131" instrument_node="">The Edgar Award - Best mystery book of the year.</span><br data-dcnode-id="1130"><span data-dcnode-id="1129" instrument_node="">http://www.theedgars.com/</span></span></p><span data-dcnode-id="1126" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1121" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1122" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1125" instrument_node="">The National Book Critics Circle Award - Awarded annually for Fiction, Biography, Poetry, Criticism, General Non-Fiction, and Autobiography. They also award the Ivan Sandrof Lifetime Achievement Award.</span><br data-dcnode-id="1124"><span data-dcnode-id="1123" instrument_node="">http://bookcritics.org/awards</span></span></p><span data-dcnode-id="1120" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1115" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1116" style="font-weight: normal; font-style: normal; background: none de-id="851" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="852" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="853" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="854" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="879" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="880" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="881" instrument_node="">In answer to the question of what type of literature someone would need to write, the answer is “it varies”.</span></span></p><span data-dcnode-id="878" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="871" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="876" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="877" instrument_node="">Poets have won the award (even Bob Dylan, who is more notable as a singer, although he’s written most of his lyrics), as have authors of non-fiction, historians, dramatists, philosophers, and people who’ve done a number of the above. I can’t immediately see an author of “genre fiction” winning anytime soon, but there are authors in those veins who don’t </span></span><span data-dcnode-id="874" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="875" instrument_node="">just</span></span><span data-dcnode-id="872" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="873" instrument_node=""> write crime or horror or whatever, so there are perhaps some who could.</span></span></p><span data-dcnode-id="870" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="867" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="868" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="869" instrument_node="">It’s also worth noting that the award is meant to be in reco</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="855" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="856" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="857" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="858" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="859" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="864" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="865" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="866" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="860" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="861"><svg data-dcnode-id="862" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="863" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="823" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="824" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="825"><span class="q-box qu-userSelect--text" data-dcnode-id="826" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="847" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="848" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="849" instrument_node="">In answer to the question of what type of literature someone would need to write, the answer is “it varies”.</span></span></p><span data-dcnode-id="846" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="839" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="844" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="845" instrument_node="">Poets have won the award (even Bob Dylan, who is more notable as a singer, although he’s written most of his lyrics), as have authors of non-fiction, historians, dramatists, philosophers, and people who’ve done a number of the above. I can’t immediately see an author of “genre fiction” winning anytime soon, but there are authors in those veins who don’t </span></span><span data-dcnode-id="842" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="843" instrument_node="">just</span></span><span data-dcnode-id="840" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="841" instrument_node=""> write crime or horror or whatever, so there are perhaps some who could.</span></span></p><span data-dcnode-id="838" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="835" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="836" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="837" instrument_node="">It’s also worth noting that the award is meant to be in recognition of an author’s total body of work (at the time of the award, of course).</span></span></p><span data-dcnode-id="834" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="831" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="832" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="833" instrument_node="">The “in an ideal direction” part of the criteria was initially interpreted as having a sort of “idealism” behind it, which resulted in a sort of stolidly conservative author being more likely to win. This gradually opened up to be taken as having a “humanity” in the writing, and the idea of “having the greatest benefit to mankind” was taken as meaning the author needed to be within everyone’s reach, rather than a bit “high-flown”, sort of thing.</span></span></p><span data-dcnode-id="830" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="827" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="828" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="829" instrument_node="">After the Second World War, this moved somewhat to the more pioneering authors, and then to look at authors who were important but lesser-known. More recently again, there’s been what seems to be a consciously international focus in the award.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="750" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="751" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="752" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="766" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="793" style="box-sizing: border-box; display: inline-flex;
