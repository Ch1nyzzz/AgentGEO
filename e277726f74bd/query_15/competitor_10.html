ument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2896" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2897" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2898" instrument_node="">National Book Award - Best American book of the year http://www.nationalbook.org/ </span></span></p><span data-dcnode-id="2895" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2890" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2891" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2894" instrument_node="">The Man Booker Prize - Best British or British colonial book of the year</span><br data-dcnode-id="2893"><span data-dcnode-id="2892" instrument_node="">http://www.themanbookerprize.com/</span></span></p><span data-dcnode-id="2889" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2884" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2885" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2888" instrument_node="">The Man Booker International Prize - Lifetime achievement for writers in English or whose works have been widely translated into English. Awarded every two years.</span><br data-dcnode-id="2887"><span data-dcnode-id="2886" instrument_node="">http://www.themanbookerprize.com/prize/about-man-booker-international</span></span></p><span data-dcnode-id="2883" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2878" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2879" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2882" instrument_node="">Nobel Prize for Literature - Lifetime achievement. Awarded annually</span><br data-dcnode-id="2881"><span data-dcnode-id="2880" instrument_node="">http://www.nobelprize.org/nobel_prizes/literature/</span></span></p><span data-dcnode-id="2877" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2872" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2873" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2876" instrument_node="">The Edgar Award - Best mystery book of the year.</span><br data-dcnode-id="2875"><span data-dcnode-id="2874" instrument_node="">http://www.theedgars.com/</span></span></p><span data-dcnode-id="2871" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2866" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2867" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2870" instrument_node="">The National Book Critics Circle Award - Awarded annually for Fiction, Biography, Poetry, Criticism, General Non-Fiction, and Autobiography. They also award the Ivan Sandrof Lifetime Achievement Award.</span><br data-dcnode-id="2869"><span data-dcnode-id="2868" instrument_node="">http://bookcritics.org/awards</span></span></p><span data-dcnode-id="2865" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2860" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2861" style="font-weight: normal; font-style: normal; ba
