yle="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2262" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2263"><span class="q-box qu-userSelect--text" data-dcnode-id="2264" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2305" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2306" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2307" instrument_node="">It's highly cynical and Orwellian in its approach, and has been frighteningly successful in undermining the public's faith in journalism through the intentional manipulation of language and symbol.</span></span></p><span data-dcnode-id="2304" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2301" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2302" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2303" instrument_node="">I don't have an issue with them having a right wing slant. I don't have an issue with them giving blowhards like O'Reilly a soapbox.</span></span></p><span data-dcnode-id="2300" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2297" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2298" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2299" instrument_node="">I take strong issue with the slogan: 'fair and balanced' and 'we report you decide' because to suggest that these notions drive the journalistic vision at FOX News is no only flat out disingenuous, it's a cynical and intentional attempt to manipulate. </span></span></p><span data-dcnode-id="2296" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2293" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2294" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2295" instrument_node="">How and why? If you label FOX News 'right wing' and then label NPR 'left wing', and then you look at the way that FOX is blatantly and unrepentantly biased in their coverage, the assumption is made that since NPR is 'on the other side' their coverage is as intentionally political and biased as FOX's is. </span></span></p><span data-dcnode-id="2292" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2289" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2290" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2291" instrument_node="">This is not true. The same logic applies to something like the NYTimes - by FOX labeling them left wing, they imply that NYTimes has the same degree of agenda and bias as FOX, when this is clearly not the case.</span></span></p><span data-dcnode-id="2288" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2285" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2286" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2287" instrument_node="">This whole cynical concept that all media is biased and dictated by corporate masters has essentially been FOX's play. By saying one thing (fair and balanced) while behaving clearly and completely opposite of the stated goals, they have been able to undermine even the notion of facts, and have burned cynicism and distrust into everyone's notion of media. </span></span></p><span data-dcnode-id="2284" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2281" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2282" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2283" instrument_node="">FOX, and Murdoch's other news ventures, have always treated news as infotainment and are the primary force behind transforming the acknowledgment of inevitable biases into an whole hearted embrace of lensing all facts thru ideology.</span></span></p><span data-dcnode-id="2280" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2277" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2278" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2279" instrument_node="">So, the problem is not that they espouse a certain viewpoint, or even that they do so while claiming otherwise, it's that they have taken this strategy as a way to undermine the concepts of facts, trust, honesty and integrity. The have intentionally chosen to be awful so that they can drag everyone else down with them. Their goal has always been less to push right wing views then it has been to undermine everyone's faith in journalism, objectivity and facts.</span></span></p><span data-dcnode-id="2276" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2265" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2272" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2275" instrument_node="">See:</span><br data-dcnode-id="2274"><span data-dcnode-id="2273" instrument_node=""></span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/Why-do-people-think-NPR-has-a-liberal-bias/answers/2016153" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="2271" instrument_node="">Quora User's answer to Why do people think NPR has a liberal bias?</span></a><span data-dcnode-id="2266" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2269" instrument_node=""></span><br data-dcnode-id="2268"><span data-dcnode-id="2267" instrument_node="">for my take on "the other side" and why FOX News is different.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2183" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2184" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2185" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2199" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2231" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2232" style="box-sizing: border-box; display ow very little about advertising.</span></span></p><span data-dcnode-id="1392" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1389" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1390" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1391" instrument_node="">Do you really think that the major advertisers who promote the</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1377" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1378" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1379" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1380" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1381" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1386" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1387" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1388" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1382" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1383"><svg data-dcnode-id="1384" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1385" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1335" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1336" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1337"><span class="q-box qu-userSelect--text" data-dcnode-id="1338" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1367" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1370" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1371" instrument_node="">Question: </span></span><span data-dcnode-id="1368" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="1369" instrument_node="">How does CNN stay on the air with such low ratings?</span></span></p><span data-dcnode-id="1366" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1363" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1364" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1365" instrument_node="">It’s clear that you have never worked in the television business, questioner.</span></span></p><span data-dcnode-id="1362" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1359" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1360" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1361" instrument_node="">CNN is one of the premier news brands on Earth. While the American right-wing doesn't seem to enjoy it, plenty of movers and shakers get their news from that network and its various sub-entities around the world. It’s been that way for nearly four decades and there’s no indication that’s going to change any time in the near future.</span></span></p><span data-dcnode-id="1358" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1355" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1356" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1357" instrument_node="">It’s also pretty clear that you know very little about advertising.</span></span></p><span data-dcnode-id="1354" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1351" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1352" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1353" instrument_node="">Do you really think that the major advertisers who promote their products on CNN would do so if they thought that they wouldn’t reach a wide and diverse audience? They aren’t in the business of politics (well beyond paying campaign contributions and hiring lobbyists, that is) and so they really couldn’t give a sh*t if an angry Trump supporter in East Stump Jump doesn’t watch CNN because their boss tells them it’s full of liars. Their data and sales demonstrate that CNN sells their products and that’s all that matters.</span></span></p><span data-dcnode-id="1350" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1347" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1348" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1349" instrument_node="">Finally, it’s clear that you don’t have a firm grasp upon “ratings”.</span></span></p><span data-dcnode-id="1346" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1343" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1344" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1345" instrument_node="">As noted in another answer to this question, the majority of cable entities draw ratings far lower than CNN’s and yet they remain on the air. CNN is in a minor competition with Fox News flagship network, but is handily beating its sub-networks on a nearly weekly basis. Fox News draws in viewers on its main channel, but loses them pretty much everywhere else. Worse than that, Fox can’t even claim that it has a diverse group of viewers as myriad studies have shown that mainly White right-wing and reactionary viewers are its core audience.</span></span></p><span data-dcnode-id="1342" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1339" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1340" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1341" instrument_node="">Soooo..if you learn a great deal more about television, advertising, and ratings, you’ll see why this question is absurd on its face. If you don’t, then no correct answer to it is going to make sense to you.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1257" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1258" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1259" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1273" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1305" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1306" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1316" style="box-sizing: border-box; pointer-  misspell as Fux News) is more entertainment, demagoguery, and showcasing of alt-right views than it is a news network. The network fills a void for those who seek pretty faces, dull minds, and sharp tongues. This is not to say that everyone on the air is a dolt; rather it seeks to point out that if one has not a modicum of knowledge about politics, the environment, the human condition, and an appreciation of the absurd, you can turn to Fox to fill your mind with hot air.</span></span></p><span data-dcnode-id="1135" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1132" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1133" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1134" instrument_node="">Aside from the negatives, I believe that it is good to tune into their network if only to see and hear what strange conspiracies are making the rounds. The War Against Christmas is but an example of the drivel that they offer the slow of thought.</span></span></p><span data-dcnode-id="1131" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1128" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1129" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1130" instrument_node="">Simply stated, it is a news network in name only. Having written that, I can retreat to my cave and tune in for a brief while to hear what the White House talking—no, make that ranting—heads are offering in apology-couched-as-alternate facts to explain the latest Twitter storm generated from the bedroom of the house at 1600 Pennsylvania Avenue.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_ 741" style="box-sizing: border-box; position: absolute;"></div><div class="q-flex qu-mb--tiny" data-dcnode-id="729" style="box-sizing: border-box; display: flex;"><div class="q-text qu-dynamicFontSize--regular_title qu-bold qu-color--gray_dark_dim qu-passColorToLinks qu-lineHeight--regular qu-wordBreak--break-word" data-dcnode-id="730" style="box-sizing: border-box;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="731"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 TitleText___StyledCssInlineComponent-sc-1hpb63h-0 jPnwvF" data-dcnode-id="732"><a class="q-box qu-display--block qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/Do-guests-on-Fox-News-get-paid-for-their-appearances" style="box-sizing: border-box; border-radius: inherit;" target="_blank"><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="734" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="735" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="736" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="737" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="738" style="box-sizing: border-box;"><span data-dcnode-id="739" style="background: none;"><span data-dcnode-id="740" instrument_node="">Do guests on Fox News get paid for their appearances?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--none qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="671" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="672" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="673" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="726" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="674" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="702" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="703" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="704" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="705" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="706" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="723" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="724" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="725" instrument_node="">Very few of them, to the best of my knowledge. Most are invited to talk because they are experts, and there’s an unspoken quid pro quo: your status and brand value rises. Perhaps you have books that are for sale, or perhaps someone will commission you to write an editorial or do some other work and pay you for that.</span></span></p><span data-dcnode-id="722" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="719" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="720" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="721" instrument_node="">I’ve never appeared on fox, but I have on CNN, CNBC, Al Jazeera, MSNBC, Bloomberg, etc, in the US, (did a spot with Maria Bartiromo just before her move to Fox) and done guest spots for overseas news channels, and the question of compensation never arises. I’ve requested and receive</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="707" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="708" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="709" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="710" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="711" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="716" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="717" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="718" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="712" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="713"><svg data-dcnode-id="714" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="715" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="675" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="676" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="677"><span class="q-box qu-userSelect--text" data-dcnode-id="678" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="699" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="700" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="701" instrument_node="">Very few of them, to the best of my knowledge. Most are invited to talk because they are experts, and there’s an unspoken quid pro quo: your status and brand value rises. Perhaps you have books that are for sale, or perhaps someone will commission you to write an editorial or do some other work and pay you for that.</span></span></p><span data-dcnode-id="698" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="695" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="696" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="697" instrument_node="">I’ve never appeared on fox, but I have on CNN, CNBC, Al Jazeera, MSNBC, Bloomberg, etc, in the US, (did a spot with Maria Bartiromo just before her move to Fox) and done guest spots for overseas news channels, and the question of compensation never arises. I’ve requested and received transport to and from studios, and they’ll routinely offer hair and makeup assistance, as needed.</span></span></p><span data-dcnode-id="694" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="691" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="692" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="693" instrument_node="">There may be folks who aren’t employees, but who are regular “guests” and as such are a different kind of participant. They really aren’t occasional participants, but are expected to show up a certain number of times a week, rain or shine. These aren’t the typical guest spots, where someone is invited to come on a show to discuss something that happens to be in the news that day or that week — for instance, today the word “dotard” is in the news because North Korea’s leader used it referring to Donald Trump, so producers might be looking for a Shakespearean language expert for their shows. But those regular guests, there every week, may get an honorarium of some kind — I just don’t know.</span></span></p><span data-dcnode-id="690" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="683" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="688" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="689" instrument_node="">One way to know for sure that someone </span></span><span data-dcnode-id="686" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="687" instrument_node="">is </span></span><span data-dcnode-id="684" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="685" instrument_node="">collecting some kind of check is if the network introduces them as the station’s “consultant”. So, even if they have their own business or whatever, they might be introduced as Mr. X, a former CIA official who now runs his own security firm and who is Fox’s consultant on national security stories.” Or something like that. CNN has done this with healthcare, with some defense/national security stuff, among other things. Usually it will be someone who has a somewhat high profile in the topic in question, like Richard Clarke or Dr. Oz.</span></span></p><span data-dcnode-id="682" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="679" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="680" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="681" instrument_node="">But in most cases, a news organization will never pay people to appear. It’s not considered ethical. It would be like me, as a print journalist, paying a source for the quotes I use in my articles. Would you trust the results? Erm, nope. You get nibbles in the green room and transportation, and enough makeup slathered on your face to make everyone you pass on the street afterword look at you as if you’d just landed from Mars.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="597" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="598" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="599" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="613" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="645" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="646" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="656" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="657" style="box-sizing: border-box; position: relative;"><button aria-label="39 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu
