rize, “the criteria for winners have changed over the years” as “the committee has during various decades sought to promote different aims.” If there were a Nobel Prize in philosophy, what would good criteria be? What would the aims of the prize be? And who would be on the short list? UPDATE&nbsp;(10/12/15): In addition to the Berggruen Prize, there is also,.." data-dcnode-id="3065" name="description"><span data-dcnode-id="3064" instrument_node="">

</span><div addthis:description="When Alfred Nobel, the renowned inventor of dynamite, died in 1896, he left behind a will that laid a foundation for the prestigious Nobel Prizes. He directed most of his wealth to fund prizes for those who confer the “greatest benefit on mankind” in a number of specified fields. Hence we have the Nobel Prizes for physics, chemistry, medicine or physiology, literature, and peace… Notably, there is no Nobel Prize for philosophy, although Bertrand Russell won the Literature Prize in 1950. Albert Camus also won it (in 1957), as did Jean-Paul Sartre (in 1964), though he chose to turn it down. Camus and Sartre were, of course, largely known as creative writers. I doubt that any philosophers begrudge creative writers the Nobel Prize for Literature, but a there’s a strong case for a separate Nobel Prize for Philosophy, recognising the discipline’s particular “benefit to mankind”. So writes Russell Blackford (Newcastle) at&nbsp;The Drum. Reasons he offers in&nbsp;favor of a Nobel Prize for Philosophy include: “Philosophers often bring their skills to the great questions of our time, including problems of global injustice and the risks to humanity’s future” “Major living philosophers… are prominent in public debate across a wide range of urgent issues” “Philosophy provides an indispensable counterweight” to debate that is too often “dominated by tribalism, dogma and emotional manipulation” Blackford also says that the technical nature or difficulty&nbsp;of some philosophy ought not to disqualify it, as other disciplines, like physics, are also technical and difficult. Still, he seems skeptical that his arguments will win out over the tradition, and suggests that the new&nbsp;Berggruen Prize could&nbsp;end up being the equivalent of a Nobel for philosophy. Nobel Prize winners are selected from a pool of nominated candidates by a committee of members of the Swedish Academy. There does not appear to be any fixed criteria, and, at least for the literature prize, “the criteria for winners have changed over the years” as “the committee has during various decades sought to promote different aims.” If there were a Nobel Prize in philosophy, what would good criteria be? What would the aims of the prize be? And who would be on the short list? UPDATE&nbsp;(10/12/15): In addition to the Berggruen Prize, there is also,.." addthis:title="A Nobel Prize for Philosophy?  (updated) | Daily Nous" addthis:url="https://dailynous.com/2015/10/08/a-nobel-prize-for-philosophy/" class="addthis_toolbox addthis_default_style addthis_32x32_style add_this_list" data-dcnode-id="2553"><span data-dcnode-id="2560" instrument_node="">

</span><p data-dcnode-id="2539"><em data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">When Alfred Nobel, the renowned inventor of dynamite, died in 1896, he left behind a will that laid a foundation for the prestigious Nobel Prizes.</span></em></p><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2535"><em data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">He directed most of his wealth to fund prizes for those who confer the “greatest benefit on mankind” in a number of specified fields. Hence we have the Nobel Prizes for physics, chemistry, medicine or physiology, literature, and peace…</span></em></p><span data-dcnode-id="2534" instrument_node="">
</span><p data-dcnode-id="2531"><em data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">Notably, there is no Nobel Prize for philosophy, although Bertrand Russell won the Literature Prize in 1950. Albert Camus also won it (in 1957), as did Jean-Paul Sartre (in 1964), though he chose to turn it down. Camus and Sartre were, of course, largely known as creative writers.</span></em></p><span data-dcnode-id="2530" instrument_node="">
</span><p data-dcnode-id="2527"><em data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">I doubt that any philosophers begrudge creative writers the Nobel Prize for Literature, but a there’s a strong case for a separate Nobel Prize for Philosophy, recognising the discipline’s particular “benefit to mankind”.</span></em></p><span data-dcnode-id="2526" instrument_node="">
</span><p data-dcnode-id="2520"><span data-dcnode-id="2525" instrument_node="">So writes Russell Blackford (Newcastle) at&nbsp;</span><em data-dcnode-id="2522"><a data-dcnode-id="2523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abc.net.au/news/2015-10-08/blackford-should-there-be-a-nobel-prize-for-philosophy/6837526" target="_blank"><span data-dcnode-id="2524" instrument_node="">The Drum</span></a></em><span data-dcnode-id="2521" instrument_node="">. Reasons he offers in&nbsp;favor of a Nobel Prize for Philosophy include:</span></p><span data-dcnode-id="2519" instrument_node="">
</span><ul data-dcnode-id="2508"><span data-dcnode-id="2518" instrument_node="">
</span><li data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">“Philosophers often bring their skills to the great questions of our time, including problems of global injustice and the risks to humanity’s future”</span></li><span data-dcnode-id="2515" instrument_node="">
</span><li data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">“Major living philosophers… are prominent in public debate across a wide range of urgent issues”</span></li><span data-dcnode-id="2512" instrument_node="">
</span><li data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">“Philosophy provides an indispensable counterweight” to debate that is too often “dominated by tribalism, dogma and emotional manipulation”</span></li><span data-dcnode-id="2509" instrument_node="">
</span></ul><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Blackford also says that the technical nature or difficulty&nbsp;of some philosophy ought not to disqualify it, as other disciplines, like physics, are also technical and difficult.</span></p><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2499"><span data-dcnode-id="2503" instrument_node="">Still, he seems skeptical that his arguments will win out over the tradition, and suggests that the new&nbsp;</span><a data-dcnode-id="2501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailynous.com/2015/09/16/new-philosophy-center-aims-to-bridge-american-chinese-gap/" target="_blank"><span data-dcnode-id="2502" instrument_node="">Berggruen Prize</span></a><span data-dcnode-id="2500" instrument_node=""> could&nbsp;end up being the equivalent of a Nobel for philosophy.</span></p><span data-dcnode-id="2498" instrument_node="">
</span><p data-dcnode-id="2493"><span data-dcnode-id="2497" instrument_node="">Nobel Prize winners are selected from a pool of nominated candidates by a committee of members of the Swedish Academy. There does not appear to be any fixed criteria, and, at least </span><a data-dcnode-id="2495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thecrimson.com/article/2011/4/15/espmark-prize-nobel-swedish/" target="_blank"><span data-dcnode-id="2496" instrument_node="">for the literature prize</span></a><span data-dcnode-id="2494" instrument_node="">, “the criteria for winners have changed over the years” as “the committee has during various decades sought to promote different aims.”</span></p><span data-dcnode-id="2492" instrument_node="">
</span><p data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">If there were a Nobel Prize in philosophy, what would good criteria be? What would the aims of the prize be? And who would be on the short list?</span></p><span data-dcnode-id="2489" instrument_node="">
</span><p data-dcnode-id="2486"><a data-dcnode-id="2487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailynous.com/wp-content/uploads/2015/10/nobel-medal-2.jpg"><img alt="nobel medal 2" class="alignnone wp-image-10302" data-dcnode-id="2488" height="92" loading="lazy" sizes="(max-width: 92px) 100vw, 92px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailynous.com/wp-content/uploads/2015/10/nobel-medal-2.jpg&amp;raw" srcset="https://dailynous.com/wp-content/uploads/2015/10/nobel-medal-2.jpg 900w, https://dailynous.com/wp-content/uploads/2015/10/nobel-medal-2-150x150.jpg 150w, https://dailynous.com/wp-content/uploads/2015/10/nobel-medal-2-300x300.jpg 300w, https://dailynous.com/wp-content/uploads/2015/10/nobel-medal-2-400x400.jpg 400w, https://dailynous.com/wp-content/uploads/2015/10/nobel-medal-2-177x177.jpg 177w, https://dailynous.com/wp-content/uploads/2015/10/nobel-medal-2-380x380.jpg 380w" width="92"></a></p><span data-dcnode-id="2485" instrument_node="">
</span><p data-dcnode-id="2472"><strong data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">UPDATE&nbsp;</span></strong><span data-dcnode-id="2482" instrument_node="">(10/12/15): In addition to the Berggruen Prize, there is also, as some commenters have pointed out, the </span><a data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rolfschockprizes.se/engelskasidor/home/theprize.9_en.html" target="_blank"><span data-dcnode-id="2481" instrument_node="">Schock Prize</span></a><span data-dcnode-id="2479" instrument_node="">. Additionally, there is the University of Pittsburgh’s Rescher Prize (</span><a data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailynous.com/2014/11/08/hilary-putnam-wins-rescher-prize/"><span data-dcnode-id="2478" instrument_node="">latest winner: Hilary Putnam</span></a><span data-dcnode-id="2476" instrument_node="">) about which Anil Gupta </span><a data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pittnews.com/64122/news/pitt-grants-harvard-philosopher-rescher-prize/" target="_blank"><span data-dcnode-id="2475" instrument_node="">says</span></a><span data-dcnode-id="2473" instrument_node="">, “We hope, over time, this prize could become the major prize in philosophy like the Pulitzer Prize in journalism and the Fields Medal in mathematics.”</span></p><span data-dcnode-id="2471" instrument_node="">

</span><p data-dcnode-id="1468"><span data-dcnode-id="1472" instrument_node="">Philosophy is a fairly small enterprise compared with the areas that currently receive Nobels.  They would soon run out of philosophers worthy of receiving such a prize.   Additionally, with the exception of Literature, Nobels seem to be given for “discoveries.”  As much as I agree that there is progress in philosophy, I doubt it is very widely believed among non-philosophers that philosophers make “discoveries” except perhaps in logic.  We shouldn’t feel bad, though.  There’s no Nobel for Mathematics, either (although there is the Fields, of course).</span><span class="pmcc-comments-report-link" data-dcnode-id="1469" id="comment-73967"><a class="hide-if-no-js" data-dcnode-id="1470" href="javascript:void(0);" onclick="crowd_control_comments_flag_comment( '73967', '5658e4bae3', '10298');"><span data-dcnode-id="1471" instrument_node="">Report</span></a></span></p><span data-dcnode-id="1467" instrument_node="">

</span><li data-dcnode-id="384"><span class="heap-of-link_name" data-dcnode-id="388"><a class="track_this_link" data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arxiv.org/abs/2203.16762" id="link-42412" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="390" instrument_node="">What are real-world moral dilemmas about?</span></a></span><span data-dcnode-id="387" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">-- a research team analyzed 100,000 "Am I The Asshole?" posts to find out</span></span></li><span data-dcnode-id="383" instrument_node="">
</span><li data-dcnode-id="376"><span class="heap-of-link_name" data-dcnode-id="380"><a class="track_this_link" data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.latimes.com/opinion/story/2022-04-22/living-in-simulation-theory-reality-probability" id="link-42411" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="382" instrument_node="">“Taking the simulation hypothesis seriously means accepting that the creator might be a sadistic adolescent gamer about to unleash Godzilla”</span></a></span><span data-dcnode-id="379" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">-- Some people think learning that we're simulated beings in a simulated world should make no difference to us; Eric Schwitzgebel (UC Riverside) disagrees</span></span></li><span data-dcnode-id="375" instrument_node="">
</span><li data-dcnode-id="368"><span class="heap-of-link_name" data-dcnode-id="372"><a class="track_this_link" data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cambridge.org/core/services/aop-cambridge-core/content/view/C9E588E47B35E4F938FF4CE59EA9AAF1/S0031824822000204a.pdf/thomas-kuhn-hyperbole-and-the-ashtray-evidence-of-morris-faulty-memory.pdf" id="link-42410" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="374" instrument_node="">Filmmaker Errol Morris claimed that Thomas Kuhn threw an ashtray at him and kicked him out of the graduate program at Princeton</span></a></span><span data-dcnode-id="371" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">-- but, argues K. Brad Wray (Aarhus), there are reasons to be doubtful of these claims</span></span></li><span data-dcnode-id="367" instrument_node="">
</span><li data-dcnode-id="360"><span class="heap-of-link_name" data-dcnode-id="364"><a class="track_this_link" data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.3-16am.co.uk/articles/the-epistemology-of-rational-candy%3Fc%3Dend-times-series" id="link-42409" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="366" instrument_node="">“Reserving the word ‘rational’ for something like coherence seems to me to be a waste of a perfectly good word”</span></a></span><span data-dcnode-id="363" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">-- Juan Comesaña (Arizona, soon Rutgers) is interviewed at 3:16AM</span></span></li><span data-dcnode-id="359" instrument_node="">
</span><li data-dcnode-id="352"><span class="heap-of-link_name" data-dcnode-id="356"><a class="track_this_link" data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DCNlpli66oZQ" id="link-42408" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="358" instrument_node="">Music by philosophers, for philosophers, about philosophy: the 21st Century Monads have a new album coming out</span></a></span><span data-dcnode-id="355" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">-- you can pre-order it by making a donation to a charity of your choosing, as Joshua Spencer (Wisconsin-Milwaukee) and a puppet explain</span></span></li><span data-dcnode-id="351" instrument_node="">
</span><li data-dcnode-id="344"><span class="heap-of-link_name" data-dcnode-id="348"><a class="track_this_link" data-dcnode-id="349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/359974151_Preliminary_Results_of_Experiments_with_Autoregressive_Language_Model_GPT-3_and_Philosophical_Questions" id="link-42407" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="350" instrument_node="">Researchers test GPT-3’s “capacity to produce short, coherent essays on philosophical themes”</span></a></span><span data-dcnode-id="347" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">-- "any suggestions that GPT-3 may mark the dawn of a new era of synthetic philosophy, or the twilight of the traditional one, are simply not justified."</span></span></li><span data-dcnode-id="343" instrument_node="">
</span><li data-dcnode-id="336"><span class="heap-of-link_name" data-dcnode-id="340"><a class="track_this_link" data-dcnode-id="341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DvzvUXCsHoWI" id="link-42406" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="342" instrument_node="">A discussion of “Epistemic Explanations”</span></a></span><span data-dcnode-id="339" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">-- Ernest Sosa (Rutgers) talks about his recent book with several commentators in the latest episode of "Philosopher Meets Critics"</span></span></li><span data-dcnode-id="335" instrument_node="">
</span><li data-dcnode-id="328"><span class="heap-of-link_name" data-dcnode-id="332"><a class="track_this_link" data-dcnode-id="333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/outlook/2022/04/15/humanities-sciences-credibility-crisis-public-trust/" id="link-42403" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="334" instrument_node="">“Down one path is understanding the humanities foremost as knowledge work…  Down the other path is understanding the humanities as a kind of pure activism committed to rejecting the values that govern institutional and civic credibility”</span></a></span><span data-dcnode-id="331" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">-- Aaron Hanlon (Colby) on the "credibility crisis" facing the humanities</span></span></li><span data-dcnode-id="327" instrument_node="">
</span><li data-dcnode-id="320"><span class="heap-of-link_name" data-dcnode-id="324"><a class="track_this_link" data-dcnode-id="325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harpers.org/archive/2022/05/ghosting-the-machine-humans-robots-and-the-new-sexual-frontier-sam-lipsyte/" id="link-42402" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="326" instrument_node="">“We all must take a more active role as consumers in how these technologies are developed”</span></a></span><span data-dcnode-id="323" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">-- novelist-professor Sam Lipsyte (Columbia) writes amusingly about his trip to Vegas to hear a philosopher &amp; a sex-technologist talk about sex robots, and maybe try out the tech himself</span></span></li><span data-dcnode-id="319" instrument_node="">
</span><li data-dcnode-id="312"><span class="heap-of-link_name" data-dcnode-id="316"><a class="track_this_link" data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thewalrus.ca/death-studies/" id="link-42392" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="318" instrument_node="">Socrates said that studying philosophy was preparation for dying</span></a></span><span data-dcnode-id="315" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">-- at one (and only one) university in North America, undergraduates can cut out the middleman and just major in death</span></span></li><span data-dcnode-id="311" instrument_node="">
</span><li data-dcnode-id="304"><span class="heap-of-link_name" data-dcnode-id="308"><a class="track_this_link" data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newstatesman.com/ideas/agora/2022/04/are-severe-sanctions-on-russia-morally-justified" id="link-42391" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="310" instrument_node="">“Many Russians are not to blame for the war or the atrocities. Living under a draconian authoritarian regime, they are manipulated by a powerful propaganda machine and they face harsh punishment if they protest”</span></a></span><span data-dcnode-id="307" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">-- still, sanctions that may harm them are justified, argue Avia Pasternak (UCL) &amp; Zofia Stemplowska (Oxford)</span></span></li><span data-dcnode-id="303" instrument_node="">
</span><li data-dcnode-id="296"><span class="heap-of-link_name" data-dcnode-id="300"><a class="track_this_link" data-dcnode-id="301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quantamagazine.org/which-computational-universe-do-we-live-in-20220418/" id="link-42389" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="302" instrument_node="">“To create a truly secure (and permanent) encryption method, we need a computational problem that’s hard enough to create a provably insurmountable barrier for adversaries.” How can we tell if such a problem exists?</span></a></span><span data-dcnode-id="299" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">-- the epistemology of the possibility of cryptography</span></span></li><span data-dcnode-id="295" instrument_node="">
</span><li data-dcnode-id="288"><span class="heap-of-link_name" data-dcnode-id="292"><a class="track_this_link" data-dcnode-id="293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//open.spotify.com/show/0Jfd2plJcZeJsIoDFnmdWQ" id="link-42385" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="294" instrument_node="">New: “In the CAVE: An Ethics Podcast”. It “explores some of the big ethical and philosophical issues facing contemporary societies”</span></a></span><span data-dcnode-id="291" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">-- from the Macquarie University Research Centre for Agency, Values and Ethics (CAVE), it's on Spotify and other podcast platforms</span></span></li><span data-dcnode-id="287" instrument_node="">
</span><li data-dcnode-id="280"><span class="heap-of-link_name" data-dcnode-id="284"><a class="track_this_link" data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//economicsfromthetopdown.com/2022/04/08/the-dunning-kruger-effect-is-autocorrelation/" id="link-42374" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="286" instrument_node="">“Once you read these critiques, it becomes painfully obvious that the Dunning-Kruger effect is a statistical artifact. But to date, very few people know this fact”</span></a></span><span data-dcnode-id="283" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">-- a step by step explanation of the problem with one of psychology's most famous findings</span></span></li><span data-dcnode-id="279" instrument_node="">
</span><li data-dcnode-id="272"><span class="heap-of-link_name" data-dcnode-id="276"><a class="track_this_link" data-dcnode-id="277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2022/04/15/magazine/ai-language.html" id="link-42364" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="278" instrument_node="">“It’s hard not to feel that the machine is thinking in some meaningful way”</span></a></span><span data-dcnode-id="275" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">-- NYT article on what large language models are doing, and what they're doing when they're doing it</span></span></li><span data-dcnode-id="271" instrument_node="">
</span><li data-dcnode-id="264"><span class="heap-of-link_name" data-dcnode-id="268"><a class="track_this_link" data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aeon.co/essays/why-are-women-philosophers-often-erased-from-collective-memory" id="link-42357" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="270" instrument_node="">“The story of Mary Hesse shows how quickly even well-known women from our recent past can vanish from the collective memory of their peers”</span></a></span><span data-dcnode-id="267" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">-- Ann-Sophie Barwich (Indiana) on the mechanisms of "collective forgetting" that have erased women from the history of philosophy of science</span></span></li><span data-dcnode-id="263" instrument_node="">
</span><li data-dcnode-id="256"><span class="heap-of-link_name" data-dcnode-id="260"><a class="track_this_link" data-dcnode-id="261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aestheticsforbirds.com/2022/04/14/so-bad-its-good-how-to-love-bad-movies/" id="link-42345" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="262" instrument_node="">The “cultural wilderness” of bad movies</span></a></span><span data-dcnode-id="259" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">-- 7 philosophers comment on a book by Matt Strohl (Montana) on movies that "fall outside the scope of culturally constructed notions of artistic seriousness"</span></span></li><span data-dcnode-id="255" instrument_node="">
</span><li data-dcnode-id="248"><span class="heap-of-link_name" data-dcnode-id="252"><a class="track_this_link" data-dcnode-id="253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.ucr.edu/articles/2022/04/13/what-your-moral-responsibility-ukraine" id="link-42340" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="254" instrument_node="">“How is it not a ‘fallacy’ to feel guilty about something for which you are not blameworthy?”</span></a></span><span data-dcnode-id="251" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">-- John Martin Fischer (UCR) takes up this question and related ones about individual moral responsibility in regard to Russia's attack on Ukraine, in an interview</span></span></li><span data-dcnode-id="247" instrument_node="">
</span><li data-dcnode-id="240"><span class="heap-of-link_name" data-dcnode-id="244"><a class="track_this_link" data-dcnode-id="245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nautil.us/animals-feel-whats-right-and-wrong-too-16083/%3F_sp%3D06262bc3-3464-4ea9-85c7-c4851161edb9.1649985873493" id="link-42339" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="246" instrument_node="">Do non-human animals have moral experiences?</span></a></span><span data-dcnode-id="243" instrument_node="">
</span><span class="heap-of-link_description" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">-- James Hutton (Edinburgh) on the philosophy and science relevant to that question</span></span></li><span data-dcnode-id="239" instrument_node="">
</span></ul><span data-dcnode-id="235" instrument_node="">
</span></div><span data-dcnode-id="232" instrument_node="">

t%252520on%252520mankind%2525E2%252580%25259D%252520in%252520a%252520number%252520of%252520specified%252520fields.%252520Hence%252520we%252520have%252520the%252520Nobel%252520Prizes%252520for%252520physics%25252C%252520chemistry%25252C%252520medicine%252520or%252520physiology%25252C%252520literature%25252C%252520and%252520peace%2525E2%252580%2525A6%252520Notably%25252C%252520there%252520is%252520no%252520Nobel%252520Prize%252520for%252520philosophy%25252C%252520although%252520Bertrand%252520Russell%252520won%252520the%252520Literature%252520Prize%252520in%2525201950.%252520Albert%252520Camus%252520also%252520won%252520it%252520%28in%2525201957%29%25252C%252520as%252520did%252520Jean-Paul%252520Sartre%252520%28in%2525201964%29%25252C%252520though%252520he%252520chose%252520to%252520turn%252520it%252520down.%252520Camus%252520and%252520Sartre%252520were%25252C%252520of%252520course%25252C%252520largely%252520known%252520as%252520creative%252520writers.%252520I%252520doubt%252520that%252520any%252520philosophers%252520begrudge%252520creative%252520writers%252520the%252520Nobel%252520Prize%252520for%252520Literature%25252C%252520but%252520a%252520there%2525E2%252580%252599s%252520a%252520strong%252520case%252520for%252520a%252520separate%252520Nobel%252520Prize%252520for%252520Philosophy%25252C%252520recognising%252520the%252520discipline%2525E2%252580%252599s%252520particular%252520%2525E2%252580%25259Cbenefit%252520to%252520mankind%2525E2%252580%25259D.%252520So%252520writes%252520Russell%252520Blackford%252520%28Newcastle%29%252520at%2525C2%2525A0The%252520Drum.%252520Reasons%252520he%252520offers%252520in%2525C2%2525A0favor%252520of%252520a%252520Nobel%252520Prize%252520for%252520Philosophy%252520include%25253A%252520%2525E2%252580%25259CPhilosophers%252520often%252520bring%252520their%252520skills%252520to%252520the%252520great%252520questions%252520of%252520our%252520time%25252C%252520including%252520problems%252520of%252520global%252520injustice%252520and%252520t
