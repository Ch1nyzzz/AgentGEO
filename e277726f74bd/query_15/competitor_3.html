ate PSC</span></span></div></li></ul></div></div></li><li data-dcnode-id="263"><div class="relative pointer primary-exam-list" data-dcnode-id="264" data-idx="262e1030-1852-11eb-aeb3-45f42c7373c7" data-lcslug="bba-hotel-management-online-coaching" data-name="IPM, CUET &amp; BBA Exams" data-slug="bba-hotel-management-exams"><span class="f5" data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">IPM, CUET &amp; BBA Exams</span></span></div></li></ul></div></div></div><button class="auth__register z-1 js-show-register link br2 tc ma0 pointer tracked-sm outline-0 auth-btn bg-secondary-gradient white bn display-5-m body-7-d ml-0-33" data-dcnode-id="257" type="button"><span data-dcnode-id="258" instrument_node="">Register</span></button></div></div></header><div class="header-spacer header-spacer--no-alert" data-dcnode-id="253" style="height:55px"></div><section class="flex-auto" data-dcnode-id="63"><div class="flex flex-row items-center fwc-2 ph3 ph0-l center mt2 overflow-hidden" data-dcnode-id="240"><ul class="breadcrumb list flex flex-row pa0 ma0 f6 flex-nowrap flex-grow-1 overflow-x-auto" data-dcnode-id="243"><li class="flex flex-shrink-0" data-dcnode-id="250"><a class="secondary no-hover-color no-underline" data-dcnode-id="251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/"><span data-dcnode-id="252" instrument_node="">Home</span></a></li><li class="flex flex-shrink-0" data-dcnode-id="247"><a class="secondary no-hover-color no-underline" data-dcnode-id="248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/current-affairs"><span data-dcnode-id="249" instrument_node="">Current Affairs</span></a></li><li class="flex flex-shrink-0" data-dcnode-id="244"><span class="gray dib ttc" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Pulitzer Prize</span></span></li></ul></div><div class="fwc-2 flex flex-grow-1 justify-between mt3" data-dcnode-id="64"><main class="exam-category-main" data-dcnode-id="66"><h1 class="ma0 ph3 ph0-l" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Pulitzer Prize: List of Pulitzer Prize Winners</span></h1><p class="pa0 ma0 f6 silver ph3 ph0-l" data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">By : Neha Dhyani</span></p><p class="pa0 ma0 ph3 ph0-l f6 silver mv1" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Updated : Jan 6, 2022, 20:48</span></p><div class="custom-html-style mb3 ph3 ph0-l overflow-x-visible" data-dcnode-id="67"><p data-dcnode-id="229"><span data-dcnode-id="233" instrument_node="">The </span><strong data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Pulitzer Prize</span></strong><span data-dcnode-id="230" instrument_node=""> was first awarded by Columbia University in the United States in 1917 for excellence in newspaper journalism, literary achievements, and musical compositions. Pulitzer prize winners are awarded under 21 categories within the United States. Each winner in twenty categories is awarded a certificate along with a cash award amount of $ 15,000. However, the 21st category is for Public Service, and the winner for that is awarded a gold medal.</span></p><p data-dcnode-id="224"><span data-dcnode-id="228" instrument_node="">When scanning the </span><strong data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Pulitzer Prize Winners List</span></strong><span data-dcnode-id="225" instrument_node="">, the New York Times has been awarded the maximum number of 132 awards in various categories. This organization has a record of winning the maximum number of Pulitzer Prizes over any other organization, and the first one came its way in 1918.</span></p><h2 data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Pulitzer Prize Winners in India</span></h2><p data-dcnode-id="217"><span data-dcnode-id="221" instrument_node="">The </span><strong data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">first Indian to win Pulitzer Prize</span></strong><span data-dcnode-id="218" instrument_node=""> was Gobind Behari Lal, a part of the Indian freedom struggle. He moved to the United States in 1912 as a research fellow at the University of California. He won the Pulitzer Prize in the year 1937, along with four others, for their coverage, in the reporting category, in the field of science.</span></p><p data-dcnode-id="212"><span data-dcnode-id="216" instrument_node="">The </span><strong data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">five Indian Pulitzer Prize winners</span></strong><span data-dcnode-id="213" instrument_node=""> so far are:</span></p><ul data-dcnode-id="186"><li data-dcnode-id="207"><span data-dcnode-id="211" instrument_node="">Gobind Behari Lal in </span><strong data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">1937</span></strong><span data-dcnode-id="208" instrument_node="">.</span></li><li data-dcnode-id="202"><span data-dcnode-id="206" instrument_node="">Jhumpa Lahiri in </span><strong data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">2000</span></strong><span data-dcnode-id="203" instrument_node="">.</span></li><li data-dcnode-id="197"><span data-dcnode-id="201" instrument_node="">Geeta Anand in </span><strong data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">2003</span></strong><span data-dcnode-id="198" instrument_node="">.</span></li><li data-dcnode-id="192"><span data-dcnode-id="196" instrument_node="">Siddhartha Mukherjee in </span><strong data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">2011</span></strong><span data-dcnode-id="193" instrument_node="">.</span></li><li data-dcnode-id="187"><span data-dcnode-id="191" instrument_node="">Vijay Seshadri in </span><strong data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">2014</span></strong><span data-dcnode-id="188" instrument_node="">.</span></li></ul><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">An American journalist of Indian descent to win the Pulitzer Prize in the year 2021 was Megha Rajagopalan. Along with her two contributors, she won the prestigious Pulitzer Prize in the category of innovative investigative reports. In this report, Rajagopalan exposed the mass detention camps for Uyghur Muslims in Xinjiang province, secretly built by China.</span></p><div class="overflow-table-container" data-dcnode-id="135"><table data-dcnode-id="136"><tbody data-dcnode-id="137"><tr data-dcnode-id="180"><td colspan="2" data-dcnode-id="181"><strong data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Important Exams</span></strong></td></tr><tr data-dcnode-id="173"><td data-dcnode-id="177"><a class="" data-dcnode-id="178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/upsc-exam-i" target="_blank"><span data-dcnode-id="179" instrument_node="">UPSC Exam</span></a></td><td data-dcnode-id="174"><a class="" data-dcnode-id="175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/bank-exams/ibps-po-exam" target="_blank"><span data-dcnode-id="176" instrument_node="">IBPS PO Exam</span></a></td></tr><tr data-dcnode-id="166"><td data-dcnode-id="170"><a class="" data-dcnode-id="171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/ssc-exams" target="_blank"><span data-dcnode-id="172" instrument_node="">SSC Exam</span></a></td><td data-dcnode-id="167"><a class="" data-dcnode-id="168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/defence-exams" target="_blank"><span data-dcnode-id="169" instrument_node="">Defence Exam</span></a></td></tr><tr data-dcnode-id="159"><td data-dcnode-id="163"><a class="" data-dcnode-id="164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/ssc-exams/ssc-chsl-exam" target="_blank"><span data-dcnode-id="165" instrument_node="">SSC CHSL Exam</span></a></td><td data-dcnode-id="160"><a class="" data-dcnode-id="161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/ssc-exams/ssc-steno-grade-c-d-exam" target="_blank"><span data-dcnode-id="162" instrument_node="">SSC Steno Exam</span></a></td></tr><tr data-dcnode-id="152"><td data-dcnode-id="156"><a class="" data-dcnode-id="157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/ae-je-exams/rrb-je-exam" target="_blank"><span data-dcnode-id="158" instrument_node="">RRB JE Exam</span></a></td><td data-dcnode-id="153"><a class="" data-dcnode-id="154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/ssc-exams/ssc-cgl-exam" target="_blank"><span data-dcnode-id="155" instrument_node="">SSC CGL Exam</span></a></td></tr><tr data-dcnode-id="145"><td data-dcnode-id="149"><a class="" data-dcnode-id="150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/ssc-exams/rrb-ntpc-exam" target="_blank"><span data-dcnode-id="151" instrument_node="">RRB NTPC Exam</span></a></td><td data-dcnode-id="146"><a class="" data-dcnode-id="147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/bank-exams/ibps-clerk-exam" target="_blank"><span data-dcnode-id="148" instrument_node="">IBPS Clerk Exam</span></a></td></tr><tr data-dcnode-id="138"><td data-dcnode-id="142"><a class="" data-dcnode-id="143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/bank-exams/ibps-so-exam" target="_blank"><span data-dcnode-id="144" instrument_node="">IBPS SO Exam</span></a></td><td data-dcnode-id="139"><a class="" data-dcnode-id="140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/up-state-exams" target="_blank"><span data-dcnode-id="141" instrument_node="">UPPSC Exam</span></a></td></tr></tbody></table></div><p data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">Danish Siddiqui was another photojournalist of Indian descent to receive the Pulitzer Prize in the year 2018 for Feature Photography, as part of the Reuters team, for documenting the Rohingya refugee crisis.</span></p><p data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">The Pulitzer Prize was established in the year 1917 as per the provisions in the will of Joseph Pulitzer, who was a passionate crusader against the then dishonest government. Initially, this award recognized exceptional contribution in journalism alone. Still, over the years, the plan of the awards has been revised, and it now extends to 21 categories, including music, poetry, photography, and journalism.</span></p><div class="overflow-table-container" data-dcnode-id="89"><table data-dcnode-id="90"><tbody data-dcnode-id="91"><tr data-dcnode-id="127"><td colspan="2" data-dcnode-id="128"><strong data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">More Current Affair Topics</span></strong></td></tr><tr data-dcnode-id="120"><td data-dcnode-id="124"><a class="" data-dcnode-id="125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/current-affairs/union-territories-of-india" target="_blank"><span data-dcnode-id="126" instrument_node="">Union Territories of India</span></a></td><td data-dcnode-id="121"><a class="" data-dcnode-id="122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/current-affairs/longest-river-in-india" target="_blank"><span data-dcnode-id="123" instrument_node="">Longest River in India</span></a></td></tr><tr data-dcnode-id="113"><td data-dcnode-id="117"><a class="" data-dcnode-id="118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/current-affairs/ipl-winners-list" target="_blank"><span data-dcnode-id="119" instrument_node="">IPL Winners List</span></a></td><td data-dcnode-id="114"><a class="" data-dcnode-id="115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/current-affairs/national-game-of-india" target="_blank"><span data-dcnode-id="116" instrument_node="">National Game of India</span></a></td></tr><tr data-dcnode-id="106"><td data-dcnode-id="110"><a class="" data-dcnode-id="111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/current-affairs/national-tree-of-india" target="_blank"><span data-dcnode-id="112" instrument_node="">National Tree of India</span></a></td><td data-dcnode-id="107"><a class="" data-dcnode-id="108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/current-affairs/highest-peak-in-india" target="_blank"><span data-dcnode-id="109" instrument_node="">Highest Peak in India</span></a></td></tr><tr data-dcnode-id="99"><td data-dcnode-id="103"><a class="" data-dcnode-id="104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/current-affairs/father-of-computer" target="_blank"><span data-dcnode-id="105" instrument_node="">Father of Computer</span></a></td><td data-dcnode-id="100"><a class="" data-dcnode-id="101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/current-affairs/father-of-physics" target="_blank"><span data-dcnode-id="102" instrument_node="">Father of Physics</span></a></td></tr><tr data-dcnode-id="92"><td data-dcnode-id="96"><a class="" data-dcnode-id="97" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/current-affairs/highest-waterfall-in-india" target="_blank"><span data-dcnode-id="98" instrument_node="">Highest Waterfall in India</span></a></td><td data-dcnode-id="93"><a class="" data-dcnode-id="94" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjusexamprep.com/current-affairs/largest-river-in-world" target="_blank"><span data-dcnode-id="95" instrument_node="">Largest River in World</span></a></td></tr></tbody></table></div><h2 data-dcnode-id="87"><span data-dcnode-id="88" instrument_node="">FAQs about Pulitzer Prize</span></h2><h3 data-dcnode-id="85"><span data-dcnode-id="86" instrument_node="">How does an individual win the Pulitzer Prize?</span></h3><p data-dcnode-id="80"><span data-dcnode-id="84" instrument_node="">Entries for the </span><strong data-dcnode-id="82"><span data-dcnode-id="83" instrument_node="">Pulitzer Prize</span></strong><span data-dcnode-id="81" instrument_node=""> can be made by any individual based on material coming from a United States newspaper, magazine or news site that has regular publication during the calendar year.</span></p><h3 data-dcnode-id="78"><span data-dcnode-id="79" instrument_node="">Who was the first Indian to win a Pulitzer Prize in literature?</span></h3><p data-dcnode-id="76"><span data-dcnode-id="77" instrument_node="">The first Indian to win a Pulitzer Prize in literature is Gobind Behari Lal.</span></p><h3 data-dcnode-id="74"><span data-dcnode-id="75" instrument_node="">How many categories are there in the Pulitzer Prize?</span></h3><p data-dcnode-id="72"><span data-dcnode-id="73" instrument_node="">There are a total of 21 categories in which the Pulitzer Prize is awarded. For 20 categories, the award comprises a certificate and a $15,000 cash prize. For the 21st category, for public service, the winner is awarded a gold medal.</span></p><h3 data-dcnode-id="70"><span data-dcnode-id="71" instrument_node="">What was the first Pulitzer Prize Winner Awarded with?</span></h3><p data-dcnode-id="68"><span data-dcnode-id="69" instrument_node="">The first Pulitzer Prize winner was a French Ambassador named Jean Jules Jusserand, who had written the best book about American history. He was awarded $2,000.</spa
