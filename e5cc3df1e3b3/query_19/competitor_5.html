</span><p data-dcnode-id="3076"><span data-dcnode-id="3083" instrument_node="">On October 17 Masol resigned, and on October 20, </span><a data-dcnode-id="3081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Mstyslav_%28Skrypnyk%29/" title="Mstyslav was a Ukrainian Orthodox Church hierarch."><span data-dcnode-id="3082" instrument_node="">Patriarch Mstyslav&nbsp;I</span></a><span data-dcnode-id="3080" instrument_node=""> of Kyiv and all Ukraine arrived at </span><a data-dcnode-id="3078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Saint_Sophia%2527s_Cathedral%252c_Kyiv/"><span data-dcnode-id="3079" instrument_node="">Saint Sophia's Cathedral</span></a><span data-dcnode-id="3077" instrument_node="">, ending a 46-year banishment from his homeland. On October 23, 1990, Parliament voted to delete Article&nbsp;6 of the Ukrainian Constitution, which referred to the "leading role" of the Communist Party.</span></p><span data-dcnode-id="3075" instrument_node="">
</span><p data-dcnode-id="3070"><span data-dcnode-id="3074" instrument_node="">On October 25–28, 1990, Rukh held its second congress and declared that its principal goal was the "renewal of independent statehood for Ukraine". On October 28 UAOC faithful, supported by Ukrainian Catholics, demonstrated near St. Sophia's Cathedral as newly elected Russian Orthodox Church Patriarch Aleksei and Metropolitan Filaret celebrated liturgy at the shrine. On November 1, the leaders of the Ukrainian Greek Catholic Church and of the Ukrainian Autocephalous Orthodox Church, respectively, Metropolitan Volodymyr Sterniuk and Patriarch Mstyslav, met in Lviv during anniversary commemorations of the 1918 proclamation of the </span><a data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Western_Ukrainian_National_Republic/" title="The West Ukrainian People's Republic was a short-lived polity that controlled most of Eastern Galicia from November 1918 to ..."><span data-dcnode-id="3073" instrument_node="">Western Ukrainian National Republic</span></a><span data-dcnode-id="3071" instrument_node="">.</span></p><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3055"><span data-dcnode-id="3068" instrument_node="">On November 18, 1990, the </span><a data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukrainian_Autocephalous_Orthodox_Church/" title="The Ukrainian Autocephalous Orthodox Church was one of the three major Eastern Orthodox churches in Ukraine."><span data-dcnode-id="3067" instrument_node="">Ukrainian Autocephalous Orthodox Church</span></a><span data-dcnode-id="3065" instrument_node=""> enthroned Mstyslav as Patriarch of Kyiv and all Ukraine during ceremonies at Saint Sophia's Cathedral. Also on November 18, </span><a data-dcnode-id="3063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Canada/" title="Canada is a country in North America."><span data-dcnode-id="3064" instrument_node="">Canada</span></a><span data-dcnode-id="3062" instrument_node=""> announced that its consul-general to Kyiv would be Ukrainian-Canadian Nestor Gayowsky. On November 19, the United States announced that its consul to Kyiv would be Ukrainian-American John Stepanchuk. On November 19, the chairmen of the Ukrainian and Russian parliaments, respectively, Kravchuk and Yeltsin, signed a 10-year bilateral pact. In early December 1990 the Party of Democratic Rebirth of Ukraine was founded; on December 15, the </span><a data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Democratic_Party_of_Ukraine/" title="The Democratic Party of Ukraine is a political party in Ukraine registered in 1991."><span data-dcnode-id="3061" instrument_node="">Democratic Party of Ukraine</span></a><span data-dcnode-id="3059" instrument_node=""> was founded.</span><sup data-dcnode-id="3056"><a data-dcnode-id="3057" href="#Ref-100"><span data-dcnode-id="3058" instrument_node="">[100]</span></a></sup></p><span data-dcnode-id="3054" instrument_node="">
</span><p data-dcnode-id="3046"><span data-dcnode-id="3053" instrument_node="">On 27 July 1990 the </span><a data-dcnode-id="3051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Supreme_Soviet_of_the_Byelorussian_Soviet_Socialist_Republic/"><span data-dcnode-id="3052" instrument_node="">Supreme Soviet of the Byelorussian SSR</span></a><span data-dcnode-id="3050" instrument_node=""> passed a </span><a data-dcnode-id="3048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Declaration_of_State_Sovereignty_of_the_Byelorussian_Soviet_Socialist_Republic/" title="The Declaration of State Sovereignty of the Byelorussian Soviet Socialist Republic was a formal document issued by the ..."><span data-dcnode-id="3049" instrument_node="">Declaration of State Sovereignty</span></a><span data-dcnode-id="3047" instrument_node="">, asserting its sovereignty as a republic inside the Soviet Union.</span></p><span data-dcnode-id="3045" instrument_node="">
</span><h4 data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">Central Asian republics </span></h4><span data-dcnode-id="3042" instrument_node="">
</span><p data-dcnode-id="3037"><span data-dcnode-id="3041" instrument_node="">See main article: </span><a data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1990_Dushanbe_riots/"><span data-dcnode-id="3040" instrument_node="">1990 Dushanbe riots</span></a><span data-dcnode-id="3038" instrument_node="">.</span></p><span data-dcnode-id="3036" instrument_node="">
</span><p data-dcnode-id="3019"><span data-dcnode-id="3035" instrument_node="">On February 12–14, 1990, anti-government riots took place in </span><a data-dcnode-id="3033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Tajik_Soviet_Socialist_Republic/" title="The Tajik Soviet Socialist Republic was one of the constituent republics of the Soviet Union which existed from 1929 to 1991 ..."><span data-dcnode-id="3034" instrument_node="">Tajikistan</span></a><span data-dcnode-id="3032" instrument_node="">'s capital, </span><a data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Dushanbe/" title="Dushanbe is the capital and largest city of Tajikistan."><span data-dcnode-id="3031" instrument_node="">Dushanbe</span></a><span data-dcnode-id="3029" instrument_node="">, as tensions rose between nationalist </span><a data-dcnode-id="3027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Tajiks/" title="Tajiks is used to refer to its Pamiri ethnic groups, the Tajiks of Xinjiang, who speak the Eastern Iranian Pamiri languages."><span data-dcnode-id="3028" instrument_node="">Tajiks</span></a><span data-dcnode-id="3026" instrument_node=""> and ethnic </span><a data-dcnode-id="3024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Armenians/" title="Armenians is a wide-ranging diaspora of around 5 million people of full or partial Armenian ancestry living outside modern ..."><span data-dcnode-id="3025" instrument_node="">Armenian</span></a><span data-dcnode-id="3023" instrument_node=""> refugees, after the Sumgait pogrom and anti-Armenian riots in Azerbaijan in 1988. Demonstrations sponsored by the nationalist </span><a data-dcnode-id="3021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Rastokhez/"><span data-dcnode-id="3022" instrument_node="">Rastokhez</span></a><span data-dcnode-id="3020" instrument_node=""> movement turned violent. Radical economic and political reforms were demanded by the protesters, who torched government buildings; shops and other businesses were attacked and looted. During these riots 26 people were killed and 565 injured.</span></p><span data-dcnode-id="3018" instrument_node="">
</span><p data-dcnode-id="3013"><span data-dcnode-id="3017" instrument_node="">See main article: </span><a data-dcnode-id="3015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Osh_riots_%281990%29/" title="The Osh riots was a dispute between an Uzbek nationalist group Adolat and a Kyrgyz nationalist group Osh Aymaghi over the ..."><span data-dcnode-id="3016" instrument_node="">Osh riots (1990)</span></a><span data-dcnode-id="3014" instrument_node="">.</span></p><span data-dcnode-id="3012" instrument_node="">
</span><p data-dcnode-id="2992"><span data-dcnode-id="3011" instrument_node="">In June 1990, the city of </span><a data-dcnode-id="3009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Osh/" title="Osh is the second-largest city in Kyrgyzstan, located in the Fergana Valley in the south of the country and often referred ..."><span data-dcnode-id="3010" instrument_node="">Osh</span></a><span data-dcnode-id="3008" instrument_node=""> and its environs experienced bloody </span><a data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Osh_riots_%281990%29/" title="The Osh riots was a dispute between an Uzbek nationalist group Adolat and a Kyrgyz nationalist group Osh Aymaghi over the ..."><span data-dcnode-id="3007" instrument_node="">ethnic clashes</span></a><span data-dcnode-id="3005" instrument_node=""> between ethnic </span><a data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kyrgyz_people/"><span data-dcnode-id="3004" instrument_node="">Kirghiz</span></a><span data-dcnode-id="3002" instrument_node=""> nationalist group Osh Aymaghi and </span><a data-dcnode-id="3000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Uzbeks/"><span data-dcnode-id="3001" instrument_node="">Uzbek</span></a><span data-dcnode-id="2999" instrument_node=""> nationalist group Adolat over the land of a former </span><a data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/collective_farm/" title="Collective farming is aggregated is called collectivization."><span data-dcnode-id="2998" instrument_node="">collective farm</span></a><span data-dcnode-id="2996" instrument_node="">. There were about 1,200 casualties, including over 300 dead and 462 seriously injured. The riots broke out over the division of land resources in and around the city.</span><sup data-dcnode-id="2993"><a data-dcnode-id="2994" href="#Ref-101"><span data-dcnode-id="2995" instrument_node="">[101]</span></a></sup></p><span data-dcnode-id="2991" instrument_node="">
</span><p data-dcnode-id="2926"><span data-dcnode-id="2990" instrument_node="">In </span><a data-dcnode-id="2988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Turkmen_SSR/" title="The Turkmen Soviet Socialist Republic was one of the constituent republics of the Soviet Union located in Central Asia ..."><span data-dcnode-id="2989" instrument_node="">Turkmen SSR</span></a><span data-dcnode-id="2987" instrument_node="">, the </span><a data-dcnode-id="2985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/National_conservatism/" title="National conservatism is a nationalist variant of conservatism that concentrates on upholding national and cultural identity."><span data-dcnode-id="2986" instrument_node="">national conservative</span></a><span data-dcnode-id="2984" instrument_node=""> People's Democratic Movement "Agzybirlik" ("Unification") became a supporter of independence, uniting the Turkmen </span><a data-dcnode-id="2982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/intelligentsia/" title="The intelligentsia is a status class composed of the university-educated people of a society who engage in the complex ..."><span data-dcnode-id="2983" instrument_node="">intelligentsia</span></a><span data-dcnode-id="2981" instrument_node=""> and moderate and radical </span><a data-dcnode-id="2979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Turkmenization/" title="Turkmenization is the set of domestic policies the Niyazov administration used in Turkmenistan from 1991 to December 2006 to ..."><span data-dcnode-id="2980" instrument_node="">Turkmen nationalists</span></a><span data-dcnode-id="2978" instrument_node="">. They did not have a pronounced and eminent leader. Since 1989, small rallies have been held in </span><a data-dcnode-id="2976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ashgabat/" title="Ashgabat is the capital and the largest city of Turkmenistan."><span data-dcnode-id="2977" instrument_node="">Ashghabad</span></a><span data-dcnode-id="2975" instrument_node=""> and </span><a data-dcnode-id="2973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Krasnovodsk/"><span data-dcnode-id="2974" instrument_node="">Krasnovodsk</span></a><span data-dcnode-id="2972" instrument_node=""> for the independence of Turkmenistan, as well as for the assignment of the status of the "state language" to the </span><a data-dcnode-id="2970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Turkmen_language/"><span data-dcnode-id="2971" instrument_node="">Turkmen language</span></a><span data-dcnode-id="2969" instrument_node=""> in the republic. The rallies also demanded that the republican leadership leave most of the oil revenues in the republic itself, and </span><i data-dcnode-id="2964"><span data-dcnode-id="2968" instrument_node="">"not feed </span><a data-dcnode-id="2966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Moscow/" title="Moscow is the capital and largest city of Russia."><span data-dcnode-id="2967" instrument_node="">Moscow</span></a><span data-dcnode-id="2965" instrument_node="">"</span></i><span data-dcnode-id="2963" instrument_node="">. Turkmen oppositionists and dissidents actively cooperated with opposition from </span><a data-dcnode-id="2961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Uzbek_SSR/" title="Uzbek Soviet Socialist Republic was governed by the Uzbek branch of the Soviet Communist Party, the legal political party, ..."><span data-dcnode-id="2962" instrument_node="">Uzbekistan</span></a><span data-dcnode-id="2960" instrument_node="">, </span><a data-dcnode-id="2958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Azerbaijan_SSR/" title="Azerbaijan Soviet Socialist Republic was one of the constituent republics of the Soviet Union between 1922 and 1991."><span data-dcnode-id="2959" instrument_node="">Azerbaijan</span></a><span data-dcnode-id="2957" instrument_node=""> and </span><a data-dcnode-id="2955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Georgian_SSR/" title="The Georgian Soviet Socialist Republic was one of the republics of the Soviet Union from its second occupation in 1921 to ..."><span data-dcnode-id="2956" instrument_node="">Georgia</span></a><span data-dcnode-id="2954" instrument_node="">. The leadership of Soviet Turkmenistan, led by </span><a data-dcnode-id="2952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Saparmurat_Niyazov/"><span data-dcnode-id="2953" instrument_node="">Saparmurat Niyazov</span></a><span data-dcnode-id="2951" instrument_node="">, opposed independence, suppressing Turkmen dissidents and oppositionists, but following the </span><a data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1990_Turkmen_Supreme_Soviet_election/"><span data-dcnode-id="2950" instrument_node="">elections to the Supreme Soviet of the Turkmen SSR in January 1990</span></a><span data-dcnode-id="2948" instrument_node="">, several dissidents were able to be elected to the republican parliament as independent candidates, who, together with their supporters, managed to actively participate in political life and express their opinions. The role of the </span><a data-dcnode-id="2946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Communist_Party_of_Turkmenistan/" title="The Communist Party of Turkmenistan was the ruling communist party of the Turkmen SSR, and a part of the Communist Party of ..."><span data-dcnode-id="2947" instrument_node="">Communist Party of Turkmenistan</span></a><span data-dcnode-id="2945" instrument_node=""> was very strong in this republic, especially in the west and south, where the Russian-speaking population lived. Over 90% of the seats in the republican parliament were held by communists. Despite all of the above, during the dissolution of the USSR, there were practically no high-profile events in Turkmenistan, and the Turkmen SSR was considered by the </span><a data-dcnode-id="2943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Communist_Party_of_the_Soviet_Union/" title="The Communist Party of the Soviet Union was the founding and ruling party of the Soviet Union."><span data-dcnode-id="2944" instrument_node="">CPSU</span></a><span data-dcnode-id="2942" instrument_node=""> to be one of the "most exemplary and loyal republics" of the Soviet Union to Moscow.</span><sup data-dcnode-id="2939"><a data-dcnode-id="2940" href="#Ref-102"><span data-dcnode-id="2941" instrument_node="">[102]</span></a></sup><span data-dcnode-id="2938" instrument_node=""> </span><sup data-dcnode-id="2935"><a data-dcnode-id="2936" href="#Ref-103"><span data-dcnode-id="2937" instrument_node="">[103]</span></a></sup><span data-dcnode-id="2934" instrument_node=""> </span><sup data-dcnode-id="2931"><a data-dcnode-id="2932" href="#Ref-104"><span data-dcnode-id="2933" instrument_node="">[104]</span></a></sup><span data-dcnode-id="2930" instrument_node=""> </span><sup data-dcnode-id="2927"><a data-dcnode-id="2928" href="#Ref-105"><span data-dcnode-id="2929" instrument_node="">[105]</span></a></sup></p><span data-dcnode-id="2925" instrument_node="">
</span><h3 data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">1991 </span></h3><span data-dcnode-id="2922" instrument_node="">
</span><h4 data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">Moscow's crisis </span></h4><span data-dcnode-id="2919" instrument_node="">
</span><p data-dcnode-id="2905"><span data-dcnode-id="2918" instrument_node="">On January 14, 1991, </span><a data-dcnode-id="2916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Nikolai_Ryzhkov/"><span data-dcnode-id="2917" instrument_node="">Nikolai Ryzhkov</span></a><span data-dcnode-id="2915" instrument_node=""> resigned from his post as </span><a data-dcnode-id="2913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Premier_of_the_Soviet_Union/" title="The Premier of the Soviet Union was the head of government of the Union of Soviet Socialist Republics."><span data-dcnode-id="2914" instrument_node="">Chairman</span></a><span data-dcnode-id="2912" instrument_node=""> of the </span><a data-dcnode-id="2910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Council_of_Ministers_%28Soviet_Union%29/"><span data-dcnode-id="2911" instrument_node="">Council of Ministers</span></a><span data-dcnode-id="2909" instrument_node="">, or premier of the Soviet Union, and was succeeded by </span><a data-dcnode-id="2907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Valentin_Pavlov/"><span data-dcnode-id="2908" instrument_node="">Valentin Pavlov</span></a><span data-dcnode-id="2906" instrument_node=""> in the newly established post of Prime Minister of the Soviet Union.</span></p><span data-dcnode-id="2904" instrument_node="">
</span><p data-dcnode-id="2876"><span data-dcnode-id="2903" instrument_node="">On March 17, 1991, in a </span><a data-dcnode-id="2901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1991_Soviet_Union_referendum/"><span data-dcnode-id="2902" instrument_node="">Union-wide referendum</span></a><span data-dcnode-id="2900" instrument_node=""> 77.85% percent of voters endorsed retention of a reformed Soviet Union.</span><sup data-dcnode-id="2897"><a data-dcnode-id="2898" href="#Ref-106"><span data-dcnode-id="2899" instrument_node="">[106]</span></a></sup><span data-dcnode-id="2896" instrument_node=""> The Baltic republics, </span><a data-dcnode-id="2894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Armenian_Soviet_Socialist_Republic/" title="The Armenian Soviet Socialist Republic was one of the constituent republics of the Soviet Union in December 1922 located in ..."><span data-dcnode-id="2895" instrument_node="">Armenia</span></a><span data-dcnode-id="2893" instrument_node="">, </span><a data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Georgian_Soviet_Socialist_Republic/" title="The Georgian Soviet Socialist Republic was one of the republics of the Soviet Union from its second occupation in 1921 to ..."><span data-dcnode-id="2892" instrument_node="">Georgia</span></a><span data-dcnode-id="2890" instrument_node="">, and </span><a data-dcnode-id="2888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Moldavian_Soviet_Socialist_Republic/" title="The Moldavian Soviet Socialist Republic was one of the 15&amp;nbsp; republics of the Soviet Union which existed from 1940 to 1991."><span data-dcnode-id="2889" instrument_node="">Moldova</span></a><span data-dcnode-id="2887" instrument_node=""> boycotted the referendum as well as </span><a data-dcnode-id="2885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Chechen%25E2%2580%2593Ingush_Autonomous_Soviet_Socialist_Republic/" title="The Checheno-Ingush Autonomous Soviet Socialist Republic was an autonomous republic within the Russian Soviet Federative ..."><span data-dcnode-id="2886" instrument_node="">Checheno-Ingushetia</span></a><span data-dcnode-id="2884" instrument_node=""> (an </span><a data-dcnode-id="2882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Autonomous_republics_of_the_Soviet_Union/"><span data-dcnode-id="2883" instrument_node="">autonomous republic</span></a><span data-dcnode-id="2881" instrument_node=""> within Russia that had a strong desire for independence, and by now referred to itself as Ichkeria).</span><sup data-dcnode-id="2878"><a data-dcnode-id="2879" href="#Ref-107"><span data-dcnode-id="2880" instrument_node="">[107]</span></a></sup><span data-dcnode-id="2877" instrument_node=""> In each of the other nine republics, a majority of the voters supported the retention of a reformed Soviet Union.</span></p><span data-dcnode-id="2875" instrument_node="">
</span><h4 data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">Russia's President Boris Yeltsin </span></h4><span data-dcnode-id="2872" instrument_node="">
</span><p data-dcnode-id="2851"><span data-dcnode-id="2871" instrument_node="">On June 12, 1991, </span><a data-dcnode-id="2869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Boris_Yeltsin/"><span data-dcnode-id="2870" instrument_node="">Boris Yeltsin</span></a><span data-dcnode-id="2868" instrument_node=""> was elected President of the </span><a data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russian_Soviet_Federative_Socialist_Republic/" title="The Russian Soviet Federative Socialist Republic was an independent federal socialist state from 1917 to 1922, and ..."><span data-dcnode-id="2867" instrument_node="">Russian Soviet Federative Socialist Republic</span></a><span data-dcnode-id="2865" instrument_node=""> with 57 percent of the popular vote in </span><a data-dcnode-id="2863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1991_Russian_presidential_election/" title="The 1991 Russian presidential election was held in the Russian Soviet Federative Socialist Republic on 12 June 1991."><span data-dcnode-id="2864" instrument_node="">the country's first Presidential election</span></a><span data-dcnode-id="2862" instrument_node="">, defeating Gorbachev's preferred candidate, </span><a data-dcnode-id="2860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Nikolai_Ryzhkov/"><span data-dcnode-id="2861" instrument_node="">Nikolai Ryzhkov</span></a><span data-dcnode-id="2859" instrument_node="">, who won 16 percent of the vote. Following Yeltsin's election as president, the RSFSR declared itself autonomous from the Soviet Union.</span><sup data-dcnode-id="2856"><a data-dcnode-id="2857" href="#Ref-108"><span data-dcnode-id="2858" instrument_node="">[108]</span></a></sup><span data-dcnode-id="2855" instrument_node=""> In his election campaign, Yeltsin criticized the "dictatorship of the center", but did not yet suggest that he would introduce a </span><a data-dcnode-id="2853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/market_economy/" title="A market economy is an economic system in which the decisions regarding investment, production and distribution to the ..."><span data-dcnode-id="2854" instrument_node="">market economy</span></a><span data-dcnode-id="2852" instrument_node="">.</span></p><span data-dcnode-id="2850" instrument_node="">
</span><h4 data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">Baltic republics </span></h4><span data-dcnode-id="2847" instrument_node="">
</span><p data-dcnode-id="2842"><span data-dcnode-id="2846" instrument_node="">See main article: </span><a data-dcnode-id="2844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/January_Events_%28Lithuania%29/" title="The January Events was the most violent day."><span data-dcnode-id="2845" instrument_node="">January Events (Lithuania)</span></a><span data-dcnode-id="2843" instrument_node="">.</span></p><span data-dcnode-id="2841" instrument_node="">
</span><p data-dcnode-id="2818"><span data-dcnode-id="2840" instrument_node="">On January 13, 1991, Soviet troops, along with the </span><a data-dcnode-id="2838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/KGB/" title="The KGB was the main security agency for the Soviet Union from 13 March 1954 until 3 December 1991."><span data-dcnode-id="2839" instrument_node="">KGB</span></a><span data-dcnode-id="2837" instrument_node=""> </span><a data-dcnode-id="2835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Spetsnaz/" title="Spetsnaz is a Russian umbrella term for special forces which is used in numerous Russian-speaking post-Soviet states."><span data-dcnode-id="2836" instrument_node="">Spetsnaz</span></a><span data-dcnode-id="2834" instrument_node=""> </span><a data-dcnode-id="2832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Alpha_Group/" title="Alpha Group is an elite, stand-alone sub-unit of Russia's special forces."><span data-dcnode-id="2833" instrument_node="">Alpha Group</span></a><span data-dcnode-id="2831" instrument_node="">, </span><a data-dcnode-id="2829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Vilnius_massacre/" title="The January Events was the most violent day."><span data-dcnode-id="2830" instrument_node="">stormed the Vilnius TV Tower</span></a><span data-dcnode-id="2828" instrument_node=""> in Lithuania to suppress the independence movement. Fourteen unarmed civilians were killed and hundreds more injured. On the night of July 31, Russian </span><a data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/OMON/" title="OMON is a system of special police units within the National Guard of Russia."><span data-dcnode-id="2827" instrument_node="">OMON</span></a><span data-dcnode-id="2825" instrument_node=""> from </span><a data-dcnode-id="2823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Riga/" title="Riga is the capital of Latvia and is home to 614,618 inhabitants, which is a third of Latvia's population."><span data-dcnode-id="2824" instrument_node="">Riga</span></a><span data-dcnode-id="2822" instrument_node="">, the Soviet military headquarters in the Baltics, </span><a data-dcnode-id="2820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Soviet_OMON_assaults_on_Lithuanian_border_posts/" title="Soviet OMON assaults on Lithuanian border posts was internationally recognized on 27 August 1991 by the states of the ..."><span data-dcnode-id="2821" instrument_node="">assaulted the Lithuanian border post</span></a><span data-dcnode-id="2819" instrument_node=""> in Medininkai and killed seven Lithuanian servicemen. This event further weakened the Soviet Union's position internationally and domestically, and stiffened Lithuanian resistance.</span></p><span data-dcnode-id="2817" instrument_node="">
</span><p data-dcnode-id="2812"><span data-dcnode-id="2816" instrument_node="">See main article: </span><a data-dcnode-id="2814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/The_Barricades/" title="The barricades is unknown."><span data-dcnode-id="2815" instrument_node="">The Barricades</span></a><span data-dcnode-id="2813" instrument_node="">.</span></p><span data-dcnode-id="2811" instrument_node="">
</span><p data-dcnode-id="2806"><span data-dcnode-id="2810" instrument_node="">The bloody attacks in Lithuania prompted Latvians to organize defensive barricades (the events are still today known as "</span><a data-dcnode-id="2808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/The_Barricades/" title="The barricades is unknown."><span data-dcnode-id="2809" instrument_node="">The Barricades</span></a><span data-dcnode-id="2807" instrument_node="">") blocking access to strategically important buildings and bridges in Riga. Soviet attacks in the ensuing days resulted in six deaths and several injuries; one person died later of their wounds.</span></p><span data-dcnode-id="2805" instrument_node="">
</span><p data-dcnode-id="2800"><span data-dcnode-id="2804" instrument_node="">Оn February 9, Lithuania held an independence </span><a data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1991_Lithuanian_independence_referendum/"><span data-dcnode-id="2803" instrument_node="">referendum</span></a><span data-dcnode-id="2801" instrument_node=""> with 93.2% voting in favor of independence.</span></p><span data-dcnode-id="2799" instrument_node="">
</span><p data-dcnode-id="2794"><span data-dcnode-id="2798" instrument_node="">On February 12, the independence of Lithuania was recognized by Iceland.</span><sup data-dcnode-id="2795"><a data-dcnode-id="2796" href="#Ref-109"><span data-dcnode-id="2797" instrument_node="">[109]</span></a></sup></p><span data-dcnode-id="2793" instrument_node="">
</span><p data-dcnode-id="2781"><span data-dcnode-id="2792" instrument_node="">On March 3, a </span><a data-dcnode-id="2790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1991_Estonian_independence_referendum/"><span data-dcnode-id="2791" instrument_node="">referendum</span></a><span data-dcnode-id="2789" instrument_node=""> was held on the independence of the Republic of Estonia, which was attended by those who lived in Estonia before the Soviet annexation and their descendants, as well as persons who have received the so-called "green cards" of the Congress of Estonia.</span><sup data-dcnode-id="2786"><a data-dcnode-id="2787" href="#Ref-110"><span data-dcnode-id="2788" instrument_node="">[110]</span></a></sup><span data-dcnode-id="2785" instrument_node=""> 77.8% of those who voted supported the idea of restoring independence.</span><sup data-dcnode-id="2782"><a data-dcnode-id="2783" href="#Ref-111"><span data-dcnode-id="2784" instrument_node="">[111]</span></a></sup></p><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2775"><span data-dcnode-id="2779" instrument_node="">On March 11, Denmark recognized Estonia's independence.</span><sup data-dcnode-id="2776"><a data-dcnode-id="2777" href="#Ref-112"><span data-dcnode-id="2778" instrument_node="">[112]</span></a></sup></p><span data-dcnode-id="2774" instrument_node="">
</span><p data-dcnode-id="2769"><span data-dcnode-id="2773" instrument_node="">See main article: </span><a data-dcnode-id="2771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Tallinn_TV_Tower/" title="Tallinn TV tower is a free-standing structure with an observation deck, built to provide better telecommunication services ..."><span data-dcnode-id="2772" instrument_node="">Tallinn TV Tower</span></a><span data-dcnode-id="2770" instrument_node="">.</span></p><span data-dcnode-id="2768" instrument_node="">
</span><p data-dcnode-id="2760"><span data-dcnode-id="2767" instrument_node="">When Estonia reaffirmed its independence during the coup (see below) in the dark hours of August 20, 1991, at 11:03 pm Tallinn time, many Estonian volunteers surrounded the </span><a data-dcnode-id="2765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Tallinn_TV_Tower/" title="Tallinn TV tower is a free-standing structure with an observation deck, built to provide better telecommunication services ..."><span data-dcnode-id="2766" instrument_node="">Tallinn TV Tower</span></a><span data-dcnode-id="2764" instrument_node=""> in an attempt to prepare to cut off the communication channels after the Soviet troops seized it and refused to be intimidated by the Soviet troops. When </span><a data-dcnode-id="2762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Edgar_Savisaar/" title="Edgar Savisaar is an Estonia n politician, one of the founding members of Popular Front of Estonia and the Centre Party."><span data-dcnode-id="2763" instrument_node="">Edgar Savisaar</span></a><span data-dcnode-id="2761" instrument_node=""> confronted the Soviet troops for ten minutes, they finally retreated from the TV tower after a failed resistance against the Estonians.</span></p><span data-dcnode-id="2759" instrument_node="">
</span><h4 data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">August Coup </span></h4><span data-dcnode-id="2756" instrument_node="">
</span><p data-dcnode-id="2751"><span data-dcnode-id="2755" instrument_node="">See main article: </span><a data-dcnode-id="2753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1991_August_Coup/"><span data-dcnode-id="2754" instrument_node="">1991 August Coup</span></a><span data-dcnode-id="2752" instrument_node="">.</span></p><span data-dcnode-id="2750" instrument_node="">
</span><p data-dcnode-id="2742"><span data-dcnode-id="2749" instrument_node="">Faced with growing separatism, Gorbachev sought to restructure the Soviet Union into a less centralized state. On August 20, the Russian SFSR was scheduled to sign a </span><a data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/New_Union_Treaty/" title="The New Union Treaty was a draft treaty that would have replaced the 1922 Treaty on the Creation of the USSR to salvage and ..."><span data-dcnode-id="2748" instrument_node="">New Union Treaty</span></a><span data-dcnode-id="2746" instrument_node=""> that would have converted the Soviet Union into a </span><a data-dcnode-id="2744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Union_of_Sovereign_States/" title="The New Union Treaty was a draft treaty that would have replaced the 1922 Treaty on the Creation of the USSR to salvage and ..."><span data-dcnode-id="2745" instrument_node="">federation of independent republics</span></a><span data-dcnode-id="2743" instrument_node=""> with a common president, foreign policy and military. It was strongly supported by the Central Asian republics, which needed the economic advantages of a common market to prosper. However, it would have meant some degree of continued Communist Party control over economic and social life.</span></p><span data-dcnode-id="2741" instrument_node="">
</span><p data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">More radical reformists were increasingly convinced that a rapid transition to a market economy was required, even if the eventual outcome meant the disintegration of the Soviet Union into several independent states. Independence also accorded with Yeltsin's desires as president of the RSFSR, as well as those of regional and local authorities to get rid of Moscow's pervasive control. In contrast to the reformers' lukewarm response to the treaty, the conservatives, "patriots", and Russian nationalists of the USSR – still strong within the CPSU and the military – were opposed to weakening the Soviet state and its centralized power structure.</span></p><span data-dcnode-id="2738" instrument_node="">
</span><p data-dcnode-id="2718"><span data-dcnode-id="2737" instrument_node="">On August 19, 1991, Gorbachev's vice president, </span><a data-dcnode-id="2735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Gennady_Yanayev/"><span data-dcnode-id="2736" instrument_node="">Gennady Yanayev</span></a><span data-dcnode-id="2734" instrument_node="">, Prime Minister </span><a data-dcnode-id="2732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Valentin_Pavlov/"><span data-dcnode-id="2733" instrument_node="">Valentin Pavlov</span></a><span data-dcnode-id="2731" instrument_node="">, Defense Minister </span><a data-dcnode-id="2729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Dmitry_Yazov/"><span data-dcnode-id="2730" instrument_node="">Dmitry Yazov</span></a><span data-dcnode-id="2728" instrument_node="">, KGB chief </span><a data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Vladimir_Kryuchkov/"><span data-dcnode-id="2727" instrument_node="">Vladimir Kryuchkov</span></a><span data-dcnode-id="2725" instrument_node=""> and other senior officials acted to prevent the union treaty from being signed by forming the "General Committee on the State Emergency", which put Gorbachev – on holiday in </span><a data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Foros%252c_Ukraine/"><span data-dcnode-id="2724" instrument_node="">Foros</span></a><span data-dcnode-id="2722" instrument_node="">, </span><a data-dcnode-id="2720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Crimea/" title="Crimea is a peninsula in Eastern Europe."><span data-dcnode-id="2721" instrument_node="">Crimea</span></a><span data-dcnode-id="2719" instrument_node=""> – under house arrest and cut off his communications. The coup leaders issued an emergency decree suspending political activity and banning most newspapers.</span></p><span data-dcnode-id="2717" instrument_node="">
</span><p data-dcnode-id="2706"><span data-dcnode-id="2716" instrument_node="">Thousands of Muscovites came out to defend the </span><a data-dcnode-id="2714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/White_House%252c_Moscow/" title="The White House is a government building in Moscow."><span data-dcnode-id="2715" instrument_node="">White House</span></a><span data-dcnode-id="2713" instrument_node=""> (the Russian Federation's parliament and Yeltsin's office), the symbolic seat of Russian sovereignty at the time. The organizers of the coup tried but ultimately failed to arrest Yeltsin, who rallied opposition to the coup by making speeches from atop a tank. The special forces dispatched by the coup leaders took up positions near the White House, but members refused to storm the barricaded building. The coup leaders also neglected to jam foreign news broadcasts, so many Muscovites watched it unfold live on </span><a data-dcnode-id="2711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/CNN/" title="The CNN was the first television channel to provide 24-hour news coverage and the first all-news television channel in the ..."><span data-dcnode-id="2712" instrument_node="">CNN</span></a><span data-dcnode-id="2710" instrument_node="">. Even the isolated Gorbachev was able to stay abreast of developments by tuning into the BBC World Service on a small transistor radio.</span><sup data-dcnode-id="2707"><a data-dcnode-id="2708" href="#Ref-113"><span data-dcnode-id="2709" instrument_node="">[113]</span></a></sup></p><span data-dcnode-id="2705" instrument_node="">
</span><p data-dcnode-id="2696"><span data-dcnode-id="2704" instrument_node="">After three days, on August 21, 1991, the coup collapsed. The organizers were detained and Gorbachev was reinstated as president, albeit with his power much depleted.</span><sup data-dcnode-id="2701"><a data-dcnode-id="2702" href="#Ref-114"><span data-dcnode-id="2703" instrument_node="">[114]</span></a></sup><span data-dcnode-id="2700" instrument_node=""> </span><sup data-dcnode-id="2697"><a data-dcnode-id="2698" href="#Ref-115"><span data-dcnode-id="2699" instrument_node="">[115]</span></a></sup></p><span data-dcnode-id="2695" instrument_node="">
</span><h4 data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">Fall: August to December </span></h4><span data-dcnode-id="2692" instrument_node="">
</span><p data-dcnode-id="2652"><span data-dcnode-id="2691" instrument_node="">On August 24, 1991, Gorbachev resigned as the general secretary the Central Committee of the Communist Party of the Soviet Union</span><sup data-dcnode-id="2688"><a data-dcnode-id="2689" href="#Ref-116"><span data-dcnode-id="2690" instrument_node="">[116]</span></a></sup><span data-dcnode-id="2687" instrument_node=""> and dissolved all party units in the government. On the same day, the </span><a data-dcnode-id="2685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Supreme_Soviet_of_the_Ukrainian_Soviet_Socialist_Republic/"><span data-dcnode-id="2686" instrument_node="">Supreme Soviet of the Ukrainian SSR</span></a><span data-dcnode-id="2684" instrument_node=""> passed a </span><a data-dcnode-id="2682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Declaration_of_Independence_of_Ukraine/" title="The Declaration of Independence of Ukraine was adopted by the Supreme Soviet of the Ukrainian SSR on 24 August 1991."><span data-dcnode-id="2683" instrument_node="">Declaration of Independence of Ukraine</span></a><span data-dcnode-id="2681" instrument_node="">, calling for a national referendum on the independence of Ukraine from the Soviet Union. Five days later, the </span><a data-dcnode-id="2679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Supreme_Soviet_of_the_Soviet_Union/"><span data-dcnode-id="2680" instrument_node="">Supreme Soviet of the Soviet Union</span></a><span data-dcnode-id="2678" instrument_node=""> indefinitely suspended all CPSU activity on Soviet territory,</span><sup data-dcnode-id="2675"><a data-dcnode-id="2676" href="#Ref-117"><span data-dcnode-id="2677" instrument_node="">[117]</span></a></sup><span data-dcnode-id="2674" instrument_node=""> effectively ending Communist rule in the Soviet Union and dissolving the only remaining unifying force in the country. Gorbachev established a </span><a data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/State_Council_of_the_Soviet_Union/"><span data-dcnode-id="2673" instrument_node="">State Council of the Soviet Union</span></a><span data-dcnode-id="2671" instrument_node=""> on 5 September, designed to bring him and the highest officials of the remaining republics into a collective leadership, able to appoint a </span><a data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/premier_of_the_Soviet_Union/" title="The Premier of the Soviet Union was the head of government of the Union of Soviet Socialist Republics."><span data-dcnode-id="2670" instrument_node="">premier of the Soviet Union</span></a><span data-dcnode-id="2668" instrument_node="">; it never functioned properly, though </span><a data-dcnode-id="2666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ivan_Silayev/"><span data-dcnode-id="2667" instrument_node="">Ivan Silayev</span></a><span data-dcnode-id="2665" instrument_node=""> </span><i data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">de facto</span></i><span data-dcnode-id="2662" instrument_node=""> took the post through the </span><a data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Committee_on_the_Operational_Management_of_the_Soviet_Economy/" title="The Premier of the Soviet Union was the head of government of the Union of Soviet Socialist Republics."><span data-dcnode-id="2661" instrument_node="">Committee on the Operational Management of the Soviet Economy</span></a><span data-dcnode-id="2659" instrument_node=""> and the </span><a data-dcnode-id="2657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Inter-Republican_economic_committee_of_the_USSR/"><span data-dcnode-id="2658" instrument_node="">Inter-Republican Economic Committee</span></a><span data-dcnode-id="2656" instrument_node=""> and tried to form </span><a data-dcnode-id="2654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Silayev%2527s_Government/"><span data-dcnode-id="2655" instrument_node="">a government</span></a><span data-dcnode-id="2653" instrument_node="">, though with rapidly shrinking powers.</span></p><span data-dcnode-id="2651" instrument_node="">
</span><p data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">The Soviet Union collapsed with dramatic speed in the last quarter of 1991. Ukraine was the first of 10 republics to secede from the Union between August and December, largely out of fear of another coup. By the end of September, Gorbachev no longer had the ability to influence events outside of Moscow. He was challenged even there by Yeltsin, who had begun taking over what remained of the Soviet government, including the Kremlin.</span></p><span data-dcnode-id="2648" instrument_node="">
</span><p data-dcnode-id="2624"><span data-dcnode-id="2647" instrument_node="">On September 17, 1991, </span><a data-dcnode-id="2645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/United_Nations_General_Assembly_resolution/" title="A United Nations General Assembly Resolution is a decision or declaration voted on by all member states of the United ..."><span data-dcnode-id="2646" instrument_node="">General Assembly resolution</span></a><span data-dcnode-id="2644" instrument_node=""> numbers 46/4, 46/5, and 46/6 admitted Estonia, Latvia, and Lithuania to the United Nations, conforming to </span><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/United_Nations_Security_Council_resolution/" title="A United Nations Security Council resolution is a United Nations resolution adopted by the fifteen members of the Security ..."><span data-dcnode-id="2643" instrument_node="">Security Council resolution</span></a><span data-dcnode-id="2641" instrument_node=""> numbers </span><a data-dcnode-id="2639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/United_Nations_Security_Council_Resolution_709/"><span data-dcnode-id="2640" instrument_node="">709</span></a><span data-dcnode-id="2638" instrument_node="">, </span><a data-dcnode-id="2636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/United_Nations_Security_Council_Resolution_710/"><span data-dcnode-id="2637" instrument_node="">710</span></a><span data-dcnode-id="2635" instrument_node="">, and </span><a data-dcnode-id="2633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/United_Nations_Security_Council_Resolution_711/"><span data-dcnode-id="2634" instrument_node="">711</span></a><span data-dcnode-id="2632" instrument_node=""> passed on September 12 without a vote.</span><sup data-dcnode-id="2629"><a data-dcnode-id="2630" href="#Ref-118"><span data-dcnode-id="2631" instrument_node="">[118]</span></a></sup><span data-dcnode-id="2628" instrument_node=""> </span><sup data-dcnode-id="2625"><a data-dcnode-id="2626" href="#Ref-119"><span data-dcnode-id="2627" instrument_node="">[119]</span></a></sup></p><span data-dcnode-id="2623" instrument_node="">
</span><p data-dcnode-id="2618"><span data-dcnode-id="2622" instrument_node="">On 6 November, Yeltsin–who had by then taken over much of the Soviet government–issued a decree banning all Communist Party activities on Russian territory.</span><sup data-dcnode-id="2619"><a data-dcnode-id="2620" href="#Ref-120"><span data-dcnode-id="2621" instrument_node="">[120]</span></a></sup></p><span data-dcnode-id="2617" instrument_node="">
</span><p data-dcnode-id="2612"><span data-dcnode-id="2616" instrument_node="">By November 7, 1991, most newspapers referred to the country as the 'former Soviet Union'.</span><sup data-dcnode-id="2613"><a data-dcnode-id="2614" href="#Ref-121"><span data-dcnode-id="2615" instrument_node="">[121]</span></a></sup></p><span data-dcnode-id="2611" instrument_node="">
</span><p data-dcnode-id="2606"><span data-dcnode-id="2610" instrument_node="">The final round of the Soviet Union's collapse began on December 1, 1991. That day, a </span><a data-dcnode-id="2608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1991_Ukrainian_independence_referendum/"><span data-dcnode-id="2609" instrument_node="">Ukrainian popular referendum</span></a><span data-dcnode-id="2607" instrument_node=""> resulted in 91 percent of Ukraine's voters voting to affirm the independence declaration passed in August and formally secede from the Union. The secession of Ukraine, long second only to Russia in economic and political power, ended any realistic chance of Gorbachev keeping the Soviet Union together even on a limited scale. The leaders of the three Slavic republics, Russia, Ukraine, and Belarus (formerly Byelorussia), agreed to discuss possible alternatives to the union.</span></p><span data-dcnode-id="2605" instrument_node="">
</span><p data-dcnode-id="2591"><span data-dcnode-id="2604" instrument_node="">On December 8, the leaders of Russia, Ukraine, and Belarus secretly met in </span><a data-dcnode-id="2602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Belavezhskaya_Pushcha/" title="Białowieża Forest is a forest on the border between Belarus and Poland."><span data-dcnode-id="2603" instrument_node="">Belavezhskaya Pushcha</span></a><span data-dcnode-id="2601" instrument_node="">, in western Belarus, and signed the </span><a data-dcnode-id="2599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Belavezha_Accords/"><span data-dcnode-id="2600" instrument_node="">Belavezha Accords</span></a><span data-dcnode-id="2598" instrument_node="">, which proclaimed the Soviet Union had ceased to exist and announced formation of the </span><a data-dcnode-id="2596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Commonwealth_of_Independent_States/" title="The Commonwealth of Independent States is a regional intergovernmental organization in Eastern Europe and Asia."><span data-dcnode-id="2597" instrument_node="">Commonwealth of Independent States</span></a><span data-dcnode-id="2595" instrument_node=""> (CIS) as a looser association to take its place. They also invited other republics to join the CIS. Gorbachev called it an unconstitutional coup. However, by this time there was no longer any reasonable doubt that, as the preamble of the Accords put it, "the USSR, as a subject of </span><a data-dcnode-id="2593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/international_law/" title="International law is the set of rules, norms, and standards generally recognized as binding between nation s."><span data-dcnode-id="2594" instrument_node="">international law</span></a><span data-dcnode-id="2592" instrument_node=""> and a geopolitical reality, is ceasing its existence".</span></p><span data-dcnode-id="2590" instrument_node="">
</span><p data-dcnode-id="2576"><span data-dcnode-id="2589" instrument_node="">On December 10, the agreement was ratified by the </span><a data-dcnode-id="2587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Verkhovna_Rada/" title="The Verkhovna Rada is composed of 450 deputies, who are presided over by a chairman."><span data-dcnode-id="2588" instrument_node="">Verkhovna Rada of Ukraine</span></a><sup data-dcnode-id="2584"><a data-dcnode-id="2585" href="#Ref-122"><span data-dcnode-id="2586" instrument_node="">[122]</span></a></sup><span data-dcnode-id="2583" instrument_node=""> and the </span><a data-dcnode-id="2581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Supreme_Council_of_Belarus/"><span data-dcnode-id="2582" instrument_node="">Supreme Council of Belarus</span></a><span data-dcnode-id="2580" instrument_node="">.</span><sup data-dcnode-id="2577"><a data-dcnode-id="2578" href="#Ref-123"><span data-dcnode-id="2579" instrument_node="">[123]</span></a></sup></p><span data-dcnode-id="2575" instrument_node="">
</span><p data-dcnode-id="2514"><span data-dcnode-id="2574" instrument_node="">On December 12, the </span><a data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Supreme_Soviet_of_the_Russian_SFSR/"><span data-dcnode-id="2573" instrument_node="">Supreme Soviet of the Russian SFSR</span></a><span data-dcnode-id="2571" instrument_node=""> formally ratified the Belavezha Accords,</span><sup data-dcnode-id="2568"><a data-dcnode-id="2569" href="#Ref-124"><span data-dcnode-id="2570" instrument_node="">[124]</span></a></sup><span data-dcnode-id="2567" instrument_node=""> denounced the </span><a data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Treaty_on_the_Creation_of_the_USSR/"><span data-dcnode-id="2566" instrument_node="">1922 Union Treaty</span></a><span data-dcnode-id="2564" instrument_node="">,</span><sup data-dcnode-id="2561"><a data-dcnode-id="2562" href="#Ref-125"><span data-dcnode-id="2563" instrument_node="">[125]</span></a></sup><span data-dcnode-id="2560" instrument_node=""> and recalled the Russian deputies from the </span><a data-dcnode-id="2558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Supreme_Soviet_of_the_USSR/"><span data-dcnode-id="2559" instrument_node="">Supreme Soviet of the USSR</span></a><span data-dcnode-id="2557" instrument_node="">. The legality of this ratification raised doubts among some members of the Russian parliament, since according to the Constitution of the RSFSR of 1978 consideration of this document was in the exclusive jurisdiction of the Congress of People's Deputies of the RSFSR.</span><sup data-dcnode-id="2554"><a data-dcnode-id="2555" href="#Ref-126"><span data-dcnode-id="2556" instrument_node="">[126]</span></a></sup><span data-dcnode-id="2553" instrument_node=""> </span><sup data-dcnode-id="2550"><a data-dcnode-id="2551" href="#Ref-127"><span data-dcnode-id="2552" instrument_node="">[127]</span></a></sup><span data-dcnode-id="2549" instrument_node=""> </span><sup data-dcnode-id="2546"><a data-dcnode-id="2547" href="#Ref-128"><span data-dcnode-id="2548" instrument_node="">[128]</span></a></sup><span data-dcnode-id="2545" instrument_node=""> </span><sup data-dcnode-id="2542"><a data-dcnode-id="2543" href="#Ref-129"><span data-dcnode-id="2544" instrument_node="">[129]</span></a></sup><span data-dcnode-id="2541" instrument_node=""> However, no one in either Russia or the Kremlin objected. Any objections from the latter would have likely had no effect, since the Soviet government had effectively been rendered impotent long before December. A number of lawyers believe that the denunciation of the union treaty was meaningless since it became invalid in 1924 with the adoption of the </span><a data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1924_Constitution_of_the_Soviet_Union/" title="The 1924 Constitution of the Soviet Union was the constitution of the Soviet Union adopted on 31 January 1924."><span data-dcnode-id="2540" instrument_node="">first constitution of the USSR</span></a><span data-dcnode-id="2538" instrument_node="">.</span><sup data-dcnode-id="2535"><a data-dcnode-id="2536" href="#Ref-130"><span data-dcnode-id="2537" instrument_node="">[130]</span></a></sup><span data-dcnode-id="2534" instrument_node=""> </span><sup data-dcnode-id="2531"><a data-dcnode-id="2532" href="#Ref-131"><span data-dcnode-id="2533" instrument_node="">[131]</span></a></sup><span data-dcnode-id="2530" instrument_node=""> </span><sup data-dcnode-id="2527"><a data-dcnode-id="2528" href="#Ref-132"><span data-dcnode-id="2529" instrument_node="">[132]</span></a></sup><span data-dcnode-id="2526" instrument_node=""> (in 1996 the </span><a data-dcnode-id="2524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/State_Duma/" title="The State Duma is the lower house of the Federal Assembly of Russia, while the upper house is the Federation Council."><span data-dcnode-id="2525" instrument_node="">State Duma</span></a><span data-dcnode-id="2523" instrument_node=""> voiced the same position</span><sup data-dcnode-id="2520"><a data-dcnode-id="2521" href="#Ref-133"><span data-dcnode-id="2522" instrument_node="">[133]</span></a></sup><span data-dcnode-id="2519" instrument_node="">) Later that day, Gorbachev hinted for the first time that he was considering stepping down.</span><sup data-dcnode-id="2516"><a data-dcnode-id="2517" href="#Ref-134"><span data-dcnode-id="2518" instrument_node="">[134]</span></a></sup><span data-dcnode-id="2515" instrument_node=""> On the surface, it appeared that the largest republic had formally seceded. However, this is not the case as Russia apparently took the line that it was not possible to secede from a country that no longer existed.</span></p><span data-dcnode-id="2513" instrument_node="">
</span><p data-dcnode-id="2491"><span data-dcnode-id="2512" instrument_node="">On December 17, 1991, along with 28 European countries, the </span><a data-dcnode-id="2510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/European_Economic_Community/" title="The European Economic Community was a regional organization that aimed to bring about economic integration among its member ..."><span data-dcnode-id="2511" instrument_node="">European Economic Community</span></a><span data-dcnode-id="2509" instrument_node="">, and four non-European countries, the three Baltic Republics and nine of the twelve remaining Soviet republics signed the </span><a data-dcnode-id="2507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/European_Energy_Charter/" title="The Energy Charter Treaty is an international agreement that establishes a multilateral framework for cross-border ..."><span data-dcnode-id="2508" instrument_node="">European Energy Charter</span></a><span data-dcnode-id="2506" instrument_node=""> in </span><a data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/the_Hague/" title="The The Hague is a city and municipality on the western coast of the Netherlands on the North Sea."><span data-dcnode-id="2505" instrument_node="">the Hague</span></a><span data-dcnode-id="2503" instrument_node=""> as sovereign states.</span><sup data-dcnode-id="2500"><a data-dcnode-id="2501" href="#Ref-135"><span data-dcnode-id="2502" instrument_node="">[135]</span></a></sup><span data-dcnode-id="2499" instrument_node=""> </span><sup data-dcnode-id="2496"><a data-dcnode-id="2497" href="#Ref-136"><span data-dcnode-id="2498" instrument_node="">[136]</span></a></sup><span data-dcnode-id="2495" instrument_node=""> On the same day, members of the lower house of the union parliament (Council of the Union) held a meeting of People's Deputies of the Soviet Union. The meeting adopted a statement in connection with the signing of the Belovezhskaya Agreement and its ratification by the parliaments of Russia, Belarus and Ukraine, in which it noted that it considers the decisions made on the liquidation of state power and administration bodies illegal and not meeting the current situation and the vital interests of the peoples and stated that in the event further complication of the situation in the country reserves the right to convene in the future the Congress of People's Deputies of the USSR.</span><sup data-dcnode-id="2492"><a data-dcnode-id="2493" href="#Ref-137"><span data-dcnode-id="2494" instrument_node="">[137]</span></a></sup></p><span data-dcnode-id="2490" instrument_node="">
</span><p data-dcnode-id="2485"><span data-dcnode-id="2489" instrument_node="">On December 18, the upper chamber of the Supreme Soviet of the USSR (Council of Republics) adopted a statement, according to which it accepts with understanding the Agreement on the creation of the Commonwealth of Independent States and considers it a real guarantee of a way out of the acute political and economic crisis.</span><sup data-dcnode-id="2486"><a data-dcnode-id="2487" href="#Ref-138"><span data-dcnode-id="2488" instrument_node="">[138]</span></a></sup></p><span data-dcnode-id="2484" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2483" instrument_node="">Doubts remained over whether the Belavezha Accords had legally dissolved the Soviet Union, since they were signed by only three republics. However, on December 21, representatives of 8 of the 12 remaining republics – all except </span><a data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Estonia/" title="Estonia is a country in Northern Europe."><span data-dcnode-id="2482" instrument_node="">Estonia</span></a><span data-dcnode-id="2480" instrument_node="">, </span><a data-dcnode-id="2478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Georgia_%28country%29/" title="Georgia is a country located in the Caucasus, at the intersection of Eastern Europe and Western Asia."><span data-dcnode-id="2479" instrument_node="">Georgia</span></a><span data-dcnode-id="2477" instrument_node="">, </span><a data-dcnode-id="2475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Latvia/" title="Latvia is a country in the Baltic region of Northern Europe."><span data-dcnode-id="2476" instrument_node="">Latvia</span></a><span data-dcnode-id="2474" instrument_node="">, and </span><a data-dcnode-id="2472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Lithuania/" title="Lithuania is a country in the Baltic region of Europe."><span data-dcnode-id="2473" instrument_node="">Lithuania</span></a><span data-dcnode-id="2471" instrument_node=""> – signed the </span><a data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Alma-Ata_Protocol/" title="The Alma-Ata Protocol was the only former republic that did not participate while Lithuania, Latvia and Estonia refused to ..."><span data-dcnode-id="2470" instrument_node="">Alma-Ata Protocol</span></a><span data-dcnode-id="2468" instrument_node="">, which confirmed the dissolution of the Union and formally established the CIS.</span><sup data-dcnode-id="2465"><a data-dcnode-id="2466" href="#Ref-139"><span data-dcnode-id="2467" instrument_node="">[139]</span></a></sup><span data-dcnode-id="2464" instrument_node=""> They also "accepted" Gorbachev's resignation.</span><sup data-dcnode-id="2461"><a data-dcnode-id="2462" href="#Ref-140"><span data-dcnode-id="2463" instrument_node="">[140]</span></a></sup><span data-dcnode-id="2460" instrument_node=""> The command of the Armed Forces of the USSR was entrusted to the Minister of Defense Yevgeny Shaposhnikov.</span><sup data-dcnode-id="2457"><a data-dcnode-id="2458" href="#Ref-141"><span data-dcnode-id="2459" instrument_node="">[141]</span></a></sup><span data-dcnode-id="2456" instrument_node=""> </span><sup data-dcnode-id="2453"><a data-dcnode-id="2454" href="#Ref-142"><span data-dcnode-id="2455" instrument_node="">[142]</span></a></sup><span data-dcnode-id="2452" instrument_node=""> Even at this moment, Gorbachev hadn't made any formal plans to leave the scene yet. However, with a majority of republics now agreeing that the Soviet Union no longer existed, Gorbachev bowed to the inevitable, telling CBS News that he would resign as soon as he saw that the CIS was indeed a reality.</span><sup data-dcnode-id="2449"><a data-dcnode-id="2450" href="#Ref-143"><span data-dcnode-id="2451" instrument_node="">[143]</span></a></sup></p><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2434"><span data-dcnode-id="2446" instrument_node="">In a nationally televised speech in the evening of December 25, Gorbachev resigned as president of the Soviet Union – or, as he put it, "I hereby discontinue my activities at the post of President of the USSR."</span><sup data-dcnode-id="2443"><a data-dcnode-id="2444" href="#Ref-144"><span data-dcnode-id="2445" instrument_node="">[144]</span></a></sup><span data-dcnode-id="2442" instrument_node=""> He declared the office extinct, and all of its powers (such as control of the nuclear arsenal</span><sup data-dcnode-id="2439"><a data-dcnode-id="2440" href="#Ref-145"><span data-dcnode-id="2441" instrument_node="">[145]</span></a></sup><span data-dcnode-id="2438" instrument_node="">) were ceded to Yeltsin. A week earlier, Gorbachev had met with Yeltsin and accepted the </span><i data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">fait accompli</span></i><span data-dcnode-id="2435" instrument_node=""> of the Soviet Union's dissolution. On the same day, the Supreme Soviet of the Russian SFSR adopted a statute to change Russia's legal name from "Russian Soviet Federative Socialist Republic" to "Russian Federation", showing that it was now a fully sovereign non-communist state.</span></p><span data-dcnode-id="2433" instrument_node="">
</span><p data-dcnode-id="2404"><span data-dcnode-id="2432" instrument_node="">On the night of December 25, at 7:35&nbsp;p.m. Moscow time, after Gorbachev appeared on television, the </span><a data-dcnode-id="2430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Flag_of_the_Soviet_Union/"><span data-dcnode-id="2431" instrument_node="">Soviet flag</span></a><span data-dcnode-id="2429" instrument_node=""> was lowered</span><sup data-dcnode-id="2426"><a data-dcnode-id="2427" href="#Ref-146"><span data-dcnode-id="2428" instrument_node="">[146]</span></a></sup><span data-dcnode-id="2425" instrument_node=""> and the </span><a data-dcnode-id="2423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/State_Anthem_of_the_Soviet_Union/" title="The State Anthem of the Soviet Union was the national anthem of the Union of Soviet Socialist Republics and the regional ..."><span data-dcnode-id="2424" instrument_node="">State Anthem of the Soviet Union</span></a><span data-dcnode-id="2422" instrument_node=""> was played for the last time, and the </span><a data-dcnode-id="2420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Flag_of_Russia/" title="The flag of Russia is a tricolour flag consisting of three equal horizontal fields: white on the top, blue in the middle, ..."><span data-dcnode-id="2421" instrument_node="">Russian tricolor</span></a><span data-dcnode-id="2419" instrument_node=""> was raised in its place at 7:45 pm,</span><sup data-dcnode-id="2416"><a data-dcnode-id="2417" href="#Ref-147"><span data-dcnode-id="2418" instrument_node="">[147]</span></a></sup><span data-dcnode-id="2415" instrument_node=""> symbolically marking the end of the Soviet Union. In his parting words, Gorbachev defended his record on domestic reform and </span><a data-dcnode-id="2413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/d%25C3%25A9tente/" title="Détente is the relaxation of strained relations, especially political, by verbal communication."><span data-dcnode-id="2414" instrument_node="">détente</span></a><span data-dcnode-id="2412" instrument_node="">, but conceded, "The old system collapsed before a new one had time to start working."</span><sup data-dcnode-id="2409"><a data-dcnode-id="2410" href="#Ref-148"><span data-dcnode-id="2411" instrument_node="">[148]</span></a></sup><span data-dcnode-id="2408" instrument_node=""> On that same day, the </span><a data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/President_of_the_United_States/" title="The president of the United States is the head of state and head of government of the United States of America."><span data-dcnode-id="2407" instrument_node="">President of the United States</span></a><span data-dcnode-id="2405" instrument_node=""> George H. W. Bush held a brief televised speech officially recognizing the independence of the 11 remaining republics.</span></p><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2371"><span data-dcnode-id="2402" instrument_node="">On December 26, the Soviet of Republics, the upper chamber of the </span><a data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Supreme_Soviet_of_the_Soviet_Union/"><span data-dcnode-id="2401" instrument_node="">Supreme Soviet of the Soviet Union</span></a><span data-dcnode-id="2399" instrument_node="">, voted the Soviet Union out of existence</span><sup data-dcnode-id="2396"><a data-dcnode-id="2397" href="#Ref-149"><span data-dcnode-id="2398" instrument_node="">[149]</span></a></sup><span data-dcnode-id="2395" instrument_node=""> </span><sup data-dcnode-id="2392"><a data-dcnode-id="2393" href="#Ref-150"><span data-dcnode-id="2394" instrument_node="">[150]</span></a></sup><span data-dcnode-id="2391" instrument_node=""> (the lower chamber, the </span><a data-dcnode-id="2389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Soviet_of_the_Union/"><span data-dcnode-id="2390" instrument_node="">Soviet of the Union</span></a><span data-dcnode-id="2388" instrument_node="">, had been unable to work since December 12, when the recall of the Russian deputies left it without a </span><a data-dcnode-id="2386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/quorum/" title="A quorum is the minimum number of members of a deliberative assembly necessary to conduct the business of that group."><span data-dcnode-id="2387" instrument_node="">quorum</span></a><span data-dcnode-id="2385" instrument_node="">). The following day Yeltsin moved into Gorbachev's former office,</span><sup data-dcnode-id="2382"><a data-dcnode-id="2383" href="#Ref-151"><span data-dcnode-id="2384" instrument_node="">[151]</span></a></sup><span data-dcnode-id="2381" instrument_node=""> though the Russian authorities had taken over the suite two days earlier. The </span><a data-dcnode-id="2379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Soviet_Armed_Forces/" title="Soviet Armed Forces was later made independent and amalgamated with the NKVD in 1934, and thus its Internal Troops were ..."><span data-dcnode-id="2380" instrument_node="">Soviet Armed Forces</span></a><span data-dcnode-id="2378" instrument_node=""> were placed under the command of the </span><a data-dcnode-id="2376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Commonwealth_of_Independent_States/" title="The Commonwealth of Independent States is a regional intergovernmental organization in Eastern Europe and Asia."><span data-dcnode-id="2377" instrument_node="">Commonwealth of Independent States</span></a><span data-dcnode-id="2375" instrument_node="">, but were eventually subsumed by the newly independent republics, with the bulk becoming the </span><a data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russian_Armed_Forces/"><span data-dcnode-id="2374" instrument_node="">Armed Forces of the Russian Federation</span></a><span data-dcnode-id="2372" instrument_node="">. By the end of 1991, the few remaining Soviet institutions that had not been taken over by Russia ceased operation, and individual republics assumed the central government's role.</span></p><span data-dcnode-id="2370" instrument_node="">
</span><p data-dcnode-id="2362"><span data-dcnode-id="2369" instrument_node="">The Alma-Ata Protocol also addressed other issues, including UN membership. Notably, Russia was authorized to assume the Soviet Union's UN membership, including its permanent seat on the </span><a data-dcnode-id="2367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/UN_Security_Council/" title="The United Nations Security Council is one of the six principal organs of the United Nations and is charged with ensuring ..."><span data-dcnode-id="2368" instrument_node="">Security Council</span></a><span data-dcnode-id="2366" instrument_node="">. The Soviet Ambassador to the UN delivered a letter signed by Russian President Yeltsin to the </span><a data-dcnode-id="2364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/UN_Secretary-General/" title="The secretary-general of the United Nations is the chief administrative officer of the United Nations and head of the United ..."><span data-dcnode-id="2365" instrument_node="">UN Secretary-General</span></a><span data-dcnode-id="2363" instrument_node=""> dated December 24, 1991, informing him that by virtue of the Alma-Ata Protocol, Russia was the successor state to the USSR. After being circulated among the other UN member states, with no objection raised, the statement was declared accepted on the last day of the year, December 31, 1991.</span></p><span data-dcnode-id="2361" instrument_node="">
