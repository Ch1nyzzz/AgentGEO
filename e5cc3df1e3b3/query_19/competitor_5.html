</span></td></tr><tr data-dcnode-id="5102"><td data-dcnode-id="5110"><span data-dcnode-id="5111" instrument_node="">Partof:</span></td><td data-dcnode-id="5103"><span data-dcnode-id="5109" instrument_node="">the </span><a data-dcnode-id="5107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Cold_War_%281985%25E2%2580%25931991%29/" title="The Cold War was a revolutionary leader for the USSR, as he was the first to promote liberalization of the political ..."><span data-dcnode-id="5108" instrument_node="">Cold War</span></a><span data-dcnode-id="5106" instrument_node=""> and the </span><a data-dcnode-id="5104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Revolutions_of_1989/" title="The Revolutions of 1989 is often also called the Fall of Communism, and sometimes the Fall of Nations or the Autumn of ..."><span data-dcnode-id="5105" instrument_node="">Revolutions of 1989</span></a></td></tr></tbody></table></div><p data-dcnode-id="5052"><span data-dcnode-id="5098" instrument_node="">The </span><b data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">dissolution of the Soviet Union</span></b><span data-dcnode-id="5095" instrument_node=""> (1988–1991) was the process of internal disintegration within the </span><a data-dcnode-id="5093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Soviet_Union/" title="The Soviet Union was a communist state that spanned Eurasia from 1922 to 1991."><span data-dcnode-id="5094" instrument_node="">Soviet Union</span></a><span data-dcnode-id="5092" instrument_node=""> (USSR) which resulted in the end of its existence as a sovereign state. It brought an end to </span><a data-dcnode-id="5090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/General_Secretary_of_the_Communist_Party_of_the_Soviet_Union/"><span data-dcnode-id="5091" instrument_node="">General Secretary</span></a><span data-dcnode-id="5089" instrument_node=""> (later also </span><a data-dcnode-id="5087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/President_of_the_Soviet_Union/" title="The President of the Soviet Union was the head of state of the Union of Soviet Socialist Republics from 15 March 1990 to 25 ..."><span data-dcnode-id="5088" instrument_node="">President</span></a><span data-dcnode-id="5086" instrument_node="">) </span><a data-dcnode-id="5084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Mikhail_Gorbachev/"><span data-dcnode-id="5085" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="5083" instrument_node="">'s effort to </span><a data-dcnode-id="5081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Perestroika/" title="Perestroika was a political movement for reform within the Communist Party of the Soviet Union during the late 1980s widely ..."><span data-dcnode-id="5082" instrument_node="">reform the Soviet political and economic system</span></a><span data-dcnode-id="5080" instrument_node=""> in an attempt to stop a </span><a data-dcnode-id="5078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Era_of_Stagnation/" title="The Era of Stagnation is a term coined by Mikhail Gorbachev in order to describe the negative way in which he viewed the ..."><span data-dcnode-id="5079" instrument_node="">period of political stalemate and economic backslide</span></a><span data-dcnode-id="5077" instrument_node="">. The Soviet Union had experienced internal stagnation and ethnic separatism. The USSR, although a highly centralized state, was made up of a </span><a data-dcnode-id="5075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Republics_of_the_Soviet_Union/"><span data-dcnode-id="5076" instrument_node="">number of republics</span></a><span data-dcnode-id="5074" instrument_node=""> that served as homelands for different ethnicities. By late 1991, amidst a catastrophic political crisis, with several republics already departing the Union and centralized power waning, the leaders of </span><a data-dcnode-id="5072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Treaty_of_Creation_of_the_Soviet_Union/"><span data-dcnode-id="5073" instrument_node="">three of its founding members</span></a><span data-dcnode-id="5071" instrument_node=""> declared that the </span><a data-dcnode-id="5069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Belovezh_Accords/"><span data-dcnode-id="5070" instrument_node="">Soviet Union no longer existed</span></a><span data-dcnode-id="5068" instrument_node="">. Eight more republics </span><a data-dcnode-id="5066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Alma-Ata_Protocol/" title="The Alma-Ata Protocol was the only former republic that did not participate while Lithuania, Latvia and Estonia refused to ..."><span data-dcnode-id="5067" instrument_node="">joined their declaration</span></a><span data-dcnode-id="5065" instrument_node=""> shortly thereafter. Gorbachev resigned in December 1991 and what was left of the </span><a data-dcnode-id="5063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Supreme_Soviet_of_the_Soviet_Union/"><span data-dcnode-id="5064" instrument_node="">Soviet parliament</span></a><span data-dcnode-id="5062" instrument_node=""> voted itself out of existence shortly thereafter. Along with the </span><a data-dcnode-id="5060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Revolutions_of_1989/" title="The Revolutions of 1989 is often also called the Fall of Communism, and sometimes the Fall of Nations or the Autumn of ..."><span data-dcnode-id="5061" instrument_node="">Revolutions of 1989</span></a><span data-dcnode-id="5059" instrument_node=""> in the </span><a data-dcnode-id="5057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Eastern_Bloc/" title="The Eastern Bloc was often called the Second World, whereas the term &quot; First World &quot; referred to the Western Bloc and &quot; ..."><span data-dcnode-id="5058" instrument_node="">Eastern Bloc</span></a><span data-dcnode-id="5056" instrument_node="">, the dissolution of the Soviet Union marked the end of the </span><a data-dcnode-id="5054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Cold_War/" title="The Cold War was a period of geopolitical tension between the United States and the Soviet Union and their respective ..."><span data-dcnode-id="5055" instrument_node="">Cold War</span></a><span data-dcnode-id="5053" instrument_node="">.</span></p><span data-dcnode-id="5051" instrument_node="">
</span><p data-dcnode-id="5028"><span data-dcnode-id="5050" instrument_node="">The process began with growing unrest in the Union's various constituent national republics developing into an </span><a data-dcnode-id="5048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Parade_of_sovereignties/" title="The parade of sovereignties was a series of declarations of sovereignty of various degree by the Soviet republics in the ..."><span data-dcnode-id="5049" instrument_node="">incessant political and legislative conflict</span></a><span data-dcnode-id="5047" instrument_node=""> between them and the central government. </span><a data-dcnode-id="5045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Estonia_SSR/" title="The Estonian Soviet Socialist Republic was an ethnically based administrative subdivision of the former Soviet Union ..."><span data-dcnode-id="5046" instrument_node="">Estonia</span></a><span data-dcnode-id="5044" instrument_node=""> was the first Soviet republic to declare state sovereignty inside the Union on November 16, 1988. </span><a data-dcnode-id="5042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Lithuanian_SSR/"><span data-dcnode-id="5043" instrument_node="">Lithuania</span></a><span data-dcnode-id="5041" instrument_node=""> was the first republic to declare independence from the Soviet Union by the </span><a data-dcnode-id="5039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Act_of_the_Re-Establishment_of_the_State_of_Lithuania/" title="The Act of the Re-Establishment of the State of Lithuania was an independence declaration by Lithuania adopted on March 11, ..."><span data-dcnode-id="5040" instrument_node="">Act of March 11, 1990</span></a><span data-dcnode-id="5038" instrument_node=""> with its </span><a data-dcnode-id="5036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Baltic_states/" title="The Baltic states is a modern unofficial geopolitical term, typically used to group three countries: Estonia, Latvia and ..."><span data-dcnode-id="5037" instrument_node="">Baltic</span></a><span data-dcnode-id="5035" instrument_node=""> neighbours and the </span><a data-dcnode-id="5033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Southern_Caucasus/" title="The South Caucasus is a geographical region on the border of Eastern Europe and Western Asia, straddling the southern ..."><span data-dcnode-id="5034" instrument_node="">Southern Caucasus</span></a><span data-dcnode-id="5032" instrument_node=""> republic of </span><a data-dcnode-id="5030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Georgia_%28country%29/" title="Georgia is a country located in the Caucasus, at the intersection of Eastern Europe and Western Asia."><span data-dcnode-id="5031" instrument_node="">Georgia</span></a><span data-dcnode-id="5029" instrument_node=""> joining it in a course of two months.</span></p><span data-dcnode-id="5027" instrument_node="">
</span><p data-dcnode-id="4961"><span data-dcnode-id="5026" instrument_node="">In August 1991, communist hardliners and military elites tried to overthrow Gorbachev and stop the failing reforms in </span><a data-dcnode-id="5024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1991_August_Coup/"><span data-dcnode-id="5025" instrument_node="">a coup</span></a><span data-dcnode-id="5023" instrument_node="">, but failed. The turmoil led to the government in Moscow losing most of its influence, and many republics proclaiming independence in the following days and months. The secession of the Baltic states was recognized in September 1991. The Belovezh Accords were signed on December 8 by </span><a data-dcnode-id="5021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/President_of_Russia/"><span data-dcnode-id="5022" instrument_node="">President</span></a><span data-dcnode-id="5020" instrument_node=""> </span><a data-dcnode-id="5018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Boris_Yeltsin/"><span data-dcnode-id="5019" instrument_node="">Boris Yeltsin</span></a><span data-dcnode-id="5017" instrument_node=""> of </span><a data-dcnode-id="5015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russia/" title="Russia is a transcontinental country spanning Eastern Europe and Northern Asia."><span data-dcnode-id="5016" instrument_node="">Russia</span></a><span data-dcnode-id="5014" instrument_node="">, </span><a data-dcnode-id="5012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/President_of_Ukraine/" title="The president of Ukraine is the head of state of Ukraine."><span data-dcnode-id="5013" instrument_node="">President</span></a><span data-dcnode-id="5011" instrument_node=""> </span><a data-dcnode-id="5009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Leonid_Kravchuk/"><span data-dcnode-id="5010" instrument_node="">Kravchuk</span></a><span data-dcnode-id="5008" instrument_node=""> of </span><a data-dcnode-id="5006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukraine/" title="Ukraine is a country in Eastern Europe."><span data-dcnode-id="5007" instrument_node="">Ukraine</span></a><span data-dcnode-id="5005" instrument_node="">, and </span><a data-dcnode-id="5003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Supreme_Council_of_Belarus/"><span data-dcnode-id="5004" instrument_node="">Chairman</span></a><span data-dcnode-id="5002" instrument_node=""> </span><a data-dcnode-id="5000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Stanislav_Shushkevich/"><span data-dcnode-id="5001" instrument_node="">Shushkevich</span></a><span data-dcnode-id="4999" instrument_node=""> of Belarus, recognising each other's independence and creating the </span><a data-dcnode-id="4997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Commonwealth_of_Independent_States/" title="The Commonwealth of Independent States is a regional intergovernmental organization in Eastern Europe and Asia."><span data-dcnode-id="4998" instrument_node="">Commonwealth of Independent States</span></a><span data-dcnode-id="4996" instrument_node=""> (CIS) instead of the Soviet Union. </span><a data-dcnode-id="4994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kazakhstan/" title="Kazakhstan is the world's largest landlocked country, the world's largest Muslim-majority country by land area, and the ..."><span data-dcnode-id="4995" instrument_node="">Kazakhstan</span></a><span data-dcnode-id="4993" instrument_node=""> was the last nation to leave the Union, proclaiming independence on December 16. All the ex-Soviet republics, with the exception of Georgia and the Baltics, joined the CIS on December 21, signing the </span><a data-dcnode-id="4991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Alma-Ata_Protocol/" title="The Alma-Ata Protocol was the only former republic that did not participate while Lithuania, Latvia and Estonia refused to ..."><span data-dcnode-id="4992" instrument_node="">Alma-Ata Protocol</span></a><span data-dcnode-id="4990" instrument_node="">. On December 25, Gorbachev resigned and turned over his presidential powers—including control of the </span><a data-dcnode-id="4988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Cheget/" title="Cheget is a &quot; nuclear briefcase &quot; and a part of the automatic system for the command and control of Russia 's Strategic ..."><span data-dcnode-id="4989" instrument_node="">nuclear launch codes</span></a><span data-dcnode-id="4987" instrument_node="">—to Yeltsin, who was now the first president of the </span><a data-dcnode-id="4985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russia/" title="Russia is a transcontinental country spanning Eastern Europe and Northern Asia."><span data-dcnode-id="4986" instrument_node="">Russian Federation</span></a><span data-dcnode-id="4984" instrument_node="">. That evening, the </span><a data-dcnode-id="4982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Flag_of_the_Soviet_Union/"><span data-dcnode-id="4983" instrument_node="">Soviet flag</span></a><span data-dcnode-id="4981" instrument_node=""> was lowered from the </span><a data-dcnode-id="4979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Moscow_Kremlin/" title="The Kremlin is a fortified complex in the centre of Moscow founded by the Rurikids ruling dynasty."><span data-dcnode-id="4980" instrument_node="">Kremlin</span></a><span data-dcnode-id="4978" instrument_node=""> and replaced with the </span><a data-dcnode-id="4976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Flag_of_Russia/" title="The flag of Russia is a tricolour flag consisting of three equal horizontal fields: white on the top, blue in the middle, ..."><span data-dcnode-id="4977" instrument_node="">Russian tricolour flag</span></a><span data-dcnode-id="4975" instrument_node="">. The following day, the </span><a data-dcnode-id="4973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Supreme_Soviet/" title="The Supreme Soviet was the common name for the legislative bodies of the Soviet socialist republic s in the Union of ..."><span data-dcnode-id="4974" instrument_node="">Supreme Soviet</span></a><span data-dcnode-id="4972" instrument_node="">'s upper chamber, the Soviet of the Republics </span><a data-dcnode-id="4970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Dissolution_%28law%29/" title="Dissolution is any of several legal events that terminate a legal entity or agreement such as a marriage, adoption, ..."><span data-dcnode-id="4971" instrument_node="">formally dissolved</span></a><span data-dcnode-id="4969" instrument_node=""> the Union.</span><sup data-dcnode-id="4966"><a data-dcnode-id="4967" href="#Ref-1"><span data-dcnode-id="4968" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4965" instrument_node=""> </span><sup data-dcnode-id="4962"><a data-dcnode-id="4963" href="#Ref-2"><span data-dcnode-id="4964" instrument_node="">[2]</span></a></sup></p><span data-dcnode-id="4960" instrument_node="">
</span><p data-dcnode-id="4919"><span data-dcnode-id="4959" instrument_node="">In the </span><a data-dcnode-id="4957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Post%25E2%2580%2593Cold_War_era/"><span data-dcnode-id="4958" instrument_node="">aftermath of the Cold War</span></a><span data-dcnode-id="4956" instrument_node="">, several of the </span><a data-dcnode-id="4954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Post-Soviet_states/"><span data-dcnode-id="4955" instrument_node="">former Soviet republics</span></a><span data-dcnode-id="4953" instrument_node=""> have retained close links with Russia and formed </span><a data-dcnode-id="4951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Multilateralism/" title="Multilateralism was defined by Miles Kahler as &quot;international governance&quot; or global governance of the &quot;many,&quot; and its ..."><span data-dcnode-id="4952" instrument_node="">multilateral</span></a><span data-dcnode-id="4950" instrument_node=""> organizations such as </span><a data-dcnode-id="4948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Collective_Security_Treaty_Organization/" title="The Collective Security Treaty Organization is an intergovernmental military alliance in Eurasia."><span data-dcnode-id="4949" instrument_node="">CSTO</span></a><span data-dcnode-id="4947" instrument_node="">, the CIS, the </span><a data-dcnode-id="4945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Eurasian_Economic_Community/" title="The Eurasian Economic Community was a regional organisation between 2000 and 2014 which aimed for the economic integration ..."><span data-dcnode-id="4946" instrument_node="">Eurasian Economic Community</span></a><span data-dcnode-id="4944" instrument_node="">, the </span><a data-dcnode-id="4942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Union_State/" title="The Union State is based on a previous international treaty between Russia and Belarus made on 2 April 1997."><span data-dcnode-id="4943" instrument_node="">Union State</span></a><span data-dcnode-id="4941" instrument_node="">, the </span><a data-dcnode-id="4939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Eurasian_Customs_Union/" title="The Eurasian Customs Union was a customs union consisting of all the member states of the Eurasian Economic Union."><span data-dcnode-id="4940" instrument_node="">Eurasian Customs Union</span></a><span data-dcnode-id="4938" instrument_node="">, and the </span><a data-dcnode-id="4936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Eurasian_Economic_Union/" title="The Eurasian Economic Union is an economic union of post-Soviet states located in Eastern Europe, Western Asia and Central Asia."><span data-dcnode-id="4937" instrument_node="">Eurasian Economic Union</span></a><span data-dcnode-id="4935" instrument_node="">, for economic and military cooperation. On the other hand, the </span><a data-dcnode-id="4933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Baltic_states/" title="The Baltic states is a modern unofficial geopolitical term, typically used to group three countries: Estonia, Latvia and ..."><span data-dcnode-id="4934" instrument_node="">Baltic states</span></a><span data-dcnode-id="4932" instrument_node=""> and most of the former </span><a data-dcnode-id="4930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Warsaw_Pact/" title="The Warsaw Pact was the military complement to the Council for Mutual Economic Assistance, the regional economic ..."><span data-dcnode-id="4931" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="4929" instrument_node=""> states became part of the </span><a data-dcnode-id="4927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/European_Union/" title="The European Union is a political and economic union of member states that are located primarily in Europe."><span data-dcnode-id="4928" instrument_node="">European Union</span></a><span data-dcnode-id="4926" instrument_node=""> and joined </span><a data-dcnode-id="4924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/NATO/" title="NATO was established during the Cold War in response to the threat posed by the Soviet Union."><span data-dcnode-id="4925" instrument_node="">NATO</span></a><span data-dcnode-id="4923" instrument_node="">, while some of the other former Soviet republics like Ukraine, Georgia and </span><a data-dcnode-id="4921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Moldova/" title="Moldova is a country in Eastern Europe."><span data-dcnode-id="4922" instrument_node="">Moldova</span></a><span data-dcnode-id="4920" instrument_node=""> have been publicly expressing interest in following the same path since the 1990s.</span></p><span data-dcnode-id="4918" instrument_node="">
</span><h2 data-dcnode-id="4916"><span data-dcnode-id="4917" instrument_node="">Background</span></h2><span data-dcnode-id="4915" instrument_node="">
</span><h3 data-dcnode-id="4913"><span data-dcnode-id="4914" instrument_node="">1985: Gorbachev elected </span></h3><span data-dcnode-id="4912" instrument_node="">
</span><p data-dcnode-id="4904"><span data-dcnode-id="4911" instrument_node="">See also: </span><a data-dcnode-id="4909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Glasnost/" title="Glasnost is included in the English dictionary."><span data-dcnode-id="4910" instrument_node="">Glasnost</span></a><span data-dcnode-id="4908" instrument_node=""> and </span><a data-dcnode-id="4906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Perestroika/" title="Perestroika was a political movement for reform within the Communist Party of the Soviet Union during the late 1980s widely ..."><span data-dcnode-id="4907" instrument_node="">Perestroika</span></a><span data-dcnode-id="4905" instrument_node="">.</span></p><span data-dcnode-id="4903" instrument_node="">
</span><p data-dcnode-id="4828"><a data-dcnode-id="4901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Mikhail_Gorbachev/"><span data-dcnode-id="4902" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="4900" instrument_node=""> was elected </span><a data-dcnode-id="4898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/General_Secretary_of_the_Communist_Party_of_the_Soviet_Union/"><span data-dcnode-id="4899" instrument_node="">General Secretary</span></a><span data-dcnode-id="4897" instrument_node=""> by the </span><a data-dcnode-id="4895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Politburo_of_the_Central_Committee_of_the_Communist_Party_of_the_Soviet_Union/"><span data-dcnode-id="4896" instrument_node="">Politburo</span></a><span data-dcnode-id="4894" instrument_node=""> on March 11, 1985, just over four hours after predecessor </span><a data-dcnode-id="4892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Konstantin_Chernenko/"><span data-dcnode-id="4893" instrument_node="">Konstantin Chernenko</span></a><span data-dcnode-id="4891" instrument_node="">'s death at 73.</span><sup data-dcnode-id="4888"><a data-dcnode-id="4889" href="#Ref-3"><span data-dcnode-id="4890" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4887" instrument_node=""> Gorbachev, aged 54, was the youngest member of the Politburo. His initial goal as general secretary was to revive the stagnating </span><a data-dcnode-id="4885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Soviet_economy/" title="The economy of the Soviet Union was based on state ownership of the means of production, collective farming, and industrial ..."><span data-dcnode-id="4886" instrument_node="">Soviet economy</span></a><span data-dcnode-id="4884" instrument_node="">, and he realized that doing so would require reforming underlying political and social structures.</span><sup data-dcnode-id="4881"><a data-dcnode-id="4882" href="#Ref-4"><span data-dcnode-id="4883" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4880" instrument_node=""> The reforms began with personnel changes of senior </span><a data-dcnode-id="4878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Era_of_Stagnation/" title="The Era of Stagnation is a term coined by Mikhail Gorbachev in order to describe the negative way in which he viewed the ..."><span data-dcnode-id="4879" instrument_node="">Brezhnev-era</span></a><span data-dcnode-id="4877" instrument_node=""> officials who would impede political and economic change.</span><sup data-dcnode-id="4874"><a data-dcnode-id="4875" href="#Ref-5"><span data-dcnode-id="4876" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4873" instrument_node=""> On April 23, 1985, Gorbachev brought two protégés, </span><a data-dcnode-id="4871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Yegor_Ligachev/"><span data-dcnode-id="4872" instrument_node="">Yegor Ligachev</span></a><span data-dcnode-id="4870" instrument_node=""> and </span><a data-dcnode-id="4868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Nikolai_Ryzhkov/"><span data-dcnode-id="4869" instrument_node="">Nikolai Ryzhkov</span></a><span data-dcnode-id="4867" instrument_node="">, into the Politburo as full members. He kept the "power" ministries happy by promoting KGB Chief </span><a data-dcnode-id="4865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Viktor_Chebrikov/"><span data-dcnode-id="4866" instrument_node="">Viktor Chebrikov</span></a><span data-dcnode-id="4864" instrument_node=""> from candidate to full member and appointing Minister of Defence Marshal </span><a data-dcnode-id="4862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Sergei_Sokolov_%28Marshal%29/"><span data-dcnode-id="4863" instrument_node="">Sergei Sokolov</span></a><span data-dcnode-id="4861" instrument_node=""> as a Politburo candidate.That </span><a data-dcnode-id="4859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/liberalization/" title="Liberalization is a broad term that refers to the practice of making laws, systems, or opinions less severe, usually in the ..."><span data-dcnode-id="4860" instrument_node="">liberalization</span></a><span data-dcnode-id="4858" instrument_node="">, however, fostered nationalist movements and ethnic disputes within the Soviet Union.</span><sup data-dcnode-id="4855"><a data-dcnode-id="4856" href="#Ref-6"><span data-dcnode-id="4857" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4854" instrument_node=""> It also led indirectly to the </span><a data-dcnode-id="4852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/revolutions_of_1989/" title="The Revolutions of 1989 is often also called the Fall of Communism, and sometimes the Fall of Nations or the Autumn of ..."><span data-dcnode-id="4853" instrument_node="">revolutions of 1989</span></a><span data-dcnode-id="4851" instrument_node=""> in which Soviet-imposed socialist regimes of the </span><a data-dcnode-id="4849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Warsaw_Pact/" title="The Warsaw Pact was the military complement to the Council for Mutual Economic Assistance, the regional economic ..."><span data-dcnode-id="4850" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="4848" instrument_node=""> were toppled peacefully (</span><a data-dcnode-id="4846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Romanian_Revolution/" title="The Romanian Revolution was a period of violent civil unrest in Romania during December 1989 as a part of the Revolutions of ..."><span data-dcnode-id="4847" instrument_node="">with the notable exception of Romania</span></a><span data-dcnode-id="4845" instrument_node="">),</span><sup data-dcnode-id="4842"><a data-dcnode-id="4843" href="#Ref-7"><span data-dcnode-id="4844" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4841" instrument_node=""> which in turn increased pressure on Gorbachev to introduce greater democracy and autonomy for the Soviet Union's constituent republics. Under Gorbachev's leadership, the </span><a data-dcnode-id="4839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Communist_Party_of_the_Soviet_Union/" title="The Communist Party of the Soviet Union was the founding and ruling party of the Soviet Union."><span data-dcnode-id="4840" instrument_node="">Communist Party of the Soviet Union</span></a><span data-dcnode-id="4838" instrument_node=""> (CPSU) in 1989 introduced limited competitive elections to a new central legislature, the </span><a data-dcnode-id="4836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Congress_of_People%2527s_Deputies_of_the_Soviet_Union/" title="The Congress of People's Deputies of the Soviet Union was the highest body of state authority of the Soviet Union from 1989 ..."><span data-dcnode-id="4837" instrument_node="">Congress of People's Deputies</span></a><sup data-dcnode-id="4833"><a data-dcnode-id="4834" href="#Ref-8"><span data-dcnode-id="4835" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4832" instrument_node=""> (although the ban on other political parties was not lifted until 1990).</span><sup data-dcnode-id="4829"><a data-dcnode-id="4830" href="#Ref-9"><span data-dcnode-id="4831" instrument_node="">[9]</span></a></sup></p><span data-dcnode-id="4827" instrument_node="">
</span><p data-dcnode-id="4810"><span data-dcnode-id="4826" instrument_node="">On July 1, 1985, Gorbachev sidelined his main rival by removing </span><a data-dcnode-id="4824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Grigory_Romanov/"><span data-dcnode-id="4825" instrument_node="">Grigory Romanov</span></a><span data-dcnode-id="4823" instrument_node=""> from the Politburo and brought </span><a data-dcnode-id="4821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Boris_Yeltsin/"><span data-dcnode-id="4822" instrument_node="">Boris Yeltsin</span></a><span data-dcnode-id="4820" instrument_node=""> into the </span><a data-dcnode-id="4818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Secretariat_of_the_Central_Committee_of_the_Communist_Party_of_the_Soviet_Union/"><span data-dcnode-id="4819" instrument_node="">Central Committee Secretariat</span></a><span data-dcnode-id="4817" instrument_node="">. On December 23, 1985, Gorbachev appointed Yeltsin </span><a data-dcnode-id="4815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/First_Secretary_of_the_Moscow_Communist_Party/" title="The Moscow City Committee of the Communist Party of the Soviet Union was the position of highest authority in the city of ..."><span data-dcnode-id="4816" instrument_node="">First Secretary of the Moscow Communist Party</span></a><span data-dcnode-id="4814" instrument_node=""> replacing </span><a data-dcnode-id="4812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Viktor_Grishin/"><span data-dcnode-id="4813" instrument_node="">Viktor Grishin</span></a><span data-dcnode-id="4811" instrument_node="">.</span></p><span data-dcnode-id="4809" instrument_node="">
</span><h3 data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">1986: Sakharov returns </span></h3><span data-dcnode-id="4806" instrument_node="">
</span><p data-dcnode-id="4789"><span data-dcnode-id="4805" instrument_node="">Gorbachev continued to press for greater </span><a data-dcnode-id="4803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Liberalization/" title="Liberalization is a broad term that refers to the practice of making laws, systems, or opinions less severe, usually in the ..."><span data-dcnode-id="4804" instrument_node="">liberalisation</span></a><span data-dcnode-id="4802" instrument_node="">. On December 23, 1986, the most prominent </span><a data-dcnode-id="4800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Soviet_dissidents/" title="Soviet dissidents was used in the Soviet Union in the period from the mid-1960s until the fall of communism."><span data-dcnode-id="4801" instrument_node="">Soviet dissident</span></a><span data-dcnode-id="4799" instrument_node="">, </span><a data-dcnode-id="4797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Andrei_Sakharov/"><span data-dcnode-id="4798" instrument_node="">Andrei Sakharov</span></a><span data-dcnode-id="4796" instrument_node="">, returned to Moscow shortly after receiving a personal telephone call from Gorbachev telling him that after almost seven years his internal </span><a data-dcnode-id="4794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/exile/" title="Exile is primarily penal expulsion from one's native country, and secondarily expatriation or prolonged absence from one's ..."><span data-dcnode-id="4795" instrument_node="">exile</span></a><span data-dcnode-id="4793" instrument_node=""> for defying the authorities was over.</span><sup data-dcnode-id="4790"><a data-dcnode-id="4791" href="#Ref-10"><span data-dcnode-id="4792" instrument_node="">[10]</span></a></sup></p><span data-dcnode-id="4788" instrument_node="">
</span><h3 data-dcnode-id="4786"><span data-dcnode-id="4787" instrument_node="">1987: One-party democracy </span></h3><span data-dcnode-id="4785" instrument_node="">
</span><p data-dcnode-id="4776"><span data-dcnode-id="4784" instrument_node="">At the January 28–30, 1987, Central Committee </span><a data-dcnode-id="4782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Plenary_session/" title="A plenary session is a session of a conference which all members of all parties are to attend."><span data-dcnode-id="4783" instrument_node="">plenum</span></a><span data-dcnode-id="4781" instrument_node="">, Gorbachev suggested a new policy of </span><a data-dcnode-id="4778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Demokratizatsiya_%28Soviet_Union%29/" title="Demokratizatsiya was a slogan introduced by Soviet Communist Party General Secretary Mikhail Gorbachev in January 1987 ..."><i data-dcnode-id="4779"><span data-dcnode-id="4780" instrument_node="">demokratizatsiya</span></i></a><span data-dcnode-id="4777" instrument_node=""> throughout Soviet society. He proposed that future Communist Party elections should offer a choice between multiple candidates, elected by secret ballot. However, the party delegates at the Plenum watered down Gorbachev's proposal, and democratic choice within the Communist Party was never significantly implemented.</span></p><span data-dcnode-id="4775" instrument_node="">
</span><p data-dcnode-id="4769"><span data-dcnode-id="4774" instrument_node="">Gorbachev also radically expanded the scope of </span><i data-dcnode-id="4771"><a data-dcnode-id="4772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/glasnost/" title="Glasnost is included in the English dictionary."><span data-dcnode-id="4773" instrument_node="">glasnost</span></a></i><span data-dcnode-id="4770" instrument_node=""> and stated that no subject was off limits for open discussion in the media.</span></p><span data-dcnode-id="4768" instrument_node="">
</span><p data-dcnode-id="4760"><span data-dcnode-id="4767" instrument_node="">On February 7, 1987, dozens of political prisoners were freed in the first group release since the </span><a data-dcnode-id="4765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Khrushchev_Thaw/" title="The Khrushchev Thaw is the period from the mid-1950s to the mid-1960s when repression and censorship in the Soviet Union ..."><span data-dcnode-id="4766" instrument_node="">Khrushchev Thaw</span></a><span data-dcnode-id="4764" instrument_node=""> in the mid-1950s.</span><sup data-dcnode-id="4761"><a data-dcnode-id="4762" href="#Ref-11"><span data-dcnode-id="4763" instrument_node="">[11]</span></a></sup></p><span data-dcnode-id="4759" instrument_node="">
</span><p data-dcnode-id="4735"><span data-dcnode-id="4758" instrument_node="">On September 10, 1987, </span><a data-dcnode-id="4756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Boris_Yeltsin/"><span data-dcnode-id="4757" instrument_node="">Boris Yeltsin</span></a><span data-dcnode-id="4755" instrument_node=""> wrote a letter of resignation to Gorbachev.</span><sup data-dcnode-id="4752"><a data-dcnode-id="4753" href="#Ref-12"><span data-dcnode-id="4754" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4751" instrument_node=""> At the October 27, 1987, plenary meeting of the Central Committee, Yeltsin, frustrated that Gorbachev had not addressed any of the issues outlined in his resignation letter, criticized the slow pace of reform and servility to the general secretary.</span><sup data-dcnode-id="4748"><a data-dcnode-id="4749" href="#Ref-13"><span data-dcnode-id="4750" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4747" instrument_node=""> In his reply, Gorbachev accused Yeltsin of "political immaturity" and "absolute irresponsibility". Nevertheless, news of Yeltsin's insubordination and "secret speech" spread, and soon </span><i data-dcnode-id="4744"><a data-dcnode-id="4745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/samizdat/" title="Samizdat was a form of dissident activity across the socialist Eastern Bloc in which individuals reproduced censored and ..."><span data-dcnode-id="4746" instrument_node="">samizdat</span></a></i><span data-dcnode-id="4743" instrument_node=""> versions began to circulate. That marked the beginning of Yeltsin's rebranding as a rebel and rise in popularity as an anti-establishment figure. The following four years of political struggle between Yeltsin and Gorbachev played a large role in the dissolution of the Soviet Union.</span><sup data-dcnode-id="4740"><a data-dcnode-id="4741" href="#Ref-14"><span data-dcnode-id="4742" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4739" instrument_node=""> On November 11, 1987, Yeltsin was fired from the post of </span><a data-dcnode-id="4737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/First_Secretary_of_the_Moscow_Communist_Party/" title="The Moscow City Committee of the Communist Party of the Soviet Union was the position of highest authority in the city of ..."><span data-dcnode-id="4738" instrument_node="">First Secretary of the Moscow Communist Party</span></a><span data-dcnode-id="4736" instrument_node="">.</span></p><span data-dcnode-id="4734" instrument_node="">
</span><h3 data-dcnode-id="4732"><span data-dcnode-id="4733" instrument_node="">Protest activity </span></h3><span data-dcnode-id="4731" instrument_node="">
</span><p data-dcnode-id="4729"><span data-dcnode-id="4730" instrument_node="">In the years leading up to the dissolution, various protests and resistance movements occurred or took hold throughout the Soviet Union, which were variously suppressed or tolerated.</span></p><span data-dcnode-id="4728" instrument_node="">
</span><p data-dcnode-id="4708"><span data-dcnode-id="4727" instrument_node="">The CTAG (Latvian: </span><i data-dcnode-id="4725"><span data-dcnode-id="4726" instrument_node="">Cilvēktiesību aizstāvības grupa|lit=Human Rights Defense Group|label=</span></i><span data-dcnode-id="4724" instrument_node="">) </span><a data-dcnode-id="4722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Helsinki-86/" title="The Helsinki-86 was founded in July, 1986 in the Latvia n port town of Liepāja by three workers: Linards Grantiņš, Raimonds ..."><span data-dcnode-id="4723" instrument_node="">Helsinki-86</span></a><span data-dcnode-id="4721" instrument_node=""> was founded in July 1986 in the </span><a data-dcnode-id="4719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Latvia/" title="Latvia is a country in the Baltic region of Northern Europe."><span data-dcnode-id="4720" instrument_node="">Latvia</span></a><span data-dcnode-id="4718" instrument_node="">n port town of </span><a data-dcnode-id="4716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Liep%25C4%2581ja/" title="Liepāja is a city in western Latvia, located on the Baltic Sea."><span data-dcnode-id="4717" instrument_node="">Liepāja</span></a><span data-dcnode-id="4715" instrument_node="">. Helsinki-86 was the first openly </span><a data-dcnode-id="4713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Anti-communism/" title="Anti-communism is political and ideological opposition to communism."><span data-dcnode-id="4714" instrument_node="">anti-Communist</span></a><span data-dcnode-id="4712" instrument_node=""> organization in the U.S.S.R., and the first openly organized opposition to the Soviet regime, setting an example for other ethnic minorities' pro-independence movements.</span><sup data-dcnode-id="4709"><a data-dcnode-id="4710" href="#Ref-15"><span data-dcnode-id="4711" instrument_node="">[15]</span></a></sup></p><span data-dcnode-id="4707" instrument_node="">
</span><p data-dcnode-id="4702"><span data-dcnode-id="4706" instrument_node="">On December 26, 1986, 300 Latvian youths gathered in Riga's Cathedral Square and marched down Lenin Avenue toward the </span><a data-dcnode-id="4704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Freedom_Monument/" title="The Freedom Monument is located in Riga, Latvia, honouring soldiers killed during the Latvian War of Independence."><span data-dcnode-id="4705" instrument_node="">Freedom Monument</span></a><span data-dcnode-id="4703" instrument_node="">, shouting, "Soviet Russia out! Free Latvia!" Security forces confronted the marchers, and several police vehicles were overturned.</span></p><span data-dcnode-id="4701" instrument_node="">
</span><p data-dcnode-id="4667"><span data-dcnode-id="4700" instrument_node="">The </span><i data-dcnode-id="4697"><a data-dcnode-id="4698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Jeltoqsan/"><span data-dcnode-id="4699" instrument_node="">Jeltoqsan</span></a></i><span data-dcnode-id="4696" instrument_node=""> ('December') of 1986 were riots in </span><a data-dcnode-id="4694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Almaty/" title="Almaty is the largest city in Kazakhstan, with a population of about 2 million."><span data-dcnode-id="4695" instrument_node="">Alma-Ata</span></a><span data-dcnode-id="4693" instrument_node="">, </span><a data-dcnode-id="4691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kazakh_Soviet_Socialist_Republic/" title="The Kazakh Soviet Socialist Republic was one of the transcontinental constituent republics of the Soviet Union from 1936 to ..."><span data-dcnode-id="4692" instrument_node="">Kazakhstan</span></a><span data-dcnode-id="4690" instrument_node="">, sparked by Gorbachev's dismissal of </span><a data-dcnode-id="4688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Dinmukhamed_Kunaev/"><span data-dcnode-id="4689" instrument_node="">Dinmukhamed Kunaev</span></a><span data-dcnode-id="4687" instrument_node="">, the First Secretary of the </span><a data-dcnode-id="4685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Communist_Party_of_Kazakhstan/" title="The Communist Party of Kazakhstan is a banned political party in Kazakhstan."><span data-dcnode-id="4686" instrument_node="">Communist Party of Kazakhstan</span></a><span data-dcnode-id="4684" instrument_node=""> and an </span><a data-dcnode-id="4682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kazakhs/"><span data-dcnode-id="4683" instrument_node="">ethnic Kazakh</span></a><span data-dcnode-id="4681" instrument_node="">, who was replaced with </span><a data-dcnode-id="4679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Gennady_Kolbin/"><span data-dcnode-id="4680" instrument_node="">Gennady Kolbin</span></a><span data-dcnode-id="4678" instrument_node="">, an outsider from the </span><a data-dcnode-id="4676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russian_SFSR/" title="The Russian Soviet Federative Socialist Republic was an independent federal socialist state from 1917 to 1922, and ..."><span data-dcnode-id="4677" instrument_node="">Russian SFSR</span></a><span data-dcnode-id="4675" instrument_node="">.</span><sup data-dcnode-id="4672"><a data-dcnode-id="4673" href="#Ref-16"><span data-dcnode-id="4674" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4671" instrument_node=""> Demonstrations started in the morning of December 17, 1986, with 200 to 300 students in front of the Central Committee building on </span><a data-dcnode-id="4669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Brezhnev_Square/"><span data-dcnode-id="4670" instrument_node="">Brezhnev Square</span></a><span data-dcnode-id="4668" instrument_node="">. On the next day, December 18, protests turned into civil unrest as clashes between troops, volunteers, militia units, and Kazakh students turned into a wide-scale confrontation. The clashes could only be controlled on the third day.</span></p><span data-dcnode-id="4666" instrument_node="">
</span><p data-dcnode-id="4658"><span data-dcnode-id="4665" instrument_node="">On May 6, 1987, </span><a data-dcnode-id="4663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Pamyat/" title="The Pamyat was a neo-Nazi and ultranationalist organization that identified itself as the &quot;People's National-Patriotic ..."><span data-dcnode-id="4664" instrument_node="">Pamyat</span></a><span data-dcnode-id="4662" instrument_node="">, a Russian nationalist group, held an unsanctioned demonstration in Moscow. The authorities did not break up the demonstration and even kept traffic out of the demonstrators' way while they marched to an impromptu meeting with Boris Yeltsin.</span><sup data-dcnode-id="4659"><a data-dcnode-id="4660" href="#Ref-17"><span data-dcnode-id="4661" instrument_node="">[17]</span></a></sup></p><span data-dcnode-id="4657" instrument_node="">
</span><p data-dcnode-id="4643"><span data-dcnode-id="4656" instrument_node="">On July 25, 1987, 300 </span><a data-dcnode-id="4654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Crimean_Tatars/"><span data-dcnode-id="4655" instrument_node="">Crimean Tatars</span></a><span data-dcnode-id="4653" instrument_node=""> staged a noisy demonstration near the </span><a data-dcnode-id="4651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Moscow_Kremlin_Wall/" title="The Moscow Kremlin Wall is a defensive wall that surrounds the Moscow Kremlin, recognisable by the characteristic notches ..."><span data-dcnode-id="4652" instrument_node="">Kremlin Wall</span></a><span data-dcnode-id="4650" instrument_node=""> for several hours, calling for the right to return to their homeland, from which they were </span><a data-dcnode-id="4648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Deportation_of_the_Crimean_Tatars/" title="The deportation of the Crimean Tatars was the ethnic cleansing and cultural genocide of at least 191,044 Crimean Tatars in ..."><span data-dcnode-id="4649" instrument_node="">deported</span></a><span data-dcnode-id="4647" instrument_node=""> in 1944; police and soldiers looked on.</span><sup data-dcnode-id="4644"><a data-dcnode-id="4645" href="#Ref-18"><span data-dcnode-id="4646" instrument_node="">[18]</span></a></sup></p><span data-dcnode-id="4642" instrument_node="">
</span><p data-dcnode-id="4634"><span data-dcnode-id="4641" instrument_node="">On August 23, 1987, the 48th anniversary of the secret protocols of the 1939 </span><a data-dcnode-id="4639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Molotov_Pact/" title="The Molotov–Ribbentrop Pact was a non-aggression pact between Nazi Germany and the Soviet Union that enabled those two ..."><span data-dcnode-id="4640" instrument_node="">Molotov Pact</span></a><span data-dcnode-id="4638" instrument_node="">, thousands of demonstrators marked the occasion in the three Baltic capitals to sing independence songs and attend speeches commemorating Stalin's victims. The gatherings were sharply denounced in the official press and closely watched by the police but were not interrupted.</span><sup data-dcnode-id="4635"><a data-dcnode-id="4636" href="#Ref-19"><span data-dcnode-id="4637" instrument_node="">[19]</span></a></sup></p><span data-dcnode-id="4633" instrument_node="">
</span><p data-dcnode-id="4622"><span data-dcnode-id="4632" instrument_node="">On June 14, 1987, about 5,000 people gathered again at Freedom Monument in </span><a data-dcnode-id="4630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Riga/" title="Riga is the capital of Latvia and is home to 614,618 inhabitants, which is a third of Latvia's population."><span data-dcnode-id="4631" instrument_node="">Riga</span></a><span data-dcnode-id="4629" instrument_node="">, and laid flowers to commemorate the anniversary of Stalin's </span><a data-dcnode-id="4627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Population_transfer_in_the_Soviet_Union/"><span data-dcnode-id="4628" instrument_node="">mass deportation</span></a><span data-dcnode-id="4626" instrument_node=""> of Latvians in 1941. The authorities did not crack down on demonstrators, which encouraged more and larger demonstrations throughout the Baltic States. On November 18, 1987, hundreds of police and civilian militiamen cordoned off the central square to prevent any demonstration at Freedom Monument, but thousands lined the streets of Riga in silent protest regardless.</span><sup data-dcnode-id="4623"><a data-dcnode-id="4624" href="#Ref-20"><span data-dcnode-id="4625" instrument_node="">[20]</span></a></sup></p><span data-dcnode-id="4621" instrument_node="">
</span><p data-dcnode-id="4597"><span data-dcnode-id="4620" instrument_node="">On October 17, 1987, about 3,000 Armenians demonstrated in </span><a data-dcnode-id="4618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Yerevan/" title="Yerevan is the capital and largest city of Armenia and one of the world's oldest continuously inhabited cities."><span data-dcnode-id="4619" instrument_node="">Yerevan</span></a><span data-dcnode-id="4617" instrument_node=""> complaining about the condition of </span><a data-dcnode-id="4615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Lake_Sevan/" title="Lake Sevan is the largest body of water in both Armenia and the Caucasus region."><span data-dcnode-id="4616" instrument_node="">Lake Sevan</span></a><span data-dcnode-id="4614" instrument_node="">, the Nairit chemicals plant, and the </span><a data-dcnode-id="4612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Metsamor_Nuclear_Power_Plant/" title="The Armenian Nuclear Power Plant is the only nuclear power plant in the South Caucasus, located 36 kilometers west of ..."><span data-dcnode-id="4613" instrument_node="">Metsamor Nuclear Power Plant</span></a><span data-dcnode-id="4611" instrument_node="">, and air pollution in Yerevan. Police tried to prevent the protest but took no action to stop it once the march was underway.</span><sup data-dcnode-id="4608"><a data-dcnode-id="4609" href="#Ref-21"><span data-dcnode-id="4610" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4607" instrument_node=""> The following day 1,000 Armenians participated in another demonstration calling for Armenian national rights in </span><a data-dcnode-id="4605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Karabakh/" title="Karabakh is a geographic region in present-day southwestern Azerbaijan and eastern Armenia, extending from the highland s of ..."><span data-dcnode-id="4606" instrument_node="">Karabakh</span></a><span data-dcnode-id="4604" instrument_node=""> and the annexation of </span><a data-dcnode-id="4602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Nakhchivan_Autonomous_Republic/" title="The Nakhchivan Autonomous Republic is a landlocked exclave of the Republic of Azerbaijan."><span data-dcnode-id="4603" instrument_node="">Nakhchivan</span></a><span data-dcnode-id="4601" instrument_node=""> and </span><a data-dcnode-id="4599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Nagorno-Karabakh/" title="Nagorno-Karabakh is a landlocked region in the South Caucasus, within the mountainous range of Karabakh, lying between Lower ..."><span data-dcnode-id="4600" instrument_node="">Nagorno-Karabakh</span></a><span data-dcnode-id="4598" instrument_node=""> to Armenia. The police tried to physically prevent the march and after a few incidents, dispersed the demonstrators.</span></p><span data-dcnode-id="4596" instrument_node="">
</span><h2 data-dcnode-id="4594"><span data-dcnode-id="4595" instrument_node="">Timeline</span></h2><span data-dcnode-id="4593" instrument_node="">
</span><h3 data-dcnode-id="4591"><span data-dcnode-id="4592" instrument_node="">1988 </span></h3><span data-dcnode-id="4590" instrument_node="">
</span><h4 data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">Moscow loses control </span></h4><span data-dcnode-id="4587" instrument_node="">
</span><p data-dcnode-id="4582"><span data-dcnode-id="4586" instrument_node="">See main article: </span><a data-dcnode-id="4584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Parade_of_sovereignties/" title="The parade of sovereignties was a series of declarations of sovereignty of various degree by the Soviet republics in the ..."><span data-dcnode-id="4585" instrument_node="">Parade of sovereignties</span></a><span data-dcnode-id="4583" instrument_node="">. In 1988, Gorbachev started to lose control of two regions of the Soviet Union, as the Baltic republics were now leaning towards independence, and the Caucasus descended into violence and civil war.</span></p><span data-dcnode-id="4581" instrument_node="">
</span><p data-dcnode-id="4566"><span data-dcnode-id="4580" instrument_node="">On July 1, 1988, the fourth and last day of a bruising 19th Party Conference, Gorbachev won the backing of the tired delegates for his last-minute proposal to create a new supreme legislative body called the </span><a data-dcnode-id="4578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Congress_of_People%2527s_Deputies_of_the_Soviet_Union/" title="The Congress of People's Deputies of the Soviet Union was the highest body of state authority of the Soviet Union from 1989 ..."><span data-dcnode-id="4579" instrument_node="">Congress of People's Deputies</span></a><span data-dcnode-id="4577" instrument_node="">. Frustrated by the old guard's resistance, Gorbachev embarked on a set of constitutional changes to attempt separation of party and state, thereby isolating his conservative Party opponents. Detailed proposals for the new Congress of People's Deputies were published on October 2, 1988,</span><sup data-dcnode-id="4574"><a data-dcnode-id="4575" href="#Ref-22"><span data-dcnode-id="4576" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4573" instrument_node=""> and to enable the creation of the new legislature. The Supreme Soviet, during its November 29 – December 1, 1988, session, implemented amendments to the </span><a data-dcnode-id="4571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1977_Soviet_Constitution/" title="The 1977 Constitution of the Soviet Union was the constitution of the Soviet Union adopted on 7 October 1977."><span data-dcnode-id="4572" instrument_node="">1977 Soviet Constitution</span></a><span data-dcnode-id="4570" instrument_node="">, enacted a law on electoral reform, and set the date of the election for March 26, 1989.</span><sup data-dcnode-id="4567"><a data-dcnode-id="4568" href="#Ref-23"><span data-dcnode-id="4569" instrument_node="">[23]</span></a></sup></p><span data-dcnode-id="4565" instrument_node="">
</span><p data-dcnode-id="4560"><span data-dcnode-id="4564" instrument_node="">On November 29, 1988, the Soviet Union ceased to jam all foreign radio stations, allowing Soviet citizens – for the first time since a brief period in the 1960s – to have unrestricted access to news sources beyond Communist Party control.</span><sup data-dcnode-id="4561"><a data-dcnode-id="4562" href="#Ref-24"><span data-dcnode-id="4563" instrument_node="">[24]</span></a></sup></p><span data-dcnode-id="4559" instrument_node="">
</span><h4 data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">Baltic republics </span></h4><span data-dcnode-id="4556" instrument_node="">
</span><p data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">In 1986 and 1987, Latvia had been in the vanguard of the Baltic states in pressing for reform. In 1988 Estonia took over the lead role with the foundation of the Soviet Union's first popular front and starting to influence state policy.</span></p><span data-dcnode-id="4553" instrument_node="">
</span><p data-dcnode-id="4532"><span data-dcnode-id="4552" instrument_node="">The </span><a data-dcnode-id="4550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Estonian_Popular_Front/" title="The Popular Front of Estonia was a political organisation in Estonia in the late 1980s and early 1990s."><span data-dcnode-id="4551" instrument_node="">Estonian Popular Front</span></a><span data-dcnode-id="4549" instrument_node=""> was founded in April 1988. On June 16, 1988, Gorbachev replaced </span><a data-dcnode-id="4547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Karl_Vaino/"><span data-dcnode-id="4548" instrument_node="">Karl Vaino</span></a><span data-dcnode-id="4546" instrument_node="">, the "old guard" leader of the </span><a data-dcnode-id="4544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Communist_Party_of_Estonia/" title="The Communist Party of Estonia was a political party in Estonia."><span data-dcnode-id="4545" instrument_node="">Communist Party of Estonia</span></a><span data-dcnode-id="4543" instrument_node="">, with the comparatively liberal </span><a data-dcnode-id="4541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Vaino_V%25C3%25A4ljas/" title="Vaino Väljas is a former Soviet and Estonia n politician."><span data-dcnode-id="4542" instrument_node="">Vaino Väljas</span></a><span data-dcnode-id="4540" instrument_node="">.</span><sup data-dcnode-id="4537"><a data-dcnode-id="4538" href="#Ref-25"><span data-dcnode-id="4539" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4536" instrument_node=""> In late June 1988, Väljas bowed to pressure from the Estonian Popular Front and legalized the flying of the old blue-black-white flag of Estonia, and agreed to a new state language law that made Estonian the official language of the Republic.</span><sup data-dcnode-id="4533"><a data-dcnode-id="4534" href="#Ref-26"><span data-dcnode-id="4535" instrument_node="">[26]</span></a></sup></p><span data-dcnode-id="4531" instrument_node="">
</span><p data-dcnode-id="4508"><span data-dcnode-id="4530" instrument_node="">On October 2, the Popular Front formally launched its political platform at a two-day congress. Väljas attended, gambling that the front could help Estonia become a model of economic and political revival, while moderating separatist and other radical tendencies.</span><sup data-dcnode-id="4527"><a data-dcnode-id="4528" href="#Ref-27"><span data-dcnode-id="4529" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4526" instrument_node=""> On November 16, 1988, the Supreme Soviet of the Estonian SSR adopted a declaration of national sovereignty under which Estonian laws would take precedence over those of the Soviet Union.</span><sup data-dcnode-id="4523"><a data-dcnode-id="4524" href="#Ref-28"><span data-dcnode-id="4525" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4522" instrument_node=""> Estonia's parliament also laid claim to the republic's natural resources including land, inland waters, forests, mineral deposits, and to the means of industrial production, agriculture, construction, state banks, transportation, and municipal services within the territory of Estonia's borders.</span><sup data-dcnode-id="4519"><a data-dcnode-id="4520" href="#Ref-29"><span data-dcnode-id="4521" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4518" instrument_node=""> At the same time the </span><a data-dcnode-id="4516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Estonian_Citizens%2527_Committees/"><span data-dcnode-id="4517" instrument_node="">Estonian Citizens' Committees</span></a><span data-dcnode-id="4515" instrument_node=""> started registration of citizens of the </span><a data-dcnode-id="4513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Estonia/" title="Estonia is a country in Northern Europe."><span data-dcnode-id="4514" instrument_node="">Republic of Estonia</span></a><span data-dcnode-id="4512" instrument_node=""> to carry out the elections of the </span><a data-dcnode-id="4510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Congress_of_Estonia/" title="Congress of Estonia was an innovative grassroots parliament established in Estonia as a part of the process of regaining of ..."><span data-dcnode-id="4511" instrument_node="">Congress of Estonia</span></a><span data-dcnode-id="4509" instrument_node="">.</span></p><span data-dcnode-id="4507" instrument_node="">
</span><p data-dcnode-id="4490"><span data-dcnode-id="4506" instrument_node="">The </span><a data-dcnode-id="4504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Latvian_Popular_Front/" title="The Popular Front of Latvia was a political organisation in Latvia in the late 1980s and early 1990s which led Latvia to its ..."><span data-dcnode-id="4505" instrument_node="">Latvian Popular Front</span></a><span data-dcnode-id="4503" instrument_node=""> was founded in June 1988. On October 4, Gorbachev replaced </span><a data-dcnode-id="4501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Boris_Pugo/"><span data-dcnode-id="4502" instrument_node="">Boris Pugo</span></a><span data-dcnode-id="4500" instrument_node="">, the "old guard" leader of the </span><a data-dcnode-id="4498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Communist_Party_of_Latvia/" title="The Communist Party of Latvia was a political party in Latvia."><span data-dcnode-id="4499" instrument_node="">Communist Party of Latvia</span></a><span data-dcnode-id="4497" instrument_node="">, with the more liberal Jānis Vagris. In October 1988 Vagris bowed to pressure from the Latvian Popular Front and legalized flying the former carmine red-and-white flag of independent Latvia, and on October 6 he passed a law making </span><a data-dcnode-id="4495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Latvian_language/"><span data-dcnode-id="4496" instrument_node="">Latvian</span></a><span data-dcnode-id="4494" instrument_node=""> the country's official language.</span><sup data-dcnode-id="4491"><a data-dcnode-id="4492" href="#Ref-26"><span data-dcnode-id="4493" instrument_node="">[26]</span></a></sup></p><span data-dcnode-id="4489" instrument_node="">
</span><p data-dcnode-id="4469"><span data-dcnode-id="4488" instrument_node="">The Popular Front of Lithuania, called </span><a data-dcnode-id="4486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/S%25C4%2585j%25C5%25ABdis/" title="Sąjūdis is the political organisation which led the struggle for Lithuania n independence in the late 1980s and early 1990s."><span data-dcnode-id="4487" instrument_node="">Sąjūdis</span></a><span data-dcnode-id="4485" instrument_node=""> ("Movement"), was founded in May 1988. On October 19, 1988, Gorbachev replaced </span><a data-dcnode-id="4483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ringaudas_Songaila/"><span data-dcnode-id="4484" instrument_node="">Ringaudas Songaila</span></a><span data-dcnode-id="4482" instrument_node="">, the "old guard" leader of the </span><a data-dcnode-id="4480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Communist_Party_of_Lithuania/" title="The Communist Party of Lithuania is a banned communist party in Lithuania."><span data-dcnode-id="4481" instrument_node="">Communist Party of Lithuania</span></a><span data-dcnode-id="4479" instrument_node="">, with the relatively liberal </span><a data-dcnode-id="4477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Algirdas_Mykolas_Brazauskas/"><span data-dcnode-id="4478" instrument_node="">Algirdas Mykolas Brazauskas</span></a><span data-dcnode-id="4476" instrument_node="">. In October 1988, Brazauskas bowed to pressure from Sąjūdis and legalized the flying of the historic yellow-green-red flag of independent Lithuania and in November 1988, he passed a law making </span><a data-dcnode-id="4474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Lithuanian_language/"><span data-dcnode-id="4475" instrument_node="">Lithuanian</span></a><span data-dcnode-id="4473" instrument_node=""> the country's official language; also, the former national anthem, </span><a data-dcnode-id="4471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Tauti%25C5%25A1ka_giesm%25C4%2597/" title="Tautiška giesmė is the national anthem of Lithuania, also known by its opening words &quot;Lietuva, Tėvyne mūsų&quot; and as ..."><span data-dcnode-id="4472" instrument_node="">Tautiška giesmė</span></a><span data-dcnode-id="4470" instrument_node="">, was later reinstated.</span></p><span data-dcnode-id="4468" instrument_node="">
</span><h4 data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">Rebellion in the Caucasus </span></h4><span data-dcnode-id="4465" instrument_node="">
</span><p data-dcnode-id="4426"><span data-dcnode-id="4464" instrument_node="">On February 20, 1988, after a week of growing demonstrations in </span><a data-dcnode-id="4462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Stepanakert/" title="Stepanakert is the de facto capital and the largest city of the breakaway state Republic of Artsakh, though internationally ..."><span data-dcnode-id="4463" instrument_node="">Stepanakert</span></a><span data-dcnode-id="4461" instrument_node="">, capital of the </span><a data-dcnode-id="4459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Nagorno-Karabakh_Autonomous_Oblast/" title="The Nagorno-Karabakh Autonomous Oblast was an autonomous oblast within the Azerbaijan Soviet Socialist Republic that was ..."><span data-dcnode-id="4460" instrument_node="">Nagorno-Karabakh Autonomous Oblast</span></a><span data-dcnode-id="4458" instrument_node=""> (the Armenian majority area within the </span><a data-dcnode-id="4456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Azerbaijan_Soviet_Socialist_Republic/" title="Azerbaijan Soviet Socialist Republic was one of the constituent republics of the Soviet Union between 1922 and 1991."><span data-dcnode-id="4457" instrument_node="">Azerbaijan Soviet Socialist Republic</span></a><span data-dcnode-id="4455" instrument_node="">), the Regional Soviet voted to secede and join with the </span><a data-dcnode-id="4453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Armenian_Soviet_Socialist_Republic/" title="The Armenian Soviet Socialist Republic was one of the constituent republics of the Soviet Union in December 1922 located in ..."><span data-dcnode-id="4454" instrument_node="">Soviet Socialist Republic of Armenia</span></a><span data-dcnode-id="4452" instrument_node="">.</span><sup data-dcnode-id="4449"><a data-dcnode-id="4450" href="#Ref-30"><span data-dcnode-id="4451" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4448" instrument_node=""> This local vote in a small, remote part of the Soviet Union made headlines around the world; it was an unprecedented defiance of republican and national authorities. On February 22, 1988, in what became known as the "</span><a data-dcnode-id="4446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Askeran_clash/" title="The Askeran clash was followed by the Sumgait pogrom s."><span data-dcnode-id="4447" instrument_node="">Askeran clash</span></a><span data-dcnode-id="4445" instrument_node="">", thousands of Azerbaijanis marched towards Nagorno-Karabakh, demanding information about rumors of an Azerbaijani having been killed in Stepanakert. They were informed that no such incident had occurred, but refused to believe it. Dissatisfied with what they were told, thousands began marching toward Nagorno-Karabakh, killing 50.</span><sup data-dcnode-id="4442"><a data-dcnode-id="4443" href="#Ref-31"><span data-dcnode-id="4444" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4441" instrument_node=""> </span><sup data-dcnode-id="4438"><a data-dcnode-id="4439" href="#Ref-32"><span data-dcnode-id="4440" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4437" instrument_node=""> Karabakh authorities mobilised over a thousand police to stop the march, with the resulting clashes leaving two Azerbaijanis dead. These deaths, announced on state radio, led to the Sumgait Pogrom. Between February 26 and March 1, the city of </span><a data-dcnode-id="4435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Sumgait/" title="Sumgait is the second-largest city in Azerbaijan, located near the Caspian Sea, about 31km away from the capital, Baku."><span data-dcnode-id="4436" instrument_node="">Sumgait</span></a><span data-dcnode-id="4434" instrument_node=""> (Azerbaijan) saw violent anti-Armenian rioting during which at least 32 people were killed.</span><sup data-dcnode-id="4431"><a data-dcnode-id="4432" href="#Ref-33"><span data-dcnode-id="4433" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4430" instrument_node=""> The authorities totally lost control and occupied the city with paratroopers and tanks; nearly all of the 14,000 Armenian residents of Sumgait fled.</span><sup data-dcnode-id="4427"><a data-dcnode-id="4428" href="#Ref-34"><span data-dcnode-id="4429" instrument_node="">[34]</span></a></sup></p><span data-dcnode-id="4425" instrument_node="">
</span><p data-dcnode-id="4381"><span data-dcnode-id="4424" instrument_node="">Gorbachev refused to make any changes to the status of Nagorno-Karabakh, which remained part of Azerbaijan. He instead sacked the Communist Party Leaders in both Republics – on May 21, 1988, </span><a data-dcnode-id="4422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kamran_Baghirov/" title="Kamran Baghirov was the 12th First Secretary of Azerbaijan Communist Party."><span data-dcnode-id="4423" instrument_node="">Kamran Baghirov</span></a><span data-dcnode-id="4421" instrument_node=""> was replaced by </span><a data-dcnode-id="4419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Abdulrahman_Vezirov/" title="Abdurrahman Vazirov was the 13th First Secretary of the Azerbaijan Communist Party and the leader of the Azerbaijan SSR from ..."><span data-dcnode-id="4420" instrument_node="">Abdulrahman Vezirov</span></a><span data-dcnode-id="4418" instrument_node=""> as First Secretary of the </span><a data-dcnode-id="4416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Azerbaijan_Communist_Party/" title="The Azerbaijan Communist Party was the ruling political party in the Azerbaijan SSR, making it effectively a branch of the ..."><span data-dcnode-id="4417" instrument_node="">Azerbaijan Communist Party</span></a><span data-dcnode-id="4415" instrument_node="">. From July 23 to September 1988, a group of Azerbaijani intellectuals began working for a new organization called the </span><a data-dcnode-id="4413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Azerbaijani_Popular_Front_Party/" title="The Azerbaijani Popular Front Party is a political party in Azerbaijan, founded in 1992 by Abulfaz Elchibey."><span data-dcnode-id="4414" instrument_node="">Popular Front of Azerbaijan</
