</span><p data-dcnode-id="3708"><span data-dcnode-id="3742" instrument_node="">On August 19, 1989, the Russian Orthodox Parish of Saints Peter and Paul announced it would be switching to the Ukrainian Autocephalous Orthodox Church. On September 2, 1989, tens of thousands across Ukraine protested a draft election law that reserved special seats for the Communist Party and for other official organizations: 50,000 in Lviv, 40,000 in Kyiv, 10,000 in </span><a data-dcnode-id="3740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Zhytomyr/" title="Zhytomyr is a city in the north of the western half of Ukraine."><span data-dcnode-id="3741" instrument_node="">Zhytomyr</span></a><span data-dcnode-id="3739" instrument_node="">, 5,000 each in </span><a data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Dniprodzerzhynsk/" title="Kamianske is an industrial city in Dnipropetrovsk Oblast of Ukraine and a port on the Dnieper."><span data-dcnode-id="3738" instrument_node="">Dniprodzerzhynsk</span></a><span data-dcnode-id="3736" instrument_node=""> and </span><a data-dcnode-id="3734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Chervonohrad/" title="Chervonohrad is a mining city and the administrative center of Chervonohrad Raion, Lviv Oblast of western Ukraine."><span data-dcnode-id="3735" instrument_node="">Chervonohrad</span></a><span data-dcnode-id="3733" instrument_node="">, and 2,000 in </span><a data-dcnode-id="3731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kharkiv/" title="Kharkiv is the administrative centre of Kharkiv Oblast and of the surrounding Kharkiv Raion."><span data-dcnode-id="3732" instrument_node="">Kharkiv</span></a><span data-dcnode-id="3730" instrument_node="">. From September 8–10, 1989, writer </span><a data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ivan_Drach/"><span data-dcnode-id="3729" instrument_node="">Ivan Drach</span></a><span data-dcnode-id="3727" instrument_node=""> was elected to head Rukh, the </span><a data-dcnode-id="3725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/People%2527s_Movement_of_Ukraine/" title="The People's Movement of Ukraine is a Ukrainian political party and first opposition party in Soviet Ukraine."><span data-dcnode-id="3726" instrument_node="">People's Movement of Ukraine</span></a><span data-dcnode-id="3724" instrument_node="">, at its founding congress in Kyiv. On September 17, between 150,000 and 200,000 people marched in Lviv, demanding the legalization of the </span><a data-dcnode-id="3722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukrainian_Greek_Catholic_Church/" title="The Ukrainian Greek Catholic Church is a sui iuris Byzantine Rite Eastern Catholic church in full communion with the ..."><span data-dcnode-id="3723" instrument_node="">Ukrainian Greek Catholic Church</span></a><span data-dcnode-id="3721" instrument_node="">. On September 21, 1989, exhumation of a mass grave began in Demianiv Laz, a nature preserves south of </span><a data-dcnode-id="3719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ivano-Frankivsk/" title="Ivano-Frankivsk is a city located in Western Ukraine."><span data-dcnode-id="3720" instrument_node="">Ivano-Frankivsk</span></a><span data-dcnode-id="3718" instrument_node="">. On September 28, the First Secretary of the </span><a data-dcnode-id="3716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Communist_Party_of_Ukraine/" title="The Communist Party of Ukraine is a banned Ukrainian political party founded in 1993 as the successor to the Soviet-era ..."><span data-dcnode-id="3717" instrument_node="">Communist Party of Ukraine</span></a><span data-dcnode-id="3715" instrument_node=""> </span><a data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Volodymyr_Shcherbytsky/"><span data-dcnode-id="3714" instrument_node="">Volodymyr Shcherbytsky</span></a><span data-dcnode-id="3712" instrument_node="">, a holdover from the Brezhnev era, was replaced in this office by </span><a data-dcnode-id="3710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Vladimir_Ivashko/"><span data-dcnode-id="3711" instrument_node="">Vladimir Ivashko</span></a><span data-dcnode-id="3709" instrument_node="">.</span></p><span data-dcnode-id="3707" instrument_node="">
</span><p data-dcnode-id="3690"><span data-dcnode-id="3706" instrument_node="">On October 1, 1989, a peaceful demonstration of 10,000 to 15,000 people was violently dispersed by the militia in front of Lviv's Druzhba Stadium, where a concert celebrating the Soviet "reunification" of Ukrainian lands was being held. On October 10, Ivano-Frankivsk was the site of a pre-election protest attended by 30,000 people. On October 15, several thousand people gathered in </span><a data-dcnode-id="3704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Chervonohrad/" title="Chervonohrad is a mining city and the administrative center of Chervonohrad Raion, Lviv Oblast of western Ukraine."><span data-dcnode-id="3705" instrument_node="">Chervonohrad</span></a><span data-dcnode-id="3703" instrument_node="">, </span><a data-dcnode-id="3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Chernivtsi/" title="Chernivtsi is a city in Southwestern Ukraine."><span data-dcnode-id="3702" instrument_node="">Chernivtsi</span></a><span data-dcnode-id="3700" instrument_node="">, </span><a data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Rivne/" title="Rivne is a city in western Ukraine."><span data-dcnode-id="3699" instrument_node="">Rivne</span></a><span data-dcnode-id="3697" instrument_node="">, and </span><a data-dcnode-id="3695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Zhytomyr/" title="Zhytomyr is a city in the north of the western half of Ukraine."><span data-dcnode-id="3696" instrument_node="">Zhytomyr</span></a><span data-dcnode-id="3694" instrument_node="">; 500 in </span><a data-dcnode-id="3692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Dnipropetrovsk/" title="Dnipro is the administrative centre of the Dnipropetrovsk Oblast."><span data-dcnode-id="3693" instrument_node="">Dnipropetrovsk</span></a><span data-dcnode-id="3691" instrument_node="">; and 30,000 in Lviv to protest the election law. On October 20, faithful and clergy of the Ukrainian Autocephalous Orthodox Church participated in a synod in Lviv, the first since its forced liquidation in the 1930s.</span></p><span data-dcnode-id="3689" instrument_node="">
</span><p data-dcnode-id="3684"><span data-dcnode-id="3688" instrument_node="">On October 24, the union Supreme Soviet passed a law eliminating special seats for Communist Party and other official organizations' representatives. On October 26, twenty factories in Lviv held strikes and meetings to protest the police brutality of October 1 and the authorities' unwillingness to prosecute those responsible. From October 26–28, the </span><i data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">Zelenyi Svit</span></i><span data-dcnode-id="3685" instrument_node=""> (Friends of the Earth – Ukraine) environmental association held its founding congress, and on October 27 the Ukrainian Parliament passed a law eliminating the special status of party and other official organizations as deputies of parliament.</span></p><span data-dcnode-id="3683" instrument_node="">
</span><p data-dcnode-id="3678"><span data-dcnode-id="3682" instrument_node="">On October 28, 1989, the Ukrainian Parliament decreed that effective January 1, 1990, Ukrainian would be the official language of Ukraine, while Russian would be used for communication between ethnic groups. On the same day, The Congregation of the Church of the Transfiguration in Lviv left the Russian Orthodox Church and proclaimed itself the </span><a data-dcnode-id="3680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukrainian_Greek_Catholic_Church/" title="The Ukrainian Greek Catholic Church is a sui iuris Byzantine Rite Eastern Catholic church in full communion with the ..."><span data-dcnode-id="3681" instrument_node="">Ukrainian Greek Catholic Church</span></a><span data-dcnode-id="3679" instrument_node="">. The following day, thousands attended a memorial service at Demianiv Laz, and a temporary marker was placed to indicate that a monument to the "victims of the repressions of 1939–1941" soon would be erected.</span></p><span data-dcnode-id="3677" instrument_node="">
</span><p data-dcnode-id="3657"><span data-dcnode-id="3676" instrument_node="">In mid-November, The Shevchenko Ukrainian Language Society was officially registered. On November 19, 1989, a public gathering in Kyiv attracted thousands of mourners, friends, and family to the reburial in Ukraine of three inmates of the infamous </span><a data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Gulag/" title="The GULag was the government agency in charge of the Soviet network of forced labor camps set up by order of Vladimir Lenin, ..."><span data-dcnode-id="3675" instrument_node="">Gulag</span></a><span data-dcnode-id="3673" instrument_node=""> Camp No.&nbsp;36 in Perm in the </span><a data-dcnode-id="3671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ural_Mountains/"><span data-dcnode-id="3672" instrument_node="">Ural Mountains</span></a><span data-dcnode-id="3670" instrument_node="">: human-rights activists </span><a data-dcnode-id="3668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Vasyl_Stus/" title="Vasyl Stus was born on January 6, 1938, into a peasant family in the village of Rakhnivka, Haisyn Raion, Vinnytsia Oblast, ..."><span data-dcnode-id="3669" instrument_node="">Vasyl Stus</span></a><span data-dcnode-id="3667" instrument_node="">, Oleksiy Tykhy, and </span><a data-dcnode-id="3665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Yuriy_Lytvyn_%28dissident%29/"><span data-dcnode-id="3666" instrument_node="">Yuriy Lytvyn</span></a><span data-dcnode-id="3664" instrument_node="">. Their remains were reinterred in </span><a data-dcnode-id="3662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Baikove_Cemetery/" title="Baikove Cemetery is an historic cemetery memorial in Holosiiv Raion of Kyiv, Ukraine."><span data-dcnode-id="3663" instrument_node="">Baikove Cemetery</span></a><span data-dcnode-id="3661" instrument_node="">. On November 26, 1989, a day of prayer and fasting was proclaimed by Cardinal Myroslav Lubachivsky, thousands of faithful in western Ukraine participated in religious services on the eve of a meeting between Pope John Paul&nbsp; II and General Secretary of the Central Committee of the CPSU Gorbachev. On November 28, 1989, the Ukrainian SSR's Council for Religious Affairs issued a decree allowing Ukrainian Catholic congregations to register as legal organizations. The decree was proclaimed on December&nbsp;1, coinciding with a meeting at the Vatican between the pope and the </span><a data-dcnode-id="3659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/General_Secretary_of_the_Communist_Party_of_the_Soviet_Union/"><span data-dcnode-id="3660" instrument_node="">Soviet General Secretary</span></a><span data-dcnode-id="3658" instrument_node="">.</span></p><span data-dcnode-id="3656" instrument_node="">
</span><p data-dcnode-id="3642"><span data-dcnode-id="3655" instrument_node="">On December 10, 1989, the first officially sanctioned observance of International Human Rights Day was held in Lviv. On December 17, an estimated 30,000 attended a public meeting organized in Kyiv by Rukh in memory of Nobel laureate </span><a data-dcnode-id="3653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Andrei_Sakharov/"><span data-dcnode-id="3654" instrument_node="">Andrei Sakharov</span></a><span data-dcnode-id="3652" instrument_node="">, who died on December 14. On December 26, the Supreme Soviet of Ukrainian SSR adopted a law designating </span><a data-dcnode-id="3650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Christmas/" title="Christmas is an annual festival commemorating the birth of Jesus Christ, observed primarily on December 25 as a religious ..."><span data-dcnode-id="3651" instrument_node="">Christmas</span></a><span data-dcnode-id="3649" instrument_node="">, </span><a data-dcnode-id="3647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Easter/" title="Easter is a Christian festival and cultural holiday commemorating the resurrection of Jesus from the dead, described in the ..."><span data-dcnode-id="3648" instrument_node="">Easter</span></a><span data-dcnode-id="3646" instrument_node="">, and the </span><a data-dcnode-id="3644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Trinity_Sunday/" title="Trinity Sunday is the first Sunday after Pentecost in the Western Christian liturgical calendar, and the Sunday of Pentecost ..."><span data-dcnode-id="3645" instrument_node="">Feast of the Holy Trinity</span></a><span data-dcnode-id="3643" instrument_node=""> official holidays.</span></p><span data-dcnode-id="3641" instrument_node="">
</span><p data-dcnode-id="3621"><span data-dcnode-id="3640" instrument_node="">In May 1989, a Soviet dissident, </span><a data-dcnode-id="3638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Mustafa_Dzhemilev/"><span data-dcnode-id="3639" instrument_node="">Mustafa Dzhemilev</span></a><span data-dcnode-id="3637" instrument_node="">, was elected to lead the newly founded </span><a data-dcnode-id="3635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Crimean_Tatars/"><span data-dcnode-id="3636" instrument_node="">Crimean Tatar</span></a><span data-dcnode-id="3634" instrument_node=""> National Movement. He also led the campaign for the return of Crimean Tatars to their homeland in Crimea after 45 years of exile.On January 24, 1989, the Soviet authorities in </span><a data-dcnode-id="3632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Byelorussian_Soviet_Socialist_Republic/" title="The Byelorussian Soviet Socialist Republic was a republic of the Soviet Union."><span data-dcnode-id="3633" instrument_node="">Byelorussia</span></a><span data-dcnode-id="3631" instrument_node=""> agreed to the demand of the democratic opposition (the </span><a data-dcnode-id="3629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Belarusian_Popular_Front/" title="The Belarusian Popular Front was a social and political movement in Belarus in late 1980s and the 1990s which led Belarus to ..."><span data-dcnode-id="3630" instrument_node="">Belarusian Popular Front</span></a><span data-dcnode-id="3628" instrument_node="">) to build a monument to thousands of people shot by Stalin-era police in the Kuropaty Forest near </span><a data-dcnode-id="3626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Minsk/" title="Minsk is the capital and the largest city of Belarus, located on the Svislach and the now subterranean Niamiha rivers."><span data-dcnode-id="3627" instrument_node="">Minsk</span></a><span data-dcnode-id="3625" instrument_node=""> in the 1930s.</span><sup data-dcnode-id="3622"><a data-dcnode-id="3623" href="#Ref-74"><span data-dcnode-id="3624" instrument_node="">[74]</span></a></sup></p><span data-dcnode-id="3620" instrument_node="">
</span><p data-dcnode-id="3609"><span data-dcnode-id="3619" instrument_node="">On September 30, 1989, thousands of Belarusians, denouncing local leaders, marched through Minsk to demand additional cleanup of the 1986 </span><a data-dcnode-id="3617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Chernobyl_disaster/" title="The Chernobyl disaster was a nuclear accident that occurred on 26 April 1986 at the No."><span data-dcnode-id="3618" instrument_node="">Chernobyl disaster</span></a><span data-dcnode-id="3616" instrument_node=""> site in Ukraine. Up to 15,000 protesters wearing armbands bearing radioactivity symbols and carrying the banned red-and-white national flag used by the </span><a data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Rada_of_the_Belarusian_Democratic_Republic/" title="The Rada of the Belarusian Democratic Republic was the governing body of the Belarusian Democratic Republic."><span data-dcnode-id="3615" instrument_node="">government-in-exile</span></a><span data-dcnode-id="3613" instrument_node=""> filed through torrential rain in defiance of a ban by local authorities. Later, they gathered in the city center near the government's headquarters, where speakers demanded the resignation of Yefrem Sokolov, the republic's Communist Party leader, and called for the evacuation of half a million people from the contaminated zones.</span><sup data-dcnode-id="3610"><a data-dcnode-id="3611" href="#Ref-75"><span data-dcnode-id="3612" instrument_node="">[75]</span></a></sup></p><span data-dcnode-id="3608" instrument_node="">
</span><h4 data-dcnode-id="3606"><span data-dcnode-id="3607" instrument_node="">Strike action of Kuzbass and Donbass miners </span></h4><span data-dcnode-id="3605" instrument_node="">
</span><p data-dcnode-id="3594"><span data-dcnode-id="3604" instrument_node="">Started in 1989 </span><a data-dcnode-id="3602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/strike_action/" title="Strike action is a work stoppage, caused by the mass refusal of employees to work."><span data-dcnode-id="3603" instrument_node="">strike action</span></a><span data-dcnode-id="3601" instrument_node=""> of miners in </span><a data-dcnode-id="3599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kuznetsk_basin/" title="The Kuznetsk Basin is one of the largest coal mining areas in Russia, covering an area of around 10000sqmi."><span data-dcnode-id="3600" instrument_node="">Kuzbass</span></a><span data-dcnode-id="3598" instrument_node="">, it was actively supported eventually by miners of </span><a data-dcnode-id="3596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Donets_basin/" title="The Donbas is a portmanteau formed from &quot; Donets Basin &quot;, an abbreviation of &quot; Donets Coal Basin &quot;."><span data-dcnode-id="3597" instrument_node="">Donbass</span></a><span data-dcnode-id="3595" instrument_node="">.</span></p><span data-dcnode-id="3593" instrument_node="">
</span><h4 data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">Central Asian republics </span></h4><span data-dcnode-id="3590" instrument_node="">
</span><p data-dcnode-id="3569"><span data-dcnode-id="3589" instrument_node="">Thousands of Soviet troops were sent to the </span><a data-dcnode-id="3587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Fergana_Valley/"><span data-dcnode-id="3588" instrument_node="">Fergana Valley</span></a><span data-dcnode-id="3586" instrument_node="">, southeast of the Uzbek capital </span><a data-dcnode-id="3584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Tashkent/" title="Tashkent is the capital and largest city of Uzbekistan, as well as the most populous city in Central Asia, with a population ..."><span data-dcnode-id="3585" instrument_node="">Tashkent</span></a><span data-dcnode-id="3583" instrument_node="">, to re-establish order after clashes in which local Uzbeks hunted down members of the </span><a data-dcnode-id="3581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Meskhetians/"><span data-dcnode-id="3582" instrument_node="">Meskhetian</span></a><span data-dcnode-id="3580" instrument_node=""> minority in several days of rioting between June 4–11, 1989; about 100 people were killed.</span><sup data-dcnode-id="3577"><a data-dcnode-id="3578" href="#Ref-76"><span data-dcnode-id="3579" instrument_node="">[76]</span></a></sup><span data-dcnode-id="3576" instrument_node=""> On June 23, 1989, Gorbachev removed </span><a data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Rafiq_Nishonov/"><span data-dcnode-id="3575" instrument_node="">Rafiq Nishonov</span></a><span data-dcnode-id="3573" instrument_node=""> as First Secretary of the </span><a data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Communist_Party_of_the_Uzbek_SSR/" title="The Communist Party of Uzbekistan was the ruling communist party of the Uzbek SSR, and a part of the Communist Party of the ..."><span data-dcnode-id="3572" instrument_node="">Communist Party of the Uzbek SSR</span></a><span data-dcnode-id="3570" instrument_node=""> and replaced him with Karimov, who went on to lead Uzbekistan as a Soviet Republic and subsequently as an independent state until his death in 2017.</span></p><span data-dcnode-id="3568" instrument_node="">
</span><p data-dcnode-id="3541"><span data-dcnode-id="3567" instrument_node="">In </span><a data-dcnode-id="3565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kazakhstan/" title="Kazakhstan is the world's largest landlocked country, the world's largest Muslim-majority country by land area, and the ..."><span data-dcnode-id="3566" instrument_node="">Kazakhstan</span></a><span data-dcnode-id="3564" instrument_node=""> on June 19, 1989, young men carrying guns, </span><a data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Incendiary_device/" title="Incendiary device is petroleum especially thickened with certain chemicals into a 'gel' to slow, but not stop, combustion, ..."><span data-dcnode-id="3563" instrument_node="">firebombs</span></a><span data-dcnode-id="3561" instrument_node="">, iron bars, and stones rioted in </span><a data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Zhanaozen/" title="Zhanaozen is a city of regional significance."><span data-dcnode-id="3560" instrument_node="">Zhanaozen</span></a><span data-dcnode-id="3558" instrument_node="">, causing a number of deaths. The youths tried to seize a police station and a water-supply station. They brought public transportation to a halt and shut down various shops and industries.</span><sup data-dcnode-id="3555"><a data-dcnode-id="3556" href="#Ref-77"><span data-dcnode-id="3557" instrument_node="">[77]</span></a></sup><span data-dcnode-id="3554" instrument_node=""> By June 25, the rioting had spread to five other towns near the </span><a data-dcnode-id="3552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Caspian_Sea/" title="The Caspian Sea is the world's largest inland body of water, often described as the world's largest lake or a full-fledged sea."><span data-dcnode-id="3553" instrument_node="">Caspian Sea</span></a><span data-dcnode-id="3551" instrument_node="">. A mob of about 150 people armed with sticks, stones and metal rods attacked the police station in Mangishlak, about 90order=flipNaNorder=flip from Zhanaozen before they were dispersed by government troops flown in by helicopters. Mobs of young people also rampaged through Yeraliev, Shepke, </span><a data-dcnode-id="3549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Fort-Shevchenko/" title="Fort-Shevchenko is a military-base town and administrative centre of Tupkaragan District in Mangystau Region of Kazakhstan ..."><span data-dcnode-id="3550" instrument_node="">Fort-Shevchenko</span></a><span data-dcnode-id="3548" instrument_node=""> and </span><a data-dcnode-id="3546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kulsary/" title="Kulsary is a town and the center of the Zhylyoi District in the Atyrau Region of western Kazakhstan."><span data-dcnode-id="3547" instrument_node="">Kulsary</span></a><span data-dcnode-id="3545" instrument_node="">, where they poured flammable liquid on trains housing temporary workers and set them on fire.</span><sup data-dcnode-id="3542"><a data-dcnode-id="3543" href="#Ref-78"><span data-dcnode-id="3544" instrument_node="">[78]</span></a></sup></p><span data-dcnode-id="3540" instrument_node="">
</span><p data-dcnode-id="3529"><span data-dcnode-id="3539" instrument_node="">With the government and CPSU shocked by the riots, on June 22, 1989, as a result of the riots, Gorbachev removed </span><a data-dcnode-id="3537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Gennady_Kolbin/"><span data-dcnode-id="3538" instrument_node="">Gennady Kolbin</span></a><span data-dcnode-id="3536" instrument_node=""> (the ethnic Russian whose appointment caused riots in December 1986) as First Secretary of the </span><a data-dcnode-id="3534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Communist_Party_of_Kazakhstan/" title="The Communist Party of Kazakhstan is a banned political party in Kazakhstan."><span data-dcnode-id="3535" instrument_node="">Communist Party of Kazakhstan</span></a><span data-dcnode-id="3533" instrument_node=""> for his poor handling of the June events and replaced him with </span><a data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Nursultan_Nazarbayev/"><span data-dcnode-id="3532" instrument_node="">Nursultan Nazarbayev</span></a><span data-dcnode-id="3530" instrument_node="">, an ethnic Kazakh who went on to lead Kazakhstan as the Soviet Republic and subsequently to independence. Nazarbayev would lead Kazakhstan for 27 years until he stepped down as president on March 19, 2019.</span></p><span data-dcnode-id="3528" instrument_node="">
</span><h3 data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">1990 </span></h3><span data-dcnode-id="3525" instrument_node="">
</span><h4 data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">Moscow loses six republics </span></h4><span data-dcnode-id="3522" instrument_node="">
</span><p data-dcnode-id="3510"><span data-dcnode-id="3521" instrument_node="">On February 7, 1990, the Central Committee of the CPSU accepted Gorbachev's recommendation that the party give up its </span><a data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/One-party_state/" title="A one-party state is a type of sovereign state in which only one political party has the right to form the government, ..."><span data-dcnode-id="3520" instrument_node="">monopoly</span></a><span data-dcnode-id="3518" instrument_node=""> on political power.</span><sup data-dcnode-id="3515"><a data-dcnode-id="3516" href="#Ref-79"><span data-dcnode-id="3517" instrument_node="">[79]</span></a></sup><span data-dcnode-id="3514" instrument_node=""> In 1990, all fifteen constituent republics of the USSR held their first competitive elections, with reformers and </span><a data-dcnode-id="3512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/ethnic_nationalist/" title="Ethnic nationalism is a form of nationalism wherein the nation and nationality are defined in terms of ethnicity, with ..."><span data-dcnode-id="3513" instrument_node="">ethnic nationalist</span></a><span data-dcnode-id="3511" instrument_node="">s winning many seats. The CPSU lost the elections in six republics:</span></p><span data-dcnode-id="3509" instrument_node="">
</span><ul data-dcnode-id="3454"><li data-dcnode-id="3501"><span data-dcnode-id="3508" instrument_node="">In </span><a data-dcnode-id="3506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1990_Lithuanian_parliamentary_election/"><span data-dcnode-id="3507" instrument_node="">Lithuania</span></a><span data-dcnode-id="3505" instrument_node="">, to </span><a data-dcnode-id="3503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/S%25C4%2585j%25C5%25ABdis/" title="Sąjūdis is the political organisation which led the struggle for Lithuania n independence in the late 1980s and early 1990s."><span data-dcnode-id="3504" instrument_node="">Sąjūdis</span></a><span data-dcnode-id="3502" instrument_node="">, on February 24 (run-off elections on March 4, 7, 8, and 10)</span></li><span data-dcnode-id="3500" instrument_node="">
</span><li data-dcnode-id="3492"><span data-dcnode-id="3499" instrument_node="">In </span><a data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1990_Moldovan_parliamentary_election/"><span data-dcnode-id="3498" instrument_node="">Moldova</span></a><span data-dcnode-id="3496" instrument_node="">, to the </span><a data-dcnode-id="3494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Popular_Front_of_Moldova/" title="The Popular Front of Moldova was a political movement in the Moldavian SSR, one of the 15 union republics of the former ..."><span data-dcnode-id="3495" instrument_node="">Popular Front of Moldova</span></a><span data-dcnode-id="3493" instrument_node="">, on February 25</span></li><span data-dcnode-id="3491" instrument_node="">
</span><li data-dcnode-id="3483"><span data-dcnode-id="3490" instrument_node="">In </span><a data-dcnode-id="3488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1990_Estonian_Supreme_Soviet_election/"><span data-dcnode-id="3489" instrument_node="">Estonia</span></a><span data-dcnode-id="3487" instrument_node="">, to the </span><a data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Estonian_Popular_Front/" title="The Popular Front of Estonia was a political organisation in Estonia in the late 1980s and early 1990s."><span data-dcnode-id="3486" instrument_node="">Estonian Popular Front</span></a><span data-dcnode-id="3484" instrument_node="">, on March 18</span></li><span data-dcnode-id="3482" instrument_node="">
</span><li data-dcnode-id="3474"><span data-dcnode-id="3481" instrument_node="">In </span><a data-dcnode-id="3479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1990_Latvian_Supreme_Soviet_election/"><span data-dcnode-id="3480" instrument_node="">Latvia</span></a><span data-dcnode-id="3478" instrument_node="">, to the </span><a data-dcnode-id="3476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Latvian_Popular_Front/" title="The Popular Front of Latvia was a political organisation in Latvia in the late 1980s and early 1990s which led Latvia to its ..."><span data-dcnode-id="3477" instrument_node="">Latvian Popular Front</span></a><span data-dcnode-id="3475" instrument_node="">, on March 18 (run-off elections on March 25, April 1, and April 29)</span></li><span data-dcnode-id="3473" instrument_node="">
</span><li data-dcnode-id="3465"><span data-dcnode-id="3472" instrument_node="">In </span><a data-dcnode-id="3470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1990_Armenian_parliamentary_election/"><span data-dcnode-id="3471" instrument_node="">Armenia</span></a><span data-dcnode-id="3469" instrument_node="">, to the </span><a data-dcnode-id="3467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Pan-Armenian_National_Movement/" title="The Pan-Armenian National Movement was a political party in Armenia."><span data-dcnode-id="3468" instrument_node="">Pan-Armenian National Movement</span></a><span data-dcnode-id="3466" instrument_node="">, on May 20 (run-off elections on June 3 and July 15)</span></li><span data-dcnode-id="3464" instrument_node="">
</span><li data-dcnode-id="3456"><span data-dcnode-id="3463" instrument_node="">In </span><a data-dcnode-id="3461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1990_Georgian_Supreme_Soviet_election/"><span data-dcnode-id="3462" instrument_node="">Georgia</span></a><span data-dcnode-id="3460" instrument_node="">, to </span><a data-dcnode-id="3458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Round_Table-Free_Georgia/" title="Round Table—Free Georgia was an alliance of political parties led by Zviad Gamsakhurdia."><span data-dcnode-id="3459" instrument_node="">Round Table-Free Georgia</span></a><span data-dcnode-id="3457" instrument_node="">, on October 28 (run-off election on November 11)</span></li><span data-dcnode-id="3455" instrument_node="">
</span></ul><span data-dcnode-id="3453" instrument_node="">
</span><p data-dcnode-id="3442"><span data-dcnode-id="3452" instrument_node="">The constituent republics began to declare their fledgling states' sovereignty and began a "war of laws" with the Moscow central government; they rejected union-wide legislation that conflicted with local laws, asserted control over their local economies, and refused to pay taxes to the Soviet government. Landsbergis, Chairman of the Supreme Council of Lithuania, also exempted Lithuanian men from </span><a data-dcnode-id="3450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/conscription/" title="Conscription is the state-mandated enlistment of people in a national service, mainly a military service."><span data-dcnode-id="3451" instrument_node="">mandatory service</span></a><span data-dcnode-id="3449" instrument_node=""> in the Soviet Armed Forces. This conflict caused economic dislocation as supply lines were disrupted, and caused the </span><a data-dcnode-id="3447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Soviet_economy/" title="The economy of the Soviet Union was based on state ownership of the means of production, collective farming, and industrial ..."><span data-dcnode-id="3448" instrument_node="">Soviet economy</span></a><span data-dcnode-id="3446" instrument_node=""> to decline further.</span><sup data-dcnode-id="3443"><a data-dcnode-id="3444" href="#Ref-80"><span data-dcnode-id="3445" instrument_node="">[80]</span></a></sup></p><span data-dcnode-id="3441" instrument_node="">
</span><h4 data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">Rivalry between USSR and RSFSR </span></h4><span data-dcnode-id="3438" instrument_node="">
</span><p data-dcnode-id="3417"><span data-dcnode-id="3437" instrument_node="">On March 4, 1990, the </span><a data-dcnode-id="3435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russian_Soviet_Federative_Socialist_Republic/" title="The Russian Soviet Federative Socialist Republic was an independent federal socialist state from 1917 to 1922, and ..."><span data-dcnode-id="3436" instrument_node="">Russian Soviet Federative Socialist Republic</span></a><span data-dcnode-id="3434" instrument_node=""> held relatively free elections for the </span><a data-dcnode-id="3432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Congress_of_People%2527s_Deputies_of_Russia/"><span data-dcnode-id="3433" instrument_node="">Congress of People's Deputies of Russia</span></a><span data-dcnode-id="3431" instrument_node="">. </span><a data-dcnode-id="3429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Boris_Yeltsin/"><span data-dcnode-id="3430" instrument_node="">Boris Yeltsin</span></a><span data-dcnode-id="3428" instrument_node=""> was elected, representing </span><a data-dcnode-id="3426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Yekaterinburg/" title="Yekaterinburg is the fourth-largest city in Russia, the largest city in the Ural Federal District, and one of Russia's main ..."><span data-dcnode-id="3427" instrument_node="">Sverdlovsk</span></a><span data-dcnode-id="3425" instrument_node="">, garnering 72 percent of the vote.</span><sup data-dcnode-id="3422"><a data-dcnode-id="3423" href="#Ref-81"><span data-dcnode-id="3424" instrument_node="">[81]</span></a></sup><span data-dcnode-id="3421" instrument_node=""> On May 29, 1990, Yeltsin was elected chair of the </span><a data-dcnode-id="3419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Supreme_Soviet_of_the_Russian_SFSR/"><span data-dcnode-id="3420" instrument_node="">Supreme Soviet</span></a><span data-dcnode-id="3418" instrument_node=""> of the RSFSR, despite the fact that Gorbachev asked Russian deputies not to vote for him.</span></p><span data-dcnode-id="3416" instrument_node="">
</span><p data-dcnode-id="3399"><span data-dcnode-id="3415" instrument_node="">Yeltsin was supported by democratic and conservative members of the Supreme Soviet, who sought power in the developing political situation. A new power struggle emerged between the </span><a data-dcnode-id="3413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russian_Soviet_Federative_Socialist_Republic/" title="The Russian Soviet Federative Socialist Republic was an independent federal socialist state from 1917 to 1922, and ..."><span data-dcnode-id="3414" instrument_node="">RSFSR</span></a><span data-dcnode-id="3412" instrument_node=""> and the </span><a data-dcnode-id="3410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Soviet_Union/" title="The Soviet Union was a communist state that spanned Eurasia from 1922 to 1991."><span data-dcnode-id="3411" instrument_node="">Soviet Union</span></a><span data-dcnode-id="3409" instrument_node="">. On June 12, 1990, the Congress of People's Deputies of the RSFSR adopted a </span><a data-dcnode-id="3407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Declaration_of_State_Sovereignty_of_the_Russian_Soviet_Federative_Socialist_Republic/"><span data-dcnode-id="3408" instrument_node="">declaration of sovereignty</span></a><span data-dcnode-id="3406" instrument_node="">. On July 12, 1990, Yeltsin resigned from the Communist Party in a dramatic speech at the </span><a data-dcnode-id="3404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/28th_Congress_of_the_Communist_Party_of_the_Soviet_Union/"><span data-dcnode-id="3405" instrument_node="">28th Congress</span></a><span data-dcnode-id="3403" instrument_node="">.</span><sup data-dcnode-id="3400"><a data-dcnode-id="3401" href="#Ref-82"><span data-dcnode-id="3402" instrument_node="">[82]</span></a></sup></p><span data-dcnode-id="3398" instrument_node="">
</span><h4 data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">Baltic republics </span></h4><span data-dcnode-id="3395" instrument_node="">
</span><p data-dcnode-id="3390"><span data-dcnode-id="3394" instrument_node="">Gorbachev's visit to the Lithuanian capital </span><a data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Vilnius/" title="Vilnius is the capital and largest city of Lithuania, with a population of 592,389."><span data-dcnode-id="3393" instrument_node="">Vilnius</span></a><span data-dcnode-id="3391" instrument_node=""> on January 11–13, 1990, provoked a pro-independence rally attended by an estimated 250,000 people.</span></p><span data-dcnode-id="3389" instrument_node="">
</span><p data-dcnode-id="3372"><span data-dcnode-id="3388" instrument_node="">On March 11, the newly elected parliament of the Lithuanian SSR elected </span><a data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Vytautas_Landsbergis/" title="Vytautas Landsbergis is a Lithuanian politician and former Member of the European Parliament."><span data-dcnode-id="3387" instrument_node="">Vytautas Landsbergis</span></a><span data-dcnode-id="3385" instrument_node="">, the leader of </span><a data-dcnode-id="3383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/S%25C4%2585j%25C5%25ABdis/" title="Sąjūdis is the political organisation which led the struggle for Lithuania n independence in the late 1980s and early 1990s."><span data-dcnode-id="3384" instrument_node="">Sąjūdis</span></a><span data-dcnode-id="3382" instrument_node="">, as its chairman and proclaimed the </span><a data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Act_of_the_Re-Establishment_of_the_State_of_Lithuania/" title="The Act of the Re-Establishment of the State of Lithuania was an independence declaration by Lithuania adopted on March 11, ..."><span data-dcnode-id="3381" instrument_node="">Act of the Re-Establishment of the State of Lithuania</span></a><span data-dcnode-id="3379" instrument_node="">, making Lithuania the first Soviet Republic to declare independence from the Soviet Union. Moscow reacted with an economic blockade keeping the troops in Lithuania ostensibly "to secure the rights of </span><a data-dcnode-id="3377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/ethnic_Russian/" title="The Russian diaspora is the global community of ethnic Russians."><span data-dcnode-id="3378" instrument_node="">ethnic Russian</span></a><span data-dcnode-id="3376" instrument_node="">s".</span><sup data-dcnode-id="3373"><a data-dcnode-id="3374" href="#Ref-83"><span data-dcnode-id="3375" instrument_node="">[83]</span></a></sup></p><span data-dcnode-id="3371" instrument_node="">
</span><p data-dcnode-id="3363"><span data-dcnode-id="3370" instrument_node="">On March 25, 1990, the </span><a data-dcnode-id="3368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Estonian_Communist_Party/" title="The Communist Party of Estonia was a political party in Estonia."><span data-dcnode-id="3369" instrument_node="">Estonian Communist Party</span></a><span data-dcnode-id="3367" instrument_node=""> voted to split from the CPSU after a six-month transition.</span><sup data-dcnode-id="3364"><a data-dcnode-id="3365" href="#Ref-84"><span data-dcnode-id="3366" instrument_node="">[84]</span></a></sup></p><span data-dcnode-id="3362" instrument_node="">
</span><p data-dcnode-id="3357"><span data-dcnode-id="3361" instrument_node="">On March 30, 1990, the Estonian Supreme Council declared the </span><a data-dcnode-id="3359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Soviet_occupation_of_Estonia/"><span data-dcnode-id="3360" instrument_node="">Soviet occupation of Estonia</span></a><span data-dcnode-id="3358" instrument_node=""> since the Second World War to be illegal and began a period of national transition towards the formal reestablishment of national independence within the republic.</span></p><span data-dcnode-id="3356" instrument_node="">
</span><p data-dcnode-id="3339"><span data-dcnode-id="3355" instrument_node="">On April 3, 1990, </span><a data-dcnode-id="3353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Edgar_Savisaar/" title="Edgar Savisaar is an Estonia n politician, one of the founding members of Popular Front of Estonia and the Centre Party."><span data-dcnode-id="3354" instrument_node="">Edgar Savisaar</span></a><span data-dcnode-id="3352" instrument_node=""> of the </span><a data-dcnode-id="3350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Popular_Front_of_Estonia/" title="The Popular Front of Estonia was a political organisation in Estonia in the late 1980s and early 1990s."><span data-dcnode-id="3351" instrument_node="">Popular Front of Estonia</span></a><span data-dcnode-id="3349" instrument_node=""> was elected chairman of the Council of Ministers (the equivalent of being Prime Minister), and soon a majority-pro independence cabinet was formed.Latvia </span><a data-dcnode-id="3347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/On_the_Restoration_of_Independence_of_the_Republic_of_Latvia/" title="The On the Restoration of Independence of the Republic of Latvia was adopted on 4 May 1990, by the Supreme Soviet of the ..."><span data-dcnode-id="3348" instrument_node="">declared the restoration of independence</span></a><span data-dcnode-id="3346" instrument_node=""> on May 4, 1990, with the declaration stipulating a transitional period to complete independence. The Declaration stated that although Latvia had de facto lost its independence in World War II, the country had </span><i data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">de jure</span></i><span data-dcnode-id="3343" instrument_node=""> remained a sovereign country because the annexation had been unconstitutional and against the will of the Latvian people. The declaration also stated that Latvia would base its relationship with the Soviet Union on the basis of the </span><a data-dcnode-id="3341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Latvian%25E2%2580%2593Soviet_Peace_Treaty/" title="The Latvian–Soviet Peace Treaty was signed on 11 August 1920 by representatives of the Republic of Latvia and Soviet Russia."><span data-dcnode-id="3342" instrument_node="">Latvian–Soviet Peace Treaty of 1920</span></a><span data-dcnode-id="3340" instrument_node="">, in which the Soviet Union recognized Latvia's independence as inviolable "for all future time". May 4 is now a national holiday in Latvia.</span></p><span data-dcnode-id="3338" instrument_node="">
</span><p data-dcnode-id="3330"><span data-dcnode-id="3337" instrument_node="">On May 7, 1990, </span><a data-dcnode-id="3335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ivars_Godmanis/" title="Ivars Godmanis is a Latvia n politician who served as the Prime Minister of Latvia from 1990 to 1993 and again from 2007 to ..."><span data-dcnode-id="3336" instrument_node="">Ivars Godmanis</span></a><span data-dcnode-id="3334" instrument_node=""> of the </span><a data-dcnode-id="3332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Latvian_Popular_Front/" title="The Popular Front of Latvia was a political organisation in Latvia in the late 1980s and early 1990s which led Latvia to its ..."><span data-dcnode-id="3333" instrument_node="">Latvian Popular Front</span></a><span data-dcnode-id="3331" instrument_node=""> was elected chairman of the Council of Ministers (the equivalent of being Latvia's Prime Minister), becoming the first premier of the restored Latvian republic.</span></p><span data-dcnode-id="3329" instrument_node="">
</span><p data-dcnode-id="3324"><span data-dcnode-id="3328" instrument_node="">Оn May 8, 1990, the Supreme Soviet of the Estonian SSR adopted a law officially declaring the reinstatement of the 1938 Constitution of the independent Republic of Estonia.</span><sup data-dcnode-id="3325"><a data-dcnode-id="3326" href="#Ref-85"><span data-dcnode-id="3327" instrument_node="">[85]</span></a></sup></p><span data-dcnode-id="3323" instrument_node="">
</span><h4 data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">Caucasus </span></h4><span data-dcnode-id="3320" instrument_node="">
</span><p data-dcnode-id="3305"><span data-dcnode-id="3319" instrument_node="">During the first week of January 1990, in the Azerbaijani </span><a data-dcnode-id="3317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/exclave/"><span data-dcnode-id="3318" instrument_node="">exclave</span></a><span data-dcnode-id="3316" instrument_node=""> of </span><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Nakhchivan_Autonomous_Republic/" title="The Nakhchivan Autonomous Republic is a landlocked exclave of the Republic of Azerbaijan."><span data-dcnode-id="3315" instrument_node="">Nakhchivan</span></a><span data-dcnode-id="3313" instrument_node="">, the Popular Front led crowds in the storming and destruction of the frontier fences and watchtowers along the border with Iran, and thousands of Soviet Azerbaijanis crossed the border to meet their ethnic cousins in </span><a data-dcnode-id="3311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Iranian_Azerbaijan/" title="Azerbaijan is a historical region in northwestern Iran that borders Iraq, Turkey, the Nakhchivan Autonomous Republic, ..."><span data-dcnode-id="3312" instrument_node="">Iranian Azerbaijan</span></a><span data-dcnode-id="3310" instrument_node="">.</span><sup data-dcnode-id="3307"><a data-dcnode-id="3308" href="#Ref-86"><span data-dcnode-id="3309" instrument_node="">[86]</span></a></sup><span data-dcnode-id="3306" instrument_node=""> It was the first time the Soviet Union had lost control of an external border.</span></p><span data-dcnode-id="3304" instrument_node="">
</span><p data-dcnode-id="3285"><span data-dcnode-id="3303" instrument_node="">Ethnic tensions had escalated between the Armenians and Azerbaijanis in spring and summer 1988.</span><sup data-dcnode-id="3300"><a data-dcnode-id="3301" href="#Ref-87"><span data-dcnode-id="3302" instrument_node="">[87]</span></a></sup><span data-dcnode-id="3299" instrument_node=""> On January 9, 1990, after the Armenian parliament voted to include Nagorno-Karabakh within its budget, renewed fighting broke out, hostages were taken, and four Soviet soldiers were killed.</span><sup data-dcnode-id="3296"><a data-dcnode-id="3297" href="#Ref-88"><span data-dcnode-id="3298" instrument_node="">[88]</span></a></sup><span data-dcnode-id="3295" instrument_node=""> On January 11, Popular Front radicals stormed party buildings and effectively overthrew the communist powers in the southern town of </span><a data-dcnode-id="3293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Lenkoran/" title="Lankaran is a city in Azerbaijan, on the coast of the Caspian Sea, near the southern border with Iran."><span data-dcnode-id="3294" instrument_node="">Lenkoran</span></a><span data-dcnode-id="3292" instrument_node="">. Gorbachev resolved to regain control of Azerbaijan; the events that ensued are known as "</span><a data-dcnode-id="3290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Black_January/" title="Black January was a violent crackdown on the civilian population of Baku on 19–20 January 1990, as part of a state of ..."><span data-dcnode-id="3291" instrument_node="">Black January</span></a><span data-dcnode-id="3289" instrument_node="">". Late on January 19, 1990, after blowing up the central television station and cutting the phone and radio lines, 26,000 Soviet troops entered the Azerbaijani capital </span><a data-dcnode-id="3287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Baku/" title="Baku is the capital and largest city of Azerbaijan, as well as the largest city on the Caspian Sea and of the Caucasus region."><span data-dcnode-id="3288" instrument_node="">Baku</span></a><span data-dcnode-id="3286" instrument_node="">, smashing barricades, attacking protesters, and firing into crowds. On that night and during subsequent confrontations (which lasted until February), more than 130 people died. Most of these were civilians. More than 700 civilians were wounded, hundreds were detained, but only a few were actually tried for alleged criminal offenses.</span></p><span data-dcnode-id="3284" instrument_node="">
</span><p data-dcnode-id="3276"><span data-dcnode-id="3283" instrument_node="">Civil liberties suffered. Soviet Defence Minister </span><a data-dcnode-id="3281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Dmitry_Yazov/"><span data-dcnode-id="3282" instrument_node="">Dmitry Yazov</span></a><span data-dcnode-id="3280" instrument_node=""> stated that the use of force in Baku was intended to prevent the </span><i data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">de facto</span></i><span data-dcnode-id="3277" instrument_node=""> takeover of the Azerbaijani government by the non-communist opposition, to prevent their victory in upcoming free elections (scheduled for March 1990), to destroy them as a political force, and to ensure that the Communist government remained in power.</span></p><span data-dcnode-id="3275" instrument_node="">
</span><p data-dcnode-id="3233"><span data-dcnode-id="3274" instrument_node="">The army had gained control of Baku, but by January 20 it had essentially lost Azerbaijan. Nearly the entire population of Baku turned out for the mass funerals of "martyrs" buried in the Alley of Martyrs.</span><sup data-dcnode-id="3271"><a data-dcnode-id="3272" href="#Ref-89"><span data-dcnode-id="3273" instrument_node="">[89]</span></a></sup><span data-dcnode-id="3270" instrument_node=""> Thousands of Communist Party members publicly burned their party cards. First Secretary Vezirov decamped to Moscow and </span><a data-dcnode-id="3268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ayaz_Mutalibov/" title="Ayaz Mutallibov was born on 12 May 1938, in Baku to the family of a physician and later World War II veteran, Niyazi Ashraf ..."><span data-dcnode-id="3269" instrument_node="">Ayaz Mutalibov</span></a><span data-dcnode-id="3267" instrument_node=""> was appointed his successor in a free vote of party officials. The ethnic Russian Viktor Polyanichko remained second secretary.</span><sup data-dcnode-id="3264"><a data-dcnode-id="3265" href="#Ref-90"><span data-dcnode-id="3266" instrument_node="">[90]</span></a></sup><span data-dcnode-id="3263" instrument_node=""> In reaction to the Soviet actions in Baku, </span><a data-dcnode-id="3261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Sakina_Aliyeva/" title="Sakina Aliyeva was an Azerbaijani-Soviet politician."><span data-dcnode-id="3262" instrument_node="">Sakina Aliyeva</span></a><span data-dcnode-id="3260" instrument_node="">, Chair of the </span><a data-dcnode-id="3258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Presidium/" title="A presidium is a council of executive officer s in some political assemblies that collectively administers its business, ..."><span data-dcnode-id="3259" instrument_node="">Presidium</span></a><span data-dcnode-id="3257" instrument_node=""> of the </span><a data-dcnode-id="3255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Supreme_Soviet/" title="The Supreme Soviet was the common name for the legislative bodies of the Soviet socialist republic s in the Union of ..."><span data-dcnode-id="3256" instrument_node="">Supreme Soviet</span></a><span data-dcnode-id="3254" instrument_node=""> of the </span><a data-dcnode-id="3252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Nakhchivan_Autonomous_Soviet_Socialist_Republic/" title="The Nakhichevan Autonomous Soviet Socialist Republic was an autonomous republic within the Azerbaijan SSR, itself a republic ..."><span data-dcnode-id="3253" instrument_node="">Nakhchivan Autonomous Soviet Socialist Republic</span></a><span data-dcnode-id="3251" instrument_node=""> called a </span><a data-dcnode-id="3249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/special_session/" title="Special session is a period when the body convenes outside of the normal legislative session."><span data-dcnode-id="3250" instrument_node="">special session</span></a><span data-dcnode-id="3248" instrument_node=""> where it was debated whether or not Nakhchivan could </span><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Secession/" title="Secession is the withdrawal of a group from a larger entity, especially a political entity, but also from any organization, ..."><span data-dcnode-id="3247" instrument_node="">secede</span></a><span data-dcnode-id="3245" instrument_node=""> from the USSR under Article 81 of the Soviet Constitution. Deciding that it was legal, deputies prepared a declaration of independence, which Aliyeva signed and presented on January 20 on national television. It was the first declaration of secession by a recognized region in the USSR. Aliyeva and the Nakhchivan Soviet's actions were denounced by government officials who forced her to resign and the attempt at independence was aborted.</span><sup data-dcnode-id="3242"><a data-dcnode-id="3243" href="#Ref-91"><span data-dcnode-id="3244" instrument_node="">[91]</span></a></sup><span data-dcnode-id="3241" instrument_node=""> </span><sup data-dcnode-id="3238"><a data-dcnode-id="3239" href="#Ref-92"><span data-dcnode-id="3240" instrument_node="">[92]</span></a></sup><span data-dcnode-id="3237" instrument_node=""> </span><sup data-dcnode-id="3234"><a data-dcnode-id="3235" href="#Ref-93"><span data-dcnode-id="3236" instrument_node="">[93]</span></a></sup></p><span data-dcnode-id="3232" instrument_node="">
</span><p data-dcnode-id="3216"><span data-dcnode-id="3231" instrument_node="">Following the hardliners' takeover, the September 30, 1990 elections (runoffs on October 14) were characterized by intimidation; several Popular Front candidates were jailed, two were murdered, and unabashed </span><a data-dcnode-id="3229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Electoral_fraud/" title="Electoral fraud is sometimes used to describe acts which are legal, but considered morally unacceptable, outside the spirit ..."><span data-dcnode-id="3230" instrument_node="">ballot stuffing</span></a><span data-dcnode-id="3228" instrument_node=""> took place, even in the presence of Western observers.</span><sup data-dcnode-id="3225"><a data-dcnode-id="3226" href="#Ref-94"><span data-dcnode-id="3227" instrument_node="">[94]</span></a></sup><span data-dcnode-id="3224" instrument_node=""> The election results reflected the threatening environment; out of the 350 members, 280 were Communists, with only 45 opposition candidates from the Popular Front and other non-communist groups, who together formed a Democratic Bloc ("Dembloc").</span><sup data-dcnode-id="3221"><a data-dcnode-id="3222" href="#Ref-95"><span data-dcnode-id="3223" instrument_node="">[95]</span></a></sup><span data-dcnode-id="3220" instrument_node=""> In May 1990 Mutalibov was elected chairman of the Supreme Soviet unopposed.</span><sup data-dcnode-id="3217"><a data-dcnode-id="3218" href="#Ref-96"><span data-dcnode-id="3219" instrument_node="">[96]</span></a></sup></p><span data-dcnode-id="3215" instrument_node="">
</span><p data-dcnode-id="3196"><span data-dcnode-id="3214" instrument_node="">On August 23, 1990, the </span><a data-dcnode-id="3212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Supreme_Soviet_of_the_Armenian_Soviet_Socialist_Republic/"><span data-dcnode-id="3213" instrument_node="">Supreme Soviet of the Armenian SSR</span></a><span data-dcnode-id="3211" instrument_node=""> adopted the </span><a data-dcnode-id="3209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Declaration_of_State_Sovereignty_of_Armenia/" title="The Declaration of State Sovereignty of Armenia was signed by Armenia 's president Levon Ter-Petrossian and Supreme Council ..."><span data-dcnode-id="3210" instrument_node="">Declaration of Independence of Armenia</span></a><span data-dcnode-id="3208" instrument_node="">. The document proclaimed the independent Republic of Armenia with its own symbols, army, financial institutions, foreign and tax policy.</span><sup data-dcnode-id="3205"><a data-dcnode-id="3206" href="#Ref-97"><span data-dcnode-id="3207" instrument_node="">[97]</span></a></sup><span data-dcnode-id="3204" instrument_node=""> </span><sup data-dcnode-id="3201"><a data-dcnode-id="3202" href="#Ref-98"><span data-dcnode-id="3203" instrument_node="">[98]</span></a></sup><span data-dcnode-id="3200" instrument_node=""> </span><sup data-dcnode-id="3197"><a data-dcnode-id="3198" href="#Ref-99"><span data-dcnode-id="3199" instrument_node="">[99]</span></a></sup></p><span data-dcnode-id="3195" instrument_node="">
</span><h4 data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">Western republics </span></h4><span data-dcnode-id="3192" instrument_node="">
</span><p data-dcnode-id="3160"><span data-dcnode-id="3191" instrument_node="">On January 21, 1990, </span><a data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/People%2527s_Movement_of_Ukraine/" title="The People's Movement of Ukraine is a Ukrainian political party and first opposition party in Soviet Ukraine."><span data-dcnode-id="3190" instrument_node="">Rukh</span></a><span data-dcnode-id="3188" instrument_node=""> organized a 300miles human chain between Kyiv, Lviv, and Ivano-Frankivsk. Hundreds of thousands joined hands to commemorate the proclamation of Ukrainian independence in 1918 and the reunification of Ukrainian lands one year later (</span><a data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Act_Zluky/" title="The Unification Act was an agreement signed on 22 January 1919, by the Ukrainian People's Republic and the West Ukrainian ..."><span data-dcnode-id="3187" instrument_node="">1919 Unification Act</span></a><span data-dcnode-id="3185" instrument_node="">). On January 23, 1990, the </span><a data-dcnode-id="3183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukrainian_Greek_Catholic_Church/" title="The Ukrainian Greek Catholic Church is a sui iuris Byzantine Rite Eastern Catholic church in full communion with the ..."><span data-dcnode-id="3184" instrument_node="">Ukrainian Greek-Catholic Church</span></a><span data-dcnode-id="3182" instrument_node=""> held its first </span><a data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/synod/" title="A synod is a council of a Christian denomination, usually convened to decide an issue of doctrine, administration or ..."><span data-dcnode-id="3181" instrument_node="">synod</span></a><span data-dcnode-id="3179" instrument_node=""> since its liquidation by the Soviets in 1946 (an act which the gathering declared invalid). On February 9, 1990, the Ukrainian Ministry of Justice officially registered Rukh. However, the registration came too late for Rukh to stand its own candidates for the parliamentary and local elections on March 4. At the </span><a data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1990_Ukrainian_parliamentary_election/"><span data-dcnode-id="3178" instrument_node="">1990 elections</span></a><span data-dcnode-id="3176" instrument_node=""> of </span><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/People%2527s_Deputy_of_Ukraine/" title="A People's Deputy of Ukraine is a member of parliament, legislator elected by a popular vote to the Verkhovna Rada."><span data-dcnode-id="3175" instrument_node="">people's deputies</span></a><span data-dcnode-id="3173" instrument_node=""> to the </span><a data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Supreme_Council_of_Ukraine/" title="The Verkhovna Rada is composed of 450 deputies, who are presided over by a chairman."><span data-dcnode-id="3172" instrument_node="">Supreme Council</span></a><span data-dcnode-id="3170" instrument_node=""> (</span><i data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">Verkhovna Rada</span></i><span data-dcnode-id="3167" instrument_node="">), candidates from the </span><a data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Democratic_Bloc_%28Ukraine%29/" title="The Democratic Bloc was a political alliance and an electoral bloc in Ukraine founded during the election campaign to ..."><span data-dcnode-id="3166" instrument_node="">Democratic Bloc</span></a><span data-dcnode-id="3164" instrument_node=""> won landslide victories in </span><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Western_Ukraine/" title="Western Ukraine is the territory of Ukraine linked to the former Kingdom of Galicia–Volhynia, which was part of the ..."><span data-dcnode-id="3163" instrument_node="">western Ukrainian oblasts</span></a><span data-dcnode-id="3161" instrument_node="">. A majority of the seats had to hold run-off elections. On March 18, Democratic candidates scored further victories in the run-offs. The Democratic Bloc gained about 90 out of 450 seats in the new parliament.</span></p><span data-dcnode-id="3159" instrument_node="">
</span><p data-dcnode-id="3124"><span data-dcnode-id="3158" instrument_node="">On April 6, 1990, the Lviv City Council voted to return </span><a data-dcnode-id="3156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/St._George%2527s_Cathedral%252c_Lviv/"><span data-dcnode-id="3157" instrument_node="">St. George Cathedral</span></a><span data-dcnode-id="3155" instrument_node=""> to the </span><a data-dcnode-id="3153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukrainian_Greek_Catholic_Church/" title="The Ukrainian Greek Catholic Church is a sui iuris Byzantine Rite Eastern Catholic church in full communion with the ..."><span data-dcnode-id="3154" instrument_node="">Ukrainian Greek Catholic Church</span></a><span data-dcnode-id="3152" instrument_node="">. The </span><a data-dcnode-id="3150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russian_Orthodox_Church/" title="The Russian Orthodox Church is one of the autocephalous Eastern Orthodox Christian churches."><span data-dcnode-id="3151" instrument_node="">Russian Orthodox Church</span></a><span data-dcnode-id="3149" instrument_node=""> refused to yield. On April 29–30, 1990, the </span><a data-dcnode-id="3147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukrainian_Helsinki_Group/" title="The Ukrainian Helsinki Group was founded on November 9, 1976, as the &quot;Ukrainian Public Group to Promote the Implementation ..."><span data-dcnode-id="3148" instrument_node="">Ukrainian Helsinki Union</span></a><span data-dcnode-id="3146" instrument_node=""> disbanded to form the </span><a data-dcnode-id="3144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukrainian_Republican_Party/" title="The Ukrainian Republican Party was the first registered political party in Ukraine created on November 5, 1990 by the ..."><span data-dcnode-id="3145" instrument_node="">Ukrainian Republican Party</span></a><span data-dcnode-id="3143" instrument_node="">. On May 15 the new parliament convened. The bloc of conservative communists held 239 seats; the Democratic Bloc, which had evolved into the National Council, had 125 deputies. On June 4, 1990, two candidates remained in the protracted race for parliament chair. The leader of the Communist Party of Ukraine (CPU), </span><a data-dcnode-id="3141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Vladimir_Ivashko/"><span data-dcnode-id="3142" instrument_node="">Volodymyr Ivashko</span></a><span data-dcnode-id="3140" instrument_node="">, was elected with 60 percent of the vote as more than 100 opposition deputies boycotted the election. On June 5–6, 1990, Metropolitan </span><a data-dcnode-id="3138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Mstyslav_%28Skrypnyk%29/" title="Mstyslav was a Ukrainian Orthodox Church hierarch."><span data-dcnode-id="3139" instrument_node="">Mstyslav</span></a><span data-dcnode-id="3137" instrument_node=""> of the U.S.-based </span><a data-dcnode-id="3135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukrainian_Orthodox_Church_of_the_USA/" title="The Ukrainian Orthodox Church of the USA is a jurisdiction of the Ecumenical Patriarchate in the United States."><span data-dcnode-id="3136" instrument_node="">Ukrainian Orthodox Church</span></a><span data-dcnode-id="3134" instrument_node=""> was elected patriarch of the </span><a data-dcnode-id="3132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukrainian_Autocephalous_Orthodox_Church/" title="The Ukrainian Autocephalous Orthodox Church was one of the three major Eastern Orthodox churches in Ukraine."><span data-dcnode-id="3133" instrument_node="">Ukrainian Autocephalous Orthodox Church</span></a><span data-dcnode-id="3131" instrument_node=""> (UAOC) during that Church's first synod. The UAOC declared its full independence from the </span><a data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Moscow_Patriarchate/"><span data-dcnode-id="3130" instrument_node="">Moscow Patriarchate</span></a><span data-dcnode-id="3128" instrument_node=""> of the Russian Orthodox Church, which in March had granted autonomy to the Ukrainian Orthodox church headed by the Metropolitan </span><a data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Filaret_%28Denysenko%29/" title="Filaret is the primate and Patriarch of the Ukrainian Orthodox Church – Kyiv Patriarchate."><span data-dcnode-id="3127" instrument_node="">Filaret</span></a><span data-dcnode-id="3125" instrument_node="">.</span></p><span data-dcnode-id="3123" instrument_node="">
</span><p data-dcnode-id="3109"><span data-dcnode-id="3122" instrument_node="">On June 22, 1990, </span><a data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Vladimir_Ivashko/"><span data-dcnode-id="3121" instrument_node="">Volodymyr Ivashko</span></a><span data-dcnode-id="3119" instrument_node=""> withdrew his candidacy for leader of the Communist Party of Ukraine in view of his new position in parliament. </span><a data-dcnode-id="3117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Stanislav_Hurenko/"><span data-dcnode-id="3118" instrument_node="">Stanislav Hurenko</span></a><span data-dcnode-id="3116" instrument_node=""> was elected first secretary of the CPU. On July 11, Ivashko resigned from his post as chairman of the </span><a data-dcnode-id="3114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukrainian_Parliament/" title="The Verkhovna Rada is composed of 450 deputies, who are presided over by a chairman."><span data-dcnode-id="3115" instrument_node="">Ukrainian Parliament</span></a><span data-dcnode-id="3113" instrument_node=""> after he was elected deputy general secretary of the </span><a data-dcnode-id="3111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Communist_Party_of_the_Soviet_Union/" title="The Communist Party of the Soviet Union was the founding and ruling party of the Soviet Union."><span data-dcnode-id="3112" instrument_node="">Communist Party of the Soviet Union</span></a><span data-dcnode-id="3110" instrument_node="">. The Parliament accepted the resignation a week later, on July 18. On July 16 Parliament overwhelmingly approved the Declaration on State Sovereignty of Ukraine – with a vote of 355 in favour and four against. The people's deputies voted 339 to 5 to proclaim July 16 a Ukrainian national holiday.</span></p><span data-dcnode-id="3108" instrument_node="">
</span><p data-dcnode-id="3094"><span data-dcnode-id="3107" instrument_node="">On July 23, 1990, </span><a data-dcnode-id="3105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Leonid_Kravchuk/"><span data-dcnode-id="3106" instrument_node="">Leonid Kravchuk</span></a><span data-dcnode-id="3104" instrument_node=""> was elected to replace Ivashko as parliament chairman. On July 30, Parliament adopted a resolution on military service ordering Ukrainian soldiers "in regions of national conflict such as Armenia and Azerbaijan" to return to Ukrainian territory. On August&nbsp;1, Parliament voted overwhelmingly to shut down the </span><a data-dcnode-id="3102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Chernobyl_Nuclear_Power_Plant/" title="The Chernobyl Nuclear Power Plant is a closed nuclear power plant located near the abandoned city of Pripyat in northern ..."><span data-dcnode-id="3103" instrument_node="">Chernobyl Nuclear Power Plant</span></a><span data-dcnode-id="3101" instrument_node="">. On August 3, it adopted a law on the economic sovereignty of the Ukrainian republic. On August 19, the first Ukrainian Catholic liturgy in 44 years was celebrated at St. George Cathedral. On September 5–7, the International Symposium on the </span><a data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Holodomor/" title="The Holodomor was a famine in Soviet Ukraine from 1932 to 1933 that killed millions of Ukrainians."><span data-dcnode-id="3100" instrument_node="">Great Famine of 1932–1933</span></a><span data-dcnode-id="3098" instrument_node=""> was held in Kyiv. On September 8, The first "Youth for Christ" rally since 1933 took place held in Lviv, with 40,000 participants. In September 28–30, the </span><a data-dcnode-id="3096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Party_of_Greens_of_Ukraine/" title="The Party of Greens of Ukraine is a Ukrainian green political party founded in 1990 by Yuriy Shcherbak and registered in May ..."><span data-dcnode-id="3097" instrument_node="">Green Party of Ukraine</span></a><span data-dcnode-id="3095" instrument_node=""> held its founding congress. On September 30, nearly 100,000 people marched in Kyiv to protest against the new union treaty proposed by Gorbachev.</span></p><span data-dcnode-id="3093" instrument_node="">
</span><p data-dcnode-id="3085"><span data-dcnode-id="3092" instrument_node="">On October 1, 1990, parliament reconvened amid mass protests calling for the resignations of Kravchuk and of Prime Minister </span><a data-dcnode-id="3090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Vitaliy_Masol/"><span data-dcnode-id="3091" instrument_node="">Vitaliy Masol</span></a><span data-dcnode-id="3089" instrument_node="">, a leftover from the previous régime. Students erected a tent city on </span><a data-dcnode-id="3087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Maidan_Nezalezhnosti/" title="Maidan Nezalezhnosti is the central square of Kyiv, the capital city of Ukraine."><span data-dcnode-id="3088" instrument_node="">October Revolution Square</span></a><span data-dcnode-id="3086" instrument_node="">, where they continued the protest.</span></p><span data-dcnode-id="3084" instrument_node="">
