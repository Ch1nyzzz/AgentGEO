</span><p data-dcnode-id="2334"><span data-dcnode-id="2360" instrument_node="">In April 1992, the Congress of People's Deputies of Russia refused to ratify the Belovezhskaya Agreements</span><sup data-dcnode-id="2357"><a data-dcnode-id="2358" href="#Ref-152"><span data-dcnode-id="2359" instrument_node="">[152]</span></a></sup><span data-dcnode-id="2356" instrument_node=""> </span><sup data-dcnode-id="2353"><a data-dcnode-id="2354" href="#Ref-153"><span data-dcnode-id="2355" instrument_node="">[153]</span></a></sup><span data-dcnode-id="2352" instrument_node=""> </span><sup data-dcnode-id="2349"><a data-dcnode-id="2350" href="#Ref-154"><span data-dcnode-id="2351" instrument_node="">[154]</span></a></sup><span data-dcnode-id="2348" instrument_node=""> and to exclude references to the Constitution and laws of the USSR from the text of the Constitution of the RSFSR.</span><sup data-dcnode-id="2345"><a data-dcnode-id="2346" href="#Ref-155"><span data-dcnode-id="2347" instrument_node="">[155]</span></a></sup><span data-dcnode-id="2344" instrument_node=""> According to some Russian politicians, this was one of the reasons for the </span><a data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1993_Russian_constitutional_crisis/"><span data-dcnode-id="2343" instrument_node="">political crisis of September - October 1993</span></a><span data-dcnode-id="2341" instrument_node="">. In a </span><a data-dcnode-id="2339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1993_Russian_constitutional_referendum/"><span data-dcnode-id="2340" instrument_node="">referendum on December 12, 1993</span></a><span data-dcnode-id="2338" instrument_node="">, a </span><a data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Constitution_of_Russia/"><span data-dcnode-id="2337" instrument_node="">new Russian constitution</span></a><span data-dcnode-id="2335" instrument_node=""> was adopted, in which there was no mention of the union state.</span></p><span data-dcnode-id="2333" instrument_node="">
</span><h2 data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Consequences</span></h2><span data-dcnode-id="2330" instrument_node="">
</span><p data-dcnode-id="2325"><span data-dcnode-id="2329" instrument_node="">According to the scholar Marcel H. Van Herpen, the end of the Soviet Union also marked the end of Russian colonialism and imperialism.</span><sup data-dcnode-id="2326"><a data-dcnode-id="2327" href="#Ref-156"><span data-dcnode-id="2328" instrument_node="">[156]</span></a></sup></p><span data-dcnode-id="2324" instrument_node="">
</span><h3 data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">Sports and "Unified Team" </span></h3><span data-dcnode-id="2321" instrument_node="">
</span><p data-dcnode-id="2304"><span data-dcnode-id="2320" instrument_node="">The breakup of the Soviet Union saw a massive impact in the sporting world. Before its dissolution, the </span><a data-dcnode-id="2318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Soviet_Union_national_football_team/" title="The Soviet Union national football team was the national football team of the Soviet Union."><span data-dcnode-id="2319" instrument_node="">Soviet football team</span></a><span data-dcnode-id="2317" instrument_node=""> had just qualified for </span><a data-dcnode-id="2315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/UEFA_Euro_1992/"><span data-dcnode-id="2316" instrument_node="">Euro 1992</span></a><span data-dcnode-id="2314" instrument_node="">, but its place was instead taken by the </span><a data-dcnode-id="2312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/CIS_national_football_team/"><span data-dcnode-id="2313" instrument_node="">CIS national football team</span></a><span data-dcnode-id="2311" instrument_node="">. After the tournament, the former Soviet Republics competed as separate independent nations, with FIFA allocating the Soviet team's record to </span><a data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russia_national_football_team/" title="The Russia national football team is controlled by the Russian Football Union, the governing body for football in Russia."><span data-dcnode-id="2310" instrument_node="">Russia</span></a><span data-dcnode-id="2308" instrument_node="">.</span><sup data-dcnode-id="2305"><a data-dcnode-id="2306" href="#Ref-157"><span data-dcnode-id="2307" instrument_node="">[157]</span></a></sup></p><span data-dcnode-id="2303" instrument_node="">
</span><p data-dcnode-id="2274"><span data-dcnode-id="2302" instrument_node="">Before the start of the </span><a data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1992_Winter_Olympics/" title="The 1992 Winter Olympics was a winter multi-sport event held from 8 to 23 February 1992 in and around Albertville, ..."><span data-dcnode-id="2301" instrument_node="">1992 Winter Olympics in Albertville</span></a><span data-dcnode-id="2299" instrument_node=""> and the </span><a data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1992_Summer_Olympics/" title="The 1992 Summer Olympics was the first and to date only Summer Olympics to be held in the country."><span data-dcnode-id="2298" instrument_node="">Summer Olympics in Barcelona</span></a><span data-dcnode-id="2296" instrument_node="">, the Olympic Committee of the Soviet Union formally existed until March 12, 1992, when it disbanded but it was succeeded by the </span><a data-dcnode-id="2294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russian_Olympic_Committee/" title="The Russian Olympic Committee is the National Olympic Committee representing Russia."><span data-dcnode-id="2295" instrument_node="">Russian Olympic Committee</span></a><span data-dcnode-id="2293" instrument_node="">. However, 12 of the 15 former Soviet Republics competed together as the </span><a data-dcnode-id="2291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Unified_Team_at_the_Olympics/"><span data-dcnode-id="2292" instrument_node="">Unified Team</span></a><span data-dcnode-id="2290" instrument_node=""> and marched under the Olympic flag in Barcelona, where they finished first in the medal rankings. Separately, </span><a data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Lithuania_at_the_1992_Summer_Olympics/"><span data-dcnode-id="2289" instrument_node="">Lithuania</span></a><span data-dcnode-id="2287" instrument_node="">, </span><a data-dcnode-id="2285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Latvia_at_the_1992_Summer_Olympics/"><span data-dcnode-id="2286" instrument_node="">Latvia</span></a><span data-dcnode-id="2284" instrument_node="">, and </span><a data-dcnode-id="2282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Estonia_at_the_1992_Summer_Olympics/"><span data-dcnode-id="2283" instrument_node="">Estonia</span></a><span data-dcnode-id="2281" instrument_node=""> also competed as independent nations in the 1992 Games. The Unified Team also competed in Albertville earlier in the year (represented by six of the twelve ex-republics) and finished second in the medal ranking at those Games. Afterwards, the individual NOCs of the non-Baltic former republics were established. Some NOCs made their debuts at the </span><a data-dcnode-id="2279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1994_Winter_Olympics/" title="The 1994 Winter Olympics was an international winter multi-sport event held from 12 to 27&amp;nbsp;February 1994 in and around ..."><span data-dcnode-id="2280" instrument_node="">1994 Winter Olympic Games in Lillehammer</span></a><span data-dcnode-id="2278" instrument_node="">, and others did so at the </span><a data-dcnode-id="2276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1996_Summer_Olympics/"><span data-dcnode-id="2277" instrument_node="">1996 Summer Olympic Games in Atlanta</span></a><span data-dcnode-id="2275" instrument_node="">.</span></p><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2234"><span data-dcnode-id="2272" instrument_node="">Members of the Unified Team at the 1992 Summer Olympics in Barcelona consisted of </span><a data-dcnode-id="2270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Armenia/" title="Armenia is a landlocked country located in the Armenian Highlands of Western Asia."><span data-dcnode-id="2271" instrument_node="">Armenia</span></a><span data-dcnode-id="2269" instrument_node="">, </span><a data-dcnode-id="2267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Azerbaijan/" title="Azerbaijan is a transcontinental country located at the boundary of Eastern Europe and Western Asia."><span data-dcnode-id="2268" instrument_node="">Azerbaijan</span></a><span data-dcnode-id="2266" instrument_node="">, Belarus, </span><a data-dcnode-id="2264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Georgia_%28country%29/" title="Georgia is a country located in the Caucasus, at the intersection of Eastern Europe and Western Asia."><span data-dcnode-id="2265" instrument_node="">Georgia</span></a><span data-dcnode-id="2263" instrument_node="">, </span><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kazakhstan/" title="Kazakhstan is the world's largest landlocked country, the world's largest Muslim-majority country by land area, and the ..."><span data-dcnode-id="2262" instrument_node="">Kazakhstan</span></a><span data-dcnode-id="2260" instrument_node="">, </span><a data-dcnode-id="2258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kyrgyzstan/" title="Kyrgyzstan is bordered by Kazakhstan to the north, Uzbekistan to the west, Tajikistan to the south, and China to the east."><span data-dcnode-id="2259" instrument_node="">Kyrgyzstan</span></a><span data-dcnode-id="2257" instrument_node="">, </span><a data-dcnode-id="2255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Moldova/" title="Moldova is a country in Eastern Europe."><span data-dcnode-id="2256" instrument_node="">Moldova</span></a><span data-dcnode-id="2254" instrument_node="">, Russia, </span><a data-dcnode-id="2252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Tajikistan/" title="Tajikistan is a landlocked country in Central Asia."><span data-dcnode-id="2253" instrument_node="">Tajikistan</span></a><span data-dcnode-id="2251" instrument_node="">, </span><a data-dcnode-id="2249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Turkmenistan/" title="Turkmenistan is one of the most sparsely populated nations in Asia."><span data-dcnode-id="2250" instrument_node="">Turkmenistan</span></a><span data-dcnode-id="2248" instrument_node="">, </span><a data-dcnode-id="2246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukraine/" title="Ukraine is a country in Eastern Europe."><span data-dcnode-id="2247" instrument_node="">Ukraine</span></a><span data-dcnode-id="2245" instrument_node="">, and </span><a data-dcnode-id="2243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Uzbekistan/" title="Uzbekistan is part of the Turkic languages world, as well as a member of the Organisation of Turkic States."><span data-dcnode-id="2244" instrument_node="">Uzbekistan</span></a><span data-dcnode-id="2242" instrument_node="">. At those Summer Games, the Unified Team secured 45 gold medals, 38 silver medals, and 29 bronze medals; four medals more than second-place United States, and 30 more than third-place Germany. In addition to great team success, the Unified Team also saw great personal success. </span><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Vitaly_Scherbo/"><span data-dcnode-id="2241" instrument_node="">Vitaly Scherbo</span></a><span data-dcnode-id="2239" instrument_node=""> of Belarus secured six gold medals for the team in gymnastics and also became the most decorated athlete of the Summer Games.</span><sup data-dcnode-id="2236"><a data-dcnode-id="2237" href="#Ref-158"><span data-dcnode-id="2238" instrument_node="">[158]</span></a></sup><span data-dcnode-id="2235" instrument_node=""> Gymnastics, athletics, wrestling, and swimming were the strongest sports for the team, as the four combined earned 28 gold medals and 64 medals in total.</span></p><span data-dcnode-id="2233" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2232" instrument_node="">Only six of the countries competed earlier at the 1992 Winter Olympics in Albertville: Armenia, Belarus, Kazakhstan, Russia, Ukraine, and Uzbekistan. The Unified team placed second, three fewer medals than Germany. However, much like the Summer Games, the Unified team had the most decorated medalist in the Winter Games as well, with </span><a data-dcnode-id="2230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Lyubov_Yegorova_%28cross-country_skier%29/" title="Lyubov Yegorova is an honorary citizen of Seversk, Saint Petersburg, and Tomsk Oblast."><span data-dcnode-id="2231" instrument_node="">Lyubov Yegorova</span></a><span data-dcnode-id="2229" instrument_node=""> of Russia, a cross-country skier winning five total medals.</span><sup data-dcnode-id="2226"><a data-dcnode-id="2227" href="#Ref-159"><span data-dcnode-id="2228" instrument_node="">[159]</span></a></sup></p><span data-dcnode-id="2224" instrument_node="">
</span><h3 data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Telecommunications </span></h3><span data-dcnode-id="2221" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2220" instrument_node="">The Soviet Union's </span><a data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/List_of_country_calling_codes/"><span data-dcnode-id="2219" instrument_node="">calling code</span></a><span data-dcnode-id="2217" instrument_node=""> of </span><a data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Telephone_numbers_in_the_Soviet_Union/"><span data-dcnode-id="2216" instrument_node="">+7</span></a><span data-dcnode-id="2214" instrument_node=""> is still used by </span><a data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russia/" title="Russia is a transcontinental country spanning Eastern Europe and Northern Asia."><span data-dcnode-id="2213" instrument_node="">Russia</span></a><span data-dcnode-id="2211" instrument_node=""> and </span><a data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kazakhstan/" title="Kazakhstan is the world's largest landlocked country, the world's largest Muslim-majority country by land area, and the ..."><span data-dcnode-id="2210" instrument_node="">Kazakhstan</span></a><span data-dcnode-id="2208" instrument_node="">. Between 1993 and 1997, many newly-independent republics implemented their own </span><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Telephone_numbering_plan/" title="A telephone numbering plan is a type of numbering scheme used in telecommunication to assign telephone number s to ..."><span data-dcnode-id="2207" instrument_node="">numbering plans</span></a><span data-dcnode-id="2205" instrument_node=""> such as Belarus (</span><a data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Telephone_numbers_in_Belarus/"><span data-dcnode-id="2204" instrument_node="">+375</span></a><span data-dcnode-id="2202" instrument_node="">) and </span><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukraine/" title="Ukraine is a country in Eastern Europe."><span data-dcnode-id="2201" instrument_node="">Ukraine</span></a><span data-dcnode-id="2199" instrument_node=""> (</span><a data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Telephone_numbers_in_Ukraine/"><span data-dcnode-id="2198" instrument_node="">+380</span></a><span data-dcnode-id="2196" instrument_node="">). The </span><a data-dcnode-id="2194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Domain_name/" title="A domain name is an identification string that defines a realm of administrative autonomy, authority or control within the ..."><span data-dcnode-id="2195" instrument_node="">Internet domain</span></a><span data-dcnode-id="2193" instrument_node=""> </span><i data-dcnode-id="2190"><a data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/.su/" title=".su is an Internet country code top-level domain that was designated for the Soviet Union on 19 September 1990."><span data-dcnode-id="2192" instrument_node="">.su</span></a></i><span data-dcnode-id="2189" instrument_node=""> remains in use alongside the internet domains of the newly-created countries.</span></p><span data-dcnode-id="2187" instrument_node="">
</span><h3 data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Glasnost and "Memorial" </span></h3><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2161"><span data-dcnode-id="2183" instrument_node="">The lifting of total censorship and communist propaganda led to disclosure to public of such political and historical issues as the </span><a data-dcnode-id="2181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Molotov-Ribbentrop_Pact/" title="The Molotov–Ribbentrop Pact was a non-aggression pact between Nazi Germany and the Soviet Union that enabled those two ..."><span data-dcnode-id="2182" instrument_node="">Molotov-Ribbentrop Pact</span></a><span data-dcnode-id="2180" instrument_node="">, the </span><a data-dcnode-id="2178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Katyn_massacre/" title="The Katyn massacre was a series of mass executions of nearly 22,000 Polish military officer s and intelligentsia prisoners ..."><span data-dcnode-id="2179" instrument_node="">Katyn massacre</span></a><span data-dcnode-id="2177" instrument_node="">, revision of the </span><a data-dcnode-id="2175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Stalinist_repressions_%28disambiguation%29/" title="Stalinist repressions is a period in Soviet history during the Stalin era."><span data-dcnode-id="2176" instrument_node="">Stalinist repressions</span></a><span data-dcnode-id="2174" instrument_node="">, revision of the </span><a data-dcnode-id="2172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russian_Civil_War/" title="The Russian Civil War was a multi-party civil war in the former Russian Empire sparked by the overthrowing of the monarchy ..."><span data-dcnode-id="2173" instrument_node="">Russian Civil War</span></a><span data-dcnode-id="2171" instrument_node="">, the </span><a data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/White_movement/" title="The White movement was a loose confederation of anti-communist forces that fought the communist Bolsheviks, also known as ..."><span data-dcnode-id="2170" instrument_node="">White movement</span></a><span data-dcnode-id="2168" instrument_node="">, the </span><a data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/New_Economic_Policy/" title="The New Economic Policy was an economic policy of the Soviet Union proposed by Vladimir Lenin in 1921 as a temporary expedient."><span data-dcnode-id="2167" instrument_node="">New Economic Policy</span></a><span data-dcnode-id="2165" instrument_node="">, the 1986 </span><a data-dcnode-id="2163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Chernobyl_disaster/" title="The Chernobyl disaster was a nuclear accident that occurred on 26 April 1986 at the No."><span data-dcnode-id="2164" instrument_node="">Chernobyl disaster</span></a><span data-dcnode-id="2162" instrument_node="">, censorship, pacification and procrastination by the Soviet authorities.</span></p><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2155"><span data-dcnode-id="2159" instrument_node="">In 1989, the Soviet Union established a civil rights society, </span><a data-dcnode-id="2157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Memorial_%28society%29/" title="Memorial is an international human rights organisation."><span data-dcnode-id="2158" instrument_node="">Memorial</span></a><span data-dcnode-id="2156" instrument_node="">, which specialized in research and recovery of memory for victims of political repressions as well as support for a general human rights movement.</span></p><span data-dcnode-id="2154" instrument_node="">
</span><h2 data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Chronology of declarations</span></h2><span data-dcnode-id="2151" instrument_node="">
</span><p data-dcnode-id="2145"><i data-dcnode-id="2146"><span data-dcnode-id="2150" instrument_node="">States with </span><a data-dcnode-id="2148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/List_of_states_with_limited_recognition/"><span data-dcnode-id="2149" instrument_node="">limited recognition</span></a><span data-dcnode-id="2147" instrument_node=""> are shown in italics.</span></i></p><span data-dcnode-id="2144" instrument_node="">

n></h2><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1726"><span data-dcnode-id="1733" instrument_node="">See main article: </span><a data-dcnode-id="1731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/article/"><span data-dcnode-id="1732" instrument_node="">article</span></a><span data-dcnode-id="1730" instrument_node=""> and </span><a data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Post-Soviet_states/"><span data-dcnode-id="1729" instrument_node="">Post-Soviet states</span></a><span data-dcnode-id="1727" instrument_node="">.</span></p><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1699"><span data-dcnode-id="1724" instrument_node="">In </span><a data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Armenia/" title="Armenia is a landlocked country located in the Armenian Highlands of Western Asia."><span data-dcnode-id="1723" instrument_node="">Armenia</span></a><span data-dcnode-id="1721" instrument_node="">, 12% of respondents said the Soviet collapse did good, while 66% said it did harm. In </span><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kyrgyzstan/" title="Kyrgyzstan is bordered by Kazakhstan to the north, Uzbekistan to the west, Tajikistan to the south, and China to the east."><span data-dcnode-id="1720" instrument_node="">Kyrgyzstan</span></a><span data-dcnode-id="1718" instrument_node="">, 16% of respondents said the Soviet collapse did good, while 61% said it did harm.</span><sup data-dcnode-id="1715"><a data-dcnode-id="1716" href="#Ref-160"><span data-dcnode-id="1717" instrument_node="">[160]</span></a></sup><span data-dcnode-id="1714" instrument_node=""> Ever since the Soviet collapse, annual polling by the </span><a data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Levada_Center/" title="The Levada Center is a Russian independent, nongovernmental polling and sociological research organization."><span data-dcnode-id="1713" instrument_node="">Levada Center</span></a><span data-dcnode-id="1711" instrument_node=""> has shown that over 50 percent of Russia's population regretted its collapse, the only exception being in 2012. A 2018 Levada Center poll showed that 66% of Russians lamented the fall of the Soviet Union.</span><sup data-dcnode-id="1708"><a data-dcnode-id="1709" href="#Ref-161"><span data-dcnode-id="1710" instrument_node="">[161]</span></a></sup><span data-dcnode-id="1707" instrument_node=""> According to a 2014 poll, 57 percent of citizens of Russia regretted the collapse of the Soviet Union, while 30 percent said otherwise. Elderly people tended to be more nostalgic than younger Russians. In a similar poll held in February 2005, 50% of respondents in Ukraine stated they regretted the disintegration of the Soviet Union.</span><sup data-dcnode-id="1704"><a data-dcnode-id="1705" href="#Ref-162"><span data-dcnode-id="1706" instrument_node="">[162]</span></a></sup><span data-dcnode-id="1703" instrument_node=""> However, a similar poll conducted in 2016 showed only 35% Ukrainians regretting the Soviet collapse and 50% not regretting it.</span><sup data-dcnode-id="1700"><a data-dcnode-id="1701" href="#Ref-163"><span data-dcnode-id="1702" instrument_node="">[163]</span></a></sup></p><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1697" instrument_node="">The breakdown of economic ties that followed the Soviet collapse led to a severe economic crisis and catastrophic fall in the </span><a data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/standard_of_living/" title="Standard of living is the level of income, comforts and services available, generally applied to a society or location, ..."><span data-dcnode-id="1696" instrument_node="">standard of living</span></a><span data-dcnode-id="1694" instrument_node=""> in </span><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/post-Soviet_states/"><span data-dcnode-id="1693" instrument_node="">post-Soviet states</span></a><span data-dcnode-id="1691" instrument_node=""> and the former </span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Eastern_Bloc/" title="The Eastern Bloc was often called the Second World, whereas the term &quot; First World &quot; referred to the Western Bloc and &quot; ..."><span data-dcnode-id="1690" instrument_node="">Eastern Bloc</span></a><span data-dcnode-id="1688" instrument_node="">,</span><sup data-dcnode-id="1685"><a data-dcnode-id="1686" href="#Ref-164"><span data-dcnode-id="1687" instrument_node="">[164]</span></a></sup><span data-dcnode-id="1684" instrument_node=""> which was even worse than the </span><a data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Great_Depression/" title="The Great Depression was a severe worldwide economic depression that took place mostly during the 1930s, beginning in the ..."><span data-dcnode-id="1683" instrument_node="">Great Depression</span></a><span data-dcnode-id="1681" instrument_node="">.</span><sup data-dcnode-id="1678"><a data-dcnode-id="1679" href="#Ref-165"><span data-dcnode-id="1680" instrument_node="">[165]</span></a></sup><span data-dcnode-id="1677" instrument_node=""> </span><sup data-dcnode-id="1674"><a data-dcnode-id="1675" href="#Ref-166"><span data-dcnode-id="1676" instrument_node="">[166]</span></a></sup><span data-dcnode-id="1673" instrument_node=""> Poverty and </span><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/economic_inequality/" title="Economic inequality is the Inequality-adjusted Human Development Index, which is a statistic composite index that takes ..."><span data-dcnode-id="1672" instrument_node="">economic inequality</span></a><span data-dcnode-id="1670" instrument_node=""> surged between 1988 and 1989 and between 1993 and 1995, with the </span><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Gini_ratio/" title="Gini coefficient was developed by statistician and sociologist Corrado Gini."><span data-dcnode-id="1669" instrument_node="">Gini ratio</span></a><span data-dcnode-id="1667" instrument_node=""> increasing by an average of 9 points for all former socialist countries.</span><sup data-dcnode-id="1664"><a data-dcnode-id="1665" href="#Ref-167"><span data-dcnode-id="1666" instrument_node="">[167]</span></a></sup><span data-dcnode-id="1663" instrument_node=""> Even before the </span><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1998_Russian_financial_crisis/"><span data-dcnode-id="1662" instrument_node="">1998 Russian financial crisis</span></a><span data-dcnode-id="1660" instrument_node="">, the Russian GDP was half of what it had been in the early 1990s.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1657" instrument_node="">In the decades following the end of the Cold War, only five or six of the post-Soviet states are on a path to joining the wealthy capitalist states of the West, and most are falling behind, some to such an extent that over 50 years will be needed before they catch up to how they were before the end of communism.</span><sup data-dcnode-id="1654"><a data-dcnode-id="1655" href="#Ref-168"><span data-dcnode-id="1656" instrument_node="">[168]</span></a></sup><span data-dcnode-id="1653" instrument_node=""> </span><sup data-dcnode-id="1650"><a data-dcnode-id="1651" href="#Ref-169"><span data-dcnode-id="1652" instrument_node="">[169]</span></a></sup><span data-dcnode-id="1649" instrument_node=""> In a 2001 study by the economist </span><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Steven_Rosefielde/"><span data-dcnode-id="1648" instrument_node="">Steven Rosefielde</span></a><span data-dcnode-id="1646" instrument_node="">, he calculated that there were 3.4&nbsp;million premature deaths in Russia from 1990 to 1998, which he partly blames on the </span><a data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Shock_therapy_%28economics%29/" title="Shock therapy is the sudden release of price and currency controls, withdrawal of state subsidies, and immediate trade ..."><span data-dcnode-id="1645" instrument_node="">"shock therapy"</span></a><span data-dcnode-id="1643" instrument_node=""> that came with the </span><a data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Washington_Consensus/" title="The Washington Consensus is a set of ten economic policy prescriptions considered to constitute the &quot;standard&quot; reform ..."><span data-dcnode-id="1642" instrument_node="">Washington Consensus</span></a><span data-dcnode-id="1640" instrument_node="">.</span><sup data-dcnode-id="1637"><a data-dcnode-id="1638" href="#Ref-170"><span data-dcnode-id="1639" instrument_node="">[170]</span></a></sup></p><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1634" instrument_node="">In the </span><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kitchen_Debate/" title="The Kitchen Debate was a series of impromptu exchanges through interpreters between U."><span data-dcnode-id="1633" instrument_node="">Kitchen Debate</span></a><span data-dcnode-id="1631" instrument_node=""> of 1959, </span><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Nikita_Khrushchev/"><span data-dcnode-id="1630" instrument_node="">Nikita Khrushchev</span></a><span data-dcnode-id="1628" instrument_node=""> claimed that then US Vice-President Richard Nixon's grandchildren would live "under communism," and Nixon claimed that Khrushchev's grandchildren would live under "freedom." In a 1992 interview, Nixon commented that during the debate, he was sure Khrushchev's claim was wrong, but Nixon was not sure that his own assertion was correct. Nixon said that events had proved that he was indeed right because Khrushchev's grandchildren now lived in "freedom" in reference to the recent end of the Soviet Union.</span><sup data-dcnode-id="1625"><a data-dcnode-id="1626" href="#Ref-171"><span data-dcnode-id="1627" instrument_node="">[171]</span></a></sup><span data-dcnode-id="1624" instrument_node=""> Khrushchev's son </span><a data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Sergei_Khrushchev/"><span data-dcnode-id="1623" instrument_node="">Sergei Khrushchev</span></a><span data-dcnode-id="1621" instrument_node=""> was a naturalized American citizen.</span></p><span data-dcnode-id="1619" instrument_node="">
</span><h3 data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">United Nations membership </span></h3><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1605"><span data-dcnode-id="1615" instrument_node="">In a letter dated December 24, 1991, Boris Yeltsin, the </span><a data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russian_President/"><span data-dcnode-id="1614" instrument_node="">Russian President</span></a><span data-dcnode-id="1612" instrument_node="">, informed the </span><a data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/United_Nations_Secretary-General/" title="The secretary-general of the United Nations is the chief administrative officer of the United Nations and head of the United ..."><span data-dcnode-id="1611" instrument_node="">United Nations Secretary-General</span></a><span data-dcnode-id="1609" instrument_node=""> that the membership of the Soviet Union in the </span><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Security_Council/" title="The United Nations Security Council is one of the six principal organs of the United Nations and is charged with ensuring ..."><span data-dcnode-id="1608" instrument_node="">Security Council</span></a><span data-dcnode-id="1606" instrument_node=""> and all other UN organs would be continued by the Russian Federation with the support of the 11 member countries of the Commonwealth of Independent States.</span></p><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1603" instrument_node="">However, the </span><a data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Byelorussian_Soviet_Socialist_Republic/" title="The Byelorussian Soviet Socialist Republic was a republic of the Soviet Union."><span data-dcnode-id="1602" instrument_node="">Byelorussian Soviet Socialist Republic</span></a><span data-dcnode-id="1600" instrument_node=""> and the </span><a data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukrainian_Soviet_Socialist_Republic/" title="The Ukrainian Soviet Socialist Republic was one of the constituent republics of the Soviet Union from the Union's inception ..."><span data-dcnode-id="1599" instrument_node="">Ukrainian Soviet Socialist Republic</span></a><span data-dcnode-id="1597" instrument_node=""> had already joined the UN as original members on October 24, 1945, together with the Soviet Union. After declaring independence, the Ukrainian Soviet Socialist Republic changed its name to </span><a data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukraine/" title="Ukraine is a country in Eastern Europe."><span data-dcnode-id="1596" instrument_node="">Ukraine</span></a><span data-dcnode-id="1594" instrument_node=""> on August 24, 1991, and on September 19, the Byelorussian Soviet Socialist Republic informed the UN that it had changed its name to the Republic of Belarus.</span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">All of the twelve other independent states that were established from the former Soviet republics were admitted to the UN:</span></p><span data-dcnode-id="1589" instrument_node="">
</span><ul data-dcnode-id="1579"><li data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">September 17, 1991: Estonia, Latvia, and Lithuania</span></li><span data-dcnode-id="1586" instrument_node="">
</span><li data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">March 2, 1992: Armenia, Azerbaijan, Kazakhstan, Kyrgyzstan, Moldova, Tajikistan, Turkmenistan, and Uzbekistan</span></li><span data-dcnode-id="1583" instrument_node="">
</span><li data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">July 31, 1992: Georgia</span></li><span data-dcnode-id="1580" instrument_node="">

</span><h2 data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Historiographic explanations</span></h2><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1574" instrument_node="">Historiography on the Soviet collapse can be roughly classified in two groups: </span><a data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/intentionalist_historian/" title="The functionalism–intentionalism debate is a historiographical debate about the origins of the Holocaust as well as most ..."><span data-dcnode-id="1573" instrument_node="">intentionalist</span></a><span data-dcnode-id="1571" instrument_node=""> accounts and </span><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/structuralism/" title="Structuralism is a general theory of culture and methodology that implies that elements of human culture must be understood ..."><span data-dcnode-id="1570" instrument_node="">structuralist</span></a><span data-dcnode-id="1568" instrument_node=""> accounts.</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1565" instrument_node="">Intentionalist accounts contend that Soviet collapse was not inevitable and resulted from the policies and decisions of specific individuals, usually Gorbachev and Yeltsin. One characteristic example of intentionalist writing is the historian </span><a data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Archie_Brown/" title="Archie Brown is a British political scientist."><span data-dcnode-id="1564" instrument_node="">Archie Brown</span></a><span data-dcnode-id="1562" instrument_node="">'s </span><i data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">The Gorbachev Factor</span></i><span data-dcnode-id="1559" instrument_node="">, which argues Gorbachev was the main force in Soviet politics at least from 1985 to 1988 and even later and that he largely spearheaded the political reforms and developments, as opposed to being led by events.</span><sup data-dcnode-id="1556"><a data-dcnode-id="1557" href="#Ref-172"><span data-dcnode-id="1558" instrument_node="">[172]</span></a></sup><span data-dcnode-id="1555" instrument_node=""> That was especially true of the policies of </span><i data-dcnode-id="1552"><a data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/perestroika/" title="Perestroika was a political movement for reform within the Communist Party of the Soviet Union during the late 1980s widely ..."><span data-dcnode-id="1554" instrument_node="">perestroika</span></a></i><span data-dcnode-id="1551" instrument_node=""> and </span><i data-dcnode-id="1548"><a data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/glasnost/" title="Glasnost is included in the English dictionary."><span data-dcnode-id="1550" instrument_node="">glasnost</span></a></i><span data-dcnode-id="1547" instrument_node="">, market initiatives, and </span><a data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/foreign_policy/" title="A foreign policy is its objectives and activities in relation to its interactions with other states, unions, and other ..."><span data-dcnode-id="1546" instrument_node="">foreign policy</span></a><span data-dcnode-id="1544" instrument_node=""> stance, as the political scientist </span><a data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/George_W._Breslauer/" title="George W. Breslauer is an academic in the field of social sciences and the former executive vice chancellor and provost of ..."><span data-dcnode-id="1543" instrument_node="">George Breslauer</span></a><span data-dcnode-id="1541" instrument_node=""> has seconded by labelling Gorbachev a "man of the events".</span><sup data-dcnode-id="1538"><a data-dcnode-id="1539" href="#Ref-173"><span data-dcnode-id="1540" instrument_node="">[173]</span></a></sup><span data-dcnode-id="1537" instrument_node=""> In a slightly-different vein, David Kotz and </span><a data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Fred_Weir/" title="Fred Weir is a Canadian journalist who lives in Moscow and specializes in Russia n affairs."><span data-dcnode-id="1536" instrument_node="">Fred Weir</span></a><span data-dcnode-id="1534" instrument_node=""> have contended that Soviet elites were responsible for spurring on both nationalism and capitalism from which they could personally benefit, which is demonstrated also by their continued presence in the higher economic and political echelons of post-Soviet republics.</span><sup data-dcnode-id="1531"><a data-dcnode-id="1532" href="#Ref-174"><span data-dcnode-id="1533" instrument_node="">[174]</span></a></sup></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1528" instrument_node="">In contrast, structuralist accounts take a more deterministic view in which Soviet dissolution was an outcome of deeply-rooted structural issues, which planted a time bomb. For example, Edward Walker has argued that minority nationalities were denied power at the Union level, confronted by a culturally-destabilizing form of economic </span><a data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Modernization_theory/" title="Modernization theory is used to explain the process of modernization within societies."><span data-dcnode-id="1527" instrument_node="">modernization</span></a><span data-dcnode-id="1525" instrument_node="">, and subjected to a certain amount of </span><a data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russification/" title="Russification is a form of cultural assimilation in which non- Russians, whether involuntarily or voluntarily, give up their ..."><span data-dcnode-id="1524" instrument_node="">Russification</span></a><span data-dcnode-id="1522" instrument_node="">, but they were at the same time strengthened by several policies pursued by the Soviet government (</span><a data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/indigenization/" title="Indigenization is the act of making something more native; transformation of some service, idea, etc."><span data-dcnode-id="1521" instrument_node="">indigenization</span></a><span data-dcnode-id="1519" instrument_node=""> of leadership, support for local languages, etc.). Over time, they created conscious nations. Furthermore, the basic legitimating myth of the Soviet federative system (that it was a voluntary and mutual union of allied peoples) eased the task of secession and independence.</span><sup data-dcnode-id="1516"><a data-dcnode-id="1517" href="#Ref-175"><span data-dcnode-id="1518" instrument_node="">[175]</span></a></sup><span data-dcnode-id="1515" instrument_node=""> On January 25, 2016, Russian President </span><a data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Vladimir_Putin/"><span data-dcnode-id="1514" instrument_node="">Vladimir Putin</span></a><span data-dcnode-id="1512" instrument_node=""> supported that view by calling Lenin's support of the right of secession for the Soviet republics a "delayed-action bomb".</span><sup data-dcnode-id="1509"><a data-dcnode-id="1510" href="#Ref-176"><span data-dcnode-id="1511" instrument_node="">[176]</span></a></sup></p><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1506" instrument_node="">An opinion piece by Gorbachev in April 2006 stated: "The </span><a data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Chernobyl_disaster/" title="The Chernobyl disaster was a nuclear accident that occurred on 26 April 1986 at the No."><span data-dcnode-id="1505" instrument_node="">nuclear meltdown at Chernobyl</span></a><span data-dcnode-id="1503" instrument_node=""> 20 years ago this month, even more than my launch of perestroika, was perhaps the real cause of the collapse of the Soviet Union."</span><sup data-dcnode-id="1500"><a data-dcnode-id="1501" href="#Ref-177"><span data-dcnode-id="1502" instrument_node="">[177]</span></a></sup><span data-dcnode-id="1499" instrument_node=""> </span><sup data-dcnode-id="1496"><a data-dcnode-id="1497" href="#Ref-178"><span data-dcnode-id="1498" instrument_node="">[178]</span></a></sup></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1493" instrument_node="">The end of the Soviet Union caught many people by surprise. Before 1991, many </span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/predictions_of_Soviet_collapse/"><span data-dcnode-id="1492" instrument_node="">thought that Soviet collapse was impossible or unlikely</span></a><span data-dcnode-id="1490" instrument_node="">.</span><sup data-dcnode-id="1487"><a data-dcnode-id="1488" href="#Ref-179"><span data-dcnode-id="1489" instrument_node="">[179]</span></a></sup></p><span data-dcnode-id="1485" instrument_node="">
