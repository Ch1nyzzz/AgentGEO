span></a><span data-dcnode-id="4412" instrument_node="">, loosely based on the </span><a data-dcnode-id="4410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Estonian_Popular_Front/" title="The Popular Front of Estonia was a political organisation in Estonia in the late 1980s and early 1990s."><span data-dcnode-id="4411" instrument_node="">Estonian Popular Front</span></a><span data-dcnode-id="4409" instrument_node="">.</span><sup data-dcnode-id="4406"><a data-dcnode-id="4407" href="#Ref-35"><span data-dcnode-id="4408" instrument_node="">[35]</span></a></sup><span data-dcnode-id="4405" instrument_node=""> On September 17, when gun battles broke out between the Armenians and Azerbaijanis near </span><a data-dcnode-id="4403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Stepanakert/" title="Stepanakert is the de facto capital and the largest city of the breakaway state Republic of Artsakh, though internationally ..."><span data-dcnode-id="4404" instrument_node="">Stepanakert</span></a><span data-dcnode-id="4402" instrument_node="">, two soldiers were killed and more than two dozen injured.</span><sup data-dcnode-id="4399"><a data-dcnode-id="4400" href="#Ref-36"><span data-dcnode-id="4401" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4398" instrument_node=""> This led to almost tit-for-tat ethnic polarization in Nagorno-Karabakh's two main towns: the Azerbaijani minority was expelled from </span><a data-dcnode-id="4396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Stepanakert/" title="Stepanakert is the de facto capital and the largest city of the breakaway state Republic of Artsakh, though internationally ..."><span data-dcnode-id="4397" instrument_node="">Stepanakert</span></a><span data-dcnode-id="4395" instrument_node="">, and the Armenian minority was expelled from </span><a data-dcnode-id="4393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Shushi/" title="Shusha is a city in Azerbaijan, in the disputed region of Nagorno-Karabakh."><span data-dcnode-id="4394" instrument_node="">Shusha</span></a><span data-dcnode-id="4392" instrument_node="">.</span><sup data-dcnode-id="4389"><a data-dcnode-id="4390" href="#Ref-37"><span data-dcnode-id="4391" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4388" instrument_node=""> On November 17, 1988, in response to the exodus of tens of thousands of Azerbaijanis from Armenia, a series of mass demonstrations began in </span><a data-dcnode-id="4386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Baku/" title="Baku is the capital and largest city of Azerbaijan, as well as the largest city on the Caspian Sea and of the Caucasus region."><span data-dcnode-id="4387" instrument_node="">Baku</span></a><span data-dcnode-id="4385" instrument_node="">'s Lenin Square, lasting 18 days and attracting half a million demonstrators. On December 5, 1988, the Soviet militia moved in, cleared the square by force, and imposed a curfew that lasted ten months.</span><sup data-dcnode-id="4382"><a data-dcnode-id="4383" href="#Ref-38"><span data-dcnode-id="4384" instrument_node="">[38]</span></a></sup></p><span data-dcnode-id="4380" instrument_node="">
</span><p data-dcnode-id="4362"><span data-dcnode-id="4379" instrument_node="">The rebellion of fellow Armenians in Nagorno-Karabakh had an immediate effect in Armenia itself. Daily demonstrations, which began in the Armenian capital </span><a data-dcnode-id="4377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Yerevan/" title="Yerevan is the capital and largest city of Armenia and one of the world's oldest continuously inhabited cities."><span data-dcnode-id="4378" instrument_node="">Yerevan</span></a><span data-dcnode-id="4376" instrument_node=""> on February 18, initially attracted few people, but each day the Nagorno-Karabakh issue became increasingly prominent and numbers swelled. On February 20, a 30,000-strong crowd demonstrated in the </span><a data-dcnode-id="4374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Freedom_Square%252c_Yerevan/"><span data-dcnode-id="4375" instrument_node="">Theater Square</span></a><span data-dcnode-id="4373" instrument_node="">, by February 22, there were 100,000, the next day 300,000, and a transport strike was declared, by February 25, there were close to a million demonstrators—more than a quarter of Armenia's population.</span><sup data-dcnode-id="4370"><a data-dcnode-id="4371" href="#Ref-39"><span data-dcnode-id="4372" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4369" instrument_node=""> This was the first of the large, peaceful public demonstrations that would become a feature of communism's overthrow in Prague, Berlin, and, ultimately, Moscow. Leading Armenian intellectuals and nationalists, including the future first president of independent Armenia </span><a data-dcnode-id="4367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Levon_Ter-Petrossian/"><span data-dcnode-id="4368" instrument_node="">Levon Ter-Petrossian</span></a><span data-dcnode-id="4366" instrument_node="">, formed the eleven-member </span><a data-dcnode-id="4364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Karabakh_Committee/" title="Karabakh Committee was a group of Armenian intellectuals recognized by many Armenians as the de facto leaders in the late 1980s."><span data-dcnode-id="4365" instrument_node="">Karabakh Committee</span></a><span data-dcnode-id="4363" instrument_node=""> to lead and organize the new movement.</span></p><span data-dcnode-id="4361" instrument_node="">
</span><p data-dcnode-id="4324"><span data-dcnode-id="4360" instrument_node="">On the same day, when Gorbachev replaced Baghirov by Vezirov as First Secretary of the Azerbaijan Communist Party, he also replaced </span><a data-dcnode-id="4358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Karen_Demirchian/"><span data-dcnode-id="4359" instrument_node="">Karen Demirchian</span></a><span data-dcnode-id="4357" instrument_node=""> by Suren Harutyunyan as First Secretary of the </span><a data-dcnode-id="4355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Communist_Party_of_Armenia_%28Soviet_Union%29/" title="The Communist Party of Armenia was a branch of the Communist Party of the Soviet Union within the Armenian SSR, and as such, ..."><span data-dcnode-id="4356" instrument_node="">Communist Party of Armenia</span></a><span data-dcnode-id="4354" instrument_node="">. However, Harutyunyan quickly decided to run before the nationalist wind and on May 28, allowed Armenians to unfurl the red-blue-orange </span><a data-dcnode-id="4352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Flag_of_Armenia/" title="The flag of Armenia was passed by the National Assembly of Armenia."><span data-dcnode-id="4353" instrument_node="">First Armenian Republic flag</span></a><span data-dcnode-id="4351" instrument_node=""> for the first time in almost 70 years.</span><sup data-dcnode-id="4348"><a data-dcnode-id="4349" href="#Ref-40"><span data-dcnode-id="4350" instrument_node="">[40]</span></a></sup><span data-dcnode-id="4347" instrument_node=""> On June 15, 1988, the Armenian Supreme Soviet adopted a resolution formally approving the idea of Nagorno-Karabakh joining Armenia.</span><sup data-dcnode-id="4344"><a data-dcnode-id="4345" href="#Ref-41"><span data-dcnode-id="4346" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4343" instrument_node=""> Armenia, formerly one of the most loyal Republics, had suddenly turned into the leading rebel republic. On July 5, 1988, when a contingent of troops was sent in to remove demonstrators by force from Yerevan's </span><a data-dcnode-id="4341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Zvartnots_International_Airport/" title="Zvartnots International Airport is located near Zvartnots, 15km west of Yerevan, the capital city of Armenia."><span data-dcnode-id="4342" instrument_node="">Zvartnots International Airport</span></a><span data-dcnode-id="4340" instrument_node="">, shots were fired and one student protester was killed.</span><sup data-dcnode-id="4337"><a data-dcnode-id="4338" href="#Ref-42"><span data-dcnode-id="4339" instrument_node="">[42]</span></a></sup><span data-dcnode-id="4336" instrument_node=""> In September, further large demonstrations in Yerevan led to the deployment of armored vehicles.</span><sup data-dcnode-id="4333"><a data-dcnode-id="4334" href="#Ref-43"><span data-dcnode-id="4335" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4332" instrument_node=""> In the autumn of 1988 almost all of the 200,000 Azerbaijani minority in Armenia was expelled by Armenian nationalists, with over 100 killed in the process.</span><sup data-dcnode-id="4329"><a data-dcnode-id="4330" href="#Ref-44"><span data-dcnode-id="4331" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4328" instrument_node=""> That, after the Sumgait pogrom earlier that year, which had been carried out by Azerbaijanis to ethnic Armenians and led to the expulsion of Armenians from Azerbaijan. On November 25, 1988, a military commandant took control of Yerevan as the Soviet government moved to prevent further ethnic violence.</span><sup data-dcnode-id="4325"><a data-dcnode-id="4326" href="#Ref-45"><span data-dcnode-id="4327" instrument_node="">[45]</span></a></sup></p><span data-dcnode-id="4323" instrument_node="">
</span><p data-dcnode-id="4312"><span data-dcnode-id="4322" instrument_node="">On December 7, 1988, the </span><a data-dcnode-id="4320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Spitak_earthquake/" title="The 1988 Armenian earthquake is vulnerable to large and destructive earthquakes and is part of a larger active seismic belt ..."><span data-dcnode-id="4321" instrument_node="">Spitak earthquake</span></a><span data-dcnode-id="4319" instrument_node=""> struck, killing an estimated 25,000 to 50,000 people. When Gorbachev rushed back from a visit to the United States, he was so angered with being confronted by protesters calling for Nagorno-Karabakh to be made part of the Armenian Republic during a natural disaster that on December 11, 1988, he ordered for the entire </span><a data-dcnode-id="4317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Karabakh_Committee/" title="Karabakh Committee was a group of Armenian intellectuals recognized by many Armenians as the de facto leaders in the late 1980s."><span data-dcnode-id="4318" instrument_node="">Karabakh Committee</span></a><span data-dcnode-id="4316" instrument_node=""> to be arrested.</span><sup data-dcnode-id="4313"><a data-dcnode-id="4314" href="#Ref-46"><span data-dcnode-id="4315" instrument_node="">[46]</span></a></sup></p><span data-dcnode-id="4311" instrument_node="">
</span><p data-dcnode-id="4300"><span data-dcnode-id="4310" instrument_node="">In </span><a data-dcnode-id="4308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Tbilisi/" title="Tbilisi was founded in the 5th century AD by Vakhtang I of Iberia, and since then has served as the capital of various ..."><span data-dcnode-id="4309" instrument_node="">Tbilisi</span></a><span data-dcnode-id="4307" instrument_node="">, the capital of </span><a data-dcnode-id="4305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Soviet_Georgia/" title="The Georgian Soviet Socialist Republic was one of the republics of the Soviet Union from its second occupation in 1921 to ..."><span data-dcnode-id="4306" instrument_node="">Soviet Georgia</span></a><span data-dcnode-id="4304" instrument_node="">, many demonstrators camped out in front of the republic's legislature in November 1988 calling for Georgia's independence and in support of Estonia's declaration of sovereignty.</span><sup data-dcnode-id="4301"><a data-dcnode-id="4302" href="#Ref-47"><span data-dcnode-id="4303" instrument_node="">[47]</span></a></sup></p><span data-dcnode-id="4299" instrument_node="">
</span><h4 data-dcnode-id="4297"><span data-dcnode-id="4298" instrument_node="">Western republics </span></h4><span data-dcnode-id="4296" instrument_node="">
</span><p data-dcnode-id="4273"><span data-dcnode-id="4295" instrument_node="">Beginning in February 1988, the Democratic Movement of </span><a data-dcnode-id="4293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Moldova/" title="Moldova is a country in Eastern Europe."><span data-dcnode-id="4294" instrument_node="">Moldova</span></a><span data-dcnode-id="4292" instrument_node=""> (formerly Moldavia) organized public meetings, demonstrations, and song festivals, which gradually grew in size and intensity. In the streets, the center of public manifestations was the </span><a data-dcnode-id="4290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Stephen_the_Great_Monument_in_Chi%25C5%259Fin%25C4%2583u/" title="The Stephen the Great Monument is a prominent monument in Chișinău, Moldova."><span data-dcnode-id="4291" instrument_node="">Stephen the Great Monument in Chişinău</span></a><span data-dcnode-id="4289" instrument_node="">, and the adjacent park harboring </span><i data-dcnode-id="4287"><span data-dcnode-id="4288" instrument_node="">Aleea Clasicilor</span></i><span data-dcnode-id="4286" instrument_node=""> (The "</span><a data-dcnode-id="4284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Alley_of_Classics%252c_Chi%25C8%2599in%25C4%2583u/"><span data-dcnode-id="4285" instrument_node="">Alley of Classics</span></a><span data-dcnode-id="4283" instrument_node=""> [of Literature]"). On January 15, 1988, in a tribute to </span><a data-dcnode-id="4281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Mihai_Eminescu/" title="Mihai Eminescu was a Romanian Romantic poet from Moldavia, novelist, and journalist, generally regarded as the most famous ..."><span data-dcnode-id="4282" instrument_node="">Mihai Eminescu</span></a><span data-dcnode-id="4280" instrument_node=""> at his bust on the Aleea Clasicilor, </span><a data-dcnode-id="4278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Anatol_%25C5%259Ealaru/"><span data-dcnode-id="4279" instrument_node="">Anatol Şalaru</span></a><span data-dcnode-id="4277" instrument_node=""> submitted a proposal to continue the meetings. In the public discourse, the movement called for national awakening, freedom of speech, the revival of Moldovan traditions, and for the attainment of official status for the </span><a data-dcnode-id="4275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Romanian_language/"><span data-dcnode-id="4276" instrument_node="">Romanian language</span></a><span data-dcnode-id="4274" instrument_node=""> and return to the Latin alphabet. The transition from "movement" (an informal association) to "front" (a formal association) was seen as a natural "upgrade" once a movement gained momentum with the public, and the Soviet authorities no longer dared to crack down on it.</span></p><span data-dcnode-id="4272" instrument_node="">
</span><p data-dcnode-id="4252"><span data-dcnode-id="4271" instrument_node="">On April 26, 1988, about 500 people participated in a march organized by the Ukrainian Cultural Club on Kyiv's </span><a data-dcnode-id="4269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Khreschatyk/" title="Khreshchatyk is the main street of Kyiv, Ukraine."><span data-dcnode-id="4270" instrument_node="">Khreschatyk</span></a><span data-dcnode-id="4268" instrument_node=""> Street to mark the second anniversary of the Chernobyl nuclear disaster, carrying placards with slogans like "Openness and Democracy to the End". Between May and June 1988, </span><a data-dcnode-id="4266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Catholic_Church_in_Ukraine/" title="The Catholic Church in Ukraine is part of the worldwide Catholic Church, under the spiritual leadership of the Pope in Rome."><span data-dcnode-id="4267" instrument_node="">Ukrainian Catholics</span></a><span data-dcnode-id="4265" instrument_node=""> in western Ukraine celebrated the Millennium of Christianity in </span><a data-dcnode-id="4263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kyivan_Rus/" title="Kievan Rus' was Prince Oleg."><span data-dcnode-id="4264" instrument_node="">Kyivan Rus</span></a><span data-dcnode-id="4262" instrument_node=""> in secret by holding services in the forests of Buniv, </span><a data-dcnode-id="4260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kalush%252c_Ukraine/"><span data-dcnode-id="4261" instrument_node="">Kalush</span></a><span data-dcnode-id="4259" instrument_node="">, Hoshi, and Zarvanytsia. On June 5, 1988, as the official celebrations of the Millennium were held in Moscow, the Ukrainian Cultural Club hosted its own observances in Kyiv at the monument to </span><a data-dcnode-id="4257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/St._Volodymyr_the_Great/"><span data-dcnode-id="4258" instrument_node="">St. Volodymyr the Great</span></a><span data-dcnode-id="4256" instrument_node="">, the grand prince of </span><a data-dcnode-id="4254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kyivan_Rus/" title="Kievan Rus' was Prince Oleg."><span data-dcnode-id="4255" instrument_node="">Kyivan Rus</span></a><span data-dcnode-id="4253" instrument_node="">.</span></p><span data-dcnode-id="4251" instrument_node="">
</span><p data-dcnode-id="4243"><span data-dcnode-id="4250" instrument_node="">On June 16, 1988, 6,000 to 8,000 people gathered in Lviv to hear speakers declare no confidence in the local list of delegates to the 19th Communist Party conference, to begin on June 29. On June 21, a rally in Lviv attracted 50,000 people who had heard about a revised delegate list. Authorities attempted to disperse the rally in front of Druzhba Stadium. On July 7, 10,000 to 20,000 people witnessed the launch of the Democratic Front to Promote Perestroika. On July 17, a group of 10,000 gathered in the village </span><a data-dcnode-id="4248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Zarvanytsia%252c_Terebovlia_Raion/" title="Zarvanytsia is a small village in the Eparchy of Ternopil-Zboriv."><span data-dcnode-id="4249" instrument_node="">Zarvanytsia</span></a><span data-dcnode-id="4247" instrument_node=""> for Millennium services celebrated by Ukrainian Greek-Catholic Bishop Pavlo Vasylyk. The militia tried to disperse attendees, but it turned out to be the largest gathering of Ukrainian Catholics since Stalin outlawed the Church in 1946. On August 4, which came to be known as "Bloody Thursday", local authorities violently suppressed a demonstration organized by the Democratic Front to Promote Perestroika. Forty-one people were detained, fined, or sentenced to 15 days of administrative arrest. On September 1, local authorities violently displaced 5,000 students at a public meeting lacking official permission at </span><a data-dcnode-id="4245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Lviv_University/" title="The University of Lviv is the oldest institution of higher learning in present-day Ukraine dating from 1661 when John II ..."><span data-dcnode-id="4246" instrument_node="">Ivan Franko State University</span></a><span data-dcnode-id="4244" instrument_node="">.</span></p><span data-dcnode-id="4242" instrument_node="">
</span><p data-dcnode-id="4218"><span data-dcnode-id="4241" instrument_node="">On November 13, 1988, approximately 10,000 people attended an officially sanctioned meeting organized by the cultural heritage organization </span><i data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">Spadschyna</span></i><span data-dcnode-id="4238" instrument_node="">, the </span><a data-dcnode-id="4236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kyiv_University/" title="Taras Shevchenko National University of Kyiv is located in Kyiv, the capital of Ukraine."><span data-dcnode-id="4237" instrument_node="">Kyiv University</span></a><span data-dcnode-id="4235" instrument_node=""> student club </span><i data-dcnode-id="4232"><a data-dcnode-id="4233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Hromada/" title="Hromada is a basic unit of administrative division in Ukraine, similar to a municipality."><span data-dcnode-id="4234" instrument_node="">Hromada</span></a></i><span data-dcnode-id="4231" instrument_node="">, and the environmental groups </span><i data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">Zelenyi Svit</span></i><span data-dcnode-id="4228" instrument_node=""> ("Green World") and </span><i data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">Noosfera</span></i><span data-dcnode-id="4225" instrument_node="">, to focus on ecological issues. From November 14–18, 15 Ukrainian activists were among the 100 human-, national- and religious-rights advocates invited to discuss human rights with Soviet officials and a visiting delegation of the U.S. Commission on Security and Cooperation in Europe (also known as the Helsinki Commission). On December 10, hundreds gathered in Kyiv to observe </span><a data-dcnode-id="4223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/International_Human_Rights_Day/" title="Human Rights Day is celebrated annually around the world on 10 December every year."><span data-dcnode-id="4224" instrument_node="">International Human Rights Day</span></a><span data-dcnode-id="4222" instrument_node=""> at a rally organized by the Democratic Union. The unauthorized gathering resulted in the detention of local activists.</span><sup data-dcnode-id="4219"><a data-dcnode-id="4220" href="#Ref-48"><span data-dcnode-id="4221" instrument_node="">[48]</span></a></sup></p><span data-dcnode-id="4217" instrument_node="">
</span><p data-dcnode-id="4189"><span data-dcnode-id="4216" instrument_node="">The </span><a data-dcnode-id="4214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Belarusian_Popular_Front/" title="The Belarusian Popular Front was a social and political movement in Belarus in late 1980s and the 1990s which led Belarus to ..."><span data-dcnode-id="4215" instrument_node="">Belarusian Popular Front</span></a><span data-dcnode-id="4213" instrument_node=""> was established in 1988 as a political party and cultural movement for democracy and independence, similar to the Baltic republics' popular fronts. The discovery of mass graves in </span><a data-dcnode-id="4211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kurapaty/" title="Kurapaty is a wooded area on the outskirts of Minsk, Belarus, in which a vast number of people were executed between 1937 ..."><span data-dcnode-id="4212" instrument_node="">Kurapaty</span></a><span data-dcnode-id="4210" instrument_node=""> outside </span><a data-dcnode-id="4208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Minsk/" title="Minsk is the capital and the largest city of Belarus, located on the Svislach and the now subterranean Niamiha rivers."><span data-dcnode-id="4209" instrument_node="">Minsk</span></a><span data-dcnode-id="4207" instrument_node=""> by historian </span><a data-dcnode-id="4205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Zianon_Pazniak/"><span data-dcnode-id="4206" instrument_node="">Zianon Pazniak</span></a><span data-dcnode-id="4204" instrument_node="">, the Belarusian Popular Front's first leader, gave additional momentum to the pro-democracy and pro-independence movement in Belarus.</span><sup data-dcnode-id="4201"><a data-dcnode-id="4202" href="#Ref-49"><span data-dcnode-id="4203" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4200" instrument_node=""> It claimed that the </span><a data-dcnode-id="4198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/NKVD/" title="The NKVD was the interior ministry of the Soviet Union."><span data-dcnode-id="4199" instrument_node="">NKVD</span></a><span data-dcnode-id="4197" instrument_node=""> performed secret killings in Kurapaty.</span><sup data-dcnode-id="4194"><a data-dcnode-id="4195" href="#Ref-50"><span data-dcnode-id="4196" instrument_node="">[50]</span></a></sup><span data-dcnode-id="4193" instrument_node=""> Initially the Front had significant visibility because its numerous public actions almost always ended in clashes with the police and the </span><a data-dcnode-id="4191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/KGB/" title="The KGB was the main security agency for the Soviet Union from 13 March 1954 until 3 December 1991."><span data-dcnode-id="4192" instrument_node="">KGB</span></a><span data-dcnode-id="4190" instrument_node="">.</span></p><span data-dcnode-id="4188" instrument_node="">
</span><h3 data-dcnode-id="4186"><span data-dcnode-id="4187" instrument_node="">1989 </span></h3><span data-dcnode-id="4185" instrument_node="">
</span><h4 data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">Moscow: limited democratization </span></h4><span data-dcnode-id="4182" instrument_node="">
</span><p data-dcnode-id="4177"><span data-dcnode-id="4181" instrument_node="">Spring 1989 saw the people of the Soviet Union exercising a democratic choice, albeit limited, for the first time since 1917, when they elected the new Congress of People's Deputies. Just as important was the uncensored live TV coverage of the legislature's deliberations, where people witnessed the previously feared Communist leadership being questioned and held accountable. This example fueled a limited experiment with democracy in </span><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Poland/" title="Poland is a country in Central Europe."><span data-dcnode-id="4180" instrument_node="">Poland</span></a><span data-dcnode-id="4178" instrument_node="">, which quickly led to the toppling of the Communist government in Warsaw that summer – which in turn sparked uprisings that overthrew governments in the other five Warsaw Pact countries before the end of 1989, the year the Berlin Wall fell.</span></p><span data-dcnode-id="4176" instrument_node="">
</span><p data-dcnode-id="4161"><span data-dcnode-id="4175" instrument_node="">This was also the year that </span><a data-dcnode-id="4173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/CNN/" title="The CNN was the first television channel to provide 24-hour news coverage and the first all-news television channel in the ..."><span data-dcnode-id="4174" instrument_node="">CNN</span></a><span data-dcnode-id="4172" instrument_node=""> became the first non-Soviet broadcaster allowed to beam its TV news programs to Moscow. Officially, CNN was available only to foreign guests in the </span><a data-dcnode-id="4170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Savoy_Hotel_%28Moscow%29/"><span data-dcnode-id="4171" instrument_node="">Savoy Hotel</span></a><span data-dcnode-id="4169" instrument_node="">, but Muscovites quickly learned how to pick up signals on their home televisions. That had a major impact on how Soviets saw events in their country and made censorship almost impossible.</span><sup data-dcnode-id="4166"><a data-dcnode-id="4167" href="#Ref-51"><span data-dcnode-id="4168" instrument_node="">[51]</span></a></sup><span data-dcnode-id="4165" instrument_node=""> The month-long nomination period for candidates for the </span><a data-dcnode-id="4163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Congress_of_People%2527s_Deputies_of_the_Soviet_Union/" title="The Congress of People's Deputies of the Soviet Union was the highest body of state authority of the Soviet Union from 1989 ..."><span data-dcnode-id="4164" instrument_node="">Congress of People's Deputies of the Soviet Union</span></a><span data-dcnode-id="4162" instrument_node=""> lasted until January 24, 1989. For the next month, selection among the 7,531 district nominees took place at meetings organized by constituency-level electoral commissions. On March 7, a final list of 5,074 candidates was published; about 85% were Party members.</span></p><span data-dcnode-id="4160" instrument_node="">
</span><p data-dcnode-id="4149"><span data-dcnode-id="4159" instrument_node="">In the two weeks prior to the 1,500 district polls, elections to fill 750 reserved seats of public organizations, contested by 880 candidates, were held. Of these seats, 100 were allocated to the CPSU, 100 to the </span><a data-dcnode-id="4157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/All-Union_Central_Council_of_Trade_Unions/" title="The All-Union Central Council of Trade Unions was the national trade union federation of the Soviet Union."><span data-dcnode-id="4158" instrument_node="">All-Union Central Council of Trade Unions</span></a><span data-dcnode-id="4156" instrument_node="">, 75 to the Communist Youth Union (</span><a data-dcnode-id="4154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Komsomol/" title="The Komsomol was a political youth organization in the Soviet Union."><span data-dcnode-id="4155" instrument_node="">Komsomol</span></a><span data-dcnode-id="4153" instrument_node="">), 75 to the Committee of Soviet Women, 75 to the War and Labour Veterans' Organization, and 325 to other organizations such as the </span><a data-dcnode-id="4151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russian_Academy_of_Sciences/"><span data-dcnode-id="4152" instrument_node="">Academy of Sciences</span></a><span data-dcnode-id="4150" instrument_node="">. The selection process was done in April.</span></p><span data-dcnode-id="4148" instrument_node="">
</span><p data-dcnode-id="4136"><span data-dcnode-id="4147" instrument_node="">In the March 26 general elections, voter participation was an impressive 89.8%, and 1,958 (including 1,225 district seats) of the 2,250 CPD seats were filled. In district races, run-off elections were held in 76 constituencies on April 2 and 9 and fresh elections were organized on April 14 and 20 to May 23,</span><sup data-dcnode-id="4144"><a data-dcnode-id="4145" href="#Ref-52"><span data-dcnode-id="4146" instrument_node="">[52]</span></a></sup><span data-dcnode-id="4143" instrument_node=""> in the 199 remaining constituencies where the required absolute majority was not attained. While most CPSU-endorsed candidates were elected, more than 300 lost to independent candidates such as Yeltsin, the physicist </span><a data-dcnode-id="4141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Andrei_Sakharov/"><span data-dcnode-id="4142" instrument_node="">Andrei Sakharov</span></a><span data-dcnode-id="4140" instrument_node=""> and the lawyer </span><a data-dcnode-id="4138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Anatoly_Sobchak/" title="Anatoly Sobchak was born in Chita, Russian SFSR, Soviet Union, on 10 August 1937."><span data-dcnode-id="4139" instrument_node="">Anatoly Sobchak</span></a><span data-dcnode-id="4137" instrument_node="">.</span></p><span data-dcnode-id="4135" instrument_node="">
</span><p data-dcnode-id="4120"><span data-dcnode-id="4134" instrument_node="">In the first session of the new Congress of People's Deputies (from May 25 to June 9), hardliners retained control but reformers used the legislature as a platform for debate and criticism, which was broadcast live and uncensored. This transfixed the population since nothing like such a freewheeling debate had ever been witnessed in the Soviet Union. On May 29, Yeltsin managed to secure a seat on the Supreme Soviet,</span><sup data-dcnode-id="4131"><a data-dcnode-id="4132" href="#Ref-53"><span data-dcnode-id="4133" instrument_node="">[53]</span></a></sup><span data-dcnode-id="4130" instrument_node=""> and in the summer he formed the first opposition, the </span><a data-dcnode-id="4128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Inter-Regional_Deputies_Group/"><span data-dcnode-id="4129" instrument_node="">Inter-Regional Deputies Group</span></a><span data-dcnode-id="4127" instrument_node="">, composed of </span><a data-dcnode-id="4125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Russian_nationalism/" title="Russian nationalism is a form of nationalism that promotes Russia n cultural identity and unity."><span data-dcnode-id="4126" instrument_node="">Russian nationalists</span></a><span data-dcnode-id="4124" instrument_node=""> and </span><a data-dcnode-id="4122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Liberalism_in_Russia/"><span data-dcnode-id="4123" instrument_node="">liberals</span></a><span data-dcnode-id="4121" instrument_node="">. Composing the final legislative group in the Soviet Union, those elected in 1989 played a vital part in reforms and the eventual breakup of the Soviet Union during the next two years.</span></p><span data-dcnode-id="4119" instrument_node="">
</span><p data-dcnode-id="4114"><span data-dcnode-id="4118" instrument_node="">On May 30, 1989, Gorbachev proposed that local elections across the Union, scheduled for November 1989, be postponed until early 1990 because there were still no laws governing the conduct of such elections. This was seen by some as a concession to local Party officials, who feared they would be swept from power in a wave of anti-establishment sentiment.</span><sup data-dcnode-id="4115"><a data-dcnode-id="4116" href="#Ref-54"><span data-dcnode-id="4117" instrument_node="">[54]</span></a></sup></p><span data-dcnode-id="4113" instrument_node="">
</span><p data-dcnode-id="4111"><span data-dcnode-id="4112" instrument_node="">On October 25, 1989, the Supreme Soviet voted to eliminate special seats for the Communist Party and other official organizations in union-level and republic-level elections, responding to sharp popular criticism that such reserved slots were undemocratic. After vigorous debate, the 542-member Supreme Soviet passed the measure 254–85 (with 36 abstentions). The decision required a constitutional amendment, ratified by the full congress, which met December 12–25. It also passed measures that would allow direct elections for presidents of each of the 15 constituent republics. Gorbachev strongly opposed such a move during debate but was defeated.</span></p><span data-dcnode-id="4110" instrument_node="">
</span><p data-dcnode-id="4105"><span data-dcnode-id="4109" instrument_node="">The vote expanded the power of republics in local elections, enabling them to decide for themselves how to organize voting. Latvia, Lithuania, and Estonia had already proposed laws for direct presidential elections. Local elections in all the republics had already been scheduled to take place between December and March 1990.</span><sup data-dcnode-id="4106"><a data-dcnode-id="4107" href="#Ref-55"><span data-dcnode-id="4108" instrument_node="">[55]</span></a></sup></p><span data-dcnode-id="4104" instrument_node="">
</span><p data-dcnode-id="4099"><span data-dcnode-id="4103" instrument_node="">See main article: </span><a data-dcnode-id="4101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Revolutions_of_1989/" title="The Revolutions of 1989 is often also called the Fall of Communism, and sometimes the Fall of Nations or the Autumn of ..."><span data-dcnode-id="4102" instrument_node="">Revolutions of 1989</span></a><span data-dcnode-id="4100" instrument_node="">.</span></p><span data-dcnode-id="4098" instrument_node="">
</span><p data-dcnode-id="4060"><span data-dcnode-id="4097" instrument_node="">The six </span><a data-dcnode-id="4095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Warsaw_Pact/" title="The Warsaw Pact was the military complement to the Council for Mutual Economic Assistance, the regional economic ..."><span data-dcnode-id="4096" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="4094" instrument_node=""> countries of Eastern Europe, while nominally independent, were widely recognized as the Soviet satellite states. All had been occupied by the Soviet </span><a data-dcnode-id="4092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Red_Army/" title="The Red Army was the army and air force of the Russian Soviet Federative Socialist Republic and, after 1922, the Union of ..."><span data-dcnode-id="4093" instrument_node="">Red Army</span></a><span data-dcnode-id="4091" instrument_node=""> in 1945, had Soviet-style socialist states imposed upon them, and had very restricted freedom of action in either domestic or international affairs. Any moves towards real independence were suppressed by military force – in the </span><a data-dcnode-id="4089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Hungarian_Revolution_of_1956/" title="The Hungarian Revolution of 1956 was a countrywide revolution against the Stalinist government of the Hungarian People's ..."><span data-dcnode-id="4090" instrument_node="">Hungarian Revolution of 1956</span></a><span data-dcnode-id="4088" instrument_node=""> and the </span><a data-dcnode-id="4086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Prague_Spring/" title="The Prague Spring was a period of political liberalization and mass protest in the Czechoslovak Socialist Republic."><span data-dcnode-id="4087" instrument_node="">Prague Spring</span></a><span data-dcnode-id="4085" instrument_node=""> in 1968. Gorbachev abandoned the oppressive and expensive </span><a data-dcnode-id="4083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Brezhnev_Doctrine/" title="The Brezhnev Doctrine was a Soviet foreign policy that proclaimed any threat to socialist rule in any state of the Soviet ..."><span data-dcnode-id="4084" instrument_node="">Brezhnev Doctrine</span></a><span data-dcnode-id="4082" instrument_node="">, which mandated intervention in the Warsaw Pact states, in favor of non-intervention in the internal affairs of allies – jokingly termed the </span><a data-dcnode-id="4080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Sinatra_Doctrine/" title="Sinatra Doctrine was the name that the Soviet government of Mikhail Gorbachev used jokingly to describe its policy of ..."><span data-dcnode-id="4081" instrument_node="">Sinatra Doctrine</span></a><span data-dcnode-id="4079" instrument_node=""> in a reference to the Frank Sinatra song "My Way". </span><a data-dcnode-id="4077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Polish_People%2527s_Republic/" title="The Polish People's Republic was a country in Central Europe that existed from 1947 to 1989 as the predecessor of the modern ..."><span data-dcnode-id="4078" instrument_node="">Poland</span></a><span data-dcnode-id="4076" instrument_node=""> was the first republic to democratize following the enactment of the </span><a data-dcnode-id="4074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/April_Novelization/" title="The April Novelization was a set of changes to the 1952 Constitution of the People's Republic of Poland, agreed in April ..."><span data-dcnode-id="4075" instrument_node="">April Novelization</span></a><span data-dcnode-id="4073" instrument_node="">, as agreed upon following the </span><a data-dcnode-id="4071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Polish_Round_Table_Agreement/"><span data-dcnode-id="4072" instrument_node="">Polish Round Table Agreement</span></a><span data-dcnode-id="4070" instrument_node=""> talks from February to April between the government and the </span><a data-dcnode-id="4068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Solidarity_%28Polish_trade_union%29/" title="Solidarity is a Polish trade union founded in August 1980 at the Lenin Shipyard in Gdańsk, Poland."><span data-dcnode-id="4069" instrument_node="">Solidarity</span></a><span data-dcnode-id="4067" instrument_node=""> trade union, and soon the Pact began to dissolve itself. The last of the countries to overthrow Communist leadership, </span><a data-dcnode-id="4065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Romanian_Socialist_Republic/" title="The Socialist Republic of Romania was a Marxist–Leninist one-party communist state that existed officially in Romania from ..."><span data-dcnode-id="4066" instrument_node="">Romania</span></a><span data-dcnode-id="4064" instrument_node="">, only did so following the violent </span><a data-dcnode-id="4062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Romanian_Revolution/" title="The Romanian Revolution was a period of violent civil unrest in Romania during December 1989 as a part of the Revolutions of ..."><span data-dcnode-id="4063" instrument_node="">Romanian Revolution</span></a><span data-dcnode-id="4061" instrument_node="">.</span></p><span data-dcnode-id="4059" instrument_node="">
</span><h4 data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">Baltic Chain of Freedom </span></h4><span data-dcnode-id="4056" instrument_node="">
</span><p data-dcnode-id="4014"><span data-dcnode-id="4055" instrument_node="">The </span><a data-dcnode-id="4053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Baltic_Way/" title="The Baltic Way was a peaceful political demonstration that occurred on 23 August 1989."><span data-dcnode-id="4054" instrument_node="">Baltic Way</span></a><span data-dcnode-id="4052" instrument_node=""> or Baltic Chain (also Chain of Freedom Estonian: </span><i data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">Balti kett</span></i><span data-dcnode-id="4049" instrument_node="">, Latvian: </span><i data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">Baltijas ceļš</span></i><span data-dcnode-id="4046" instrument_node="">, Lithuanian: </span><i data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node="">Baltijos kelias</span></i><span data-dcnode-id="4043" instrument_node="">, Russian: </span><i data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">link=no|'Балтийский путь'</span></i><span data-dcnode-id="4040" instrument_node="">) was a peaceful political demonstration on August 23, 1989.</span><sup data-dcnode-id="4037"><a data-dcnode-id="4038" href="#Ref-56"><span data-dcnode-id="4039" instrument_node="">[56]</span></a></sup><span data-dcnode-id="4036" instrument_node=""> An estimated 2&nbsp;million people joined hands to form a </span><a data-dcnode-id="4034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Human_chain_%28politics%29/" title="A human chain is a form of demonstration in which people link arms or hands as a show of political solidarity."><span data-dcnode-id="4035" instrument_node="">human chain</span></a><span data-dcnode-id="4033" instrument_node=""> extending across </span><a data-dcnode-id="4031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Estonia/" title="Estonia is a country in Northern Europe."><span data-dcnode-id="4032" instrument_node="">Estonia</span></a><span data-dcnode-id="4030" instrument_node="">, </span><a data-dcnode-id="4028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Latvia/" title="Latvia is a country in the Baltic region of Northern Europe."><span data-dcnode-id="4029" instrument_node="">Latvia</span></a><span data-dcnode-id="4027" instrument_node=""> and </span><a data-dcnode-id="4025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Lithuania/" title="Lithuania is a country in the Baltic region of Europe."><span data-dcnode-id="4026" instrument_node="">Lithuania</span></a><span data-dcnode-id="4024" instrument_node="">, which had been forcibly reincorporated into the Soviet Union in 1944. The colossal demonstration marked the 50th anniversary of the </span><a data-dcnode-id="4022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Molotov%25E2%2580%2593Ribbentrop_Pact/" title="The Molotov–Ribbentrop Pact was a non-aggression pact between Nazi Germany and the Soviet Union that enabled those two ..."><span data-dcnode-id="4023" instrument_node="">Molotov–Ribbentrop Pact</span></a><span data-dcnode-id="4021" instrument_node=""> that divided Eastern Europe into </span><a data-dcnode-id="4019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/spheres_of_influence/" title="Sphere of influence is a spatial region or concept division over which a state or organization has a level of cultural, ..."><span data-dcnode-id="4020" instrument_node="">spheres of influence</span></a><span data-dcnode-id="4018" instrument_node=""> and led to the </span><a data-dcnode-id="4016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/occupation_of_the_Baltic_states/"><span data-dcnode-id="4017" instrument_node="">occupation of the Baltic states</span></a><span data-dcnode-id="4015" instrument_node=""> in 1940.</span></p><span data-dcnode-id="4013" instrument_node="">
</span><p data-dcnode-id="4002"><span data-dcnode-id="4012" instrument_node="">Just months after the Baltic Way protests, in December 1989, the </span><a data-dcnode-id="4010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Congress_of_People%2527s_Deputies_of_the_Soviet_Union/" title="The Congress of People's Deputies of the Soviet Union was the highest body of state authority of the Soviet Union from 1989 ..."><span data-dcnode-id="4011" instrument_node="">Congress of People's Deputies</span></a><span data-dcnode-id="4009" instrument_node=""> accepted—and Gorbachev signed—the report by the </span><a data-dcnode-id="4007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Alexander_Nikolaevich_Yakovlev/"><span data-dcnode-id="4008" instrument_node="">Yakovlev</span></a><span data-dcnode-id="4006" instrument_node=""> Commission condemning the secret protocols of the Molotov–Ribbentrop pact which led to the annexations of the three Baltic republics.</span><sup data-dcnode-id="4003"><a data-dcnode-id="4004" href="#Ref-57"><span data-dcnode-id="4005" instrument_node="">[57]</span></a></sup></p><span data-dcnode-id="4001" instrument_node="">
</span><p data-dcnode-id="3993"><span data-dcnode-id="4000" instrument_node="">In the March 1989 elections to the Congress of Peoples Deputies, 36 of the 42 deputies from Lithuania were candidates from the independent national movement </span><a data-dcnode-id="3998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/S%25C4%2585j%25C5%25ABdis/" title="Sąjūdis is the political organisation which led the struggle for Lithuania n independence in the late 1980s and early 1990s."><span data-dcnode-id="3999" instrument_node="">Sąjūdis</span></a><span data-dcnode-id="3997" instrument_node="">. That was the greatest victory for any national organization within the Soviet Union and was a devastating revelation to the Lithuanian Communist Party of its growing unpopularity.</span><sup data-dcnode-id="3994"><a data-dcnode-id="3995" href="#Ref-58"><span data-dcnode-id="3996" instrument_node="">[58]</span></a></sup></p><span data-dcnode-id="3992" instrument_node="">
</span><p data-dcnode-id="3971"><span data-dcnode-id="3991" instrument_node="">On December 7, 1989, the </span><a data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Communist_Party_of_Lithuania/" title="The Communist Party of Lithuania is a banned communist party in Lithuania."><span data-dcnode-id="3990" instrument_node="">Communist Party of Lithuania</span></a><span data-dcnode-id="3988" instrument_node=""> under the leadership of </span><a data-dcnode-id="3986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Algirdas_Brazauskas/"><span data-dcnode-id="3987" instrument_node="">Algirdas Brazauskas</span></a><span data-dcnode-id="3985" instrument_node="">, split from the </span><a data-dcnode-id="3983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Communist_Party_of_the_Soviet_Union/" title="The Communist Party of the Soviet Union was the founding and ruling party of the Soviet Union."><span data-dcnode-id="3984" instrument_node="">Communist Party of the Soviet Union</span></a><span data-dcnode-id="3982" instrument_node=""> and abandoned its claim to have a constitutional "leading role" in politics. A smaller loyalist faction of the Communist Party, headed by hardliner </span><a data-dcnode-id="3980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Mykolas_Burokevi%25C4%258Dius/" title="Mykolas Burokevičius was a communist political leader in Lithuania."><span data-dcnode-id="3981" instrument_node="">Mykolas Burokevičius</span></a><span data-dcnode-id="3979" instrument_node="">, was established and remained affiliated with the party. However, Lithuania's governing Communist Party was formally independent from Moscow's control, a first for a Soviet republics and a political earthquake that prompted Gorbachev to arrange a visit to Lithuania the following month in a futile attempt to bring the local party back under control.</span><sup data-dcnode-id="3976"><a data-dcnode-id="3977" href="#Ref-59"><span data-dcnode-id="3978" instrument_node="">[59]</span></a></sup><span data-dcnode-id="3975" instrument_node=""> The following year, the Communist Party lost power altogether in multiparty parliamentary elections, which had caused </span><a data-dcnode-id="3973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Vytautas_Landsbergis/" title="Vytautas Landsbergis is a Lithuanian politician and former Member of the European Parliament."><span data-dcnode-id="3974" instrument_node="">Vytautas Landsbergis</span></a><span data-dcnode-id="3972" instrument_node=""> to become the first noncommunist leader (Chairman of the Supreme Council of Lithuania) of Lithuania since its forced incorporation into the Soviet Union.</span></p><span data-dcnode-id="3970" instrument_node="">
</span><h4 data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">Caucasus </span></h4><span data-dcnode-id="3967" instrument_node="">
</span><p data-dcnode-id="3948"><span data-dcnode-id="3966" instrument_node="">On July 16, 1989, the </span><a data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Azerbaijani_Popular_Front_Party/" title="The Azerbaijani Popular Front Party is a political party in Azerbaijan, founded in 1992 by Abulfaz Elchibey."><span data-dcnode-id="3965" instrument_node="">Popular Front of Azerbaijan</span></a><span data-dcnode-id="3963" instrument_node=""> held its first congress and elected </span><a data-dcnode-id="3961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Abulfaz_Elchibey/" title="Abulfaz Elchibey was an Azerbaijani political figure and a former Soviet dissident."><span data-dcnode-id="3962" instrument_node="">Abulfaz Elchibey</span></a><span data-dcnode-id="3960" instrument_node="">, who would become president, as its chairman.</span><sup data-dcnode-id="3957"><a data-dcnode-id="3958" href="#Ref-60"><span data-dcnode-id="3959" instrument_node="">[60]</span></a></sup><span data-dcnode-id="3956" instrument_node=""> On August 19, 600,000 protesters jammed Baku's Lenin Square (now Azadliq Square) to demand the release of political prisoners.</span><sup data-dcnode-id="3953"><a data-dcnode-id="3954" href="#Ref-61"><span data-dcnode-id="3955" instrument_node="">[61]</span></a></sup><span data-dcnode-id="3952" instrument_node=""> In the second half of 1989, weapons were handed out in Nagorno-Karabakh. When Karabakhis got hold of small arms to replace hunting rifles and crossbows, casualties began to mount; bridges were blown up, roads were blockaded, and hostages were taken.</span><sup data-dcnode-id="3949"><a data-dcnode-id="3950" href="#Ref-62"><span data-dcnode-id="3951" instrument_node="">[62]</span></a></sup></p><span data-dcnode-id="3947" instrument_node="">
</span><p data-dcnode-id="3934"><span data-dcnode-id="3946" instrument_node="">In a new and effective tactic, the Popular Front launched a rail blockade of Armenia,</span><sup data-dcnode-id="3943"><a data-dcnode-id="3944" href="#Ref-63"><span data-dcnode-id="3945" instrument_node="">[63]</span></a></sup><span data-dcnode-id="3942" instrument_node=""> which caused petrol and food shortages because 85 percent of Armenia's freight came from Azerbaijan.</span><sup data-dcnode-id="3939"><a data-dcnode-id="3940" href="#Ref-64"><span data-dcnode-id="3941" instrument_node="">[64]</span></a></sup><span data-dcnode-id="3938" instrument_node=""> Under pressure from the Popular Front the Communist authorities in Azerbaijan started making concessions. On September 25, they passed a sovereignty law that gave precedence to Azerbaijani law, and on October 4, the Popular Front was permitted to register as a legal organization as long as it lifted the blockade. Transport communications between Azerbaijan and Armenia never fully recovered. Tensions continued to escalate and on December 29, Popular Front activists seized local party offices in </span><a data-dcnode-id="3936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Jalilabad_District_%28Azerbaijan%29/" title="Jalilabad District is one of the 66 districts of Azerbaijan."><span data-dcnode-id="3937" instrument_node="">Jalilabad</span></a><span data-dcnode-id="3935" instrument_node="">, wounding dozens.</span></p><span data-dcnode-id="3933" instrument_node="">
</span><p data-dcnode-id="3915"><span data-dcnode-id="3932" instrument_node="">On May 31, 1989, the 11 members of the Karabakh Committee, who had been imprisoned without trial in Moscow's </span><a data-dcnode-id="3930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Matrosskaya_Tishina/" title="Matrosskaya Tishina is operated by the Federal Penitentiary Service, famously holding Mikhail Khodorkovsky and some plotters ..."><span data-dcnode-id="3931" instrument_node="">Matrosskaya Tishina</span></a><span data-dcnode-id="3929" instrument_node=""> prison, were released and returned home to a hero's welcome.</span><sup data-dcnode-id="3926"><a data-dcnode-id="3927" href="#Ref-65"><span data-dcnode-id="3928" instrument_node="">[65]</span></a></sup><span data-dcnode-id="3925" instrument_node=""> Soon after his release, </span><a data-dcnode-id="3923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Levon_Ter-Petrossian/"><span data-dcnode-id="3924" instrument_node="">Levon Ter-Petrossian</span></a><span data-dcnode-id="3922" instrument_node="">, an academic, was elected chairman of the anti-communist opposition </span><a data-dcnode-id="3920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Pan-Armenian_National_Movement/" title="The Pan-Armenian National Movement was a political party in Armenia."><span data-dcnode-id="3921" instrument_node="">Pan-Armenian National Movement</span></a><span data-dcnode-id="3919" instrument_node="">, and later stated that it was in 1989 that he first began considering full independence as his goal.</span><sup data-dcnode-id="3916"><a data-dcnode-id="3917" href="#Ref-66"><span data-dcnode-id="3918" instrument_node="">[66]</span></a></sup></p><span data-dcnode-id="3914" instrument_node="">
</span><p data-dcnode-id="3876"><span data-dcnode-id="3913" instrument_node="">On April 7, 1989, Soviet troops and armored personnel carriers were sent to </span><a data-dcnode-id="3911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Tbilisi/" title="Tbilisi was founded in the 5th century AD by Vakhtang I of Iberia, and since then has served as the capital of various ..."><span data-dcnode-id="3912" instrument_node="">Tbilisi</span></a><span data-dcnode-id="3910" instrument_node=""> after more than 100,000 people protested in front of Communist Party headquarters with banners calling for </span><a data-dcnode-id="3908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Georgia_%28country%29/" title="Georgia is a country located in the Caucasus, at the intersection of Eastern Europe and Western Asia."><span data-dcnode-id="3909" instrument_node="">Georgia</span></a><span data-dcnode-id="3907" instrument_node=""> to secede from the Soviet Union and for </span><a data-dcnode-id="3905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Abkhazia/" title="Abkhazia is a de facto state in the South Caucasus, recognised by most countries as part of Georgia, which views the region ..."><span data-dcnode-id="3906" instrument_node="">Abkhazia</span></a><span data-dcnode-id="3904" instrument_node=""> to be fully integrated into Georgia.</span><sup data-dcnode-id="3901"><a data-dcnode-id="3902" href="#Ref-67"><span data-dcnode-id="3903" instrument_node="">[67]</span></a></sup><span data-dcnode-id="3900" instrument_node=""> On </span><a data-dcnode-id="3898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/April_9_tragedy/" title="The April 9 tragedy was brutally crushed by the Soviet Army, resulting in 21 deaths and hundreds of injuries."><span data-dcnode-id="3899" instrument_node="">April 9, 1989</span></a><span data-dcnode-id="3897" instrument_node="">, troops attacked the demonstrators; some 20 people were killed and more than 200 wounded.</span><sup data-dcnode-id="3894"><a data-dcnode-id="3895" href="#Ref-68"><span data-dcnode-id="3896" instrument_node="">[68]</span></a></sup><span data-dcnode-id="3893" instrument_node=""> </span><sup data-dcnode-id="3890"><a data-dcnode-id="3891" href="#Ref-69"><span data-dcnode-id="3892" instrument_node="">[69]</span></a></sup><span data-dcnode-id="3889" instrument_node=""> This event radicalized Georgian politics, prompting many to conclude that independence was preferable to continued Soviet rule. On April 14, Gorbachev removed </span><a data-dcnode-id="3887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Jumber_Patiashvili/" title="Jumber Patiashvili is a Georgian politician."><span data-dcnode-id="3888" instrument_node="">Jumber Patiashvili</span></a><span data-dcnode-id="3886" instrument_node=""> as </span><a data-dcnode-id="3884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/First_Secretary_of_the_Georgian_Communist_Party/" title="The First Secretary of the Georgian Communist Party was the leading position in the Georgian Communist Party during the ..."><span data-dcnode-id="3885" instrument_node="">First Secretary of the Georgian Communist Party</span></a><span data-dcnode-id="3883" instrument_node=""> and replaced him with former Georgian </span><a data-dcnode-id="3881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/KGB/" title="The KGB was the main security agency for the Soviet Union from 13 March 1954 until 3 December 1991."><span data-dcnode-id="3882" instrument_node="">KGB</span></a><span data-dcnode-id="3880" instrument_node=""> chief </span><a data-dcnode-id="3878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Givi_Gumbaridze/" title="Givi Gumbaridze is a former Soviet and Georgian politician."><span data-dcnode-id="3879" instrument_node="">Givi Gumbaridze</span></a><span data-dcnode-id="3877" instrument_node="">.</span></p><span data-dcnode-id="3875" instrument_node="">
</span><p data-dcnode-id="3860"><span data-dcnode-id="3874" instrument_node="">On July 16, 1989, in </span><a data-dcnode-id="3872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Abkhazia/" title="Abkhazia is a de facto state in the South Caucasus, recognised by most countries as part of Georgia, which views the region ..."><span data-dcnode-id="3873" instrument_node="">Abkhazia</span></a><span data-dcnode-id="3871" instrument_node="">'s capital </span><a data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/1989_Sukhumi_riots/"><span data-dcnode-id="3870" instrument_node="">Sukhumi</span></a><span data-dcnode-id="3868" instrument_node="">, a protest against the opening of a Georgian university branch in the town led to violence that quickly degenerated into a large-scale inter-ethnic confrontation in which 18 died and hundreds were injured before Soviet troops restored order.</span><sup data-dcnode-id="3865"><a data-dcnode-id="3866" href="#Ref-70"><span data-dcnode-id="3867" instrument_node="">[70]</span></a></sup><span data-dcnode-id="3864" instrument_node=""> This riot marked the start of the </span><a data-dcnode-id="3862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Abkhaz%25E2%2580%2593Georgian_conflict/"><span data-dcnode-id="3863" instrument_node="">Georgian-Abkhaz conflict</span></a><span data-dcnode-id="3861" instrument_node="">.</span></p><span data-dcnode-id="3859" instrument_node="">
</span><h4 data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">Western republics </span></h4><span data-dcnode-id="3856" instrument_node="">
</span><p data-dcnode-id="3844"><span data-dcnode-id="3855" instrument_node="">In the March 26, 1989, elections to the Congress of People's Deputies, 15 of the 46 Moldovan deputies elected for congressional seats in Moscow were supporters of the Nationalist/Democratic movement.</span><sup data-dcnode-id="3852"><a data-dcnode-id="3853" href="#Ref-71"><span data-dcnode-id="3854" instrument_node="">[71]</span></a></sup><span data-dcnode-id="3851" instrument_node=""> The </span><a data-dcnode-id="3849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Popular_Front_of_Moldova/" title="The Popular Front of Moldova was a political movement in the Moldavian SSR, one of the 15 union republics of the former ..."><span data-dcnode-id="3850" instrument_node="">Popular Front of Moldova</span></a><span data-dcnode-id="3848" instrument_node=""> founding congress took place two months later, on May 20. During its second congress (June 30 – July 1, 1989), </span><a data-dcnode-id="3846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ion_Had%25C3%25A2rc%25C4%2583/" title="Ion Hadârcă is a poet, translator and Moldovan politician, deputy to the Parliament of the Republic of Moldova between 1990 ..."><span data-dcnode-id="3847" instrument_node="">Ion Hadârcă</span></a><span data-dcnode-id="3845" instrument_node=""> was elected its president.</span></p><span data-dcnode-id="3843" instrument_node="">
</span><p data-dcnode-id="3819"><span data-dcnode-id="3842" instrument_node="">A series of demonstrations that became known as the </span><a data-dcnode-id="3840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Grand_National_Assembly%252c_Chi%25C5%259Fin%25C4%2583u_1989/" title="The Popular Front of Moldova was a political movement in the Moldavian SSR, one of the 15 union republics of the former ..."><span data-dcnode-id="3841" instrument_node="">Grand National Assembly</span></a><span data-dcnode-id="3839" instrument_node=""> (Romanian; Moldavian; Moldovan: </span><i data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">Marea Adunare Naţională</span></i><span data-dcnode-id="3836" instrument_node="">) was the Front's first major achievement. Such mass demonstrations, including one attended by 300,000 people on August 27,</span><sup data-dcnode-id="3833"><a data-dcnode-id="3834" href="#Ref-72"><span data-dcnode-id="3835" instrument_node="">[72]</span></a></sup><span data-dcnode-id="3832" instrument_node=""> convinced the Moldovan Supreme Soviet on August 31 to adopt the language law making </span><a data-dcnode-id="3830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Romanian_language/"><span data-dcnode-id="3831" instrument_node="">Romanian</span></a><span data-dcnode-id="3829" instrument_node=""> the official language, and replacing the </span><a data-dcnode-id="3827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Cyrillic/" title="The Cyrillic script is a writing system used for various languages across Eurasia and is used as the national script in ..."><span data-dcnode-id="3828" instrument_node="">Cyrillic</span></a><span data-dcnode-id="3826" instrument_node=""> alphabet with </span><a data-dcnode-id="3824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Latin/" title="LATIN was a cooperation scheme among 13 newspapers in Latin America which was organized by Reuters and lasted from 1970 ..."><span data-dcnode-id="3825" instrument_node="">Latin</span></a><span data-dcnode-id="3823" instrument_node=""> characters.</span><sup data-dcnode-id="3820"><a data-dcnode-id="3821" href="#Ref-73"><span data-dcnode-id="3822" instrument_node="">[73]</span></a></sup></p><span data-dcnode-id="3818" instrument_node="">
</span><p data-dcnode-id="3789"><span data-dcnode-id="3817" instrument_node="">In Ukraine, </span><a data-dcnode-id="3815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Lviv/" title="Lviv is one of the main cultural centres of Ukraine."><span data-dcnode-id="3816" instrument_node="">Lviv</span></a><span data-dcnode-id="3814" instrument_node=""> and </span><a data-dcnode-id="3812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Kyiv/" title="Kyiv is the capital and most populous city of Ukraine."><span data-dcnode-id="3813" instrument_node="">Kyiv</span></a><span data-dcnode-id="3811" instrument_node=""> celebrated Ukrainian Independence Day on January 22, 1989. Thousands gathered in Lviv for an unauthorized </span><i data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">moleben</span></i><span data-dcnode-id="3808" instrument_node=""> (religious service) in front of </span><a data-dcnode-id="3806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/St._George%2527s_Cathedral%252c_Lviv/"><span data-dcnode-id="3807" instrument_node="">St. George's Cathedral</span></a><span data-dcnode-id="3805" instrument_node="">. In Kyiv, 60 activists met in a Kyiv apartment to commemorate the proclamation of the </span><a data-dcnode-id="3803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukrainian_People%2527s_Republic/" title="The Ukrainian People's Republic was a country in Eastern Europe that existed between 1917 and 1920."><span data-dcnode-id="3804" instrument_node="">Ukrainian People's Republic</span></a><span data-dcnode-id="3802" instrument_node=""> in 1918. On February 11–12, 1989, the Ukrainian Language Society held its founding congress. On February 15, 1989, the formation of the Initiative Committee for the Renewal of the </span><a data-dcnode-id="3800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ukrainian_Autocephalous_Orthodox_Church/" title="The Ukrainian Autocephalous Orthodox Church was one of the three major Eastern Orthodox churches in Ukraine."><span data-dcnode-id="3801" instrument_node="">Ukrainian Autocephalous Orthodox Church</span></a><span data-dcnode-id="3799" instrument_node=""> was announced. The program and statutes of the movement were proposed by the </span><a data-dcnode-id="3797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/National_Writers%2527_Union_of_Ukraine/" title="The National Writers' Union of Ukraine is a voluntary social-creative association of professional writers, poets, prose ..."><span data-dcnode-id="3798" instrument_node="">Writers' Union of Ukraine</span></a><span data-dcnode-id="3796" instrument_node=""> and were published in the journal </span><i data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">Literaturna Ukraina</span></i><span data-dcnode-id="3793" instrument_node=""> on February 16, 1989. The organization heralded Ukrainian dissidents such as </span><a data-dcnode-id="3791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Vyacheslav_Chornovil/"><span data-dcnode-id="3792" instrument_node="">Vyacheslav Chornovil</span></a><span data-dcnode-id="3790" instrument_node="">.</span></p><span data-dcnode-id="3788" instrument_node="">
</span><p data-dcnode-id="3774"><span data-dcnode-id="3787" instrument_node="">In late February, large public rallies took place in Kyiv to protest the election laws, on the eve of the March 26 elections to the USSR Congress of People's Deputies, and to call for the resignation of the first secretary of the Communist Party of Ukraine, </span><a data-dcnode-id="3785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Volodymyr_Shcherbytsky/"><span data-dcnode-id="3786" instrument_node="">Volodymyr Shcherbytsky</span></a><span data-dcnode-id="3784" instrument_node="">, lampooned as "the mastodon of stagnation". The demonstrations coincided with a visit to Ukraine by </span><a data-dcnode-id="3782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/General_Secretary_of_the_Communist_Party_of_the_Soviet_Union/"><span data-dcnode-id="3783" instrument_node="">Soviet General Secretary</span></a><span data-dcnode-id="3781" instrument_node=""> </span><a data-dcnode-id="3779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Mikhail_Gorbachev/"><span data-dcnode-id="3780" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="3778" instrument_node="">. On February 26, 1989, between 20,000 and 30,000 people participated in an unsanctioned ecumenical memorial service in Lviv, marking the anniversary of the death of 19th-century Ukrainian artist and nationalist </span><a data-dcnode-id="3776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Taras_Shevchenko/"><span data-dcnode-id="3777" instrument_node="">Taras Shevchenko</span></a><span data-dcnode-id="3775" instrument_node="">.</span></p><span data-dcnode-id="3773" instrument_node="">
</span><p data-dcnode-id="3762"><span data-dcnode-id="3772" instrument_node="">On March 4, 1989, the Memorial Society, committed to honoring the victims of Stalinism and cleansing society of Soviet practices, was founded in Kyiv. A public rally was held the next day. On March 12, A pre-election meeting organized in Lviv by the Ukrainian Helsinki Union and the </span><a data-dcnode-id="3770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Roman_Catholic_Marian_movements_and_societies/"><span data-dcnode-id="3771" instrument_node="">Marian Society</span></a><span data-dcnode-id="3769" instrument_node=""> </span><i data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">Myloserdia</span></i><span data-dcnode-id="3766" instrument_node=""> (Compassion) was violently dispersed, and nearly 300 people were detained. On March 26, elections were held to the union Congress of People's Deputies; </span><a data-dcnode-id="3764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/by-elections/" title="A by-election is an election used to fill an office that has become vacant between general elections."><span data-dcnode-id="3765" instrument_node="">by-elections</span></a><span data-dcnode-id="3763" instrument_node=""> were held on April 9, May 14, and May 21. Among the 225 Ukrainian representatives to the Congress, most were conservatives, though a handful of progressives were also elected.</span></p><span data-dcnode-id="3761" instrument_node="">
</span><p data-dcnode-id="3756"><span data-dcnode-id="3760" instrument_node="">From April 20–23, 1989, pre-election meetings were held in Lviv for four consecutive days, drawing crowds of up to 25,000. The action included a one-hour warning strike at eight local factories and institutions. It was the first labor strike in Lviv since 1944. On May 3, a pre-election rally attracted 30,000 in Lviv. On May 7, The Memorial Society organized a mass meeting at </span><a data-dcnode-id="3758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Bykivnia/" title="The Bykivnia graves is a National Historic Memorial next to the former village of Bykivnia within Kyiv woodland, Bykivnia ..."><span data-dcnode-id="3759" instrument_node="">Bykivnia</span></a><span data-dcnode-id="3757" instrument_node="">, site of a mass grave of Ukrainian and Polish victims of Stalinist terror. After a march from Kyiv to the site, a memorial service was staged.</span></p><span data-dcnode-id="3755" instrument_node="">
</span><p data-dcnode-id="3744"><span data-dcnode-id="3754" instrument_node="">From mid-May to September 1989, Ukrainian Greek-Catholic hunger strikers staged protests on Moscow's </span><a data-dcnode-id="3752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Arbat/" title="Arbat Street is a pedestrian street about one kilometer long in the historical centre of Moscow, Russia."><span data-dcnode-id="3753" instrument_node="">Arbat</span></a><span data-dcnode-id="3751" instrument_node=""> to call attention to the plight of their Church. They were especially active during the July session of the World Council of Churches held in Moscow. The protest ended with the arrests of the group on September 18. On May 27, 1989, the founding conference of the Lviv regional Memorial Society was held. On June 18, 1989, an estimated 100,000 faithful participated in public religious services in </span><a data-dcnode-id="3749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Ivano-Frankivsk/" title="Ivano-Frankivsk is a city located in Western Ukraine."><span data-dcnode-id="3750" instrument_node="">Ivano-Frankivsk</span></a><span data-dcnode-id="3748" instrument_node=""> in western Ukraine, responding to Cardinal </span><a data-dcnode-id="3746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everything.explained.today/Myroslav_Lubachivsky/" title="Myroslav Ivan Lubachivsky was Bishop of the Ukrainian Catholic Archeparchy of Philadelphia in the United States and from ..."><span data-dcnode-id="3747" instrument_node="">Myroslav Lubachivsky</span></a><span data-dcnode-id="3745" instrument_node="">'s call for an international day of prayer.</span></p><span data-dcnode-id="3743" instrument_node="">
