</span><p data-dcnode-id="1940"><span data-dcnode-id="1946" style="font-weight: 400;"><span data-dcnode-id="1947" instrument_node="">To know in detail about the </span></span><a data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/soviet-union/"><span data-dcnode-id="1944" style="font-weight: 400;"><span data-dcnode-id="1945" instrument_node="">Soviet Union</span></span></a><span data-dcnode-id="1941" style="font-weight: 400;"><span data-dcnode-id="1942" instrument_node="">, candidates can visit the linked article.&nbsp;</span></span></p><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1937" style="font-weight: 400;"><span data-dcnode-id="1938" instrument_node="">This article will elaborate upon the factors that lead to the dissolution of the Soviet Union. The disintegration of USSR and related info will be helpful for the world history segment of the </span></span><a data-dcnode-id="1934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/upsc-mains/"><span data-dcnode-id="1935" style="font-weight: 400;"><span data-dcnode-id="1936" instrument_node="">UPSC Mains Exam</span></span></a><span data-dcnode-id="1932" style="font-weight: 400;"><span data-dcnode-id="1933" instrument_node="">.</span></span></p><span data-dcnode-id="1930" instrument_node="">

</span><h2 data-dcnode-id="1849"><span data-dcnode-id="1850" style="font-weight: 400;"><span data-dcnode-id="1851" instrument_node="">The Origins of the Soviet Union</span></span></h2><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1845"><span data-dcnode-id="1846" style="font-weight: 400;"><span data-dcnode-id="1847" instrument_node="">The Soviet Union (Alternatively known as the Union of the Soviet Socialist Republics – USSR) was initially formed following the aftermath of the Russian Revolution in 1917. In 1922 it joined with its far-flung provinces to form a communist super-state. Vladimir Lenin was the first leader of the Soviet Union</span></span></p><span data-dcnode-id="1844" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1842" style="font-weight: 400;"><span data-dcnode-id="1843" instrument_node="">The initial makeup of the Soviet Union was to resemble a society that practised&nbsp; ‘true democracy’. But as time went on, it proved to be no less repressive than the Tsarist regime it had toppled years before. Only one party was allowed to exist – the Communist Party – and it demanded complete allegiance of every Russian citizen.</span></span></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1838" style="font-weight: 400;"><span data-dcnode-id="1839" instrument_node="">Totalitarian control was exercised in its absolute form when Joseph Stalin in 1924. Many aspects of Russian society such as political and social life as well as economic, administration and industrial activity were controlled directly by the state. Anyone who opposed Stalin found himself on a one-way ticket to a labour camp (Gulags) or executed out of hand after a show trial</span></span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1833"><span data-dcnode-id="1834" style="font-weight: 400;"><span data-dcnode-id="1835" instrument_node="">Only an invasion by Germany in 1941 during World War II prevented internal strife. The war gave the USSR an excellent opportunity to improve upon its military industry which had stagnated thanks to Stalin’s policies. By the end of World War II in 1945, the USSR had transformed into a major military power.</span></span></p><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1824"><span data-dcnode-id="1830" style="font-weight: 400;"><span data-dcnode-id="1831" instrument_node="">It was only after Stalin’s death in 1953 when Soviet leaders denounced his brutal policies. But the Communist Party maintained firm control over the country. The focus now shifted to fighting the ‘Cold War’ with Western Nations and costly engagements in the ‘arms race’ against the United States. It used it’s large military and resources to support </span></span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/communism/"><span data-dcnode-id="1828" style="font-weight: 400;"><span data-dcnode-id="1829" instrument_node="">communism</span></span></a><span data-dcnode-id="1825" style="font-weight: 400;"><span data-dcnode-id="1826" instrument_node=""> across the world and suppress anticommunist forces while maintaining its influence in Eastern Europe.</span></span></p><span data-dcnode-id="1823" instrument_node="">

id="1786" instrument_node="">Roots of the Cold War</span></span></a></td><td data-dcnode-id="1778"><a data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/joseph-stalin-1878-1953/"><span data-dcnode-id="1780" style="font-weight: 400;"><span data-dcnode-id="1781" instrument_node="">Joseph Stalin [1878-1951]</span></span></a></td></tr><tr data-dcnode-id="1763"><td data-dcnode-id="1770"><a data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/upsc-mains-world-history-key-terms-in-russian-revolution-part-2/"><span data-dcnode-id="1772" style="font-weight: 400;"><span data-dcnode-id="1773" instrument_node="">Main Figures in the Russian Revolution</span></span></a></td><td data-dcnode-id="1765"><a data-dcnode-id="1766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/constitution-system-in-russia/"><span data-dcnode-id="1767" style="font-weight: 400;"><span data-dcnode-id="1768" instrument_node="">Constitution System in Russia</span></span></a></td></tr></tbody></table></div><span data-dcnode-id="1757" instrument_node="">
</span><h3 data-dcnode-id="1754"><span data-dcnode-id="1755" style="font-weight: 400;"><span data-dcnode-id="1756" instrument_node="">Glasnost Era and Mikhail Gorbachev</span></span></h3><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1750"><span data-dcnode-id="1751" style="font-weight: 400;"><span data-dcnode-id="1752" instrument_node="">When Mikhail Gorbachev became the premier of the Soviet Union in 1985, he had inherited a stagnated economy and a political structure which would make reforms impossible.</span></span></p><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1746"><span data-dcnode-id="1747" style="font-weight: 400;"><span data-dcnode-id="1748" instrument_node="">To mediate this situation, Gorbachev introduced two policies that would, as he hoped, would transform the soviet union into a productive state. The first of this was the ‘glasnost’ or political openness. He lifted the ban on books that were earlier prevented from publishing because they went against communist ideas and gave new freedoms to all the citizens of the Soviet Republics</span></span></p><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1742"><span data-dcnode-id="1743" style="font-weight: 400;"><span data-dcnode-id="1744" instrument_node="">In March 1985, a longtime Communist Party politician named Mikhail Gorbachev assumed the leadership of the USSR he inherited a stagnant economy and a political structure that made reform all but impossible. Newspapers could print criticism against the government and for the first time, other political parties that were not communist could participate in elections.</span></span></p><span data-dcnode-id="1741" instrument_node="">
</span><p class="pdf-download-snippet" data-dcnode-id="1736"><b data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node=""> Fall of the Soviet Union: UPSC Notes –</span></b><a class="btn btn-default" data-dcnode-id="1737" href="javascript:void(0)" id="bplrtdbrsp-0" oncontextmenu="return false"><span data-dcnode-id="1738" instrument_node=""> Download PDF Here</span></a></p><span data-dcnode-id="1735" instrument_node="">
</span><p data-dcnode-id="1732"><span data-dcnode-id="1733" style="font-weight: 400;"><span data-dcnode-id="1734" instrument_node="">The second set of policies was ‘perestroika’ or economic restructuring. It abandoned the previous policy of command economy by allowing individual ownership of property and setting up businesses while encouraging foreign investment in Soviet enterprises.</span></span></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" style="font-weight: 400;"><span data-dcnode-id="1730" instrument_node="">But these reforms were too little and too late. Because the economy was far too gone for it to be saved. Rationing, food shortage and long queues for essential commodities seemed to be the only result of Gorbachev’s new policies, furthering resentment against his government</span></span></p><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1725" style="font-weight: 400;"><span data-dcnode-id="1726" instrument_node="">Solve </span></span><a data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/history-questions-of-upsc-mains-2013-19/"><span data-dcnode-id="1723" style="font-weight: 400;"><span data-dcnode-id="1724" instrument_node="">previous years history questions for UPSC Mains</span></span></a><span data-dcnode-id="1720" style="font-weight: 400;"><span data-dcnode-id="1721" instrument_node=""> by visiting the linked article</span></span></p><span data-dcnode-id="1718" instrument_node="">
</span><h3 data-dcnode-id="1715"><span data-dcnode-id="1716" style="font-weight: 400;"><span data-dcnode-id="1717" instrument_node="">Revolution of 1989</span></span></h3><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1712" style="font-weight: 400;"><span data-dcnode-id="1713" instrument_node="">When it came to foreign policy, the USSR had maintained a tight grip in Eastern Europe by installing communist governments there and intervening in those countries through military means.&nbsp;</span></span></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1708" style="font-weight: 400;"><span data-dcnode-id="1709" instrument_node="">Gorbachev changed that policy to that of non-intervention and even promised to withdraw Soviet troops in Afghanistan stationed there since 1979 (Soviet forces would withdraw by </span></span><a data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/this-day-in-history-feb15/"><span data-dcnode-id="1706" style="font-weight: 400;"><span data-dcnode-id="1707" instrument_node="">February 15, 1989</span></span></a><span data-dcnode-id="1703" style="font-weight: 400;"><span data-dcnode-id="1704" instrument_node="">) and reduce military presence in&nbsp; Eastern Europe.</span></span></p><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1699" style="font-weight: 400;"><span data-dcnode-id="1700" instrument_node="">The first revolution of 1989 took place in Poland when non-Communist trade unionists bargained for freer elections with much success. This was followed by peaceful revolutions across Eastern Europe culminating into the fall of the Berlin Wall in November of 1989.</span></span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1695" style="font-weight: 400;"><span data-dcnode-id="1696" instrument_node="">To know what are the </span></span><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/important-events-in-world-history-3000bc-till-1950/"><span data-dcnode-id="1693" style="font-weight: 400;"><span data-dcnode-id="1694" instrument_node="">important events in world history from 3000 BC to 1950 AD</span></span></a><span data-dcnode-id="1690" style="font-weight: 400;"><span data-dcnode-id="1691" instrument_node="">, visit the linked article</span></span></p><span data-dcnode-id="1688" instrument_node="">
</span><h3 data-dcnode-id="1685"><span data-dcnode-id="1686" style="font-weight: 400;"><span data-dcnode-id="1687" instrument_node="">The Disintegration of USSR</span></span></h3><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1681"><span data-dcnode-id="1682" style="font-weight: 400;"><span data-dcnode-id="1683" instrument_node="">Matters came to a head when the independence movements reached within the borders of the USSR. The Baltic States of Lithuania, Estonia and Latvia were the first to declare their independence from Moscow</span></span></p><span data-dcnode-id="1680" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" style="font-weight: 400;"><span data-dcnode-id="1679" instrument_node="">On August 18, 1991 members of the Communist Party placed Gorbachev under house arrest citing “poor health” as the reason for his imprisonment. The Russian public knew better. The leaders of the coup declared a state of emergency.</span></span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1674" style="font-weight: 400;"><span data-dcnode-id="1675" instrument_node="">Visit the linked article to get tips on how to </span></span><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/world-history-for-upsc-mains/"><span data-dcnode-id="1672" style="font-weight: 400;"><span data-dcnode-id="1673" instrument_node="">study world history for UPSC Mains</span></span></a></p><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1666"><span data-dcnode-id="1667" style="font-weight: 400;"><span data-dcnode-id="1668" instrument_node="">The military that moved to support the coup was met by a human chain of protestors in Moscow. Unwilling to fire on their own people the military withdrew and the coup collapsed</span></span></p><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1663" style="font-weight: 400;"><span data-dcnode-id="1664" instrument_node="">Upon his release, Gorbachev travelled to Minsk to broker a deal with the leaders of Belarus and Ukraine to break away from the USSR. Weeks later they were joined by other Soviet Republics in Central Asia after a meeting in Alma-Ata, modern-day Kazakhstan</span></span></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1658"><span data-dcnode-id="1659" style="font-weight: 400;"><span data-dcnode-id="1660" instrument_node="">But this was the end for Gorbachev as Boris Yeltsin had become the new star of the Russian state. Boris had earned fame when he rallied the population of Moscow to defeat the coup that imprisoned Gorbachev. On December 25, 1991, Mikhail Gorbachev tendered his resignation as the last premier of the Soviet Union. The Union of Soviet Socialist Republics had ceased to exist.</span></span></p><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Yeltsin became the first President of Russia and served from 1991 to 1999.</span></p><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1653"></p><div class="faq-section mb30" data-dcnode-id="1617" id="Frequently-Asked-Questions-on-Dissolution-of-the-Soviet-Union"><h2 data-dcnode-id="1650"><span data-dcnode-id="1651" style="color: #800080;"><span data-dcnode-id="1652" instrument_node="">Frequently Asked Questions on Dissolution of the Soviet Union</span></span></h2><div class="faq-schema" data-dcnode-id="1618"><div data-dcnode-id="1619" itemscope="" itemtype="https://schema.org/FAQPage"><section data-dcnode-id="1644" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><h3 data-dcnode-id="1648" itemprop="name text"><span data-dcnode-id="1649" instrument_node="">Q 1. When was the Soviet Union dissolved?</span></h3><div data-dcnode-id="1645" itemprop="suggestedAnswer acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="1646" itemprop="text"><span data-dcnode-id="1647" instrument_node="">Ans. The Soviet Union was dissolved on December 26, 1991.</span></div></div></section><section data-dcnode-id="1638" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><h3 data-dcnode-id="1642" itemprop="name text"><span data-dcnode-id="1643" instrument_node="">Q 2. Which agreement led to the dissolution of the Soviet Union?</span></h3><div data-dcnode-id="1639" itemprop="suggestedAnswer acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="1640" itemprop="text"><span data-dcnode-id="1641" instrument_node="">Ans. Belovezha Accords which were signed by Russian, Ukrainian and Belarusian presidents on December 8, 1991, led to the dissolution of the Soviet Union. The agreement declared dissolution of the USSR by its founder states and established the Commonwealth of Independent States (CIS).</span></div></div></section><section data-dcnode-id="1632" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><h3 data-dcnode-id="1636" itemprop="name text"><span data-dcnode-id="1637" instrument_node="">Q 3. In how many states was the Soviet Union dissolved?</span></h3><div data-dcnode-id="1633" itemprop="suggestedAnswer acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="1634" itemprop="text"><span data-dcnode-id="1635" instrument_node="">Ans. The Soviet Union had dissolved into 15 independent states on December 25, 1991.</span></div></div></section><section data-dcnode-id="1626" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><h3 data-dcnode-id="1630" itemprop="name text"><span data-dcnode-id="1631" instrument_node="">Q 4. How did the Cold War come to an end?</span></h3><div data-dcnode-id="1627" itemprop="suggestedAnswer acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="1628" itemprop="text"><span data-dcnode-id="1629" instrument_node="">Ans. It was in 1991 that the Cold War came to an end after the last war of Societ occupation had ended in Afghanistan. A series of peaceful revolutions had swept the Soviet Bloc states of Eastern Europe and the Verlin Wall came down in Germany.</span></div></div></section><section data-dcnode-id="1620" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><h3 data-dcnode-id="1624" itemprop="name text"><span data-dcnode-id="1625" instrument_node="">Q 5. What is USSR?</span></h3><div data-dcnode-id="1621" itemprop="suggestedAnswer acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="1622" itemprop="text"><span data-dcnode-id="1623" instrument_node="">Ans. Soviet Union was renamed as Union of Soviet Socialist Republics or USSR.</span></div></div></section></div></div></div><p data-dcnode-id="1616"></p><span data-dcnode-id="1615" instrument_node="">
