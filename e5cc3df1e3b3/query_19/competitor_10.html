</span><p data-dcnode-id="8005"><span data-dcnode-id="8069" instrument_node="">The </span><b data-dcnode-id="8067"><span data-dcnode-id="8068" instrument_node="">Republics of the Union of Soviet Socialist Republics</span></b><span data-dcnode-id="8066" instrument_node=""> or the </span><b data-dcnode-id="8064"><span data-dcnode-id="8065" instrument_node="">Union Republics</span></b><span data-dcnode-id="8063" instrument_node=""> (Russian: </span><span data-dcnode-id="8060" title="Russian-language text"><span data-dcnode-id="8061" lang="ru"><span data-dcnode-id="8062" instrument_node="">Сою́зные Респу́блики</span></span></span><span data-dcnode-id="8059" instrument_node="">, </span><small data-dcnode-id="8056"><a data-dcnode-id="8057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanization_of_Russian" title="Romanization of Russian"><span data-dcnode-id="8058" instrument_node="">tr.</span></a></small><span data-dcnode-id="8055" instrument_node=""> </span><span data-dcnode-id="8052" title="Russian-language text"><i data-dcnode-id="8053" lang="ru-Latn"><span data-dcnode-id="8054" instrument_node="">Soyúznye Respúbliki</span></i></span><span data-dcnode-id="8051" instrument_node="">) were national-based former countries and </span><a data-dcnode-id="8049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_delimitation_in_the_Soviet_Union" title="National delimitation in the Soviet Union"><span data-dcnode-id="8050" instrument_node="">ethnically based</span></a><span data-dcnode-id="8048" instrument_node=""> administrative units of the </span><a data-dcnode-id="8046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="8047" instrument_node="">Union of Soviet Socialist Republics</span></a><span data-dcnode-id="8045" instrument_node=""> (USSR).</span><sup class="reference" data-dcnode-id="8042" id="cite_ref-1"><a data-dcnode-id="8043" href="#cite_note-1"><span data-dcnode-id="8044" instrument_node="">[1]</span></a></sup><span data-dcnode-id="8041" instrument_node=""> The Soviet Union was created by the </span><a data-dcnode-id="8039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_on_the_Creation_of_the_Union_of_Soviet_Socialist_Republics" title="Treaty on the Creation of the Union of Soviet Socialist Republics"><span data-dcnode-id="8040" instrument_node="">treaty</span></a><span data-dcnode-id="8038" instrument_node=""> between the soviet socialist republics of </span><a data-dcnode-id="8036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belarus" title="Belarus"><span data-dcnode-id="8037" instrument_node="">Belarus</span></a><span data-dcnode-id="8035" instrument_node="">, </span><a data-dcnode-id="8033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="8034" instrument_node="">Ukraine</span></a><span data-dcnode-id="8032" instrument_node="">, Russia, and the </span><a data-dcnode-id="8030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transcaucasian_Socialist_Federative_Soviet_Republic" title="Transcaucasian Socialist Federative Soviet Republic"><span data-dcnode-id="8031" instrument_node="">Transcaucasian Federation</span></a><span data-dcnode-id="8029" instrument_node="">, by which they became its constituent republics. For most of its history, the USSR was a highly </span><a data-dcnode-id="8027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Centralisation" title="Centralisation"><span data-dcnode-id="8028" instrument_node="">centralized state</span></a><span data-dcnode-id="8026" instrument_node=""> despite its nominal structure as a </span><a data-dcnode-id="8024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federation" title="Federation"><span data-dcnode-id="8025" instrument_node="">federation</span></a><span data-dcnode-id="8023" instrument_node=""> of republics; the </span><a data-dcnode-id="8021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decentralization" title="Decentralization"><span data-dcnode-id="8022" instrument_node="">decentralization</span></a><span data-dcnode-id="8020" instrument_node=""> reforms during the era of </span><i data-dcnode-id="8017"><a data-dcnode-id="8018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perestroika" title="Perestroika"><span data-dcnode-id="8019" instrument_node="">Perestroika</span></a></i><span data-dcnode-id="8016" instrument_node=""> ("Restructuring") and </span><i data-dcnode-id="8013"><a data-dcnode-id="8014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glasnost" title="Glasnost"><span data-dcnode-id="8015" instrument_node="">Glasnost</span></a></i><span data-dcnode-id="8012" instrument_node=""> ("Openness") conducted by </span><a data-dcnode-id="8010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="8011" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="8009" instrument_node=""> are cited as one of the factors which led to the </span><a data-dcnode-id="8007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="8008" instrument_node="">dissolution of the USSR</span></a><span data-dcnode-id="8006" instrument_node=""> in 1991.
</span></p><p data-dcnode-id="8003"><span data-dcnode-id="8004" instrument_node="">There were two very distinct types of republics in the Soviet Union: the larger union republics, representing the main ethnic groups of the Union and with the constitutional right to secede from it, and the smaller autonomous republics, located within the union republics and representing ethnic minorities.
</span></p><p data-dcnode-id="7992"><span data-dcnode-id="8002" instrument_node="">The </span><a data-dcnode-id="8000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karelo-Finnish_Soviet_Socialist_Republic" title="Karelo-Finnish Soviet Socialist Republic"><span data-dcnode-id="8001" instrument_node="">Karelo-Finnish Soviet Socialist Republic</span></a><span data-dcnode-id="7999" instrument_node="">, a relic of the </span><a data-dcnode-id="7997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Winter_War" title="Winter War"><span data-dcnode-id="7998" instrument_node="">Soviet-Finnish War</span></a><span data-dcnode-id="7996" instrument_node="">, became the only union republic to be deprived of its status in 1956. The decision to downgrade Karelia to an autonomous republic within the </span><a data-dcnode-id="7994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Soviet_Federative_Socialist_Republic" title="Russian Soviet Federative Socialist Republic"><span data-dcnode-id="7995" instrument_node="">RSFSR</span></a><span data-dcnode-id="7993" instrument_node=""> was made unilaterally by the central government without consulting its population.
</span></p><span data-dcnode-id="7991" instrument_node="">

</span><h2 data-dcnode-id="7845"><span class="mw-headline" data-dcnode-id="7853" id="Overview"><span data-dcnode-id="7854" instrument_node="">Overview</span></span><span class="mw-editsection" data-dcnode-id="7846"><span class="mw-editsection-bracket" data-dcnode-id="7851"><span data-dcnode-id="7852" instrument_node="">[</span></span><a data-dcnode-id="7849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRepublics_of_the_Soviet_Union%26action%3Dedit%26section%3D1" title="Edit section: Overview"><span data-dcnode-id="7850" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7847"><span data-dcnode-id="7848" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7844" instrument_node="">
</span><link data-dcnode-id="7843" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7833" role="note"><span data-dcnode-id="7842" instrument_node="">See also: </span><a data-dcnode-id="7840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_delimitation_in_the_Soviet_Union" title="National delimitation in the Soviet Union"><span data-dcnode-id="7841" instrument_node="">National delimitation in the Soviet Union</span></a><span data-dcnode-id="7839" instrument_node="">, </span><a data-dcnode-id="7837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korenizatsiya" title="Korenizatsiya"><span data-dcnode-id="7838" instrument_node="">Korenizatsiya</span></a><span data-dcnode-id="7836" instrument_node="">, and </span><a data-dcnode-id="7834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religion_in_the_Soviet_Union" title="Religion in the Soviet Union"><span data-dcnode-id="7835" instrument_node="">Religion in the Soviet Union</span></a></div><span data-dcnode-id="7832" instrument_node="">
</span><p data-dcnode-id="7823"><span data-dcnode-id="7831" instrument_node="">According to Article&nbsp;76 of the </span><a data-dcnode-id="7829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1977_Constitution_of_the_Soviet_Union" title="1977 Constitution of the Soviet Union"><span data-dcnode-id="7830" instrument_node="">1977 Soviet Constitution</span></a><span data-dcnode-id="7828" instrument_node="">, a Union Republic was a sovereign Soviet socialist state that had united with other Soviet Republics in the USSR. Article&nbsp;81 of the Constitution stated that "the sovereign rights of Union Republics shall be safeguarded by the USSR".</span><sup class="reference" data-dcnode-id="7825" id="cite_ref-2"><a data-dcnode-id="7826" href="#cite_note-2"><span data-dcnode-id="7827" instrument_node="">[2]</span></a></sup><span data-dcnode-id="7824" instrument_node="">
</span></p><p data-dcnode-id="7806"><span data-dcnode-id="7822" instrument_node="">In the final decades of its existence, the </span><a data-dcnode-id="7820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="7821" instrument_node="">Soviet Union</span></a><span data-dcnode-id="7819" instrument_node=""> officially consisted of fifteen Soviet Socialist Republics (SSRs). All of them, with the exception of the </span><a data-dcnode-id="7817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Soviet_Federative_Socialist_Republic" title="Russian Soviet Federative Socialist Republic"><span data-dcnode-id="7818" instrument_node="">Russian Federation</span></a><span data-dcnode-id="7816" instrument_node=""> (until </span><a data-dcnode-id="7814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_the_Russian_Soviet_Federative_Socialist_Republic" title="Communist Party of the Russian Soviet Federative Socialist Republic"><span data-dcnode-id="7815" instrument_node="">1990</span></a><span data-dcnode-id="7813" instrument_node="">), had their own local </span><a data-dcnode-id="7811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_party" title="Communist party"><span data-dcnode-id="7812" instrument_node="">party chapters</span></a><span data-dcnode-id="7810" instrument_node=""> of the </span><a data-dcnode-id="7808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_the_Soviet_Union" title="Communist Party of the Soviet Union"><span data-dcnode-id="7809" instrument_node="">All-Union Communist Party</span></a><span data-dcnode-id="7807" instrument_node="">.
</span></p><p data-dcnode-id="7792"><span data-dcnode-id="7805" instrument_node="">Outside the territory of the </span><a data-dcnode-id="7803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Soviet_Federative_Socialist_Republic" title="Russian Soviet Federative Socialist Republic"><span data-dcnode-id="7804" instrument_node="">Russian Federation</span></a><span data-dcnode-id="7802" instrument_node="">, the republics were constituted mostly in lands that had formerly belonged to the </span><a data-dcnode-id="7800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="7801" instrument_node="">Russian Empire</span></a><span data-dcnode-id="7799" instrument_node=""> and had been acquired by it between the 1700 </span><a data-dcnode-id="7797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Northern_War" title="Great Northern War"><span data-dcnode-id="7798" instrument_node="">Great Northern War</span></a><span data-dcnode-id="7796" instrument_node=""> and the </span><a data-dcnode-id="7794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglo-Russian_Convention" title="Anglo-Russian Convention"><span data-dcnode-id="7795" instrument_node="">Anglo-Russian Convention of 1907</span></a><span data-dcnode-id="7793" instrument_node="">.
</span></p><p data-dcnode-id="7761"><span data-dcnode-id="7791" instrument_node="">In 1944, amendments to the </span><a data-dcnode-id="7789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1936_Constitution_of_the_Soviet_Union" title="1936 Constitution of the Soviet Union"><span data-dcnode-id="7790" instrument_node="">All-Union Constitution</span></a><span data-dcnode-id="7788" instrument_node=""> allowed for separate branches of the </span><a data-dcnode-id="7786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Army" title="Red Army"><span data-dcnode-id="7787" instrument_node="">Red Army</span></a><span data-dcnode-id="7785" instrument_node=""> for each Soviet Republic. They also allowed for Republic-level commissariats for foreign affairs and defense, allowing them to be recognized as </span><i data-dcnode-id="7782"><a data-dcnode-id="7783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De_jure" title="De jure"><span data-dcnode-id="7784" instrument_node="">de jure</span></a></i><span data-dcnode-id="7781" instrument_node=""> independent states in international law. This allowed for two Soviet Republics, </span><a data-dcnode-id="7779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_Soviet_Socialist_Republic" title="Ukrainian Soviet Socialist Republic"><span data-dcnode-id="7780" instrument_node="">Ukraine</span></a><span data-dcnode-id="7778" instrument_node=""> and </span><a data-dcnode-id="7776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Byelorussian_Soviet_Socialist_Republic" title="Byelorussian Soviet Socialist Republic"><span data-dcnode-id="7777" instrument_node="">Byelorussia</span></a><span data-dcnode-id="7775" instrument_node="">, (as well as the USSR as a whole) to join the </span><a data-dcnode-id="7773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_General_Assembly" title="United Nations General Assembly"><span data-dcnode-id="7774" instrument_node="">United Nations General Assembly</span></a><span data-dcnode-id="7772" instrument_node=""> as founding members in 1945.</span><sup class="reference" data-dcnode-id="7769" id="cite_ref-3"><a data-dcnode-id="7770" href="#cite_note-3"><span data-dcnode-id="7771" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="7766" id="cite_ref-4"><a data-dcnode-id="7767" href="#cite_note-4"><span data-dcnode-id="7768" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="7763" id="cite_ref-5"><a data-dcnode-id="7764" href="#cite_note-5"><span data-dcnode-id="7765" instrument_node="">[5]</span></a></sup><span data-dcnode-id="7762" instrument_node="">
</span></p><p data-dcnode-id="7688"><span data-dcnode-id="7760" instrument_node="">All of the former Republics of the Union are now independent countries, with ten of them (all except the </span><a data-dcnode-id="7758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_states" title="Baltic states"><span data-dcnode-id="7759" instrument_node="">Baltic states</span></a><span data-dcnode-id="7757" instrument_node="">, </span><a data-dcnode-id="7755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgia_%28country%29" title="Georgia (country)"><span data-dcnode-id="7756" instrument_node="">Georgia</span></a><span data-dcnode-id="7754" instrument_node=""> and Ukraine) being very loosely organized under the heading of the </span><a data-dcnode-id="7752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commonwealth_of_Independent_States" title="Commonwealth of Independent States"><span data-dcnode-id="7753" instrument_node="">Commonwealth of Independent States</span></a><span data-dcnode-id="7751" instrument_node="">. The </span><a data-dcnode-id="7749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_states" title="Baltic states"><span data-dcnode-id="7750" instrument_node="">Baltic states</span></a><span data-dcnode-id="7748" instrument_node=""> assert that their incorporation into the Soviet Union in 1940 (as the </span><a data-dcnode-id="7746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuanian_Soviet_Socialist_Republic" title="Lithuanian Soviet Socialist Republic"><span data-dcnode-id="7747" instrument_node="">Lithuanian</span></a><span data-dcnode-id="7745" instrument_node="">, </span><a data-dcnode-id="7743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latvian_Soviet_Socialist_Republic" title="Latvian Soviet Socialist Republic"><span data-dcnode-id="7744" instrument_node="">Latvian</span></a><span data-dcnode-id="7742" instrument_node="">, and </span><a data-dcnode-id="7740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estonian_Soviet_Socialist_Republic" title="Estonian Soviet Socialist Republic"><span data-dcnode-id="7741" instrument_node="">Estonian SSRs</span></a><span data-dcnode-id="7739" instrument_node="">) under the provisions of the 1939 </span><a data-dcnode-id="7737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molotov%25E2%2580%2593Ribbentrop_Pact" title="Molotov–Ribbentrop Pact"><span data-dcnode-id="7738" instrument_node="">Molotov–Ribbentrop Pact</span></a><span data-dcnode-id="7736" instrument_node=""> was illegal, and that they therefore remained independent countries under Soviet occupation.</span><sup class="reference" data-dcnode-id="7733" id="cite_ref-Latvia_6-0"><a data-dcnode-id="7734" href="#cite_note-Latvia-6"><span data-dcnode-id="7735" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="7730" id="cite_ref-7"><a data-dcnode-id="7731" href="#cite_note-7"><span data-dcnode-id="7732" instrument_node="">[7]</span></a></sup><span data-dcnode-id="7729" instrument_node=""> Their position is supported by the </span><a data-dcnode-id="7727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="7728" instrument_node="">European Union</span></a><span data-dcnode-id="7726" instrument_node="">,</span><sup class="reference" data-dcnode-id="7723" id="cite_ref-EU_8-0"><a data-dcnode-id="7724" href="#cite_note-EU-8"><span data-dcnode-id="7725" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7722" instrument_node=""> the </span><a data-dcnode-id="7720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Court_of_Human_Rights" title="European Court of Human Rights"><span data-dcnode-id="7721" instrument_node="">European Court of Human Rights</span></a><span data-dcnode-id="7719" instrument_node="">,</span><sup class="reference" data-dcnode-id="7716" id="cite_ref-Court_9-0"><a data-dcnode-id="7717" href="#cite_note-Court-9"><span data-dcnode-id="7718" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7715" instrument_node=""> the </span><a data-dcnode-id="7713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="7714" instrument_node="">United Nations</span></a><span data-dcnode-id="7712" instrument_node=""> </span><a data-dcnode-id="7710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Human_Rights_Council" title="United Nations Human Rights Council"><span data-dcnode-id="7711" instrument_node="">Human Rights Council</span></a><sup class="reference" data-dcnode-id="7707" id="cite_ref-UN_10-0"><a data-dcnode-id="7708" href="#cite_note-UN-10"><span data-dcnode-id="7709" instrument_node="">[10]</span></a></sup><span data-dcnode-id="7706" instrument_node=""> and the </span><a data-dcnode-id="7704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="7705" instrument_node="">United States</span></a><span data-dcnode-id="7703" instrument_node="">.</span><sup class="reference" data-dcnode-id="7700" id="cite_ref-USA_11-0"><a data-dcnode-id="7701" href="#cite_note-USA-11"><span data-dcnode-id="7702" instrument_node="">[11]</span></a></sup><span data-dcnode-id="7699" instrument_node=""> In contrast, the </span><a data-dcnode-id="7697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government_of_Russia" title="Government of Russia"><span data-dcnode-id="7698" instrument_node="">Russian government</span></a><span data-dcnode-id="7696" instrument_node=""> and state officials maintain that the Soviet annexation of the </span><a data-dcnode-id="7694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_states" title="Baltic states"><span data-dcnode-id="7695" instrument_node="">Baltic states</span></a><span data-dcnode-id="7693" instrument_node=""> was legitimate.</span><sup class="reference" data-dcnode-id="7690" id="cite_ref-12"><a data-dcnode-id="7691" href="#cite_note-12"><span data-dcnode-id="7692" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7689" instrument_node="">
</span></p><p data-dcnode-id="7668"><span data-dcnode-id="7687" instrument_node="">Constitutionally, the Soviet Union was a </span><a data-dcnode-id="7685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federation" title="Federation"><span data-dcnode-id="7686" instrument_node="">federation</span></a><span data-dcnode-id="7684" instrument_node="">. In accordance with provisions present in the Constitution (versions adopted in 1924, 1936 and 1977), each republic retained the right to </span><a data-dcnode-id="7682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secession" title="Secession"><span data-dcnode-id="7683" instrument_node="">secede</span></a><span data-dcnode-id="7681" instrument_node=""> from the USSR. Throughout the </span><a data-dcnode-id="7679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="7680" instrument_node="">Cold War</span></a><span data-dcnode-id="7678" instrument_node="">, this right was widely considered to be meaningless; however, the corresponding Article&nbsp;72 of the 1977 Constitution was used in December 1991 to effectively dissolve the Soviet Union, when </span><a data-dcnode-id="7676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia" title="Russia"><span data-dcnode-id="7677" instrument_node="">Russia</span></a><span data-dcnode-id="7675" instrument_node="">, </span><a data-dcnode-id="7673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="7674" instrument_node="">Ukraine</span></a><span data-dcnode-id="7672" instrument_node="">, and </span><a data-dcnode-id="7670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belarus" title="Belarus"><span data-dcnode-id="7671" instrument_node="">Belarus</span></a><span data-dcnode-id="7669" instrument_node=""> seceded from the Union.
</span></p><p data-dcnode-id="7648"><span data-dcnode-id="7667" instrument_node="">In practice, the USSR was a highly centralised entity from its creation in 1922 until the mid-1980s when political forces unleashed by reforms undertaken by </span><a data-dcnode-id="7665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="7666" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="7664" instrument_node=""> resulted in the loosening of central control and </span><a data-dcnode-id="7662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="7663" instrument_node="">its ultimate dissolution</span></a><span data-dcnode-id="7661" instrument_node="">. Under the constitution adopted in 1936 and modified along the way until October 1977, the political foundation of the </span><a data-dcnode-id="7659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="7660" instrument_node="">Soviet Union</span></a><span data-dcnode-id="7658" instrument_node=""> was formed by the Soviets (Councils) of People's Deputies. These existed at all levels of the administrative hierarchy, with the Soviet Union as a whole under the nominal control of the </span><a data-dcnode-id="7656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Soviet_of_the_Soviet_Union" title="Supreme Soviet of the Soviet Union"><span data-dcnode-id="7657" instrument_node="">Supreme Soviet of the USSR</span></a><span data-dcnode-id="7655" instrument_node="">, located in </span><a data-dcnode-id="7653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moscow" title="Moscow"><span data-dcnode-id="7654" instrument_node="">Moscow</span></a><span data-dcnode-id="7652" instrument_node=""> within the </span><a data-dcnode-id="7650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Soviet_Federative_Socialist_Republic" title="Russian Soviet Federative Socialist Republic"><span data-dcnode-id="7651" instrument_node="">Russian SFSR</span></a><span data-dcnode-id="7649" instrument_node="">.
</span></p><p data-dcnode-id="7643"><span data-dcnode-id="7647" instrument_node="">Along with the state administrative hierarchy, there existed a parallel structure of party organizations, which allowed the </span><a class="mw-redirect" data-dcnode-id="7645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Politburo_of_the_CPSU_Central_Committee" title="Politburo of the CPSU Central Committee"><span data-dcnode-id="7646" instrument_node="">Politburo</span></a><span data-dcnode-id="7644" instrument_node=""> to exercise large amounts of control over the republics. State administrative organs took direction from the parallel party organs, and appointments of all party and state officials required approval of the central organs of the party.
</span></p><p data-dcnode-id="7626"><span data-dcnode-id="7642" instrument_node="">Each republic had its own unique set of state symbols: a </span><a data-dcnode-id="7640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flags_of_the_Soviet_Republics" title="Flags of the Soviet Republics"><span data-dcnode-id="7641" instrument_node="">flag</span></a><span data-dcnode-id="7639" instrument_node="">, a </span><a data-dcnode-id="7637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emblems_of_the_Soviet_Republics" title="Emblems of the Soviet Republics"><span data-dcnode-id="7638" instrument_node="">coat of arms</span></a><span data-dcnode-id="7636" instrument_node="">, and, with the exception of </span><a data-dcnode-id="7634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Soviet_Federative_Socialist_Republic" title="Russian Soviet Federative Socialist Republic"><span data-dcnode-id="7635" instrument_node="">Russia</span></a><span data-dcnode-id="7633" instrument_node=""> until 1990, an </span><a class="mw-redirect" data-dcnode-id="7631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regional_anthems_of_the_Soviet_Union" title="Regional anthems of the Soviet Union"><span data-dcnode-id="7632" instrument_node="">anthem</span></a><span data-dcnode-id="7630" instrument_node="">. Every republic of the Soviet Union also was awarded with the </span><a data-dcnode-id="7628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Order_of_Lenin" title="Order of Lenin"><span data-dcnode-id="7629" instrument_node="">Order of Lenin</span></a><span data-dcnode-id="7627" instrument_node="">.
</span></p><span data-dcnode-id="7625" instrument_node="">

</span><link data-dcnode-id="7553" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7549" role="note"><span data-dcnode-id="7552" instrument_node="">See also: </span><a data-dcnode-id="7550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flag_of_the_Soviet_Union" title="Flag of the Soviet Union"><span data-dcnode-id="7551" instrument_node="">Flag of the Soviet Union</span></a></div><span data-dcnode-id="7548" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7539"><div class="thumbinner" data-dcnode-id="7540" style="width:402px;"><a class="image" data-dcnode-id="7546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUSSR_Republics_numbered_by_Constitution.svg"><img alt="" class="thumbimage" data-dcnode-id="7547" data-file-height="942" data-file-width="1345" decoding="async" height="280" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/56/USSR_Republics_numbered_by_Constitution.svg/400px-USSR_Republics_numbered_by_Constitution.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/56/USSR_Republics_numbered_by_Constitution.svg/600px-USSR_Republics_numbered_by_Constitution.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/56/USSR_Republics_numbered_by_Constitution.svg/800px-USSR_Republics_numbered_by_Constitution.svg.png 2x" width="400"></a><span data-dcnode-id="7545" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7541"><div class="magnify" data-dcnode-id="7543"><a class="internal" data-dcnode-id="7544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUSSR_Republics_numbered_by_Constitution.svg" title="Enlarge"></a></div><span data-dcnode-id="7542" instrument_node="">Map of the Union Republics from 1956 to 1991, as numbered by the Soviet Constitution</span></div></div></div><span data-dcnode-id="7538" instrument_node="">
</span><p data-dcnode-id="7536"><span data-dcnode-id="7537" instrument_node="">The number of the union republics of the USSR varied from 4 to 16. From 1956 until its dissolution in 1991, the Soviet Union consisted of 15 Soviet Socialist Republics. Rather than listing the republics in alphabetical order, the republics were listed in constitutional order, which, particularly by the last decades of the Soviet Union, did not correspond to order either by population or economic power.

</span><p data-dcnode-id="5190"><span data-dcnode-id="5203" instrument_node="">The Turkestan Soviet Federative Republic was proclaimed in 1918 but did not survive to the founding of the USSR, becoming the short-lived </span><a data-dcnode-id="5201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkestan_Autonomous_Soviet_Socialist_Republic" title="Turkestan Autonomous Soviet Socialist Republic"><span data-dcnode-id="5202" instrument_node="">Turkestan Autonomous Soviet Socialist Republic</span></a><span data-dcnode-id="5200" instrument_node=""> of the RSFSR. The </span><a class="mw-redirect" data-dcnode-id="5198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crimean_Soviet_Socialist_Republic" title="Crimean Soviet Socialist Republic"><span data-dcnode-id="5199" instrument_node="">Crimean Soviet Socialist Republic (Soviet Socialist Republic of Taurida)</span></a><span data-dcnode-id="5197" instrument_node=""> was also proclaimed in 1918, but did not become a union republic and was made into an autonomous republic of the RSFSR, although the </span><a data-dcnode-id="5195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crimean_Tatars" title="Crimean Tatars"><span data-dcnode-id="5196" instrument_node="">Crimean Tatars</span></a><span data-dcnode-id="5194" instrument_node=""> had a relative majority until the 1930s or 1940s according to censuses. When the </span><a data-dcnode-id="5192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tuvan_People%2527s_Republic" title="Tuvan People's Republic"><span data-dcnode-id="5193" instrument_node="">Tuvan People's Republic</span></a><span data-dcnode-id="5191" instrument_node=""> joined the Soviet Union in 1944, it did not become a union republic, and was instead established as an autonomous republic of the RSFSR.
</span></p><p data-dcnode-id="5159"><span data-dcnode-id="5189" instrument_node="">The leader of the </span><a data-dcnode-id="5187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Republic_of_Bulgaria" title="People's Republic of Bulgaria"><span data-dcnode-id="5188" instrument_node="">People's Republic of Bulgaria</span></a><span data-dcnode-id="5186" instrument_node="">, </span><a data-dcnode-id="5184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Todor_Zhivkov" title="Todor Zhivkov"><span data-dcnode-id="5185" instrument_node="">Todor Zhivkov</span></a><span data-dcnode-id="5183" instrument_node="">, suggested in the early 1960s that the country should become a union republic, but the offer was rejected.</span><sup class="reference" data-dcnode-id="5180" id="cite_ref-17"><a data-dcnode-id="5181" href="#cite_note-17"><span data-dcnode-id="5182" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="5177" id="cite_ref-18"><a data-dcnode-id="5178" href="#cite_note-18"><span data-dcnode-id="5179" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="5174" id="cite_ref-19"><a data-dcnode-id="5175" href="#cite_note-19"><span data-dcnode-id="5176" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5173" instrument_node=""> During the </span><a data-dcnode-id="5171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet%25E2%2580%2593Afghan_War" title="Soviet–Afghan War"><span data-dcnode-id="5172" instrument_node="">Soviet–Afghan War</span></a><span data-dcnode-id="5170" instrument_node="">, the Soviet Union proposed to annex </span><a data-dcnode-id="5168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geography_of_Afghanistan" title="Geography of Afghanistan"><span data-dcnode-id="5169" instrument_node="">Northern Afghanistan</span></a><span data-dcnode-id="5167" instrument_node=""> as its 16th union republic in what was to become the </span><a data-dcnode-id="5165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Republic_of_Afghanistan" title="Democratic Republic of Afghanistan"><span data-dcnode-id="5166" instrument_node="">Afghan Soviet Socialist Republic</span></a><span data-dcnode-id="5164" instrument_node="">.</span><sup class="reference" data-dcnode-id="5161" id="cite_ref-20"><a data-dcnode-id="5162" href="#cite_note-20"><span data-dcnode-id="5163" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5160" instrument_node="">
</span></p><span data-dcnode-id="5158" instrument_node="">

</span><p data-dcnode-id="5080"><span data-dcnode-id="5084" instrument_node="">Several of the Union Republics themselves, most notably Russia, were further subdivided into </span><a class="mw-redirect" data-dcnode-id="5082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autonomous_Soviet_Socialist_Republics_of_the_Soviet_Union" title="Autonomous Soviet Socialist Republics of the Soviet Union"><span data-dcnode-id="5083" instrument_node="">Autonomous Soviet Socialist Republics</span></a><span data-dcnode-id="5081" instrument_node=""> (ASSRs). Though administratively part of their respective Union Republics, ASSRs were also established based on ethnic/cultural lines.

</span><h2 data-dcnode-id="3211"><span class="mw-headline" data-dcnode-id="3219" id="Dissolution_of_the_Soviet_Union"><span data-dcnode-id="3220" instrument_node="">Dissolution of the Soviet Union</span></span><span class="mw-editsection" data-dcnode-id="3212"><span class="mw-editsection-bracket" data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">[</span></span><a data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRepublics_of_the_Soviet_Union%26action%3Dedit%26section%3D10" title="Edit section: Dissolution of the Soviet Union"><span data-dcnode-id="3216" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3210" instrument_node="">
</span><link data-dcnode-id="3209" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3205" role="note"><span data-dcnode-id="3208" instrument_node="">Further information: </span><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="3207" instrument_node="">Dissolution of the Soviet Union</span></a></div><span data-dcnode-id="3204" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3192"><div class="thumbinner" data-dcnode-id="3193" style="width:222px;"><a class="image" data-dcnode-id="3202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUSSR_-_Then_and_Now.png"><img alt="" class="thumbimage" data-dcnode-id="3203" data-file-height="3904" data-file-width="3608" decoding="async" height="238" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/10/USSR_-_Then_and_Now.png/220px-USSR_-_Then_and_Now.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/10/USSR_-_Then_and_Now.png/330px-USSR_-_Then_and_Now.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/10/USSR_-_Then_and_Now.png/440px-USSR_-_Then_and_Now.png 2x" width="220"></a><span data-dcnode-id="3201" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3194"><div class="magnify" data-dcnode-id="3199"><a class="internal" data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUSSR_-_Then_and_Now.png" title="Enlarge"></a></div><span data-dcnode-id="3198" instrument_node="">Country emblems of the Union republics, before and after the dissolution of the Soviet Union. Note that the </span><a class="mw-redirect" data-dcnode-id="3196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transcaucasian_Soviet_Federative_Socialist_Republic" title="Transcaucasian Soviet Federative Socialist Republic"><span data-dcnode-id="3197" instrument_node="">Transcaucasian Soviet Federative Socialist Republic</span></a><span data-dcnode-id="3195" instrument_node=""> (fifth in the second row) no longer exists as a political entity of any kind, and the emblem is unofficial.</span></div></div></div><span data-dcnode-id="3191" instrument_node="">
</span><p data-dcnode-id="3172"><span data-dcnode-id="3190" instrument_node="">Starting in the late 1980s, under the rule of </span><a data-dcnode-id="3188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="3189" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="3187" instrument_node="">, the Soviet government undertook a program of political reforms (</span><i data-dcnode-id="3184"><a data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glasnost" title="Glasnost"><span data-dcnode-id="3186" instrument_node="">glasnost</span></a></i><span data-dcnode-id="3183" instrument_node=""> and </span><i data-dcnode-id="3180"><a data-dcnode-id="3181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perestroika" title="Perestroika"><span data-dcnode-id="3182" instrument_node="">perestroika</span></a></i><span data-dcnode-id="3179" instrument_node="">) intended to liberalise and revitalise the Union. These measures, however, had a number of unintended political and social effects. Political liberalisation allowed the governments of the union republics to openly invoke the principles of democracy and nationalism to gain legitimacy. In addition, the loosening of political restrictions led to fractures within the Communist Party which resulted in a reduced ability to govern the Union effectively. The rise of nationalist and right-wing movements, notably led by </span><a data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Yeltsin" title="Boris Yeltsin"><span data-dcnode-id="3178" instrument_node="">Boris Yeltsin</span></a><span data-dcnode-id="3176" instrument_node=""> in Russia, in the previously homogeneous political system undermined the Union's foundations. With the central role of the Communist Party removed from the constitution, the Party lost its control over the State machinery and was banned from operating after </span><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1991_Soviet_coup_d%27%25C3%25A9tat_attempt" title="1991 Soviet coup d'état attempt"><span data-dcnode-id="3175" instrument_node="">an attempted coup d'état</span></a><span data-dcnode-id="3173" instrument_node="">.
</span></p><p data-dcnode-id="3119"><span data-dcnode-id="3171" instrument_node="">Throughout this period of turmoil, the Soviet government attempted to find a new structure that would reflect the increased authority of the republics. Some autonomous republics, like </span><a data-dcnode-id="3169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tatarstan" title="Tatarstan"><span data-dcnode-id="3170" instrument_node="">Tatarstan</span></a><span data-dcnode-id="3168" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Checheno-Ingushetia" title="Checheno-Ingushetia"><span data-dcnode-id="3167" instrument_node="">Checheno-Ingushetia</span></a><span data-dcnode-id="3165" instrument_node="">, </span><a data-dcnode-id="3163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abkhazia" title="Abkhazia"><span data-dcnode-id="3164" instrument_node="">Abkhazia</span></a><span data-dcnode-id="3162" instrument_node="">, </span><a data-dcnode-id="3160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Ossetia" title="South Ossetia"><span data-dcnode-id="3161" instrument_node="">South Ossetia</span></a><span data-dcnode-id="3159" instrument_node="">, </span><a data-dcnode-id="3157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crimea" title="Crimea"><span data-dcnode-id="3158" instrument_node="">Crimea</span></a><span data-dcnode-id="3156" instrument_node="">, </span><a data-dcnode-id="3154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transnistria" title="Transnistria"><span data-dcnode-id="3155" instrument_node="">Transnistria</span></a><span data-dcnode-id="3153" instrument_node="">, </span><a data-dcnode-id="3151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gagauzia" title="Gagauzia"><span data-dcnode-id="3152" instrument_node="">Gagauzia</span></a><span data-dcnode-id="3150" instrument_node=""> sought the union statute in the New Union Treaty. Efforts to found a </span><a class="mw-redirect" data-dcnode-id="3148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_of_Sovereign_States" title="Union of Sovereign States"><span data-dcnode-id="3149" instrument_node="">Union of Sovereign States</span></a><span data-dcnode-id="3147" instrument_node="">, however, proved unsuccessful and the republics began to secede from the Union. By 6 September 1991, the Soviet Union's </span><a data-dcnode-id="3145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_Council_of_the_Soviet_Union" title="State Council of the Soviet Union"><span data-dcnode-id="3146" instrument_node="">State Council</span></a><span data-dcnode-id="3144" instrument_node=""> recognized the independence of </span><a data-dcnode-id="3142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estonia" title="Estonia"><span data-dcnode-id="3143" instrument_node="">Estonia</span></a><span data-dcnode-id="3141" instrument_node="">, </span><a data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latvia" title="Latvia"><span data-dcnode-id="3140" instrument_node="">Latvia</span></a><span data-dcnode-id="3138" instrument_node=""> and </span><a data-dcnode-id="3136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuania" title="Lithuania"><span data-dcnode-id="3137" instrument_node="">Lithuania</span></a><span data-dcnode-id="3135" instrument_node=""> bringing the number of union republics down to 12. On 8 December 1991, the remaining leaders of the republics signed the </span><a class="mw-redirect" data-dcnode-id="3133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belavezha_Accords" title="Belavezha Accords"><span data-dcnode-id="3134" instrument_node="">Belavezha Accords</span></a><span data-dcnode-id="3132" instrument_node=""> which agreed that the USSR would be dissolved and replaced with a </span><a data-dcnode-id="3130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commonwealth_of_Independent_States" title="Commonwealth of Independent States"><span data-dcnode-id="3131" instrument_node="">Commonwealth of Independent States</span></a><span data-dcnode-id="3129" instrument_node="">. On 25 December, President Gorbachev announced his resignation and turned all executive powers over to Yeltsin. The next day the </span><a data-dcnode-id="3127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_of_Nationalities" title="Soviet of Nationalities"><span data-dcnode-id="3128" instrument_node="">Council of Republics</span></a><span data-dcnode-id="3126" instrument_node=""> voted to </span><a data-dcnode-id="3124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="3125" instrument_node="">dissolve the Union</span></a><span data-dcnode-id="3123" instrument_node="">. Since then, the republics have been governed independently with some reconstituting themselves as liberal parliamentary republics and others, particularly in </span><a data-dcnode-id="3121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Asia" title="Central Asia"><span data-dcnode-id="3122" instrument_node="">Central Asia</span></a><span data-dcnode-id="3120" instrument_node="">, devolving into highly autocratic states under the leadership of the old Party elite.
</span></p><span data-dcnode-id="3118" instrument_node="">
