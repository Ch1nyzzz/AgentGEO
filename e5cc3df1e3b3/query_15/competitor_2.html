</span><a data-dcnode-id="411" name="beginpage" tabindex="1"><img alt="" border="0" data-dcnode-id="412" height="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2001-2009.state.gov/images/clearpixel.gif&amp;raw" width="0"></a><span data-dcnode-id="410" instrument_node="">
</span><table border="0" cellpadding="5" cellspacing="5" data-dcnode-id="129" width="100%"><tbody data-dcnode-id="130"><tr data-dcnode-id="131"><td class="content-font-style" data-dcnode-id="132"><h1 data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Defining U.S. Foreign Policy in a Post-Post-Cold War World</span></h1><font data-dcnode-id="404" face="Arial" size="2"><strong data-dcnode-id="405"><span data-dcnode-id="407" instrument_node="">Richard N. Haass,
			    Director, Policy Planning Staff</span><br data-dcnode-id="406"></strong></font><font data-dcnode-id="402" face="Arial" size="2"><span data-dcnode-id="403" instrument_node="">The 2002 Arthur Ross Lecture, Remarks to Foreign Policy Association</span></font><br data-dcnode-id="401"><font data-dcnode-id="399" face="Arial" size="2"><span data-dcnode-id="400" instrument_node="">New York, NY</span></font><br data-dcnode-id="398"><font data-dcnode-id="396" size="2"><span data-dcnode-id="397" instrument_node="">April 22, 2002</span></font><p data-dcnode-id="393"><font data-dcnode-id="394" face="Arial"><span data-dcnode-id="395" instrument_node="">
</span></font></p><p data-dcnode-id="388"><font data-dcnode-id="389" face="Arial"><font data-dcnode-id="390" size="2"><a data-dcnode-id="391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2001-2009.state.gov/s/p/index.htm"><span data-dcnode-id="392" instrument_node="">Return to S/P Home Page</span></a></font></font></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="384"><font data-dcnode-id="385" face="Arial"><span data-dcnode-id="386" instrument_node="">I’m delighted and honored to be here this evening. I can think of no better forum for a discussion of America’s role in the world than the Foreign Policy Association. Under your leadership, Noel, the Foreign Policy Association has continued and strengthened its role as a valued conduit linking policy makers, foreign policy thinkers, and the American people -- not that the these three groupings are mutually exclusive. From your Global Forums to your Great Decisions program, you have helped us understand our rapidly transforming world, while communicating that understanding in innovative ways here in New York and around the country.</span></font></p><font data-dcnode-id="140" face="Arial"><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">I can also think of no better occasion for this discussion than the Arthur Ross Lecture. The name Arthur Ross is synonymous with philanthropy in the cause of public service. Arthur Ross has devoted his time, his energy, and -- yes&nbsp;-- his resources to fostering the best new thinking in the service of foreign policy for the American people. When I was at Brookings, I benefited first-hand from Arthur’s generosity and vision. Thank you again, Arthur, for your commitment to making the world a better place.</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">I returned to government service a little over a year ago to head up the State Department’s Policy Planning Staff. Now, as you know, government officials rarely, if ever, have time to ponder history or look too far ahead. The Policy Planning Staff, though, is privileged. It’s part of our job to step back from the day-to-day decisions, to discern the relevant lessons of history and to apply them to shape the future. </span></p><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">It would be difficult for me to escape history even if I wanted to. Every day members of the Policy Planning Staff are reminded of our own history when we gather under the photographs of our predecessors. We try to heed the final guidance that Secretary of State George Marshall gave to George Kennan when he called upon Kennan to create the Policy Planning Staff 55 years ago. In his characteristic direct and concise manner, Marshall offered two words of advice: "Avoid trivia."</span></p><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="373" instrument_node="">Living up to that advice remains our mission on the Policy Planning Staff. That is also my task this evening. So let me not mince words, but go right to the heart of one of the most important challenges before us today&nbsp;-- defining American foreign policy for what my boss, Secretary of State Colin Powell, likes to call the </span><i data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">post</span></i><span data-dcnode-id="370" instrument_node="">-post-Cold War world.</span></p><b data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">
</span></b><p data-dcnode-id="362"><b data-dcnode-id="364"><span data-dcnode-id="366" instrument_node="">To The Post-Post-Cold War World</span><br data-dcnode-id="365"></b><span data-dcnode-id="363" instrument_node="">A successful foreign policy begins with an understanding of the particular challenges of the day, one informed by a historical perspective. As the "post-post-Cold War" label suggests, we can understand the challenges we confront today only if we know how we got here. </span></p><b data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">
</span></b><p data-dcnode-id="355"><b data-dcnode-id="357"><span data-dcnode-id="359" instrument_node="">The Cold War Era</span><br data-dcnode-id="358"></b><span data-dcnode-id="356" instrument_node="">For those of us who came of age during the Cold War, its key features are etched in our memories. For almost five decades, from the late 1940s until the demise of the Soviet Union, the Cold War defined the main contours of the international landscape. It was, at its core, an ideologically charged confrontation between the West, that is, the United States and its allies, and the Soviet Union and its satellites. Americans accepted that the stakes involved were nothing less than the preservation of our way of life. </span></p><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Our main security relationships in both the Atlantic and the Pacific emerged in this context. The prospect of a nuclear holocaust gave both sides a stake in maintaining a stable balance of terror, a balance both codified and symbolized in a series of arms control agreements. Direct military confrontation between the two superpowers was avoided. Instead, we engaged in a long struggle on the periphery of the world in places such as Korea, Vietnam, and Central America. Eventually, the United States and its allies triumphed by containing the Soviet challenge until the Soviet Union collapsed under the weight of its own internal contradictions. </span></p><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Of course, these years were also marked by other international developments, most notably the rise of nationalism and European withdrawal from much of Africa and Asia. But it was the Cold War struggle that shaped our priorities and our responses to such developments.</span></p><b data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">
</span></b><p data-dcnode-id="339"><b data-dcnode-id="344"><span data-dcnode-id="346" instrument_node="">The Post-Cold War Interlude</span><br data-dcnode-id="345"></b><span data-dcnode-id="343" instrument_node="">With the dissolution of the Soviet Union, we embarked on the post-Cold War interlude. We see now that this was a decade of transition defined by uncertainty as we groped to determine the American role in an international system </span><i data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">not</span></i><span data-dcnode-id="340" instrument_node=""> defined by a single existential threat. </span></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">American primacy was unprecedented and uncontested. Russia declined as it struggled to overcome the legacy of over seven decades of Communist misrule. Europe consolidated and NATO expanded. </span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">For a time, it seemed that American primacy was enough. The most important traditional security concern of the past&nbsp;-- the prevention of a major power war&nbsp;-- dissipated. U.S. policy seemed to be guiding important regional disputes, such as those in the Middle East and on the Korean Peninsula, toward settlement.</span></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">But, in the absence of a defining idea for American policy, this transitional period became a time of one step forward, one step back. For example, we made significant progress on the international economic front with the launch of the North American Free Trade Agreement and the World Trade Organization (WHO), only to confront the expiration of Fast Track authority, financial meltdown in many parts of the world, and the debacle of the 1999 WTO meeting in Seattle. Democracy spread as never before, yet in many places its roots remained shallow and vulnerable to disappointment and backlash.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">In the 1990s, the wars of Yugoslav succession and the dilemmas posed by "failed" states, such as Somalia and Haiti, moved the issue of humanitarian intervention to the top of the foreign policy agenda. We saw relative successes like Kosovo, and complete failures like Rwanda. There was confusion over both the goals and means of policy.</span></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Still, despite the lack of clarity, most Americans perceived a seemingly inexorable positive trend in international developments. From the American perspective, therefore, foreign engagement appeared to be a matter of discretion&nbsp;-- of choice, not necessity. With the demise of the Soviet Union, the oceans once again seemed to afford us privileged security. Even in the face of growing transnational threats from the proliferation of weapons of mass destruction, terrorism, infectious diseases, and environmental degradation, we continued to feel secure in our homeland. Preserving our way of life against external threat seemed a low cost, second order proposition.</span></p><b data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">
</span></b><p data-dcnode-id="317"><b data-dcnode-id="319"><span data-dcnode-id="321" instrument_node="">The Post-Post-Cold War World: The Intersection of the Transnational and the Traditional</span><br data-dcnode-id="320"></b><span data-dcnode-id="318" instrument_node="">Then came the tragic events of September 11. The attacks on the World Trade Center and the Pentagon did not create the post-post-Cold War world. But they helped end the decade of complacency. They forced Americans to see clearly that foreign policy still matters, and that our oceans and our ICBMs alone do not make us safe. They brought home the stark reality that if we do not engage with the world, the world will engage with us, and in ways we may not like.</span></p><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">So, on September 11, our innocence ended, and we entered the post-post-Cold War world, a period when increasingly potent transnational challenges intersect with still important traditional concerns. The attacks were a grim reminder of how the march of globalization has raised the stakes from transnational threats. The murderers used cell phones, email and the Internet to communicate. They moved money via wire. And they turned civilian airliners into flying missiles that killed 3,000 unsuspecting people right here in our homeland. </span></p><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Transnational threats can present a clear and present danger to our way of life. They require a resolute response. At the same time, we do not have the luxury of focusing exclusively on transnational threats. </span></p><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Traditional challenges are still with us and still possess the potential to do great harm. They largely belong to the security realm and involve matters of war and peace, mostly although not exclusively between nation-states. A partial list of such challenges would include the situations in the Middle East, between India and Pakistan, on the Korean Peninsula, and in Colombia, as well as the threat posed by an Iraq in possession of weapons of mass destruction. </span></p><b data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">
</span></b><p data-dcnode-id="301"><b data-dcnode-id="303"><span data-dcnode-id="305" instrument_node="">Why Doctrine Matters</span><br data-dcnode-id="304"></b><span data-dcnode-id="302" instrument_node="">U.S. foreign policy, therefore, will succeed or fail in the post-post-Cold War world by how well it copes with this era’s diverse security challenges, traditional and transnational alike.</span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">You will note that I said "foreign policy"&nbsp;-- singular&nbsp;-- not "foreign policies"&nbsp;-- plural. On the international front, we have to move in one direction, not many. Our programs and initiatives must work in concert, not competition. Policymakers and the public alike need a compass to give strategic direction to avoid being incessantly pulled to and fro when dealing with everyday events and unexpected crises. We need a considered, reasoned approach&nbsp;-- an approach that might eventually evolve into a doctrine&nbsp;-- to help us navigate in the post-post-Cold War world. </span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Why do we need a doctrine? A doctrine not only gives overall direction to policy, but it also helps establish basic priorities. It can help shape, size, and direct the allocation of resources, while allowing policymakers to conserve that most precious of all resources, their time. It also signals to our allies and our adversaries abroad, and to our Congress and public at home, where our policies are heading, what they will entail, and what can be expected from American leadership. A doctrine offers strategic clarity. </span></p><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">It is especially important for the United States to have a cogent foreign policy approach because the United States is&nbsp;-- and will remain into the foreseeable future&nbsp;-- the world’s preeminent power according to every metric -- military, economic, political, or cultural. The United States will continue to affect the shape of international relations and their trajectory more than any other country. </span></p><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">This is a fact, not a boast. The decisions we make or fail to make, what we do or don’t do, and what we say or don’t say, will have widespread repercussions. </span></p><b data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">
</span></b><p data-dcnode-id="282"><b data-dcnode-id="284"><span data-dcnode-id="286" instrument_node="">Whence Doctrine?</span><br data-dcnode-id="285"></b><span data-dcnode-id="283" instrument_node="">But strategic clarity does not come easily. To be successful, a doctrine cannot be just a clever turn of phrase or neat academic construct. It must emerge as much from experience as from intellect. Doctrine is discovered more than invented. And this takes time.</span></p><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="280" instrument_node="">The case of "containment" is instructive. George Kennan first popularized the term "containment" in his famous "X" article in </span><i data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Foreign Affairs </span></i><span data-dcnode-id="277" instrument_node="">in 1947. But containment did not spring fully formed from the mind of Kennan alone. And it did not gain acceptance overnight. We easily forget that at the time of Truman’s election to the presidency, in November 1948, the majority of Americans still could not define what was meant by the phrase "Cold War." </span></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Containment’s success was a cumulative development. Kennan’s ideas originally resonated within government because they helped make sense of what had already occurred and the trajectory policy had begun to acquire. Like Moliere’s Monsieur Jourdain, who was delighted to learn that he had been speaking prose all of his life, American officials had already been speaking containment without knowing it. </span></p><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Containment evolved. Interpretations of its meaning varied. Errors and excesses were committed in its name. It did not prescribe policies for every international development. Yet containment endured as our doctrine through the Cold War because it proved an enormously successful framework for relating our interests and values to the main trends shaping the world. Containment proved itself by meeting the pragmatic standard in his own right&nbsp;-- it worked. </span></p><b data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">
</span></b><p data-dcnode-id="260"><b data-dcnode-id="265"><span data-dcnode-id="267" instrument_node="">Toward a Doctrine of Integration</span><br data-dcnode-id="266"></b><span data-dcnode-id="264" instrument_node="">Is there today a doctrine that encompasses the complexities of this era defined by the intersection of traditional and transnational security concerns, a doctrine that points the way forward for U.S. foreign policy? There clearly is a consistent body of ideas and policies that guides the Bush Administration’s foreign policy. Whether these ideas and policies will evolve into a formal doctrine with a name, I’ll leave to history to decide. But this coherence exists and can be captured by the idea of </span><i data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">integration</span></i><span data-dcnode-id="261" instrument_node="">. </span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">In the 21st century, the principal aim of American foreign policy is to integrate other countries and organizations into arrangements that will sustain a world consistent with U.S. interests and values, and thereby promote peace, prosperity, and justice as widely as possible. Integration of new partners into our efforts will help us deal with traditional challenges of maintaining peace in divided regions as well as with transnational threats such as international terrorism and the proliferation of weapons of mass destruction. It will also help bring into the globalized world those who have previously been left out. In this era, our fate is intertwined with the fate of others, so our success must be shared success.</span></p><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">We are doing this by persuading more and more governments and, at a deeper level, people to sign on to certain key ideas as to how the world should operate for our mutual benefit. Integration is about bringing nations together and then building frameworks of cooperation and, where feasible, institutions that reinforce and sustain them even more. </span></p><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">It is important to point out that the ideas I am talking about&nbsp;-- what President Bush has termed "the non-negotiable demands of human dignity: rule of law, limits on the power of the state, respect for women, private property, equal justice, religious tolerance"&nbsp;-- are not narrow American values that benefit Americans only. To the contrary, they are universal values that people everywhere would benefit from. </span></p><span data-dcnode-id="250" instrument_node="">
</span><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">Nor is integration merely a defensive response to the world we live in. Integration is in fact a profoundly optimistic approach to international relations. As Secretary Powell likes to point out, we live in a time of historic opportunity. With war between great powers almost unthinkable, we can turn our efforts from containment and deterrence to consultation and cooperation. We can move from a balance of power to a pooling of power.</span></p><span data-dcnode-id="247" instrument_node="">
</span><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Integration reflects not merely a hope for the future, but the emerging reality of the Bush Administration’s foreign policy. Indeed, akin to the experience of containment over five decades ago, we have in a way been speaking integration without knowing it.</span></p><span data-dcnode-id="244" instrument_node="">
</span><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">We can see this clearly in our relations with the other major powers. We are on the road to a vastly changed relationship with Russia. President Putin’s response to the attacks on the United States accelerated a trend already under way toward a relationship based on common interests. We are cooperating on a range of transnational issues, and it is no longer fanciful to speak of the day when Russia enters the WTO. </span></p><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">This historic shift was reaffirmed just last week, when in his annual speech to the Duma, President Putin tied Russia’s future to integration into the world economy and stated that the greatest threat to the international community&nbsp;-- of which Russia is a part&nbsp;-- is terrorism. Indeed, Secretary Powell coined the phrase "post-post-Cold War world" in the context of our strengthened relationship with Russia.</span></p><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Our relationship with our European allies is also evolving in this time when there is no Soviet threat to reinforce our unity of purpose. While the bonds across the Atlantic remain strong, they are being stretched in new ways – and, yes, even strained at times – as the Europeans search to develop a common approach to international affairs consistent with their power and interests, and as we seek to enlist European cooperation in the world beyond Europe. Our relationship with Europe is not at risk. But the issues we deal with, and the ways we deal with them, are evolving.</span></p><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">The same holds true for allies elsewhere, such as Japan, South Korea, the Philippines, Thailand, and Australia, especially as we try to define a security architecture for Asia that meets our needs in the post-post-Cold War world. </span></p><span data-dcnode-id="232" instrument_node="">
</span><p data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">The case of Pakistan is particularly dramatic. Faced with a stark choice, President Musharraf made the strategic choice to reorient his country’s foreign policy and stand with the United States and the rest of the international community against the Taliban and al-Qaida. </span></p><span data-dcnode-id="229" instrument_node="">
</span><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">One of the major challenges and opportunities of the post-post-Cold War world is the integration of China and India into the international system. This is already happening. We are encouraged by Beijing’s entry into the WTO last November and its cooperation in the war against terrorism. With India, the Bush Administration had already opened before September 11 an unprecedented dialogue between our two countries&nbsp;-- the world’s two largest democracies. Since then, in our common response to the terrorist threat, we have developed new and deeper relations across the board. </span></p><span data-dcnode-id="226" instrument_node="">
</span><p data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">There are no ironclad laws of international relations, but both emerging and declining major powers have caused turbulence in their wake. How we manage our relations with these new powers – and whether we can forge new kinds of partnerships with them&nbsp;-- will be critical to our success.</span></p><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">Integration applies to institutions as well as relationships. We are helping adapt institutions inherited from the past century to cope with the challenges of this one, challenges ranging from international terrorism to the spread of infectious disease. We are doing this not just in NATO, but in the Organization of American States, the Asia-Pacific Economic Cooperation forum, the United Nations, and numerous other organizations. We are creating an architecture for this new era that will sustain the cooperative pursuit of shared global interests even when disagreements over more limited or local issues intrude&nbsp;-- as they inevitably will.</span></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="215"><span data-dcnode-id="219" instrument_node="">The Bush Administration is also aggressively promoting trade as a way to integrate more nations and peoples into a more stable, prosperous, and equitable international order. The latest </span><i data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Economic Report of the President </span></i><span data-dcnode-id="216" instrument_node="">highlights support for global economic integration as a top Administration priority. American leadership proved instrumental in launching the Doha WTO round last November, and the Administration is working hard to secure the Trade Promotion Authority necessary to take advantage of it. The African Growth and Opportunity Act is helping stimulate economic growth in Africa. We are looking forward to extending and expanding the Andean Trade Preference Act, as well as joining with Brazil this November in leading the next round of negotiations for the Free Trade of the Americas Agreement.</span></p><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">We recognize, however, that some nations and their people cannot now tap into the benefits of the globalized economy because of these countries’ institutional and economic weaknesses. It would be morally repugnant&nbsp;-- and defy our nation’s deepest values&nbsp;-- to ignore the plight of the citizens of such countries. And, as Afghanistan taught us all too well, it would also be unwise to look away when states begin to fail. Today’s humanitarian problem can all too easily become tomorrow’s strategic threat.</span></p><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">It is for reasons such as these that the United States is pressing for fundamental reforms in how the World Bank handles development assistance. And, that is why President Bush announced last month his bold initiative to dramatically increase American foreign assistance by 50% over the next three years. The Millennium Challenge Account, moreover, will be allocated according to criteria that stress the mutually reinforcing connections among good governance, the rule of law, investment in people, open markets, and poverty reduction. </span></p><span data-dcnode-id="208" instrument_node="">
</span><p data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">Establishing new norms for this new era will be equally important to our success. The right to self-defense is an international norm that none deny. But over the past decade, we have seen an evolution in how the international community views sovereignty. Simply put, sovereignty does not grant governments a blank check to do whatever they like within their own borders. Instead, the principle that sovereignty carries responsibilities is gaining ground. </span></p><span data-dcnode-id="205" instrument_node="">
</span><p data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">We saw this in the humanitarian interventions of the past decade, such as in Kosovo. When governments violate the rights of their people on a large scale&nbsp;-- be it as an act of conscious policy or the byproduct of a loss of control&nbsp;-- the international community has the right and sometimes even obligation to act. Since September 11, behind President Bush’s leadership, we have seen similar changes in how the international community views states’ responsibilities vis-à-vis terrorism. Countries affected by states that abet, support, or harbor international terrorists, or are incapable of controlling terrorists operating from their territory, have the right to take action to protect their citizens.</span></p><b data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">
</span></b><p data-dcnode-id="193"><b data-dcnode-id="198"><span data-dcnode-id="200" instrument_node="">Implementing Integration</span><br data-dcnode-id="199"></b><span data-dcnode-id="197" instrument_node="">We see the Administration implementing integration with all the tools of statecraft. The conduct of the global campaign against terrorism is a prime example of this approach. While at times the military has been the most visible to the outside world, and while we salute the valor of our brave young men and women in uniform, over the long haul the military tool will almost certainly </span><i data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">not</span></i><span data-dcnode-id="194" instrument_node=""> be the most important contributor to our success. Instead, a combination of diplomatic, economic, intelligence, financial, and law enforcement means&nbsp;-- along with military&nbsp;-- will make the difference. </span></p><span data-dcnode-id="192" instrument_node="">
</span><p data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">Furthermore, in an era when so much expertise and power is in private hands, we have to forge new, unprecedented public-private partnerships to achieve our goals. We see harbingers of this in the Global Fund on HIV/AIDS, tuberculosis, and malaria, and in our efforts to protect critical infrastructure around the world.</span></p><span data-dcnode-id="189" instrument_node="">
</span><p data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">As the case of HIV/AIDS also underscores, the transnational challenges inherent in this globalized era often defy the efforts of any single country – even a country as powerful as the United States. No single country can sustain a robust international financial architecture, maintain the forward momentum around the globe for good governance, rule of law, and democracy, cope with state failures and humanitarian catastrophes, or defeat international terrorism. Transnational challenges demand transnational solutions.</span></p><span data-dcnode-id="186" instrument_node="">
</span><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Despite our unmatched power, therefore, working with others is not merely desirable because it materially or morally strengthens our efforts. It is often essential for our success. As Secretary Powell has said of the coalition fighting terrorism today, "The coalition we have built does not tie President Bush’s hands. It magnifies his efforts. The coalition is a force multiplier in our campaign&nbsp;-- for all the tools we are using."</span></p><span data-dcnode-id="183" instrument_node="">
</span><p data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Considering the Bush Administration’s foreign policy in its entirety, you can see how basic principles of a hard-headed multilateralism are helping us implement integration. Certain truths are already clear.</span></p><span data-dcnode-id="180" instrument_node="">
</span><p data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">First and foremost, American leadership is fundamental. Without it, multilateral initiatives can be stillborn, go astray&nbsp;-- or worse. We must be resolute and confident once we have embarked upon a policy. Yet leadership demands, as President Bush has emphasized on many occasions, a sense of humility. Leadership thus requires genuine consultation. We must respect the values, judgment, and interests of our friends and partners. We have no monopoly on wisdom. </span></p><span data-dcnode-id="177" instrument_node="">
</span><p align="center" data-dcnode-id="176"></p><span data-dcnode-id="175" instrument_node="">
</span><p data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Second, in forming multilateral initiatives in this era, we should not be shackled by the memories of past animosities. Ultimately, we are interested in results. We thus must continue to try to integrate Russia, China, India, the Arab world, African countries, and others into our efforts to create a better future based on our common values. This is an era of new partnerships.</span></p><span data-dcnode-id="172" instrument_node="">
</span><p data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Third, we cannot expect every nation to make the same commitment to every coalition. Differences in capabilities, location, foreign policy outlook, and domestic concerns make this impracticable. Instead, we should expect our coalitions to be dynamic and embrace the benefits of division of labor. Some multilateral efforts will become embedded in more formal institutional structures, but others will change through time as specific challenges wax, wane, and evolve. Even in the campaign against terrorism we have, as Secretary of Defense Rumsfeld says, not "a single coalition," but "revolving coalitions that will evolve and change over time depending on the activity and the circumstance of the country."</span></p><span data-dcnode-id="169" instrument_node="">
</span><p data-dcnode-id="168"></p><span data-dcnode-id="167" instrument_node="">
</span><p data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">Fourth, our desire to work cooperatively with others does not imply a willingness on our part to agree to unsound efforts just because they are popular. Empty or ineffective, but high-profile, agreements do not make for an effective foreign policy. Nor can we forget that the United States has unique global responsibilities. If we are to meet them effectively, we may not always be able to go along with measures that many or even most others support. We will listen, learn, and modify policies when we hear compelling arguments. But we all recognize that even the closest of friends will sometimes disagree on what constitutes the best policy. We will not go along simply to get along.</span></p><span data-dcnode-id="164" instrument_node="">
</span><p data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Fifth and finally, we have demonstrated that we can and will act alone when necessary. Our right to self-defense is unquestioned. By the same token, we do not take lightly the costs to ourselves and to others when we forego participation in some multilateral initiative. We will give consultations every reasonable chance to produce an acceptable outcome. But if we conclude that agreement is beyond reach, we will explain why and do our best to put forth alternatives. We have shown this commitment in policies ranging from developing a new strategic framework to protecting the environment. And we will continue to do so.</span></p><b data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">
</span></b><p data-dcnode-id="155"><b data-dcnode-id="157"><span data-dcnode-id="159" instrument_node="">Conclusion</span><br data-dcnode-id="158"></b><span data-dcnode-id="156" instrument_node="">The Bush Administration’s foreign policy is based upon a clear-eyed understanding of the challenges of this new century. It comprehends both the traditional and the transnational factors shaping the post-post-Cold War world. It is guided by the principle of integration, but recognizes that success is by no means inevitable. There is a natural tendency in any system toward entropy. No invisible hand makes the international environment increasingly hospitable to our values and interests. Only human hands&nbsp;-- often American hands&nbsp;-- can do that work. </span></p><span data-dcnode-id="154" instrument_node="">
</span><p data-dcnode-id="153"></p><span data-dcnode-id="152" instrument_node="">
</span><p data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">The challenge for American foreign policy is translating our strength into something lasting&nbsp;-- a world where our way of life is secure and universal values are embraced as standards, not exceptions. We now have the opportunity to do this. We have already begun to realize this potential. We know the way forward. George Kennan stressed over five decades ago one of the major weapons in our foreign policy arsenal was "the cultivation of solidarity with other like-minded nations on every given issue of foreign policy." In the post-post-Cold War world, it still is.</span></p><span data-dcnode-id="149" instrument_node="">
</span><p data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">________________________________________</span></p><span data-dcnode-id="146" instrument_node="">
</span><p data-dcnode-id="141"><span data-dcnode-id="145" instrument_node="">For texts of other statements, testimony and articles by Richard Haass and other members of the Policy Planning Staff, please go to the </span><a data-dcnode-id="143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2001-2009.state.gov/s/p/index.htm"><span data-dcnode-id="144" instrument_node="">Policy Planning home page</span></a><span data-dcnode-id="142" instrument_node="">.</span></p></font><span data-dcnode-id="139" instrument_node="">
