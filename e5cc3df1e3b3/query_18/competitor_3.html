</span><meta content="Critics of foreign aid programs have long argued that poverty reflects government failure. In this paper I test predictions for aid effectiveness base…" data-dcnode-id="2857" property="og:description"><span data-dcnode-id="2856" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id3&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id4&quot;><p>Critics of foreign aid programs have long argued that poverty reflects government failure. In this paper I test predictions for aid effectiveness based on an analytical framework that relates aid effectiveness to political regimes. I find that aid does not significantly increase investment, nor benefit the poor as measured by improvements in human development indicators, but it does increase the size of government. The impact of aid does not vary according to whether recipient governments are liberal democratic or highly repressive. But liberal political regimes and democracies, ceteris paribus, have on average 30% lower infant mortality than the least free regimes. This may be due to greater empowerment of the poor under liberal regimes even though the political elite continues to receive the benefits of aid programs. An implication is that short-term aid targeted to support new liberal regimes <em>may</em> be a more successful means of reducing poverty than current programs.</p></div></div></div>" data-dcnode-id="2855" lang="en" name="citation_abstract"><span data-dcnode-id="2854" instrument_node="">

t.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3D0014292195001271%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2482" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="2479"></section><section class="ReferencedArticles" data-dcnode-id="2478"></section><div class="PageDivider" data-dcnode-id="2477"></div><div class="Abstracts u-font-serif" data-dcnode-id="2467" id="abstracts"><div class="abstract author" data-dcnode-id="2468" id="aep-abstract-id3"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Abstract</span></h2><div data-dcnode-id="2469" id="aep-abstract-sec-id4"><p data-dcnode-id="2470"><span data-dcnode-id="2474" instrument_node="">Critics of foreign aid programs have long argued that poverty reflects government failure. In this paper I test predictions for aid effectiveness based on an analytical framework that relates aid effectiveness to political regimes. I find that aid does not significantly increase investment, nor benefit the poor as measured by improvements in human development indicators, but it does increase the size of government. The impact of aid does not vary according to whether recipient governments are liberal democratic or highly repressive. But liberal political regimes and democracies, ceteris paribus, have on average 30% lower infant mortality than the least free regimes. This may be due to greater empowerment of the poor under liberal regimes even though the political elite continues to receive the benefits of aid programs. An implication is that short-term aid targeted to support new liberal regimes </span><em data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">may</span></em><span data-dcnode-id="2471" instrument_node=""> be a more successful means of reducing poverty than current programs.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="2444" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="2456"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="2457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/0014292195000631"><svg class="icon icon-navigate-left" data-dcnode-id="2465" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="2466"></path></svg><span class="button-alternative-text" data-dcnode-id="2458"><strong data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="2445"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="2446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/0014292195001255"><span class="button-alternative-text" data-dcnode-id="2449"><strong data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="2447" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="2448"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="2419"><div class="keywords-section" data-dcnode-id="2429" id="aep-keywords-id5"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">JEL classification</span></h2><div class="keyword" data-dcnode-id="2439"><span data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">E1</span></span></div><div class="keyword" data-dcnode-id="2436"><span data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">F35</span></span></div><div class="keyword" data-dcnode-id="2433"><span data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">O11</span></span></div><div class="keyword" data-dcnode-id="2430"><span data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">O19</span></span></div></div><div class="keywords-section" data-dcnode-id="2420" id="aep-keywords-id6"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="2424"><span data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Foreign aid</span></span></div><div class="keyword" data-dcnode-id="2421"><span data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">Savings</span></span></div></div></div><div class="RawText" data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">      EUROPEAN  ECONOMIC  REVIEW    ELSEVIER European Economic Review 40 ( 1996) 289-329    Politics and the effectiveness of foreign aid    Peter Boone    Economics Department, London School of Economics und Center for Economic Peiformuie,  Houghton Street, London WC2A 2AE, UK    Abstract    Critics of foreign aid programs have long argued that poverty reflects government  failure. In this paper I test predictions for aid effectiveness based on an analytical  framework that relates aid effectiveness to political regimes. I find that aid does not  significantly increase investment, nor benefit the poor as measured by improvements in  human development indicators, but it does increase the size of government. The impact of  aid does not vary according to whether recipient governments are liberal democratic or  highly repressive. But liberal political regimes and democracies, ceteris paribus, have on  average 30% lower infant mortality than the least free regimes. This may be due to greater  empowerment of the poor under liberal regimes even though the political elite continues to  receive the benefits of aid programs. An implication is that short-term aid targeted to  support new liberal regimes may be a more successful means of reducing poverty than  current programs.    J EL classification: El; F35; 011; 019  Keywords: Foreign aid; Savings    1. Introduction    Foreign aid programs were launched long before there was compelling theory,  or compelling evidence that proved they could work. The stated goal of these  programs was to alleviate poverty and promote growth. The massive aid programs  that began after the second world war, but only took off in the 1960s, are an    ' E-mail: P.BOONE@LSE.AC.UK.    0014-2921/96/$15.00 1996 Eisevier Science B.V. All rights reserved  SSDf 0014-2921(95)00127-1    290    P. Boone / European Economie Review 40 (f996) 289-329    .15    .05    7AN    BU^  RMA    NIG  TOG    BAN    ETH NEP    ' KEN    o o  EGV    BOL   CON    ""MOR  COT  ;IM    INO  CHINIG    PAN  TUR  a)    BAR  KOR  ao       GRE    -5              -4              -3              -2              -1  Fig. l. Average aid/GNP and income per capita (base sample: 1971 -90).  y-axis: aid/GNP; x-axis: logarithm of income per capita relative to high income OECD.    unprecedented economic experiment. Donors transferred approximately $50 billion  of nonmilitary concessional aid in 1991 to developing countries, averaging over  8% of the recipient country's GNP in 1981-90. These transfers are highly variable  (see Fig. 1 and Table 1), fungible, and to a large extent politically motivated. The  impact of aid can be used as an interesting test of alternative theories of  development. Aid can also teach us about political regimes in recipient countries.  In this paper I focus on what can be learned about political systems.    There are several possible channels by which aid could alleviate poverty. The  early literature focused on capital market imperfections. If capital is not mobile,  poor countries may have a set of profitable investment projects that are not  undertaken due to a shortage of domestic savings. Low savings may be due to  absolute poverty when people have minimum subsistence needs. But a more  careful examination makes this explanation seem implausible. Capital markets do  function - during the last twenty years we have seen extremely large net capital  flows to developing countries. Further, the richest twenty percent of the population  earn more than fifty percent of income in developing countries.   We might  instead ask the question: Why does the high-income elite choose to invest  domestically in some countries while in others they don't?    Sundrum (1990, p. 74).    P. Boone / European Economie Review 40 {1996) 289-329    291    Table 1  Basic facts about aid (in the sample of 97 countries) '    Average aid/GNP ratio    81-90: range 0.00-0.54, sdev 0.112  71-80: range 0.00-0.35, sdev 0.035    In base sample:    81-90: range 0.00-0.144, sdev 0.039  71-80: range 0.00-0.146, sdev 0.045    Grant component (1980)    Restrictions on procurement (fraction by category):    Untied    Partially tied  Tied    Uses of aid (fraction by type):    Emergency aid    Food aid    Social and admin. infrastructure    Program aid    Economic infrastructure    Other    0.086  0.056    0.042  0.046    0.93    0.71  0.05  0.25    0.05  0.13  0.20  0.06  0.32  0.24    Sources of aid  Multilateral  Bilateral (of which):    France    Japan    OPEC    United Kingdom    United States    Other    0.25  0.75  0.13  0.15  0.07  0.04  0.18  0.43    Aid as a fraction of GDP from donor countries (members of DAC)  1970                                                     0.34  1980                                                     0.35  1990                                                     0.34    '' Social and administrative infrastructure applies to health care, education, technical assistance to  governments, etc. Economic Infrastructure is highways, electricity, irrigation, and other large public  investment projects. Program aid is balance of payments support.  Source: OECD (1992).    A second mechanism by which aid reduces poverty is through fiscal policy.  Barro (1990) presents an endogenous growth model where a benevolent dictator  uses distortionary taxation to finance productive public expenditures. The planner  chooses the optimal tax rate by comparing the social costs of higher taxation to the    292               P. Boone / European Economie Review 40 (l 996) 289-329    benefits of more public goods. Barro's model predicts that foreign assistance  causes faster growth and higher investment since the social planner can reduce  distortionary taxes.    But this mechanism depends critically on the political regime. The most ardent  critics of aid programs, especially Bauer (1971) and Friedman (1958), attack  foreign assistance on the grounds that politicians will not allocate aid efficiently  when measured against the goals of aid programs. They argue that recipient  countries will consume capital inflows since lack of domestic savings reflects lack  of opportunities. The political elite will benefit from aid flows. 2    This paper analyzes the importance of the political regime for the effectiveness  of aid programs. Standard categorizations of political regimes do not correlate with  clear economic regimes. A simple contrast of leaders in East Asia shows that  authoritarian regimes/dictatorships can be quasi-benevolent such as President Lee  of Singapore, or highly rent seeking such as President Marcos. Bayart (1992) lists  10 African dictators whom he claims used public office to divert large sums,  including foreign aid, to their tribe members or clients. 3 And elected or authoritar-  ian populist regimes, defined as regimes seeking to mobilize and represent the  poor, also use distortionary policies to redirect funds to their supporters.    In order to relate political regimes to economic systems, I begin by categorizing  alternative political regimes in terms of the interest groups they support. My  approach is motivated by a series of papers by Becker (Becker, 1983; Becker,  1985a; Becker, 1985b; Becker, 1989). Becker (1983) presents a public choice  model where a government chooses tax and spending policies as an outcome of  strategic interaction between groups that are endowed with different political  influence. Influence is exogenously endowed to citizens. He argues that in all  political regimes each citizen's relative influence will vary both for institutional  and other reasons. Democracies may allocate influence more evenly across the  population, but even so people's ability to mobilize support and influence govern-  ment will still depend on other attributes such as education, health, skills and the  ability to form coalitions.    In my framework ruling politicians maximize welfare over a weighted sum of  citizen's utilities. Politicians use distortionary taxation and foreign aid to finance  productive government spending and transfers to their political supporters. I  contrast how foreign aid is used under three extreme, alternative political regimes  that fall out naturally from this framework. An Elitist government maximizes the  welfare of a fixed ruling coalition. Its optimal policy is to transfer foreign aid to a  high-income political elite. An Egalitarian government maximizes the welfare of    These authors go much further. Both argue that poverty reflects harmful political regimes that  introduce distortionary policies for the benefits of a narrow political elite. Foreign aid can actually  cause a poverty trap if it strengthens these governments so they can stay in power.    3 Bayart (1992, p. 88).    4 Krieger (1993, p. 730).    P. Koene / European Economie Review 40 (1996) 2S9-329               293    a fixed group of citizens with relatively low endowments. Its optimal policy is to  transfer foreign aid to households with low initial endowments. This should  improve poverty indicators. A laissez-faire government maximizes the welfare of  a minimum (and substantial) fraction of the population. Its optimal policy is to use  aid to lower distortionary taxes. This leads to higher investment and income. Only  the elitist political regime wastes foreign aid as described by Bauer and Friedman.    I then test the empirical predictions from this model using data on nonmilitary  foreign aid transfers, national accounts, human development indicators, and in-  dexes of political liberties and political regime from 97 countries. I use three  alternative instruments, conduct instrument specification tests, and examine ro-  bustness using alternative subsamples and regression techniques.    The previous literature on the empirical impact of foreign aid is surprisingly  limited. This may be due to the difficulty in finding suitable instruments. Mosley  et al. (1987) are the closest in spirit to this paper, though their main focus was to  examine the relation between aid and growth, while in this paper 1 examine how  aid is used but I don't directly examine the impact on growth. They found no  correlation between aid and growth. Papanek (1972) strongly criticizes an early  literature on the impact of foreign aid. He describes a range of potential problems  due to simultaneity and measurement error. I will discuss relevant papers in the  sections that follow but other general papers on aid include Chenery and Eckstein  (1970), Chenery and Syrquin (1975), Griffin (1970), Levy (1987), Levy (1988).  Papanek (1973), Weisskopf (1972) and Boone (1995).    My empirical results suggest that elitist regimes best predict the impact of aid.  The marginal propensity to consume from aid is insignificantly different from one.  and the marginal propensity to invest is insignificantly different from zero. I find  no significant impact of aid on tax proxies, nor on measures of distortionary  policies, but I do find that aid increases the size of government. Government  consumption rises by approximately three quarters of total aid receipts.    There is one important caveat to these findings. In small countries, or countries  where the aid/GNP ratio is extremely large (over 15% of GNP) I find that aid  does lead to higher investment. This is probably due to the lack of fungibility of  aid flows in such countries. In a small country one dam or large public infrastruc-  ture project can represent a sizable portion of GNP, and the project is unlikely to  be fungible.    Even though in most countries aid primarily goes to consumption, it may still  benefit the poor and reduce poverty. I test for this by examining the impact of aid  on changes in basic indicators of human development. Since infant mortality  indicators respond quickly to higher consumption and improved health services.  infant mortality can be considered a flash indicator of improvements in economic  conditions of the poor. I find no significant impact of aid on improvements in  infant mortality, primary schooling ratios nor life expectancy. I argue this is strong  evidence that aid flows primarily benefit a wealthy political elite.    These results may be biased since I am aggregating a range of political regimes.    294               P. Boone / European Economie Review 40 (l 996) 289-329    So in the final set of empirical tests I examine whether different political regimes  use aid differently. I allow for a differential impact of aid in liberal democratic  regimes and according to a ranking of political liberties. But my empirical results  reject the hypothesis that democratic/liberal regimes use aid differently. Under  each regime I cannot reject the hypothesis that all aid is used for consumption, and  there is no significant impact of aid on human development indicators.    But this does not imply that democratic regimes treat the poor the same as less  liberal regimes. I do find that nations with democratic/liberal political regimes,  ceteris paribus, have 30% lower infant mortality than nations with highly repres-  sive regimes. One plausible interpretation of this evidence is that the poor are  more empowered under liberal regimes, and this induces governments to provide  more basic services. But once conditioning on these different regimes, my results  suggest that all political systems support a high income political elite. So it is not  surprising that aid benefits this elite.    The remainder of this paper is organized as follows. Section 2 presents my  analytical framework. Section 3 outlines empirical tests based on reduced form  equations from this model. Sections 4, 5 and 6 discuss data sources, the determi-  nants of aid flows, and my choice of instruments and specification tests respec-  tively. Section 7 presents empirical results using aggregate aid flows, and Section  8 allows for differences across political regimes. Section 9 concludes.    2. Public choice under alternative political regimes    The debate over the effectiveness of foreign aid centers on the role of the  political regime in causing poverty. In this section I briefly describe a model of  political behavior that encompasses cases where aid is effective and cases where  aid is ineffective, a full derivation of the model is given in Appendix B. My  starting point is to make specific assumptions about the goals of a political regime,  and I then examine economic outcomes and the effectiveness of aid under  different regimes. The reduced form equations from this model motivate my  empirical work.    I consider a world with many countries all growing at some constant rate g  along a steady state growth path. Each country has politicians that choose  macroeconomic policies to maximize welfare of their political elite, and Ramsey  style households take these policy choices as given when they make optimal  consumption and investment decisions. I want to use this framework to examine  why some poor countries remain relatively poor, and do not grow faster and  catch-up to the high income countries, so throughout this section I solve for  steady-state outcomes and I drop all time subscripts. I begin by defining the  politician's maximization problem, and then I briefly outline familiar producer and  consumer problems. In the final subsection I characterize predicted effectiveness    P. Bonne/European Economie Review 40 (1996) 289-329              295    of aid and the cross section pattern of national incomes according to political  regime types.    2.1. The Politician's maximization problem:    The political regime is determined by the type and breadth of persons that  politicians take into account when choosing government policies. In each country  the political regime maximizes the welfare of a fraction, s *, of the population  which from hereon I call the political elite. The members of the political elite are  identical, the total (mass of the) population in each country is normalized to equal  one, and I shall index each citizen using subscript .s- over the interval [0, 1].  Households differ according to their labor endowment, /c. and the sum of all labor  is normalized to one.    The role of the government is to finance productive public goods but it can also  make non-productive transfers to the elite. Politicians use distortionary financing,  here a proportional income tax, T, to raise funds to finance public goods, G, and to  carry out lump sum and strictly positive transfers, r,. Governments can also  receive foreign aid. In orde small countries reinforces  this point.    The second instrument directly captures the political determinants of aid flows.  I use three variables to capture interests of major donors with clear political  agendas. These are the variables described above: Friends of US, Friends of  OPEC, and Friends of France. In these regressions 1 also control for other  determinants of aid flows, so the instruments capture large aid flows from donors  after controlling for income, growth rates, etc. These instruments are valid if the  recipient countries receive these large aid flows purely for political reasons. The  instruments would be invalid if large bilateral aid was driven by factors related to  country need that I have not controlled for. My assumption here is that the US,  French and OPEC countries give this aid for political motives.    The final instrument is twice-lagged aid (here I use five-year averages of data).  Lagged aid should be uncorrelated with emergencies and business cycle factors  while correlated with the long-term political and strategic factors that make some  countries high aid recipients. This makes it a good candidate as an instrument, but  several caveats should be taken into account. Business cycle factors could  introduce a spurious correlation between aid and national accounts over the  business cycle. This is particularly true of shocks that cause temporary fluctuations  in the real exchange rate such as fiscal spending financed by foreign borrowing.    To limit this sort of spurious correlation I use two lags of aid. A second caveat is  that high aid/GNP ratios may reflect more fundamental problems that cause  poverty in recipient countries. To the extent that these problems persist over long  periods of time, then lagged aid will be correlated with these fundamental factors.  In this case population and the political instruments described above will serve as  alternative means to test robustness of the results.    I compare the results from t tional income. 26 If a country received aid equal to 10%  of GNP, and if all aid were allocated to the bottom three quintiles of income  earners, the income of this group could potentially rise by 38%. Based on the cross  country relation between infant mortality and income, this could reduce infant  mortality by roughly 20%. 2? Instead my estimates predict infant mortality falls by  2-3%, and there is no evidence in cross section data (see Table 2) that high aid  recipients have better initial levels of infant mortality. This shows that the poor  receive very little of the benefits of aid programs.    " It is possible that aid channeled through the government could be used differently than aid  distributed through the private sector. To test whether aid not channeled through the government was  used differently, I divided the data into two subsamples of high and low spending governments. Low  spending governments are observations where the government spending ratio was less than the median.  In this subsample the coefficient on private consumption rose to 1.02 ((-statistic 2.52) while the  coefficient on government consumption fell to 0.08 ((-statistic 0.71). The respective coefficients for  high spending governments were 0.18 ((-statistic 0.47) and 0.52 ((-statistic 2.9). In each case the  coefficient on investment was insignificant and small, while the coefficient on total consumption was  insignificantly different from one.    6 Sundrum (1990, p. 74, Table 4.1, line 2).    27 A regression of infant mortality on income predicts that a 10% rise in GNP causes a 5% decline in  infant mortality.    318    P. Boone / European Economie Review 40 {1996) 289-329    S      "    3    Si    ia  3    ^          Aid/GNP    Fig. 4. CPR plot of the improvement in infant mortality and aid/GNP ratios using the base sample of  countries (20 year averaged data: 1971-90)    y-axis: log difference of infant mortality (1990 minus 1971); x-axis: aid/GNP.    Fig. 4 shows that government , some aid advocates argue that aid should only  go to countries with good political regimes since these are the countries that will  use aid effectively.In this section I test whether alternative political regimes use  aid differently, and I also test whether different political regimes are more  successful at relieving poverty. I use two different categorizations of regime types.  First, I use an index of political liberties published by Gastil (1989). This is an  ordinal ranking of political liberties based on country surveys. I invert their scale  so the index ranges from 0.142 to 1.00 in ascending order of political liberties  using the measure for the middle of each decade. The second index is a dummy set  to one if the country is a liberal democracy according to Derbyshire and  Derbyshire (1989) throughout the whole sample period, and zero otherwise.    My first set of tests examines whether different political regimes use aid  differently. I run each regression from the first column of the summary Table 4,  now including an interaction term with foreign aid, and an own effect as a proxy  for the possible impact of political regimes. The coefficients on these variables are  reported in Table 7.    The results show that liberal political regimes do not use aid any differently  from the most repressive regimes. No interaction term or own effect term is  significant at the 5% level, and coefficients are generally small. 29    These findings suggest that all political regimes allocate foreign aid to a high  income political elite. But it is interesting to examine whether different political  regimes perform better in measures of basic human development indicators. In my  framework political regime shifts or revolutions can lead to improvements in  poverty indicators if the new governments are more egalitarian and more represen-  tative. Even though liberal democracies may still use aid in a similar manner as  other regimes, they may still give more power to the poor. This power could  induce governments to provide more basic services.    These results do not change if I interact political variables with all right hand side variables. For  example, using the Derbyshire and Derbyshire index, the coefficients on the interaction terms with  foreign aid in these regressions were: total consumption (0.015), investment (0.213) and on infant  mortality (0.67). The t-statistics were 0.0, 0.4, and 1.1 respectively.    320    P. Boone / European Economie Review 40 (1996) 289-329    Table 7    The impact of foreign aid allowing for differences in political regimes and political liberties (the table  reports the coefficient on the political regime variable and political regime interacted with foreign  aid/GNP in alternative regression equations) '        Measure of the political regime:Dependent variable Index of political liberties (dummy variable from 0.14 to l ) Liberal den (dummy = K 1 )cracies if democratic)   Own effect I Interaction with foreign aid/GNP II Own effect III Interaction with foreign aid/GNP IV  Total 0.038 0.583 0.003  0.253  consumption (0.99) (0.81) (0.14)  (0.62)  Private 0.044 0.771 0.008  0.303  consumption (0.94) (0.87) (0.33)  (0.60)  Public and private -0.046 -0.055 -0.010  0.059  investment (1.42) (0.09) (0.57)  (0.17)  Government -0.006 -0.188 -0.005  -0.051  consumption (0.27) (0.44) (0.45)  (0.21)  Black market -0.006 0.045 0.014  -0.036  premium (0.87) (0.38) (0.04)  (0.54)  Indirect 0.009 -0.022 -0.009  0.088  taxes (0.35) (0.04) (0.65)  (0.31)  Inflation -0.135 -3.450 -0.322  0.874  tax (0.28) (0.386) (1.29)  (0.18)  Change in log -0.154 1.782 -0.066  0.0735  infant mortality (1.74) (1.08) (1.41)  (0.77)  Change in log 0.010 0.030 0.006  0.075  life expectancy (0.62) (0.10) (0.79)  (0.44)  Change in log -0.044 1.209 -0.036  1.121  primary schooling (0.44) (0.64) (0.68)  (0.88)    (-statistics reported in parentheses, standard errors are adjusted for a country specific random effect.  Each regression ha beral societies, they  continue to be weak relative to the political elite and hence only receive a small  fraction of the benefits of aid.    9. Conclusions    The aim of this paper was to relate the effectiveness of foreign aid programs to  the political regime of recipient countries. I presented a simple analytical frame-  work where poverty is caused or enhanced by distortionary policies introduced by  politicians. In my framework, aid does not promote economic development for  two reasons: Poverty is not caused by capital shortage, and it is not optimal for  politicians to adjust distortionary policies when they receive aid flows.Between  1971 and 1990 most long-term aid was provided on a regular basis with little or no  effective conditionality. I found this aid increased consumption but higher con-  sumption did not benefit the poor. The point estimates in my regressions show  there was an insignificant impact on investment in countries that received less than  15% of GNP in aid, though standard errors on these estimates were large. I also  found that aid had an insignificant impact on improvements in basic measures of  human development such as infant mortality and primary schooling ratios. These  results suggest that even while particular programs such as immunization and  research can be effective, the bulk of long-term aid programs have had little  impact on human development and investment between 1971 and 1990.    My empirical results are consistent with a model where politicians maximize  welfare of a wealthy elite, and consistent with the pessimistic predictions of Bauer  (1971) and Friedman (1958). Past experience has proven it is possible to dramati-  cally improve human development indicators at low cost over a ten to twenty year  period. Dreze and Sen (1982) argue that the failure of governments to reduce  infant mortality and improve basic human development indicators reflects public    30 Barro (1994) forecasts democratization of countries. He runs regressions of political liberties on  life expectancy (and other RHS variables) and finds a positive correlation. He interprets this positive  correlation as evidence that households demand liberties as their standard of living increases, i.e.  democracy is a luxury good. Since I am controlling for standard of living as measured by income, I  suspect this correlation is at least in part driven by a higher propensity for democratic governments to  redistribute. This matches theory and empirical evidence in Persson and Tabellini (1994).    P. Boone / European Economie Review 40 (1996) 289-329               323    choice. The findings in this paper suggest that aid programs have not substantially  changed government's incentives to carry out these programs, nor have aid  programs engendered or correlated with the basic ingredients that cause invest-  ment and growth.    These findings emphasize the need to better understand the potential role of aid  as a tool in changing political incentives. Casella and Eichengreen (1994) examine  the potential efficacy of aid in ending harmful wars of attrition between political  actors, and Sachs (1994) concludes that short-term aid has in the past played a key  role in promoting stabilization and maintaining political stability. In my model aid  can be effective when it is conditional on policy and/or political reforms, and it  can be effective in narrow cases where aid is non-fungible.    I presented some evidence that political reforms alone can play an important  role. In my empirical work I concluded that while at the margin all political  systems allocate aid to the elite, liberal political regimes, ceteris paribus, have  approximately 30% lower infant mortality than the least free regimes. This may  reflect a willingness of liberal regimes to provide more of the basic, though  inexpensive services that are needed to prevent famine and improve human  development indicators. But it may also reflect other cultural factors or economic  conditions that I was unable to control for in these regressions. My coefficient  estimates imply that in order to achieve the same reduction in infant mortality  through existing long-term aid programs, donors would have to provide annual aid  equal to 150% of GNP for ten years to the recipient country.    One plausible implication is that short-term aid programs targeted to support  new liberal political regimes, and to encourage greater political and social  liberties, may be a more effective means of promoting sustainable development  and reducing poverty than current aid programs. If these new regimes stay in  power long enough to improve literacy, health care, and education then they may  sufficiently empower the poor in the political system so that poverty reduction  becomes self sustaining. But alternatively, it may be that the underlying factors  that support liberal regimes and poverty reduction are rooted in historical, cultural  and institutional factors that are not affected by new governments. In this case,  new liberal regimes will not survive, or they may not implement the basic policies  needed to reduce poverty and promote development.    Acknowledgements    I am grateful for comments from Robert Barro, Charlie Bean, William Easterly,  Barry Eichengreen, Danny Quah, Sweder van Wijnbergen, Eric van Wincoop, and  seminar participants at the International Monetary Fund, ISOM, the LSE Macroe-  conomics workshop, the NBER growth conference at the Universit Pompeu  Fabra, the London School of Hygiene and Tropical Medicine, University of  Miami, University of Reading and the World Bank. The data on foreign aid used    324    P. Boone / European Economie Review 40 (1996) 289-329    in this paper was provided by the Development Assistance Committee at the  Organization for Economic Cooperation and Development for the purpose of  academic research.    Appendix A. Definitions and source of regression variables    Aid/GNP:    Ratio of dollar aid f node="">, </span><span data-dcnode-id="378" instrument_node="">Oxford</span><span data-dcnode-id="376" instrument_node=""> (</span><span data-dcnode-id="374" instrument_node="">1993</span><span data-dcnode-id="372" instrument_node="">)</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="368"><span data-dcnode-id="370" instrument_node=""></span><span data-dcnode-id="369" instrument_node=""></span></div></dd></dl></section></section><div data-dcnode-id="242" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="243"><div class="PageDivider" data-dcnode-id="363"></div><header data-dcnode-id="360" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Cited by (700)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="244"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="245"><ul data-dcnode-id="251"><li class="ListArticleItem" data-dcnode-id="342"><div class="sub-heading" data-dcnode-id="354"><a data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2110701721000718" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="358" id="citing-articles-article0-title"><span data-dcnode-id="359" instrument_node="">Does foreign aid impede economic complexity in developing countries?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">2022, International Economics</span></div></div><div class="buttons" data-dcnode-id="348"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="349" type="button"><span class="button-link-text" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="350" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="351"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="343"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="344" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="345"><p data-dcnode-id="346" id="abspara0010"><span data-dcnode-id="347" instrument_node="">Foreign aid is one of the most important policy tools that developed countries use to help poor countries improve population well-being and facilitate economic and institutional development. However, the effectiveness of aid as an instrument of development has been questioned several times, especially for its deleterious effects on governance. This study examines the effect of foreign aid on economic complexity in 78 developing countries over the period 1990–2017. We combine different identification strategies and the following results are established. First, we find evidence that foreign aid reduces economic complexity. Second, we show that the effect of foreign aid on economic complexity is heterogeneous to the level of economic complexity and to the nature of aid received. More specifically, we show that while foreign aid reduces economic complexity in countries with lower levels of economic complexity, the effect is positive in countries with higher levels of economic complexity. Additionally, we show that while foreign aid in the energy and education sectors increases economic complexity, the effect is negative for agricultural and humanitarian aid. Three, we further find a U-shaped relationship between foreign aid and economic complexity. Finally, the empirical results of this paper show that democracy mitigates the negative effect of foreign aid on economic complexity. Thus, in order to benefit from the effects of foreign aid for better economic complexity, the governments of developing countries would benefit from putting more effort into improving democracy.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="324"><div class="sub-heading" data-dcnode-id="336"><a data-dcnode-id="339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0305750X21003995" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="340" id="citing-articles-article1-title"><span data-dcnode-id="341" instrument_node="">Impact of official development assistance projects for renewable energy on electrification in sub-Saharan Africa</span></h3></a><div class="article-source ellipsis" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">2022, World Development</span></div></div><div class="buttons" data-dcnode-id="330"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="331" type="button"><span class="button-link-text" data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="332" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="333"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="325"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="326" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="327"><p data-dcnode-id="328" id="sp0010"><span data-dcnode-id="329" instrument_node="">While the African continent has one of the largest renewable energy potentials in the world, it remains the most deprived region for access to electricity. Official development agencies can provide the funds and experience necessary for the sustainable development of this sector to those countries that suffer from limited domestic resources. We estimate the impact of renewable energy aid projects implemented in 19 sub-Saharan African countries on access to electricity for communities in the region. By combining georeferenced data from aid projects in renewable energy from AidData and survey data from the Afrobarometer, we find, using different propensity score matching methods, a positive and significant impact of these projects on electrification of communities. A comparison with the same sample on non-renewable energy projects shows a better efficiency of eco-friendly projects. However, the effectiveness of these projects is heterogeneous and depends greatly on the type of donor, the location, and the initial level of development. Our results contribute to the scholarly debate on aid effectiveness and provide important political implications. Indeed, they suggest that international donors should favour sending funds for renewable energy projects in countries and regions lacking electrification as these funds contribute to better access to electricity while promoting environmentally friendly technologies.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="306"><div class="sub-heading" data-dcnode-id="318"><a data-dcnode-id="321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0264999321002911" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="322" id="citing-articles-article2-title"><span data-dcnode-id="323" instrument_node="">Donor aid allocation and accounting standards of recipients</span></h3></a><div class="article-source ellipsis" data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">2022, Economic Modelling</span></div></div><div class="buttons" data-dcnode-id="312"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="313" type="button"><span class="button-link-text" data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="314" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="315"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="307"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="308" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="309"><p data-dcnode-id="310" id="abspara0010"><span data-dcnode-id="311" instrument_node="">How do donor countries determine foreign aid allocation? The literature seems to agree that institutional quality could be a possible determinant. However, no study has found any decisive variable to represent this factor. Recently, an increasing number of countries, developed as well as developing, have been adopting International Financial Reporting Standards (IFRS) as a single set of high-quality global accounting standards. IFRS aims to generate accurate financial information and to remove information asymmetry, thereby potentially improving corporate governance and performance in firms. We hypothesize that donors allocate more aid to mandatory IFRS-adopting recipients than nonadopting ones, expecting higher aid effectiveness in the recipients. Our bilateral panel data analysis on commitment flows between 28 Development Assistance Committee (DAC) donors and more than 90 recipients shows that, upon mandatory IFRS adoption by a recipient, donors increase the amount of aid by approximately 20%.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="288"><div class="sub-heading" data-dcnode-id="300"><a data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2352550921002736" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="304" id="citing-articles-article3-title"><span data-dcnode-id="305" instrument_node="">Official development assistance and carbon emissions of recipient countries: A dynamic panel threshold analysis for low- and lower-middle-income countries</span></h3></a><div class="article-source ellipsis" data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">2022, Sustainable Production and Consumption</span></div></div><div class="buttons" data-dcnode-id="294"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="295" type="button"><span class="button-link-text" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="296" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="297"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="289"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="290" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="291"><p data-dcnode-id="292" id="spara013"><span data-dcnode-id="293" instrument_node="">Better use of official development assistance (ODA) to mitigate carbon emissions in developing countries requires a better understanding of the effects of ODA on carbon emissions. The dynamic panel threshold regression model is employed to explore the effects of ODA and carbon emissions in 59 low-income and lower-middle-income countries. Urbanization is employed as a threshold variable. The proposed model can better reflect endogenous explanatory variables, which indicate the inertial characteristics and dynamic changes of carbon emissions. The first-order lag coefficients of carbon emissions in the proposed model have a significant positive effect, indicating that the growth of carbon emissions in these countries has a strong path dependence. Moreover, when the urbanization of recipient countries is below the threshold value, a 1% increase in ODA leads to a 0.2259% increase in carbon emissions. When urbanization exceeds the threshold value, a 1% increase in ODA leads to a 0.2281% increase in carbon emission. In addition, the conditional convergence level of carbon emission growth in low-urbanization areas is much greater than that in high-urbanization areas. With the development in urbanization, if no effective measures are developed and implemented, there is a risk that carbon emissions of recipient countries might develop from “low-emission balanced growth” to “high-emission balanced growth.”</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="270"><div class="sub-heading" data-dcnode-id="282"><a data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0022199621001033" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="286" id="citing-articles-article4-title"><span data-dcnode-id="287" instrument_node="">Quid pro quo? Political ties and sovereign borrowing</span></h3></a><div class="article-source ellipsis" data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">2021, Journal of International Economics</span></div></div><div class="buttons" data-dcnode-id="276"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="277" type="button"><span class="button-link-text" data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="278" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="279"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="271"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="272" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="273"><p data-dcnode-id="274" id="sp0175"><span data-dcnode-id="275" instrument_node="">Do stronger political ties with a global superpower improve sovereign borrowing conditions? We use data on voting at the United Nations General Assembly along with foreign aid flows to construct an index of political ties and find evidence that suggests stronger political ties with the US is associated with both better sovereign credit ratings and lower yields on sovereign bonds especially among lower income countries. We use official heads-of-state visits to the White House and coalition forces troop contributions as additional measures of the strength of political ties to further reinforce our findings.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="252"><div class="sub-heading" data-dcnode-id="264"><a data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0305750X21002291" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="268" id="citing-articles-article5-title"><span data-dcnode-id="269" instrument_node="">Political liberalization and human development: Dynamic Effects of Political Regime Change on Infant Mortality across Three Centuries (1800-2015)</span></h3></a><div class="article-source ellipsis" data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">2021, World Development</span></div></div><div class="buttons" data-dcnode-id="258"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="259" type="button"><span class="button-link-text" data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="260" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="261"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="253"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="254" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="255"><p data-dcnode-id="256" id="sp010"><span data-dcnode-id="257" instrument_node="">It has been long debated among comparativists whether democratic states advance human development. By regressing infant mortality rates on a cumulative score of democracy, recent studies have suggested that a long tradition of democracy is of greater importance than the present degree of democracy to explain human development. This approach, however, faces several issues and also fails to pinpoint the effect of a democratic reform at a certain point in time on future human welfare. We argue that political liberalization encourages policymakers to adopt poverty-alleviating policies, but such a policy change is more likely to bear substantive fruit over the relatively long run. Using newly collected panel data on infant mortality rates from 1800 to 2015 from 172 countries, we test our theoretical expectations. Applying error correction models to this extensive time-series cross-sectional data, we find that political liberalization is more likely to increase equal access to public services immediately but that infant mortality rates are reduced in the long run. These results suggest that democratic reforms do have a positive effect on human welfare, but the effect might appear with a passage of time as well as shrinks over time. Our research implies that policymakers may need to make tireless investments in the advancement of political liberalization to continue improving human well-being in the developing world.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-0030460228%26md5%3Df63a5691dfad9719cd78b793caa94d15" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="249" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="250"></path></svg><span class="button-alternative-text" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><a class="anchor abstract-link" data-dcnode-id="239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/0014292195001271"><span class="anchor-text" data-dcnode-id="240"><span data-dcnode-id="241" inst
