</span><meta content="The humans of modern society are enjoying the luxuries and comforts today but future generations will be facing a more polluted environment and scarcity of natural resources. So the effects of global warming and climatic changes are a major policy concern nowadays around the world. The majority of the literature treats the Carbon Dioxide emissions as an indicator of environmental deterioration but this paper considers the environmental performance index as an indicator of environment. This paper addresses the role of institutional reforms for environmental performance that is hardly discussed in the earlier literature. It is argued that a novel approach of institutional reforms can provide some useful insights for environmental performance in developing countries. There is wide agreement that institutional quality is crucial for economic sustainability but rarely focused to explore the impacts of institutional reforms on environmental performance. The institutional reforms are generally divided into two categories; economic and political reforms. This paper investigated the impact of each category of institutional reforms for environmental performance by using panel data of 122 developing economies for a period of 1996–2020. Difference in differences technique is applied to determine the impact of each category of reforms on the environment. It is found that economic and political reforms significantly contribute to protecting the environment in developing countries, and it will be a good policy option to reform the economic and political institutions to preserve the environment in these countries along with sustainable development." data-dcnode-id="3269" name="description"><span data-dcnode-id="3268" instrument_node="">

</span><div class="abstract toc-section abstract-type-" data-dcnode-id="2285" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="2293" data-toc="abstract0" id="abstract0" name="abstract0" title="Abstract"></a><h2 data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">Abstract</span></h2><div class="abstract-content" data-dcnode-id="2286"><a class="link-target" data-dcnode-id="2290" id="article1.front1.article-meta1.abstract1.p1" name="article1.front1.article-meta1.abstract1.p1"></a><p data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">The humans of modern society are enjoying the luxuries and comforts today but future generations will be facing a more polluted environment and scarcity of natural resources. So the effects of global warming and climatic changes are a major policy concern nowadays around the world. The majority of the literature treats the Carbon Dioxide emissions as an indicator of environmental deterioration but this paper considers the environmental performance index as an indicator of environment. This paper addresses the role of institutional reforms for environmental performance that is hardly discussed in the earlier literature. It is argued that a novel approach of institutional reforms can provide some useful insights for environmental performance in developing countries. There is wide agreement that institutional quality is crucial for economic sustainability but rarely focused to explore the impacts of institutional reforms on environmental performance. The institutional reforms are generally divided into two categories; economic and political reforms. This paper investigated the impact of each category of institutional reforms for environmental performance by using panel data of 122 developing economies for a period of 1996–2020. Difference in differences technique is applied to determine the impact of each category of reforms on the environment. It is found that economic and political reforms significantly contribute to protecting the environment in developing countries, and it will be a good policy option to reform the economic and political institutions to preserve the environment in these countries along with sustainable development.</span></p><span data-dcnode-id="2287" instrument_node="">
</span></div></div><span data-dcnode-id="2284" instrument_node="">

           e0257631.
        
        https://doi.org/10.1371/journal.pone.0257631</span></p><p data-dcnode-id="2276"><strong data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">Editor: </span></strong><span data-dcnode-id="2277" instrument_node="">Carlos Alberto Zúniga-González, Universidad Nacional Autonoma de Nicaragua Leon, NICARAGUA</span></p><p data-dcnode-id="2266"><strong data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Received: </span></strong><span data-dcnode-id="2273" instrument_node="">June 21, 2021; </span><strong data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Accepted: </span></strong><span data-dcnode-id="2270" instrument_node="">September 4, 2021; </span><strong data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Published: </span></strong><span data-dcnode-id="2267" instrument_node=""> October 5, 2021</span></p><p data-dcnode-id="2259"><strong data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">Copyright: </span></strong><span data-dcnode-id="2263" instrument_node=""> © 2021 Zhao, Madni. This is an open access article distributed under the terms of the </span><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//creativecommons.org/licenses/by/4.0/"><span data-dcnode-id="2262" instrument_node="">Creative Commons Attribution License</span></a><span data-dcnode-id="2260" instrument_node="">, which permits unrestricted use, distribution, and reproduction in any medium, provided the original author and source are credited.</span></p><p data-dcnode-id="2255"><strong data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Data Availability: </span></strong><span data-dcnode-id="2256" instrument_node="">All data is publicly available on the official websites of World Bank, Yale University.</span></p><p data-dcnode-id="2251"><strong data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">Funding: </span></strong><span data-dcnode-id="2252" instrument_node="">The authors received no specific funding for this work.</span></p><p data-dcnode-id="2247"><strong data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">Competing interests: </span></strong><span data-dcnode-id="2248" instrument_node=""> NO authors have competing interests</span></p></div><span data-dcnode-id="2245" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2112" id="section1" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="2244" data-toc="sec001" id="sec001" name="sec001" title="1. Introduction"></a><h2 data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">1. Introduction</span></h2><a class="link-target" data-dcnode-id="2241" id="article1.body1.sec1.p1" name="article1.body1.sec1.p1"></a><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Environmental protection is one of the biggest problems confronted by humanity at present. Ever increase in population and per capita consumption are depleting the natural resources as well as the environment. Moreover, industrialization, urban concentration and modern forms of agricultural methods are polluting the water, soil and air resources all over the world. The natural environment is becoming hazardous and toxic for the endurance of future populations. The rising emissions of greenhouse gases (GHG) are affecting the blue planet and estimations of “United States Development Authority” and “Organization for Economic Cooperation and Development” reveal the rise in earth temperature by 2 centigrade by the end of 2050. It will have more adverse effects on the earth. Global warming is causing melting glaciers and polar ice with two to three times higher as compared with last century while loss of biodiversity is unpredictable and unforeseen. There is a sharp increase in saline soils by 50% up to 2050, resulting in land deterioration in every country.</span></p><span data-dcnode-id="2238" instrument_node="">
</span><a class="link-target" data-dcnode-id="2237" id="article1.body1.sec1.p2" name="article1.body1.sec1.p2"></a><p data-dcnode-id="2220"><span data-dcnode-id="2236" instrument_node="">Environmental challenges are not specific to geo boundaries, and steps taken by a single country alone are not sufficient to protect the global environment. The green and sustainable economy requires a basic transition of social, economic, and energy systems. Environmental and economic policies are important for the green economy along with improvement of prevailing institutions for effective implementation and monitoring of policies [</span><a class="ref-tip" data-dcnode-id="2234" href="#pone.0257631.ref001"><span data-dcnode-id="2235" instrument_node="">1</span></a><span data-dcnode-id="2233" instrument_node="">]. Environmental involvement are essential economic policies eventually employed in a wider institutional setting [</span><a class="ref-tip" data-dcnode-id="2231" href="#pone.0257631.ref002"><span data-dcnode-id="2232" instrument_node="">2</span></a><span data-dcnode-id="2230" instrument_node="">]. To achieve the objectives of environmental policies, the political process directing policy adoption plays a central role in conjunction with the nature of institutions, social and cultural discourse, industrial structure, distribution of resources [</span><a class="ref-tip" data-dcnode-id="2228" href="#pone.0257631.ref003"><span data-dcnode-id="2229" instrument_node="">3</span></a><span data-dcnode-id="2227" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="2225" href="#pone.0257631.ref005"><span data-dcnode-id="2226" instrument_node="">5</span></a><span data-dcnode-id="2224" instrument_node="">]. While the role of institutional quality and governance is overlooked by the quantitative models [</span><a class="ref-tip" data-dcnode-id="2222" href="#pone.0257631.ref006"><span data-dcnode-id="2223" instrument_node="">6</span></a><span data-dcnode-id="2221" instrument_node="">].</span></p><span data-dcnode-id="2219" instrument_node="">
</span><a class="link-target" data-dcnode-id="2218" id="article1.body1.sec1.p3" name="article1.body1.sec1.p3"></a><p data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">The theoretical foundations for institutional quality in the context of environment protection highlight that stronger and efficient institutions lead to better policy adoption and its outcomes. The enforcement of rules by the government reduces the level of environmental degradation. The political institutional quality is usually represented by Polity IV that shows the democratic or autocratic regimes in a country. The democratic countries have better control on environmental performance while resources are concentrated to few people in autocratic countries so the cost of public goods lie on those capturing these resources. When democracies are mature then interest of individual groups merge into common interest since gains from environmental performance decrease. Moreover, democratic countries have stronger commitments to international environmental agreements. The inefficient institutional quality leads to sub-optimal use of available resources. The corrupt officials allow the activities which damage the natural environment.</span></p><span data-dcnode-id="2215" instrument_node="">
</span><a class="link-target" data-dcnode-id="2214" id="article1.body1.sec1.p4" name="article1.body1.sec1.p4"></a><p data-dcnode-id="2155"><span data-dcnode-id="2213" instrument_node="">To improve the institutional quality in any country, there is dire need to reform the existing institutions. Institutional reforms are efforts to alter the regulations and constraints influencing human’s dealings. It may be considered as formation of actions, their implementation, management of crisis and way of interaction with other entities. Institutions and their reforms are at the main front of literature as well as in the vision of policy makers since the past two decades. IMF, World Bank, and other donor organizations are of great interest now to reform institutions for financial and other forms of support [</span><a class="ref-tip" data-dcnode-id="2211" href="#pone.0257631.ref007"><span data-dcnode-id="2212" instrument_node="">7</span></a><span data-dcnode-id="2210" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="2208" href="#pone.0257631.ref016"><span data-dcnode-id="2209" instrument_node="">16</span></a><span data-dcnode-id="2207" instrument_node="">]. New institutional economics has two broader sets of literature; impact of institutions on economic activities and effect of institutional reform on economic variables. The set of former literature can be divided into further two sets; first emphasizes the impact of different measures of economic institutions [</span><a class="ref-tip" data-dcnode-id="2205" href="#pone.0257631.ref007"><span data-dcnode-id="2206" instrument_node="">7</span></a><span data-dcnode-id="2204" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="2202" href="#pone.0257631.ref009"><span data-dcnode-id="2203" instrument_node="">9</span></a><span data-dcnode-id="2201" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="2199" href="#pone.0257631.ref011"><span data-dcnode-id="2200" instrument_node="">11</span></a><span data-dcnode-id="2198" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="2196" href="#pone.0257631.ref013"><span data-dcnode-id="2197" instrument_node="">13</span></a><span data-dcnode-id="2195" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="2193" href="#pone.0257631.ref017"><span data-dcnode-id="2194" instrument_node="">17</span></a><span data-dcnode-id="2192" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="2190" href="#pone.0257631.ref019"><span data-dcnode-id="2191" instrument_node="">19</span></a><span data-dcnode-id="2189" instrument_node="">] while second describes the effects of political institutions [</span><a class="ref-tip" data-dcnode-id="2187" href="#pone.0257631.ref020"><span data-dcnode-id="2188" instrument_node="">20</span></a><span data-dcnode-id="2186" instrument_node="">]. Similarly, impacts of institutional reforms are highlighted in numerous studies but their role for environmental performance is little elaborated [</span><a class="ref-tip" data-dcnode-id="2184" href="#pone.0257631.ref021"><span data-dcnode-id="2185" instrument_node="">21</span></a><span data-dcnode-id="2183" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="2181" href="#pone.0257631.ref029"><span data-dcnode-id="2182" instrument_node="">29</span></a><span data-dcnode-id="2180" instrument_node="">]. The theoretical reason for institutional reforms in the perspective of the environment is given by the public good feature. Private agents remain unable to calculate the pollution costs due to allied externalities, generating the reason for government interference [</span><a class="ref-tip" data-dcnode-id="2178" href="#pone.0257631.ref030"><span data-dcnode-id="2179" instrument_node="">30</span></a><span data-dcnode-id="2177" instrument_node="">]. Related questions comprise how the nature and different forms of institutional reforms affect environmental performance. In this perspective, Dasgupta and Mäler [</span><a class="ref-tip" data-dcnode-id="2175" href="#pone.0257631.ref031"><span data-dcnode-id="2176" instrument_node="">31</span></a><span data-dcnode-id="2174" instrument_node="">] are of the view that reforming the political institutions are somewhat persuasive in assuring environmental performance. Deacon [</span><a class="ref-tip" data-dcnode-id="2172" href="#pone.0257631.ref032"><span data-dcnode-id="2173" instrument_node="">32</span></a><span data-dcnode-id="2171" instrument_node="">] highlights that democracy is more likely to assure higher levels of environmental quality, arguing that autocracy provides such public goods inefficiently because resources are controlled by a small group. These findings are supported by numerous studies [</span><a class="ref-tip" data-dcnode-id="2169" href="#pone.0257631.ref033"><span data-dcnode-id="2170" instrument_node="">33</span></a><span data-dcnode-id="2168" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="2166" href="#pone.0257631.ref035"><span data-dcnode-id="2167" instrument_node="">35</span></a><span data-dcnode-id="2165" instrument_node="">]. Democracy has a negative relationship with CO</span><sub data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">2</span></sub><span data-dcnode-id="2162" instrument_node=""> emissions, water pollution, land deterioration, and deforestation rates [</span><a class="ref-tip" data-dcnode-id="2160" href="#pone.0257631.ref036"><span data-dcnode-id="2161" instrument_node="">36</span></a><span data-dcnode-id="2159" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="2157" href="#pone.0257631.ref037"><span data-dcnode-id="2158" instrument_node="">37</span></a><span data-dcnode-id="2156" instrument_node="">].</span></p><span data-dcnode-id="2154" instrument_node="">
</span><a class="link-target" data-dcnode-id="2153" id="article1.body1.sec1.p5" name="article1.body1.sec1.p5"></a><p data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Economic institutions are laws, regulations, and policies regulating the relationships among economic agents in an economy along with restrictions on agents to connect in agreed economic transactions. These institutions ensure the incentive mechanism and structure, affecting technology level, investment in humans and physical capital, and way of production. The central objective of economic institutions is minimizing transaction costs. The rule of law, policies affecting consumption and production, property rights, and regulatory quality are examples of economic institutions. While political institutions are constraints concerned to organizing the polity, how power is controlled, legitimated, constituted, redistributed, and exercised.</span></p><span data-dcnode-id="2150" instrument_node="">
</span><a class="link-target" data-dcnode-id="2149" id="article1.body1.sec1.p6" name="article1.body1.sec1.p6"></a><p data-dcnode-id="2126"><span data-dcnode-id="2148" instrument_node="">Stern [</span><a class="ref-tip" data-dcnode-id="2146" href="#pone.0257631.ref038"><span data-dcnode-id="2147" instrument_node="">38</span></a><span data-dcnode-id="2145" instrument_node="">] highlighted many factors causing the deterioration of the natural environment but economic actors amend their attitudes in context of institutional requirements. Democracy is another institutional factor contributing significantly to preserve the environment [</span><a class="ref-tip" data-dcnode-id="2143" href="#pone.0257631.ref039"><span data-dcnode-id="2144" instrument_node="">39</span></a><span data-dcnode-id="2142" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="2140" href="#pone.0257631.ref040"><span data-dcnode-id="2141" instrument_node="">40</span></a><span data-dcnode-id="2139" instrument_node="">]. Mukherjee and Chakrabotry [</span><a class="ref-tip" data-dcnode-id="2137" href="#pone.0257631.ref041"><span data-dcnode-id="2138" instrument_node="">41</span></a><span data-dcnode-id="2136" instrument_node="">] found a positive relationship among environmental quality, socio-political and socio-economic factors. They are of the view that institutional quality, good governance and level of democracy cause the advancement or decline of environmental performance. It is explained that efficient rules in a society cause to reduce pollution, arguing that strong rules turn “Environmental Kuznets Curve” (EKC) at lower per capita income [</span><a class="ref-tip" data-dcnode-id="2134" href="#pone.0257631.ref042"><span data-dcnode-id="2135" instrument_node="">42</span></a><span data-dcnode-id="2133" instrument_node="">]. Culas [</span><a class="ref-tip" data-dcnode-id="2131" href="#pone.0257631.ref043"><span data-dcnode-id="2132" instrument_node="">43</span></a><span data-dcnode-id="2130" instrument_node="">] found that contract enforcement by government reduces the deforestation rate, while Bhattarai and Hammig [</span><a class="ref-tip" data-dcnode-id="2128" href="#pone.0257631.ref044"><span data-dcnode-id="2129" instrument_node="">44</span></a><span data-dcnode-id="2127" instrument_node="">] highlighted that civil liberty and political rights also cause in reduction deforestation rate.</span></p><span data-dcnode-id="2125" instrument_node="">
</span><a class="link-target" data-dcnode-id="2124" id="article1.body1.sec1.p7" name="article1.body1.sec1.p7"></a><p data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Environmental protection is one of the gigantic challenges and major focused area for governments, policy makers, researchers, scholars, and academicians involving countries, communities, and individuals around the globe. Environmental sustainability is the major approach contrary to the background of the population growth of humans and uncontrolled exploitation of the natural environment by human activities. The major interest of modern society is that humans are enjoying the luxuries and comforts today but future generations will be facing a more polluted environment and scarcity of natural resources. It is our responsibility to maintain the earth in a self-sustainable manner ensuring equal opportunities to our future generation along with other living species cohabiting with us.</span></p><span data-dcnode-id="2121" instrument_node="">
</span><a class="link-target" data-dcnode-id="2120" id="article1.body1.sec1.p8" name="article1.body1.sec1.p8"></a><p data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Environmental protection requires a fundamental transformation of economic, political, social and energy systems. The targeted policies will be helpful in steering the transition but it requires more improvement in institutional quality to ensure the implementation of policies and effective monitoring. Environmental policies are ultimately implemented by institutions prevailing in a country. The objectives of environmental policies are dependent on the political process having the ability of policy adoption along with underlying institutions, industrial structure and distribution of power and resources. It is obvious that the importance of institutional reforms cannot be negated if the challenges related to environmental performance are to be tackled on the global, regional, national, and local level. There are numerous factors examined by earlier studies of environmental performance and institutional quality but the relationship between variables of institutional reforms and environmental performance have to be discussed extensively. Institutional reforms are rarely elaborated in earlier macroeconomic analysis of environmental quality. The research question is devised as the impact of institutional reforms on environmental performance in developing countries. The economies without institutional reforms to protect the environment have been heavily criticized over the years. The question is whether or not institutional reforms could positively affect environmental performance. Thus, it is the intention of this study to explore the impact of reforms on environmental performance. To address this issue, a panel of 122 developing countries is selected by considering their economic, political, and environmental indicators to test the relation between institutional reforms and environment. The broad objectives of the study are to explore the impacts of political and economic reforms on environmental performance in developing countries, investigating the interaction effects of each type of reforms. So data is used for 122 developing economies covering the period of 1996–2020 while the difference in difference (DID) regression approach is used for data analysis.</span></p><span data-dcnode-id="2117" instrument_node="">
</span><a class="link-target" data-dcnode-id="2116" id="article1.body1.sec1.p9" name="article1.body1.sec1.p9"></a><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">After introduction, section II explains the methodology of the paper. The next section comprises details of data and its sources then empirical findings and discussion are explained in the section IV. Section V concludes the paper.</span></p><span data-dcnode-id="2113" instrument_node="">
</span></div><span data-dcnode-id="2111" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1887" id="section2" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="2110" data-toc="sec002" id="sec002" name="sec002" title="2. Methodology"></a><h2 data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">2. Methodology</span></h2><a class="link-target" data-dcnode-id="2107" id="article1.body1.sec2.p1" name="article1.body1.sec2.p1"></a><p data-dcnode-id="2054"><span data-dcnode-id="2106" instrument_node="">This study used the difference in difference (DID) technique for estimation that is suitable to determine the effect of pre and post reforms experiences. This approach calculates the outcomes for two time periods of treated and control groups. The pre reform groups are considered as “control” while post reform groups are considered as “treated”. If the same units in a group are present in each period, then the average obtained in the control group is deducted from mean value of treatment group to resolve biasedness issues. To find the effect of reforms on environmental performance, it can be expressed as;
</span><a class="link-target" data-dcnode-id="2105" id="pone.0257631.e001" name="pone.0257631.e001"></a><span class="equation" data-dcnode-id="2101"><img class="inline-graphic" data-dcnode-id="2104" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/file%3Ftype%3Dthumbnail%26id%3D10.1371/journal.pone.0257631.e001&amp;raw"><span class="note" data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">(1)</span></span></span><span data-dcnode-id="2100" instrument_node="">
where </span><strong data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">EP</span></strong><span data-dcnode-id="2097" instrument_node=""> is environmental performance, ϴ </span><sub data-dcnode-id="2093"><strong data-dcnode-id="2094"><em data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">i</span></em></strong></sub><span data-dcnode-id="2092" instrument_node=""> is “time invariant impact” unique to individual </span><em data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">i</span></em><span data-dcnode-id="2089" instrument_node="">, ϴ </span><sub data-dcnode-id="2085"><strong data-dcnode-id="2086"><em data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">t</span></em></strong></sub><span data-dcnode-id="2084" instrument_node=""> expresses the common impact in time period </span><em data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">t</span></em><span data-dcnode-id="2081" instrument_node=""> for all individuals, REF is institutional reform, Z represents control variables and </span><strong data-dcnode-id="2078"><em data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">ϵ</span></em></strong><sub data-dcnode-id="2074"><strong data-dcnode-id="2075"><em data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">it</span></em></strong></sub><span data-dcnode-id="2073" instrument_node=""> is “individual time varying error distributed independently”. For computation of ϴ, some specific approach is needed because ϴ </span><sub data-dcnode-id="2069"><strong data-dcnode-id="2070"><em data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">i</span></em></strong></sub><span data-dcnode-id="2068" instrument_node=""> and ϴ </span><sub data-dcnode-id="2064"><strong data-dcnode-id="2065"><em data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">t</span></em></strong></sub><span data-dcnode-id="2063" instrument_node=""> are related to reforms in many non-determined sources so Eq (</span><a data-dcnode-id="2061" href="#pone.0257631.e001"><span data-dcnode-id="2062" instrument_node="">1</span></a><span data-dcnode-id="2060" instrument_node="">) including control variable turns, where YP is per capita GDP;
</span><a class="link-target" data-dcnode-id="2059" id="pone.0257631.e002" name="pone.0257631.e002"></a><span class="equation" data-dcnode-id="2055"><img class="inline-graphic" data-dcnode-id="2058" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/file%3Ftype%3Dthumbnail%26id%3D10.1371/journal.pone.0257631.e002&amp;raw"><span class="note" data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">(2)</span></span></span></p><span data-dcnode-id="2053" instrument_node="">
</span><a class="link-target" data-dcnode-id="2052" id="article1.body1.sec2.p2" name="article1.body1.sec2.p2"></a><p data-dcnode-id="2032"><span data-dcnode-id="2051" instrument_node="">If ϴ </span><sub data-dcnode-id="2047"><strong data-dcnode-id="2048"><em data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">i</span></em></strong></sub><span data-dcnode-id="2046" instrument_node=""> and ϴ </span><sub data-dcnode-id="2042"><strong data-dcnode-id="2043"><em data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">t</span></em></strong></sub><span data-dcnode-id="2041" instrument_node=""> are dependent on reforms, then first difference may be taken for estimation so Eq (</span><a data-dcnode-id="2039" href="#pone.0257631.e002"><span data-dcnode-id="2040" instrument_node="">2</span></a><span data-dcnode-id="2038" instrument_node="">) becomes;
</span><a class="link-target" data-dcnode-id="2037" id="pone.0257631.e003" name="pone.0257631.e003"></a><span class="equation" data-dcnode-id="2033"><img class="inline-graphic" data-dcnode-id="2036" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/file%3Ftype%3Dthumbnail%26id%3D10.1371/journal.pone.0257631.e003&amp;raw"><span class="note" data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">(3)</span></span></span></p><span data-dcnode-id="2031" instrument_node="">
</span><a class="link-target" data-dcnode-id="2030" id="article1.body1.sec2.p3" name="article1.body1.sec2.p3"></a><p data-dcnode-id="2008"><span data-dcnode-id="2029" instrument_node="">“Where Δ</span><sub data-dcnode-id="2025"><strong data-dcnode-id="2026"><em data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">t</span></em></strong></sub><span data-dcnode-id="2024" instrument_node=""> is difference of individual observations across periods and Δ </span><sub data-dcnode-id="2020"><strong data-dcnode-id="2021"><em data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">t</span></em></strong></sub><span data-dcnode-id="2019" instrument_node=""> ϴ</span><sub data-dcnode-id="2015"><strong data-dcnode-id="2016"><em data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">t</span></em></strong></sub><span data-dcnode-id="2014" instrument_node=""> is difference in common time effects. But there are two periods in the model; pre reforms and post reforms period. Difference in differences estimator takes the difference between the differences between the two groups such that:
</span><a class="link-target" data-dcnode-id="2013" id="pone.0257631.e004" name="pone.0257631.e004"></a><span class="equation" data-dcnode-id="2009"><img class="inline-graphic" data-dcnode-id="2012" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/file%3Ftype%3Dthumbnail%26id%3D10.1371/journal.pone.0257631.e004&amp;raw"><span class="note" data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">(4)</span></span></span></p><span data-dcnode-id="2007" instrument_node="">
</span><a class="link-target" data-dcnode-id="2006" id="article1.body1.sec2.p4" name="article1.body1.sec2.p4"></a><p data-dcnode-id="1899"><span data-dcnode-id="2005" instrument_node="">Superscript </span><em data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">t</span></em><span data-dcnode-id="2002" instrument_node=""> and </span><em data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">c</span></em><span data-dcnode-id="1999" instrument_node=""> in Eq (</span><a data-dcnode-id="1997" href="#pone.0257631.e004"><span data-dcnode-id="1998" instrument_node="">4</span></a><span data-dcnode-id="1996" instrument_node="">) represent the treated and control groups respectively, </span><strong data-dcnode-id="1993"><em data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">E(EP</span></em></strong><sub data-dcnode-id="1989"><strong data-dcnode-id="1990"><em data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">i1</span></em></strong></sub><sup data-dcnode-id="1985"><strong data-dcnode-id="1986"><em data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">t</span></em></strong></sup><span data-dcnode-id="1984" instrument_node=""> </span><strong data-dcnode-id="1981"><em data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">l REF</span></em></strong><sub data-dcnode-id="1977"><strong data-dcnode-id="1978"><em data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">i1</span></em></strong></sub><strong data-dcnode-id="1974"><em data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">)</span></em></strong><span data-dcnode-id="1973" instrument_node=""> is expected outcome of countries after reforms while </span><strong data-dcnode-id="1970"><em data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">E(EP</span></em></strong><sub data-dcnode-id="1966"><strong data-dcnode-id="1967"><em data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">i1</span></em></strong></sub><sup data-dcnode-id="1962"><strong data-dcnode-id="1963"><em data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">t</span></em></strong></sup><span data-dcnode-id="1961" instrument_node=""> </span><strong data-dcnode-id="1958"><em data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">l REF</span></em></strong><sub data-dcnode-id="1954"><strong data-dcnode-id="1955"><em data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">i0</span></em></strong></sub><strong data-dcnode-id="1951"><em data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">)</span></em></strong><span data-dcnode-id="1950" instrument_node=""> is outcome of same group before reforms. In the same way</span><strong data-dcnode-id="1946"><span data-dcnode-id="1949" instrument_node="">, </span><em data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">E(EP</span></em></strong><sub data-dcnode-id="1942"><strong data-dcnode-id="1943"><em data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">i0</span></em></strong></sub><sup data-dcnode-id="1938"><strong data-dcnode-id="1939"><em data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">c</span></em></strong></sup><span data-dcnode-id="1937" instrument_node=""> </span><strong data-dcnode-id="1934"><em data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">l REF</span></em></strong><sub data-dcnode-id="1930"><strong data-dcnode-id="1931"><em data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">i1</span></em></strong></sub><strong data-dcnode-id="1927"><em data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">)</span></em></strong><span data-dcnode-id="1926" instrument_node=""> is outcome of control after reforms in treated group and </span><strong data-dcnode-id="1923"><em data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">E(EP</span></em></strong><sub data-dcnode-id="1919"><strong data-dcnode-id="1920"><em data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">i0</span></em></strong></sub><sup data-dcnode-id="1915"><strong data-dcnode-id="1916"><em data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">c</span></em></strong></sup><span data-dcnode-id="1914" instrument_node=""> </span><strong data-dcnode-id="1911"><em data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">l REF</span></em></strong><sub data-dcnode-id="1907"><strong data-dcnode-id="1908"><em data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">i0</span></em></strong></sub><span data-dcnode-id="1906" instrument_node="">) is outcome of control group before the reforms. Two structural assumptions are mandatory for difference in difference estimation. One is common time effect across the control and treated groups while other is stable composition of both groups before and after reforms” [</span><a class="ref-tip" data-dcnode-id="1904" href="#pone.0257631.ref045"><span data-dcnode-id="1905" instrument_node="">45</span></a><span data-dcnode-id="1903" instrument_node="">]. Upon violations of these assumptions, Giavazzi and Tabellini [</span><a class="ref-tip" data-dcnode-id="1901" href="#pone.0257631.ref022"><span data-dcnode-id="1902" instrument_node="">22</span></a><span data-dcnode-id="1900" instrument_node="">] described many possibilities to decrease the violations of these assumptions; “First, include in the control variables dummies to capture the characteristics that make countries different. The second suggestion is to include in the control group both countries that have not experienced reform at all and countries that have experienced reform before the beginning of the sample period.”</span></p><span data-dcnode-id="1898" instrument_node="">
</span><a class="link-target" data-dcnode-id="1897" id="article1.body1.sec2.p5" name="article1.body1.sec2.p5"></a><p data-dcnode-id="1889"><span data-dcnode-id="1896" instrument_node="">There are many advantages of DID approach, especially when pre and post policy effects have to be analyzed [</span><a class="ref-tip" data-dcnode-id="1894" href="#pone.0257631.ref046"><span data-dcnode-id="1895" instrument_node="">46</span></a><span data-dcnode-id="1893" instrument_node="">]. DID is a microeconomic approach that handles many critical endogeneity issues when comparing two heterogeneous individuals. The treatment effect can be measured from treated and control group over time. Moreover, this method permits to estimate the variations within and outside the country [</span><a class="ref-tip" data-dcnode-id="1891" href="#pone.0257631.ref047"><span data-dcnode-id="1892" instrument_node="">47</span></a><span data-dcnode-id="1890" instrument_node="">]. The treated and control group may be compared before and after policy implications.</span></p><span data-dcnode-id="1888" instrument_node="">
</span></div><span data-dcnode-id="1886" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1815" id="section3" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="1885" data-toc="sec003" id="sec003" name="sec003" title="3. Data and its sources"></a><h2 data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">3. Data and its sources</span></h2><a class="link-target" data-dcnode-id="1882" id="article1.body1.sec3.p1" name="article1.body1.sec3.p1"></a><p data-dcnode-id="1877"><span data-dcnode-id="1881" instrument_node="">This study used the “Environmental Performance Index” (EPI) to gauge the environmental performance of economies in account of humans’ protection from environmental harms and protection of eco system. There are two main weighed indicators in the index: “Ecosystem Vitality (70%) and Environmental Health (30%), is divided into 10 policy categories, overall measuring 22 different indicators. EPI is a positive indicator, meaning that the higher the EPI, the better the respective country’s environmental performance. EPI succeeds in combining many indicators—which were only individually taken into account when testing environmental quality—in one. It is becoming quite popular in measuring environmental performance due to its integration of academic research, thus making it, in the authors’ opinion, the most complete and appropriate indicator for the overall measurement of environmental performance” [</span><a class="ref-tip" data-dcnode-id="1879" href="#pone.0257631.ref048"><span data-dcnode-id="1880" instrument_node="">48</span></a><span data-dcnode-id="1878" instrument_node="">].</span></p><span data-dcnode-id="1876" instrument_node="">
</span><a class="link-target" data-dcnode-id="1875" id="article1.body1.sec3.p2" name="article1.body1.sec3.p2"></a><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">There are two broad categories of institutions: political and economic institutions. Economic reforms are defined as comprehensive and large alterations to advance regulatory quality, rendering monetary and fiscal institutions’ independence, protecting property rights, reducing corruption, strengthening of judiciary, and enhancing corporate governance. The opportunities are created for people through these reforms for their participation in economic activities. The quality of economic institutions is measured through the economic freedom index obtained from “The Heritage Foundation”. To measure the “economic freedom index”, 12 quantitative and qualitative variables are divided into four sub-categories; regulatory efficiency, government size, rule of law, and open markets.</span></p><span data-dcnode-id="1872" instrument_node="">
</span><a class="link-target" data-dcnode-id="1871" id="article1.body1.sec3.p3" name="article1.body1.sec3.p3"></a><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Political institutions are “political rules of the game”. These are constraints and regulation governing political processes and decisions making along with ability of citizens to meet the objectives of that process. Political reforms are comprehensive modification connected with how power is constituted and practiced. POLITY IV is used to measure the political institutions ranging from -10 to +10 reflecting hereditary monarchy to consolidated democracy.</span></p><span data-dcnode-id="1868" instrument_node="">
</span><a class="link-target" data-dcnode-id="1867" id="article1.body1.sec3.p4" name="article1.body1.sec3.p4"></a><p data-dcnode-id="1856"><span data-dcnode-id="1866" instrument_node="">The criteria for political and economic reforms are taken from [</span><a class="ref-tip" data-dcnode-id="1864" href="#pone.0257631.ref022"><span data-dcnode-id="1865" instrument_node="">22</span></a><span data-dcnode-id="1863" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1861" href="#pone.0257631.ref049"><span data-dcnode-id="1862" instrument_node="">49</span></a><span data-dcnode-id="1860" instrument_node="">]. Economic reforms are calculated using forward and backward moving average. “The economic reforms are considered in those countries where forward moving average is greater than backward average by at least 12 points. The reforms are divided into two heads; big and small reforms. If forward moving average is greater by at least 2 points, then it is considered as small reforms but if it is greater than by at least 4 points then it is considered as big reforms. The political institutions reforms are considered when a country crosses the Polity Scores above zero because zero value shows the end of autocracy. So the non-negative value of a country is considered as a treated group while zero value is treated as a control group.” </span><a data-dcnode-id="1858" href="#pone-0257631-t001"><span data-dcnode-id="1859" instrument_node="">Table 1</span></a><span data-dcnode-id="1857" instrument_node=""> describes the details of each variable.</span></p><span data-dcnode-id="1855" instrument_node="">
</span><a class="link-target" data-dcnode-id="1854" id="pone-0257631-t001" name="pone-0257631-t001"></a><div class="figure" data-dcnode-id="1820" data-doi="10.1371/journal.pone.0257631.t001"><div class="img-box" data-dcnode-id="1850"><a data-dcnode-id="1852" data-doi="10.1371/journal.pone.0257631" data-uri="10.1371/journal.pone.0257631.t001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0257631.t001" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="1853" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0257631.t001&amp;raw"></a><div class="expand" data-dcnode-id="1851"></div></div><div class="figure-inline-download" data-dcnode-id="1829"><span data-dcnode-id="1849" instrument_node="">

57631.t001"><span data-dcnode-id="1823" instrument_node="">
              https://doi.org/10.1371/journal.pone.0257631.t001</span></a></p></div><a class="link-target" data-dcnode-id="1819" id="article1.body1.sec3.p5" name="article1.body1.sec3.p5"></a><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">GDP per capita is gained from the “World Development Indicators”. All the data is gathered from 1996–2020 for middle and lower income economies categorized by the “World Bank”. The sample and time period is selected because of restrictions in available data. All selected economies have similar institutional structure and are labelled as developing countries.</span></p><span data-dcnode-id="1816" instrument_node="">

</span><div class="section toc-section" data-dcnode-id="1563" id="section4" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="1813" data-toc="sec004" id="sec004" name="sec004" title="4. Empirical findings and discussion"></a><h2 data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">4. Empirical findings and discussion</span></h2><a class="link-target" data-dcnode-id="1810" id="article1.body1.sec4.p1" name="article1.body1.sec4.p1"></a><p data-dcnode-id="1802"><span data-dcnode-id="1809" instrument_node="">Difference in difference (DID) technique is regressed to determine the relation between institutional reforms and environmental performance and results are pasted in the following Tables </span><a data-dcnode-id="1807" href="#pone-0257631-t002"><span data-dcnode-id="1808" instrument_node="">2</span></a><span data-dcnode-id="1806" instrument_node="">–</span><a data-dcnode-id="1804" href="#pone-0257631-t004"><span data-dcnode-id="1805" instrument_node="">4</span></a><span data-dcnode-id="1803" instrument_node="">.</span></p><span data-dcnode-id="1801" instrument_node="">

              https://doi.org/10.1371/journal.pone.0257631.t002</span></a></p></div><a class="link-target" data-dcnode-id="1765" id="pone-0257631-t003" name="pone-0257631-t003"></a><div class="figure" data-dcnode-id="1731" data-doi="10.1371/journal.pone.0257631.t003"><div class="img-box" data-dcnode-id="1761"><a data-dcnode-id="1763" data-doi="10.1371/journal.pone.0257631" data-uri="10.1371/journal.pone.0257631.t003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0257631.t003" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="1764" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0257631.t003&amp;raw"></a><div class="expand" data-dcnode-id="1762"></div></div><div class="figure-inline-download" data-dcnode-id="1740"><span data-dcnode-id="1760" instrument_node="">

          </span><ul data-dcnode-id="1741"><li data-dcnode-id="1754"><a data-dcnode-id="1755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0257631.t003"><div class="definition-label" data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="1748"><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0257631.t003"><div class="definition-label" data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="1742"><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0257631.t003"><div class="definition-label" data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="1736"><span data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Table 3. </span></span><span data-dcnode-id="1737" instrument_node=""> Impact of economic reforms on environmental performance.</span></div><p class="caption_target" data-dcnode-id="1735"></p><p class="caption_object" data-dcnode-id="1732"><a data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0257631.t003"><span data-dcnode-id="1734" instrument_node="">
              https://doi.org/10.1371/journal.pone.0257631.t003</span></a></p></div><a class="link-target" data-dcnode-id="1730" id="pone-0257631-t004" name="pone-0257631-t004"></a><div class="figure" data-dcnode-id="1696" data-doi="10.1371/journal.pone.0257631.t004"><div class="img-box" data-dcnode-id="1726"><a data-dcnode-id="1728" data-doi="10.1371/journal.pone.0257631" data-uri="10.1371/journal.pone.0257631.t004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0257631.t004" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="1729" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0257631.t004&amp;raw"></a><div class="expand" data-dcnode-id="1727"></div></div><div class="figure-inline-download" data-dcnode-id="1705"><span data-dcnode-id="1725" instrument_node="">
          Download:
          </span><ul data-dcnode-id="1706"><li data-dcnode-id="1719"><a data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0257631.t004"><div class="definition-label" data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="1713"><a data-dcnode-id="1714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0257631.t004"><div class="definition-label" data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="1707"><a data-dcnode-id="1708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0257631.t004"><div class="definition-label" data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="1701"><span data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Table 4. </span></span><span data-dcnode-id="1702" instrument_node=""> Impact of economic and political reforms on environmental performance.</span></div><p class="caption_target" data-dcnode-id="1700"></p><p class="caption_object" data-dcnode-id="1697"><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0257631.t004"><span data-dcnode-id="1699" instrument_node="">
              https://doi.org/10.1371/journal.pone.0257631.t004</span></a></p></div><a class="link-target" data-dcnode-id="1695" id="article1.body1.sec4.p2" name="article1.body1.sec4.p2"></a><p data-dcnode-id="1642"><span data-dcnode-id="1694" instrument_node="">The empirical results describing the relationship between environmental performance and political reforms are reported in the above </span><a data-dcnode-id="1692" href="#pone-0257631-t002"><span data-dcnode-id="1693" instrument_node="">Table 2</span></a><span data-dcnode-id="1691" instrument_node="">. The findings reveal that a country’s environmental performance increases also as political reforms occur and the relationship holds afterwards, i.e., that environmental performance increases as political reforms prevail even after three and four years of political reforms. This implies that political reforms provide the fundamental conditions for environmental performance because people are involved in decision making demanding better health and environmental living conditions [</span><a class="ref-tip" data-dcnode-id="1689" href="#pone.0257631.ref050"><span data-dcnode-id="1690" instrument_node="">50</span></a><span data-dcnode-id="1688" instrument_node="">]. This really amalgamates political institutions with market economy and represents the critical role for environmental performance in developing countries. It is found that 3 years before political reforms do not contribute significantly to improve the environmental performance. Three years post political reforms and beyond, reforms positively correlate with environmental performance as well, overall suggesting that political reforms positively affect environmental performance. The relevant literature suggests that the political reforms have crucial importance for developing economies through raising the level of FDI and liberalization of capital and financial markets, and an open economy assists to protect the environment [</span><a class="ref-tip" data-dcnode-id="1686" href="#pone.0257631.ref051"><span data-dcnode-id="1687" instrument_node="">51</span></a><span data-dcnode-id="1685" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1683" href="#pone.0257631.ref052"><span data-dcnode-id="1684" instrument_node="">52</span></a><span data-dcnode-id="1682" instrument_node="">]. There is no immediate effect of political reforms on the countries but it is a gradual and slower process to have their positive impact [</span><a class="ref-tip" data-dcnode-id="1680" href="#pone.0257631.ref053"><span data-dcnode-id="1681" instrument_node="">53</span></a><span data-dcnode-id="1679" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1677" href="#pone.0257631.ref054"><span data-dcnode-id="1678" instrument_node="">54</span></a><span data-dcnode-id="1676" instrument_node="">]. Frankel and Rose [</span><a class="ref-tip" data-dcnode-id="1674" href="#pone.0257631.ref055"><span data-dcnode-id="1675" instrument_node="">55</span></a><span data-dcnode-id="1673" instrument_node="">] also found the correlations among GDP, environmental regulations, democracy, environmental quality, and trade. Their findings reveal that free democratic institutions authorize their people to demand good environmental regulations and regulatory regimes to increase the environmental quality. In the same way, Frazin and Bond [</span><a class="ref-tip" data-dcnode-id="1671" href="#pone.0257631.ref056"><span data-dcnode-id="1672" instrument_node="">56</span></a><span data-dcnode-id="1670" instrument_node="">] identified that freedom and democracy are essential to freely express the preferences of economic agents for environmental quality. It is also evident that in the beginning, political reforms create uncertainty in a society but then trust in political institutions is restored and investors have more attraction for investment, leading to spread of green technology and the economy improves its environmental performance [</span><a class="ref-tip" data-dcnode-id="1668" href="#pone.0257631.ref047"><span data-dcnode-id="1669" instrument_node="">47</span></a><span data-dcnode-id="1667" instrument_node="">]. The per capita income also increases due to political reforms by improving environmental performance as many studies [</span><a class="ref-tip" data-dcnode-id="1665" href="#pone.0257631.ref027"><span data-dcnode-id="1666" instrument_node="">27</span></a><span data-dcnode-id="1664" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="1662" href="#pone.0257631.ref029"><span data-dcnode-id="1663" instrument_node="">29</span></a><span data-dcnode-id="1661" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1659" href="#pone.0257631.ref045"><span data-dcnode-id="1660" instrument_node="">45</span></a><span data-dcnode-id="1658" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1656" href="#pone.0257631.ref047"><span data-dcnode-id="1657" instrument_node="">47</span></a><span data-dcnode-id="1655" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1653" href="#pone.0257631.ref053"><span data-dcnode-id="1654" instrument_node="">53</span></a><span data-dcnode-id="1652" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1650" href="#pone.0257631.ref055"><span data-dcnode-id="1651" instrument_node="">55</span></a><span data-dcnode-id="1649" instrument_node="">] are of the view that exports of democratic economies increase along with increase in economic activities, so rising per capita income. The well planned economic and political structure may revolutionize the environmental performance as findings of the studies [</span><a class="ref-tip" data-dcnode-id="1647" href="#pone.0257631.ref057"><span data-dcnode-id="1648" instrument_node="">57</span></a><span data-dcnode-id="1646" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1644" href="#pone.0257631.ref058"><span data-dcnode-id="1645" instrument_node="">58</span></a><span data-dcnode-id="1643" instrument_node="">] highlight that democratic countries have more macro-economic stability.</span></p><span data-dcnode-id="1641" instrument_node="">
</span><a class="link-target" data-dcnode-id="1640" id="article1.body1.sec4.p3" name="article1.body1.sec4.p3"></a><p data-dcnode-id="1608"><span data-dcnode-id="1639" instrument_node="">In the above </span><a data-dcnode-id="1637" href="#pone-0257631-t003"><span data-dcnode-id="1638" instrument_node="">Table 3</span></a><span data-dcnode-id="1636" instrument_node="">, the effects of economic reforms are analyzed for environmental performance. There are two categories of economic reforms; small and big reforms. The computed coefficients show the mean performance of treated group as compared with control group, revealing that economic reforms improve the environmental performance. It is evident that post reforms in 3 years are crucial to protect the environment. The countries with small reforms also contribute positively for environmental performance. [</span><a class="ref-tip" data-dcnode-id="1634" href="#pone.0257631.ref039"><span data-dcnode-id="1635" instrument_node="">39</span></a><span data-dcnode-id="1633" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1631" href="#pone.0257631.ref040"><span data-dcnode-id="1632" instrument_node="">40</span></a><span data-dcnode-id="1630" instrument_node="">]. In addition to this, more than three years of economic reforms are mandatory to increase environmental performance because post three years’ reforms alter the economic structure and firms are encouraged to use environment friendly techniques for production. Even small economic reforms enhance the level of environmental performance while big economic reforms are strongly associated with environmental performance [</span><a class="ref-tip" data-dcnode-id="1628" href="#pone.0257631.ref042"><span data-dcnode-id="1629" instrument_node="">42</span></a><span data-dcnode-id="1627" instrument_node="">]. The impacts of post reforms on environmental performance are determined and empirical findings reveal that economic reforms sustain the environmental quality only when it improves continuously for more than 3 years. If societies reform the economic institutions continuously then environmental performance improves. The economies remain dependent on small reforms but do not move toward big reforms, are not able to achieve higher levels of environmental performance and even become negative after a while. Moreover, big reforms carry environmental friendly policies and high economic freedoms, sustaining and boosting economic growth at a higher rate. The empirical outcomes of the study are in line with [</span><a class="ref-tip" data-dcnode-id="1625" href="#pone.0257631.ref028"><span data-dcnode-id="1626" instrument_node="">28</span></a><span data-dcnode-id="1624" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1622" href="#pone.0257631.ref029"><span data-dcnode-id="1623" instrument_node="">29</span></a><span data-dcnode-id="1621" instrument_node="">]. The studies like [</span><a class="ref-tip" data-dcnode-id="1619" href="#pone.0257631.ref014"><span data-dcnode-id="1620" instrument_node="">14</span></a><span data-dcnode-id="1618" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1616" href="#pone.0257631.ref020"><span data-dcnode-id="1617" instrument_node="">20</span></a><span data-dcnode-id="1615" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1613" href="#pone.0257631.ref021"><span data-dcnode-id="1614" instrument_node="">21</span></a><span data-dcnode-id="1612" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1610" href="#pone.0257631.ref033"><span data-dcnode-id="1611" instrument_node="">33</span></a><span data-dcnode-id="1609" instrument_node="">] depict the positive effect of economic institutions on economic growth. Moreover, economic growth associated with economic reforms enhance environmental performance. It can be argued that higher economic growth is a source to protect the environment as rich countries have large numbers of educated people demanding better and healthy living conditions so there are well established environmental standards for industry.</span></p><span data-dcnode-id="1607" instrument_node="">
</span><a class="link-target" data-dcnode-id="1606" id="article1.body1.sec4.p4" name="article1.body1.sec4.p4"></a><p data-dcnode-id="1565"><span data-dcnode-id="1605" instrument_node="">The findings in context of interaction between economic and political reforms are reported in above </span><a data-dcnode-id="1603" href="#pone-0257631-t004"><span data-dcnode-id="1604" instrument_node="">Table 4</span></a><span data-dcnode-id="1602" instrument_node="">, there are interesting findings. It is found that one type of reforms leads to other type of reforms; means political reforms stimulate economic reforms and vice versa. Moreover, each type of reform positively affects the environmental performance in developing countries. The study [</span><a class="ref-tip" data-dcnode-id="1600" href="#pone.0257631.ref040"><span data-dcnode-id="1601" instrument_node="">40</span></a><span data-dcnode-id="1599" instrument_node="">] investigated the effect of economic reforms on political reforms and vice versa and found that each type of reform triggered the other. The same outcomes are supported by many studies [</span><a class="ref-tip" data-dcnode-id="1597" href="#pone.0257631.ref023"><span data-dcnode-id="1598" instrument_node="">23</span></a><span data-dcnode-id="1596" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1594" href="#pone.0257631.ref042"><span data-dcnode-id="1595" instrument_node="">42</span></a><span data-dcnode-id="1593" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1591" href="#pone.0257631.ref045"><span data-dcnode-id="1592" instrument_node="">45</span></a><span data-dcnode-id="1590" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1588" href="#pone.0257631.ref051"><span data-dcnode-id="1589" instrument_node="">51</span></a><span data-dcnode-id="1587" instrument_node="">]. Economic reforms are a source stabilizing the financial market, the trust of investors and people restores if any type of reforms prevail in an economy so green technology will flourish the economy. The findings of the studies [</span><a class="ref-tip" data-dcnode-id="1585" href="#pone.0257631.ref008"><span data-dcnode-id="1586" instrument_node="">8</span></a><span data-dcnode-id="1584" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1582" href="#pone.0257631.ref009"><span data-dcnode-id="1583" instrument_node="">9</span></a><span data-dcnode-id="1581" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1579" href="#pone.0257631.ref014"><span data-dcnode-id="1580" instrument_node="">14</span></a><span data-dcnode-id="1578" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="1576" href="#pone.0257631.ref016"><span data-dcnode-id="1577" instrument_node="">16</span></a><span data-dcnode-id="1575" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1573" href="#pone.0257631.ref019"><span data-dcnode-id="1574" instrument_node="">19</span></a><span data-dcnode-id="1572" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1570" href="#pone.0257631.ref059"><span data-dcnode-id="1571" instrument_node="">59</span></a><span data-dcnode-id="1569" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1567" href="#pone.0257631.ref060"><span data-dcnode-id="1568" instrument_node="">60</span></a><span data-dcnode-id="1566" instrument_node="">] convey that institutions have crucial importance for environmental performance. Based on the findings of the study, it is highlighted that economic and political reforms are both crucial for environmental protection in developing countries. The environment may be protected significantly through market mechanisms and political structure. The political reforms frame the rules for environmental protection while economic reforms help the production sector to be more environment friendly. The inefficient institutions and bad governance are associated with environmental degradation.</span></p><span data-dcnode-id="1564" instrument_node="">
</span></div><span data-dcnode-id="1562" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1530" id="section5" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="1561" data-toc="sec005" id="sec005" name="sec005" title="5. Conclusions"></a><h2 data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">5. Conclusions</span></h2><a class="link-target" data-dcnode-id="1558" id="article1.body1.sec5.p1" name="article1.body1.sec5.p1"></a><p data-dcnode-id="1550"><span data-dcnode-id="1557" instrument_node="">Since 1992, “United Nations Framework Convention on Climate Change” has been established to improve the quality of air by decreasing the quantity of air pollutants like Carbon Dioxide emission and then actively pursued as a global agenda. All the members agreed to reduce the air pollutants to overcome the issue of global warming and climatic changes. The combating of environmental performance remained a hot and important topic among researchers and policy makers [</span><a class="ref-tip" data-dcnode-id="1555" href="#pone.0257631.ref061"><span data-dcnode-id="1556" instrument_node="">61</span></a><span data-dcnode-id="1554" instrument_node="">]. Many countries adopted multiple policy measures to protect the environment but the outcomes of these policy measures varied from region to region [</span><a class="ref-tip" data-dcnode-id="1552" href="#pone.0257631.ref062"><span data-dcnode-id="1553" instrument_node="">62</span></a><span data-dcnode-id="1551" instrument_node="">]. However, the impact of institutional reforms on environmental protection remained unknown in the existing literature. The findings of the study highlighted the institutional reforms as an important driver of environmental protection in developing countries. Environmental problems affecting developing countries are not because of technological failings only but also institutional failings. Ever increasing challenges are demanding the efficient implementations of institutional reforms nowadays. Requirement of development collaborators, changing in global terms of trade, and internal and external pressures are the reasons to trigger the reforms. These reforms are a source to provide a fair profit return and less risky environment having attraction for investors, increasing environmental performance as well as economic growth. The investors require a less risky environment for investing their money.</span></p><span data-dcnode-id="1549" instrument_node="">
</span><a class="link-target" data-dcnode-id="1548" id="article1.body1.sec5.p2" name="article1.body1.sec5.p2"></a><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">It was hypothesized that institutional reforms positively affect the environmental performance in developing countries. The purpose was to investigate the importance of institutional reforms in the area of environmental protection and sustainability. So this paper attempted to explore the relation between institutional reforms and environmental performance through a novel way by segregating the political and economic institutional reforms. The macro level variables and environmental performance index are used to explore the impacts of reforms on environmental performance in 122 developing economies for the period from 1996–2020 by applying difference in difference (DID) approach. Though the environment and institutions have been suggested to affect each other but the relationship between institutional reforms and environmental performance has not been examined. The findings show that the environmental performance index has positive correlation with economic and political institutional reforms. This provided a sign that an economy’s environmental performance increases as with higher levels of institutional reforms. Many studies provided theoretical or empirical confirmations consistent with few conclusions of this study or gave a handsome explanation of some conceptual connection of this study’s findings.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><a class="link-target" data-dcnode-id="1544" id="article1.body1.sec5.p3" name="article1.body1.sec5.p3"></a><p data-dcnode-id="1536"><span data-dcnode-id="1543" instrument_node="">It is beneficial to state that the relation between environmental performance and institutional reforms can be elaborated by the fact that institutional reforms provide a rich ground to protect the environment in developing countries. Moreover, longevity of institutional reforms in any country has prime importance to explain the environmental performance. It is found that political reforms are a source to increase the level of environmental protection. When democracy in a country prevails then people have more rights as compared with non-democratic countries. So people in democratic countries are free to express their thoughts and opinions. These people demand a pollution free environment for their own and future generations from the ruling authorities [</span><a class="ref-tip" data-dcnode-id="1541" href="#pone.0257631.ref063"><span data-dcnode-id="1542" instrument_node="">63</span></a><span data-dcnode-id="1540" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="1538" href="#pone.0257631.ref066"><span data-dcnode-id="1539" instrument_node="">66</span></a><span data-dcnode-id="1537" instrument_node="">]. The findings of the earlier literature reveal that democratic economies have stricter rules in favor of environmental protection. This study is also an addition in literature by establishing a relationship among political reforms, economic reforms and environmental performance because reforms drive to change the behaviors of economic agents to be more environmental friendly. So this study broadened the cluster of institutional variables by considering economic and political variables for a better explanation of environmental performance.</span></p><span data-dcnode-id="1535" instrument_node="">
</span><a class="link-target" data-dcnode-id="1534" id="article1.body1.sec5.p4" name="article1.body1.sec5.p4"></a><p data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">However, this study has some limitations that may be helpful for future research. Though the indices of Environmental Performance Index are reliable and follow the standard statistical procedures, environmental performance may be measured by combining some other variables of environment. It would have value for future exploration to recognize an econometric model with many factors, apart from economic growth, that may affect environmental performance.</span></p><span data-dcnode-id="1531" instrument_node="">
