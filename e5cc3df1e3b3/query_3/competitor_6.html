</span><h3 data-dcnode-id="8860"><span class="mw-headline" data-dcnode-id="8868" id="Alaska_and_Canada"><span data-dcnode-id="8869" instrument_node="">Alaska and Canada</span></span><span class="mw-editsection" data-dcnode-id="8861"><span class="mw-editsection-bracket" data-dcnode-id="8866"><span data-dcnode-id="8867" instrument_node="">[</span></span><a data-dcnode-id="8864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D13" title="Edit section: Alaska and Canada"><span data-dcnode-id="8865" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8862"><span data-dcnode-id="8863" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8859" instrument_node="">
</span><link data-dcnode-id="8858" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8851" role="note"><span data-dcnode-id="8857" instrument_node="">Main articles: </span><a data-dcnode-id="8855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alaska_Purchase" title="Alaska Purchase"><span data-dcnode-id="8856" instrument_node="">Alaska Purchase</span></a><span data-dcnode-id="8854" instrument_node=""> and </span><a data-dcnode-id="8852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canada_and_the_American_Civil_War" title="Canada and the American Civil War"><span data-dcnode-id="8853" instrument_node="">Canada and the American Civil War</span></a></div><span data-dcnode-id="8850" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8838"><div class="thumbinner" data-dcnode-id="8839" style="width:222px;"><a class="image" data-dcnode-id="8848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWilliam_H._Seward_portrait_-_restoration.jpg"><img alt="" class="thumbimage" data-dcnode-id="8849" data-file-height="4797" data-file-width="3410" decoding="async" height="309" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f5/William_H._Seward_portrait_-_restoration.jpg/220px-William_H._Seward_portrait_-_restoration.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f5/William_H._Seward_portrait_-_restoration.jpg/330px-William_H._Seward_portrait_-_restoration.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f5/William_H._Seward_portrait_-_restoration.jpg/440px-William_H._Seward_portrait_-_restoration.jpg 2x" width="220"></a><span data-dcnode-id="8847" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8840"><div class="magnify" data-dcnode-id="8845"><a class="internal" data-dcnode-id="8846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWilliam_H._Seward_portrait_-_restoration.jpg" title="Enlarge"></a></div><span data-dcnode-id="8844" instrument_node="">As Secretary of State, </span><a data-dcnode-id="8842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_H._Seward" title="William H. Seward"><span data-dcnode-id="8843" instrument_node="">William Seward</span></a><span data-dcnode-id="8841" instrument_node=""> presided over the acquisition of Alaska</span></div></div></div><span data-dcnode-id="8837" instrument_node="">
</span><p data-dcnode-id="8831"><span data-dcnode-id="8836" instrument_node="">Secretary of State Seward was an enthusiastic expansionist, but he had minimal support in Congress. In 1867, Russia, fearing a possible war with Great Britain, decided it would quickly lose its Alaska colony in a war, and decided to sell it to the United States for $7.2 million. The bargain was much too good to pass up, especially since it gave the Americans a major presence in the North Pacific and blocked the British from expanding there.  Public opinion was generally supportive, despite much humor about the folly of purchasing a giant "Polar bear garden." American soldiers replace the Russians, and the Russian merchants involved in the fur trade all left. However some Russian Orthodox priests remained as missionaries among the Alaska natives. Alaska attracted almost no attention until the 1890s, when gold was discovered in the neighboring Yukon district of Canada, and the easiest way for miners to get there was through Alaska.  In addition gold was found in Alaska itself.</span><sup class="reference" data-dcnode-id="8833" id="cite_ref-36"><a data-dcnode-id="8834" href="#cite_note-36"><span data-dcnode-id="8835" instrument_node="">[36]</span></a></sup><span data-dcnode-id="8832" instrument_node="">
</span></p><p data-dcnode-id="8804"><span data-dcnode-id="8830" instrument_node="">Relations with Britain (and its Canadian colonies) were tense . British officials were negligent in allowing Confederates to raid Vermont. For Washington a high priority long-term issue was warships built by British shipyards and outfitted for the Confederacy, especially the </span><a data-dcnode-id="8826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CSS_Alabama" title="CSS Alabama"><span data-dcnode-id="8829" instrument_node="">CSS </span><i data-dcnode-id="8827"><span data-dcnode-id="8828" instrument_node="">Alabama</span></i></a><span data-dcnode-id="8825" instrument_node="">, over vehement protests from American diplomats. After 1865 Washington at the minimum demanded the British to pay for the damages done by the warships. But the maximum demands were much higher. Powerful Republican Sen. </span><a data-dcnode-id="8823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Sumner" title="Charles Sumner"><span data-dcnode-id="8824" instrument_node="">Charles Sumner</span></a><span data-dcnode-id="8822" instrument_node=""> of Massachusetts argued that the British-built warships prolong the Civil War by two years, and that Britain should pay the entire expense of those two years. The unspoken assumption was that Washington would take parts of Canada in exchange for that debt; British Columbia, Red River (Manitoba), and Nova Scotia seemed possible. London naturally refused.</span><sup class="reference" data-dcnode-id="8819" id="cite_ref-37"><a data-dcnode-id="8820" href="#cite_note-37"><span data-dcnode-id="8821" instrument_node="">[37]</span></a></sup><span data-dcnode-id="8818" instrument_node=""> Negotiations dragged on for years until </span><a data-dcnode-id="8816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hamilton_Fish" title="Hamilton Fish"><span data-dcnode-id="8817" instrument_node="">Hamilton Fish</span></a><span data-dcnode-id="8815" instrument_node=""> became Secretary of State under President Ulysses Grant in 1869. Fish ranks with Webster as the leading American diplomat of the 19th century, and he worked out an amicable solution with Britain. The controversy was peacefully resolved in 1872 by an international arbitration tribunal in form of the </span><a data-dcnode-id="8813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alabama_Claims" title="Alabama Claims"><span data-dcnode-id="8814" instrument_node="">Alabama Claims</span></a><span data-dcnode-id="8812" instrument_node="">. The U.S. received $15.5 million and Washington dropped further claims.</span><sup class="reference" data-dcnode-id="8809" id="cite_ref-38"><a data-dcnode-id="8810" href="#cite_note-38"><span data-dcnode-id="8811" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="8806" id="cite_ref-39"><a data-dcnode-id="8807" href="#cite_note-39"><span data-dcnode-id="8808" instrument_node="">[39]</span></a></sup><span data-dcnode-id="8805" instrument_node="">
</span></p><p data-dcnode-id="8795"><span data-dcnode-id="8803" instrument_node="">Washington looked the other way when Irish activists known as Fenians </span><a data-dcnode-id="8801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fenian_raids" title="Fenian raids"><span data-dcnode-id="8802" instrument_node="">tried and failed badly in a ridiculously small invasion of Canada in 1871</span></a><span data-dcnode-id="8800" instrument_node="">. The Fenians movement collapsed from its own incompetence.</span><sup class="reference" data-dcnode-id="8797" id="cite_ref-40"><a data-dcnode-id="8798" href="#cite_note-40"><span data-dcnode-id="8799" instrument_node="">[40]</span></a></sup><span data-dcnode-id="8796" instrument_node="">
</span></p><p data-dcnode-id="8786"><span data-dcnode-id="8794" instrument_node="">Canada could never be defended so the British decided to cut their losses and eliminate the risk of a conflict with the U.S. The first ministry of </span><a data-dcnode-id="8792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Ewart_Gladstone" title="William Ewart Gladstone"><span data-dcnode-id="8793" instrument_node="">William Gladstone</span></a><span data-dcnode-id="8791" instrument_node=""> withdrew from all its historic military and political responsibilities in North America. It brought home its troops (keeping Halifax as an Atlantic naval base), and turned responsibility over to the locals. That made it wise to unify the separate Canadian colonies into a self-governing confederation named the Dominion of Canada.</span><sup class="reference" data-dcnode-id="8788" id="cite_ref-41"><a data-dcnode-id="8789" href="#cite_note-41"><span data-dcnode-id="8790" instrument_node="">[41]</span></a></sup><span data-dcnode-id="8787" instrument_node="">
</span></p><span data-dcnode-id="8785" instrument_node="">
</span><h3 data-dcnode-id="8775"><span class="mw-headline" data-dcnode-id="8783" id="James_G._Blaine"><span data-dcnode-id="8784" instrument_node="">James G. Blaine</span></span><span class="mw-editsection" data-dcnode-id="8776"><span class="mw-editsection-bracket" data-dcnode-id="8781"><span data-dcnode-id="8782" instrument_node="">[</span></span><a data-dcnode-id="8779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D14" title="Edit section: James G. Blaine"><span data-dcnode-id="8780" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8777"><span data-dcnode-id="8778" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8774" instrument_node="">
</span><p data-dcnode-id="8728"><a data-dcnode-id="8772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_G._Blaine" title="James G. Blaine"><span data-dcnode-id="8773" instrument_node="">James G. Blaine</span></a><span data-dcnode-id="8771" instrument_node="">, a leading Republican (and its losing candidate for president in 1884) was a highly innovative Secretary of State in the 1880s. By 1881, Blaine had completely abandoned his high-tariff </span><a data-dcnode-id="8769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protectionism" title="Protectionism"><span data-dcnode-id="8770" instrument_node="">Protectionism</span></a><span data-dcnode-id="8768" instrument_node=""> and used his position as Secretary of State to promote freer trade, especially within the Western Hemisphere.</span><sup class="reference" data-dcnode-id="8765" id="cite_ref-42"><a data-dcnode-id="8766" href="#cite_note-42"><span data-dcnode-id="8767" instrument_node="">[42]</span></a></sup><span data-dcnode-id="8764" instrument_node=""> His reasons were twofold: firstly, Blaine's wariness of British interference in the Americas was undiminished, and he saw increased trade with Latin America as the best way to keep Britain from dominating the region. Secondly, he believed that by encouraging exports, he could increase American prosperity. President Garfield agreed with his Secretary of State's vision and Blaine called for a Pan-American conference in 1882 to mediate disputes among the Latin American nations and to serve as a forum for talks on increasing trade. At the same time, Blaine hoped to negotiate a peace in the </span><a data-dcnode-id="8762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_of_the_Pacific" title="War of the Pacific"><span data-dcnode-id="8763" instrument_node="">War of the Pacific</span></a><span data-dcnode-id="8761" instrument_node=""> then being fought by </span><a data-dcnode-id="8759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolivia" title="Bolivia"><span data-dcnode-id="8760" instrument_node="">Bolivia</span></a><span data-dcnode-id="8758" instrument_node="">, </span><a data-dcnode-id="8756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chile" title="Chile"><span data-dcnode-id="8757" instrument_node="">Chile</span></a><span data-dcnode-id="8755" instrument_node="">, and </span><a data-dcnode-id="8753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peru" title="Peru"><span data-dcnode-id="8754" instrument_node="">Peru</span></a><span data-dcnode-id="8752" instrument_node="">. Blaine sought to expand American influence in other areas, calling for renegotiation of the </span><a data-dcnode-id="8750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clayton%25E2%2580%2593Bulwer_Treaty" title="Clayton–Bulwer Treaty"><span data-dcnode-id="8751" instrument_node="">Clayton–Bulwer Treaty</span></a><span data-dcnode-id="8749" instrument_node=""> to allow the United States to construct </span><a data-dcnode-id="8747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panama_Canal" title="Panama Canal"><span data-dcnode-id="8748" instrument_node="">a canal through Panama</span></a><span data-dcnode-id="8746" instrument_node=""> without British involvement, as well as attempting to reduce British involvement in the strategically located </span><a data-dcnode-id="8744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hawaiian_Kingdom" title="Hawaiian Kingdom"><span data-dcnode-id="8745" instrument_node="">Kingdom of Hawaii</span></a><span data-dcnode-id="8743" instrument_node="">.</span><sup class="reference" data-dcnode-id="8740" id="cite_ref-43"><a data-dcnode-id="8741" href="#cite_note-43"><span data-dcnode-id="8742" instrument_node="">[43]</span></a></sup><span data-dcnode-id="8739" instrument_node=""> His plans for the United States' involvement in the world stretched even beyond the Western Hemisphere, as he sought commercial treaties with </span><a data-dcnode-id="8737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseon" title="Joseon"><span data-dcnode-id="8738" instrument_node="">Korea</span></a><span data-dcnode-id="8736" instrument_node=""> and </span><a data-dcnode-id="8734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merina_Kingdom" title="Merina Kingdom"><span data-dcnode-id="8735" instrument_node="">Madagascar</span></a><span data-dcnode-id="8733" instrument_node="">. By 1882, however, a new Secretary was reversing Blaine's Latin American initiatives.</span><sup class="reference" data-dcnode-id="8730" id="cite_ref-44"><a data-dcnode-id="8731" href="#cite_note-44"><span data-dcnode-id="8732" instrument_node="">[44]</span></a></sup><span data-dcnode-id="8729" instrument_node="">
</span></p><p data-dcnode-id="8713"><span data-dcnode-id="8727" instrument_node="">Serving again as Secretary of State under </span><a data-dcnode-id="8725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benjamin_Harrison" title="Benjamin Harrison"><span data-dcnode-id="8726" instrument_node="">Benjamin Harrison</span></a><span data-dcnode-id="8724" instrument_node="">, Blaine worked for closer ties with the </span><a data-dcnode-id="8722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hawaiian_Kingdom" title="Hawaiian Kingdom"><span data-dcnode-id="8723" instrument_node="">Kingdom of Hawaii</span></a><span data-dcnode-id="8721" instrument_node="">, and sponsored a program to bring together all the independent nations of the Western Hemisphere in what became the </span><a data-dcnode-id="8719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organization_of_American_States" title="Organization of American States"><span data-dcnode-id="8720" instrument_node="">Pan-American Union</span></a><span data-dcnode-id="8718" instrument_node="">.</span><sup class="reference" data-dcnode-id="8715" id="cite_ref-45"><a data-dcnode-id="8716" href="#cite_note-45"><span data-dcnode-id="8717" instrument_node="">[45]</span></a></sup><span data-dcnode-id="8714" instrument_node="">
</span></p><p data-dcnode-id="8701"><span data-dcnode-id="8712" instrument_node="">Before 1892 senior diplomats from the United States to other countries, and from them to the U.S., were called "</span><a data-dcnode-id="8710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Envoy_%28title%29" title="Envoy (title)"><span data-dcnode-id="8711" instrument_node="">ministers</span></a><span data-dcnode-id="8709" instrument_node="">." In 1892 four major European countries (Britain, France, Germany, and Italy) raised the title of their chief diplomat to the US to "</span><a data-dcnode-id="8707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ambassador" title="Ambassador"><span data-dcnode-id="8708" instrument_node="">ambassador</span></a><span data-dcnode-id="8706" instrument_node="">"; the US reciprocated in 1893.</span><sup class="reference" data-dcnode-id="8703" id="cite_ref-46"><a data-dcnode-id="8704" href="#cite_note-46"><span data-dcnode-id="8705" instrument_node="">[46]</span></a></sup><span data-dcnode-id="8702" instrument_node="">
</span></p><span data-dcnode-id="8700" instrument_node="">
</span><h3 data-dcnode-id="8690"><span class="mw-headline" data-dcnode-id="8698" id="Hawaii"><span data-dcnode-id="8699" instrument_node="">Hawaii</span></span><span class="mw-editsection" data-dcnode-id="8691"><span class="mw-editsection-bracket" data-dcnode-id="8696"><span data-dcnode-id="8697" instrument_node="">[</span></span><a data-dcnode-id="8694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D15" title="Edit section: Hawaii"><span data-dcnode-id="8695" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8692"><span data-dcnode-id="8693" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8689" instrument_node="">
</span><link data-dcnode-id="8688" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8684" role="note"><span data-dcnode-id="8687" instrument_node="">Main article: </span><a data-dcnode-id="8685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_Hawaii" title="History of Hawaii"><span data-dcnode-id="8686" instrument_node="">History of Hawaii</span></a></div><span data-dcnode-id="8683" instrument_node="">
</span><p data-dcnode-id="8674"><span data-dcnode-id="8682" instrument_node="">While European powers, and Japan, engaged in an intense scramble for colonial possessions in Africa and Asia, the United States stood aloof. This began to change in 1893. In the early 1880s, the United States had only a small army stationed at scattered Western forts, and an old fashioned wooden navy. By 1890 the U.S. began investment in new naval technology including steam-powered battleships with powerful armaments and steel decking. Naval planners led by </span><a data-dcnode-id="8680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Thayer_Mahan" title="Alfred Thayer Mahan"><span data-dcnode-id="8681" instrument_node="">Alfred Thayer Mahan</span></a><span data-dcnode-id="8679" instrument_node=""> used the success of the British Royal Navy to explore the opportunity for American naval power.</span><sup class="reference" data-dcnode-id="8676" id="cite_ref-47"><a data-dcnode-id="8677" href="#cite_note-47"><span data-dcnode-id="8678" instrument_node="">[47]</span></a></sup><span data-dcnode-id="8675" instrument_node="">
</span></p><p data-dcnode-id="8653"><span data-dcnode-id="8673" instrument_node="">In 1893 the business community in </span><a data-dcnode-id="8671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hawaiian_Kingdom" title="Hawaiian Kingdom"><span data-dcnode-id="8672" instrument_node="">Kingdom of Hawaii</span></a><span data-dcnode-id="8670" instrument_node=""> overthrew the Queen for trying to become an absolute monarch. They sought annexation by the U.S. President </span><a data-dcnode-id="8668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benjamin_Harrison" title="Benjamin Harrison"><span data-dcnode-id="8669" instrument_node="">Harrison</span></a><span data-dcnode-id="8667" instrument_node="">, a Republican, was in favor and forwarded the proposal to the Senate for approval. But the newly elected President </span><a data-dcnode-id="8665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grover_Cleveland" title="Grover Cleveland"><span data-dcnode-id="8666" instrument_node="">Cleveland</span></a><span data-dcnode-id="8664" instrument_node="">, a Democrat opposed to expansionism, withdrew the proposed annexation. Hawaii instead formed an independent </span><a data-dcnode-id="8662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_Hawaii" title="Republic of Hawaii"><span data-dcnode-id="8663" instrument_node="">Republic of Hawaii</span></a><span data-dcnode-id="8661" instrument_node="">. Unexpectedly foreign-policy became a central concern of American politics. Historian </span><a data-dcnode-id="8659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Graff" title="Henry Graff"><span data-dcnode-id="8660" instrument_node="">Henry Graff</span></a><span data-dcnode-id="8658" instrument_node=""> says that at first, "Public opinion at home seemed to indicate acquiescence....Unmistakably, the sentiment at home was maturing with immense force for the United States to join the great powers of the world in a quest for overseas colonies."</span><sup class="reference" data-dcnode-id="8655" id="cite_ref-48"><a data-dcnode-id="8656" href="#cite_note-48"><span data-dcnode-id="8657" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8654" instrument_node="">
</span></p><p data-dcnode-id="8645"><a class="mw-redirect" data-dcnode-id="8651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Presidency_of_Grover_Cleveland" title="Presidency of Grover Cleveland"><span data-dcnode-id="8652" instrument_node="">Cleveland</span></a><span data-dcnode-id="8650" instrument_node="">, on taking office in March 1893, rescinded the annexation proposal. His biographer Alyn Brodsky argues he was deeply adverse to an immoral action against the little kingdom which no longer existed.</span><sup class="reference" data-dcnode-id="8647" id="cite_ref-49"><a data-dcnode-id="8648" href="#cite_note-49"><span data-dcnode-id="8649" instrument_node="">[49]</span></a></sup><span data-dcnode-id="8646" instrument_node="">
</span></p><p data-dcnode-id="8620"><span data-dcnode-id="8644" instrument_node="">Cleveland tried to mobilize support from Southern Democrats to fight the treaty. He sent former Georgia Congressman </span><a data-dcnode-id="8642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Henderson_Blount" title="James Henderson Blount"><span data-dcnode-id="8643" instrument_node="">James H. Blount</span></a><span data-dcnode-id="8641" instrument_node=""> as a special representative to Hawaii to investigate and provide a solution. Blount was well known for his opposition to imperialism. Blount was also a leader in the white supremacy movement that was </span><a data-dcnode-id="8639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disfranchisement_after_the_Reconstruction_era" title="Disfranchisement after the Reconstruction era"><span data-dcnode-id="8640" instrument_node="">ending the right to vote by southern Blacks</span></a><span data-dcnode-id="8638" instrument_node="">.. Some observers speculated he would support annexation on grounds of the inability of the Asiatics to govern themselves. Instead, Blount opposed imperialism, and called for the US military to restore of Queen </span><a data-dcnode-id="8636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lili%25CA%25BBuokalani" title="Liliʻuokalani"><span data-dcnode-id="8637" instrument_node="">Liliʻuokalani</span></a><span data-dcnode-id="8635" instrument_node="">. He argued that the Hawaii natives should be allowed to continue their "Asiatic ways."</span><sup class="reference" data-dcnode-id="8632" id="cite_ref-50"><a data-dcnode-id="8633" href="#cite_note-50"><span data-dcnode-id="8634" instrument_node="">[50]</span></a></sup><span data-dcnode-id="8631" instrument_node=""> Cleveland wanted to restore the Queen, but when she promised to execute the governing leaders in Hawaii he drew back, The </span><a data-dcnode-id="8629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_Hawaii" title="Republic of Hawaii"><span data-dcnode-id="8630" instrument_node="">Republic of Hawaii</span></a><span data-dcnode-id="8628" instrument_node=""> was recognized by the powers, and Japan was interested in annexing it,</span><sup class="reference" data-dcnode-id="8625" id="cite_ref-51"><a data-dcnode-id="8626" href="#cite_note-51"><span data-dcnode-id="8627" instrument_node="">[51]</span></a></sup><sup class="reference" data-dcnode-id="8622" id="cite_ref-52"><a data-dcnode-id="8623" href="#cite_note-52"><span data-dcnode-id="8624" instrument_node="">[52]</span></a></sup><span data-dcnode-id="8621" instrument_node="">
</span></p><span data-dcnode-id="8619" instrument_node="">
</span><h2 data-dcnode-id="8608"><span data-dcnode-id="8618" id="Emergence_as_a_Great_Power:_1897.E2.80.931913"></span><span class="mw-headline" data-dcnode-id="8616" id="Emergence_as_a_Great_Power:_1897–1913"><span data-dcnode-id="8617" instrument_node="">Emergence as a Great Power: 1897–1913</span></span><span class="mw-editsection" data-dcnode-id="8609"><span class="mw-editsection-bracket" data-dcnode-id="8614"><span data-dcnode-id="8615" instrument_node="">[</span></span><a data-dcnode-id="8612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D16" title="Edit section: Emergence as a Great Power: 1897–1913"><span data-dcnode-id="8613" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8610"><span data-dcnode-id="8611" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8607" instrument_node="">
</span><link data-dcnode-id="8606" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8602" role="note"><span data-dcnode-id="8605" instrument_node="">Main article: </span><a data-dcnode-id="8603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_U.S._foreign_policy%2C_1897%25E2%2580%25931913" title="History of U.S. foreign policy, 1897–1913"><span data-dcnode-id="8604" instrument_node="">History of U.S. foreign policy, 1897–1913</span></a></div><span data-dcnode-id="8601" instrument_node="">
</span><link data-dcnode-id="8600" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8596" role="note"><span data-dcnode-id="8599" instrument_node="">See also: </span><a data-dcnode-id="8597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Progressive_Era" title="Progressive Era"><span data-dcnode-id="8598" instrument_node="">Progressive Era</span></a></div><span data-dcnode-id="8595" instrument_node="">
</span><p data-dcnode-id="8585"><span data-dcnode-id="8594" instrument_node="">Foreign policy suddenly became a major issue in national affairs after 1895.</span><sup class="reference" data-dcnode-id="8591" id="cite_ref-53"><a data-dcnode-id="8592" href="#cite_note-53"><span data-dcnode-id="8593" instrument_node="">[53]</span></a></sup><span data-dcnode-id="8590" instrument_node=""> International issues such as war, imperialism, and the national role in world affairs played a role in the 1900 presidential election.</span><sup class="reference" data-dcnode-id="8587" id="cite_ref-54"><a data-dcnode-id="8588" href="#cite_note-54"><span data-dcnode-id="8589" instrument_node="">[54]</span></a></sup><span data-dcnode-id="8586" instrument_node="">
</span></p><span data-dcnode-id="8584" instrument_node="">
</span><h3 data-dcnode-id="8574"><span class="mw-headline" data-dcnode-id="8582" id="Expansionists_triumphant"><span data-dcnode-id="8583" instrument_node="">Expansionists triumphant</span></span><span class="mw-editsection" data-dcnode-id="8575"><span class="mw-editsection-bracket" data-dcnode-id="8580"><span data-dcnode-id="8581" instrument_node="">[</span></span><a data-dcnode-id="8578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D17" title="Edit section: Expansionists triumphant"><span data-dcnode-id="8579" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8576"><span data-dcnode-id="8577" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8573" instrument_node="">
</span><p data-dcnode-id="8527"><span data-dcnode-id="8572" instrument_node="">A vigorous nationwide anti-expansionist movement, organized as the </span><a data-dcnode-id="8570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Anti-Imperialist_League" title="American Anti-Imperialist League"><span data-dcnode-id="8571" instrument_node="">American Anti-Imperialist League</span></a><span data-dcnode-id="8569" instrument_node="">, emerged that listened to Cleveland and </span><a data-dcnode-id="8567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carl_Schurz" title="Carl Schurz"><span data-dcnode-id="8568" instrument_node="">Carl Schurz</span></a><span data-dcnode-id="8566" instrument_node="">, as well as Democratic leader </span><a data-dcnode-id="8564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Jennings_Bryan" title="William Jennings Bryan"><span data-dcnode-id="8565" instrument_node="">William Jennings Bryan</span></a><span data-dcnode-id="8563" instrument_node="">, industrialist </span><a data-dcnode-id="8561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrew_Carnegie" title="Andrew Carnegie"><span data-dcnode-id="8562" instrument_node="">Andrew Carnegie</span></a><span data-dcnode-id="8560" instrument_node="">, author </span><a data-dcnode-id="8558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mark_Twain" title="Mark Twain"><span data-dcnode-id="8559" instrument_node="">Mark Twain</span></a><span data-dcnode-id="8557" instrument_node=""> and sociologist </span><a data-dcnode-id="8555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Graham_Sumner" title="William Graham Sumner"><span data-dcnode-id="8556" instrument_node="">William Graham Sumner</span></a><span data-dcnode-id="8554" instrument_node="">, and many prominent intellectuals and politicians who came of age in the Civil War.</span><sup class="reference" data-dcnode-id="8551" id="cite_ref-55"><a data-dcnode-id="8552" href="#cite_note-55"><span data-dcnode-id="8553" instrument_node="">[55]</span></a></sup><span data-dcnode-id="8550" instrument_node=""> The anti-imperialists opposed expansion, believing that </span><a data-dcnode-id="8548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Imperialism" title="Imperialism"><span data-dcnode-id="8549" instrument_node="">imperialism</span></a><span data-dcnode-id="8547" instrument_node=""> violated the fundamental principle that just </span><a data-dcnode-id="8545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republicanism" title="Republicanism"><span data-dcnode-id="8546" instrument_node="">republican government</span></a><span data-dcnode-id="8544" instrument_node=""> must derive from "</span><a data-dcnode-id="8542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consent_of_the_governed" title="Consent of the governed"><span data-dcnode-id="8543" instrument_node="">consent of the governed</span></a><span data-dcnode-id="8541" instrument_node="">." The League argued that such activity would necessitate the abandonment of American ideals of self-government and </span><a data-dcnode-id="8539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-interventionism" title="Non-interventionism"><span data-dcnode-id="8540" instrument_node="">non-intervention</span></a><span data-dcnode-id="8538" instrument_node="">—ideals expressed in the Declaration of Independence, </span><a data-dcnode-id="8536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Washington%2527s_Farewell_Address" title="George Washington's Farewell Address"><span data-dcnode-id="8537" instrument_node="">George Washington's Farewell Address</span></a><span data-dcnode-id="8535" instrument_node=""> and Lincoln's </span><a data-dcnode-id="8533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gettysburg_Address" title="Gettysburg Address"><span data-dcnode-id="8534" instrument_node="">Gettysburg Address</span></a><span data-dcnode-id="8532" instrument_node="">.</span><sup class="reference" data-dcnode-id="8529" id="cite_ref-56"><a data-dcnode-id="8530" href="#cite_note-56"><span data-dcnode-id="8531" instrument_node="">[56]</span></a></sup><span data-dcnode-id="8528" instrument_node="">
</span></p><p data-dcnode-id="8489"><span data-dcnode-id="8526" instrument_node="">Despite the efforts of the Cleveland and others, Secretary of State </span><a data-dcnode-id="8524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Hay" title="John Hay"><span data-dcnode-id="8525" instrument_node="">John Hay</span></a><span data-dcnode-id="8523" instrument_node="">, naval strategist </span><a data-dcnode-id="8521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Thayer_Mahan" title="Alfred Thayer Mahan"><span data-dcnode-id="8522" instrument_node="">Alfred T. Mahan</span></a><span data-dcnode-id="8520" instrument_node="">, Republican congressman </span><a data-dcnode-id="8518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Cabot_Lodge" title="Henry Cabot Lodge"><span data-dcnode-id="8519" instrument_node="">Henry Cabot Lodge</span></a><span data-dcnode-id="8517" instrument_node="">, Secretary of War </span><a data-dcnode-id="8515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elihu_Root" title="Elihu Root"><span data-dcnode-id="8516" instrument_node="">Elihu Root</span></a><span data-dcnode-id="8514" instrument_node="">, and young politician </span><a data-dcnode-id="8512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theodore_Roosevelt" title="Theodore Roosevelt"><span data-dcnode-id="8513" instrument_node="">Theodore Roosevelt</span></a><span data-dcnode-id="8511" instrument_node=""> rallied expansionists. They had vigorous support from newspaper publishers </span><a data-dcnode-id="8509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Randolph_Hearst" title="William Randolph Hearst"><span data-dcnode-id="8510" instrument_node="">William Randolph Hearst</span></a><span data-dcnode-id="8508" instrument_node=""> and </span><a data-dcnode-id="8506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Pulitzer" title="Joseph Pulitzer"><span data-dcnode-id="8507" instrument_node="">Joseph Pulitzer</span></a><span data-dcnode-id="8505" instrument_node="">, whipping up popular excitement. Mahan and Roosevelt designed a global strategy calling for a competitive modern navy, Pacific bases, an isthmian canal through Nicaragua or Panama, and, above all, an assertive role for America as the largest industrial power.</span><sup class="reference" data-dcnode-id="8502" id="cite_ref-57"><a data-dcnode-id="8503" href="#cite_note-57"><span data-dcnode-id="8504" instrument_node="">[57]</span></a></sup><span data-dcnode-id="8501" instrument_node=""> President McKinley's position was that Hawaii could never survive on its own. It would quickly be gobbled up by Japan—already a fourth of the islands' population was Japanese. Japan would then dominate the Pacific and undermine American hopes for large-scale trade with Asia.</span><sup class="reference" data-dcnode-id="8498" id="cite_ref-58"><a data-dcnode-id="8499" href="#cite_note-58"><span data-dcnode-id="8500" instrument_node="">[58]</span></a></sup><span data-dcnode-id="8497" instrument_node=""> While the Democrats could block a treaty in the Senate by denying it a two thirds majority, McKinley annexed Hawaii through a </span><a data-dcnode-id="8495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joint_resolution" title="Joint resolution"><span data-dcnode-id="8496" instrument_node="">joint resolution</span></a><span data-dcnode-id="8494" instrument_node="">, which required only a majority vote in each house. Hawaii became a territory in 1898 with full U.S. citizenship for its residents. It became the 50th state in 1959.</span><sup class="reference" data-dcnode-id="8491" id="cite_ref-59"><a data-dcnode-id="8492" href="#cite_note-59"><span data-dcnode-id="8493" instrument_node="">[59]</span></a></sup><span data-dcnode-id="8490" instrument_node="">
</span></p><span data-dcnode-id="8488" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8472"><div class="thumbinner" data-dcnode-id="8473" style="width:322px;"><a class="image" data-dcnode-id="8486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFair_field_and_no_favor.jpg"><img alt="" class="thumbimage" data-dcnode-id="8487" data-file-height="648" data-file-width="460" decoding="async" height="451" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/3/3a/Fair_field_and_no_favor.jpg/320px-Fair_field_and_no_favor.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/3/3a/Fair_field_and_no_favor.jpg 1.5x" width="320"></a><span data-dcnode-id="8485" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8474"><div class="magnify" data-dcnode-id="8483"><a class="internal" data-dcnode-id="8484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFair_field_and_no_favor.jpg" title="Enlarge"></a></div><span data-dcnode-id="8482" instrument_node="">Uncle Sam ( United States) rejects force and violence and ask "fair field and no favor"--that is, equal opportunity for all trading nations to peacefully enter the China market. This became the Open Door Policy. Editorial cartoon by </span><a data-dcnode-id="8480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Allen_Rogers" title="William Allen Rogers"><span data-dcnode-id="8481" instrument_node="">William A. Rogers</span></a><span data-dcnode-id="8479" instrument_node=""> in </span><i data-dcnode-id="8476"><a data-dcnode-id="8477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harper%2527s_Magazine" title="Harper's Magazine"><span data-dcnode-id="8478" instrument_node="">Harper's Magazine</span></a></i><span data-dcnode-id="8475" instrument_node=""> November 18, 1899.</span></div></div></div><span data-dcnode-id="8471" instrument_node="">
</span><p data-dcnode-id="8462"><span data-dcnode-id="8470" instrument_node="">United States, with backing from Great Britain, in 1900 announced the </span><a data-dcnode-id="8468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_Door_Policy" title="Open Door Policy"><span data-dcnode-id="8469" instrument_node="">Open Door Policy</span></a><span data-dcnode-id="8467" instrument_node=""> so that all nations could gain access to the China market on equal, nonviolent terms.</span><sup class="reference" data-dcnode-id="8464" id="cite_ref-60"><a data-dcnode-id="8465" href="#cite_note-60"><span data-dcnode-id="8466" instrument_node="">[60]</span></a></sup><span data-dcnode-id="8463" instrument_node="">
</span></p><span data-dcnode-id="8461" instrument_node="">
</span><h3 data-dcnode-id="8451"><span class="mw-headline" data-dcnode-id="8459" id="Foreign-policy_expertise"><span data-dcnode-id="8460" instrument_node="">Foreign-policy expertise</span></span><span class="mw-editsection" data-dcnode-id="8452"><span class="mw-editsection-bracket" data-dcnode-id="8457"><span data-dcnode-id="8458" instrument_node="">[</span></span><a data-dcnode-id="8455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D18" title="Edit section: Foreign-policy expertise"><span data-dcnode-id="8456" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8453"><span data-dcnode-id="8454" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8450" instrument_node="">
</span><p data-dcnode-id="8438"><span data-dcnode-id="8449" instrument_node="">Foreign-policy expertise in America in the 1890s was in limited supply. The State Department had a cadre of diplomats who rotated around, but the most senior positions were political patronage appointments. The holders sometimes acquired a limited expertise, but the overall pool was shallow. At the level of presidential candidate and secretary of state, the entire half-century after 1850 showed minimal expertise or interest, with the exception of </span><a data-dcnode-id="8447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_H._Seward" title="William H. Seward"><span data-dcnode-id="8448" instrument_node="">William Seward</span></a><span data-dcnode-id="8446" instrument_node=""> in the 1860s, and </span><a data-dcnode-id="8444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_G._Blaine" title="James G. Blaine"><span data-dcnode-id="8445" instrument_node="">James G. Blaine</span></a><span data-dcnode-id="8443" instrument_node=""> in the 1880s. After 1900, experience deepened in the State Department, and at the very top level, Roosevelt, Taft, Wilson, Hoover and their secretaries of state comprised a remarkable group with deep knowledge of international affairs. American elections rarely featured serious discussion of foreign-policy, with a few exceptions such as 1910, 1916, 1920 and 1940.</span><sup class="reference" data-dcnode-id="8440" id="cite_ref-61"><a data-dcnode-id="8441" href="#cite_note-61"><span data-dcnode-id="8442" instrument_node="">[61]</span></a></sup><span data-dcnode-id="8439" instrument_node="">
</span></p><p data-dcnode-id="8428"><span data-dcnode-id="8437" instrument_node="">Anytime a crisis erupted, the major newspapers and magazines commented at length on what Washington should do. The media relied primarily on a small number of foreign-policy experts based in New York City and Boston. Newspapers elsewhere copied their reports and editorials. Sometimes the regional media had a local cadre of experts who could comment on Europe, but they rarely had anyone who knew much about Latin America or Asia. Conceptually, the media experts relied on American traditions – what would Washington or Jefferson or Lincoln have done in this crisis?-- And what impact it might have on current business conditions. Social Darwinist ideas were broad, but they seldom shaped foreign-policy views. The psychic crisis that some historians discovered in the 1890s had very little impact. Travel in Europe, and close reading of British media were the chief sources for media experts.</span><sup class="reference" data-dcnode-id="8434" id="cite_ref-62"><a data-dcnode-id="8435" href="#cite_note-62"><span data-dcnode-id="8436" instrument_node="">[62]</span></a></sup><span data-dcnode-id="8433" instrument_node=""> Religious magazines had a cadre of returned missionaries who were helpful, and ethnic groups, especially the Irish and the Germans and the Jews had their own national experts whose views appeared in their own periodicals.</span><sup class="reference" data-dcnode-id="8430" id="cite_ref-63"><a data-dcnode-id="8431" href="#cite_note-63"><span data-dcnode-id="8432" instrument_node="">[63]</span></a></sup><span data-dcnode-id="8429" instrument_node="">
</span></p><span data-dcnode-id="8427" instrument_node="">
</span><h3 data-dcnode-id="8417"><span class="mw-headline" data-dcnode-id="8425" id="Cuba_and_Spain"><span data-dcnode-id="8426" instrument_node="">Cuba and Spain</span></span><span class="mw-editsection" data-dcnode-id="8418"><span class="mw-editsection-bracket" data-dcnode-id="8423"><span data-dcnode-id="8424" instrument_node="">[</span></span><a data-dcnode-id="8421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D19" title="Edit section: Cuba and Spain"><span data-dcnode-id="8422" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8419"><span data-dcnode-id="8420" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8416" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8397"><div class="thumbinner" data-dcnode-id="8398" style="width:302px;"><a class="image" data-dcnode-id="8414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJudge-2-6-1897.jpg"><img alt="" class="thumbimage" data-dcnode-id="8415" data-file-height="495" data-file-width="700" decoding="async" height="212" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Judge-2-6-1897.jpg/300px-Judge-2-6-1897.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Judge-2-6-1897.jpg/450px-Judge-2-6-1897.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Judge-2-6-1897.jpg/600px-Judge-2-6-1897.jpg 2x" width="300"></a><span data-dcnode-id="8413" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8399"><div class="magnify" data-dcnode-id="8411"><a class="internal" data-dcnode-id="8412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJudge-2-6-1897.jpg" title="Enlarge"></a></div><a data-dcnode-id="8409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Columbia_%28personification%29" title="Columbia (personification)"><span data-dcnode-id="8410" instrument_node="">Columbia</span></a><span data-dcnode-id="8408" instrument_node=""> (the American people) reaches out to help oppressed Cuba in 1897 while </span><a data-dcnode-id="8406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uncle_Sam" title="Uncle Sam"><span data-dcnode-id="8407" instrument_node="">Uncle Sam</span></a><span data-dcnode-id="8405" instrument_node=""> (the U.S. government) is blind to the crisis and will not use its powerful guns to help. </span><a data-dcnode-id="8401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judge_%28magazine%29" title="Judge (magazine)"><i data-dcnode-id="8403"><span data-dcnode-id="8404" instrument_node="">Judge</span></i><span data-dcnode-id="8402" instrument_node=""> magazine</span></a><span data-dcnode-id="8400" instrument_node="">, February 6, 1897.</span></div></div></div><span data-dcnode-id="8396" instrument_node="">
</span><p data-dcnode-id="8365"><span data-dcnode-id="8395" instrument_node="">In the mid 1890s, American public opinion denounced the Spanish repression of the Cuban independence movement as brutal and unacceptable. The U.S. increased pressure and was dissatisfied with Spanish responses. When the American battleship the </span><a class="mw-redirect" data-dcnode-id="8391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USS_Maine_%28ACR-1%29" title="USS Maine (ACR-1)"><span data-dcnode-id="8394" instrument_node="">USS&nbsp;</span><i data-dcnode-id="8392"><span data-dcnode-id="8393" instrument_node="">Maine</span></i></a><span data-dcnode-id="8390" instrument_node=""> exploded for undetermined reasons in the harbor of </span><a data-dcnode-id="8388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Havana" title="Havana"><span data-dcnode-id="8389" instrument_node="">Havana</span></a><span data-dcnode-id="8387" instrument_node="">, Cuba, on 15 February 1898, the issue became overwhelming and McKinley could not resist the demands for immediate action. Most Democrats and many Republicans demanded war to liberate Cuba. Almost simultaneously the two countries declared war. (Every other country was neutral.) The U.S. easily won the one-sided four-month-long </span><a data-dcnode-id="8385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spanish%25E2%2580%2593American_War" title="Spanish–American War"><span data-dcnode-id="8386" instrument_node="">Spanish–American War</span></a><span data-dcnode-id="8384" instrument_node=""> from April through July. In the Treaty of Paris, the U.S. took over the last remnants of the Spanish Empire, notably Cuba, Puerto Rico, the Philippines and </span><a data-dcnode-id="8382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guam" title="Guam"><span data-dcnode-id="8383" instrument_node="">Guam</span></a><span data-dcnode-id="8381" instrument_node="">. It marked America's transition from a regional to a global power. Cuba was given independence under American supervision.</span><sup class="reference" data-dcnode-id="8378" id="cite_ref-64"><a data-dcnode-id="8379" href="#cite_note-64"><span data-dcnode-id="8380" instrument_node="">[64]</span></a></sup><span data-dcnode-id="8377" instrument_node=""> However the permanent status of the Philippines became a heated political issue. Democrats, led by </span><a data-dcnode-id="8375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Jennings_Bryan" title="William Jennings Bryan"><span data-dcnode-id="8376" instrument_node="">William Jennings Bryan</span></a><span data-dcnode-id="8374" instrument_node="">, had strongly supported the war but now they strongly opposed annexation.</span><sup class="reference" data-dcnode-id="8371" id="cite_ref-65"><a data-dcnode-id="8372" href="#cite_note-65"><span data-dcnode-id="8373" instrument_node="">[65]</span></a></sup><span data-dcnode-id="8370" instrument_node=""> McKinley was reelected and annexation was decided.</span><sup class="reference" data-dcnode-id="8367" id="cite_ref-66"><a data-dcnode-id="8368" href="#cite_note-66"><span data-dcnode-id="8369" instrument_node="">[66]</span></a></sup><span data-dcnode-id="8366" instrument_node="">
</span></p><p data-dcnode-id="8341"><span data-dcnode-id="8364" instrument_node="">The U.S. Navy emerged as a major naval power thanks to modernization programs begun in the 1880s and adopted the sea power theories of Captain </span><a data-dcnode-id="8362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Thayer_Mahan" title="Alfred Thayer Mahan"><span data-dcnode-id="8363" instrument_node="">Alfred Thayer Mahan</span></a><span data-dcnode-id="8361" instrument_node="">. The Army remained small but was reorganized in the </span><a data-dcnode-id="8359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theodore_Roosevelt" title="Theodore Roosevelt"><span data-dcnode-id="8360" instrument_node="">Roosevelt</span></a><span data-dcnode-id="8358" instrument_node=""> Administration along modern lines and no longer focused on scattered forts in the West. The </span><a data-dcnode-id="8356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philippine%25E2%2580%2593American_War" title="Philippine–American War"><span data-dcnode-id="8357" instrument_node="">Philippine–American War</span></a><span data-dcnode-id="8355" instrument_node=""> was a short operation to suppress insurgents and ensure U.S. control of the islands; by 1907, however, interest in the Philippines as an entry to Asia faded in favor of the </span><a data-dcnode-id="8353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panama_Canal" title="Panama Canal"><span data-dcnode-id="8354" instrument_node="">Panama Canal</span></a><span data-dcnode-id="8352" instrument_node="">, and American foreign policy centered on the Caribbean. The 1904 </span><a data-dcnode-id="8350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roosevelt_Corollary" title="Roosevelt Corollary"><span data-dcnode-id="8351" instrument_node="">Roosevelt Corollary</span></a><span data-dcnode-id="8349" instrument_node=""> to the </span><a data-dcnode-id="8347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monroe_Doctrine" title="Monroe Doctrine"><span data-dcnode-id="8348" instrument_node="">Monroe Doctrine</span></a><span data-dcnode-id="8346" instrument_node="">, which proclaimed a right for the United States to intervene to stabilize weak states in the Americas, further weakened European influence in Latin America and further established U.S. regional hegemony.</span><sup class="reference" data-dcnode-id="8343" id="cite_ref-67"><a data-dcnode-id="8344" href="#cite_note-67"><span data-dcnode-id="8345" instrument_node="">[67]</span></a></sup><span data-dcnode-id="8342" instrument_node="">
</span></p><p data-dcnode-id="8320"><span data-dcnode-id="8340" instrument_node="">The outbreak of the </span><a data-dcnode-id="8338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mexican_Revolution" title="Mexican Revolution"><span data-dcnode-id="8339" instrument_node="">Mexican Revolution</span></a><span data-dcnode-id="8337" instrument_node=""> in 1910 ended a half century of peaceful borders and brought escalating tensions, as revolutionaries threatened American business interests and hundreds of thousands of refugees fled north. President </span><a data-dcnode-id="8335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Woodrow_Wilson" title="Woodrow Wilson"><span data-dcnode-id="8336" instrument_node="">Woodrow Wilson</span></a><span data-dcnode-id="8334" instrument_node=""> tried using military intervention to stabilize Mexico but that failed. After Mexico in 1917 rejected Germany's invitation in the </span><a data-dcnode-id="8332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zimmermann_Telegram" title="Zimmermann Telegram"><span data-dcnode-id="8333" instrument_node="">Zimmermann Telegram</span></a><span data-dcnode-id="8331" instrument_node=""> to join in war against the U.S., relations stabilized and there were no more interventions in Mexico. Military interventions did occur in other small countries like Nicaragua, but were ended by the </span><a data-dcnode-id="8329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Good_Neighbor_policy" title="Good Neighbor policy"><span data-dcnode-id="8330" instrument_node="">Good Neighbor policy</span></a><span data-dcnode-id="8328" instrument_node=""> announced by President </span><a data-dcnode-id="8326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franklin_D._Roosevelt" title="Franklin D. Roosevelt"><span data-dcnode-id="8327" instrument_node="">Franklin D. Roosevelt</span></a><span data-dcnode-id="8325" instrument_node=""> in 1933, which allowed for American recognition of and friendship with dictatorships.</span><sup class="reference" data-dcnode-id="8322" id="cite_ref-68"><a data-dcnode-id="8323" href="#cite_note-68"><span data-dcnode-id="8324" instrument_node="">[68]</span></a></sup><span data-dcnode-id="8321" instrument_node="">
</span></p><span data-dcnode-id="8319" instrument_node="">
</span><h2 data-dcnode-id="8309"><span class="mw-headline" data-dcnode-id="8317" id="Wilson_and_World_War_I"><span data-dcnode-id="8318" instrument_node="">Wilson and World War I</span></span><span class="mw-editsection" data-dcnode-id="8310"><span class="mw-editsection-bracket" data-dcnode-id="8315"><span data-dcnode-id="8316" instrument_node="">[</span></span><a data-dcnode-id="8313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D20" title="Edit section: Wilson and World War I"><span data-dcnode-id="8314" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8311"><span data-dcnode-id="8312" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8308" instrument_node="">
</span><link data-dcnode-id="8307" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8303" role="note"><span data-dcnode-id="8306" instrument_node="">Main article: </span><a data-dcnode-id="8304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_U.S._foreign_policy%2C_1913%25E2%2580%25931933" title="History of U.S. foreign policy, 1913–1933"><span data-dcnode-id="8305" instrument_node="">History of U.S. foreign policy, 1913–1933</span></a></div><span data-dcnode-id="8302" instrument_node="">
</span><h3 data-dcnode-id="8291"><span data-dcnode-id="8301" id="From_neutrality_to_war_to_end_all_wars:_1914.E2.80.931917"></span><span class="mw-headline" data-dcnode-id="8299" id="From_neutrality_to_war_to_end_all_wars:_1914–1917"><span data-dcnode-id="8300" instrument_node="">From neutrality to war to end all wars: 1914–1917</span></span><span class="mw-editsection" data-dcnode-id="8292"><span class="mw-editsection-bracket" data-dcnode-id="8297"><span data-dcnode-id="8298" instrument_node="">[</span></span><a data-dcnode-id="8295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D21" title="Edit section: From neutrality to war to end all wars: 1914–1917"><span data-dcnode-id="8296" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8293"><span data-dcnode-id="8294" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8290" instrument_node="">
</span><link data-dcnode-id="8289" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8282" role="note"><span data-dcnode-id="8288" instrument_node="">Main articles: </span><a data-dcnode-id="8286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Woodrow_Wilson_administration" title="Foreign policy of the Woodrow Wilson administration"><span data-dcnode-id="8287" instrument_node="">Foreign policy of the Woodrow Wilson administration</span></a><span data-dcnode-id="8285" instrument_node=""> and </span><a data-dcnode-id="8283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Presidency_of_Woodrow_Wilson%23Foreign_policy" title="Presidency of Woodrow Wilson"><span data-dcnode-id="8284" instrument_node="">Presidency of Woodrow Wilson §&nbsp;Foreign policy</span></a></div><span data-dcnode-id="8281" instrument_node="">
</span><p data-dcnode-id="8263"><span data-dcnode-id="8280" instrument_node="">American foreign policy was largely determined by President </span><a data-dcnode-id="8278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Woodrow_Wilson" title="Woodrow Wilson"><span data-dcnode-id="8279" instrument_node="">Woodrow Wilson</span></a><span data-dcnode-id="8277" instrument_node="">, who had shown little interest in foreign affairs before entering the White House in 1913. His chief advisor was "Colonel" Edward House, who was sent on many top-level missions. Wilson's foreign policy was based on an idealistic approach to </span><a data-dcnode-id="8275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_internationalism" title="Liberal internationalism"><span data-dcnode-id="8276" instrument_node="">liberal internationalism</span></a><span data-dcnode-id="8274" instrument_node=""> that sharply contrasted with the </span><a data-dcnode-id="8272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Realism_%28international_relations%29" title="Realism (international relations)"><span data-dcnode-id="8273" instrument_node="">realist</span></a><span data-dcnode-id="8271" instrument_node=""> conservative nationalism of Taft, Roosevelt, and </span><a data-dcnode-id="8269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_McKinley" title="William McKinley"><span data-dcnode-id="8270" instrument_node="">William McKinley</span></a><span data-dcnode-id="8268" instrument_node="">.</span><sup class="reference" data-dcnode-id="8265" id="cite_ref-69"><a data-dcnode-id="8266" href="#cite_note-69"><span data-dcnode-id="8267" instrument_node="">[69]</span></a></sup><span data-dcnode-id="8264" instrument_node="">
Since 1900, the consensus of Democrats had, according to Arthur Link:
</span></p><span data-dcnode-id="8262" instrument_node="">
</span><dl data-dcnode-id="8256"><dd data-dcnode-id="8257"><span data-dcnode-id="8261" instrument_node="">consistently condemned militarism, imperialism, and interventionism in foreign policy. They instead advocated world involvement along liberal-internationalist lines. Wilson's appointment of William Jennings Bryan as Secretary of State indicated a new departure, for Bryan had long been the leading opponent of imperialism and militarism and a pioneer in the world peace movement.</span><sup class="reference" data-dcnode-id="8258" id="cite_ref-70"><a data-dcnode-id="8259" href="#cite_note-70"><span data-dcnode-id="8260" instrument_node="">[70]</span></a></sup></dd></dl><span data-dcnode-id="8255" instrument_node="">
</span><p data-dcnode-id="8243"><span data-dcnode-id="8254" instrument_node="">The United States </span><a data-dcnode-id="8252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Banana_Wars" title="Banana Wars"><span data-dcnode-id="8253" instrument_node="">intervened militarily</span></a><span data-dcnode-id="8251" instrument_node=""> in many </span><a data-dcnode-id="8249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latin_America" title="Latin America"><span data-dcnode-id="8250" instrument_node="">Latin American</span></a><span data-dcnode-id="8248" instrument_node=""> nations to stabilize the governments, impose democracy, and protect commerce. In the case of Mexico it was a response to attacks on Americans. Wilson landed U.S. troops in Mexico in 1914; in Haiti in 1915; in the Dominican Republic in 1916; in Mexico several additional times; in Cuba in 1917; and in Panama in 1918. Also, for most of the Wilson administration, the U.S. military occupied Nicaragua, installing an honest president.</span><sup class="reference" data-dcnode-id="8245" id="cite_ref-71"><a data-dcnode-id="8246" href="#cite_note-71"><span data-dcnode-id="8247" instrument_node="">[71]</span></a></sup><span data-dcnode-id="8244" instrument_node="">
</span></p><p data-dcnode-id="8210"><span data-dcnode-id="8242" instrument_node="">With the outbreak of war in 1914, the United States declared neutrality and worked to broker a peace. It insisted on its neutral rights, which included allowing private corporations and banks to sell or loan money to either side. With the British blockade, there were almost no sales or loans to Germany, only to the </span><a data-dcnode-id="8240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allies_of_World_War_I" title="Allies of World War I"><span data-dcnode-id="8241" instrument_node="">Allies</span></a><span data-dcnode-id="8239" instrument_node="">. The widely publicized atrocities in Germany shocked American public opinion. Neutrality was supported by Irish-Americans, who hated Britain, by German Americans who wanted to remain neutral, and by women and the churches. It was supported by the more educated upscale </span><a data-dcnode-id="8237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_Anglo-Saxon_Protestants" title="White Anglo-Saxon Protestants"><span data-dcnode-id="8238" instrument_node="">WASP</span></a><span data-dcnode-id="8236" instrument_node=""> element, led by Theodore Roosevelt. Wilson insisted on neutrality, denouncing both British and German violations, especially those German violations in which American civilians were killed. The German U-boat torpedoed the </span><a data-dcnode-id="8232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/RMS_Lusitania" title="RMS Lusitania"><span data-dcnode-id="8235" instrument_node="">RMS </span><i data-dcnode-id="8233"><span data-dcnode-id="8234" instrument_node="">Lusitania</span></i></a><span data-dcnode-id="8231" instrument_node=""> in 1915. It sank in 20 minutes, killing 128 American civilians and over 1,000 Britons. It was against the laws of war to sink any passenger ship without allowing the passengers to reach the life boats. American opinion turned strongly against Germany as a bloodthirsty threat to civilization.</span><sup class="reference" data-dcnode-id="8228" id="cite_ref-72"><a data-dcnode-id="8229" href="#cite_note-72"><span data-dcnode-id="8230" instrument_node="">[72]</span></a></sup><span data-dcnode-id="8227" instrument_node=""> Germany apologized and repeatedly promised to stop attacks by its </span><a data-dcnode-id="8225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U-boat" title="U-boat"><span data-dcnode-id="8226" instrument_node="">U-boats</span></a><span data-dcnode-id="8224" instrument_node="">, but reversed course in early 1917 when it saw the opportunity to strangle Britain by unrestricted submarine warfare. It also made overtures to Mexico, in the </span><a data-dcnode-id="8222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zimmermann_Telegram" title="Zimmermann Telegram"><span data-dcnode-id="8223" instrument_node="">Zimmermann Telegram</span></a><span data-dcnode-id="8221" instrument_node="">, hoping to divert American military attention to south of the border. The German decision was not made or approved by the civilian government in Berlin, but by the military commanders and the Kaiser. They realized it meant war with the United States, but hoped to weaken the British by cutting off its imports, and strike a winning blow with German soldiers transferred from the Eastern front, where Russia had surrendered. Following the repeated sinking of American merchant ships in early 1917, Wilson asked Congress and obtained a declaration of war in April 1917. He neutralized the antiwar element by arguing this was a war with the main goal of ending aggressive militarism and indeed ending all wars. During the war the U.S. was not officially tied to the Allies by treaty, but military cooperation meant that the American contribution became significant in mid-1918. After the failure of the German spring offensive, as fresh American troops arrived in France at 10,000 a day, the Germans were in a hopeless position, and thus surrendered. Coupled with Wilson's </span><a data-dcnode-id="8219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fourteen_Points" title="Fourteen Points"><span data-dcnode-id="8220" instrument_node="">Fourteen Points</span></a><span data-dcnode-id="8218" instrument_node=""> in January 1918, the U.S. now had the initiative on the military, diplomatic and public relations fronts. </span><a data-dcnode-id="8216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wilsonianism" title="Wilsonianism"><span data-dcnode-id="8217" instrument_node="">Wilsonianism</span></a><span data-dcnode-id="8215" instrument_node="">—Wilson's ideals—had become the hope of the world, including the civilian population Germany itself.</span><sup class="reference" data-dcnode-id="8212" id="cite_ref-73"><a data-dcnode-id="8213" href="#cite_note-73"><span data-dcnode-id="8214" instrument_node="">[73]</span></a></sup><span data-dcnode-id="8211" instrument_node="">
</span></p><span data-dcnode-id="8209" instrument_node="">
</span><h3 data-dcnode-id="8199"><span class="mw-headline" data-dcnode-id="8207" id="Involvement_in_Russia"><span data-dcnode-id="8208" instrument_node="">Involvement in Russia</span></span><span class="mw-editsection" data-dcnode-id="8200"><span class="mw-editsection-bracket" data-dcnode-id="8205"><span data-dcnode-id="8206" instrument_node="">[</span></span><a data-dcnode-id="8203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D22" title="Edit section: Involvement in Russia"><span data-dcnode-id="8204" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8201"><span data-dcnode-id="8202" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8198" instrument_node="">
</span><link data-dcnode-id="8197" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8193" role="note"><span data-dcnode-id="8196" instrument_node="">Main article: </span><a data-dcnode-id="8194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_intervention_in_the_Russian_Civil_War" title="Allied intervention in the Russian Civil War"><span data-dcnode-id="8195" instrument_node="">Allied intervention in the Russian Civil War</span></a></div><span data-dcnode-id="8192" instrument_node="">
</span><p data-dcnode-id="8163"><span data-dcnode-id="8191" instrument_node="">The U.S. joined with several Allies to intervene in </span><a data-dcnode-id="8189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Civil_War" title="Russian Civil War"><span data-dcnode-id="8190" instrument_node="">Russia</span></a><span data-dcnode-id="8188" instrument_node=""> in 1918-1919. The U.S. military was strongly opposed, but President Wilson reluctantly ordered the action. The British had taken the lead and were emphatically urging American help. Wilson feared that if he said no he would undermine his primary goal of creating a League of Nations with full British support.</span><sup class="reference" data-dcnode-id="8185" id="cite_ref-74"><a data-dcnode-id="8186" href="#cite_note-74"><span data-dcnode-id="8187" instrument_node="">[74]</span></a></sup><span data-dcnode-id="8184" instrument_node=""> The main British goals were to help the </span><a data-dcnode-id="8182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Czechoslovak_Legion" title="Czechoslovak Legion"><span data-dcnode-id="8183" instrument_node="">Czechoslovak Legion</span></a><span data-dcnode-id="8181" instrument_node=""> re-establish the </span><a data-dcnode-id="8179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Front_%28World_War_I%29" title="Eastern Front (World War I)"><span data-dcnode-id="8180" instrument_node="">Eastern Front</span></a><span data-dcnode-id="8178" instrument_node="">. At times between 1918 and 1920 the Czechoslovak Legion controlled the entire </span><a data-dcnode-id="8176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trans-Siberian_Railway" title="Trans-Siberian Railway"><span data-dcnode-id="8177" instrument_node="">Trans-Siberian Railway</span></a><span data-dcnode-id="8175" instrument_node=""> and several major cities in Siberia. American Marines and sailors were deployed to Vladivostok and Murmansk from April 1918 to December 1919. The main American mission was to guard large munitions dumps. Americans also served alongside Japanese soldiers in Vladivostok in far eastern Siberia from 1918 to 1920. They were involved in little fighting; most of the losses came from disease and cold.</span><sup class="reference" data-dcnode-id="8172" id="cite_ref-75"><a data-dcnode-id="8173" href="#cite_note-75"><span data-dcnode-id="8174" instrument_node="">[75]</span></a></sup><sup class="reference" data-dcnode-id="8169" id="cite_ref-76"><a data-dcnode-id="8170" href="#cite_note-76"><span data-dcnode-id="8171" instrument_node="">[76]</span></a></sup><span data-dcnode-id="8168" instrument_node=""> The U.S. and Allied powers ended operations by early 1920, though Japan continued until 1922. For Soviet Communists, the operation was proof that Western powers were keen to destroy the Soviet government if they had the opportunity to do so.</span><sup class="reference" data-dcnode-id="8165" id="cite_ref-77"><a data-dcnode-id="8166" href="#cite_note-77"><span data-dcnode-id="8167" instrument_node="">[77]</span></a></sup><span data-dcnode-id="8164" instrument_node="">
</span></p><span data-dcnode-id="8162" instrument_node="">
</span><h3 data-dcnode-id="8152"><span class="mw-headline" data-dcnode-id="8160" id="Winning_the_war_and_fighting_for_peace"><span data-dcnode-id="8161" instrument_node="">Winning the war and fighting for peace</span></span><span class="mw-editsection" data-dcnode-id="8153"><span class="mw-editsection-bracket" data-dcnode-id="8158"><span data-dcnode-id="8159" instrument_node="">[</span></span><a data-dcnode-id="8156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D23" title="Edit section: Winning the war and fighting for peace"><span data-dcnode-id="8157" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8154"><span data-dcnode-id="8155" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8151" instrument_node="">
