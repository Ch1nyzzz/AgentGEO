</span></p><p data-dcnode-id="6657"><span data-dcnode-id="6668" instrument_node="">There were also major arms sales to build up allies as well. The most notable came in 1981, a $8.5 billion sale to Saudi Arabia involving aircraft, tanks, and Airborne Warning and Control Systems (AWACS). Israel protested, since the AWACS would undermine its strategic attack capabilities. To mollify Israel and its powerful </span><a data-dcnode-id="6666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel_lobby_in_the_United_States" title="Israel lobby in the United States"><span data-dcnode-id="6667" instrument_node="">lobby in Washington</span></a><span data-dcnode-id="6665" instrument_node="">, the United States promised to supply it with an additional F-15 squadron, a $600 million loan, and permission to export Israeli-made Kfir fighting aircraft to Latin American armies.</span><sup class="reference" data-dcnode-id="6662" id="cite_ref-172"><a data-dcnode-id="6663" href="#cite_note-172"><span data-dcnode-id="6664" instrument_node="">[172]</span></a></sup><sup class="reference" data-dcnode-id="6659" id="cite_ref-173"><a data-dcnode-id="6660" href="#cite_note-173"><span data-dcnode-id="6661" instrument_node="">[173]</span></a></sup><span data-dcnode-id="6658" instrument_node="">
</span></p><p data-dcnode-id="6631"><span data-dcnode-id="6656" instrument_node="">In its first term administration looked at arms control measures with deep suspicion. However, after the massive buildup, and the second term it looked at them with favor and achieve major arms reductions with </span><a data-dcnode-id="6654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="6655" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="6653" instrument_node="">.</span><sup class="reference" data-dcnode-id="6650" id="cite_ref-174"><a data-dcnode-id="6651" href="#cite_note-174"><span data-dcnode-id="6652" instrument_node="">[174]</span></a></sup><span data-dcnode-id="6649" instrument_node=""> It was possible because the sclerotic Soviet leadership died out, and finally in 1985 </span><a data-dcnode-id="6647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="6648" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="6646" instrument_node=""> came to power with a commitment to salvage communism in the Soviet Union. He negotiated a series of compromises with Reagan, that weakened Soviet power. In 1989, all the East European satellites revolted in overthrew Moscow's control. West Germany took over East Germany. In 1991, Russia overthrew communism, and at the end of the year Gorbachev lost power and the Soviet Union was dissolved. The United States and NATO had won the Cold War, leaving the United States the world's only superpower.</span><sup class="reference" data-dcnode-id="6643" id="cite_ref-175"><a data-dcnode-id="6644" href="#cite_note-175"><span data-dcnode-id="6645" instrument_node="">[175]</span></a></sup><span data-dcnode-id="6642" instrument_node=""> Reagan had a vision for restoring American power, and defeating the Soviet enemy, and it all came true shortly after he left office. However, he was highly inattentive to details and let his senior staff, and sometimes his junior staff, make the presidential-level decisions. Putting all together, historians and presidential scholars have Reagan high marks in foreign policy. In 2017 a </span><a data-dcnode-id="6640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/C-SPAN" title="C-SPAN"><span data-dcnode-id="6641" instrument_node="">C-SPAN</span></a><span data-dcnode-id="6639" instrument_node=""> survey of scholars – most of whom opposed his specific policies—ranked Reagan in terms of leadership in comparison with all 42 presidents. He ranked number nine in international relations.</span><sup class="reference" data-dcnode-id="6636" id="cite_ref-176"><a data-dcnode-id="6637" href="#cite_note-176"><span data-dcnode-id="6638" instrument_node="">[176]</span></a></sup><sup class="reference" data-dcnode-id="6633" id="cite_ref-177"><a data-dcnode-id="6634" href="#cite_note-177"><span data-dcnode-id="6635" instrument_node="">[177]</span></a></sup><span data-dcnode-id="6632" instrument_node="">
</span></p><span data-dcnode-id="6630" instrument_node="">
</span><h3 data-dcnode-id="6619"><span data-dcnode-id="6629" id="George_H._W._Bush_1989.E2.80.931993"></span><span class="mw-headline" data-dcnode-id="6627" id="George_H._W._Bush_1989–1993"><span data-dcnode-id="6628" instrument_node="">George H. W. Bush 1989–1993</span></span><span class="mw-editsection" data-dcnode-id="6620"><span class="mw-editsection-bracket" data-dcnode-id="6625"><span data-dcnode-id="6626" instrument_node="">[</span></span><a data-dcnode-id="6623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D48" title="Edit section: George H. W. Bush 1989–1993"><span data-dcnode-id="6624" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6621"><span data-dcnode-id="6622" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6618" instrument_node="">
</span><link data-dcnode-id="6617" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6613" role="note"><span data-dcnode-id="6616" instrument_node="">Main article: </span><a data-dcnode-id="6614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_George_H._W._Bush_administration" title="Foreign policy of the George H. W. Bush administration"><span data-dcnode-id="6615" instrument_node="">Foreign policy of the George H. W. Bush administration</span></a></div><span data-dcnode-id="6612" instrument_node="">
</span><p data-dcnode-id="6610"><span data-dcnode-id="6611" instrument_node="">Unlike Reagan, Bush downplayed vision and emphasized caution and careful management. His main foreign policy advisors were Secretaries of State James Baker and Lawrence Eagleburger, and National Security Advisor Brent Scowcroft. Bush entered the White House with a long and successful portfolio in foreign affairs including ambassadorial roles to China in the United Nations, director of the CIA, and official visits to 65 foreign countries as vice president. Momentous geopolitical events that occurred during Bush's presidency include:
</span></p><p data-dcnode-id="6598"><span data-dcnode-id="6609" instrument_node="">Momentous geopolitical events that occurred during Bush's presidency include:</span><sup class="reference" data-dcnode-id="6606" id="cite_ref-178"><a data-dcnode-id="6607" href="#cite_note-178"><span data-dcnode-id="6608" instrument_node="">[178]</span></a></sup><sup class="reference" data-dcnode-id="6603" id="cite_ref-179"><a data-dcnode-id="6604" href="#cite_note-179"><span data-dcnode-id="6605" instrument_node="">[179]</span></a></sup><sup class="reference" data-dcnode-id="6600" id="cite_ref-180"><a data-dcnode-id="6601" href="#cite_note-180"><span data-dcnode-id="6602" instrument_node="">[180]</span></a></sup><span data-dcnode-id="6599" instrument_node="">
</span></p><span data-dcnode-id="6597" instrument_node="">
</span><ul data-dcnode-id="6548"><li data-dcnode-id="6592"><span data-dcnode-id="6596" instrument_node="">The </span><a data-dcnode-id="6594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1989_Tiananmen_Square_protests_and_massacre" title="1989 Tiananmen Square protests and massacre"><span data-dcnode-id="6595" instrument_node="">crushing in June 1989 of the Tiananmen Square protests in China</span></a><span data-dcnode-id="6593" instrument_node="">, which was widely condemned in the United States and around the world.</span></li><span data-dcnode-id="6591" instrument_node="">
</span><li data-dcnode-id="6586"><span data-dcnode-id="6590" instrument_node="">The </span><a data-dcnode-id="6588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_invasion_of_Panama" title="United States invasion of Panama"><span data-dcnode-id="6589" instrument_node="">United States invasion of Panama</span></a><span data-dcnode-id="6587" instrument_node=""> in December 1989 to overthrow a local dictator.</span></li><span data-dcnode-id="6585" instrument_node="">
</span><li data-dcnode-id="6577"><span data-dcnode-id="6584" instrument_node="">The signing with the USSR of the </span><a data-dcnode-id="6582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/START_I" title="START I"><span data-dcnode-id="6583" instrument_node="">START I</span></a><span data-dcnode-id="6581" instrument_node=""> and </span><a data-dcnode-id="6579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/START_II" title="START II"><span data-dcnode-id="6580" instrument_node="">START II</span></a><span data-dcnode-id="6578" instrument_node=""> treaties for nuclear disarmament.</span></li><span data-dcnode-id="6576" instrument_node="">
</span><li data-dcnode-id="6571"><span data-dcnode-id="6575" instrument_node="">The </span><a data-dcnode-id="6573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulf_War" title="Gulf War"><span data-dcnode-id="6574" instrument_node="">Gulf War</span></a><span data-dcnode-id="6572" instrument_node=""> in 1991, in which Bush led a large coalition that defeated Iraq when it invaded Kuwait.</span></li><span data-dcnode-id="6570" instrument_node="">
</span><li data-dcnode-id="6565"><span data-dcnode-id="6569" instrument_node="">Victory in the </span><a data-dcnode-id="6567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="6568" instrument_node="">Cold War</span></a><span data-dcnode-id="6566" instrument_node=""> over Soviet communism.</span></li><span data-dcnode-id="6564" instrument_node="">
</span><li data-dcnode-id="6560"><a data-dcnode-id="6562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revolutions_of_1989" title="Revolutions of 1989"><span data-dcnode-id="6563" instrument_node="">Revolutions of 1989</span></a><span data-dcnode-id="6561" instrument_node=""> and the collapse of Communism, especially in Eastern Europe</span></li><span data-dcnode-id="6559" instrument_node="">
</span><li data-dcnode-id="6555"><a data-dcnode-id="6557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_reunification" title="German reunification"><span data-dcnode-id="6558" instrument_node="">German reunification</span></a><span data-dcnode-id="6556" instrument_node=""> in 1990, with the democratic West absorbing the ex-Communist East.</span></li><span data-dcnode-id="6554" instrument_node="">
</span><li data-dcnode-id="6549"><span data-dcnode-id="6553" instrument_node="">The </span><a data-dcnode-id="6551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="6552" instrument_node="">dissolution of the Soviet Union</span></a><span data-dcnode-id="6550" instrument_node=""> in 1991, replaced by a friendly Russia and 14 other countries.</span></li></ul><span data-dcnode-id="6547" instrument_node="">
</span><p data-dcnode-id="6541"><span data-dcnode-id="6546" instrument_node="">Except for the 1989 Tiananmen Square protests and massacre in China, all the events strongly favored the United States. Bush took the initiative in the invasion of Panama and the START treaties. Otherwise, he was mostly a passive observer trying not to interfere or gloat about the events. Given the favorable outcomes, scholars generally give Bush high marks in foreign policy, except for his unwillingness to condemn the Tiananmen Square crackdown. He thought long-term favorable relations with China were too important to jeopardize.</span><sup class="reference" data-dcnode-id="6543" id="cite_ref-181"><a data-dcnode-id="6544" href="#cite_note-181"><span data-dcnode-id="6545" instrument_node="">[181]</span></a></sup><span data-dcnode-id="6542" instrument_node="">
</span></p><span data-dcnode-id="6540" instrument_node="">
</span><h2 data-dcnode-id="6529"><span data-dcnode-id="6539" id="Post-Cold_War:_1992.E2.80.93present"></span><span class="mw-headline" data-dcnode-id="6537" id="Post-Cold_War:_1992–present"><span data-dcnode-id="6538" instrument_node="">Post-Cold War: 1992–present</span></span><span class="mw-editsection" data-dcnode-id="6530"><span class="mw-editsection-bracket" data-dcnode-id="6535"><span data-dcnode-id="6536" instrument_node="">[</span></span><a data-dcnode-id="6533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D49" title="Edit section: Post-Cold War: 1992–present"><span data-dcnode-id="6534" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6531"><span data-dcnode-id="6532" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6528" instrument_node="">
</span><link data-dcnode-id="6527" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6511" role="note"><span data-dcnode-id="6526" instrument_node="">Further information: </span><a data-dcnode-id="6524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Bill_Clinton_administration" title="Foreign policy of the Bill Clinton administration"><span data-dcnode-id="6525" instrument_node="">Foreign policy of the Bill Clinton administration</span></a><span data-dcnode-id="6523" instrument_node="">, </span><a data-dcnode-id="6521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_George_W._Bush_administration" title="Foreign policy of the George W. Bush administration"><span data-dcnode-id="6522" instrument_node="">Foreign policy of the George W. Bush administration</span></a><span data-dcnode-id="6520" instrument_node="">, </span><a data-dcnode-id="6518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Barack_Obama_administration" title="Foreign policy of the Barack Obama administration"><span data-dcnode-id="6519" instrument_node="">Foreign policy of the Barack Obama administration</span></a><span data-dcnode-id="6517" instrument_node="">, </span><a data-dcnode-id="6515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Donald_Trump_administration" title="Foreign policy of the Donald Trump administration"><span data-dcnode-id="6516" instrument_node="">Foreign policy of the Donald Trump administration</span></a><span data-dcnode-id="6514" instrument_node="">, and </span><a data-dcnode-id="6512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Joe_Biden_administration" title="Foreign policy of the Joe Biden administration"><span data-dcnode-id="6513" instrument_node="">Foreign policy of the Joe Biden administration</span></a></div><span data-dcnode-id="6510" instrument_node="">
</span><h3 data-dcnode-id="6500"><span class="mw-headline" data-dcnode-id="6508" id="Favorable_world_scene"><span data-dcnode-id="6509" instrument_node="">Favorable world scene</span></span><span class="mw-editsection" data-dcnode-id="6501"><span class="mw-editsection-bracket" data-dcnode-id="6506"><span data-dcnode-id="6507" instrument_node="">[</span></span><a data-dcnode-id="6504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D50" title="Edit section: Favorable world scene"><span data-dcnode-id="6505" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6502"><span data-dcnode-id="6503" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6499" instrument_node="">
</span><p data-dcnode-id="6493"><span data-dcnode-id="6498" instrument_node="">For the first time since the mid-1930s the international scene was highly favorable.</span><sup class="reference" data-dcnode-id="6495" id="cite_ref-182"><a data-dcnode-id="6496" href="#cite_note-182"><span data-dcnode-id="6497" instrument_node="">[182]</span></a></sup><span data-dcnode-id="6494" instrument_node=""> Old enemies had collapsed with the fall of Communism and the Soviet Union. Other problems seemed far less pressing and President Bill Clinton, with little expertise in foreign affairs, was eager to concentrate his attention on domestic issues. as Walter B. Slocombe argues:
</span></p><span data-dcnode-id="6492" instrument_node="">
</span><dl data-dcnode-id="6486"><dd data-dcnode-id="6487"><span data-dcnode-id="6491" instrument_node="">Germany...had been reunified peacefully and its partners in the European Union were moving toward economic integration with political integration a long-term, but now less implausible, prospect. The former Warsaw Pact satellites were on the way to stable democracy and market prosperity. North and South Korea had agreed on a process of denuclearization. China seemed absorbed in its internal development, having cast off revolutionary zeal in exchange for growth (and continued regime control) under market principles....Iraq was humbled by recent defeat in the Gulf War and under pervasive international surveillance and supervision. Apartheid was ending in South Africa, and peacefully so. Most of Latin America was emerging from rule by juntas and coups to democratic order. Taiwan and South Korea had cast off authoritarian regimes while remaining strong friends of the United States. Even in the Middle East, the Madrid agreements appeared to open the path to resolution of the Israel-Palestine problem.</span><sup class="reference" data-dcnode-id="6488" id="cite_ref-183"><a data-dcnode-id="6489" href="#cite_note-183"><span data-dcnode-id="6490" instrument_node="">[183]</span></a></sup></dd></dl><span data-dcnode-id="6485" instrument_node="">
</span><p data-dcnode-id="6483"><span data-dcnode-id="6484" instrument_node="">Less attention was being paid to the remaining minor trouble spots, as Slocombe lists them:
</span></p><span data-dcnode-id="6482" instrument_node="">
</span><dl data-dcnode-id="6476"><dd data-dcnode-id="6477"><span data-dcnode-id="6481" instrument_node="">Iran, Haiti, the wreckage of Yugoslavia, the seemingly endless tragedy of Africa exemplified by the chaos in Somalia, and even Northern Ireland, as well as nontraditional security challenges ranging from environmental degradation to terrorism.</span><sup class="reference" data-dcnode-id="6478" id="cite_ref-184"><a data-dcnode-id="6479" href="#cite_note-184"><span data-dcnode-id="6480" instrument_node="">[184]</span></a></sup></dd></dl><span data-dcnode-id="6475" instrument_node="">
</span><p data-dcnode-id="6458"><span data-dcnode-id="6474" instrument_node="">After the successful </span><a data-dcnode-id="6472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulf_War" title="Gulf War"><span data-dcnode-id="6473" instrument_node="">Gulf War</span></a><span data-dcnode-id="6471" instrument_node=""> of 1991, many scholars, such as </span><a data-dcnode-id="6469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zbigniew_Brzezinski" title="Zbigniew Brzezinski"><span data-dcnode-id="6470" instrument_node="">Zbigniew Brzezinski</span></a><span data-dcnode-id="6468" instrument_node="">, claimed the lack of a new strategic vision for U.S. foreign policy resulted in many missed opportunities for its foreign policy. During the 1990s, the United States mostly scaled back its foreign policy budget as well as its cold war defense budget which amounted to 6.5% of GDP while focusing on domestic economic prosperity under President </span><a data-dcnode-id="6466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bill_Clinton" title="Bill Clinton"><span data-dcnode-id="6467" instrument_node="">Clinton</span></a><span data-dcnode-id="6465" instrument_node="">, who succeeded in achieving a budget surplus for 1999 and 2000. The United States also served as a peacekeeper in the warring ethnic disputes in the former </span><a data-dcnode-id="6463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslavia" title="Yugoslavia"><span data-dcnode-id="6464" instrument_node="">Yugoslavia</span></a><span data-dcnode-id="6462" instrument_node=""> by cooperating as a </span><a data-dcnode-id="6460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_peacekeeping" title="United Nations peacekeeping"><span data-dcnode-id="6461" instrument_node="">U.N. peacekeeper</span></a><span data-dcnode-id="6459" instrument_node="">.
</span></p><p data-dcnode-id="6446"><span data-dcnode-id="6457" instrument_node="">Historians agree that foreign policy was not a high priority for </span><a data-dcnode-id="6455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Bill_Clinton_administration" title="Foreign policy of the Bill Clinton administration"><span data-dcnode-id="6456" instrument_node="">the Clinton administration (1993-2000)</span></a><span data-dcnode-id="6454" instrument_node="">. However Harvard Professor </span><a data-dcnode-id="6452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Walt" title="Stephen Walt"><span data-dcnode-id="6453" instrument_node="">Stephen Walt</span></a><span data-dcnode-id="6451" instrument_node=""> does give it "two cheers":</span><sup class="reference" data-dcnode-id="6448" id="cite_ref-185"><a data-dcnode-id="6449" href="#cite_note-185"><span data-dcnode-id="6450" instrument_node="">[185]</span></a></sup><span data-dcnode-id="6447" instrument_node="">
</span></p><span data-dcnode-id="6445" instrument_node="">
</span><blockquote data-dcnode-id="6442"><p data-dcnode-id="6443"><span data-dcnode-id="6444" instrument_node=""> Under Clinton, the United States consolidated its Cold War victory by bringing three former Warsaw Pact members into its own alliance. It shored up its alliances in East Asia
and readied itself for a possible competition with a rising China while encouraging Beijing to accept a status quo that favored the United States....It forced its allies to bear a greater share of the burden in Europe and East Asia while insisting on leading both alliances. And together with its NATO allies, it asserted the right to intervene in the sovereign territory of other states, even without Security Council authorization. Clinton may cloak U.S. policy in the rhetoric of "world order" and general global interests, but its defining essence remains the unilateral exercise of sovereign power.</span></p></blockquote><span data-dcnode-id="6441" instrument_node="">
</span><h3 data-dcnode-id="6431"><span class="mw-headline" data-dcnode-id="6439" id="Global_war_on_terrorism"><span data-dcnode-id="6440" instrument_node="">Global war on terrorism</span></span><span class="mw-editsection" data-dcnode-id="6432"><span class="mw-editsection-bracket" data-dcnode-id="6437"><span data-dcnode-id="6438" instrument_node="">[</span></span><a data-dcnode-id="6435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D51" title="Edit section: Global war on terrorism"><span data-dcnode-id="6436" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6433"><span data-dcnode-id="6434" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6430" instrument_node="">
</span><p data-dcnode-id="6390"><span data-dcnode-id="6429" instrument_node="">A decade of economic prosperity ended with the September 11, 2001 attacks on the </span><a data-dcnode-id="6427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Trade_Center_%281973%25E2%2580%25932001%29" title="World Trade Center (1973–2001)"><span data-dcnode-id="6428" instrument_node="">World Trade Center</span></a><span data-dcnode-id="6426" instrument_node=""> in New York City. The surprise attack by terrorists belonging to a militant </span><a data-dcnode-id="6424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al-Qaeda" title="Al-Qaeda"><span data-dcnode-id="6425" instrument_node="">Al-Qaeda</span></a><span data-dcnode-id="6423" instrument_node=""> organization prompted a national mourning and paradigm shift in U.S. foreign policy. The focus on domestic prosperity during the 1990s gave way to a trend of </span><a data-dcnode-id="6421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unilateralism" title="Unilateralism"><span data-dcnode-id="6422" instrument_node="">unilateral action</span></a><span data-dcnode-id="6420" instrument_node=""> under President </span><a data-dcnode-id="6418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="6419" instrument_node="">George W. Bush</span></a><span data-dcnode-id="6417" instrument_node=""> to combat what was seen to be the growing trend of fundamentalist </span><a data-dcnode-id="6415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrorism" title="Terrorism"><span data-dcnode-id="6416" instrument_node="">terrorism</span></a><span data-dcnode-id="6414" instrument_node=""> in the Middle East. The United States declared a </span><i data-dcnode-id="6411"><a data-dcnode-id="6412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_on_terror" title="War on terror"><span data-dcnode-id="6413" instrument_node="">War on Terrorism</span></a></i><span data-dcnode-id="6410" instrument_node="">. This policy dominated U.S. foreign policy over the last decade as the nation embarked on two military campaigns in the Middle East, in </span><a data-dcnode-id="6408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afghanistan" title="Afghanistan"><span data-dcnode-id="6409" instrument_node="">Afghanistan</span></a><span data-dcnode-id="6407" instrument_node=""> and </span><a data-dcnode-id="6405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraq" title="Iraq"><span data-dcnode-id="6406" instrument_node="">Iraq</span></a><span data-dcnode-id="6404" instrument_node="">. Although both campaigns attracted international support, particularly the fighting in Afghanistan, the scale and duration of the war has lessened the motivation of American allies. Furthermore, when no </span><a data-dcnode-id="6402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Weapon_of_mass_destruction" title="Weapon of mass destruction"><span data-dcnode-id="6403" instrument_node="">WMDs</span></a><span data-dcnode-id="6401" instrument_node=""> were found after a military conquest of Iraq, there was worldwide skepticism that the war had been fought to prevent terrorism, and the </span><a data-dcnode-id="6399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraq_War" title="Iraq War"><span data-dcnode-id="6400" instrument_node="">war in Iraq</span></a><span data-dcnode-id="6398" instrument_node=""> has had serious negative public relations consequences for the image of the United States. The "</span><a data-dcnode-id="6396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bush_Doctrine" title="Bush Doctrine"><span data-dcnode-id="6397" instrument_node="">Bush Doctrine</span></a><span data-dcnode-id="6395" instrument_node="">" shifted diplomatic and security policy toward maximizing the spread of liberal political institutions and democratic values. The policy has been called "democratic realism," "national security liberalism," "democratic globalism," or "messianic universalism." The policy helped inspire democratic upheavals in the Middle East.</span><sup class="reference" data-dcnode-id="6392" id="cite_ref-186"><a data-dcnode-id="6393" href="#cite_note-186"><span data-dcnode-id="6394" instrument_node="">[186]</span></a></sup><span data-dcnode-id="6391" instrument_node="">
</span></p><span data-dcnode-id="6389" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6375"><div class="thumbinner" data-dcnode-id="6376" style="width:222px;"><a class="image" data-dcnode-id="6387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMerkelBushWashington1.jpg"><img alt="" class="thumbimage" data-dcnode-id="6388" data-file-height="343" data-file-width="515" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/MerkelBushWashington1.jpg/220px-MerkelBushWashington1.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/MerkelBushWashington1.jpg/330px-MerkelBushWashington1.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/5c/MerkelBushWashington1.jpg/440px-MerkelBushWashington1.jpg 2x" width="220"></a><span data-dcnode-id="6386" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6377"><div class="magnify" data-dcnode-id="6384"><a class="internal" data-dcnode-id="6385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMerkelBushWashington1.jpg" title="Enlarge"></a></div><span data-dcnode-id="6383" instrument_node="">German Chancellor </span><a data-dcnode-id="6381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angela_Merkel" title="Angela Merkel"><span data-dcnode-id="6382" instrument_node="">Angela Merkel</span></a><span data-dcnode-id="6380" instrument_node=""> and U.S. President </span><a data-dcnode-id="6378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="6379" instrument_node="">George W. Bush</span></a></div></div></div><span data-dcnode-id="6374" instrument_node="">
</span><p data-dcnode-id="6366"><span data-dcnode-id="6373" instrument_node="">Across the world there was a transition from a </span><a data-dcnode-id="6371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polarity_%28international_relations%29%23Bipolarity" title="Polarity (international relations)"><span data-dcnode-id="6372" instrument_node="">bipolar</span></a><span data-dcnode-id="6370" instrument_node=""> world to a </span><a data-dcnode-id="6368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polarity_%28international_relations%29%23Multipolarity" title="Polarity (international relations)"><span data-dcnode-id="6369" instrument_node="">multipolar</span></a><span data-dcnode-id="6367" instrument_node=""> world. While the United States remains a strong power economically and militarily, rising nations such as China, India, and Brazil as well as Russia have challenged its dominance. Foreign policy analysts such as Nina Harchigian suggest that the six emerging big powers share common concerns: free trade, economic growth, prevention of terrorism, efforts to stymie nuclear proliferation. And if they can avoid war, the coming decades can be peaceful and productive provided there are no misunderstandings or dangerous rivalries.
</span></p><p data-dcnode-id="6357"><span data-dcnode-id="6365" instrument_node="">In his first formal television interview as president, </span><a data-dcnode-id="6363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barack_Obama" title="Barack Obama"><span data-dcnode-id="6364" instrument_node="">Barack Obama</span></a><span data-dcnode-id="6362" instrument_node=""> addressed the Muslim world through an Arabic-language satellite TV network and expressed a commitment to repair relations that have deteriorated under the previous administration.</span><sup class="reference" data-dcnode-id="6359" id="cite_ref-187"><a data-dcnode-id="6360" href="#cite_note-187"><span data-dcnode-id="6361" instrument_node="">[187]</span></a></sup><span data-dcnode-id="6358" instrument_node=""> Still under the Obama administration, American foreign policy has continued to irritate the Muslim world including one of its main allies, Pakistan.
</span></p><p data-dcnode-id="6326"><span data-dcnode-id="6356" instrument_node="">But serious problems remain for the U.S. The </span><a data-dcnode-id="6354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_East" title="Middle East"><span data-dcnode-id="6355" instrument_node="">Mideast</span></a><span data-dcnode-id="6353" instrument_node=""> continues to fester with religious hatred and </span><a data-dcnode-id="6351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arabs" title="Arabs"><span data-dcnode-id="6352" instrument_node="">Arab</span></a><span data-dcnode-id="6350" instrument_node=""> resentment of </span><a data-dcnode-id="6348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel" title="Israel"><span data-dcnode-id="6349" instrument_node="">Israel</span></a><span data-dcnode-id="6347" instrument_node="">. The U.S. position is that the danger of </span><a data-dcnode-id="6345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_proliferation" title="Nuclear proliferation"><span data-dcnode-id="6346" instrument_node="">nuclear proliferation</span></a><span data-dcnode-id="6344" instrument_node=""> is more evident with nations such as </span><a data-dcnode-id="6342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="6343" instrument_node="">Iran</span></a><span data-dcnode-id="6341" instrument_node=""> and </span><a data-dcnode-id="6339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Korea" title="North Korea"><span data-dcnode-id="6340" instrument_node="">North Korea</span></a><span data-dcnode-id="6338" instrument_node=""> openly flouting the international community by insisting on building nuclear weapons. Important issues such as </span><a data-dcnode-id="6336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change" title="Climate change"><span data-dcnode-id="6337" instrument_node="">climate change</span></a><span data-dcnode-id="6335" instrument_node="">, which require many governments to work together in sometimes tough solutions, present tough diplomatic challenges</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6328" style="white-space:nowrap;"><span data-dcnode-id="6334" instrument_node="">[</span><i data-dcnode-id="6330"><a data-dcnode-id="6331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6332" title="This claim needs references to reliable sources. (August 2019)"><span data-dcnode-id="6333" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6329" instrument_node="">]</span></sup><span data-dcnode-id="6327" instrument_node="">.
</span></p><p data-dcnode-id="6318"><span data-dcnode-id="6325" instrument_node="">An insight into recent thinking inside the State Department was provided in November 2010 and the following months through the </span><a data-dcnode-id="6323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/WikiLeaks" title="WikiLeaks"><span data-dcnode-id="6324" instrument_node="">WikiLeaks</span></a><span data-dcnode-id="6322" instrument_node=""> </span><a data-dcnode-id="6320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_diplomatic_cables_leak" title="United States diplomatic cables leak"><span data-dcnode-id="6321" instrument_node="">United States diplomatic cables release</span></a><span data-dcnode-id="6319" instrument_node="">.
</span></p><span data-dcnode-id="6317" instrument_node="">
</span><h3 data-dcnode-id="6307"><span class="mw-headline" data-dcnode-id="6315" id="New_directions_under_President_Trump"><span data-dcnode-id="6316" instrument_node="">New directions under President Trump</span></span><span class="mw-editsection" data-dcnode-id="6308"><span class="mw-editsection-bracket" data-dcnode-id="6313"><span data-dcnode-id="6314" instrument_node="">[</span></span><a data-dcnode-id="6311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D52" title="Edit section: New directions under President Trump"><span data-dcnode-id="6312" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6309"><span data-dcnode-id="6310" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6306" instrument_node="">
</span><p data-dcnode-id="6288"><span data-dcnode-id="6305" instrument_node="">President </span><a data-dcnode-id="6303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="6304" instrument_node="">Donald Trump</span></a><span data-dcnode-id="6302" instrument_node="">'s first Secretary of State was </span><a data-dcnode-id="6300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rex_Tillerson" title="Rex Tillerson"><span data-dcnode-id="6301" instrument_node="">Rex Tillerson</span></a><span data-dcnode-id="6299" instrument_node="">. a nonpolitical corporate executive who disagreed with Trump on many policy issues, and had the reputation of a very poor manager of the State Department. He was largely ignored by the White House and Trump later fired him. Trump named CIA Director </span><a data-dcnode-id="6297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mike_Pompeo" title="Mike Pompeo"><span data-dcnode-id="6298" instrument_node="">Mike Pompeo</span></a><span data-dcnode-id="6296" instrument_node=""> as his replacement who took office in April 2018.</span><sup class="reference" data-dcnode-id="6293" id="cite_ref-SecState1_188-0"><a data-dcnode-id="6294" href="#cite_note-SecState1-188"><span data-dcnode-id="6295" instrument_node="">[188]</span></a></sup><sup class="reference" data-dcnode-id="6290" id="cite_ref-189"><a data-dcnode-id="6291" href="#cite_note-189"><span data-dcnode-id="6292" instrument_node="">[189]</span></a></sup><span data-dcnode-id="6289" instrument_node="">
</span></p><span data-dcnode-id="6287" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6275"><div class="thumbinner" data-dcnode-id="6276" style="width:222px;"><a class="image" data-dcnode-id="6285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASecretary_Pompeo_Meets_with_Saudi_Crown_Prince_Mohammed_bin_Salman_%2830421982117%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="6286" data-file-height="3635" data-file-width="5452" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Secretary_Pompeo_Meets_with_Saudi_Crown_Prince_Mohammed_bin_Salman_%252830421982117%2529.jpg/220px-Secretary_Pompeo_Meets_with_Saudi_Crown_Prince_Mohammed_bin_Salman_%252830421982117%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Secretary_Pompeo_Meets_with_Saudi_Crown_Prince_Mohammed_bin_Salman_%2830421982117%29.jpg/330px-Secretary_Pompeo_Meets_with_Saudi_Crown_Prince_Mohammed_bin_Salman_%2830421982117%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Secretary_Pompeo_Meets_with_Saudi_Crown_Prince_Mohammed_bin_Salman_%2830421982117%29.jpg/440px-Secretary_Pompeo_Meets_with_Saudi_Crown_Prince_Mohammed_bin_Salman_%2830421982117%29.jpg 2x" width="220"></a><span data-dcnode-id="6284" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6277"><div class="magnify" data-dcnode-id="6282"><a class="internal" data-dcnode-id="6283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASecretary_Pompeo_Meets_with_Saudi_Crown_Prince_Mohammed_bin_Salman_%2830421982117%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="6281" instrument_node="">Pompeo meeting with Crown Prince </span><a data-dcnode-id="6279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mohammed_bin_Salman" title="Mohammed bin Salman"><span data-dcnode-id="6280" instrument_node="">Mohammad bin Salman</span></a><span data-dcnode-id="6278" instrument_node="">, The dominant figure in Saudi Arabia and a key American ally in the Middle East</span></div></div></div><span data-dcnode-id="6274" instrument_node="">
</span><p data-dcnode-id="6241"><span data-dcnode-id="6273" instrument_node="">Trumps foreign policy has been highly controversial. He rejected numerous agreements entered into by president Obama including the "</span><a data-dcnode-id="6271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trans-Pacific_Partnership" title="Trans-Pacific Partnership"><span data-dcnode-id="6272" instrument_node="">Trans-Pacific Partnership</span></a><span data-dcnode-id="6270" instrument_node="">", a 12-nation trade deal that went forward on its own.</span><sup class="reference" data-dcnode-id="6267" id="cite_ref-190"><a data-dcnode-id="6268" href="#cite_note-190"><span data-dcnode-id="6269" instrument_node="">[190]</span></a></sup><span data-dcnode-id="6266" instrument_node=""> He pulled out of the international Paris climate accord,</span><sup class="reference" data-dcnode-id="6263" id="cite_ref-191"><a data-dcnode-id="6264" href="#cite_note-191"><span data-dcnode-id="6265" instrument_node="">[191]</span></a></sup><span data-dcnode-id="6262" instrument_node=""> and the </span><a data-dcnode-id="6260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joint_Comprehensive_Plan_of_Action" title="Joint Comprehensive Plan of Action"><span data-dcnode-id="6261" instrument_node="">Joint Comprehensive Plan of Action</span></a><span data-dcnode-id="6259" instrument_node=""> to curtail Iranian development of nuclear weapons.</span><sup class="reference" data-dcnode-id="6256" id="cite_ref-192"><a data-dcnode-id="6257" href="#cite_note-192"><span data-dcnode-id="6258" instrument_node="">[192]</span></a></sup><span data-dcnode-id="6255" instrument_node=""> He imposed tariffs on Canada, Mexico, Europe, and other nations, and opened an </span><a data-dcnode-id="6253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China%25E2%2580%2593United_States_trade_war" title="China–United States trade war"><span data-dcnode-id="6254" instrument_node="">escalating trade war with China</span></a><span data-dcnode-id="6252" instrument_node="">. His relations with dictator </span><a data-dcnode-id="6250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kim_Jong-un" title="Kim Jong-un"><span data-dcnode-id="6251" instrument_node="">Kim Jong Un</span></a><span data-dcnode-id="6249" instrument_node=""> of North Korea oscillated between extreme hostility and close personal friendship. Trump tried repeatedly to reduce entry of Muslims and Mexicans into the United States, as well as asylum-seekers from Latin America. Trump gave very strong support to Saudi Arabia and Israel, and strenuously opposed the governments of Iran and Venezuela. The business community, which generally approved his domestic tax cuts and deregulation policies, has strongly opposed his protectionist trade policy, especially the trade war with China.</span><sup class="reference" data-dcnode-id="6246" id="cite_ref-193"><a data-dcnode-id="6247" href="#cite_note-193"><span data-dcnode-id="6248" instrument_node="">[193]</span></a></sup><sup class="reference" data-dcnode-id="6243" id="cite_ref-194"><a data-dcnode-id="6244" href="#cite_note-194"><span data-dcnode-id="6245" instrument_node="">[194]</span></a></sup><span data-dcnode-id="6242" instrument_node="">
</span></p><p data-dcnode-id="6239"><span data-dcnode-id="6240" instrument_node="">Richard Haass argues that the Trump administration brought the reversal of many key American positions:
</span></p><span data-dcnode-id="6238" instrument_node="">
</span><dl data-dcnode-id="6232"><dd data-dcnode-id="6233"><span data-dcnode-id="6237" instrument_node="">Support for alliances, embrace of free trade, concern over climate change, championing of democracy and human rights, American leadership per se – these and other fundamentals of American foreign policy have been questioned and, more than once, rejected.</span><sup class="reference" data-dcnode-id="6234" id="cite_ref-195"><a data-dcnode-id="6235" href="#cite_note-195"><span data-dcnode-id="6236" instrument_node="">[195]</span></a></sup></dd></dl><span data-dcnode-id="6231" instrument_node="">
</span><h3 data-dcnode-id="6221"><span class="mw-headline" data-dcnode-id="6229" id="Debate_over_the_United_States_as_an_empire"><span data-dcnode-id="6230" instrument_node="">Debate over the United States as an empire</span></span><span class="mw-editsection" data-dcnode-id="6222"><span class="mw-editsection-bracket" data-dcnode-id="6227"><span data-dcnode-id="6228" instrument_node="">[</span></span><a data-dcnode-id="6225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D53" title="Edit section: Debate over the United States as an empire"><span data-dcnode-id="6226" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6223"><span data-dcnode-id="6224" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6220" instrument_node="">
</span><link data-dcnode-id="6219" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6215" role="note"><span data-dcnode-id="6218" instrument_node="">Further information: </span><a data-dcnode-id="6216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_imperialism" title="American imperialism"><span data-dcnode-id="6217" instrument_node="">American imperialism</span></a></div><span data-dcnode-id="6214" instrument_node="">
</span><p data-dcnode-id="6198"><span data-dcnode-id="6213" instrument_node="">The United States was formed as the first successful revolt against a major empire in 1776, and historically has strongly imposed imperialism, as seen in the Monroe doctrine, in the war against the Spanish Empire in 1898, and support for dissolving the British and Dutch empires after 1945. Jefferson called for an empire of liberty, with the United States showing the way to Republicanism. Efforts to seize or purchase colonies in Latin America were rejected in the 1850s. In 1898–1900, there was a fierce debate by </span><a data-dcnode-id="6211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-imperialism" title="Anti-imperialism"><span data-dcnode-id="6212" instrument_node="">anti-imperialists</span></a><span data-dcnode-id="6210" instrument_node=""> who formed a special-purpose lobby—the </span><a data-dcnode-id="6208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Anti-Imperialist_League" title="American Anti-Imperialist League"><span data-dcnode-id="6209" instrument_node="">American Anti-Imperialist League</span></a><span data-dcnode-id="6207" instrument_node="">—to fight against taking control of the Philippines after Spain left the scene.</span><sup class="reference" data-dcnode-id="6204" id="cite_ref-196"><a data-dcnode-id="6205" href="#cite_note-196"><span data-dcnode-id="6206" instrument_node="">[196]</span></a></sup><span data-dcnode-id="6203" instrument_node=""> The chief proponents of going to war in response to the cruelty of the Spanish Empire—most notably William Jennings Bryan—insisted the United States should not follow in the same footsteps. The opponents of declaring war, led by President McKinley, decided that America had responsibilities and insisted on taking the Philippines. Congress made the decision not to take ownership of Cuba. Any excitement about becoming an imperial power was short-lived, however, and by 1905 expansionary interests under Theodore Roosevelt turned away from Asia and began focusing on the Panama Canal. The Democrats decided by 1934 to make the Philippines independent, which was done in 1946. Hawaii became integrated into the United States, and no one could decide—to this day—on the long-term status of Puerto Rico.</span><sup class="reference" data-dcnode-id="6200" id="cite_ref-197"><a data-dcnode-id="6201" href="#cite_note-197"><span data-dcnode-id="6202" instrument_node="">[197]</span></a></sup><span data-dcnode-id="6199" instrument_node="">
</span></p><p data-dcnode-id="6183"><span data-dcnode-id="6197" instrument_node="">However, during the Cold War, and especially after 9/11, critics have charged that the United States has become a worldwide empire on its own. In 1945 the United States was planning to withdraw all its forces from Europe as soon as possible, but the Soviet actions in Poland and Czechoslovakia and especially in Greece forced a rethinking. Heavily influenced by </span><a data-dcnode-id="6195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_F._Kennan" title="George F. Kennan"><span data-dcnode-id="6196" instrument_node="">George Kennan</span></a><span data-dcnode-id="6194" instrument_node="">, Washington policymakers decided that the Soviet Union was an expansionary dictatorship that threatened American interests. Moscow's weakness was that it had to keep expanding to survive, and that by containing or stopping its growth stability could be achieved in Europe. The result was the Truman Doctrine (1947) regarding Greece and Turkey. A second equally important consideration was the need to restore the world economy, which required rebuilding and reorganizing Europe for growth. This issue, more than the Soviet threat, was the main impetus behind the Marshall Plan of 1948. A third factor was the realization, especially by Britain and the three Benelux nations, that American military involvement was needed. Historians have commented on the importance of "the eagerness with which America's friendship with sought and its leadership welcomed.&nbsp;... In Western Europe, America built an empire 'by invitation'-– in the striking phrase coined by </span><a data-dcnode-id="6192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geir_Lundestad" title="Geir Lundestad"><span data-dcnode-id="6193" instrument_node="">Geir Lundestad</span></a><span data-dcnode-id="6191" instrument_node="">."</span><sup class="reference" data-dcnode-id="6188" id="cite_ref-198"><a data-dcnode-id="6189" href="#cite_note-198"><span data-dcnode-id="6190" instrument_node="">[198]</span></a></sup><sup class="reference" data-dcnode-id="6185" id="cite_ref-199"><a data-dcnode-id="6186" href="#cite_note-199"><span data-dcnode-id="6187" instrument_node="">[199]</span></a></sup><span data-dcnode-id="6184" instrument_node="">
</span></p><p data-dcnode-id="6174"><span data-dcnode-id="6182" instrument_node="">A leading spokesman for America-as-Empire is British historian </span><a data-dcnode-id="6180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A._G._Hopkins" title="A. G. Hopkins"><span data-dcnode-id="6181" instrument_node="">A. G. Hopkins</span></a><span data-dcnode-id="6179" instrument_node="">.</span><sup class="reference" data-dcnode-id="6176" id="cite_ref-200"><a data-dcnode-id="6177" href="#cite_note-200"><span data-dcnode-id="6178" instrument_node="">[200]</span></a></sup><span data-dcnode-id="6175" instrument_node=""> He argues that by the 21st century traditional economic imperialism was no longer in play, noting that the oil companies opposed the American invasion of Iraq in 2003. Instead, anxieties about The negative impact of globalization on rural and rust-belt America were at work says Hopkins:
</span></p><span data-dcnode-id="6173" instrument_node="">
</span><dl data-dcnode-id="6167"><dd data-dcnode-id="6168"><span data-dcnode-id="6172" instrument_node="">These anxieties prepared the way for a conservative revival based on family, faith and flag that enabled the neo-conservatives to transform conservative patriotism into assertive nationalism after 9/11. In the short term, the invasion of Iraq was a manifestation of national unity. Placed in a longer perspective, it reveals a growing divergence between new globalised interests, which rely on cross-border negotiation, and insular nationalist interests, which seek to rebuild fortress America.</span><sup class="reference" data-dcnode-id="6169" id="cite_ref-201"><a data-dcnode-id="6170" href="#cite_note-201"><span data-dcnode-id="6171" instrument_node="">[201]</span></a></sup></dd></dl><span data-dcnode-id="6166" instrument_node="">
</span><p data-dcnode-id="6153"><span data-dcnode-id="6165" instrument_node="">In 2001–2010 numerous scholars debated the "America as Empire" issue.</span><sup class="reference" data-dcnode-id="6162" id="cite_ref-202"><a data-dcnode-id="6163" href="#cite_note-202"><span data-dcnode-id="6164" instrument_node="">[202]</span></a></sup><span data-dcnode-id="6161" instrument_node=""> Conservative Harvard professor </span><a data-dcnode-id="6159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Niall_Ferguson" title="Niall Ferguson"><span data-dcnode-id="6160" instrument_node="">Niall Ferguson</span></a><span data-dcnode-id="6158" instrument_node=""> concludes that Worldwide military and economic power have combined to make the U.S. the most powerful empire in history. It is a good idea he thinks, because like the successful British Empire in the 19th century it works to globalize free markets, enhanced the rule of law and promote representative government. He fears, however, that Americans lack the long-term commitment in manpower and money to keep the Empire operating.</span><sup class="reference" data-dcnode-id="6155" id="cite_ref-203"><a data-dcnode-id="6156" href="#cite_note-203"><span data-dcnode-id="6157" instrument_node="">[203]</span></a></sup><span data-dcnode-id="6154" instrument_node="">
</span></p><p data-dcnode-id="6137"><span data-dcnode-id="6152" instrument_node="">Many – perhaps most – scholars have decided that the United States lacks the key essentials of an empire. For example, while there are American military bases all over, the American soldiers do not rule over the local people, and the United States government does not send out governors or permanent settlers like all the historic empires did.</span><sup class="reference" data-dcnode-id="6149" id="cite_ref-204"><a data-dcnode-id="6150" href="#cite_note-204"><span data-dcnode-id="6151" instrument_node="">[204]</span></a></sup><span data-dcnode-id="6148" instrument_node=""> Harvard historian </span><a data-dcnode-id="6146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_S._Maier" title="Charles S. Maier"><span data-dcnode-id="6147" instrument_node="">Charles S. Maier</span></a><span data-dcnode-id="6145" instrument_node=""> has examined the America-as-Empire issue at length. He says the traditional understanding of the word "empire" does not apply because the United States does not exert formal control over other nations nor engage in systematic conquest. The best term is that the United States is a "hegemon." Its enormous influence through high technology, economic power, and impact on popular culture gives it an international outreach that stands in sharp contrast to the inward direction of historic empires.</span><sup class="reference" data-dcnode-id="6142" id="cite_ref-205"><a data-dcnode-id="6143" href="#cite_note-205"><span data-dcnode-id="6144" instrument_node="">[205]</span></a></sup><sup class="reference" data-dcnode-id="6139" id="cite_ref-206"><a data-dcnode-id="6140" href="#cite_note-206"><span data-dcnode-id="6141" instrument_node="">[206]</span></a></sup><span data-dcnode-id="6138" instrument_node="">
</span></p><p data-dcnode-id="6132"><span data-dcnode-id="6136" instrument_node="">World historian </span><a data-dcnode-id="6134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthony_Pagden" title="Anthony Pagden"><span data-dcnode-id="6135" instrument_node="">Anthony Pagden</span></a><span data-dcnode-id="6133" instrument_node=""> asks is the United States really an empire? 
</span></p><span data-dcnode-id="6131" instrument_node="">
</span><dl data-dcnode-id="6125"><dd data-dcnode-id="6126"><span data-dcnode-id="6130" instrument_node="">I think if we look at the history of the European empires, the answer must be no. It is often assumed that because America possesses the military capability to become an empire, any overseas interest it does have must necessarily be imperial.&nbsp;... In a number of crucial respects, the United States is, indeed, very un-imperial.&nbsp;... America bears not the slightest resemblance to ancient Rome. Unlike all previous European empires, it has no significant overseas settler populations in any of its formal dependencies and no obvious desire to acquire any.&nbsp;... It exercises no direct rule anywhere outside these areas, and it has always attempted to extricate itself as swiftly as possible from anything that looks as if it were about to develop into even in direct rule.</span><sup class="reference" data-dcnode-id="6127" id="cite_ref-207"><a data-dcnode-id="6128" href="#cite_note-207"><span data-dcnode-id="6129" instrument_node="">[207]</span></a></sup></dd></dl><span data-dcnode-id="6124" instrument_node="">
</span><h2 data-dcnode-id="6114"><span class="mw-headline" data-dcnode-id="6122" id="Soft_power"><span data-dcnode-id="6123" instrument_node="">Soft power</span></span><span class="mw-editsection" data-dcnode-id="6115"><span class="mw-editsection-bracket" data-dcnode-id="6120"><span data-dcnode-id="6121" instrument_node="">[</span></span><a data-dcnode-id="6118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D54" title="Edit section: Soft power"><span data-dcnode-id="6119" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6116"><span data-dcnode-id="6117" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6113" instrument_node="">
</span><p data-dcnode-id="6085"><span data-dcnode-id="6112" instrument_node="">The </span><a data-dcnode-id="6110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_relations_of_the_United_States" title="Foreign relations of the United States"><span data-dcnode-id="6111" instrument_node="">Foreign relations of the United States</span></a><span data-dcnode-id="6109" instrument_node=""> has long had a great deal of soft power.</span><sup class="reference" data-dcnode-id="6106" id="cite_ref-208"><a data-dcnode-id="6107" href="#cite_note-208"><span data-dcnode-id="6108" instrument_node="">[208]</span></a></sup><span data-dcnode-id="6105" instrument_node=""> Examples of the impact include Franklin D. Roosevelt's </span><a data-dcnode-id="6103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Four_Freedoms" title="Four Freedoms"><span data-dcnode-id="6104" instrument_node="">four freedoms</span></a><span data-dcnode-id="6102" instrument_node=""> in Europe to motivate the Allies in World War II; people behind the </span><a data-dcnode-id="6100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iron_Curtain" title="Iron Curtain"><span data-dcnode-id="6101" instrument_node="">Iron Curtain</span></a><span data-dcnode-id="6099" instrument_node=""> listening to the government's foreign propaganda arm </span><a data-dcnode-id="6097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio_Free_Europe/Radio_Liberty" title="Radio Free Europe/Radio Liberty"><span data-dcnode-id="6098" instrument_node="">Radio Free Europe</span></a><span data-dcnode-id="6096" instrument_node="">; newly liberated Afghans in 2001 asking for a copy of the </span><a data-dcnode-id="6094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Bill_of_Rights" title="United States Bill of Rights"><span data-dcnode-id="6095" instrument_node="">Bill of Rights</span></a><span data-dcnode-id="6093" instrument_node=""> and young Iranians today surreptitiously watching banned American videos and satellite television broadcasts in the privacy of their homes.</span><sup class="reference" data-dcnode-id="6090" id="cite_ref-209"><a data-dcnode-id="6091" href="#cite_note-209"><span data-dcnode-id="6092" instrument_node="">[209]</span></a></sup><span data-dcnode-id="6089" instrument_node=""> America's early commitment to </span><a data-dcnode-id="6087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toleration" title="Toleration"><span data-dcnode-id="6088" instrument_node="">religious toleration</span></a><span data-dcnode-id="6086" instrument_node="">, for example, was a powerful element of its overall appeal to potential immigrants; and American aid in the reconstruction of Europe after World War II was a propaganda victory to show off the prosperity and the generosity of the people of the United States.
</span></p><p data-dcnode-id="6064"><span data-dcnode-id="6084" instrument_node="">
Studies of American broadcasting into the </span><a class="mw-redirect" data-dcnode-id="6082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_bloc" title="Soviet bloc"><span data-dcnode-id="6083" instrument_node="">Soviet bloc</span></a><span data-dcnode-id="6081" instrument_node="">, and testimonials from Czech President </span><a data-dcnode-id="6079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/V%25C3%25A1clav_Havel" title="Václav Havel"><span data-dcnode-id="6080" instrument_node="">Václav Havel</span></a><span data-dcnode-id="6078" instrument_node="">, Polish President </span><a data-dcnode-id="6076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lech_Wa%25C5%2582%25C4%2599sa" title="Lech Wałęsa"><span data-dcnode-id="6077" instrument_node="">Lech Wałęsa</span></a><span data-dcnode-id="6075" instrument_node="">, and Russian President </span><a data-dcnode-id="6073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Yeltsin" title="Boris Yeltsin"><span data-dcnode-id="6074" instrument_node="">Boris Yeltsin</span></a><span data-dcnode-id="6072" instrument_node=""> support that soft power efforts of the United States and its allies during the Cold War were ultimately successful in creating the favorable conditions that led to the collapse of the </span><a data-dcnode-id="6070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="6071" instrument_node="">Soviet Union</span></a><span data-dcnode-id="6069" instrument_node="">.</span><sup class="reference" data-dcnode-id="6066" id="cite_ref-210"><a data-dcnode-id="6067" href="#cite_note-210"><span data-dcnode-id="6068" instrument_node="">[210]</span></a></sup><link data-dcnode-id="6065" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"></p><blockquote class="templatequote" data-dcnode-id="6042"><p data-dcnode-id="6043"><span data-dcnode-id="6063" instrument_node="">"Satellite TV is actively promoting American soft power in the Arab world in ways that the United States has been incapable of doing. The launch of the Arabic-language </span><a data-dcnode-id="6061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alhurra" title="Alhurra"><span data-dcnode-id="6062" instrument_node="">Alhurra</span></a><span data-dcnode-id="6060" instrument_node=""> satellite channel in early 2004 to provide news and entertainment in ways more beneficial to the U.S., marked an important turning point in U.S. public diplomacy development. Though it calls itself the largest Arabic-language news organization in the world, the Virginia-based Alhurra lacks the cachet and brand recognition of Al Jazeera, but its balanced presentation of news has earned it a small but significant viewership. Controversial innovations in radio broadcasting that target young mass audiences through a mix of light news and mild American popular music – </span><a data-dcnode-id="6058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio_Sawa" title="Radio Sawa"><span data-dcnode-id="6059" instrument_node="">Radio Sawa</span></a><span data-dcnode-id="6057" instrument_node=""> in </span><a data-dcnode-id="6055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arabic" title="Arabic"><span data-dcnode-id="6056" instrument_node="">Arabic</span></a><span data-dcnode-id="6054" instrument_node=""> and </span><a data-dcnode-id="6052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio_Farda" title="Radio Farda"><span data-dcnode-id="6053" instrument_node="">Radio Farda</span></a><span data-dcnode-id="6051" instrument_node=""> in </span><a data-dcnode-id="6049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_language" title="Persian language"><span data-dcnode-id="6050" instrument_node="">Persian</span></a><span data-dcnode-id="6048" instrument_node=""> – have captured a substantial market share in their target regions."</span><sup class="reference" data-dcnode-id="6045" id="cite_ref-211"><a data-dcnode-id="6046" href="#cite_note-211"><span data-dcnode-id="6047" instrument_node="">[211]</span></a></sup><span data-dcnode-id="6044" instrument_node="">
</span></p></blockquote><span data-dcnode-id="6041" instrument_node="">
</span><h2 data-dcnode-id="6031"><span class="mw-headline" data-dcnode-id="6039" id="Diplomats"><span data-dcnode-id="6040" instrument_node="">Diplomats</span></span><span class="mw-editsection" data-dcnode-id="6032"><span class="mw-editsection-bracket" data-dcnode-id="6037"><span data-dcnode-id="6038" instrument_node="">[</span></span><a data-dcnode-id="6035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D55" title="Edit section: Diplomats"><span data-dcnode-id="6036" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6033"><span data-dcnode-id="6034" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6030" instrument_node="">
</span><p data-dcnode-id="6021"><span data-dcnode-id="6029" instrument_node="">Diplomacy was man's business historically until the late 20th century. However, a diplomat needed a wife, as senior officials gauged the competence of a budding diplomat in terms of his wife's 'Commanding Beauty' and 'Gentle Charm'. It was essential for her to project the proper image of American society by maintaining a proper upper-class household full of servants, entertaining guests and dignitaries, and even taking part in informal information intelligence gathering.</span><sup class="reference" data-dcnode-id="6026" id="cite_ref-212"><a data-dcnode-id="6027" href="#cite_note-212"><span data-dcnode-id="6028" instrument_node="">[212]</span></a></sup><span data-dcnode-id="6025" instrument_node=""> The wife had to relate well to the high society lifestyle of European diplomacy. Family money helped a great deal, given the modest pay scales of the American diplomatic service, and the limited entertainment budgets. Extremely rich diplomats had an advantage, such as </span><a data-dcnode-id="6023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_P._Kennedy_Sr." title="Joseph P. Kennedy Sr."><span data-dcnode-id="6024" instrument_node="">Joseph P. Kennedy Sr.</span></a><span data-dcnode-id="6022" instrument_node=""> as Ambassador to the Court of St. James, 1938–40.
</span></p><p data-dcnode-id="6009"><a data-dcnode-id="6019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frances_E._Willis" title="Frances E. Willis"><span data-dcnode-id="6020" instrument_node="">Frances E. Willis</span></a><span data-dcnode-id="6018" instrument_node=""> (1899–1983) was a famous pioneer. She joined the foreign service after earning a PhD in political science from Stanford. She was the third woman in the foreign service, and practically all her postings were "firsts"—the first woman </span><i data-dcnode-id="6015"><a data-dcnode-id="6016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charg%25C3%25A9_d%27affaires" title="Chargé d'affaires"><span data-dcnode-id="6017" instrument_node="">chargé d'affaires</span></a></i><span data-dcnode-id="6014" instrument_node="">, the first woman appointed deputy chief of mission, the first female Foreign Service officer (FSO) appointed ambassador, the first woman to serve as ambassador to three posts, the first woman appointed Career Minister in 1955 and the first woman appointed Career Ambassador in 1962. She was posted to Chile, Sweden, Belgium, Spain, Britain, and Finland as well as the State Department. In 1953, she became the first woman American ambassador (to Switzerland) and later served as ambassador to Norway and Ceylon. Her biographer credits her competence, language skills, research abilities, hard work, and self-confidence, as well as mentoring from the undersecretary of state, Joseph Grew, and Ambassador Hugh Gibson.</span><sup class="reference" data-dcnode-id="6011" id="cite_ref-213"><a data-dcnode-id="6012" href="#cite_note-213"><span data-dcnode-id="6013" instrument_node="">[213]</span></a></sup><span data-dcnode-id="6010" instrument_node="">
</span></p><p data-dcnode-id="5996"><span data-dcnode-id="6008" instrument_node="">Since the late 20th century, high-profile ambassadorships typically are selected by the White House and go to prominent political or financial supporters of the president. These amateurs are mostly sent to Western Europe or nations with strong economic ties to the U.S. Professional career ambassadors move up through the State Department hierarchy and typically are posted to smaller countries and those with lower trade with the United States. The vast majority of semiprofessional diplomats were appointed to the most powerful countries.</span><sup class="reference" data-dcnode-id="6005" id="cite_ref-214"><a data-dcnode-id="6006" href="#cite_note-214"><span data-dcnode-id="6007" instrument_node="">[214]</span></a></sup><span data-dcnode-id="6004" instrument_node=""> The pattern varies according to presidential style. For example, under President </span><a data-dcnode-id="6002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="6003" instrument_node="">George W. Bush</span></a><span data-dcnode-id="6001" instrument_node=""> (2001–2009) the foreign service and the U.S. Agency for International Development were underfunded and often used for political rather than diplomatic reasons.</span><sup class="reference" data-dcnode-id="5998" id="cite_ref-215"><a data-dcnode-id="5999" href="#cite_note-215"><span data-dcnode-id="6000" instrument_node="">[215]</span></a></sup><span data-dcnode-id="5997" instrument_node="">
</span></p><span data-dcnode-id="5995" instrument_node="">
