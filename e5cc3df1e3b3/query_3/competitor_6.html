</span><div class="thumb tright" data-dcnode-id="8130"><div class="thumbinner" data-dcnode-id="8131" style="width:222px;"><a class="image" data-dcnode-id="8149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABig_four.jpg"><img alt="Four men with suits outdoors talking." class="thumbimage" data-dcnode-id="8150" data-file-height="2008" data-file-width="2616" decoding="async" height="169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Big_four.jpg/220px-Big_four.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Big_four.jpg/330px-Big_four.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Big_four.jpg/440px-Big_four.jpg 2x" width="220"></a><span data-dcnode-id="8148" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8132"><div class="magnify" data-dcnode-id="8146"><a class="internal" data-dcnode-id="8147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACouncil_of_Four_Versailles.jpg" title="Enlarge"></a></div><span data-dcnode-id="8145" instrument_node="">British prime minister </span><a data-dcnode-id="8143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Lloyd_George" title="David Lloyd George"><span data-dcnode-id="8144" instrument_node="">Lloyd George</span></a><span data-dcnode-id="8142" instrument_node="">, Italy's </span><a data-dcnode-id="8140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vittorio_Emanuele_Orlando" title="Vittorio Emanuele Orlando"><span data-dcnode-id="8141" instrument_node="">Vittorio Emanuele Orlando</span></a><span data-dcnode-id="8139" instrument_node="">, France's </span><a data-dcnode-id="8137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georges_Clemenceau" title="Georges Clemenceau"><span data-dcnode-id="8138" instrument_node="">Georges Clemenceau</span></a><span data-dcnode-id="8136" instrument_node="">, and Wilson at the </span><a data-dcnode-id="8134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Versailles" title="Treaty of Versailles"><span data-dcnode-id="8135" instrument_node="">Treaty of Versailles</span></a><span data-dcnode-id="8133" instrument_node=""> in 1919.</span></div></div></div><span data-dcnode-id="8129" instrument_node="">
</span><p data-dcnode-id="8114"><span data-dcnode-id="8128" instrument_node="">At the </span><a data-dcnode-id="8126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Peace_Conference_%281919%25E2%2580%25931920%29" title="Paris Peace Conference (1919–1920)"><span data-dcnode-id="8127" instrument_node="">peace conference at Versailles</span></a><span data-dcnode-id="8125" instrument_node="">, Wilson tried with mixed success to enact his Fourteen Points. He was forced to accept British, French and Italian demands for financial revenge: Germany would be made to pay reparations that amounted to the total cost of the war for the Allies and admit guilt in humiliating fashion. It was a humiliating punishment for Germany which subsequent commentators thought was too harsh and unfair. Wilson succeeded in obtaining his main goal, a </span><a data-dcnode-id="8123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Nations" title="League of Nations"><span data-dcnode-id="8124" instrument_node="">League of Nations</span></a><span data-dcnode-id="8122" instrument_node=""> that would hopefully resolve all future conflicts before they caused another major war.</span><sup class="reference" data-dcnode-id="8119" id="cite_ref-78"><a data-dcnode-id="8120" href="#cite_note-78"><span data-dcnode-id="8121" instrument_node="">[78]</span></a></sup><span data-dcnode-id="8118" instrument_node=""> Wilson, however, refused to consult with </span><a data-dcnode-id="8116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_Republican_Party_%28United_States%29" title="History of the Republican Party (United States)"><span data-dcnode-id="8117" instrument_node="">Republicans</span></a><span data-dcnode-id="8115" instrument_node="">, who took control of Congress after the 1918 elections and which demanded revisions protecting the right of Congress to declare war. Wilson refused to compromise with the majority party in Congress, or even bring any leading Republican to the peace conference. His personal enemy, Henry Cabot Lodge, now controled the Senate. Lodge did support the league of Nations, but wanted provisions that would insist that only Congress could declare war on behalf of the United States. Wilson was largely successful in designing the new League of Nations, declaring it would be:
</span></p><span data-dcnode-id="8113" instrument_node="">
</span><dl data-dcnode-id="8107"><dd data-dcnode-id="8108"><span data-dcnode-id="8112" instrument_node="">a great charter for a new order of affairs. There is ground here for deep satisfaction, universal reassurance, and confident hope.</span><sup class="reference" data-dcnode-id="8109" id="cite_ref-79"><a data-dcnode-id="8110" href="#cite_note-79"><span data-dcnode-id="8111" instrument_node="">[79]</span></a></sup></dd></dl><span data-dcnode-id="8106" instrument_node="">
</span><p data-dcnode-id="8100"><span data-dcnode-id="8105" instrument_node="">The League did go into operation, but the United States never joined. With a two-thirds vote needed, the Senate did not ratify either the original Treaty or its Republican version. Washington made separate peace treaties with the different European nations. Nevertheless, Wilson's idealism and call for self-determination of all nations had an effect on nationalism across the globe, while at home his idealistic vision, called "Wilsonianism" of spreading democracy and peace under American auspices had a profound influence on much of American foreign policy ever since.</span><sup class="reference" data-dcnode-id="8102" id="cite_ref-80"><a data-dcnode-id="8103" href="#cite_note-80"><span data-dcnode-id="8104" instrument_node="">[80]</span></a></sup><span data-dcnode-id="8101" instrument_node="">
</span></p><span data-dcnode-id="8099" instrument_node="">
</span><h3 data-dcnode-id="8088"><span data-dcnode-id="8098" id="Debate_on_Wilson.27s_role"></span><span class="mw-headline" data-dcnode-id="8096" id="Debate_on_Wilson's_role"><span data-dcnode-id="8097" instrument_node="">Debate on Wilson's role</span></span><span class="mw-editsection" data-dcnode-id="8089"><span class="mw-editsection-bracket" data-dcnode-id="8094"><span data-dcnode-id="8095" instrument_node="">[</span></span><a data-dcnode-id="8092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D24" title="Edit section: Debate on Wilson's role"><span data-dcnode-id="8093" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8090"><span data-dcnode-id="8091" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8087" instrument_node="">
</span><p data-dcnode-id="8076"><span data-dcnode-id="8086" instrument_node="">Perhaps the harshest attack on Wilson's diplomacy comes from Stanford historian </span><a data-dcnode-id="8084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_A._Bailey" title="Thomas A. Bailey"><span data-dcnode-id="8085" instrument_node="">Thomas A. Bailey</span></a><span data-dcnode-id="8083" instrument_node=""> in two books that remain heavily cited by scholars, </span><i data-dcnode-id="8081"><span data-dcnode-id="8082" instrument_node="">Woodrow Wilson and the Lost Peace</span></i><span data-dcnode-id="8080" instrument_node=""> (1944) and </span><i data-dcnode-id="8078"><span data-dcnode-id="8079" instrument_node="">Woodrow Wilson and the Great Betrayal</span></i><span data-dcnode-id="8077" instrument_node=""> (1945), Bailey:
</span></p><span data-dcnode-id="8075" instrument_node="">
</span><dl data-dcnode-id="8069"><dd data-dcnode-id="8070"><span data-dcnode-id="8074" instrument_node="">contended that Wilson's wartime isolationism, as well as his peace proposals at war's end, were seriously flawed. Highlighting the fact that American delegates encountered staunch opposition to Wilson's proposed League of Nations, Bailey concluded that the president and his diplomatic staff essentially sold out, compromising important American ideals to secure mere fragments of Wilson's progressive vision. Hence, while Bailey primarily targeted President Wilson in these critiques, others, including House, did not emerge unscathed.</span><sup class="reference" data-dcnode-id="8071" id="cite_ref-81"><a data-dcnode-id="8072" href="#cite_note-81"><span data-dcnode-id="8073" instrument_node="">[81]</span></a></sup></dd></dl><span data-dcnode-id="8068" instrument_node="">
</span><p data-dcnode-id="8066"><span data-dcnode-id="8067" instrument_node="">Scot Bruce argues that:
</span></p><span data-dcnode-id="8065" instrument_node="">
</span><dl data-dcnode-id="8044"><dd data-dcnode-id="8045"><span data-dcnode-id="8064" instrument_node="">More recently, prominent historians such as Thomas J. Knock, </span><a data-dcnode-id="8062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arthur_Walworth" title="Arthur Walworth"><span data-dcnode-id="8063" instrument_node="">Arthur Walworth</span></a><span data-dcnode-id="8061" instrument_node="">, and </span><a data-dcnode-id="8059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_M._Cooper_%28historian%29" title="John M. Cooper (historian)"><span data-dcnode-id="8060" instrument_node="">John Milton Cooper</span></a><span data-dcnode-id="8058" instrument_node="">, among others, shied away from condemning Wilson and his peacemakers for extensive diplomatic failures in Paris. Instead, they framed Wilsonian progressivism, articulated through the League of Nations, as a comparatively enlightened framework tragically undermined by British and French machinations at the peace conference.&nbsp;... Historian </span><a data-dcnode-id="8056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_MacMillan" title="Margaret MacMillan"><span data-dcnode-id="8057" instrument_node="">Margaret MacMillan</span></a><span data-dcnode-id="8055" instrument_node="">, continued this analytical trend in her prize-winning book, </span><i data-dcnode-id="8053"><span data-dcnode-id="8054" instrument_node="">Paris, 1919: Six Months That Changed the World</span></i><span data-dcnode-id="8052" instrument_node=""> (2001), which characterized Wilson as the frustrated idealist, unable to secure his progressive vision due to opposition from old-guard imperialists in his midst. While realists like Lloyd E. Ambrosius questioned the merits of defining Wilsonian progressivism too idealistically, the idea has persisted that well-intentioned U.S. delegates encountered staunch opposition to Wilson's proposals in Paris, and therefore compromised under pressure. Even the great Wilson scholar, </span><a data-dcnode-id="8050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arthur_S._Link" title="Arthur S. Link"><span data-dcnode-id="8051" instrument_node="">Arthur S. Link</span></a><span data-dcnode-id="8049" instrument_node="">, subscribed to a version of this narrative.</span><sup class="reference" data-dcnode-id="8046" id="cite_ref-82"><a data-dcnode-id="8047" href="#cite_note-82"><span data-dcnode-id="8048" instrument_node="">[82]</span></a></sup></dd></dl><span data-dcnode-id="8043" instrument_node="">
</span><h3 data-dcnode-id="8032"><span data-dcnode-id="8042" id="Three_approaches:_Wilsonian_idealism.2C_realism.2C_revisionism"></span><span class="mw-headline" data-dcnode-id="8040" id="Three_approaches:_Wilsonian_idealism,_realism,_revisionism"><span data-dcnode-id="8041" instrument_node="">Three approaches: Wilsonian idealism, realism, revisionism</span></span><span class="mw-editsection" data-dcnode-id="8033"><span class="mw-editsection-bracket" data-dcnode-id="8038"><span data-dcnode-id="8039" instrument_node="">[</span></span><a data-dcnode-id="8036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D25" title="Edit section: Three approaches: Wilsonian idealism, realism, revisionism"><span data-dcnode-id="8037" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8034"><span data-dcnode-id="8035" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8031" instrument_node="">
</span><p data-dcnode-id="7999"><span data-dcnode-id="8030" instrument_node="">Historians and political analyst have been largely Wilsonian in their approach to American diplomatic history, according to Lloyd Ambrosius. But there are alternative schools of thought as well. Ambrosius argues that Wilsonianism is based on national self-determination and democracy; open door globalization based on open markets for trade and finance; collective security as typified by the  Wilson's idea of the League of Nations as well as NATO; and a hope bordering on a promise of future peace and progress.</span><sup class="reference" data-dcnode-id="8027" id="cite_ref-83"><a data-dcnode-id="8028" href="#cite_note-83"><span data-dcnode-id="8029" instrument_node="">[83]</span></a></sup><span data-dcnode-id="8026" instrument_node=""> Realism is the first alternative school, based on the outlook and policies of Theodore Roosevelt, and represented most famously by </span><a class="mw-redirect" data-dcnode-id="8024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Kennan" title="George Kennan"><span data-dcnode-id="8025" instrument_node="">George Kennan</span></a><span data-dcnode-id="8023" instrument_node="">, </span><a data-dcnode-id="8021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Kissinger" title="Henry Kissinger"><span data-dcnode-id="8022" instrument_node="">Henry Kissinger</span></a><span data-dcnode-id="8020" instrument_node=""> and </span><a data-dcnode-id="8018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Richard_Nixon_administration" title="Foreign policy of the Richard Nixon administration"><span data-dcnode-id="8019" instrument_node="">Richard Nixon</span></a><span data-dcnode-id="8017" instrument_node="">. Democracy for realists was a low priority—they would eagerly work with dictators who supported American positions.  A third approach emerged out of the New Left in the 1960s, led by </span><a data-dcnode-id="8015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Appleman_Williams" title="William Appleman Williams"><span data-dcnode-id="8016" instrument_node="">William Appleman Williams</span></a><span data-dcnode-id="8014" instrument_node=""> and the </span><a data-dcnode-id="8012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wisconsin_School_%28diplomatic_history%29" title="Wisconsin School (diplomatic history)"><span data-dcnode-id="8013" instrument_node="">"Wisconsin School"</span></a><span data-dcnode-id="8011" instrument_node="">. It is called "Revisionism" and argues that selfish economic motivations, not idealism or realism, motivated Wilsonianism.  Ambrosius argues that historians generally agree that Wilsonianism  was the main intellectual force in battling the Nazis in 1945 and the Soviet communists in 1989. It seemed to be the dominant factor in world affairs by 1989.</span><sup class="reference" data-dcnode-id="8008" id="cite_ref-84"><a data-dcnode-id="8009" href="#cite_note-84"><span data-dcnode-id="8010" instrument_node="">[84]</span></a></sup><span data-dcnode-id="8007" instrument_node=""> Wilsonians  were shocked when the Chinese Communists rejected democracy in the </span><a data-dcnode-id="8005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1989_Tiananmen_Square_protests_and_massacre" title="1989 Tiananmen Square protests and massacre"><span data-dcnode-id="8006" instrument_node="">1989 Tiananmen Square protests and massacre</span></a><span data-dcnode-id="8004" instrument_node="">, and when Putin  rejected it for Russia.</span><sup class="reference" data-dcnode-id="8001" id="cite_ref-85"><a data-dcnode-id="8002" href="#cite_note-85"><span data-dcnode-id="8003" instrument_node="">[85]</span></a></sup><span data-dcnode-id="8000" instrument_node="">
</span></p><p data-dcnode-id="7980"><span data-dcnode-id="7998" instrument_node="">Wilsonians were dismayed when </span><a data-dcnode-id="7996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_George_W._Bush_administration" title="Foreign policy of the George W. Bush administration"><span data-dcnode-id="7997" instrument_node="">George W. Bush's</span></a><span data-dcnode-id="7995" instrument_node=""> initiative to bring democracy to the Middle East after 9/11 failed.</span><sup class="reference" data-dcnode-id="7992" id="cite_ref-86"><a data-dcnode-id="7993" href="#cite_note-86"><span data-dcnode-id="7994" instrument_node="">[86]</span></a></sup><span data-dcnode-id="7991" instrument_node=""> It produced not an </span><a data-dcnode-id="7989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab_Spring" title="Arab Spring"><span data-dcnode-id="7990" instrument_node="">Arab Spring</span></a><span data-dcnode-id="7988" instrument_node="">, but instead antidemocratic results most famously in Egypt, Iraq. Syria, and Afghanistan.</span><sup class="reference" data-dcnode-id="7985" id="cite_ref-87"><a data-dcnode-id="7986" href="#cite_note-87"><span data-dcnode-id="7987" instrument_node="">[87]</span></a></sup><sup class="reference" data-dcnode-id="7982" id="cite_ref-88"><a data-dcnode-id="7983" href="#cite_note-88"><span data-dcnode-id="7984" instrument_node="">[88]</span></a></sup><span data-dcnode-id="7981" instrument_node="">
</span></p><span data-dcnode-id="7979" instrument_node="">
</span><h2 data-dcnode-id="7968"><span data-dcnode-id="7978" id="Interwar_years:_1921.E2.80.931933"></span><span class="mw-headline" data-dcnode-id="7976" id="Interwar_years:_1921–1933"><span data-dcnode-id="7977" instrument_node="">Interwar years: 1921–1933</span></span><span class="mw-editsection" data-dcnode-id="7969"><span class="mw-editsection-bracket" data-dcnode-id="7974"><span data-dcnode-id="7975" instrument_node="">[</span></span><a data-dcnode-id="7972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D26" title="Edit section: Interwar years: 1921–1933"><span data-dcnode-id="7973" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7970"><span data-dcnode-id="7971" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7967" instrument_node="">
</span><link data-dcnode-id="7966" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7962" role="note"><span data-dcnode-id="7965" instrument_node="">Main article: </span><a data-dcnode-id="7963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_U.S._foreign_policy%2C_1913%25E2%2580%25931933" title="History of U.S. foreign policy, 1913–1933"><span data-dcnode-id="7964" instrument_node="">History of U.S. foreign policy, 1913–1933</span></a></div><span data-dcnode-id="7961" instrument_node="">
</span><link data-dcnode-id="7960" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7953" role="note"><span data-dcnode-id="7959" instrument_node="">See also: </span><a data-dcnode-id="7957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_relations_%281919%25E2%2580%25931939%29" title="International relations (1919–1939)"><span data-dcnode-id="7958" instrument_node="">International relations (1919–1939)</span></a><span data-dcnode-id="7956" instrument_node=""> and </span><a data-dcnode-id="7954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roaring_Twenties" title="Roaring Twenties"><span data-dcnode-id="7955" instrument_node="">Roaring Twenties</span></a></div><span data-dcnode-id="7952" instrument_node="">
</span><p data-dcnode-id="7939"><span data-dcnode-id="7951" instrument_node="">In the 1920s, American policy was an active involvement in international affairs, while ignoring the League of Nations, setting up numerous diplomatic ventures, and using the enormous financial power of the United States to dictate major diplomatic questions in Europe. There were large-scale humanitarian food aid missions during the war in Belgium, and after it in Germany and Russia, led by </span><a data-dcnode-id="7949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herbert_Hoover" title="Herbert Hoover"><span data-dcnode-id="7950" instrument_node="">Herbert C. Hoover</span></a><span data-dcnode-id="7948" instrument_node="">.</span><sup class="reference" data-dcnode-id="7945" id="cite_ref-89"><a data-dcnode-id="7946" href="#cite_note-89"><span data-dcnode-id="7947" instrument_node="">[89]</span></a></sup><span data-dcnode-id="7944" instrument_node=""> There was also a major aid to Japan after the 1923 earthquake.</span><sup class="reference" data-dcnode-id="7941" id="cite_ref-90"><a data-dcnode-id="7942" href="#cite_note-90"><span data-dcnode-id="7943" instrument_node="">[90]</span></a></sup><span data-dcnode-id="7940" instrument_node="">
</span></p><p data-dcnode-id="7937"><span data-dcnode-id="7938" instrument_node="">The Republican presidents, Warren Harding, Calvin Coolidge and Herbert Hoover, avoided any political alliances with anyone else. They operated large-scale American intervention in issues of reparations and disarmament, with little contact with the League of Nations. Historian Jerald Combs reports their administrations in no way returned to 19th-century isolationism. The key Republican leaders:
</span></p><span data-dcnode-id="7936" instrument_node="">
</span><dl data-dcnode-id="7924"><dd data-dcnode-id="7925"><span data-dcnode-id="7935" instrument_node="">including </span><a data-dcnode-id="7933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elihu_Root" title="Elihu Root"><span data-dcnode-id="7934" instrument_node="">Elihu Root</span></a><span data-dcnode-id="7932" instrument_node="">, </span><a data-dcnode-id="7930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Evans_Hughes" title="Charles Evans Hughes"><span data-dcnode-id="7931" instrument_node="">Charles Evans Hughes</span></a><span data-dcnode-id="7929" instrument_node="">, and Hoover himself, were Progressives who accepted much of Wilson's internationalism.... They did seek to use American political influence and economic power to goad European governments to moderate the Versailles peace terms, induce the Europeans to settle their quarrels peacefully, secure disarmament agreements, and strengthen the European capitalist economies to provide prosperity for them and their American trading partners.</span><sup class="reference" data-dcnode-id="7926" id="cite_ref-91"><a data-dcnode-id="7927" href="#cite_note-91"><span data-dcnode-id="7928" instrument_node="">[91]</span></a></sup></dd></dl><span data-dcnode-id="7923" instrument_node="">
</span><h3 data-dcnode-id="7913"><span class="mw-headline" data-dcnode-id="7921" id="Rejection_of_the_World_Court"><span data-dcnode-id="7922" instrument_node="">Rejection of the World Court</span></span><span class="mw-editsection" data-dcnode-id="7914"><span class="mw-editsection-bracket" data-dcnode-id="7919"><span data-dcnode-id="7920" instrument_node="">[</span></span><a data-dcnode-id="7917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D27" title="Edit section: Rejection of the World Court"><span data-dcnode-id="7918" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7915"><span data-dcnode-id="7916" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7912" instrument_node="">
</span><p data-dcnode-id="7880"><span data-dcnode-id="7911" instrument_node="">The U.S, played a major role in setting up the "Permanent Court of International Justice", known as the World Court.</span><sup class="reference" data-dcnode-id="7908" id="cite_ref-92"><a data-dcnode-id="7909" href="#cite_note-92"><span data-dcnode-id="7910" instrument_node="">[92]</span></a></sup><span data-dcnode-id="7907" instrument_node=""> Presidents Wilson, Harding, Coolidge, and Hoover supported membership but were unable to get a 2/3 majority in the Senate for a treaty. Roosevelt also supported membership, but he did not make it a high priority. Opposition was intense on the issue of losing sovereignty, led by the </span><a data-dcnode-id="7905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hearst_Communications" title="Hearst Communications"><span data-dcnode-id="7906" instrument_node="">Hearst newspapers</span></a><span data-dcnode-id="7904" instrument_node=""> and </span><a data-dcnode-id="7902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Coughlin" title="Charles Coughlin"><span data-dcnode-id="7903" instrument_node="">Father Coughlin</span></a><span data-dcnode-id="7901" instrument_node="">. The U.S. never joined.</span><sup class="reference" data-dcnode-id="7898" id="cite_ref-93"><a data-dcnode-id="7899" href="#cite_note-93"><span data-dcnode-id="7900" instrument_node="">[93]</span></a></sup><sup class="reference" data-dcnode-id="7895" id="cite_ref-94"><a data-dcnode-id="7896" href="#cite_note-94"><span data-dcnode-id="7897" instrument_node="">[94]</span></a></sup><sup class="reference" data-dcnode-id="7892" id="cite_ref-95"><a data-dcnode-id="7893" href="#cite_note-95"><span data-dcnode-id="7894" instrument_node="">[95]</span></a></sup><span data-dcnode-id="7891" instrument_node=""> The World Court was replaced by the </span><a data-dcnode-id="7889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Court_of_Justice" title="International Court of Justice"><span data-dcnode-id="7890" instrument_node="">International Court of Justice</span></a><span data-dcnode-id="7888" instrument_node=""> in 1945. However, the Connally Amendment of 1944 reserved the right of the United States to refuse to abide by its decisions. Margaret A. Rague, argues this reduced the strength of the Court, discredited America's image as a proponent of international law, and exemplified the problems created by vesting a reservation power in the Senate.</span><sup class="reference" data-dcnode-id="7885" id="cite_ref-96"><a data-dcnode-id="7886" href="#cite_note-96"><span data-dcnode-id="7887" instrument_node="">[96]</span></a></sup><sup class="reference" data-dcnode-id="7882" id="cite_ref-97"><a data-dcnode-id="7883" href="#cite_note-97"><span data-dcnode-id="7884" instrument_node="">[97]</span></a></sup><span data-dcnode-id="7881" instrument_node="">
</span></p><span data-dcnode-id="7879" instrument_node="">
</span><h3 data-dcnode-id="7869"><span class="mw-headline" data-dcnode-id="7877" id="Naval_disarmament"><span data-dcnode-id="7878" instrument_node="">Naval disarmament</span></span><span class="mw-editsection" data-dcnode-id="7870"><span class="mw-editsection-bracket" data-dcnode-id="7875"><span data-dcnode-id="7876" instrument_node="">[</span></span><a data-dcnode-id="7873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D28" title="Edit section: Naval disarmament"><span data-dcnode-id="7874" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7871"><span data-dcnode-id="7872" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7868" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7853"><div class="thumbinner" data-dcnode-id="7854" style="width:222px;"><a class="image" data-dcnode-id="7866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACharles_Evans_Hughes_cph.3b15401.jpg"><img alt="" class="thumbimage" data-dcnode-id="7867" data-file-height="1479" data-file-width="1153" decoding="async" height="282" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Charles_Evans_Hughes_cph.3b15401.jpg/220px-Charles_Evans_Hughes_cph.3b15401.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Charles_Evans_Hughes_cph.3b15401.jpg/330px-Charles_Evans_Hughes_cph.3b15401.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Charles_Evans_Hughes_cph.3b15401.jpg/440px-Charles_Evans_Hughes_cph.3b15401.jpg 2x" width="220"></a><span data-dcnode-id="7865" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7855"><div class="magnify" data-dcnode-id="7863"><a class="internal" data-dcnode-id="7864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACharles_Evans_Hughes_cph.3b15401.jpg" title="Enlarge"></a></div><span data-dcnode-id="7862" instrument_node="">Secretary of State </span><a data-dcnode-id="7860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Evans_Hughes" title="Charles Evans Hughes"><span data-dcnode-id="7861" instrument_node="">Charles Evans Hughes</span></a><span data-dcnode-id="7859" instrument_node=""> chaired the </span><a data-dcnode-id="7857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington_Naval_Conference" title="Washington Naval Conference"><span data-dcnode-id="7858" instrument_node="">Washington Naval Conference</span></a><span data-dcnode-id="7856" instrument_node=""> in 1921–1922</span></div></div></div><span data-dcnode-id="7852" instrument_node="">
</span><p data-dcnode-id="7818"><span data-dcnode-id="7851" instrument_node="">The </span><a data-dcnode-id="7849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington_Naval_Conference" title="Washington Naval Conference"><span data-dcnode-id="7850" instrument_node="">Washington Naval Conference</span></a><span data-dcnode-id="7848" instrument_node=""> (its formal title was " International Conference on Naval Limitation") was the most successful diplomatic venture the 1920s. Promoted by Senator </span><a class="mw-redirect" data-dcnode-id="7846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_E._Borah" title="William E. Borah"><span data-dcnode-id="7847" instrument_node="">William E. Borah</span></a><span data-dcnode-id="7845" instrument_node="">, Republican of Idaho, it had the support of the </span><a data-dcnode-id="7843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Presidency_of_Warren_G._Harding" title="Presidency of Warren G. Harding"><span data-dcnode-id="7844" instrument_node="">Harding Administration</span></a><span data-dcnode-id="7842" instrument_node="">.  It was held in Washington, and was chaired by Secretary of State </span><a data-dcnode-id="7840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Evans_Hughes" title="Charles Evans Hughes"><span data-dcnode-id="7841" instrument_node="">Charles Evans Hughes</span></a><span data-dcnode-id="7839" instrument_node=""> from 12 November 1921 to 6 February 1922. Conducted outside the auspice of the League of Nations, it was attended by nine nations—the United States, Japan, China, France, Great Britain, Italy, Belgium, Netherlands, and Portugal</span><sup class="reference" data-dcnode-id="7836" id="cite_ref-98"><a data-dcnode-id="7837" href="#cite_note-98"><span data-dcnode-id="7838" instrument_node="">[98]</span></a></sup><span data-dcnode-id="7835" instrument_node=""> The USSR and Germany were not invited. It focused on resolving misunderstandings or conflicts regarding interests in the Pacific Ocean and East Asia. The main achievement was a series of naval disarmament agreements agreed to by all the participants, that lasted for a decade. It resulted in three major treaties: </span><a data-dcnode-id="7833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Four-Power_Treaty" title="Four-Power Treaty"><span data-dcnode-id="7834" instrument_node="">Four-Power Treaty</span></a><span data-dcnode-id="7832" instrument_node="">, </span><a data-dcnode-id="7830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington_Naval_Treaty" title="Washington Naval Treaty"><span data-dcnode-id="7831" instrument_node="">Five-Power Treaty</span></a><span data-dcnode-id="7829" instrument_node=""> (the </span><i data-dcnode-id="7827"><span data-dcnode-id="7828" instrument_node="">Washington Naval Treaty</span></i><span data-dcnode-id="7826" instrument_node="">), the </span><a data-dcnode-id="7824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nine-Power_Treaty" title="Nine-Power Treaty"><span data-dcnode-id="7825" instrument_node="">Nine-Power Treaty</span></a><span data-dcnode-id="7823" instrument_node="">, and a number of smaller agreements. These treaties preserved peace during the 1920s but were not renewed, as the world scene turned increasingly negative after 1930.</span><sup class="reference" data-dcnode-id="7820" id="cite_ref-99"><a data-dcnode-id="7821" href="#cite_note-99"><span data-dcnode-id="7822" instrument_node="">[99]</span></a></sup><span data-dcnode-id="7819" instrument_node="">
</span></p><span data-dcnode-id="7817" instrument_node="">
</span><h3 data-dcnode-id="7807"><span class="mw-headline" data-dcnode-id="7815" id="Dawes_Plan"><span data-dcnode-id="7816" instrument_node="">Dawes Plan</span></span><span class="mw-editsection" data-dcnode-id="7808"><span class="mw-editsection-bracket" data-dcnode-id="7813"><span data-dcnode-id="7814" instrument_node="">[</span></span><a data-dcnode-id="7811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D29" title="Edit section: Dawes Plan"><span data-dcnode-id="7812" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7809"><span data-dcnode-id="7810" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7806" instrument_node="">
</span><p data-dcnode-id="7773"><span data-dcnode-id="7805" instrument_node="">The Dawes plan was the American solution to the crisis of reparations, in which France was demanding more money than Germany was willing to pay, so France occupied the key industrial Ruhr district of Germany with its army. The </span><a data-dcnode-id="7803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Occupation_of_the_Ruhr" title="Occupation of the Ruhr"><span data-dcnode-id="7804" instrument_node="">Occupation of the Ruhr</span></a><span data-dcnode-id="7802" instrument_node=""> in 1923 Caused an international crisis; Germany deliberately hyperinflated currency, making the occupation highly expensive for France. The crisis was solved by a compromise brokered by the United States in the form of the </span><a data-dcnode-id="7800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dawes_Plan" title="Dawes Plan"><span data-dcnode-id="7801" instrument_node="">Dawes Plan</span></a><span data-dcnode-id="7799" instrument_node=""> in 1924.</span><sup class="reference" data-dcnode-id="7796" id="cite_ref-100"><a data-dcnode-id="7797" href="#cite_note-100"><span data-dcnode-id="7798" instrument_node="">[100]</span></a></sup><span data-dcnode-id="7795" instrument_node=""> This plan, sponsored by American </span><a data-dcnode-id="7793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_G._Dawes" title="Charles G. Dawes"><span data-dcnode-id="7794" instrument_node="">Charles G. Dawes</span></a><span data-dcnode-id="7792" instrument_node="">, set out a new financial scheme. New York banks loaned Germany hundreds of millions of dollars that it used to pay reparations and rebuild its heavy industry. France, Britain and the other countries used the reparations in turn to repay wartime loans they received from the United States. By 1928 Germany called for a new payment plan, resulting in the </span><a data-dcnode-id="7790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Young_Plan" title="Young Plan"><span data-dcnode-id="7791" instrument_node="">Young Plan</span></a><span data-dcnode-id="7789" instrument_node=""> that established the German reparation requirements at 112 billion marks (</span><span data-dcnode-id="7787" style="white-space: nowrap"><span data-dcnode-id="7788" instrument_node="">US$26.3 billion</span></span><span data-dcnode-id="7786" instrument_node="">) and created a schedule of payments that would see Germany complete payments by 1988. With the collapse of the German economy in 1931, reparations were </span><a data-dcnode-id="7784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hoover_Moratorium" title="Hoover Moratorium"><span data-dcnode-id="7785" instrument_node="">suspended for a year</span></a><span data-dcnode-id="7783" instrument_node=""> and in 1932 during the </span><a data-dcnode-id="7781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lausanne_Conference_of_1932" title="Lausanne Conference of 1932"><span data-dcnode-id="7782" instrument_node="">Lausanne Conference</span></a><span data-dcnode-id="7780" instrument_node=""> they were suspended indefinitely. Between 1919 and 1932, Germany paid less than 21 billion marks in reparations. After 1953 West Germany </span><a data-dcnode-id="7778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/London_Agreement_on_German_External_Debts" title="London Agreement on German External Debts"><span data-dcnode-id="7779" instrument_node="">paid the entire remaining balance.</span></a><sup class="reference" data-dcnode-id="7775" id="cite_ref-101"><a data-dcnode-id="7776" href="#cite_note-101"><span data-dcnode-id="7777" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7774" instrument_node="">
</span></p><span data-dcnode-id="7772" instrument_node="">
</span><h3 data-dcnode-id="7762"><span class="mw-headline" data-dcnode-id="7770" id="Mexico"><span data-dcnode-id="7771" instrument_node="">Mexico</span></span><span class="mw-editsection" data-dcnode-id="7763"><span class="mw-editsection-bracket" data-dcnode-id="7768"><span data-dcnode-id="7769" instrument_node="">[</span></span><a data-dcnode-id="7766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D30" title="Edit section: Mexico"><span data-dcnode-id="7767" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7764"><span data-dcnode-id="7765" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7761" instrument_node="">
</span><link data-dcnode-id="7760" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7756" role="note"><span data-dcnode-id="7759" instrument_node="">Further information: </span><a data-dcnode-id="7757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mexico%25E2%2580%2593United_States_relations" title="Mexico–United States relations"><span data-dcnode-id="7758" instrument_node="">Mexico–United States relations</span></a></div><span data-dcnode-id="7755" instrument_node="">
</span><p data-dcnode-id="7729"><span data-dcnode-id="7754" instrument_node="">Since the turmoil of the Mexican revolution had died down, the Harding administration was prepared to normalize relations with Mexico. Between 1911 and 1920, American imports from Mexico increased from $57,000,000 to $179,000,000 and exports from $61,000,000 to $208,000,000. Commerce Secretary </span><a data-dcnode-id="7752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herbert_Hoover" title="Herbert Hoover"><span data-dcnode-id="7753" instrument_node="">Herbert Hoover</span></a><span data-dcnode-id="7751" instrument_node=""> took the lead in order to promote trade and investments other than in oil and land, which had long dominated bilateral economic ties. President </span><a data-dcnode-id="7749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2581lvaro_Obreg%25C3%25B3n" title="Álvaro Obregón"><span data-dcnode-id="7750" instrument_node="">Álvaro Obregón</span></a><span data-dcnode-id="7748" instrument_node=""> assured Americans that they would be protected in Mexico, and Mexico was granted recognition in 1923.</span><sup class="reference" data-dcnode-id="7745" id="cite_ref-102"><a data-dcnode-id="7746" href="#cite_note-102"><span data-dcnode-id="7747" instrument_node="">[102]</span></a></sup><span data-dcnode-id="7744" instrument_node=""> A major crisis erupted in the mid-1930s when the Mexican government expropriated millions of acres of land from hundreds of American property owners as part of President </span><a data-dcnode-id="7742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/L%25C3%25A1zaro_C%25C3%25A1rdenas" title="Lázaro Cárdenas"><span data-dcnode-id="7743" instrument_node="">Lázaro Cárdenas</span></a><span data-dcnode-id="7741" instrument_node="">'s land redistribution program. No compensation was provided to the American owners.</span><sup class="reference" data-dcnode-id="7738" id="cite_ref-103"><a data-dcnode-id="7739" href="#cite_note-103"><span data-dcnode-id="7740" instrument_node="">[103]</span></a></sup><span data-dcnode-id="7737" instrument_node=""> The emerging threat of the Second World War forced the United States to agree to a compromise solution. The US negotiated an agreement with President </span><a data-dcnode-id="7735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manuel_%25C3%2581vila_Camacho" title="Manuel Ávila Camacho"><span data-dcnode-id="7736" instrument_node="">Manuel Avila Camacho</span></a><span data-dcnode-id="7734" instrument_node=""> that amounted to a military alliance.</span><sup class="reference" data-dcnode-id="7731" id="cite_ref-104"><a data-dcnode-id="7732" href="#cite_note-104"><span data-dcnode-id="7733" instrument_node="">[104]</span></a></sup><span data-dcnode-id="7730" instrument_node="">
</span></p><span data-dcnode-id="7728" instrument_node="">
</span><h3 data-dcnode-id="7718"><span class="mw-headline" data-dcnode-id="7726" id="Intervention_ends_in_Latin_America"><span data-dcnode-id="7727" instrument_node="">Intervention ends in Latin America</span></span><span class="mw-editsection" data-dcnode-id="7719"><span class="mw-editsection-bracket" data-dcnode-id="7724"><span data-dcnode-id="7725" instrument_node="">[</span></span><a data-dcnode-id="7722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D31" title="Edit section: Intervention ends in Latin America"><span data-dcnode-id="7723" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7720"><span data-dcnode-id="7721" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7717" instrument_node="">
</span><p data-dcnode-id="7698"><span data-dcnode-id="7716" instrument_node="">Small-scale military interventions continued after 1921 as the </span><a data-dcnode-id="7714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Banana_Wars" title="Banana Wars"><span data-dcnode-id="7715" instrument_node="">Banana Wars</span></a><span data-dcnode-id="7713" instrument_node=""> tapered off. The Hoover administration began a goodwill policy and withdrew all military forces.</span><sup class="reference" data-dcnode-id="7710" id="cite_ref-105"><a data-dcnode-id="7711" href="#cite_note-105"><span data-dcnode-id="7712" instrument_node="">[105]</span></a></sup><span data-dcnode-id="7709" instrument_node=""> President Roosevelt announced the "</span><a data-dcnode-id="7707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Good_Neighbor_policy" title="Good Neighbor policy"><span data-dcnode-id="7708" instrument_node="">Good Neighbor Policy</span></a><span data-dcnode-id="7706" instrument_node="">" by which the United States would no longer intervene to promote good government, but would accept whatever governments were locally chosen. His Secretary of State </span><a data-dcnode-id="7704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cordell_Hull" title="Cordell Hull"><span data-dcnode-id="7705" instrument_node="">Cordell Hull</span></a><span data-dcnode-id="7703" instrument_node=""> endorsed article 8 of the 1933 Montevideo Convention on Rights and Duties of States; it provides that "no state has the right to intervene in the internal or external affairs of another".</span><sup class="reference" data-dcnode-id="7700" id="cite_ref-106"><a data-dcnode-id="7701" href="#cite_note-106"><span data-dcnode-id="7702" instrument_node="">[106]</span></a></sup><span data-dcnode-id="7699" instrument_node="">
</span></p><span data-dcnode-id="7697" instrument_node="">
</span><h2 data-dcnode-id="7686"><span data-dcnode-id="7696" id="Roosevelt.2C_World_War_II.2C_and_its_aftermath:_1933.E2.80.931947"></span><span class="mw-headline" data-dcnode-id="7694" id="Roosevelt,_World_War_II,_and_its_aftermath:_1933–1947"><span data-dcnode-id="7695" instrument_node="">Roosevelt, World War II, and its aftermath: 1933–1947</span></span><span class="mw-editsection" data-dcnode-id="7687"><span class="mw-editsection-bracket" data-dcnode-id="7692"><span data-dcnode-id="7693" instrument_node="">[</span></span><a data-dcnode-id="7690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D32" title="Edit section: Roosevelt, World War II, and its aftermath: 1933–1947"><span data-dcnode-id="7691" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7688"><span data-dcnode-id="7689" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7685" instrument_node="">
</span><link data-dcnode-id="7684" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7680" role="note"><span data-dcnode-id="7683" instrument_node="">Main article: </span><a data-dcnode-id="7681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Franklin_D._Roosevelt_administration" title="Foreign policy of the Franklin D. Roosevelt administration"><span data-dcnode-id="7682" instrument_node="">Foreign policy of the Franklin D. Roosevelt administration</span></a></div><span data-dcnode-id="7679" instrument_node="">
</span><h3 data-dcnode-id="7668"><span data-dcnode-id="7678" id="Spanish_Civil_War:_1936.E2.80.931939"></span><span class="mw-headline" data-dcnode-id="7676" id="Spanish_Civil_War:_1936–1939"><span data-dcnode-id="7677" instrument_node="">Spanish Civil War: 1936–1939</span></span><span class="mw-editsection" data-dcnode-id="7669"><span class="mw-editsection-bracket" data-dcnode-id="7674"><span data-dcnode-id="7675" instrument_node="">[</span></span><a data-dcnode-id="7672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D33" title="Edit section: Spanish Civil War: 1936–1939"><span data-dcnode-id="7673" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7670"><span data-dcnode-id="7671" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7667" instrument_node="">
</span><p data-dcnode-id="7665"><span data-dcnode-id="7666" instrument_node="">In the 1930s, the United States entered the period of deep isolationism, rejecting international conferences, and focusing mostly on reciprocal tariff agreements with smaller countries of Latin America.
</span></p><p data-dcnode-id="7653"><span data-dcnode-id="7664" instrument_node="">When the </span><a data-dcnode-id="7662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spanish_Civil_War" title="Spanish Civil War"><span data-dcnode-id="7663" instrument_node="">Spanish Civil War</span></a><span data-dcnode-id="7661" instrument_node=""> erupted in 1936, the United States remained neutral and banned arms sales to either side. This was in line with both American neutrality policies, and with </span><a data-dcnode-id="7659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-intervention_in_the_Spanish_Civil_War" title="Non-intervention in the Spanish Civil War"><span data-dcnode-id="7660" instrument_node="">a Europe-wide agreement to not sell arms for use in the Spanish war lest it escalate into a world war.</span></a><span data-dcnode-id="7658" instrument_node=""> Congress endorsed the embargo by a near-unanimous vote. Only armaments were embargoed; American companies could sell oil and supplies to both sides of the fight. Roosevelt quietly favored the left-wing Republican (or "Loyalist") government, but intense pressure by American Catholics forced him to maintain a policy of neutrality. The Catholics were outraged by the systematic torture, rape and execution of priests, bishops, and nuns by anarchist elements of the Loyalist coalition. This successful pressure on Roosevelt was one of the handful of foreign policy successes notched by Catholic pressures on the White House in the 20th century.</span><sup class="reference" data-dcnode-id="7655" id="cite_ref-107"><a data-dcnode-id="7656" href="#cite_note-107"><span data-dcnode-id="7657" instrument_node="">[107]</span></a></sup><span data-dcnode-id="7654" instrument_node="">
</span></p><p data-dcnode-id="7638"><span data-dcnode-id="7652" instrument_node="">Germany and Italy provided munitions, and air support, and troops to the </span><a data-dcnode-id="7650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francoist_Spain" title="Francoist Spain"><span data-dcnode-id="7651" instrument_node="">Nationalists</span></a><span data-dcnode-id="7649" instrument_node="">, led by </span><a data-dcnode-id="7647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francisco_Franco" title="Francisco Franco"><span data-dcnode-id="7648" instrument_node="">Francisco Franco</span></a><span data-dcnode-id="7646" instrument_node="">. The Soviet Union provided aid to the Loyalist government, and mobilized thousands of volunteers to fight, including several hundred from the United States in the </span><a data-dcnode-id="7644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lincoln_Battalion" title="Lincoln Battalion"><span data-dcnode-id="7645" instrument_node="">Abraham Lincoln Battalion</span></a><span data-dcnode-id="7643" instrument_node="">. All along the Spanish military forces supported the nationalists, and they steadily pushed the government forces back. By 1938, however, Roosevelt was planning to secretly send American warplanes through France to the desperate Loyalists. His senior diplomats warned that this would worsen the European crisis, so Roosevelt desisted.</span><sup class="reference" data-dcnode-id="7640" id="cite_ref-108"><a data-dcnode-id="7641" href="#cite_note-108"><span data-dcnode-id="7642" instrument_node="">[108]</span></a></sup><span data-dcnode-id="7639" instrument_node="">
</span></p><p data-dcnode-id="7630"><a data-dcnode-id="7636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adolf_Hitler" title="Adolf Hitler"><span data-dcnode-id="7637" instrument_node="">Adolf Hitler</span></a><span data-dcnode-id="7635" instrument_node=""> and Franco mutually disliked one another, and Franco repeatedly manipulated Hitler for his own benefit during World War II. Franco sheltered Jewish refugees escaping through France and never turned over the Spanish Jews to Nazi Germany as requested, and when during the Second World War the Blue Division was dispatched to help the Germans, it was forbidden to fight against the Western Allies, and was limited only to fighting the Soviets.</span><sup class="reference" data-dcnode-id="7632" id="cite_ref-109"><a data-dcnode-id="7633" href="#cite_note-109"><span data-dcnode-id="7634" instrument_node="">[109]</span></a></sup><span data-dcnode-id="7631" instrument_node="">
</span></p><span data-dcnode-id="7629" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7611"><div class="thumbinner" data-dcnode-id="7612" style="width:502px;"><a class="image" data-dcnode-id="7627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMap_of_participants_in_World_War_II.svg"><img alt="" class="thumbimage" data-dcnode-id="7628" data-file-height="317" data-file-width="512" decoding="async" height="310" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Map_of_participants_in_World_War_II.svg/500px-Map_of_participants_in_World_War_II.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Map_of_participants_in_World_War_II.svg/750px-Map_of_participants_in_World_War_II.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Map_of_participants_in_World_War_II.svg/1000px-Map_of_participants_in_World_War_II.svg.png 2x" width="500"></a><span data-dcnode-id="7626" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7613"><div class="magnify" data-dcnode-id="7624"><a class="internal" data-dcnode-id="7625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMap_of_participants_in_World_War_II.svg" title="Enlarge"></a></div><span data-dcnode-id="7623" instrument_node="">The two alliances of </span><a data-dcnode-id="7621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="7622" instrument_node="">World War II</span></a><span data-dcnode-id="7620" instrument_node="">, with the </span><a data-dcnode-id="7618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Axis_powers" title="Axis powers"><span data-dcnode-id="7619" instrument_node="">Axis Powers</span></a><span data-dcnode-id="7617" instrument_node=""> in blue and the </span><a data-dcnode-id="7615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allies_of_World_War_II" title="Allies of World War II"><span data-dcnode-id="7616" instrument_node="">Allied Powers</span></a><span data-dcnode-id="7614" instrument_node=""> in green</span></div></div></div><span data-dcnode-id="7610" instrument_node="">
</span><h3 data-dcnode-id="7599"><span data-dcnode-id="7609" id="Coming_of_War:_1937.E2.80.931941"></span><span class="mw-headline" data-dcnode-id="7607" id="Coming_of_War:_1937–1941"><span data-dcnode-id="7608" instrument_node="">Coming of War: 1937–1941</span></span><span class="mw-editsection" data-dcnode-id="7600"><span class="mw-editsection-bracket" data-dcnode-id="7605"><span data-dcnode-id="7606" instrument_node="">[</span></span><a data-dcnode-id="7603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D34" title="Edit section: Coming of War: 1937–1941"><span data-dcnode-id="7604" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7601"><span data-dcnode-id="7602" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7598" instrument_node="">
</span><link data-dcnode-id="7597" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7593" role="note"><span data-dcnode-id="7596" instrument_node="">Further information: </span><a data-dcnode-id="7594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Causes_of_World_War_II" title="Causes of World War II"><span data-dcnode-id="7595" instrument_node="">Causes of World War II</span></a></div><span data-dcnode-id="7592" instrument_node="">
</span><p data-dcnode-id="7570"><span data-dcnode-id="7591" instrument_node="">President Roosevelt tried to avoid repeating what he saw as Woodrow Wilson's mistakes in World War I.</span><sup class="reference" data-dcnode-id="7588" id="cite_ref-110"><a data-dcnode-id="7589" href="#cite_note-110"><span data-dcnode-id="7590" instrument_node="">[110]</span></a></sup><span data-dcnode-id="7587" instrument_node=""> He often made exactly the opposite decision. Wilson called for neutrality in thought and deed, while Roosevelt made it clear his administration strongly favored Britain and China. Unlike the loans in World War I, the United States made large-scale grants of military and economic aid to the Allies through </span><a data-dcnode-id="7585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lend-Lease" title="Lend-Lease"><span data-dcnode-id="7586" instrument_node="">Lend-Lease</span></a><span data-dcnode-id="7584" instrument_node="">, with little expectation of repayment. Wilson did not greatly expand war production before the declaration of war; Roosevelt did. Wilson waited for the declaration to begin a draft; Roosevelt started one in 1940. Wilson never made the United States an official ally but Roosevelt did. Wilson never met with the top Allied leaders but Roosevelt did. Wilson proclaimed independent policy, as seen in the 14 Points, while Roosevelt always had a collaborative policy with the Allies. In 1917, the United States declared war on Germany; in 1941, Roosevelt waited until the enemy attacked at Pearl Harbor. Wilson refused to collaborate with the Republicans; Roosevelt named leading Republicans to head the War Department and the Navy Department. Wilson let General John J. Pershing make the major military decisions; Roosevelt made the major decisions in his war including the "</span><a data-dcnode-id="7582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe_first" title="Europe first"><span data-dcnode-id="7583" instrument_node="">Europe first</span></a><span data-dcnode-id="7581" instrument_node="">" strategy. He rejected the idea of an armistice and demanded unconditional surrender. Roosevelt often mentioned his role in the Wilson administration, but added that he had profited more from Wilson's errors than from his successes.</span><sup class="reference" data-dcnode-id="7578" id="cite_ref-111"><a data-dcnode-id="7579" href="#cite_note-111"><span data-dcnode-id="7580" instrument_node="">[111]</span></a></sup><sup class="reference" data-dcnode-id="7575" id="cite_ref-112"><a data-dcnode-id="7576" href="#cite_note-112"><span data-dcnode-id="7577" instrument_node="">[112]</span></a></sup><sup class="reference" data-dcnode-id="7572" id="cite_ref-113"><a data-dcnode-id="7573" href="#cite_note-113"><span data-dcnode-id="7574" instrument_node="">[113]</span></a></sup><span data-dcnode-id="7571" instrument_node="">
</span></p><span data-dcnode-id="7569" instrument_node="">
</span><h4 data-dcnode-id="7559"><span class="mw-headline" data-dcnode-id="7567" id="Pearl_Harbor_was_unpredictable"><span data-dcnode-id="7568" instrument_node="">Pearl Harbor was unpredictable</span></span><span class="mw-editsection" data-dcnode-id="7560"><span class="mw-editsection-bracket" data-dcnode-id="7565"><span data-dcnode-id="7566" instrument_node="">[</span></span><a data-dcnode-id="7563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D35" title="Edit section: Pearl Harbor was unpredictable"><span data-dcnode-id="7564" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7561"><span data-dcnode-id="7562" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7558" instrument_node="">
</span><link data-dcnode-id="7557" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7550" role="note"><span data-dcnode-id="7556" instrument_node="">Main articles: </span><a data-dcnode-id="7554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Attack_on_Pearl_Harbor" title="Attack on Pearl Harbor"><span data-dcnode-id="7555" instrument_node="">Attack on Pearl Harbor</span></a><span data-dcnode-id="7553" instrument_node=""> and </span><a data-dcnode-id="7551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pearl_Harbor_advance-knowledge_conspiracy_theory" title="Pearl Harbor advance-knowledge conspiracy theory"><span data-dcnode-id="7552" instrument_node="">Pearl Harbor advance-knowledge conspiracy theory</span></a></div><span data-dcnode-id="7549" instrument_node="">
</span><p data-dcnode-id="7528"><span data-dcnode-id="7548" instrument_node="">Political scientist </span><a data-dcnode-id="7546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roberta_Wohlstetter" title="Roberta Wohlstetter"><span data-dcnode-id="7547" instrument_node="">Roberta Wohlstetter</span></a><span data-dcnode-id="7545" instrument_node=""> explores why all American intelligence agencies failed to predict the attack on Pearl Harbor. The basic reason was that the Japanese plans were a very closely held secret. The attack fleet kept radio silence and was not spotted by anyone en route to Hawaii. There were air patrols over Hawaii, but they were too few and too ineffective to scan a vast ocean. Japan Navy spread false information—using fake radio signals—to indicate the main fleet was in Japanese waters, and suggested their main threat was north toward Russia. The U.S. had </span><a data-dcnode-id="7543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magic_%28cryptography%29" title="Magic (cryptography)"><span data-dcnode-id="7544" instrument_node="">MAGIC</span></a><span data-dcnode-id="7542" instrument_node="">, which successfully cracked the Japanese diplomatic code. However, the Japanese Foreign Ministry and its diplomats were deliberately never told about the upcoming attack, so American intelligence was wasting its time trying to discover secrets through MAGIC. American intelligence expected attacks against British and Dutch possessions, and were looking for those clues. At Pearl Harbor, they focused on predicting local sabotage. There was no overall American intelligence center until the formation in 1942 of the </span><a data-dcnode-id="7540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Office_of_Strategic_Services" title="Office of Strategic Services"><span data-dcnode-id="7541" instrument_node="">Office of Strategic Services</span></a><span data-dcnode-id="7539" instrument_node="">. It was the forerunner of the </span><a data-dcnode-id="7537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Intelligence_Agency" title="Central Intelligence Agency"><span data-dcnode-id="7538" instrument_node="">Central Intelligence Agency</span></a><span data-dcnode-id="7536" instrument_node=""> (CIA). In 1941 there was no coordination of the information coming in from the Army, Navy, and State department as well as from the British and Dutch allies. The system of notification was also flawed, and what the sender thought was an urgent message did not appear urgent to the recipient. After the attack, congressional investigators identified and linked together all sorts of small little signals pointing to an attack, while they discarded signals pointing in other directions. Even in hindsight there was so much confusion, noise, and poor coordination that Wohlstetter concludes no accurate predictions of the attack on Pearl Harbor was at all likely before December 7.</span><sup class="reference" data-dcnode-id="7533" id="cite_ref-114"><a data-dcnode-id="7534" href="#cite_note-114"><span data-dcnode-id="7535" instrument_node="">[114]</span></a></sup><sup class="reference" data-dcnode-id="7530" id="cite_ref-115"><a data-dcnode-id="7531" href="#cite_note-115"><span data-dcnode-id="7532" instrument_node="">[115]</span></a></sup><span data-dcnode-id="7529" instrument_node="">
</span></p><span data-dcnode-id="7527" instrument_node="">
</span><h3 data-dcnode-id="7517"><span class="mw-headline" data-dcnode-id="7525" id="World_War_II"><span data-dcnode-id="7526" instrument_node="">World War II</span></span><span class="mw-editsection" data-dcnode-id="7518"><span class="mw-editsection-bracket" data-dcnode-id="7523"><span data-dcnode-id="7524" instrument_node="">[</span></span><a data-dcnode-id="7521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D36" title="Edit section: World War II"><span data-dcnode-id="7522" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7519"><span data-dcnode-id="7520" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7516" instrument_node="">
</span><link data-dcnode-id="7515" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7508" role="note"><span data-dcnode-id="7514" instrument_node="">Further information: </span><a data-dcnode-id="7512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diplomatic_history_of_World_War_II" title="Diplomatic history of World War II"><span data-dcnode-id="7513" instrument_node="">Diplomatic history of World War II</span></a><span data-dcnode-id="7511" instrument_node=""> and </span><a data-dcnode-id="7509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Franklin_D._Roosevelt_administration%23World_War_II_1941%25E2%2580%25931945" title="Foreign policy of the Franklin D. Roosevelt administration"><span data-dcnode-id="7510" instrument_node="">Foreign policy of the Franklin D. Roosevelt administration §&nbsp;World War II 1941–1945</span></a></div><span data-dcnode-id="7507" instrument_node="">
</span><p data-dcnode-id="7492"><span data-dcnode-id="7506" instrument_node="">The same pattern which emerged with the first world war continued with the second: warring European powers, blockades, official U.S. neutrality but this time President Roosevelt tried to avoid all of Wilson's mistakes. American policy substantially favored Britain and its allies, and the U.S. getting caught up in the war. Unlike the loans in World War I, the United States made large-scale grants of military and economic aid to the Allies through </span><a data-dcnode-id="7504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lend-Lease" title="Lend-Lease"><span data-dcnode-id="7505" instrument_node="">Lend-Lease</span></a><span data-dcnode-id="7503" instrument_node="">. Industries greatly expanded to produce war materials. The United States officially entered World War II against Germany, Japan, and Italy in December 1941, following the Japanese surprise </span><a data-dcnode-id="7501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Attack_on_Pearl_Harbor" title="Attack on Pearl Harbor"><span data-dcnode-id="7502" instrument_node="">attack on Pearl Harbor</span></a><span data-dcnode-id="7500" instrument_node="">. This time the U.S. was a full-fledged member of the </span><a data-dcnode-id="7498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allies_of_World_War_II" title="Allies of World War II"><span data-dcnode-id="7499" instrument_node="">Allies of World War II</span></a><span data-dcnode-id="7497" instrument_node="">, not just an "associate" as in the first war. During the war, the U.S. conducted military operations on both the Atlantic and Pacific fronts. After the war and devastation of its European and Asian rivals, the United States found itself in a uniquely powerful position due to its enormous economic and military power .</span><sup class="reference" data-dcnode-id="7494" id="cite_ref-116"><a data-dcnode-id="7495" href="#cite_note-116"><span data-dcnode-id="7496" instrument_node="">[116]</span></a></sup><span data-dcnode-id="7493" instrument_node="">
</span></p><p data-dcnode-id="7466"><span data-dcnode-id="7491" instrument_node="">The major diplomatic decisions, especially relations with Britain, the Soviet Union, France and China, were handled in the White House by President Roosevelt and his top aide </span><a data-dcnode-id="7489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harry_Hopkins" title="Harry Hopkins"><span data-dcnode-id="7490" instrument_node="">Harry Hopkins</span></a><span data-dcnode-id="7488" instrument_node="">.</span><sup class="reference" data-dcnode-id="7485" id="cite_ref-117"><a data-dcnode-id="7486" href="#cite_note-117"><span data-dcnode-id="7487" instrument_node="">[117]</span></a></sup><sup class="reference" data-dcnode-id="7482" id="cite_ref-118"><a data-dcnode-id="7483" href="#cite_note-118"><span data-dcnode-id="7484" instrument_node="">[118]</span></a></sup><span data-dcnode-id="7481" instrument_node=""> Secretary of State </span><a data-dcnode-id="7479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cordell_Hull" title="Cordell Hull"><span data-dcnode-id="7480" instrument_node="">Cordell Hull</span></a><span data-dcnode-id="7478" instrument_node=""> handled minor routine affairs.</span><sup class="reference" data-dcnode-id="7475" id="cite_ref-119"><a data-dcnode-id="7476" href="#cite_note-119"><span data-dcnode-id="7477" instrument_node="">[119]</span></a></sup><span data-dcnode-id="7474" instrument_node=""> The one State Department official Roosevelt depended upon was strategist </span><a data-dcnode-id="7472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sumner_Welles" title="Sumner Welles"><span data-dcnode-id="7473" instrument_node="">Sumner Welles</span></a><span data-dcnode-id="7471" instrument_node="">, whom Hull drove out of office in 1943.</span><sup class="reference" data-dcnode-id="7468" id="cite_ref-120"><a data-dcnode-id="7469" href="#cite_note-120"><span data-dcnode-id="7470" instrument_node="">[120]</span></a></sup><span data-dcnode-id="7467" instrument_node="">
</span></p><span data-dcnode-id="7465" instrument_node="">
</span><h3 data-dcnode-id="7455"><span class="mw-headline" data-dcnode-id="7463" id="Postwar_peace"><span data-dcnode-id="7464" instrument_node="">Postwar peace</span></span><span class="mw-editsection" data-dcnode-id="7456"><span class="mw-editsection-bracket" data-dcnode-id="7461"><span data-dcnode-id="7462" instrument_node="">[</span></span><a data-dcnode-id="7459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D37" title="Edit section: Postwar peace"><span data-dcnode-id="7460" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7457"><span data-dcnode-id="7458" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7454" instrument_node="">
</span><link data-dcnode-id="7453" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7446" role="note"><span data-dcnode-id="7452" instrument_node="">Further information: </span><a data-dcnode-id="7450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aftermath_of_World_War_II" title="Aftermath of World War II"><span data-dcnode-id="7451" instrument_node="">Aftermath of World War II</span></a><span data-dcnode-id="7449" instrument_node=""> and </span><a data-dcnode-id="7447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Harry_S._Truman_administration%23Postwar_international_order" title="Foreign policy of the Harry S. Truman administration"><span data-dcnode-id="7448" instrument_node="">Foreign policy of the Harry S. Truman administration §&nbsp;Postwar international order</span></a></div><span data-dcnode-id="7445" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7433"><div class="thumbinner" data-dcnode-id="7434" style="width:172px;"><a class="image" data-dcnode-id="7443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUnited_Nations_Building_3.jpg"><img alt="Picture of UN building in New York" class="thumbimage" data-dcnode-id="7444" data-file-height="2048" data-file-width="1536" decoding="async" height="227" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0d/United_Nations_Building_3.jpg/170px-United_Nations_Building_3.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0d/United_Nations_Building_3.jpg/255px-United_Nations_Building_3.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0d/United_Nations_Building_3.jpg/340px-United_Nations_Building_3.jpg 2x" width="170"></a><span data-dcnode-id="7442" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7435"><div class="magnify" data-dcnode-id="7440"><a class="internal" data-dcnode-id="7441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUnited_Nations_Building_3.jpg" title="Enlarge"></a></div><span data-dcnode-id="7439" instrument_node="">The major long-term goal of Roosevelt's foreign policy during the war was creating a </span><a data-dcnode-id="7437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="7438" instrument_node="">United Nations</span></a><span data-dcnode-id="7436" instrument_node=""> to resolve all world problems</span></div></div></div><span data-dcnode-id="7432" instrument_node="">
</span><p data-dcnode-id="7427"><span data-dcnode-id="7431" instrument_node="">After 1945, the </span><a data-dcnode-id="7429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isolationism" title="Isolationism"><span data-dcnode-id="7430" instrument_node="">isolationist</span></a><span data-dcnode-id="7428" instrument_node=""> pattern that characterized the inter-war period had ended for good. Roosevelt policy supported a new international organization that would be much more effective than the old League of Nations, and avoid its flaws. He successfully sponsored the formation of the United Nations.
</span></p><span data-dcnode-id="7426" instrument_node="">
</span><h4 data-dcnode-id="7416"><span class="mw-headline" data-dcnode-id="7424" id="United_Nations"><span data-dcnode-id="7425" instrument_node="">United Nations</span></span><span class="mw-editsection" data-dcnode-id="7417"><span class="mw-editsection-bracket" data-dcnode-id="7422"><span data-dcnode-id="7423" instrument_node="">[</span></span><a data-dcnode-id="7420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D38" title="Edit section: United Nations"><span data-dcnode-id="7421" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7418"><span data-dcnode-id="7419" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7415" instrument_node="">
