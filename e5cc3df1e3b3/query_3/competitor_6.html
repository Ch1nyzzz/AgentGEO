</span><link data-dcnode-id="7414" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7410" role="note"><span data-dcnode-id="7413" instrument_node="">Main article: </span><a data-dcnode-id="7411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_and_the_United_Nations" title="United States and the United Nations"><span data-dcnode-id="7412" instrument_node="">United States and the United Nations</span></a></div><span data-dcnode-id="7409" instrument_node="">
</span><p data-dcnode-id="7394"><span data-dcnode-id="7408" instrument_node="">The United States was a major force in establishing the </span><a data-dcnode-id="7406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="7407" instrument_node="">United Nations</span></a><span data-dcnode-id="7405" instrument_node=""> in 1945, hosting a meeting of fifty nations in San Francisco. Avoiding the rancorous debates of 1919, where there was no veto, the US and the Soviet Union, as well as Britain, France and China, became permanent members of the </span><a data-dcnode-id="7403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Security_Council" title="United Nations Security Council"><span data-dcnode-id="7404" instrument_node="">Security Council</span></a><span data-dcnode-id="7402" instrument_node=""> with veto power. The idea of the U.N. was to promote world peace through consensus among nations, with boycotts, sanctions and even military power exercised by the Security Council. It depended on member governments for funds and had difficulty funding its budget. In 2009, its $5 billion budget was funded using a complex formula based on </span><a data-dcnode-id="7400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gross_domestic_product" title="Gross domestic product"><span data-dcnode-id="7401" instrument_node="">GDP</span></a><span data-dcnode-id="7399" instrument_node="">; the U.S. contributed 20% in 2009. However, the United Nations' vision of peace soon became jeopardized as the international structure was rebalanced with the development and testing of nuclear weapons by major powers.</span><sup class="reference" data-dcnode-id="7396" id="cite_ref-121"><a data-dcnode-id="7397" href="#cite_note-121"><span data-dcnode-id="7398" instrument_node="">[121]</span></a></sup><span data-dcnode-id="7395" instrument_node="">
</span></p><span data-dcnode-id="7393" instrument_node="">
</span><h2 data-dcnode-id="7383"><span class="mw-headline" data-dcnode-id="7391" id="South_in_foreign_policy"><span data-dcnode-id="7392" instrument_node="">South in foreign policy</span></span><span class="mw-editsection" data-dcnode-id="7384"><span class="mw-editsection-bracket" data-dcnode-id="7389"><span data-dcnode-id="7390" instrument_node="">[</span></span><a data-dcnode-id="7387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D39" title="Edit section: South in foreign policy"><span data-dcnode-id="7388" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7385"><span data-dcnode-id="7386" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7382" instrument_node="">
</span><p data-dcnode-id="7354"><span data-dcnode-id="7381" instrument_node="">The South always had a strong, aggressive interest in foreign affairs, especially regarding expansion to the Southwest and the importance of foreign markets for Southern exports of cotton, tobacco and oil.</span><sup class="reference" data-dcnode-id="7378" id="cite_ref-122"><a data-dcnode-id="7379" href="#cite_note-122"><span data-dcnode-id="7380" instrument_node="">[122]</span></a></sup><span data-dcnode-id="7377" instrument_node="">  All the southern colonies supported the American Revolution, with Virginia taking a leading position. The South generally supported the </span><a data-dcnode-id="7375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_of_1812" title="War of 1812"><span data-dcnode-id="7376" instrument_node="">War of 1812</span></a><span data-dcnode-id="7374" instrument_node="">, in sharp distinction to the strong opposition in the Northeast. Southern Democrats took the lead and support of </span><a data-dcnode-id="7372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Texas_annexation" title="Texas annexation"><span data-dcnode-id="7373" instrument_node="">Texas annexation</span></a><span data-dcnode-id="7371" instrument_node="">, and the war with Mexico.</span><sup class="reference" data-dcnode-id="7368" id="cite_ref-123"><a data-dcnode-id="7369" href="#cite_note-123"><span data-dcnode-id="7370" instrument_node="">[123]</span></a></sup><span data-dcnode-id="7367" instrument_node="">  Low tariff policy was a priority,with the partial exception of the sugar region of Louisiana. Throughout southern history, exports were the main foundation of the southern economy, starting with tobacco, rice and indigo in the colonial period. After 1800 cotton comprised the chief export of the United States .  Confederates thought (mistakenly) that European need for cotton would require intervention to help the South, for “Cotton is King.”</span><sup class="reference" data-dcnode-id="7364" id="cite_ref-124"><a data-dcnode-id="7365" href="#cite_note-124"><span data-dcnode-id="7366" instrument_node="">[124]</span></a></sup><span data-dcnode-id="7363" instrument_node=""> </span><sup class="reference" data-dcnode-id="7360" id="cite_ref-125"><a data-dcnode-id="7361" href="#cite_note-125"><span data-dcnode-id="7362" instrument_node="">[125]</span></a></sup><span data-dcnode-id="7359" instrument_node=""> Southerners calculated their need for international markets called for aggressive internationalist foreign policies.</span><sup class="reference" data-dcnode-id="7356" id="cite_ref-126"><a data-dcnode-id="7357" href="#cite_note-126"><span data-dcnode-id="7358" instrument_node="">[126]</span></a></sup><span data-dcnode-id="7355" instrument_node="">
</span></p><p data-dcnode-id="7302"><a data-dcnode-id="7352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Woodrow_Wilson_administration" title="Foreign policy of the Woodrow Wilson administration"><span data-dcnode-id="7353" instrument_node="">Woodrow Wilson</span></a><span data-dcnode-id="7351" instrument_node=""> had a strong base in the south for his foreign policy regarding World War I and the League of Nations.</span><sup class="reference" data-dcnode-id="7348" id="cite_ref-127"><a data-dcnode-id="7349" href="#cite_note-127"><span data-dcnode-id="7350" instrument_node="">[127]</span></a></sup><span data-dcnode-id="7347" instrument_node=""> In the late 1930s, Southern Conservative Democrats opposed the domestic policies of the New Deal but strongly supported Franklin Roosevelt's internationalist foreign policy</span><sup class="reference" data-dcnode-id="7344" id="cite_ref-128"><a data-dcnode-id="7345" href="#cite_note-128"><span data-dcnode-id="7346" instrument_node="">[128]</span></a></sup><span data-dcnode-id="7343" instrument_node="">. Historians have given various explanations for this characteristic. The region had a strong military tradition.</span><sup class="reference" data-dcnode-id="7340" id="cite_ref-129"><a data-dcnode-id="7341" href="#cite_note-129"><span data-dcnode-id="7342" instrument_node="">[129]</span></a></sup><span data-dcnode-id="7339" instrument_node=""> For example, General </span><a class="mw-redirect" data-dcnode-id="7337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Marshall" title="George Marshall"><span data-dcnode-id="7338" instrument_node="">George Marshall</span></a><span data-dcnode-id="7336" instrument_node="">, a graduate of </span><a data-dcnode-id="7334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virginia_Military_Institute" title="Virginia Military Institute"><span data-dcnode-id="7335" instrument_node="">Virginia Military Institute</span></a><span data-dcnode-id="7333" instrument_node=""> is famous for the </span><a data-dcnode-id="7331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marshall_Plan" title="Marshall Plan"><span data-dcnode-id="7332" instrument_node="">Marshall Plan</span></a><span data-dcnode-id="7330" instrument_node=""> to rebuild Europe after World War I.  Rather than pacifism, the South fostered chivalry and honor, pride in its fighting ability, and indifference to violence.</span><sup class="reference" data-dcnode-id="7327" id="cite_ref-130"><a data-dcnode-id="7328" href="#cite_note-130"><span data-dcnode-id="7329" instrument_node="">[130]</span></a></sup><span data-dcnode-id="7326" instrument_node=""> In the 1930s isolationism and America First attitudes were weakest in the South, and internationalism strongest there.  Virginia Senator Carter Glass proclaimed in May, 1941: "Virginia has always been a leader in the vanguard of the fight for freedom. She is ready today as in the past to give virile leadership to the nation.” </span><sup class="reference" data-dcnode-id="7323" id="cite_ref-131"><a data-dcnode-id="7324" href="#cite_note-131"><span data-dcnode-id="7325" instrument_node="">[131]</span></a></sup><span data-dcnode-id="7322" instrument_node="">  There were some dissenters from aggression such as </span><a data-dcnode-id="7320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J._William_Fulbright" title="J. William Fulbright"><span data-dcnode-id="7321" instrument_node="">J. William Fulbright</span></a><span data-dcnode-id="7319" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="7317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Luther_King%2C_Jr." title="Martin Luther King, Jr."><span data-dcnode-id="7318" instrument_node="">Martin Luther King, Jr.</span></a><span data-dcnode-id="7316" instrument_node=""> who opposed the </span><a class="mw-redirect" data-dcnode-id="7314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_war" title="Vietnam war"><span data-dcnode-id="7315" instrument_node="">Vietnam war</span></a><span data-dcnode-id="7313" instrument_node=""> of </span><a class="mw-redirect" data-dcnode-id="7311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lyndon_Johnson" title="Lyndon Johnson"><span data-dcnode-id="7312" instrument_node="">Lyndon Johnson</span></a><span data-dcnode-id="7310" instrument_node=""> (Texas) and Secretary of State </span><a data-dcnode-id="7308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dean_Rusk" title="Dean Rusk"><span data-dcnode-id="7309" instrument_node="">Dean Rusk</span></a><span data-dcnode-id="7307" instrument_node=""> (Georgia), but that war was generally more popular in the South.</span><sup class="reference" data-dcnode-id="7304" id="cite_ref-132"><a data-dcnode-id="7305" href="#cite_note-132"><span data-dcnode-id="7306" instrument_node="">[132]</span></a></sup><span data-dcnode-id="7303" instrument_node="">
</span></p><span data-dcnode-id="7301" instrument_node="">
</span><h2 data-dcnode-id="7290"><span data-dcnode-id="7300" id="Cold_War:_1947.E2.80.931991"></span><span class="mw-headline" data-dcnode-id="7298" id="Cold_War:_1947–1991"><span data-dcnode-id="7299" instrument_node="">Cold War: 1947–1991</span></span><span class="mw-editsection" data-dcnode-id="7291"><span class="mw-editsection-bracket" data-dcnode-id="7296"><span data-dcnode-id="7297" instrument_node="">[</span></span><a data-dcnode-id="7294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D40" title="Edit section: Cold War: 1947–1991"><span data-dcnode-id="7295" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7292"><span data-dcnode-id="7293" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7289" instrument_node="">
</span><link data-dcnode-id="7288" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7284" role="note"><span data-dcnode-id="7287" instrument_node="">Main article: </span><a data-dcnode-id="7285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="7286" instrument_node="">Cold War</span></a></div><span data-dcnode-id="7283" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7256"><div class="thumbinner" data-dcnode-id="7257" style="width:442px;"><a class="image" data-dcnode-id="7281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACold_War_Map_1980.svg"><img alt="" class="thumbimage" data-dcnode-id="7282" data-file-height="477" data-file-width="940" decoding="async" height="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Cold_War_Map_1980.svg/440px-Cold_War_Map_1980.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Cold_War_Map_1980.svg/660px-Cold_War_Map_1980.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Cold_War_Map_1980.svg/880px-Cold_War_Map_1980.svg.png 2x" width="440"></a><span data-dcnode-id="7280" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7258"><div class="magnify" data-dcnode-id="7278"><a class="internal" data-dcnode-id="7279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACold_War_Map_1980.svg" title="Enlarge"></a></div><span data-dcnode-id="7277" instrument_node="">Map of </span><a data-dcnode-id="7275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="7276" instrument_node="">Cold War</span></a><span data-dcnode-id="7274" instrument_node=""> alliances in 1980, with </span><a data-dcnode-id="7272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="7273" instrument_node="">NATO</span></a><span data-dcnode-id="7271" instrument_node=""> and other U.S. allies in blue, the </span><a data-dcnode-id="7269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact" title="Warsaw Pact"><span data-dcnode-id="7270" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="7268" instrument_node=""> and allies of the </span><a data-dcnode-id="7266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="7267" instrument_node="">Soviet Union</span></a><span data-dcnode-id="7265" instrument_node=""> in red or pink, </span><a data-dcnode-id="7263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="7264" instrument_node="">China</span></a><span data-dcnode-id="7262" instrument_node=""> and its allies in yellow, and </span><a data-dcnode-id="7260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-Aligned_Movement" title="Non-Aligned Movement"><span data-dcnode-id="7261" instrument_node="">non-aligned nations</span></a><span data-dcnode-id="7259" instrument_node=""> in light blue</span></div></div></div><span data-dcnode-id="7255" instrument_node="">
</span><h3 data-dcnode-id="7245"><span class="mw-headline" data-dcnode-id="7253" id="Truman_and_Eisenhower"><span data-dcnode-id="7254" instrument_node="">Truman and Eisenhower</span></span><span class="mw-editsection" data-dcnode-id="7246"><span class="mw-editsection-bracket" data-dcnode-id="7251"><span data-dcnode-id="7252" instrument_node="">[</span></span><a data-dcnode-id="7249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D41" title="Edit section: Truman and Eisenhower"><span data-dcnode-id="7250" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7247"><span data-dcnode-id="7248" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7244" instrument_node="">
</span><link data-dcnode-id="7243" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7236" role="note"><span data-dcnode-id="7242" instrument_node="">Main articles: </span><a data-dcnode-id="7240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Harry_S._Truman_administration" title="Foreign policy of the Harry S. Truman administration"><span data-dcnode-id="7241" instrument_node="">Foreign policy of the Harry S. Truman administration</span></a><span data-dcnode-id="7239" instrument_node=""> and </span><a data-dcnode-id="7237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Dwight_D._Eisenhower_administration" title="Foreign policy of the Dwight D. Eisenhower administration"><span data-dcnode-id="7238" instrument_node="">Foreign policy of the Dwight D. Eisenhower administration</span></a></div><span data-dcnode-id="7235" instrument_node="">
</span><p data-dcnode-id="7223"><span data-dcnode-id="7234" instrument_node="">From the late 1940s until 1991, world affairs were dominated by the </span><a data-dcnode-id="7232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="7233" instrument_node="">Cold War</span></a><span data-dcnode-id="7231" instrument_node="">, in which the U.S. and its allies faced the Soviet Union and its allies. There was no large-scale fighting but instead numerous regional wars as well as the ever-present threat of a catastrophic nuclear war.</span><sup class="reference" data-dcnode-id="7228" id="cite_ref-133"><a data-dcnode-id="7229" href="#cite_note-133"><span data-dcnode-id="7230" instrument_node="">[133]</span></a></sup><sup class="reference" data-dcnode-id="7225" id="cite_ref-134"><a data-dcnode-id="7226" href="#cite_note-134"><span data-dcnode-id="7227" instrument_node="">[134]</span></a></sup><span data-dcnode-id="7224" instrument_node="">
</span></p><p data-dcnode-id="7200"><span data-dcnode-id="7222" instrument_node="">In 1948 the United States enacted the </span><a data-dcnode-id="7220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marshall_Plan" title="Marshall Plan"><span data-dcnode-id="7221" instrument_node="">Marshall Plan</span></a><span data-dcnode-id="7219" instrument_node="">, which supplied Western Europe—including Germany—with US$13 billion in reconstruction aid. Stalin vetoed any participation by East European nations. A similar program was operated by the United States to restore the Japanese economy. The U.S. actively sought allies, which it subsidized with military and economic "foreign aid", as well as diplomatic support. The main diplomatic initiative was the establishment of the </span><a data-dcnode-id="7217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="7218" instrument_node="">North Atlantic Treaty Organization</span></a><span data-dcnode-id="7216" instrument_node=""> (NATO) in 1949, committing the United States to nuclear defense of Western Europe, which engaged in a military buildup under NATO's supervision. The result was peace in Europe, coupled with the fear of Soviet invasion and a reliance on American protection.</span><sup class="reference" data-dcnode-id="7213" id="cite_ref-135"><a data-dcnode-id="7214" href="#cite_note-135"><span data-dcnode-id="7215" instrument_node="">[135]</span></a></sup><span data-dcnode-id="7212" instrument_node=""> In the 1950s, a number of other less successful regional alliances were developed by the United States, such as the </span><a data-dcnode-id="7210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southeast_Asia_Treaty_Organization" title="Southeast Asia Treaty Organization"><span data-dcnode-id="7211" instrument_node="">Southeast Asia Treaty Organization</span></a><span data-dcnode-id="7209" instrument_node=""> (SEATO). Economic and propaganda warfare against the communist world was part of the American toolbox.</span><sup class="reference" data-dcnode-id="7206" id="cite_ref-136"><a data-dcnode-id="7207" href="#cite_note-136"><span data-dcnode-id="7208" instrument_node="">[136]</span></a></sup><span data-dcnode-id="7205" instrument_node=""> The United States operated a worldwide network of bases for its Army, Navy and Air Force, with large contingents stationed in Germany, Japan and South Korea.</span><sup class="reference" data-dcnode-id="7202" id="cite_ref-137"><a data-dcnode-id="7203" href="#cite_note-137"><span data-dcnode-id="7204" instrument_node="">[137]</span></a></sup><span data-dcnode-id="7201" instrument_node="">
</span></p><p data-dcnode-id="7180"><span data-dcnode-id="7199" instrument_node="">Most nations aligned with either the Western or Eastern camp, but after 1960 the Soviets broke with China as the Communist movement worldwide became divided. Some countries, such as India and Yugoslavia, tried to be neutral. Rejecting the </span><a data-dcnode-id="7197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rollback" title="Rollback"><span data-dcnode-id="7198" instrument_node="">rollback</span></a><span data-dcnode-id="7196" instrument_node=""> of Communism by force because it risked nuclear war, Washington developed a new strategy called </span><a data-dcnode-id="7194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Containment" title="Containment"><span data-dcnode-id="7195" instrument_node="">containment</span></a><span data-dcnode-id="7193" instrument_node=""> to oppose the spread of </span><a data-dcnode-id="7191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communism" title="Communism"><span data-dcnode-id="7192" instrument_node="">communism</span></a><span data-dcnode-id="7190" instrument_node="">. The containment policy was developed by U.S. diplomat </span><a data-dcnode-id="7188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_F._Kennan" title="George F. Kennan"><span data-dcnode-id="7189" instrument_node="">George Kennan</span></a><span data-dcnode-id="7187" instrument_node=""> in 1947. Kennan characterized the </span><a data-dcnode-id="7185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="7186" instrument_node="">Soviet Union</span></a><span data-dcnode-id="7184" instrument_node=""> as an aggressive, anti-Western power that necessitated containment, a characterization which would shape US foreign policy for decades to come. The idea of containment was to match Soviet aggression with force wherever it occurred while not using </span><a data-dcnode-id="7182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_weapon" title="Nuclear weapon"><span data-dcnode-id="7183" instrument_node="">nuclear weapons</span></a><span data-dcnode-id="7181" instrument_node="">. The policy of containment created a bipolar, zero-sum world where the ideological conflicts between the Soviet Union and the United States dominated geopolitics. Due to the antagonism on both sides and each countries' search for security, a tense worldwide contest developed between the two states as the two nations' governments vied for global supremacy militarily, culturally, and influentially.
</span></p><p data-dcnode-id="7172"><span data-dcnode-id="7179" instrument_node="">The Cold War was characterized by a lack of global wars but a persistence of regional </span><a data-dcnode-id="7177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proxy_war" title="Proxy war"><span data-dcnode-id="7178" instrument_node="">proxy wars</span></a><span data-dcnode-id="7176" instrument_node="">, often fought between client states and proxies of the United States and Soviet Union. The </span><a data-dcnode-id="7174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_involvement_in_regime_change" title="United States involvement in regime change"><span data-dcnode-id="7175" instrument_node="">US also intervened</span></a><span data-dcnode-id="7173" instrument_node=""> in the affairs of other countries through a number of secret operations.
</span></p><p data-dcnode-id="7150"><span data-dcnode-id="7171" instrument_node="">During the Cold War, the Containment policy seeking to stop Soviet expansion, involved the United States and its allies in the </span><a data-dcnode-id="7169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korean_War" title="Korean War"><span data-dcnode-id="7170" instrument_node="">Korean War</span></a><span data-dcnode-id="7168" instrument_node=""> (1950–1953), a stalemate. Even longer and more disastrous was the </span><a data-dcnode-id="7166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="7167" instrument_node="">Vietnam War</span></a><span data-dcnode-id="7165" instrument_node=""> (1963–75). Under Jimmy Carter, the U.S. and its Arab allies Succeeded in creating a Vietnamese -like disaster for the Soviet Union by supporting anti-Soviet </span><a data-dcnode-id="7163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mujahideen%23Afghanistan" title="Mujahideen"><span data-dcnode-id="7164" instrument_node="">Mujahideen</span></a><span data-dcnode-id="7162" instrument_node=""> forces in </span><a data-dcnode-id="7160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afghanistan" title="Afghanistan"><span data-dcnode-id="7161" instrument_node="">Afghanistan</span></a><span data-dcnode-id="7159" instrument_node=""> (</span><i data-dcnode-id="7156"><a data-dcnode-id="7157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Cyclone" title="Operation Cyclone"><span data-dcnode-id="7158" instrument_node="">Operation Cyclone</span></a></i><span data-dcnode-id="7155" instrument_node="">).</span><sup class="reference" data-dcnode-id="7152" id="cite_ref-138"><a data-dcnode-id="7153" href="#cite_note-138"><span data-dcnode-id="7154" instrument_node="">[138]</span></a></sup><span data-dcnode-id="7151" instrument_node="">
</span></p><span data-dcnode-id="7149" instrument_node="">
</span><h3 data-dcnode-id="7138"><span data-dcnode-id="7148" id="Kennedy_and_Johnson_1961.E2.80.931969"></span><span class="mw-headline" data-dcnode-id="7146" id="Kennedy_and_Johnson_1961–1969"><span data-dcnode-id="7147" instrument_node="">Kennedy and Johnson 1961–1969</span></span><span class="mw-editsection" data-dcnode-id="7139"><span class="mw-editsection-bracket" data-dcnode-id="7144"><span data-dcnode-id="7145" instrument_node="">[</span></span><a data-dcnode-id="7142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D42" title="Edit section: Kennedy and Johnson 1961–1969"><span data-dcnode-id="7143" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7140"><span data-dcnode-id="7141" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7137" instrument_node="">
</span><link data-dcnode-id="7136" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7126" role="note"><span data-dcnode-id="7135" instrument_node="">Main articles: </span><a data-dcnode-id="7133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_John_F._Kennedy_administration" title="Foreign policy of the John F. Kennedy administration"><span data-dcnode-id="7134" instrument_node="">Foreign policy of the John F. Kennedy administration</span></a><span data-dcnode-id="7132" instrument_node="">, </span><a data-dcnode-id="7130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Lyndon_B._Johnson_administration" title="Foreign policy of the Lyndon B. Johnson administration"><span data-dcnode-id="7131" instrument_node="">Foreign policy of the Lyndon B. Johnson administration</span></a><span data-dcnode-id="7129" instrument_node="">, and </span><a data-dcnode-id="7127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_in_the_Vietnam_War" title="United States in the Vietnam War"><span data-dcnode-id="7128" instrument_node="">United States in the Vietnam War</span></a></div><span data-dcnode-id="7125" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="7107"><div class="thumbinner" data-dcnode-id="7108" style="width:222px;"><a class="image" data-dcnode-id="7123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACMC_Gromyko.jpg"><img alt="Picture of men wearing suits in a meeting." class="thumbimage" data-dcnode-id="7124" data-file-height="779" data-file-width="1000" decoding="async" height="171" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3b/CMC_Gromyko.jpg/220px-CMC_Gromyko.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3b/CMC_Gromyko.jpg/330px-CMC_Gromyko.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3b/CMC_Gromyko.jpg/440px-CMC_Gromyko.jpg 2x" width="220"></a><span data-dcnode-id="7122" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7109"><div class="magnify" data-dcnode-id="7120"><a class="internal" data-dcnode-id="7121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACMC_Gromyko.jpg" title="Enlarge"></a></div><span data-dcnode-id="7119" instrument_node="">President </span><a data-dcnode-id="7117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_F._Kennedy" title="John F. Kennedy"><span data-dcnode-id="7118" instrument_node="">Kennedy</span></a><span data-dcnode-id="7116" instrument_node=""> meeting with </span><a data-dcnode-id="7114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="7115" instrument_node="">Soviet</span></a><span data-dcnode-id="7113" instrument_node=""> foreign minister Gromyko in 1962. Kennedy knew about Soviet missiles in Cuba but had not revealed this information yet. The Cuban Missile crisis brought the world close to the brink of </span><a data-dcnode-id="7111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_III" title="World War III"><span data-dcnode-id="7112" instrument_node="">World War III</span></a><span data-dcnode-id="7110" instrument_node=""> but luckily cooler heads prevailed.</span></div></div></div><span data-dcnode-id="7106" instrument_node="">
</span><p data-dcnode-id="7094"><span data-dcnode-id="7105" instrument_node="">The Cold War reached its most dangerous point during the Kennedy administration in the </span><a data-dcnode-id="7103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_Missile_Crisis" title="Cuban Missile Crisis"><span data-dcnode-id="7104" instrument_node="">Cuban Missile Crisis</span></a><span data-dcnode-id="7102" instrument_node="">, a tense confrontation between the Soviet Union and the United States over the Soviet deployment of nuclear missiles in Cuba. The crisis began on October 16, 1962, and lasted for thirteen days. It was the moment when the Cold War was closest to exploding into a devastating nuclear exchange between the two superpower nations. Kennedy decided not to invade or bomb Cuba but to institute a naval blockade of the island. The crisis ended in a compromise, with the Soviets removing their missiles publicly, and the United States secretly removing its nuclear missiles in Turkey. In Moscow, Communist leaders removed </span><a data-dcnode-id="7100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikita_Khrushchev" title="Nikita Khrushchev"><span data-dcnode-id="7101" instrument_node="">Nikita Khrushchev</span></a><span data-dcnode-id="7099" instrument_node=""> because of his reckless behavior.</span><sup class="reference" data-dcnode-id="7096" id="cite_ref-139"><a data-dcnode-id="7097" href="#cite_note-139"><span data-dcnode-id="7098" instrument_node="">[139]</span></a></sup><span data-dcnode-id="7095" instrument_node="">
</span></p><p data-dcnode-id="7088"><span data-dcnode-id="7093" instrument_node="">Vietnam and the Cold War are the two major issues that faced the Kennedy presidency. Historians disagree. However, there is general scholarly agreement that his presidency was successful on a number of lesser issues. Thomas Paterson finds that the Kennedy administration helped quiet the crisis over Laos; was suitably cautious about the Congo; liberalized trade; took the lead in humanitarianism especially with the Peace Corps; helped solve a nasty dispute between Indonesia and the Netherlands; achieve the Limited Test Man Treaty; created a new Arms Control and Disarmament Agency; defended Berlin; and strengthened European defenses. His willingness to negotiate with Khrushchev smoothed the Berlin crisis, and Kennedy's personal diplomacy earned him the respect of Third World leaders.</span><sup class="reference" data-dcnode-id="7090" id="cite_ref-140"><a data-dcnode-id="7091" href="#cite_note-140"><span data-dcnode-id="7092" instrument_node="">[140]</span></a></sup><span data-dcnode-id="7089" instrument_node="">
</span></p><p data-dcnode-id="7086"><span data-dcnode-id="7087" instrument_node="">On the two major issues, no consensus has been reached. Michael L. Krenn argues in 2017:
</span></p><span data-dcnode-id="7085" instrument_node="">
</span><dl data-dcnode-id="7079"><dd data-dcnode-id="7080"><span data-dcnode-id="7084" instrument_node="">Fifty-some years after his assassination, John F. Kennedy remains an enigma. Was he the brash and impulsive president who brought the world to the brink of World War III with the Cuban Missile Crisis? Or was he the brave challenger of the American military-industrial complex who would have prevented the Vietnam War? Various studies portray him as a Cold War liberal, or a liberal Cold Warrior, or come up with pithy phrases to summarize the man and his foreign policy.</span><sup class="reference" data-dcnode-id="7081" id="cite_ref-141"><a data-dcnode-id="7082" href="#cite_note-141"><span data-dcnode-id="7083" instrument_node="">[141]</span></a></sup></dd></dl><p data-dcnode-id="7042"><span data-dcnode-id="7078" instrument_node="">
The </span><a data-dcnode-id="7076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Containment" title="Containment"><span data-dcnode-id="7077" instrument_node="">Containment</span></a><span data-dcnode-id="7075" instrument_node=""> policy meant fighting communist expansion where ever it occurred, and the Communists aimed where the American allies were weakest. When he became president in November 1963, Lyndon Johnson's primary commitment was to his domestic policy, so he tried to minimize public awareness and congressional oversight of the operations in the war.</span><sup class="reference" data-dcnode-id="7072" id="cite_ref-142"><a data-dcnode-id="7073" href="#cite_note-142"><span data-dcnode-id="7074" instrument_node="">[142]</span></a></sup><span data-dcnode-id="7071" instrument_node=""> Most of his advisers were pessimistic about the long term possibilities, and Johnson feared that if Congress took control, it would demand "Why Not Victory", as </span><a data-dcnode-id="7069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barry_Goldwater" title="Barry Goldwater"><span data-dcnode-id="7070" instrument_node="">Barry Goldwater</span></a><span data-dcnode-id="7068" instrument_node=""> put it, rather than containment.</span><sup class="reference" data-dcnode-id="7065" id="cite_ref-143"><a data-dcnode-id="7066" href="#cite_note-143"><span data-dcnode-id="7067" instrument_node="">[143]</span></a></sup><span data-dcnode-id="7064" instrument_node=""> American boots on the ground in Vietnam skyrocketed from 16,000 soldiers in 1963 to over 500,000 in 1968, plus many others in support roles outside Vietnam. Johnson refused to allow the trained men of the Army reserves or the </span><a class="mw-redirect" data-dcnode-id="7062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_National_Guard" title="United States National Guard"><span data-dcnode-id="7063" instrument_node="">National Guard</span></a><span data-dcnode-id="7061" instrument_node=""> to serve in Vietnam, because that would involve Congressional oversight. Instead he relied increasingly on the draft, which became increasingly unpopular. With college deferments from the draft widely available, out of the 2.5 million Americans who served in Vietnam (out of 27 million Americans eligible to serve in the military) 80% came from poor and working-class backgrounds.</span><sup class="reference" data-dcnode-id="7058" id="cite_ref-144"><a data-dcnode-id="7059" href="#cite_note-144"><span data-dcnode-id="7060" instrument_node="">[144]</span></a></sup><span data-dcnode-id="7057" instrument_node=""> In August 1964 Johnson secured almost unanimous support in Congress for the </span><i data-dcnode-id="7054"><a data-dcnode-id="7055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulf_of_Tonkin_Resolution" title="Gulf of Tonkin Resolution"><span data-dcnode-id="7056" instrument_node="">Gulf of Tonkin Resolution</span></a></i><span data-dcnode-id="7053" instrument_node="">, which gave him very broad discretion to use military force as he saw fit. South Vietnam had a large Well-equipped army, but it left nearly all the fighting to the Americans. In February 1968 the Viet Cong launched an all-out attack on South Vietnamese forces across the country in the </span><a data-dcnode-id="7051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tet_Offensive" title="Tet Offensive"><span data-dcnode-id="7052" instrument_node="">Tet Offensive</span></a><span data-dcnode-id="7050" instrument_node="">. The ARVN (South Vietnam's army) successfully fought off the attacks and reduced the </span><a data-dcnode-id="7048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viet_Cong" title="Viet Cong"><span data-dcnode-id="7049" instrument_node="">Viet Cong</span></a><span data-dcnode-id="7047" instrument_node=""> to a state of ineffectiveness; thereafter, it was the army of North Vietnam that was the main opponent.</span><sup class="reference" data-dcnode-id="7044" id="cite_ref-145"><a data-dcnode-id="7045" href="#cite_note-145"><span data-dcnode-id="7046" instrument_node="">[145]</span></a></sup><span data-dcnode-id="7043" instrument_node=""> However the Tet Offensive proved a public relations disaster for Johnson, as the public increasingly realized the United States was deeply involved in a war that few people understood. </span></p><div class="thumb tright" data-dcnode-id="7030"><div class="thumbinner" data-dcnode-id="7031" style="width:222px;"><a class="image" data-dcnode-id="7040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMy_Lai_massacre.jpg"><img alt="" class="thumbimage" data-dcnode-id="7041" data-file-height="486" data-file-width="714" decoding="async" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/77/My_Lai_massacre.jpg/220px-My_Lai_massacre.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/77/My_Lai_massacre.jpg/330px-My_Lai_massacre.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/77/My_Lai_massacre.jpg/440px-My_Lai_massacre.jpg 2x" width="220"></a><span data-dcnode-id="7039" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7032"><div class="magnify" data-dcnode-id="7037"><a class="internal" data-dcnode-id="7038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMy_Lai_massacre.jpg" title="Enlarge"></a></div><span data-dcnode-id="7036" instrument_node="">Civilians shot by American soldiers in the </span><a data-dcnode-id="7034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/M%25E1%25BB%25B9_Lai_massacre" title="Mỹ Lai massacre"><span data-dcnode-id="7035" instrument_node="">My Lai massacre</span></a><span data-dcnode-id="7033" instrument_node="">.</span></div></div></div><span data-dcnode-id="7029" instrument_node="">
</span><p data-dcnode-id="7013"><span data-dcnode-id="7028" instrument_node="">Starting in 1964, </span><a data-dcnode-id="7026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opposition_to_United_States_involvement_in_the_Vietnam_War" title="Opposition to United States involvement in the Vietnam War"><span data-dcnode-id="7027" instrument_node="">the antiwar movement began</span></a><span data-dcnode-id="7025" instrument_node="">. Some opposed the war on moral grounds, rooting for the peasant Vietnamese against the modernizing capitalistic Americans. Opposition was centered among the black activists of the civil rights movement, and college students at elite universities.</span><sup class="reference" data-dcnode-id="7022" id="cite_ref-146"><a data-dcnode-id="7023" href="#cite_note-146"><span data-dcnode-id="7024" instrument_node="">[146]</span></a></sup><span data-dcnode-id="7021" instrument_node=""> Republicans, such as California Governor </span><a data-dcnode-id="7019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Reagan" title="Ronald Reagan"><span data-dcnode-id="7020" instrument_node="">Ronald Reagan</span></a><span data-dcnode-id="7018" instrument_node="">, demanded victory or withdrawal, while on the left strident demands for immediate withdrawal escalated.</span><sup class="reference" data-dcnode-id="7015" id="cite_ref-147"><a data-dcnode-id="7016" href="#cite_note-147"><span data-dcnode-id="7017" instrument_node="">[147]</span></a></sup><span data-dcnode-id="7014" instrument_node="">
</span></p><span data-dcnode-id="7012" instrument_node="">
</span><h3 data-dcnode-id="7001"><span data-dcnode-id="7011" id="Nixon_and_Ford_1969.E2.80.931977"></span><span class="mw-headline" data-dcnode-id="7009" id="Nixon_and_Ford_1969–1977"><span data-dcnode-id="7010" instrument_node="">Nixon and Ford 1969–1977</span></span><span class="mw-editsection" data-dcnode-id="7002"><span class="mw-editsection-bracket" data-dcnode-id="7007"><span data-dcnode-id="7008" instrument_node="">[</span></span><a data-dcnode-id="7005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D43" title="Edit section: Nixon and Ford 1969–1977"><span data-dcnode-id="7006" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7003"><span data-dcnode-id="7004" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7000" instrument_node="">
</span><link data-dcnode-id="6999" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6992" role="note"><span data-dcnode-id="6998" instrument_node="">Main articles: </span><a data-dcnode-id="6996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Richard_Nixon_administration" title="Foreign policy of the Richard Nixon administration"><span data-dcnode-id="6997" instrument_node="">Foreign policy of the Richard Nixon administration</span></a><span data-dcnode-id="6995" instrument_node=""> and </span><a data-dcnode-id="6993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Gerald_Ford_administration" title="Foreign policy of the Gerald Ford administration"><span data-dcnode-id="6994" instrument_node="">Foreign policy of the Gerald Ford administration</span></a></div><span data-dcnode-id="6991" instrument_node="">
</span><p data-dcnode-id="6962"><span data-dcnode-id="6990" instrument_node="">President </span><a data-dcnode-id="6988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Nixon" title="Richard Nixon"><span data-dcnode-id="6989" instrument_node="">Richard Nixon</span></a><span data-dcnode-id="6987" instrument_node=""> (1969–74) radically transformed American policy, with the aid of his top advisor </span><a data-dcnode-id="6985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Kissinger" title="Henry Kissinger"><span data-dcnode-id="6986" instrument_node="">Henry Kissinger</span></a><span data-dcnode-id="6984" instrument_node="">.</span><sup class="reference" data-dcnode-id="6981" id="cite_ref-148"><a data-dcnode-id="6982" href="#cite_note-148"><span data-dcnode-id="6983" instrument_node="">[148]</span></a></sup><span data-dcnode-id="6980" instrument_node=""> First of all he rejected the long-standing containment policy that made it the highest goal to stop the expansion of communism. By playing off the two main communist rivals, China and the USSR, he managed to put a pause on the Cold War through friendly relationships with each of them, or </span><a data-dcnode-id="6978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/D%25C3%25A9tente" title="Détente"><span data-dcnode-id="6979" instrument_node="">Détente</span></a><span data-dcnode-id="6977" instrument_node="">. Moscow and Beijing went along, and accepted Nixon's terms of pulling their support away from Vietnam. This allowed Nixon to turn that war over to the government of South Vietnam, withdrawing all American and Allied troops, while continuing a bombing threat. The Vietnamization policy seem to work until 1975, when North Vietnam militarily conquered South Vietnam as the United States stood by without intervening.</span><sup class="reference" data-dcnode-id="6974" id="cite_ref-149"><a data-dcnode-id="6975" href="#cite_note-149"><span data-dcnode-id="6976" instrument_node="">[149]</span></a></sup><span data-dcnode-id="6973" instrument_node=""> After Nixon resigned, president </span><a data-dcnode-id="6971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerald_Ford" title="Gerald Ford"><span data-dcnode-id="6972" instrument_node="">Gerald Ford</span></a><span data-dcnode-id="6970" instrument_node=""> continued his foreign policy, but came under strong attack from the right by </span><a data-dcnode-id="6968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Reagan" title="Ronald Reagan"><span data-dcnode-id="6969" instrument_node="">Ronald Reagan</span></a><span data-dcnode-id="6967" instrument_node="">, whom he defeated for the nomination in 1976.</span><sup class="reference" data-dcnode-id="6964" id="cite_ref-150"><a data-dcnode-id="6965" href="#cite_note-150"><span data-dcnode-id="6966" instrument_node="">[150]</span></a></sup><span data-dcnode-id="6963" instrument_node="">
</span></p><span data-dcnode-id="6961" instrument_node="">
</span><h4 data-dcnode-id="6951"><span class="mw-headline" data-dcnode-id="6959" id="The_Nixon_Doctrine"><span data-dcnode-id="6960" instrument_node="">The Nixon Doctrine</span></span><span class="mw-editsection" data-dcnode-id="6952"><span class="mw-editsection-bracket" data-dcnode-id="6957"><span data-dcnode-id="6958" instrument_node="">[</span></span><a data-dcnode-id="6955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D44" title="Edit section: The Nixon Doctrine"><span data-dcnode-id="6956" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6953"><span data-dcnode-id="6954" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6950" instrument_node="">
</span><link data-dcnode-id="6949" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6945" role="note"><span data-dcnode-id="6948" instrument_node="">Main article: </span><a data-dcnode-id="6946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nixon_Doctrine" title="Nixon Doctrine"><span data-dcnode-id="6947" instrument_node="">Nixon Doctrine</span></a></div><span data-dcnode-id="6944" instrument_node="">
</span><p data-dcnode-id="6939"><span data-dcnode-id="6943" instrument_node="">The </span><a data-dcnode-id="6941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nixon_Doctrine" title="Nixon Doctrine"><span data-dcnode-id="6942" instrument_node="">Nixon Doctrine</span></a><span data-dcnode-id="6940" instrument_node=""> announced in July 1969 shifted the main responsibility for the defense of an ally, to the ally itself, especially regarding combat. The United States would work on the diplomacy, provide financial help and munitions, and help train the allied army. Specifically:
</span></p><span data-dcnode-id="6938" instrument_node="">
</span><ul data-dcnode-id="6926"><li data-dcnode-id="6936"><span data-dcnode-id="6937" instrument_node="">The U.S. would keep all its treaty commitments.</span></li><span data-dcnode-id="6935" instrument_node="">
</span><li data-dcnode-id="6933"><span data-dcnode-id="6934" instrument_node="">The U.S. would “provide a shield if a nuclear power threatens the freedom of a nation allied with us or of a nation whose survival we consider vital to our security.”</span></li><span data-dcnode-id="6932" instrument_node="">
</span><li data-dcnode-id="6927"><span data-dcnode-id="6931" instrument_node="">In conflicts involving non-nuclear aggression, the U.S. would “look to the nation directly threatened to assume the primary responsibility of providing the manpower for defense.”</span><sup class="reference" data-dcnode-id="6928" id="cite_ref-151"><a data-dcnode-id="6929" href="#cite_note-151"><span data-dcnode-id="6930" instrument_node="">[151]</span></a></sup></li></ul><span data-dcnode-id="6925" instrument_node="">
</span><p data-dcnode-id="6866"><span data-dcnode-id="6924" instrument_node="">The Doctrine was exemplified by the </span><a data-dcnode-id="6922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnamization" title="Vietnamization"><span data-dcnode-id="6923" instrument_node="">Vietnamization</span></a><span data-dcnode-id="6921" instrument_node=""> process regarding South Vietnam and the Vietnam War.</span><sup class="reference" data-dcnode-id="6918" id="cite_ref-152"><a data-dcnode-id="6919" href="#cite_note-152"><span data-dcnode-id="6920" instrument_node="">[152]</span></a></sup><span data-dcnode-id="6917" instrument_node=""> It also played elsewhere in Asia including Iran,</span><sup class="reference" data-dcnode-id="6914" id="cite_ref-153"><a data-dcnode-id="6915" href="#cite_note-153"><span data-dcnode-id="6916" instrument_node="">[153]</span></a></sup><span data-dcnode-id="6913" instrument_node=""> Taiwan,</span><sup class="reference" data-dcnode-id="6910" id="cite_ref-154"><a data-dcnode-id="6911" href="#cite_note-154"><span data-dcnode-id="6912" instrument_node="">[154]</span></a></sup><span data-dcnode-id="6909" instrument_node=""> Cambodia</span><sup class="reference" data-dcnode-id="6906" id="cite_ref-155"><a data-dcnode-id="6907" href="#cite_note-155"><span data-dcnode-id="6908" instrument_node="">[155]</span></a></sup><span data-dcnode-id="6905" instrument_node=""> and South Korea.</span><sup class="reference" data-dcnode-id="6902" id="cite_ref-156"><a data-dcnode-id="6903" href="#cite_note-156"><span data-dcnode-id="6904" instrument_node="">[156]</span></a></sup><span data-dcnode-id="6901" instrument_node=""> The doctrine was an explicit rejection of the practice that sent 500,000 American soldiers to Vietnam, even though there was no treaty obligation to that country. A major long-term goal was to reduce the tension between the United States and the Soviet Union and China, so as to better enable the détente process to work.</span><sup class="reference" data-dcnode-id="6898" id="cite_ref-157"><a data-dcnode-id="6899" href="#cite_note-157"><span data-dcnode-id="6900" instrument_node="">[157]</span></a></sup><span data-dcnode-id="6897" instrument_node=""> The particular Asian nation the Nixon Doctrine was aimed at with its message that Asian nations should be responsible for defending themselves was South Vietnam, but Shah </span><a data-dcnode-id="6895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mohammad_Reza_Pahlavi" title="Mohammad Reza Pahlavi"><span data-dcnode-id="6896" instrument_node="">Mohammad Reza Pahlavi</span></a><span data-dcnode-id="6894" instrument_node=""> of Iran seized upon the Nixon Doctrine with its message that Asian nations should be responsible for their own defense to argue that the Americans should sell him arms without limitations, a suggestion that Nixon eagerly embraced.</span><sup class="reference" data-dcnode-id="6891" id="cite_ref-158"><a data-dcnode-id="6892" href="#cite_note-158"><span data-dcnode-id="6893" instrument_node="">[158]</span></a></sup><span data-dcnode-id="6890" instrument_node=""> The US turned to </span><a data-dcnode-id="6888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saudi_Arabia" title="Saudi Arabia"><span data-dcnode-id="6889" instrument_node="">Saudi Arabia</span></a><span data-dcnode-id="6887" instrument_node=""> and </span><a data-dcnode-id="6885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="6886" instrument_node="">Iran</span></a><span data-dcnode-id="6884" instrument_node=""> as "twin pillars" of regional stability.</span><sup class="reference" data-dcnode-id="6881" id="cite_ref-time_doctrine_159-0"><a data-dcnode-id="6882" href="#cite_note-time_doctrine-159"><span data-dcnode-id="6883" instrument_node="">[159]</span></a></sup><span data-dcnode-id="6880" instrument_node=""> </span><a data-dcnode-id="6878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Price_of_oil" title="Price of oil"><span data-dcnode-id="6879" instrument_node="">Oil price</span></a><span data-dcnode-id="6877" instrument_node=""> increases in 1970 and 1971 would allow funding both states with this military expansion. Total arms transfers from the United States to Iran increased from $103.6 million in 1970 to $552.7 million in 1972; those to Saudi Arabia increased from $15.8 million in 1970 to $312.4 million in 1972. The United States would maintain its small naval force of three ships in the Gulf, stationed since </span><a data-dcnode-id="6875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="6876" instrument_node="">World War II</span></a><span data-dcnode-id="6874" instrument_node=""> in </span><a data-dcnode-id="6872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bahrain" title="Bahrain"><span data-dcnode-id="6873" instrument_node="">Bahrain</span></a><span data-dcnode-id="6871" instrument_node="">, but would take on no other formal security commitments.</span><sup class="reference" data-dcnode-id="6868" id="cite_ref-III2009_160-0"><a data-dcnode-id="6869" href="#cite_note-III2009-160"><span data-dcnode-id="6870" instrument_node="">[160]</span></a></sup><span data-dcnode-id="6867" instrument_node="">
</span></p><span data-dcnode-id="6865" instrument_node="">
</span><h4 data-dcnode-id="6854"><span data-dcnode-id="6864" id="India.2C_Pakistan.2C_and_Bangladesh.2C_1971"></span><span class="mw-headline" data-dcnode-id="6862" id="India,_Pakistan,_and_Bangladesh,_1971"><span data-dcnode-id="6863" instrument_node="">India, Pakistan, and Bangladesh, 1971</span></span><span class="mw-editsection" data-dcnode-id="6855"><span class="mw-editsection-bracket" data-dcnode-id="6860"><span data-dcnode-id="6861" instrument_node="">[</span></span><a data-dcnode-id="6858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D45" title="Edit section: India, Pakistan, and Bangladesh, 1971"><span data-dcnode-id="6859" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6856"><span data-dcnode-id="6857" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6853" instrument_node="">
</span><link data-dcnode-id="6852" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6845" role="note"><span data-dcnode-id="6851" instrument_node="">Main articles: </span><a data-dcnode-id="6849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bangladesh_Liberation_War" title="Bangladesh Liberation War"><span data-dcnode-id="6850" instrument_node="">Bangladesh Liberation War</span></a><span data-dcnode-id="6848" instrument_node=""> and </span><a data-dcnode-id="6846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indo-Pakistani_War_of_1971" title="Indo-Pakistani War of 1971"><span data-dcnode-id="6847" instrument_node="">Indo-Pakistani War of 1971</span></a></div><span data-dcnode-id="6844" instrument_node="">
</span><p data-dcnode-id="6825"><span data-dcnode-id="6843" instrument_node="">A war for independence broke out in East Pakistan in 1971 with India joining in to defeat Pakistan, an American ally. Nixon sent a carrier group to the Bay of Bengal to symbolize support for Pakistan but without any combat action. Nixon and Kissinger saw India's alliance with the USSR as a threat to American interests. However they realized the American public would not accept hostilities against a fellow democracy.</span><sup class="reference" data-dcnode-id="6840" id="cite_ref-161"><a data-dcnode-id="6841" href="#cite_note-161"><span data-dcnode-id="6842" instrument_node="">[161]</span></a></sup><span data-dcnode-id="6839" instrument_node=""> Pakistan was a critical ally in the secret negotiations underway for a </span><a data-dcnode-id="6837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China%25E2%2580%2593United_States_relations%23Rapprochement" title="China–United States relations"><span data-dcnode-id="6838" instrument_node="">rapprochement with China</span></a><span data-dcnode-id="6836" instrument_node="">. Nixon feared that an Indian invasion of </span><a data-dcnode-id="6834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Pakistan" title="West Pakistan"><span data-dcnode-id="6835" instrument_node="">West Pakistan</span></a><span data-dcnode-id="6833" instrument_node=""> would risk Soviet domination of the region, and that it would seriously undermine the global position of the United States and the regional position of America's new tacit ally, China. To demonstrate to China the </span><i data-dcnode-id="6831"><span data-dcnode-id="6832" instrument_node="">bona fides</span></i><span data-dcnode-id="6830" instrument_node=""> of the United States as an ally, and in direct defiance of the US Congress-imposed sanctions on Pakistan, Nixon sent military supplies to Pakistan, while also encouraging China to increase its arms supplies to Pakistan. In the end Pakistan lost and Bangladesh became independent, but the USSR did not expand its control. India resented the American role for decades.</span><sup class="reference" data-dcnode-id="6827" id="cite_ref-162"><a data-dcnode-id="6828" href="#cite_note-162"><span data-dcnode-id="6829" instrument_node="">[162]</span></a></sup><span data-dcnode-id="6826" instrument_node="">
</span></p><span data-dcnode-id="6824" instrument_node="">
</span><h3 data-dcnode-id="6813"><span data-dcnode-id="6823" id="Carter_1977.E2.80.931981"></span><span class="mw-headline" data-dcnode-id="6821" id="Carter_1977–1981"><span data-dcnode-id="6822" instrument_node="">Carter 1977–1981</span></span><span class="mw-editsection" data-dcnode-id="6814"><span class="mw-editsection-bracket" data-dcnode-id="6819"><span data-dcnode-id="6820" instrument_node="">[</span></span><a data-dcnode-id="6817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D46" title="Edit section: Carter 1977–1981"><span data-dcnode-id="6818" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6815"><span data-dcnode-id="6816" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6812" instrument_node="">
</span><link data-dcnode-id="6811" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6807" role="note"><span data-dcnode-id="6810" instrument_node="">Main article: </span><a data-dcnode-id="6808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Jimmy_Carter_administration" title="Foreign policy of the Jimmy Carter administration"><span data-dcnode-id="6809" instrument_node="">Foreign policy of the Jimmy Carter administration</span></a></div><span data-dcnode-id="6806" instrument_node="">
</span><p data-dcnode-id="6722"><span data-dcnode-id="6805" instrument_node="">Democrat </span><a data-dcnode-id="6803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jimmy_Carter" title="Jimmy Carter"><span data-dcnode-id="6804" instrument_node="">Jimmy Carter</span></a><span data-dcnode-id="6802" instrument_node=""> defeated Ford in the election of 1976, but his foreign-policy became mired in endless difficulties, including a proxy war against the Soviet Union in Afghanistan, and a confrontation with the new anti-American regime in Iran.</span><sup class="reference" data-dcnode-id="6799" id="cite_ref-163"><a data-dcnode-id="6800" href="#cite_note-163"><span data-dcnode-id="6801" instrument_node="">[163]</span></a></sup><sup class="reference" data-dcnode-id="6796" id="cite_ref-164"><a data-dcnode-id="6797" href="#cite_note-164"><span data-dcnode-id="6798" instrument_node="">[164]</span></a></sup><span data-dcnode-id="6795" instrument_node=""> Carter had very little foreign policy experience, and he was unable to stop the bitter infighting between his top foreign policy advisers, Secretary of State </span><a data-dcnode-id="6793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cyrus_Vance" title="Cyrus Vance"><span data-dcnode-id="6794" instrument_node="">Cyrus Vance</span></a><span data-dcnode-id="6792" instrument_node="">, on the dovish side, versus national security adviser </span><a data-dcnode-id="6790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zbigniew_Brzezinski" title="Zbigniew Brzezinski"><span data-dcnode-id="6791" instrument_node="">Zbigniew Brzezinski</span></a><span data-dcnode-id="6789" instrument_node="">. Brzezinski was a hard-line Cold Warrior opposed to Communism and the USSR. Carter initially wanted to nominate </span><a data-dcnode-id="6787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Ball_%28diplomat%29" title="George Ball (diplomat)"><span data-dcnode-id="6788" instrument_node="">George Ball</span></a><span data-dcnode-id="6786" instrument_node=""> as Secretary of State, but he was vetoed by Brzezinski as too dovish.</span><sup class="reference" data-dcnode-id="6783" id="cite_ref-165"><a data-dcnode-id="6784" href="#cite_note-165"><span data-dcnode-id="6785" instrument_node="">[165]</span></a></sup><span data-dcnode-id="6782" instrument_node=""> Vance negotiated the </span><a data-dcnode-id="6780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torrijos%25E2%2580%2593Carter_Treaties" title="Torrijos–Carter Treaties"><span data-dcnode-id="6781" instrument_node="">Panama Canal Treaties</span></a><span data-dcnode-id="6779" instrument_node="">, along with peace talks in </span><a data-dcnode-id="6777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhodesia" title="Rhodesia"><span data-dcnode-id="6778" instrument_node="">Rhodesia</span></a><span data-dcnode-id="6776" instrument_node="">, </span><a data-dcnode-id="6774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Namibia" title="Namibia"><span data-dcnode-id="6775" instrument_node="">Namibia</span></a><span data-dcnode-id="6773" instrument_node=""> and </span><a data-dcnode-id="6771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Africa" title="South Africa"><span data-dcnode-id="6772" instrument_node="">South Africa</span></a><span data-dcnode-id="6770" instrument_node="">. He worked closely with Israeli Ministers </span><a data-dcnode-id="6768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moshe_Dayan" title="Moshe Dayan"><span data-dcnode-id="6769" instrument_node="">Moshe Dayan</span></a><span data-dcnode-id="6767" instrument_node=""> and </span><a data-dcnode-id="6765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ezer_Weizman" title="Ezer Weizman"><span data-dcnode-id="6766" instrument_node="">Ezer Weizman</span></a><span data-dcnode-id="6764" instrument_node=""> to secure the </span><a data-dcnode-id="6762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camp_David_Accords" title="Camp David Accords"><span data-dcnode-id="6763" instrument_node="">Camp David Accords</span></a><span data-dcnode-id="6761" instrument_node=""> in 1978. Vance was a strong advocate of disarmament. He insisted that the President make </span><a data-dcnode-id="6759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Warnke" title="Paul Warnke"><span data-dcnode-id="6760" instrument_node="">Paul Warnke</span></a><span data-dcnode-id="6758" instrument_node=""> Director of the </span><a data-dcnode-id="6756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arms_Control_and_Disarmament_Agency" title="Arms Control and Disarmament Agency"><span data-dcnode-id="6757" instrument_node="">Arms Control and Disarmament Agency</span></a><span data-dcnode-id="6755" instrument_node="">, over strong opposition by Senator </span><a data-dcnode-id="6753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_M._Jackson" title="Henry M. Jackson"><span data-dcnode-id="6754" instrument_node="">Henry M. Jackson</span></a><span data-dcnode-id="6752" instrument_node="">. The fiercest debates came over continuing détente policies with Moscow. Vance tried to advance arms limitations by working on the </span><a data-dcnode-id="6750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strategic_Arms_Limitation_Talks" title="Strategic Arms Limitation Talks"><span data-dcnode-id="6751" instrument_node="">SALT II</span></a><span data-dcnode-id="6749" instrument_node=""> agreement with the Soviet Union, which he saw as the central diplomatic issue of the time, but Brzezinski lobbied for a tougher more assertive policy vis-a-vis the Soviets. He argued for strong condemnation of Soviet activity in Africa and in the Third World as well as successfully lobbying for normalized relations with the </span><a data-dcnode-id="6747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="6748" instrument_node="">People's Republic of China</span></a><span data-dcnode-id="6746" instrument_node=""> in 1978. Brzezinski took control of the negotiations with Beijing. Vance was marginalized and his influence began to wane. When revolution erupted in Iran in late 1978, the two were divided on how to support the long-time ally the </span><a data-dcnode-id="6744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mohammad_Reza_Pahlavi" title="Mohammad Reza Pahlavi"><span data-dcnode-id="6745" instrument_node="">Shah of Iran</span></a><span data-dcnode-id="6743" instrument_node="">. Vance argued in favor of demanding reforms while Brzezinski urged the Shah to crack down. Unable to obtain a direct course of action from Carter, the mixed messages that the Shah received from Vance and Brzezinski contributed to his confusion and indecision as he fled Iran in January 1979 and his </span><a data-dcnode-id="6741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranian_Revolution" title="Iranian Revolution"><span data-dcnode-id="6742" instrument_node="">regime collapsed</span></a><span data-dcnode-id="6740" instrument_node="">.</span><sup class="reference" data-dcnode-id="6737" id="cite_ref-166"><a data-dcnode-id="6738" href="#cite_note-166"><span data-dcnode-id="6739" instrument_node="">[166]</span></a></sup><span data-dcnode-id="6736" instrument_node=""> In April 1980, Vance resigned in protest because of the failed </span><a data-dcnode-id="6734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Eagle_Claw" title="Operation Eagle Claw"><span data-dcnode-id="6735" instrument_node="">Operation Eagle Claw</span></a><span data-dcnode-id="6733" instrument_node="">, the secret mission to rescue </span><a data-dcnode-id="6731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran_hostage_crisis" title="Iran hostage crisis"><span data-dcnode-id="6732" instrument_node="">American hostages in Iran</span></a><span data-dcnode-id="6730" instrument_node=""> which he had opposed. He was succeeded by </span><a data-dcnode-id="6728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edmund_Muskie" title="Edmund Muskie"><span data-dcnode-id="6729" instrument_node="">Edmund Muskie</span></a><span data-dcnode-id="6727" instrument_node="">.</span><sup class="reference" data-dcnode-id="6724" id="cite_ref-167"><a data-dcnode-id="6725" href="#cite_note-167"><span data-dcnode-id="6726" instrument_node="">[167]</span></a></sup><span data-dcnode-id="6723" instrument_node="">
</span></p><span data-dcnode-id="6721" instrument_node="">
</span><h3 data-dcnode-id="6710"><span data-dcnode-id="6720" id="Reagan_1981.E2.80.931989"></span><span class="mw-headline" data-dcnode-id="6718" id="Reagan_1981–1989"><span data-dcnode-id="6719" instrument_node="">Reagan 1981–1989</span></span><span class="mw-editsection" data-dcnode-id="6711"><span class="mw-editsection-bracket" data-dcnode-id="6716"><span data-dcnode-id="6717" instrument_node="">[</span></span><a data-dcnode-id="6714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D47" title="Edit section: Reagan 1981–1989"><span data-dcnode-id="6715" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6712"><span data-dcnode-id="6713" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6709" instrument_node="">
</span><link data-dcnode-id="6708" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6704" role="note"><span data-dcnode-id="6707" instrument_node="">Main article: </span><a data-dcnode-id="6705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_Ronald_Reagan_administration" title="Foreign policy of the Ronald Reagan administration"><span data-dcnode-id="6706" instrument_node="">Foreign policy of the Ronald Reagan administration</span></a></div><span data-dcnode-id="6703" instrument_node="">
</span><p data-dcnode-id="6690"><span data-dcnode-id="6702" instrument_node="">Reagan rejected détente, and containment, and announced his goal was to win the Cold War, by destroying the threat of Soviet communism, denouncing Moscow as the "evil Empire". His main action was a dramatic increase in military spending, and a heavy investment in high-tech weapons that the Soviets, with their primitive computer systems, were unable to match.</span><sup class="reference" data-dcnode-id="6699" id="cite_ref-168"><a data-dcnode-id="6700" href="#cite_note-168"><span data-dcnode-id="6701" instrument_node="">[168]</span></a></sup><sup class="reference" data-dcnode-id="6696" id="cite_ref-169"><a data-dcnode-id="6697" href="#cite_note-169"><span data-dcnode-id="6698" instrument_node="">[169]</span></a></sup><span data-dcnode-id="6695" instrument_node=""> After furious political battles at home and in Western Europe, Reagan succeeded in stationing medium-range ballistic Missiles in Western Europe, aimed at the Soviet Union.</span><sup class="reference" data-dcnode-id="6692" id="cite_ref-170"><a data-dcnode-id="6693" href="#cite_note-170"><span data-dcnode-id="6694" instrument_node="">[170]</span></a></sup><span data-dcnode-id="6691" instrument_node="">
</span></p><p data-dcnode-id="6669"><span data-dcnode-id="6689" instrument_node="">The Reagan administration made dramatic increases in defense spending one of their three main priorities on taking office, along with cutting taxes and welfare. The transition to the new professional all-professional force was finalized, and the draft forgotten. A dramatic expansion of salary bases and benefits for both enlisted and officers made career service much more attractive. Under the aggressive leadership of Defense Secretary </span><a data-dcnode-id="6687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caspar_Weinberger" title="Caspar Weinberger"><span data-dcnode-id="6688" instrument_node="">Caspar Weinberger</span></a><span data-dcnode-id="6686" instrument_node="">, the development of the </span><a data-dcnode-id="6684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rockwell_B-1_Lancer" title="Rockwell B-1 Lancer"><span data-dcnode-id="6685" instrument_node="">B-1</span></a><span data-dcnode-id="6683" instrument_node=""> bomber was reinstated, and there was funding for a new </span><a data-dcnode-id="6681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northrop_Grumman_B-2_Spirit" title="Northrop Grumman B-2 Spirit"><span data-dcnode-id="6682" instrument_node="">B-2</span></a><span data-dcnode-id="6680" instrument_node=""> bomber, as well as </span><a data-dcnode-id="6678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cruise_missile" title="Cruise missile"><span data-dcnode-id="6679" instrument_node="">cruise missiles</span></a><span data-dcnode-id="6677" instrument_node="">, the </span><a data-dcnode-id="6675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LGM-118_Peacekeeper" title="LGM-118 Peacekeeper"><span data-dcnode-id="6676" instrument_node="">MX missile</span></a><span data-dcnode-id="6674" instrument_node="">, and a 600 ship Navy. The new weaponry was designed with Soviet targets in mind. In terms of real dollars after taxation, defense spending jump 34 percent between 1981 in 1985. Reagan's two terms, defense spending totaled about 2 trillion dollars, but even so it was a lower percentage of the federal budget or have the GDP, then before 1976.</span><sup class="reference" data-dcnode-id="6671" id="cite_ref-171"><a data-dcnode-id="6672" href="#cite_note-171"><span data-dcnode-id="6673" instrument_node="">[171]</span></a></sup><span data-dcnode-id="6670" instrument_node="">
