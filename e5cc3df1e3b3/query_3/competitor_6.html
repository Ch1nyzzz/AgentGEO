</span><p data-dcnode-id="10227"><b data-dcnode-id="10247"><span data-dcnode-id="10248" instrument_node="">History of United States foreign policy</span></b><span data-dcnode-id="10246" instrument_node=""> is a brief overview of major trends regarding the foreign policy of the United States from the </span><a data-dcnode-id="10244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Revolution" title="American Revolution"><span data-dcnode-id="10245" instrument_node="">American Revolution</span></a><span data-dcnode-id="10243" instrument_node=""> to the present. The major themes are becoming an "</span><a data-dcnode-id="10241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empire_of_Liberty" title="Empire of Liberty"><span data-dcnode-id="10242" instrument_node="">Empire of Liberty</span></a><span data-dcnode-id="10240" instrument_node="">", promoting democracy, </span><a data-dcnode-id="10238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Territorial_evolution_of_the_United_States" title="Territorial evolution of the United States"><span data-dcnode-id="10239" instrument_node="">expanding</span></a><span data-dcnode-id="10237" instrument_node=""> across the continent, supporting </span><a data-dcnode-id="10235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_internationalism" title="Liberal internationalism"><span data-dcnode-id="10236" instrument_node="">liberal internationalism</span></a><span data-dcnode-id="10234" instrument_node="">, contesting World Wars and the </span><a data-dcnode-id="10232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="10233" instrument_node="">Cold War</span></a><span data-dcnode-id="10231" instrument_node="">, fighting international terrorism, developing the </span><a data-dcnode-id="10229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_World" title="Third World"><span data-dcnode-id="10230" instrument_node="">Third World</span></a><span data-dcnode-id="10228" instrument_node="">, and building a strong world economy with low tariffs (but high tariffs in 1861-1933).
</span></p><span data-dcnode-id="10226" instrument_node="">

</span><link data-dcnode-id="9576" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9569" role="note"><span data-dcnode-id="9575" instrument_node="">Main articles: </span><a data-dcnode-id="9573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diplomacy_in_the_American_Revolutionary_War" title="Diplomacy in the American Revolutionary War"><span data-dcnode-id="9574" instrument_node="">Diplomacy in the American Revolutionary War</span></a><span data-dcnode-id="9572" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="9570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confederation_Period%23Foreign_affairs" title="Confederation Period"><span data-dcnode-id="9571" instrument_node="">Confederation Period §&nbsp;Foreign affairs</span></a></div><span data-dcnode-id="9568" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9553"><div class="thumbinner" data-dcnode-id="9554" style="width:332px;"><a class="image" data-dcnode-id="9566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANon-Native_Nations_Claim_over_NAFTA_countries_1783.png"><img alt="" class="thumbimage" data-dcnode-id="9567" data-file-height="895" data-file-width="800" decoding="async" height="369" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Non-Native_Nations_Claim_over_NAFTA_countries_1783.png/330px-Non-Native_Nations_Claim_over_NAFTA_countries_1783.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Non-Native_Nations_Claim_over_NAFTA_countries_1783.png/495px-Non-Native_Nations_Claim_over_NAFTA_countries_1783.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Non-Native_Nations_Claim_over_NAFTA_countries_1783.png/660px-Non-Native_Nations_Claim_over_NAFTA_countries_1783.png 2x" width="330"></a><span data-dcnode-id="9565" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9555"><div class="magnify" data-dcnode-id="9563"><a class="internal" data-dcnode-id="9564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANon-Native_Nations_Claim_over_NAFTA_countries_1783.png" title="Enlarge"></a></div><span data-dcnode-id="9562" instrument_node="">North America after the Treaty of Paris. The United States (blue) was bordered by the </span><a data-dcnode-id="9560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="9561" instrument_node="">United Kingdom</span></a><span data-dcnode-id="9559" instrument_node=""> (yellow) to the north and </span><a data-dcnode-id="9557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spain" title="Spain"><span data-dcnode-id="9558" instrument_node="">Spain</span></a><span data-dcnode-id="9556" instrument_node=""> (brown) to the south and west.</span></div></div></div><span data-dcnode-id="9552" instrument_node="">
</span><p data-dcnode-id="9550"><span data-dcnode-id="9551" instrument_node="">From the establishment of the United States after regional, not global, focus, but with the long-term ideal of creating an "Empire of Liberty."
</span></p><p data-dcnode-id="9533"><span data-dcnode-id="9549" instrument_node="">The military and financial alliance with France in 1778, which brought in Spain and the Netherlands to fight the British, turned the </span><a data-dcnode-id="9547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Revolutionary_War" title="American Revolutionary War"><span data-dcnode-id="9548" instrument_node="">American Revolutionary War</span></a><span data-dcnode-id="9546" instrument_node=""> into a world war in which the British naval and military supremacy was neutralized. The diplomats—especially </span><a data-dcnode-id="9544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benjamin_Franklin" title="Benjamin Franklin"><span data-dcnode-id="9545" instrument_node="">Franklin</span></a><span data-dcnode-id="9543" instrument_node="">, </span><a data-dcnode-id="9541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Adams" title="John Adams"><span data-dcnode-id="9542" instrument_node="">Adams</span></a><span data-dcnode-id="9540" instrument_node=""> and </span><a data-dcnode-id="9538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Jefferson" title="Thomas Jefferson"><span data-dcnode-id="9539" instrument_node="">Jefferson</span></a><span data-dcnode-id="9537" instrument_node="">—secured recognition of American independence and large loans to the new national government. The </span><a data-dcnode-id="9535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Paris_%281783%29" title="Treaty of Paris (1783)"><span data-dcnode-id="9536" instrument_node="">Treaty of Paris</span></a><span data-dcnode-id="9534" instrument_node=""> in 1783 was highly favorable to the United States which now could expand westward to the Mississippi River.
</span></p><p data-dcnode-id="9528"><span data-dcnode-id="9532" instrument_node="">Historian </span><a data-dcnode-id="9530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_Flagg_Bemis" title="Samuel Flagg Bemis"><span data-dcnode-id="9531" instrument_node="">Samuel Flagg Bemis</span></a><span data-dcnode-id="9529" instrument_node=""> was a leading expert on diplomatic history. According to Jerold Combs:
</span></p><span data-dcnode-id="9527" instrument_node="">
</span><dl data-dcnode-id="9518"><dd data-dcnode-id="9519"><span data-dcnode-id="9526" instrument_node="">Bemis's </span><i data-dcnode-id="9524"><span data-dcnode-id="9525" instrument_node="">The Diplomacy of the American Revolution,</span></i><span data-dcnode-id="9523" instrument_node=""> published originally in 1935, is still the standard work on the subject. It emphasized the danger of American entanglement in European quarrels. European diplomacy in the eighteenth century was "rotten, corrupt, and perfidious," warned Bemis. America's diplomatic success had resulted from staying clear of European politics while reaping advantage from European strife. Franklin, Jay, and Adams had done just this during the Revolution and as a consequence had won the greatest victory in the annals of American diplomacy. Bemis conceded that the French alliance had been necessary to win the war. Yet he regretted that it had brought involvement with "the baleful realm of European diplomacy." Vergennes [the French foreign minister] was quite willing to lead America to an "abattoir" [slaughterhouse] where portions of the United States might be dismembered if this would advance the interests of France.</span><sup class="reference" data-dcnode-id="9520" id="cite_ref-1"><a data-dcnode-id="9521" href="#cite_note-1"><span data-dcnode-id="9522" instrument_node="">[1]</span></a></sup></dd></dl><span data-dcnode-id="9517" instrument_node="">
</span><p data-dcnode-id="9508"><span data-dcnode-id="9516" instrument_node="">American foreign affairs from independence in 1776 to the new Constitution in 1789 were handled under the </span><a data-dcnode-id="9514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Articles_of_Confederation" title="Articles of Confederation"><span data-dcnode-id="9515" instrument_node="">Articles of Confederation</span></a><span data-dcnode-id="9513" instrument_node=""> directly by Congress until the new government created a department of foreign affairs and the office of secretary for foreign affairs on January 10, 1781.</span><sup class="reference" data-dcnode-id="9510" id="cite_ref-2"><a data-dcnode-id="9511" href="#cite_note-2"><span data-dcnode-id="9512" instrument_node="">[2]</span></a></sup><span data-dcnode-id="9509" instrument_node="">
</span></p><span data-dcnode-id="9507" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9495"><div class="thumbinner" data-dcnode-id="9496" style="width:222px;"><a class="image" data-dcnode-id="9505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJay-treaty.jpg"><img alt="" class="thumbimage" data-dcnode-id="9506" data-file-height="650" data-file-width="412" decoding="async" height="347" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/90/Jay-treaty.jpg/220px-Jay-treaty.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/90/Jay-treaty.jpg/330px-Jay-treaty.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/9/90/Jay-treaty.jpg 2x" width="220"></a><span data-dcnode-id="9504" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9497"><div class="magnify" data-dcnode-id="9502"><a class="internal" data-dcnode-id="9503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJay-treaty.jpg" title="Enlarge"></a></div><span data-dcnode-id="9501" instrument_node="">The </span><a data-dcnode-id="9499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jay_Treaty" title="Jay Treaty"><span data-dcnode-id="9500" instrument_node="">Jay Treaty</span></a><span data-dcnode-id="9498" instrument_node=""> of 1795 aligned the U.S. more with Britain and less with France, leading to political polarization at home</span></div></div></div><span data-dcnode-id="9494" instrument_node="">
</span><h3 data-dcnode-id="9483"><span data-dcnode-id="9493" id="Early_National_Era:_1789.E2.80.931801"></span><span class="mw-headline" data-dcnode-id="9491" id="Early_National_Era:_1789–1801"><span data-dcnode-id="9492" instrument_node="">Early National Era: 1789–1801</span></span><span class="mw-editsection" data-dcnode-id="9484"><span class="mw-editsection-bracket" data-dcnode-id="9489"><span data-dcnode-id="9490" instrument_node="">[</span></span><a data-dcnode-id="9487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D3" title="Edit section: Early National Era: 1789–1801"><span data-dcnode-id="9488" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9485"><span data-dcnode-id="9486" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9482" instrument_node="">
</span><link data-dcnode-id="9481" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9477" role="note"><span data-dcnode-id="9480" instrument_node="">See also: </span><a data-dcnode-id="9478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federalist_Era" title="Federalist Era"><span data-dcnode-id="9479" instrument_node="">Federalist Era</span></a></div><span data-dcnode-id="9476" instrument_node="">
</span><p data-dcnode-id="9465"><span data-dcnode-id="9475" instrument_node="">The cabinet-level </span><i data-dcnode-id="9473"><span data-dcnode-id="9474" instrument_node="">Department of Foreign Affairs</span></i><span data-dcnode-id="9472" instrument_node=""> was created in 1789 by the First Congress. It was soon renamed the </span><i data-dcnode-id="9470"><span data-dcnode-id="9471" instrument_node="">Department of State</span></i><span data-dcnode-id="9469" instrument_node=""> and changed the title of secretary for foreign affairs to Secretary of State; </span><a data-dcnode-id="9467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Jefferson" title="Thomas Jefferson"><span data-dcnode-id="9468" instrument_node="">Thomas Jefferson</span></a><span data-dcnode-id="9466" instrument_node=""> returned from France to take the position.
</span></p><p data-dcnode-id="9441"><span data-dcnode-id="9464" instrument_node="">When the French Revolution led to war in 1793 between Britain (America's leading trading partner), and France (the old ally, with a treaty still in effect), Washington and his cabinet decided on a policy of neutrality, as enshrined in the </span><a data-dcnode-id="9462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neutrality_Act_of_1794" title="Neutrality Act of 1794"><span data-dcnode-id="9463" instrument_node="">Neutrality Act of 1794</span></a><span data-dcnode-id="9461" instrument_node="">. In 1795 Washington supported the </span><a data-dcnode-id="9459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jay_Treaty" title="Jay Treaty"><span data-dcnode-id="9460" instrument_node="">Jay Treaty</span></a><span data-dcnode-id="9458" instrument_node="">, designed by Treasury Secretary </span><a data-dcnode-id="9456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_Hamilton" title="Alexander Hamilton"><span data-dcnode-id="9457" instrument_node="">Alexander Hamilton</span></a><span data-dcnode-id="9455" instrument_node=""> to avoid war with Britain and encourage commerce. The Jeffersonians led by Jefferson and </span><a data-dcnode-id="9453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Madison" title="James Madison"><span data-dcnode-id="9454" instrument_node="">James Madison</span></a><span data-dcnode-id="9452" instrument_node=""> vehemently opposed the treaty, but Washington's support proved decisive, and the U.S. and Britain were on friendly terms for a decade. However the foreign policy dispute polarized parties at home, leading to the </span><a data-dcnode-id="9450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Party_System" title="First Party System"><span data-dcnode-id="9451" instrument_node="">First Party System</span></a><span data-dcnode-id="9449" instrument_node="">.</span><sup class="reference" data-dcnode-id="9446" id="cite_ref-3"><a data-dcnode-id="9447" href="#cite_note-3"><span data-dcnode-id="9448" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="9443" id="cite_ref-4"><a data-dcnode-id="9444" href="#cite_note-4"><span data-dcnode-id="9445" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9442" instrument_node="">
</span></p><p data-dcnode-id="9432"><span data-dcnode-id="9440" instrument_node="">In a "Farewell Message" that became a foundation of policy President </span><a data-dcnode-id="9438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Washington" title="George Washington"><span data-dcnode-id="9439" instrument_node="">George Washington</span></a><span data-dcnode-id="9437" instrument_node=""> in 1796 counseled against foreign entanglements:</span><sup class="reference" data-dcnode-id="9434" id="cite_ref-5"><a data-dcnode-id="9435" href="#cite_note-5"><span data-dcnode-id="9436" instrument_node="">[5]</span></a></sup><span data-dcnode-id="9433" instrument_node="">
</span></p><span data-dcnode-id="9431" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="9426"><p data-dcnode-id="9427"><span data-dcnode-id="9428" instrument_node="">Europe has a set of primary interests, which to us have none, or a very remote relation. Hence she must be engaged in frequent controversies, the causes of which are essentially foreign to our concerns. Hence therefore it must be unwise in us to implicate ourselves, by artificial ties, in the ordinary vicissitudes of her politics, or the ordinary combinations &amp; collisions of her friendships, or enmities. Our detached &amp; distant situation invites and enables us to pursue a different course.
</span></p></blockquote><span data-dcnode-id="9425" instrument_node="">
</span><p data-dcnode-id="9401"><span data-dcnode-id="9424" instrument_node="">By 1797 the French were openly seizing American ships, leading to an undeclared war known as the </span><a data-dcnode-id="9422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quasi-War" title="Quasi-War"><span data-dcnode-id="9423" instrument_node="">Quasi-War</span></a><span data-dcnode-id="9421" instrument_node=""> of 1798–99. President </span><a data-dcnode-id="9419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Adams" title="John Adams"><span data-dcnode-id="9420" instrument_node="">John Adams</span></a><span data-dcnode-id="9418" instrument_node=""> tried diplomacy; it failed. In 1798, the French demanded American diplomats pay huge bribes in order to see the French Foreign Minister </span><a data-dcnode-id="9416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Maurice_de_Talleyrand-P%25C3%25A9rigord" title="Charles Maurice de Talleyrand-Périgord"><span data-dcnode-id="9417" instrument_node="">Talleyrand</span></a><span data-dcnode-id="9415" instrument_node="">, which the Americans rejected. The Republicans, suspicious of Adams, demanded the documentation, which Adams released using X, Y and Z as codes for the names of the French diplomats. The </span><a data-dcnode-id="9413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/XYZ_Affair" title="XYZ Affair"><span data-dcnode-id="9414" instrument_node="">XYZ Affair</span></a><span data-dcnode-id="9412" instrument_node=""> ignited a wave of nationalist sentiment. Overwhelmed, the U.S. Congress approved Adams' plan to organize the navy. American public opinion swung against France, encouraging the Federalists to attempt to suppress the Republican Party. Adams reluctantly signed the </span><a data-dcnode-id="9410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alien_and_Sedition_Acts" title="Alien and Sedition Acts"><span data-dcnode-id="9411" instrument_node="">Alien and Sedition Acts</span></a><span data-dcnode-id="9409" instrument_node=""> designed to weaken the Republicans. However Adams broke with the Hamiltonian wing of his </span><a data-dcnode-id="9407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federalist_Party" title="Federalist Party"><span data-dcnode-id="9408" instrument_node="">Federalist Party</span></a><span data-dcnode-id="9406" instrument_node=""> and made peace with France in 1800. The Federalist party now split, and was unable to reelect Adams in 1800; it never regained power. However, the Republicans hated Napoleon, and no longer supported France in its war with Britain.</span><sup class="reference" data-dcnode-id="9403" id="cite_ref-6"><a data-dcnode-id="9404" href="#cite_note-6"><span data-dcnode-id="9405" instrument_node="">[6]</span></a></sup><span data-dcnode-id="9402" instrument_node="">
</span></p><span data-dcnode-id="9400" instrument_node="">
</span><h2 data-dcnode-id="9389"><span data-dcnode-id="9399" id="Jeffersonian_Era:_1801.E2.80.931829"></span><span class="mw-headline" data-dcnode-id="9397" id="Jeffersonian_Era:_1801–1829"><span data-dcnode-id="9398" instrument_node="">Jeffersonian Era: 1801–1829</span></span><span class="mw-editsection" data-dcnode-id="9390"><span class="mw-editsection-bracket" data-dcnode-id="9395"><span data-dcnode-id="9396" instrument_node="">[</span></span><a data-dcnode-id="9393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D4" title="Edit section: Jeffersonian Era: 1801–1829"><span data-dcnode-id="9394" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9391"><span data-dcnode-id="9392" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9388" instrument_node="">
</span><link data-dcnode-id="9387" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9383" role="note"><span data-dcnode-id="9386" instrument_node="">Main article: </span><a data-dcnode-id="9384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_U.S._foreign_policy%2C_1801%25E2%2580%25931829" title="History of U.S. foreign policy, 1801–1829"><span data-dcnode-id="9385" instrument_node="">History of U.S. foreign policy, 1801–1829</span></a></div><span data-dcnode-id="9382" instrument_node="">
</span><link data-dcnode-id="9381" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9377" role="note"><span data-dcnode-id="9380" instrument_node="">See also: </span><a data-dcnode-id="9378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeffersonian_democracy" title="Jeffersonian democracy"><span data-dcnode-id="9379" instrument_node="">Jeffersonian democracy</span></a></div><span data-dcnode-id="9376" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9363"><div class="thumbinner" data-dcnode-id="9364" style="width:222px;"><a class="image" data-dcnode-id="9374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOfficial_Presidential_portrait_of_Thomas_Jefferson_%28by_Rembrandt_Peale%2C_1800%29%28cropped%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="9375" data-file-height="900" data-file-width="732" decoding="async" height="270" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Official_Presidential_portrait_of_Thomas_Jefferson_%2528by_Rembrandt_Peale%252C_1800%2529%2528cropped%2529.jpg/220px-Official_Presidential_portrait_of_Thomas_Jefferson_%2528by_Rembrandt_Peale%252C_1800%2529%2528cropped%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Official_Presidential_portrait_of_Thomas_Jefferson_%28by_Rembrandt_Peale%2C_1800%29%28cropped%29.jpg/330px-Official_Presidential_portrait_of_Thomas_Jefferson_%28by_Rembrandt_Peale%2C_1800%29%28cropped%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Official_Presidential_portrait_of_Thomas_Jefferson_%28by_Rembrandt_Peale%2C_1800%29%28cropped%29.jpg/440px-Official_Presidential_portrait_of_Thomas_Jefferson_%28by_Rembrandt_Peale%2C_1800%29%28cropped%29.jpg 2x" width="220"></a><span data-dcnode-id="9373" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9365"><div class="magnify" data-dcnode-id="9371"><a class="internal" data-dcnode-id="9372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOfficial_Presidential_portrait_of_Thomas_Jefferson_%28by_Rembrandt_Peale%2C_1800%29%28cropped%29.jpg" title="Enlarge"></a></div><a data-dcnode-id="9369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Jefferson" title="Thomas Jefferson"><span data-dcnode-id="9370" instrument_node="">Thomas Jefferson</span></a><span data-dcnode-id="9368" instrument_node=""> imagined the United States as the force behind an "Empire of Liberty" that would promote </span><a data-dcnode-id="9366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republicanism_in_the_United_States" title="Republicanism in the United States"><span data-dcnode-id="9367" instrument_node="">republicanism</span></a></div></div></div><span data-dcnode-id="9362" instrument_node="">
</span><p data-dcnode-id="9334"><span data-dcnode-id="9361" instrument_node="">Thomas Jefferson envisioned America as the force behind a great "Empire of Liberty",</span><sup class="reference" data-dcnode-id="9358" id="cite_ref-7"><a data-dcnode-id="9359" href="#cite_note-7"><span data-dcnode-id="9360" instrument_node="">[7]</span></a></sup><span data-dcnode-id="9357" instrument_node=""> that would promote </span><a data-dcnode-id="9355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republicanism_in_the_United_States" title="Republicanism in the United States"><span data-dcnode-id="9356" instrument_node="">republicanism</span></a><span data-dcnode-id="9354" instrument_node=""> and counter the imperialism of the </span><a data-dcnode-id="9352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Empire" title="British Empire"><span data-dcnode-id="9353" instrument_node="">British Empire</span></a><span data-dcnode-id="9351" instrument_node="">. The </span><a data-dcnode-id="9349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louisiana_Purchase" title="Louisiana Purchase"><span data-dcnode-id="9350" instrument_node="">Louisiana Purchase</span></a><span data-dcnode-id="9348" instrument_node=""> of 1803, made by Jefferson in a $15 million deal with </span><a data-dcnode-id="9346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleon" title="Napoleon"><span data-dcnode-id="9347" instrument_node="">Napoleon Bonaparte</span></a><span data-dcnode-id="9345" instrument_node="">, doubled the size of the growing nation by adding a huge swath of territory west of the </span><a data-dcnode-id="9343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mississippi_River" title="Mississippi River"><span data-dcnode-id="9344" instrument_node="">Mississippi River</span></a><span data-dcnode-id="9342" instrument_node="">, opening up millions of new farm sites for the yeomen farmers idealized by </span><a data-dcnode-id="9340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeffersonian_democracy" title="Jeffersonian democracy"><span data-dcnode-id="9341" instrument_node="">Jeffersonian Democracy</span></a><span data-dcnode-id="9339" instrument_node="">.</span><sup class="reference" data-dcnode-id="9336" id="cite_ref-8"><a data-dcnode-id="9337" href="#cite_note-8"><span data-dcnode-id="9338" instrument_node="">[8]</span></a></sup><span data-dcnode-id="9335" instrument_node="">
</span></p><p data-dcnode-id="9326"><span data-dcnode-id="9333" instrument_node="">President </span><a data-dcnode-id="9331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Jefferson" title="Thomas Jefferson"><span data-dcnode-id="9332" instrument_node="">Jefferson</span></a><span data-dcnode-id="9330" instrument_node=""> in the </span><a data-dcnode-id="9328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Embargo_Act_of_1807" title="Embargo Act of 1807"><span data-dcnode-id="9329" instrument_node="">Embargo Act of 1807</span></a><span data-dcnode-id="9327" instrument_node=""> forbid trade with both France and Britain, but his policy, largely seen as partisan in favor of agrarian interests instead of commercial interests, was highly unpopular in New England and ineffective in stopping bad treatment from British warships.
</span></p><span data-dcnode-id="9325" instrument_node="">
</span><h3 data-dcnode-id="9315"><span class="mw-headline" data-dcnode-id="9323" id="War_of_1812"><span data-dcnode-id="9324" instrument_node="">War of 1812</span></span><span class="mw-editsection" data-dcnode-id="9316"><span class="mw-editsection-bracket" data-dcnode-id="9321"><span data-dcnode-id="9322" instrument_node="">[</span></span><a data-dcnode-id="9319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D5" title="Edit section: War of 1812"><span data-dcnode-id="9320" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9317"><span data-dcnode-id="9318" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9314" instrument_node="">
</span><link data-dcnode-id="9313" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9303" role="note"><span data-dcnode-id="9312" instrument_node="">Further information: </span><a data-dcnode-id="9310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Presidency_of_Thomas_Jefferson" title="Presidency of Thomas Jefferson"><span data-dcnode-id="9311" instrument_node="">Presidency of Thomas Jefferson</span></a><span data-dcnode-id="9309" instrument_node="">, </span><a data-dcnode-id="9307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Presidency_of_James_Madison" title="Presidency of James Madison"><span data-dcnode-id="9308" instrument_node="">Presidency of James Madison</span></a><span data-dcnode-id="9306" instrument_node="">, and </span><a data-dcnode-id="9304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Origins_of_the_War_of_1812" title="Origins of the War of 1812"><span data-dcnode-id="9305" instrument_node="">Origins of the War of 1812</span></a></div><span data-dcnode-id="9302" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9286"><div class="thumbinner" data-dcnode-id="9287" style="width:222px;"><a class="image" data-dcnode-id="9300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUSS_Constitution_vs_Guerriere.jpg"><img alt="Picture of a sail-powered warship with guns ablaze." class="thumbimage" data-dcnode-id="9301" data-file-height="509" data-file-width="740" decoding="async" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d4/USS_Constitution_vs_Guerriere.jpg/220px-USS_Constitution_vs_Guerriere.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d4/USS_Constitution_vs_Guerriere.jpg/330px-USS_Constitution_vs_Guerriere.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d4/USS_Constitution_vs_Guerriere.jpg/440px-USS_Constitution_vs_Guerriere.jpg 2x" width="220"></a><span data-dcnode-id="9299" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9288"><div class="magnify" data-dcnode-id="9297"><a class="internal" data-dcnode-id="9298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUSS_Constitution_vs_Guerriere.jpg" title="Enlarge"></a></div><a data-dcnode-id="9293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USS_Constitution" title="USS Constitution"><span data-dcnode-id="9296" instrument_node="">USS&nbsp;</span><i data-dcnode-id="9294"><span data-dcnode-id="9295" instrument_node="">Constitution</span></i></a><span data-dcnode-id="9292" instrument_node=""> surprised analysts with an important victory over HMS </span><i data-dcnode-id="9290"><span data-dcnode-id="9291" instrument_node="">Guerriere</span></i><span data-dcnode-id="9289" instrument_node=""> in 1812.</span></div></div></div><span data-dcnode-id="9285" instrument_node="">
</span><p data-dcnode-id="9274"><span data-dcnode-id="9284" instrument_node="">The Jeffersonians deeply distrusted the British in the first place, but the British shut down most American trade with France, and impressed into the Royal Navy about 6000 sailors on American ships who claimed American citizenship. American honor was humiliated by the British attack on the American warship </span><a data-dcnode-id="9280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chesapeake%25E2%2580%2593Leopard_affair" title="Chesapeake–Leopard affair"><i data-dcnode-id="9282"><span data-dcnode-id="9283" instrument_node="">Chesapeake</span></i><span data-dcnode-id="9281" instrument_node=""> in 1807</span></a><span data-dcnode-id="9279" instrument_node="">.</span><sup class="reference" data-dcnode-id="9276" id="cite_ref-9"><a data-dcnode-id="9277" href="#cite_note-9"><span data-dcnode-id="9278" instrument_node="">[9]</span></a></sup><span data-dcnode-id="9275" instrument_node="">
</span></p><p data-dcnode-id="9268"><span data-dcnode-id="9273" instrument_node="">In the west, Indians supported and armed by Britain used ambushes and raids to kill settlers, thus delaying the expansion of frontier settlements into the Midwest (Ohio, Indiana, and Michigan, especially).</span><sup class="reference" data-dcnode-id="9270" id="cite_ref-10"><a data-dcnode-id="9271" href="#cite_note-10"><span data-dcnode-id="9272" instrument_node="">[10]</span></a></sup><span data-dcnode-id="9269" instrument_node="">
</span></p><p data-dcnode-id="9256"><span data-dcnode-id="9267" instrument_node="">In 1812 diplomacy had broken down and the U.S. declared war on Britain. The </span><a data-dcnode-id="9265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_of_1812" title="War of 1812"><span data-dcnode-id="9266" instrument_node="">War of 1812</span></a><span data-dcnode-id="9264" instrument_node=""> was marked by very bad planning and military fiascoes on both sides. It ended with the </span><a data-dcnode-id="9262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Ghent" title="Treaty of Ghent"><span data-dcnode-id="9263" instrument_node="">Treaty of Ghent</span></a><span data-dcnode-id="9261" instrument_node=""> in 1815. Militarily it was a stalemate as both sides failed in their invasion attempts, but the Royal Navy blockaded the coastline and shut down American trade (except for smuggling supplies into British Canada). However the British achieved their main goal of defeating Napoleon, while the American armies defeated the Indian alliance that the British had supported, ending the British war goal of establishing a pro-British Indian boundary nation in the Midwest and giving them territorial advantage over the U.S. The British stopped impressing American sailors and trade with France (now an ally of Britain) resumed, so the causes of the war had been cleared away. Especially after the great American victory at the Battle of New Orleans, Americans felt proud and triumphant for having won their "second war of independence."</span><sup class="reference" data-dcnode-id="9258" id="cite_ref-11"><a data-dcnode-id="9259" href="#cite_note-11"><span data-dcnode-id="9260" instrument_node="">[11]</span></a></sup><span data-dcnode-id="9257" instrument_node=""> Successful generals Andrew Jackson and William Henry Harrison became political heroes as well. After 1815 tensions de-escalated along the U.S.-Canada border, with peaceful trade and generally good relations. Boundary disputes were settled amicably. Both the U.S. and Canada saw a surge in nationalism and national pride after 1815, with the U.S. moving toward greater democracy and the British postponing democracy in Canada.
</span></p><p data-dcnode-id="9247"><span data-dcnode-id="9255" instrument_node="">After 1780 The United States opened relations with North African countries, and with the </span><a data-dcnode-id="9253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkey%25E2%2580%2593United_States_relations%23Ottoman_Empire" title="Turkey–United States relations"><span data-dcnode-id="9254" instrument_node="">Ottoman Empire</span></a><span data-dcnode-id="9252" instrument_node="">.</span><sup class="reference" data-dcnode-id="9249" id="cite_ref-12"><a data-dcnode-id="9250" href="#cite_note-12"><span data-dcnode-id="9251" instrument_node="">[12]</span></a></sup><span data-dcnode-id="9248" instrument_node="">
</span></p><span data-dcnode-id="9246" instrument_node="">
</span><h3 data-dcnode-id="9236"><span class="mw-headline" data-dcnode-id="9244" id="Latin_America"><span data-dcnode-id="9245" instrument_node="">Latin America</span></span><span class="mw-editsection" data-dcnode-id="9237"><span class="mw-editsection-bracket" data-dcnode-id="9242"><span data-dcnode-id="9243" instrument_node="">[</span></span><a data-dcnode-id="9240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D6" title="Edit section: Latin America"><span data-dcnode-id="9241" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9238"><span data-dcnode-id="9239" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9235" instrument_node="">
</span><p data-dcnode-id="9213"><span data-dcnode-id="9234" instrument_node="">In response to the new independence of Spanish colonies in Latin America in 1821, the United States, in cooperation with Great Britain, established the </span><a data-dcnode-id="9232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monroe_Doctrine" title="Monroe Doctrine"><span data-dcnode-id="9233" instrument_node="">Monroe Doctrine</span></a><span data-dcnode-id="9231" instrument_node=""> in 1823.</span><sup class="reference" data-dcnode-id="9228" id="cite_ref-13"><a data-dcnode-id="9229" href="#cite_note-13"><span data-dcnode-id="9230" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9227" instrument_node=""> This policy declared opposition to European interference in </span><a data-dcnode-id="9225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Americas" title="Americas"><span data-dcnode-id="9226" instrument_node="">the Americas</span></a><span data-dcnode-id="9224" instrument_node=""> and left a lasting imprint on the psyche of later American leaders. The failure of Spain to colonize or police Florida led to its purchase by the U.S. in 1821. </span><a data-dcnode-id="9222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Quincy_Adams" title="John Quincy Adams"><span data-dcnode-id="9223" instrument_node="">John Quincy Adams</span></a><span data-dcnode-id="9221" instrument_node=""> was Secretary of State under President Monroe.</span><sup class="reference" data-dcnode-id="9218" id="cite_ref-14"><a data-dcnode-id="9219" href="#cite_note-14"><span data-dcnode-id="9220" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="9215" id="cite_ref-15"><a data-dcnode-id="9216" href="#cite_note-15"><span data-dcnode-id="9217" instrument_node="">[15]</span></a></sup><span data-dcnode-id="9214" instrument_node="">
</span></p><span data-dcnode-id="9212" instrument_node="">
</span><h2 data-dcnode-id="9201"><span data-dcnode-id="9211" id="Jacksonian_Era:_1829.E2.80.931861"></span><span class="mw-headline" data-dcnode-id="9209" id="Jacksonian_Era:_1829–1861"><span data-dcnode-id="9210" instrument_node="">Jacksonian Era: 1829–1861</span></span><span class="mw-editsection" data-dcnode-id="9202"><span class="mw-editsection-bracket" data-dcnode-id="9207"><span data-dcnode-id="9208" instrument_node="">[</span></span><a data-dcnode-id="9205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D7" title="Edit section: Jacksonian Era: 1829–1861"><span data-dcnode-id="9206" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9203"><span data-dcnode-id="9204" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9200" instrument_node="">
</span><link data-dcnode-id="9199" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9195" role="note"><span data-dcnode-id="9198" instrument_node="">Main article: </span><a data-dcnode-id="9196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_U.S._foreign_policy%2C_1829%25E2%2580%25931861" title="History of U.S. foreign policy, 1829–1861"><span data-dcnode-id="9197" instrument_node="">History of U.S. foreign policy, 1829–1861</span></a></div><span data-dcnode-id="9194" instrument_node="">
</span><link data-dcnode-id="9193" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9189" role="note"><span data-dcnode-id="9192" instrument_node="">See also: </span><a data-dcnode-id="9190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacksonian_democracy" title="Jacksonian democracy"><span data-dcnode-id="9191" instrument_node="">Jacksonian democracy</span></a></div><span data-dcnode-id="9188" instrument_node="">
</span><h3 data-dcnode-id="9177"><span data-dcnode-id="9187" id="Mexican.E2.80.93American_War"></span><span class="mw-headline" data-dcnode-id="9185" id="Mexican–American_War"><span data-dcnode-id="9186" instrument_node="">Mexican–American War</span></span><span class="mw-editsection" data-dcnode-id="9178"><span class="mw-editsection-bracket" data-dcnode-id="9183"><span data-dcnode-id="9184" instrument_node="">[</span></span><a data-dcnode-id="9181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D8" title="Edit section: Mexican–American War"><span data-dcnode-id="9182" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9179"><span data-dcnode-id="9180" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9176" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9155"><div class="thumbinner" data-dcnode-id="9156" style="width:372px;"><a class="image" data-dcnode-id="9174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUnited_States_1849-1850.png"><img alt="" class="thumbimage" data-dcnode-id="9175" data-file-height="677" data-file-width="1000" decoding="async" height="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e2/United_States_1849-1850.png/370px-United_States_1849-1850.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e2/United_States_1849-1850.png/555px-United_States_1849-1850.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e2/United_States_1849-1850.png/740px-United_States_1849-1850.png 2x" width="370"></a><span data-dcnode-id="9173" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9157"><div class="magnify" data-dcnode-id="9171"><a class="internal" data-dcnode-id="9172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUnited_States_1849-1850.png" title="Enlarge"></a></div><span data-dcnode-id="9170" instrument_node="">The United States annexed the </span><a data-dcnode-id="9168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_Texas" title="Republic of Texas"><span data-dcnode-id="9169" instrument_node="">Republic of Texas</span></a><span data-dcnode-id="9167" instrument_node=""> and acquired </span><a data-dcnode-id="9165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oregon_Country" title="Oregon Country"><span data-dcnode-id="9166" instrument_node="">Oregon Country</span></a><span data-dcnode-id="9164" instrument_node=""> and the </span><a data-dcnode-id="9162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mexican_Cession" title="Mexican Cession"><span data-dcnode-id="9163" instrument_node="">Mexican cession</span></a><span data-dcnode-id="9161" instrument_node=""> during the </span><a data-dcnode-id="9159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Presidency_of_James_K._Polk" title="Presidency of James K. Polk"><span data-dcnode-id="9160" instrument_node="">presidency of James K. Polk</span></a><span data-dcnode-id="9158" instrument_node=""> (1845–1849)</span></div></div></div><span data-dcnode-id="9154" instrument_node="">
</span><p data-dcnode-id="9139"><span data-dcnode-id="9153" instrument_node="">In 1846 after an intense political debate in which the expansionist Democrats prevailed over the Whigs, the U.S. annexed the Republic of Texas. Mexico never recognized that Texas had achieved independence and promised war should the U.S. annex it. President </span><a data-dcnode-id="9151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_K._Polk" title="James K. Polk"><span data-dcnode-id="9152" instrument_node="">James K. Polk</span></a><span data-dcnode-id="9150" instrument_node=""> peacefully resolved a border dispute with Britain regarding Oregon, then sent U.S. Army patrols into the disputed area of Texas. That triggered the </span><a data-dcnode-id="9148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mexican%25E2%2580%2593American_War" title="Mexican–American War"><span data-dcnode-id="9149" instrument_node="">Mexican–American War</span></a><span data-dcnode-id="9147" instrument_node="">, which the Americans won easily. As a result of the </span><a data-dcnode-id="9145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Guadalupe_Hidalgo" title="Treaty of Guadalupe Hidalgo"><span data-dcnode-id="9146" instrument_node="">Treaty of Guadalupe Hidalgo</span></a><span data-dcnode-id="9144" instrument_node=""> in 1848 the U.S. acquired territory that included California, Arizona, and New Mexico, and the Hispanic residents there were given full U.S. citizenship.</span><sup class="reference" data-dcnode-id="9141" id="cite_ref-16"><a data-dcnode-id="9142" href="#cite_note-16"><span data-dcnode-id="9143" instrument_node="">[16]</span></a></sup><span data-dcnode-id="9140" instrument_node="">
</span></p><span data-dcnode-id="9138" instrument_node="">
</span><h3 data-dcnode-id="9128"><span class="mw-headline" data-dcnode-id="9136" id="Nicaraguan_canal"><span data-dcnode-id="9137" instrument_node="">Nicaraguan canal</span></span><span class="mw-editsection" data-dcnode-id="9129"><span class="mw-editsection-bracket" data-dcnode-id="9134"><span data-dcnode-id="9135" instrument_node="">[</span></span><a data-dcnode-id="9132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D9" title="Edit section: Nicaraguan canal"><span data-dcnode-id="9133" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9130"><span data-dcnode-id="9131" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9127" instrument_node="">
</span><p data-dcnode-id="9118"><span data-dcnode-id="9126" instrument_node="">The British wanted a stable Mexico to block American expansion to the Southwest, but an unstable Mexico attacked Texas and wanted revenge for its defeat. The result was a vast American expansion. The discovery of gold in California in 1848 brought a heavy demand for passage to the gold fields, with the main routes crossing Panama to avoid a very long slow sailing voyage around all of South America. A railroad was built that carried 600,000 despite the dangerous environment in Panama. A canal in Nicaragua was a much more healthier and attractive possibility, and American businessman </span><a data-dcnode-id="9124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cornelius_Vanderbilt" title="Cornelius Vanderbilt"><span data-dcnode-id="9125" instrument_node="">Cornelius Vanderbilt</span></a><span data-dcnode-id="9123" instrument_node=""> gained the necessary permissions, along with a U.S. treaty with Nicaragua. Britain had long dominated Central America, but American influence was growing, and the small countries look to the United States for protection against British imperialism. However the British were determined to block an American canal, and seized key locations on the Miskito coast on the Atlantic that blocked it. The Whigs were in charge in Washington and unlike the bellicose Democrats wanted a business-like peaceful solution. The Whigs took a lesson from the British experience monopolizing the chokepoint of Gibraltar, which produced no end of conflicts, wars, and military and naval expenses for the British. The United States decided that a canal should be open and neutral to all the world's traffic, and not be militarized. Tensions escalated locally, with small-scale physical confrontations in the field.</span><sup class="reference" data-dcnode-id="9120" id="cite_ref-17"><a data-dcnode-id="9121" href="#cite_note-17"><span data-dcnode-id="9122" instrument_node="">[17]</span></a></sup><span data-dcnode-id="9119" instrument_node="">
</span></p><p data-dcnode-id="9109"><span data-dcnode-id="9117" instrument_node="">In the </span><a data-dcnode-id="9115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clayton%25E2%2580%2593Bulwer_Treaty" title="Clayton–Bulwer Treaty"><span data-dcnode-id="9116" instrument_node="">Clayton–Bulwer Treaty</span></a><span data-dcnode-id="9114" instrument_node=""> of 1850 Washington and London found a diplomatic solution. To avert an escalating clash it focused on a Nicaragua Canal that would connect the Pacific and the Atlantic. The three main treaty provisions stated that neither nation would build such a canal without the consent and cooperation of the other; neither would fortify or found new colonies in the region; if and when a canal was built, both powers would guarantee that it would be available on a neutral basis for all shipping. However, disagreements arose and no Nicaragua canal was ever started, but the treaty remained in effect until 1901. By 1857–59, London dropped its opposition to American territorial expansion.</span><sup class="reference" data-dcnode-id="9111" id="cite_ref-18"><a data-dcnode-id="9112" href="#cite_note-18"><span data-dcnode-id="9113" instrument_node="">[18]</span></a></sup><span data-dcnode-id="9110" instrument_node="">
</span></p><p data-dcnode-id="9094"><span data-dcnode-id="9108" instrument_node="">The opening of the transcontinental railroad in 1869 made travel to California fast, cheap and safe. Americans lost interest in canals and focused their attention on building long-distance railways. The British, meanwhile, turned their attention to building the Suez Canal through Egypt. London maintained a veto on American canal building in Nicaragua. In 1890s, the French made a major effort to build a canal through Panama, but it self-destructed through mismanagement, severe corruption, and especially the deadly disease environment. By the late 1890s Britain saw the need for much improved relations with the United States, and agreed to allow the U.S. to build a canal through either Nicaragua or Panama. The choice was Panama. The </span><a data-dcnode-id="9106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hay%25E2%2580%2593Pauncefote_Treaty" title="Hay–Pauncefote Treaty"><span data-dcnode-id="9107" instrument_node="">Hay–Pauncefote Treaty</span></a><span data-dcnode-id="9105" instrument_node=""> of 1901 replaced the Clayton–Bulwer Treaty, and adopted the rule of neutralization for the </span><a data-dcnode-id="9103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panama_Canal" title="Panama Canal"><span data-dcnode-id="9104" instrument_node="">Panama Canal</span></a><span data-dcnode-id="9102" instrument_node=""> which the U.S. built; it opened in 1914.</span><sup class="reference" data-dcnode-id="9099" id="cite_ref-19"><a data-dcnode-id="9100" href="#cite_note-19"><span data-dcnode-id="9101" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="9096" id="cite_ref-20"><a data-dcnode-id="9097" href="#cite_note-20"><span data-dcnode-id="9098" instrument_node="">[20]</span></a></sup><span data-dcnode-id="9095" instrument_node="">
</span></p><span data-dcnode-id="9093" instrument_node="">
</span><h3 data-dcnode-id="9082"><span data-dcnode-id="9092" id="President_Buchanan.2C_1857-1861"></span><span class="mw-headline" data-dcnode-id="9090" id="President_Buchanan,_1857-1861"><span data-dcnode-id="9091" instrument_node="">President Buchanan, 1857-1861</span></span><span class="mw-editsection" data-dcnode-id="9083"><span class="mw-editsection-bracket" data-dcnode-id="9088"><span data-dcnode-id="9089" instrument_node="">[</span></span><a data-dcnode-id="9086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D10" title="Edit section: President Buchanan, 1857-1861"><span data-dcnode-id="9087" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9084"><span data-dcnode-id="9085" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9081" instrument_node="">
</span><link data-dcnode-id="9080" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9076" role="note"><span data-dcnode-id="9079" instrument_node="">Further information: </span><a data-dcnode-id="9077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Presidency_of_James_Buchanan" title="Presidency of James Buchanan"><span data-dcnode-id="9078" instrument_node="">Presidency of James Buchanan</span></a></div><span data-dcnode-id="9075" instrument_node="">
</span><p data-dcnode-id="9053"><span data-dcnode-id="9074" instrument_node="">Buchanan had a great deal of experience in foreign policy and entered the White House with an ambitious foreign policy, but he and Secretary of State </span><a data-dcnode-id="9072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lewis_Cass" title="Lewis Cass"><span data-dcnode-id="9073" instrument_node="">Lewis Cass</span></a><span data-dcnode-id="9071" instrument_node=""> had very little success. The primary obstacle was opposition from Congress. His ambitions centered around establishing American hegemony over Central America at the expense of Great Britain.</span><sup class="reference" data-dcnode-id="9068" id="cite_ref-21"><a data-dcnode-id="9069" href="#cite_note-21"><span data-dcnode-id="9070" instrument_node="">[21]</span></a></sup><span data-dcnode-id="9067" instrument_node=""> He hoped to re-negotiate the </span><a data-dcnode-id="9065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clayton%25E2%2580%2593Bulwer_Treaty" title="Clayton–Bulwer Treaty"><span data-dcnode-id="9066" instrument_node="">Clayton-Bulwer Treaty</span></a><span data-dcnode-id="9064" instrument_node="">, which he viewed as a mistake that limited U.S. influence in the region. He also sought to establish American protectorates over the Mexican states of </span><a data-dcnode-id="9062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chihuahua_%28state%29" title="Chihuahua (state)"><span data-dcnode-id="9063" instrument_node="">Chihuahua</span></a><span data-dcnode-id="9061" instrument_node=""> and </span><a data-dcnode-id="9059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sonora" title="Sonora"><span data-dcnode-id="9060" instrument_node="">Sonora</span></a><span data-dcnode-id="9058" instrument_node="">, In part as a destination for Mormons.</span><sup class="reference" data-dcnode-id="9055" id="cite_ref-22"><a data-dcnode-id="9056" href="#cite_note-22"><span data-dcnode-id="9057" instrument_node="">[22]</span></a></sup><span data-dcnode-id="9054" instrument_node="">
</span></p><p data-dcnode-id="9026"><span data-dcnode-id="9052" instrument_node="">Aware of the decrepit state of the Spanish Empire, he hoped to finally achieve his long-term goal of acquiring Cuba, where slavery still flourished. After long negotiations with the British, he convinced them to agree to cede the </span><a data-dcnode-id="9050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bay_Islands_Department" title="Bay Islands Department"><span data-dcnode-id="9051" instrument_node="">Bay Islands</span></a><span data-dcnode-id="9049" instrument_node=""> to </span><a data-dcnode-id="9047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Honduras" title="Honduras"><span data-dcnode-id="9048" instrument_node="">Honduras</span></a><span data-dcnode-id="9046" instrument_node=""> and the </span><a data-dcnode-id="9044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mosquito_Coast" title="Mosquito Coast"><span data-dcnode-id="9045" instrument_node="">Mosquito Coast</span></a><span data-dcnode-id="9043" instrument_node=""> to </span><a data-dcnode-id="9041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicaragua" title="Nicaragua"><span data-dcnode-id="9042" instrument_node="">Nicaragua</span></a><span data-dcnode-id="9040" instrument_node="">. However, Buchanan's ambitions in Cuba and Mexico were blocked in the House of Representatives where the anti-slavery forces strenuously opposed any move to acquire new slave territory. Buchanan was assisted by his ally Senator </span><a data-dcnode-id="9038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Slidell" title="John Slidell"><span data-dcnode-id="9039" instrument_node="">John Slidell</span></a><span data-dcnode-id="9037" instrument_node=""> (D.-Louisiana). But Senator </span><a class="mw-redirect" data-dcnode-id="9035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Douglas" title="Stephen Douglas"><span data-dcnode-id="9036" instrument_node="">Stephen Douglas</span></a><span data-dcnode-id="9034" instrument_node="">, a bitter enemy of Buchanan inside the Democratic Party, worked hard to frustrate Buchanan's foreign-policy.</span><sup class="reference" data-dcnode-id="9031" id="cite_ref-23"><a data-dcnode-id="9032" href="#cite_note-23"><span data-dcnode-id="9033" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="9028" id="cite_ref-24"><a data-dcnode-id="9029" href="#cite_note-24"><span data-dcnode-id="9030" instrument_node="">[24]</span></a></sup><span data-dcnode-id="9027" instrument_node="">
</span></p><p data-dcnode-id="9024"><span data-dcnode-id="9025" instrument_node="">Buchanan tried to purchase Alaska from Russia, possibly as a colony for Mormon settlers, but the U.S. and Russia were unable to agree upon a price.
</span></p><p data-dcnode-id="9003"><span data-dcnode-id="9023" instrument_node="">In China, despite not taking direct part in the </span><a data-dcnode-id="9021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Opium_War" title="Second Opium War"><span data-dcnode-id="9022" instrument_node="">Second Opium War</span></a><span data-dcnode-id="9020" instrument_node="">, the Buchanan administration won trade concessions. The president relied on </span><a data-dcnode-id="9018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Bradford_Reed" title="William Bradford Reed"><span data-dcnode-id="9019" instrument_node="">William Bradford Reed</span></a><span data-dcnode-id="9017" instrument_node=""> (1806–1876) his Minister to China in 1857–58. A former Whig, Reed had persuaded many old-line Whigs to support Buchanan in the 1856 campaign. The </span><a data-dcnode-id="9015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Tientsin" title="Treaty of Tientsin"><span data-dcnode-id="9016" instrument_node="">Treaty of Tientsin</span></a><span data-dcnode-id="9014" instrument_node=""> (1858) granted American diplomats the right to reside in Peking, reduced tariff levels for American goods, and guaranteed the free exercise of religion by foreigners in China. Reed developed some of the roots of the </span><a data-dcnode-id="9012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_Door_Policy" title="Open Door Policy"><span data-dcnode-id="9013" instrument_node="">Open Door Policy</span></a><span data-dcnode-id="9011" instrument_node=""> that came to fruition 40 years later.</span><sup class="reference" data-dcnode-id="9008" id="cite_ref-25"><a data-dcnode-id="9009" href="#cite_note-25"><span data-dcnode-id="9010" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="9005" id="cite_ref-26"><a data-dcnode-id="9006" href="#cite_note-26"><span data-dcnode-id="9007" instrument_node="">[26]</span></a></sup><span data-dcnode-id="9004" instrument_node="">
</span></p><p data-dcnode-id="8986"><span data-dcnode-id="9002" instrument_node="">In 1858, Buchanan was angered by "A most unprovoked, unwarrantable, and dastardly attack" and ordered the </span><a data-dcnode-id="9000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paraguay_expedition" title="Paraguay expedition"><span data-dcnode-id="9001" instrument_node="">Paraguay expedition</span></a><span data-dcnode-id="8999" instrument_node="">. Its successful mission was to punish </span><a data-dcnode-id="8997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paraguay" title="Paraguay"><span data-dcnode-id="8998" instrument_node="">Paraguay</span></a><span data-dcnode-id="8996" instrument_node=""> for firing on the </span><a data-dcnode-id="8992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USS_Water_Witch_%281851%29" title="USS Water Witch (1851)"><span data-dcnode-id="8995" instrument_node="">USS&nbsp;</span><i data-dcnode-id="8993"><span data-dcnode-id="8994" instrument_node="">Water Witch</span></i></a><span data-dcnode-id="8991" instrument_node=""> which was on a scientific expedition. Paraguay apologized and paid an indemnity.</span><sup class="reference" data-dcnode-id="8988" id="cite_ref-27"><a data-dcnode-id="8989" href="#cite_note-27"><span data-dcnode-id="8990" instrument_node="">[27]</span></a></sup><span data-dcnode-id="8987" instrument_node="">
</span></p><span data-dcnode-id="8985" instrument_node="">
</span><h2 data-dcnode-id="8974"><span data-dcnode-id="8984" id="Civil_War_and_the_Gilded_Age:_1861.E2.80.931897"></span><span class="mw-headline" data-dcnode-id="8982" id="Civil_War_and_the_Gilded_Age:_1861–1897"><span data-dcnode-id="8983" instrument_node="">Civil War and the Gilded Age: 1861–1897</span></span><span class="mw-editsection" data-dcnode-id="8975"><span class="mw-editsection-bracket" data-dcnode-id="8980"><span data-dcnode-id="8981" instrument_node="">[</span></span><a data-dcnode-id="8978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D11" title="Edit section: Civil War and the Gilded Age: 1861–1897"><span data-dcnode-id="8979" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8976"><span data-dcnode-id="8977" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8973" instrument_node="">
</span><link data-dcnode-id="8972" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8965" role="note"><span data-dcnode-id="8971" instrument_node="">Main articles: </span><a data-dcnode-id="8969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diplomacy_of_the_American_Civil_War" title="Diplomacy of the American Civil War"><span data-dcnode-id="8970" instrument_node="">Diplomacy of the American Civil War</span></a><span data-dcnode-id="8968" instrument_node=""> and </span><a data-dcnode-id="8966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_U.S._foreign_policy%2C_1861%25E2%2580%25931897" title="History of U.S. foreign policy, 1861–1897"><span data-dcnode-id="8967" instrument_node="">History of U.S. foreign policy, 1861–1897</span></a></div><span data-dcnode-id="8964" instrument_node="">
</span><h3 data-dcnode-id="8954"><span class="mw-headline" data-dcnode-id="8962" id="American_Civil_War"><span data-dcnode-id="8963" instrument_node="">American Civil War</span></span><span class="mw-editsection" data-dcnode-id="8955"><span class="mw-editsection-bracket" data-dcnode-id="8960"><span data-dcnode-id="8961" instrument_node="">[</span></span><a data-dcnode-id="8958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_United_States_foreign_policy%26action%3Dedit%26section%3D12" title="Edit section: American Civil War"><span data-dcnode-id="8959" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8956"><span data-dcnode-id="8957" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8953" instrument_node="">
</span><link data-dcnode-id="8952" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8945" role="note"><span data-dcnode-id="8951" instrument_node="">See also: </span><a data-dcnode-id="8949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom_and_the_American_Civil_War" title="United Kingdom and the American Civil War"><span data-dcnode-id="8950" instrument_node="">United Kingdom and the American Civil War</span></a><span data-dcnode-id="8948" instrument_node=""> and </span><a data-dcnode-id="8946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/France_and_the_American_Civil_War" title="France and the American Civil War"><span data-dcnode-id="8947" instrument_node="">France and the American Civil War</span></a></div><span data-dcnode-id="8944" instrument_node="">
</span><p data-dcnode-id="8928"><span data-dcnode-id="8943" instrument_node="">Every nation was officially neutral throughout the </span><a data-dcnode-id="8941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Civil_War" title="American Civil War"><span data-dcnode-id="8942" instrument_node="">American Civil War</span></a><span data-dcnode-id="8940" instrument_node="">, and none recognized the Confederacy. That marked a major diplomatic achievement for Secretary Seward and the Lincoln Administration. France, under </span><a data-dcnode-id="8938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleon_III" title="Napoleon III"><span data-dcnode-id="8939" instrument_node="">Napoleon III</span></a><span data-dcnode-id="8937" instrument_node="">, had invaded Mexico and installed a puppet regime; it hoped to negate American influence. France therefore encouraged Britain in a policy of mediation suggesting that both would recognize the Confederacy.</span><sup class="reference" data-dcnode-id="8934" id="cite_ref-28"><a data-dcnode-id="8935" href="#cite_note-28"><span data-dcnode-id="8936" instrument_node="">[28]</span></a></sup><span data-dcnode-id="8933" instrument_node=""> Lincoln repeatedly warned that meant war. The British textile industry depended on cotton from the South, but it had stocks to keep the mills operating for a year and in any case the industrialists and workers carried little weight in British politics. Knowing a war would cut off vital shipments of American food, wreak havoc on the British merchant fleet, and cause the immediate loss of Canada, Britain, with its powerful Royal Navy, refused to go along with French schemes.</span><sup class="reference" data-dcnode-id="8930" id="cite_ref-29"><a data-dcnode-id="8931" href="#cite_note-29"><span data-dcnode-id="8932" instrument_node="">[29]</span></a></sup><span data-dcnode-id="8929" instrument_node="">
</span></p><p data-dcnode-id="8922"><span data-dcnode-id="8927" instrument_node="">Lincoln's foreign policy was deficient in 1861 in terms of appealing to European public opinion. Diplomats had to explain that United States was not committed to the ending of slavery, but instead they repeated legalistic arguments about the unconstitutionality of secession. Confederate spokesman, on the other hand, were much more successful by ignoring slavery and instead focusing on their struggle for liberty, their commitment to free trade, and the essential role of cotton in the European economy. In addition, the European aristocracy (the dominant factor in every major country) was "absolutely gleeful in pronouncing the American debacle as proof that the entire experiment in popular government had failed. European government leaders welcomed the fragmentation of the ascendant American Republic."</span><sup class="reference" data-dcnode-id="8924" id="cite_ref-30"><a data-dcnode-id="8925" href="#cite_note-30"><span data-dcnode-id="8926" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8923" instrument_node="">
</span></p><p data-dcnode-id="8907"><span data-dcnode-id="8921" instrument_node="">Elite opinion in Britain tended to favor </span><a data-dcnode-id="8919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confederate_States_of_America" title="Confederate States of America"><span data-dcnode-id="8920" instrument_node="">the Confederacy</span></a><span data-dcnode-id="8918" instrument_node="">, while public opinion tended to favor the United States. Large scale trade continued in both directions with the United States, with the Americans </span><a data-dcnode-id="8916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grain_trade" title="Grain trade"><span data-dcnode-id="8917" instrument_node="">shipping grain</span></a><span data-dcnode-id="8915" instrument_node=""> to Britain while Britain sent manufactured items and munitions. Immigration continued into the United States. British trade with the Confederacy was limited, with a trickle of cotton going to Britain and some munitions slipped in by numerous small blockade runners. The Confederate strategy for securing independence was largely based on the hope of military intervention by Britain and France, but Confederate diplomacy proved inept. With the announcement of the </span><a data-dcnode-id="8913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emancipation_Proclamation" title="Emancipation Proclamation"><span data-dcnode-id="8914" instrument_node="">Emancipation Proclamation</span></a><span data-dcnode-id="8912" instrument_node=""> in September 1862, it became a war against slavery that most British supported.</span><sup class="reference" data-dcnode-id="8909" id="cite_ref-31"><a data-dcnode-id="8910" href="#cite_note-31"><span data-dcnode-id="8911" instrument_node="">[31]</span></a></sup><span data-dcnode-id="8908" instrument_node="">
</span></p><p data-dcnode-id="8898"><span data-dcnode-id="8906" instrument_node="">A serious diplomatic dispute with the United States erupted over the "</span><a data-dcnode-id="8904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trent_Affair" title="Trent Affair"><span data-dcnode-id="8905" instrument_node="">Trent Affair</span></a><span data-dcnode-id="8903" instrument_node="">" in late 1861. Public opinion in the Union called for war against Britain, but Lincoln gave in and sent back the diplomats his Navy had illegally seized.</span><sup class="reference" data-dcnode-id="8900" id="cite_ref-32"><a data-dcnode-id="8901" href="#cite_note-32"><span data-dcnode-id="8902" instrument_node="">[32]</span></a></sup><span data-dcnode-id="8899" instrument_node="">
</span></p><p data-dcnode-id="8893"><span data-dcnode-id="8897" instrument_node="">British financiers built and operated most of the </span><a data-dcnode-id="8895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blockade_runners_of_the_American_Civil_War" title="Blockade runners of the American Civil War"><span data-dcnode-id="8896" instrument_node="">blockade runners</span></a><span data-dcnode-id="8894" instrument_node="">, spending hundreds of millions of pounds on them; but that was legal and not the cause of serious tension. They were staffed by sailors and officers on leave from the Royal Navy. When the U.S. Navy captured one of the fast blockade runners, it sold the ship and cargo as prize money for the American sailors, then released the crew.
</span></p><p data-dcnode-id="8884"><span data-dcnode-id="8892" instrument_node="">The American diplomatic mission headed by Minister </span><a data-dcnode-id="8890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Francis_Adams_Sr." title="Charles Francis Adams Sr."><span data-dcnode-id="8891" instrument_node="">Charles Francis Adams, Sr.</span></a><span data-dcnode-id="8889" instrument_node=""> proved much more successful than the Confederate missions, which were never officially recognized.</span><sup class="reference" data-dcnode-id="8886" id="cite_ref-33"><a data-dcnode-id="8887" href="#cite_note-33"><span data-dcnode-id="8888" instrument_node="">[33]</span></a></sup><span data-dcnode-id="8885" instrument_node="">
</span></p><p data-dcnode-id="8878"><span data-dcnode-id="8883" instrument_node="">Historian Don Doyle has argued that the Union victory had a major impact on the course of world history.</span><sup class="reference" data-dcnode-id="8880" id="cite_ref-34"><a data-dcnode-id="8881" href="#cite_note-34"><span data-dcnode-id="8882" instrument_node="">[34]</span></a></sup><span data-dcnode-id="8879" instrument_node=""> The Union victory energized popular democratic forces. A Confederate victory, on the other hand, would have meant a new birth of slavery, not freedom. Historian Fergus Bordewich, following Doyle, argues that: 
</span></p><span data-dcnode-id="8877" instrument_node="">
</span><dl data-dcnode-id="8871"><dd data-dcnode-id="8872"><span data-dcnode-id="8876" instrument_node="">The North's victory decisively proved the durability of democratic government. Confederate independence, on the other hand, would have established An American model for reactionary politics and race-based repression that would likely have cast an international shadow into the twentieth century and perhaps beyond."</span><sup class="reference" data-dcnode-id="8873" id="cite_ref-35"><a data-dcnode-id="8874" href="#cite_note-35"><span data-dcnode-id="8875" instrument_node="">[35]</span></a></sup></dd></dl><span data-dcnode-id="8870" instrument_node="">
