</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="6322" id="firstHeading"><span data-dcnode-id="6323" instrument_node="">Criticism of United States foreign policy</span></h1><span data-dcnode-id="6321" instrument_node="">

</span><p data-dcnode-id="6259"><b data-dcnode-id="6293"><span data-dcnode-id="6294" instrument_node="">Criticism of United States foreign policy</span></b><span data-dcnode-id="6292" instrument_node=""> encompasses a wide range of opinions and views on failures and shortcoming of </span><a class="mw-redirect" data-dcnode-id="6290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_foreign_policy" title="United States foreign policy"><span data-dcnode-id="6291" instrument_node="">United States foreign policy</span></a><span data-dcnode-id="6289" instrument_node=""> and actions. There is a widely-held sense in the United States which views the country as qualitatively different from other nations and therefore cannot be judged by the same standards as other countries; this belief is sometimes termed </span><a data-dcnode-id="6287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_exceptionalism" title="American exceptionalism"><span data-dcnode-id="6288" instrument_node="">American exceptionalism</span></a><span data-dcnode-id="6286" instrument_node="">.</span><sup class="reference" data-dcnode-id="6283" id="cite_ref-tws22dec116ex_1-0"><a data-dcnode-id="6284" href="#cite_note-tws22dec116ex-1"><span data-dcnode-id="6285" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6282" instrument_node=""> American exceptionalism has widespread implications and transcribes into disregard to the international norms, rules and laws in U.S. foreign policy. For example, the U.S. refused to ratify a number of important international treaties such as </span><a class="mw-redirect" data-dcnode-id="6280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rome_Statute_of_the_International_Criminal_Court" title="Rome Statute of the International Criminal Court"><span data-dcnode-id="6281" instrument_node="">Rome Statute of the International Criminal Court</span></a><span data-dcnode-id="6279" instrument_node="">, </span><a data-dcnode-id="6277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vienna_Convention_on_the_Law_of_Treaties" title="Vienna Convention on the Law of Treaties"><span data-dcnode-id="6278" instrument_node="">Vienna Convention on the Law of Treaties</span></a><span data-dcnode-id="6276" instrument_node="">, and </span><a data-dcnode-id="6274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Convention_on_Human_Rights" title="American Convention on Human Rights"><span data-dcnode-id="6275" instrument_node="">American Convention on Human Rights</span></a><span data-dcnode-id="6273" instrument_node="">; did not join the </span><a data-dcnode-id="6271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottawa_Treaty" title="Ottawa Treaty"><span data-dcnode-id="6272" instrument_node="">Anti-Personnel Mine Ban Convention</span></a><span data-dcnode-id="6270" instrument_node="">; and routinely conducts </span><a class="mw-redirect" data-dcnode-id="6268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drone_attacks_in_Pakistan" title="Drone attacks in Pakistan"><span data-dcnode-id="6269" instrument_node="">drone attacks</span></a><span data-dcnode-id="6267" instrument_node=""> and cruise missile strikes around the globe. American exceptionalism is sometimes linked with hypocrisy; for example, the U.S. keeps a huge stockpile of </span><a class="mw-redirect" data-dcnode-id="6265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_weapons" title="Nuclear weapons"><span data-dcnode-id="6266" instrument_node="">nuclear weapons</span></a><span data-dcnode-id="6264" instrument_node=""> while urging other nations not to get them, and justifies that it can make an exception to a policy of non-proliferation.</span><sup class="reference" data-dcnode-id="6261" id="cite_ref-tws21dec113_2-0"><a data-dcnode-id="6262" href="#cite_note-tws21dec113-2"><span data-dcnode-id="6263" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6260" instrument_node="">
</span></p><span data-dcnode-id="6258" instrument_node="">
</span><div aria-labelledby="mw-toc-heading" class="toc" data-dcnode-id="5935" id="toc" role="navigation"><input class="toctogglecheckbox" data-dcnode-id="6257" id="toctogglecheckbox" role="button" style="display:none" type="checkbox"><div class="toctitle" data-dcnode-id="6252" dir="ltr" lang="en"><h2 data-dcnode-id="6255" id="mw-toc-heading"><span data-dcnode-id="6256" instrument_node="">Contents</span></h2><span class="toctogglespan" data-dcnode-id="6253"><label class="toctogglelabel" data-dcnode-id="6254" for="toctogglecheckbox"></label></span></div><span data-dcnode-id="6251" instrument_node="">

</span><div class="hatnote navigation-not-searchable" data-dcnode-id="5914" role="note"><span data-dcnode-id="5920" instrument_node="">Main articles: </span><a data-dcnode-id="5918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_exceptionalism" title="American exceptionalism"><span data-dcnode-id="5919" instrument_node="">American exceptionalism</span></a><span data-dcnode-id="5917" instrument_node=""> and </span><a data-dcnode-id="5915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_non-interventionism" title="United States non-interventionism"><span data-dcnode-id="5916" instrument_node="">United States non-interventionism</span></a></div><span data-dcnode-id="5913" instrument_node="">
</span><p data-dcnode-id="5893"><span data-dcnode-id="5912" instrument_node="">Critics of </span><a data-dcnode-id="5910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_exceptionalism" title="American exceptionalism"><span data-dcnode-id="5911" instrument_node="">American exceptionalism</span></a><span data-dcnode-id="5909" instrument_node=""> drew parallels with such historic doctrines as </span><i data-dcnode-id="5906"><a data-dcnode-id="5907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civilizing_mission" title="Civilizing mission"><span data-dcnode-id="5908" instrument_node="">civilizing mission</span></a></i><span data-dcnode-id="5905" instrument_node=""> and </span><i data-dcnode-id="5902"><a class="mw-redirect" data-dcnode-id="5903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_white_man%2527s_burden%23Differing_interpretations" title="The white man's burden"><span data-dcnode-id="5904" instrument_node="">white man's burden</span></a></i><span data-dcnode-id="5901" instrument_node=""> which were employed by </span><a data-dcnode-id="5899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_power" title="Great power"><span data-dcnode-id="5900" instrument_node="">Great Powers</span></a><span data-dcnode-id="5898" instrument_node=""> to justify their colonial conquests.</span><sup class="reference" data-dcnode-id="5895" id="cite_ref-3"><a data-dcnode-id="5896" href="#cite_note-3"><span data-dcnode-id="5897" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5894" instrument_node="">
</span></p><p data-dcnode-id="5878"><span data-dcnode-id="5892" instrument_node="">In his World Policy Journal review of Bill Kauffman's 1995 book </span><i data-dcnode-id="5890"><span data-dcnode-id="5891" instrument_node="">America First! Its History, Culture, and Politics</span></i><span data-dcnode-id="5889" instrument_node="">, </span><a data-dcnode-id="5887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benjamin_Schwarz_%28writer%29" title="Benjamin Schwarz (writer)"><span data-dcnode-id="5888" instrument_node="">Benjamin Schwartz</span></a><span data-dcnode-id="5886" instrument_node=""> described America's of isolationism as a "tragedy" and being rooted in </span><a class="mw-redirect" data-dcnode-id="5884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Puritan" title="Puritan"><span data-dcnode-id="5885" instrument_node="">Puritan</span></a><span data-dcnode-id="5883" instrument_node=""> thinking.</span><sup class="reference" data-dcnode-id="5880" id="cite_ref-4"><a data-dcnode-id="5881" href="#cite_note-4"><span data-dcnode-id="5882" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5879" instrument_node="">
</span></p><span data-dcnode-id="5877" instrument_node="">
</span><h2 data-dcnode-id="5867"><span class="mw-headline" data-dcnode-id="5875" id="Historical_foreign_policy"><span data-dcnode-id="5876" instrument_node="">Historical foreign policy</span></span><span class="mw-editsection" data-dcnode-id="5868"><span class="mw-editsection-bracket" data-dcnode-id="5873"><span data-dcnode-id="5874" instrument_node="">[</span></span><a data-dcnode-id="5871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D2" title="Edit section: Historical foreign policy"><span data-dcnode-id="5872" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5869"><span data-dcnode-id="5870" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5866" instrument_node="">
</span><h3 data-dcnode-id="5856"><span class="mw-headline" data-dcnode-id="5864" id="18th_and_19th_centuries"><span data-dcnode-id="5865" instrument_node="">18th and 19th centuries</span></span><span class="mw-editsection" data-dcnode-id="5857"><span class="mw-editsection-bracket" data-dcnode-id="5862"><span data-dcnode-id="5863" instrument_node="">[</span></span><a data-dcnode-id="5860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D3" title="Edit section: 18th and 19th centuries"><span data-dcnode-id="5861" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5858"><span data-dcnode-id="5859" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5855" instrument_node="">
</span><p data-dcnode-id="5847"><span data-dcnode-id="5854" instrument_node="">From its founding, many of the leaders of the young American government had hoped for a </span><a data-dcnode-id="5852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-interventionism" title="Non-interventionism"><span data-dcnode-id="5853" instrument_node="">non-interventionist foreign policy</span></a><span data-dcnode-id="5851" instrument_node=""> that promoted "commerce with all nations, alliance with none". However, this goal quickly became increasingly difficult to pursue, with growing implicit threats and non-military pressure faced from several powers, most notably </span><a data-dcnode-id="5849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Britain" title="Great Britain"><span data-dcnode-id="5850" instrument_node="">Great Britain</span></a><span data-dcnode-id="5848" instrument_node="">. The United States government was drawn into several foreign affairs from its founding and has been criticized throughout history for many of its actions, although in many of these examples it has also been praised.
</span></p><span data-dcnode-id="5846" instrument_node="">
</span><h4 data-dcnode-id="5836"><span class="mw-headline" data-dcnode-id="5844" id="Revolutionary_France"><span data-dcnode-id="5845" instrument_node="">Revolutionary France</span></span><span class="mw-editsection" data-dcnode-id="5837"><span class="mw-editsection-bracket" data-dcnode-id="5842"><span data-dcnode-id="5843" instrument_node="">[</span></span><a data-dcnode-id="5840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D4" title="Edit section: Revolutionary France"><span data-dcnode-id="5841" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5838"><span data-dcnode-id="5839" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5835" instrument_node="">
</span><p data-dcnode-id="5810"><span data-dcnode-id="5834" instrument_node="">After the </span><a data-dcnode-id="5832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Revolution" title="American Revolution"><span data-dcnode-id="5833" instrument_node="">American Revolution</span></a><span data-dcnode-id="5831" instrument_node="">, the United States immediately began juggling its foreign policy between many different views under the </span><a data-dcnode-id="5829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Washington" title="George Washington"><span data-dcnode-id="5830" instrument_node="">George Washington</span></a><span data-dcnode-id="5828" instrument_node=""> cabinet. Most notably, the rivalry between </span><a data-dcnode-id="5826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Jefferson" title="Thomas Jefferson"><span data-dcnode-id="5827" instrument_node="">Thomas Jefferson</span></a><span data-dcnode-id="5825" instrument_node=""> and </span><a data-dcnode-id="5823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_Hamilton" title="Alexander Hamilton"><span data-dcnode-id="5824" instrument_node="">Alexander Hamilton</span></a><span data-dcnode-id="5822" instrument_node=""> arose due to their opposing views on how the United States should align itself with </span><a class="mw-redirect" data-dcnode-id="5820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revolutionary_France" title="Revolutionary France"><span data-dcnode-id="5821" instrument_node="">Revolutionary France</span></a><span data-dcnode-id="5819" instrument_node=""> in its war against Great Britain in 1793.</span><sup class="reference" data-dcnode-id="5816" id="cite_ref-Jefferson_5-0"><a data-dcnode-id="5817" href="#cite_note-Jefferson-5"><span data-dcnode-id="5818" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5815" instrument_node=""> Jefferson and the Democratic-Republicans, who viewed the French revolution as similar to the previous American revolution, believed the United States should declare war on Great Britain as an ally of France, citing the 1778 Franco-American alliance which was still technically in effect. However, Hamilton and the Federalists desired favorable terms with the Bank of England in the hopes of establishing enough credit with the Crown to establish an American national banking system. Hamilton's camp would take the day and influenced Washington to remain neutral during the conflict, destroying relations with France.</span><sup class="reference" data-dcnode-id="5812" id="cite_ref-Jefferson_5-1"><a data-dcnode-id="5813" href="#cite_note-Jefferson-5"><span data-dcnode-id="5814" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5811" instrument_node="">
</span></p><p data-dcnode-id="5802"><span data-dcnode-id="5809" instrument_node="">Under the presidency of </span><a data-dcnode-id="5807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Adams" title="John Adams"><span data-dcnode-id="5808" instrument_node="">John Adams</span></a><span data-dcnode-id="5806" instrument_node=""> an undeclared naval war broke out from 1798 until 1799 against France, often called the </span><a class="mw-redirect" data-dcnode-id="5804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quasi_War" title="Quasi War"><span data-dcnode-id="5805" instrument_node="">Quasi War</span></a><span data-dcnode-id="5803" instrument_node="">, in part because of the soured relations between the two nations. In addition, the United States would come under the influence of British banking power and regulations, heightening tensions between Democratic-Republicans and Federalists.
</span></p><span data-dcnode-id="5801" instrument_node="">
</span><h4 data-dcnode-id="5791"><span class="mw-headline" data-dcnode-id="5799" id="Relations_with_Native_Americans"><span data-dcnode-id="5800" instrument_node="">Relations with Native Americans</span></span><span class="mw-editsection" data-dcnode-id="5792"><span class="mw-editsection-bracket" data-dcnode-id="5797"><span data-dcnode-id="5798" instrument_node="">[</span></span><a data-dcnode-id="5795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D5" title="Edit section: Relations with Native Americans"><span data-dcnode-id="5796" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5793"><span data-dcnode-id="5794" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5790" instrument_node="">
</span><link data-dcnode-id="5789" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5785" role="note"><span data-dcnode-id="5788" instrument_node="">See also: </span><a data-dcnode-id="5786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manifest_destiny" title="Manifest destiny"><span data-dcnode-id="5787" instrument_node="">Manifest destiny</span></a></div><span data-dcnode-id="5784" instrument_node="">
</span><p data-dcnode-id="5776"><span data-dcnode-id="5783" instrument_node="">While U.S. relations with the many Native American nations changed routinely throughout history, the U.S. has been criticized in general for its historical treatment of Native Americans. For example, the treatment of the </span><a class="mw-redirect" data-dcnode-id="5781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cherokee_people" title="Cherokee people"><span data-dcnode-id="5782" instrument_node="">Cherokee people</span></a><span data-dcnode-id="5780" instrument_node=""> in the </span><a data-dcnode-id="5778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trail_of_Tears" title="Trail of Tears"><span data-dcnode-id="5779" instrument_node="">Trail of Tears</span></a><span data-dcnode-id="5777" instrument_node=""> in which hundreds of Native Americans died in a forced evacuation from their homes in the southeastern area, along with massacres, displacement of lands, swindles, and breaking treaties.
</span></p><p data-dcnode-id="5771"><span data-dcnode-id="5775" instrument_node="">After a long period of respect for sovereignty, United States policy for Native American territories shifted significantly again after the </span><a data-dcnode-id="5773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Civil_War" title="American Civil War"><span data-dcnode-id="5774" instrument_node="">Civil War</span></a><span data-dcnode-id="5772" instrument_node="">. Previously, the pro-State Rights government believed in the legitimacy of Native American Nations' sovereignty. After the conclusion of the Civil War, conversely, views on the sovereignty of Native American nations diminished, as the United States government vested greater powers within the federal government. Over time, the U.S. government found more and more justifications for revoking Native American lands, greatly reducing the size of sovereign native territory.
</span></p><span data-dcnode-id="5770" instrument_node="">
</span><h4 data-dcnode-id="5759"><span data-dcnode-id="5769" id="Mexican.E2.80.93American_War"></span><span class="mw-headline" data-dcnode-id="5767" id="Mexican–American_War"><span data-dcnode-id="5768" instrument_node="">Mexican–American War</span></span><span class="mw-editsection" data-dcnode-id="5760"><span class="mw-editsection-bracket" data-dcnode-id="5765"><span data-dcnode-id="5766" instrument_node="">[</span></span><a data-dcnode-id="5763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D6" title="Edit section: Mexican–American War"><span data-dcnode-id="5764" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5761"><span data-dcnode-id="5762" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5758" instrument_node="">
</span><p data-dcnode-id="5753"><span data-dcnode-id="5757" instrument_node="">It has been criticized for </span><a data-dcnode-id="5755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mexican%25E2%2580%2593American_War" title="Mexican–American War"><span data-dcnode-id="5756" instrument_node="">the war with Mexico in the 1840s</span></a><span data-dcnode-id="5754" instrument_node=""> which some see as a theft of land.
</span></p><span data-dcnode-id="5752" instrument_node="">
</span><h3 data-dcnode-id="5742"><span class="mw-headline" data-dcnode-id="5750" id="20th_century"><span data-dcnode-id="5751" instrument_node="">20th century</span></span><span class="mw-editsection" data-dcnode-id="5743"><span class="mw-editsection-bracket" data-dcnode-id="5748"><span data-dcnode-id="5749" instrument_node="">[</span></span><a data-dcnode-id="5746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D7" title="Edit section: 20th century"><span data-dcnode-id="5747" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5744"><span data-dcnode-id="5745" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5741" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5723"><div class="thumbinner" data-dcnode-id="5724" style="width:202px;"><a class="image" data-dcnode-id="5739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGo_Away_Little_Man_Charles_Green_Bush.jpg"><img alt="" class="thumbimage" data-dcnode-id="5740" data-file-height="515" data-file-width="507" decoding="async" height="203" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Go_Away_Little_Man_Charles_Green_Bush.jpg/200px-Go_Away_Little_Man_Charles_Green_Bush.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Go_Away_Little_Man_Charles_Green_Bush.jpg/300px-Go_Away_Little_Man_Charles_Green_Bush.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Go_Away_Little_Man_Charles_Green_Bush.jpg/400px-Go_Away_Little_Man_Charles_Green_Bush.jpg 2x" width="200"></a><span data-dcnode-id="5738" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5725"><div class="magnify" data-dcnode-id="5736"><a class="internal" data-dcnode-id="5737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGo_Away_Little_Man_Charles_Green_Bush.jpg" title="Enlarge"></a></div><span data-dcnode-id="5735" instrument_node="">1903 cartoon: </span><i data-dcnode-id="5733"><span data-dcnode-id="5734" instrument_node="">"Go Away, Little Man, and Don't Bother Me"</span></i><span data-dcnode-id="5732" instrument_node="">. President Roosevelt intimidating </span><a data-dcnode-id="5730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colombia" title="Colombia"><span data-dcnode-id="5731" instrument_node="">Colombia</span></a><span data-dcnode-id="5729" instrument_node=""> to acquire the </span><a data-dcnode-id="5727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panama_Canal_Zone" title="Panama Canal Zone"><span data-dcnode-id="5728" instrument_node="">Panama Canal Zone</span></a><span data-dcnode-id="5726" instrument_node="">.</span></div></div></div><span data-dcnode-id="5722" instrument_node="">
</span><p data-dcnode-id="5717"><span data-dcnode-id="5721" instrument_node="">Generally during the 19th century, and in early parts of the 20th century, the U.S. pursued a policy of </span><a data-dcnode-id="5719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isolationism" title="Isolationism"><span data-dcnode-id="5720" instrument_node="">isolationism</span></a><span data-dcnode-id="5718" instrument_node=""> and generally avoided entanglements with European powers.
</span></p><span data-dcnode-id="5716" instrument_node="">
</span><h4 data-dcnode-id="5706"><span class="mw-headline" data-dcnode-id="5714" id="Middle_East"><span data-dcnode-id="5715" instrument_node="">Middle East</span></span><span class="mw-editsection" data-dcnode-id="5707"><span class="mw-editsection-bracket" data-dcnode-id="5712"><span data-dcnode-id="5713" instrument_node="">[</span></span><a data-dcnode-id="5710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D8" title="Edit section: Middle East"><span data-dcnode-id="5711" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5708"><span data-dcnode-id="5709" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5705" instrument_node="">
</span><p data-dcnode-id="5693"><span data-dcnode-id="5704" instrument_node="">While it may be the case that the </span><a data-dcnode-id="5702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_East" title="Middle East"><span data-dcnode-id="5703" instrument_node="">Middle East</span></a><span data-dcnode-id="5701" instrument_node=""> is a difficult region with no easy solutions to avoiding conflict, since this volatile region is at the junction of three continents; still, many analysts think U.S. policy could have been improved substantially. The U.S. waffled; there was no vision; presidents kept changing policy. Public opinion in different regions of the world thinks that, to some extent, the </span><a class="mw-redirect" data-dcnode-id="5699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/9/11" title="9/11"><span data-dcnode-id="5700" instrument_node="">9/11</span></a><span data-dcnode-id="5698" instrument_node=""> attacks were an outgrowth of substandard U.S. policy towards the region.</span><sup class="reference" data-dcnode-id="5695" id="cite_ref-tws21dec111_6-0"><a data-dcnode-id="5696" href="#cite_note-tws21dec111-6"><span data-dcnode-id="5697" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5694" instrument_node="">
</span></p><span data-dcnode-id="5692" instrument_node="">
</span><h4 data-dcnode-id="5682"><span class="mw-headline" data-dcnode-id="5690" id="Korea"><span data-dcnode-id="5691" instrument_node="">Korea</span></span><span class="mw-editsection" data-dcnode-id="5683"><span class="mw-editsection-bracket" data-dcnode-id="5688"><span data-dcnode-id="5689" instrument_node="">[</span></span><a data-dcnode-id="5686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D9" title="Edit section: Korea"><span data-dcnode-id="5687" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5684"><span data-dcnode-id="5685" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5681" instrument_node="">
</span><p data-dcnode-id="5669"><span data-dcnode-id="5680" instrument_node="">Candidate </span><a data-dcnode-id="5678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dwight_D._Eisenhower" title="Dwight D. Eisenhower"><span data-dcnode-id="5679" instrument_node="">Dwight D. Eisenhower</span></a><span data-dcnode-id="5677" instrument_node=""> centered his 1952 presidential campaign on foreign policy, criticizing President </span><a class="mw-redirect" data-dcnode-id="5675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harry_S_Truman" title="Harry S Truman"><span data-dcnode-id="5676" instrument_node="">Harry S Truman</span></a><span data-dcnode-id="5674" instrument_node=""> for mishandling the Korean War. </span><sup class="reference" data-dcnode-id="5671" id="cite_ref-7"><a data-dcnode-id="5672" href="#cite_note-7"><span data-dcnode-id="5673" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5670" instrument_node="">
</span></p><span data-dcnode-id="5668" instrument_node="">
</span><h4 data-dcnode-id="5658"><span class="mw-headline" data-dcnode-id="5666" id="Vietnam"><span data-dcnode-id="5667" instrument_node="">Vietnam</span></span><span class="mw-editsection" data-dcnode-id="5659"><span class="mw-editsection-bracket" data-dcnode-id="5664"><span data-dcnode-id="5665" instrument_node="">[</span></span><a data-dcnode-id="5662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D10" title="Edit section: Vietnam"><span data-dcnode-id="5663" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5660"><span data-dcnode-id="5661" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5657" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5645"><div class="thumbinner" data-dcnode-id="5646" style="width:202px;"><a class="image" data-dcnode-id="5655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADemonstratie_tegen_oorlog_in_Vietnam%2C_NATO_enz._in_Amsterdam%2C_Bestanddeelnr_921-2506.jpg"><img alt="" class="thumbimage" data-dcnode-id="5656" data-file-height="3621" data-file-width="2418" decoding="async" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/83/Demonstratie_tegen_oorlog_in_Vietnam%252C_NATO_enz._in_Amsterdam%252C_Bestanddeelnr_921-2506.jpg/200px-Demonstratie_tegen_oorlog_in_Vietnam%252C_NATO_enz._in_Amsterdam%252C_Bestanddeelnr_921-2506.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/83/Demonstratie_tegen_oorlog_in_Vietnam%2C_NATO_enz._in_Amsterdam%2C_Bestanddeelnr_921-2506.jpg/300px-Demonstratie_tegen_oorlog_in_Vietnam%2C_NATO_enz._in_Amsterdam%2C_Bestanddeelnr_921-2506.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/83/Demonstratie_tegen_oorlog_in_Vietnam%2C_NATO_enz._in_Amsterdam%2C_Bestanddeelnr_921-2506.jpg/400px-Demonstratie_tegen_oorlog_in_Vietnam%2C_NATO_enz._in_Amsterdam%2C_Bestanddeelnr_921-2506.jpg 2x" width="200"></a><span data-dcnode-id="5654" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5647"><div class="magnify" data-dcnode-id="5652"><a class="internal" data-dcnode-id="5653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADemonstratie_tegen_oorlog_in_Vietnam%2C_NATO_enz._in_Amsterdam%2C_Bestanddeelnr_921-2506.jpg" title="Enlarge"></a></div><span data-dcnode-id="5651" instrument_node="">Protest against the Vietnam War, </span><a data-dcnode-id="5649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amsterdam" title="Amsterdam"><span data-dcnode-id="5650" instrument_node="">Amsterdam</span></a><span data-dcnode-id="5648" instrument_node="">, April 1968</span></div></div></div><span data-dcnode-id="5644" instrument_node="">
</span><p data-dcnode-id="5635"><span data-dcnode-id="5643" instrument_node="">The </span><a data-dcnode-id="5641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="5642" instrument_node="">Vietnam War</span></a><span data-dcnode-id="5640" instrument_node=""> has been called a decade-long mistake by many, both inside and outside the U.S.</span><sup class="reference" data-dcnode-id="5637" id="cite_ref-tws22dec116ex_1-1"><a data-dcnode-id="5638" href="#cite_note-tws22dec116ex-1"><span data-dcnode-id="5639" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5636" instrument_node="">
</span></p><span data-dcnode-id="5634" instrument_node="">
</span><h4 data-dcnode-id="5624"><span class="mw-headline" data-dcnode-id="5632" id="Kosovo"><span data-dcnode-id="5633" instrument_node="">Kosovo</span></span><span class="mw-editsection" data-dcnode-id="5625"><span class="mw-editsection-bracket" data-dcnode-id="5630"><span data-dcnode-id="5631" instrument_node="">[</span></span><a data-dcnode-id="5628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D11" title="Edit section: Kosovo"><span data-dcnode-id="5629" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5626"><span data-dcnode-id="5627" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5623" instrument_node="">
</span><p data-dcnode-id="5612"><span data-dcnode-id="5622" instrument_node="">The U.S. supported action against the </span><a data-dcnode-id="5620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rump_state" title="Rump state"><span data-dcnode-id="5621" instrument_node="">rump state</span></a><span data-dcnode-id="5619" instrument_node=""> known as the </span><a data-dcnode-id="5617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbia_and_Montenegro" title="Serbia and Montenegro"><span data-dcnode-id="5618" instrument_node="">Federal Republic of Yugoslavia</span></a><span data-dcnode-id="5616" instrument_node=""> (also known as Serbia and Montenegro) in 1999 and the secession of </span><a data-dcnode-id="5614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosovo" title="Kosovo"><span data-dcnode-id="5615" instrument_node="">Kosovo</span></a><span data-dcnode-id="5613" instrument_node=""> from Serbia in 2008. The U.S. has continued to support its independence since then. Critics claim this policy breaks international treaties but they have been dismissed by the U.S. These critics say the Kosovo policy has given encouragement to secessionist uprisings in Spain, Belgium, Georgia, Ukraine, China, and others. They also claim that it gives precedent for other lawful successions that would be otherwise illegal because they represent a breach of UN Security Council Resolutions and treaties guaranteeing territorial integrity.
</span></p><p data-dcnode-id="5607"><span data-dcnode-id="5611" instrument_node="">However, the U.S. has dismissed any similarities between those secessionist movements and Kosovo as most other secessionist movements are not facing multiple civil wars involving ethnic cleansing and genocide campaigns that require international intervention. Additionally, some do not accept that the Federal Republic of Yugoslavia was the only legitimate successor state to the </span><a data-dcnode-id="5609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_Federal_Republic_of_Yugoslavia" title="Socialist Federal Republic of Yugoslavia"><span data-dcnode-id="5610" instrument_node="">Socialist Federal Republic of Yugoslavia</span></a><span data-dcnode-id="5608" instrument_node=""> (SFRY) after its breakup. The SFRY was the actual party guaranteed territorial integrity under the treaties, not just Serbia and Montenegro.
</span></p><span data-dcnode-id="5606" instrument_node="">
</span><h2 data-dcnode-id="5596"><span class="mw-headline" data-dcnode-id="5604" id="Issues"><span data-dcnode-id="5605" instrument_node="">Issues</span></span><span class="mw-editsection" data-dcnode-id="5597"><span class="mw-editsection-bracket" data-dcnode-id="5602"><span data-dcnode-id="5603" instrument_node="">[</span></span><a data-dcnode-id="5600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D12" title="Edit section: Issues"><span data-dcnode-id="5601" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5598"><span data-dcnode-id="5599" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5595" instrument_node="">
</span><h3 data-dcnode-id="5585"><span class="mw-headline" data-dcnode-id="5593" id="Lack_of_control_over_foreign_policy"><span data-dcnode-id="5594" instrument_node="">Lack of control over foreign policy</span></span><span class="mw-editsection" data-dcnode-id="5586"><span class="mw-editsection-bracket" data-dcnode-id="5591"><span data-dcnode-id="5592" instrument_node="">[</span></span><a data-dcnode-id="5589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D13" title="Edit section: Lack of control over foreign policy"><span data-dcnode-id="5590" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5587"><span data-dcnode-id="5588" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5584" instrument_node="">
</span><p data-dcnode-id="5567"><span data-dcnode-id="5583" instrument_node="">During the early 19th century, general </span><a data-dcnode-id="5581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrew_Jackson" title="Andrew Jackson"><span data-dcnode-id="5582" instrument_node="">Andrew Jackson</span></a><span data-dcnode-id="5580" instrument_node=""> exceeded his authority on numerous times and attacked </span><a data-dcnode-id="5578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indigenous_peoples_of_the_Americas" title="Indigenous peoples of the Americas"><span data-dcnode-id="5579" instrument_node="">American Indian</span></a><span data-dcnode-id="5577" instrument_node=""> tribes as well as invaded the Spanish territory of </span><a data-dcnode-id="5575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Florida" title="Florida"><span data-dcnode-id="5576" instrument_node="">Florida</span></a><span data-dcnode-id="5574" instrument_node=""> without official government permission. Jackson was not reprimanded or punished for exceeding his authority. Some accounts blame newspaper journalism called </span><a data-dcnode-id="5572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yellow_journalism" title="Yellow journalism"><span data-dcnode-id="5573" instrument_node="">yellow journalism</span></a><span data-dcnode-id="5571" instrument_node=""> for whipping up virulent pro-war sentiment to help instigate the </span><a data-dcnode-id="5569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spanish%25E2%2580%2593American_War" title="Spanish–American War"><span data-dcnode-id="5570" instrument_node="">Spanish–American War</span></a><span data-dcnode-id="5568" instrument_node="">. This was not the only undeclared war the U.S. has fought. There have been hundreds of "imperfect wars" fought without proper declarations in a tradition that began with President George Washington.
</span></p><p data-dcnode-id="5545"><span data-dcnode-id="5566" instrument_node="">Some critics suggest foreign policy is manipulated by lobbies, such as the </span><a data-dcnode-id="5564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel_lobby_in_the_United_States" title="Israel lobby in the United States"><span data-dcnode-id="5565" instrument_node="">pro-Israel lobby</span></a><sup class="reference" data-dcnode-id="5561" id="cite_ref-tws18dec212fg_8-0"><a data-dcnode-id="5562" href="#cite_note-tws18dec212fg-8"><span data-dcnode-id="5563" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5560" instrument_node=""> or the </span><a data-dcnode-id="5558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab_lobby_in_the_United_States" title="Arab lobby in the United States"><span data-dcnode-id="5559" instrument_node="">Arab one</span></a><span data-dcnode-id="5557" instrument_node="">, although there is disagreement about the influence of such lobbies.</span><sup class="reference" data-dcnode-id="5554" id="cite_ref-tws18dec212fg_8-1"><a data-dcnode-id="5555" href="#cite_note-tws18dec212fg-8"><span data-dcnode-id="5556" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5553" instrument_node=""> Nevertheless, </span><a data-dcnode-id="5551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zbigniew_Brzezinski" title="Zbigniew Brzezinski"><span data-dcnode-id="5552" instrument_node="">Brzezinski</span></a><span data-dcnode-id="5550" instrument_node=""> argues for stricter anti-lobbying laws.</span><sup class="reference" data-dcnode-id="5547" id="cite_ref-tws21dec216d_9-0"><a data-dcnode-id="5548" href="#cite_note-tws21dec216d-9"><span data-dcnode-id="5549" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5546" instrument_node="">
</span></p><span data-dcnode-id="5544" instrument_node="">
</span><h3 data-dcnode-id="5534"><span class="mw-headline" data-dcnode-id="5542" id="Financial_interests_and_foreign_policy"><span data-dcnode-id="5543" instrument_node="">Financial interests and foreign policy</span></span><span class="mw-editsection" data-dcnode-id="5535"><span class="mw-editsection-bracket" data-dcnode-id="5540"><span data-dcnode-id="5541" instrument_node="">[</span></span><a data-dcnode-id="5538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D14" title="Edit section: Financial interests and foreign policy"><span data-dcnode-id="5539" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5536"><span data-dcnode-id="5537" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5533" instrument_node="">
</span><link data-dcnode-id="5532" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5528" role="note"><span data-dcnode-id="5531" instrument_node="">Main article: </span><a data-dcnode-id="5529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_policy_of_the_United_States" title="Foreign policy of the United States"><span data-dcnode-id="5530" instrument_node="">Foreign policy of the United States</span></a></div><span data-dcnode-id="5527" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5515"><div class="thumbinner" data-dcnode-id="5516" style="width:192px;"><a class="image" data-dcnode-id="5525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Bosses_of_the_Senate_by_Joseph_Keppler.jpg"><img alt="" class="thumbimage" data-dcnode-id="5526" data-file-height="397" data-file-width="610" decoding="async" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e5/The_Bosses_of_the_Senate_by_Joseph_Keppler.jpg/190px-The_Bosses_of_the_Senate_by_Joseph_Keppler.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e5/The_Bosses_of_the_Senate_by_Joseph_Keppler.jpg/285px-The_Bosses_of_the_Senate_by_Joseph_Keppler.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e5/The_Bosses_of_the_Senate_by_Joseph_Keppler.jpg/380px-The_Bosses_of_the_Senate_by_Joseph_Keppler.jpg 2x" width="190"></a><span data-dcnode-id="5524" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5517"><div class="magnify" data-dcnode-id="5522"><a class="internal" data-dcnode-id="5523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Bosses_of_the_Senate_by_Joseph_Keppler.jpg" title="Enlarge"></a></div><span data-dcnode-id="5521" instrument_node="">A famous cartoon by </span><a class="mw-redirect" data-dcnode-id="5519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Ferdinand_Keppler" title="Joseph Ferdinand Keppler"><span data-dcnode-id="5520" instrument_node="">Joseph Keppler</span></a><span data-dcnode-id="5518" instrument_node="">, 1889, depicting the role of corporate interests in Congress</span></div></div></div><span data-dcnode-id="5514" instrument_node="">
</span><p data-dcnode-id="5485"><span data-dcnode-id="5513" instrument_node="">Some historians, including </span><a data-dcnode-id="5511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrew_Bacevich" title="Andrew Bacevich"><span data-dcnode-id="5512" instrument_node="">Andrew Bacevich</span></a><span data-dcnode-id="5510" instrument_node="">, suggest that U.S. foreign policy is directed by "wealthy individuals and institutions".</span><sup class="reference" data-dcnode-id="5507" id="cite_ref-tws21dec214e4_10-0"><a data-dcnode-id="5508" href="#cite_note-tws21dec214e4-10"><span data-dcnode-id="5509" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5506" instrument_node=""> In 1893, a decision to back a plot to overthrow the </span><a class="mw-redirect" data-dcnode-id="5504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Hawaii" title="Kingdom of Hawaii"><span data-dcnode-id="5505" instrument_node="">Kingdom of Hawaii</span></a><span data-dcnode-id="5503" instrument_node=""> by President </span><a data-dcnode-id="5501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benjamin_Harrison" title="Benjamin Harrison"><span data-dcnode-id="5502" instrument_node="">Harrison</span></a><span data-dcnode-id="5500" instrument_node=""> was clearly motivated by business interests; it was an effort to prevent a proposed tariff increase on sugar. As a result, Hawaii became a U.S. state.</span><sup class="reference" data-dcnode-id="5497" id="cite_ref-tws22dec111dxx_11-0"><a data-dcnode-id="5498" href="#cite_note-tws22dec111dxx-11"><span data-dcnode-id="5499" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5496" instrument_node=""> There was allegation that the </span><a data-dcnode-id="5494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spanish%25E2%2580%2593American_War" title="Spanish–American War"><span data-dcnode-id="5495" instrument_node="">Spanish–American War</span></a><span data-dcnode-id="5493" instrument_node=""> in 1898 was motivated mainly by business interests in </span><a data-dcnode-id="5491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuba" title="Cuba"><span data-dcnode-id="5492" instrument_node="">Cuba</span></a><span data-dcnode-id="5490" instrument_node="">.</span><sup class="reference" data-dcnode-id="5487" id="cite_ref-tws22dec111dxx_11-1"><a data-dcnode-id="5488" href="#cite_note-tws22dec111dxx-11"><span data-dcnode-id="5489" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5486" instrument_node="">
</span></p><p data-dcnode-id="5472"><span data-dcnode-id="5484" instrument_node="">During the first half of the 20th century the United States became engaged in a series of local conflicts in Latin America, which went into history as </span><i data-dcnode-id="5481"><a class="mw-redirect" data-dcnode-id="5482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Banana_wars" title="Banana wars"><span data-dcnode-id="5483" instrument_node="">banana wars</span></a></i><span data-dcnode-id="5480" instrument_node="">. The main purpose of these wars were to defend American commercial interests in the region. Later, U.S. Marine Corps Major General </span><a data-dcnode-id="5478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Smedley_Butler" title="Smedley Butler"><span data-dcnode-id="5479" instrument_node="">Smedley Butler</span></a><span data-dcnode-id="5477" instrument_node=""> famously wrote, "I spent 33 years and four months in active military service and during that period I spent most of my time as a high class muscle man for Big Business, for Wall Street and the bankers. In short, I was a racketeer, a gangster for capitalism."</span><sup class="reference" data-dcnode-id="5474" id="cite_ref-12"><a data-dcnode-id="5475" href="#cite_note-12"><span data-dcnode-id="5476" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5473" instrument_node="">
</span></p><p data-dcnode-id="5459"><span data-dcnode-id="5471" instrument_node="">Some critics assert the U.S. decision to support the separatists in Colombia in 1903 was motivated largely by business interests centered on </span><a data-dcnode-id="5469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panama_Canal" title="Panama Canal"><span data-dcnode-id="5470" instrument_node="">Panama Canal</span></a><span data-dcnode-id="5468" instrument_node=""> despite declarations that it aimed to "spread democracy" and "end oppression".</span><sup class="reference" data-dcnode-id="5465" id="cite_ref-tws22dec111dxx_11-2"><a data-dcnode-id="5466" href="#cite_note-tws22dec111dxx-11"><span data-dcnode-id="5467" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5464" instrument_node=""> One can say that U.S. foreign policy does reflect the will of the people, however people might have a consumerist mentality, which justifies wars in their minds.</span><sup class="reference" data-dcnode-id="5461" id="cite_ref-tws21dec215aaa_13-0"><a data-dcnode-id="5462" href="#cite_note-tws21dec215aaa-13"><span data-dcnode-id="5463" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5460" instrument_node="">
</span></p><p data-dcnode-id="5436"><span data-dcnode-id="5458" instrument_node="">There are allegations that decisions to go to war in </span><a data-dcnode-id="5456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraq" title="Iraq"><span data-dcnode-id="5457" instrument_node="">Iraq</span></a><span data-dcnode-id="5455" instrument_node=""> were motivated at least partially by oil interests; for example, British newspaper </span><i data-dcnode-id="5452"><a data-dcnode-id="5453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Independent" title="The Independent"><span data-dcnode-id="5454" instrument_node="">The Independent</span></a></i><span data-dcnode-id="5451" instrument_node=""> reported that the "Bush administration is heavily involved in writing Iraq's oil law" which would "allow Western oil companies contracts to pump oil out of Iraq up to 30 years, and the profits would be tax-free."</span><sup class="reference" data-dcnode-id="5448" id="cite_ref-tws22dec111dxx_11-3"><a data-dcnode-id="5449" href="#cite_note-tws22dec111dxx-11"><span data-dcnode-id="5450" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="5445" id="cite_ref-tws21dec116sfpoiui_14-0"><a data-dcnode-id="5446" href="#cite_note-tws21dec116sfpoiui-14"><span data-dcnode-id="5447" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5444" instrument_node=""> Whether motivated by it or not, </span><a class="mw-redirect" data-dcnode-id="5442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._foreign_policy_in_the_Middle_East" title="U.S. foreign policy in the Middle East"><span data-dcnode-id="5443" instrument_node="">U.S. foreign policy in the Middle East</span></a><span data-dcnode-id="5441" instrument_node=""> appears to much of the world as to be motivated by an oil rationale.</span><sup class="reference" data-dcnode-id="5438" id="cite_ref-tws22dec216oopp_15-0"><a data-dcnode-id="5439" href="#cite_note-tws22dec216oopp-15"><span data-dcnode-id="5440" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5437" instrument_node="">
</span></p><span data-dcnode-id="5435" instrument_node="">
</span><h3 data-dcnode-id="5425"><span class="mw-headline" data-dcnode-id="5433" id="Allegations_of_imperialism"><span data-dcnode-id="5434" instrument_node="">Allegations of imperialism</span></span><span class="mw-editsection" data-dcnode-id="5426"><span class="mw-editsection-bracket" data-dcnode-id="5431"><span data-dcnode-id="5432" instrument_node="">[</span></span><a data-dcnode-id="5429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D15" title="Edit section: Allegations of imperialism"><span data-dcnode-id="5430" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5427"><span data-dcnode-id="5428" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5424" instrument_node="">
</span><link data-dcnode-id="5423" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5419" role="note"><span data-dcnode-id="5422" instrument_node="">Main article: </span><a data-dcnode-id="5420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_imperialism" title="American imperialism"><span data-dcnode-id="5421" instrument_node="">American imperialism</span></a></div><span data-dcnode-id="5418" instrument_node="">
</span><p data-dcnode-id="5399"><span data-dcnode-id="5417" instrument_node="">There is a growing consensus among American historians and political scientists that the United States during the </span><a data-dcnode-id="5415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Century" title="American Century"><span data-dcnode-id="5416" instrument_node="">American Century</span></a><span data-dcnode-id="5414" instrument_node=""> grew into an empire resembling in many ways </span><a data-dcnode-id="5412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Rome" title="Ancient Rome"><span data-dcnode-id="5413" instrument_node="">Ancient Rome</span></a><span data-dcnode-id="5411" instrument_node="">.</span><sup class="reference" data-dcnode-id="5408" id="cite_ref-16"><a data-dcnode-id="5409" href="#cite_note-16"><span data-dcnode-id="5410" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5407" instrument_node=""> Currently, there is a debate over implications of imperial tendencies of U.S. foreign policy on democracy and social order.</span><sup class="reference" data-dcnode-id="5404" id="cite_ref-17"><a data-dcnode-id="5405" href="#cite_note-17"><span data-dcnode-id="5406" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="5401" id="cite_ref-18"><a data-dcnode-id="5402" href="#cite_note-18"><span data-dcnode-id="5403" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5400" instrument_node="">
</span></p><p data-dcnode-id="5373"><span data-dcnode-id="5398" instrument_node="">In 2002, conservative political commentator </span><a data-dcnode-id="5396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Krauthammer" title="Charles Krauthammer"><span data-dcnode-id="5397" instrument_node="">Charles Krauthammer</span></a><span data-dcnode-id="5395" instrument_node=""> declared cultural, economical, technological and military superiority of the U.S. in the world a given fact. In his opinion, people were "coming out of the closet on the word </span><i data-dcnode-id="5393"><span data-dcnode-id="5394" instrument_node="">empire</span></i><span data-dcnode-id="5392" instrument_node="">".</span><sup class="reference" data-dcnode-id="5389" id="cite_ref-Eakin_19-0"><a data-dcnode-id="5390" href="#cite_note-Eakin-19"><span data-dcnode-id="5391" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5388" instrument_node=""> More prominently, the </span><i data-dcnode-id="5385"><a class="mw-redirect" data-dcnode-id="5386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_Times_Magazine" title="New York Times Magazine"><span data-dcnode-id="5387" instrument_node="">New York Times Magazine</span></a></i><span data-dcnode-id="5384" instrument_node=""> cover for January 5, 2003, featured a slogan "American Empire: Get Used To It". Inside, a Canadian author </span><a data-dcnode-id="5382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Ignatieff" title="Michael Ignatieff"><span data-dcnode-id="5383" instrument_node="">Michael Ignatieff</span></a><span data-dcnode-id="5381" instrument_node=""> characterized the American imperial power as an </span><i data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node="">empire lite</span></i><span data-dcnode-id="5378" instrument_node="">.</span><sup class="reference" data-dcnode-id="5375" id="cite_ref-20"><a data-dcnode-id="5376" href="#cite_note-20"><span data-dcnode-id="5377" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5374" instrument_node="">
</span></p><p data-dcnode-id="5357"><span data-dcnode-id="5372" instrument_node="">According to </span><i data-dcnode-id="5369"><a data-dcnode-id="5370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newsweek" title="Newsweek"><span data-dcnode-id="5371" instrument_node="">Newsweek</span></a></i><span data-dcnode-id="5368" instrument_node=""> reporter </span><a data-dcnode-id="5366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fareed_Zakaria" title="Fareed Zakaria"><span data-dcnode-id="5367" instrument_node="">Fareed Zakaria</span></a><span data-dcnode-id="5365" instrument_node="">, the Washington establishment has "gotten comfortable with the exercise of American </span><a data-dcnode-id="5363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hegemony" title="Hegemony"><span data-dcnode-id="5364" instrument_node="">hegemony</span></a><span data-dcnode-id="5362" instrument_node=""> and treats compromise as treason and negotiations as appeasement", and added, "This is not foreign policy; it's imperial policy."</span><sup class="reference" data-dcnode-id="5359" id="cite_ref-tws18dec212d_21-0"><a data-dcnode-id="5360" href="#cite_note-tws18dec212d-21"><span data-dcnode-id="5361" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5358" instrument_node="">
</span></p><p data-dcnode-id="5348"><span data-dcnode-id="5356" instrument_node="">Emily Eakin reflecting the intellectual trends of the time, summarized in </span><i data-dcnode-id="5354"><span data-dcnode-id="5355" instrument_node="">The New York Times</span></i><span data-dcnode-id="5353" instrument_node=""> that, "America is no mere superpower or hegemon but a full-blown empire in the Roman and British sense. That, at any rate, is the consensus of some of the nation's most notable commentators and scholars."</span><sup class="reference" data-dcnode-id="5350" id="cite_ref-Eakin_19-1"><a data-dcnode-id="5351" href="#cite_note-Eakin-19"><span data-dcnode-id="5352" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5349" instrument_node="">
</span></p><p data-dcnode-id="5339"><span data-dcnode-id="5347" instrument_node="">Many allies of the U.S. were critical of a new, unilateral sensibility tone in its foreign policy, and showed displeasure by voting, for example, against the U.S. in the </span><a data-dcnode-id="5345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="5346" instrument_node="">United Nations</span></a><span data-dcnode-id="5344" instrument_node=""> in 2001.</span><sup class="reference" data-dcnode-id="5341" id="cite_ref-tws22dec311a_22-0"><a data-dcnode-id="5342" href="#cite_note-tws22dec311a-22"><span data-dcnode-id="5343" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5340" instrument_node="">
</span></p><span data-dcnode-id="5338" instrument_node="">
</span><h3 data-dcnode-id="5328"><span class="mw-headline" data-dcnode-id="5336" id="Allegations_of_hypocrisy"><span data-dcnode-id="5337" instrument_node="">Allegations of hypocrisy</span></span><span class="mw-editsection" data-dcnode-id="5329"><span class="mw-editsection-bracket" data-dcnode-id="5334"><span data-dcnode-id="5335" instrument_node="">[</span></span><a data-dcnode-id="5332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D16" title="Edit section: Allegations of hypocrisy"><span data-dcnode-id="5333" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5330"><span data-dcnode-id="5331" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5327" instrument_node="">
</span><link data-dcnode-id="5326" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5322" role="note"><span data-dcnode-id="5325" instrument_node="">See also: </span><a data-dcnode-id="5323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_hypocrisy" title="Political hypocrisy"><span data-dcnode-id="5324" instrument_node="">Political hypocrisy</span></a></div><span data-dcnode-id="5321" instrument_node="">
</span><p data-dcnode-id="5246"><span data-dcnode-id="5320" instrument_node="">The U.S. has been criticized for making statements supporting peace and respecting national sovereignty while carrying out military actions such as in </span><a class="mw-redirect" data-dcnode-id="5318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Invasion_of_Grenada" title="Invasion of Grenada"><span data-dcnode-id="5319" instrument_node="">Grenada</span></a><span data-dcnode-id="5317" instrument_node="">, fomenting </span><a data-dcnode-id="5315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Separation_of_Panama_from_Colombia" title="Separation of Panama from Colombia"><span data-dcnode-id="5316" instrument_node="">a civil war in Colombia to break off Panama</span></a><span data-dcnode-id="5314" instrument_node="">, and </span><a data-dcnode-id="5312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraq_War" title="Iraq War"><span data-dcnode-id="5313" instrument_node="">Iraq</span></a><span data-dcnode-id="5311" instrument_node="">. The U.S. has been criticized for advocating </span><a data-dcnode-id="5309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_trade" title="Free trade"><span data-dcnode-id="5310" instrument_node="">free trade</span></a><span data-dcnode-id="5308" instrument_node=""> while protecting local industries with import </span><a class="mw-redirect" data-dcnode-id="5306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tariffs" title="Tariffs"><span data-dcnode-id="5307" instrument_node="">tariffs</span></a><span data-dcnode-id="5305" instrument_node=""> on foreign goods such as lumber</span><sup class="reference" data-dcnode-id="5302" id="cite_ref-23"><a data-dcnode-id="5303" href="#cite_note-23"><span data-dcnode-id="5304" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5301" instrument_node=""> and agricultural products. The U.S. has also been criticized for advocating concern for </span><a data-dcnode-id="5299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights" title="Human rights"><span data-dcnode-id="5300" instrument_node="">human rights</span></a><span data-dcnode-id="5298" instrument_node=""> while refusing to ratify the </span><a data-dcnode-id="5296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_on_the_Rights_of_the_Child" title="Convention on the Rights of the Child"><span data-dcnode-id="5297" instrument_node="">Convention on the Rights of the Child</span></a><span data-dcnode-id="5295" instrument_node="">. The U.S. </span><a class="mw-redirect" data-dcnode-id="5293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torture_and_the_United_States" title="Torture and the United States"><span data-dcnode-id="5294" instrument_node="">has publicly stated that it is opposed to torture</span></a><span data-dcnode-id="5292" instrument_node="">, but has been criticized for condoning it in the </span><a class="mw-redirect" data-dcnode-id="5290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/School_of_the_Americas" title="School of the Americas"><span data-dcnode-id="5291" instrument_node="">School of the Americas</span></a><span data-dcnode-id="5289" instrument_node="">. The U.S. has advocated a respect for national sovereignty but has supported internal guerrilla movements and paramilitary organizations, such as the </span><a data-dcnode-id="5287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Contras" title="Contras"><span data-dcnode-id="5288" instrument_node="">Contras</span></a><span data-dcnode-id="5286" instrument_node=""> in </span><a data-dcnode-id="5284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicaragua" title="Nicaragua"><span data-dcnode-id="5285" instrument_node="">Nicaragua</span></a><span data-dcnode-id="5283" instrument_node="">.</span><sup class="reference" data-dcnode-id="5280" id="cite_ref-boston_24-0"><a data-dcnode-id="5281" href="#cite_note-boston-24"><span data-dcnode-id="5282" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="5277" id="cite_ref-25"><a data-dcnode-id="5278" href="#cite_note-25"><span data-dcnode-id="5279" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5276" instrument_node=""> They have also supported the unilateral independence of Kosovo </span><a data-dcnode-id="5274" href="#Kosovo" title="Criticism of United States foreign policy"><span data-dcnode-id="5275" instrument_node="">(see here)</span></a><span data-dcnode-id="5273" instrument_node=""> while also condemning other countries for unilateral independence, citing territorial integrity (</span><a data-dcnode-id="5271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abkhazia" title="Abkhazia"><span data-dcnode-id="5272" instrument_node="">Abkhazia</span></a><span data-dcnode-id="5270" instrument_node="">, </span><a data-dcnode-id="5268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crimea" title="Crimea"><span data-dcnode-id="5269" instrument_node="">Crimea</span></a><span data-dcnode-id="5267" instrument_node="">). The U.S. has been criticized for voicing concern about narcotics production in countries such as </span><a data-dcnode-id="5265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolivia" title="Bolivia"><span data-dcnode-id="5266" instrument_node="">Bolivia</span></a><span data-dcnode-id="5264" instrument_node=""> and </span><a data-dcnode-id="5262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venezuela" title="Venezuela"><span data-dcnode-id="5263" instrument_node="">Venezuela</span></a><span data-dcnode-id="5261" instrument_node=""> but does not follow through on cutting certain bilateral aid programs.</span><sup class="reference" data-dcnode-id="5258" id="cite_ref-tws21dec112_26-0"><a data-dcnode-id="5259" href="#cite_note-tws21dec112-26"><span data-dcnode-id="5260" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5257" instrument_node=""> The U.S. has been criticized for not maintaining a consistent policy; it has been accused of denouncing </span><a data-dcnode-id="5255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights_in_China" title="Human rights in China"><span data-dcnode-id="5256" instrument_node="">alleged rights violations in China</span></a><span data-dcnode-id="5254" instrument_node=""> while supporting </span><a data-dcnode-id="5252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights_in_Israel" title="Human rights in Israel"><span data-dcnode-id="5253" instrument_node="">alleged human rights abuses by Israel</span></a><span data-dcnode-id="5251" instrument_node="">.</span><sup class="reference" data-dcnode-id="5248" id="cite_ref-tws22dec311a_22-1"><a data-dcnode-id="5249" href="#cite_note-tws22dec311a-22"><span data-dcnode-id="5250" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5247" instrument_node="">
</span></p><p data-dcnode-id="5231"><span data-dcnode-id="5245" instrument_node="">However, some defenders argue that a policy of rhetoric while doing things counter to the rhetoric was necessary in the sense of </span><a data-dcnode-id="5243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Realpolitik" title="Realpolitik"><span data-dcnode-id="5244" instrument_node="">realpolitik</span></a><span data-dcnode-id="5242" instrument_node=""> and helped secure victory against the dangers of </span><a class="mw-redirect" data-dcnode-id="5240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tyranny" title="Tyranny"><span data-dcnode-id="5241" instrument_node="">tyranny</span></a><span data-dcnode-id="5239" instrument_node=""> and </span><a data-dcnode-id="5237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Totalitarianism" title="Totalitarianism"><span data-dcnode-id="5238" instrument_node="">totalitarianism</span></a><span data-dcnode-id="5236" instrument_node="">.</span><sup class="reference" data-dcnode-id="5233" id="cite_ref-tws21dec412c_27-0"><a data-dcnode-id="5234" href="#cite_note-tws21dec412c-27"><span data-dcnode-id="5235" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5232" instrument_node="">
</span></p><p data-dcnode-id="5226"><span data-dcnode-id="5230" instrument_node="">The U.S. is advocating that Iran and North Korea should not develop </span><a class="mw-redirect" data-dcnode-id="5228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_weapons" title="Nuclear weapons"><span data-dcnode-id="5229" instrument_node="">nuclear weapons</span></a><span data-dcnode-id="5227" instrument_node="">, while the U.S., the only country to have used nuclear weapons in warfare, maintains a nuclear arsenal of 5,113 warheads. However, this double standard is legitimated by the Nuclear Non-Proliferation Treaty (NPT), to which Iran is a party.
</span></p><span data-dcnode-id="5225" instrument_node="">
</span><h3 data-dcnode-id="5215"><span class="mw-headline" data-dcnode-id="5223" id="Support_of_dictatorships_and_state_terrorism"><span data-dcnode-id="5224" instrument_node="">Support of dictatorships and state terrorism</span></span><span class="mw-editsection" data-dcnode-id="5216"><span class="mw-editsection-bracket" data-dcnode-id="5221"><span data-dcnode-id="5222" instrument_node="">[</span></span><a data-dcnode-id="5219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D17" title="Edit section: Support of dictatorships and state terrorism"><span data-dcnode-id="5220" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5214" instrument_node="">
</span><link data-dcnode-id="5213" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5209" role="note"><span data-dcnode-id="5212" instrument_node="">See also: </span><a data-dcnode-id="5210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_and_state_terrorism" title="United States and state terrorism"><span data-dcnode-id="5211" instrument_node="">United States and state terrorism</span></a></div><span data-dcnode-id="5208" instrument_node="">

.</span></div></div></div><span data-dcnode-id="5192" instrument_node="">

;url=https%3A//en.wikipedia.org/wiki/Hiss%25C3%25A8ne_Habr%25C3%25A9" title="Hissène Habré"><span data-dcnode-id="5055" instrument_node="">Hissène Habré</span></a><span data-dcnode-id="5053" instrument_node=""> of </span><a data-dcnode-id="5051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chad" title="Chad"><span data-dcnode-id="5052" instrument_node="">Chad</span></a><span data-dcnode-id="5050" instrument_node="">.</span><sup class="reference" data-dcnode-id="5047" id="cite_ref-37"><a data-dcnode-id="5048" href="#cite_note-37"><span data-dcnode-id="5049" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5046" instrument_node="">
</span></p><p data-dcnode-id="5017"><span data-dcnode-id="5044" instrument_node="">Ruth J Blakeley and </span><a data-dcnode-id="5042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vincent_Bevins" title="Vincent Bevins"><span data-dcnode-id="5043" instrument_node="">Vincent Bevins</span></a><span data-dcnode-id="5041" instrument_node=""> posit that the United States and its allies sponsored and facilitated </span><a data-dcnode-id="5039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_terrorism" title="State terrorism"><span data-dcnode-id="5040" instrument_node="">state terrorism</span></a><span data-dcnode-id="5038" instrument_node=""> and mass killings on a significant scale during the </span><a data-dcnode-id="5036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="5037" instrument_node="">Cold War</span></a><span data-dcnode-id="5035" instrument_node="">.</span><sup class="reference" data-dcnode-id="5032" id="cite_ref-Blakeley_38-0"><a data-dcnode-id="5033" href="#cite_note-Blakeley-38"><span data-dcnode-id="5034" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="5029" id="cite_ref-39"><a data-dcnode-id="5030" href="#cite_note-39"><span data-dcnode-id="5031" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5028" instrument_node=""> The justification given for this was to contain Communism, but Blakeley says it was also a means by which to buttress the interests of US business elites and to promote the expansion of capitalism and </span><a data-dcnode-id="5026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoliberalism" title="Neoliberalism"><span data-dcnode-id="5027" instrument_node="">neoliberalism</span></a><span data-dcnode-id="5025" instrument_node=""> in the </span><a class="mw-redirect" data-dcnode-id="5023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_South" title="Global South"><span data-dcnode-id="5024" instrument_node="">Global South</span></a><span data-dcnode-id="5022" instrument_node="">.</span><sup class="reference" data-dcnode-id="5019" id="cite_ref-Blakeley_38-1"><a data-dcnode-id="5020" href="#cite_note-Blakeley-38"><span data-dcnode-id="5021" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5018" instrument_node="">
