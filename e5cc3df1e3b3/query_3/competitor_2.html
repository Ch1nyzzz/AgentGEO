</span></p><p data-dcnode-id="4989"><a data-dcnode-id="5015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J._Patrice_McSherry" title="J. Patrice McSherry"><span data-dcnode-id="5016" instrument_node="">J. Patrice McSherry</span></a><span data-dcnode-id="5014" instrument_node="">, a professor of political science at </span><a data-dcnode-id="5012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Long_Island_University" title="Long Island University"><span data-dcnode-id="5013" instrument_node="">Long Island University</span></a><span data-dcnode-id="5011" instrument_node="">, states that "hundreds of thousands of Latin Americans were tortured, abducted or killed by right-wing military regimes as part of the US-led anti-communist crusade", which included US support for </span><a data-dcnode-id="5009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Condor" title="Operation Condor"><span data-dcnode-id="5010" instrument_node="">Operation Condor</span></a><span data-dcnode-id="5008" instrument_node=""> and the Guatemalan military during the </span><a data-dcnode-id="5006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guatemalan_Civil_War" title="Guatemalan Civil War"><span data-dcnode-id="5007" instrument_node="">Guatemalan Civil War</span></a><span data-dcnode-id="5005" instrument_node="">.</span><sup class="reference" data-dcnode-id="5002" id="cite_ref-40"><a data-dcnode-id="5003" href="#cite_note-40"><span data-dcnode-id="5004" instrument_node="">[40]</span></a></sup><span data-dcnode-id="5001" instrument_node=""> According to Latin Americanist </span><a data-dcnode-id="4999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Henry_Coatsworth" title="John Henry Coatsworth"><span data-dcnode-id="5000" instrument_node="">John Henry Coatsworth</span></a><span data-dcnode-id="4998" instrument_node="">, the number of repression victims in Latin America alone far surpassed that of the Soviet Union and its East European satellites during the period 1960 to 1990.</span><sup class="reference" data-dcnode-id="4995" id="cite_ref-41"><a data-dcnode-id="4996" href="#cite_note-41"><span data-dcnode-id="4997" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4994" instrument_node=""> Mark Aarons asserts that the atrocities carried out by Western-backed dictatorships rival those of the communist world.</span><sup class="reference" data-dcnode-id="4991" id="cite_ref-42"><a data-dcnode-id="4992" href="#cite_note-42"><span data-dcnode-id="4993" instrument_node="">[42]</span></a></sup><span data-dcnode-id="4990" instrument_node="">
</span></p><p data-dcnode-id="4945"><span data-dcnode-id="4988" instrument_node="">Some experts assert that the US directly facilitated and encouraged the </span><a data-dcnode-id="4986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indonesian_mass_killings_of_1965%25E2%2580%259366" title="Indonesian mass killings of 1965–66"><span data-dcnode-id="4987" instrument_node="">mass murder of hundreds of thousands of suspected Communists in Indonesia during the mid-1960s</span></a><span data-dcnode-id="4985" instrument_node="">.</span><sup class="reference" data-dcnode-id="4982" id="cite_ref-43"><a data-dcnode-id="4983" href="#cite_note-43"><span data-dcnode-id="4984" instrument_node="">[43]</span></a></sup><sup class="reference" data-dcnode-id="4979" id="cite_ref-44"><a data-dcnode-id="4980" href="#cite_note-44"><span data-dcnode-id="4981" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4978" instrument_node=""> Bradley Simpson, Director of the Indonesia/East Timor Documentation Project at the </span><a data-dcnode-id="4976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Security_Archive" title="National Security Archive"><span data-dcnode-id="4977" instrument_node="">National Security Archive</span></a><span data-dcnode-id="4975" instrument_node="">, says "Washington did everything in its power to encourage and facilitate the army-led massacre of alleged PKI members, and U.S. officials worried only that the killing of the party's unarmed supporters might not go far enough, permitting Sukarno to return to power and frustrate the [Johnson] Administration's emerging plans for a post-Sukarno Indonesia."</span><sup class="reference" data-dcnode-id="4972" id="cite_ref-45"><a data-dcnode-id="4973" href="#cite_note-45"><span data-dcnode-id="4974" instrument_node="">[45]</span></a></sup><span data-dcnode-id="4971" instrument_node=""> According to Simpson, the terror in Indonesia was an "essential building block of the quasi neo-liberal policies the West would attempt to impose on Indonesia in the years to come".</span><sup class="reference" data-dcnode-id="4968" id="cite_ref-46"><a data-dcnode-id="4969" href="#cite_note-46"><span data-dcnode-id="4970" instrument_node="">[46]</span></a></sup><span data-dcnode-id="4967" instrument_node=""> Historian John Roosa, commenting on documents released from the US embassy in Jakarta in 2017, says they confirm that "the U.S. was part and parcel of the operation, strategizing with the Indonesian army and encouraging them to go after the PKI."</span><sup class="reference" data-dcnode-id="4964" id="cite_ref-47"><a data-dcnode-id="4965" href="#cite_note-47"><span data-dcnode-id="4966" instrument_node="">[47]</span></a></sup><span data-dcnode-id="4963" instrument_node=""> Geoffrey B. Robinson, historian at UCLA, argues that without the support of the U.S. and other powerful Western states, the Indonesian Army's program of mass killings would not have occurred.</span><sup class="reference" data-dcnode-id="4960" id="cite_ref-48"><a data-dcnode-id="4961" href="#cite_note-48"><span data-dcnode-id="4962" instrument_node="">[48]</span></a></sup><span data-dcnode-id="4959" instrument_node=""> </span><a data-dcnode-id="4957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vincent_Bevins" title="Vincent Bevins"><span data-dcnode-id="4958" instrument_node="">Vincent Bevins</span></a><span data-dcnode-id="4956" instrument_node=""> writes the mass killings in Indonesia served as the apex of a loose network of US-backed </span><a data-dcnode-id="4954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-communist_mass_killings" title="Anti-communist mass killings"><span data-dcnode-id="4955" instrument_node="">anti-communist mass killing</span></a><span data-dcnode-id="4953" instrument_node=""> campaigns in the </span><a class="mw-redirect" data-dcnode-id="4951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_South" title="Global South"><span data-dcnode-id="4952" instrument_node="">Global South</span></a><span data-dcnode-id="4950" instrument_node=""> during the Cold War.</span><sup class="reference" data-dcnode-id="4947" id="cite_ref-49"><a data-dcnode-id="4948" href="#cite_note-49"><span data-dcnode-id="4949" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4946" instrument_node="">
</span></p><span data-dcnode-id="4944" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4932"><div class="thumbinner" data-dcnode-id="4933" style="width:222px;"><a class="image" data-dcnode-id="4942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A019_Rally_%2839025071401%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="4943" data-file-height="1814" data-file-width="3872" decoding="async" height="103" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b9/019_Rally_%252839025071401%2529.jpg/220px-019_Rally_%252839025071401%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b9/019_Rally_%2839025071401%29.jpg/330px-019_Rally_%2839025071401%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b9/019_Rally_%2839025071401%29.jpg/440px-019_Rally_%2839025071401%29.jpg 2x" width="220"></a><span data-dcnode-id="4941" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4934"><div class="magnify" data-dcnode-id="4939"><a class="internal" data-dcnode-id="4940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A019_Rally_%2839025071401%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="4938" instrument_node="">Protest against U.S. involvement in the military intervention in </span><a data-dcnode-id="4936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yemen" title="Yemen"><span data-dcnode-id="4937" instrument_node="">Yemen</span></a><span data-dcnode-id="4935" instrument_node="">, New York City, 2017</span></div></div></div><span data-dcnode-id="4931" instrument_node="">
</span><p data-dcnode-id="4922"><span data-dcnode-id="4930" instrument_node="">According to journalist </span><a data-dcnode-id="4928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glenn_Greenwald" title="Glenn Greenwald"><span data-dcnode-id="4929" instrument_node="">Glenn Greenwald</span></a><span data-dcnode-id="4927" instrument_node="">, the strategic rationale for U.S. support of brutal and even genocidal dictatorships around the globe has been consistent since the end of World War II: "In a world where anti-American sentiment is prevalent, democracy often produces leaders who impede rather than serve U.S. interests&nbsp;... None of this is remotely controversial or even debatable. U.S. support for tyrants has largely been conducted out in the open, and has been expressly defended and affirmed for decades by the most mainstream and influential U.S. policy experts and media outlets."</span><sup class="reference" data-dcnode-id="4924" id="cite_ref-50"><a data-dcnode-id="4925" href="#cite_note-50"><span data-dcnode-id="4926" instrument_node="">[50]</span></a></sup><span data-dcnode-id="4923" instrument_node="">
</span></p><p data-dcnode-id="4901"><span data-dcnode-id="4921" instrument_node="">The U.S. has been accused of complicity in war crimes for backing the </span><a data-dcnode-id="4919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saudi_Arabian-led_intervention_in_Yemen" title="Saudi Arabian-led intervention in Yemen"><span data-dcnode-id="4920" instrument_node="">Saudi Arabian-led intervention in Yemen</span></a><span data-dcnode-id="4918" instrument_node="">, which has triggered a humanitarian catastrophe, including a </span><a class="mw-redirect" data-dcnode-id="4916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2016%25E2%2580%259318_Yemen_cholera_outbreak" title="2016–18 Yemen cholera outbreak"><span data-dcnode-id="4917" instrument_node="">cholera outbreak</span></a><span data-dcnode-id="4915" instrument_node=""> and </span><a data-dcnode-id="4913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Famine_in_Yemen_%282016%25E2%2580%2593present%29" title="Famine in Yemen (2016–present)"><span data-dcnode-id="4914" instrument_node="">millions facing starvation</span></a><span data-dcnode-id="4912" instrument_node="">.</span><sup class="reference" data-dcnode-id="4909" id="cite_ref-51"><a data-dcnode-id="4910" href="#cite_note-51"><span data-dcnode-id="4911" instrument_node="">[51]</span></a></sup><sup class="reference" data-dcnode-id="4906" id="cite_ref-52"><a data-dcnode-id="4907" href="#cite_note-52"><span data-dcnode-id="4908" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="4903" id="cite_ref-53"><a data-dcnode-id="4904" href="#cite_note-53"><span data-dcnode-id="4905" instrument_node="">[53]</span></a></sup><span data-dcnode-id="4902" instrument_node="">
</span></p><span data-dcnode-id="4900" instrument_node="">
</span><h3 data-dcnode-id="4890"><span class="mw-headline" data-dcnode-id="4898" id="Sanctions"><span data-dcnode-id="4899" instrument_node="">Sanctions</span></span><span class="mw-editsection" data-dcnode-id="4891"><span class="mw-editsection-bracket" data-dcnode-id="4896"><span data-dcnode-id="4897" instrument_node="">[</span></span><a data-dcnode-id="4894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D18" title="Edit section: Sanctions"><span data-dcnode-id="4895" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4892"><span data-dcnode-id="4893" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4889" instrument_node="">
</span><link data-dcnode-id="4888" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4884" role="note"><span data-dcnode-id="4887" instrument_node="">See also: </span><a data-dcnode-id="4885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_sanctions%23Perceptions" title="United States sanctions"><span data-dcnode-id="4886" instrument_node="">United States sanctions §&nbsp;Perceptions</span></a></div><span data-dcnode-id="4883" instrument_node="">
</span><p data-dcnode-id="4877"><span data-dcnode-id="4882" instrument_node="">Numerous US unilateral sanctions against various countries around the world have been criticized by different commentators. Since 1998 the United States has imposed economic sanctions on more than 20 countries.</span><sup class="reference" data-dcnode-id="4879" id="cite_ref-The_Nation_54-0"><a data-dcnode-id="4880" href="#cite_note-The_Nation-54"><span data-dcnode-id="4881" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4878" instrument_node="">
</span></p><p data-dcnode-id="4853"><span data-dcnode-id="4876" instrument_node="">These sanctions, according to </span><a data-dcnode-id="4874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daniel_T._Griswold" title="Daniel T. Griswold"><span data-dcnode-id="4875" instrument_node="">Daniel T. Griswold</span></a><span data-dcnode-id="4873" instrument_node="">, failed to change the behavior of sanctioned countries; but they have barred American companies from economic opportunities, and harmed the poorest people in the countries under sanctions.</span><sup class="reference" data-dcnode-id="4870" id="cite_ref-Griswold_55-0"><a data-dcnode-id="4871" href="#cite_note-Griswold-55"><span data-dcnode-id="4872" instrument_node="">[55]</span></a></sup><span data-dcnode-id="4869" instrument_node=""> Secondary sanctions,</span><sup class="reference" data-dcnode-id="4866" id="cite_ref-57"><a data-dcnode-id="4867" href="#cite_note-57"><span data-dcnode-id="4868" instrument_node="">[a]</span></a></sup><span data-dcnode-id="4865" instrument_node=""> according to </span><a data-dcnode-id="4863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rawi_Abdelal" title="Rawi Abdelal"><span data-dcnode-id="4864" instrument_node="">Rawi Abdelal</span></a><span data-dcnode-id="4862" instrument_node="">, often separate the United States and Europe because they reflect US interference in the affairs and interests of the European Union.</span><sup class="reference" data-dcnode-id="4859" id="cite_ref-FOOTNOTEAbdelal2020118_56-1"><a data-dcnode-id="4860" href="#cite_note-FOOTNOTEAbdelal2020118-56"><span data-dcnode-id="4861" instrument_node="">[56]</span></a></sup><span data-dcnode-id="4858" instrument_node=""> Since Trump became the president of the United States, Abdelal believes, sanctions have been seen not only as an expression of Washington's preferences and whims, but also as a tool for US economic warfare that has angered historical allies such as the European Union.</span><sup class="reference" data-dcnode-id="4855" id="cite_ref-FOOTNOTEAbdelal2020133_58-0"><a data-dcnode-id="4856" href="#cite_note-FOOTNOTEAbdelal2020133-58"><span data-dcnode-id="4857" instrument_node="">[57]</span></a></sup><span data-dcnode-id="4854" instrument_node="">
</span></p><span data-dcnode-id="4852" instrument_node="">
</span><h3 data-dcnode-id="4842"><span class="mw-headline" data-dcnode-id="4850" id="Interference_in_internal_affairs"><span data-dcnode-id="4851" instrument_node="">Interference in internal affairs</span></span><span class="mw-editsection" data-dcnode-id="4843"><span class="mw-editsection-bracket" data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">[</span></span><a data-dcnode-id="4846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D19" title="Edit section: Interference in internal affairs"><span data-dcnode-id="4847" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4844"><span data-dcnode-id="4845" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4841" instrument_node="">
</span><p data-dcnode-id="4794"><span data-dcnode-id="4840" instrument_node="">The United States was criticized for manipulating the internal affairs of foreign nations, including </span><a data-dcnode-id="4838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="4839" instrument_node="">Ukraine</span></a><span data-dcnode-id="4837" instrument_node="">,</span><sup class="reference" data-dcnode-id="4834" id="cite_ref-59"><a data-dcnode-id="4835" href="#cite_note-59"><span data-dcnode-id="4836" instrument_node="">[58]</span></a></sup><span data-dcnode-id="4833" instrument_node=""> </span><a data-dcnode-id="4831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guatemala" title="Guatemala"><span data-dcnode-id="4832" instrument_node="">Guatemala</span></a><span data-dcnode-id="4830" instrument_node="">,</span><sup class="reference" data-dcnode-id="4827" id="cite_ref-tws21dec313aasr_28-2"><a data-dcnode-id="4828" href="#cite_note-tws21dec313aasr-28"><span data-dcnode-id="4829" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4826" instrument_node=""> </span><a data-dcnode-id="4824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chile" title="Chile"><span data-dcnode-id="4825" instrument_node="">Chile</span></a><span data-dcnode-id="4823" instrument_node="">,</span><sup class="reference" data-dcnode-id="4820" id="cite_ref-tws21dec313aasr_28-3"><a data-dcnode-id="4821" href="#cite_note-tws21dec313aasr-28"><span data-dcnode-id="4822" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4819" instrument_node=""> Cuba,</span><sup class="reference" data-dcnode-id="4816" id="cite_ref-tws22dec111dxx_11-4"><a data-dcnode-id="4817" href="#cite_note-tws22dec111dxx-11"><span data-dcnode-id="4818" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4815" instrument_node=""> </span><a data-dcnode-id="4813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colombia" title="Colombia"><span data-dcnode-id="4814" instrument_node="">Colombia</span></a><span data-dcnode-id="4812" instrument_node="">,</span><sup class="reference" data-dcnode-id="4809" id="cite_ref-tws22dec111dxx_11-5"><a data-dcnode-id="4810" href="#cite_note-tws22dec111dxx-11"><span data-dcnode-id="4811" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4808" instrument_node=""> various countries in </span><a data-dcnode-id="4806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Africa" title="Africa"><span data-dcnode-id="4807" instrument_node="">Africa</span></a><sup class="reference" data-dcnode-id="4803" id="cite_ref-tws22dec113b_60-0"><a data-dcnode-id="4804" href="#cite_note-tws22dec113b-60"><span data-dcnode-id="4805" instrument_node="">[59]</span></a></sup><span data-dcnode-id="4802" instrument_node=""> including </span><a data-dcnode-id="4800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uganda" title="Uganda"><span data-dcnode-id="4801" instrument_node="">Uganda</span></a><span data-dcnode-id="4799" instrument_node="">.</span><sup class="reference" data-dcnode-id="4796" id="cite_ref-tws22dec113b_60-1"><a data-dcnode-id="4797" href="#cite_note-tws22dec113b-60"><span data-dcnode-id="4798" instrument_node="">[59]</span></a></sup><span data-dcnode-id="4795" instrument_node="">
</span></p><p data-dcnode-id="4782"><span data-dcnode-id="4793" instrument_node="">One study indicated that the country most often </span><a data-dcnode-id="4791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_electoral_intervention" title="Foreign electoral intervention"><span data-dcnode-id="4792" instrument_node="">intervening in foreign elections</span></a><span data-dcnode-id="4790" instrument_node=""> is the United States with 81 interventions from 1946 to 2000.</span><sup class="reference" data-dcnode-id="4787" id="cite_ref-61"><a data-dcnode-id="4788" href="#cite_note-61"><span data-dcnode-id="4789" instrument_node="">[60]</span></a></sup><sup class="reference" data-dcnode-id="4784" id="cite_ref-62"><a data-dcnode-id="4785" href="#cite_note-62"><span data-dcnode-id="4786" instrument_node="">[61]</span></a></sup><span data-dcnode-id="4783" instrument_node="">
</span></p><span data-dcnode-id="4781" instrument_node="">
</span><h3 data-dcnode-id="4771"><span class="mw-headline" data-dcnode-id="4779" id="Promotion_of_democracy"><span data-dcnode-id="4780" instrument_node="">Promotion of democracy</span></span><span class="mw-editsection" data-dcnode-id="4772"><span class="mw-editsection-bracket" data-dcnode-id="4777"><span data-dcnode-id="4778" instrument_node="">[</span></span><a data-dcnode-id="4775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D20" title="Edit section: Promotion of democracy"><span data-dcnode-id="4776" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4770" instrument_node="">
</span><link data-dcnode-id="4769" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4765" role="note"><span data-dcnode-id="4768" instrument_node="">See also: </span><a data-dcnode-id="4766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy_promotion_by_the_United_States" title="Democracy promotion by the United States"><span data-dcnode-id="4767" instrument_node="">Democracy promotion by the United States</span></a></div><span data-dcnode-id="4764" instrument_node="">
</span><p data-dcnode-id="4742"><span data-dcnode-id="4763" instrument_node="">Some critics argue that America's policy of advocating democracy may be ineffective and even counterproductive.</span><sup class="reference" data-dcnode-id="4760" id="cite_ref-tws21dec211_63-0"><a data-dcnode-id="4761" href="#cite_note-tws21dec211-63"><span data-dcnode-id="4762" instrument_node="">[62]</span></a></sup><sup class="reference" data-dcnode-id="4757" id="cite_ref-tws21dec212_64-0"><a data-dcnode-id="4758" href="#cite_note-tws21dec212-64"><span data-dcnode-id="4759" instrument_node="">[63]</span></a></sup><span data-dcnode-id="4756" instrument_node=""> </span><a data-dcnode-id="4754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zbigniew_Brzezinski" title="Zbigniew Brzezinski"><span data-dcnode-id="4755" instrument_node="">Zbigniew Brzezinski</span></a><span data-dcnode-id="4753" instrument_node=""> declared that "[t]he coming to power of </span><a data-dcnode-id="4751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hamas" title="Hamas"><span data-dcnode-id="4752" instrument_node="">Hamas</span></a><span data-dcnode-id="4750" instrument_node=""> is a very good example of excessive pressure for democratization" and argued that </span><a data-dcnode-id="4748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="4749" instrument_node="">George W. Bush</span></a><span data-dcnode-id="4747" instrument_node="">'s attempts to use democracy as an instrument against terrorism were risky and dangerous.</span><sup class="reference" data-dcnode-id="4744" id="cite_ref-tws21dec217c_65-0"><a data-dcnode-id="4745" href="#cite_note-tws21dec217c-65"><span data-dcnode-id="4746" instrument_node="">[64]</span></a></sup><span data-dcnode-id="4743" instrument_node="">
</span></p><p data-dcnode-id="4686"><span data-dcnode-id="4741" instrument_node="">Analyst </span><a class="mw-redirect" data-dcnode-id="4739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jessica_Tuchman_Mathews" title="Jessica Tuchman Mathews"><span data-dcnode-id="4740" instrument_node="">Jessica Tuchman Mathews</span></a><span data-dcnode-id="4738" instrument_node=""> of the </span><i data-dcnode-id="4735"><a data-dcnode-id="4736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carnegie_Endowment_for_International_Peace" title="Carnegie Endowment for International Peace"><span data-dcnode-id="4737" instrument_node="">Carnegie Endowment for International Peace</span></a></i><span data-dcnode-id="4734" instrument_node=""> agreed that imposing democracy "from scratch" was unwise, and did not work.</span><sup class="reference" data-dcnode-id="4731" id="cite_ref-tws22dec216oopp_15-1"><a data-dcnode-id="4732" href="#cite_note-tws22dec216oopp-15"><span data-dcnode-id="4733" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4730" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Realism_in_international_relations" title="Realism in international relations"><span data-dcnode-id="4729" instrument_node="">Realist</span></a><span data-dcnode-id="4727" instrument_node=""> critics such as </span><a data-dcnode-id="4725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_F._Kennan" title="George F. Kennan"><span data-dcnode-id="4726" instrument_node="">George F. Kennan</span></a><span data-dcnode-id="4724" instrument_node=""> argued U.S. responsibility is only to protect its own citizens and that Washington should deal with other governments on that basis alone; they criticize president </span><a data-dcnode-id="4722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Woodrow_Wilson" title="Woodrow Wilson"><span data-dcnode-id="4723" instrument_node="">Woodrow Wilson's</span></a><span data-dcnode-id="4721" instrument_node=""> emphasis on </span><a data-dcnode-id="4719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratization" title="Democratization"><span data-dcnode-id="4720" instrument_node="">democratization</span></a><span data-dcnode-id="4718" instrument_node=""> and </span><a data-dcnode-id="4716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nation-building" title="Nation-building"><span data-dcnode-id="4717" instrument_node="">nation-building</span></a><span data-dcnode-id="4715" instrument_node=""> although it was not mentioned in Wilson's </span><a data-dcnode-id="4713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fourteen_Points" title="Fourteen Points"><span data-dcnode-id="4714" instrument_node="">Fourteen Points</span></a><span data-dcnode-id="4712" instrument_node="">,</span><sup class="reference" data-dcnode-id="4709" id="cite_ref-66"><a data-dcnode-id="4710" href="#cite_note-66"><span data-dcnode-id="4711" instrument_node="">[65]</span></a></sup><span data-dcnode-id="4708" instrument_node=""> and the failure of the </span><a data-dcnode-id="4706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Nations" title="League of Nations"><span data-dcnode-id="4707" instrument_node="">League of Nations</span></a><span data-dcnode-id="4705" instrument_node=""> to enforce international will regarding </span><a data-dcnode-id="4703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Germany" title="Nazi Germany"><span data-dcnode-id="4704" instrument_node="">Nazi Germany</span></a><span data-dcnode-id="4702" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Italy_%281861%25E2%2580%25931946%29" title="Kingdom of Italy (1861–1946)"><span data-dcnode-id="4701" instrument_node="">Fascist Italy</span></a><span data-dcnode-id="4699" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="4697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Imperial_Japan" title="Imperial Japan"><span data-dcnode-id="4698" instrument_node="">Imperial Japan</span></a><span data-dcnode-id="4696" instrument_node=""> in the 1930s. Realist critics attacked the </span><a data-dcnode-id="4694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Idealism" title="Idealism"><span data-dcnode-id="4695" instrument_node="">idealism</span></a><span data-dcnode-id="4693" instrument_node=""> of </span><a data-dcnode-id="4691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Woodrow_Wilson" title="Woodrow Wilson"><span data-dcnode-id="4692" instrument_node="">Wilson</span></a><span data-dcnode-id="4690" instrument_node=""> as being ill-suited for weak states created at the </span><a class="mw-redirect" data-dcnode-id="4688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Peace_Conference%2C_1919" title="Paris Peace Conference, 1919"><span data-dcnode-id="4689" instrument_node="">Paris Peace Conference</span></a><span data-dcnode-id="4687" instrument_node="">. Others, however, criticize the U.S. Senate's decision not to join the League of Nations which was based on isolationist public sentiment as being one cause for the organization's ineffectiveness.
</span></p><span data-dcnode-id="4685" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4671"><div class="thumbinner" data-dcnode-id="4672" style="width:222px;"><a class="image" data-dcnode-id="4683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACombined_Air_and_Space_Operations_Center_151007-F-MS415-015.jpg"><img alt="" class="thumbimage" data-dcnode-id="4684" data-file-height="2832" data-file-width="4256" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Combined_Air_and_Space_Operations_Center_151007-F-MS415-015.jpg/220px-Combined_Air_and_Space_Operations_Center_151007-F-MS415-015.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Combined_Air_and_Space_Operations_Center_151007-F-MS415-015.jpg/330px-Combined_Air_and_Space_Operations_Center_151007-F-MS415-015.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Combined_Air_and_Space_Operations_Center_151007-F-MS415-015.jpg/440px-Combined_Air_and_Space_Operations_Center_151007-F-MS415-015.jpg 2x" width="220"></a><span data-dcnode-id="4682" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4673"><div class="magnify" data-dcnode-id="4680"><a class="internal" data-dcnode-id="4681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACombined_Air_and_Space_Operations_Center_151007-F-MS415-015.jpg" title="Enlarge"></a></div><span data-dcnode-id="4679" instrument_node="">Combined Air and Space Operations Center at </span><a data-dcnode-id="4677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al_Udeid_Air_Base" title="Al Udeid Air Base"><span data-dcnode-id="4678" instrument_node="">Al Udeid Air Base</span></a><span data-dcnode-id="4676" instrument_node=""> in </span><a data-dcnode-id="4674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qatar" title="Qatar"><span data-dcnode-id="4675" instrument_node="">Qatar</span></a></div></div></div><span data-dcnode-id="4670" instrument_node="">
</span><p data-dcnode-id="4658"><span data-dcnode-id="4669" instrument_node="">According to </span><i data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node="">The Huffington Post</span></i><span data-dcnode-id="4666" instrument_node="">, "The 45 nations and territories with little or no democratic rule represent more than half of the roughly 80 countries now hosting U.S. bases.&nbsp;... Research by political scientist </span><a data-dcnode-id="4664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kent_E._Calder" title="Kent E. Calder"><span data-dcnode-id="4665" instrument_node="">Kent Calder</span></a><span data-dcnode-id="4663" instrument_node=""> confirms what's come to be known as the 'dictatorship hypothesis': The United States tends to support dictators [and other undemocratic regimes] in nations where it enjoys basing facilities."</span><sup class="reference" data-dcnode-id="4660" id="cite_ref-67"><a data-dcnode-id="4661" href="#cite_note-67"><span data-dcnode-id="4662" instrument_node="">[66]</span></a></sup><span data-dcnode-id="4659" instrument_node="">
</span></p><span data-dcnode-id="4657" instrument_node="">
</span><h3 data-dcnode-id="4647"><span class="mw-headline" data-dcnode-id="4655" id="Human_rights_problems"><span data-dcnode-id="4656" instrument_node="">Human rights problems</span></span><span class="mw-editsection" data-dcnode-id="4648"><span class="mw-editsection-bracket" data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">[</span></span><a data-dcnode-id="4651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D21" title="Edit section: Human rights problems"><span data-dcnode-id="4652" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4649"><span data-dcnode-id="4650" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4646" instrument_node="">
</span><link data-dcnode-id="4645" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4641" role="note"><span data-dcnode-id="4644" instrument_node="">Main article: </span><a data-dcnode-id="4642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights_in_the_United_States" title="Human rights in the United States"><span data-dcnode-id="4643" instrument_node="">Human rights in the United States</span></a></div><span data-dcnode-id="4640" instrument_node="">
</span><p data-dcnode-id="4600"><span data-dcnode-id="4639" instrument_node="">President </span><a data-dcnode-id="4637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="4638" instrument_node="">Bush</span></a><span data-dcnode-id="4636" instrument_node=""> has been criticized for neglecting </span><a data-dcnode-id="4634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy" title="Democracy"><span data-dcnode-id="4635" instrument_node="">democracy</span></a><span data-dcnode-id="4633" instrument_node=""> and </span><a data-dcnode-id="4631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights" title="Human rights"><span data-dcnode-id="4632" instrument_node="">human rights</span></a><span data-dcnode-id="4630" instrument_node=""> by focusing exclusively on an effort to fight </span><a data-dcnode-id="4628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrorism" title="Terrorism"><span data-dcnode-id="4629" instrument_node="">terrorism</span></a><span data-dcnode-id="4627" instrument_node="">.</span><sup class="reference" data-dcnode-id="4624" id="cite_ref-tws22dec113b_60-2"><a data-dcnode-id="4625" href="#cite_note-tws22dec113b-60"><span data-dcnode-id="4626" instrument_node="">[59]</span></a></sup><span data-dcnode-id="4623" instrument_node=""> The U.S. was criticized for alleged prisoner abuse at </span><a data-dcnode-id="4621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guant%25C3%25A1namo_Bay" title="Guantánamo Bay"><span data-dcnode-id="4622" instrument_node="">Guantánamo Bay</span></a><span data-dcnode-id="4620" instrument_node="">, </span><a data-dcnode-id="4618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abu_Ghraib_torture_and_prisoner_abuse" title="Abu Ghraib torture and prisoner abuse"><span data-dcnode-id="4619" instrument_node="">Abu Ghraib</span></a><span data-dcnode-id="4617" instrument_node=""> in </span><a data-dcnode-id="4615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraq" title="Iraq"><span data-dcnode-id="4616" instrument_node="">Iraq</span></a><span data-dcnode-id="4614" instrument_node="">, and </span><a data-dcnode-id="4612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_site" title="Black site"><span data-dcnode-id="4613" instrument_node="">secret CIA prisons</span></a><span data-dcnode-id="4611" instrument_node=""> in eastern </span><a data-dcnode-id="4609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe" title="Europe"><span data-dcnode-id="4610" instrument_node="">Europe</span></a><span data-dcnode-id="4608" instrument_node="">, according to </span><a data-dcnode-id="4606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_International" title="Amnesty International"><span data-dcnode-id="4607" instrument_node="">Amnesty International</span></a><span data-dcnode-id="4605" instrument_node="">.</span><sup class="reference" data-dcnode-id="4602" id="cite_ref-tws24decaawaa_68-0"><a data-dcnode-id="4603" href="#cite_note-tws24decaawaa-68"><span data-dcnode-id="4604" instrument_node="">[67]</span></a></sup><span data-dcnode-id="4601" instrument_node=""> In response, the U.S. government claimed incidents of abuse were isolated incidents which did not reflect U.S. policy.
</span></p><span data-dcnode-id="4599" instrument_node="">
</span><h3 data-dcnode-id="4589"><span class="mw-headline" data-dcnode-id="4597" id="Militarism"><span data-dcnode-id="4598" instrument_node="">Militarism</span></span><span class="mw-editsection" data-dcnode-id="4590"><span class="mw-editsection-bracket" data-dcnode-id="4595"><span data-dcnode-id="4596" instrument_node="">[</span></span><a data-dcnode-id="4593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D22" title="Edit section: Militarism"><span data-dcnode-id="4594" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4591"><span data-dcnode-id="4592" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4588" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4573"><div class="thumbinner" data-dcnode-id="4574" style="width:222px;"><a class="image" data-dcnode-id="4586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APresident_Barack_Obama_speaking_on_the_military_intervention_in_Libya_at_the_National_Defense_University_14.jpg"><img alt="" class="thumbimage" data-dcnode-id="4587" data-file-height="2192" data-file-width="3300" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e5/President_Barack_Obama_speaking_on_the_military_intervention_in_Libya_at_the_National_Defense_University_14.jpg/220px-President_Barack_Obama_speaking_on_the_military_intervention_in_Libya_at_the_National_Defense_University_14.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e5/President_Barack_Obama_speaking_on_the_military_intervention_in_Libya_at_the_National_Defense_University_14.jpg/330px-President_Barack_Obama_speaking_on_the_military_intervention_in_Libya_at_the_National_Defense_University_14.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e5/President_Barack_Obama_speaking_on_the_military_intervention_in_Libya_at_the_National_Defense_University_14.jpg/440px-President_Barack_Obama_speaking_on_the_military_intervention_in_Libya_at_the_National_Defense_University_14.jpg 2x" width="220"></a><span data-dcnode-id="4585" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4575"><div class="magnify" data-dcnode-id="4583"><a class="internal" data-dcnode-id="4584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APresident_Barack_Obama_speaking_on_the_military_intervention_in_Libya_at_the_National_Defense_University_14.jpg" title="Enlarge"></a></div><span data-dcnode-id="4582" instrument_node="">President </span><a data-dcnode-id="4580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barack_Obama" title="Barack Obama"><span data-dcnode-id="4581" instrument_node="">Barack Obama</span></a><span data-dcnode-id="4579" instrument_node=""> speaking on the </span><a data-dcnode-id="4577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2011_military_intervention_in_Libya" title="2011 military intervention in Libya"><span data-dcnode-id="4578" instrument_node="">military intervention in Libya</span></a><span data-dcnode-id="4576" instrument_node=""> at the National Defense University, March 2011</span></div></div></div><span data-dcnode-id="4572" instrument_node="">
</span><p data-dcnode-id="4549"><span data-dcnode-id="4571" instrument_node="">In the 1960s, </span><a data-dcnode-id="4569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Luther_King_Jr." title="Martin Luther King Jr."><span data-dcnode-id="4570" instrument_node="">Martin Luther King Jr.</span></a><span data-dcnode-id="4568" instrument_node=""> criticized excessive U.S. spending on military projects,</span><sup class="reference" data-dcnode-id="4565" id="cite_ref-tws22dec112a_69-0"><a data-dcnode-id="4566" href="#cite_note-tws22dec112a-69"><span data-dcnode-id="4567" instrument_node="">[68]</span></a></sup><span data-dcnode-id="4564" instrument_node=""> and suggested a linkage between its foreign policy abroad and </span><a data-dcnode-id="4562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Racism_in_the_United_States" title="Racism in the United States"><span data-dcnode-id="4563" instrument_node="">racism at home</span></a><span data-dcnode-id="4561" instrument_node="">.</span><sup class="reference" data-dcnode-id="4558" id="cite_ref-tws22dec112a_69-1"><a data-dcnode-id="4559" href="#cite_note-tws22dec112a-69"><span data-dcnode-id="4560" instrument_node="">[68]</span></a></sup><span data-dcnode-id="4557" instrument_node=""> In 1971, a </span><i data-dcnode-id="4555"><span data-dcnode-id="4556" instrument_node="">Time</span></i><span data-dcnode-id="4554" instrument_node=""> essayist noted 375 major and 3,000 lesser U.S. military facilities worldwide and concluded that "there is no question that the U.S. today has too many troops scattered about in too many places."</span><sup class="reference" data-dcnode-id="4551" id="cite_ref-tws22dec116ex_1-2"><a data-dcnode-id="4552" href="#cite_note-tws22dec116ex-1"><span data-dcnode-id="4553" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4550" instrument_node="">
</span></p><p data-dcnode-id="4522"><span data-dcnode-id="4548" instrument_node="">Expenditures to fight the </span><a class="mw-redirect" data-dcnode-id="4546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_on_Terror" title="War on Terror"><span data-dcnode-id="4547" instrument_node="">War on Terror</span></a><span data-dcnode-id="4545" instrument_node=""> are vast.</span><sup class="reference" data-dcnode-id="4542" id="cite_ref-tws22dec214d_70-0"><a data-dcnode-id="4543" href="#cite_note-tws22dec214d-70"><span data-dcnode-id="4544" instrument_node="">[69]</span></a></sup><span data-dcnode-id="4541" instrument_node=""> The </span><a data-dcnode-id="4539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraq_War" title="Iraq War"><span data-dcnode-id="4540" instrument_node="">Iraq war</span></a><span data-dcnode-id="4538" instrument_node="">, lasting from 2003 to 2011, was especially costly.</span><sup class="reference" data-dcnode-id="4535" id="cite_ref-tws22dec216oopp_15-2"><a data-dcnode-id="4536" href="#cite_note-tws22dec216oopp-15"><span data-dcnode-id="4537" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4534" instrument_node=""> In a 2010 defense report, </span><a data-dcnode-id="4532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthony_Cordesman" title="Anthony Cordesman"><span data-dcnode-id="4533" instrument_node="">Anthony Cordesman</span></a><span data-dcnode-id="4531" instrument_node=""> criticized out-of-control military spending.</span><sup class="reference" data-dcnode-id="4528" id="cite_ref-tws22dec214a_71-0"><a data-dcnode-id="4529" href="#cite_note-tws22dec214a-71"><span data-dcnode-id="4530" instrument_node="">[70]</span></a></sup><span data-dcnode-id="4527" instrument_node=""> The wars in Afghanistan, Iraq, Syria and Pakistan have, from their beginning in 2001 through the end of the 2019 fiscal year, cost American taxpayers $6.4 trillion.</span><sup class="reference" data-dcnode-id="4524" id="cite_ref-72"><a data-dcnode-id="4525" href="#cite_note-72"><span data-dcnode-id="4526" instrument_node="">[71]</span></a></sup><span data-dcnode-id="4523" instrument_node="">
</span></p><p data-dcnode-id="4507"><a data-dcnode-id="4520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrew_Bacevich" title="Andrew Bacevich"><span data-dcnode-id="4521" instrument_node="">Andrew Bacevich</span></a><span data-dcnode-id="4519" instrument_node=""> argues that the U.S. has a tendency to resort to military means to try to solve diplomatic problems.</span><sup class="reference" data-dcnode-id="4516" id="cite_ref-tws21dec215aaa_13-1"><a data-dcnode-id="4517" href="#cite_note-tws21dec215aaa-13"><span data-dcnode-id="4518" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4515" instrument_node=""> The U.S. involvement in the </span><a data-dcnode-id="4513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="4514" instrument_node="">Vietnam War</span></a><span data-dcnode-id="4512" instrument_node=""> was a $111 billion,</span><sup class="reference" data-dcnode-id="4509" id="cite_ref-tws27decgee32_73-0"><a data-dcnode-id="4510" href="#cite_note-tws27decgee32-73"><span data-dcnode-id="4511" instrument_node="">[72]</span></a></sup><span data-dcnode-id="4508" instrument_node=""> decade-long military engagement which ended in a military victory but strategic defeat due to the public's loss of support for the war.
</span></p><span data-dcnode-id="4506" instrument_node="">
</span><h3 data-dcnode-id="4496"><span class="mw-headline" data-dcnode-id="4504" id="Violation_of_international_law"><span data-dcnode-id="4505" instrument_node="">Violation of international law</span></span><span class="mw-editsection" data-dcnode-id="4497"><span class="mw-editsection-bracket" data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">[</span></span><a data-dcnode-id="4500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D23" title="Edit section: Violation of international law"><span data-dcnode-id="4501" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4498"><span data-dcnode-id="4499" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4495" instrument_node="">
</span><link data-dcnode-id="4494" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4487" role="note"><span data-dcnode-id="4493" instrument_node="">See also: </span><a data-dcnode-id="4491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_and_the_United_Nations" title="United States and the United Nations"><span data-dcnode-id="4492" instrument_node="">United States and the United Nations</span></a><span data-dcnode-id="4490" instrument_node=""> and </span><a data-dcnode-id="4488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_and_the_International_Criminal_Court" title="United States and the International Criminal Court"><span data-dcnode-id="4489" instrument_node="">United States and the International Criminal Court</span></a></div><span data-dcnode-id="4486" instrument_node="">
</span><p data-dcnode-id="4458"><span data-dcnode-id="4485" instrument_node="">The U.S. does not always follow </span><a data-dcnode-id="4483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_law" title="International law"><span data-dcnode-id="4484" instrument_node="">international law</span></a><span data-dcnode-id="4482" instrument_node="">. For example, some critics assert the U.S.-led invasion of Iraq was not a proper response to an imminent threat, but an act of aggression which violated international law.</span><sup class="reference" data-dcnode-id="4479" id="cite_ref-tws27decaqsw_74-0"><a data-dcnode-id="4480" href="#cite_note-tws27decaqsw-74"><span data-dcnode-id="4481" instrument_node="">[73]</span></a></sup><sup class="reference" data-dcnode-id="4476" id="cite_ref-75"><a data-dcnode-id="4477" href="#cite_note-75"><span data-dcnode-id="4478" instrument_node="">[74]</span></a></sup><span data-dcnode-id="4475" instrument_node=""> For example, </span><a class="mw-redirect" data-dcnode-id="4473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benjamin_B._Ferencz" title="Benjamin B. Ferencz"><span data-dcnode-id="4474" instrument_node="">Benjamin Ferencz</span></a><span data-dcnode-id="4472" instrument_node="">, a chief prosecutor of Nazi war crimes at Nuremberg said George W. Bush should be tried for war crimes along with </span><a data-dcnode-id="4470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saddam_Hussein" title="Saddam Hussein"><span data-dcnode-id="4471" instrument_node="">Saddam Hussein</span></a><span data-dcnode-id="4469" instrument_node=""> for starting aggressive wars—Saddam for his 1990 attack on </span><a data-dcnode-id="4467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuwait" title="Kuwait"><span data-dcnode-id="4468" instrument_node="">Kuwait</span></a><span data-dcnode-id="4466" instrument_node=""> and Bush for his </span><a data-dcnode-id="4464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2003_invasion_of_Iraq" title="2003 invasion of Iraq"><span data-dcnode-id="4465" instrument_node="">2003 invasion of Iraq</span></a><span data-dcnode-id="4463" instrument_node="">.</span><sup class="reference" data-dcnode-id="4460" id="cite_ref-NYCJosh_use_ref_tags_76-0"><a data-dcnode-id="4461" href="#cite_note-NYCJosh_use_ref_tags-76"><span data-dcnode-id="4462" instrument_node="">[75]</span></a></sup><span data-dcnode-id="4459" instrument_node="">
</span></p><p data-dcnode-id="4433"><span data-dcnode-id="4457" instrument_node="">Critics point out that the </span><a class="mw-redirect" data-dcnode-id="4455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Charter" title="United Nations Charter"><span data-dcnode-id="4456" instrument_node="">United Nations Charter</span></a><span data-dcnode-id="4454" instrument_node="">, ratified by the U.S., prohibits members from using force against fellow members except against imminent attack or pursuant to an explicit Security Council authorization.</span><sup class="reference" data-dcnode-id="4451" id="cite_ref-NYCJosh_77-0"><a data-dcnode-id="4452" href="#cite_note-NYCJosh-77"><span data-dcnode-id="4453" instrument_node="">[76]</span></a></sup><span data-dcnode-id="4450" instrument_node=""> A professor of </span><a data-dcnode-id="4448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_law" title="International law"><span data-dcnode-id="4449" instrument_node="">international law</span></a><span data-dcnode-id="4447" instrument_node=""> asserted there was no authorization from the </span><a data-dcnode-id="4445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Security_Council" title="United Nations Security Council"><span data-dcnode-id="4446" instrument_node="">UN Security Council</span></a><span data-dcnode-id="4444" instrument_node=""> which made the invasion "a crime against the peace".</span><sup class="reference" data-dcnode-id="4441" id="cite_ref-NYCJosh_77-1"><a data-dcnode-id="4442" href="#cite_note-NYCJosh-77"><span data-dcnode-id="4443" instrument_node="">[76]</span></a></sup><span data-dcnode-id="4440" instrument_node=""> However, U.S. defenders argue there was such an authorization according to </span><a class="mw-redirect" data-dcnode-id="4438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UN_Security_Council_Resolution_1441" title="UN Security Council Resolution 1441"><span data-dcnode-id="4439" instrument_node="">UN Security Council Resolution 1441</span></a><span data-dcnode-id="4437" instrument_node="">. See also, </span><a class="mw-redirect" data-dcnode-id="4435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_War_Crimes" title="United States War Crimes"><span data-dcnode-id="4436" instrument_node="">United States War Crimes</span></a><span data-dcnode-id="4434" instrument_node="">. The U.S. has also supported Kosovo's independence even though it is strictly written in UN Security Council Resolution 1244 that Kosovo cannot be independent and it is stated as a Serbian province. However the International Court of Justice ruled the declaration of independence was legal because the Security Council Resolution did not specify the final status of Kosovo. The U.S. has actively supported and pressured other countries to recognize Kosovo's independence.
</span></p><span data-dcnode-id="4432" instrument_node="">
</span><h3 data-dcnode-id="4422"><span class="mw-headline" data-dcnode-id="4430" id="Manipulation_of_U.S._foreign_policy"><span data-dcnode-id="4431" instrument_node="">Manipulation of U.S. foreign policy</span></span><span class="mw-editsection" data-dcnode-id="4423"><span class="mw-editsection-bracket" data-dcnode-id="4428"><span data-dcnode-id="4429" instrument_node="">[</span></span><a data-dcnode-id="4426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D24" title="Edit section: Manipulation of U.S. foreign policy"><span data-dcnode-id="4427" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4424"><span data-dcnode-id="4425" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4421" instrument_node="">
</span><p data-dcnode-id="4398"><span data-dcnode-id="4420" instrument_node="">Some political scientists maintained that setting economic interdependence as a foreign policy goal may have exposed the United States to manipulation. As a result, the U.S. trading partners gained an ability to influence the U.S. foreign policy decision-making process by manipulating, for example, the currency exchange rate, or restricting the flow of goods and raw materials. In addition, more than 40% of the U.S. foreign debt is currently owned by the big institutional investors from overseas, who continue to accumulate the </span><a data-dcnode-id="4418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_the_Treasury" title="United States Department of the Treasury"><span data-dcnode-id="4419" instrument_node="">Treasury</span></a><span data-dcnode-id="4417" instrument_node=""> bonds.</span><sup class="reference" data-dcnode-id="4414" id="cite_ref-78"><a data-dcnode-id="4415" href="#cite_note-78"><span data-dcnode-id="4416" instrument_node="">[77]</span></a></sup><span data-dcnode-id="4413" instrument_node=""> A reporter for </span><i data-dcnode-id="4410"><a data-dcnode-id="4411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Washington_Post" title="The Washington Post"><span data-dcnode-id="4412" instrument_node="">The Washington Post</span></a></i><span data-dcnode-id="4409" instrument_node=""> wrote that "several less-than-democratic African leaders have skillfully played the anti-terrorism card to earn a relationship with the United States that has helped keep them in power", and suggested, in effect, that therefore foreign dictators could manipulate U.S. foreign policy for their own benefit.</span><sup class="reference" data-dcnode-id="4406" id="cite_ref-tws22dec113b_60-3"><a data-dcnode-id="4407" href="#cite_note-tws22dec113b-60"><span data-dcnode-id="4408" instrument_node="">[59]</span></a></sup><span data-dcnode-id="4405" instrument_node=""> It is also possible for foreign governments to channel money through </span><a class="mw-redirect" data-dcnode-id="4403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_Action_Committee" title="Political Action Committee"><span data-dcnode-id="4404" instrument_node="">PACs</span></a><span data-dcnode-id="4402" instrument_node=""> to buy influence in </span><a data-dcnode-id="4400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Congress" title="United States Congress"><span data-dcnode-id="4401" instrument_node="">Congress</span></a><span data-dcnode-id="4399" instrument_node="">.
</span></p><span data-dcnode-id="4397" instrument_node="">
</span><h3 data-dcnode-id="4387"><span class="mw-headline" data-dcnode-id="4395" id="Commitment_to_foreign_aid"><span data-dcnode-id="4396" instrument_node="">Commitment to foreign aid</span></span><span class="mw-editsection" data-dcnode-id="4388"><span class="mw-editsection-bracket" data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">[</span></span><a data-dcnode-id="4391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D25" title="Edit section: Commitment to foreign aid"><span data-dcnode-id="4392" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4386" instrument_node="">
</span><link data-dcnode-id="4385" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4381" role="note"><span data-dcnode-id="4384" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="4382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._foreign_aid" title="U.S. foreign aid"><span data-dcnode-id="4383" instrument_node="">U.S. foreign aid</span></a></div><span data-dcnode-id="4380" instrument_node="">
</span><p data-dcnode-id="4354"><span data-dcnode-id="4379" instrument_node="">Some critics charge that U.S. government aid should be higher given the high levels of </span><a data-dcnode-id="4377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gross_domestic_product" title="Gross domestic product"><span data-dcnode-id="4378" instrument_node="">gross domestic product</span></a><span data-dcnode-id="4376" instrument_node="">. They claim other countries give more money on a per capita basis, including both government and charitable contributions. By one index which ranked charitable giving as a percentage of GDP, the U.S. ranked 21 of 22 </span><a class="mw-redirect" data-dcnode-id="4374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organisation_for_Economic_Co-operation_and_Development" title="Organisation for Economic Co-operation and Development"><span data-dcnode-id="4375" instrument_node="">OECD</span></a><span data-dcnode-id="4373" instrument_node=""> countries by giving 0.17% of GDP to overseas aid, and compared the U.S. to Sweden which gave 1.03% of its GDP, according to different estimates.</span><sup class="reference" data-dcnode-id="4370" id="cite_ref-tws24decfsafff_79-0"><a data-dcnode-id="4371" href="#cite_note-tws24decfsafff-79"><span data-dcnode-id="4372" instrument_node="">[78]</span></a></sup><sup class="reference" data-dcnode-id="4367" id="cite_ref-tws24dec97554u_80-0"><a data-dcnode-id="4368" href="#cite_note-tws24dec97554u-80"><span data-dcnode-id="4369" instrument_node="">[79]</span></a></sup><span data-dcnode-id="4366" instrument_node=""> The U.S. pledged 0.7% of GDP at a global conference in </span><a data-dcnode-id="4364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mexico" title="Mexico"><span data-dcnode-id="4365" instrument_node="">Mexico</span></a><span data-dcnode-id="4363" instrument_node="">.</span><sup class="reference" data-dcnode-id="4360" id="cite_ref-tws24decfsoffiu_81-0"><a data-dcnode-id="4361" href="#cite_note-tws24decfsoffiu-81"><span data-dcnode-id="4362" instrument_node="">[80]</span></a></sup><span data-dcnode-id="4359" instrument_node=""> According to one estimate, U.S. overseas aid fell 16% from 2005 to 2006.</span><sup class="reference" data-dcnode-id="4356" id="cite_ref-tws24deyftt6iu_82-0"><a data-dcnode-id="4357" href="#cite_note-tws24deyftt6iu-82"><span data-dcnode-id="4358" instrument_node="">[81]</span></a></sup><span data-dcnode-id="4355" instrument_node="">
</span></p><p data-dcnode-id="4340"><span data-dcnode-id="4353" instrument_node="">However, since the U.S. grants tax breaks to nonprofits, it subsidizes relief efforts abroad,</span><sup class="reference" data-dcnode-id="4350" id="cite_ref-tws24dec99iu_83-0"><a data-dcnode-id="4351" href="#cite_note-tws24dec99iu-83"><span data-dcnode-id="4352" instrument_node="">[82]</span></a></sup><span data-dcnode-id="4349" instrument_node=""> although other nations also subsidize charitable activity abroad.</span><sup class="reference" data-dcnode-id="4346" id="cite_ref-tws24dec986u_84-0"><a data-dcnode-id="4347" href="#cite_note-tws24dec986u-84"><span data-dcnode-id="4348" instrument_node="">[83]</span></a></sup><span data-dcnode-id="4345" instrument_node=""> Most foreign aid (79%) came not from government sources but from private foundations, corporations, voluntary organizations, universities, religious organizations and individuals. According to the Index of Global Philanthropy, the United States is the top donor in absolute amounts.</span><sup class="reference" data-dcnode-id="4342" id="cite_ref-tws24dec9789u_85-0"><a data-dcnode-id="4343" href="#cite_note-tws24dec9789u-85"><span data-dcnode-id="4344" instrument_node="">[84]</span></a></sup><span data-dcnode-id="4341" instrument_node="">
</span></p><span data-dcnode-id="4339" instrument_node="">
</span><dl data-dcnode-id="4335"><dt data-dcnode-id="4336"><b data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">Environmental policy</span></b></dt></dl><span data-dcnode-id="4334" instrument_node="">
</span><p data-dcnode-id="4322"><span data-dcnode-id="4333" instrument_node="">The U.S. has been criticized for failure to support the 1997 </span><a data-dcnode-id="4331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyoto_Protocol" title="Kyoto Protocol"><span data-dcnode-id="4332" instrument_node="">Kyoto Protocol</span></a><span data-dcnode-id="4330" instrument_node="">.</span><sup class="reference" data-dcnode-id="4327" id="cite_ref-tws21dec314a_86-0"><a data-dcnode-id="4328" href="#cite_note-tws21dec314a-86"><span data-dcnode-id="4329" instrument_node="">[85]</span></a></sup><sup class="reference" data-dcnode-id="4324" id="cite_ref-tws22dec213a_87-0"><a data-dcnode-id="4325" href="#cite_note-tws22dec213a-87"><span data-dcnode-id="4326" instrument_node="">[86]</span></a></sup><span data-dcnode-id="4323" instrument_node="">
</span></p><span data-dcnode-id="4321" instrument_node="">
</span><h3 data-dcnode-id="4311"><span class="mw-headline" data-dcnode-id="4319" id="The_Holocaust"><span data-dcnode-id="4320" instrument_node="">The Holocaust</span></span><span class="mw-editsection" data-dcnode-id="4312"><span class="mw-editsection-bracket" data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">[</span></span><a data-dcnode-id="4315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D26" title="Edit section: The Holocaust"><span data-dcnode-id="4316" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4310" instrument_node="">
</span><link data-dcnode-id="4309" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4302" role="note"><span data-dcnode-id="4308" instrument_node="">See also: </span><a data-dcnode-id="4306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._intelligence_involvement_with_German_and_Japanese_war_criminals_after_World_War_II" title="U.S. intelligence involvement with German and Japanese war criminals after World War II"><span data-dcnode-id="4307" instrument_node="">U.S. intelligence involvement with German and Japanese war criminals after World War II</span></a><span data-dcnode-id="4305" instrument_node=""> and </span><a data-dcnode-id="4303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ratlines_%28World_War_II_aftermath%29" title="Ratlines (World War II aftermath)"><span data-dcnode-id="4304" instrument_node="">Ratlines (World War II aftermath)</span></a></div><span data-dcnode-id="4301" instrument_node="">
</span><p data-dcnode-id="4279"><span data-dcnode-id="4300" instrument_node="">There has been sharp criticism about the </span><a data-dcnode-id="4298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_response_to_the_Holocaust%23United_States" title="International response to the Holocaust"><span data-dcnode-id="4299" instrument_node="">U.S. response to the Holocaust</span></a><span data-dcnode-id="4297" instrument_node="">: That it failed to admit Jews fleeing persecution from Europe at the beginning of World War II, and that it did not act decisively enough to prevent or stop the Holocaust. </span><a data-dcnode-id="4295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franklin_D._Roosevelt" title="Franklin D. Roosevelt"><span data-dcnode-id="4296" instrument_node="">Franklin D. Roosevelt</span></a><span data-dcnode-id="4294" instrument_node="">, who was the President at the time, was well-informed about the Hitler regime and its anti-Jewish policies,</span><sup class="reference" data-dcnode-id="4291" id="cite_ref-88"><a data-dcnode-id="4292" href="#cite_note-88"><span data-dcnode-id="4293" instrument_node="">[87]</span></a></sup><span data-dcnode-id="4290" instrument_node=""> but the U.S. State Department policies made it very difficult for Jewish refugees to obtain entry visas. Roosevelt similarly took no action on the </span><a data-dcnode-id="4288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wagner%25E2%2580%2593Rogers_Bill" title="Wagner–Rogers Bill"><span data-dcnode-id="4289" instrument_node="">Wagner–Rogers Bill</span></a><span data-dcnode-id="4287" instrument_node="">, which could have saved 20,000 Jewish refugee children, following the arrival of 936 Jewish refugees on the </span><a data-dcnode-id="4285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MS_St._Louis" title="MS St. Louis"><span data-dcnode-id="4286" instrument_node="">MS St. Louis</span></a><span data-dcnode-id="4284" instrument_node="">, who were denied asylum and were not allowed into the United States because of strict laws passed by Congress.</span><sup class="reference" data-dcnode-id="4281" id="cite_ref-89"><a data-dcnode-id="4282" href="#cite_note-89"><span data-dcnode-id="4283" instrument_node="">[88]</span></a></sup><span data-dcnode-id="4280" instrument_node="">
</span></p><p data-dcnode-id="4266"><span data-dcnode-id="4278" instrument_node="">During the era, the American press did not always publicize reports of Nazi atrocities in full or with prominent placement.</span><sup class="reference" data-dcnode-id="4275" id="cite_ref-90"><a data-dcnode-id="4276" href="#cite_note-90"><span data-dcnode-id="4277" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4274" instrument_node=""> By 1942, after newspapers began to report details of the Holocaust, articles were extremely short and were buried deep in the newspaper. These reports were either denied or unconfirmed by the United States government. When it did receive irrefutable evidence that the reports were true (and photographs of mass graves and murder in </span><a data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Auschwitz_concentration_camp%23Auschwitz_II-Birkenau" title="Auschwitz concentration camp"><span data-dcnode-id="4273" instrument_node="">Birkenau camp</span></a><span data-dcnode-id="4271" instrument_node=""> in 1943, with victims moving into the gas chambers), U.S. officials suppressed the information and classified it as secret.</span><sup class="reference" data-dcnode-id="4268" id="cite_ref-jvl-us-holocaust_91-0"><a data-dcnode-id="4269" href="#cite_note-jvl-us-holocaust-91"><span data-dcnode-id="4270" instrument_node="">[90]</span></a></sup><span data-dcnode-id="4267" instrument_node=""> It is possible lives of European Jews could have been saved.
</span></p><span data-dcnode-id="4265" instrument_node="">
</span><h3 data-dcnode-id="4255"><span class="mw-headline" data-dcnode-id="4263" id="Alienation_of_allies"><span data-dcnode-id="4264" instrument_node="">Alienation of allies</span></span><span class="mw-editsection" data-dcnode-id="4256"><span class="mw-editsection-bracket" data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">[</span></span><a data-dcnode-id="4259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D27" title="Edit section: Alienation of allies"><span data-dcnode-id="4260" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4257"><span data-dcnode-id="4258" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4254" instrument_node="">
</span><p data-dcnode-id="4246"><span data-dcnode-id="4253" instrument_node="">There is evidence that many U.S. allies have been alienated by a unilateral approach. Allies signaled dissatisfaction with U.S. policy in a vote at the </span><a data-dcnode-id="4251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="4252" instrument_node="">U.N.</span></a><sup class="reference" data-dcnode-id="4248" id="cite_ref-tws22dec311a_22-2"><a data-dcnode-id="4249" href="#cite_note-tws22dec311a-22"><span data-dcnode-id="4250" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4247" instrument_node="">
</span></p><span data-dcnode-id="4245" instrument_node="">
</span><h3 data-dcnode-id="4235"><span class="mw-headline" data-dcnode-id="4243" id="Ineffective_public_relations"><span data-dcnode-id="4244" instrument_node="">Ineffective public relations</span></span><span class="mw-editsection" data-dcnode-id="4236"><span class="mw-editsection-bracket" data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">[</span></span><a data-dcnode-id="4239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D28" title="Edit section: Ineffective public relations"><span data-dcnode-id="4240" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4234" instrument_node="">
</span><link data-dcnode-id="4233" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4229" role="note"><span data-dcnode-id="4232" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="4230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_Diplomacy_%28U.S.%29" title="Public Diplomacy (U.S.)"><span data-dcnode-id="4231" instrument_node="">Public Diplomacy (U.S.)</span></a></div><span data-dcnode-id="4228" instrument_node="">
</span><p data-dcnode-id="4202"><span data-dcnode-id="4227" instrument_node="">One report suggests that news source </span><a class="mw-redirect" data-dcnode-id="4225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al-jazeera" title="Al-jazeera"><span data-dcnode-id="4226" instrument_node="">Al-jazeera</span></a><span data-dcnode-id="4224" instrument_node=""> routinely paints the U.S. as evil throughout the </span><a data-dcnode-id="4222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_East" title="Middle East"><span data-dcnode-id="4223" instrument_node="">Middle East</span></a><span data-dcnode-id="4221" instrument_node="">.</span><sup class="reference" data-dcnode-id="4218" id="cite_ref-tws21dec311_92-0"><a data-dcnode-id="4219" href="#cite_note-tws21dec311-92"><span data-dcnode-id="4220" instrument_node="">[91]</span></a></sup><span data-dcnode-id="4217" instrument_node=""> Other critics have faulted the U.S. public relations effort.</span><sup class="reference" data-dcnode-id="4214" id="cite_ref-tws22dec113b_60-4"><a data-dcnode-id="4215" href="#cite_note-tws22dec113b-60"><span data-dcnode-id="4216" instrument_node="">[59]</span></a></sup><sup class="reference" data-dcnode-id="4211" id="cite_ref-tws21dec314a_86-1"><a data-dcnode-id="4212" href="#cite_note-tws21dec314a-86"><span data-dcnode-id="4213" instrument_node="">[85]</span></a></sup><span data-dcnode-id="4210" instrument_node=""> As a result of faulty policy and lackluster public relations, the U.S. has a severe image problem in the Middle East, according to </span><a data-dcnode-id="4208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthony_Cordesman" title="Anthony Cordesman"><span data-dcnode-id="4209" instrument_node="">Anthony Cordesman</span></a><span data-dcnode-id="4207" instrument_node="">.</span><sup class="reference" data-dcnode-id="4204" id="cite_ref-tws22dec214f_93-0"><a data-dcnode-id="4205" href="#cite_note-tws22dec214f-93"><span data-dcnode-id="4206" instrument_node="">[92]</span></a></sup><span data-dcnode-id="4203" instrument_node="">
