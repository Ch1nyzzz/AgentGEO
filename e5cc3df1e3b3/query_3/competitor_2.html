</span></p><p data-dcnode-id="4142"><span data-dcnode-id="4201" instrument_node="">Analyst </span><a class="mw-redirect" data-dcnode-id="4199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jessica_Tuchman_Mathews" title="Jessica Tuchman Mathews"><span data-dcnode-id="4200" instrument_node="">Jessica Tuchman Mathews</span></a><span data-dcnode-id="4198" instrument_node=""> writes that it appears to much of the Arab world that the United States went to war in Iraq for oil, regardless of the accuracy of that motive.</span><sup class="reference" data-dcnode-id="4195" id="cite_ref-tws22dec216oopp_15-3"><a data-dcnode-id="4196" href="#cite_note-tws22dec216oopp-15"><span data-dcnode-id="4197" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4194" instrument_node=""> In a 2007 poll by </span><a data-dcnode-id="4192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BBC_News" title="BBC News"><span data-dcnode-id="4193" instrument_node="">BBC News</span></a><span data-dcnode-id="4191" instrument_node=""> asking which countries are seen as having a "negative influence in the world", the survey found that </span><a data-dcnode-id="4189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="4190" instrument_node="">Iran</span></a><span data-dcnode-id="4188" instrument_node="">, United States and </span><a data-dcnode-id="4186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Korea" title="North Korea"><span data-dcnode-id="4187" instrument_node="">North Korea</span></a><span data-dcnode-id="4185" instrument_node=""> had the most negative influence, while nations such as </span><a data-dcnode-id="4183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canada" title="Canada"><span data-dcnode-id="4184" instrument_node="">Canada</span></a><span data-dcnode-id="4182" instrument_node="">, </span><a data-dcnode-id="4180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="4181" instrument_node="">Japan</span></a><span data-dcnode-id="4179" instrument_node=""> and those in the </span><a data-dcnode-id="4177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="4178" instrument_node="">European Union</span></a><span data-dcnode-id="4176" instrument_node=""> had the most positive influence.</span><sup class="reference" data-dcnode-id="4173" id="cite_ref-tws26deca443e_94-0"><a data-dcnode-id="4174" href="#cite_note-tws26deca443e-94"><span data-dcnode-id="4175" instrument_node="">[93]</span></a></sup><span data-dcnode-id="4172" instrument_node=""> The U.S. has been accused by some U.N. officials of condoning actions by </span><a data-dcnode-id="4170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel" title="Israel"><span data-dcnode-id="4171" instrument_node="">Israel</span></a><span data-dcnode-id="4169" instrument_node=""> against </span><a data-dcnode-id="4167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palestinians" title="Palestinians"><span data-dcnode-id="4168" instrument_node="">Palestinians</span></a><span data-dcnode-id="4166" instrument_node="">.</span><sup class="reference" data-dcnode-id="4163" id="cite_ref-tws22dec311a_22-3"><a data-dcnode-id="4164" href="#cite_note-tws22dec311a-22"><span data-dcnode-id="4165" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4162" instrument_node=""> On the other hand, others have accused the U.S. of being too supportive of the Palestinians.</span><sup class="noprint Inline-Template" data-dcnode-id="4150" style="white-space:nowrap;"><span data-dcnode-id="4161" instrument_node="">[</span><i data-dcnode-id="4152"><a data-dcnode-id="4158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAccuracy_dispute%23Disputed_statement" title="Wikipedia:Accuracy dispute"><span data-dcnode-id="4159" title="The material near this tag is possibly inaccurate or nonfactual. (September 2014)"><span data-dcnode-id="4160" instrument_node="">dubious</span></span></a><span data-dcnode-id="4157" instrument_node=""> </span><span class="metadata" data-dcnode-id="4153"><span data-dcnode-id="4156" instrument_node=""> – </span><a data-dcnode-id="4154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talk%3ACriticism_of_United_States_foreign_policy%23Dubious" title="Talk:Criticism of United States foreign policy"><span data-dcnode-id="4155" instrument_node="">discuss</span></a></span></i><span data-dcnode-id="4151" instrument_node="">]</span></sup><sup class="reference" data-dcnode-id="4147" id="cite_ref-95"><a data-dcnode-id="4148" href="#cite_note-95"><span data-dcnode-id="4149" instrument_node="">[94]</span></a></sup><sup class="reference" data-dcnode-id="4144" id="cite_ref-96"><a data-dcnode-id="4145" href="#cite_note-96"><span data-dcnode-id="4146" instrument_node="">[95]</span></a></sup><span data-dcnode-id="4143" instrument_node="">
</span></p><span data-dcnode-id="4141" instrument_node="">
</span><h3 data-dcnode-id="4131"><span class="mw-headline" data-dcnode-id="4139" id="Ineffective_prosecution_of_war"><span data-dcnode-id="4140" instrument_node="">Ineffective prosecution of war</span></span><span class="mw-editsection" data-dcnode-id="4132"><span class="mw-editsection-bracket" data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">[</span></span><a data-dcnode-id="4135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D29" title="Edit section: Ineffective prosecution of war"><span data-dcnode-id="4136" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4130" instrument_node="">
</span><p data-dcnode-id="4110"><span data-dcnode-id="4129" instrument_node="">One estimate is that the second Iraq War along with the so-called </span><a class="mw-redirect" data-dcnode-id="4127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_on_Terror" title="War on Terror"><span data-dcnode-id="4128" instrument_node="">War on Terror</span></a><span data-dcnode-id="4126" instrument_node=""> cost $551 billion, or $597 billion in 2009 dollars.</span><sup class="reference" data-dcnode-id="4123" id="cite_ref-tws27decgttrr_97-0"><a data-dcnode-id="4124" href="#cite_note-tws27decgttrr-97"><span data-dcnode-id="4125" instrument_node="">[96]</span></a></sup><span data-dcnode-id="4122" instrument_node=""> </span><a data-dcnode-id="4120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boston_University" title="Boston University"><span data-dcnode-id="4121" instrument_node="">Boston University</span></a><span data-dcnode-id="4119" instrument_node=""> professor Andrew Bacevich has criticized American profligacy</span><sup class="reference" data-dcnode-id="4116" id="cite_ref-tws21dec116sfpoiui_14-1"><a data-dcnode-id="4117" href="#cite_note-tws21dec116sfpoiui-14"><span data-dcnode-id="4118" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4115" instrument_node=""> and squandering its wealth.</span><sup class="reference" data-dcnode-id="4112" id="cite_ref-tws21dec215aaa_13-2"><a data-dcnode-id="4113" href="#cite_note-tws21dec215aaa-13"><span data-dcnode-id="4114" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4111" instrument_node="">
</span></p><p data-dcnode-id="4094"><span data-dcnode-id="4109" instrument_node="">There have been criticisms of U.S. warmaking failures.</span><sup class="reference" data-dcnode-id="4106" id="cite_ref-98"><a data-dcnode-id="4107" href="#cite_note-98"><span data-dcnode-id="4108" instrument_node="">[97]</span></a></sup><span data-dcnode-id="4105" instrument_node="">  In the </span><a data-dcnode-id="4103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_of_1812" title="War of 1812"><span data-dcnode-id="4104" instrument_node="">War of 1812</span></a><span data-dcnode-id="4102" instrument_node="">, the U.S. was unable to conquer </span><a data-dcnode-id="4100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_North_America" title="British North America"><span data-dcnode-id="4101" instrument_node="">British North America</span></a><span data-dcnode-id="4099" instrument_node=""> (modern-day Canada) despite several attempts.</span><sup class="reference" data-dcnode-id="4096" id="cite_ref-99"><a data-dcnode-id="4097" href="#cite_note-99"><span data-dcnode-id="4098" instrument_node="">[98]</span></a></sup><span data-dcnode-id="4095" instrument_node="">
</span></p><span data-dcnode-id="4093" instrument_node="">
</span><h3 data-dcnode-id="4083"><span class="mw-headline" data-dcnode-id="4091" id="Ineffective_strategy_to_fight_terrorism"><span data-dcnode-id="4092" instrument_node="">Ineffective strategy to fight terrorism</span></span><span class="mw-editsection" data-dcnode-id="4084"><span class="mw-editsection-bracket" data-dcnode-id="4089"><span data-dcnode-id="4090" instrument_node="">[</span></span><a data-dcnode-id="4087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D30" title="Edit section: Ineffective strategy to fight terrorism"><span data-dcnode-id="4088" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4082" instrument_node="">
</span><p data-dcnode-id="4072"><span data-dcnode-id="4081" instrument_node="">Critic Cordesman criticized U.S. strategy to combat terrorism as not having enough emphasis on getting Islamic republics to fight terrorism themselves.</span><sup class="reference" data-dcnode-id="4078" id="cite_ref-tws22dec214e_100-0"><a data-dcnode-id="4079" href="#cite_note-tws22dec214e-100"><span data-dcnode-id="4080" instrument_node="">[99]</span></a></sup><span data-dcnode-id="4077" instrument_node=""> Sometimes visitors have been misidentified as "terrorists".</span><sup class="reference" data-dcnode-id="4074" id="cite_ref-tws18dec212h_101-0"><a data-dcnode-id="4075" href="#cite_note-tws18dec212h-101"><span data-dcnode-id="4076" instrument_node="">[100]</span></a></sup><span data-dcnode-id="4073" instrument_node="">
</span></p><p data-dcnode-id="4055"><a class="mw-redirect" data-dcnode-id="4070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jessica_Tuchman_Mathews" title="Jessica Tuchman Mathews"><span data-dcnode-id="4071" instrument_node="">Mathews</span></a><span data-dcnode-id="4069" instrument_node=""> suggests the risk of nuclear terrorism remains unprevented.</span><sup class="reference" data-dcnode-id="4066" id="cite_ref-tws22dec216oopp_15-4"><a data-dcnode-id="4067" href="#cite_note-tws22dec216oopp-15"><span data-dcnode-id="4068" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4065" instrument_node=""> In 1999 during the </span><a data-dcnode-id="4063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosovo_War" title="Kosovo War"><span data-dcnode-id="4064" instrument_node="">Kosovo War</span></a><span data-dcnode-id="4062" instrument_node="">, the U.S. supported the </span><a data-dcnode-id="4060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosovo_Liberation_Army" title="Kosovo Liberation Army"><span data-dcnode-id="4061" instrument_node="">Kosovo Liberation Army</span></a><span data-dcnode-id="4059" instrument_node=""> (KLA), though it had been recognised as a terrorist organisation by the U.S. some years prior. Right before the </span><a data-dcnode-id="4057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_bombing_of_Yugoslavia" title="NATO bombing of Yugoslavia"><span data-dcnode-id="4058" instrument_node="">1999 bombing of Yugoslavia</span></a><span data-dcnode-id="4056" instrument_node=""> took place, the U.S. took down the KLA from the list of internationally recognized terrorist organizations in order to justify their aid and help to the KLA.
</span></p><span data-dcnode-id="4054" instrument_node="">
</span><h3 data-dcnode-id="4044"><span class="mw-headline" data-dcnode-id="4052" id="Small_role_of_Congress_in_foreign_policy"><span data-dcnode-id="4053" instrument_node="">Small role of Congress in foreign policy</span></span><span class="mw-editsection" data-dcnode-id="4045"><span class="mw-editsection-bracket" data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">[</span></span><a data-dcnode-id="4048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D31" title="Edit section: Small role of Congress in foreign policy"><span data-dcnode-id="4049" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4043" instrument_node="">
</span><link data-dcnode-id="4042" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4035" role="note"><span data-dcnode-id="4041" instrument_node="">See also: </span><a data-dcnode-id="4039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Senate_Committee_on_Foreign_Relations" title="United States Senate Committee on Foreign Relations"><span data-dcnode-id="4040" instrument_node="">United States Senate Committee on Foreign Relations</span></a><span data-dcnode-id="4038" instrument_node=""> and </span><a data-dcnode-id="4036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_House_Committee_on_Foreign_Affairs" title="United States House Committee on Foreign Affairs"><span data-dcnode-id="4037" instrument_node="">United States House Committee on Foreign Affairs</span></a></div><span data-dcnode-id="4034" instrument_node="">
</span><p data-dcnode-id="3999"><span data-dcnode-id="4033" instrument_node="">Critic Robert McMahon thinks </span><a data-dcnode-id="4031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Congress" title="United States Congress"><span data-dcnode-id="4032" instrument_node="">Congress</span></a><span data-dcnode-id="4030" instrument_node=""> has been excluded from foreign policy decision making, and that this is detrimental.</span><sup class="reference" data-dcnode-id="4027" id="cite_ref-tws21dec114_102-0"><a data-dcnode-id="4028" href="#cite_note-tws21dec114-102"><span data-dcnode-id="4029" instrument_node="">[101]</span></a></sup><span data-dcnode-id="4026" instrument_node=""> Other writers suggest a need for greater Congressional participation.</span><sup class="reference" data-dcnode-id="4023" id="cite_ref-tws22dec216oopp_15-5"><a data-dcnode-id="4024" href="#cite_note-tws22dec216oopp-15"><span data-dcnode-id="4025" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4022" instrument_node=""> </span><a data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Webb" title="Jim Webb"><span data-dcnode-id="4021" instrument_node="">Jim Webb</span></a><span data-dcnode-id="4019" instrument_node="">, former Democratic senator from Virginia and former </span><a class="mw-redirect" data-dcnode-id="4017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secretary_of_the_Navy" title="Secretary of the Navy"><span data-dcnode-id="4018" instrument_node="">Secretary of the Navy</span></a><span data-dcnode-id="4016" instrument_node=""> in the </span><a class="mw-redirect" data-dcnode-id="4014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reagan_administration" title="Reagan administration"><span data-dcnode-id="4015" instrument_node="">Reagan administration</span></a><span data-dcnode-id="4013" instrument_node="">, believes that Congress has an ever-decreasing role in U.S. foreign policy making. September 11, 2001, precipitated this change, where "powers quickly shifted quickly to the Presidency as the call went up for centralized decision making in a traumatized nation where, quick, decisive action was considered necessary. It was considered politically dangerous and even unpatriotic to question this shift, lest one be accused of impeding national safety during a time of war."</span><sup class="reference" data-dcnode-id="4010" id="cite_ref-Jim_Webb_NA_103-0"><a data-dcnode-id="4011" href="#cite_note-Jim_Webb_NA-103"><span data-dcnode-id="4012" instrument_node="">[102]</span></a></sup><span data-dcnode-id="4009" instrument_node=""> Since that time, Webb thinks Congress has become largely irrelevant in shaping and executing of U.S. foreign policy. He cites the </span><a class="mw-redirect" data-dcnode-id="4007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strategic_Framework_Agreement" title="Strategic Framework Agreement"><span data-dcnode-id="4008" instrument_node="">Strategic Framework Agreement</span></a><span data-dcnode-id="4006" instrument_node=""> (SFA), the </span><a data-dcnode-id="4004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S.%25E2%2580%2593Afghanistan_Strategic_Partnership_Agreement" title="U.S.–Afghanistan Strategic Partnership Agreement"><span data-dcnode-id="4005" instrument_node="">U.S.–Afghanistan Strategic Partnership Agreement</span></a><span data-dcnode-id="4003" instrument_node="">, and the </span><a data-dcnode-id="4001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2011_military_intervention_in_Libya" title="2011 military intervention in Libya"><span data-dcnode-id="4002" instrument_node="">2011 military intervention in Libya</span></a><span data-dcnode-id="4000" instrument_node=""> as examples of growing legislative irrelevance.
</span></p><p data-dcnode-id="3969"><span data-dcnode-id="3998" instrument_node="">Regarding the SFA, "Congress was not consulted in any meaningful way. Once the document was finalized, Congress was not given the opportunity to debate the merits of the agreement, which was specifically designed to shape the structure of our long-term relations in Iraq" (11). "Congress did not debate or vote on this agreement, which set U.S. policy toward an unstable regime in an unstable region of the world."</span><sup class="reference" data-dcnode-id="3995" id="cite_ref-Jim_Webb_NA_103-1"><a data-dcnode-id="3996" href="#cite_note-Jim_Webb_NA-103"><span data-dcnode-id="3997" instrument_node="">[102]</span></a></sup><span data-dcnode-id="3994" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="3992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraqi_Parliament" title="Iraqi Parliament"><span data-dcnode-id="3993" instrument_node="">Iraqi Parliament</span></a><span data-dcnode-id="3991" instrument_node="">, by contrast, voted on the measure twice. The U.S.–Afghanistan Strategic Partnership Agreement is described by the Obama Administration has a "legally binding executive agreement" that outlines the future of U.S.–Afghan relations and designated Afghanistan a </span><a data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Major_non-NATO_ally" title="Major non-NATO ally"><span data-dcnode-id="3990" instrument_node="">major non-NATO ally</span></a><span data-dcnode-id="3988" instrument_node="">. "It is difficult to understand how any international agreement negotiated, signed, and authored only by our executive branch of government can be construed as legally binding in our constitutional system", Webb argues.</span><sup class="reference" data-dcnode-id="3985" id="cite_ref-Jim_Webb_NA_103-2"><a data-dcnode-id="3986" href="#cite_note-Jim_Webb_NA-103"><span data-dcnode-id="3987" instrument_node="">[102]</span></a></sup><span data-dcnode-id="3984" instrument_node=""> Finally, Webb identifies the U.S. intervention in Libya as a troubling historical precedent. "The issue in play in Libya was not simply whether the president should ask Congress for a declaration of war. Nor was it wholly about whether Obama violated the edicts of the </span><a data-dcnode-id="3982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_Powers_Resolution" title="War Powers Resolution"><span data-dcnode-id="3983" instrument_node="">War Powers Act</span></a><span data-dcnode-id="3981" instrument_node="">, which in this writer's view he clearly did. The issue that remains to be resolved is whether a president can unilaterally begin, and continue, a military campaign for reasons that he alone defines as meeting the demanding standards of a vital national interest worth of risking American lives and expending billions of dollars of taxpayer money."</span><sup class="reference" data-dcnode-id="3978" id="cite_ref-Jim_Webb_NA_103-3"><a data-dcnode-id="3979" href="#cite_note-Jim_Webb_NA-103"><span data-dcnode-id="3980" instrument_node="">[102]</span></a></sup><span data-dcnode-id="3977" instrument_node=""> When the military campaign lasted months, President </span><a data-dcnode-id="3975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barack_Obama" title="Barack Obama"><span data-dcnode-id="3976" instrument_node="">Barack Obama</span></a><span data-dcnode-id="3974" instrument_node=""> did not seek approval of Congress to continue military activity.</span><sup class="reference" data-dcnode-id="3971" id="cite_ref-Jim_Webb_NA_103-4"><a data-dcnode-id="3972" href="#cite_note-Jim_Webb_NA-103"><span data-dcnode-id="3973" instrument_node="">[102]</span></a></sup><span data-dcnode-id="3970" instrument_node="">
</span></p><span data-dcnode-id="3968" instrument_node="">
</span><h3 data-dcnode-id="3958"><span class="mw-headline" data-dcnode-id="3966" id="Lack_of_vision"><span data-dcnode-id="3967" instrument_node="">Lack of vision</span></span><span class="mw-editsection" data-dcnode-id="3959"><span class="mw-editsection-bracket" data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">[</span></span><a data-dcnode-id="3962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D32" title="Edit section: Lack of vision"><span data-dcnode-id="3963" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3960"><span data-dcnode-id="3961" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3957" instrument_node="">
</span><p data-dcnode-id="3934"><span data-dcnode-id="3956" instrument_node="">The short-term election cycle coupled with the inability to stay focused on long-term objectives motivates American presidents to lean towards actions that would appease the citizenry, and, as a rule, avoid complicated international issues and difficult choices. Thus, Zbigniew Brzezinski criticized the </span><a data-dcnode-id="3954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bill_Clinton" title="Bill Clinton"><span data-dcnode-id="3955" instrument_node="">Clinton</span></a><span data-dcnode-id="3953" instrument_node=""> presidency as having a foreign policy which lacked "discipline and passion" and subjected the U.S. to "eight years of drift".</span><sup class="reference" data-dcnode-id="3950" id="cite_ref-tws21dec216d_9-1"><a data-dcnode-id="3951" href="#cite_note-tws21dec216d-9"><span data-dcnode-id="3952" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3949" instrument_node=""> In comparison, the next, Bush presidency was criticized for many impulsive decisions that harmed the international standing of the U.S. in the world.</span><sup class="reference" data-dcnode-id="3946" id="cite_ref-104"><a data-dcnode-id="3947" href="#cite_note-104"><span data-dcnode-id="3948" instrument_node="">[103]</span></a></sup><span data-dcnode-id="3945" instrument_node=""> Former director of operations for the </span><a data-dcnode-id="3943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joint_Chiefs_of_Staff" title="Joint Chiefs of Staff"><span data-dcnode-id="3944" instrument_node="">Joint Chiefs of Staff</span></a><span data-dcnode-id="3942" instrument_node=""> Lt. Gen. </span><a data-dcnode-id="3940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gregory_S._Newbold" title="Gregory S. Newbold"><span data-dcnode-id="3941" instrument_node="">Gregory S. Newbold</span></a><span data-dcnode-id="3939" instrument_node=""> commented that, "There's a broad naïvete in the political class about America's obligations in foreign policy issues, and scary simplicity about the effects that employing American military power can achieve".</span><sup class="reference" data-dcnode-id="3936" id="cite_ref-105"><a data-dcnode-id="3937" href="#cite_note-105"><span data-dcnode-id="3938" instrument_node="">[104]</span></a></sup><span data-dcnode-id="3935" instrument_node="">
</span></p><span data-dcnode-id="3933" instrument_node="">
</span><h3 data-dcnode-id="3923"><span class="mw-headline" data-dcnode-id="3931" id="Allegations_of_arrogance"><span data-dcnode-id="3932" instrument_node="">Allegations of arrogance</span></span><span class="mw-editsection" data-dcnode-id="3924"><span class="mw-editsection-bracket" data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">[</span></span><a data-dcnode-id="3927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D33" title="Edit section: Allegations of arrogance"><span data-dcnode-id="3928" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3922" instrument_node="">
</span><link data-dcnode-id="3921" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3917" role="note"><span data-dcnode-id="3920" instrument_node="">Main article: </span><a data-dcnode-id="3918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_arrogance" title="Global arrogance"><span data-dcnode-id="3919" instrument_node="">Global arrogance</span></a></div><span data-dcnode-id="3916" instrument_node="">
</span><p data-dcnode-id="3898"><span data-dcnode-id="3915" instrument_node="">Some commentators have thought the United States became arrogant, particularly after its victory in World War II.</span><sup class="reference" data-dcnode-id="3912" id="cite_ref-tws22dec116ex_1-3"><a data-dcnode-id="3913" href="#cite_note-tws22dec116ex-1"><span data-dcnode-id="3914" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3911" instrument_node=""> Critics such as Andrew Bacevich call on America to have a foreign policy "rooted in humility and realism".</span><sup class="reference" data-dcnode-id="3908" id="cite_ref-tws21dec116sfpoiui_14-2"><a data-dcnode-id="3909" href="#cite_note-tws21dec116sfpoiui-14"><span data-dcnode-id="3910" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3907" instrument_node=""> Foreign policy experts such as Zbigniew Brzezinski counsel a policy of self-restraint and not pressing every advantage, and listening to other nations.</span><sup class="reference" data-dcnode-id="3904" id="cite_ref-tws21dec216d_9-2"><a data-dcnode-id="3905" href="#cite_note-tws21dec216d-9"><span data-dcnode-id="3906" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3903" instrument_node=""> A government official called the U.S. policy in Iraq "arrogant and stupid", according to one report.</span><sup class="reference" data-dcnode-id="3900" id="cite_ref-tws21dec311_92-1"><a data-dcnode-id="3901" href="#cite_note-tws21dec311-92"><span data-dcnode-id="3902" instrument_node="">[91]</span></a></sup><span data-dcnode-id="3899" instrument_node="">
</span></p><span data-dcnode-id="3897" instrument_node="">
</span><h3 data-dcnode-id="3887"><span class="mw-headline" data-dcnode-id="3895" id="Problem_areas_festering"><span data-dcnode-id="3896" instrument_node="">Problem areas festering</span></span><span class="mw-editsection" data-dcnode-id="3888"><span class="mw-editsection-bracket" data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">[</span></span><a data-dcnode-id="3891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCriticism_of_United_States_foreign_policy%26action%3Dedit%26section%3D34" title="Edit section: Problem areas festering"><span data-dcnode-id="3892" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3886" instrument_node="">
</span><p data-dcnode-id="3795"><span data-dcnode-id="3885" instrument_node="">Critics point to a list of countries or regions where continuing foreign policy problems continue to present problems. These areas include </span><a data-dcnode-id="3883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_America" title="South America"><span data-dcnode-id="3884" instrument_node="">South America</span></a><span data-dcnode-id="3882" instrument_node="">,</span><sup class="reference" data-dcnode-id="3879" id="cite_ref-tws21dec312_106-0"><a data-dcnode-id="3880" href="#cite_note-tws21dec312-106"><span data-dcnode-id="3881" instrument_node="">[105]</span></a></sup><span data-dcnode-id="3878" instrument_node=""> including </span><a data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecuador" title="Ecuador"><span data-dcnode-id="3877" instrument_node="">Ecuador</span></a><span data-dcnode-id="3875" instrument_node="">,</span><sup class="reference" data-dcnode-id="3872" id="cite_ref-tws22dec2165_107-0"><a data-dcnode-id="3873" href="#cite_note-tws22dec2165-107"><span data-dcnode-id="3874" instrument_node="">[106]</span></a></sup><span data-dcnode-id="3871" instrument_node=""> </span><a data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolivia" title="Bolivia"><span data-dcnode-id="3870" instrument_node="">Bolivia</span></a><span data-dcnode-id="3868" instrument_node="">, </span><a data-dcnode-id="3866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uruguay" title="Uruguay"><span data-dcnode-id="3867" instrument_node="">Uruguay</span></a><span data-dcnode-id="3865" instrument_node="">, and </span><a data-dcnode-id="3863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brazil" title="Brazil"><span data-dcnode-id="3864" instrument_node="">Brazil</span></a><span data-dcnode-id="3862" instrument_node="">. There are difficulties with </span><a data-dcnode-id="3860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_America" title="Central America"><span data-dcnode-id="3861" instrument_node="">Central American</span></a><span data-dcnode-id="3859" instrument_node=""> nations such as </span><a data-dcnode-id="3857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Honduras" title="Honduras"><span data-dcnode-id="3858" instrument_node="">Honduras</span></a><span data-dcnode-id="3856" instrument_node="">.</span><sup class="reference" data-dcnode-id="3853" id="cite_ref-tws21dec315c_108-0"><a data-dcnode-id="3854" href="#cite_note-tws21dec315c-108"><span data-dcnode-id="3855" instrument_node="">[107]</span></a></sup><span data-dcnode-id="3852" instrument_node=""> Iraq has continuing troubles.</span><sup class="reference" data-dcnode-id="3849" id="cite_ref-tws22dec211_109-0"><a data-dcnode-id="3850" href="#cite_note-tws22dec211-109"><span data-dcnode-id="3851" instrument_node="">[108]</span></a></sup><span data-dcnode-id="3848" instrument_node=""> </span><a data-dcnode-id="3846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="3847" instrument_node="">Iran</span></a><span data-dcnode-id="3845" instrument_node="">, as well, presents problems with nuclear proliferation.</span><sup class="reference" data-dcnode-id="3842" id="cite_ref-tws22dec211_109-1"><a data-dcnode-id="3843" href="#cite_note-tws22dec211-109"><span data-dcnode-id="3844" instrument_node="">[108]</span></a></sup><sup class="reference" data-dcnode-id="3839" id="cite_ref-tws22dec214g_110-0"><a data-dcnode-id="3840" href="#cite_note-tws22dec214g-110"><span data-dcnode-id="3841" instrument_node="">[109]</span></a></sup><span data-dcnode-id="3838" instrument_node=""> In </span><a data-dcnode-id="3836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afghanistan" title="Afghanistan"><span data-dcnode-id="3837" instrument_node="">Afghanistan</span></a><span data-dcnode-id="3835" instrument_node="">, the US 20-year war failed and the country fell into the Taliban regime.</span><sup class="reference" data-dcnode-id="3832" id="cite_ref-tws22dec216_111-0"><a data-dcnode-id="3833" href="#cite_note-tws22dec216-111"><span data-dcnode-id="3834" instrument_node="">[110]</span></a></sup><span data-dcnode-id="3831" instrument_node=""> The Middle East in general continues to fester,</span><sup class="reference" data-dcnode-id="3828" id="cite_ref-tws22dec216oopp_15-6"><a data-dcnode-id="3829" href="#cite_note-tws22dec216oopp-15"><span data-dcnode-id="3830" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3827" instrument_node=""> although </span><a data-dcnode-id="3825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/India%25E2%2580%2593United_States_relations" title="India–United States relations"><span data-dcnode-id="3826" instrument_node="">relations with India</span></a><span data-dcnode-id="3824" instrument_node=""> are improving.</span><sup class="reference" data-dcnode-id="3821" id="cite_ref-tws22dec216cc_112-0"><a data-dcnode-id="3822" href="#cite_note-tws22dec216cc-112"><span data-dcnode-id="3823" instrument_node="">[111]</span></a></sup><span data-dcnode-id="3820" instrument_node=""> Policy towards </span><a data-dcnode-id="3818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia" title="Russia"><span data-dcnode-id="3819" instrument_node="">Russia</span></a><span data-dcnode-id="3817" instrument_node=""> remains uncertain.</span><sup class="reference" data-dcnode-id="3814" id="cite_ref-tws22dec216dd_113-0"><a data-dcnode-id="3815" href="#cite_note-tws22dec216dd-113"><span data-dcnode-id="3816" instrument_node="">[112]</span></a></sup><span data-dcnode-id="3813" instrument_node=""> </span><a data-dcnode-id="3811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="3812" instrument_node="">China</span></a><span data-dcnode-id="3810" instrument_node=""> also presents a challenge.</span><sup class="reference" data-dcnode-id="3807" id="cite_ref-tws22dec216oopp_15-7"><a data-dcnode-id="3808" href="#cite_note-tws22dec216oopp-15"><span data-dcnode-id="3809" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="3804" id="cite_ref-tws22dec216ee_114-0"><a data-dcnode-id="3805" href="#cite_note-tws22dec216ee-114"><span data-dcnode-id="3806" instrument_node="">[113]</span></a></sup><span data-dcnode-id="3803" instrument_node=""> There are difficulties in other regions too. In addition, there are problems not confined to particular regions, but regarding new technologies. </span><a data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cyberspace" title="Cyberspace"><span data-dcnode-id="3802" instrument_node="">Cyberspace</span></a><span data-dcnode-id="3800" instrument_node=""> is a constantly changing technological area with foreign policy repercussions.</span><sup class="reference" data-dcnode-id="3797" id="cite_ref-tws22dec216bb_115-0"><a data-dcnode-id="3798" href="#cite_note-tws22dec216bb-115"><span data-dcnode-id="3799" instrument_node="">[114]</span></a></sup><span data-dcnode-id="3796" instrument_node="">
</span></p><span data-dcnode-id="3794" instrument_node="">
