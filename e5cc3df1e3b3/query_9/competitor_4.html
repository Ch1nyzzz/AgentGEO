29.svg/440px-Union_of_Soviet_Socialist_Republics_%28orthographic_projection%29.svg.png 2x" width="220"></a><div class="infobox-caption" data-dcnode-id="4755"><span data-dcnode-id="4758" instrument_node="">Former </span><a data-dcnode-id="4756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="4757" instrument_node="">Soviet Union</span></a></div></td></tr><tr data-dcnode-id="4747"><th class="infobox-label" data-dcnode-id="4750" scope="row"><a data-dcnode-id="4751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LGBT_rights_by_country_or_territory" title="LGBT rights by country or territory"><span data-dcnode-id="4752" instrument_node="">Status</span></a></th><td class="infobox-data" data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">Legal (illegal for males in Turkmenistan and Uzbekistan)</span></td></tr><tr data-dcnode-id="4741"><th class="infobox-label" data-dcnode-id="4744" scope="row"><a data-dcnode-id="4745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gender_identity" title="Gender identity"><span data-dcnode-id="4746" instrument_node="">Gender identity</span></a></th><td class="infobox-data" data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">Legal in Estonia</span></td></tr><tr data-dcnode-id="4735"><th class="infobox-label" data-dcnode-id="4738" scope="row"><a class="mw-redirect" data-dcnode-id="4739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_orientation_and_gender_identity_in_military_service" title="Sexual orientation and gender identity in military service"><span data-dcnode-id="4740" instrument_node="">Military</span></a></th><td class="infobox-data" data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">Legal in Armenia (varies), Belarus (varies), Estonia, Georgia, Latvia, Lithuania, Moldova, Russia and Ukraine (varies)</span></td></tr><tr data-dcnode-id="4729"><th class="infobox-label" data-dcnode-id="4732" scope="row"><a data-dcnode-id="4733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-discrimination_law" title="Anti-discrimination law"><span data-dcnode-id="4734" instrument_node="">Discrimination protections</span></a></th><td class="infobox-data" data-dcnode-id="4730"><span data-dcnode-id="4731" instrument_node="">Legal in Estonia, Georgia, Latvia, Lithuania, Moldova and Ukraine</span></td></tr><tr data-dcnode-id="4726"><th class="infobox-header" colspan="2" data-dcnode-id="4727"><span data-dcnode-id="4728" instrument_node="">Family rights</span></th></tr><tr data-dcnode-id="4720"><th class="infobox-label" data-dcnode-id="4723" scope="row"><a data-dcnode-id="4724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3ASame-sex_unions" title="Template:Same-sex unions"><span data-dcnode-id="4725" instrument_node="">Recognition of relationships</span></a></th><td class="infobox-data" data-dcnode-id="4721"><span data-dcnode-id="4722" instrument_node="">No (excluding Estonia)</span></td></tr></tbody></table><span data-dcnode-id="4717" instrument_node="">
</span><p data-dcnode-id="4688"><b data-dcnode-id="4715"><span data-dcnode-id="4716" instrument_node="">Lesbian, gay, bisexual, and transgender (LGBT)</span></b><span data-dcnode-id="4714" instrument_node=""> persons in the  </span><b data-dcnode-id="4708"><a data-dcnode-id="4712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-Soviet_states" title="Post-Soviet states"><span data-dcnode-id="4713" instrument_node="">former</span></a><span data-dcnode-id="4711" instrument_node=""> </span><a data-dcnode-id="4709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="4710" instrument_node="">Soviet Union</span></a></b><span data-dcnode-id="4707" instrument_node="">  face legal challenges not experienced by non-</span><a data-dcnode-id="4705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LGBT" title="LGBT"><span data-dcnode-id="4706" instrument_node="">LGBT</span></a><span data-dcnode-id="4704" instrument_node=""> residents. Since 1 January 2016, in </span><a data-dcnode-id="4702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estonia" title="Estonia"><span data-dcnode-id="4703" instrument_node="">Estonia</span></a><span data-dcnode-id="4701" instrument_node=""> (and there only), same-sex couples have recognition called a </span><i data-dcnode-id="4699"><span data-dcnode-id="4700" instrument_node="">cohabitation agreement</span></i><span data-dcnode-id="4698" instrument_node=""> that gives the same legal protections available to opposite-sex couples (with the exemption of  marriage and Joint adoption). On 11 January 2019, the </span><a data-dcnode-id="4696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_Lithuania" title="Supreme Court of Lithuania"><span data-dcnode-id="4697" instrument_node="">Supreme Court</span></a><span data-dcnode-id="4695" instrument_node=""> of </span><a data-dcnode-id="4693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuania" title="Lithuania"><span data-dcnode-id="4694" instrument_node="">Lithuania</span></a><span data-dcnode-id="4692" instrument_node=""> ruled that same-sex spouses must be granted residence permits, while a </span><i data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node="">cohabitation agreement</span></i><span data-dcnode-id="4689" instrument_node=""> is pending.
</span></p><span data-dcnode-id="4687" instrument_node="">

</span><h2 data-dcnode-id="4605"><span class="mw-headline" data-dcnode-id="4613" id="History"><span data-dcnode-id="4614" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="4606"><span class="mw-editsection-bracket" data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">[</span></span><a data-dcnode-id="4609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLGBT_rights_in_the_Post-Soviet_states%26action%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="4610" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4604" instrument_node="">
</span><h3 data-dcnode-id="4593"><span data-dcnode-id="4603" id="After_the_October_Revolution:_1917.E2.80.931933"></span><span class="mw-headline" data-dcnode-id="4601" id="After_the_October_Revolution:_1917–1933"><span data-dcnode-id="4602" instrument_node="">After the October Revolution: 1917–1933</span></span><span class="mw-editsection" data-dcnode-id="4594"><span class="mw-editsection-bracket" data-dcnode-id="4599"><span data-dcnode-id="4600" instrument_node="">[</span></span><a data-dcnode-id="4597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLGBT_rights_in_the_Post-Soviet_states%26action%3Dedit%26section%3D2" title="Edit section: After the October Revolution: 1917–1933"><span data-dcnode-id="4598" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4595"><span data-dcnode-id="4596" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4592" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4580"><div class="thumbinner" data-dcnode-id="4581" style="width:152px;"><a class="image" data-dcnode-id="4590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALenin_1921.jpg"><img alt="" class="thumbimage" data-dcnode-id="4591" data-file-height="521" data-file-width="417" decoding="async" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Lenin_1921.jpg/150px-Lenin_1921.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Lenin_1921.jpg/225px-Lenin_1921.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Lenin_1921.jpg/300px-Lenin_1921.jpg 2x" width="150"></a><span data-dcnode-id="4589" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4582"><div class="magnify" data-dcnode-id="4587"><a class="internal" data-dcnode-id="4588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALenin_1921.jpg" title="Enlarge"></a></div><span data-dcnode-id="4586" instrument_node="">Premier of the Soviet Union </span><a data-dcnode-id="4584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Lenin" title="Vladimir Lenin"><span data-dcnode-id="4585" instrument_node="">Lenin</span></a><span data-dcnode-id="4583" instrument_node="">.</span></div></div></div><span data-dcnode-id="4579" instrument_node="">
</span><p data-dcnode-id="4567"><span data-dcnode-id="4578" instrument_node="">The Soviet Government of the </span><a class="mw-redirect" data-dcnode-id="4576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Soviet_Republic" title="Russian Soviet Republic"><span data-dcnode-id="4577" instrument_node="">Russian Soviet Republic</span></a><span data-dcnode-id="4575" instrument_node=""> decriminalised </span><a data-dcnode-id="4573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homosexuality" title="Homosexuality"><span data-dcnode-id="4574" instrument_node="">homosexuality</span></a><span data-dcnode-id="4572" instrument_node=""> in December 1917, following the October Revolution and the discarding of the Legal Code of Tzarist Russia.</span><sup class="reference" data-dcnode-id="4569" id="cite_ref-ReferenceA_1-0"><a data-dcnode-id="4570" href="#cite_note-ReferenceA-1"><span data-dcnode-id="4571" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4568" instrument_node="">
</span></p><p data-dcnode-id="4561"><span data-dcnode-id="4566" instrument_node="">Through the abolishment of the Tsarist legal code in 1917, the Russian Communist Party effectively legalised homosexuality. The initial Russian Soviet criminal code contained no criminalisation of homosexuality as the subject was omitted.</span><sup class="reference" data-dcnode-id="4563" id="cite_ref-2"><a data-dcnode-id="4564" href="#cite_note-2"><span data-dcnode-id="4565" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4562" instrument_node="">
</span></p><p data-dcnode-id="4555"><span data-dcnode-id="4560" instrument_node="">Yet, the abrogation of the Tsarist law, was part of an overall rejection of the laws of the Russian empire, and the Soviets never undertook any campaign to reduce prejudice against homosexuality.</span><sup class="reference" data-dcnode-id="4557" id="cite_ref-ReferenceD_3-0"><a data-dcnode-id="4558" href="#cite_note-ReferenceD-3"><span data-dcnode-id="4559" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4556" instrument_node="">
</span></p><p data-dcnode-id="4524"><span data-dcnode-id="4554" instrument_node="">The legalisation of private, adult and consensual homosexual relations only applied to the </span><a class="mw-redirect" data-dcnode-id="4552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_SSR" title="Russian SSR"><span data-dcnode-id="4553" instrument_node="">Russian SSR</span></a><span data-dcnode-id="4551" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="4549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_SSR" title="Ukrainian SSR"><span data-dcnode-id="4550" instrument_node="">Ukrainian SSR</span></a><span data-dcnode-id="4548" instrument_node="">. Homosexuality or sodomy remained a crime in </span><a class="mw-redirect" data-dcnode-id="4546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Azerbaijan_SSR" title="Azerbaijan SSR"><span data-dcnode-id="4547" instrument_node="">Azerbaijan</span></a><span data-dcnode-id="4545" instrument_node=""> (officially criminalised in 1923), as well as in the </span><a data-dcnode-id="4543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transcaucasian_Socialist_Federative_Soviet_Republic" title="Transcaucasian Socialist Federative Soviet Republic"><span data-dcnode-id="4544" instrument_node="">Transcaucasian</span></a><span data-dcnode-id="4542" instrument_node=""> and </span><a data-dcnode-id="4540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Asia" title="Central Asia"><span data-dcnode-id="4541" instrument_node="">Central Asian</span></a><span data-dcnode-id="4539" instrument_node=""> Soviet Republics throughout the 1920s.</span><sup class="reference" data-dcnode-id="4536" id="cite_ref-4"><a data-dcnode-id="4537" href="#cite_note-4"><span data-dcnode-id="4538" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4535" instrument_node=""> Similar criminal laws were enacted in </span><a class="mw-redirect" data-dcnode-id="4533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uzbek_SSR" title="Uzbek SSR"><span data-dcnode-id="4534" instrument_node="">Uzbekistan</span></a><span data-dcnode-id="4532" instrument_node=""> in 1926 and in </span><a class="mw-redirect" data-dcnode-id="4530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkmen_SSR" title="Turkmen SSR"><span data-dcnode-id="4531" instrument_node="">Turkmenistan</span></a><span data-dcnode-id="4529" instrument_node=""> the following year.</span><sup class="reference" data-dcnode-id="4526" id="cite_ref-Dan_Healey_GLQ_8_p._349_5-0"><a data-dcnode-id="4527" href="#cite_note-Dan_Healey_GLQ_8_p._349-5"><span data-dcnode-id="4528" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4525" instrument_node="">
</span></p><p data-dcnode-id="4490"><span data-dcnode-id="4523" instrument_node="">Despite decriminalising homosexuality in 1917 wider Soviet social policy on the matter of wider homosexual rights and the treatment of homosexual people in the 1920s was often mixed. Official Soviet policy, in both the </span><a class="mw-redirect" data-dcnode-id="4521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/RSFSR" title="RSFSR"><span data-dcnode-id="4522" instrument_node="">RSFSR</span></a><span data-dcnode-id="4520" instrument_node=""> and the wider </span><a class="mw-redirect" data-dcnode-id="4518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USSR" title="USSR"><span data-dcnode-id="4519" instrument_node="">USSR</span></a><span data-dcnode-id="4517" instrument_node="">, in the 1920s, on homosexuality, fluctuated between toleration and support, attempts at legal equality and social rights for homosexual people, to open examples of state hostility against homosexuals and state attempts to classify homosexuality as 'a mental disorder to be cured'.</span><sup class="reference" data-dcnode-id="4514" id="cite_ref-Dan_Healey_GLQ_8_p._349_5-1"><a data-dcnode-id="4515" href="#cite_note-Dan_Healey_GLQ_8_p._349-5"><span data-dcnode-id="4516" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="4511" id="cite_ref-6"><a data-dcnode-id="4512" href="#cite_note-6"><span data-dcnode-id="4513" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4510" instrument_node="">  In the Communist Party itself during this period of the 1920s such divergences of opinion and policy on Soviet  treatment of homosexuality was also common - ranging from positive, to negative, to ambivalent, over views about homosexuals and homosexual rights.</span><sup class="reference" data-dcnode-id="4507" id="cite_ref-ReferenceA_1-1"><a data-dcnode-id="4508" href="#cite_note-ReferenceA-1"><span data-dcnode-id="4509" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4506" instrument_node=""> Some sections and factions of the Bolshevik Government attempted to improve rights and social conditions for homosexuals based on further legal reforms in 1922 and 1923, while others opposed such moves. Commissar of Health </span><a data-dcnode-id="4504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolai_Semashko_%28medicine%29" title="Nikolai Semashko (medicine)"><span data-dcnode-id="4505" instrument_node="">Nikolai Semashko</span></a><span data-dcnode-id="4503" instrument_node="">, in the early 1920s, for example, was sympathetic </span><sup class="reference" data-dcnode-id="4500" id="cite_ref-7"><a data-dcnode-id="4501" href="#cite_note-7"><span data-dcnode-id="4502" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4499" instrument_node=""> to homosexual emancipation 'as part of the [sexual] revolution' and attempted such reforms for homosexual rights in the area of civil and medical areas.</span><sup class="reference" data-dcnode-id="4496" id="cite_ref-ReferenceB_8-0"><a data-dcnode-id="4497" href="#cite_note-ReferenceB-8"><span data-dcnode-id="4498" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4495" instrument_node=""> According to Wayne R. Dynes, some sections of the Bolsheviks of the 1920s actively considered homosexuality a "[social] illness to be cured" or an example of "bourgeois degeneracy", while other Bolsheviks believed it should be legally/socially tolerated and legally/socially respected in the new socialist society.</span><sup class="reference" data-dcnode-id="4492" id="cite_ref-9"><a data-dcnode-id="4493" href="#cite_note-9"><span data-dcnode-id="4494" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4491" instrument_node="">
</span></p><p data-dcnode-id="4485"><span data-dcnode-id="4489" instrument_node="">The Bolsheviks also rescinded Tzarist legal bans on homosexual civil and political rights - especially in the area of state employment. In 1918 </span><a data-dcnode-id="4487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgy_Chicherin" title="Georgy Chicherin"><span data-dcnode-id="4488" instrument_node="">Georgy Chicherin</span></a><span data-dcnode-id="4486" instrument_node="">, an openly homosexual man, was appointed as People's Commissar for Foreign Affairs of the RSFSR. In 1923 Chicherin was also appointed People's Commissar for Foreign Affairs of the USSR, a position he held until 1930.
</span></p><p data-dcnode-id="4444"><span data-dcnode-id="4484" instrument_node="">In the early 1920s the Soviet government and scientific community took a great deal of interest in sexual research, sexual emancipation and homosexual emancipation. In the 1920s the Soviet Union sent delegates from the Commissariat of Health, led by Commissar of Health Semashko, in January 1923,</span><sup class="reference" data-dcnode-id="4481" id="cite_ref-ReferenceC_10-0"><a data-dcnode-id="4482" href="#cite_note-ReferenceC-10"><span data-dcnode-id="4483" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4480" instrument_node=""> to the German </span><a class="mw-redirect" data-dcnode-id="4478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Institute_for_Sexual_Research" title="Institute for Sexual Research"><span data-dcnode-id="4479" instrument_node="">Institute for Sexual Research</span></a><span data-dcnode-id="4477" instrument_node="">, as well as to some international conferences on human sexuality between 1921 and 1930, where they expressed support for the legalisation of adult, private, and consensual homosexual relations, and the improvement of homosexual rights in all nations.</span><sup class="reference" data-dcnode-id="4474" id="cite_ref-ReferenceA_1-2"><a data-dcnode-id="4475" href="#cite_note-ReferenceA-1"><span data-dcnode-id="4476" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="4471" id="cite_ref-ReferenceC_10-1"><a data-dcnode-id="4472" href="#cite_note-ReferenceC-10"><span data-dcnode-id="4473" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4470" instrument_node=""> In both 1923 and 1925 Dr Grigorii Batkis, director of the Institute for Social Hygiene in Moscow, published a report, </span><i data-dcnode-id="4467"><a class="mw-redirect" data-dcnode-id="4468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Sexual_Revolution_in_Russia_%281923%29" title="The Sexual Revolution in Russia (1923)"><span data-dcnode-id="4469" instrument_node="">The Sexual Revolution in Russia</span></a></i><span data-dcnode-id="4466" instrument_node="">, which stated that homosexuality was 'perfectly natural' and should be legally and socially respected.</span><sup class="reference" data-dcnode-id="4463" id="cite_ref-11"><a data-dcnode-id="4464" href="#cite_note-11"><span data-dcnode-id="4465" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="4460" id="cite_ref-ReferenceC_10-2"><a data-dcnode-id="4461" href="#cite_note-ReferenceC-10"><span data-dcnode-id="4462" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4459" instrument_node=""> In the Soviet Union itself the 1920s saw developments in serious Soviet research on sexuality in general, sometimes in support of the progressive idea of homosexuality as a natural part of human sexuality - such as the work of Dr Batkis prior to 1928.</span><sup class="reference" data-dcnode-id="4456" id="cite_ref-12"><a data-dcnode-id="4457" href="#cite_note-12"><span data-dcnode-id="4458" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="4453" id="cite_ref-ReferenceB_8-1"><a data-dcnode-id="4454" href="#cite_note-ReferenceB-8"><span data-dcnode-id="4455" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4452" instrument_node=""> Such delegations and research were sent, and authorised, and supported by the People's Commissariat for Health under Commissar Semashko.</span><sup class="reference" data-dcnode-id="4449" id="cite_ref-ReferenceA_1-3"><a data-dcnode-id="4450" href="#cite_note-ReferenceA-1"><span data-dcnode-id="4451" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="4446" id="cite_ref-ReferenceB_8-2"><a data-dcnode-id="4447" href="#cite_note-ReferenceB-8"><span data-dcnode-id="4448" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4445" instrument_node="">
</span></p><p data-dcnode-id="4412"><span data-dcnode-id="4443" instrument_node="">However, in the late 1920s and early 1930s, Soviet policy and attitudes on homosexuality and homosexual rights changed, alongside wider social backlashes against homosexual rights in general in the USSR. Along with increased repression of political dissidents and non-Russian nationalities</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4436" style="white-space:nowrap;"><span data-dcnode-id="4442" instrument_node="">[</span><i data-dcnode-id="4438"><a data-dcnode-id="4439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4440" title="This claim needs references to reliable sources. (December 2015)"><span data-dcnode-id="4441" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4437" instrument_node="">]</span></sup><span data-dcnode-id="4435" instrument_node=""> under Stalin, LGBT themes and issues faced increasing official government censorship, and a uniformly harsher policy across the entire Soviet Union. Homosexuality was officially labelled a disease and a mental disorder in the late 1920s (specifically over a period from 1927-1930).</span><sup class="reference" data-dcnode-id="4432" id="cite_ref-13"><a data-dcnode-id="4433" href="#cite_note-13"><span data-dcnode-id="4434" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4431" instrument_node=""> In this climate Commissar Semashko reduced his support for homosexual rights and Dr Batkis and other sexual researchers repudiated (in 1928) their own earlier scientific reports of homosexuality as a natural human sexuality.</span><sup class="reference" data-dcnode-id="4428" id="cite_ref-14"><a data-dcnode-id="4429" href="#cite_note-14"><span data-dcnode-id="4430" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4427" instrument_node=""> This followed earlier Soviet tendencies in sections of the medical and health communities, even in the early 1920s, to classify homosexuality, if not as a crime, then as an example of mental or physical illness. Earlier examples of this type of hardening Soviet attitude towards homosexuality include the 1923 report from the People's Commissariat for Health entitled </span><i data-dcnode-id="4425"><span data-dcnode-id="4426" instrument_node="">The Sexual Life of Contemporary Youth</span></i><span data-dcnode-id="4424" instrument_node="">, authored by </span><a class="new" data-dcnode-id="4422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIzrail_Gel%2527man%26action%3Dedit%26redlink%3D1" title="Izrail Gel'man (page does not exist)"><span data-dcnode-id="4423" instrument_node="">Izrail Gel'man</span></a><span data-dcnode-id="4421" instrument_node="">, which stated that "Science has now established, with precision that excludes all doubt, that homosexuality is not ill will or crime but sickness. The world of a female or male homosexual is perverted, it is alien to the normal sexual attraction that exists in a normal person."</span><sup class="reference" data-dcnode-id="4418" id="cite_ref-dubtwo_15-0"><a data-dcnode-id="4419" href="#cite_note-dubtwo-15"><span data-dcnode-id="4420" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4417" instrument_node=""> The official stance from the late 1920s could be summarised in an article of the </span><i data-dcnode-id="4414"><a data-dcnode-id="4415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Soviet_Encyclopedia" title="Great Soviet Encyclopedia"><span data-dcnode-id="4416" instrument_node="">Great Soviet Encyclopedia</span></a></i><span data-dcnode-id="4413" instrument_node=""> of 1930 written by medical expert Sereisky (based on a report written in the 1920s):
</span></p><span data-dcnode-id="4411" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="4399"><p data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">Soviet legislation does not recognise so-called crimes against morality. Our laws proceed from the principle of protection of society and therefore countenance punishment only in those instances when juveniles and minors are the objects of homosexual interest ... while recognizing the incorrectness of homosexual development ... our society combines prophylactic and other therapeutic measures with all the necessary conditions for making the conflicts that afflict homosexuals as painless as possible and for resolving their typical estrangement from society within the collective</span></p><div class="templatequotecite" data-dcnode-id="4400"><span data-dcnode-id="4406" instrument_node="">— </span><cite data-dcnode-id="4401"><span data-dcnode-id="4405" instrument_node="">Sereisky, </span><i data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">Great Soviet Encyclopedia</span></i><span data-dcnode-id="4402" instrument_node="">, 1930, p. 593</span></cite></div></blockquote><span data-dcnode-id="4398" instrument_node="">
</span><h3 data-dcnode-id="4387"><span data-dcnode-id="4397" id="Stalin:_1933.E2.80.931953"></span><span class="mw-headline" data-dcnode-id="4395" id="Stalin:_1933–1953"><span data-dcnode-id="4396" instrument_node="">Stalin: 1933–1953</span></span><span class="mw-editsection" data-dcnode-id="4388"><span class="mw-editsection-bracket" data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">[</span></span><a data-dcnode-id="4391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLGBT_rights_in_the_Post-Soviet_states%26action%3Dedit%26section%3D3" title="Edit section: Stalin: 1933–1953"><span data-dcnode-id="4392" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4386" instrument_node="">
</span><p data-dcnode-id="4372"><span data-dcnode-id="4385" instrument_node="">In 1933 the Soviet government, under Joseph Stalin, recriminalised homosexuality. On March 7, 1934, Article 121 was added to the criminal code, for the entire Soviet Union, that expressly prohibited only male homosexuality, with up to five years of hard labor in prison. There were no criminal statutes regarding lesbianism. During the Soviet regime, Western observers believed that between 800 and 1,000 men were imprisoned each year under Article 121.</span><sup class="reference" data-dcnode-id="4382" id="cite_ref-RUS98001.zar_16-0"><a data-dcnode-id="4383" href="#cite_note-RUS98001.zar-16"><span data-dcnode-id="4384" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4381" instrument_node="">
The precise reason for the new law is still in some dispute.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4374" style="white-space:nowrap;"><span data-dcnode-id="4380" instrument_node="">[</span><i data-dcnode-id="4376"><a data-dcnode-id="4377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4378" title="This claim needs references to reliable sources. (October 2013)"><span data-dcnode-id="4379" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4375" instrument_node="">]</span></sup><span data-dcnode-id="4373" instrument_node="">
</span></p><p data-dcnode-id="4359"><span data-dcnode-id="4371" instrument_node="">Some historians have noted that it was during this time that Soviet propaganda began to depict homosexuality as a sign of fascism,</span><sup class="reference" data-dcnode-id="4368" id="cite_ref-ReferenceD_3-1"><a data-dcnode-id="4369" href="#cite_note-ReferenceD-3"><span data-dcnode-id="4370" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4367" instrument_node=""> and that Article 121 may have a simple political tool to use against dissidents, irrespective of their true </span><a data-dcnode-id="4365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_orientation" title="Sexual orientation"><span data-dcnode-id="4366" instrument_node="">sexual orientation</span></a><span data-dcnode-id="4364" instrument_node="">, and to solidify Russian opposition to Nazi Germany, who had broken its treaty with Russia.</span><sup class="reference" data-dcnode-id="4361" id="cite_ref-Dub89-362_17-0"><a data-dcnode-id="4362" href="#cite_note-Dub89-362-17"><span data-dcnode-id="4363" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4360" instrument_node="">
</span></p><p data-dcnode-id="4342"><span data-dcnode-id="4358" instrument_node="">More recently, a third possible reason for the anti-gay law has emerged from declassified Soviet documents and transcripts.  Beyond expressed fears of a vast "counterrevolutionary" or fascist homosexual conspiracy, there were several high-profile arrests of Russian men accused of being </span><a class="mw-redirect" data-dcnode-id="4356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pederasts" title="Pederasts"><span data-dcnode-id="4357" instrument_node="">pederasts</span></a><span data-dcnode-id="4355" instrument_node="">.</span><sup class="reference" data-dcnode-id="4352" id="cite_ref-workers_18-0"><a data-dcnode-id="4353" href="#cite_note-workers-18"><span data-dcnode-id="4354" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4351" instrument_node=""> In 1933, 130 men "were accused of being 'pederasts' – adult males who have sex with boys. Since no records of men having sex with boys at that time are available, it is possible this term was used broadly and crudely to label homosexuality."</span><sup class="reference" data-dcnode-id="4348" id="cite_ref-workers_18-1"><a data-dcnode-id="4349" href="#cite_note-workers-18"><span data-dcnode-id="4350" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4347" instrument_node=""> Whatever the precise reason, homosexuality remained a serious criminal offense until it was repealed in 1993.</span><sup class="reference" data-dcnode-id="4344" id="cite_ref-workers_18-2"><a data-dcnode-id="4345" href="#cite_note-workers-18"><span data-dcnode-id="4346" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4343" instrument_node="">
</span></p><p data-dcnode-id="4333"><span data-dcnode-id="4341" instrument_node="">The Soviet government itself said very little publicly about the change in the law, and few people seemed to be aware that it existed.  In 1934, the British Communist </span><a class="new" data-dcnode-id="4339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHarry_Whyte%26action%3Dedit%26redlink%3D1" title="Harry Whyte (page does not exist)"><span data-dcnode-id="4340" instrument_node="">Harry Whyte</span></a><span data-dcnode-id="4338" instrument_node=""> wrote a long letter to Stalin condemning the law, and its prejudicial motivations.  He laid out a Marxist position against the oppression of homosexuals, as a social minority, and compared homophobia to racism, xenophobia and sexism.</span><sup class="reference" data-dcnode-id="4335" id="cite_ref-19"><a data-dcnode-id="4336" href="#cite_note-19"><span data-dcnode-id="4337" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4334" instrument_node=""> The letter was not formally replied to.
</span></p><p data-dcnode-id="4324"><span data-dcnode-id="4332" instrument_node="">A few years later, 1936, Justice Commissar </span><a data-dcnode-id="4330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolai_Krylenko" title="Nikolai Krylenko"><span data-dcnode-id="4331" instrument_node="">Nikolai Krylenko</span></a><span data-dcnode-id="4329" instrument_node=""> publicly stated that the anti-gay criminal law was correctly aimed at the decadent and effete old ruling classes, thus further linking homosexuality to a right-wing conspiracy, i.e. tsarist aristocracy and German fascists.</span><sup class="reference" data-dcnode-id="4326" id="cite_ref-workers_18-3"><a data-dcnode-id="4327" href="#cite_note-workers-18"><span data-dcnode-id="4328" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4325" instrument_node="">
</span></p><span data-dcnode-id="4323" instrument_node="">
</span><h3 data-dcnode-id="4312"><span data-dcnode-id="4322" id="De-Stalinization_and_onwards:_1953.E2.80.931991"></span><span class="mw-headline" data-dcnode-id="4320" id="De-Stalinization_and_onwards:_1953–1991"><span data-dcnode-id="4321" instrument_node="">De-Stalinization and onwards: 1953–1991</span></span><span class="mw-editsection" data-dcnode-id="4313"><span class="mw-editsection-bracket" data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">[</span></span><a data-dcnode-id="4316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLGBT_rights_in_the_Post-Soviet_states%26action%3Dedit%26section%3D4" title="Edit section: De-Stalinization and onwards: 1953–1991"><span data-dcnode-id="4317" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4311" instrument_node="">
</span><p data-dcnode-id="4306"><span data-dcnode-id="4310" instrument_node="">When Stalin came to power, homosexuality became a topic unfit for public depiction, defense or discussion. Homosexual or bisexual Soviets who wanted a position within the Communist Party were expected to marry a person of the opposite sex, regardless of their actual sexual orientation. A notable example was the Russian film director </span><a data-dcnode-id="4308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sergei_Eisenstein" title="Sergei Eisenstein"><span data-dcnode-id="4309" instrument_node="">Sergei Eisenstein</span></a><span data-dcnode-id="4307" instrument_node="">, who despite his homosexuality managed to survive by leading a double life, having affairs with men while married to a woman, producing films that were politically pleasing to Stalin.
</span></p><p data-dcnode-id="4294"><span data-dcnode-id="4305" instrument_node="">After Stalin died in 1953, he was replaced by </span><a data-dcnode-id="4303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikita_Khrushchev" title="Nikita Khrushchev"><span data-dcnode-id="4304" instrument_node="">Nikita Khrushchev</span></a><span data-dcnode-id="4302" instrument_node="">, who proceeded to liberalize the Stalin era laws regarding marriage, divorce, and abortion, but the anti-gay criminal law remained.  The Khrushchev government believed that absent of a criminal law against homosexuality, the sex between men that occurred in the prison environment would spread into the general population as they released many Stalin-era prisoners.  Whereas the Stalin government conflated </span><a class="mw-redirect" data-dcnode-id="4300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homosexuality_and_pedophilia" title="Homosexuality and pedophilia"><span data-dcnode-id="4301" instrument_node="">homosexuality with pedophilia</span></a><span data-dcnode-id="4299" instrument_node="">, the Khrushchev government conflated homosexuality with the situational, sometimes forced, sex acts between male prisoners.</span><sup class="reference" data-dcnode-id="4296" id="cite_ref-20"><a data-dcnode-id="4297" href="#cite_note-20"><span data-dcnode-id="4298" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4295" instrument_node="">
</span></p><p data-dcnode-id="4288"><span data-dcnode-id="4293" instrument_node="">In 1958, the Interior Ministry sent a secret memo to law enforcement ordering them to step up enforcement of the anti-gay criminal law.  Yet, during the late 1950s - early 1960s, Aline Mosby, a foreign reporter in Russia at the time, attributed to the more liberal attitude of the Khrushchev government to the fact that she did see some gay couples in public and that it was not uncommon to see men waiting outside of certain theaters looking for dates with male performers.</span><sup class="reference" data-dcnode-id="4290" id="cite_ref-21"><a data-dcnode-id="4291" href="#cite_note-21"><span data-dcnode-id="4292" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4289" instrument_node="">
</span></p><p data-dcnode-id="4282"><span data-dcnode-id="4287" instrument_node="">A 1964 Soviet sex manual instructed: "With all the tricks at their disposal, homosexuals seek out and win the confidence of youngsters. Then they proceed to act. Do not under any circumstances allow them to touch you. Such people should be immediately reported to the administrative organs so that they can be removed from society."</span><sup class="reference" data-dcnode-id="4284" id="cite_ref-Soviet-EraShadows_22-0"><a data-dcnode-id="4285" href="#cite_note-Soviet-EraShadows-22"><span data-dcnode-id="4286" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4283" instrument_node="">
</span></p><p data-dcnode-id="4269"><span data-dcnode-id="4281" instrument_node="">Despite these rare examples, thousands of people were imprisoned for homosexuality and government censorship of homosexuality and gay rights did not begin to slowly relax until the early 1970s, allowing for brief statements.  Kozlovsky was permitted to include a brief interior monologue about homosexuality in </span><i data-dcnode-id="4278"><a class="mw-redirect" data-dcnode-id="4279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moscow_to_the_End_of_the_Line" title="Moscow to the End of the Line"><span data-dcnode-id="4280" instrument_node="">Moscow to the End of the Line</span></a></i><span data-dcnode-id="4277" instrument_node=""> (1973).  Perhaps the first public endorsement of gay rights since Stalin was a brief statement, critical of Article 121 and calling for its repeal,  made in the </span><i data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">Textbook of Soviet Criminal Law</span></i><span data-dcnode-id="4274" instrument_node=""> (1973).</span><sup class="reference" data-dcnode-id="4271" id="cite_ref-Dub89-362_17-1"><a data-dcnode-id="4272" href="#cite_note-Dub89-362-17"><span data-dcnode-id="4273" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4270" instrument_node="">
</span></p><p data-dcnode-id="4261"><span data-dcnode-id="4268" instrument_node="">These references were characterized as being brief statements in a novel or textbook and were made by heterosexuals. </span><a class="new" data-dcnode-id="4266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVicktor_Sosnora%26action%3Dedit%26redlink%3D1" title="Vicktor Sosnora (page does not exist)"><span data-dcnode-id="4267" instrument_node="">Vicktor Sosnora</span></a><span data-dcnode-id="4265" instrument_node=""> was allowed to write about witnessing an elderly gay actor being brutally murdered in a Leningrad bar in </span><i data-dcnode-id="4263"><span data-dcnode-id="4264" instrument_node="">The Flying Dutchman</span></i><span data-dcnode-id="4262" instrument_node=""> (1979), but the book was only allowed to be published in East Germany.  When the author was gay and, in particular, if they were seen as supporting gay rights, the censors tended to be much harsher.
</span></p><p data-dcnode-id="4249"><span data-dcnode-id="4260" instrument_node="">Russian gay author </span><a data-dcnode-id="4258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yevgeny_Kharitonov_%28poet%29" title="Yevgeny Kharitonov (poet)"><span data-dcnode-id="4259" instrument_node="">Yevgeny Kharitonov</span></a><span data-dcnode-id="4257" instrument_node=""> illegally circulated some gay fiction before he died of heart failure in 1981.  Author </span><a class="new" data-dcnode-id="4255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGennady_Trifonov%26action%3Dedit%26redlink%3D1" title="Gennady Trifonov (page does not exist)"><span data-dcnode-id="4256" instrument_node="">Gennady Trifonov</span></a><span data-dcnode-id="4254" instrument_node=""> served four years of hard labor for circulating his gay poems and, upon his release, was allowed to write and publish only if he avoided depicting or making reference to homosexuality.</span><sup class="reference" data-dcnode-id="4251" id="cite_ref-23"><a data-dcnode-id="4252" href="#cite_note-23"><span data-dcnode-id="4253" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4250" instrument_node="">
</span></p><p data-dcnode-id="4240"><span data-dcnode-id="4248" instrument_node="">In 1984, a group of Russian gay men met and attempted to organize an official gay rights organization, only to be quickly shut down by the </span><a data-dcnode-id="4246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/KGB" title="KGB"><span data-dcnode-id="4247" instrument_node="">KGB</span></a><span data-dcnode-id="4245" instrument_node="">.  It was not until later in the </span><i data-dcnode-id="4242"><a data-dcnode-id="4243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glasnost" title="Glasnost"><span data-dcnode-id="4244" instrument_node="">Glasnost</span></a></i><span data-dcnode-id="4241" instrument_node=""> period that public discussion was permitted about re-legalizing private, consensual adult homosexual relations.
</span></p><p data-dcnode-id="4227"><span data-dcnode-id="4239" instrument_node="">A poll conducted in 1989 reported that homosexuals were the most hated group in Russian society and that 30 percent of those polled felt that homosexuals should be liquidated.</span><sup class="reference" data-dcnode-id="4236" id="cite_ref-RUS98001.zar_16-1"><a data-dcnode-id="4237" href="#cite_note-RUS98001.zar-16"><span data-dcnode-id="4238" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4235" instrument_node=""> In a 1991 public opinion poll conducted in </span><a class="mw-redirect" data-dcnode-id="4233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chelyabinsk%2C_Russia" title="Chelyabinsk, Russia"><span data-dcnode-id="4234" instrument_node="">Chelyabinsk</span></a><span data-dcnode-id="4232" instrument_node=""> 30 percent of the respondents aged 16 to 30 years old felt that homosexuals should be "isolated from society," 5 percent felt they should be "liquidated," 60 percent had a "negative" attitude toward gay people and 5 percent labeled their sexual orientation "unfortunate."</span><sup class="reference" data-dcnode-id="4229" id="cite_ref-Soviet-EraShadows_22-1"><a data-dcnode-id="4230" href="#cite_note-Soviet-EraShadows-22"><span data-dcnode-id="4231" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4228" instrument_node="">
</span></p><p data-dcnode-id="4215"><span data-dcnode-id="4226" instrument_node="">In 1989–1990 a Moscow gay rights organization led by </span><a class="new" data-dcnode-id="4224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYevgeniya_Debryanskaya%26action%3Dedit%26redlink%3D1" title="Yevgeniya Debryanskaya (page does not exist)"><span data-dcnode-id="4225" instrument_node="">Yevgeniya Debryanskaya</span></a><span data-dcnode-id="4223" instrument_node=""> was permitted to exist, with </span><a data-dcnode-id="4221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Kalinin" title="Roman Kalinin"><span data-dcnode-id="4222" instrument_node="">Roman Kalinin</span></a><span data-dcnode-id="4220" instrument_node=""> given permission to publish a gay newspaper, "Tema".</span><sup class="reference" data-dcnode-id="4217" id="cite_ref-24"><a data-dcnode-id="4218" href="#cite_note-24"><span data-dcnode-id="4219" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4216" instrument_node="">
</span></p><p data-dcnode-id="4209"><span data-dcnode-id="4214" instrument_node="">The precise number of persons prosecuted under Article 121 is unknown, with the first official information was released only in 1988, but it is believed to be about 1000 prosecuted a year. According to official data, the number of men convicted under Article 121 had been steadily decreasing during the Glasnost period. In 1987, 831 men were sentenced under Article 121; in 1989, 539; in 1990, 497; and in 1991, 462.</span><sup class="reference" data-dcnode-id="4211" id="cite_ref-25"><a data-dcnode-id="4212" href="#cite_note-25"><span data-dcnode-id="4213" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4210" instrument_node="">
</span></p><span data-dcnode-id="4208" instrument_node="">
