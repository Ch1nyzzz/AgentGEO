                  ."><span data-dcnode-id="3790" instrument_node="">1996</span></a><span data-dcnode-id="3788" instrument_node="">; Secretariat of the Pacific Community </span><a aria-label="Reference 2010" data-dcnode-id="3786" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d34375223e1088" title="Secretariat of the Pacific Community (2010). Kiribati family health and support study report. New Caledonia: Ministry of Internal and Social Affairs and Secretariat of the Pacific Community."><span data-dcnode-id="3787" instrument_node="">2010</span></a><span data-dcnode-id="3785" instrument_node="">).</span></p><p data-dcnode-id="3755"><span data-dcnode-id="3783" instrument_node="">There are multiple competing theoretical approaches to understanding women’s experiences of violence within the home (Loseke et al. </span><a aria-label="Reference 2005" data-dcnode-id="3781" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d34375223e1094" title="Loseke, D. R., Gelles, R. J., &amp; Cavanaugh, M. M. (Eds.) (2005). Current controversies on family violence (2nd ed.). Thousand Oaks: Sage Publications."><span data-dcnode-id="3782" instrument_node="">2005</span></a><span data-dcnode-id="3780" instrument_node="">). The many names of this violence – family violence, domestic violence, and intimate partner violence – reflect the theoretical evolution of research on this issue. Much of the research on and international activism against abuse grew out of the feminist movements of the 1970s and global women’s solidarity movements (Pitanguy </span><a aria-label="Reference 2004" data-dcnode-id="3778" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR98" id="ref-link-section-d34375223e1097" title="Pitanguy, J. (2004). A Brazilian feminist and a new constitution. In A. Fraser &amp; I. Tinker (Eds.), Developing power: How women transformed international development (pp. 212–221). New York: Feminist Press."><span data-dcnode-id="3779" instrument_node="">2004</span></a><span data-dcnode-id="3777" instrument_node="">; Portugal </span><a aria-label="Reference 2004" data-dcnode-id="3775" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d34375223e1100" title="Portugal, A. M. (2004). Isis international: A latin american perspective. In A. Fraser &amp; I. Tinker (Eds.), Developing power: How women transformed international development (pp. 104–114). New York: Feminist Press."><span data-dcnode-id="3776" instrument_node="">2004</span></a><span data-dcnode-id="3774" instrument_node="">). These early theoretical frames understood women’s experiences of intimate partner violence as a consequence of patriarchal social systems and gender inequality (Dobash and Dobash </span><a aria-label="Reference 1980" data-dcnode-id="3772" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d34375223e1103" title="Dobash, R. E., &amp; Dobash, R. (1980). Violence against wives: A case against the patriarchy. London: Open Books."><span data-dcnode-id="3773" instrument_node="">1980</span></a><span data-dcnode-id="3771" instrument_node="">; Yllö </span><a aria-label="Reference 1983" data-dcnode-id="3769" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR135" id="ref-link-section-d34375223e1106" title="Yllö, K. A. (1983). Sexual equality and violence against wives in American states. Journal of Comparative Family Studies, 14, 67–86."><span data-dcnode-id="3770" instrument_node="">1983</span></a><span data-dcnode-id="3768" instrument_node="">, </span><a aria-label="Reference 1993" data-dcnode-id="3766" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR134" id="ref-link-section-d34375223e1110" title="Yllö, K. A. (1993). Through a feminist lens: Gender, power, and violence. In R. J. Gelles &amp; D. R. Loseke (Eds.), Current controversies on family violence (pp. 31–46). Newbury Park, CA: Sage."><span data-dcnode-id="3767" instrument_node="">1993</span></a><span data-dcnode-id="3765" instrument_node="">, </span><a aria-label="Reference 2005" data-dcnode-id="3763" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR136" id="ref-link-section-d34375223e1113" title="Yllö, K. A. (2005). Through a feminist lens: Gender, diversity and violence: Extending the feminist framework. In D. R. Loseke, R. J. Gelles, &amp; M. M. Cavanaugh (Eds.), Current controversies on family violence (2nd ed., pp. 19–34). Thousand Oaks: Sage Publication."><span data-dcnode-id="3764" instrument_node="">2005</span></a><span data-dcnode-id="3762" instrument_node="">; Yllö and Bograd </span><a aria-label="Reference 1988" data-dcnode-id="3760" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR137" id="ref-link-section-d34375223e1116" title="Yllö, K. A., &amp; Bograd, M. (1988). Feminist perspectives of wife abuse. Newbury Park, CA: Sage."><span data-dcnode-id="3761" instrument_node="">1988</span></a><span data-dcnode-id="3759" instrument_node="">). Since then, competing field-specific theories have proliferated, particularly in high-income settings, limiting researchers to the theoretical models of their disciplines (Fulu </span><a aria-label="Reference 2014" data-dcnode-id="3757" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d34375223e1119" title="Fulu, E. (2014). Domestic violence in Asia: Globalization, gender and Islam in the Maldives. London: Routledge."><span data-dcnode-id="3758" instrument_node="">2014</span></a><span data-dcnode-id="3756" instrument_node="">, p. 13).</span></p><p data-dcnode-id="3741"><span data-dcnode-id="3754" instrument_node="">In the late 1990s, Heise popularized an interdisciplinary model of intimate partner violence against women that captured the interconnectivity of risk factors across multiple social levels associated with women’s experiences of abuse (Heise </span><a aria-label="Reference 1998" data-dcnode-id="3752" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d34375223e1125" title="Heise, L. (1998). Violence against women: An integrated, ecological framework. Violence Against Women, 4, 262–290. doi:
                    10.1177/1077801298004003002
                    
                  ."><span data-dcnode-id="3753" instrument_node="">1998</span></a><span data-dcnode-id="3751" instrument_node="">). The ecological model serves as a framework to examine key factors and how they operate at different levels of society – from individual and relationship levels to community and social levels (Heise </span><a aria-label="Reference 2011" data-dcnode-id="3749" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d34375223e1128" title="Heise, L. (2011). What works to prevent partner violence? An evidence overview. London: Department for International Development."><span data-dcnode-id="3750" instrument_node="">2011</span></a><span data-dcnode-id="3748" instrument_node="">, </span><a aria-label="Reference 2012" data-dcnode-id="3746" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d34375223e1131" title="Heise, L. (2012). Determinants of partner violence in low and middle-income countries: Exploring variation in individual and population-level risk  (Unpublished doctoral dissertation). London School of Hygeine and Tropical Medicine, London."><span data-dcnode-id="3747" instrument_node="">2012</span></a><span data-dcnode-id="3745" instrument_node="">). Recent research from low-income settings calls for an additional level to the ecological model that would represent globalized trends and forces affecting factors across the model (Fulu and Miedema </span><a aria-label="Reference 2015" data-dcnode-id="3743" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d34375223e1134" title="Fulu, E., &amp; Miedema, S. (2015). Violence against women: Globalizing the integrated ecological model. Violence Against Women. doi:
                    10.1177/1077801215596244
                    
                  ."><span data-dcnode-id="3744" instrument_node="">2015</span></a><span data-dcnode-id="3742" instrument_node="">). This most recent iteration of the ecological organizational framework theoretically guides this case study.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3739" id="Sec14"><span data-dcnode-id="3740" instrument_node="">Case Study Methods</span></h3><p data-dcnode-id="3725"><span data-dcnode-id="3738" instrument_node="">The Maldives case study draws upon a combination of ethnographic research and survey research conducted by the lead author, as well as historical and current literature on cultural aspects of the Maldives, including the Maldivian census (Fulu </span><a aria-label="Reference 2014" data-dcnode-id="3736" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d34375223e1145" title="Fulu, E. (2014). Domestic violence in Asia: Globalization, gender and Islam in the Maldives. London: Routledge."><span data-dcnode-id="3737" instrument_node="">2014</span></a><span data-dcnode-id="3735" instrument_node="">). The ethnographic research including participant observation conducted during various field visits to the Maldives from 2004 to 2011. Field research included 15 informal and semi-structured interviews about gender relations and violence with key informants such as government ministry staff, police officers, magistrates, health care workers, activists, and UN workers; and 20 in-depth semi-structured interviews with women who had experienced intimate partner violence. All in-depth interviews were conducted in </span><i data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">Dhivehi</span></i><span data-dcnode-id="3732" instrument_node="">, the official language of the Maldives, and the key informant interviews were conducted in English. All interviews were transcribed in the original language and translated from </span><i data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">Dhivehi</span></i><span data-dcnode-id="3729" instrument_node=""> into English by a research assistant. For more information on the ethnographic methods, see Fulu </span><a aria-label="Reference 2014" data-dcnode-id="3727" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d34375223e1154" title="Fulu, E. (2014). Domestic violence in Asia: Globalization, gender and Islam in the Maldives. London: Routledge."><span data-dcnode-id="3728" instrument_node="">2014</span></a><span data-dcnode-id="3726" instrument_node="">.</span></p><p data-dcnode-id="3720"><span data-dcnode-id="3724" instrument_node="">To explore the effect of globalization on women’s experiences of violence, we also draw from data collected as part of the Maldives Survey on Domestic Violence and Women’s Health (for which the lead author was Principle Investigator), referred to as the Maldives Survey from here. This was the first nationally representative household survey on violence against women in the Maldives, replicating the WHO Multi-country Study on Women’s Health and Domestic Violence against Women. For more details of survey methods, see Fulu </span><a aria-label="Reference 2007" data-dcnode-id="3722" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d34375223e1160" title="Fulu, E. (2007). The Maldives study on women’s health and violence against women: Initial results on prevalence, health outcomes and women’s responses to violence. Malé: Ministry of Gender and Family."><span data-dcnode-id="3723" instrument_node="">2007</span></a><span data-dcnode-id="3721" instrument_node="">.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3718" id="Sec15"><span data-dcnode-id="3719" instrument_node="">The Maldives</span></h3><p data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">The Maldives is located at a geopolitical border between South and South-east Asia, with elements of similarity to both regions. Importantly, rapid social transformation in the Maldives, which is similar to many other countries in Asia and globally, highlights that family relationships and family violence can no longer be understood outside the realities of globalization and social change.</span></p><p data-dcnode-id="3705"><span data-dcnode-id="3715" instrument_node="">The Maldives is a chain of approximately 1200 small coral islands in the Indian Ocean of which approximately 200 are inhabited (Republic of Maldives </span><a aria-label="Reference 2008" data-dcnode-id="3713" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d34375223e1174" title="Republic of Maldives (2008). Analytical report: Population and housing census 2006. Malé: Ministry of Planning and National Development."><span data-dcnode-id="3714" instrument_node="">2008</span></a><span data-dcnode-id="3712" instrument_node="">). The population of 360,000 is highly dispersed. The Maldives is a Sunni Islamic state but has a Buddhist history and Hindu influences (Bell </span><a aria-label="Reference 1940" data-dcnode-id="3710" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d34375223e1177" title="Bell, H. C. P. (1940). The Maldive Islands: Monograph on the history, archaeology, and epigraphy. Colombo: Ceylon Government Press."><span data-dcnode-id="3711" instrument_node="">1940</span></a><span data-dcnode-id="3709" instrument_node="">; Heyerdahl </span><a aria-label="Reference 1986" data-dcnode-id="3707" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d34375223e1180" title="Heyerdahl, T. (1986). The Maldives mystery. London: George Allen &amp; Unwin."><span data-dcnode-id="3708" instrument_node="">1986</span></a><span data-dcnode-id="3706" instrument_node="">). Traditionally, the Maldives was a seafaring nation and remained relatively isolated from the rest of the world until the 1980s when the tourism industry began to expand. The impact of economic development, internal migration and urbanization, Islamism and democratization has been particularly evident in shifting ideas and practices around gender and family relationships.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3703" id="Sec16"><span data-dcnode-id="3704" instrument_node="">Marriage and Family Relationships</span></h3><p data-dcnode-id="3695"><span data-dcnode-id="3702" instrument_node="">In contrast to other Islamic Asian societies described above, marriage, divorce and family relationship patterns in the Maldives have historically tended to allow for higher levels of autonomy on the part of the woman and equality between husband and wife (Fulu </span><a aria-label="Reference 2014" data-dcnode-id="3700" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d34375223e1191" title="Fulu, E. (2014). Domestic violence in Asia: Globalization, gender and Islam in the Maldives. London: Routledge."><span data-dcnode-id="3701" instrument_node="">2014</span></a><span data-dcnode-id="3699" instrument_node="">). Social institutions and structures prioritized the importance of romantic love, allowed for flexibility in decisions around where the couple would reside and tolerated divorce and dissolution of marriages with little cultural stigma. Notions of honor and shame held little cultural value, and were rarely used as a means of controlling female sexuality or protecting virginity. To this day, arranged marriage and polygamy tends to be very rare. While early marriage used to be more common, the mean age for first marriage increased from 18 in 1985, to 23 in 2005 (Republic of Maldives </span><a aria-label="Reference 2008" data-dcnode-id="3697" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d34375223e1194" title="Republic of Maldives (2008). Analytical report: Population and housing census 2006. Malé: Ministry of Planning and National Development."><span data-dcnode-id="3698" instrument_node="">2008</span></a><span data-dcnode-id="3696" instrument_node="">). Relatedly, dowry in the Maldives has long been requested by the bride herself and paid to her directly by her husband, and has become so small in value that it largely serves as a token gesture.</span></p><p data-dcnode-id="3687"><span data-dcnode-id="3694" instrument_node="">Divorce practices in the Maldives are relatively fluid. Pyrard (</span><a aria-label="Reference 1619" data-dcnode-id="3692" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d34375223e1200" title="Pyrard, F. (1619). The voyage of Francois Pyrard of Laval to the East Indies, The Maldives, The Moluccas and Brazil. (A. Gray, Trans.) . New York: Burt Franklin."><span data-dcnode-id="3693" instrument_node="">1619</span></a><span data-dcnode-id="3691" instrument_node="">) recorded the phenomenon of common divorce in the Maldives in the seventeenth century and noted that some men married up to 100 times throughout their lives. Although divorce for women and men is common and acceptable, staying single is considered relatively undesirable and therefore remarriage is very common. Charrad (</span><a aria-label="Reference 2001" data-dcnode-id="3689" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d34375223e1203" title="Charrad, M. M. (2001). States and women's rights: The making of postcolonial Tunisia, Algeria, and Morocco. Berkeley: University of California Press."><span data-dcnode-id="3690" instrument_node="">2001</span></a><span data-dcnode-id="3688" instrument_node="">) suggests that procedures to terminate marriage, the legality of polygamy and the absence of communal property between husband and wife in Islamic law, serves to underplay the formation and continuity of independent and stable conjugal units.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3685" id="Sec17"><span data-dcnode-id="3686" instrument_node="">Prevalence of Intimate Partner Violence and Protective Factors</span></h3><p data-dcnode-id="3653"><span data-dcnode-id="3684" instrument_node="">The prevalence of intimate partner violence is low in the Maldives compared to other settings in Asia and even globally. According to the </span><i data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">Maldives Survey on Domestic Violence and Women</span></i><span data-dcnode-id="3681" instrument_node="">’</span><i data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">s Health</span></i><span data-dcnode-id="3678" instrument_node="">, which was the first nationally representative study on violence against women in the country, 20&nbsp;% of women aged 15–49 reported that they had experienced physical or sexual violence by a partner in their lifetime. Six percent reported that they had experienced such abuse in the last 12&nbsp;months (Fulu </span><a aria-label="Reference 2007" data-dcnode-id="3676" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d34375223e1221" title="Fulu, E. (2007). The Maldives study on women’s health and violence against women: Initial results on prevalence, health outcomes and women’s responses to violence. Malé: Ministry of Gender and Family."><span data-dcnode-id="3677" instrument_node="">2007</span></a><span data-dcnode-id="3675" instrument_node="">). Comparable estimates in Samoa, Ethiopia, Peru and New Zealand show much higher prevalence rates of partner violence, as high as 71&nbsp;% in Ethiopia (Garcia-Moreno et al</span><i data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">.</span></i><span data-dcnode-id="3672" instrument_node="">
</span><a aria-label="Reference 2005" data-dcnode-id="3670" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d34375223e1227" title="Garcia-Moreno, C., Jansen, H. A. F. M., Ellsberg, M., Heise, L., &amp; Watts, C. (2005). WHO multi-country study on women's health and domestic violence against women: Initial results on prevalence, health outcomes and women's responses. Geneva: World Health Organization."><span data-dcnode-id="3671" instrument_node="">2005</span></a><span data-dcnode-id="3669" instrument_node="">). The prevalence in the Maldives is also low compared to other Asian settings as discussed above. Comparable surveys in Bangladesh found 62&nbsp;% of women in the rural site and 53&nbsp;% of women in the urban site who reported lifetime physical and/or sexual intimate partner violence (Garcia-Moreno et al. </span><a aria-label="Reference 2005" data-dcnode-id="3667" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d34375223e1231" title="Garcia-Moreno, C., Jansen, H. A. F. M., Ellsberg, M., Heise, L., &amp; Watts, C. (2005). WHO multi-country study on women's health and domestic violence against women: Initial results on prevalence, health outcomes and women's responses. Geneva: World Health Organization."><span data-dcnode-id="3668" instrument_node="">2005</span></a><span data-dcnode-id="3666" instrument_node="">). A study conducted in six districts of Pakistan found that 75&nbsp;% of women interviewed reported experiencing physical violence by their husband during marriage (Rutgers WPF </span><a aria-label="Reference 2013" data-dcnode-id="3664" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d34375223e1234" title="Rutgers WPF (2013). Domestic violence against women: Prevalence and men’s perceptions in PGRN Districts of Pakistan. Pakistan: Rutgers WPF. Retrieved from 
                    http://www.rutgerswpfpak.org/content/pdfs/reports/DV-report.pdf
                    
                  ."><span data-dcnode-id="3665" instrument_node="">2013</span></a><span data-dcnode-id="3663" instrument_node="">). Even compared to many industrialized countries such as Australia, the United Kingdom and the United States of America, where the status of women is assumed to be higher and policies and programs to address violence against women have been in place for decades, the prevalence of intimate partner violence ranges from 26 to 30&nbsp;% (Mouzos and Makkai </span><a aria-label="Reference 2004" data-dcnode-id="3661" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d34375223e1237" title="Mouzos, J., &amp; Makkai, T. (2004). Women's experiences of male violence: Findings from the australian component of the international violence against women survey (IVAWS). Canberra: Australian Government &amp; Australian Institute of Criminology."><span data-dcnode-id="3662" instrument_node="">2004</span></a><span data-dcnode-id="3660" instrument_node="">; Walby and Allen </span><a aria-label="Reference 2004" data-dcnode-id="3658" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d34375223e1240" title="Walby, S., &amp; Allen, J. (2004). Domestic violence, sexual assault and stalking: Findings from the British Crime Survey. London: Home Office Research, Development and Statistics Directorate."><span data-dcnode-id="3659" instrument_node="">2004</span></a><span data-dcnode-id="3657" instrument_node="">; Wilt and Olson </span><a aria-label="Reference 1996" data-dcnode-id="3655" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d34375223e1243" title="Wilt, S., &amp; Olson, S. (1996). Prevalence of domestic violence in the United States. Journal of the American Medical Women's Association, 51, 77–82."><span data-dcnode-id="3656" instrument_node="">1996</span></a><span data-dcnode-id="3654" instrument_node="">).</span></p><p data-dcnode-id="3645"><span data-dcnode-id="3652" instrument_node="">The reasons for the low rate of violence in the Maldives have been attributed in part to the relatively high status of women in society, the unacceptability of violence, and flexible marriage and divorce practices (Fulu </span><a aria-label="Reference 2014" data-dcnode-id="3650" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d34375223e1249" title="Fulu, E. (2014). Domestic violence in Asia: Globalization, gender and Islam in the Maldives. London: Routledge."><span data-dcnode-id="3651" instrument_node="">2014</span></a><span data-dcnode-id="3649" instrument_node="">). Yet, this constellation of factors protecting women from abuse has not remained static. Global forces are re-shaping family relationship patterns in the Maldives, predominantly through increasingly restrictive interpretations of Islam that curtail women’s historical rights. Other global forces, including cultural exposure to classic Hollywood and Bollywood movies that promote happily ever after marriage discourses (Gopal </span><a aria-label="Reference 2011" data-dcnode-id="3647" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d34375223e1252" title="Gopal, S. (2011). Conjugations: Marriage and form in new Bollywood cinema. Chicago: University of Chicago Press."><span data-dcnode-id="3648" instrument_node="">2011</span></a><span data-dcnode-id="3646" instrument_node="">), and increasing urbanization in the densely populated capital of Malé, contribute to socio-cultural shifts around women’s risk of exposure to abuse.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3643" id="Sec18"><span data-dcnode-id="3644" instrument_node="">Islamic Revival in the Maldives</span></h3><p data-dcnode-id="3614"><span data-dcnode-id="3642" instrument_node="">The Maldives has often been described as moderate or liberal in its practice of Islam, particularly with regards to women (Fulu </span><a aria-label="Reference 2014" data-dcnode-id="3640" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d34375223e1263" title="Fulu, E. (2014). Domestic violence in Asia: Globalization, gender and Islam in the Maldives. London: Routledge."><span data-dcnode-id="3641" instrument_node="">2014</span></a><span data-dcnode-id="3639" instrument_node="">). Historical records indicate that women never wore headscarves, chose their own partners, and that marriage could be easily annulled if both parties so desired (Maloney </span><a aria-label="Reference 1980" data-dcnode-id="3637" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d34375223e1266" title="Maloney, C. (1980). People of the Maldives islands. New Delhi: Orient Longman."><span data-dcnode-id="3638" instrument_node="">1980</span></a><span data-dcnode-id="3636" instrument_node="">). However, there was an Islamic revival initiated by the former President Maumoon Abdul Gayoom, who was in power from 1978 to 2008, reflecting the global movement of Islamic Awakening (a</span><i data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">l-Sahwa al-Islaamiyya</span></i><span data-dcnode-id="3633" instrument_node="">), which has spread around the Muslim world since the 1970s (Ahmed </span><a aria-label="Reference 2004" data-dcnode-id="3631" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d34375223e1272" title="Ahmed, A. S. (2004). Postmodernism and Islam, predicament and promise (Rev. ed.). London: Routledge."><span data-dcnode-id="3632" instrument_node="">2004</span></a><span data-dcnode-id="3630" instrument_node="">; Hefner </span><a aria-label="Reference 1997" data-dcnode-id="3628" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d34375223e1275" title="Hefner, R. W. (1997). Islamization and democratization in Indonesia. In R. W. Hefner &amp; P. Horvatich (Eds.), Islam in an era of nation-states (pp. 75–127). Honolulu: University of Hawai'i Press."><span data-dcnode-id="3629" instrument_node="">1997</span></a><span data-dcnode-id="3627" instrument_node="">; Mahmood </span><a aria-label="Reference 2005" data-dcnode-id="3625" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d34375223e1279" title="Mahmood, S. (2005). The politics of piety: The Islamic revival of the feminist subject. Princeton, NJ: Princeton University Press."><span data-dcnode-id="3626" instrument_node="">2005</span></a><span data-dcnode-id="3624" instrument_node="">; Smith-Hefner </span><a aria-label="Reference 2007" data-dcnode-id="3622" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d34375223e1282" title="Smith-Hefner, N. (2007). Javanese women and the veil in post-soharto Indonesia. The Journal of Asian Studies, 66, 389–420. doi:
                    10.1017/S0021911807000575
                    
                  ."><span data-dcnode-id="3623" instrument_node="">2007</span></a><span data-dcnode-id="3621" instrument_node="">). In 1997 the Maldivian Constitution was changed, making Islam the official state religion, and designating the President as the supreme authority to propagate the tenets of Islam. President Gayoom used the discourse of resistance to Westernization and Christianity in the promotion of his Islamic revivalist policies and national unity (Ellis </span><a aria-label="Reference 1998" data-dcnode-id="3619" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d34375223e1285" title="Ellis, R. (1998). A man for all islands: A biography of Maumoon Abdul Gayoom. Singapore: Times Editions Publishers."><span data-dcnode-id="3620" instrument_node="">1998</span></a><span data-dcnode-id="3618" instrument_node="">). The increasingly fundamentalist Islamic movement in the Maldives was further fostered by the lack of educational facilities during the 1970s and 1980s. Consequently, many students went to study overseas in countries such as India and Pakistan and on their return introduced a more conservative Islamic interpretation than had previously been practiced in the Maldives (Fulu </span><a aria-label="Reference 2014" data-dcnode-id="3616" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d34375223e1288" title="Fulu, E. (2014). Domestic violence in Asia: Globalization, gender and Islam in the Maldives. London: Routledge."><span data-dcnode-id="3617" instrument_node="">2014</span></a><span data-dcnode-id="3615" instrument_node="">).</span></p><p data-dcnode-id="3600"><span data-dcnode-id="3613" instrument_node="">Greater flows of information through media, satellite television and the Internet have increased the influence of international Islamic movements (Fealy </span><a aria-label="Reference 2005" data-dcnode-id="3611" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d34375223e1294" title="Fealy, G. (2005). Islamisation and politics in Southeast Asia. In N. Lahoud &amp; A. H. Johns (Eds.), Islam in world politics (pp. 152–169). New York: Routledge."><span data-dcnode-id="3612" instrument_node="">2005</span></a><span data-dcnode-id="3610" instrument_node="">; Lahoud and Johns </span><a aria-label="Reference 2005" data-dcnode-id="3608" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d34375223e1297" title="Lahoud, N., &amp; Johns, A. H. (2005). Introduction. In N. Lahoud &amp; A. H. Johns (Eds.), Islam in world politics (pp. 1–6). London: Routledge."><span data-dcnode-id="3609" instrument_node="">2005</span></a><span data-dcnode-id="3607" instrument_node="">; Pottenger </span><a aria-label="Reference 2005" data-dcnode-id="3605" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d34375223e1300" title="Pottenger, J. R. (2005). Islam and ideology in Central Asia. In N. Lahoud &amp; A. H. Johns (Eds.), Islam in world politics (pp. 127–151). London: Routledge."><span data-dcnode-id="3606" instrument_node="">2005</span></a><span data-dcnode-id="3604" instrument_node="">). Furthermore, funding from the Middle East to build mosques and madrasa has contributed to the spread of Wahhabism, a form of Islam that calls for a strict observance of the Shari‘a, in the Maldives as in other countries (see Williams </span><a aria-label="Reference 2004" data-dcnode-id="3602" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR130" id="ref-link-section-d34375223e1303" title="Williams, C. (2004). Islamic extremism and wahhabism. In D. M. Jones (Ed.), Globalisation and the new terror: The Asia Pacific dimension (pp. 70–78). Northampton, MA: Edward Elgar."><span data-dcnode-id="3603" instrument_node="">2004</span></a><span data-dcnode-id="3601" instrument_node="">).</span></p><p data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">In this context of increasing fundamentalism, the 2004 Indian Ocean tsunami then became a catalyst for a sudden shift in the practice of Islam in the Maldives. In the immediate aftermath of this tragedy, the Maldives was inundated by international agencies and funding accompanied by considerable pressure to establish democratic institutions, promote a multi-party system and allow free and fair elections. The introduction of a multi-party system in 2008 enabled the Maldives Democratic Party (MDP), led by Mohamed Nasheed, to come out of exile in Sri Lanka and opened political space for other parties. Conservative religious groups formed political parties and the Adhaalath Party, in particular, rallied for popular support using Islam as its party platform. The MDP won the most votes but not an outright majority. They formed a coalition government that included the Adhaalath Party and appointed one of its members as Minister for Islamic Affairs, significantly increasing the Party’s influence over Islamic discourse and practice in the country. A number of women in the Maldives have been critical of the process of democratization, which they believe has enabled fundamentalist Islamic discourses to spread in the Maldives through parties like Adhaalath (Fulu 2104).</span></p><p data-dcnode-id="3590"><span data-dcnode-id="3597" instrument_node="">From 2009 to 2012, President Nasheed’s government struggled with a declining economy and a parliament dominated by opposition parties, leading to constitutional gridlock. Further tension arose when the then government attempted to reform a judiciary that was largely staffed by loyalists to the previous Gayoom government and which many regarded as corrupt (Aljazeera </span><a aria-label="Reference 2012" data-dcnode-id="3595" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d34375223e1312" title="Aljazeera. (2012, March 2). Coup in the coral islands? Aljazeera. Retreived from 
                    http://www.aljazeera.com/programmes/101east/2012/03/201231113618982509.html
                    
                  
                        "><span data-dcnode-id="3596" instrument_node="">2012</span></a><span data-dcnode-id="3594" instrument_node="">; Bajaj </span><a aria-label="Reference 2012" data-dcnode-id="3592" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d34375223e1315" title="Bajaj, V. (2012, February 12) Behind Maldives' glamor, a struggling democracy. The New York Times. Retrieved from 
                    http://www.nytimes.com/2012/02/13/world/asia/behind-maldives-glamor-a-struggling-democracy.html?_r=0
                    
                  
                        "><span data-dcnode-id="3593" instrument_node="">2012</span></a><span data-dcnode-id="3591" instrument_node="">). On 7 February 2012, President Nasheed resigned under duress, or what he claimed to be a coup. Vice President, Dr. Mohammed Waheed, became acting President until elections were held again in 2013 and a coalition government led by Gayoom’s brother-in-law came to power.</span></p><p data-dcnode-id="3582"><span data-dcnode-id="3589" instrument_node="">The recent evolution of Islam in the Maldives has led to shifts in women’s rights and status in society, impacting women’s risk of experiencing abuse and proactively dealing with family violence when it occurs. As part of the revivalism led by Gayoom in the 1990s, state and religious groups claimed that Maldivian families were in crisis due to the high divorce rate, children born out of wedlock, drugs, crime and sex work. In response to this so-called crisis, a new Family Law was enacted in 2001, to consciously and systematically bring down the divorce rate (Velezinee </span><a aria-label="Reference 2004" data-dcnode-id="3587" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR124" id="ref-link-section-d34375223e1322" title="Velezinee, A. (2004). Embedded gender contracts: The family law and lived realities in Malé, Maldives (Unpublished masters thesis). International Institute of Social Studies, Graduate School of Development Studies, The Hague."><span data-dcnode-id="3588" instrument_node="">2004</span></a><span data-dcnode-id="3586" instrument_node="">). The new law proved successful in reducing the divorce rate, but in the process has made women particularly vulnerable to ongoing abuse. Wife-initiated petitions for divorce are denied by the courts (Velezinee </span><a aria-label="Reference 2004" data-dcnode-id="3584" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR124" id="ref-link-section-d34375223e1325" title="Velezinee, A. (2004). Embedded gender contracts: The family law and lived realities in Malé, Maldives (Unpublished masters thesis). International Institute of Social Studies, Graduate School of Development Studies, The Hague."><span data-dcnode-id="3585" instrument_node="">2004</span></a><span data-dcnode-id="3583" instrument_node="">). Aishath Shujune, a senior staff member at the Ministry of Justice who was appointed as the first female magistrate in the Maldives said that under the new Family Law, magistrates often order couples to reconcile, particularly if the wife initiated the divorce:</span></p><blockquote class="c-blockquote" data-dcnode-id="3573"><div class="c-blockquote__body" data-dcnode-id="3574"><span data-dcnode-id="3581" instrument_node="">
</span><p data-dcnode-id="3576"><span data-dcnode-id="3580" instrument_node="">“It happens often that the judge orders the husband and wife to reconcile even if there has been violence. The male is asked not to hit her and the woman is asked to go back and live with the husband even if she has sought refuge with a friend or whatever and she goes back and most often it is worse. So long as they are not divorced they are supposed to live together,” (quoted in Fulu </span><a aria-label="Reference 2014" data-dcnode-id="3578" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d34375223e1332" title="Fulu, E. (2014). Domestic violence in Asia: Globalization, gender and Islam in the Maldives. London: Routledge."><span data-dcnode-id="3579" instrument_node="">2014</span></a><span data-dcnode-id="3577" instrument_node="">, p. 76).</span></p><span data-dcnode-id="3575" instrument_node="">
</span></div></blockquote><span data-dcnode-id="3572" instrument_node="">
</span><p data-dcnode-id="3567"><span data-dcnode-id="3571" instrument_node="">The Maldives Survey found that violence is likely to be an important cause of marriage breakdown and therefore if accessing a divorce becomes more difficult, either because of social stigma or legal restrictions, women are more likely to be trapped in violent relationships (Fulu </span><a aria-label="Reference 2014" data-dcnode-id="3569" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d34375223e1340" title="Fulu, E. (2014). Domestic violence in Asia: Globalization, gender and Islam in the Maldives. London: Routledge."><span data-dcnode-id="3570" instrument_node="">2014</span></a><span data-dcnode-id="3568" instrument_node="">).</span></p><p data-dcnode-id="3547"><span data-dcnode-id="3566" instrument_node="">Three years after the new Family Law was enacted, in the aftermath of the tsunami, women’s bodies came under critique, with a number of people blaming the tragedy on women’s failure to wear the </span><i data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">buruga</span></i><span data-dcnode-id="3563" instrument_node=""> (Aniya </span><a aria-label="Reference 2007" data-dcnode-id="3561" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d34375223e1349" title="Aniya, A. (2007, March 20). Are women the germs that spread social ills? Minivan News, Malé, p. 19."><span data-dcnode-id="3562" instrument_node="">2007</span></a><span data-dcnode-id="3560" instrument_node="">). Blaming women for the tsunami was not unique to the Maldives; examples from Aceh, Sri Lanka and Southern India indicate that similar representations of women’s immorality were used to explain the tsunami (Abubakar </span><a aria-label="Reference 2006" data-dcnode-id="3558" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d34375223e1352" title="Abubakar, A. (2006, October 6). Unease in Aceh as morality police crack down. AFP."><span data-dcnode-id="3559" instrument_node="">2006</span></a><span data-dcnode-id="3557" instrument_node="">; Donnan </span><a aria-label="Reference 2006" data-dcnode-id="3555" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d34375223e1355" title="Donnan, S. (2006, October 10). Aceh enforces Sharia law with the lash of a cane. Financial Express. Bangladesh. Retreived from 
                    http://www.corpun.com/idj00610.htm
                    
                  
                        "><span data-dcnode-id="3556" instrument_node="">2006</span></a><span data-dcnode-id="3554" instrument_node="">; Salim </span><a aria-label="Reference 2007" data-dcnode-id="3552" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR111" id="ref-link-section-d34375223e1358" title="Salim, A. (2007). Dynamic legal pluralism in modern Indonesia: The state and the Sharia (court) in the changing constellations of Aceh. Paper presented at the First International Conference on Aceh and Indian Ocean Studies, Banda Aceh."><span data-dcnode-id="3553" instrument_node="">2007</span></a><span data-dcnode-id="3551" instrument_node="">; Williamson </span><a aria-label="Reference 2006" data-dcnode-id="3549" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR131" id="ref-link-section-d34375223e1362" title="Williamson, L. (2006, December 8). Aceh wary over new Sharia police. BBC News Online. London. Retreived from 
                    http://news.bbc.co.uk/2/hi/asia-pacific/6220256.stm
                    
                  
                        "><span data-dcnode-id="3550" instrument_node="">2006</span></a><span data-dcnode-id="3548" instrument_node="">).</span></p><p data-dcnode-id="3536"><span data-dcnode-id="3546" instrument_node="">For many years Gayoom tried to control the rise of Islamic extremism, which he saw as a threat to his leadership (Ellis </span><a aria-label="Reference 1998" data-dcnode-id="3544" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d34375223e1368" title="Ellis, R. (1998). A man for all islands: A biography of Maumoon Abdul Gayoom. Singapore: Times Editions Publishers."><span data-dcnode-id="3545" instrument_node="">1998</span></a><span data-dcnode-id="3543" instrument_node="">). Yet, this sudden growth of religious fundamentalism and conservative thinking continues to pose challenges for women and young girls. The government itself has reported an increase in home schooling and refusing vaccinations and other medical services for girls based on religious beliefs (Department of National Planning </span><a aria-label="Reference 2012" data-dcnode-id="3541" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d34375223e1371" title="Department of National Planning (2012). ICPD Beyond 2014: Maldives operations review 2012, progress, challenges and way forward. Malé: UNFPA and Department of National Planning."><span data-dcnode-id="3542" instrument_node="">2012</span></a><span data-dcnode-id="3540" instrument_node="">). Concerns have been raised about a rise in the practices of early marriage and polygamy, for example from the United Nations Committee of the Convention on the Elimination of all forms of Discrimination against Women (CEDAW </span><a aria-label="Reference 2007" data-dcnode-id="3538" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d34375223e1374" title="CEDAW (2007). Concluding comments of the Committee on the Elimination of Discrimination Against Women: Maldives. New York: United Nations."><span data-dcnode-id="3539" instrument_node="">2007</span></a><span data-dcnode-id="3537" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3534" id="Sec19"><span data-dcnode-id="3535" instrument_node="">Women’s Political Participation</span></h3><p data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">At the same time, there are more positive trends being played out in Maldivian society with regards to women’s political participation, although there is accompanying backlash to women’s increasingly visible role in politics. For example, while more women are wearing the veil and staying home, a large number of women are becoming more politically active in public spheres (Fulu 2104).</span></p><p data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">The tension around women’s role in politics and religious discourse was evident with a proposal to introduce a quota for women in Parliament. The proposal was rejected and the debate in Parliament highlighted the influence of Islamism in changing expectations about gender relationships in the home. As reported in Adduvas magazine, Adam Zahir, the South Huvadhu Atoll Member said in Parliament:</span></p><blockquote class="c-blockquote" data-dcnode-id="3521"><div class="c-blockquote__body" data-dcnode-id="3522"><span data-dcnode-id="3529" instrument_node="">
</span><p data-dcnode-id="3524"><span data-dcnode-id="3528" instrument_node="">“I do object to having special seats for women … They are not supposed to go out and campaign and play an active role in politics or anything else. The Almighty asks them to stay home, bring up their children and serve their husbands well, and they can’t evade these responsibilities. From a religious point of view women who take up seats here are offenders,” (cf Adduvas </span><a aria-label="Reference 2006" data-dcnode-id="3526" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d34375223e1392" title="Adduvas (2006). What the MPs said against allocating seats to women (pp. 10–12). Malé: Adduvas Magazine."><span data-dcnode-id="3527" instrument_node="">2006</span></a><span data-dcnode-id="3525" instrument_node="">, p. 10).</span></p><span data-dcnode-id="3523" instrument_node="">
</span></div></blockquote><span data-dcnode-id="3520" instrument_node="">
</span><p data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">Although new fundamentalist Islamic interpretations, derived from global politicized versions of Islam, continue to mold the social fabric of the country, other globalization-related trends are also affecting women’s rights, and particularly their risk of violence, in the Maldives.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3516" id="Sec20"><span data-dcnode-id="3517" instrument_node="">The New “Private” Sphere: Violence Behind “Closed Doors”</span></h3><p data-dcnode-id="3505"><span data-dcnode-id="3515" instrument_node="">Family homes in the Maldives used to be spacious, open and accessible to everyone, and the shroud of secrecy surrounding domestic violence would have been difficult to maintain with the open nature of homes (Fulu </span><a aria-label="Reference 2014" data-dcnode-id="3513" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d34375223e1408" title="Fulu, E. (2014). Domestic violence in Asia: Globalization, gender and Islam in the Maldives. London: Routledge."><span data-dcnode-id="3514" instrument_node="">2014</span></a><span data-dcnode-id="3512" instrument_node="">). Importantly, there used to be no clear divide between public and private in terms of women’s roles in the Maldives. While women took primary responsibility for the home, they were also active in the public sphere. However, the process of economic development has been accompanied by massive internal migration and increasing urbanization in the capital of Malé. Physical space has become so scarce that the rent on a typical two bedroom apartment is approximately 4 times the average per capita income, forcing many people to share rooms and even sleep in shifts. Houses have become more closed with large walls and there is now a more clearly established distinction between public and private, insider and outsider. The privacy and seclusion of homes today may enable intimate partner violence to take place more easily than before, given that isolation tends to put women at increased risk of abuse as bystanders are less likely to witness abuse and intervene (Brown </span><a aria-label="Reference 1992" data-dcnode-id="3510" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d34375223e1411" title="Brown, J. K. (1992). Introduction: Definitions, assumptions, themes and issues. In D. A. Counts, J. K. Brown, &amp; J. C. Campbell (Eds.), Sanctions and sanctuary: Cultural perspectives on the beating of wives (pp. 1–18). Oxford: Westview Press."><span data-dcnode-id="3511" instrument_node="">1992</span></a><span data-dcnode-id="3509" instrument_node="">; Warrington </span><a aria-label="Reference 2001" data-dcnode-id="3507" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR126" id="ref-link-section-d34375223e1414" title="Warrington, M. (2001). I must get out: The geographies of domestic violence. Royal Geographical Society, 26, 365–382. doi:
                    10.1111/1475-5661.00028
                    
                  ."><span data-dcnode-id="3508" instrument_node="">2001</span></a><span data-dcnode-id="3506" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3503" id="Sec21"><span data-dcnode-id="3504" instrument_node="">The Rise of White Weddings: Changing Expectations of Marriage</span></h3><p data-dcnode-id="3492"><span data-dcnode-id="3502" instrument_node="">Marriage is a central part of Maldivian life (Razee </span><a aria-label="Reference 2000" data-dcnode-id="3500" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR104" id="ref-link-section-d34375223e1425" title="Razee, H. (2000). Gender and development in the Maldives: A review of twenty years 1979–1999. Malé: UN Theme Group on Gender with the support of the Ministry of Women's Affairs and Social Security."><span data-dcnode-id="3501" instrument_node="">2000</span></a><span data-dcnode-id="3499" instrument_node="">). As discussed within the aspiration for marriage there has been a high degree of flexibility. However, the nature of marriage and divorce in the Maldives is becoming more restrictive, with ideologies of love and relationships being influenced by the global spread of Western-style white weddings and Bollywood love stories. With the introduction of cable television, imported DVDs, music and the Internet, Indian films have become the primary contemporary reference point for words, tunes, stories and images of love in South Asia (Dwyer </span><a aria-label="Reference 2006" data-dcnode-id="3497" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d34375223e1428" title="Dwyer, R. (2006). Kiss or tell? Declaring love in hindi films. In F. Orsini (Ed.), Love in South Asia: A cultural history (pp. 289–302). Cambridge: Cambridge University Press."><span data-dcnode-id="3498" instrument_node="">2006</span></a><span data-dcnode-id="3496" instrument_node="">; Orsini </span><a aria-label="Reference 2006" data-dcnode-id="3494" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR94" id="ref-link-section-d34375223e1431" title="Orsini, F. (Ed.) (2006). Love in South Asia: A cultural history. Cambridge: Cambridge University Press."><span data-dcnode-id="3495" instrument_node="">2006</span></a><span data-dcnode-id="3493" instrument_node="">).</span></p><p data-dcnode-id="3481"><span data-dcnode-id="3491" instrument_node="">Modern-day wedding practices are useful in exploring changing expectations about marriage offering a visual shorthand for the different premises of matrimony (Kendall </span><a aria-label="Reference 1996" data-dcnode-id="3489" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d34375223e1437" title="Kendall, L. (1996). Getting married in Korea: Of gender, morality, and modernity. Berkeley: University of California Press."><span data-dcnode-id="3490" instrument_node="">1996</span></a><span data-dcnode-id="3488" instrument_node="">). In the Maldives, weddings used to be low-key affairs</span><i data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">.</span></i><span data-dcnode-id="3485" instrument_node=""> Anthropologist Maloney (</span><a aria-label="Reference 1980" data-dcnode-id="3483" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d34375223e1443" title="Maloney, C. (1980). People of the Maldives islands. New Delhi: Orient Longman."><span data-dcnode-id="3484" instrument_node="">1980</span></a><span data-dcnode-id="3482" instrument_node="">) contrasts these low-key weddings in the Maldives to the elaborate affairs in other Muslim communities in South Asia. He argues that because divorce is so acceptable, marriage is hardly a rite of passage in the Maldives, and therefore an elaborate wedding ceremony would be dysfunctional. However, in recent years weddings have become much more elaborate and important – a place where love is demonstrated and consumed – in some sense reflecting a change in expectations about marriage. Many young people have embraced the fairytale romance of happily ever after encompassed by white weddings and Bollywood. The expectation that marriage should last forever, combined with conservative state and Islamic discourses and more restrictive Family Law, is challenging the flexible nature of marriage. As divorce becomes more difficult to access and more socially stigmatised this puts women at increased risk of being trapped in abusive relationships.</span></p></div></div></section><section data-dcnode-id="3455" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="3456" id="Sec22-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3476" id="Sec22"><span data-dcnode-id="3477" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="3457" id="Sec22-content"><p data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">This article concludes with two key implications for global feminist activism, and feminist activism in South Asian Islamic countries in particular. First, the force of globalization is undeniably shaping and re-framing issues around women’s rights in Islamic Asian settings. In order to find spaces of resistance and progress toward women’s rights, it will be critical to recognize and engage with this constantly shifting globalized terrain. The case study from the Maldives offers a unique example of how globalization and the influx of discourses from the west and south have greatly impacted gender dynamics and family relationships. The complex and contradictory experience of globalization in the local context of the Maldives, offers an opportunity for both positive and negative readings of globalization on the ground. On the one hand, transnational feminist practice has promoted women’s rights and brought the issue of violence against women into the public domain. In the Maldives, it has contributed to economic development and much needed democratic reform. However, many of the fast-paced changes that have accompanied global flows of ideologies, media and discourses have led to more gender inequitable family relationships, a reconstruction of women as dependent wife and mother, and an erosion of the factors that historically protected women from violence in the home. Integrating a globalization perspective into research on women’s rights in Asian Muslim-majority countries will help to establish greater understanding of how social change takes place in the context of an increasingly globalized world. This can further contribute to the support and fostering of women’s rights movements within Muslim-majority settings.</span></p><p data-dcnode-id="3460"><span data-dcnode-id="3473" instrument_node="">This article reaffirms that feminist perspectives continue to be of vital importance to studies on globalization. As in the Maldives, globalization in Asia more broadly has led to a resurgence of various religiously defined fundamentalisms, partly in response to threat of outside values (Derichs and Fleschenberg </span><a aria-label="Reference 2010" data-dcnode-id="3471" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d34375223e1459" title="Derichs, C., &amp; Fleschenberg, A. (2010). Religious fundamentalism and their gendered impacts in Asia. In C. Derichs &amp; A. Fleschenberg (Eds.), Religious fundamentalism and their gendered impacts in asia (pp. 7–12). Berlin: Friedrich-Ebert-Stiftung."><span data-dcnode-id="3472" instrument_node="">2010</span></a><span data-dcnode-id="3470" instrument_node="">). There has been an increasing influence of transnational Islam from Middle East, with emphasis on piety and stricter adherence to religious practices (Rinaldo </span><a aria-label="Reference 2008" data-dcnode-id="3468" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR107" id="ref-link-section-d34375223e1462" title="Rinaldo, R. (2008). Muslim women, middle class habitus, and modernity in Indonesia. Contemporary Islam, 2, 23–39. doi:
                    10.1007/s11562-007-0035-6
                    
                  ."><span data-dcnode-id="3469" instrument_node="">2008</span></a><span data-dcnode-id="3467" instrument_node="">). This increased leverage of religious fundamentalist groups affect women disproportionately. Kandiyoti (</span><a aria-label="Reference 2007" data-dcnode-id="3465" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d34375223e1465" title="Kandiyoti, D. (2007). Between the hammer and the anvil: Post-conflict reconstruction, islam and women's rights. Third World Quarterly, 23, 503–517. doi:
                    10.1080/01436590701192603
                    
                  ."><span data-dcnode-id="3466" instrument_node="">2007</span></a><span data-dcnode-id="3464" instrument_node="">) rightly points out that democracy </span><i data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">by design</span></i><span data-dcnode-id="3461" instrument_node=""> can legitimize social forces that are likely to resist gender equality.</span></p><p data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">The effects of globalization on women’s lives have been multiple, contradictory, inclusionary and exclusionary. It remains challenging to rigorously map the interplay between macro-level trends with micro-level interactions and relationships. Nevertheless, globalization will not disappear, but merely gain strength. It is in our best interest, and the interest of feminist activists around the world, to structure our understanding of women’s rights and issues pertaining to women, in a global framework.</span></p></div></div></section><span data-dcnode-id="3454" instrument_node="">
