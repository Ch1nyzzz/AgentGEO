</span><meta content="There is a growing body of research on family relationships and the nature of family violence in Muslim-majority countries of Asia. However, patterns and trends around family dynamics and violence do not remain static. Despite the diversity of South Asian societies, all are being influenced by a constellation of globalized social, economic, political and religious forces that manifest in unique ways in different contexts. To date, there is little written about the implications for women’s rights and gendered violence when globalization remolds religious, cultural, geographic and other social realities. This critical review presents a review of feminist literature on gender, family and violence in Asian Muslim-majority countries – notably Pakistan, Indonesia, Malaysia and Bangladesh – from a feminist globalization theoretical perspective. The article uses the Maldives as a case study to map how globalized socio-economic and political trends are changing the terrain of family and society in ways that both advance and retract women’s rights and contribute to their increased risk of violence. This paper advances the literature on feminist perspectives on family relationships by demonstrating the importance of considering localized problems within a global sphere. This approach will allow researchers to systematically assess the influence of global processes on changing family relations and implications for family structures. The paper concludes with applications for feminist approaches to globalization, gender and violence. In particular, an increased focus on global processes and the shifting dynamics of family relationships will better inform global feminist activism, and feminist activism in Asian Islamic communities." data-dcnode-id="5308" name="dc.description"><span data-dcnode-id="5307" instrument_node="">

</span><meta content="Globalization and Changing Family Relations: Family Violence and Women’s Resistance in Asian Muslim Societies - Sex Roles" data-dcnode-id="4936" property="og:title"><span data-dcnode-id="4935" instrument_node="">
</span><meta content="There is a growing body of research on family relationships and the nature of family violence in Muslim-majority countries of Asia. However, patterns and trends around family dynamics and violence do not remain static. Despite the diversity of South Asian societies, all are being influenced by a constellation of globalized social, economic, political and religious forces that manifest in unique ways in different contexts. To date, there is little written about the implications for women’s rights and gendered violence when globalization remolds religious, cultural, geographic and other social realities. This critical review presents a review of feminist literature on gender, family and violence in Asian Muslim-majority countries – notably Pakistan, Indonesia, Malaysia and Bangladesh – from a feminist globalization theoretical perspective. The article uses the Maldives as a case study to map how globalized socio-economic and political trends are changing the terrain of family and society in ways that both advance and retract women’s rights and contribute to their increased risk of violence. This paper advances the literature on feminist perspectives on family relationships by demonstrating the importance of considering localized problems within a global sphere. This approach will allow researchers to systematically assess the influence of global processes on changing family relations and implications for family structures. The paper concludes with applications for feminist approaches to globalization, gender and violence. In particular, an increased focus on global processes and the shifting dynamics of family relationships will better inform global feminist activism, and feminist activism in Asian Islamic communities." data-dcnode-id="4934" property="og:description"><span data-dcnode-id="4933" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1798" data-track-component="article body"><span data-dcnode-id="4500" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="4493" data-gtm-vis-first-on-screen-50443292_562="4448" data-gtm-vis-first-on-screen-50443292_563="4447" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="4448" data-gtm-vis-recent-on-screen-50443292_563="4442" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="4494" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4498" id="Abs1"><span data-dcnode-id="4499" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="4495" id="Abs1-content"><p data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">There is a growing body of research on family relationships and the nature of family violence in Muslim-majority countries of Asia. However, patterns and trends around family dynamics and violence do not remain static. Despite the diversity of South Asian societies, all are being influenced by a constellation of globalized social, economic, political and religious forces that manifest in unique ways in different contexts. To date, there is little written about the implications for women’s rights and gendered violence when globalization remolds religious, cultural, geographic and other social realities. This critical review presents a review of feminist literature on gender, family and violence in Asian Muslim-majority countries – notably Pakistan, Indonesia, Malaysia and Bangladesh – from a feminist globalization theoretical perspective. The article uses the Maldives as a case study to map how globalized socio-economic and political trends are changing the terrain of family and society in ways that both advance and retract women’s rights and contribute to their increased risk of violence. This paper advances the literature on feminist perspectives on family relationships by demonstrating the importance of considering localized problems within a global sphere. This approach will allow researchers to systematically assess the influence of global processes on changing family relations and implications for family structures. The paper concludes with applications for feminist approaches to globalization, gender and violence. In particular, an increased focus on global processes and the shifting dynamics of family relationships will better inform global feminist activism, and feminist activism in Asian Islamic communities.</span></p></div></div></section><span data-dcnode-id="4492" instrument_node="">
</span><section data-dcnode-id="4387" data-gtm-vis-first-on-screen-50443292_562="4448" data-gtm-vis-first-on-screen-50443292_563="4447" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="4448" data-gtm-vis-recent-on-screen-50443292_563="4447" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="4388" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4490" id="Sec1"><span data-dcnode-id="4491" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="4389" id="Sec1-content"><p data-dcnode-id="4461"><span data-dcnode-id="4489" instrument_node="">The issue of women’s rights and violence against women has gained increasing political capital in recent years reflected by events such as the 2014 Global Summit to End Sexual Violence in Conflict, hosted by Angelina Jolie and William Hague (Foreign and Commonwealth Office </span><a aria-label="Reference 2014" data-dcnode-id="4487" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d34375223e302" title="Foreign and Commonwealth Office. (2014). Global summit to end sexual violence in conflict. Retreived from 
                    https://www.gov.uk/government/news/global-summit-to-end-sexual-violence-in-conflict-latest-updates
                    
                  
                        "><span data-dcnode-id="4488" instrument_node="">2014</span></a><span data-dcnode-id="4486" instrument_node="">), and the likely inclusion of a target in the Sustainable Development Goals 2015 on eliminating all forms of violence against women and girls (United Nations General Assembly </span><a aria-label="Reference 2014" data-dcnode-id="4484" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d34375223e305" title="UN General Assembly. (2014, August 12). Report of the Open Working Group of the General Assembly on Sustainable Development Goals. A/68/970. Geneva: United Nations."><span data-dcnode-id="4485" instrument_node="">2014</span></a><span data-dcnode-id="4483" instrument_node="">). A number of highly publicized incidents of violence in Asia, including the gang rapes of girls in India and Malaysia and the beating to death of a pregnant woman in Pakistan for marrying against her family’s wishes, have contributed to increased global awareness of the issue (BBC </span><a aria-label="Reference 2012" data-dcnode-id="4481" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d34375223e308" title="BBC. (2012, December 18). Shock and outrage over India Delhi bus gang rape. BBC. Retrieved from 
                    http://www.bbc.com/news/world-asia-india-20765320
                    
                  
                        "><span data-dcnode-id="4482" instrument_node="">2012</span></a><span data-dcnode-id="4480" instrument_node="">; Boone </span><a aria-label="Reference 2014" data-dcnode-id="4478" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d34375223e311" title="Boone, J. (2014, May 28). Pregnant woman beaten to death by family outside Pakistani court. The Guardian. Retrieved from 
                    http://www.theguardian.com/world/2014/may/28/pregnant-woman-beaten-death-family-pakistan-court
                    
                  
                        "><span data-dcnode-id="4479" instrument_node="">2014</span></a><span data-dcnode-id="4477" instrument_node="">; Leong </span><a aria-label="Reference 2014" data-dcnode-id="4475" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d34375223e314" title="Leong, T. (2014, May 30). Malaysian teenager gang-raped by 38 men. Reuters. Retrieved from 
                    http://in.reuters.com/article/2014/05/30/malaysia-crime-rape-idINKBN0EA15Y20140530
                    
                  
                        "><span data-dcnode-id="4476" instrument_node="">2014</span></a><span data-dcnode-id="4474" instrument_node="">). Importantly, the communication of these stories and responding protest movements have been driven in part by multiple vectors of globalized media, including viral social media movements such as #bringbackourgirls (Bring Back Our Girls&nbsp;</span><a aria-label="Reference 2014" data-dcnode-id="4472" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d34375223e318" title="Bring Back Our Girls. (2014). Join the schoolgirl March. Retrieved from 
                    http://bringbackourgirls.us/#
                    
                  
                        "><span data-dcnode-id="4473" instrument_node="">2014</span></a><span data-dcnode-id="4471" instrument_node="">) and One Billion Rising (One Billion Rising </span><a aria-label="Reference 2015" data-dcnode-id="4469" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d34375223e321" title="One Billion Rising (2015). One billion rising revolution. Retrieved from 
                    http://www.onebillionrising.org/
                    
                  
                        "><span data-dcnode-id="4470" instrument_node="">2015</span></a><span data-dcnode-id="4468" instrument_node="">). The spread of information has contributed to re-framing discussions around violence against women and even led to changes to laws in some settings (Denyer </span><a aria-label="Reference 2013" data-dcnode-id="4466" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d34375223e324" title="Denyer, S. (2013, February 5). India gang rape prompts tough new laws on sexual assault. The Guardian. Retrieved from 
                    http://www.theguardian.com/world/2013/feb/05/india-gang-rape-stricter-laws
                    
                  
                        "><span data-dcnode-id="4467" instrument_node="">2013</span></a><span data-dcnode-id="4465" instrument_node="">). These examples illustrate how globalization plays a major role in shaping gendered institutions, norms and relations in rapid and sometimes unexpected ways (Moghadam </span><a aria-label="Reference 2009" data-dcnode-id="4463" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d34375223e327" title="Moghadam, V. M. (2009). Globalization and social movements: Islamism, feminism and the global justice movement. Lanham: Rowman and Littlefield."><span data-dcnode-id="4464" instrument_node="">2009</span></a><span data-dcnode-id="4462" instrument_node="">). But what other impact does globalization have on women’s private lives in Asia?</span></p><p data-dcnode-id="4417"><span data-dcnode-id="4460" instrument_node="">There is a small but robust body of research on family relationships and the nature of family violence in South and South-east Asian Muslim-majority settings (Ali et al. </span><a aria-label="Reference 2011" data-dcnode-id="4458" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d34375223e333" title="Ali, T. S., Asad, N., Mogren, I., &amp; Krantz, G. (2011). Intimate partner violence in urban Pakistan: Prevalence, frequency and risk factors. International Journal of Women’s Health, 3, 105–115. doi:
                    10.2147/IJWH.S17016
                    
                  ."><span data-dcnode-id="4459" instrument_node="">2011</span></a><span data-dcnode-id="4457" instrument_node="">; Fulu </span><a aria-label="Reference 2014" data-dcnode-id="4455" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d34375223e336" title="Fulu, E. (2014). Domestic violence in Asia: Globalization, gender and Islam in the Maldives. London: Routledge."><span data-dcnode-id="4456" instrument_node="">2014</span></a><span data-dcnode-id="4454" instrument_node="">; Fulu et al. </span><a aria-label="Reference 2013a" data-dcnode-id="4452" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d34375223e339" title="Fulu, E., Jewkes, R., Roselli, T., &amp; Garcia-Moreno, C. (2013a). Prevalence and risk factors for male perpetration of intimate partner violence: Findings from the UN multi-country cross-sectional study on men and violence in Asia and the Pacific. Lancet Global Health, 1, e187–e207. doi:
                    10.1016/S2214-109X(13)70074-3
                    
                  ."><span data-dcnode-id="4453" instrument_node="">2013a</span></a><span data-dcnode-id="4451" instrument_node="">; Koenig et al. </span><a aria-label="Reference 2003" data-dcnode-id="4449" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d34375223e342" title="Koenig, M. A., Ahmed, S., Hossain, M. B., &amp; Mozumder, A. B. (2003). Women’s status and domestic violence in rural Bangladesh: Individual- and community- level effects. Demography, 40, 269–288. doi:
                    10.1353/dem.2003.0014
                    
                  ."><span data-dcnode-id="4450" instrument_node="">2003</span></a><span data-dcnode-id="4448" instrument_node="">; Sambisa et al. </span><a aria-label="Reference 2011" data-dcnode-id="4446" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR112" id="ref-link-section-d34375223e345" title="Sambisa, W., Angeles, G., Lance, P. M., Naved, R. T., &amp; Thornton, J. (2011). Prevalence and correlates of physical spousal violence against women in slum and nonslum areas of urban Bangladesh. Journal of Interpersonal Violence, 26, 2592–2618. doi:
                    10.1177/0886260510388282
                    
                  ."><span data-dcnode-id="4447" instrument_node="">2011</span></a><span data-dcnode-id="4445" instrument_node="">; Solotaroff and Pande </span><a aria-label="Reference 2014" data-dcnode-id="4443" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR120" id="ref-link-section-d34375223e349" title="Solotaroff, J. L., &amp; Pande, R. P. (2014). Violence against women and girls: Lessons from South Asia. Washington, D.C.: World Bank Group."><span data-dcnode-id="4444" instrument_node="">2014</span></a><span data-dcnode-id="4442" instrument_node="">; Welchman and Hossain </span><a aria-label="Reference 2005" data-dcnode-id="4440" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR128" id="ref-link-section-d34375223e352" title="Welchman, L., &amp; Hossain, S. (2005). Introduction: 'Honour', rights and wrongs. In L. Welchman &amp; S. Hossain (Eds.), Honour: Crimes, paradigms and violence against women (pp. 1–21). Victoria: Spinifex Press."><span data-dcnode-id="4441" instrument_node="">2005</span></a><span data-dcnode-id="4439" instrument_node="">). Simultaneously, feminists have long debated how globalization affects women’s lives (Archer </span><a aria-label="Reference 2009" data-dcnode-id="4437" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d34375223e355" title="Archer, C. C. (2009). Women and globalization. In J. Gelb &amp; M. L. Palley (Eds.), Women and politics around the world: A comparative history and survey (pp. 17–27). Santa Barbara, CA: ABC-CLIO."><span data-dcnode-id="4438" instrument_node="">2009</span></a><span data-dcnode-id="4436" instrument_node="">; Freeman </span><a aria-label="Reference 2001" data-dcnode-id="4434" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d34375223e358" title="Freeman, C. (2001). Is local: Global as feminine: Masculine? Rethinking the gender of globalization. Signs, 26, 1007–1037. doi:
                    10.1086/495646
                    
                  ."><span data-dcnode-id="4435" instrument_node="">2001</span></a><span data-dcnode-id="4433" instrument_node="">), particularly women’s engagement in the labor force (Feldman </span><a aria-label="Reference 1992" data-dcnode-id="4431" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d34375223e361" title="Feldman, S. (1992). Crisis, islam and gender in Bangladesh: The social construction of a female labor force. In L. Beneria &amp; S. Feldman (Eds.), Unequal burden: Economic crises, persistent povery and women’s work (pp. 105–130). Boulder: Westview Press."><span data-dcnode-id="4432" instrument_node="">1992</span></a><span data-dcnode-id="4430" instrument_node="">; Moghadam </span><a aria-label="Reference 1999" data-dcnode-id="4428" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d34375223e364" title="Moghadam, V. M. (1999). Gender and globalization: Female labor and women’s mobilization. Journal of World Systems Research, 2, 367–388."><span data-dcnode-id="4429" instrument_node="">1999</span></a><span data-dcnode-id="4427" instrument_node="">). However, fewer scholars explicitly map how globalized processes affect women’s lives in ways that put them at higher risk of family violence (although see Fulu and Miedema </span><a aria-label="Reference 2015" data-dcnode-id="4425" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d34375223e368" title="Fulu, E., &amp; Miedema, S. (2015). Violence against women: Globalizing the integrated ecological model. Violence Against Women. doi:
                    10.1177/1077801215596244
                    
                  ."><span data-dcnode-id="4426" instrument_node="">2015</span></a><span data-dcnode-id="4424" instrument_node="">;&nbsp;Merry </span><a aria-label="Reference 2001" data-dcnode-id="4422" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d34375223e371" title="Merry, S. E. (2001). Rights, religion and community: Approaches to violence against women in the context of globalization. Law and Society Review, 35, 39–88. doi:
                    10.2307/3185386
                    
                  ."><span data-dcnode-id="4423" instrument_node="">2001</span></a><span data-dcnode-id="4421" instrument_node="">; Radford and Tsutsumi </span><a aria-label="Reference 2004" data-dcnode-id="4419" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d34375223e374" title="Radford, L., &amp; Tsutsumi, K. (2004). Globalization and violence against women - inequalities in risks, responsibilities and blame in the UK and japan. Women's Studies International Forum, 27, 1–12. doi:
                    10.1016/j.wsif.2003.12.008
                    
                  ."><span data-dcnode-id="4420" instrument_node="">2004</span></a><span data-dcnode-id="4418" instrument_node="">). It is these processes of globalization – and the implications for family relations and family violence – that we examine through this article. This exercise demonstrates the theoretical importance of globalization for contemporary feminist research on gender and the family.</span></p><p data-dcnode-id="4397"><span data-dcnode-id="4416" instrument_node="">This critical review focuses on the Muslim-majority societies of Asia to demonstrate the need to close the gap between the fields of globalization and family violence research. First, we review literature on globalization, women and gender in Muslim-majority Asian countries from a feminist globalization perspective. To do so, we discuss feminist orientations toward globalization and use this lens to map major global processes unfolding in Muslim-majority Asian societies. We turn then to the central focus of this article: a review of feminist literature on family relationships and family violence in Muslim-majority societies across the region. We frame and critique this body of research from a feminist globalization perspective, and assess how global forces shape family and gender systems in ways that enhance or minimize women’s exposure to violence. We focus here on Bangladesh, Indonesia, Malaysia and Pakistan. These four countries, although diverse, share some religious and cultural similarities. All four are Muslim-majority settings where Islamic doctrine (to varying extents) shapes social, economic and political institutions and practices (Othman </span><a aria-label="Reference 2006" data-dcnode-id="4414" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d34375223e380" title="Othman, N. (2006). Muslim women and the challenge of islamic fundamentalism/extremism: An overview of southeast asian muslim women's struggle for human rights and gender equality. Women's Studies International Forum, 29, 339–353. doi:
                    10.1016/j.wsif.2006.05.008
                    
                  ."><span data-dcnode-id="4415" instrument_node="">2006</span></a><span data-dcnode-id="4413" instrument_node="">; Siapno </span><a aria-label="Reference 2002" data-dcnode-id="4411" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d34375223e383" title="Siapno, J. A. (2002). Gender, Islam, nationalism and the state in Aceh: The paradox of power, co-optation and resistance. London: Routledge."><span data-dcnode-id="4412" instrument_node="">2002</span></a><span data-dcnode-id="4410" instrument_node="">; Stivens </span><a aria-label="Reference 2006" data-dcnode-id="4408" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d34375223e386" title="Stivens, M. (2006). Family values and islamic revival: Gender, rights and state moral projects in Malaysia. Women's Studies International Forum, 29, 354–367. doi:
                    10.1016/j.wsif.2006.05.007
                    
                  ."><span data-dcnode-id="4409" instrument_node="">2006</span></a><span data-dcnode-id="4407" instrument_node="">; Weiss </span><a aria-label="Reference 2014" data-dcnode-id="4405" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d34375223e389" title="Weiss, A. M. (2014). Interpreting Islam, modernity, and women’s rights in Pakistan. New York: Palgrave Macmillan."><span data-dcnode-id="4406" instrument_node="">2014</span></a><span data-dcnode-id="4404" instrument_node="">). As we discuss later, religiously oriented beliefs and norms around women’s status and the family are largely consistent across the settings. However, the unique cultural characteristics of each society result in variations in Islamic interpretation and practice with regard to family issues (Hilsdon and Rozario </span><a aria-label="Reference 2006" data-dcnode-id="4402" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d34375223e392" title="Hilsdon, A-M., &amp; Rozario, S. (2006). Introduction: Special issue on islam, gender and human rights. Women's Studies International Forum, 29, 331–338. doi:
                    10.1016/j.wsif.2006.05.009
                    
                  
                        "><span data-dcnode-id="4403" instrument_node="">2006</span></a><span data-dcnode-id="4401" instrument_node="">; Mittra and Kumar </span><a aria-label="Reference 2004" data-dcnode-id="4399" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d34375223e396" title="Mittra, S., &amp; Kumar, B. (2004). Encyclopedia of women in South Asia: Maldives (Vol. 8). New Delhi: Kalpaz Publications."><span data-dcnode-id="4400" instrument_node="">2004</span></a><span data-dcnode-id="4398" instrument_node="">). Through the lens of globalization, drawing from studies conducted in these settings, we demonstrate how global forces differentially and similarly affect gender norms in the family and society across all four settings.</span></p><p data-dcnode-id="4392"><span data-dcnode-id="4396" instrument_node="">Secondly, we discuss the issue of family violence as an exemplar through which to understand the impact of globalization on family and gender systems in Muslim-majority Asian cultures and implications for women’s safety and security in the home. We use a case study of the Maldives – a small, Muslim-majority island nation in the Indian Ocean – to map the uniquely localized way in which family relationships are being affected by the “shifting terrain of globalizing processes” and the implications for family violence (Padilla et al. </span><a aria-label="Reference 2007" data-dcnode-id="4394" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR96" id="ref-link-section-d34375223e402" title="Padilla, M. B., Hirsch, J. S., Munoz-Laboy, M., Sember, R. E., &amp; Parker, R. G. (2007). Introduction: Cross-cultural reflections on and intimate intersection. In M. B. Padilla, J. S. Hirsch, M. Munoz-Laboy, R. E. Sember, &amp; R. G. Parker (Eds.), Love and globalization: Transformations of intimacy in the contemporary world (pp. ix-xxxi). Nashville: Vanderbilt University Press."><span data-dcnode-id="4395" instrument_node="">2007</span></a><span data-dcnode-id="4393" instrument_node="">, p. xii). We take the Maldives as a case study for how globalized socio-economic and political trends can alter the landscape of family and society in ways that retract women’s rights and contribute to changes in their immediate environments that put women at risk of violence. We argue that family relationships and family violence can no longer be understood outside the processes of globalization and social change, and that the role of global forces must be integrated into feminist research on these issues.</span></p><p data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">For this review article, we gathered relevant literature through multiple methods, including culling major scholarly databases, accessing institutional publications and gathering materials from colleagues and partners across the region who work directly on these issues in the field.</span></p></div></div></section><section data-dcnode-id="4292" data-gtm-vis-first-on-screen-50443292_562="4448" data-gtm-vis-first-on-screen-50443292_563="4447" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="4448" data-gtm-vis-recent-on-screen-50443292_563="4447" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Feminist Perspectives on Globalization"><div class="c-article-section" data-dcnode-id="4293" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4385" id="Sec2"><span data-dcnode-id="4386" instrument_node="">Feminist Perspectives on Globalization</span></h2><div class="c-article-section__content" data-dcnode-id="4294" id="Sec2-content"><p data-dcnode-id="4353"><span data-dcnode-id="4384" instrument_node="">Globalization is a complex and gendered set of transnational processes that span economic, political, cultural and geographic spheres (Ferguson et al. </span><a aria-label="Reference 2008" data-dcnode-id="4382" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d34375223e417" title="Ferguson, K. E., Merry, S. E., &amp; Mironesco, M. (2008). Introduction. In K. E. Ferguson &amp; M. Mironesco (Eds.), Gender and globalization in Asia and the Pacific: Method, practice and theory (pp. 1–14). Honolulu: University of Hawaii Press."><span data-dcnode-id="4383" instrument_node="">2008</span></a><span data-dcnode-id="4381" instrument_node="">). In this article, the term ‘sphere’ encompasses a variety of meanings but critically implies a spatial concept – the social sites or arenas where meanings are articulated, distributed, and negotiated (Negt and Kluge </span><a aria-label="Reference 1993" data-dcnode-id="4379" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d34375223e420" title="Negt, O., &amp; Kluge, A. (1993). Public sphere and experience: Toward an analysis of the bourgeois and proletarian public sphere. Minneapolis: University of Minnesota Press."><span data-dcnode-id="4380" instrument_node="">1993</span></a><span data-dcnode-id="4378" instrument_node="">). It can refer to physical spaces like workplaces or the home; institutional spaces such as the United Nations; or virtual or discursive spaces that operate at different levels of society, such as policy discourse or transnational grassroots social movements. Although globalization scholarship writ large tends to emphasize the formal and public spheres of activity (Padilla et al. </span><a aria-label="Reference 2007" data-dcnode-id="4376" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR96" id="ref-link-section-d34375223e423" title="Padilla, M. B., Hirsch, J. S., Munoz-Laboy, M., Sember, R. E., &amp; Parker, R. G. (2007). Introduction: Cross-cultural reflections on and intimate intersection. In M. B. Padilla, J. S. Hirsch, M. Munoz-Laboy, R. E. Sember, &amp; R. G. Parker (Eds.), Love and globalization: Transformations of intimacy in the contemporary world (pp. ix-xxxi). Nashville: Vanderbilt University Press."><span data-dcnode-id="4377" instrument_node="">2007</span></a><span data-dcnode-id="4375" instrument_node="">), the informal spheres – the home, the body, the community – remain the sites from which these public spheres are constituted (Nagar et al. </span><a aria-label="Reference 2002" data-dcnode-id="4373" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d34375223e426" title="Nagar, R., Lawson, V., McDowell, L., &amp; Hanson, S. (2002). Locating globalization: Feminist (re) readings of the subjects and spaces of globalization. Economic Geography, 78, 257–284. doi:
                    10.2307/4140810
                    
                  ."><span data-dcnode-id="4374" instrument_node="">2002</span></a><span data-dcnode-id="4372" instrument_node="">). Furthermore, globalization is not neat and linear, but rather “contentious and messy,” (Moghadam </span><a aria-label="Reference 2009" data-dcnode-id="4370" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d34375223e429" title="Moghadam, V. M. (2009). Globalization and social movements: Islamism, feminism and the global justice movement. Lanham: Rowman and Littlefield."><span data-dcnode-id="4371" instrument_node="">2009</span></a><span data-dcnode-id="4369" instrument_node="">, p. 207). Examining globalization from the top, from the vantage points of corporations, global institutions and global political discourses, misses the myriad complexities of how global forces play out on informal spheres of life (Ganguly-Scrase </span><a aria-label="Reference 2003" data-dcnode-id="4367" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d34375223e433" title="Ganguly-Scrase, R. (2003). Paradoxes of globalization, liberalization, and gender equality the worldviews of the lower middle class in West Bengal, India. Gender &amp; Society, 17, 544–566. doi:
                    10.1177/0891243203254077
                    
                  ."><span data-dcnode-id="4368" instrument_node="">2003</span></a><span data-dcnode-id="4366" instrument_node="">; Nagar et al. </span><a aria-label="Reference 2002" data-dcnode-id="4364" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d34375223e436" title="Nagar, R., Lawson, V., McDowell, L., &amp; Hanson, S. (2002). Locating globalization: Feminist (re) readings of the subjects and spaces of globalization. Economic Geography, 78, 257–284. doi:
                    10.2307/4140810
                    
                  ."><span data-dcnode-id="4365" instrument_node="">2002</span></a><span data-dcnode-id="4363" instrument_node="">). The geographical spheres, or “scales” as Nagar et al. (</span><a aria-label="Reference 2002" data-dcnode-id="4361" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d34375223e439" title="Nagar, R., Lawson, V., McDowell, L., &amp; Hanson, S. (2002). Locating globalization: Feminist (re) readings of the subjects and spaces of globalization. Economic Geography, 78, 257–284. doi:
                    10.2307/4140810
                    
                  ."><span data-dcnode-id="4362" instrument_node="">2002</span></a><span data-dcnode-id="4360" instrument_node="">, p. 260) refer to them because they are overlapping, through which to measure the processes of globalization should therefore range from the nation-state to the community, the household and the body (see for example Abaza </span><a aria-label="Reference 2001" data-dcnode-id="4358" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d34375223e442" title="Abaza, M. (2001). Shopping malls, consumer culture and the reshaping of public space in Egypt. Theory, Culture &amp; Society, 19, 97–122. doi:
                    10.1177/02632760122051986
                    
                  ."><span data-dcnode-id="4359" instrument_node="">2001</span></a><span data-dcnode-id="4357" instrument_node=""> and Featherstone </span><a aria-label="Reference 1998" data-dcnode-id="4355" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d34375223e445" title="Featherstone, M. (1998). The flaneur, the city and the virtual public life. Urban Studies, 35, 909–925. doi:
                    10.1080/0042098984619
                    
                  ."><span data-dcnode-id="4356" instrument_node="">1998</span></a><span data-dcnode-id="4354" instrument_node="">). For the purposes of this article we use the word “space” when referring to physical spaces, and the term “sphere” when referring to virtual or discursive spaces.</span></p><p data-dcnode-id="4327"><span data-dcnode-id="4352" instrument_node="">Extant feminist interpretations of how globalization affects women’s lives vary along a spectrum from emancipatory to discriminatory, and emphasize the complex ways in which globalization affects different groups of women (Jaggar </span><a aria-label="Reference 2001" data-dcnode-id="4350" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d34375223e451" title="Jaggar, A. M. (2001). Is globalization good for women? Comparative Literature, 53, 298–314. doi:
                    10.2307/3593521
                    
                  ."><span data-dcnode-id="4351" instrument_node="">2001</span></a><span data-dcnode-id="4349" instrument_node="">; Keck and Sikkink </span><a aria-label="Reference 1998" data-dcnode-id="4347" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d34375223e454" title="Keck, M. E., &amp; Sikkink, K. (1998). Activists beyond borders: Advocacy networks in international politics (Vol. 6). Cambridge: Cambridge University Press."><span data-dcnode-id="4348" instrument_node="">1998</span></a><span data-dcnode-id="4346" instrument_node="">; Moghadam </span><a aria-label="Reference 2009" data-dcnode-id="4344" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d34375223e457" title="Moghadam, V. M. (2009). Globalization and social movements: Islamism, feminism and the global justice movement. Lanham: Rowman and Littlefield."><span data-dcnode-id="4345" instrument_node="">2009</span></a><span data-dcnode-id="4343" instrument_node="">; Nagar et al. </span><a aria-label="Reference 2002" data-dcnode-id="4341" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d34375223e460" title="Nagar, R., Lawson, V., McDowell, L., &amp; Hanson, S. (2002). Locating globalization: Feminist (re) readings of the subjects and spaces of globalization. Economic Geography, 78, 257–284. doi:
                    10.2307/4140810
                    
                  ."><span data-dcnode-id="4342" instrument_node="">2002</span></a><span data-dcnode-id="4340" instrument_node="">). For example, Jaggar (</span><a aria-label="Reference 2001" data-dcnode-id="4338" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d34375223e463" title="Jaggar, A. M. (2001). Is globalization good for women? Comparative Literature, 53, 298–314. doi:
                    10.2307/3593521
                    
                  ."><span data-dcnode-id="4339" instrument_node="">2001</span></a><span data-dcnode-id="4337" instrument_node="">) argues that globalization, while promising social, economic and cultural improvements for women, has instead created increased militarization, economic inequalities and privatization of national commodities, resulting in a system that is hostile to women. Others position globalization as an occasionally positive political force, helping women’s rights groups to mobilize and hold governments accountable through forums and policy spaces, globally (Keck and Sikkink </span><a aria-label="Reference 1998" data-dcnode-id="4335" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d34375223e467" title="Keck, M. E., &amp; Sikkink, K. (1998). Activists beyond borders: Advocacy networks in international politics (Vol. 6). Cambridge: Cambridge University Press."><span data-dcnode-id="4336" instrument_node="">1998</span></a><span data-dcnode-id="4334" instrument_node="">) as well as in Islamic contexts (Evrard </span><a aria-label="Reference 2014" data-dcnode-id="4332" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d34375223e470" title="Evrard, A. Y. (2014). The Moroccan women's rights movement. Syracuse: Syracuse University Press."><span data-dcnode-id="4333" instrument_node="">2014</span></a><span data-dcnode-id="4331" instrument_node="">; Moghadam </span><a aria-label="Reference 2009" data-dcnode-id="4329" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d34375223e473" title="Moghadam, V. M. (2009). Globalization and social movements: Islamism, feminism and the global justice movement. Lanham: Rowman and Littlefield."><span data-dcnode-id="4330" instrument_node="">2009</span></a><span data-dcnode-id="4328" instrument_node="">).</span></p><p data-dcnode-id="4295"><span data-dcnode-id="4326" instrument_node="">Feminist scholarship on globalization attends to the ways in which globalized social forces shape local meanings and practices, as well as how local resistance shapes global structures (Rege </span><a aria-label="Reference 2003" data-dcnode-id="4324" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d34375223e479" title="Rege, S. (2003). More than just tacking women on to the &quot;macropicture&quot;: Feminist contributions to globalisation discourses. Economic and Political Weekly, 38, 4555–4563."><span data-dcnode-id="4325" instrument_node="">2003</span></a><span data-dcnode-id="4323" instrument_node="">; Xu </span><a aria-label="Reference 2009" data-dcnode-id="4321" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR133" id="ref-link-section-d34375223e482" title="Xu, F. (2009). Chinese feminisms encounter international feminisms. International Feminist Journal of Politics, 11, 196–215. doi:
                    10.1080/14616740902789567
                    
                  ."><span data-dcnode-id="4322" instrument_node="">2009</span></a><span data-dcnode-id="4320" instrument_node="">). Ganguly-Scrase (</span><a aria-label="Reference 2003" data-dcnode-id="4318" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d34375223e485" title="Ganguly-Scrase, R. (2003). Paradoxes of globalization, liberalization, and gender equality the worldviews of the lower middle class in West Bengal, India. Gender &amp; Society, 17, 544–566. doi:
                    10.1177/0891243203254077
                    
                  ."><span data-dcnode-id="4319" instrument_node="">2003</span></a><span data-dcnode-id="4317" instrument_node="">) calls for globalization theories grounded in ethnographic-based accounts of the contradictory ways in which globalized forces shape women’s lives. Although Padilla et al. (</span><a aria-label="Reference 2007" data-dcnode-id="4315" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR96" id="ref-link-section-d34375223e488" title="Padilla, M. B., Hirsch, J. S., Munoz-Laboy, M., Sember, R. E., &amp; Parker, R. G. (2007). Introduction: Cross-cultural reflections on and intimate intersection. In M. B. Padilla, J. S. Hirsch, M. Munoz-Laboy, R. E. Sember, &amp; R. G. Parker (Eds.), Love and globalization: Transformations of intimacy in the contemporary world (pp. ix-xxxi). Nashville: Vanderbilt University Press."><span data-dcnode-id="4316" instrument_node="">2007</span></a><span data-dcnode-id="4314" instrument_node="">) suggest that there is a gap in the literature in terms of examining the linkages between macro-structural trends of globalization and the subjective experiences and local meanings of actors in specific cultural settings, there are exceptions to this (see Abaza </span><a aria-label="Reference 2001" data-dcnode-id="4312" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d34375223e491" title="Abaza, M. (2001). Shopping malls, consumer culture and the reshaping of public space in Egypt. Theory, Culture &amp; Society, 19, 97–122. doi:
                    10.1177/02632760122051986
                    
                  ."><span data-dcnode-id="4313" instrument_node="">2001</span></a><span data-dcnode-id="4311" instrument_node="">; Featherstone </span><a aria-label="Reference 1998" data-dcnode-id="4309" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d34375223e495" title="Featherstone, M. (1998). The flaneur, the city and the virtual public life. Urban Studies, 35, 909–925. doi:
                    10.1080/0042098984619
                    
                  ."><span data-dcnode-id="4310" instrument_node="">1998</span></a><span data-dcnode-id="4308" instrument_node="">; Robertson </span><a aria-label="Reference 1990" data-dcnode-id="4306" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d34375223e498" title="Robertson, R. (1990). Globalization, social theory and global culture. London: Sage Publications."><span data-dcnode-id="4307" instrument_node="">1990</span></a><span data-dcnode-id="4305" instrument_node="">; Robertson and Khondker </span><a aria-label="Reference 1998" data-dcnode-id="4303" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR109" id="ref-link-section-d34375223e501" title="Robertson, R., &amp; Khondker, H. H. (1998). Discourses of globalization: Preliminary considerations. International Sociology, 13, 25–40. doi:
                    10.1177/026858098013001004
                    
                  ."><span data-dcnode-id="4304" instrument_node="">1998</span></a><span data-dcnode-id="4302" instrument_node="">). Illustratively, Moghadam (</span><a aria-label="Reference 2009" data-dcnode-id="4300" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d34375223e504" title="Moghadam, V. M. (2009). Globalization and social movements: Islamism, feminism and the global justice movement. Lanham: Rowman and Littlefield."><span data-dcnode-id="4301" instrument_node="">2009</span></a><span data-dcnode-id="4299" instrument_node="">) argues that transnational movements are, in essence, the result of resistance and protest to processes of globalization throughout the world. Thus, globalization shapes the local, and localized resistance constitutes the globalization process (Rege </span><a aria-label="Reference 2003" data-dcnode-id="4297" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d34375223e507" title="Rege, S. (2003). More than just tacking women on to the &quot;macropicture&quot;: Feminist contributions to globalisation discourses. Economic and Political Weekly, 38, 4555–4563."><span data-dcnode-id="4298" instrument_node="">2003</span></a><span data-dcnode-id="4296" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="4153" data-gtm-vis-first-on-screen-50443292_562="4449" data-gtm-vis-first-on-screen-50443292_563="4448" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="4449" data-gtm-vis-recent-on-screen-50443292_563="4448" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="A Macro Framework: Contemporary Global Processes in Muslim-Majority Asian Societies"><div class="c-article-section" data-dcnode-id="4154" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4290" id="Sec3"><span data-dcnode-id="4291" instrument_node="">A Macro Framework: Contemporary Global Processes in Muslim-Majority Asian Societies</span></h2><div class="c-article-section__content" data-dcnode-id="4155" id="Sec3-content"><p data-dcnode-id="4288"><span data-dcnode-id="4289" instrument_node="">Before reviewing how global forces shape women’s lives, we first reflect on three major contemporary globalization processes that are taking place at the macro level in the Asian region: Islamization, democratization, and economic globalization including migration. These three vectors will serve as a guiding framework to assess the influence of macro global forces on gender and family systems throughout the article.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4286" id="Sec4"><span data-dcnode-id="4287" instrument_node="">A Politicized Global Islam</span></h3><p data-dcnode-id="4263"><span data-dcnode-id="4285" instrument_node="">The interpretation and practice of Islam in Asia is highly diverse (Mittra and Kumar </span><a aria-label="Reference 2004" data-dcnode-id="4283" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d34375223e525" title="Mittra, S., &amp; Kumar, B. (2004). Encyclopedia of women in South Asia: Maldives (Vol. 8). New Delhi: Kalpaz Publications."><span data-dcnode-id="4284" instrument_node="">2004</span></a><span data-dcnode-id="4282" instrument_node="">), yet global forces of Islamization are consistently influencing local religious practices and beliefs across the region (Moghadam </span><a aria-label="Reference 2009" data-dcnode-id="4280" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d34375223e528" title="Moghadam, V. M. (2009). Globalization and social movements: Islamism, feminism and the global justice movement. Lanham: Rowman and Littlefield."><span data-dcnode-id="4281" instrument_node="">2009</span></a><span data-dcnode-id="4279" instrument_node="">; Othman </span><a aria-label="Reference 2006" data-dcnode-id="4277" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d34375223e531" title="Othman, N. (2006). Muslim women and the challenge of islamic fundamentalism/extremism: An overview of southeast asian muslim women's struggle for human rights and gender equality. Women's Studies International Forum, 29, 339–353. doi:
                    10.1016/j.wsif.2006.05.008
                    
                  ."><span data-dcnode-id="4278" instrument_node="">2006</span></a><span data-dcnode-id="4276" instrument_node="">; Stivens </span><a aria-label="Reference 2006" data-dcnode-id="4274" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d34375223e534" title="Stivens, M. (2006). Family values and islamic revival: Gender, rights and state moral projects in Malaysia. Women's Studies International Forum, 29, 354–367. doi:
                    10.1016/j.wsif.2006.05.007
                    
                  ."><span data-dcnode-id="4275" instrument_node="">2006</span></a><span data-dcnode-id="4273" instrument_node="">). Lindberg (</span><a aria-label="Reference 2009" data-dcnode-id="4271" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d34375223e537" title="Lindberg, A. (2009). Islamisation, modernisation or globalisation? Changed gender relations among south indian muslims. South Asia: Journal of South Asian Studies, 32, 86–109. doi:
                    10.1080/00856400802709292
                    
                  ."><span data-dcnode-id="4272" instrument_node="">2009</span></a><span data-dcnode-id="4270" instrument_node="">, p. 86) uses the term </span><i data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">Islamization</span></i><span data-dcnode-id="4267" instrument_node=""> to represent not a fixed ideology that is spreading across the world, but rather “a changing perception that strengthens religious and cultural values among people who consider themselves Muslim.” From a social movements perspective, Moghadam (</span><a aria-label="Reference 2009" data-dcnode-id="4265" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d34375223e544" title="Moghadam, V. M. (2009). Globalization and social movements: Islamism, feminism and the global justice movement. Lanham: Rowman and Littlefield."><span data-dcnode-id="4266" instrument_node="">2009</span></a><span data-dcnode-id="4264" instrument_node="">) sees global, political Islamization as a transnational movement for collective action toward global change, based on religious beliefs and interpretation. There are two critical elements of this phenomenon to discuss in relation to this article: the global nature and the gendered nature of Islamization.</span></p><p data-dcnode-id="4225"><span data-dcnode-id="4262" instrument_node="">First, Islamization is inherently globalized (Derichs and Fleschenberg </span><a aria-label="Reference 2010" data-dcnode-id="4260" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d34375223e550" title="Derichs, C., &amp; Fleschenberg, A. (2010). Religious fundamentalism and their gendered impacts in Asia. In C. Derichs &amp; A. Fleschenberg (Eds.), Religious fundamentalism and their gendered impacts in asia (pp. 7–12). Berlin: Friedrich-Ebert-Stiftung."><span data-dcnode-id="4261" instrument_node="">2010</span></a><span data-dcnode-id="4259" instrument_node="">; Hilsdon and Rozario </span><a aria-label="Reference 2006" data-dcnode-id="4257" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d34375223e553" title="Hilsdon, A-M., &amp; Rozario, S. (2006). Introduction: Special issue on islam, gender and human rights. Women's Studies International Forum, 29, 331–338. doi:
                    10.1016/j.wsif.2006.05.009
                    
                  
                        "><span data-dcnode-id="4258" instrument_node="">2006</span></a><span data-dcnode-id="4256" instrument_node="">; Moghadam </span><a aria-label="Reference 2009" data-dcnode-id="4254" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d34375223e556" title="Moghadam, V. M. (2009). Globalization and social movements: Islamism, feminism and the global justice movement. Lanham: Rowman and Littlefield."><span data-dcnode-id="4255" instrument_node="">2009</span></a><span data-dcnode-id="4253" instrument_node="">; Othman </span><a aria-label="Reference 2006" data-dcnode-id="4251" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d34375223e559" title="Othman, N. (2006). Muslim women and the challenge of islamic fundamentalism/extremism: An overview of southeast asian muslim women's struggle for human rights and gender equality. Women's Studies International Forum, 29, 339–353. doi:
                    10.1016/j.wsif.2006.05.008
                    
                  ."><span data-dcnode-id="4252" instrument_node="">2006</span></a><span data-dcnode-id="4250" instrument_node="">; Rinaldo </span><a aria-label="Reference 2008" data-dcnode-id="4248" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR107" id="ref-link-section-d34375223e562" title="Rinaldo, R. (2008). Muslim women, middle class habitus, and modernity in Indonesia. Contemporary Islam, 2, 23–39. doi:
                    10.1007/s11562-007-0035-6
                    
                  ."><span data-dcnode-id="4249" instrument_node="">2008</span></a><span data-dcnode-id="4247" instrument_node="">). The increasing influence of transnational Islam from the Middle East, with its emphasis on piety and stricter adherence to religious practices (Rinaldo </span><a aria-label="Reference 2008" data-dcnode-id="4245" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR107" id="ref-link-section-d34375223e566" title="Rinaldo, R. (2008). Muslim women, middle class habitus, and modernity in Indonesia. Contemporary Islam, 2, 23–39. doi:
                    10.1007/s11562-007-0035-6
                    
                  ."><span data-dcnode-id="4246" instrument_node="">2008</span></a><span data-dcnode-id="4244" instrument_node="">) serves as a response to threat of changes that disrupt patterns of social behaviour as a result of global forces (Derichs and Fleschenberg </span><a aria-label="Reference 2010" data-dcnode-id="4242" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d34375223e569" title="Derichs, C., &amp; Fleschenberg, A. (2010). Religious fundamentalism and their gendered impacts in Asia. In C. Derichs &amp; A. Fleschenberg (Eds.), Religious fundamentalism and their gendered impacts in asia (pp. 7–12). Berlin: Friedrich-Ebert-Stiftung."><span data-dcnode-id="4243" instrument_node="">2010</span></a><span data-dcnode-id="4241" instrument_node="">; Stivens </span><a aria-label="Reference 2006" data-dcnode-id="4239" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d34375223e572" title="Stivens, M. (2006). Family values and islamic revival: Gender, rights and state moral projects in Malaysia. Women's Studies International Forum, 29, 354–367. doi:
                    10.1016/j.wsif.2006.05.007
                    
                  ."><span data-dcnode-id="4240" instrument_node="">2006</span></a><span data-dcnode-id="4238" instrument_node="">). At the same, the Islamization movement relies heavily on globalized technology and communication resources to mobilize support and spread its message (Moghadam </span><a aria-label="Reference 2009" data-dcnode-id="4236" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d34375223e575" title="Moghadam, V. M. (2009). Globalization and social movements: Islamism, feminism and the global justice movement. Lanham: Rowman and Littlefield."><span data-dcnode-id="4237" instrument_node="">2009</span></a><span data-dcnode-id="4235" instrument_node="">). This global conservative ideology promotes an Islamic social order through laws, institutions and civil consciousness, and shifts the local character of religion and social systems. As Othman (</span><a aria-label="Reference 2006" data-dcnode-id="4233" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d34375223e578" title="Othman, N. (2006). Muslim women and the challenge of islamic fundamentalism/extremism: An overview of southeast asian muslim women's struggle for human rights and gender equality. Women's Studies International Forum, 29, 339–353. doi:
                    10.1016/j.wsif.2006.05.008
                    
                  ."><span data-dcnode-id="4234" instrument_node="">2006</span></a><span data-dcnode-id="4232" instrument_node="">, p. 34) discusses, in the context of Malaysia, the rise of Islamization in the region is a struggle over “what is Islam and whose Islam is the right Islam”? Hilsdon and Rozario (</span><a aria-label="Reference 2006" data-dcnode-id="4230" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d34375223e581" title="Hilsdon, A-M., &amp; Rozario, S. (2006). Introduction: Special issue on islam, gender and human rights. Women's Studies International Forum, 29, 331–338. doi:
                    10.1016/j.wsif.2006.05.009
                    
                  
                        "><span data-dcnode-id="4231" instrument_node="">2006</span></a><span data-dcnode-id="4229" instrument_node="">, p. 332) clearly articulate this complexity, noting how “a new universal, international Islam, that of the so-called Islamist movements, is replacing the more varied local Islamic beliefs and practices found in different regional and cultural contexts.” Interpretation – or </span><i data-dcnode-id="4227"><span data-dcnode-id="4228" instrument_node="">ijtihad</span></i><span data-dcnode-id="4226" instrument_node=""> – therefore, takes on particular salience in settings where local customs are reconstituted in the context of a global, homogenous form of Islam, posing, as we will see, particular challenges to Muslim feminists.</span></p><p data-dcnode-id="4196"><span data-dcnode-id="4224" instrument_node="">Second, the structures and systems of Islamization are gendered (Gerami </span><a aria-label="Reference 2005" data-dcnode-id="4222" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d34375223e591" title="Gerami, S. (2005). Islamist masculinity and muslim masculinities. In M. S. Kimmel, J. Hearn, &amp; R. W. Connell (Eds.), Handbook of studies on men and masculinities (pp. 448–457). Thousand Oaks: Sage Publications."><span data-dcnode-id="4223" instrument_node="">2005</span></a><span data-dcnode-id="4221" instrument_node="">; Moghadam </span><a aria-label="Reference 2009" data-dcnode-id="4219" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d34375223e594" title="Moghadam, V. M. (2009). Globalization and social movements: Islamism, feminism and the global justice movement. Lanham: Rowman and Littlefield."><span data-dcnode-id="4220" instrument_node="">2009</span></a><span data-dcnode-id="4218" instrument_node="">). Hegemonic versions of Islamist masculinity based on religious interpretation shape and define the movements' discourses and strategies (Moghadam </span><a aria-label="Reference 2009" data-dcnode-id="4216" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d34375223e597" title="Moghadam, V. M. (2009). Globalization and social movements: Islamism, feminism and the global justice movement. Lanham: Rowman and Littlefield."><span data-dcnode-id="4217" instrument_node="">2009</span></a><span data-dcnode-id="4215" instrument_node="">). Speaking of Islamic interpretation, founder of transnational feminist network Women Living Under Muslim Laws (</span><a data-dcnode-id="4213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wluml.org/"><span data-dcnode-id="4214" instrument_node="">http://www.wluml.org</span></a><span data-dcnode-id="4212" instrument_node="">/), Helie-Lucas argues that “many local customs and traditions practiced in the name of Islam in one part of the world were in fact unheard of in others…[yet] not only are there varied and contradictory interpretations of the Koran…but [men] are the only ones so far who have defined the status of Muslim women” (quoted in Moghadam </span><a aria-label="Reference 2001" data-dcnode-id="4210" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d34375223e607" title="Moghadam, V. M. (2001). Feminism and islamic fundamentalism: A secularist interpretation. Journal of Women's History, 13, 42–45. doi:
                    10.1353/jowh.2001.0029
                    
                  ."><span data-dcnode-id="4211" instrument_node="">2001</span></a><span data-dcnode-id="4209" instrument_node="">, p. 74). Gerami (</span><a aria-label="Reference 2005" data-dcnode-id="4207" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d34375223e611" title="Gerami, S. (2005). Islamist masculinity and muslim masculinities. In M. S. Kimmel, J. Hearn, &amp; R. W. Connell (Eds.), Handbook of studies on men and masculinities (pp. 448–457). Thousand Oaks: Sage Publications."><span data-dcnode-id="4208" instrument_node="">2005</span></a><span data-dcnode-id="4206" instrument_node="">) suggests that new ideas of Islamist masculinity are a product of fundamentalist resistance movements, media and a resultant focus on reinstating an earlier, more pure, Islamic society. This increased leverage of religious fundamentalist groups affect women disproportionately (Othman </span><a aria-label="Reference 2006" data-dcnode-id="4204" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d34375223e614" title="Othman, N. (2006). Muslim women and the challenge of islamic fundamentalism/extremism: An overview of southeast asian muslim women's struggle for human rights and gender equality. Women's Studies International Forum, 29, 339–353. doi:
                    10.1016/j.wsif.2006.05.008
                    
                  ."><span data-dcnode-id="4205" instrument_node="">2006</span></a><span data-dcnode-id="4203" instrument_node="">; Stivens </span><a aria-label="Reference 2006" data-dcnode-id="4201" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d34375223e617" title="Stivens, M. (2006). Family values and islamic revival: Gender, rights and state moral projects in Malaysia. Women's Studies International Forum, 29, 354–367. doi:
                    10.1016/j.wsif.2006.05.007
                    
                  ."><span data-dcnode-id="4202" instrument_node="">2006</span></a><span data-dcnode-id="4200" instrument_node="">; Weiss </span><a aria-label="Reference 2014" data-dcnode-id="4198" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d34375223e620" title="Weiss, A. M. (2014). Interpreting Islam, modernity, and women’s rights in Pakistan. New York: Palgrave Macmillan."><span data-dcnode-id="4199" instrument_node="">2014</span></a><span data-dcnode-id="4197" instrument_node="">). Efforts to map the influence of multiple and contradictory elements of globalization using ethnographic evidence from the ground will help to more clearly understand how women’s lives are influenced by these forces in Muslim-majority Asian settings.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4194" id="Sec5"><span data-dcnode-id="4195" instrument_node="">Democratization</span></h3><p data-dcnode-id="4174"><span data-dcnode-id="4193" instrument_node="">The post-colonial period in Asia has seen a growth of democratic political systems emerging across the region, although not in all countries (Kinnvall and Jönsson </span><a aria-label="Reference 2002" data-dcnode-id="4191" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d34375223e631" title="Kinnvall, C., &amp; Jönsson, K. (2002). Globalization and democratization in Asia: The construction of identity. New York: Routledge."><span data-dcnode-id="4192" instrument_node="">2002</span></a><span data-dcnode-id="4190" instrument_node="">). These political forces continue to intersect with Islamic political ideologies described above (Fulu </span><a aria-label="Reference 2014" data-dcnode-id="4188" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d34375223e634" title="Fulu, E. (2014). Domestic violence in Asia: Globalization, gender and Islam in the Maldives. London: Routledge."><span data-dcnode-id="4189" instrument_node="">2014</span></a><span data-dcnode-id="4187" instrument_node="">; Othman </span><a aria-label="Reference 2006" data-dcnode-id="4185" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d34375223e637" title="Othman, N. (2006). Muslim women and the challenge of islamic fundamentalism/extremism: An overview of southeast asian muslim women's struggle for human rights and gender equality. Women's Studies International Forum, 29, 339–353. doi:
                    10.1016/j.wsif.2006.05.008
                    
                  ."><span data-dcnode-id="4186" instrument_node="">2006</span></a><span data-dcnode-id="4184" instrument_node="">). Ironically, the parallel development of these two ideologies created two socio-political phenomena. One, democratization provided an opportunity for politicized Islamist groups to gain political power in settings where this had not been historically possible (Fulu </span><a aria-label="Reference 2014" data-dcnode-id="4182" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d34375223e640" title="Fulu, E. (2014). Domestic violence in Asia: Globalization, gender and Islam in the Maldives. London: Routledge."><span data-dcnode-id="4183" instrument_node="">2014</span></a><span data-dcnode-id="4181" instrument_node="">). Two, the Islamization agenda, with its greater emphasis on an Islamic social order, became a way to legitimize political parties with local constituencies (such as in Malaysia, see Othman </span><a aria-label="Reference 2006" data-dcnode-id="4179" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d34375223e643" title="Othman, N. (2006). Muslim women and the challenge of islamic fundamentalism/extremism: An overview of southeast asian muslim women's struggle for human rights and gender equality. Women's Studies International Forum, 29, 339–353. doi:
                    10.1016/j.wsif.2006.05.008
                    
                  ."><span data-dcnode-id="4180" instrument_node="">2006</span></a><span data-dcnode-id="4178" instrument_node="">). The growing political strength of Islamist parties within democratic systems has resulted in some set backs for women’s rights and personal status, in which the control of women becomes a way to gain political and religious legitimacy (such as in Pakistan, see Weiss </span><a aria-label="Reference 2014" data-dcnode-id="4176" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d34375223e647" title="Weiss, A. M. (2014). Interpreting Islam, modernity, and women’s rights in Pakistan. New York: Palgrave Macmillan."><span data-dcnode-id="4177" instrument_node="">2014</span></a><span data-dcnode-id="4175" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4172" id="Sec6"><span data-dcnode-id="4173" instrument_node="">Economic Globalization and Migration</span></h3><p data-dcnode-id="4158"><span data-dcnode-id="4171" instrument_node="">Economic globalization and rapid economic growth have contributed to changing labour markets and labour needs across Asia, and resulted in significant flows of people across borders, altering the social landscape of the region. Migration trajectories are diverse. Large populations migrate out of the region, particularly to the Arab Gulf States, for low-skill labour work. Migration within the region is also substantial. International Organization of Migration [IOM] (</span><a aria-label="Reference 2014" data-dcnode-id="4169" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d34375223e658" title="International Organization of Migration [IOM] (2014). The regional migration context: Asia and the Pacific. Bangkok: IOM Retrieved from 
                    https://www.iom.int/asia-and-pacific
                    
                  ."><span data-dcnode-id="4170" instrument_node="">2014</span></a><span data-dcnode-id="4168" instrument_node="">) estimated that 43&nbsp;% of Asian migrants move to countries within the region. The past decades have also witnessed a feminization of migration, with women making up large proportions of transient populations moving for work outside and within Asia. In 2000, Asian women made up an estimated one-third of the six million labour migrants in the region (Piper and Yamanaka </span><a aria-label="Reference 2005" data-dcnode-id="4166" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d34375223e661" title="Piper, N., &amp; Yamanaka, K. (2005). Feminized migration in East and Southeast Asia: Policies, actions and empowerment. (Occasional Paper 11) . Geneva: UNRISD."><span data-dcnode-id="4167" instrument_node="">2005</span></a><span data-dcnode-id="4165" instrument_node="">). As Afsar (</span><a aria-label="Reference 2005" data-dcnode-id="4163" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d34375223e664" title="Afsar, R. (2005). Migration: Labour and remittances in South Asia. In S. Joseph (Ed.), Encyclopedia of women and Islamic cultures: Family, body, sexuality and health (Vol. 3, pp. 413–417). Boston: Brill."><span data-dcnode-id="4164" instrument_node="">2005</span></a><span data-dcnode-id="4162" instrument_node="">) notes, in the context of female migrants from Bangladesh to the Gulf States, migrant women defy widespread cultural beliefs and norms that restrict women’s mobility through their engagement in transnational labour. As we will see, in the context of Muslim-majority settings in Asia, these trends have had considerable influence on women’s movement and ability to occupy certain spaces within society, as well as created tension between women’s expected social roles and their labour force participation, internally and internationally. Further, as Moghadam (</span><a aria-label="Reference 2009" data-dcnode-id="4160" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d34375223e667" title="Moghadam, V. M. (2009). Globalization and social movements: Islamism, feminism and the global justice movement. Lanham: Rowman and Littlefield."><span data-dcnode-id="4161" instrument_node="">2009</span></a><span data-dcnode-id="4159" instrument_node="">, p. 47) aptly notes, “Islamism has been globalized through migration”. The movement of women and men between Asia and the Gulf States has contributed to the globalized shift of Islamic discourse and practice within the region, with implications for women’s rights and freedoms in Muslim-majority Asian societies.</span></p><p data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">These three vectors of globalization – Islamization, democratization and economic globalization and migration – serve as a guiding framework to assess the influence of global forces on gender and family systems. We use family violence as the exemplar through which to understand the consequences of these macro processes on local gendered family dynamics in Muslim-majority Asian societies.</span></p></div></div></section><section data-dcnode-id="3855" data-title="Current Feminist Issues: The Impact of Globalization on Family Relationships and Violence in Muslim-Majority Asian Settings"><div class="c-article-section" data-dcnode-id="3856" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4151" id="Sec7"><span data-dcnode-id="4152" instrument_node="">Current Feminist Issues: The Impact of Globalization on Family Relationships and Violence in Muslim-Majority Asian Settings</span></h2><div class="c-article-section__content" data-dc
