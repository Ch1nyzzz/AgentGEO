node-id="3857" id="Sec7-content"><p data-dcnode-id="4146"><span data-dcnode-id="4150" instrument_node="">We turn now to reviewing extant feminist literature on gender and the family in Muslim-majority settings across Asia. We do not attempt to conduct a comprehensive review of women in Islamic societies (see instead Joseph and Nağmābādī </span><a aria-label="Reference 2003" data-dcnode-id="4148" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d34375223e682" title="Joseph, S., &amp; Nağmābādī, A. (2003). Encyclopedia of women and Islamic cultures: Family, law and politics (Vol. 2). Boston: Brill."><span data-dcnode-id="4149" instrument_node="">2003</span></a><span data-dcnode-id="4147" instrument_node="">). Rather, we discuss common and contradictory patterns of women’s lives across these societies, looking specifically at the effects of globalization on gender and family dynamics, and the implications for women’s exposure to family violence.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4144" id="Sec8"><span data-dcnode-id="4145" instrument_node="">Women’s Status in Society</span></h3><p data-dcnode-id="4112"><span data-dcnode-id="4143" instrument_node="">The status of women in Muslim-majority countries and the nature of their roles in society remain salient topics within feminist scholarship in Asia (Othman </span><a aria-label="Reference 2006" data-dcnode-id="4141" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d34375223e692" title="Othman, N. (2006). Muslim women and the challenge of islamic fundamentalism/extremism: An overview of southeast asian muslim women's struggle for human rights and gender equality. Women's Studies International Forum, 29, 339–353. doi:
                    10.1016/j.wsif.2006.05.008
                    
                  ."><span data-dcnode-id="4142" instrument_node="">2006</span></a><span data-dcnode-id="4140" instrument_node="">; Stivens </span><a aria-label="Reference 2006" data-dcnode-id="4138" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d34375223e695" title="Stivens, M. (2006). Family values and islamic revival: Gender, rights and state moral projects in Malaysia. Women's Studies International Forum, 29, 354–367. doi:
                    10.1016/j.wsif.2006.05.007
                    
                  ."><span data-dcnode-id="4139" instrument_node="">2006</span></a><span data-dcnode-id="4137" instrument_node="">; Weiss </span><a aria-label="Reference 2014" data-dcnode-id="4135" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d34375223e698" title="Weiss, A. M. (2014). Interpreting Islam, modernity, and women’s rights in Pakistan. New York: Palgrave Macmillan."><span data-dcnode-id="4136" instrument_node="">2014</span></a><span data-dcnode-id="4134" instrument_node="">). The diversity of Muslim practices, beliefs and structures across the region is reflective of the overall cultural diversity that characterizes the Asia region (Mittra and Kumar </span><a aria-label="Reference 2004" data-dcnode-id="4132" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d34375223e701" title="Mittra, S., &amp; Kumar, B. (2004). Encyclopedia of women in South Asia: Maldives (Vol. 8). New Delhi: Kalpaz Publications."><span data-dcnode-id="4133" instrument_node="">2004</span></a><span data-dcnode-id="4131" instrument_node="">). Yet, popular discourse of Muslim women across the region emphasizes religion-based narratives of obedience, duty and subordination to male relatives and husbands, and social roles that are defined by women’s responsibilities in the family, as daughter, wife and mother (Fazalbhoy </span><a aria-label="Reference 2006" data-dcnode-id="4129" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d34375223e704" title="Fazalbhoy, N. (2006). Marriage practices: South Asia. In S. Joseph (Ed.), Encyclopedia of women and Islamic cultures: Family, body, sexuality and health (Vol. 3, pp. 260–262). Boston: Brill."><span data-dcnode-id="4130" instrument_node="">2006</span></a><span data-dcnode-id="4128" instrument_node="">; Othman </span><a aria-label="Reference 2006" data-dcnode-id="4126" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d34375223e708" title="Othman, N. (2006). Muslim women and the challenge of islamic fundamentalism/extremism: An overview of southeast asian muslim women's struggle for human rights and gender equality. Women's Studies International Forum, 29, 339–353. doi:
                    10.1016/j.wsif.2006.05.008
                    
                  ."><span data-dcnode-id="4127" instrument_node="">2006</span></a><span data-dcnode-id="4125" instrument_node="">; Weiss </span><a aria-label="Reference 2014" data-dcnode-id="4123" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d34375223e711" title="Weiss, A. M. (2014). Interpreting Islam, modernity, and women’s rights in Pakistan. New York: Palgrave Macmillan."><span data-dcnode-id="4124" instrument_node="">2014</span></a><span data-dcnode-id="4122" instrument_node="">). Yet, as Hilsdon and Rozario (</span><a aria-label="Reference 2006" data-dcnode-id="4120" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d34375223e714" title="Hilsdon, A-M., &amp; Rozario, S. (2006). Introduction: Special issue on islam, gender and human rights. Women's Studies International Forum, 29, 331–338. doi:
                    10.1016/j.wsif.2006.05.009
                    
                  
                        "><span data-dcnode-id="4121" instrument_node="">2006</span></a><span data-dcnode-id="4119" instrument_node="">, p. 332) counter, the diversity of Muslim women’s lives means that “while, like all major world religions, Islam has a strong patriarchal element, the way it is practiced and experienced by women does not depend on religion alone but on many other factors.” Indeed, using ethnographic accounts of Muslim women in Aceh, Indonesia, Siapno (</span><a aria-label="Reference 2002" data-dcnode-id="4117" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d34375223e717" title="Siapno, J. A. (2002). Gender, Islam, nationalism and the state in Aceh: The paradox of power, co-optation and resistance. London: Routledge."><span data-dcnode-id="4118" instrument_node="">2002</span></a><span data-dcnode-id="4116" instrument_node="">) shows how rural women play dominant roles in social functions and challenge narratives of Muslim women as subordinate or oppressed. At the same time, women’s bodies do continue to serve as a symbol of cultural identity and control, particularly in the context of post-colonial Asia in which the Muslim woman becomes “a reassertion of ‘an authentic cultural identity’…pitted against the influence of ideologies originating from the West” (Othman </span><a aria-label="Reference 2006" data-dcnode-id="4114" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d34375223e720" title="Othman, N. (2006). Muslim women and the challenge of islamic fundamentalism/extremism: An overview of southeast asian muslim women's struggle for human rights and gender equality. Women's Studies International Forum, 29, 339–353. doi:
                    10.1016/j.wsif.2006.05.008
                    
                  ."><span data-dcnode-id="4115" instrument_node="">2006</span></a><span data-dcnode-id="4113" instrument_node="">, p. 343).</span></p><p data-dcnode-id="4086"><span data-dcnode-id="4111" instrument_node="">The growing salience of Islamist ideology across the region is shifting notions of women and the family, in ways that often retract human rights gains made by Muslim women in the post-colonial period (Othman </span><a aria-label="Reference 2006" data-dcnode-id="4109" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d34375223e726" title="Othman, N. (2006). Muslim women and the challenge of islamic fundamentalism/extremism: An overview of southeast asian muslim women's struggle for human rights and gender equality. Women's Studies International Forum, 29, 339–353. doi:
                    10.1016/j.wsif.2006.05.008
                    
                  ."><span data-dcnode-id="4110" instrument_node="">2006</span></a><span data-dcnode-id="4108" instrument_node="">). The family serves as the locus for a purer version of Islam, and women, as bearers of children, become guardians of this future of envisioned social change. A uniform kind of veiling is but one visible symbol of these efforts to promote an Islamic social order (Moghadam </span><a aria-label="Reference 2009" data-dcnode-id="4106" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d34375223e729" title="Moghadam, V. M. (2009). Globalization and social movements: Islamism, feminism and the global justice movement. Lanham: Rowman and Littlefield."><span data-dcnode-id="4107" instrument_node="">2009</span></a><span data-dcnode-id="4105" instrument_node="">), as is an emphasis on virginity before marriage. Yet, ethnographic work from Muslim-majority Azerbaijan problematizes the associations between veiling and notions of </span><i data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">traditional</span></i><span data-dcnode-id="4102" instrument_node=""> and </span><i data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">modern</span></i><span data-dcnode-id="4099" instrument_node="">, as the return to veiling among well-educated Muslim women has become a method of self-identification in the context of social upheaval, while simultaneously causing concern about the loss of gains in women’s equal participation in society (Heyat </span><a aria-label="Reference 2006" data-dcnode-id="4097" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d34375223e738" title="Heyat, F. (2006). Globalisation and changing gender norms in Azerbaijan. International Feminist Journal of Politics, 8, 394–412. doi:
                    10.1080/14616740600793010
                    
                  ."><span data-dcnode-id="4098" instrument_node="">2006</span></a><span data-dcnode-id="4096" instrument_node="">, p. 362). While the issue of veiling is complex and often ambiguous in terms of meaning-making (Smith-Hefner </span><a aria-label="Reference 2007" data-dcnode-id="4094" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d34375223e742" title="Smith-Hefner, N. (2007). Javanese women and the veil in post-soharto Indonesia. The Journal of Asian Studies, 66, 389–420. doi:
                    10.1017/S0021911807000575
                    
                  ."><span data-dcnode-id="4095" instrument_node="">2007</span></a><span data-dcnode-id="4093" instrument_node="">), in places where it signals a larger social shift toward conservative gender ideology, it can have implications for women’s exposure to violence. Evidence from Bangladesh suggests that more conservative social beliefs around women’s role in society can put women at risk of violence, particularly when women transgress these dominant norms (Koenig et al. </span><a aria-label="Reference 2003" data-dcnode-id="4091" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d34375223e745" title="Koenig, M. A., Ahmed, S., Hossain, M. B., &amp; Mozumder, A. B. (2003). Women’s status and domestic violence in rural Bangladesh: Individual- and community- level effects. Demography, 40, 269–288. doi:
                    10.1353/dem.2003.0014
                    
                  ."><span data-dcnode-id="4092" instrument_node="">2003</span></a><span data-dcnode-id="4090" instrument_node="">), and that these beliefs can hinder women’s help-seeking behaviours after experiencing abuse (Schuler et al. </span><a aria-label="Reference 2008" data-dcnode-id="4088" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR115" id="ref-link-section-d34375223e748" title="Schuler, S. R., Bates, K., &amp; Islam, F. (2008). Women’s rights, domestic violence, and recourse seeking in rural Bangladesh. Violence Against Women, 14, 326–345. doi:
                    10.1177/0886260510388282
                    
                  ."><span data-dcnode-id="4089" instrument_node="">2008</span></a><span data-dcnode-id="4087" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4084" id="Sec9"><span data-dcnode-id="4085" instrument_node="">Marriage, Divorce and Family Patterns</span></h3><p data-dcnode-id="4043"><span data-dcnode-id="4083" instrument_node="">The significance of marriage for many women within Asian Muslim-majority societies has legal, social, economic and political implications for social organization (Stivens </span><a aria-label="Reference 2006" data-dcnode-id="4081" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d34375223e759" title="Stivens, M. (2006). Family values and islamic revival: Gender, rights and state moral projects in Malaysia. Women's Studies International Forum, 29, 354–367. doi:
                    10.1016/j.wsif.2006.05.007
                    
                  ."><span data-dcnode-id="4082" instrument_node="">2006</span></a><span data-dcnode-id="4080" instrument_node="">). Women’s identity is closely linked to her marital family, shaping social and legal practices of descent (i.e. passing on the family name), inheritance, as well as divorce customs (in Pakistan, see Weiss </span><a aria-label="Reference 2014" data-dcnode-id="4078" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d34375223e762" title="Weiss, A. M. (2014). Interpreting Islam, modernity, and women’s rights in Pakistan. New York: Palgrave Macmillan."><span data-dcnode-id="4079" instrument_node="">2014</span></a><span data-dcnode-id="4077" instrument_node="">). Marriage arrangements in South and South-east Asian Islamic countries tend to involve economic as well as social components (Siapno </span><a aria-label="Reference 2002" data-dcnode-id="4075" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d34375223e765" title="Siapno, J. A. (2002). Gender, Islam, nationalism and the state in Aceh: The paradox of power, co-optation and resistance. London: Routledge."><span data-dcnode-id="4076" instrument_node="">2002</span></a><span data-dcnode-id="4074" instrument_node="">; Suran et al. </span><a aria-label="Reference 2004" data-dcnode-id="4072" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR122" id="ref-link-section-d34375223e768" title="Suran, L., Amin, S., Huq, L., &amp; Chowdury, K. (2004). Does dowry improve life for brides? Population Council working paper. No. 195. Washington, D.C.: Population Council."><span data-dcnode-id="4073" instrument_node="">2004</span></a><span data-dcnode-id="4071" instrument_node="">; Weiss </span><a aria-label="Reference 2014" data-dcnode-id="4069" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d34375223e771" title="Weiss, A. M. (2014). Interpreting Islam, modernity, and women’s rights in Pakistan. New York: Palgrave Macmillan."><span data-dcnode-id="4070" instrument_node="">2014</span></a><span data-dcnode-id="4068" instrument_node="">). For example, in Bangladesh, dowry remains an integral element of marriage negotiations, although this is not a homogenous practice across all regional settings (Suran et al. </span><a aria-label="Reference 2004" data-dcnode-id="4066" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR122" id="ref-link-section-d34375223e775" title="Suran, L., Amin, S., Huq, L., &amp; Chowdury, K. (2004). Does dowry improve life for brides? Population Council working paper. No. 195. Washington, D.C.: Population Council."><span data-dcnode-id="4067" instrument_node="">2004</span></a><span data-dcnode-id="4065" instrument_node="">). Dowry is seen as the property a woman brings to her husband at the time of, and during, the marriage to compensate for the financial burden she places on her in-laws (Diwan </span><a aria-label="Reference 1990" data-dcnode-id="4063" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d34375223e778" title="Diwan, P. (1990). Dowry and protection to married women. New Delhi: Deep and Deep Publication."><span data-dcnode-id="4064" instrument_node="">1990</span></a><span data-dcnode-id="4062" instrument_node="">). Zaman (</span><a aria-label="Reference 2005" data-dcnode-id="4060" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR138" id="ref-link-section-d34375223e781" title="Zaman, H. (2005). Domestic violence: South Asia. In S. Joseph (Ed.), Encyclopedia of women and islamic cultures: Volume 2: Family, law and politics (pp. 123–125). Boston: Brill."><span data-dcnode-id="4061" instrument_node="">2005</span></a><span data-dcnode-id="4059" instrument_node="">) argues that the demand for huge dowry can cause enormous psychological pressure on the prospective bride and her family. For example, disputes about dowry in parts of South Asia have been highlighted as instigating serious domestic violence incidents, including murder and suicide (Kulwicki </span><a aria-label="Reference 2002" data-dcnode-id="4057" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d34375223e784" title="Kulwicki, A. D. (2002). The practice of honor crimes: A glimpse of domestic violence in the arab world. Issues in Mental Health Nursing, 23, 77–87. doi:
                    10.1080/01612840252825491
                    
                  ."><span data-dcnode-id="4058" instrument_node="">2002</span></a><span data-dcnode-id="4056" instrument_node="">; Rastogi and Therly </span><a aria-label="Reference 2006" data-dcnode-id="4054" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR103" id="ref-link-section-d34375223e787" title="Rastogi, M., &amp; Therly, P. (2006). Dowry and its link to violence against women in India. Trauma, Violence &amp; Abuse, 7, 66–77. doi:
                    10.1177/1524838005283927
                    
                  ."><span data-dcnode-id="4055" instrument_node="">2006</span></a><span data-dcnode-id="4053" instrument_node="">; Umar </span><a aria-label="Reference 1998" data-dcnode-id="4051" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR123" id="ref-link-section-d34375223e790" title="Umar, M. (1998). Bride burning in India. New Delhi: A.P.H. Publishing Corporation."><span data-dcnode-id="4052" instrument_node="">1998</span></a><span data-dcnode-id="4050" instrument_node="">; Zaman </span><a aria-label="Reference 2005" data-dcnode-id="4048" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR138" id="ref-link-section-d34375223e794" title="Zaman, H. (2005). Domestic violence: South Asia. In S. Joseph (Ed.), Encyclopedia of women and islamic cultures: Volume 2: Family, law and politics (pp. 123–125). Boston: Brill."><span data-dcnode-id="4049" instrument_node="">2005</span></a><span data-dcnode-id="4047" instrument_node="">). Cross-sectional evidence from rural Bangladesh shows that women in marriages that involved dowry payments were at higher risk of experiencing abuse within their intimate partner relationship (Naved and Persson </span><a aria-label="Reference 2008" data-dcnode-id="4045" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d34375223e797" title="Naved, R., &amp; Persson, L.A. (2008). Factors associated with physical spousal abuse of women during pregnancy in Bangladesh. International Family Planning Perspectives, 34, 71–78. doi:
                    10.1363/3407108
                    
                  
                        "><span data-dcnode-id="4046" instrument_node="">2008</span></a><span data-dcnode-id="4044" instrument_node="">).</span></p><p data-dcnode-id="4008"><span data-dcnode-id="4042" instrument_node="">Women’s bodies and sexuality also play a key discursive role in marriage arrangements as well as women’s position in Muslim-majority societies across the region. The notion of </span><i data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">izzat</span></i><span data-dcnode-id="4039" instrument_node=""> or family honour is said to be a culturally specific patriarchal tool that is used to control female sexuality and protect women’s virginity in parts of South Asia (Akpinar </span><a aria-label="Reference 2003" data-dcnode-id="4037" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d34375223e806" title="Akpinar, A. (2003). The honour/shame complex revisited: Violence against women in the migration context. Women's Studies International Forum, 26, 425–442. doi:
                    10.1016/j.wsif.2003.08.001
                    
                  ."><span data-dcnode-id="4038" instrument_node="">2003</span></a><span data-dcnode-id="4036" instrument_node="">; Bennett and Manderson </span><a aria-label="Reference 2003" data-dcnode-id="4034" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d34375223e809" title="Bennett, L. R., &amp; Manderson, L. (2003). Introduction: Gender inequality and technologies of violence. In L. Manderson &amp; L. R. Bennett (Eds.), Violence against women in asian societies (pp. 1–19). London: Routledge Curzon."><span data-dcnode-id="4035" instrument_node="">2003</span></a><span data-dcnode-id="4033" instrument_node="">; Imam and Akhtar </span><a aria-label="Reference 2005" data-dcnode-id="4031" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d34375223e812" title="Imam, U., &amp; Akhtar, P. (2005). Researching asian children's experiences of domestic violence: The significance of cultural competence and shared ethnicities of participants in research process. In T. Skinner, M. Hester, &amp; E. Malos (Eds.), Researching gender violence: Feminist methodology in action (pp. 66–86). Devon: Willan Publishing."><span data-dcnode-id="4032" instrument_node="">2005</span></a><span data-dcnode-id="4030" instrument_node="">). In her treatise on gender and nationalism in Aceh, Indonesia, Siapno (</span><a aria-label="Reference 2002" data-dcnode-id="4028" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d34375223e815" title="Siapno, J. A. (2002). Gender, Islam, nationalism and the state in Aceh: The paradox of power, co-optation and resistance. London: Routledge."><span data-dcnode-id="4029" instrument_node="">2002</span></a><span data-dcnode-id="4027" instrument_node="">, p. 110) argues that “claims to be more ‘authentic’ or ‘pure’ Islam are enacted on ostensible ‘immoral’ activities, most of which has to do with restricting the movement of women being out alone in public, or having close relations with men other than their close kin or husband.” In some countries, early marriage of girls is used as a method to prevent pre-marital sexual relationships that would have negative social consequences for the family and community (Schuler et al. </span><a aria-label="Reference 1998" data-dcnode-id="4025" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d34375223e819" title="Schuler, S. R., Hashemi, S. M., &amp; Badal, S. H. (1998). Men's violence against women in rural Bangladesh: Undermined or exacerbated by microcredit programmes? Development in Practice, 8, 148–157. doi:
                    10.1080/09614529853774
                    
                  ."><span data-dcnode-id="4026" instrument_node="">1998</span></a><span data-dcnode-id="4024" instrument_node="">). Although this phenomenon is not restricted to Islamic settings (Solotaroff and Pande </span><a aria-label="Reference 2014" data-dcnode-id="4022" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR120" id="ref-link-section-d34375223e822" title="Solotaroff, J. L., &amp; Pande, R. P. (2014). Violence against women and girls: Lessons from South Asia. Washington, D.C.: World Bank Group."><span data-dcnode-id="4023" instrument_node="">2014</span></a><span data-dcnode-id="4021" instrument_node="">), child marriage in Muslim-majority societies is often framed as a social outcome of religious interpretation and values (Weiss </span><a aria-label="Reference 2014" data-dcnode-id="4019" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d34375223e825" title="Weiss, A. M. (2014). Interpreting Islam, modernity, and women’s rights in Pakistan. New York: Palgrave Macmillan."><span data-dcnode-id="4020" instrument_node="">2014</span></a><span data-dcnode-id="4018" instrument_node="">). In this context, divorce is generally stigmatized, and the shame associated with divorce in Muslim-majority Asian countries often prevents women from leaving abusive relationships (Idrus and Bennett </span><a aria-label="Reference 2003" data-dcnode-id="4016" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d34375223e828" title="Idrus, N. I., &amp; Bennett, L. R. (2003). Presumed consent: Marital violence in bugis society. In L. Manderson &amp; L. R. Bennett (Eds.), Violence against women in asian societies (pp. 41–60). London: Routledge Curzon."><span data-dcnode-id="4017" instrument_node="">2003</span></a><span data-dcnode-id="4015" instrument_node="">; Shaikh </span><a aria-label="Reference 2007" data-dcnode-id="4013" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR117" id="ref-link-section-d34375223e831" title="Shaikh, S. (2007). A tafsir of praxis: Gender, marital violence, and resistance in a South African muslim community. In D. C. Maguire &amp; S. Shaikh (Eds.), Violence against women in contemporary world religions: Roots and cures (pp. 69–89). Cleveland: Pilgrim Press."><span data-dcnode-id="4014" instrument_node="">2007</span></a><span data-dcnode-id="4012" instrument_node="">). However, there are examples of Muslim societies – such as the Maldives – where divorce practices remained relatively flexible until recently (Fulu </span><a aria-label="Reference 2014" data-dcnode-id="4010" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d34375223e834" title="Fulu, E. (2014). Domestic violence in Asia: Globalization, gender and Islam in the Maldives. London: Routledge."><span data-dcnode-id="4011" instrument_node="">2014</span></a><span data-dcnode-id="4009" instrument_node="">), which signals the diversity of beliefs and practices around marriage and divorce within Muslim communities across the region.</span></p><p data-dcnode-id="3979"><span data-dcnode-id="4007" instrument_node="">Although the family continues to hold its dominant position in the social order of globalizing Muslim-majority societies in Asia, the revitalization of legal systems based on Islamist ideology have arguably detracted from women’s rights, particularly as regards women’s agency and autonomy to enter willingly into relationships and to leave harmful ones. New Islamist-oriented amendments and regulations at the national and community levels, for example in Malaysia and Pakistan, have reduced women’s abilities to seek redress for abuse or abandonment (Aziz </span><a aria-label="Reference 2010" data-dcnode-id="4005" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d34375223e840" title="Aziz, Z. A. (2010). Malaysia - trajectory towards secularism or islamism? In C. Derichs &amp; A. Fleschenberg (Eds.), Religious fundamentalisms and their gendered impacts in Asia (pp. 44–67). Berlin: Friedrich-Ebert-Stiftung."><span data-dcnode-id="4006" instrument_node="">2010</span></a><span data-dcnode-id="4004" instrument_node="">; Othman </span><a aria-label="Reference 2006" data-dcnode-id="4002" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d34375223e843" title="Othman, N. (2006). Muslim women and the challenge of islamic fundamentalism/extremism: An overview of southeast asian muslim women's struggle for human rights and gender equality. Women's Studies International Forum, 29, 339–353. doi:
                    10.1016/j.wsif.2006.05.008
                    
                  ."><span data-dcnode-id="4003" instrument_node="">2006</span></a><span data-dcnode-id="4001" instrument_node="">; Weiss </span><a aria-label="Reference 2014" data-dcnode-id="3999" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d34375223e846" title="Weiss, A. M. (2014). Interpreting Islam, modernity, and women’s rights in Pakistan. New York: Palgrave Macmillan."><span data-dcnode-id="4000" instrument_node="">2014</span></a><span data-dcnode-id="3998" instrument_node="">). In Malaysia, Othman (</span><a aria-label="Reference 2006" data-dcnode-id="3996" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d34375223e849" title="Othman, N. (2006). Muslim women and the challenge of islamic fundamentalism/extremism: An overview of southeast asian muslim women's struggle for human rights and gender equality. Women's Studies International Forum, 29, 339–353. doi:
                    10.1016/j.wsif.2006.05.008
                    
                  ."><span data-dcnode-id="3997" instrument_node="">2006</span></a><span data-dcnode-id="3995" instrument_node="">) finds that even when legal systems serve in their favour, women face discrimination and inequality from legal counsels or advisors who act within Sharia’ah court systems. Among Muslim communities in South India, women are experiencing greater isolation due to strengthening of religious dogmas, and men returning from working in the Gulf often enact a selective Islamization to legitimate patriarchal control (Lindberg </span><a aria-label="Reference 2009" data-dcnode-id="3993" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d34375223e852" title="Lindberg, A. (2009). Islamisation, modernisation or globalisation? Changed gender relations among south indian muslims. South Asia: Journal of South Asian Studies, 32, 86–109. doi:
                    10.1080/00856400802709292
                    
                  ."><span data-dcnode-id="3994" instrument_node="">2009</span></a><span data-dcnode-id="3992" instrument_node="">). In Malaysia, amendments to make many laws more gender equitable are denied to Muslim women, and many recent </span><i data-dcnode-id="3990"><span data-dcnode-id="3991" instrument_node="">fatwas</span></i><span data-dcnode-id="3989" instrument_node=""> reduce Malay Muslim women’s rights (Aziz </span><a aria-label="Reference 2010" data-dcnode-id="3987" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d34375223e859" title="Aziz, Z. A. (2010). Malaysia - trajectory towards secularism or islamism? In C. Derichs &amp; A. Fleschenberg (Eds.), Religious fundamentalisms and their gendered impacts in Asia (pp. 44–67). Berlin: Friedrich-Ebert-Stiftung."><span data-dcnode-id="3988" instrument_node="">2010</span></a><span data-dcnode-id="3986" instrument_node="">). Practices of gender segregation, introduced in certain districts of Malaysia, separated women and men in public spaces, even closing down unisex hair salons (Othman </span><a aria-label="Reference 2006" data-dcnode-id="3984" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d34375223e862" title="Othman, N. (2006). Muslim women and the challenge of islamic fundamentalism/extremism: An overview of southeast asian muslim women's struggle for human rights and gender equality. Women's Studies International Forum, 29, 339–353. doi:
                    10.1016/j.wsif.2006.05.008
                    
                  ."><span data-dcnode-id="3985" instrument_node="">2006</span></a><span data-dcnode-id="3983" instrument_node="">). As Othman (</span><a aria-label="Reference 2006" data-dcnode-id="3981" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d34375223e865" title="Othman, N. (2006). Muslim women and the challenge of islamic fundamentalism/extremism: An overview of southeast asian muslim women's struggle for human rights and gender equality. Women's Studies International Forum, 29, 339–353. doi:
                    10.1016/j.wsif.2006.05.008
                    
                  ."><span data-dcnode-id="3982" instrument_node="">2006</span></a><span data-dcnode-id="3980" instrument_node="">, p. 342) notes, these practices were “alien to traditional Malay Muslim culture…[and] protection of women was the main justification and rationale for such restrictive views and policies”.</span></p><p data-dcnode-id="3959"><span data-dcnode-id="3978" instrument_node="">Furthermore, Islamist interpretations of marriage practices such as child marriage and polygamy also remain divisive social issues, reflecting tensions between religious ideology and globalized discourses around human and women’s rights, in the site of the family. In Pakistan, long-standing debates over the legality of child marriage culminated in a 2014 ruling by the Council of Islamic Ideology that limitations on age of marriage (e.g. over 18) are un-Islamic, as child marriage is not forbidden in Islamic doctrine, although the Council emphasizes that sexual relations should not begin until puberty (The Nation </span><a aria-label="Reference 2014" data-dcnode-id="3976" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d34375223e871" title="The Nation. (2014). Laws prohibiting underage marriage not islamic: Council of islamic ideology. The Nation. Retrieved from 
                    http://nation.com.pk/national/11-Mar-2014/laws-prohibiting-underage-marriage-not-islamic-council-of-islamic-ideology
                    
                  
                        "><span data-dcnode-id="3977" instrument_node="">2014</span></a><span data-dcnode-id="3975" instrument_node="">). Alongside the implications for social practices around child marriage, Weiss points out that this ruling impacts Pakistan’s global image as they may be forced to retract their signatory status to international conventions, such as the Convention on the Elimination of all forms of Discrimination Against Women (CEDAW) and the Convention of the Rights of the Child, that prohibit child marriage (Weiss </span><a aria-label="Reference 2014" data-dcnode-id="3973" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d34375223e874" title="Weiss, A. M. (2014). Interpreting Islam, modernity, and women’s rights in Pakistan. New York: Palgrave Macmillan."><span data-dcnode-id="3974" instrument_node="">2014</span></a><span data-dcnode-id="3972" instrument_node="">, p. 153). Polygamy practices are another widely contested issue, with a global dimension, affecting women’s rights and marriage relations in Muslim-majority Asian countries. Among South Asian Muslims in Tanzania, the expansion of transnational religious networks, discourse and institutions promoting Islamist ideology from Iran, alongside socio-economic shifts in Tanzania in the early 1990s, led to popularization and social validation of </span><i data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">mut</span></i><span data-dcnode-id="3969" instrument_node="">’</span><i data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">a</span></i><span data-dcnode-id="3966" instrument_node=""> – or temporary marriage for men – that undermined women’s health and safety within their marital relationships (Nagar </span><a aria-label="Reference 2000" data-dcnode-id="3964" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d34375223e883" title="Nagar, R. (2000). Religion, race and the debate over Mut’a in Dar es Salaam. Feminist Studies, 26, 661–690. doi:
                    10.2307/3178645
                    
                  ."><span data-dcnode-id="3965" instrument_node="">2000</span></a><span data-dcnode-id="3963" instrument_node="">). Abraham (</span><a aria-label="Reference 2000" data-dcnode-id="3961" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d34375223e887" title="Abraham, M. (2000). Speaking the unspeakable: Marital violence in South Asian immigrant communities in the United States. New Brunswick, NJ: Rutgers University Press."><span data-dcnode-id="3962" instrument_node="">2000</span></a><span data-dcnode-id="3960" instrument_node="">) has labelled this form of abuse as the use of the sexual other. Debates around child marriage and polygamy further serves as an example of how global pressure from international organizations and regional interpretations of religiously condoned practices affecting women’s rights battle against one another in defining women’s rights, and consequently their risk of experiencing violence, at the local level.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3957" id="Sec10"><span data-dcnode-id="3958" instrument_node="">Mobility, Work and Economic Shifts</span></h3><p data-dcnode-id="3943"><span data-dcnode-id="3956" instrument_node="">The nature of public and private spheres within Muslim societies, and the implications for women’s active participation in society and the formal economy, is topical among feminist researchers (Feldman </span><a aria-label="Reference 1992" data-dcnode-id="3954" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d34375223e898" title="Feldman, S. (1992). Crisis, islam and gender in Bangladesh: The social construction of a female labor force. In L. Beneria &amp; S. Feldman (Eds.), Unequal burden: Economic crises, persistent povery and women’s work (pp. 105–130). Boulder: Westview Press."><span data-dcnode-id="3955" instrument_node="">1992</span></a><span data-dcnode-id="3953" instrument_node="">; Ganguly-Scrase </span><a aria-label="Reference 2003" data-dcnode-id="3951" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d34375223e901" title="Ganguly-Scrase, R. (2003). Paradoxes of globalization, liberalization, and gender equality the worldviews of the lower middle class in West Bengal, India. Gender &amp; Society, 17, 544–566. doi:
                    10.1177/0891243203254077
                    
                  ."><span data-dcnode-id="3952" instrument_node="">2003</span></a><span data-dcnode-id="3950" instrument_node="">; Stivens </span><a aria-label="Reference 2006" data-dcnode-id="3948" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d34375223e904" title="Stivens, M. (2006). Family values and islamic revival: Gender, rights and state moral projects in Malaysia. Women's Studies International Forum, 29, 354–367. doi:
                    10.1016/j.wsif.2006.05.007
                    
                  ."><span data-dcnode-id="3949" instrument_node="">2006</span></a><span data-dcnode-id="3947" instrument_node="">). It is often assumed that women, particularly Muslim women, are exclusively associated with the private sphere of the home and reproductive work, and men are associated with public activity, including wage work. However, Mazumdar and Mazumdar (</span><a aria-label="Reference 2001" data-dcnode-id="3945" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d34375223e907" title="Mazumdar, S., &amp; Mazumdar, S. (2001). Rethinking public and private space: Religion and women in muslim society. Journal of Architectural and Planning Research, 18, 302–324."><span data-dcnode-id="3946" instrument_node="">2001</span></a><span data-dcnode-id="3944" instrument_node="">) argue that, in the context of India, Islamic religion both limits the mobility of Muslim women in male public spaces and simultaneously provides the context, pretext, and opportunity for women to convene in female public spaces. Stivens, writing on the private and the public spheres in the context of Muslim-majority Malaysia, cautions that while the ‘private’ sphere tends to occupy political and moral space in the functioning of Islamic society, the way in which private and public space relate to women’s lived experiences must be problematized and examined more closely, particularly in the context of (globalized) social change (2006, p. 357–358).</span></p><p data-dcnode-id="3905"><span data-dcnode-id="3942" instrument_node="">Feminist approaches to globalization have critically focused on the impact of economic globalization – the global flow of trade, capital and labor and associated economic policies and regulations – on the lives and well-being of women (Feldman </span><a aria-label="Reference 1992" data-dcnode-id="3940" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d34375223e913" title="Feldman, S. (1992). Crisis, islam and gender in Bangladesh: The social construction of a female labor force. In L. Beneria &amp; S. Feldman (Eds.), Unequal burden: Economic crises, persistent povery and women’s work (pp. 105–130). Boulder: Westview Press."><span data-dcnode-id="3941" instrument_node="">1992</span></a><span data-dcnode-id="3939" instrument_node="">;&nbsp;Jaggar </span><a aria-label="Reference 2001" data-dcnode-id="3937" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d34375223e916" title="Jaggar, A. M. (2001). Is globalization good for women? Comparative Literature, 53, 298–314. doi:
                    10.2307/3593521
                    
                  ."><span data-dcnode-id="3938" instrument_node="">2001</span></a><span data-dcnode-id="3936" instrument_node="">; Moghadam </span><a aria-label="Reference 1999" data-dcnode-id="3934" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d34375223e919" title="Moghadam, V. M. (1999). Gender and globalization: Female labor and women’s mobilization. Journal of World Systems Research, 2, 367–388."><span data-dcnode-id="3935" instrument_node="">1999</span></a><span data-dcnode-id="3933" instrument_node="">). In the Muslim-majority countries of Asia, economic globalization has contributed to women’s increased labor-force participation, often in low-wage industries, and challenged notions of women’s position outside the home and influenced family dynamics (Feldman </span><a aria-label="Reference 1992" data-dcnode-id="3931" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d34375223e922" title="Feldman, S. (1992). Crisis, islam and gender in Bangladesh: The social construction of a female labor force. In L. Beneria &amp; S. Feldman (Eds.), Unequal burden: Economic crises, persistent povery and women’s work (pp. 105–130). Boulder: Westview Press."><span data-dcnode-id="3932" instrument_node="">1992</span></a><span data-dcnode-id="3930" instrument_node="">; Weiss </span><a aria-label="Reference 2014" data-dcnode-id="3928" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d34375223e925" title="Weiss, A. M. (2014). Interpreting Islam, modernity, and women’s rights in Pakistan. New York: Palgrave Macmillan."><span data-dcnode-id="3929" instrument_node="">2014</span></a><span data-dcnode-id="3927" instrument_node="">). These trends of women’s labor migration have precedent in the Islamic countries of the Middle East, as noted earlier, a region with considerable cultural influence on South and South-east Asian Muslim-majority societies. As Moghadam (</span><a aria-label="Reference 1999" data-dcnode-id="3925" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d34375223e929" title="Moghadam, V. M. (1999). Gender and globalization: Female labor and women’s mobilization. Journal of World Systems Research, 2, 367–388."><span data-dcnode-id="3926" instrument_node="">1999</span></a><span data-dcnode-id="3924" instrument_node="">, p. 372) observes, this “proletarianization,” and “professionalization,” of women in the Middle East led to gender segregation within the workplace and increased veiling among women, which had repercussions through social and economic spaces within the country. Feldman’s (</span><a aria-label="Reference 1992" data-dcnode-id="3922" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d34375223e932" title="Feldman, S. (1992). Crisis, islam and gender in Bangladesh: The social construction of a female labor force. In L. Beneria &amp; S. Feldman (Eds.), Unequal burden: Economic crises, persistent povery and women’s work (pp. 105–130). Boulder: Westview Press."><span data-dcnode-id="3923" instrument_node="">1992</span></a><span data-dcnode-id="3921" instrument_node="">) research in Bangladesh, demonstrates how national structural adjustment policies, driven by globalized institutions such as the International Monetary Fund (IMF), created new wage opportunities for women in a historical Islamic context in which women were secluded from public spaces. Yet, growing Islamization also contributed to the tension and negotiation between Islamic ideals for women and the demand for female labor. As women moved into the garment industry and other public sector employment opportunities, Feldman (</span><a aria-label="Reference 1992" data-dcnode-id="3919" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d34375223e935" title="Feldman, S. (1992). Crisis, islam and gender in Bangladesh: The social construction of a female labor force. In L. Beneria &amp; S. Feldman (Eds.), Unequal burden: Economic crises, persistent povery and women’s work (pp. 105–130). Boulder: Westview Press."><span data-dcnode-id="3920" instrument_node="">1992</span></a><span data-dcnode-id="3918" instrument_node="">, p. 121) notes, “it has not been unusual to see middle-class rural women wearing a burkha to and from work. They use the burkha, however, as a cultural adaptation to facilitate mobility and access to new resources and opportunities, not as an expression of subordination and oppression”. Similar shifts around women’s mobility, appearance and engagement in the workplace appear to be taking place in other Islamic settings of Asia. Using national data on contemporary attitudes and beliefs, Weiss (</span><a aria-label="Reference 2014" data-dcnode-id="3916" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d34375223e938" title="Weiss, A. M. (2014). Interpreting Islam, modernity, and women’s rights in Pakistan. New York: Palgrave Macmillan."><span data-dcnode-id="3917" instrument_node="">2014</span></a><span data-dcnode-id="3915" instrument_node="">) found that most adults in Pakistan believe that women should be allowed to work outside the home, albeit under certain circumstances and conditions. The largest concern voiced through these surveys was the impact of mixed-gender working environments on women’s purity and modesty, and veiling became a way to cope with these new economic conditions. Empirical evidence from Bangladesh on the integration of women into wage work shows inconsistent implications for empowerment and subsequent risk of partner violence, with some studies finding positive and protective effects (Bates et al. </span><a aria-label="Reference 2004" data-dcnode-id="3913" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d34375223e941" title="Bates, L. M., Schuler, S. R., Islam, R., &amp; Islam, M. K. (2004). Socioeconomic factors and processes associated with domestic violence in rural Bangladesh. International Family Planning Perspectives, 30, 190–199. doi:
                    10.1363/3019004
                    
                  ."><span data-dcnode-id="3914" instrument_node="">2004</span></a><span data-dcnode-id="3912" instrument_node="">) and others finding increased risk of abuse (Schuler et al. </span><a aria-label="Reference 1998" data-dcnode-id="3910" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d34375223e944" title="Schuler, S. R., Hashemi, S. M., &amp; Badal, S. H. (1998). Men's violence against women in rural Bangladesh: Undermined or exacerbated by microcredit programmes? Development in Practice, 8, 148–157. doi:
                    10.1080/09614529853774
                    
                  ."><span data-dcnode-id="3911" instrument_node="">1998</span></a><span data-dcnode-id="3909" instrument_node="">), particularly in more culturally conservative areas (Koenig et al. </span><a aria-label="Reference 2003" data-dcnode-id="3907" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d34375223e948" title="Koenig, M. A., Ahmed, S., Hossain, M. B., &amp; Mozumder, A. B. (2003). Women’s status and domestic violence in rural Bangladesh: Individual- and community- level effects. Demography, 40, 269–288. doi:
                    10.1353/dem.2003.0014
                    
                  ."><span data-dcnode-id="3908" instrument_node="">2003</span></a><span data-dcnode-id="3906" instrument_node="">). These patterns underscore the role of divergent cultural factors – alongside global forces – in shaping the contours of gender and family systems in a given setting.</span></p><p data-dcnode-id="3885"><span data-dcnode-id="3904" instrument_node="">Migration and urbanization also affect the internal dynamics of the family. Economic necessity increasingly requires women to work outside the home, and global migration patterns result in women migrating for work outside the country. Afsar (</span><a aria-label="Reference 2005" data-dcnode-id="3902" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d34375223e954" title="Afsar, R. (2005). Migration: Labour and remittances in South Asia. In S. Joseph (Ed.), Encyclopedia of women and Islamic cultures: Family, body, sexuality and health (Vol. 3, pp. 413–417). Boston: Brill."><span data-dcnode-id="3903" instrument_node="">2005</span></a><span data-dcnode-id="3901" instrument_node="">) notes that migration provides women with autonomy and levels of decision-making higher than what they could otherwise expect. When women are migrants, their financial contribution allows them say in allocation of funds. When women’s husbands are migrant workers, women are de-facto leaders of the household and hold control over spending and resource allocation. Yet, these trends toward more gender equitable distribution of financial power do not remain unchallenged. In Pakistan, there are concerns around the perception of women earning money for their families, and the assumption that her husband is unable to fulfill his social role as breadwinner (Weiss </span><a aria-label="Reference 2014" data-dcnode-id="3899" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d34375223e957" title="Weiss, A. M. (2014). Interpreting Islam, modernity, and women’s rights in Pakistan. New York: Palgrave Macmillan."><span data-dcnode-id="3900" instrument_node="">2014</span></a><span data-dcnode-id="3898" instrument_node="">). Class differences also serve as a critical lens through which to understand how economic change has shifted gender relations in the home. Among lower middle class Bengali families, Ganguly-Scrase (</span><a aria-label="Reference 2003" data-dcnode-id="3896" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d34375223e960" title="Ganguly-Scrase, R. (2003). Paradoxes of globalization, liberalization, and gender equality the worldviews of the lower middle class in West Bengal, India. Gender &amp; Society, 17, 544–566. doi:
                    10.1177/0891243203254077
                    
                  ."><span data-dcnode-id="3897" instrument_node="">2003</span></a><span data-dcnode-id="3895" instrument_node="">, p. 554) found that attempts to restrict women’s access to education were perceived as “backward” and old-fashioned, whereas women’s mobility symbolized modernity and contemporary gender relations. These social patterns stood in direct contrast to the socially validated restrictions on women’s mobility of a few decades earlier. Similarly, urbanization appears to have contributed to increased mobility among certain classes of women in Pakistani cities, as women-only transport systems and other options for movement become more readily available, and women’s engagement in the workplace becomes more commonplace (Weiss </span><a aria-label="Reference 2014" data-dcnode-id="3893" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d34375223e963" title="Weiss, A. M. (2014). Interpreting Islam, modernity, and women’s rights in Pakistan. New York: Palgrave Macmillan."><span data-dcnode-id="3894" instrument_node="">2014</span></a><span data-dcnode-id="3892" instrument_node="">). Comparatively, in Aceh, Siapno notes, “with urbanization, women’s public roles and spaces have been eroded and women have become restricted to the domestic sphere” (2002, p. 108). This ethnographic evidence from Aceh illustrates how globalized economic forces such as urbanization can culminate in divergent impacts on the family the local level across cultural settings. Thus, while urbanization can foster economic opportunities for women, it may also contribute to greater social isolation among women, separating them from protective kinship networks and support systems (Warrington </span><a aria-label="Reference 2001" data-dcnode-id="3890" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR126" id="ref-link-section-d34375223e966" title="Warrington, M. (2001). I must get out: The geographies of domestic violence. Royal Geographical Society, 26, 365–382. doi:
                    10.1111/1475-5661.00028
                    
                  ."><span data-dcnode-id="3891" instrument_node="">2001</span></a><span data-dcnode-id="3889" instrument_node="">), which can contribute to increased prevalence of partner abuse (Michalski </span><a aria-label="Reference 2004" data-dcnode-id="3887" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d34375223e970" title="Michalski, J. (2004). Making sociological sense out of trends in intimate partner violence. Violence Against Women, 10, 652–675. doi:
                    10.1177/1077801204265018
                    
                  ."><span data-dcnode-id="3888" instrument_node="">2004</span></a><span data-dcnode-id="3886" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3883" id="Sec11"><span data-dcnode-id="3884" instrument_node="">Women Rights Discourses</span></h3><p data-dcnode-id="3866"><span data-dcnode-id="3882" instrument_node="">As Weiss (</span><a aria-label="Reference 2014" data-dcnode-id="3880" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d34375223e982" title="Weiss, A. M. (2014). Interpreting Islam, modernity, and women’s rights in Pakistan. New York: Palgrave Macmillan."><span data-dcnode-id="3881" instrument_node="">2014</span></a><span data-dcnode-id="3879" instrument_node="">, p. 77) rightly observes, “women’s rights in Muslim contexts is neither new nor an import from the West,” and women in Muslim-majority countries have long championed for rights of equality and freedom. The era of contemporary globalization has witnessed a rise in transnational women’s rights movements, connecting women’s interests across a diverse range of situations and cultures (Moghadam </span><a aria-label="Reference 2001" data-dcnode-id="3877" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d34375223e985" title="Moghadam, V. M. (2001). Feminism and islamic fundamentalism: A secularist interpretation. Journal of Women's History, 13, 42–45. doi:
                    10.1353/jowh.2001.0029
                    
                  ."><span data-dcnode-id="3878" instrument_node="">2001</span></a><span data-dcnode-id="3876" instrument_node="">). New information technologies contributed to the development of a transnational feminist movement in the 1980s, as did the fostering environment provided by the UN and regional caucuses that brought national groups together. Muslim women contributed substantially to these processes. One predominant transnational feminist network, Women Living Under Muslim Laws (</span><a data-dcnode-id="3874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wluml.org/"><span data-dcnode-id="3875" instrument_node="">http://www.wluml.org</span></a><span data-dcnode-id="3873" instrument_node="">/), came together in the late 1980s to challenge rising fundamentalism and legal frameworks that discriminated against women and threatened women’s rights and freedoms (Moghadam </span><a aria-label="Reference 2009" data-dcnode-id="3871" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d34375223e995" title="Moghadam, V. M. (2009). Globalization and social movements: Islamism, feminism and the global justice movement. Lanham: Rowman and Littlefield."><span data-dcnode-id="3872" instrument_node="">2009</span></a><span data-dcnode-id="3870" instrument_node="">). The presence of feminist-oriented social movements can serve to delegitimize intimate partner violence and the social inequalities that drive men’s use of violence, in particular through the development of national legislation to criminalize partner violence perpetration (Htun and Weldon </span><a aria-label="Reference 2012" data-dcnode-id="3868" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d34375223e998" title="Htun, M., &amp; Weldon, S. L. (2012). The civic origins of progressive policy change: Combatting violence against women in global perspective, 1975–2005. The American Political Science Review, 106, 548–569. doi:
                    10.1017/S0003055412000226
                    
                  ."><span data-dcnode-id="3869" instrument_node="">2012</span></a><span data-dcnode-id="3867" instrument_node="">).</span></p><p data-dcnode-id="3858"><span data-dcnode-id="3865" instrument_node="">In sum, a review of feminist literature on gender, family and violence in South and South-east Asian Muslim-majority countries, through the lens of globalization, demonstrates the ubiquitous role that global forces play in shaping key issues around gender and the family. We note that these processes play out differently across these diverse cultural settings, further underscoring the need for ethnographic feminist research on how globalization shapes the contours of local gender and family systems (Ganguly-Scrase </span><a aria-label="Reference 2003" data-dcnode-id="3863" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d34375223e1004" title="Ganguly-Scrase, R. (2003). Paradoxes of globalization, liberalization, and gender equality the worldviews of the lower middle class in West Bengal, India. Gender &amp; Society, 17, 544–566. doi:
                    10.1177/0891243203254077
                    
                  ."><span data-dcnode-id="3864" instrument_node="">2003</span></a><span data-dcnode-id="3862" instrument_node="">; Nagar et al. </span><a aria-label="Reference 2002" data-dcnode-id="3860" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d34375223e1007" title="Nagar, R., Lawson, V., McDowell, L., &amp; Hanson, S. (2002). Locating globalization: Feminist (re) readings of the subjects and spaces of globalization. Economic Geography, 78, 257–284. doi:
                    10.2307/4140810
                    
                  ."><span data-dcnode-id="3861" instrument_node="">2002</span></a><span data-dcnode-id="3859" instrument_node="">). In that vein, we turn now to an ethnographic case study of intimate partner violence in the Maldives. We illustrate how globalized socio-economic and political trends in this island nation are changing the terrain of family and society. These social changes both advance and retract women’s rights and contribute to their increased risk of family violence.</span></p></div></div></section><section data-dcnode-id="3478" data-title="Case Study: Intimate Partner Violence in the Maldives"><div class="c-article-section" data-dcnode-id="3479" id="Sec12-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3853" id="Sec12"><span data-dcnode-id="3854" instrument_node="">Case Study: Intimate Partner Violence in the Maldives</span></h2><div class="c-article-section__content" data-dcnode-id="3480" id="Sec12-content"><h3 class="c-article__sub-heading" data-dcnode-id="3851" id="Sec13"><span data-dcnode-id="3852" instrument_node="">Violence Against Women in the Family</span></h3><p data-dcnode-id="3837"><span data-dcnode-id="3850" instrument_node="">Violence against women can be understood as both a consequence of women’s subordination and oppression as well as a tool used to maintain patriarchy (Dobash and Dobash </span><a aria-label="Reference 1980" data-dcnode-id="3848" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d34375223e1023" title="Dobash, R. E., &amp; Dobash, R. (1980). Violence against wives: A case against the patriarchy. London: Open Books."><span data-dcnode-id="3849" instrument_node="">1980</span></a><span data-dcnode-id="3847" instrument_node="">; Yllö </span><a aria-label="Reference 1983" data-dcnode-id="3845" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR135" id="ref-link-section-d34375223e1026" title="Yllö, K. A. (1983). Sexual equality and violence against wives in American states. Journal of Comparative Family Studies, 14, 67–86."><span data-dcnode-id="3846" instrument_node="">1983</span></a><span data-dcnode-id="3844" instrument_node="">; Yllö </span><a aria-label="Reference 1993" data-dcnode-id="3842" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR134" id="ref-link-section-d34375223e1029" title="Yllö, K. A. (1993). Through a feminist lens: Gender, power, and violence. In R. J. Gelles &amp; D. R. Loseke (Eds.), Current controversies on family violence (pp. 31–46). Newbury Park, CA: Sage."><span data-dcnode-id="3843" instrument_node="">1993</span></a><span data-dcnode-id="3841" instrument_node="">; Yllö and Bograd </span><a aria-label="Reference 1988" data-dcnode-id="3839" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR137" id="ref-link-section-d34375223e1032" title="Yllö, K. A., &amp; Bograd, M. (1988). Feminist perspectives of wife abuse. Newbury Park, CA: Sage."><span data-dcnode-id="3840" instrument_node="">1988</span></a><span data-dcnode-id="3838" instrument_node="">). Given this, it serves as a useful lens through which to examine the ways in which the globalization process refracts onto gendered structures and systems. While the literature is limited, extant scholarship suggests that global processes are influencing family dynamics and women’s exposure to family violence through a number of avenues. This case study from the Maldives serves as a cultural exemplar to illustrate the complex and nuanced ways in which these processes of globalization play out on the ground.</span></p><p data-dcnode-id="3784"><span data-dcnode-id="3836" instrument_node="">The case study focuses on intimate partner violence against women because it is the most common form of violence against women around the world (Fulu et al. </span><a aria-label="Reference 2013b" data-dcnode-id="3834" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d34375223e1038" title="Fulu, E., Warner, X., Miedema, S., Jewkes, R., Roselli, T., &amp; Lang, J. (2013b). Why do some me use violence against women and how can we prevent it? Quantitative findings from the United Nations Multi-country Study on Men and Violence in Asia and the Pacific. Bangkok: UNDP, UNFPA, UN Women and UN Volunteers."><span data-dcnode-id="3835" instrument_node="">2013b</span></a><span data-dcnode-id="3833" instrument_node="">; Garcia-Moreno et al. </span><a aria-label="Reference 2005" data-dcnode-id="3831" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d34375223e1041" title="Garcia-Moreno, C., Jansen, H. A. F. M., Ellsberg, M., Heise, L., &amp; Watts, C. (2005). WHO multi-country study on women's health and domestic violence against women: Initial results on prevalence, health outcomes and women's responses. Geneva: World Health Organization."><span data-dcnode-id="3832" instrument_node="">2005</span></a><span data-dcnode-id="3830" instrument_node="">; UN General Assembly </span><a aria-label="Reference 2006" data-dcnode-id="3828" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d34375223e1044" title="General Assembly, U. N. (2006). In-depth study on all forms of violence against women: Report of the Secretary General. Geneva: United Nations."><span data-dcnode-id="3829" instrument_node="">2006</span></a><span data-dcnode-id="3827" instrument_node="">; WHO </span><a aria-label="Reference 2002" data-dcnode-id="3825" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR129" id="ref-link-section-d34375223e1047" title="WHO (2002). World report on violence and health. Geneva: World Health Organization."><span data-dcnode-id="3826" instrument_node="">2002</span></a><span data-dcnode-id="3824" instrument_node="">). Intimate partner violence is defined as “behaviour within an intimate relationship that causes physical, sexual or psychological harm, including acts of physical aggression, sexual coercion, psychological abuse and controlling behaviours” (Heise and Garcia-Moreno </span><a aria-label="Reference 2002" data-dcnode-id="3822" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d34375223e1050" title="Heise, L., &amp; Garcia-Moreno, C. (2002). Violence by intimate partners. In E. G. Krug, L. L. Dahlberg, J. A. Mercy, A. B. Zwi, &amp; R. Lozano (Eds.), World report on violence and health (pp. 87–121). Geneva: World Health Organization."><span data-dcnode-id="3823" instrument_node="">2002</span></a><span data-dcnode-id="3821" instrument_node="">, p. 89). The prevalence of partner violence varies widely across the Asia region. The </span><i data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">WHO Multi-country Study on Women</span></i><span data-dcnode-id="3818" instrument_node="">’</span><i data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">s Health and Domestic Violence against Women</span></i><span data-dcnode-id="3815" instrument_node="">, a cross-sectional household survey of women aged 15–49, found a range of partner violence prevalence from 53 to 62&nbsp;% in Bangladesh, 41–47&nbsp;% in Thailand, 34&nbsp;% in Vietnam, and 69&nbsp;% in Kiribati (Garcia-Moreno et al. </span><a aria-label="Reference 2005" data-dcnode-id="3813" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d34375223e1060" title="Garcia-Moreno, C., Jansen, H. A. F. M., Ellsberg, M., Heise, L., &amp; Watts, C. (2005). WHO multi-country study on women's health and domestic violence against women: Initial results on prevalence, health outcomes and women's responses. Geneva: World Health Organization."><span data-dcnode-id="3814" instrument_node="">2005</span></a><span data-dcnode-id="3812" instrument_node="">; Government of Viet Nam </span><a aria-label="Reference 2010" data-dcnode-id="3810" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d34375223e1063" title="Government of Viet Nam (2010). Keeping silent is dying: Results from the national study on domestic violence against women in Viet Nam. Hanoi: United Nations."><span data-dcnode-id="3811" instrument_node="">2010</span></a><span data-dcnode-id="3809" instrument_node="">; Secretariat of the Pacific Community </span><a aria-label="Reference 2010" data-dcnode-id="3807" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d34375223e1066" title="Secretariat of the Pacific Community (2010). Kiribati family health and support study report. New Caledonia: Ministry of Internal and Social Affairs and Secretariat of the Pacific Community."><span data-dcnode-id="3808" instrument_node="">2010</span></a><span data-dcnode-id="3806" instrument_node="">). In Muslim-majority, urban Pakistan, using the WHO methodology, a survey found 58&nbsp;% of women reported any physical partner abuse in their lifetime and 55&nbsp;% had experienced some form of sexual violence (Ali et al. </span><a aria-label="Reference 2011" data-dcnode-id="3804" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d34375223e1069" title="Ali, T. S., Asad, N., Mogren, I., &amp; Krantz, G. (2011). Intimate partner violence in urban Pakistan: Prevalence, frequency and risk factors. International Journal of Women’s Health, 3, 105–115. doi:
                    10.2147/IJWH.S17016
                    
                  ."><span data-dcnode-id="3805" instrument_node="">2011</span></a><span data-dcnode-id="3803" instrument_node="">). Research suggests that in many other countries in South and South-east Asia domestic violence is considered a normal part of married life, and often justified as a form of discipline or admonition for women who transgress gender norms (Counts </span><a aria-label="Reference 1999" data-dcnode-id="3801" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d34375223e1073" title="Counts, D. A. (1999). All men do it: Wife beating in Kaliai, Papua New Guinea. In D. A. Counts, J. K. Brown, &amp; J. C. Campbell (Eds.), To have and to hit: Cultural perspectives on wife beating (pp. 73–86). Urbana: University of Illinois Press."><span data-dcnode-id="3802" instrument_node="">1999</span></a><span data-dcnode-id="3800" instrument_node="">; Fulu et al. </span><a aria-label="Reference 2013b" data-dcnode-id="3798" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d34375223e1076" title="Fulu, E., Warner, X., Miedema, S., Jewkes, R., Roselli, T., &amp; Lang, J. (2013b). Why do some me use violence against women and how can we prevent it? Quantitative findings from the United Nations Multi-country Study on Men and Violence in Asia and the Pacific. Bangkok: UNDP, UNFPA, UN Women and UN Volunteers."><span data-dcnode-id="3799" instrument_node="">2013b</span></a><span data-dcnode-id="3797" instrument_node="">; Hassan </span><a aria-label="Reference 1995" data-dcnode-id="3795" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d34375223e1079" title="Hassan, Y. (1995). The haven becomes hell: A study of domestic violence in Pakistan. Lahore, Pakistan: Shirkat Gah and Women Living under Muslim Laws (WLUML) Publications."><span data-dcnode-id="3796" instrument_node="">1995</span></a><span data-dcnode-id="3794" instrument_node="">; Jejeebhoy and Cook </span><a aria-label="Reference 1997" data-dcnode-id="3792" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d34375223e1082" title="Jejeebhoy, S. J., &amp; Cook, R. J. (1997). State accountability for wife-beating: The Indian challenge. Lancet, 349, 110–112. doi:
                    10.1016/S0140-6736(97)90004-0
                    
                  ."><span data-dcnode-id="3793" instrument_node="">1997</span></a><span data-dcnode-id="3791" instrument_node="">; Schuler et al. </span><a aria-label="Reference 1996" data-dcnode-id="3789" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR113" id="ref-link-section-d34375223e1085" title="Schuler, S. R., Hashemi, S. M., Riley, A. P., &amp; Akhter, S. (1996). Credit programs, patriarchy and men's violence against women in rural Bangladesh. Social Science and Medicine, 43, 1729–1742. doi:
                    10.1016/S0277-9536(96)00068-8
