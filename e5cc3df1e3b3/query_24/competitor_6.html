/b><span data-dcnode-id="1505" instrument_node=""> examines what happens when both types of tropes—literal travels and literary shifts—coexist.</span></p></div></td></tr><tr data-dcnode-id="1483"><td class="number" data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">396.</span></td><td class="jkt" data-dcnode-id="1496"><a data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674970571" title="Assembling Shinto: Buddhist Approaches to Kami Worship in Medieval Japan"><img alt="Cover: Assembling Shinto: Buddhist Approaches to Kami Worship in Medieval Japan" data-dcnode-id="1498" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674970571-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1484"><p class="title" data-dcnode-id="1493"><a data-dcnode-id="1494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674970571"><span data-dcnode-id="1495" instrument_node="">Assembling Shinto: Buddhist Approaches to Kami Worship in Medieval Japan</span></a></p><p class="author" data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Andreeva, Anna</span></p><div class="desc" data-dcnode-id="1485"><p data-dcnode-id="1486"><span data-dcnode-id="1490" instrument_node="">Anna Andreeva challenges the twentieth-century narrative of Shinto as an unbroken, monolithic tradition. By studying how and why religious practitioners affiliated with different religious institutions responded to esoteric Buddhism’s teachings, this book demonstrates that </span><i data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">kami</span></i><span data-dcnode-id="1487" instrument_node=""> worship in medieval Japan was a result of complex negotiations.</span></p></div></td></tr><tr data-dcnode-id="1468"><td class="number" data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">397.</span></td><td class="jkt" data-dcnode-id="1478"><a data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674970601" title="No Great Wall: Trade, Tariffs, and Nationalism in Republican China, 1927–1945"><img alt="Cover: No Great Wall: Trade, Tariffs, and Nationalism in Republican China, 1927–1945" data-dcnode-id="1480" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674970601-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1469"><p class="title" data-dcnode-id="1475"><a data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674970601"><span data-dcnode-id="1477" instrument_node="">No Great Wall: Trade, Tariffs, and Nationalism in Republican China, 1927–1945</span></a></p><p class="author" data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Boecking, Felix</span></p><div class="desc" data-dcnode-id="1470"><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">In this in-depth study, Felix Boecking challenges the widely accepted idea that the key to Communist seizure of power in China lay in the incompetence of Chiang Kai-shek’s Nationalist government. It argues instead that international trade, government tariff revenues, and hence China’s fiscal policy and state-making project all collapsed.</span></p></div></td></tr><tr data-dcnode-id="1451"><td class="number" data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">398.</span></td><td class="jkt" data-dcnode-id="1463"><a data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674975125" title="A Passage to China: Literature, Loyalism, and Colonial Taiwan"><img alt="Cover: A Passage to China: Literature, Loyalism, and Colonial Taiwan" data-dcnode-id="1465" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674975125-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1452"><p class="title" data-dcnode-id="1460"><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674975125"><span data-dcnode-id="1462" instrument_node="">A Passage to China: Literature, Loyalism, and Colonial Taiwan</span></a></p><p class="author" data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Tsai, Chien-hsin</span></p><div class="desc" data-dcnode-id="1453"><p data-dcnode-id="1454"><b data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Chien-hsin Tsai</span></b><span data-dcnode-id="1455" instrument_node=""> examines the reinvention of loyalism in colonial Taiwan through the lens of literature. He analyzes the ways in which writers from colonial Taiwan—including Qiu Fengjia, Lian Heng, and Wu Zhuoliu—creatively and selectively employed loyalist ideals to cope with Japanese colonialism and its many institutional changes.</span></p></div></td></tr><tr data-dcnode-id="1434"><td class="number" data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">399.</span></td><td class="jkt" data-dcnode-id="1446"><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674975149" title="Honored and Dishonored Guests: Westerners in Wartime Japan"><img alt="Cover: Honored and Dishonored Guests: Westerners in Wartime Japan" data-dcnode-id="1448" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674975149-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1435"><p class="title" data-dcnode-id="1443"><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674975149"><span data-dcnode-id="1445" instrument_node="">Honored and Dishonored Guests: Westerners in Wartime Japan</span></a></p><p class="author" data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Brecher, W. Puck</span></p><div class="desc" data-dcnode-id="1436"><p data-dcnode-id="1437"><i data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Honored and Dishonored Guests</span></i><span data-dcnode-id="1438" instrument_node=""> chronicles Western communities in wartime Japan, using this body of experiences to reconsider allegations of Japanese racism and racial hatred. Its thesis is borne out by a mosaic of stories from dozens of foreign families and individuals, and yields a unique interpretation of race relations and wartime life in Japan.</span></p></div></td></tr><tr data-dcnode-id="1414"><td class="number" data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">400.</span></td><td class="jkt" data-dcnode-id="1429"><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674975163" title="Aesthetic Life: Beauty and Art in Modern Japan"><img alt="Cover: Aesthetic Life: Beauty and Art in Modern Japan" data-dcnode-id="1431" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674975163-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1415"><p class="title" data-dcnode-id="1426"><a data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674975163"><span data-dcnode-id="1428" instrument_node="">Aesthetic Life: Beauty and Art in Modern Japan</span></a></p><p class="author" data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Lippit, Miya Elise Mizuta</span></p><div class="desc" data-dcnode-id="1416"><p data-dcnode-id="1417"><i data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Aesthetic Life</span></i><span data-dcnode-id="1421" instrument_node=""> is a study of modern Japan, engaging the fields of art history, literature, and cultural studies, seeking to understand how the “beautiful woman” (</span><i data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">bijin</span></i><span data-dcnode-id="1418" instrument_node="">) emerged as a symbol of Japanese culture during the Meiji period (1868–1912).</span></p></div></td></tr><tr data-dcnode-id="1391"><td class="number" data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">401.</span></td><td class="jkt" data-dcnode-id="1409"><a data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674975156" title="Chinese Literary Forms in Heian Japan: Poetics and Practice"><img alt="Cover: Chinese Literary Forms in Heian Japan: Poetics and Practice" data-dcnode-id="1411" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674975156-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1392"><p class="title" data-dcnode-id="1406"><a data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674975156"><span data-dcnode-id="1408" instrument_node="">Chinese Literary Forms in Heian Japan: Poetics and Practice</span></a></p><p class="author" data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Steininger, Brian</span></p><div class="desc" data-dcnode-id="1393"><p data-dcnode-id="1394"><b data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Brian Steininger</span></b><span data-dcnode-id="1401" instrument_node=""> revisits Japan’s mid-Heian court of the </span><i data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Tale of Genji</span></i><span data-dcnode-id="1398" instrument_node=""> and the </span><i data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Pillow Book</span></i><span data-dcnode-id="1395" instrument_node="">, where literary Chinese was not only the basis of official administration, but also a medium for political protest, sermons of mourning, and poems of celebration.</span></p></div></td></tr><tr data-dcnode-id="1374"><td class="number" data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">402.</span></td><td class="jkt" data-dcnode-id="1386"><a data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674975170" title="Making History Matter: Kuroita Katsumi and the Construction of Imperial Japan"><img alt="Cover: Making History Matter: Kuroita Katsumi and the Construction of Imperial Japan" data-dcnode-id="1388" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674975170-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1375"><p class="title" data-dcnode-id="1383"><a data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674975170"><span data-dcnode-id="1385" instrument_node="">Making History Matter: Kuroita Katsumi and the Construction of Imperial Japan</span></a></p><p class="author" data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Yoshikawa, Lisa</span></p><div class="desc" data-dcnode-id="1376"><p data-dcnode-id="1377"><b data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Lisa Yoshikawa</span></b><span data-dcnode-id="1378" instrument_node=""> explores the role history and historians played in imperial Japan’s nation and empire building from the 1890s to the 1930s. Through a close reading of vast, multilingual sources, Yoshikawa argues that scholarship and politics were inseparable as Japan’s historical profession developed.</span></p></div></td></tr><tr data-dcnode-id="1356"><td class="number" data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">403.</span></td><td class="jkt" data-dcnode-id="1369"><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674975187" title="Osaka Modern: The City in the Japanese Imaginary"><img alt="Cover: Osaka Modern: The City in the Japanese Imaginary" data-dcnode-id="1371" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674975187-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1357"><p class="title" data-dcnode-id="1366"><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674975187"><span data-dcnode-id="1368" instrument_node="">Osaka Modern: The City in the Japanese Imaginary</span></a></p><p class="author" data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Cronin, Michael P.</span></p><div class="desc" data-dcnode-id="1358"><p data-dcnode-id="1359"><span data-dcnode-id="1363" instrument_node="">Japan’s “merchant capital” in the late sixteenth century, Osaka remained an industrial center into the 1930s, developing a distinct urban culture to rival Tokyo’s. </span><i data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Osaka Modern</span></i><span data-dcnode-id="1360" instrument_node=""> maps the city as imagined in Japanese popular literature and cinema—as well as contemporary radio, television, music, and comedy—from the 1920s to the 1950s.</span></p></div></td></tr><tr data-dcnode-id="1338"><td class="number" data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">404.</span></td><td class="jkt" data-dcnode-id="1351"><a data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674976962" title="Naming the Local: Medicine, Language, and Identity in Korea since the Fifteenth Century"><img alt="Cover: Naming the Local: Medicine, Language, and Identity in Korea since the Fifteenth Century" data-dcnode-id="1353" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674976962-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1339"><p class="title" data-dcnode-id="1348"><a data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674976962"><span data-dcnode-id="1350" instrument_node="">Naming the Local: Medicine, Language, and Identity in Korea since the Fifteenth Century</span></a></p><p class="author" data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Suh, Soyoung</span></p><div class="desc" data-dcnode-id="1340"><p data-dcnode-id="1341"><span data-dcnode-id="1345" instrument_node="">By tracing Korean-educated agents’ efforts to articulate the vernacular nomenclature of medicine over time, </span><b data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Soyoung Suh</span></b><span data-dcnode-id="1342" instrument_node=""> examines the limitations and possibilities of creating a mode of “Koreanness” in medicine—and the Korean manifestation of cultural and national identities.</span></p></div></td></tr><tr data-dcnode-id="1321"><td class="number" data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">405.</span></td><td class="jkt" data-dcnode-id="1333"><a data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674976979" title="From Domestic Women to Sensitive Young Men: Translating the Individual in Early Colonial Korea"><img alt="Cover: From Domestic Women to Sensitive Young Men: Translating the Individual in Early Colonial Korea" data-dcnode-id="1335" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674976979-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1322"><p class="title" data-dcnode-id="1330"><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674976979"><span data-dcnode-id="1332" instrument_node="">From Domestic Women to Sensitive Young Men: Translating the Individual in Early Colonial Korea</span></a></p><p class="author" data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Yang, Yoon Sun</span></p><div class="desc" data-dcnode-id="1323"><p data-dcnode-id="1324"><b data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Yoon Sun Yang</span></b><span data-dcnode-id="1325" instrument_node=""> argues that the first literary iterations of the Korean individual were female figures in late nineteenth century domestic novels. This study disrupts the canonical account of a non-gendered, linear progress toward modern Korean selfhood and examines translation’s impact on Korea’s construction of modern gender roles.</span></p></div></td></tr><tr data-dcnode-id="1301"><td class="number" data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">406.</span></td><td class="jkt" data-dcnode-id="1316"><a data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674976993" title="The Anime Boom in the United States: Lessons for Global Creative Industries"><img alt="Cover: The Anime Boom in the United States: Lessons for Global Creative Industries" data-dcnode-id="1318" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674976993-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1302"><p class="title" data-dcnode-id="1313"><a data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674976993"><span data-dcnode-id="1315" instrument_node="">The Anime Boom in the United States: Lessons for Global Creative Industries</span></a></p><p class="author" data-dcnode-id="1309"><span data-dcnode-id="1312" instrument_node="">Daliot-Bul, Michal</span><br data-dcnode-id="1311"><span data-dcnode-id="1310" instrument_node="">
Otmazgin, Nissim</span></p><div class="desc" data-dcnode-id="1303"><p data-dcnode-id="1304"><span data-dcnode-id="1308" instrument_node="">Drawing on in-depth interviews with animation professionals, field research, and a wide-scale market survey, </span><i data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">The Anime Boom in the United States</span></i><span data-dcnode-id="1305" instrument_node=""> investigates the Japanese export of anime television and film to the United States. This story carries broad significance for those interested in understanding the cultural and media globalization.</span></p></div></td></tr><tr data-dcnode-id="1284"><td class="number" data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">407.</span></td><td class="jkt" data-dcnode-id="1296"><a data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674977006" title="Ennobling Japan’s Savage Northeast: Tōhoku as Japanese Postwar Thought, 1945–2011"><img alt="Cover: Ennobling Japan’s Savage Northeast: Tōhoku as Japanese Postwar Thought, 1945–2011" data-dcnode-id="1298" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674977006-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1285"><p class="title" data-dcnode-id="1293"><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674977006"><span data-dcnode-id="1295" instrument_node="">Ennobling Japan’s Savage Northeast: Tōhoku as Japanese Postwar Thought, 1945–2011</span></a></p><p class="author" data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Hopson, Nathan</span></p><div class="desc" data-dcnode-id="1286"><p data-dcnode-id="1287"><b data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Nathan Hopson</span></b><span data-dcnode-id="1288" instrument_node=""> unravels the contested postwar meanings of the Northeast Tōhoku region of Japan to reveal the complex and contradictory ways in which that region has been incorporated into Japan’s shifting self-images since World War II.</span></p></div></td></tr><tr data-dcnode-id="1264"><td class="number" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">408.</span></td><td class="jkt" data-dcnode-id="1279"><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674977013" title="An Introduction to Chinese Poetry: From the <i>Canon of Poetry</i> to the Lyrics of the Song Dynasty"><img alt="Cover: An Introduction to Chinese Poetry: From the <i>Canon of Poetry</i> to the Lyrics of the Song Dynasty" data-dcnode-id="1281" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674977013-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1265"><p class="title" data-dcnode-id="1273"><a data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674977013"><span data-dcnode-id="1278" instrument_node="">An Introduction to Chinese Poetry: From the </span><i data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Canon of Poetry</span></i><span data-dcnode-id="1275" instrument_node=""> to the Lyrics of the Song Dynasty</span></a></p><p class="author" data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Fuller, Michael A.</span></p><div class="desc" data-dcnode-id="1266"><p data-dcnode-id="1267"><b data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Michael A. Fuller</span></b><span data-dcnode-id="1268" instrument_node="">’s innovative textbook for learning classical Chinese poetry moves beyond the traditional anthology of poems translated into English and instead brings readers—including those with no knowledge of Chinese—as close as possible to the texture of the poems in their original language.</span></p></div></td></tr><tr data-dcnode-id="1247"><td class="number" data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">409.</span></td><td class="jkt" data-dcnode-id="1259"><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674977167" title="Revolutionary Waves: The Crowd in Modern China"><img alt="Cover: Revolutionary Waves: The Crowd in Modern China" data-dcnode-id="1261" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674977167-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1248"><p class="title" data-dcnode-id="1256"><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674977167"><span data-dcnode-id="1258" instrument_node="">Revolutionary Waves: The Crowd in Modern China</span></a></p><p class="author" data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Xiao, Tie</span></p><div class="desc" data-dcnode-id="1249"><p data-dcnode-id="1250"><i data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Revolutionary Waves</span></i><span data-dcnode-id="1251" instrument_node=""> analyzes the crowd in the Chinese cultural and political imagination and its global resonances by delving into a wide range of fiction, philosophy, poetry, and psychological studies—raising questions about the promise and peril of community as communion and reimagining collective life in China’s post-socialist present.</span></p></div></td></tr><tr data-dcnode-id="1227"><td class="number" data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">410.</span></td><td class="jkt" data-dcnode-id="1242"><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674983847" title="Navigating Semi-Colonialism: Shipping, Sovereignty, and Nation-Building in China, 1860–1937"><img alt="Cover: Navigating Semi-Colonialism: Shipping, Sovereignty, and Nation-Building in China, 1860–1937" data-dcnode-id="1244" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674983847-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1228"><p class="title" data-dcnode-id="1239"><a data-dcnode-id="1240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674983847"><span data-dcnode-id="1241" instrument_node="">Navigating Semi-Colonialism: Shipping, Sovereignty, and Nation-Building in China, 1860–1937</span></a></p><p class="author" data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Reinhardt, Anne</span></p><div class="desc" data-dcnode-id="1229"><p data-dcnode-id="1230"><i data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Navigating Semi-Colonialism</span></i><span data-dcnode-id="1234" instrument_node=""> examines steam navigation, which was introduced by foreign powers to Chinese waters in the mid-nineteenth century. </span><b data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Anne Reinhardt</span></b><span data-dcnode-id="1231" instrument_node=""> illuminates both conceptual and concrete aspects of this regime, arguing for the specificity of China’s experience, its continuities with colonialism, and its links to global processes.</span></p></div></td></tr><tr data-dcnode-id="1210"><td class="number" data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">411.</span></td><td class="jkt" data-dcnode-id="1222"><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674983854" title="Legal Lessons: Popularizing Laws in the People’s Republic of China, 1949–1989"><img alt="Cover: Legal Lessons: Popularizing Laws in the People’s Republic of China, 1949–1989" data-dcnode-id="1224" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674983854-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1211"><p class="title" data-dcnode-id="1219"><a data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674983854"><span data-dcnode-id="1221" instrument_node="">Legal Lessons: Popularizing Laws in the People’s Republic of China, 1949–1989</span></a></p><p class="author" data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Altehenger, Jennifer</span></p><div class="desc" data-dcnode-id="1212"><p data-dcnode-id="1213"><i data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Legal Lessons</span></i><span data-dcnode-id="1214" instrument_node=""> examines how China’s party-state attempted to motivate ordinary citizens to learn laws during the Mao period. Archival records, advice manuals, and colorful propaganda materials reveal how official attempts to promote “correct” understanding of laws intersected with the interpretations and practical experiences of the people.</span></p></div></td></tr><tr data-dcnode-id="1193"><td class="number" data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">412.</span></td><td class="jkt" data-dcnode-id="1205"><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674983861" title="Word Embodied: The Jeweled Pagoda Mandalas in Japanese Buddhist Art"><img alt="Cover: Word Embodied: The Jeweled Pagoda Mandalas in Japanese Buddhist Art" data-dcnode-id="1207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674983861-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1194"><p class="title" data-dcnode-id="1202"><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674983861"><span data-dcnode-id="1204" instrument_node="">Word Embodied: The Jeweled Pagoda Mandalas in Japanese Buddhist Art</span></a></p><p class="author" data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">O’Neal, Halle</span></p><div class="desc" data-dcnode-id="1195"><p data-dcnode-id="1196"><b data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Halle O’Neal</span></b><span data-dcnode-id="1197" instrument_node=""> unpacks jeweled pagoda mandala paintings and their revolutionary entwining of word and image to reveal crucial dynamics underlying Japanese Buddhist art—including invisibility, performative viewing, and the spectacular visualizations of embodiment.</span></p></div></td></tr><tr data-dcnode-id="1173"><td class="number" data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">413.</span></td><td class="jkt" data-dcnode-id="1188"><a data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674983878" title="Give and Take: Poverty and the Status Order in Early Modern Japan"><img alt="Cover: Give and Take: Poverty and the Status Order in Early Modern Japan" data-dcnode-id="1190" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674983878-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1174"><p class="title" data-dcnode-id="1185"><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674983878"><span data-dcnode-id="1187" instrument_node="">Give and Take: Poverty and the Status Order in Early Modern Japan</span></a></p><p class="author" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Ehlers, Maren A.</span></p><div class="desc" data-dcnode-id="1175"><p data-dcnode-id="1176"><i data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Give and Take</span></i><span data-dcnode-id="1180" instrument_node=""> offers a new history of government in Tokugawa Japan (1600–1868), one that focuses on ordinary subjects: merchants, artisans, villagers, and people at the margins of society. </span><b data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Maren Ehlers</span></b><span data-dcnode-id="1177" instrument_node=""> explores how high and low people negotiated and collaborated with each other as they addressed the problem of poverty in early modern Japan.</span></p></div></td></tr><tr data-dcnode-id="1156"><td class="number" data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">414.</span></td><td class="jkt" data-dcnode-id="1168"><a data-dcnode-id="1169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674987173" title="Body, Society, and Nation: The Creation of Public Health and Urban Culture in Shanghai"><img alt="Cover: Body, Society, and Nation: The Creation of Public Health and Urban Culture in Shanghai" data-dcnode-id="1170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674987173-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1157"><p class="title" data-dcnode-id="1165"><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674987173"><span data-dcnode-id="1167" instrument_node="">Body, Society, and Nation: The Creation of Public Health and Urban Culture in Shanghai</span></a></p><p class="author" data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Nakajima, Chieko</span></p><div class="desc" data-dcnode-id="1158"><p data-dcnode-id="1159"><b data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Chieko Nakajima</span></b><span data-dcnode-id="1160" instrument_node=""> tells the story of China’s unfolding modernity, exploring changing ideas, practices, and systems related to health and body in late nineteenth- and twentieth-century Shanghai. She explains how local customs fashioned and constrained public health and, in turn, how hygienic modernity helped shape local cultures and behavior.</span></p></div></td></tr><tr data-dcnode-id="1135"><td class="number" data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">415.</span></td><td class="jkt" data-dcnode-id="1151"><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674987180" title="The Translatability of Revolution: Guo Moruo and Twentieth-Century Chinese Culture"><img alt="Cover: The Translatability of Revolution: Guo Moruo and Twentieth-Century Chinese Culture" data-dcnode-id="1153" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674987180-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1136"><p class="title" data-dcnode-id="1148"><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674987180"><span data-dcnode-id="1150" instrument_node="">The Translatability of Revolution: Guo Moruo and Twentieth-Century Chinese Culture</span></a></p><p class="author" data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Wang, Pu</span></p><div class="desc" data-dcnode-id="1137"><p data-dcnode-id="1138"><span data-dcnode-id="1145" instrument_node="">In the first comprehensive study of Guo Moruo in English, </span><b data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Pu Wang</span></b><span data-dcnode-id="1142" instrument_node=""> explores the dynamics of translation, revolution, and historical imagination in twentieth-century Chinese culture. Guo was a romantic writer, Mao Zedong’s last poetic interlocutor, a Marxist historian, president of China’s Academy of Sciences, and translator of Goethe’s </span><i data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Faust</span></i><span data-dcnode-id="1139" instrument_node="">.</span></p></div></td></tr><tr data-dcnode-id="1120"><td class="number" data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">416.</span></td><td class="jkt" data-dcnode-id="1130"><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674987197" title="The Korean Buddhist Empire: A Transnational History, 1910–1945"><img alt="Cover: The Korean Buddhist Empire: A Transnational History, 1910–1945" data-dcnode-id="1132" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674987197-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1121"><p class="title" data-dcnode-id="1127"><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674987197"><span data-dcnode-id="1129" instrument_node="">The Korean Buddhist Empire: A Transnational History, 1910–1945</span></a></p><p class="author" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Kim, Hwansoo Ilmee</span></p><div class="desc" data-dcnode-id="1122"><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Korean Buddhists, despite living under colonial rule, reconfigured sacred objects, festivals, urban temples, propagation—and even their own identities—to modernize and elevate Korean Buddhism. By focusing on six case studies, this book highlights the centrality of transnational relationships in the transformation of colonial Korean Buddhism.</span></p></div></td></tr><tr data-dcnode-id="1107"><td class="number" data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">417.</span></td><td class="jkt" data-dcnode-id="1115"><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674237216" title="Voting as a Rite: A History of Elections in Modern China"><img alt="Cover: Voting as a Rite: A History of Elections in Modern China" data-dcnode-id="1117" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674237216-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1108"><p class="title" data-dcnode-id="1112"><a data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674237216"><span data-dcnode-id="1114" instrument_node="">Voting as a Rite: A History of Elections in Modern China</span></a></p><p class="author" data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Hill, Joshua</span></p><div class="desc" data-dcnode-id="1109"></div></td></tr><tr data-dcnode-id="1094"><td class="number" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">418.</span></td><td class="jkt" data-dcnode-id="1102"><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674237278" title="Lost Histories: Recovering the Lives of Japan’s Colonial Peoples"><img alt="Cover: Lost Histories: Recovering the Lives of Japan’s Colonial Peoples" data-dcnode-id="1104" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674237278-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1095"><p class="title" data-dcnode-id="1099"><a data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674237278"><span data-dcnode-id="1101" instrument_node="">Lost Histories: Recovering the Lives of Japan’s Colonial Peoples</span></a></p><p class="author" data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Ziomek, Kirsten L.</span></p><div class="desc" data-dcnode-id="1096"></div></td></tr><tr data-dcnode-id="1081"><td class="number" data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">419.</span></td><td class="jkt" data-dcnode-id="1089"><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674237230" title="Poetic Transformations: Eighteenth-Century Cultural Projects on the Mekong Plains"><img alt="Cover: Poetic Transformations: Eighteenth-Century Cultural Projects on the Mekong Plains" data-dcnode-id="1091" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674237230-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1082"><p class="title" data-dcnode-id="1086"><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674237230"><span data-dcnode-id="1088" instrument_node="">Poetic Transformations: Eighteenth-Century Cultural Projects on the Mekong Plains</span></a></p><p class="author" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Ang, Claudine</span></p><div class="desc" data-dcnode-id="1083"></div></td></tr><tr data-dcnode-id="1068"><td class="number" data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">420.</span></td><td class="jkt" data-dcnode-id="1076"><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674237209" title="Becoming Taiwanese: Ethnogenesis in a Colonial City, 1880s to 1950s"><img alt="Cover: Becoming Taiwanese: Ethnogenesis in a Colonial City, 1880s to 1950s" data-dcnode-id="1078" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674237209-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1069"><p class="title" data-dcnode-id="1073"><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674237209"><span data-dcnode-id="1075" instrument_node="">Becoming Taiwanese: Ethnogenesis in a Colonial City, 1880s to 1950s</span></a></p><p class="author" data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Dawley, Evan N.</span></p><div class="desc" data-dcnode-id="1070"></div></td></tr><tr data-dcnode-id="1055"><td class="number" data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">421.</span></td><td class="jkt" data-dcnode-id="1063"><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674237261" title="The Worship of Confucius in Japan"><img alt="Cover: The Worship of Confucius in Japan" data-dcnode-id="1065" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674237261-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1056"><p class="title" data-dcnode-id="1060"><a data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674237261"><span data-dcnode-id="1062" instrument_node="">The Worship of Confucius in Japan</span></a></p><p class="author" data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">McMullen, James</span></p><div class="desc" data-dcnode-id="1057"></div></td></tr><tr data-dcnode-id="1035"><td class="number" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">422.</span></td><td class="jkt" data-dcnode-id="1050"><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674241121" title="Imaginative Mapping: Landscape and Japanese Identity in the Tokugawa and Meiji Eras"><img alt="Cover: Imaginative Mapping: Landscape and Japanese Identity in the Tokugawa and Meiji Eras" data-dcnode-id="1052" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674241121-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1036"><p class="title" data-dcnode-id="1047"><a data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674241121"><span data-dcnode-id="1049" instrument_node="">Imaginative Mapping: Landscape and Japanese Identity in the Tokugawa and Meiji Eras</span></a></p><p class="author" data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Toyosawa, Nobuko</span></p><div class="desc" data-dcnode-id="1037"><p data-dcnode-id="1038"><i data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Imaginative Mapping</span></i><span data-dcnode-id="1042" instrument_node=""> analyzes how intellectuals of the Tokugawa and Meiji eras used specific features and aspects of the landscape to represent their idea of Japan and produce a narrative of Japan as a cultural community. </span><b data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Nobuko Toyosawa</span></b><span data-dcnode-id="1039" instrument_node=""> argues that the circulation spatial narratives allowed readers to imagine the broader conceptual space of Japan.</span></p></div></td></tr><tr data-dcnode-id="1015"><td class="number" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">423.</span></td><td class="jkt" data-dcnode-id="1030"><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674241138" title="Famine Relief in Warlord China"><img alt="Cover: Famine Relief in Warlord China" data-dcnode-id="1032" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674241138-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1016"><p class="title" data-dcnode-id="1027"><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674241138"><span data-dcnode-id="1029" instrument_node="">Famine Relief in Warlord China</span></a></p><p class="author" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Fuller, Pierre</span></p><div class="desc" data-dcnode-id="1017"><p data-dcnode-id="1018"><i data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Famine Relief in Warlord China</span></i><span data-dcnode-id="1022" instrument_node=""> explores disaster responses during the greatest ecological crisis of the pre-Nationalist Chinese republic. </span><b data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Pierre Fuller</span></b><span data-dcnode-id="1019" instrument_node=""> details how indigenous action from the household to the national level, not international intervention, sustained the lives of millions of the destitute in Beijing.</span></p></div></td></tr><tr data-dcnode-id="995"><td class="number" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">424.</span></td><td class="jkt" data-dcnode-id="1010"><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674241152" title="Powers of the Real: Cinema, Gender, and Emotion in Interwar Japan"><img alt="Cover: Powers of the Real: Cinema, Gender, and Emotion in Interwar Japan" data-dcnode-id="1012" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674241152-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="996"><p class="title" data-dcnode-id="1007"><a data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674241152"><span data-dcnode-id="1009" instrument_node="">Powers of the Real: Cinema, Gender, and Emotion in Interwar Japan</span></a></p><p class="author" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Lewis, Diane Wei</span></p><div class="desc" data-dcnode-id="997"><p data-dcnode-id="998"><i data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Powers of the Real</span></i><span data-dcnode-id="1002" instrument_node=""> analyzes the cultural politics of cinema’s persuasive sensory realism in interwar Japan. Examining cultural criticism, art, news media, literature, and film, </span><b data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Lewis</span></b><span data-dcnode-id="999" instrument_node=""> offers new perspectives on media history, the commodification of intimacy and emotion, film realism, and gender politics in the “age of the mass society” in Japan.</span></p></div></td></tr><tr data-dcnode-id="974"><td class="number" data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">425.</span></td><td class="jkt" data-dcnode-id="990"><a data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674241176" title="Orthodox Passions: Narrating Filial Love during the High Qing"><img alt="Cover: Orthodox Passions: Narrating Filial Love during the High Qing" data-dcnode-id="992" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674241176-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="975"><p class="title" data-dcnode-id="987"><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674241176"><span data-dcnode-id="989" instrument_node="">Orthodox Passions: Narrating Filial Love during the High Qing</span></a></p><p class="author" data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Epstein, Maram</span></p><div class="desc" data-dcnode-id="976"><p data-dcnode-id="977"><span data-dcnode-id="984" instrument_node="">In this groundbreaking study, </span><b data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Maram Epstein</span></b><span data-dcnode-id="981" instrument_node=""> identifies filial piety as the dominant expression of love in Qing dynasty texts. By decentering romantic feeling as the dominant expression of love during the High Qing, </span><i data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Orthodox Passions</span></i><span data-dcnode-id="978" instrument_node=""> calls for a new understanding of the affective landscape of late imperial China.</span></p></div></td></tr><tr data-dcnode-id="957"><td class="number" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">426.</span></td><td class="jkt" data-dcnode-id="969"><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674241183" title="Regional Literature and the Transmission of Culture: Chinese Drum Ballads, 1800–1937"><img alt="Cover: Regional Literature and the Transmission of Culture: Chinese Drum Ballads, 1800–1937" data-dcnode-id="971" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674241183-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="958"><p class="title" data-dcnode-id="966"><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674241183"><span data-dcnode-id="968" instrument_node="">Regional Literature and the Transmission of Culture: Chinese Drum Ballads, 1800–1937</span></a></p><p class="author" data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Wan, Margaret B.</span></p><div class="desc" data-dcnode-id="959"><p data-dcnode-id="960"><i data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Regional Literature and the Transmission of Culture</span></i><span data-dcnode-id="961" instrument_node=""> provides a textured picture of cultural transmission in the Qing and early Republican eras. Study of drum ballads opens up new perspectives in Chinese literature and history and offers a new paradigm that will interest scholars of cultural history, literature, legal history, and popular culture.</span></p></div></td></tr><tr data-dcnode-id="934"><td class="number" data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">427.</span></td><td class="jkt" data-dcnode-id="952"><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674244405" title="Flowering Tales: Women Exorcising History in Heian Japan"><img alt="Cover: Flowering Tales: Women Exorcising History in Heian Japan" data-dcnode-id="954" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674244405-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="935"><p class="title" data-dcnode-id="949"><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674244405"><span data-dcnode-id="951" instrument_node="">Flowering Tales: Women Exorcising History in Heian Japan</span></a></p><p class="author" data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Watanabe, Takeshi</span></p><div class="desc" data-dcnode-id="936"><p data-dcnode-id="937"><i data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Flowering Tales</span></i><span data-dcnode-id="944" instrument_node=""> is the first extensive literary study of </span><i data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">A Tale of Flowering Fortunes</span></i><span data-dcnode-id="941" instrument_node=""> (</span><i data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Eiga monogatari</span></i><span data-dcnode-id="938" instrument_node="">), a historical tale that covers 150 years of births, deaths, and happenings of late Heian society, a golden age of Japanese court literature.</span></p></div></td></tr><tr data-dcnode-id="913"><td class="number" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">428.</span></td><td class="jkt" data-dcnode-id="929"><a data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674244412" title="Wings for the Rising Sun: A Transnational History of Japanese Aviation"><img alt="Cover: Wings for the Rising Sun: A Transnational History of Japanese Aviation" data-dcnode-id="931" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674244412-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="914"><p class="title" data-dcnode-id="926"><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674244412"><span data-dcnode-id="928" instrument_node="">Wings for the Rising Sun: A Transnational History of Japanese Aviation</span></a></p><p class="author" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Melzer, Jürgen P.</span></p><div class="desc" data-dcnode-id="915"><p data-dcnode-id="916"><span data-dcnode-id="923" instrument_node="">In </span><i data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Wings for the Rising Sun</span></i><span data-dcnode-id="920" instrument_node="">, scholar and former airline pilot </span><b data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Jürgen Melzer</span></b><span data-dcnode-id="917" instrument_node=""> tells the history of Japanese aviation as a story of international cooperation, competition, and conflict. He details how Japan absorbed technologies from abroad, fostered public enthusiasm for aviation at home, and eventually crafted boldly original flying machines.</span></p></div></td></tr><tr data-dcnode-id="885"><td class="number" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">429.</span></td><td class="jkt" data-dcnode-id="908"><a data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674244436" title="Unreal Houses: Character, Gender, and Genealogy in the <i>Tale of Genji</i>"><img alt="Cover: Unreal Houses: Character, Gender, and Genealogy in the <i>Tale of Genji</i>" data-dcnode-id="910" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674244436-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="886"><p class="title" data-dcnode-id="903"><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674244436"><span data-dcnode-id="907" instrument_node="">Unreal Houses: Character, Gender, and Genealogy in the </span><i data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Tale of Genji</span></i></a></p><p class="author" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Sarra, Edith</span></p><div class="desc" data-dcnode-id="887"><p data-dcnode-id="888"><b data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Edith Sarra</span></b><span data-dcnode-id="898" instrument_node=""> radically rethinks </span><i data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">The Tale of Genji</span></i><span data-dcnode-id="895" instrument_node=""> by focusing on the figure of the house—both the narrative’s images of aristocratic mansions and its representation of their inhabitants. </span><i data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Unreal Houses</span></i><span data-dcnode-id="892" instrument_node=""> opens new perspectives on the architectonics of the </span><i data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Genji</span></i><span data-dcnode-id="889" instrument_node=""> and the feminine milieu that midwifed what has been called the world’s first novel.</span></p></div></td></tr><tr data-dcnode-id="865"><td class="number" data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">430.</span></td><td class="jkt" data-dcnode-id="880"><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674244443" title="Chinese Ways of Seeing and Open-Air Painting"><img alt="Cover: Chinese Ways of Seeing and Open-Air Painting" data-dcnode-id="882" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674244443-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="866"><p class="title" data-dcnode-id="877"><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674244443"><span data-dcnode-id="879" instrument_node="">Chinese Ways of Seeing and Open-Air Painting</span></a></p><p class="author" data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Gu, Yi</span></p><div class="desc" data-dcnode-id="867"><p data-dcnode-id="868"><i data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Chinese Ways of Seeing and Open-Air Painting</span></i><span data-dcnode-id="872" instrument_node=""> chronicles the life of a modern art form. In the late 1910s Chinese painters began working outdoors. They also adopted linear perspective and Cartesian optics. </span><b data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Yi Gu</span></b><span data-dcnode-id="869" instrument_node=""> reflects on the complex interaction of local and Western aesthetics within the new form and on the nature of visual modernity in China.</span></p></div></td></tr><tr data-dcnode-id="847"><td class="number" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">431.</span></td><td class="jkt" data-dcnode-id="860"><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674244467" title="Red Silk: Class, Gender, and Revolution in China’s Yangzi Delta Silk Industry"><img alt="Cover: Red Silk: Class, Gender, and Revolution in China’s Yangzi Delta Silk Industry" data-dcnode-id="862" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674244467-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="848"><p class="title" data-dcnode-id="857"><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674244467"><span data-dcnode-id="859" instrument_node="">Red Silk: Class, Gender, and Revolution in China’s Yangzi Delta Silk Industry</span></a></p><p class="author" data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Cliver, Robert</span></p><div class="desc" data-dcnode-id="849"><p data-dcnode-id="850"><span data-dcnode-id="854" instrument_node="">An extensively researched history of China’s Yangzi Delta silk industry, </span><i data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Red Silk</span></i><span data-dcnode-id="851" instrument_node=""> compares two very different groups of silk workers and their experiences in the revolution, and how their actions compelled the party-state to adjust its policy that ultimately proved disastrous.</span></p></div></td></tr><tr data-dcnode-id="826"><td class="number" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">432.</span></td><td class="jkt" data-dcnode-id="842"><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674244474" title="Japan’s Imperial House in the Postwar Era, 1945–2019"><img alt="Cover: Japan’s Imperial House in the Postwar Era, 1945–2019" data-dcnode-id="844" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674244474-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="827"><p class="title" data-dcnode-id="839"><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674244474"><span data-dcnode-id="841" instrument_node="">Japan’s Imperial House in the Postwar Era, 1945–2019</span></a></p><p class="author" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Ruoff, Kenneth J.</span></p><div class="desc" data-dcnode-id="828"><p data-dcnode-id="829"><span data-dcnode-id="836" instrument_node="">With the ascension of a new emperor and the dawn of the Reiwa Era, </span><b data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Kenneth J. Ruoff</span></b><span data-dcnode-id="833" instrument_node=""> expands upon and updates </span><a class="publicationTitle" data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674010888"><span data-dcnode-id="832" instrument_node="">The People’s Emperor</span></a><span data-dcnode-id="830" instrument_node="">, his study of the monarchy’s role as a political, societal, and cultural institution in contemporary Japan.</span></p></div></td></tr><tr data-dcnode-id="802"><td class="number" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">433.</span></td><td class="jkt" data-dcnode-id="821"><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674247819" title="Reflecting the Past: Place, Language, and Principle in Japan’s Medieval <i>Mirror</i> Genre"><img alt="Cover: Reflecting the Past: Place, Language, and Principle in Japan’s Medieval <i>Mirror</i> Genre" data-dcnode-id="823" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674247819-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="803"><p class="title" data-dcnode-id="815"><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674247819"><span data-dcnode-id="820" instrument_node="">Reflecting the Past: Place, Language, and Principle in Japan’s Medieval </span><i data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Mirror</span></i><span data-dcnode-id="817" instrument_node=""> Genre</span></a></p><p class="author" data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Brightwell, Erin L.</span></p><div class="desc" data-dcnode-id="804"><p data-dcnode-id="805"><span data-dcnode-id="812" instrument_node="">Drawing on a decade of research, </span><b data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Erin Brightwell</span></b><span data-dcnode-id="809" instrument_node=""> analyzes eight </span><i data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Mirrors</span></i><span data-dcnode-id="806" instrument_node=""> and related medieval Japanese texts recounting the history of that time and place. Downplayed and obscured by previous scholars, the mirrors emerge as a once-dominant genre of historical writing—a means by which authors brought order to the chaos of the period.</span></p></div></td></tr><tr data-dcnode-id="782"><td class="number" data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">434.</span></td><td class="jkt" data-dcnode-id="797"><a data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674247826" title="Earthquake Children: Building Resilience from the Ruins of Tokyo"><img alt="Cover: Earthquake Children: Building Resilience from the Ruins of Tokyo" data-dcnode-id="799" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674247826-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="783"><p class="title" data-dcnode-id="794"><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674247826"><span data-dcnode-id="796" instrument_node="">Earthquake Children: Building Resilience from the Ruins of Tokyo</span></a></p><p class="author" data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Borland, Janet</span></p><div class="desc" data-dcnode-id="784"><p data-dcnode-id="785"><i data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Earthquake Children</span></i><span data-dcnode-id="789" instrument_node=""> is the first book to examine the origins of modern Japan’s infrastructure of resilience. </span><b data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Janet Borland</span></b><span data-dcnode-id="786" instrument_node=""> vividly demonstrates that Japan’s contemporary culture of disaster preparedness—and its people’s ability to respond calmly in times of emergency—are the results of learned and practiced behaviors inspired by earlier tragedies.</span></p></div></td></tr><tr data-dcnode-id="759"><td class="number" data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">435.</span></td><td class="jkt" data-dcnode-id="777"><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674247840" title="Dancing the Dharma: Religious and Political Allegory in Japanese Noh Theater"><img alt="Cover: Dancing the Dharma: Religious and Political Allegory in Japanese Noh Theater" data-dcnode-id="779" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674247840-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="760"><p class="title" data-dcnode-id="774"><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674247840"><span data-dcnode-id="776" instrument_node="">Dancing the Dharma: Religious and Political Allegory in Japanese Noh Theater</span></a></p><p class="author" data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Klein, Susan Blakeley</span></p><div class="desc" data-dcnode-id="761"><p data-dcnode-id="762"><i data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Dancing the Dharma</span></i><span data-dcnode-id="769" instrument_node=""> examines the theory and practice of allegory by exploring a select group of medieval Japanese </span><i data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">noh</span></i><span data-dcnode-id="766" instrument_node=""> plays and treatises. Understanding </span><i data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">noh</span></i><span data-dcnode-id="763" instrument_node="">’s allegorical structure and paying attention to the localized historical context for individual plays are key to recovering their original function as political and religious allegories.</span></p></div></td></tr><tr data-dcnode-id="738"><td class="number" data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">436.</span></td><td class="jkt" data-dcnode-id="754"><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674247857" title="Varieties of State Regulation: How China Regulates Its Socialist Market Economy"><img alt="Cover: Varieties of State Regulation: How China Regulates Its Socialist Market Economy" data-dcnode-id="756" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674247857-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="739"><p class="title" data-dcnode-id="751"><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674247857"><span data-dcnode-id="753" instrument_node="">Varieties of State Regulation: How China Regulates Its Socialist Market Economy</span></a></p><p class="author" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Yeo, Yukyung</span></p><div class="desc" data-dcnode-id="740"><p data-dcnode-id="741"><span data-dcnode-id="748" instrument_node="">In </span><i data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Varieties of State Regulation</span></i><span data-dcnode-id="745" instrument_node="">, </span><b data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Yukyung Yeo</span></b><span data-dcnode-id="742" instrument_node=""> explores how the Chinese central party-state continues to oversee the most strategic sectors of its economy, and how the form of central state control varies considerably across leading industrial sectors, depending on the dominant mode of state ownership, conception of control, and governing structure.</span></p></div></td></tr><tr data-dcnode-id="711"><td class="number" data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">437.</span></td><td class="jkt" data-dcnode-id="733"><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674247871" title="Printing Landmarks: Popular Geography and <i>Meisho Zue</i> in Late Tokugawa Japan"><img alt="Cover: Printing Landmarks: Popular Geography and <i>Meisho Zue</i> in Late Tokugawa Japan" data-dcnode-id="735" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674247871-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="712"><p class="title" data-dcnode-id="727"><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674247871"><span data-dcnode-id="732" instrument_node="">Printing Landmarks: Popular Geography and </span><i data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Meisho Zue</span></i><span data-dcnode-id="729" instrument_node=""> in Late Tokugawa Japan</span></a></p><p class="author" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Goree, Robert</span></p><div class="desc" data-dcnode-id="713"><p data-dcnode-id="714"><span data-dcnode-id="724" instrument_node="">Spanning the fields of book history, travel literature, map history, and visual culture, </span><i data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Printing Landmarks</span></i><span data-dcnode-id="721" instrument_node=""> provides a new perspective on Tokugawa-period culture. </span><b data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Robert Goree</span></b><span data-dcnode-id="718" instrument_node=""> draws on diverse archival and scholarly sources to explore why </span><i data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">meisho zue</span></i><span data-dcnode-id="715" instrument_node=""> enjoyed widespread and enduring popularity.</span></p></div></td></tr><tr data-dcnode-id="694"><td class="number" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">438.</span></td><td class="jkt" data-dcnode-id="706"><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674247888" title="A Third Way: The Origins of China’s Current Economic Development Strategy"><img alt="Cover: A Third Way: The Origins of China’s Current Economic Development Strategy" data-dcnode-id="708" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674247888-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="695"><p class="title" data-dcnode-id="703"><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674247888"><span data-dcnode-id="705" instrument_node="">A Third Way: The Origins of China’s Current Economic Development Strategy</span></a></p><p class="author" data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Reardon, Lawrence C.</span></p><div class="desc" data-dcnode-id="696"><p data-dcnode-id="697"><i data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">A Third Way</span></i><span data-dcnode-id="698" instrument_node=""> tells the story of Deng Xiaoping’s experimentation with export-led development inspired by Lenin’s New Economic Policy and the economic reforms of Eastern Europe and Asia. This book provides important new insights about the crucial period of the 1980s and how it paved the way for China’s transformation into a global economic superpower.</span></p></div></td></tr><tr data-dcnode-id="674"><td class="number" data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">439.</span></td><td class="jkt" data-dcnode-id="689"><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674247956" title="One Belt One Road: Chinese Power Meets the World"><img alt="Cover: One Belt One Road: Chinese Power Meets the World" data-dcnode-id="691" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674247956-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="675"><p class="title" data-dcnode-id="686"><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674247956"><span data-dcnode-id="688" instrument_node="">One Belt One Road: Chinese Power Meets the World</span></a></p><p class="author" data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Freymann, Eyck</span></p><div class="desc" data-dcnode-id="676"><p data-dcnode-id="677"><i data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">One Belt One Road</span></i><span data-dcnode-id="681" instrument_node=""> argues that the largest global infrastructure development program in history is not the centralized and systematic project that many assume. Rather, </span><b data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Eyck Freymann</span></b><span data-dcnode-id="678" instrument_node=""> suggests, the campaign aims to build the cult of Chinese President Xi Jinping while exporting an ancient model of patronage and tribute.</span></p></div></td></tr><tr data-dcnode-id="655"><td class="number" data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">440.</span></td><td class="jkt" data-dcnode-id="669"><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674251281" title="Financial Liberalization and Economic Development in Korea, 1980–2020"><img alt="Cover: Financial Liberalization and Economic Development in Korea, 1980–2020" data-dcnode-id="671" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674251281-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="656"><p class="title" data-dcnode-id="666"><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674251281"><span data-dcnode-id="668" instrument_node="">Financial Liberalization and Economic Development in Korea, 1980–2020</span></a></p><p class="author" data-dcnode-id="660"><span data-dcnode-id="665" instrument_node="">Park, Yung Chul</span><br data-dcnode-id="664"><span data-dcnode-id="663" instrument_node="">
Kim, Joon Kyung</span><br data-dcnode-id="662"><span data-dcnode-id="661" instrument_node="">
Park, Hail</span></p><div class="desc" data-dcnode-id="657"><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Korea’s financial development has been a tale of liberalization and opening but the new system has failed to steer the country away from financial crises. This study analyzes the changes in the financial system and finds that financial liberalization has contributed little to grow and stabilize the Korean economy.</span></p></div></td></tr><tr data-dcnode-id="634"><td class="number" data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">441.</span></td><td class="jkt" data-dcnode-id="650"><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674251205" title="Opportunity in Crisis: Cantonese Migrants and the State in Late Qing China"><img alt="Cover: Opportunity in Crisis: Cantonese Migrants and the State in Late Qing China" data-dcnode-id="652" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674251205-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="635"><p class="title" data-dcnode-id="647"><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674251205"><span data-dcnode-id="649" instrument_node="">Opportunity in Crisis: Cantonese Migrants and the State in Late Qing China</span></a></p><p class="author" data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Miles, Steven B.</span></p><div class="desc" data-dcnode-id="636"><p data-dcnode-id="637"><span data-dcnode-id="644" instrument_node="">In </span><i data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Opportunity in Crisis</span></i><span data-dcnode-id="641" instrument_node="">, an exploration of the late Qing Cantonese migration along the West River, </span><b data-dcnode-id="639"><span
