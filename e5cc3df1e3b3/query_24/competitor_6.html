Gong, Li</span></p><div class="desc" data-dcnode-id="3880"><p data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">Relations between China and the United States have been of central importance to both countries over the past half-century, as well as to all states affected by that relationship. The eight chapters in this volume offer the first multinational, multi-archival review of the history of Chinese–American conflict and cooperation in the 1970s.</span></p></div></td></tr><tr data-dcnode-id="3863"><td class="number" data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">255.</span></td><td class="jkt" data-dcnode-id="3873"><a data-dcnode-id="3874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674019522" title="Practical Pursuits: Takano Choei, Takahashi Keisaku, and Western Medicine in Nineteenth-Century Japan"><img alt="Cover: Practical Pursuits: Takano Choei, Takahashi Keisaku, and Western Medicine in Nineteenth-Century Japan" data-dcnode-id="3875" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674019522-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3864"><p class="title" data-dcnode-id="3870"><a data-dcnode-id="3871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674019522"><span data-dcnode-id="3872" instrument_node="">Practical Pursuits: Takano Choei, Takahashi Keisaku, and Western Medicine in Nineteenth-Century Japan</span></a></p><p class="author" data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">Nakamura, Ellen Gardner</span></p><div class="desc" data-dcnode-id="3865"><p data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">This book argues that the study of Western medicine was a dynamic activity that brought together doctors from all over the country in efforts to effect social change. By examining the social impact of Western learning at the level of everyday life rather than simply its impact at the theoretical level, the book offers a broad picture of the way in which Western medicine, and Western knowledge, was absorbed and adapted in Japan.</span></p></div></td></tr><tr data-dcnode-id="3834"><td class="number" data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">256.</span></td><td class="jkt" data-dcnode-id="3858"><a data-dcnode-id="3859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674019577" title="A History of the Early Korean Kingdom of Paekche, together with an annotated translation of <i>The Paekche Annals</i> of the <i>Samguk sagi</i>"><img alt="Cover: A History of the Early Korean Kingdom of Paekche, together with an annotated translation of <i>The Paekche Annals</i> of the <i>Samguk sagi</i>" data-dcnode-id="3860" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674019577-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3835"><p class="title" data-dcnode-id="3850"><a data-dcnode-id="3851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674019577"><span data-dcnode-id="3857" instrument_node="">A History of the Early Korean Kingdom of Paekche, together with an annotated translation of </span><i data-dcnode-id="3855"><span data-dcnode-id="3856" instrument_node="">The Paekche Annals</span></i><span data-dcnode-id="3854" instrument_node=""> of the </span><i data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">Samguk sagi</span></i></a></p><p class="author" data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">Best, Jonathan W.</span></p><div class="desc" data-dcnode-id="3836"><p data-dcnode-id="3837"><span data-dcnode-id="3847" instrument_node="">This book presents two histories of the early Korean kingdom of Paekche (trad. 18 BCE–660 CE). The first, written by </span><b data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">Best</span></b><span data-dcnode-id="3844" instrument_node="">, is based largely on primary sources. This initial history serves, in part, to introduce the second, an extensively annotated translation of the oldest history of the kingdom, </span><i data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">The Paekche Annals</span></i><span data-dcnode-id="3841" instrument_node=""> (</span><i data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">Paekche pon’gi</span></i><span data-dcnode-id="3838" instrument_node="">).</span></p></div></td></tr><tr data-dcnode-id="3819"><td class="number" data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">257.</span></td><td class="jkt" data-dcnode-id="3829"><a data-dcnode-id="3830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674019638" title="The United Nations in Japan's Foreign and Security Policymaking, 1945-1992: National Security, Party Politics, and International Status"><img alt="Cover: The United Nations in Japan's Foreign and Security Policymaking, 1945-1992: National Security, Party Politics, and International Status" data-dcnode-id="3831" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674019638-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3820"><p class="title" data-dcnode-id="3826"><a data-dcnode-id="3827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674019638"><span data-dcnode-id="3828" instrument_node="">The United Nations in Japan's Foreign and Security Policymaking, 1945-1992: National Security, Party Politics, and International Status</span></a></p><p class="author" data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">Pan, Liang</span></p><div class="desc" data-dcnode-id="3821"><p data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">This study focuses on postwar Japan’s foreign policy making in the political and security areas, the core UN missions. The intent is to illustrate how policy goals forged by national security concerns, domestic politics, and psychological needs gave shape to Japan’s complicated and sometimes incongruous policy toward the UN since World War II.</span></p></div></td></tr><tr data-dcnode-id="3804"><td class="number" data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">258.</span></td><td class="jkt" data-dcnode-id="3814"><a data-dcnode-id="3815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674019560" title="Localities at the Center: Native Place, Space, and Power in Late Imperial Beijing"><img alt="Cover: Localities at the Center: Native Place, Space, and Power in Late Imperial Beijing" data-dcnode-id="3816" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674019560-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3805"><p class="title" data-dcnode-id="3811"><a data-dcnode-id="3812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674019560"><span data-dcnode-id="3813" instrument_node="">Localities at the Center: Native Place, Space, and Power in Late Imperial Beijing</span></a></p><p class="author" data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">Belsky, Richard</span></p><div class="desc" data-dcnode-id="3806"><p data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">Native-place lodges are often cited as an example of the particularistic ties that characterized traditional China and worked against the emergence of a modern state based on loyalty to the nation. The author argues that by fostering awareness of membership in an elite group, the native-place lodges generated a sense of belonging to a nation that furthered the reforms undertaken in the early twentieth century.</span></p></div></td></tr><tr data-dcnode-id="3786"><td class="number" data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">259.</span></td><td class="jkt" data-dcnode-id="3799"><a data-dcnode-id="3800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021327" title="Useless to the State: “Social Problems” and Social Engineering in Nationalist Nanjing, 1927–1937"><img alt="Cover: Useless to the State: “Social Problems” and Social Engineering in Nationalist Nanjing, 1927–1937" data-dcnode-id="3801" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674021327-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3787"><p class="title" data-dcnode-id="3796"><a data-dcnode-id="3797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021327"><span data-dcnode-id="3798" instrument_node="">Useless to the State: “Social Problems” and Social Engineering in Nationalist Nanjing, 1927–1937</span></a></p><p class="author" data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">Lipkin, Zwia</span></p><div class="desc" data-dcnode-id="3788"><p data-dcnode-id="3789"><span data-dcnode-id="3793" instrument_node="">Underlying Nanjing’s 1930s policies was a concern for the capital’s image—offensive people were allowed to exist as long as they remained invisible. </span><b data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">Lipkin</span></b><span data-dcnode-id="3790" instrument_node=""> exposes the process of social engineering and the ways in which the suppressed reacted to their abuse; he puts the poor at the center of the picture, defying efforts to make them invisible.</span></p></div></td></tr><tr data-dcnode-id="3768"><td class="number" data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">260.</span></td><td class="jkt" data-dcnode-id="3781"><a data-dcnode-id="3782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021297" title="Advertising Tower: Japanese Modernism and Modernity in the 1920s"><img alt="Cover: Advertising Tower: Japanese Modernism and Modernity in the 1920s" data-dcnode-id="3783" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674021297-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3769"><p class="title" data-dcnode-id="3778"><a data-dcnode-id="3779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021297"><span data-dcnode-id="3780" instrument_node="">Advertising Tower: Japanese Modernism and Modernity in the 1920s</span></a></p><p class="author" data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">Gardner, William O.</span></p><div class="desc" data-dcnode-id="3770"><p data-dcnode-id="3771"><span data-dcnode-id="3775" instrument_node="">The activities of Japanese advertisers helped to define a new urban aesthetic emerging in the 1920s. This book examines some of the responses of Japanese authors to the transformation of Tokyo in the early decades of the twentieth century. </span><b data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">William Gardner</span></b><span data-dcnode-id="3772" instrument_node=""> shows how modernist works offer new constructions of individual subjectivity amid the social and technological changes that provided the ground for the appearance of “mass media.”</span></p></div></td></tr><tr data-dcnode-id="3753"><td class="number" data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">261.</span></td><td class="jkt" data-dcnode-id="3763"><a data-dcnode-id="3764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021365" title="The Making of Early Chinese Classical Poetry"><img alt="Cover: The Making of Early Chinese Classical Poetry" data-dcnode-id="3765" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674021365-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3754"><p class="title" data-dcnode-id="3760"><a data-dcnode-id="3761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021365"><span data-dcnode-id="3762" instrument_node="">The Making of Early Chinese Classical Poetry</span></a></p><p class="author" data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">Owen, Stephen</span></p><div class="desc" data-dcnode-id="3755"><p data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">This study adopts a double approach to the poetry composed between the end of the first century B.C.E. and the third century C.E. It examines extant material from this period synchronically, as if it were not historically arranged. It also considers how the scholars of the late fifth and early sixth centuries selected this material and reshaped it to produce the standard account of classical poetry.</span></p></div></td></tr><tr data-dcnode-id="3726"><td class="number" data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">263.</span></td><td class="jkt" data-dcnode-id="3748"><a data-dcnode-id="3749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021426" title="Crafting a Collection: The Cultural Contexts and Poetic Practice of the <i>Huajian ji</i> (<i>Collection from Among the Flowers</i>)"><img alt="Cover: Crafting a Collection: The Cultural Contexts and Poetic Practice of the <i>Huajian ji</i> (<i>Collection from Among the Flowers</i>)" data-dcnode-id="3750" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674021426-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3727"><p class="title" data-dcnode-id="3739"><a data-dcnode-id="3740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021426"><span data-dcnode-id="3747" instrument_node="">Crafting a Collection: The Cultural Contexts and Poetic Practice of the </span><i data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">Huajian ji</span></i><span data-dcnode-id="3744" instrument_node=""> (</span><i data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">Collection from Among the Flowers</span></i><span data-dcnode-id="3741" instrument_node="">)</span></a></p><p class="author" data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">Shields, Anna M.</span></p><div class="desc" data-dcnode-id="3728"><p data-dcnode-id="3729"><span data-dcnode-id="3736" instrument_node="">Compiled in 940 at the court of the kingdom of Shu, the </span><i data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">Huajian ji</span></i><span data-dcnode-id="3733" instrument_node=""> is the earliest extant collection of lyrics by literati poets. </span><b data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">Shields</span></b><span data-dcnode-id="3730" instrument_node=""> examines the influence of court culture on the anthology’s creation and the significance of imitation and convention in its lyrics, situating the work within larger questions of Chinese literary history.</span></p></div></td></tr><tr data-dcnode-id="3709"><td class="number" data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">264.</span></td><td class="jkt" data-dcnode-id="3721"><a data-dcnode-id="3722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674033283" title="The Late Tang: Chinese Poetry of the Mid-Ninth Century (827–860)"><img alt="Cover: The Late Tang: Chinese Poetry of the Mid-Ninth Century (827–860)" data-dcnode-id="3723" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674033283-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3710"><p class="title" data-dcnode-id="3718"><a data-dcnode-id="3719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674033283"><span data-dcnode-id="3720" instrument_node="">The Late Tang: Chinese Poetry of the Mid-Ninth Century (827–860)</span></a></p><p class="author" data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">Owen, Stephen</span></p><div class="desc" data-dcnode-id="3711"><p data-dcnode-id="3712"><b data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">Owen</span></b><span data-dcnode-id="3713" instrument_node=""> analyzes the redirection of poetry following the deaths of the major poets of the High and Mid-Tang and the rejection of their poetic styles. In the Late Tang, the poetic past was beginning to assume the form it would have for the next millennium—a repertoire of styles, genres, and the voices of past poets.</span></p></div></td></tr><tr data-dcnode-id="3691"><td class="number" data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">265.</span></td><td class="jkt" data-dcnode-id="3704"><a data-dcnode-id="3705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021280" title="Intimate Politics: Marriage, the Market, and State Power in Southeastern China"><img alt="Cover: Intimate Politics: Marriage, the Market, and State Power in Southeastern China" data-dcnode-id="3706" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674021280-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3692"><p class="title" data-dcnode-id="3701"><a data-dcnode-id="3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021280"><span data-dcnode-id="3703" instrument_node="">Intimate Politics: Marriage, the Market, and State Power in Southeastern China</span></a></p><p class="author" data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">Friedman, Sara L.</span></p><div class="desc" data-dcnode-id="3693"><p data-dcnode-id="3694"><span data-dcnode-id="3698" instrument_node="">Distinctive female dress styles, gender divisions of labor, and powerful same-sex networks have long distinguished villages in this coastal region of southeastern China from other rural Han communities. </span><i data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">Intimate Politics</span></i><span data-dcnode-id="3695" instrument_node=""> explores these practices that have constituted eastern Hui’an residents, women in particular, as an anomaly among rural Han. This book asks what such practices have come to mean in a post-1949 socialist order that has incorporated forms of marriage, labor, and dress into a developmental scale extending from the primitive to the civilized.</span></p></div></td></tr><tr data-dcnode-id="3670"><td class="number" data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">267.</span></td><td class="jkt" data-dcnode-id="3686"><a data-dcnode-id="3687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021440" title="Worldly Stage: Theatricality in Seventeenth-Century China"><img alt="Cover: Worldly Stage: Theatricality in Seventeenth-Century China" data-dcnode-id="3688" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674021440-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3671"><p class="title" data-dcnode-id="3683"><a data-dcnode-id="3684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021440"><span data-dcnode-id="3685" instrument_node="">Worldly Stage: Theatricality in Seventeenth-Century China</span></a></p><p class="author" data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">Volpp, Sophie</span></p><div class="desc" data-dcnode-id="3672"><p data-dcnode-id="3673"><span data-dcnode-id="3680" instrument_node="">In seventeenth-century China, the theater began to occupy an important ideological niche among traditional cultural elites. Notions of performance and spectatorship came to animate diverse aspects of literati cultural production. In </span><i data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">Worldly Stage</span></i><span data-dcnode-id="3677" instrument_node="">, </span><b data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">Sophie Volpp</span></b><span data-dcnode-id="3674" instrument_node=""> sheds new light on the capacity of drama to comment on the cultural politics of the age.</span></p></div></td></tr><tr data-dcnode-id="3649"><td class="number" data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">268.</span></td><td class="jkt" data-dcnode-id="3665"><a data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021464" title="The Beauty and the Book: Women and Fiction in Nineteenth-Century China"><img alt="Cover: The Beauty and the Book: Women and Fiction in Nineteenth-Century China" data-dcnode-id="3667" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674021464-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3650"><p class="title" data-dcnode-id="3662"><a data-dcnode-id="3663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021464"><span data-dcnode-id="3664" instrument_node="">The Beauty and the Book: Women and Fiction in Nineteenth-Century China</span></a></p><p class="author" data-dcnode-id="3660"><span data-dcnode-id="3661" instrument_node="">Widmer, Ellen</span></p><div class="desc" data-dcnode-id="3651"><p data-dcnode-id="3652"><span data-dcnode-id="3659" instrument_node="">This study of Chinese women in the book trade begins with three case studies, each of which probes one facet of the relationship between women and fiction in the early nineteenth century. Building on these case studies, the second half of the book focuses on the many sequels to the </span><i data-dcnode-id="3657"><span data-dcnode-id="3658" instrument_node="">Dream of the Red Chamber</span></i><span data-dcnode-id="3656" instrument_node=""> and the significance of this novel for women. As </span><b data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">Ellen Widmer</span></b><span data-dcnode-id="3653" instrument_node=""> shows, by the end of the century, women became increasingly involved in the novel as critical readers, writers, and editors.</span></p></div></td></tr><tr data-dcnode-id="3631"><td class="number" data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">269.</span></td><td class="jkt" data-dcnode-id="3644"><a data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021341" title="The Sea of Learning: Mobility and Identity in Nineteenth-Century Guangzhou"><img alt="Cover: The Sea of Learning: Mobility and Identity in Nineteenth-Century Guangzhou" data-dcnode-id="3646" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674021341-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3632"><p class="title" data-dcnode-id="3641"><a data-dcnode-id="3642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021341"><span data-dcnode-id="3643" instrument_node="">The Sea of Learning: Mobility and Identity in Nineteenth-Century Guangzhou</span></a></p><p class="author" data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">Miles, Steven B.</span></p><div class="desc" data-dcnode-id="3633"><p data-dcnode-id="3634"><span data-dcnode-id="3638" instrument_node="">Founded in the 1820s, the Xuehaitang (Sea of Learning Hall) was a premier academy of its time. </span><b data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">Miles</span></b><span data-dcnode-id="3635" instrument_node=""> examines the discourse that portrayed it as having radically altered Guangzhou literati culture. He argues that the academy’s location embedded it in social settings that determined who used its resources and who celebrated its successes and values.</span></p></div></td></tr><tr data-dcnode-id="3616"><td class="number" data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node="">270.</span></td><td class="jkt" data-dcnode-id="3626"><a data-dcnode-id="3627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674022683" title="China Upside Down: Currency, Society, and Ideologies, 1808–1856"><img alt="Cover: China Upside Down: Currency, Society, and Ideologies, 1808–1856" data-dcnode-id="3628" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674022683-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3617"><p class="title" data-dcnode-id="3623"><a data-dcnode-id="3624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674022683"><span data-dcnode-id="3625" instrument_node="">China Upside Down: Currency, Society, and Ideologies, 1808–1856</span></a></p><p class="author" data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">Lin, Man-houng</span></p><div class="desc" data-dcnode-id="3618"><p data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">Scholars have noted the role of China’s demand for silver in the emergence of the modern world. This book discusses the interaction of this demand and the early-19th-century Latin American independence movements, changes in the world economy, the resulting disruptions in the Qing dynasty, and the transformation from the High Qing to modern China.</span></p></div></td></tr><tr data-dcnode-id="3601"><td class="number" data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">272.</span></td><td class="jkt" data-dcnode-id="3611"><a data-dcnode-id="3612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674022652" title="Out of the Cloister: Literati Perspectives on Buddhism in Sung China, 960–1279"><img alt="Cover: Out of the Cloister: Literati Perspectives on Buddhism in Sung China, 960–1279" data-dcnode-id="3613" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674022652-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3602"><p class="title" data-dcnode-id="3608"><a data-dcnode-id="3609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674022652"><span data-dcnode-id="3610" instrument_node="">Out of the Cloister: Literati Perspectives on Buddhism in Sung China, 960–1279</span></a></p><p class="author" data-dcnode-id="3606"><span data-dcnode-id="3607" instrument_node="">Halperin, Mark</span></p><div class="desc" data-dcnode-id="3603"><p data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">This book demonstrates that representations of Buddhism by lay people underwent a major change during the T’ang–Sung transition. These changes built on basic transformations within the Buddhist and classicist traditions and sometimes resulted in the use of Buddhism and Buddhist temples as frames of reference to evaluate aspects of lay society.</span></p></div></td></tr><tr data-dcnode-id="3586"><td class="number" data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">273.</span></td><td class="jkt" data-dcnode-id="3596"><a data-dcnode-id="3597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674022621" title="State or Merchant: Political Economy and Political Process in 1740s China"><img alt="Cover: State or Merchant: Political Economy and Political Process in 1740s China" data-dcnode-id="3598" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674022621-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3587"><p class="title" data-dcnode-id="3593"><a data-dcnode-id="3594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674022621"><span data-dcnode-id="3595" instrument_node="">State or Merchant: Political Economy and Political Process in 1740s China</span></a></p><p class="author" data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">Dunstan, Helen</span></p><div class="desc" data-dcnode-id="3588"><p data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">As a study of Confucian government in action, this intellectual history describes a mode of public policy discussion far less dominated by the Confucian scriptures than expected. It offers a detailed view of members of an ostensibly Confucian government pursuing divergent agendas around the question of “state or merchant?”</span></p></div></td></tr><tr data-dcnode-id="3571"><td class="number" data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">274.</span></td><td class="jkt" data-dcnode-id="3581"><a data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674022676" title="The Heart of Time: Moral Agency in Twentieth-Century Chinese Fiction"><img alt="Cover: The Heart of Time: Moral Agency in Twentieth-Century Chinese Fiction" data-dcnode-id="3583" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674022676-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3572"><p class="title" data-dcnode-id="3578"><a data-dcnode-id="3579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674022676"><span data-dcnode-id="3580" instrument_node="">The Heart of Time: Moral Agency in Twentieth-Century Chinese Fiction</span></a></p><p class="author" data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">Knight, Sabina</span></p><div class="desc" data-dcnode-id="3573"><p data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">By examining how narrative strategies reinforce or contest deterministic paradigms, this work describes modern Chinese fiction’s unique contribution to ethical and literary debates over the possibility for meaningful moral action. By analyzing discourses of agency and fatalism and the ethical import of narrative structures, Knight explores how representations of determinism and moral responsibility changed over the twentieth century. </span></p></div></td></tr><tr data-dcnode-id="3553"><td class="number" data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">275.</span></td><td class="jkt" data-dcnode-id="3566"><a data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674022720" title="The Uses of Memory: The Critique of Modernity in the Fiction of Higuchi Ichiyō"><img alt="Cover: The Uses of Memory: The Critique of Modernity in the Fiction of Higuchi Ichiyō" data-dcnode-id="3568" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674022720-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3554"><p class="title" data-dcnode-id="3563"><a data-dcnode-id="3564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674022720"><span data-dcnode-id="3565" instrument_node="">The Uses of Memory: The Critique of Modernity in the Fiction of Higuchi Ichiyō</span></a></p><p class="author" data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">Van Compernolle, Timothy J.</span></p><div class="desc" data-dcnode-id="3555"><p data-dcnode-id="3556"><span data-dcnode-id="3560" instrument_node="">The writer Higuchi Ichiyō (1872–1896) has been described as a consummate stylist of classical prose. </span><b data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">Timothy Van Compernolle</span></b><span data-dcnode-id="3557" instrument_node=""> investigates the social dimensions of Ichiyo’s imagination and argues that she reworked the Japanese literary tradition in order to understand and critique the emerging modernity of the Meiji period.</span></p></div></td></tr><tr data-dcnode-id="3538"><td class="number" data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">276.</span></td><td class="jkt" data-dcnode-id="3548"><a data-dcnode-id="3549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674022706" title="A New Practical Primer of Literary Chinese"><img alt="Cover: A New Practical Primer of Literary Chinese" data-dcnode-id="3550" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674022706-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3539"><p class="title" data-dcnode-id="3545"><a data-dcnode-id="3546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674022706"><span data-dcnode-id="3547" instrument_node="">A New Practical Primer of Literary Chinese</span></a></p><p class="author" data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">Rouzer, Paul</span></p><div class="desc" data-dcnode-id="3540"><p data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">Forty lessons introducing students to the basic patterns and structures of Classical Chinese are taken from a number of pre-Han and Han texts selected to give students a grounding in exemplary Classical Chinese style. Two additional lessons use texts from later periods to help students appreciate the changes in written Chinese over the centuries.</span></p></div></td></tr><tr data-dcnode-id="3520"><td class="number" data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">277.</span></td><td class="jkt" data-dcnode-id="3533"><a data-dcnode-id="3534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674022737" title="Practices of the Sentimental Imagination: Melodrama, the Novel, and the Social Imaginary in Nineteenth-Century Japan"><img alt="Cover: Practices of the Sentimental Imagination: Melodrama, the Novel, and the Social Imaginary in Nineteenth-Century Japan" data-dcnode-id="3535" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674022737-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3521"><p class="title" data-dcnode-id="3530"><a data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674022737"><span data-dcnode-id="3532" instrument_node="">Practices of the Sentimental Imagination: Melodrama, the Novel, and the Social Imaginary in Nineteenth-Century Japan</span></a></p><p class="author" data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">Zwicker, Jonathan E.</span></p><div class="desc" data-dcnode-id="3522"><p data-dcnode-id="3523"><span data-dcnode-id="3527" instrument_node="">By examining the obscured histories of publication, circulation, and reception of widely consumed literary works from late Edo to the early Meiji period, </span><b data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">Zwicker</span></b><span data-dcnode-id="3524" instrument_node=""> traces a genealogy of the literary field across a long nineteenth century: one that stresses continuities between the generic conventions of early modern fiction and the modern novel.</span></p></div></td></tr><tr data-dcnode-id="3502"><td class="number" data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">278.</span></td><td class="jkt" data-dcnode-id="3515"><a data-dcnode-id="3516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674028302" title="War Memory and Social Politics in Japan, 1945–2005"><img alt="Cover: War Memory and Social Politics in Japan, 1945–2005" data-dcnode-id="3517" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674028302-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3503"><p class="title" data-dcnode-id="3512"><a data-dcnode-id="3513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674028302"><span data-dcnode-id="3514" instrument_node="">War Memory and Social Politics in Japan, 1945–2005</span></a></p><p class="author" data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">Seraphim, Franziska</span></p><div class="desc" data-dcnode-id="3504"><p data-dcnode-id="3505"><span data-dcnode-id="3509" instrument_node="">Japan has long wrestled with the memories of World War II. </span><b data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">Franziska Seraphim</span></b><span data-dcnode-id="3506" instrument_node=""> traces the activism of five civic organizations to examine the ways in which diverse organized memories have secured legitimate niches within the public sphere.</span></p></div></td></tr><tr data-dcnode-id="3479"><td class="number" data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">279.</span></td><td class="jkt" data-dcnode-id="3497"><a data-dcnode-id="3498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674241763" title="Manga from the Floating World: Comicbook Culture and the <i>Kibyōshi</i> of Edo Japan, Second Edition, With a New Preface"><img alt="Cover: Manga from the Floating World: Comicbook Culture and the <i>Kibyōshi</i> of Edo Japan, Second Edition, With a New Preface" data-dcnode-id="3499" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674241763-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3480"><p class="title" data-dcnode-id="3491"><a data-dcnode-id="3492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674241763"><span data-dcnode-id="3496" instrument_node="">Manga from the Floating World: Comicbook Culture and the </span><i data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">Kibyōshi</span></i><span data-dcnode-id="3493" instrument_node=""> of Edo Japan, Second Edition, With a New Preface</span></a></p><p class="author" data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">Kern, Adam L.</span></p><div class="desc" data-dcnode-id="3481"><p data-dcnode-id="3482"><b data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">Adam Kern</span></b><span data-dcnode-id="3486" instrument_node=""> offers a close reading of the vibrant popular imagination through </span><i data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">kibyōshi</span></i><span data-dcnode-id="3483" instrument_node="">, a genre of sophisticated pictorial fiction from late-eighteenth-century Japan. Illustrated with rare prints from Japanese archival collections, these entertaining works will appeal to the general reader as well as to the student of Japanese cultural history.</span></p></div></td></tr><tr data-dcnode-id="3461"><td class="number" data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">280.</span></td><td class="jkt" data-dcnode-id="3474"><a data-dcnode-id="3475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674024496" title="Commerce in Culture: The Sibao Book Trade in the Qing and Republican Periods"><img alt="Cover: Commerce in Culture: The Sibao Book Trade in the Qing and Republican Periods" data-dcnode-id="3476" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674024496-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3462"><p class="title" data-dcnode-id="3471"><a data-dcnode-id="3472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674024496"><span data-dcnode-id="3473" instrument_node="">Commerce in Culture: The Sibao Book Trade in the Qing and Republican Periods</span></a></p><p class="author" data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">Brokaw, Cynthia J.</span></p><div class="desc" data-dcnode-id="3463"><p data-dcnode-id="3464"><span data-dcnode-id="3468" instrument_node="">Sibao today is a cluster of impoverished villages in the mountains of western Fujian. But from the late seventeenth through the early twentieth centuries, it was home to a flourishing publishing industry supplying much of south China through itinerant booksellers. </span><b data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">Brokaw</span></b><span data-dcnode-id="3465" instrument_node=""> describes this rural, low-level operation at the end of the imperial period, tracing how Sibao’s socio-geographical character shaped and affected its progress.</span></p></div></td></tr><tr data-dcnode-id="3437"><td class="number" data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">281.</span></td><td class="jkt" data-dcnode-id="3456"><a data-dcnode-id="3457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025028" title="Between Dreams and Reality: The Military Examination in Late Chosŏn Korea, 1600-1894"><img alt="Cover: Between Dreams and Reality: The Military Examination in Late Chosŏn Korea, 1600-1894" data-dcnode-id="3458" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674025028-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3438"><p class="title" data-dcnode-id="3453"><a data-dcnode-id="3454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025028"><span data-dcnode-id="3455" instrument_node="">Between Dreams and Reality: The Military Examination in Late Chosŏn Korea, 1600-1894</span></a></p><p class="author" data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">Park, Eugene Y.</span></p><div class="desc" data-dcnode-id="3439"><p data-dcnode-id="3440"><span data-dcnode-id="3450" instrument_node="">From the mid-seventeenth to the mid-nineteenth century, millions of Korean men trained for the state military examination, or </span><i data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">mukwa</span></i><span data-dcnode-id="3447" instrument_node="">. But few were actually appointed as military officials after passing the test. In this comprehensive history, </span><b data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">Park</span></b><span data-dcnode-id="3444" instrument_node=""> argues that the </span><i data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">mukwa</span></i><span data-dcnode-id="3441" instrument_node=""> was not only the state’s primary means of recruiting aristocrats as new members of the military bureaucracy, but also a way for the ruling elite to partially satisfy the status aspirations of marginalized regional elites, secondary status groups, commoners, and manumitted slaves.</span></p></div></td></tr><tr data-dcnode-id="3422"><td class="number" data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">283.</span></td><td class="jkt" data-dcnode-id="3432"><a data-dcnode-id="3433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025042" title="Disciplining the State: Virtue, Violence, and State-Making in Modern China"><img alt="Cover: Disciplining the State: Virtue, Violence, and State-Making in Modern China" data-dcnode-id="3434" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674025042-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3423"><p class="title" data-dcnode-id="3429"><a data-dcnode-id="3430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025042"><span data-dcnode-id="3431" instrument_node="">Disciplining the State: Virtue, Violence, and State-Making in Modern China</span></a></p><p class="author" data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">Thornton, Patricia M.</span></p><div class="desc" data-dcnode-id="3424"><p data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">Scholars of European history assert that war makes states, just as states make war. This study finds that in China, the challenges of governing produced a trajectory of state-building in which the processes of moral and social control were at least as central to state-making as the exercise of coercive power.</span></p></div></td></tr><tr data-dcnode-id="3407"><td class="number" data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">284.</span></td><td class="jkt" data-dcnode-id="3417"><a data-dcnode-id="3418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025059" title="The Taoists of Peking, 1800-1949: A Social History of Urban Clerics"><img alt="Cover: The Taoists of Peking, 1800-1949: A Social History of Urban Clerics" data-dcnode-id="3419" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674025059-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3408"><p class="title" data-dcnode-id="3414"><a data-dcnode-id="3415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025059"><span data-dcnode-id="3416" instrument_node="">The Taoists of Peking, 1800-1949: A Social History of Urban Clerics</span></a></p><p class="author" data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">Goossaert, Vincent</span></p><div class="desc" data-dcnode-id="3409"><p data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">Looking at the activities of Taoist clerics in Peking, this book explores the workings of religion as a profession in one Chinese city during a period of dramatic modernization. The author focuses on ordinary religious professionals, most of whom remained obscure temple employees, showing that these Taoists were neither the socially despised illiterates dismissed in so many studies, nor otherworldly ascetics, but active participants in the religious economy of the city.</span></p></div></td></tr><tr data-dcnode-id="3384"><td class="number" data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">286.</span></td><td class="jkt" data-dcnode-id="3402"><a data-dcnode-id="3403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025073" title="Love after <i>The Tale of Genji</i>: Rewriting the World of the Shining Prince"><img alt="Cover: Love after <i>The Tale of Genji</i>: Rewriting the World of the Shining Prince" data-dcnode-id="3404" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674025073-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3385"><p class="title" data-dcnode-id="3396"><a data-dcnode-id="3397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025073"><span data-dcnode-id="3401" instrument_node="">Love after </span><i data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">The Tale of Genji</span></i><span data-dcnode-id="3398" instrument_node="">: Rewriting the World of the Shining Prince</span></a></p><p class="author" data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">D'Etcheverry, Charo B.</span></p><div class="desc" data-dcnode-id="3386"><p data-dcnode-id="3387"><i data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">The Tale of Genji</span></i><span data-dcnode-id="3391" instrument_node=""> has eclipsed the works of later Heian authors, who have since been displaced from the canon and relegated to obscurity. The author calls for a reevaluation of late Heian fiction by shedding new light on this undervalued body of work and examining three representative texts as legitimate heirs to the literary legacy of </span><i data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">Genji</span></i><span data-dcnode-id="3388" instrument_node="">.</span></p></div></td></tr><tr data-dcnode-id="3369"><td class="number" data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">287.</span></td><td class="jkt" data-dcnode-id="3379"><a data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674024540" title="A Court on Horseback: Imperial Touring and the Construction of Qing Rule, 1680–1785"><img alt="Cover: A Court on Horseback: Imperial Touring and the Construction of Qing Rule, 1680–1785" data-dcnode-id="3381" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674024540-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3370"><p class="title" data-dcnode-id="3376"><a data-dcnode-id="3377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674024540"><span data-dcnode-id="3378" instrument_node="">A Court on Horseback: Imperial Touring and the Construction of Qing Rule, 1680–1785</span></a></p><p class="author" data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">Chang, Michael G.</span></p><div class="desc" data-dcnode-id="3371"><p data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">Between 1751 and 1784, the Qianlong emperor embarked upon six southern tours, traveling from Beijing to Jiangnan and back. These tours were exercises in political theater that took the Manchu emperor through one of the Qing empire’s most prosperous regions. This study elucidates the tensions and the constant negotiations characterizing the relationship between the imperial center and Jiangnan, which straddled the two key provinces of Jiangsu and Zhejiang.</span></p></div></td></tr><tr data-dcnode-id="3339"><td class="number" data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">288.</span></td><td class="jkt" data-dcnode-id="3364"><a data-dcnode-id="3365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025097" title="War and Faith: Ikko Ikki in Late Muromachi Japan"><img alt="Cover: War and Faith: Ikko Ikki in Late Muromachi Japan" data-dcnode-id="3366" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674025097-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3340"><p class="title" data-dcnode-id="3361"><a data-dcnode-id="3362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025097"><span data-dcnode-id="3363" instrument_node="">War and Faith: Ikko Ikki in Late Muromachi Japan</span></a></p><p class="author" data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">Tsang, Carol Richmond</span></p><div class="desc" data-dcnode-id="3341"><p data-dcnode-id="3342"><span data-dcnode-id="3358" instrument_node="">During the </span><i data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">sengoku</span></i><span data-dcnode-id="3355" instrument_node=""> era in Japan, warlords and religious institutions vied for supremacy, with powerhouses such as The Honganji branch of Jodo Shinshu Buddhism fanning violent uprisings of </span><i data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">ikko ikki</span></i><span data-dcnode-id="3352" instrument_node="">, bands of commoners fighting for various causes. </span><b data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">Tsang</span></b><span data-dcnode-id="3349" instrument_node=""> delves into the complex relationship between these </span><i data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">ikko</span></i><span data-dcnode-id="3346" instrument_node=""> leagues and the Honganji institution, arguing for a fuller picture of </span><i data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">ikko ikki</span></i><span data-dcnode-id="3343" instrument_node=""> as a force in medieval Japanese history.</span></p></div></td></tr><tr data-dcnode-id="3321"><td class="number" data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">289.</span></td><td class="jkt" data-dcnode-id="3334"><a data-dcnode-id="3335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025882" title="Competition over Content: Negotiating Standards for the Civil Service Examinations in Imperial China (1127–1279)"><img alt="Cover: Competition over Content: Negotiating Standards for the Civil Service Examinations in Imperial China (1127–1279)" data-dcnode-id="3336" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674025882-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3322"><p class="title" data-dcnode-id="3331"><a data-dcnode-id="3332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025882"><span data-dcnode-id="3333" instrument_node="">Competition over Content: Negotiating Standards for the Civil Service Examinations in Imperial China (1127–1279)</span></a></p><p class="author" data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">De Weerdt, Hilde</span></p><div class="desc" data-dcnode-id="3323"><p data-dcnode-id="3324"><span data-dcnode-id="3328" instrument_node="">Analyzing textbooks, examination questions and essays, and official and private commentary, </span><b data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">Hilde De Weerdt</span></b><span data-dcnode-id="3325" instrument_node=""> examines how occupational, political, and intellectual groups shaped curricular standards and examination criteria during the Southern Song dynasty (1127–1279), and how examination standards in turn shaped political and intellectual agendas. These questions reframe the debate about the civil service examinations and their place in the imperial order.</span></p></div></td></tr><tr data-dcnode-id="3306"><td class="number" data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">290.</span></td><td class="jkt" data-dcnode-id="3316"><a data-dcnode-id="3317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674026032" title="Out of the Alleyway: Nakagami Kenji and the Poetics of Outcaste Fiction"><img alt="Cover: Out of the Alleyway: Nakagami Kenji and the Poetics of Outcaste Fiction" data-dcnode-id="3318" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674026032-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3307"><p class="title" data-dcnode-id="3313"><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674026032"><span data-dcnode-id="3315" instrument_node="">Out of the Alleyway: Nakagami Kenji and the Poetics of Outcaste Fiction</span></a></p><p class="author" data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">Zimmerman, Eve</span></p><div class="desc" data-dcnode-id="3308"><p data-dcnode-id="3309"><span data-dcnode-id="3310" instrument_node="">These chapters trace the biographical thread running through Nakagami’s works while foregrounding such diverse facets of his writing as his interest in the modern possibilities of traditional myths and forms of storytelling, his deployment of shocking tropes and images, and his crafting of a unique poetic language.</span></p></div></td></tr><tr data-dcnode-id="3291"><td class="number" data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">291.</span></td><td class="jkt" data-dcnode-id="3301"><a data-dcnode-id="3302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025875" title="Articulating Citizenship: Civic Education and Student Politics in Southeastern China, 1912–1940"><img alt="Cover: Articulating Citizenship: Civic Education and Student Politics in Southeastern China, 1912–1940" data-dcnode-id="3303" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674025875-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3292"><p class="title" data-dcnode-id="3298"><a data-dcnode-id="3299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025875"><span data-dcnode-id="3300" instrument_node="">Articulating Citizenship: Civic Education and Student Politics in Southeastern China, 1912–1940</span></a></p><p class="author" data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">Culp, Robert</span></p><div class="desc" data-dcnode-id="3293"><p data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">This book reconstructs civic education and citizenship training in secondary schools in the lower Yangzi region during the Republican era. It analyzes how students used the tools of civic education to make themselves into young citizens, and explores the complex social and political effects of educated youths’ civic action.</span></p></div></td></tr><tr data-dcnode-id="3276"><td class="number" data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">292.</span></td><td class="jkt" data-dcnode-id="3286"><a data-dcnode-id="3287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674026018" title="From Foot Soldier to Finance Minister: Takahashi Korekiyo, Japan’s Keynes"><img alt="Cover: From Foot Soldier to Finance Minister: Takahashi Korekiyo, Japan’s Keynes" data-dcnode-id="3288" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674026018-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3277"><p class="title" data-dcnode-id="3283"><a data-dcnode-id="3284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674026018"><span data-dcnode-id="3285" instrument_node="">From Foot Soldier to Finance Minister: Takahashi Korekiyo, Japan’s Keynes</span></a></p><p class="author" data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">Smethurst, Richard J.</span></p><div class="desc" data-dcnode-id="3278"><p data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">From his birth into the lowest stratum of the samurai class to his assassination by right-wing militarists, Takahashi Korekiyo (1854–1936) lived through tumultuous times that shaped the course of modern Japan. This biography underscores the profound influence of the charismatic finance minister on the political and economic development of Japan.</span></p></div></td></tr><tr data-dcnode-id="3258"><td class="number" data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">293.</span></td><td class="jkt" data-dcnode-id="3271"><a data-dcnode-id="3272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025912" title="Amid the Clouds and Mist: China’s Colonization of Guizhou, 1200–1700"><img alt="Cover: Amid the Clouds and Mist: China’s Colonization of Guizhou, 1200–1700" data-dcnode-id="3273" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674025912-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3259"><p class="title" data-dcnode-id="3268"><a data-dcnode-id="3269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674025912"><span data-dcnode-id="3270" instrument_node="">Amid the Clouds and Mist: China’s Colonization of Guizhou, 1200–1700</span></a></p><p class="author" data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">Herman, John E.</span></p><div class="desc" data-dcnode-id="3260"><p data-dcnode-id="3261"><span data-dcnode-id="3265" instrument_node="">This book examines how China’s three late imperial dynasties—the Yuan, Ming, and Qing—conquered, colonized, and assumed control of the southwest. </span><b data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">Herman</span></b><span data-dcnode-id="3262" instrument_node=""> highlights the indigenous response to China’s colonization of the southwest, particularly that of the Nasu Yi people of western Guizhou and eastern Yunnan, who left an extensive written record.</span></p></div></td></tr><tr data-dcnode-id="3243"><td class="number" data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">294.</span></td><td class="jkt" data-dcnode-id="3253"><a data-dcnode-id="3254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674036178" title="China during the Great Depression: Market, State, and the World Economy, 1929–1937"><img alt="Cover: China during the Great Depression: Market, State, and the World Economy, 1929–1937" data-dcnode-id="3255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674036178-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3244"><p class="title" data-dcnode-id="3250"><a data-dcnode-id="3251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674036178"><span data-dcnode-id="3252" instrument_node="">China during the Great Depression: Market, State, and the World Economy, 1929–1937</span></a></p><p class="author" data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">Shiroyama, Tomoko</span></p><div class="desc" data-dcnode-id="3245"><p data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">The Great Depression was a global phenomenon: every economy linked to international financial and commodity markets suffered. The aim of this book is not merely to show that China could not escape the consequences of drastic declines in financial flows and trade but also to offer a new perspective for understanding modern Chinese history.</span></p></div></td></tr><tr data-dcnode-id="3228"><td class="number" data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">295.</span></td><td class="jkt" data-dcnode-id="3238"><a data-dcnode-id="3239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674060739" title="Tradition, Treaties, and Trade: Qing Imperialism and Chosŏn Korea, 1850–1910"><img alt="Cover: Tradition, Treaties, and Trade: Qing Imperialism and Chosŏn Korea, 1850–1910" data-dcnode-id="3240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674060739-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3229"><p class="title" data-dcnode-id="3235"><a data-dcnode-id="3236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674060739"><span data-dcnode-id="3237" instrument_node="">Tradition, Treaties, and Trade: Qing Imperialism and Chosŏn Korea, 1850–1910</span></a></p><p class="author" data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">Larsen, Kirk W.</span></p><div class="desc" data-dcnode-id="3230"><p data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">Relations between the Chosŏn and Qing states are often cited as the prime example of the operation of the “traditional” Chinese “tribute system.” In contrast, this work contends that the motivations, tactics, and successes (and failures) of the late Qing Empire in Chosŏn Korea mirrored those of other nineteenth-century imperialists.</span></p></div></td></tr><tr data-dcnode-id="3210"><td class="number" data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">296.</span></td><td class="jkt" data-dcnode-id="3223"><a data-dcnode-id="3224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674027947" title="When Our Eyes No Longer See: Realism, Science, and Ecology in Japanese Literary Modernism"><img alt="Cover: When Our Eyes No Longer See: Realism, Science, and Ecology in Japanese Literary Modernism" data-dcnode-id="3225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674027947-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3211"><p class="title" data-dcnode-id="3220"><a data-dcnode-id="3221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674027947"><span data-dcnode-id="3222" instrument_node="">When Our Eyes No Longer See: Realism, Science, and Ecology in Japanese Literary Modernism</span></a></p><p class="author" data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">Golley, Gregory</span></p><div class="desc" data-dcnode-id="3212"><p data-dcnode-id="3213"><span data-dcnode-id="3217" instrument_node="">As industrial and scientific developments in early-twentieth-century Japan transformed the meaning of “objective observation,” modern writers and poets struggled to capture what they had come to see as an evolving network of invisible relations joining people to the larger material universe. For these artists, literary modernism was a crisis of perception before it was a crisis of representation. </span><i data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">When Our Eyes No Longer See</span></i><span data-dcnode-id="3214" instrument_node=""> portrays an extraordinary moment in the history of this perceptual crisis and in Japanese literature during the 1920s and 1930s.</span></p></div></td></tr><tr data-dcnode-id="3192"><td class="number" data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">297.</span></td><td class="jkt" data-dcnode-id="3205"><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674027756" title="Emplacing a Pilgrimage: The Ōyama Cult and Regional Religion in Early Modern Japan"><img alt="Cover: Emplacing a Pilgrimage: The Ōyama Cult and Regional Religion in Early Modern Japan" data-dcnode-id="3207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674027756-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3193"><p class="title" data-dcnode-id="3202"><a data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674027756"><span data-dcnode-id="3204" instrument_node="">Emplacing a Pilgrimage: The Ōyama Cult and Regional Religion in Early Modern Japan</span></a></p><p class="author" data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">Ambros, Barbara</span></p><div class="desc" data-dcnode-id="3194"><p data-dcnode-id="3195"><span data-dcnode-id="3199" instrument_node="">The sacred mountain Ōyama (literally, “Big Mountain”) has loomed over the religious landscape of early modern Japan. </span><b data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">Ambros</span></b><span data-dcnode-id="3196" instrument_node=""> provides a narrative history of the mountain and its place in contemporary society and popular religion by focusing on the development of the Ōyama cult and its religious, political, and socioeconomic contexts.</span></p></div></td></tr><tr data-dcnode-id="3174"><td class="number" data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">298.</span></td><td class="jkt" data-dcnode-id="3187"><a data-dcnode-id="3188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674028333" title="The Japanization of Modernity: Murakami Haruki between Japan and the United States"><img alt="Cover: The Japanization of Modernity: Murakami Haruki between Japan and the United States" data-dcnode-id="3189" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674028333-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3175"><p class="title" data-dcnode-id="3184"><a data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674028333"><span data-dcnode-id="3186" instrument_node="">The Japanization of Modernity: Murakami Haruki between Japan and the United States</span></a></p><p class="author" data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">Suter, Rebecca</span></p><div class="desc" data-dcnode-id="3176"><p data-dcnode-id="3177"><span data-dcnode-id="3181" instrument_node="">Murakami Haruki is perhaps the best-known and most widely translated Japanese author of his time. Bringing a comparative perspective to the study of Murakami’s fiction, </span><b data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">Suter</span></b><span data-dcnode-id="3178" instrument_node=""> complicates our understanding of the author’s oeuvre and highlights his contributions not only as a popular writer but also as a cultural critic on both sides of the Pacific.</span></p></div></td></tr><tr data-dcnode-id="3159"><td class="number" data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">299.</span></td><td class="jkt" data-dcnode-id="3169"><a data-dcnode-id="3170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674028708" title="The Tokyo War Crimes Trial: The Pursuit of Justice in the Wake of World War II"><img alt="Cover: The Tokyo War Crimes Trial: The Pursuit of Justice in the Wake of World War II" data-dcnode-id="3171" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674028708-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3160"><p class="title" data-dcnode-id="3166"><a data-dcnode-id="3167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674028708"><span data-dcnode-id="3168" instrument_node="">The Tokyo War Crimes Trial: The Pursuit of Justice in the Wake of World War II</span></a></p><p class="author" data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">Totani, Yuma</span></p><div class="desc" data-dcnode-id="3161"><p data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">This book assesses the historical significance of the International Military Tribunal for the Far East (IMTFE)—commonly called the Tokyo trial—established as the eastern counterpart of the Nuremberg trial in the immediate aftermath of World War II.</span></p></div></td></tr><tr data-dcnode-id="3144"><td class="number" data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">301.</span></td><td class="jkt" data-dcnode-id="3154"><a data-dcnode-id="3155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674028234" title="Culture, Courtiers, and Competition: The Ming Court (1368–1644)"><img alt="Cover: Culture, Courtiers, and Competition: The Ming Court (1368–1644)" data-dcnode-id="3156" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674028234-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3145"><p class="title" data-dcnode-id="3151"><a data-dcnode-id="3152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674028234"><span data-dcnode-id="3153" instrument_node="">Culture, Courtiers, and Competition: The Ming Court (1368–1644)</span></a></p><p class="author" data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">Robinson, David M.</span></p><div class="desc" data-dcnode-id="3146"><p data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">This collection of essays reveals the Ming court as an arena of competition and negotiation, where a large cast of actors pursued individual and corporate ends, personal agency shaped protocol and style, and diverse people, goods, and tastes converged.</span></p></div></td></tr><tr data-dcnode-id="3129"><td class="number" data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">302.</span></td><td class="jkt" data-dcnode-id="3139"><a data-dcnode-id="3140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674027831" title="Some Assembly Required: Work, Community, and Politics in China’s Rural Enterprises"><img alt="Cover: Some Assembly Required: Work, Community, and Politics in China’s Rural Enterprises" data-dcnode-id="3141" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674027831-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3130"><p class="title" data-dcnode-id="3136"><a data-dcnode-id="3137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674027831"><span data-dcnode-id="3138" instrument_node="">Some Assembly Required: Work, Community, and Politics in China’s Rural Enterprises</span></a></p><p class="author" data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">Chen, Calvin</span></p><div class="desc" data-dcnode-id="3131"><p data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">One linchpin of China’s expansion has been township and village enterprises (TVEs), a vast group of firms with diverse modes of ownership and structure. Based on the author’s fieldwork in Zhejiang, this book explores the emergence and success of rural enterprises. This study also examines how ordinary rural residents have made sense of and participated in the industrialization engulfing them in recent decades.</span></p></div></td></tr><tr data-dcnode-id="3114"><td class="number" data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">303.</span></td><td class="jkt" data-dcnode-id="3124"><a data-dcnode-id="3125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674031883" title="The Power of the Buddhas: The Politics of Buddhism during the Koryo Dynasty (918 - 1392)"><img alt="Cover: The Power of the Buddhas: The Politics of Buddhism during the Koryo Dynasty (918 - 1392)" data-dcnode-id="3126" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674031883-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3115"><p class="title" data-dcnode-id="3121"><a data-dcnode-id="3122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674031883"><span data-dcnode-id="3123" instrument_node="">The Power of the Buddhas: The Politics of Buddhism during the Koryo Dynasty (918 - 1392)</span></a></p><p class="author" data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">Vermeersch, Sem</span></p><div class="desc" data-dcnode-id="3116"><p data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">Buddhism in medieval Korea is characterized as “State Protection Buddhism,” a religion whose primary purpose was to rally support (supernatural and popular) for and legitimate the state. This study is an attempt to specify Buddhism’s place in Koryo and to ascertain to what extent and in what areas Buddhism functioned as a state religion.</span></p></div></td></tr><tr data-dcnode-id="3096"><td class="number" data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">304.</span></td><td class="jkt" data-dcnode-id="3109"><a data-dcnode-id="3110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674031562" title="Accidental Incest, Filial Cannibalism, and Other Peculiar Encounters in Late Imperial Chinese Literature"><img alt="Cover: Accidental Incest, Filial Cannibalism, and Other Peculiar Encounters in Late Imperial Chinese Literature" data-dcnode-id="3111" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674031562-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3097"><p class="title" data-dcnode-id="3106"><a data-dcnode-id="3107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674031562"><span data-dcnode-id="3108" instrument_node="">Accidental Incest, Filial Cannibalism, and Other Peculiar Encounters in Late Imperial Chinese Literature</span></a></p><p class="author" data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">Lu, Tin
