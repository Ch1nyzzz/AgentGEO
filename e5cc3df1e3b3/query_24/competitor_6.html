a</span></p><div class="desc" data-dcnode-id="3098"><p data-dcnode-id="3099"><span data-dcnode-id="3103" instrument_node="">Writers of late imperial fiction and drama were, </span><b data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">Lu</span></b><span data-dcnode-id="3100" instrument_node=""> argues, deeply engaged with questions about the nature of the Chinese empire and of the human community. This book traces how these political questions were addressed in fiction through extreme situations: husbands and wives torn apart in periods of political upheaval, families so disrupted that incestuous encounters become inevitable, times so desperate that people have to sell themselves to be eaten.</span></p></div></td></tr><tr data-dcnode-id="3081"><td class="number" data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">305.</span></td><td class="jkt" data-dcnode-id="3091"><a data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674031708" title="Men of Letters within the Passes: Guanzhong Literati in Chinese History, 907–1911"><img alt="Cover: Men of Letters within the Passes: Guanzhong Literati in Chinese History, 907–1911" data-dcnode-id="3093" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674031708-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3082"><p class="title" data-dcnode-id="3088"><a data-dcnode-id="3089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674031708"><span data-dcnode-id="3090" instrument_node="">Men of Letters within the Passes: Guanzhong Literati in Chinese History, 907–1911</span></a></p><p class="author" data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">Ong, Chang Woei</span></p><div class="desc" data-dcnode-id="3083"><p data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">The main theme of this book is the interaction between two “places,” China and Guanzhong, the capital area of several dynasties. This work examines how Guanzhong literati conceptualized three sets of relations: central/regional, “official”/“unofficial,” and national/local. It further traces the formation over the last millennium of the imperial state of a critical communal self-consciousness.</span></p></div></td></tr><tr data-dcnode-id="3066"><td class="number" data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">306.</span></td><td class="jkt" data-dcnode-id="3076"><a data-dcnode-id="3077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674031845" title="Reading Tao Yuanming: Shifting Paradigms of Historical Reception (427 - 1900)"><img alt="Cover: Reading Tao Yuanming: Shifting Paradigms of Historical Reception (427 - 1900)" data-dcnode-id="3078" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674031845-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3067"><p class="title" data-dcnode-id="3073"><a data-dcnode-id="3074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674031845"><span data-dcnode-id="3075" instrument_node="">Reading Tao Yuanming: Shifting Paradigms of Historical Reception (427 - 1900)</span></a></p><p class="author" data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">Swartz, Wendy</span></p><div class="desc" data-dcnode-id="3068"><p data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">Tao Yuanming (365?–427), although dismissed as a poet following his death, is now considered one of China’s greatest writers. This study of the posthumous reputation of a central figure in Chinese literary history, the mechanisms at work in the reception of his works, and the canonization of Tao himself and of particular readings of his works sheds light on the transformation of literature and culture in premodern China.</span></p></div></td></tr><tr data-dcnode-id="3051"><td class="number" data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">307.</span></td><td class="jkt" data-dcnode-id="3061"><a data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674053243" title="Neo-Confucianism in History"><img alt="Cover: Neo-Confucianism in History" data-dcnode-id="3063" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674053243-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3052"><p class="title" data-dcnode-id="3058"><a data-dcnode-id="3059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674053243"><span data-dcnode-id="3060" instrument_node="">Neo-Confucianism in History</span></a></p><p class="author" data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Bol, Peter K.</span></p><div class="desc" data-dcnode-id="3053"><p data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">The book argues that as Neo-Confucians put their philosophy of learning into practice in local society, they justified a new social ideal in which society at the local level was led by the literati with state recognition and support.</span></p></div></td></tr><tr data-dcnode-id="3036"><td class="number" data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">308.</span></td><td class="jkt" data-dcnode-id="3046"><a data-dcnode-id="3047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674031746" title="The Naked Gaze: Reflections on Chinese Modernity"><img alt="Cover: The Naked Gaze: Reflections on Chinese Modernity" data-dcnode-id="3048" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674031746-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3037"><p class="title" data-dcnode-id="3043"><a data-dcnode-id="3044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674031746"><span data-dcnode-id="3045" instrument_node="">The Naked Gaze: Reflections on Chinese Modernity</span></a></p><p class="author" data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">Rojas, Carlos</span></p><div class="desc" data-dcnode-id="3038"><p data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">This volume focuses on tropes of visuality and gender to reflect on shifting understandings of the significance of Chineseness, modernity, and Chinese modernity. Through detailed readings of narrative works by eight authors of the nineteenth and twentieth centuries, the study identifies three distinct constellations of visual concerns corresponding to the late imperial, mid-twentieth century, and contemporary periods, respectively.</span></p></div></td></tr><tr data-dcnode-id="3021"><td class="number" data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">309.</span></td><td class="jkt" data-dcnode-id="3031"><a data-dcnode-id="3032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674031074" title="Deliverance and Submission: Evangelical Women and the Negotiation of Patriarchy in South Korea"><img alt="Cover: Deliverance and Submission: Evangelical Women and the Negotiation of Patriarchy in South Korea" data-dcnode-id="3033" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674031074-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3022"><p class="title" data-dcnode-id="3028"><a data-dcnode-id="3029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674031074"><span data-dcnode-id="3030" instrument_node="">Deliverance and Submission: Evangelical Women and the Negotiation of Patriarchy in South Korea</span></a></p><p class="author" data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">Chong, Kelly H.</span></p><div class="desc" data-dcnode-id="3023"><p data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">South Korea is home to some of the largest evangelical Protestant congregations in the world. This book investigates the meaning of—and the reasons behind—a particular aspect of contemporary South Korean evangelicalism: the intense involvement of middle-class women.</span></p></div></td></tr><tr data-dcnode-id="3006"><td class="number" data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">310.</span></td><td class="jkt" data-dcnode-id="3016"><a data-dcnode-id="3017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674031128" title="Uchida Hyakken: A Critique of Modernity and Militarism in Prewar Japan"><img alt="Cover: Uchida Hyakken: A Critique of Modernity and Militarism in Prewar Japan" data-dcnode-id="3018" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674031128-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3007"><p class="title" data-dcnode-id="3013"><a data-dcnode-id="3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674031128"><span data-dcnode-id="3015" instrument_node="">Uchida Hyakken: A Critique of Modernity and Militarism in Prewar Japan</span></a></p><p class="author" data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">DiNitto, Rachel</span></p><div class="desc" data-dcnode-id="3008"><p data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">The literary career of Uchida Hyakken (1889–1971) encompassed a wide variety of styles and genres. This book takes up Hyakken’s fiction and essays written during Japan’s prewar years to investigate the intersection of his literature with the material and discursive surroundings of the time.</span></p></div></td></tr><tr data-dcnode-id="2991"><td class="number" data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">311.</span></td><td class="jkt" data-dcnode-id="3001"><a data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674033344" title="Dry Spells: State Rainmaking and Local Governance in Late Imperial China"><img alt="Cover: Dry Spells: State Rainmaking and Local Governance in Late Imperial China" data-dcnode-id="3003" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674033344-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2992"><p class="title" data-dcnode-id="2998"><a data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674033344"><span data-dcnode-id="3000" instrument_node="">Dry Spells: State Rainmaking and Local Governance in Late Imperial China</span></a></p><p class="author" data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">Snyder-Reinke, Jeffrey</span></p><div class="desc" data-dcnode-id="2993"><p data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Chinese officials put considerable effort into managing the fiscal and legal affairs of their jurisdictions, but they also devoted significant time and energy to performing religious rituals on behalf of the state. This groundbreaking study explores this underappreciated aspect of Chinese political life by investigating rainmaking activities organized or conducted by local officials in the Qing dynasty.</span></p></div></td></tr><tr data-dcnode-id="2976"><td class="number" data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">312.</span></td><td class="jkt" data-dcnode-id="2986"><a data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674032828" title="Down a Narrow Road: Identity and Masculinity in a Uyghur Community in Xinjiang China"><img alt="Cover: Down a Narrow Road: Identity and Masculinity in a Uyghur Community in Xinjiang China" data-dcnode-id="2988" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674032828-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2977"><p class="title" data-dcnode-id="2983"><a data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674032828"><span data-dcnode-id="2985" instrument_node="">Down a Narrow Road: Identity and Masculinity in a Uyghur Community in Xinjiang China</span></a></p><p class="author" data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">Dautcher, Jay</span></p><div class="desc" data-dcnode-id="2978"><p data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">The narrative is framed around the terms identity, community, and masculinity. As the author shows, the Uyghurs of Yining, a city in the Xinjiang region of China, express a set of individual and collective identities organized around place, gender, family relations, friendships, occupation, and religious practice.</span></p></div></td></tr><tr data-dcnode-id="2961"><td class="number" data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">313.</span></td><td class="jkt" data-dcnode-id="2971"><a data-dcnode-id="2972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674033092" title="Daoist Modern: Innovation, Lay Practice, and the Community of Inner Alchemy in Republican Shanghai"><img alt="Cover: Daoist Modern: Innovation, Lay Practice, and the Community of Inner Alchemy in Republican Shanghai" data-dcnode-id="2973" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674033092-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2962"><p class="title" data-dcnode-id="2968"><a data-dcnode-id="2969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674033092"><span data-dcnode-id="2970" instrument_node="">Daoist Modern: Innovation, Lay Practice, and the Community of Inner Alchemy in Republican Shanghai</span></a></p><p class="author" data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">Liu, Xun</span></p><div class="desc" data-dcnode-id="2963"><p data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">This book explores the Daoist encounter with modernity through the activities of Chen Yingning (1880–1969), a famous lay Daoist master, and his group in early twentieth-century Shanghai. In contrast to the usual narrative of Daoist decay, with its focus on monastic decline, clerical corruption, and popular superstitions, this study tells a story of Daoist resilience, reinvigoration, and revival.</span></p></div></td></tr><tr data-dcnode-id="2944"><td class="number" data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">314.</span></td><td class="jkt" data-dcnode-id="2956"><a data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674032880" title="Eating Rice from Bamboo Roots: The Social History of a Community of Handicraft Papermakers in Rural Sichuan, 1920–2000"><img alt="Cover: Eating Rice from Bamboo Roots: The Social History of a Community of Handicraft Papermakers in Rural Sichuan, 1920–2000" data-dcnode-id="2958" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674032880-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2945"><p class="title" data-dcnode-id="2953"><a data-dcnode-id="2954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674032880"><span data-dcnode-id="2955" instrument_node="">Eating Rice from Bamboo Roots: The Social History of a Community of Handicraft Papermakers in Rural Sichuan, 1920–2000</span></a></p><p class="author" data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">Eyferth, Jacob</span></p><div class="desc" data-dcnode-id="2946"><p data-dcnode-id="2947"><b data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">Eyferth</span></b><span data-dcnode-id="2948" instrument_node=""> charts the vicissitudes of a rural community of papermakers in Sichuan, tracing the changes in the distribution of knowledge that led to a massive transfer of technical control from villages to cities, from primary producers to managerial elites, and from women to men.</span></p></div></td></tr><tr data-dcnode-id="2926"><td class="number" data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">315.</span></td><td class="jkt" data-dcnode-id="2939"><a data-dcnode-id="2940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674033047" title="Spectacle and Sacrifice: The Ritual Foundations of Village Life in North China"><img alt="Cover: Spectacle and Sacrifice: The Ritual Foundations of Village Life in North China" data-dcnode-id="2941" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674033047-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2927"><p class="title" data-dcnode-id="2936"><a data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674033047"><span data-dcnode-id="2938" instrument_node="">Spectacle and Sacrifice: The Ritual Foundations of Village Life in North China</span></a></p><p class="author" data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">Johnson, David</span></p><div class="desc" data-dcnode-id="2928"><p data-dcnode-id="2929"><span data-dcnode-id="2933" instrument_node="">This book describes the ritual world of a group of rural settlements in Shanxi province in pre-1949 North China. The great festivals were their supreme collective achievements, carried out virtually without aid from local officials or educated elites. Newly discovered manuscripts allow </span><b data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">Johnson</span></b><span data-dcnode-id="2930" instrument_node=""> to reconstruct the festivals in unprecedented detail.</span></p></div></td></tr><tr data-dcnode-id="2905"><td class="number" data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">316.</span></td><td class="jkt" data-dcnode-id="2921"><a data-dcnode-id="2922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674033320" title="Power of Place: The Religious Landscape of the Southern Sacred Peak (Nanyue 南嶽) in Medieval China"><img alt="Cover: Power of Place: The Religious Landscape of the Southern Sacred Peak (Nanyue 南嶽) in Medieval China" data-dcnode-id="2923" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674033320-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2906"><p class="title" data-dcnode-id="2918"><a data-dcnode-id="2919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674033320"><span data-dcnode-id="2920" instrument_node="">Power of Place: The Religious Landscape of the Southern Sacred Peak (Nanyue 南嶽) in Medieval China</span></a></p><p class="author" data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">Robson, James</span></p><div class="desc" data-dcnode-id="2907"><p data-dcnode-id="2908"><span data-dcnode-id="2915" instrument_node="">Throughout Chinese history mountains have been integral components of the religious landscape. Early in Chinese history a set of five mountains were co-opted into the imperial cult and declared sacred peaks, </span><i data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">yue</span></i><span data-dcnode-id="2912" instrument_node="">, demarcating and protecting the boundaries of the Chinese imperium. </span><b data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">James Robson</span></b><span data-dcnode-id="2909" instrument_node="">’s analysis of these topics demonstrates the value of local studies and the emerging field of Buddho–Daoist studies in research on Chinese religion.</span></p></div></td></tr><tr data-dcnode-id="2887"><td class="number" data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">317.</span></td><td class="jkt" data-dcnode-id="2900"><a data-dcnode-id="2901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674033429" title="When Empire Comes Home: Repatriation and Reintegration in Postwar Japan"><img alt="Cover: When Empire Comes Home: Repatriation and Reintegration in Postwar Japan" data-dcnode-id="2902" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674033429-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2888"><p class="title" data-dcnode-id="2897"><a data-dcnode-id="2898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674033429"><span data-dcnode-id="2899" instrument_node="">When Empire Comes Home: Repatriation and Reintegration in Postwar Japan</span></a></p><p class="author" data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">Watt, Lori</span></p><div class="desc" data-dcnode-id="2889"><p data-dcnode-id="2890"><span data-dcnode-id="2894" instrument_node="">Following the end of World War II in Asia, the Allied powers repatriated over six million Japanese nationals and deported more than a million colonial subjects from Japan. </span><b data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">Watt</span></b><span data-dcnode-id="2891" instrument_node=""> analyzes how the human remnants of empire served as sites of negotiation in the process of jettisoning the colonial project and in the creation of new national identities.</span></p></div></td></tr><tr data-dcnode-id="2872"><td class="number" data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">318.</span></td><td class="jkt" data-dcnode-id="2882"><a data-dcnode-id="2883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674032842" title="Critical Aesthetics: Kobayashi Hideo, Modernity, and Wartime Japan"><img alt="Cover: Critical Aesthetics: Kobayashi Hideo, Modernity, and Wartime Japan" data-dcnode-id="2884" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674032842-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2873"><p class="title" data-dcnode-id="2879"><a data-dcnode-id="2880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674032842"><span data-dcnode-id="2881" instrument_node="">Critical Aesthetics: Kobayashi Hideo, Modernity, and Wartime Japan</span></a></p><p class="author" data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">Dorsey, James</span></p><div class="desc" data-dcnode-id="2874"><p data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">This study revolves around the career of Kobayashi Hideo (1902–1983), one of the seminal figures in the history of modern Japanese literary criticism, whose interpretive vision was forged amidst the cultural and ideological crises that dominated intellectual discourse between the 1920s and the 1940s.</span></p></div></td></tr><tr data-dcnode-id="2854"><td class="number" data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">319.</span></td><td class="jkt" data-dcnode-id="2867"><a data-dcnode-id="2868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674032781" title="Sublime Voices: The Fictional Science and Scientific Fiction of Abe Kōbō"><img alt="Cover: Sublime Voices: The Fictional Science and Scientific Fiction of Abe Kōbō" data-dcnode-id="2869" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674032781-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2855"><p class="title" data-dcnode-id="2864"><a data-dcnode-id="2865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674032781"><span data-dcnode-id="2866" instrument_node="">Sublime Voices: The Fictional Science and Scientific Fiction of Abe Kōbō</span></a></p><p class="author" data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">Bolton, Christopher</span></p><div class="desc" data-dcnode-id="2856"><p data-dcnode-id="2857"><span data-dcnode-id="2861" instrument_node="">Since the 1950s, Abe Kōbō (1924–1993) has achieved an international reputation for his surreal or grotesque brand of literature. </span><b data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">Bolton</span></b><span data-dcnode-id="2858" instrument_node=""> explores how this reconciliation of ideas and dialects is for Abe part of the process whereby texts and individuals form themselves—a search for identity that occurs at the level of the self and society at large.</span></p></div></td></tr><tr data-dcnode-id="2839"><td class="number" data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">320.</span></td><td class="jkt" data-dcnode-id="2849"><a data-dcnode-id="2850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674035614" title="Negotiating Urban Space: Urbanization and Late Ming Nanjing"><img alt="Cover: Negotiating Urban Space: Urbanization and Late Ming Nanjing" data-dcnode-id="2851" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674035614-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2840"><p class="title" data-dcnode-id="2846"><a data-dcnode-id="2847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674035614"><span data-dcnode-id="2848" instrument_node="">Negotiating Urban Space: Urbanization and Late Ming Nanjing</span></a></p><p class="author" data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">Fei, Si-yen</span></p><div class="desc" data-dcnode-id="2841"><p data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">Urbanization was central to development in late imperial China. Yet scholars agree it triggered neither Weberian urban autonomy nor Habermasian civil society. Using Nanjing as a central case, the author shows that, prompted by this contradiction, the actions and creations of urban residents transformed the city on multiple levels.</span></p></div></td></tr><tr data-dcnode-id="2822"><td class="number" data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">321.</span></td><td class="jkt" data-dcnode-id="2834"><a data-dcnode-id="2835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674035690" title="Gender Struggles: Wage-Earning Women and Male-Dominated Unions in Postwar Japan"><img alt="Cover: Gender Struggles: Wage-Earning Women and Male-Dominated Unions in Postwar Japan" data-dcnode-id="2836" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674035690-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2823"><p class="title" data-dcnode-id="2831"><a data-dcnode-id="2832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674035690"><span data-dcnode-id="2833" instrument_node="">Gender Struggles: Wage-Earning Women and Male-Dominated Unions in Postwar Japan</span></a></p><p class="author" data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">Gerteis, Christopher</span></p><div class="desc" data-dcnode-id="2824"><p data-dcnode-id="2825"><b data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">Gerteis</span></b><span data-dcnode-id="2826" instrument_node=""> demonstrates that Japanese organized labor’s discourse on womanhood not only undermined women’s status within the labor movement but also prevented unions from linking with the emerging woman-led, neighborhood-centered organizations that typified social movements in the 1960s.</span></p></div></td></tr><tr data-dcnode-id="2807"><td class="number" data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">322.</span></td><td class="jkt" data-dcnode-id="2817"><a data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674035997" title="Superstitious Regimes: Religion and the Politics of Chinese Modernity"><img alt="Cover: Superstitious Regimes: Religion and the Politics of Chinese Modernity" data-dcnode-id="2819" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674035997-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2808"><p class="title" data-dcnode-id="2814"><a data-dcnode-id="2815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674035997"><span data-dcnode-id="2816" instrument_node="">Superstitious Regimes: Religion and the Politics of Chinese Modernity</span></a></p><p class="author" data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">Nedostup, Rebecca</span></p><div class="desc" data-dcnode-id="2809"><p data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">We live in a world shaped by secularism—the separation of numinous power from political authority and religion from public political, social, and economic realms. This book explores the modern recategorization of religious practices and people and examines how state power affected the religious lives and physical order of local communities.</span></p></div></td></tr><tr data-dcnode-id="2786"><td class="number" data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">323.</span></td><td class="jkt" data-dcnode-id="2802"><a data-dcnode-id="2803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674035423" title="Wretched Rebels: Rural Disturbances on the Eve of the Chinese Revolution"><img alt="Cover: Wretched Rebels: Rural Disturbances on the Eve of the Chinese Revolution" data-dcnode-id="2804" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674035423-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2787"><p class="title" data-dcnode-id="2799"><a data-dcnode-id="2800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674035423"><span data-dcnode-id="2801" instrument_node="">Wretched Rebels: Rural Disturbances on the Eve of the Chinese Revolution</span></a></p><p class="author" data-dcnode-id="2795"><span data-dcnode-id="2798" instrument_node="">Bianco, Lucien</span><br data-dcnode-id="2797"><span data-dcnode-id="2796" instrument_node="">
Liddell, Philip</span></p><div class="desc" data-dcnode-id="2788"><p data-dcnode-id="2790"><span data-dcnode-id="2794" instrument_node="">This book, a condensed translation of the prize-winning </span><i data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">Jacqueries et révolution dans la Chine du XXe siècle</span></i><span data-dcnode-id="2791" instrument_node="">, focuses on “spontaneous” rural unrest, uninfluenced by revolutionary intellectuals. The author shows that the predominant forms of protest were directed not against the landowning class but against agents of the state, and suggests that twentieth-century Chinese peasants were less different from seventeenth- or eighteenth-century French peasants than might be imagined and points to continuities between pre- and post-1949 rural protest.</span></p><span data-dcnode-id="2789" instrument_node="">
</span></div></td></tr><tr data-dcnode-id="2771"><td class="number" data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">324.</span></td><td class="jkt" data-dcnode-id="2781"><a data-dcnode-id="2782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674035454" title="Sovereignty at the Edge: Macau and the Question of Chineseness"><img alt="Cover: Sovereignty at the Edge: Macau and the Question of Chineseness" data-dcnode-id="2783" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674035454-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2772"><p class="title" data-dcnode-id="2778"><a data-dcnode-id="2779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674035454"><span data-dcnode-id="2780" instrument_node="">Sovereignty at the Edge: Macau and the Question of Chineseness</span></a></p><p class="author" data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">Clayton, Cathryn H.</span></p><div class="desc" data-dcnode-id="2773"><p data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">How have conceptions and practices of sovereignty shaped how Chineseness is imagined? This ethnography addresses this question through the example of Macau, a southern Chinese city that was a Portuguese colony from the 1550s until 1999.</span></p></div></td></tr><tr data-dcnode-id="2753"><td class="number" data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">325.</span></td><td class="jkt" data-dcnode-id="2766"><a data-dcnode-id="2767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674035980" title="Fishing Wars and Environmental Change in Late Imperial and Modern China"><img alt="Cover: Fishing Wars and Environmental Change in Late Imperial and Modern China" data-dcnode-id="2768" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674035980-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2754"><p class="title" data-dcnode-id="2763"><a data-dcnode-id="2764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674035980"><span data-dcnode-id="2765" instrument_node="">Fishing Wars and Environmental Change in Late Imperial and Modern China</span></a></p><p class="author" data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">Muscolino, Micah S.</span></p><div class="desc" data-dcnode-id="2755"><p data-dcnode-id="2756"><span data-dcnode-id="2760" instrument_node="">This work explores interactions between society and environment in China’s most important marine fishery, the Zhoushan Archipelago off the coast of Zhejiang and Jiangsu, from its nineteenth-century expansion to the exhaustion of the most important fish species in the 1970s. </span><b data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">Micah S. Muscolino</span></b><span data-dcnode-id="2757" instrument_node=""> gives us a better understanding of the relationship between past ecological changes and present environmental challenges.</span></p></div></td></tr><tr data-dcnode-id="2735"><td class="number" data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">326.</span></td><td class="jkt" data-dcnode-id="2748"><a data-dcnode-id="2749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674035775" title="Defining Engagement: Japan and Global Contexts, 1640 - 1868"><img alt="Cover: Defining Engagement: Japan and Global Contexts, 1640 - 1868" data-dcnode-id="2750" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674035775-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2736"><p class="title" data-dcnode-id="2745"><a data-dcnode-id="2746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674035775"><span data-dcnode-id="2747" instrument_node="">Defining Engagement: Japan and Global Contexts, 1640 - 1868</span></a></p><p class="author" data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">Hellyer, Robert I.</span></p><div class="desc" data-dcnode-id="2737"><p data-dcnode-id="2738"><span data-dcnode-id="2742" instrument_node="">Presenting fresh insights on the internal dynamics and global contexts that shaped foreign relations in early modern Japan, </span><b data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">Robert I. Hellyer</span></b><span data-dcnode-id="2739" instrument_node=""> challenges the still largely accepted wisdom that the Tokugawa shogunate, guided by an ideology of seclusion, stifled intercourse with the outside world, especially in the eighteenth and nineteenth centuries.</span></p></div></td></tr><tr data-dcnode-id="2720"><td class="number" data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">327.</span></td><td class="jkt" data-dcnode-id="2730"><a data-dcnode-id="2731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674053212" title="The Transport of Reading: Text and Understanding in the World of Tao Qian (365–427)"><img alt="Cover: The Transport of Reading: Text and Understanding in the World of Tao Qian (365–427)" data-dcnode-id="2732" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674053212-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2721"><p class="title" data-dcnode-id="2727"><a data-dcnode-id="2728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674053212"><span data-dcnode-id="2729" instrument_node="">The Transport of Reading: Text and Understanding in the World of Tao Qian (365–427)</span></a></p><p class="author" data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Ashmore, Robert</span></p><div class="desc" data-dcnode-id="2722"><p data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">For centuries, readers of Tao Qian have felt directly addressed by his poetic voice. This theme in the reception of Tao Qian, moreover, developed alongside an assumption that Tao was fundamentally misunderstood during his own age. This book revisits Tao’s approach to his readers by attempting to situate it within the particular poetics of address that characterized the Six Dynasties classicist tradition. How would Tao Qian have anticipated that his readers would understand him?</span></p></div></td></tr><tr data-dcnode-id="2703"><td class="number" data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">328.</span></td><td class="jkt" data-dcnode-id="2715"><a data-dcnode-id="2716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674053342" title="Children as Treasures: Childhood and the Middle Class in Early Twentieth Century Japan"><img alt="Cover: Children as Treasures: Childhood and the Middle Class in Early Twentieth Century Japan" data-dcnode-id="2717" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674053342-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2704"><p class="title" data-dcnode-id="2712"><a data-dcnode-id="2713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674053342"><span data-dcnode-id="2714" instrument_node="">Children as Treasures: Childhood and the Middle Class in Early Twentieth Century Japan</span></a></p><p class="author" data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">Jones, Mark</span></p><div class="desc" data-dcnode-id="2705"><p data-dcnode-id="2706"><b data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">Mark Jones</span></b><span data-dcnode-id="2707" instrument_node=""> examines the making of a new child’s world in Japan, 1890–1930, and focuses on the institutions, groups, and individuals that reshaped both the idea of childhood and the daily life of children. He also places the story of modern childhood within a broader social context—the emergence of a middle class in early twentieth century Japan.</span></p></div></td></tr><tr data-dcnode-id="2690"><td class="number" data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">329.</span></td><td class="jkt" data-dcnode-id="2698"><a data-dcnode-id="2699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674053403" title="Experimental Arts in Postwar Japan: Moments of Encounter, Engagement, and Imagined Return"><img alt="Cover: Experimental Arts in Postwar Japan: Moments of Encounter, Engagement, and Imagined Return" data-dcnode-id="2700" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674053403-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2691"><p class="title" data-dcnode-id="2695"><a data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674053403"><span data-dcnode-id="2697" instrument_node="">Experimental Arts in Postwar Japan: Moments of Encounter, Engagement, and Imagined Return</span></a></p><p class="author" data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">Sas, Miryam</span></p><div class="desc" data-dcnode-id="2692"></div></td></tr><tr data-dcnode-id="2669"><td class="number" data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">330.</span></td><td class="jkt" data-dcnode-id="2685"><a data-dcnode-id="2686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674053304" title="Traversing the Frontier: The <i>Man'yōshū</i> Account of a Japanese Mission to Silla in 736–737"><img alt="Cover: Traversing the Frontier: The <i>Man'yōshū</i> Account of a Japanese Mission to Silla in 736–737" data-dcnode-id="2687" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674053304-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2670"><p class="title" data-dcnode-id="2679"><a data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674053304"><span data-dcnode-id="2684" instrument_node="">Traversing the Frontier: The </span><i data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Man'yōshū</span></i><span data-dcnode-id="2681" instrument_node=""> Account of a Japanese Mission to Silla in 736–737</span></a></p><p class="author" data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">Horton, H. Mack</span></p><div class="desc" data-dcnode-id="2671"><p data-dcnode-id="2672"><span data-dcnode-id="2676" instrument_node="">In 736, a Japanese diplomatic mission set out for Silla, on the Korean peninsula. The envoys met with adverse events and returned empty-handed. The futile journey proved fruitful in one respect: a collection of 145 Japanese poems and their Sino-Japanese headnotes and footnotes made its way into the eighth-century poetic anthology </span><i data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">Man’yōshū</span></i><span data-dcnode-id="2673" instrument_node="">, becoming one of the earliest Japanese literary travel narratives. Featuring deft translations and incisive analysis, this study investigates the poetics and thematics of the Silla sequence, uncovering what is known about the actual historical event and the assumptions and concerns that guided its re-creation as a literary artifact and then helped shape its reception among contemporary readers.</span></p></div></td></tr><tr data-dcnode-id="2652"><td class="number" data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">331.</span></td><td class="jkt" data-dcnode-id="2664"><a data-dcnode-id="2665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674056107" title="Seeing Stars: Sports Celebrity, Identity, and Body Culture in Modern Japan"><img alt="Cover: Seeing Stars: Sports Celebrity, Identity, and Body Culture in Modern Japan" data-dcnode-id="2666" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674056107-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2653"><p class="title" data-dcnode-id="2661"><a data-dcnode-id="2662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674056107"><span data-dcnode-id="2663" instrument_node="">Seeing Stars: Sports Celebrity, Identity, and Body Culture in Modern Japan</span></a></p><p class="author" data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">Frost, Dennis J.</span></p><div class="desc" data-dcnode-id="2654"><p data-dcnode-id="2655"><b data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">Dennis J. Frost</span></b><span data-dcnode-id="2656" instrument_node=""> traces the emergence and evolution of sports celebrity in Japan from the seventeenth through the twenty-first centuries. Frost explores how various constituencies have repeatedly molded and deployed representations of individual athletes, revealing that sports stars are socially constructed phenomena, the products of both particular historical moments and broader discourses of celebrity.</span></p></div></td></tr><tr data-dcnode-id="2635"><td class="number" data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">332.</span></td><td class="jkt" data-dcnode-id="2647"><a data-dcnode-id="2648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674056053" title="A Place in Public: Women’s Rights in Meiji Japan"><img alt="Cover: A Place in Public: Women’s Rights in Meiji Japan" data-dcnode-id="2649" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674056053-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2636"><p class="title" data-dcnode-id="2644"><a data-dcnode-id="2645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674056053"><span data-dcnode-id="2646" instrument_node="">A Place in Public: Women’s Rights in Meiji Japan</span></a></p><p class="author" data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">Anderson, Marnie S.</span></p><div class="desc" data-dcnode-id="2637"><p data-dcnode-id="2638"><b data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Anderson</span></b><span data-dcnode-id="2639" instrument_node=""> argues that shifts in the gender system during the early Meiji period had mixed consequences for Japanese women. Women gained access to the chance to represent themselves and play a limited political role, but were permitted political participation only as an expression of “citizenship through the household.”</span></p></div></td></tr><tr data-dcnode-id="2622"><td class="number" data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">333.</span></td><td class="jkt" data-dcnode-id="2630"><a data-dcnode-id="2631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674055995" title="Sailor Diplomat: Nomura Kichisaburo and the Japanese-American War"><img alt="Cover: Sailor Diplomat: Nomura Kichisaburo and the Japanese-American War" data-dcnode-id="2632" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674055995-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2623"><p class="title" data-dcnode-id="2627"><a data-dcnode-id="2628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674055995"><span data-dcnode-id="2629" instrument_node="">Sailor Diplomat: Nomura Kichisaburo and the Japanese-American War</span></a></p><p class="author" data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">Mauch, Peter</span></p><div class="desc" data-dcnode-id="2624"></div></td></tr><tr data-dcnode-id="2607"><td class="number" data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">334.</span></td><td class="jkt" data-dcnode-id="2617"><a data-dcnode-id="2618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674060685" title="Coins, Trade, and the State: Economic Growth in Early Medieval Japan"><img alt="Cover: Coins, Trade, and the State: Economic Growth in Early Medieval Japan" data-dcnode-id="2619" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674060685-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2608"><p class="title" data-dcnode-id="2614"><a data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674060685"><span data-dcnode-id="2616" instrument_node="">Coins, Trade, and the State: Economic Growth in Early Medieval Japan</span></a></p><p class="author" data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">Segal, Ethan Isaac</span></p><div class="desc" data-dcnode-id="2609"><p data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">The political fragmentation and constant warfare of medieval Japan did not necessarily inhibit economic growth. Rather, as this book shows, these conditions created opportunities for a wider spectrum of society to participate in trade, markets, and monetization, laying the groundwork for Japan’s transformation into an early modern society.</span></p></div></td></tr><tr data-dcnode-id="2589"><td class="number" data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">335.</span></td><td class="jkt" data-dcnode-id="2602"><a data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674060654" title="Realms of Literacy: Early Japan and the History of Writing"><img alt="Cover: Realms of Literacy: Early Japan and the History of Writing" data-dcnode-id="2604" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674060654-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2590"><p class="title" data-dcnode-id="2599"><a data-dcnode-id="2600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674060654"><span data-dcnode-id="2601" instrument_node="">Realms of Literacy: Early Japan and the History of Writing</span></a></p><p class="author" data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">Lurie, David B.</span></p><div class="desc" data-dcnode-id="2591"><p data-dcnode-id="2592"><span data-dcnode-id="2596" instrument_node="">Drawing on varied archaeological and archival sources, </span><b data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">David B. Lurie</span></b><span data-dcnode-id="2593" instrument_node=""> highlights the diverse modes and uses of writing that coexisted in Japan between the first and eighth centuries. This book illuminates not only the textual practices of early Japanese civilization but also the comparative history of writing and literacy in the ancient world.</span></p></div></td></tr><tr data-dcnode-id="2566"><td class="number" data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">336.</span></td><td class="jkt" data-dcnode-id="2584"><a data-dcnode-id="2585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674060692" title="Picturing Heaven in Early China"><img alt="Cover: Picturing Heaven in Early China" data-dcnode-id="2586" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674060692-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2567"><p class="title" data-dcnode-id="2581"><a data-dcnode-id="2582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674060692"><span data-dcnode-id="2583" instrument_node="">Picturing Heaven in Early China</span></a></p><p class="author" data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">Tseng, Lillian Lan-ying</span></p><div class="desc" data-dcnode-id="2568"><p data-dcnode-id="2569"><i data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">Tian</span></i><span data-dcnode-id="2576" instrument_node="">, or Heaven, had been used in China since the Western Zhou to indicate both the sky and the highest god. Examining excavated materials, </span><b data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">Lillian Tseng</span></b><span data-dcnode-id="2573" instrument_node=""> shows how Han-dynasty artisans transformed various notions of Heaven—as the mandate, the fantasy, and the sky—into pictorial entities, not by what they looked at, but by what they looked </span><i data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">into</span></i><span data-dcnode-id="2570" instrument_node="">.</span></p></div></td></tr><tr data-dcnode-id="2549"><td class="number" data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">337.</span></td><td class="jkt" data-dcnode-id="2561"><a data-dcnode-id="2562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674492028" title="Brokers of Empire: Japanese Settler Colonialism in Korea, 1876–1945"><img alt="Cover: Brokers of Empire: Japanese Settler Colonialism in Korea, 1876–1945" data-dcnode-id="2563" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674492028-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2550"><p class="title" data-dcnode-id="2558"><a data-dcnode-id="2559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674492028"><span data-dcnode-id="2560" instrument_node="">Brokers of Empire: Japanese Settler Colonialism in Korea, 1876–1945</span></a></p><p class="author" data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Uchida, Jun</span></p><div class="desc" data-dcnode-id="2551"><p data-dcnode-id="2552"><b data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">Jun Uchida</span></b><span data-dcnode-id="2553" instrument_node=""> draws on previously unused materials in multi-language archives to uncover the obscured history of the Japanese civilians who settled in Korea between 1876 and 1945, with particular focus on the first generation of “pioneers” between the 1910s and 1930s who actively mediated Japan's colonial presence on the Korean peninsula.</span></p></div></td></tr><tr data-dcnode-id="2532"><td class="number" data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">338.</span></td><td class="jkt" data-dcnode-id="2544"><a data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674062450" title="The People’s Post Office: The History and Politics of the Japanese Postal System, 1871–2010"><img alt="Cover: The People’s Post Office: The History and Politics of the Japanese Postal System, 1871–2010" data-dcnode-id="2546" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674062450-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2533"><p class="title" data-dcnode-id="2541"><a data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674062450"><span data-dcnode-id="2543" instrument_node="">The People’s Post Office: The History and Politics of the Japanese Postal System, 1871–2010</span></a></p><p class="author" data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">Maclachlan, Patricia L.</span></p><div class="desc" data-dcnode-id="2534"><p data-dcnode-id="2535"><b data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">Maclachlan</span></b><span data-dcnode-id="2536" instrument_node=""> analyzes the institutions, interest groups, and leaders involved in the evolution of Japan’s postal system from the early Meiji period until 2010. At the crux of her analysis is Prime Minister Koizumi Jun’ichirō’s crusade to privatize Japan’s postal services, one of the most astonishing political achievements in postwar Japanese history.</span></p></div></td></tr><tr data-dcnode-id="2517"><td class="number" data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">339.</span></td><td class="jkt" data-dcnode-id="2527"><a data-dcnode-id="2528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674062498" title="The Money Doctors from Japan: Finance, Imperialism, and the Building of the Yen Bloc, 1895–1937"><img alt="Cover: The Money Doctors from Japan: Finance, Imperialism, and the Building of the Yen Bloc, 1895–1937" data-dcnode-id="2529" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674062498-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2518"><p class="title" data-dcnode-id="2524"><a data-dcnode-id="2525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674062498"><span data-dcnode-id="2526" instrument_node="">The Money Doctors from Japan: Finance, Imperialism, and the Building of the Yen Bloc, 1895–1937</span></a></p><p class="author" data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">Schiltz, Michael</span></p><div class="desc" data-dcnode-id="2519"><p data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">This study investigates the Japanese experiment with financial imperialism—or “yen diplomacy”—at several key moments between the acquisition of Taiwan in 1895 and the outbreak of the Sino–Japanese War in 1937, and how these practices impacted the development of receiving nations and defined their geopolitical position in the postcolonial world.</span></p></div></td></tr><tr data-dcnode-id="2484"><td class="number" data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">340.</span></td><td class="jkt" data-dcnode-id="2512"><a data-dcnode-id="2513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674062566" title="Toward a History Beyond Borders: Contentious Issues in Sino–Japanese Relations"><img alt="Cover: Toward a History Beyond Borders: Contentious Issues in Sino–Japanese Relations" data-dcnode-id="2514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674062566-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2485"><p class="title" data-dcnode-id="2509"><a data-dcnode-id="2510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674062566"><span data-dcnode-id="2511" instrument_node="">Toward a History Beyond Borders: Contentious Issues in Sino–Japanese Relations</span></a></p><p class="author" data-dcnode-id="2489"><span data-dcnode-id="2508" instrument_node="">Yang, Daqing</span><br data-dcnode-id="2507"><span data-dcnode-id="2506" instrument_node="">

Fogel, Joshua A.</span><br data-dcnode-id="2497"><span data-dcnode-id="2496" instrument_node="">

George, Timothy S.</span><br data-dcnode-id="2493"><span data-dcnode-id="2492" instrument_node="">
Lawson, Konrad M.</span><br data-dcnode-id="2491"><span data-dcnode-id="2490" instrument_node="">
Rubinfien, Louisa</span></p><div class="desc" data-dcnode-id="2486"><p data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">Originally published simultaneously in Chinese and Japanese in 2006, this volume brings to English-language readers the fruits of a critical long-term project by Chinese and Japanese historians addressing contentious issues in their shared modern histories.</span></p></div></td></tr><tr data-dcnode-id="2467"><td class="number" data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">341.</span></td><td class="jkt" data-dcnode-id="2479"><a data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674062474" title="Reading North Korea: An Ethnological Inquiry"><img alt="Cover: Reading North Korea: An Ethnological Inquiry" data-dcnode-id="2481" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674062474-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2468"><p class="title" data-dcnode-id="2476"><a data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674062474"><span data-dcnode-id="2478" instrument_node="">Reading North Korea: An Ethnological Inquiry</span></a></p><p class="author" data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">Ryang, Sonia</span></p><div class="desc" data-dcnode-id="2469"><p data-dcnode-id="2470"><b data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">Sonia Ryang</span></b><span data-dcnode-id="2471" instrument_node=""> casts new light on the study of North Korean culture and society by reading literary texts as sources of ethnographic data. Ryang focuses critical attention on three central themes—love, war, and self—that reflect the nearly complete overlap of the personal, social, and political realms in North Korean society.</span></p></div></td></tr><tr data-dcnode-id="2449"><td class="number" data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">342.</span></td><td class="jkt" data-dcnode-id="2462"><a data-dcnode-id="2463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504288" title="Picturing the True Form: Daoist Visual Culture in Traditional China"><img alt="Cover: Picturing the True Form: Daoist Visual Culture in Traditional China" data-dcnode-id="2464" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674504288-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2450"><p class="title" data-dcnode-id="2459"><a data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504288"><span data-dcnode-id="2461" instrument_node="">Picturing the True Form: Daoist Visual Culture in Traditional China</span></a></p><p class="author" data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">Huang, Shih-shan Susan</span></p><div class="desc" data-dcnode-id="2451"><p data-dcnode-id="2452"><span data-dcnode-id="2456" instrument_node="">In this richly illustrated book, </span><b data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Shih-shan Susan Huang</span></b><span data-dcnode-id="2453" instrument_node=""> investigates the visual culture of Daoism, China’s primary indigenous religion, from the tenth through thirteenth centuries with references to earlier and later times. Huang shows how Daoist image-making goes beyond the usual dichotomy of text and image to incorporate writings in image design.</span></p></div></td></tr><tr data-dcnode-id="2428"><td class="number" data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">343.</span></td><td class="jkt" data-dcnode-id="2444"><a data-dcnode-id="2445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674065819" title="A Continuous Revolution: Making Sense of Cultural Revolution Culture"><img alt="Cover: A Continuous Revolution: Making Sense of Cultural Revolution Culture" data-dcnode-id="2446" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674065819-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2429"><p class="title" data-dcnode-id="2441"><a data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674065819"><span data-dcnode-id="2443" instrument_node="">A Continuous Revolution: Making Sense of Cultural Revolution Culture</span></a></p><p class="author" data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">Mittler, Barbara</span></p><div class="desc" data-dcnode-id="2430"><p data-dcnode-id="2431"><span data-dcnode-id="2438" instrument_node="">Cultural Revolution Culture, often denigrated as pure propaganda, was liked not only in its heyday but continues to be enjoyed today. Considering this art—music, stage works, posters, comics, literature—in its </span><i data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">longue durée</span></i><span data-dcnode-id="2435" instrument_node="">, </span><b data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Barbara Mittler</span></b><span data-dcnode-id="2432" instrument_node=""> suggests it builds on a tradition of earlier works, allowing for proliferation in contemporary China.</span></p></div></td></tr><tr data-dcnode-id="2411"><td class="number" data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">344.</span></td><td class="jkt" data-dcnode-id="2423"><a data-dcnode-id="2424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674065758" title="Empire of the Dharma: Korean and Japanese Buddhism, 1877–1912"><img alt="Cover: Empire of the Dharma: Korean and Japanese Buddhism, 1877–1912" data-dcnode-id="2425" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674065758-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2412"><p class="title" data-dcnode-id="2420"><a data-dcnode-id="2421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674065758"><span data-dcnode-id="2422" instrument_node="">Empire of the Dharma: Korean and Japanese Buddhism, 1877–1912</span></a></p><p class="author" data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">Kim, Hwansoo Ilmee</span></p><div class="desc" data-dcnode-id="2413"><p data-dcnode-id="2414"><b data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Hwansoo Ilmee Kim</span></b><span data-dcnode-id="2415" instrument_node=""> explores the dynamic relationship between Korean and Japanese Buddhists in the years leading up to the Japanese annexation of Korea. Conventional narratives portray Korean Buddhists as complicit in the religious annexation of the peninsula, but this view fails to account for the diverse visions, interests, and strategies that drove both sides.</span></p></div></td></tr><tr data-dcnode-id="2394"><td class="number" data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">345.</span></td><td class="jkt" data-dcnode-id="2406"><a data-dcnode-id="2407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674065864" title="Detective Fiction and the Rise of the Japanese Novel, 1880–1930"><img alt="Cover: Detective Fiction and the Rise of the Japanese Novel, 1880–1930" data-dcnode-id="2408" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674065864-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2395"><p class="title" data-dcnode-id="2403"><a data-dcnode-id="2404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674065864"><span data-dcnode-id="2405" instrument_node="">Detective Fiction and the Rise of the Japanese Novel, 1880–1930</span></a></p><p class="author" data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Saito, Satoru</span></p><div class="desc" data-dcnode-id="2396"><p data-dcnode-id="2397"><b data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">Satoru Saito</span></b><span data-dcnode-id="2398" instrument_node=""> examines the similarities between detective fiction and the novel in prewar Japan. Arguing that interactions between the genres were critical moments of literary engagement, Saito demonstrates how detective fiction provided a framework through which to examine and critique Japan’s literary formations and its modernizing society.</span></p></div></td></tr><tr data-dcnode-id="2377"><td class="number" data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">346.</span></td><td class="jkt" data-dcnode-id="2389"><a data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674065710" title="An Imperial Path to Modernity: Yoshino Sakuzō and a New Liberal Order in East Asia, 1905–1937"><img alt="Cover: An Imperial Path to Modernity: Yoshino Sakuzō and a New Liberal Order in East Asia, 1905–1937" data-dcnode-id="2391" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674065710-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2378"><p class="title" data-dcnode-id="2386"><a data-dcnode-id="2387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674065710"><span data-dcnode-id="2388" instrument_node="">An Imperial Path to Modernity: Yoshino Sakuzō and a New Liberal Order in East Asia, 1905–1937</span></a></p><p class="author" data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Han, Jung-Sun N.</span></p><div class="desc" data-dcnode-id="2379"><p data-dcnode-id="2380"><b data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Jung-Sun N. Han</span></b><span data-dcnode-id="2381" instrument_node=""> examines the role of liberal intellectuals in reshaping transnational ideas and internationalist aspirations into national values and imperial ambitions in early twentieth-century Japan. Han’s focus is on the ideas and activities of Yoshino Sakuzo (1878–1933), who was a champion of prewar Japanese liberalism and Taisho democracy.</span></p></div></td></tr><tr data-dcnode-id="2359"><td class="number" data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">347.</span></td><td class="jkt" data-dcnode-id="2372"><a data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674066823" title="Government by Mourning: Death and Political Integration in Japan, 1603-1912"><img alt="Cover: Government by Mourning: Death and Political Integration in Japan, 1603-1912" data-dcnode-id="2374" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674066823-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2360"><p class="title" data-dcnode-id="2369"><a data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674066823"><span data-dcnode-id="2371" instrument_node="">Government by Mourning: Death and Political Integration in Japan, 1603-1912</span></a></p><p class="author" data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">Hirai, Atsuko</span></p><div class="desc" data-dcnode-id="2361"><p data-dcnode-id="2362"><span data-dcnode-id="2366" instrument_node="">Strict decrees on the observance of death were part of the myriad laws enacted under the Tokugawa shogunate to control nearly every aspect of Japanese life. </span><b data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">Hirai</span></b><span data-dcnode-id="2363" instrument_node=""> explores how this class of legislation played an integrative part in Japanese society by codifying religious beliefs and customs the Japanese people had cherished for generations.</span></p></div></td></tr><tr data-dcnode-id="2341"><td class="number" data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">348.</span></td><td class="jkt" data-dcnode-id="2354"><a data-dcnode-id="2355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674066779" title="Public Law, Private Practice: Politics, Profit, and the Legal Profession in Nineteenth-Century Japan"><img alt="Cover: Public Law, Private Practice: Politics, Profit, and the Legal Profession in Nineteenth-Century Japan" data-dcnode-id="2356" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674066779-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2342"><p class="title" data-dcnode-id="2351"><a data-dcnode-id="2352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674066779"><span data-dcnode-id="2353" instrument_node="">Public Law, Private Practice: Politics, Profit, and the Legal Profession in Nineteenth-Century Japan</span></a></p><p class="author" data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Flaherty, Darryl E.</span></p><div class="desc" data-dcnode-id="2343"><p data-dcnode-id="2344"><span data-dcnode-id="2348" instrument_node="">Practitioners of private law opened the way toward Japan’s legal modernity in ways the samurai and the state could not. Tracing law regimes from Edo to Meiji, </span><b data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Flaherty</span></b><span data-dcnode-id="2345" instrument_node=""> shows how the legal profession emerged as a force for change in modern Japan, founding private universities and political parties, and contributing to twentieth-century legal reform.</span></p></div></td></tr><tr data-dcnode-id="2323"><td class="number" data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">349.</span></td><td class="jkt" data-dcnode-id="2336"><a data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674066687" title="On the Margins of Empire: Buraku and Korean Identity in Prewar and Wartime Japan"><img alt="Cover: On the Margins of Empire: Buraku and Korean Identity in Prewar and Wartime Japan" data-dcnode-id="2338" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674066687-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2324"><p class="title" data-dcnode-id="2333"><a data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674066687"><span data-dcnode-id="2335" instrument_node="">On the Margins of Empire: Buraku and Korean Identity in Prewar and Wartime Japan</span></a></p><p class="author" data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Bayliss, Jeffrey Paul</span></p><div class="desc" data-dcnode-id="2325"><p data-dcnode-id="2326"><span data-dcnode-id="2330" instrument_node="">Koreans and Burakumin, two of the largest minority groups in modern Japan, share a history of discrimination that spans the decades of Japan’s modernization and imperial expansion. </span><b data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">Jeffrey Paul Bayliss</span></b><span data-dcnode-id="2327" instrument_node=""> explores the historical processes that cast them as “others” on the margins of the Japanese empire and that also influenced their views of themselves.</span></p></div></td></tr><tr data-dcnode-id="2301"><td class="number" data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">350.</span></td><td class="jkt" data-dcnode-id="2318"><a data-dcnode-id="2319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674066755" title="From Miracle to Maturity: The Growth of the Korean Economy"><img alt="Cover: From Miracle to Maturity: The Growth of the Korean Economy" data-dcnode-id="2320" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674066755-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2302"><p class="title" data-dcnode-id="2315"><a data-dcnode-id="2316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674066755"><span data-dcnode-id="2317" instrument_node="">From Miracle to Maturity: The Growth of the Korean Economy</span></a></p><p class="author" data-dcnode-id="2309"><span data-dcnode-id="2314" instrument_node="">Eichengreen, Barry</span><br data-dcnode-id="2313"><span data-dcnode-id="2312" instrument_node="">
Perkins, Dwight H.</span><br data-dcnode-id="2311"><span data-dcnode-id="2310" instrument_node="">
