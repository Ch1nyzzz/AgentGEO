atalog.php%3Fisbn%3D9780674005129" title="Competing Discourses: Orthodoxy, Authenticity, and Engendered Meanings in Late Imperial Chinese Fiction"><img alt="Cover: Competing Discourses: Orthodoxy, Authenticity, and Engendered Meanings in Late Imperial Chinese Fiction" data-dcnode-id="4636" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674005129-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4622"><p class="title" data-dcnode-id="4631"><a data-dcnode-id="4632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674005129"><span data-dcnode-id="4633" instrument_node="">Competing Discourses: Orthodoxy, Authenticity, and Engendered Meanings in Late Imperial Chinese Fiction</span></a></p><p class="author" data-dcnode-id="4629"><span data-dcnode-id="4630" instrument_node="">Epstein, Maram</span></p><div class="desc" data-dcnode-id="4623"><p data-dcnode-id="4624"><span data-dcnode-id="4628" instrument_node="">In the traditional Chinese symbolic vocabulary, the construction of gender was never far from debates about ritual propriety, desire, and even cosmic harmony. </span><i data-dcnode-id="4626"><span data-dcnode-id="4627" instrument_node="">Competing Discourses</span></i><span data-dcnode-id="4625" instrument_node=""> maps the aesthetic and semantic meanings associated with gender in the Ming–Qing vernacular novel through close readings of five long narratives.</span></p></div></td></tr><tr data-dcnode-id="4600"><td class="number" data-dcnode-id="4619"><span data-dcnode-id="4620" instrument_node="">199.</span></td><td class="jkt" data-dcnode-id="4616"><a data-dcnode-id="4617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674003743" title="Unfinished Business: Ayukawa Yoshisuke and U.S.-Japan Relations, 1937-1953"><img alt="Cover: Unfinished Business: Ayukawa Yoshisuke and U.S.-Japan Relations, 1937-1953" data-dcnode-id="4618" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674003743-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4601"><p class="title" data-dcnode-id="4613"><a data-dcnode-id="4614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674003743"><span data-dcnode-id="4615" instrument_node="">Unfinished Business: Ayukawa Yoshisuke and U.S.-Japan Relations, 1937-1953</span></a></p><p class="author" data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">Iguchi, Haruo</span></p><div class="desc" data-dcnode-id="4602"><p data-dcnode-id="4603"><span data-dcnode-id="4610" instrument_node="">Ayukawa Yoshisuke (1880–1967) was the founder of the Nissan conglomerate and the leader of the Manchuria Industrial Development Corporation, one of the linchpins of Imperial Japan’s efforts to economically exploit its overseas dependencies. He was also a proponent of free trade and global economic interdependence. In </span><i data-dcnode-id="4608"><span data-dcnode-id="4609" instrument_node="">Unfinished Business</span></i><span data-dcnode-id="4607" instrument_node="">, through exploring the reasons for Ayukawa’s failure, </span><b data-dcnode-id="4605"><span data-dcnode-id="4606" instrument_node="">Iguchi</span></b><span data-dcnode-id="4604" instrument_node=""> illuminates many of the economic problems of today’s Japan.</span></p></div></td></tr><tr data-dcnode-id="4585"><td class="number" data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">201.</span></td><td class="jkt" data-dcnode-id="4595"><a data-dcnode-id="4596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674005167" title="Writing Margins: The Textual Construction of Gender in Heian and Kamakura Japan"><img alt="Cover: Writing Margins: The Textual Construction of Gender in Heian and Kamakura Japan" data-dcnode-id="4597" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674005167-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4586"><p class="title" data-dcnode-id="4592"><a data-dcnode-id="4593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674005167"><span data-dcnode-id="4594" instrument_node="">Writing Margins: The Textual Construction of Gender in Heian and Kamakura Japan</span></a></p><p class="author" data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node="">Kawashima, Terry</span></p><div class="desc" data-dcnode-id="4587"><p data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">In texts from the mid-Heian to the early Kamakura periods, certain figures appear to be “marginal” or removed from “centers” of power. But why do we see these figures in this way? This study first seeks to answer this question by examining the details of the marginalizing discourse found in these texts.</span></p></div></td></tr><tr data-dcnode-id="4567"><td class="number" data-dcnode-id="4583"><span data-dcnode-id="4584" instrument_node="">202.</span></td><td class="jkt" data-dcnode-id="4580"><a data-dcnode-id="4581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674005136" title="Desire and Fictional Narrative in Late Imperial China"><img alt="Cover: Desire and Fictional Narrative in Late Imperial China" data-dcnode-id="4582" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674005136-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4568"><p class="title" data-dcnode-id="4577"><a data-dcnode-id="4578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674005136"><span data-dcnode-id="4579" instrument_node="">Desire and Fictional Narrative in Late Imperial China</span></a></p><p class="author" data-dcnode-id="4575"><span data-dcnode-id="4576" instrument_node="">Huang, Martin W.</span></p><div class="desc" data-dcnode-id="4569"><p data-dcnode-id="4570"><span data-dcnode-id="4574" instrument_node="">In this new study of desire in Late Imperial China, </span><b data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">Martin Huang</span></b><span data-dcnode-id="4571" instrument_node=""> argues that the development of traditional Chinese fiction as a narrative genre was closely related to changes in conceptions of the fundamental nature of desire.</span></p></div></td></tr><tr data-dcnode-id="4550"><td class="number" data-dcnode-id="4565"><span data-dcnode-id="4566" instrument_node="">203.</span></td><td class="jkt" data-dcnode-id="4562"><a data-dcnode-id="4563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674005266" title="Re-examining the Cold War: U.S.–China Diplomacy, 1954–1973"><img alt="Cover: Re-examining the Cold War: U.S.–China Diplomacy, 1954–1973" data-dcnode-id="4564" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674005266-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4551"><p class="title" data-dcnode-id="4559"><a data-dcnode-id="4560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674005266"><span data-dcnode-id="4561" instrument_node="">Re-examining the Cold War: U.S.–China Diplomacy, 1954–1973</span></a></p><p class="author" data-dcnode-id="4555"><span data-dcnode-id="4558" instrument_node="">Ross, Robert S.</span><br data-dcnode-id="4557"><span data-dcnode-id="4556" instrument_node="">
Jiang, Changbin</span></p><div class="desc" data-dcnode-id="4552"><p data-dcnode-id="4553"><span data-dcnode-id="4554" instrument_node="">The twelve essays in this volume underscore the similarities between Chinese and American approaches to bilateral diplomacy and between their perceptions of each other’s policy-making motivations.</span></p></div></td></tr><tr data-dcnode-id="4526"><td class="number" data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">205.</span></td><td class="jkt" data-dcnode-id="4545"><a data-dcnode-id="4546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674008618" title="A Patterned Past: Form and Thought in Early Chinese Historiography"><img alt="Cover: A Patterned Past: Form and Thought in Early Chinese Historiography" data-dcnode-id="4547" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674008618-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4527"><p class="title" data-dcnode-id="4542"><a data-dcnode-id="4543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674008618"><span data-dcnode-id="4544" instrument_node="">A Patterned Past: Form and Thought in Early Chinese Historiography</span></a></p><p class="author" data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">Schaberg, David</span></p><div class="desc" data-dcnode-id="4528"><p data-dcnode-id="4529"><span data-dcnode-id="4539" instrument_node="">In this comprehensive study of the rhetoric, narrative patterns, and intellectual content of the </span><i data-dcnode-id="4537"><span data-dcnode-id="4538" instrument_node="">Zuozhuan</span></i><span data-dcnode-id="4536" instrument_node=""> and </span><i data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">Guoyu</span></i><span data-dcnode-id="4533" instrument_node="">, </span><b data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">David Schaberg</span></b><span data-dcnode-id="4530" instrument_node=""> reads these two collections of historical anecdotes as traces of a historiographical practice that flourished around the fourth century BCE among the followers of Confucius.</span></p></div></td></tr><tr data-dcnode-id="4511"><td class="number" data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">206.</span></td><td class="jkt" data-dcnode-id="4521"><a data-dcnode-id="4522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674012769" title="Tears of Longing: Nostalgia and the Nation in Japanese Popular Song"><img alt="Cover: Tears of Longing: Nostalgia and the Nation in Japanese Popular Song" data-dcnode-id="4523" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674012769-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4512"><p class="title" data-dcnode-id="4518"><a data-dcnode-id="4519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674012769"><span data-dcnode-id="4520" instrument_node="">Tears of Longing: Nostalgia and the Nation in Japanese Popular Song</span></a></p><p class="author" data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">Yano, Christine R.</span></p><div class="desc" data-dcnode-id="4513"><p data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">Informed by theories of nostalgia, collective memory, cultural nationalism, and gender, this book draws on the author’s extensive fieldwork in probing the practice of identity-making and the processes at work when Japan becomes “Japan.”</span></p></div></td></tr><tr data-dcnode-id="4492"><td class="number" data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">207.</span></td><td class="jkt" data-dcnode-id="4506"><a data-dcnode-id="4507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674007864" title="The Appropriation of Cultural Capital: China's May Fourth Project"><img alt="Cover: The Appropriation of Cultural Capital: China's May Fourth Project" data-dcnode-id="4508" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674007864-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4493"><p class="title" data-dcnode-id="4503"><a data-dcnode-id="4504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674007864"><span data-dcnode-id="4505" instrument_node="">The Appropriation of Cultural Capital: China's May Fourth Project</span></a></p><p class="author" data-dcnode-id="4497"><span data-dcnode-id="4502" instrument_node="">Doleželová-Velingerová, Milena</span><br data-dcnode-id="4501"><span data-dcnode-id="4500" instrument_node="">
Král, Oldřich</span><br data-dcnode-id="4499"><span data-dcnode-id="4498" instrument_node="">
Sanders, Graham</span></p><div class="desc" data-dcnode-id="4494"><p data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">For much of the twentieth century, the May Fourth movement of 1919 was seen as the foundational moment of modernity in China. Recent examinations of literary and cultural modernity in China have, however, led to a questioning of this view. By approaching May Fourth from novel perspectives, the authors of the eight studies in this volume seek to contribute to the ongoing critique of the movement.</span></p></div></td></tr><tr data-dcnode-id="4465"><td class="number" data-dcnode-id="4490"><span data-dcnode-id="4491" instrument_node="">208.</span></td><td class="jkt" data-dcnode-id="4487"><a data-dcnode-id="4488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674008533" title="The Making of Shinkokinshū"><img alt="Cover: The Making of Shinkokinshū" data-dcnode-id="4489" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674008533-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4466"><p class="title" data-dcnode-id="4484"><a data-dcnode-id="4485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674008533"><span data-dcnode-id="4486" instrument_node="">The Making of Shinkokinshū</span></a></p><p class="author" data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">Huey, Robert N.</span></p><div class="desc" data-dcnode-id="4467"><p data-dcnode-id="4468"><span data-dcnode-id="4481" instrument_node="">In the history of traditional Japanese </span><i data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">waka</span></i><span data-dcnode-id="4478" instrument_node=""> poetry, </span><i data-dcnode-id="4476"><span data-dcnode-id="4477" instrument_node="">Shinkokinshū</span></i><span data-dcnode-id="4475" instrument_node=""> of 1205 is generally regarded as one of the three most important anthologies. The collection—the “New Kokinshu”—is in many ways a neo-classical effort. Reading history backward, scholars have often taken this to be a nostalgia for greatness presumed to have been lost in the wars of the late 1100s. In this detailed study of the origins of </span><i data-dcnode-id="4473"><span data-dcnode-id="4474" instrument_node="">Shinkokinshū</span></i><span data-dcnode-id="4472" instrument_node="">, the author argues that the compilers of </span><i data-dcnode-id="4470"><span data-dcnode-id="4471" instrument_node="">Shinkokinshū</span></i><span data-dcnode-id="4469" instrument_node=""> instead saw their collection as a “new” beginning, a revitalization and affirmation of courtly traditions, and not a reaction to loss. It is a dynamic collection, full of innovative, challenging poetry—not an elegy for a lost age.</span></p></div></td></tr><tr data-dcnode-id="4447"><td class="number" data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">210.</span></td><td class="jkt" data-dcnode-id="4460"><a data-dcnode-id="4461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674008793" title="Inklings of Democracy in China"><img alt="Cover: Inklings of Democracy in China" data-dcnode-id="4462" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674008793-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4448"><p class="title" data-dcnode-id="4457"><a data-dcnode-id="4458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674008793"><span data-dcnode-id="4459" instrument_node="">Inklings of Democracy in China</span></a></p><p class="author" data-dcnode-id="4455"><span data-dcnode-id="4456" instrument_node="">Ogden, Suzanne</span></p><div class="desc" data-dcnode-id="4449"><p data-dcnode-id="4450"><span data-dcnode-id="4454" instrument_node="">Since 1979 China’s leaders have introduced reforms that have lessened the state’s hold over the lives of ordinary citizens. By examining the growth in individual rights, the public sphere, democratic processes, and pluralization, </span><b data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node="">Ogden</span></b><span data-dcnode-id="4451" instrument_node=""> seeks to answer questions concerning the relevance of liberal democratic ideas for China and the relationship between a democratic political culture and a democratic political system.</span></p></div></td></tr><tr data-dcnode-id="4429"><td class="number" data-dcnode-id="4445"><span data-dcnode-id="4446" instrument_node="">211.</span></td><td class="jkt" data-dcnode-id="4442"><a data-dcnode-id="4443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674010888" title="The People's Emperor: Democracy and the Japanese Monarchy, 1945-1995"><img alt="Cover: The People's Emperor: Democracy and the Japanese Monarchy, 1945-1995" data-dcnode-id="4444" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674010888-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4430"><p class="title" data-dcnode-id="4439"><a data-dcnode-id="4440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674010888"><span data-dcnode-id="4441" instrument_node="">The People's Emperor: Democracy and the Japanese Monarchy, 1945-1995</span></a></p><p class="author" data-dcnode-id="4437"><span data-dcnode-id="4438" instrument_node="">Ruoff, Kenneth J.</span></p><div class="desc" data-dcnode-id="4431"><p data-dcnode-id="4432"><span data-dcnode-id="4436" instrument_node="">Few institutions are as well suited as the monarchy to provide a window on postwar Japan. The monarchy, which is also a family, has been significant both as a political and as a cultural institution. </span><b data-dcnode-id="4434"><span data-dcnode-id="4435" instrument_node="">Ruoff</span></b><span data-dcnode-id="4433" instrument_node=""> analyzes numerous issues, stressing the monarchy’s "postwarness" rather than its traditionality.</span></p></div></td></tr><tr data-dcnode-id="4414"><td class="number" data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">213.</span></td><td class="jkt" data-dcnode-id="4424"><a data-dcnode-id="4425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674008588" title="Emotions at Work: Normative Control, Organizations, and Culture in Japan and America"><img alt="Cover: Emotions at Work: Normative Control, Organizations, and Culture in Japan and America" data-dcnode-id="4426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674008588-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4415"><p class="title" data-dcnode-id="4421"><a data-dcnode-id="4422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674008588"><span data-dcnode-id="4423" instrument_node="">Emotions at Work: Normative Control, Organizations, and Culture in Japan and America</span></a></p><p class="author" data-dcnode-id="4419"><span data-dcnode-id="4420" instrument_node="">Raz, Aviad E.</span></p><div class="desc" data-dcnode-id="4416"><p data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">Rather than focusing on the psychology of personal emotions at work, this study concentrates on emotions as role requirements, on workplace emotions that combine the private with the public, the personal with the social, and the authentic with the masked. In this cross-cultural study of "emotion management," the author argues that even though the goals of normative control in factories, offices, and shops may be similar across cultures, organizational structure and the surrounding culture affect how that control is discussed and conceived.</span></p></div></td></tr><tr data-dcnode-id="4395"><td class="number" data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">216.</span></td><td class="jkt" data-dcnode-id="4409"><a data-dcnode-id="4410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674009608" title="The Golden Age of the U.S.–China–Japan Triangle,  1972–1989"><img alt="Cover: The Golden Age of the U.S.–China–Japan Triangle,  1972–1989" data-dcnode-id="4411" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674009608-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4396"><p class="title" data-dcnode-id="4406"><a data-dcnode-id="4407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674009608"><span data-dcnode-id="4408" instrument_node="">The Golden Age of the U.S.–China–Japan Triangle,  1972–1989</span></a></p><p class="author" data-dcnode-id="4400"><span data-dcnode-id="4405" instrument_node="">Vogel, Ezra F.</span><br data-dcnode-id="4404"><span data-dcnode-id="4403" instrument_node="">
Yuan, Ming</span><br data-dcnode-id="4402"><span data-dcnode-id="4401" instrument_node="">
Tanaka, Akihiko</span></p><div class="desc" data-dcnode-id="4397"><p data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">A collaborative effort by scholars from the United States, China, and Japan, this volume focuses on the period 1972–1989, during which all three countries, brought together by a shared geopolitical strategy, established mutual relations with one another despite differences in their histories, values, and perceptions of their own national interest. Although each initially conceived of its political and security relations with the others in bilateral terms, the three in fact came to form an economic and political triangle during the 1970s and 1980s. But this triangle is a strange one whose dynamics are constantly changing. Its corners (the three countries) and its sides (the three bilateral relationships) are unequal, while its overall nature (the capacity of the three to work together) has varied considerably as the economic and strategic positions of the three have changed and post–Cold War tensions and uncertainties have emerged.</span></p></div></td></tr><tr data-dcnode-id="4380"><td class="number" data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">217.</span></td><td class="jkt" data-dcnode-id="4390"><a data-dcnode-id="4391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674009615" title="On Sacred Grounds: Culture, Society, Politics, and the Formation of the Cult of Confucius"><img alt="Cover: On Sacred Grounds: Culture, Society, Politics, and the Formation of the Cult of Confucius" data-dcnode-id="4392" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674009615-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4381"><p class="title" data-dcnode-id="4387"><a data-dcnode-id="4388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674009615"><span data-dcnode-id="4389" instrument_node="">On Sacred Grounds: Culture, Society, Politics, and the Formation of the Cult of Confucius</span></a></p><p class="author" data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">Wilson, Thomas A.</span></p><div class="desc" data-dcnode-id="4382"><p data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">The authors analyze the social, cultural, and political meaning attached to the cult of Confucius; its history; the legends, images, and rituals associated with it; the power of the descendants of Confucius; the main temple in the birthplace of Confucius; and the contemporary fate of temples to Confucius.</span></p></div></td></tr><tr data-dcnode-id="4365"><td class="number" data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">218.</span></td><td class="jkt" data-dcnode-id="4375"><a data-dcnode-id="4376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674010970" title="Steps of Perfection: Exorcistic Performers and Chinese Religion in Twentieth-Century Taiwan"><img alt="Cover: Steps of Perfection: Exorcistic Performers and Chinese Religion in Twentieth-Century Taiwan" data-dcnode-id="4377" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674010970-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4366"><p class="title" data-dcnode-id="4372"><a data-dcnode-id="4373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674010970"><span data-dcnode-id="4374" instrument_node="">Steps of Perfection: Exorcistic Performers and Chinese Religion in Twentieth-Century Taiwan</span></a></p><p class="author" data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">Sutton, Donald S.</span></p><div class="desc" data-dcnode-id="4367"><p data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">Despite Taiwan’s rise as an economic force in the world, modernity has not led to a Weberian process of disenchantment or curbed religiosity. To the contrary, other factors—social, economic, political—have stimulated religion. How and why this has happened are central issues in this book.</span></p></div></td></tr><tr data-dcnode-id="4350"><td class="number" data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">219.</span></td><td class="jkt" data-dcnode-id="4360"><a data-dcnode-id="4361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674010918" title="Technology of Empire: Telecommunications and Japanese Expansion in Asia, 1883-1945"><img alt="Cover: Technology of Empire: Telecommunications and Japanese Expansion in Asia, 1883-1945" data-dcnode-id="4362" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674010918-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4351"><p class="title" data-dcnode-id="4357"><a data-dcnode-id="4358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674010918"><span data-dcnode-id="4359" instrument_node="">Technology of Empire: Telecommunications and Japanese Expansion in Asia, 1883-1945</span></a></p><p class="author" data-dcnode-id="4355"><span data-dcnode-id="4356" instrument_node="">Yang, Daqing</span></p><div class="desc" data-dcnode-id="4352"><p data-dcnode-id="4353"><span data-dcnode-id="4354" instrument_node="">In the extension of the Japanese empire in the 1930s and 1940s, technology, geo-strategy, and institutions were closely intertwined in empire building. The central argument of this study of the development of a communications network linking the far-flung parts of the Japanese imperium is that modern telecommunications not only served to connect these territories but, more important, made it possible for the Japanese to envision an integrated empire in Asia. Even as the imperial communications network served to foster integration and strengthened Japanese leadership and control, its creation and operation exacerbated long-standing tensions and created new conflicts within the government, the military, and society in general.</span></p></div></td></tr><tr data-dcnode-id="4335"><td class="number" data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">220.</span></td><td class="jkt" data-dcnode-id="4345"><a data-dcnode-id="4346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674010925" title="Fu Shan’s World: The Transformation of Chinese Calligraphy in the Seventeenth Century"><img alt="Cover: Fu Shan’s World: The Transformation of Chinese Calligraphy in the Seventeenth Century" data-dcnode-id="4347" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674010925-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4336"><p class="title" data-dcnode-id="4342"><a data-dcnode-id="4343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674010925"><span data-dcnode-id="4344" instrument_node="">Fu Shan’s World: The Transformation of Chinese Calligraphy in the Seventeenth Century</span></a></p><p class="author" data-dcnode-id="4340"><span data-dcnode-id="4341" instrument_node="">Bai, Qianshen</span></p><div class="desc" data-dcnode-id="4337"><p data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">For 1,300 years, Chinese calligraphy was based on the elegant art of Wang Xizhi (A.D. 303–361). But the emergence in the 17th century of a style modeled on the rough, broken epigraphs of ancient artifacts led to the formation of the stele school. Eminent calligrapher and art theorist Fu Shan (1607–1685) was a dominant force in this school.</span></p></div></td></tr><tr data-dcnode-id="4317"><td class="number" data-dcnode-id="4333"><span data-dcnode-id="4334" instrument_node="">222.</span></td><td class="jkt" data-dcnode-id="4330"><a data-dcnode-id="4331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674010949" title="Alien Kind: Foxes and Late Imperial Chinese Narrative"><img alt="Cover: Alien Kind: Foxes and Late Imperial Chinese Narrative" data-dcnode-id="4332" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674010949-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4318"><p class="title" data-dcnode-id="4327"><a data-dcnode-id="4328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674010949"><span data-dcnode-id="4329" instrument_node="">Alien Kind: Foxes and Late Imperial Chinese Narrative</span></a></p><p class="author" data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">Huntington, Rania</span></p><div class="desc" data-dcnode-id="4319"><p data-dcnode-id="4320"><span data-dcnode-id="4324" instrument_node="">Ming and Qing China were well populated with foxes, shape changers who transgressed the boundaries of species, gender, and the metaphysical realm. In human form, they were immoral succubi and good wives/good mothers, tricksters and Confucian paragons. </span><b data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">Huntington</span></b><span data-dcnode-id="4321" instrument_node=""> investigates the fox as alien and attempts to establish the boundaries of the human.</span></p></div></td></tr><tr data-dcnode-id="4302"><td class="number" data-dcnode-id="4315"><span data-dcnode-id="4316" instrument_node="">223.</span></td><td class="jkt" data-dcnode-id="4312"><a data-dcnode-id="4313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674019669" title="House and Home in Modern Japan: Architecture, Domestic Space, and Bourgeois Culture, 1880-1930"><img alt="Cover: House and Home in Modern Japan: Architecture, Domestic Space, and Bourgeois Culture, 1880-1930" data-dcnode-id="4314" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674019669-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4303"><p class="title" data-dcnode-id="4309"><a data-dcnode-id="4310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674019669"><span data-dcnode-id="4311" instrument_node="">House and Home in Modern Japan: Architecture, Domestic Space, and Bourgeois Culture, 1880-1930</span></a></p><p class="author" data-dcnode-id="4307"><span data-dcnode-id="4308" instrument_node="">Sand, Jordan</span></p><div class="desc" data-dcnode-id="4304"><p data-dcnode-id="4305"><span data-dcnode-id="4306" instrument_node="">A house is a site, the bounds and focus of a community. It is also an artifact, a material extension of its occupants’ lives. This book takes the Japanese house in both senses, as site and as artifact, and explores the spaces, commodities, and conceptions of community associated with it in the modern era.</span></p></div></td></tr><tr data-dcnode-id="4284"><td class="number" data-dcnode-id="4300"><span data-dcnode-id="4301" instrument_node="">224.</span></td><td class="jkt" data-dcnode-id="4297"><a data-dcnode-id="4298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674012141" title="China Made: Consumer Culture and the Creation of the Nation"><img alt="Cover: China Made: Consumer Culture and the Creation of the Nation" data-dcnode-id="4299" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674012141-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4285"><p class="title" data-dcnode-id="4294"><a data-dcnode-id="4295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674012141"><span data-dcnode-id="4296" instrument_node="">China Made: Consumer Culture and the Creation of the Nation</span></a></p><p class="author" data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">Gerth, Karl</span></p><div class="desc" data-dcnode-id="4286"><p data-dcnode-id="4287"><span data-dcnode-id="4291" instrument_node="">In the early 20th century, China began to import and then to manufacture thousands of consumer goods. Politicians feared trade deficits. Intellectuals feared loss of national sovereignty. And manufacturers wondered how they could survive a flood of cheap imports. </span><b data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">Gerth</span></b><span data-dcnode-id="4288" instrument_node=""> argues that the responses of these groups helped foster modern nationalism.</span></p></div></td></tr><tr data-dcnode-id="4269"><td class="number" data-dcnode-id="4282"><span data-dcnode-id="4283" instrument_node="">225.</span></td><td class="jkt" data-dcnode-id="4279"><a data-dcnode-id="4280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674012196" title="Metamorphosis of the Private Sphere: Gardens and Objects in Tang–Song Poetry"><img alt="Cover: Metamorphosis of the Private Sphere: Gardens and Objects in Tang–Song Poetry" data-dcnode-id="4281" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674012196-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4270"><p class="title" data-dcnode-id="4276"><a data-dcnode-id="4277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674012196"><span data-dcnode-id="4278" instrument_node="">Metamorphosis of the Private Sphere: Gardens and Objects in Tang–Song Poetry</span></a></p><p class="author" data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">Yang, Xiaoshan</span></p><div class="desc" data-dcnode-id="4271"><p data-dcnode-id="4272"><span data-dcnode-id="4273" instrument_node="">This book deals with the poetic configurations of the private garden in cities from the ninth to the eleventh century in relation to the development of the private sphere in Chinese literati culture.</span></p></div></td></tr><tr data-dcnode-id="4254"><td class="number" data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">227.</span></td><td class="jkt" data-dcnode-id="4264"><a data-dcnode-id="4265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674012158" title="The Troublesome Legacy of Commissioner Lin: The Opium Trade and Opium Suppression in Fujian Province, 1820s to 1920s"><img alt="Cover: The Troublesome Legacy of Commissioner Lin: The Opium Trade and Opium Suppression in Fujian Province, 1820s to 1920s" data-dcnode-id="4266" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674012158-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4255"><p class="title" data-dcnode-id="4261"><a data-dcnode-id="4262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674012158"><span data-dcnode-id="4263" instrument_node="">The Troublesome Legacy of Commissioner Lin: The Opium Trade and Opium Suppression in Fujian Province, 1820s to 1920s</span></a></p><p class="author" data-dcnode-id="4259"><span data-dcnode-id="4260" instrument_node="">Madancy, Joyce A.</span></p><div class="desc" data-dcnode-id="4256"><p data-dcnode-id="4257"><span data-dcnode-id="4258" instrument_node="">In 1908, a very public crusade against opium was in full swing throughout China, and the provincial capital and treaty port of Fuzhou was a central stage for the campaign. This, the most successful attempt undertaken by the Chinese state before 1949 to eliminate opium, came at a time when, according to many historians, China’s central state was virtually powerless. This volume attempts to reconcile that apparent contradiction.</span></p></div></td></tr><tr data-dcnode-id="4222"><td class="number" data-dcnode-id="4252"><span data-dcnode-id="4253" instrument_node="">228.</span></td><td class="jkt" data-dcnode-id="4249"><a data-dcnode-id="4250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674012165" title="Transmitters and Creators: Chinese Commentators and Commentaries on the <i>Analects</i>"><img alt="Cover: Transmitters and Creators: Chinese Commentators and Commentaries on the <i>Analects</i>" data-dcnode-id="4251" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674012165-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4223"><p class="title" data-dcnode-id="4244"><a data-dcnode-id="4245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674012165"><span data-dcnode-id="4248" instrument_node="">Transmitters and Creators: Chinese Commentators and Commentaries on the </span><i data-dcnode-id="4246"><span data-dcnode-id="4247" instrument_node="">Analects</span></i></a></p><p class="author" data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">Makeham, John</span></p><div class="desc" data-dcnode-id="4224"><p data-dcnode-id="4225"><span data-dcnode-id="4241" instrument_node="">The </span><i data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">Analects</span></i><span data-dcnode-id="4238" instrument_node=""> (</span><i data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">Lunyu</span></i><span data-dcnode-id="4235" instrument_node="">) is one of the most influential texts in human history. As a foundational text in scriptural Confucianism, it was instrumental in shaping intellectual traditions in China and East Asia. But no premodern reader read only the text of the </span><i data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">Analects</span></i><span data-dcnode-id="4232" instrument_node=""> itself. Rather, the </span><i data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">Analects</span></i><span data-dcnode-id="4229" instrument_node=""> was embedded in a web of interpretation that mediated its meaning. Modern interpreters of the </span><i data-dcnode-id="4227"><span data-dcnode-id="4228" instrument_node="">Analects</span></i><span data-dcnode-id="4226" instrument_node=""> only rarely acknowledge this legacy of two thousand years of commentaries. This book attempts to redress our neglect of commentaries by analyzing four key works dating from the late second century to the mid-nineteenth century.</span></p></div></td></tr><tr data-dcnode-id="4207"><td class="number" data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">229.</span></td><td class="jkt" data-dcnode-id="4217"><a data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674013940" title="From Cotton Mill to Business Empire: The Emergence of Regional Enterprises in Modern China"><img alt="Cover: From Cotton Mill to Business Empire: The Emergence of Regional Enterprises in Modern China" data-dcnode-id="4219" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674013940-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4208"><p class="title" data-dcnode-id="4214"><a data-dcnode-id="4215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674013940"><span data-dcnode-id="4216" instrument_node="">From Cotton Mill to Business Empire: The Emergence of Regional Enterprises in Modern China</span></a></p><p class="author" data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">Köll, Elisabeth</span></p><div class="desc" data-dcnode-id="4209"><p data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">The concepts, definitions, and interpretations of property rights, corporate structures, and business practices in contemporary China have historical, institutional, and cultural roots. In tracing the development under founder Zhang Jian (1853–1926) and his successors of the Dasheng Cotton Mill in Nantong, the author documents the growth of regional enterprises as local business empires from the 1890s until the foundation of the People’s Republic in 1949.</span></p></div></td></tr><tr data-dcnode-id="4192"><td class="number" data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">230.</span></td><td class="jkt" data-dcnode-id="4202"><a data-dcnode-id="4203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021198" title="Taiwan’s Imagined Geography: Chinese Colonial Travel Writing and Pictures, 1683–1895"><img alt="Cover: Taiwan’s Imagined Geography: Chinese Colonial Travel Writing and Pictures, 1683–1895" data-dcnode-id="4204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674021198-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4193"><p class="title" data-dcnode-id="4199"><a data-dcnode-id="4200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021198"><span data-dcnode-id="4201" instrument_node="">Taiwan’s Imagined Geography: Chinese Colonial Travel Writing and Pictures, 1683–1895</span></a></p><p class="author" data-dcnode-id="4197"><span data-dcnode-id="4198" instrument_node="">Teng, Emma Jinhua</span></p><div class="desc" data-dcnode-id="4194"><p data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">Until 300 years ago, the Chinese considered Taiwan a “land beyond the seas,” a “ball of mud” inhabited by “naked and tattooed savages.” The incorporation of this island into the Qing empire in the seventeenth century and its evolution into a province by the late nineteenth century involved not only a reconsideration of imperial geography but also a reconceptualization of the Chinese domain. By viewing Taiwan–China relations as a product of the history of Qing expansionism, the author contributes to our understanding of current political events in the region.</span></p></div></td></tr><tr data-dcnode-id="4175"><td class="number" data-dcnode-id="4190"><span data-dcnode-id="4191" instrument_node="">231.</span></td><td class="jkt" data-dcnode-id="4187"><a data-dcnode-id="4188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674013933" title="The Red Brush: Writing Women of Imperial China"><img alt="Cover: The Red Brush: Writing Women of Imperial China" data-dcnode-id="4189" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674013933-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4176"><p class="title" data-dcnode-id="4184"><a data-dcnode-id="4185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674013933"><span data-dcnode-id="4186" instrument_node="">The Red Brush: Writing Women of Imperial China</span></a></p><p class="author" data-dcnode-id="4180"><span data-dcnode-id="4183" instrument_node="">Idema, Wilt L.</span><br data-dcnode-id="4182"><span data-dcnode-id="4181" instrument_node="">
Grant, Beata</span></p><div class="desc" data-dcnode-id="4177"><p data-dcnode-id="4178"><span data-dcnode-id="4179" instrument_node="">One of the most exciting recent developments in the study of Chinese literature has been the rediscovery of an extremely rich and diverse tradition of women’s writing of the imperial period. This anthology differs from previous works by offering a glimpse of women’s writings not only in poetry but in other genres as well, including essays and letters, drama, religious writing, and narrative fiction.</span></p></div></td></tr><tr data-dcnode-id="4160"><td class="number" data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">232.</span></td><td class="jkt" data-dcnode-id="4170"><a data-dcnode-id="4171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021204" title="The Ethos of Noh: Actors and Their Art"><img alt="Cover: The Ethos of Noh: Actors and Their Art" data-dcnode-id="4172" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674021204-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4161"><p class="title" data-dcnode-id="4167"><a data-dcnode-id="4168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674021204"><span data-dcnode-id="4169" instrument_node="">The Ethos of Noh: Actors and Their Art</span></a></p><p class="author" data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">Rath, Eric C.</span></p><div class="desc" data-dcnode-id="4162"><p data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">This book explores how memories of the past become traditions, and the role of these traditions in the institutional development of the noh theater from its beginnings in the fourteenth century through the late twentieth century. It focuses on the development of the key traditions that constitute the "ethos of noh," the ideology that empowered certain groups of actors at the expense of others, and how this ethos fostered noh’s professionalization. The author argues that the traditions that form the ethos of noh, such as those surrounding masks and manuscripts, are the key traits that define it as an art.</span></p></div></td></tr><tr data-dcnode-id="4145"><td class="number" data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">233.</span></td><td class="jkt" data-dcnode-id="4155"><a data-dcnode-id="4156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674013988" title="Building Local States: China during the Republican and Post-Mao Eras"><img alt="Cover: Building Local States: China during the Republican and Post-Mao Eras" data-dcnode-id="4157" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674013988-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4146"><p class="title" data-dcnode-id="4152"><a data-dcnode-id="4153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674013988"><span data-dcnode-id="4154" instrument_node="">Building Local States: China during the Republican and Post-Mao Eras</span></a></p><p class="author" data-dcnode-id="4150"><span data-dcnode-id="4151" instrument_node="">Remick, Elizabeth J.</span></p><div class="desc" data-dcnode-id="4147"><p data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">This book examines the Nanjing decade of Guomindang rule (1927–1937) and the early post-Mao reform era (1980–1992) of Chinese history that have commonly been viewed as periods of state disintegration or retreat. And they were—at the central level. When reexamined at the local level, however, both are revealed as periods of state building.</span></p></div></td></tr><tr data-dcnode-id="4130"><td class="number" data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">237.</span></td><td class="jkt" data-dcnode-id="4140"><a data-dcnode-id="4141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674013964" title="Burning and Building: Schooling and State Formation in Japan, 1750-1890"><img alt="Cover: Burning and Building: Schooling and State Formation in Japan, 1750-1890" data-dcnode-id="4142" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674013964-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4131"><p class="title" data-dcnode-id="4137"><a data-dcnode-id="4138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674013964"><span data-dcnode-id="4139" instrument_node="">Burning and Building: Schooling and State Formation in Japan, 1750-1890</span></a></p><p class="author" data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">Platt, Brian</span></p><div class="desc" data-dcnode-id="4132"><p data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">Among the earliest and most radical of the Meiji reforms was a plan for a centralized, compulsory educational system modeled after those in Europe and America. But commoners throughout Japan had established 50,000 schools with almost no guidance or support from the government. Consequently, the plan met with resistance, as local officials, teachers, and citizens pursued alternative educational visions. Their efforts ultimately led to the growth and consolidation of a new educational system, one with the imprint of local demands and expectations.</span></p></div></td></tr><tr data-dcnode-id="4111"><td class="number" data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">238.</span></td><td class="jkt" data-dcnode-id="4125"><a data-dcnode-id="4126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674016514" title="Public Spheres, Private Lives in Modern Japan, 1600-1950: Essays in Honor of Albert Craig"><img alt="Cover: Public Spheres, Private Lives in Modern Japan, 1600-1950: Essays in Honor of Albert Craig" data-dcnode-id="4127" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674016514-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4112"><p class="title" data-dcnode-id="4122"><a data-dcnode-id="4123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674016514"><span data-dcnode-id="4124" instrument_node="">Public Spheres, Private Lives in Modern Japan, 1600-1950: Essays in Honor of Albert Craig</span></a></p><p class="author" data-dcnode-id="4116"><span data-dcnode-id="4121" instrument_node="">Bernstein, Gail Lee</span><br data-dcnode-id="4120"><span data-dcnode-id="4119" instrument_node="">
Gordon, Andrew</span><br data-dcnode-id="4118"><span data-dcnode-id="4117" instrument_node="">
Nakai, Kate Wildman</span></p><div class="desc" data-dcnode-id="4113"><p data-dcnode-id="4114"><span data-dcnode-id="4115" instrument_node="">The eleven chapters in this volume explore the process of carving out, in discourse and in practice, the boundaries delineating the state, the civil sphere, and the family in Japan from 1600 to 1950. One of the central themes in the volume is the demarcation of relations between the central political authorities and local communities.</span></p></div></td></tr><tr data-dcnode-id="4093"><td class="number" data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">240.</span></td><td class="jkt" data-dcnode-id="4106"><a data-dcnode-id="4107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674016521" title="Writing Home: Representations of the Native Place in Modern Japanese Literature"><img alt="Cover: Writing Home: Representations of the Native Place in Modern Japanese Literature" data-dcnode-id="4108" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674016521-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4094"><p class="title" data-dcnode-id="4103"><a data-dcnode-id="4104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674016521"><span data-dcnode-id="4105" instrument_node="">Writing Home: Representations of the Native Place in Modern Japanese Literature</span></a></p><p class="author" data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">Dodd, Stephen</span></p><div class="desc" data-dcnode-id="4095"><p data-dcnode-id="4096"><span data-dcnode-id="4100" instrument_node="">Examining the development of literature depicting the native place (</span><i data-dcnode-id="4098"><span data-dcnode-id="4099" instrument_node="">furusato</span></i><span data-dcnode-id="4097" instrument_node="">) from the mid-Meiji period through the late 1930s as a way of articulating the uprootedness and sense of loss many experienced as Japan modernized, this book focuses on four authors typing this trend: Kunikida Doppo, Shimazaki Tōson, Satō Haruo, and Shiga Naoya.</span></p></div></td></tr><tr data-dcnode-id="4078"><td class="number" data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">241.</span></td><td class="jkt" data-dcnode-id="4088"><a data-dcnode-id="4089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674016491" title="Opium and the Limits of Empire: Drug Prohibition in the Chinese Interior, 1729–1850"><img alt="Cover: Opium and the Limits of Empire: Drug Prohibition in the Chinese Interior, 1729–1850" data-dcnode-id="4090" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674016491-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4079"><p class="title" data-dcnode-id="4085"><a data-dcnode-id="4086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674016491"><span data-dcnode-id="4087" instrument_node="">Opium and the Limits of Empire: Drug Prohibition in the Chinese Interior, 1729–1850</span></a></p><p class="author" data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">Bello, David Anthony</span></p><div class="desc" data-dcnode-id="4080"><p data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">This book examines the Chinese opium crisis from the perspective of Qing prohibition efforts. The author argues that opium prohibition, and not the opium wars, was genuinely imperial in scale and is hence much more representative of the actual drug problem faced by Qing administrators. The study of prohibition also permits a more comprehensive and accurate observation of the economics and criminology of opium.</span></p></div></td></tr><tr data-dcnode-id="4063"><td class="number" data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">242.</span></td><td class="jkt" data-dcnode-id="4073"><a data-dcnode-id="4074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674016552" title="Discourses of Seduction: History, Evil, Desire, and Modern Japanese Literature"><img alt="Cover: Discourses of Seduction: History, Evil, Desire, and Modern Japanese Literature" data-dcnode-id="4075" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674016552-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4064"><p class="title" data-dcnode-id="4070"><a data-dcnode-id="4071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674016552"><span data-dcnode-id="4072" instrument_node="">Discourses of Seduction: History, Evil, Desire, and Modern Japanese Literature</span></a></p><p class="author" data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">Hirata, Hosea</span></p><div class="desc" data-dcnode-id="4065"><p data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">Why does literature’s voice still seduce us into reading? What is the relationship between ethics and history in the study of literature? These essays on Kawabata Yasunari, Murakami Haruki, Karatani Kjin, Furui Yoshikichi, Mishima Yukio, Oe Kenzaburo, Natsume Soseki, and Kobayashi Hideo, visit the force of the scandalous to confront such questions.</span></p></div></td></tr><tr data-dcnode-id="4048"><td class="number" data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">244.</span></td><td class="jkt" data-dcnode-id="4058"><a data-dcnode-id="4059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674016538" title="Identity Reflections: Pilgrimages to Mount Tai in Late Imperial China"><img alt="Cover: Identity Reflections: Pilgrimages to Mount Tai in Late Imperial China" data-dcnode-id="4060" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674016538-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4049"><p class="title" data-dcnode-id="4055"><a data-dcnode-id="4056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674016538"><span data-dcnode-id="4057" instrument_node="">Identity Reflections: Pilgrimages to Mount Tai in Late Imperial China</span></a></p><p class="author" data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">Dott, Brian R.</span></p><div class="desc" data-dcnode-id="4050"><p data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">Mount Tai in northeastern China has long been a sacred site. Throughout history, it has been a magnet for both women and men from all classes—emperors, aristocrats, officials, literati, and villagers. This book examines the behavior of those who made the pilgrimage to Mount Tai and their interpretations of its sacrality and history, as a means of better understanding their identities and mentalities.</span></p></div></td></tr><tr data-dcnode-id="4031"><td class="number" data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">245.</span></td><td class="jkt" data-dcnode-id="4043"><a data-dcnode-id="4044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017788" title="Proving the Way: Conflict and Practice in the History of Japanese Nativism"><img alt="Cover: Proving the Way: Conflict and Practice in the History of Japanese Nativism" data-dcnode-id="4045" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674017788-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4032"><p class="title" data-dcnode-id="4040"><a data-dcnode-id="4041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017788"><span data-dcnode-id="4042" instrument_node="">Proving the Way: Conflict and Practice in the History of Japanese Nativism</span></a></p><p class="author" data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">McNally, Mark</span></p><div class="desc" data-dcnode-id="4033"><p data-dcnode-id="4034"><i data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">Kokugaku</span></i><span data-dcnode-id="4035" instrument_node="">, or nativism, was one of the most important intellectual movements from the seventeenth through the nineteenth century in Japan, and its worldview continues to be influential today. The primary goal of this book is to restore historicity to the study of nativism by recognizing Atsutane’s role in the creation and perpetuation of an intellectual tradition that remains a significant part of Japanese history and culture.</span></p></div></td></tr><tr data-dcnode-id="4016"><td class="number" data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">246.</span></td><td class="jkt" data-dcnode-id="4026"><a data-dcnode-id="4027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017795" title="A Political Explanation of Economic Growth: State Survival, Bureaucratic Politics, and Private Enterprises in the Making of Taiwan’s Economy, 1950–1985"><img alt="Cover: A Political Explanation of Economic Growth: State Survival, Bureaucratic Politics, and Private Enterprises in the Making of Taiwan’s Economy, 1950–1985" data-dcnode-id="4028" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674017795-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4017"><p class="title" data-dcnode-id="4023"><a data-dcnode-id="4024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017795"><span data-dcnode-id="4025" instrument_node="">A Political Explanation of Economic Growth: State Survival, Bureaucratic Politics, and Private Enterprises in the Making of Taiwan’s Economy, 1950–1985</span></a></p><p class="author" data-dcnode-id="4021"><span data-dcnode-id="4022" instrument_node="">Wu, Yongping</span></p><div class="desc" data-dcnode-id="4018"><p data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">Before the late 1980s Taiwan’s successful exporters were overwhelmingly small- and medium-sized enterprises (SMEs). What accounts for their success and their benign neglect by the state? The author argues that it was an unintended consequence of the state’s policy toward the private sector and its political strategies for managing societal forces.</span></p></div></td></tr><tr data-dcnode-id="3998"><td class="number" data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">247.</span></td><td class="jkt" data-dcnode-id="4011"><a data-dcnode-id="4012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017764" title="The Age of Visions and Arguments: Parliamentarianism and the National Public Sphere in Early Meiji Japan"><img alt="Cover: The Age of Visions and Arguments: Parliamentarianism and the National Public Sphere in Early Meiji Japan" data-dcnode-id="4013" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674017764-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3999"><p class="title" data-dcnode-id="4008"><a data-dcnode-id="4009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017764"><span data-dcnode-id="4010" instrument_node="">The Age of Visions and Arguments: Parliamentarianism and the National Public Sphere in Early Meiji Japan</span></a></p><p class="author" data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">Kim, Kyu Hyun</span></p><div class="desc" data-dcnode-id="4000"><p data-dcnode-id="4001"><span data-dcnode-id="4005" instrument_node="">The Meiji Restoration of 1868 inaugurated a period of great change in Japan; it is seldom associated, however, with advances in civil and political rights. By studying parliamentarianism—the theories, arguments, and polemics marshaled in support of a representative system of government—</span><b data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">Kim</span></b><span data-dcnode-id="4002" instrument_node=""> uncovers a much more complicated picture of this era.</span></p></div></td></tr><tr data-dcnode-id="3983"><td class="number" data-dcnode-id="3996"><span data-dcnode-id="3997" instrument_node="">248.</span></td><td class="jkt" data-dcnode-id="3993"><a data-dcnode-id="3994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017740" title="The Dao of Muhammad: A Cultural History of Muslims in Late Imperial China"><img alt="Cover: The Dao of Muhammad: A Cultural History of Muslims in Late Imperial China" data-dcnode-id="3995" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674017740-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3984"><p class="title" data-dcnode-id="3990"><a data-dcnode-id="3991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017740"><span data-dcnode-id="3992" instrument_node="">The Dao of Muhammad: A Cultural History of Muslims in Late Imperial China</span></a></p><p class="author" data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">Ben-Dor Benite, Zvi</span></p><div class="desc" data-dcnode-id="3985"><p data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">This book documents an Islamic–Confucian school of scholarship that flourished—mostly in the Yangzi Delta—in the 17th and 18th centuries. Drawing on previously unstudied sources, it reconstructs the network of Muslim scholars responsible for the creation and circulation of a large corpus of Chinese Islamic written material—the so-called Han Kitab.</span></p></div></td></tr><tr data-dcnode-id="3966"><td class="number" data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">249.</span></td><td class="jkt" data-dcnode-id="3978"><a data-dcnode-id="3979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017818" title="Dynastic Crisis and Cultural Innovation: From the Late Ming to the Late Qing and Beyond"><img alt="Cover: Dynastic Crisis and Cultural Innovation: From the Late Ming to the Late Qing and Beyond" data-dcnode-id="3980" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674017818-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3967"><p class="title" data-dcnode-id="3975"><a data-dcnode-id="3976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017818"><span data-dcnode-id="3977" instrument_node="">Dynastic Crisis and Cultural Innovation: From the Late Ming to the Late Qing and Beyond</span></a></p><p class="author" data-dcnode-id="3971"><span data-dcnode-id="3974" instrument_node="">Wang, David Der-wei</span><br data-dcnode-id="3973"><span data-dcnode-id="3972" instrument_node="">
Shang, Wei</span></p><div class="desc" data-dcnode-id="3968"><p data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">Focusing on the twin themes of crisis and innovation, the seventeen chapters in this book aim to illuminate the late Ming and late Qing as eras of literary-cultural innovation during periods of imperial disintegration; to analyze linkages between the two periods and the radical heritage they bequeathed to the modern imagination; and to rethink the “premodernity” of the late Ming and late Qing in the context of the end of the age of modernism.</span></p></div></td></tr><tr data-dcnode-id="3947"><td class="number" data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">250.</span></td><td class="jkt" data-dcnode-id="3961"><a data-dcnode-id="3962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017757" title="Trauma and Transcendence in Early Qing Literature"><img alt="Cover: Trauma and Transcendence in Early Qing Literature" data-dcnode-id="3963" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674017757-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3948"><p class="title" data-dcnode-id="3958"><a data-dcnode-id="3959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017757"><span data-dcnode-id="3960" instrument_node="">Trauma and Transcendence in Early Qing Literature</span></a></p><p class="author" data-dcnode-id="3952"><span data-dcnode-id="3957" instrument_node="">Idema, Wilt L.</span><br data-dcnode-id="3956"><span data-dcnode-id="3955" instrument_node="">
Li, Wai-yee</span><br data-dcnode-id="3954"><span data-dcnode-id="3953" instrument_node="">
Widmer, Ellen</span></p><div class="desc" data-dcnode-id="3949"><p data-dcnode-id="3950"><span data-dcnode-id="3951" instrument_node="">The collapse of the Ming dynasty and the Manchu conquest of China were traumatic experiences for Chinese intellectuals. The 12 chapters in this volume and the introductory essays on early Qing poetry, prose, and drama understand the writings of this era wholly or in part as attempts to recover from or transcend the trauma of the transition years.</span></p></div></td></tr><tr data-dcnode-id="3930"><td class="number" data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">251.</span></td><td class="jkt" data-dcnode-id="3942"><a data-dcnode-id="3943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017801" title="Gendering Modern Japanese History"><img alt="Cover: Gendering Modern Japanese History" data-dcnode-id="3944" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674017801-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3931"><p class="title" data-dcnode-id="3939"><a data-dcnode-id="3940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017801"><span data-dcnode-id="3941" instrument_node="">Gendering Modern Japanese History</span></a></p><p class="author" data-dcnode-id="3935"><span data-dcnode-id="3938" instrument_node="">Molony, Barbara</span><br data-dcnode-id="3937"><span data-dcnode-id="3936" instrument_node="">
Uno, Kathleen</span></p><div class="desc" data-dcnode-id="3932"><p data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">The sixteen chapters in this volume treat men as well as women, theories of sexuality as well as gender prescriptions, and same-sex as well as heterosexual relations in the period from 1868 to the present.  Together, these essays construct a history informed by the idea that gender matters because it was part of the experience of people and because it often has been a central feature in the construction of modern ideologies, discourses, and institutions. Separately, each chapter examines how Japanese have (en)gendered their ideas, institutions, and society.</span></p></div></td></tr><tr data-dcnode-id="3915"><td class="number" data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">252.</span></td><td class="jkt" data-dcnode-id="3925"><a data-dcnode-id="3926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017733" title="Islands of Eight Million Smiles: Idol Performance and Symbolic Production in Contemporary Japan"><img alt="Cover: Islands of Eight Million Smiles: Idol Performance and Symbolic Production in Contemporary Japan" data-dcnode-id="3927" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674017733-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3916"><p class="title" data-dcnode-id="3922"><a data-dcnode-id="3923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017733"><span data-dcnode-id="3924" instrument_node="">Islands of Eight Million Smiles: Idol Performance and Symbolic Production in Contemporary Japan</span></a></p><p class="author" data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">Aoyagi, Hiroshi</span></p><div class="desc" data-dcnode-id="3917"><p data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">Since the late 1960s a ubiquitous feature of popular culture in Japan has been the “idol,” an attractive young actor packaged and promoted as an adolescent role model and exploited for marketing. This book offers ethnographic case studies on the symbolic qualities of idols and how they relate to the conceptualization of self among adolescents.</span></p></div></td></tr><tr data-dcnode-id="3897"><td class="number" data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">253.</span></td><td class="jkt" data-dcnode-id="3910"><a data-dcnode-id="3911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017771" title="The Readability of the Past in Early Chinese Historiography"><img alt="Cover: The Readability of the Past in Early Chinese Historiography" data-dcnode-id="3912" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674017771-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3898"><p class="title" data-dcnode-id="3907"><a data-dcnode-id="3908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017771"><span data-dcnode-id="3909" instrument_node="">The Readability of the Past in Early Chinese Historiography</span></a></p><p class="author" data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">Li, Wai-yee</span></p><div class="desc" data-dcnode-id="3899"><p data-dcnode-id="3900"><span data-dcnode-id="3904" instrument_node="">The past becomes readable when we can tell stories and make arguments about it. When we can tell more than one story or make divergent arguments, the readability of the past then becomes an issue. Therein lies the beginning of history, the sense of inquiry that heightens our awareness of interpretation. What are the possibilities and limits of historical knowledge? This book explores these issues through a study of the </span><i data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">Zuozhuan</span></i><span data-dcnode-id="3901" instrument_node="">, a foundational text in the Chinese tradition, whose rhetorical and analytical self-consciousness reveals much about the contending ways of thought unfolding during the period of the text’s formation.</span></p></div></td></tr><tr data-dcnode-id="3878"><td class="number" data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">254.</span></td><td class="jkt" data-dcnode-id="3892"><a data-dcnode-id="3893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674019041" title="Normalization of U.S.–China Relations: An International History"><img alt="Cover: Normalization of U.S.–China Relations: An International History" data-dcnode-id="3894" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674019041-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="3879"><p class="title" data-dcnode-id="3889"><a data-dcnode-id="3890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674019041"><span data-dcnode-id="3891" instrument_node="">Normalization of U.S.–China Relations: An International History</span></a></p><p class="author" data-dcnode-id="3883"><span data-dcnode-id="3888" instrument_node="">Kirby, William C.</span><br data-dcnode-id="3887"><span data-dcnode-id="3886" instrument_node="">
Ross, Robert S.</span><br data-dcnode-id="3885"><span data-dcnode-id="3884" instrument_node="">
