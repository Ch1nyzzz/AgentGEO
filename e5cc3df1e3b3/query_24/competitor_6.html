Shin, Kwanho</span></p><div class="desc" data-dcnode-id="2303"><p data-dcnode-id="2304"><span data-dcnode-id="2308" instrument_node="">South Korea was one of the poorest economies on the planet after the Korean War; by the twenty-first century, it had become a middle-income country, home to some of the world’s leading industrial corporations. </span><i data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">From Miracle to Maturity</span></i><span data-dcnode-id="2305" instrument_node=""> offers an analysis of Korea’s remarkable economic growth and considers whether its economy is now underperforming.</span></p></div></td></tr><tr data-dcnode-id="2283"><td class="number" data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">351.</span></td><td class="jkt" data-dcnode-id="2296"><a data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674066946" title="Buddhism, Unitarianism, and the Meiji Competition for Universality"><img alt="Cover: Buddhism, Unitarianism, and the Meiji Competition for Universality" data-dcnode-id="2298" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674066946-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2284"><p class="title" data-dcnode-id="2293"><a data-dcnode-id="2294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674066946"><span data-dcnode-id="2295" instrument_node="">Buddhism, Unitarianism, and the Meiji Competition for Universality</span></a></p><p class="author" data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">Mohr, Michel</span></p><div class="desc" data-dcnode-id="2285"><p data-dcnode-id="2286"><span data-dcnode-id="2290" instrument_node="">In the late 1800s, Japanese leaders invited Unitarian missionaries to Japan to further modernization. </span><b data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Mohr</span></b><span data-dcnode-id="2287" instrument_node=""> looks at the debates sparked by the encounter between Unitarianism and Buddhism and considers how the idea of “universal truth” was used by both missionaries and by Japanese intellectuals and religious leaders to promote their own agendas.</span></p></div></td></tr><tr data-dcnode-id="2266"><td class="number" data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">352.</span></td><td class="jkt" data-dcnode-id="2278"><a data-dcnode-id="2279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674067127" title="Two-Timing Modernity: Homosocial Narrative in Modern Japanese Fiction"><img alt="Cover: Two-Timing Modernity: Homosocial Narrative in Modern Japanese Fiction" data-dcnode-id="2280" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674067127-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2267"><p class="title" data-dcnode-id="2275"><a data-dcnode-id="2276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674067127"><span data-dcnode-id="2277" instrument_node="">Two-Timing Modernity: Homosocial Narrative in Modern Japanese Fiction</span></a></p><p class="author" data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Vincent, J. Keith</span></p><div class="desc" data-dcnode-id="2268"><p data-dcnode-id="2269"><i data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Two-Timing Modernity</span></i><span data-dcnode-id="2270" instrument_node=""> integrates queer, feminist, and narratological approaches to show how key works by Japanese male authors in the early twentieth century encompassed both a straight future and a queer past by staging tensions between Japan’s newly heteronormative culture and the recent memory of a male homosocial past now read as perverse.</span></p></div></td></tr><tr data-dcnode-id="2247"><td class="number" data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">354.</span></td><td class="jkt" data-dcnode-id="2261"><a data-dcnode-id="2262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674073197" title="Income Inequality in Korea: An Analysis of Trends, Causes, and Answers"><img alt="Cover: Income Inequality in Korea: An Analysis of Trends, Causes, and Answers" data-dcnode-id="2263" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674073197-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2248"><p class="title" data-dcnode-id="2258"><a data-dcnode-id="2259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674073197"><span data-dcnode-id="2260" instrument_node="">Income Inequality in Korea: An Analysis of Trends, Causes, and Answers</span></a></p><p class="author" data-dcnode-id="2254"><span data-dcnode-id="2257" instrument_node="">An, Chong-Bum</span><br data-dcnode-id="2256"><span data-dcnode-id="2255" instrument_node="">
Bosworth, Barry</span></p><div class="desc" data-dcnode-id="2249"><p data-dcnode-id="2250"><i data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Income Inequality in Korea</span></i><span data-dcnode-id="2251" instrument_node=""> explores the relationship between economic growth and social developments over the last three decades. Analyzing equalizing trends in the 1980s to early 1990s and reversals since the 1997–1998 financial crisis, the authors examine the growing gap between rich and poor in Korea and offer solutions for reducing inequality.</span></p></div></td></tr><tr data-dcnode-id="2224"><td class="number" data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">355.</span></td><td class="jkt" data-dcnode-id="2242"><a data-dcnode-id="2243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674073357" title="Knowing the Amorous Man: A History of Scholarship on <i>Tales of Ise</i>"><img alt="Cover: Knowing the Amorous Man: A History of Scholarship on <i>Tales of Ise</i>" data-dcnode-id="2244" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674073357-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2225"><p class="title" data-dcnode-id="2237"><a data-dcnode-id="2238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674073357"><span data-dcnode-id="2241" instrument_node="">Knowing the Amorous Man: A History of Scholarship on </span><i data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Tales of Ise</span></i></a></p><p class="author" data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">Newhard, Jamie L.</span></p><div class="desc" data-dcnode-id="2226"><p data-dcnode-id="2227"><span data-dcnode-id="2234" instrument_node="">One of the central literary texts of the Heian period (794–1185), </span><i data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">Tales of Ise</span></i><span data-dcnode-id="2231" instrument_node=""> has inspired extensive commentary. Offering a comprehensive history of the work’s reception, </span><b data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">Jamie L. Newhard</span></b><span data-dcnode-id="2228" instrument_node=""> reveals the ideological and aesthetic issues shaping criticism over the centuries as the audience for classical Japanese literature expanded beyond the aristocracy.</span></p></div></td></tr><tr data-dcnode-id="2207"><td class="number" data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">356.</span></td><td class="jkt" data-dcnode-id="2219"><a data-dcnode-id="2220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674073319" title="Anarchist Modernity: Cooperatism and Japanese-Russian Intellectual Relations in Modern Japan"><img alt="Cover: Anarchist Modernity: Cooperatism and Japanese-Russian Intellectual Relations in Modern Japan" data-dcnode-id="2221" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674073319-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2208"><p class="title" data-dcnode-id="2216"><a data-dcnode-id="2217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674073319"><span data-dcnode-id="2218" instrument_node="">Anarchist Modernity: Cooperatism and Japanese-Russian Intellectual Relations in Modern Japan</span></a></p><p class="author" data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Konishi, Sho</span></p><div class="desc" data-dcnode-id="2209"><p data-dcnode-id="2210"><b data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Sho Konishi</span></b><span data-dcnode-id="2211" instrument_node=""> traces the emergence from 1860 to 1930 of transnational networks of Russian and Japanese “cooperatist anarchists” devoted to creating a state-free society. Arguing that this radical movement forms one of the intellectual foundations of modern Japan, Konishi offers a new approach to Japanese history that challenges Western narratives.</span></p></div></td></tr><tr data-dcnode-id="2190"><td class="number" data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">357.</span></td><td class="jkt" data-dcnode-id="2202"><a data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674073265" title="The Real Modern: Literary Modernism and the Crisis of Representation in Colonial Korea"><img alt="Cover: The Real Modern: Literary Modernism and the Crisis of Representation in Colonial Korea" data-dcnode-id="2204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674073265-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2191"><p class="title" data-dcnode-id="2199"><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674073265"><span data-dcnode-id="2201" instrument_node="">The Real Modern: Literary Modernism and the Crisis of Representation in Colonial Korea</span></a></p><p class="author" data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Hanscom, Christopher P.</span></p><div class="desc" data-dcnode-id="2192"><p data-dcnode-id="2193"><i data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">The Real Modern</span></i><span data-dcnode-id="2194" instrument_node=""> examines three Korean authors of the 1930s—Pak T’aewon, Kim Yujong, and Yi T’aejun—whose works critique competing modes of literary representation in the period of Japanese colonial rule. A re-reading of modernist fiction within the imperial context, it sheds new light on the relationship between political discourse and aesthetics.</span></p></div></td></tr><tr data-dcnode-id="2169"><td class="number" data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">358.</span></td><td class="jkt" data-dcnode-id="2185"><a data-dcnode-id="2186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674726703" title="Meiji Restoration Losers: Memory and Tokugawa Supporters in Modern Japan"><img alt="Cover: Meiji Restoration Losers: Memory and Tokugawa Supporters in Modern Japan" data-dcnode-id="2187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674726703-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2170"><p class="title" data-dcnode-id="2182"><a data-dcnode-id="2183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674726703"><span data-dcnode-id="2184" instrument_node="">Meiji Restoration Losers: Memory and Tokugawa Supporters in Modern Japan</span></a></p><p class="author" data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Wert, Michael</span></p><div class="desc" data-dcnode-id="2171"><p data-dcnode-id="2172"><span data-dcnode-id="2179" instrument_node="">This book is about the losers of the Meiji Restoration and the supporters who promoted their legacy. Using sources ranging from essays by former Tokugawa supporters like Fukuzawa Yukichi to postwar film and “lost decade” </span><i data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">manga</span></i><span data-dcnode-id="2176" instrument_node="">, </span><b data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">Michael Wert</span></b><span data-dcnode-id="2173" instrument_node=""> shows how shifting portrayals of Restoration losers have influenced the formation of national history.</span></p></div></td></tr><tr data-dcnode-id="2152"><td class="number" data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">359.</span></td><td class="jkt" data-dcnode-id="2164"><a data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674726710" title="Facing the Monarch: Modes of Advice in the Early Chinese Court"><img alt="Cover: Facing the Monarch: Modes of Advice in the Early Chinese Court" data-dcnode-id="2166" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674726710-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2153"><p class="title" data-dcnode-id="2161"><a data-dcnode-id="2162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674726710"><span data-dcnode-id="2163" instrument_node="">Facing the Monarch: Modes of Advice in the Early Chinese Court</span></a></p><p class="author" data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Olberding, Garret P. S.</span></p><div class="desc" data-dcnode-id="2154"><p data-dcnode-id="2155"><i data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Facing the Monarch</span></i><span data-dcnode-id="2156" instrument_node=""> examines the role of rhetoric in shaping the dynamic between Chinese ministers and monarchs in the era between the Spring and Autumn period and the later Han dynasty. Essays analyze classical Chinese works to provide fresh perspectives on the impact of political circumstances on modes of expression.</span></p></div></td></tr><tr data-dcnode-id="2134"><td class="number" data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">360.</span></td><td class="jkt" data-dcnode-id="2147"><a data-dcnode-id="2148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674726727" title="Modernity with a Cold War Face: Reimagining the Nation in Chinese Literature across the 1949 Divide"><img alt="Cover: Modernity with a Cold War Face: Reimagining the Nation in Chinese Literature across the 1949 Divide" data-dcnode-id="2149" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674726727-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2135"><p class="title" data-dcnode-id="2144"><a data-dcnode-id="2145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674726727"><span data-dcnode-id="2146" instrument_node="">Modernity with a Cold War Face: Reimagining the Nation in Chinese Literature across the 1949 Divide</span></a></p><p class="author" data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Wang, Xiaojue</span></p><div class="desc" data-dcnode-id="2136"><p data-dcnode-id="2137"><span data-dcnode-id="2141" instrument_node="">The 1949 birth of the People’s Republic of China divided the nation into many political entities, displacing millions. Examining a body of understudied literary and cultural output in mainland China and elsewhere after World War II, </span><b data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Xiaojue Wang</span></b><span data-dcnode-id="2138" instrument_node=""> investigates how writers responded to these shifts to shape a new Chinese subjectivity in their works.</span></p></div></td></tr><tr data-dcnode-id="2114"><td class="number" data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">361.</span></td><td class="jkt" data-dcnode-id="2129"><a data-dcnode-id="2130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674726734" title="A Sense of Place: The Political Landscape in Late Medieval Japan"><img alt="Cover: A Sense of Place: The Political Landscape in Late Medieval Japan" data-dcnode-id="2131" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674726734-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2115"><p class="title" data-dcnode-id="2126"><a data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674726734"><span data-dcnode-id="2128" instrument_node="">A Sense of Place: The Political Landscape in Late Medieval Japan</span></a></p><p class="author" data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Spafford, David</span></p><div class="desc" data-dcnode-id="2116"><p data-dcnode-id="2117"><i data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">A Sense of Place</span></i><span data-dcnode-id="2121" instrument_node=""> examines the vast Kantō region as a locus of cultural identity and an object of familial attachment in late fifteenth and early sixteenth century Japan. Using memoirs, letters, travelogues, land registers, and other documents, </span><b data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">David Spafford</span></b><span data-dcnode-id="2118" instrument_node=""> analyzes the relationships of the eastern elites to the space they inhabited.</span></p></div></td></tr><tr data-dcnode-id="2091"><td class="number" data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">362.</span></td><td class="jkt" data-dcnode-id="2109"><a data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674726741" title="Korean Political and Economic Development: Crisis, Security, and Institutional Rebalancing"><img alt="Cover: Korean Political and Economic Development: Crisis, Security, and Institutional Rebalancing" data-dcnode-id="2111" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674726741-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2092"><p class="title" data-dcnode-id="2106"><a data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674726741"><span data-dcnode-id="2108" instrument_node="">Korean Political and Economic Development: Crisis, Security, and Institutional Rebalancing</span></a></p><p class="author" data-dcnode-id="2102"><span data-dcnode-id="2105" instrument_node="">Mo, Jongryn</span><br data-dcnode-id="2104"><span data-dcnode-id="2103" instrument_node="">
Weingast, Barry R.</span></p><div class="desc" data-dcnode-id="2093"><p data-dcnode-id="2094"><span data-dcnode-id="2101" instrument_node="">This study offers a new view of South Korea’s transformation since 1960.Focusing on three turning points—the creation of the development state in the 1960s, democratization in 1987, and the 1997 economic crisis—</span><b data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Jongryn Mo</span></b><span data-dcnode-id="2098" instrument_node=""> and </span><b data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Barry R. Weingast</span></b><span data-dcnode-id="2095" instrument_node=""> show how Korea sustained growth by resolving crises in favor of greater political and economic openness.</span></p></div></td></tr><tr data-dcnode-id="2074"><td class="number" data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">363.</span></td><td class="jkt" data-dcnode-id="2086"><a data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674492004" title="The Undiscovered Country: Text, Translation, and Modernity in the Work of Yanagita Kunio"><img alt="Cover: The Undiscovered Country: Text, Translation, and Modernity in the Work of Yanagita Kunio" data-dcnode-id="2088" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674492004-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2075"><p class="title" data-dcnode-id="2083"><a data-dcnode-id="2084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674492004"><span data-dcnode-id="2085" instrument_node="">The Undiscovered Country: Text, Translation, and Modernity in the Work of Yanagita Kunio</span></a></p><p class="author" data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Ortabasi, Melek</span></p><div class="desc" data-dcnode-id="2076"><p data-dcnode-id="2077"><b data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Melek Ortabasi</span></b><span data-dcnode-id="2078" instrument_node=""> reassesses the influence of Yanagita Kunio (1875–1962), a folk scholar and elite bureaucrat, in shaping modern Japan’s cultural identity. Only the second book-length English-language study of Yanagita, this book moves beyond his pioneering work in folk studies to reveal the full range of his contributions as a public intellectual.</span></p></div></td></tr><tr data-dcnode-id="2057"><td class="number" data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">364.</span></td><td class="jkt" data-dcnode-id="2069"><a data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674492011" title="Lost and Found: Recovering Regional Identity in Imperial Japan"><img alt="Cover: Lost and Found: Recovering Regional Identity in Imperial Japan" data-dcnode-id="2071" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674492011-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2058"><p class="title" data-dcnode-id="2066"><a data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674492011"><span data-dcnode-id="2068" instrument_node="">Lost and Found: Recovering Regional Identity in Imperial Japan</span></a></p><p class="author" data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Shimoda, Hiraku</span></p><div class="desc" data-dcnode-id="2059"><p data-dcnode-id="2060"><b data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">Hiraku Shimoda</span></b><span data-dcnode-id="2061" instrument_node=""> places the origin of modern Japanese regionalism in the tense relationship between region and nation in the nineteenth and twentieth centuries. This study shows that “region,” often seen as a hard, natural place that impedes national unity, is in fact a supple spatial category that can be made to reinforce nationalist sensibilities.</span></p></div></td></tr><tr data-dcnode-id="2040"><td class="number" data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">365.</span></td><td class="jkt" data-dcnode-id="2052"><a and="" data-dcnode-id="2053" formation="" greatest="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674491991" in="" japan"="" meiji="" problem":="" religion="" state="" title="The "><img alt="Cover: The " and="" data-dcnode-id="2054" formation="" greatest="" in="" japan"="" meiji="" problem":="" religion="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674491991-sm.jpg&amp;raw" state=""></a></td><td class="bookinfo" data-dcnode-id="2041"><p class="title" data-dcnode-id="2049"><a data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674491991"><span data-dcnode-id="2051" instrument_node="">The "Greatest Problem": Religion and State Formation in Meiji Japan</span></a></p><p class="author" data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Maxey, Trent E.</span></p><div class="desc" data-dcnode-id="2042"><p data-dcnode-id="2043"><b data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Trent E. Maxey</span></b><span data-dcnode-id="2044" instrument_node=""> documents how religion came to be seen as the “greatest problem” by the architects of the modern Japanese state. Maxey shows that in Meiji Japan, religion designated a cognitive and social pluralism that resisted direct state control. It also provided the state with a means to contain, regulate, and neutralize that plurality.</span></p></div></td></tr><tr data-dcnode-id="2022"><td class="number" data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">366.</span></td><td class="jkt" data-dcnode-id="2035"><a data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674491977" title="The Princess Nun: Bunchi, Buddhist Reform, and Gender in Early Edo Japan"><img alt="Cover: The Princess Nun: Bunchi, Buddhist Reform, and Gender in Early Edo Japan" data-dcnode-id="2037" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674491977-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2023"><p class="title" data-dcnode-id="2032"><a data-dcnode-id="2033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674491977"><span data-dcnode-id="2034" instrument_node="">The Princess Nun: Bunchi, Buddhist Reform, and Gender in Early Edo Japan</span></a></p><p class="author" data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Cogan, Gina</span></p><div class="desc" data-dcnode-id="2024"><p data-dcnode-id="2025"><span data-dcnode-id="2029" instrument_node="">The first full-length biography of a premodern Japanese nun, </span><i data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">The Princess Nun</span></i><span data-dcnode-id="2026" instrument_node=""> is the story of Bunchi (1619–1697), daughter of Emperor Go-Mizunoo and founder of Enshōji. The study incorporates issues of gender and social status into its discussion of Bunchi’s ascetic practice to rewrite the history of Buddhist reform and Tokugawa religion.</span></p></div></td></tr><tr data-dcnode-id="2005"><td class="number" data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">367.</span></td><td class="jkt" data-dcnode-id="2017"><a data-dcnode-id="2018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674491984" title="Rise of a Japanese Chinatown: Yokohama, 1894–1972"><img alt="Cover: Rise of a Japanese Chinatown: Yokohama, 1894–1972" data-dcnode-id="2019" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674491984-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="2006"><p class="title" data-dcnode-id="2014"><a data-dcnode-id="2015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674491984"><span data-dcnode-id="2016" instrument_node="">Rise of a Japanese Chinatown: Yokohama, 1894–1972</span></a></p><p class="author" data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Han, Eric C.</span></p><div class="desc" data-dcnode-id="2007"><p data-dcnode-id="2008"><i data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Rise of a Japanese Chinatown</span></i><span data-dcnode-id="2009" instrument_node=""> focuses on a Chinese immigrant community in the Japanese port city of Yokohama from the Sino–Japanese War of 1894–1895 to the normalization of Sino–Japanese ties in 1972 and beyond. It tells the story of how Chinese immigrants found an enduring place within a monoethnic state during periods of war and peace.</span></p></div></td></tr><tr data-dcnode-id="1988"><td class="number" data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">368.</span></td><td class="jkt" data-dcnode-id="2000"><a data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417113" title="Illusory Abiding: The Cultural Construction of the Chan Monk Zhongfeng Mingben"><img alt="Cover: Illusory Abiding: The Cultural Construction of the Chan Monk Zhongfeng Mingben" data-dcnode-id="2002" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674417113-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1989"><p class="title" data-dcnode-id="1997"><a data-dcnode-id="1998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417113"><span data-dcnode-id="1999" instrument_node="">Illusory Abiding: The Cultural Construction of the Chan Monk Zhongfeng Mingben</span></a></p><p class="author" data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Heller, Natasha</span></p><div class="desc" data-dcnode-id="1990"><p data-dcnode-id="1991"><b data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Natasha Heller</span></b><span data-dcnode-id="1992" instrument_node=""> offers a cultural history of Buddhism through a case study of the Chan master Zhongfeng Mingben. Monks of his stature developed a broad set of cultural competencies for navigating social and intellectual relationships. Heller shows the importance of situating monks as actors within wider sociocultural fields of practice and exchange.</span></p></div></td></tr><tr data-dcnode-id="1970"><td class="number" data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">369.</span></td><td class="jkt" data-dcnode-id="1983"><a data-dcnode-id="1984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417120" title="Sound Rising from the Paper: Nineteenth-Century Martial Arts Fiction and the Chinese Acoustic Imagination"><img alt="Cover: Sound Rising from the Paper: Nineteenth-Century Martial Arts Fiction and the Chinese Acoustic Imagination" data-dcnode-id="1985" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674417120-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1971"><p class="title" data-dcnode-id="1980"><a data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417120"><span data-dcnode-id="1982" instrument_node="">Sound Rising from the Paper: Nineteenth-Century Martial Arts Fiction and the Chinese Acoustic Imagination</span></a></p><p class="author" data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Keulemans, Paize</span></p><div class="desc" data-dcnode-id="1972"><p data-dcnode-id="1973"><span data-dcnode-id="1977" instrument_node="">Chinese martial arts novels from the late nineteenth century are full of suggestive sounds. Characters curse in colorful dialect accents, and action scenes come to life with the loud clash of swords. </span><b data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Paize Keulemans</span></b><span data-dcnode-id="1974" instrument_node=""> examines the relationship between these novels and earlier storyteller manuscripts to explain the purpose and history of these sounds.</span></p></div></td></tr><tr data-dcnode-id="1953"><td class="number" data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">370.</span></td><td class="jkt" data-dcnode-id="1965"><a data-dcnode-id="1966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417137" title="Investing Japan: Foreign Capital, Monetary Standards, and Economic Development, 1859–2011"><img alt="Cover: Investing Japan: Foreign Capital, Monetary Standards, and Economic Development, 1859–2011" data-dcnode-id="1967" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674417137-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1954"><p class="title" data-dcnode-id="1962"><a data-dcnode-id="1963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417137"><span data-dcnode-id="1964" instrument_node="">Investing Japan: Foreign Capital, Monetary Standards, and Economic Development, 1859–2011</span></a></p><p class="author" data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">Bytheway, Simon James</span></p><div class="desc" data-dcnode-id="1955"><p data-dcnode-id="1956"><i data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Investing Japan</span></i><span data-dcnode-id="1957" instrument_node=""> demonstrates that foreign investment is a vital and misunderstood aspect of Japan’s modern economic development. This study investigates the role played by foreign companies in the Japanese experience of modernization, highlighting their identity as key agents in the processes of industrialization and technology transfer.</span></p></div></td></tr><tr data-dcnode-id="1936"><td class="number" data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">371.</span></td><td class="jkt" data-dcnode-id="1948"><a data-dcnode-id="1949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417144" title="Negotiated Power: The State, Elites, and Local Governance in Twelfth- to Fourteenth-Century China"><img alt="Cover: Negotiated Power: The State, Elites, and Local Governance in Twelfth- to Fourteenth-Century China" data-dcnode-id="1950" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674417144-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1937"><p class="title" data-dcnode-id="1945"><a data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417144"><span data-dcnode-id="1947" instrument_node="">Negotiated Power: The State, Elites, and Local Governance in Twelfth- to Fourteenth-Century China</span></a></p><p class="author" data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Lee, Sukhee</span></p><div class="desc" data-dcnode-id="1938"><p data-dcnode-id="1939"><b data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Sukhee Lee</span></b><span data-dcnode-id="1940" instrument_node=""> posits an alternative understanding of the relationship between the state and social elites during the Southern Song and Yuan dynasties. Challenging the assumption of a zero-sum competition between the powers of the state and of local elites, Lee shows that state power and local elite interests were mutually constitutive and reinforcing.</span></p></div></td></tr><tr data-dcnode-id="1918"><td class="number" data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">372.</span></td><td class="jkt" data-dcnode-id="1931"><a data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417151" title="The Efficacious Landscape: On the Authorities of Painting at the Northern Song Court"><img alt="Cover: The Efficacious Landscape: On the Authorities of Painting at the Northern Song Court" data-dcnode-id="1933" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674417151-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1919"><p class="title" data-dcnode-id="1928"><a data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417151"><span data-dcnode-id="1930" instrument_node="">The Efficacious Landscape: On the Authorities of Painting at the Northern Song Court</span></a></p><p class="author" data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Foong, Ping</span></p><div class="desc" data-dcnode-id="1920"><p data-dcnode-id="1921"><span data-dcnode-id="1925" instrument_node="">Ink landscape painting is a distinctive feature of the Northern Song, and Song painters created some of the most celebrated artworks in Chinese history. </span><b data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Foong Ping</span></b><span data-dcnode-id="1922" instrument_node=""> shows how landmark works of this era came to be identified first as potent symbols of imperial authority and later as objects by which exiled scholars expressed disaffection and dissent.</span></p></div></td></tr><tr data-dcnode-id="1901"><td class="number" data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">373.</span></td><td class="jkt" data-dcnode-id="1913"><a data-dcnode-id="1914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417168" title="Empires on the Waterfront: Japan’s Ports and Power, 1858–1899"><img alt="Cover: Empires on the Waterfront: Japan’s Ports and Power, 1858–1899" data-dcnode-id="1915" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674417168-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1902"><p class="title" data-dcnode-id="1910"><a data-dcnode-id="1911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417168"><span data-dcnode-id="1912" instrument_node="">Empires on the Waterfront: Japan’s Ports and Power, 1858–1899</span></a></p><p class="author" data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Phipps, Catherine L.</span></p><div class="desc" data-dcnode-id="1903"><p data-dcnode-id="1904"><b data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Catherine L. Phipps</span></b><span data-dcnode-id="1905" instrument_node=""> examines a largely unacknowledged system of “special trading ports” that operated under full Japanese jurisdiction in the shadow of the better-known treaty ports. Phipps demonstrates why the special trading ports were key to Japan’s achieving autonomy and regional power during the pivotal second half of the nineteenth century.</span></p></div></td></tr><tr data-dcnode-id="1883"><td class="number" data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">374.</span></td><td class="jkt" data-dcnode-id="1896"><a data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417175" title="The Proletarian Wave: Literature and Leftist Culture in Colonial Korea, 1910–1945"><img alt="Cover: The Proletarian Wave: Literature and Leftist Culture in Colonial Korea, 1910–1945" data-dcnode-id="1898" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674417175-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1884"><p class="title" data-dcnode-id="1893"><a data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417175"><span data-dcnode-id="1895" instrument_node="">The Proletarian Wave: Literature and Leftist Culture in Colonial Korea, 1910–1945</span></a></p><p class="author" data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Park, Sunyoung</span></p><div class="desc" data-dcnode-id="1885"><p data-dcnode-id="1886"><span data-dcnode-id="1890" instrument_node="">From the 1910s to the 1940s, a wave of anarchist, Marxist, nationalist, and feminist leftist groups swept the Korean cultural scene with differing agendas but shared demands for equality and social justice. </span><b data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Sunyoung Park</span></b><span data-dcnode-id="1887" instrument_node=""> reconstructs the complex mosaic of colonial leftist culture, focusing on literature as its most fertile and enduring expression.</span></p></div></td></tr><tr data-dcnode-id="1860"><td class="number" data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">375.</span></td><td class="jkt" data-dcnode-id="1878"><a data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417182" title="The Korean Economy: From a Miraculous Past to a Sustainable Future"><img alt="Cover: The Korean Economy: From a Miraculous Past to a Sustainable Future" data-dcnode-id="1880" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674417182-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1861"><p class="title" data-dcnode-id="1875"><a data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674417182"><span data-dcnode-id="1877" instrument_node="">The Korean Economy: From a Miraculous Past to a Sustainable Future</span></a></p><p class="author" data-dcnode-id="1867"><span data-dcnode-id="1874" instrument_node="">Eichengreen, Barry</span><br data-dcnode-id="1873"><span data-dcnode-id="1872" instrument_node="">
Lim, Wonhyuk</span><br data-dcnode-id="1871"><span data-dcnode-id="1870" instrument_node="">
Park, Yung Chul</span><br data-dcnode-id="1869"><span data-dcnode-id="1868" instrument_node="">
Perkins, Dwight H.</span></p><div class="desc" data-dcnode-id="1862"><p data-dcnode-id="1863"><i data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">The Korean Economy</span></i><span data-dcnode-id="1864" instrument_node=""> provides an overview of Korean economic experience since the 1950s, with a focus on the period since democratization in 1987. Chapters analyze the Korean experience from a wide range of economic and social perspectives, as well as describing the country’s economic challenges going forward and how they can best be met.</span></p></div></td></tr><tr data-dcnode-id="1842"><td class="number" data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">376.</span></td><td class="jkt" data-dcnode-id="1855"><a data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504271" title="Real and Imagined: The Peak of Gold in Heian Japan"><img alt="Cover: Real and Imagined: The Peak of Gold in Heian Japan" data-dcnode-id="1857" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674504271-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1843"><p class="title" data-dcnode-id="1852"><a data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504271"><span data-dcnode-id="1854" instrument_node="">Real and Imagined: The Peak of Gold in Heian Japan</span></a></p><p class="author" data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Blair, Heather</span></p><div class="desc" data-dcnode-id="1844"><p data-dcnode-id="1845"><span data-dcnode-id="1849" instrument_node="">During the Heian period, the sacred mountain Kinpusen came to cultural prominence as a pilgrimage site for the most powerful men in Japan, but these journeys also had political implications. Using a myriad of sources, </span><b data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">Heather Blair</span></b><span data-dcnode-id="1846" instrument_node=""> sheds new light on Kinpusen, positioning it within the broader religious and political history of the Heian period.</span></p></div></td></tr><tr data-dcnode-id="1824"><td class="number" data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">377.</span></td><td class="jkt" data-dcnode-id="1837"><a data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504332" title="Significant Soil: Settler Colonialism and Japan's Urban Empire in Manchuria"><img alt="Cover: Significant Soil: Settler Colonialism and Japan's Urban Empire in Manchuria" data-dcnode-id="1839" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674504332-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1825"><p class="title" data-dcnode-id="1834"><a data-dcnode-id="1835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504332"><span data-dcnode-id="1836" instrument_node="">Significant Soil: Settler Colonialism and Japan's Urban Empire in Manchuria</span></a></p><p class="author" data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">O’Dwyer, Emer</span></p><div class="desc" data-dcnode-id="1826"><p data-dcnode-id="1827"><span data-dcnode-id="1831" instrument_node="">Focusing on Japan’s Kwantung Leasehold and Railway Zone in China’s northeastern provinces, </span><b data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Emer O’Dwyer</span></b><span data-dcnode-id="1828" instrument_node=""> traces the history of Japan’s prewar Manchurian empire over four decades to show how South Manchuria was naturalized as a Japanese space and how this process contributed to the success of the Japanese army’s early 1930s takeover of Manchuria.</span></p></div></td></tr><tr data-dcnode-id="1804"><td class="number" data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">378.</span></td><td class="jkt" data-dcnode-id="1819"><a data-dcnode-id="1820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504301" title="Under the Ancestors' Eyes: Kinship, Status, and Locality in Premodern Korea"><img alt="Cover: Under the Ancestors' Eyes: Kinship, Status, and Locality in Premodern Korea" data-dcnode-id="1821" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674504301-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1805"><p class="title" data-dcnode-id="1816"><a data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504301"><span data-dcnode-id="1818" instrument_node="">Under the Ancestors' Eyes: Kinship, Status, and Locality in Premodern Korea</span></a></p><p class="author" data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Deuchler, Martina</span></p><div class="desc" data-dcnode-id="1806"><p data-dcnode-id="1807"><i data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Under the Ancestors’ Eyes</span></i><span data-dcnode-id="1811" instrument_node=""> elucidates the role of Neo-Confucianism as an ideological and political device by which the elite in Korea regained and maintained dominance during the Chosŏn period. Using historical and social anthropological methodology, </span><b data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Martina Deuchler</span></b><span data-dcnode-id="1808" instrument_node=""> highlights Korea’s distinctive elevation of the social over the political.</span></p></div></td></tr><tr data-dcnode-id="1787"><td class="number" data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">379.</span></td><td class="jkt" data-dcnode-id="1799"><a data-dcnode-id="1800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504295" title="Writing, Publishing, and Reading Local Gazetteers in Imperial China, 1100-1700"><img alt="Cover: Writing, Publishing, and Reading Local Gazetteers in Imperial China, 1100-1700" data-dcnode-id="1801" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674504295-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1788"><p class="title" data-dcnode-id="1796"><a data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504295"><span data-dcnode-id="1798" instrument_node="">Writing, Publishing, and Reading Local Gazetteers in Imperial China, 1100-1700</span></a></p><p class="author" data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Dennis, Joseph R.</span></p><div class="desc" data-dcnode-id="1789"><p data-dcnode-id="1790"><b data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Joseph R. Dennis</span></b><span data-dcnode-id="1791" instrument_node=""> demonstrates the significance of imperial Chinese local gazetteers in both local societies and national discourses. Whereas previous studies argued that publishing, and thus cultural and intellectual power, were concentrated in the southeast, Dennis shows that publishing and book ownership were widely dispersed throughout China.</span></p></div></td></tr><tr data-dcnode-id="1769"><td class="number" data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">380.</span></td><td class="jkt" data-dcnode-id="1782"><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504356" title="The Chinese Political Novel: Migration of a World Genre"><img alt="Cover: The Chinese Political Novel: Migration of a World Genre" data-dcnode-id="1784" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674504356-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1770"><p class="title" data-dcnode-id="1779"><a data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504356"><span data-dcnode-id="1781" instrument_node="">The Chinese Political Novel: Migration of a World Genre</span></a></p><p class="author" data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Yeh, Catherine Vance</span></p><div class="desc" data-dcnode-id="1771"><p data-dcnode-id="1772"><span data-dcnode-id="1776" instrument_node="">Focusing on its adaptation in the Chinese context, </span><b data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Catherine Vance Yeh</span></b><span data-dcnode-id="1773" instrument_node=""> traces the rise of the political novel to international renown between the 1830s and the 1910s. Yeh explores in detail the tensions characteristic of transcultural processes, among them the dynamics through which a particular, and seemingly local, literary genre goes global.</span></p></div></td></tr><tr data-dcnode-id="1748"><td class="number" data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">381.</span></td><td class="jkt" data-dcnode-id="1764"><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504349" title="Defensive Positions: The Politics of Maritime Security in Tokugawa Japan"><img alt="Cover: Defensive Positions: The Politics of Maritime Security in Tokugawa Japan" data-dcnode-id="1766" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674504349-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1749"><p class="title" data-dcnode-id="1761"><a data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504349"><span data-dcnode-id="1763" instrument_node="">Defensive Positions: The Politics of Maritime Security in Tokugawa Japan</span></a></p><p class="author" data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Wilson, Noell</span></p><div class="desc" data-dcnode-id="1750"><p data-dcnode-id="1751"><span data-dcnode-id="1758" instrument_node="">In </span><i data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Defensive Positions</span></i><span data-dcnode-id="1755" instrument_node="">, </span><b data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Noell Wilson</span></b><span data-dcnode-id="1752" instrument_node=""> shows how control of coastal defense by regional domains exacerbated the shogunate’s inability to respond to major military and political challenges as Japan transitioned from an early modern system of parcelized, local maritime defense to one of centralized, national security in the nineteenth century.</span></p></div></td></tr><tr data-dcnode-id="1731"><td class="number" data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">382.</span></td><td class="jkt" data-dcnode-id="1743"><a data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504325" title="Monstrous Bodies: The Rise of the Uncanny in Modern Japan"><img alt="Cover: Monstrous Bodies: The Rise of the Uncanny in Modern Japan" data-dcnode-id="1745" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674504325-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1732"><p class="title" data-dcnode-id="1740"><a data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504325"><span data-dcnode-id="1742" instrument_node="">Monstrous Bodies: The Rise of the Uncanny in Modern Japan</span></a></p><p class="author" data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Nakamura, Miri</span></p><div class="desc" data-dcnode-id="1733"><p data-dcnode-id="1734"><b data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Miri Nakamura</span></b><span data-dcnode-id="1735" instrument_node=""> examines bodily metaphors such as doppelgangers and robots that were ubiquitous in the literature of imperial Japan. Reading them against the historical rise of the Japanese empire, she argues they must be understood in relation to the most “monstrous” body of all in modern Japan: the carefully constructed image of the empire itself.</span></p></div></td></tr><tr data-dcnode-id="1713"><td class="number" data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">383.</span></td><td class="jkt" data-dcnode-id="1726"><a data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504318" title="Radical Inequalities: China's Revolutionary Welfare State in Comparative Perspective"><img alt="Cover: Radical Inequalities: China's Revolutionary Welfare State in Comparative Perspective" data-dcnode-id="1728" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674504318-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1714"><p class="title" data-dcnode-id="1723"><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674504318"><span data-dcnode-id="1725" instrument_node="">Radical Inequalities: China's Revolutionary Welfare State in Comparative Perspective</span></a></p><p class="author" data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Dillon, Nara</span></p><div class="desc" data-dcnode-id="1715"><p data-dcnode-id="1716"><span data-dcnode-id="1720" instrument_node="">The Chinese Communist welfare state was established with the goal of eradicating income inequality. Paradoxically, it widened that gap, undermining a primary objective of Mao Zedong’s revolution. </span><b data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Nara Dillon</span></b><span data-dcnode-id="1717" instrument_node=""> traces the origins of the Chinese welfare state from the 1940s to the 1960s to uncover the reasons why the state failed to achieve this goal.</span></p></div></td></tr><tr data-dcnode-id="1696"><td class="number" data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">384.</span></td><td class="jkt" data-dcnode-id="1708"><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674088382" title="Runaway Wives, Urban Crimes, and Survival Tactics in Wartime Beijing, 1937–1949"><img alt="Cover: Runaway Wives, Urban Crimes, and Survival Tactics in Wartime Beijing, 1937–1949" data-dcnode-id="1710" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674088382-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1697"><p class="title" data-dcnode-id="1705"><a data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674088382"><span data-dcnode-id="1707" instrument_node="">Runaway Wives, Urban Crimes, and Survival Tactics in Wartime Beijing, 1937–1949</span></a></p><p class="author" data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Ma, Zhao</span></p><div class="desc" data-dcnode-id="1698"><p data-dcnode-id="1699"><b data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Zhao Ma</span></b><span data-dcnode-id="1700" instrument_node=""> explores lower-class women’s struggles with poverty, deprivation, and marital strife in Beijing from 1937 to 1949. He shows how the everyday survival tactics they devised allowed them to subtly deflect, subvert, and “escape without leaving” powerful forces such as the surveillance state, reformist discourse, and revolutionary politics.</span></p></div></td></tr><tr data-dcnode-id="1675"><td class="number" data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">385.</span></td><td class="jkt" data-dcnode-id="1691"><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674088399" title="Young China: National Rejuvenation and the Bildungsroman, 1900–1959"><img alt="Cover: Young China: National Rejuvenation and the Bildungsroman, 1900–1959" data-dcnode-id="1693" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674088399-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1676"><p class="title" data-dcnode-id="1688"><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674088399"><span data-dcnode-id="1690" instrument_node="">Young China: National Rejuvenation and the Bildungsroman, 1900–1959</span></a></p><p class="author" data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Song, Mingwei</span></p><div class="desc" data-dcnode-id="1677"><p data-dcnode-id="1678"><span data-dcnode-id="1685" instrument_node="">Since the last years of the Qing dynasty, youth has been made a new agent of history in Chinese intellectuals’ visions of national rejuvenation. </span><b data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Mingwei Song</span></b><span data-dcnode-id="1682" instrument_node=""> combines historical investigations of the origin and development of the modern Chinese youth discourse with close analyses of the novelistic construction of the Chinese </span><i data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Bildungsroman</span></i><span data-dcnode-id="1679" instrument_node="">.</span></p></div></td></tr><tr data-dcnode-id="1657"><td class="number" data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">386.</span></td><td class="jkt" data-dcnode-id="1670"><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674088405" title="Voice, Silence, and Self: Negotiations of Buraku Identity in Contemporary Japan"><img alt="Cover: Voice, Silence, and Self: Negotiations of Buraku Identity in Contemporary Japan" data-dcnode-id="1672" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674088405-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1658"><p class="title" data-dcnode-id="1667"><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674088405"><span data-dcnode-id="1669" instrument_node="">Voice, Silence, and Self: Negotiations of Buraku Identity in Contemporary Japan</span></a></p><p class="author" data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Bondy, Christopher</span></p><div class="desc" data-dcnode-id="1659"><p data-dcnode-id="1660"><span data-dcnode-id="1664" instrument_node="">Stigmatized throughout Japanese history as outcastes, the burakumin are contemporary Japan’s largest minority. In this study of youths from two different communities, </span><b data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Christopher Bondy</span></b><span data-dcnode-id="1661" instrument_node=""> explores how individuals navigate their social world, demonstrating the ways in which people make conscious decisions about disclosing a stigmatized identity.</span></p></div></td></tr><tr data-dcnode-id="1640"><td class="number" data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">387.</span></td><td class="jkt" data-dcnode-id="1652"><a data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674088412" title="Writing Technology in Meiji Japan: A Media History of Modern Japanese Literature and Visual Culture"><img alt="Cover: Writing Technology in Meiji Japan: A Media History of Modern Japanese Literature and Visual Culture" data-dcnode-id="1654" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674088412-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1641"><p class="title" data-dcnode-id="1649"><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674088412"><span data-dcnode-id="1651" instrument_node="">Writing Technology in Meiji Japan: A Media History of Modern Japanese Literature and Visual Culture</span></a></p><p class="author" data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Jacobowitz, Seth</span></p><div class="desc" data-dcnode-id="1642"><p data-dcnode-id="1643"><b data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Seth Jacobowitz</span></b><span data-dcnode-id="1644" instrument_node=""> rethinks the origins of modern Japanese language, literature, and visual culture, presenting the first systematic study of the ways that media and inscriptive technologies available in Japan at its threshold of modernization in the late nineteenth to early twentieth century shaped and brought into being modern Japanese literature.</span></p></div></td></tr><tr data-dcnode-id="1622"><td class="number" data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">388.</span></td><td class="jkt" data-dcnode-id="1635"><a data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674088429" title="Information, Territory, and Networks: The Crisis and Maintenance of Empire in Song China"><img alt="Cover: Information, Territory, and Networks: The Crisis and Maintenance of Empire in Song China" data-dcnode-id="1637" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674088429-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1623"><p class="title" data-dcnode-id="1632"><a data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674088429"><span data-dcnode-id="1634" instrument_node="">Information, Territory, and Networks: The Crisis and Maintenance of Empire in Song China</span></a></p><p class="author" data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">De Weerdt, Hilde</span></p><div class="desc" data-dcnode-id="1624"><p data-dcnode-id="1625"><span data-dcnode-id="1629" instrument_node="">By the late eleventh century the Song court no longer dominated production of information about itself. </span><b data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Hilde De Weert</span></b><span data-dcnode-id="1626" instrument_node=""> demonstrates how the growing involvement of the literati in publishing such information altered the relationship between court and literati in political communication for the remainder of the Chinese imperial period.</span></p></div></td></tr><tr data-dcnode-id="1605"><td class="number" data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">389.</span></td><td class="jkt" data-dcnode-id="1617"><a data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674088436" title="Geo-Narratives of a Filial Son: The Paintings and Travel Diaries of Huang Xiangjian (1609–1673)"><img alt="Cover: Geo-Narratives of a Filial Son: The Paintings and Travel Diaries of Huang Xiangjian (1609–1673)" data-dcnode-id="1619" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674088436-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1606"><p class="title" data-dcnode-id="1614"><a data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674088436"><span data-dcnode-id="1616" instrument_node="">Geo-Narratives of a Filial Son: The Paintings and Travel Diaries of Huang Xiangjian (1609–1673)</span></a></p><p class="author" data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Kindall, Elizabeth</span></p><div class="desc" data-dcnode-id="1607"><p data-dcnode-id="1608"><b data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Elizabeth Kindall</span></b><span data-dcnode-id="1609" instrument_node="">’s definitive study elucidates the context for the paintings of Huang Xiangjian (1609–1673) and identifies geo-narrative as a distinct landscape-painting tradition lauded for its naturalistic immediacy, experiential topography, and dramatic narratives of moral persuasion, class identification, and biographical commemoration.</span></p></div></td></tr><tr data-dcnode-id="1588"><td class="number" data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">390.</span></td><td class="jkt" data-dcnode-id="1600"><a data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674425224" title="Plucking Chrysanthemums: Narushima Ryūhoku and Sinitic Literary Traditions in Modern Japan"><img alt="Cover: Plucking Chrysanthemums: Narushima Ryūhoku and Sinitic Literary Traditions in Modern Japan" data-dcnode-id="1602" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674425224-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1589"><p class="title" data-dcnode-id="1597"><a data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674425224"><span data-dcnode-id="1599" instrument_node="">Plucking Chrysanthemums: Narushima Ryūhoku and Sinitic Literary Traditions in Modern Japan</span></a></p><p class="author" data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Fraleigh, Matthew</span></p><div class="desc" data-dcnode-id="1590"><p data-dcnode-id="1591"><b data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Matthew Fraleigh</span></b><span data-dcnode-id="1592" instrument_node=""> examines the life and works of Narushima Ryūhoku (1837–1884): Confucian scholar, world traveler, pioneering journalist, and irrepressible satirist. This is the first book-length study of Ryūhoku in a Western language and one of the first Western-language monographs to examine Sinitic poetry and prose composition in modern Japan.</span></p></div></td></tr><tr data-dcnode-id="1570"><td class="number" data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">391.</span></td><td class="jkt" data-dcnode-id="1583"><a data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674737204" title="Burying Autumn: Poetry, Friendship, and Loss"><img alt="Cover: Burying Autumn: Poetry, Friendship, and Loss" data-dcnode-id="1585" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674737204-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1571"><p class="title" data-dcnode-id="1580"><a data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674737204"><span data-dcnode-id="1582" instrument_node="">Burying Autumn: Poetry, Friendship, and Loss</span></a></p><p class="author" data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Hu, Ying</span></p><div class="desc" data-dcnode-id="1572"><p data-dcnode-id="1573"><span data-dcnode-id="1577" instrument_node="">Beheaded for plotting against the Qing empire, poet Qiu Jin would later be celebrated as a Republican martyr and China’s first feminist. </span><b data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Hu Ying</span></b><span data-dcnode-id="1574" instrument_node=""> studies Qiu’s enduring bond with Wu Zhiying and Xu Zihua, who braved political persecution to keep her legacy alive. In doing so, their friendship fulfilled its ultimate socially transformative potential.</span></p></div></td></tr><tr data-dcnode-id="1553"><td class="number" data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">392.</span></td><td class="jkt" data-dcnode-id="1565"><a data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674737198" title="The Ancient State of Puyŏ in Northeast Asia: Archaeology and Historical Memory"><img alt="Cover: The Ancient State of Puyŏ in Northeast Asia: Archaeology and Historical Memory" data-dcnode-id="1567" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674737198-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1554"><p class="title" data-dcnode-id="1562"><a data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674737198"><span data-dcnode-id="1564" instrument_node="">The Ancient State of Puyŏ in Northeast Asia: Archaeology and Historical Memory</span></a></p><p class="author" data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Byington, Mark E.</span></p><div class="desc" data-dcnode-id="1555"><p data-dcnode-id="1556"><b data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Mark E. Byington</span></b><span data-dcnode-id="1557" instrument_node=""> explores the formation, history, and legacy of ancient Puyŏ, the earliest archaeologically attested state to arise in northeastern Asia. He discusses how the legacy of Puyŏ contributed to modes of statecraft of later northeast Asian states and provided a basis for a developing historiographical tradition on the Korean peninsula.</span></p></div></td></tr><tr data-dcnode-id="1536"><td class="number" data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">393.</span></td><td class="jkt" data-dcnode-id="1548"><a data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674659797" title="Struggling Upward: Worldly Success and the Japanese Novel"><img alt="Cover: Struggling Upward: Worldly Success and the Japanese Novel" data-dcnode-id="1550" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674659797-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1537"><p class="title" data-dcnode-id="1545"><a data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674659797"><span data-dcnode-id="1547" instrument_node="">Struggling Upward: Worldly Success and the Japanese Novel</span></a></p><p class="author" data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Van Compernolle, Timothy J.</span></p><div class="desc" data-dcnode-id="1538"><p data-dcnode-id="1539"><b data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Timothy J. Van Compernolle</span></b><span data-dcnode-id="1540" instrument_node=""> reconsiders the rise of the modern novel in Japan by connecting the genre to new discourses on ambition and social mobility, arguing that social mobility is the privileged lens through which Meiji novelists explored abstract concepts of national belonging, social hierarchy, and the new space of an industrializing nation.</span></p></div></td></tr><tr data-dcnode-id="1519"><td class="number" data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">394.</span></td><td class="jkt" data-dcnode-id="1531"><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674660045" title="Translation’s Forgotten History: Russian Literature, Japanese Mediation, and the Formation of Modern Korean Literature"><img alt="Cover: Translation’s Forgotten History: Russian Literature, Japanese Mediation, and the Formation of Modern Korean Literature" data-dcnode-id="1533" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674660045-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1520"><p class="title" data-dcnode-id="1528"><a data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674660045"><span data-dcnode-id="1530" instrument_node="">Translation’s Forgotten History: Russian Literature, Japanese Mediation, and the Formation of Modern Korean Literature</span></a></p><p class="author" data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Cho, Heekyoung</span></p><div class="desc" data-dcnode-id="1521"><p data-dcnode-id="1522"><b data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Heekyoung Cho</span></b><span data-dcnode-id="1523" instrument_node=""> investigates the meanings and functions that translation generated for modern national literatures during their formative period and reconsiders literature as part of a dynamic translational process of negotiating foreign values. Cho’s study focuses on literary and cultural relations among Russia, Japan, and colonial Korea.</span></p></div></td></tr><tr data-dcnode-id="1501"><td class="number" data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">395.</span></td><td class="jkt" data-dcnode-id="1514"><a data-dcnode-id="1515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674970526" title="Itineraries of Power: Texts and Traversals in Heian and Medieval Japan"><img alt="Cover: Itineraries of Power: Texts and Traversals in Heian and Medieval Japan" data-dcnode-id="1516" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674970526-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="1502"><p class="title" data-dcnode-id="1511"><a data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674970526"><span data-dcnode-id="1513" instrument_node="">Itineraries of Power: Texts and Traversals in Heian and Medieval Japan</span></a></p><p class="author" data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Kawashima, Terry</span></p><div class="desc" data-dcnode-id="1503"><p data-dcnode-id="1504"><span data-dcnode-id="1508" instrument_node="">Movements of people—through migration, exile, and diaspora—are central to understanding power relationships in Japan 900–1400. But what of more literary moves: texts with abrupt genre leaps or poetic figures that flatten distances? </span><b data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Terry Kawashima</span><
