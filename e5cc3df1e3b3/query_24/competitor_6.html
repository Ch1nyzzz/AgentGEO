 data-dcnode-id="640" instrument_node="">Steven B. Miles</span></b><span data-dcnode-id="638" instrument_node=""> situates the Cantonese upriver and overseas migration within the same framework, thus reconceiving the late Qing as an age of Cantonese diasporic expansion rather than one of state decline.</span></p></div></td></tr><tr data-dcnode-id="617"><td class="number" data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">442.</span></td><td class="jkt" data-dcnode-id="629"><a data-dcnode-id="630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674260139" title="Chiang Kai-shek’s Politics of Shame: Leadership, Legacy, and National Identity in China"><img alt="Cover: Chiang Kai-shek’s Politics of Shame: Leadership, Legacy, and National Identity in China" data-dcnode-id="631" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674260139-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="618"><p class="title" data-dcnode-id="626"><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674260139"><span data-dcnode-id="628" instrument_node="">Chiang Kai-shek’s Politics of Shame: Leadership, Legacy, and National Identity in China</span></a></p><p class="author" data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Huang, Grace C.</span></p><div class="desc" data-dcnode-id="619"><p data-dcnode-id="620"><b data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Grace C. Huang</span></b><span data-dcnode-id="621" instrument_node=""> reconsiders Chiang Kai-shek’s leadership and legacy in an intriguing new portrait of this twentieth-century leader. Comparing his response to imperialism to those of Mao, Yuan Shikai, and Mahatma Gandhi, Huang widens the implications of her findings to explore alternatives to Western expressions of nationalism and modernity.</span></p></div></td></tr><tr data-dcnode-id="596"><td class="number" data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">443.</span></td><td class="jkt" data-dcnode-id="612"><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674260153" title="Karma and Punishment: Prison Chaplaincy in Japan"><img alt="Cover: Karma and Punishment: Prison Chaplaincy in Japan" data-dcnode-id="614" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674260153-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="597"><p class="title" data-dcnode-id="609"><a data-dcnode-id="610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674260153"><span data-dcnode-id="611" instrument_node="">Karma and Punishment: Prison Chaplaincy in Japan</span></a></p><p class="author" data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Lyons, Adam J.</span></p><div class="desc" data-dcnode-id="598"><p data-dcnode-id="599"><span data-dcnode-id="606" instrument_node="">A groundbreaking study of prison religion, </span><i data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Karma and Punishment</span></i><span data-dcnode-id="603" instrument_node=""> introduces a form of chaplaincy rooted in the Buddhist concept of doctrinal admonition. Through research and fieldwork, </span><b data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Adam Lyons</span></b><span data-dcnode-id="600" instrument_node=""> uncovers a dimension of Buddhist modernism that developed as Japan’s religious organizations carved out a niche as defenders of society by fighting crime.</span></p></div></td></tr><tr data-dcnode-id="579"><td class="number" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">444.</span></td><td class="jkt" data-dcnode-id="591"><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674260245" title="Chinese Asianism, 1894–1945"><img alt="Cover: Chinese Asianism, 1894–1945" data-dcnode-id="593" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674260245-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="580"><p class="title" data-dcnode-id="588"><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674260245"><span data-dcnode-id="590" instrument_node="">Chinese Asianism, 1894–1945</span></a></p><p class="author" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Smith, Craig A.</span></p><div class="desc" data-dcnode-id="581"><p data-dcnode-id="582"><i data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Chinese Asianism</span></i><span data-dcnode-id="583" instrument_node=""> analyzes Chinese views of East Asian solidarity in light of Chinese nationalism and Sino–Japanese relations. Advocates of Asianism packaged Asia for their own agendas, often by translating and interpreting Japanese perspectives. As China now plays a central role in East Asian development, Asianism is once again of great importance.</span></p></div></td></tr><tr data-dcnode-id="559"><td class="number" data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">445.</span></td><td class="jkt" data-dcnode-id="574"><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674260160" title="Uncertain Powers: Sen’yōmon-in and Landownership by Royal Women in Early Medieval Japan"><img alt="Cover: Uncertain Powers: Sen’yōmon-in and Landownership by Royal Women in Early Medieval Japan" data-dcnode-id="576" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674260160-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="560"><p class="title" data-dcnode-id="571"><a data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674260160"><span data-dcnode-id="573" instrument_node="">Uncertain Powers: Sen’yōmon-in and Landownership by Royal Women in Early Medieval Japan</span></a></p><p class="author" data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Kawai, Sachiko</span></p><div class="desc" data-dcnode-id="561"><p data-dcnode-id="562"><i data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Uncertain Powers</span></i><span data-dcnode-id="566" instrument_node=""> presents a nuanced study of female leadership in medieval Japan. </span><b data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Sachiko Kawai</span></b><span data-dcnode-id="563" instrument_node=""> explores the important political and economic roles of twelfth- and thirteenth-century Japanese royal women who, confronted with social factors and gender disparities, transformed authority into power by means of cooperation, persuasion, compromise and coercion.</span></p></div></td></tr><tr data-dcnode-id="542"><td class="number" data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">446.</span></td><td class="jkt" data-dcnode-id="554"><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674267947" title="Transmedial Landscapes and Modern Chinese Painting"><img alt="Cover: Transmedial Landscapes and Modern Chinese Painting" data-dcnode-id="556" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674267947-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="543"><p class="title" data-dcnode-id="551"><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674267947"><span data-dcnode-id="553" instrument_node="">Transmedial Landscapes and Modern Chinese Painting</span></a></p><p class="author" data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Noth, Juliane</span></p><div class="desc" data-dcnode-id="544"><p data-dcnode-id="545"><b data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Juliane Noth</span></b><span data-dcnode-id="546" instrument_node=""> shows how art and discussions about the future of ink painting were linked to the reshaping of the country, leading to the creation of a uniquely modern Chinese landscape imagery. Noth offers a new understanding of these experiments by studying them as transmedial practice, at once shaped by and integral to the modern global art world.</span></p></div></td></tr><tr data-dcnode-id="525"><td class="number" data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">447.</span></td><td class="jkt" data-dcnode-id="537"><a data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674267916" title="The Afterlife of Toyotomi Hideyoshi: Historical Fiction and Popular Culture in Japan"><img alt="Cover: The Afterlife of Toyotomi Hideyoshi: Historical Fiction and Popular Culture in Japan" data-dcnode-id="539" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674267916-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="526"><p class="title" data-dcnode-id="534"><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674267916"><span data-dcnode-id="536" instrument_node="">The Afterlife of Toyotomi Hideyoshi: Historical Fiction and Popular Culture in Japan</span></a></p><p class="author" data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Furukawa, Susan Westhafer</span></p><div class="desc" data-dcnode-id="527"><p data-dcnode-id="528"><i data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">The Afterlife of Toyotomi Hideyoshi</span></i><span data-dcnode-id="529" instrument_node=""> explores how sixteenth-century samurai leader Toyotomi Hideyoshi’s continued and evolving presence in popular culture in twentieth- and twenty-first-century Japan changes with the needs of the current era, and in the process expands our understanding of the powerful role that historical narratives play in Japan.</span></p></div></td></tr><tr data-dcnode-id="510"><td class="number" data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">448.</span></td><td class="jkt" data-dcnode-id="520"><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674267961" title="Legal Scholars and Scholarship in the People’s Republic of China: The First Generation, 1949–1992"><img alt="Cover: Legal Scholars and Scholarship in the People’s Republic of China: The First Generation, 1949–1992" data-dcnode-id="522" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674267961-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="511"><p class="title" data-dcnode-id="517"><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674267961"><span data-dcnode-id="519" instrument_node="">Legal Scholars and Scholarship in the People’s Republic of China: The First Generation, 1949–1992</span></a></p><p class="author" data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Zhang, Nongji</span></p><div class="desc" data-dcnode-id="512"><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">A comprehensive introduction to Chinese legal scholarship and the scholars who developed the new Communist legal system during the initial decades of the PRC when the old system was abolished by the newly established Communist government. Through their scholarship, we see where the field of Chinese legal studies came from and where it is going.</span></p></div></td></tr><tr data-dcnode-id="489"><td class="number" data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">449.</span></td><td class="jkt" data-dcnode-id="505"><a data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674267978" title="Cine-Mobility: Twentieth-Century Transformations in Korea’s Film and Transportation"><img alt="Cover: Cine-Mobility: Twentieth-Century Transformations in Korea’s Film and Transportation" data-dcnode-id="507" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674267978-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="490"><p class="title" data-dcnode-id="502"><a data-dcnode-id="503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674267978"><span data-dcnode-id="504" instrument_node="">Cine-Mobility: Twentieth-Century Transformations in Korea’s Film and Transportation</span></a></p><p class="author" data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Kim, Han Sang</span></p><div class="desc" data-dcnode-id="491"><p data-dcnode-id="492"><span data-dcnode-id="499" instrument_node="">In </span><i data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Cine-Mobility</span></i><span data-dcnode-id="496" instrument_node="">, </span><b data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Han Sang Kim</span></b><span data-dcnode-id="493" instrument_node=""> argues that the force of propaganda films in Korea was derived primarily from the new mobility afforded by transportation. Kim explores the association between cinematic media and transportation mobility, and its connection with the new culture of mobility, including changes in gender dynamics, that accompanied it.</span></p></div></td></tr><tr data-dcnode-id="474"><td class="number" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">450.</span></td><td class="jkt" data-dcnode-id="484"><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674267909" title="Confluence and Conflict: Reading Transwar Japanese Literature and Thought"><img alt="Cover: Confluence and Conflict: Reading Transwar Japanese Literature and Thought" data-dcnode-id="486" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674267909-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="475"><p class="title" data-dcnode-id="481"><a data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674267909"><span data-dcnode-id="483" instrument_node="">Confluence and Conflict: Reading Transwar Japanese Literature and Thought</span></a></p><p class="author" data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Hurley, Brian</span></p><div class="desc" data-dcnode-id="476"><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Writers and intellectuals in modern Japan have long forged dialogues across the boundaries separating the spheres of literature and thought. This book explores some of their most provocative connections in the volatile years of the 1920s to 1950s, revealing unexpected intersections of literature, ideas, and politics in a global transwar context.</span></p></div></td></tr><tr data-dcnode-id="453"><td class="number" data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">451.</span></td><td class="jkt" data-dcnode-id="469"><a data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674270978" title="Asia and Postwar Japan: Deimperialization, Civic Activism, and National Identity"><img alt="Cover: Asia and Postwar Japan: Deimperialization, Civic Activism, and National Identity" data-dcnode-id="471" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674270978-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="454"><p class="title" data-dcnode-id="466"><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674270978"><span data-dcnode-id="468" instrument_node="">Asia and Postwar Japan: Deimperialization, Civic Activism, and National Identity</span></a></p><p class="author" data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Avenell, Simon</span></p><div class="desc" data-dcnode-id="455"><p data-dcnode-id="456"><span data-dcnode-id="463" instrument_node="">Defeat in World War II profoundly shaped how the Japanese reconstructed national identity and reengaged with Asia. In </span><i data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Asia and Postwar Japan</span></i><span data-dcnode-id="460" instrument_node="">, </span><b data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Simon Avenell</span></b><span data-dcnode-id="457" instrument_node=""> reveals the critical importance of Asia in Japanese thought, activism, and politics—as a symbolic geography, as a space for grassroots engagement, and as the source of a new politics of hope.</span></p></div></td></tr><tr data-dcnode-id="436"><td class="number" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">452.</span></td><td class="jkt" data-dcnode-id="448"><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674270954" title="Uncertainty in the Empire of Routine: The Administrative Revolution of the Eighteenth-Century Qing State"><img alt="Cover: Uncertainty in the Empire of Routine: The Administrative Revolution of the Eighteenth-Century Qing State" data-dcnode-id="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674270954-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="437"><p class="title" data-dcnode-id="445"><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674270954"><span data-dcnode-id="447" instrument_node="">Uncertainty in the Empire of Routine: The Administrative Revolution of the Eighteenth-Century Qing State</span></a></p><p class="author" data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Dykstra, Maura</span></p><div class="desc" data-dcnode-id="438"><p data-dcnode-id="439"><b data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Maura Dykstra</span></b><span data-dcnode-id="440" instrument_node=""> shows how information overload resulting from the administrative revolution of China’s eighteenth-century Qing state led to a discourse of crisis. Slowly but surely, the thicket of imperial standards binding local offices, provincial superiors, and central ministries shifted the very foundations of the state.</span></p></div></td></tr><tr data-dcnode-id="419"><td class="number" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">453.</span></td><td class="jkt" data-dcnode-id="431"><a data-dcnode-id="432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674278257" title="In Close Association: Local Activist Networks in the Making of Japanese Modernity, 1868–1920"><img alt="Cover: In Close Association: Local Activist Networks in the Making of Japanese Modernity, 1868–1920" data-dcnode-id="433" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674278257-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="420"><p class="title" data-dcnode-id="428"><a data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674278257"><span data-dcnode-id="430" instrument_node="">In Close Association: Local Activist Networks in the Making of Japanese Modernity, 1868–1920</span></a></p><p class="author" data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Anderson, Marnie S.</span></p><div class="desc" data-dcnode-id="421"><p data-dcnode-id="422"><i data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">In Close Association</span></i><span data-dcnode-id="423" instrument_node=""> is the first English-language study of the local networks of women and men who built modern Japan in the Meiji period (1868–1912). Placing gender analysis at its core, the book offers fresh perspectives on what women did beyond domestic boundaries, while showing men’s lives, too, were embedded in home and kin.</span></p></div></td></tr><tr data-dcnode-id="398"><td class="number" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">454.</span></td><td class="jkt" data-dcnode-id="414"><a data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674278264" title="Hong Kong Takes Flight: Commercial Aviation and the Making of a Global Hub, 1930s–1998"><img alt="Cover: Hong Kong Takes Flight: Commercial Aviation and the Making of a Global Hub, 1930s–1998" data-dcnode-id="416" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674278264-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="399"><p class="title" data-dcnode-id="411"><a data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674278264"><span data-dcnode-id="413" instrument_node="">Hong Kong Takes Flight: Commercial Aviation and the Making of a Global Hub, 1930s–1998</span></a></p><p class="author" data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Wong, John D.</span></p><div class="desc" data-dcnode-id="400"><p data-dcnode-id="401"><span data-dcnode-id="408" instrument_node="">Commercial aviation took shape in Hong Kong as the city developed into a powerful economy. In </span><i data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Hong Kong Takes Flight</span></i><span data-dcnode-id="405" instrument_node="">, </span><b data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">John Wong</span></b><span data-dcnode-id="402" instrument_node=""> argues that Hong Kong’s development into a regional and global airline hub was not preordained and views the city’s globalization through the prism of its airline industry.</span></p></div></td></tr><tr data-dcnode-id="378"><td class="number" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">455.</span></td><td class="jkt" data-dcnode-id="393"><a data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674278271" title="Remembering Ezra Vogel"><img alt="Cover: Remembering Ezra Vogel" data-dcnode-id="395" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674278271-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="379"><p class="title" data-dcnode-id="390"><a data-dcnode-id="391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674278271"><span data-dcnode-id="392" instrument_node="">Remembering Ezra Vogel</span></a></p><p class="author" data-dcnode-id="386"><span data-dcnode-id="389" instrument_node="">Whyte, Martin K.</span><br data-dcnode-id="388"><span data-dcnode-id="387" instrument_node="">
Brinton, Mary C.</span></p><div class="desc" data-dcnode-id="380"><p data-dcnode-id="381"><span data-dcnode-id="385" instrument_node="">Ezra F. Vogel, one of America’s foremost experts on China and Japan, had a dramatic global impact through his scholarship, mentoring, public policy advice, and institution building. </span><i data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Remembering Ezra Vogel</span></i><span data-dcnode-id="382" instrument_node=""> contains fond reminiscences from 155 diverse contributors, conveying what was so extraordinary about his character and life.</span></p></div></td></tr><tr data-dcnode-id="357"><td class="number" data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">456.</span></td><td class="jkt" data-dcnode-id="373"><a data-dcnode-id="374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674278288" title="Power for a Price: The Purchase of Official Appointments in Qing China"><img alt="Cover: Power for a Price: The Purchase of Official Appointments in Qing China" data-dcnode-id="375" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674278288-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="358"><p class="title" data-dcnode-id="370"><a data-dcnode-id="371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674278288"><span data-dcnode-id="372" instrument_node="">Power for a Price: The Purchase of Official Appointments in Qing China</span></a></p><p class="author" data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Zhang, Lawrence</span></p><div class="desc" data-dcnode-id="359"><p data-dcnode-id="360"><span data-dcnode-id="367" instrument_node="">The Qing dynasty office purchase system (</span><i data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">juanna</span></i><span data-dcnode-id="364" instrument_node="">), which allowed individuals to pay for government appointments, was regarded in traditional Chinese historiography as inherently corrupt and anti-meritocratic. </span><b data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Lawrence Zhang</span></b><span data-dcnode-id="361" instrument_node="">’s groundbreaking study of a broad selection of new archival and other printed evidence contradicts this widely held assessment.</span></p></div></td></tr><tr data-dcnode-id="340"><td class="number" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">457.</span></td><td class="jkt" data-dcnode-id="352"><a data-dcnode-id="353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674278318" title="Building a Nation at War: Transnational Knowledge Networks and the Development of China during and after World War II"><img alt="Cover: Building a Nation at War: Transnational Knowledge Networks and the Development of China during and after World War II" data-dcnode-id="354" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674278318-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="341"><p class="title" data-dcnode-id="349"><a data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674278318"><span data-dcnode-id="351" instrument_node="">Building a Nation at War: Transnational Knowledge Networks and the Development of China during and after World War II</span></a></p><p class="author" data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Greene, J. Megan</span></p><div class="desc" data-dcnode-id="342"><p data-dcnode-id="343"><i data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Building a Nation at War</span></i><span data-dcnode-id="344" instrument_node=""> argues that the Chinese Nationalist government’s retreat inland during the Sino–Japanese War, its consequent need for inland resources, and its participation in new relationships with the United States led to fundamental changes in how the Nationalists engaged with science and technology as tools to promote development.</span></p></div></td></tr></tbody></table><span data-dcnode-id="336" instrument_node="">
