/chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674780729"><span data-dcnode-id="5548" instrument_node="">Rural Industrialization in China</span></a></p><p class="author" data-dcnode-id="5544"><span data-dcnode-id="5545" instrument_node="">Sigurdson, Jon</span></p><div class="desc" data-dcnode-id="5541"><p data-dcnode-id="5542"><span data-dcnode-id="5543" instrument_node="">Small-scale industries in rural areas in China are today an essential element of regional development programs. This monograph analyzes two main development strategies. One involves technology choices in a number of industrial sectors, most of which were initiated during the Great Leap Forward in the late fifties. The other approach is the integrated rural development strategy where a number of activities are integrated within or closely related to the commune system.</span></p></div></td></tr><tr data-dcnode-id="5522"><td class="number" data-dcnode-id="5537"><span data-dcnode-id="5538" instrument_node="">75.</span></td><td class="jkt" data-dcnode-id="5534"><a data-dcnode-id="5535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674405813" title="The Home Base of American China Missions, 1880–1920"><img alt="Cover: The Home Base of American China Missions, 1880–1920" data-dcnode-id="5536" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/missing_jacket-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5523"><p class="title" data-dcnode-id="5531"><a data-dcnode-id="5532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674405813"><span data-dcnode-id="5533" instrument_node="">The Home Base of American China Missions, 1880–1920</span></a></p><p class="author" data-dcnode-id="5529"><span data-dcnode-id="5530" instrument_node="" ta-dcnode-id="5399"><p class="title" data-dcnode-id="5403"><a data-dcnode-id="5404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674471924"><span data-dcnode-id="5405" instrument_node="">Japan’s Local Pragmatists: The Transition from Bakumatsu to Meiji in the Kawasaki Region</span></a></p><p class="author" data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">Waters, Neil L.</span></p><div class="desc" data-dcnode-id="5400"></div></td></tr><tr data-dcnode-id="5381"><td class="number" data-dcnode-id="5396"><span data-dcnode-id="5397" instrument_node="">106.</span></td><td class="jkt" data-dcnode-id="5393"><a data-dcnode-id="5394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674301474" title="Financial Development in Korea, 1945–1978"><img alt="Cover: Financial Development in Korea, 1945–1978" data-dcnode-id="5395" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674301474-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5382"><p class="title" data-dcnode-id="5390"><a data-dcnode-id="5391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674301474"><span data-dcnode-id="5392" instrument_node="">Financial Development in Korea, 1945–1978</span></a></p><p class="author" data-dcnode-id="5386"><span data-dcnode-id="5389" instrument_node="">Cole, David C.</span><br data-dcnode-id="5388"><span data-dcnode-id="5387" instrument_node="">
Park, Yung Chul</span></p><div class="desc" data-dcnode-id="5383"><p data-dcnode-id="5384"><span data-dcnode-id="5385" instrument_node="">The ninth title in the series Studies in the Modernization of the Republic of Korea offers new insights into the role of finance in a rapidly developing country. Combining history and theory, it provides a rigorous test of previous theoretical propositions and illustrates the danger of easy generalization from partial evidence.</span></p></div></td></tr><tr data-dcnode-id="5362"><td class="number" data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node="">107.</span></td><td class="jkt" data-dcnode-id="5376"><a data-dcnode-id="5377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674722330" title="Public Finance During the Korean Modernization Process"><img alt="Cover: Public Finance During the Korean Modernization Process" data-dcnode-id="5378" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674722330-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5363"><p class="title" data-dcnode-id="5373"><a data-dcnode-id="5374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674722330"><span data-dcnode-id="5375" instrument_node="">Public Finance During the Korean Modernization Process</span></a></p><p class="author" data-dcnode-id="5367"><span data-dcnode-id="5372" instrument_node="">Bahl, Roy</span><br data-dcnode-id="5371"><span data-dcnode-id="5370" instrument_node="">
Kim, Chuk Kyo</span><br data-dcnode-id="5369"><span data-dcnode-id="5368" instrument_node="">
Park, Chong Kee</span></p><div class="desc" data-dcnode-id="5364"><p data-dcnode-id="5365"><span data-dcnode-id="5366" instrument_node="">This final volume in the series Studies in the Modernization of the Republic of Korea, 1945–1975, is an analysis of the contribution of tax and expenditure policy to Korea’s rapid economic development during the 1953–1975 period. The results of the analysis show that Korea did not follow the traditional path of a steadily increasing tax effort, reliance on direct taxes, and emphasis on income distribution. Instead, through improved tax administration and expenditure control, the savings rate was increased dramatically.</span></p></div></td></tr><tr data-dcnode-id="5347"><td class="number" data-dcnode-id="5360"><span data-dcnode-id="5361" instrument_node="">117.</span></td><td class="jkt" data-dcnode-id="5357"><a data-dcnode-id="5358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674271319" title="The Evolution of Labor Relations in Japan: Heavy Industry, 1853–1955"><img alt="Cover: The Evolution of Labor Relations in Japan: Heavy Industry, 1853–1955" data-dcnode-id="5359" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/missing_jacket-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5348"><p class="title" data-dcnode-id="5354"><a data-dcnode-id="5355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674271319"><span data-dcnode-id="5356" instrument_node="">The Evolution of Labor Relations in Japan: Heavy Industry, 1853–1955</span></a></p><p class="author" data-dcnode-id="5352"><span data-dcnode-id="5353" instrument_node="">Gordon, Andrew</span></p><div class="desc" data-dcnode-id="5349"><p data-dcnode-id="5350"><span data-dcnode-id="5351" instrument_node="">The century-long process by which a distinct pattern of Japanese labor relations evolved is traced through the often turbulent interactions of workers, managers, and, at times, government bureaucrats and politicians. The author argues that it was not until the 1940s and 1950s that something closely akin to the contemporary pattern emerged.</span></p></div></td></tr><tr data-dcnode-id="5334"><td class="number" data-dcnode-id="5345"><span data-dcnode-id="5346" instrument_node="">123.</span></td><td class="jkt" data-dcnode-id="5342"><a data-dcnode-id="5343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674175433" title="The Country of Streams and Grottoes: Expansion, Settlement, and the Civilizing of the Sichuan Frontier in Song Times"><img alt="Cover: The Country of Streams and Grottoes: Expansion, Settlement, and the Civilizing of the Sichuan Frontier in Song Times" data-dcnode-id="5344" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/missing_jacket-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5335"><p class="title" data-dcnode-id="5339"><a data-dcnode-id="5340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674175433"><span data-dcnode-id="5341" instrument_node="">The Country of Streams and Grottoes: Expansion, Settlement, and the Civilizing of the Sichuan Frontier in Song Times</span></a></p><p class="author" data-dcnode-id="5337"><span data-dcnode-id="5338" instrument_node="">von Glahn, Richard</span></p><div class="desc" data-dcnode-id="5336"></div></td></tr><tr data-dcnode-id="5310"><td class="number" data-dcnode-id="5332"><span data-dcnode-id="5333" instrument_node="">126.</span></td><td class="jkt" data-dcnode-id="5329"><a data-dcnode-id="5330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674040373" title="Anti-Foreignism and Western Learning in Early Modern Japan: The New Theses of 1825"><img alt="Cover: Anti-Foreignism and Western Learning in Early Modern Japan: The New Theses of 1825" data-dcnode-id="5331" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674040373-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5311"><p class="title" data-dcnode-id="5326"><a data-dcnode-id="5327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674040373"><span data-dcnode-id="5328" instrument_node="">Anti-Foreignism and Western Learning in Early Modern Japan: The New Theses of 1825</span></a></p><p class="author" data-dcnode-id="5324"><span data-dcnode-id="5325" instrument_node="">Wakabayashi, Bob Tadashi</span></p><div class="desc" data-dcnode-id="5312"><p data-dcnode-id="5313"><span data-dcnode-id="5323" instrument_node="">This study analyzes </span><i data-dcnode-id="5321"><span data-dcnode-id="5322" instrument_node="">New Theses</span></i><span data-dcnode-id="5320" instrument_node=""> (</span><i data-dcnode-id="5318"><span data-dcnode-id="5319" instrument_node="">Shinron</span></i><span data-dcnode-id="5317" instrument_node="">) by Aizawa Seishisai (1781–1863) and its contribution to Japanese political thought and policy during the early modern era. </span><i data-dcnode-id="5315"><span data-dcnode-id="5316" instrument_node="">New Theses</span></i><span data-dcnode-id="5314" instrument_node=""> is found to be indispensable to our understanding of Japan’s transformation from a feudal to a modern state.</span></p></div></td></tr><tr data-dcnode-id="5295"><td class="number" data-dcnode-id="5308"><span data-dcnode-id="5309" instrument_node="">127.</span></td><td class="jkt" data-dcnode-id="5305"><a data-dcnode-id="5306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674451254" title="Individualism and Socialism: The Life and Thought of Kawai Eijirō (1891–1944)"><img alt="Cover: Individualism and Socialism: The Life and Thought of Kawai Eijirō (1891–1944)" data-dcnode-id="5307" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674451254-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5296"><p class="title" data-dcnode-id="5302"><a data-dcnode-id="5303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674451254"><span data-dcnode-id="5304" instrument_node="">Individualism and Socialism: The Life and Thought of Kawai Eijirō (1891–1944)</span></a></p><p class="author" data-dcnode-id="5300"><span data-dcnode-id="5301" instrument_node="">Hirai, Atsuko</span></p><div class="desc" data-dcnode-id="5297"><p data-dcnode-id="5298"><span data-dcnode-id="5299" instrument_node="">Kawai Eijirō was a controversial figure in Japan during the interwar years. Dedicated to the idea that the socialist aspiration for economic equality could be combined with a classical liberal commitment to individual political and civil rights, he antagonized both Marxists and Japanese nationalists. This is the first study of Kawai in English.</span></p></div></td></tr><tr data-dcnode-id="5280"><td class="number" data-dcnode-id="5293"><span data-dcnode-id="5294" instrument_node="">131.</span></td><td class="jkt" data-dcnode-id="5290"><a data-dcnode-id="5291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674512979" title="A Latterday Confucian: Reminiscences of William Hung (1893–1980)"><img alt="Cover: A Latterday Confucian: Reminiscences of William Hung (1893–1980)" data-dcnode-id="5292" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/missing_jacket-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5281"><p class="title" data-dcnode-id="5287"><a data-dcnode-id="5288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674512979"><span data-dcnode-id="5289" instrument_node="">A Latterday Confucian: Reminiscences of William Hung (1893–1980)</span></a></p><p class="author" data-dcnode-id="5285"><span data-dcnode-id="5286" instrument_node="">Egan, Susan Chan</span></p><div class="desc" data-dcnode-id="5282"><p data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">William Hung was instrumental in opening China’s rich documentary past to modern scrutiny, and he helped shape one of 20th-century China’s remarkable Yenching University. In 1978, he began recalling his life to the author in weekly taping sessions. His reminiscences encompass the issues and dilemmas faced by Chinese intellectuals of his period.</span></p></div></td></tr><tr data-dcnode-id="5263"><td class="number" data-dcnode-id="5278"><span data-dcnode-id="5279" instrument_node="">139.</span></td><td class="jkt" data-dcnode-id="5275"><a data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674598423" title="Nakae Ushikichi in China: The Mourning of Spirit"><img alt="Cover: Nakae Ushikichi in China: The Mourning of Spirit" data-dcnode-id="5277" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/missing_jacket-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5264"><p class="title" data-dcnode-id="5272"><a data-dcnode-id="5273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674598423"><span data-dcnode-id="5274" instrument_node="">Nakae Ushikichi in China: The Mourning of Spirit</span></a></p><p class="author" data-dcnode-id="5270"><span data-dcnode-id="5271" instrument_node="">Fogel, Joshua A.</span></p><div class="desc" data-dcnode-id="5265"><p data-dcnode-id="5266"><b data-dcnode-id="5268"><span data-dcnode-id="5269" instrument_node="">Fogel</span></b><span data-dcnode-id="5267" instrument_node=""> tells the strange story of this cocky, indolent carouser who became a disciplined scholar and passionate advocate of the worth of all humanity. Fogel examines Nakae’s Sinological work in the context of his wide reading in German philosophy, Western historiography, and classical Chinese sources. He also translates Nakae’s wartime diary.</span></p></div></td></tr><tr data-dcnode-id="5245"><td class="number" data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">140.</span></td><td class="jkt" data-dcnode-id="5258"><a data-dcnode-id="5259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674937215" title="Vietnam and the Chinese Model: A Comparative Study of Nguyen and Ch’ing Civil Government in the First Half of the Nineteenth Century, With a New Preface"><img alt="Cover: Vietnam and the Chinese Model: A Comparative Study of Nguyen and Ch’ing Civil Government in the First Half of the Nineteenth Century, With a New Preface" data-dcnode-id="5260" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674937215-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5246"><p class="title" data-dcnode-id="5255"><a data-dcnode-id="5256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674937215"><span data-dcnode-id="5257" instrument_node="">Vietnam and the Chinese Model: A Comparative Study of Nguyen and Ch’ing Civil Government in the First Half of the Nineteenth Century, With a New Preface</span></a></p><p class="author" data-dcnode-id="5253"><span data-dcnode-id="5254" instrument_node="">Woodside, Alexander</span></p><div class="desc" data-dcnode-id="5247"><p data-dcnode-id="5248"><span data-dcnode-id="5252" instrument_node="">Here is the first real comparison of the civil governments of two traditional East Asian societies on an institution-by-institution basis. </span><b data-dcnode-id="5250"><span data-dcnode-id="5251" instrument_node="">Woodside</span></b><span data-dcnode-id="5249" instrument_node=""> examines in detail the surviving statutes of both societies in his political and cultural study, a pioneering venture in East Asian comparative history.</span></p></div></td></tr><tr data-dcnode-id="5230"><td class="number" data-dcnode-id="5243"><span data-dcnode-id="5244" instrument_node="">144.</span></td><td class="jkt" data-dcnode-id="5240"><a data-dcnode-id="5241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674156302" title="Computers, Inc.: Japan’s Challenge to IBM"><img alt="Cover: Computers, Inc.: Japan’s Challenge to IBM" data-dcnode-id="5242" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674156302-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5231"><p class="title" data-dcnode-id="5237"><a data-dcnode-id="5238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674156302"><span data-dcnode-id="5239" instrument_node="">Computers, Inc.: Japan’s Challenge to IBM</span></a></p><p class="author" data-dcnode-id="5235"><span data-dcnode-id="5236" instrument_node="">Anchordoguy, Marie</span></p><div class="desc" data-dcnode-id="5232"><p data-dcnode-id="5233"><span data-dcnode-id="5234" instrument_node="">This account of efforts to build a domestic Japanese computer industry is enlivened with quotations from industrial leaders commenting on the stages through which Japan has emerged as a world-class competitor.</span></p></div></td></tr><tr data-dcnode-id="5215"><td class="number" data-dcnode-id="5228"><span data-dcnode-id="5229" instrument_node="">146.</span></td><td class="jkt" data-dcnode-id="5225"><a data-dcnode-id="5226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674390263" title="Hideyoshi"><img alt="Cover: Hideyoshi" data-dcnode-id="5227" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674390263-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5216"><p class="title" data-dcnode-id="5222"><a data-dcnode-id="5223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674390263"><span data-dcnode-id="5224" instrument_node="">Hideyoshi</span></a></p><p class="author" data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">Berry, Mary Elizabeth</span></p><div class="desc" data-dcnode-id="5217"><p data-dcnode-id="5218"><span data-dcnode-id="5219" instrument_node="">Hideyoshi—peasant turned general, military genius, and imperial regent of Japan—is the subject of an immense legendary literature. He is best known for the conquest of Japan’s 16th-century warlords and the invasion of Korea. But his lasting contribution is as governor whose policies shaped Japanese politics for almost 300 years.</span></p></div></td></tr><tr data-dcnode-id="5197"><td class="number" data-dcnode-id="5213"><span data-dcnode-id="5214" instrument_node="">149.</span></td><td class="jkt" data-dcnode-id="5210"><a data-dcnode-id="5211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674594975" title="Muslim Chinese: Ethnic Nationalism in the People’s Republic, Second Edition"><img alt="Cover: Muslim Chinese: Ethnic Nationalism in the People’s Republic, Second Edition" data-dcnode-id="5212" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674594975-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5198"><p class="title" data-dcnode-id="5207"><a data-dcnode-id="5208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674594975"><span data-dcnode-id="5209" instrument_node="">Muslim Chinese: Ethnic Nationalism in the People’s Republic, Second Edition</span></a></p><p class="author" data-dcnode-id="5205"><span data-dcnode-id="5206" instrument_node="">Gladney, Dru C.</span></p><div class="desc" data-dcnode-id="5199"><p data-dcnode-id="5200"><span data-dcnode-id="5204" instrument_node="">This second edition of </span><b data-dcnode-id="5202"><span data-dcnode-id="5203" instrument_node="">Dru Gladney</span></b><span data-dcnode-id="5201" instrument_node="">’s critically acclaimed study of the Muslim population in China includes a new preface by the author, as well as a valuable addendum to the bibliography, already hailed as one of the most extensive listing of modern sources on the Sino-Muslims.</span></p></div></td></tr><tr data-dcnode-id="5180"><td class="number" data-dcnode-id="5195"><span data-dcnode-id="5196" instrument_node="">150.</span></td><td class="jkt" data-dcnode-id="5192"><a data-dcnode-id="5193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674442252" title="Ideas across Cultures: Essays on Chinese Thought in Honor of Benjamin I. Schwartz"><img alt="Cover: Ideas across Cultures: Essays on Chinese Thought in Honor of Benjamin I. Schwartz" data-dcnode-id="5194" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674442252-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5181"><p class="title" data-dcnode-id="5189"><a data-dcnode-id="5190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674442252"><span data-dcnode-id="5191" instrument_node="">Ideas across Cultures: Essays on Chinese Thought in Honor of Benjamin I. Schwartz</span></a></p><p class="author" data-dcnode-id="5185"><span data-dcnode-id="5188" instrument_node="">Cohen, Paul A.</span><br data-dcnode-id="5187"><span data-dcnode-id="5186" instrument_node="">
Goldman, Merle</span></p><div class="desc" data-dcnode-id="5182"><p data-dcnode-id="5183"><span data-dcnode-id="5184" instrument_node="">These essays are by scholars who have studied with Benjamin Schwartz, who taught at Harvard from 1950–1987. Through his teaching and writing, he became a major force in the field of Chinese studies, setting standards—above all in the area of intellectual history—that have been a source of inspiration to students and scholars worldwide.</span></p></div></td></tr><tr data-dcnode-id="5162"><td class="number" data-dcnode-id="5178"><span data-dcnode-id="5179" instrument_node="">152.</span></td><td class="jkt" data-dcnode-id="5175"><a data-dcnode-id="5176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674471948" title="Japanese Marxist: A Portrait of Kawakami Hajime, 1879–1946"><img alt="Cover: Japanese Marxist: A Portrait of Kawakami Hajime, 1879–1946" data-dcnode-id="5177" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/missing_jacket-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5163"><p class="title" data-dcnode-id="5172"><a data-dcnode-id="5173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674471948"><span data-dcnode-id="5174" instrument_node="">Japanese Marxist: A Portrait of Kawakami Hajime, 1879–1946</span></a></p><p class="author" data-dcnode-id="5170"><span data-dcnode-id="5171" instrument_node="">Bernstein, Gail Lee</span></p><div class="desc" data-dcnode-id="5164"><p data-dcnode-id="5165"><span data-dcnode-id="5169" instrument_node="">The heir of a samurai family, an acknowledged authority on economics, a professor at one of Japan’s leading universities, an early popularizer of Marxism in Japan, a Japanese Communist on his own unique terms, and, finally, the author of an autobiography that is a classic of modern Japanese literature, Kawakami Hajime is an important figure in the history of modern Japan. </span><b data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">Bernstein</span></b><span data-dcnode-id="5166" instrument_node=""> provides a portrait of Kawakami’s complex personality as well as a narrative of the context and content of Japanese left-wing politics in the 1920s.</span></p></div></td></tr><tr data-dcnode-id="5144"><td class="number" data-dcnode-id="5160"><span data-dcnode-id="5161" instrument_node="">154.</span></td><td class="jkt" data-dcnode-id="5157"><a data-dcnode-id="5158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674026308" title="American Multinationals and Japan: The Political Economy of Japanese Capital Controls, 1899–1980"><img alt="Cover: American Multinationals and Japan: The Political Economy of Japanese Capital Controls, 1899–1980" data-dcnode-id="5159" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/missing_jacket-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5145"><p class="title" data-dcnode-id="5154"><a data-dcnode-id="5155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674026308"><span data-dcnode-id="5156" instrument_node="">American Multinationals and Japan: The Political Economy of Japanese Capital Controls, 1899–1980</span></a></p><p class="author" data-dcnode-id="5152"><span data-dcnode-id="5153" instrument_node="">Mason, Mark</span></p><div class="desc" data-dcnode-id="5146"><p data-dcnode-id="5147"><span data-dcnode-id="5151" instrument_node="">Drawing on rich historical materials from both sides of the Pacific, including corporate records and government documents never before made public, </span><b data-dcnode-id="5149"><span data-dcnode-id="5150" instrument_node="">Mason</span></b><span data-dcnode-id="5148" instrument_node=""> examines the development of both Japanese policy towards foreign investment and the strategic responses of American corporations.</span></p></div></td></tr><tr data-dcnode-id="5113"><td class="number" data-dcnode-id="5142"><span data-dcnode-id="5143" instrument_node="">155.</span></td><td class="jkt" data-dcnode-id="5139"><a data-dcnode-id="5140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674775305" title="Robert Hart and China’s Early Modernization: His Journals, 1863–1866"><img alt="Cover: Robert Hart and China’s Early Modernization: His Journals, 1863–1866" data-dcnode-id="5141" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/missing_jacket-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5114"><p class="title" data-dcnode-id="5136"><a data-dcnode-id="5137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674775305"><span data-dcnode-id="5138" instrument_node="">Robert Hart and China’s Early Modernization: His Journals, 1863–1866</span></a></p><p class="author" data-dcnode-id="5128"><span data-dcnode-id="5135" instrument_node="">Hart, Robert</span><br data-dcnode-id="5134"><span data-dcnode-id="5133" instrument_node="">
Smith, Richard J.</span><br data-dcnode-id="5132"><span data-dcnode-id="5131" instrument_node="">
Fairbank, John King</span><br data-dcnode-id="5130"><span data-dcnode-id="5129" instrument_node="">
Bruner, Katherine F.</span></p><div class="desc" data-dcnode-id="5115"><p data-dcnode-id="5116"><span data-dcnode-id="5127" instrument_node="">These journal entries continue the sequence begun in </span><a class="external publicationTitle" data-dcnode-id="5125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Entering-Chinas-Service-Journals-Monographs/dp/0674257359"><span data-dcnode-id="5126" instrument_node="">Entering China’s Service</span></a><span data-dcnode-id="5123" instrument_node=""> and cover the years when </span><b data-dcnode-id="5121"><span data-dcnode-id="5122" instrument_node="">Hart</span></b><span data-dcnode-id="5120" instrument_node=""> was setting up Customs procedures, establishing a </span><i data-dcnode-id="5118"><span data-dcnode-id="5119" instrument_node="">modus operandi</span></i><span data-dcnode-id="5117" instrument_node=""> with the Ch’ing bureaucracy, and inspecting the treaty ports. They culminate in Hart’s return visit to Europe with the Pinch’un Mission and his marriage in Northern Ireland.</span></p></div></td></tr><tr data-dcnode-id="5096"><td class="number" data-dcnode-id="5111"><span data-dcnode-id="5112" instrument_node="">157.</span></td><td class="jkt" data-dcnode-id="5108"><a data-dcnode-id="5109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674387041" title="Heavenly Warriors: The Evolution of Japan’s Military, 500–1300"><img alt="Cover: Heavenly Warriors: The Evolution of Japan’s Military, 500–1300" data-dcnode-id="5110" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/missing_jacket-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5097"><p class="title" data-dcnode-id="5105"><a data-dcnode-id="5106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674387041"><span data-dcnode-id="5107" instrument_node="">Heavenly Warriors: The Evolution of Japan’s Military, 500–1300</span></a></p><p class="author" data-dcnode-id="5103"><span data-dcnode-id="5104" instrument_node="">Farris, William Wayne</span></p><div class="desc" data-dcnode-id="5098"><p data-dcnode-id="5099"><i data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node="">Heavenly Warriors</span></i><span data-dcnode-id="5100" instrument_node=""> traces in detail the evolutionary development of weaponry, horsemanship, military organization, and tactics from Japan’s early conflicts with Korea up to the full-blown system of the samurai.</span></p></div></td></tr><tr data-dcnode-id="5079"><td class="number" data-dcnode-id="5094"><span data-dcnode-id="5095" instrument_node="">159.</span></td><td class="jkt" data-dcnode-id="5091"><a data-dcnode-id="5092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674687714" title="Politics and Policy in Traditional Korea"><img alt="Cover: Politics and Policy in Traditional Korea" data-dcnode-id="5093" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674687714-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5080"><p class="title" data-dcnode-id="5088"><a data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674687714"><span data-dcnode-id="5090" instrument_node="">Politics and Policy in Traditional Korea</span></a></p><p class="author" data-dcnode-id="5086"><span data-dcnode-id="5087" instrument_node="">Palais, James B.</span></p><div class="desc" data-dcnode-id="5081"><p data-dcnode-id="5082"><b data-dcnode-id="5084"><span data-dcnode-id="5085" instrument_node="">Palais</span></b><span data-dcnode-id="5083" instrument_node=""> theorizes in his important book on Korea that the remarkable longevity of the Yi dynasty (1392–1910) was related to the difficulties the country experienced in adapting to the modern world. He suggests that the aristocratic and hierarchical social system, which was the source of stability of the dynasty, was also the cause of its weakness.</span></p></div></td></tr><tr data-dcnode-id="5066"><td class="number" data-dcnode-id="5077"><span data-dcnode-id="5078" instrument_node="">161.</span></td><td class="jkt" data-dcnode-id="5074"><a data-dcnode-id="5075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674119734" title="China’s Local Councils in the Age of Constitutional Reform, 1898–1911"><img alt="Cover: China’s Local Councils in the Age of Constitutional Reform, 1898–1911" data-dcnode-id="5076" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674119734-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5067"><p class="title" data-dcnode-id="5071"><a data-dcnode-id="5072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674119734"><span data-dcnode-id="5073" instrument_node="">China’s Local Councils in the Age of Constitutional Reform, 1898–1911</span></a></p><p class="author" data-dcnode-id="5069"><span data-dcnode-id="5070" instrument_node="">Thompson, Roger R.</span></p><div class="desc" data-dcnode-id="5068"></div></td></tr><tr data-dcnode-id="5049"><td class="number" data-dcnode-id="5064"><span data-dcnode-id="5065" instrument_node="">163.</span></td><td class="jkt" data-dcnode-id="5061"><a data-dcnode-id="5062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674081079" title="Breaking Barriers: Travel and the State in Early Modern Japan"><img alt="Cover: Breaking Barriers: Travel and the State in Early Modern Japan" data-dcnode-id="5063" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674081079-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5050"><p class="title" data-dcnode-id="5058"><a data-dcnode-id="5059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674081079"><span data-dcnode-id="5060" instrument_node="">Breaking Barriers: Travel and the State in Early Modern Japan</span></a></p><p class="author" data-dcnode-id="5056"><span data-dcnode-id="5057" instrument_node="">Vaporis, Constantine Nomikos</span></p><div class="desc" data-dcnode-id="5051"><p data-dcnode-id="5052"><b data-dcnode-id="5054"><span data-dcnode-id="5055" instrument_node="">Constantine Vaporis</span></b><span data-dcnode-id="5053" instrument_node=""> challenges the notion that an elaborate and restrictive system of travel regulations in Tokugawa Japan prevented widespread travel. Instead, he maintains that a “culture of movement” developed in that era.</span></p></div></td></tr><tr data-dcnode-id="5029"><td class="number" data-dcnode-id="5047"><span data-dcnode-id="5048" instrument_node="">164.</span></td><td class="jkt" data-dcnode-id="5044"><a data-dcnode-id="5045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674773196" title="Rituals of Self-Revelation: Shishōsetsu as Literary Genre and Socio-Cultural Phenomenon"><img alt="Cover: Rituals of Self-Revelation: Shishōsetsu as Literary Genre and Socio-Cultural Phenomenon" data-dcnode-id="5046" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674773196-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5030"><p class="title" data-dcnode-id="5041"><a data-dcnode-id="5042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674773196"><span data-dcnode-id="5043" instrument_node="">Rituals of Self-Revelation: Shishōsetsu as Literary Genre and Socio-Cultural Phenomenon</span></a></p><p class="author" data-dcnode-id="5039"><span data-dcnode-id="5040" instrument_node="">Hijiya-Kirschnereit, Irmela</span></p><div class="desc" data-dcnode-id="5031"><p data-dcnode-id="5032"><b data-dcnode-id="5037"><span data-dcnode-id="5038" instrument_node="">Irmela Hijiya-Kirschnereit</span></b><span data-dcnode-id="5036" instrument_node=""> brings a sophisticated and graceful method of analysis to this English translation of her book on the </span><i data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">shishōsetsu</span></i><span data-dcnode-id="5033" instrument_node="">, one of the most important yet misunderstood genres in Japanese literature.</span></p></div></td></tr><tr data-dcnode-id="5011"><td class="number" data-dcnode-id="5027"><span data-dcnode-id="5028" instrument_node="">165.</span></td><td class="jkt" data-dcnode-id="5024"><a data-dcnode-id="5025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674564664" title="The Meiji Unification through the Lens of Ishikawa Prefecture"><img alt="Cover: The Meiji Unification through the Lens of Ishikawa Prefecture" data-dcnode-id="5026" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674564664-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="5012"><p class="title" data-dcnode-id="5021"><a data-dcnode-id="5022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674564664"><span data-dcnode-id="5023" instrument_node="">The Meiji Unification through the Lens of Ishikawa Prefecture</span></a></p><p class="author" data-dcnode-id="5019"><span data-dcnode-id="5020" instrument_node="">Baxter, James C.</span></p><div class="desc" data-dcnode-id="5013"><p data-dcnode-id="5014"><span data-dcnode-id="5018" instrument_node="">Credit for the swift unification of Japan following the 1868 overthrow of the Tokugawa shogunate is usually given to the national leaders. </span><b data-dcnode-id="5016"><span data-dcnode-id="5017" instrument_node="">Baxter</span></b><span data-dcnode-id="5015" instrument_node=""> argues that brilliant leadership at the top is not sufficient to explain how regional separatist tendencies and loyalties to the old lords were overcome in the formation of a nationally unified state.</span></p></div></td></tr><tr data-dcnode-id="4993"><td class="number" data-dcnode-id="5009"><span data-dcnode-id="5010" instrument_node="">167.</span></td><td class="jkt" data-dcnode-id="5006"><a data-dcnode-id="5007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674796744" title="The Secret Window: Ideal Worlds in Tanizaki’s Fiction"><img alt="Cover: The Secret Window: Ideal Worlds in Tanizaki’s Fiction" data-dcnode-id="5008" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674796744-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4994"><p class="title" data-dcnode-id="5003"><a data-dcnode-id="5004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674796744"><span data-dcnode-id="5005" instrument_node="">The Secret Window: Ideal Worlds in Tanizaki’s Fiction</span></a></p><p class="author" data-dcnode-id="5001"><span data-dcnode-id="5002" instrument_node="">Chambers, Anthony Hood</span></p><div class="desc" data-dcnode-id="4995"><p data-dcnode-id="4996"><span data-dcnode-id="5000" instrument_node="">In this series of meditations on seven of Tanizaki Jun’ichiro’s novels and novellas, the renowned translator </span><b data-dcnode-id="4998"><span data-dcnode-id="4999" instrument_node="">Anthony Chambers</span></b><span data-dcnode-id="4997" instrument_node=""> focuses on the thread of fantasy that Tanizaki weaves throughout his work. He examines Tanizaki’s subtle use of storytelling devices to evoke his characters’ alternate sense of reality and to encourage the reader’s participation in their fantasies.</span></p></div></td></tr><tr data-dcnode-id="4975"><td class="number" data-dcnode-id="4991"><span data-dcnode-id="4992" instrument_node="">169.</span></td><td class="jkt" data-dcnode-id="4988"><a data-dcnode-id="4989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674502550" title="Kenmu: Go–Daigo's Revolution"><img alt="Cover: Kenmu: Go–Daigo's Revolution" data-dcnode-id="4990" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674502550-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4976"><p class="title" data-dcnode-id="4985"><a data-dcnode-id="4986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674502550"><span data-dcnode-id="4987" instrument_node="">Kenmu: Go–Daigo's Revolution</span></a></p><p class="author" data-dcnode-id="4983"><span data-dcnode-id="4984" instrument_node="">Goble, Andrew Edmund</span></p><div class="desc" data-dcnode-id="4977"><p data-dcnode-id="4978"><span data-dcnode-id="4982" instrument_node="">The short-lived Kenmu regime (1333–1336) of Japanese Emperor Go-Daigo is often seen as an inevitably doomed, revanchist attempt to shore up the old aristocratic order. But far from resisting change, </span><b data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">Goble</span></b><span data-dcnode-id="4979" instrument_node=""> here forcefully argues, the flamboyant Go-Daigo and his associates sought to overcome the old order and renegotiate its structure and ethos.</span></p></div></td></tr><tr data-dcnode-id="4957"><td class="number" data-dcnode-id="4973"><span data-dcnode-id="4974" instrument_node="">170.</span></td><td class="jkt" data-dcnode-id="4970"><a data-dcnode-id="4971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674007819" title="In Pursuit of Status: The Making of South Korea’s “New” Urban Middle Class"><img alt="Cover: In Pursuit of Status: The Making of South Korea’s “New” Urban Middle Class" data-dcnode-id="4972" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674007819-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4958"><p class="title" data-dcnode-id="4967"><a data-dcnode-id="4968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674007819"><span data-dcnode-id="4969" instrument_node="">In Pursuit of Status: The Making of South Korea’s “New” Urban Middle Class</span></a></p><p class="author" data-dcnode-id="4965"><span data-dcnode-id="4966" instrument_node="">Lett, Denise Potrzeba</span></p><div class="desc" data-dcnode-id="4959"><p data-dcnode-id="4960"><span data-dcnode-id="4964" instrument_node="">In this ethnography of the everyday life of contemporary Korea, </span><b data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">Denise Lett</span></b><span data-dcnode-id="4961" instrument_node=""> argues that South Korea’s contemporary urban middle class not only exhibits upper-class characteristics but also that this reflects a culturally inherited disposition of Koreans to seek high status.</span></p></div></td></tr><tr data-dcnode-id="4942"><td class="number" data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">171.</span></td><td class="jkt" data-dcnode-id="4952"><a data-dcnode-id="4953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674392052" title="Hiraizumi: Buddhist Art and Regional Politics in Twelfth-Century Japan"><img alt="Cover: Hiraizumi: Buddhist Art and Regional Politics in Twelfth-Century Japan" data-dcnode-id="4954" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674392052-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4943"><p class="title" data-dcnode-id="4949"><a data-dcnode-id="4950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674392052"><span data-dcnode-id="4951" instrument_node="">Hiraizumi: Buddhist Art and Regional Politics in Twelfth-Century Japan</span></a></p><p class="author" data-dcnode-id="4947"><span data-dcnode-id="4948" instrument_node="">Yiengpruksawan, Mimi Hall</span></p><div class="desc" data-dcnode-id="4944"><p data-dcnode-id="4945"><span data-dcnode-id="4946" instrument_node="">In the twelfth century, along the borders of the Japanese state in northern Honshu, three generations of local rulers built a capital city at Hiraizumi that became a major military and commercial center. Known as the Hiraizumi Fujiwara, these rulers created a city filled with art, in an attempt to use the power of art and architecture to claim a religious and political mandate. In the first book-length study of Hiraizumi in English, the author studies the rise of the Hiraizumi Fujiwara and analyzes their remarkable construction program. </span></p></div></td></tr><tr data-dcnode-id="4927"><td class="number" data-dcnode-id="4940"><span data-dcnode-id="4941" instrument_node="">173.</span></td><td class="jkt" data-dcnode-id="4937"><a data-dcnode-id="4938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674768949" title="Riding the Black Ship: Japan and Tokyo Disneyland"><img alt="Cover: Riding the Black Ship: Japan and Tokyo Disneyland" data-dcnode-id="4939" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674768949-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4928"><p class="title" data-dcnode-id="4934"><a data-dcnode-id="4935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674768949"><span data-dcnode-id="4936" instrument_node="">Riding the Black Ship: Japan and Tokyo Disneyland</span></a></p><p class="author" data-dcnode-id="4932"><span data-dcnode-id="4933" instrument_node="">Raz, Aviad E.</span></p><div class="desc" data-dcnode-id="4929"><p data-dcnode-id="4930"><span data-dcnode-id="4931" instrument_node="">Since it opened in 1983, Tokyo Disneyland has been analyzed mainly as an example of the globalization of the American leisure industry and its organizational culture, particularly the "company manual." By looking at how Tokyo Disneyland is experienced by employees, management, and visitors, Aviad Raz shows that rather than being an agent of Americanization, Tokyo Disneyland is a simulated "America" showcased by and for the Japanese. It is an "America" with a Japanese meaning.</span></p></div></td></tr><tr data-dcnode-id="4912"><td class="number" data-dcnode-id="4925"><span data-dcnode-id="4926" instrument_node="">175.</span></td><td class="jkt" data-dcnode-id="4922"><a data-dcnode-id="4923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674472570" title="Japanese Cultural Policy toward China, 1918–1931: A Comparative Perspective"><img alt="Cover: Japanese Cultural Policy toward China, 1918–1931: A Comparative Perspective" data-dcnode-id="4924" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674472570-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4913"><p class="title" data-dcnode-id="4919"><a data-dcnode-id="4920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674472570"><span data-dcnode-id="4921" instrument_node="">Japanese Cultural Policy toward China, 1918–1931: A Comparative Perspective</span></a></p><p class="author" data-dcnode-id="4917"><span data-dcnode-id="4918" instrument_node="">Teow, See Heng</span></p><div class="desc" data-dcnode-id="4914"><p data-dcnode-id="4915"><span data-dcnode-id="4916" instrument_node="">Most scholarship on Japan’s cultural policy toward modern China reflects the paradigm of cultural imperialism. In contrast, this study demonstrates that Japan was mindful of Chinese opinion and sought the cooperation of the Chinese government. China, however, actively sought to redirect this policy to serve its national interests and aspirations.</span></p></div></td></tr><tr data-dcnode-id="4899"><td class="number" data-dcnode-id="4910"><span data-dcnode-id="4911" instrument_node="">176.</span></td><td class="jkt" data-dcnode-id="4907"><a data-dcnode-id="4908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017269" title="An Introduction to Literary Chinese: Revised Edition"><img alt="Cover: An Introduction to Literary Chinese: Revised Edition" data-dcnode-id="4909" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674017269-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4900"><p class="title" data-dcnode-id="4904"><a data-dcnode-id="4905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674017269"><span data-dcnode-id="4906" instrument_node="">An Introduction to Literary Chinese: Revised Edition</span></a></p><p class="author" data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node="">Fuller, Michael A.</span></p><div class="desc" data-dcnode-id="4901"></div></td></tr><tr data-dcnode-id="4884"><td class="number" data-dcnode-id="4897"><span data-dcnode-id="4898" instrument_node="">177.</span></td><td class="jkt" data-dcnode-id="4894"><a data-dcnode-id="4895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674005075" title="War and National Reinvention: Japan in the Great War, 1914-1919"><img alt="Cover: War and National Reinvention: Japan in the Great War, 1914-1919" data-dcnode-id="4896" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674005075-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4885"><p class="title" data-dcnode-id="4891"><a data-dcnode-id="4892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674005075"><span data-dcnode-id="4893" instrument_node="">War and National Reinvention: Japan in the Great War, 1914-1919</span></a></p><p class="author" data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">Dickinson, Frederick R.</span></p><div class="desc" data-dcnode-id="4886"><p data-dcnode-id="4887"><span data-dcnode-id="4888" instrument_node="">This study links two sets of concerns—the focus of recent studies of the nation on language, culture, education, and race; and the emphasis of diplomatic history on international developments—to show how political, diplomatic, and cultural concerns work together to shape national identity.</span></p></div></td></tr><tr data-dcnode-id="4869"><td class="number" data-dcnode-id="4882"><span data-dcnode-id="4883" instrument_node="">178.</span></td><td class="jkt" data-dcnode-id="4879"><a data-dcnode-id="4880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674060746" title="Shredding the Tapestry of Meaning: The Poetry and Poetics of Kitasono Katue (1902–1978)"><img alt="Cover: Shredding the Tapestry of Meaning: The Poetry and Poetics of Kitasono Katue (1902–1978)" data-dcnode-id="4881" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674060746-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4870"><p class="title" data-dcnode-id="4876"><a data-dcnode-id="4877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674060746"><span data-dcnode-id="4878" instrument_node="">Shredding the Tapestry of Meaning: The Poetry and Poetics of Kitasono Katue (1902–1978)</span></a></p><p class="author" data-dcnode-id="4874"><span data-dcnode-id="4875" instrument_node="">Solt, John</span></p><div class="desc" data-dcnode-id="4871"><p data-dcnode-id="4872"><span data-dcnode-id="4873" instrument_node="">Kitasono Katue was a leading avant-garde literary figure, first in Japan and then throughout the world, from the 1920s to the 1970s. He was instrumental in creating Japanese-language work influenced by futurism, dadaism, and surrealism. This critical biography examines the life, poetry, and poetics of this controversial and flamboyant figure.</span></p></div></td></tr><tr data-dcnode-id="4852"><td class="number" data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">179.</span></td><td class="jkt" data-dcnode-id="4864"><a data-dcnode-id="4865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674472907" title="Japan’s Protoindustrial Elite: The Economic Foundations of the <i>Gōnō</i>"><img alt="Cover: Japan’s Protoindustrial Elite: The Economic Foundations of the <i>Gōnō</i>" data-dcnode-id="4866" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674472907-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4853"><p class="title" data-dcnode-id="4859"><a data-dcnode-id="4860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674472907"><span data-dcnode-id="4863" instrument_node="">Japan’s Protoindustrial Elite: The Economic Foundations of the </span><i data-dcnode-id="4861"><span data-dcnode-id="4862" instrument_node="">Gōnō</span></i></a></p><p class="author" data-dcnode-id="4857"><span data-dcnode-id="4858" instrument_node="">Pratt, Edward E.</span></p><div class="desc" data-dcnode-id="4854"><p data-dcnode-id="4855"><span data-dcnode-id="4856" instrument_node="">Through a close examination of economic trends and case studies of particular families, this study demonstrates that Japan’s protoindustrial economy was far more volatile than portrayed in most studies to date. Few rural elites survived the competitive and unstable climate of this era.</span></p></div></td></tr><tr data-dcnode-id="4819"><td class="number" data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">180.</span></td><td class="jkt" data-dcnode-id="4847"><a data-dcnode-id="4848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674750944" title="Recontextualizing Texts: Narrative Performance in Modern Japanese Fiction"><img alt="Cover: Recontextualizing Texts: Narrative Performance in Modern Japanese Fiction" data-dcnode-id="4849" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674750944-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4820"><p class="title" data-dcnode-id="4844"><a data-dcnode-id="4845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674750944"><span data-dcnode-id="4846" instrument_node="">Recontextualizing Texts: Narrative Performance in Modern Japanese Fiction</span></a></p><p class="author" data-dcnode-id="4842"><span data-dcnode-id="4843" instrument_node="">Sakaki, Atsuko</span></p><div class="desc" data-dcnode-id="4821"><p data-dcnode-id="4822"><span data-dcnode-id="4841" instrument_node="">Offering the first systematic examination of five modern Japanese fictional narratives, all of them available in English translations, </span><b data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">Atsuko Sakaki</span></b><span data-dcnode-id="4838" instrument_node=""> explores Natsume Sōseki’s </span><i data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">Kokoro</span></i><span data-dcnode-id="4835" instrument_node=""> and </span><i data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">The Three-Cornered World</span></i><span data-dcnode-id="4832" instrument_node="">; Ibuse Masuji’s </span><i data-dcnode-id="4830"><span data-dcnode-id="4831" instrument_node="">Black Rain</span></i><span data-dcnode-id="4829" instrument_node="">; Mori Ōgai’s </span><i data-dcnode-id="4827"><span data-dcnode-id="4828" instrument_node="">Wild Geese</span></i><span data-dcnode-id="4826" instrument_node="">; and Tanizaki Jun’ichirō’s </span><i data-dcnode-id="4824"><span data-dcnode-id="4825" instrument_node="">Quicksand</span></i><span data-dcnode-id="4823" instrument_node="">.</span></p></div></td></tr><tr data-dcnode-id="4804"><td class="number" data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">181.</span></td><td class="jkt" data-dcnode-id="4814"><a data-dcnode-id="4815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674142404" title="Colonial Industrialization and Labor in Korea: The Onoda Cement Factory"><img alt="Cover: Colonial Industrialization and Labor in Korea: The Onoda Cement Factory" data-dcnode-id="4816" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674142404-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4805"><p class="title" data-dcnode-id="4811"><a data-dcnode-id="4812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674142404"><span data-dcnode-id="4813" instrument_node="">Colonial Industrialization and Labor in Korea: The Onoda Cement Factory</span></a></p><p class="author" data-dcnode-id="4809"><span data-dcnode-id="4810" instrument_node="">Park, Soon-Won</span></p><div class="desc" data-dcnode-id="4806"><p data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">This book is a study of labor relations and the first generation of skilled workers in colonial Korea, a subject crucial to the understanding of modernization in twentieth-century Korea. Born in rural Korea, these workers confronted both the colonial experience and the modern workplace as they interacted with Japanese managers and workers.</span></p></div></td></tr><tr data-dcnode-id="4787"><td class="number" data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">182.</span></td><td class="jkt" data-dcnode-id="4799"><a data-dcnode-id="4800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674007741" title="Culture and the State in Late Chosŏn Korea"><img alt="Cover: Culture and the State in Late Chosŏn Korea" data-dcnode-id="4801" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674007741-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4788"><p class="title" data-dcnode-id="4796"><a data-dcnode-id="4797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674007741"><span data-dcnode-id="4798" instrument_node="">Culture and the State in Late Chosŏn Korea</span></a></p><p class="author" data-dcnode-id="4792"><span data-dcnode-id="4795" instrument_node="">Haboush, JaHyun Kim</span><br data-dcnode-id="4794"><span data-dcnode-id="4793" instrument_node="">
Deuchler, Martina</span></p><div class="desc" data-dcnode-id="4789"><p data-dcnode-id="4790"><span data-dcnode-id="4791" instrument_node="">Investigating the late 16th through the 19th century, this work looks at the shifting boundaries between the Choson state and the adherents of Confucianism, Buddhism, Christianity, and popular religions. It counters the static view of the Korean Confucian state and elucidates its relationship to the wider Confucian community and religious groups.</span></p></div></td></tr><tr data-dcnode-id="4770"><td class="number" data-dcnode-id="4785"><span data-dcnode-id="4786" instrument_node="">184.</span></td><td class="jkt" data-dcnode-id="4782"><a data-dcnode-id="4783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674005945" title="Colonial Modernity in Korea"><img alt="Cover: Colonial Modernity in Korea" data-dcnode-id="4784" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674005945-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4771"><p class="title" data-dcnode-id="4779"><a data-dcnode-id="4780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674005945"><span data-dcnode-id="4781" instrument_node="">Colonial Modernity in Korea</span></a></p><p class="author" data-dcnode-id="4775"><span data-dcnode-id="4778" instrument_node="">Shin, Gi-Wook</span><br data-dcnode-id="4777"><span data-dcnode-id="4776" instrument_node="">
Robinson, Michael</span></p><div class="desc" data-dcnode-id="4772"><p data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">This volume seeks to shed new light on the nationalist paradigm of Japanese repression and exploitation that has dominated the study of Korea’s colonial period (1910–1945). The authors adopt a more inclusive, pluralistic approach that stresses the complex relations among colonialism, modernity, and nationalism.</span></p></div></td></tr><tr data-dcnode-id="4755"><td class="number" data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node="">185.</span></td><td class="jkt" data-dcnode-id="4765"><a data-dcnode-id="4766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674002401" title="Prayer and Play in Late Tokugawa Japan: Asakusa Sensōji and Edo Society"><img alt="Cover: Prayer and Play in Late Tokugawa Japan: Asakusa Sensōji and Edo Society" data-dcnode-id="4767" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674002401-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4756"><p class="title" data-dcnode-id="4762"><a data-dcnode-id="4763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674002401"><span data-dcnode-id="4764" instrument_node="">Prayer and Play in Late Tokugawa Japan: Asakusa Sensōji and Edo Society</span></a></p><p class="author" data-dcnode-id="4760"><span data-dcnode-id="4761" instrument_node="">Hur, Nam-lin</span></p><div class="desc" data-dcnode-id="4757"><p data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">The unique amalgam of prayer and play at the Sensōji temple in Edo is often cited as proof of the “degenerate Buddhism” of the Tokugawa period. This investigation of the economy and cultural politics of Sensōji, however, shows that its culture of prayer and play reflected changes taking place in Tokugawa Japan, particularly in the city of Edo.</span></p></div></td></tr><tr data-dcnode-id="4738"><td class="number" data-dcnode-id="4753"><span data-dcnode-id="4754" instrument_node="">187.</span></td><td class="jkt" data-dcnode-id="4750"><a data-dcnode-id="4751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674002449" title="Constructing “Korean” Origins: A Critical Review of Archaeology, Historiography, and Racial Myth in Korean State-Formation Theories"><img alt="Cover: Constructing “Korean” Origins: A Critical Review of Archaeology, Historiography, and Racial Myth in Korean State-Formation Theories" data-dcnode-id="4752" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674002449-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4739"><p class="title" data-dcnode-id="4747"><a data-dcnode-id="4748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674002449"><span data-dcnode-id="4749" instrument_node="">Constructing “Korean” Origins: A Critical Review of Archaeology, Historiography, and Racial Myth in Korean State-Formation Theories</span></a></p><p class="author" data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">Pai, Hyung Il</span></p><div class="desc" data-dcnode-id="4740"><p data-dcnode-id="4741"><b data-dcnode-id="4743"><span data-dcnode-id="4744" instrument_node="">Hyung Il Pai</span></b><span data-dcnode-id="4742" instrument_node=""> examines how archaeological finds from Northeast Asia have been used in Korea to construct a myth of state formation emphasizing the ancient development of a pure Korean race that created a civilization rivaling those of China and Japan. He shows that the Korean state was formed far later with influences from throughout Northern Asia.</span></p></div></td></tr><tr data-dcnode-id="4723"><td class="number" data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">189.</span></td><td class="jkt" data-dcnode-id="4733"><a data-dcnode-id="4734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674002388" title="Zhou Zuoren and an Alternative Chinese Response to Modernity"><img alt="Cover: Zhou Zuoren and an Alternative Chinese Response to Modernity" data-dcnode-id="4735" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674002388-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4724"><p class="title" data-dcnode-id="4730"><a data-dcnode-id="4731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674002388"><span data-dcnode-id="4732" instrument_node="">Zhou Zuoren and an Alternative Chinese Response to Modernity</span></a></p><p class="author" data-dcnode-id="4728"><span data-dcnode-id="4729" instrument_node="">Daruvala, Susan</span></p><div class="desc" data-dcnode-id="4725"><p data-dcnode-id="4726"><span data-dcnode-id="4727" instrument_node="">This book explores the issues of nation and modernity in China by focusing on the work of Zhou Zuoren (1885-1967), one of the most controversial of modern Chinese intellectuals and brother of the writer Lu Xun. Zhou was radically at odds with many of his contemporaries and opposed their nation-building and modernization projects. Through his literary and aesthetic practice as an essayist, Zhou espoused a way of constructing the individual and affirming the individual’s importance in opposition to the normative national subject of most May Fourth reformers.</span></p></div></td></tr><tr data-dcnode-id="4708"><td class="number" data-dcnode-id="4721"><span data-dcnode-id="4722" instrument_node="">191.</span></td><td class="jkt" data-dcnode-id="4718"><a data-dcnode-id="4719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674003705" title="A Time of Crisis: Japan, the Great Depression, and Rural Revitalization"><img alt="Cover: A Time of Crisis: Japan, the Great Depression, and Rural Revitalization" data-dcnode-id="4720" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674003705-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4709"><p class="title" data-dcnode-id="4715"><a data-dcnode-id="4716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674003705"><span data-dcnode-id="4717" instrument_node="">A Time of Crisis: Japan, the Great Depression, and Rural Revitalization</span></a></p><p class="author" data-dcnode-id="4713"><span data-dcnode-id="4714" instrument_node="">Smith, Kerry</span></p><div class="desc" data-dcnode-id="4710"><p data-dcnode-id="4711"><span data-dcnode-id="4712" instrument_node="">This study of Japan’s transformation by the economic crises of the 1930s focuses on efforts to overcome the effects of the Great Depression in rural areas, particularly the activities of local activists and policymakers in Tokyo. The reactions of inhabitants of rural areas to the depression shed new light on how average Japanese responded to the problems of modernization and how they re-created the countryside.</span></p></div></td></tr><tr data-dcnode-id="4690"><td class="number" data-dcnode-id="4706"><span data-dcnode-id="4707" instrument_node="">192.</span></td><td class="jkt" data-dcnode-id="4703"><a data-dcnode-id="4704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674002425" title="Becoming Apart: National Power and Local Politics in Toyama, 1868–1945"><img alt="Cover: Becoming Apart: National Power and Local Politics in Toyama, 1868–1945" data-dcnode-id="4705" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674002425-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4691"><p class="title" data-dcnode-id="4700"><a data-dcnode-id="4701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674002425"><span data-dcnode-id="4702" instrument_node="">Becoming Apart: National Power and Local Politics in Toyama, 1868–1945</span></a></p><p class="author" data-dcnode-id="4698"><span data-dcnode-id="4699" instrument_node="">Lewis, Michael</span></p><div class="desc" data-dcnode-id="4692"><p data-dcnode-id="4693"><span data-dcnode-id="4697" instrument_node="">Focusing on the marginal region of Toyama, on the Sea of Japan, the author explores the interplay of central and regional authorities, local and national perceptions of rights, and the emerging political practices in Toyama and Tokyo that became part of the new political culture that took shape in Japan following the Meiji Restoration. </span><b data-dcnode-id="4695"><span data-dcnode-id="4696" instrument_node="">Lewis</span></b><span data-dcnode-id="4694" instrument_node=""> argues that in response to the demands of the centralizing state, local elites and leaders in Toyama developed a repertoire of supple responses that varied with the political or economic issue at stake.</span></p></div></td></tr><tr data-dcnode-id="4669"><td class="number" data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node="">193.</span></td><td class="jkt" data-dcnode-id="4685"><a data-dcnode-id="4686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674003675" title="State and Economy in Republican China: A Handbook for Scholars, Volumes 1 and 2"><img alt="Cover: State and Economy in Republican China: A Handbook for Scholars, Volumes 1 and 2" data-dcnode-id="4687" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674003675-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4670"><p class="title" data-dcnode-id="4682"><a data-dcnode-id="4683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674003675"><span data-dcnode-id="4684" instrument_node="">State and Economy in Republican China: A Handbook for Scholars, Volumes 1 and 2</span></a></p><p class="author" data-dcnode-id="4674"><span data-dcnode-id="4681" instrument_node="">Kirby, William C.</span><br data-dcnode-id="4680"><span data-dcnode-id="4679" instrument_node="">
Lin, Man-houng</span><br data-dcnode-id="4678"><span data-dcnode-id="4677" instrument_node="">
Shih, James Chin</span><br data-dcnode-id="4676"><span data-dcnode-id="4675" instrument_node="">
Pietz, David A.</span></p><div class="desc" data-dcnode-id="4671"><p data-dcnode-id="4672"><span data-dcnode-id="4673" instrument_node="">This manual for students focuses on archival research in the economic and business history of the Republican era (1911–1949). Following a general discussion of archival research and research aids for the Republican period, the handbook introduces the collections of archives in the People’s Republic of China and the Republic of China on Taiwan.</span></p></div></td></tr><tr data-dcnode-id="4654"><td class="number" data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node="">194.</span></td><td class="jkt" data-dcnode-id="4664"><a data-dcnode-id="4665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674007857" title="Minamata: Pollution and the Struggle for Democracy in Postwar Japan"><img alt="Cover: Minamata: Pollution and the Struggle for Democracy in Postwar Japan" data-dcnode-id="4666" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674007857-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4655"><p class="title" data-dcnode-id="4661"><a data-dcnode-id="4662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674007857"><span data-dcnode-id="4663" instrument_node="">Minamata: Pollution and the Struggle for Democracy in Postwar Japan</span></a></p><p class="author" data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">George, Timothy S.</span></p><div class="desc" data-dcnode-id="4656"><p data-dcnode-id="4657"><span data-dcnode-id="4658" instrument_node="">Nearly forty years after the outbreak of the “Minamata Disease,” it remains one of the most horrific examples of environmental poisoning. Based on primary documents and interviews, this book describes three rounds of responses to this incidence of mercury poisoning, focusing on the efforts of its victims and their supporters, particularly the activities of grassroots movements and popular campaigns, to secure redress.</span></p></div></td></tr><tr data-dcnode-id="4639"><td class="number" data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">196.</span></td><td class="jkt" data-dcnode-id="4649"><a data-dcnode-id="4650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674012066" title="The Making of Japanese Manchuria, 1904-1932"><img alt="Cover: The Making of Japanese Manchuria, 1904-1932" data-dcnode-id="4651" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/images/jackets/9780674012066-sm.jpg&amp;raw"></a></td><td class="bookinfo" data-dcnode-id="4640"><p class="title" data-dcnode-id="4646"><a data-dcnode-id="4647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/catalog.php%3Fisbn%3D9780674012066"><span data-dcnode-id="4648" instrument_node="">The Making of Japanese Manchuria, 1904-1932</span></a></p><p class="author" data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">Matsusaka, Yoshihisa Tak</span></p><div class="desc" data-dcnode-id="4641"><p data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">In this history of Japanese involvement in northeast China, the author argues that Japan’s military seizure of Manchuria in September 1931 was founded on three decades of infiltration of the area. This incremental empire-building and its effect on Japan are the focuses of this book.</span></p></div></td></tr><tr data-dcnode-id="4621"><td class="number" data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node="">197.</span></td><td class="jkt" data-dcnode-id="4634"><a data-dcnode-id="4635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hup.harvard.edu/c
