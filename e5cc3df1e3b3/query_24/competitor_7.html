</a></li><li data-dcnode-id="2016"><a data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses/sociology.html"><span data-dcnode-id="2018" instrument_node="">SOC: Sociology</span></a></li><span data-dcnode-id="2015" instrument_node=""> </span></ul><span data-dcnode-id="2013" instrument_node=""> </span></section><span data-dcnode-id="2011" instrument_node=""> </span></div><span data-dcnode-id="2009" instrument_node=""> </span><div class="cell small-12 medium-8 medium-order-2 small-order-1 grid-y" data-dcnode-id="123" id="rightCol"><span data-dcnode-id="2008" instrument_node=""> </span><h2 class="cell" data-dcnode-id="2006" id="coursesHeading"><span data-dcnode-id="2007" instrument_node="">AS Courses</span></h2><span data-dcnode-id="2005" instrument_node=""> </span><div class="cell" data-dcnode-id="1950"><span data-dcnode-id="2004" instrument_node=""> </span><a data-dcnode-id="2003" name="thelearningenvironment"></a><span data-dcnode-id="2002" instrument_node=""> </span><ul class="accordion" data-accordion="" data-allow-all-closed="true" data-dcnode-id="1952" data-n="ccrh1g-n" role="tablist"><span data-dcnode-id="2001" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1954"><span data-dcnode-id="2000" instrument_node=""> </span><a aria-controls="khik6o-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1998" id="khik6o-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1999" instrument_node="">The Learning Environment</span></a><span data-dcnode-id="1997" instrument_node=""> </span><section aria-hidden="true" aria-labelledby="khik6o-accordion-label" class="accordion-content" data-dcnode-id="1956" data-tab-content="" id="khik6o-accordion" role="tabpanel"><span data-dcnode-id="1996" instrument_node=""> </span><h2 data-dcnode-id="1994" id="thelearningenvironment"><span data-dcnode-id="1995" instrument_node="">The Learning Environment</span></h2><span data-dcnode-id="1993" instrument_node=""> </span><div class="content" data-dcnode-id="1988"><span data-dcnode-id="1992" instrument_node=""> </span><p data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">The program in Asian Studies offers a variety of course types from large lecture classes to small seminars. Many of the more advanced undergraduate courses are combined with graduate offerings, allowing undergraduates to get early exposure to graduate-style coursework. Faculty also offer independent studies for students interested in areas that do not match the program's regular offerings. The program provides a capstone experience through a senior seminar, where students work with an advisor to do a research project. It also offers an internship program where students gain career-valuable experience in academic program operation and outreach.</span></p><span data-dcnode-id="1989" instrument_node=""> </span></div><span data-dcnode-id="1987" instrument_node=""> </span><h3 data-dcnode-id="1985" id="aboutourfacilities"><span data-dcnode-id="1986" instrument_node="">About Our Facilities</span></h3><span data-dcnode-id="1984" instrument_node=""> </span><div class="content" data-dcnode-id="1979"><span data-dcnode-id="1983" instrument_node=""> </span><p data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">The Asian Studies Program is housed in 412 Clemens Hall, which includes dedicated meeting spaces. The program holds classes in centrally scheduled space throughout the campus, which includes traditional classrooms and lecture halls that can accommodate the program’s different class structures. </span></p><span data-dcnode-id="1980" instrument_node=""> </span></div><span data-dcnode-id="1978" instrument_node=""> </span><h3 data-dcnode-id="1976" id="aboutourfaculty"><span data-dcnode-id="1977" instrument_node="">About Our Faculty</span></h3><span data-dcnode-id="1975" instrument_node=""> </span><div class="content" data-dcnode-id="1970"><span data-dcnode-id="1974" instrument_node=""> </span><p data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">The faculty of the Asian Studies program includes over twenty internationally known and respected Asian specialists in a variety of humanities and social sciences fields, focusing on China, Japan, Korea, Southeast Asia, and South Asia.</span></p><span data-dcnode-id="1971" instrument_node=""> </span></div><span data-dcnode-id="1969" instrument_node=""> </span><h4 data-dcnode-id="1967" id="facultylistdirectory"><span data-dcnode-id="1968" instrument_node="">Faculty List Directory</span></h4><span data-dcnode-id="1966" instrument_node=""> </span><div class="content" data-dcnode-id="1958"><span data-dcnode-id="1965" instrument_node=""> </span><p data-dcnode-id="1960"><span data-dcnode-id="1964" instrument_node="">Please visit the </span><a data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asianstudies.buffalo.edu/people/faculty/"><span data-dcnode-id="1963" instrument_node="">Asian Studies program website</span></a><span data-dcnode-id="1961" instrument_node=""> for additional information about UB faculty with concentrations in Asia.</span></p><span data-dcnode-id="1959" instrument_node=""> </span></div><span data-dcnode-id="1957" instrument_node=""> </span></section><span data-dcnode-id="1955" instrument_node=""> </span></li><span data-dcnode-id="1953" instrument_node=""> </span></ul><span data-dcnode-id="1951" instrument_node=""> </span></div><span data-dcnode-id="1949" instrument_node=""> </span><section aria-labelledby="coursesHeading" class="cell grid-y" data-dcnode-id="125" data-v-app="" id="app"><div data-dcnode-id="126"><ul class="accordion" data-accordion="" data-allow-all-closed="true" data-dcnode-id="274" data-multi-expand="true" data-n="qfqwd6-n" role="tablist"><li class="accordion-item" data-accordion-item="" data-dcnode-id="1917"><a aria-controls="stzzhd-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1947" id="stzzhd-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1948" instrument_node="">AS 101LEC Introduction to Asian Studies</span></a><span data-dcnode-id="1946" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="stzzhd-accordion-label" class="accordion-content" data-dcnode-id="1918" data-tab-content="" id="stzzhd-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1942" type="button"><span data-dcnode-id="1945" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">AS 101LEC Introduction to Asian Studies</span></span></button><span data-dcnode-id="1941" instrument_node=""> </span><strong data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">Lecture</span></strong><br data-dcnode-id="1938"><span data-dcnode-id="1937" instrument_node=""> </span><p class="course-description" data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Are you interested in a career related to Asia, or considering studying abroad in Asia? Or maybe you just want to know more about its cultures and histories because your classmates, neighbors, and coworkers are from there? What is Asia, anyway, and who and what should we consider Asian? This class is designed to introduce students to the diversity of Asia and to the resources at UB and beyond for studying Asia and Asian diasporas. Students will develop critical thinking and writing skills while exploring the fields of Asian and Asian-American studies. The class will hear from distinguished UB professors who will discuss the latest research, trends, and resources in the field of Asian and Asian-American studies. Students also will start thinking about the impact of developments in Asia on their career goals and be encouraged to consider study abroad opportunities in Asia.</span></p><span data-dcnode-id="1934" instrument_node=""> </span><div data-dcnode-id="1919"><strong data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Credits: </span></strong><span data-dcnode-id="1931" instrument_node=""> 1 </span><br data-dcnode-id="1930"><span data-dcnode-id="1929" instrument_node=""> </span><strong data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Grading:</span></strong><span data-dcnode-id="1926" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1925"><span data-dcnode-id="1924" instrument_node=""> </span><strong data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1921" instrument_node=""> Fall </span><br data-dcnode-id="1920"></div></div></li><span data-dcnode-id="1916" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1881"><a aria-controls="u4eurz-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1914" id="u4eurz-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1915" instrument_node="">AS 110LEC The Asian American Experience</span></a><span data-dcnode-id="1913" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="u4eurz-accordion-label" class="accordion-content" data-dcnode-id="1882" data-tab-content="" id="u4eurz-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1909" type="button"><span data-dcnode-id="1912" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">AS 110LEC The Asian American Experience</span></span></button><span data-dcnode-id="1908" instrument_node=""> </span><strong data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Lecture</span></strong><br data-dcnode-id="1905"><span data-dcnode-id="1904" instrument_node=""> </span><p class="course-description" data-dcnode-id="1899"><span data-dcnode-id="1903" instrument_node="">The Asian American experience from the beginning of Asians' and Pacific Islanders' entry into North America in the eighteenth century to the present. Investigates this phenomenon in connection with national and transnational power relations, economic structures, and political realities. Also considers the construction of American identities in the United States and their impact on Asian American communities and individuals. Goals are to develop a historical and multi-cultural perspective on the Asian American experience, to enlarge students' capacities for analytical and critical thinking, and to achieve a better understanding of the diversity within Asian American communities and of Asian Americans' social status in North America. This course is the same as </span><a data-dcnode-id="1901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DAMS%26num%3D102"><span data-dcnode-id="1902" instrument_node="">AMS 102</span></a><span data-dcnode-id="1900" instrument_node=""> and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="1898" instrument_node=""> </span><div data-dcnode-id="1883"><strong data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Credits: </span></strong><span data-dcnode-id="1895" instrument_node=""> 3 </span><br data-dcnode-id="1894"><span data-dcnode-id="1893" instrument_node=""> </span><strong data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Grading:</span></strong><span data-dcnode-id="1890" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1889"><span data-dcnode-id="1888" instrument_node=""> </span><strong data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1885" instrument_node=""> Fall </span><br data-dcnode-id="1884"></div></div></li><span data-dcnode-id="1880" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1848"><a aria-controls="mov7s7-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1878" id="mov7s7-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1879" instrument_node="">AS 181LR Asian Civilization 1</span></a><span data-dcnode-id="1877" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="mov7s7-accordion-label" class="accordion-content" data-dcnode-id="1849" data-tab-content="" id="mov7s7-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1873" type="button"><span data-dcnode-id="1876" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">AS 181LR Asian Civilization 1</span></span></button><span data-dcnode-id="1872" instrument_node=""> </span><strong data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Lecture</span></strong><br data-dcnode-id="1869"><span data-dcnode-id="1868" instrument_node=""> </span><p class="course-description" data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Introduction to major themes and events in the histories of China, Korea, Japan, the Indian subcontinent, and Southeast Asia in early times. Considers the developments of ways of thought, the emergence of and interactions among states and empires, and artistic and literary movements. Our goal is to understand the historical forces and transformations shaping Asia before about 1600. This course is the same as HIS and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="1865" instrument_node=""> </span><div data-dcnode-id="1850"><strong data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Credits: </span></strong><span data-dcnode-id="1862" instrument_node=""> 3 </span><br data-dcnode-id="1861"><span data-dcnode-id="1860" instrument_node=""> </span><strong data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Grading:</span></strong><span data-dcnode-id="1857" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1856"><span data-dcnode-id="1855" instrument_node=""> </span><strong data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1852" instrument_node=""> Fall </span><br data-dcnode-id="1851"></div></div></li><span data-dcnode-id="1847" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1812"><a aria-controls="peclvv-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1845" id="peclvv-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1846" instrument_node="">AS 182LR Asian Civilization II</span></a><span data-dcnode-id="1844" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="peclvv-accordion-label" class="accordion-content" data-dcnode-id="1813" data-tab-content="" id="peclvv-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1840" type="button"><span data-dcnode-id="1843" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">AS 182LR Asian Civilization II</span></span></button><span data-dcnode-id="1839" instrument_node=""> </span><strong data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Lecture</span></strong><br data-dcnode-id="1836"><span data-dcnode-id="1835" instrument_node=""> </span><p class="course-description" data-dcnode-id="1830"><span data-dcnode-id="1834" instrument_node="">Introduction to major themes and events in the histories of China, Korea, Japan, the Indian subcontinent, and Southeast Asia in recent centuries. Considers the impacts of colonialism and imperialism, the emergence of nationalist and revolutionary movements, decolonization and the Cold War. Our goal is to understand the historical forces and transformations shaping contemporary Asia, the common experiences that different areas of Asia have shared in the recent past, and what distinguishes the histories of particular Asian nations within a comparative perspective. This course is the same as </span><a data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DHIS%26num%3D182"><span data-dcnode-id="1833" instrument_node="">HIS 182</span></a><span data-dcnode-id="1831" instrument_node=""> and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="1829" instrument_node=""> </span><div data-dcnode-id="1814"><strong data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Credits: </span></strong><span data-dcnode-id="1826" instrument_node=""> 3 </span><br data-dcnode-id="1825"><span data-dcnode-id="1824" instrument_node=""> </span><strong data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Grading:</span></strong><span data-dcnode-id="1821" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1820"><span data-dcnode-id="1819" instrument_node=""> </span><strong data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1816" instrument_node=""> Spring </span><br data-dcnode-id="1815"></div></div></li><span data-dcnode-id="1811" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1775"><a aria-controls="uhs07p-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1809" id="uhs07p-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1810" instrument_node="">AS 198SEM UB Seminar</span></a><span data-dcnode-id="1808" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="uhs07p-accordion-label" class="accordion-content" data-dcnode-id="1776" data-tab-content="" id="uhs07p-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1804" type="button"><span data-dcnode-id="1807" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">AS 198SEM UB Seminar</span></span></button><span data-dcnode-id="1803" instrument_node=""> </span><strong data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Seminar</span></strong><br data-dcnode-id="1800"><span data-dcnode-id="1799" instrument_node=""> </span><p class="course-description" data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">The one credit UB Seminar is focused on a big idea or challenging issue to engage students with questions of significance in a field of study and, ultimately, to connect their studies with issues of consequence in the wider world. Essential to the UB Curriculum, the Seminar helps transition to UB through an early connection to UB faculty and the undergraduate experience at a comprehensive, research university. This course is equivalent to any 198 offered in any subject. This course is a controlled enrollment (impacted) course. Students who have previously attempted the course and received a grade of F or R may not be able to repeat the course during the fall or spring semester.</span></p><span data-dcnode-id="1796" instrument_node=""> </span><div data-dcnode-id="1777"><strong data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Credits: </span></strong><span data-dcnode-id="1793" instrument_node=""> 1 </span><br data-dcnode-id="1792"><span data-dcnode-id="1791" instrument_node=""> </span><strong data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">Grading:</span></strong><span data-dcnode-id="1788" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1787"><span data-dcnode-id="1786" instrument_node=""> </span><strong data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1783" instrument_node=""> Fall, Spring </span><br data-dcnode-id="1782"><span data-dcnode-id="1781" instrument_node=""> </span><strong data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">Requisites:</span></strong><span data-dcnode-id="1778" instrument_node=""> Students who have already successfully completed the UB seminar course may not repeat this course. If you have any questions regarding enrollment for this course, please contact your academic advisor. </span></div></div></li><span data-dcnode-id="1774" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1738"><a aria-controls="op1iho-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1772" id="op1iho-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1773" instrument_node="">AS 199SEM UB Seminar</span></a><span data-dcnode-id="1771" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="op1iho-accordion-label" class="accordion-content" data-dcnode-id="1739" data-tab-content="" id="op1iho-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1767" type="button"><span data-dcnode-id="1770" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">AS 199SEM UB Seminar</span></span></button><span data-dcnode-id="1766" instrument_node=""> </span><strong data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Seminar</span></strong><br data-dcnode-id="1763"><span data-dcnode-id="1762" instrument_node=""> </span><p class="course-description" data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">The three credit UB Seminar is focused on a big idea or challenging issue to engage students with questions of significance in a field of study and, ultimately, to connect their studies with issues of consequence in the wider world. Essential to the UB Curriculum, the Seminar helps students with common learning outcomes focused on fundamental expectations for critical thinking, ethical reasoning, and oral communication, and learning at a university, all within topic focused subject matter. The Seminars provide students with an early connection to UB faculty and the undergraduate experience at a comprehensive, research university. This course is equivalent to any 199 offered in any subject. This course is a controlled enrollment (impacted) course. Students who have previously attempted the course and received a grade of F or R may not be able to repeat the course during the fall or spring semester.</span></p><span data-dcnode-id="1759" instrument_node=""> </span><div data-dcnode-id="1740"><strong data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Credits: </span></strong><span data-dcnode-id="1756" instrument_node=""> 3 </span><br data-dcnode-id="1755"><span data-dcnode-id="1754" instrument_node=""> </span><strong data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Grading:</span></strong><span data-dcnode-id="1751" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1750"><span data-dcnode-id="1749" instrument_node=""> </span><strong data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1746" instrument_node=""> Fall, Spring </span><br data-dcnode-id="1745"><span data-dcnode-id="1744" instrument_node=""> </span><strong data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Requisites:</span></strong><span data-dcnode-id="1741" instrument_node=""> Students who have already successfully completed the first year seminar course may not repeat this course. If you have any questions regarding enrollment for this course, please contact your academic advisor. </span></div></div></li><span data-dcnode-id="1737" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1702"><a aria-controls="314see-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1735" id="314see-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1736" instrument_node="">AS 221LEC Survey of Asian Literature</span></a><span data-dcnode-id="1734" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="314see-accordion-label" class="accordion-content" data-dcnode-id="1703" data-tab-content="" id="314see-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1730" type="button"><span data-dcnode-id="1733" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">AS 221LEC Survey of Asian Literature</span></span></button><span data-dcnode-id="1729" instrument_node=""> </span><strong data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Lecture</span></strong><br data-dcnode-id="1726"><span data-dcnode-id="1725" instrument_node=""> </span><p class="course-description" data-dcnode-id="1720"><span data-dcnode-id="1724" instrument_node="">This course will introduce students to narratives of romance that span Asia's wide variety of religious, literary, theatrical, and cinematic traditions. Rather than defining romance by what it contains, we will instead consider what romance as a genre does. Through this approach, it becomes possible to examine why certain narratives were compelling enough to be transmitted across and preserved within a diverse range of cultures and historical periods. Texts include English translations of Sanskrit drama, a Hindi Sufi mystical work, an early Japanese novel, recent Bollywood cinema, Korean television melodramas, and the worldwide Harlequin Romance phenomenon. There are no prerequisites for this class. We will be covering a wide range of materials, and it is essential that students complete assigned readings before class and actively participate in class discussions. All are welcome in this class, regardless of age, race, sexual orientation, gender identity, ability, ethnicity, or religion. I ask that you keep an open mind towards the course materials and be tolerant and respectful of the opinions expressed by your fellow classmates. This course is the same as </span><a data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DENG%26num%3D222"><span data-dcnode-id="1723" instrument_node="">ENG 222</span></a><span data-dcnode-id="1721" instrument_node=""> and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="1719" instrument_node=""> </span><div data-dcnode-id="1704"><strong data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Credits: </span></strong><span data-dcnode-id="1716" instrument_node=""> 3 </span><br data-dcnode-id="1715"><span data-dcnode-id="1714" instrument_node=""> </span><strong data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Grading:</span></strong><span data-dcnode-id="1711" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1710"><span data-dcnode-id="1709" instrument_node=""> </span><strong data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1706" instrument_node=""> Fall </span><br data-dcnode-id="1705"></div></div></li><span data-dcnode-id="1701" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1663"><a aria-controls="u57mdb-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1699" id="u57mdb-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1700" instrument_node="">AS 229LEC Contemporary Asian Societies</span></a><span data-dcnode-id="1698" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="u57mdb-accordion-label" class="accordion-content" data-dcnode-id="1664" data-tab-content="" id="u57mdb-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1694" type="button"><span data-dcnode-id="1697" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">AS 229LEC Contemporary Asian Societies</span></span></button><span data-dcnode-id="1693" instrument_node=""> </span><strong data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Lecture</span></strong><br data-dcnode-id="1690"><span data-dcnode-id="1689" instrument_node=""> </span><p class="course-description" data-dcnode-id="1681"><span data-dcnode-id="1688" instrument_node="">Introduces students to major features of societies in East, Southeast, and South Asia, and may incorporate material on Central and Southwest Asia depending on the instructor. Discusses the ways in which social scientists analyze contemporary societies and survey theories developed by social scientists to explain social phenomena in contemporary Asian societies. This course is the same as </span><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DPSC%26num%3D229"><span data-dcnode-id="1687" instrument_node="">PSC 229</span></a><span data-dcnode-id -dcnode-id="1598" instrument_node=""> </span><strong data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1595" instrument_node=""> </span><span class="course-info-none" data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Varies</span></span><span data-dcnode-id="1592" instrument_node=""> </span><br data-dcnode-id="1591"></div></div></li><span data-dcnode-id="1587" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1549"><a aria-controls="hp77dy-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1585" id="hp77dy-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1586" instrument_node="">AS 323LEC Gender in Asian Literature</span></a><span data-dcnode-id="1584" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="hp77dy-accordion-label" class="accordion-content" data-dcnode-id="1550" data-tab-content="" id="hp77dy-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1580" type="button"><span data-dcnode-id="1583" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">AS 323LEC Gender in Asian Literature</span></span></button><span data-dcnode-id="1579" instrument_node=""> </span><strong data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Lecture</span></strong><br data-dcnode-id="1576"><span data-dcnode-id="1575" instrument_node=""> </span><p class="course-description" data-dcnode-id="1567"><span data-dcnode-id="1574" instrument_node="">This course will examine the different ways in which gender is constructed through Asian literature, theatre, and film. It is intended to introduce students to the literature of Asia, foregrounding the ways in which gender shapes different types, or genres, of text, and how different genres of text in turn shape notions of gender. Our task in this course will be to discover the cultural underpinnings of historical and contemporary conceptions of gender, sexuality, and love. Inasmuch as we play out our gender roles our social life, this course will also serve to introduce students to the ways in which performance is embedded in the public culture of Asia. Throughout the semester, students will be required to apply the skills we acquire in our readings on theory to a broad set of materials, including authors from across the length and breadth of Asia. There are no prerequisites for this class and all readings are in English. This course is the same as </span><a data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DENG%26num%3D327"><span data-dcnode-id="1573" instrument_node="">ENG 327</span></a><span data-dcnode-id="1571" instrument_node=""> and </span><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DGGS%26num%3D327"><span data-dcnode-id="1570" instrument_node="">GGS 327</span></a><span data-dcnode-id="1568" instrument_node=""> and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="1566" instrument_node=""> </span><div data-dcnode-id="1551"><strong data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Credits: </span></strong><span data-dcnode-id="1563" instrument_node=""> 3 </span><br data-dcnode-id="1562"><span data-dcnode-id="1561" instrument_node=""> </span><strong data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Grading:</span></strong><span data-dcnode-id="1558" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1557"><span data-dcnode-id="1556" instrument_node=""> </span><strong data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1553" instrument_node=""> Spring </span><br data-dcnode-id="1552"></div></div></li><span data-dcnode-id="1548" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1516"><a aria-controls="0onoeb-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1546" id="0onoeb-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1547" instrument_node="">AS 333LEC South Asian Cinema: Bollywood and Beyond</span></a><span data-dcnode-id="1545" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="0onoeb-accordion-label" class="accordion-content" data-dcnode-id="1517" data-tab-content="" id="0onoeb-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1541" type="button"><span data-dcnode-id="1544" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">AS 333LEC South Asian Cinema: Bollywood and Beyond</span></span></button><span data-dcnode-id="1540" instrument_node=""> </span><strong data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Lecture</span></strong><br data-dcnode-id="1537"><span data-dcnode-id="1536" instrument_node=""> </span><p class="course-description" data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">This course is a chronological exploration of Hindi cinema, stretching from the 1940s to the present. With its flashy item numbers, chocolate, heroes, masala films, and playback singers, Bollywood films offer delights that no other genre can. But beneath its flashy exterior, Bollywood also offers moral lessons for social uplift, provides examples of changing class and family dynamics, tracks the influence of the West on a decidedly South Asian art form, and has its finger perennially on the cultural pulse of India.</span></p><span data-dcnode-id="1533" instrument_node=""> </span><div data-dcnode-id="1518"><strong data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Credits: </span></strong><span data-dcnode-id="1530" instrument_node=""> 3 </span><br data-dcnode-id="1529"><span data-dcnode-id="1528" instrument_node=""> </span><strong data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Grading:</span></strong><span data-dcnode-id="1525" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1524"><span data-dcnode-id="1523" instrument_node=""> </span><strong data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1520" instrument_node=""> Spring </span><br data-dcnode-id="1519"></div></div></li><span data-dcnode-id="1515" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1483"><a aria-controls="ol1p9m-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1513" id="ol1p9m-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1514" instrument_node="">AS 338LEC Islam and Literature</span></a><span data-dcnode-id="1512" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="ol1p9m-accordion-label" class="accordion-content" data-dcnode-id="1484" data-tab-content="" id="ol1p9m-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1508" type="button"><span data-dcnode-id="1511" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">AS 338LEC Islam and Literature</span></span></button><span data-dcnode-id="1507" instrument_node=""> </span><strong data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Lecture</span></strong><br data-dcnode-id="1504"><span data-dcnode-id="1503" instrument_node=""> </span><p class="course-description" data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">The purpose of this course is to expose students to the wide variety of poetic and prose literary forms associated with Islam, including contemporary English-language novels and translations from Arabic, Bengali, Persian, and Urdu originals. We will explore literature through a variety of themes and genres common to the literary traditions of these languages. This will serve to frame larger questions central to the study of Islamicate literatures. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="1500" instrument_node=""> </span><div data-dcnode-id="1485"><strong data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Credits: </span></strong><span data-dcnode-id="1497" instrument_node=""> 3 </span><br data-dcnode-id="1496"><span data-dcnode-id="1495" instrument_node=""> </span><strong data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Grading:</span></strong><span data-dcnode-id="1492" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1491"><span data-dcnode-id="1490" instrument_node=""> </span><strong data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1487" instrument_node=""> Spring </span><br data-dcnode-id="1486"></div></div></li><span data-dcnode-id="1482" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1447"><a aria-controls="x680oi-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1480" id="x680oi-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1481" instrument_node="">AS 340SEM Women in Contemporary Asia</span></a><span data-dcnode-id="1479" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="x680oi-accordion-label" class="accordion-content" data-d
