n data-dcnode-id="1458" instrument_node="">Grading:</span></strong><span data-dcnode-id="1456" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1455"><span data-dcnode-id="1454" instrument_node=""> </span><strong data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1451" instrument_node=""> Spring </span><br data-dcnode-id="1450"></div></div></li><span data-dcnode-id="1446" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1414"><a aria-controls="x2jh6m-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1444" id="x2jh6m-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1445" instrument_node="">AS 343LEC Indonesia: From Colonialism to Dictatorship</span></a><span data-dcnode-id="1443" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="x2jh6m-accordion-label" class="accordion-content" data-dcnode-id="1415" data-tab-content="" id="x2jh6m-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1439" type="button"><span data-dcnode-id="1442" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">AS 343LEC Indonesia: From Colonialism to Dictatorship</span></span></button><span data-dcnode-id="1438" instrument_node=""> </span><strong data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Lecture</span></strong><br data-dcnode-id="1435"><span data-dcnode-id="1434" instrument_node=""> </span><p class="course-description" data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">The course examines Indonesian history from the beginnings of the nationalist movement in the early twentieth century, through the Japanese occupation during World War Two and the anti-colonial revolution that followed it. It then looks at the decline of constitutional democracy and the subsequent establishment of martial law, as well as the tragic killings in the mid-1960s that led to the rise of the 32-year long regime of President Suharto.</span></p><span data-dcnode-id="1431" instrument_node=""> </span><div data-dcnode-id="1416"><strong data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Credits: </span></strong><span data-dcnode-id="1428" instrument_node=""> 3 </span><br data-dcnode-id="1427"><span data-dcnode-id="1426" instrument_node=""> </span><strong data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Grading:</span></strong><span data-dcnode-id="1423" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1422"><span data-dcnode-id="1421" instrument_node=""> </span><strong data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1418" instrument_node=""> Fall, Winter, Spring, Summer </span><br data-dcnode-id="1417"></div></div></li><span data-dcnode-id="1413" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1378"><a aria-controls="clvviz-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1411" id="clvviz-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1412" instrument_node="">AS 345LEC Contemporary Korean Popular Culture and the Korean Wave</span></a><span data-dcnode-id="1410" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="clvviz-accordion-label" class="accordion-content" data-dcnode-id="1379" data-tab-content="" id="clvviz-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1406" type="button"><span data-dcnode-id="1409" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">AS 345LEC Contemporary Korean Popular Culture and the Korean Wave</span></span></button><span data-dcnode-id="1405" instrument_node=""> </span><strong data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Lecture</span></strong><br data-dcnode-id="1402"><span data-dcnode-id="1401" instrument_node=""> </span><p class="course-description" data-dcnode-id="1396"><span data-dcnode-id="1400" instrument_node="">This course explores contemporary Korean popular culture by engaging in social and cultural representations from the Korean War to the present day. This course will help students to understand current Korean popular culture as well as the Korean Wave (Hallyu) that is spreading across the globe. This course will also help students to grasp contemporary Korean culture and Korean identity; as well as the values and images depicted in modern Korea. It explores diverse topics including music (K-pop), movies, K-dramas, K-beauty, fashion, food, gaming culture, leisure activities, as well as sports. This course is the same as </span><a data-dcnode-id="1398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DKOR%26num%3D345"><span data-dcnode-id="1399" instrument_node="">KOR 345</span></a><span data-dcnode-id="1397" instrument_node=""> and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="1395" instrument_node=""> </span><div data-dcnode-id="1380"><strong data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Credits: </span></strong><span data-dcnode-id="1392" instrument_node=""> 3 </span><br data-dcnode-id="1391"><span data-dcnode-id="1390" instrument_node=""> </span><strong data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Grading:</span></strong><span data-dcnode-id="1387" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1386"><span data-dcnode-id="1385" instrument_node=""> </span><strong data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1382" instrument_node=""> Fall </span><br data-dcnode-id="1381"></div></div></li><span data-dcnode-id="1377" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1345"><a aria-controls="bgwyy5-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1375" id="bgwyy5-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1376" instrument_node="">AS 347LEC The Fantastical World of Japanese Anime</span></a><span data-dcnode-id="1374" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="bgwyy5-accordion-label" class="accordion-content" data-dcnode-id="1346" data-tab-content="" id="bgwyy5-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1370" type="button"><span data-dcnode-id="1373" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">AS 347LEC The Fantastical World of Japanese Anime</span></span></button><span data-dcnode-id="1369" instrument_node=""> </span><strong data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Lecture</span></strong><br data-dcnode-id="1366"><span data-dcnode-id="1365" instrument_node=""> </span><p class="course-description" data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">In the past three decades Japanese popular culture has surpassed the technology industry to become Japans largest export. In particular, anime (Japanese animation), the most profitable form of Japanese popular culture, has become increasingly visible all over the world. Although anime fandom in the U.S. is anchored by several works of mass appeal, it remains a subculture whose increasingly influential devotees occupy a cultural fringe. This course introduces students to this unique subculture and introduces an academic approach to viewing the anime art form. In addition to the focus on specific genres of anime, this course will pay special attention to four influential anime directors; Oshii Mamoru, Satoshi Kon, Hosoda Mamoru and Miyazaki Hayao. This course is designed to be interactive, while it builds a rigorous understanding of the anime medium through its history, its artists, and its institutions. Not only will the course focus on critical analysis of films, it will use anime as a medium by which to study Japanese culture at large, with some attention given to production. Taught in English.</span></p><span data-dcnode-id="1362" instrument_node=""> </span><div data-dcnode-id="1347"><strong data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Credits: </span></strong><span data-dcnode-id="1359" instrument_node=""> 3 </span><br data-dcnode-id="1358"><span data-dcnode-id="1357" instrument_node=""> </span><strong data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Grading:</span></strong><span data-dcnode-id="1354" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1353"><span data-dcnode-id="1352" instrument_node=""> </span><strong data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1349" instrument_node=""> Fall </span><br data-dcnode-id="1348"></div></div></li><span data-dcnode-id="1344" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1312"><a aria-controls="gxelh1-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1342" id="gxelh1-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1343" instrument_node="">AS 350LEC Modern Japanese Media</span></a><span data-dcnode-id="1341" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="gxelh1-accordion-label" class="accordion-content" data-dcnode-id="1313" data-tab-content="" id="gxelh1-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1337" type="button"><span data-dcnode-id="1340" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">AS 350LEC Modern Japanese Media</span></span></button><span data-dcnode-id="1336" instrument_node=""> </span><strong data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Lecture</span></strong><br data-dcnode-id="1333"><span data-dcnode-id="1332" instrument_node=""> </span><p class="course-description" data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">This course introduces the study of Japanese culture through the media of modern Japan. Japanese popular culture is traced from its roots in the early twentieth century to today.</span></p><span data-dcnode-id="1329" instrument_node=""> </span><div data-dcnode-id="1314"><strong data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Credits: </span></strong><span data-dcnode-id="1326" instrument_node=""> 3 </span><br data-dcnode-id="1325"><span data-dcnode-id="1324" instrument_node=""> </span><strong data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Grading:</span></strong><span data-dcnode-id="1321" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1320"><span data-dcnode-id="1319" instrument_node=""> </span><strong data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1316" instrument_node=""> Spring </span><br data-dcnode-id="1315"></div></div></li><span data-dcnode-id="1311" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1273"><a aria-controls="wk4aoj-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1309" id="wk4aoj-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1310" instrument_node="">AS 364LEC Chinese Film and Visual Culture</span></a><span data-dcnode-id="1308" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="wk4aoj-accordion-label" class="accordion-content" data-dcnode-id="1274" data-tab-content="" id="wk4aoj-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1304" type="button"><span data-dcnode-id="1307" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">AS 364LEC Chinese Film and Visual Culture</span></span></button><span data-dcnode-id="1303" instrument_node=""> </span><strong data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Lecture</span></strong><br data-dcnode-id="1300"><span data-dcnode-id="1299" instrument_node=""> </span><p class="course-description" data-dcnode-id="1294"><span data-dcnode-id="1298" instrument_node="">This course is an introduction to Chinese film and visual culture from the earliest days until the present. Chinese film and media studies are rich fields with links to literature, theater and opera, and visual art. This class invites students to watch, read, and discuss films from several periods and traditions, including auteur films (films by famous directors), genre films (for example, martial arts films), and animated films. This is a film and media studies course. Students will be graded for discussion and participation, short response papers, and one final written essay. This course is taught in English. The films are subtitled in English and the readings are also in English. There are no prerequisites for this course, just an interest in Chinese film and visual culture. This course is the same as </span><a data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DCHI%26num%3D364"><span data-dcnode-id="1297" instrument_node="">CHI 364</span></a><span data-dcnode-id="1295" instrument_node=""> and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="1293" instrument_node=""> </span><div data-dcnode-id="1275"><strong data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Credits: </span></strong><span data-dcnode-id="1290" instrument_node=""> 3 </span><br data-dcnode-id="1289"><span data-dcnode-id="1288" instrument_node=""> </span><strong data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Grading:</span></strong><span data-dcnode-id="1285" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1284"><span data-dcnode-id="1283" instrument_node=""> </span><strong data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1280" instrument_node=""> </span><span class="course-info-none" data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Varies</span></span><span data-dcnode-id="1277" instrument_node=""> </span><br data-dcnode-id="1276"></div></div></li><span data-dcnode-id="1272" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1237"><a aria-controls="tlmgih-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1270" id="tlmgih-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1271" instrument_node="">AS 367LEC Food In Asia</span></a><span data-dcnode-id="1269" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="tlmgih-accordion-label" class="accordion-content" data-dcnode-id="1238" data-tab-content="" id="tlmgih-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1265" type="button"><span data-dcnode-id="1268" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">AS 367LEC Food In Asia</span></span></button><span data-dcnode-id="1264" instrument_node=""> </span><strong data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Lecture</span></strong><br data-dcnode-id="1261"><span data-dcnode-id="1260" instrument_node=""> </span><p class="course-description" data-dcnode-id="1255"><span data-dcnode-id="1259" instrument_node="">What is food for? This simple question invites us to ponder myriad ways that food connects to our lives, from cooking to eating, from spice to medicine, from the expression of the self to the mediation of social relationship. Not surprisingly, food constitutes a vital aspect of Asian culture that figures saliently both in Asia and beyond. Even without going to Asian, we may all have the experience of tasting sushi, General-Tso¿s chicken, or curry. This course probes the history of food in Asia, exploring both the rich culture of food within Asia and its fast spread to the rest of the world in recent past. Topics covered in this course include the techniques of cooking (we may try ourselves), the religious meanings of food, regional features, food trade, food and colonialism, food and national identity, and Asian food in America. In the end, the course seeks to use the study of dishes and drinks in Asia as a gateway to not just understand the fabric of Asian society but also illuminate our dietary habits and ways of living here and now. [No prior knowledge in Asian languages or history is required.] This course is the same as </span><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DHIS%26num%3D367"><span data-dcnode-id="1258" instrument_node="">HIS 367</span></a><span data-dcnode-id="1256" instrument_node="">, and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="1254" instrument_node=""> </span><div data-dcnode-id="1239"><strong data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Credits: </span></strong><span data-dcnode-id="1251" instrument_node=""> 3 </span><br data-dcnode-id="1250"><span data-dcnode-id="1249" instrument_node=""> </span><strong data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Grading:</span></strong><span data-dcnode-id="1246" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1245"><span data-dcnode-id="1244" instrument_node=""> </span><strong data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1241" instrument_node=""> Fall, Spring </span><br data-dcnode-id="1240"></div></div></li><span data-dcnode-id="1236" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1198"><a aria-controls="7plxzq-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1234" id="7plxzq-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1235" instrument_node="">AS 368LEC Modern Japan Since 1600</span></a><span data-dcnode-id="1233" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="7plxzq-accordion-label" class="accordion-content" data-dcnode-id="1199" data-tab-content="" id="7plxzq-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1229" type="button"><span data-dcnode-id="1232" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">AS 368LEC Modern Japan Since 1600</span></span></button><span data-dcnode-id="1228" instrument_node=""> </span><strong data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Lecture</span></strong><br data-dcnode-id="1225"><span data-dcnode-id="1224" instrument_node=""> </span><p class="course-description" data-dcnode-id="1219"><span data-dcnode-id="1223" instrument_node="">Japan's emergence as a modern state. This course is the same as </span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DHIS%26num%3D368"><span data-dcnode-id="1222" instrument_node="">HIS 368</span></a><span data-dcnode-id="1220" instrument_node="">LEC, and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.. AAL</span></p><span data-dcnode-id="1218" instrument_node=""> </span><div data-dcnode-id="1200"><strong data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Credits: </span></strong><span data-dcnode-id="1215" instrument_node=""> 3 </span><br data-dcnode-id="1214"><span data-dcnode-id="1213" instrument_node=""> </span><strong data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Grading:</span></strong><span data-dcnode-id="1210" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1209"><span data-dcnode-id="1208" instrument_node=""> </span><strong data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1205" instrument_node=""> </span><span class="course-info-none" data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Varies</span></span><span data-dcnode-id="1202" instrument_node=""> </span><br data-dcnode-id="1201"></div></div></li><span data-dcnode-id="1197" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1162"><a aria-controls="6m66wh-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1195" id="6m66wh-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1196" instrument_node="">AS 369LEC Korean History Up to 1800</span></a><span data-dcnode-id="1194" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="6m66wh-accordion-label" class="accordion-content" data-dcnode-id="1163" data-tab-content="" id="6m66wh-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1190" type="button"><span data-dcnode-id="1193" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">AS 369LEC Korean History Up to 1800</span></span></button><span data-dcnode-id="1189" instrument_node=""> </span><strong data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Lecture</span></strong><br data-dcnode-id="1186"><span data-dcnode-id="1185" instrument_node=""> </span><p class="course-description" data-dcnode-id="1180"><span data-dcnode-id="1184" instrument_node="">This course traces roughly two thousand years of Korean history, from tribal federations to the rise of early states that vied with one another for supremacy and the eventual establishment of political rule over the peninsula by a succession of dynastic states Silla, Kory, and Chos. The goal is to familiarize students with the major social, cultural, political, intellectual and religious developments in the Korean peninsula up to the start of the nineteenth century, while at the same time placing these historical developments within the wider regional context of Korea¿s relations with China and Japan. For most of East Asia's history, the people of Korea had more culturally extensive and historically significant contacts with its two neighbors than they had with each other. For this reason learning about Korea¿s history provides a unique window onto premodern East Asia, and the history of these interconnections in turn reveals something important about the formation of a distinctive Korean identity. In addition to reading and being tested on primary and secondary sources on Korean history, students will be expected to demonstrate their ability to discuss and think critically about the material through written assignments. This course is the same as </span><a data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DHIS%26num%3D369"><span data-dcnode-id="1183" instrument_node="">HIS 369</span></a><span data-dcnode-id="1181" instrument_node=""> and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="1179" instrument_node=""> </span><div data-dcnode-id="1164"><strong data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Credits: </span></strong><span data-dcnode-id="1176" instrument_node=""> 3 </span><br data-dcnode-id="1175"><span data-dcnode-id="1174" instrument_node=""> </span><strong data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Grading:</span></strong><span data-dcnode-id="1171" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1170"><span data-dcnode-id="1169" instrument_node=""> </span><strong data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1166" instrument_node=""> Fall, Winter, Spring, Summer </span><br data-dcnode-id="1165"></div></div></li><span data-dcnode-id="1161" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1126"><a aria-controls="78z3b2-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1159" id="78z3b2-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1160" instrument_node="">AS 370LEC Modern Korean History</span></a><span data-dcnode-id="1158" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="78z3b2-accordion-label" class="accordion-content" data-dcnode-id="1127" data-tab-content="" id="78z3b2-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1154" type="button"><span data-dcnode-id="1157" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">AS 370LEC Modern Korean History</span></span></button><span data-dcnode-id="1153" instrument_node=""> </span><strong data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Lecture</span></strong><br data-dcnode-id="1150"><span data-dcnode-id="1149" instrument_node=""> </span><p class="course-description" data-dcnode-id="1144"><span data-dcnode-id="1148" instrument_node="">This course looks at the historical transformations that shaped Korean society, culture and politics in the peninsula from the late 19th century to the present. Attention will be given to Korea's interconnections with events occurring elsewhere in East Asia and other parts of the world as we examine the fast moving events following Korea's forced opening in 1876 by Japan. Included among the major historical events and issues that will be covered in this course on modern Korean history are imperialism and self-strengthening efforts, the period of Japanese colonial rule and its effects on Korean society and politics, the division of the country after 1945 and the Korean War, authoritarianism and military dictatorship in the South, along with the concurrent industrialization and economic development of the 1960s and 70s, student protests and democratization in the South, post-war developments in North Korea, current problems in inter-Korean relations and the prospects for unification in the peninsula. This course is the same as </span><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DHIS%26num%3D370"><span data-dcnode-id="1147" instrument_node="">HIS 370</span></a><span data-dcnode-id="1145" instrument_node="">, and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="1143" instrument_node=""> </span><div data-dcnode-id="1128"><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Credits: </span></strong><span data-dcnode-id="1140" instrument_node=""> 3 </span><br data-dcnode-id="1139"><span data-dcnode-id="1138" instrument_node=""> </span><strong data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Grading:</span></strong><span data-dcnode-id="1135" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1134"><span data-dcnode-id="1133" instrument_node=""> </span><strong data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1130" instrument_node=""> Fall, Spring </span><br data-dcnode-id="1129"></div></div></li><span data-dcnode-id="1125" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1087"><a aria-controls="pegcey-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1123" id="pegcey-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1124" instrument_node="">AS 372LEC History of Buddhism in East Asia</span></a><span data-dcnode-id="1122" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="pegcey-accordion-label" class="accordion-content" data-dcnode-id="1088" data-tab-content="" id="pegcey-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1118" type="button"><span data-dcnode-id="1121" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">AS 372LEC History of Buddhism in East Asia</span></span></button><span data-dcnode-id="1117" instrument_node=""> </span><strong data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Lecture</span></strong><br data-dcnode-id="1114"><span data-dcnode-id="1113" instrument_node=""> </span><p class="course-description" data-dcnode-id="1108"><span data-dcnode-id="1112" instrument_node="">This course traces the history of Buddhism from its origins in India to its introduction and subsequent growth in East Asia. How did the transmission of Buddhism through Central Asia influence its development? How did Buddhist doctrines and practices change as the religion became part of the social fabric in China, Korea, and Japan? What impact did it have on those countries? After spending a few weeks becoming familiar with the basic outlines of Buddhism in India, we will examine more closely the development of East Asian traditions of Buddhist thought and practice and the roles they played not only in the spiritual lives of people living in China, Korea, and Japan, but also in the political, diplomatic, material, artistic, and social arenas. The links tying the Buddhist traditions of all countries together will be emphasized, but we will also consider the significant differences they exhibited over time. Although a wide range of Buddhist concepts and doctrines will be introduced and discussed, students are not expected to have any prior knowledge either of Buddhism or East Asian history. This course is the same as </span><a data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DHIS%26num%3D372"><span data-dcnode-id="1111" instrument_node="">HIS 372</span></a><span data-dcnode-id="1109" instrument_node="">.</span></p><span data-dcnode-id="1107" instrument_node=""> </span><div data-dcnode-id="1089"><strong data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Credits: </span></strong><span data-dcnode-id="1104" instrument_node=""> 3 </span><br data-dcnode-id="1103"><span data-dcnode-id="1102" instrument_node=""> </span><strong data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Grading:</span></strong><span data-dcnode-id="1099" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1098"><span data-dcnode-id="1097" instrument_node=""> </span><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1094" instrument_node=""> </span><span class="course-info-none" data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Varies</span></span><span data-dcnode-id="1091" instrument_node=""> </span><br data-dcnode-id="1090"></div></div></li><span data-dcnode-id="1086" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1051"><a aria-controls="90hkvb-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1084" id="90hkvb-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1085" instrument_node="">AS 374LEC History of the Spread of Christianity in Asia</span></a><span data-dcnode-id="1083" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="90hkvb-accordion-label" class="accordion-content" data-dcnode-id="1052" data-tab-content="" id="90hkvb-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1079" type="button"><span data-dcnode-id="1082" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">AS 374LEC History of the Spread of Christianity in Asia</span></span></button><span data-dcnode-id="1078" instrument_node=""> </span><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Lecture</span></strong><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node=""> </span><p class="course-description" data-dcnode-id="1069"><span data-dcnode-id="1073" instrument_node="">This course traces the introduction and spread of Christianity in Asian history, focusing primarily on East Asia and giving special attention to Korea. It begins with an examination of Jesuit missions to Japan and China, as well as the role that India played in the establishment and maintenance of these missions. The different Jesuit strategies for accommodating or rejecting indigenous religious beliefs and customs are compared and considered, as well as the Nestorians in China much earlier. Then we turn to the unique way in which Catholicism was subsequently established in Korea, where Christianity has enjoyed unparalleled success in East Asia. We will look closely at how Christianity has affected and been affected by socio-political developments, its interactions with and influence upon traditional Asian religions, its relationship to nationalism since the late 19th century, and its tensions and conflict with colonialism and Communism in the 20th century. It concludes by asking what factors might have enabled Christianity to have such success in Korea (and the Philippines) and compare these to the situation in China and Japan. This course is the same as </span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DHIS%26num%3D374"><span data-dcnode-id="1072" instrument_node="">HIS 374</span></a><span data-dcnode-id="1070" instrument_node=""> and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="1068" instrument_node=""> </span><div data-dcnode-id="1053"><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Credits: </span></strong><span data-dcnode-id="1065" instrument_node=""> 3 </span><br data-dcnode-id="1064"><span data-dcnode-id="1063" instrument_node=""> </span><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Grading:</span></strong><span data-dcnode-id="1060" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node=""> </span><strong data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1055" instrument_node=""> Fall, Winter, Spring, Summer </span><br data-dcnode-id="1054"></div></div></li><span data-dcnode-id="1050" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="1015"><a aria-controls="usylfq-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1048" id="usylfq-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1049" instrument_node="">AS 375LEC The U.S. and East Asia</span></a><span data-dcnode-id="1047" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="usylfq-accordion-label" class="accordion-content" data-dcnode-id="1016" data-tab-content="" id="usylfq-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1043" type="button"><span data-dcnode-id="1046" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">AS 375LEC The U.S. and East Asia</span></span></button><span data-dcnode-id="1042" instrument_node=""> </span><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Lecture</span></strong><br data-dcnode-id="1039"><span data-dcnode-id="1038" instrument_node=""> </span><p class="course-description" data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">A survey of relations between the U.S. and East Asia from the eighteenth century to the present.</span></p><span data-dcnode-id="1035" instrument_node=""> </span><div data-dcnode-id="1017"><strong data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Credits: </span></strong><span data-dcnode-id="1032" instrument_node=""> 3 </span><br data-dcnode-id="1031"><span data-dcnode-id="1030" instrument_node=""> </span><strong data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Grading:</span></strong><span data-dcnode-id="1027" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="1026"><span data-dcnode-id="1025" instrument_node=""> </span><strong data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="1022" instrument_node=""> </span><span class="course-info-none" data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Varies</span></span><span data-dcnode-id="1019" instrument_node=""> </span><br data-dcnode-id="1018"></div></div></li><span data-dcnode-id="1014" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="976"><a aria-controls="d0huki-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="1012" id="d0huki-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="1013" instrument_node="">AS 376LEC Buddhist Philosophy</span></a><span data-dcnode-id="1011" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="d0huki-accordion-label" class="accordion-content" data-dcnode-id="977" data-tab-content="" id="d0huki-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="1007" type="button"><span data-dcnode-id="1010" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">AS 376LEC Buddhist Philosophy</span></span></button><span data-dcnode-id="1006" instrument_node=""> </span><strong data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Lecture</span></strong><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node=""> </span><p class="course-description" data-dcnode-id="997"><span data-dcnode-id="1001" instrument_node="">Siddhartha Gautama, the historical Buddha, claimed to have discovered the key to eliminating suffering. Suffering, he thought, arises because our most basic experiences of the world are mistaken. In the thousands of years that followed, his philosophical and psychological insights have been developed by thinkers around the world. This course will present an introduction to the basic philosophical positions of Buddhist philosophy and their development. This course is the same as </span><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DPHI%26num%3D376"><span data-dcnode-id="1000" instrument_node="">PHI 376</span></a><span data-dcnode-id="998" instrument_node=""> and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="996" instrument_node=""> </span><div data-dcnode-id="978"><strong data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Credits: </span></strong><span data-dcnode-id="993" instrument_node=""> 3 </span><br data-dcnode-id="992"><span data-dcnode-id="991" instrument_node=""> </span><strong data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Grading:</span></strong><span data-dcnode-id="988" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="987"><span data-dcnode-id="986" instrument_node=""> </span><strong data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="983" instrument_node=""> </span><span class="course-info-none" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Varies</span></span><span data-dcnode-id="980" instrument_node=""> </span><br data-dcnode-id="979"></div></div></li><span data-dcnode-id="975" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="934"><a aria-controls="xuhyt3-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="973" id="xuhyt3-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="974" instrument_node="">AS 380LEC Chinese Tradition &amp; Guanxi</span></a><span data-dcnode-id="972" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="xuhyt3-accordion-label" class="accordion-content" data-dcnode-id="935" data-tab-content="" id="xuhyt3-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="968" type="button"><span data-dcnode-id="971" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">AS 380LEC Chinese Tradition &amp; Guanxi</span></span></button><span data-dcnode-id="967" instrument_node=""> </span><strong data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Lecture</span></strong><br data-dcnode-id="964"><span data-dcnode-id="963" instrument_node=""> </span><p class="course-description" data-dcnode-id="952"><span data-dcnode-id="962" instrument_node="">Continuation of </span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DCHI%26num%3D280"><span data-dcnode-id="961" instrument_node="">CHI 280</span></a><span data-dcnode-id="959" instrument_node="">. Surveys major cultural and traditional elements that have influenced various aspects of contemporary Chinese life. Topics include Chinese philosophical ideals, religion, women, family, education, Chinese language and symbolic reference, literature and art in both traditional and modern China. This course is intended to introduce Chinese culture at its deep level or philosophical value of the Chinese culture. The correspondence with previous Chinese culture course </span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DCHI%26num%3D280"><span data-dcnode-id="958" instrument_node="">CHI 280</span></a><span data-dcnode-id="956" instrument_node=""> is addressed. Taught in English; requires no knowledge of Chinese language. An optional course for Chinese Minor. This course is the same as </span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DCHI%26num%3D380"><span data-dcnode-id="955" instrument_node="">CHI 380</span></a><span data-dcnode-id="953" instrument_node=""> and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="951" instrument_node=""> </span><div data-dcnode-id="936"><strong data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Credits: </span></strong><span data-dcnode-id="948" instrument_node=""> 3 </span><br data-dcnode-id="947"><span data-dcnode-id="946" instrument_node=""> </span><strong data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Grading:</span></strong><span data-dcnode-id="943" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="942"><span data-dcnode-id="941" instrument_node=""> </span><strong data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="938" instrument_node=""> Spring </span><br data-dcnode-id="937"></div></div></li><span data-dcnode-id="933" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="898"><a aria-controls="flqy2q-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="931" id="flqy2q-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="932" instrument_node="">AS 383LEC Travel Writing in Asia</span></a><span data-dcnode-id="930" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="flqy2q-accordion-label" class="accordion-content" data-dcnode-id="899" data-tab-content="" id="flqy2q-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="926" type="button"><span data-dcnode-id="929" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">AS 383LEC Travel Writing in Asia</span></span></button><span data-dcnode-id="925" instrument_node=""> </span><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Lecture</span></strong><br data-dcnode-id="922"><span data-dcnode-id="921" instrument_node=""> </span><p class="course-description" data-dcnode-id="916"><span data-dcnode-id="920" instrument_node="">The idea of India has long attracted the attention of people from afar. Whether in search of gold or enlightenment, the India carried in the traveler's imagination often conflicts with the India that is actually encountered. This course is intended to serve not just as an introduction to the motivations and experiences of travelers to India, but also to the forms of knowledge that are produced in the wake of such travels. We will begin by examining the accounts of early Greek ambassadors and sailors and Chinese pilgrims seeking wealth and knowledge. Both Muslim and Christian adventurers produced travelogues that describe the marvels of India in the medieval period. The Mughal court fascinated Europeans sojourners, while Indian travelers were in turn both delighted and disgusted by what they observed in Europe. Hippies more recently and in their own way reenact quests by colonial British officials for the sublime and picturesque. The diversity of perspectives that these works present challenges readers to consider what it means to be an outsider looking in on a culture, compelling us to consider arguments for and against treating certain geographic and political regions and temporal periods as coherent cultural zones. By reading and discussing a wide range of both primary and secondary source materials, students will develop a broad familiarity with the history, literatures, religions, and geography of South Asia. All of the readings are in English and no background in South Asian languages, history, or literature is expected. This course is the same as </span><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DENG%26num%3D388"><span data-dcnode-id="919" instrument_node="">ENG 388</span></a><span data-dcnode-id="917" instrument_node="">, and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="915" instrument_node=""> </span><div data-dcnode-id="900"><strong data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Credits: </span></strong><span data-dcnode-id="912" instrument_node=""> 3 </span><br data-dcnode-id="911"><span data-dcnode-id="910" instrument_node=""> </span><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Grading:</span></strong><span data-dcnode-id="907" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="906"><span data-dcnode-id="905" instrument_node=""> </span><strong data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="902" instrument_node=""> Spring </span><br data-dcnode-id="901"></div></div></li><span data-dcnode-id="897" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="862"><a aria-controls="8nd11z-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="895" id="8nd11z-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="896" instrument_node="">AS 389LEC Pirates, Drifters, Fishers: Maritime Southeast Asia</span></a><span data-dcnode-id="894" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="8nd11z-accordion-label" class="accordion-content" data-dcnode-id="863" data-tab-content="" id="8nd11z-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="890" type="button"><span data-dcnode-id="893" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">AS 389LEC Pirates, Drifters, Fishers: Maritime Southeast Asia</span></span></button><span data-dcnode-id="889" instrument_node=""> </span><strong data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Lecture</span></strong><br data-dcnode-id="886"><span data-dcnode-id="885" instrument_node=""> </span><p class="course-description" data-dcnode-id="880"><span data-dcnode-id="884" instrument_node="">This course examines key moments and longer-term dynamics of Southeast Asia's maritime history. We will consider how the sea affected state-building from its earliest days, its impact on pre-colonial international relations, its role as a conduit of the desire for conquest and for exotic goods, and the question of piracy, past and present. This course is the same as </span><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DAS%26num%3D389"><span data-dcnode-id="883" instrument_node="">AS 389</span></a><span data-dcnode-id="881" instrument_node="">, and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements..</span></p><span data-dcnode-id="879" instrument_node=""> </span><div data-dcnode-id="864"><strong data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Credits: </span></strong><span data-dcnode-id="876" instrument_node=""> 3 </span><br data-dcnode-id="875"><span data-dcnode-id="874" instrument_node=""> </span><strong data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Grading:</span></strong><span data-dcnode-id="871" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="870"><span data-dcnode-id="869" instrument_node=""> </span><strong data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="866" instrument_node=""> Fall, Winter, Spring, Summer </span><br data-dcnode-id="865"></div></div></li><span data-dcnode-id="861" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="826"><a aria-controls="kems6p-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="859" id="kems6p-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="860" instrument_node="">AS 390LEC Chinese Medicine in the World</span></a><span data-dcnode-id="858" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="kems6p-accordion-label" class="accordion-content" data-dcnode-id="827" data-tab-content="" id="kems6p-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="854" type="button"><span data-dcnode-id="857" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">AS 390LEC Chinese Medicine in the World</span></span></button><span data-dcnode-id="853" instrument_node=""> </span><strong data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Lecture</span></strong><br data-dcnode-id="850"><span data-dcnode-id="849" instrument_node=""> </span><p class="course-description" data-dcnode-id="844"><span data-dcnode-id="848" instrument_node="">This course surveys the history of Chinese medicine seen through world history. It focuses on the continuous and dynamic exchange of medical ideas, practices, and materials between China and the rest of the world from antiquity to the present. Rather than treating Chinese medicine as a monolithic, stable, and isolated system of healing, the course highlights its active interactions with other healing cultures throughout history. By offering revealing comparisons and identifying unexpected connections, this course seeks to not just enrich our understanding of the global history of Chinese medicine but also utilize historical knowledge to illuminate our ways of living today. This course is the same as </span><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DAS%26num%3D390"><span data-dcnode-id="847" instrument_node="">AS 390</span></a><span data-dcnode-id="845" instrument_node="">, and course repeat rules will apply. Students should consult with their major department regarding any restrictions on their degree requirements.</span></p><span data-dcnode-id="843" instrument_node=""> </span><div data-dcnode-id="828"><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Credits: </span></strong><span data-dcnode-id="840" instrument_node=""> 3 </span><br data-dcnode-id="839"><span data-dcnode-id="838" instrument_node=""> </span><strong data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Grading:</span></strong><span data-dcnode-id="835" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="834"><span data-dcnode-id="833" instrument_node=""> </span><strong data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="830" instrument_node=""> Spring </span><br data-dcnode-id="829"></div></div></li><span data-dcnode-id="825" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="787"><a aria-controls="pmh2fe-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="823" id="pmh2fe-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="824" instrument_node="">AS 391LEC China and the World</span></a><span data-dcnode-id= ng><span data-dcnode-id="420" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="419"><span data-dcnode-id="418" instrument_node=""> </span><strong data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Typically Offered:</span></strong><span data-dcnode-id="415" instrument_node=""> </span><span class="course-info-none" data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Varies</span></span><span data-dcnode-id="412" instrument_node=""> </span><br data-dcnode-id="411"></div></div></li><span data-dcnode-id="407" instrument_node=""> </span><li class="accordion-item" data-accordion-item="" data-dcnode-id="372"><a aria-controls="wyt56n-accordion" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="405" id="wyt56n-accordion-label" role="tab" tabindex="0"><span data-dcnode-id="406" instrument_node="">AS 492SEM Poisons, Drugs, and Panaceas</span></a><span data-dcnode-id="404" instrument_node=""> </span><div aria-hidden="true" aria-labelledby="wyt56n-accordion-label" class="accordion-content" data-dcnode-id="373" data-tab-content="" id="wyt56n-accordion" role="tabpanel"><button class="schedule-button ie-remove float-right ga__button" data-dcnode-id="400" type="button"><span data-dcnode-id="403" instrument_node=""> View Schedule </span><span class="show-for-sr" data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">AS 492SEM Poisons, Drugs, and Panaceas</span></span></button><span data-dcnode-id="399" instrument_node=""> </span><strong data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Seminar</span></strong><br data-dcnode-id="396"><span data-dcnode-id="395" instrument_node=""> </span><p class="course-description" data-dcnode-id="390"><span data-dcnode-id="394" instrument_node="">What is a poison? How do we understand the effects of poisons on our body? How do we make the best use of these potent matters that can benefit us and the society at large? These are some of the fundamental questions to the history of medicine, and driving ones for this course. Examining the history of poisons through twelve case studies, we will explore the complexity of poison materiality by contemplating the intimate relations between poisons, medicines, and foods. We will learn how the experiences of the body shaped the conceived values of poisons. We will examine the circulation of poison knowledge across social and geographical domains. Using specific poisons as the anchor of our analysis, we will explore the social fabric and cultural milieu in which particular ideas and practices of poisons emerged, flourished, or diminished. One key aspect of the course is to introduce a comparative perspective to the study of medical history. By studying above topics in both European/American and Asian contexts, we will identify surprising parallels, striking differences, and hidden connections between these traditions. Finally, we will ponder how knowledge of poisons in the past illuminates our notions and habits of ingesting and experiencing drugs today. This course is the same as </span><a data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.buffalo.edu/courses/courses%3Fabbr%3DHIS%26num%3D492"><span data-dcnode-id="393" instrument_node="">HIS 492</span></a><span data-dcnode-id="391" instrument_node="">.</span></p><span data-dcnode-id="389" instrument_node=""> </span><div data-dcnode-id="374"><strong data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Credits: </span></strong><span data-dcnode-id="386" instrument_node=""> 3 </span><br data-dcnode-id="385"><span data-dcnode-id="384" instrument_node=""> </span><strong data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Grading:</span></strong><span data-dcnode-id="381" instrument_node=""> Graded (GRD)</span><br data-dcnode-id="380"><span data-dcnode-id="379" instrument_node=""> </span><strong data-dcnode-id="377"><span data-dcnode-id="378" i
