	The action-oriented category initiatives have been brought about by necessity because human rights advocates found it useful to coordinate their efforts in the promotion of human rights and in promoting Asian concerns in major international forums. The setting up of the regional NGO coordinating group in early 1994 greatly enhanced the efforts of Asian NGOs involved in the Bangkok regional human rights meeting and the subsequent Vienna meeting in June 1993. During the Vienna conference Asian NGOs were regarded as the best organized group and with 270 representatives, constituted the second-largest group in the NGO forum after Western Europe.</span><sup data-dcnode-id="524"><font data-dcnode-id="525" size="-1"><span data-dcnode-id="526" instrument_node="">34</span></font></sup><span data-dcnode-id="523" instrument_node=""> As a follow-up to the Vienna World Conference many Asian NGOs have put forward ideas for strengthening their links and coordinating their activities. In early 1994 a new regional NGO facilitating group was created during a meeting in Bangkok which was attended by 70 human rights advocates from 58 organizations based in 15 different countries in the Asia-Pacific region. The group intends to facilitate human rights campaigns and activities by enhancing information exchange and access to data about human rights issues and events of common interest, and the effectiveness of human rights protection actions and appeals. </span></p><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">

	The category of information and research-oriented organizations is closely related to the ideal model and action-oriented categories of regional NGO initiatives. Information exchange and obtaining access to information about human rights violations in the region are clearly critical for developing a legal protection framework or an action-oriented region-wide campaign. Several organizations have begun work in building up information networks on human rights issues. Another initiative on human rights information networking was made in September 1993, when an Asian regional meeting on human rights information exchange and networking took place in Hong Kong. The meeting, co-hosted by the Human Rights Database project at the University of Hong Kong and the Human Rights Information and Documentation System International, was attended by representatives of nine human rights documentation centres from eight countries.</span></p><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">
</span></p><h3 data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Human Rights Monitoring and Information Networking</span></h3><span data-dcnode-id="515" instrument_node="">

Measuring human rights violations is clearly no easy task. No comprehensive human rights data with reference to the particularities of human rights violations in the region are available. At present comprehensive and regular reports on human rights situations in the world are published either by government agencies such as the US State Department and international advocate NGOs such as Asia Watch, Amnesty International and Freedom House. Many of these reports cover the general human rights situation in the Asian region and specific human rights problems in Asian countries. Asia Watch, for example, released a report on human rights in the APEC region during the Asia Pacific Economic Cooperation conference in Seattle in November </span><font data-dcnode-id="514" size="-1"></font><span data-dcnode-id="513" instrument_node="">1993.</span><sup data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">35</span></sup><span data-dcnode-id="510" instrument_node=""> But such reports suffered from various limitations and none of them addresses the economic and social context of such problems.</span><p data-dcnode-id="497"><span data-dcnode-id="509" instrument_node="">
 
	Apart from technical problems, which have been discussed in a number of works,</span><sup data-dcnode-id="506"><font data-dcnode-id="507" size="-1"><span data-dcnode-id="508" instrument_node="">36</span></font></sup><span data-dcnode-id="505" instrument_node=""> existing reports also have been criticized on political grounds. Reports produced by individual governments are very often linked to specific policy objectives. Many independent observers, for example, have found the State Department reports useful, but as governmental reports their neutrality is questionable because their findings would have implications for US foreign policy.</span><sup data-dcnode-id="502"><font data-dcnode-id="503" size="-1"><span data-dcnode-id="504" instrument_node="">37</span></font></sup><span data-dcnode-id="501" instrument_node=""> 
	International NGO reports on human rights have provided useful information on human rights and their findings have been cited often by human rights advocates. But the emphasis of some of these international NGOs may not be the same as their Asian counterparts. Compared to some Asian NGOs, Amnesty International, for example, may be more preoccupied with prisoners of conscience rather than broader concerns about political and social structures. The Freedom House annual report, "Freedom in the World", is another example. While the report is a conscious attempt in using standard data, the measures are vague, and more emphasis is placed on political and civil liberties, with scant reference to the social and economic dimensions of human rights. Similarly, Asia Watch seldom ventures into the economic and social dimensions of human rights in its annual documentation of human rights violations in Asia.</span><sup data-dcnode-id="498"><font data-dcnode-id="499" size="-1"><span data-dcnode-id="500" instrument_node="">38</span></font></sup></p><p data-dcnode-id="491"><span data-dcnode-id="496" instrument_node="">

	Clearly a system of human rights protection should involve more efforts to examine the conceptual dimension of human rights protection in Asia. In a UN sponsored seminar in preparation for the Vienna World Conference, the problems of measuring the economic, social and cultural dimensions of human rights and developing indicators were discussed at length.</span><sup data-dcnode-id="493"><font data-dcnode-id="494" size="-1"><span data-dcnode-id="495" instrument_node="">39</span></font></sup><span data-dcnode-id="492" instrument_node=""> The major problem in developing indicators for measuring human rights is the subjective and qualitative nature of human rights. The interdependence and sometimes conflicting nature of certain economic, social and political and civil rights have further complicated attempts in developing a set of reliable and consistent indicators. While universal standards have been widely accepted in contemporary human rights debates, the North-South divide in the world does have implications for measuring achievements and understanding the source of human rights violations.</span></p><p data-dcnode-id="485"><span data-dcnode-id="490" instrument_node="">

	The development of an Asian approach to human rights protection requires the refinement of conceptual understanding of human rights in the Asian context, and greater expertise in measuring human rights standards as well as formulating better indicators. While many people in Asia would accept that political and civil rights, and economic and social rights, are indivisible, there has not been any comprehensive review of how such concepts can be applied in the East Asian context. Conceptualizing human rights in a regional and cultural-specific context remains highly problematic. The establishment of region-wide human rights protection mechanisms remains difficult. But efforts in developing information centres/networks, better data collection capacities and the promotion of region-wide information exchange have facilitated the emergence of what could be called "principled issue-networks on human rights".</span><sup data-dcnode-id="487"><font data-dcnode-id="488" size="-1"><span data-dcnode-id="489" instrument_node="">40</span></font></sup><span data-dcnode-id="486" instrument_node=""> Such an issue-network, characterized by its transnational nature, will help to facilitate greater human rights protection in the region.</span></p><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">
</span></p><h3 data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Conclusions</span></h3><span data-dcnode-id="480" instrument_node="">

There is no quick fix for resolving the human rights tensions between Western industrialized countries and states in the Asia-Pacific region. These tensions are not based entirely on different interpretations of human rights standards and international politics; they are also conflicts arising from different state-society power relationships and political arrangements. Unless dramatic political changes are to take place in the Asia-Pacific region, different interpretations and emphasis of human rights standards and values will remain an important source of international conflict and tension.</span><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">

	Important political, economic and social changes are forcing East Asian states to re-examine their positions towards human rights issues. A more general improvement of human rights in East Asia requires, among other things, greater social awareness, sustained economic development and more fundamental political changes. Efforts to develop a greater sense of common purpose on human rights protection, to further political liberalization, to develop further channels of institutionalized regional co-operation and the promotion of greater awareness will certainly go some way to the reduction of international tensions over human rights and create a better climate for human rights protection. But a regional alternative will only emerge when there is an awareness of different regional conditions and a genuine commitment to human rights protection, backed up by appropriate institutions and processes at the national level. </span></p><p data-dcnode-id="472"><span data-dcnode-id="477" instrument_node="">

	Some years ago R. J. Vincent identified the inescapable tension between human rights and foreign policy by pointing out that "the society of humankind stands opposed to the club of states, and one of the primary rules of the latter was to deny membership to the former".</span><sup data-dcnode-id="474"><font data-dcnode-id="475" size="-1"><span data-dcnode-id="476" instrument_node="">41</span></font></sup><span data-dcnode-id="473" instrument_node=""> Growing economic prosperity in the East Asian region is creating greater pressure for human rights improvement in the region, leading to the possibility of domestic political friction within Asian states with implications for regional stability. Governments in the region ignore human rights at their own peril.</span></p><p data-dcnode-id="466"><br data-dcnode-id="471"><span data-dcnode-id="470" instrument_node="">

</span><h2 data-dcnode-id="281"><a data-dcnode-id="283" name="POLITICAL"><span data-dcnode-id="284" instrument_node="">POLITICAL </span></a><span data-dcnode-id="282" instrument_node="">CULTURE AND INDONESIAN DEMOCRACY</span></h2><span data-dcnode-id="280" instrument_node="">

Leo Suryadinata</span><p data-dcnode-id="276"><br data-dcnode-id="279"><br data-dcnode-id="278"><span data-dcnode-id="277" instrument_node="">
</span></p><h3 data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Liberal Democracy (1949-58)</span></h3><span data-dcnode-id="273" instrument_node="">

Upon independence from the Dutch, Indonesia immediately introduced a form of liberal parliamentary democracy. In this system, political parties were the major actors and a free and fair general election was conducted in 1955. Nevertheless, parliamentary democracy did not last. In the following few years, the democratic system continued to be challenged. Extra-parliamentary forces - President Sukarno and the army - grew in strength and influence, and the regional rebellions and their subsequent defeat officially ended the parliamentary democracy period. There are many interpretations of the collapse of parliamentary democracy in Indonesia. Some maintain that the Indonesian people were not ready for "Western democracy" as there was no democratic tradition in Indonesian culture. </span><p data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">

	However, some argue that parliamentary democracy was doomed from the start as Sukarno and the military did not play a significant role in the democratic system. These two major actors were bound to "sabotage" the system. Religious, ethnic and economic conflicts accompanied by regional rebellions provided opportunities for these two actors, together with the Partai Komunis Indonesia (PKI), to increase their political power and influence. Parliamentary democracy was eventually destroyed.</span></p><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">
</span></p><h3 data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Guided Democracy</span></h3><span data-dcnode-id="266" instrument_node="">

Success in crushing the rebellions gave rise to a more powerful army and bolstered the position of President Sukarno. They effectively replaced parties as the principal political actors. Supported by the army, Sukarno re-adopted the presidential system of the 1945 constitution and under this "democracy by leadership" the elected parliament was dissolved and replaced with an appointed assembly.</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">

	"Guided Democracy" was a form of authoritarian rule by Sukarno. Whilst political parties were not banned (except the Masyumi and the PSI, which were involved in the regional rebellions), their strength and political freedom were drastically reduced. The rights of assembly and organization were curtailed but the state managed to form a large organization to keep the political activities of the people under control; the national front was to be the outlet for people's aspirations. Sukarno, supported by the army, was the decision maker. Parliament was a rubber stamp and "Indonesian socialism" was the only acceptable political ideology as the country moved further to the Left.</span></p><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">
 
	This period was characterized by economic decline and competition between the PKI and the army. Sukarno was able to strike a balance between the two, but in 1965 his declining health triggered an abortive coup. The PKI, which was implicated in the coup, was eventually banned and destroyed, while Sukarno was also forced to step down. The army became the victor in this power struggle, giving rise to General Suharto and "Pancasila Democracy" in 1966. This system has continued since.</span></p><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">
</span></p><h3 data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">
Pancasila Democracy</span></h3><span data-dcnode-id="257" instrument_node="">

Under Pancasila Democracy parliament was retained, although in form rather than substance. The new government - the "New Order" - sought legitimacy through constitutional rather than extra-parliamentary means. Soon after the assumption of power the military decided to utilize the parliament and organized an election. The electoral law, the composition of parliament and the People's Consultative Assembly were adjusted to give an advantage to the government and military over other parties. The military also occupied important administrative positions at both the national and sub-national levels. The military domination of the country had begun. </span><p data-dcnode-id="250"><span data-dcnode-id="256" instrument_node="">

	Before the elections, the obscure military-dominated organization Sekber Golkar was transformed into an effective electoral vehicle. The existing political parties, except the PKI and the left-wing parties, were not allowed to participate. After the 1971 elections, political parties were further weakened and subject to government </span><font data-dcnode-id="255" size="-1"></font><span data-dcnode-id="254" instrument_node="">control.</span><sup data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">1</span></sup><span data-dcnode-id="251" instrument_node=""> Aside from the three existing parties, no new political organizations were allowed to compete and all election candidates had to be screened by the government. General elections have been held periodically but the political scene has not changed. The Indonesian military and the bureaucracy continue to play a crucial role in politics through Golkar, under the firm control of President Suharto. Many observers describe the Indonesian system as closer to authoritarianism than democracy.</span></p><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">
</span></p><h3 data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Liberal Democracy, "Asian Democracy" and Indonesia</span></h3><span data-dcnode-id="245" instrument_node="">

Can Indonesia return to the parliamentary democracy of the 1950s? Was the demise of liberal democracy and the subsequent prevalence of authoritarianism a reflection of Indonesian traditional values and political culture? Before examining factors which may promote or hinder democracy it is important to examine democracy and its many meanings. According to one study,</span><sup data-dcnode-id="242"><font data-dcnode-id="243" size="-1"><span data-dcnode-id="244" instrument_node="">2</span></font></sup><span data-dcnode-id="241" instrument_node=""> "representative democracy" has certain key characteristics: </span><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">

1.	The legitimacy of the government rests on its claim to represent the desires of its citizens. </span></p><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">
2.	The organized arrangement that regulates the bargains of legitimacy is the 
competitive political election. Leaders are elected in regular intervals, and voters can choose among alternative candidates. In practice, at least two viable political parties that have a chance of winning are needed to make such choices meaningful.</span></p><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">
3.	Most adults can participate in the electoral process, both as voters and as candidates for important political office.</span></p><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">
4.	Voting is secret and not coerced.</span></p><p data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">
5.	Citizens and leaders enjoy basic freedom of speech, press, assembly and organization. Established parties and new ones can work to gain new members and voters.</span></p><p data-dcnode-id="225"><span data-dcnode-id="230" instrument_node="">
	A political system must meet all of these criteria in order to qualify as a democracy. The typical "Western" conception of democracy is that it is both an end and a means to an end. Any country which does not fit into this model is called undemocratic or authoritarian. However, in recent years some Asian scholars and politicians have argued that there are many types of democracy, of which the Western liberal model is only one. "Asian democracy" is an equally valid system in the context of particular needs and cultural values. One of the advocates of this thesis, Chan Heng Chee,</span><sup data-dcnode-id="227"><font data-dcnode-id="228" size="-1"><span data-dcnode-id="229" instrument_node="">3</span></font></sup><span data-dcnode-id="226" instrument_node=""> observes a number of characteristics. There is a communitarian ethos which teaches that the individual is important as part of the group or society rather than the centre piece of democracy and society. There tends to be a greater acceptance of and respect for authority and hierarchy. The dominant party can remain in power for two or three decades or more. Nearly all Asian democracies have a centralized bureaucracy and a strong state. Finally, Asian democracies tend to be interventionist states with a large public sector. The state plays an important role as an engine of economic development. </span></p><p data-dcnode-id="219"><span data-dcnode-id="224" instrument_node="">

	This definition of democracy is not without its problems. These characteristics reflect both representative democracy and authoritarianism. There is no indication of the weight of democracy in its relationship with authoritarianism. In addition, it is unclear whether Asian democracy will guarantee political stability. Huntington maintains that this kind of democracy is suitable when the economic performance of the country is good.</span><sup data-dcnode-id="221"><font data-dcnode-id="222" size="-1"><span data-dcnode-id="223" instrument_node="">4</span></font></sup><span data-dcnode-id="220" instrument_node=""> Any economic crisis which leads to demands for a change of government will not be accommodated by this type of democracy as there is usually no other viable party capable of governing. As a result, "Asian democracy" can lead to political upheaval rather than stability. Moreover, it is not clear whether or not this democracy is "transitional" or "final". Will "Asian democracy" remain distinct from the Western model or will it eventually be transformed to liberal/representative democracy? </span></p><p data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">

	Aside from this debate, it is questionable whether Indonesian democracy is a form of "Asian democracy" as defined by Chan Heng Chee. Before 1957 Indonesian democracy was closer to the liberal type. However, Guided Democracy did not even embrace the basic tenets of democracy: there were no general elections nor elected members of parliament, and political parties were severely constrained. In the context of the New Order, regular elections are held but political participation is still screened and restricted. The military still retains a central role in the political process; in fact, it essentially sets the agenda.</span></p><p data-dcnode-id="211"><span data-dcnode-id="216" instrument_node="">

	Indonesian politics under Suharto reflects some of the characteristics of "Asian democracy". However, it is debatable whether or not this is "Indonesian democracy". Indonesia is a multi-ethnic state, and many ethnic groups have different concepts of democracy. The present system is a Javanese and abangan dominated political system, with strong military support. There are abangan (nominal Muslims) and santri (orthodox Muslims) cultures among the Javanese.</span><sup data-dcnode-id="213"><font data-dcnode-id="214" size="-1"><span data-dcnode-id="215" instrument_node="">5</span></font></sup><span data-dcnode-id="212" instrument_node=""> The existence of these subcultures or sub-communities was a result of uneven penetration of Islam in Java. Coastal communities are more Islamic than those in the interior. No one knows the strength of each community, but in the recent past the abangan tended to belong to these interior communities. </span></p><p data-dcnode-id="199"><span data-dcnode-id="210" instrument_node="">

	Herbert Feith also observes two streams of political culture in Indonesia, roughly in accordance with </span><i data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">abangan</span></i><span data-dcnode-id="207" instrument_node=""> and </span><i data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">santri</span></i><span data-dcnode-id="204" instrument_node="">.</span><sup data-dcnode-id="201"><font data-dcnode-id="202" size="-1"><span data-dcnode-id="203" instrument_node="">6 </span></font></sup><span data-dcnode-id="200" instrument_node="">He identifies the Javanese--aristocratic culture and the Islamic-entrepreneurial political culture. The aristocratic political culture tended towards nativism, while Islamic entrepreneurialism was more inclined to accept and incorporate modernizing influences from the outside. One could argue that these traditions have conditioned political arrangements. Javanese-aristocratic culture has tended to be more authoritarian, while the Islamic-entrepreneurial culture has tended to be more conducive to democracy. Some "culturalists" thus argue that the "Indonesian political culture" is one which inevitably results in authoritarianism.</span></p><p data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">

Such a culturally deterministic argument is dubious. The nature of political culture is problematic, and it is particularly difficult to argue that culture remains static. Nevertheless, many observers have noted that among the Javanese there has been a prevailing attitude of deference to authority, which is certainly relevant to the current political scene. Yet there are clearly other factors which may effect, if not determine, the political system.</span></p><p data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">
</span></p><h3 data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">Factors Which Promote and Hinder Democracy in Indonesia</span></h3><span data-dcnode-id="192" instrument_node="">

The multi-ethnic nature of Indonesia has been a major factor in a tendency towards "Asian" rather than liberal democracy. It has been argued that the ethnic and religious diversity and divisiveness require authoritarian leadership to prevent disorder, fragmentation and violence.</span><sup data-dcnode-id="189"><font data-dcnode-id="190" size="-1"><span data-dcnode-id="191" instrument_node="">7</span></font></sup><span data-dcnode-id="188" instrument_node=""> The military remains engaged in both security and non-security affairs, including economics and politics, and its dual function was eventually recognized in law. In recent years there have been discussions concerning the role of the military and whether it is time to return to the barracks. Opinion is largely divided along civilian and military lines, and a particular point of contention has been the military's role in social affairs. Magnis-Suseno discusses the significance of international communication in demands for democratization and human rights in Indonesia.</span><sup data-dcnode-id="185"><font data-dcnode-id="186" size="-1"><span data-dcnode-id="187" instrument_node="">8</span></font></sup><span data-dcnode-id="184" instrument_node=""> While admitting the positive impact of the external environment, he also recognizes the role of the military in the process. He observes that the military will continue to play a dual role but this should be modified in such a way as to support the democratization process. Within the military there is also division regarding the extent that the dual role is still necessary, although a majority of officers believe that their social role is important and will continue for some time. Indonesia will not be ready for civilian rule until well into the next century, according to Major-General (retired) Z.A. Maulini.</span><sup data-dcnode-id="181"><font data-dcnode-id="182" size="-1"><span data-dcnode-id="183" instrument_node="">9</span></font></sup><span data-dcnode-id="180" instrument_node=""> Even Dr. B. J. Habibie, a civilian, expressed his support for the dual function of the military during "this era of development".</span><sup data-dcnode-id="177"><font data-dcnode-id="178" size="-1"><span data-dcnode-id="179" instrument_node="">10</span></font></sup><span data-dcnode-id="176" instrument_node=""> Given the military's domination of the bureaucracy and politics it is unlikely that it will withdraw from its prominent role in society. </span><p data-dcnode-id="170"><span data-dcnode-id="175" instrument_node="">

	A further factor which appears to bolster authoritarian rule is the absence of a middle class in the Western sense. The proportion of the Indonesian population classified as professional and technical is only 3.9 per cent.</span><sup data-dcnode-id="172"><font data-dcnode-id="173" size="-1"><span data-dcnode-id="174" instrument_node="">11</span></font></sup><span data-dcnode-id="171" instrument_node=""> The concept of the middle class is further complicated by ethnicity. The Indonesian middle class is strongly non-indigenous - ethnic Chinese - and it is unlikely to demand rapid political change which might prove harmful to its economic interests. The indigenous component of the middle class is smaller and also depends upon government officials. It is thus difficult to identify the middle class in Indonesia, and this becomes more problematic when the concept is linked to democratization. The Western concept of a middle class spearheading political change is not applicable.


</span></p><h3 data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">"Democratization" in Suharto's Indonesia</span></h3><span data-dcnode-id="167" instrument_node="">

Some observers have recently argued that there is a democratization process in Indonesia and point to the weakening role of the Indonesian military in the political process. They maintain that Suharto has appointed fewer military personnel in his 1993 cabinet and succeeded in reducing the number of military representatives in parliament. The rise of Dr. Habibie and the Association of Indonesian Muslim Intellectuals appears to substantiate this trend. There has also been a higher frequency of protest movements by students and trade unions in recent years and the government has permitted a number of quasi-opposition groups, including the Association of the Intellectuals for Pancasila Development. Has a democratization process begun? </span><p data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">

	There is no doubt that there is a loosening of Suharto's grip in certain areas, but he has been taking the initiative and calling the shots. Opposition to the regime has grown but Suharto is still in control and there is no sign of the military withdrawing from public life. The government still only allows three political parties to exist. The "demilitarization" of Golkar does not make the organization more democratic; Suharto still appoints its leader. In fact, Suharto has been able to tightly control political activity and is not likely to let democratic forces - which are still very weak - get out of control. </span></p><p data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">

	Political culture is difficult to define, and the nature in which it determines or conditions political systems is even more problematic. Political culture is not an adequate explanation for the presence or absence of democracy. A multi-factor approach is essential to understanding Indonesian politics. </span></p><p data-dcnode-id="157"><br data-dcnode-id="162"><span data-dcnode-id="161" instrument_node="">
</span><font data-dcnode-id="158" size="-1"><b data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">Notes</span></b></font></p><p data-dcnode-id="112"><font data-dcnode-id="113" size="-1"><span data-dcnode-id="156" instrument_node="">

	2.	Bingham P. Powell, Jr., </span><i data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">Contemporary Democracies: Participation, Stability and Violence</span></i><span data-dcnode-id="148" instrument_node=""> (Cambridge, Mass., 1982), pp. 3-4. </span><br data-dcnode-id="147"><span data-dcnode-id="146" instrument_node="">
