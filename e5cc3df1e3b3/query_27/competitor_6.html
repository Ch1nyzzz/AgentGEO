	One result of the rapid modernization and globalization of much of East Asia is a growing concern amongst citizens for the spiritual, moral and ethical shape of their society. The institutions one might expect to deal with these concerns were, they thought, largely found wanting. Although religion was attracting larger numbers of people, monks, priests and other religious leaders were not used to coping with the social and psychological effects of societies in the midst of rapid change. Some referred to a spiritual vacancy, to the loss of a moral compass, to the diminishing influence of traditional values and guidelines. As for other traditionally influential institutions - the family and schools - both were generally considered less effective than in the past. Modern, urban life has reduced the number of members living under the same roof, and they spend less time at home together. Divorce rates and general family tensions are on the increase practically everywhere. While health and welfare were traditionally provided by the family much more so than in the West this, too, seemed less reliable. Respondents in some countries, especially in North-East Asia, are worried about the future cost of medical care and public welfare. Schools too, it was said, are often failing to provide education that would help children to learn to think for themselves, to be creative. The basic skills were taught well; but it was felt that the changing times called for reforms in curriculum, including civic or moral education. </span></p><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">

	This, of course, was only one side of developments in each of these countries - the vast improvement in the lives of many millions was taken as a given. But it was because of this rapid improvement that the concerns had become quite widespread. Nowhere did I gain the impression that these problems would necessarily overwhelm these countries. But they are a part of the story Americans rarely hear about. </span></p><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">

	I was struck by how uncannily similar the concerns I was hearing about in seven East Asian countries resembled issues troubling many Americans about their own society. Trust in American government is down. There is what Francis Fukuyama has warned about, a diminishing of America's "social capital" which could be hard to replace.1 Corruption, or "sleaze", in political campaigns is up (though it has always been there to some degree). The income gap in the United States between the lowest and highest twenty per cent is at a new high; not as wide as in some of the seven East Asian countries, but wider than in most. The economy is perhaps the world's strong-est and most productive, but at a cost of considerable distress from "downsizing". </span></p><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">

	American public education, still highly regarded at the university level, requires many reforms in public schools, where literacy and knowledge of mathematics and history are far too low. While respondents in East Asia reported a desire to have more from education than the basic, rote skills, Americans complain that their schools are not effectively teaching the core subjects - thus presenting an interesting phenomenon in which countries on opposite shores of the Pacific seem to be shuffling backwards, towards each other.</span></p><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">

	Books about family values in America have become best-sellers and important planks in American political party platforms. Membership in churches, synagogues, temples, shrines and mosques is up - more widespread religious activity than in almost all of East Asia - yet "spiritual loss" and inner stress, especially from peer and parental pressure on youth, have increased substantially. Teenagers are more independent in the United States, too, and the results - more drugs and teenage pregnancies - are the subject of a daily stream of radio, TV and press comment. </span></p><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">
</span></p><h3 data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Images of the United States: Good and Bad</span></h3><span data-dcnode-id="906" instrument_node="">

A cluster of questions about positive and negative aspects of the United States revealed a rather contradictory picture. The negative images mentioned by respondents in each country - crime, bombings, private militia, drugs, violence, sex, racial conflict, the homeless - were almost the same. Yet the "land of opportunity" and liberty, of friendly and generous people, of volunteerism, a country on the cutting edge of innovation and creativity in the arts, sciences and commerce was also part of the picture. Many I spoke with, however, believe the negative is now overshadowing the positive, especially among the general public, who learn about the country mostly through television. </span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">

	Yet while the "dark" side of America may not be far "off-screen" in many Asian homes, respondents reported that there is still a deep admiration, especially among the better read and travelled, for American ideals and openness; and a sense that despite its serious problems, the United States remains enormously resourceful, resilient and wealthy, still at the pinnacle of both "hard" and "soft" power in the world. To summarize East Asian views of the United States, many respondents expressed that, despite its serious problems, some of which are exported to East Asia along with trade, investment and popular culture, the country is still a fascinating one. Despite signs of social decay, the United States is still powerful, wealthy, technologically inventive and creative. US society may ignore its homeless, but it presses for equality for its citizens and promotes freedom and openness more than most countries do.</span></p><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">
 
	However, another perception is that the United States, despite its own problems, zealously pursues East Asia with its own agenda, too often reflecting its Cold War superpower status. The United States appears to them to be demanding change even faster, ignoring the avalanche of economic and social change that is already turning their societies upside down. While they may even take some comfort in US domestic disarray, the respondents knew at heart that it is still powerful, resourceful and wealthy. </span></p><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">

	The United States and much of East Asia turn out to have a vast expanse of common ground where similar - but not necessarily the same - problems must be faced. But, at least on the US side, there has been very little effort to reach out to exchange ideas and experience. Thus, the opportunity for a much greater two-way flow of ideas and experience in dealing with the numerous problems presents itself. Most respondents were careful to stress that such exchanges should be among professionals, should be largely private, and usually should take place bilaterally. They warned against packaged American solutions and emphasized the importance of real equality and mutual respect in such an endeavour. These caveats, and indeed many of the responses I received, suggested one basic and apparently still frequent and irritating aspect of America's contact with much of East Asia. There is still the perception that the United States is too domineering, self-righteous, insensitive, threatening and superior. </span></p><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">

	When I asked respondents how the United States should react to Asian criticism in its approach to the region, the replies were almost uniform: there is a need for more consultation, sensitivity, accommodation and humility. When queried about characteristics of their own culture that they felt the United States could use more of, the replies were also similar, and can be summed up in one word: tolerance.</span></p><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">
</span></p><h3 data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Questionnaires on Values and Practices of Governance</span></h3><span data-dcnode-id="893" instrument_node="">

In 1994, for a report on "Asian Values and the United States: How Much Conflict?", I asked 100 East Asian specialists and opinion leaders to indicate the most "critically important" personal and societal values and qualities listed in random order. My respondents were asked to indicate these values for people in their country, not for themselves. Americans also participated in the exercise. Two of the top five personal values identified were common to both East Asians and Americans: hard work and self-reliance. Honesty was sixth on the American list and third for East Asian respondents. Two of the top six societal values/qualities were also common to both East Asians and Americans: freedom of expression and official accountability. </span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">

	The largest gap between Americans and East Asians in the personal values/qualities list was in how each group scored "respect for learning" and "obedience to parents" (although the latter was not high with either group). The largest gap between East Asian and American replies on the list of societal values/practices was over the importance each attributed to an "orderly society" (71 per cent of the East Asians versus 11 per cent of the Americans); "personal freedom" (82 per cent of the Americans versus 32 per cent of the East Asians); and "individual rights" (78 per cent of the Americans versus 29 per cent of the East Asians). The percentage of East Asians indicating as "critically important" "decision by majority" or "decision by consensus" was, however, approximately the same as in the United States. And the percentage supporting "resolve conflicting political views through open debate" or "through private consultation" was identical - an interestingly high total for "majority" and "open decisions". </span></p><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">
 		
	In the 1996 study, I asked one hundred experts and opinion leaders - some of the same persons - to study a list of certain practices governing society, twelve practices in all, and identify those which were in their judgement "most important" and "least important" to people in their country. The closest scoring by both Americans and East Asians was on the importance of "a speedy trial"; "humane working conditions"; and "to be paid a fair wage". The widest gap between East Asian and American respondents was over the importance of "can say and write what you think" and "can refuse to testify against oneself". But generally, there was considerable convergence between East Asian and American replies on the relative importance of practices governing society. The highest scores of "most important" practices by the East Asian respondents were "to be paid a fair wage", then "open elections" and "humane working conditions". The highest "most important" scores for Americans were "can say and write what you think"; "open elections" and "cannot be discriminated against because of race, religion, gender, age or physical handicap" (also high among East Asians). </span></p><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">

	Of course these figures are only based on the judgement of a sophisticated group of people in seven countries, attempting to guess the views of others in their country. Such results can at best only give us a hint. But they may still be helpful. There were large gaps; but also some quite similar evaluations. The 1994 study showed a large difference in the relative importance North-East Asians and South-East Asians give to "follow religious teachings" (higher in South-East Asia) and to "inner self-fulfillment" and "self-reliance" (higher in North-East Asia). On the societal values list, "personal freedom" and "individual rights" were more important in North-East Asia than in South-East Asia. On the other personal and societal values, however, North-East Asian and South-East Asian scores were similar.</span></p><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">
</span></p><h3 data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Global Chasm or Signs of Convergence?</span></h3><span data-dcnode-id="882" instrument_node="">

We are all familiar with those in East Asia and the United States who have warned of deepening cultural "fault lines", cultural "chasms" and "civilizational clashes" between the "West and the rest". Samuel Huntington, despite the tough criticism his 1993 Foreign Affairs article received, repeats his theories in a new book and also proposes that Americans "renew and preserve" their civilization "against challenges from non-Western societies". He then turns around and urges that peoples in all civilizations "should search for and attempt to expand the values, institutions and practices they have in common".</span><p data-dcnode-id="876"><span data-dcnode-id="881" instrument_node="">

	On the basis of my research there is reason to consider if the differences I have described may be gradually narrowing while the similarities and common interests and concerns increase. In addition, there are scholars who point out that although the cultural origins may have been very different, the concepts espoused at one time had some important similarities. The dean of American Confucius scholars, William Theodore deBary, suggests that the contrast between a greater emphasis on individual autonomy in modern Western conceptions of human rights and a greater emphasis on social and communitarian values in Confucianism, " ... is often overdrawn at the expense of shared concerns and understandings". DeBary points out that " ... social and communitarian values have by no means been lacking in the West, while respect for the dignity of the self and person have been central to Confucianism from its inception". He further states that over time, there was an increasing consciousness in Confucianist thinking of the "need for law in a constitutional sense and in the sense of due process". He notes that " ... at the same time, some Westerners concerned with social and communitarian values have been ready to find in Confucianism a remedy to what they see as an excessive individualism and libertarianism in the West".</span><sup data-dcnode-id="878"><font data-dcnode-id="879" size="-1"><span data-dcnode-id="880" instrument_node="">2</span></font></sup><span data-dcnode-id="877" instrument_node=""> </span></p><p data-dcnode-id="871"><span data-dcnode-id="875" instrument_node="">

	These points were also made at a Bangkok conference where, according to Don Emmerson, some Asian scholars and writers suggested that within their own cultures and religions, there were concepts and traditions - in Buddhism, Confucianism and Islam - that could be "construed to favor, if not universal and intrinsic rights per se, then at least the just outcomes sought by Western advocates".</span><sup data-dcnode-id="872"><font data-dcnode-id="873" size="-1"><span data-dcnode-id="874" instrument_node="">3</span></font></sup></p><p data-dcnode-id="856"><span data-dcnode-id="870" instrument_node="">

	A number of East Asian experts have concurred with Jakarta's Dewi Fortuna Anwar that "despite the rhetoric about "Asian values' which set Asian societies irrevocably apart from the West ... there is no denying that there is an increasing convergence between the two".</span><sup data-dcnode-id="867"><font data-dcnode-id="868" size="-1"><span data-dcnode-id="869" instrument_node="">4</span></font></sup><span data-dcnode-id="866" instrument_node=""> Timothy Ong of Brunei and Anwar Ibrahim of Malaysia emphasize the importance of learning from one another, stressing what we have in common rather than what separates </span><font data-dcnode-id="865" size="-1"></font><span data-dcnode-id="864" instrument_node="">us.</span><sup data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">5</span></sup><span data-dcnode-id="861" instrument_node=""> Japanese diplomat Akio Kawato argues that "rather than clinging to traditional values ... [which] would only create opposition among the new middle class and youth ... Asians should grope for that which guides social change. ... What is needed is a search for new ideals. In the throes of economic expansion, a society that has lost its traditional values and has no ideals of its own would be concerned only with making money - one great casino."</span><sup data-dcnode-id="858"><font data-dcnode-id="859" size="-1"><span data-dcnode-id="860" instrument_node="">6</span></font></sup><span data-dcnode-id="857" instrument_node=""> </span></p><p data-dcnode-id="850"><span data-dcnode-id="855" instrument_node="">

	In my interviews, a number of respected experts and officials spoke warmly about the importance of US ideals of freedom, opportunity and dignity of the individual. Some wished their own people would be more conscientious about morality, rather than the United States becoming less so. Perhaps what disturbs people in East Asia most about the United States is not so much what Americans "stand for" but how Americans go about preaching and pushing their ideas and policy positions on others. Kim Byung-Kook has a wonderful explanation of cultural differences between Western concepts of abstract, universal truths on the one hand, and East Asian particularism or situationalism on the other. He suggests that the acceptance of liberal democracy and capitalism in Korea after the war was more for pragmatic reasons than as a matter of principle. Indeed, he argues that for Korea (and I would add perhaps Japan), it was a matter of national survival.</span><sup data-dcnode-id="852"><font data-dcnode-id="853" size="-1"><span data-dcnode-id="854" instrument_node="">7</span></font></sup><span data-dcnode-id="851" instrument_node=""> In much of the region, it has been particular experience and the situation at hand, rather than universal propositions that Americans tend to believe in, which have tended to govern decisions and policies. </span></p><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">

	There are also traditional Asian behavioural patterns that tend to contribute to attitudinal differences with the United States. The avoidance of conflict in interpersonal relations is one of them. Moreover, a different attitude towards time, a tendency to round off the corners of differences slowly, finding what works rather than what is "right" or "wrong".</span></p><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">
</span></p><h3 data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">A New Direction for US-East Asian Relations</span></h3><span data-dcnode-id="843" instrument_node="">

This differing emphasis in behaviour makes it essential that the United States give more thought to how Americans may be approaching East Asia in negotiations and other business. Various instances of US diplomatic actions that went wrong are given as examples. The United States should avoid pressure tactics and threats of sanctions against friends and allies; Americans must avoid measures that hark back to the Cold War. There is a remarkably wide area of potentially fertile common ground that could be much more actively nurtured by both sides of the Pacific. I refer to the challenge before us all to tackle the serious social problems that trouble all our societies. </span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">

	There is much Americans can learn from East Asian experience and much that Americans can share, as they go about trying to overcome their social problems. What is called for is an entirely new level of largely private cooperation and exchanges, among civic education and language teachers, environmental education experts, local government administrators, drug programme specialists, jurists, criminologists, family and student counsellors, family court members, and religious leaders. NGOs and foundations can play an even larger role in these exchanges than at present.</span></p><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">
 
	These new discussions would be important in and of themselves, as they lead to new initiatives to alleviate problems of common concern. In addition, they could gradually also lead to a much broader area of commonality and to a new spirit of Pacific community, as the atmosphere improves. This in turn could make it somewhat easier to overcome more narrow bilateral diplomatic differences between the United States and East Asian countries.</span></p><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">
</span></p><h3 data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Do "Asian Values" and "Asian Democracy" Exist?</span></h3><span data-dcnode-id="834" instrument_node=""> 

Replies to my probing on "Asian values" did not support the concept of an "Asian way". One Malaysian scholar preferred "universal values, human values". Another Malaysian expert observed that the countries that talk the most about "Asian values" are Singapore and Malaysia, whose " ... own cultures are not so deep, so they identify the issue most keenly". A well-known Indonesian former journalist noted "we are part of Asia - we all eat the same rice, but there is no Asian way of thinking, no real Asian way of thought". An Indonesian scholar said "we feel we are a part of Asia because of geography; we feel our culture is part of Asian culture; but the feeling of Asian may be diminishing because of globalization. It's strongest when dealing with outside powers". A Thai businessman noted that "we have all been at the same economic stage, and have more commonalities than the West, but it's not kinship".</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">
 
	Some respondents in South-East Asia set Japan aside from their vague sense of Asianness. Masakazu Yamazaki asserts that "the only thing Asian countries share together is modernity. ... Confucianism is one of many shared influences, but so many others are in conflict - despite the influence of Chinese civilization". Most Japanese I interviewed took the point of view that Japan is part of Asia in one sense, but is also apart from Asia. One scholar suggested that for economic and foreign policy reasons, "we are more pro-Asian now; there is not an increasing sense of Asianness in Japan, but our mutual interests are increasing ... the public is more pro-Asian than pro-American". </span></p><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">

	What all this suggests is that before we even arrive at the question of "Asian values" and "Asian democracy", we find considerable scepticism in the region about the degree to which the word "Asia" itself has much meaning beyond the geographical one. The diversity of the region - racial, cultural, religious, historical - makes it one of the richest, most fascinating areas of the world, but also seriously complicates the task of defining a discrete "Asian" form of democracy or "Asian" set of values. Perhaps it would help us in exploring these questions to see if one can separate human rights from democracy. Democracy, that is rule by the people, can - and has - trampled on the rights of some citizens in history. And some rather authoritarian leaders have been successful at advancing important economic human rights. The informal polling I carried out in 1994 and 1996 certainly suggested that in some important areas, the priority of certain values East Asians and Americans appear to hold may be quite different, at least for the time being. Nevertheless their long-term goals are not substantively different. The issue, as reflected in these polls, seems to come down largely to the proper balance between the role of the individual and the role of the community, between the power of the people, and the power of authority, between a peaceful conflict of ideas through debate, and the maintenance of order and stability.</span></p><p data-dcnode-id="824"><span data-dcnode-id="829" instrument_node="">

	Rulers, however they may be chosen, believe they are promoting the common good. But who defines that common good? Can it be accurately established if it is not decided by the people themselves, through open debate? If government leaders, no matter how capable, acting as "wise and virtuous guardians", are left to define the common good, they may not always reflect the wishes of the people, but the wishes of powerful elites.</span><sup data-dcnode-id="826"><font data-dcnode-id="827" size="-1"><span data-dcnode-id="828" instrument_node="">8</span></font></sup><span data-dcnode-id="825" instrument_node=""> In more open societies, there will always be debate over what the common good is. In less open societies, this debate may be restricted; leaders make this decision on behalf of everyone. </span></p><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">

	In the 1994 values poll, "accountability of public officials" scored high as a critically important value for both American and East Asian respondents. "Freedom of expression" also was important for both East Asians and Americans. In the 1996 poll, "choosing leaders through open elections" was second from the top among East Asian respondents on the list of "most important" practices of governance. This would suggest considerable acceptance of some important tenets of democracy. </span></p><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">

	Yet in the 1994 poll, there were sharp differences between East Asians and American respondents over the importance of "an orderly society", "rights of the individual", "personal freedom" and "preservation of harmony for the group". In particular, in Singapore, Indonesia, China and Malaysia, many stressed how crucial it was in the thinking of their governments to maintain public order and stability. Many people I interviewed in China emphasized that without strong, central control, there would be chaos. Memories of race riots in Malaysia, the ethnic mixture of Singapore, and Indonesia's and China's diverse subcultures, suggest that these countries have in common a strong determination to maintain order - if necessary at the expense of some individual liberties. </span></p><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">

	Interviews in both 1994 and 1996 suggest one other, rather deeply ingrained cultural characteristic that may contribute to the high emphasis on orderly society in much of East Asia: a traditional aversion to conflict in interpersonal relations, the instinct to try to settle differences gradually, using intermediaries in some countries, even putting off a final decision if there is still strong minority opposition. A closely related characteristic is the instinct to avoid public embarrassment. Such a behavioural characteristic would certainly tend to buttress the importance of orderly and harmonious societies in which the preservation of personal relationships is more important than confronting issues or people more directly. </span></p><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">

	In sum: Differences certainly exist between East Asian countries and the United States over the importance of some social values which have implications for politics and democracy, but these differences may be diminishing through globalization and modernization. Debate regarding the relationship between individual autonomy and the needs of the larger community, about order versus rights, goes on in the West every day; it is not really a geographic issue of Asia versus the West, or the "West versus the rest". Societies undergoing extremely rapid change face a mountain of social and economic problems which lead them to keep a fairly tight control over the political process while they focus on overcoming other more urgent problems. The priority of political liberalization tends to be a lesser one. But priorities can change. Western democracies certainly are not identical in their interpretation of human rights and liberties. So in East Asia, too, there is considerable variety. But for each Lee Kuan Yew, Suharto or Jiang Zemin, there is an Aung San Suu Kyi, Kim Young Sam, Fidel Ramos and Lee Teng Hui. This makes it very difficult to define Asian democracy. </span></p><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">

	Even in the long run, we will find differing approaches to governance and to the balance between the rights of the individual and the rights of the community, between order and freedom. But is this ongoing dynamic likely to be defined by region, or by culture and increasingly by open, competitive market economies?</span></p><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">
</span></p><h3 data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Conclusion</span></h3><span data-dcnode-id="809" instrument_node="">

The United Nations Declaration of Human Rights and other UN instruments provide a basic core that most countries subscribe to but do not always follow. As East Asian countries make progress economically and politically, we can hope - perhaps even expect - to find wider adherence to these core principles and standards. In the meantime, the West should show understanding and patience. The pace of change in East Asia is breathtaking and sometimes also quite upsetting. It is taking place in decades rather than in the century or two it took in the West. Nations will inevitably try to be true to their own ideals, and in the older democracies, this can be noisy and irritating to others. The more we can unite around a common core of recognized, international principles, the better. No single country can be the judge, though free countries will express their opinion even when it is not asked for. But if we strive together, respecting our differences while seeking fundamentally similar goals, and if we energetically cultivate the common ground between us, then we are likely to realize that our ideals for a truly "civil society" are remarkably similar.</span><p data-dcnode-id="803"><br data-dcnode-id="808"><span data-dcnode-id="807" instrument_node="">
</span><font data-dcnode-id="804" size="-1"><b data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Notes</span></b></font></p><p data-dcnode-id="765"><font data-dcnode-id="766" size="-1"><span data-dcnode-id="802" instrument_node="">
	1.	Francis Fukuyama, Trust: </span><i data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">The Social Virtues and the Creation of Prosperity</span></i><span data-dcnode-id="799" instrument_node=""> (New York: The Free Press, 1995), p. 321. </span><br data-dcnode-id="798"><span data-dcnode-id="797" instrument_node="">
	2. 	William Theodore deBary, in his introduction to deBary, ed., </span><i data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Confucianism and Human Rights </span></i><span data-dcnode-id="794" instrument_node="">(forthcoming). </span><br data-dcnode-id="793"><span data-dcnode-id="792" instrument_node="">
	3.	Donald K. Emmerson, "Can East Meet West on Human Rights?",</span><i data-dcnode-id="790"><span data-dcnode-id="791" instrument_node=""> Los Angeles Times,</span></i><span data-dcnode-id="789" instrument_node=""> 22 April 1996, B5. </span><br data-dcnode-id="788"><span data-dcnode-id="787" instrument_node="">
	4. 	Dewi Fortuna Anwar, "The Impact of Social-Cultural Changes on US-East Asian Relations", paper presented at a conference on Cultural Factors in US-East Asian Relations, Institute of American Studies, Chinese Academy of Social Sciences, Beijing, 29-31 July 1996. </span><br data-dcnode-id="786"><span data-dcnode-id="785" instrument_node="">
	5.	Timothy Ong, "All This Talk about Asian Values Sends an Unhelpful Message", </span><i data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">International Herald Tribune,</span></i><span data-dcnode-id="782" instrument_node=""> Opinion Section, 20 May 1996; Anwar Ibrahim, "Asia's Moral Imperative", </span><i data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Asian Wall Street Journal,</span></i><span data-dcnode-id="779" instrument_node=""> 13 May 1996. </span><br data-dcnode-id="778"><span data-dcnode-id="777" instrument_node="">
	6.	Akio Kawato, "Is a Clash of Cultures Inevitable?", </span><i data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Chuo Koron, </span></i><span data-dcnode-id="774" instrument_node="">December 1995. </span><br data-dcnode-id="773"><span data-dcnode-id="772" instrument_node="">
	7.	Kim Byung-Kook, "A Journey without a Vision: Politics of Democratic Consolidation in Korea", paper presented at a conference on Democracy in East Asia, sponsored by the International Forum for Democratic Studies, National Endowment for Democracy, Washington, D.C., 14-15 March 1996, pp. 15-18.</span><br data-dcnode-id="771"><span data-dcnode-id="770" instrument_node=""> 
	8.	Michael Freeman, "Human Rights, Democracy and "Asian Values'", </span><i data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">The Pacific Review</span></i><span data-dcnode-id="767" instrument_node=""> 9, no. 3 (1996), pp. 352-66.</span></font></p><p data-dcnode-id="762"><br data-dcnode-id="764"><span data-dcnode-id="763" instrument_node="">
</span></p><hr data-dcnode-id="761"><span data-dcnode-id="760" instrument_node="">
</span><h2 data-dcnode-id="756"><a data-dcnode-id="758" name="CLASH"><span data-dcnode-id="759" instrument_node="">A CLASH </span></a><span data-dcnode-id="757" instrument_node="">OF VALUES? HUMAN RIGHTS IN THE POST-COLD WAR WORLD</span></h2><span data-dcnode-id="755" instrument_node="">

James T. H. Tang</span><p data-dcnode-id="747"><br data-dcnode-id="754"><br data-dcnode-id="753"><span data-dcnode-id="752" instrument_node="">



Human rights issues have come to international prominence in the post-Cold War world.</span><sup data-dcnode-id="749"><font data-dcnode-id="750" size="-1"><span data-dcnode-id="751" instrument_node="">1</span></font></sup><span data-dcnode-id="748" instrument_node=""> As Western governments trumpeted ideological victory in the aftermath of the Cold War, East Asian states mounted a challenge to Western beliefs on human rights. The human rights positions of East Asian states have generated tensions with the West and given rise to far-reaching regional and global implications. This paper addresses the post-Cold War East Asian challenge to the contemporary "Western" understanding of human rights and its implications for regional international relations. It also explores the prospects for a regional approach to resolving human rights differences and better human rights protection. </span></p><p data-dcnode-id="737"><span data-dcnode-id="746" instrument_node="">

	In December 1990, when the United Nations decided to convene a World Conference on Human Rights, the international environment seemed to offer a historical opportunity for the creation of a new world order in which human rights would occupy a central place.</span><sup data-dcnode-id="743"><font data-dcnode-id="744" size="-1"><span data-dcnode-id="745" instrument_node="">2</span></font></sup><span data-dcnode-id="742" instrument_node=""> The euphoria, however, was misplaced. Instead of focusing on further developments of the global human rights protection system on the basis of the liberal tradition, Member States became logged in debates about fundamental and competing conceptual issues. Several Asian states questioned the applicability of universal human rights in different cultural, economic and social settings. The Asian regional preparatory meeting which took place in Bangkok between 29 March and 2 April 1993 provided an opportunity for Asian governments to put forward their definition of human rights on the global agenda. The Bangkok Declaration, signed by over forty Asian governments, did not reject universal human rights. But the declaration suggested that universality should be considered "in the context of a dynamic and evolving process of international norm-setting, bearing in mind the significance of national and regional particularities and various historical, cultural and religious backgrounds".</span><sup data-dcnode-id="739"><font data-dcnode-id="740" size="-1"><span data-dcnode-id="741" instrument_node="">3</span></font></sup><span data-dcnode-id="738" instrument_node=""> The Asian states also sought to link development issues with human rights questions and emphasize the importance of non-interference. </span></p><p data-dcnode-id="727"><span data-dcnode-id="736" instrument_node="">

	In the event, the World Conference on Human Rights in Vienna in June 1993 did not turn into a battleground between Asian and Western governments. Nonetheless, their division was clear: Western governments criticized the human rights conditions in the Asian region and maintained that universal standards in human rights should be observed; East Asian states accused the West of using human rights to interfere with the domestic affairs of other countries, and ignoring the different economic, social and cultural conditions in the developing world.</span><sup data-dcnode-id="733"><font data-dcnode-id="734" size="-1"><span data-dcnode-id="735" instrument_node="">4</span></font></sup><span data-dcnode-id="732" instrument_node=""> This East Asian challenge, however, is not only based upon culture.</span><sup data-dcnode-id="729"><font data-dcnode-id="730" size="-1"><span data-dcnode-id="731" instrument_node="">5</span></font></sup><span data-dcnode-id="728" instrument_node=""> The confrontation must also be understood in the context of the spectacular economic development in the Asia-Pacific region.</span></p><p data-dcnode-id="713"><span data-dcnode-id="726" instrument_node="">

The economic rise of the Pacific region has led to intense discussion about whether a fundamental shift in world politics has taken place.</span><sup data-dcnode-id="723"><font data-dcnode-id="724" size="-1"><span data-dcnode-id="725" instrument_node="">6</span></font></sup><span data-dcnode-id="722" instrument_node=""> As the debate about the meaning and theoretical implications of the Pacific phenomenon among international relations scholars becomes fashionable, some East Asian commentators seem to have drawn the conclusion that the East Asian mode of development has proved to be more successful than that of the West. They assert that their political systems and economic policies are enjoying ascendancy and that they can offer "an alternative vision of the values needed for a better world".</span><sup data-dcnode-id="719"><font data-dcnode-id="720" size="-1"><span data-dcnode-id="721" instrument_node="">7</span></font></sup><span data-dcnode-id="718" instrument_node=""> Western values appear to be set on a collision course with Asian traditions and economic priorities in the form of a "clash of civilizations".</span><sup data-dcnode-id="715"><font data-dcnode-id="716" size="-1"><span data-dcnode-id="717" instrument_node="">8</span></font></sup><span data-dcnode-id="714" instrument_node=""> To what extent can different interpretations of human rights exist in the contemporary world? Have human rights differences between the industrialized North and the developing South replaced the East-West ideological confrontation as the major source of international conflict? Can the differences over human rights between East Asian countries and the West be resolved?</span></p><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">
</span></p><h3 data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Human Rights in World Politics</span></h3><span data-dcnode-id="708" instrument_node="">

Human rights questions have been on and off the agenda of world politics since the end of the Second World War. The holocaust in Europe and Japanese atrocities in Asia generated political momentum in the immediate post-war years for the establishment of an international human rights protection system. The adoption of the Universal Declaration of Human Rights in 1948 was a testimony to the international commitment to human rights protection.</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">

	International human rights protection, however, has proved to be a rather uneven process in different parts of the world over the past half-century. The European system, which has been characterized as an enforcement regime, is the most developed, with comprehensive coverage, a highly developed set of mechanisms and procedures  and a high degree of national compliance. Elsewhere regional arrangements for human rights have been established, with the exception of the Asian region, where no region-wide human rights protection system exists. Human rights were usually accorded low priority by Asian states, which devoted their energy to efforts in developing their economies, and creating national identities. Cold War confrontation and the struggle for independence have therefore shaped the agenda of human rights in Asia for more than forty years. </span></p><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">

	Another dimension to human rights is a changing domestic human rights agenda in many East Asian states. The renewed international attention to human rights co-incided with a more vocal domestic articulation of human rights concerns in the region brought about by social, economic and political changes which have come about in the post-decolonization era. Regional and local non-government groups have become far more aggressive in championing the protection of human rights. </span></p><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">

	In a region which has been dominated by authoritarian regimes, political structures in countries like South Korea, Taiwan and the Philippines have undergone significant changes in the past ten years. These newly liberalizing states have sought to accommodate a more pluralistic polity and become more responsive to a widening domestic human rights agenda. In some other East Asian states, however, economic success has not led to political liberalization. Countries such as China have undergone dramatic changes since the late 1970s, but the state's response to the changing economic and social conditions has been greater assertiveness. </span></p><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">

	International pressure on East Asian states over human rights has been interpreted as an attempt to undermine their political position and therefore a threat to regime survival. The Beijing government's uncompromising stance towards political dissidents during the visit of the US Secretary of State Warren Christopher in early 1994 is probably also a response to the perceived threat to the leadership's authority. Human rights differences between the Western world and East Asian countries can therefore be a major source of friction, creating problems for the Asia-Pacific region's search for a post-Cold War regional security structure and better regional economic co-
operation.</span></p><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">
</span></p><h3 data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">The East Asian Challenge</span></h3><span data-dcnode-id="695" instrument_node="">

The post-Cold War international debates on human rights have been referred to as a clash between the post-colonial approach and the neo-colonial approach. The post-colonial approach, developing from the liberal tradition, emphasizes the interdependence of states and the triumph of the liberal democracies over authoritarianism. The neo-colonial approach sees a continuation from the colonial era to the present, rather than the creation of a new world order, with Western industrialized countries continuing their exploitation of the developing world with new allies in the form of the ruling classes in the developing world or major multinational corporations.</span><sup data-dcnode-id="692"><font data-dcnode-id="693" size="-1"><span data-dcnode-id="694" instrument_node="">9</span></font></sup><span data-dcnode-id="691" instrument_node="">
	The Western approach to human rights, which places more importance on civil and political rights and the universality of human rights on the basis of the liberal tradition, is usually associated with the post-colonial approach. The Asian position on human rights, which stresses the importance of economic and social rights, as well as cultural differences, has been identified with the neo-colonial approach. While these two approaches provide useful analytic frameworks in understanding the differences between the Western and Asian positions on human rights, they do not address the East Asian challenge which has been built on the economic success of the region.</span><p data-dcnode-id="685"><span data-dcnode-id="690" instrument_node="">

	The remarkable economic success of a number of East Asian countries since the mid-1960s has often been linked to state policies. The relationship between government policy and the spectacular record of high growth of economies in the region -  Japan, Hong Kong, South Korea, Singapore, Taiwan, Indonesia, Malaysia, Thailand and China - has been the subject of a World Bank policy research report.</span><sup data-dcnode-id="687"><font data-dcnode-id="688" size="-1"><span data-dcnode-id="689" instrument_node="">10</span></font></sup><span data-dcnode-id="686" instrument_node=""> </span></p><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">

	These economies consistently outperformed most of the rest of the world beginning in the 1960s. They grew more than twice as fast as the rest of East Asia, three times as fast as Latin America, and five times faster than sub-Saharan Africa. Even the oil-rich Middle Eastern economies and industrialized OECD group were easily outperformed. Their success is clearly not an accident. As the World Bank put it, "if growth were randomly distributed, there is roughly one chance in ten thousand that success would have been so regionally-focused".11 While there are a number of fundamental economic factors behind the phenomenal East Asian success story, researchers from the World Bank also concluded that systematic government intervention in fostering development can be observed. </span></p><p data-dcnode-id="677"><span data-dcnode-id="682" instrument_node="">

	The critical role of the state in "guiding" the economy to the right direction in most of the successful East Asian economies has challenged the liberal economic assumption that the state should be a neutral incentives regime. This has given rise to the statist perspective that government policy is the key in understanding the success of East Asian economies. While the statist perspective has been challenged, and competing perspectives have been articulated, the critical role of the state in the East Asian economies has been widely acknowledged. Indeed, interest in the "state" among social scientists has been revived.</span><sup data-dcnode-id="679"><font data-dcnode-id="680" size="-1"><span data-dcnode-id="681" instrument_node="">12</span></font></sup><span data-dcnode-id="678" instrument_node=""> </span></p><p data-dcnode-id="672"><span data-dcnode-id="676" instrument_node="">

	The academic debate on the role of the state, however, may seem irrelevant to political elites in the region, who believe that the formula of success has been found. They suggest that a politically stable environment, brought about by a strong and dominating but competent government committed to a developmentalist strategy, is the best way to go ahead. East Asian states have become more assertive in defending their political power and presenting a different approach to human rights problems.</span><sup data-dcnode-id="673"><font data-dcnode-id="674" size="-1"><span data-dcnode-id="675" instrument_node="">13</span></font></sup></p><p data-dcnode-id="665"><span data-dcnode-id="671" instrument_node="">

	The East Asian challenge can be seen in cultural, economic and political terms. Culturally, they assert that the Western approach ignores the specific cultural traditions and historical circumstances of Asian societies, whose interpretations of human rights are different from the Western tradition. Economically, they maintain that the priority of developing Asian societies has to be the eradication of poverty: the right to survival must come first. Therefore, political stability under the capable leadership of good government is essential. They also question the motives of the West by accusing the Western countries of having double standards and using human rights merely as an instrument for advancing Western economic or security interests. In some ways the East Asian reaction to Western pressure on the human rights question can be characterized as a realist response: Western human rights policy has been seen as "power politics in disguise" - an instrument for advancing Western political and economic </span><font data-dcnode-id="667" size="-1"><span data-dcnode-id="670" instrument_node="">interests.</span><sup data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">14</span></sup></font><span data-dcnode-id="666" instrument_node=""> </span></p><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">

	But if both the post-colonial and neo-colonial approaches cannot adequately describe the nature of the East Asian challenge to human rights problems in the Asia-Pacific, the realist interpretation clearly has its limitations too. The growing pressure on the East Asia stance on human rights comes not only from Western governments and citizen groups (both international and regional). The rising importance of international institutions, and increasing demands for better human rights protection within the East Asian region are all relevant features in the evolution of the contemporary understanding of human rights protection. Describing the current debate over human rights as the East Asia region versus the democratic West oversimplifies the growing complexity of contemporary international relations.</span></p><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">
</span></p><h3 data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">An Alternative Regional Approach?</span></h3><span data-dcnode-id="658" instrument_node="">

As human rights issues return to the international agenda, the record of East Asian countries has been subjected to critical scrutiny by the international community. While there may be some scope for interpreting human rights differently and perhaps even assigning different priorities to specific human rights according to the region's special circumstances, East Asian states are on the defensive.</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">
 
	In mounting an intellectual challenge and political offensive to the "Western version" of international human rights protection, East Asian states have sought to identify some of the inconsistencies of Western human rights policies, and highlighted some of the self-contradictory tendencies in an area which is diverse and contentious. The acceptance of universality clearly does not necessarily mean that the reality of cultural diversity can be rejected. Moreover, given the range of human rights which are being advanced in the contemporary world, it is by no means surprising that some of these rights are in conflict, and the priorities of different societies over human rights demands are not always the same.</span></p><p data-dcnode-id="646"><span data-dcnode-id="655" instrument_node="">

	The importance of economic and social developments in measuring human rights conditions is widely accepted throughout the human rights community. A study commissioned by the United Nations Centre for Human Rights identified poverty as a key obstacle to the advancement of human rights. As the report suggests, worldwide poverty and increasing disparity between the North and the South "is endangering the ethical foundation of our Planet".</span><sup data-dcnode-id="652"><font data-dcnode-id="653" size="-1"><span data-dcnode-id="654" instrument_node="">15</span></font></sup><span data-dcnode-id="651" instrument_node=""> The economic dimension of human rights protection can be highly complicated, involving difficult social and political questions. The report concludes that poverty is a human rights violation and "an economic problem linked to national and international development policies, and a social and political issue that has to do with entitlements of liberties and freedoms, popular participation, and above all democracy".</span><sup data-dcnode-id="648"><font data-dcnode-id="649" size="-1"><span data-dcnode-id="650" instrument_node="">16</span></font></sup><span data-dcnode-id="647" instrument_node=""> Asian governments are clearly not alone in claiming that economic rights are important. </span></p><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">

	East Asian states, however, have not emerged victorious in the current debates. While Asian governments' emphasis on development needs and cultural differences are not entirely groundless, they have failed to justify their policies in the suppression of human rights or in claiming that they are the only representatives of their societies and thereby the only adjudicators of human rights standards. As many human rights activists have observed, while development is a legitimate human rights concern in the developing world, all too often state development policies in such countries become a source of human rights violations when people are forced to leave their homes for development projects or are deprived of their means of livelihood.</span></p><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">
 
	Despite the economic success of many East Asian countries, the power relationship between the state and the people is overwhelmingly in favour of the state. Many East Asian governments therefore cannot avoid confronting the responsibility of widespread human rights abuses in their countries. The human rights conditions in many East Asian countries have consistently been rated as poor by international human rights monitoring groups. The Humana human rights country rating, for example, has ranked most East Asian countries as below average. Several Asian countries are in fact at the bottom of the scale.</span></p><p data-dcnode-id="636"><span data-dcnode-id="641" instrument_node="">
 
	The Humana ranking is somewhat problematic, however, reflecting a Western bias towards individualist civil and political rights. Nonetheless, as an independent and respectable source of human rights monitoring, its assessment is a useful yardstick in measuring human rights conditions.</span><sup data-dcnode-id="638"><font data-dcnode-id="639" size="-1"><span data-dcnode-id="640" instrument_node="">17</span></font></sup><span data-dcnode-id="637" instrument_node=""> In fact most reports by independent human rights organizations have been highly critical of the situation in East Asia. Governments in the region are not only notorious for their poor human rights record, they also have a poor record in making commitments to internationally recognized norms. </span></p><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">

	Indeed, in spite of the growing importance of human rights issues in world politics, Asian states prefer to deal with human rights within their own domestic jurisdiction, resisting international monitoring. They are reluctant to sign major instruments of international human rights protection. Countries such as China, Indonesia, Malaysia, Singapore and Thailand are not signatories to the International Covenant on Civil and Political Rights and the International Covenant on Economic, Social and Cultural Rights.</span></p><p data-dcnode-id="628"><span data-dcnode-id="633" instrument_node="">
 
	International opinion and the influence of external pressure on human rights development in Asia have proved to be rather mixed for a variety of reasons. The record of the United States in influencing human rights conditions overseas, for example, has been exaggerated. In fact during the Cold War US security objectives often took precedence over human rights concerns. American support for right-wing military regimes has long been a bitter issue for human rights advocates from Latin America. When the news that the Joint Planning Committee of the NGO forum in Vienna had invited former US president Jimmy Carter as a speaker for the closing session of the forum was reported, Latin American NGO delegates denounced him as "the ex-president of a state that is principally responsible for the major violations of human rights and of international law around the world".</span><sup data-dcnode-id="630"><font data-dcnode-id="631" size="-1"><span data-dcnode-id="632" instrument_node="">18</span></font></sup><span data-dcnode-id="629" instrument_node=""> </span></p><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">

	In Asia, China's human rights conditions were accorded low priority in the agenda of US-China relations during the 1970s when a tacit strategic alliance against the Soviet Union was formed between the two countries. US human rights policy seen from Asia appeared to apply only to the communist states and was therefore perceived as hypocritical.</span></p><p data-dcnode-id="621"><span data-dcnode-id="625" instrument_node="">
 
	Since the end of the Cold War many East Asian states have continued to adopt an uncompromising attitude towards human rights differences with the West, and deny human rights NGO activities at home. They are often ruthless in dealing with political dissidents, considering them as a threat to regime stability. The Chinese position was unyielding when US Secretary of State Warren Christopher visited Beijing in March 1994 and talked to Chinese leaders about human rights conditions in China, which had been linked to the Clinton administration's renewal of the Most-Favoured Tariff treatment for China. Foreign Minister Qian Qichen bluntly stated that "China is under no obligation to implement the executive order of the US President".</span><sup data-dcnode-id="622"><font data-dcnode-id="623" size="-1"><span data-dcnode-id="624" instrument_node="">19</span></font></sup></p><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">

	But external pressure has clearly played a part in shaping government policies and the human rights agenda in the region. The Japanese government, for example, clearly found it necessary to adopt a tougher posture towards China after the Tiananmen tragedy in 1989 as a result of Western pressure, despite its intuitive tendency for a friendly political relationship with its giant neighbour. Even hardline states like China find it difficult to ignore human rights issues, making a significant policy shift in encouraging scholarly research on human rights. The state sponsorship of scholarly human rights study in the PRC was largely a direct response to Western condemnation of the human rights conditions in China following the Tiananmen incident in 1989. The diversification of international contacts by human rights activists in the Philippines gradually made a significant impact on international public opinion towards the Marcos regime, which was highly dependent on foreign economic aid. </span></p><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">

	Moreover, political liberalization in several East Asian states since the 1980s, such as the Philippines, South Korea, Taiwan and Thailand, has forced governments to be more accountable. They are more ready to confront their own human rights problems, thus creating a more encouraging environment for regional cooperation over human rights protection. In the Philippines "people's power" removed the Marcos regime from power. In South Korea the election of Roh Tae Woo was the first proper presidential election for years. Roh's successor, Kim Young Sam, a former opposition leader, is the first civilian president since the 1960s. The ruling party in Taiwan, the Kuomintang, has relaxed its political grip on Taiwanese society and accepted open competitive elections as an integral part of the island's political process. Political liberalization has clearly led to a more positive attitude towards human rights protection in these countries. Political liberalization or democratization, however, do not necessarily lead to human rights improvements. The disintegration of the former Soviet Union and dramatic political changes in Eastern Europe have generated new issues in the human rights debate, and violent forms of human rights abuses. </span></p><p data-dcnode-id="611"><span data-dcnode-id="616" instrument_node="">

	Contradictory tendencies can be observed. First, the intensification of international tensions over human rights issues is taking place as the transformation in world politics provides new opportunities for establishing a new and peaceful regional order for the Asia-Pacific. The economic success of many East Asian states has also facilitated strong international links both across the Pacific and within East Asia, providing the basis for other forms of security arrangements and economic cooperation, including multilateral frameworks involving Western and Asian countries.</span><sup data-dcnode-id="613"><font data-dcnode-id="614" size="-1"><span data-dcnode-id="615" instrument_node="">20</span></font></sup><span data-dcnode-id="612" instrument_node=""> Second, the improvement in economic conditions in East Asian states and the political liberalization of the region are taking place, yet blatant human rights abuses have continued. Even in "newly liberalizing states" human rights violations obviously have not disappeared. Traditional practices die hard, and widespread human rights violations can still be observed. Moreover the sweeping economic changes in the region have been driven primarily by economic policies which are market focused. While this can weaken state power, it has created new social and economic problems with human rights implications. </span></p><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">

	The role of international intervention in human rights problems is controversial. The international community clearly has a role to play in assisting countries which suffer in conditions of natural disasters or war when individual rights are transgressed by warring groups or governments. The need for humanitarian assistance clearly supports the argument that a more flexible view of sovereignty should be accepted. In fact states which respect human rights and promote human welfare are more likely to be stable members of the international community. </span></p><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">

	East Asian states are reluctant to tolerate international involvement in human rights protection in the region, rejecting it as a Western attempt to impose a set of standards which are not consistent with Asian traditions and realities. Yet they have not produced a convincing alternative approach. International relations in the Asia-Pacific region are not as institutionalized as in Europe, and region-wide fora for discussing human rights issues are therefore limited. However, the rapid pace of economic development in the region has made an institutionalized framework of economic co-operation possible both at the non-governmental and inter-governmental levels, such as PECC and APEC. But the prospect that such organizations would provide the basis for the development of a human rights dialogue does not look promising at present. While some of them may provide a useful forum for keeping human rights issues on the agenda, the outlook remains uncertain. </span></p><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">

	What are the prospects for developing a regional institutional approach to human rights protection in East Asia in the light of international and domestic changes in the Asia-Pacific region?</span></p><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">
</span></p><h3 data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Regional Human Rights Arrangements</span></h3><span data-dcnode-id="600" instrument_node="">

Contemporary human rights protection was initially defined in universal terms. Regionalism was not supported at the United Nations following the Second World War because it was regarded by some as "a breakaway movement, calling the universality of human rights into </span><font data-dcnode-id="596" size="-1"><span data-dcnode-id="599" instrument_node="">question".</span><sup data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">21</span></sup></font><span data-dcnode-id="595" instrument_node=""> Since the 1960s, however, regional conventions on human rights have been adopted in Europe, the Americas and Africa. The European arrangement is the most institutionalized and can be regarded as a successful example of regional cooperation over human rights protection by politically like-minded states which share a common cultural tradition.</span><sup data-dcnode-id="592"><font data-dcnode-id="593" size="-1"><span data-dcnode-id="594" instrument_node="">22</span></font></sup><span data-dcnode-id="591" instrument_node=""> </span><p data-dcnode-id="581"><span data-dcnode-id="590" instrument_node="">

	If many Asian states have resisted committing themselves to international human rights regimes they have displayed even less interest in the establishment of a regional human rights system. They have rejected proposals for human rights mechanisms even at the subregional level, not to say region-wide arrangements.</span><sup data-dcnode-id="587"><font data-dcnode-id="588" size="-1"><span data-dcnode-id="589" instrument_node="">23</span></font></sup><span data-dcnode-id="586" instrument_node=""> The idea of a regional approach to human rights in Asia has been dismissed as impractical simply because of geography, history and culture. Asia covers a huge area, with a large population whose cultural traditions are diverse and share little in common in terms of political and economic development. It has been suggested that "an approach which considers the whole of Asia as one region for the purpose of international human rights is unrealistic".</span><sup data-dcnode-id="583"><font data-dcnode-id="584" size="-1"><span data-dcnode-id="585" instrument_node="">24</span></font></sup><span data-dcnode-id="582" instrument_node=""> With the exception of some South Pacific islands, Australia and New Zealand - countries on the margin of Asia - most governments in the region are not enthusiastic even about a subregional approach. </span></p><p data-dcnode-id="576"><span data-dcnode-id="580" instrument_node="">

	Jack Donnelly classified human rights regimes into four types of activity: declaratory, promotional, implementation, and enforcement regimes. All regimes, by definition, have standard norms, or at least guidelines, but their capacities to monitor and/or enforce the observation of norms vary. Declaratory regimes involve international norms but no international decision-making. Promotional regimes involve an exchange of information and efforts to promote the national implementation of norms. Implementation regimes involve monitoring procedures and policy coordination which are weak and under national control. Enforcement regimes involve binding international decision-making and strong forms of international monitoring of national compliance.</span><sup data-dcnode-id="577"><font data-dcnode-id="578" size="-1"><span data-dcnode-id="579" instrument_node="">25</span></font></sup></p><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">
 
	Using his framework Donnelly attempted a brief review of the evolution of human rights regimes since the end of the Second World War. In 1945 no international regimes on human rights existed. Ten years later a declaratory global regime had been established. With another ten years the global regime became a strong declaratory regime, and it developed into a promotional regime by 1975, and a strong promotional regime by 1985. Among regional regimes, Europe's was the only enforcement regime by 1985. The Inter-American regime, which was only a declaratory regime in 1965, however, had become a strong promotional/enforcement regime by 1985. The declaratory African regime only came into existence in the early 1980s. The absence of a human rights regime even of the declaratory kind in Asia, one of the world's largest and economically most dynamic region, is conspicuous. </span></p><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">

	The vast size of Asia and the complex cultural differences of the region defy a regional approach. Proposals for a human rights system have been consistently rejected by Asian governments. As early as 1964 a UN seminar in Kabul on human rights in developing countries discussed the drafting of an Asian convention on human rights. The idea received further support in 1965 at the Southeast Asia and Pacific Conference of Jurists in Bangkok. The Philippines proposed to the UN Commission on Human Rights in 1967 that regional commissions should be set up in regions where there were no such institutions. While regional arrangements were established in other parts of the world, the idea has not enjoyed wide support in Asia.</span></p><p data-dcnode-id="566"><span data-dcnode-id="571" instrument_node="">
 
	Again, during the 1982 Colombo seminar representatives from Asian governments did not favour the establishment of an Asian human rights commission. Those who favoured a global approach also feared that a regional or subregional framework in a region where many authoritarian regimes are in power might actually pose a threat to the cause of human rights because regional arrangements would run the risk of being overwhelmed by the representatives of such regimes.</span><sup data-dcnode-id="568"><font data-dcnode-id="569" size="-1"><span data-dcnode-id="570" instrument_node="">26</span></font></sup><span data-dcnode-id="567" instrument_node=""> Thus a combination of geography, historical circumstances, cultural diversity and political opposition has made the establishment of a regional human rights commission in Asia extremely difficult. </span></p><p data-dcnode-id="560"><span data-dcnode-id="565" instrument_node="">

	But countries in Asia exhibit similarities in the form of vast populations and highly complex social organizations that were in existence long before the reception of Western laws and legal concepts.</span><sup data-dcnode-id="562"><font data-dcnode-id="563" size="-1"><span data-dcnode-id="564" instrument_node="">27</span></font></sup><span data-dcnode-id="561" instrument_node=""> Communities in East Asia share a long history of economic, social and political interaction, even if some such interactions have not always been cordial. In the contemporary era most of them also experienced Western colonialism in one form or the other. The end of the Cold War should facilitate better political cooperation among them. Moreover East Asian states which have embarked on a similar export-oriented economic strategy share common interests in the face of Western protectionism.</span></p><p data-dcnode-id="554"><span data-dcnode-id="559" instrument_node="">
 
	The increasing importance of human rights in the post-Cold War international agenda may force East Asian states to rethink their approach to human rights problems. ASEAN states, for example, have attempted to develop an alternative approach to human rights management. In July 1992 an ASEAN think-tank submitted a note on human rights to the ministers meeting in Manila. This put forward a set of guiding principles for dealing with human rights issues, incorporating the ASEAN arguments on situational uniqueness. The submission expressed support for an impartial international monitoring body with comprehensive values and proposed that ASEAN should examine the feasibility of establishing a Commission on Human Rights. The establishment of such a commission, argued the think-tank, would enable ASEAN to develop and formulate human rights policies in accordance with its specific historic, economic  and political circumstances. The Commission would also be the "embryo or catalyst" of a region-wide commission for the Asia-Pacific or even Asia as a </span><font data-dcnode-id="558" size="-1"></font><span data-dcnode-id="557" instrument_node="">whole.</span><sup data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">28</span></sup></p><p data-dcnode-id="547"><span data-dcnode-id="553" instrument_node="">

	Other proposals for international institutions in the region include the establishment of a US-China human rights commission. According to the proposal, the bilateral US-China human rights commission would consist of governmental and non-governmental members. The commission would provide a forum for discussing systemic human rights issues such as political crime and religious freedom, and act as a channel for regular exchange of human rights </span><font data-dcnode-id="552" size="-1"></font><span data-dcnode-id="551" instrument_node="">information.</span><sup data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">29</span></sup><span data-dcnode-id="548" instrument_node=""> Such institutions, if they are to be established, may help to ease international tensions in the region, but they are still on the drawing board, and many NGOs are suspicious that they may become an instrument of human rights management rather than human rights protection. </span></p><p data-dcnode-id="536"><span data-dcnode-id="546" instrument_node="">

	If there is an absence of governmental support for establishing region-wide human rights protection systems in the Asia-Pacific, the same definitely cannot be said of the non-governmental groups. In fact most initiatives for regional human rights protection have been made by NGOs. Since the 1970s Asian NGOs have been more and more active in promoting human rights protection in the region. Today's Asian NGOs, as an observer remarked, "are more numerous, better organized and more outspoken than ever before".</span><sup data-dcnode-id="543"><font data-dcnode-id="544" size="-1"><span data-dcnode-id="545" instrument_node="">30</span></font></sup><span data-dcnode-id="542" instrument_node=""> Most of them are national organizations, but some are organizations with wider regional concerns. These NGOs include Lawasia, the law association for Asia and the Pacific, the Asian Coalition of Human Rights Organizations, which was established in Bangkok, the ASEAN-based Regional Council on Human Rights in Asia, and the Asian Human Rights Commission and the Asian Legal Resource Centre, which were set up in Hong Kong in 1983.31 These are not the only human rights NGOs with a regional focus. The Asian Center for the Progress of Peoples and the Asian Regional Exchange for New Alternatives, for example, have been actively involved with human rights promotion in the region. The considerable number of regional organizations which attended the Bangkok NGO conference in 1993 is also indicative of the interests in human rights issues at the regional level. Many of these groups, however, may have different agendas, and a subregional focus. The Asia Pacific Forum on Women, Law and Development, and the Asian Students Association have a specific focus. In terms of resources and activities they may also have significant differences, but they have all been involved in the promotion of human rights with a regional </span><font data-dcnode-id="541" size="-1"></font><span data-dcnode-id="540" instrument_node="">focus.</span><sup data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">32</span></sup><span data-dcnode-id="537" instrument_node=""> </span></p><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">

	The many initiatives for developing human rights arrangements by Asian NGOs can be classified into three major categories. The ideal model is characterized by a comprehensive and highly institutionalized human rights system with a human rights convention, a set of monitoring and investigative machinery as well as an enforcement mechanism. The second category is more action-oriented, involving coordinating human rights campaigns and organizing regional human rights promotion activities. A third category involves proposals for establishing human rights institutions for research and information exchange purposes with varying degrees of institutionalization.</span></p><p data-dcnode-id="528"><span data-dcnode-id="533" instrument_node="">

	Among the numerous Asian NGOs, Lawasia has been particularly active in putting forward concrete proposals on regional human rights institutions. Lawasia has drafted ten basic principles on human rights, and also produced a model Pacific Charter of Human Rights. In 1988 the organization recommended the establishment of a regional human rights research institute which would conduct research on human rights, offer human rights study courses, monitor human rights abuses and serve as an information clearing house for the region. One of the most recent proposals was put forward in a 1993 Lawasia meeting in Sri Lanka. The proposal envisages the establishment of an Asian convention on human rights, to be supported by an Asian human rights commission and a court of human rights.</span><sup data-dcnode-id="530"><font data-dcnode-id="531" size="-1"><span data-dcnode-id="532" instrument_node="">33</span></font></sup><span data-dcnode-id="529" instrument_node=""> </span></p><p data-dcnode-id="522"><span data-dcnode-id="527" instrument_node="">
