1.	</span><a data-dcnode-id="1502" href="#INTRODUCTION"><span data-dcnode-id="1503" instrument_node="">Introduction: "Asian Values" and Democracy in Asia</span></a><br data-dcnode-id="1501"><span data-dcnode-id="1500" instrument_node="">

2.	</span><a data-dcnode-id="1494" href="#DEBATE"><span data-dcnode-id="1495" instrument_node="">Asian Values: The Debate Revisited</span></a><br data-dcnode-id="1493"><span data-dcnode-id="1492" instrument_node="">
</span><font data-dcnode-id="1489" size="-1"><i data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">C.O. Khong</span></i></font></p><p data-dcnode-id="1479"><span data-dcnode-id="1487" instrument_node="">

3.	</span><a data-dcnode-id="1485" href="#COMMONALITIES"><span data-dcnode-id="1486" instrument_node="">The United States and East Asia: New Commonalities
	and Then, All Those Differences
</span></a><br data-dcnode-id="1484"><span data-dcnode-id="1483" instrument_node="">
</span><font data-dcnode-id="1480" size="-1"><i data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">David I. Hitchcock</span></i></font></p><p data-dcnode-id="1470"><span data-dcnode-id="1478" instrument_node="">

4.	</span><a data-dcnode-id="1476" href="#CLASH"><span data-dcnode-id="1477" instrument_node="">A Clash of Values? Human Rights in the Post-Cold War World</span></a><br data-dcnode-id="1475"><span data-dcnode-id="1474" instrument_node="">
</span><font data-dcnode-id="1471" size="-1"><i data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">James T.H. Tang</span></i></font></p><p data-dcnode-id="1461"><span data-dcnode-id="1469" instrument_node="">

5.	</span><a data-dcnode-id="1467" href="#POLITICAL"><span data-dcnode-id="1468" instrument_node="">Political Culture and Indonesian Democracy</span></a><br data-dcnode-id="1466"><span data-dcnode-id="1465" instrument_node="">
</span><font data-dcnode-id="1462" size="-1"><i data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Leo Suryadinata</span></i></font></p><p data-dcnode-id="1456"><span data-dcnode-id="1460" instrument_node="">
</span><a data-dcnode-id="1458" href="#PARTICIPANTS"><span data-dcnode-id="1459" instrument_node="">Conference Participants</span></a><span data-dcnode-id="1457" instrument_node="">
</span></p><p data-dcnode-id="1451"><br data-dcnode-id="1455"><br data-dcnode-id="1454"><br data-dcnode-id="1453"><span data-dcnode-id="1452" instrument_node="">
</span></p><h3 data-dcnode-id="1447"><a data-dcnode-id="1449" name="INTRODUCTION"><span data-dcnode-id="1450" instrument_node="">INTRODUCTION:</span></a><span data-dcnode-id="1448" instrument_node=""> "ASIAN VALUES" AND DEMOCRACY IN ASIA</span></h3><span data-dcnode-id="1446" instrument_node="">

Takashi Inoguchi and Edward Newman</span><p data-dcnode-id="1439"><br data-dcnode-id="1445"><br data-dcnode-id="1444"><span data-dcnode-id="1443" instrument_node="">






Cultural determinism argues that cultural values condition modes of social and economic organization, including patterns of political relationships, political participation, citizenship and government. As a corollary of this, societies or regions which embrace a common cultural heritage can be said to have evolved discrete systems of political and social arrangements distinct from - and sometimes in opposition to or in conflict with - the rest of the world. On the basis of this, these culturally embedded arrangements have been argued to explain and underpin such important issues as relative economic performance and social cohesion, and to determine crucial issues of international relations between cultural groups.</span><sup data-dcnode-id="1440"><font data-dcnode-id="1441" size="-1"><span data-dcnode-id="1442" instrument_node="">1</span></font></sup></p><p data-dcnode-id="1429"><span data-dcnode-id="1438" instrument_node="">
		
	Cultural approaches in the social sciences are not new, especially in comparative research. Max Weber famously drew conclusions regarding the relative strengths of Protestant and Catholic cultures for economic growth. However, in the wake of the Cold War the cultural backdrop has become particularly popular and contentious. There are two broad arguments. With the decline of global ideological conflict, and with it the polarizing effect this had upon international politics, economic and political regionalism have become more prominent. This has been on the basis of a process of development over a number of decades. In parallel to this, the ideological debate has given way to a cultural one. This has been tied to various political and economic indicators, but it has also been argued to underpin economic and political friction. Famously, Huntington wrote that "the fundamental source of conflict in this new world will not be primarily ideological or primarily economic. The great divisions among humankind and the dominating source of conflict will be cultural... [The] principal conflicts of global politics will occur between nations and groups of different civilizations. The clash of civilizations will dominate global politics."</span><sup data-dcnode-id="1435"><font data-dcnode-id="1436" size="-1"><span data-dcnode-id="1437" instrument_node="">2</span></font></sup><span data-dcnode-id="1434" instrument_node=""> Such culturally based arguments reject the homogenizing consequences of globalizing forces. In fact, they highlight the adverse affects of this process; people become more aware of their differences as cultures rub against each other.</span><sup data-dcnode-id="1431"><font data-dcnode-id="1432" size="-1"><span data-dcnode-id="1433" instrument_node="">3</span></font></sup><span data-dcnode-id="1430" instrument_node=""> This has been heightened by the resurgence of traditional values resulting from the uncertainties of socio-political change in some societies.</span></p><p data-dcnode-id="1419"><span data-dcnode-id="1428" instrument_node="">

	The contrary, more popular view holds that culture is declining as a determinant of domestic and international politics in the context of globalizing pressures. This process is undermining traditional values and institutions and bringing a convergence of cultures through communication, travel and trade: a fledgling homogenizing "world culture" as a consequence of increasing shared experiences. In the words of Havel, an "amalgamation of cultures" in a transcendent global ethos.</span><sup data-dcnode-id="1425"><font data-dcnode-id="1426" size="-1"><span data-dcnode-id="1427" instrument_node="">4</span></font></sup><span data-dcnode-id="1424" instrument_node=""> The convergence of political and economic practices and the spread of democracy have similarly led to arguments of growing similarities which have implications for cultural differences. Francis Fukuyama argued that the spread of free market economics and democratic politics is a process which "guarantees an increasing homogenization of all human societies, regardless of their historical origins or cultural inheritances".</span><sup data-dcnode-id="1421"><font data-dcnode-id="1422" size="-1"><span data-dcnode-id="1423" instrument_node="">5</span></font></sup><span data-dcnode-id="1420" instrument_node=""> This is also "undermining traditional social groups like tribes, clans, extended families, religious sects, and so on".6 The proliferation of democracy - albeit of various incarnations - in parallel to economic development appears to support this. However, democracy and economic growth have not been uniform: what role have cultural values played in conditioning their development? </span></p><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">

	The debate over "Asian values" is at the heart of this controversy. The extraordinary economic growth experienced within East Asian countries - often achieved under different modalities than that of the neo-liberal orthodoxy - has put the political and social arrangements of these countries under the spotlight. The success of these countries, in relation to the downturn of Western economies, and the friction which has arisen over trade protectionism, economic conditionality, democracy and human rights have made the "Asian values" debate more than just an intellectual exercise. In fact it is highly, perhaps irredeemably, politicized. The social problems in the West have compounded the contrast of fortunes and a number of political leaders - both in the East and West - have suggested that the "Asian way" is the way forward. The principal representatives of the "Asian values" thesis in Asia - whilst challenging the universalization of liberal social ideas and revelling in higher growth levels than their former colonial overlords - have been happy to proclaim the ascendancy of "Asian values".</span></p><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">

	The concept of "Asian values" rests upon a number of presumptions which have serious methodological problems. In fact the phrase "Asian values" implies that the social, economic and political characteristics of certain Asian countries are based upon a shared value system which is identifiable and distinct and which transcends national, religious and ideological differences. East Asia is presented as a value system in the context of an East-West dichotomy. The thesis maintains that cultural values have underpinned the growth rates of East Asian countries and conditioned the orderly social and political characteristics of the region. These ideas raise some pressing questions. Can these assumptions of causality and determinism be upheld methodologically? Do East Asian values transcend ideology, culture, religion and social and economic change? Is there an East Asian model of democracy which defines political relations, the roles and extent of government, notions of citizenship and patterns of political participation? What role have cultural values played in the democratization of East Asian societies and what implications has this had for the maintenance of high economic growth rates? What impact have cultural values had upon the international relations of the region and between East Asia and the West? </span></p><p data-dcnode-id="1409"><span data-dcnode-id="1414" instrument_node="">

	The "Asian values" debate is inseparable from the qualitative and quantitative patterns of development and economic growth in the region. From third world levels following the Second World War, and in some cases decolonization, the newly industrializing economies have experienced tremendous export-led growth, exploiting various comparative advantages in manufacturing but also proving adaptable in embracing high technology and skill-intensive exports. Trading and service businesses have also been important, against a backdrop of strong government. Japan, the Republic of Korea, Taiwan, Hong Kong and Singapore, and a "second tier" comprising Thailand, Malaysia, Indonesia and the Philippines, are the most notable examples. The growth rate has been sustained and generally accompanied by diminishing income inequalities. These societies have undergone a process of development - with all the social and political consequences - in a remarkably short period of time. The "East Asian Miracle"</span><sup data-dcnode-id="1411"><font data-dcnode-id="1412" size="-1"><span data-dcnode-id="1413" instrument_node="">7</span></font></sup><span data-dcnode-id="1410" instrument_node=""> would appear to be a justifiable conclusion, although one must bear in mind the circumstances of this success. Most of these countries practised various forms of state intervention, protectionism and strategic trade guidance in the Cold War context with the support of the United States, which also provided a major market. During the formative years, and in some cases long after, East Asian states were typically of the authoritarian form, shifting to soft authoritarianism and latterly in most cases becoming democratic. However, in accordance with the patterns of the developmental state, especially during the Cold War, the manifestations of democracy have been characterized by dominant party systems clearly not in the liberal democratic mode. </span></p><p data-dcnode-id="1406"><br data-dcnode-id="1408"><span data-dcnode-id="1407" instrument_node="">
</span></p><h3 data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">What Are "Asian Values"?</span></h3><span data-dcnode-id="1403" instrument_node="">

This question is so politicized, contested and methodologically dubious as to make it illusory. The notion has been manipulated from within and outside Asia and rests upon the crudest of generalizations. The idea of cultural values which are peculiar to East Asia and manifested from the bottom up through these countries' social and political apparatus appears to be easily falsifiable. Nevertheless, one can identify certain cultural traits. Beginning with the primary characteristics of these societies, it is often said that they are based upon group orientation; the interests of the community are felt to come before those of the individual. In fact, this is sometimes argued as a communitarian, perhaps neo-Hegelian, constitution of the "person" by virtue of membership of, and interaction with, larger units. One distinguished observer wrote that the individual "is not an isolated being, but a member of a nuclear and extended family, clan, neighborhood, community, nation and state. East Asians believe that whatever they do or say, they must keep in mind the interests of others ... the individual tries to balance his interests with those of family and society."</span><sup data-dcnode-id="1400"><font data-dcnode-id="1401" size="-1"><span data-dcnode-id="1402" instrument_node="">8</span></font></sup><span data-dcnode-id="1399" instrument_node=""> The consequence of this, it is argued, is that people are more group conscious than are those in the liberal, atomized West; Asian people work for the good of society, are less selfish and accept that the cohesion and stability of society are more important - and logically prior to - the rights of individuals. Behaviour is said to be motivated primarily not by concerns of individual rights but equally by duties and responsibilities. Indeed, it is only through an orderly society which curtails the excesses of individualism that all members of the community can live safe and fulfilled lives. The government must secure such an environment. An application of this thinking is clear in the rhetoric of the Chinese government concerning the reversion of Hong Kong to Chinese sovereignty. In response to fears of a curtailment of individual freedoms the government has repeatedly spoken of the need to "strike a balance between civil liberties and social stability". 
	Group orientation is also associated with values such as self-effacement, self-discipline and personal sacrifice to the greater good. This is integral to perceptions of public morality, harmony and social dynamism. Respect for family ties and the elderly, frugality, filial piety, hard work and teamwork are further elements of this matrix. With the right leadership it is a framework for "economic prosperity, progress, harmonious relations between citizens, and law and order".</span><sup data-dcnode-id="1396"><font data-dcnode-id="1397" size="-1"><span data-dcnode-id="1398" instrument_node="">9</span></font></sup><span data-dcnode-id="1395" instrument_node=""> </span><p data-dcnode-id="1381"><span data-dcnode-id="1394" instrument_node="">

	A number of these values have been seen within the context of the Confucian tradition, despite the difficulties of applying this to East Asia generally. Confucianism, as an amalgamation of religious and philosophical thought, is most closely associated with Chinese societies and so it is erroneous to equate it with "Asian values". Singapore's abandonment of a public policy of state Confucianism was partly due to the sensitivities of non-Chinese Singaporeans, for example. However, a number of analysts have broadened its influences throughout the region</span><sup data-dcnode-id="1391"><font data-dcnode-id="1392" size="-1"><span data-dcnode-id="1393" instrument_node="">10</span></font></sup><span data-dcnode-id="1390" instrument_node=""> and linked it to economic vitality - despite Weber's argument to the contrary - and social cohesion. Moreover, the influence of this tradition upon notions of citizenship and governance has given rise to the concept of "Confucian democracy". Confucianism has no single accepted influence, but it advocates ethical properties to private and public relationships which appear to suggest an acceptance of hierarchy and the need for social harmony, respect and reverence for family and benevolence in government.</span><sup data-dcnode-id="1387"><font data-dcnode-id="1388" size="-1"><span data-dcnode-id="1389" instrument_node="">11</span></font></sup><span data-dcnode-id="1386" instrument_node=""> In political terms this might appear to consolidate the state's authority in the interests of the "common good" and create a submissive population which accepts hierarchy and seniority. The extent to which East Asians are consciously influenced by Confucianism in this way is most questionable. Sceptics regard it as a part of a "top-down" promotion of an East Asian cultural renewal to resist Western criticisms of authoritarianism. Some have argued that it is an "invention of a tradition".</span><sup data-dcnode-id="1383"><font data-dcnode-id="1384" size="-1"><span data-dcnode-id="1385" instrument_node="">12</span></font></sup><span data-dcnode-id="1382" instrument_node=""> </span></p><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">

	Religion is an integral component of cultural values, although in East Asia its influence is similarly contested. Some East Asian leaders have argued that the aggressive separation of church and state - in effect constraining religion to the private sphere - in the West and the consequent process of secularization have contributed to a moral void in public life and accentuated the negative impulses of individualism. In East Asia, despite the obvious diversity of religions - chiefly Buddhism, Islam and Christianity - and a similar process of secularization, it has been argued that religion still plays a part in everyday life and still contributes to identity and group orientation.</span></p><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">
 
	The politicized nature of this debate derives partly from the manner in which "Asian values" are often pitted, usually falsely, against "Western values", another ambiguous concept. Of course, commentators such as Mahathir bin Mohamad usually speak in terms of a renaissance of "Asian values", in parallel to an economic renaissance, in contrast to socially and economically deteriorating Western societies. The resistance to liberal, Christian-derived, cosmopolitan values is a major part of this revival. In particular there is resistance to abstract universal notions of human rights and democracy, especially when these are seen to disguise arrogant, paternalistic and even interventionist Western tendencies. The communitarian conception of the self is at the heart of this argument; universal abstractions are rejected. Institutions and norms only have meaning in the context of the culture, social processes, level of development and values they derive from. However, the defensiveness towards external criticisms and pressures is not only a consequence of a different philosophical heritage. Western attempts to "impose" universal notions of human rights - the prohibition of child labour for example - are seen as a ploy to undermine East Asian competitiveness. </span></p><p data-dcnode-id="1371"><span data-dcnode-id="1376" instrument_node="">

	"Asian values" are invariably discussed in the context of an East-West dichotomy. This increases the tendency to exaggerate and generalize, and leads one to conclude that the debate is more political than substantive. When advocates of "Asian values" celebrate the community over individualism, the family as the basis of society, frugality, respect for learning, hard work, public duty, teamwork, they usually demean their argument by contrasting these with the breakdown of the family, decadence, hedonism, excessive individualism, lack of teamwork, fecklessness, and ill discipline in the West. At its most nonsensical, the dynamism and cohesion of East Asia is contrasted with the West's "moral degeneration" and its imminent social collapse, no less.</span><sup data-dcnode-id="1373"><font data-dcnode-id="1374" size="-1"><span data-dcnode-id="1375" instrument_node="">13</span></font></sup><span data-dcnode-id="1372" instrument_node=""> </span></p><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">

	This suggests an ascendancy of the "Asian way" of strong government, social conservatism and free market economics. The renaissance theme is common. It is interesting that some political leaders in the West have begun to "learn from the East" and use the rhetoric of this agenda in response to the perceived excesses of individualism and social deterioration. Reinvigorating community values and the public spirit is a popular theme.</span></p><p data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">
</span></p><h3 data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Democracy and Politics</span></h3><span data-dcnode-id="1364" instrument_node="">

The "Asian values" thesis maintains that certain patterns of development and politics are reflected throughout the region. Whilst this is to an extent self-evident, demonstrating a connection between these arrangements and cultural values is a formidable task. Nevertheless, some generalizations can be made which reflect a divergence from the liberal democratic model of the West. In fact, the divergence contributes to a process of democratic proliferation which makes it difficult to define the criteria of democratic government. The classical liberal characteristics of democracy require a multiplicity of parties representing competing policy agendas and clear political alternatives, limitations on governmental authority and guaranteed rights of free expression and association. In an adversarial system, there is effectively a government-in-waiting. Citizenship ensures the opportunity to have an input into one's destiny and to participate in a public sphere of debate about all public issues in the context of a constitution and the rule of law. Out of this rigorous political competition comes good governance and accountability. The spirit of US democracy is characterized as guarding against government excesses as much as with endowing the government with the authority to define and enforce the public good. As Samuel Adams wrote, "When the government fears the people, there is liberty. When the people fear the government, there is tyranny." </span><p data-dcnode-id="1358"><span data-dcnode-id="1363" instrument_node="">

	East Asian democracies differ from this rather romanticized democratic ideal. Most have evolved through hard or soft developmental authoritarianism to some form of democracy, in the sense of having elections, universal suffrage and political parties. Yet in some cases they appear to be based upon a different social premise. Strong government invested with the responsibility of upholding collective needs, an absence of many liberal democratic practices, and longevity of political elites seem to be the norm. Singapore, for example, has been ruled by the People's Action Party since independence, and under the leadership of Lee Kuan Yew between 1959 and 1990. Singapore has even been described as a "consencracy".</span><sup data-dcnode-id="1360"><font data-dcnode-id="1361" size="-1"><span data-dcnode-id="1362" instrument_node="">14</span></font></sup><span data-dcnode-id="1359" instrument_node=""> The ruling Golkar party of Indonesia, with the support of the military, has won all elections since the present political system was established in 1975. A similar longevity of power has been experienced by the Liberal Democratic Party in Japan, the United Malays National Organization in Malaysia, the elite in Thailand, the alliance of bureaucratic and military forces until recently in South Korea, and the Kuomintang in Taiwan. Can this be attributed to an East Asian preference for harmony, consensus and an adversity to confrontation?</span></p><p data-dcnode-id="1347"><span data-dcnode-id="1357" instrument_node="">

	In a number of these countries there has not been complete freedom for opposition parties, freedom of speech, a separation of powers, or civil and political rights as conceived in Western political thought. In societies where the emphasis is upon consensus and harmony, especially when pursuing economic growth, it has proved possible to deem opposition as subversive. Cultural values have been a tool to control dissent. It has been widely argued that free market development precedes democracy and civil rights, as indeed it did in the West. Lee Kuan Yew stated that "I do not believe that democracy necessarily leads to development. I believe that what a country needs to develop is discipline more than democracy."</span><sup data-dcnode-id="1354"><font data-dcnode-id="1355" size="-1"><span data-dcnode-id="1356" instrument_node="">15</span></font></sup><span data-dcnode-id="1353" instrument_node=""> Aung San Suu Kyi's argument that development can and must occur in a democratic "culture of peace" has not moved Myanmar's Asian neighbours beyond the mentality of domestic jurisdiction and non-interference which characterizes the </span><font data-dcnode-id="1349" size="-1"><span data-dcnode-id="1352" instrument_node="">region.</span><sup data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">16</span></sup></font><span data-dcnode-id="1348" instrument_node=""> In a developmental context it has been possible to argue that stability and basic welfare are the priorities; strong government and a curtailment of some political rights are thus necessary in the interests of society. The collective goals are clear so the government's responsibility of upholding these should not be unduly hampered by democratic checks and balances. </span></p><p data-dcnode-id="1331"><span data-dcnode-id="1346" instrument_node="">

	This ethos continues in some cases, albeit in a diluted form. A strong bureaucracy and an absence of the separation of powers are still characteristics of East Asian states. In fact, there has been practically a fusion of the state, leading party and </span><font data-dcnode-id="1342" size="-1"><span data-dcnode-id="1345" instrument_node="">bureaucracy.</span><sup data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">17</span></sup></font><span data-dcnode-id="1341" instrument_node=""> Accountability and transparency, the bedrock of liberal democracy in the West, are not the starting point of government. For years the cultural disposition of East Asians was thought to accept this benevolent, paternalistic spirit of government. As the epitome of this, Karel van Wolferen presented a picture of a docile, conformist, submissive Japanese population completely indifferent to the intrusions of the state and bureaucracy and an impenetrable political </span><font data-dcnode-id="1337" size="-1"><span data-dcnode-id="1340" instrument_node="">system.</span><sup data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">18</span></sup></font><span data-dcnode-id="1336" instrument_node=""> Huntington broadly suggested that Confucian or Confucian-influenced societies are inhospitable to democracy.</span><sup data-dcnode-id="1333"><font data-dcnode-id="1334" size="-1"><span data-dcnode-id="1335" instrument_node="">19</span></font></sup><span data-dcnode-id="1332" instrument_node=""> If the government and bureaucracy are working in the interests of society, why are accountability and transparency necessary? Indeed, these liberal notions can undermine efficiency and stability and cause gridlock between institutions. Efficiency and stability rank higher than transparency and accountability, although this is changing. This appears to conform to the East Asian emphasis on harmony and consensus, which could obstruct the free exchange of ideas and rigorous political debate.</span></p><p data-dcnode-id="1321"><span data-dcnode-id="1330" instrument_node="">

	In the context of these conservative values a number of East Asian societies still do not have a free press. According to one observer, "East Asians want their governments to maintain a morally wholesome environment".</span><sup data-dcnode-id="1327"><font data-dcnode-id="1328" size="-1"><span data-dcnode-id="1329" instrument_node="">20</span></font></sup><span data-dcnode-id="1326" instrument_node=""> This implies a level of governmental intervention and arbitrariness which is rather alien to the libertarian and minimalist notions of government in many Western societies. A government campaign in Britain to promote morally wholesome values under the theme of "back to basics" was completely abandoned, for example. Could one characterize Asian democracy as government of the people but not necessarily by the people, and the people as subjects rather than citizens? If one were to attempt comparisons with the West it would appear that many East Asian political systems have been built upon different philosophical foundations and certainly reflect different priorities and needs. This is sometimes manifested in rather Orwellian terms of "too much freedom is dangerous".</span><sup data-dcnode-id="1323"><font data-dcnode-id="1324" size="-1"><span data-dcnode-id="1325" instrument_node="">21</span></font></sup><span data-dcnode-id="1322" instrument_node=""> </span></p><p data-dcnode-id="1315"><span data-dcnode-id="1320" instrument_node="">
	Competing conceptions of human and civil rights have focused the "Asian values" debate. Invariably this raises the most indignant defensiveness in the region. There is a common generalization which is often presented as a dichotomy. In the West, liberal, cosmopolitan individual freedoms which stress civil and political rights. In the East, communitarian, context-dependent rights and duties commensurate with local needs and conditions which are more likely to stress social and economic rights. To some degree this rough distinction has been reflected in states' attitudes to the principal international human rights instruments - such as the Universal Declaration of Human Rights and the covenants on civil and political, and social and economic, rights of 1966 - and it was manifested at the time of the UN Human Rights Conference in Vienna 1993. The Asian position, elaborated at a Bangkok summit prior to the UN conference, was that they would not accept a declaration which put the rights of the individual above the needs of society and the right to live in an environment of social and political order.</span><sup data-dcnode-id="1317"><font data-dcnode-id="1318" size="-1"><span data-dcnode-id="1319" instrument_node="">22</span></font></sup><span data-dcnode-id="1316" instrument_node=""> It is in this sense that the universalization of a liberal vision of rights is resisted; by arousing dissent and demands for a free press the liberal agenda is also regarded as an attempt to undermine East Asian competitiveness. There is also an element of indignation at a perceived Western cultural and racial superiority. </span></p><p data-dcnode-id="1308"><span data-dcnode-id="1314" instrument_node="">

	East Asian leaders claim that different standards are both a reflection of different cultural foundations and different practical needs. Indeed, irrespective of cultural relativism, levels of social and economic development and degrees of state consolidation are key factors in human and political rights. The multi-ethnic nature of many East Asian states and the demands of managing the welfare of developing societies dictate certain priorities and an element of authoritarianism, just as they did in the West when it was undergoing a similar phase. In some cases fragmentation is a more pressing concern than human rights, a fact that some human rights commentators in the West fail to understand. Moreover, unlike the West, the region has experienced tremendous development in just decades. The socio-political impact of this has to be managed in such a way as to safeguard growth and avoid social fracture; democratizing too fast is not </span><font data-dcnode-id="1313" size="-1"></font><span data-dcnode-id="1312" instrument_node="">wise.</span><sup data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">23</span></sup><span data-dcnode-id="1309" instrument_node=""> </span></p><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">

	The international relations of East Asia appear to reflect this collective reasoning. There is clearly an emphasis on domestic jurisdiction and non-interference. Negotiations concerning Myanmar's membership in the Association of South-East Asian Nations, despite condemnation and sanctions against Myanmar by the outside world, have reflected this tendency. Similarly, the region stands out for having few, if any, legal instruments pertaining to human rights and no human rights commission. </span></p><p data-dcnode-id="1292"><span data-dcnode-id="1305" instrument_node="">

	The central problem with the Asian arguments is that, whilst they draw upon the rhetoric of cultural relativism and the developmental state, they are too easily a façade behind which authoritarian leaders deny human rights and opposition. If East Asian societies are so self-disciplined and cohesive, why has it been necessary to maintain authoritarian state structures?</span><sup data-dcnode-id="1302"><font data-dcnode-id="1303" size="-1"><span data-dcnode-id="1304" instrument_node="">24</span></font></sup><span data-dcnode-id="1301" instrument_node=""> "Asian values" can too easily be a tool to resist change and de-legitimize external scrutiny.</span><sup data-dcnode-id="1298"><font data-dcnode-id="1299" size="-1"><span data-dcnode-id="1300" instrument_node="">25</span></font></sup><span data-dcnode-id="1297" instrument_node=""> Chinese leaders, for example, often talk defensively about the "feelings of the Chinese people".</span><sup data-dcnode-id="1294"><font data-dcnode-id="1295" size="-1"><span data-dcnode-id="1296" instrument_node="">26</span></font></sup><span data-dcnode-id="1293" instrument_node=""> However, the "Asian position" at the Vienna conference on human rights was interpreted by the leaders of those states, from the "top down", and not by their citizens.</span></p><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">
</span></p><h3 data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">The Changing Context</span></h3><span data-dcnode-id="1287" instrument_node="">

The effects of economic globalization and interdependencies, advances in communications and transnational forces can be twofold. Some have argued that there has been a revival of traditional values as a result of the uncertainties of social change and as cultures rub up against each other. Whilst education, democracy and development may reflect a superficial Westernization, they can lead to a rediscovery of indigenous values, even a "cultural backlash".</span><sup data-dcnode-id="1284"><font data-dcnode-id="1285" size="-1"><span data-dcnode-id="1286" instrument_node="">27</span></font></sup><span data-dcnode-id="1283" instrument_node=""> The more popular liberal view is that this process results in a dilution of cultural differences and the breakdown of traditional values and institutions as the volume of shared experiences and behaviour increases. As a generalized consequence of "modernization" - industrialization, urbanization, education, democratization - this is undeniable. East Asian leaders have sought to exploit the opportunities of this environment whilst resisting the globalizing culture which accompanies this process. Yet by openly resisting change - and in the case of Singapore legislating to retain traditional values - they highlight that the force of change exists. Gerald Segal wrote that "modernization in East Asia is changing social values" and certain characteristic values are fading.</span><sup data-dcnode-id="1280"><font data-dcnode-id="1281" size="-1"><span data-dcnode-id="1282" instrument_node="">28</span></font></sup><span data-dcnode-id="1279" instrument_node=""> A deculturalization may thus be at work.</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">

	The confidence which has resulted from the economic success of East Asia has been accompanied by an element of anxiety as old institutions and values come into contact with modern forces. One only has to talk with senior members of society to hear complaints of a decline of traditional values and a trend of materialist individualism. And changes in aspirations and perceptions of good governance and feelings of alienation have had implications for politics and social relations. These implications have been quite dramatic in transitional democracies. Democracy groups have been unhappy with the pace of change in some cases and civil activists have been promoting participatory modes of local democracy. The public in Japan is less willing to trust the integrity of the alliance between the bureaucracy, the Liberal Democratic Party and business in working for the interests of Japan behind closed doors; there are significant calls for more transparency and accountability. In Thailand, tourists enjoying a river cruise to the ancient capital of Ayutthaya witness the ramshackle river houses of the poor next to the multimillion dollar hotel and housing developments. The old tour guide script explains that this is not a source of social discontent or instability because generally the mindset of the people is to accept their situation without complaint. Yet at the same time tens of thousands of disadvantaged people, especially from the countryside, conduct demonstrations in the centre of Bangkok against the uneven distribution of income from the booming economy. Thus, feelings of cultural identity - whether declining or in resurgence - coexist with increasing political consciousness in the context of globalizing forces. People are more assertive, overcoming traditional restraint and mobilizing from the bottom up. </span></p><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">

	In some cases, the established political structures - shored up by traditional values - have not proved adequate for an expression of grievances and aspirations which have resulted from transitional social tensions. This has contributed to civic activism and changing expectations of authority and leadership. The globalizing thesis can be modified to argue that there is not a broad deculturalization or a sweeping away of culture, but rather that certain values win through. There is a process of cultural Darwinism, not between, but within cultures. This is the reality of change in all societies. The fact that change has been accelerated in East Asia has added an element of anxiety to this process. </span></p><p data-dcnode-id="1269"><span data-dcnode-id="1274" instrument_node="">

	Asian leaders deny the weakening of cultural values in the context of the internationalization of production, rapid growth and advances in communication. As Mahathir bin Mohamad wrote, "Asian modernization has occurred as an inevitable stage of our history, not because we were Europeanized or Americanized."</span><sup data-dcnode-id="1271"><font data-dcnode-id="1272" size="-1"><span data-dcnode-id="1273" instrument_node="">29</span></font></sup><span data-dcnode-id="1270" instrument_node=""> Yet democratization and heightening political awareness have brought a political lexicon to East Asia which is common to - and perhaps emanated from - Western political thought, although this is not to say that democratization is Westernization. Authoritarian or semi-authoritarian states use arguments of cultural relativism and home-grown models of democracy, but there is a universalization of ideas and norms. If not embraced and managed, this is a source of friction for the future. The stability and longevity of some East Asian elites have been at the back of economic successes. What if this success does not continue?</span></p><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">
</span></p><h3 data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Conclusion</span></h3><span data-dcnode-id="1264" instrument_node="">

If a case could ever be made for "Asian values", it would not be as a coherent, ahistorical, monolithic bloc. Much of this discussion is a reflection of East Asian politics but not necessarily East Asian values. Every East Asian value exists to some extent in the West and the contest between tendencies - conservative and liberal, authoritarian and democratic - is a struggle within these regions just as much as between them. Arguably it is just at a different stage in East Asia. Even if there is a case for cultural determinism in an abstract sense, there is still great dissent regarding an "East Asian culture". Fukuyama, for example, argues an interconnection of family ties, citizenship and society which is quite different from most generalizations.</span><sup data-dcnode-id="1261"><font data-dcnode-id="1262" size="-1"><span data-dcnode-id="1263" instrument_node="">30</span></font></sup><span data-dcnode-id="1260" instrument_node=""> In the West there have been difficulties in defining and upholding the "common good" and reconciling it with the aspirations of individualism and liberty. A similar discourse is in evidence in East Asia. Governments emphasize the need for "an environment of social and political order",</span><sup data-dcnode-id="1257"><font data-dcnode-id="1258" size="-1"><span data-dcnode-id="1259" instrument_node="">31</span></font></sup><span data-dcnode-id="1256" instrument_node=""> but this conception of the "common good" is always in the interest of particular groups. However, this perennial democratic paradox is complicated and enlivened in East Asia by rapid change and the controversial relationship between economic development and political liberalization. "Asian values" have a role in this debate but it would be wrong to suggest that they are the determining factor in the outcomes.</span><p data-dcnode-id="1250"><br data-dcnode-id="1255"><span data-dcnode-id="1254" instrument_node="">

</span><h2 data-dcnode-id="1087"><a data-dcnode-id="1088" name="DEBATE"><span data-dcnode-id="1089" instrument_node="">ASIAN VALUES: THE DEBATE REVISITED</span></a></h2><span data-dcnode-id="1086" instrument_node="">


C.O. Khong</span><p data-dcnode-id="1079"><br data-dcnode-id="1085"><br data-dcnode-id="1084"><span data-dcnode-id="1083" instrument_node="">



"You get music and soap operas and prettier girls than here. And you get programmes in our own Minnan dialect. But best of all, you get news. Real news, not the bull they give you on Chinese TV. And I like it when some politician in the Taiwanese parliament can use Minnan dialect to shout down the old Kuomintang fogeys. I know that kind of fogey; we've got them on this side, too. I enjoy seeing cabbies like me tie up the whole downtown in a protest �honk-a-thon'. And I like it when Taiwanese get all worked up about elections. Wish we had free elections here. I'd vote for the opposition." (Xiamen taxi driver Teo Ah-hoon, talking about his satellite TV tuned to Taiwan)</span><sup data-dcnode-id="1080"><font data-dcnode-id="1081" size="-1"><span data-dcnode-id="1082" instrument_node="">1</span></font></sup></p><p data-dcnode-id="1074"><span data-dcnode-id="1078" instrument_node="">

"The difficulty that Western minds face in grasping the arrival of East Asia arises from the fact that we are witnessing an unprecedented historical phenomenon: a fusion of Western and East Asian cultures in the Asia-Pacific region. It is this fusion, not a renaissance of ancient Asian glories, that explains the explosive growth of the Pacific and provides the possibility of continued peace and prosperity in the region."</span><sup data-dcnode-id="1075"><font data-dcnode-id="1076" size="-1"><span data-dcnode-id="1077" instrument_node="">2 </span></font></sup></p><p data-dcnode-id="1067"><span data-dcnode-id="1073" instrument_node="">

The tremendous rise to economic prominence of East Asia has brought a new-found self-confidence. We talk today about Asian culture as an explanation for rapid growth, conveniently forgetting that for long, Asian culture was seen as an obstacle to the region's modernization. Asian models of economic and political organization are championed by zealous advocates to challenge the Western political vision, at a time when that Western vision has itself become clouded by alienation and uncertainty in the search for new political avenues. The advocates of "the Asian way", boosted by the success of their economic challenge to the West, argue that "Asia's time in the sun" has now </span><font data-dcnode-id="1072" size="-1"></font><span data-dcnode-id="1071" instrument_node="">arrived.</span><sup data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">3</span></sup><span data-dcnode-id="1068" instrument_node=""> </span></p><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">
	However self-confident Asian advocates may appear, the debate began not as a challenge, but as a defence by Asians against what were perceived to be Western assumptions of universality for their economic models, political ideals and social practices. The Asian defence was that the values underpinning these models are particular, not universal. Asian values are different in kind, not in degree. They are self-reliant, yet somehow communitarian rather than individualistic; built on personal relationships and mutual obligation, rather than the cold letter of the law - even if the law is today called upon to enforce those values; respectful of authority and hierarchy; and state interventionist, even into the private space of individuals. The word that summed up this - in part self-contradictory - spirit was Confucianism. Its validity was seen to lie in the achievement built up in the East Asian region, although presumably the most Confucian part of that region, China itself, was for many years its most enfeebled component.</span></p><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">

	But the debate has today taken on a subtly different tone. While maintaining that the West must appreciate the social and cultural differences that set Asia apart from it, there is a recognition by East Asians that their region faces a struggle to work out norms of governance and social organization that will be perceived as legitimate by fellow citizens. The conviction holds, though, that Asians will succeed, because they are aware that their continued prowess is dependent on looking ahead, and on making something new. In looking to tradition, it is not to borrow from a sterile past, but rather to re-interpret traditional values selectively, to make them relevant for the circumstances of today. There is now an acknowledged openness to draw on values and practices from other traditions, including Western ideas. What is being asked for on the Asian side is that this borrowing become a two-way process, a dialogue rather than a haranguing of one by the other. </span></p><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">

	The current debate needs to take on additional considerations. There is a guarded acknowledgement that Asian societies will have to create room for intellectual enquiry and to address issues of human rights and political liberties. It is no longer adequate to say that the record of modernizing governments justifies their right to rule. Asians today ask awkward questions: from where does this right spring? </span></p><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">

	Much of the traditional political theory of developing societies focuses on how political life is shaped from the top down. This misses a critical dimension. Whatever Asian political elites or Asian governments may say, there is a lively political discourse at the grass-roots level which, in the long term, is going to determine the shape of Asian governance. The values that feed this debate are not easily characterized, as they come from a variety of sources. Ideas of democratic governance are very much a part of it. Authoritarianism is acknowledged as a component of Asian values - is it not also in Western values? - but (as in the West) it is by no means uncritically accepted. Today, Asian political systems, Asian modes of economic governance and Asian political leaders are very much on trial.</span></p><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">
</span></p><h3 data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">The Politics of Globalizing Societies</span></h3><span data-dcnode-id="1054" instrument_node="">

How are we to characterize those Asian societies in which this vigorous political debate is taking place? Most obviously, these are societies exposed to the full brunt of globalizing forces, and changing rapidly as a consequence. For individuals, there is a multiplication and intensification of relations and interconnections. Issues transcend national frontiers. But they are issues which arise from interactions between individuals and agencies which are not directly under government control. David Held argues that the politics of globalization strikes at the heart of political legitimacy in all societies. Governments have to justify themselves to people who are increasingly politically aware. </span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">

	Notably in Taiwan and South Korea, growing prosperity under authoritarian rule gave rise to democratic transition led by an emergent middle class. For South Korea, the process was characterized by mass social mobilization and violent confrontation spearheaded by radical students and labour groups. Yet after the democratic breakthrough, the middle class withdrew support from Kim Dae Jung's opposition - seen as too radical and hence threatening - and became critical of the students and the labour unrest. The political process was opened up, but this led to an immediate concern for stability and government efficiency.</span></p><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">

	In Taiwan, the process was more low-key and involved bargaining and compromise between key political groups. Once the government committed itself, somewhat cautiously, to political liberalization and the ruling Kuomintang transformed itself into a party with more native Taiwanese - as opposed to mainland Chinese - characteristics, the middle class began to return its support to the reformed ruling party. The overriding concern again was to restore the stability of the system.</span></p><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">
 
	Globalization has had profound and widespread consequences in Asia, ranging beyond the middle class. The improvement in living standards experienced by most people is a consequence of their integration into the global political economy, a fact readily appreciated by them. On the other hand, unequal burdens and social dislocation have also resulted from economic growth. Again, governmental authority is called into question. Globalization has stimulated an intensification of demands for participatory politics at the community level. Exposed to massive changes, people look - not for more political rights, in a Western conceptual sense, but -  for a government which is more responsive to local needs and to individual concerns. We should be clear, though, that their demands arise in a situation where incomes are, for the majority, growing rapidly. The politics of local identity is not simply a defensive politics which is fearful of change. People are open to change, but they seek to make change relevant to their personal circumstances by differentiating the homogenizing forces which globalization brings. In doing so, they perceive that only a government which is accountable locally can be responsive locally. In this way local interaction and a thriving grass-roots politics are encouraged. </span></p><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">

	This politics of identity is sharply focused in Taiwan. Repressed feelings of a distinct Taiwanese identity now find political expression and the independence versus reunification debate reaches even into families with roots in both camps. But a vigorous grass-roots politics can also be seen in supposedly apolitical Singapore. In the Potong Pasir area, for instance, a strong local political movement supports a political leader identified very much with the concerns of a largely working class community. In China itself, direct elections at the village level stem the pervasive influence of the Communist Party, which is increasingly under pressure from populist grass-roots democracy.</span></p><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">
</span></p><h3 data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">The New Asian Politics: Populism through Democracy</span></h3><span data-dcnode-id="1041" instrument_node="">

It is populism, rather than democratic theory, which explains the nature of the new Asian politics. Above the level of the ordinary citizen, there is indeed a debate going on between political elites. The nature of this debate in authoritarian China is anti-populist, hence disconnected from the concerns of ordinary people. The ruling Communist Party destroyed much traditional culture, reaching its height in the Cultural Revolution with the ravaging of temples and the denouncing of parents by their children. Its intellectual opposition, which was crushed at Tiananmen, equally disparages popular belief, feared to be feudal, backwards and inimical to modern scientific progress. Ever since the May Fourth movement, Chinese intellectuals equated democracy with scientific rationality and believed that individual Western values could be isolated and selectively grafted onto the indigenous political process. It is in precisely those areas of China which are most rapidly developing, the southern coastal provinces, that we find both vital grass-roots political debate as well as a strong resurgence of popular beliefs (whether traditional or, in the case of Christianity, modern). They are symptomatic of each other.</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">

	In Taiwan, democratic practice brings the two together. Thus, while it appears that globalization has led to growing demands for more democracy, it is democracy which has led to the growth of traditional practices and folk religion: populism. Politicians, in order to be elected, have to be populist. They campaign by making food offerings to hungry ghosts and taking part in temple festivals, whatever their private views. In South Korea, folk rituals also form part of the popular political vocabulary, and political movements are often characterized in terms of indigenous culture. </span></p><p data-dcnode-id="1033"><span data-dcnode-id="1038" instrument_node="">

	In Singapore in the 1960s, contending political factions similarly appealed to popular beliefs. Since the consolidation of a dominant party system, however, politics has taken a different turn as the government has resorted to imposing a "Confucian" national ideology on a populace it viewed as in danger of becoming "deculturalized". What is interesting here is that, as John Clammer noted, Singapore already has a culture which is "an amalgam of many bits of tradition, many utterly transformed by their transformation to Southeast Asia, some more Malayan than Chinese, and very few any longer practised in China, the whole thing held together by a rather vague ideological model of what Chinese culture should be".</span><sup data-dcnode-id="1035"><font data-dcnode-id="1036" size="-1"><span data-dcnode-id="1037" instrument_node="">4</span></font></sup><span data-dcnode-id="1034" instrument_node=""> Below the official view, the local culture is dynamic and economically vibrant, though not necessarily analogous to the values of the Confucian elite, even if it believes it to be so.</span></p><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">
 
	The new Asian politics is more firmly based where it feeds off the wellspring of popular beliefs. The successful democratic transitions in South Korea and Taiwan had widespread social support. Moreover, their success arises not directly from any crusade for democratic principles in opposition to authoritarian rule - important as that may be - but from their association with political cultures which are notably populist. It is their appeal to popular beliefs rather than abstract principle which is the key to understanding their success. What we may in fact be witnessing here is the evolution of an elitist oligarchic tradition into a democratic one; the paradox is that a successful evolution depends on a coming to terms with traditional populist culture, rather than its rejection through cleaving to traditional elitism.</span></p><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">
</span></p><h3 data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">The New Asian Values: Confucianism as Cultural Explanation</span></h3><span data-dcnode-id="1026" instrument_node="">

The idea of an "Asian tradition" is very new. National traditions have been strong and rooted in peoples' perceptions. But the sense of a regional identity and shared heritage is a notion of today, the result of the burgeoning rapid modernization taking place through the region and the pride which people feel for this modernization.</span><p data-dcnode-id="1020"><span data-dcnode-id="1025" instrument_node="">

	The Japanese playwright Masakazu Yamazaki talks about the drive to modernize as the common denominator of all Asian national civilizations, bringing about a sense of Asian identity. But civilization is not culture. Culture is not universalistic. So under the broad umbrella of Asian modernization, we see the revival and new flourishing of a range of traditional Asian cultures. As they are newly revived, so new elements of universality are being mixed in from the contemporary environment. But each of them still retains a component of its original identity.</span><sup data-dcnode-id="1022"><font data-dcnode-id="1023" size="-1"><span data-dcnode-id="1024" instrument_node="">5</span></font></sup><span data-dcnode-id="1021" instrument_node=""> We should therefore be concerned with the living tradition: how the past lives on and mixes with ideas from the present. But there is little, apart from polemic, critical examination of what is so distinctive in the Asian heritage that is making an impact in an increasingly modernized Asian world. Such a consideration is vital in assessing past achievements and in predicting prospects for Asia.</span></p><p data-dcnode-id="1015"><span data-dcnode-id="1019" instrument_node="">
 
	The regional heritage from the past that is being discovered - or in some ways  constructed - is Confucianism. This is a broad reference to a general set of values and precepts regarding how people should behave that spread originally from China and its dominance as a source of ideas. This can be linked to Confucius's teachings, although it is intermixed with Buddhist, Taoist and other doctrines with all kinds of contradictory implications. While there is now an increasing awareness through the region of the influence of China upon many countries' traditions and of the Confucian core in this Chinese teaching, the way these implications play out is different in each country. The resulting behaviour patterns cannot all be readily identified as Confucian. 
	The cultural distinctiveness of Asian models of governance is nowadays fashionably attributed to Confucian doctrine. Asian politics has all to do with the Asian spirit, defined as a belief in authoritarian control, respect for bureaucracy and emphasis on the group at the expense of the individual. There is the inescapable suspicion that for many Asian governments Confucian values provide a handy imprimatur to practise the authoritarian politics which their people supposedly desire. They claim to be evolving their own distinctively Asian model of politics, which in some dangerously simplistic interpretations is inimical to democracy and liberalism. The former Singapore Prime Minister Lee Kuan Yew is often characterized as advancing this view, but a close reading of his public pronouncements shows a rather more sophisticated appreciation, which in no way attempts to defend authoritarian practices at the expense of concerns over legitimacy. Lee also disclaims that an "Asian model" exists, accepts that value systems do change, and criticizes Western society, interestingly enough, for a perceived erosion of individual responsibility and for an over-reliance on government to solve social problems.</span><sup data-dcnode-id="1016"><font data-dcnode-id="1017" size="-1"><span data-dcnode-id="1018" instrument_node="">6 </span></font></sup></p><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">

	Clearly, culture is an explanatory feature of the workings of different societies. The prevailing cultural context must be expected to have a fundamental impact on people's attitudes and motivations. The difficulty lies, however, in elucidating the particular nature of their thought processes. Certainly in East Asia both the rights of individuals and their view of government can be seen in a particular light. But to make a crude dichotomy between exaggerated and mutually exclusive notions of conformist "Asian" - as opposed to individualistic "Western" - values is simply misleading. </span></p><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">

	The Confucian political tradition is, like many other schools of thought, far too broad and rich to be neatly categorized. For instance, Confucian teaching allots, indeed requires, a role for criticism of political authority. Every Chinese schoolboy learns the famous story of the irascible scholar, Hai Rui, who, before addressing his criticisms to the emperor, took the precaution of buying his own coffin. (Fortunately he lived on for another 20-odd years.) The moral of the story, as it is taught, is not that you should never criticize the ruler. Rather, the moral is that the educated gentleman is duty-bound to criticize the ruler and to redress his wrongs, whatever the consequences might be. Scholar and emperor are bound together in a bond of filial piety. Criticism of wrong by the former is a very strict duty, to ensure the good behaviour of the latter.	</span></p><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">

	This story, however, is not one which readily equates with a Western individualistic liberal political tradition. Criticism of the ruler is not a democratic right. Rather, it is an elitist prerogative incumbent on those very people who uphold the structure of government and whose criticisms are directed at maintaining it. Today, these people would be roughly equivalent to the bureaucracy; though the original definition was one of education. Thus, an action which fits readily into democratic liberal practice, as it is understood in the West, is actually seen in a qualitatively different light in Confucian culture. </span></p><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">

	How does Confucianism operate in practice at the populist level, in shaping the social and political choices which ordinary people make? Here the pontificating of Asian elites becomes irrelevant; we can discard all those abstract concepts of high Confucianism such as loyalty and filial piety. The common person does not read the Analects nor even some simple primer of Confucian doctrine. It is how Confucian values shape practice at the lower levels that is the more important. </span></p><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">

	Popular Confucianism, as it affects the man or woman in the street, is far removed from high Confucian theory. It is perhaps no more than a vague amalgam of residual ethical beliefs and a bias towards particular practices not amenable to rational analysis but nevertheless prompting certain attitudes towards the family, education, social responsibility and views of government. The family is the focus of attention and close affections, education is respected, public service honoured, but government viewed with a measure of suspicion. There is a concern to keep some distance between one's family and the state, whose intentions cannot, in the last resort, be fully trusted. Such attitudes are neither obviously democratic nor readily authoritarian. They do, however, appear to lend themselves to the kind of participatory community politics which these globalizing societies appear to spawn. </span></p><p data-dcnode-id="1000"><span data-dcnode-id="1004" instrument_node="">

	Similarly, in the dynamic business practices of the overseas Chinese, what we see is not the high Confucianism of the intellectual elite - which is extremely stifling towards entrepreneurial initiative and innovative ideas - but the vulgar Confucianism of ordinary people, far removed from the centre of traditional culture. A merchant father - as vulgar Confucianist - can send his sons out to secure their own fortunes and the sons can be extremely daring in their business dealings, knowing that should they fail, they have the security of the extended family to fall back on. They can therefore assume risks which they might otherwise not consider. The high Confucian mandarin, on the other hand, would not dream of allowing his sons to engage in business ventures, as even the smallest risk of failure carries the possibility of dishonouring the family.</span><sup data-dcnode-id="1001"><font data-dcnode-id="1002" size="-1"><span data-dcnode-id="1003" instrument_node="">7</span></font></sup></p><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">
</span></p><h3 data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Tradition and Modernity</span></h3><span data-dcnode-id="995" instrument_node="">

In looking at how cultural heritage shapes Asian behaviour today, we are concerned about how people think that they relate to the world around them - to their families, their social acquaintances, their governments - and how this shapes their behaviour. Some of this behaviour may have pre-echoes in Confucian doctrine of correct forms of behaviour, but the connection should not be drawn too tight. There is something in the popular stereotype - the idea of responsibility to the group, of individuals seeing themselves in terms of their relationships to others - but too much should not be made of it.</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">
 
	The key tension for the future will be between loyalty towards the family prescribed by tradition, and the loyalty demanded by the state. The state may well stress preserving family structures, yet in Japan, the pressures of modern life increasingly mean that these structures are eroding, even if there are still tremendous pressures to conform. In China, after June 1989, the gap between reality and those values proclaimed by the state will (in the absence of movement by the state) mean that ordinary people will be reluctant to move beyond personalized ties and family-centred aspirations. But individual self-interest will be tempered by notions of family solidarity, harmony within the group and the desire for consensus. Questions will continue to be raised over which "Confucian" tradition to pursue: the idea of supporting the existing social order because of fear of chaos and instability, or the humanistic strand stressing the idea of people having their fate in their own hands and being able to work to improve their own individual futures.</span></p><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">
 
	The coming decades will see the emergence of a new Asian politics, shaped more by popular practice than by elitist concerns. This cannot be a process which is planted in the popular mind from above. Rather, it will rise from below, as the institutional expression of a lively political debate articulating the concerns of people caught up in rapidly changing globalizing societies. They will seek to institutionalize governmental authority, precisely in order to eliminate the arbitrary nature of "strong man" politics. Yet these institutions will equally be sensitive to the cultural nuances of the political contexts in which they are located. </span></p><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">

	Will this political institutionalization be democratic? Certainly it will be informed by democratic practice. But the precise mechanism is less relevant than the voice which political institutions give people in the decisions which shape their lives. In Asian societies it is simply not the case that individualism is not recognized. However, the individual cannot regard himself, or herself, as autonomous from his, or her, relations with other people. To describe this situation as group-orientated is overly simplistic. The point is that order is maintained through the individual having to act in a manner which takes account of the existing set of relations, or the "network" in which the person finds herself or himself. This network may not be - indeed, is not - impartial. But even though organized hierarchically, its functioning requires both parties to each relationship to conscientiously fulfil their responsibilities towards the other. Failure to do so disrupts harmony; and if one side falls short, the other is released from its corresponding obligations.</span></p><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">
 
	These understandings do not in themselves result in authoritarianism, as it is understood in the Western sense. East Asian Confucian-influenced society has in fact a deeply refractory attitude towards the emergence of divisive class-consciousness, which disrupts the harmony of the social network. Its authority is paternalistic, and paternalism requires participation in a spirit of mutual dependency. Superiors have to ensure the welfare of subordinates, because their power derives from the compliance of the latter. This is a situation which could in fact lend itself to democratic practice (with strong notions of individual obligations to society). However, institutionalization needs to formalize notions of accountability and of access to power, and the base of political legitimacy needs to be broadened beyond that of performance.</span></p><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">

	Political change in Asia will have to address these challenges. In doing so the debate will be conducted in terms of what Asian societies and peoples want, possibly even with a self-perception that Asia is somehow a culturally "Confucian" region. The forms of governance that result, however, will not be easy to characterize. They will reflect, though not replicate, the values of Western democracy. And they will be shaped by individual attitudes and social conventions borne of an intellectual tradition which defies stereotyping.</span></p><p data-dcnode-id="979"><br data-dcnode-id="984"><span data-dcnode-id="983" instrument_node="">
</span><font data-dcnode-id="980" size="-1"><b data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Notes</span></b></font></p><p data-dcnode-id="949"><font data-dcnode-id="950" size="-1"><span data-dcnode-id="978" instrument_node="">

	2.	Kishore Mahbubani, Permanent Secretary of Singapore's Ministry of Foreign Affairs, "The Pacific Way", </span><i data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Foreign Affairs</span></i><span data-dcnode-id="970" instrument_node=""> 74, no. 1 (1995), p. 102. </span><br data-dcnode-id="969"><span data-dcnode-id="968" instrument_node="">
	3.	Ibid.</span><br data-dcnode-id="967"><span data-dcnode-id="966" instrument_node="">
	4.	John Clammer, </span><i data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Singapore: Ideology, Society and Culture</span></i><span data-dcnode-id="963" instrument_node=""> (Singapore: Chopman, 1983), p. 112. </span><br data-dcnode-id="962"><span data-dcnode-id="961" instrument_node="">
	5.	Masakazu Yamazaki, "Asia, a Civilization in the Making", </span><i data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Foreign Affairs</span></i><span data-dcnode-id="958" instrument_node=""> 75, no. 4 (1996). </span><br data-dcnode-id="957"><span data-dcnode-id="956" instrument_node="">
	6.	Fareed Zakaria, "Culture Is Destiny: A Conversation with Lee Kuan Yew", </span><i data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Foreign Affairs</span></i><span data-dcnode-id="953" instrument_node=""> 73, no. 2 (1994). </span><br data-dcnode-id="952"><span data-dcnode-id="951" instrument_node="">
	7.	Conversation with Professor Wang Gungwu, Institute for East Asian Political Economy, National University of Singapore, 21 February 1997. </span></font></p><p data-dcnode-id="946"><br data-dcnode-id="948"><span data-dcnode-id="947" instrument_node="">
</span></p><hr data-dcnode-id="945"><span data-dcnode-id="944" instrument_node="">
</span><h2 data-dcnode-id="940"><a data-dcnode-id="942" name="COMMONALITIES"><span data-dcnode-id="943" instrument_node="">THE UNITED STATES</span></a><span data-dcnode-id="941" instrument_node=""> AND EAST ASIA: NEW COMMONALITIES AND THEN, ALL THOSE DIFFERENCES</span></h2><span data-dcnode-id="939" instrument_node="">


David I. Hitchcock</span><p data-dcnode-id="935"><br data-dcnode-id="938"><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node="">
</span></p><h3 data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Background</span></h3><span data-dcnode-id="932" instrument_node="">

This paper is based upon research conducted in a number of East Asian countries, including Singapore, Malaysia, Indonesia, Thailand, China, Korea and Japan. In 1994 and 1996 I conducted some very informal, unscientific polling of approximately one hundred people throughout Asia and repeated the exercise with Americans. The results of the 1994 polling on "Asian values" have taken on a life of their own because there existed little similar field research.</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">
</span></p><h3 data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">New Common Ground</span></h3><span data-dcnode-id="927" instrument_node="">

We are all familiar with various reports and media stories about the "East Asian Miracle". Rapid economic growth of the region has indeed brought new prosperity to millions and significantly lowered the number living in poverty. Along with unusually high annual growth rates, democratic institutions have also been developing in many of these countries. </span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">

	Since I was attempting in my research to probe underlying factors in these seven countries that may be affecting the formation of attitudes towards the United States and towards other countries, I began by asking what my respondents believed were the most important issues or problems their country faced today. The result - somewhat surprisingly - was a rather different picture of the region from the "miracle" image held by many Americans, at least. To varying degrees and with some exceptions, the problems described were remarkably similar, from country to country.</span></p><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">

There was considerable concern or frustration over the quality and character of political governance. In some countries, the desire for greater public participation in the political process is quite strong; some noted a desire to see further relaxation of central authority. Yet even in the democratic countries, respondents described considerable cynicism or disillusionment towards the political process and the administration of government. This feeling was compounded in most countries by corruption within government and between government, business and bureaucracy. There also remains anxiety about ethnicity in some of the countries studied, and about the need to maintain social stability as essential to orderly economic development. There are historical memories of colonialism and past conflicts in the region - though these appear to be fading - that can play on national feelings. In China and Korea they are close enough to the surface to spring out when stimulated by contemporary events. </span></p><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">
Respondents noted economic anxieties of varying degrees in each of the seven countries. Freer trade may threaten local industries; higher wages could result in factories leaving the country for cheaper labour elsewhere; too much foreign investment may corrupt local cultures; and new money is leading to more materialistic societies and wider income gaps between the poor and the top twenty per cent, though less so in Japan. In some cases, the economic boom also highlighted the gap between rural and urban populations. </span></p><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">
