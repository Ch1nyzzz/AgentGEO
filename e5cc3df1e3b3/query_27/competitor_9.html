hinder political actors to rehears such a view at occasions when cherishing technological innovations. Indeed at the advent of the new information and communication technologies (ICT), we encounter such narratives of hope by highly techno-optimistic analysts and policy makers, stressing the </span><em data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">advantages for all</span></em><span data-dcnode-id="2038" instrument_node=""> this global information infrastructure would bring. US Vice President Al Gore</span><strong data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">’</span></strong><span data-dcnode-id="2035" instrument_node=""> s 1994 speech at the meeting of the International Telecommunication Union in Argentina is one example nicely capturing this vision. Describing the internet as information highways, he stressed that it, “will allow us to share information, to connect, and to communicate as a global community. From these connections we will derive robust and sustainable economic progress, strong democracies, better solutions to global and local environmental challenges, improved health care, and—ultimately—a greater sense of shared stewardship of our small planet”. (Gore 1994)</span></p></div><div class="bout" data-dcnode-id="2028"><span class="count jquery-once-1-processed" data-dcnode-id="2031" id="226"><span data-dcnode-id="2032" instrument_node="">226</span></span><p data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">We therefore witness repeatedly efforts to establish sociotechnical imaginaries of societal progress, i.e., “collectively held, institutionally stabilized, and publicly performed visions of desirable futures, animated by shared understandings of forms of social life and social order attainable through, and supportive of, advances in science and technology.” (Jasanoff 2015) Following the ideal of scientific and technological rationality as a key governance principle was expected to quasi-automatically improve democratic societies and render them more equal for its constituencies.</span></p></div><div class="bout" data-dcnode-id="2023"><span class="count jquery-once-1-processed" data-dcnode-id="2026" id="227"><span data-dcnode-id="2027" instrument_node="">227</span></span><p data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Yet, much of the analysis in Science and Technology Studies (STS) and neighbouring fields has shown that this imaginary of a sociotechnical future equally open to all has its clear limits. While both scientific knowledge and technologies have definitely created solutions to problems in the areas of health, food, energy, communication, or transport, inequalities persisted. Thinking democracy and inequality together, therefore means to question the impact of the knowledge and technological infrastructures which form the basis of contemporary democracies, to be attentive to the many places and moments the performance of democracy is tied to questions of technoscientific choices, and to unpack the new challenges citizens have to face in order to fully participate in a technoscientific society.</span></p></div><div class="bout" data-dcnode-id="2018"><span class="count jquery-once-1-processed" data-dcnode-id="2021" id="228"><span data-dcnode-id="2022" instrument_node="">228</span></span><p data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Before entering a more detailed debate on some areas where the relation of science, technology and inequality becomes visible, it seems essential to underline the complexity and the relative nature of the very concepts of inequalities and democracy. In what follows, equality in relation to technoscientific change is understood as fragmented in nature, a situated outcome of specific performances of change and always shifting. In analogy also “a democratic society cannot fully or at every moment be a democracy” and will “depend upon mutually reinforcing democratic ideas, political culture, political imaginaries, institutions, and practices”. (Ezrahi 2012) Science and technology play an essential part in both, democracy and equality, and the aim is to think how we can perform them together reasonably well.</span></p></div><div class="bout" data-dcnode-id="2013"><span class="count jquery-once-1-processed" data-dcnode-id="2016" id="229"><span data-dcnode-id="2017" instrument_node="">229</span></span><p data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">The attention therefore has to move from asking principled questions—is something democratic and do technoscientific developments create conditions of equality­—, but much rather be attentive to the multiplicity of situations in which both democracy and equality have to be realized over and over again. This also means considering shifting socioeconomic conditions, the ways in which access to education and to different kinds of innovation is structured, the distribution of the capacities to raise voice in relation to technoscientific issues, and many more. And it becomes essential to investigate the structural conditions—i.e., technological infrastructures but also infrastructures in which knowledge circulates and can be accessed—which might keep inequalities in place.</span></p></div><div class="bout" data-dcnode-id="2007"><span class="count jquery-once-1-processed" data-dcnode-id="2011" id="230"><span data-dcnode-id="2012" instrument_node="">230</span></span><p data-dcnode-id="2008"><strong data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">2.7.1 Values, science and technology — Whose values?</span></strong></p></div><div class="bout" data-dcnode-id="2002"><span class="count jquery-once-1-processed" data-dcnode-id="2005" id="231"><span data-dcnode-id="2006" instrument_node="">231</span></span><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Indeed scholarship in science and technology studies has shown how technoscientific developments and societal values are deeply intertwined. The knowledge and the technologies we create, on the one hand, and the dominant values and normative ideals expressed in our societies, on the other hand, therefore have to be seen as coproduced. (Jasanoff 2004) The idea is thus to neither embrace technological nor social determinism, but much rather to see how the places where technologies are designed and knowledge is generated matter as well as the persons who hold the capacity to steer or at least to participate in these processes. We can therefore speak of a geography of innovations and responsibilities which needs our attention. Any technology we develop always already contains what Akrich (1992) calls a script, i.e., a „framework of action together with the actors and the space in which [they are] supposed to act’’. Scientific knowledge and its technological realisations are thus imbued with values specific to the environment in which they were created; they have to be understood as deeply situated and thus—at least to some extent— as (re)producing existing value orders. In terms of asking the democracy-equality question it is thus essential to pay attention to who gets imagined as potential user (groups) and who is forgotten; to who defines the problems at stake and what constitutes an adequate solution; to the places where innovations are created; and, finally, how do specific sets of values get imposed in the guise of the introduction of new technologies or in the foregrounding of specific kinds of knowledge.</span></p></div><div class="bout" data-dcnode-id="1997"><span class="count jquery-once-1-processed" data-dcnode-id="2000" id="232"><span data-dcnode-id="2001" instrument_node="">232</span></span><p data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">Langdon Winner’s (1986) famous question “Do artefacts have politics?” therefore calls us to pay attention to how specific technological arrangements are tacitly implemented for “settling an issue in the affairs of a particular community”, such as keeping certain boundaries in place as well as to how specific technological systems “require or [are] strongly compatible with particular kinds of political relationships”. In particular feminist scholars such as Judy Wajcman (2009) have pointed to the fact that “the materiality of technology affords or inhibits the doing of particular gender power relations”. If we consider the importance of broader economic and social circumstances for women to participate in the development of different artefacts, this also “reformulates the question of the exclusion of groups of people from technological domains and activities” and thus points to a reinforcement of inequalities in a technoscientific world. This then does not stay limited to questions of equal employment opportunities, but “is also crucially about how the world we live in is shaped, and for whom”. As we live in “a society that is constituted by science and technology”, Wajcman would continue to argue, “the politics of technology is integral to the renegotiation of gender power relations.”</span></p></div><div class="bout" data-dcnode-id="1992"><span class="count jquery-once-1-processed" data-dcnode-id="1995" id="233"><span data-dcnode-id="1996" instrument_node="">233</span></span><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">These arguments become all the more important when moving into the domain of socalled “development work.” There we frequently observe how specific solutions get imposed on people and their lives without considering their distinct values they live by. Thinking of equality and democracy from such a perspective therefore means that we have to seriously consider what and how we govern the production of knowledge and innovations, but also how we can grant citizens some access in order to rule themselves in a responsibly manner.</span></p></div><div class="bout" data-dcnode-id="1986"><span class="count jquery-once-1-processed" data-dcnode-id="1990" id="234"><span data-dcnode-id="1991" instrument_node="">234</span></span><p data-dcnode-id="1987"><strong data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">2.7.2 Ordering societies through classification and standardization: Whose order?</span></strong></p></div><div class="bout" data-dcnode-id="1981"><span class="count jquery-once-1-processed" data-dcnode-id="1984" id="235"><span data-dcnode-id="1985" instrument_node="">235</span></span><p data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">Indeed, classifications as well as standards have become the basic infrastructures assuring that contemporary democracies function in practice. They are an expression of our attachment to “the idea that if our lives, our organisations, our social theories or our societies, were ‘properly ordered’ then all would be well.” (Law 1994) Whether or not you are granted certain civil rights, have access to specific kinds of health care, or can chose your way of living, all this is related in one way or another to how well somebody is represented in such classifications and standardization processes. Thus the very idea of equality and its realization in the political realm very much depends on the outcome of such orderings. Indeed when looking into the history of 19th and 20th century we witness countless efforts of emerging nation states to make their constituency “legible” and thus calculable, and we efforts to design nation states in line with what is believed to be scientific rationality. (Porter 1995; Scott 1999)</span></p></div><div class="bout" data-dcnode-id="1976"><span class="count jquery-once-1-processed" data-dcnode-id="1979" id="236"><span data-dcnode-id="1980" instrument_node="">236</span></span><p data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">These processes of ordering society produced ever more extended collections of information on citizens, on social relations, economic life and many more, but also supported numerous planning efforts (e.g. urban and rural planning) realising desired futures. Such processes, as Anderson (1991) has taught us, never only describe the world as it is, but they make it through the description. He points to the fact how, among other technologies, the census contributed to the creation of imagined communities, i.e., communities which did not exist prior to the counting of and the accounting for them. In the end it was a small elite who decided what should be counted, thus allowing political power greater control over different resources and the lives of their subjects.</span></p></div><div class="bout" data-dcnode-id="1971"><span class="count jquery-once-1-processed" data-dcnode-id="1974" id="237"><span data-dcnode-id="1975" instrument_node="">237</span></span><p data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">While standards are essential to extending our reach in space and time, we have to be aware that “each standard and each category valorizes some point of view and silences another” (Bowker and Star 1999). While classifying is conceptualized as inescapable, “it is an ethical choice, and as such it is dangerous.“ (ibid.) The danger consists in the fact that “for any individual, group or situation, classifications and standards give advantage or they give suffering. Jobs are made and lost; some regions benefit at the expense of others.” Therefore democratic societies need to carefully reflect how these classifications are made, and how they are decided upon, giving voice to specific groups and individuals, while denying it to others.</span></p></div><div class="bout" data-dcnode-id="1966"><span class="count jquery-once-1-processed" data-dcnode-id="1969" id="238"><span data-dcnode-id="1970" instrument_node="">238</span></span><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">In contemporary societies these classification schemes have become so normalized that we do take them for granted, thus making them invisible und unquestionable. They only become explicit when belonging to a specific category denies access or does not give the same rights as to others. In many ways ethnic and racial, but also gender and sexual categorizations, though used very differently in different national and supranational contexts, are excellent examples for the making of essential differences and thus defining relevant groups, to be cared for.</span></p></div><div class="bout" data-dcnode-id="1961"><span class="count jquery-once-1-processed" data-dcnode-id="1964" id="239"><span data-dcnode-id="1965" instrument_node="">239</span></span><p data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Part of these questions of addressing differences have be more recently reformulated in an expanding diversity discourse, which tries to re-evaluate what it means to attend to differences among human bodies and lives. Indeed implementing the concept of diversity in health care, which is key area where inequality matters, shows the difficulty of dealing with “a variety of partly diverging normative meanings, bringing together social justice concerns with evidence about the uneven distribution of health and disease across population groups”, with empowering and positive visions of differences and concerns of being able to uphold contemporary healthcare systems. (Felt et al. 2016) Access to equal health care and classifications are thus deeply intertwined.</span></p></div><div class="bout" data-dcnode-id="1955"><span class="count jquery-once-1-processed" data-dcnode-id="1959" id="240"><span data-dcnode-id="1960" instrument_node="">240</span></span><p data-dcnode-id="1956"><strong data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">2.7.3 Living in an experimental society: Whose benefit? Whose voice?</span></strong></p></div><div class="bout" data-dcnode-id="1950"><span class="count jquery-once-1-processed" data-dcnode-id="1953" id="241"><span data-dcnode-id="1954" instrument_node="">241</span></span><p data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">More than two decades of scholarship have pointed at the experimental nature of contemporary societies and at our limited capacity to anticipate the outcomes of technoscientific change. Notions describing “society as the laboratory” (Krohn and Weyer 1994) or talk of “real-world experiments” (Gross and Krohn 2005) aim at capturing this shift. Nuclear power, or genetically manipulated organisms (GMO) represent powerful examples. Also the recent disaster in Fukushima has clearly pointed to the complexities of what it means to live in an experimental society. Or, when it comes to the impact of environmental damages, we clearly witness the unequal distribution of risks and benefits. Under the label of environmental justice STS scholars carefully investigated how the consequences of such real-world experiments often have to be carried in a disproportional manner by marginalized groups, pointing to the importance of considering categories like race, gender, or class as they come to matter in important ways. (e.g., Ottinger and Cohen 2011)</span></p></div><div class="bout" data-dcnode-id="1945"><span class="count jquery-once-1-processed" data-dcnode-id="1948" id="242"><span data-dcnode-id="1949" instrument_node="">242</span></span><p data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Underlying these discussions is the observation that “social practices increasingly present themselves as experiments via a willingness to remain open to new forms of experience” and that this type of experiment “appears to be precariously perched both on the actions of its participants and on the structures created by the members of society” (Gross and Krohn 2005: 79). Reflecting the nexus of democracy and inequality thus means asking: Who has the authority to design and perform experiments? Who is exposed to them? And, whose values decide whether any experiment is regarded as a success or not? Answering these questions might lead us to understand how inequalities do both emerge and are kept in place.</span></p></div><div class="bout" data-dcnode-id="1940"><span class="count jquery-once-1-processed" data-dcnode-id="1943" id="243"><span data-dcnode-id="1944" instrument_node="">243</span></span><p data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Caring for the lives in experimental societies also means being attentive to questions of who can make knowledge claims and with what authority, who has access to relevant information and who can thus gain voice. These reflections have a quite immediate connection to two related debates: one on participatory justice in technoscientific societies and the other on the role of information access in a world structured by ICTs.</span></p></div><div class="bout" data-dcnode-id="1935"><span class="count jquery-once-1-processed" data-dcnode-id="1938" id="244"><span data-dcnode-id="1939" instrument_node="">244</span></span><p data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">More than two decades ago, the question of an increased need for public participation has started to be raised persistently with the crumbling of the strong belief that the spread of scientific knowledge and rationality across contemporary societies would lead to more democracy. With science and technology taking on more important roles in making political choices, also concerns were voiced about the emergence of new hierarchies, allowing only a rather exclusive elite of knowledgeable subjects to direct societal choices. This has triggered a flurry of participatory exercises which were on a formal level deeply committed to openness, equality, representativeness and transparency and in which citizens should be able to express their concerns regarding technoscientific developments. However, science and technology studies scholars have also pointed the severe limitations such exercises meet in practice. (Wynne 2006) Not only are assumptions about who may legitimately speak in the name of society already built into participatory designs, i.e., publics do not simply exist out there, but they are constructed through such exercises. (Felt and Fochler 2010) In most exercises also the questions were pre-framed by the organisers or by experts, severely limiting the potential outcomes. Furthermore, social orders at work within the discussion settings, but a strong educational bias of those participating hinted at rather unequal conditions of participation. (e.g., Chilvers and Kearnes 2016)&nbsp;</span></p></div><div class="bout" data-dcnode-id="1930"><span class="count jquery-once-1-processed" data-dcnode-id="1933" id="245"><span data-dcnode-id="1934" instrument_node="">245</span></span><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">While the fear that, in the end, the expressed choices might be overruled by governing elites, a number of STS case studies have successfully demonstrated the potential value of granting lay expertise space in public debates. Examples would be the AIDS movement in the 1970ies as analysed by Epstein (1996) which managed to change essential parts in treatment and prevention or, more recently, the citizen science groups forming around radiation measurements in the aftermath of the Fukushima disaster. (Plantin 2014) In all these cases we have seen how important it is to open up knowledge generation to different perspectives.</span></p></div><div class="bout" data-dcnode-id="1925"><span class="count jquery-once-1-processed" data-dcnode-id="1928" id="246"><span data-dcnode-id="1929" instrument_node="">246</span></span><p data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">This brings us, second, to the question of new information and communication technologies (ICTs), which feature prominently in debates concerning questions of science, technology and inequality. (Wyatt et al. 2001) When introduced, they were expected to free people from a number of limitations, such as accessibility to information from a broad variety of sources; participation in political processes from remote places as well as access to health expertise and many more. In the end a more equal distribution of access to different knowledge resources would allow a gain in overall justice and thus get closer to the ideal of democratic societies. This rather positive and inclusive view of information technologies is however clearly opposed by critical analysts who argue that the “ICT revolution” might, quite to the contrary, be a source of new inequalities. The rather unequal access to the internet between and within regions, but also the need to develop new skills in searching, sorting, and assessing information, creates advantages only for some while further disadvantaging others. (Wyatt et al. 2005) Improving the technological infrastructures or bringing to life of educational programs were the most frequent reaction to these inequalities, paying however too little attention to the often rather profound social reordering that is inevitable part and parcel of the introduction of ICTs. Threats to exercise social control through different forms electronic surveillance would then undermine the value of privacy held very high in liberal democracies and might touch vulnerable groups stronger that any other parts of society. In the same move we also witness new forms of segregation on the labour markets, given the information intensive forms of work emerging. Finally, the spread of algorithms introduces unaccounted biases and calls for algorithmic literacy as one way to be able to reflect and navigate the information landscape in a self-defined manner. Also here we can expect quite important discrepancies in the ways how people can navigate environments organised by algorithms.</span></p></div><div class="bout" data-dcnode-id="1920"><span class="count jquery-once-1-processed" data-dcnode-id="1923" id="247"><span data-dcnode-id="1924" instrument_node="">247</span></span><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">To sum up, there is no doubt that science and technology have made essential contributions to the advancement of contemporary democracies. Yet, putting scientific and technological rationality at the core of governance has not necessarily led to creating more equality, both with nation states as well as between regions of the world. Even though it has in some areas even rendered societal inclusion more challenging than ever before. This means that we need to recognize that fostering science and technology alone will not suffice to create the desired outcome, but that new models assuring access to the benefits of technoscientific advances for a broader constituencies of societies and meaningful models of participation need to be developed. The challenge will thus remain, to achieve both building our democracies along technoscientific rationalities while acknowledging that this is necessarily always also linked to ethical choices for which we need to take responsibility. Embracing science and technology can thus not be conceptualised as a moment of depoliticising choices concerning the directions in which our societies develop, but much rather of acknowledging that this is politics by other means.</span></p></div><div class="bout" data-dcnode-id="1914"><span class="count jquery-once-1-processed" data-dcnode-id="1918" id="248"><span data-dcnode-id="1919" instrument_node="">248</span></span><h2 data-dcnode-id="1916" data-magellan-destination="3-responses"><span data-dcnode-id="1917" instrument_node="">3. Responses</span></h2><a data-dcnode-id="1915" name="3-responses"></a></div><div class="bout" data-dcnode-id="1909"><span class="count jquery-once-1-processed" data-dcnode-id="1912" id="249"><span data-dcnode-id="1913" instrument_node="">249</span></span><h3 data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">3.1 Learning from democratic innovations</span></h3></div><div class="bout" data-dcnode-id="1904"><span class="count jquery-once-1-processed" data-dcnode-id="1907" id="250"><span data-dcnode-id="1908" instrument_node="">250</span></span><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">A consistent challenge that has emerged throughout this chapter is the manner in which contemporary democratic systems generate significant political exclusions. This section analyzes a set of responses to this condition: democratic innovations that are explicitly designed to increase and deepen citizen participation in the political decision making process. By expanding citizen participation, these new institutions seek to strengthen democratic systems by enhancing political and/or social equality.</span></p></div><div class="bout" data-dcnode-id="1899"><span class="count jquery-once-1-processed" data-dcnode-id="1902" id="251"><span data-dcnode-id="1903" instrument_node="">251</span></span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">New forms of participatory governance are increasingly enacted across the world, and such processes are the subject of an emerging and vibrant field of study. Experiments with participatory governance are largely sponsored and organized by public authorities, although there are a number of examples of civil society organizations that establish democratic innovations independently or in collaboration with state actors. In some countries such as the US, there is a growing ‘industry’ of professional participation practitioners from both private and nonprofit sectors. In many countries of Africa, Latin America and South Asia, international development organizations have played an important role in the development and implementation of democratic innovations.</span></p></div><div class="bout" data-dcnode-id="1894"><span class="count jquery-once-1-processed" data-dcnode-id="1897" id="252"><span data-dcnode-id="1898" instrument_node="">252</span></span><p data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Experimentation with democratic innovations is manifold. New institutional designs have been engaging citizens in constitutional change, political reforms, formulation of public budgets, the implementation of social policies, and the monitoring of public services delivery – just to mention some examples. However, it is problematic to generalize about their impact, as variations in design and implementation across the world mean that these institutions realize democratic goods in very different ways (Fung 2003; Smith 2009).</span></p></div><div class="bout" data-dcnode-id="1889"><span class="count jquery-once-1-processed" data-dcnode-id="1892" id="253"><span data-dcnode-id="1893" instrument_node="">253</span></span><p data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">The spread of participatory practice does not entail however that all democratic innovations respond effectively to inequalities and exclusions and have meaningful impact. Many processes are badly organized and can have detrimental effects – for example, reinforcing inequalities and mistrust in public authorities and the democratic process. Skeptics are justified in claiming that many examples of participatory engagement are little more than forms of cooption (Cooke and Kothari 2001).</span></p></div><div class="bout" data-dcnode-id="1884"><span class="count jquery-once-1-processed" data-dcnode-id="1887" id="254"><span data-dcnode-id="1888" instrument_node="">254</span></span><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">But there is enough evidence that democratic innovations can be designed effectively to overcome aspects of political and social exclusion, for example giving voice to and increasing the wellbeing of politically marginalized and disadvantaged social groups. Citizens can exert meaningful influence, and in some cases control, over the decisions that affect their lives.</span></p></div><div class="bout" data-dcnode-id="1879"><span class="count jquery-once-1-processed" data-dcnode-id="1882" id="255"><span data-dcnode-id="1883" instrument_node="">255</span></span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Given the complexity of practice, our approach in this section is necessarily selective and illustrative. We discuss the practice of four democratic designs. Participatory budgeting (PB), policy councils and national public policy conferences (NPPCs) originate from Latin America. This region has experienced an explosion of participatory governance following the period of re-democratization. A particularly critical condition for experimentation and institutionalization of democratic innovations has been the far-reaching decentralization that has led to high levels of administrative, legal and financial autonomy. The fourth innovation – randomly-selected mini-publics – emerged in Europe and North America. Both PB and mini-publics have experienced significant policy transfer. The diversity of approaches that these forms of participatory governance represent provides a sense of the different democratic effects they can enable.</span></p></div><div class="bout" data-dcnode-id="1874"><span class="count jquery-once-1-processed" data-dcnode-id="1877" id="256"><span data-dcnode-id="1878" instrument_node="">256</span></span><p data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">We show how democratic innovations can be designed to enhance political equality, by giving voice to marginalized groups and increasing citizens’ competence and political skills. We also show how participatory governance can respond to problems of social exclusion through the engagement of citizens in the process of formulating and implementing social policies, in some cases achieving redistributive results. We end the chapter with reflections on the challenge of institutionalizing democratic innovations so that they become part of the institutional architecture of contemporary democratic systems.</span></p></div><div class="bout" data-dcnode-id="1868"><span class="count jquery-once-1-processed" data-dcnode-id="1872" id="257"><span data-dcnode-id="1873" instrument_node="">257</span></span><p data-dcnode-id="1869"><strong data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">3.1.1 Participatory budgeting</span></strong></p></div><div class="bout" data-dcnode-id="1863"><span class="count jquery-once-1-processed" data-dcnode-id="1866" id="258"><span data-dcnode-id="1867" instrument_node="">258</span></span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Participatory budgeting (PB) is arguably the most well-known of democratic innovations. Typically operating at the municipal level, citizens participate in the definition, formulation, decision, and control over significant proportions of the municipal budget. PB was first established in Porto Alegre in 1989 as an explicit challenge to endemic clientelism and as a way of implementing redistributive policies. It was designed to motivate high levels of participation amongst poorer neighborhoods, reversing traditional patterns of influence on budget decision-making (Abers 1998: 54). By the turn of the 21st century, around 16,600 citizens were participating in Porto Alegre’s popular assemblies (Harvard University Center for Urban Development Studies 2003: 40) that effected the distribution of around $160 million in investments (Baiocchi 2005: 14).</span></p></div><div class="bout" data-dcnode-id="1858"><span class="count jquery-once-1-processed" data-dcnode-id="1861" id="259"><span data-dcnode-id="1862" instrument_node="">259</span></span><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">In its original form, PB’s sophisticated design cleverly separates demand making and rule making. Across the city a series of neighborhood assemblies attract a significant number of participants who hold the administration accountable, and deliberate on and vote for priorities for infrastructure and service investment. Those neighborhood assemblies also elect delegates, who will later meet in smaller area-based forums charged with final decision making on which projects to put forward, and oversight of the actions of the administration in delivering projects. There is a strong incentive to mobilize participation in the assemblies: the more participants, the more delegates – and hence the more likely that a local project will be prioritized.</span></p></div><div class="bout" data-dcnode-id="1853"><span class="count jquery-once-1-processed" data-dcnode-id="1856" id="260"><span data-dcnode-id="1857" instrument_node="">260</span></span><p data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">This demand making process is complemented with a separate body that applies a set of rules to distribute the budget – after all, there will always be too many demands to fund. The rule making body is constituted by two representatives elected from each of the areas of the city. As such, no area or partisan interest is able to dominate. The rules that guide the distribution of resources thus tend to reflect considerations of social justice. In the initial Porto Alegre model, the rules have always included at least one criterion related to relative poverty and infrastructure and services deficiencies, thus generating a distributional bias that favors the poor. The popular support for the budget generated through the PB process ensured that it was accepted and implemented by the mayor and city council.</span></p></div><div class="bout" data-dcnode-id="1845"><span class="count jquery-once-1-processed" data-dcnode-id="1851" id="261"><span data-dcnode-id="1852" instrument_node="">261</span></span><p data-dcnode-id="1846"><span data-dcnode-id="1850" instrument_node="">PB processes continue to innovate, developing digital and multi-channel forms that broaden participation: La Plata in Argentina combines offline, online and remote (SMS) voting, which in its 2010 cycle directly engaged 10 percent of the local eligible population (49,457 citizens), many resident in remote and marginalized areas of the city. There is evidence that this resulted in improvement of local health-care services (Peruzzotti, Magnelli and Peixoto 2011). Other developments include experimentation with specific policy areas, committees and procedures (including quotas) dedicated to promoting the interests of women, young people, indigenous people and other politically excluded groups (Cabannes 2004). The 25-year experiment with PB in Montevideo, Uruguay, is an example of how the process can be integrated with existing participatory practices, including neighborhoods councils (</span><em data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">consejos vecinales</span></em><span data-dcnode-id="1847" instrument_node="">), to increase participation rates, the amount of budget allocated, and social outcomes that privilege poorer neighborhoods (Veneziano 2014).</span></p></div><div class="bout" data-dcnode-id="1840"><span class="count jquery-once-1-processed" data-dcnode-id="1843" id="262"><span data-dcnode-id="1844" instrument_node="">262</span></span><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">In cities where PB has been successful, the administration has played an active role in promoting the process, employing community organizers to develop civic infrastructure in poorer neighborhoods and restructuring bureaucratic processes to ensure delivery of infrastructure decisions. It is argued that this ‘demonstration effect’ (Abers 1998: 138) has been critical in motivating participation as neighborhoods witness the impact of investment in infrastructure and services in neighboring communities that have been active in the process.</span></p></div><div class="bout" data-dcnode-id="1835"><span class="count jquery-once-1-processed" data-dcnode-id="1838" id="263"><span data-dcnode-id="1839" instrument_node="">263</span></span><p data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">The attractiveness of PB, particularly in Latin America, is tied particularly to its capacity to generate a more equitable redistribution of public goods and to increase the levels of participation among disadvantaged groups, the less educated and lower-income citizens (Avritzer 2009; Baiocchi 2003; Sousa Santos 2005; Wampler 2007). There is evidence that PB improves social wellbeing, with increased spending in health care and decreases in infant mortality rates across Brazil’s 253 largest cities (Touchton and Wampler 2014). The transparency of the PB process and its capacity to ameliorate the impact of clientelism and corruption are cited as generating higher levels of systems trust, even amongst the middle class that tends not to enjoy direct investment from the process (Abers 2003; 202-3; Gret and Sintomer 2005: 91-2; Schneider and Goldfrank 2000: 15; Cabannes 2004).</span></p></div><div class="bout" data-dcnode-id="1830"><span class="count jquery-once-1-processed" data-dcnode-id="1833" id="264"><span data-dcnode-id="1834" instrument_node="">264</span></span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">PB has spread well beyond Latin America to over 1,000 cities across Africa, Asia, Europe, North America and Oceania. In Europe, for example, by 2009, over two hundred European cities had implemented a variation of PB, involving around eight million citizens (Sintomer et al 2010). International agencies, particularly the World Bank, have been active in promoting PB as part of development strategies aimed at ameliorating corruption and increasing civic participation. Too often, however, in its adaptation to new conditions, what has been implemented under the name of PB has not reflected earlier Latin American experience (Sintomer et al 2009). There is enough evidence that PB can be transferred effectively, but also that the willingness of political authorities and pressure from civil society to embed more participatory and redistributive practices varies considerably.</span></p></div><div class="bout" data-dcnode-id="1824"><span class="count jquery-once-1-processed" data-dcnode-id="1828" id="265"><span data-dcnode-id="1829" instrument_node="">265</span></span><p data-dcnode-id="1825"><strong data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">3.1.2 Policy councils</span></strong></p></div><div class="bout" data-dcnode-id="1819"><span class="count jquery-once-1-processed" data-dcnode-id="1822" id="266"><span data-dcnode-id="1823" instrument_node="">266</span></span><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Policy councils are a form of co-governance bringing together public officials, civil society organizations, ordinary citizens, private stakeholders, and service providers and users in areas such as development, infrastructure and social policies. In some countries, such as Brazil and Paraguay, virtually all cities have a form of policy council and there are examples of national level councils in several countries.</span></p></div><div class="bout" data-dcnode-id="1814"><span class="count jquery-once-1-processed" data-dcnode-id="1817" id="267"><span data-dcnode-id="1818" instrument_node="">267</span></span><p data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">Like PB, policy councils have varied in design as their practice spread. Three broad categories of policy councils can be identified: deliberative, representative and management councils.</span></p></div><div class="bout" data-dcnode-id="1804"><span class="count jquery-once-1-processed" data-dcnode-id="1812" id="268"><span data-dcnode-id="1813" instrument_node="">268</span></span><p data-dcnode-id="1805"><em data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Deliberative councils</span></em><span data-dcnode-id="1809" instrument_node=""> are in many ways the ‘standard model’ – an ‘invited space’ (Cornwall 2004) typically restricting participation to state, civil society and private sector leaders, although often more open at the local level. At the national level, these bodies tend to have an agenda-setting and advisory function, seeking cooperation and coordination across diverse and sometimes conflicting interests. At the local level, there are examples of councils with more decision-making competences, playing a larger role in the local administration. Deliberative councils will sometimes also assume a role in the evaluation of public policies. In Mexico, there are at least 163 deliberative councils at the federal level with advisory role on various fields of public policy, including environment, rural and economic development, culture, education, health, and security (Hevia </span><em data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">et al.</span></em><span data-dcnode-id="1806" instrument_node=""> 2011). There is evidence that national councils on environment and agriculture policy have improved inclusion, collaboration, transparency, and accountability (Gómez et al 2012: 135-163). At the local level, advisory councils have been evaluated positively for increasing women’s participation and power-sharing with the government (Fox 2005: 229-230).</span></p></div><div class="bout" data-dcnode-id="1797"><span class="count jquery-once-1-processed" data-dcnode-id="1802" id="269"><span data-dcnode-id="1803" instrument_node="">269</span></span><p data-dcnode-id="1798"><em data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Management councils</span></em><span data-dcnode-id="1799" instrument_node=""> have a more explicit decision-making function, empowering citizens and civil society leaders in the formulation and implementation of policies in areas such as health, education, and housing. Health councils exist at the local level in countries including Bolivia, Brazil, Chile, Paraguay, Peru and Mexico. In Brazil, all 5570 municipalities have a health council constituted by representatives of government institutions (25 percent), non-governmental organizations (25 percent), and citizens (50 percent), who meet at least once every month to formulate health policies and oversee their implementation. Explicit attention is given to participation of citizens from poorer and traditionally excluded social groups to improve the responsiveness of the national health system to their needs (Schattan 2007). In 2012, health councils were active in 216 out of the 243 of municipalities of Paraguay, charged with the formulation of the local health plan and budget, witnessing improvement in the quality of health services (Rojas 2000).</span></p></div><div class="bout" data-dcnode-id="1787"><span class="count jquery-once-1-processed" data-dcnode-id="1795" id="270"><span data-dcnode-id="1796" instrument_node="">270</span></span><p data-dcnode-id="1788"><em data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Representative councils</span></em><span data-dcnode-id="1792" instrument_node=""> are an explicit attempt to promote political equality and fight discrimination through the direct engagement of under-represented and minority groups in the policy process, particularly women, indigenous peoples, ethnic minorities, racial and religious groups – and more recently youth and the elderly. Where management councils are more concerned with redistributive policies and operate mostly at the local level, representative councils deal with recognition policies primarily at the national level. Representative councils tend to have an agenda-setting and monitoring role. Both Ecuador and Brazil have national policy councils for women, the elderly, people with disabilities and indigenous peoples. In Ecuador these and other councils were created in 2014 under the </span><em data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Law of the National Councils for Equality</span></em><span data-dcnode-id="1789" instrument_node=""> aimed at protecting minority rights. Seats in these Ecuadorian councils are shared among state and civil society actors, the latter including ordinary citizens. In Brazil, the national council for women’s policy has been responsible for the drafting and enforcement of the first national policy plans exclusively addressed to their needs, improving women’s representation and the realization of social rights (Pogrebinschi 2014).</span></p></div><div class="bout" data-dcnode-id="1781"><span class="count jquery-once-1-processed" data-dcnode-id="1785" id="271"><span data-dcnode-id="1786" instrument_node="">271</span></span><p data-dcnode-id="1782"><strong data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">3.1.3 National public policy conferences</span></strong></p></div><div class="bout" data-dcnode-id="1776"><span class="count jquery-once-1-processed" data-dcnode-id="1779" id="272"><span data-dcnode-id="1780" instrument_node="">272</span></span><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">The national public policy conferences (NPPCs) are a multilevel process of deliberation designed to enable citizens and civil society organizations to provide inputs to policymaking at the national level. Brazil has a long tradition of experimenting with NPPCs in over 50 policy areas including health, education, culture, cities and racial equality. Again this democratic innovation has spread to other countries of Latin America with some interesting variation in format and scope. Contributions to the formulation of policies at the national level are realized by linking the engagement of citizens at the local, regional and federal level through multiple and successive rounds of deliberation and representation (Pogrebinschi 2012).</span></p></div><div class="bout" data-dcnode-id="1771"><span class="count jquery-once-1-processed" data-dcnode-id="1774" id="273"><span data-dcnode-id="1775" instrument_node="">273</span></span><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">The Brazilian NPPCs are initiated by the federal government, although the process begins at the municipal level, when the first round of deliberations is entirely open to anyone to participate. Over a weekend, any citizen can join local public officials in discussions of proposals and the election of delegates who will represent the municipality in the state (regional) conference. In this intermediary stage participation is restricted to delegates from the municipal level and public officials from different branches of the government. They deliberate on the policy proposals originated from the local stage, and come up with a set of proposals and delegates to be sent to the final, national stage. At the national level, rounds of deliberation take place in smaller panels and forums over a three-day period, concluding with a long session of voting in the plenary. Although the outcome – a set of policy proposals – is not binding, evidence suggests that in Brazil the government has taken these inputs seriously in the formulation of federal policies and laws, including policy areas such as food security and nutrition (Pogrebinschi 2012, Pogrebinschi and Samuels 2014).</span></p></div><div class="bout" data-dcnode-id="1766"><span class="count jquery-once-1-processed" data-dcnode-id="1769" id="274"><span data-dcnode-id="1770" instrument_node="">274</span></span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">The NPPCs have been particularly important in achieving inclusion. Impressive numbers of citizens have taken part in conferences (7 million people are reported to have participated in 82 NPPCs that took place between 2003 and 2011), mobilizing thousands of cities (over 4,000 municipalities organized the local deliberations of the NPPC on Health in 2011). Important social outcomes have been achieved, with NPPC proposals leading to progressive policy change in areas of gender, race, ethnicity, disabilities and age. Many of these policies recognize new groups and enact rights – including constitutional rights – for groups previously excluded from the policy process (Pogrebinschi 2014).</span></p></div><div class="bout" data-dcnode-id="1761"><span class="count jquery-once-1-processed" data-dcnode-id="1764" id="275"><span data-dcnode-id="1765" instrument_node="">275</span></span><p data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">In general, the NPPCs affect mostly the agenda setting and formulation stages of the policy cycle. However, as the process has institutionalized in some policy areas and NPPCs were gathered for the second, third, or fourth time, they have started also to play an important role in policy evaluation and monitoring. For example, the third NPPC on Women’s Policy convened primarily to revise and monitor the implementation of the national plans for women’s policy that had been drafted following the first two conferences.</span></p></div><div class="bout" data-dcnode-id="1755"><span class="count jquery-once-1-processed" data-dcnode-id="1759" id="276"><span data-dcnode-id="1760" instrument_node="">276</span></span><p data-dcnode-id="1756"><strong data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">3.1.4 Mini-publics</span></strong></p></div><div class="bout" data-dcnode-id="1750"><span class="count jquery-once-1-processed" data-dcnode-id="1753" id="277"><span data-dcnode-id="1754" instrument_node="">277</span></span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Where the previous innovations have emerged from Latin America, mini-publics have been developed in North America and Europe, although their practice has spread to other continents. Mini-publics are defined by their use of random or stratified selection and facilitated deliberation amongst a diverse body of citizens who hear evidence from experts and witnesses aimed at generating a political recommendation. Examples include citizens’ juries, consensus conferences, deliberative polls and citizens’ assemblies (Smith 2009).</span></p></div><div class="bout" data-dcnode-id="1745"><span class="count jquery-once-1-processed" data-dcnode-id="1748" id="278"><span data-dcnode-id="1749" instrument_node="">278</span></span><p data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">In the 1970s, Ned Crosby in the US and Peter Dienel in Germany developed the citizens’ jury and planning cell respectively to provide recommendations on issues ranging from urban planning to aspects of social policy. While they share similar characteristics, engaging 12-25 citizens, planning cells are run in parallel thus including hundreds of citizens in the process. The consensus conference model was developed in Denmark, providing the government with recommendations on controversial scientific and technological policies. James Fishkin popularized the deliberative poll that typically engages 200 or more citizens – the difference with this design is that citizens answer a post-deliberation survey rather than develop collective recommendations. More recently the G1000 and Icelandic assemblies have brought citizens together on a larger scale, although for only one day. The Belgian Minister for Culture organizes a regular randomly selected citizens’ cabinet to review his priorities (Chwalisz 2015).</span></p></div><div class="bout" data-dcnode-id="1740"><span class="count jquery-once-1-processed" data-dcnode-id="1743" id="279"><span data-dcnode-id="1744" instrument_node="">279</span></span><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Arguably the most impressive experimentation with mini-publics over the last decade has been the citizens’ assemblies in Canada, the Netherlands and Ireland that have dealt with constitutional issues. Whereas other designs require citizens to participate for between 1 to 5 days, in Canada and the Netherlands, citizens met over a series of weekends for a number of months, learning, deliberating, consulting and deciding on a new electoral system. The assemblies in British Columbia and Ontario were particularly innovative as the provincial governments committed to put any recommendations to a province-wide referendum. The Irish Constitutional Convention took the unusual step of including one-third politicians as members alongside randomly selected citizens. There is evidence that its recommendations were critical in the recent legalization on same-sex marriage.</span></p></div><div class="bout" data-dcnode-id="1735"><span class="count jquery-once-1-processed" data-dcnode-id="1738" id="280"><span data-dcnode-id="1739" instrument_node="">280</span></span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Political inclusion is designed into the recruitment and structure of mini-publics. Forms of random or stratified selection recall the fundamental democratic procedure of ancient Athenian democracy: no social group is systematically excluded; all citizens are on an equal footing in relation to selection. Stratified selection has been used particularly by smaller mini-publics to ensure the presence of citizens from politically excluded social groups. Mini-publics thus generate a group of citizens that is close to sociologically representative of the broader population and is thus far more heterogeneous than legislatures and other political institutions. Inclusion in the deliberative process is promoted through active facilitation.</span></p></div><div class="bout" data-dcnode-id="1730"><span class="count jquery-once-1-processed" data-dcnode-id="1733" id="281"><span data-dcnode-id="1734" instrument_node="">281</span></span><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Mini-publics are one of the most researched democratic innovations and there is evidence that structured deliberation amongst such a socially diverse group of participants increases sensitivity to the perspectives and arguments of others (Anderson and Hansen 2003; 2007) and defends against group polarization that is common amongst more homogenous groups (Sunstein 2003). There is a growing evidence base that citizens are willing and able to come to sound judgments and recommendations on highly complex and technical issues, and that there are positive effects on participants’ knowledge, interpersonal trust and political efficacy (Grönlund et al 2010).&nbsp;</span></p></div><div class="bout" data-dcnode-id="1725"><span class="count jquery-once-1-processed" data-dcnode-id="1728" id="282"><span data-dcnode-id="1729" instrument_node="">282</span></span><p data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Mini-publics typically only have recommendatory force – they are used as consultative bodies by political decision-makers. An interesting development is the use of mini-publics to provide informed recommendations for binding referendums – for example, the Oregon Citizens Initiative Review (along with the Canadian citizens’ assemblies discussed above). Important evidence is emerging that the broader public views the judgments of mini-publics as credible and trustworthy (Warren and Gastil 2015).</span></p></div><div class="bout" data-dcnode-id="1719"><span class="count jquery-once-1-processed" data-dcnode-id="1723" id="283"><span data-dcnode-id="1724" instrument_node="">283</span></span><p data-dcnode-id="1720"><strong data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">3.1.5 Institutionalizing democratic innovations</span></strong></p></div><div class="bout" data-dcnode-id="1714"><span class="count jquery-once-1-processed" data-dcnode-id="1717" id="284"><span data-dcnode-id="1718" instrument_node="">284</span></span><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Democratic innovations can be designed to realize political equality in very different ways – for example, through random selection and facilitation, group representation or rules that prioritize the interests of the politically marginalized. The same is true for social equality, as new institutional designs can empower minority groups, enforce constitutional rights, recognize new social and cultural identities, as well as incorporate historically marginalized groups in the public sphere. The practice of well-organized and politically salient innovations provides evidence that citizen participation can lead to decisions that redistribute state resources, refocus the delivery of public goods to those most in need and provide access to public services for the poor.</span></p></div><div class="bout" data-dcnode-id="1709"><span class="count jquery-once-1-processed" data-dcnode-id="1712" id="285"><span data-dcnode-id="1713" instrument_node="">285</span></span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">One of the lessons that can be drawn especially from the Latin American examples is the importance of political, administrative and fiscal autonomy for different levels of authority within a polity. This provides both space for experimentation and an opportunity to have a meaningful impact.</span></p></div><div class="bout" data-dcnode-id="1704"><span class="count jquery-once-1-processed" data-dcnode-id="1707" id="286"><span data-dcnode-id="1708" instrument_node="">286</span></span><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">There are at least two significant and related challenges facing participatory governance. The first is the extent to which they are embedded effectively within democratic systems. There is plentiful evidence that citizens are willing and able to participate in meaningful participatory processes. But too often, democratic innovations are either not given decision making power or are poorly coupled or integrated with existing decision-making processes. The decision to sponsor, organize and respond to democratic innovations is often at the discretion of elected or appointed public officials. When innovations are not institutionalized through norms or law, they lose their force and citizen efficacy is undermined. The internationally renowned PB in Porto Alegre exemplifies this challenge: its design was not codified and was weakened by the incoming mayor as soon as the Workers Party lost control of the city. In other parts of Latin America, such as Peru and the Dominican Republic, PB is mandatory under national law. However, if participatory governance achieves a legal or constitutional status, there is always the risk that codification can be a break on creativity and further innovation.</span></p></div><div class="bout" data-dcnode-id="1699"><span class="count jquery-once-1-processed" data-dcnode-id="1702" id="287"><span data-dcnode-id="1703" instrument_node="">287</span></span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">The second, related challenge is that the radical impulse of the original designs is often watered down as practice has spread. Again, PB is a good example. Many of the PBs across Latin America bear a strong family resemblance to early Brazilian practice. However, as it travelled to Europe and North America, many of the newer PBs were relatively poor imitations.</span></p></div><div class="bout" data-dcnode-id="1694"><span class="count jquery-once-1-processed" data-dcnode-id="1697" id="288"><span data-dcnode-id="1698" instrument_node="">288</span></span><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">An emerging institutional development may offer one strategy for ensuring higher quality forms of participatory governance: autonomous public organizations dedicated to public participation (APOPPs) (Bherer et al 2014). APOPPs are created by governments with the mandate to organize or oversee democratic innovations in legally specified areas of policy. Examples include the Danish Board of Technology (DBT) (Teknologiraadet), French National Commission on Public Debate (Commission nationale du débat public) (CNDP), Montreal Board of Public Consultation (Office de consultation publique de Montréal) (OCPM) and Tuscany Participatory Authority (TPA) (Autorità regionale per la garanzia e la promozione della partecipazione). While APOPPs remain relatively rare, their institutionalization has proved important in establishing independent and recurrent practices of participatory governance. The degree of autonomy and visibility enjoyed by APOPPs protects them to some extent from day-to-day political pressures, ensuring a degree of quality and oversight of participatory arrangements and a competent authority to promote the outcomes of democratic innovations within decision-making processes.</span></p></div><div class="bout" data-dcnode-id="1689"><span class="count jquery-once-1-processed" data-dcnode-id="1692" id="289"><span data-dcnode-id="1693" instrument_node="">289</span></span><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">It should be no surprise that vested political and economic interests are suspicious of democratic innovations: when well designed they open up the political process. Empowered citizens are less subject to existing inequalities and exclusions. The remaining challenge is to embed meaningful modes of participatory governance rather than sham practices of public engagement that pay only lip service to democratic empowerment. Designing new and creative ways of inclusive engagement is not enough; it is crucial also to embed these practices within, alongside or, more radically, replacing representative institutions if democratic innovations are to contribute to overcoming political and social inequalities in contemporary democracies.</span></p></div><div class="bout" data-dcnode-id="1684"><span class="count jquery-once-1-processed" data-dcnode-id="1687" id="290"><span data-dcnode-id="1688" instrument_node="">290</span></span><h3 data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">3.2 Democracy below, beyond and across the state? Equality between citizens or states?</span></h3></div><div class="bout" data-dcnode-id="1679"><span class="count jquery-once-1-processed" data-dcnode-id="1682" id="291"><span data-dcnode-id="1683" instrument_node="">291</span></span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">In this paper I propose to give a unified account of the ideal of equality of voice across the domains of the domestic state and the international community.&nbsp; Some have thought that some variant of a democratic world state is the natural application of this idea.&nbsp; I argue that the ideal of political equality in the modern democratic state is a special case of a more general principle, which covers equality in collective decision making traditionally conceived and a kind of equality in the conditions under which voluntary agreements are made among separate parties.&nbsp; I argue for a principle of proportionality, which asserts that persons ought to have a say in some issue area that is proportional to the stake they have in that area. Proportionality is particularly useful in the context of international decision making where societies have very different stakes in the agreements they make. I then define an ideal of fair negotiation among states that conforms to the broader ideal of equality.&nbsp; This is an individualistic ideal in the sense that the ultimate entity that is to have a say is the individual.&nbsp; States act as representatives of individuals in the process of making voluntary agreements.</span></p></div><div class="bout" data-dcnode-id="1673"><span class="count jquery-once-1-processed" data-dcnode-id="1677" id="292"><span data-dcnode-id="1678" instrument_node="">292</span></span><p data-dcnode-id="1674"><strong data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">3.2.1 Globalization</span></strong></p></div><div class="bout" data-dcnode-id="1659"><span class="count jquery-once-1-processed" data-dcnode-id="1671" id="293"><span data-dcnode-id="1672" instrument_node="">293</span></span><p data-dcnode-id="1660"><span data-dcnode-id="1670" instrument_node="">The basic challenge of globalization to democracy is that the citizens of a democratic state are deeply affected by the policies and actions, or the lack thereof, of citizens in other states.&nbsp; Partly this is the consequence of the fact that certain goods, or bads such as pollution or the spread of disease, cannot be contained within the borders of states.&nbsp; Partly it is a consequence of decisions that states have made to increase openness to international trade and the movements of persons and capital.&nbsp; Both of these activities increase the levels of mutual affectedness of persons around the globe.&nbsp; And to the extent that the democratic principle implies that persons should have a voice in the basic conditions that affect their lives, there is a strong impulse to give citizenship a wider scope than it has had till now.&nbsp; Relatedly, the global community is currently facing some fundamental moral challenges, which can be recognized as such on virtually any scheme of morality.&nbsp; The aims of the preservation of international security and the protection of persons against serious and widespread violations of human rights are already recognized in Article One of the</span><em data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node=""> Charter of the</span></em><span data-dcnode-id="1667" instrument_node=""> </span><em data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">United Nations</span></em><span data-dcnode-id="1664" instrument_node="">, which lays out the purposes of the United Nations.</span><a data-dcnode-id="1662" href="#_ftn7" name="_ftnref7" title=""><span data-dcnode-id="1663" instrument_node="">[7]</span></a><span data-dcnode-id="1661" instrument_node="">&nbsp; In addition, it must pursue the avoidance of global environmental catastrophe; it must pursue the alleviation of severe global poverty; and it must establish a decent system regulating international trade and the movements of people and capital.&nbsp; Meeting these challenges will require significant cooperation from many of the world’s states at least.&nbsp; As a consequence there are moral duties on the part of the people who are members of different states, to attempt to achieve effective cooperation with other people in pursuing these mandatory aims.</span></p></div><div class="bout" data-dcnode-id="1651"><span class="count jquery-once-1-processed" data-dcnode-id="1657" id="294"><span data-dcnode-id="1658" instrument_node="">294</span></span><p data-dcnode-id="1652"><span data-dcnode-id="1656" instrument_node="">&nbsp; We do know that all states have signed on to these aims.</span><a data-dcnode-id="1654" href="#_ftn8" name="_ftnref8" title=""><span data-dcnode-id="1655" instrument_node="">[8]</span></a><span data-dcnode-id="1653" instrument_node="">&nbsp; Moreover these aims make sense from the standpoint of any moral theory that takes the promotion, protection and respect for the fundamental interests of persons to be essential to a well ordered political system.&nbsp; The morally mandatory aims I described do not exhaust the moral requirements on people in the world.&nbsp; They specify certain very weighty aims that it makes sense to require the international community to pursue, given its current capacities and challenges.&nbsp; For a cosmopolitan theory, these aims must be regarded as provisional in the light of the limited capacities of the international system.&nbsp; The long run aims must involve the universal realization of distributive justice and basic freedoms.&nbsp; But these are far beyond anything the system is capable of pursuing at the moment.&nbsp; Hence the political view that I am describing might be called a progressive cosmopolitanism.</span></p></div><div class="bout" data-dcnode-id="1645"><span class="count jquery-once-1-processed" data-dcnode-id="1649" id="295"><span data-dcnode-id="1650" instrument_node="">295</span></span><p data-dcnode-id="1646"><strong data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">3.2.2 Fairness</span></strong></p></div><div class="bout" data-dcnode-id="1640"><span class="count jquery-once-1-processed" data-dcnode-id="1643" id="296"><span data-dcnode-id="1644" instrument_node="">296</span></span><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">The question is, from the standpoint of democratic ideals, how are to make decisions regarding how to pursue these aims?&nbsp; A natural thought here is that a fair process of decision making among states would be a majoritarian one.&nbsp; But this majoritarian idea can take different forms.&nbsp; One can imagine a majoritarianism of states such as one state, one vote.&nbsp; There are two problems with this approach that I think attend many of the majoritarian approaches to international rule making.&nbsp; The first problem is that states are of very different size and so a majoritarian rule would not conform to the more fundamental principle that we want power apportioned to individuals in a way that treats individuals as equals.&nbsp;</span></p></div><div class="bout" data-dcnode-id="1632"><span class="count jquery-once-1-processed" data-dcnode-id="1638" id="297"><span data-dcnode-id="1639" instrument_node="">297</span></span><p data-dcnode-id="1633"><span data-dcnode-id="1637" instrument_node="">The second problem is that a majoritarian rule of this sort violates in some way the political and legal integrity of political societies.&nbsp; Despite the arbitrariness of the origins and boundaries of these societies, many of the political societies within these initially arbitrary borders have developed highly integrated legal systems with integrated economic and social arrangements, as well as systems of accountability for transforming and adjusting these arrangements.&nbsp; States have arisen to establish justice and protect the basic needs of persons within limited areas.&nbsp; These institutions have developed over a number of centuries and have been moderately successful in establishing justice and prosperity for large numbers of people.&nbsp; States have some interest in protecting the borders and the integrity of the systems operating within those borders to the extent that such protection is necessary for them to carry out their core responsibilities.</span><a data-dcnode-id="1635" href="#_ftn9" name="_ftnref9" title=""><span data-dcnode-id="1636" instrument_node="">[9]</span></a><span data-dcnode-id="1634" instrument_node="">&nbsp;</span></p></div><div class="bout" data-dcnode-id="1627"><span class="count jquery-once-1-processed" data-dcnode-id="1630" id="298"><span data-dcnode-id="1631" instrument_node="">298</span></span><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">From an international perspective, the way to think about this situation is that it is a kind of division of labor in which the world is divided into units that are capable of establishing justice in each unit (Goodin 1988). What this means is that aside from the states that pursue justice and the common good for their societies, there is no other entity that is presently, and for the medium term future, capable of carrying out the tasks states carry out. On a cosmopolitan view, justice ultimately must relate all persons in a single framework, but it would be extraordinarily premature to suggest that we should wish away the state as it is currently constituted in order to achieve cosmopolitan justice.</span></p></div><div class="bout" data-dcnode-id="1622"><span class="count jquery-once-1-processed" data-dcnode-id="1625" id="299"><span data-dcnode-id="1626" instrument_node="">299</span></span><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Hence, it is through state consent that democratic ideals be realized.&nbsp; But the requirement of consent must be modified in three ways: first, unreasonable refusal of consent must be excluded; second, consent must be given under fair conditions; third, state consent must be broadly representative of the people of the state.&nbsp;</span></p></div><div class="bout" data-dcnode-id="1615"><span class="count jquery-once-1-processed" data-dcnode-id="1620" id="300"><span data-dcnode-id="1621" instrument_node="">300</span></span><p data-dcnode-id="1616"><span data-dcnode-id="1619" instrument_node="">The justification for the state consent requirement, and thus some moral liberty to say no, is grounded in the fact that there is a great deal of uncertainty as to how to pursue the morally mandatory aims.&nbsp; Though there is general agreement among scientists that the earth is warming up due to human activity, there is disagreement as to how much this is happening and how quickly or what a fair and efficient distribution of costs might be.&nbsp; The same uncertainties attend thinking about how to alleviate global poverty and how to protect persons from widespread human rights abuses.&nbsp; And there is significant disagreement about the limits of free trade and the methods for opening up trade as well as how to deal with the relationship between uneven development and trade.&nbsp; This kind of uncertainty, together with the centrality of states in making power accountable to persons, provides a reason for supporting a system of state consent with freedom to enter and exit arrangements because it supports a system which allows for a significant amount of experimentation in how to solve the problems.</span><a data-dcnode-id="1617" href="#_ftn10" name="_ftnref10" title=""><span data-dcnode-id="1618" instrument_node="">[10]</span></a></p></div><div class="bout" data-dcnode-id="1610"><span class="count jquery-once-1-processed" data-dcnode-id="1613" id="301"><span data-dcnode-id="1614" instrument_node="">301</span></span><p data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">But the system of state consent must be heavily bounded given the morally mandatory need for cooperation.&nbsp; In the usual case of treaties, refusal of entry and exit are permissible and require no explanation (Helfer 2005). But in the case of treaties that attempt to realize a system of cooperation that is necessary to the pursuit of morally mandatory aims, exit or the refusal to enter it must be accompanied by an acceptable explanation.&nbsp; States must lay out the reasons for thinking that the treaty would not contribute to solving the problem and that some alternative might be superior.&nbsp; Such an explanation must not be irrational, unscrupulous or morally self-defeating and must display a good faith effort to solve the problem at hand. The explanation must be in terms of the morally mandatory aims or in terms of a crushing or severely unfair cost of cooperation.&nbsp; The reasons given do not need to be the right reasons, but they must fall within the scope of what reasonable people can disagree on. An irrational explanation goes against the vast majority of scientific opinion.&nbsp; An unscrupulous explanation free rides on others’ contributions to morally mandatory aims or it refuses to shoulder any share in a morally mandatory pursuit.&nbsp; A morally self-defeating explanation is one that insists on a different coordination solution, defeating a coordination solution that in the circumstance advances everyone’s aims.&nbsp; The international community is permitted to pressure or coerce states that fail to provide adequate explanations for refusal to participate in cooperation for mandatory aims (Christiano 2012).</span></p></div><div class="bout" data-dcnode-id="1605"><span class="count jquery-once-1-processed" data-dcnode-id="1608" id="302"><span data-dcnode-id="1609" instrument_node="">302</span></span><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">It seems to me that it is in this context that we have to think about one of the major effects of globalization, which is the increase in the relative bargaining power of capital over labor as a consequence of the increasing mobility of capital.&nbsp; Democratic societies have had increasing difficulty imposing constraints on capital because of the threat of flight.&nbsp; This imbalance can only be rectified by states cooperating in producing an international regime of taxation and regulation of capital.&nbsp;</span></p></div><div class="bout" data-dcnode-id="1594"><span class="count jquery-once-1-processed" data-dcnode-id="1603" id="303"><span data-dcnode-id="1604" instrument_node="">303</span></span><p data-dcnode-id="1595"><span data-dcnode-id="1602" instrument_node="">How do we assess the fairness of state consent and the negotiations that lead up to this?&nbsp; A state’s consent to a treaty must not be coerced by the other party and must not be the consequence of fraud by the other party.&nbsp; And states cannot validly create obligations that violate the </span><em data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">jus cogens</span></em><span data-dcnode-id="1599" instrument_node=""> norms.</span><a data-dcnode-id="1597" href="#_ftn11" name="_ftnref11" title=""><span data-dcnode-id="1598" instrument_node="">[11]</span></a><span data-dcnode-id="1596" instrument_node="">&nbsp; But the avoidance of force and fraud are compatible with the most appalling unfair advantage taking.&nbsp; The general idea that stronger background conditions are required is recognized quite generally in the legal systems of the West.</span></p></div><div class="bout" data-dcnode-id="1589"><span class="count jquery-once-1-processed" data-dcnode-id="1592" id="304"><span data-dcnode-
