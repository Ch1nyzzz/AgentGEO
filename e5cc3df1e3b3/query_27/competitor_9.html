es in basic rights are meant to capture unequal levels of competence, abilities and sense of responsibility. But they are not unproblematic. For a start, the young have a higher stake in the long-term consequences of decisions made today. There are very good reasons to keep children out of politics (that have to do with their autonomy and the fact that they could end up manipulated, for instance) but it is not clear that there are such reasons for older teenagers and young adults. Older teenagers are allowed to join the labour force, they can be imprisoned, and they can join the army in many countries. Even if we decide that the costs of letting older teenagers participate is too high, there may be other ways to integrate their interests in democratic institutions. If all members of a democratic community cannot get an equal say, then perhaps their votes ought to be given to those most well placed to represent their interests; hence the political proposal of proxy votes for parents, for instance.</span></p></div><div class="bout" data-dcnode-id="2485"><span class="count jquery-once-1-processed" data-dcnode-id="2488" id="160"><span data-dcnode-id="2489" instrument_node="">160</span></span><p data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">A second example is the unequal representation of different age groups in parliaments. Young people between the age of 18 and 35 years old are quantitatively underrepresented in parliaments throughout the world. The global average age of a parliamentarian is 53 years old when the median age of the global population is about 26 years old (Inter-Parliamentary Union 2012). In fact, at the international level, fewer than 2% of representatives are younger than 30 years old in two thirds of single and lower houses (Inter-Parliamentary Union 2014). Three quarters of upper houses do not elect young parliamentarians at all (Inter-Parliamentary Union 2014). Even in countries that do not have large ageing electorates, as it is often the case in the developing world where the national average age is much lower than in developed countries, representative bodies and politicians are much older.</span></p></div><div class="bout" data-dcnode-id="2480"><span class="count jquery-once-1-processed" data-dcnode-id="2483" id="161"><span data-dcnode-id="2484" instrument_node="">161</span></span><p data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Politics is essentially seen as the task of wise elders. And, as many have pointed out, the underrepresentation of young adults in parliaments does not look as unfair as the exclusion of women or ethnic minority, since they are only unequally represented for a portion of their lives.&nbsp; Still, the underrepresentation of youth remains problematic for a number of reasons. First, it reinforces the self-image of youth as apolitical and may have a negative impact on participation rates (young people may be left feeling that politics is not for young people). Second, decision-makers may be lacking experiential knowledge because of the lack of young representatives. Norman Daniels (1988) argues that the right procedure to establish the requirements of age group justice is to ask age-blind planners how they would distribute their fair share X across their life course.&nbsp; In real life, we cannot blind parliamentarians to their age to ensure they give adequate weight to the interest of old and young. But the least we can do is ensure politics and decision-making is not made in exclusion of some age groups.</span></p></div><div class="bout" data-dcnode-id="2475"><span class="count jquery-once-1-processed" data-dcnode-id="2478" id="162"><span data-dcnode-id="2479" instrument_node="">162</span></span><p data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">One radical policy to correct the under-representation of young people in parliaments is the introduction of youth quotas in the legislatures (Bidadanure 2016). Drawing on existing examples of youth quotas in the form of reserved seats for young people in parliament in Uganda, Kenya and Morocco, the UNDP (2013) puts forward the introduction of youth quotas in electoral laws as a way to enhance youth representation and participation. The presence of young MPs can be expected to have at least two kinds of impacts on decision-making. The first is substantive. Regardless of their party membership, young MPs can be expected to contribute to expanding the available party policy packages through pushing for the better inclusion of youth concerns in political agendas. Bringing in more young persons in parliament will also increase the likeliness that misconceptions about young people will be challenged. As Furlong and Cartmel argue, “when issues emerge that have a core relevance for young people, they are often tackled from a paternalistic and condescending ‘we know what’s best for you’ perspective” (Furlong and Cartmel in Berry 2012: 16). Quotas can prevent the important risk that policies and debates become driven by disrespectful misrepresentations, if conducted solely within some age groups and in exclusion of others.</span></p></div><div class="bout" data-dcnode-id="2470"><span class="count jquery-once-1-processed" data-dcnode-id="2473" id="163"><span data-dcnode-id="2474" instrument_node="">163</span></span><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">The second potential impact of youth quotas relate to their symbolic role. If we consider that people’s self-image are partly tied to their political image, as Goodin (1977: 259) and many others have argued, then it seems that descriptive representation has meaning for whether given individuals are acknowledged as equals. Youth quotas would signal to society and young people that their contribution is valued and that they are considered with equal respect. Their status of equally respected citizens would be attested, recognized and emphasized. The absence or underrepresentation of young people in parliament, on the contrary, signals the opposite and may contribute to an apolitical self-image of young adults. If we care about the goal of democratic equality, then the existence of such social meaning of political inferiority must be undermined. Youth quotas may thus act as a strong symbolic gesture to reengage youth in politics, with a potential impact on their future participation.</span></p></div><div class="bout" data-dcnode-id="2464"><span class="count jquery-once-1-processed" data-dcnode-id="2468" id="164"><span data-dcnode-id="2469" instrument_node="">164</span></span><p data-dcnode-id="2465"><strong data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">2.4.4 Conclusions</span></strong></p></div><div class="bout" data-dcnode-id="2459"><span class="count jquery-once-1-processed" data-dcnode-id="2462" id="165"><span data-dcnode-id="2463" instrument_node="">165</span></span><p data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">In summary, this section has considered three inequalities between generations that pose a challenge to democracy, and yet are often overlooked. We must devote more time and resources to understanding how each of them threatens democratic equality and to identifying adequate policy responses. The first challenge derives from the political invisibility of future generations and the endemic short-termism that comes with it. Mechanisms to give voice to future generations today (like parliamentary commissions) to legally entrench long-termist goals and to monitor progress and draw-backs must be considered. The second challenge is that of an ‘intergenerational democratic deficit’ between co-existing generations: the risk is that small and/or disenfranchised generations may see their interests sidelined. Many worry that this is an important risk with current young cohorts in some rich countries. Solutions to re-enfranchise the young include simplifying registration and voting processes and investing in youth initiatives. The last challenge was identified as relating to age-group equality. Here we questioned the exclusion of some age groups (including children, teenagers and young adults) de jure or de facto from political institutions, including from electoral and parliamentary ones. We urged politicians to not take for granted those age-based differential treatments and to at least consider ways to make sure the interests of disenfranchised age groups are not sidelined. We also looked into the potential benefits of the descriptive representation of young adults in parliaments for democratic equality.</span></p></div><div class="bout" data-dcnode-id="2454"><span class="count jquery-once-1-processed" data-dcnode-id="2457" id="166"><span data-dcnode-id="2458" instrument_node="">166</span></span><h3 data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">2.5 The challenge of globalization</span></h3></div><div class="bout" data-dcnode-id="2448"><span class="count jquery-once-1-processed" data-dcnode-id="2452" id="167"><span data-dcnode-id="2453" instrument_node="">167</span></span><p data-dcnode-id="2449"><strong data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">2.5.1 Introduction</span></strong></p></div><div class="bout" data-dcnode-id="2443"><span class="count jquery-once-1-processed" data-dcnode-id="2446" id="168"><span data-dcnode-id="2447" instrument_node="">168</span></span><p data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Democracy has something of an ambivalent relationship to globalization.&nbsp; On the one hand, globalization is typically seen as a product of the highest stage of democratic development.&nbsp; Here globalization is depicted as a benign condition of healthy interdependence, interconnectedness and mutual exchange that is only made possible by the attainment of a prior condition of democracy amongst its beneficiaries.&nbsp; Globalization is, in effect, the product of a democratic peace.&nbsp; Yet, on the other hand, the more detailed analysis of the consequences of globalization typically depicts globalization as a complex agent of de-democratization – a condition whose attainment makes the practice of democracy (particularly at the national level) ever more difficult, invariably because it is associated with a series of non-negotiable imperatives trumping democratic choice or, indeed, the proliferation of problems for which there is no clear democratic solution.&nbsp; Globalization produces, in other words, a democratic deficit.</span></p></div><div class="bout" data-dcnode-id="2438"><span class="count jquery-once-1-processed" data-dcnode-id="2441" id="169"><span data-dcnode-id="2442" instrument_node="">169</span></span><p data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">The two perspectives are, of course, not strictly incompatible.&nbsp; It is perfectly possible to think of globalization as the product of a wider process of democratization but as a process that, at the same time, serves to usher in a new condition of interdependence between nations that is corrosive of democracy at the national level.&nbsp; But this kind of connection is rarely made, with the literature and wider public discourse of and about globalization typically resolving itself to a positive and benign view of globalization on the one hand starkly counterposed to a negative view of globalization’s corrosive effects on the other.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2433"><span class="count jquery-once-1-processed" data-dcnode-id="2436" id="170"><span data-dcnode-id="2437" instrument_node="">170</span></span><p data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">The aim of this short chapter is to bring these two opposed perspectives into greater dialogue, establishing in the process something of the contested nature of the ‘democracy-globalization’ balance sheet.&nbsp; The argument is presented two parts dealing, respectively, with the challenge posed by globalization and the responses to which it might give rise.&nbsp; It unfolds over three sections.&nbsp; In the first, the complex semantics of globalization are briefly discussed as a prelude, in the second, for a review of the various claims that economic globalization, in particular, is corrosive of democratic choice.&nbsp; The final section considers the extent to which democratic innovation, particularly at levels above the national, might rectify globalization’s democratic deficit, offering future generations the capacity to hold globalization itself to account democratically.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2427"><span class="count jquery-once-1-processed" data-dcnode-id="2431" id="171"><span data-dcnode-id="2432" instrument_node="">171</span></span><p data-dcnode-id="2428"><strong data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">2.5.2 The challenge of globalization</span></strong></p></div><div class="bout" data-dcnode-id="2421"><span class="count jquery-once-1-processed" data-dcnode-id="2425" id="172"><span data-dcnode-id="2426" instrument_node="">172</span></span><p data-dcnode-id="2422"><em data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Semantics</span></em></p></div><div class="bout" data-dcnode-id="2416"><span class="count jquery-once-1-processed" data-dcnode-id="2419" id="173"><span data-dcnode-id="2420" instrument_node="">173</span></span><p data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Given the seeming certainly with which so many commentators discern the consequences of globalization for democracy, once might expect a clearly expressed and highly conserved understanding of the term within the existing literature.&nbsp; Yet nothing could be further from the truth.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2402"><span class="count jquery-once-1-processed" data-dcnode-id="2414" id="174"><span data-dcnode-id="2415" instrument_node="">174</span></span><p data-dcnode-id="2403"><span data-dcnode-id="2413" instrument_node="">&nbsp; Globalization is in fact a generic term for a rather disparate array of things and, where it is defined at all, it is understood in a great variety of different ways.&nbsp; For the most part, however, these understandings can be arrayed along a continuum.&nbsp; This ranges from the geographically least precise and inexacting to the geographically most restrictive and demanding.&nbsp; At the definitionally inexacting end of the spectrum, to point to globalization means little more than to identify cross-border flows of goods and services, finance, migrants, pollutants, infectious agents and so forth.&nbsp; By contrast, at the definitionally demanding end of the spectrum, such flows need to be increasingly planetary in their scope to be regarded as evidence of globalization.&nbsp; Yet this is not the only definitional divide.&nbsp; It is important also to distinguish between contending understandings of globalization in terms of whether they see globalization as a condition or property of the world system (or of the units from which it is comprised) that has </span><em data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">already been achieved</span></em><span data-dcnode-id="2410" instrument_node=""> or as a </span><em data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">still ongoing</span></em><span data-dcnode-id="2407" instrument_node=""> process or tendency (which may be resisted) for the world system (or the units within it) to become more global or global</span><em data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">ized</span></em><span data-dcnode-id="2404" instrument_node=""> over time.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2388"><span class="count jquery-once-1-processed" data-dcnode-id="2400" id="175"><span data-dcnode-id="2401" instrument_node="">175</span></span><p data-dcnode-id="2389"><span data-dcnode-id="2399" instrument_node="">The crucial point is that such definitional choices have significant implications – both for whether we see evidence of globalization or not and, indeed, for the significance of any such observation for the viability of democratic systems of governance.&nbsp; Clearly, if to confirm the globalization thesis we need only show a proliferation of cross-border flows of goods, services and so forth, then evidence of globalization abounds.&nbsp; But, and this is perhaps the key point, understood in this way globalization may be rather less significant a factor than we tend to assume. &nbsp;Conversely, if to confirm the globalization thesis we need to establish that such flows are in fact both increasingly </span><em data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">extensive</span></em><span data-dcnode-id="2396" instrument_node=""> in their (planetary) scope and increasingly </span><em data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">intensive</span></em><span data-dcnode-id="2393" instrument_node=""> in their magnitude, then evidence of globalization is going to be rather more difficult to find – but all the more significant if, as and when we do find it (on extensity and intensity, see Held </span><em data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">et al.</span></em><span data-dcnode-id="2390" instrument_node=""> 1999).&nbsp;</span></p></div><div class="bout" data-dcnode-id="2380"><span class="count jquery-once-1-processed" data-dcnode-id="2386" id="176"><span data-dcnode-id="2387" instrument_node="">176</span></span><p data-dcnode-id="2381"><span data-dcnode-id="2385" instrument_node="">There is clearly plenty of room for conceptual confusion here.&nbsp; Authors who may well agree on the facts themselves may nonetheless disagree over the extent of globalization simply because they impose upon the term different definitional standards.&nbsp; Indeed, on closer inspection what may seem at first like a dispute over the evidence itself often boils down to little more than a semantic difference of opinion (compare, for instance, Hirst, Thompson and Bromley 2009 and Perraton </span><em data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">et al.</span></em><span data-dcnode-id="2382" instrument_node=""> 1997, with O’Rourke and Williamson 1999, 2002 and Frank and Gills 1993).&nbsp; This makes it all the more important that we are clear from the start about what we mean by globalization and fully aware of the implications of our choice for the significance of identifying evidence of globalization.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2375"><span class="count jquery-once-1-processed" data-dcnode-id="2378" id="177"><span data-dcnode-id="2379" instrument_node="">177</span></span><p data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">But it is at least equally important that we are consistent.&nbsp; And herein lies a second problem with much of the existing literature and, indeed, the public debate on globalization.&nbsp; As we shall see presently, when it comes to demonstrating that we live in a ‘globalized’ world, many commentators appeal explicitly or, far more likely, implicitly, to the most inexacting of definitional standards.&nbsp; In making the case for globalization, they show a proliferation of cross-border flows and little more.&nbsp; Yet, having ostensibly demonstrated ‘globalization’ in this way, they then invariably go on to infer from it a variety of highly significant effects.&nbsp; This they do typically by assuming the existence of a perfectly integrated world market, for which of course they have presented no evidence.&nbsp; In other words, they switch from the least to perhaps the most exacting of definitional standards at precisely the point at which they turn from evidential induction to logical deduction.&nbsp; The effect is to exaggerate the significance of ‘actually existing’ globalization, not least for its impact on democratic governance.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2370"><span class="count jquery-once-1-processed" data-dcnode-id="2373" id="178"><span data-dcnode-id="2374" instrument_node="">178</span></span><p data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">The full implications of this become clear when we start to look in more detail at those theories which suggest that globalization and the respect for democratic choice are likely to be in significant tension with one another.&nbsp; For, as we shall see, what many of these share is a common analytical structure in which the effects for democracy governance of globalization (typically, a series of imperatives) are derived logically from a stylized assumptions about both the behavior and motives of business and the degree of integration of world markets.&nbsp; It is to such theories directly that we now turn.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2364"><span class="count jquery-once-1-processed" data-dcnode-id="2368" id="179"><span data-dcnode-id="2369" instrument_node="">179</span></span><p data-dcnode-id="2365"><em data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">Globalization as a source of economic imperatives</span></em></p></div><div class="bout" data-dcnode-id="2356"><span class="count jquery-once-1-processed" data-dcnode-id="2362" id="180"><span data-dcnode-id="2363" instrument_node="">180</span></span><p data-dcnode-id="2357"><span data-dcnode-id="2361" instrument_node="">The idea that globalization is corrosive, if not of democracy itself, then of the effective space for democratic choice – since its effects serve to restrict the array of credible policy options – is not a new one.&nbsp; Indeed, it is perhaps nowhere better described than by Adam Smith in the </span><em data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Wealth of Nations</span></em><span data-dcnode-id="2358" instrument_node="">:</span></p></div><div class="bout" data-dcnode-id="2351"><span class="count jquery-once-1-processed" data-dcnode-id="2354" id="181"><span data-dcnode-id="2355" instrument_node="">181</span></span><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">“The ... proprietor of stock is properly a citizen of the world, and is not necessarily attached to any particular country.&nbsp; He would be apt to abandon the country in which he is exposed to a vexatious inquisition, in order to be assessed a burdensome tax, and would remove his stock to some country where he could either carry on his business or enjoy his fortune at his ease.&nbsp; A tax that tended to drive away stock from a particular country, would so far tend to dry up every source of revenue, both to the sovereign and to the society.&nbsp; Not only the profits of stock, but the rent of land and the wages of labour, would necessarily be more or less diminished by its removal” Smith (1776: 848-49).&nbsp;</span></p></div><div class="bout" data-dcnode-id="2346"><span class="count jquery-once-1-processed" data-dcnode-id="2349" id="182"><span data-dcnode-id="2350" instrument_node="">182</span></span><p data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">What is striking about the logic of Adam Smith’s argument is that it almost perfectly captures the very contemporary idea that the mobility of capital generates a series of imperatives (here, for states to reduce the ‘vexatious inquisition’ of taxation that they impose on business) that must override democratic deliberation and choice.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2341"><span class="count jquery-once-1-processed" data-dcnode-id="2344" id="183"><span data-dcnode-id="2345" instrument_node="">183</span></span><p data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">The contemporary form of the argument is, in fact, only subtly different.&nbsp; It goes something like this.&nbsp; In closed national economies, such as those which characterized the pre-globalization era, capital was essentially immobile and national in character; it had no ‘exit’ option.&nbsp; In such an environment governments could impose punitive taxation regimes upon unwilling and relatively impotent national businesses with little cost to the domestic economy (save except for the tendency for the latter to hoard rather than to reinvest their profits).&nbsp;</span></p></div><div class="bout" data-dcnode-id="2333"><span class="count jquery-once-1-processed" data-dcnode-id="2339" id="184"><span data-dcnode-id="2340" instrument_node="">184</span></span><p data-dcnode-id="2334"><span data-dcnode-id="2338" instrument_node="">In a world of globalization, by contrast, open economy conditions pertain.&nbsp; Capital may now exit from national economies at minimal cost (invariably, in most neoclassical-inspired models, at zero cost).&nbsp; Accordingly, by playing off the regulatory regimes of different economies against one another, capital can ensure for itself the highest rate of return on its investment.&nbsp; </span><em data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">Ceteris paribus</span></em><span data-dcnode-id="2335" instrument_node="">, capital will exit higher taxation jurisdictions for their lower taxation counterparts, comprehensive welfare states for residual states, highly regulated labor-markets for flexible labor-markets and economies characterized by strict environmental regulations and high union density for those characterized by lapse environmental standards and low union density.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2328"><span class="count jquery-once-1-processed" data-dcnode-id="2331" id="185"><span data-dcnode-id="2332" instrument_node="">185</span></span><p data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">The process pits national economy against national economy in an increasingly intense competitive struggle.&nbsp; States must effectively clamber over one another in an ever more frenzied attempt to produce a more favorable investment environment for mobile (‘footloose’) foreign direct investors than their competitors.&nbsp; Yet this is not a one-shot game – and an early influx of foreign direct investment only increases the dependence of the state upon its continued ‘locational competitiveness’.&nbsp; If investment is to be retained in such an environment, states must constantly strive to improve the investment opportunities they can offer relative to those of their competitors.&nbsp; Any failure to do so can only precipitate a haemorrhaging of invested funds, labor shedding and, eventually, economic crisis.&nbsp; In other words states must internalize and continue to internalize the preferences of capital, offering ever more attractive investment incentives, ever more flexible labor-markets, and ever less restrictive environmental regulations, if they are not to be emptied of investment, economic activity and employment.&nbsp; Big government, and more importantly perhaps the democratic choice for big government, is rendered increasingly anachronistic – a guarantor not of the interests of citizens or even consumers, but a sure means to disinvestment and economic crisis.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2323"><span class="count jquery-once-1-processed" data-dcnode-id="2326" id="186"><span data-dcnode-id="2327" instrument_node="">186</span></span><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">If this is the general form of the argument, then there are two important extensions of it that it is also important to consider.&nbsp; The first concerns financial markets – and the political imperatives arising from the financial market integration associated with globalization.&nbsp; The second is more specific to the period following the global financial crisis.&nbsp; It concerns public debt, the state’s obligations to its creditors and the associated political imperatives arising from such financial dependence.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2318"><span class="count jquery-once-1-processed" data-dcnode-id="2321" id="187"><span data-dcnode-id="2322" instrument_node="">187</span></span><p data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Globalization, of course, is not only associated with trade and foreign direct investment flows.&nbsp; Increasingly significant in accounts of globalization’s political imperatives are financial flows, particularly short-term financial flows.&nbsp; Here the argument is again very simple.&nbsp; In a world of heightened financial interdependence, financial market actors can be seen, effectively, to ‘take positions’ on the policy preferences exhibited by governments.&nbsp; In a sense they reward and penalize governments for their conduct of domestic economic governance.&nbsp; In so doing they have the capacity to wreak almost instant domestic havoc through the positions they adopt in foreign exchange markets and/or by modifying the effective rate of interest on government debt.&nbsp; Understood in this way, governments have a need to appease financial market actors through their economic and social policy choices by, in effect, internalizing a series of external and non-negotiable financial imperatives (for fiscal prudence, deficit and debt reduction through austerity and a hawkish commitment to price stability).&nbsp; Such imperatives, once again, circumscribe as they discipline democratic governance at the national level.</span></p></div><div class="bout" data-dcnode-id="2313"><span class="count jquery-once-1-processed" data-dcnode-id="2316" id="188"><span data-dcnode-id="2317" instrument_node="">188</span></span><p data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Finally, in a context of unprecedented levels of public (and, indeed, private) debt following the global financial crisis, such imperatives are typically seen to have been ratcheted up several notches.&nbsp; As Wolfgang Streeck (2014) puts it so clearly, today’s nation-states are ‘consolidation states’, simultaneously beholden to their citizens for democratic legitimacy and to global financial market institutions for the borrowing on which their spending relies.&nbsp; These, of course, are typically conflicting relations of dependence.&nbsp; What financial market institutions might demand in return for the conditional rolling-over of national debt is not the same as what citizens desire from the government they elect democratically.&nbsp; Here, as elsewhere, global economic interdependence (here financial interdependence) makes democratic governance a more complex juggling of conflicting imperatives in which the capacity to respond directly to the demands of citizens is seemingly attenuated.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2308"><span class="count jquery-once-1-processed" data-dcnode-id="2311" id="189"><span data-dcnode-id="2312" instrument_node="">189</span></span><p data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">But is this credible?&nbsp; Insofar as we are right to accept the combined and mutually reinforcing logics of the above argument – for they all pull in precisely the same direction – democratic choice is, at the national level at least, profoundly threatened by economic globalization.&nbsp; The stakes could scarcely be higher.&nbsp; And for this reason, above all, we need to proceed with some caution.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2303"><span class="count jquery-once-1-processed" data-dcnode-id="2306" id="190"><span data-dcnode-id="2307" instrument_node="">190</span></span><p data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Whilst the logic is a compelling one and one that has proved exceptionally persuasive, not least amongst political elites (a point to which we return presently), the evidence for the anticipated effects of such a logic is not nearly so strong.&nbsp; The problem here is the convenient simplicity of the analytical assumptions from which logics of this kind are derived.&nbsp; Adam Smith simply assumes that all taxation is anathema to the interests (and profits) of capital – and hence, that in a context in which capital enjoys mobility, it will consistently exercise the exit potential this brings by fleeing high taxation jurisdictions for low taxation jurisdictions.&nbsp; It is but a short step to the imperative of fiscal and, hence, state retrenchment.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2298"><span class="count jquery-once-1-processed" data-dcnode-id="2301" id="191"><span data-dcnode-id="2302" instrument_node="">191</span></span><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">But this stands in marked contrast to the available empirical evidence.&nbsp; This shows, amongst other things, a strong, positive and strengthening correlation between state expenditure and economic growth under conditions of globalization (Cameron 1978; Katzenstein 1985; Rodrik 1997; Swank 2002); a propensity for foreign direct investment to be attracted not by low but by high rates of corporate taxation, not by highly flexible but in fact tightly regulated labor markets and not by low but by high environmental standards (Cooke and Noble 1998; Hay and Wincott 2012; Wilensky 2002); and a similar tendency for financial market actors to be comparatively lenient on budget deficits, accumulated debt and even the inflationary preferences of governments (and central banks), at least in OECD countries (Mosley 2003).&nbsp;</span></p></div><div class="bout" data-dcnode-id="2293"><span class="count jquery-once-1-processed" data-dcnode-id="2296" id="192"><span data-dcnode-id="2297" instrument_node="">192</span></span><p data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">The reason for all of this is relatively simple.&nbsp; State expenditure, and hence the taxation receipts out of which it is funded, is not nearly as damaging of competitiveness nor, relatedly, the return on capital invested, than is typically assumed in such stylized models.&nbsp; Foreign direct investors, it seems, seek not deregulated labor markets nor low corporate taxation so much as highly skilled and flexible labor, stable industrial relations regimes and privileged access to the kinds of affluent consumer economies typically characterized by the highest levels of social and other state expenditure (Hay and Wincott 2012; Rodrik 2012).&nbsp; Similarly, in a context of incomplete information and information that is often time-consuming and expensive to acquire, financial market actors are typically disinterested in the finer details of macroeconomic and social policy in advanced liberal democracies – tending simply to assume that, in the absence of a handful of clear warning signs, all is in relatively good working order (Mosley 2003).&nbsp; Financial markets, it seems, are less discriminating – and, crucially, less constraining – in their behavior that we tend to assume.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2288"><span class="count jquery-once-1-processed" data-dcnode-id="2291" id="193"><span data-dcnode-id="2292" instrument_node="">193</span></span><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">From the perspective of democratic choice that, of course, is a very good thing.&nbsp; For it suggests that the space for democratic deliberation and the national policy-making autonomy on which it relies is not as restricted as we might assume.&nbsp; But there is a catch.&nbsp; Insofar as our political elites are impressed by such logics – and there is plenty of evidence that they are – they may well act as if such non-negotiable economic imperatives were real (Hay and Rosamond 2002).&nbsp; The effect is much the same, even if the mechanism by which it is achieved is very different.&nbsp; The irony, of course, is that it is the acceptance by political elites of the idea of globalization (and the imperatives with which it has come to be associated) that turns out to be more corrosive of democratic governance at the national level than globalization itself.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2282"><span class="count jquery-once-1-processed" data-dcnode-id="2286" id="194"><span data-dcnode-id="2287" instrument_node="">194</span></span><p data-dcnode-id="2283"><strong data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">2.5.3 The prospects for political globalization</span></strong></p></div><div class="bout" data-dcnode-id="2274"><span class="count jquery-once-1-processed" data-dcnode-id="2280" id="195"><span data-dcnode-id="2281" instrument_node="">195</span></span><p data-dcnode-id="2275"><span data-dcnode-id="2279" instrument_node="">This is all very well – and for how we think about democratic governance at the national level, it is undoubtedly profoundly important.&nbsp; But it is to privilege the national level and, in a context of globalization, that is unquestionably problematic.&nbsp; Perhaps the simplest way to conceive of this is in terms of the uneven character of the process of, not economic, but </span><em data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">political</span></em><span data-dcnode-id="2276" instrument_node=""> globalization.&nbsp; We might think of this in terms of the (uneven) globalization of political problems and the globalization of political solutions – the point, of course, being that there is a gross disparity between the former (evidence of which abounds) and the latter (where we are surely right to identify a governance deficit).&nbsp;</span></p></div><div class="bout" data-dcnode-id="2269"><span class="count jquery-once-1-processed" data-dcnode-id="2272" id="196"><span data-dcnode-id="2273" instrument_node="">196</span></span><p data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Both forms of political globalization pose problems for traditional forms of democratic governance, which tend to privilege the national level.&nbsp; Two examples serve particularly to reveal the extent of the difficulty.&nbsp; The first is the challenge of global climate change – an issue that, though clearly unevenly distributed in terms of its immediate effects (both current and anticipated) is no less clearly planetary in terms of its aggregate consequences.&nbsp; Here, respect for the democratic preferences of citizens at the national level is likely to compromise profoundly the capacity and authority to impose solutions at a global level.&nbsp; And, whilst we still lack a vision of what a genuinely democratic, yet at the same time global, resolution of such a problem might entail, this disparity between national and global solutions is likely to manifest itself in terms of a political stalemate.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2264"><span class="count jquery-once-1-processed" data-dcnode-id="2267" id="197"><span data-dcnode-id="2268" instrument_node="">197</span></span><p data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">The second example, the problem of global financial market regulation, seems as yet no less intractable.&nbsp; Here again we witness the palpable disparity between the need for, and supply of, global governance (here in the form of global financial market regulation).&nbsp; If, indeed, global financial market actors are as globally interconnected and interdependent as the global financial crisis reveals them to be, then regulation at a national level, however prudential, cannot guard against crisis through contagion.&nbsp; Clearly global governance is required (Hay and Payne 2015).&nbsp; Yet in a context in which different states have, in effect, different exposures to and investments in the financial markets they ostensibly regulate there is a proliferation of potential veto players in the move from national to global regulation.&nbsp; The outcome is predictable.&nbsp; The transition from national to global governance, despite the inherent logic of such a move, has proved as yet impossible.&nbsp; Here the impediment is not so much the capacity to envision democratic global governance as to envisage genuinely global governance at all.&nbsp;&nbsp;&nbsp;</span></p></div><div class="bout" data-dcnode-id="2259"><span class="count jquery-once-1-processed" data-dcnode-id="2262" id="198"><span data-dcnode-id="2263" instrument_node="">198</span></span><p data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">And herein lies the cusp of our contemporary dilemma.&nbsp; There is a demonstrable and palpable need for global governance and yet, at the same time, a clear and compelling argument that respect for the democratically expressed wishes of citizens at the national level is both anathema to, and will ultimately always thwart, the passing of political authority from the national to the trans-national level.&nbsp; In the end there is only one solution to that problem – the envisioning of a form of global governance that is not only efficacious at a planetary level (in terms of its capacity to regulate financial markets and to mitigate judiciously the effects of global climate change, for instance) but also credibly democratic at the planetary level too.&nbsp; That is a tough ask – a challenge to political theorists as much as it is a challenge to proponents of democratic global governance.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2254"><span class="count jquery-once-1-processed" data-dcnode-id="2257" id="199"><span data-dcnode-id="2258" instrument_node="">199</span></span><p data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Put bluntly, we have yet to make democracy and globalization compatible – and we have, for far too long, proceeded on the rather naively optimistic basis that, since globalization is a benign process, there is little or no risk to promoting its development in advance of any clear strategy for its democratization.&nbsp; We are rapidly reaching the point at which that comforting delusion no longer holds – and, in so doing, we reach a political watershed.&nbsp; The choice is ours.</span></p></div><div class="bout" data-dcnode-id="2249"><span class="count jquery-once-1-processed" data-dcnode-id="2252" id="200"><span data-dcnode-id="2253" instrument_node="">200</span></span><h3 data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">2.6 Populism: A challenge from within</span></h3></div><div class="bout" data-dcnode-id="2241"><span class="count jquery-once-1-processed" data-dcnode-id="2247" id="201"><span data-dcnode-id="2248" instrument_node="">201</span></span><p data-dcnode-id="2242"><span data-dcnode-id="2246" instrument_node="">After years of neglect, populism is now a central theme of political experience and research. Until recently, interest in the study of populism was traditionally strongest among scholars who saw it as a problem. Political scholars who have suggested that populism might have a positive role to play in contemporary democracy are thus rare. For this minority, however, populism’s putative virtues include “folk politics” versus “institutionalized politics”; the concerns of large numbers over the interests of the few; the lived experience of local, the village, the neighborhood over an abstract, distant state; and finally the consistent actualization of popular sovereignty as the substance of the whole over and above constitutional rules (Canovan 1999; Mudde 2001). Populist scholars emphasize also the political directness, sincerity, and transparency of ordinary people versus the indirection and opacity of representative institutions; they oppose the “purity” of political purpose of the many to the bargaining games by the politicians, who are part of the few and the elite; they praise decisiveness (and also decisionism) over time-consuming parliamentary compromises, procedural formalism, and institutional obfuscation; they use the language of the organic unity of the </span><em data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">populus</span></em><span data-dcnode-id="2243" instrument_node=""> rather than the artificial and abstract language of intellectuals and scholars; finally they stress the priority and homogeneity of the whole versus&nbsp; pluralism and the conflict of interests (Kazin 1995; Canovan 2002). They make the character of populism overlap with that of democracy and propose to see both of them as the best expressions of politics, the art of persuasion and decision by which means the people construct their community according to their will (Laclau 2005a).</span></p></div><div class="bout" data-dcnode-id="2236"><span class="count jquery-once-1-processed" data-dcnode-id="2239" id="202"><span data-dcnode-id="2240" instrument_node="">202</span></span><p data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">&nbsp; Despite the power contrasts drawn by scholars sympathetic to populism, they have yet to converge on even a rough definition of it. Populism remains a deeply contested term, more useful polemically than analytically, often used merely to brand and accuse actual political movements or leaders; this explains the “repugnance with which words ‘populism’ and ‘populist’ are uttered,” particularly among European scholars (D’Eramo 2013). However, recent events in Europe and the United States and recent literature have helped shed light on populism and some agreement is possible upon basic definitions of it concerning its ideological character, its relation to democracy’s promises of public equality, its socio-cultural content and its strategic mechanism.</span></p></div><div class="bout" data-dcnode-id="2230"><span class="count jquery-once-1-processed" data-dcnode-id="2234" id="203"><span data-dcnode-id="2235" instrument_node="">203</span></span><p data-dcnode-id="2231"><strong data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">2.6.1 Populism’s recognizable characters</span></strong></p></div><div class="bout" data-dcnode-id="2222"><span class="count jquery-once-1-processed" data-dcnode-id="2228" id="204"><span data-dcnode-id="2229" instrument_node="">204</span></span><p data-dcnode-id="2223"><span data-dcnode-id="2227" instrument_node="">Although plural and diverse because it is socially and historically contextual, populism develops within representative democracies (not merely democracies) as a fight over the meaning and representation of the people, an extreme expression of intense majority politics and thus a straining of constitutional democracy to its extreme limits, beyond which a change of regime (tyranny or dictatorship) could occur. Recognizing populism’s contextual specificity (thus its plural manifestations) is no impediment to using comparative analyses in view of understanding the reasons of its present success in democratic societies. All populist movements exhibit a strong reservation and even hostility to the mechanisms of representation, in the name of an almost unanimous collective affirmation of the will of the people under a leading figure and above party pluralism. Yet they do not renounce representation to institute direct democracy. Populism is “parasitical” not on democracy in general but rather on representative democracy in particular;</span><a data-dcnode-id="2225" href="#_ftn6" name="_ftnref6" title=""><span data-dcnode-id="2226" instrument_node="">[6]</span></a><span data-dcnode-id="2224" instrument_node=""> it is a distorted form developing from within it, rather than a regime of its own.&nbsp; The relationship of populism with democracy is an issue of contention rather than compatibility.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2209"><span class="count jquery-once-1-processed" data-dcnode-id="2220" id="205"><span data-dcnode-id="2221" instrument_node="">205</span></span><p data-dcnode-id="2210"><span data-dcnode-id="2219" instrument_node="">Populism is not external to representative democracy but competes with it about the meaning and use of representation as a strategy for claiming, affirming, and managing the will of the masses.&nbsp; Its representative claim is the source of its radical contestation of parliamentary democracy, its real target.&nbsp; Indeed, it treats pluralism (of interests and ideas, but also as manifested by parties) as litigious claims that fragment the body of popular sovereignty and thus must be simplified so as to create a polarized scenario that makes the people immediately know how to judge and with whom to side. </span><em data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Simplification</span></em><span data-dcnode-id="2216" instrument_node=""> and </span><em data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">polarization</span></em><span data-dcnode-id="2213" instrument_node=""> are in the view of achieving a deeper unification of the masses against the existing elites and under an organic narrative that most of the time a leader embodies (Urbinati 2014). Benjamin Arditi has thus written (2008) that populism can be seen as representative democracy’s “internal periphery” hardly conceivable without a politics of personality. Hence, I propose to identify populism with two intertwined political processes: one that goes toward polarization of the citizenry in two homogenous groups (the many and the few), and the other that goes toward a verticalization of the political system that minimizes the role of deliberation and mediation and exalts instead that of strong majorities and steadfast decisions. Polarization and Caesarism go hand in hand and both of them constitute a radical challenge to constitutional democracy. Populism can thus be rendered in the following way: it is </span><strong data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">a symptom of representative democracy’s malaise as denunciation of the failure of constitutional democracy to be consistent with its promises of guaranteeing that all citizens enjoy an equal political power and that public equality is the norm leading institutions, politicians, and citizens.</span></strong></p></div><div class="bout" data-dcnode-id="2203"><span class="count jquery-once-1-processed" data-dcnode-id="2207" id="206"><span data-dcnode-id="2208" instrument_node="">206</span></span><p data-dcnode-id="2204"><strong data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">2.6.2 The promise of democracy</span></strong></p></div><div class="bout" data-dcnode-id="2183"><span class="count jquery-once-1-processed" data-dcnode-id="2201" id="207"><span data-dcnode-id="2202" instrument_node="">207</span></span><p data-dcnode-id="2184"><span data-dcnode-id="2200" instrument_node="">Both in its classical and modern version, democracy promises to institute and guarantee legal, civil and political equality. It promises </span><em data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">isonomia</span></em><span data-dcnode-id="2197" instrument_node=""> or that all the members of the </span><em data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">demos</span></em><span data-dcnode-id="2194" instrument_node=""> (the citizens) are equal as subjects to the law and are treated equally by the law. To make legal equality and civil equality certain and secure, modern constitutions incorporate a list of rights that limit the decision-making power of the government and watch over the equal treatment of all by the magistrates. Democracy promises also </span><em data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">isegoria</span></em><span data-dcnode-id="2191" instrument_node=""> or that all adult citizens have the same identical political power when making decisions on public issues and the same chance to speak up frankly in public, to associate for and promote their views. In representative government, this entails that as </span><em data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">electors</span></em><span data-dcnode-id="2188" instrument_node=""> all are identical because their votes have equal weight (on this premise only majority rule achieves democratic legitimacy); and it entails that as </span><em data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">citizens</span></em><span data-dcnode-id="2185" instrument_node=""> all are different in their social conditions and endowed with an equal right to give voice to their differences, to form and make public their opinions, to know what their government does, and finally to influence elected and electors as well.</span></p></div><div class="bout" data-dcnode-id="2175"><span class="count jquery-once-1-processed" data-dcnode-id="2181" id="208"><span data-dcnode-id="2182" instrument_node="">208</span></span><p data-dcnode-id="2176"><span data-dcnode-id="2180" instrument_node="">Legal, civil and political equality inspire both the mode and the substance of public behavior because identical as members of the </span><em data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">demos</span></em><span data-dcnode-id="2177" instrument_node=""> and in their voting power, democratic citizens are not identical and not even equal when they give expression to their voice and cast their vote. In relation to its promises of equality, thus, democracy proposes things at first glance seem contradictory: that political power should be distributed regardless of the social, cultural, and economic conditions of the citizens and that it should be used by the citizens to make sure that those conditions are not so unequal if the equal political power is to be effective. Democracy claims that procedures must ignore the social conditions of the citizens and yet that they will be used so that the citizens can make their social condition a close as possible to their political status. The tension between formal and substantial equality is in the very genes of democracy, not an accident or a defect because citizens’ equality refers to both a way of making decisions (government form) and a way of participating in making them (political form). This makes a procedural conception of democracy simply an incomplete picture.</span></p></div><div class="bout" data-dcnode-id="2170"><span class="count jquery-once-1-processed" data-dcnode-id="2173" id="209"><span data-dcnode-id="2174" instrument_node="">209</span></span><p data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">A purely procedural reading is too narrow to be explicative of the potentials and transformations which a democratic society is capable of. For sure it can hardly grasp populistic forms of representation but also ideological identifications among citizens and partisan aggregations animating the public forum. To complete our picture, we should consider that in nation-state based constitutional governments, the diarchic nature of democracy has been actualized through the construction of “the people” as the legal and legitimate sovereign of the law but also as the representative claimant that contests and proposes, that reclaims its visibility beyond its legal status. Like democracy, the people possess a double nature as is at once the norm or legal actor in whose name decisions are made and the concrete actor of the proposals and decisions.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2160"><span class="count jquery-once-1-processed" data-dcnode-id="2168" id="210"><span data-dcnode-id="2169" instrument_node="">210</span></span><p data-dcnode-id="2161"><em data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">De iure</span></em><span data-dcnode-id="2165" instrument_node=""> and </span><em data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">de facto</span></em><span data-dcnode-id="2162" instrument_node=""> levels are intertwined and their tense combination makes a democratic society an amalgam in permanent and sometime turbulent motion, in which the promises of equality are at once working procedures and instigations to social criticism and innovation. This tension feeds&nbsp; populism, which represents an all-political transformation of the forum of opinions that&nbsp; becomes a force more authoritative than elections, often amplified by the media. Populism repudiates democracy’s diarchy of opinion and decision in view of merging fully the way people think and the way people want. It is to representative democracy what demagoguery was to direct democracy. According to Aristotle's pivotal analysis, demagoguery within democracy is: (a) a permanent possibility insofar as it relies upon the public use of speech and opinion like democracy; (b) a more intense use of the principle of the majority so as to make it almost absolute or a form of power more than a method for making decisions (populism is the rule of the majority rather than a politics that uses majority rule); and (c) a waiting room for a possible tyrannical regime. We may attribute the following four aspects to populism: it flourishes as a fellow traveler of democracy; is a radical form of democratic action as strong majoritarianism; develops in times of social distress and increasing inequality; and its outcome may be risky to constitutional democracy (Taggart 2000).</span></p></div><div class="bout" data-dcnode-id="2154"><span class="count jquery-once-1-processed" data-dcnode-id="2158" id="211"><span data-dcnode-id="2159" instrument_node="">211</span></span><p data-dcnode-id="2155"><strong data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">2.6.3 Populism’s contextual specificity</span></strong></p></div><div class="bout" data-dcnode-id="2147"><span class="count jquery-once-1-processed" data-dcnode-id="2152" id="212"><span data-dcnode-id="2153" instrument_node="">212</span></span><p data-dcnode-id="2148"><strong data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">A complex category hard to synthetize in a clear-cut definition, populism’s factors and implications are deeply contextual and connected to the malaise of democratizing or democratic societies. I</span></strong><span data-dcnode-id="2149" instrument_node="">n the United States, where the term was coined as a party name in the age of post-civil war industrial reconstruction and never brought upon a regime change, populism developed along with political democratization and was, and still is, predictably met positively by historians and political theorists because of its claim of inclusion of the many or no so well represented (Kazin 1995). Born when the country was ruled by an elected notabilate representing the interests of an oligarchy (before universal suffrage was implemented), the Declaration of Independence and the Bill of Rights became extant conditions for a more democratized polity, and populism a collective movement against the “domestic enemies of the people” (Frank 2010) in the name of an alleged purity of the origins of popular government and its adulteration by the artificial complexity of civilization and the institutional organization of the state (Lash 1991). The bureaucratic and normative state apparatus, which started to be built in mid-nineteenth century, made the work of the government more distant from the people and its operations more opaque and hard to be understood by ordinary citizens.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2142"><span class="count jquery-once-1-processed" data-dcnode-id="2145" id="213"><span data-dcnode-id="2146" instrument_node="">213</span></span><p data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">On the other hand, in some Latin American countries, “the land of populism” in Carlos de la Torre’s words (2016), populism has been met with mixed feelings in relation to its historical phases: thus whether it was evaluated at the beginning of its career or at the pick of its fulfillment as a regime; as an opposition party mobilizing against an existing government or as a regime itself; and then also, as a regime in its consolidation or facing a succession in power (Rovira Kaltwasser 2012; Finchelstein 2014). Like in the United States, populism in Latin America also emerged in the age of social modernization but much like fascism in Italy it governed the path towards modernity that used state power to protect and empower their popular classes, repress dissent, and meanwhile implement social-welfare policies (Germani 1978). Thus Ernesto Laclau described populist (and Peronism in particular) as a strategy of hegemonic rebalancing within the “power blocs” through the incorporation of the popular-democratic ideology of the masses within the ruling majority (Laclau 2005). Finally, in Western Europe, populism made its appearance&nbsp; with democratization in early twentieth century, along with colonial expansionism, militarization of society coinciding with World War One, and the growth of ethnic nationalism per effect of the distress that the war. It helped justify xenophobic ideologies that aimed at homogenizing the nation and in fact promoted Fascist regimes based on mass propaganda, political simplification of friends/enemies divide and Caesaristic leadership incorporating the people as one (Mueller 2011).&nbsp;</span></p></div><div class="bout" data-dcnode-id="2137"><span class="count jquery-once-1-processed" data-dcnode-id="2140" id="214"><span data-dcnode-id="2141" instrument_node="">214</span></span><p data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Populism is growing once again, not only in Latin America and in poor societies struggling to modernize and democratize. Populism is back in several European countries, within a supranational quasi-federative context and several decades of cosmopolitan culture of rights and toleration that lessened nationalistic politics. The European Union, which developed as anti-totalitarian project after World War Two, is a novel frontier of populism, which is emerging no longer and simplistically as a claim for going back to a pre-European Union order, but rather as a design for a new representation of the European peoples as ancestral totalities against external sources of contamination such as affluent cosmopolitan elites and migrants. Decline of socio-economic wellbeing combines with an erosion of democratic legitimacy in relaunching populist leaders and movements in several European states and also the Unites States, which is experience resurgent nativism aimed against immigrants much like the old Europe and is no longer the exceptional and only place in which populism is the name of good democracy. To be sure, some leftwing forms of populism in both continents there are that claim to be inclusive of the new immigrants rather than exclusionary, yet they make their claim not in the name of the democratic promises but as a challenge to the constitutional fabric of representative democracy (Weyland 2013).</span></p></div><div class="bout" data-dcnode-id="2120"><span class="count jquery-once-1-processed" data-dcnode-id="2135" id="215"><span data-dcnode-id="2136" instrument_node="">215</span></span><p data-dcnode-id="2121"><strong data-dcnode-id="2130"><span data-dcnode-id="2134" instrument_node="">Renascent populism witnesses waning confidence in core representative democratic institutions such as parties, parliaments and elections. As leading scholars have stressed, shrinking party membership and increasing estrangement between politicians and voters testify to disillusionment with representative democracy (Mair 2013, Manin 1987; Merkel 2014, Rosanvallon 2016). Politicians are regularly accused of having lost touch with ordinary people’s concerns and made politics into an insipid </span><em data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">mainstreamism</span></em><span data-dcnode-id="2131" instrument_node=""> that chooses to neglect society’s most grave needs and concerns in order not to compromise electoral consent. Yet anti-party sentiment is primed to damage constitutional democracy as citizens need to be offered recognizable political proposals in order to side with and against and choose and participate. In consolidated democracies, thus, populism seems to follow a cycle of electoral abstention and apathy, which is a side effect of mainstreamism and at the origin of citizens’ mistrust in party politics, the growth of anti-party sentiments, and the attraction of the populist rebuff of </span></strong><span data-dcnode-id="2129" instrument_node="">“practical democracy” (Mair 2002). </span><strong data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">When elected politicians and citizens become two separate groups that make the opposition between “the many” and “the few” an easily grasped catchword, when ordinary citizens witness increase of social distress and gross violations of economic equality in the general indifference of their representatives and while the most powerful acquire more voice in politics, it may very well happen that people distrust “practical politics” </span></strong><strong data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">(</span></strong><span data-dcnode-id="2124" instrument_node="">Mény and Surel 2002</span><strong data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">).</span></strong></p></div><div class="bout" data-dcnode-id="2114"><span class="count jquery-once-1-processed" data-dcnode-id="2118" id="216"><span data-dcnode-id="2119" instrument_node="">216</span></span><p data-dcnode-id="2115"><strong data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">These are traditional factors that help explain the growth of populism in democratic societies: the quest for more intense power by the majority is primed to emerge from time to time like a symptom of mistrust in democracy’s ability to fulfill its promise of equal political power. Yet some additional factors contribute today in reinvigorating the populist rhetoric, such as a globalized financial capitalism that weakens the decision-making power of sovereign states and a globalized market of labor force that narrows the possibility of striking a social-democratic compromise between capital and labor upon which democracy was rebuilt after World War Two. The weakening of state sovereignty before global corporate business meets with the people’s call for closed borders in several nation-states as if democratic citizens thought that the protection of their political power demands the containment of free movement of peoples and of free competition over salary and social benefits. Like in the past, populism associates politics of social redistribution with protectionist politics; in addition, the dramatic phenomenon of terrorism associated with Islamic extremism propels a politics of state security at expense of civil rights and highlights the nationalistic character of democracy as a vital condition of cultural and religious homogeneity to be protected against external enemies. Hence, in several member-states of the European Union, anti-European sentiments, economic distress, and a cultural discourse dominated by cosmopolitan elites determine a representative deficit which can open a political space for those who have the perception of not having their voice represented: populist leaders are primed to find there an inviting milieu for their anti-establishment plans.</span></strong></p></div><div class="bout" data-dcnode-id="2096"><span class="count jquery-once-1-processed" data-dcnode-id="2112" id="217"><span data-dcnode-id="2113" instrument_node="">217</span></span><p data-dcnode-id="2097"><strong data-dcnode-id="2098"><span data-dcnode-id="2111" instrument_node="">In a globalized world, populism comes to play two roles: that of denouncing social inequality and the privileges of the wealthy few and that of reclaiming the priority of the national unity of the people. Resuming the two ancient categories—</span><em data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">ethnos</span></em><span data-dcnode-id="2108" instrument_node=""> and </span><em data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">demos</span></em><span data-dcnode-id="2105" instrument_node="">—whose mix steered the construction of post-Eighteenth century democratic “people”, one might say that populism’s renaissance in several democratic countries is both a symptom and a triggering force that can disrupt that mix.&nbsp; Indeed, on the one hand, the </span><em data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">demos</span></em><span data-dcnode-id="2102" instrument_node=""> (“the people”) tends to deflate its political meaning as the collective of equals in power (citizens/electors) and to translate it into a social unit identified with the majority, and on the other hand, the </span><em data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">ethnos</span></em><span data-dcnode-id="2099" instrument_node=""> (“the nation”), which the political nation of the equal subjects to the law was meant to neat of all ancestral meanings, tends to be identified with pre-political characters not acquirable by simply being subjects to the law (Portinaro 2013). Briefly, populism combines two processes: of politicization of the ethnical aspect and of ethnicization of the political aspect that have made for “the popular sovereign” in modern democracy. It thus shows how weak and context-dependent the roots of representative democracy are.</span></strong></p></div><div class="bout" data-dcnode-id="2090"><span class="count jquery-once-1-processed" data-dcnode-id="2094" id="218"><span data-dcnode-id="2095" instrument_node="">218</span></span><p data-dcnode-id="2091"><strong data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">2.6.4 Populism’s strategic mechanisms</span></strong></p></div><div class="bout" data-dcnode-id="2077"><span class="count jquery-once-1-processed" data-dcnode-id="2088" id="219"><span data-dcnode-id="2089" instrument_node="">219</span></span><p data-dcnode-id="2078"><span data-dcnode-id="2087" instrument_node="">Based on these premises, a </span><strong data-dcnode-id="2079"><span data-dcnode-id="2086" instrument_node="">distinction has to be made between </span><em data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">populism as a popular movement</span></em><span data-dcnode-id="2083" instrument_node=""> and </span><em data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">populism as a ruling power</span></em><span data-dcnode-id="2080" instrument_node="">, a prospective that allows us to face populism both in its rhetorical style, its propaganda tropes and ideology, and finally its aims and achievements. This double condition mirrors the diarchic character of democracy we have mentioned above: power of decision and power of opinion qualify constitutional democracy as an order in which citizens have an equal right to make decisions by voting directly on issues (referenda) and for representatives and to construct the issues or claims that ask for decisions to be made, sustained, or revised.</span></strong></p></div><div class="bout" data-dcnode-id="2070"><span class="count jquery-once-1-processed" data-dcnode-id="2075" id="220"><span data-dcnode-id="2076" instrument_node="">220</span></span><p data-dcnode-id="2071"><strong data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">Populism has to be evaluated and judged in relation to both authorities: as a movement of opinion and as a system of decision-making. It is </span></strong><span data-dcnode-id="2072" instrument_node="">inaccurate to treat it as identical with “popular movements,” movements of protest, or “the popular” as it can be much more than that.&nbsp; Hence there is populist rhetoric but not yet populist power when the polarizing and anti-representative discourse is made up of a social movement that wants to be a constituency independent of elected officials, wants to resist becoming an elected entity, does not have nor want representative leaders unifying its several claims, and wants to keep elected officials or the government under the scrutiny of the public.&nbsp; This was the case, for instance, of popular movements of contestation and protest like the Girotondi in Italy in 2002, Occupy Wall Street in the Unites States in 2011, and Indignados in Spain in 2011. Without an organizing narrative, the aspiration to win seats in the Parliament or the Congress and a leadership claiming its people to be the true expression of the people as a whole, a popular movement remains very much what it is: a sacrosanct democratic movement of opinion, protest, and contestation against a trend in society that betrays some basic principles of equality, which society itself has promised to respect and fulfill.</span></p></div><div class="bout" data-dcnode-id="2065"><span class="count jquery-once-1-processed" data-dcnode-id="2068" id="221"><span data-dcnode-id="2069" instrument_node="">221</span></span><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">On the other hand, there is populist rhetoric and populist power when a movement does not want to be a constituency independent of the elected officials but wants instead to conquer the representative institutions and win a majority in order to model society on its own ideology of the people. This is for instance the case of Hungary’s Fidesz party that in 2012 won a supermajority of the seats in Parliament and used it to scrap the old Constitution by amending it continuously, entrenching its own political vision at the expense of opposition parties and an independent judiciary.&nbsp; Similar events happened in Poland after the electoral victory of Kaczinski’s PiS after 2014.</span></p></div><div class="bout" data-dcnode-id="2054"><span class="count jquery-once-1-processed" data-dcnode-id="2063" id="222"><span data-dcnode-id="2064" instrument_node="">222</span></span><p data-dcnode-id="2055"><span data-dcnode-id="2062" instrument_node="">Populism, both as a movement and populism as an intra-state power, is parasitical on representative democracy either because it opposes representative democracy or wants to conquer it.&nbsp; But while a certain populist rhetoric is to be detected in almost all parties (particularly when they radicalize their claims close to elections), populism as a ruling power has some recognizable characteristics that can sharply contrast with “practical democracy” and the procedural structures of ordinary politics, like hostility towards party pluralism, the principles of constitutional democracy and the division of powers. Hence although ingrained in the ideology of the people and the language of democracy, populism as a ruling power tends to give life to governments that stretch the democratic rules toward an extreme majoritarianism, often discriminating against minorities. Populism in power is a </span><em data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">pars-pro-toto</span></em><span data-dcnode-id="2059" instrument_node=""> project that may have devastating effects on constitutional democracy (Arato 2013).&nbsp; This makes me conclude that while </span><strong data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">a symptom of political and social malaise in democratic societies, populism can hardly be a cure. Factors </span></strong><span data-dcnode-id="2056" instrument_node="">driving populism can be found in the partial regimes of elections and political rights to participation within embedded democracies (see: Introduction), where people at the lower end of the social strata feel systematically excluded and underrepresented or simply fear to be victims of threats they cannot face and control with ordinary legal and political means. In addition, a cause for populist discourse is also to be found in the partial regime of “power to govern” as national sovereignty is challenged by global markets and supranational governances such as the European Union. Yet regardless of its social specificity and the objective duress that fuels it, if populism comes to power it explicitly challenges the proper working of the “civil rights” regime and the regime of horizontal accountability granting too much power to the executive (decisionism and democracy of the leader) at the expenses of the legislature and the judiciary (deliberation and the rule of law). The question is that although populist leaders seeking power promise to include the excluded and overturn an elected oligarchy, once in power they end up by attacking the institutions of liberal democracy, seizing central government, controlling and even repressing social movements and oppositions, limiting civil liberty and contrasting media pluralism. For this reason, although a symptom of malaise of democratic societies, populism can hardly be a remedy.</span></p></div><div class="bout" data-dcnode-id="2049"><span class="count jquery-once-1-processed" data-dcnode-id="2052" id="223"><span data-dcnode-id="2053" instrument_node="">223</span></span><h3 data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">2.7 Science, Technology and Inequality</span></h3></div><div class="bout" data-dcnode-id="2044"><span class="count jquery-once-1-processed" data-dcnode-id="2047" id="224"><span data-dcnode-id="2048" instrument_node="">224</span></span><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">As contemporary societies increasingly build their governance structures and their imaginations about future developments around scientific knowledge, as they privilege specific kinds of expertise and cherish technological innovation as a sign of unquestioned advancement, it is essential to carefully reflect how this politics of knowledge and technology is entangled with questions of inequality. Indeed, when it comes to the question of democracy and inequality we often witness the co-existence of rather contradictory positions. While we encounter a strong vision that science and technology will help even out some of the existing inequalities, create new possibilities and contribute to an overall improvement of the human condition, simultaneously concerns are voiced that this “scientization” of societies might, quite on the contrary, reinforce existing or even create new inequalities.</span></p></div><div class="bout" data-dcnode-id="2033"><span class="count jquery-once-1-processed" data-dcnode-id="2042" id="225"><span data-dcnode-id="2043" instrument_node="">225</span></span><p data-dcnode-id="2034"><span data-dcnode-id="2041" instrument_node="">Indeed, in the immediate post-WWII period a great hope was palpable that the growing importance of knowledge and technologies and their distribution across the globe would allow to create a world more equal and inclusive; a world that could grow beyond the conflicts which had so deeply marked the first half of 20th century. A well-known example of this hope can be found expressed in CP Snow’s (1959) famous speech on “The two cultures” in which he expressed his confidence that major inequalities then governing the world could be gradually lowered through the spread of knowledge and through the education of more scientists. While this quickly turned to be a utopian dream and critical analysts pointed to the fact that access to the advancements in science and technology had become an important generator of power differentials both within and across societies, this did not
