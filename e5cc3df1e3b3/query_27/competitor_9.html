</span></div><div class="field texte" data-dcnode-id="201"><div class="bout" data-dcnode-id="3423"><span class="count jquery-once-1-processed" data-dcnode-id="3432" id="1"><span data-dcnode-id="3433" instrument_node="">1</span></span><p data-dcnode-id="3424"><strong data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">Coordinating Lead Authors</span></strong><span data-dcnode-id="3429" instrument_node="">:</span><a data-dcnode-id="3426" href="#_ftn1" name="_ftnref1" title=""><strong data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">[1]</span></strong></a><span data-dcnode-id="3425" instrument_node=""> Richard Bellamy, Wolfgang Merkel</span></p></div><div class="bout" data-dcnode-id="3412"><span class="count jquery-once-1-processed" data-dcnode-id="3421" id="2"><span data-dcnode-id="3422" instrument_node="">2</span></span><p data-dcnode-id="3413"><strong data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">Lead Authors</span></strong><span data-dcnode-id="3418" instrument_node="">:</span><a data-dcnode-id="3415" href="#_ftn2" name="_ftnref2" title=""><strong data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">[2]</span></strong></a><span data-dcnode-id="3414" instrument_node=""> Rajeev Bhargava, Juliana Bidadanure, Thomas Christiano, Ulrike Felt, Colin Hay, Lily Lamboy, Thamy Pogrebinschi, Graham Smith, Gayil Talshir, Nadia Urbinati, Mieke Verloo</span></p></div><div class="bout" data-dcnode-id="3407"><span class="count jquery-once-1-processed" data-dcnode-id="3410" id="3"><span data-dcnode-id="3411" instrument_node="">3</span></span><p data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">Word count: [42,417]</span></p></div><div class="bout" data-dcnode-id="3400"><span class="count jquery-once-1-processed" data-dcnode-id="3405" id="4"><span data-dcnode-id="3406" instrument_node="">4</span></span><p data-dcnode-id="3401"><strong data-dcnode-id="3403"><span data-dcnode-id="3404" instrument_node="">Abstract</span></strong><span data-dcnode-id="3402" instrument_node="">: [Abstract 200 words]</span></p></div><div class="bout" data-dcnode-id="3394"><span class="count jquery-once-1-processed" data-dcnode-id="3398" id="5"><span data-dcnode-id="3399" instrument_node="">5</span></span><p data-dcnode-id="3395"><strong data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">Summary:</span></strong></p></div><div class="bout" data-dcnode-id="3389"><span class="count jquery-once-1-processed" data-dcnode-id="3392" id="6"><span data-dcnode-id="3393" instrument_node="">6</span></span><p data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">Democracy, as we understand it, is a process of collective decision making among persons, which issues in collectively binding norms for the society of those persons.&nbsp; It is a process of decision making in which persons participate as equals in determining the legal and conventional norms that bind them and in which the group of persons, taken collectively, are sovereign. Democracy can be understood as a descriptive term, referring to political societies that actually exist, or as a normative ideal for the evaluation of political societies. This chapter is primarily about the basic moral principles that can justify this egalitarian process of collective decision making and on the challenges to understanding and realizing this ideal in the modern world.</span></p></div><div class="bout" data-dcnode-id="3384"><span class="count jquery-once-1-processed" data-dcnode-id="3387" id="7"><span data-dcnode-id="3388" instrument_node="">7</span></span><p data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">Challenges to articulating and implementing the democratic principle arise due to the reality of economic inequality, to the religious, ethnic, gender and racial pluralism of modern societies, and to the fact that these societies are part of a larger global society. We discuss and evaluate the appropriateness of democratic institutions, procedures, and organizations to translate the moral principles into the structural grammar of present day democracies and to what extent they can guarantee the fundamental principles and normative promises of democracy. The ideas of equality and sovereignty at the base of democracy cannot be fully appreciated without a grasp of the pluralism and complexity of modern societies.</span></p></div><div class="bout" data-dcnode-id="3379"><span class="count jquery-once-1-processed" data-dcnode-id="3382" id="8"><span data-dcnode-id="3383" instrument_node="">8</span></span><p data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">We take public equality as the basic normative principle underwriting democracy and guiding our efforts to understand the challenges that democracy faces. The principle helps us think about democracy along two distinct dimensions: procedural and substantive. Democracy is grounded in the principle of equality in the sense that because persons have equal status and worth, the collective decision making process is meant to realize the equal advancement of the interests of the members of the society. The ideal of democracy is a uniquely public realization of the equal status and worth of each citizen in the sense that all can see that they are treated as equals despite all the disagreements and conflicts of interest that arise in modern societies. Democracy achieves this by giving people an equal say in the making of collectively binding decisions and by protecting basic civil rights. This equal say involves equality in capacities to deliberate with fellow citizens and equal voting power and capacities to negotiate when disagreements persist. The challenge is to extend and deepen this idea in the context of highly pluralistic societies and beyond the state.</span></p></div><div class="bout" data-dcnode-id="3374"><span class="count jquery-once-1-processed" data-dcnode-id="3377" id="9"><span data-dcnode-id="3378" instrument_node="">9</span></span><p data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">The principle of public equality also grounds the fundamental civil rights of persons as well. There are certain basic civil and liberal rights whose respect and protection are as important to the public realization of the equal status and worth of persons as democracy itself is. And these rights must be respected and protected by democratic decision making just as much as democracy itself if persons are to be treated publicly as equals. This substantive dimension of public equality is also a source of debate and contention.</span></p></div><div class="bout" data-dcnode-id="3369"><span class="count jquery-once-1-processed" data-dcnode-id="3372" id="10"><span data-dcnode-id="3373" instrument_node="">10</span></span><p data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">At the same time, the idea of equality at the heart of democracy is itself a contested notion.&nbsp; And the challenges we address in the subsequent parts of this chapter bring out some of the main sources of contestation.&nbsp; And so the ideal of public equality itself must be subject to continual discussion and revision.&nbsp; In this sense, democracy is an ideal that is never fully realized among persons.&nbsp;</span></p></div><div class="bout" data-dcnode-id="3364"><span class="count jquery-once-1-processed" data-dcnode-id="3367" id="11"><span data-dcnode-id="3368" instrument_node="">11</span></span><p data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">We have structured the chapter along fundamental challenges democracy is facing in the 21st century. These challenges are: socioeconomic inequality , gender inequality, religious inequality, racial inequality, generational inequality, racial inequality, globalization as an external threat to public equality, populism as an increasingly powerful challenge within the OECD world, and the risk that the principal of democracy, the demos is withering away. These single subchapters focus particularly on the challenges to democracy, but they also provide some responses to them. The second part of the chapter changes the focus insofar as it deals mainly with responses such as democratic innovations in Europe and Latin America as specific answers to the shortcomings of representative democracy. We also address the question of which democratic norms should guide the procedures of supranational governance and what science can contribute to solving some of the challenges science itself and democracy are facing.</span></p></div><div class="bout" data-dcnode-id="3359"><span class="count jquery-once-1-processed" data-dcnode-id="3362" id="12"><span data-dcnode-id="3363" instrument_node="">12</span></span><p data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">In order to allow a democratic space with the vision of an ever expanding project, both the demos and equality need to be at the core of democracy. In our world, the state is still the more likely arena for materializing political rights. In a post-national constellation, constitutional-patriotism is too thin and populism-as-fundamentalism is all too dangerous. To go beyond the nation should not mean to abandon the demos; multi-ethnic in its nature hence remote from organic nationalism, and moving towards greater human rights on international scale as a regulative norm, the evolving, equality-striving demos as a creation of democratic states is a guiding principle of humanism. It is therefore still a viable route to claim a civic demos at the heart of democratic polity as the main institutional design to embed political equality.</span></p></div><div class="bout" data-dcnode-id="3353"><span class="count jquery-once-1-processed" data-dcnode-id="3357" id="13"><span data-dcnode-id="3358" instrument_node="">13</span></span><h3 data-dcnode-id="3354"><strong data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">Introduction</span></strong></h3></div><div class="bout" data-dcnode-id="3348"><span class="count jquery-once-1-processed" data-dcnode-id="3351" id="14"><span data-dcnode-id="3352" instrument_node="">14</span></span><p data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">Democracy, as we understand it, is a process of collective decision making among persons, which issues in collectively binding norms for the society of those persons. &nbsp;It is a process of decision making in which persons participate as equals in determining the legal and conventional norms that bind them and in which the group of persons, taken collectively, are sovereign. Democracy can be understood as a descriptive term, referring to political societies that actually exist, or as a normative ideal for the evaluation of political societies. Our focus in this chapter is primarily on the basic moral principles that can justify this egalitarian process of collective decision making and on the challenges to understanding and realizing this ideal in the modern world. After an initial account of the basic principle we will address the challenges to articulating and implementing this principle that arise due to the reality of economic inequality in these societies, to the religious, ethnic, gender and racial pluralism of modern societies, and to the fact that these societies are part of a larger global society. At this point we discuss and evaluate the appropriateness of democratic institutions, procedures, and organizations to translate the moral principles into the structural grammar of present day democracies and to what extent they can guarantee the fundamental principles and normative promises of democracy. As we will see, the ideas of equality and sovereignty at the base of democracy cannot be fully appreciated without a grasp of the pluralism and complexity of modern societies. The work of this chapter is a collaborative project.</span></p></div><div class="bout" data-dcnode-id="3343"><span class="count jquery-once-1-processed" data-dcnode-id="3346" id="15"><span data-dcnode-id="3347" instrument_node="">15</span></span><p data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">We take public equality as the basic normative principle underwriting democracy and guiding our efforts to understand the challenges that democracy faces. The principle helps us think about democracy along two distinct dimensions: procedural and substantive. Democracy is grounded in the principle of equality in the sense that because persons have equal status and worth, the collective decision making process is meant to realize the equal advancement of the interests of the members of the society. The ideal of democracy is a uniquely public realization of the equal status and worth of each citizen in the sense that all can see that they are treated as equals despite all the disagreements and conflicts of interest that arise in modern societies. Democracy achieves this by giving people an equal say in the making of collectively binding decisions and by protecting basic civil rights. This equal say involves equality in capacities to deliberate with fellow citizens and equal voting power and capacities to negotiate when disagreements persist. The challenge is to extend and deepen this idea in the context of highly pluralistic societies and beyond the state.</span></p></div><div class="bout" data-dcnode-id="3338"><span class="count jquery-once-1-processed" data-dcnode-id="3341" id="16"><span data-dcnode-id="3342" instrument_node="">16</span></span><p data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">The struggle of all groups and persons in society to be recognized as equal and valued members of society is the defining feature of democracy. The reason why democracy has this special status is because it is a way of treating persons as equals in the context of a highly pluralistic society. It does this in the context of a lot of disagreement about how society should be organized and very strong conflicts of interests in how it should be organized.&nbsp; In these circumstances, the question arises as to who gets to decide on the collectively binding norms. Under the assumption that persons and groups have only limited understandings of the interests and perspectives of other persons and groups, and persons and groups are generally biased in favor of their own interests and perspectives, it is important for all persons and groups to have a say in the collectively binding decisions that constitute the social and political order of a society. Each person and group brings their limited and partial perspectives on how society ought to be organized and attempts by means of argument and negotiation to reconcile their limited points of view with those of others. Each thereby is able to stand up for his or her own interests and perspectives and is able to learn about the perspectives and interests of others. In this way the biases of each person are partly mitigated by a process of discussion and negotiation. They are unlikely to reach full agreement on how to live together. And thus each is unlikely to be fully satisfied that the society is organized as it ought to be organized since the points of view and interests of many others will have to be accommodated. It is not just important that all have a say but that each has an equal say.&nbsp; Only in this way can the issue of who decides be settled in a way that recognizes and affirms the equal status and value of all persons.</span></p></div><div class="bout" data-dcnode-id="3333"><span class="count jquery-once-1-processed" data-dcnode-id="3336" id="17"><span data-dcnode-id="3337" instrument_node="">17</span></span><p data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">The principle of public equality also grounds the fundamental civil rights of persons as well. There are certain basic civil and liberal rights whose respect and protection are as important to the public realization of the equal status and worth of persons as democracy itself is. And these rights must be respected and protected by democratic decision making just as much as democracy itself if persons are to be treated publicly as equals. This substantive dimension of public equality is also a source of debate and contention.</span></p></div><div class="bout" data-dcnode-id="3328"><span class="count jquery-once-1-processed" data-dcnode-id="3331" id="18"><span data-dcnode-id="3332" instrument_node="">18</span></span><p data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">At the same time, the idea of equality at the heart of democracy is itself a contested notion.&nbsp; And the challenges we address in the subsequent parts of this chapter bring out some of the main sources of contestation.&nbsp; And so the ideal of public equality itself must be subject to continual discussion and revision.&nbsp; In this sense, democracy is an ideal that is never fully realized among persons.&nbsp; So the ideal of public equality serves both as a standard for the evaluation of the procedural aspects of the democratic process as well as a principle for the assessment of the substantive outcomes of democracy.&nbsp; The most obvious way in which it does this is that democratic societies must decide how to reproduce democracy themselves in their constitutional forms as well as in the social bases of democratic participation.&nbsp; In this respect the discussions of this chapter are designed to inform this continual process of reflection and reproduction of democracy.</span></p></div><div class="bout" data-dcnode-id="3323"><span class="count jquery-once-1-processed" data-dcnode-id="3326" id="19"><span data-dcnode-id="3327" instrument_node="">19</span></span><p data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">We have structured the chapter along fundamental challenges democracy is facing in the 21st century. These challenges are: socioeconomic inequality , gender inequality, religious inequality, racial inequality, generational inequality, racial inequality, globalization as an external threat to public equality, populism as an increasingly powerful challenge within the OECD world, and the risk that the principal of democracy, the demos is withering away. These single subchapters focus particularly on the challenges to democracy, but they also provide some responses to them. The second part of the chapter changes the focus insofar as it deals mainly with responses such as democratic innovations in Europe and Latin America as specific answers to the shortcomings of representative democracy. We also address the question which democratic norms should guide the procedures of supranational governance and what can science contribute to solve some of the challenges science itself and democracy is facing. A concluding paragraph will summarize the chance for re-democratizing democracy.</span></p></div><div class="bout" data-dcnode-id="3317"><span class="count jquery-once-1-processed" data-dcnode-id="3321" id="20"><span data-dcnode-id="3322" instrument_node="">20</span></span><h2 data-dcnode-id="3319" data-magellan-destination="1-inequality-as-a-challenge-to-embedded-democracy"><span data-dcnode-id="3320" instrument_node="">1. Inequality as a challenge to “embedded democracy”</span></h2><a data-dcnode-id="3318" name="1-inequality-as-a-challenge-to-embedded-democracy"></a></div><div class="bout" data-dcnode-id="3312"><span class="count jquery-once-1-processed" data-dcnode-id="3315" id="21"><span data-dcnode-id="3316" instrument_node="">21</span></span><h3 data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">1.1. Introduction</span></h3></div><div class="bout" data-dcnode-id="3307"><span class="count jquery-once-1-processed" data-dcnode-id="3310" id="22"><span data-dcnode-id="3311" instrument_node="">22</span></span><p data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">After three decades of neoliberal policies and increasing socio-economic equality the well-established democracies of the OECD world, Latin America and Asia are under stress. The stress is not primarily caused by external factors such as the digital revolution and the endogenous evolution of capitalism but by democracies own choices.&nbsp; New problems of legitimation are emerging and prompting some theorists and scholars of democracy to speak of a “defective” (Merkel 2004) “post-representative” (Tormey 2015), façade democracy (Streeck 2013), or simply post-democracy (Crouch 2004). However, it is not entirely clear which root concepts of democracy these authors are using as normative standards for their fundamental critiques of real existing democracy. We will propose a concept of democracy that goes beyond a minimalist Schumpeterian understanding of democracy while also avoiding maximalist overstretching of the concept by incorporating output and outcomes into the proper definition of democracy. However, in order to understand the malaises of many contemporary advanced democracies one has to understand the increasing socioeconomic inequality and the triumph of capitalism as “independent variables” which challenge the democratic core principle “political equality” of democracy as “dependent variable”. In the following we will present:</span></p></div><div class="bout" data-dcnode-id="3293"><span class="count jquery-once-1-processed" data-dcnode-id="3305" id="23"><span data-dcnode-id="3306" instrument_node="">23</span></span><ul data-dcnode-id="3294"><span data-dcnode-id="3304" instrument_node=""> </span><li data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">a normative and analytical model of democracy for the 21st century</span></li><span data-dcnode-id="3301" instrument_node=""> </span><li data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">socio-inequality as a particular challenge to political equality</span></li><span data-dcnode-id="3298" instrument_node=""> </span><li data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">the shifting axes of legitimacy in contemporary democracies</span></li><span data-dcnode-id="3295" instrument_node=""> </span></ul></div><div class="bout" data-dcnode-id="3288"><span class="count jquery-once-1-processed" data-dcnode-id="3291" id="24"><span data-dcnode-id="3292" instrument_node="">24</span></span><h3 data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">1.2. “Embedded democracy” as a model for the 21st century?</span></h3></div><div class="bout" data-dcnode-id="3274"><span class="count jquery-once-1-processed" data-dcnode-id="3286" id="25"><span data-dcnode-id="3287" instrument_node="">25</span></span><p data-dcnode-id="3275"><span data-dcnode-id="3285" instrument_node="">The concept of “embedded democracy” posits that stable rule-of-law democracies are doubly embedded: </span><em data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">internally</span></em><span data-dcnode-id="3282" instrument_node="">, in that the five partial regimes of democracy mutually secure their existence through functional interlocking; </span><em data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">externally</span></em><span data-dcnode-id="3279" instrument_node="">, in that each partial regime is embedded in broader preconditions for democracy that protect it from the destabilizing effects of both external and internal shocks. If the external embedding is damaged or underdeveloped, this, too, can pose challenges for democracy. The notion of embedding is grounded in the system-theoretical logic of the interdependence of component parts. Critical changes in one partial regime can thus infect other partial regimes. To what extent this occurs depends above all on the intensity of the partial crisis, the resilience of each partial regime, and the functional proximity of one partial regime to another. The major argument of this chapter is: the social and political </span><em data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">disembedding</span></em><span data-dcnode-id="3276" instrument_node=""> of the external embeddedness driven not only but increasingly by socio-economic inequality tends to break up the internal embeddedness of contemporary democracy. Socio-economic, ethnic, religious or gender inequalities challenge political equality as a core principle of democracy and thereby the proper working of democracy.</span></p></div><div class="bout" data-dcnode-id="3269"><span class="count jquery-once-1-processed" data-dcnode-id="3272" id="26"><span data-dcnode-id="3273" instrument_node="">26</span></span><p data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">Figure 1: The concept of “embedded democracy” and its challenges</span></p></div><div class="bout" data-dcnode-id="3264"><span class="count jquery-once-1-processed" data-dcnode-id="3267" id="27"><span data-dcnode-id="3268" instrument_node="">27</span></span><p data-dcnode-id="3265"><img alt="" class="image-large" data-dcnode-id="3266" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//comment.ipsp.org/sites/default/files/styles/large/public/images/14.1.png%3Fitok%3Dg1rqQi20&amp;raw" style="height:599px; width:800px"></p></div><div class="bout" data-dcnode-id="3259"><span class="count jquery-once-1-processed" data-dcnode-id="3262" id="28"><span data-dcnode-id="3263" instrument_node="">28</span></span><p data-dcnode-id="3260"></p></div><div class="bout" data-dcnode-id="3254"><span class="count jquery-once-1-processed" data-dcnode-id="3257" id="29"><span data-dcnode-id="3258" instrument_node="">29</span></span><p data-dcnode-id="3255"></p></div><div class="bout" data-dcnode-id="3249"><span class="count jquery-once-1-processed" data-dcnode-id="3252" id="30"><span data-dcnode-id="3253" instrument_node="">30</span></span><p data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">Source: Merkel (2004, modified).</span></p></div><div class="bout" data-dcnode-id="3244"><span class="count jquery-once-1-processed" data-dcnode-id="3247" id="31"><span data-dcnode-id="3248" instrument_node="">31</span></span><p data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">Five regimes constitute embedded (rule-of-law) democracy: a democratic electoral regime (A); the regime of political participation rights (B); the partial regime of civil liberties (C); the institutional safeguarding of mutual constraints and horizontal accountability (D); and the de jure and de facto guarantees of democratically elected representatives’ effective power to govern (E). The chapter and all the single contributions to it will show that most of these partial regimes are challenged by different sorts of inequality, however to a different degree.</span></p></div><div class="bout" data-dcnode-id="3238"><span class="count jquery-once-1-processed" data-dcnode-id="3242" id="32"><span data-dcnode-id="3243" instrument_node="">32</span></span><p data-dcnode-id="3239"><em data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">A. Electoral regime</span></em></p></div><div class="bout" data-dcnode-id="3233"><span class="count jquery-once-1-processed" data-dcnode-id="3236" id="33"><span data-dcnode-id="3237" instrument_node="">33</span></span><p data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">A democratic electoral regime requires universal voting rights, active and passive, as well as free and fair elections. These are necessary but far from sufficient conditions for a democratic system. In representative democracy, the electoral regime occupies a key position because elections are the most visible expression of popular sovereignty. Those represented elect their representatives for a fixed period. Through this representative nexus, the addressees of norms are able to see themselves as the authors of norms (Kelsen 1925). This regime, therefore, is concerned above all with participation and representation. What is at issue is the interaction between voters, parties, political elites, and parliaments. Differing than formalist constitutionalist reasoning we consider not only the de jure equality of voting as essential for a working democracy, but also the societal and political conditions which provide the individual citizen with the cognitive and material resources of equal opportunity to make use of the constitutional right for voting.</span></p></div><div class="bout" data-dcnode-id="3227"><span class="count jquery-once-1-processed" data-dcnode-id="3231" id="34"><span data-dcnode-id="3232" instrument_node="">34</span></span><p data-dcnode-id="3228"><em data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">B. Political participation</span></em></p></div><div class="bout" data-dcnode-id="3222"><span class="count jquery-once-1-processed" data-dcnode-id="3225" id="35"><span data-dcnode-id="3226" instrument_node="">35</span></span><p data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">The political rights of participation establish the unrestricted validity of the right to freedom of opinion and expression, as well as the rights to association, assembly, and petition. Political rights of participation constitute the public arena as an autonomous sphere for political action in which organizational and communicative power unfolds. In this sphere, collective processes of organization, opinion, and will-formation determine and underpin the competition for positions of political authority. Here, too, it is about participation and representation, as well as about the vertical control of the representatives by the represented. The most important organized actors are political parties, but the domain also encompasses social (protest) movements, non-governmental organizations (NGOs), interest groups, direct-democratic forms of participation such as referendums, (deliberative) civic forums, institutional access to the planning of major infrastructure projects, and participatory budgeting. As it is the case for equal voting good societies have to provide the citizens with sufficient resources to participate in politics equally.</span></p></div><div class="bout" data-dcnode-id="3216"><span class="count jquery-once-1-processed" data-dcnode-id="3220" id="36"><span data-dcnode-id="3221" instrument_node="">36</span></span><p data-dcnode-id="3217"><em data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">C. Civil liberties</span></em></p></div><div class="bout" data-dcnode-id="3211"><span class="count jquery-once-1-processed" data-dcnode-id="3214" id="37"><span data-dcnode-id="3215" instrument_node="">37</span></span><p data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">Democratic elections and political participation need to be complemented by civil liberties. As negative rights against the state, civil liberties limit the state’s claim to exercise power over individuals, thus safeguarding the sphere for their free self-determination. Civil rights and political rights are normatively “co-original” and mutually strengthening (Habermas 1992). If one of them is weakened, this reduces the efficient functioning of the other; if one of them is strengthened, it reinforces the effectiveness of the other. Cultural (ethnical, religious, gender, sexuality) and economic inequality challenge the de jure and even more the actual equality of civil rights. This is true not only for young and instable democracies but reaches deeply into the reality of OECD-democracies.</span></p></div><div class="bout" data-dcnode-id="3205"><span class="count jquery-once-1-processed" data-dcnode-id="3209" id="38"><span data-dcnode-id="3210" instrument_node="">38</span></span><p data-dcnode-id="3206"><em data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">D. Horizontal accountability</span></em></p></div><div class="bout" data-dcnode-id="3200"><span class="count jquery-once-1-processed" data-dcnode-id="3203" id="39"><span data-dcnode-id="3204" instrument_node="">39</span></span><p data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">The fourth partial regime consists in the constitutional provisions for horizontal checks and balances between institutions. These are concerned not only with governmental structures, but also regulate and monitor the legality of government actions. Especially in times of crisis when the executive often claims special decision-making powers, a working horizontal accountability of powers is of elementary importance for the survival of democracy. In many young democracies the inequality of power between the executive on the one side and the legislative and the judiciary on the other side challenge the restrict the control of those who govern.</span></p></div><div class="bout" data-dcnode-id="3193"><span class="count jquery-once-1-processed" data-dcnode-id="3198" id="40"><span data-dcnode-id="3199" instrument_node="">40</span></span><p data-dcnode-id="3194"><span data-dcnode-id="3197" instrument_node="">E. </span><em data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">Effective power to govern</span></em></p></div><div class="bout" data-dcnode-id="3188"><span class="count jquery-once-1-processed" data-dcnode-id="3191" id="41"><span data-dcnode-id="3192" instrument_node="">41</span></span><p data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">The effective power to govern means that the only persons, organizations, and institutions entitled to make decisions binding on society are those directly legitimated in free elections or indirectly through delegation under constitutional law by constitutional bodies. Governments and parliaments must have the resources and decision-making autonomy to prevent extra-constitutional actors from encroaching on their ability to govern. With economic globalization and the deregulation of financial markets in particular, actors with little or no democratic legitimation such as the International Monetary Fund (IMF), the European Central Bank (ECB), big banks, and hedge funds have been gaining worryingly high levels of influence over democratic processes.</span></p></div><div class="bout" data-dcnode-id="3182"><span class="count jquery-once-1-processed" data-dcnode-id="3186" id="42"><span data-dcnode-id="3187" instrument_node="">42</span></span><p data-dcnode-id="3183"><em data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">Internal and external embedding</span></em></p></div><div class="bout" data-dcnode-id="3177"><span class="count jquery-once-1-processed" data-dcnode-id="3180" id="43"><span data-dcnode-id="3181" instrument_node="">43</span></span><p data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">The partial regimes described can fully realize their collectively democracy-reinforcing effect only if they are mutually embedded. Democracy is thus understood as an ensemble of partial regimes that both normatively and functionally interdependent complement and limit one another. Each democracy is also embedded in an external environment that encircles it on the outside, either enabling and stabilizing or hampering and destabilizing it. The most important external embedding consists in the socioeconomic context, statehood, and the international or regional integration of a country in organizations, alliances, and policy regimes.</span></p></div><div class="bout" data-dcnode-id="3172"><span class="count jquery-once-1-processed" data-dcnode-id="3175" id="44"><span data-dcnode-id="3176" instrument_node="">44</span></span><p data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">The internal and external embedding has been eroded during the last decades. Particularly the socioeconomic environment and the progressing denationalization of economic police making have put democracy and particular stress. However, we should not simply speak of a crisis of democracy since we can observe positive and negative developments. Therefore we do not simply buy Colin Crouch`s description of post-democracy. However, a closer look at the single partial regimes of democracy will show that the negative developments prevail.</span></p></div><div class="bout" data-dcnode-id="3167"><span class="count jquery-once-1-processed" data-dcnode-id="3170" id="45"><span data-dcnode-id="3171" instrument_node="">45</span></span><h3 data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">1.3. Socioeconomic inequality as challenge</span></h3></div><div class="bout" data-dcnode-id="3162"><span class="count jquery-once-1-processed" data-dcnode-id="3165" id="46"><span data-dcnode-id="3166" instrument_node="">46</span></span><p data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">The transformation of exogenous challenges into internal structural changes within democracies can take place in two different ways. First, these challenges can be conducive to democracy by enabling it to handle challenges productively, adapt institutions to changing environments, and adopt appropriate policies that transform external challenges into innovative reforms with a renewing effect on democracy. A second possible scenario is that challenges are not handled appropriately and lead to a persistent crisis of legitimacy. The following empirical overview of the effects of rising socioeconomic inequality to the partial regimes of democracy seeks to shed light on some of the unresolved problems facing established democracies today.</span></p></div><div class="bout" data-dcnode-id="3156"><span class="count jquery-once-1-processed" data-dcnode-id="3160" id="47"><span data-dcnode-id="3161" instrument_node="">47</span></span><p data-dcnode-id="3157"><em data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">Electoral regime</span></em></p></div><div class="bout" data-dcnode-id="3147"><span class="count jquery-once-1-processed" data-dcnode-id="3154" id="48"><span data-dcnode-id="3155" instrument_node="">48</span></span><p data-dcnode-id="3148"><span data-dcnode-id="3153" instrument_node="">Voter turnout has declined moderately in Western Europe and drastically in Eastern Europe, while remaining at a problematically low level in the US. Declining electoral participation is due particularly to the political apathy of the lower social classes and not by their permissive abstention as some conservative observers argue. While the gender gap has nearly closed, selectivity in terms of social class has significantly increased. The increasing socioeconomic inequality of the last three decades has translated into heightened inequalities in cognitive resources and political knowledge across social classes. The lower their political knowledge, the less the voters are able to translate their interests into corresponding voting preferences. The more unequal a society, the greater is the number of voters who are unwilling or unable to participate meaningfully in elections. The more unequal the electoral participation, in turn, the likelier it is that substantial representation on the parliamentary level becomes similarly distorted.</span><br data-dcnode-id="3152"><span data-dcnode-id="3151" instrument_node=""> </span><em data-dcnode-id="3149"></em></p></div><div class="bout" data-dcnode-id="3141"><span class="count jquery-once-1-processed" data-dcnode-id="3145" id="49"><span data-dcnode-id="3146" instrument_node="">49</span></span><p data-dcnode-id="3142"><em data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">Political rights and opportunities</span></em></p></div><div class="bout" data-dcnode-id="3136"><span class="count jquery-once-1-processed" data-dcnode-id="3139" id="50"><span data-dcnode-id="3140" instrument_node="">50</span></span><p data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">For almost three decades European party systems have been changing: The traditional “catch-all parties” are in decline, while more specialized or populist parties have emerged―from ecological parties and left-socialist parties to right-wing populist parties. While catch-all parties traditionally mobilized lower-class voters better than most other parties, the “new” parties rarely represent the interests of the lower classes. Less conventional forms of participation such as referenda, deliberative assemblies, participatory budgeting or citizen councils are unable to stop the trend toward political exclusion: since they are cognitively and politically more demanding than voting in general elections, they are socially even more exclusive. In short, these instruments do not seem to be a cure for the disease of social exclusion, but rather an accelerator of it. It is not clear whether this applies above all to advanced (post)industrial societies and established democracies. Studies of Latin America indeed show that in certain contexts, these new forms of political participation may intensify the involvement of citizens in political processes in their municipalities or even on the national level (Pogrebinschi 2013).</span></p></div><div class="bout" data-dcnode-id="3130"><span class="count jquery-once-1-processed" data-dcnode-id="3134" id="51"><span data-dcnode-id="3135" instrument_node="">51</span></span><p data-dcnode-id="3131"><em data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">Civil rights</span></em></p></div><div class="bout" data-dcnode-id="3122"><span class="count jquery-once-1-processed" data-dcnode-id="3128" id="52"><span data-dcnode-id="3129" instrument_node="">52</span></span><p data-dcnode-id="3123"><span data-dcnode-id="3127" instrument_node="">Compared to the early 1960s when women (Switzerland) or African Americans (six US states) were not allowed to vote, when women did not enjoy the full range of economic and civil rights in many democracies, when homosexuals were criminalized and discrimination against ethnic minorities was ubiquitous, the civil rights situation today has improved considerably. Today’s governments, parliaments, parties, and the political elites are under greater pressure to be more transparent. Contemporary civic associations are more numerous and more political, monitoring politics much more closely than some decades ago. John Keane (2011) has even spoken of an emerging “monitory democracy”. Yet we are not living in a world where civil rights and the rule of law are unchallenged, as recent revelations of the surveillance practices of the American National Security Agency (NSA), the British Government Communications Headquarters (GCHQ), and secret services elsewhere in the world have shown. In the age of the Internet, private monopolies such as Google also pose a challenge to individual privacy rights. It is also true that democratic states must come up with more inclusive and lasting forms of selecting, accepting, and integrating immigrants into their societies and political systems. Indeed, hard-fought advances in equal rights for ethnic minorities have been recently challenged in Europe, the US, Australia, and Asia. On the whole, however, there can be no doubt that the overall civil rights situation has improved within the OECD world in the past half-century.</span><br data-dcnode-id="3126"><span data-dcnode-id="3125" instrument_node=""> </span></p></div><div class="bout" data-dcnode-id="3116"><span class="count jquery-once-1-processed" data-dcnode-id="3120" id="53"><span data-dcnode-id="3121" instrument_node="">53</span></span><p data-dcnode-id="3117"><em data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">Horizontal accountability</span></em></p></div><div class="bout" data-dcnode-id="3111"><span class="count jquery-once-1-processed" data-dcnode-id="3114" id="54"><span data-dcnode-id="3115" instrument_node="">54</span></span><p data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">The last decades have seen a weakening of national parliaments. Globalization and transnationalization have strengthened executives at the cost of parliaments. Governments, from Argentina to Greece to Germany, are blackmailing their legislatures in the name of executive emergency rights and policymaking imperatives under the real or pretended pressures of crisis. The German chancellor Angela Merkel notoriously admonished the public and the parliament of the need for “market-conforming democracy”, elevating the markets to the status of sovereign. Moreover, only governments are represented in supra- and international governance regimes such as the IMF, World Bank, WTO, and EU. Parliaments, the core bodies of representative democracies, have lost key legislative and monitoring powers vis-à-vis executives. Transparency and accountability have been among the first victims as a result.</span></p></div><div class="bout" data-dcnode-id="3105"><span class="count jquery-once-1-processed" data-dcnode-id="3109" id="55"><span data-dcnode-id="3110" instrument_node="">55</span></span><p data-dcnode-id="3106"><em data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">Effective power to govern</span></em></p></div><div class="bout" data-dcnode-id="3100"><span class="count jquery-once-1-processed" data-dcnode-id="3103" id="56"><span data-dcnode-id="3104" instrument_node="">56</span></span><p data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">What governments have gained in power vis-à-vis parliaments on the one side, they have lost to the markets on the other. Deregulation and globalization have empowered financial actors such as banks, hedge funds, investors, and global firms. “Markets” have become the principals, governments the agents. If these principals are hit by self-inflicted crises, as it has been the case with the financial crises after 2008, they can externalize their problems by forcing governments to bail them out.</span></p></div><div class="bout" data-dcnode-id="3095"><span class="count jquery-once-1-processed" data-dcnode-id="3098" id="57"><span data-dcnode-id="3099" instrument_node="">57</span></span><p data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">Four out of embedded democracy`s five partial regimes have witnessed democratic erosions over the course of the last decades. Only the regime of civil rights has seen considerable improvements. The rights of women and minorities (ethnic, religious, sexual) have made impressive advances, de jure and de facto in most countries although not completely catch up to the actual level of men and the majorities. In times of globalization it seems easier for democratic governments to advance non-economic identity rights than to stop the increasing socioeconomic inequalities (Merkel 2014a) in times of deregulated global markets and the dominant economic paradigm of austerity politics and policies.</span></p></div><div class="bout" data-dcnode-id="3087"><span class="count jquery-once-1-processed" data-dcnode-id="3093" id="58"><span data-dcnode-id="3094" instrument_node="">58</span></span><p data-dcnode-id="3088"><span data-dcnode-id="3092" instrument_node="">We do not conclude that “democracy” (singular) is in crisis, since there is no theory that can tell us where the threshold between challenges to and crisis of the democratic system actually lies. It would be wrong to assume that the established democracies of the OECD world have already transformed into post-democracies, since there are, rather, asynchronous developments that have strengthened the proper working of democracies in certain ways and weakened it in others, as we have pointed out. We are also not facing the “end of representative politics” (Tormey 2015). But what will be discussed in the following chapters is to which extent the multiple challenges of inequalities are undermining the very idea and practice of democracy and which democratic reforms and innovations can reduce the danger of shifting axes of democratic legitimacy in the 21st century.</span><br data-dcnode-id="3091"><span data-dcnode-id="3090" instrument_node=""> </span></p></div><div class="bout" data-dcnode-id="3081"><span class="count jquery-once-1-processed" data-dcnode-id="3085" id="59"><span data-dcnode-id="3086" instrument_node="">59</span></span><h2 data-dcnode-id="3083" data-magellan-destination="2-challenges"><span data-dcnode-id="3084" instrument_node="">2. Challenges</span></h2><a data-dcnode-id="3082" name="2-challenges"></a></div><div class="bout" data-dcnode-id="3076"><span class="count jquery-once-1-processed" data-dcnode-id="3079" id="60"><span data-dcnode-id="3080" instrument_node="">60</span></span><h3 data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">2.1 Racial Inequality</span></h3></div><div class="bout" data-dcnode-id="3071"><span class="count jquery-once-1-processed" data-dcnode-id="3074" id="61"><span data-dcnode-id="3075" instrument_node="">61</span></span><p data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">…[L]aw and order exist for the purpose of establishing justice and when they fail in this purpose they become the dangerously structured dams that block the flow of social progress.</span></p></div><div class="bout" data-dcnode-id="3066"><span class="count jquery-once-1-processed" data-dcnode-id="3069" id="62"><span data-dcnode-id="3070" instrument_node="">62</span></span><p data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">- Martin Luther King, Jr., “Letter From a Birmingham Jail”</span></p></div><div class="bout" data-dcnode-id="3060"><span class="count jquery-once-1-processed" data-dcnode-id="3064" id="63"><span data-dcnode-id="3065" instrument_node="">63</span></span><p data-dcnode-id="3061"><strong data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">2.1.1 Introduction</span></strong></p></div><div class="bout" data-dcnode-id="3055"><span class="count jquery-once-1-processed" data-dcnode-id="3058" id="64"><span data-dcnode-id="3059" instrument_node="">64</span></span><p data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">The 20th century brought extraordinary change on matters concerning racial and ethnic identity. Formal colonialism ended. Scientists rejected “racial” theories of intelligence. The Nazi Party was defeated, though not before millions were massacred on xenophobic grounds. In the wake of that atrocity, the United Nations issued a charter protecting the fundamental rights and liberties for all persons regardless of their country of origin, religious beliefs, skin color, and cultural practices. In the 1960s, the United States passed sweeping civil rights legislation, outlawing ethnic discrimination and putting in place measures to help integrate schools and ensure fair access to voting. In South Africa, the apartheid regime was replaced by a Constitution committed to inclusion and opportunity. The European Union formed, offering opportunities for mobility and employment across borders.</span></p></div><div class="bout" data-dcnode-id="3050"><span class="count jquery-once-1-processed" data-dcnode-id="3053" id="65"><span data-dcnode-id="3054" instrument_node="">65</span></span><p data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">Given that the 19th century was marked by brutal colonialism, exploitation, and slavery, these transformations are not to be undersold. Yet ethnic inequality persists. In many countries, practices of formal discrimination, government-sponsored xenophobia, and ethnic genocide are alive and well. And in countries that have banned formal discrimination between people on the basis ethnic identity, individuals from minority groups still face enormous substantive barriers to integration and equality. In these places, some believe that a society without formal barriers is “post-racial” (Eibach &amp; Keegan). If this is the case, they argue, then differences between racial and ethnic groups must be traceable exclusively to choices and cultures.</span></p></div><div class="bout" data-dcnode-id="3045"><span class="count jquery-once-1-processed" data-dcnode-id="3048" id="66"><span data-dcnode-id="3049" instrument_node="">66</span></span><p data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">This view is both incorrect and dangerous. While we have made tremendous steps toward ethnic equality, social and economic inequality between ethnic groups persists even in democratic countries. Persistent inequality in democratic countries is the focus of this subchapter. We argue that persistent socioeconomic inequality makes it much harder for ethnic minorities to participate effectively in politics. In turn, barriers to political participation make it harder for members of ethnic groups to gain social and economic inequality. This is why we began this section with Dr. King’s words: sometimes, laws intended to establish justice fail to do so effectively.</span></p></div><div class="bout" data-dcnode-id="3031"><span class="count jquery-once-1-processed" data-dcnode-id="3043" id="67"><span data-dcnode-id="3044" instrument_node="">67</span></span><p data-dcnode-id="3032"><span data-dcnode-id="3042" instrument_node="">Democracies recognize the equal worth of citizens by giving them a say in the decisions that affect their lives. To accomplish this, states must guarantee three things: (a) protection of civil rights and liberties; (b) access to the resources necessary for citizens to exercise political voice and relate on terms of mutual respect, and (c) fair procedures for voting and representation. In this subchapter, we demonstrate how ethnic inequality threatens political equality along all three of dimensions. We highlight one pattern in particular: that social and economic ethnic inequality both </span><em data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">causes </span></em><span data-dcnode-id="3039" instrument_node="">political inequality and </span><em data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">is</span></em><span data-dcnode-id="3036" instrument_node=""> </span><em data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">caused by </span></em><span data-dcnode-id="3033" instrument_node="">political inequality. First, we show that individuals from ethnic minority groups face threats to their civil liberties, most notably to the fundamental rights to basic safety and security and equal treatment under the law. Second, we argue that people from minority ethnic groups often face barriers to accumulating financial, educational, social, and cultural capital, which in turn undermines political equality. Third, we demonstrate that certain formal procedures like direct democratic ballot referenda harm ethnic minority groups and should be reconsidered. At the end of each section, we outline a set of responses that address the challenges we highlight.</span></p></div><div class="bout" data-dcnode-id="3025"><span class="count jquery-once-1-processed" data-dcnode-id="3029" id="68"><span data-dcnode-id="3030" instrument_node="">68</span></span><p data-dcnode-id="3026"><em data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">Defining ethnic identity</span></em></p></div><div class="bout" data-dcnode-id="3020"><span class="count jquery-once-1-processed" data-dcnode-id="3023" id="69"><span data-dcnode-id="3024" instrument_node="">69</span></span><p data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">Ethnicity is an umbrella term that includes, but is not limited to, features associated with race such as skin color, hair type, and ancestry (Horowitz 1985). Membership in an ethnic group is based upon possessing traits “believed to be associated with descent” (Chandran 2006). By “believed to be associated with descent,” we mean those traits “around which a credible myth of association with descent has been woven, whether or not such an association exists in fact” (ibid). These traits are either genetically transmitted (skin color, hair type, physical features) or have to do with the language, religion, place of origin, tribe, caste, clan, nationality, or race of one’s parents and ancestors such as names or tribal markings (ibid).</span></p></div><div class="bout" data-dcnode-id="3006"><span class="count jquery-once-1-processed" data-dcnode-id="3018" id="70"><span data-dcnode-id="3019" instrument_node="">70</span></span><p data-dcnode-id="3007"><span data-dcnode-id="3017" instrument_node="">This constructivist definition stands in contrast to “fixed” views of ethnicity, whereby each person has just one ethnic identity passed down across generations (ibid). Researchers have debunked this fixed view, revealing instead that the salience of specific identities varies from country to country and changes regularly depending on political and demographic factors. Because of this fact, we face a challenging task in this chapter. Each nation has its own history of ethnic strife: in Europe, immigrants from Africa, the Middle East, and Romany groups face barriers to social inclusion and political equality. In India, caste and religious identity matter greatly. In the United States, Black Americans face oppression and poverty in part due to vestiges of chattel slavery. Recognizing these important differences, we nonetheless strive to identity patterns, frameworks, and interventions that can help policymakers and activists worldwide understand the relationship between ethnic identity, inequality, and democracy. We wish to emphasize one pattern in particular: that social and economic ethnic inequality both </span><em data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">causes </span></em><span data-dcnode-id="3014" instrument_node="">political inequality and </span><em data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">is</span></em><span data-dcnode-id="3011" instrument_node=""> </span><em data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">caused by </span></em><span data-dcnode-id="3008" instrument_node="">political inequality.</span></p></div><div class="bout" data-dcnode-id="3000"><span class="count jquery-once-1-processed" data-dcnode-id="3004" id="71"><span data-dcnode-id="3005" instrument_node="">71</span></span><p data-dcnode-id="3001"><strong data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">2.1.2 Challenges</span></strong></p></div><div class="bout" data-dcnode-id="2994"><span class="count jquery-once-1-processed" data-dcnode-id="2998" id="72"><span data-dcnode-id="2999" instrument_node="">72</span></span><p data-dcnode-id="2995"><em data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">Civil rights and liberties</span></em></p></div><div class="bout" data-dcnode-id="2989"><span class="count jquery-once-1-processed" data-dcnode-id="2992" id="73"><span data-dcnode-id="2993" instrument_node="">73</span></span><p data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">At the most fundamental level, political equality requires an equal guarantee of basic civil liberties: rights to bodily security, a fair trial, free association, etc. Yet in many places, these guarantees vary based on skin color or country of origin. Biased laws, and the biased application of fair laws, significantly impede political equality. Individuals acting on behalf of the state such as judges, juries, and representatives sometimes take biased actions that deprive citizens of basic rights. We could fill a whole volume documenting these patterns. In this section, however, we focus on the liberal state’s most basic promise: to protect its citizens from harm.</span></p></div><div class="bout" data-dcnode-id="2984"><span class="count jquery-once-1-processed" data-dcnode-id="2987" id="74"><span data-dcnode-id="2988" instrument_node="">74</span></span><p data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">Police officers and prosecutors perform one of the most essential tasks in a democracy: ensuring internal order. This job is challenging, requiring them to make frequent high-stakes decisions about who to pursue and how. Toward this end, legal and police officials worldwide use generalizations “based on race, ethnicity, religion or national origin - rather than individual behavior or objective evidence - as the basis for suspicion in directing discretionary law enforcement actions” (OSJI 2009). This tactic, known as ethnic profiling, informs judgments about whom to stop and question on the street, whom to arrest, whom to prosecute, whom to sentence and for how long, and even whom to shoot when faced with a perceived threat. leading police officers to stop, question, arrest, and detain ethnic minorities at disproportionately high rates. In Spain, for example, Romany are ten times more likely to be stopped on the street by police than 'white' residents, Moroccans at 7.5 times the rate of whites, and Black Africans at 17 times the rate of whites (De Lucas Martín 2013). In France, a black person was six times more likely to be stopped by police than a white person in Paris, and an Arab person was almost eight times more likely to be stopped than a white person (OSJI 2009). Similar patterns have been documented across the world (ibid).</span></p></div><div class="bout" data-dcnode-id="2973"><span class="count jquery-once-1-processed" data-dcnode-id="2982" id="75"><span data-dcnode-id="2983" instrument_node="">75</span></span><p data-dcnode-id="2974"><span data-dcnode-id="2981" instrument_node="">Despite its popularity, ethnic profiling is both ineffective and unjust (ibid). Its effects are cumulative: disproportionate&nbsp; levels of stopping lead to disproportionate levels of arrest, arrest leads to prosecution, prosecution leads to incarceration, and incarceration lead to difficulty finding employment and alienation from one’s family and community. In countries that disenfranchise felons and ex-felons, such as the United States, the fact that ethnic minorities are disproportionately convicted of felonies has a direct effect on voting. Approximately </span><em data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">25% of African-American citizens lack the right to vote in the United States </span></em><span data-dcnode-id="2978" instrument_node="">(The Sentencing Project 2016)</span><em data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">.</span></em><span data-dcnode-id="2975" instrument_node=""> Many US states ban ex-felons from voting indefinitely, meaning that 75% of these disenfranchised voters have finished their sentences and are still not permitted to vote. The link between ethnic profiling, bias in the judicial system, and access to the ballot box cannot be ignored. We urge policymakers to dismantle felony disenfranchisement laws wherever they exist.</span></p></div><div class="bout" data-dcnode-id="2968"><span class="count jquery-once-1-processed" data-dcnode-id="2971" id="76"><span data-dcnode-id="2972" instrument_node="">76</span></span><p data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">At times, the consequences of ethnic profiling are even more dire. In some cases, police officers kill people they stop on grounds of suspicion. Largely because such a ethnic minorities are stopped at disproportionately high rates, a high percentage of these victims are ethnic minorities. More often than not, police officers are not held accountable, even when the victim was unarmed and not engaged in any criminal activity.</span></p></div><div class="bout" data-dcnode-id="2963"><span class="count jquery-once-1-processed" data-dcnode-id="2966" id="77"><span data-dcnode-id="2967" instrument_node="">77</span></span><p data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">Given the clear problems associated with ethnic profiling, many countries across the world are considering legislative and police reforms. One of the most promising responses involves concerted, relentless efforts to build trust between police officers and the communities they serve. This includes a commitment to diversifying the population of police officers (leadership and rank-and-file), conducting extensive, frequent trainings on implicit bias, and explicitly teaching skills associated with conflict mediation and inter-ethnic communication. Another promising reform involves officers wearing body cameras that record their interactions with constituents. All three officer-involved shootings that have taken place in Boston since January 2014 were filmed via body camera, allowing the Boston Police Commissions to show the footage residents and leaders in the victim’s community and arrive at a consensus that the officers were reacting appropriately given the level of danger at hand (Seelye 2016). We also call for the creation of independent bodies for reviewing officer-involved shootings and a reduction in the use of lethal weapons.</span></p></div><div class="bout" data-dcnode-id="2958"><span class="count jquery-once-1-processed" data-dcnode-id="2961" id="78"><span data-dcnode-id="2962" instrument_node="">78</span></span><p data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">In addition to internal police reforms, we call for legislation banning stops for "furtive" movements such as a reaching for waistband or acting nervous, stops for being in a high-crime area, and stops for matching a generalized description of a suspect (i.e. black male ages 15-25) (Campaign Zero). Following the lead of the New York City Stop &amp; Frisk Reform, we also advocate requiring officers to report every stop including location, race, gender, whether force was used and whether a firearm was found. Additionally, ethnic profiling can be reduced by decriminalizing of activities that do not threaten public security but give police officers easy justifications for stopping someone, including: public alcohol consumption, marijuana possession, loitering, spitting, jaywalking, and biking on the sidewalk (ibid).</span></p></div><div class="bout" data-dcnode-id="2953"><span class="count jquery-once-1-processed" data-dcnode-id="2956" id="79"><span data-dcnode-id="2957" instrument_node="">79</span></span><p data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">While legislative and institutional reforms are essential to ending practices of ethnic profiling, unfair policing is a symptom of larger societal problems that must be addressed, including unequal access to public goods, residential segregation, and the diminished capacity to exercise political voice.</span></p></div><div class="bout" data-dcnode-id="2947"><span class="count jquery-once-1-processed" data-dcnode-id="2951" id="80"><span data-dcnode-id="2952" instrument_node="">80</span></span><p data-dcnode-id="2948"><em data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">Unequal access to public goods</span></em></p></div><div class="bout" data-dcnode-id="2939"><span class="count jquery-once-1-processed" data-dcnode-id="2945" id="81"><span data-dcnode-id="2946" instrument_node="">81</span></span><p data-dcnode-id="2940"><span data-dcnode-id="2944" instrument_node="">In many countries, members of ethnic minority groups face barriers to accessing financial, social, cultural, and human capital, as well as healthcare, nutritious food, and safe housing. In the United States, for example, Black Americans are twice as likely to be unemployed and nearly </span><em data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">three times </span></em><span data-dcnode-id="2941" instrument_node="">as likely to live in poverty. Residential segregation is one of the primary mechanisms underlying this form of ethnic inequality (Anderson 2010). Segregation occurs due to housing discrimination, minority self-segregation, and “white flight,” a pattern where whites move away from neighborhoods when they become populated by ethnic minority groups (Iceland 2014). Studies have found that segregation limits residential choices, and constrains employment and educational opportunities by reducing access to good schools and jobs (Charles 2003). For Black Americans, segregation is associated with poorer health outcomes and higher mortality&nbsp; rates because it both socioeconomic inequalities and because segregated neighborhoods are less likely to be located near affordable grocery stores and more likely to be located near highways, industrial areas, and toxic waste sites where land is cheap (Williams and Collins 2001).</span></p></div><div class="bout" data-dcnode-id="2934"><span class="count jquery-once-1-processed" data-dcnode-id="2937" id="82"><span data-dcnode-id="2938" instrument_node="">82</span></span><p data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">Segregation can also lead to civil unrest and violent conflict, as evidenced by the Paris riots in 2005. In Paris, many low-income immigrants live in isolated suburban public housing communities. They have poor access to public transportation, quality food, and other public goods. They are also socially isolated, which means that they rarely interact with white French citizens, at least not on terms of mutual respect (Iceland 2014; Anderson 2010). Limited interaction breeds stereotypical thinking: if you very rarely encounter someone from a minority ethnic group, then your opinions about a group are going to be limited to media exposure and a small number of personal interactions. These stereotypes result in biased actions. Discrimination by French employers against Muslims has increased sharply over the last two decades (Laitin et al 2014).</span></p></div><div class="bout" data-dcnode-id="2917"><span class="count jquery-once-1-processed" data-dcnode-id="2932" id="83"><span data-dcnode-id="2933" instrument_node="">83</span></span><p data-dcnode-id="2918"><span data-dcnode-id="2931" instrument_node="">Unequal public goods provision is partially explained by opportunity and resource hoarding, whereby a group with more power and resources limits access to those goods by members outside the group (Tilly 1998; Anderson 2010). In-group hoarding is much more likely to occur when there are existing disparities in wealth along ethnic lines (Chandran 2005; Baldwin and Huber 2016). This is because stakes of redistribution are higher: well-resourced groups have more to lose, and poor individuals have more to gain. In areas with high inequality between ethnic groups, there is also lower public goods provision overall. In the United States, for example, cities with higher levels of ethnic diversity spend less overall on public goods (Easterly </span><em data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">et al.</span></em><span data-dcnode-id="2928" instrument_node=""> 1999). Lower overall public goods provision is </span><em data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">not, </span></em><span data-dcnode-id="2925" instrument_node="">as previously believed, tied to cultural or preferential differences between ethnic groups. Instead, it occurs due to in-group hoarding, as described above (Baldwin and Huber 2016). Wealthy individuals are better able to substitute private goods for public goods (purchasing private education, private security, etc.), making them less sensitive to the levels of overall public goods provision. During the past decade in Brazil, for example, the murder rate for white citizens&nbsp; </span><em data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">decreased </span></em><span data-dcnode-id="2922" instrument_node="">by 24% while the murder rate for Black and mixed-race citizens </span><em data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">increased </span></em><span data-dcnode-id="2919" instrument_node="">by 40% (World Violence Map 2014). This is because, as Robert Muggah puts it, “those who are white tend to be able to afford themselves and avail themselves of greater security...” while “those who are black and who are unable to — as our societies become more and more unequal — are less able to secure those public goods” and as a result are “seeing homicide rates going up” (Garcia-Navaro 2014).</span></p></div><div class="bout" data-dcnode-id="2909"><span class="count jquery-once-1-processed" data-dcnode-id="2915" id="84"><span data-dcnode-id="2916" instrument_node="">84</span></span><p data-dcnode-id="2910"><span data-dcnode-id="2914" instrument_node="">Party elites use ethnic identity to target voters and form electoral coalitions (Horowitz 1985; Chandra 2004; Posner 2005).&nbsp; To achieve this goal, parties explicitly promote ideologies that play up “inherent” differences between ethnic groups that are in fact created by segregation, poor access to public goods like education and safe housing, etc. For example, “whites tend to limit access to stable jobs to fellow whites, relegating blacks to temporary, part-time, or marginal jobs in the secondary labor market. Over time, whites acquire resumes documenting long-term stable employment, whereas blacks’ resumes evidence a patchy employment record, interpreted as a sign of their poor work ethic” (Anderson 2010). Rather than ethnic minorities lacking work ethic, they often merely cannot access jobs due to poor education, employment discrimination, and other forms of oppression that results from ethnic inequality in the first place. Political ideologies like these “misrepresent the effect of group inequality as its cause”: depriving access to quality public goods actually </span><em data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">causes </span></em><span data-dcnode-id="2911" instrument_node="">joblessness and cycles of poverty in ethnic minority groups (ibid).</span></p></div><div class="bout" data-dcnode-id="2904"><span class="count jquery-once-1-processed" data-dcnode-id="2907" id="85"><span data-dcnode-id="2908" instrument_node="">85</span></span><p data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">Spatial segregation, unequal public goods provision, and party ethnification have strong implications for political equality. These patterns undermine the fundamental equality necessary for citizens to deliberate as equals. What’s more, elections, lobbying, and community organizing require capital and access. As a Black American fighting for change in the Cleveland legislature put it: “money and social status is how you make yourself heard, but people below or near the poverty line have neither. We're not equal citizens” (Weeks 2013).</span></p></div><div class="bout" data-dcnode-id="2899"><span class="count jquery-once-1-processed" data-dcnode-id="2902" id="86"><span data-dcnode-id="2903" instrument_node="">86</span></span><p data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">So what can be done? One priority is to end residential segregation where it is associated with unequal public goods provision and social/spatial isolation. Policymakers should also work to equalize access to public goods. Spending on public schools ought to be equalized across ethnic groups, or in some cases even increased given the high need for supplemental “wrap-around” services like counseling, food, special education, and school supplies in high-poverty areas. Yet improving primary and secondary education is not a silver bullet; these efforts must be accompanied by government-sponsored childcare, paid family leave policies, healthcare, desegregation, adult job training and employment, and safe housing and nutrition. Campaign finance laws also play a significant role in political empowerment. While the details vary based on the country’s electoral system, we recommend limiting the amount that individual and corporate donors can contribute to campaigns and centralizing the distribution of campaign funds so that lower-income grassroots candidates have access to resources needed to run for political office.</span></p></div><div class="bout" data-dcnode-id="2893"><span class="count jquery-once-1-processed" data-dcnode-id="2897" id="87"><span data-dcnode-id="2898" instrument_node="">87</span></span><p data-dcnode-id="2894"><em data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">Direct democracy</span></em></p></div><div class="bout" data-dcnode-id="2882"><span class="count jquery-once-1-processed" data-dcnode-id="2891" id="88"><span data-dcnode-id="2892" instrument_node="">88</span></span><p data-dcnode-id="2883"><span data-dcnode-id="2890" instrument_node="">Direct democracy is on the rise in modern democracies. While there are compelling reasons include citizens’ voices in collective decisions, it is crucial to understand the implications that some ballot referenda have on minority groups vulnerable to the tyranny of the majority. For nearly four decades, scholars have documented a strong relationship between direct democracy and ethnic inequality (e.g. Bell, Jr. 1978; Donovan and Bowler 1998; Gamble 1997). Recent empirical studies provide causal evidence that direct ballot referenda may be used to oppress minority ethnic groups. In Switzerland, foreign residents become naturalized in three stages: first vetted by the federal government, and then the state. After they are approved, each municipality makes the final decision. While some municipalities have elected politicians to vote on the applications, others allow voters to decide directly via secret ballot. Between the years 1970 and 2003, naturalization rates were </span><em data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">50%</span></em><span data-dcnode-id="2887" instrument_node=""> higher in areas where elected politicians made the decision (Heinmuller </span><em data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">et al.</span></em><span data-dcnode-id="2884" instrument_node=""> 2016). The quality of the applicant pool remained the same, implying that voters discriminate against qualified applicants that would have been approved if accountable legislators had made the decision. In fact, the effect of switching from direct to representative democracy was notably stronger in areas where citizens were more xenophobic (ibid).</span></p></div><div class="bout" data-dcnode-id="2877"><span class="count jquery-once-1-processed" data-dcnode-id="2880" id="89"><span data-dcnode-id="2881" instrument_node="">89</span></span><p data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">Why is this the case? Unlike voters, who “are free to reject immigrant applicants without having to provide any viable justification, accountable politicians, even if they hold the same prejudices as the voters, have to publicly report on the reasons for why they would reject a particular applicant and their justifications might be reviewed by the courts. This heightened accountability makes is less likely that politicians reject immigrants on discriminatory grounds” (ibid). In short, given the same exact policy decision, direct democracy measures are more likely to suppress minority interests more than representative democracy measures. We therefore advocate that policymakers reduce or eliminate the use of ballot referenda, especially when issues of citizenship and access to essential resources are concerned.</span></p></div><div class="bout" data-dcnode-id="2871"><span class="count jquery-once-1-processed" data-dcnode-id="2875" id="90"><span data-dcnode-id="2876" instrument_node="">90</span></span><p data-dcnode-id="2872"><strong data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">2.1.3 Conclusion</span></strong></p></div><div class="bout" data-dcnode-id="2866"><span class="count jquery-once-1-processed" data-dcnode-
