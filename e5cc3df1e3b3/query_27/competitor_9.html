id="1593" instrument_node="">304</span></span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">But I think we can see this through the lens of democratic theory as well.&nbsp; When a state engages in making agreements, contracts and other arrangements with other states, it is in effect attempting to shape the social world surrounding it.&nbsp; It alters the rights, duties and powers that other states have in relation to it.&nbsp; That world is the product of coordination and in part the product of conflict since states are able to shape this world more or less depending on how much social power they have.&nbsp;</span></p></div><div class="bout" data-dcnode-id="1584"><span class="count jquery-once-1-processed" data-dcnode-id="1587" id="305"><span data-dcnode-id="1588" instrument_node="">305</span></span><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Just as a citizen participates in shaping the overall character of the society he lives in by participating in collective decision making about the overall collective features of the society, so a state shapes parts of the social world in which it exists by engaging in agreement making with others.&nbsp; The justification of these different powers of shaping the social world is grounded in the same common liberal concerns.&nbsp; Persons and the groups of which they are members have fundamental interests and concerns that often conflict and they disagree on how best to shape their common social worlds and so we give each person or group some power to pursue those interests.</span></p></div><div class="bout" data-dcnode-id="1579"><span class="count jquery-once-1-processed" data-dcnode-id="1582" id="306"><span data-dcnode-id="1583" instrument_node="">306</span></span><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">I want to assert here as a general principle that persons ought to have a say in a collective decision in proportion to the legitimate stakes they have in the decision (Fleurbaey and Brighouse 2010). The basic idea is that if persons are participating in collective decision making, those with a lot more stake in a decision ought to have more of a say.&nbsp; To say that a person has more at stake in a decision than another is to say that their interests are more affected by the decision than the others’.</span></p></div><div class="bout" data-dcnode-id="1574"><span class="count jquery-once-1-processed" data-dcnode-id="1577" id="307"><span data-dcnode-id="1578" instrument_node="">307</span></span><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">On the whole persons ought to have an equal say in democratic decision making within states because on the whole they have roughly equal stakes in the set of decisions overall.&nbsp; Where there are unequal stakes, we distribute power unequally, ideally speaking.&nbsp; Federalist arrangements, for example, can be justified on the grounds that over some groups of decisions people have roughly equal stakes, but over other groups of decisions, primarily local in impact, some have much more at stake than others.</span></p></div><div class="bout" data-dcnode-id="1569"><span class="count jquery-once-1-processed" data-dcnode-id="1572" id="308"><span data-dcnode-id="1573" instrument_node="">308</span></span><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Given the analogy of agreement making to democratic participation, we can also see that the principle of proportionality applies to agreement making.&nbsp; In the case of voice, as discussed above, stakes are defined in terms of the whole range of plausible and legitimate alternatives in the different issue spaces.&nbsp; In the case of agreement making, the fundamental determinant of stake is the outside option or what a person or group can expect if no agreement is made with the other party, in other words, the value of exit.&nbsp; I have a lot at stake in an agreement if I would be very badly off without it.&nbsp; You have a lot less at stake if you would not be so badly off without the agreement.</span></p></div><div class="bout" data-dcnode-id="1564"><span class="count jquery-once-1-processed" data-dcnode-id="1567" id="309"><span data-dcnode-id="1568" instrument_node="">309</span></span><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">The fundamental argument for the principle of proportionality of power to stakes is that persons and groups of persons know their interests better than others do, normally.&nbsp; Thus in situations of conflict of interest, one should want the party with the most interest at stake to have more of a say if one is concerned with advancing the interests of persons.&nbsp;</span></p></div><div class="bout" data-dcnode-id="1559"><span class="count jquery-once-1-processed" data-dcnode-id="1562" id="310"><span data-dcnode-id="1563" instrument_node="">310</span></span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">There are four key differences directly relevant to fairness between states and persons that complicate the application of the above ideas of fairness to interstate transactions.&nbsp; First, states come with different size populations; second, states have very different levels of wealth for which the present generation cannot be held responsible (usually); third, these conditions occur against a background in which there are no higher order political institutions with the capacity to rectify serious differences of opportunity and information; fourth, the negotiations that create a regime of international trade are morally deeply fraught issues or at least more so than most ordinary negotiations.&nbsp; Two important structural differences also mark the transactions among states. They involve more complex strategic games than ordinary individual exchange.&nbsp; They are what Robert Putnam describes as two level games: there is the strategic interaction among states and there is strategic interaction within states and both of these determine the outcome of international negotiation (Putnam 1988). Second, there are a small number of states so the interactions among states never replicate the conditions of competitive markets, which sometimes play a large role in equalizing bargaining power among individual persons.</span></p></div><div class="bout" data-dcnode-id="1551"><span class="count jquery-once-1-processed" data-dcnode-id="1557" id="311"><span data-dcnode-id="1558" instrument_node="">311</span></span><p data-dcnode-id="1552"><span data-dcnode-id="1556" instrument_node="">Population and wealth are two important determinants of stake for states.&nbsp; From the standpoint of democratic theory, the power of a particular state in negotiation ought to be proportioned to population so that each state has power apportioned to per capita stakes.&nbsp; On the other hand, the role of wealth is not so straightforward.&nbsp; If one has two states that are roughly of equal wealth but one has more at stake in terms of wealth in coming to an agreement the society with more wealth at stake ought to have more of a say.&nbsp; On the other hand, suppose one has two societies at very different levels of wealth entering a negotiation.&nbsp; The one that has less at stake in terms of wealth is also very poor and so dependent on a deal to finance basic education or health care.&nbsp; In this case, the characterization of stakes in terms of wealth would be a mistake.&nbsp; Here the democratic principle is: “the poorest he hath a life to live as much as the richest he.”</span><a data-dcnode-id="1554" href="#_ftn12" name="_ftnref12" title=""><span data-dcnode-id="1555" instrument_node="">[12]</span></a><span data-dcnode-id="1553" instrument_node="">&nbsp; Hence when impoverished societies negotiate with wealthy societies, they have a lot less wealth at stake but they have more at stake in some fundamental sense since their abilities to finance basic goods for their populations are at stake.</span></p></div><div class="bout" data-dcnode-id="1546"><span class="count jquery-once-1-processed" data-dcnode-id="1549" id="312"><span data-dcnode-id="1550" instrument_node="">312</span></span><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">One of the most fundamental puzzles in a system of free transactions among persons is that this principle of power proportionate to stakes can easily be violated.&nbsp; For example if you have two persons who depend on making an agreement to advance certain interests, the one who has the least stake will often have more power.&nbsp; This is because they can more easily afford no agreement.&nbsp; But this means that power is often inversely proportioned to stakes in a scheme of free transactions, while the normative principle tells us that power ought to be proportioned to stakes.&nbsp; This is the fundamental puzzle that Marx pointed to in the relations between capital and labor (Marx 1990).</span></p></div><div class="bout" data-dcnode-id="1541"><span class="count jquery-once-1-processed" data-dcnode-id="1544" id="313"><span data-dcnode-id="1545" instrument_node="">313</span></span><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">This problem arose in the negotiations on the foundations of the WTO in which many poor societies found themselves having to agree to a deal, which benefitted wealthy countries the most because they were in danger of losing out on some basic goods (Steinberg 2002). And of course it is present in the context of negotiations on climate change since developing countries tend to have the highest vulnerability to the effects of climate change while having the least power (Mendelsohn, Dinar and Williams 2006).</span></p></div><div class="bout" data-dcnode-id="1536"><span class="count jquery-once-1-processed" data-dcnode-id="1539" id="314"><span data-dcnode-id="1540" instrument_node="">314</span></span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">The big puzzle in international negotiation is to determine how to arrange the process of negotiation so as to satisfy proportionality despite the tremendous inequalities among societies in the world today.</span></p></div><div class="bout" data-dcnode-id="1531"><span class="count jquery-once-1-processed" data-dcnode-id="1534" id="315"><span data-dcnode-id="1535" instrument_node="">315</span></span><p data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">The problem of inequality of stakes in international politics is extremely hard to solve because there is no higher political entity capable of rectifying the imbalance of power.&nbsp; The poor and the vulnerable are frequently in very difficult bargaining positions relative to wealthy and powerful societies as we see in trade negotiations and in environmental negotiations.&nbsp; But it is not as if nothing can be done here.&nbsp; First of all, multilateral and inclusive conferences tend to be helpful to poorer societies.&nbsp; But this is only if they are highly transparent and if they are the site of good coalition building.&nbsp; One, transparency can play a significant role in making negotiations fairer because though rich and powerful states are willing and able to engage in very hard bargaining with poorer states, they do not like to be seen to be doing so, either to their own citizens or to the global public.&nbsp; If hard bargaining becomes too open, it becomes damaging to the reputations of powerful states, which reputations are important assets in international politics.&nbsp; Two, coalition building among poorer countries can also offset the tremendous bargaining power that comes with wealth.&nbsp; This is because the great majority of the world’s population is poor and the sheer size of this group can give it bargaining power, as is evident from the strong bargaining position by developing countries in the WTO since they have formed strong coalitions (Narlikar 2012). This alteration of the bargaining situation is not unlike the change in bargaining between capital and labor that occurs when unions are allowed to form.&nbsp; But here again, the absence of the kind of higher political entity that protects unions in many countries does make the formation of coalitions among developing countries more precarious (Christiano 2015).&nbsp;</span></p></div><div class="bout" data-dcnode-id="1526"><span class="count jquery-once-1-processed" data-dcnode-id="1529" id="316"><span data-dcnode-id="1530" instrument_node="">316</span></span><h3 data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">3.3 Disenchantment with Democracy – Bringing the Demos back in</span></h3></div><div class="bout" data-dcnode-id="1520"><span class="count jquery-once-1-processed" data-dcnode-id="1524" id="317"><span data-dcnode-id="1525" instrument_node="">317</span></span><p data-dcnode-id="1521"><em data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">The construction of a ‘people’ is the sine qua non of democratic functioning (Laclau, On Populist Reason, 2005:169)</span></em></p></div><div class="bout" data-dcnode-id="1514"><span class="count jquery-once-1-processed" data-dcnode-id="1518" id="318"><span data-dcnode-id="1519" instrument_node="">318</span></span><p data-dcnode-id="1515"><strong data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">3.3.1 Introduction</span></strong></p></div><div class="bout" data-dcnode-id="1500"><span class="count jquery-once-1-processed" data-dcnode-id="1512" id="319"><span data-dcnode-id="1513" instrument_node="">319</span></span><p data-dcnode-id="1501"><span data-dcnode-id="1511" instrument_node="">‘We the people’ was a formative proposition, declaring many people into </span><em data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">a</span></em><span data-dcnode-id="1508" instrument_node=""> people and thereby constituting them as one people. It was a democratic people because the constitution enhanced the fundamental democratic values – liberty, equality, well-being – into an institutional design. But it was also – crucially – a </span><em data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">democratic</span></em><span data-dcnode-id="1505" instrument_node=""> people because of the public debate about constituting it: the discourse of the Federalist on public newspapers, the anti-federalist response, creating a shared forum of political debate, a political consciousness. A democratic people is more than institutions with checks and balances. It is a body of citizens that perceives itself to be one people, with conflicts and arguments and various interest groups and representative bodies that nevertheless adhere to a set of rules and feel themselves part of the same collective political identity, contested and changing as it may be. This is why democracy is a government of the people, for the people and by the people: the people – as a unitary body – are the sovereign. The demos rules by way of expressing the will of the people. This will is first and foremost a shared will – to be part of the people, and to be involved in the decision making, policy setting and direction of the polity. Being a </span><em data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">demos</span></em><span data-dcnode-id="1502" instrument_node=""> is a continuous prerequisite for democratic self-rule. The expression of this self-rule is through political equality: one person, one vote. Each citizen, being part of the body politic, has her own unique voice, casted as a vote. A vote for a candidate, a party, a view – that represents her through the elections in the policy-making process. The will of the people is at the outset, being part of the shared will; yet, it is not one will of the people that is being determined in elections, but an expression of the contingent will of the majority, respecting the minorities, believing in the continuous debate and the principal possibility of replacing one political power by another.</span></p></div><div class="bout" data-dcnode-id="1495"><span class="count jquery-once-1-processed" data-dcnode-id="1498" id="320"><span data-dcnode-id="1499" instrument_node="">320</span></span><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">However, much of contemporary developments of democracy – on the ground and in the literature – abandon the demos. As a response to the crisis of democracy they move above the people to cosmopolitanism or below the people to multiculturalism. In this section we argue that the demos is at the heart of being a democracy. Nationalism, populism, racism, neo-Fascism and xenophobia are true problems of contemporary democracy; however, democracy without a sovereign people – a civic body that shares a political collective identity that expresses itself through public media, public opinion and public consciousness – and based on shared values of freedom, self-realization and crucially political equality – is a defective democracy.</span></p></div><div class="bout" data-dcnode-id="1489"><span class="count jquery-once-1-processed" data-dcnode-id="1493" id="321"><span data-dcnode-id="1494" instrument_node="">321</span></span><p data-dcnode-id="1490"><strong data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">3.3.2 Democracy and Inequality: the Structure of the Argument</span></strong></p></div><div class="bout" data-dcnode-id="1484"><span class="count jquery-once-1-processed" data-dcnode-id="1487" id="322"><span data-dcnode-id="1488" instrument_node="">322</span></span><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Global inequality is becoming mixed up with social inequality. That is why the renationalization of democracy (through greater social cohesion and reappropriation of the political by citizens) is one way of combating both simultaneously. This struggle must therefore be a top priority for our time (Rosanvallon, 2013:299).</span></p></div><div class="bout" data-dcnode-id="1479"><span class="count jquery-once-1-processed" data-dcnode-id="1482" id="323"><span data-dcnode-id="1483" instrument_node="">323</span></span><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">To suggest renationalization of democracy in an age of post-national constellation of a globalized era sounds like a reactionary project. Yet renationalization – or, alternately, re-democratization of democracy by way of rethinking the demos as a core concept of democracy – is at the heart of democracy. Rosanvallon wants to renationalize democracy in order to combat economic inequality. He analyzes – as many scholars do – capitalism as the driving force behind the crisis of democracy which is manifested in a crisis of equality (Rosanvallon, 2013:2). Yet the crisis of democracy is also a crisis of equality as a political concept. There are strong connections between economic inequalities and political disempowerment – but we consider democratic inequality on its own terms, as stemming from the disenchantment with the demos as the locus of the political collective identity. Re-instating the demos is thus a precondition for democratic equality.</span></p></div><div class="bout" data-dcnode-id="1474"><span class="count jquery-once-1-processed" data-dcnode-id="1477" id="324"><span data-dcnode-id="1478" instrument_node="">324</span></span><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Both Weber and Habermas analyzed the crisis of modernity and late modernity as crises of rationality, that is, disenchantment with politics. However, the crisis of rationality is always also a crisis of collective identity. Rather than disenchantment, I suggest a process of re-enchantment with politics. Whereas the re-enchantment of modernity moves the collective unit from the old regime to the modern state – and thus to national identity, the contemporary crisis is a crisis of the nation-state, moving away from it to the global and local communities. Weber focused on the state and Habermas on constitutional patriotism in a post-national constellation that develops a thin-but-shared commitment to civic rights. They both neglected the role of the demos. Hence the project of renationalization – redemocratization of the polity – is one of re-inventing the demos by way of cementing anew a collective democratic political identity.</span></p></div><div class="bout" data-dcnode-id="1469"><span class="count jquery-once-1-processed" data-dcnode-id="1472" id="325"><span data-dcnode-id="1473" instrument_node="">325</span></span><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">We take Benhabib's theory of cosmopolitanism as a case in point, as mainstream democratic theory today turns to either globalism or localism, as well as to deliberative democracy, as the alternative to representative democracy. We translate her arguments for a global deliberative democracy to four levels of analysis: citizenship, participation, representation and governing. We demonstrate how they work against the demos and against political inequality. We finally turn to the concept of the demos that best protects political equality.</span></p></div><div class="bout" data-dcnode-id="1461"><span class="count jquery-once-1-processed" data-dcnode-id="1467" id="326"><span data-dcnode-id="1468" instrument_node="">326</span></span><p data-dcnode-id="1462"><strong data-dcnode-id="1463"><span data-dcnode-id="1466" instrument_node="">3.3.3 Beyond the Nation-State: Cosmopolitanism, Civil Society and the withering of the </span><em data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Demos</span></em></strong></p></div><div class="bout" data-dcnode-id="1456"><span class="count jquery-once-1-processed" data-dcnode-id="1459" id="327"><span data-dcnode-id="1460" instrument_node="">327</span></span><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">The challengers to the nation-state – cosmopolitanism and local communities within civil society – are heralded by activists and theorists alike as the new arena of democracy. Benhabib argues that the demos was conflated with ethnos (2006:68) and takes the global community as the ethical-cum-political community: the true demos is all humanity. Citizenship should therefore be flexibly, moving from the local to the regional, national and global with no priority to political citizenship.</span></p></div><div class="bout" data-dcnode-id="1451"><span class="count jquery-once-1-processed" data-dcnode-id="1454" id="328"><span data-dcnode-id="1455" instrument_node="">328</span></span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">In representative democracy, based on popular sovereignty expressed through collective will of the people, citizenship constitutes the citizens’ body to which universal suffrage pertains. Citizenship is the democratic starting point. For Rawls “a democratic society, like any political society, is to be viewed as a complete and closed social system. It is complete in that it is self-sufficient and has a place for all the main purposes of human life. It is also closed . . . in that entry into it is only by birth and exit from it is only by death” (Rawls, 1993: 41). Conversely, Walzer argues that citizenship is the first public good to be distributed within a democratic state, namely, membership in the community (Walzer, 1983; Benhabib, 2002a:448).</span></p></div><div class="bout" data-dcnode-id="1446"><span class="count jquery-once-1-processed" data-dcnode-id="1449" id="329"><span data-dcnode-id="1450" instrument_node="">329</span></span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">However, for Benhabib both Rawls and Walzer’s theories have failed to recognize that “we are at a point in political evolution when the unitary model of citizenship, which bundled together residency upon a single territory with the subjection to a single administration of a people perceived to be a more or less cohesive entity, is at an end” (Benhabib, 2004:178). She argues that “decline-of-citizenship theories err by conflating the boundaries of the political community with those of the ethical one” (Benhabib, 2004:115). Benhabib challenges the concept of ‘we the people’ perceived by her apparently as ethnos, and seeks to render not just the right to exit, but also the right of admittance – universally accessible (Benhabib, 2001:26). She argues that “the boundaries of the civic community and the boundaries of the national state are not coterminous” (Benhabib, 2002a: 448). How does it reflect on our understanding of democracy? Three main dimensions to her alternative vision: ethical cosmopolitanism, empirical complex realities, and democratic iterations. We criticize them from the perspective of the demos.</span></p></div><div class="bout" data-dcnode-id="1440"><span class="count jquery-once-1-processed" data-dcnode-id="1444" id="330"><span data-dcnode-id="1445" instrument_node="">330</span></span><p data-dcnode-id="1441"><em data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Ethical vs. the Political community?</span></em></p></div><div class="bout" data-dcnode-id="1435"><span class="count jquery-once-1-processed" data-dcnode-id="1438" id="331"><span data-dcnode-id="1439" instrument_node="">331</span></span><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">The political community is an arbitrary, historically contingent one; the ethical community that underlies it is a cosmopolitan community, based on universal human rights: Borders, she argues, are morally arbitrary and therefore liberal-democracies should practice policies compatible with the vision of a borderless world (Benhabib, 2002a: 446). But what toll does democracy pay for dumping into history's bin the idea of political community that is coextensive with a sovereign people? There are two options here: one, re-uniting the political and ethical community on a global scale, another, acknowledging the arbitrariness of the political community as only one among many circles of communities. Extending the political to the ethical community means eventually world-domination. From the ethical perspective, all humans possess human rights. But is the best way to protect human rights under one unitary regime? Empirically, we live in a world of sovereign states with some international bodies that their legitimacy is derived from the legitimacy of the agreements among the constituting states. There are no global political institutions which their legitimacy is not derivative, hence parasitic – on states. Moreover, those international bodies enjoy declarative force but a minimal real ability to coerce or sanction against violation of human rights. Some members of the human rights council of the UN, for example, are far from protecting human rights. The best records for human rights quality are doubtless advanced democracies where their protection is enshrined in their constitutions and political cultures. Power and liberty go together. Human rights are universal in nature; yet, they are, today, best protected under governments of democratic states. Thus, realizing human rights is not a given but a process. The risky idea of one ethical-political community, actually undermines the legitimacy of the sovereign states taking them as arbitrary entities that need to be transcended by world-power.</span></p></div><div class="bout" data-dcnode-id="1430"><span class="count jquery-once-1-processed" data-dcnode-id="1433" id="332"><span data-dcnode-id="1434" instrument_node="">332</span></span><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">What about a normative perspective, a possible world of global democracy – where the demos as the whole of humanity – is envisioned? What would citizenship granted for all entail? The first principle to be damaged is sovereignty: the people is no longer sovereign as it is not a body of citizens but partly a flux of moving in and out immigrants-as-citizens. The second is the trust of the people in the system. The third is solidarity. The foundations of a functioning political community would be severely challenged. It is one thing to pay taxes and gain national security, public health and education, quite another to provide it to every traveler passing by declaring he wants to become a citizen by his universal right.</span></p></div><div class="bout" data-dcnode-id="1425"><span class="count jquery-once-1-processed" data-dcnode-id="1428" id="333"><span data-dcnode-id="1429" instrument_node="">333</span></span><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Crucially, citizenship as membership provides not passive but active membership, namely, political participation. Any format of global rule is going to be distanced from the people. Would participating in this one-world regime correspond to the needs, interests, ideas, or visions of the people who vote? We know that even the most minimal participation in democracies – voting – is on the wane. Could we envision higher rates for a global rule? What if only 30% of the people are going to vote, would this constitute a legitimate rule of law? The legitimation of a democratic regime is based on the trust of the people in the institutional design that embeds values of freedom, equality and welfare. It is not just a one-time approval but an on-going lively political community shaping everyday life of the people. Constitution and elections provide the framework; political culture creates the traditions of dealing with conflicts, the rise of new issues, problems, groups – are part of the on-going democratic project. It is not just rules of the game but playing by the rules that makes a people into a people. Should the ethical and political communities coincide on a global level, the soul of democracy – the demos – would be lost. Human rights are universal; democratic states are the best protectors of human rights as they provide an active framework for realization of these rights and practice self-rule of the demos.</span></p></div><div class="bout" data-dcnode-id="1419"><span class="count jquery-once-1-processed" data-dcnode-id="1423" id="334"><span data-dcnode-id="1424" instrument_node="">334</span></span><p data-dcnode-id="1420"><em data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Changing Empirical Realities: Flexible Citizenship?</span></em></p></div><div class="bout" data-dcnode-id="1414"><span class="count jquery-once-1-processed" data-dcnode-id="1417" id="335"><span data-dcnode-id="1418" instrument_node="">335</span></span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">But what about the other vision, that of multiciplity of communities? Benhabib’s second dimension is the changing empirical realities towards flexible citizenship. In many European countries third-country nationals may vote in local elections and also dual citizenship becomes an option in elites South America (Benhabib, 2007:20). Flexible citizenship allows variability of citizenships – both on local, regional, national and global levels, and cultural, social, economic and political ones.</span></p></div><div class="bout" data-dcnode-id="1409"><span class="count jquery-once-1-processed" data-dcnode-id="1412" id="336"><span data-dcnode-id="1413" instrument_node="">336</span></span><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Think about third-country nationals who participate in local elections in another country: they may work there, and vote for the local candidate but not on issues of taxes, security, education and welfare that are determined on national level. In what sense is this citizenship? In what sense is this meaningful participation? Are they part of the city but not the state? Crucially, this argument plays into the hands of the extreme right: fair terms of employment for foreign workers but no citizenship as ‘France is for the French’ and cultures have inherent features that one cannot acquire by formal citizenship. Benhabib’s argument is thus dangerous in terms of dividing the notion of the demos and facilitating what she herself terms ‘permanent alienage’ (Benhabib, 2001:22): civil and social citizenship rights might be granted without ever completing the transition into full political rights.</span></p></div><div class="bout" data-dcnode-id="1404"><span class="count jquery-once-1-processed" data-dcnode-id="1407" id="337"><span data-dcnode-id="1408" instrument_node="">337</span></span><p data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">The third issue is political representation. Whereas in representative democracy parties are the main actors, flexible citizenship emphasizes global civil society “in which activists from all nations, representing women’s, ecology, ethnic rights, cultural self-determination, economic democracy groups, NGOs and INGOs, gather together, and plan strategy and policy... They are members of the new global civil society” (Benhabib, 2007:31). Isn’t that a positive development, democratizing of democracy, to extend representation into associations, movements and NGOs? First, let’s be reminded that all extreme right phenomena – from neo-Fascists to radical Islam – are part of civil society; there is also dark civil society. Second, the central place of political parties in representative democracy has a complex role. They move up the ladder from identity politics into interest-representation into interests’ aggregation, into ideology formation and set of policies for implantation. There is a tacit and complex role of pulling away from pure identity politics. Going back to identity politics brings to the fore the primordial, the non-negotiable, the raw materials which part of democracy is to transfigure gradually into something else. Moreover, political representation is about worldviews. Politics of identity – both on the extreme right and the radical left – neglects the connection between political and economic views in favor of the particularity of the group and politics of recognition. Identity politics of civil society often delegitimizes institutional democracy.</span></p></div><div class="bout" data-dcnode-id="1398"><span class="count jquery-once-1-processed" data-dcnode-id="1402" id="338"><span data-dcnode-id="1403" instrument_node="">338</span></span><p data-dcnode-id="1399"><em data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Governing beyond the demos?</span></em></p></div><div class="bout" data-dcnode-id="1393"><span class="count jquery-once-1-processed" data-dcnode-id="1396" id="339"><span data-dcnode-id="1397" instrument_node="">339</span></span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">The third level of ruling is governing.</span></p></div><div class="bout" data-dcnode-id="1388"><span class="count jquery-once-1-processed" data-dcnode-id="1391" id="340"><span data-dcnode-id="1392" instrument_node="">340</span></span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">We need transparent and accountable structures of world governance and coordination. Some of these structures are already in sight through the networking of economic, judicial, military, immigration, health and communication experts. They form horizontally networked sites of information, coordination, and regulation. The future of global citizenship lies in becoming actively involved in such transnational organizations and working towards global governance. Whether this implies world government or not is at this stage beside the point: what matters is to increase structures of global accountability and governance (Benhabib, 2007:29).</span></p></div><div class="bout" data-dcnode-id="1383"><span class="count jquery-once-1-processed" data-dcnode-id="1386" id="341"><span data-dcnode-id="1387" instrument_node="">341</span></span><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">The ethical community is governed by a web of organizations providing global governance and deliberative democracy. But what is the legitimacy of these organizations? And what is their responsibility and ability to plan and implement? In representative democracy the responsibility lies with those elected by the people. But civil society lacks accountability. Moreover, the majority of deliberative initiatives are declarative – they develop shared understandings among those who partake in them – but they have no authority over actually making it into a policy and no legitimacy to be deciding on behalf of --- whom? Furthermore, networks of governance are almost always composed of those who have interests in the matter at hand. Instead of protecting the people from private and particular interest global governance adopts them as part of the web of decision makers. The silent majority is out of the web of stakeholders’ deliberation. The self-selectivity of governance by networks, their lack of accountability and responsibility and the bias in their participation in the policy making process makes it highly problematic. Rather than complementing representative democracy, it de-legitimizes the system. Elected members of governments and parliaments are supposed to generate public hearings and decide according to networks and not according to the policy sets and ideologies for which they were chosen by the people. Governing by networks – diversified and plural as it may seem – actually undermines the legitimacy of sovereign states and democratic processes, as well as weaken the demos as the main unit of self-rule by incorporating those with clear interests into the policy making process.</span></p></div><div class="bout" data-dcnode-id="1377"><span class="count jquery-once-1-processed" data-dcnode-id="1381" id="342"><span data-dcnode-id="1382" instrument_node="">342</span></span><p data-dcnode-id="1378"><strong data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">3.3.4 The Demos and Political Equality</span></strong></p></div><div class="bout" data-dcnode-id="1372"><span class="count jquery-once-1-processed" data-dcnode-id="1375" id="343"><span data-dcnode-id="1376" instrument_node="">343</span></span><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Thus, Benhabib’s concept of citizenship disassociates civic and social rights from political rights and envisions many manifestations of global democratic governance beyond and below the states. Her theory of citizenship seems to undermine the idea of self-determination of nations, and rather than propagating a civic demos actually perpetuates cultural, ethnic and national communities. While her ultimate moral community is composed of individuals with human rights in a global world, the units that compose this world are collectivist units which may challenge some of the claims of democracy to universalism, freedom and indeed equality. With no privileged framework to regulate and maintain civic and political rights, the state is undermined but its citizens become more vulnerable. Most important: democratic polities are also about solidarity. Benhabib’s fragmented vision provides no incentive for redistribution within and among states. This brings us to the perspective of political equality in participation, representation and governance.</span></p></div><div class="bout" data-dcnode-id="1366"><span class="count jquery-once-1-processed" data-dcnode-id="1370" id="344"><span data-dcnode-id="1371" instrument_node="">344</span></span><p data-dcnode-id="1367"><em data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Political participation</span></em></p></div><div class="bout" data-dcnode-id="1361"><span class="count jquery-once-1-processed" data-dcnode-id="1364" id="345"><span data-dcnode-id="1365" instrument_node="">345</span></span><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Active civil society gives the impression of extending participation far beyond the meagre act of voting every few years. Moving participation from institutional democracy to global (or local) civil society entails moving from universal participation to voluntary one; from individuals to organizations; from relatively compact participation – voting – into complex engagement. The clear losers of such transformations are the disadvantaged groups. First of all, universal voting is based on political equality; moving towards voluntary participation leaves those who do not have the time, the resources or the education outside of the effective participation circle. Second, despite the fact that universal vote has the pretention of equality, we know that even here the dropping levels of participation is much more dramatic for the poor (Merkel and Petring, 2007). It is all the more so in terms of voluntary associations and deliberative processes in which the participation lies firmly with the highly-educated middle-classes. The vow for political equality is severely harmed. Finally, the more demanding form of participation is less accessible to those without the right kind of knowledge, time and funding and hence entails further discrimination against the disadvantaged. While within a democratic state there is institutionalized solidarity within the demos, and a role of the state to further education and welfare so as to enable participation, there is no such ethos and obligation in global civil society.</span></p></div><div class="bout" data-dcnode-id="1355"><span class="count jquery-once-1-processed" data-dcnode-id="1359" id="346"><span data-dcnode-id="1360" instrument_node="">346</span></span><p data-dcnode-id="1356"><em data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Political Representation</span></em></p></div><div class="bout" data-dcnode-id="1350"><span class="count jquery-once-1-processed" data-dcnode-id="1353" id="347"><span data-dcnode-id="1354" instrument_node="">347</span></span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Deliberative democracy and cosmopolitan politics belittle the role of parties and sovereign states. NGOs, social movements and interest groups become the main actors. The move from the individual to the group is the first hindrance to equality. Furthermore, politics of recognition – symbolic power and the right to be different as a group – often works against economic equality (Fraser). Finally, the main ideological axis of the party system is the Left-Right one, meaning that the major conflict in society is about redistribution of resources, life chances and welfare. Identity politics takes the conflict-field away from economics into culture and out of the state into global civil society, both which decrease the ability of economic and political equality to be central on the political agenda.</span></p></div><div class="bout" data-dcnode-id="1344"><span class="count jquery-once-1-processed" data-dcnode-id="1348" id="348"><span data-dcnode-id="1349" instrument_node="">348</span></span><p data-dcnode-id="1345"><em data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Governing</span></em></p></div><div class="bout" data-dcnode-id="1339"><span class="count jquery-once-1-processed" data-dcnode-id="1342" id="349"><span data-dcnode-id="1343" instrument_node="">349</span></span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">As for governing, working through networks and deliberative governance means that the partners of policy making are no longer elected representatives of the demos, but philanthropic or self-interested groups. Such groups have access to resources, decision makers, communication, Media and funding and thus discriminate against those who have no such resources. Furthermore, there is no accountability and responsibility. The main vow of democratic politics – self-rule of the people by the people for the people – is being severely damaged as the sovereign people has no priority in terms of decision making, the public interest is not clear in a borderless world and it is not clear who governance networks work for – as they have no democratic legitimacy.</span></p></div><div class="bout" data-dcnode-id="1330"><span class="count jquery-once-1-processed" data-dcnode-id="1337" id="350"><span data-dcnode-id="1338" instrument_node="">350</span></span><p data-dcnode-id="1331"><strong data-dcnode-id="1332"><span data-dcnode-id="1336" instrument_node="">3.3.5 Reinstating the </span><em data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Demos</span></em><span data-dcnode-id="1333" instrument_node=""> within Democracy</span></strong></p></div><div class="bout" data-dcnode-id="1325"><span class="count jquery-once-1-processed" data-dcnode-id="1328" id="351"><span data-dcnode-id="1329" instrument_node="">351</span></span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">The crisis of legitimation of late modernity is one of political re-enchantment – in view of the decline of the nation-state and advances in democratic theory that favor plurality and freedom over equality. Can the demos be reconstructed as a core concept of democracy in a post-national constellation? Two major approaches to the contemporary idea of 'the people' might shed light on this question. The first is Laclau's approach in On Populist Reason. Laclau argues that in the end of the day, populism is an empty signifier, one that can be translated into populism, fascism, fundamentalism or democratic precondition alike. History, not normative theory, decides which forms of populism prevail and where. On the other hand, Rancière's notion of politics is one with clear political direction: the people never equal itself. It is an on-going emancipatory project by which new categories of social groupings present themselves as the people and endeavor to gain access to the political. Politics is an emancipatory process of extending the people beyond itself through popular political struggle over equality.</span></p></div><div class="bout" data-dcnode-id="1320"><span class="count jquery-once-1-processed" data-dcnode-id="1323" id="352"><span data-dcnode-id="1324" instrument_node="">352</span></span><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">The legitimation crisis of late-modernity is also one of re-enchantment of politics. We saw that a part of contemporary democratic theory abandons nation as its community and state as its locus and transcend it either towards the global or local communities. Moving towards complexified model of democracy, we asked whether this enriched pluralism has indeed created more opportunities for all citizens within the polity, thus deepening equality, or whether pluralism is actually almost confined to the winners of the knowledge global society: the educated middle classes. If indeed those enjoying diverse forms of political participation, varied kinds of representation, social networks of governance and involvement in deliberative democracy are designated elites, leaving out of the equation the lower classes and the underclass, pluralism, in the context of democratic theory, may actually work against equality.</span></p></div><div class="bout" data-dcnode-id="1315"><span class="count jquery-once-1-processed" data-dcnode-id="1318" id="353"><span data-dcnode-id="1319" instrument_node="">353</span></span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">In order to allow a democratic space with the vision of an ever expanding project, both the demos and equality need to be at the core of democracy. In our world, the state is still the more likely arena for materializing political rights. In a post-national constellation, constitutional-patriotism is too thin and populism-as-fundamentalism is all too dangerous. To go beyond the nation should not mean to abandon the demos; multi-ethnic in its nature hence remote from organic nationalism, and moving towards greater human rights on international scale as a regulative norm, the evolving, equality-striving demos as a creation of democratic states is a guiding principle of humanism. It is therefore still a viable route to claim a civic demos at the heart of democratic polity as the main institutional design to embed political equality.</span></p></div><div class="bout" data-dcnode-id="1309"><span class="count jquery-once-1-processed" data-dcnode-id="1313" id="354"><span data-dcnode-id="1314" instrument_node="">354</span></span><p data-dcnode-id="1310"><strong data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">References</span></strong></p></div><div class="bout" data-dcnode-id="1301"><span class="count jquery-once-1-processed" data-dcnode-id="1307" id="355"><span data-dcnode-id="1308" instrument_node="">355</span></span><p data-dcnode-id="1302"><span data-dcnode-id="1306" instrument_node="">Abers, R. 2000. </span><em data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Inventing Local Democracy. Grassroots Politics in Brazil</span></em><span data-dcnode-id="1303" instrument_node="">, London: Lynne riener Publishers.</span></p></div><div class="bout" data-dcnode-id="1296"><span class="count jquery-once-1-processed" data-dcnode-id="1299" id="356"><span data-dcnode-id="1300" instrument_node="">356</span></span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Akrich, Madelaine (1992), 'The De-scription of Technical Objects', in W.E.; Law Bijker, J. (ed.), Shaping Technology/Building Society - Studies in Sociotechnical Change (Cambridge MA: MIT Press), 205-24.</span></p></div><div class="bout" data-dcnode-id="1291"><span class="count jque Verloo 2007).</span></p></div><div class="bout" data-dcnode-id="275"><span class="count jquery-once-1-processed" data-dcnode-id="280" id="558"><span data-dcnode-id="281" instrument_node="">558</span></span><p data-dcnode-id="276"><a data-dcnode-id="278" href="#_ftnref4" name="_ftn4" title=""><span data-dcnode-id="279" instrument_node="">[4]</span></a><span data-dcnode-id="277" instrument_node=""> US census: https://www.census.gov/content/dam/Census/newsroom/c-span/2015/20150130_cspan_youngadults.pdf</span></p></div><div class="bout" data-dcnode-id="268"><span class="count jquery-once-1-processed" data-dcnode-id="273" id="559"><span data-dcnode-id="274" instrument_node="">559</span></span><p data-dcnode-id="269"><a data-dcnode-id="271" href="#_ftnref5" name="_ftn5" title=""><span data-dcnode-id="272" instrument_node="">[5]</span></a><span data-dcnode-id="270" instrument_node=""> http://lordashcroftpolls.com/2016/06/how-the-united-kingdom-voted-and-why/</span></p></div><div class="bout" data-dcnode-id="255"><span class="count jquery-once-1-processed" data-dcnode-id="266" id="560"><span data-dcnode-id="267" instrument_node="">560</span></span><p data-dcnode-id="256"><a data-dcnode-id="264" href="#_ftnref6" name="_ftn6" title=""><span data-dcnode-id="265" instrument_node="">[6]</span></a><span data-dcnode-id="263" instrument_node=""> Following Arditi (2008) I take this definition of a parasite from Jacques Derrida (1988, 90): “The parasite then ‘takes place.’ And at the bottom, whatever violently ‘takes place’ or occupies a site is always </span><em data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">something </span></em><span data-dcnode-id="260" instrument_node="">of a parasite. </span><em data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Never quite </span></em><span data-dcnode-id="257" instrument_node="">taking place is then part of its performance, or its success, as an event, or its ‘taking place.’” Populism is a permanent possibility within representative democracy, and the “never taking place” refers to its being a permanent mobilizing possibility even when it is strong enough to manifest its power. If all the populist potentials were actualized it would replace representative democracy altogether but this would be a regime change (like what happened when fascism “took place”).</span></p></div><div class="bout" data-dcnode-id="248"><span class="count jquery-once-1-processed" data-dcnode-id="253" id="561"><span data-dcnode-id="254" instrument_node="">561</span></span><p data-dcnode-id="249"><a data-dcnode-id="251" href="#_ftnref7" name="_ftn7" title=""><span data-dcnode-id="252" instrument_node="">[7]</span></a><span data-dcnode-id="250" instrument_node=""> UN Charter (1945), art. 1.</span></p></div><div class="bout" data-dcnode-id="241"><span class="count jquery-once-1-processed" data-dcnode-id="246" id="562"><span data-dcnode-id="247" instrument_node="">562</span></span><p data-dcnode-id="242"><a data-dcnode-id="244" href="#_ftnref8" name="_ftn8" title=""><span data-dcnode-id="245" instrument_node="">[8]</span></a><span data-dcnode-id="243" instrument_node=""> See the U.N. Charter (1945) art. 56, the United Nations Millennium Declaration (2000), (aiming to reduce extreme poverty); Marrakesh Agreement Establishing the World Trade Organization, (1994); United Nations Framework Convention on Climate Change (1992) art. 11, the Montreal Protocol on Substances that Deplete the Ozone Layer (1987), (aiming to reduce ozone-depleting substances), General Agreement on Tariffs and Trade (1947).</span></p></div><div class="bout" data-dcnode-id="234"><span class="count jquery-once-1-processed" data-dcnode-id="239" id="563"><span data-dcnode-id="240" instrument_node="">563</span></span><p data-dcnode-id="235"><a data-dcnode-id="237" href="#_ftnref9" name="_ftn9" title=""><span data-dcnode-id="238" instrument_node="">[9]</span></a><span data-dcnode-id="236" instrument_node=""> To be clear, the mandatory aim of alleviating severe global poverty, I think, argues strongly for much greater openness to migration.&nbsp; I make this argument in detail in (Christiano 2016).</span></p></div><div class="bout" data-dcnode-id="227"><span class="count jquery-once-1-processed" data-dcnode-id="232" id="564"><span data-dcnode-id="233" instrument_node="">564</span></span><p data-dcnode-id="228"><a data-dcnode-id="230" href="#_ftnref10" name="_ftn10" title=""><span data-dcnode-id="231" instrument_node="">[10]</span></a><span data-dcnode-id="229" instrument_node=""> See, for example, Keohane and Victor (2011: 9, 12, 15) for a discussion of how uncertainty plays a role in motivating and perhaps justifying fragmentation of regimes attempting to deal with global problems.</span></p></div><div class="bout" data-dcnode-id="214"><span class="count jquery-once-1-processed" data-dcnode-id="225" id="565"><span data-dcnode-id="226" instrument_node="">565</span></span><p data-dcnode-id="215"><a data-dcnode-id="223" href="#_ftnref11" name="_ftn11" title=""><span data-dcnode-id="224" instrument_node="">[11]</span></a><span data-dcnode-id="222" instrument_node=""> </span><em data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Jus Cogens</span></em><span data-dcnode-id="219" instrument_node=""> norms are norms that are generally recognized by the community of states as having a peremptory force, from which no derogation is permitted.&nbsp; Whether they are moral norms or positive norms remains a matter of controversy and which norms are on the limited list of </span><em data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">jus cogens</span></em><span data-dcnode-id="216" instrument_node=""> is also a matter of controversy. See Vienna Convention on the Law of Treaties art. 53.</span></p></div><div class="bout" data-dcnode-id="207"><span class="count jquery-once-1-processed" data-dcnode-id="212" id="566"><span data-dcnode-id="213" instrument_node="">566</span></span><p dat
