id="2869" id="91"><span data-dcnode-id="2870" instrument_node="">91</span></span><p data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">While the past 100 years have seen extraordinary progress toward ethnic peace and equality, democracies still face obstacles to ensuring political equality for all. Citizens from ethnic minority groups are more likely profiled by the police, which in turn leads to higher rates of arrest, prosecution, incarceration, and disenfranchisement. They have more trouble accessing public goods like housing, food, childcare, schools, and nutritious food. These socioeconomic disparities make it difficult for ethnic minorities to participate politically because they lack the time, knowledge, networks, and capital to do so. Residential and social segregation exacerbate stereotypes and make citizens less likely to engage on terms of mutual respect. Political parties often exaggerate these stereotypes, enflaming voters to hoard resources for their co-ethnic group. In some cases, voters may even use democratic processes to oppress individuals from ethnic minority groups, as has been the case with direct ballot referenda.</span></p></div><div class="bout" data-dcnode-id="2861"><span class="count jquery-once-1-processed" data-dcnode-id="2864" id="92"><span data-dcnode-id="2865" instrument_node="">92</span></span><p data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">This is by no means an exhaustive account of the challenges facing democracies who strive toward political equality between members of ethnic groups. Rather, these challenges are representative of broader challenges concerning civil rights and liberties, the distribution of resources, and the procedures used to ascertain and uphold the general will. We are encouraged by the progress that has been made along each of these dimensions since the 19th century, and hopeful that we countries can continue along this trajectory by investigating and responding to persistent inequalities facing ethnic minority groups worldwide.</span></p></div><div class="bout" data-dcnode-id="2856"><span class="count jquery-once-1-processed" data-dcnode-id="2859" id="93"><span data-dcnode-id="2860" instrument_node="">93</span></span><h3 data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">2.2 Democracy and Religious Inequality: Advocating “Principled Distance”</span></h3></div><div class="bout" data-dcnode-id="2851"><span class="count jquery-once-1-processed" data-dcnode-id="2854" id="94"><span data-dcnode-id="2855" instrument_node="">94</span></span><p data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">The defining feature of democracy, as already expressed in the introduction, is that all groups and persons be recognised as equal and valued members of the society to which they belong. If this is so, and if, further, the collective decision making process is the public realisation of the equal worth of every citizen, then any practice that involves discrimination, exclusion, marginalization or oppression of groups and persons violates the principle of democracy. For our purpose here, inequality may be viewed as a condition where such exclusionary and/or discriminatory practices thrive, where power is illegitimately deployed to thwart the basis interests and values of individuals and groups. A fully realized democracy then cannot coexist with inequality.</span></p></div><div class="bout" data-dcnode-id="2846"><span class="count jquery-once-1-processed" data-dcnode-id="2849" id="95"><span data-dcnode-id="2850" instrument_node="">95</span></span><p data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">The focus of this section is on one such type of inequality namely: religious inequality. Religious inequality can be of two kinds. In a society with multiple religions, members of one religious group may treat members of other religious groups as unequals,&nbsp; as when a government controlled by non-Muslims&nbsp; refuses permission to build a mosque with minarets, or when Christian schools are provided subsidies but not schools run by Muslims,&nbsp; Sikhs are prevented from wearing turbans in public schools, or Hindus and Christians are debarred from standing for public office in an Islamic state. Let this be called inter-religious inequality. A second kind of religious inequality also persists in many societies. Consider the persecution of Shias by Sunnis or the de-recognition of Ahmadiyas as Muslims. Here members of a broadly conceived religious group treat their own members as unequals. Let this be called intra-religious inequality. Another deeper form of intra-religious inequality also exists. For example, in India a whole group of people, formerly called ‘the untouchables’ continue to find it difficult to enter many Hindu temples;&nbsp; in some places, women are still hounded because they are believed to be&nbsp; witches, women between the ages of 50-55 are not allowed entry into a temple because they are menstruating and therefore believed to be polluted; the evidence of one Muslim male is seen to be equal to the evidence of two Muslim females, and the highest offices of churches are not open to women.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2841"><span class="count jquery-once-1-processed" data-dcnode-id="2844" id="96"><span data-dcnode-id="2845" instrument_node="">96</span></span><p data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">The question before us is how should states deal with these different forms of religious inequalities. Are democratic states in a better position to address such inequalities than non-democratic states? Furthermore, are some forms of democratic states better equipped to deal with religious inequalities than others? While the distinction between democratic and non-democratic states is important, an even more important distinction for our purpose is between religion-centred and secular states. It is our view that all religion-centred states perpetuate religious inequalities and&nbsp; violate important principles of democracy.&nbsp; If the reduction of religious inequalities is our objective, then, it is argued here, religion-centred states must give way to secular states.&nbsp; Only secular democratic state can undermine religious inequalities. But this simple answer does not suffice because all forms of secular-democratic states are not equally capable of addressing religious inequality. This begs the question: which form of secular-democratic state is best able to reduce both intra- and inter-religious inequalities?&nbsp; To answer this question is the central objective of this section.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2836"><span class="count jquery-once-1-processed" data-dcnode-id="2839" id="97"><span data-dcnode-id="2840" instrument_node="">97</span></span><p data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">What are religion-centred and secular states? Religion-centred states grant privileged recognition to any one religion. They promote the values and interests of that religion and justify most of their laws and policies in terms of these values or interests. Sometimes, entire apparatus of such states is run by religious personnel. The connection of states with religion is so strong and constitutive that their very identity is defined by religion. Such states then are Christian, Islamic or Hindu.</span></p></div><div class="bout" data-dcnode-id="2831"><span class="count jquery-once-1-processed" data-dcnode-id="2834" id="98"><span data-dcnode-id="2835" instrument_node="">98</span></span><p data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">Secular states are different. They withdraw privileges that any established religion had previously taken for granted. This they can do only when their primary ends or goals are defined independently of religion. Thus, a crucial requirement of a secular state is that it has no constitutive links with religion, that the ends of any religion not be installed as the ends of the state. For example, it cannot be the constitutive objective of the state to ensure salvation, nirvana, or moksha. Nor can it be a requirement of the state that it increases the membership of any religious community or individuals from one religion to another. No religious community in such a state can say that the state belongs exclusively to it. The identity of the state is defined independently of religion, and certainly independently of any one religion. Furthermore, laws and policies of such states cannot be justified solely in terms of by reasons provided by any one religion. Indeed, they are largely justified independently of all religions.&nbsp; This is largely what is meant when it is said that in a secular state, a formal or legal union or alliance between state and religion is impermissible.</span></p></div><div class="bout" data-dcnode-id="2826"><span class="count jquery-once-1-processed" data-dcnode-id="2829" id="99"><span data-dcnode-id="2830" instrument_node="">99</span></span><p data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">Which of the two, religion-centred or secular states can better undermine religious inequalities and build an inclusive society and polity on fair and equal terms? A cursory evaluation of these states shows that all religion-centred states are deeply troublesome. Take first historical instances of states that establish a single church, the unreformed established Protestant Churches of England, Scotland and Germany, and the Catholic Churches in Italy and Spain. These states recognized a particular version enunciated by the church as the official religion, compelled individuals to congregate for only one church, punished them for failing to profess a particular set of religious beliefs, levied taxes in support of one particular church, paid the salaries of only its clergy, made instruction of the favoured interpretation of the religion mandatory in educational institutions or in the media. (Levy 1994, 5)&nbsp; In such cases, not only was there inequality among religions (for example between Christians and Jews) but also among the churches of the same religion, and while members of the established church may have enjoyed a modicum of religious liberty, those belonging to other churches or religions did not enjoy any or the same degree of liberty.&nbsp; When members of other church or religious groups possessed strength or number, then such a multi-religious or multiple-denominational society was invariably wrecked by inter-religious or inter-denominational wars.&nbsp; If they did not, then religious minorities were not even tolerated and faced persistent religious persecution. (as in the case of Jews in several European countries till the 19th century)&nbsp;</span></p></div><div class="bout" data-dcnode-id="2821"><span class="count jquery-once-1-processed" data-dcnode-id="2824" id="100"><span data-dcnode-id="2825" instrument_node="">100</span></span><p data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">States with substantive establishments have not changed colour with time. Wherever one religion is not only formally but substantively established, the persecution of minorities and internal dissenters continues today.&nbsp; One has only to cite the example of Saudi Arabia to prove this point (Ruthven 2002, 172-181). Or consider the situation in Pakistan where the virtual establishment of the dominant Sunni sect has proved to be disastrous to minorities, including to Muslim minorities. For example, under Article 260 of the constitution Ahmedis have been deemed as a non-Muslim minority and forbidden from using Islamic nomenclature in their religious and social lives. (Malik 2002, 10, Bhargava 2004, 30;) A whole community has thereby been formally excluded by the state, both symbolically and materially, from its own religion.&nbsp; For over three decades, citizenship in Pakistan is defined with reference to majoritarian and exclusionary Islamic parameters. Therefore, political exclusion is built into the basic law of the land. By making adherence to Islam mandatory for anyone aspiring to the highest offices in the country, the Constitution ensures the exclusion of religious minorities from high politics. (Malik 2002, 16).</span></p></div><div class="bout" data-dcnode-id="2816"><span class="count jquery-once-1-processed" data-dcnode-id="2819" id="101"><span data-dcnode-id="2820" instrument_node="">101</span></span><p data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">I have taken Pakistan only as an illustration. Many people in India believe that the establishment of a Hindu Rashtra would be disastrous, particularly for Muslim minorities, perhaps even for the Dalits, (former untouchables). Likewise the Jewish state of Israel fails to grant equal rights to its Christian and Muslim minorities.</span></p></div><div class="bout" data-dcnode-id="2811"><span class="count jquery-once-1-processed" data-dcnode-id="2814" id="102"><span data-dcnode-id="2815" instrument_node="">102</span></span><p data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">So if religious inequalities are to be reduced, religion-centred states must be dismantled. However, while secular democratic states are committed to equality of citizenship and to various freedoms, they also differ from one another in their respective understandings of how they must relate to religion. All agree that they must be separated or disconnected, but differ on how the metaphor of separation is to be unpacked. For one, separation is total disconnection or mutual exclusion. Here religion is excluded from the affairs of the state but the state too is excluded from the affairs of the religion.&nbsp; The state has neither a positive relationship with religion, for example there is no policy of granting aid to religious institutions nor a negative relationship with it; it is not within the scope of state activity to interfere in religious matters. The Constitutional state of the US is frequently interpreted to instantiate this model. It is seen to advocate mutual exclusion of state and religion (build a wall) primarily for the sake of religious liberty and denominational pluralism. Thus by protecting religious freedom of all groups and ensuring inter-denominational equality as also by ruling out discrimination in the official domain on grounds of religion, this model prevents certain forms of religious inequalities. However, it has two major limitations. (a) By its refusal to negatively intervene in religious practices, it allows discriminatory and oppressive practices within a religion to continue. (b) By eschewing any positive help to all religious groups, it overlooks that some vulnerable religious minorities may require assistance from the state for its members to live as equals of those belonging to the majority religion. Deeper structural religion based inequalities may therefore continue to persist in societies governed by this model.</span></p></div><div class="bout" data-dcnode-id="2806"><span class="count jquery-once-1-processed" data-dcnode-id="2809" id="103"><span data-dcnode-id="2810" instrument_node="">103</span></span><p data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">In another, second type, disconnection is partial and is conceived at the level of law and public policy in a wholly one-sided manner.&nbsp; Here to disconnect is to exclude religion from the affairs of the state but to have no limits on the state's interventionist powers in the affairs of religion.&nbsp; Such intervention may mean help or hindrance but in either case the motive is to control, regulate and even to destroy religion. Such secular states are decidedly anti-religious.&nbsp;They often advocate one sided exclusion primarily for the sake of a stringently guarded common public culture that gives a uniform and equal identity to citizens. In their authoritarian form this model is at least partly exemplified in Kemalist Turkey and Soviet Russia. Its democratic version is best enunciated in France</span></p></div><div class="bout" data-dcnode-id="2801"><span class="count jquery-once-1-processed" data-dcnode-id="2804" id="104"><span data-dcnode-id="2805" instrument_node="">104</span></span><p data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">These secular states (model 2) have one advantage over model 1. Since they are willing to intervene in religious affairs, they can undercut oppressive and exclusionary religious practices and achieve some forms of inter-religious equality. However by refusing to grant positive recognition or financial aid particularly to newly immigrated religious groups and by their obstinate refusal to acknowledge the entanglement of both official and public practices with a historically embedded majority religion, they at least unwittingly perpetuate inter-religious inequality. At the very extreme, by their readiness to hinder and unwillingness to help even the dominant majority religion, they may create new inequalities between believers and unbelievers and undermine religious freedoms.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2796"><span class="count jquery-once-1-processed" data-dcnode-id="2799" id="105"><span data-dcnode-id="2800" instrument_node="">105</span></span><p data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">Partial disconnection is also the form of state-religion relationship in the third (model 3) type of secular-democratic state. Disconnection is partial here because the state continues to partially support one religion, usually the dominant one, on the ground that it is part of cultural inheritance and historical legacy of its citizens and therefore a significant public good. Such states are found in large parts of Western Europe, excluding France. Such secular-democratic states may not be religion-centred but they remain single religion-friendly. Why, if they provide to support to one religion, are such states secular?</span></p></div><div class="bout" data-dcnode-id="2791"><span class="count jquery-once-1-processed" data-dcnode-id="2794" id="106"><span data-dcnode-id="2795" instrument_node="">106</span></span><p data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">There are several reasons why this is so. First, (a) because of a historical pattern of hostility to church and church-based religions on the ground that they were politically meddlesome and socially oppressive—a pattern that appeared militantly and robustly in the unchurching struggles in France but is also to be found to a significant degree in most West European countries. As a result, the social and political power of churches has been largely restricted. (b) Second, there has over time been a decline not only in church belonging but also in belief in Christianity. If there is one place where secular humanism or what Charles Taylor calls exclusive humanism is strong, even naïvely taken for granted as the only ontological and epistemological game in town, it is surely Western Europe. Both (a) and (b) have had an impact on Europe’s constitutional regimes. A fair degree of disconnection exists at the levels of ends, and so the same basket of formal rights (to different kinds of liberty, and forms of equality, etc.) are offered to all individuals regardless of their church affiliation and regardless of whether they are or are not religious. In the dominant political discourse, the self-definition of these states is that they are not religious (Christian) but (purely) liberal democratic.</span></p></div><div class="bout" data-dcnode-id="2786"><span class="count jquery-once-1-processed" data-dcnode-id="2789" id="107"><span data-dcnode-id="2790" instrument_node="">107</span></span><p data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">However, it is equally true that some connection exists between state and religion. Several states continue to grant monopolistic privileges to one or the other branch of Christianity. Examples include the Presbyterian Church in Scotland, the Lutheran Church in all Nordic countries (except Sweden where it was recently disestablished), the Orthodox Church in Greece, and the Anglican Church in England where twenty-four bishops sit in the House of Lords with full voting rights and where the monarch is also the head of the church. Moreover, at the level of law and public policy, state intervention exists in the form of support either for the dominant church or of Christian churches. Thus there is neither mutual nor one-sided exclusion of religion, but positive entanglement with it. None of this entails that such states are confessional or have strong establishment. These are not religion-centred but single-religion friendly states. State-religion connections combined with a significant degree of disconnection mean that these democratic states are at best modestly secular by the standards set by the idealized American model or the French model. Indeed, Tariq Modood has called the secularism underpinning these states “moderate secularism”.</span></p></div><div class="bout" data-dcnode-id="2781"><span class="count jquery-once-1-processed" data-dcnode-id="2784" id="108"><span data-dcnode-id="2785" instrument_node="">108</span></span><p data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">How do religion-friendly states of Western Europe fare when evaluated by norms of religious equality?&nbsp; Not all that well, it seems. Blind to the more complex dimension of inter-religious inequalities, they do not even see that in this dimension they are not secular. On the complex scale of inter- and intra-religious equality, we find all kinds of institutional biases beginning to show up in European state-religion arrangements. Despite all changes, European states have continued to privilege Christianity in one form or another. The liberal democratization and the consequent secularization of many European states have helped citizens with non-Christian faiths to acquire most formal rights. But such a scheme of rights neither embodies a regime of interreligious equality nor effectively prevents religion-based discrimination and exclusion. Indeed, it masks majoritarian, ethno-religious biases. Thus, to go back to the example of schools run by religious communities, one finds that only two to five schools run by Muslims are provided state funding. In France there is at least one state-funded Muslim school (in Réunion), and about four or five new private Muslim schools that are in the process of signing “contrats d’association” with the state. In Germany the situation is probably worse: There is not a single school run by Muslims that is funded by the state. This is one clear example of European states failing to be secular. There are many others. For example, the bias is manifest in the failure of many Western European states to deal with the issue of headscarves (most notably France), in unheeded demands by Muslims to build mosques and therefore to practice their own faith properly (Germany and Italy), in discrimination against ritual slaughter (Germany), and in unheeded demands by Muslims for proper burial grounds of their own (Denmark, among others). All these are issues of interreligious inequalities.</span></p></div><div class="bout" data-dcnode-id="2776"><span class="count jquery-once-1-processed" data-dcnode-id="2779" id="109"><span data-dcnode-id="2780" instrument_node="">109</span></span><p data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">So, do forms or conceptions of secular-democratic states that better address religious inequalities exist? Ones that advocate neither (a) mutual exclusion nor (b) one-sided exclusion of religion, nor indeed a friendliness solely towards&nbsp; one religion,? One particular form outside the West (in the Indian sub-continent) that has tried, often unsuccessfully, to eliminate deep religious inequalities, and which currently lies in shambles everywhere, needs careful attention.&nbsp;&nbsp;</span></p></div><div class="bout" data-dcnode-id="2771"><span class="count jquery-once-1-processed" data-dcnode-id="2774" id="110"><span data-dcnode-id="2775" instrument_node="">110</span></span><p data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">Several features of this fourth kind of secular-democratic state are worth mentioning. First, multiple religions exist in their background not as optional extras added on as an afterthought but as part of its foundation. These secular democratic states are inextricably tied to deep religious diversity. Second, they are committed to deeply diverse set of values, not only liberty and equality but also fraternity (or sociability)— conceived not narrowly as pertaining only to individuals but interpreted broadly also to cover the relative autonomy of religious communities and, in limited and specific domains, their equality of status in society—as well as other to foster a certain quality of relations among religious communities, perhaps even interreligious equality under conditions of deep religious diversity. They have a place not only for the right of individuals to profess their religious beliefs but also for the right of religious communities to, say, establish and maintain educational institutions crucial for the survival and sustenance of their distinctive religious traditions.</span></p></div><div class="bout" data-dcnode-id="2766"><span class="count jquery-once-1-processed" data-dcnode-id="2769" id="111"><span data-dcnode-id="2770" instrument_node="">111</span></span><p data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">The acceptance of community-specific rights brings me to the third feature of this model. Because this form of secular democratic state was born in a deeply multi-religious society, it is concerned as much with interreligious inequality as it is with intrareligious inequality. Whereas other secular democratic states appear to provide benefits to minority religious groups only incidentally (e.g., Jews benefited in some European countries such as France not because their special needs and demands were met via public recognition but because of a more general restructuring of society guided by an individual-based emancipatory agenda), in such states some community-specific sociocultural rights are granted for their intrinsic value. Common citizenship rights are not seen as incompatible with community-specific rights in limited domains such as education.</span></p></div><div class="bout" data-dcnode-id="2761"><span class="count jquery-once-1-processed" data-dcnode-id="2764" id="112"><span data-dcnode-id="2765" instrument_node="">112</span></span><p data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">Fourth, such secular democratic states do not erect a wall of separation between religion and state. There are boundaries, of course, but they are porous. This situation allows the state to intervene in religions in order to help or hinder them without the impulse to control or destroy them. This intervention can include granting aid to educational institutions of religious communities on a non-preferential basis and interfering in socio-religious institutions that deny equal dignity and status to members of their own religion or to those of others; for example, the ban on untouchability and the obligation to allow everyone, irrespective of their caste, to enter Hindu temples, as well as, potentially, other actions to correct gender inequalities. In short, this form of secular democratic state interprets separation to mean not strict exclusion or strict neutrality, but what I call principled distance, which is poles apart from one-sided exclusion or mutual exclusion.</span></p></div><div class="bout" data-dcnode-id="2756"><span class="count jquery-once-1-processed" data-dcnode-id="2759" id="113"><span data-dcnode-id="2760" instrument_node="">113</span></span><p data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">When I say that principled distance allows for both engagement with or disengagement from religion, what kind of treatment do I have in mind? First, religious groups have sought exemptions when states have intervened in religious practices by promulgating laws designed to apply neutrally across society. This demand for non-interference is made on the grounds either that the law requires them to do things not permitted by their religion or that it prevents them from doing things mandated by their religion. For example, Sikhs demand exemptions from mandatory helmet laws and from police dress codes to accommodate religiously required turbans. Principled distance allows a practice that is banned or regulated in the majority culture to be permitted in the minority culture because of the distinctive status and meaning it has for the minority culture’s members. For other forms of secular-democratic states, this variability is a problem because of a simple and somewhat absolutist morality that attributes overwhelming importance to one value—particularly to equal treatment, equal liberty, or equality of individual citizenship. Religious groups may demand that the state refrain from interference in their practices, but they may equally demand that the state interfere in such a way as to give them special assistance so that they are able to secure what other groups are routinely able to acquire by virtue of their social dominance in the political community. The state may grant authority to religious officials to perform legally binding marriages or to have their own rules for or methods of obtaining a divorce. Principled distance allows the possibility of such policies on the grounds that holding people accountable to a law to which they have not consented might be unfair. Furthermore, While it does not discourage public justification; that is, justification based on reasons endorsable by all, it accepts that if the attempt to arrive at public justification fails, religiously minded citizens may support coercive laws that, although based purely on religious reasons, are consistent with freedom and equality.</span></p></div><div class="bout" data-dcnode-id="2751"><span class="count jquery-once-1-processed" data-dcnode-id="2754" id="114"><span data-dcnode-id="2755" instrument_node="">114</span></span><p data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">Principled distance is not just a recipe for differential treatment in the form of special exemptions. It may even require state intervention and, moreover, in some religions more than in others, consideration of the historical and social condition of all relevant religions. To take first examples of positive engagement, some holidays of all majority and minority religions are granted national status. Subsidies are provided to schools run by all religious communities. Minority religions are granted a constitutional right to establish and maintain their educational institutions. Limited funding may be available to Muslims for Hajj. But state engagement can also take a negative interventionist form. For the promotion of a particular value constitutive of secularism, some religion, relative to other religions, may require more interference from the state. For example, suppose that the value to be advanced is social equality. This requires in part undermining caste and gender hierarchies. Hindu temples in India were thrown open to all, particularly to former untouchables should they choose to enter them. Likewise, constitutionally it is possible to undertake gender-based reforms in Hindu or personal Muslim personal law.</span></p></div><div class="bout" data-dcnode-id="2746"><span class="count jquery-once-1-processed" data-dcnode-id="2749" id="115"><span data-dcnode-id="2750" instrument_node="">115</span></span><p data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">Fifth, such states are not compelled to choose between active hostility and passive indifference or between disrespectful hostility and respectful indifference towards religion. They combine the two, permitting necessary hostility as long as there is also active respect. The state may intervene to inhibit some practices as long as it shows respect for other practices of the religious community and does so by publicly lending support to them. This is a complex dialectical attitude to religion that I have called critical respect. So, on the one hand, the state protects all religions, makes them feel equally at home, especially vulnerable religious communities, by granting them community-specific rights. For instance, the right to establish and maintain their own educational institutions and the provision of subsidies to schools run by religious communities. But the state also hits hard at religion-based oppression, exclusion, and discrimination, in short all forms of religious inequalities.</span></p></div><div class="bout" data-dcnode-id="2741"><span class="count jquery-once-1-processed" data-dcnode-id="2744" id="116"><span data-dcnode-id="2745" instrument_node="">116</span></span><p data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">This section has argued that secular-democratic states of the principled distance variety have a better chance of reducing religious inequalities. In sum, a society progresses the more it moves away from (a) a religion-centred to a secular-democratic state and (b) secular-democratic states hostile or aloof from religions generally or friendly exclusively to one religion to those that keep a principled distance from all religions.</span></p></div><div class="bout" data-dcnode-id="2736"><span class="count jquery-once-1-processed" data-dcnode-id="2739" id="117"><span data-dcnode-id="2740" instrument_node="">117</span></span><h3 data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">2.3 The challenge of gender inequality</span></h3></div><div class="bout" data-dcnode-id="2731"><span class="count jquery-once-1-processed" data-dcnode-id="2734" id="118"><span data-dcnode-id="2735" instrument_node="">118</span></span><p data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">Gender equality is a Mission Impossible, at this point in time more than ever. There are three main reasons for that. One is that there is an ongoing perpetuum mobile of gender inequality that is driven by both structures and daily actions of human beings across all domains and dimensions of life. The second is that gender equality as an objective is deeply political and inherently contested. And finally, while deep democracy is needed to mobilize and organize the inevitable ongoing feminist struggles that could address the tenacity and complexity of gender inequality, unfortunately democracy at this point in history seems to be shrinking and deepening and strengthening.</span></p></div><div class="bout" data-dcnode-id="2726"><span class="count jquery-once-1-processed" data-dcnode-id="2729" id="119"><span data-dcnode-id="2730" instrument_node="">119</span></span><p data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">My argument here is not to respond to these triple troubles by showing that they can be resolved. Rather, I will argue that this calls for more attention to the linkages between the fates of democracy and of gender equality, and for more feminist engagement in struggles for deeper democracy. In order to do this, I will first elaborate on the pervasiveness and the tenacity of gender inequality in our societies, and then on the political nature of gender equality as a goal. I will continue with presenting a perspective on deep democracy that is needed to address the interrelation between gender equality and democracy and a sad illustration of the current fate of democracy in Europe. I will end with a call for action.</span></p></div><div class="bout" data-dcnode-id="2720"><span class="count jquery-once-1-processed" data-dcnode-id="2724" id="120"><span data-dcnode-id="2725" instrument_node="">120</span></span><p data-dcnode-id="2721"><strong data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">2.3.1 The pervasiveness and the tenacity of gender inequality in our societies</span></strong></p></div><div class="bout" data-dcnode-id="2715"><span class="count jquery-once-1-processed" data-dcnode-id="2718" id="121"><span data-dcnode-id="2719" instrument_node="">121</span></span><p data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">Even the shortest look at feminist history shows how significant victories in the past have never been enough to end gender inequality. Women’s access to higher education, their legal personhood, women’s suffrage, all these hard-won long battles by brave and engaged feminists did not bring the end of male domination. If anything, they revealed the tenacity and complexity of gender inequality regimes. Gender inequality regimes have proven to be very flexible in readapting to changed contexts and structures. Non-discrimination laws or formal governmental regulations obliging governments to do gender budgeting or gender mainstreaming have not changed reality as intended. Progress is made, but mostly partial and never ensured. The impact of ongoing gender inequality on people’s lives is huge, given that women are half of the world’s population, and gender inequality also restricts the lives of men that do not fit well in gender norms.</span></p></div><div class="bout" data-dcnode-id="2710"><span class="count jquery-once-1-processed" data-dcnode-id="2713" id="122"><span data-dcnode-id="2714" instrument_node="">122</span></span><p data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">By now, we know something about the reasons why progress is so slow. The tenacity and complexity of gender inequality regimes is caused by the multilevel and multidimensional character of gender, by its location in all social domains, and by its deep connections to other inequalities. And as the world is deeply social, none of this is fixed, and everything is in flux. The multilevel character of gender means that gender is part of societal structures and organizations, of symbols and norms, of identities and behavior. Identities, personalities, routinized behavior, symbols, norms and structures are made and remade on a daily basis by the human beings on this planet. They make conscious decisions about this gendered world and their positioning in it, but also often just routinely follow the gendered tracks or scripts that history provides in their contexts. It is hard to think of a domain where these gendered tracks or scripts would be absent. Gender inequality is based in both public and private spheres, and is crucial to constructing what is seen as public and what is seen as private (similar to sexual inequality). Whether in economy, polity, violence, health or knowledge, the gender unequal configurations of the past offer the material that people use to make their lives, provide the words and signs people use to be accepted and understood by others. In doing so, people reproduce and to some degree reorganize these gendered tracks, these gendered words, this gendered world across all domains. Whether people benefit or suffer from it depends on their gendered locations (men, women or non-binary).</span></p></div><div class="bout" data-dcnode-id="2705"><span class="count jquery-once-1-processed" data-dcnode-id="2708" id="123"><span data-dcnode-id="2709" instrument_node="">123</span></span><p data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">Feminist collective action – focused political pressure to change an element of these inequality regimes – such as quota in politics, a more permissive abortion law, father’s leave or the opening of shelters for domestic violence victims, tries to make change happen, and their hard-won victories matter. They are small steps with tremendous impact on the lives of some women (and men). At the same time, there are intersectional caveats to most victories: not all women, not all men are equally able to benefit from these measures. Quota in politics might be opening space mostly for high educated women, access to abortion might be almost impossible for rural women, gay fathers may not be eligible to father’s leave, minority women victim of domestic violence might have good reason to not engage with social work driven shelters for fear of stigmatizing of their communities or custody of their children taken away from them.</span></p></div><div class="bout" data-dcnode-id="2700"><span class="count jquery-once-1-processed" data-dcnode-id="2703" id="124"><span data-dcnode-id="2704" instrument_node="">124</span></span><p data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">It is clear then that it is very hard to fundamentally change gender inequality dynamics, to abolish gender inequality. Collective action’s role to induce and support change is well demonstrated. But what are the conditions that foster such actions? What makes feminist collective actions successful? How can it be ensured that these are victories for all women? To answer to these questions, the quality of democracy is key. The quality of democracy matters for gender equality because the tenacity of gender inequality in our societies calls for better conditions for feminist collective action, and such action can only thrive in democracies. This is a matter of both theory and practice, of both a better understanding of the politics needed and more engagement to make these politics happen.</span></p></div><div class="bout" data-dcnode-id="2691"><span class="count jquery-once-1-processed" data-dcnode-id="2698" id="125"><span data-dcnode-id="2699" instrument_node="">125</span></span><p data-dcnode-id="2692"><strong data-dcnode-id="2693"><span data-dcnode-id="2697" instrument_node="">2.3.2 The political nature of gender equality</span><a data-dcnode-id="2695" href="#_ftn3" name="_ftnref3" title=""><span data-dcnode-id="2696" instrument_node="">[3]</span></a><span data-dcnode-id="2694" instrument_node=""> as a goal</span></strong></p></div><div class="bout" data-dcnode-id="2686"><span class="count jquery-once-1-processed" data-dcnode-id="2689" id="126"><span data-dcnode-id="2690" instrument_node="">126</span></span><p data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">If anyone should know what gender equality is, feminists should. And indeed they do, each and every one of them. Yet they give very different meanings to these goals, contradictory meanings even, including objections to the wording used here. Feminism is a set of struggles over the meaning of feminism (Schmidt-Gleim and Verloo 2003). Feminists fight fiercely about what the goal of feminism needs to be even if there are many examples of large-scale collective feminist actions for an agreed upon feminist cause. To make progress on how to deal with the challenge of the multitude of feminist goals - the challenge of the deep political nature of the feminist goal -, two questions need to be addressed: what exactly are the bones of contention? Where do collective or hegemonic understandings of gender equality come from? Intersectionality is key to address these questions because history shows, over and over again, that intersectional inequalities and the political choices that need to be made about them occupy center stage in internal feminist struggles and in the outcomes of these struggles. The intersection of class and gender was a bone of contention when feminists were fighting for suffrage in Europe; the intersection of race and gender was at the heart of suffrage dynamics in the US. In both Europe and the US, sexual orientation has deeply divided the feminist movement in the 70s, and current conflicts over trans rights are equally divisive. At the level of feminist ideology and feminist theory, one of the strongest divides runs between liberal feminism – aiming for a gender equal society within the settings of a capitalist world –, and socialist feminism – aiming for a gender equal society in which capitalist exploitation is abolished or at least tamed. There is no way gender inequality can be understood or addressed separately from other major inequalities build around class, sexuality and race.</span></p></div><div class="bout" data-dcnode-id="2681"><span class="count jquery-once-1-processed" data-dcnode-id="2684" id="127"><span data-dcnode-id="2685" instrument_node="">127</span></span><p data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">This political nature of gender equality cannot be escaped. Recognizing this is essential, as is aiming for a politics that allows the ongoing struggling of feminists and others about the meaning of gender equality. Such ‘productive antagonism’ (Butler 1993) or refusal of ‘ultimate truths’ (Scott 1988) produces a more dynamic understanding of feminism that is better suited to address the moving target of gender inequality by adapting to its changing forms, and it also enables wider sets of coalitions to profit from emerging political opportunities (Lombardo &amp; Verloo 2009). The format of ongoing struggle enables feminism to challenge domination as well as unstated ‘norms’ of dominant groups within itself, to uncover and address processes of hegemonisation of particular groups of women that exclude other feminist positions from the debate (hooks 1981, 1990; Lorde 1984). Open spaces and explicit rules (Strolovitch 2008) are needed to include the perspectives of subjects who have been excluded, ensuring that new inequalities are not made.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2676"><span class="count jquery-once-1-processed" data-dcnode-id="2679" id="128"><span data-dcnode-id="2680" instrument_node="">128</span></span><p data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">For all the reasons stated above, feminism as a political project needs a specific deep form of democracy.</span></p></div><div class="bout" data-dcnode-id="2670"><span class="count jquery-once-1-processed" data-dcnode-id="2674" id="129"><span data-dcnode-id="2675" instrument_node="">129</span></span><p data-dcnode-id="2671"><strong data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">2.3.3 Deep democracy and its interrelation with gender equality</span></strong></p></div><div class="bout" data-dcnode-id="2665"><span class="count jquery-once-1-processed" data-dcnode-id="2668" id="130"><span data-dcnode-id="2669" instrument_node="">130</span></span><p data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">Gender inequality as a political problem, and gender equality as a political goal are too dynamic to fit comfortably within classic formats of formal electoral representation. Formal representation and formal political actors, because of their acceptance of the boundaries of a certain nation or state, do not work well for giving voice to the non-represented, or for contributing to the articulation of political problems by those who are in one way or another not fully included in our societies. Social movements are the main actors that can introduce new actors to politics; that can develop and introduce new political problems to societies, and pursue political change to address these problems. For social movements to do this well, how citizenship is organized is key: who are included and excluded in societies, and who decides on this? Some degree of voice, of inclusive citizenship is needed for social movements to emerge and flourish. A first problem here is that formal citizenship rights do not fully translate into actual access to participation in democratic institutions. The documented list of barriers for women in politics is long, ranging from non-inclusive language, to ridicule, absence of role models, biased electoral systems, problematic access to campaign funding, lack of compliance with formal rules or outright harassment. Additionally, there are many human beings that are located at the intersection of gender and other inequalities that are lacking basic rights in democracies as we know them. Consider the lack of bodily autonomy for women from states without abortion or contraception rights, the lack of resources for many women given the persisting wage gap, the lack of access to family rights for many lesbian and gay parents, the lack of freedom of movement for trans citizens from states without full trans rights, the lack of economic rights for asylum seekers in states that forbid them to be active on the labor market.</span></p></div><div class="bout" data-dcnode-id="2660"><span class="count jquery-once-1-processed" data-dcnode-id="2663" id="131"><span data-dcnode-id="2664" instrument_node="">131</span></span><p data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">Moreover, in order to really function as a democracy, a society needs to organize space not only for its subaltern groups, but also for disruptors of its way of functioning: for people who remind everyone that the political landscape does not cover all of society’s problems, the political stage does not show all the actors actually involved in society, and change is needed to address newly politicized problems.</span></p></div><div class="bout" data-dcnode-id="2655"><span class="count jquery-once-1-processed" data-dcnode-id="2658" id="132"><span data-dcnode-id="2659" instrument_node="">132</span></span><p data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">What feminism, the political project that is home to feminist social movements, therefore needs is radical and deep democracy. Deep democracy as a concept is inspired by Walby (2009, 2011, 2013), Mouffe (2000), Strolovitch (2008) and Tilly (2007). Deep democracy expands on the classic set of rules by which the polity and electoral representation is organized with a wider set of rules on citizenship and with attention to the practices and outcomes that sets of rules produce in a society. The wider sets of rules to be considered are non-exclusionary rules on citizenship that facilitate debate about who is part of the demos, facilitate engagement of people in the societies relevant to them, and that construct links between civil society and formal politics. Such rules define how political arenas for debate and struggle are constructed, and thereby increase the possibilities for democratic engagement towards gender equality. Following Tilly, state capacity is a crucial ingredient of democracy too as it is essential to assure democratic practices. Including the practices and outcomes and not just the classic formal rules is also essential because of the feedback effects between rules and outcomes.</span></p></div><div class="bout" data-dcnode-id="2649"><span class="count jquery-once-1-processed" data-dcnode-id="2653" id="133"><span data-dcnode-id="2654" instrument_node="">133</span></span><p data-dcnode-id="2650"><strong data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">2.3.4 Current troubles with democracy in Europe</span></strong></p></div><div class="bout" data-dcnode-id="2629"><span class="count jquery-once-1-processed" data-dcnode-id="2647" id="134"><span data-dcnode-id="2648" instrument_node="">134</span></span><p data-dcnode-id="2630"><span data-dcnode-id="2646" instrument_node="">Next to ongoing problems of democracy that are not recognized by most political scientists, such as the existence of ‘democratic’ states that are simultaneously monarchies or colonial powers, or democracies that have rules allowing parties to be ruled autocratically, there are substantial problems to democracy in the current century impacting negatively on further progress in abolishing gender inequality. Using the wider Europe as an illustration, at least five problems can be identified. First, there is the </span><em data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">intrusion of the domain of the economy in the domain of the polity</span></em><span data-dcnode-id="2643" instrument_node="">, visible in the failure of democracies to constrain financial capitalism, the tendency to allow businesses to financially opt out of democratic decisions (TTIP), and the contagious spread of business reasoning in governance (as in NPM). All this weakens democracy as such, and expands the possibilities for gendered capitalist exploitation either by restricting welfare state arrangements or by increasing the possibilities for precarious labor.&nbsp; Second, there is a renewed </span><em data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">strengthening of the political power of organized religion</span></em><span data-dcnode-id="2640" instrument_node=""> as part of the polity, which is a major source of opposition to gender and sexual equality. While public attention is mostly on Islamist states in this respect, the Vatican and Orthodox churches are much more important in the European context. Third, there is </span><em data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">a rise of authoritarianism</span></em><span data-dcnode-id="2637" instrument_node=""> that is visible in the strengthening of the Radical Right, and in the Radical Right’s connection to authoritarian style geopolitics (Shekhovtsov 2016), deeply endangering democracy and generally strengthening opposition to gender and sexual equality. Fourth, there is also </span><em data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">a rise in illiberalism and populism</span></em><span data-dcnode-id="2634" instrument_node="">, including criticism on independent thinking and on collective action. There are increasing calls for political restriction to academic autonomy (Turkey), and laws that ‘gag’ civil society in European Union member states (Spain, Hungary). Fifth, there are </span><em data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">increasing (calls for) restrictions on citizenship based on racialized features</span></em><span data-dcnode-id="2631" instrument_node=""> (religion, origin) across European countries.</span></p></div><div class="bout" data-dcnode-id="2621"><span class="count jquery-once-1-processed" data-dcnode-id="2627" id="135"><span data-dcnode-id="2628" instrument_node="">135</span></span><p data-dcnode-id="2622"><span data-dcnode-id="2626" instrument_node="">Taken together, this shows a pattern of erosion of polity and governance elements that have been supportive of women’s rights: social democracy, welfare state, civil society engagement and academic freedom. This means that all windows of opportunity are currently favorable to </span><em data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">opposing</span></em><span data-dcnode-id="2623" instrument_node=""> gender and sexual equality. It is therefore no surprise that opposition to gender and sexual equality is growing in frequency and strength (Verloo forthcoming).</span></p></div><div class="bout" data-dcnode-id="2615"><span class="count jquery-once-1-processed" data-dcnode-id="2619" id="136"><span data-dcnode-id="2620" instrument_node="">136</span></span><p data-dcnode-id="2616"><strong data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">2.3.5 Intersectional challenges for democratic struggles about gender equality</span></strong></p></div><div class="bout" data-dcnode-id="2610"><span class="count jquery-once-1-processed" data-dcnode-id="2613" id="137"><span data-dcnode-id="2614" instrument_node="">137</span></span><p data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">Under conditions of endangered democracy, groups of women at the intersection of gender and sexuality, gender and class, and gender and race continue to suffer from severe inequality, and already encounter severe backlashes and further exclusion. Even for more privileged women, there is still an urgent need to introduce better policies on wage equality, gender based violence or political representation. But the challenges for various intersectional groups of women are far more substantial. The rise of authoritarianism and extreme right in Europe increases the salience of certain inequality projects in politics and hinders working towards more gender, sexual and racial inequality. Within conservative and extreme right political ideologies, traditional perspectives on gender prevail. Sexual equality is almost always opposed and that impacts negatively on gender equality, because of a strong commitment of such political projects to heteronormativity, to fertility in the national interest and to unbalanced gender roles in families. The far right’s rise to power has set in motion backlashes against reproductive rights and has diminished hopes for such rights in countries still lacking them. Racial inequality is at the heart of most far right ideologies and proposed actions, constructing ‘racialized others’ based on changing contextual configurations of skin color, religion (especially Judaism and Islam), origin (migration) or language. These variations in racialization complicate collective action against it. Class inequality is on the rise linked to incorrect crisis responses of austerity measures leading to the weakening of the welfare states in Europe. The weakening of social democratic parties combined with their traditional blind spot for gendered class inequalities, and the intrusion of economic governance on the polity seriously hinders action to reduce gendered class inequalities.</span></p></div><div class="bout" data-dcnode-id="2605"><span class="count jquery-once-1-processed" data-dcnode-id="2608" id="138"><span data-dcnode-id="2609" instrument_node="">138</span></span><p data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">Strategically, the authoritarian preferences of far right and populist parties strengthen the tendency to decrease the space given to civil society, further hindering collective action towards gender equality. The tendency for civil society restriction is exacerbated by the current terrorist attacks in Europe that trigger political responses of emergency measures or restrictions to civil liberties. In such contexts it seems almost utopian to even consider giving political space to the subaltern.</span></p></div><div class="bout" data-dcnode-id="2600"><span class="count jquery-once-1-processed" data-dcnode-id="2603" id="139"><span data-dcnode-id="2604" instrument_node="">139</span></span><p data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">Summarizing, while there is a very high need for more political engagement with gender equality because of the intersectional challenges to gender equality, current developments unfortunately all point to a decrease of opportunities to do so.</span></p></div><div class="bout" data-dcnode-id="2594"><span class="count jquery-once-1-processed" data-dcnode-id="2598" id="140"><span data-dcnode-id="2599" instrument_node="">140</span></span><p data-dcnode-id="2595"><strong data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">2.3.6 Conclusions</span></strong></p></div><div class="bout" data-dcnode-id="2589"><span class="count jquery-once-1-processed" data-dcnode-id="2592" id="141"><span data-dcnode-id="2593" instrument_node="">141</span></span><p data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">The quality of democracy influences the quality of gender equality. Gender equality and democracy are linked in an intricate and reinforcing feedback loop. The more democracy, the more chances for gender equality; the more gender equality there is, the more chances for democracy. Because of their interdependence, we need to be as clear and specific as possible about what kind of democratic principles and practices are aimed for and needed to achieve real gender equality. As a set of principles, practices and outcomes guiding, organizing and producing the polity and civil society, deep democracy is utopian but the only hope for achieving real gender equality.</span></p></div><div class="bout" data-dcnode-id="2584"><span class="count jquery-once-1-processed" data-dcnode-id="2587" id="142"><span data-dcnode-id="2588" instrument_node="">142</span></span><h3 data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">2.4 Generational Inequalities</span></h3></div><div class="bout" data-dcnode-id="2579"><span class="count jquery-once-1-processed" data-dcnode-id="2582" id="143"><span data-dcnode-id="2583" instrument_node="">143</span></span><p data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">There are at least three forms of generational inequalities that may constitute a challenge for the goal of democratic equality: (1) inequalities between non-overlapping generations; (2) inequalities between co-existing birth cohorts; and (3) inequalities between age groups. These three forms of generational inequalities will be the focus of the sections that follow.</span></p></div><div class="bout" data-dcnode-id="2573"><span class="count jquery-once-1-processed" data-dcnode-id="2577" id="144"><span data-dcnode-id="2578" instrument_node="">144</span></span><p data-dcnode-id="2574"><strong data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">2.4.1 The challenge of justice between non-overlapping generations</span></strong></p></div><div class="bout" data-dcnode-id="2568"><span class="count jquery-once-1-processed" data-dcnode-id="2571" id="145"><span data-dcnode-id="2572" instrument_node="">145</span></span><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">Our unsustainable use of natural resources has created large problems that future generations will have to tackle. The damage that mass production and over consumption have inflicted on the environment is largely irreversible. Deforestation, overfishing and pollution have had a tremendous impact on biodiversity and some estimate that up to 150 species could be disappearing every single day (Brook, Sodhi, and Ng 2003; Jackson et al. 2001). The future is bleak with expected frequent natural catastrophes as a result of climate change (IPCC 2007). Some populations will be hit harder than others and, as entire territories will inevitably be replaced by water, millions will be forced to migrate. As a result, it is becoming more and more likely that future generations will have difficulties accessing the resources they need, including food, water and clean air. In sum, there are grounds to be increasingly worried that future generations may end up being dangerously worse-off than we are.</span></p></div><div class="bout" data-dcnode-id="2563"><span class="count jquery-once-1-processed" data-dcnode-id="2566" id="146"><span data-dcnode-id="2567" instrument_node="">146</span></span><p data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">The environmental crisis and its myriads of consequences result in large part from the incapacity of present democratic institutions to reverse, stop, or at least stabilize climate change, global warming and their various consequences. It epitomizes an endemic short-termism in democratic politics, and gives us the suspicion that our political institutions may not adequately promote long-term interests, in general, and the interests of future generations, in particular (Gosseries and Gonzales 2016; Oxford Martin Commission for Future Generations&nbsp;2013). It would be absurd to believe that we ought to sacrifice the interests of current people for the sake of future generations. We face fundamental challenges such as global poverty that demand the urgent use of some non-renewable resources. But those important interests need to be balanced with those of future people. And yet, it is fair to worry that the fundamental inequality in power and voice between current and future generations has translated into a radical form of political inequality.</span></p></div><div class="bout" data-dcnode-id="2558"><span class="count jquery-once-1-processed" data-dcnode-id="2561" id="147"><span data-dcnode-id="2562" instrument_node="">147</span></span><p data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">There are at least two ways in which this inequality is challenging from the point of view of democratic equality: one is procedural and the other is substantive. First, for our decisions to have long-term procedural legitimacy, largely regardless of their actual content, adequate weight must be given to the voices of future generations. This is not easy since future generations do not exist yet. By definition, future people do not have a voice or a vote. Even though in theory we can grant that their life and interests matter as much as ours do, it is not easy to ensure that they enjoy some presence in representative and deliberative bodies. It is even harder to make sure their interests are accounted for in voting procedures. But with the increasing realization that we are harming future generations, we ought to develop imaginative mechanisms that ensure future people have some form of power and voice.</span></p></div><div class="bout" data-dcnode-id="2553"><span class="count jquery-once-1-processed" data-dcnode-id="2556" id="148"><span data-dcnode-id="2557" instrument_node="">148</span></span><p data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">More controversially, the second challenge is substantive. It relates to the content of the policies that our democratic systems produce. Intergenerational justice requires at the very least that we make decisions that are sustainable (Barry 1999). This goal of sustainability through time applies to other domains than the environment. It has implications for the levels of debt we are entitled to pass on to future generations, for the public infrastructure we invest in (such as roads, libraries, and housing), for the budget we must devote to research (for instance health and sustainable energies) and for the extent to which we must protect heritage.</span></p></div><div class="bout" data-dcnode-id="2548"><span class="count jquery-once-1-processed" data-dcnode-id="2551" id="149"><span data-dcnode-id="2552" instrument_node="">149</span></span><p data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">Sustainability is a substantive requirement of intergenerational justice, but also a demand of democratic equality. Indeed, the environmental crisis threatens the basic subsistence and, in fact, the very existence of future generations. Future generations have a higher stake than current people in the long-term detrimental effects of current political decisions. If those interests are sidelined, then the basic foundations of the democratic ideal – that each person’s interests matter equally, and that each person’s basic liberties cannot be disregarded - are undermined. Therefore, the second challenge of intergenerational inequalities for democratic equality is substantive: the challenge is to entrench the ideal of sustainability in democratic institutions. If we fail to bring about the drastic changes needed, we will have failed to recognize and act upon future citizens’ status as moral equals. In other words, we will have failed the substantive demand of political equality.</span></p></div><div class="bout" data-dcnode-id="2543"><span class="count jquery-once-1-processed" data-dcnode-id="2546" id="150"><span data-dcnode-id="2547" instrument_node="">150</span></span><p data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">We can distinguish at least four types of mechanisms that respond to the challenges that come from the structural invisibility of future generations. First, some institutions give voice (and ideally power) to future generations. The introduction of parliamentary commissioners for future generations (like in Hungary) and the proposal for an International Ombudsperson for Future Generations are two such mechanisms. Another promising proposal is a committee for future generations in parliaments (like in Finland), whose role would be to establish a manifesto for future generations and to scrutinize all policies from the perspective of future interests (Caney 2016). Second, independent institutions that monitor progresses and regressions are proposed - for instance, an independent Council for the Future to complement the parliamentary commission (Caney 2016). A third and fourth type of mechanisms consists in the constitutional or legal entrenchment of intergenerational provisions (Gonzalez 2016) and the implementation of institutions that directly promote a more sustainable future. The latter contributes to what we have identified as the substantive demand of democratic equality for future generations. From the proposal of a world climate bank, to the use of sovereign wealth funds with an individual dividend to give a stake to citizens in environmental management for the benefit of current and future generations (Widerquist 2016), those reforms can help bring about more sustainability in the management of non-renewable resources.&nbsp;</span></p></div><div class="bout" data-dcnode-id="2537"><span class="count jquery-once-1-processed" data-dcnode-id="2541" id="151"><span data-dcnode-id="2542" instrument_node="">151</span></span><p data-dcnode-id="2538"><strong data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">2.4.2 Inequalities between birth cohorts</span></strong></p></div><div class="bout" data-dcnode-id="2529"><span class="count jquery-once-1-processed" data-dcnode-id="2535" id="152"><span data-dcnode-id="2536" instrument_node="">152</span></span><p data-dcnode-id="2530"><span data-dcnode-id="2534" instrument_node="">In addition to the general anxiety about the kind of future that we may leave to future generations, there is a growing concern for a ‘jilted generation’ (Malik and Howker 2010) – a large mass of young adults burdened with debts, structural unemployment and precarious work. This concern is particularly stark in countries with an ageing population. Recently, it has been especially noticeable in European countries struggling with high rates of youth unemployment, as high as 50% in Greece and Spain, but often two to four times as high as for older age groups in other European countries. In some OECD countries, the situation of young people, at least in terms of unemployment and poverty rates, could in fact be worse than that of their parents at the same age. In the US, young adults are more likely to be poor and unemployed than the baby boomers in the 80s, and so even though they are more likely to have a college degree. Young adults also earn about $2000 less than young adults did in the 1980s.</span><a data-dcnode-id="2532" href="#_ftn4" name="_ftnref4" title=""><span data-dcnode-id="2533" instrument_node="">[4]</span></a><span data-dcnode-id="2531" instrument_node=""> What is more, young people are not likely to be compensated later in their lifespan: high rates of unemployment at a young age scar people in the long run and make them more likely to be unemployed or underpaid later in life compared to other cohorts at the same age (Chauvel 2010).</span></p></div><div class="bout" data-dcnode-id="2524"><span class="count jquery-once-1-processed" data-dcnode-id="2527" id="153"><span data-dcnode-id="2528" instrument_node="">153</span></span><p data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">The emergence of a disadvantaged generation may be a challenge for our generational contract and for intergenerational justice, but it is not as such a challenge to the ideal of democratic equality the authors of this chapter subscribe to. Young cohorts may be worse off in terms of their job-market related opportunities or they may enjoy lower rates of benefits to contribution, but their basic civil rights and liberties may still not be threatened in a fundamental manner. In other words, the fact that the young generation may not be getting its fair share is best described as a justice-based concern than as a problem for democratic legitimacy. Nonetheless, as we will now show, there is ground to be concerned that such inequalities between birth cohorts might still pose a challenge to democracy.</span></p></div><div class="bout" data-dcnode-id="2519"><span class="count jquery-once-1-processed" data-dcnode-id="2522" id="154"><span data-dcnode-id="2523" instrument_node="">154</span></span><p data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Indeed, in addition to being massively at risk of social exclusion, young cohorts are at the margins of formal politics. They enjoy a low political power both through their low voting turnout and the ageing of the electorate. When populations age, the median age of the electorate ages too. The numerously superior ageing generations enjoy a comparatively higher voting power. Voters’ turnouts are strongly correlated with age as well. In the 2009 local elections in the UK, only 10 per cent of 18-24 year-olds said that they had voted compared to 85% of people of 65 years old and over (The Electoral Commission 2009, 27). Young people tend to have less settled lives and change home frequently - this makes voting registration more difficult than for older people with more settled lives. For instance in the UK in 2011, only 56% of young people between the age of 19 and 24 were registered, whereas 90% of people between 55 and 64 years old and 94% of people aged above 65 years old were registered (The Electoral Commission 2011, 5). The quantitative difference between potential voters, registered voters, and actual voters is directly correlated with age: the younger the voters, the higher the difference between potential and actual voting turnouts will be (Berry 2012, 34). This trend is widespread. Young people have become relatively disenfranchised in many OECD countries. One could go as far as arguing that there is an emerging “intergenerational democratic deficit” whereby young people are becoming marginalised within the democratic process (Berry 2012, 5).</span></p></div><div class="bout" data-dcnode-id="2511"><span class="count jquery-once-1-processed" data-dcnode-id="2517" id="155"><span data-dcnode-id="2518" instrument_node="">155</span></span><p data-dcnode-id="2512"><span data-dcnode-id="2516" instrument_node="">Together, the socio-economic concerns of current younger generations and their political disengagement from formal politics feed the suspicion that their interests may not be represented fairly by democratic institutions. The problem does not necessarily have to be that older generations are willingly trying to exclude or disadvantage younger generations. The concern is that they are more numerous, vote in higher proportions and are overrepresented in parliamentary institutions; they may thus be in a privileged position to shape politics and parliaments with their values, attitudes and interests. One recent example of this is the generational data of the Brexit referendum in the UK. Some studies show that up to 73% of the 18-24 age group have voted Remain when more than 60% of voters over the age of 65 years old voted Leave.</span><a data-dcnode-id="2514" href="#_ftn5" name="_ftnref5" title=""><span data-dcnode-id="2515" instrument_node="">[5]</span></a><span data-dcnode-id="2513" instrument_node=""> Younger generations’ views, values and perceived interests may in fact get side-lined even when fundamental decisions that will affect them for longer than older age groups are taken.</span></p></div><div class="bout" data-dcnode-id="2506"><span class="count jquery-once-1-processed" data-dcnode-id="2509" id="156"><span data-dcnode-id="2510" instrument_node="">156</span></span><p data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">There are a number of possible ways to improve youth involvement in formal politics. One set of solutions consists in re-enfranchising the young through lowering the voting age to 16 years old, for instance, or through making voting compulsory. Youth participation can also be promoted through implementing easier voting systems and making registration simpler. Increasing funding for youth political initiatives as well as providing political training to more young people are also ways to work towards their re-engagement. In a recent report aimed at identifying ways to enhance youth participation, the UNDP (2013) also suggests encouraging parties to recruit more young people, supporting the development of youth wings in political parties, and developing civic education in schools and universities. Some of the mechanisms introduced earlier for future generations can also be introduced to ensure that the interest of younger and smaller cohorts do not get sidelined - for instance ombudspersons, or parliamentary committees for younger generations. This is likely to be all the more relevant in ageing societies.</span></p></div><div class="bout" data-dcnode-id="2500"><span class="count jquery-once-1-processed" data-dcnode-id="2504" id="157"><span data-dcnode-id="2505" instrument_node="">157</span></span><p data-dcnode-id="2501"><strong data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">2.4.3 Inequalities between age groups</span></strong></p></div><div class="bout" data-dcnode-id="2495"><span class="count jquery-once-1-processed" data-dcnode-id="2498" id="158"><span data-dcnode-id="2499" instrument_node="">158</span></span><p data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">There is another form of generational inequality that is often hidden behind the aforementioned inequality between birth cohorts: inequalities between age groups. Age groups are groups of people of a given age at a given period of time. While birth cohorts age, age groups are categories of transit through which all cohorts pass as they age. Individuals will only belong to one birth cohort in their life, but they will change age membership throughout their lives as they age. This distinction between age groups and birth cohorts is important because inequalities between age groups do not necessarily translate into inequalities between birth cohorts over time. Take the phenomenon of low voting turnouts in young people: we need to know whether lower rates of participation have to do with age membership, in which case the disengaged will end up re-engaging at normal rates in the future as they age, or whether this has to do with a generational change in attitude that is likely to have an impact on their voting behaviors in the long run. In fact, recent studies suggest that we must appeal to both age and cohort effects to understand youth disengagement (Sloam 2012). Age inequalities pose a challenge to democratic legitimacy, regardless of whether they translate into inequalities between successive birth cohorts. Let me focus on two examples.</span></p></div><div class="bout" data-dcnode-id="2490"><span class="count jquery-once-1-processed" data-dcnode-id="2493" id="159"><span data-dcnode-id="2494" instrument_node="">159</span></span><p data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">First, age groups have access to unequal social rights. In most countries, young people below the age of 18 cannot vote or run for office. For instance, while 16 and 17 years olds were allowed to vote in the Scottish referendum, they were not allowed to vote in the Brexit referendum. One must also be of a certain age to be a member of the Senate or to run for president. These age-based inequaliti
