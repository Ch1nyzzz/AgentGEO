				Continued...</span><br data-dcnode-id="1126"><br data-dcnode-id="1125"><br data-dcnode-id="1124"><span data-dcnode-id="1123" instrument_node="">Sobchak, used the venue to launch their political careers, coming to openly advocate national self-determination, market reforms, and “political, economic, and moral pluralism.”221</span><br data-dcnode-id="1122"><span data-dcnode-id="1121" instrument_node="">In August 1990, a new press law formulated by the Supreme Soviet came into effect, formally abolishing the Party’s monopoly ownership and control of the media and resulting in the privatization through cooperativization of the vast majority of the state’s share. By 1991, hundreds of new journals and periodicals were registered, along with several new television channels and dozens of radio stations, virtually all of them politically supportive of the democrats and nationalists (some of them even financed by newly created political parties).222</span><br data-dcnode-id="1120"><br data-dcnode-id="1119"><span data-dcnode-id="1117" style="text-decoration: underline"><span data-dcnode-id="1118" instrument_node="">The Rise of Nationalism</span></span><br data-dcnode-id="1116"><br data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node="">Marxist-Leninist ideology and the Communist Party had formally worked to unify a vast and ethnically diverse empire behind the promise of building communism. As the Party and its ideology were attacked and destroyed from within and without, they left in their wake opportunities for ethnic, linguistic, clan and religious affiliation to take their place in the political arena.223 Between 1989 and 1991, nationalist political discourse emerged in virtually every republic and autonomous region of the country.224 Directly and indirectly, much of the central, republican and local media came to actively promote and otherwise aid this new discourse.225</span><br data-dcnode-id="1113"><br data-dcnode-id="1112"><span data-dcnode-id="1102" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1111" instrument_node="">221 Marina Peunova, “From Dissidents to Collaborators: The Resurgence and Demise of the Russian Critical Intelligentsia Since 1985,” Studies in East European Thought Vol.60 (2008), p.235-237, 240.</span><br data-dcnode-id="1110"><span data-dcnode-id="1109" instrument_node="">222 Julia Rozanova, “Public Television in the Context of Established and Emerging Democracies: Quo Vadis?” International Communication Gazette, Vol.69, No.2 (2007), p.135.; Josephine Woll, “Glasnost: A Cultural Kaleidoscope,” in Harley D. Balzer, Five Years that Shook the World: Gorbachev’s Unfinished Revolution (Boulder: Westview Press, 1991), p.111.; Beumers, 1999, p.889.; White, p.99-100.</span><br data-dcnode-id="1108"><span data-dcnode-id="1107" instrument_node="">223 As noted by Yuri Slezkine, the USSR was an ethno-federal state, with nationality being an important element of identity. Once “Gorbachev finally discarded the worn-out Marxist verbiage, the only language that remained was the well honed and long practice language of nationalism.” (Yuri Slezkine, “The Soviet Union as a Communal Apartment, or How a Socialist State Promoted Ethnic Particularism,” in Sheila Fitzpatrick (ed.) Stalinism: New Directions (London: Routledge, 2000), p.338.</span><br data-dcnode-id="1106"><span data-dcnode-id="1105" instrument_node="">224 Mark Bessinger notes that among the mass protest movements organized in the late 1980s and early 1990s, only 6% made political demands without simultaneously making nationalist demands, and only 1/3 promulgated democratic demands together with their nationalist demands. (Beissinger, 2002, p.76.)</span><br data-dcnode-id="1104"><span data-dcnode-id="1103" instrument_node="">225 Geoffrey A. Hosking, “The Beginnings of Independent Political Activity,” in Dallin and Lapidus, p.105-106.; Isabelle T. Kreindler, “A Second Missed Opportunity: Russian in Retreat as a Global Language,” International Political Science Review Vol.14, No.3 (July 1993), p.266, p.269.; Malia, p.448.</span></span><br data-dcnode-id="1101"><br data-dcnode-id="1100"><span data-dcnode-id="1099" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1098"><br data-dcnode-id="1097"><span data-dcnode-id="1096" instrument_node="">As the old concepts of the ‘friendship of the peoples’ disintegrated, new formulations about Russian cultural and political imperialism took hold in many republics, with “Russia and the Russians” deemed “responsible for all the problems, past and present.”226 At the same time, Russian nationalists undertook their own campaign discussing the RSFSR’s ‘lack of rights’ within the Union and its economic ‘subsidization’ of the rest of the country.227 Kotkin concludes that the Russian nationalists’ ability to publicly speak of themselves as an ‘aggrieved minority’ demonstrated “the suicidal dynamic of openness for the system.”228</span><br data-dcnode-id="1095"><br data-dcnode-id="1094"><span data-dcnode-id="1093" instrument_node="">Public statements by Alexander Yakovlev did not help the centre in its struggle to keep the country together. Taking a trip to the Baltics in August 1988, he encouraged the newly formed, proto-nationalist popular front organizations there by noting that while “a state in the form of a union must have a common defence and foreign policy…the rest…ought to be the prerogative of the republics.”229 Printed in all the major republican media organs in Lithuania and Latvia, Yakovlev’s message and encouragement were of such importance that the Lithuanian Sajudis Popular Front organization would come to divide historical time into ‘pre-Yakovlev’ and ‘post-Yakovlev.’230</span><br data-dcnode-id="1092"><br data-dcnode-id="1091"><span data-dcnode-id="1089" style="font-weight: bold"><span data-dcnode-id="1090" instrument_node="">Ideological Diversion, ‘Newspeak’ and the Concealment of Reformers’ Real Intentions</span></span><br data-dcnode-id="1088"><br data-dcnode-id="1087"><span data-dcnode-id="1086" instrument_node="">Writing about the conceptual origins of glasnost, Yakovlev has conceded that the reformist leadership’s decision to liberalize and radicalize social discourse was not based on any sense of objective social necessity:</span><br data-dcnode-id="1085"><br data-dcnode-id="1084"><span data-dcnode-id="1083" instrument_node="">"Strictly speaking, the turn toward glasnost was not inevitable in those years. It was dictated more by the philosophy of perestroika and its initiators than by immediate necessity. At that stage society would have supported even some fairly radical version of an administrative ‘perfection of socialism,’ strengthening the technocratic approach, as opposed to the Party-ideological approach for solving vital problems."231</span><br data-dcnode-id="1082"><br data-dcnode-id="1081"><span data-dcnode-id="1069" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1080" instrument_node="">226 Gorbachev, p.346.</span><br data-dcnode-id="1079"><span data-dcnode-id="1078" instrument_node="">227 Mark Beissinger, “Nationalism and the Collapse of Soviet Communism,” Contemporary European History Vol.18, No.3 (2009), p.333, 342-343.</span><br data-dcnode-id="1077"><span data-dcnode-id="1076" instrument_node="">228 Kotkin, 2008, p.70.</span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">229 Yakovlev cited in Graham Smith, “Latvians,” in Graham Smith (ed.), The Nationalities Question in the Soviet Union (London: Longman, 1990), p.64.</span><br data-dcnode-id="1073"><span data-dcnode-id="1072" instrument_node="">230 Beissinger, 2002, p.174.</span><br data-dcnode-id="1071"><span data-dcnode-id="1070" instrument_node="">231 Yakovlev, 1993, p.104.</span></span><br data-dcnode-id="1068"><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1065"><br data-dcnode-id="1064"><span data-dcnode-id="1063" instrument_node="">Because the Soviet system prior to perestroika had a strong measure of popular support, a large core constituency of Party members and many non-party sympathizers, and a powerful security mechanism organized to defend the regime, the campaign to destroy the old hegemonic ideology had to be carried out carefully, slowly and in secrecy, using ideological deception and political duplicity.232</span><br data-dcnode-id="1062"><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">Discussing the introduction of new terminology and the transformation of old ideological signifiers during perestroika, Michael Urban et al. note that slogans like ‘a return to Leninist norms’ and ‘the renewal of socialism’ constituted “marvels of political ambiguity, enabling liberals and conservatives alike to share the same symbols and terms even while they might understand them in radically different ways.”233 In this way, the liberal reformers could use old terminology to criticize their opponents and simultaneously to disguise radical new ideas within the old acceptable expressions. As the ideological reform effort progressed, these terminologically transient ‘vanishing mediators,’ having performed their role, gave way to more and more radical formulations.234 Kara-Murza conceives of this process of linguistic reformulation as a form of ‘Newspeak,’ a ‘totalitarian’ technology ultimately used by the reformers to radically transform mass consciousness.235 Kurginyan concurs, noting that the “strategy of semantic war…designed to address conscious and subconscious, group and individual identity,” saw the flipping of fundamental ideological, social and moral parameters, ultimately having as its aim “a total restructuring of the basic values and attitudes of the nation.”236</span><br data-dcnode-id="1059"><br data-dcnode-id="1058"><span data-dcnode-id="1043" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1057" instrument_node="">232 As Euvgeny Novikov and Patrick Bascio note: “When one considers that Gorbachev and the rest of the Soviet elite…had to deal with an entrenched majority of perhaps 20 million men and women, [the decision to initiate radical reforms] was a formidable and personally dangerous task…The premature disclosure of the plan would have meant removal from power and almost certain execution, but [the reformers] gambled that secrecy and cautious implementation would bring them success. The attack on Marxism was carried out by the clever citing of obscure passages from Communist classics, and a subtle revisionism of works already generally accepted by the unsophisticated Party membership.” (Novikov and Bascio, p.54-55.)</span><br data-dcnode-id="1056"><span data-dcnode-id="1055" instrument_node="">233 Urban et al., p.80.; See also Kristian Petrov, “Construction, Reconstruction, Destruction: The Fall of the Soviet Union from the Point of View of Conceptual History,” Studies in East European Thought Vol.60 (2008), p.188.</span><br data-dcnode-id="1054"><span data-dcnode-id="1053" instrument_node="">234 Petrov, p. 196.; Thus, ‘socialist democracy’ became ‘democratization,’ ‘socialist pluralism’ turned into ‘pluralism of opinion,’ and then ‘political pluralism.’ ‘Socialist competition’ was replaced by ‘competition,’ ‘socialist markets’ evolving into ‘market socialism,’ and finally into ‘a regulated market economy.’ ‘Peaceful coexistence’ was replaced by ‘universal human values’ and the idea of a ‘Common European Home.’ (Ibid., p.195-196.; Keeran and Kenny, p.137-138.)</span><br data-dcnode-id="1052"><span data-dcnode-id="1051" instrument_node="">235 Kara-Murza, Manipulatsiya Soznaniem, p.61.</span><br data-dcnode-id="1050"><span data-dcnode-id="1049" instrument_node="">236 Sergei Kurginyan et al., Pole Otvetnogo Deystviya Proceedings from a Seminar of the Political Club ‘Post-Perestroika’, April 3, 1993. Electronic edition: &lt; </span><a class="postlink" data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ecc.ru/books/pod/pod.htm"><span data-dcnode-id="1047" instrument_node="">http://www.ecc.ru/books/pod/pod.htm</span></a><span data-dcnode-id="1044" instrument_node="">&gt;</span></span><br data-dcnode-id="1042"><br data-dcnode-id="1041"><span data-dcnode-id="1040" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1039"><br data-dcnode-id="1038"><span data-dcnode-id="1037" instrument_node="">After the collapse of the Soviet Union, some of the people charged with carrying out the ideational and semantic war against the old system, including Yakovlev himself, openly acknowledged their tendency to act in a deceitful manner in order to advance their aims. In a 2003 interview in Nezavisemaya Gazeta, Yakovlev sheepishly commented: “I myself am a sinner –lying not once. I spoke about the ‘renewal of socialism’ but knew where it was all heading.”237 Political scientist and Yakovlev assistant Alexander Tsipko, discussing his own tendency toward ideological deception during the reform period, justified his actions on the basis of his fear of a revival of rigid Marxism-Leninism: “the game I played and my brand of revisionism did make sense in spite of its vulnerability on moral grounds. The non-Marxist brand of Marxism drew the intelligentsia away from the greatest threat of all, the true dogmatic Marxism and faith in the healing powers of the Revolution.”238</span><br data-dcnode-id="1036"><br data-dcnode-id="1035"><span data-dcnode-id="1033" style="font-weight: bold"><span data-dcnode-id="1034" instrument_node="">Conclusion: Glasnost and the Destruction of Soviet Societal Consciousness</span></span><br data-dcnode-id="1032"><br data-dcnode-id="1031"><span data-dcnode-id="1030" instrument_node="">Through the course of glasnost, the radical intelligentsia in control of the social discourse came to discard the country’s history as a never-ending string of repressions and injustices, while castigating existing social reality as morally shameful, materially impoverished, and spiritually empty. Ultimately, the reformers wrote off the entire Soviet experience as a wasted period devoted to pursuing the unachievable.239 Partly as a result, Martin Malia notes that by the time the Soviet flag came down over the Kremlin in December 1991, “the Soviet Union had suffered the structural equivalent of defeat in a major war,” except that the extent of catastrophe was even worse, “for it was self-inflicted…[T]hat an advanced industrial nation and superpower should collapse without any large-scale military defeat, after forty-five years of peace…is unheard of in modern history.”240</span><br data-dcnode-id="1029"><br data-dcnode-id="1028"><span data-dcnode-id="1015" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1027" instrument_node="">237 Anatoly Kostyukov, “Ya govoril pro obnovlenie sotsializma, a sam znal, k chemy delo idet,” interview with Alexander Yakovlev, Nezavisimaya Gazeta, February 12, 2003 &lt; </span><a class="postlink" data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ng.ru/ideas/2003-12-02/1_yakovlev.html"><span data-dcnode-id="1025" instrument_node="">http://www.ng.ru/ideas/2003-12-02/1_yakovlev.html</span></a><span data-dcnode-id="1022" instrument_node="">&gt;</span><br data-dcnode-id="1021"><span data-dcnode-id="1020" instrument_node="">238 Tsipko in Ellman and Kontorovich, p.182-183.</span><br data-dcnode-id="1019"><span data-dcnode-id="1018" instrument_node="">239 Robert Strayer, Why Did the Soviet Union Collapse? Understanding Historical Change (Armonk, M.E. Sharpe, 1998), p.105.</span><br data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node="">240 Malia, p.489.</span></span><br data-dcnode-id="1014"><br data-dcnode-id="1013"><span data-dcnode-id="1012" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1011"><br data-dcnode-id="1010"><span data-dcnode-id="1009" instrument_node="">In the aftermath of the collapse, Yakovlev would note that the glasnost campaign succeeded in “debunking of the neoreligion of Marxism” and its myths,241 resulting in a “qualitative breakthrough…in the consciousness of people who believed in socialism and its perfection…[in] an understanding…that all aspects of our existence [would] require profound and radical reform.”242 Yurchak confirms that within the space of a few years, Soviet citizens underwent “a profound change of discourse and consciousness,” the things they read, watched and talked about with friends producing “new language, topics, comparisons, and ideas” which led to “a widespread realization that the state socialism which had seemed so eternal might in fact be coming to an end.”243</span><br data-dcnode-id="1008"><br data-dcnode-id="1007"><span data-dcnode-id="1006" instrument_node="">Ultimately, the destruction of Soviet societal consciousness –of its dominant narratives, myths, and norms, contributed in a major way to the phenomenon of ‘collective culture shock,’ –the near total breakdown of the existing political, social and cultural system which occurred in the late-Soviet and early post-Soviet period.244 In the early 1990s, as reform brought the existing moral order to the brink of collapse, the public underwent a “moral panic,” fearing that collapse would “hurtle society back to the past, a past which was not only pre-modern but also ‘pre-moral.’”245 The destruction of old norms and moral values saw the emergence of primitive attitudes which had long lain dormant, or at least publicly repressed, including rabid anti-Semitism, anti-Caucasian racism, and archaic gender stereotypes.246 The rapid decline of social trust and the loss of faith in binding social norms resulted in increasing cynicism, passivity and discouragement,247 Genis comparing perestroika to the Protestant Reformation, both leaving the individual alone “in a world bereft of symbols,” with “nothingness” emerging as the dominant cultural paradigm.248 An explosion of interest in faith healing, UFOs, sorcery and astrology</span><br data-dcnode-id="1005"><br data-dcnode-id="1004"><span data-dcnode-id="988" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1003" instrument_node="">241 Yakovlev, 1993, p.105.</span><br data-dcnode-id="1002"><span data-dcnode-id="1001" instrument_node="">242 Yakovlev, 1993, p.104.</span><br data-dcnode-id="1000"><span data-dcnode-id="999" instrument_node="">243 Yurchak, p.3.</span><br data-dcnode-id="998"><span data-dcnode-id="997" instrument_node="">244 Claudia Feichtinger and Gerhard Fink, “The Collective Culture Shock in Transition Countries – Theoretical and Empirical Implications,” Leadership &amp; Organization Development Journal Vol.19, No.6 (1998), p.302.</span><br data-dcnode-id="996"><span data-dcnode-id="995" instrument_node="">245 Harry Pilkington, Russia’s Youth and its Culture: A Nation’s Constructors and Deconstructed (London: Routledge, 1994), p.158.</span><br data-dcnode-id="994"><span data-dcnode-id="993" instrument_node="">246 McNair, 1991, p.203.; Ries, p.177-179.</span><br data-dcnode-id="992"><span data-dcnode-id="991" instrument_node="">247 Ries, p.171.; Shlapentokh, 2001, p.210-211.</span><br data-dcnode-id="990"><span data-dcnode-id="989" instrument_node="">248 Genis, “Onions and Cabbages,” in Epstein, p.399.</span></span><br data-dcnode-id="987"><br data-dcnode-id="986"><span data-dcnode-id="985" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="984"><br data-dcnode-id="983"><span data-dcnode-id="982" instrument_node="">among normal, educated people in the late period of perestroika confirmed the ‘schizophrenization’ of society, people appearing to have temporarily lost their capacity for rational thought.249</span><br data-dcnode-id="981"><span data-dcnode-id="980" instrument_node="">In recent years, discussing the exceptional duration and intensity of the ‘ideological disarray’ occurring in Russia in the aftermath of the Soviet collapse,250 some scholars have concluded that this can be partially attributed to the fact that the rejection of the Soviet model of political, economic and socio-cultural organization also constituted a rejection of many features of pre-Soviet Russian national consciousness.251 Stemming from the mir (the commune) and the principles of sobornost (spiritual communion) –peasant concepts of collectivism and cooperation at the expense of individualism,252 the Bolshevik project has been argued to have been an amalgamation of European socialist ideas and latent Russian collectivist traditions and ideals.253 Having explicitly rejected socialist values, the radical reformist vision born out of the perestroika period also consciously or unconsciously rejected these ancient ideals and latent attitudes, leading to a prolonged period of emotional and material suffering.</span><br data-dcnode-id="979"><br data-dcnode-id="978"><span data-dcnode-id="977" instrument_node="">During perestroika, various age and social groups reacted in their own ways to the destruction of the old social order. Many adults raised in the pre-reform system, experiencing an initial rush of “euphoria and exhilaration,” quickly came to feel a “pervading sense of fragmentation,”254 suffering from informational overload and an oversaturation of constant negativism.255 The new discourse, demonstrating “an awesome capacity for destruction of the existing order,” seemed to have “no</span><br data-dcnode-id="976"><br data-dcnode-id="975"><span data-dcnode-id="961" style="font-size:85%;line-height:116%;"><span data-dcnode-id="974" instrument_node="">249 Kara-Murza, Manipulatsiya Soznaniem, p.275-276.</span><br data-dcnode-id="973"><span data-dcnode-id="972" instrument_node="">250 Shlapentokh, 2001, p.202.</span><br data-dcnode-id="971"><span data-dcnode-id="970" instrument_node="">251 Kara-Murza, Manipulatsiya Soznaniem, p.218, 237.; Kurginyan et al., 1990.</span><br data-dcnode-id="969"><span data-dcnode-id="968" instrument_node="">252 Sergei Kara-Murza, “Padenie Rozdaemosti v Rossii: Faktor Kulturi,” Molodaya Gvardiya Vol.7-8 (2010), p.114.; Alexandre Ardichvili, “The Relationship Between Meaning of Working and Socioeconomic Transformations: The Case of Post-Communist Russia,” Advances in Developing Human Resources Vol.11, No.2 (April 2009), p.224.; Discussing the principle of sobornost, Nikolai Biryukov and Victor Sergeyev have noted that the Bolsheviks’ political rhetoric was consistent with much of the pre-revolutionary idealistic philosophy behind the concept of the sobor. “In fact,” they argue, “the Bolshevik victory itself would hardly have been possible had not their leaders’ slogans touched familiar chords in the souls of their potential followers.” Despite its failure to fully live up to the ideals of sobornost, the Communist Party continued for a long time to successfully “draw on…national political tradition for its justification.” (Nikolai Biryukov and Victor Sergeyev, “Parliamentarianism and Sobornost’: Two Models of Representative Insitutions in Russian Political Culture,” Discourse and Society Vol.4, No.1 (1993), p.60-61.)</span><br data-dcnode-id="967"><span data-dcnode-id="966" instrument_node="">253 Kara-Murza, Manipulatsiya Soznaniem, p.237.</span><br data-dcnode-id="965"><span data-dcnode-id="964" instrument_node="">254 Lewin, 1991, p.169.</span><br data-dcnode-id="963"><span data-dcnode-id="962" instrument_node="">255 Kathleen E. Smith, Remembering Stalin’s Victims: Popular Memory and the End of the USSR (Ithaca: Cornell University Press, 1996), p.179.</span></span><br data-dcnode-id="960"><br data-dcnode-id="959"><span data-dcnode-id="958" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="957"><br data-dcnode-id="956"><span data-dcnode-id="955" instrument_node="">equivalent capacity for creation,”256 leaving a tremendous sense of spiritual emptiness in its place. Ultimately, many adults came to feel that they had lived their lives in vain. Henry Kissinger, accompanied by a young Gorbachev aide while walking to the Kremlin in 1989, was told that the ideological revision of the entirety of Soviet history meant “that every citizen older than twenty-five has wasted his life.”257</span><br data-dcnode-id="954"><br data-dcnode-id="953"><span data-dcnode-id="952" instrument_node="">Elderly people were especially susceptible to traumatic feelings of loss. As Shane notes, for older people “the old myths had been very beautiful, the old slogans deeply moving, interwoven as they were with memories of sacrifice and of victory in World War II.”258 The dismantling of the old narratives of the Great Patriotic War, among the last ‘foundational myths’ to be dismantled, took a heavy emotional toll on veterans. Several days prior to the May 1990 celebration of the forty-fifth anniversary of Victory Day, an article published in Komsomolskaya Pravda entitled ‘Ukradenaya Pobeda’ (‘Stolen Victory’) emphasized the disconnect between the victory of the people and the regime, personified by Stalin, arguing that victory was brought about not because of Stalin but in spite of him.259 Similar discussions elsewhere in the mass media260 all ultimately led to a situation where, in Youngblood’s words, “surviving veterans…had little left to celebrate…Glasnost [destroying] most, if not all, illusions about Soviet grandeur.”261</span><br data-dcnode-id="951"><br data-dcnode-id="950"><span data-dcnode-id="949" instrument_node="">The collapse of youth ideological, aesthetic and moral education, along with state support for institutionalized youth culture, resulted in the emergence of a vast array of non-conformist youth groups which reject the collapsing ‘rational-technological’ ‘wholesome image’ of Komsomol culture.262 Disillusioned by the state of contemporary society, many of these groups turned to escapist and</span><br data-dcnode-id="948"><br data-dcnode-id="947"><span data-dcnode-id="933" style="font-size:85%;line-height:116%;"><span data-dcnode-id="946" instrument_node="">256 Shane, p.280.</span><br data-dcnode-id="945"><span data-dcnode-id="944" instrument_node="">257 Henry Kissinger, Diplomacy (New York: Simon &amp; Schuster, 1994), p.797.</span><br data-dcnode-id="943"><span data-dcnode-id="942" instrument_node="">258 Shane, p.216.</span><br data-dcnode-id="941"><span data-dcnode-id="940" instrument_node="">259 Dmitrii Andreev and Gennadi Bordyugov, “Prostranstvo Pamyati: Velikaya Pobeda I Vlast,” in Falk Bomsdorf and Gennadi Bordyugov (eds.) 60-Letiye Okonchaniya Vtoroi Mirovoi I Velikoi Otechestvennoi: Pobediteli i Pobezhdrennie v Kontekste Politiki, Mifologii i Pamyati Materials from International Forum (Moscow, Moscow Fund Freedriha Naumanna, September 2005), p.132-133.</span><br data-dcnode-id="939"><span data-dcnode-id="938" instrument_node="">260 Denise J. Youngblood, Russian War Films: On the Cinema Front, 1914-2005 (Lawrence, Kansas: University of Kansas Press, 2007), p.203.</span><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node="">261 Youngblood, p.203.</span><br data-dcnode-id="935"><span data-dcnode-id="934" instrument_node="">262 Claire Wallace and Sijka Kovacheva, “Youth Cultures and Consumption in Eastern and Western Europe,” Youth &amp; Society Vol.28, No.2 (December 1996), p.199-200.</span></span><br data-dcnode-id="932"><br data-dcnode-id="931"><span data-dcnode-id="930" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="929"><br data-dcnode-id="928"><span data-dcnode-id="927" instrument_node="">hedonistic lifestyles, substituting drugs, pirated media and gang violence for the state’s weakening attempts to regiment them.263 Noting that these groups were often formed out of explicit opposition to the rest of society, psychologists warned in vain that the difficulty of returning to mainstream society caused by joining them often led to depression, drug dependence, and suicide.264 As state funding and control of culture collapsed, national youth culture gradually began to be replaced by internationalized pop culture,265 and high culture by low culture, including pornography and violent literature and films.266</span><br data-dcnode-id="926"><br data-dcnode-id="925"><span data-dcnode-id="924" instrument_node="">In the late 1980s sociologists discovered that prostitution was “a favoured career choice” among young women surveyed in high schools.267 Explaining this alarming trend, Elizabeth Waters has commented on the tendency among the flagships of glasnost to glamorize and exaggerate the financial benefits of prostitution,268 noting that while they paid “lip-service…to moral indignation,” journalists often painted “in such detail the lives of luxurious idleness led by prostitutes that their writing was in effect an advertisement for the profession.”269 In other journalistic and artistic narratives prostitutes were “transformed…into a symbol of resistance to the old conventions, to the straightjacket of the stagnant society,”270 idolized as heroines fighting for a “noble cause” against the ‘command-administrative system.’271</span><br data-dcnode-id="923"><br data-dcnode-id="922"><span data-dcnode-id="904" style="font-size:85%;line-height:116%;"><span data-dcnode-id="921" instrument_node="">263 Claire Wallace and Raimund Alt, “Youth Cultures Under Authoritarian Regimes: The Case of the Swings Against the Nazis,” Youth &amp; Society Vol.32, No.3 (March 2001), p.295-296.; William Alex Pridemore, “Social Problems and Patterns of Juvenile Delinquency in Transitional Russia,” Journal of Research in Crime and Delinquency Vol.39, No.2 (May 2002), p.195.; Letizia Paoli, “The Price of Freedom: Illegal Drug Markets and Policies in Post-Soviet Russia,” American Academy of Political and Social Science Vol.582 (July 2002), p.169-170.</span><br data-dcnode-id="920"><span data-dcnode-id="919" instrument_node="">264 Ibid., p.182-183, 185.</span><br data-dcnode-id="918"><span data-dcnode-id="917" instrument_node="">265 Wallace and Kovacheva, p.209.</span><br data-dcnode-id="916"><span data-dcnode-id="915" instrument_node="">266 Much of the domestically made material among this lot emerged as a result of the pressures of self-financing. In her discussion of Russian children’s book publishers, Maria Nikolajeva notes that in the late 1980s, squeezed by the never-before-experienced pressures of the market, many publishers simply stopped publishing children’s books, substituting crime novels, escapist fantasy, science fiction, and pornography in their stead. (Maria Nikolajeva, “Russian Children’s Literature Before and After Perestroika,” Children’s Literature Association Quarterly Vol.20, No.3 (Fall 1995), p.108-109.); See also Shane, p.186.; Stites, p.191.)</span><br data-dcnode-id="914"><span data-dcnode-id="913" instrument_node="">267 Elizabeth Waters, “Restructuring the ‘Woman Question’: Perestroika and Prostitution,” Feminist Review, No.33 (Autumn, 1989), p.8.; See also Helena Goscilo, Dehexing Sex: Russian Womanhood During and After Glasnost (Ann Arbor: University of Michigan Press, 1996), p.13-15.</span><br data-dcnode-id="912"><span data-dcnode-id="911" instrument_node="">268 Elizabeth Waters, “Prostitution,” in Jim Riordan (ed.) Soviet Social Reality in the Mirror of Glasnost (New York: St. Martin’s Press, 1992), p.134-135, 143.</span><br data-dcnode-id="910"><span data-dcnode-id="909" instrument_node="">269 Ibid., p.139.</span><br data-dcnode-id="908"><span data-dcnode-id="907" instrument_node="">270 Ibid., p.144.</span><br data-dcnode-id="906"><span data-dcnode-id="905" instrument_node="">271 Ibid., p.146.; Kara-Murza, Manipulatsiya Soznaniem, p.324.</span></span><br data-dcnode-id="903"><br data-dcnode-id="902"><span data-dcnode-id="901" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="900"><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node="">Youth gangs, their existence publicized and sensationalized by the glasnost media, mushroomed as a result of urban decline, rising levels of social inequality, the emergence of new sources of income, and a lack of support from teachers and parents.272 Igor Ilyunsky notes that the latter trend could be attributed to the collapse of the spiritual, moral and cultural values of the old generation and of the old order as a result of the revelations of glasnost.273</span><br data-dcnode-id="897"><br data-dcnode-id="896"><span data-dcnode-id="895" instrument_node="">Explaining the collapse of old Soviet youth identities, Ries notes that for many young people, “glasnost unintentionally ushered in the adoption of ‘bad’ as emblems of ‘goodness’ or at least of freedom,” prostitutes, businessmen, and criminals, often “modeled after the archetypal images of American ‘bad guys’ long used as emblems of capitalist evil by Soviet propaganda.”274 Others conceive of the collapse as the result of the campaign to ‘relativize’ moral norms and social taboos.275 Discussing the results of these efforts, child and youth psychologist Irina Medvedeva has observed that the glasnost period saw “a complete shift of [psychological] orientation…[leading to] the invalidization of the psyche of an entire generation of young people.”276</span><br data-dcnode-id="894"><br data-dcnode-id="893"><span data-dcnode-id="892" instrument_node="">Ultimately, together with the destruction of the economy and the collapse of the Party’s political hegemony, the destruction of Soviet societal consciousness played a crucial role in the speedy and relatively peaceful collapse of the Soviet Union.277 Much more than a struggle to bring the freedom of information and the press into Soviet society, glasnost was a centrally organized and state-directed campaign carried out by a small group of political reformers and their allies within the radical liberal intelligentsia to reform and ultimately destroy nearly every aspect of the old Soviet societal consciousness, including its hegemonic ideology, conceptions of the legitimacy of the state, dominant historical and cultural narratives, and societal ethics and norms. Having successfully destroyed the old consciousness, the reformers were unsuccessful in constructing and consolidating a new one, resulting in national paralysis and leading to the social apathy, regression and degradation which have plagued virtually the entire post-Soviet space through the 1990s and into the present.</span><br data-dcnode-id="891"><br data-dcnode-id="890"><span data-dcnode-id="878" style="font-size:85%;line-height:116%;"><span data-dcnode-id="889" instrument_node="">272 Pilkington, p.146-147, p.155.</span><br data-dcnode-id="888"><span data-dcnode-id="887" instrument_node="">273 Igor Ilyunsky, “Trends in the Development of Soviet Youth,” in Riordan, p.39.</span><br data-dcnode-id="886"><span data-dcnode-id="885" instrument_node="">274 Ries, p.175.</span><br data-dcnode-id="884"><span data-dcnode-id="883" instrument_node="">275 Kara-Murza, Manipulatsiya Soznaniem, p.323-324.; Kurginyan et al., 1993.</span><br data-dcnode-id="882"><span data-dcnode-id="881" instrument_node="">276 Medvedeva cited in “Glasnost: Shag k podlinnoi svobode ili informatsionnaya voina?” Sud Vremini. Petersburg – Channel 5. December 7, 2010.</span><br data-dcnode-id="880"><span data-dcnode-id="879" instrument_node="">277 Local conflicts in places like Nagorno-Karabakh, South Ossetia, Abkhazia, Transnistria and Tajikistan excepted.</span></span><br data-dcnode-id="877"><br data-dcnode-id="876"><span data-dcnode-id="875" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -
