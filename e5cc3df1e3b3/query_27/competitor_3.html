				Continued...</span><br data-dcnode-id="1753"><br data-dcnode-id="1752"><br data-dcnode-id="1751"><span data-dcnode-id="1750" instrument_node="">the Molotov-Ribbentrop Pact (1989). Yakovlev has been criticized in recent years for the biased way in which he chaired the latter commission,103 which one commentator has dubbed “less a proper investigation,” and more means of support for the Baltic “struggle for independence.”104</span><br data-dcnode-id="1749"><br data-dcnode-id="1748"><span data-dcnode-id="1746" style="text-decoration: underline"><span data-dcnode-id="1747" instrument_node="">The Campaign to ‘Hit at’ Leninism through Stalinism</span></span><br data-dcnode-id="1745"><br data-dcnode-id="1744"><span data-dcnode-id="1743" instrument_node="">In 1999, Yakovlev recalled in his introduction to the Russian edition of the Black Book of Communism that prior to perestroika, a select group of intellectuals “informally developed a plan: to hit at Stalin and Stalinism through Lenin, and then, if successful, at Lenin and revolutionism in general through Plekhanov, the Social Democrats, liberalism, and ‘ethical socialism.’”105 This ‘informal plan’ was successfully carried out during perestroika, and would have a tremendously destructive effect on Soviet mass consciousness. Yurchak notes that because Lenin was traditionally the main ‘anchor’ upon which the Party and state leadership had relied to legitimize itself, the undermining of his status as the ‘master signifier’ of the system portended catastrophic consequences for the system itself.106</span><br data-dcnode-id="1742"><br data-dcnode-id="1741"><span data-dcnode-id="1740" instrument_node="">In May 1988, in the midst of the media and artistic community’s campaign against Stalinism, liberal journalist Vasili Seliunin published ‘Istoki’ (‘Sources’/‘Roots’), one of earliest and most well-known journalistic attacks on Lenin, where he questioned the idea that the distortions of socialism began with Stalin. Seliunin argued that the ‘command-administrative system’ built by Stalin was made possible by the harsh methods of Lenin, the utopianism of maximalist socialism, and the Bolsheviks’ monopolization of power in the aftermath of the October Revolution.107 Many other commentators, ranging from liberal westernizers to conservative Russian nationalists, soon came to advance similar arguments in the</span><br data-dcnode-id="1739"><br data-dcnode-id="1738"><span data-dcnode-id="1728" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1737" instrument_node="">103 Alexander Kapto, “Pakt Molotova-Ribbentropa: Mistifikatsiya ili Realnost?” Bezopasnost Evrasii Vol.38, No.4 (2009), p.224, 228-229.</span><br data-dcnode-id="1736"><span data-dcnode-id="1735" instrument_node="">104 David Pryce-Jones, The War that Never Was: The Fall of the Soviet Empire: 1985-1991 (London: Weidenfeld &amp; Nicolson, 1995), p.95.</span><br data-dcnode-id="1734"><span data-dcnode-id="1733" instrument_node="">105 Alexander Yakovlev, “Bolshevism – Sotsialnaya Bolezn XX Veka,” in Robert Laffont (ed.) Chernaya Kniga Kommunisma Trans. E. Brailovskaya et al. (Moscow: Tree Veka Istorii, 1999), p.14.</span><br data-dcnode-id="1732"><span data-dcnode-id="1731" instrument_node="">106 Yurchak, p.74.</span><br data-dcnode-id="1730"><span data-dcnode-id="1729" instrument_node="">107 David Kotz and Fred Weir, Revolution from Above: The Demise of the Soviet System (New York: Routledge, 1997), p.68.; Malia, p.434.; Yakovlev, disguising his disdain for Lenin during the reform period (in fact calling for a return to ‘true Leninism’), bluntly stated after the collapse that Stalin was “a worthy pupil of Lenin’s in his hatred and in his taste for blood.” (Yakovlev, 2002, p.91.)</span></span><br data-dcnode-id="1727"><br data-dcnode-id="1726"><span data-dcnode-id="1725" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1724"><br data-dcnode-id="1723"><span data-dcnode-id="1722" instrument_node="">country’s central newspapers and journals.108 Like the campaign against Stalin and Stalinism, the one against Lenin and his cult was also aided by literary, theatre, and film productions. Vasili Grossman’s Vse Techet (Everything Flows), published in 1989, was the harshest, portraying Lenin as a “cruel and despotic prophet…a product of one thousand years of Russian serfdom and…an apostle of a new, Communist slavery.”109</span><br data-dcnode-id="1721"><br data-dcnode-id="1720"><span data-dcnode-id="1719" instrument_node="">In July 1989, explicitly questioning the moral basis for Soviet power in the USSR, Yuri Afanasyev argued that because the Soviet regime “was brought into being through bloodshed and with the aid of mass murderers and crimes against humanity,” it had no historical justification for existence.110 Through similar arguments, reformist intellectuals wrote off the entire Bolshevik project as cruel, bloody, and ultimately meaningless.111 Discussing the legacy of Bolshevism, famous liberal historians and social critics such as Yulia Boroday, Yevgeni Plimak and Alexei Kiva emphasized the shameful underdevelopment and backwardness of the country, the immorality of its ideology, and the “moral infantilism” of the generations of people living under it.112 Writing in Izvestia in 1990, Kiva argued that Marxism was a dogma “attractive to the lumpenized masses.”113 Mikhail Bulgakov’s Sobachie Serdse (Heart of a Dog), a hugely popular novel turned into many theatre productions and even a television film during perestroika, affirmed the growing conception among much of the intelligentsia that the October Revolution was carried out by the ‘grey masses’ who ‘trampled the dignity’ of the Russian intelligentsia.114</span><br data-dcnode-id="1718"><br data-dcnode-id="1717"><span data-dcnode-id="1716" instrument_node="">As hegemonic historical discourse shifted toward the open rejection of Lenin, the Bolsheviks and the Revolution, it became popular to publically re-examine and romanticize the history of pre-</span><br data-dcnode-id="1715"><br data-dcnode-id="1714"><span data-dcnode-id="1700" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1713" instrument_node="">108 Robert Horvath, The Legacy of Soviet Dissent: Dissidents, Democratization and Radical Nationalism in Russia (London: RoutledgeCurzon, 2005), p.35-36, 44, 46.; Kevin O’Connor, Intellectuals and Apparatchiks: Russian Nationalism and the Gorbachev Revolution (Lanham: Lexington Books, 2006), p.99.; Robert V. Daniels, The End of the Communist Revolution (London: Routledge, 1993), p.95.; Evans, p.163.; Goscilo in Goscilo and Lindsey, p.xxi.;</span><br data-dcnode-id="1712"><span data-dcnode-id="1711" instrument_node="">109 Shlapentokh, Soviet Intellectuals, p.239.</span><br data-dcnode-id="1710"><span data-dcnode-id="1709" instrument_node="">110 Afanasyev cited in Horvath, p.45.</span><br data-dcnode-id="1708"><span data-dcnode-id="1707" instrument_node="">111 Shlapentokh, 2001, p.194.</span><br data-dcnode-id="1706"><span data-dcnode-id="1705" instrument_node="">112 Novikov and Bascio, p.55.</span><br data-dcnode-id="1704"><span data-dcnode-id="1703" instrument_node="">113 Roy D. Laird, The Soviet Legacy (Westport: Praeger, 1993), p.27.</span><br data-dcnode-id="1702"><span data-dcnode-id="1701" instrument_node="">114 Kara-Murza, Manipulatsiya Soznaniem, p. 245.</span></span><br data-dcnode-id="1699"><br data-dcnode-id="1698"><span data-dcnode-id="1697" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1696"><br data-dcnode-id="1695"><span data-dcnode-id="1694" instrument_node="">revolutionary Russia. In 1988, Seliunin posited that Tsarist Russia was a country progressing toward democracy.115 Gorbachev advisor Fedor Burlatsky, writing in 1989, noted that the October revolution “threw out” democracy together with the “bourgeois bathwater,” while the worst traditions of old Russia “filtered through into the new society.”116 At the new Congress of People’s Deputies in 1989, Yuri Afansyev publically called for a new “February Revolution,” ostensibly a “return from the Leninist principles of October to the constitutionalist principles of February.”117 According to Karen Dawisha, the emergence of counterfactual historical possibilities and the recognition that October was not the product of ‘historical inevitability’ helped to erode faith in the Party and its ideological underpinnings.118</span><br data-dcnode-id="1693"><br data-dcnode-id="1692"><span data-dcnode-id="1691" instrument_node="">Critical of those individuals working to dismantle the old historical narratives, moderate conservative Politburo member Yegor Ligachev argues in his memoirs that this “large-scale manipulation of mass consciousness” worked not in the interests of social renewal, but “to crush everything that had been sacred in the past,” ultimately resulting in the “spiritual pauperization” of the nation.119 Unopposed to historical revisionism in principle, Ligachev argues that it was the extent of the media campaign’s one sidedness that was the problem, noting that:</span><br data-dcnode-id="1690"><br data-dcnode-id="1689"><span data-dcnode-id="1688" instrument_node="">"[t]he cresting flood of denunciatory articles engulfing the mass media began to deform the historical retrospective. The past rose up from the pages of the right-wing radical press not as a diverse and contradictory combination of achievements and errors but in exclusively gloomy if not pitch-black tones. Judging from these publications, there was nothing good in the past; our fathers and grandfathers had passed their time on this earth in senseless suffering, mired in travail. This unfair and slanderous bias did not correspond to the truth; it disturbed and agitated the social atmosphere. And it was directed…in the final analysis, against the nation, against its historical memory."120</span><br data-dcnode-id="1687"><br data-dcnode-id="1686"><span data-dcnode-id="1684" style="font-weight: bold"><span data-dcnode-id="1685" instrument_node="">The New Intellectual Discourse: The Re-Conceptualization of the Present</span></span><br data-dcnode-id="1683"><br data-dcnode-id="1682"><span data-dcnode-id="1681" instrument_node="">Having embarked on a campaign to re-interpret the past, the new intellectual discourse of perestroika also simultaneously undertook the task of re-conceptualizing the Soviet present. The first</span><br data-dcnode-id="1680"><br data-dcnode-id="1679"><span data-dcnode-id="1667" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1678" instrument_node="">115 Jonathan Steele, Eternal Russia: Yeltsin, Gorbachev and the Mirage of Democracy (London: Faber and Faber, 1994), p.41-42.</span><br data-dcnode-id="1677"><span data-dcnode-id="1676" instrument_node="">116 Archie Brown, Seven Years that Changed the World (Oxford: Oxford University Press, 2007), p.151.</span><br data-dcnode-id="1675"><span data-dcnode-id="1674" instrument_node="">117 Malia, p.467.</span><br data-dcnode-id="1673"><span data-dcnode-id="1672" instrument_node="">118 Karen Dawisha, “Communism as a Lived System of Ideas in Contemporary Russia,” East European Politics and Societies Vol.19, No.3 (2005), p.471.</span><br data-dcnode-id="1671"><span data-dcnode-id="1670" instrument_node="">119 Ligachev, p.287-288.</span><br data-dcnode-id="1669"><span data-dcnode-id="1668" instrument_node="">120 Ibid., p.285-286.</span></span><br data-dcnode-id="1666"><br data-dcnode-id="1665"><span data-dcnode-id="1664" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1663"><br data-dcnode-id="1662"><span data-dcnode-id="1661" instrument_node="">step to delegitimizing existing reality involved the rejection of the facts and figures purported to represent it. Seliunin and Khanin’s article ‘Lukavaya Tsifra’ (‘False Figure’), published in Novi Mir in February 1987, was among the first and most famous of the new works meant to discredit old measurements of social and economic progress.121 As the old figures were rejected, new ‘authoritative figures’ and facts were simultaneously brought forth to present a new, highly negative picture of reality. As noted by Becker, statistics published in an April 1988 issue of Moskovskie Novosti comparing Soviet and American living standards were “more gloomy” than anything “even the most militant cold warrior could present.”122 Like the campaign to destroy old historical narratives, the tables and statistics featured in the pages of journals like Argumenti i Fakti played their role in delegitimizing the old order, effectively saying “[d]own with communism…in a different way.” 123</span><br data-dcnode-id="1660"><br data-dcnode-id="1659"><span data-dcnode-id="1658" instrument_node="">Despite the radical intelligentsia’s claims to supporting a new level of openness and objectivity, some contemporary observers have critiqued them for their tendency to exaggerate, to replace old half-truths with new ones, and to lie outright. Discussing economist Abel Aganbegyan’s famous argument about the Soviet overproduction of tractors being symbolic of the absurd dynamics of the planned economic system, Kara-Murza explains that the USSR on the contrary never had enough tractors for its agriculture.124 Stephen Kotkin, commenting on the shifting media discourse on the United States and the West, notes that the perestroika-era media came to portray “the Soviet realm as utterly destitute and exploited, while the West came across as paved with gold and unreservedly free,” the old anti-Americanism replaced by “exaggerated pro-Americanism.”125</span><br data-dcnode-id="1657"><br data-dcnode-id="1656"><span data-dcnode-id="1655" instrument_node="">As a new critical style of social discourse emerged, old Marxist-Leninist ideological formulations underwent crushing criticism in every area of debate. In fact, some reformist academics first came to turn the postulates of Marxism against the Soviet system itself. Philosopher Boris Kurashvili argued on</span><br data-dcnode-id="1654"><br data-dcnode-id="1653"><span data-dcnode-id="1643" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1652" instrument_node="">121 Laqueur, 1993, p.395.</span><br data-dcnode-id="1651"><span data-dcnode-id="1650" instrument_node="">122 Becker, 1999, p.120.</span><br data-dcnode-id="1649"><span data-dcnode-id="1648" instrument_node="">123 Pryce-Jones, p.81.</span><br data-dcnode-id="1647"><span data-dcnode-id="1646" instrument_node="">124 Kara-Murza, Manipulatsiya Soznaniem, p.394-395.</span><br data-dcnode-id="1645"><span data-dcnode-id="1644" instrument_node="">125 Stephen Kotkin, Armageddon Averted: The Soviet Collapse, 1970-2000 (Oxford: Oxford University Press, 2008), p.69-70.</span></span><br data-dcnode-id="1642"><br data-dcnode-id="1641"><span data-dcnode-id="1640" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1639"><br data-dcnode-id="1638"><span data-dcnode-id="1637" instrument_node="">the basis of the theory of historical materialism that the Soviet project was a ‘violation’ of the objective laws of history.126 In a series of articles published between 1989 and 1990, Tatyana Zaslavskaya posited that the USSR had not in fact become a classless society, that the nomenklatura was exploiting and oppressing working people, and that there was no distinction to be made between socialism and capitalism –only varieties of “capitalism with socialist features.”127</span><br data-dcnode-id="1636"><br data-dcnode-id="1635"><span data-dcnode-id="1634" instrument_node="">In April 1987, future Moscow mayor Gavril Popov thought up the term ‘command-administrative system’ as a derogatory method of describing the Soviet political and socioeconomic model.128 Quickly passing into the social discourse (with variations of the term even used by Gorbachev), the term succinctly described the ‘fundamentally undemocratic’ nature of the Soviet system and critiqued its dependence on bureaucratic organs, the military and the political police for survival.129 Articles by economist Leonid Abalkin and sociologist Igor Kliamkin complemented Popov’s formulation, rooting Soviet ‘totalitarianism’ in the nature of the Marxist socialist economic model of public ownership and state management.130</span><br data-dcnode-id="1633"><br data-dcnode-id="1632"><span data-dcnode-id="1631" instrument_node="">In addition to being critiqued for its alleged tendency toward dictatorship, the socialist economic system was also criticized for its purported operation in defiance “of the objective laws of economic life.”131 First carefully justifying an economic reform program on the basis of Lenin’s NEP,132 by 1989 liberal academics and social commentators were calling for the wholesale repudiation of the economic mechanisms of the old ‘command-administrative system.’133 Yakovlev personally criticized the</span><br data-dcnode-id="1630"><br data-dcnode-id="1629"><span data-dcnode-id="1613" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1628" instrument_node="">126 Kara-Murza, Manipulatsiya Soznaniem, p.226.</span><br data-dcnode-id="1627"><span data-dcnode-id="1626" instrument_node="">127 Kotz and Weir, p.68.; Also see John E. Elliot, “Disintegration of the Soviet Politico-Economic System,” International Journal of Social Economics Vol.22, No.3 (1995), p.37.</span><br data-dcnode-id="1625"><span data-dcnode-id="1624" instrument_node="">128 Malia, p.433.</span><br data-dcnode-id="1623"><span data-dcnode-id="1622" instrument_node="">129 Laqueur, 1990, p.254.</span><br data-dcnode-id="1621"><span data-dcnode-id="1620" instrument_node="">130 Evans, p.164.; Laqueur, 1990, p.241.</span><br data-dcnode-id="1619"><span data-dcnode-id="1618" instrument_node="">131 Nikolai Shemlev cited in Alec Nove, “The Soviet Economic Crisis,” National Institute Economic Review Vol.138, No.1 (November 1991), p.85.</span><br data-dcnode-id="1617"><span data-dcnode-id="1616" instrument_node="">132 Neil Robinson, Ideology and the Collapse of the Soviet System: A Critical History of Soviet Ideological Discourse (Aldershot: Edward Elgar, 1995), p.168.</span><br data-dcnode-id="1615"><span data-dcnode-id="1614" instrument_node="">133 Dusko Doder and Louise Branson, Gorbachev: Heretic in the Kremlin (New York: Penguin Books, 1991), p.152.; Shlapentokh, 2001, p.169.</span></span><br data-dcnode-id="1612"><br data-dcnode-id="1611"><span data-dcnode-id="1610" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1609"><br data-dcnode-id="1608"><span data-dcnode-id="1607" instrument_node="">“dogmatic absolutization of state property” and argued that the economic ideals of communism were ‘utopian.’134</span><br data-dcnode-id="1606"><br data-dcnode-id="1605"><span data-dcnode-id="1604" instrument_node="">Analyzing the transformation of the public debate on economics, Vladimir Shlapentokh notes that “ideological imperatives” shared among liberal economists led them to the construction of “illusions that mixed desirable values and realities.”135 Promising economic ‘El Dorados’ and mystical ‘hidden reserves’ to be tapped with the implementation of meaningful market reforms,136 economists eventually came to promote the idea that mass private ownership would end alienation, decrease inequality, and encourage individual responsibility and the personal dignity argued to be lacking in socialism.137 Larisa Piyasheva even asserted in 1990 that the capitalist societies of the West were actually free from economic coercion, their people depicted to be working not out of the need to survive but for the sake of social prestige and the expression of creativity.138 After 1989, as the economy began to collapse, economists began arguing that only a radical program of privatization and marketization could “save the country from disaster.”139</span><br data-dcnode-id="1603"><br data-dcnode-id="1602"><span data-dcnode-id="1601" instrument_node="">With the rise of Gorbachev’s doctrine of ‘new political thinking’ in international affairs, the new liberal intellectual discourse played its role in legitimizing the idealistic worldview officially subscribed to by the state. First working to discredit ‘old thinking,’ a famous article by foreign policy analyst Vyacheslav Dashichev published in May 1988 blamed Brezhnev-era dogmatism and incompetence for the failures of Soviet foreign policy, the decline of détente, and the USSR’s encirclement by hostile powers.140 As the old Marxist and realist/statist conceptions about the inevitability of Western capitalist hostility to socialism and to the Soviet Union came to be rejected, analysts from the foreign policy</span><br data-dcnode-id="1600"><br data-dcnode-id="1599"><span data-dcnode-id="1585" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1598" instrument_node="">134 Evans, p.179, 204.</span><br data-dcnode-id="1597"><span data-dcnode-id="1596" instrument_node="">135 Vladimir Shlapentokh, “Privatization Debates in Russia: 1989-1992,” Comparative Economic Studies Vol.35, No.2 (1993), p.20.</span><br data-dcnode-id="1595"><span data-dcnode-id="1594" instrument_node="">136 Paul Gregory, “How the Soviet System Cracked,” Policy Review Vol.151 (October/November 2008), p.54.</span><br data-dcnode-id="1593"><span data-dcnode-id="1592" instrument_node="">137 Shlapentokh, 1993, p.21, 26.</span><br data-dcnode-id="1591"><span data-dcnode-id="1590" instrument_node="">138 Ibid., p.26.</span><br data-dcnode-id="1589"><span data-dcnode-id="1588" instrument_node="">139 Shlapentokh, Soviet Intellectuals, p.261.; Also see Shlapentokh, 2001, p.195.; Nove, p.86.; Novikov and Bascio, p.115-116.</span><br data-dcnode-id="1587"><span data-dcnode-id="1586" instrument_node="">140 Viacheslav Dashichev, “East-West Quest for New Relations: The Priorities of Soviet Foreign Policy,” in Tarasulo, p.225.</span></span><br data-dcnode-id="1584"><br data-dcnode-id="1583"><span data-dcnode-id="1582" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1581"><br data-dcnode-id="1580"><span data-dcnode-id="1579" instrument_node="">institutes began publically promoting strategic concessions in the interests of ‘universal human values’ and ‘broad’ global welfare.141 Subsequently, Soviet military and economic aid to old allies in the third world came be portrayed by the media as a waste of resources, and coverage of third world liberation struggles waned.142</span><br data-dcnode-id="1578"><br data-dcnode-id="1577"><span data-dcnode-id="1576" instrument_node="">As the old hegemonic ideologically-based ‘enemy image’ of the United States was gradually swept aside, it was replaced not by normal and impartial coverage but by an inverted media image, portraying the US as a superior society in virtually every way –materially, morally and spiritually.143 As a result, public conceptions of the Soviet system in relation to the rest of the world were fundamentally transformed. A mass survey conducted in Literaturnaya Gazeta (a newspaper read mostly by members of the intelligentsia) in early 1989 noted that 64% of respondents concluded that the Soviet Union “could not serve as a worthy example to anyone or for anything.”144</span><br data-dcnode-id="1575"><br data-dcnode-id="1574"><span data-dcnode-id="1572" style="font-weight: bold"><span data-dcnode-id="1573" instrument_node="">Systemic Overcentralization of Power and the Hegemony of the New Radical Discourse</span></span><br data-dcnode-id="1571"><br data-dcnode-id="1570"><span data-dcnode-id="1569" instrument_node="">Discussing the reform processes occurring in the Soviet Union in the late 1980s under the auspices of glasnost, Shlapentokh notes their “extraordinary” and historically unprecedented nature, the state effectively carrying out “a frontal offensive against its own ideology.”145 In Shlapentokh’s characterization, the old system, “a rigid, hierarchical organism, turned out to be defenseless against the actions of its leader, who undermined its vital mechanisms.”146 Conceptualizing Gorbachev as the “single motor of initial change,” Shlapentokh points out that even as political opposition to his reforms</span><br data-dcnode-id="1568"><br data-dcnode-id="1567"><span data-dcnode-id="1555" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1566" instrument_node="">141 Kimberly Marten Zisk, “Soviet Academic Theories on International Conflict and Negotiation,” Journal of Conflict Resolution Vol.34, No.4 (December 1990), p.687, 689, 691.; Peter Zwick, “New Thinking and New Foreign Policy under Gorbachev,” Political Science and Politics Vol.22, No.2 (June, 1989), p.216.</span><br data-dcnode-id="1565"><span data-dcnode-id="1564" instrument_node="">142 Charles Quist-Adade, “From Paternalism to Ethnocentrism: Images of Africa in Gorbachev’s Russia,” Race &amp; Class Vol.46, No.4 (April 2005), p.84, 85-88.</span><br data-dcnode-id="1563"><span data-dcnode-id="1562" instrument_node="">143 Kotkin, 1991, p.53, 75.; Andrei P. Tsygankov, “The Irony of Western Ideas in a Multicultural World: Russians’ Intellectual Engagement with the “end of History” and “Clash of Civilizations,” International Studies Review Vol.5 (2003), p.58-60.; Ries, p.174-175.; Laird, p.99,101.; Shane documents how perestroika-era television coverage in programs like Vzglyad took “the world as [it was] portrayed for decades and [turned] it 180 degrees: we are the ones who are exploited, impoverished, and censored… and they are the ones who live the good life and are free. It was a shocking, embittering, and disillusioning message that came from Ostankino every Friday night.” (Shane, p.169.)</span><br data-dcnode-id="1561"><span data-dcnode-id="1560" instrument_node="">144 Kara-Murza, Manipulatsiya Soznaniem, p.197.</span><br data-dcnode-id="1559"><span data-dcnode-id="1558" instrument_node="">145 Shlapentokh, 2001, p.193.</span><br data-dcnode-id="1557"><span data-dcnode-id="1556" instrument_node="">146 Ibid., p.201.</span></span><br data-dcnode-id="1554"><br data-dcnode-id="1553"><span data-dcnode-id="1552" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1551"><br data-dcnode-id="1550"><span data-dcnode-id="1549" instrument_node="">crystallized, it was unable to challenge him directly, or to formulate alternative policies, capable only of temporarily stalling the reform process.147 The Party apparatus, constrained by the principle of Party discipline, ended up giving up one position after another, ultimately voting to deprive itself of its own monopoly on power.148</span><br data-dcnode-id="1548"><br data-dcnode-id="1547"><span data-dcnode-id="1546" instrument_node="">The intensely hierarchical nature of the system extended to every sphere of political, social and cultural activity. Physically in control of virtually every organ of information dissemination, the reformist Party and state leadership could also rely, in Yakovlev’s words, on the population’s psychological dependence on salvation “from above.”149 As a result, the fundamental transformation of Soviet mass consciousness would only require a small ‘core’ of radical intelligentsia situated in the top posts in the media, the cultural sphere and academia. Focusing on the press, Shlapentokh notes that “what the liberal press achieved in the country was amazing…it took less than one hundred liberal intellectuals to effect a change in viewpoint of the mass intelligentsia and of the politically active part of the rest of the population.”150</span><br data-dcnode-id="1545"><br data-dcnode-id="1544"><span data-dcnode-id="1543" instrument_node="">Reviewing the Soviet media system’s transformation, Becker argues that especially during the period between 1985 and 1988, the press effectively “served as a weapon in the battle for policies, power and authority,” used by the reformers to help discredit conservative rivals and corrupted Party and state bureaucrats.151 Steele concurs that until the late 1980s, glasnost “did not change editors’ [traditional] approaches. A struggle for power was going on throughout Soviet society, and the press was one of the most important weapons in it.”152 DeLuca too notes that in its early years, glasnost was not about freedom of speech or of the press, “or the right to speak out against perestroika,” but a</span><br data-dcnode-id="1542"><br data-dcnode-id="1541"><span data-dcnode-id="1529" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1540" instrument_node="">147 Ibid., p.190.; According to Kotkin, these conservative attempts to fight the reforms in the only way they could simply intensified the reformers’ determination to discredit the conservative Party and state apparatus and to destroy its ideological and political power base. Observing the reformers’ anti-conservative fanaticism, Kotkin notes that as late as 1990, even as “calls for an overthrow of the regime multiplied and republican legislatures passed laws superseding those of the USSR, Gorbachev continued to state publically that the principle obstacle to ‘reform’ was opposition by ‘conservatives.’” (Kotkin, 2008, p.85.)</span><br data-dcnode-id="1539"><span data-dcnode-id="1538" instrument_node="">148 Steele, p.92.</span><br data-dcnode-id="1537"><span data-dcnode-id="1536" instrument_node="">149 Yakovlev, 1993, p.124.</span><br data-dcnode-id="1535"><span data-dcnode-id="1534" instrument_node="">150 Shlapentokh, Soviet Intellectuals, p.265.; See also McNair, 1994, p.117.</span><br data-dcnode-id="1533"><span data-dcnode-id="1532" instrument_node="">151 Becker, 1999, p.51.</span><br data-dcnode-id="1531"><span data-dcnode-id="1530" instrument_node="">152 Steele, p.100.</span></span><br data-dcnode-id="1528"><br data-dcnode-id="1527"><span data-dcnode-id="1526" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1525"><br data-dcnode-id="1524"><span data-dcnode-id="1523" instrument_node="">campaign instituted around the Leninist principle of mobilizing and (re)educating the masses –to “restructure” attitudes and policy and to “insure the irreversibility of the reform process.”153</span><br data-dcnode-id="1522"><span data-dcnode-id="1521" instrument_node="">Ligachev recalls with regret the fact that, as Central Committee Secretary of Ideology from 1985-1988 (officially sharing control over the media with Yakovlev), he did not do more to try to influence the formation of new ideological positions in magazines and newspapers during the early years of perestroika.154 With unconvincing naiveté, he contends that Yakovlev, “who had spent many years in the West, naturally had a much better understanding” of “the crucial role of the mass media” as a potentially “powerful and dangerous weapon” in the hands of those who direct it.155 Other members of Gorbachev’s entourage, including Chief of Staff Valery Boldin and advisor Anatoly Chernyaev, note that Ligachev was simply outmanoeuvred by Yakovlev in the struggle for ideological control. Boldin, noting that Ligachev was a forthright and unsubtle person, says that he was outwitted by Yakovlev’s ability to calculate “many moves ahead…Ligachev would schedule a press briefing one day, but Yakovlev, at another meeting with editors the next day or through individual contacts, would cancel everything Ligachev had said.”156 Chernyaev, discussing the debates over the release of controversial artistic works such as Abuladze’s Pokayanie and Rybakov’s Deti Arbata, notes that each time Ligachev would voice his opposition, and each time his objections would be overruled and the works released.157</span><br data-dcnode-id="1520"><br data-dcnode-id="1519"><span data-dcnode-id="1517" style="text-decoration: underline"><span data-dcnode-id="1518" instrument_node="">Empowering the Radical Intelligentsia</span></span><br data-dcnode-id="1516"><br data-dcnode-id="1515"><span data-dcnode-id="1514" instrument_node="">Prior to perestroika, liberally-minded intellectuals had a small collection of specialized journals and periodicals, and faced varying degrees of censorship and repression over time, effectively limiting what they were capable of publishing. The vast majority of the media apparatus, the academic presses, and the artistic institutions were controlled by conservative Marxist-Leninists who worked to preserve the status quo, either from within (as editors and heads of institutes and creative unions) or without </span><br data-dcnode-id="1513"><br data-dcnode-id="1512"><span data-dcnode-id="1502" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1511" instrument_node="">153 DeLuca, p.56.</span><br data-dcnode-id="1510"><span data-dcnode-id="1509" instrument_node="">154 Ligachev, p.98.</span><br data-dcnode-id="1508"><span data-dcnode-id="1507" instrument_node="">155 Ibid., p.105.</span><br data-dcnode-id="1506"><span data-dcnode-id="1505" instrument_node="">156 Boldin, p.121.</span><br data-dcnode-id="1504"><span data-dcnode-id="1503" instrument_node="">157 Anatoly S. Chernyaev, My Six Years with Gorbachev Trans. Robert D. English and Elizabeth Tucker (University Park, Pennsylvania: University of Pennsylvania Press, 2000), p.113.</span></span><br data-dcnode-id="1501"><br data-dcnode-id="1500"><span data-dcnode-id="1499" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1498"><br data-dcnode-id="1497"><span data-dcnode-id="1496" instrument_node="">(through Glavlit and other central censorship organs). In this situation, political thought radically divergent from hegemonic informational norms had virtually no real ability to reach large numbers of people. The dissidents, as open opponents of the regime, were even more restricted. Discussing the difficulties they faced in engaging the state in public debate, Young and Launer note that with “no access to the media…their efforts had little social impact within the borders of the Soviet Union.”158 Caroline Humphrey adds that as a result, most ordinary people simply wrote dissidents off “as pariahs or…as people ‘with a screw loose.’”159 Decimated and demoralized during the 1970s, it took Gorbachev’s active initiative “to drag them [back] into public activity.”160</span><br data-dcnode-id="1495"><br data-dcnode-id="1494"><span data-dcnode-id="1493" instrument_node="">In their analysis of the Soviet collapse, David Kotz and Fred Weir compare the radicalization of the Soviet intelligentsia in the glasnost period with a similar historical process of radicalization which occurred among elements of the American intelligentsia during the Great Depression. They conclude that while major media outlets remained largely closed to radical leftist American intellectuals in the 1930s, the radical liberal Soviet intellectuals “faced no such barriers” during the era of perestroika. On the contrary, the “top political leadership had actually given [them the] freedom to write as they wished, using the mass media as their vehicles.”161</span><br data-dcnode-id="1492"><br data-dcnode-id="1491"><span data-dcnode-id="1490" instrument_node="">Empowered by the state, the radical intelligentsia worked to influence and radicalize the mass intelligentsia, a massive group in Soviet society which by the mid-1980s was estimated to comprise anywhere between twenty and fifty million people.162 Stephen Lovell estimates that prior to perestroika, only about two million of this group had been thoroughly liberalized through informal discussions and the circulation of samizdat literature.163 In the late 1980s, as they were radicalized by the new social</span><br data-dcnode-id="1489"><br data-dcnode-id="1488"><span data-dcnode-id="1476" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1487" instrument_node="">158 Marilyn J. Young and Michael K. Launer, “The Final Days: The Development of Argumentative Discourse in the Soviet Union,” Argumentation Vol.16 (2002), p.445.</span><br data-dcnode-id="1486"><span data-dcnode-id="1485" instrument_node="">159 Caroline Humphrey, “Inequality and Exclusion: A Russian Case Study of Emotion in Politics,” Anthropological Theory Vol.1, No.3 (2002), p.345.; Also see Yurchak, p.107-108, 129, 143.</span><br data-dcnode-id="1484"><span data-dcnode-id="1483" instrument_node="">160 Shlapentokh, 2001, p.183.</span><br data-dcnode-id="1482"><span data-dcnode-id="1481" instrument_node="">161 Kotz and Weir, p.67.</span><br data-dcnode-id="1480"><span data-dcnode-id="1479" instrument_node="">162 Lovell, p.74.</span><br data-dcnode-id="1478"><span data-dcnode-id="1477" instrument_node="">163 Ibid.</span></span><br data-dcnode-id="1475"><br data-dcnode-id="1474"><span data-dcnode-id="1473" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1472"><br data-dcnode-id="1471"><span data-dcnode-id="1470" instrument_node="">discourse, the mass intelligentsia came to constitute “the largest pro-reform constituency,”164 first supporting Gorbachev against the conservatives, and then shifting their allegiance to Yeltsin and other democratic and nationalist leaders throughout the country.165 Gennady Batygin argues that the intelligentsia’s loss of faith in socialism and the state constituted a fatal blow to the entire Soviet system, since their ability and willingness to articulate “social myths” and to transmit them to the mass public via ideology, “moral and legal norms, [and] images of past and future” played a crucial role in the consolidation and preservation of Soviet power.166</span><br data-dcnode-id="1469"><br data-dcnode-id="1468"><span data-dcnode-id="1466" style="text-decoration: underline"><span data-dcnode-id="1467" instrument_node="">Hegemony of the New Discourse: Censorship in Reverse</span></span><br data-dcnode-id="1465"><br data-dcnode-id="1464"><span data-dcnode-id="1463" instrument_node="">As discussed above, the radical liberal intelligentsia came to gain a hegemonic voice in the social discourse of perestroika. This was achieved not only through their access to the mass media and promotion to important posts, but also through the direct and indirect censorship of their opponents. Ligachev regularly criticized the ‘one way democracy’ approach of glasnost journals,167 warning Gorbachev that instead of a pluralism of opinion, there existed a “dictatorship” in the media.168</span><br data-dcnode-id="1462"><span data-dcnode-id="1461" instrument_node="">Kurginyan and Kara-Murza, both prominent moderate conservative members of the Soviet intelligentsia during perestroika, have both confirmed the tendency among glasnost-era media to refuse publication of their work, ostensibly for its political content. Kurginyan, writing in the midst of the reform process, noted his inability to get published in the central press despite his prominent status as a</span><br data-dcnode-id="1460"><br data-dcnode-id="1459"><span data-dcnode-id="1449" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1458" instrument_node="">164 Theodore P. Gerber and Michael Hout, “More Shock than Therapy: Market Transition, Employment, and Income in Russia, 1991-1995,” American Journal of Sociology, Vol.104, No.1 (July 1998), p.10.; See also David Lane, “From State Socialism to Capitalism: The Role of Class and the World System,” Communist and Post-Communist Studies Vol.39 (2006), p.146.; Kotz and Weir, p.69.</span><br data-dcnode-id="1457"><span data-dcnode-id="1456" instrument_node="">165 Shlapentokh and others have noted the mass intelligentsia’s tendency to opt to “discard socialism” at a much more rapid pace than society as a whole. (Shlapentokh, Soviet Intellectuals p.82, 237.; Shane, p.215.; Laird, p.80, 84.) While the masses experienced “a much more modest, but no less remarkable” loss of faith in socialism (Shlapentokh, Soviet Intellectuals, 265.) the mass intelligentsia, constituting the most politically active group in society (Michael Urban et al., The Rebirth of Politics in Russia (Cambridge: Cambridge University Press, 1997), p.93), were the crucial force in supporting the rising tide of national protest in the late 1980s and early 1990s (Mark R. Beissinger, Nationalist Mobilization and the Collapse of the Soviet State (Cambridge: Cambridge University Press, 2002), p.89.), and acted as the main defenders of Yeltsin and the White House during the dramatic August 1991 coup attempt which ended in the complete disintegration of Soviet power. (Shlapentokh, 2001, p.200.)</span><br data-dcnode-id="1455"><span data-dcnode-id="1454" instrument_node="">166 Gennady S. Batygin, “The Transfer of Allegiances of the Intellectual Elites,” Studies in East European Thought Vol.53 (2001), p.258.</span><br data-dcnode-id="1453"><span data-dcnode-id="1452" instrument_node="">167 Jonathan Harris, Ligachev on Glasnost and Perestroika (Pittsburg: University of Pittsburg Center for Russian and East European Studies, 1989), p.32-35.</span><br data-dcnode-id="1451"><span data-dcnode-id="1450" instrument_node="">168 Yegor Ligachev, “Inside Gorbachev’s Kremlin,” in Dallin and Lapidus, p.709.</span></span><br data-dcnode-id="1448"><br data-dcnode-id="1447"><span data-dcnode-id="1446" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1445"><br data-dcnode-id="1444"><span data-dcnode-id="1443" instrument_node="">famous theatre director and advisor to the Pavlov government, arguing that “the principle of ‘whoever is not with us is against us’ continues to operate today in a modified form.”169 Kara-Murza, seeking to publish an article in response to a 1988 Seliunin piece which proposed the introduction of an unemployment mechanism, notes that he was rejected by over a dozen publications and told that the “editors do not agree with [his] point of view,” despite the fact that each of the papers was formally an organ of the Party and that employment was guaranteed as a fundamental social right by the Soviet Constitution.170</span><br data-dcnode-id="1442"><br data-dcnode-id="1441"><span data-dcnode-id="1440" instrument_node="">Recently appearing on a popular Russian television historical debate program, liberal Moskovskii Komsomolets editor Pavel Gusev explained, when asked why he refused to publish articles which were critical of the reform process, that he, “like those revolutionaries of 1917” who dismantled the old order, was a “revolutionary…fighting on his own front line…to defeat the old system and to see new people in power.” He rejected the publication of articles by those who were opposed to reform because he was afraid that they might “foul up” what he called the new “air of freedom.”171</span><br data-dcnode-id="1439"><br data-dcnode-id="1438"><span data-dcnode-id="1437" instrument_node="">Working in his capacity as Secretary of Propaganda, Yakovlev himself has discussed the necessity to use the ‘mechanisms of totalitarianism’ against the old system:</span><br data-dcnode-id="1436"><br data-dcnode-id="1435"><span data-dcnode-id="1434" instrument_node="">"Looking back, I can proudly say that that the subtle, clever, but very simple tactics –using the mechanisms of totalitarianism against the totalitarian system –worked. There was no other way to carry out the political struggle –Bolshevism completely rejected any democratic transition, any alternative thinking."172</span><br data-dcnode-id="1433"><br data-dcnode-id="1432"><span data-dcnode-id="1431" instrument_node="">Yakovlev’s ‘subtle’ use of the ‘mechanisms of totalitarianism’ did not pass unnoticed. Pravda editor Viktor Afanasyev implicitly criticized the government as early as March 1987 in a speech to the congress of the Union of Journalists, noting the propensity for state organs to harass and intimidate conservative periodicals. Afanasyev asserted that “[t]he moment a correspondent is given an</span><br data-dcnode-id="1430"><br data-dcnode-id="1429"><span data-dcnode-id="1416" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1428" instrument_node="">169 Sergei Kurginyan et al., Post-Perestroika: Contseptualnaya Model Razvitiya Nashego Obshestva, Poleticheskih Partii i Obshestvennih Organizatsii (Moscow: Politizdat, 1990). Electronic edition: &lt; </span><a class="postlink" data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ecc.ru/books/pp/pp.htm"><span data-dcnode-id="1426" instrument_node="">http://www.ecc.ru/books/pp/pp.htm</span></a><span data-dcnode-id="1423" instrument_node="">&gt;</span><br data-dcnode-id="1422"><span data-dcnode-id="1421" instrument_node="">170 Kara-Murza, Manipulatsiya Soznaniem, p.219.</span><br data-dcnode-id="1420"><span data-dcnode-id="1419" instrument_node="">171 “Glasnost: Shag k podlinnoi svobode ili informatsionnaya voina?” Sud Vremini. Petersburg – Channel 5. December 6, 2010.</span><br data-dcnode-id="1418"><span data-dcnode-id="1417" instrument_node="">172 Yakovlev, in Laffont, p.14.</span></span><br data-dcnode-id="1415"><br data-dcnode-id="1414"><span data-dcnode-id="1413" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1412"><br data-dcnode-id="1411"><span data-dcnode-id="1410" instrument_node="">assignment to collect critical material…‘telephone calls follow…Attempts are made to prevent a correspondent’s work and publication of their material.’”173 He also pointed to instances of journalists being fired from their posts and dismissed from the Party for deviating from the new line.174</span><br data-dcnode-id="1409"><br data-dcnode-id="1408"><span data-dcnode-id="1407" instrument_node="">Like the conservative organs, the liberal ‘flagships of glasnost’ were also subjected to surveillance and ideological control. Ogonyok editor Vitali Korotich once recalled how, in late 1987, having published an informal opinion poll from Novosibirsk about support for perestroika there which indicated that only 30 percent were in favour:</span><br data-dcnode-id="1406"><br data-dcnode-id="1405"><span data-dcnode-id="1404" instrument_node="">Yakovlev told me that Gorbachev called him early in the morning and told him that in Siberia there is a plot against him, a conspiracy…They sent a strong commission there, and Yakovlev called me and asked me to fire this guy [writer Dmitry Biruyukov] from our staff immediately, because he is an enemy of perestroika who published such a terrible thing –that Siberia’s against perestroika! [Laughs] I never fired this guy –I hid him somewhere in our staff. But Yakovlev, liberal Yakovlev, pressed me. Maybe three or four times he called me…and asked me if I fired this guy and if he’ll never be published [again]."175</span><br data-dcnode-id="1403"><br data-dcnode-id="1402"><span data-dcnode-id="1401" instrument_node="">Yakovlev’s conflict with the conservative journal Nash Sovremennik serves as another example of his personal effort as head of propaganda to repress the viewpoints of conservative opponents of reform. Affiliated with the RSFSR Writers’ Union, Nash Sovremennik was a flagship journal of a group which served as the principle source of intellectual opposition to perestroika.176 Unable to remove conservative editor Sergei Vikulov in 1986, Yakovlev would end up waging a campaign against the journal which lasted several years. Performing a character assassination of Vikulov and his editorial staff by calling them a bunch of ‘disorderly alcoholics,’ Yakovlev then ordered an investigation of the journal by his department, claiming that “he had received complaints from within the journal that things were</span><br data-dcnode-id="1400"><br data-dcnode-id="1399"><span data-dcnode-id="1391" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1398" instrument_node="">173 Doder and Branson, p.258.</span><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">174 Ibid.</span><br data-dcnode-id="1395"><span data-dcnode-id="1394" instrument_node="">175 Gibbs, p.15. [Emphasis in original]</span><br data-dcnode-id="1393"><span data-dcnode-id="1392" instrument_node="">176 The RSFSR Writers’ Union was unique among its republican counterparts, most of which had quickly aligned themselves with radical liberal forces at the outset of perestroika. Moskva and Literaturnaya Rossiya, two of the other main conservative publications, were also affiliated with this union. Unsuccessful in his efforts to nominate a reformer to the leadership of the RSFSR Writers’ Union at its July 1986 Congress, Yakovlev would use the flagships of glasnost to carry out an intensive campaign of criticism against the union. The liberal press charged the leadership of the union with corruption, called them out as timeservers and literary hacks, and categorized them as ‘conservatives’ and ‘reactionaries’ opposed to healthy and positive change (Garrard and Garrard, p.197-199, 209.) It was not until mid-1990 that liberal reformist elements could consolidate to take over the union at its next regular congress.</span></span><br data-dcnode-id="1390"><br data-dcnode-id="1389"><span data-dcnode-id="1388" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1387"><br data-dcnode-id="1386"><span data-dcnode-id="1385" instrument_node="">not in order.”177 The investigation coming up short, Yakovlev then began sending Gorbachev alarmist memoranda stating that he had found evidence of “Nazi-type propaganda” in the journal, accusations which Gorbachev dismissed as having no basis in reality, probably due to his sympathy for the moderate Russian nationalism espoused in the journal.178 Only in 1989, when national discourse formulated in Marxist-Leninist terms began collapsing, was Vikulov was finally ousted, replaced by radical nationalist and anti-communist Stanislav Kuniaev179 (by that point Yakovlev was no longer in charge of the propaganda department). With Kuniaev’s appointment, Nash Sovremennik, former stronghold of ‘red’ nationalism, began publishing articles condemning the “monstrous genocide” carried out by the Soviet regime against its opponents in the aftermath of the civil war.180 Most of the other conservative journals followed suit, losing their Marxist and moderate conservative nationalist editors and their affiliation with the CPSU and turning into battlegrounds between ‘red,’ ‘brown,’ and ‘white’ nationalists.181</span><br data-dcnode-id="1384"><span data-dcnode-id="1383" instrument_node="">In late 1988, with reformist hegemony assured in the aftermath of the Andreyeva affair (discussed below), Yakovlev was transferred from his post as head of propaganda to foreign affairs, where he acted as advisor to Gorbachev and Foreign Minister Eduard Shevardnadze. He was replaced by Vadim Medvedev, a former protégé of his.182 Soon after, the close supervision of the central press and the arts declined, and in late 1988 the Department of Propaganda’s responsibility was formally and legally transformed to an informational/advisory role.183</span><br data-dcnode-id="1382"><br data-dcnode-id="1381"><span data-dcnode-id="1379" style="font-weight: bold"><span data-dcnode-id="1380" instrument_node="">The Andreyeva Affair</span></span><br data-dcnode-id="1378"><br data-dcnode-id="1377"><span data-dcnode-id="1376" instrument_node="">In March 1988, a letter by Leningrad chemistry teacher Nina Andreyeva was published in the central newspaper Sovetskaya Rossiya. Entitled “I Cannot Forsake My Principles” the letter was a voice of opposition to the abandonment of Marxist-Leninist principles and to the ‘distortion’ of history which</span><br data-dcnode-id="1375"><br data-dcnode-id="1374"><span data-dcnode-id="1360" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1373" instrument_node="">177 Cosgrove, p.92.</span><br data-dcnode-id="1372"><span data-dcnode-id="1371" instrument_node="">178 Ibid., p.95.</span><br data-dcnode-id="1370"><span data-dcnode-id="1369" instrument_node="">179 Ibid., p.118.</span><br data-dcnode-id="1368"><span data-dcnode-id="1367" instrument_node="">180 Spring in Spring, p.83-84.</span><br data-dcnode-id="1366"><span data-dcnode-id="1365" instrument_node="">181 Cosgrove, p.111, 113, 116-118.</span><br data-dcnode-id="1364"><span data-dcnode-id="1363" instrument_node="">182 Medvedev had worked with Yakovlev in the 1960s while the latter was the Deputy Secretary of the Propaganda Department of the Central Committee (Vadim Medvedev, V Komande Gorbacheva)</span><br data-dcnode-id="1362"><span data-dcnode-id="1361" instrument_node="">183 Becker, 1999, p.53-54.</span></span><br data-dcnode-id="1359"><br data-dcnode-id="1358"><span data-dcnode-id="1357" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1356"><br data-dcnode-id="1355"><span data-dcnode-id="1354" instrument_node="">Andreyeva felt was occurring in the media and in the arts. Ultimately the letter and its use by the reformers to crack down on the conservatives came to epitomize the climax in the political struggle against the opponents of reform.</span><br data-dcnode-id="1353"><br data-dcnode-id="1352"><span data-dcnode-id="1351" instrument_node="">Characterized by many Western academic observers as an ‘anti-Semitic,’ ‘neo-Stalinist,’ ‘Russian nationalist,’ ‘anti-perestroika manifesto,’ the letter’s argumentation was actually quite moderate. The title of the letter was a quote from one of Gorbachev’s speeches, and the letter closed with another quotation in which Gorbachev talked about “the importance of Marxist-Leninist principles.” Warning of the “ideological ‘confusion’ and ‘one-sidedness being sown by certain glasnost writers,” Andreyeva criticized both ‘left-liberals’ and ‘neo-Slavophile’ Russian nationalists, noting that the effect of their efforts was to confuse the young people she was teaching. The liberals were critiqued for their idealization of the West and for espousing the political principle of individualism over collectivism, the Slavophile nationalists for their romanticization of pre-revolutionary Russia. Contrary to the much ascribed ‘neo-Stalinist’ character of the letter, Andreyeva actually noted that she shared the indignation of all Soviet people over the repressions of the 1930s, from which her own family had also suffered. Ultimately, Andreyeva called for a ‘balanced’ assessment of the Stalin period –for the recognition that in addition to noting the mistakes and crimes, the press should also acknowledge the great achievements of the period.184</span><br data-dcnode-id="1350"><br data-dcnode-id="1349"><span data-dcnode-id="1348" instrument_node="">Boldin has recalled that Gorbachev’s initial reaction to the letter was that it was “all right.”185 However, upon hearing that it was receiving support from citizens writing to Pravda and other press organs, being circulated through Leningrad and reprinted by the provincial press,186 Gorbachev and</span><br data-dcnode-id="1347"><br data-dcnode-id="1346"><span data-dcnode-id="1340" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1345" instrument_node="">184 Roger Keeran and Thomas Kenny, Socialism Betrayed: Behind the Collapse of the Soviet Union, 1917-1991 (New York: iUniverse, 2010), p.142-143.; An online copy of Andreyeva’s original article can be found online: Nina Andreyeva, “Ne Mogu Postupatsa Printsipami,” Sovetskaya Rossiya (March 13, 1988). &lt;www.revolucia.ru/nmppr.htm&gt; ; On the issue of Andreyeva’s supposed anti-semitism: her criticism of the Jewish ‘refusniks’ agitating for permission to emigrate was that they were portraying their effort as a manifestation of the struggle for democracy, while Andreyeva believed that their real motive was the desire for personal material betterment (known in the Soviet Union and contemporary Russia as ‘kolbasnaya emmigratsiya‘ (‘sausage immigration’).</span><br data-dcnode-id="1344"><span data-dcnode-id="1343" instrument_node="">185 Boldin, p.168.</span><br data-dcnode-id="1342"><span data-dcnode-id="1341" instrument_node="">186 Keeran and Kenny, p.145.; Gibbs, p.68.; McNair, 1989, p.341.; Ligachev, p.309.</span></span><br data-dcnode-id="1339"><br data-dcnode-id="1338"><span data-dcnode-id="1337" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1336"><br data-dcnode-id="1335"><span data-dcnode-id="1334" instrument_node="">Yakovlev decided to launch a full scale political and media attack. A two day session of the Politburo was held –unprecedented for the discussion of a mere newspaper article, where, as Ligachev recalled, “the usually reasonable style at Politburo sessions had changed completely and turned punitive,”187 each Politburo member called in turn to voice his condemnation of the letter.188 Speaking at the session, Yakovlev emphasized the threat that the letter posed not only to the reform program but also to “Gorbachev personally.”189</span><br data-dcnode-id="1333"><br data-dcnode-id="1332"><span data-dcnode-id="1331" instrument_node="">The official response in Pravda, written by Yakovlev and released anonymously in early April, polemicized the letter, turning it into a pretence for attacking conservative forces opposed to perestroika in an overwhelming and systematic way.190 Titled “Principles of Perestroika: Revolutionary Nature of Thinking and Acting,” the rebuttal claimed that Andreyeva’s letter represented “in a highly concentrated form…intolerance to the elementary idea of renewal,” and “the brutal exposition of fixed positions that are in essence conservative and dogmatic.” Arguing that the letter constituted a defence of Stalinism, the rebuttal noted that those behind its publication were said to be trying to “revise party decisions.”191 It critiqued Andreyeva for her supposed rejection of historical truth, which was being ‘reinstated’ thanks to glasnost and perestroika, cleansed “of the false and sly half-truths” of the past.192 The rebuttal concluded by disingenuously calling for the “mastery of the full profundity of the Marxist-Leninist concept of perestroika” and “for more glasnost, more democracy, more socialism.”193</span><br data-dcnode-id="1330"><br data-dcnode-id="1329"><span data-dcnode-id="1315" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1328" instrument_node="">187 Ligachev, p.305.</span><br data-dcnode-id="1327"><span data-dcnode-id="1326" instrument_node="">188 Ibid., p.307-308.</span><br data-dcnode-id="1325"><span data-dcnode-id="1324" instrument_node="">189 Chernyaev, p.154.</span><br data-dcnode-id="1323"><span data-dcnode-id="1322" instrument_node="">190 Yakovlev’s rebuttal was published several weeks after Andreyeva’s letter, leading many observers temporarily convinced that the letter signalled an ideological shift back to pre-perestroika media and cultural norms. Korotich has decisively debunked the idea that the leadership had wavered in the face of the conservative onslaught, explaining that as he was planning to respond, Yakovlev called him and told him to postpone his response, saying that “[t]he answer to Nina Andreyeva [had to come] from the official level… from the highest level.” (Gibbs, p.68.) In other words, the time lag was a conscious policy measure, possibly designed to get the leadership of the conservative opposition to reveal itself in full in preparation for the crushing attack against them which followed.</span><br data-dcnode-id="1321"><span data-dcnode-id="1320" instrument_node="">191 Yakovlev cited in Gibbs, p.69.</span><br data-dcnode-id="1319"><span data-dcnode-id="1318" instrument_node="">192 Alexander Yakovlev, “Principles of Perestroika: The Revolutionary Nature of Thinking and Acting,” in Tarasulo, p.295.</span><br data-dcnode-id="1317"><span data-dcnode-id="1316" instrument_node="">193 Ibid., p.302.</span></span><br data-dcnode-id="1314"><br data-dcnode-id="1313"><span data-dcnode-id="1312" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1311"><br data-dcnode-id="1310"><span data-dcnode-id="1309" instrument_node="">Sovetskaya Rossiya, its offices raided in search of evidence of a conspiracy, was forced to issue a retraction, and forbidden from publishing reader letters supporting Andreyeva.194 Other papers were also coerced into compliance.195 Meanwhile, as recalled by Chernyaev, liberal papers printed “such an avalanche of anti-Stalinism…as would never have been tolerated…before the incident.”196 Party first secretaries who had republished the letter in their regional papers were also reprimanded. Sverdlovsk first secretary Yuri Petrov, refusing to repent to Gorbachev for republishing the article, was relieved of his post and sent off as ambassador to Cuba.197 Ligachev himself, suspected of being behind the letter, lost any remaining responsibility for the media, and was formally transferred to the Secretariat for Agriculture after the September 1988 emergency plenum.198</span><br data-dcnode-id="1308"><br data-dcnode-id="1307"><span data-dcnode-id="1306" instrument_node="">In his memoirs, Ligachev has come to recognize that the Andreyeva letter was a tool “used in the battle with those who opposed the destructive radical anti-Soviet idea,”199 arguing that it was a case of manipulation “in the best tradition of [Mikhail] Suslov’s Agitprop.”200 Pointing out the artificially inflated sense of importance attributed to the letter, Chernyaev has noted that “if there had been no Nina Andreyeva, we would have had to invent her.”201 Yakovlev himself has confirmed that the destruction of the conservative opposition in the aftermath of the Andreyeva affair constituted the ‘crossing of the Rubicon’ to radical reform.202 Roger Keeran and Thomas Kenny explain that the response to Andreyeva’s letter signalled “the decisive turning point in the transformation of perestroika from an Andropov-inspired reform effort within the traditional context of Soviet socialism to an open attack on the major pillars of socialism –the Communist Party, socialized property, and central planning,”203 Kotkin confirms that the campaign against the letter was a means by which the reformers were able to</span><br data-dcnode-id="1305"><br data-dcnode-id="1304"><span data-dcnode-id="1284" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1303" instrument_node="">194 McNair, 1989, p.341.; Keeran and Kenny, p.146.; Ligachev, p.309.; Gibbs, p.69.</span><br data-dcnode-id="1302"><span data-dcnode-id="1301" instrument_node="">195 Cosgrove, p.112.</span><br data-dcnode-id="1300"><span data-dcnode-id="1299" instrument_node="">196 Chernyaev, p.156.</span><br data-dcnode-id="1298"><span data-dcnode-id="1297" instrument_node="">197 Ibid., p.159.</span><br data-dcnode-id="1296"><span data-dcnode-id="1295" instrument_node="">198 Archie Brown, The Gorbachev Factor (Oxford: Oxford University Press, 1996), p.175.</span><br data-dcnode-id="1294"><span data-dcnode-id="1293" instrument_node="">199 Ligachev, p.308.</span><br data-dcnode-id="1292"><span data-dcnode-id="1291" instrument_node="">200 Ibid., p.303.</span><br data-dcnode-id="1290"><span data-dcnode-id="1289" instrument_node="">201 Chernyaev, p.156.</span><br data-dcnode-id="1288"><span data-dcnode-id="1287" instrument_node="">202 Roy Medvedev and Giulietto Chiesa, Time of Change: An Insider’s View of Russia’s Transformation (London: I.B. Tauris, 1991), p.196.</span><br data-dcnode-id="1286"><span data-dcnode-id="1285" instrument_node="">203 Keeran and Kenny, p.142.</span></span><br data-dcnode-id="1283"><br data-dcnode-id="1282"><span data-dcnode-id="1281" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1280"><br data-dcnode-id="1279"><span data-dcnode-id="1278" instrument_node="">decisively discredit the old conservative Party apparat and to institute a radical restructuring of the political system.204</span><br data-dcnode-id="1277"><br data-dcnode-id="1276"><span data-dcnode-id="1274" style="text-decoration: underline"><span data-dcnode-id="1275" instrument_node="">Fallout from the Affair</span></span><br data-dcnode-id="1273"><br data-dcnode-id="1272"><span data-dcnode-id="1271" instrument_node="">Speaking in April 1988 on the anniversary of Lenin’s birth, recently promoted Politburo candidate member Georgy Razumovskii discussed the need for Soviet society to ‘return’ to Leninist socialism, “with its diversity of forms of economic, social, and spiritual life,” to repudiate “conceptions of socialism fostered during the cult of personality,” and to recognize “informal groupings as a legitimate reflection of people’s impatience with…existing mass organizations.”205 Razumovskii’s speech came to presage many of the fundamental political reforms passed at the Nineteenth Party Conference of the CPSU, held in June 1988.</span><br data-dcnode-id="1270"><br data-dcnode-id="1269"><span data-dcnode-id="1268" instrument_node="">Emboldened by his media victory against conservative forces, and using his authority as General Secretary, Gorbachev successfully pushed a number of radical proposals through the Conference with little discussion and little opposition from the conservative majority.206 He forced nearly one hundred members of the Central Committee to vote for the elimination of their posts,207 moved to abolish the Party’s coordinating role in the management of the economy,208 and created a new partially popularly elected legislative branch –the Congress of People’s Deputies. The official resolution read at the conclusion of the Conference noted the necessity to “irrevocably repudiate the command-directive</span><br data-dcnode-id="1267"><br data-dcnode-id="1266"><span data-dcnode-id="1256" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1265" instrument_node="">204 Kotkin, 2008, p.74.</span><br data-dcnode-id="1264"><span data-dcnode-id="1263" instrument_node="">205 Harris, p.38.</span><br data-dcnode-id="1262"><span data-dcnode-id="1261" instrument_node="">206 Malia, p.428.</span><br data-dcnode-id="1260"><span data-dcnode-id="1259" instrument_node="">207 Shlapentokh, 2001, p.212.</span><br data-dcnode-id="1258"><span data-dcnode-id="1257" instrument_node="">208 Ellman and Kontorovich cite the decision to remove the Party’s coordinating role in the economy as one of the key reasons for the ultimate crisis and collapse of the economy. With the destruction of the Party-directed planning mechanism, over a thousand Central Committee departments and several hundred thousand workers charged with planning and coordinating the economy were eliminated, the remnants amalgamated into a single socioeconomic department. Without Party supervision, enterprises were left without planning constraints or guidelines, and enterprise directors had nowhere to turn to ensure the delivery of raw materials and finished goods to their destinations. While the planning mechanism collapsed, no effective market mechanism stepped into its place, and the economy slipped into paralysis. (Vladimir Mozhin, “The Party and the Economic Reform,” and Yuri Belik, “Changes in the Central Committee Apparatus,” in Ellman and Kontorovich, p.165-166.; Lev Freinkman, “Politics and Enterprise Behaviour,” in Ibid., p.187-189.; Yuri Kuznetsov, “Local Party Organs and the Economy During Perestroika,” in ibid., p.197, 200-205, 208.; See also Donald F. Dixon and Evgeny Polyakov, “Physical Quality-of-Life Indicators in Post-Stalinist Russia,” Journal of Macromarketing (Spring 1997), p.43-45.; Philip Hanson, “Soviet Economic Reform: Perestroika or ‘Catastroika’?” World Policy Journal Vol.8, No.2 (Spring 1991), p.311, 314.; Elliot, p.32-36.)</span></span><br data-dcnode-id="1255"><br data-dcnode-id="1254"><span data-dcnode-id="1253" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1252"><br data-dcnode-id="1251"><span data-dcnode-id="1250" instrument_node="">methods,” and the “deformations” of the Stalinist system which were said to have crippled the Soviet system.209</span><br data-dcnode-id="1249"><br data-dcnode-id="1248"><span data-dcnode-id="1247" instrument_node="">In September 1988, Gorbachev completed his “veritable coup d’état” against conservative elements of the Politburo and the Secretariat, calling an unprecedented emergency plenum, lasting only one hour, which removed virtually all of his remaining conservative opponents, including Mikhail Solomentsev, Andrei Gromyko, and Ligachev.210</span><br data-dcnode-id="1246"><br data-dcnode-id="1245"><span data-dcnode-id="1243" style="text-decoration: underline"><span data-dcnode-id="1244" instrument_node="">1989-1991: The Decisive Collapse of Socialism and the Rise of Liberal Pluralism and Nationalism</span></span><br data-dcnode-id="1242"><br data-dcnode-id="1241"><span data-dcnode-id="1240" instrument_node="">By 1989, the radical liberal intelligentsia which had played such an important role in supporting Gorbachev and the reform process took a decisive turn against him and his reform communist program. Discussing the media discourse of this period, Vladimir Buldakov notes that “[i]f in 1988…radical, democratic mass publications…were still conducting a supportive campaign on behalf of the ‘real’ October, cursing Stalin for everything that went wrong and mourning his victims…by 1989 the situation had totally changed.” The goal of the liberal intelligentsia had become “to obliterate the Communist Party…along with it its ‘October roots.’”211 Many of Gorbachev’s most famous liberal allies, including personalities like Yegor Yakovlev, Tatyana Zaslavskaya and Yuri Afanasyev now came to openly oppose him and his attempt to salvage the Soviet project, which they judged ‘incapable of reform.’212</span><br data-dcnode-id="1239"><br data-dcnode-id="1238"><span data-dcnode-id="1237" instrument_node="">As criticism of the reformers’ muddled program and of Gorbachev‘s personal style of leadership increased, he began vigorously denouncing the media for “throwing matches” in a country “knee-deep in gasoline,”213 condemning “social demagogues [who] have found their way into some editorial offices,” and reprimanding sensationalist journalists “who, in their chase after popularity, are ready to speak out</span><br data-dcnode-id="1236"><br data-dcnode-id="1235"><span data-dcnode-id="1225" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1234" instrument_node="">209 Sternthal, p.112-113.</span><br data-dcnode-id="1233"><span data-dcnode-id="1232" instrument_node="">210 Solomentsev and Gromyko were retired, and Ligachev was moved to the Secretariat for Agriculture. The ‘coup’ was in some sense quite literal, Gorbachev putting the Moscow Military District on alert during the plenum. (Malia, p.430.)</span><br data-dcnode-id="1231"><span data-dcnode-id="1230" instrument_node="">211 Vladimir P. Buldakov, “The October Revolution: Seventy-Five Years On,” Trans. Alan Wood European History Quarterly Vol.22 (1992), p.498.</span><br data-dcnode-id="1229"><span data-dcnode-id="1228" instrument_node="">212 Urban et al., p.91.</span><br data-dcnode-id="1227"><span data-dcnode-id="1226" instrument_node="">213 Gorbachev cited in Shane, p.165.</span></span><br data-dcnode-id="1224"><br data-dcnode-id="1223"><span data-dcnode-id="1222" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -</span><br data-dcnode-id="1221"><br data-dcnode-id="1220"><span data-dcnode-id="1219" instrument_node="">against their own mother.”214 Chernyaev recalls in his memoirs how, together with Vadim Medvedev, he often had to save bold editors from the General Secretary’s wrath, telling Gorbachev that the new critical style of discourse was merely a healthy expression of pluralism.215 Ligachev too has noted how Gorbachev would often tell Medvedev to “‘deal with the situation’ [in the press,] but no one ever followed up on this, and Medvedev never reported his results.”216 In this way, Gorbachev’s ministers and advisers were usually effectively able to defuse his growing anger and frustration with the media without making any real effort to curb the growing radicalism of media discourse.217</span><br data-dcnode-id="1218"><br data-dcnode-id="1217"><span data-dcnode-id="1216" instrument_node="">The televised proceedings of the new Congress of People’s Deputies parliament elected in March 1989, watched by as many as 200 million people, helped to further undermine “the legitimacy of the Party, Soviet history, and the whole social order,”218 many of the radical deputies labouring to discredit the old system and to portray the leadership as irresolute, incompetent and dishonest.219 In many ways the Congress acted more as a debating club than as an organ of political power. As ethnographer Nancy Ries notes, “[t]o watch the televised sessions of the Congress…was to hear endless litanies on one topic or another –actually an endless competition of litanies.”220 Radical deputies from the famous ‘interregional group,’ including future political heavyweights like Yeltsin, Popov and Anatoli</span><br data-dcnode-id="1215"><br data-dcnode-id="1214"><span data-dcnode-id="1200" style="font-size:85%;line-height:116%;"><span data-dcnode-id="1213" instrument_node="">214 Gorbachev cited in Horvath, p.77.</span><br data-dcnode-id="1212"><span data-dcnode-id="1211" instrument_node="">215 Chernyaev, p.176.</span><br data-dcnode-id="1210"><span data-dcnode-id="1209" instrument_node="">216 Ligachev, p.101.</span><br data-dcnode-id="1208"><span data-dcnode-id="1207" instrument_node="">217 In 1989, when a poll in Argumenti i Fakti showed that Yeltsin, Sakharov, and Popov were all more popular than Gorbachev in Moscow, the General Secretary famously demanded the resignation of the weekly’s editor, Vladimir Starkov. When the editor refused, receiving support from his coworkers and other liberal editors, Gorbachev backed down, though not without destroying his liberal credibility in the eyes of much of the liberal intelligentsia. In early 1991, after a military attempt to restore order in Vilnius resulted in bloodshed, Gorbachev threatened to suspend the new Press Law for the media’s alleged lack of objectivity in its coverage of the events. Again he backed down, his angry outcry again serving only “to warn others that Gorbachev may not be such a champion of glasnost after all.” (Urban et al., p.81.)</span><br data-dcnode-id="1206"><span data-dcnode-id="1205" instrument_node="">218 Keeran and Kenny, p.183.; See also Malia, p.451.</span><br data-dcnode-id="1204"><span data-dcnode-id="1203" instrument_node="">219 During the election campaign in the run-up to the Congress, national and local media helped to facilitate the election of liberal candidates through a campaign of intense criticism against conservative candidates. This is how Leningrad Party Secretary Yuri Solovyev, relentlessly attacked in Leningradskaya Pravda and the central organ Izvestia, famously and embarrassingly lost his seat through a vote of no confidence even though he ran unopposed. (Steele, p.111.)</span><br data-dcnode-id="1202"><span data-dcnode-id="1201" instrument_node="">220 Ries, p.167.</span></span><br data-dcnode-id="1199"><br data-dcnode-id="1198"><span data-dcnode-id="1197" instrument_node="">- - - - - - - - - - - - - - - - - - - - - - - -
