</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>The increasingly serious energy crisis and environmental pollution caused by the excessive use of fossil fuels have been prompting China to aggressively seek a clean and self-sufficient energy source in the future. In the past decades, hydrogen has emerged as a promising alternative due to its advantages of cleanliness, abundance, high energy density, and high conversion efficiency. However, several challenges have to be overcome for China&amp;#x27;s successful transition to hydrogen economy. In this paper, the hydrogen supply chain is firstly described to help the readers to clearly understand the hydrogen economy. Subsequently, the feasibility of hydrogen economy is discussed by reviewing viewpoints from the literature. Finally, the challenges of China&amp;#x27;s transition to hydrogen economy are detailed summarized and discussed, and the strategies for China to develop hydrogen economy were compared with that of Japan and Australia.</p></div></div></div>" data-dcnode-id="12120" lang="en" name="citation_abstract"><span data-dcnode-id="12119" instrument_node="">

a-dcnode-id="11388" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="11385"></section><section class="ReferencedArticles" data-dcnode-id="11384"></section><div class="PageDivider" data-dcnode-id="11383"></div><div class="Abstracts u-font-serif" data-dcnode-id="11345" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="11352" id="abs0015" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11381"><span data-dcnode-id="11382" instrument_node="">Highlights</span></h2><div data-dcnode-id="11353" id="abssec0015"><p data-dcnode-id="11354" id="abspara0015"></p><dl class="list" data-dcnode-id="11355"><dt class="list-label" data-dcnode-id="11379"><span data-dcnode-id="11380" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="11376"><p data-dcnode-id="11377" id="p0010"><span data-dcnode-id="11378" instrument_node="">Hydrogen economy is feasible with many challenges.</span></p></dd><dt class="list-label" data-dcnode-id="11374"><span data-dcnode-id="11375" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="11371"><p data-dcnode-id="11372" id="p0015"><span data-dcnode-id="11373" instrument_node="">Hydrogen and electricity should clearly have the same strategic position in China.</span></p></dd><dt class="list-label" data-dcnode-id="11369"><span data-dcnode-id="11370" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="11366"><p data-dcnode-id="11367" id="p0020"><span data-dcnode-id="11368" instrument_node="">Geographic differences in resources and demands should be addressed.</span></p></dd><dt class="list-label" data-dcnode-id="11364"><span data-dcnode-id="11365" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="11361"><p data-dcnode-id="11362" id="p0025"><span data-dcnode-id="11363" instrument_node="">It is necessary to diversify the application of hydrogen.</span></p></dd><dt class="list-label" data-dcnode-id="11359"><span data-dcnode-id="11360" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="11356"><p data-dcnode-id="11357" id="p0030"><span data-dcnode-id="11358" instrument_node="">CCS technology is significance to the medium-term development of China's hydrogen economy.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="11346" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11350"><span data-dcnode-id="11351" instrument_node="">Abstract</span></h2><div data-dcnode-id="11347" id="abssec0010"><p data-dcnode-id="11348" id="abspara0010"><span data-dcnode-id="11349" instrument_node="">The increasingly serious energy crisis and environmental pollution caused by the excessive use of fossil fuels have been prompting China to aggressively seek a clean and self-sufficient energy source in the future. In the past decades, hydrogen has emerged as a promising alternative due to its advantages of cleanliness, abundance, high energy density, and high conversion efficiency. However, several challenges have to be overcome for China's successful transition to hydrogen economy. In this paper, the hydrogen supply chain is firstly described to help the readers to clearly understand the hydrogen economy. Subsequently, the feasibility of hydrogen economy is discussed by reviewing viewpoints from the literature. Finally, the challenges of China's transition to hydrogen economy are detailed summarized and discussed, and the strategies for China to develop hydrogen economy were compared with that of Japan and Australia.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="11322" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="11334"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="11335" href="https: -margin-xxl-left" data-dcnode-id="11095"><p data-dcnode-id="11096" id="p0235"><span data-dcnode-id="11097" instrument_node="">Steam Reforming</span></p></dd><dt data-dcnode-id="11093"><span data-dcnode-id="11094" instrument_node="">WGS</span></dt><dd class="u-margin-xxl-left" data-dcnode-id="11090"><p data-dcnode-id="11091" id="p0240"><span data-dcnode-id="11092" instrument_node="">Water-Gas Shift</span></p></dd><dt data-dcnode-id="11085"><span data-dcnode-id="11089" instrument_node="">ZEH</span><sub data-dcnode-id="11087"><span data-dcnode-id="11088" instrument_node="">2</span></sub><span data-dcnode-id="11086" instrument_node="">E</span></dt><dd class="u-margin-xxl-left" data-dcnode-id="11082"><p data-dcnode-id="11083" id="p0245"><span data-dcnode-id="11084" instrument_node="">Zero Energy Hydrogen Economy</span></p></dd></dl></section><div data-dcnode-id="9481"><section data-dcnode-id="10893" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11078" id="sectitle0030"><span data-dcnode-id="11079" instrument_node="">Introduction</span></h2><div data-dcnode-id="11017"><p data-dcnode-id="11043" id="p0250"><span data-dcnode-id="11077" instrument_node="">Since the reform and opening up, China's economy has been undergoing relentless development for 40 years, which, however, is accompanied by the rapid growing of China's energy consumption. At present, China is the world's largest importer of coal and oil and the second largest importer of natural gas [</span><a class="workspace-trigger" data-dcnode-id="11075" href="#bib1" name="bbib1"><span data-dcnode-id="11076" instrument_node="">[1]</span></a><span data-dcnode-id="11074" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11072" href="#bib2" name="bbib2"><span data-dcnode-id="11073" instrument_node="">[2]</span></a><span data-dcnode-id="11071" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11069" href="#bib3" name="bbib3"><span data-dcnode-id="11070" instrument_node="">[3]</span></a><span data-dcnode-id="11068" instrument_node="">], and the gap between the domestic energy consumption and production reached 900 million tons of standard coal by 2017 (</span><a class="workspace-trigger" data-dcnode-id="11066" href="#fig1" name="bfig1"><span data-dcnode-id="11067" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="11065" instrument_node="">) [</span><a class="workspace-trigger" data-dcnode-id="11063" href="#bib4" name="bbib4"><span data-dcnode-id="11064" instrument_node="">4</span></a><span data-dcnode-id="11062" instrument_node="">]. It was also estimated that the total primary energy consumption would reach 3892 Mtoe (Million Tons of Oil Equivalent) in 2040 [</span><a class="workspace-trigger" data-dcnode-id="11060" href="#bib5" name="bbib5"><span data-dcnode-id="11061" instrument_node="">5</span></a><span data-dcnode-id="11059" instrument_node="">]. Consequently, the huge energy consumption that is heavily dependent on fossil fuels, especially coal, has brought three serious problems including intractable energy security [</span><a class="workspace-trigger" data-dcnode-id="11057" href="#bib6" name="bbib6"><span data-dcnode-id="11058" instrument_node="">6</span></a><span data-dcnode-id="11056" instrument_node="">], GHG (Greenhouse Gas) emissions [</span><a class="workspace-trigger" data-dcnode-id="11054" href="#bib7" name="bbib7"><span data-dcnode-id="11055" instrument_node="">7</span></a><span data-dcnode-id="11053" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="11051" href="#bib8" name="bbib8"><span data-dcnode-id="11052" instrument_node="">8</span></a><span data-dcnode-id="11050" instrument_node="">] and air pollution [</span><a class="workspace-trigger" data-dcnode-id="11048" href="#bib5" name="bbib5"><span data-dcnode-id="11049" instrument_node="">5</span></a><span data-dcnode-id="11047" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="11045" href="#bib9" name="bbib9"><span data-dcnode-id="11046" instrument_node="">9</span></a><span data-dcnode-id="11044" instrument_node="">].</span></p><figure class="figure text-xs" data-dcnode-id="11018" id="fig1"><span data-dcnode-id="11027"><img alt="Fig.&nbsp;1" aria-describedby="cap0010" data-dcnode-id="11042" height="341" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr1.jpg&amp;raw"><span data-dcnode-id="11041" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="11028"><li data-dcnode-id="11035"><a class="anchor download-link u-font-sans" data-dcnode-id="11036" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr1_lrg.jpg" target="_blank" title="Download high-res image (308KB)"><span class="anchor-text" data-dcnode-id="11037"><span data-dcnode-id="11040" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11038"><span data-dcnode-id="11039" instrument_node="">Download high-res image (308KB)</span></span></span></a></li><li data-dcnode-id="11029"><a class="anchor download-link u-font-sans" data-dcnode-id="11030" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="11031"><span data-dcnode-id="11034" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11032"><span data-dcnode-id="11033" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="11019"><span data-dcnode-id="11020" id="cap0010"><p data-dcnode-id="11021" id="fspara0010"><span class="label" data-dcnode-id="11025"><span data-dcnode-id="11026" instrument_node="">Fig.&nbsp;1</span></span><span data-dcnode-id="11024" instrument_node="">. </span><span data-dcnode-id="11022" instrument_node="">Energy production, consumption, gap and the proportion of coal in the energy consumption of China.</span></p></span></span></figure></div><p data-dcnode-id="10997" id="p0255"><span data-dcnode-id="11016" instrument_node="">The concerns about the increasingly serious problems caused by the excessive use of fossil fuels have been prompting China to aggressively seek clean and renewable energy including wind power, solar power, biomass energy, etc. [</span><a class="workspace-trigger" data-dcnode-id="11014" href="#bib10" name="bbib10"><span data-dcnode-id="11015" instrument_node="">10</span></a><span data-dcnode-id="11013" instrument_node="">]. In 2018, the capacities of wind power and solar power in China have increased by 20.2% and 50.8% compared with those in 2017, reaching 3660 and 177.5 billion kWh, respectively [</span><a class="workspace-trigger" data-dcnode-id="11011" href="#bib11" name="bbib11"><span data-dcnode-id="11012" instrument_node="">11</span></a><span data-dcnode-id="11010" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="11008" href="#bib12" name="bbib12"><span data-dcnode-id="11009" instrument_node="">12</span></a><span data-dcnode-id="11007" instrument_node="">]. The rapid development and notorious intermittency of renewable energy (e.g. solar and wind energy) have, in turn, increased the demand for advanced energy storage and delivery technologies [</span><a class="workspace-trigger" data-dcnode-id="11005" href="#bib13" name="bbib13"><span data-dcnode-id="11006" instrument_node="">13</span></a><span data-dcnode-id="11004" instrument_node="">]. Hydrogen, a clean energy carrier with higher energy density than petroleum fuels, exhibits obvious advantage in terms of cost as a long-term energy storage medium, compared to the technologies including the mainstream battery energy storage, pumped-hydro storage, compressed air, flywheels, capacitor, etc. [</span><a class="workspace-trigger" data-dcnode-id="11002" href="#bib14" name="bbib14"><span data-dcnode-id="11003" instrument_node="">14</span></a><span data-dcnode-id="11001" instrument_node="">]. Furthermore, hydrogen can be produced from various feedstocks, especially from various renewable energies, which can significantly increase its self-sufficiency in domestic energy supply [</span><a class="workspace-trigger" data-dcnode-id="10999" href="#bib15" name="bbib15"><span data-dcnode-id="11000" instrument_node="">15</span></a><span data-dcnode-id="10998" instrument_node="">].</span></p><p data-dcnode-id="10986" id="p0260"><span data-dcnode-id="10996" instrument_node="">Hydrogen is the most abundant element in the universe, however, is not a primary energy source existing in nature as coal, crude oil and natural gas. Rather, it is an energy carrier that has to be manufactured like electricity as a secondary form of energy with several unique properties: (1). High energy conversion efficiency in both processes for producing hydrogen and its conversion to electricity; (2). Available from various feedstocks (water, fossil fuels and biomass) and primary energy, especially from renewable energy </span><em data-dcnode-id="10994"><span data-dcnode-id="10995" instrument_node="">via</span></em><span data-dcnode-id="10993" instrument_node=""> the process of water electrolysis, e.g. wind, solar, geothermal and nuclear energy; (3). Cleanliness, with only liquid water or vapor discharge during its oxidation; (4). Convenient storage in gaseous form, liquid form, or metal hydride form, and transport over long distance by pipeline or tankers; (5). Efficient and easy conversion to other forms of energy in more ways, e.g. catalytic combustion, electrochemical conversion and hydrogenation; (6). Feasible integration with various energy resources for versatile applications, being called “energy vector” for its wide applications; (7). High energy density (142&nbsp;MJ/kg), three times higher than that of gasoline [</span><a class="workspace-trigger" data-dcnode-id="10991" href="#bib15" name="bbib15"><span data-dcnode-id="10992" instrument_node="">15</span></a><span data-dcnode-id="10990" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10988" href="#bib16" name="bbib16"><span data-dcnode-id="10989" instrument_node="">16</span></a><span data-dcnode-id="10987" instrument_node="">]. These advantages make hydrogen a promising alternative energy source, attracting many countries and companies to actively pursue hydrogen economy and further explore the applications of hydrogen.</span></p><p data-dcnode-id="10960" id="p0265"><span data-dcnode-id="10985" instrument_node="">Up to now, the main fields of commercial applications of hydrogen include oil refining, food production, metal processing, and ammonia synthesis, etc. [</span><a class="workspace-trigger" data-dcnode-id="10983" href="#bib17" name="bbib17"><span data-dcnode-id="10984" instrument_node="">17</span></a><span data-dcnode-id="10982" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10980" href="#bib18" name="bbib18"><span data-dcnode-id="10981" instrument_node="">18</span></a><span data-dcnode-id="10979" instrument_node="">]. Recently, the use of hydrogen in fuel cell vehicles (FCVs), which is well recognized to be a quasi-commercial application, has attracted considerable attentions for its potential to reduce carbon in the transportation sector [</span><a class="workspace-trigger" data-dcnode-id="10977" href="#bib19" name="bbib19"><span data-dcnode-id="10978" instrument_node="">19</span></a><span data-dcnode-id="10976" instrument_node="">]. It was estimated that the transport sector accounts for 15% of total energy consumption and 10% of the total energy-related CO</span><sub data-dcnode-id="10974"><span data-dcnode-id="10975" instrument_node="">2</span></sub><span data-dcnode-id="10973" instrument_node=""> emissions of China, respectively, in 2010. This tendency can be altered by adopting more vehicles using alternative fuels besides gasoline and diesel [</span><a class="workspace-trigger" data-dcnode-id="10971" href="#bib20" name="bbib20"><span data-dcnode-id="10972" instrument_node="">20</span></a><span data-dcnode-id="10970" instrument_node="">], e.g. the hydrogen FCVs, because the emissions from the hydrogen cycle are much lower than those from today's carbon cycle [</span><a class="workspace-trigger" data-dcnode-id="10968" href="#bib21" name="bbib21"><span data-dcnode-id="10969" instrument_node="">21</span></a><span data-dcnode-id="10967" instrument_node="">]. Liu et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="10965" href="#bib22" name="bbib22"><span data-dcnode-id="10966" instrument_node="">22</span></a><span data-dcnode-id="10964" instrument_node="">] deduced that if the sales of FCVs in China can reach 8 million in 2050, GHG emissions of the road vehicles could be reduced by approximately 13.9%. Meanwhile, hydrogen can also be utilized in the areas of industrial decarbonization, space heating and storage for intermittent renewable energy [</span><a class="workspace-trigger" data-dcnode-id="10962" href="#bib23" name="bbib23"><span data-dcnode-id="10963" instrument_node="">23</span></a><span data-dcnode-id="10961" instrument_node="">].</span></p><p data-dcnode-id="10916" id="p0270"><span data-dcnode-id="10959" instrument_node="">In another aspect, China has abundant coal and renewable energy resources, but limited oil and natural gas reserves, hydrogen economy could provide an opportunity to diversify its energy supplies for better energy security since hydrogen can be produced from various sources including fossil fuels, e.g. coal, oil, natural gas, and renewable resources (hydropower, wind power, solar power and biomass energy). Therefore, it can be predicted that hydrogen, as a renewable and low-carbon energy carrier, could have a decisive significance and positive impact on China's energy security and environmental change. In view of the promising importance of hydrogen in China's future energy structure, hydrogen energy has recently been listed as one of the disruptive technologies for the industrial revolution by the central government in several key documents including Made in China 2025, Action plan for energy technology revolution and innovation (2016–2030), National Innovation-driven Development Strategy Program. Therefore, the previous hesitation of the central government towards the development of hydrogen energy resulted by the divergent perspectives from experts in different fields would unlikely return [</span><a class="workspace-trigger" data-dcnode-id="10957" href="#bib24" name="bbib24"><span data-dcnode-id="10958" instrument_node="">24</span></a><span data-dcnode-id="10956" instrument_node="">]; however, the future of hydrogen energy is still full of uncertainties due to the high cost of production and lack of hydrogen infrastructures. A variety of challenges in technological, economic, environmental condition, political and social aspects have to be tackled before China can realize its hydrogen economy. Since most of the previous studies on China's hydrogen energy has focused on the optimization or evaluation of hydrogen supply chain [</span><a class="workspace-trigger" data-dcnode-id="10954" href="#bib25" name="bbib25"><span data-dcnode-id="10955" instrument_node="">[25]</span></a><span data-dcnode-id="10953" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10951" href="#bib26" name="bbib26"><span data-dcnode-id="10952" instrument_node="">[26]</span></a><span data-dcnode-id="10950" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10948" href="#bib27" name="bbib27"><span data-dcnode-id="10949" instrument_node="">[27]</span></a><span data-dcnode-id="10947" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10945" href="#bib28" name="bbib28"><span data-dcnode-id="10946" instrument_node="">[28]</span></a><span data-dcnode-id="10944" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10942" href="#bib29" name="bbib29"><span data-dcnode-id="10943" instrument_node="">[29]</span></a><span data-dcnode-id="10941" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10939" href="#bib30" name="bbib30"><span data-dcnode-id="10940" instrument_node="">[30]</span></a><span data-dcnode-id="10938" instrument_node="">] and hydrogen technologies [</span><a class="workspace-trigger" data-dcnode-id="10936" href="#bib31" name="bbib31"><span data-dcnode-id="10937" instrument_node="">[31]</span></a><span data-dcnode-id="10935" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10933" href="#bib32" name="bbib32"><span data-dcnode-id="10934" instrument_node="">[32]</span></a><span data-dcnode-id="10932" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10930" href="#bib33" name="bbib33"><span data-dcnode-id="10931" instrument_node="">[33]</span></a><span data-dcnode-id="10929" instrument_node="">], a specific and detailed report to discuss the challenges for China's transition to hydrogen economy is scanty although several investigations have analyzed the development of China's hydrogen economy [</span><a class="workspace-trigger" data-dcnode-id="10927" href="#bib34" name="bbib34"><span data-dcnode-id="10928" instrument_node="">[34]</span></a><span data-dcnode-id="10926" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10924" href="#bib35" name="bbib35"><span data-dcnode-id="10925" instrument_node="">[35]</span></a><span data-dcnode-id="10923" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10921" href="#bib36" name="bbib36"><span data-dcnode-id="10922" instrument_node="">[36]</span></a><span data-dcnode-id="10920" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10918" href="#bib37" name="bbib37"><span data-dcnode-id="10919" instrument_node="">[37]</span></a><span data-dcnode-id="10917" instrument_node="">].</span></p><p data-dcnode-id="10914" id="p0275"><span data-dcnode-id="10915" instrument_node="">Since the perspective on the status of hydrogen in the future energy structure is crucial to the national roadmap and China's smooth transition to hydrogen economy, the first aim of this paper is to give a comprehensive summarization of the literature views on the feasibility of hydrogen economy. The hydrogen supply chain including production, storage, transportation, and eventual use is firstly described to help the readers to clearly understand the hydrogen economy and the following challenges. Afterwards, the current challenges faced by China in the transition to hydrogen economy are discussed, in which, the development of hydrogen economy and future hydrogen roadmap in China were compared with those of Japan and Australia for clarifying the specific challenges in China. Besides the introduction, the layout of this paper is as follows:</span></p><p data-dcnode-id="10909" id="p0280"><span data-dcnode-id="10913" instrument_node="">Section </span><a class="workspace-trigger" data-dcnode-id="10911" href="#sec2" name="bsec2"><span data-dcnode-id="10912" instrument_node="">Hydrogen Supply Chain</span></a><span data-dcnode-id="10910" instrument_node=""> reviews the methods for hydrogen production, storage and delivery, as well as the end-uses.</span></p><p data-dcnode-id="10904" id="p0285"><span data-dcnode-id="10908" instrument_node="">Section </span><a class="workspace-trigger" data-dcnode-id="10906" href="#sec3" name="bsec3"><span data-dcnode-id="10907" instrument_node="">Feasibility of hydrogen economy</span></a><span data-dcnode-id="10905" instrument_node=""> provides a detailed literature overview on the feasibility of hydrogen economy;</span></p><p data-dcnode-id="10899" id="p0290"><span data-dcnode-id="10903" instrument_node="">Section </span><a class="workspace-trigger" data-dcnode-id="10901" href="#sec4" name="bsec4"><span data-dcnode-id="10902" instrument_node="">Challenges towards Hydrogen Economy in China</span></a><span data-dcnode-id="10900" instrument_node=""> describes the challenges of China towards hydrogen economy;</span></p><p data-dcnode-id="10894" id="p0295"><span data-dcnode-id="10898" instrument_node="">Section </span><a class="workspace-trigger" data-dcnode-id="10896" href="#sec5" name="bsec5"><span data-dcnode-id="10897" instrument_node="">Conclusion</span></a><span data-dcnode-id="10895" instrument_node=""> provides overall conclusions.</span></p></section><section data-dcnode-id="10410" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10891" id="sectitle0035"><span data-dcnode-id="10892" instrument_node="">Hydrogen supply chain</span></h2><p data-dcnode-id="10862" id="p0300"><span data-dcnode-id="10890" instrument_node="">In this section, the entire hydrogen supply chain (HSC) including the technologies for hydrogen production, storage, transportation and end-uses was briefly reviewed with the aim to provide a preliminary understanding of hydrogen economy. The detailed processes, parameters, advantages and disadvantages about the entire HSC can be referred to other literature [</span><a class="workspace-trigger" data-dcnode-id="10888" href="#bib38" name="bbib38"><span data-dcnode-id="10889" instrument_node="">[38]</span></a><span data-dcnode-id="10887" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10885" href="#bib39" name="bbib39"><span data-dcnode-id="10886" instrument_node="">[39]</span></a><span data-dcnode-id="10884" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10882" href="#bib40" name="bbib40"><span data-dcnode-id="10883" instrument_node="">[40]</span></a><span data-dcnode-id="10881" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10879" href="#bib41" name="bbib41"><span data-dcnode-id="10880" instrument_node="">[41]</span></a><span data-dcnode-id="10878" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10876" href="#bib42" name="bbib42"><span data-dcnode-id="10877" instrument_node="">[42]</span></a><span data-dcnode-id="10875" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10873" href="#bib43" name="bbib43"><span data-dcnode-id="10874" instrument_node="">[43]</span></a><span data-dcnode-id="10872" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10870" href="#bib44" name="bbib44"><span data-dcnode-id="10871" instrument_node="">[44]</span></a><span data-dcnode-id="10869" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10867" href="#bib45" name="bbib45"><span data-dcnode-id="10868" instrument_node="">[45]</span></a><span data-dcnode-id="10866" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10864" href="#bib46" name="bbib46"><span data-dcnode-id="10865" instrument_node="">[46]</span></a><span data-dcnode-id="10863" instrument_node="">].</span></p><section data-dcnode-id="10583" id="sec2.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10860" id="sectitle0040"><span data-dcnode-id="10861" instrument_node="">Hydrogen production</span></h3><p data-dcnode-id="10828" id="p0305"><span data-dcnode-id="10859" instrument_node="">As an energy carrier instead of a primary energy source, hydrogen can be produced </span><em data-dcnode-id="10857"><span data-dcnode-id="10858" instrument_node="">via</span></em><span data-dcnode-id="10856" instrument_node=""> multiple technologies from different feedstocks [</span><a class="workspace-trigger" data-dcnode-id="10854" href="#bib38" name="bbib38"><span data-dcnode-id="10855" instrument_node="">[38]</span></a><span data-dcnode-id="10853" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10851" href="#bib39" name="bbib39"><span data-dcnode-id="10852" instrument_node="">[39]</span></a><span data-dcnode-id="10850" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10848" href="#bib40" name="bbib40"><span data-dcnode-id="10849" instrument_node="">[40]</span></a><span data-dcnode-id="10847" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10845" href="#bib41" name="bbib41"><span data-dcnode-id="10846" instrument_node="">[41]</span></a><span data-dcnode-id="10844" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10842" href="#bib42" name="bbib42"><span data-dcnode-id="10843" instrument_node="">[42]</span></a><span data-dcnode-id="10841" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10839" href="#bib43" name="bbib43"><span data-dcnode-id="10840" instrument_node="">[43]</span></a><span data-dcnode-id="10838" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10836" href="#bib44" name="bbib44"><span data-dcnode-id="10837" instrument_node="">[44]</span></a><span data-dcnode-id="10835" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10833" href="#bib45" name="bbib45"><span data-dcnode-id="10834" instrument_node="">[45]</span></a><span data-dcnode-id="10832" instrument_node="">]. According to the types of the feedstocks [</span><a class="workspace-trigger" data-dcnode-id="10830" href="#bib40" name="bbib40"><span data-dcnode-id="10831" instrument_node="">40</span></a><span data-dcnode-id="10829" instrument_node="">], the processes for hydrogen production can be divided into two categories: the processes using fossil fuels as the raw materials, e.g. hydrocarbon reforming, pyrolysis; while the others from renewable resources, e.g. biomass and water.</span></p><section data-dcnode-id="10758" id="sec2.1.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10826" id="sectitle0045"><span data-dcnode-id="10827" instrument_node="">Hydrogen production from fossil fuels</span></h4><div data-dcnode-id="10759"><p data-dcnode-id="10785" id="p0310"><span data-dcnode-id="10825" instrument_node="">Usually, there are three main technologies to produce hydrogen from fossil fuels, i.e. hydrocarbon reforming, hydrocarbon pyrolysis (HP) [</span><a class="workspace-trigger" data-dcnode-id="10823" href="#bib46" name="bbib46"><span data-dcnode-id="10824" instrument_node="">46</span></a><span data-dcnode-id="10822" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10820" href="#bib47" name="bbib47"><span data-dcnode-id="10821" instrument_node="">47</span></a><span data-dcnode-id="10819" instrument_node="">] and coal gasification (CG) [</span><a class="workspace-trigger" data-dcnode-id="10817" href="#bib42" name="bbib42"><span data-dcnode-id="10818" instrument_node="">42</span></a><span data-dcnode-id="10816" instrument_node="">], which are illustrated in </span><a class="workspace-trigger" data-dcnode-id="10814" href="#fig2" name="bfig2"><span data-dcnode-id="10815" instrument_node="">Fig.&nbsp;2</span></a><span data-dcnode-id="10813" instrument_node="">. As a commonly used hydrogen production method, hydrocarbon reforming can be implemented by using different routes including steam reforming (SR) [</span><a class="workspace-trigger" data-dcnode-id="10811" href="#bib48" name="bbib48"><span data-dcnode-id="10812" instrument_node="">48</span></a><span data-dcnode-id="10810" instrument_node="">], partial oxidation (POX) [</span><a class="workspace-trigger" data-dcnode-id="10808" href="#bib49" name="bbib49"><span data-dcnode-id="10809" instrument_node="">49</span></a><span data-dcnode-id="10807" instrument_node="">], autothermal reforming (ATR) [</span><a class="workspace-trigger" data-dcnode-id="10805" href="#bib46" name="bbib46"><span data-dcnode-id="10806" instrument_node="">46</span></a><span data-dcnode-id="10804" instrument_node="">], and dry reforming (DR) [</span><a class="workspace-trigger" data-dcnode-id="10802" href="#bib48" name="bbib48"><span data-dcnode-id="10803" instrument_node="">48</span></a><span data-dcnode-id="10801" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10799" href="#bib50" name="bbib50"><span data-dcnode-id="10800" instrument_node="">50</span></a><span data-dcnode-id="10798" instrument_node="">], as well as ammonia reforming (AR), partial oxidation of methanol, ethanol and H</span><sub data-dcnode-id="10796"><span data-dcnode-id="10797" instrument_node="">2</span></sub><span data-dcnode-id="10795" instrument_node="">S, and plasma reforming (PR) [</span><a class="workspace-trigger" data-dcnode-id="10793" href="#bib51" name="bbib51"><span data-dcnode-id="10794" instrument_node="">[51]</span></a><span data-dcnode-id="10792" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10790" href="#bib52" name="bbib52"><span data-dcnode-id="10791" instrument_node="">[52]</span></a><span data-dcnode-id="10789" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10787" href="#bib53" name="bbib53"><span data-dcnode-id="10788" instrument_node="">[53]</span></a><span data-dcnode-id="10786" instrument_node="">]. Among them, the steam methane reforming (SMR) and CG are the well-established industrial hydrogen production technologies.</span></p><figure class="figure text-xs" data-dcnode-id="10760" id="fig2"><span data-dcnode-id="10769"><img alt="Fig.&nbsp;2" aria-describedby="cap0015" data-dcnode-id="10784" height="160" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr2.jpg&amp;raw"><span data-dcnode-id="10783" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10770"><li data-dcnode-id="10777"><a class="anchor download-link u-font-sans" data-dcnode-id="10778" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr2_lrg.jpg" target="_blank" title="Download high-res image (233KB)"><span class="anchor-text" data-dcnode-id="10779"><span data-dcnode-id="10782" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10780"><span data-dcnode-id="10781" instrument_node="">Download high-res image (233KB)</span></span></span></a></li><li data-dcnode-id="10771"><a class="anchor download-link u-font-sans" data-dcnode-id="10772" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10773"><span data-dcnode-id="10776" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10774"><span data-dcnode-id="10775" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10761"><span data-dcnode-id="10762" id="cap0015"><p data-dcnode-id="10763" id="fspara0015"><span class="label" data-dcnode-id="10767"><span data-dcnode-id="10768" instrument_node="">Fig.&nbsp;2</span></span><span data-dcnode-id="10766" instrument_node="">. </span><span data-dcnode-id="10764" instrument_node="">Hydrogen production technologies from fossil fuels.</span></p></span></span></figure></div></section><section data-dcnode-id="10676" id="sec2.1.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10756" id="sectitle0050"><span data-dcnode-id="10757" instrument_node="">Hydrogen from biomass</span></h4><div data-dcnode-id="10677"><p data-dcnode-id="10703" id="p0315"><span data-dcnode-id="10755" instrument_node="">The large amount of biomass sources, e.g. municipal solid wastes, agricultural and forest residues, provide more renewable feedstocks than fossil fuels to produce hydrogen [</span><a class="workspace-trigger" data-dcnode-id="10753" href="#bib54" name="bbib54"><span data-dcnode-id="10754" instrument_node="">54</span></a><span data-dcnode-id="10752" instrument_node="">]. Consequently, various hydrogen production methods from biomass have been studied in the literature. Usually, it can be divided into two categories, i.e. thermochemical processes and biological processes. The thermochemical processes to produce hydrogen can be further divided into aqueous phase reforming (APR) [</span><a class="workspace-trigger" data-dcnode-id="10750" href="#bib55" name="bbib55"><span data-dcnode-id="10751" instrument_node="">55</span></a><span data-dcnode-id="10749" instrument_node="">], supercritical water gasification (SCWG) [</span><a class="workspace-trigger" data-dcnode-id="10747" href="#bib56" name="bbib56"><span data-dcnode-id="10748" instrument_node="">56</span></a><span data-dcnode-id="10746" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10744" href="#bib57" name="bbib57"><span data-dcnode-id="10745" instrument_node="">57</span></a><span data-dcnode-id="10743" instrument_node="">], pyrolysis [</span><a class="workspace-trigger" data-dcnode-id="10741" href="#bib42" name="bbib42"><span data-dcnode-id="10742" instrument_node="">42</span></a><span data-dcnode-id="10740" instrument_node="">] and gasification [</span><a class="workspace-trigger" data-dcnode-id="10738" href="#bib58" name="bbib58"><span data-dcnode-id="10739" instrument_node="">58</span></a><span data-dcnode-id="10737" instrument_node="">]. While the biological processes were demonstrated to have higher environmental benefits and less energy consumption than the thermochemical processes [</span><a class="workspace-trigger" data-dcnode-id="10735" href="#bib40" name="bbib40"><span data-dcnode-id="10736" instrument_node="">40</span></a><span data-dcnode-id="10734" instrument_node="">], providing various methods to generate hydrogen at ambient temperature and pressure. The biological processes to generate hydrogen include six major routes, i.e. direct biophotolysis, indirect biophotolysis, photo fermentation and dark fermentation as well as the microbial electrolysis cells (MECs) and biological water-gas shift (WGS) reactions [</span><a class="workspace-trigger" data-dcnode-id="10732" href="#bib46" name="bbib46"><span data-dcnode-id="10733" instrument_node="">46</span></a><span data-dcnode-id="10731" instrument_node="">]. In the photolysis processes, hydrogen is generated from water by using hydrogenase or nitrogenase enzymes from bacteria or algae, while in the fermentative processes, hydrogen was produced </span><em data-dcnode-id="10729"><span data-dcnode-id="10730" instrument_node="">via</span></em><span data-dcnode-id="10728" instrument_node=""> the intermediate organic acids by using bio-processing technologies [</span><a class="workspace-trigger" data-dcnode-id="10726" href="#bib40" name="bbib40"><span data-dcnode-id="10727" instrument_node="">40</span></a><span data-dcnode-id="10725" instrument_node="">]. The main technologies to produce hydrogen from biomass can be seen in </span><a class="workspace-trigger" data-dcnode-id="10723" href="#fig3" name="bfig3"><span data-dcnode-id="10724" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="10722" instrument_node=""> according to the literature [</span><a class="workspace-trigger" data-dcnode-id="10720" href="#bib38" name="bbib38"><span data-dcnode-id="10721" instrument_node="">38</span></a><span data-dcnode-id="10719" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10717" href="#bib40" name="bbib40"><span data-dcnode-id="10718" instrument_node="">40</span></a><span data-dcnode-id="10716" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10714" href="#bib41" name="bbib41"><span data-dcnode-id="10715" instrument_node="">41</span></a><span data-dcnode-id="10713" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10711" href="#bib46" name="bbib46"><span data-dcnode-id="10712" instrument_node="">46</span></a><span data-dcnode-id="10710" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10708" href="#bib59" name="bbib59"><span data-dcnode-id="10709" instrument_node="">59</span></a><span data-dcnode-id="10707" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10705" href="#bib60" name="bbib60"><span data-dcnode-id="10706" instrument_node="">60</span></a><span data-dcnode-id="10704" instrument_node="">].</span></p><figure class="figure text-xs" data-dcnode-id="10678" id="fig3"><span data-dcnode-id="10687"><img alt="Fig.&nbsp;3" aria-describedby="cap0020" data-dcnode-id="10702" height="241" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr3.jpg&amp;raw"><span data-dcnode-id="10701" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10688"><li data-dcnode-id="10695"><a class="anchor download-link u-font-sans" data-dcnode-id="10696" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr3_lrg.jpg" target="_blank" title="Download high-res image (354KB)"><span class="anchor-text" data-dcnode-id="10697"><span data-dcnode-id="10700" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10698"><span data-dcnode-id="10699" instrument_node="">Download high-res image (354KB)</span></span></span></a></li><li data-dcnode-id="10689"><a class="anchor download-link u-font-sans" data-dcnode-id="10690" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10691"><span data-dcnode-id="10694" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10692"><span data-dcnode-id="10693" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10679"><span data-dcnode-id="10680" id="cap0020"><p data-dcnode-id="10681" id="fspara0020"><span class="label" data-dcnode-id="10685"><span data-dcnode-id="10686" instrument_node="">Fig.&nbsp;3</span></span><span data-dcnode-id="10684" instrument_node="">. </span><span data-dcnode-id="10682" instrument_node="">Hydrogen production technologies from biomass.</span></p></span></span></figure></div></section><section data-dcnode-id="10584" id="sec2.1.3"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10674" id="sectitle0055"><span data-dcnode-id="10675" instrument_node="">Water splitting</span></h4><div data-dcnode-id="10619"><p data-dcnode-id="10645" id="p0320"><span data-dcnode-id="10673" instrument_node="">Hydrogen production by using water splitting technologies has the unique advantage, i.e. the feedstock of water is one of the most abundant and inexhaustible raw materials on earth. In the past decades, three different processes of water splitting have been developed, i.e. electrolysis [</span><a class="workspace-trigger" data-dcnode-id="10671" href="#bib40" name="bbib40"><span data-dcnode-id="10672" instrument_node="">40</span></a><span data-dcnode-id="10670" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10668" href="#bib61" name="bbib61"><span data-dcnode-id="10669" instrument_node="">61</span></a><span data-dcnode-id="10667" instrument_node="">], photo-electrolysis [</span><a class="workspace-trigger" data-dcnode-id="10665" href="#bib62" name="bbib62"><span data-dcnode-id="10666" instrument_node="">62</span></a><span data-dcnode-id="10664" instrument_node="">] and thermolysis [</span><a class="workspace-trigger" data-dcnode-id="10662" href="#bib40" name="bbib40"><span data-dcnode-id="10663" instrument_node="">40</span></a><span data-dcnode-id="10661" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10659" href="#bib61" name="bbib61"><span data-dcnode-id="10660" instrument_node="">61</span></a><span data-dcnode-id="10658" instrument_node="">]. Among them, water electrolysis is the most popular industrial technique for water splitting, and a variety of renewable energy sources, e.g. solar energy, wind energy, hydro energy, geothermal energy, tidal and waves energy, ocean thermal energy, nuclear energy and other redundant or low-price electricity [</span><a class="workspace-trigger" data-dcnode-id="10656" href="#bib26" name="bbib26"><span data-dcnode-id="10657" instrument_node="">26</span></a><span data-dcnode-id="10655" instrument_node="">], can be used to generate almost-pure hydrogen (Seen in </span><a class="workspace-trigger" data-dcnode-id="10653" href="#fig4" name="bfig4"><span data-dcnode-id="10654" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="10652" instrument_node="">). The commonly used electrolysis technologies can be classified into three categories: alkaline, proton exchange membrane (PEM), and solid oxide electrolysis cells (SOEC) [</span><a class="workspace-trigger" data-dcnode-id="10650" href="#bib40" name="bbib40"><span data-dcnode-id="10651" instrument_node="">40</span></a><span data-dcnode-id="10649" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10647" href="#bib61" name="bbib61"><span data-dcnode-id="10648" instrument_node="">61</span></a><span data-dcnode-id="10646" instrument_node="">].</span></p><figure class="figure text-xs" data-dcnode-id="10620" id="fig4"><span data-dcnode-id="10629"><img alt="Fig.&nbsp;4" aria-describedby="cap0025" data-dcnode-id="10644" height="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr4.jpg&amp;raw"><span data-dcnode-id="10643" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10630"><li data-dcnode-id="10637"><a class="anchor download-link u-font-sans" data-dcnode-id="10638" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr4_lrg.jpg" target="_blank" title="Download high-res image (254KB)"><span class="anchor-text" data-dcnode-id="10639"><span data-dcnode-id="10642" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10640"><span data-dcnode-id="10641" instrument_node="">Download high-res image (254KB)</span></span></span></a></li><li data-dcnode-id="10631"><a class="anchor download-link u-font-sans" data-dcnode-id="10632" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10633"><span data-dcnode-id="10636" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10634"><span data-dcnode-id="10635" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10621"><span data-dcnode-id="10622" id="cap0025"><p data-dcnode-id="10623" id="fspara0025"><span class="label" data-dcnode-id="10627"><span data-dcnode-id="10628" instrument_node="">Fig.&nbsp;4</span></span><span data-dcnode-id="10626" instrument_node="">. </span><span data-dcnode-id="10624" instrument_node="">Hydrogen production technologies from water.</span></p></span></span></figure></div><p data-dcnode-id="10593" id="p0325"><span data-dcnode-id="10618" instrument_node="">Finally, it is noteworthy that, at present, most of the industrial hydrogen is generated from natural gas, petroleum (naphtha) and coal, only a small proportion comes from renewable resources. Three main technologies were demonstrated to be suitable for industrial hydrogen production, i.e. natural gas reforming, coal gasification, and water electrolysis [</span><a class="workspace-trigger" data-dcnode-id="10616" href="#bib63" name="bbib63"><span data-dcnode-id="10617" instrument_node="">63</span></a><span data-dcnode-id="10615" instrument_node="">]. Among them, approximately half of the entire global hydrogen supply is produced by SMR, which has the lowest CO</span><sub data-dcnode-id="10613"><span data-dcnode-id="10614" instrument_node="">2</span></sub><span data-dcnode-id="10612" instrument_node=""> emission compared to the other fossil fuel based hydrogen production routes [</span><a class="workspace-trigger" data-dcnode-id="10610" href="#bib64" name="bbib64"><span data-dcnode-id="10611" instrument_node="">64</span></a><span data-dcnode-id="10609" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10607" href="#bib65" name="bbib65"><span data-dcnode-id="10608" instrument_node="">65</span></a><span data-dcnode-id="10606" instrument_node="">]. In terms of cost, the processes by using SMR, nuclear pyrolysis, biomass and coal gasification to produce hydrogen are verified to be the most economic-efficient routes [</span><a class="workspace-trigger" data-dcnode-id="10604" href="#bib66" name="bbib66"><span data-dcnode-id="10605" instrument_node="">66</span></a><span data-dcnode-id="10603" instrument_node="">]. Bartels et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="10601" href="#bib67" name="bbib67"><span data-dcnode-id="10602" instrument_node="">67</span></a><span data-dcnode-id="10600" instrument_node="">] showed that coal and natural gas are the most economical sources to produce hydrogen with the estimated cost of $0.36 – $1.83 and $2.48- $3.17 per Kg, while the production cost corresponding to all the other sources including nuclear energy, solar energy, wind energy and biomass exceeds $4.00/kg, Coal gasification can be economically attractive in some countries including the United States, Russia, and China, but with a significant amount of carbon footprint if the technology of Carbon capture and Storage (CCS) is not used. The biomass gasification technology is still in its early stages and expected to be an economic hydrogen production option from renewable energy in the future [</span><a class="workspace-trigger" data-dcnode-id="10598" href="#bib65" name="bbib65"><span data-dcnode-id="10599" instrument_node="">65</span></a><span data-dcnode-id="10597" instrument_node="">]. The other methods including biological processes, water separation by high temperature heating or photoelectrolysis are still at the level of basic research, and the feasibility of the schemes will depend on the development of new materials [</span><a class="workspace-trigger" data-dcnode-id="10595" href="#bib68" name="bbib68"><span data-dcnode-id="10596" instrument_node="">68</span></a><span data-dcnode-id="10594" instrument_node="">].</span></p><p data-dcnode-id="10585" id="p0330"><span data-dcnode-id="10592" instrument_node="">In the long run, renewable sources are the best choices to produce hydrogen; while in the medium term, the production of hydrogen from fossil fuels would still play an important role due to their better economic and technical preferences [</span><a class="workspace-trigger" data-dcnode-id="10590" href="#bib69" name="bbib69"><span data-dcnode-id="10591" instrument_node="">69</span></a><span data-dcnode-id="10589" instrument_node="">]. Xu et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="10587" href="#bib70" name="bbib70"><span data-dcnode-id="10588" instrument_node="">70</span></a><span data-dcnode-id="10586" instrument_node="">] developed a definition for a hydrogen production technological paradigm (HPTP), demonstrating that three main stages of hydrogen production are gradually evolved. The first phase is hydrogen production from fossil fuels, and the second phase is the conventional water electrolysis, while the hydrogen production from renewable resources and nuclear energy is expected to be the third stage, which is receiving more and more attentions.</span></p></section></section><section data-dcnode-id="10506" id="sec2.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10581" id="sectitle0060"><span data-dcnode-id="10582" instrument_node="">Storage and transportation</span></h3><div data-dcnode-id="10523"><p data-dcnode-id="10549" id="p0335"><span data-dcnode-id="10580" instrument_node="">The safe, reliable and economically viable storage and transportation of hydrogen are also essential for “hydrogen economy” besides hydrogen production, but remain a challenging task [</span><a class="workspace-trigger" data-dcnode-id="10578" href="#bib38" name="bbib38"><span data-dcnode-id="10579" instrument_node="">38</span></a><span data-dcnode-id="10577" instrument_node="">]. In addition to the conventional hydrogen storage technologies including the compressed and liquefied hydrogen, hydrogen can be stored by various physical, chemical, and electrochemical methods. Sreedhar et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="10575" href="#bib71" name="bbib71"><span data-dcnode-id="10576" instrument_node="">71</span></a><span data-dcnode-id="10574" instrument_node="">] provided a comprehensive review of hydrogen storage methods and classified the hydrogen storage into two categories: chemical storage routes and physical storage methods. The chemical processes for hydrogen storage can be further divided into absorption on solid materials [</span><a class="workspace-trigger" data-dcnode-id="10572" href="#bib72" name="bbib72"><span data-dcnode-id="10573" instrument_node="">72</span></a><span data-dcnode-id="10571" instrument_node="">], absorption on liquid materials [</span><a class="workspace-trigger" data-dcnode-id="10569" href="#bib73" name="bbib73"><span data-dcnode-id="10570" instrument_node="">[73]</span></a><span data-dcnode-id="10568" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10566" href="#bib74" name="bbib74"><span data-dcnode-id="10567" instrument_node="">[74]</span></a><span data-dcnode-id="10565" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10563" href="#bib75" name="bbib75"><span data-dcnode-id="10564" instrument_node="">[75]</span></a><span data-dcnode-id="10562" instrument_node="">] and electrochemical storage [</span><a class="workspace-trigger" data-dcnode-id="10560" href="#bib76" name="bbib76"><span data-dcnode-id="10561" instrument_node="">76</span></a><span data-dcnode-id="10559" instrument_node="">]. While the physical routes for hydrogen storage include adsorption on solid materials [</span><a class="workspace-trigger" data-dcnode-id="10557" href="#bib77" name="bbib77"><span data-dcnode-id="10558" instrument_node="">77</span></a><span data-dcnode-id="10556" instrument_node="">], gaseous &amp; liquid storage, and solid storage [</span><a class="workspace-trigger" data-dcnode-id="10554" href="#bib71" name="bbib71"><span data-dcnode-id="10555" instrument_node="">71</span></a><span data-dcnode-id="10553" instrument_node="">], which can be seen in </span><a class="workspace-trigger" data-dcnode-id="10551" href="#fig5" name="bfig5"><span data-dcnode-id="10552" instrument_node="">Fig.&nbsp;5</span></a><span data-dcnode-id="10550" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="10524" id="fig5"><span data-dcnode-id="10533"><img alt="Fig.&nbsp;5" aria-describedby="cap0030" data-dcnode-id="10548" height="438" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr5.jpg&amp;raw"><span data-dcnode-id="10547" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10534"><li data-dcnode-id="10541"><a class="anchor download-link u-font-sans" data-dcnode-id="10542" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr5_lrg.jpg" target="_blank" title="Download high-res image (619KB)"><span class="anchor-text" data-dcnode-id="10543"><span data-dcnode-id="10546" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10544"><span data-dcnode-id="10545" instrument_node="">Download high-res image (619KB)</span></span></span></a></li><li data-dcnode-id="10535"><a class="anchor download-link u-font-sans" data-dcnode-id="10536" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10537"><span data-dcnode-id="10540" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10538"><span data-dcnode-id="10539" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10525"><span data-dcnode-id="10526" id="cap0030"><p data-dcnode-id="10527" id="fspara0030"><span class="label" data-dcnode-id="10531"><span data-dcnode-id="10532" instrument_node="">Fig.&nbsp;5</span></span><span data-dcnode-id="10530" instrument_node="">. </span><span data-dcnode-id="10528" instrument_node="">Hydrogen storage and transportation.</span></p></span></span></figure></div><p data-dcnode-id="10518" id="p0340"><span data-dcnode-id="10522" instrument_node="">At the current stage, the compressed and liquefied hydrogen are still the most commonly used commercial routes for hydrogen storage. The compressed hydrogen can be transported by high-pressure pipelines, tube trailers or railway tube cars, while the liquefied hydrogen can be transported by tank trucks through railways, roads and ship. The technical and economic competitiveness of each transport method are determined by the transport volume and distance. The compressed gaseous hydrogen trailers (200&nbsp;bar) are the most suitable routes when the distance is shorter than 200&nbsp;km, while, for smaller volumes and longer distances, the liquefied hydrogen trailers are the most economical ways, and pipelines are the preferred options for large volumes and long distances. It should be noted that, due to the specific physical and chemical properties of hydrogen, the investment for hydrogen pipelines is twice of that for natural gas pipelines because of the hydrogen pipes are required to be made of non-porous, high-quality materials, e.g. stainless steel [</span><a class="workspace-trigger" data-dcnode-id="10520" href="#bib78" name="bbib78"><span data-dcnode-id="10521" instrument_node="">78</span></a><span data-dcnode-id="10519" instrument_node="">].</span></p><p data-dcnode-id="10507" id="p0345"><span data-dcnode-id="10517" instrument_node="">Besides, hydrogen can be distributed through pipelines from the large centralized plants to the final consumption point, and supplied by the small and local production plants (production and gas stations) for reducing transportation costs. The process of underground sediments is the best choice for storing a large amount of hydrogen for a long period of time, in which, hydrogen is compressed and injected into three types of underground fields: natural gas fields (and associated aquifers), caves or caves in salt water, and depleted mines [</span><a class="workspace-trigger" data-dcnode-id="10515" href="#bib68" name="bbib68"><span data-dcnode-id="10516" instrument_node="">68</span></a><span data-dcnode-id="10514" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10512" href="#bib79" name="bbib79"><span data-dcnode-id="10513" instrument_node="">79</span></a><span data-dcnode-id="10511" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10509" href="#bib80" name="bbib80"><span data-dcnode-id="10510" instrument_node="">80</span></a><span data-dcnode-id="10508" instrument_node="">].</span></p></section><section data-dcnode-id="10411" id="sec2.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10504" id="sectitle0065"><span data-dcnode-id="10505" instrument_node="">End-use</span></h3><div data-dcnode-id="10425"><p data-dcnode-id="10451" id="p0350"><span data-dcnode-id="10503" instrument_node="">Hydrogen can be widely applied to the power [</span><a class="workspace-trigger" data-dcnode-id="10501" href="#bib81" name="bbib81"><span data-dcnode-id="10502" instrument_node="">81</span></a><span data-dcnode-id="10500" instrument_node="">], industry [</span><a class="workspace-trigger" data-dcnode-id="10498" href="#bib82" name="bbib82"><span data-dcnode-id="10499" instrument_node="">82</span></a><span data-dcnode-id="10497" instrument_node="">] and transportation [</span><a class="workspace-trigger" data-dcnode-id="10495" href="#bib83" name="bbib83"><span data-dcnode-id="10496" instrument_node="">[83]</span></a><span data-dcnode-id="10494" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10492" href="#bib84" name="bbib84"><span data-dcnode-id="10493" instrument_node="">[84]</span></a><span data-dcnode-id="10491" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10489" href="#bib85" name="bbib85"><span data-dcnode-id="10490" instrument_node="">[85]</span></a><span data-dcnode-id="10488" instrument_node="">] as well as heating [</span><a class="workspace-trigger" data-dcnode-id="10486" href="#bib86" name="bbib86"><span data-dcnode-id="10487" instrument_node="">[86]</span></a><span data-dcnode-id="10485" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10483" href="#bib87" name="bbib87"><span data-dcnode-id="10484" instrument_node="">[87]</span></a><span data-dcnode-id="10482" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10480" href="#bib88" name="bbib88"><span data-dcnode-id="10481" instrument_node="">[88]</span></a><span data-dcnode-id="10479" instrument_node="">] and energy storage [</span><a class="workspace-trigger" data-dcnode-id="10477" href="#bib89" name="bbib89"><span data-dcnode-id="10478" instrument_node="">[89]</span></a><span data-dcnode-id="10476" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10474" href="#bib90" name="bbib90"><span data-dcnode-id="10475" instrument_node="">[90]</span></a><span data-dcnode-id="10473" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10471" href="#bib91" name="bbib91"><span data-dcnode-id="10472" instrument_node="">[91]</span></a><span data-dcnode-id="10470" instrument_node="">], its versatility in applications lead to the proposal of the concept of “Zero Energy Hydrogen Economy” (ZEH2E) [</span><a class="workspace-trigger" data-dcnode-id="10468" href="#bib92" name="bbib92"><span data-dcnode-id="10469" instrument_node="">92</span></a><span data-dcnode-id="10467" instrument_node="">] and Nearly Net-Zero Cities [</span><a class="workspace-trigger" data-dcnode-id="10465" href="#bib93" name="bbib93"><span data-dcnode-id="10466" instrument_node="">93</span></a><span data-dcnode-id="10464" instrument_node="">] in the past decades ,which can be seen in </span><a class="workspace-trigger" data-dcnode-id="10462" href="#fig6" name="bfig6"><span data-dcnode-id="10463" instrument_node="">Fig. 6</span></a><span data-dcnode-id="10461" instrument_node="">. The present and potential end-uses of hydrogen have been reviewed in several reports [</span><a class="workspace-trigger" data-dcnode-id="10459" href="#bib81" name="bbib81"><span data-dcnode-id="10460" instrument_node="">81</span></a><span data-dcnode-id="10458" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10456" href="#bib94" name="bbib94"><span data-dcnode-id="10457" instrument_node="">94</span></a><span data-dcnode-id="10455" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10453" href="#bib95" name="bbib95"><span data-dcnode-id="10454" instrument_node="">95</span></a><span data-dcnode-id="10452" instrument_node="">].</span></p><figure class="figure text-xs" data-dcnode-id="10426" id="fig6"><span data-dcnode-id="10435"><img alt="Fig.&nbsp;6" aria-describedby="cap0035" data-dcnode-id="10450" height="233" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr6.jpg&amp;raw"><span data-dcnode-id="10449" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10436"><li data-dcnode-id="10443"><a class="anchor download-link u-font-sans" data-dcnode-id="10444" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr6_lrg.jpg" target="_blank" title="Download high-res image (274KB)"><span class="anchor-text" data-dcnode-id="10445"><span data-dcnode-id="10448" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10446"><span data-dcnode-id="10447" instrument_node="">Download high-res image (274KB)</span></span></span></a></li><li data-dcnode-id="10437"><a class="anchor download-link u-font-sans" data-dcnode-id="10438" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr6.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10439"><span data-dcnode-id="10442" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10440"><span data-dcnode-id="10441" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10427"><span data-dcnode-id="10428" id="cap0035"><p data-dcnode-id="10429" id="fspara0035"><span class="label" data-dcnode-id="10433"><span data-dcnode-id="10434" instrument_node="">Fig.&nbsp;6</span></span><span data-dcnode-id="10432" instrument_node="">. </span><span data-dcnode-id="10430" instrument_node="">Hydrogen application.</span></p></span></span></figure></div><p data-dcnode-id="10414" id="p0355"><span data-dcnode-id="10424" instrument_node="">Hydrogen was originally utilized in industry as chemical feedstocks, primarily for oil refining, food production, metal processing, ammonia synthesis, etc. It can also be an alternative fuel of natural gas [</span><a class="workspace-trigger" data-dcnode-id="10422" href="#bib96" name="bbib96"><span data-dcnode-id="10423" instrument_node="">96</span></a><span data-dcnode-id="10421" instrument_node="">] to provide heat and electricity for fulfilling deep decarbonization in high-temperature industries, e.g. steelmaking, cement and mining in the future [</span><a class="workspace-trigger" data-dcnode-id="10419" href="#bib97" name="bbib97"><span data-dcnode-id="10420" instrument_node="">97</span></a><span data-dcnode-id="10418" instrument_node="">]. At present, by using Fuel cell Combined Heating and Power (FC–CHP) systems, which have the advantages of higher electrical efficiency and lower emissions compared to other cogeneration systems powered by gas turbine or Stirling engines, hydrogen can also be used to provide heat for both commercial and domestic buildings with high efficiency. Moreover, the most attracting applications of hydrogen lie in the long-term energy storage and FCVs. Hydrogen can be used as a long-term energy storage medium to balance the intermittency and volatility of renewable energy, which is more cost-effective than the current storage technologies such as batteries, while P2G (power to gas)[</span><a class="workspace-trigger" data-dcnode-id="10416" href="#bib98" name="bbib98"><span data-dcnode-id="10417" instrument_node="">98</span></a><span data-dcnode-id="10415" instrument_node="">] and P2P (power to power) are the two commonly used technologies to store energy using hydrogen. The most promising application of hydrogen is in the transportation sector for hydrogen fuel cell vehicles (FCVs).</span></p><p data-dcnode-id="10412" id="p0360"><span data-dcnode-id="10413" instrument_node="">In summary, the versatility of hydrogen applications, especially as a promising alternative to fossil fuels in the transportation sector, is beneficial to the transition to hydrogen economy. With the decline of fossil fuels and increase of renewable energy in China's energy structure, the role of hydrogen in the future energy society is becoming more and more important as an effective long-term energy storage medium and clean alternative fuel in FCVs and FC-CHP systems, which have already achieved the preliminary commercialization.</span></p></section></section><section data-dcnode-id="10234" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10408" id="sectitle0070"><span data-dcnode-id="10409" instrument_node="">Feasibility of hydrogen economy</span></h2><p data-dcnode-id="10394" id="p0365"><span data-dcnode-id="10407" instrument_node="">The term of “hydrogen economy”, which was firstly proposed by Appleby in 1972 as a response to the first oil crisis [</span><a class="workspace-trigger" data-dcnode-id="10405" href="#bib99" name="bbib99"><span data-dcnode-id="10406" instrument_node="">99</span></a><span data-dcnode-id="10404" instrument_node="">], refers to the infrastructure based on the use of hydrogen instead of fossil fuels to support the energy needs of society [</span><a class="workspace-trigger" data-dcnode-id="10402" href="#bib64" name="bbib64"><span data-dcnode-id="10403" instrument_node="">64</span></a><span data-dcnode-id="10401" instrument_node="">]. The technological progresses related to hydrogen production and storage have raised great hopes for hydrogen FCVs and triggered the hype of hydrogen economy in 1970s. However, the high expectations suffered a trough of disillusionment in the beginning of the 20th century and provoked the social collapse on hydrogen economy. The question, i.e. “is the hydrogen economy feasible [</span><a class="workspace-trigger" data-dcnode-id="10399" href="#bib92" name="bbib92"><span data-dcnode-id="10400" instrument_node="">92</span></a><span data-dcnode-id="10398" instrument_node="">]?” or in another words, “is the hydrogen economy a global solution, or a pie in the sky [</span><a class="workspace-trigger" data-dcnode-id="10396" href="#bib100" name="bbib100"><span data-dcnode-id="10397" instrument_node="">100</span></a><span data-dcnode-id="10395" instrument_node="">]?”, is still begging a definite answer.</span></p><p data-dcnode-id="10377" id="p0370"><span data-dcnode-id="10393" instrument_node="">Dell and Bridger [</span><a class="workspace-trigger" data-dcnode-id="10391" href="#bib101" name="bbib101"><span data-dcnode-id="10392" instrument_node="">101</span></a><span data-dcnode-id="10390" instrument_node="">] depicted the future applications of hydrogen in 1975, and considered hydrogen to be the ultimate fuel, which has been attracting numerous passionate supporters of hydrogen economy. Dunn [</span><a class="workspace-trigger" data-dcnode-id="10388" href="#bib102" name="bbib102"><span data-dcnode-id="10389" instrument_node="">102</span></a><span data-dcnode-id="10387" instrument_node="">] argued that even risks and costs are associated with the rapid establishment of hydrogen economy, they are far below the long-term risks and costs for maintaining a comfortable commitment to a hydrocarbon economy. Sherif et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="10385" href="#bib103" name="bbib103"><span data-dcnode-id="10386" instrument_node="">103</span></a><span data-dcnode-id="10384" instrument_node="">] also asserted a positive attitude towards hydrogen economy, believing that hydrogen economy is an inevitable portion in the future energy system, and all the energy needs for human civilization could be met by using hydrogen and electricity that are generated from various available energy (preferably renewable energy) as energy carriers. Blanchette [</span><a class="workspace-trigger" data-dcnode-id="10382" href="#bib104" name="bbib104"><span data-dcnode-id="10383" instrument_node="">104</span></a><span data-dcnode-id="10381" instrument_node="">] analyzed the possible economic and geopolitical consequences by using hydrogen as the main fuel rather than oil, and thought that by considering all the factors, e.g. technological progresses, the ever-growing world's energy demand, the intensified environmental problems, and a new understanding of the demand for energy security, hydrogen may be the true successor to oil. Veziroglu [</span><a class="workspace-trigger" data-dcnode-id="10379" href="#bib105" name="bbib105"><span data-dcnode-id="10380" instrument_node="">105</span></a><span data-dcnode-id="10378" instrument_node="">] even saw the hydrogen economy as an opportunity to solve the world's energy, environment, poverty and population problems all at once.</span></p><p data-dcnode-id="10342" id="p0375"><span data-dcnode-id="10376" instrument_node="">Unlike those who are full of expectations some scholars are doubt, critical, or even pessimistic about hydrogen economy. Hetland [</span><a class="workspace-trigger" data-dcnode-id="10374" href="#bib106" name="bbib106"><span data-dcnode-id="10375" instrument_node="">106</span></a><span data-dcnode-id="10373" instrument_node="">] recommended a patient and cautious approach on hydrogen economy rather than jumping to a conclusion, believing that the strategy for pursuing hydrogen economy should be practical in nature. The doubts and criticism on the potential of hydrogen economy are mainly focused on the technical and cost feasibility, infrastructure availability, efficiency and availability of rare earth metals used in the hydrogen supply chain. Shinnar [</span><a class="workspace-trigger" data-dcnode-id="10371" href="#bib107" name="bbib107"><span data-dcnode-id="10372" instrument_node="">107</span></a><span data-dcnode-id="10370" instrument_node="">] listed six common fallacies about hydrogen, and draw the conclusion that a “hydrogen economy” is illusory from the perspective of energy efficiency, while electricity is a better alternative. Page and Krumdieck [</span><a class="workspace-trigger" data-dcnode-id="10368" href="#bib108" name="bbib108"><span data-dcnode-id="10369" instrument_node="">108</span></a><span data-dcnode-id="10367" instrument_node="">] analyzed the energy efficiency of hydrogen economy at the system level, and expressed serious doubts about the reality of energy or environmental benefits that could be achieved by pursuing a hydrogen economy. Yun [</span><a class="workspace-trigger" data-dcnode-id="10365" href="#bib109" name="bbib109"><span data-dcnode-id="10366" instrument_node="">109</span></a><span data-dcnode-id="10364" instrument_node="">] studied the practicability of hydrogen economy and concluded that the investment in hydrogen engine must be ended in failure according to a theorem on the indirect energy conversion. By using various empirical data, Flood [</span><a class="workspace-trigger" data-dcnode-id="10362" href="#bib100" name="bbib100"><span data-dcnode-id="10363" instrument_node="">100</span></a><span data-dcnode-id="10361" instrument_node="">] concluded that, although it is technically feasible to use hydrogen in the transportation and power generation sectors, the widespread use of hydrogen is unlikely in the foreseeable future due to the cost and additional infrastructure investment. Guy [</span><a class="workspace-trigger" data-dcnode-id="10359" href="#bib110" name="bbib110"><span data-dcnode-id="10360" instrument_node="">110</span></a><span data-dcnode-id="10358" instrument_node="">] argued that hydrogen has great potential and will have an important role in the future energy systems, however, if hydrogen is produced from renewable or nuclear resources, it is not economically or environmentally viable with current technologies. The same point of view was also expressed in two debates on hydrogen economy by Eggertson and The European Wind Energy Association (EWEA) [</span><a class="workspace-trigger" data-dcnode-id="10356" href="#bib111" name="bbib111"><span data-dcnode-id="10357" instrument_node="">111</span></a><span data-dcnode-id="10355" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10353" href="#bib112" name="bbib112"><span data-dcnode-id="10354" instrument_node="">112</span></a><span data-dcnode-id="10352" instrument_node="">]. Kleijn and Voet [</span><a class="workspace-trigger" data-dcnode-id="10350" href="#bib113" name="bbib113"><span data-dcnode-id="10351" instrument_node="">113</span></a><span data-dcnode-id="10349" instrument_node="">] believed that the scarcity of materials used for hydrogen infrastructures is the limiting factor for renewable hydrogen systems rather than the amount of renewable energy available in a hypothetical world in which hydrogen and electricity are the main energy carriers and renewable energy is the only energy source. On the contrary, Macdonald [</span><a class="workspace-trigger" data-dcnode-id="10347" href="#bib114" name="bbib114"><span data-dcnode-id="10348" instrument_node="">114</span></a><span data-dcnode-id="10346" instrument_node="">] suggested that the crucial aspect of the “hydrogen economy” debate is hydrogen production, the hydrogen economy is not feasible because the production of hydrogen from fossil fuels, biomasses, or renewable energy cannot meet the requirements. Therefore, Strahan [</span><a class="workspace-trigger" data-dcnode-id="10344" href="#bib115" name="bbib115"><span data-dcnode-id="10345" instrument_node="">115</span></a><span data-dcnode-id="10343" instrument_node="">] discussed “whatever happened to the hydrogen economy?” after experiencing the trough of disillusionment, and considered that hydrogen is a long road to nowhere.</span></p><p data-dcnode-id="10340" id="p0380"><span data-dcnode-id="10341" instrument_node="">By summarizing the pros and cons of the hydrogen economy raised by the above reports, it can be conclude that
