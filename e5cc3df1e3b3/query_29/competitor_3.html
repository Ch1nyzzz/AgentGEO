ydrogen fueling stations: 10,000</span></td></tr><tr class="valign-top" data-dcnode-id="9571"><td data-dcnode-id="9584"><span data-dcnode-id="9585" instrument_node="">Hydrogen energy ratio</span></td><td data-dcnode-id="9580"><span data-dcnode-id="9583" instrument_node="">2200&nbsp;t</span><br data-dcnode-id="9582"><span data-dcnode-id="9581" instrument_node="">4%</span></td><td data-dcnode-id="9576"><span data-dcnode-id="9579" instrument_node="">3500&nbsp;t</span><br data-dcnode-id="9578"><span data-dcnode-id="9577" instrument_node="">5.9%</span></td><td data-dcnode-id="9572"><span data-dcnode-id="9575" instrument_node="">6000&nbsp;t</span><br data-dcnode-id="9574"><span data-dcnode-id="9573" instrument_node="">10%</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="9564" id="p0570"><span data-dcnode-id="9565" instrument_node="">In this report, the strategy of two countries of Australia and Japan towards hydrogen economy was discussed and compared with that of China. Different reserves of natural resources usually lead to different strategies of hydrogen economy, which is also the reason why the above two countries are chosen for comparison. Different form China, Japan lacks natural resources, and the energy self-sufficiency rate has consistently remained as low as 6–7%. Therefore, Japan desperately needs a clean alternative energy after the shutdown of nuclear power plants since the Great East Japan Earthquake. On the opposite, Australia has abundant natural resources, hydrogen will be a main component of its energy exports after uranium and coal.</span></p><div data-dcnode-id="9533"><p data-dcnode-id="9559" id="p0575"><span data-dcnode-id="9563" instrument_node="">The positive effects of hydrogen usage on energy security, climate change and environmental pollution are the reasons why many countries are aggressively developing hydrogen economy, but the specific purposes vary from country to country. In the document of “China white paper on hydrogen energy and fuel cell industry”, three important functions of hydrogen are valued, i.e., promoting the clean and efficient utilization of traditional fossil fuels (especially coal), supporting the large-scale development of renewable energy, deep decarbonization in various fields including transportation, industry and Buildings. On the contrary, the main aim for Japan to develop hydrogen economy is to diversify the supply/procurement sources for fundamentally enhancing energy security, and reduce carbon emission in power generation, transportation, heat use and industrial processes, respectively. The primary aim for Canada to develop hydrogen economy is to establish the hydrogen export supply chains and fulfill deep decarbonization in various fields. The different objectives to develop hydrogen economy lead to the varied production and application plans of hydrogen, as can be seen in </span><a class="workspace-trigger" data-dcnode-id="9561" href="#fig9" name="bfig9"><span data-dcnode-id="9562" instrument_node="">Fig.&nbsp;9</span></a><span data-dcnode-id="9560" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="9534" id="fig9"><span data-dcnode-id="9543"><img alt="Fig.&nbsp;9" aria-describedby="cap0050" data-dcnode-id="9558" height="399" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr9.jpg&amp;raw"><span data-dcnode-id="9557" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="9544"><li data-dcnode-id="9551"><a class="anchor download-link u-font-sans" data-dcnode-id="9552" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr9_lrg.jpg" target="_blank" title="Download high-res image (613KB)"><span class="anchor-text" data-dcnode-id="9553"><span data-dcnode-id="9556" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9554"><span data-dcnode-id="9555" instrument_node="">Download high-res image (613KB)</span></span></span></a></li><li data-dcnode-id="9545"><a class="anchor download-link u-font-sans" data-dcnode-id="9546" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr9.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="9547"><span data-dcnode-id="9550" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9548"><span data-dcnode-id="9549" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="9535"><span data-dcnode-id="9536" id="cap0050"><p data-dcnode-id="9537" id="fspara0050"><span class="label" data-dcnode-id="9541"><span data-dcnode-id="9542" instrument_node="">Fig.&nbsp;9</span></span><span data-dcnode-id="9540" instrument_node="">. </span><span data-dcnode-id="9538" instrument_node="">Hydrogen Production and End-uses of Different Countries. 1. Imported fossil fuels, mainly natural gas; 2. Not just producing hydrogen from renewable sources.</span></p></span></span></figure></div><p data-dcnode-id="9525" id="p0580"><span data-dcnode-id="9532" instrument_node="">China's main strategy is to gradually shift from hydrogen recovery form industrial by-products to hydrogen production from coal (rather not natural gas) and renewable energy since China has abundant reserves of coal, renewable energy (i.e. solar energy and wind power) and is short of oil and natural gas resources. However, comparing with the well-established technologies for natural gas-based hydrogen production (e.g. SMR), it is more necessary for the coal-based hydrogen production processes to combine with the CCS technology due to the heavy CO</span><sub data-dcnode-id="9530"><span data-dcnode-id="9531" instrument_node="">2</span></sub><span data-dcnode-id="9529" instrument_node=""> emissions. Consequently, the uncertainty of CCS technology and the additional cost raise another obstacle, especially in the medium term. Therefore, the development and early application of CCS technology is more important for China. In order to solve this problem, the first measure is to vigorously develop CCS technologies and expand the utilization channels of CO</span><sub data-dcnode-id="9527"><span data-dcnode-id="9528" instrument_node="">2</span></sub><span data-dcnode-id="9526" instrument_node="">. At the same time, Japan's strategy to develop international hydrogen import supply chain could give China some enlightenment.</span></p><p data-dcnode-id="9520" id="p0585"><span data-dcnode-id="9524" instrument_node="">Another special challenges of China towards hydrogen economy is arose by the heavy dependence on the applications of hydrogen in the transportation sector (i.e. FCVs, FC ships and FC tram) and fuel cell power generation. Although the application of hydrogen as fuel or chemical feedstock was also mentioned in the “China white paper on hydrogen energy and fuel cell industry”, China's roadmap of hydrogen economy focuses on hydrogen fuel cell technologies, which is significantly different from the broad applications of hydrogen in Japan and Australia. As showed in </span><a class="workspace-trigger" data-dcnode-id="9522" href="#fig9" name="bfig9"><span data-dcnode-id="9523" instrument_node="">Fig.&nbsp;9</span></a><span data-dcnode-id="9521" instrument_node="">, in Japan, hydrogen would be used in power generation by both hydrogen fuel cells and hydrogen fuel, transport sections including FCVs, FC bus, FC forklift, FC trucks, FC ships etc. Industrial processes and heat utilization, fuel cell combined heat and power (FC–CHP) for residential and industrial use. While in Australia, the application of hydrogen includes hydrogen fueled transport, remote area power system (RAPS), industrial feedstock, export, power generation, providing heat (hydrogen enrichment of the natural gas network), and synthetic fuels.</span></p><p data-dcnode-id="9515" id="p0590"><span data-dcnode-id="9519" instrument_node="">As described in Section </span><a class="workspace-trigger" data-dcnode-id="9517" href="#sec4.2.3" name="bsec4.2.3"><span data-dcnode-id="9518" instrument_node="">High costs and Incomplete Infrastructure</span></a><span data-dcnode-id="9516" instrument_node="">, the application of FCVs in China is usually concentrated in the economically developed areas of the east coast; while China's abundant coal and renewable energy resources are centered in the central and western regions, resulting in the excessive requirements for hydrogen storage and transportation, which, undoubtedly, makes hydrogen more expensive and pose an extra hindrance for the large-scale application of FCVs in China. Furthermore, by focusing on FC power generation, a preferential strategy for China to use hydrogen is to generate electricity rather than as a residential and industrial fuel, showing the basic judgement of the central government that electricity is the dominant energy carrier in the future energy system. However, considering the advantages of hydrogen, it is unreasonable to ignore the possible role of hydrogen in the residential and industrial heating as a fuel at the current stage. Therefore, it is suggested that China should try to diversify the applications of hydrogen, allowing the full competition of hydrogen and electricity to position them in the future energy system.</span></p></section></section><section data-dcnode-id="9482" id="sec5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9511" id="sectitle0125"><span data-dcnode-id="9512" instrument_node="">Conclusion</span></h2><p data-dcnode-id="9483" id="p0595"><span data-dcnode-id="9510" instrument_node="">Hydrogen has emerged as one of the most promising energy options in the past decades due to the advantages of cleaning, abundance, high energy density, and high conversion efficiency. Therefore, many countries including China have spared no effort to pursue a hydrogen economy. However, a number of challenges have to be overcome for China's successful transition to hydrogen economy. In this paper, the whole hydrogen supply chain was briefly introduced with the aim to provide the readers a preliminary understanding of hydrogen economy. Then the feasibility of hydrogen economy is discussed by reviewing the literature perspectives, obtaining the following four key points: 1). Hydrogen will play an important role in the future energy society; 2). The hype and activism of hydrogen is not advisable, hydrogen will not be an exclusive energy carrier, but will complement and compete with electricity and biofuels in the future energy system; 3) Various challenges have to be overcome for the transition to hydrogen economy; 4) The biggest challenge is the commercialization of hydrogen, including the high cost of constructing infrastructure for production and delivery, the promotion of FCVs, the development of international HSCs. Subsequently, the six main challenges of China's transition to hydrogen economy are summarized and discussed, i.e. lack of key technologies, incomplete standard and specifications, high costs and incomplete infrastructure, geographic imbalance in resources and demands, unclear public acceptance and lack of policies. Furthermore, the strategies for China's transition to hydrogen economy were compared with those of Japan and Australia. In general, the following conclusions of the challenges towards hydrogen economy in China can be obtained:</span></p><dl class="list" data-dcnode-id="9484"><dt class="list-label" data-dcnode-id="9508"><span data-dcnode-id="9509" instrument_node="">i.</span></dt><dd class="list-description" data-dcnode-id="9505"><p data-dcnode-id="9506" id="p0600"><span data-dcnode-id="9507" instrument_node="">The domestic technological improvement on the whole hydrogen supply chain is the key to solve the problem of high cost for China's transition to hydrogen economy.</span></p></dd><dt class="list-label" data-dcnode-id="9503"><span data-dcnode-id="9504" instrument_node="">ii.</span></dt><dd class="list-description" data-dcnode-id="9500"><p data-dcnode-id="9501" id="p0605"><span data-dcnode-id="9502" instrument_node="">The uncertainty of CCS technology has a greater impact on China's hydrogen economy than that of the other countries, especially, in the medium term.</span></p></dd><dt class="list-label" data-dcnode-id="9498"><span data-dcnode-id="9499" instrument_node="">iii.</span></dt><dd class="list-description" data-dcnode-id="9495"><p data-dcnode-id="9496" id="p0610"><span data-dcnode-id="9497" instrument_node="">Geographic differences in resources and demands pose an extra hindrance for China's development of large-scale hydrogen economy in the long term, accordingly, different regions should have varied strategies, and the nationwide hydrogen transportation system should be constructed.</span></p></dd><dt class="list-label" data-dcnode-id="9493"><span data-dcnode-id="9494" instrument_node="">iv.</span></dt><dd class="list-description" data-dcnode-id="9490"><p data-dcnode-id="9491" id="p0615"><span data-dcnode-id="9492" instrument_node="">China should try to diversify its applications of hydrogen rather than only focus on FC transportation and power generation, and allow the full competition of hydrogen, biofuels and electricity to position them in the future energy system.</span></p></dd><dt class="list-label" data-dcnode-id="9488"><span data-dcnode-id="9489" instrument_node="">v.</span></dt><dd class="list-description" data-dcnode-id="9485"><p data-dcnode-id="9486" id="p0620"><span data-dcnode-id="9487" instrument_node="">China should actively participate in the international cooperation on hydrogen supply chain construction besides the international collaborations in technology.</span></p></dd></dl><p></p></section></div><section data-dcnod aria-describedby="citing-articles-header" data-dcnode-id="277"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="278"><ul data-dcnode-id="284"><li class="ListArticleItem" data-dcnode-id="524"><div class="sub-heading" data-dcnode-id="536"><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2352710221017952" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="540" id="citing-articles-article0-title"><span data-dcnode-id="541" instrument_node="">Innovation and development of vacuum insulation panels in China: A state-of-the-art review</span></h3></a><div class="article-source ellipsis" data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">2022, Journal of Building Engineering</span></div></div><div class="buttons" data-dcnode-id="530"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="531" type="button"><span class="button-link-text" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="532" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="533"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="525"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="526" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="527"><p data-dcnode-id="528" id="abspara0010"><span data-dcnode-id="529" instrument_node="">The urgent world broad demands for carbon neutrality and energy efficiency require improvements in systems' thermal performance. The world's eyes are now on applying high-performance insulation materials, such as vacuum insulation panels (VIPs), which are new and efficient insulation materials with environmental protection advantages. Research on VIPs in China stirred up at the beginning of the 21st century. VIPs have been promoted and applied in China to optimize and improve their performance and production processes. In this paper, the concept, structure, and insulation mechanism of VIPs are introduced. The latest achievements of core materials, barrier layers, and getters are investigated in China. The applications of VIPs in different fields are also summarized. The main current problems are defined, such as optimizing the thermal conductivity and improving the service life. And proposed a solution for the further development of VIP.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="389"><div class="sub-heading" data-dcnode-id="518"><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0360319922007650" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="522" id="citing-articles-article1-title"><span data-dcnode-id="523" instrument_node="">A novel graphite modified paper based cobalt-cobalt oxalate-nickel electrode for the electrooxidation of hydrogen peroxide</span></h3></a><div class="article-source ellipsis" data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">2022, International Journal of Hydrogen Energy</span></div></div><div class="buttons" data-dcnode-id="512"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="513" type="button"><span class="button-link-text" data-dcnode-id="516"><span data-dcnode-i b><span data-dcnode-id="457" instrument_node="">O</span><sub data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">4</span></sub><span data-dcnode-id="454" instrument_node=""> and Co</span><sub data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">2</span></sub><span data-dcnode-id="451" instrument_node="">O</span><sub data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">3</span></sub><span data-dcnode-id="448" instrument_node=""> </span><em data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">etc.</span></em><span data-dcnode-id="445" instrument_node="">) are on the surface of paper, which will enhance the electrocatalytic activity of the FG@Co–CoC</span><sub data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">2</span></sub><span data-dcnode-id="442" instrument_node="">O</span><sub data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">4</span></sub><span data-dcnode-id="439" instrument_node="">–Ni electrode to a great extent due to their synergistic effect. When the reaction solution contains 1.0&nbsp;mol&nbsp;dm</span><sup data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">−3</span></sup><span data-dcnode-id="436" instrument_node=""> NaOH and 0.2&nbsp;mol&nbsp;dm</span><sup data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">−3</span></sup><span data-dcnode-id="433" instrument_node="">&nbsp;H</span><sub data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">2</span></sub><span data-dcnode-id="430" instrument_node="">O</span><sub data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">2</span></sub><span data-dcnode-id="427" instrument_node="">, the FG@Co–CoC</span><sub data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">2</span></sub><span data-dcnode-id="424" instrument_node="">O</span><sub data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">4</span></sub><span data-dcnode-id="421" instrument_node="">–Ni electrode exhibits a much higher oxidation current density (270.6&nbsp;mA&nbsp;cm</span><sup data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">−2</span></sup><span data-dcnode-id="418" instrument_node="">) than the FG, FG@Co, FG@Ni, FG@Co–Ni and FG@Co–CoC</span><sub data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">2</span></sub><span data-dcnode-id="415" instrument_node="">O</span><sub data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">4</span></sub><span data-dcnode-id="412" instrument_node=""> electrodes. Besides, the whole preparation process for the FG@Co–CoC</span><sub data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">2</span></sub><span data-dcnode-id="409" instrument_node="">O</span><sub data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">4</span></sub><span data-dcnode-id="406" instrument_node="">–Ni electrode doesn't use any organic binder, ensuring the electrode owns good conductivity and stability for the electrochemical reaction. At last, the electrocatalytic mechanism for the electrooxidation of H</span><sub data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">2</span></sub><span data-dcnode-id="403" instrument_node="">O</span><sub data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">2</span></sub><span data-dcnode-id="400" instrument_node=""> is discussed. The Ni compounds and Co compounds are believed as the main catalytic substances, and the metallic Co core provides a fast route for the transfer of electrons. The super catalytic activity makes the prepared electrode in this study to be a promising material for the electrooxidation of H</span><sub data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">2</span></sub><span data-dcnode-id="397" instrument_node="">O</span><sub data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">2</span></sub><span data-dcnode-id="394" instrument_node=""> and the novel design idea gives some guidance for the fabrication of electrode materials in the field of fuel cell.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="371"><div class="sub-heading" data-dcnode-id="383"><a data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0360319922002774" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="387" id="citing-articles-article2-title"><span data-dcnode-id="388" instrument_node="">Bibliometric analysis of the research on hydrogen economy: An analysis of current findings and roadmap ahead</span></h3></a><div class="article-source ellipsis" data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">2022, International Journal of Hydrogen Energy</span></div></div><div class="buttons" data-dcnode-id="377"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="378" type="button"><span class="button-link-text" data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="379" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="380"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="372"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="373" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="374"><p data-dcnode-id="375" id="abspara0010"><span data-dcnode-id="376" instrument_node="">Based on literature research, this comprehensive analysis of 1275 articles published in the past five decades provides quantitative and objective insight into research trends in the hydrogen economy. Scholars and experts agree that by 2030, hydrogen will play a critical role in energy transition by complementing other renewable energy technologies. We applied indicators such as the Field-Weighted Citation Impact index, cited by and usage count (180 days) to evaluate countries, authors, documents, journals and so on. We also used VOS viewer to visualize the evolving trend using keyword analysis and cluster analysis of documents. Results show that the literature on the hydrogen economy has been recently increasing, particularly from 2016 to 2020. Scopus database was employed to acquire the required data for the study. From preliminary analysis, it was established that from 218 journals, 1275 documents related to hydrogen economy had been published so far. The average publication per year since introducing the term “hydrogen economy” is 6.62 and increasing. The average citation per document is 47.21. There have been 3760 authors so far who have been associated with publications related to a hydrogen economy. Of which 139 authors have written 156 documents individually, and 3621 authors have collaborated to publish 1119 documents, thus forming a collaborative index of 3.24. The International Journal of Hydrogen Energy contributes 40% of the overall publications. In terms of countries, China and United States are the leaders, with 126 papers each. Our analysis shows that the study on hydrogen economy mostly deals with multidisciplinary aspects like hydrogen production, storage, transportation, application, and public policy formulation. We adopted the 180 days usage count offered by the Web of Science database to better understand the research hotspot and evolving trends. It helped us view the existing gaps and potential scope of study that future researchers working on the hydrogen economy can explore. Aspects like pipeline transportation, risk assessment studies, blending, public safety and hazard mitigation can play a vital role in the hydrogen economy research in the future. Cooperation between nations and research institutes should be fostered with cross-disciplinary interchange to boost the hydrogen economy's multidisciplinary growth.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="347"><div class="sub-heading" data-dcnode-id="365"><a data-dcnode-id="368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1364032121012685" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="369" id="citing-articles-article3-title"><span data-dcnode-id="370" instrument_node="">Sustainable use of spilled turbinable energy in Ecuador: Three different energy storage systems</span></h3></a><div class="article-source ellipsis" data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">2022, Renewable and Sustainable Energy Reviews</span></div></div><div class="buttons" data-dcnode-id="359"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="360" type="button"><span class="button-link-text" data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="361" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="362"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="348"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="349" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="350"><p data-dcnode-id="351" id="abspara0010"><span data-dcnode-id="358" instrument_node="">The incorporation of Energy Storage Systems (ESS) in an electrical power system is studied for the application of Energy Time Shift (ETS) or energy arbitrage, taking advantage of the turbinable energy discharged in hydroelectric plants. For this, three storage systems were selected: Lithium-Ion Batteries (LIB), Vanadium Redox Flow Battery (VRFB), and Hydrogen Storage Systems (H</span><sub data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">2</span></sub><span data-dcnode-id="355" instrument_node="">SS). The spilled turbinable energy available at the Paute Integral hydropower complex in the Republic of Ecuador is taken as the case study. Based on real data from the operation of these plants, a distinctive element of the study, the performance of the selected energy storage systems was analyzed applying the Analytic Hierarchy of Process for decision-making, where technical, economic, and environmental criteria were considered. Electrical energy stored during the early morning seeks to displace the thermal generation during peak hours, close to the demand centers. The results show that all the storage systems analyzed satisfy the required demand, although VRFB is recommended for the ETS. From an economic point of view, LIB represents the best alternative. From a technical point of view, H</span><sub data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">2</span></sub><span data-dcnode-id="352" instrument_node="">SS is slightly superior, while prioritizing environmental aspects, VRFB technology prevails. However, the selection of the best ESS alternative must be continually evaluated, due to permanent technological changes. It is concluded that ESS represent a viable alternative to improve the operational performance of hydroelectric plants, meet the variability of demand, improve the quality of the electrical energy delivered, and displace the pollution-generation plants.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="303"><div class="sub-heading" data-dcnode-id="341"><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S036031992200115X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="345" id="citing-articles-article4-title"><span data-dcnode-id="346" instrument_node="">Optimization of two bio-oil steam reforming processes for hydrogen production based on thermodynamic analysis</span></h3></a><div class="article-source ellipsis" data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">2022, International Journal of Hydrogen Energy</span></div></div><div class="buttons" data-dcnode-id="335"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="336" type="button"><span class="button-link-text" data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="337" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="338"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="304"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="305" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="306"><p data-dcnode-id="307" id="abspara0010"><span data-dcnode-id="334" instrument_node="">Thermodynamics of hydrogen production from conventional steam reforming (C-SR) and sorption-enhanced steam reforming (SE-SR) of bio-oil was performed under different conditions including reforming temperature, S/C ratio (the mole ratio of steam to carbon in the bio-oil), operating pressure and CaO/C ratio (the mole ratio of CaO to carbon in the bio-oil). Increasing temperature and S/C ratio, and decreasing the operating pressure were favorable to improve the hydrogen yield. Compared to C-SR, SE-SR had the significant advantage of higher hydrogen yield at lower desirable temperature, and showed a significant suppression for carbon formation. However excess CaO (CaO/C&nbsp;&gt;&nbsp;1) almost had no additional contribution to hydrogen production. Aimed to achieve the maximum utilization of bio-oil with as little energy consumption as possible, the influences of temperature and S/C ratio on the reforming performance (energy requirements and bio-oil consumption per unit volume of hydrogen produced, </span><em data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Q</span></em><sub data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">D/H2</span></sub><span data-dcnode-id="329" instrument_node=""> (kJ/Nm</span><sup data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">3</span></sup><span data-dcnode-id="326" instrument_node="">) and </span><em data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Y</span></em><sub data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Bio-oil/H2</span></sub><span data-dcnode-id="321" instrument_node=""> (kg/Nm</span><sup data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">3</span></sup><span data-dcnode-id="318" instrument_node="">)) were comprehensively evaluated using matrix analysis while ensuring the highest hydrogen yield as possible. The optimal operating parameters were confirmed at 650&nbsp;°C, S/C&nbsp;=&nbsp;2 for C-SR; and 550&nbsp;°C, S/C&nbsp;=&nbsp;2 for SE-SR. Under their respective optimal conditions, the </span><em data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Y</span></em><sub data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Bio-oil/H2</span></sub><span data-dcnode-id="313" instrument_node=""> of SE-SR is significant decreased, by 18.50% compared to that of C-SR, although the </span><em data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Q</span></em><sub data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">D/H2</span></sub><span data-dcnode-id="308" instrument_node=""> was slightly increased, just by 7.55%.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="285"><div class="sub-heading" data-dcnode-id="297"><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0360319921050527" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="301" id="citing-articles-article5-title"><span data-dcnode-id="302" instrument_node="">A multi-model method to assess the value of power-to-gas using excess renewable</span></h3></a><div class="article-source ellipsis" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">2022, International Journal of Hydrogen Energy</span></div></div><div class="buttons" data-dcnode-id="291"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="292" type="button"><span class="button-link-text" data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="293" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="294"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="286"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="287" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="288"><p data-dcnode-id="289" id="abspara0010"><span data-dcnode-id="290" instrument_node="">Power-to-Gas (P2G) is a process that produces a gas from electricity, which is most commonly hydrogen via electrolysis. While some studies have considered hydrogen as a power-to-power storage vector, it could also be used as a fuel across the energy system, for example for transport or heat generation. Here, two energy models are used to explore the potential contribution of P2G as a cost-effective source of hydrogen, particularly for future energy systems with high variable renewable energy (VRE) in which there are occasional periods when electricity supply exceeds demand. A detailed electricity system model is iterated with a multi-vector energy system model using a soft-linking approach. This iterative approach addresses shortcomings in each model to better understand the optimal capacity of P2G and the potential economic capture rate of excess VRE. The modelling method is applied to Great Britain in 2050 as a case study. A substantial proportion of excess VRE in 2050 can be captured by P2G, and it is economically competitive compared with alternative sources. Moreover, the effectiveness and economic viability of P2G for reducing excess renewable is robust at even very high levels of renewable penetration.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85079513132%26md5%3D1051d84a376f6bb3833d77ae90d8ebcb" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="282" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="283"></path></svg><span class="button-alternative-text" data-d
