the supporters hold a similar viewpoint, i.e., the advantages of hydrogen make it inevitable in the future energy society considering the depletion of fossil fuels, climate change and environmental pollution even though there are many challenges in the process towards hydrogen economy. On the contrast, the opponents tried to estimate the status of hydrogen in the future energy society by using the current technologies and cost feasibility, and deduced that hydrogen economy is not viable. Both of standpoints are reasonable to a certain extent but with an incomplete view.</span></p><p data-dcnode-id="10311" id="p0385"><span data-dcnode-id="10339" instrument_node="">Under the circumstance of distinctive optimistic or pessimistic prospects, scholars have started to rationally look at hydrogen economy and tried to revise the possible role of hydrogen in the future energy. Simbeck [</span><a class="workspace-trigger" data-dcnode-id="10337" href="#bib116" name="bbib116"><span data-dcnode-id="10338" instrument_node="">116</span></a><span data-dcnode-id="10336" instrument_node="">] believed that hydrogen economy is feasible in the long run, but it faces significant obstacles and challenges in the short term, e.g. the high price and inefficient hydrogen production, and the cost and technical feasibility of on-board storage for FCVs. Hanley et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="10334" href="#bib94" name="bbib94"><span data-dcnode-id="10335" instrument_node="">94</span></a><span data-dcnode-id="10333" instrument_node="">] concluded that the uncertainty and complexity to use hydrogen may result in that hydrogen economy would not occur in the countries possessing a large amount of domestic biomass energy like Brazil. Andrews and Shabani [</span><a class="workspace-trigger" data-dcnode-id="10331" href="#bib84" name="bbib84"><span data-dcnode-id="10332" instrument_node="">84</span></a><span data-dcnode-id="10330" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10328" href="#bib117" name="bbib117"><span data-dcnode-id="10329" instrument_node="">117</span></a><span data-dcnode-id="10327" instrument_node="">] believed that the time for declaring an exclusive hydrogen economy had passed, and power, batteries and other storage technologies would all be widely used in the future energy structure. However, hydrogen would play an important role in the transportation sector and long-term storage of renewable energy. Bockris [</span><a class="workspace-trigger" data-dcnode-id="10325" href="#bib99" name="bbib99"><span data-dcnode-id="10326" instrument_node="">99</span></a><span data-dcnode-id="10324" instrument_node="">] pointed out that the route to produce hydrogen by water electrolysis and then obtain electricity through a fuel cell will double the manufacturing cost. If CO</span><sub data-dcnode-id="10322"><span data-dcnode-id="10323" instrument_node="">2</span></sub><span data-dcnode-id="10321" instrument_node=""> can be conveniently obtained from the air, “Liquid Hydrogen”, namely “methanol economy”, may become a continuation of the hydrogen economy. McGlashan [</span><a class="workspace-trigger" data-dcnode-id="10319" href="#bib118" name="bbib118"><span data-dcnode-id="10320" instrument_node="">118</span></a><span data-dcnode-id="10318" instrument_node="">] believed that the additional thermodynamic advantage of hydrogen economy was often neglected, because it can improve the second law efficiency in the utilization of fossil fuels. Ball et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="10316" href="#bib65" name="bbib65"><span data-dcnode-id="10317" instrument_node="">65</span></a><span data-dcnode-id="10315" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10313" href="#bib78" name="bbib78"><span data-dcnode-id="10314" instrument_node="">78</span></a><span data-dcnode-id="10312" instrument_node="">] suggested that hydrogen should not be evaluated in isolation, and it is likely to be a major replacement for petroleum fuels in the transportation sector, while other energy sources such as electricity will also play a role.</span></p><p data-dcnode-id="10300" id="p0390"><span data-dcnode-id="10310" instrument_node="">Since the concept of hydrogen economy was put forward, people have gone through a process from hopeful to pessimistic, then to rational cognition, accordingly, a variety of scholars have tried to explain the reasons. Alanne and Cao [</span><a class="workspace-trigger" data-dcnode-id="10308" href="#bib92" name="bbib92"><span data-dcnode-id="10309" instrument_node="">92</span></a><span data-dcnode-id="10307" instrument_node="">] believed that hydrogen economy follows the hype curve of Gartner Group. Sovacool and Brossmann [</span><a class="workspace-trigger" data-dcnode-id="10305" href="#bib119" name="bbib119"><span data-dcnode-id="10306" instrument_node="">119</span></a><span data-dcnode-id="10304" instrument_node="">] explained the attractiveness of hydrogen economy by using a symbolic convergence theory that considers “the collective sharing of fantasies and how group consciousness affects human action”. The five fantasy themes and rhetorical visions that surround hydrogen economy, i.e. independence, patriotism, progress, democratization and inevitability, are the reasons that hydrogen economy continues to attract significant efforts from politicians, the media, and academics. Moliner et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="10302" href="#bib69" name="bbib69"><span data-dcnode-id="10303" instrument_node="">69</span></a><span data-dcnode-id="10301" instrument_node="">] considered that as an emerging technology, the development of hydrogen economy follows the Hype Cycle, the mismatch between hydrogen's expectation and reality is mainly attributed by the reduced government support due to the economic crisis.</span></p><p data-dcnode-id="10256" id="p0395"><span data-dcnode-id="10299" instrument_node="">The uncertainties surrounding hydrogen economy have not dampened the enthusiasm for the future hydrogen economy and society, especially, its economic viability has been significantly enhanced by the recent cost reduction and performance improvement in FCVs [</span><a class="workspace-trigger" data-dcnode-id="10297" href="#bib95" name="bbib95"><span data-dcnode-id="10298" instrument_node="">95</span></a><span data-dcnode-id="10296" instrument_node="">]. IEA (International Energy Agency) has emphasized that the complete elimination of fossil fuels from transport and industry would be difficult to be achieved without the use of hydrogen in the long run [</span><a class="workspace-trigger" data-dcnode-id="10294" href="#bib120" name="bbib120"><span data-dcnode-id="10295" instrument_node="">120</span></a><span data-dcnode-id="10293" instrument_node="">]. By considering the inevitability of hydrogen economy and the economics in the long run, no country and enterprise are willing to lag behind in the competition of hydrogen economy [</span><a class="workspace-trigger" data-dcnode-id="10291" href="#bib121" name="bbib121"><span data-dcnode-id="10292" instrument_node="">121</span></a><span data-dcnode-id="10290" instrument_node="">]. Germany, Norway, Denmark, the United States, Japan, Canada and South Korea are current leaders in the implementation of hydrogen economy and fuel cell technologies, the other countries are also actively developing their own hydrogen economy [</span><a class="workspace-trigger" data-dcnode-id="10288" href="#bib97" name="bbib97"><span data-dcnode-id="10289" instrument_node="">97</span></a><span data-dcnode-id="10287" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10285" href="#bib122" name="bbib122"><span data-dcnode-id="10286" instrument_node="">[122]</span></a><span data-dcnode-id="10284" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10282" href="#bib123" name="bbib123"><span data-dcnode-id="10283" instrument_node="">[123]</span></a><span data-dcnode-id="10281" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10279" href="#bib124" name="bbib124"><span data-dcnode-id="10280" instrument_node="">[124]</span></a><span data-dcnode-id="10278" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10276" href="#bib125" name="bbib125"><span data-dcnode-id="10277" instrument_node="">[125]</span></a><span data-dcnode-id="10275" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10273" href="#bib126" name="bbib126"><span data-dcnode-id="10274" instrument_node="">[126]</span></a><span data-dcnode-id="10272" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10270" href="#bib127" name="bbib127"><span data-dcnode-id="10271" instrument_node="">[127]</span></a><span data-dcnode-id="10269" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10267" href="#bib128" name="bbib128"><span data-dcnode-id="10268" instrument_node="">[128]</span></a><span data-dcnode-id="10266" instrument_node="">]. The US Department of Energy released its hydrogen energy vision as early as 2002, planning to implement the batch-scale technologies in 2030 [</span><a class="workspace-trigger" data-dcnode-id="10264" href="#bib129" name="bbib129"><span data-dcnode-id="10265" instrument_node="">129</span></a><span data-dcnode-id="10263" instrument_node="">]. In 2003, the European Union formulated the “European Hydrogen Energy Roadmap” and released the vision and plan for hydrogen energy and hydrogen fuel cell technology development [</span><a class="workspace-trigger" data-dcnode-id="10261" href="#bib130" name="bbib130"><span data-dcnode-id="10262" instrument_node="">130</span></a><span data-dcnode-id="10260" instrument_node="">], and Japan published the white paper on hydrogen energy in 2014 [</span><a class="workspace-trigger" data-dcnode-id="10258" href="#bib131" name="bbib131"><span data-dcnode-id="10259" instrument_node="">131</span></a><span data-dcnode-id="10257" instrument_node="">].</span></p><p data-dcnode-id="10235" id="p0400"><span data-dcnode-id="10255" instrument_node="">In summary, the following conclusions on hydrogen economy and the role of hydrogen in the future energy system can be obtained:</span></p><dl class="list" data-dcnode-id="10236"><dt class="list-label" data-dcnode-id="10253"><span data-dcnode-id="10254" instrument_node="">1).</span></dt><dd class="list-description" data-dcnode-id="10247"><p data-dcnode-id="10248" id="p0405"><span data-dcnode-id="10252" instrument_node="">Hydrogen will play an important role in the future energy system. Hydrogen can be widely used in the fields of power, industry, transportation, heating, and long-term energy storage, etc., with the advantages of high energy density and low GHG emissions. Its status in the future energy system is being reinforced by the recent development in FCVs [</span><a class="workspace-trigger" data-dcnode-id="10250" href="#bib95" name="bbib95"><span data-dcnode-id="10251" instrument_node="">95</span></a><span data-dcnode-id="10249" instrument_node="">].</span></p></dd><dt class="list-label" data-dcnode-id="10245"><span data-dcnode-id="10246" instrument_node="">2).</span></dt><dd class="list-description" data-dcnode-id="10242"><p data-dcnode-id="10243" id="p0410"><span data-dcnode-id="10244" instrument_node="">The viewpoint of hydrogen as the only energy carrier in the future energy system can be abandoned. Although the realization of hydrogen economy is likely inevitable, the expectation of a society with hydrogen as the only energy carrier is unrealistic. Electricity, biofuels and hydrogen would compete in the future energy system, and play significant roles in different fields, while infiltrating and complementing each other.</span></p></dd><dt class="list-label" data-dcnode-id="10240"><span data-dcnode-id="10241" instrument_node="">3).</span></dt><dd class="list-description" data-dcnode-id="10237"><p data-dcnode-id="10238" id="p0415"><span data-dcnode-id="10239" instrument_node="">Various challenges have to be overcome on the road to the transition of hydrogen economy. As the economic feasibility of hydrogen production, storage, transportation, and usage would become clearer with the technical progresses, the biggest challenge focuses on the commercialization, including the high cost of constructing infrastructure for production and delivery, the promotion of FCVs, the development of international HSCs.</span></p></dd></dl><p></p></section><section data-dcnode-id="9513" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10232" id="sectitle0075"><span data-dcnode-id="10233" instrument_node="">Challenges towards hydrogen economy in China</span></h2><p data-dcnode-id="10209" id="p0420"><span data-dcnode-id="10231" instrument_node="">In the past decades, China has made significant progresses in hydrogen economy, e.g. fuel cells and FCVs, but still faces multiple challenges in the transition to hydrogen economy[</span><a class="workspace-trigger" data-dcnode-id="10229" href="#bib35" name="bbib35"><span data-dcnode-id="10230" instrument_node="">35</span></a><span data-dcnode-id="10228" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="10226" href="#bib132" name="bbib132"><span data-dcnode-id="10227" instrument_node="">[132]</span></a><span data-dcnode-id="10225" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10223" href="#bib133" name="bbib133"><span data-dcnode-id="10224" instrument_node="">[133]</span></a><span data-dcnode-id="10222" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10220" href="#bib134" name="bbib134"><span data-dcnode-id="10221" instrument_node="">[134]</span></a><span data-dcnode-id="10219" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10217" href="#bib135" name="bbib135"><span data-dcnode-id="10218" instrument_node="">[135]</span></a><span data-dcnode-id="10216" instrument_node="">]. Ren et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="10214" href="#bib35" name="bbib35"><span data-dcnode-id="10215" instrument_node="">35</span></a><span data-dcnode-id="10213" instrument_node="">] analyzed the key advantages, disadvantages, opportunities and threats of China's hydrogen economy by using the SWOT method. Dou et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="10211" href="#bib135" name="bbib135"><span data-dcnode-id="10212" instrument_node="">135</span></a><span data-dcnode-id="10210" instrument_node="">] summarized the challenges for China's transition to hydrogen economy, e.g. safety in hydrogen delivery and storage (including transportation through natural gas pipelines although China has a complete natural gas pipeline networks connecting major wind and solar power generation bases), high cost and insufficient infrastructure, shortage of hydrogen production, lack of transportation and utilization standards.</span></p><section data-dcnode-id="10026" id="sec4.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10207" id="sectitle0080"><span data-dcnode-id="10208" instrument_node="">Development of hydrogen economy in China</span></h3><p data-dcnode-id="10196" id="p0425"><span data-dcnode-id="10206" instrument_node="">Since 2000, the Chinese governments have invested a lot of efforts on the technologies of hydrogen and fuel cells. Lu et [</span><a class="workspace-trigger" data-dcnode-id="10204" href="#bib21" name="bbib21"><span data-dcnode-id="10205" instrument_node="">21</span></a><span data-dcnode-id="10203" instrument_node="">]. Reviewed the governments' investment fund projects, R&amp;D and demonstration programs for hydrogen and fuel cells before the 12th five-year plan. The related policies and progresses of China's hydrogen economy were analyzed by Yuan and Lin [</span><a class="workspace-trigger" data-dcnode-id="10201" href="#bib34" name="bbib34"><span data-dcnode-id="10202" instrument_node="">34</span></a><span data-dcnode-id="10200" instrument_node="">], while Sinigaglia et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="10198" href="#bib136" name="bbib136"><span data-dcnode-id="10199" instrument_node="">136</span></a><span data-dcnode-id="10197" instrument_node="">] demonstrated that a big gap exists between China's hydrogen technologies with the leading countries like Japan and the United States.</span></p><p data-dcnode-id="10191" id="p0430"><span data-dcnode-id="10195" instrument_node="">In terms of the R&amp;D funds, China has implemented a significant number of research projects on hydrogen and fuel cells </span><em data-dcnode-id="10193"><span data-dcnode-id="10194" instrument_node="">via</span></em><span data-dcnode-id="10192" instrument_node=""> the National High Technology Research and Development Program (863 Program), the National Basic Research Program (973 Program), the National Natural Science Foundation and local research projects. Recently, the Ministry of Science and Technology launched a “National Key R&amp;D Program” of “Renewable Energy and Hydrogen Energy Technology”, emphasizing on nine key research tasks relating to hydrogen: vehicle membrane electrode and batch preparation technology, vehicle fuel cell air compressor, vehicle fuel cell hydrogen recirculation pump, 70&nbsp;MPa vehicle-mounted high-pressure hydrogen storage technology, vehicle-mounted liquid hydrogen storage and supply technology, hydrogen purification technology for FCVs, high-safety solid-state hydrogen storage and supply technology for hydrogen refueling station, pressurizing and filling key equipment for 70&nbsp;MPa filling stations, safety performance testing technology and equipment for key parts of hydrogen refueling, respectively.</span></p><div data-dcnode-id="10035"><p data-dcnode-id="10186" id="p0435"><span data-dcnode-id="10190" instrument_node="">Regarding policies, China issued the Outline of the National Mid-to-long Term Sci-Tech Plan (2006–2020) in 2006, confirming the status of hydrogen energy and fuel cell technologies as the advanced energy technologies. Recently, in a series of national documents including “Made in China 2025”, “Action plan for energy technology revolution and innovation (2016–2030)”, “National Innovation-driven Development Strategy Program”, hydrogen energy and fuel cells are all listed as disruptive technologies leading to industrial changes. Meanwhile, “proposing to promote the construction of facilities such as hydrogen refueling stations related to hydrogen FCVs” was also included in the government report. The recent policies to promote hydrogen economy in China are detailed in </span><a class="workspace-trigger" data-dcnode-id="10188" href="#tbl1" name="btbl1"><span data-dcnode-id="10189" instrument_node="">Table 1</span></a><span data-dcnode-id="10187" instrument_node="">.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="10036" id="tbl1"><span class="captions" data-dcnode-id="10178"><span data-dcnode-id="10179" id="cap0055"><p data-dcnode-id="10180" id="tspara0010"><span class="label" data-dcnode-id="10184"><span data-dcnode-id="10185" instrument_node="">Table 1</span></span><span data-dcnode-id="10183" instrument_node="">. </span><span data-dcnode-id="10181" instrument_node="">Policies for hydrogen energy, fuel cell and FCVs.</span></p></span></span><div class="groups" data-dcnode-id="10037"><table data-dcnode-id="10038"><thead data-dcnode-id="10170"><tr class="rowsep-1 valign-top" data-dcnode-id="10171"><th data-dcnode-id="10176" scope="col"><span data-dcnode-id="10177" instrument_node="">Release date</span></th><th data-dcnode-id="10174" scope="col"><span data-dcnode-id="10175" instrument_node="">Name of Policy</span></th><th data-dcnode-id="10172" scope="col"><span data-dcnode-id="10173" instrument_node="">Main Content</span></th></tr></thead><tbody data-dcnode-id="10039"><tr class="valign-top" data-dcnode-id="10163"><td data-dcnode-id="10168"><span data-dcnode-id="10169" instrument_node="">2006.09</span></td><td data-dcnode-id="10166"><span data-dcnode-id="10167" instrument_node="">Outline of the National Mid-to-long Term Sci-Tech Plan (2006–2020)</span></td><td data-dcnode-id="10164"><span data-dcnode-id="10165" instrument_node="">Advanced energy technology: hydrogen energy and fuel cell technology</span></td></tr><tr class="valign-top" data-dcnode-id="10156"><td data-dcnode-id="10161"><span data-dcnode-id="10162" instrument_node="">2011.02</span></td><td data-dcnode-id="10159"><span data-dcnode-id="10160" instrument_node="">Law of the People's Republic of China on vehicle and vessel tax</span></td><td data-dcnode-id="10157"><span data-dcnode-id="10158" instrument_node="">FCVs are exempt from vehicle and ship taxes</span></td></tr><tr class="valign-top" data-dcnode-id="10149"><td data-dcnode-id="10154"><span data-dcnode-id="10155" instrument_node="">2012.07</span></td><td data-dcnode-id="10152"><span data-dcnode-id="10153" instrument_node="">Energy-Saving and New Energy Development Plan for the Automobile Industry (2012–2020)</span></td><td data-dcnode-id="10150"><span data-dcnode-id="10151" instrument_node="">FCVs, vehicle hydrogen energy industry develops in parallel with the international market</span></td></tr><tr class="valign-top" data-dcnode-id="10142"><td data-dcnode-id="10147"><span data-dcnode-id="10148" instrument_node="">2014.06</span></td><td data-dcnode-id="10145"><span data-dcnode-id="10146" instrument_node="">Energy Development Strategy Action Plan (2014–2020)</span></td><td data-dcnode-id="10143"><span data-dcnode-id="10144" instrument_node="">Hydrogen and fuel cells are listed as one of the 20 key innovation directions</span></td></tr><tr class="valign-top" data-dcnode-id="10131"><td data-dcnode-id="10140"><span data-dcnode-id="10141" instrument_node="">2014.07</span></td><td data-dcnode-id="10138"><span data-dcnode-id="10139" instrument_node="">Guiding Opinions to Accelerating New Energy Vehicles Promotion and Application</span></td><td data-dcnode-id="10132"><span data-dcnode-id="10137" instrument_node="">Focus on developing FCVs, increase support for tackling key problems in fuel cell technology;</span><br data-dcnode-id="10136"><span data-dcnode-id="10135" instrument_node="">Fuel cell car subsidies;</span><br data-dcnode-id="10134"><span data-dcnode-id="10133" instrument_node="">FCVs are exempt from vehicle purchase tax</span></td></tr><tr class="valign-top" data-dcnode-id="10122"><td data-dcnode-id="10129"><span data-dcnode-id="10130" instrument_node="">2014.09</span></td><td data-dcnode-id="10127"><span data-dcnode-id="10128" instrument_node="">National Plan for Tackling Climate Change 2014–2020</span></td><td data-dcnode-id="10123"><span data-dcnode-id="10126" instrument_node="">New energy vehicle technology and low-carbon alternative fuel technology are listed as one of the 10 key low-carbon technologies;</span><br data-dcnode-id="10125"><span data-dcnode-id="10124" instrument_node="">Focus on developing integrated fuel cell technologies</span></td></tr><tr class="valign-top" data-dcnode-id="10115"><td data-dcnode-id="10120"><span data-dcnode-id="10121" instrument_node="">2014.11</span></td><td data-dcnode-id="10118"><span data-dcnode-id="10119" instrument_node="">Circular on Awarding the Construction of New Energy Vehicle Charging Facilities</span></td><td data-dcnode-id="10116"><span data-dcnode-id="10117" instrument_node="">Four million yuan will be awarded to each new FCV refueling station that meets national technical standards and has a daily refueling capacity of no less than 200&nbsp;kg</span></td></tr><tr class="valign-top" data-dcnode-id="10108"><td data-dcnode-id="10113"><span data-dcnode-id="10114" instrument_node="">2015.04</span></td><td data-dcnode-id="10111"><span data-dcnode-id="10112" instrument_node="">Circular on Financial Support Policies on Promotion and Application of New Energy Vehicles from 2016 to 2020</span></td><td data-dcnode-id="10109"><span data-dcnode-id="10110" instrument_node="">From 2017 to 2020, the subsidy standard for other models except FCVs will be appropriately lowered, while the subsidy for FCVs is: 200,000 yuan for passenger cars, 300,000 yuan for light buses and trucks, and 500,000 yuan for large and medium-sized buses and medium and heavy trucks</span></td></tr><tr class="valign-top" data-dcnode-id="10101"><td data-dcnode-id="10106"><span data-dcnode-id="10107" instrument_node="">2015.05</span></td><td data-dcnode-id="10104"><span data-dcnode-id="10105" instrument_node="">Made in China 2025</span></td><td data-dcnode-id="10102"><span data-dcnode-id="10103" instrument_node="">Energy conservation and new energy vehicles are listed as the top 10 key breakthrough areas. FCVs development will continue to be supported</span></td></tr><tr class="valign-top" data-dcnode-id="10092"><td data-dcnode-id="10099"><span data-dcnode-id="10100" instrument_node="">2016.03</span></td><td data-dcnode-id="10097"><span data-dcnode-id="10098" instrument_node="">Action plan for Energy Technology Revolution and Innovation (2016–2030)</span></td><td data-dcnode-id="10093"><span data-dcnode-id="10096" instrument_node="">Hydrogen energy and fuel cell technology innovation is listed as one of the 15 key tasks. The strategic direction is 1). Hydrogen production, storage, transportation and refueling stations, 2). Advanced fuel cells; 3). Distributed power generation of fuel cell;</span><br data-dcnode-id="10095"><span data-dcnode-id="10094" instrument_node="">Establishing a roadmap for hydrogen energy and fuel cell technology innovation</span></td></tr><tr class="valign-top" data-dcnode-id="10085"><td data-dcnode-id="10090"><span data-dcnode-id="10091" instrument_node="">2016.05</span></td><td data-dcnode-id="10088"><span data-dcnode-id="10089" instrument_node="">National Innovation-driven Development Strategy Program</span></td><td data-dcnode-id="10086"><span data-dcnode-id="10087" instrument_node="">Hydrogen energy and fuel cell are listed as disruptive technologies leading industrial changes</span></td></tr><tr class="valign-top" data-dcnode-id="10076"><td data-dcnode-id="10083"><span data-dcnode-id="10084" instrument_node="">2016.08</span></td><td data-dcnode-id="10081"><span data-dcnode-id="10082" instrument_node="">13th Five-year Plan on Technology and Innovation</span></td><td data-dcnode-id="10077"><span data-dcnode-id="10080" instrument_node="">Renewable energy and hydrogen technology are listed as the top five clean and efficient energy technologies;</span><br data-dcnode-id="10079"><span data-dcnode-id="10078" instrument_node="">Hydrogen energy and fuel cell are listed as disruptive technologies leading industrial changes</span></td></tr><tr class="valign-top" data-dcnode-id="10067"><td data-dcnode-id="10074"><span data-dcnode-id="10075" instrument_node="">2016.12</span></td><td data-dcnode-id="10072"><span data-dcnode-id="10073" instrument_node="">Energy Development of 13th Five-year plan</span></td><td data-dcnode-id="10068"><span data-dcnode-id="10071" instrument_node="">Carry out demonstration projects of scientific and technological innovation in the field of hydrogen production;</span><br data-dcnode-id="10070"><span data-dcnode-id="10069" instrument_node="">Focus on hydrogen energy and fuel cell (one of the key tasks of energy science and technology innovation)</span></td></tr><tr class="valign-top" data-dcnode-id="10056"><td data-dcnode-id="10065"><span data-dcnode-id="10066" instrument_node="">2016.12</span></td><td data-dcnode-id="10063"><span data-dcnode-id="10064" instrument_node="">Energy Production and Consumption Revolution Strategy (2016–2030)</span></td><td data-dcnode-id="10057"><span data-dcnode-id="10062" instrument_node="">Carry out pioneering and innovative research: accelerate the research and development of hydrogen energy technology, explore algae hydrogen production technology;</span><br data-dcnode-id="10061"><span data-dcnode-id="10060" instrument_node="">Enhancing alternative energy storage capacity: developing hydrogen fuel alternative fuel technology;</span><br data-dcnode-id="10059"><span data-dcnode-id="10058" instrument_node="">Energy storage technology: development of high-performance fuel cells</span></td></tr><tr class="valign-top" data-dcnode-id="10047"><td data-dcnode-id="10054"><span data-dcnode-id="10055" instrument_node="">2017.04</span></td><td data-dcnode-id="10052"><span data-dcnode-id="10053" instrument_node="">The Medium and Long-Term Development Plan for Automotive Industry</span></td><td data-dcnode-id="10048"><span data-dcnode-id="10051" instrument_node="">Innovation center construction project: develop technology roadmap for hydrogen FCVs;</span><br data-dcnode-id="10050"><span data-dcnode-id="10049" instrument_node="">Gradually expand the scope of pilot demonstrations for fuel cell vehicles</span></td></tr><tr class="valign-top" data-dcnode-id="10040"><td data-dcnode-id="10045"><span data-dcnode-id="10046" instrument_node="">2018.12</span></td><td data-dcnode-id="10043"><span data-dcnode-id="10044" instrument_node="">Action Plan of Clean Energy Dissipation (2018–2020)</span></td><td data-dcnode-id="10041"><span data-dcnode-id="10042" instrument_node="">Explore ways to convert surplus electricity from renewable energy into heat, cold and hydrogen energy, so that renewable energy can be used more efficiently in multiple ways</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="10027" id="p0440"><span data-dcnode-id="10034" instrument_node="">As for the demonstration projects, Chinese central government and the United Nations development program (UNDP) jointly enforced the project of “China fuel cell bus commercialization demonstration project” in 2003. Afterwards, China had successively implemented a number of hydrogen energy demonstration projects, e.g. the use of hydrogen FCVs in 2008 Beijing Olympic Games, 2010 Shanghai World Expo, 2010 Guangzhou Asian Games, and the 2011 Shenzhen Universiade, “Thousand New Energy Vehicles in Ten Cities” [</span><a class="workspace-trigger" data-dcnode-id="10032" href="#bib137" name="bbib137"><span data-dcnode-id="10033" instrument_node="">137</span></a><span data-dcnode-id="10031" instrument_node="">], “Promoting the commercial development of hydrogen fuel cell vehicles in China” and the Synergy fuel cell project [</span><a class="workspace-trigger" data-dcnode-id="10029" href="#bib138" name="bbib138"><span data-dcnode-id="10030" instrument_node="">138</span></a><span data-dcnode-id="10028" instrument_node="">].</span></p></section><section data-dcnode-id="9686" id="sec4.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10024" id="sectitle0085"><span data-dcnode-id="10025" instrument_node="">Overall challenges towards hydrogen economy in China</span></h3><div data-dcnode-id="9969"><p data-dcnode-id="10016" id="p0445"><span data-dcnode-id="10023" instrument_node="">As concluded in Section </span><a class="workspace-trigger" data-dcnode-id="10021" href="#sec3" name="bsec3"><span data-dcnode-id="10022" instrument_node="">Feasibility of hydrogen economy</span></a><span data-dcnode-id="10020" instrument_node="">, hydrogen will play an important role in the future energy structure, but a number of challenges has to be addressed in the transition to hydrogen economy. </span><a class="workspace-trigger" data-dcnode-id="10018" href="#tbl2" name="btbl2"><span data-dcnode-id="10019" instrument_node="">Table 2</span></a><span data-dcnode-id="10017" instrument_node=""> summarizes the six major challenges on technological, economic, environmental condition, social and political aspects for China's transition to hydrogen economy.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="9970" id="tbl2"><span class="captions" data-dcnode-id="10008"><span data-dcnode-id="10009" id="cap0060"><p data-dcnode-id="10010" id="tspara0015"><span class="label" data-dcnode-id="10014"><span data-dcnode-id="10015" instrument_node="">Table 2</span></span><span data-dcnode-id="10013" instrument_node="">. </span><span data-dcnode-id="10011" instrument_node="">Overall challenges towards hydrogen economy in China.</span></p></span></span><div class="groups" data-dcnode-id="9971"><table data-dcnode-id="9972"><thead data-dcnode-id="10002"><tr class="rowsep-1 valign-top" data-dcnode-id="10003"><th data-dcnode-id="10006" scope="col"><span data-dcnode-id="10007" instrument_node="">Perspectives</span></th><th data-dcnode-id="10004" scope="col"><span data-dcnode-id="10005" instrument_node="">Challenges</span></th></tr></thead><tbody data-dcnode-id="9973"><tr class="valign-top" data-dcnode-id="9997"><td data-dcnode-id="10000" rowspan="2"><span data-dcnode-id="10001" instrument_node="">Technological</span></td><td data-dcnode-id="9998"><span data-dcnode-id="9999" instrument_node="">Lack of Key Technologies</span></td></tr><tr class="valign-top" data-dcnode-id="9994"><td data-dcnode-id="9995"><span data-dcnode-id="9996" instrument_node="">Incomplete Standard and Specification</span></td></tr><tr class="valign-top" data-dcnode-id="9989"><td data-dcnode-id="9992"><span data-dcnode-id="9993" instrument_node="">Economic</span></td><td data-dcnode-id="9990"><span data-dcnode-id="9991" instrument_node="">High costs and Incomplete Infrastructure</span></td></tr><tr class="valign-top" data-dcnode-id="9984"><td data-dcnode-id="9987"><span data-dcnode-id="9988" instrument_node="">Environmental Condition</span></td><td data-dcnode-id="9985"><span data-dcnode-id="9986" instrument_node="">Geographic Differences in Resources and Demands</span></td></tr><tr class="valign-top" data-dcnode-id="9979"><td data-dcnode-id="9982"><span data-dcnode-id="9983" instrument_node="">Social</span></td><td data-dcnode-id="9980"><span data-dcnode-id="9981" instrument_node="">Unclear Public Acceptance</span></td></tr><tr class="valign-top" data-dcnode-id="9974"><td data-dcnode-id="9977"><span data-dcnode-id="9978" instrument_node="">Political</span></td><td data-dcnode-id="9975"><span data-dcnode-id="9976" instrument_node="">Lack of Policies</span></td></tr></tbody></table></div></div></div><section data-dcnode-id="9911" id="sec4.2.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9967" id="sectitle0090"><span data-dcnode-id="9968" instrument_node="">Lack of key technologies</span></h4><p data-dcnode-id="9912" id="p0450"><span data-dcnode-id="9966" instrument_node="">The lack of advanced technologies is a key factor that has limited the development of China's hydrogen economy. The production of hydrogen by the current industrial methods, e.g. SMR and CG, cannot meet the environmental requirements, while the production by water electrolysis from renewable energy will be the direction in the medium and long terms [</span><a class="workspace-trigger" data-dcnode-id="9964" href="#bib31" name="bbib31"><span data-dcnode-id="9965" instrument_node="">31</span></a><span data-dcnode-id="9963" instrument_node="">]. Consequently, the fuel cell-related technologies would be a top priority for promoting the commercialization of hydrogen FCVs. At present, the key materials including catalysts, proton exchange membranes and carbon papers in China are still relied on imports, and the production of other materials, i.e. membrane humidifiers, bipolar plates, air compressors, hydrogen circulation pumps, is also lagging behind the leading countries.</span></p><dl class="list" data-dcnode-id="9913"><dt class="list-label" data-dcnode-id="9961"><span data-dcnode-id="9962" instrument_node="">(1).</span></dt><dd class="list-description" data-dcnode-id="9958"><p data-dcnode-id="9959" id="p0455"><span data-dcnode-id="9960" instrument_node="">Proton exchange membranes: The commonly used commercial proton exchange membranes include Nafion® from DuPont, USA, Aciplex® from Asahi Kasei, Japan, and Flemion® from Asahi Glass, Japan, which are all perfluorosulfonate polymers. It was reported that WUT New Energy Co., Ltd. In Wuhan, China has developed the Proton exchange membrane that can meet the requirement of PEM fuel cells, but it has not entered the stage of industrial production.</span></p></dd><dt class="list-label" data-dcnode-id="9956"><span data-dcnode-id="9957" instrument_node="">(2).</span></dt><dd class="list-description" data-dcnode-id="9953"><p data-dcnode-id="9954" id="p0460"><span data-dcnode-id="9955" instrument_node="">Catalysts: In PEM fuel cells, Pt/C catalysts are the only commercialized anode catalysts, whose performance is usually characterized by catalyst usage per Kw battery. The value for the current international practical application level is around 0.25&nbsp;g/kW, while that for the domestically produced catalysts is usually around 0.6&nbsp;g/kW. Moreover, only Dalian Institute of Chemical Physics, Chinese Academy of Sciences has a small-scale production capacity.</span></p></dd><dt class="list-label" data-dcnode-id="9951"><span data-dcnode-id="9952" instrument_node="">(3).</span></dt><dd class="list-description" data-dcnode-id="9948"><p data-dcnode-id="9949" id="p0465"><span data-dcnode-id="9950" instrument_node="">Carbon paper: Carbon paper, used in current collectors, is currently monopolized by several major international companies, i.e. Toray in Japan, Ballard in Canada, and SGL in Germany. In China, only Shanghai Hesen Bio-tech Co., Ltd. Can product carbon papers in a small batch scale.</span></p></dd><dt class="list-label" data-dcnode-id="9946"><span data-dcnode-id="9947" instrument_node="">(4).</span></dt><dd class="list-description" data-dcnode-id="9943"><p data-dcnode-id="9944" id="p0470"><span data-dcnode-id="9945" instrument_node="">Bipolar plates: The bipolar plates can be made of graphite or metal, while metal bipolar plates are a better choice due to their higher power, lower cost and better compression resistance. The graphite bipolar plates can be manufactured by multiple domestic manufacturers including Hangzhou Xinneng Graphite Co., Ltd., Jiangyin Hujiang Technology Co., Ltd. Etc. On the contrary, the metal bipolar plates can only be supplied by international companies including Sweden Cellimpact, Germany Dana and Grabener, American treadstone, the domestic players, e.g. Sunrise Power Co. Ltd. And Dalian Institute of Chemical Physics, are still in the stage of research and development.</span></p></dd><dt class="list-label" data-dcnode-id="9941"><span data-dcnode-id="9942" instrument_node="">(5).</span></dt><dd class="list-description" data-dcnode-id="9938"><p data-dcnode-id="9939" id="p0475"><span data-dcnode-id="9940" instrument_node="">Air compressors: As an important component of the gas supply system of fuel cell cathodes, air compressors account for almost 80% of fuel cell auxiliary power consumption, and its performance can directly affect the efficiency, compactness and water balance characteristics of the whole systems. At present, China's research institutes including Xi'an Jiaotong University and Zhejiang University have developed screw air compressors and vortex air compressors, but the centrifugal air compressors, representing the development direction of air compressors for fuel cells, can only be made in HoneyWell, USA.</span></p></dd><dt class="list-label" data-dcnode-id="9936"><span data-dcnode-id="9937" instrument_node="">(6).</span></dt><dd class="list-description" data-dcnode-id="9927"><p data-dcnode-id="9928" id="p0480"><span data-dcnode-id="9935" instrument_node="">Membrane electrodes: The current maximum current density for membrane electrodes is 1.5 A/cm</span><sup data-dcnode-id="9933"><span data-dcnode-id="9934" instrument_node="">2</span></sup><span data-dcnode-id="9932" instrument_node=""> in China, while the international advanced level can reach 2.5 A/cm</span><sup data-dcnode-id="9930"><span data-dcnode-id="9931" instrument_node="">2</span></sup><span data-dcnode-id="9929" instrument_node="">. Consequently, the volume and power density of the whole electric piles are low in China, about 2.2&nbsp;kW/L compared to the international level of 3.0&nbsp;kW/L. Moreover, the cost of membrane electrodes is about 2000 yuan/kW compared to the international level of about 100 yuan/kW. As for the whole fuel cell reactor, the domestic cost is approximate 3000 yuan/kW, which is much higher than the international level of less than 1000 yuan/kW.</span></p></dd><dt class="list-label" data-dcnode-id="9925"><span data-dcnode-id="9926" instrument_node="">(7)</span></dt><dd class="list-description" data-dcnode-id="9922"><p data-dcnode-id="9923" id="p0485"><span data-dcnode-id="9924" instrument_node="">Service life: China's demonstration fuel cell buses have not yet exceeded 3000&nbsp;h of service life, while those developed by the United Technologies Corporation (UTC) in USA have exceeded 5000&nbsp;h of service life under road test conditions.</span></p></dd><dt class="list-label" data-dcnode-id="9920"><span data-dcnode-id="9921" instrument_node="">(8)</span></dt><dd class="list-description" data-dcnode-id="9914"><p data-dcnode-id="9915" id="p0490"><span data-dcnode-id="9919" instrument_node="">Others: The demonstration tests proved that the performance of domestic FCVs in China is close to the international advanced level, but the reliability and durability still need to be significantly improved [</span><a class="workspace-trigger" data-dcnode-id="9917" href="#bib139" name="bbib139"><span data-dcnode-id="9918" instrument_node="">139</span></a><span data-dcnode-id="9916" instrument_node="">]. In terms of the low-temperature storage and start-up of fuel cell systems, China's fuel cell engines have not met the international advanced indicators.</span></p></dd></dl><p></p></section><section data-dcnode-id="9901" id="sec4.2.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9909" id="sectitle0095"><span data-dcnode-id="9910" instrument_node="">Incomplete standard and specification</span></h4><p data-dcnode-id="9904" id="p0495"><span data-dcnode-id="9908" instrument_node="">The incomplete standards and regulations is another challenge for China's transition to hydrogen economy. From the global perspective, Ball et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="9906" href="#bib65" name="bbib65"><span data-dcnode-id="9907" instrument_node="">65</span></a><span data-dcnode-id="9905" instrument_node="">] believes that there are still three major problems in the standards of hydrogen economy: (1) the reliability of hydrogen refueling stations and the whole system has not reached the required specification i.e.&nbsp;&gt;&nbsp;95%. (2) The accurate or standardized measurement method or device to verify the accuracy of hydrogen meter is not enough. (3) The specifications and compliance for hydrogen quality as well as the cost-effective procedures for proving hydrogen quality compliance have not been developed.</span></p><p data-dcnode-id="9902" id="p0500"><span data-dcnode-id="9903" instrument_node="">In 2008, China has successively established the National Hydrogen Energy Standardization Technical Committee (SAC/TC309) and the National Fuel Cell Standardization Technical Committee, which was renamed as National Technical Committee 342 on Fuel Cell and Flow Battery of Standardization Administration of China in 2012. (SAC/TC342). The National Standards for Hydrogen Energy (2005–2017), compiled in 2017, covers 28 standards or specifications on hydrogen, hydrogen energy, hydrogen production, and hydrogen refueling stations. Five domestic standards for the on-board hydrogen storage systems have been formulated and more are on the way. China has established a standard system of fuels consisting of basic standards, FC modules, FC power generation systems (fixed, portable, micro, drive-assisted power), FC power generation systems. A total of 48 standards on PEM fuel cells and stationary fuel cells are taking effect according to the Standardization Administration of China, and two more will be implemented and 15 will be adopted. It would be obviously beneficial for the long-term development of China's hydrogen economy to establish and complete the standards and regulations as soon as possible. For example, due to Japan's leading position in fuel cell vehicle technologies, the United Nations' upcoming global technical regulations on fuel cell vehicles will largely adopt Japanese standards. Consequently, China's fuel cell vehicle manufacturers will have to make adjustment in the future.</span></p></section><section data-dcnode-id="9865" id="sec4.2.3"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9899" id="sectitle0100"><span data-dcnode-id="9900" instrument_node="">High costs and incomplete infrastructure</span></h4><p data-dcnode-id="9873" id="p0505"><span data-dcnode-id="9898" instrument_node="">Xu et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="9896" href="#bib33" name="bbib33"><span data-dcnode-id="9897" instrument_node="">33</span></a><span data-dcnode-id="9895" instrument_node="">] calculated that the capital investment for the small, medium and large on-site natural gas reforming stations is around $1.04, $4.15 and $7.84 million, respectively, and the corresponding H</span><sub data-dcnode-id="9893"><span data-dcnode-id="9894" instrument_node="">2</span></sub><span data-dcnode-id="9892" instrument_node=""> fuel cost is 7.7, 7.0 and 6.8 $/kg, by analyzing a roll-out strategy of introducing fuel cell vehicles and hydrogen stations in Shenzhen, China, between 2016 and 2025. Weinert et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="9890" href="#bib140" name="bbib140"><span data-dcnode-id="9891" instrument_node="">140</span></a><span data-dcnode-id="9889" instrument_node="">] estimated that the initial capital investment is $1.1 million for a 100&nbsp;kg/day station in Shanghai, China, corresponding to $7.90 per kg H</span><sub data-dcnode-id="9887"><span data-dcnode-id="9888" instrument_node="">2</span></sub><span data-dcnode-id="9886" instrument_node="">. Yao et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="9884" href="#bib141" name="bbib141"><span data-dcnode-id="9885" instrument_node="">141</span></a><span data-dcnode-id="9883" instrument_node="">] assessed the cost of hydrogen of 14 different plans by using the life cycle cost analysis (LCCA) method, showing that among the total cost of 41–62 yuan/kg H</span><sub data-dcnode-id="9881"><span data-dcnode-id="9882" instrument_node="">2</span></sub><span data-dcnode-id="9880" instrument_node="">, the usage stage occupies more than 70% of the total cost. Moreover, a big gap exists between the price of hydrogen in China ($4–7/Kg) with that in Australia ($2.14–2.74/Kg) [</span><a class="workspace-trigger" data-dcnode-id="9878" href="#bib142" name="bbib142"><span data-dcnode-id="9879" instrument_node="">142</span></a><span data-dcnode-id="9877" instrument_node="">] and in Japan (30 yen/Kg) [</span><a class="workspace-trigger" data-dcnode-id="9875" href="#bib131" name="bbib131"><span data-dcnode-id="9876" instrument_node="">131</span></a><span data-dcnode-id="9874" instrument_node="">], therefore, in order to compete with other energy sources such as electricity and biofuels, the cost of hydrogen has to be significantly reduced in China.</span></p><p data-dcnode-id="9868" id="p0510"><span data-dcnode-id="9872" instrument_node="">In terms of infrastructure, only 23 hydrogen refueling stations have been built and officially operated in China until March 2019, accounting for only about 6.23% of the world's total stations, although 17 more are under construction [</span><a class="workspace-trigger" data-dcnode-id="9870" href="#bib143" name="bbib143"><span data-dcnode-id="9871" instrument_node="">143</span></a><span data-dcnode-id="9869" instrument_node="">]. Moreover, most of the stations are of demonstration type with a daily fueling capacity around 200&nbsp;kg, unable to meet the requirements for commercial operations. Consequently, the verification of operational economy and durability on hydrogen refueling stations is still insufficient in China.</span></p><p data-dcnode-id="9866" id="p0515"><span data-dcnode-id="9867" instrument_node="">The main reason for restricting the construction of China's hydrogen infrastructure is the high cost, which can only be reduced by focusing on the development of key technologies and increasing the localization of key components.</span></p></section><section data-dcnode-id="9752" id="sec4.2.4"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9863" id="sectitle0105"><span data-dcnode-id="9864" instrument_node="">Geographic differences in resources and demands</span></h4><p data-dcnode-id="9852" id="p0520"><span data-dcnode-id="9862" instrument_node="">Hydrogen can be obtained from various fossil fuels, e.g. coal, natural gas, petroleum, and renewable energy sources including wind, solar, biomass, nuclear, etc., and once hydrogen is produced, its storage and delivery become the major problems [</span><a class="workspace-trigger" data-dcnode-id="9860" href="#bib104" name="bbib104"><span data-dcnode-id="9861" instrument_node="">104</span></a><span data-dcnode-id="9859" instrument_node="">]. However, in China, the coal and oil reserves concentrate in the north part, while most of the natural gas reserves locate in the west and central parts, indicating a mismatch between major energy suppliers and major energy-consuming cities, mostly of which locate in eastern China, especially the coastal areas [</span><a class="workspace-trigger" data-dcnode-id="9857" href="#bib21" name="bbib21"><span data-dcnode-id="9858" instrument_node="">21</span></a><span data-dcnode-id="9856" instrument_node="">]. Consequently, China's geographical imbalance between energy demand and energy resources has formed the key characteristic of “transmission from west to east and mutual support between north and south grids” [</span><a class="workspace-trigger" data-dcnode-id="9854" href="#bib144" name="bbib144"><span data-dcnode-id="9855" instrument_node="">144</span></a><span data-dcnode-id="9853" instrument_node="">].</span></p><div data-dcnode-id="9806"><p data-dcnode-id="9832" id="p0525"><span data-dcnode-id="9851" instrument_node="">The coal resources in China are abundant and distributed in all provinces except Shanghai, but the distribution is very uneven with the characteristics of “well-shaped” and “nine-square” [</span><a class="workspace-trigger" data-dcnode-id="9849" href="#bib145" name="bbib145"><span data-dcnode-id="9850" instrument_node="">145</span></a><span data-dcnode-id="9848" instrument_node="">]. China's petroleum resources are short and concentrated in the eight basins, with the recoverable resources of 17.2 billion tons, accounting for 81.13% of the country's total resources. The lean resources of natural gas in China are mainly found in the nine basins, having a recoverable resource of 18.4 trillion cubic meters, accounting for 83.64% of the country's total resources. In </span><a class="workspace-trigger" data-dcnode-id="9846" href="#fig7" name="bfig7"><span data-dcnode-id="9847" instrument_node="">Fig.&nbsp;7</span></a><span data-dcnode-id="9845" instrument_node="">, the fossil energy reserves in China were calculated by using the eight economic zones as a classification [</span><a class="workspace-trigger" data-dcnode-id="9843" href="#bib146" name="bbib146"><span data-dcnode-id="9844" instrument_node="">146</span></a><span data-dcnode-id="9842" instrument_node="">]. Similarly, China has abundant renewable energy sources (hydropower [</span><a class="workspace-trigger" data-dcnode-id="9840" href="#bib147" name="bbib147"><span data-dcnode-id="9841" instrument_node="">147</span></a><span data-dcnode-id="9839" instrument_node="">], wind [</span><a class="workspace-trigger" data-dcnode-id="9837" href="#bib148" name="bbib148"><span data-dcnode-id="9838" instrument_node="">148</span></a><span data-dcnode-id="9836" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="9834" href="#bib149" name="bbib149"><span data-dcnode-id="9835" instrument_node="">149</span></a><span data-dcnode-id="9833" instrument_node="">], solar, geothermal), and their geographical distribution is also uneven. Consequently, it is difficult for most areas to develop renewable economies because the areas rich in renewable resources are far away from the demand centers.</span></p><figure class="figure text-xs" data-dcnode-id="9807" id="fig7"><span data-dcnode-id="9816"><img alt="Fig.&nbsp;7" aria-describedby="cap0040" data-dcnode-id="9831" height="370" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr7.jpg&amp;raw"><span data-dcnode-id="9830" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="9817"><li data-dcnode-id="9824"><a class="anchor download-link u-font-sans" data-dcnode-id="9825" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr7_lrg.jpg" target="_blank" title="Download high-res image (285KB)"><span class="anchor-text" data-dcnode-id="9826"><span data-dcnode-id="9829" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9827"><span data-dcnode-id="9828" instrument_node="">Download high-res image (285KB)</span></span></span></a></li><li data-dcnode-id="9818"><a class="anchor download-link u-font-sans" data-dcnode-id="9819" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr7.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="9820"><span data-dcnode-id="9823" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9821"><span data-dcnode-id="9822" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="9808"><span data-dcnode-id="9809" id="cap0040"><p data-dcnode-id="9810" id="fspara0040"><span class="label" data-dcnode-id="9814"><span data-dcnode-id="9815" instrument_node="">Fig.&nbsp;7</span></span><span data-dcnode-id="9813" instrument_node="">. </span><span data-dcnode-id="9811" instrument_node="">Geographic differences in the energy resources and demands of China. Note: zone 1 to zone 8 refer to the eight economic zones, Northern coastal (Beijing, Tianjin, Hebei and Shandong Provinces), Eastern coastal (Shanghai, Jiangsu and Zhejiang Provinces), Southern coastal (Guangdong, Fujian, Hainan Provinces), The middle reaches of the Yangtze River (Hubei, Hunan, Anhui and Jiangxi Province), The middle reaches of the Yellow River (Shaanxi, Shanxi, Henan Province and Inner Mongolia Autonomous Region), Southwest (Chongqing, Sichuan, Guizhou, Yunnan Province and Guangxi Zhuang Autonomous Region), Northeast (Heilongjiang, Jilin and Liaoning Province), Great Northwest (Gansu, Qinghai Province, Ningxia Hui, Tibet and Xinjiang Uygur Autonomous Region). (For interpretation of the references to color&nbsp;in this figure legend, the reader is referred to the Web version of this article.)</span></p></span></span></figure></div><p data-dcnode-id="9792" id="p0530"><span data-dcnode-id="9805" instrument_node="">The central and western regions are rich in fossil fuels and renewable energy resources, being able to produce enough hydrogen to support future energy demands for hydrogen economy. However, the distribution and storage of hydrogen in these areas are big problems, as the distribution cost is estimated to be five times of the production cost [</span><a class="workspace-trigger" data-dcnode-id="9803" href="#bib104" name="bbib104"><span data-dcnode-id="9804" instrument_node="">104</span></a><span data-dcnode-id="9802" instrument_node="">], and the access to the energy resources requires significant investment in infrastructures, and extensive transmission networks [</span><a class="workspace-trigger" data-dcnode-id="9800" href="#bib117" name="bbib117"><span data-dcnode-id="9801" instrument_node="">117</span></a><span data-dcnode-id="9799" instrument_node="">]. Bockris [</span><a class="workspace-trigger" data-dcnode-id="9797" href="#bib99" name="bbib99"><span data-dcnode-id="9798" instrument_node="">99</span></a><span data-dcnode-id="9796" instrument_node="">] believed that the prerequisite for hydrogen to be used as an energy carrier in the future is that the distance between the energy source and energy sink have to be minimized due to the high delivery cost through the pipes. Meanwhile, with the rapid development of China's renewable energy, the phenomena of “wind abandoning” and “water abandoning” keep appearing in China, particularly, in the areas of Gansu, Xinjiang, Jilin and Inner Mongolia, where 33%, 29%, 21% and 15% of the total “wind and water energy” were abandoned in 2017, respectively [</span><a class="workspace-trigger" data-dcnode-id="9794" href="#bib10" name="bbib10"><span data-dcnode-id="9795" instrument_node="">10</span></a><span data-dcnode-id="9793" instrument_node="">]. Since it is becoming inevitable to use renewable energy, the mismatch between the energy supply and demand have to be tackled, which definitely requires the construction of expensive infrastructures, posing a serious challenge for China's transition to hydrogen economy.</span></p><div data-dcnode-id="9758"><p data-dcnode-id="9784" id="p0535"><span data-dcnode-id="9791" instrument_node="">Therefore, the geographic differences in energy resources and demands should be fully respected by Chinese governments, and distinct transition strategies to a hydrogen economy should be planned for different regions as shown in </span><a class="workspace-trigger" data-dcnode-id="9789" href="#fig8" name="bfig8"><span data-dcnode-id="9790" instrument_node="">Fig.&nbsp;8</span></a><span data-dcnode-id="9788" instrument_node="">. In the near term, the richer economic zone in southeastern China can produce hydrogen from industrial by-products, coal, or import hydrogen by establishing the international hydrogen import supply chain, instead of producing hydrogen by electrolysis. As for the end-uses, FCVs can be utilized as a breakthrough to strengthen the construction of supply chain infrastructures such as hydrogen refueling stations in the cities. On the contrary, in the underdeveloped northwestern regions, hydrogen can be produced from renewable energy resources (e.g. water, wind and solar energies) to avoid the occurrence of “wind abandoning” and “water abandoning” [</span><a class="workspace-trigger" data-dcnode-id="9786" href="#bib150" name="bbib150"><span data-dcnode-id="9787" instrument_node="">150</span></a><span data-dcnode-id="9785" instrument_node="">]. Besides, it is essential to actively explore the role of hydrogen to storage energy for eliminating the fluctuation of renewable energy.</span></p><figure class="figure text-xs" data-dcnode-id="9759" id="fig8"><span data-dcnode-id="9768"><img alt="Fig.&nbsp;8" aria-describedby="cap0045" data-dcnode-id="9783" height="409" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr8.jpg&amp;raw"><span data-dcnode-id="9782" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="9769"><li data-dcnode-id="9776"><a class="anchor download-link u-font-sans" data-dcnode-id="9777" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr8_lrg.jpg" target="_blank" title="Download high-res image (477KB)"><span class="anchor-text" data-dcnode-id="9778"><span data-dcnode-id="9781" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9779"><span data-dcnode-id="9780" instrument_node="">Download high-res image (477KB)</span></span></span></a></li><li data-dcnode-id="9770"><a class="anchor download-link u-font-sans" data-dcnode-id="9771" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360319920303414-gr8.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="9772"><span data-dcnode-id="9775" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9773"><span data-dcnode-id="9774" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="9760"><span data-dcnode-id="9761" id="cap0045"><p data-dcnode-id="9762" id="fspara0045"><span class="label" data-dcnode-id="9766"><span data-dcnode-id="9767" instrument_node="">Fig.&nbsp;8</span></span><span data-dcnode-id="9765" instrument_node="">. </span><span data-dcnode-id="9763" instrument_node="">The suggested hydrogen roadmap in different regions of China.</span></p></span></span></figure></div><p data-dcnode-id="9753" id="p0540"><span data-dcnode-id="9757" instrument_node="">In the medium-term, hydrogen from renewable energy would still be the dominant way of hydrogen production in the northwest region. With regard to applications, the use of hydrogen-rich natural gas in this region should be increased, and the large-scale hydrogen storage should be explored, for achieving the self-consumption of renewable energy while further reducing the use of fossil fuels [</span><a class="workspace-trigger" data-dcnode-id="9755" href="#bib151" name="bbib151"><span data-dcnode-id="9756" instrument_node="">151</span></a><span data-dcnode-id="9754" instrument_node="">]. In the southeastern region, the commercial application of FCVs should be further promoted, meanwhile, the ways to produce hydrogen should be diversified by boosting the low-carbon coal-based hydrogen production (combined with the CCS technology), hydrogen production from biomass, and hydrogen extraction from hydrogen-rich natural gas. On these bases, the application of fuel cell distributed energy systems and the construction of regional (inter-city) supply chain infrastructure networks should also be strengthened. In the long-term, hydrogen should be produced from renewable energy in the whole country following by the constructure of nationwide supply networks. The difference between the northwest region and the southeastern region in the ways of hydrogen production and end-use would be significantly decreased. The above perspectives are also in line with the “Blue Book of China's Hydrogen Industry Infrastructure Development” plan.</span></p></section><section data-dcnode-id="9723" id="sec4.2.5"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9750" id="sectitle0110"><span data-dcnode-id="9751" instrument_node="">Unclear public acceptance</span></h4><p data-dcnode-id="9724" id="p0545"><span data-dcnode-id="9749" instrument_node="">Social acceptance plays an important role in the implementation of hydrogen economy and the widespread marketing of hydrogen technologies [</span><a class="workspace-trigger" data-dcnode-id="9747" href="#bib152" name="bbib152"><span data-dcnode-id="9748" instrument_node="">152</span></a><span data-dcnode-id="9746" instrument_node="">]. Iribarren et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="9744" href="#bib153" name="bbib153"><span data-dcnode-id="9745" instrument_node="">153</span></a><span data-dcnode-id="9743" instrument_node="">] argued that it is essential to assess the public perception and social acceptance of hydrogen energy systems for avoiding the unwillingness to deploy hydrogen technologies and infrastructure in Spanish society. Heinz and Erdmann [</span><a class="workspace-trigger" data-dcnode-id="9741" href="#bib152" name="bbib152"><span data-dcnode-id="9742" instrument_node="">152</span></a><span data-dcnode-id="9740" instrument_node="">] analyzed the dynamics of the public attitude toward hydrogen </span><em data-dcnode-id="9738"><span data-dcnode-id="9739" instrument_node="">via</span></em><span data-dcnode-id="9737" instrument_node=""> an international survey of public acceptance towards hydrogen in eight European cities, suggesting that the public information campaigns to make people familiar with hydrogen economy are necessary for acquiring the stable public support. Ono and Tsunemi [</span><a class="workspace-trigger" data-dcnode-id="9735" href="#bib154" name="bbib154"><span data-dcnode-id="9736" instrument_node="">154</span></a><span data-dcnode-id="9734" instrument_node="">] used the risk-awareness scale to describe the public acceptance of hydrogen stations in Japanese, and suggested that the public acceptance can be improved by providing precise risk information to alleviate the inherent fear. Itaoka et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="9732" href="#bib155" name="bbib155"><span data-dcnode-id="9733" instrument_node="">155</span></a><span data-dcnode-id="9731" instrument_node="">] compared the results of a current survey with two previous surveys conducted six and seven years ago, showing a significant increase in the awareness and a relatively small improvement on knowledge of hydrogen energy, hydrogen infrastructure and fuel cell vehicles. Bogel et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="9729" href="#bib156" name="bbib156"><span data-dcnode-id="9730" instrument_node="">156</span></a><span data-dcnode-id="9728" instrument_node="">] believed that in the early stages of hydrogen technologies, the information dissemination would be a valuable tool to raise the awareness of people with low or no knowledge and positive attitudes towards the hydrogen technologies. However, if the hydrogen technologies become more widespread, the communication strategies would need to be adjusted, a stronger commitment to a particular attitude may lead to the “biased” information processing and evaluation. Ren et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="9726" href="#bib35" name="bbib35"><span data-dcnode-id="9727" instrument_node="">35</span></a><span data-dcnode-id="9725" instrument_node="">] argued that China has a high social acceptance of hydrogen economy, because the excessive use of fossil fuels has resulted in more and more serious environmental pollution in China. Regrettably, the public attitudes towards hydrogen energy and fuel cells were not studied in the study.</span></p></section><section data-dcnode-id="9687" id="sec4.2.6"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9721" id="sectitle0115"><span data-dcnode-id="9722" instrument_node="">Lack of policies</span></h4><p data-dcnode-id="9707" id="p0550"><span data-dcnode-id="9720" instrument_node="">Pudukud et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="9718" href="#bib43" name="bbib43"><span data-dcnode-id="9719" instrument_node="">43</span></a><span data-dcnode-id="9717" instrument_node="">] argued that hydrogen economy in Asian countries faces two major challenges: one is the lack of advanced technologies, and the second and more important challenge is the lack of policy support. Ren et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="9715" href="#bib35" name="bbib35"><span data-dcnode-id="9716" instrument_node="">35</span></a><span data-dcnode-id="9714" instrument_node="">] assessed the strategic priority of hydrogen as the most effective and important factor to promote China's hydrogen economy, indicating that China's hydrogen industry needs explicit and active support from the governments. The strategic priority of hydrogen can facilitate the large-scale promotion of hydrogen industry, improve the public acceptance of FCVs and the competitiveness of hydrogen to other energy carriers (especially electricity), and obtain financial supports from the government to build infrastructure. Rits et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="9712" href="#bib157" name="bbib157"><span data-dcnode-id="9713" instrument_node="">157</span></a><span data-dcnode-id="9711" instrument_node="">] commented that the development of high technologies is a necessary but not sufficient factor to trigger the proliferation of FCVs in China, while the government incentives play a crucial role because they could shape policies and boundaries at which a car or energy company can operate. Ball et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="9709" href="#bib65" name="bbib65"><span data-dcnode-id="9710" instrument_node="">65</span></a><span data-dcnode-id="9708" instrument_node="">] discussed that establishing a strong framework for government intervention would help to reduce risks in the early transitional business cases, especially when it is coordinated by the government and supported by special legislation and funds.</span></p><p data-dcnode-id="9693" id="p0555"><span data-dcnode-id="9706" instrument_node="">All the above reports emphasized the importance of government policies in the transition to hydrogen economy, in this aspect, Chinese governments have put considerable efforts (seen in Section </span><a class="workspace-trigger" data-dcnode-id="9704" href="#sec4.1" name="bsec4.1"><span data-dcnode-id="9705" instrument_node="">Development of Hydrogen economy in China</span></a><span data-dcnode-id="9703" instrument_node="">). However, the overall development strategies on hydrogen economy, especially mandatory laws &amp; regulations, and promotion targets and schedules, need to be further specified [</span><a class="workspace-trigger" data-dcnode-id="9701" href="#bib137" name="bbib137"><span data-dcnode-id="9702" instrument_node="">137</span></a><span data-dcnode-id="9700" instrument_node="">]. For examples, an incentive policy for supporting the construction of fueling stations of hydrogen FCVs has been initially issued, but the originally planned financial support was cancelled in the follow-up policy. Furthermore, the formulation of norms and standards (see Section </span><a class="workspace-trigger" data-dcnode-id="9698" href="#sec4.2.2" name="bsec4.2.2"><span data-dcnode-id="9699" instrument_node="">Incomplete Standard and Specification</span></a><span data-dcnode-id="9697" instrument_node=""> for details), as well as the public education plan (see Section </span><a class="workspace-trigger" data-dcnode-id="9695" href="#sec4.2.5" name="bsec4.2.5"><span data-dcnode-id="9696" instrument_node="">Unclear Public Acceptance</span></a><span data-dcnode-id="9694" instrument_node=""> for details) are still incomplete.</span></p><p data-dcnode-id="9688" id="p0560"><span data-dcnode-id="9692" instrument_node="">In summary, an official hydrogen roadmap should be established by the Chinese governments to clarify the strategic position of hydrogen in the future energy structure, i.e. hydrogen will play an important role, but would be competitive and complementary with other energy carriers (electricity, biodiesel) instead of an exclusive energy source [</span><a class="workspace-trigger" data-dcnode-id="9690" href="#bib69" name="bbib69"><span data-dcnode-id="9691" instrument_node="">69</span></a><span data-dcnode-id="9689" instrument_node="">]. Secondly, the policies on the financial supports for R&amp;D of hydrogen production and storage technologies, financial subsidies for hydrogen station construction, and subsidy tax exemption for hydrogen FCVs should be formulated by the governments. Thirdly, the government should actively integrate the social stakeholders (industrial gas companies, automobile manufacturers and oil companies) with the hydrogen energy industry because the transition to hydrogen economy is a huge and systematic project, requiring the full cooperation of governments, enterprises, scientific research institutions and the public. Finally, the governments should make efforts to enhance the public awareness of hydrogen economy and fuel cells through publicity and education, and the removement of hydrogen from hazardous chemicals and identifying regulatory authorities could be the first step to enhance the public awareness.</span></p></section></section><section data-dcnode-id="9514" id="sec4.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9684" id="sectitle0120"><span data-dcnode-id="9685" instrument_node="">Hydrogen roadmap in Different Countries</span></h3><div data-dcnode-id="9566"><p data-dcnode-id="9670" id="p0565"><span data-dcnode-id="9683" instrument_node="">China has accelerated the development of hydrogen fuel cells and hydrogen infrastructure in recent years after recognizing the importance of hydrogen in the future energy system. In 2016, China National Institute of Standardization and China National Hydrogen Standardization Technical Committee issued the “Blue Book on China's Hydrogen Energy Industry Infrastructure Development (2016)”, “China White Paper on Hydrogen Energy and Fuel Cell Industry” was also issued by China Hydrogen Alliance in 2019. The main strategy towards hydrogen economy in China can be summarized in </span><a class="workspace-trigger" data-dcnode-id="9681" href="#tbl3" name="btbl3"><span data-dcnode-id="9682" instrument_node="">Table 3</span></a><span data-dcnode-id="9680" instrument_node="">. Similarly, other countries in the world includes America, Japan, European Union and Australia have also stepped up the development of hydrogen economy and put forward the corresponding hydrogen roadmap. For example, in 2003, the European Union formulated the “European Hydrogen Energy Roadmap” and released the vision and plan for hydrogen energy and hydrogen fuel cell technology development, and in 2019, the “Hydrogen Roadmap Europe: A sustainable pathway for the European energy transition” was also issued [</span><a class="workspace-trigger" data-dcnode-id="9678" href="#bib158" name="bbib158"><span data-dcnode-id="9679" instrument_node="">158</span></a><span data-dcnode-id="9677" instrument_node="">]. Japan published the white paper on hydrogen energy in 2014, subsequently, the “Basic Hydrogen Strategy” and “Hydrogen Utilization Schedule” were issued in 2017 and 2019, respectively [</span><a class="workspace-trigger" data-dcnode-id="9675" href="#bib131" name="bbib131"><span data-dcnode-id="9676" instrument_node="">131</span></a><span data-dcnode-id="9674" instrument_node="">]. At the same time, Japan is the first country to propose the concept of “hydrogen-based society”. In 2019, Australia issued the “Nation Hydrogen Roadmap: Pathway to an economically sustainable hydrogen industry Australia” [</span><a class="workspace-trigger" data-dcnode-id="9672" href="#bib142" name="bbib142"><span data-dcnode-id="9673" instrument_node="">142</span></a><span data-dcnode-id="9671" instrument_node="">].</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="9567" id="tbl3"><span class="captions" data-dcnode-id="9662"><span data-dcnode-id="9663" id="cap0065"><p data-dcnode-id="9664" id="tspara0020"><span class="label" data-dcnode-id="9668"><span data-dcnode-id="9669" instrument_node="">Table 3</span></span><span data-dcnode-id="9667" instrument_node="">. </span><span data-dcnode-id="9665" instrument_node="">Main strategy of China towards hydrogen economy.</span></p></span></span><div class="groups" data-dcnode-id="9568"><table data-dcnode-id="9569"><thead data-dcnode-id="9652"><tr class="rowsep-1 valign-top" data-dcnode-id="9653"><th data-dcnode-id="9660" scope="col"><span data-dcnode-id="9661" instrument_node="">Time</span></th><th data-dcnode-id="9658" scope="col"><span data-dcnode-id="9659" instrument_node="">Near-Term</span></th><th data-dcnode-id="9656" scope="col"><span data-dcnode-id="9657" instrument_node="">Mid-Term</span></th><th data-dcnode-id="9654" scope="col"><span data-dcnode-id="9655" instrument_node="">Long-Term</span></th></tr></thead><tbody data-dcnode-id="9570"><tr class="valign-top" data-dcnode-id="9633"><td data-dcnode-id="9650"><span data-dcnode-id="9651" instrument_node="">Hydrogen Production</span></td><td data-dcnode-id="9646"><span data-dcnode-id="9649" instrument_node="">Hydrogen recovery from industrial by-products;</span><br data-dcnode-id="9648"><span data-dcnode-id="9647" instrument_node="">Hydrogen production from renewable energy/Biomass (Demonstration)</span></td><td data-dcnode-id="9640"><span data-dcnode-id="9645" instrument_node="">Coal-based hydrogen production;</span><br data-dcnode-id="9644"><span data-dcnode-id="9643" instrument_node="">Hydrogen production from renewable energy (Promotion);</span><br data-dcnode-id="9642"><span data-dcnode-id="9641" instrument_node="">Hydrogen recovery from industrial by-products (Supplement)</span></td><td data-dcnode-id="9634"><span data-dcnode-id="9639" instrument_node="">Hydrogen production from renewable energy</span><br data-dcnode-id="9638"><span data-dcnode-id="9637" instrument_node="">Coal-based hydrogen production&nbsp;+&nbsp;CCS</span><br data-dcnode-id="9636"><span data-dcnode-id="9635" instrument_node="">Biomass Hydrogen/Photo-electrolysis (Supplement)</span></td></tr><tr class="valign-top" data-dcnode-id="9618"><td data-dcnode-id="9631"><span data-dcnode-id="9632" instrument_node="">Hydrogen Storage and Transportation</span></td><td data-dcnode-id="9627"><span data-dcnode-id="9630" instrument_node="">Gas storage (35&nbsp;MPa)/Trailer, liquid hydrogen tank (20&nbsp;MPa) transport;</span><br data-dcnode-id="9629"><span data-dcnode-id="9628" instrument_node="">Gas storage (70&nbsp;MPa Demonstration)/Pipeline transportation (Demonstration)</span></td><td data-dcnode-id="9623"><span data-dcnode-id="9626" instrument_node="">Gas storage (70&nbsp;MPa)</span><br data-dcnode-id="9625"><span data-dcnode-id="9624" instrument_node="">Liquid and another storage/Pipeline</span></td><td data-dcnode-id="9619"><span data-dcnode-id="9622" instrument_node="">Long distance pipeline;</span><br data-dcnode-id="9621"><span data-dcnode-id="9620" instrument_node="">Safe and reliable hydrogen energy storage and transportation system</span></td></tr><tr class="valign-top" data-dcnode-id="9603"><td data-dcnode-id="9616"><span data-dcnode-id="9617" instrument_node="">Hydrogen End-uses</span></td><td data-dcnode-id="9612"><span data-dcnode-id="9615" instrument_node="">FCVs (Demonstration)</span><br data-dcnode-id="9614"><span data-dcnode-id="9613" instrument_node="">Stationary power generation</span></td><td data-dcnode-id="9608"><span data-dcnode-id="9611" instrument_node="">FCVs (Promotion)</span><br data-dcnode-id="9610"><span data-dcnode-id="9609" instrument_node="">Stationary power generation</span></td><td data-dcnode-id="9604"><span data-dcnode-id="9607" instrument_node="">FCVs</span><br data-dcnode-id="9606"><span data-dcnode-id="9605" instrument_node="">Stationary power generation</span></td></tr><tr class="valign-top" data-dcnode-id="9586"><td data-dcnode-id="9601"><span data-dcnode-id="9602" instrument_node="">Infrastructure</span></td><td data-dcnode-id="9597"><span data-dcnode-id="9600" instrument_node="">FCVs: 50,000;</span><br data-dcnode-id="9599"><span data-dcnode-id="9598" instrument_node="">Hydrogen fueling stations: 200</span></td><td data-dcnode-id="9591"><span data-dcnode-id="9596" instrument_node="">FCVs: 130 million;</span><br data-dcnode-id="9595"><span data-dcnode-id="9594" instrument_node="">Hydrogen fueling stations: 1500</span><br data-dcnode-id="9593"><span data-dcnode-id="9592" instrument_node="">Pipeline: 3000&nbsp;km</span></td><td data-dcnode-id="9587"><span data-dcnode-id="9590" instrument_node="">FCVs: 500 million;</span><br data-dcnode-id="9589"><span data-dcnode-id="9588" instrument_node="">H
