</span><meta content="The petroleum industry plays an essential role in driving China’s economic development. In the past few decades, several reforms in the petroleum industry have been implemented; however, there are still some issues that have not been resolved. Moreover, with the new-normal economy, the&amp;nbsp;transition to green energy and international trade disputes, the petroleum market is also facing emerging challenges. Therefore, the purpose of the present study is to review the historical development of China’s petroleum market, identify the current challenges and propose corresponding countermeasures for future prospects. As a conclusion, five main challenges are highlighted totally, namely lack of marketization, excess oil refining capacity, high external dependency, environment pollution and unstable international trading relationship. To address these challenges, it&amp;nbsp;is encouraged to deepen petroleum&amp;nbsp;market reform, accelerate the elimination of inefficient refining capacity, diversify oil supply sources, as well as improve domestic petroleum enterprises’ ability to resist price risks." data-dcnode-id="3832" name="dc.description"><span data-dcnode-id="3831" instrument_node="">

</span><meta content="Review on the petroleum market in China: history, challenges and prospects - Petroleum Science" data-dcnode-id="3588" property="og:title"><span data-dcnode-id="3587" instrument_node="">
</span><meta content="The petroleum industry plays an essential role in driving China’s economic development. In the past few decades, several reforms in the petroleum industry have been implemented; however, there are still some issues that have not been resolved. Moreover, with the new-normal economy, the transition to green energy and international trade disputes, the petroleum market is also facing emerging challenges. Therefore, the purpose of the present study is to review the historical development of China’s petroleum market, identify the current challenges and propose corresponding countermeasures for future prospects. As a conclusion, five main challenges are highlighted totally, namely lack of marketization, excess oil refining capacity, high external dependency, environment pollution and unstable international trading relationship. To address these challenges, it is encouraged to deepen petroleum market reform, accelerate the elimination of inefficient refining capacity, diversify oil supply sources, as well as improve domestic petroleum enterprises’ ability to resist price risks." data-dcnode-id="3586" property="og:description"><span data-dcnode-id="3585" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="3114" data-gtm-vis-first-on-screen-50443292_562="1564" data-gtm-vis-first-on-screen-50443292_563="1565" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1564" data-gtm-vis-recent-on-screen-50443292_563="1565" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="3115" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3119" id="Abs1"><span data-dcnode-id="3120" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="3116" id="Abs1-content"><p data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">The petroleum industry plays an essential role in driving China’s economic development. In the past few decades, several reforms in the petroleum industry have been implemented; however, there are still some issues that have not been resolved. Moreover, with the new-normal economy, the&nbsp;transition to green energy and international trade disputes, the petroleum market is also facing emerging challenges. Therefore, the purpose of the present study is to review the historical development of China’s petroleum market, identify the current challenges and propose corresponding countermeasures for future prospects. As a conclusion, five main challenges are highlighted totally, namely lack of marketization, excess oil refining capacity, high external dependency, environment pollution and unstable international trading relationship. To address these challenges, it&nbsp;is encouraged to deepen petroleum&nbsp;market reform, accelerate the elimination of inefficient refining capacity, diversify oil supply sources, as well as improve domestic petroleum enterprises’ ability to resist price risks.</span></p></div></div></section><span data-dcnode-id="3113" instrument_node="">
</span><section data-dcnode-id="2975" data-gtm-vis-first-on-screen-50443292_562="1564" data-gtm-vis-first-on-screen-50443292_563="1565" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1564" data-gtm-vis-recent-on-screen-50443292_563="1565" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2976" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3111" id="Sec1"><span data-dcnode-id="3112" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2977" id="Sec1-content"><p data-dcnode-id="3094"><span data-dcnode-id="3110" instrument_node="">Since the 1990s, the growth of Chinese oil consumption has accelerated dramatically due to the rapid growth of the domestic economy (Leung </span><a aria-label="Reference 2010" data-dcnode-id="3108" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d269103676e382" title="Leung GC-K. China’s oil use, 1990–2008. Energy Policy. 2010;38:932–44. 
https://doi.org/10.1016/j.enpol.2009.10.045

."><span data-dcnode-id="3109" instrument_node="">2010</span></a><span data-dcnode-id="3107" instrument_node="">). A stable supply of petroleum resources is currently essential to improve China’s socio-economic development, as petroleum products are almost used in every sector (Tang et al. </span><a aria-label="Reference 2011" data-dcnode-id="3105" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d269103676e385" title="Tang X, Zhang BS, Feng LY, Marwan M, Afshin H. Economic impacts and challenges of China’s petroleum industry: an input–output analysis. Energy. 2011;36:2905–11. 
https://doi.org/10.1016/j.energy.2011.02.033

."><span data-dcnode-id="3106" instrument_node="">2011</span></a><span data-dcnode-id="3104" instrument_node="">). By the end of 2018, China’s oil consumption was up to 877.0 million tonnes of standard coal and growing at a rate of 4.0% p.a., accounting for 18.9% of total primary energy consumption, second only to coal, as shown in Fig.&nbsp;</span><a data-dcnode-id="3102" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3103" instrument_node="">1</span></a><span data-dcnode-id="3101" instrument_node="">. Moreover, petroleum products consumption reached 356.9 million tonnes in 2017, as shown in Fig.&nbsp;</span><a data-dcnode-id="3099" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3100" instrument_node="">2</span></a><span data-dcnode-id="3098" instrument_node="">. The&nbsp;Chinese petroleum industry is predicted to grow steadily in the coming decades, continuing to account for a stable share of around 20% of the total primary energy mix (Yang et al. </span><a aria-label="Reference 2016" data-dcnode-id="3096" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d269103676e394" title="Yang X, Wan H, Zhang Q, et al. A scenario analysis of oil and gas consumption in China to 2030 considering the peak CO2 emission constraint. Pet Sci. 2016;13:370–83. 
https://doi.org/10.1007/s12182-016-0089-2

."><span data-dcnode-id="3097" instrument_node="">2016</span></a><span data-dcnode-id="3095" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3066" data-gtm-vis-first-on-screen-50443292_561="1564" data-gtm-vis-has-fired-50443292_561="1" data-gtm-vis-recent-on-screen-50443292_561="1564" data-gtm-vis-total-visible-time-50443292_561="10000" data-test="figure" data-title="Fig.&nbsp;1" id="figure-1"><figure data-dcnode-id="3067"><figcaption data-dcnode-id="3091"><b class="c-article-section__figure-caption" data-dcnode-id="3092" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="3093" instrument_node="">Fig.&nbsp;1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3078"><div class="c-article-section__figure-item" data-dcnode-id="3082"><a class="c-article-section__figure-link" data-dcnode-id="3087" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/1" rel="nofollow"><picture data-dcnode-id="3088"><source data-dcnode-id="3090" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12182-020-00501-6/MediaObjects/12182_2020_501_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="3089" height="429" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12182-020-00501-6/MediaObjects/12182_2020_501_Fig1_HTML.png&amp;raw" width="685"></picture></a><p class="c-article-section__figure-credit text-right c-article-section__figure-credit-right" data-dcnode-id="3083" data-test="figure-credit"><i data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">Source</span>< </span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3046" fill-rule="evenodd"></path><span data-dcnode-id="3045" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3024"><span data-dcnode-id="3037" instrument_node="">However, a number of factors are impeding the&nbsp;further development of China’s petroleum industry. For example, most of the petroleum market is controlled by the three major state-owned oil companies, resulting in a lack of competitiveness and flexibility in the market. Moreover, regulated prices of petroleum products cannot accurately reflect their intrinsic value, causing an imbalance between oil supply and demand. In order to further release the&nbsp;domestic petroleum market, the Chinese government has introduced a series of policies, including the </span><i data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">Regulatory Approach on Oil and Gas Pipeline Facilities Fair and Open</span></i><span data-dcnode-id="3034" instrument_node=""> issued by China’s National Energy Administration (NEA) in 2019 (NEA </span><a aria-label="Reference 2019" data-dcnode-id="3032" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d269103676e454" title="NEA (National Energy Administration), China. Regulatory approach on oil and gas pipeline facilities fair and open. 
http://zjb.nea.gov.cn/Article/UploadFiles/201906/2019060316571130.pdf

. Accessed May 2019."><span data-dcnode-id="3033" instrument_node="">2019</span></a><span data-dcnode-id="3031" instrument_node="">). This provision allows third-party market entities to use pipe network facilities, which is crucial for breaking the natural monopoly in the midstream of the petroleum industry. In terms of the pricing mechanism, the State Council promulgated </span><i data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">Opinions on Promoting the Reform of the Price Mechanism</span></i><span data-dcnode-id="3028" instrument_node=""> in 2015 to deregulate the prices of petroleum products (the State Council </span><a aria-label="Reference 2015" data-dcnode-id="3026" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d269103676e460" title="The State Council, China. Several opinions on promoting the reform of the price mechanism. 
http://www.gov.cn/xinwen/2015-10/15/content_2947548.htm

. Accessed 15 Oct 2015."><span data-dcnode-id="3027" instrument_node="">2015</span></a><span data-dcnode-id="3025" instrument_node="">). Despite the introduction of these policies and regulations, some critical issues remain unsolved, such as low marketization level and high external dependency. Furthermore, with China’s economy moving into the “new normal” phase, the promotion of green energy transition strategy and the outbreak of world trade disputes, the petroleum industry is facing new problems and challenges.</span></p><p data-dcnode-id="2992"><span data-dcnode-id="3023" instrument_node="">Several existing studies have analyzed the impacts and challenges of China’s petroleum market reform through quantitative or qualitative methods. For example, the effects of petroleum products pricing reform on the Chinese stock market were examined (Bouri et al. </span><a aria-label="Reference 2017" data-dcnode-id="3021" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d269103676e466" title="Bouri E, Chen Q, Lien D, et al. Causality between oil prices and the stock market in China: the relevance of the reformed oil product pricing mechanism. Int Rev Econ Finance. 2017;48:34–48. 
https://doi.org/10.1016/j.iref.2016.11.004

."><span data-dcnode-id="3022" instrument_node="">2017</span></a><span data-dcnode-id="3020" instrument_node="">; Wen et al. </span><a aria-label="Reference 2018" data-dcnode-id="3018" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d269103676e469" title="Wen XQ, Bouri E, Roubaud D. Does oil product pricing reform increase returns and uncertainty in the Chinese stock market? Q Rev Econ Finance. 2018;68:23–30. 
https://doi.org/10.1016/j.qref.2017.08.003

."><span data-dcnode-id="3019" instrument_node="">2018</span></a><span data-dcnode-id="3017" instrument_node="">), along with its influences on the passenger transportation (Lin and Liu </span><a aria-label="Reference 2013" data-dcnode-id="3015" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d269103676e472" title="Lin BQ, Liu X. Reform of refined oil product pricing mechanism and energy rebound effect for passenger transportation in China. Energy Policy. 2013;57:329–37. 
https://doi.org/10.1016/j.enpol.2013.02.002

."><span data-dcnode-id="3016" instrument_node="">2013</span></a><span data-dcnode-id="3014" instrument_node="">). Similarly, the impacts of upstream market reform on pipeline deployment were also explored (Li et al. </span><a aria-label="Reference 2018" data-dcnode-id="3012" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d269103676e475" title="Li Y, Wang G, Mclellan B, Chen SY, Zhang Q. Study of the impacts of upstream natural gas market reform in China on infrastructure deployment and social welfare using an SVM-based rolling horizon stochastic game analysis. Pet Sci. 2018;15:898–911. 
https://doi.org/10.1007/s12182-018-0238-x

."><span data-dcnode-id="3013" instrument_node="">2018</span></a><span data-dcnode-id="3011" instrument_node="">). With the release of crude oil imports, a dynamic game-theoretic model was established to seek the optimal oil import/export quotas for non-state-owned refineries (Chen et al. </span><a aria-label="Reference 2017" data-dcnode-id="3009" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d269103676e478" title="Chen SY, Li MT, Zhang Q, et al. Study on the oil import/export quota allocation mechanism in China by using a dynamic game-theoretic model. Energy Procedia. 2017;105:3856–61. 
https://doi.org/10.1016/j.egypro.2017.03.788

."><span data-dcnode-id="3010" instrument_node="">2017</span></a><span data-dcnode-id="3008" instrument_node="">). Moreover, the potential for energy saving of China’s petroleum industry has been estimated from a technical perspective (Liu et al. </span><a aria-label="Reference 2013" data-dcnode-id="3006" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d269103676e482" title="Liu XY, Chen DJ, Zhang WJ, et al. An assessment of the energy-saving potential in China’s petroleum refining industry from a technical perspective. Energy. 2013;59:38–49. 
https://doi.org/10.1016/j.energy.2013.07.049

."><span data-dcnode-id="3007" instrument_node="">2013</span></a><span data-dcnode-id="3005" instrument_node="">), while the risks of China’s oil security and corresponding mitigation measures have been analyzed from the perspective of the supply chain (Zhao and Chen </span><a aria-label="Reference 2014" data-dcnode-id="3003" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d269103676e485" title="Zhao C, Chen B. China’s oil security from the supply chain perspective: a review. Appl Energy. 2014;136:269–79. 
https://doi.org/10.1016/j.apenergy.2014.09.016

."><span data-dcnode-id="3004" instrument_node="">2014</span></a><span data-dcnode-id="3002" instrument_node="">; Sun et al. </span><a aria-label="Reference 2017a" data-dcnode-id="3000" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d269103676e488" title="Sun CW, Luo Y, Huang Y, et al. A comparative study on the production efficiencies of China’s oil companies: a true fixed effect model considering the unobserved heterogeneity. J Clean Prod. 2017a;154:341–52. 
https://doi.org/10.1016/j.jclepro.2017.03.222

."><span data-dcnode-id="3001" instrument_node="">2017a</span></a><span data-dcnode-id="2999" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="2997" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d269103676e491" title="Sun XL, Liu C, Chen XW, Li JP. Modeling systemic risk of crude oil imports: case of China’s global oil supply chain. Energy. 2017b;121:449–65. 
https://doi.org/10.1016/j.energy.2017.01.018

."><span data-dcnode-id="2998" instrument_node="">b</span></a><span data-dcnode-id="2996" instrument_node="">; Xie et al. </span><a aria-label="Reference 2017" data-dcnode-id="2994" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d269103676e494" title="Xie N, Yan ZJ, Zhou Y, Huang WI. China’s optimal stockpiling policies in the context of new oil price trend. Energy Policy. 2017;105:332–40. 
https://doi.org/10.1016/j.enpol.2017.03.008

."><span data-dcnode-id="2995" instrument_node="">2017</span></a><span data-dcnode-id="2993" instrument_node="">). However, few studies have comprehensively summarized the emerging challenges and prospects faced by China’s petroleum market.</span></p><p data-dcnode-id="2978"><span data-dcnode-id="2991" instrument_node="">In order to fill the gap in the previous literature, the present study provides an overview of the historical development and challenges facing China’s petroleum industry, followed by the proposal of corresponding countermeasures and prospects. The structure of the remainder of this paper is as follows: Sect.&nbsp;</span><a data-dcnode-id="2989" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="2990" instrument_node="">2</span></a><span data-dcnode-id="2988" instrument_node=""> summarizes the&nbsp;historical development of China’s oil markets from four aspects of its administration, industrial and market structures, oil imports and pricing mechanism; Sect.&nbsp;</span><a data-dcnode-id="2986" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec7"><span data-dcnode-id="2987" instrument_node="">3</span></a><span data-dcnode-id="2985" instrument_node=""> discusses the main challenges faced by China’s petroleum industry; corresponding countermeasures are then given in Sect.&nbsp;</span><a data-dcnode-id="2983" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec16"><span data-dcnode-id="2984" instrument_node="">4</span></a><span data-dcnode-id="2982" instrument_node="">, followed by the conclusions in Sect.&nbsp;</span><a data-dcnode-id="2980" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec23"><span data-dcnode-id="2981" instrument_node="">5</span></a><span data-dcnode-id="2979" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="2658" data-gtm-vis-first-on-screen-50443292_562="1564" data-gtm-vis-first-on-screen-50443292_563="1565" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1564" data-gtm-vis-recent-on-screen-50443292_563="1565" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Historical development of China’s petroleum market"><div class="c-article-section" data-dcnode-id="2659" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2973" id="Sec2"><span data-dcnode-id="2974" instrument_node="">Historical development of China’s petroleum market</span></h2><div class="c-article-section__content" data-dcnode-id="2660" id="Sec2-content"><p data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">The historical development of China’s petroleum market is examined from the following four perspectives: (i) administration; (ii) industrial and market structures; (iii) oil imports; and (iv) pricing mechanism. This section describes the evolution of the petroleum market by reviewing relevant policies.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2969" id="Sec3"><span data-dcnode-id="2970" instrument_node="">Administration</span></h3><p data-dcnode-id="2961"><span data-dcnode-id="2968" instrument_node="">The administration of the petroleum industry has undergone several changes since China’s reform and opening up. As shown in Fig.&nbsp;</span><a data-dcnode-id="2966" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2967" instrument_node="">3</span></a><span data-dcnode-id="2965" instrument_node="">, the National Energy Commission was established in 1980 to exercise comprehensive management over the petroleum, coal and power industries. Two years later, such integration was abolished, and the Ministry of Petroleum Industry was established. In 1988, the State Council carried out an institutional restructure and established the Ministry of Energy as the competent authority for the petroleum industry. In 1998, the Bureau of Petroleum and Chemical Industry was formed under the State Economic and Trade Commission to replace the Ministry of Energy, while the Bureau was removed in 2001. In 2003, the Energy Bureau was founded, the predecessor of the NEA. In 2008, the National Development and Reform Commission (NDRC) set up the NEA. In 2010, the State Council established the National Energy Commission in charge of strategic decisions and the&nbsp;overall coordination of the energy sector (Sheng and Qian </span><a aria-label="Reference 2015" data-dcnode-id="2963" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d269103676e530" title="Sheng H, Qian P. Opening up China’s markets of crude oil and petroleum products: theoretical research and reform solutions, vol. 9. Beijing: Social Science Academic Press, Series on Chinese Economics Research; 2015."><span data-dcnode-id="2964" instrument_node="">2015</span></a><span data-dcnode-id="2962" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2937" data-gtm-vis-first-on-screen-50443292_561="1564" data-gtm-vis-has-fired-50443292_561="1" data-gtm-vis-recent-on-screen-50443292_561="1564" data-gtm-vis-total-visible-time-50443292_561="10000" data-test="figure" data-title="Fig.&nbsp;3" id="figure-3"><figure data-dcnode-id="2938"><figcaption data-dcnode-id="2958"><b class="c-article-section__figure-caption" data-dcnode-id="2959" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="2960" instrument_node="">Fig.&nbsp;3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2949"><div class="c-article-section__figure-item" data-dcnode-id="2953"><a class="c-article-section__figure-link" data-dcnode-id="2954" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/3" rel="nofollow"><picture data-dcnode-id="2955"><source data-dcnode-id="2957" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12182-020-00501-6/MediaObjects/12182_2020_501_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="2956" height="124" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12182-020-00501-6/MediaObjects/12182_2020_501_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2950" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">Changes in administration of the petroleum industry</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2939"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="2940" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/3" rel="nofollow"><span data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2941" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2942" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2943" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2946" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2945" fill-rule="evenodd"></path><span data-dcnode-id="2944" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2932"><span data-dcnode-id="2936" instrument_node="">The changes in the administration of the petroleum industry show an alternation of stand-along and integrated management over the petroleum industry. The administration of Chinese petroleum enterprises has also experienced big changes in the&nbsp;past decade. As shown in Fig.&nbsp;</span><a data-dcnode-id="2934" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="2935" instrument_node="">4</span></a><span data-dcnode-id="2933" instrument_node="">, employee numbers of CNPC have decreased to 460.7 thousand by 2019, with an annual average rate of − 2.1%. Different from CNPC, SINOPEC had a turning point in 2016, with a significant increase of 100.6 thousand in employee numbers. Note that 97% of new employees were engaged in marketing and distribution, as a result of SINOPEC’s market expansion in the downstream.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2904" data-gtm-vis-first-on-screen-50443292_561="1564" data-gtm-vis-has-fired-50443292_561="1" data-gtm-vis-recent-on-screen-50443292_561="1564" data-gtm-vis-total-visible-time-50443292_561="10000" data-test="figure" data-title="Fig.&nbsp;4" id="figure-4"><figure data-dcnode-id="2905"><figcaption data-dcnode-id="2929"><b class="c-article-section__figure-caption" data-dcnode-id="2930" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="2931" instrument_node="">Fig.&nbsp;4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2916"><div class="c-article-section__figure-item" data-dcnode-id="2920"><a class="c-article-section__figure-link" data-dcnode-id="2925" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/4" rel="nofollow"><picture data-dcnode-id="2926"><source data-dcnode-id="2928" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12182-020-00501-6/MediaObjects/12182_2020_501_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="2927" height="418" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12182-020-00501-6/MediaObjects/12182_2020_501_Fig4_HTML.png&amp;raw" width="685"></picture></a><p class="c-article-section__figure-credit text-right c-article-section__figure-credit-right" data-dcnode-id="2921" data-test="figure-credit"><i data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">Sources</span></i><span data-dcnode-id="2922" instrument_node="">: Annual reports of CNPC and SINOPEC</span></p></div><div class="c-article-section__figure-description" data-dcnode-id="2917" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">Employee numbers in CNPC and SINOPEC.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2906"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="2907" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/4" rel="nofollow"><span data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2908" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2909" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2910" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2913" instrument_node="">

</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2902" id="Sec4"><span data-dcnode-id="2903" instrument_node="">Industrial and market structures</span></h3><p data-dcnode-id="2897"><span data-dcnode-id="2901" instrument_node="">China’s economic system was a thoroughly planned economy before 1978. Under this system, China’s petroleum market was characterized by low efficiency, leading to a decline in oil production and heavy losses suffered by petroleum enterprises (Sheng and Qian </span><a aria-label="Reference 2015" data-dcnode-id="2899" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d269103676e589" title="Sheng H, Qian P. Opening up China’s markets of crude oil and petroleum products: theoretical research and reform solutions, vol. 9. Beijing: Social Science Academic Press, Series on Chinese Economics Research; 2015."><span data-dcnode-id="2900" instrument_node="">2015</span></a><span data-dcnode-id="2898" instrument_node="">). To improve this situation, the government has implemented several reforms since 1978, eventually creating the current industrial pattern mainly comprised of three state-owned enterprises.</span></p><p data-dcnode-id="2880"><span data-dcnode-id="2896" instrument_node="">As shown in Fig.&nbsp;</span><a data-dcnode-id="2894" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="2895" instrument_node="">5</span></a><span data-dcnode-id="2893" instrument_node="">, the Chinese government has issued a series of policies to reform the organization and structure of the petroleum industry and markets since 1978. As a result, China’s petroleum industry structure went through several changes, as shown in Fig.&nbsp;</span><a data-dcnode-id="2891" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="2892" instrument_node="">6</span></a><span data-dcnode-id="2890" instrument_node="">. From 1982 to 1998, the state successively established China National Offshore Oil Corporation (CNOOC), China Petrochemical Corporation (SINOPEC), and China Petroleum and Gas Corporation (CNPC). These three enterprises were responsible for different businesses: CNPC was in charge of the exploration of onshore oil; SINOPEC was accountable for oil refining and pipeline construction, while CNOOC was engaged in the exploitation of offshore oil. In 1998, China’s petroleum industry was restructured, and these three petroleum enterprises were all changed to vertically integrated companies. What remains constant is that CNOOC is still mainly engaged in offshore oil production and investment, while CNPC and SINOPEC are onshore oil production companies (Zhang </span><a aria-label="Reference 2004" data-dcnode-id="2888" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d269103676e601" title="Zhang J. Catch-up and competitiveness in China—the case of large firms in the oil industry. London: RoutledgeCurzon; 2004."><span data-dcnode-id="2889" instrument_node="">2004</span></a><span data-dcnode-id="2887" instrument_node="">). Moreover, in order to raise funds from overseas capital markets, the listed entities of PetroChina Ltd, Sinopec Ltd and CNOOC Ltd were created, which are majority-owned by the wholly state-owned enterprises CNPC, SINOPEC and CNOOC, respectively (Andrews-Speed and Cao </span><a aria-label="Reference 2005" data-dcnode-id="2885" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d269103676e604" title="Andrews-Speed P, Cao Z. Prospects for privatization in China’s energy sector. In: Green S, Liu GS, editors. Exit the dragon? Privatization and state ownership in China. London: Royal Institute for International Affairs; 2005. p. 196–213."><span data-dcnode-id="2886" instrument_node="">2005</span></a><span data-dcnode-id="2884" instrument_node="">; Kong </span><a aria-label="Reference 2010" data-dcnode-id="2882" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d269103676e607" title="Kong B. China’s international petroleum policy. Westport: Praeger Security International. Greenwood Publishing Group; 2010."><span data-dcnode-id="2883" instrument_node="">2010</span></a><span data-dcnode-id="2881" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2856" data-test="figure" data-title="Fig.&nbsp;5" id="figure-5"><figure data-dcnode-id="2857"><figcaption data-dcnode-id="2877"><b class="c-article-section__figure-caption" data-dcnode-id="2878" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="2879" instrument_node="">Fig.&nbsp;5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2868"><div class="c-article-section__figure-item" data-dcnode-id="2872"><a class="c-article-section__figure-link" data-dcnode-id="2873" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/5" rel="nofollow"><picture data-dcnode-id="2874"><source data-dcnode-id="2876" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12182-020-00501-6/MediaObjects/12182_2020_501_Fig5_HTML.png?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="2875" height="577" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12182-020-00501-6/MediaObjects/12182_2020_501_Fig5_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2869" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">The history of the petroleum industrial and market reforms</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2858"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="2859" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/5" rel="nofollow"><span data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2860" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2861" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2862" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2865" instrument_node="">

269103676e644" title="Sheng H, Qian P. Opening up China’s markets of crude oil and petroleum products: theoretical research and reform solutions, vol. 9. Beijing: Social Science Academic Press, Series on Chinese Economics Research; 2015."><span data-dcnode-id="2845" instrument_node="">2015</span></a><span data-dcnode-id="2843" instrument_node="">)</span></p></div><div class="c-article-section__figure-description" data-dcnode-id="2838" data-test="bottom-caption" id="figure-6-desc"><p data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">Historical development of China’s petroleum industry structure (Since 1978).</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2827"><a aria-label="Full size image figure 6" class="c-article__pill-button" data-dcnode-id="2828" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure6 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/6" rel="nofollow"><span data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2829" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2830" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2831" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2834" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2833" fill-rule="evenodd"></path><span data-dcnode-id="2832" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2817"><span data-dcnode-id="2824" instrument_node="">To enhance the administrative monopoly status of CNPC and SINOPEC, supportive policies were introduced. In 1999, the State Council enacted the </span><i data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">Suggestions on Clearing and Rectifying Small Refinery Plants and Regulating the Circulation Order of Crude Oil and Petroleum Products</span></i><span data-dcnode-id="2821" instrument_node="">, which required CNPC and SINOPEC to purchase non-state-owned refineries with the annual capacity of more than 1 million tonnes. Two years later, the State Council approved CNPC and SINOPEC had the exclusive right to sell petroleum products. In 2003, the Ministry of Railways issued the </span><i data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">Notice on Strengthening the Management of Oil transportation (Tie Yun Hao No. 150 Decree)</span></i><span data-dcnode-id="2818" instrument_node="">, clearly stipulating that the railway can only transport petroleum products of CNPC and SINOPEC. Subsequently, NDRC ruled that only CNPC and SINOPEC had the right to supply ethanol gasoline for vehicles.</span></p><p data-dcnode-id="2806"><span data-dcnode-id="2816" instrument_node="">With the deepening of market-oriented reform of China’s petroleum industry, the competition in the downstream is becoming increasingly fierce. In 2006, the Ministry of Commerce promulgated the </span><i data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Measures for Management of Petroleum Products Market</span></i><span data-dcnode-id="2813" instrument_node=""> to open the wholesale and retail rights of petroleum products to foreign enterprises, which came into effect from January 1, 2007. Since then, the market share of foreign enterprises has been increasing. However, such an&nbsp;increase has not broken the dominance of those three state-owned enterprises. To further promote the marketization of the petroleum industry, the State Council published </span><i data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">Several Opinions on Deepening the Reform of the Oil and Gas System</span></i><span data-dcnode-id="2810" instrument_node=""> in May 2017, which declared the intention to fully open up the petroleum industry. As shown in Fig.&nbsp;</span><a data-dcnode-id="2808" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="2809" instrument_node="">7</span></a><span data-dcnode-id="2807" instrument_node="">, non-state-owned gasoline stations accounted for 45.4% by the end of 2018, and foreign enterprise will play a greater role in the retail market of petroleum products.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2778" data-test="figure" data-title="Fig.&nbsp;7" id="figure-7"><figure data-dcnode-id="2779"><figcaption data-dcnode-id="2803"><b class="c-article-section__figure-caption" data-dcnode-id="2804" data-test="figure-caption-text" id="Fig7"><span data-dcnode-id="2805" instrument_node="">Fig.&nbsp;7</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2790"><div class="c-article-section__figure-item" data-dcnode-id="2794"><a class="c-article-section__figure-link" data-dcnode-id="2799" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/7" rel="nofollow"><picture data-dcnode-id="2800"><source data-dcnode-id="2802" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12182-020-00501-6/MediaObjects/12182_2020_501_Fig7_HTML.png?as=webp" type="image/webp"><img alt="figure 7" aria-describedby="Fig7" data-dcnode-id="2801" height="680" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12182-020-00501-6/MediaObjects/12182_2020_501_Fig7_HTML.png&amp;raw" width="685"></picture></a><p class="c-article-section__figure-credit text-right c-article-section__figure-credit-right" data-dcnode-id="2795" data-test="figure-credit"><i data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">Source</span></i><span data-dcnode-id="2796" instrument_node="">: Annual report 2018 of CNPC and SINOPEC; Qianzhan Industry Research Institute</span></p></div><div class="c-article-section__figure-description" data-dcnode-id="2791" data-test="bottom-caption" id="figure-7-desc"><p data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">Market structure of China’s gasoline stations in 2018.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2780"><a aria-label="Full size image figure 7" class="c-article__pill-button" data-dcnode-id="2781" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure7 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/7" rel="nofollow"><span data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2782" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2783" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2784" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2787" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2786" fill-rule="evenodd"></path><span data-dcnode-id="2785" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2776" id="Sec5"><span data-dcnode-id="2777" instrument_node="">Oil imports</span></h3><p data-dcnode-id="2765"><span data-dcnode-id="2775" instrument_node="">China imposed strict controls on oil imports to help maintain order in the domestic market. Under the system, China National Chemical Import and Export Corporation was the only company that had the exclusive right to import and allocate crude oil. As shown in Fig.&nbsp;</span><a data-dcnode-id="2773" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig8"><span data-dcnode-id="2774" instrument_node="">8</span></a><span data-dcnode-id="2772" instrument_node="">, with the increase in imported oil, the Chinese government released administrative policies to decentralize the import rights. In 1994, the State Council and the Ministry of Foreign Trade and Economic Cooperation (MOFTEC) carried out an approved operation administration of crude oil and petroleum products imports. In 1999, MOFTEC issued the </span><i data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">Circular on Issuing the Measures for Organizing the Implementation of the Import of Crude Oil and Finished Oil</span></i><span data-dcnode-id="2769" instrument_node="">. In this regulation, four import agent enterprises engaged in the general trade of crude oil and petroleum products were proposed, namely China Chemicals Import and Export Corporation, China International Petroleum Chemicals Allied Corporation, China Petroleum Allied Corporation and Zhuhai Zhen Rong Company (MOFTEC </span><a aria-label="Reference 1999" data-dcnode-id="2767" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d269103676e716" title="Ministry of Foreign Trade and Economic Cooperation (MOFTEC), China. Circular on Issuing the Measures for Organizing the Implementation of the Import of Crude Oil and Finished Oil. 
http://project.mofcom.gov.cn/1800000121_23_68609_0_7.html

. Accessed 13 Feb 1999."><span data-dcnode-id="2768" instrument_node="">1999</span></a><span data-dcnode-id="2766" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2741" data-test="figure" data-title="Fig.&nbsp;8" id="figure-8"><figure data-dcnode-id="2742"><figcaption data-dcnode-id="2762"><b class="c-article-section__figure-caption" data-dcnode-id="2763" data-test="figure-caption-text" id="Fig8"><span data-dcnode-id="2764" instrument_node="">Fig.&nbsp;8</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2753"><div class="c-article-section__figure-item" data-dcnode-id="2757"><a class="c-article-section__figure-link" data-dcnode-id="2758" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/8" rel="nofollow"><picture data-dcnode-id="2759"><source data-dcnode-id="2761" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12182-020-00501-6/MediaObjects/12182_2020_501_Fig8_HTML.png?as=webp" type="image/webp"><img alt="figure 8" aria-describedby="Fig8" data-dcnode-id="2760" height="726" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12182-020-00501-6/MediaObjects/12182_2020_501_Fig8_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2754" data-test="bottom-caption" id="figure-8-desc"><p data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">The history of the oil import reform</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2743"><a aria-label="Full size image figure 8" class="c-article__pill-button" data-dcnode-id="2744" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure8 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/8" rel="nofollow"><span data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2745" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2746" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2747" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2750" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2749" fill-rule="evenodd"></path><span data-dcnode-id="2748" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2733"><span data-dcnode-id="2740" instrument_node="">China has accelerated its reform of oil imports after it entered the World Trade Organization (WTO) in 2001. One of the significant changes was to divide crude oil import into state and non-state trades. The state-run trade carries out an automatic import license administration, without quantitative limits. State-owned entities with import rights include Sinochem Group, China National United Oil Corporation (subordinate to CNPC), China International United Petroleum &amp; Chemicals Co., Ltd. (subordinate to SINOPEC), CNOOC and Zhuhai Zhen Rong Company. The imports of these five enterprises hold about 90% of total domestic imported crude oil (Wang et al. </span><a aria-label="Reference 2016b" data-dcnode-id="2738" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d269103676e739" title="Wang Z, Zhang A, Liu MM. China crude oil imports and oil market-oriented reform. China Oil Gas. 2016b;2:9–15."><span data-dcnode-id="2739" instrument_node="">2016b</span></a><span data-dcnode-id="2737" instrument_node="">). As for the non-state trade, quota management was implemented. According to the pledge of the Chinese government to the WTO, the non-state import quotas of crude oil would increase by 15% annually from 2001. Figure&nbsp;</span><a data-dcnode-id="2735" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig9"><span data-dcnode-id="2736" instrument_node="">9</span></a><span data-dcnode-id="2734" instrument_node=""> presents the actual import quotas of crude oil for non-state trade along with total crude oil imports. It demonstrates a significant increase in import quotas after 2014 and is estimated to increase to approximately half of the total crude oil imports by 2019.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2709" data-test="figure" data-title="Fig.&nbsp;9" id="figure-9"><figure data-dcnode-id="2710"><figcaption data-dcnode-id="2730"><b class="c-article-section__figure-caption" data-dcnode-id="2731" data-test="figure-caption-text" id="Fig9"><span data-dcnode-id="2732" instrument_node="">Fig.&nbsp;9</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2721"><div class="c-article-section__figure-item" data-dcnode-id="2725"><a class="c-article-section__figure-link" data-dcnode-id="2726" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/9" rel="nofollow"><picture data-dcnode-id="2727"><source data-dcnode-id="2729" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12182-020-00501-6/MediaObjects/12182_2020_501_Fig9_HTML.png?as=webp" type="image/webp"><img alt="figure 9" aria-describedby="Fig9" data-dcnode-id="2728" height="385" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12182-020-00501-6/MediaObjects/12182_2020_501_Fig9_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2722" data-test="bottom-caption" id="figure-9-desc"><p data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">Import quotas of crude oil for non-state trades</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2711"><a aria-label="Full size image figure 9" class="c-article__pill-button" data-dcnode-id="2712" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure9 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/9" rel="nofollow"><span data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2713" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2714" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2715" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2718" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2717" fill-rule="evenodd"></path><span data-dcnode-id="2716" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2689"><span data-dcnode-id="2708" instrument_node="">In 2013, the State Council promulgated </span><i data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">Several Opinions on Promoting the Growth Stabilization and Structural Adjustment of Imports and Exports</span></i><span data-dcnode-id="2705" instrument_node=""> to allow oil refineries that meet the standards to import and use crude oil (the State Council </span><a aria-label="Reference 2013" data-dcnode-id="2703" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d269103676e768" title="The State Council, China. Several opinions on promoting the growth stabilization and structural adjustment of imports and exports. 
https://www.customslawyer.cn/portal/fgk/detail/id/58681.html

. Accessed 26 July 2013."><span data-dcnode-id="2704" instrument_node="">2013</span></a><span data-dcnode-id="2702" instrument_node="">). One year later, the State Council issued </span><i data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">Several Opinions on Supporting the Steady Growth of Foreign Trade</span></i><span data-dcnode-id="2699" instrument_node="">, re-emphasizing a strong need to open the right to import crude oil for independent refineries (the State Council </span><a aria-label="Reference 2014" data-dcnode-id="2697" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d269103676e774" title="The State Council, China. Several opinions on supporting the steady growth of foreign trade. 
http://www.gov.cn/xinwen/2014-05/15/content_2680020.htm

. Accessed 15 May 2014."><span data-dcnode-id="2698" instrument_node="">2014</span></a><span data-dcnode-id="2696" instrument_node="">). In 2016, the Ministry of Commerce increased the non-state trading import quotas to 87.6 million tons, rising by 133% from 2015. In that July, Dongming Petrochemical Company became the first independent refinery to obtain the right to use and import crude oil. By April 2017, there were 23 independent refineries with imported crude oil use rights and import qualifications (Wang and She </span><a aria-label="Reference 2017" data-dcnode-id="2694" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d269103676e777" title="Wang JW, She JY. Optimization of imported crude oil purchasing strategy for local refineries in China. Int Pet Econ. 2017;25(5):46–50."><span data-dcnode-id="2695" instrument_node="">2017</span></a><span data-dcnode-id="2693" instrument_node="">). In 2018, the Ministry of Commerce announced the import quotas of non-state trade in 2019 would be 202 million tonnes, increasing by 41.8% of 2018, which indicates the&nbsp;further release of oil import rights (Ministry of Commerce </span><a aria-label="Reference 2018" data-dcnode-id="2691" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d269103676e781" title="Ministry of Commerce, China. Total allowable volume, application conditions and application procedure of non-state trade imports of crude oil in 2019, Announcement No. 72 [2018]. 
http://www.mofcom.gov.cn/article/b/e/201809/20180902791827.shtml

. Accessed in 29 Sept 2018."><span data-dcnode-id="2692" instrument_node="">2018</span></a><span data-dcnode-id="2690" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2687" id="Sec6"><span data-dcnode-id="2688" instrument_node="">Pricing mechanism</span></h3><p data-dcnode-id="2676"><span data-dcnode-id="2686" instrument_node="">China’s petroleum products pricing mechanism has experienced a long path of reform, which developed from a single price to the price being determined according to the international oil price (Zhang and Xie </span><a aria-label="Reference 2016" data-dcnode-id="2684" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d269103676e793" title="Zhang J, Xie MJ. China’s oil product pricing mechanism: What role does it play in China’s macroeconomy? China Econ Rev. 2016;38:209–21. 
https://doi.org/10.1016/j.chieco.2016.02.002

."><span data-dcnode-id="2685" instrument_node="">2016</span></a><span data-dcnode-id="2683" instrument_node="">). As a strategic resource, crude oil and petroleum products were uniformly allocated by the state at the start, with the prices formulated and controlled by the government. However, there exist drawbacks to this kind of planned system. Firstly, the government cannot accurately predict consumers’ preference, surpluses and shortages, so that they could not efficiently allocate oil resources. Secondly, petroleum enterprises have no incentive to innovate or take entrepreneurial risks, as the price is controlled by administrative regulation. Consequently, a pricing reform of the&nbsp;petroleum market was launched in 1998. Under this reform, Chinese crude oil can be classified as four types: Light, Medium I, Medium II and Heavy, and different types of crude oil have different pricing benchmarks. In detail, the price of Light crude oil is associated with that of a Malaysian crude oil, which is used as a pricing benchmark in Singapore and Australia. The price of Medium I and Medium II is linked to that of Minas and Cinta, respectively. Meanwhile, the price of Heavy referred to that of Duri (Li and Leung </span><a aria-label="Reference 2011" data-dcnode-id="2681" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d269103676e796" title="Li R, Leung GC-K. The integration of China into the world crude oil market since 1998. Energy Policy. 2011;39:5159–66. 
https://doi.org/10.1016/j.enpol.2011.05.048

."><span data-dcnode-id="2682" instrument_node="">2011</span></a><span data-dcnode-id="2680" instrument_node="">). Government guide-price for petroleum products remained unchanged if the international oil price fluctuates within the range of 5%–8%. Other changes in the pricing mechanism for crude oil and petroleum products are also summarized as shown in Table&nbsp;</span><a data-dcnode-id="2678" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2679" instrument_node="">1</span></a><span data-dcnode-id="2677" instrument_node="">.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2661" data-test="inline-table" id="table-1"><figure data-dcnode-id="2662"><figcaption class="c-article-table__figcaption" data-dcnode-id="2673"><b data-dcnode-id="2674" data-test="table-caption" id="Tab1"><span data-dcnode-id="2675" instrument_node="">Table&nbsp;1 Evolution of the petroleum pricing mechanism in China</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2663"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="2664" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/tables/1" rel="nofollow"><span data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2665" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2666" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2667" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2670" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2669" fill-rule="evenodd"></path><span data-dcnode-id="2668" instrument_node="">
</span></a></div></figure></div></div></div></section><section data-dcnode-id="2259" data-title="Challenges for China’s petroleum market"><div class="c-article-section" data-dcnode-id="2260" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2656" id="Sec7"><span data-dcnode-id="2657" instrument_node="">Challenges for China’s petroleum market</span></h2><div class="c-article-section__content" data-dcnode-id="2261" id="Sec7-content"><h3 class="c-article__sub-heading" data-dcnode-id="2654" id="Sec8"><span data-dcnode-id="2655" instrument_node="">Lack of marketization</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2652" id="Sec9"><span data-dcnode-id="2653" instrument_node="">Domination of state-owned enterprises</span></h4><p data-dcnode-id="2632"><span data-dcnode-id="2651" instrument_node="">Three state-owned enterprises play a dominant role in China’s petroleum industry (Lee </span><a aria-label="Reference 2009" data-dcnode-id="2649" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d269103676e996" title="Lee H. State owned enterprises in China: reviewing the evidence. OECD Occasional Paper. 
https://www.oecd.org/corporate/ca/corporategovernanceofstate-ownedenterprises/42095493.pdf

. Accessed 26 Jan 2009."><span data-dcnode-id="2650" instrument_node="">2009</span></a><span data-dcnode-id="2648" instrument_node="">; Walls </span><a aria-label="Reference 2010" data-dcnode-id="2646" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d269103676e999" title="Walls WD. Petroleum refining industry in China. Energy Policy. 2010;38:2110–5. 
https://doi.org/10.1016/j.enpol.2009.06.002

."><span data-dcnode-id="2647" instrument_node="">2010</span></a><span data-dcnode-id="2645" instrument_node="">). CNPC had a domestic crude oil production of 100.1 million tonnes in 2019, accounting for 52.4% of total crude oil output. The company processed 166.2 million tonnes of crude oil and produced petroleum&nbsp;products of 117.8 million tonnes (CNPC </span><a aria-label="Reference 2020" data-dcnode-id="2643" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d269103676e1002" title="China National Petroleum Corporation (CNPC). Annual report in 2019. 
http://www.petrochina.com.cn/petrochina/ndbg/202003/597a083311044a799810ed977488f803/files/20d26be30d3b43239ddb773e4e1b3a94.pdf

. Accessed Mar 2020."><span data-dcnode-id="2644" instrument_node="">2020</span></a><span data-dcnode-id="2642" instrument_node="">). SINOPEC produced 35.1 million tonnes of crude oil within the territory of China in 2019, refined 248.2 million tonnes of crude and yielded petroleum products of 160.0 million tonnes (SINOPEC </span><a aria-label="Reference 2020" data-dcnode-id="2640" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d269103676e1005" title="China Petroleum &amp; Chemical Corporation (SINOPEC). Annual report in 2019. 
http://www.sinopec.com/listco/Resource/Pdf/2020042303.pdf

. Accessed Apr 2020."><span data-dcnode-id="2641" instrument_node="">2020</span></a><span data-dcnode-id="2639" instrument_node="">). CNOOC’s crude oil production was 36.3 million tonnes, with overseas oil production of 18.4 million tonnes (CNOOC </span><a aria-label="Reference 2020" data-dcnode-id="2637" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d269103676e1008" title="China National Offshore Oil Corporation (CNOOC). Annual report in 2019. 
https://www.cnoocltd.com/module/download/down.jsp?i_ID=15303408&amp;colID=3881

. Accessed April 2020."><span data-dcnode-id="2638" instrument_node="">2020</span></a><span data-dcnode-id="2636" instrument_node="">). Moreover, the total number of gasoline stations of CNPC and SINOPEC reached 52,500 in 2018, with a market share of nearly 50% (Deloitte </span><a aria-label="Reference 2019" data-dcnode-id="2634" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d269103676e1012" title="Deloitte. China gasoline retailing development trends report 2019. 
https://www2.deloitte.com/content/dam/Deloitte/cn/Documents/energy-resources/deloitte-cn-er-china-gasoline-retailing-development-trends-report-zh-190527.pdf

. Accessed May 2019."><span data-dcnode-id="2635" instrument_node="">2019</span></a><span data-dcnode-id="2633" instrument_node="">).</span></p><p data-dcnode-id="2621"><span data-dcnode-id="2631" instrument_node="">An administrative monopoly in the petroleum industry was proved to bring about huge social welfare losses. The welfare losses consist of three parts: (i) net welfare loss; (ii) net welfare loss from cost increase caused by monopoly; (iii) welfare transfer and loss caused by sellers’/buyers’ monopoly price (Sheng et al. </span><a aria-label="Reference 2015" data-dcnode-id="2629" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d269103676e1018" title="Sheng H, Zhao N, Yang JF. Administrative monopoly in China: causes, behaviors, and termination. Singapore: World Scientific Publishing Co Pte Ltd.; 2015."><span data-dcnode-id="2630" instrument_node="">2015</span></a><span data-dcnode-id="2628" instrument_node="">; Sheng and Qian </span><a aria-label="Reference 2015" data-dcnode-id="2626" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d269103676e1021" title="Sheng H, Qian P. Opening up China’s markets of crude oil and petroleum products: theoretical research and reform solutions, vol. 9. Beijing: Social Science Academic Press, Series on Chinese Economics Research; 2015."><span data-dcnode-id="2627" instrument_node="">2015</span></a><span data-dcnode-id="2625" instrument_node="">). According to data from 2001 to 2011, annual welfare losses caused by an administrative monopoly in the petroleum industry were estimated to be RMB 3.477 trillion, and the welfare losses kept increasing with an increment of RMB 600 billion to RMB 700 billion annually (Sheng and Qian </span><a aria-label="Reference 2015" data-dcnode-id="2623" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d269103676e1024" title="Sheng H, Qian P. Opening up China’s markets of crude oil and petroleum products: theoretical research and reform solutions, vol. 9. Beijing: Social Science Academic Press, Series on Chinese Economics Research; 2015."><span data-dcnode-id="2624" instrument_node="">2015</span></a><span data-dcnode-id="2622" instrument_node="">).</span></p><p data-dcnode-id="2613"><span data-dcnode-id="2620" instrument_node="">Under the current system, the management efficiency of China’s listed petroleum enterprises is much lower than that of overseas petroleum enterprises, which is to some extent caused by the lack of internal competition. This also results in lower per capita benefits. As shown in Table&nbsp;</span><a data-dcnode-id="2618" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2619" instrument_node="">2</span></a><span data-dcnode-id="2617" instrument_node="">, according to annual reports of PetroChina and BP, the operating income of PetroChina was 2516.8 billion RMB and it had approximately 460,700 employees in 2019, while the operating income of BP was 1809.3 billion RMB and it had approximately 70,100 employees. The value created by an&nbsp;individual employee of PetroChina is only 21.2% of BP. On the other hand, employee costs of PetroChina are higher and the difference between PetroChina and BP is rising year by year. As shown in Fig.&nbsp;</span><a data-dcnode-id="2615" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig10"><span data-dcnode-id="2616" instrument_node="">10</span></a><span data-dcnode-id="2614" instrument_node="">, employee costs of PetroChina were more than twice that of BP in 2019 and showed a higher proportion of the total operating cost. That is, taking BP as a benchmark, PetroChina has redundant employees and higher employee costs.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2598" data-test="inline-table" id="table-2"><figure data-dcnode-id="2599"><figcaption class="c-article-table__figcaption" data-dcnode-id="2610"><b data-dcnode-id="2611" data-test="table-caption" id="Tab2"><span data-dcnode-id="2612" instrument_node="">Table&nbsp;2 Comparison between employee numbers and operating income of PetroChina and BP.</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2600"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="2601" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/tables/2" rel="nofollow"><span data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2602" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2603" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2604" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2607" instrument_node="">
