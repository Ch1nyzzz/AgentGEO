</span></a></div></figure></div><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2568" id="Sec10"><span data-dcnode-id="2569" instrument_node="">Inflexible pricing mechanism</span></h4><p data-dcnode-id="2560"><span data-dcnode-id="2567" instrument_node="">While undergoing several reforms in the last 2 decades, China’s oil pricing mechanism still has its problems. Under the current pricing mechanism, the adjustments of domestic petroleum prices were limited, and the adjustment interval is 10 working days. As shown in Table&nbsp;</span><a data-dcnode-id="2565" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="2566" instrument_node="">3</span></a><span data-dcnode-id="2564" instrument_node="">, the local gasoline price increased by 8.3% in 2019, while the&nbsp;diesel price raised by 9.5%. However, such adjustments cannot flexibly reflect real supply-demand relationships. Instead, this mechanism creates opportunities for speculators and undermines the regular market order. Furthermore, it was found that domestic petroleum products prices lagged behind the international oil price based on the Autoregressive Distributed Lag model (Zhang and Xie </span><a aria-label="Reference 2016" data-dcnode-id="2562" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d269103676e1534" title="Zhang J, Xie MJ. China’s oil product pricing mechanism: What role does it play in China’s macroeconomy? China Econ Rev. 2016;38:209–21. 
https://doi.org/10.1016/j.chieco.2016.02.002

."><span data-dcnode-id="2563" instrument_node="">2016</span></a><span data-dcnode-id="2561" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2545" data-test="inline-table" id="table-3"><figure data-dcnode-id="2546"><figcaption class="c-article-table__figcaption" data-dcnode-id="2557"><b data-dcnode-id="2558" data-test="table-caption" id="Tab3"><span data-dcnode-id="2559" instrument_node="">Table&nbsp;3 Changes of petroleum products prices in China’s market in 2019</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2547"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="2548" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/tables/3" rel="nofollow"><span data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2549" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2550" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2551" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2554" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2553" fill-rule="evenodd"></path><span data-dcnode-id="2552" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2531"><span data-dcnode-id="2544" instrument_node="">To protect consumers, the Chinese government uses a range of policies to keep domestic petroleum products prices stable, including setting price ceilings and float ranges, requiring oil companies to bear some or all subsidy costs, imposing export restrictions and lower tax rate (Kojima </span><a aria-label="Reference 2013" data-dcnode-id="2542" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d269103676e2232" title="Kojima M. Drawing a roadmap for oil pricing reform. In: Household savings in Central Eastern and Southeastern Europe: how do poorer households save? The World Bank, Washington, DC. 2013."><span data-dcnode-id="2543" instrument_node="">2013</span></a><span data-dcnode-id="2541" instrument_node="">). Reversely, developed countries levy higher taxes, such as 64% on gasoline and 50% on diesel in Belgium (Yang et al. </span><a aria-label="Reference 2009" data-dcnode-id="2539" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d269103676e2235" title="Yang J, Geng HZ, Wang XK, et al. Study on the control strategy of China’s refined oil government—also on the reform of China’s refined oil pricing mechanism. Finance Trade Econ. 2009;6:109–14."><span data-dcnode-id="2540" instrument_node="">2009</span></a><span data-dcnode-id="2538" instrument_node="">). As a result, China’s petroleum products prices are lower than in most developed countries. As shown in Fig.&nbsp;</span><a data-dcnode-id="2536" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig11"><span data-dcnode-id="2537" instrument_node="">11</span></a><span data-dcnode-id="2535" instrument_node="">, domestic gasoline and diesel prices are $12.34/barrel and $16.96/barrel lower than the world average. In the future, there is a high probability that petroleum products prices will increase with the opening of the oil market, which may affect the national average price index and increase China’s financial burden (Tang et al. </span><a aria-label="Reference 2011" data-dcnode-id="2533" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d269103676e2241" title="Tang X, Zhang BS, Feng LY, Marwan M, Afshin H. Economic impacts and challenges of China’s petroleum industry: an input–output analysis. Energy. 2011;36:2905–11. 
https://doi.org/10.1016/j.energy.2011.02.033

."><span data-dcnode-id="2534" instrument_node="">2011</span></a><span data-dcnode-id="2532" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2503" data-test="figure" data-title="Fig.&nbsp;11" id="figure-11"><figure data-dcnode-id="2504"><figcaption data-dcnode-id="2528"><b class="c-article-section__figure-caption" data-dcnode-id="2529" data-test="figure-caption-text" id="Fig11"><span data-dcnode-id="2530" instrument_node="">Fig.&nbsp;11</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2515"><div class="c-article-section__figure-item" data-dcnode-id="2519"><a class="c-article-section__figure-link" data-dcnode-id="2524" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/11" rel="nofollow"><picture data-dcnode-id="2525"><source data-dcnode-id="2527" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12182-020-00501-6/MediaObjects/12182_2020_501_Fig11_HTML.png?as=webp" type="image/webp"><img alt="figure 11" aria-describedby="Fig11" data-dcnode-id="2526" height="482" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12182-020-00501-6/MediaObjects/12182_2020_501_Fig11_HTML.png&amp;raw" width="685"></picture></a><p class="c-article-section__figure-credit text-right c-article-section__figure-credit-right" data-dcnode-id="2520" data-test="figure-credit"><i data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">Source</span></i><span data-dcnode-id="2521" instrument_node="">: GlobalPetrolPrices.com</span></p></div><div class="c-article-section__figure-description" data-dcnode-id="2516" data-test="bottom-caption" id="figure-11-desc"><p data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">Comparison of petroleum products prices between different countries.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2505"><a aria-label="Full size image figure 11" class="c-article__pill-button" data-dcnode-id="2506" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure11 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/11" rel="nofollow"><span data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2507" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2508" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2509" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2512" instrument_node="">

</span></a></div></figure></div><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2501" id="Sec11"><span data-dcnode-id="2502" instrument_node="">Immature Petro-finance market</span></h4><p data-dcnode-id="2490"><span data-dcnode-id="2500" instrument_node="">The formal launch of the Shanghai International Energy Exchange (INE) in March 2018 indicated that China’s Petro-finance market has entered a new phase. The introduction of Yuan-led crude oil futures has not only enhanced the ability of Chinese petroleum companies to control price risks but also made a significant contribution to the internationalization of RMB (Ji and Zhang </span><a aria-label="Reference 2019" data-dcnode-id="2498" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d269103676e2277" title="Ji Q, Zhang DY. China’s crude oil futures: Introduction and some stylized facts. Finance Res Lett. 2019;28:376–80. 
https://doi.org/10.1016/j.frl.2018.06.005

."><span data-dcnode-id="2499" instrument_node="">2019</span></a><span data-dcnode-id="2497" instrument_node="">). However, there are still deficiencies in the current Petro-finance market. As shown in Fig.&nbsp;</span><a data-dcnode-id="2495" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig12"><span data-dcnode-id="2496" instrument_node="">12</span></a><span data-dcnode-id="2494" instrument_node="">, the daily turnover of crude oil of INE is only half of that of WTI, which shows low liquidity of China’s crude oil futures. Moreover, individuals and domestic customers are the main participants in China’s crude oil futures market, resulting in a lack of openness and internationality. Thirdly, types of crude oil futures contracts are not diversified enough, and non-transparent information disclosure system may lead to the inability to obtain timely market trading information and position changes (Shi et al. </span><a aria-label="Reference 2018" data-dcnode-id="2492" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d269103676e2283" title="Shi XP, Ji Q, Zhang DY. Evolution of international crude oil pricing mechanism and its implications to China’s crude oil futures. J Environ Econ. 2018;3:121–34."><span data-dcnode-id="2493" instrument_node="">2018</span></a><span data-dcnode-id="2491" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2462" data-test="figure" data-title="Fig.&nbsp;12" id="figure-12"><figure data-dcnode-id="2463"><figcaption data-dcnode-id="2487"><b class="c-article-section__figure-caption" data-dcnode-id="2488" data-test="figure-caption-text" id="Fig12"><span data-dcnode-id="2489" instrument_node="">Fig.&nbsp;12</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2474"><div class="c-article-section__figure-item" data-dcnode-id="2478"><a class="c-article-section__figure-link" data-dcnode-id="2483" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/12" rel="nofollow"><picture data-dcnode-id="2484"><source data-dcnode-id="2486" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12182-020-00501-6/MediaObjects/12182_2020_501_Fig12_HTML.png?as=webp" type="image/webp"><img alt="figure 12" aria-describedby="Fig12" data-dcnode-id="2485" height="482" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12182-020-00501-6/MediaObjects/12182_2020_501_Fig12_HTML.png&amp;raw" width="685"></picture></a><p class="c-article-section__figure-credit text-right c-article-section__figure-credit-right" data-dcnode-id="2479" data-test="figure-credit"><i data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Source</span></i><span data-dcnode-id="2480" instrument_node="">: Wind; investing.com</span></p></div><div class="c-article-section__figure-description" data-dcnode-id="2475" data-test="bottom-caption" id="figure-12-desc"><p data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">Comparison of daily turnover of crude oil futures between INE and WTI.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2464"><a aria-label="Full size image figure 12" class="c-article__pill-button" data-dcnode-id="2465" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure12 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/12" rel="nofollow"><span data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2466" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2467" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2468" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2471" instrument_node="">

</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2460" id="Sec12"><span data-dcnode-id="2461" instrument_node="">Excess oil refining capacity</span></h3><p data-dcnode-id="2443"><span data-dcnode-id="2459" instrument_node="">China’s oil industry has faced rapid growth in refining capacity to satisfy growing domestic demand for petroleum products (Walls </span><a aria-label="Reference 2010" data-dcnode-id="2457" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d269103676e2320" title="Walls WD. Petroleum refining industry in China. Energy Policy. 2010;38:2110–5. 
https://doi.org/10.1016/j.enpol.2009.06.002

."><span data-dcnode-id="2458" instrument_node="">2010</span></a><span data-dcnode-id="2456" instrument_node="">; Lin and Xie </span><a aria-label="Reference 2015" data-dcnode-id="2454" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d269103676e2323" title="Lin BQ, Xie X. Energy conservation potential in China’s petroleum refining industry: evidence and policy implications. Energy Convers Manage. 2015;91:377–86."><span data-dcnode-id="2455" instrument_node="">2015</span></a><span data-dcnode-id="2453" instrument_node="">). As shown in Fig.&nbsp;</span><a data-dcnode-id="2451" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig13"><span data-dcnode-id="2452" instrument_node="">13</span></a><span data-dcnode-id="2450" instrument_node="">, China’s oil refining capacity exceeded 800 million tonnes by 2018, accounting for 15.6% of the world’s total capacity. In addition to 2015 and 2016, the growth of China’s refining capacity remains well above the world average. Further expansion of oil refining capacity causes serious structural excesses in China. As a result, the national average operating rate of refineries was only 72.9%, being the lowest in the world. Moreover, the oil refining surplus capacity is estimated to rise to 120 million tonnes by 2019 (Liu and Jiang </span><a aria-label="Reference 2019" data-dcnode-id="2448" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d269103676e2329" title="Liu ZQ, Jiang XF. Domestic and international oil &amp; gas industry development report in 2018. Beijing: Petroleum Industry Press; 2019."><span data-dcnode-id="2449" instrument_node="">2019</span></a><span data-dcnode-id="2447" instrument_node="">). China’s overcapacity of petroleum refining is expected to have reached its highest level (Pan et al. </span><a aria-label="Reference 2017" data-dcnode-id="2445" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d269103676e2332" title="Pan LY, Liu P, Li Z. A system dynamic analysis of China’s oil supply chain: over-capacity and energy security issues. Appl Energy. 2017;188:508–20. 
https://doi.org/10.1016/j.apenergy.2016.12.036

."><span data-dcnode-id="2446" instrument_node="">2017</span></a><span data-dcnode-id="2444" instrument_node="">). What’s worse is that with the opening of crude oil imports and slowdown in domestic economic growth, overcapacity may be more serious than expected.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2415" data-test="figure" data-title="Fig.&nbsp;13" id="figure-13"><figure data-dcnode-id="2416"><figcaption data-dcnode-id="2440"><b class="c-article-section__figure-caption" data-dcnode-id="2441" data-test="figure-caption-text" id="Fig13"><span data-dcnode-id="2442" instrument_node="">Fig.&nbsp;13</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2427"><div class="c-article-section__figure-item" data-dcnode-id="2431"><a class="c-article-section__figure-link" data-dcnode-id="2436" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/13" rel="nofollow"><picture data-dcnode-id="2437"><source data-dcnode-id="2439" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12182-020-00501-6/MediaObjects/12182_2020_501_Fig13_HTML.png?as=webp" type="image/webp"><img alt="figure 13" aria-describedby="Fig13" data-dcnode-id="2438" height="365" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12182-020-00501-6/MediaObjects/12182_2020_501_Fig13_HTML.png&amp;raw" width="685"></picture></a><p class="c-article-section__figure-credit text-right c-article-section__figure-credit-right" data-dcnode-id="2432" data-test="figure-credit"><i data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Source</span></i><span data-dcnode-id="2433" instrument_node="">: BP statistical review of world energy, 2019</span></p></div><div class="c-article-section__figure-description" data-dcnode-id="2428" data-test="bottom-caption" id="figure-13-desc"><p data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">Oil refining capacity and growth rate in China and the world.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2417"><a aria-label="Full size image figure 13" class="c-article__pill-button" data-dcnode-id="2418" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure13 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/13" rel="nofollow"><span data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2419" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2420" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2421" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2424" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2423" fill-rule="evenodd"></path><span data-dcnode-id="2422" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2413" id="Sec13"><span data-dcnode-id="2414" instrument_node="">High external dependency</span></h3><p data-dcnode-id="2384"><span data-dcnode-id="2412" instrument_node="">China is the world’s largest oil importer, with net imports of 418.3 million tonnes in 2018 (BP </span><a aria-label="Reference 2019" data-dcnode-id="2410" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d269103676e2369" title="BP. BP statistical review of world energy 2019. 2019. 
http://www.bp.com/statisticalreview

. Accessed June 2019."><span data-dcnode-id="2411" instrument_node="">2019</span></a><span data-dcnode-id="2409" instrument_node="">). As shown in Fig.&nbsp;</span><a data-dcnode-id="2407" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig14"><span data-dcnode-id="2408" instrument_node="">14</span></a><span data-dcnode-id="2406" instrument_node="">, China’s crude oil external dependence rose to over 70% in 2018, hitting a new record. China’s growing oil imports indicate the rise of energy security as a serious issue (Leung </span><a aria-label="Reference 2011" data-dcnode-id="2404" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d269103676e2375" title="Leung GC-K. China’s energy security: perception and reality. Energy Policy. 2011;39:1330–7. 
https://doi.org/10.1016/j.enpol.2010.12.005

."><span data-dcnode-id="2405" instrument_node="">2011</span></a><span data-dcnode-id="2403" instrument_node="">; Wu </span><a aria-label="Reference 2014" data-dcnode-id="2401" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d269103676e2378" title="Wu K. China’s energy security: oil and gas. Energy Policy. 2014;74:4–11. 
https://doi.org/10.1016/j.enpol.2014.05.040

."><span data-dcnode-id="2402" instrument_node="">2014</span></a><span data-dcnode-id="2400" instrument_node="">). Based on the established indicator system, China’s oil security level was examined to be seriously threatened and generally declining from 2001 to 2015 (Wang et al. </span><a aria-label="Reference 2018" data-dcnode-id="2398" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d269103676e2381" title="Wang QS, Tang HR, Yuan XL, et al. An early warning system for oil security in China. Sustainability. 2018;10:283. 
https://doi.org/10.3390/su10010283

."><span data-dcnode-id="2399" instrument_node="">2018</span></a><span data-dcnode-id="2397" instrument_node="">). Annual economic losses caused by high external dependency were estimated to be between $7.58 billion and $168.24 billion (Chen et al. </span><a aria-label="Reference 2018" data-dcnode-id="2395" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d269103676e2385" title="Chen ZM, Zeng SP, Lester L, et al. Economic cost of China’s oil import: Welfare estimation for 2001–2015. Resour Conserv Recycl. 2018;132:158–67. 
https://doi.org/10.1016/j.resconrec.2018.02.001

."><span data-dcnode-id="2396" instrument_node="">2018</span></a><span data-dcnode-id="2394" instrument_node="">). Also, China’s petroleum industry is facing a variety of risks from the supply chain perspective. These risks are defined as potentially negative impacts arising from an adverse situation such as oil disruption (Zhao and Chen </span><a aria-label="Reference 2014" data-dcnode-id="2392" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d269103676e2388" title="Zhao C, Chen B. China’s oil security from the supply chain perspective: a review. Appl Energy. 2014;136:269–79. 
https://doi.org/10.1016/j.apenergy.2014.09.016

."><span data-dcnode-id="2393" instrument_node="">2014</span></a><span data-dcnode-id="2391" instrument_node="">). Primary risks are mainly related to energy and financial flows, such as oil supply risk, geopolitical risk, oil price volatility and exchange rate volatility (Shao et al. </span><a aria-label="Reference 2017" data-dcnode-id="2389" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d269103676e2391" title="Shao YM, Qiao H, Wang SY. What determines China’s crude oil importing trade patterns? Empirical evidences from 55 countries between 1992 and 2015. Energy Policy. 2017;109:854–62. 
https://doi.org/10.1016/j.enpol.2017.05.063

."><span data-dcnode-id="2390" instrument_node="">2017</span></a><span data-dcnode-id="2388" instrument_node="">). To control the above risks, it is urgent to establish a national strategic petroleum reserve (SPR), as well as to construct an early warning indicator system to reflect the oil security level accurately. Currently, China has established petroleum reserve bases in Zhenhai, Zhoushan, Huangdao, Dalian, Dushanzi, Tianjin and Lanzhou. China’s strategic petroleum reserve capacity is predicted to increase to approximately 503 million barrels by the end of 2020, equivalent to 90&nbsp;days of net oil imports (CNPC </span><a aria-label="Reference 2019" data-dcnode-id="2386" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d269103676e2394" title="China National Petroleum Corporation (CNPC). China’s oil strategic reserve. 
http://www.cnpc.com.cn/syzs/yqcy/201912/b12112ac3e34445bac22596f5d17e52a.shtml

. Accessed Dec 2019."><span data-dcnode-id="2387" instrument_node="">2019</span></a><span data-dcnode-id="2385" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2356" data-test="figure" data-title="Fig.&nbsp;14" id="figure-14"><figure data-dcnode-id="2357"><figcaption data-dcnode-id="2381"><b class="c-article-section__figure-caption" data-dcnode-id="2382" data-test="figure-caption-text" id="Fig14"><span data-dcnode-id="2383" instrument_node="">Fig.&nbsp;14</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2368"><div class="c-article-section__figure-item" data-dcnode-id="2372"><a class="c-article-section__figure-link" data-dcnode-id="2377" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/14" rel="nofollow"><picture data-dcnode-id="2378"><source data-dcnode-id="2380" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12182-020-00501-6/MediaObjects/12182_2020_501_Fig14_HTML.png?as=webp" type="image/webp"><img alt="figure 14" aria-describedby="Fig14" data-dcnode-id="2379" height="362" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12182-020-00501-6/MediaObjects/12182_2020_501_Fig14_HTML.png&amp;raw" width="685"></picture></a><p class="c-article-section__figure-credit text-right c-article-section__figure-credit-right" data-dcnode-id="2373" data-test="figure-credit"><i data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">Source</span></i><span data-dcnode-id="2374" instrument_node="">: National Bureau of Statistics of China; CNPC Economic &amp; Technological Research Institute</span></p></div><div class="c-article-section__figure-description" data-dcnode-id="2369" data-test="bottom-caption" id="figure-14-desc"><p data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">China’s oil external dependency.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2358"><a aria-label="Full size image figure 14" class="c-article__pill-button" data-dcnode-id="2359" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure14 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/14" rel="nofollow"><span data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2360" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2361" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2362" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2365" instrument_node="">

</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2354" id="Sec14"><span data-dcnode-id="2355" instrument_node="">Environment pollution</span></h3><p data-dcnode-id="2343"><span data-dcnode-id="2353" instrument_node="">With increasing environmental concern and the promotion of energy transition, reducing air pollution caused by petroleum refining and consumption becomes the center of the petroleum industry transformation. As such, the standard for petroleum products quality has been becoming stricter. As shown in Table&nbsp;</span><a data-dcnode-id="2351" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="2352" instrument_node="">4</span></a><span data-dcnode-id="2350" instrument_node="">, the Chinese government is promoting the National emission&nbsp;standard VI&nbsp;(National VI)&nbsp;for gasoline and diesel. To upgrade the quality of the petroleum products as soon as possible, local refineries have to reduce the use of fluid catalytic cracking naphtha suitably. Meanwhile, they are urged to increase the capacity of reformers, alkylation and isomerization units (Liu et al. </span><a aria-label="Reference 2008" data-dcnode-id="2348" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d269103676e2433" title="Liu HY, Yu JN, Fan Y, et al. A scenario-based clean gasoline production strategy for China National Petroleum Corporation. Pet Sci. 2008;5:285–94. 
https://doi.org/10.1007/s12182-008-0048-7

."><span data-dcnode-id="2349" instrument_node="">2008</span></a><span data-dcnode-id="2347" instrument_node="">). However, this upgrade will create additional production costs for petroleum products and weaken refineries’ competitiveness. More importantly, China’s fuel quality monitoring legislation and system are not perfect yet, failing to provide a reasonable guarantee of the quality of petroleum products (Kavanagh </span><a aria-label="Reference 2014" data-dcnode-id="2345" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d269103676e2436" title="Kavanagh T. International fuel quality standards and their implications for Australian standards. Australian Government, Department of the Environment. 2014. 
https://www.environment.gov.au/system/files/resources/f83ff2dc-87a7-4cf9-ab24-6c25f2713f9e/files/international-feul-quality-standards.pdf

. Accessed Oct 2014."><span data-dcnode-id="2346" instrument_node="">2014</span></a><span data-dcnode-id="2344" instrument_node="">). Therefore, most enterprises do not have enough incentive to improve their products.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2328" data-test="inline-table" id="table-4"><figure data-dcnode-id="2329"><figcaption class="c-article-table__figcaption" data-dcnode-id="2340"><b data-dcnode-id="2341" data-test="table-caption" id="Tab4"><span data-dcnode-id="2342" instrument_node="">Table&nbsp;4 Schedule of quality upgrade of petroleum products in China</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2330"><a aria-label="Full size table 4" class="c-article__pill-button" data-dcnode-id="2331" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/tables/4" rel="nofollow"><span data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2332" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2333" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2334" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2337" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2336" fill-rule="evenodd"></path><span data-dcnode-id="2335" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2323"><span data-dcnode-id="2327" instrument_node="">To promote sustainable development, eight countries have announced the phase-out planning of fuel vehicles, including Norway, Netherlands, India, Germany, Ireland, Scotland, Britain and France. China is also considering to join them. To deal with environmental problems caused by the petroleum and gas industry, the Ministry of Ecology and Environment enacted the </span><i data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">Notice on further strengthening the management of environmental impact assessment for the oil and gas industry</span></i><span data-dcnode-id="2324" instrument_node=""> in December 2019. These moves would cause a massive shock to the petroleum industry, compelling it to transform in the future.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2321" id="Sec15"><span data-dcnode-id="2322" instrument_node="">Unstable international trading relationship</span></h3><p data-dcnode-id="2313"><span data-dcnode-id="2320" instrument_node="">In May 2018, the USA announced to retaliate 25% tariffs on $50 billion worth of Chinese exports to the USA, raising a new-round between the two most considerable economic powers. Inevitably, the disputes will disrupt regular trade between the two countries even the world. As shown in Fig.&nbsp;</span><a data-dcnode-id="2318" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig15"><span data-dcnode-id="2319" instrument_node="">15</span></a><span data-dcnode-id="2317" instrument_node="">, monthly exports and imports between the USA and China in 2019 have a significant decline at an average rate of − 8% and − 19%. Additionally, the US-China trade disputes may affect China’s petroleum market. The USA is the tenth-largest source of China’s crude oil imports, from which China imported crude oil of 84.5 million barrels in 2018, accounting for 11.3% of US exports of crude oil and 3.8% of China’s imports of crude oil. However, as seen in Table&nbsp;</span><a data-dcnode-id="2315" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab5"><span data-dcnode-id="2316" instrument_node="">5</span></a><span data-dcnode-id="2314" instrument_node="">, China’s imports from the USA of crude oil has dramatically decreased since July 2018 and accumulated crude oil imports for the first three quarters in 2019 is only 56.9% of that of 2018.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2285" data-test="figure" data-title="Fig.&nbsp;15" id="figure-15"><figure data-dcnode-id="2286"><figcaption data-dcnode-id="2310"><b class="c-article-section__figure-caption" data-dcnode-id="2311" data-test="figure-caption-text" id="Fig15"><span data-dcnode-id="2312" instrument_node="">Fig.&nbsp;15</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2297"><div class="c-article-section__figure-item" data-dcnode-id="2301"><a class="c-article-section__figure-link" data-dcnode-id="2306" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/15" rel="nofollow"><picture data-dcnode-id="2307"><source data-dcnode-id="2309" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12182-020-00501-6/MediaObjects/12182_2020_501_Fig15_HTML.png?as=webp" type="image/webp"><img alt="figure 15" aria-describedby="Fig15" data-dcnode-id="2308" height="400" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12182-020-00501-6/MediaObjects/12182_2020_501_Fig15_HTML.png&amp;raw" width="685"></picture></a><p class="c-article-section__figure-credit text-right c-article-section__figure-credit-right" data-dcnode-id="2302" data-test="figure-credit"><i data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Source</span></i><span data-dcnode-id="2303" instrument_node="">: General Administration of Customs, China</span></p></div><div class="c-article-section__figure-description" data-dcnode-id="2298" data-test="bottom-caption" id="figure-15-desc"><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Trade scale between the USA and China.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2287"><a aria-label="Full size image figure 15" class="c-article__pill-button" data-dcnode-id="2288" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure15 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/figures/15" rel="nofollow"><span data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2289" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2290" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2291" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2294" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2293" fill-rule="evenodd"></path><span data-dcnode-id="2292" instrument_node="">
</span></a></div></figure></div><div class="c-article-table" data-container-section="table" data-dcnode-id="2270" data-test="inline-table" id="table-5"><figure data-dcnode-id="2271"><figcaption class="c-article-table__figcaption" data-dcnode-id="2282"><b data-dcnode-id="2283" data-test="table-caption" id="Tab5"><span data-dcnode-id="2284" instrument_node="">Table&nbsp;5 Crude oil trade between the USA and China.</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2272"><a aria-label="Full size table 5" class="c-article__pill-button" data-dcnode-id="2273" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12182-020-00501-6/tables/5" rel="nofollow"><span data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2274" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2275" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2276" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2279" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2278" fill-rule="evenodd"></path><span data-dcnode-id="2277" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2262"><span data-dcnode-id="2269" instrument_node="">Moreover, the dispute causes spill-over effects for oil-exporting countries in African, thereby disturbing global oil markets (Olayungbo </span><a aria-label="Reference 2019" data-dcnode-id="2267" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d269103676e3768" title="Olayungbo OD. The US–China trade dispute: spill-over effects for selected oil-exporting countries in Africa using GVAR analysis. Transnatl Corp Rev. 2019;11:310–22. 
https://doi.org/10.1080/19186444.2019.1682407

."><span data-dcnode-id="2268" instrument_node="">2019</span></a><span data-dcnode-id="2266" instrument_node="">). In August 2019, China declared to levy 5% tariffs on crude oil imported from the USA, as its tit-for-tat measures against the USA. As a consequence, international oil prices dropped by 4% immediately (Kumar </span><a aria-label="Reference 2019" data-dcnode-id="2264" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d269103676e3771" title="Kumar KD. Oil dragged into U.S.-China trade war, prices slump. 
https://www.reuters.com/article/us-usa-trade-china-oil/oil-spills-into-u-s-china-trade-war-prices-slump-idUSKCN1VD22D

. Accessed 24 Aug 2019."><span data-dcnode-id="2265" instrument_node="">2019</span></a><span data-dcnode-id="2263" instrument_node="">). To conclude, the US–China trade disputes may add uncertainties to international oil markets, causing an increase in price risks faced by domestic petroleum enterprises.</span></p></div></div></section><section data-dcnode-id="2161" data-title="Countermeasures to improve China’s petroleum market"><div class="c-article-section" data-dcnode-id="2162" id="Sec16-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2257" id="Sec16"><span data-dcnode-id="2258" instrument_node="">Countermeasures to improve China’s petroleum market</span></h2><div class="c-article-section__content" data-dcnode-id="2163" id="Sec16-content"><h3 class="c-article__sub-heading" data-dcnode-id="2255" id="Sec17"><span data-dcnode-id="2256" instrument_node="">Market deregulation</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2253" id="Sec18"><span data-dcnode-id="2254" instrument_node="">Industry structure and ownership</span></h4><p data-dcnode-id="2245"><span data-dcnode-id="2252" instrument_node="">It is a historical necessity to implement state ownership of oil and natural gas resources that relate to the&nbsp;core interest of the nation. However, the nationalization of oil companies has suppressed the vitality and competitiveness of China’s petroleum industry. This is because that national oil companies (NOCs) undertake the burden of unproductive assets and social responsibilities, and their corporate governance lacks transparency (Andrews-Speed </span><a aria-label="Reference 2015" data-dcnode-id="2250" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d269103676e3791" title="Andrews-Speed P. China’s oil and gas industry: stranded between the plan and the market. In: Belyi AV, Talu K, editors. States and markets in hydrocarbon sectors. Basingstoke: Palgrave Macmillan; 2015. p. 214–39."><span data-dcnode-id="2251" instrument_node="">2015</span></a><span data-dcnode-id="2249" instrument_node="">). A mixed-ownership reform of NOCs, which turns private and state-owned enterprises from competitors into partners, is expected to activate the oil industry further. To promote the ownership reform of NOCs, it is urgent to carry out business restructuring and classification, formulate implementation roadmap and timetable, and explore the establishment of equity incentives and employee shareholding (Xu et al. </span><a aria-label="Reference 2018" data-dcnode-id="2247" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d269103676e3794" title="Xu D, Cui YK, Zhang L, et al. Progress of mixed ownership reform of CNPC in 2016–2018 and follow-up reform suggestions. Int Pet Econ. 2018;26:12–7."><span data-dcnode-id="2248" instrument_node="">2018</span></a><span data-dcnode-id="2246" instrument_node="">).</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2243" id="Sec19"><span data-dcnode-id="2244" instrument_node="">Pricing and anti-monopoly regulation</span></h4><p data-dcnode-id="2232"><span data-dcnode-id="2242" instrument_node="">State-owned enterprises play a dominant role in the petroleum industry. Such an administrative monopoly will lead to the losses of management efficiency and social welfare. In order to fundamentally improve this kind of situation, the following suggestions should be considered. As mentioned above, three state-owned petroleum enterprises have privileges and exclusive rights in some fields, such as the proprietary rights to oil exploration. Accordingly, it is expected to withdraw these privileges and treat private enterprises fairly (Sheng et al. </span><a aria-label="Reference 2015" data-dcnode-id="2240" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d269103676e3805" title="Sheng H, Zhao N, Yang JF. Administrative monopoly in China: causes, behaviors, and termination. Singapore: World Scientific Publishing Co Pte Ltd.; 2015."><span data-dcnode-id="2241" instrument_node="">2015</span></a><span data-dcnode-id="2239" instrument_node="">). For example, allowing third-party access is an effective way to improve management performance of the downstream oil supply chain given the adequate residual capacity of the pipeline network (Yuan et al. </span><a aria-label="Reference 2019" data-dcnode-id="2237" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d269103676e3808" title="Yuan M, Zhang HR, Wang BH, et al. Future scenario of China’s downstream oil supply chain: an energy, economy and environment analysis for impacts of pipeline network reform. J Clean Prod. 2019;232:1513–28. 
https://doi.org/10.1016/j.jclepro.2019.05.340

."><span data-dcnode-id="2238" instrument_node="">2019</span></a><span data-dcnode-id="2236" instrument_node="">). The establishment of National Pipe Network Corporation in December 2019 separates pipeline transportation from production and sales, which is conducive to promoting market competition and improving the efficiency of resource allocation. Moreover, it is of great importance to establish a legal and judicial anti-monopoly system, along with encouraging the public (not only competing enterprises) to directly participate in the prosecution system for administrative monopolies (Sheng and Qian </span><a aria-label="Reference 2015" data-dcnode-id="2234" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d269103676e3811" title="Sheng H, Qian P. Opening up China’s markets of crude oil and petroleum products: theoretical research and reform solutions, vol. 9. Beijing: Social Science Academic Press, Series on Chinese Economics Research; 2015."><span data-dcnode-id="2235" instrument_node="">2015</span></a><span data-dcnode-id="2233" instrument_node="">).</span></p><p data-dcnode-id="2221"><span data-dcnode-id="2231" instrument_node="">Substantial progress has been made in opening up the petroleum market, but much more work remains to be done, especially in the petroleum products pricing mechanism (Lin and Liu </span><a aria-label="Reference 2013" data-dcnode-id="2229" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d269103676e3817" title="Lin BQ, Liu X. Reform of refined oil product pricing mechanism and energy rebound effect for passenger transportation in China. Energy Policy. 2013;57:329–37. 
https://doi.org/10.1016/j.enpol.2013.02.002

."><span data-dcnode-id="2230" instrument_node="">2013</span></a><span data-dcnode-id="2228" instrument_node="">). China’s existing pricing mechanism still lacks transparency. To improve the situation, the government can move to develop a more transparent market-based pricing system by setting clear rules and conditions or adopting automatically formula-based pricing methods (Paltsev and Zhang </span><a aria-label="Reference 2015" data-dcnode-id="2226" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d269103676e3820" title="Paltsev S, Zhang DW. Natural gas pricing reform in China: getting closer to a market system? Energy Policy. 2015;86:43–56. 
https://doi.org/10.1016/j.enpol.2015.06.027

."><span data-dcnode-id="2227" instrument_node="">2015</span></a><span data-dcnode-id="2225" instrument_node="">; Wang et al. </span><a aria-label="Reference 2016a" data-dcnode-id="2223" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d269103676e3823" title="Wang Y, Xiang E, Cheung A, et al. International oil price uncertainty and corporate investment: evidence from China’s emerging and transition economy. Energy Econ. 2016a;61:330–9. 
https://doi.org/10.1016/j.eneco.2016.11.024

."><span data-dcnode-id="2224" instrument_node="">2016a</span></a><span data-dcnode-id="2222" instrument_node="">). It should be noted that social protection measures in response to oil price reforms are also needed in case of their negative impacts on China’s macro-economy.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2219" id="Sec20"><span data-dcnode-id="2220" instrument_node="">Refining capacity elimination</span></h3><p data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Domestic oil refining capacity has been&nbsp;increasing because the local governments blindly support local refining and chemical enterprises. In order to eliminate this kind of overcapacity, the reform of the factor markets should be accelerated, weakening the dominant position of government in factor allocation. At the same time, the soft budgetary constraints should be further hardened, and the proportion of own funds in corporate investment should be raised to reduce risk externalization. Moreover, it is encouraged to improve local fiscal transparency and democratization, so that local government will focus more on social management, infrastructure and public service. Finally, it is expected to strengthen the financial constraint mechanism, incentive constraint mechanism and exit mechanism of state-owned enterprises, and to restrict the government from providing financial assistance to poorly run state-owned refineries.</span></p><p data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">As for the elimination of obsolete refining capacity, there are mainly two approaches: one is to close down existing refineries and build new refineries that meet stricter environmental standards; the other is to upgrade existing refining facilities with advanced technology. The latter is likely to be a more economical option for private enterprises. Moreover, the merger of small and medium-sized refineries is advocated, so as to achieve economies of scale. At the same time, the construction of integrated refining and chemical enterprises is encouraged to maximize the benefits of the industrial chain. Also, the government should call for more cooperation between private and state-owned refineries to improve resource utilization.</span></p><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">From a macroscopic point of view, it is significant to optimize the&nbsp;industrial layout and promote industrial intelligence for the whole industry’s efficiency. Firstly, petroleum refineries are encouraged to take the initiative to integrate traditional businesses with new and high technologies such as Big Data, Cloud Computing, Internet of Things and Artificial Intelligence. Secondly, more efforts are required on the research and development of low-carbon technologies including green exploitation and drilling. Lastly, petroleum enterprises should make use of&nbsp;their advantage in techniques and equipment in exploring and developing renewable energy. For instance, they can produce geothermal energy using abandoned oil and gas wells.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2211" id="Sec21"><span data-dcnode-id="2212" instrument_node="">Oil supply diversification</span></h3><p data-dcnode-id="2200"><span data-dcnode-id="2210" instrument_node="">Diversification is an effective way to avoid oil supply disruptions (Vivoda </span><a aria-label="Reference 2009" data-dcnode-id="2208" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d269103676e3849" title="Vivoda V. Diversification of oil import sources and energy security: a key strategy or an elusive objective? Energy Policy. 2009;37:4615–23. 
https://doi.org/10.1016/j.enpol.2009.06.007

."><span data-dcnode-id="2209" instrument_node="">2009</span></a><span data-dcnode-id="2207" instrument_node="">). Conventional approaches to diversifying oil supply include increasing domestic production, enriching sources of oil imports, enhancing overseas investment, and establishing strategic petroleum reserves. Abundant hydrocarbon resources characterize China, but they are not evenly distributed. Accordingly, more efforts should be made to explore and exploit oil-rich zones, particularly in China’s eight major basins. These basins are located in Songliao, Bohai Bay, Sichuan, Erdos, Tarim, Junggar, Qaidam and the Pearl River Mouth, respectively. Moreover, developing unconventional oil can boost domestic production in the long run. To produce more unconventional oil, eliminating related technical barriers as soon as possible is necessary, of which the key lies in the construction of pilot areas for research and development of low-permeability tight oil reservoirs and shale oil reservoirs (Fu </span><a aria-label="Reference 2014" data-dcnode-id="2205" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d269103676e3852" title="Fu CY. China’s shale gas and shale oil resources: opportunities and challenges. Energy Explor Exploit. 2014;32:759–70. 
https://doi.org/10.1260/0144-5987.32.5.759

."><span data-dcnode-id="2206" instrument_node="">2014</span></a><span data-dcnode-id="2204" instrument_node="">; Chen et al. </span><a aria-label="Reference 2016" data-dcnode-id="2202" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d269103676e3855" title="Chen JJ, Wang N, Tang HJ, et al. Impact of sustained low oil prices on China’s oil &amp; gas industry system and coping strategies. Nat Gas Ind. 2016;3:181–6. 
https://doi.org/10.1016/j.ngib.2016.05.001

."><span data-dcnode-id="2203" instrument_node="">2016</span></a><span data-dcnode-id="2201" instrument_node="">).</span></p><p data-dcnode-id="2192"><span data-dcnode-id="2199" instrument_node="">Expanding China’s petroleum trading network by promoting diversifying its sources of oil imports is vital for the stability of the oil supply. Current sources of China’s oil imports mainly include Russia, Saudi Arabia, Angola, Iraq and Oman, from which oil imports account for over half of total imports. In the future, increasing more imports from politically stable regions with abundant resources like Canada is necessary (Sun et al. </span><a aria-label="Reference 2014" data-dcnode-id="2197" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d269103676e3861" title="Sun M, Gao GX, Shen B. Quantifying China’s oil import risks and the impact on the national economy. Energy Policy. 2014;67:605–11. 
https://doi.org/10.1016/j.enpol.2013.12.061

."><span data-dcnode-id="2198" instrument_node="">2014</span></a><span data-dcnode-id="2196" instrument_node="">). Moreover, it is suggested to reduce the reliance on high-risk routes such as the Malacca Strait and actively promote the construction of transnational oil pipelines such as China-Russian, China-Kazakhstan, and maybe China-Myanmar pipelines to facilitate oil transport (Sun et al. </span><a aria-label="Reference 2014" data-dcnode-id="2194" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d269103676e3864" title="Sun M, Gao GX, Shen B. Quantifying China’s oil import risks and the impact on the national economy. Energy Policy. 2014;67:605–11. 
https://doi.org/10.1016/j.enpol.2013.12.061

."><span data-dcnode-id="2195" instrument_node="">2014</span></a><span data-dcnode-id="2193" instrument_node="">).</span></p><p data-dcnode-id="2178"><span data-dcnode-id="2191" instrument_node="">Overseas petroleum investment is also regarded as one of the essential means to address growing energy security concerns (Wu </span><a aria-label="Reference 2014" data-dcnode-id="2189" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d269103676e3870" title="Wu K. China’s energy security: oil and gas. Energy Policy. 2014;74:4–11. 
https://doi.org/10.1016/j.enpol.2014.05.040

."><span data-dcnode-id="2190" instrument_node="">2014</span></a><span data-dcnode-id="2188" instrument_node="">). At present, the investment has been mainly led by NOCs such as CNPC, SINOPEC and CNOOC. In recent years, it has made much progress. For example, CNPC’s crude oil production from overseas projects reached 23.0 million tonnes in 2019, up 8.3% from 2018 (CNPC </span><a aria-label="Reference 2020" data-dcnode-id="2186" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d269103676e3873" title="China National Petroleum Corporation (CNPC). Annual report in 2019. 
http://www.petrochina.com.cn/petrochina/ndbg/202003/597a083311044a799810ed977488f803/files/20d26be30d3b43239ddb773e4e1b3a94.pdf

. Accessed Mar 2020."><span data-dcnode-id="2187" instrument_node="">2020</span></a><span data-dcnode-id="2185" instrument_node="">). Nonetheless, it is still of great importance to improve the&nbsp;competitiveness of Chinese NOCs with international petroleum companies (Sun et al. </span><a aria-label="Reference 2017a" data-dcnode-id="2183" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d269103676e3876" title="Sun CW, Luo Y, Huang Y, et al. A comparative study on the production efficiencies of China’s oil companies: a true fixed effect model considering the unobserved heterogeneity. J Clean Prod. 2017a;154:341–52. 
https://doi.org/10.1016/j.jclepro.2017.03.222

."><span data-dcnode-id="2184" instrument_node="">2017a</span></a><span data-dcnode-id="2182" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="2180" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d269103676e3879" title="Sun XL, Liu C, Chen XW, Li JP. Modeling systemic risk of crude oil imports: case of China’s global oil supply chain. Energy. 2017b;121:449–65. 
https://doi.org/10.1016/j.energy.2017.01.018

."><span data-dcnode-id="2181" instrument_node="">b</span></a><span data-dcnode-id="2179" instrument_node="">). Especially, relying on the initiative of One Belt and One Road (OBOR), China should take an active part in the development of petroleum resources in those countries along OBOR. Notably, many overseas investment decisions by Chinese NOCs have been misguided in commercial terms due to their non-commercial obligations. Even though securing oil supply to China should be given priority, keeping Chinese NOCs efficient and competitive is extremely important in the long term, which is helpful for their sustainable development and the expansion of China’s influence in the international oil market.</span></p><p data-dcnode-id="2173"><span data-dcnode-id="2177" instrument_node="">The necessity to establish state strategic petroleum reserves and enterprise strategic petroleum reserves should be emphasized. Sufficient SPR is critical for addressing supply shortages over a short time. China intends to increase its SPR to 90&nbsp;days of net imports over the&nbsp;future 15&nbsp;years, reported in&nbsp;its published policies about SPR (Li et al. </span><a aria-label="Reference 2017" data-dcnode-id="2175" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d269103676e3885" title="Li H, Sun RJ, Dong KY, et al. Selecting China’s strategic petroleum reserve sites by multi-objective programming model. Pet Sci. 2017;14:622–35. 
https://doi.org/10.1007/s12182-017-0175-0

."><span data-dcnode-id="2176" instrument_node="">2017</span></a><span data-dcnode-id="2174" instrument_node="">). It is ideal to purchase SPR at the lowest price. Moreover, SPR location is considered to be crucial for the timely supply of oil and is&nbsp;determined by many factors. These factors include construction and transportation costs, distance from major oil-consuming cities, geological conditions and supporting infrastructure. Accordingly, it is recommended to keep caution in SPR site selection and do a cost-benefit analysis.</span></p><p data-dcnode-id="2168"><span data-dcnode-id="2172" instrument_node="">China’s energy efficiency has been at a low level, without any significant improvement (Xie et al. </span><a aria-label="Reference 2015" data-dcnode-id="2170" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d269103676e3892" title="Xie W, Sheng PF, Guo XH. Coal, oil, or clean energy: Which contributes most to the low energy efficiency in China? Util Policy. 2015;35:67–71. 
https://doi.org/10.1016/j.jup.2015.05.003

."><span data-dcnode-id="2171" instrument_node="">2015</span></a><span data-dcnode-id="2169" instrument_node="">). Therefore, apart from the above four ways, energy efficiency improvement can also greatly contribute to a decline in pressure on oil supply and external dependency. What’s most important is that nearly all the given solutions have costs, especially increasing domestic oil production. Further work is still needed to explore the development priorities of these options and the optimal development scale, such as the optimal scale of SPR, in order to ensure stable oil supply at the lowest costs.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2166" id="Sec22"><span data-dcnode-id="2167" instrument_node="">Anti-risk capability improvement</span></h3><p data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Faced with volatile international oil prices, Chinese petroleum enterprises should improve their ability to cope with price risks. In particular, due to the ongoing US-China trade war and global political tensions, international oil markets will experience a hard period. To address this issue, domestic petroleum enterprises should learn to use financial derivatives to control oil price risks, and the Chinese government should improve the domestic oil derivatives market and launch oil options as soon as possible.</span></p></div></div></section><section data-dcnode-id="2152" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="2153" id="Sec23-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2159" id="Sec23"><span data-dcnode-id="2160" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="2154" id="Sec23-content"><p data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Petroleum industry plays a vital role in the foundation of the national economy of China. Despite the fact that several reforms were implemented successfully in the past decades, there are still some unresolved problems. Moreover, with the new-normal economy, transition to green energy and international trade disputes, new challenges and problems are emerging. This study presents current challenges and corresponding measures through a review of the historical development of China’s petroleum industry.</span></p><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">The historical overview of China’s petroleum market is conducted from the aspects of administration, industrial and market structures, oil imports and pricing mechanisms, and five challenges are summarized, namely lack of marketization, excess oil refining capacity, high external dependency, environment pollution and unstable international trading relationship. To address the challenges and problems, the corresponding countermeasures are proposed. Firstly, it is encouraged to promote market reform, as well as establish a more transparent market-based pricing system by setting clear rules and conditions or adopting automatically formula-based pricing methods. Secondly, the Chinese government should call for the merger of small and medium-sized refineries and the construction of integrated refining and chemical enterprises, thereby to accelerate the phase-out of obsolete refining capacity. Thirdly, diversification of the oil supply sources can be contributed by increasing domestic production, enriching the source of oil imports, enhancing overseas investment and establishing strategic petroleum reserves. Last but not least, domestic petroleum enterprises’ anti-risk capability should be improved in response to volatile oil prices brought by international trade disputes.</span></p></div></div></section><span data-dcnode-id="2151" instrument_node="">
