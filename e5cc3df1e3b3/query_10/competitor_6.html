th rates, to provide a richer portrait of economic consequences of the TSS reform, we also explore the impact on GDP levels. Next, we show that changing the economic outcome of interest does not resolve the concerns about using endogenous proxies for fiscal federalism.</span></p><div data-dcnode-id="3229"><p data-dcnode-id="3607" id="p0250"><span data-dcnode-id="3611" instrument_node="">Following the same basic argument as with growth rates, we start with the simple relationships between GDP per capita and proxies for fiscal federalism using revenue and expenditure measures in </span><a class="workspace-trigger" data-dcnode-id="3609" href="#t0025" name="bt0025"><span data-dcnode-id="3610" instrument_node="">Table 5</span></a><span data-dcnode-id="3608" instrument_node="">. As with growth rates, revenue-based measures of fiscal decentralization are correlated with lower levels of GDP per capita, while our expenditure-based measure of fiscal decentralization is associated with higher GDP levels per capita. In all cases, measures are highly statistically significant.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3230" id="t0025"><span class="captions" data-dcnode-id="3597"><span data-dcnode-id="3598" id="ca0055"><p data-dcnode-id="3599" id="sp0075"><span class="label" data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">Table 5</span></span><span data-dcnode-id="3604" instrument_node="">. </span><span data-dcnode-id="3603" instrument_node="">Endogenous measures of </span><a class="topic-link" data-dcnode-id="3601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/fiscal-relations" title="Learn more about fiscal federalism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3602" instrument_node="">fiscal federalism</span></a><span data-dcnode-id="3600" instrument_node=""> and economic activity.</span></p></span></span d="3270"><span data-dcnode-id="3271" instrument_node="">0.780</span></td><td data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">0.768</span></td></tr><tr data-dcnode-id="3244"><th data-dcnode-id="3265" scope="row"><span data-dcnode-id="3266" instrument_node="">F</span></th><td data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">3.195</span></td><td data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">41.75</span></td><td data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">24.65</span></td><td data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">689.5</span></td><td data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">469.4</span></td><td data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">122.2</span></td><td data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">448.9</span></td><td data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">321.0</span></td><td data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">338.2</span></td><td data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">318.4</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="3231"></p><p data-dcnode-id="3232" id="sp0080"><span data-dcnode-id="3240" instrument_node="">Notes: Dependent variable is ln (GDP per capita). </span><a class="topic-link" data-dcnode-id="3238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/measure-of-dispersion" title="Learn more about Standard errors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3239" instrument_node="">Standard errors</span></a><span data-dcnode-id="3233"><span data-dcnode-id="3237" instrument_node=""> in parentheses. *(p &lt; .10), **(p &lt; .05), ***(p &lt; .01), ****(p &lt; .001) All measures of Fiscal Federalism are measured as ratios. All expenditure variables measured in 100 Million </span><a class="topic-link" data-dcnode-id="3235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/renminbi" title="Learn more about Yuan from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3236" instrument_node="">Yuan</span></a><span data-dcnode-id="3234" instrument_node="">.</span></span></p><p></p></div></div><p data-dcnode-id="3227" id="p0255"><span data-dcnode-id="3228" instrument_node="">Focusing more specifically on each proxy of fiscal federalism, Columns (4) through (8) demonstrates that local to central total revenue is robust to additional controls. The patterns are very similar to those found for growth rates above. While controls reduce the estimated effect by about half, and explain nearly 80% of observed variation in GDP per capita, the general conclusion holds - fiscal decentralization decreased GDP per capita levels. Column (9) reports the preferred specification focusing on tax revenue instead of total revenue. The estimated coefficient on this revenue-based measure of fiscal federalism is negative and highly statistically significant, and while controls reduce the point estimate by about two-thirds (and explain about 80% of the variation), the negative relationship between revenue-based proxies of fiscal federalism and GDP per capita levels is confirmed.</span></p><p data-dcnode-id="3225" id="p0260"><span data-dcnode-id="3226" instrument_node="">Expenditure-based proxy results, however, tell the opposite story. As with the growth rate analysis, revenue and expenditure proxies differ in the estimated effects. The point estimate for local to central expenditure is always positive and highly statistically significant, robust to the inclusion of control variables, and accounts for nearly 80% of observed variation in log GDP per capita (results not reported). In the most preferred specifications (Column 10), the absolute value of the estimated effect based on expenditures is nearly identical to the absolute value of the estimated effect based on tax revenues - but with the opposite sign. Once again, endogenous proxy measures of fiscal federalism tell conflicting and unreliable stories about the economic impact of reform since the reform under consideration had differential effects on revenue and expenditures.</span></p><div data-dcnode-id="3047"><p data-dcnode-id="3220" id="p0265"><span data-dcnode-id="3224" instrument_node="">To reinforce these concerns, </span><a class="workspace-trigger" data-dcnode-id="3222" href="#t0030" name="bt0030"><span data-dcnode-id="3223" instrument_node="">Table 6</span></a><span data-dcnode-id="3221" instrument_node=""> reproduces the before and after approach utilized above for growth rates. Again, proxies for fiscal federalism are not robust to sample period selection. In some cases, estimated coefficients lose significance, while in other cases, estimated coefficients switch signs. Overall, the conflicting evidence strongly pushes against trying to use endogenous proxy variables to measure the impact of fiscal federalism. Instead, we proceed using our preferred quasi-experimental approach.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3048" id="t0030"><span class="captions" data-dcnode-id="3210"><span data-dcnode-id="3211" id="ca0060"><p data-dcnode-id="3212" id="sp0085"><span class="label" data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">Table 6</span></span><span data-dcnode-id="3217" instrument_node="">. </span><span data-dcnode-id="3216" instrument_node="">Measures of </span><a class="topic-link" data-dcnode-id="3214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/fiscal-relations" title="Learn more about fiscal federalism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id= e"><span data-dcnode-id="2829" instrument_node="">F</span></mi><msub data-dcnode-id="2823" is="true"><mi data-dcnode-id="2826" is="true"><span data-dcnode-id="2827" instrument_node="">E</span></mi><mi data-dcnode-id="2824" is="true"><span data-dcnode-id="2825" instrument_node="">t</span></mi></msub><mo data-dcnode-id="2821" is="true"><span data-dcnode-id="2822" instrument_node="">+</span></mo><msub data-dcnode-id="2816" is="true"><mi data-dcnode-id="2819" is="true"><span data-dcnode-id="2820" instrument_node="">ϵ</span></mi><mi data-dcnode-id="2817" is="true" mathvariant="italic"><span data-dcnode-id="2818" instrument_node="">st</span></mi></msub></math></span></span></span></span></span></p><p data-dcnode-id="2793" id="p0275"><span data-dcnode-id="2806" instrument_node="">Where subscript </span><em data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">s</span></em><span data-dcnode-id="2803" instrument_node=""> refers to the province and </span><em data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">t</span></em><span data-dcnode-id="2800" instrument_node=""> refers to the year. Based on observed locality heterogeneity across space and time, we include locality and year fixed effects as well as time-varying controls. Our DID estimate is captured by the coefficient </span><em data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">δ</span></em><sub data-dcnode-id="2795"><em data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">DID</span></em></sub><span data-dcnode-id="2794" instrument_node="">.</span></p><div data-dcnode-id="2759"><p data-dcnode-id="2784" id="p0280"><span data-dcnode-id="2792" instrument_node="">The difference-in-difference approach sidesteps concerns over endogenous proxies, but requires a large enough national experience to precisely estimate effects (if they exist). </span><a class="workspace-trigger" data-dcnode-id="2790" href="#f0025" name="bf0025"><span data-dcnode-id="2791" instrument_node="">Fig. 5</span></a><span data-dcnode-id="2785"><span data-dcnode-id="2789" instrument_node=""> shows the magnitude of the TSS reform when it was implemented nationally in 1994. The share of local revenue to central revenue decreased by nearly 30 percentage points, emphasizing just how large a reform experience TSS truly was for fiscal federalism. Anecdotal evidence suggests that not only was the reform large, but that it did in fact matter for growth. The simple growth rate average for the treatment group was 16.7% from 1992 to 1999, compared to the control group, which grew at 15.7%. Such simple </span><a class="topic-link" data-dcnode-id="2787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/descriptive-statistics" title="Learn more about descriptive statistics from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2788" instrument_node="">descriptive statistics</span></a><span data-dcnode-id="2786" instrument_node=""> are intriguing, but to tease out causal estimates requires a more careful identification strategy.</span></span></p><figure class="figure text-xs" data-dcnode-id="2760" id="f0025"><span data-dcnode-id="2768"><img alt="Fig. 5" aria-describedby="ca0025" data-dcnode-id="2783" height="356" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X18301056-gr5.jpg&amp;raw"><span data-dcnode-id="2782" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2769"><li data-dcnode-id="2776"><a class="anchor download-link u-font-sans" data-dcnode-id="2777" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X18301056-gr5_lrg.jpg" target="_blank" title="Download high-res image (202KB)"><span class="anchor-text" data-dcnode-id="2778"><span data-dcnode-id="2781" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">Download high-res image (202KB)</span></span></span></a></li><li data-dcnode-id="2770"><a class="anchor download-link u-font-sans" data-dcnode-id="2771" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X18301056-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2772"><span data-dcnode-id="2775" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2761"><span data-dcnode-id="2762" id="ca0025"><p data-dcnode-id="2763" id="sp0025"><span class="label" data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">Fig. 5</span></span><span data-dcnode-id="2765" instrument_node="">. </span><span data-dcnode-id="2764" instrument_node="">Share of local revenues and expenditures to central revenues and expenditures.</span></p></span></span></figure></div><div data-dcnode-id="2269"><p data-dcnode-id="2754" id="p0285"><span data-dcnode-id="2758" instrument_node="">We start our DID analysis by considering a locality as treated if the locality received at least some treatment. This includes localities where some cities received treatment even though the entire locality did not receive treatment initially. </span><a class="workspace-trigger" data-dcnode-id="2756" href="#t0035" name="bt0035"><span data-dcnode-id="2757" instrument_node="">Table 7</span></a><span data-dcnode-id="2755" instrument_node=""> estimates the treatment effect to be 0.6 percentage points in Column 1, but not statistically significant. As discussed above, however, there is significant heterogeneity in localities, and over time, which should not be attributed to treatment directly. Columns (2) through (6) include time-varying controls, with no effect on statistical significance, although the point estimate more than doubles when all controls are included.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="2270" id="t0035"><span class="captions" data-dcnode-id="2745"><span data-dcnode-id="2746" id="ca0065"><p data-dcnode-id="2747" id="sp0095"><span class="label" data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">Table 7</span></span><span data-dcnode-id="2751" instrument_node="">. </span><a class="topic-link" data-dcnode-id="2749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/difference-in-differences" title="Learn more about Difference in difference from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2750" instrument_node="">Difference in difference</span></a><span data-dcnode-id="2748" instrument_node="">.</span></p></span></span><div class="groups" data-dcnode-id="2281"><table data-dcnode-id="2282"><thead data-dcnode-id="2717"><tr class="rowsep-1 valign-top" data-dcnode-id="2718"><th data-dcnode-id="2743" scope="col"><span data-dcnode-id="2744" instrument_node="">Growth rate (per capita)</span></th><th data-dcnode-id="2741" scope="col"><span data-dcnode-id="2742" instrument_node="">(1)</span></th><th data-dcnode-id="2739" scope="col"><span data-dcnode-id="2740" instrument_node="">(2)</span></th><th data-dcnode-id="2737" scope="col"><span data-dcnode-id="2738" instrument_node="">(3)</span></th><th data-dcnode-id="2735" scope="col"><span data-dcnode-id="2736" instrument_node="">(4)</span></th><th data-dcnode-id="2733" scope="col"><span data-dcnode-id="2734" instrument_node="">(5)</span></th><th data-dcnode-id="2731" scope="col"><span data-dcnode-id="2732" instrument_node="">(6)</span></th><th data-dcnode-id="2729" scope="col"><span data-dcnode-id="2730" instrument_node="">(7)</span></th d="2313" instrument_node="">0.814</span></td><td data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">0.812</span></td></tr><tr data-dcnode-id="2284"><th data-dcnode-id="2307" scope="row"><span data-dcnode-id="2308" instrument_node="">F</span></th><td data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">5.398</span></td><td data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">14.12</span></td><td data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">11.58</span></td><td data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">4.791</span></td><td data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">9.248</span></td><td data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">26.04</span></td><td data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">65.01</span></td><td data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">37.79</span></td><td data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">37.90</span></td><td data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">37.14</span></td><td data-dcnode-id="2286"></td><td data-dcnode-id="2285"></td></tr></tbody></table></div><p class="legend" data-dcnode-id="2271"></p><p data-dcnode-id="2272" id="sp0100"><span data-dcnode-id="2280" instrument_node="">Notes: Dependent variable is per capita growth rate. Robust </span><a class="topic-link" data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/measure-of-dispersion" title="Learn more about Standard errors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2279" instrument_node="">Standard errors</span></a><span data-dcnode-id="2273"><span data-dcnode-id="2277" instrument_node=""> in parentheses. *(p &lt; .10), **(p &lt; .05), ***(p &lt; .01), ****(p &lt; .001) Treatment variables are interaction terms composed of group receiving treatment and post-treatment indicator. Dummies for post-treatment and treatment group are included in regression but not reported in table. Any treatment includes all localities that received at least some treatment. Full treatment considers only localities that were completely treated. Partial treatment are those localities where only part of the localities was treated. Control variables are measured in per capita growth rates. The FRS and </span><a class="topic-link" data-dcnode-id="2275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/intergovernmental-transfers" title="Learn more about TSS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2276" instrument_node="">TSS</span></a><span data-dcnode-id="2274" instrument_node=""> periods cover 1985–1999.</span></span></p><p></p></div></div><p data-dcnode-id="2267" id="p0290"><span data-dcnode-id="2268" instrument_node="">However, once year and province fixed effects are included, the point estimate of treatment on locality growth rates per capita is positive and statistically significant. The full DID model (Column (8)) estimates the impact of treatment to be 1.7 percentage points and is statistically significant. For comparative purposes, average per capita growth rates during the FRS period were 11.9%, implying that TSS treatment increased per capita growth rates by around 14%. Localities that experienced the TSS treatment first grew faster than localities that received treatment later, and the estimated effect is economically significant.</span></p><p data-dcnode-id="2259" id="p0295"><span data-dcnode-id="2266" instrument_node="">While the results in </span><a class="workspace-trigger" data-dcnode-id="2264" href="#t0035" name="bt0035"><span data-dcnode-id="2265" instrument_node="">Table 7</span></a><span data-dcnode-id="2263" instrument_node=""> are notable, one concern is that treatment heterogeneity might be confounding the estimated effects. To address this concern, we restrict treatment to only those localities that fully received treatment and consider partially treated localities as part of the control group. The same basic patterns emerge for full treatment only (unreported results available upon request). The preferred specification, reported in Column (9) of </span><a class="workspace-trigger" data-dcnode-id="2261" href="#t0035" name="bt0035"><span data-dcnode-id="2262" instrument_node="">Table 7</span></a><span data-dcnode-id="2260" instrument_node="">, suggests that full treatment localities saw their growth rate increase by 2.1 percentage points compared to localities that adopted TSS later. Compared to FRS average per capita growth rates, full TSS treatment increased per capita growth rates by over 17%.</span></p><p data-dcnode-id="2257" id="p0300"><span data-dcnode-id="2258" instrument_node="">To separately consider the effect of partial treatment (since these localities experience some treatment early), we break treatment up in to three distinct groups: full treatment, partial treatment, and no treatment (control). Again, unreported patterns are nearly identical to the previous results. The most preferred specification (Column (10)) confirms the estimated full treatment effect of 2.2 percentage points (and statistically significant). The partial treatment effect is estimated at 1.0 percentage points, but is not statistically significant. Given the heterogeneity within localities, the result suggestively reinforces the view that TSS treatment positively affected per capita growth, even when only partially applied.</span></p><div data-dcnode-id="2227"><p data-dcnode-id="2252" id="p0305"><span data-dcnode-id="2256" instrument_node="">An additional concern remains regarding the definition of treatment timing. Treatment localities implemented TSS in 1992, while all other localities implemented TSS in 1994. Thus far, we have defined post-treatment as any year after 1992 even though all localities adopted TSS by 1994. This is a conservative approach in that it allows for first-mover or hysteresis effects, or if TSS adoption impacts growth with a lag, but if no such effects exists, our definition of treatment would underestimate the true effect since it would reduce across-group heterogeneity. An alternative approach would be to define treatment as occurring only in 1992 and 1993, since in 1994 all localities adopted TSS. However, this approach would bias the estimates if the impact of TSS was felt with a lag. For anecdotal evidence that TSS adoption did impact growth with a lag, </span><a class="workspace-trigger" data-dcnode-id="2254" href="#f0030" name="bf0030"><span data-dcnode-id="2255" instrument_node="">Fig. 6</span></a><span data-dcnode-id="2253" instrument_node=""> plots year-by-year growth rates for treatment and control groups starting in 1992. While not definitive, the descriptive statistics suggest that TSS adoption did not impact growth for treatment groups until 1993, and then for control groups in 1995.</span></p><figure class="figure text-xs" data-dcnode-id="2228" id="f0030"><span data-dcnode-id="2236"><img alt="Fig. 6" aria-describedby="ca0030" data-dcnode-id="2251" height="356" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X18301056-gr6.jpg&amp;raw"><span data-dcnode-id="2250" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2237"><li data-dcnode-id="2244"><a class="anchor download-link u-font-sans" data-dcnode-id="2245" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X18301056-gr6_lrg.jpg" target="_blank" title="Download high-res image (124KB)"><span class="anchor-text" data-dcnode-id="2246"><span data-dcnode-id="2249" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">Download high-res image (124KB)</span></span></span></a></li><li data-dcnode-id="2238"><a class="anchor download-link u-font-sans" data-dcnode-id="2239" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X18301056-gr6.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2240"><span data-dcnode-id="2243" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2229"><span data-dcnode-id="2230" id="ca0030"><p data-dcnode-id="2231" id="sp0030"><span class="label" data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Fig. 6</span></span><span data-dcnode-id="2233" instrument_node="">. </span><span data-dcnode-id="2232" instrument_node="">Post-treatment impact - growth rate (per capita) group average.</span></p></span></span></figure></div><p data-dcnode-id="2225" id="p0310"><span data-dcnode-id="2226" instrument_node="">To show the robustness of the results, we estimate the treatment effect using two alternative definitions of treatment, first with the most strict definition (1992 and 1993), and then a looser definition allowing for a year lag in implementation (1993 and 1994). The estimate reported in column (11) shows that our more conservative approach may underestimate the true effect substantially. When we restrict treatment to just 1992 and 1993, the estimated impact is 3.99 percentage points and is statistically significant. In column (12), we allow for a one-year lag between TSS implementation and growth impacts, and estimate the effect of TSS to be 3.06 percentage points. Both estimates are notably larger than our preferred estimate, but as we do not want to take a stand on the lag structure of the impact of TSS, we prefer the estimate in column (10), which can be treated as lower bound for the impact of TSS on growth rates.</span></p><p data-dcnode-id="2223" id="p0315"><span data-dcnode-id="2224" instrument_node="">Summing up the results on per capita economic growth rates, we find that while traditional approaches to estimating the impact of fiscal federalism depend upon unreliable endogenous proxies, when the institutional structure of TSS reform is exploited with a difference-in-difference estimator, the causal effect of TSS on per capita growth rates is large and statistically significant, representing a 18% increase compared to per capita growth rates during the FRS period.</span></p><div data-dcnode-id="1737"><p data-dcnode-id="2218" id="p0320"><span data-dcnode-id="2222" instrument_node="">As an alternative measure of economic activity, </span><a class="workspace-trigger" data-dcnode-id="2220" href="#t0040" name="bt0040"><span data-dcnode-id="2221" instrument_node="">Table 8</span></a><span data-dcnode-id="2219" instrument_node=""> considers all localities that received at least some treatment as treated, and we find that fiscal federalism treatment increases GDP per capita levels. While the same general tendency was identified with growth rates, the levels analysis has the added benefit that in the most preferred specification (Column (9)), TSS treatment is significant at the 0.1% level. The DID estimate implies that TSS treatment lead to a 8% increase in per capita GDP, or 133 Yuan per person compared to median per capita GDP level of 1657 Yuan in 1991.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="1738" id="t0040"><span class="captions" data-dcnode-id="2209"><span data-dcnode-id="2210" id="ca0070"><p data-dcnode-id="2211" id="sp0105"><span class="label" data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">Table 8</span></span><span data-dcnode-id="2215" instrument_no a-dcnode-id="1803" instrument_node="">0.544</span></td><td data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">0.641</span></td><td data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">0.780</span></td><td data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">0.556</span></td><td data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">0.709</span></td><td data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">0.557</span></td><td data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">0.798</span></td><td data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">0.843</span></td><td data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">0.992</span></td><td data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">0.992</span></td><td data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">0.992</span></td></tr><tr data-dcnode-id="1756"><th data-dcnode-id="1779" scope="row"><span data-dcnode-id="1780" instrument_node="">F</span></th><td data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">176.0</span></td><td data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">173.7</span></td><td data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">305.9</span></td><td data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">125.1</span></td><td data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">211.5</span></td><td data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">142.6</span></td><td data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">181.0</span></td><td data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">121.8</span></td><td data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">1687.4</span></td><td data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">1891.7</span></td><td data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">1908.2</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="1739"></p><p data-dcnode-id="1740" id="sp0110"><span data-dcnode-id="1752" instrument_node="">Notes: Dependent variable is ln (GDP per capita). Robust </span><a class="topic-link" data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/measure-of-dispersion" title="Learn more about Standard errors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1751" instrument_node="">Standard errors</span></a><span data-dcnode-id="1741"><span data-dcnode-id="1749" instrument_node=""> in parentheses. *(p &lt; .10), **(p &lt; .05), ***(p &lt; .01), ****(p &lt; .001) Treatment variables are interaction terms composed of group receiving treatment and post-treatment indicator. Dummies for post-treatment and treatment group are included in regression but not reported in table. Any treatment includes all localities that received at least some treatment. Full treatment considers only localities that were completely treated. Partial treatment are those localities where only part of the localities was treated. Control variables are in per capita terms, and measured in 100 Million </span><a class="topic-link" data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/renminbi" title="Learn more about Yuan from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1748" instrument_node="">Yuan</span></a><span data-dcnode-id="1742"><span data-dcnode-id="1746" instrument_node="">, except for population which is measured in millions. The FRS and </span><a class="topic-link" data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/intergovernmental-transfers" title="Learn more about TSS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1745" instrument_node="">TSS</span></a><span data-dcnode-id="1743" instrument_node=""> periods cover 1985–1999.</span></span></span></p><p></p></div></div><p data-dcnode-id="1735" id="p0325"><span data-dcnode-id="1736" instrument_node="">Columns (10) and (11) break treatment up into full and partial treatment, and confirm the growth findings. The full treatment effect is larger (11.5% and 11.7% respectively) and highly statistically significant. The partial treatment effect is positive (2.6%), but not statically significant, mirroring the growth results. Overall, the model explains nearly all of the observed variation in locality GDP per capita levels. The implied causal TSS full treatment effect equates to 194 Yuan per person (compared to 1991 per capita GDP levels).</span></p></section></section><section data-dcnode-id="1715" id="s0030"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1729" id="st0045"><span data-dcnode-id="1732" instrument_node="">4</span><span data-dcnode-id="1731" instrument_node="">. </span><span data-dcnode-id="1730" instrument_node="">Conclusion</span></h2><p data-dcnode-id="1720" id="p0330"><span data-dcnode-id="1728" instrument_node="">This paper looked at a particular fiscal experiment in the evolution of the system of </span><a class="topic-link" data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/fiscal-relations" title="Learn more about fiscal federalism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1727" instrument_node="">fiscal federalism</span></a><span data-dcnode-id="1721"><span data-dcnode-id="1725" instrument_node=""> in China. The importance of the question derives from the fact that fiscal federalism has been credited for the growth trajectory that took China above Japan to rank as the second largest economy in the world. Taking everything together, a coherent story concerning the particular fiscal experiment, namely the </span><a class="topic-link" data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/intergovernmental-transfers" title="Learn more about TSS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1724" instrument_node="">TSS</span></a><span data-dcnode-id="1722" instrument_node=""> reform, emerges.</span></span></p><p data-dcnode-id="1718" id="p0335"><span data-dcnode-id="1719" instrument_node="">While traditional approaches focused on endogenous proxies of fiscal centralization find conflicting and fragile results, our quasi-experimental approach utilizing a large-scale policy experiment in China with staggered timing to implementation provides consistent and robust estimates. Following the traditional literature's focus on growth rates, we find that treatment increased growth rates by economically meaningful amounts, and estimates were robust to alternative specifications and controls.</span></p><p data-dcnode-id="1716" id="p0340"><span data-dcnode-id="1717" instrument_node="">Having shown that the TSS reform was in fact successful in raising growth rates and levels of economic activity, this paper remains silent about the particular mechanisms responsible for this causal link. The increase in revenues for the central government brought about by TSS reform allows the central government to internalize externalities associated with public goods provision, coordinate economic activity across disparate regions, provide fiscal support for macroeconomic stability, and provide insurance in response to asymmetric shocks. Future work will explore these mechanisms in greater depth to better understand the optimal level of fiscal federalism in China.</span></p></section></div></d noir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S096014812200074X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="541" id="citing-articles-article0-title"><span data-dcnode-id="542" instrument_node="">Fiscal decentralization as new determinant of renewable energy demand in China: The role of income inequality and urbanization</span></h3></a><div class="article-source ellipsis" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">2022, Renewable Energy</span></div></div><div class="buttons" data-dcnode-id="531"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="532" type="button"><span class="button-link-text" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="533" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="534"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="526"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="527" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="528"><p data-dcnode-id="529" id="abspara0010"><span data-dcnode-id="530" instrument_node="">This paper examines the nexus between fiscal decentralization and renewable energy demand by including income inequality, economic growth, urbanization, and economic globalization as the main determinants in the energy demand function for the case of China. Quarterly frequency data for the period 1980–2018 are used for empirical analysis. Our empirical results show fiscal decentralization positively impacts the demand for renewable energy; in other words, fiscal decentralization can help increase renewable energy demand. In addition, income inequality is negatively linked to renewable energy consumption, while economic growth is positively associated with renewable energy demand. Urbanization and economic globalization add to renewable energy consumption. This study presents Chinese authorities with new guidelines for using fiscal decentralization as an economic tool to formulate effective energy policies for long-term development of the use of renewable energy sources.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="501"><div class="sub-heading" data-dcnode-id="519"><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1018364721001865" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="523" id="citing-articles-article1-title"><span data-dcnode-id="524" instrument_node="">An empirical analysis on spatial effects of environmental protection</span></h3></a><div class="article-source ellipsis" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">2021, Journal of King Saud University - Science</span></div></div><div class="buttons" data-dcnode-id="513"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="514" type="button"><span class="button-link-text" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="515" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="516"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="502"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="503" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="504"><p data-dcnode-id="511" id="sp0005"><span data-dcnode-id="512" instrument_node="">The main objective is to provide policy recommendations on the enhancement of ecological environmental protection.</span></p><p data-dcnode-id="509" id="sp0010"><span data-dcnode-id="510" instrument_node="">Combined with spatial correlation analysis and spatial dynamic panel models, this paper estimates the spatial effect of the local government’s environmental protection expenditure on the improvement of the ecological environment based on China’s 30 provinces as samples from 2007 to 2017.</span></p><p data-dcnode-id="507" id="sp0015"><span data-dcnode-id="508" instrument_node="">We find a significant impact of the environmental protection expenditure of the local government on the ecological environment improvement of neighbouring regions rather than the local region. It reveals a “free-riding” phenomenon in environmental governance. In addition, increasing the levels of economic development, urbanization, environmental regulations and industrial structure in the local region can effectively mitigate environmental pollution in the local region on one hand and contribute to the deterioration of the ecological environment in neighbouring regions on the other.</span></p><p data-dcnode-id="505" id="sp0020"><span data-dcnode-id="506" instrument_node="">The present study suggests that environmental regulations can significantly improve the local environment. The local governments at all levels must reinforce the supervision of the ecological protection areas to ensure the implementation of environmental regulations.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="483"><div class="sub-heading" data-dcnode-id="495"><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0040162521003188" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="499" id="citing-articles-article2-title"><span data-dcnode-id="500" instrument_node="">How does vertical fiscal imbalance affect the upgrading of industrial structure? Empirical evidence from China</span></h3></a><div class="article-source ellipsis" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">2021, Technological Forecasting and Social Change</span></div></div><div class="buttons" data-dcnode-id="489"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="490" type="button"><span class="button-link-text" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="491" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="492"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="484"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="485" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="486"><p data-dcnode-id="487" id="spara018"><span data-dcnode-id="488" instrument_node="">The vertical fiscal imbalance (VFI) caused by fiscal decentralization may have important implications on the upgrading of industrial structure. Based on the provincial panel data from 1995 to 2017 in China, this paper empirically studies the impact of VFI on the upgrading of industrial structure from the perspectives of regional heterogeneity, influence channels, and marginal effect. The empirical results show that: (1) VFI is not conducive to the rationalization and advancement of industrial structure, but this effect has significant regional heterogeneity. (2) VFI affects the upgrading of industrial structure through three channels, including investment-driven effect, market mechanism distortion effect, and technological innovation crowding effect. (3) With the increasing rationalization and advancement of industrial structure, the marginal restraining effect of VFI is gradually strengthened. Therefore, it is very necessary to control VFI between the central government and the local governments as much as possible for the upgrading of industrial structure.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="465"><div class="sub-heading" data-dcnode-id="477"><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1566014120302971" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="481" id="citing-articles-article3-title"><span data-dcnode-id="482" instrument_node="">Government-decentralized power: Measurement and effects</span></h3></a><div class="article-source ellipsis" data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">2021, Emerging Markets Review</span></div></div><div class="buttons" data-dcnode-id="471"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="472" type="button"><span class="button-link-text" data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="473" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="474"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="466"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="467" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="468"><p data-dcnode-id="469" id="sp0185"><span data-dcnode-id="470" instrument_node="">Using tools from computational linguistics, we construct a new measure of government-decentralized power faced by Chinese firms: the diversity between central and local government work reports. Using our measure, we document that government-decentralized power has an inverse U-shaped impact on investment efficiency (a U-shaped impact on investment inefficiency). Currently, government-decentralized power is below its optimal level. The underlying mechanisms are yardstick competition among local governments and the election effect of political officials, which dominate the preference-matching effect in support of decentralization. Furthermore, local governments present broadly positive sentiment in their reports. This strengthens the negative impact of inadequate government-decentralized power.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="447"><div class="sub-heading" data-dcnode-id="459"><a data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0048969720307488" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="463" id="citing-articles-article4-title"><span data-dcnode-id="464" instrument_node="">Research on the competitive effect of local government's environmental expenditure in China</span></h3></a><div class="article-source ellipsis" data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">2020, Science of the Total Environment</span></div></div><div class="buttons" data-dcnode-id="453"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="454" type="button"><span class="button-link-text" data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="455" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="456"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="448"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="449" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="450"><p data-dcnode-id="451" id="sp0070"><span data-dcnode-id="452" instrument_node="">Local government's environmental expenditure (LGEE) is critical to ecological protection and environmental governance, and it has not played its due role. By constructing a theoretical model of the competitive effect of LGEE under the intervention of central government, this study used the spatial econometric model to analyze the competitive effect of LGEE based on the data of 30 provinces in China from 2007 to 2016. The main results show that (1) from the perspective of the national area, LGEE shows a U-shaped development model together with economic growth; (2) a significant positive spatial effect in interprovincial LGEE is observed in eastern region, indicating that local government tends to adopt the competitive strategy of mutual imitation. Local government will not reduce environmental expenditure as fiscal decentralization increases; (3) the coefficient of the spatial effect in LGEE is significantly negative in central and western regions, which is manifested as a competitive strategy of mutual substitution. The coefficient of fiscal decentralization is significantly negative, indicating that LGEE relies mainly on the transfer payments from central government, and the essence of interprovincial competition regarding environmental expenditure is the competition for the transfer payments from central government.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="429"><div class="sub-heading" data-dcnode-id="441"><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0305750X19303912" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="445" id="citing-articles-article5-title"><span data-dcnode-id="446" instrument_node="">Identifying and disentangling the impact of fiscal decentralization on economic growth</span></h3></a><div class="article-source ellipsis" data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">2020, World Development</span></div></div><div class="buttons" data-dcnode-id="435"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="436" type="button"><span class="button-link-text" data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="437" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="438"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="430"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="431" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="432"><p data-dcnode-id="433" id="sp0010"><span data-dcnode-id="434" instrument_node="">This paper revisits the relationship between fiscal decentralization and economic growth by addressing the endogeneity issue stemming from reverse causality and unobserved factors that has plagued previous extensive literature on this subject. In our approach, we use the Geographic Fragmentation Index (GFI) and country size as instrumental variables, which we argue are strong and consistent instruments for fiscal decentralization. Empirically, we find that indeed both instruments are strong and valid in the first stage of estimation and that on average, a 10 percent increase in subnational expenditure or revenue shares—the conventional measures of decentralization—will increase GDP per capita growth by approximately 0.82 and 0.57 percentage points, respectively.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85053008753%26md5%3D51d5925dfc8323ef430dfe99a873080" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="426" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="427"></path></svg><span class="button-alternative-text" data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="243"><dl class="footnote" data-dcnode-id="408"><dt class="footnote-label" data-dcnode-id="415"><sup data-dcnode-id="416"><a data-dcnode-id="417" href="#bfn0005"><span data-dcnode-id="418" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="409"><p data-dcnode-id="410" id="np0005"><span data-dcnode-id="414" instrument_node="">See </span><a class=
