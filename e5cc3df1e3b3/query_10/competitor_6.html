</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0005&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as0005&quot;><p id=&quot;sp0115&quot;>In 1994, after a period of substantial fiscal decentralization that has been credited with leading to historically unprecedented growth rates but significant fiscal decline, China introduced a new fiscal system that recentralized the collection of tax revenues. The economic and political consequences of this new Tax Sharing System (TSS) have been debated extensively in the literature, especially because of the renewed interest in fiscal federalism and its interaction with political institutions and economic outcomes. The question central to this debate has been whether the TSS constitutes a significant departure from decentralization with adverse effects on fiscal federalism or whether the recentralization of revenues under the TSS corrects for the overshooting in decentralization with beneficial economic outcomes. This paper exploits the staggered introduction of the TSS across regions and over time for econometric identification purposes and finds robust causal evidence that the TSS had a positive impact on economic outcomes.</p></div></div></div>" data-dcnode-id="5652" lang="en" name="citation_abstract"><span data-dcnode-id="5651" instrument_node="">

ass="abstract author-highlights" data-dcnode-id="5124" id="ab0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5148"><span data-dcnode-id="5149" instrument_node="">Highlights</span></h2><div data-dcnode-id="5125" id="as0010"><p data-dcnode-id="5126" id="sp0120"></p><dl class="list" data-dcnode-id="5127"><dt class="list-label" data-dcnode-id="5146"><span data-dcnode-id="5147" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5143"><p data-dcnode-id="5144" id="p0005"><span data-dcnode-id="5145" instrument_node="">Study impact of state capacity on economic outcomes via introduction of Tax Sharing System (TSS) in China in 1990’s.</span></p></dd><dt class="list-label" data-dcnode-id="5141"><span data-dcnode-id="5142" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5138"><p data-dcnode-id="5139" id="p0010"><span data-dcnode-id="5140" instrument_node="">Show use of traditional measure of fiscal federalism are misleading and even give contradictory findings.</span></p></dd><dt class="list-label" data-dcnode-id="5136"><span data-dcnode-id="5137" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5133"><p data-dcnode-id="5134" id="p0015"><span data-dcnode-id="5135" instrument_node="">Exploits staggered introduction of TSS across regions and over time for econometric identification.</span></p></dd><dt class="list-label" data-dcnode-id="5131"><span data-dcnode-id="5132" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5128"><p data-dcnode-id="5129" id="p0020"><span data-dcnode-id="5130" instrument_node="">Difference-in-difference estimates find TSS increased per capita GDP growth rates by 18%.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="5111" id="ab0005" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5122"><span data-dcnode-id="5123" instrument_node="">Abstract</span></h2><div data-dcnode-id="5112" id="as0005"><p data-dcnode-id="5113" id="sp0115"><span data-dcnode-id="5121" instrument_node="">In 1994, after a period of substantial </span><a class="topic-link" data-dcnode-id="5119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/fiscal-relations" title="Learn more about fiscal decentralization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5120" instrument_node="">fiscal decentralization</span></a><span data-dcnode-id="5114"><span data-dcnode-id="5118" instrument_node=""> that has been credited with leading to historically unprecedented growth rates but significant fiscal decline, China introduced a new fiscal system that recentralized the collection of tax revenues. The economic and political consequences of this new </span><a class="topic-link" data-dcnode-id="5116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/intergovernmental-transfers" title="Learn more about Tax Sharing from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5117" instrument_node="">Tax Sharing</span></a><span data-dcnode-id="5115" instrument_node=""> System (TSS) have been debated extensively in the literature, especially because of the renewed interest in fiscal federalism and its interaction with political institutions and economic outcomes. The question central to this debate has been whether the TSS constitutes a significant departure from decentralization with adverse effects on fiscal federalism or whether the recentralization of revenues under the TSS corrects for the overshooting in decentralization with beneficial economic outcomes. This paper exploits the staggered introduction of the TSS across regions and over time for econometric identification purposes and finds robust causal evidence that the TSS had a positive impact on economic outcomes.</span></span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="5087" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="5099"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1043951X18301147"><svg class="icon icon-navigate-left" data-dcnode-id="5108" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="5109"></path></svg><span class="button-alternative-text" data-dcnode-id="5101"><strong data-dcnode-id="5106"><span data-dcnode-id="5107" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="5104"><span data-dcnode-id="5105" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5102"><span data-dcnode-id="5103" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="5088"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1043951X18301135"><span class="button-alternative-text" data-dcnode-id="5092"><strong data-dcnode-id="5097"><span data-dcnode-id="5098" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="5095"><span data-dcnode-id="5096" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5093"><span data-dcnode-id="5094" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="5090" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="5091"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="5071"><div class="keywords-section" data-dcnode-id="5072" id="ks0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5085"><span data-dcnode-id="5086" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="5082" id="kw0005"><span data-dcnode-id="5083" id="tx0010"><span data-dcnode-id="5084" instrument_node="">Fiscal decentralization</span></span></div><div class="keyword" data-dcnode-id="5079" id="kw0010"><span data-dcnode-id="5080" id="tx0015"><span data-dcnode-id="5081" instrument_node="">Fiscal reform</span></span></div><div class="keyword" data-dcnode-id="5076" id="kw0015"><span data-dcnode-id="5077" id="tx0020"><span data-dcnode-id="5078" instrument_node="">Economic growth</span></span></div><div class="keyword" data-dcnode-id="5073" id="kw0020"><span data-dcnode-id="5074" id="tx0025"><span data-dcnode-id="5075" instrument_node="">Tax sharing system</span></span></div></div></div><span data-dcnode-id="5070" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="1713" id="body"><div data-dcnode-id="1714"><section data-dcnode-id="4946" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5066" id="st0020"><span data-dcnode-id="5069" instrument_node="">1</span><span data-dcnode-id="5068" instrument_node="">. </span><span data-dcnode-id="5067" instrument_node="">Introduction</span></h2><p data-dcnode-id="5061" id="p0025"><span data-dcnode-id="5065" instrument_node="">In 1994, China fully and formally introduced a new fiscal system under the name the “Tax Sharing System” (TSS or </span><em data-dcnode-id="5063"><span data-dcnode-id="5064" instrument_node="">fenshuizi</span></em><span data-dcnode-id="5062" instrument_node=""> (tax assignment)). TSS reassigned taxes between the central and subnational governments (SNGs) with the intention of reducing the discretion of the latter in negotiating the sharing of revenues and ensuring a greater share for the former. This paper studies the growth consequences of the TSS by exploiting the staggered introduction of the system across regions and over time for econometric identification purposes.</span></p><p data-dcnode-id="5048" id="p0030"><span data-dcnode-id="5060" instrument_node="">The significance of TSS, which has been called a watershed event</span><a class="workspace-trigger" data-dcnode-id="5057" href="#fn0005" name="bfn0005"><sup data-dcnode-id="5058"><span data-dcnode-id="5059" instrument_node="">1</span></sup></a><span data-dcnode-id="5056" instrument_node=""> for the Chinese fiscal system, lies in the question as to whether it constitutes a notable divergence from the Fiscal Responsibility System (FRS, also known as the </span><em data-dcnode-id="5054"><span data-dcnode-id="5055" instrument_node="">fenzao chifan</span></em><span data-dcnode-id="5053" instrument_node=""> or “eating from separate kitchens”) that preceded it and which has been credited with placing the Chinese economy on the high growth path it followed after 1980.</span><a class="workspace-trigger" data-dcnode-id="5050" href="#fn0010" name="bfn0010"><sup data-dcnode-id="5051"><span data-dcnode-id="5052" instrument_node="">2</span></sup></a><span data-dcnode-id="5049" instrument_node=""> To put this claim in perspective note that the FRS is generally recognized as being a highly fiscally decentralized system that stands in stark contrast to the centralized system that allowed only minor amounts of local discretionary spending in the period 1949–1979.</span></p><p data-dcnode-id="5046" id="p0035"><span data-dcnode-id="5047" instrument_node="">We find that TSS treatment increased growth rates by economically meaningful amounts, with estimates that are robust to alternative specifications and controls. While methods based on endogenous proxies for fiscal federalism used by the existing literature are unstable and unreliable, our preferred approach using difference-in-difference estimation tells a consistent and compelling story: TSS reform increased economic growth, with highly significant estimates that are robust to alternative controls and inferential assumptions. In particular, we find that TSS reform resulted in per capita growth rates that were approximately 18% higher compared to the average per capita growth rates in the pre-reform (FRS) period (2.2 percentage points higher relative to a baseline per capita annual growth rate of 11.9 percentage points prior to fiscal reform).</span></p><p data-dcnode-id="5036" id="p0040"><span data-dcnode-id="5041"><span data-dcnode-id="5045" instrument_node="">Early theories of public finance (now commonly called “first generation theories of fiscal federalism”) had emphasized potential welfare gains from the decentralized financing of </span><a class="topic-link" data-dcnode-id="5043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/local-public-goods" title="Learn more about local public goods from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5044" instrument_node="">local public goods</span></a><span data-dcnode-id="5042" instrument_node=""> and services in contrast to the centralized provision of a single, uniform public output in all jurisdictions.</span></span><a class="workspace-trigger" data-dcnode-id="5038" href="#fn0015" name="bfn0015"><sup data-dcnode-id="5039"><span data-dcnode-id="5040" instrument_node="">3</span></sup></a><span data-dcnode-id="5037" instrument_node=""> Such gains are viewed to flow from the relaxing of informational problems faced by central authorities who have only imperfect information with regard to local tastes and conditions. These gains, however, need to be contrasted with the efficiency cost of failure to internalize interjurisdictional externalities.</span></p><p data-dcnode-id="5023" id="p0045"><span data-dcnode-id="5031"><span data-dcnode-id="5035" instrument_node="">Second generation theories of fiscal federalism, on the other hand, emphasize the benefits decentralization affords from a political and institutional perspective. Thus, centralized fiscal systems are seen as leading to extortionary behavior on the part of the central government, whereas competition among decentralized governments is believed to limit the capacities of the monopolist central government, thereby fostering </span><a class="topic-link" data-dcnode-id="5033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/local-economic-development" title="Learn more about local economic development from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5034" instrument_node="">local economic development</span></a><span data-dcnode-id="5032" instrument_node="">, affording more accountability and better outcomes for the citizenry.</span></span><a class="workspace-trigger" data-dcnode-id="5028" href="#fn0020" name="bfn0020"><sup data-dcnode-id="5029"><span data-dcnode-id="5030" instrument_node="">4</span></sup></a><span data-dcnode-id="5027" instrument_node=""> Not every decentralized fiscal system would, however, lead to beneficial outcomes. Soft budget constraints faced by SNGs, mismatches in responsibility and resources, and local capture can easily derail a decentralized system, giving rise to opportunities for increased local rents and corruption.</span><a class="workspace-trigger" data-dcnode-id="5024" href="#fn0025" name="bfn0025"><sup data-dcnode-id="5025"><span data-dcnode-id="5026" instrument_node="">5</span></sup></a></p><p data-dcnode-id="5014" id="p0050"><span data-dcnode-id="5022" instrument_node="">Under the FRS, the second generation theorists of fiscal federalism see the Chinese central government as delegating economic policy-making and significant fiscal authority with hard budget constraints to the SNGs.</span><a class="workspace-trigger" data-dcnode-id="5019" href="#fn0030" name="bfn0030"><sup data-dcnode-id="5020"><span data-dcnode-id="5021" instrument_node="">6</span></sup></a><span data-dcnode-id="5018" instrument_node=""> Given their new policy authority and facing fiscal incentives to promote reform, a number of SNGs adopted pro-market policies and raised their own tax revenue. Contracts negotiated with the central government allowed SNGs to share 50% of all revenue raised up to a pre-specified revenue level and to retain all revenue that exceeded this level. As </span><a class="workspace-trigger" data-dcnode-id="5016" href="#bb0045" name="bbb0045"><span data-dcnode-id="5017" instrument_node="">Jin, Qian, and Weingast (2005)</span></a><span data-dcnode-id="5015" instrument_node=""> show, the average province faced a marginal tax retention rate of 89% while 68% of all provinces faced a marginal retention rate of 100%. Facing strong fiscal incentives to promote reform, many SNGs experienced high rates of economic growth. With the reforms proving successful, the central government devolved additional incentives and political power to the SNGs, which then acted as a counterbalance to the political power of the central government.</span></p><p data-dcnode-id="5005" id="p0055"><span data-dcnode-id="5013" instrument_node="">However, the FRS also resulted in significant fiscal decline for the central government, with the share of total tax revenue transferred to the central government falling from 39% in 1985 to 22% in 1993. Overall revenue collections declined from 31% of GDP in 1978 to 11.2% in 1994.</span><a class="workspace-trigger" data-dcnode-id="5010" href="#fn0035" name="bfn0035"><sup data-dcnode-id="5011"><span data-dcnode-id="5012" instrument_node="">7</span></sup></a><span data-dcnode-id="5009" instrument_node=""> The FRS thus led to an ``overshooting in decentralization” and a rethinking of the fiscal system.</span><a class="workspace-trigger" data-dcnode-id="5006" href="#fn0040" name="bfn0040"><sup data-dcnode-id="5007"><span data-dcnode-id="5008" instrument_node="">8</span></sup></a></p><p data-dcnode-id="5003" id="p0060"><span data-dcnode-id="5004" instrument_node="">The crucial question that emerged with the TSS reform package that replaced the FRS in 1994 was whether this meant a recentralization to the extent of a reversal to the old system or rather a move to further the process of rationalization of market institutions. Reversal would threaten the crucial political component that supported the success of economic reforms, whereas rationalization would constitute a shift towards a formal fiscal federalism that promised to resolve the coordination problems associated with an overly weak central government without endangering the benefits that accrue from decentralization.</span></p><p data-dcnode-id="4992" id="p0065"><span data-dcnode-id="5002" instrument_node="">The debate on whether the TSS reversed the decentralization course started by the FRS is still ongoing. The literature has taken two paths to answer this question. The first focuses on the elements of the new fiscal regime introduced by the TSS and compares these with either those of the FRS or of an ideal decentralized regime. The second tries to determine empirically whether the two regimes led to differences in economic outcomes. Thus, within the former literature, </span><a class="workspace-trigger" data-dcnode-id="5000" href="#bb0120" name="bbb0120"><span data-dcnode-id="5001" instrument_node="">Zhang (1999)</span></a><span data-dcnode-id="4999" instrument_node="">, for instance, views the 1994 reform as stemming budgetary decline, but leaving the actual pattern of revenue distribution and spending responsibilities between the central government and the SNGs fundamentally unchanged. </span><a class="workspace-trigger" data-dcnode-id="4997" href="#bb0100" name="bbb0100"><span data-dcnode-id="4998" instrument_node="">Weingast (2009)</span></a><span data-dcnode-id="4996" instrument_node=""> perceives TSS as continuing the market-preserving federalism initiated by the FRS. However, </span><a class="workspace-trigger" data-dcnode-id="4994" href="#bb0110" name="bbb0110"><span data-dcnode-id="4995" instrument_node="">Wong (2000)</span></a><span data-dcnode-id="4993" instrument_node=""> associates the TSS with significant recentralization and emphasizes the fiscal problems (e.g. unclear expenditure assignments, unfunded mandates) that continue to plague fiscal relations between the center and the provinces.</span></p><p data-dcnode-id="4978" id="p0070"><span data-dcnode-id="4991" instrument_node="">The empirical literature that follows the second path includes </span><a class="workspace-trigger" data-dcnode-id="4989" href="#bb0125" name="bbb0125"><span data-dcnode-id="4990" instrument_node="">Zhang and Zou (1998)</span></a><span data-dcnode-id="4988" instrument_node=""> who, using a province-level panel data set for the 1978–1992 period, find that fiscal decentralization is inversely associated with provincial economic growth. </span><a class="workspace-trigger" data-dcnode-id="4986" href="#bb0055" name="bbb0055"><span data-dcnode-id="4987" instrument_node="">Lin and Liu (2000)</span></a><span data-dcnode-id="4985" instrument_node="">, on the other hand, examine a similar province level panel data set for the longer 1970–1993 period and find evidence that fiscal decentralization is associated positively with economic growth. </span><a class="workspace-trigger" data-dcnode-id="4983" href="#bb0050" name="bbb0050"><span data-dcnode-id="4984" instrument_node="">Jin and Zou (2005)</span></a><span data-dcnode-id="4982" instrument_node=""> use a panel data set of Chinese provinces covering the FRS and TSS periods of 1979–1993 and 1994–1999. They provide evidence that provincial economic growth is negatively associated with expenditure decentralization and positively associated with revenue decentralization in the 1979–1993 FRS phase. Further, they find that in the 1994–1999 TSS phase, there is no statistically significant relationship between provincial economic growth and expenditure decentralization, while there is a highly significantly association between provincial economic growth and revenue decentralization. Finally, </span><a class="workspace-trigger" data-dcnode-id="4980" href="#bb0040" name="bbb0040"><span data-dcnode-id="4981" instrument_node="">Ding (2008)</span></a><span data-dcnode-id="4979" instrument_node=""> focuses on the TSS period of 1994–2002 and finds a positive association between province level economic growth and various measures of fiscal decentralization.</span></p><p data-dcnode-id="4964" id="p0075"><span data-dcnode-id="4977" instrument_node="">Existing empirical studies of the growth consequences of TSS reform have two primary challenges, measuring fiscal decentralization and causal identification. First, the appropriate measurement of fiscal decentralization is a difficult task given the complexity of intergovernmental relations.</span><a class="workspace-trigger" data-dcnode-id="4974" href="#fn0045" name="bfn0045"><sup data-dcnode-id="4975"><span data-dcnode-id="4976" instrument_node="">9</span></sup></a><span data-dcnode-id="4969"><span data-dcnode-id="4973" instrument_node=""> The empirical literature typically uses the share of subnational </span><a class="topic-link" data-dcnode-id="4971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/government-expenditure" title="Learn more about government expenditure from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4972" instrument_node="">government expenditure</span></a><span data-dcnode-id="4970" instrument_node=""> (or revenue) in consolidated general government expenditure (or revenue) as a proxy for the degree of fiscal decentralization. However, it was recognized very early on</span></span><a class="workspace-trigger" data-dcnode-id="4966" href="#fn0050" name="bfn0050"><sup data-dcnode-id="4967"><span data-dcnode-id="4968" instrument_node="">10</span></sup></a><span data-dcnode-id="4965" instrument_node=""> that such proxies have very limited use as they do not take into account the vertical structure of decision-making and thereby misrepresent the degree of fiscal decentralization.</span></p><p data-dcnode-id="4962" id="p0080"><span data-dcnode-id="4963" instrument_node="">As a result, empirical studies of both cross-country comparisons and descriptions of long-term trends may be seriously distorted. For instance, it is not clear whether an observed increase in the SNG share of total public expenditure (or revenue) implies fiscal decentralization in the sense of devolution of decision-making powers to the SNG. A fundamental question that arises here is the extent to which SNGs can keep local tax revenue instead of transferring it to the central government and the autonomy they may have in making spending decisions.</span></p><p data-dcnode-id="4960" id="p0085"><span data-dcnode-id="4961" instrument_node="">In what follows, we move beyond the existing literature in this respect by first showing that the two most commonly used measures of fiscal federalism, namely the SNGs' share of total public revenue and expenditure, move in opposite directions with the introduction of the TSS. This highlights the problem with using endogenous variables to proxy for the object of interest, fiscal federalism. Instead, to analyze the effects of the TSS, we exploit the quasi-natural experiment afforded by its staggered introduction, which resulted in certain regions in China starting the reform earlier than other regions. Using a difference-in-difference strategy, we identify the impact of TSS reform on economic outcomes. This approach also allows us to deal with the second question raised by the existing empirical literature, namely that of causality.</span></p><p data-dcnode-id="4955" id="p0090"><span data-dcnode-id="4959" instrument_node="">As the extant literature leaves unanswered potential omitted variable bias in its empirical strategy, it is commonly recognized that the results obtained so far can only be used to establish associations between the economic outcomes investigated and measures of </span><a class="topic-link" data-dcnode-id="4957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/fiscal-policy" title="Learn more about fiscal policy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4958" instrument_node="">fiscal policy</span></a><span data-dcnode-id="4956" instrument_node=""> employed, but not a causal relationship between the two. The difference-in-difference approach adopted here provides a more satisfactory method in establishing causality.</span></p><p data-dcnode-id="4947" id="p0095"><span data-dcnode-id="4954" instrument_node="">The plan of the paper is as follows. In the next section we provide a brief description of the institutional and policy background for the TSS. </span><a class="workspace-trigger" data-dcnode-id="4952" href="#s0015" name="bs0015"><span data-dcnode-id="4953" instrument_node="">Section 3</span></a><span data-dcnode-id="4951" instrument_node=""> presents our empirical analysis with the main results. </span><a class="workspace-trigger" data-dcnode-id="4949" href="#s0030" name="bs0030"><span data-dcnode-id="4950" instrument_node="">Section 4</span></a><span data-dcnode-id="4948" instrument_node=""> concludes the paper.</span></p></section><section data-dcnode-id="4901" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4942" id="st0025"><span data-dcnode-id="4945" instrument_node="">2</span><span data-dcnode-id="4944" instrument_node="">. </span><span data-dcnode-id="4943" instrument_node="">Institutional background</span></h2><p data-dcnode-id="4933" id="p0100"><span data-dcnode-id="4937"><span data-dcnode-id="4941" instrument_node="">The “watershed” tax reform of </span><a class="topic-link" data-dcnode-id="4939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/intergovernmental-transfers" title="Learn more about TSS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4940" instrument_node="">TSS</span></a><span data-dcnode-id="4938" instrument_node=""> arose in an institutional setting where the most important fiscal element was the FRS, which was introduced in 1984. This system shifted the collection of most tax revenue to local governments under a fiscal contract with the central government. A typical fiscal contract allowed a given Chinese province to share 50% of the revenues it raised up to a certain level with the central government. Any revenues the province raised beyond that level were retained by the province. In most cases, however, the central government was not able to monitor </span></span><a class="topic-link" data-dcnode-id="4935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/taxation-procedure" title="Learn more about tax collection from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4936" instrument_node="">tax collection</span></a><span data-dcnode-id="4934" instrument_node=""> at the local level and was forced to renegotiate revenue shares with local governments who hid resources from it in extra-budgetary funds.</span></p><p data-dcnode-id="4931" id="p0105"><span data-dcnode-id="4932" instrument_node="">At the same time, the main taxpayers, state-owned enterprises (SOEs), experienced substantial declines in profitability as prices adjusted to newly established markets, reducing tax revenues. With SOEs in financial difficulty, a significant share of safety net expenditures (unemployment insurance, subsidies for housing and fuel, etc.) was shifted from the SOEs to the local governments, who now faced higher local expenditures. Thus, while overall tax revenues were in decline, expenditure burdens of local governments were on the rise.</span></p><p data-dcnode-id="4921" id="p0110"><span data-dcnode-id="4930" instrument_node="">The 1994 tax reform, the TSS, was introduced mainly two improve the so-called “two ratios” - the ratio of budgetary revenue to GDP and the ratio of central budgetary revenue to total budgetary revenue. The major elements of the new system were as follows.</span><a class="workspace-trigger" data-dcnode-id="4927" href="#fn0055" name="bfn0055"><sup data-dcnode-id="4928"><span data-dcnode-id="4929" instrument_node="">11</span></sup></a><span data-dcnode-id="4922"><span data-dcnode-id="4926" instrument_node=""> First, in an attempt to reduce the complexity of the tax system due to the proliferation of taxes after 1984, the number of taxes was cut from 32 to 18. Second, surtaxes were eliminated and the top marginal </span><a class="topic-link" data-dcnode-id="4924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/income-tax-rate" title="Learn more about income tax rate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4925" instrument_node="">income tax rate</span></a><span data-dcnode-id="4923" instrument_node=""> for enterprises was cut from 55% to 33%, with tax rate schedules being unified to subject all enterprises to the same regime.</span></span></p><p data-dcnode-id="4916" id="p0115"><span data-dcnode-id="4920" instrument_node="">Third, to reduce the incentive to hide revenues from the central government through deals with enterprises, SNGs were assigned all income tax revenues. Fourth, the VAT system was expanded with VAT remaining a central government tax, but to allow SNGs to share in the growth of their lost tax base, the central government committed to giving back 30% of its increased revenue from VAT and </span><a class="topic-link" data-dcnode-id="4918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/excise-tax" title="Learn more about consumption tax from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4919" instrument_node="">consumption tax</span></a><span data-dcnode-id="4917" instrument_node=""> (CT) each year. Fifth, a national tax system was established to collect central government revenues with a separate local tax system to collect local taxes.</span></p><p data-dcnode-id="4911" id="p0120"><span data-dcnode-id="4915" instrument_node="">Finally, and perhaps for our purposes most importantly, the central government committed to rebating to each province an amount equal to the reduction in the local tax base due to TSS. This last element was a compromise made by the central government to win the support of the SNGs for the new system. The central government announced that the special transfer mechanism, called </span><em data-dcnode-id="4913"><span data-dcnode-id="4914" instrument_node="">shui shou fan huan</span></em><span data-dcnode-id="4912" instrument_node=""> (tax repayment) would differ from normal central grants in that its expenditure would not be subject to central control. As a result, even though with the TSS the collection of the majority tax revenue was to be transferred from the provinces to the center, the central government would allow the provinces to automatically claim much of these funds.</span></p><p data-dcnode-id="4902" id="p0125"><span data-dcnode-id="4910" instrument_node="">The current view of the informal literature on the effects of TSS two decades after its introduction is that it successfully increased tax revenue collection, simplified the tax structure, and resulted in a recentralization of revenues. Nonetheless, revenue sharing with the SNGs continues to be ad hoc. Perhaps more importantly for the question of the devolution of decision-making powers to local governments, the TSS does not appear to have constituted a significant de facto break with the FRS: as the </span><a class="workspace-trigger" data-dcnode-id="4908" href="#bb0115" name="bbb0115"><span data-dcnode-id="4909" instrument_node="">World Bank (2002, p. 26)</span></a><span data-dcnode-id="4903"><span data-dcnode-id="4907" instrument_node=""> puts it “the TSS reform did not address the issue of extra-budgetary revenues, but instead gave implicit support to redoubled efforts by local governments to seek supplementary resources to support </span><a class="topic-link" data-dcnode-id="4905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/local-economic-development" title="Learn more about local economic development from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4906" instrument_node="">local economic development</span></a><span data-dcnode-id="4904" instrument_node="">, in the process undermining the authority of the budget.” However, to go beyond the informal literature and to determine the consequences of the TSS for economic outcomes requires a formal econometric analysis that takes causal identification seriously. This is where we turn in the next section.</span></span></p></section><section data-dcnode-id="1733" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4897" id="st0030"><span data-dcnode-id="4900" instrument_node="">3</span><span data-dcnode-id="4899" instrument_node="">. </span><span data-dcnode-id="4898" instrument_node="">Empirical analysis</span></h2><p data-dcnode-id="4888" id="p0130"><span data-dcnode-id="4892"><span data-dcnode-id="4896" instrument_node="">In this section, we study the effects of 1994 tax reform empirically. The policy change that the </span><a class="topic-link" data-dcnode-id="4894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/intergovernmental-transfers" title="Learn more about TSS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4895" instrument_node="">TSS</span></a><span data-dcnode-id="4893" instrument_node=""> ushered in poses a unique experience for analyzing the impact of </span></span><a class="topic-link" data-dcnode-id="4890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/fiscal-relations" title="Learn more about fiscal federalism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4891" instrument_node="">fiscal federalism</span></a><span data-dcnode-id="4889" instrument_node=""> because of the scale of institutional adjustment as well as the staggered implementation across localities.</span></p><p data-dcnode-id="4886" id="p0135"><span data-dcnode-id="4887" instrument_node="">In what follows, we will show that focusing on endogenous measures of the stance of fiscal federalism can be deeply misleading. The ratio of revenues received by the local government to total revenues received by the central government and the ratio of expenditures by the local government to total expenditures by central government are typically assumed to be proxies for fiscal federalism, but in the case of China, these two measures move in extreme opposite directions during the policy period under consideration, suggesting they cannot both be proxies for fiscal federalism. This merely highlights the problem with using endogenous variables to proxy for the object of interest, fiscal federalism.</span></p><p data-dcnode-id="4880" id="p0140"><span data-dcnode-id="4885" instrument_node="">Instead, we exploit a quasi-natural experiment in the rollout and implementation of the TSS. Specifically, we take advantage of the fact that the reform was carried out in two stages. Our treatment group (denoted Group A), implemented reform in 1992, while our control group (denoted Group B) implemented the TSS in 1994. Group A consisted of nine regions, including Zhejiang Province, Liaoning Province, Xinjiang Autonomous region, Tianjin municipality, Shenyang City, Daian City, Qingdao City, Wuhan City, and Chongqing City.</span><a class="workspace-trigger" data-dcnode-id="4882" href="#fn0060" name="bfn0060"><sup data-dcnode-id="4883"><span data-dcnode-id="4884" instrument_node="">12</span></sup></a><span data-dcnode-id="4881" instrument_node=""> All other regions are included in Group B. Both Shenyang and Dalian belongs to Liaoning Province, Qingdao belongs to Shandong Province, Wuhan belongs to Hubei Province and Chongqing was a city affiliated with Sichuan Province until 1997. Since Shandong, Hubei, and Sichuan Provinces implemented TSS in 1994, but the cities of Qingdao, Wuhan, and Chongqing implemented TSS in 1992, we will consider alternative classifications of treatment in the analysis below for robustness.</span></p><p data-dcnode-id="4878" id="p0145"><span data-dcnode-id="4879" instrument_node="">This staggered introduction of the TSS allows us to use a difference-in-difference strategy to identify the impact of the reform on economic activity. While the process of selection of localities may not have been purely random, the pre-trends of observable characteristics suggest that there are no noticeable trend differences between the localities that received the treatment and those that did not. As such, we treat the application of treatment as random, and interpret the difference-in-difference estimates as the true causal impact of the TSS on local economic growth.</span></p><p data-dcnode-id="4876" id="p0150"><span data-dcnode-id="4877" instrument_node="">Our empirical approach begins by first following the traditional path in the fiscal federalism literature by considering the impact of fiscal federalism using typical proxy variables on growth rates at the locality level. Using this approach, we find conflicting results in the case of China, with revenue-based proxies of fiscal federalism implying that greater fiscal decentralization leads to lower growth rates, but expenditure-based proxies of fiscal federalism imply higher growth rates. These results are robust to the inclusion of controls for possible omitted variables, with the estimated effects becoming larger in magnitude once controls for locality heterogeneity are included. Furthermore, point estimates vary wildly (and lose statistical significance) when the sample is split in to before and after reform periods. These results justify the concern over the use of endogenous proxies for fiscal federalism.</span></p><p data-dcnode-id="4871" id="p0155"><span data-dcnode-id="4875" instrument_node="">We then estimate the impact of the TSS by exploiting the unique </span><a class="topic-link" data-dcnode-id="4873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/environmental-policy" title="Learn more about policy environment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4874" instrument_node="">policy environment</span></a><span data-dcnode-id="4872" instrument_node=""> and utilizing a difference-in-difference (DID) approach. Our DID estimation results suggest that policy treatment did increase economic growth. In our preferred specification, treatment increased per capita growth by 2.2 percentage points relative to the counterfactual of no TSS reform. To put this estimate into context, the average per capita growth rate across localities during the FRS period was 11.9%, meaning that the introduction of TSS increased per capita growth rates by roughly 18% relative to this baseline. For robustness, using alternative specifications, the range of estimates for the impact of TSS varies between 1.7 and 4.0 percentage points.</span></p><p data-dcnode-id="4866" id="p0160"><span data-dcnode-id="4870" instrument_node="">Finally, we consider an alternative measure of economic activity by considering income per capita. Once again, endogenous proxies for fiscal federalism tell conflicting stories, none of which are robust to sample period selection. When we exploit the natural experiment, however, our DID estimation identifies a significant and robust effect of treatment on the level of economic activity. Our estimates imply that TSS increased per capita income by 11.7% relative to the counterfactual of no TSS reform. To help put this number in context, the median locality per capita income in 1991 was 1657 </span><a class="topic-link" data-dcnode-id="4868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/renminbi" title="Learn more about yuan from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4869" instrument_node="">yuan</span></a><span data-dcnode-id="4867" instrument_node="">. Our point estimate implies that per capita incomes were 194 yuan higher than they would have otherwise been in the absence of TSS reform.</span></p><section data-dcnode-id="4205" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4862" id="st0035"><span data-dcnode-id="4865" instrument_node="">3.1</span><span data-dcnode-id="4864" instrument_node="">. </span><span data-dcnode-id="4863" instrument_node="">Data</span></h3><p data-dcnode-id="4852" id="p0165"><span data-dcnode-id="4861" instrument_node="">The regional data is drawn from the Department of Comprehensive Statistics (1999), and covers all 31 provinces of Mainland China between 1980 and 1999.</span><a class="workspace-trigger" data-dcnode-id="4858" href="#fn0065" name="bfn0065"><sup data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">13</span></sup></a><span data-dcnode-id="4853"><span data-dcnode-id="4857" instrument_node=""> Variables include information on revenues and expenditures of each locality, disaggregated by source and type. The dataset also includes information on locality GDP and population, as well as exposure to international forces through locality imports and exports. The dataset gives a complete portrait of </span><a class="topic-link" data-dcnode-id="4855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/macroeconomic-performance" title="Learn more about economic conditions from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4856" instrument_node="">economic conditions</span></a><span data-dcnode-id="4854" instrument_node=""> at the locality level.</span></span></p><div data-dcnode-id="4634"><p data-dcnode-id="4847" id="p0170"><span data-dcnode-id="4851" instrument_node="">Of the 31 localities, 4 were dropped due to incomplete or unreliable data. Tibet and Hainan were dropped because of missing data. Chongqing was a city affiliated with the Sichuan province, and was not directly supervised by the central government until 1997, when it became one of four municipalities. For these reasons, Tibet, Hainan, Chongqing, and Sichuan were dropped from the analysis. This leaves us with 27 localities, 20 years of data, and 540 total observations. Summary statistics of key variables are reported in </span><a class="workspace-trigger" data-dcnode-id="4849" href="#t0005" name="bt0005"><span data-dcnode-id="4850" instrument_node="">Table 1</span></a><span data-dcnode-id="4848" instrument_node="">.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4635" id="t0005"><span class="captions" data-dcnode-id="4840"><span data-dcnode-id="4841" id="ca0035"><p data-dcnode-id="4842" id="sp0035"><span class="label" data-dcnode-id="4845"><span data-dcnode-id="4846" instrument_node="">Table 1</span></span><span data-dcnode-id="4844" instrument_node="">. </span><span data-dcnode-id="4843" instrument_node="">Summary statistics.</span></p></span></span><div class="groups" data-dcnode-id="4642"><table data-dcnode-id="4643"><thead data-dcnode-id="4827"><tr class="rowsep-1 valign-top" data-dcnode-id="4828"><th data-dcnode-id="4839" scope="col"></th><th data-dcnode-id="4837" scope="col"><span data-dcnode-id="4838" instrument_node="">Obs</span></th><th data-dcnode-id="4835" scope="col"><span data-dcnode-id="4836" instrument_node="">Mean</span></th><th data-dcnode-id="4833" scope="col"><span data-dcnode-id="4834" instrument_node="">Std. dev.</span></th><th data-dcnode-id="4831" scope="col"><span data-dcnode-id="4832" instrument_node="">Min</span></th><th data-dcnode-id="4829" scope="col"><span data-dcnode-id="4830" instrument_node="">Max</span></th></tr></thead><tbody data-dcnode-id="4644"><tr data-dcnode-id="4814"><th data-dcnode-id="4825" scope="row"><span data-dcnode-id="4826" instrument_node="">GDP</span></th><td data-dcnode-id="4823"><span data-dcnode-id="4824" instrument_node="">538</span></td><td data-dcnode-id="4821"><span data-dcnode-id="4822" instrument_node="">1040</span></td><td data-dcnode-id="4819"><span data-dcnode-id="4820" instrument_node="">1404.0</span></td><td data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">16.0</span></td><td data-dcnode-id="4815"><span data-dcnode-id="4816" instrument_node="">8464.31</span></td></tr><tr data-dcnode-id="4801"><th data-dcnode-id="4812" scope="row"><span data-dcnode-id="4813" instrument_node="">Local revenue</span></th><td data-dcnode-id="4810"><span data-dcnode-id="4811" instrument_node="">540</span></td><td data-dcnode-id="4808"><span data-dcnode-id="4809" instrument_node="">82.0</span></td><td data-dcnode-id="4806"><span data-dcnode-id="4807" instrument_node="">87.1</span></td><td data-dcnode-id="4804"><span data-dcnode-id="4805" instrument_node="">1.1</span></td><td data-dcno ><p></p></div></div><div data-dcnode-id="4573"><p data-dcnode-id="4622" id="p0175"><span data-dcnode-id="4629"><span data-dcnode-id="4633" instrument_node="">One particularly noteworthy aspect of the dataset is the amount of heterogeneity observed across these localities and over time. There is significant variation in GDP, population, local expenditures and revenues, openness to </span><a class="topic-link" data-dcnode-id="4631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/international-trade" title="Learn more about international trade from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4632" instrument_node="">international trade</span></a><span data-dcnode-id="4630" instrument_node="">, and local expenditure priorities. </span></span><a class="workspace-trigger" data-dcnode-id="4627" href="#f0005" name="bf0005"><span data-dcnode-id="4628" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4626" instrument_node=""> shows heterogeneity in growth rates over time for each locality, while </span><a class="workspace-trigger" data-dcnode-id="4624" href="#f0010" name="bf0010"><span data-dcnode-id="4625" instrument_node="">Fig. 2</span></a><span data-dcnode-id="4623" instrument_node=""> emphasizes the significant cross-sectional variation over time. Furthermore there is significant variation in locality measures of expenditures of agricultural support programs, expenditure share on education, expenditure share on government administration, and capital construction expenditure shares. Given so much observable heterogeneity, our approach will take care to control for individual locality effects that may influence economic growth.</span></p><figure class="figure text-xs" data-dcnode-id="4598" id="f0005"><span data-dcnode-id="4606"><img alt="Fig. 1" aria-describedby="ca0005" data-dcnode-id="4621" height="356" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X18301056-gr1.jpg&amp;raw"><span data-dcnode-id="4620" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4607"><li data-dcnode-id="4614"><a class="anchor download-link u-font-sans" data-dcnode-id="4615" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X18301056-gr1_lrg.jpg" target="_blank" title="Download high-res image (314KB)"><span class="anchor-text" data-dcnode-id="4616"><span data-dcnode-id="4619" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4617"><span data-dcnode-id="4618" instrument_node="">Download high-res image (314KB)</span></span></span></a></li><li data-dcnode-id="4608"><a class="anchor download-link u-font-sans" data-dcnode-id="4609" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X18301056-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4610"><span data-dcnode-id="4613" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4599"><span data-dcnode-id="4600" id="ca0005"><p data-dcnode-id="4601" id="sp0005"><span class="label" data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">Fig. 1</span></span><span data-dcnode-id="4603" instrument_node="">. </span><span data-dcnode-id="4602" instrument_node="">Locality growth heterogeneity (across localities).</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="4574" id="f0010"><span data-dcnode-id="4582"><img alt="Fig. 2" aria-describedby="ca0010" data-dcnode-id="4597" height="279" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X18301056-gr2.jpg&amp;raw"><span data-dcnode-id="4596" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4583"><li data-dcnode-id="4590"><a class="anchor download-link u-font-sans" data-dcnode-id="4591" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X18301056-gr2_lrg.jpg" target="_blank" title="Download high-res image (158KB)"><span class="anchor-text" data-dcnode-id="4592"><span data-dcnode-id="4595" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4593"><span data-dcnode-id="4594" instrument_node="">Download high-res image (158KB)</span></span></span></a></li><li data-dcnode-id="4584"><a class="anchor download-link u-font-sans" data-dcnode-id="4585" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X18301056-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4586"><span data-dcnode-id="4589" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4587"><span data-dcnode-id="4588" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4575"><span data-dcnode-id="4576" id="ca0010"><p data-dcnode-id="4577" id="sp0010"><span class="label" data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">Fig. 2</span></span><span data-dcnode-id="4579" instrument_node="">. </span><span data-dcnode-id="4578" instrument_node="">Locality growth heterogeneity (over time).</span></p></span></span></figure></div><p data-dcnode-id="4571" id="p0180"><span data-dcnode-id="4572" instrument_node="">In our difference-in-difference implementation, we rely on the structure of the timing of reform to identify the effect of the TSS relative to the FRS. To this end, we restrict our dataset to the years 1985–1999, which covers both the FRS and TSS phases of fiscal federalism in China. To interpret our estimates as causal, we would ideally want random assignment of treatment and control. Unfortunately, the exact selection process for treatment has not been made public, and was likely not explicitly random. However, observable pre-treatment characteristics of the localities that implemented TSS in 1992 are statistically similar to the pre-treatment characteristics of those localities that implemented TSS in 1994.</span></p><div data-dcnode-id="4277"><p data-dcnode-id="4567" id="p0185"><a class="workspace-trigger" data-dcnode-id="4569" href="#t0010" name="bt0010"><span data-dcnode-id="4570" instrument_node="">Table 2</span></a><span data-dcnode-id="4568" instrument_node=""> provides comforting evidence about the observable differences between control and treatment groups. When all types of treatment are grouped together, a number of observable variables are significantly different than those in the control group, raising the specter that unobservable variables are also significantly different. However, some localities (Shandgong and Hubei Provinces) did not implement TSS fully in 1992. Rather, two important cities (Qingdao and Wuhan) within these localities did implement TSS in 1992, while the rest of the Provinces adopted TSS in 1994. We further distinguish types of treatment by separating out these two provinces as “partial treatment” since only a part of the province adopted TSS in 1992. When treatment is broken up into full and partial treatment groups, it becomes clear that the partial treatment group is driving the observed differences. We will take care in the empirical analysis below to consider the impact of different types of treatment.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4278" id="t0010"><span class="captions" data-dcnode-id="4560"><span data-dcnode-id="4561" id="ca0040"><p data-dcnode-id="4562" id="sp0045"><span class="label" data-dcnode-id="4565"><span data-dcnode-id="4566" instrument_node="">Table 2</span></span><span data-dcnode-id="4564" instrument_node="">. </span><span data-dcnode-id="4563" instrument_node="">Mean differences across groups.</span></p></span></span><div class="groups" data-dcnode-id="4285"><table data-dcnode-id="4286"><thead data-dcnode-id="4548"><tr class="rowsep-1 valign-top" data-dcnode-id="4549"><th data-dcnode-id="4558" scope="col"><span data-dcnode-id="4559" instrument_node="">Pre-treatment group means</span></th><th data-dcnode-id="4556" scope="col"><span data-dcnode-id="4557" instrument_node="">Control</span></th><th data-dcnode-id="4554" scope="col"><span data-dcnode-id="4555" instrument_node="">All treatment</span></th><th data-dcnode-id="4552" scope="col"><span data-dcnode-id="4553" instrument_node="">Full treatment</span></th><th data-dcnode-id="4550" scope="col"><span data-dcnode-id="4551" instrument_node="">Partial treatment</span></th></tr></thead><tbody data-dcnode-id="4287"><tr data-dcnode-id="4537"><th data-dcnode-id="4546" rowspan="2" scope="row"><span data-dcnode-id="4547" instrument_node="">GDP</span></th><td data-dcnode-id="4544"><span data-dcnode-id="4545" instrument_node="">452.6</span></td><td data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">185.4</span></td><td data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">58.45</span></td><td data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">439.3</span></td></tr><tr data-dcnode-id="4528"><td data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">(28.98)****</span></td><td data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">(61.48)***</span></td><td data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">(70.49)</span></td><td data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">(95.61)****</span></td></tr><tr data-dcno ="4311"><span data-dcnode-id="4312" instrument_node="">(61,599.1)</span></td><td data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">(83557)</span></td></tr><tr data-dcnode-id="4297"><th data-dcnode-id="4306" rowspan="2" scope="row"><span data-dcnode-id="4307" instrument_node="">Total exports</span></th><td data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">141,981.3</span></td><td data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">58,222.2</span></td><td data-dcnode-id="4300"><span data-dcnode-id="4301" instrument_node="">59,422.4</span></td><td data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">55,821.8</span></td></tr><tr data-dcnode-id="4288"><td data-dcnode-id="4295"><span data-dcnode-id="4296" instrument_node="">(26,584.8)****</span></td><td data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">(56,394.9)</span></td><td data-dcnode-id="4291"><span data-dcnode-id="4292" instrument_node="">(66,640.2)</span></td><td data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">(90,395.1)</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="4279"></p><p data-dcnode-id="4280" id="sp0050"><span data-dcnode-id="4284" instrument_node="">Notes: Column (1) reports control group means for relevant characteristic and outcome variables during pre-treatment period, 1985–1991. Differences in group means for Any Treatment, Full Treatment, and Partial Treatment groups are reported in Columns (2), (3), and (4) respectively. Stars indicate statistical differences with Control Group mean. *(p &lt; .10), **(p &lt; .05), ***(p &lt; .01), ****(p &lt; .001). All monetary values measured in 100 Million </span><a class="topic-link" data-dcnode-id="4282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/renminbi" title="Learn more about Yuan from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4283" instrument_node="">Yuan</span></a><span data-dcnode-id="4281" instrument_node="">, except for trade variables (imports and exports) which are measured in $10,000 s. Population measured in 10,000 s.</span></p><p></p></div></div><p data-dcnode-id="4272" id="p0190"><span data-dcnode-id="4276" instrument_node="">With the exception of population size, there are no statistically significant differences between the twenty-one control localities and the four full treatment localities, supporting our interpretation of full treatment as random. In our analysis below, we will be careful to consider per capita economic measures to account for potential differences in size across localities. For the two partial treatment localities, there are however significant differences compared to the control group. As such, we will take care to consider separate </span><a class="topic-link" data-dcnode-id="4274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/causality-analysis" title="Learn more about treatment effects from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4275" instrument_node="">treatment effects</span></a><span data-dcnode-id="4273" instrument_node=""> for partial and full treatment, as well as include control variables to account for observable differences across localities.</span></p><div data-dcnode-id="4206"><p data-dcnode-id="4255" id="p0195"><span data-dcnode-id="4271" instrument_node="">While there are some statistical differences in observable means, especially for partial treatment localities, </span><a class="workspace-trigger" data-dcnode-id="4269" href="#f0015" name="bf0015"><span data-dcnode-id="4270" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4268" instrument_node=""> shows that pre-treatment trends in GDP per capita levels for control and treatment (any treatment) groups do not differ. </span><a class="workspace-trigger" data-dcnode-id="4266" href="#f0020" name="bf0020"><span data-dcnode-id="4267" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4265" instrument_node=""> shows growth rates per capita in the pre-treatment period, and although there are notable year to year fluctuations in growth rates, the treatment group is not statistically different from the control group in this regard. The group mean evidence presented in </span><a class="workspace-trigger" data-dcnode-id="4263" href="#t0010" name="bt0010"><span data-dcnode-id="4264" instrument_node="">Table 2</span></a><span data-dcnode-id="4262" instrument_node=""> along with the parallel trends evidence in </span><a class="workspace-trigger" data-dcnode-id="4260" href="#f0015" name="bf0015"><span data-dcnode-id="4261" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4259" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4257" href="#f0020" name="bf0020"><span data-dcnode-id="4258" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4256" instrument_node=""> motivates our use of locality and year fixed effects in our DID specification, and lends support to our identification assumption of random application of treatment.</span></p><figure class="figure text-xs" data-dcnode-id="4231" id="f0015"><span data-dcnode-id="4239"><img alt="Fig. 3" aria-describedby="ca0015" data-dcnode-id="4254" height="356" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X18301056-gr3.jpg&amp;raw"><span data-dcnode-id="4253" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4240"><li data-dcnode-id="4247"><a class="anchor download-link u-font-sans" data-dcnode-id="4248" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X18301056-gr3_lrg.jpg" target="_blank" title="Download high-res image (194KB)"><span class="anchor-te s="anchor-text" data-dcnode-id="4225"><span data-dcnode-id="4228" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">Download high-res image (204KB)</span></span></span></a></li><li data-dcnode-id="4217"><a class="anchor download-link u-font-sans" data-dcnode-id="4218" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X18301056-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4219"><span data-dcnode-id="4222" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4208"><span data-dcnode-id="4209" id="ca0020"><p data-dcnode-id="4210" id="sp0020"><span class="label" data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">Fig. 4</span></span><span data-dcnode-id="4212" instrument_node="">. </span><span data-dcnode-id="4211" instrument_node="">GDP per capita growth rate pre-treatment trends - control and treatment.</span></p></span></span></figure></div></section><section data-dcnode-id="1734" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4201" id="st0040"><span data-dcnode-id="4204" instrument_node="">3.2</span><span data-dcnode-id="4203" instrument_node="">. </span><span data-dcnode-id="4202" instrument_node="">Empirical implementation</span></h3><div data-dcnode-id="3815"><p data-dcnode-id="4193" id="p0200"><span data-dcnode-id="4200" instrument_node="">We begin our analysis by exploring the relationship between measures of fiscal federalism and economic growth, following the traditional approaches in the fiscal federalism literature. In the process, the concerns over the interpretation of traditional approaches will be highlighted. To get a first cut at the data, consider </span><a class="workspace-trigger" data-dcnode-id="4198" href="#t0015" name="bt0015"><span data-dcnode-id="4199" instrument_node="">Table 3</span></a><span data-dcnode-id="4197" instrument_node="">, which reports regression results for three different proxies of fiscal federalism and their impact on local economic growth rates per capita. Our first proxy considers the ratio of local revenue to total central revenue in China. The idea is that as the share of local revenue increases relative to central revenue, the local government gains more economic freedom over local choices through higher available local revenue. Results in </span><a class="workspace-trigger" data-dcnode-id="4195" href="#t0015" name="bt0015"><span data-dcnode-id="4196" instrument_node="">Table 3</span></a><span data-dcnode-id="4194" instrument_node=""> imply that a higher ratio of local to central revenue leads to slower economic growth per capita, suggesting that fiscal decentralization actually reduces economic growth.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3816" id="t0015"><span class="captions" data-dcnode-id="4183"><span data-dcnode-id="4184" id="ca0045"><p data-dcnode-id="4185" id="sp0055"><span class="label" data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">Table 3</span></span><span data-dcnode-id="4190" instrument_node="">. </span><span data-dcnode-id="4189" instrument_node="">Endogenous measures of </span><a class="topic-link" data-dcnode-id="4187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/fiscal-relations" title="Learn more about fiscal federalism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4188" instrument_node="">fiscal federalism</span></a><span data-dcnode-id="4186" instrument_node=""> and economic growth.</span></p></span></span><div class="groups" -id="3856"><span data-dcnode-id="3857" instrument_node="">0.065</span></td><td data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">0.093</span></td></tr><tr data-dcnode-id="3830"><th data-dcnode-id="3851" scope="row"><span data-dcnode-id="3852" instrument_node="">F</span></th><td data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">5.039</span></td><td data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">10.06</span></td><td data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">4.621</span></td><td data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">3.287</span></td><td data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">4.742</span></td><td data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">10.12</span></td><td data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">4.060</span></td><td data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">4.982</span></td><td data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">6.257</span></td><td data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">9.364</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="3817"></p><p data-dcnode-id="3818" id="sp0060"><span data-dcnode-id="3826" instrument_node="">Notes: Dependent variable is per capita growth rate. </span><a class="topic-link" data-dcnode-id="3824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/measure-of-dispersion" title="Learn more about Standard errors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3825" instrument_node="">Standard errors</span></a><span data-dcnode-id="3819"><span data-dcnode-id="3823" instrument_node=""> in parentheses. *(p &lt; .10), **(p &lt; .05), ***(p &lt; .01), ****(p &lt; .001) All measures of Fiscal Federalism are measured as ratios. All expenditure variables measured in 100 Million </span><a class="topic-link" data-dcnode-id="3821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/renminbi" title="Learn more about Yuan from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3822" instrument_node="">Yuan</span></a><span data-dcnode-id="3820" instrument_node="">.</span></span></p><p></p></div></div><p data-dcnode-id="3810" id="p0205"><span data-dcnode-id="3814" instrument_node="">The second standard measure of fiscal federalism is the ratio of local tax revenue to central tax revenue, an alternative measure of fiscal decentralization based on revenue flexibility. As reported in </span><a class="workspace-trigger" data-dcnode-id="3812" href="#t0015" name="bt0015"><span data-dcnode-id="3813" instrument_node="">Table 3</span></a><span data-dcnode-id="3811" instrument_node="">, the estimated effect of enhanced fiscal decentralization reduces economic growth per capita, consistent with the measure based on total revenue rather than just tax revenue. In both cases, revenue based proxies for fiscal federalism suggest that decentralization hurts local economic growth.</span></p><p data-dcnode-id="3808" id="p0210"><span data-dcnode-id="3809" instrument_node="">When we consider expenditure-based proxies of fiscal federalism, however, we find evidence in support of the opposite conclusion. The ratio of local expenditure to central expenditure has a positive effect on growth per capita, and is also statistically significant. This suggests that as localities gain more control over local expenditures relative to the central government, growth rates increase.</span></p><p data-dcnode-id="3800" id="p0215"><span data-dcnode-id="3807" instrument_node="">One limitation with the results in the first part of </span><a class="workspace-trigger" data-dcnode-id="3805" href="#t0015" name="bt0015"><span data-dcnode-id="3806" instrument_node="">Table 3</span></a><span data-dcnode-id="3804" instrument_node=""> is that omitted variables may be correlated with the measures of fiscal federalism, and this may be influencing the observed estimates leading to conflicting results. The standard approach to an omitted variables bias is to include sufficient relevant control variables, although specifying which control variables to include is problematic. To attempt to correct for omitted time varying factors at the locality level, the second part of </span><a class="workspace-trigger" data-dcnode-id="3802" href="#t0015" name="bt0015"><span data-dcnode-id="3803" instrument_node="">Tables 3</span></a><span data-dcnode-id="3801" instrument_node=""> reports estimates for fiscal federalism proxies after controlling for observable locality factors such as spending on social programs (education, health, culture, and science), government administration, capital construction, as well as spending on agriculture support programs.</span></p><p data-dcnode-id="3798" id="p0220"><span data-dcnode-id="3799" instrument_node="">Consider first a revenue-based proxy of fiscal federalism, the ratio of local to central revenues. Our raw point estimate is negative and statistically significant (column (1)). A series of regression results are reported in columns (4) through (8), as we systematically include relevant locality specific factors such as spending on government administration, capital construction, and social services such as health and education, and agricultural programs. In all cases, the coefficient on the total revenue proxy of fiscal federalism is negative and statistically significant. In fact, when all relevant controls are included (column (8)), the point estimate increases nearly 50% relative to the raw coefficient reported in column (1), with even stronger statistical significance. We estimate that an increase in the ratio of local revenue to central revenue by one unit leads to a 1.1 percentage point decrease in the growth rate per capita, a non-trivial effect.</span></p><p data-dcnode-id="3796" id="p0225"><span data-dcnode-id="3797" instrument_node="">We next conduct the same basic exercise, except we look at only local tax revenue, which strips out any central government transfers that are often earmarked for specific spending projects. Once again, the inclusion of controls has no effect on the sign or significance of the key variable of interest, but interestingly the point estimate is nearly identical in the preferred specification with all relevant controls (Column (9)). The impact of a one-unit increase in the ratio of local tax revenue to central tax revenue results in a 1.7 percentage point decrease in economic growth with high statistical significance. At least for revenue-based proxies for fiscal federalism, the result is quite robust: greater fiscal decentralization leads to lower economic growth.</span></p><p data-dcnode-id="3794" id="p0230"><span data-dcnode-id="3795" instrument_node="">Lastly, we conduct the same exercise, but focus on an expenditure-based measure of fiscal federalism. And once again, the results originally found in Column (3) stand up to the inclusion of locality specific time varying controls. In all cases, the point estimate is positive and statistically significance (results not reported, but available on request). When all relevant controls are included (Column (10)), the point estimate is nearly 4 times as large as that found in the simple bivariate case, and highly statistically significant. A one-unit increase in the ratio of local expenditure to central expenditure is associated with a 4.5 percentage point increase in economic growth per capita.</span></p><p data-dcnode-id="3792" id="p0235"><span data-dcnode-id="3793" instrument_node="">These conflicting results, robust to a battery of controls, suggest that endogenous proxies for fiscal federalism are unsuitable for estimating the effect of fiscal federalism on economic outcomes such as economic growth. Traditional approaches for measuring and estimating the effect of fiscal federalism are likely to be conflicting, confusing, and unreliable because they don't directly measure fiscal federalism, but rather rely on endogenous proxies for fiscal federalism.</span></p><div data-dcnode-id="3614"><p data-dcnode-id="3787" id="p0240"><span data-dcnode-id="3791" instrument_node="">To reinforce this concern, </span><a class="workspace-trigger" data-dcnode-id="3789" href="#t0020" name="bt0020"><span data-dcnode-id="3790" instrument_node="">Table 4</span></a><span data-dcnode-id="3788" instrument_node=""> considers these three proxies before and after the policy experiment. Not only do revenue and expenditure based measures tell different stories, each measure is not robust to sample period selection, losing significance or even switching sign before and after the policy experiment under consideration. This should not be surprising since these are endogenous proxies, and the policy experiment under consideration had differential impacts on revenues and expenditures.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3615" id="t0020"><span class="captions" data-dcnode-id="3777"><span data-dcnode-id="3778" id="ca0050"><p data-dcnode-id="3779" id="sp0065"><span class="label" data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">Table 4</span></span><span data-dcnode-id="3784" instrument_node="">. </span><span data-dcnode-id="3783" instrument_node="">Measures of </span><a class="topic-link" data-dcnode-id="3781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/fiscal-relations" title="Learn more about fiscal federalism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3782" instrument_node="">fiscal federalism</span></a><span data-dcnode-id="3780" instrument_node=""> - before and after policy experiment.</span></p></span></span><div class="groups" data-dcnode-id="3622"><table data-dcnode-id="3623"><thead data-dcnode-id="3748"><tr class="valign-top" data-dcnode-id="3762"><th class="rowsep-1" data-dcnode-id="3775" rowspan="2" scope="col"><span data-dcnode-id="3776" instrument_node="">Growth rate (per capita)</span></th><th class="rowsep-1" data-dcnode-id="3773" scope="col"><span data-dcnode-id="3774" instrument_node="">1</span></th><th class="rowsep-1" data-dcnode-id="3771" scope="col"><span data-dcnode-id="3772" instrument_node="">2</span></th><th class="rowsep-1" data-dcnode-id="3769" scope="col"><span data-dcnode-id="3770" instrument_node="">3</span></th><th class="rowsep-1" data-dcnode-id="3767" scope="col"><span data-dcnode-id="3768" instrument_node="">4</span></th><th class="rowsep-1" data-dcnode-id="3765" scope="col"><span data-dcnode-id="3766" instrument_node="">5</span></th><th class="rowsep-1" data-dcnode-id="3763" scope="col"><span data-dcnode-id="3764" instrument_node="">6</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="3749"><th data-dcnode-id="3760" scope="col"><span data-dcnode-id="3761" instrument_node="">Before 1992</span></th><th data-dcnode-id="3758" scope="col"><span data-dcnode-id="3759" instrument_node="">After 1994</span></th><th data-dcnode-id="3756" scope="col"><span data-dcnode-id="3757" instrument_node="">Before 1992</span></th><th data-dcnode-id="3754" scope="col"><span data-dcnode-id="3755" instrument_node="">After 1994</span></th><th data-dcnode-id="3752" scope="col"><span data-dcnode-id="3753" instrument_node="">Before 1992</span></th><th data-dcnode-id="3750" scope="col"><span data-dcnode-id="3751" instrument_node="">After 1994</span></th></tr></thead><tbody data-dcnode-id="3624"><tr data-dcnode-id="3737"><th data-dcnode-id="3746" rowspan="2" scope="row"><span data-dcnode-id="3747" instrument_node="">Local revenue to central revenue</span></th><td data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">
