</span></div><span data-dcnode-id="279" instrument_node=""> </span><div data-dcnode-id="271"><span data-dcnode-id="278" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="273"><span data-dcnode-id="277" instrument_node="">[33] Ajit Singh and B.A. Weisse, “Emerging Stock Markets, Portfolio Capital Flows and Long-Term Economic Growth: Micro and Macroeconomic Perspectives”. </span><u data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">World Development</span></u><span data-dcnode-id="274" instrument_node=""> 26, 1998, no. 4: 607–22.</span></p><span data-dcnode-id="272" instrument_node="">
</span></div><span data-dcnode-id="270" instrument_node=""> </span><div data-dcnode-id="265"><span data-dcnode-id="269" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">[34] Stiglitz, Capital Market Liberalization, Economic Growth and Instability, op. cit.</span></p><span data-dcnode-id="266" instrument_node="">
</span></div><span data-dcnode-id="264" instrument_node=""> </span><div data-dcnode-id="259"><span data-dcnode-id="263" instrument_node=""> [35] World Bank, “</span><u data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Financial Sector Assessment: A Handbook</span></u><span data-dcnode-id="260" instrument_node="">”, World Bank Publications, Washington DC, 2005. </span></div><span data-dcnode-id="258" instrument_node=""> </span><div data-dcnode-id="250"><span data-dcnode-id="257" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="252"><span data-dcnode-id="256" instrument_node="">[36] Cem Karacadag, V. Sundararajan and Jennifer Elliott. ” Managing Risks in Financial Market Development: The Role of Sequencing”, </span><u data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">IMF Working Paper</span></u><span data-dcnode-id="253" instrument_node=""> No. 03/116, International Monetary Fund 2003, Washington, DC. Available at http://www.imf.org/external/pubs/ft/wp/2003/wp03116.pdf.</span></p><span data-dcnode-id="251" instrument_node="">
</span></div><span data-dcnode-id="249" instrument_node=""> </span><div data-dcnode-id="241"><span data-dcnode-id="248" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="243"><span data-dcnode-id="247" instrument_node="">[37] Asli Demirgüç- and Enrica Detragiache,” Financial Liberalization and Financial Fragility”, Paper presented at </span><u data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Annual World Bank Conference on Development Economics</span></u><span data-dcnode-id="244" instrument_node="">, Washington, April 20–21 1998.</span></p><span data-dcnode-id="242" instrument_node="">
</span></div><span data-dcnode-id="240" instrument_node=""> </span><div data-dcnode-id="232"><span data-dcnode-id="239" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="234"><span data-dcnode-id="238" instrument_node="">[38] See Cifuentes, Desormeaux, and Gonzalez, “Capital Markets in Chile: from Financial Repression to Financial Deepening.” </span><u data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">BIS Paper</span></u><span data-dcnode-id="235" instrument_node=""> 11. 2002, Basel: Bank for International Settlements for the Chilean experience with liberalization and domestic capital market development.</span></p><span data-dcnode-id="233" instrument_node="">
</span></div><span data-dcnode-id="231" instrument_node=""> </span><div data-dcnode-id="223"><span data-dcnode-id="230" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="225"><span data-dcnode-id="229" instrument_node="">[39] M. Ayhan Kose, Eswar Prasad, Kenneth Rogoff and Shang-Jin Wei. “Financial Globalization: A Reappraisal”.</span><u data-dcnode-id="227"><span data-dcnode-id="228" instrument_node=""> IMF Working Paper</span></u><span data-dcnode-id="226" instrument_node=""> WP/06/189. 2006, Washington DC: International Monetary Fund.</span></p><span data-dcnode-id="224" instrument_node="">
</span></div><span data-dcnode-id="222" instrument_node=""> </span><div data-dcnode-id="211"><span data-dcnode-id="221" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="216"><span data-dcnode-id="220" instrument_node="">[40] IMF, “Global Financial Stability Report, Financial Market Turbulence. Causes, Consequences, and &nbsp;Policies, October, </span><u data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">World Economic Financial Surveys</span></u><span data-dcnode-id="217" instrument_node="">, 2007, IMF Washington DC,</span></p><span data-dcnode-id="215" instrument_node="">
</span><p class="bpa_text" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">http://www.imf.org/external/pubs/ft/gfsr/2007/02/pdf/text.pdf, IMF, Global Financial Stability Report, Containing Systemic Risks and Restoring Financial Soundness 2008a April, IMF Washington DC IMF Global Financial Stability Report GFSR Market Update, 2008b, IMF Washington DC.</span></p><span data-dcnode-id="212" instrument_node="">
</span></div><span data-dcnode-id="210" instrument_node=""> </span><div data-dcnode-id="200"><span data-dcnode-id="209" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="202"><span data-dcnode-id="208" instrument_node="">[41] See Feldstein and Horioka, “Domestic Savings and International Capital Flows”, in the </span><u data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">Economic Journal</span></u><u data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">,</span></u><span data-dcnode-id="203" instrument_node=""> 314-29, 1980.</span></p><span data-dcnode-id="201" instrument_node="">
</span></div><span data-dcnode-id="199" instrument_node=""> </span><div data-dcnode-id="191"><span data-dcnode-id="198" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="193"><span data-dcnode-id="197" instrument_node="">[42]Barry Eichengreen and Ricardo Hausmann, “</span><u data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">Original Sin: The Road to Redemption”</span></u><span data-dcnode-id="194" instrument_node=""> Washington DC: Research Department, Inter-American Development Bank, 2003.</span></p><span data-dcnode-id="192" instrument_node="">
</span></div><span data-dcnode-id="190" instrument_node=""> </span><div data-dcnode-id="182"><span data-dcnode-id="189" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="184"><span data-dcnode-id="188" instrument_node="">[43] J.B. Aizenman, Pinto, and A. Radziwill, “</span><u data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Sources for Financing of Domestic Capital: Is Foreign Savings a Viable Option for Developing Countries”</span></u><span data-dcnode-id="185" instrument_node=""> NBER Working Paper 10624. 2004, Cambridge, Mass.: National Bureau of Economic Research.</span></p><span data-dcnode-id="183" instrument_node="">
</span></div><span data-dcnode-id="181" instrument_node=""> </span><div data-dcnode-id="176"><span data-dcnode-id="180" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">[44] With respect to Asia, following the crises, the financial authorities in the Asian countries affected by the crisis (e.g., Thailand) took severe measures to redress the unbalance of the financial system, giving priority to the development of domestic bond market.</span></p><span data-dcnode-id="177" instrument_node="">
</span></div><span data-dcnode-id="175" instrument_node=""> </span><div data-dcnode-id="170"><span data-dcnode-id="174" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">[45] The reasoning along the line of the self-financing ratio is equivalent to the argument of Stiglitz (2000, 1080–82) that borrowing abroad implies a high cost for developing countries. The lack of viable domestic capital markets could strengthen the “developmental view” arguing that the government—and public sector banks—would be the right policy to assure a self-financing ratio close of 1.</span></p><span data-dcnode-id="171" instrument_node="">
</span></div><span data-dcnode-id="169" instrument_node=""> </span><div data-dcnode-id="164"><span data-dcnode-id="168" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">[46] For Asia, the rise for the same period is around 400 percent.</span></p><span data-dcnode-id="165" instrument_node="">
</span></div><span data-dcnode-id="163" instrument_node=""> </span><div data-dcnode-id="158"><span data-dcnode-id="162" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">[47] Market trading in domestic bonds is still low (e.g., $152 billion for Mexico, which is the highest).</span></p><span data-dcnode-id="159" instrument_node="">
</span></div><span data-dcnode-id="157" instrument_node=""> </span><div data-dcnode-id="152"><span data-dcnode-id="156" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">[48] “The Importance of Going Local: Shifting Away from Foreign Currency Sovereign Debt in Latin America,” Sovereign Ratings in Latin America, Standard and Poor’s, September 2005.</span></p><span data-dcnode-id="153" instrument_node="">
</span></div><span data-dcnode-id="151" instrument_node=""> </span><div data-dcnode-id="143"><span data-dcnode-id="150" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="145"><span data-dcnode-id="149" instrument_node="">[49] Cifuentes, Desormeaux, and Gonzalez, op. cit. and Serge Jeanneau and Camillo Towar, “Domestic Bond Markets in Latin America: Achievements and Challenges”, </span><u data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">BIS Quarterly Review</span></u><span data-dcnode-id="146" instrument_node="">, June, 2006.</span></p><span data-dcnode-id="144" instrument_node="">
</span></div><span data-dcnode-id="142" instrument_node=""> </span><div data-dcnode-id="137"><span data-dcnode-id="141" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">[50] Many emerging countries benefit from a consistently high price of commodities.</span></p><span data-dcnode-id="138" instrument_node="">
</span></div><span data-dcnode-id="136" instrument_node=""> </span><div data-dcnode-id="128"><span data-dcnode-id="135" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="130"><span data-dcnode-id="134" instrument_node="">[51]See David Marston, “Preconditions for a Sound Financial Sector in Latin America and the Caribbean”, Paper presented at </span><u data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">Conference on Risk Management and Supervision</span></u><span data-dcnode-id="131" instrument_node="">, International Monetary Fund, Washington, June 30, 2006. .</span></p><span data-dcnode-id="129" instrument_node="">
</span></div><span data-dcnode-id="127" instrument_node=""> </span><div data-dcnode-id="122"><span data-dcnode-id="126" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">[52] The Federal Reserve Board of&nbsp; the United States defines Basel&nbsp;II as an effort by international banking supervisors to update the original international bank capital accord (Basel&nbsp;I), which has been in effect since 1988. The Basel Committee on Banking Supervision, on which the United States serves as a participating member, developed Basel&nbsp;II. The revised accord aims to improve the consistency of capital regulations internationally, make regulatory capital more risk sensitive, and promote enhanced risk-management practices among large, internationally active banking organizations.</span></p><span data-dcnode-id="123" instrument_node="">
</span></div><span data-dcnode-id="121" instrument_node=""> </span><div data-dcnode-id="113"><span data-dcnode-id="120" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="115"><span data-dcnode-id="119" instrument_node="">[53] This section draws heavily on the IMF’s Global Financial Stability Report: Market Developments and Issues (Washington DC: International Monetary Fund, 2007), </span><u data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">http://www.imf.org/External/Pubs/FT/GFSR/2007/01/pdf/text.pdf</span></u><span data-dcnode-id="116" instrument_node=""> and also on the 2008 report and its update (see references)</span></p><span data-dcnode-id="114" instrument_node="">
</span></div><span data-dcnode-id="112" instrument_node=""> </span><div data-dcnode-id="104"><span data-dcnode-id="111" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="106"><span data-dcnode-id="110" instrument_node="">[54] According to Alan Greenpsan, “The current financial crisis in the United States is likely to be judged in retrospect as the most wrenching since the end of the Second World War.” </span><u data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">Financial Times</span></u><span data-dcnode-id="107" instrument_node="">, March 16, 2006.</span></p><span data-dcnode-id="105" instrument_node="">
</span></div><span data-dcnode-id="103" instrument_node=""> </span><div data-dcnode-id="95"><span data-dcnode-id="102" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="97"><span data-dcnode-id="101" instrument_node="">[55] A number of countries—including Brazil, Chile, China, and South Korea—have recently liberalized rules limiting individual or institutional investments abroad. This has led to a rapid increase in portfolio investment outflows, especially in Asia. It is too early to conclude from the data whether the liberalization of capital outflows will be effective in relieving inflow pressure over time. It is difficult to measure the effectiveness of this liberalization, given the possible role of other factors in determining the direction and level of capital flows. There are also indications that in past episodes of capital inflow surges, the liberalization of capital outflows was matched by larger inflows; see Carmen M. Reinhart and Vincent R. Reinhart, </span><em data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">Capital Inflows and Reserve Accumulation: The Recent Evidence</span></em><span data-dcnode-id="98" instrument_node="">, NBER Working Paper 13842 (Cambridge, Mass.: National Bureau of Economic Research, 1998), http://www.nber.org/papers/w13842.pdf. In line with the earlier empirical results suggesting that financial openness encourages inflows, it is the case that capital controls, broadly defined, are usually not helpful in managing inflows.</span></p><span data-dcnode-id="96" instrument_node="">
</span></div><span data-dcnode-id="94" instrument_node=""> </span><div data-dcnode-id="89"><span data-dcnode-id="93" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="91"><span data-dcnode-id="92" instrument_node="">[56] Private institutional investors have repeatedly noted the importance of timely and accurate data, as well as a predictable and transparent way of communicating with the investor base, as factors that contribute to the effective management of capital flows.</span></p><span data-dcnode-id="90" instrument_node="">
</span></div><span data-dcnode-id="88" instrument_node=""> </span><div data-dcnode-id="83"><span data-dcnode-id="87" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="85"><span data-dcnode-id="86" instrument_node="">[57] Corporate bond issuance has expanded since 2002 in Latin America and the Caribbean, even though bond issuance is restricted to few companies. Structured finance, e.g., securitization, has emerged in various countries (e.g., Colombia, Brazil).&nbsp; However, following the crisis of sub-prime the securitization deals are on retreat.</span></p><span data-dcnode-id="84" instrument_node="">
</span></div><span data-dcnode-id="82" instrument_node=""> </span><div data-dcnode-id="74"><span data-dcnode-id="81" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="76"><span data-dcnode-id="80" instrument_node="">[58] Stiglitz, </span><u data-dcnode-id="78"><span data-dcnode-id="79" instrument_node="">Capital Market Liberalization, Economic Growth and Instability</span></u><span data-dcnode-id="77" instrument_node="">, op. cit.</span></p><span data-dcnode-id="75" instrument_node="">
</span></div><span data-dcnode-id="73" instrument_node=""> </span><div data-dcnode-id="68"><span data-dcnode-id="72" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="70"><span data-dcnode-id="71" instrument_node="">[59] Inflation in the region, on average, declined from 263 percent (1990–94) to 6.3 percent (2005).</span></p><span data-dcnode-id="69" instrument_node="">
</span></div><span data-dcnode-id="67" instrument_node=""> </span><div data-dcnode-id="62"><span data-dcnode-id="66" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="64"><span data-dcnode-id="65" instrument_node="">[60] Agustin Carstens, Transcript of an IMF Center Book Forum, “Pragmatism: Latin America New’s “Ism”? International Monetary Fund, May 2006.</span></p><span data-dcnode-id="63" instrument_node="">
</span></div><span data-dcnode-id="61" instrument_node=""> </span><div data-dcnode-id="56"><span data-dcnode-id="60" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="58"><span data-dcnode-id="59" instrument_node="">[61] Vulnerabilities are still relevant because global conditions could change; the oil market could tighten and affect partner country growth; non-oil commodity prices are projected to soften after 2007.</span></p><span data-dcnode-id="57" instrument_node="">
</span></div><span data-dcnode-id="55" instrument_node=""> </span><div data-dcnode-id="47"><span data-dcnode-id="54" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="49"><span data-dcnode-id="53" instrument_node="">[62] Kose et al. Financial Globalization, </span><u data-dcnode-id="51"><span data-dcnode-id="52" instrument_node="">op</span></u><span data-dcnode-id="50" instrument_node="">. cit.</span></p><span data-dcnode-id="48" instrument_node="">
</span></div><span data-dcnode-id="46" instrument_node=""> </span><div data-dcnode-id="41"><span data-dcnode-id="45" instrument_node=""> </span><p class="bpa_text" data-dcnode-id="43"><span data-dcnode-id="44" instrument_node="">[63] Eichengreen and Hausmann (2003, 30–31) argue: “The evidence is strong that original sin will not go away anytime soon as a result of the standard recipe of macroeconomic prudence and institution building. Efforts to strengthen national policies and institutions will help, but they will suffice to ameliorate the problem over the horizon relevant for practical policy decisions. And even if some countries do succeed in achieving redemption from original sin through initiatives taken at the domestic level, they will only raise the bar for the others, insofar as the addition of one more currency to the global portfolio reduces the diversification benefits of adding yet another.”</span></p><span data-dcnode-id="42" instrument_node="">
