="3196" data-chapter-level="0" data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edtechbooks.org/democracy/glossary%3Fbook_nav%3Dtrue" style="padding-left: 20px;"><span data-dcnode-id="851" instrument_node="">Glossary</span></a><a class="list-group-item list-group-flush book_nav_link border-right-0 border-left-0" data-chapter-id="3548" data-chapter-level="0" data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edtechbooks.org/democracy/index_of_terms%3Fbook_nav%3Dtrue" style="padding-left: 20px;"><span data-dcnode-id="849" instrument_node="">Index of Terms</span></a></div><span data-dcnode-id="846" instrument_node="">

</span><div class="chapter_number" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">1.5</span></div><h1 data-dcnode-id="839" id="chapterTitle" itemprop="name" name="chapterTitle"><span data-dcnode-id="840" instrument_node="">Native American Influences on U.S. Government</span></h1><div class="text-center" data-dcnode-id="835"><audio controls="" data-dcnode-id="836" preload="none"><source data-dcnode-id="838" src="https://equitypress.org/audio/democracy/nativeinfluence.mp3" type="audio/mp3"><span data-dcnode-id="837" instrument_node="">Your browser does not support the audio tag.</span></audio></div><div class="chapter-contents" data-dcnode-id="42" id="chapter-contents"><h2 data-dcnode-id="832" id="h2_nbXHS" name="h2_nbXHS"><strong data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Standard 1.5:&nbsp; Native American Influences on U.S. Government</span></strong></h2><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="825" id="p_jEpi" name="p_jEpi"><em data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Analyze the evidence for arguments that the principles of the system of government of the United States were influenced by the governments of Native Peoples.</span></em><span data-dcnode-id="828" instrument_node=""> (Massachusetts Curriculum Framework for History and Social Studies) </span><strong data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">[8.T1.5] </span></strong></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="818" id="p_iuui" name="p_iuui"><em data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">As native populations migrated and settled across the vast expanse of North America over time, they developed distinct and increasingly complex societies by adapting to and transforming their diverse environments.</span></em><span data-dcnode-id="821" instrument_node=""> </span><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">[AP U.S. History Key Concept 1.1]</span></strong></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="812" id="p_BuuT" name="p_BuuT"><em data-dcnode-id="815"><span data-dcnode-id="816" instrument_node=""> The American Revolution’s democratic and republican ideals inspired new experiments with different forms of government. </span></em><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">[AP U.S. History Key Concept 3.2]</span></strong></p><span data-dcnode-id="811" instrument_node="">
</span><h2 data-dcnode-id="803" id="h2_BIWoW" name="h2_BIWoW"><strong data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">FOCUS QUESTION</span></strong><span data-dcnode-id="808" instrument_node="">: </span><a data-dcnode-id="805" data-shortened-url="https://edtechbooks.org/-gJf" data-unshortened-url="http://teachinghistory.org/history-content/ask-a-historian/24099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//teachinghistory.org/history-content/ask-a-historian/24099" rel="noopener" target="_blank"><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Did any Native American Group Influence the Men who Drafted the United States Governing Documents?</span></strong></a><span data-dcnode-id="804" instrument_node=""> (TeachingHistory.org., 2018)&nbsp;</span></h2><span data-dcnode-id="802" instrument_node="">
</span><figure class="image align-center" data-dcnode-id="785"><img alt="Massachusetts Bay Colony Seal" class="none" data-dcnode-id="801" id="img_LSTd" name="img_LSTd" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edtechbooks.org/content_images/democracy/1.5.1_MASS_Bay_Colony_Seal.png&amp;raw"><span data-dcnode-id="800" instrument_node="">
</span><figcaption data-dcnode-id="787"><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="789" id="p_jCxFz" name="p_jCxFz"><strong data-dcnode-id="794"><span data-dcnode-id="798" instrument_node="">"</span><a data-dcnode-id="796" data-shortened-url="https://edtechbooks.org/-beSy" data-unshortened-url="https://commons.wikimedia.org/wiki/File:Massachusetts_Bay_Colony_Seal,_1629.jpg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AMassachusetts_Bay_Colony_Seal%2C_1629.jpg" rel="noopener" target="_blank"><span data-dcnode-id="797" instrument_node="">Massachusetts Bay Colony seal granted by King Charles I in 1629</span></a><span data-dcnode-id="795" instrument_node="">" | </span></strong><span data-dcnode-id="793" instrument_node="">Public Domain</span><strong data-dcnode-id="791"><br data-dcnode-id="792"></strong><span data-dcnode-id="790" instrument_node="">The seal featured an Indian holding an arrow pointed down in a gesture of peace, and the words "Come over and help us," emphasizing the missionary and commercial intentions of the original colonists</span></p><span data-dcnode-id="788" instrument_node="">
</span></figcaption><span data-dcnode-id="786" instrument_node="">
</span></figure><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="777" id="p_kbxos" name="p_kbxos"><a data-dcnode-id="782" data-shortened-url="https://edtechbooks.org/-hwf" data-unshortened-url="https://www.history.com/topics/native-american-history/the-first-americans-video" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/native-american-history/the-first-americans-video" rel="noopener" target="_blank"><span data-dcnode-id="783" instrument_node="">The First Americans</span></a><span data-dcnode-id="781" instrument_node=""> had lived in North America for 50,000 years before their initial encounters with European explorers and colonists. These indigenous peoples adapted cultures and lifestyles to the geographic and environmental conditions where they lived. You can read a brief </span><a data-dcnode-id="779" data-shortened-url="https://edtechbooks.org/-Wyq" data-unshortened-url="https://www.digitalhistory.uh.edu/era.cfm" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.digitalhistory.uh.edu/era.cfm" rel="noopener" target="_blank"><span data-dcnode-id="780" instrument_node="">Overview of the First Americans </span></a><span data-dcnode-id="778" instrument_node="">from Digital History.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="767" id="p_oVLn" name="p_oVLn"><span data-dcnode-id="775" instrument_node="">The achievements of First American peoples are impressive, but not well-known. Just east of present-day St. Louis, Missouri, the pre-contact First American city of </span><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cahokiamounds.org/" rel="noopener" target="_blank"><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Cahokia</span></strong></a><span data-dcnode-id="771" instrument_node=""> had a population of more than 10,000, with at least 20,000 to 30,000 more in outlying towns and farming settlements that spread for fifty miles in every direction. Its Grand Plaza was the size of 35 football fields, the largest public space ever created north of Mexico. At its center was a packed clay pyramid that reached 100 feet high. Cahokia is now the largest archaeological site in the United States. </span><a data-dcnode-id="769" data-shortened-url="https://edtechbooks.org/-Dzy" data-unshortened-url="https://cahokiamounds.org/augmented-reality-project/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cahokiamounds.org/augmented-reality-project/" rel="noopener" target="_blank"><span data-dcnode-id="770" instrument_node="">Back to the City of the Sun: An Augmented Reality Project </span></a><span data-dcnode-id="768" instrument_node="">offers more ways to learn about the Cahokia Mounds.</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="743" id="p_dccoU" name="p_dccoU"><strong data-dcnode-id="763"><span class="misspelled" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Etzanoa</span></span></strong><span data-dcnode-id="762" instrument_node=""> was located in modern-day Kansas, south of Wichita, near the Oklahoma border (learn more: </span><a data-dcnode-id="758" data-shortened-url="https://edtechbooks.org/-tegD" data-unshortened-url="https://www.latimes.com/nation/la-na-kansas-lost-city-20180819-htmlstory.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.latimes.com/nation/la-na-kansas-lost-city-20180819-htmlstory.html"><span class="misspelled" data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Archaeologists</span></span><span data-dcnode-id="759" instrument_node=""> Explore a Rural Field in Kansas, and a Lost City Emerges</span></a><span data-dcnode-id="757" instrument_node="">). There is more information on these native settlements on the&nbsp;</span><em data-dcnode-id="754"><span class="misspelled" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">resourcesforhistoryteachers</span></span></em><span data-dcnode-id="753" instrument_node=""> wiki page </span><a data-dcnode-id="745" data-shortened-url="https://edtechbooks.org/-WIk" data-unshortened-url="http://resourcesforhistoryteachers.pbworks.com/w/page/123879546/Cahokia%20and%20Etzanoa%2C%20Pre-Contact%20Native%20American%20Cities" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//resourcesforhistoryteachers.pbworks.com/w/page/123879546/Cahokia%2520and%2520Etzanoa%252C%2520Pre-Contact%2520Native%2520American%2520Cities" rel="noopener" target="_blank"><span data-dcnode-id="752" instrument_node="">Cahokia and </span><span class="misspelled" data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Etzanoa</span></span><span data-dcnode-id="749" instrument_node="">, </span><span class="misspelled" data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Pre</span></span><span data-dcnode-id="746" instrument_node="">-Contact Native American Cities</span></a><span data-dcnode-id="744" instrument_node="">.</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="733" id="p_bnTsR" name="p_bnTsR"><span data-dcnode-id="741" instrument_node="">Population figures for how many First Americans lived in North America in 1492 vary widely. </span><a data-dcnode-id="739" data-shortened-url="https://edtechbooks.org/-oBcU" data-unshortened-url="https://www.tolerance.org/classroom-resources/tolerance-lessons/native-american-influences-in-us-history-and-culture" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tolerance.org/classroom-resources/tolerance-lessons/native-american-influences-in-us-history-and-culture" rel="noopener" target="_blank"><span data-dcnode-id="740" instrument_node="">Teaching Tolerance</span></a><span data-dcnode-id="738" instrument_node=""> puts the figure at 500 tribes totaling about 22 million people. Shortly after the arrival of Europeans, disease and violence took the lives of an enormous number of indigenous people. Twenty million, 95% of the indigenous population, died - many from the smallpox infection to which natives had no immunity. Today, Native Americans number just over 2 million or 1% of the U. S. population. Nearly 4 out of 5 (78%) live off-reservations and 72% live in cities or suburbs (</span><a data-dcnode-id="735" data-shortened-url="https://edtechbooks.org/-ZLb" data-unshortened-url="https://www.theguardian.com/us-news/2017/sep/04/native-americans-stories-california" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/us-news/2017/sep/04/native-americans-stories-california" rel="noopener" target="_blank"><em data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">The Guardian</span></em></a><span data-dcnode-id="734" instrument_node="">, September 4, 2017).</span></p><span data-dcnode-id="732" instrument_node="">
</span><figure class="col-12" contenteditable="false" data-dcnode-id="724"><img alt="Great Seal of the Yavapai-Apache Nation" class="img-fluid" data-dcnode-id="731" id="img_tZzu" name="img_tZzu" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edtechbooks.org/content_images/democracy/1.5_Yavapai-Apache_logo.jpg&amp;raw"><span data-dcnode-id="730" instrument_node="">
</span><figcaption contenteditable="true" data-dcnode-id="726"><a data-dcnode-id="728" data-shortened-url="https://edtechbooks.org/-zXDh" data-unshortened-url="https://commons.wikimedia.org/wiki/File:Yavapai-Apache_logo.jpg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AYavapai-Apache_logo.jpg" rel="noopener" target="_blank"><span data-dcnode-id="729" instrument_node="">Yavapai-Apache logo</span></a><span data-dcnode-id="727" instrument_node=""> by Yavapai-Apache Nation | Public Domain</span></figcaption><span data-dcnode-id="725" instrument_node="">
</span></figure><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="718" id="p_PjVrc" name="p_PjVrc"><span data-dcnode-id="722" instrument_node="">The relationship between Native peoples and European settlers was complex, contentious, and sometimes collaborative (Calloway, 2018). Tribes and settlers fought over access to land and resources, but also created military alliances and conducted trade. The website </span><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//1704.deerfield.history.museum/" rel="noopener" target="_blank"><span data-dcnode-id="721" instrument_node="">Raid on Deerfield: The Many Stories of 1704</span></a><span data-dcnode-id="719" instrument_node=""> shows the multiple dimensions of native/settler contacts.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="712" id="p_LAuY" name="p_LAuY"><span data-dcnode-id="716" instrument_node="">Today, Native Americans still live with a legacy of inadequate resources and services and continuing social and economic discrimination. In its </span><a data-dcnode-id="714" data-shortened-url="https://edtechbooks.org/-FwB" data-unshortened-url="https://aihc-wa.com/broken-promises-continuing-federal-funding-shortfall-for-native-americans/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aihc-wa.com/broken-promises-continuing-federal-funding-shortfall-for-native-americans/" rel="noopener" target="_blank"><span data-dcnode-id="715" instrument_node="">"Broken Promises" report</span></a><span data-dcnode-id="713" instrument_node="">, the U.S.Commission of Civil Rights (2018) recounted the history as follows:</span></p><span data-dcnode-id="711" instrument_node="">
</span><div class="page" data-dcnode-id="694" title="Page 5"><span data-dcnode-id="710" instrument_node="">
</span><div class="layoutArea" data-dcnode-id="696"><span data-dcnode-id="709" instrument_node="">
</span><div class="column" data-dcnode-id="698"><span data-dcnode-id="708" instrument_node="">
</span><blockquote data-dcnode-id="700"><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="702" id="p_JdFpw" name="p_JdFpw"><span data-dcnode-id="706" instrument_node="">"In exchange for the surrender and reduction of tribal lands and removal and resettlement of approximately one-fifth of Native American tribes from their original lands, the United States signed 375 treaties, passed laws, and instituted policies that shape and define the special government-to-government relationship between federal and tribal governments. Yet the U.S. government forced many Native Americans to give up their culture and, throughout the history of this relationship, has not provided adequate assistance to support Native American interconnected infrastructure, self-governance, housing, education, health, and economic development needs" (</span><a data-dcnode-id="704" data-shortened-url="https://edtechbooks.org/-FwB" data-unshortened-url="https://aihc-wa.com/broken-promises-continuing-federal-funding-shortfall-for-native-americans/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aihc-wa.com/broken-promises-continuing-federal-funding-shortfall-for-native-americans/" rel="noopener" target="_blank"><span data-dcnode-id="705" instrument_node="">para. 1</span></a><span data-dcnode-id="703" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="701" instrument_node="">
</span></blockquote><span data-dcnode-id="699" instrument_node="">
</span></div><span data-dcnode-id="697" instrument_node="">
</span></div><span data-dcnode-id="695" instrument_node="">
</span></div><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691" id="p_ivDcs" name="p_ivDcs"><span data-dcnode-id="692" instrument_node="">How did native peoples influence the writers of the U.S. Constitution, and in so doing, shape the governmental institutions of the new republic? In exploring this question, the modules for this topic examine Native influences on government against a broader background of native/settler relations and conflicts.</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="685" id="p_uDaS" name="p_uDaS"><span data-dcnode-id="689" instrument_node="">For background, read </span><a data-dcnode-id="687" data-shortened-url="https://edtechbooks.org/-vnHg" data-unshortened-url="http://www.socialstudies.org/sites/default/files/publications/se/6106/610601.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.socialstudies.org/sites/default/files/publications/se/6106/610601.html" rel="noopener" target="_blank"><span data-dcnode-id="688" instrument_node="">Native American Governments in Today's Curriculum</span></a><span data-dcnode-id="686" instrument_node="">, an older article that offers an overview of governmental structures of the League of the Iroquois, the Muscogee Nation, the Lakota Nation, and the Pueblo peoples.</span></p><span data-dcnode-id="684" instrument_node="">
</span><div class="callout info" data-dcnode-id="656"><span data-dcnode-id="683" instrument_node="">

</span><h2 data-dcnode-id="650" id="h2_rqqyV" name="h2_rqqyV"><strong data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">1.INVESTIGATE: The Iroquois Confederacy and the Great Law of Peace</span></strong></h2><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="639" id="p_fhStp" name="p_fhStp"><strong data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">The Iroquois Confederacy</span></strong><span data-dcnode-id="646" instrument_node=""> refers to a group of indigenous tribes living in northeastern North America that had a participatory democracy government with executive, legislative, and judicial branches. </span><strong data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">The Great Law of Peace</span></strong><span data-dcnode-id="643" instrument_node=""> was the constitution of the Iroquois Confederacy. Here is the text of </span><a data-dcnode-id="641" data-shortened-url="https://edtechbooks.org/-MFWZ" data-unshortened-url="https://sourcebooks.fordham.edu/MOD/iroquois.asp" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sourcebooks.fordham.edu/MOD/iroquois.asp" rel="noopener" target="_blank"><span data-dcnode-id="642" instrument_node="">The Constitution of the Iroquois&nbsp;Confederacy</span></a><span data-dcnode-id="640" instrument_node=""> and its 117 articles.&nbsp;</span></p><span data-dcnode-id="638" instrument_node="">
</span><figure class="image" data-dcnode-id="625"><img alt="Flag of the Iroquois Confederacy" class="centered col-12" data-dcnode-id="637" id="img_tMDR" name="img_tMDR" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edtechbooks.org/content_images/democracy/1.5.2_Flag_of_the_Iroquois_Confederacy.png&amp;raw" style="width: 399px; height: 236px;"><span data-dcnode-id="636" instrument_node="">
</span><figcaption data-dcnode-id="627"><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="629" id="p_SfsoJ" name="p_SfsoJ"><a data-dcnode-id="633" data-shortened-url="https://edtechbooks.org/-XCBF" data-unshortened-url="https://upload.wikimedia.org/wikipedia/commons/7/77/Flag_of_the_Iroquois_Confederacy.svg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/7/77/Flag_of_the_Iroquois_Confederacy.svg" rel="noopener" target="_blank"><span data-dcnode-id="634" instrument_node="">"Flag of the Iroquois Confederacy"</span></a><span data-dcnode-id="632" instrument_node="">,&nbsp;</span><br data-dcnode-id="631"><span data-dcnode-id="630" instrument_node="">Public Domain</span></p><span data-dcnode-id="628" instrument_node="">
</span></figcaption><span data-dcnode-id="626" instrument_node="">
</span></figure><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622" id="p_Yxnwc" name="p_Yxnwc"><span data-dcnode-id="623" instrument_node="">The framework of government in the Iroquois Confederacy is said to have inspired Thomas Jefferson, George Washington, Benjamin Franklin and other founders as they wrote the Constitution. The founders adopted the Iroquois nation's symbol, the bald eagle, as the new nation's national symbol. &nbsp;</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="613" id="p_LGdjU" name="p_LGdjU"><span data-dcnode-id="620" instrument_node="">Some historians credit the Iroquois chief </span><strong data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Canasatego </span></strong><span data-dcnode-id="617" instrument_node="">with influencing Benjamin Franklin’s thinking about government (Franklin included references to the Iroquois Confederacy in his writing). Canasatego shared how the Great Law of Peace, the Iroquois Confederacy’s unwritten constitution, included rules of democratic self-government including the rights and responsibilities of each member tribe, and in so doing, stressed the importance of a unified, representative government. Other historians are unsure of these connections, citing the lack of definitive historical evidence. </span><a data-dcnode-id="615" data-shortened-url="https://edtechbooks.org/-AjXC" data-unshortened-url="https://teachinghistory.org/history-content/ask-a-historian/24099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachinghistory.org/history-content/ask-a-historian/24099" rel="noopener" target="_blank"><span data-dcnode-id="616" instrument_node="">Iroquois and the Founding Fathers </span></a><span data-dcnode-id="614" instrument_node="">from TeachingHistory.org presents both sides of this historical debate.</span></p><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="607" id="p_nEDS" name="p_nEDS"><span data-dcnode-id="611" instrument_node="">You can learn more at </span><a data-dcnode-id="609" data-shortened-url="https://edtechbooks.org/-ciWz" data-unshortened-url="https://www.pdx.edu/iroquois-democracy/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pdx.edu/iroquois-democracy/"><span data-dcnode-id="610" instrument_node="">Iroquois Democracy &amp; the U.S. Constitution</span></a><span data-dcnode-id="608" instrument_node="">, a website with learning plans from Portland State University.</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="601" id="p_LhdHx" name="p_LhdHx"><span data-dcnode-id="605" instrument_node="">In 1988, the United States Senate passed a resolution acknowledging the contributions of the Iroquois Confederacy (</span><a data-dcnode-id="603" data-shortened-url="https://edtechbooks.org/-BSKD" data-unshortened-url="https://www.senate.gov/reference/resources/pdf/hconres331.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.senate.gov/reference/resources/pdf/hconres331.pdf" rel="noopener" target="_blank"><span data-dcnode-id="604" instrument_node="">Text of Senate Resolution on the Contributions of the Iroquois Confederacy</span></a><span data-dcnode-id="602" instrument_node="">). However, none of the constitutions of the 13 colonies included First Americans’ rights and Native Americans did not gain citizenship until 1924.</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="595" id="p_VfoC" name="p_VfoC"><span data-dcnode-id="599" instrument_node="">In addition to influencing the founders, feminist scholar Sally Roesch Wagner (2001) contended that the social and political organization of indigenous societies impacted the thinking of early women suffragists including Lucy Stone, Lucretia Mott, Susan B. Anthony, and Elizabeth Cady Stanton. In Haudenosaunee (Iroquois) society, women were included in tribal leadership, could hold political office, controlled property, had spiritual authority within the community, and children belonged to the mother's clan. The women's rights advocates who wrote the Declaration of Sentiments were inspired by native women to argue for a more co-equal status for women in American society. You can access an overview of this idea from </span><a data-dcnode-id="597" data-shortened-url="https://edtechbooks.org/-toex" data-unshortened-url="https://edtechbooks.org/democracy/In%20addition%20to%20influencing%20the%20founding%20generation,%20feminist%20scholar%20Sally%20Roesch%20Wagner%20(2001)%20contended%20that%20the%20social%20and%20political%20organization%20of%20native%20societies%20impacted%20the%20thinking%20of%20early%20women%20suffragists%20including%20Lucy%20Stone,%20Lucretia%20Mott,%20Susan%20B.%20Anthony,%20and%20Elizabeth%20Cady%20Stanton.%20In%20Haudenosaunee%20(Iroquois)%20society,%20women%20were%20included%20in%20tribal%20leadership,%20could%20hold%20political%20office,%20controlled%20property,%20had%20spirtual%20authority%20within%20the%20community,%20and%20children%20belonged%20to%20the%20mother's%20clan.%20The%20women's%20rights%20advocates%20who%20wrote%20the%20Declaration%20of%20Sentiments%20were%20inspired%20by%20native%20women%20to%20argue%20for%20a%20more%20co-equal%20status%20for%20women%20in%20American%20society." href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edtechbooks.org/democracy/In%2520addition%2520to%2520influencing%2520the%2520founding%2520generation%2C%2520feminist%2520scholar%2520Sally%2520Roesch%2520Wagner%2520%282001%29%2520contended%2520that%2520the%2520social%2520and%2520political%2520organization%2520of%2520native%2520societies%2520impacted%2520the%2520thinking%2520of%2520early%2520women%2520suffragists%2520including%2520Lucy%2520Stone%2C%2520Lucretia%2520Mott%2C%2520Susan%2520B.%2520Anthony%2C%2520and%2520Elizabeth%2520Cady%2520Stanton.%2520In%2520Haudenosaunee%2520%28Iroquois%29%2520society%2C%2520women%2520were%2520included%2520in%2520tribal%2520leadership%2C%2520could%2520hold%2520political%2520office%2C%2520controlled%2520property%2C%2520had%2520spirtual%2520authority%2520within%2520the%2520community%2C%2520and%2520children%2520belonged%2520to%2520the%2520mother%27s%2520clan.%2520The%2520women%27s%2520rights%2520advocates%2520who%2520wrote%2520the%2520Declaration%2520of%2520Sentiments%2520were%2520inspired%2520by%2520native%2520women%2520to%2520argue%2520for%2520a%2520more%2520co-equal%2520status%2520for%2520women%2520in%2520American%2520society." rel="noopener" target="_blank"><span data-dcnode-id="598" instrument_node="">The Impact of Haudenosaunee Culture on the Early Suffragettes</span></a><span data-dcnode-id="596" instrument_node="">.</span></p><span data-dcnode-id="594" instrument_node="">
</span><h4 data-dcnode-id="591" id="h4_dSxK" name="h4_dSxK"><strong data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Native American Civil Rights</span></strong></h4><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="578" id="p_KIEL" name="p_KIEL"><span data-dcnode-id="579"><span data-dcnode-id="589" instrument_node="">Importantly, many history and civics classes in K-12 schools fail to mention the efforts of indigenous Americans to achieve equal rights under the Constitution. They were the last racial group to gain the right to vote. </span><a data-dcnode-id="587" data-shortened-url="https://edtechbooks.org/-sdvt" data-unshortened-url="https://www.zinnedproject.org/materials/native-american-activism-1960s-to-present/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zinnedproject.org/materials/native-american-activism-1960s-to-present/" rel="noopener" target="_blank"><span data-dcnode-id="588" instrument_node="">Native American Activism: 1960s to Present</span></a><span data-dcnode-id="586" instrument_node=""> from the Zinn Education Project focuses on events including the 1969 Alcatraz Island occupation, the 1970 occupation of Mount Rushmore, and the </span><a data-dcnode-id="584" data-shortened-url="https://edtechbooks.org/-qdax" data-unshortened-url="https://www.theatlantic.com/national/archive/2012/10/occupy-wounded-knee-a-71-day-siege-and-a-forgotten-civil-rights-movement/263998/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theatlantic.com/national/archive/2012/10/occupy-wounded-knee-a-71-day-siege-and-a-forgotten-civil-rights-movement/263998/" rel="noopener" target="_blank"><span data-dcnode-id="585" instrument_node="">1973 occupation of Wounded Knee</span></a><span data-dcnode-id="583" instrument_node="">. These are just a few of many events that happened in the 20th century to show their impact on civil rights legislation as well as the impact protest has on governmental change. There is more historical information at our wiki page for the</span><a data-dcnode-id="581" data-shortened-url="https://edtechbooks.org/-wcC" data-unshortened-url="http://resourcesforhistoryteachers.pbworks.com/w/page/128203098/Native%20American%20Civil%20Rights%20Movement" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//resourcesforhistoryteachers.pbworks.com/w/page/128203098/Native%2520American%2520Civil%2520Rights%2520Movement" rel="noopener" target="_blank"><span data-dcnode-id="582" instrument_node=""> Native American Civil Rights Movement</span></a><span data-dcnode-id="580" instrument_node="">.</span></span></p><span data-dcnode-id="577" instrument_node="">
</span><div class="callout good" data-dcnode-id="439"><span data-dcnode-id="576" instrument_node="">

</span><li data-dcnode-id="534" id="li_kyotD" name="li_kyotD"><strong data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">State Your View: </span></strong><span data-dcnode-id="547" instrument_node="">How did Native American Government Shape the U.S. Constitution?&nbsp;

</span><h3 data-dcnode-id="435" id="h3_Nxtx" name="h3_Nxtx"><span data-dcnode-id="436" instrument_node="">Media Literacy Connections: Representations of Native Americans in Film, Local History Publications, and School Mascots</span></h3><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="429" id="p_mnHK" name="p_mnHK"><span data-dcnode-id="433" instrument_node="">Although November is </span><a data-dcnode-id="431" data-shortened-url="https://edtechbooks.org/-HAt" data-unshortened-url="https://www.whitehouse.gov/briefing-room/presidential-actions/2021/10/29/a-proclamation-on-national-native-american-heritage-month-2021/#:~:text=NOW%2C%20THEREFORE%2C%20I%2C%20JOSEPH,National%20Native%20American%20Heritage%20Month." href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/briefing-room/presidential-actions/2021/10/29/a-proclamation-on-national-native-american-heritage-month-2021/%23%3A~%3Atext%3DNOW%252C%2520THEREFORE%252C%2520I%252C%2520JOSEPH%2CNational%2520Native%2520American%2520Heritage%2520Month." rel="noopener" target="_blank"><span data-dcnode-id="432" instrument_node="">National Native American Heritage Month</span></a><span data-dcnode-id="430" instrument_node="">, most students learn little about Native peoples or First American cultures in schools.</span></p><span data-dcnode-id="428" instrument_node="">
</span><figure class="image" data-dcnode-id="417"><img alt="Reverse of the 1 US dollar coin - 2020 - series &quot;Native Americans&quot;" class="none" data-dcnode-id="427" height="308" id="img_aehp" name="img_aehp" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edtechbooks.org/content_images/mediaandciviclearning/308x308xT1_US-1-2020-native-american-reverse.jpg.pagespeed.ic.w7Xf-FtWkE.jpg&amp;raw" width="308"><span data-dcnode-id="426" instrument_node="">
</span><figcaption data-dcnode-id="419"><span data-dcnode-id="425" instrument_node="">Reverse of the </span><a data-dcnode-id="423" data-shortened-url="https://edtechbooks.org/-FEQ" data-unshortened-url="https://commons.wikimedia.org/wiki/File:US-1%24-2020-native-american-reverse.jpg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AUS-1%2524-2020-native-american-reverse.jpg" rel="noopener" target="_blank"><span data-dcnode-id="424" instrument_node="">1 US dollar coin - 2020</span></a><span data-dcnode-id="422" instrument_node=""> - series "Native Americans" by United States Mint picture</span><br data-dcnode-id="421"><span data-dcnode-id="420" instrument_node="">Public Domain</span></figcaption><span data-dcnode-id="418" instrument_node="">
</span></figure><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="411" id="p_yFCN" name="p_yFCN"><span data-dcnode-id="415" instrument_node="">The indigenous education organization </span><a data-dcnode-id="413" data-shortened-url="https://edtechbooks.org/-KXVh" data-unshortened-url="https://illuminatives.org/nativenow/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//illuminatives.org/nativenow/" rel="noopener" target="_blank"><span data-dcnode-id="414" instrument_node="">IllumiNative</span></a><span data-dcnode-id="412" instrument_node=""> reports that most (87%) state level history standards do not address Native history past 1900. Much of what students do learn about Native history comes from the media. These activities ask you to critically consider how Native peoples have been represented in films and in local history publications and how those representations have shaped people's attitudes:</span></p><span data-dcnode-id="410" instrument_node="">
</span><ul data-dcnode-id="390" id="ul_BogV" name="ul_BogV"><span data-dcnode-id="409" instrument_node="">
</span><li data-dcnode-id="402" id="p_SwYo" name="p_SwYo"><a data-dcnode-id="403" data-shortened-url="https://edtechbooks.org/-VNy" data-unshortened-url="https://edtechbooks.org/mediaandciviclearning/representation_of_NativeAmericans#p_SwYo" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edtechbooks.org/mediaandciviclearning/representation_of_NativeAmericans%23p_SwYo" rel="noopener" target="_blank"><strong data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Activity 1:</span></strong><span data-dcnode-id="406" instrument_node=""> </span><strong data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Analyze how Native Americans are Portrayed in Movies</span></strong></a></li><span data-dcnode-id="401" instrument_node="">
</span><li data-dcnode-id="397" id="p_AJNx" name="p_AJNx"><a data-dcnode-id="398" data-shortened-url="https://edtechbooks.org/-wGxK" data-unshortened-url="https://edtechbooks.org/mediaandciviclearning/representation_of_NativeAmericans#p_fwAg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edtechbooks.org/mediaandciviclearning/representation_of_NativeAmericans%23p_fwAg" rel="noopener" target="_blank"><strong data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Activity 2: Design a Film or TV show About Native Americans' Influence on the U.S. Government</span></strong></a></li><span data-dcnode-id="396" instrument_node="">
</span><li data-dcnode-id="392" id="p_dhVm" name="p_dhVm"><a data-dcnode-id="393" data-shortened-url="https://edtechbooks.org/-fZw" data-unshortened-url="https://edtechbooks.org/mediaandciviclearning/representation_of_NativeAmericans#p_dhVm" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edtechbooks.org/mediaandciviclearning/representation_of_NativeAmericans%23p_dhVm" rel="noopener" target="_blank"><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Activity 3: Research &amp; Redesign the First American History of the Place Where You Live Today</span></strong></a></li><span data-dcnode-id="391" instrument_node="">

</span><h2 data-dcnode-id="377" id="h2_YIFVZ" name="h2_YIFVZ"><strong data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">2.UNCOVER:</span></strong><span data-dcnode-id="384" instrument_node=""> </span><strong data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">The Peskeompskut</span></strong><strong data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">-</span></strong><strong data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Wissatinnewag Massacre or Battle of Great Falls</span></strong></h2><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="356" id="p_wkhpC" name="p_wkhpC"><strong data-dcnode-id="373"><span class="misspelled" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Peskeompskut</span></span></strong><span data-dcnode-id="372" instrument_node=""> is the name for the waterfalls on the Connecticut River between the communities of Turners Falls and Gill, Massachusetts. The </span><span class="misspelled" data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Peskeompskut</span></span><span data-dcnode-id="369" instrument_node=""> Massacre or the Great Falls Fight was a pivotal event in King Philip's War that unfolded when a colonial militia led a </span><span class="misspelled" data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">pre</span></span><span data-dcnode-id="366" instrument_node="">-dawn surprise attack of an Indian fishing village on the shores of the river on May 16, 1676. An interactive photograph and summary of the scene entitled </span><a data-dcnode-id="361" data-shortened-url="https://edtechbooks.org/-LEw" data-unshortened-url="http://1704.deerfield.history.museum/scenes/scene.do?title=Peskeompskut" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//1704.deerfield.history.museum/scenes/scene.do%3Ftitle%3DPeskeompskut" rel="noopener" target="_blank"><strong data-dcnode-id="362"><span data-dcnode-id="365" instrument_node="">Assault on </span><span class="misspelled" data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Peskeompskut</span></span></strong></a><span data-dcnode-id="360" instrument_node="">&nbsp;is available from the Memorial Hall Museum, </span><span class="misspelled" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Deerfield</span></span><span data-dcnode-id="357" instrument_node="">, Massachusetts.&nbsp;</span></p><span data-dcnode-id="355" instrument_node="">
</span><figure class="image" data-dcnode-id="341"><img alt="Technical ReportBattle of Great Falls" class="centered col-12" data-dcnode-id="354" id="img_cFRu" name="img_cFRu" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edtechbooks.org/content_images/democracy/1.5.3_Technical_ReportBattle_of_Great_Falls.png&amp;raw" style="width: 495px; height: 386px;"><span data-dcnode-id="353" instrument_node="">
</span><figcaption data-dcnode-id="343"><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="345" id="p_ZeMUw" name="p_ZeMUw"><span data-dcnode-id="351" instrument_node="">Figure 17: Technical Report - Battle of Great Falls / Wissatinnewag-Peskeompskut (May 19, 1676), U. S. Department of the Interior National Park Service American Battlefield Protection Program</span><br data-dcnode-id="350"><a data-dcnode-id="348" data-shortened-url="https://edtechbooks.org/-wKzH" data-unshortened-url="https://www.montague-ma.gov/files/Battle_of_Great_Falls_Phase_I_Final_Technical_Report.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.montague-ma.gov/files/Battle_of_Great_Falls_Phase_I_Final_Technical_Report.pdf"><span data-dcnode-id="349" instrument_node="">https://edtechbooks.org/-wKzH</span></a><br data-dcnode-id="347"><br data-dcnode-id="346"></p><span data-dcnode-id="344" instrument_node="">
</span></figcaption><span data-dcnode-id="342" instrument_node="">
</span></figure><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="338" id="p_QZEIt" name="p_QZEIt"><span data-dcnode-id="339" instrument_node="">Different writers have described the event differently, as a massacre or a battle. Regardless of how it is described, it is clear that hundreds of English soldiers and native people were involved and that many women and children were killed in the raid on the village. In 2018, the town of Montague, Massachusetts received a grant from the National Park Service to survey the battlefield and apply for recognition in the National Register of Historic Places. But what really happened on that day?</span></p><span data-dcnode-id="337" instrument_node="">
</span><div class="callout good" data-dcnode-id="307"><span data-dcnode-id="336" instrument_node="">

</span><p data-dcnode-id="262" id="p_nhmrr" name="p_nhmrr"><strong data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Jeffrey Amherst </span></strong><span data-dcnode-id="263" instrument_node="">was a British army general during the French and Indian War and then royal governor of Virginia (although he refused to live there) in the decades before the American Revolution. The Town of Amherst, Massachusetts, founded in 1759, is named after him. Amherst College, founded in 1821, is named after the town. There are also towns named Amherst in Wisconsin, Virginia, Texas, Tennessee, South Dakota, Ohio, North Carolina, New York, New Hampshire, Nebraska, Montana, Minnesota, Maine and Colorado.</span></p><span data-dcnode-id="261" instrument_node="">
</span><figure class="image" data-dcnode-id="247"><img alt="Portrait of Jeffrey Amherst" class="centered col-12" data-dcnode-id="260" id="img_HxZs" name="img_HxZs" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edtechbooks.org/content_images/democracy/1.5.4_Portrait_of_Jeffrey_Amherst.png&amp;raw" style="width: 345px; height: 449px;"><span data-dcnode-id="259" instrument_node="">
</span><figcaption data-dcnode-id="249"><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="251" id="p_gMCpc" name="p_gMCpc"><strong data-dcnode-id="255"><span data-dcnode-id="257" instrument_node="">Portrait of Jeffrey Amherst</span><br data-dcnode-id="256"></strong><a data-dcnode-id="253" data-shortened-url="https://edtechbooks.org/-ZRc" data-unshortened-url="https://commons.wikimedia.org/wiki/File:Amherst.jpg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AAmherst.jpg" rel="noopener" target="_blank"><span data-dcnode-id="254" instrument_node="">"Amherst"</span></a><span data-dcnode-id="252" instrument_node=""> | Public Domain</span></p><span data-dcnode-id="250" instrument_node="">
</span></figcaption><span data-dcnode-id="248" instrument_node="">
</span></figure><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="244" id="p_fogTi" name="p_fogTi"><span data-dcnode-id="245" instrument_node="">Jeffrey Amherst is a very controversial historical figure. Throughout his life, he displayed overt hatred and racism toward native people. Historians charge him with suggesting—or actually providing—smallpox-infected blankets to American Indians in the Ohio Valley of North America. In a 1763 letter he wrote, “You will do well to try to inoculate the Indians by means of blankets, as well as to try every other method that can serve to extirpate this execrable race” (quoted in Berg, 2019).&nbsp;</span></p><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="241" id="p_CIigr" name="p_CIigr"><span data-dcnode-id="242" instrument_node="">In 2016, Amherst College dropped “Lord Jeff” as its athletic team and school mascot. More recently, there have been calls from citizens to rename the town of Amherst itself. The case of Jeffrey Amherst raises questions about how to evaluate the reputations of famous people in history, especially those who engaged in undemocratic and discriminatory actions toward other people.&nbsp;&nbsp;</span></p><span data-dcnode-id="240" instrument_node="">
</span><div class="callout good" data-dcnode-id="134"><span data-dcnode-id="239" instrument_node="">
</span><h3 data-dcnode-id="237" id="h3_SwcUr" name="h3_SwcUr"><span data-dcnode-id="238" instrument_node="">Suggested Learning Activities</span></h3><span data-dcnode-id="236" instrument_node="">

</span><li data-dcnode-id="227" id="li_znMPS" name="li_znMPS"><span data-dcnode-id="228" instrument_node="">Is there sufficient evidence to condemn him as an advocate for biological warfare?</span></li><span data-dcnode-id="226" instrument_node="">
</span><li data-dcnode-id="224" id="li_UUSAn" name="li_UUSAn"><span data-dcnode-id="225" instrument_node="">Should towns named Amherst - including Amherst, Massachusetts - change their names based on historical evidence of his actions?</span></li><span data-dcnode-id="223" instrument_node="">
</span><li data-dcnode-id="221" id="li_BZxXo" name="li_BZxXo"><span data-dcnode-id="222" instrument_node="">In what ways does the case of Jeffrey Amherst relate to current debates over Native American mascots and Confederate monuments from the Civil War?</span></li><span data-dcnode-id="220" instrument_node="">
