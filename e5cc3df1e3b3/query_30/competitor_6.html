o-border-bottom-themecolor:accent2;mso-border-bottom-themeshade:191;  padding:0cm 0cm 0cm 0cm;height:1.0cm" width="151"><span data-dcnode-id="2195" instrument_node=""> </span><p align="center" class="MsoNormal" data-dcnode-id="2193" style="text-align:center;mso-pagination:none;  layout-grid-mode:char;mso-layout-grid-align:none"><span data-dcnode-id="2194" instrument_node="">Relevant Provision </span></p><span data-dcnode-id="2192" instrument_node=""> </span></td><td data-dcnode-id="2185" style="width:276.4pt;border-top:solid #943634 1.0pt;mso-border-top-themecolor:  accent2;mso-border-top-themeshade:191;border-left:none;border-bottom:solid #943634 1.0pt;  mso-border-bottom-themecolor:accent2;mso-border-bottom-themeshade:191;  border-right:none;mso-border-top-alt:solid #943634 .5pt;mso-border-top-themecolor:  accent2;mso-border-top-themeshade:191;mso-border-bottom-alt:solid #943634 .25pt;  mso-border-bottom-themecolor:accent2;mso-border-bottom-themeshade:191;  padding:0cm 0cm 0cm 0cm;height:1.0cm" width="369"><span data-dcnode-id="2189" instrument_node=""> </span><p align="center" class="MsoNormal" data-dcnode-id="2187" style="text-align:center;mso-pagination:none;  layout-grid-mode:char;mso-layout-grid-align:none"><span data-dcnode-id="2188" instrument_node="">Details </span></p><span data-dcnode-id="2186" instrument_node=""> </span></td></tr><tr data-dcnode-id="2162" style="mso-yfti-irow:1;page-break-inside:avoid;height:48.75pt"><td data-dcnode-id="2176" style="width:89.3pt;border:none;mso-border-top-alt:solid #943634 .25pt;  mso-border-top-themecolor:accent2;mso-border-top-themeshade:191;padding:0cm 0cm 0cm 0cm;  height:48.75pt" width="119"><span data-dcnode-id="2180" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2178" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2179" instrument_node="">Freedom of Expression </span></p><span data-dcnode-id="2177" instrument_node=""> </span></td><td data-dcnode-id="2170" style="width:4.0cm;border:none;mso-border-top-alt:solid #943634 .25pt;  mso-border-top-themecolor:accent2;mso-border-top-themeshade:191;padding:0cm 0cm 0cm 0cm;  height:48.75pt" width="151"><span data-dcnode-id="2174" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2172" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2173" instrument_node="">Section 39 CFRN; art 9 ACHPR; art 19 UDHR. </span></p><span data-dcnode-id="2171" instrument_node=""> </span></td><td data-dcnode-id="2164" style="width:276.4pt;border:none;mso-border-top-alt:solid #943634 .25pt;  mso-border-top-themecolor:accent2;mso-border-top-themeshade:191;padding:0cm 0cm 0cm 0cm;  height:48.75pt" width="369"><span data-dcnode-id="2168" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2166" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2167" instrument_node="">These provisions grant every Nigerian the freedom to receive and express their opinion, ideas and information. It also grants the right to establish and operate any medium used in disseminating information in Nigeria subject to the regulations of wireless broadcast. </span></p><span data-dcnode-id="2165" instrument_node=""> </span></td></tr><tr data-dcnode-id="2141" style="mso-yfti-irow:2;page-break-inside:avoid;height:60.95pt"><td data-dcnode-id="2155" style="width:89.3pt;border:none;padding:0cm 0cm 0cm 0cm;  height:60.95pt" width="119"><span data-dcnode-id="2159" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2157" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2158" instrument_node="">Right to Life </span></p><span data-dcnode-id="2156" instrument_node=""> </span></td><td data-dcnode-id="2149" style="width:4.0cm;border:none;padding:0cm 0cm 0cm 0cm;  height:60.95pt" width="151"><span data-dcnode-id="2153" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2151" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2152" instrument_node="">Section 33 CFRN; art 4 ACHPR; art 3 UDHR. </span></p><span data-dcnode-id="2150" instrument_node=""> </span></td><td data-dcnode-id="2143" style="width:276.4pt;border:none;padding:0cm 0cm 0cm 0cm;  height:60.95pt" width="369"><span data-dcnode-id="2147" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2145" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2146" instrument_node="">Everyone has a right to life and no one must be deprived of his life intentionally. The exceptions to this right are: 1) a valid death sentence by a court of law; 2) where a person dies during the use of reasonable force while engaging in self defense; and 3) where a person dies while effecting lawful arrest or suppressing a riot, mutiny or insurrection provided reasonable force is used. </span></p><span data-dcnode-id="2144" instrument_node=""> </span></td></tr><tr data-dcnode-id="2120" style="mso-yfti-irow:3;page-break-inside:avoid;height:27.2pt"><td data-dcnode-id="2134" style="width:89.3pt;border:none;padding:0cm 0cm 0cm 0cm;  height:27.2pt" width="119"><span data-dcnode-id="2138" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2136" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2137" instrument_node="">Freedom of Association </span></p><span data-dcnode-id="2135" instrument_node=""> </span></td><td data-dcnode-id="2128" style="width:4.0cm;border:none;padding:0cm 0cm 0cm 0cm;  height:27.2pt" width="151"><span data-dcnode-id="2132" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2130" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2131" instrument_node="">Section 40 CFRN; art 10 and 11 ACHPR; art 17 and 20 UDHR. </span></p><span data-dcnode-id="2129" instrument_node=""> </span></td><td data-dcnode-id="2122" style="width:276.4pt;border:none;padding:0cm 0cm 0cm 0cm;  height:27.2pt" width="369"><span data-dcnode-id="2126" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2124" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2125" instrument_node="">Every Nigerian is entitled to form or join any association of people in Nigeria in support of his interest. </span></p><span data-dcnode-id="2123" instrument_node=""> </span></td></tr><tr data-dcnode-id="2099" style="mso-yfti-irow:4;page-break-inside:avoid;height:27.2pt"><td data-dcnode-id="2113" style="width:89.3pt;border:none;padding:0cm 0cm 0cm 0cm;  height:27.2pt" width="119"><span data-dcnode-id="2117" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2115" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2116" instrument_node="">Right to Dignity of Life </span></p><span data-dcnode-id="2114" instrument_node=""> </span></td><td data-dcnode-id="2107" style="width:4.0cm;border:none;padding:0cm 0cm 0cm 0cm;  height:27.2pt" width="151"><span data-dcnode-id="2111" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2109" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2110" instrument_node="">Section 34 CFRN; art 4 ACHPR; art 1, 4, 5 and 6 UDHR. </span></p><span data-dcnode-id="2108" instrument_node=""> </span></td><td data-dcnode-id="2101" style="width:276.4pt;border:none;padding:0cm 0cm 0cm 0cm;  height:27.2pt" width="369"><span data-dcnode-id="2105" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2103" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2104" instrument_node="">Every individual is entitled to dignity and respect. He is entitled to be free from slavery and torture. </span></p><span data-dcnode-id="2102" instrument_node=""> </span></td></tr><tr data-dcnode-id="2078" style="mso-yfti-irow:5;page-break-inside:avoid;height:71.15pt"><td data-dcnode-id="2092" style="width:89.3pt;border:none;padding:0cm 0cm 0cm 0cm;  height:71.15pt" width="119"><span data-dcnode-id="2096" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2094" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2095" instrument_node="">Right to Liberty </span></p><span data-dcnode-id="2093" instrument_node=""> </span></td><td data-dcnode-id="2086" style="width:4.0cm;border:none;padding:0cm 0cm 0cm 0cm;  height:71.15pt" width="151"><span data-dcnode-id="2090" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2088" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2089" instrument_node="">Section 35 CFRN </span></p><span data-dcnode-id="2087" instrument_node=""> </span></td><td data-dcnode-id="2080" style="width:276.4pt;border:none;padding:0cm 0cm 0cm 0cm;  height:71.15pt" width="369"><span data-dcnode-id="2084" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2082" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2083" instrument_node="">Every Nigerian has the right to personal liberty and no person should be deprived of this right except: 1) in execution of a criminal sentence by a court of law; 2) for failure to comply with an order of court; 3) in bringing him before a court; 4) in preventing him from committing an offence; 5) where he is reasonably suspected of committing an offence; and 6) for the purpose of care and treatment for persons with infectious disease, unsound mind or addictions. </span></p><span data-dcnode-id="2081" instrument_node=""> </span></td></tr><tr data-dcnode-id="2057" style="mso-yfti-irow:6;mso-yfti-lastrow:yes;page-break-inside:avoid;  height:39.7pt"><td data-dcnode-id="2071" style="width:89.3pt;border:none;border-bottom:solid #943634 1.0pt;  mso-border-bottom-themecolor:accent2;mso-border-bottom-themeshade:191;  mso-border-bottom-alt:solid #943634 .5pt;mso-border-bottom-themecolor:accent2;  mso-border-bottom-themeshade:191;padding:0cm 0cm 0cm 0cm;height:39.7pt" width="119"><span data-dcnode-id="2075" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2073" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2074" instrument_node="">Freedom of Movement </span></p><span data-dcnode-id="2072" instrument_node=""> </span></td><td data-dcnode-id="2065" style="width:4.0cm;border:none;border-bottom:solid #943634 1.0pt;  mso-border-bottom-themecolor:accent2;mso-border-bottom-themeshade:191;  mso-border-bottom-alt:solid #943634 .5pt;mso-border-bottom-themecolor:accent2;  mso-border-bottom-themeshade:191;padding:0cm 0cm 0cm 0cm;height:39.7pt" width="151"><span data-dcnode-id="2069" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2067" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2068" instrument_node="">Section 41 CFRN; art 12 ACHPR; art 13 UDHR. </span></p><span data-dcnode-id="2066" instrument_node=""> </span></td><td data-dcnode-id="2059" style="width:276.4pt;border:none;border-bottom:solid #943634 1.0pt;  mso-border-bottom-themecolor:accent2;mso-border-bottom-themeshade:191;  mso-border-bottom-alt:solid #943634 .5pt;mso-border-bottom-themecolor:accent2;  mso-border-bottom-themeshade:191;padding:0cm 0cm 0cm 0cm;height:39.7pt" width="369"><span data-dcnode-id="2063" instrument_node=""> </span><p align="left" class="MsoNormal" data-dcnode-id="2061" style="margin-left:2.0pt;mso-para-margin-left:  .2gd;text-align:left;mso-pagination:none;layout-grid-mode:char;mso-layout-grid-align:  none"><span data-dcnode-id="2062" instrument_node="">Every Nigerian has the right to move anywhere in Nigeria. This right, however, does not apply where a person has been lawfully sentenced to imprisonment or restricted by a court of law. </span></p><span data-dcnode-id="2060" instrument_node=""> </span></td></tr></tbody></table></p><span data-dcnode-id="2052" instrument_node="">
</span><p class="sacImgMarkCss" data-dcnode-id="2047"><a data-dcnode-id="2049" id="t1" name="t1"><span class="cs_fig_con" data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Table 1</span></span></a><span data-dcnode-id="2048" instrument_node="">. Constitutional fundamental human rights that were violated during the end SARS protest.</span></p><span data-dcnode-id="2046" instrument_node="">
</span></div><span data-dcnode-id="2044" instrument_node="">
</span><p class="E-Title1" data-dcnode-id="2041"><a data-dcnode-id="2042" id="txtF3" target="_self"><span data-dcnode-id="2043" instrument_node="">4. Conclusion</span></a></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Freedom of expression is one of the fundamental rights, which are universally recognized and protected. Freedom of peaceful assembly enables individuals to express themselves as part of a collective, including by engaging in public marches, protests, pickets and demonstrations. Assemblies can be platforms to advocate for change and for people to raise awareness about the issues that matter to them, whether it relates to human rights or otherwise. On this note, countries have an obligation to ensure that the right to freedom of assembly is protected as stated in Section 40 of the Nigerian 1999 constitution which gives the freedom of citizens of Nigeria to assembly freely and associate with one another. They cannot interfere with the right to peaceful protest assembly, simply because it disagrees with the protesters views, and must ensure that the right is enjoyed equally by all groups, without discrimination on any ground. Effective protection of the right to freedom of peaceful assembly strengthens democracies. It helps foster a culture of open democracy, enables non-violent participation in public affairs and invigorates discussions on important issues. Public assemblies also help to promote good governance by providing opportunities for the public to hold to account people of organizations with power, including corporate entities, public bodies and governmental officials. This work, having stated some cases of human rights violations by both government and private citizens, advocates faithfulness to statutory and constitutional responsibilities by all and sundry. Nigerians should know their rights and insist on them being respected without fear of intimidation, victimization and contradictions. The Mass Media, both electronic and print, should mobilize the people to live up to their obligations in order to rightly ask government questions and demand respect for human rights and reparation when abused. Nigeria with all her resources both natural and human should be a model for liberal democracy and rule of law that safeguards human rights. Human rights cannot be taken away in democracy, because democratic government exists to cater for the interest of the populace by safeguarding their fundamental rights. The imports of human rights are today underscored by elaborate provisions in the constitutions of states. In the case of Nigeria, the 1999 constitution as amended provides for the rights of Nigeria, however, serious and conscious attempt by the present government to abide by those provisions. It is therefore germane that the government takes proactive steps to properly sanitize the rights of the people of their rights. It is also necessary to re-orient the security agents by way of training to always respect the rights of Nigerians.</span></p><span data-dcnode-id="2037" instrument_node="">
