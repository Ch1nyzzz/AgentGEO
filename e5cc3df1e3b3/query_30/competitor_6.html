</span><meta content="It is stated that both under the constitution of
Nigeria and under the African Charter on Human People’s Rights, persons in any
part of Nigeria have the fundamental human right to privately and publicly
freely express their disproval or objection over an issue through a protest any
time or day. In history, protests have often inspired positive social change
and improved protection of human rights, and they continue to help define and
protect civic space in all parts of the world. In a democratic Nation like
Nigeria, Protests encourage the development of an engaged and informed
citizenry and strengthen representative democracy by enabling direct
participation in public affairs. They enable individuals and groups to express
dissent and grievances, to share views and opinions, to expose flaws in
governance and to publicly demand that the authorities and other powerful
entities solve problems and are accountable for their actions as seen in the
case of the Nigeria Youths protest on police brutality. Yet governments around
the world too often treat protests as either an inconvenience to be controlled
or a threat to be extinguished. In a democratic Nation, the right to freedom of
expression which could come through peaceful protests, involves the exercise of
numerous fundamental human rights, and it is essential for securing all human
rights, which the citizens should not be denied off by any person in power." data-dcnode-id="2942" name="description"><span data-dcnode-id="2941" instrument_node="">

</span><p data-dcnode-id="2588" style="font-weight: bold; font-size: 16px;"><a data-dcnode-id="2589" name="abstract" style="color: #2f2f2f;"><span data-dcnode-id="2590" instrument_node="">Abstract</span></a></p><span data-dcnode-id="2587" instrument_node="">
</span><p data-dcnode-id="2584" style="text-align:left;"><span data-dcnode-id="2585" style="font-family:Verdana;"><span data-dcnode-id="2586" instrument_node="">It is stated that both under the constitution of
Nigeria and under the African Charter on Human People’s Rights, persons in any
part of Nigeria have the fundamental human right to privately and publicly
freely express their disproval or objection over an issue through a protest any
time or day. In history, protests have often inspired positive social change
and improved protection of human rights, and they continue to help define and
protect civic space in all parts of the world. In a democratic Nation like
Nigeria, Protests encourage the development of an engaged and informed
citizenry and strengthen representative democracy by enabling direct
participation in public affairs. They enable individuals and groups to express
dissent and grievances, to share views and opinions, to expose flaws in
governance and to publicly demand that the authorities and other powerful
entities solve problems and are accountable for their actions as seen in the
case of the Nigeria Youths protest on police brutality. Yet governments around
the world too often treat protests as either an inconvenience to be controlled
or a threat to be extinguished. In a democratic Nation, the right to freedom of
expression which could come through peaceful protests, involves the exercise of
numerous fundamental human rights, and it is essential for securing all human
rights, which the citizens should not be denied off by any person in power.</span></span></p><span data-dcnode-id="2583" instrument_node="">

</span><p class="E-Title1" data-dcnode-id="2488"><a data-dcnode-id="2489" id="txtF0" target="_self"><span data-dcnode-id="2490" instrument_node="">1. Introduction</span></a></p><span data-dcnode-id="2487" instrument_node="">
</span><p class="E-Title2" data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">1.1. Background of the Study</span></p><span data-dcnode-id="2484" instrument_node="">
</span><p data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">One of the beauties of democracy is the rule of law. Human rights are protected under the most current constitution of 1999. Nigeria has made major improvements in human rights under this constitution through the American Human Rights Report of 2012 notes areas where significant improvement is needed, which include: abuses by Boko Haram, killings by government forces, lack of social equality, and issues with freedom of speech. In the period between its independence in 1960 and 1998, Nigeria had, in terms of heads of State, two elected, one appointed, one military successor and 7 [coups d’état] powers. In 1979, Nigeria adopted a presidential system in order to properly instate the right of choosing who rules them with a new constitution. This constitution guarantees fundamental human rights that are constantly in violation. Nigerian youths embarked on peaceful protest tagged #EndSARS to demand the disbandment of the Special Anti-Robbery Squad (SARS) unit, as well as, other reforms in the Nigerian Police Force (NPF). What started out as a peaceful demonstration by thousands of youths, degenerated into chaos after the protests were hijacked by hoodlums. The hijacked protest is now characterized by the heavy presence of security personnel on the streets of Lagos, mob attacks on security personnel, killings, and vandalization of public and private properties. Oct. 20, 2020, will forever be known as Black Tuesday in Nigeria. In a darkness broken only by the blue light of cell-phone screens, the sound of gunshots rang out as the army and police allegedly fired into a crowd of young people who had gathered at Lagos’s Lekki toll gate to protest against the now disbanded Special Anti-Robbery Squad (SARS), a notoriously abusive arm of the police. The massacre at Lekki punctuated more than two weeks of protest of police brutality in Nigeria. The hash tag #EndSARS began trending (again) on social media on Oct. 4. The immediate trigger was a video that showed a SARS officer shooting a young motorist in Ughelli, in Delta state, then pushing his body out of the car and driving off with the dead man’s Lexus SUV. Within days, crowds of young people gathered in Nigerian cities to demand the abolition of SARS. This year’s protests follow on previous activism and government announcements that SARS would be demobilized in 2014, 2015 and 2017. And yet, SARS officers continued to act with impunity, committing armed robberies, rapes, other acts of torture and extrajudicial killings like the one in Delta State. On Oct. 11, leaders announced that SARS would be disbanded, but crowds of protesters grew bigger—even in the face of violence and intimidation. Since the protests began, estimates are that at least 100 individuals have allegedly lost their lives; 48 of whom were killed on Black Tuesday alone. Black Tuesday is the latest in a long history of police and military campaigns in Nigeria against the civilian population. For half of the republic’s 60-year history and for the century of colonial rule before independence, there have been quasi-military police forces and outright military police charged with repressing dissent from the civilian population. The history of Nigeria’s police abuses helps us see the continuities in the misuse of state power against citizens. But it also shows that through it all, Nigerians have resisted the negation of their basic humanity and their rights to freedom of expression have been punctured.</span></p><span data-dcnode-id="2481" instrument_node="">
</span><p class="E-Title2" data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">1.2. Statement of the Problem</span></p><span data-dcnode-id="2478" instrument_node="">
</span><p data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">Amongst different varieties of governments or regimes, democratic government is the greatest upholder and respecter of human rights. As such, expression of human rights blossoms most in a democratic setting. In Nigeria, democratic practice and its consequent protection of human rights are not what they ought to be. The flagrant violation of human rights in democratic Nigeria by so many governmental agencies casts doubt on the facility of real democratic practice in Nigeria. Respect for human rights enriches democracy and makes it the best option among many others. The Nigerian democracy is stripped of its one of its beauties, (upholding human of rights), by the rulers and their cohorts. Citizens are now restricted from having peaceful protests on the streets, at worst cases military men are alleged to start shooting at unarmed citizens if by any means the rulers of the nation feels threatened by the protesters, which in most cases such allegations are also denied by them. These government officials see themselves as above the law and have no regards for due process and rule of law. The immunity clause in the 1999 Nigerian constitution is an aberration of real democratic practice. People should be answerable for both their actions and inactions immediately and not after vacating offices. However, in Nigeria, this seems not to be the case as little or nothing is done about corruption and insecurity in the country.</span></p><span data-dcnode-id="2475" instrument_node="">
</span><p class="E-Title2" data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">1.3. Aim of Research</span></p><span data-dcnode-id="2472" instrument_node="">
</span><p data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">The aim of this research is to establish the correlation between democracy and fundamental human rights which the right to expression is encompassed in. This paper is of the notion that citizens in a democratic nation should be not be denied of the right to freely express their dissatisfaction or disapproval of governmental decisions or actions through peaceful protests, which is a platform whereby their views on issues on ground are aired, especially in an a democratic country.</span></p><span data-dcnode-id="2469" instrument_node="">
</span><p class="E-Title1" data-dcnode-id="2466"><a data-dcnode-id="2467" id="txtF1" target="_self"><span data-dcnode-id="2468" instrument_node="">2. Ease of Use</span></a></p><span data-dcnode-id="2465" instrument_node="">
</span><p class="E-Title2" data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">2.1. Understanding Democracy</span></p><span data-dcnode-id="2462" instrument_node="">
</span><p data-dcnode-id="2449"><a class="content_c33" data-dcnode-id="2460" href="#ref33" id="return0" onclick="returnAuhor(33,0)" target="_self"><span data-dcnode-id="2461" instrument_node="">Ozoigbo (2017)</span></a><span data-dcnode-id="2459" instrument_node=""> states that Democracy from the time of the ancient Athenians to the contemporary period has been regarded as a people oriented kind of government. This notion is gotten from its etymological derivation—“demos and Kratos”, meaning rule or government by the people. In the view of Sabine &amp; Thorson (1973), the Greek Euripides clearly posited a democratic state as one that is ruled by the people through their representatives who are answerable to them. They went further to note the position of Rousseau in this regard as the government of the people for the General Will. This simply implies that the action of the government must be in fulfillment of The Will of the people which naturally is their welfare. As a matter of fact, the government must abide by the rule of law and make available to the people a system of education that will inculcate in the children the idea that the idea of the realization of their individuality resides in their affiliation with the state, a kind of citizenship education. </span><a class="content_c04" data-dcnode-id="2457" href="#ref04" id="return1" onclick="returnAuhor(04,1)" target="_self"><span data-dcnode-id="2458" instrument_node="">Appadorai (2003)</span></a><span data-dcnode-id="2456" instrument_node="">, thought of democracy as a system of government under which the people exercise the governing power either directly or through representatives periodically elected by themselves. </span><a class="content_c03" data-dcnode-id="2454" href="#ref03" id="return2" onclick="returnAuhor(03,2)" target="_self"><span data-dcnode-id="2455" instrument_node="">Akinsanya (2000)</span></a><span data-dcnode-id="2453" instrument_node="">, in his own contribution maintained that democracy not only means a form of government in which the people rule in contradistinction to monarchies, aristocracies and gerontocracies; it also entails a state in which there is some form of political equality among the people. He went on to state that the central pillar of democracy the world over is based on the control of government by the people through free elections and universal adult suffrage. Therefore, only a democratic government, established by the consent of the governed in accordance with their shared values, has the moral authority to act as the legitimate agent of the people. Thus, democracy has been defended on the grounds that it achieves a number of fundamental values and goals; equality, liberty, moral self-development, the common interest, private interests, social utility, the satisfaction of wants and efficient decision. For authentic democracy to be on ground there must be as a matter of utmost necessity an independent electoral umpire, a strong and vibrant judiciary, an enlightened populace, a robust and free press, democratic culture and atmosphere of peace, and security. Coming home to Nigeria in terms of democratic practice, we assert that the primary instrument of democracy today is the 1999 constitution as amended. From 1999 till date, the question we always ask is, do we really have real democratic government or civilian government and what is real or consolidated democracy? To the first question, the obvious answer is no democratic government since the basic features of democracy are not present. These features are contained in the definition of consolidated democracy which </span><a class="content_c03" data-dcnode-id="2451" href="#ref03" id="return3" onclick="returnAuhor(03,3)" target="_self"><span data-dcnode-id="2452" instrument_node="">Akinsanya (2000)</span></a><span data-dcnode-id="2450" instrument_node="">, said is measured by the extent to which a country has regular and fair elections, genuine contestation over selection (or election) of leaders and the choice of policy outcomes and citizenship participation in the electoral process. As a matter of fact, the regimes that took over power since 1999 cannot be called consolidated democratic regimes if we use the constitution as a guide, this entails measuring their performances using as yardstick by-products of consolidated democracy such as predictability, transparency, accessibility, adherence to constitutionalism and the “rules of the game”, respect for human rights and the rule of law, public accountability and the system of checks and balances. It is really unfortunate that after almost eighteen years of democratic experimentation in Nigeria democratic values have not been established. What one notices everywhere is civilian dictatorship which manifests itself in flagrant violation of human rights of the ordinary citizens of this country. The concept of separation of power which lubricates democracy is a mirage in Nigeria. The “executive” flexes its muscles arbitrarily and always cows both the “legislative” and the “judiciary” and reduces them judiciary to mere puppets. In Nigeria the legislature and the judiciary are simply the “will” of the executive.</span></p><span data-dcnode-id="2448" instrument_node="">
</span><p class="E-Title2" data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">2.2. The Conceptualization of Human Rights</span></p><span data-dcnode-id="2445" instrument_node="">
</span><p data-dcnode-id="2422"><span data-dcnode-id="2444" instrument_node="">For </span><a class="content_c17" data-dcnode-id="2442" href="#ref17" id="return4" onclick="returnAuhor(17,4)" target="_self"><span data-dcnode-id="2443" instrument_node="">Iwe (1986)</span></a><span data-dcnode-id="2441" instrument_node="">, the issue of human rights cuts across ages and epochs—from the Greek world through the Roman, Medieval, Modern and Contemporary periods. And conscious and awareness of them continued to increase as the years go by, likewise their development and interpretation. </span><a class="content_c32" data-dcnode-id="2439" href="#ref32" id="return5" onclick="returnAuhor(32,5)" target="_self"><span data-dcnode-id="2440" instrument_node="">Ojo (2006)</span></a><span data-dcnode-id="2438" instrument_node=""> was more specific in his attempt to trace the origin of the concept. For him, human rights are often traced to the stoics of the ancient Athens. Zeno who was the founder of the stoic school of thought propounded the theory of natural law under which human beings were supposed to have natural rights. To prevent the violation of these rights that were “immortal” in a sense, efforts were made to legislate against their violation with impunity. According to </span><a class="content_c34" data-dcnode-id="2436" href="#ref34" id="return6" onclick="returnAuhor(34,6)" target="_self"><span data-dcnode-id="2437" instrument_node="">Ogundele (1985)</span></a><span data-dcnode-id="2435" instrument_node="">, the year 1188 was very remarkable in the history of human rights because it was the year that happened to be earliest known efforts to enhance human rights by King Alfonso IX, who included the rights of accused persons to a regular trial and the right of inviolability of life, honor, home and property as part of human rights. However, this earliest attempt was limited to the nobles alone. In terms of the definition of human rights, it can be said that in spite of the abundant writings the concept has generated, the term human rights does not lend itself to a precise definition. Indeed, there has never been a generally accepted definition of human rights among jurists, other scholars and commentators. It is a concept that can be best described rather than defined </span><a class="content_c02" data-dcnode-id="2433" href="#ref02" id="return7" onclick="returnAuhor(02,7)" target="_self"><span data-dcnode-id="2434" instrument_node="">(Ajomo, 1985)</span></a><span data-dcnode-id="2432" instrument_node="">. However, despite the problem of not having a generally accepted definition of the concept, the attempt of two scholars in talking about it impressed me a lot. For </span><a class="content_c16" data-dcnode-id="2430" href="#ref16" id="return8" onclick="returnAuhor(16,8)" target="_self"><span data-dcnode-id="2431" instrument_node="">Humana (1983)</span></a><span data-dcnode-id="2429" instrument_node="">, it is laws and practices that have evolved over the centuries to protect ordinary people, minorities, groups and races from oppressive rulers and governments. Human rights are rights that are held by all human beings unconditionally, unalterably and they are inalienable. According to </span><a class="content_c01" data-dcnode-id="2427" href="#ref01" id="return9" onclick="returnAuhor(01,9)" target="_self"><span data-dcnode-id="2428" instrument_node="">Aduba (2012)</span></a><span data-dcnode-id="2426" instrument_node="">, human rights as those rights that are the very nature of every human person, hence, they define and affirm their humanity, therefore, they exist to ensure that human rights remain sacred and guarantee that inhumanity and injustice are prevented or reduced. He went on to maintain that since these rights are inalienable, they are not to be taken away or given up and also they are indivisible, there is no hierarchy among rights and no right can be suppressed in order to promote another right.. These rights that are really inalienable to man are comprehensively noted by </span><a class="content_c17" data-dcnode-id="2424" href="#ref17" id="return10" onclick="returnAuhor(17,10)" target="_self"><span data-dcnode-id="2425" instrument_node="">Iwe (1986)</span></a><span data-dcnode-id="2423" instrument_node="">, to include but not limited to the following: 1) the right to Life (the status of the conceived but unborn child), the right to live, the right to corporal integrity, the right to a decent and healthy standard of living; 2) the fundamental Social rights: the right of meeting and association, the right of freedom of movement and residence within the state, the right of emigration and immigration; 3) the fundamental Moral-Cultural rights: man’s right to Respect and to his good name (reputation), the right to education, the right to learn and investigate the truth; 4) the right to free Choice of State of Life; the right to religious freedom, the right to a free choice of Profession/Occupation; 5) the fundamental Economic rights: the right to the use of material goods, the right to work, the right to a just and adequate remuneration, the right to possess and own; 6) fundamental Civil-Political rights: the right to equality, the right to equal legal protection, the right to take part in government. The 1999 Nigerian Constitution (as amended) seemed to derive much from Iwe’s content of human rights in stating its own fundamental human rights that apply to every Nigerian citizen. These are the fundamental rights as enshrined in the 1999 Constitution. 1) Right to Life. Article 33 states that every person has a right to life and no one shall be deprived intentionally of his life save in execution of the sentence of a court in respect of a criminal offence of which he has been found guilty in Nigeria. 2) Right to Dignity of Human Person. Article 34 has it that every individual is entitled to respect for dignity of person and accordingly, no person shall be subjected to torture or to inhuman or degrading treatment. No person shall be held in slavery or servitude and no person shall be required to perform forced or compulsory labor. 3) Right to Personal Liberty. Article 35 requires that every person shall be entitled to his personal liberty and no person shall be deprived of such liberty save in the following cases and in accordance with a procedure permitted by law. 4) Right to Private Life. Article 36 prescribes that in the determination of civil rights and obligations including any question or determination by or against any government or another, a person shall be entitled to a fair hearing within a reasonable time by a court or other tribunal established by law and constituted in such a manner as to cure its independence and impartiality. 5) Right to Private and Family life. Article 37 says that the privacy of citizens, their homes, correspondence, telephone conversations and telegraphic communications is hereby guaranteed and protected. 6) Right to Freedom of Thought, Conscience and Religion. Article 38 states that every person is entitled to freedom of thought, conscience and religion, including freedom to change his religion or belief, and freedom (either alone or in community with others, and the public or in private) to manifest and propagate his religion or belief in worship, teaching, practices and observance. 7) Right to Freedom of Expression and the Press. Article 39 states that every person shall be entitled to freedom of expression, including freedom to hold opinions and to receive and impart ideas, information without interference. 8) Right to Peaceful Assembly and Association. Article 40 states that every person shall be entitled to assemble freely and associate with other persons, and in particular he may form or belong to any political party, trade union or any other association for the protection of his interests. 9) Right to Freedom of Movement. Article 41 has it that every citizen of Nigeria is entitled to move freely throughout Nigeria and to reside in any part thereof and no citizen of Nigeria shall be expelled from Nigeria or refuse entry thereto or exits therefore. 10) Right from Freedom from Discrimination. Article 42 holds that a citizen of Nigeria of a particular community, ethnic group, place of origin, sex, religion or political opinion shall not, by reason only that he is such a person be subjected either expressly by, or in the practical application of, any law in force in Nigeria or any executive or administrative action of government, to disabilities or restrictions to which citizens of other communities, ethnic group, places of origin, sex, religious or political opinions are not made subject. No citizen of Nigeria shall be subjected to any disability or deprivation merely by reason of the circumstances of his birth.</span></p><span data-dcnode-id="2421" instrument_node="">
</span><p class="E-Title2" data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">2.3. A Glimpse at Human Right Situation in Nigeria</span></p><span data-dcnode-id="2418" instrument_node="">
</span><p data-dcnode-id="2407"><span data-dcnode-id="2417" instrument_node="">Having seen the general contents of human rights and those enshrined in the Nigerian 1999 constitution as amended, we now situate it on the Nigerian society. We begin by stating very emphatically that no system of government guarantees respect for human rights more than that of a democratic government. Hence, when power shifted from the Military to the democratically elected government in 1999, Nigerians were full of confidence that human persons will now begin to enjoy these rights that are fundamental to them. However, Nigerians were shocked to observe that the violation of human rights that obtained during the Military dictatorship never abated. What we still have is gross violation of human rights with unprecedented crescendo in every aspect of it. In this paper just few instances of this violation are noted. Nigerians will not forget in a hurry what has been termed the “Odi Massacre”. Odi is a town in Bayelsastate in the South South region of Nigeria where the inhabitants were agitating the way the Federal Government of Nigeria was going about the exploration of oil there which left their habitat inhabitable as a result of oil pollution. The Federal Government, democratically elected, led by Olusegun Obasabjo ordered the military to descend on the town on the 20</span><sup data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">th</span></sup><span data-dcnode-id="2414" instrument_node=""> November 1999, which left about 2500 civilians dead as reported by Human Rights Watch (accessed. Here the fundamental right of life has been violated by a government that supposed to be democratic. Not long after the seeming holocaust at Odi community, the Nigerian military once again ferociously descended on a town in Benue state called Zaki Biam on the 22nd October 2001. In this military display of brutality, about 100 civilians were killed from the Tiv ethnic community. Their offence was an alleged abducting and killing of 19 soldiers that were sent there to restore peace in that troubled region. There was crisis between the Tivs and Jukuns of that State and because the mutilated bodies of the slain soldiers were found in Zaki Biam community, the military called them for a meeting where they were killed and set ablaze – a clear violation of right to life. In February and May 2016, security forces were accused of killing at least 40 members of the Indigenous People of Biafra (IPOB) and Movement for the Actualization of the Sovereign State of Biafra (MASSOB). The groups were and are advocating for the separation of Biafra, mainly made up of Igbo speaking of the southeast and south-south and the release of Nnamdi Kanu, the IPOB leader detained and undergoing trial for treason since October 2015. According to World Report (2017), in the crude oil rich Niger Delta, media reports say that on September 8 2016, soldiers seeking to arrest members of the militant group—Niger Delta Avengers, destroyed 43 houses and other properties in Peremabiri, Akamabugo and Tikogbene communities of Bayelsa State and currently trending, the massacre of peaceful Nigerian youths who were allegedly shot at randomly at the Lekki toll gate of Lagos State Nigeria, by the Nigerian military Force on the 20</span><sup data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">th</span></sup><span data-dcnode-id="2411" instrument_node=""> of October, 2020. Despite all these noticed and noted human rights violation in a democratic Nigerian government, the one that goes on everyday but is not talked about is that of the dignity of the human person expressed in the right to descent environment. The violation is carried out by both the agencies of the government and ordinary citizens in different aspects. In democratic Nigeria it has become a common thing to observe with dismay incessant and unauthorized blaring of sirens by government and quasi-government officials and some ordinary citizens as well. Succinctly put, human rights violations especially that of Life and Human dignity by governmental agencies and private citizens, thrive in these instances obtained in Nigeria; menace of Boko Haram insurgency and other acts of terrorism, Militancy in the Niger Delta region, sKidnapping, Bribery and Corruption, Government insensitivity, Unemployment, Inflation, poverty, Police and Military brutality on civilians and the like, as noted by </span><a class="content_c30" data-dcnode-id="2409" href="#ref30" id="return11" onclick="returnAuhor(30,11)" target="_self"><span data-dcnode-id="2410" instrument_node="">Ogoloma, et al. (2014)</span></a><span data-dcnode-id="2408" instrument_node="">.</span></p><span data-dcnode-id="2406" instrument_node="">
</span><p class="E-Title2" data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">2.4. Connection between Understanding Democracy and the Conceptualization of Human Rights</span></p><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2365"><span data-dcnode-id="2402" instrument_node="">Democracy and human rights are grounded in the shared principles of accountability, individual liberty, integrity, fair and equal representation, inclusion and participation, and non-violent solutions to conflict. Modern conceptions of democracy are based on the fundamental ideas of popular sovereignty and collective decision making in which rulers through various ways are held to account by those over whom they rule (see </span><a class="content_c07" data-dcnode-id="2400" href="#ref07" id="return12" onclick="returnAuhor(07,12)" target="_self"><span data-dcnode-id="2401" instrument_node="">Beetham, Carvalho, Landman, &amp; Weir, 2008;</span></a><span data-dcnode-id="2399" instrument_node=""> </span><a class="content_c22" data-dcnode-id="2397" href="#ref22" id="return13" onclick="returnAuhor(22,13)" target="_self"><span data-dcnode-id="2398" instrument_node="">Landman, 2013</span></a><span data-dcnode-id="2396" instrument_node="">). But beyond this basic consensus, there are many varieties of democracy (see </span><a class="content_c11" data-dcnode-id="2394" href="#ref11" id="return14" onclick="returnAuhor(11,14)" target="_self"><span data-dcnode-id="2395" instrument_node="">Coppedge, Lindberg, &amp; Skaaning, 2016</span></a><span data-dcnode-id="2393" instrument_node="">) or “democracy with adjectives” </span><a class="content_c09" data-dcnode-id="2391" href="#ref09" id="return15" onclick="returnAuhor(09,15)" target="_self"><span data-dcnode-id="2392" instrument_node="">(Collier &amp; Levitsky, 1997)</span></a><span data-dcnode-id="2390" instrument_node=""> that have been in use by scholars, practitioners and policy makers. These definitions can be grouped broadly into three main types: 1) procedural democracy, 2) liberal democracy, and 3) social democracy, the delineation of which largely rests on the variable incorporation of different rights protections alongside the general commitment to popular sovereignty and collective decision making. Understanding these different types of democracy and the degree to which they incorporate different categories of human rights affects the ways in which measures of both can and have been used for empirical research </span><a class="content_c22" data-dcnode-id="2388" href="#ref22" id="return16" onclick="returnAuhor(22,16)" target="_self"><span data-dcnode-id="2389" instrument_node="">(Landman, 2013, 2016;</span></a><span data-dcnode-id="2387" instrument_node=""> </span><a class="content_c24" data-dcnode-id="2385" href="#ref24" id="return17" onclick="returnAuhor(24,17)" target="_self"><span data-dcnode-id="2386" instrument_node="">Landman &amp; Carvalho, 2009;</span></a><span data-dcnode-id="2384" instrument_node=""> </span><a class="content_c25" data-dcnode-id="2382" href="#ref25" id="return18" onclick="returnAuhor(25,18)" target="_self"><span data-dcnode-id="2383" instrument_node="">Landman &amp; Häusermann, 2003)</span></a><span data-dcnode-id="2381" instrument_node="">. Absence of consideration of these lines of overlap has led to conceptual and empirical confusion in the literature on democracy and human rights, as well as in those studies that incorporate measures of either concept in their modelling strategies (sees </span><a class="content_c28" data-dcnode-id="2379" href="#ref28" id="return19" onclick="returnAuhor(28,19)" target="_self"><span data-dcnode-id="2380" instrument_node="">Munck, 2009</span></a><span data-dcnode-id="2378" instrument_node="">). Procedural definitions of democracy are most closely aligned with Robert Dahl’s (1971) formulation in Polyarchy and include the two dimensions of contestation and participation. Contestation captures the uncertain peaceful competition necessary for democratic rule; a principle which presumes the legitimacy of a significant and organized opposition, the right to challenge incumbents, protection of the twin freedoms of expression and association, the existence of free and fair elections, and a consolidated political party system. Such a procedural definition of democracy can be considered a baseline set of conditions and a minimum threshold that can be used to assess and count the number of democracies in the world (see, e.g. </span><a class="content_c05" data-dcnode-id="2376" href="#ref05" id="return20" onclick="returnAuhor(05,20)" target="_self"><span data-dcnode-id="2377" instrument_node="">Banks, 1971;</span></a><span data-dcnode-id="2375" instrument_node=""> </span><a class="content_c22" data-dcnode-id="2373" href="#ref22" id="return21" onclick="returnAuhor(22,21)" target="_self"><span data-dcnode-id="2374" instrument_node="">Landman, 2013: pp. 3-5;</span></a><span data-dcnode-id="2372" instrument_node=""> </span><a class="content_c35" data-dcnode-id="2370" href="#ref35" id="return22" onclick="returnAuhor(35,22)" target="_self"><span data-dcnode-id="2371" instrument_node="">Przeworski, Alvarez, Cheibub, &amp; Limongi, 2000</span></a><span data-dcnode-id="2369" instrument_node="">). Liberal definitions of democracy preserve the notions of contestation and participation found in procedural definitions, but add more explicit references to the protection of certain human rights. Definitions of liberal democracy thus contain an institutional dimension and a rights dimension (see </span><a class="content_c13" data-dcnode-id="2367" href="#ref13" id="return23" onclick="returnAuhor(13,23)" target="_self"><span data-dcnode-id="2368" instrument_node="">Foweraker &amp; Krznaric, 2000</span></a><span data-dcnode-id="2366" instrument_node="">).</span></p><span data-dcnode-id="2364" instrument_node="">
</span><p data-dcnode-id="2281"><span data-dcnode-id="2363" instrument_node="">The institutional dimension captures the idea of popular sovereignty, and includes notions of accountability, constraint of leaders, representation of citizens, and universal participation in ways that are consistent with Dahl’s “polyarchy” model outlined above. The rights dimension is upheld by the rule of law, and includes civil, political, property, and minority rights. Such a definition is arguably richer (or “thicker”) as it includes legal constraints on the exercise of power to complement the popular elements in the derivation of and accountability for power </span><a class="content_c10" data-dcnode-id="2361" href="#ref10" id="return24" onclick="returnAuhor(10,24)" target="_self"><span data-dcnode-id="2362" instrument_node="">(Coppedge, 2012: pp. 17-33)</span></a><span data-dcnode-id="2360" instrument_node="">. Social definitions of democracy maintain the institutional and rights dimensions found in liberal models of democracy but expand the types of rights that ought to be protected, including social, economic and cultural rights (although some of these are included in minority rights protection seen in liberal definitions) </span><a class="content_c06" data-dcnode-id="2358" href="#ref06" id="return25" onclick="returnAuhor(06,25)" target="_self"><span data-dcnode-id="2359" instrument_node="">(Beetham, 1999;</span></a><span data-dcnode-id="2357" instrument_node=""> </span><a class="content_c08" data-dcnode-id="2355" href="#ref08" id="return26" onclick="returnAuhor(08,26)" target="_self"><span data-dcnode-id="2356" instrument_node="">Brandal, Bratberg, &amp; Thorsen, 2013;</span></a><span data-dcnode-id="2354" instrument_node=""> </span><a class="content_c12" data-dcnode-id="2352" href="#ref12" id="return27" onclick="returnAuhor(12,27)" target="_self"><span data-dcnode-id="2353" instrument_node="">Doorenspleet, 2005;</span></a><span data-dcnode-id="2351" instrument_node=""> </span><a class="content_c20" data-dcnode-id="2349" href="#ref20" id="return28" onclick="returnAuhor(20,28)" target="_self"><span data-dcnode-id="2350" instrument_node="">Landman, 2005, 2013, 2016;</span></a><span data-dcnode-id="2348" instrument_node=""> </span><a class="content_c27" data-dcnode-id="2346" href="#ref27" id="return29" onclick="returnAuhor(27,29)" target="_self"><span data-dcnode-id="2347" instrument_node="">Macpherson, 1973;</span></a><span data-dcnode-id="2345" instrument_node=""> </span><a class="content_c34" data-dcnode-id="2343" href="#ref34" id="return30" onclick="returnAuhor(34,30)" target="_self"><span data-dcnode-id="2344" instrument_node="">Przeworski, 1985;</span></a><span data-dcnode-id="2342" instrument_node=""> </span><a class="content_c36" data-dcnode-id="2340" href="#ref36" id="return31" onclick="returnAuhor(36,31)" target="_self"><span data-dcnode-id="2341" instrument_node="">Sørensen, 1993)</span></a><span data-dcnode-id="2339" instrument_node="">. This expanded form of democracy, extends “the democratic principle from the political to the social, in effect primarily economic, realm” </span><a class="content_c34" data-dcnode-id="2337" href="#ref34" id="return32" onclick="returnAuhor(34,32)" target="_self"><span data-dcnode-id="2338" instrument_node="">(Przeworski, 1985: p. 7)</span></a><span data-dcnode-id="2336" instrument_node="">. In the terms deployed here, the concept of social democracy thus includes the provision of social and economic welfare and the progressive realisation of economic and social rights. It could also be argued that it includes the protection of cultural rights, which are concerned with such issues as mother tongue language, ceremonial land rights, and intellectual property rights relating to cultural practices (e.g. indigenous healing practices and remedies that may be of interest to multinational companies). In their modern manifestation, human rights have become an accepted legal and normative standard through which to judge the quality of human dignity </span><a class="content_c24" data-dcnode-id="2334" href="#ref24" id="return33" onclick="returnAuhor(24,33)" target="_self"><span data-dcnode-id="2335" instrument_node="">(Landman &amp; Carvalho, 2009)</span></a><span data-dcnode-id="2333" instrument_node="">. This standard has arisen through the concerted efforts of thousands of people over many years inspired by a simple set of ideas that have become codified through the mechanism of public international law and realized through the domestic legal frameworks and governmental institutions of states around the world </span><a class="content_c20" data-dcnode-id="2331" href="#ref20" id="return34" onclick="returnAuhor(20,34)" target="_self"><span data-dcnode-id="2332" instrument_node="">(Landman, 2005;</span></a><span data-dcnode-id="2330" instrument_node=""> </span><a class="content_c24" data-dcnode-id="2328" href="#ref24" id="return35" onclick="returnAuhor(24,35)" target="_self"><span data-dcnode-id="2329" instrument_node="">Landman &amp; Carvalho, 2009)</span></a><span data-dcnode-id="2327" instrument_node="">. While the 1948 Universal Declaration of Human Rights makes reference to the right to take part in government (including through direct or indirect representatives, equal access to public services, and through periodic elections), the non-binding nature of the Universal Declaration of Human Rights along with a paucity of specific reference to democracy itself in subsequent international human rights instruments, means that human rights as such have been more legally codified through international human rights law than democracy. According legal recognition to the moral claim of human rights through international law means that states are legally obliged to ensure that they respect, protect, and fulfil these claims (see, e.g. </span><a class="content_c19" data-dcnode-id="2325" href="#ref19" id="return36" onclick="returnAuhor(19,36)" target="_self"><span data-dcnode-id="2326" instrument_node="">Koch, 2005</span></a><span data-dcnode-id="2324" instrument_node="">). There is no corresponding legal obligation to respect, protect, and fulfil democracy in the same way as there is for rights, which provides a stronger foundation and core content for human rights than for democracy. As we shall see empirically, however, democracy is a form of government that appears superior to other forms of government for protecting, respecting and fulfilling human rights obligations. Respecting human rights requires the state to refrain from violating them. Protecting human rights requires the state to prevent the violation of human rights by “third” parties, such as private companies, non-governmental organisations, paramilitary and insurgency groups, and “uncivil” or undemocratic movements. Fulfilling human rights requires the states to invest in and implement policies for the progressive realisation of human rights </span><a class="content_c19" data-dcnode-id="2322" href="#ref19" id="return37" onclick="returnAuhor(19,37)" target="_self"><span data-dcnode-id="2323" instrument_node="">(Koch, 2005;</span></a><span data-dcnode-id="2321" instrument_node=""> </span><a class="content_c24" data-dcnode-id="2319" href="#ref24" id="return38" onclick="returnAuhor(24,38)" target="_self"><span data-dcnode-id="2320" instrument_node="">Landman &amp; Carvalho, 2009;</span></a><span data-dcnode-id="2318" instrument_node=""> </span><a class="content_c23" data-dcnode-id="2316" href="#ref23" id="return39" onclick="returnAuhor(23,39)" target="_self"><span data-dcnode-id="2317" instrument_node="">Landman &amp; Kersten, 2016)</span></a><span data-dcnode-id="2315" instrument_node="">. Civil and political rights protect the “personhood” of individuals and their ability to participate in the public activities of their countries. Economic, social and cultural rights provide individuals with access to economic resources, social opportunities for growth and the enjoyment of their distinct ways of life, as well as protection from the arbitrary loss of these rights. Solidarity rights seek to guarantee for individuals access to public goods like development and the environment, and some have begun to argue, the benefits of global economic development </span><a class="content_c21" data-dcnode-id="2313" href="#ref21" id="return40" onclick="returnAuhor(21,40)" target="_self"><span data-dcnode-id="2314" instrument_node="">(Landman, 2006;</span></a><span data-dcnode-id="2312" instrument_node=""> </span><a class="content_c24" data-dcnode-id="2310" href="#ref24" id="return41" onclick="returnAuhor(24,41)" target="_self"><span data-dcnode-id="2311" instrument_node="">Landman &amp; Carvalho, 2009)</span></a><span data-dcnode-id="2309" instrument_node="">. Taken together, there are now a large number of human rights that have been formally codified, which can be enumerated from the different treaties that have been designed to protect them. In following </span><a class="content_c06" data-dcnode-id="2307" href="#ref06" id="return42" onclick="returnAuhor(06,42)" target="_self"><span data-dcnode-id="2308" instrument_node="">Beetham (1999: p. 94)</span></a><span data-dcnode-id="2306" instrument_node=""> and the brief discussion of democracy and human rights, it is clear that different conceptions of democracy vary precisely around the question of the degree of overlap and interaction between the institutional and rights dimensions. </span><a class="content_c06" data-dcnode-id="2304" href="#ref06" id="return43" onclick="returnAuhor(06,43)" target="_self"><span data-dcnode-id="2305" instrument_node="">Beetham (1999: p. 94)</span></a><span data-dcnode-id="2303" instrument_node=""> visualises this overlap as a Venn diagram with democracy in one circle and human rights in another, where different definitions and conceptualisations of democracy necessarily reflect smaller and larger degrees of overlap. Thin or procedural definitions of democracy afford less space for human rights than thicker or social definitions, while it may be possible to conceive of some attributes of human rights sitting outside the conceptual space of democracy. By thinking of the association between democracy and human rights in this way, </span><a class="content_c06" data-dcnode-id="2301" href="#ref06" id="return44" onclick="returnAuhor(06,44)" target="_self"><span data-dcnode-id="2302" instrument_node="">Beetham (1999)</span></a><span data-dcnode-id="2300" instrument_node=""> avoids the problem that democracy and human rights might be construed as mutually constitutive of one another while retaining the notion that they are “inter-dependent and mutually reinforcing”. </span><a class="content_c15" data-dcnode-id="2298" href="#ref15" id="return45" onclick="returnAuhor(15,45)" target="_self"><span data-dcnode-id="2299" instrument_node="">Hill (2016)</span></a><span data-dcnode-id="2297" instrument_node=""> makes the case that respect for personal integrity is a sine qua non for the existence of democracy and argues that democracy and human rights are thus mutually constitutive. In the terms set out here, however, </span><a class="content_c15" data-dcnode-id="2295" href="#ref15" id="return46" onclick="returnAuhor(15,46)" target="_self"><span data-dcnode-id="2296" instrument_node="">Hill’s (2016)</span></a><span data-dcnode-id="2294" instrument_node=""> argument only focuses on physical integrity rights, which means that his conception of democracy sees a permanent overlap between the institutional dimension of democracy and this more limited set of human rights, which typically include freedom from torture, arbitrary detention, extra-judicial killing, and exile (see Poe &amp; Tate, 1994). It is not clear from the literature on democracy or human rights that human rights beyond this more limited set are indeed necessarily part of the concept of democracy. Where </span><a class="content_c15" data-dcnode-id="2292" href="#ref15" id="return47" onclick="returnAuhor(15,47)" target="_self"><span data-dcnode-id="2293" instrument_node="">Hill (2016)</span></a><span data-dcnode-id="2291" instrument_node=""> is correct is with respect to the endogeneity problem in the empirical analysis of the relationship between democracy and human rights as we shall see in subsequent discussions below. The possibility of different definitions and different degrees of overlap necessarily affects the ways in which both concepts are measured and analyzed </span><a class="content_c10" data-dcnode-id="2289" href="#ref10" id="return48" onclick="returnAuhor(10,48)" target="_self"><span data-dcnode-id="2290" instrument_node="">(Coppedge, 2012)</span></a><span data-dcnode-id="2288" instrument_node="">; however, there has not been much discussion about this particular issue in the measurement literature (see </span><a class="content_c28" data-dcnode-id="2286" href="#ref28" id="return49" onclick="returnAuhor(28,49)" target="_self"><span data-dcnode-id="2287" instrument_node="">Munck, 2009</span></a><span data-dcnode-id="2285" instrument_node="">), since there are discussions on the measurement of democracy or human rights, but not democracy and human rights. Moreover, discussions of the measurement of democracy, as well as the empirical operationalisation of democracy include measures that are arguably more about human rights than democracy per se. </span><a class="content_c14" data-dcnode-id="2283" href="#ref14" id="return50" onclick="returnAuhor(14,50)" target="_self"><span data-dcnode-id="2284" instrument_node="">Helliwell (1994)</span></a><span data-dcnode-id="2282" instrument_node=""> combines these two Freedom House measures arithmetically and calls the combination an “index of democracy”, a move which necessarily commits him to a specific concept of democracy and inclusion of some human rights but not all.</span></p><span data-dcnode-id="2280" instrument_node="">
</span><p class="E-Title2" data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">2.5. Democratic Freedom of Expression</span></p><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">This section progressively descends from some proposed aspects of democratic theory to the proposed conception of the right of freedom of expression. The democratic freedom of expression starts by recognizing that everyone’s human rights are the same and must consequently be given equal consideration. In giving people’s human rights equal consideration, attention must be given to whether there is domination in the relations that exist in society. When there is domination, it is legitimate to intervene to abolish it. The freedom that comes with individual and collective autonomy entails responsibility. Thus, liberty is not an arbitrary power, but an accountable one. The democratic state is an effective instrument for protecting and fomenting human rights, abolishing domination. Such a state exemplifies the democratic ideal of equal consideration in the vote, whose spirit is the supremacy of the public interest over powerful religious, royal, military, capitalist, party or other special interests. The natural application to the right of freedom of expression is that everyone has this right equally and that this right comes with the responsibility to respect the rights of others. When expression is an instrument of domination, it is outside the scope of this right, it infringes on the rights of others, which must be given equal consideration, and it is necessary to hold the agent that propagated the expression responsible by standards of justice. A very good system for giving everyone equal consideration is the democratic one. This practice is designed to approximate the principle of affected rights. The rights-based approach has it that voting is designed to approximate the principle that people whose rights are at stake in a matter are the ones who should participate in the decision-making process associated with it. Rights have the rights of others as their common boundary and transgression of these boundaries is an act of domination. Rights are legitimate liberties, which are the kinds of liberties worth protecting and fomenting, and are consequently the kinds of liberties we refer to below. Here, the degree to which there is liberty in a population is inversely proportional to the degree to which there is domination.</span></p><span data-dcnode-id="2274" instrument_node="">
</span><p class="E-Title2" data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">2.6. The Nigerian End SARS Protest: Government Intervention and Its Relation to Democracy and Freedom of Expression</span></p><span data-dcnode-id="2271" instrument_node="">
</span><p class="E-Title3" data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">2.6.1. The Birth of the End SARS Protest</span></p><span data-dcnode-id="2268" instrument_node="">
</span><p data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">According to Wikipedia, End SARS is a decentralized social movement, and series of mass protests against police brutality in Nigeria. The slogan calls for the disbanding of the Special Anti-Robbery Squad (SARS), a notorious unit of the Nigerian Police with a long record of abuses. The protests which takes its name from the slogan started in 2017 as a Twitter campaign using the hash tag #ENDSARS to demand the disbanding of the unit by the Nigerian government. After experiencing revitalization in October 2020 following more revelations of the abuses of the unit, mass demonstrations occurred throughout the major cities of Nigeria, accompanied by vociferous outrage on social media platforms. About 28 million tweets bearing the hash tag have been accumulated on Twitter alone. Solidarity protests and demonstrations by Nigerians in Diaspora and sympathizers occurred in many major cities of the world. The protests are notable for its patronage by a demographic that is made of entirely young Nigerians. The movement has since expanded to include demands for good and accountable governance. SARS officers have been alleged to profile young Nigerians, mostly males, based on fashion choices, tattoos and hairstyles. They were also known to mount illegal road blocks, conduct unwarranted checks and searches, arrest and detain without warrant or trial, rape women, and extort young male Nigerians for driving exotic vehicles and using laptops and i-phones. Nigerians have shared both stories and video evidence of how officers of SARS engaged in kidnapping, murder, theft, rape, torture, unlawful arrests, humiliation, unlawful detention, extrajudicial killings and extortion of Nigerian citizens. A large section of the victims of the abuses of SARS have been young male Nigerians.</span></p><span data-dcnode-id="2265" instrument_node="">
</span><p class="E-Title3" data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">2.6.2. Report on How Peaceful Protesters Were Allegedly Shot at</span></p><span data-dcnode-id="2262" instrument_node="">
</span><p data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">A report from shola Lawal and Monic Park which was published on the New York Times states as thus:</span></p><span data-dcnode-id="2259" instrument_node="">
</span><p data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">“LAGOS, Nigeria—With music playing and food being passed around, a festive atmosphere hung over the protest encampment on Tuesday night, despite the anger over police brutality that in recent weeks had driven youthful demonstrations that were the biggest Nigeria had seen in a generation. As darkness fell, Nigerian flags were handed out among the thousands of people gathered there. Philip Agu, a sound engineer who had volunteered to run the huge speaker system, said a protest leader took the microphone and told the crowd that the police would likely arrive soon, but that if they sat down, sang the national anthem and waved their flags, they would face no danger. The speaker told the crowd, Mr. Agu recalled, that all around the world, “No soldier can shoot any citizen holding their own national flag.” Three hours later, dozens of people were hit by gunfire from security forces, some fatally, and images of bloodied protesters and their bloodied flags strewn on the ground flooded the social media accounts of millions of Nigerians. Survivors recalled a sudden shift from sitting peacefully to fleeing in panic. Some said military and police units surrounded the demonstrators in the affluent suburb of Lekki, preventing them from leaving.</span></p><span data-dcnode-id="2256" instrument_node="">
</span><p data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">“I thought I was going to die,” said Kolade Abiola Ahmed, his voice still quaking a day later.</span></p><span data-dcnode-id="2253" instrument_node="">
</span><p data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Soldiers and police officers opening fire on unarmed youths in an upscale neighborhood shocked the nation, even older citizens who recalled growing up under a series of military dictatorships. The protests over police brutality in the past two weeks had been larger and even more widespread than the last round of major demonstrations, in 2012, after the government stopped subsidizing fuel, but they had remained largely peaceful. Nigeria’s security forces have long been criticized for human rights abuses, particularly in the impoverished northeastern region, but there was a different set of victims this time. Many of the demonstrators have been middle-class, well-educated young people in the southern and central cities, better off than earlier generations, and too young to remember military rule that ended in 1999. Their movement, like Black Lives Matter in the United States, has been youth-driven, mostly leaderless and propelled by social media—a nimble, amorphous force that has been hard to quell. On Tuesday, the security forces killed at least 12 people at demonstrations in the Lagos area, including 10 at Lekki, Amnesty International reported on Wednesday. “These shootings clearly amount to extrajudicial executions,” said Osai Ojigho, the group’s director for Nigeria. “There must be an immediate investigation and suspected perpetrators must be held accountable through fair trials.” The government did not give casualty figures, but a police officer under the Lagos State Command Area Alpha headquarters, who was at the scene of the killings, told The New York Times on Wednesday that at least 11 people had been killed.</span></p><span data-dcnode-id="2250" instrument_node="">
</span><p data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">On Wednesday, some of the protesters were out in the streets again, violating a 24-hour curfew imposed the day before and newly aware that they could be risking their lives. Plumes of smoke rose from at least three buildings, including one that houses TVC News, which stopped broadcasting. Sporadic gunshots could be heard around Lekki and Yaba, districts 20 miles apart, separated by a lagoon. Calling themselves the “SoroSoke” or “speak up” generation in the Yoruba language widely spoken in Lagos, the nation’s largest city, the protesters have insisted that a notorious police unit, the Special Anti-Robbery Squad, be disbanded, and its most brutal officers prosecuted. The unit, known as SARS, has earned a reputation for abusing, torturing and even killing young people; an Amnesty report in June referred to its “horrific reign of impunity.”</span></p><span data-dcnode-id="2247" instrument_node="">
</span><p class="E-Title3" data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">2.6.3. Governmental Response and Intervention</span></p><span data-dcnode-id="2244" instrument_node="">
</span><p data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">The President of the Federal Republic of Nigeria, President Muhammadu Buhari—a former army general who led a military government in the 1980s—vowed last week to disband SARS. But there was no word on prosecutions, and government officials indicated that the officers would simply be moved to other units, not dismissed. Protesters denounced the changes as window-dressing. On Tuesday, reports of police killing people, followed by the burning of a police station, prompted the governor of Lagos state, Babajide Sanwo-Olu, to declare a 24-hour curfew. He said that people bent on chaos had hijacked the peaceful protests. Despite the curfew, the demonstrators near the Lekki tollgate did not disperse. Mr. Ahmed, who had been attending protests since Thursday, said people remained seated on the ground, chanting slogans and waving their flags, as at least a dozen trucks arrived with police and military units. There were already ominous signs. Witnesses reported seeing people dismantle streetlights and remove security cameras that would have recorded what was to come next. Many protesters contend that the government has used paid provocateurs to sow violence, as an excuse for a brutal crackdown. The police officer who confirmed the deaths said that he and dozens of others were ordered to head to the Lekki protest at around 7 p.m. They piled into 15 Toyota pickup trucks, he said, joined by at least three Tata trucks full of soldiers. Some demonstrators were armed, and others threw rocks at the uniformed forces, according to the officer, who spoke on condition of anonymity because he was not authorized to discuss the matter. But other witnesses said that without warning or provocation, the security forces began shooting into the air, and then at the civilians trying to flee in terror. “They were trying to circle us, put us in the middle, they were spreading out and they were trying to go around so that we would be in the middle,” said Eti-Inyene Akpan, a 26-year-old photographer who was there. Many people, including Mr. Akpan and Mr. Ahmed, took shelter behind barricades and under parked cars. “There was a lady who excreted because of fear,” Mr. Ahmed said. Video streams on social media showed wounded people lying in the streets, or being carried by others into teeming hospital emergency rooms. The national government has been all but silent on what happened Tuesday night. Mr. Buhari appealed for calm. In a televised statement on Wednesday, the governor, Mr. Sanwo-Olu, sought to distance himself from the security forces deployed on Tuesday, and said he had ordered an investigation into the “rules of engagement” they adopted. “This is with the view to taking this up with the higher command of the Nigerian Army and to seek intervention of Mr. President” he added. The curfew was extended by three days, until Saturday. The bloodshed drew international condemnation, and not only from human rights groups. Joseph R. Biden Jr., the Democratic presidential candidate and former vice president, and Hillary Clinton, the former secretary of state, and also international entertainment celebrities such as Beyoncé and Justin Bieber, called on the authorities to halt the violent crackdown. Despite the violent response, the protest movement will not go away, demonstrators and analysts said. “The movement is succeeding while others have failed because of the format it adopted, both offline and online,” said Idayat Hassan, director of the Centre for Democracy and Development, a policy research group in Nigeria. “The hash tag has helped them to garner international support but importantly to galvanize the young people.” For his part, Mr. Ahmed was back on the streets and protesting on Wednesday, fueled by anger at being shot. He and a small group first marched to the gates of a house belonging to the governor’s family. “I was shouting his name to come out,” Mr. Ahmed said. “He doesn’t care even if I was killed or my friends were killed, too, and he says he is a leader.” According to a report from an African reporter, Yomi Kazeem which was published on QUARTSAFRICA, Two weeks after #EndSARS protests against police brutality began, president Muhammadu Buhari finally gave a national address. But what should have been an opportunity to unify the country and, more significantly, empathize with grieving families, proved to be anything but. Keeping with his long-running style as a former military general and dictator, president Buhari’s speech came off instead as high-handed and tough.</span></p><span data-dcnode-id="2241" instrument_node="">
</span><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Most notably, the president’s speech, which was pre-recorded, made no mention of troubling events at Lekki toll gate in Lagos on Oct. 20 when numerous witnesses say Nigerian soldiers fired into a crowd of peaceful, unarmed protesters who had remained at the toll gate following a hastily announced curfew. The shootings resulted in several injuries and left seven dead, according to Punch, a major local newspaper. The president’s decision to completely omit the Lekki shootings from his speech was in line with the army’s official stance of denial despite a wealth of video footage which contradicts this claim. President Buhari’s speech also came with a demand—and a thinly veiled threat—for protesters to call off street demonstrations which have seen thousands gather at different locations across the country while using digital tools to drive and sustain momentum .These threats, goes against the right to freedom of expression especially as a democratic Nation “In the circumstances, I would like to appeal to protesters to note and take advantage of the various well-thought-out initiatives of this administration designed to make their lives better and more meaningful, and resist the temptation of being used by some subversive elements to cause chaos with the aim of truncating our nascent democracy,” Buhari said. “For you to do otherwise will amount to undermining national security and the law and order situation. Under no circumstances will this be tolerated,” he added. The national address sought to amplify the government’s responses to the demands of protesters, including disbanding the rogue special anti-robbery police unit that is infamous for extortion and extra-judicial murder. But recent evidence provides little reason to trust that an announcement of the unit’s disbandment will translate into less harassment for young Nigerians who are often targeted. In fact, the latest announcement is the fourth time the police leadership has placed restrictions on the unit’s operations in four years. In some ways, that Buhari gave a speech was a novelty in itself. Through his five years in office, Nigerians have mainly heard from the president during national holidays or through interviews granted to foreign media.</span></p><span data-dcnode-id="2238" instrument_node="">
</span><p data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">Yet, the strongest indictment of the president’s speech is that most young Nigerians expected little from it in the first place. After a successful presidential campaign in 2015 that aimed at endearing the president to younger Nigerians, his administration has since been criticized for being out of touch with and tone-deaf to an increasingly important youth demographic. “The first thing I wanted to hear yesterday was the president speaking with some empathy. I also expected him to clear up issues like why the military (or men in military uniform) were shooting unarmed civilians … and show solidarity with the people.” says Wale Agbede, a Lagos-based media professional who joined the protests. [But] my take away from that speech is that the president is cut off from the plight of the ordinary citizens. An investigation is said to still be ongoing by CNN as they strive to unveil the story behind the Shooting that happened at the Lekki Toll gate, Lagos State, Nigeria which had allegedly cost the lives of many Nigerian youths.</span></p><span data-dcnode-id="2235" instrument_node="">
</span><p class="E-Title1" data-dcnode-id="2232"><a data-dcnode-id="2233" id="txtF2" target="_self"><span data-dcnode-id="2234" instrument_node="">3. Research Findings</span></a></p><span data-dcnode-id="2231" instrument_node="">
</span><p data-dcnode-id="2226"><span data-dcnode-id="2230" instrument_node="">There is no denying that Nigerian Constitution contains very elaborate provisions granting fundamental rights to Nigerians. There is also no doubt that the said provisions were in conformity with international human right instruments with the aim of deepening democratic governance in the country. What has however raised concerns was the extent to which successive governments particularly the present government have promoted and observed the provisions. According to </span><a class="content_c18" data-dcnode-id="2228" href="#ref18" id="return51" onclick="returnAuhor(18,51)" target="_self"><span data-dcnode-id="2229" instrument_node="">Jega (2008)</span></a><span data-dcnode-id="2227" instrument_node="">, the promotion of human rights involves making citizens know their rights, to be able to defend them, as well as know the rights of others, to be able to respect and not breach them. It also includes training of the law enforcement personnel and those involved in the administration of justice, to enable them show greater respect for other people’s rights, and sensitivity and tact in handling human rights issues in their duties as public officers.</span></p><span data-dcnode-id="2225" instrument_node="">
</span><p data-dcnode-id="2220"><span data-dcnode-id="2224" instrument_node="">In a democracy, the rule of law protects the rights of individuals, preserves order, and limits powers of government. The reverse seems to be the case in Nigeria. Human rights are not respected. Extra-judicial killing, unlawful detention, and other series of human rights abuses are still prevalent. </span><a class="content_c29" data-dcnode-id="2222" href="#ref29" id="return52" onclick="returnAuhor(29,52)" target="_self"><span data-dcnode-id="2223" instrument_node="">Ofoegbu (2013: p. 60)</span></a><span data-dcnode-id="2221" instrument_node=""> noted that the most significant human rights problems in Nigeria are extra-judicial killings and use of excessive force by security forces, impunity for abuses by security forces, arbitrary arrests, prolonged pre-trial detention, judicial corruption, and executive lawlessness and influence on the judicial system. The right of the people to freely express themselves is in jeopardy and police brutality and wanton abuse of court orders are concerning. The right to life granted Nigerians by the Constitution has been taken away and the society is daily regaled by reports of pogrom and fratricidal carnages meted to the people by Boko Haram (a group against western education), Fulani herdsmen and Police brutality.</span></p><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">The Special Anti-Robbery Squad (SARS) in Nigeria was established to address insecurity and crimes in the nation. Rather than achieve their stated objective, they began profiling and harassing young people which led to wrongful arrests, brutalization and loss of innocent lives. In response to the recent deaths instigated by SARS officers, anti-SARS protests erupted across the nation and around the world. Two weeks later, 12 unarmed protesters were shot dead at Lekki Lagos State on October 20, 2020 by members of the Nigerian Army and Police, after the state declared a 24 hour curfew (as reported by Amnesty International),</span></p><span data-dcnode-id="2216" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">In view of this tragic development, it is important to us that we create awareness of the human rights that protect Nigerians as contained in the Constitution of the Federal Republic of Nigeria 1999 (“CFRN”), the African Charter on Human and Peoples’ Rights (“ACHPR”) and the United Nation’s Universal Declaration of Human Rights (“UDHR”); and its enforcements. </span></p><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2208"><span data-dcnode-id="2212" instrument_node="">As seen in the report of the shooting that occurred at the Lekki toll gate, Lagos state, Nigeria, whereby Nigerian Youths who had come out unarmed in their masses to protest peacefully against Police brutality in the country were allegedly shot at, leaving many injured, and some dead during the End SARS Protest. However, the following rights listed in </span><a data-dcnode-id="2210" href="#t1" target="_self"><span data-dcnode-id="2211" instrument_node="">Table 1</span></a><span data-dcnode-id="2209" instrument_node=""> were breached by the Nigerian security personnel’s and the government had little or nothing to say about the incident but rather insisted that the protest be put to a stop without fully meeting the demands of the protesters.</span></p><span data-dcnode-id="2207" instrument_node="">
</span><div class="Css_sac" data-dcnode-id="2045"><span data-dcnode-id="2206" instrument_node="">
</span><p class="imgGroupCss_v" data-dcnode-id="2053"><span data-dcnode-id="2205" instrument_node="">
