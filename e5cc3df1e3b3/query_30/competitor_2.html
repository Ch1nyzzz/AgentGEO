Case Study: Building a Coalition for Woodson Foundation </span><br data-dcnode-id="578"><span data-dcnode-id="577" instrument_node="">
The Woodson Foundation, a large nonprofit social service agency, is teaming up with the public school system in Washington, D.C, to improve student outcomes. It appears the schools have problems with truancy, low student performance and crime. The teachers are discouraged to help students due to the disrespect and behavioral issues in the classroom. The turnover rate for the best teachers is high, they tend to leave and go to schools that aren’t as troubled (629).</span><br data-dcnode-id="576"><span data-dcnode-id="575" instrument_node="">
Part 1: Group Development </span><br data-dcnode-id="574"><span data-dcnode-id="573" instrument_node="">
The organization has five stages of group development. In the forming </span><a data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/stage" style="color:#3174a3"><span data-dcnode-id="572" instrument_node="">stage</span></a><span data-dcnode-id="570" instrument_node=""> they have identified that there is a</span></span><a class="document__middle cursor-pointer source-serif text-l" data-dcnode-id="566" data-href="/writing/document/P3CPXCYNMC" rel="nofollow" style="color:#3174a3"><i data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">…show more content…</span></i></a><br data-dcnode-id="565"><span class="document__preview text-l source-serif" data-dcnode-id="551"><span data-dcnode-id="564" instrument_node="">I believe they are in the storming stage. They are finding a lot of differences in personality and views. Everyone demonstrates their passion on the project and their views.  The individuals in these groups have their own interest and way of thinking. Teams should not be large so that no one’s opinion is ignored. They will provide their opinions and they all will not agree. Many have suggested their concerns with the distribution of responsibilities. Each </span><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/team" style="color:#3174a3"><span data-dcnode-id="563" instrument_node="">team</span></a><span data-dcnode-id="561" instrument_node=""> has stated the way they would like things to be done. They want to make sure everything is in order. The only way to move forward they have to work together here and establish an understanding of roles. </span><br data-dcnode-id="560"><span data-dcnode-id="559" instrument_node="">
The Woodson foundation needs to understand all five stages in order to be successful.  The stages are a useful framework for understanding group development (274). If they understand the five stages they eventually achieve their </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/goal" style="color:#3174a3"><span data-dcnode-id="558" instrument_node="">goal</span></a><span data-dcnode-id="556" instrument_node="">. Each stage plays an important role in the project. A understand of these stages promotes cohesiveness and measures progression. Once they look back from stage 5 to stages 1&amp;amp;2 they realize how the differences became similarities for the common goal. </span><br data-dcnode-id="555"><span data-dcnode-id="554" instrument_node="">
