</span><li data-dcnode-id="1643"><strong data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">IAS Association</span></strong><span data-dcnode-id="1647" instrument_node=""> of India and other </span><strong data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">civil society</span></strong><span data-dcnode-id="1644" instrument_node=""> groups should support and stand by honest officers undergoing wrongful prosecution.</span></li><span data-dcnode-id="1642" instrument_node="">
</span><li data-dcnode-id="1638"><strong data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Creating internal oversight mechanisms:</span></strong><span data-dcnode-id="1639" instrument_node=""> Internal enquiries in each department should consider integrity and past career record of officers before recommending for criminal investigation of bonafide decisions.</span></li><span data-dcnode-id="1637" instrument_node="">
</span></ul><span data-dcnode-id="1635" instrument_node="">
</span></li><span data-dcnode-id="1633" instrument_node="">
</span></ul><span data-dcnode-id="1631" instrument_node="">
</span><h3 data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Justification</span></h3><span data-dcnode-id="1628" instrument_node="">
</span><ul data-dcnode-id="1605" style="list-style-type: square;"><span data-dcnode-id="1627" instrument_node="">
</span><li data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Since every decision taken may not prove to be correct in the long run, it is unjust to prosecute honest officers for genuine mistakes. Young and aspiring civil servants should preserve the key values of honesty, impartiality and fearlessness.</span></li><span data-dcnode-id="1624" instrument_node="">
</span><li data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Dynamic and honest officials, who are risk-takers for the greater good, must be encouraged, not restrained. No bureaucrat or public official should be fearful for a bona fide decision.</span></li><span data-dcnode-id="1621" instrument_node="">
</span><li data-dcnode-id="1607"><span data-dcnode-id="1620" instrument_node="">Officers must stick to honesty and righteousness and ultimately there is victory of right over wrong. As the national motto suggests – </span><em data-dcnode-id="1617"><strong data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Satyameva Jayate:</span></strong></em><span data-dcnode-id="1616" instrument_node=""> Truth alone triumphs; not falsehood.
</span><ul data-dcnode-id="1609" style="list-style-type: circle;"><span data-dcnode-id="1615" instrument_node="">
</span><li data-dcnode-id="1611"><strong data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">For ex:</span></strong><span data-dcnode-id="1612" instrument_node=""> Former coal secretary HC Gupta who is known for his integrity and clean career record was acquitted by the Delhi High Court after CBI failed to prove the charges of criminal misconduct against him in the coal scam.</span></li><span data-dcnode-id="1610" instrument_node="">
</span></ul><span data-dcnode-id="1608" instrument_node="">
</span></li><span data-dcnode-id="1606" instrument_node="">
</span></ul><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Thus, the need of the hour for the civil servants is to follow the code of ethics along with code of conduct.</span></p><p data-dcnode-id="1601"></p><span data-dcnode-id="1600" instrument_node="">
</span></div><span data-dcnode-id="1598" instrument_node="">
</span></li><span data-dcnode-id="1596" instrument_node="">
</span><li data-dcnode-id="1488"><span data-dcnode-id="1595" instrument_node="">
</span><p class="year" data-dcnode-id="1590"><span data-dcnode-id="1594" instrument_node="">
</span><span data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">2017</span></span><span data-dcnode-id="1591" instrument_node="">
</span></p><p data-dcnode-id="1581"><strong data-dcnode-id="1582"><span data-dcnode-id="1589" instrument_node="">12.&nbsp;</span><span data-dcnode-id="1585" lang="EN-GB"><span data-dcnode-id="1588" instrument_node="">You are the manager of a spare parts company A and you have to negotiate a deal with the manager of a large manufacturing company B. The deal is highly competitive and sealing the deal is critical for your company. The deal is being worked out over a dinner. After dinner the manager of manufacturing company B offered to drop you to the hotel in his car. On the way to hotel he happens to hit motorcycle injuring the motorcyclist badly. You know the manager was driving fast and thus lost control. The law enforcement officer comes to investigate the issue and you are the sole eyewitness to it. Knowing the strict laws pertaining to road accidents you are aware that your honest account of the incident would lead to the prosecution of the manager and as a consequence the deal is likely to be jeopardised, which is of immense importance to your company.</span><br data-dcnode-id="1587"><o:p data-dcnode-id="1586"></o:p></span><span data-dcnode-id="1583" lang="EN-GB"><span data-dcnode-id="1584" instrument_node="">What are the dilemmas you face? What will be your response to the situation? (2017)</span></span></strong></p><span data-dcnode-id="1580" instrument_node=""> </span><p data-dcnode-id="1579"></p><span data-dcnode-id="1578" instrument_node="">
</span><button class="btn" data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Show Answer</span></button><span data-dcnode-id="1575" instrument_node="">
</span><div class="desc" data-dcnode-id="1490"><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1573"></p><p data-dcnode-id="1569"><span data-dcnode-id="1572" instrument_node="">In the above case</span><br data-dcnode-id="1571"><span data-dcnode-id="1570" instrument_node="">The stakeholders involved are:</span></p><span data-dcnode-id="1568" instrument_node="">
</span><ul data-dcnode-id="1557"><span data-dcnode-id="1567" instrument_node="">
</span><li data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Manager of company A that is me and the company itself</span></li><span data-dcnode-id="1564" instrument_node="">
</span><li data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Manager of company B</span></li><span data-dcnode-id="1561" instrument_node="">
</span><li data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">The motorcyclist</span></li><span data-dcnode-id="1558" instrument_node="">
</span></ul><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1553" lang="EN-GB"><span data-dcnode-id="1555" instrument_node="">In the given situation following ethical dilemmas arise:-</span><o:p data-dcnode-id="1554"></o:p></span></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1544"><strong data-dcnode-id="1548"><span data-dcnode-id="1549" lang="EN-GB"><span data-dcnode-id="1550" instrument_node="">Personal cost ethical dilemma: </span></span></strong><span data-dcnode-id="1545" lang="EN-GB"><span data-dcnode-id="1547" instrument_node="">If I give an honest account of incidents to the investigating authorities, the critical deal will be lost for my company.</span><o:p data-dcnode-id="1546"></o:p></span></p><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1536"><strong data-dcnode-id="1540"><span data-dcnode-id="1541" lang="EN-GB"><span data-dcnode-id="1542" instrument_node="">Moral dilemma: </span></span></strong><span data-dcnode-id="1537" lang="EN-GB"><span data-dcnode-id="1539" instrument_node="">If I do not report the incident, fearing the loss of deal, the defaulter will not be brought to the book and motorcyclist will not be assured justice, who is critically injured. My conscience would prick me in the long term for not taking the right action in pursuance of selfish interests.</span><o:p data-dcnode-id="1538"></o:p></span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1528"><strong data-dcnode-id="1532"><span data-dcnode-id="1533" lang="EN-GB"><span data-dcnode-id="1534" instrument_node="">Legal dilemma: </span></span></strong><span data-dcnode-id="1529" lang="EN-GB"><span data-dcnode-id="1531" instrument_node="">Not giving the correct account of accident would also be legally wrong since an accident has taken place critically injuring a person.</span><o:p data-dcnode-id="1530"></o:p></span></p><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1521"><strong data-dcnode-id="1524"><span data-dcnode-id="1525" lang="EN-GB"><span data-dcnode-id="1526" instrument_node="">Response to the situation</span></span></strong><span data-dcnode-id="1522" lang="EN-GB"><o:p data-dcnode-id="1523"></o:p></span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1518" lang="EN-GB"><span data-dcnode-id="1519" instrument_node="">The situation invo</span></span><span data-dcnode-id="1516" lang="EN-GB"><span data-dcnode-id="1517" instrument_node="">lves </span></span><span data-dcnode-id="1512" lang="EN-GB"><g class="gr_ gr_27 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="1514" data-gr-id="27" id="27"><span data-dcnode-id="1515" instrument_node="">life</span></g><span data-dcnode-id="1513" instrument_node=""> of a person who has been critically injured and my personal interests regarding the deal, being at stake. There is also a legal dimension to it as the Manager of other company was over speeding that led to the accident.</span></span></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1506" lang="EN-GB"><span data-dcnode-id="1509" instrument_node="">In this situation, I would cooperate with the investigating agency, giving the correct details of the accident and let </span><g class="gr_ gr_32 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins replaceWithoutSep" data-dcnode-id="1507" data-gr-id="32" id="32"><span data-dcnode-id="1508" instrument_node="">law</span></g></span><span data-dcnode-id="1504" lang="EN-GB"><span data-dcnode-id="1505" instrument_node=""> take its own course. This would affect the deal thereby affecting the interests of company but it would be unethical, illegal and immoral on my part to continue a deal with the person implicated for an accident for neglig</span></span><span data-dcnode-id="1502" lang="EN-GB"><span data-dcnode-id="1503" instrument_node="">ent driving and shield him from authorities, moreover, it would be wrong for the motorcyclist to be denied justice, who is critically injured despite being innocent. </span></span></p><span data-dcnode-id="1500" instrument_node="">
</span><p class="Para1" data-dcnode-id="1493" style="line-height: 137%;"><span data-dcnode-id="1496" lang="EN-GB"><span data-dcnode-id="1499" instrument_node="">The growth of </span><g class="gr_ gr_23 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins replaceWithoutSep" data-dcnode-id="1497" data-gr-id="23" id="23"><span data-dcnode-id="1498" instrument_node="">company</span></g></span><span data-dcnode-id="1494" lang="EN-GB"><span data-dcnode-id="1495" instrument_node=""> can be ensured along with adhering to moral principles of truth, justice and moral uprightness, which need to be protected.</span></span></p><p data-dcnode-id="1492"></p><span data-dcnode-id="1491" instrument_node="">
</span></div><span data-dcnode-id="1489" instrument_node="">
</span></li><span data-dcnode-id="1487" instrument_node="">
</span><li data-dcnode-id="1300"><span data-dcnode-id="1486" instrument_node="">
</span><p class="year" data-dcnode-id="1481"><span data-dcnode-id="1485" instrument_node="">
</span><span data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">2019</span></span><span data-dcnode-id="1482" instrument_node="">
</span></p><p data-dcnode-id="1478"><strong data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">9. An apparel manufacturing company having large number of women employees was losing sales due to various factors. The company hired a reputed marketing executive, who increased the volume of sales within a short span of time. However, some unconfirmed reports came up regarding his indulgence in sexual harassment at the work place.</span></strong></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1474"><strong data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">After sometime, a woman employee lodged a formal complaint to the management against the marketing executive about sexually harassing her. Faced with the company’s indifference in not taking cognizance of her grievance, she lodged an FIR with the Police.</span></strong></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1470"><strong data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Realizing the sensitivity and gravity of the situation, the company called the women employee to negotiate. In that she was offered a hefty sum of money to withdraw the complaint and the FIR and also give in writing that the marketing executive is not involved in this case.</span></strong></p><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1466"><strong data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Identify the ethical issues involved in this case what options are available to the women employee?</span></strong></p><span data-dcnode-id="1465" instrument_node=""> </span><p data-dcnode-id="1464"></p><span data-dcnode-id="1463" instrument_node="">

</span><ul data-dcnode-id="1441" style="list-style-type: square;"><span data-dcnode-id="1454" instrument_node="">
</span><li data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">lleged sexual harassment at workplace by the marketing executive.</span></li><span data-dcnode-id="1451" instrument_node="">
</span><li data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Marketing executive important resource for the company as he increased sales in a short period of time.</span></li><span data-dcnode-id="1448" instrument_node="">
</span><li data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Company management’s indifference in not taking cognizance of the woman’s complaint.</span></li><span data-dcnode-id="1445" instrument_node="">

</span></td></tr><tr data-dcnode-id="1375" style="height: 10px;"><td data-dcnode-id="1389" style="width: 17.86%; height: 10px; vertical-align: top;"><span data-dcnode-id="1390" instrument_node="">Company management</span></td><td data-dcnode-id="1377" style="width: 66.2291%; height: 10px; vertical-align: top;"><span data-dcnode-id="1387" instrument_node="">
</span><ul data-dcnode-id="1379" style="list-style-type: square;"><span data-dcnode-id="1386" instrument_node="">
</span><li data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Insensitivity towards dignity of a woman.</span></li><span data-dcnode-id="1383" instrument_node="">
</span><li data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Priority to profit over organizational values by indulging in illegitimate negotiation with the woman employee.</span></li><span data-dcnode-id="1380" instrument_node="">
</span></ul><span data-dcnode-id="1378" instrument_node="">
</span></td></tr><tr data-dcnode-id="1360" style="height: 10px;"><td data-dcnode-id="1371" style="width: 17.86%; height: 10px; vertical-align: top;"><span data-dcnode-id="1372" instrument_node="">Other employees</span></td><td data-dcnode-id="1362" style="width: 66.2291%; height: 10px; vertical-align: top;"><span data-dcnode-id="1369" instrument_node="">
</span><ul data-dcnode-id="1364" style="list-style-type: square;"><span data-dcnode-id="1368" instrument_node="">
</span><li data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">To continue working with the marketing executive against moral conscience of other women employees.</span></li><span data-dcnode-id="1365" instrument_node="">
</span></ul><span data-dcnode-id="1363" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1352"><strong data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Following options are available to the woman employee:</span></strong></p><span data-dcnode-id="1351" instrument_node="">
</span><ul data-dcnode-id="1311" style="list-style-type: square;"><span data-dcnode-id="1350" instrument_node="">
</span><li data-dcnode-id="1337"><strong data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Continue with her case by taking a firm stand against the company management.</span></strong><span data-dcnode-id="1347" instrument_node="">
</span><ul data-dcnode-id="1339" style="list-style-type: circle;"><span data-dcnode-id="1346" instrument_node="">
</span><li data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">This would give fair chance to her to prove her viewpoint in a court of law and will give her mental peace that she stood for herself.</span></li><span data-dcnode-id="1343" instrument_node="">
</span><li data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">However, she will have to face mental agony and societal pressure in pursuing the case and may even prove detrimental for her career prospects.</span></li><span data-dcnode-id="1340" instrument_node="">
</span></ul><span data-dcnode-id="1338" instrument_node="">
</span></li><span data-dcnode-id="1336" instrument_node="">
</span><li data-dcnode-id="1325"><span data-dcnode-id="1335" instrument_node="">Accept the negotiation offer by the company and withdraw the case.
</span><ul data-dcnode-id="1327" style="list-style-type: circle;"><span data-dcnode-id="1334" instrument_node="">
</span><li data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">This may be beneficial for her career and will save her from rigorous investigation process.</span></li><span data-dcnode-id="1331" instrument_node="">
</span><li data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">However, this would create dissonance and affect mental peace as her conscience would not allow her to accept monetary gains over self respect. Also, she would never be able to stand for herself in the future.</span></li><span data-dcnode-id="1328" instrument_node="">
</span></ul><span data-dcnode-id="1326" instrument_node="">
</span></li><span data-dcnode-id="1324" instrument_node="">
</span><li data-dcnode-id="1313"><span data-dcnode-id="1323" instrument_node="">Resign from the company and focus on other career opportunities.
</span><ul data-dcnode-id="1315" style="list-style-type: circle;"><span data-dcnode-id="1322" instrument_node="">
</span><li data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">This will let her avoid the situation and will be beneficial for her career prospects.</span></li><span data-dcnode-id="1319" instrument_node="">
</span><li data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">However, the scars of sexual harassment will remain with her throughout her life and she will regret that she herself is responsible for denial of justice to her.</span></li><span data-dcnode-id="1316" instrument_node="">
</span></ul><span data-dcnode-id="1314" instrument_node="">
</span></li><span data-dcnode-id="1312" instrument_node="">
</span></ul><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Option(1) seems to be the correct way of handling the situation. The women employee can play a leadership role. Her actions will give voice to other genuine concerns of women employees. It is her moral responsibility to come forward and show exemplary behaviour. This will not only bring self satisfaction to her but also increase her confidence and inner strength.</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Also, there is a major fault of company management in giving priority to profit motives by saving the marketing executive and not forming the internal complaints committee as mandated by the Sexual Harassment of Women at Workplace (Prevention, Prohibition and Redressal) Act, 2013. Gandhiji considered ‘commerce without morality’ as one of the seven social sins. Thus, it is not only an individual’s fault, but an organization’s which lack values such as respect for the dignity of woman, work-culture ethics, and gender&nbsp; equality.</span></p><p data-dcnode-id="1304"></p><span data-dcnode-id="1303" instrument_node="">
</span></div><span data-dcnode-id="1301" instrument_node="">
</span></li><span data-dcnode-id="1299" instrument_node="">
</span><li data-dcnode-id="1177"><span data-dcnode-id="1298" instrument_node="">
</span><p class="year" data-dcnode-id="1293"><span data-dcnode-id="1297" instrument_node="">
</span><span data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">2017</span></span><span data-dcnode-id="1294" instrument_node="">
</span></p><p data-dcnode-id="1281"><strong data-dcnode-id="1282"><span data-dcnode-id="1292" instrument_node="">13.&nbsp;A building permitted for three floors, while being extended illegally to 6 floors by a builder, collapses. As a consequence, a number of innocent </span><g class="gr_ gr_13 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling multiReplace" data-dcnode-id="1290" data-gr-id="13" id="13"><span data-dcnode-id="1291" instrument_node="">labourers</span></g><span data-dcnode-id="1289" instrument_node=""> including women and children died. These </span><g class="gr_ gr_14 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling multiReplace" data-dcnode-id="1287" data-gr-id="14" id="14"><span data-dcnode-id="1288" instrument_node="">labourers</span></g><span data-dcnode-id="1286" instrument_node=""> are migrants </span><g class="gr_ gr_12 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar multiReplace" data-dcnode-id="1284" data-gr-id="12" id="12"><span data-dcnode-id="1285" instrument_node="">of</span></g><span data-dcnode-id="1283" instrument_node=""> different places. The government immediately announced cash relief to the aggrieved families and arrested the builder.</span></strong></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1277"><strong data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Give reasons for such incidents taking place across the country. Suggest measures to prevent their occurrence. (2017)</span></strong></p><span data-dcnode-id="1276" instrument_node=""> </span><p data-dcnode-id="1275"></p><span data-dcnode-id="1274" instrument_node="">
</span><button class="btn" data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Show Answer</span></button><span data-dcnode-id="1271" instrument_node="">
</span><div class="desc" data-dcnode-id="1179"><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1269"></p><p data-dcnode-id="1264"><span data-dcnode-id="1268" instrument_node="">There are numerous incidences of building collapse reported across the country on regular basis killing innocent </span><g class="gr_ gr_55 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling multiReplace" data-dcnode-id="1266" data-gr-id="55" id="55"><span data-dcnode-id="1267" instrument_node="">labourers</span></g><span data-dcnode-id="1265" instrument_node=""> and people living in them. Poor and shoddy construction along with non-compliance of regulations has done immense damage to the life of people.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">The reasons that could be attributed to such incidence on regular basis are discussed in following points –</span></p><span data-dcnode-id="1260" instrument_node="">
</span><ul data-dcnode-id="1216"><span data-dcnode-id="1259" instrument_node="">
</span><li data-dcnode-id="1251"><span data-dcnode-id="1258" instrument_node="">The ease with which rule and regulations are bypassed by the builders remains the main concern. The National Building Code that provides guidelines for regulating building construction </span><g class="gr_ gr_59 gr-alert gr_gramm gr_inline_cards gr_run_anim Punctuation only-del replaceWithoutSep" data-dcnode-id="1256" data-gr-id="59" id="59"><span data-dcnode-id="1257" instrument_node="">activities,</span></g><span data-dcnode-id="1255" instrument_node=""> </span><g class="gr_ gr_58 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar multiReplace" data-dcnode-id="1253" data-gr-id="58" id="58"><span data-dcnode-id="1254" instrument_node="">are</span></g><span data-dcnode-id="1252" instrument_node=""> not adhered by builders.</span></li><span data-dcnode-id="1250" instrument_node="">
</span><li data-dcnode-id="1242"><span data-dcnode-id="1249" instrument_node="">Apathy towards laws </span><g class="gr_ gr_51 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar multiReplace" data-dcnode-id="1247" data-gr-id="51" id="51"><span data-dcnode-id="1248" instrument_node="">make</span></g><span data-dcnode-id="1246" instrument_node=""> illegal construction a trend that continues to take </span><g class="gr_ gr_49 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="1244" data-gr-id="49" id="49"><span data-dcnode-id="1245" instrument_node="">life</span></g><span data-dcnode-id="1243" instrument_node=""> of innocent citizens.</span></li><span data-dcnode-id="1241" instrument_node="">
</span><li data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Moreover, the standards prescribed for construction are at best poorly defined that people either do not understand or are not aware of.</span></li><span data-dcnode-id="1238" instrument_node="">
</span><li data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Poor designs of buildings that could not withstand extra floors are also no less to be blamed. Poor quality materials used in construction makes any expansion a tough proposition.</span></li><span data-dcnode-id="1235" instrument_node="">
</span><li data-dcnode-id="1224"><span data-dcnode-id="1234" instrument_node="">At the root of such incidence is unplanned </span><g class="gr_ gr_43 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling multiReplace" data-dcnode-id="1232" data-gr-id="43" id="43"><span data-dcnode-id="1233" instrument_node="">urbanisation</span></g><span data-dcnode-id="1231" instrument_node=""> that forces one to opt for accommodation that is built illegally on </span><g class="gr_ gr_40 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="1229" data-gr-id="40" id="40"><span data-dcnode-id="1230" instrument_node="">face</span></g><span data-dcnode-id="1228" instrument_node=""> of limited choices that people get in </span><g class="gr_ gr_41 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling ins-del multiReplace" data-dcnode-id="1226" data-gr-id="41" id="41"><span data-dcnode-id="1227" instrument_node="">ever expanding</span></g><span data-dcnode-id="1225" instrument_node=""> urban areas.</span></li><span data-dcnode-id="1223" instrument_node="">
</span><li data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Somewhere government has also failed in providing affordable accommodation to citizens hence they go for illegal properties.</span></li><span data-dcnode-id="1220" instrument_node="">
</span><li data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Above all the builders’ moral attributes are to be blamed in totality that finds it alright to compromise people’s life in return for monetary gains.</span></li><span data-dcnode-id="1217" instrument_node="">
</span></ul><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1212"><strong data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Measures to prevent such occurrences–</span></strong></p><span data-dcnode-id="1211" instrument_node="">
</span><ul data-dcnode-id="1182"><span data-dcnode-id="1210" instrument_node="">
</span><li data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">First and foremost, rules and regulations need to be defined in clear terms and enforced effectively. Standards defined in National Building Code need to be effectively adhered to.</span></li><span data-dcnode-id="1207" instrument_node="">
</span><li data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Those who break laws should be given stringent punishment to deter others from breaking such laws.</span></li><span data-dcnode-id="1204" instrument_node="">
</span><li data-dcnode-id="1196"><span data-dcnode-id="1203" instrument_node="">Citizens should be made more aware </span><g class="gr_ gr_39 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar multiReplace" data-dcnode-id="1201" data-gr-id="39" id="39"><span data-dcnode-id="1202" instrument_node="">about</span></g><span data-dcnode-id="1200" instrument_node=""> laws and rules regarding construction </span><g class="gr_ gr_42 gr-alert gr_gramm gr_inline_cards gr_run_anim Punctuation only-del replaceWithoutSep" data-dcnode-id="1198" data-gr-id="42" id="42"><span data-dcnode-id="1199" instrument_node="">activities,</span></g><span data-dcnode-id="1197" instrument_node=""> so that they avoid purchasing any such illegally constructed property/building.</span></li><span data-dcnode-id="1195" instrument_node="">
</span><li data-dcnode-id="1190"><span data-dcnode-id="1194" instrument_node="">Crèche facilities and proper welfare mechanism should be put in place for children of women </span><g class="gr_ gr_37 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling multiReplace" data-dcnode-id="1192" data-gr-id="37" id="37"><span data-dcnode-id="1193" instrument_node="">labourer</span></g><span data-dcnode-id="1191" instrument_node=""> working at construction sites.</span></li><span data-dcnode-id="1189" instrument_node="">
</span><li data-dcnode-id="1184"><span data-dcnode-id="1188" instrument_node="">Planned </span><g class="gr_ gr_36 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling multiReplace" data-dcnode-id="1186" data-gr-id="36" id="36"><span data-dcnode-id="1187" instrument_node="">urbanisation</span></g><span data-dcnode-id="1185" instrument_node=""> will go a long way in addressing this concern. Satellite towns need to be built to ease the pressure on main cities.</span></li><span data-dcnode-id="1183" instrument_node="">
</span></ul><p data-dcnode-id="1181"></p><span data-dcnode-id="1180" instrument_node="">
</span></div><span data-dcnode-id="1178" instrument_node="">
</span></li><span data-dcnode-id="1176" instrument_node="">
</span><li data-dcnode-id="1066"><span data-dcnode-id="1175" instrument_node="">
</span><p class="year" data-dcnode-id="1170"><span data-dcnode-id="1174" instrument_node="">
</span><span data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">2019</span></span><span data-dcnode-id="1171" instrument_node="">
</span></p><p data-dcnode-id="1167"><strong data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">10. In a modem democratic polity, there is the concept of political executive and permanent executive. Elected people’s representatives from the political executive and bureaucracy forms the permanent executive. Ministers frame policy decisions and bureaucrats execute these.</span></strong></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1163"><strong data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">In the initial decades after independence, relationship between the permanent executive and the political executive were characterized by mutual understanding, respect and co-operation, without encroaching upon each other’s domain.</span></strong></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1156"><strong data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">However, in the subsequent decades, the situation has changed. There are instances of the political executive insisting upon the permanent executive to follow its agenda. Respect for and appreciation of upright bureaucrats has declined. There is an increasing tendency among the political executive to get involved in routine administrative matters such as transfers, postings etc. Under this scenario, there is a definitive trend towards ‘politicization of bureaucracy’. The rising materialism and acquisitiveness in social life has also adversely impacted upon the ethical values of both the permanent executive and the</span></strong><br data-dcnode-id="1159"><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">political executive.</span></strong></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1152"><strong data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">What are the consequences of this ‘politicization of bureaucracy’? Discuss.</span></strong></p><span data-dcnode-id="1151" instrument_node=""> </span><p data-dcnode-id="1150"></p><span data-dcnode-id="1149" instrument_node="">
</span><button class="btn" data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Show Answer</span></button><span data-dcnode-id="1146" instrument_node="">
</span><div class="desc" data-dcnode-id="1068"><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1144"></p><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Cooperation between elected representatives and bureaucrats is essential for democratic governance of the country. However, due to ‘politicization of bureaucracy’, there is a deterioration in the functioning of the civil services.</span></p><span data-dcnode-id="1141" instrument_node="">
</span><h3 data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Values involved in the case</span></h3><span data-dcnode-id="1138" instrument_node="">
</span><ul data-dcnode-id="1121" style="list-style-type: square;"><span data-dcnode-id="1137" instrument_node="">
</span><li data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Political neutrality and impartiality</span></li><span data-dcnode-id="1134" instrument_node="">
</span><li data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Integrity and probity</span></li><span data-dcnode-id="1131" instrument_node="">
</span><li data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Courage of conviction</span></li><span data-dcnode-id="1128" instrument_node="">
</span><li data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Following the code of conduct</span></li><span data-dcnode-id="1125" instrument_node="">
</span><li data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Legal responsibility</span></li><span data-dcnode-id="1122" instrument_node="">
</span></ul><span data-dcnode-id="1120" instrument_node="">
</span><h3 data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Consequences of politicization of bureaucracy</span></h3><span data-dcnode-id="1117" instrument_node="">
</span><ul data-dcnode-id="1085" style="list-style-type: square;"><span data-dcnode-id="1116" instrument_node="">
</span><li data-dcnode-id="1112"><strong data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Detrimental to moral fibre of bureaucrats:</span></strong><span data-dcnode-id="1113" instrument_node=""> Even honest civil servants with political leanings have compulsion to take biased decisions in favour of one political group.</span></li><span data-dcnode-id="1111" instrument_node="">
</span><li data-dcnode-id="1107"><strong data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Dilemma in personal v/s professional life:</span></strong><span data-dcnode-id="1108" instrument_node=""> A bureaucrat indulged in material benefits have to compromise with his conscience or inner voice just to be in tune with outside reality, thereby disturbing his mental peace and work ethics. The person loses self respect and trust of his family and children who inculcate such inadequate values from him.</span></li><span data-dcnode-id="1106" instrument_node="">
</span><li data-dcnode-id="1102"><strong data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Impact on governance system:</span></strong><span data-dcnode-id="1103" instrument_node=""> Lack of impartiality in functioning of civil servants has direct impact on their decisions in day to day administration either in public service delivery or implementing social welfare schemes.</span></li><span data-dcnode-id="1101" instrument_node="">
</span><li data-dcnode-id="1097"><strong data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Problems in chaotic situations:</span></strong><span data-dcnode-id="1098" instrument_node=""> Difficult circumstances like communal riots demands officers with strict political neutrality. Biased decisions can lead to loss of lives and property. Hence, a civil servant must be accountable for his decisions in such situations.</span></li><span data-dcnode-id="1096" instrument_node="">
</span><li data-dcnode-id="1092"><strong data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Policy paralysis:</span></strong><span data-dcnode-id="1093" instrument_node=""> Fear of political vendetta against non-cooperative officers in the form of frequent transfers, delay in promotions, etc results in red-tapism and culture of secrecy in their decision making.</span></li><span data-dcnode-id="1091" instrument_node="">
</span><li data-dcnode-id="1087"><strong data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Negative impact on civil society:</span></strong><span data-dcnode-id="1088" instrument_node=""> Civil servants occupying top positions in the government are role models for young aspiring Indians. Their impartial attitude is detrimental to the societal ethics at large.</span></li><span data-dcnode-id="1086" instrument_node="">
</span></ul><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1083" instrument_node="">Therefore, a civil servant must be politically neutral. As a civil servant, one has the responsibility towards public and must adhere to constitutional principles keeping his conscience intact. His primary job is to perform </span><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Nishkama Karma</span></strong><span data-dcnode-id="1080" instrument_node=""> (selfless and desire less duty). He must be rational, exemplary, and committed to the public</span><br data-dcnode-id="1079"><span data-dcnode-id="1078" instrument_node="">cause.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Materialistic things charms anyone only for short span and in the long run person derive satisfaction by doing his job honestly and making positive contributions in the lives of others. Therefore, civil servants and even politicians should stay away from material gains.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Also, a civil servant should be ready to serve at any position at any time. Fear of transfer should not refrain a civil servant from his commitment towards public cause and larger interest of society.</span></p><p data-dcnode-id="1070"></p><span data-dcnode-id="1069" instrument_node="">
</span></div><span data-dcnode-id="1067" instrument_node="">
</span></li><span data-dcnode-id="1065" instrument_node="">
</span><li data-dcnode-id="916"><span data-dcnode-id="1064" instrument_node="">
</span><p class="year" data-dcnode-id="1059"><span data-dcnode-id="1063" instrument_node="">
</span><span data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">2017</span></span><span data-dcnode-id="1060" instrument_node="">
</span></p><p data-dcnode-id="1047"><strong data-dcnode-id="1048"><span data-dcnode-id="1058" instrument_node="">14.&nbsp;You are a Public Information Officer (PIO) in a government department. You are aware that the RTI Act 2005 envisages transparency and accountability in administration. The act has functioned as a check on the supposedly arbitrarily administrative </span><g class="gr_ gr_16 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling multiReplace" data-dcnode-id="1056" data-gr-id="16" id="16"><span data-dcnode-id="1057" instrument_node="">behaviour</span></g><span data-dcnode-id="1055" instrument_node=""> and actions. However, as a PIO you have observed that there are citizens who filed RTI applications not for themselves but on behalf of such stakeholders who purportedly want to have access to information to further their own interests. At the same </span><g class="gr_ gr_15 gr-alert gr_gramm gr_inline_cards gr_run_anim Punctuation only-ins replaceWithoutSep" data-dcnode-id="1053" data-gr-id="15" id="15"><span data-dcnode-id="1054" instrument_node="">time</span></g><span data-dcnode-id="1052" instrument_node=""> there are these RTI activists who routinely file RTI applications and attempt to extort money from the decision makers. This type of RTI activism has affected the functioning of the administration adversely and also possibly </span><g class="gr_ gr_17 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling multiReplace" data-dcnode-id="1050" data-gr-id="17" id="17"><span data-dcnode-id="1051" instrument_node="">jeopardises</span></g><span data-dcnode-id="1049" instrument_node=""> the genuineness of the applications which are essentially aimed at getting justice.</span></strong></p><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1043"><strong data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">What measures would you suggest to separate genuine and non-genuine applications? Give merits and demerits of your suggestions.&nbsp;(2017)</span></strong></p><span data-dcnode-id="1042" instrument_node=""> </span><p data-dcnode-id="1041"></p><span data-dcnode-id="1040" instrument_node="">
</span><button class="btn" data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Show Answer</span></button><span data-dcnode-id="1037" instrument_node="">
</span><div class="desc" data-dcnode-id="918"><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1035"></p><p data-dcnode-id="1030"><span data-dcnode-id="1034" instrument_node="">Over the year the RTI act has emerged as a milestone in assuring transparency in administration and governance. It has provided a tool in hands of citizens to bring the best out of the government but in many </span><g class="gr_ gr_44 gr-alert gr_gramm gr_inline_cards gr_disable_anim_appear Punctuation only-ins replaceWithoutSep" data-dcnode-id="1032" data-gr-id="44" id="44"><span data-dcnode-id="1033" instrument_node="">cases</span></g><span data-dcnode-id="1031" instrument_node=""> the act has also served as a way to harass government officials and extort money.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">To deal with such situations following measures are available –</span></p><span data-dcnode-id="1026" instrument_node="">
</span><ul data-dcnode-id="1018"><span data-dcnode-id="1025" instrument_node="">
</span><li data-dcnode-id="1020"><span data-dcnode-id="1024" instrument_node="">Those filing RTI applications may be asked to mention about any connection/interest they have in the concerned department. Applicants might be given options to specify whether information asked serves </span><g class="gr_ gr_53 gr-alert gr_gramm gr_inline_cards gr_disable_anim_appear Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="1022" data-gr-id="53" id="53"><span data-dcnode-id="1023" instrument_node="">public</span></g><span data-dcnode-id="1021" instrument_node=""> purpose or private interest.</span></li><span data-dcnode-id="1019" instrument_node="">
</span></ul><span data-dcnode-id="1017" instrument_node="">
</span><ul data-dcnode-id="999" style="list-style-type: circle;"><span data-dcnode-id="1016" instrument_node="">
</span><li data-dcnode-id="1006"><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Merit:</span></strong><span data-dcnode-id="1013" instrument_node=""> It might help to identify the persons who indulge in </span><g class="gr_ gr_41 gr-alert gr_gramm gr_inline_cards gr_disable_anim_appear Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="1011" data-gr-id="41" id="41"><span data-dcnode-id="1012" instrument_node="">misuse</span></g><span data-dcnode-id="1010" instrument_node=""> of RTI and other </span><g class="gr_ gr_37 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling ins-del" data-dcnode-id="1008" data-gr-id="37" id="37"><span data-dcnode-id="1009" instrument_node="">wrong doing</span></g><span data-dcnode-id="1007" instrument_node="">.</span></li><span data-dcnode-id="1005" instrument_node="">
</span><li data-dcnode-id="1001"><strong data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Demerit:</span></strong><span data-dcnode-id="1002" instrument_node=""> It makes the process a little cumbersome for the genuine applicants.</span></li><span data-dcnode-id="1000" instrument_node="">
</span></ul><span data-dcnode-id="998" instrument_node="">
</span><ul data-dcnode-id="993"><span data-dcnode-id="997" instrument_node="">
</span><li data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">All the previous applications under the RTI could be scrutinized to bring out the trends in asking questions so that genuine applications can be segregated from the non-genuine ones. Habitual offenders can be closely monitored.</span></li><span data-dcnode-id="994" instrument_node="">
</span></ul><span data-dcnode-id="992" instrument_node="">
</span><ul data-dcnode-id="977" style="list-style-type: circle;"><span data-dcnode-id="991" instrument_node="">
</span><li data-dcnode-id="987"><strong data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Merit:</span></strong><span data-dcnode-id="988" instrument_node=""> It will help in creating a robust database of almost all applicants for the future reference of the department and also identify the miscreants.</span></li><span data-dcnode-id="986" instrument_node="">
</span><li data-dcnode-id="979"><strong data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Demerit:</span></strong><span data-dcnode-id="983" instrument_node=""> It will create </span><g class="gr_ gr_85 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="981" data-gr-id="85" id="85"><span data-dcnode-id="982" instrument_node="">extra</span></g><span data-dcnode-id="980" instrument_node=""> burden on the employees of the department as they might have to take help of other departments and law and order agencies.</span></li><span data-dcnode-id="978" instrument_node="">
</span></ul><span data-dcnode-id="976" instrument_node="">
</span><ul data-dcnode-id="968"><span data-dcnode-id="975" instrument_node="">
</span><li data-dcnode-id="970"><span data-dcnode-id="974" instrument_node="">Few changes regarding charges and fees associated with providing information can be made in the law. There should be no changes in the fee for </span><g class="gr_ gr_90 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins replaceWithoutSep" data-dcnode-id="972" data-gr-id="90" id="90"><span data-dcnode-id="973" instrument_node="">initial</span></g><span data-dcnode-id="971" instrument_node=""> filing of the applications. But if they are found to be false or serving the vested interests of someone in later investigations, then a suitable monetary fine may be imposed.</span></li><span data-dcnode-id="969" instrument_node="">
</span></ul><span data-dcnode-id="967" instrument_node="">
</span><ul data-dcnode-id="944" style="list-style-type: circle;"><span data-dcnode-id="966" instrument_node="">
</span><li data-dcnode-id="959"><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Merit:</span></strong><span data-dcnode-id="963" instrument_node=""> It will act as a check on insincere and unscrupulous applicants and hit others economically for </span><g class="gr_ gr_83 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling ins-del" data-dcnode-id="961" data-gr-id="83" id="83"><span data-dcnode-id="962" instrument_node="">wrong doing</span></g><span data-dcnode-id="960" instrument_node="">.</span></li><span data-dcnode-id="958" instrument_node="">
</span><li data-dcnode-id="946"><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Demerit:</span></strong><span data-dcnode-id="955" instrument_node=""> It will create a divide and discrimination between rich and poor people. Economically </span><g class="gr_ gr_87 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling ins-del multiReplace" data-dcnode-id="953" data-gr-id="87" id="87"><span data-dcnode-id="954" instrument_node="">well off</span></g><span data-dcnode-id="952" instrument_node=""> and </span><g class="gr_ gr_84 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling multiReplace" data-dcnode-id="948" data-gr-id="84" id="84"><g class="gr_ gr_88 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling" data-dcnode-id="950" data-gr-id="88" id="88"><span data-dcnode-id="951" instrument_node="">non</span></g><span data-dcnode-id="949" instrument_node=""> genuine</span></g><span data-dcnode-id="947" instrument_node=""> applicants will not hesitate to file applications while the poor will be discouraged to do so.&nbsp;</span></li><span data-dcnode-id="945" instrument_node="">
</span></ul><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="942" instrument_node="">The above steps will help in segregating genuine applications from the </span><g class="gr_ gr_67 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling multiReplace" data-dcnode-id="938" data-gr-id="67" id="67"><g class="gr_ gr_40 gr-alert gr_spell gr_inline_cards gr_disable_anim_appear ContextualSpelling ins-del multiReplace" data-dcnode-id="940" data-gr-id="40" id="40"><span data-dcnode-id="941" instrument_node="">non</span></g><span data-dcnode-id="939" instrument_node=""> genuine</span></g><span data-dcnode-id="937" instrument_node=""> ones and will help take the effective actions accordingly. </span><g class="gr_ gr_64 gr-alert gr_gramm gr_inline_cards gr_run_anim Punctuation only-ins replaceWithoutSep" data-dcnode-id="935" data-gr-id="64" id="64"><span data-dcnode-id="936" instrument_node="">However</span></g><span data-dcnode-id="934" instrument_node=""> in the given question, there are RTI activists who are attempting to extort money from the decision makers. It indicates the systemic flaws in the government department itself. Besides it points to the fact that decision makers want to hide the information as it might expose the wrongdoings in the governance. Therefore the </span><g class="gr_ gr_66 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling" data-dcnode-id="932" data-gr-id="66" id="66"><span data-dcnode-id="933" instrument_node="">governance</span></g><span data-dcnode-id="931" instrument_node=""> itself should be reformed and transparency and accountability should never be forsaken. The genuine applicants must be provided with the requisite information. </span><g class="gr_ gr_61 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="929" data-gr-id="61" id="61"><span data-dcnode-id="930" instrument_node="">Better</span></g><span data-dcnode-id="928" instrument_node=""> option would be to play a pro-active role and put most of the information that </span><g class="gr_ gr_63 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar multiReplace" data-dcnode-id="926" data-gr-id="63" id="63"><span data-dcnode-id="927" instrument_node="">are</span></g><span data-dcnode-id="925" instrument_node=""> not exempted under the act in the public domain for easy accessibility by </span><g class="gr_ gr_62 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins replaceWithoutSep" data-dcnode-id="923" data-gr-id="62" id="62"><span data-dcnode-id="924" instrument_node="">public</span></g><span data-dcnode-id="922" instrument_node="">.</span></p><p data-dcnode-id="920"></p><span data-dcnode-id="919" instrument_node="">
</span></div><span data-dcnode-id="917" instrument_node="">
</span></li><span data-dcnode-id="915" instrument_node="">
</span><li data-dcnode-id="822"><span data-dcnode-id="914" instrument_node="">
</span><p class="year" data-dcnode-id="909"><span data-dcnode-id="913" instrument_node="">
</span><span data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">2019</span></span><span data-dcnode-id="910" instrument_node="">
</span></p><p data-dcnode-id="906"><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">11. In one of the districts of a frontier state, narcotics menace has been rampant. This has resulted in money laundering, mushrooming of poppy farming, arms smuggling and near stalling of education. The system is on the verge of collapse. The situation has been further worsened by unconfirmed reports that local politicians, as well as some senior police officers, are providing surreptitious patronage to the drug mafia. At that point of time a woman police officer, known for her skills in handling such situations is appointed as Superintendent of Police to bring the situation to normalcy.</span></strong></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="902"><strong data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">If you are the same police officer, identify the various dimensions of the crisis. Based on your understanding, suggest measures to deal with the crisis.</span></strong></p><span data-dcnode-id="901" instrument_node=""> </span><p data-dcnode-id="900"></p><span data-dcnode-id="899" instrument_node="">
</span><button class="btn" data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Show Answer</span></button><span data-dcnode-id="896" instrument_node="">
</span><div class="desc" data-dcnode-id="824"><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="894"></p><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">The situation in the aforementioned district seems daunting, with the social and administrative system inching towards a total collapse. Consequentially, the prevalence of such a scenario must be leading to wastage of human and social capital, rise in crime rates, and endangering the future prospects of the district and its people.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">The district is grappling with myriad problems which have various dimensions of the crisis can be summarised as below-</span></p><span data-dcnode-id="888" instrument_node="">
</span><ul data-dcnode-id="861" style="list-style-type: square;"><span data-dcnode-id="887" instrument_node="">
</span><li data-dcnode-id="883"><strong data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Legal dimension:</span></strong><span data-dcnode-id="884" instrument_node=""> The activities like money laundering,poppy farming,arms smuggling,emanating from narcotics menace, are legally prohibited under respective laws.</span></li><span data-dcnode-id="882" instrument_node="">
</span><li data-dcnode-id="878"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Security dimension:</span></strong><span data-dcnode-id="879" instrument_node=""> Frontier districts in India are susceptible to subversive groups trying to undermine democracy and authority of the State. Arms smuggling and money laundering provides easy means of financing their anti-social activities.</span></li><span data-dcnode-id="877" instrument_node="">
</span><li data-dcnode-id="873"><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Social dimension:</span></strong><span data-dcnode-id="874" instrument_node=""> A society ridden with such maladies can never focus on education, health, development, empowerment and welfare which are the key aims of a welfare state.</span></li><span data-dcnode-id="872" instrument_node="">
</span><li data-dcnode-id="868"><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Economic dimension:</span></strong><span data-dcnode-id="869" instrument_node=""> Involvement of people in such activities will lead to the emergence of a black economy eating away at the vitals of a state.</span></li><span data-dcnode-id="867" instrument_node="">
</span><li data-dcnode-id="863"><strong data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Political and administrative dimension:</span></strong><span data-dcnode-id="864" instrument_node=""> Allegedly, local political leaders and senior police officers are hand in glove with the drug mafia and are providing clandestine support to them- which raises the question of moral and ethical propriety.</span></li><span data-dcnode-id="862" instrument_node="">
</span></ul><span data-dcnode-id="860" instrument_node="">
</span><h3 data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Measures to deal with the crisis</span></h3><span data-dcnode-id="857" instrument_node="">
</span><ul data-dcnode-id="830" style="list-style-type: square;"><span data-dcnode-id="856" instrument_node="">
</span><li data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Since the problems have permeated through the social, political and administrative structures, my response, as a lady Superintendent of Police should be calculated, precise and swift, with long term implications in mind.</span></li><span data-dcnode-id="853" instrument_node="">
</span><li data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Firstly, a thorough investigation must be conducted within the police establishment to identify the black sheep and they should be subjected to lawful punishment.</span></li><span data-dcnode-id="850" instrument_node="">
</span><li data-dcnode-id="843"><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Law enforcement:</span></strong><span data-dcnode-id="847" instrument_node=""> I would focus on scrupulous and strict implementation of existing laws -taking a cue from </span><em data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">inspirational lady SP of Sonitpur district, Sanjukta Parashar</span></em><span data-dcnode-id="844" instrument_node="">, who efficiently curbed insurgency, seized tons of illegal arms and ammunition and arrested dozens involved in illegal arms racket.</span></li><span data-dcnode-id="842" instrument_node="">
</span><li data-dcnode-id="838"><strong data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Taking help from Border Security Forces:</span></strong><span data-dcnode-id="839" instrument_node=""> Since my district lies in a frontier state; there is a possibility of involvement of transnational elements. For this, the police force must act in tandem with Border security personnel because with rigorous patrolling and search operations local elements can be isolated.</span></li><span data-dcnode-id="837" instrument_node="">
</span><li data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Going beyond just law enforcement, I would also discuss the social dimensions of the problem with other administrative officers like District Magistrate- and suggest to involve other benign actors like NGOs, Panchayat heads etc, acting in a concerted way, for engendering education and addressing the issue holistically.</span></li><span data-dcnode-id="834" instrument_node="">
</span><li data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Efforts should also be made to wean off regular farmers if involved in poppy cultivation.</span></li><span data-dcnode-id="831" instrument_node="">
</span></ul><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">India’s frontier districts need to remain economically prosperous, socially in harmony and free of illegal criminal networks because an afflicted district can have long-term adverse implications on the security, unity and integrity of India.</span></p><p data-dcnode-id="826"></p><span data-dcnode-id="825" instrument_node="">
</span></div><span data-dcnode-id="823" instrument_node="">
</span></li><span data-dcnode-id="821" instrument_node="">
</span><li data-dcnode-id="650"><span data-dcnode-id="820" instrument_node="">
</span><p class="year" data-dcnode-id="815"><span data-dcnode-id="819" instrument_node="">
</span><span data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">2019</span></span><span data-dcnode-id="816" instrument_node="">
</span></p><p data-dcnode-id="812"><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">12. In recent times, there has been an increasing concern in India to develop effective civil service ethics, code of conduct, transparency measures, ethics and integrity systems and anti-corruption agencies. In view of this, there is a need being felt to focus on three specific areas, which are directly relevant to the problems of internalizing integrity and ethics in the civil services. These are as follows:</span></strong></p><span data-dcnode-id="811" instrument_node="">
</span><ol data-dcnode-id="797"><span data-dcnode-id="810" instrument_node="">
</span><li data-dcnode-id="807"><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Anticipating specific threats to ethical standards and integrity in the civil services,</span></strong></li><span data-dcnode-id="806" instrument_node="">
</span><li data-dcnode-id="803"><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Strengthening the ethical competence of civil servant and</span></strong></li><span data-dcnode-id="802" instrument_node="">
</span><li data-dcnode-id="799"><strong data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Developing administrative processes and practices which promote ethical values and integrity in civil services.</span></strong></li><span data-dcnode-id="798" instrument_node="">
</span></ol><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="793"><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Suggest institutional measures to address the above three issues.</span></strong></p><span data-dcnode-id="792" instrument_node=""> </span><p data-dcnode-id="791"></p><span data-dcnode-id="790" instrument_node="">
</span><button class="btn" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Show Answer</span></button><span data-dcnode-id="787" instrument_node="">
</span><div class="desc" data-dcnode-id="652"><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="785"></p><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">In recent times, there is an increasing expectation from ordinary citizens, business leaders and Civil Society for higher standards of ethical behaviour and integrity in the Civil Services. To promote this, various methods like Code of Conduct, Citizen Charters, etc have been developed. However, the focus should also be on internalizing professional ethics and integrity in civil services to make it more citizen-friendly.</span></p><span data-dcnode-id="782" instrument_node="">
</span><h3 data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Values involved in the case</span></h3><span data-dcnode-id="779" instrument_node="">
</span><ul data-dcnode-id="762" style="list-style-type: square;"><span data-dcnode-id="778" instrument_node="">
</span><li data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Ethical integrity of civil servants.</span></li><span data-dcnode-id="775" instrument_node="">
</span><li data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Probity in governance.</span></li><span data-dcnode-id="772" instrument_node="">
</span><li data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Moral aptitude of civil servants.</span></li><span data-dcnode-id="769" instrument_node="">
</span><li data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Accountability and responsibility.</span></li><span data-dcnode-id="766" instrument_node="">
</span><li data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Transparency and citizen participation.</span></li><span data-dcnode-id="763" instrument_node="">
</span></ul><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="758"><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Specific focus issues and measures to address them</span></strong></p><span data-dcnode-id="757" instrument_node="">
</span><ul data-dcnode-id="658" style="list-style-type: square;"><span data-dcnode-id="756" instrument_node="">
</span><li data-dcnode-id="723"><strong data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Anticipating specific threats to ethical standards and integrity in the civil services.</span></strong><br data-dcnode-id="753"><span data-dcnode-id="752" instrument_node="">
</span><ul data-dcnode-id="725" style="list-style-type: circle;"><span data-dcnode-id="751" instrument_node="">
</span><li data-dcnode-id="747"><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Red-tapism:</span></strong><span data-dcnode-id="748" instrument_node=""> Unnecessary administrative complexities to effective service delivery should be identified and removed.</span></li><span data-dcnode-id="746" instrument_node="">
</span><li data-dcnode-id="742"><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Culture of Secrecy:</span></strong><span data-dcnode-id="743" instrument_node=""> Decisions made by civil servants and public officials should be made as transparent and open as possible. Reasons must be given for official decisions.</span></li><span data-dcnode-id="741" instrument_node="">
</span><li data-dcnode-id="737"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Inadequate grievance redressal System:</span></strong><span data-dcnode-id="738" instrument_node=""> Effective mechanisms should be put in place to ensure timely resolution of public complaints and appropriate feedback provided to the public organisations. Grievance redressal processes should be monitored so as to ensure that systems are reviewed and performance is improved.</span></li><span data-dcnode-id="736" instrument_node="">
</span><li data-dcnode-id="732"><strong data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Biasedness and Partisan Attitude:</span></strong><span data-dcnode-id="733" instrument_node=""> Implementation of conduct rules and code of ethics in order to create a professional and non-partisan civil service hierarchy.</span></li><span data-dcnode-id="731" instrument_node="">
</span><li data-dcnode-id="727"><strong data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Elitism of civil servants:</span></strong><span data-dcnode-id="728" instrument_node=""> Public orientation in Civil servants is crucial to increase public participation and&nbsp;improve public service delivery. Civil servants should be given proper training to ensure citizen-friendly behaviour.</span></li><span data-dcnode-id="726" instrument_node="">
</span></ul><span data-dcnode-id="724" instrument_node="">
</span></li><span data-dcnode-id="722" instrument_node="">
</span><li data-dcnode-id="694"><strong data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Strengthening the ethical competence of civil servant.</span></strong><br data-dcnode-id="719"><span data-dcnode-id="718" instrument_node="">
</span><ul data-dcnode-id="696" style="list-style-type: circle;"><span data-dcnode-id="717" instrument_node="">
</span><li data-dcnode-id="713"><strong data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Training and performance appraisal:</span></strong><span data-dcnode-id="714" instrument_node=""> This would incentivise the honest civil servants and make them role models for others to emulate.</span></li><span data-dcnode-id="712" instrument_node="">
</span><li data-dcnode-id="708"><strong data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Reward and honours:</span></strong><span data-dcnode-id="709" instrument_node=""> It will infuse competition in the civil services to perform better and develop innovative solutions for public service.</span></li><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="703"><strong data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Promotion of inclusive work culture:</span></strong><span data-dcnode-id="704" instrument_node=""> Diluting strict hierarchy to increase the cooperation among public officials to increase the effectiveness of services.</span></li><span data-dcnode-id="702" instrument_node="">
</span><li data-dcnode-id="698"><strong data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Social and cultural competence:</span></strong><span data-dcnode-id="699" instrument_node=""> This would help the civil servant to understand the diverse Indian society and perform as per the high aspirations of the public.</span></li><span data-dcnode-id="697" instrument_node="">
</span></ul><span data-dcnode-id="695" instrument_node="">
</span></li><span data-dcnode-id="693" instrument_node="">
</span><li data-dcnode-id="660"><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Developing administrative processes and practices which promote ethical values and integrity in civil services.</span></strong><br data-dcnode-id="690"><span data-dcnode-id="689" instrument_node="">
</span><ul data-dcnode-id="662" style="list-style-type: circle;"><span data-dcnode-id="688" instrument_node="">
</span><li data-dcnode-id="684"><strong data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Promoting accountability:</span></strong><span data-dcnode-id="685" instrument_node=""> Effective laws which require civil servants to give reasons for their official decisions. For eg. RTI act.</span></li><span data-dcnode-id="683" instrument_node="">
</span><li data-dcnode-id="679"><strong data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Reducing Corruption:</span></strong><span data-dcnode-id="680" instrument_node=""> Punitive provision like Prevention of Corruption Act and Whistleblower Protection act, technological Interventions in the form of e-governance to remove discretion, promotion of Social Auditing etc to ensure accountability of the administrative work.</span></li><span data-dcnode-id="678" instrument_node="">
</span><li data-dcnode-id="674"><strong data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Human Resource management strategies:</span></strong><span data-dcnode-id="675" instrument_node=""> Performance-based pay, Lateral Entry, Multi-Phase training will increase the efficiency and quality of public service delivery.</span></li><span data-dcnode-id="673" instrument_node="">
</span><li data-dcnode-id="669"><strong data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Internal and External Committees:</span></strong><span data-dcnode-id="670" instrument_node=""> To ensure redressal of complaints and grievances of civil servants and public. This improves the work culture and aligns the behaviour of public servants to the desired civil services values.</span></li><span data-dcnode-id="668" instrument_node="">
</span><li data-dcnode-id="664"><strong data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Code of Conduct Rules:</span></strong><span data-dcnode-id="665" instrument_node=""> It ensures appropriate behaviour from public servants that should be unbiased and non-partisan.</span></li><span data-dcnode-id="663" instrument_node="">
</span></ul><span data-dcnode-id="661" instrument_node="">
</span></li><span data-dcnode-id="659" instrument_node="">
</span></ul><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Promotion of ethical behaviour and integrity in civil servants, and revamping the public administration is critical to ensure that the policies of social welfare are implemented in true spirit. It would improve the responsiveness of public servants towards the common citizenry. Also, public trust would increase in the government setup. Greater social capital can in turn help in the promotion of ethical governance.</span></p><p data-dcnode-id="654"></p><span data-dcnode-id="653" instrument_node="">
</span></div><span data-dcnode-id="651" instrument_node="">
</span></li><span data-dcnode-id="649" instrument_node="">
</span></ul><span data-dcnode-id="647" instrument_node="">
</span></div><span data-dcnode-id="645" instrument_node="">
