</span><li data-dcnode-id="2566"><a data-dcnode-id="2567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drishtiias.com/"><span data-dcnode-id="2568" instrument_node="">Home</span></a></li><span data-dcnode-id="2565" instrument_node="">
</span><li data-dcnode-id="2562"><a data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drishtiias.com/upsc-mains-solved-papers-subjectwise"><span data-dcnode-id="2564" instrument_node="">Solved Paper by Subject</span></a></li><span data-dcnode-id="2561" instrument_node="">

</span><article data-dcnode-id="628"><span data-dcnode-id="2542" instrument_node="">
</span><h6 data-dcnode-id="2540" style="border-bottom: 1px solid #ececec;"><span data-dcnode-id="2541" instrument_node="">
                      18 Solved Questions with Answers
                    </span></h6><span data-dcnode-id="2539" instrument_node="">
</span><div data-dcnode-id="646" id="accordion" style="overflow: hidden; outline: none;" tabindex="5000"><span data-dcnode-id="2538" instrument_node="">
</span><ul data-dcnode-id="648"><span data-dcnode-id="2537" instrument_node="">
</span><li data-dcnode-id="2456"><span data-dcnode-id="2536" instrument_node="">
</span><p class="year" data-dcnode-id="2531"><span data-dcnode-id="2535" instrument_node="">
</span><span data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">2016</span></span><span data-dcnode-id="2532" instrument_node="">
</span></p><p data-dcnode-id="2528"><strong data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">9. A fresh engineering graduate gets a job in a prestigious chemical industry. She likes the work. The salary is also good. However, after a few months she accidentally discovers that a highly toxic waste is being secretly discharged into a river nearby. This is causing health problems to the villagers downstream who depend on the river for their water needs. She is perturbed and mentions her concern to her colleagues who have been with the company for longer periods. They advise her to keep quite as anyone who mentions the topic is summarily dismissed. She cannot risk losing her job as she is the sole bread-winner for her family and has to support her ailing parents and siblings. At first, she thinks that if her seniors are keeping quiet, why should she stick out her neck. But her conscience pricks her to do something to save the river and the people who depend upon it. At heart she feels that the advice of silence given by her friends is not correct though she cannot give reasons for it. She thinks you are a wise person and seeks your advice. (2016)</span></strong></p><span data-dcnode-id="2527" instrument_node="">
</span><p data-dcnode-id="2524"><strong data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">(a) What arguments can you advance to show her that keeping quiet is not morally right?</span></strong></p><span data-dcnode-id="2523" instrument_node="">
</span><p data-dcnode-id="2520"><strong data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">(b) What course of action would you advice her to adopt and why?</span></strong></p><span data-dcnode-id="2519" instrument_node=""> </span><p data-dcnode-id="2518"></p><span data-dcnode-id="2517" instrument_node="">
</span><button class="btn" data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Show Answer</span></button><span data-dcnode-id="2514" instrument_node="">
</span><div class="desc" data-dcnode-id="2458"><span data-dcnode-id="2513" instrument_node="">
</span><p data-dcnode-id="2512"></p><p data-dcnode-id="2508"><strong data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">(a)</span></strong><span data-dcnode-id="2509" instrument_node=""> Arguments in favour of not keeping quiet are as follows:</span></p><span data-dcnode-id="2507" instrument_node="">
</span><ul data-dcnode-id="2493" style="list-style-type: square;"><span data-dcnode-id="2506" instrument_node="">
</span><li data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">‘Business without morality’ is the most important point to be kept in mind so the secretive discharge of highly toxic waste must be made public.</span></li><span data-dcnode-id="2503" instrument_node="">
</span><li data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">As a conscience citizen she must keep in mind the right of life of the villagers compelling her to speak. Usually people join such voices/movements against injustice and all that they need is a trigger, in this case the villagers need a spokesperson.</span></li><span data-dcnode-id="2500" instrument_node="">
</span><li data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">Company making profits by jeopardising the lives of people at the expense of health of both the river and the villagers is immoral and not ethically right.</span></li><span data-dcnode-id="2497" instrument_node="">
</span><li data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">On the question of integrity she must speak up against the company. Discharge of toxic waste is not only morally wrong but is environmental hazardous too.</span></li><span data-dcnode-id="2494" instrument_node="">
</span></ul><span data-dcnode-id="2492" instrument_node="">
</span><p data-dcnode-id="2488"><strong data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">(b)</span></strong><span data-dcnode-id="2489" instrument_node=""> Course of action that can be advised to her is as follows:</span></p><span data-dcnode-id="2487" instrument_node="">
</span><ul data-dcnode-id="2464" style="list-style-type: square;"><span data-dcnode-id="2486" instrument_node="">
</span><li data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">Moral persuasion should be the first step. She should consult her colleagues one more time. It is likely that would still not budge but again there is a possibility that she might be able to conscience even one of them.</span></li><span data-dcnode-id="2483" instrument_node="">
</span><li data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">The residents of the villages must be made aware about their right to life which includes a healthy life.</span></li><span data-dcnode-id="2480" instrument_node="">
</span><li data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">After some ground work like talking to villagers, the health problem faced by them, testing the level of toxicity of rivers a report must be made. She can show this report to her immediate senior to remind the company of the environment laws as well as corporate social responsibility.</span></li><span data-dcnode-id="2477" instrument_node="">
</span><li data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Since profit is the sole aim of the company she can present a case study where companies lost business due to loss of confidence of people.</span></li><span data-dcnode-id="2474" instrument_node="">
</span><li data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">She can take the assistance of the local NGO as well as media to create pressure on the company as well other big industries working on similar lines.</span></li><span data-dcnode-id="2471" instrument_node="">
</span><li data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">She can inform the district administration of the same wrongdoing and seek their help.</span></li><span data-dcnode-id="2468" instrument_node="">
</span><li data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">As a last resort she can file public interest litigation on behalf of the villagers as the toxic level of discharge and take head of the whistle blower’s act.</span></li><span data-dcnode-id="2465" instrument_node="">
</span></ul><span data-dcnode-id="2463" instrument_node="">
</span><p data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">There is high chance of her loosing the job, so simultaneously she can start looking for a new job since even if the complains go unheard she might not continue in the company on moral grounds.</span></p><p data-dcnode-id="2460"></p><span data-dcnode-id="2459" instrument_node="">
</span></div><span data-dcnode-id="2457" instrument_node="">
</span></li><span data-dcnode-id="2455" instrument_node="">
</span><li data-dcnode-id="2377"><span data-dcnode-id="2454" instrument_node="">
</span><p class="year" data-dcnode-id="2449"><span data-dcnode-id="2453" instrument_node="">
</span><span data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">2016</span></span><span data-dcnode-id="2450" instrument_node="">
</span></p><p data-dcnode-id="2446"><strong data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">10. Land needed for mining, dams and other large-scale projects is acquired mostly from Adivasis, hill dwellers and rural communities. The displaced persons are paid monetary compensation as per the legal provisions. However, the payment is often tardy. In any case, it cannot sustain the displaced families for long. These people do not possess marketable skills to engage in some other accusation. They end up as low paid migrant labourers. Moreover, the development goes to industries, industrialists and urban communities whereas the costs are passed on to these poor helpless people. This unjust distribution of costs and benefits is unethical.</span></strong></p><span data-dcnode-id="2445" instrument_node="">
</span><p data-dcnode-id="2442"><strong data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Suppose you have been entrusted with the task of drafting a better compensation-cum-rehabilitation policy for such displaced persons, how would you approach the problem and what would be the main elements of your suggested policy? (2016)</span></strong></p><span data-dcnode-id="2441" instrument_node=""> </span><p data-dcnode-id="2440"></p><span data-dcnode-id="2439" instrument_node="">
</span><button class="btn" data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Show Answer</span></button><span data-dcnode-id="2436" instrument_node="">
</span><div class="desc" data-dcnode-id="2379"><span data-dcnode-id="2435" instrument_node="">
</span><p data-dcnode-id="2434"></p><p data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">The rights of adivasis, rural communities, hill dwellers their rights over the forest resources under the Forest Right Act (FRA) must be kept in mind along with various compensations like payment, jobs in the upcoming industries etc.</span></p><span data-dcnode-id="2431" instrument_node="">
</span><p data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">Though FRA was passed in 2006 according to the Citizens’s Report prepared by Community Forest Rights, only 3% of villages or communities could actually secure their rights.</span></p><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2425"><strong data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">Approach to be adopted</span></strong></p><span data-dcnode-id="2424" instrument_node="">
</span><ul data-dcnode-id="2413" style="list-style-type: square;"><span data-dcnode-id="2423" instrument_node="">
</span><li data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">Rehabilitation must be fixed according to the community or category of people being displaced which should ensure them basic amenities subject to restrictions for forest protection.</span></li><span data-dcnode-id="2420" instrument_node="">
</span><li data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">Even after compensation they should not be deprived of their user rights like forest produce which includes grazing and pastoralist routes etc. For example, Telangana government in total violation of forest rights act has illegalized traditional methods of forest land cultivation, creating a lot of unrest in the area.</span></li><span data-dcnode-id="2417" instrument_node="">
</span><li data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">‘Free informed consent’ of gram sabhas for any government plans to remove tribal/hill dwellers from the forests and for the settlement or rehabilitation package should not be undermined in any circumstance.</span></li><span data-dcnode-id="2414" instrument_node="">
</span></ul><span data-dcnode-id="2412" instrument_node="">
</span><p data-dcnode-id="2409"><strong data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">Main Elements must include</span></strong></p><span data-dcnode-id="2408" instrument_node="">
</span><ul data-dcnode-id="2385" style="list-style-type: square;"><span data-dcnode-id="2407" instrument_node="">
</span><li data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">Creating awareness among the lot about community right’s provision.</span></li><span data-dcnode-id="2404" instrument_node="">
</span><li data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">Ensuring that implementation of laws of community forest provision is undiluted.</span></li><span data-dcnode-id="2401" instrument_node="">
</span><li data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">Nodal tribal departments must provide clear instructions to the concerned administrators. However without a strong political will, these instructions almost go unheard.</span></li><span data-dcnode-id="2398" instrument_node="">
</span><li data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">Imparting skills to the displaced migrants should be made compulsory along with compensation. This would give them right to decide whether they want to migrate as a labourer or work in the upcoming industry.</span></li><span data-dcnode-id="2395" instrument_node="">
</span><li data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">FRA should be a major hurdle for corporate to cross with the intentions of single handed profit making.</span></li><span data-dcnode-id="2392" instrument_node="">
</span><li data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">Since most of the tribal states have a poor record of implementation of the compensatory provisions, the FRA must be made more transparent. The concerned authority must be made accountable for non compliance.</span></li><span data-dcnode-id="2389" instrument_node="">
</span><li data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">A grievance redressal mechanism must be created wherein the tribals/displaced can openly register their complaints. These should be appraised regularly to dispense those complaints.</span></li><span data-dcnode-id="2386" instrument_node="">
</span></ul><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Such displacements straight away violate the right to life of the dwellers of such areas. Proper rehabilitation of the displaced population must be ensured.</span></p><p data-dcnode-id="2381"></p><span data-dcnode-id="2380" instrument_node="">
</span></div><span data-dcnode-id="2378" instrument_node="">
</span></li><span data-dcnode-id="2376" instrument_node="">
</span><li data-dcnode-id="2325"><span data-dcnode-id="2375" instrument_node="">
</span><p class="year" data-dcnode-id="2370"><span data-dcnode-id="2374" instrument_node="">
</span><span data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">2016</span></span><span data-dcnode-id="2371" instrument_node="">
</span></p><p data-dcnode-id="2367"><strong data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">11. Suppose you are an officer in charge of implementing a social service scheme to provide support to old and destitute women. An old and illiterate woman comes to you to avail the benefits of the scheme. However, she has no documents to show that she fulfils the eligibility criteria. But after meeting her and listening to her you feel that she certainly needs support. Your enquiries also show that she is really destitute and living in a pitiable condition. You are in a dilemma as to what to do. Putting her under the scheme without necessary documents would clearly be violation of rules. But denying her the support would be cruel and inhuman. (2016)</span></strong></p><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2363"><strong data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">(a) Can you think of a rational way to resolve this dilemma?</span></strong></p><span data-dcnode-id="2362" instrument_node="">
</span><p data-dcnode-id="2359"><strong data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">(b) Give your reasons for it.</span></strong></p><span data-dcnode-id="2358" instrument_node=""> </span><p data-dcnode-id="2357"></p><span data-dcnode-id="2356" instrument_node="">
</span><button class="btn" data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">Show Answer</span></button><span data-dcnode-id="2353" instrument_node="">
</span><div class="desc" data-dcnode-id="2327"><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2351"></p><p data-dcnode-id="2347"><strong data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">(a)</span></strong><span data-dcnode-id="2348" instrument_node=""> In the given case, according to enquiry done by office in charge the old women is realy a destitute women and deserves the benefits under social service scheme. So not providing the benefits just because of lack of documents would defeat the noble purpose of this social service scheme itself. Though it may be legally right but morally and ethically it would be wrong. To resolve this dilemma following actions can be taken following rules of law.</span></p><span data-dcnode-id="2346" instrument_node="">
</span><ul data-dcnode-id="2335" style="list-style-type: square;"><span data-dcnode-id="2345" instrument_node="">
</span><li data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">The women is old and illiterate, so just giving directions to complete the documents would not help her. I would ask a subordinate officer to help that women in completing necessary documents, and providing benefits to her.</span></li><span data-dcnode-id="2342" instrument_node="">
</span><li data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Though there may be some delays in completing the document so in this specific condition, I would write to my senior officer and ask permission for some discretionary powers so that I can provide immediate relief to old women.</span></li><span data-dcnode-id="2339" instrument_node="">
</span><li data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">This is the specific case that came into my knowledge but there may be lots of similar cases. To resolve these types of cases, I would inform to the senior authorities and ask them to appoint a special officer that would look only the problem related with old and illiterate person who are not able to complete their documents. A special desk in the office can be assigned to these types of cases.</span></li><span data-dcnode-id="2336" instrument_node="">
</span></ul><span data-dcnode-id="2334" instrument_node="">
</span><p data-dcnode-id="2330"><strong data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">(b)</span></strong><span data-dcnode-id="2331" instrument_node=""> My action would provide the benefit of scheme to old women and would not keep her out of the ambit of benefits just because she is not capable of completing her documents. This action would be compliant to rule of law and would also be humane in nature. My action to inform the seniors to resolve these types of cases would solve the problems for future also. It would reduce the hurdles such as red tapism, bureaucratic inertia in getting benefits of such social security schemes. Rule of Law with inclusion of humanity aspect would be taken care of by this action.</span></p><p data-dcnode-id="2329"></p><span data-dcnode-id="2328" instrument_node="">
</span></div><span data-dcnode-id="2326" instrument_node="">
</span></li><span data-dcnode-id="2324" instrument_node="">
</span><li data-dcnode-id="2248"><span data-dcnode-id="2323" instrument_node="">
</span><p class="year" data-dcnode-id="2318"><span data-dcnode-id="2322" instrument_node="">
</span><span data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">2016</span></span><span data-dcnode-id="2319" instrument_node="">
</span></p><p data-dcnode-id="2315"><strong data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">12. You are a young, aspiring and sincere employee in a Government office working as an assistant to the director of your department. Since you have joined recently, you need to learn and progress. Luckily your superior is very kind and ready to train you for your job. He is a very intelligent and well-informed person having knowledge of various departments. In short, you respect your boss and are looking forward to lean a lot from him.</span></strong></p><span data-dcnode-id="2314" instrument_node="">
</span><p data-dcnode-id="2311"><strong data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Since you have good tuning with the boss, he started depending on you. One day due to ill health he invited you at his place for finishing some urgent work.</span></strong></p><span data-dcnode-id="2310" instrument_node="">
</span><p data-dcnode-id="2307"><strong data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">You reached his house and before you could ring the bell you heard shouting noises. You waited for a while. After entering the house the boss greeted you and explained the work. But you were constantly disturbed by the crying of a woman. At last, you inquired with the boss but his answer did not satisfy you.</span></strong></p><span data-dcnode-id="2306" instrument_node="">
</span><p data-dcnode-id="2303"><strong data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Next day, you were compelled to inquire further in the office and found out that his behavior is very bad at home with his wife. He also beats up his wife. His wife is not well educated and is a simple woman in comparison to her husband. you see that though your boss is a nice person in the office, he is engaged in domestic violence at home.</span></strong></p><span data-dcnode-id="2302" instrument_node="">
</span><p data-dcnode-id="2299"><strong data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">In such a situation, you are left with the following options. Analyse each option with its consequences. (2016)</span></strong></p><span data-dcnode-id="2298" instrument_node="">
</span><p data-dcnode-id="2295"><strong data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">(a) Just ignore thinking about it because it is their personal matter.</span></strong></p><span data-dcnode-id="2294" instrument_node="">
</span><p data-dcnode-id="2291"><strong data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">(b) Repost the case to the appropriate authority.</span></strong></p><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2287"><strong data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">(c) Your own innovative approach towards situation.</span></strong></p><span data-dcnode-id="2286" instrument_node=""> </span><p data-dcnode-id="2285"></p><span data-dcnode-id="2284" instrument_node="">
</span><button class="btn" data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Show Answer</span></button><span data-dcnode-id="2281" instrument_node="">
</span><div class="desc" data-dcnode-id="2250"><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2279"></p><p data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">The above situation represents a case of domestic violence by an upstanding government officer against his wife. As an assistant to the officer, the options available to me are:</span></p><span data-dcnode-id="2276" instrument_node="">
</span><p data-dcnode-id="2272"><strong data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">(a) Just ignore the situation since it is a personal matter:</span></strong><span data-dcnode-id="2273" instrument_node=""> By doing so the situation remains the same and domestic violence against the wife would continue. Being aware of this fact, I should not turn a blind eye and take measures to rectify the situation. Doing nothing would not be ethically and morally right. Further, as a government officer knowing that a law is being violated and not taking any steps to prevent it would also be legally wrong.</span></p><span data-dcnode-id="2271" instrument_node="">
</span><p data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">At the same time, by not informing on my boss, I would be ensuring my job security since he is I already have a good tuning with him.</span></p><span data-dcnode-id="2268" instrument_node="">
</span><p data-dcnode-id="2264"><strong data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">(b) Report the case to the appropriate authority:</span></strong><span data-dcnode-id="2265" instrument_node=""> If I do so, my boss may come to know about my involvement and as his junior, he could make things difficult for me at work.</span></p><span data-dcnode-id="2263" instrument_node="">
</span><p data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">On the other hand, by informing the authorities about the situation, I would be ensuring that the suffering of the wife is ended and my boss is made accountable for his actions. This is legally, morally and ethically the right course of action.</span></p><span data-dcnode-id="2260" instrument_node="">
</span><p data-dcnode-id="2256"><strong data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">(c) Approaching the wife and making her aware of her rights under Protection of Women from Domestic Violence Act, 2005:</span></strong><span data-dcnode-id="2257" instrument_node=""> Since the wife is uneducated, she may not be aware of her legal rights and therefore, informing here is important so that she can herself file a case against her husband. In the second option stated above, I would be filing the complaint as a third person which can weaken the case. Also, being ignorant about her rights, if the boss threatens her, she may get cowered and not speak the truth. Hence, apprising her of her rights is necessary so that she can state her case without fear to the authorities.</span></p><span data-dcnode-id="2255" instrument_node="">
</span><p data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">At the same time I would also engage with my senior to help change his mindset by explaining to him the implications of his actions and also getting him in touch with his relatives and friends to persuade him to see the wrongness of his behavior so that he is dissuaded from doing something similar in future.</span></p><p data-dcnode-id="2252"></p><span data-dcnode-id="2251" instrument_node="">
</span></div><span data-dcnode-id="2249" instrument_node="">
</span></li><span data-dcnode-id="2247" instrument_node="">
</span><li data-dcnode-id="2111"><span data-dcnode-id="2246" instrument_node="">
</span><p class="year" data-dcnode-id="2241"><span data-dcnode-id="2245" instrument_node="">
</span><span data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">2017</span></span><span data-dcnode-id="2242" instrument_node="">
</span></p><p data-dcnode-id="2223"><strong data-dcnode-id="2238"><span data-dcnode-id="2240" instrument_node="">9. You are an honest and responsible civil servant. You often observe the following:</span><br data-dcnode-id="2239"></strong><strong data-dcnode-id="2235"><span data-dcnode-id="2237" instrument_node="">(a) There is a general perception that adhering to ethical conduct one may face difficulties to oneself and cause problems for the family, whereas unfair practices may help to reach the career goals.</span><br data-dcnode-id="2236"></strong><strong data-dcnode-id="2232"><span data-dcnode-id="2234" instrument_node="">(b) When the number of people adopting unfair means is large, a small minority having a penchant towards ethical means makes no difference. </span><br data-dcnode-id="2233"></strong><strong data-dcnode-id="2229"><span data-dcnode-id="2231" instrument_node="">(c) Sticking to ethical means is detrimental to the larger developmental goals</span><br data-dcnode-id="2230"></strong><strong data-dcnode-id="2226"><span data-dcnode-id="2228" instrument_node="">(d) While one may not involve oneself in large unethical practices, but giving and accepting small gifts makes the system more efficient.</span><br data-dcnode-id="2227"></strong><strong data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Examine the above statements with their merits and demerits. (2017)</span></strong></p><span data-dcnode-id="2222" instrument_node=""> </span><p data-dcnode-id="2221"></p><span data-dcnode-id="2220" instrument_node="">
</span><button class="btn" data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">Show Answer</span></button><span data-dcnode-id="2217" instrument_node="">
</span><div class="desc" data-dcnode-id="2113"><span data-dcnode-id="2216" instrument_node="">
</span><p data-dcnode-id="2215"></p><p data-dcnode-id="2211"><strong data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">(a) Demerit</span></strong><span data-dcnode-id="2212" instrument_node=""> Strict adherence to ethical conduct may cause problems in carrying out certain aims both in public and private life causing disaffection arising out of inability to reach goals. Being upright also pits the person against powerful vested interest, endangering his and his family’s life, which may not be worth the cost of ethical principles.</span></p><span data-dcnode-id="2210" instrument_node="">
</span><p data-dcnode-id="2185"><strong data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Merit:</span></strong><span data-dcnode-id="2207" instrument_node=""> Even though adherence to ethical conduct may produce disaffection from </span><g class="gr_ gr_42 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="2205" data-gr-id="42" id="42"><span data-dcnode-id="2206" instrument_node="">inability</span></g><span data-dcnode-id="2204" instrument_node=""> to reach certain </span><g class="gr_ gr_36 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling ins-del multiReplace" data-dcnode-id="2202" data-gr-id="36" id="36"><span data-dcnode-id="2203" instrument_node="">short term</span></g><span data-dcnode-id="2201" instrument_node=""> career goals, but </span><g class="gr_ gr_43 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins replaceWithoutSep" data-dcnode-id="2199" data-gr-id="43" id="43"><span data-dcnode-id="2200" instrument_node="">mere</span></g><span data-dcnode-id="2198" instrument_node=""> attainment of materialistic goals cannot be </span><g class="gr_ gr_44 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="2196" data-gr-id="44" id="44"><span data-dcnode-id="2197" instrument_node="">essence</span></g><span data-dcnode-id="2195" instrument_node=""> of life. Achieving goals by unfair means would prick our conscience and erode </span><g class="gr_ gr_45 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins replaceWithoutSep" data-dcnode-id="2193" data-gr-id="45" id="45"><span data-dcnode-id="2194" instrument_node="">strength</span></g><span data-dcnode-id="2192" instrument_node=""> of character. The security of life and family members can also be assured for a person of upr</span><g class="gr_ gr_50 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="2190" data-gr-id="50" id="50"><span data-dcnode-id="2191" instrument_node="">ight </span></g><span data-dcnode-id="2189" instrument_node="">character by </span><g class="gr_ gr_51 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="2187" data-gr-id="51" id="51"><span data-dcnode-id="2188" instrument_node="">preventi</span></g><span data-dcnode-id="2186" instrument_node="">ng him from being implicated on charges of wrongdoing.</span></p><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2176"><span data-dcnode-id="2183" instrument_node="">In the long run ethical conduct always helps in achieving life’s larger goals, such as mental peace, </span><g class="gr_ gr_93 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="2181" data-gr-id="93" id="93"><span data-dcnode-id="2182" instrument_node="">clear</span></g><span data-dcnode-id="2180" instrument_node=""> conscience, </span><g class="gr_ gr_94 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="2178" data-gr-id="94" id="94"><span data-dcnode-id="2179" instrument_node="">strength</span></g><span data-dcnode-id="2177" instrument_node=""> of character and brings harmony and balance in life.</span></p><span data-dcnode-id="2175" instrument_node="">
</span><p data-dcnode-id="2165"><strong data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">(b) Demerit:</span></strong><span data-dcnode-id="2172" instrument_node=""> When a large number of people are corrupt, a few good men can’t help salvage the situation as their voices drown in the majority. Moreover, in such a scenario upright men are deemed as obstruction by others in achieving their selfish aims through unfair means. This brings the upright men in </span><g class="gr_ gr_52 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="2170" data-gr-id="52" id="52"><span data-dcnode-id="2171" instrument_node="">direct</span></g><span data-dcnode-id="2169" instrument_node=""> confrontation with such corrupt forces, sometimes endangering their values, life </span><g class="gr_ gr_53 gr-alert gr_gramm gr_inline_cards gr_run_anim Punctuation only-ins replaceWithoutSep" data-dcnode-id="2167" data-gr-id="53" id="53"><span data-dcnode-id="2168" instrument_node="">and</span></g><span data-dcnode-id="2166" instrument_node=""> career. For example, civil servant Satyendra Dubey was killed while standing against the corrupt forces.</span></p><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2154"><strong data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Merit:</span></strong><span data-dcnode-id="2161" instrument_node=""> Even though there might be instances of </span><g class="gr_ gr_88 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins replaceWithoutSep" data-dcnode-id="2159" data-gr-id="88" id="88"><span data-dcnode-id="2160" instrument_node="">large</span></g><span data-dcnode-id="2158" instrument_node=""> number of corrupt prevailing over few honest individuals, it’s these few upright men that sustain the faith of people in humanity and society. They act as </span><g class="gr_ gr_86 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="2156" data-gr-id="86" id="86"><span data-dcnode-id="2157" instrument_node="">check</span></g><span data-dcnode-id="2155" instrument_node=""> against larger wrongdoings, constraining their power and also exposing and uprooting them. They act as role model for larger society to adhere to what is right. For example, Anna Hazare stood up as a crusader against corruption; T.N. Seshan, the chief election commissioner, countermanded elections in Bihar, U.P. citing mass rigging.</span></p><span data-dcnode-id="2153" instrument_node="">
</span><p data-dcnode-id="2146"><strong data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">(c) Demerit:</span></strong><span data-dcnode-id="2150" instrument_node=""> Ethical means may at times not merge with the larger developmental ends. In trying to adhere to correct means, if one misses the goals then means lose their significance, no matter how ethical they were. For example, Robinhood morals may achieve </span><g class="gr_ gr_87 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins replaceWithoutSep" data-dcnode-id="2148" data-gr-id="87" id="87"><span data-dcnode-id="2149" instrument_node="">larger</span></g><span data-dcnode-id="2147" instrument_node=""> goal of saving the poor, even if by questionable means of looting the rich, than sticking to moral means and letting the poor die of hunger.&nbsp;</span></p><span data-dcnode-id="2145" instrument_node="">
</span><p data-dcnode-id="2132"><strong data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Merit:</span></strong><span data-dcnode-id="2142" instrument_node=""> To preserve the ethical and moral values it is important that both means and ends are right. Trying to achieve a noble goal with unethical means impinges upon the ethical fabric of individual and society at large, prompting a person for further compromises in the future. For example; Gandhiji </span><g class="gr_ gr_64 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling multiReplace" data-dcnode-id="2140" data-gr-id="64" id="64"><span data-dcnode-id="2141" instrument_node="">emphasised</span></g><span data-dcnode-id="2139" instrument_node=""> upon the means to be ethical through </span><g class="gr_ gr_61 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="2137" data-gr-id="61" id="61"><span data-dcnode-id="2138" instrument_node="">way</span></g><span data-dcnode-id="2136" instrument_node=""> of Ahimsa as much as he </span><g class="gr_ gr_65 gr-alert gr_spell gr_inline_cards gr_run_anim ContextualSpelling multiReplace" data-dcnode-id="2134" data-gr-id="65" id="65"><span data-dcnode-id="2135" instrument_node="">emphasised</span></g><span data-dcnode-id="2133" instrument_node=""> on the result, the independence.</span></p><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2121"><strong data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">(d) Demerit:</span></strong><span data-dcnode-id="2128" instrument_node=""> Exchange of small gifts is sometimes seen as essential to </span><g class="gr_ gr_63 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar multiReplace" data-dcnode-id="2126" data-gr-id="63" id="63"><span data-dcnode-id="2127" instrument_node="">maintain</span></g><span data-dcnode-id="2125" instrument_node=""> formal relations, as a symbol of gratitude for the services rendered. Not accepting gifts may be perceived to be rude, morally arrogant and at times may isolate the person from the larger circle of this give and take </span><g class="gr_ gr_62 gr-alert gr_gramm gr_inline_cards gr_run_anim Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="2123" data-gr-id="62" id="62"><span data-dcnode-id="2124" instrument_node="">culture</span></g><span data-dcnode-id="2122" instrument_node="">.</span></p><span data-dcnode-id="2120" instrument_node="">
</span><p data-dcnode-id="2116"><strong data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Merit:</span></strong><span data-dcnode-id="2117" instrument_node=""> Sometimes corruption is not carried out explicitly but is masked in form of these small exchanges, rendering bigger scandals possible. Hence, it is essential to nip this menace in the bud. Not accepting any form of gifts indicates a strong moral and ethical character preserving the trust of people in person in the long run.</span></p><p data-dcnode-id="2115"></p><span data-dcnode-id="2114" instrument_node="">
</span></div><span data-dcnode-id="2112" instrument_node="">
</span></li><span data-dcnode-id="2110" instrument_node="">
</span><li data-dcnode-id="2043"><span data-dcnode-id="2109" instrument_node="">
</span><p class="year" data-dcnode-id="2104"><span data-dcnode-id="2108" instrument_node="">
</span><span data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">2016</span></span><span data-dcnode-id="2105" instrument_node="">
</span></p><p data-dcnode-id="2101"><strong data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">13. ABC Ltd. is a large transnational company having diversified business activities with a huge shareholder base. The company is continuously expanding and generating employment. The company, in its expansion and diversification programme, decides to establish a new plant at Vikaspuri, an area which is underdeveloped. The new plant is designed to use energy efficient technology that will help the company to save production cost by 20%. The company’s decision goes well with the Government policy of attracting investment to develop such underdeveloped regions. The government has also announced tax holiday for five years for the companies that invest in underdeveloped areas. However, the new plant may bring chaos for the inhabitants of Vikaspuri region, which is otherwise tranquil. The new plant may result in increased cost of living, aliens migrating to the region, disturbing the social and economic order. The company sensing the possible protest tried to educate the people of Vikaspuri region and public in general that how its Corporate Social Responsibility (CSR) policy would help overcome the likely difficulties of the residents of Vikaspuri region. In spite of this the protests begin and some of the residents decided to approach the judiciary as their plea before the Government did not yield any result. (2016)</span></strong></p><span data-dcnode-id="2100" instrument_node="">
</span><p data-dcnode-id="2097"><strong data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">(a) Identify the issues involved in the case.</span></strong></p><span data-dcnode-id="2096" instrument_node="">
</span><p data-dcnode-id="2093"><strong data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">(b) What can be suggested to satisfy the company’s goal and to address the residents’ concern?</span></strong></p><span data-dcnode-id="2092" instrument_node=""> </span><p data-dcnode-id="2091"></p><span data-dcnode-id="2090" instrument_node="">
</span><button class="btn" data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">Show Answer</span></button><span data-dcnode-id="2087" instrument_node="">
</span><div class="desc" data-dcnode-id="2045"><span data-dcnode-id="2086" instrument_node="">
</span><p data-dcnode-id="2085"></p><p data-dcnode-id="2081"><strong data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">(a)</span></strong><span data-dcnode-id="2082" instrument_node=""> Ways to satisfy company’s goals to address resident’s concern:</span></p><span data-dcnode-id="2080" instrument_node="">
</span><ul data-dcnode-id="2069" style="list-style-type: square;"><span data-dcnode-id="2079" instrument_node="">
</span><li data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Environment impact assessment should be conducted in the first place with a non partisan approach.</span></li><span data-dcnode-id="2076" instrument_node="">
</span><li data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Government and Company must work in tandem to ensure that the problems of the residents are taken care of through the CSR programs. However, CSR programs alone will not be able to do much, so correct initiatives must be taken by the government too.</span></li><span data-dcnode-id="2073" instrument_node="">
</span><li data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Legislative Representative of the area should accompany the company officials when information camps about the project are set up to develop a sense of belief amongst the residents. If the residents are convinced that the intentions are as genuine as the talks they will not be bothered with the project.</span></li><span data-dcnode-id="2070" instrument_node="">
</span></ul><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2065"><strong data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Issues involved in this case</span></strong></p><span data-dcnode-id="2064" instrument_node="">
</span><ul data-dcnode-id="2053" style="list-style-type: square;"><span data-dcnode-id="2063" instrument_node="">
</span><li data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Due to limited livelihood options increased cost of living for the people most of which might belong to lower middle class strata or below will become a major problem to handle.</span></li><span data-dcnode-id="2060" instrument_node="">
</span><li data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Since the area is already underdeveloped resources like land, water, public services like health, education, a planned sewer management system will be inadequate. An under planned area with sudden migration of people will not be able to cater to the basic needs like health, resident or education for the people which is known to have long term effects.</span></li><span data-dcnode-id="2057" instrument_node="">
</span><li data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Though the company claims to tackle all the difficulties through CSR, construction of basic infrastructure can take a lot of time which may further add to the chaos.</span></li><span data-dcnode-id="2054" instrument_node="">
</span></ul><span data-dcnode-id="2052" instrument_node="">
</span><p data-dcnode-id="2048"><strong data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">(b)</span></strong><span data-dcnode-id="2049" instrument_node=""> Blockade always arises due to lack of faith and doubt on the intentions of the company which is always, seen as profit making. To negate this company should adhere to its promises which in turn will be benevolent for both the parties. Such cases bring in the question of right of life versus development of community. For example lands were acquired by the Andhra government for developing the capital city of Amravati and they were promised that 20% of their land will be returned after being developed. Such initiative instill confidence in people and they would eventually not oppose such development.</span></p><p data-dcnode-id="2047"></p><span data-dcnode-id="2046" instrument_node="">
</span></div><span data-dcnode-id="2044" instrument_node="">
</span></li><span data-dcnode-id="2042" instrument_node="">
</span><li data-dcnode-id="1943"><span data-dcnode-id="2041" instrument_node="">
</span><p class="year" data-dcnode-id="2036"><span data-dcnode-id="2040" instrument_node="">
</span><span data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">2017</span></span><span data-dcnode-id="2037" instrument_node="">
</span></p><p data-dcnode-id="2030"><strong data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">10. You are aspiring to become an IAS officer and you have cleared various stages and now you have been selected for the personal interview. On the day of the interview, on the way to the venue you saw an accident where a mother and child who happen to be your relatives were badly injured. They needed immediate help.</span></strong><br data-dcnode-id="2033"><strong data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">What would you have done in such a situation? Justify your action. (2017)</span></strong></p><span data-dcnode-id="2029" instrument_node=""> </span><p data-dcnode-id="2028"></p><span data-dcnode-id="2027" instrument_node="">
</span><button class="btn" data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Show Answer</span></button><span data-dcnode-id="2024" instrument_node="">
</span><div class="desc" data-dcnode-id="1945"><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2022"></p><p data-dcnode-id="2018"><span data-dcnode-id="2019" lang="EN-GB"><span data-dcnode-id="2021" instrument_node="">In the above case:</span><o:p data-dcnode-id="2020"></o:p></span></p><span data-dcnode-id="2017" instrument_node="">
</span><p data-dcnode-id="2010"><strong data-dcnode-id="2014"><span data-dcnode-id="2015" lang="EN-GB"><span data-dcnode-id="2016" instrument_node="">Stakeholders involved:</span></span></strong><span data-dcnode-id="2011" lang="EN-GB"><span data-dcnode-id="2013" instrument_node=""> The mother and child, me, society at large.</span><o:p data-dcnode-id="2012"></o:p></span></p><span data-dcnode-id="2009" instrument_node="">
</span><p data-dcnode-id="2002"><strong data-dcnode-id="2006"><span data-dcnode-id="2007" lang="EN-GB"><span data-dcnode-id="2008" instrument_node="">Ethical dilemmas: </span></span></strong><span data-dcnode-id="2003" lang="EN-GB"><span data-dcnode-id="2005" instrument_node="">personal cost ethical dilemma v/s civic duty</span><o:p data-dcnode-id="2004"></o:p></span></p><span data-dcnode-id="2001" instrument_node="">
</span><p data-dcnode-id="1994"><strong data-dcnode-id="1998"><span data-dcnode-id="1999" lang="EN-GB"><span data-dcnode-id="2000" instrument_node="">Values at play:</span></span></strong><span data-dcnode-id="1995" lang="EN-GB"><span data-dcnode-id="1997" instrument_node=""> compassion, civic and moral duty.</span><o:p data-dcnode-id="1996"></o:p></span></p><span data-dcnode-id="1993" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1989" lang="EN-GB"><strong data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Course of action:</span></strong><span data-dcnode-id="1990" instrument_node=""> </span></span><span data-dcnode-id="1986" lang="EN-GB"><span data-dcnode-id="1988" instrument_node="">In the following situation I will take following steps:-</span><o:p data-dcnode-id="1987"></o:p></span></p><span data-dcnode-id="1984" instrument_node="">
</span><p data-dcnode-id="1979"><span data-dcnode-id="1982" lang="EN-US"><span data-dcnode-id="1983" instrument_node="">First, I will try taking help of the bystanders there and persuade them to get to the nearest hospital for immediate help to accident victims and persuade them to do so on humanitarian, civic and legal grounds (Good Samaritan Law) and assure them of no harassment at the hands of medical and legal authorities (due to which they might hesitate from helping) under Good Samaritan Law also.</span></span><span data-dcnode-id="1980" lang="EN-US"><o:p data-dcnode-id="1981"></o:p></span></p><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1962"><span data-dcnode-id="1963" lang="EN-US"><span data-dcnode-id="1977" instrument_node="">I would also call </span><g class="gr_ gr_19 gr-alert gr_gramm gr_inline_cards gr_disable_anim_appear Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="1975" data-gr-id="19" id="19"><span data-dcnode-id="1976" instrument_node="">ambulance</span></g><span data-dcnode-id="1974" instrument_node=""> for medical help and police for further investigation and apprise them of the situation at the </span><g class="gr_ gr_21 gr-alert gr_gramm gr_inline_cards gr_disable_anim_appear Punctuation only-del replaceWithoutSep" data-dcnode-id="1972" data-gr-id="21" id="21"><span data-dcnode-id="1973" instrument_node="">earliest,</span></g><span data-dcnode-id="1971" instrument_node=""> so that I am relieved </span><g class="gr_ gr_22 gr-alert gr_spell gr_inline_cards gr_disable_anim_appear ContextualSpelling multiReplace" data-dcnode-id="1969" data-gr-id="22" id="22"><span data-dcnode-id="1970" instrument_node="">off</span></g><span data-dcnode-id="1968" instrument_node=""> the safety of the victim and can peacefully go for </span><g class="gr_ gr_20 gr-alert gr_gramm gr_inline_cards gr_disable_anim_appear Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="1966" data-gr-id="20" id="20"><span data-dcnode-id="1967" instrument_node="">interview</span></g><span data-dcnode-id="1965" instrument_node="">.</span><o:p data-dcnode-id="1964"></o:p></span></p><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1953" lang="EN-US"><g class="gr_ gr_31 gr-alert gr_gramm gr_inline_cards gr_disable_anim_appear Punctuation only-ins replaceWithoutSep" data-dcnode-id="1959" data-gr-id="31" id="31"><span data-dcnode-id="1960" instrument_node="">Meanwhile</span></g><span data-dcnode-id="1958" instrument_node=""> I would also try calling up my relatives or friends to rush to the hospital and take over the responsibility so that I can reach for </span><g class="gr_ gr_30 gr-alert gr_gramm gr_inline_cards gr_disable_anim_appear Grammar only-ins doubleReplace replaceWithoutSep" data-dcnode-id="1956" data-gr-id="30" id="30"><span data-dcnode-id="1957" instrument_node="">interview</span></g><span data-dcnode-id="1955" instrument_node=""> on time. I will also try informing the concerned authorities at UPSC for the delay and will explain my situation.</span><o:p data-dcnode-id="1954"></o:p></span></p><span data-dcnode-id="1951" instrument_node="">
</span><p class="bullet" data-dcnode-id="1948" style="margin-top: 1.4pt; line-height: 142%;"><span data-dcnode-id="1949" lang="EN-US"><span data-dcnode-id="1950" instrument_node="">The above actions, on one hand, will ensure timely medical attention for the accident victims, and will also help me take care of the interview, without compromising my responsibilities either as a citizen, relative or as an aspirant.</span></span></p><p data-dcnode-id="1947"></p><span data-dcnode-id="1946" instrument_node="">
</span></div><span data-dcnode-id="1944" instrument_node="">
</span></li><span data-dcnode-id="1942" instrument_node="">
</span><li data-dcnode-id="1851"><span data-dcnode-id="1941" instrument_node="">
</span><p class="year" data-dcnode-id="1936"><span data-dcnode-id="1940" instrument_node="">
</span><span data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">2019</span></span><span data-dcnode-id="1937" instrument_node="">
</span></p><p data-dcnode-id="1930"><strong data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">7. You are heading the rescue operations in an area affected by severe natural calamity. Thousands of people are rendered homeless and deprived of food, drinking water and other basic amenities. Rescue work has been disrupted by heavy rainfall and damage to supply routes. The local people are seething with anger against the delayed limited rescue operations. When your team reaches the affected area, the people there heckle and even assault some of the team members. One of pa-Ur team members is even severely injured. Faced with this crisis, some team members plead with you to call off the operations fearing</span></strong><br data-dcnode-id="1933"><strong data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">threats to their life.</span></strong></p><span data-dcnode-id="1929" instrument_node="">
</span><p data-dcnode-id="1926"><strong data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">In such trying circumstances, what will be your response? Examine the qualities of a public servant which will be required to manage the situation.</span></strong></p><span data-dcnode-id="1925" instrument_node=""> </span><p data-dcnode-id="1924"></p><span data-dcnode-id="1923" instrument_node="">
</span><button class="btn" data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Show Answer</span></button><span data-dcnode-id="1920" instrument_node="">
</span><div class="desc" data-dcnode-id="1853"><span data-dcnode-id="1919" instrument_node="">
</span><p data-dcnode-id="1918"></p><p data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">My response in such a fervent atmosphere should be thoughtful, cogent and humane because there are various dilemmas involved. Leaving thousands unattended, when they are completely dependent on government help, would be an act of timidity and self preservation which is unbecoming of a public servant.</span></p><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1908"><strong data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Morale upliftment:</span></strong><span data-dcnode-id="1912" instrument_node=""> The primary response for me, as the head of the rescue mission, is to reorient the focus of the group towards our real objectives. Since some of them are requesting to call off the mission I need to exhort them, with examples like – </span><strong data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">During the 2014 Floods in Kashmir,&nbsp;</span></strong><span data-dcnode-id="1909" instrument_node="">when the NDRF team started rescue mission, they were pelted with stones,their boats were snached and one of them was stabbed but they did not yield and went on to rescue more than 50000 people.</span></p><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1899"><span data-dcnode-id="1906" instrument_node="">Initially, when </span><strong data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Mahatma Gandhi was marching barefoot in riot hit areas of Noakhali,</span></strong><span data-dcnode-id="1903" instrument_node=""> his path was strewn with </span><strong data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">pieces of glass and animal excreta</span></strong><span data-dcnode-id="1900" instrument_node=""> by the riot-affected people. Later, His unflinching courage and love for humanity created a miracle, when people themselves promised not to retaliate.</span></p><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Here, the anger of people is misplaced due to the popular perception of government servants. Once, people witness self-abnegation, dedication and courage in the rescue work they will start cooperating.</span></p><span data-dcnode-id="1895" instrument_node="">
</span><p data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Secondly, I would try to persuade people by taking help from those who are willing to cooperate, in such an exercise local leaders can also help.</span></p><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Apart from this, I will try to get cooperation from the government with respect to protection of my team members so that they may not be hurt in helping the people.</span></p><span data-dcnode-id="1889" instrument_node="">
</span><h3 data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Qualities required to effectively manage such situation</span></h3><span data-dcnode-id="1886" instrument_node="">
</span><ul data-dcnode-id="1859" style="list-style-type: square;"><span data-dcnode-id="1885" instrument_node="">
</span><li data-dcnode-id="1881"><strong data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Spirit of service:&nbsp;</span></strong><span data-dcnode-id="1882" instrument_node="">Since the rescue team is vulnerable to physical and verbal attacks,only some higher cause can help an officer in composed and coordinated rescue work.</span></li><span data-dcnode-id="1880" instrument_node="">
</span><li data-dcnode-id="1876"><strong data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Leadership:&nbsp;</span></strong><span data-dcnode-id="1877" instrument_node="">In such circumstances,finality of any decision lies completely on the wisdom of the leader.He/She also needs to lead the team from the front; displaying personal courage and conviction.</span></li><span data-dcnode-id="1875" instrument_node="">
</span><li data-dcnode-id="1871"><strong data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">Empathy and Emotional Intelligence:&nbsp;</span></strong><span data-dcnode-id="1872" instrument_node="">An officer needs to have empathy and emotional intelligence for understanding the behavior of disgruntled local people otherwise one may abort the relief mission or resort to use of force-which will only heighten their anger.</span></li><span data-dcnode-id="1870" instrument_node="">
</span><li data-dcnode-id="1866"><strong data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Power of persuasion:</span></strong><span data-dcnode-id="1867" instrument_node=""> People seething with anger are reactive and short-sighted, making them agree for something requires the power of persuasion.</span></li><span data-dcnode-id="1865" instrument_node="">
</span><li data-dcnode-id="1861"><strong data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Patience and Presence of mind:</span></strong><span data-dcnode-id="1862" instrument_node=""> A Public Servant can not afford to make spontaneous decisions in such situations. Any further course of action should be guided by considerate assessment and swift thinking.</span></li><span data-dcnode-id="1860" instrument_node="">
</span></ul><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Thus, we need to have a sensitivity of the situation and not blame people for their reactions. Empathy and support is the key to rescue people in problems.</span></p><p data-dcnode-id="1855"></p><span data-dcnode-id="1854" instrument_node="">
</span></div><span data-dcnode-id="1852" instrument_node="">
</span></li><span data-dcnode-id="1850" instrument_node="">
</span><li data-dcnode-id="1791"><span data-dcnode-id="1849" instrument_node="">
</span><p class="year" data-dcnode-id="1844"><span data-dcnode-id="1848" instrument_node="">
</span><span data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">2016</span></span><span data-dcnode-id="1845" instrument_node="">
</span></p><p data-dcnode-id="1841"><strong data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">14. Saraswati was a successful IT professional in USA. Moved by patriotic sense of doing something for the country she returned to India. Together with some other like-minded friends, she formed an NGO to build a school for a poor rural community.The objective of the school was to provide the best quality modern education at a nominal cost. She soon discovered that she has to seek permission from a number of Government agencies. The rules and procedures were quite confusing and cumbersome. What frustrated her most were delays, callous attitude of officials and constant demand for bribes. Her experience and the experience of many others like her have deterred people from taking up social service projects.</span></strong></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1837"><strong data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">A measure of Government control over voluntary social work is necessary. But it should not be exercised in a coercive and corrupt manner. What measures can you suggest to ensure that due control is exercised but well meaning, honest NGO efforts are not thwarted? (2016)</span></strong></p><span data-dcnode-id="1836" instrument_node=""> </span><p data-dcnode-id="1835"></p><span data-dcnode-id="1834" instrument_node="">
</span><button class="btn" data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Show Answer</span></button><span data-dcnode-id="1831" instrument_node="">
</span><div class="desc" data-dcnode-id="1793"><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1829"></p><p data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">First of all developmental process like these aimed at imparting knowledge to rural poor community which will eventually help them in achieving a better standard of living should be encouraged.</span></p><span data-dcnode-id="1826" instrument_node="">
</span><p data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Saraswati and her friends were all determined to bring about a positive change through the medium of NGO. They should be facilitated with all possible support in a stipulated time to ensure that their passion is not thwarted.</span></p><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">Posing unnecessary hindrances by creating excessive bureaucratic clearances to block the slightest likelihood of wrong doing is recurring news in case of NGO with malicious intentions these days. However, they should not create roadblocks for those with genuine intentions.</span></p><span data-dcnode-id="1820" instrument_node="">
</span><p data-dcnode-id="1817"><strong data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">Methods that can be adopted:</span></strong></p><span data-dcnode-id="1816" instrument_node="">
</span><ul data-dcnode-id="1799" style="list-style-type: square;"><span data-dcnode-id="1815" instrument_node="">
</span><li data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Laying out simple rules applying to all new entrants as well the existing ones. Reducing red tapism experienced in form of exhaustive paper work and clearances from various departments.</span></li><span data-dcnode-id="1812" instrument_node="">
</span><li data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Strict action against complaints regarding intentional blocking of entry of new NGO by a concerned authority in lieu of bribe and personal favour.</span></li><span data-dcnode-id="1809" instrument_node="">
</span><li data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Recently many NGO's have faced cancellation of their registration under the Foreign Contribution Regulation Act, 2010. These cancellations have been widely criticized. The government has been charged with stalling ground level work which is carried by NGOs. In order to avert such situation transparent system for both grant providers and receivers of such funds should be created.</span></li><span data-dcnode-id="1806" instrument_node="">
</span><li data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Regular appraisals of NGO by government officials must be conducted to verify the purpose, nature of work and practices followed by NGOs to ensure credibility of an NGO.</span></li><span data-dcnode-id="1803" instrument_node="">
</span><li data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Trust deficit created between NGOs and the government, both questioning each other's intention must be worked out as the common man suffers the most in between as visible in the case of Saraswati.</span></li><span data-dcnode-id="1800" instrument_node="">
</span></ul><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Government and its official through NGOs and their personnels must ensure that the policies/programs of the former reaches the downtrodden, rural as well as in remote areas so they both need to work in tandem to achieve development.</span></p><p data-dcnode-id="1795"></p><span data-dcnode-id="1794" instrument_node="">
</span></div><span data-dcnode-id="1792" instrument_node="">
</span></li><span data-dcnode-id="1790" instrument_node="">
</span><li data-dcnode-id="1736"><span data-dcnode-id="1789" instrument_node="">
</span><p class="year" data-dcnode-id="1784"><span data-dcnode-id="1788" instrument_node="">
</span><span data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">2017</span></span><span data-dcnode-id="1785" instrument_node="">
</span></p><p data-dcnode-id="1775"><strong data-dcnode-id="1781"><span data-dcnode-id="1783" instrument_node="">11. You are the head of the Human Resources department of an organization. One day one of the workers died on duty. His family was demanding compensation. However, the company denied compensation because it was revealed in investigation that he was drunk at the time of the accident. The workers of the company went on to strike demanding compensation for the family of the deceased. The Chairman of the management board has asked for your recommendation.</span><br data-dcnode-id="1782"></strong><strong data-dcnode-id="1778"><span data-dcnode-id="1780" instrument_node="">What recommendation would you provide to the management?</span><br data-dcnode-id="1779"></strong><strong data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Discuss the merits and demerits of each of the recommendation. (2017)</span></strong></p><span data-dcnode-id="1774" instrument_node=""> </span><p data-dcnode-id="1773"></p><span data-dcnode-id="1772" instrument_node="">
</span><button class="btn" data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Show Answer</span></button><span data-dcnode-id="1769" instrument_node="">
</span><div class="desc" data-dcnode-id="1738"><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1767"></p><p data-dcnode-id="1763"><strong data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Option 1:</span></strong><span data-dcnode-id="1764" instrument_node=""> Let the law take its own course. As the worker was drunk during duty, the company cannot be held responsible for his death.</span></p><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">This may sound right as the worker was bound to follow rules at the place of work. However, the strike by the remaining workers could affect the image and productivity of the company. No matter the outcome, the trust between workers and the management would be lost.</span></p><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1755"><strong data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Option 2:</span></strong><span data-dcnode-id="1756" instrument_node=""> Recommend the company to offer compensation.</span></p><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">But this would set a bad precedent among the management as well as the workers. To offer compensation would mean to let down the safety regulations of the company. The management may also not appreciate the payment as they were not liable for compensation due to negligence showed by the worker.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1747"><strong data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Option 3:</span></strong><span data-dcnode-id="1748" instrument_node=""> Recommend the management to offer alternative employment to the kin of the deceased. Push the management to adopt stricter prevention and safety measures.</span></p><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1741"><span data-dcnode-id="1745" instrument_node="">The third option is suitable as it would be better to bring the situation under control. The workers could be placated if the kin of the deceased would be offered a job. And also the company may prefer to not lose image and </span><g class="gr_ gr_21 gr-alert gr_spell gr_inline_cards gr_disable_anim_appear ContextualSpelling ins-del multiReplace" data-dcnode-id="1743" data-gr-id="21" id="21"><span data-dcnode-id="1744" instrument_node="">man days</span></g><span data-dcnode-id="1742" instrument_node=""> due to the strike.</span></p><p data-dcnode-id="1740"></p><span data-dcnode-id="1739" instrument_node="">
</span></div><span data-dcnode-id="1737" instrument_node="">
</span></li><span data-dcnode-id="1735" instrument_node="">
</span><li data-dcnode-id="1597"><span data-dcnode-id="1734" instrument_node="">
</span><p class="year" data-dcnode-id="1729"><span data-dcnode-id="1733" instrument_node="">
</span><span data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">2019</span></span><span data-dcnode-id="1730" instrument_node="">
</span></p><p data-dcnode-id="1726"><strong data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">8. Honesty and uprightness are the hallmarks of a civil servant. Civil servants possessing these qualities are considered as the backbone of any strong organization. In line of duty, they take various decisions, at times some become bonafide mistakes. As long as such decisions are not taken intentionally and do not benefit personally, the officer cannot be said to be guilty. Though such decisions may, at times, lead to unforeseen adverse consequences in the long-term.</span></strong></p><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1722"><strong data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">In the recent past, a few instances have surfaced wherein civil servants have been implicated for bonafide mistakes. They have often been prosecuted and even imprisoned. These instances have greatly rattled the moral fibre of the civil servants.</span></strong></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1718"><strong data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">How does this trend affect the functioning of the civil services? What measures can be taken to ensure that honest civil servants are not implicated for bonafide mistakes on their part? Justify your answer.</span></strong></p><span data-dcnode-id="1717" instrument_node=""> </span><p data-dcnode-id="1716"></p><span data-dcnode-id="1715" instrument_node="">
</span><button class="btn" data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Show Answer</span></button><span data-dcnode-id="1712" instrument_node="">
</span><div class="desc" data-dcnode-id="1599"><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1710"></p><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">The role of civil servants is to take decisions which have huge ramifications on the socio-economic growth of the country. However, instances of wrongful prosecution of honest officers deeply impact the morale of honest officers. It has multiple effects on the functioning of civil services in India:</span></p><span data-dcnode-id="1707" instrument_node="">
</span><h3 data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Affect on the functioning of the civil services</span></h3><span data-dcnode-id="1704" instrument_node="">
</span><ul data-dcnode-id="1682" style="list-style-type: square;"><span data-dcnode-id="1703" instrument_node="">
</span><li data-dcnode-id="1699"><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Impact on decision-making of officers:</span></strong><span data-dcnode-id="1700" instrument_node=""> Officers will be averse to expressing their views. This may further aggravate red-tapism due to fear of departmental action for their incorrect decisions.</span></li><span data-dcnode-id="1698" instrument_node="">
</span><li data-dcnode-id="1694"><strong data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Hampers economic growth:</span></strong><span data-dcnode-id="1695" instrument_node=""> With increasing private sector participation in public services, fear of prosecution may restrict honest officers to take progressive, bold and courageous decisions across sectors. Delay in taking key decisions will lead to poor governance.</span></li><span data-dcnode-id="1693" instrument_node="">
</span><li data-dcnode-id="1689"><strong data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Tool to harass honest officers:</span></strong><span data-dcnode-id="1690" instrument_node=""> Corrupt political leaders and bureaucrats may harass honest officers through baseless complaints and investigations.</span></li><span data-dcnode-id="1688" instrument_node="">
</span><li data-dcnode-id="1684"><strong data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Impact on reputation of honest officers:</span></strong><span data-dcnode-id="1685" instrument_node=""> Prosecution of honest officers leads to mental agony and heavy financial loss besides being defamed in the society.</span></li><span data-dcnode-id="1683" instrument_node="">
</span></ul><span data-dcnode-id="1681" instrument_node="">
</span><h3 data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Measures to ensure that honest civil servants are not implicated for bonafide mistakes</span></h3><span data-dcnode-id="1678" instrument_node="">
</span><ul data-dcnode-id="1632" style="list-style-type: square;"><span data-dcnode-id="1677" instrument_node="">
</span><li data-dcnode-id="1673"><strong data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Ensuring maximum transparency in administration:</span></strong><span data-dcnode-id="1674" instrument_node=""> The key policy making decisions should be made ensuring maximum clarity and openness about how decisions are taken. This will prevent blaming select individuals for incorrect decisions.</span></li><span data-dcnode-id="1672" instrument_node="">
</span><li data-dcnode-id="1665"><strong data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Legislative actions:</span></strong><span data-dcnode-id="1669" instrument_node=""> As recommended by the </span><strong data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Hota Committee report,</span></strong><span data-dcnode-id="1666" instrument_node=""> amendment to Section 13(1)(d) of Prevention of Corruption Act , 1988, that deals with criminal misconduct by a public servant is a welcome step. It will protect honest civil servants from malicious prosecution and harassment.</span></li><span data-dcnode-id="1664" instrument_node="">
</span><li data-dcnode-id="1660"><strong data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Reducing politicization of bureaucracy:</span></strong><span data-dcnode-id="1661" instrument_node=""> The fear of transfers, denial of promotions, or being punished post retirement may impact decision making of officers. Ensuring fixed tenure to civil servants is a much needed step for systemic reforms in civil services.</span></li><span data-dcnode-id="1659" instrument_node="">
</span><li data-dcnode-id="1634"><strong data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Role of institutions:</span></strong><span data-dcnode-id="1656" instrument_node="">
</span><ul data-dcnode-id="1636" style="list-style-type: circle;"><span data-dcnode-id="1655" instrument_node="">
</span><li data-dcnode-id="1651"><strong data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Approach of judiciary:</span></strong><span data-dcnode-id="1652" instrument_node=""> In a democracy and a rapidly growing economy, courts have to make decisions with a very constructive interpretation of laws. It must clarify the distinction between corruption and wrong administrative decisions.</span></li><span data-dcnode-id="1650" instrument_node="">
