</span><header data-dcnode-id="1202"><span data-dcnode-id="1210" instrument_node="">
</span><h1 data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Is America a Successful Democracy: A Critical Inquiry</span></h1><span class="cuAuthor" data-dcnode-id="1204"><span data-dcnode-id="1207" instrument_node="">by</span><span class="cuAuthorName" data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Meagan C. McGowan</span></span></span><span data-dcnode-id="1203" instrument_node=""> </span></header><nav data-dcnode-id="1167"><a class="pageSupportButton" data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/curriculum/viewer/initiative_08.03.08_g"><img alt="" data-dcnode-id="1201" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-guide.png&amp;raw"><label data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">To Guide Entry</span></label></a><span data-dcnode-id="1197" instrument_node=""> </span><a class="pageSupportButton" data-dcnode-id="1193" href="#comment" id="cuSendCommentButton"><img alt="" data-dcnode-id="1196" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-comment.png&amp;raw"><label data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Send / Read Comments</span></label></a><ul data-dcnode-id="1168" id="cuTOC"><li data-dcnode-id="1190"><a data-dcnode-id="1191" href="#h1num-1"><span data-dcnode-id="1192" instrument_node="">Overview</span></a></li><li data-dcnode-id="1187"><a data-dcnode-id="1188" href="#h1num-2"><span data-dcnode-id="1189" instrument_node="">Rationale</span></a></li><li data-dcnode-id="1184"><a data-dcnode-id="1185" href="#h1num-3"><span data-dcnode-id="1186" instrument_node="">Objectives</span></a></li><li data-dcnode-id="1181"><a data-dcnode-id="1182" href="#h1num-4"><span data-dcnode-id="1183" instrument_node="">Strategies</span></a></li><li data-dcnode-id="1178"><a data-dcnode-id="1179" href="#h1num-5"><span data-dcnode-id="1180" instrument_node="">Classroom Activities</span></a></li><li data-dcnode-id="1175"><a data-dcnode-id="1176" href="#h1num-6"><span data-dcnode-id="1177" instrument_node="">Resources</span></a></li><li data-dcnode-id="1172"><a data-dcnode-id="1173" href="#h1num-7"><span data-dcnode-id="1174" instrument_node="">Appendices</span></a></li><li data-dcnode-id="1169"><a data-dcnode-id="1170" href="#h1num-8"><span data-dcnode-id="1171" instrument_node="">Notes</span></a></li></ul></nav><main data-dcnode-id="186"><span data-dcnode-id="1166" instrument_node="">
</span><h1 data-dcnode-id="1164" id="h1num-1"><span data-dcnode-id="1165" instrument_node="">Overview</span></h1><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">This unit is intended to introduce students to the concept of American democracy and the United States Constitution. The original audience for the unit is high school aged United States History students. Students at this level have previously studied United States History. The hope is that this unit will approach the idea of democracy from a few unique perspectives; first looking at what defines "democracy" and "successful democracies", second exploring the intentions of governments in general, third comparing possible democratic styles that America didn't adopt, and fourth rating the successfulness of our American democracy. In so doing, students will be given the opportunity to reflect upon the democracy in which they live. The key question posed is "are we a successful democracy?" The unit makes a comprehensive study of the question by recreating the conventional context in which our democratic system is studied, making it a global comparative study that addresses both past and present perspectives. In this way teachers may teach democracy outside of the bubble of the American past and appeal to the desires of students to create a relevant and present-focused discussion on topics previously considered archaic and extraneous.</span></p><span data-dcnode-id="1160" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="1158" href="#top"><img alt="to top" border="0" data-dcnode-id="1159" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h1 data-dcnode-id="1156" id="h1num-2"><span data-dcnode-id="1157" instrument_node="">Rationale</span></h1><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">America is an idea. Not only is it an idea, it is a collective system of beliefs that is shared and reinforced by the people who live within the country's physical boundaries. While every citizen may not be in total agreement with his or her neighbor on the fine print of the American idea, the fundamental foundation of what it means to be American is an idea into which all Americans have invested and within whose parameters they are willing to live their lives. America, then, is a very strong and deeply rooted idea that has existed for centuries and shows no sign of dissipating in the centuries to come.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">What are the essential elements of this idea? They must be numerous so that they give a well-defined characterization of America. At the same time they must be few so that there is a greater chance that all Americans will agree on them. They must be specific so that people will have a better understanding of what it means to be American. But they must also be general so that many different personal feelings can be encompassed under them. These elements must also be comprehensible by people who do not live under the American system of beliefs; that is to say, people who do not necessarily identify as believing the American idea can still identify the idea as American.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">It is not the intention of this unit to explore all of the essential elements of America. Instead, the purpose is to look at one element - democracy. While not every American will unanimously agree that pure democracy is an essential element of the American idea, it must be remembered that pure democracy is not being discussed here and that democracy in some form would be an accepted element. One of the difficulties that many Americans face is to have to defend democracy as an element of the American idea without a clear understanding of what American democracy truly is. Students in our schools are constantly told to uphold the ideal of American democracy and to play their appropriate role within it, but these definitions are frequently unclear to many. With this in mind, the objective here is to properly define democracy within the bounds of the American experiment using both scholarly and comparative methods of definition and also to determine the level of success with which America has carried out its democratic aims.</span></p><span data-dcnode-id="1146" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="1144" href="#top"><img alt="to top" border="0" data-dcnode-id="1145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h2 data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Defining Democracy</span></h2><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">While many people in many languages have tried to conceive of a useful and applicable definition for democracy over the centuries, it is to the Greeks that we turn. The creators of the first democratic experiments, the Greeks combined two of their words - "demo" meaning "people" and "kratos" meaning "power" - to form the "demokratia" that describes their system of government. The city-states in ancient Greece practiced a form of government in which the powers of the state were derived from the people living in that state. Without delving into the varied aspects of the many Greek city-states, the reason this definition is useful is that it anchors the discussion of what a democracy can be; classical democracy is a system of government where the powers of the state are derived from the people who live in that state.</span></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1137" instrument_node="">The definition above may seem simplistic, but in many ways it is the basis of democratic thought. Robert Dahl states quite eloquently in his book </span><i data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">On Democracy</span></i><span data-dcnode-id="1134" instrument_node=""> "…we use the word democracy to refer both to a goal or ideal and to an actuality that is only a partial attainment of the goal." </span><sup data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">1</span></sup><span data-dcnode-id="1131" instrument_node=""> In much the same way, power derived from the people is a primary goal of democracy just as much as it alone is not enough to consider a state wholly democratic.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1128" instrument_node="">One modern definition of democracy sets out a list of criteria that proves that the system of government in place allows for the people to be the driving force behind their government. These five parameters create a framework within which a society must function in order to consider itself democratic. In list form they are: effective participation, voting equality, enlightened understanding, control of the agenda, inclusion of adults. </span><sup data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">2</span></sup><span data-dcnode-id="1125" instrument_node=""> Of course, these standards have only recently been set forth, decades later than the establishment of many accepted democracies. However the criteria are helpful in that they provide attainable goals for democratizing countries and guidelines for helping to strengthen weakening and static democracies.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1122" instrument_node="">Democracy as it is popularly defined today also consists of a set of institutions that encourage opportunities for people to participate within the structure of their government. </span><sup data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">3</span></sup><span data-dcnode-id="1119" instrument_node=""> The six political institutions that a large-scale (country-level) democracy requires are: elected officials; free, fair, and frequent elections; freedom of expression; alternative sources of information; associational autonomy (the right to form organizations such as political parties); inclusive citizenship (universal adult suffrage). </span><sup data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">4</span></sup><span data-dcnode-id="1116" instrument_node=""> Without going into exhaustive detail of each, the institutions are meant to help fulfill the criteria of what a successful democracy should be. It is important to note the distinction here; listed above are the institutions within a government structure that encourage the "demokratia" - power derived from the people. Each of these institutions executes at least one of Dahl's five criteria for a democratic process.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="1112" href="#top"><img alt="to top" border="0" data-dcnode-id="1113" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h2 data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">The Purposes of Democratic Government</span></h2><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">With democracy and success both provisionally defined, it falls upon philosophers and politicians to illuminate the purpose of forming democratic governments. The Greek city-states created their democracies to invest the people with the power of effectively running society. With the fall of democracy in Greece came the rise of republics in Rome. In contrast to the word "democracy", the Roman republic derived its name from "res" meaning "thing" and "publicus" meaning "of the people". While power is a thing, the word "republic" grants a wider range of objects of which the people hold sway. A republic ends up being a governmental body that represents the will of the people; no longer are the people the power, their representation takes that place.</span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Many people equate both the Greek idea of democracy and the Roman republic as having a similar purpose. Whether considering the assemblies of Athenians or the Roman Senate, both bodies meant to provide liberty to their people as best as they could. Taking this into account, what can be said to be the purpose of governments in general and democratic governments more specifically? What institutions guarantee liberty to a people? Can liberty be guaranteed?</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">When writing the US Constitution, the Framers set out specific goals for the document. The preamble to the Constitution outlines clearly the purposes of creating a governmental system in America. The six objects for creating an American government are to: form a more perfect union; establish justice; ensure domestic tranquility; provide for the common defense; promote the general welfare; secure the blessings of liberty to ourselves and our posterity. Here, it seems, is a clear summary of what a democratic government should aim to do. But how did the Framers choose these six goals for their government?</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1099" instrument_node="">Arguably, the Framers of the US Constitution did not have a good living example of a democratic government from which to work. </span><sup data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">5</span></sup><span data-dcnode-id="1096" instrument_node=""> This being the case, much of what is written about democratic governments comes after the Constitution was written and is based somewhat on what was observed in American democratic practice. Even the </span><i data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Federalist Papers</span></i><span data-dcnode-id="1093" instrument_node="">, widely accepted as great essays on democracy, were written either in defense of principles already outlined in the Constitution or as guides to aid interpretation of the document. If this is the case, why do we look to these authors for their explanations of governmental theory and philosophy?</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1088"><i data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">John Stuart Mill</span></i></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Once the American democracy was formed, many other countries soon fell into their own forms of democratic government. With all of these new democracies floating around, each of which had its own particular idiosyncrasies, it stood to reason that intellectuals would start to comment upon what was desirable and objectionable about these governments. Men such as John Stuart Mill seized the opportunity to help governments strive toward ideal administration of their societies by commenting on what they perceived to be the primary objects of governments.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1083" instrument_node="">In his </span><i data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">On Liberty</span></i><span data-dcnode-id="1080" instrument_node="">, Mill gives a charged summary of the interplay between government and individuals and the roles of each to ensure that the integrity of liberty is maintained. "The maxims are, first, that the individual is not accountable to society for his actions, in so far as these concern the interests of no person but himself….Secondly, that for such actions as are prejudicial to the interests of others, the individual is accountable, and may be subjected either to social or to legal punishments, if society is of opinion that the one or the other is requisite for its protection." </span><sup data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">6</span></sup><span data-dcnode-id="1077" instrument_node=""> This observation sets up the individual as the driving force in society, very much an ideal in line with our previous definition of the word.</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1074" instrument_node="">However, Mill also poses interesting questions in regard to responsibility. One of the primary ideas in his essay is the concept of the prevention of harm. He presents several examples that oscillate between placing the onus on the individual or his government in preventing harm. In true philosophical fashion, he doesn't give a clear-cut resolution of his position, but he does illuminate a few quandaries: Where is responsibility in the law? Does it fall on the wrong-doer or the enabler? And finally, what role does the government have to protect you from yourself? </span><sup data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">7</span></sup><span data-dcnode-id="1071" instrument_node=""> These issues are central to any study of government and especially to the delicate role of a democratic government in providing liberty while at the same time not taking it away. Dahl resolves this nicely saying, "Simply put, the issue is not whether a government can design all its laws so that none ever injures the interests of any citizen. No government, not even a democratic government, could uphold such a claim. The issue is whether in the long run a democratic process is likely to do less harm to the fundamental rights and interests of its citizens than any nondemocratic alternative." </span><sup data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">8</span></sup><span data-dcnode-id="1068" instrument_node=""> This helps to more clearly focus the responsibility of a democratic government in its relation to its citizens.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1065" instrument_node="">Even though Mill presents preventing harm as a conundrum, he leans towards calling for democratic governments to be less restrictive. This is evidenced by his other main point: that the chief task of governments is to give parameters for people to solve their own problems. "…To secure as much of the advantages of centralized power and intelligence, as can be had without turning into governmental channels too great a proportion of the general activity, is one of the most difficult and complicated questions in the art of government." </span><sup data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">9</span></sup><span data-dcnode-id="1062" instrument_node=""> In this statement, Mill warns against the tendency of federal systems of government - such as the United States - to treat the process of governing as a top-down, paternalistic exercise. Instead, governments should hold on to the ideals of democracy that allow for a bottom-up approach, fulfilling one of Dahl's criteria that the people set their own agendas in truly democratic governments.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1057"><i data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Alexander Hamilton and James Madison, Federalist 9 and 10</span></i></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1055" instrument_node="">Serving as perhaps the best commentary on the American democratic experiment are the </span><i data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Federalist Papers</span></i><span data-dcnode-id="1052" instrument_node="">, penned in defense of ratification of the US Constitution in New York over the course of a year between 1787 and 1788. Both Alexander Hamilton and James Madison were key authors, along with John Jay. Madison - also known as the father of the Constitution - gave the most stirring justifications for ratification, but he also outlined many elements of the intentions of the Constitution that weren't explicit. In this way, Madison helped to define key aspects of the lasting legacy of the American democratic experiment, including the distinction that our democracy was in fact a confederate republic.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1049" instrument_node="">In </span><i data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Federalist 10</span></i><span data-dcnode-id="1046" instrument_node="">, Madison clearly summarizes his views of government: "The protection of these faculties [the reason of man, his opinions, and his passions] is the first object of government." </span><sup data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">10</span></sup><span data-dcnode-id="1043" instrument_node=""> While all at once a sweeping and general task, the protection of men's passions, opinions, and reasons is very close to Mill's argument that would be made over 70 years later. Mill cannot seem to give a concrete plan of action, but Madison, with Hamilton's help, elucidates how the American form of government proposed in the Constitution provides safeguards to curtail this problem.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1040" instrument_node="">As previously stated, the Framers of the US Constitution freely admitted to creating a government based on democratic principles but more closely resembling a republic. </span><sup data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">11</span></sup><span data-dcnode-id="1037" instrument_node=""> The reason for this was both the size of the nation (population and area) and the existence of well-established state units within the national borders. A pure democracy as practiced by the Greeks would not be desirable under these circumstances, nor would it be possible to execute. The confederate republic model was adopted to address matters of fair representation of states and conflicting interests as well as the protection of minority rights (insomuch as they could be protected) from majority tyranny. </span><sup data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">12</span></sup><span data-dcnode-id="1034" instrument_node=""> Both Hamilton and Madison verify that these issues are addressed - albeit with necessary imperfections - in the US Constitution.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1031" instrument_node="">In </span><i data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Federalist 9</span></i><span data-dcnode-id="1028" instrument_node="">, Hamilton touts that the Constitution provides many mechanisms to safeguard the common people that were not thought possible in previous governmental systems. "The regular distribution of power into distinct departments; the introduction of legislative balances and checks; the institution of courts composed of judges holding their offices during good behavior; the representation of people in the legislature by deputies of their own election: these are wholly new discoveries, or have made their principal progress towards perfection in modern times." </span><sup data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">13</span></sup><span data-dcnode-id="1025" instrument_node=""> Separation of powers, checks and balances, republicanism, popular sovereignty; these were all new ideas, and they help to promote effective participation according to Dahl's criteria. Furthermore, it proves that democratic ideals can be served on a large scale by a republican (representative) government, possibly better than a pure democracy could with similar constraints.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1022" instrument_node="">Madison, in response to Hamilton's essay discussed here, brings up what could be seen as a stopping point: factions within government that could promote tyranny of the majority. "The smaller the society," he says, "…the more easily [the majority] will concert and execute their plans of oppression." This presents a bleak message to many in favor of promoting democracy, and truly seems to be an argument against efforts of democratization. In his next breath, however, Madison provides hope: "Extend the sphere and you take in a greater variety of parties and interests; you make it less probable that a majority of the whole will have a common motive to invade the rights of other citizens; or if such a common motive exists, it will be more difficult for all who feel it to discover their own strength and to act in unison with each other." </span><sup data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">14</span></sup><span data-dcnode-id="1019" instrument_node=""> What can be seen here is the basis for creating a loyal opposition, a pluralist society that ensures opportunities for the inclusion of all citizens and their viewpoints at one time or another. </span><sup data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">15</span></sup></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1012"><i data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Shapiro and the Principle of Affected Interest</span></i></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1010" instrument_node="">The definition of the loyal opposition in society is a group that is marginalized because of its minority status on an issue but still has options to participate because of the chance that they will become the majority on another issue. Because of this, citizens rarely opt out of participation in government action due to the chance that they will eventually be a part of the majority. When the system of loyal opposition is absent, the majority consistently negates the participation of the minority. Ian Shapiro very clearly states in </span><i data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Democratic Justice</span></i><span data-dcnode-id="1007" instrument_node=""> that encountering this situation in a supposedly democratic society is "unacceptable." </span><sup data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">16</span></sup><span data-dcnode-id="1004" instrument_node=""> In fact, this situation could potentially cause a breakdown in democratic processes altogether.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="1001" instrument_node="">When decisions are made that affect an entire group - whether that group is a small organization, a town, or a country - the decisions are called collective actions. There are a few ways to make collective actions, some more democratic than others. Dahl defines one democratic approach: "1) …before a law is enacted you and all other citizens will have an opportunity to make your views known. 2) You will be guaranteed opportunities for discussion, deliberation, negotiation, and compromise that in the best circumstances might lead to a law that everyone will find satisfactory. 3) In the more likely event that unanimity cannot be achieved, the proposed law that has the greatest number of supporters will be enacted." </span><sup data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">17</span></sup><span data-dcnode-id="998" instrument_node=""> This process covers two of his democratic criteria solidly - voting equality and enlightened understanding - and if it is repeated enough times for a variety of issues it will ultimately allow for loyal opposition as well which then includes effective participation in the list.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="995" instrument_node="">Some collective actions are by definition very undemocratic and so Shapiro introduces a rule of thumb to encourage more democratic collective action. Using the Greek definition of "democracy" and the Latin definition of "republic" simultaneously, we notice that they both share "people" as a root word; both forms of government rely on the populous to exist. In short, "…everyone affected by the operation of a particular domain of civil society should be presumed to have a say in its governance." </span><sup data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">18</span></sup><span data-dcnode-id="992" instrument_node=""> This is the principle of affected interest. Affected interest changes collective actions into collective self-government. Having the people craft their decisions through democratic processes such as the one suggested above by Dahl crosses into the realm of self-government and leaves potential despotism and tyranny of the majority behind.</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="989" instrument_node="">To briefly summarize, both in a democracy and a republic the purpose is to grant liberty to the people. While this might seem like an easy task, many factors including self-interest, despotism, and tyranny of the majority make it difficult to grant liberty to all of the people all of the time. A good government, then, pays attention to a few key points: trying to prevent harm; giving the people the right and opportunity to maneuver society; protecting the opinions and passions of humanity; creating a loyal opposition; allowing for collective self-government. Supported by the case of the United States, intellectuals have posited that a democratic-republic could potentially be the best way to serve the people's liberty considering all of these points. "Yet among the countries most comparable to the United States and where democratic institutions have long existed without breakdown, not one has adopted our American constitutional system." </span><sup data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">19</span></sup><span data-dcnode-id="986" instrument_node=""> For these countries that formed their democratic governments after 1789, what other options were more compelling?</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="981"><i data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">What Options Do Democracies Have?</span></i></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="979" instrument_node="">In his </span><i data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">A Preface to Democratic Theory</span></i><span data-dcnode-id="976" instrument_node="">, Robert Dahl suggests that it is not the Constitution that has kept the United States democratic; instead, the inherent democratic spirit of its people has validated the existence of the US Constitution. </span><sup data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">20</span></sup><span data-dcnode-id="973" instrument_node=""> If that is the case - if a society such as the US is inherently democratic in nature - then why do societies feel the need to adopt and implement a standardized set of rules for carrying out their democratic aims? Furthermore, why are societies compelled to adhere to these rules, even (especially?) in times of crisis? The following looks at options that various countries have explored in order to create democratic governments and addresses the dilemma of what came first - democracy or government. </span><sup data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">21</span></sup></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="966"><i data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Written or Unwritten Constitution?</span></i></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">As proposed in the conundrum above, do societies that are inherently democratic and wish to live democratically need a written constitution? The short answer is no, because not all democratic systems have written constitutions. However, there are pros to writing down a society's intentions for founding a government. One obvious argument in favor of a physical document is that there is always going to be something to reference. Interpretation of a written document deals more in semantics than in intentions. Overall, written constitutions exist in an overwhelming majority of democratic states today and the phenomenon of unwritten constitutions stems from historical anomalies during the formation of the current government such as in Great Britain or Israel.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="959"><i data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Direct or Representative Democracy?</span></i></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Ancient Greek city-states such as Athens practiced a form of democracy known as "direct democracy", referring to the fact that decisions being made for the good of society were being made directly by the members of society in an open forum. "Representative democracy", on the other hand, presumes that citizens will elect representatives who will assemble apart from society at large to make decisions for the good of society, reporting back and keeping the interests of their constituents in mind. While it has been argued that representative democracy is inherently undemocratic - it takes final decision-making out of the hands of the people - arguments in favor of each option take into consideration the size of the state and the restrictive nature of assembly. In general, larger states with many people tend towards implementing representative democracies, allowing for town meetings at the local level to maintain the benefits of direct democracy. Small states and towns favor direct democracy because a smaller society creates a less restrictive environment. In both cases, universal suffrage helps to assure that the processes remain more democratic.</span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="952"><i data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Federal or Unitary System?</span></i></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">A unitary system of government gives supreme legislative power to the central or national government. Contrarily, federal systems maintain the autonomy of smaller units within the nation (states, provinces, cantons, etc.) and national legislation cannot - within reason - be imposed on those units without the permission of the smaller government there. Usually a federal system is implemented when a nation is formed by unifying previously independent states into a confederation. Most modern democratic countries have unitary systems because the smaller regions within the nation were not used to self-government or were engineered without consideration of the interests of the populations within those boarders. The pros and cons of both systems are relative to the history of the individual nation and the previous autonomy of states within that nation.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="945"><i data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Presidential or Parliamentary System?</span></i></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">The birth of the presidency (most famously practiced in America) was influenced by the British model of monarchical separation of powers - the monarch as executive, parliament as legislative, and the courts as judiciary. Each branch was independent of the other and possessed specific powers to check and balance each of the other branches. With the rebirth of Britain's constitution in the early 19 </span><sup data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">th</span></sup><span data-dcnode-id="940" instrument_node=""> century came the birth of the prime minister. Owing allegiance to and serving at the pleasure of the majority party in parliament, the prime minister is the figurehead in parliamentary systems. Although the role of a prime minister is similar to that of a president, the minister lacks separation from the legislative branch. The pros and cons of the two systems are relative to the political stability of the country in which they are implemented.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="935"><i data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">First-Past-the-Post or Proportional Representation?</span></i></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">In racing, the first person across the finish line wins. In first-past-the-post election systems, the candidate with the most votes wins the election. This consequentially sets up a majority/minority government - the winners and the losers. Proportional representation allows for many different parties to share a proportion of the power in government, hence the name. For example, if a political party wins 30 percent of the popular vote, 30 percent of the seats in the legislature will be filled by members of that party. This system brings in players with varied interests into the political arena, validating the agendas of smaller interest groups in society and creating an equal opportunity for the agenda of the government to shift. The number of political parties in a nation is a direct result of implementing a FPTP (first-past-the-post) or PR (proportional representation) system as evidenced below.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="928"><i data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Two-Party or Multiparty System?</span></i></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">A FPTP system will generally favor two parties vying for control of the government. PR systems allow for many parties - three, four, or more - to take part in the process of governing a country; PR systems also encourage coalition building which highlights the commonalities of competing parties. Some pros and cons: 1) two-party systems can result in deadlock when one party controls the legislature and another party controls the executive branch; 2) multiparty systems can result in gridlock when parties refuse to form coalitions and alliances are broken; 3) two-party systems create efficient governments where the majority party's agenda can be addressed with little interference from the minority; 4) multiparty systems allow minority parties to be real players in proposing and implementing legislation, keeping constituents from many corners happy. With this in mind, nations looking to move towards democracy need to assess the existence of differing interests in society before deciding to implement FPTP or PR systems of government.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="921"><i data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Unicameral or Bicameral Legislature?</span></i></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Just as a unicycle has one wheel and a bicycle two, unicameral legislatures are composed of one house whereas bicameral legislatures are composed of two houses. Separation within the legislative branch of government is not a necessity. For the most part, federal systems favor bicameral legislatures and unitary systems favor unicameral legislatures. The reason for this stems from the autonomy given to states in a federal system, requiring that the smaller entities within the nation have the opportunity to represent themselves fairly in government at the national level. Unitary systems can streamline their legislative processes by passing legislation through only one set of representatives; in unitary systems, the national interest is arguably everybody's interest. In short, bicameralism is only an asset if there are two levels of interest - the states versus the nation as a whole.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="914"><i data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Equality in Representation or Not?</span></i></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Arguably, the most democratic way of distributing power in government is to grant each citizen the same ability to cast a vote and have that vote recognized. "One man, one vote" as it is traditionally termed helps to ensure that all citizens are equally represented in the legislature. To use America as an example, the House of Representatives determines state representation based on the number of citizens living in each state. States are proportionally represented according to population; less populated states have fewer representatives than states with a greater population. This seems fair, but it gives larger entities more power, making automatic minorities out of smaller entities. A way to solve this is by introducing non-proportional representation as the US does in the Senate. Each entity within the nation gets the same number of representatives regardless of population. While this may seem more equal than the previous example, it robs citizens in larger states from the protection of "one man, one vote"; citizens in smaller states could get anywhere from 2 to 200 votes for every citizen's vote in a larger state. While fair does not always equal democratic, the question remains about whose interests are being protected when unequal representation is employed.</span></p><span data-dcnode-id="910" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="908" href="#top"><img alt="to top" border="0" data-dcnode-id="909" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h2 data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">The Results of the American Democratic Experiment</span></h2><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="904" instrument_node="">America's constitution looks very different from most other democratic nations today. Assuming the vast array of options available to democracies and the myriad combinations possible, "democracy" can be many different things at the same time for different nations. The question begs to be asked, however: how democratic can any national truly be? Robert Dahl hazards an answer in </span><i data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">On Democracy</span></i><span data-dcnode-id="901" instrument_node="">, "In almost all, perhaps all, organizations everywhere there is some room for some democracy; and in almost all democratic countries there is considerable room for more democracy." </span><sup data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">22</span></sup><span data-dcnode-id="898" instrument_node=""> With this in mind, how democratic can the American system of government be considered as it stands today?</span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="893"><i data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">The Electoral and Representative Processes</span></i></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="891" instrument_node="">The American system of representation developed as a response to the large population and area of the country. The Constitutional Convention over 200 years ago in Philadelphia tried to build in safeguards against ordinary citizens electing unqualified officials by providing for indirect election of Senators and the President. As the American voter has become more able to educate him or herself when it comes to candidates and as the government moved through the Progressive Era of the early 20 </span><sup data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">th</span></sup><span data-dcnode-id="888" instrument_node=""> century towards inclusion and transparency, the Constitution changed to include the direct election of Senators. As America decides whether to bring the election of the President down to the popular level, it is important to remember that representative governments constructed with the proper provisions for inclusion can enhance the evolution of a democratic state. "What matters is that, through these public elections…: the public good is achieved, citizen preferences are represented, governments become accountable, citizen participation in political life is maximized, economic equality is enhanced, rationality is implemented, economic conditions improve, and so on." </span><sup data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">23</span></sup><span data-dcnode-id="885" instrument_node=""> As long as the electorate controls the evolution of government through the election process, democracy is in action.</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="880"><i data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Judicial Review of Law</span></i></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="878" instrument_node="">The judicial branch of the government in America was intended to be a small voice in the large national government. Tocqueville makes light of the role of the courts in American society, claiming that all people would look to the judiciary as a last resort for solving problems; legislatures were much more effective at preventing harm than the judiciary. </span><sup data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">24</span></sup><span data-dcnode-id="875" instrument_node=""> Very early on, the Supreme Court advocated itself not only as a tribunal for when government goes sour, but also as a review board to check up on the laws created by Congress. Judicial Review has manifested itself as both the voice of the people against a tyrannical legislature and the voice of the government in its efforts to protect the long-term interests of its citizens. The allegedly unbiased court draws its power from the fact that both the people and the other branches of government respect its verdicts. This can arguably be seen as a testament to the ability of the court to uphold the democratic ideals that both sides value. Once the judiciary veers from this course, it is possible to think that the country would retaliate by restructuring the institution to reflect more democratic aims.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="870"><i data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">The Amendment Process</span></i></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="868" instrument_node="">In order for democracy to evolve in America, the Constitution must be a living document. The amendment process - spearheaded by the adoption of the Bill of Rights after the Constitutional Convention - ensures that the American system of government can change to address the needs of its citizens and to approach a more democratic ideal. "To promise democratic rights in writing, in law, or even in a constitutional document is not enough. The rights must be effectively enforced and effectively available to citizens in practice." </span><sup data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">25</span></sup><span data-dcnode-id="865" instrument_node=""> This statement can help explain why the amendment process is so difficult; for America to provide the rights protected in the Constitution, it has to have the ability and desire to do so. Many original elements in the Constitution such as slavery, suffrage, and civil rights were undemocratic and needed to be amended. However, changing the Constitution on a whim negates the weight of the document. Long debates, campaigns, and other democratic processes help to increase the significance of the final outcome - the amendment - and to ensure that the rights requested will be guaranteed.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="860"><i data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Political Parties and Other Institutions</span></i></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="858" instrument_node="">James Madison was the earliest critic of splintering the American people into interest groups labeled as political parties. He believed the institution would tear the nation into factions incapable of compromising for the common good. As the government grew older, as citizens took sides in political debates, and as political parties became an institution in every sense of the word, Madison reneged on his previous assumptions. As Robert Dahl asserted in his primary criticism of Madison's early notion, as long as a loyal opposition exists political parties are a good thing for governments to have. At their best, they keep the populace informed, active, and excited, providing an outlet between elections for mobilizing ideas and resources. At their worst, they are mired in shady business and prevent transparency in the workings of government. </span><sup data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">26</span></sup><span data-dcnode-id="855" instrument_node=""> Reform efforts have centered upon monetary issues in the hope that clean money will make for clean politicking. The reality is that interest groups serve many different interests; all subjective and all falling on the shaky spectrum of good and bad.</span></p><span data-dcnode-id="853" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="851" href="#top"><img alt="to top" border="0" data-dcnode-id="852" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h1 data-dcnode-id="849" id="h1num-3"><span data-dcnode-id="850" instrument_node="">Objectives</span></h1><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="847" instrument_node="">The intention of this unit is to serve as an alternative study of the United States Constitution in an 11 </span><sup data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">th</span></sup><span data-dcnode-id="844" instrument_node=""> grade American History course. The curriculum in Philadelphia provides American History at three grades levels: 5 </span><sup data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">th</span></sup><span data-dcnode-id="841" instrument_node="">, 8 </span><sup data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">th</span></sup><span data-dcnode-id="838" instrument_node="">, and 11 </span><sup data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">th</span></sup><span data-dcnode-id="835" instrument_node="">. The belief is that teachers will increase the intensity of the coursework and move from a surface treatment of topics and concepts to a more in-depth study of America on a global scale. To put it succinctly, 5 </span><sup data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">th</span></sup><span data-dcnode-id="832" instrument_node=""> grade history addresses the "what and how", 8 </span><sup data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">th</span></sup><span data-dcnode-id="829" instrument_node=""> grade addresses the "why", and 11 </span><sup data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">th</span></sup><span data-dcnode-id="826" instrument_node=""> grade asks "what's the significance?" A critical inquiry allows students to delve into the significance of several topics surrounding the need for government and the structure of democracy. In this way, the significance of the US Constitution can be discussed and assessed.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Upon completing this unit, students should understand several concepts: why societies create government structures, what it means to have and implement a democratic government, the wide spectrum of democracies that exist in the world, and the specific construction of the American constitutional democracy as it exists today. As students go through the unit it is expected that they will come back to the focusing question "are we a successful democracy?" In this way, students will constantly connect the different concepts learned in order that they may reach a specific goal. While other interesting knowledge will be picked up, the purpose of the unit is to test the validity of the idea that America is the great democratic experiment and that our longevity is a testament to our success. By asking the right questions, students will become critical of popular American thought that tends to look at our democracy in a vacuum and use comparative methods to rate our democratic system against other established democracies and scholarly criteria of successful democracies. This also introduces the concepts of bias and propaganda, although such topics will not be specifically addressed in the body of the unit.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">The culmination of this unit will be in the form of a report card on democracies. Just as a report card in school is a summation of progress for the year to our students, this report card will serve as a way to rate the progress of our American democratic experiment. It is essential that students remember that our way of life is always in flux, that they should not take for granted the stability of today because it was born of the chaos of yesterday and is leading us towards the uncertainty of tomorrow. Also, by treating our democracy as a case study in the grander spectrum of democratic societies the world over, students reinforce the notion that we do not live in a bubble, that our decisions affect others and that the actions of others affect our society. By taking the study of the US Constitution out of its traditional vacuum, teachers can trend towards teaching American History through a global lens. This allows students to be critical, proud, embarrassed, educated, and ultimately active American citizens.</span></p><span data-dcnode-id="818" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="816" href="#top"><img alt="to top" border="0" data-dcnode-id="817" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h1 data-dcnode-id="814" id="h1num-4"><span data-dcnode-id="815" instrument_node="">Strategies</span></h1><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Because the purpose of this unit focuses around a critical inquiry, the strategies used to address the objectives compel students to ask questions and - upon coming up with an answer - question those answers in an effort to get to the root of the focusing question. In order to approach a suitable answer in reference to whether America is a successful democracy, many different concepts will be introduced with varied points of view expressed by several different authors. While lecture will certainly be employed, it is essential that students have experience grappling with period and contemporary texts. What follows are some strategies with specific resources mentioned to help teachers match relevant material to the desired concept.</span></p><span data-dcnode-id="810" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="808" href="#top"><img alt="to top" border="0" data-dcnode-id="809" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h2 data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Matching and Categorizing Democracy Criteria and Institutional Requirements</span></h2><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="804" instrument_node="">In order for students to truly grasp the meaning of American democracy they must be able to define "democracy" and give examples of how America has adapted that concept. While part of the unit will focus on activating the prior knowledge of students in regards to what we call democracy today, the main focus is on using criteria developed by the political scientist Robert Dahl to categorize American institutions and rhetoric as more or less democratic. Dahl gives two methods of measurement that are ideally combined to generate a more comprehensive spectrum of democratic potential and practice. These two measurements - discussed here in the rationale and as well as in </span><i data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">On Democracy</span></i><span data-dcnode-id="801" instrument_node=""> - are the basis for establishing a working definition of democracy for the purposes of this unit.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">While Dahl's democratic criteria and institutional requirements are perfect for helping to organize students' thoughts on American Constitutional democracy, many students need better tools for understanding the references made by Dahl. For example, one of Dahl's criteria is effective participation. Explaining this concept to students might reach some of them, but many need a more concrete example to really comprehend what effective participation encompasses in a democracy. Thus Dahl's other set of standards - the institutional requirements of democratic countries - provides models of what concrete governmental practices help to fulfill the five criteria. As per our example, effective participation can be measured by a government's willingness to provide freedom of expression to its people.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Linking these two sets of criteria together offers students a different way of approaching a potentially confusing topic. Taking the conceptual principles of ideally democratic governments and bolstering that information with concrete institutional examples gives students the opportunity to go further in their task of defining democracy. They not only have surface standards, they also have the tools necessary to critically look at their own democracy and other established and burgeoning democracies. They can use these tools to gain perspective on how governments build either restrictive or permissive democracies and on the consequences of such choices.</span></p><span data-dcnode-id="793" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="791" href="#top"><img alt="to top" border="0" data-dcnode-id="792" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h2 data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Jigsaw of Intentions and Purposes of Government and Democracy</span></h2><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Engaging with sources from any given time period enhances students' understanding of the time period. This blanket statement can be proven true or false depending upon the method in which those sources are introduced to a class. If students are simply given period literature with no context and no purpose, chances are that no understanding will take place. If, on the other hand, the period texts being used are set up as competing viewpoints on a single topic then students are required to truly engage with the material and use critical thinking skills to form their own opinions on the subject. A jigsaw is one effective way to divide the task of reading many different texts while also requiring students to interact with all of the different viewpoints offered by the chosen pieces.</span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Considering the topic of the intentions and purposes of government and democracy, the task of providing competing views seems fairly easy; teachers may choose from many authors and pieces. However it is important to address a wide array of student needs and to appeal to different levels of comprehension in the classroom. Jigsaws allow teachers to select text excerpts of varying length and difficulty so that high achieving students may be challenged and low-performing students can be brought up to a proficient level. It is sometimes helpful to use both text and visuals to appeal to different types of learners within the same classroom. For this topic, finding a visual proves difficult, but there are many passages that provide varied levels of vocabulary to engage every learner.</span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="781" instrument_node="">The focusing question of the jigsaw will be "why do societies form governments?" Excerpts will be taken from Plato's </span><i data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Republic</span></i><span data-dcnode-id="778" instrument_node="">, John Stuart Mill's </span><i data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">On Liberty</span></i><span data-dcnode-id="775" instrument_node="">, Madison and Hamilton's conversation in </span><i data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Federalist Papers 9 and 10</span></i><span data-dcnode-id="772" instrument_node="">, and Abraham Lincoln's immortal speech </span><i data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">The Gettysburg Address</span></i><span data-dcnode-id="769" instrument_node="">. A more detailed description of which segments should be used can be found in the Classroom Activities section. Following from the focusing question, groups of students will be asked to look closely at their assigned text and decide not only what makes society want to organize a government according to the author, but also what responsibilities a government has to the people it governs. Once each group has worked through their own excerpts, the students will switch and share information from their analysis with students who analyzed a different piece. This jigsaw provides a well-rounded perspective on the topic and helps the class to come close to answering the focusing question by employing all of the varying viewpoints in the texts.</span></p><span data-dcnode-id="767" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="765" href="#top"><img alt="to top" border="0" data-dcnode-id="766" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h2 data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Position Papers on Comparative Democratic Models</span></h2><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">As proven by the Frayer model for defining words and concepts, people learn about things by identifying what it is and what it isn't. By the end of this unit, students should be able to judge levels of democracy not only by identifying characteristics of their own American democracy but also by examining what the American experiment lacks compared to other democracies existing in the world today. The position papers ask students to use one of the comparisons discussed in the rationale above and debate the pros and cons of the options presented. Furthermore, students will be asked their opinion as to whether or not America made a good decision in choosing to pursue one of the options over the other.</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">The paper will be formatted in five-paragraph form in order to maintain the expectation that high school students should be writing concisely and clearly with limited space on a given topic. The first paragraph will introduce the two options and present a thesis as to which of the two is a more democratic choice. The second and third paragraphs outline the pros and cons of the two choices, making sure to highlight specific examples of how each option is implemented in America and other democratic countries today. The fourth paragraph introduces the student's opinion of which alternative promotes a more democratic form of government. Lastly, the fifth paragraph summarizes the arguments made in the essay, reflecting upon America's chosen style of democracy.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Position papers allow students to exercise their critical thinking, research, and persuasive essay skills all at once. As with many of the other strategies discussed in this section, the position paper forces students to interact with the material presented in class through lecture and readings. The added bonus is that students are also asked to form their own opinions, incorporating the element of personal investment that can help to hook students who would otherwise find the material boring and out of their grasp. This topic specifically brings in another component of Social Studies education - connecting past events to the present and future. Allowing students to comment on what they see in the world today and validating their opinions because they are backed up with research sets a positive tone of acceptance and scholarship in the classroom.</span></p><span data-dcnode-id="753" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="751" href="#top"><img alt="to top" border="0" data-dcnode-id="752" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h2 data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Children's Book on the Results of the American Democratic Experiment</span></h2><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">One of the true tests for having learned something is being able to teach it to others. Many students at the high school level are looking to create a bridge between the confusing language used in many textbooks and the simpler language that teachers use to make the material accessible. Having older students generate a children's book on what they learn is a good way to let students build that language bridge by themselves. They learn to convey an idea concisely and to use illustrations to supply nuances that the simple language can't always translate. This results in higher level thinking on the part of the students writing and illustrating the book and can also be useful for elementary teachers if the final products are shared with younger students.</span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">The children's book assignment has students looking at the current results of America's democratic experiment and deciding where the institutions and processes we practice fall on the democratic spectrum. Using Dahl's criteria as a comparison, students will consider how Judicial Review, political parties, elections and representatives, and the amendment process all either help or hinder the growth of democracy in America. Students will be separated into groups and each group will have an institution with which to work. The goal is to describe the role of the institution in American government today as clearly as possible (illustrations should be used) and then to judge whether the institution facilitates the democratic process or encumbers movement towards a more democratic state. The language should be accessible to younger audiences and students should create their pages with the hope of teaching American government to a kindergarten or first grade class.</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Having students work in groups to complete their pages allows for many different viewpoints to be considered for the opinion portion of the book. Students are not likely to engage in an activity where they are forced to regurgitate information that they have already learned - even if it is a good way to assess what they know. Taking the assignment a step further and asking for students to opine on what they have observed in the workings of the government brings interest to the fore. As an assessment tool, the opinion portion of the children's book allows teachers to see where the "public opinion" of the class lies and provides an opportunity to discuss the differences between how the US Constitution has outlined the role of the government and how a presidential administration might interpret the role of the government. The material brought up in the book is also a good way to bridge into election year conversation or to debate the merits of deliberative democracy (see Fishkin resource in bibliography).</span></p><span data-dcnode-id="739" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="737" href="#top"><img alt="to top" border="0" data-dcnode-id="738" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h2 data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Report Card on American Democracy</span></h2><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Perhaps the most important objective of this unit is to assess the success of the American democratic experiment. The reasoning behind this is not to criticize America's government; instead, students should learn to analyze the society in which they live with a clear picture of the rest of the world in front of them. The intention of the unit is to look at the roots of democracy, the first modern democracy, and more recent democracies with the object of ascertaining how close modern states come to reaching democratic ideals. While some of the assessment will be comparative by nature, American democracy can and should be judged against its own principles and how well it executes the democratic standards it sets for itself.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="730" instrument_node="">As with any assessment tool, students should understand that there are two ways to measure something: group comparison and personal growth. Both forms of assessment have their merits, but when referring back to the focusing question of the unit, "are we a successful democracy?" students should decide whether it is fair to pit America against other countries or if America should be judged by how well it meets scholarly agreed upon standards. A good compromise is to rate a few democratic nations separately against the standards with the intention of placing all of the countries on a "spectrum" of democracy. The appendix to the </span><i data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Democracy Sourcebook</span></i><span data-dcnode-id="727" instrument_node=""> gives a few good ways to measure the democratic level of an individual state. A sample report card to be used with this unit is included in the appendices below. If the attached report card is used, students should be encouraged to write an essay detailing the explanations they give for the grades and how that reflects upon the democratic nature of the country in question.</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">The greatest skill that teachers can impart to their students is the ability to look at the world with a critical eye, assess biases, and make informed decisions with the materials at hand. Just as students are graded at the end of a term or year, so too should our government. It is important to remember that the objective of grading is to isolate things done well and things that need improvement in order to better focus the next term or year of growth. Today's students are the policy makers of tomorrow and should be encouraged to critically assess the direction in which our country is headed with a plan in mind for maintaining and improving democratic functionality.</span></p><span data-dcnode-id="722" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="720" href="#top"><img alt="to top" border="0" data-dcnode-id="721" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h1 data-dcnode-id="718" id="h1num-5"><span data-dcnode-id="719" instrument_node="">Classroom Activities</span></h1><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">What follows are lessons that serve to bring the unit to life. These lessons are a snapshot and do not take the teacher from the beginning to the end of the unit. The first lesson of the unit is included here. Teachers should format the class to the personal needs of the students and should feel free to add or subtract any step in the process. Other possible lesson ideas are addressed in the Strategies section of this unit.</span></p><span data-dcnode-id="714" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="712" href="#top"><img alt="to top" border="0" data-dcnode-id="713" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h2 data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Lesson One: Defining Democracy</span></h2><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">The objective of this lesson is for students to come up with their own definition of "democracy" and to compare that definition with several historical and scholarly models of democracies in practice. This lesson serves as the introduction to the unit and will feature reciprocal teaching techniques as well as lecture. The lesson should last for about two 45-minute periods. The standards addressed in this lesson are 5.1C, 5.1E, 5.3A, 8.3B, 8.3C, 8.4B, and 8.4C.</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Pre-class assignments are meant to activate prior knowledge in the students. The obvious pre-class question for the first day of this lesson asks students "what is a democracy?" Students will provide a variety of answers, at which time a working definition which the majority of the class may agree upon should be created. This definition will probably resemble the governmental structure of the US. The Greek definition of "democracy" along with the Athenian example should then be shared with the class. Because the wording is simple in nature, students should be asked what "power derived from the people" entails. A discussion will ensue; midway through the discussion, the definition of "republic" should be shared along with the Roman example of a Senate. With both democracy and republic defined, students should make arguments for which model best fits their agreed upon definition of democracy from the beginning of class. After a short informal debate, it should be revealed to students that America was founded on the principles of both democracy and republicanism. According to the students' definition and with the knowledge that America was intended to be a democratic-republic, students should be asked what elements a modern democratic nation should possess. The compilation of this list, whether as a whole class or in small groups, should go to the end of the period. Homework in preparation for tomorrow should be to have students give justification for why each element on the list helps foster democratic ideals.</span></p><span data-dcnode-id="703" instrument_node="">
