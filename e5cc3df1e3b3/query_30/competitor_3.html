</span><p data-dcnode-id="698"><span data-dcnode-id="702" instrument_node="">Day two begins with a review of last night's homework. As students are sharing their justifications, each element of democracy from yesterday's discussion should be put up on one side of the board. After this is complete, Robert Dahl's 5 democratic criteria should be written on the other side of the board. Students should be asked to try to define Dahl's criteria and a more formal definition should be provided by the teacher. At this time, Dahl's 6 Institutional Requirements should also be shared. A good activity to help link the criteria to the requirements is to have all of the criteria written out on the board and have students match the requirements to each of the criteria. The requirements serve as good practical definitions for the criteria and give concrete examples of how democracies can carry out democratic aims. Please refer to Dahl's </span><i data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">On Democracy</span></i><span data-dcnode-id="699" instrument_node=""> or the report card in the appendix for information on how the criteria and requirements match up. The matching game is the closing activity of the second class period. Once Dahl's criteria have been outlined and defined, students should be ready to judge how well modern democracies fulfill their democratic goals in practice.</span></p><span data-dcnode-id="697" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="695" href="#top"><img alt="to top" border="0" data-dcnode-id="696" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h2 data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Lesson Two: Jigsaw on Government</span></h2><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">The objective of this lesson is to introduce students to the varied reasons people choose to form governments and nations. By employing the jigsaw method, students will be asked to engage with primary sources and draw comparative conclusions over the four excerpts used. Ideally this lesson would last only one 45-minute period, but different levels of learners may require the jigsaw to stretch over two 45-minute periods. The standards addressed in this lesson are 5.1A, 5.1C, 5.1E, and 5.1H.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="688" instrument_node="">To start the lesson, students should be asked the focusing question of the jigsaw: "why do societies form governments?" Once sufficient discussion of responses has been completed and a list of possible answers compiled, the class will divide into four or eight small groups (preferably four students). These are the primary jigsaw groups. Each group will be given one of the four following excerpts to read: 1) A paraphrase of the opening paragraphs to Book IV of Plato's </span><i data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Republic</span></i><span data-dcnode-id="685" instrument_node=""> (discusses the point of creating city-states in Greece); 2) The 1 </span><sup data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">st</span></sup><span data-dcnode-id="682" instrument_node=""> paragraph of </span><i data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Federalist 9</span></i><span data-dcnode-id="679" instrument_node=""> and the 6 </span><sup data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">th</span></sup><span data-dcnode-id="676" instrument_node=""> paragraph of </span><i data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Federalist 10</span></i><span data-dcnode-id="673" instrument_node=""> (asserts that the US Constitution protects citizens from themselves); 3) The "Harm Principle" from chapter one of John Stuart Mill's </span><i data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">On Liberty</span></i><span data-dcnode-id="670" instrument_node=""> (proposes that the prevention of harm is the responsibility of the government as well as the individual); 4) Abraham Lincoln's </span><i data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Gettysburg Address</span></i><span data-dcnode-id="667" instrument_node=""> (espouses the higher call of governments and citizens to be responsible for the happiness of all people).</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="664" instrument_node="">Several common questions should be answered by each group. The questions: 1) Who is writing this? When? What is the context? 2) What words or phrases jump out at you? Why? 3) What is being said about the role of common people? How can you tell? 4) What is being said about the role of governments or people in charge? How can you tell? 5) How would you answer the focusing question after reading this excerpt? Once these questions have been answered in the primary groups, one member from each of the 4 groups should come together to form the secondary groups - a group where one student is the expert on his or her source. The same five questions will be answered, but discussion will ensue as to how each source approaches the focusing question. Once students have finished sharing and discussing, they should begin the homework assignment which will be shared out the next day: write a paragraph discussing whether the authors of these sources are addressing the democratic ideals we defined in class with their ideas. A great way to cap the lesson is to show School House Rock, </span><i data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">The Preamble</span></i><span data-dcnode-id="661" instrument_node=""> to the class as a lesson on what the Founders actually decided to announce as the purposes for forming the United States government.</span></p><span data-dcnode-id="659" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="657" href="#top"><img alt="to top" border="0" data-dcnode-id="658" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h2 data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Lesson Three: Creating a Children's Book</span></h2><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">The objective of this lesson is to have students comprehend the results of democracy in America and to judge whether those institutions facilitate or encumber the growth of democracy in the nation. This lesson could take anywhere from one to three 45-minute periods to complete depending on the level of the learners and the desire of the teacher to foster creativity. It is the only lesson in the unit that will appeal to more visual learners. The standards addressed in this unit are 5.1E and 5.3A.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Students should start the lesson off by answering the pre-class question: "Is America becoming more or less democratic as time goes on? Why or Why not?" There will undoubtedly be two camps with varying explanations for their answers and these should be discussed briefly. A class handout should be made with the information contained in the rationale of this unit under the heading "The Results of the American Democratic Experiment". Students should take turns reading the sections aloud and discussing the implications of the different institutions of our modern democracy and whether or not these things lead us to be more or less democratic. Once it is clear that the students understand the institutions and their role in adding or subtracting from democratic aims, the activity of creating a children's book can be introduced.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">The students should create the books in small groups (no more than three students). Because there are four results (electoral process, judicial review, amendments, and political parties) there should be about 12 students working on each book - three students in each of four groups; more than one book can be made in larger classes. Each small group is responsible for 2 pages of the book, text and illustrations. The first page should explain the institution in words that a kindergartener or first grader would understand. For example: "Political parties are groups of people with lots in common. They think the same way about how Americans should live, work, and play. People who get chosen to lead the country come from one of two parties - the Republicans (elephants) or the Democrats (donkeys)." The second page gives the group a chance to decide whether the institution is helping or hindering democracy in America. For example: "Many people like belonging to political parties, but sometimes not everyone gets invited to join. Not everybody likes the elephants and the donkeys, so people who don't have a party to join get left out of making decisions. This isn't very fair and some people even think that the political parties should be gotten rid of all together!" Students should be encouraged to come up with their own opinions for this piece. Once each group has written and illustrated their pages, the book can be bound together by the teacher and should be read as a children's book, first to the class so that they can learn from each other and second to a group of younger students (if the possibility presents itself). The book is the culminating assignment of the lesson and so any homework given would be reflection upon what was learned by the experience.</span></p><span data-dcnode-id="645" instrument_node="">

</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">This unit requires the ability to create handouts both of excerpts of the rationale above and also of select excerpts from student resources included in the bibliography. For writing the position papers, students should have access to the internet and/or a library for researching their comparisons; photocopies of portions of both of the Dahl books would also suffice. The children's book requires art materials such as large paper and markers/crayons as well as a way to bind the book (yarn or staples).</span></p><span data-dcnode-id="462" instrument_node="">
</span><a class="cuLinkToTop" data-dcnode-id="460" href="#top"><img alt="to top" border="0" data-dcnode-id="461" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachers.yale.edu/img/new/icon-dark-toTop.png&amp;raw"></a><h1 data-dcnode-id="458" id="h1num-7"><span data-dcnode-id="459" instrument_node="">Appendices</span></h1><span data-dcnode-id="457" instrument_node="">
</span><h2 data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Model Position Paper: Written or Unwritten Constitutions</span></h2><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">The formation of a democratic government is a laborious and highly nuanced process that can take months or years to complete. Decisions must be made on many fronts, including the roles of government officials, criteria for citizenship, and rights guaranteed to citizens. Once the process is over, a decision must be made as to whether or not to write out the constitution - rules - for all to see. In other words, should the government be encouraged to follow the letter of the law or the spirit of the law? The most democratic option is to write out the constitution of a nation so that all people have access and can refer to the laws and regulations of the country at any time for any reason.</span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">The question may be posed: what is so undemocratic about adopting an unwritten constitution? It can be argued that by not writing out the laws of a land the populace is excluded from engaging with the laws; they either do not know or cannot understand their rights without the proper training. This creates an elitist society. On the other hand, without written words a populace could interpret the meaning or intention of the law very liberally if they wished to do so. Unwritten constitutions are much more open to interpretation. Great Britain is a good example of a functioning democracy with an unwritten constitution.</span></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Written constitutions are as plain as black and white. However, that is not to say that the written word doesn't provide a grey area of interpretation. In the example of the US Constitution, people who follow the laws as written regardless of context are called "strict constructionists" and people who take the evolution of political culture into consideration are called "loose constructionists". In this way, having a written constitution hardly circumvents conflict and interpretation. One unequivocal argument in favor of written constitutions is their permanence; they become canonical and revered by the populace and widely disseminated throughout the masses. This dissemination encourages democratic practices.</span></p><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">When considering all of the pros and cons of both options, it is easy to see why written constitutions are more democratic. First and foremost, the written word is easily accessible to the electorate, especially if it is allowed to be printed in many languages and is taught in schools (as in America). Second, unwritten constitutions leave too much room for politicians and other "higher-ups" to take advantage of the common man with underhanded interpretations. The written word - just like a signed contractual agreement - helps to protect the rights of citizens.</span></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">In conclusion, written constitutions are more democratic than unwritten constitutions for many reasons. Some of these are the accessibility, permanence, and easy interpretation of the written word. Also, unwritten constitutions can tend to create elitists societies where only a few high-level officials in the government have access to true understanding of the laws. America's choice to publish a written constitution proves that the government created by the Founding Fathers was committed to democratic principles and practices.</span></p><span data-dcnode-id="439" instrument_node="">
