</span><h1 class="entry-title" data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Uruguayan Democracy</span></h1><span data-dcnode-id="752" instrument_node=""> </span><header class="entry-header" data-dcnode-id="736"><span data-dcnode-id="751" instrument_node="">

</span><span class="posted-on" data-dcnode-id="745"><span data-dcnode-id="749" instrument_node=""> Posted On : </span><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mjps.ssmu.ca/2017/02/15/uruguayan-democracy/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="747" datetime="2017-02-15T00:53:09-05:00"><span data-dcnode-id="748" instrument_node="">February 15, 2017</span></time></a></span><span class="byline" data-dcnode-id="740"><span data-dcnode-id="744" instrument_node=""> Published By : </span><span class="author vcard" data-dcnode-id="741"><a class="url fn n" data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mjps.ssmu.ca/author/mjps/"><span data-dcnode-id="743" instrument_node="">McGill Journal of Political Studies</span></a></span></span><span data-dcnode-id="739" instrument_node=""> </span></div><span data-dcnode-id="737" instrument_node="">

</span><main class="site-main" data-dcnode-id="543" id="main" role="main"><span data-dcnode-id="720" instrument_node="">
</span><article class="post-166 post type-post status-publish format-standard has-post-thumbnail hentry category-featured tag-democratization tag-latin-america tag-uruguay" data-dcnode-id="642" id="post-166"><span data-dcnode-id="719" instrument_node="">
</span><div class="entry-content" data-dcnode-id="666"><span data-dcnode-id="718" instrument_node="">
</span><div class="image-full mb-30" data-dcnode-id="716"><img alt="" class="attachment-full size-full wp-post-image" data-dcnode-id="717" height="914" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mjps.ssmu.ca/wp-content/uploads/2017/02/699206267_c0ecf0bc60_b.jpg&amp;raw" srcset="https://mjps.ssmu.ca/wp-content/uploads/2017/02/699206267_c0ecf0bc60_b.jpg 1024w, https://mjps.ssmu.ca/wp-content/uploads/2017/02/699206267_c0ecf0bc60_b-300x268.jpg 300w, https://mjps.ssmu.ca/wp-content/uploads/2017/02/699206267_c0ecf0bc60_b-768x686.jpg 768w" width="1024"></div><span data-dcnode-id="715" instrument_node=""> </span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Having held elections as early as 1828, Uruguay has been ranked as one of the top ten freest countries in the world by Freedom &nbsp;House. (Freedom House 2017) &nbsp;Despite this early precedent for democratic practices, Uruguay has&nbsp;oscillated between democratic and&nbsp;authoritarian rule. In 1973, the newly established executive branch&nbsp;of&nbsp;government suspended congress and the country was governed by an oppressive civil-military dictatorship until 1985. &nbsp;(Gillespie 1986, 176) &nbsp;How did Uruguay break free from authoritarian rule and so successfully return to a full-fledged democracy? &nbsp;There are several important factors that &nbsp;can explain Uruguay’s remarkable democratic rebound. First, the underlying institutional framework &nbsp;that endured from the previous democratic regime. (O’Donnell 1986, 22) Second, the transition followed a pacted model, marked by elite cooperation compromise between actors, and a clear role for the military. (Karl 1990, 9) Finally, societal reparations and the settling of past accounts that did not complicate the process, as the transition was largely peaceful. (O’Donnell 1986, 32)</span></p><span data-dcnode-id="712" instrument_node="">
</span><figure aria-describedby="caption-attachment-168" class="wp-caption alignright" data-dcnode-id="708" id="attachment_168" style="width: 316px"><img class="wp-image-168" data-dcnode-id="711" height="357" loading="lazy" sizes="(max-width: 316px) 100vw, 316px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ssmu.mcgill.ca/mjps/wp-content/uploads/2017/02/Juan_Maria_Bordaberry-266x300.jpg&amp;raw" srcset="https://mjps.ssmu.ca/wp-content/uploads/2017/02/Juan_Maria_Bordaberry-266x300.jpg 266w, https://mjps.ssmu.ca/wp-content/uploads/2017/02/Juan_Maria_Bordaberry.jpg 284w" width="316"><figcaption class="wp-caption-text" data-dcnode-id="709" id="caption-attachment-168"><span data-dcnode-id="710" instrument_node="">President Juan Maria Bordaberry</span></figcaption></figure><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Uruguayan politics prior to 1973 was marked by intense competition between the Blanco Party and the Colorado Party, the natural governing party. Endemic partisan competition in Uruguayan politics necessitated the adoption of a new constitution in 1967, creating an executive office. Competition endured, and on Jun 27, 1973 President Juan Maria Bordaberry chose to close congress with the support of the military. (Gillespie 1986, 176) Following the collapse of the democratic regime, a civil-military dictatorship was established; Bordaberry’s power extended from a junta of generals, opposition was banned, and both the Colorado and Blanco parties were sent into disarray. Importantly, the dissolution of democracy was relatively peaceful, unlike the experience of other Latin American countries. In fact, the executive made an effort to curtail the military, preventing the ascendancy of ambitious generals, and maintaining its institutional professionalism. (Gillespie 1986, 178) Thus the ‘military dictatorship’ that Uruguay experienced may be better described as a ‘deep freeze,’ rather than complete elimination of the democratic state.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Authoritarian control of the state began to dissolve after the regime’s failed attempt at constitutional reform in 1980. Hoping to preserve the political institutions established in 1973, the regime put a constitutional change to plebiscite which was rejected by Uruguayans after mobilization by intact underground party mechanisms. This failure strengthened opposition, delegitimized the regime, and opened the political avenues to initiate a democratic transition. (Gillespie 1986, 182) Recognizing the need to respond to calls for reform, the military initiated negotiations to establish a form of ‘democradura’, a softened dictatorship. Their reforming spirit was too little, too late for the Uruguayan people, however, and popular protests in Montevideo’s central square in November 1983 proved fatal to the regime. (Gillespie 1986, 187) Uruguay’s previously hostile political parties worked together, and a year later, Uruguay’s first democratic elections in over a decade were held. Despite the establishment of a system that mirrored closely the pre-1967 regime, checks and balances were established so as to curtail the intense partisanship that ultimately brought about the collapse of democracy. (Gillespie 1986, 193)</span></p><span data-dcnode-id="701" instrument_node="">
</span><figure aria-describedby="caption-attachment-169" class="wp-caption alignleft" data-dcnode-id="697" id="attachment_169" style="width: 213px"><img class="wp-image-169 size-medium" data-dcnode-id="700" height="300" loading="lazy" sizes="(max-width: 213px) 100vw, 213px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ssmu.mcgill.ca/mjps/wp-content/uploads/2017/02/Tabar%25C3%25A9_V%25C3%25A1zquez_02_cropped-213x300.jpg&amp;raw" srcset="https://mjps.ssmu.ca/wp-content/uploads/2017/02/Tabaré_Vázquez_02_cropped-213x300.jpg 213w, https://mjps.ssmu.ca/wp-content/uploads/2017/02/Tabaré_Vázquez_02_cropped.jpg 672w" width="213"><figcaption class="wp-caption-text" data-dcnode-id="698" id="caption-attachment-169"><span data-dcnode-id="699" instrument_node="">Uruguay’s current president, the democratically elected Tabaré Vázquez</span></figcaption></figure><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">The process by which Uruguay reverted to democracy, the nature of the new regime, and the transition process are important in this case, and help explain the &nbsp;country’s quick rebound of democracy. To begin with, the democratic institutions that existed before 1973 were marginalized by the civil-military regime, but were not persecuted. As a result they were able to successfully mobilize against the regime’s 1980 plebiscite that intimated the democratic transition. The pre-existing political parties were able to put aside their differences and present a unified front against the regime. The second important factor was the pacted nature of the transition. Military elites within the regime recognized the need for reform and cooperated with opposition forces, there was compromise between all parties, and the military remained as it always had in its clearly defined, professional role. Partly because the military was kept separated from the regime’s administrative duties it used relatively little coercive force during the authoritarian period. Finally, because the military maintained a professional purpose throughout authoritarian rule there had not been a substantial loss of civil trust in the institution. The military was not used as a coercive force by the regime, so the challenging process of making reparations and reestablishing social trust was minimized. These critical factors have enabled Uruguay’s return to democracy to be swift and successful.</span></p><span data-dcnode-id="693" instrument_node="">
</span><hr data-dcnode-id="692"><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="690" instrument_node="">[footnote] Gillespie, Charles C. “Uruguay’s Transition from Collegial Military-Technocratic Rule.” </span><em data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Transitions from Authoritarian Rule</span></em><span data-dcnode-id="687" instrument_node="">. Ed. Guillermo O’Donnell, Phillipe C. Shmitter, and Laurence Whitehead. Baltimore: John Hopkins UP, 1986. 173-95. Print.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="684" instrument_node="">Karl, Terry L. “Dilemmas of Democratization in Latin America.” </span><em data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Comparative Politics</span></em><span data-dcnode-id="681" instrument_node=""> (1990): 1-21. Print.</span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="678" instrument_node="">O’Donnell, Guillermo, and Philippe C. Schmitter. </span><em data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Transitions from Authoritarian Rule: Tentative Conclusions about Uncertain Democracies</span></em><span data-dcnode-id="675" instrument_node="">. Baltimore: Johns Hopkins, 1986. 3-47. Print.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">Freedom House. </span><em data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Freedom in the World 2017</span></em><span data-dcnode-id="669" instrument_node="">. Publication. Freedom House, Feb. 2017. Web. 10 Feb. 2017.[/footnote]</span></p><span data-dcnode-id="667" instrument_node="">
