</span><p data-dcnode-id="506"><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">ABC</span></strong><span data-dcnode-id="516" instrument_node=""> correspondent Brit Hume summed up the official consensus when he said, “These are good times in the Free World,” in contrast to life behind the “Iron Curtain” </span><i data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">(</span></i><strong data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">World News Tonight</span></strong><i data-dcnode-id="508"><strong data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">,</span></strong><span data-dcnode-id="509" instrument_node=""> </span></i><span data-dcnode-id="507" instrument_node="">7/13/89). The use of such jargon (the “Free World” presumably includes such anti-communist allies as Turkey, South Africa and Guate­mala) was a reminder that the media’s human rights spotlight is still aimed ex­clusively at targets abroad, not at the U.S.</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Issues such as homelessness, poverty, Native American land struggles, Sanctu­ary for Central American refugees and FBI harassment of domestic dissidents are not framed in terms of human rights by the U.S. press. For all the ink spilled on the HUD scandal, few journalists have drawn the connection to the homeless. And those who report on poverty in the U.S. rarely probe its relevance to democracy and human rights.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="501" instrument_node="">In this special publication of </span><strong data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Extra!</span></strong><span data-dcnode-id="498" instrument_node="">, we look at U.S. media coverage of human rights problems both at home and in other countries. The articles are grouped in six categories, with the first two focusing on Latin America. The third section begins with a critique of U.S. press coverage of the Holocaust, the darkest hour for human rights, and ends where events are currently so hopeful, in the Soviet Union. The fourth part scrutinizes coverage of human rights violations in the U.S. The fifth deals with racism and press freedom, and the final section explores in greater depth the economic underpinning of human rights, particularly in the Third World.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Our hope is to provide a tool that will enable people to assess media coverage of human rights more critically.</span></p><span data-dcnode-id="493" instrument_node="">
</span><div data-dcnode-id="490" id="extra-index-link"><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fair.org/extra-issues/extra-summer-1989"><span data-dcnode-id="492" instrument_node="">Extra! Summer 1989</span></a></div><span data-dcnode-id="489" instrument_node="">

</span><h4 data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">What’s FAIR</span></h4><span data-dcnode-id="130" instrument_node="">
</span><p data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">FAIR is the national progressive media watchdog group, challenging corporate media bias, spin and misinformation. We work to invigorate the First Amendment by advocating for greater diversity in the press and by scrutinizing media practices that marginalize public interest, minority and dissenting viewpoints. We expose neglected news stories and defend working journalists when they are muzzled. As a progressive group, we believe that structural reform is ultimately needed to break up the dominant media conglomerates, establish independent public broadcasting and promote strong non-profit sources of information.</span></p><span data-dcnode-id="127" instrument_node="">
</span></div><span data-dcnode-id="125" instrument_node="">
