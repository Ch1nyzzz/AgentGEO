</span></div><span data-dcnode-id="1139" instrument_node="">
</span></div><span data-dcnode-id="1137" instrument_node="">
</span></div><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">A wave of exhilaration surged through the crowd when the first contingent of Chinese workers joined student hunger strikers in Tiananmen Square. Three thou­sand students started their protest in May, two days before Soviet leader Mikhail Gorbachev arrived for historic talks with China’s rulers. By the time Gorbachev left Beijing, mass demonstrations had spread to 20 Chinese cities. They kept coming in droves, young and old, farmers, teachers, more workers, journalists, even the police, singing “The Internationale” and “We Shall Overcome.” Millions of people were in the streets, celebrating, marching for human rights, empowered by their wildest hopes and dreams as they faced down a reluctant army.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Tears of communitarian joy turned to terror and grief with the ensuing crack­down. Scenes of tanks crushing makeshift barricades and mangled bodies lying in pools of blood were seen on television across the globe, as foreign journalists continued to sneak footage out of the country via satellite until the plug was pulled by Chi­nese censors. Working ’round-the-clock with hardly any sleep, US journalists pro­vided a riveting chronicle of events as they unfolded. But the US media, which ex­celled at blow-by-blow descriptions, were unable to give a cogent analysis of why China was suddenly on the brink.</span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1129" instrument_node="">Instead we heard platitudes about Deng Xiaoping’s vaunted economic reforms, which supposedly liberated China from the dungeons of Maoism and ushered in a new era of free enterprise and capitalist incen­tives. But political reform was lagging, so students got upset. “The Chinese people are furious with a system of government that promised utopia and has delivered hell,” explained Claudia Rosett, editor of the </span><strong data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Asian Wall Street Journal</span></strong><span data-dcnode-id="1126" instrument_node="">‘s editorial page. “Their only relief has come by way of Mr. Deng’s economic liberalization of the past 11 years” </span><i data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">(</span></i><strong data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">WSJ</span></strong><i data-dcnode-id="1118"><strong data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">,</span></strong><span data-dcnode-id="1119" instrument_node=""> </span></i><span data-dcnode-id="1117" instrument_node="">5/22/89).</span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1114" instrument_node="">Far from relief, Deng’s economic liber­alization delivered record-high 30% infla­tion, unemployment, hunger, and ram­pant corruption among privileged elites. A relatively stable society in the countryside, where 80% of the population resides, was turned upside down, resulting in the mass migration of peasants to beleaguered urban centers. The social dislocation caused by Deng’s reforms was even cited in the official </span><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Beijing People’s Daily</span></strong><i data-dcnode-id="1108"><strong data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">,</span></strong><span data-dcnode-id="1109" instrument_node=""> </span></i><span data-dcnode-id="1107" instrument_node="">the nation’s leading newspaper, as a key reason why workers flocked to the side of student protesters. Among popular protest slogans were: “Eradicate privilege” and “Down with offi­cial racketeering.” The huge demonstra­tions in China were in many ways a repu­diation of the government’s “free-market” policies, but the US media, with few excep­tions, failed to point this out.</span></p><span data-dcnode-id="1105" instrument_node="">
</span><h3 align="center" data-dcnode-id="1101" style="text-align: left;"><span data-dcnode-id="1102" style="font-size: large;"><b data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">China News Blackout</span></b></span></h3><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1099" instrument_node="">The massacre at Tiananmen Square was the climax of a momentous human rights drama that had been building for years in China. But the US media had rarely men­tioned human rights violations in China since the Democracy Wall Movement was crushed in 1979 and its leaders were thrown in jail. “Look at Wei Jingshen,” Deng said of a prominent Democracy Wall dissident. “We put him behind bars and the democ­racy movement died. We haven’t released him, but that did not raise much of an international uproar” </span><i data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">(</span></i><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">The Progressive</span></strong><i data-dcnode-id="1091"><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">,</span></strong><span data-dcnode-id="1092" instrument_node=""> </span></i><span data-dcnode-id="1090" instrument_node="">3/87). Wei Jingshen is still in prison, his exact whereabouts unknown.</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1087" instrument_node="">Shortly after the suppression of the Democracy Wall Movement, Deng intro­duced economic and legal reforms. “A wave of euphoria swept through US government and press circles,” recalled Roberta Cohen, who served as Deputy Assistant Secretary of State for Human Rights under Carter. “The enthusiasm for free market initiatives and other reforms became the new ration­ale for turning a blind eye to the continu­ing repression in China.” According to the State Department’s </span><i data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">1987 Country Reports on </span></i><i data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Human Rights Practices, </span></i><span data-dcnode-id="1082" instrument_node="">between two and five million people languished in Chinese labor camps and prisons. </span><strong data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">New York Times</span></strong><span data-dcnode-id="1079" instrument_node=""> correspondent Fox Butterfield reported on the existence of Chinese gulags when he was based in China in the early 1980s, but there wasn’t much follow up in the US press.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">US media remained tight-lipped when President Reagan approved sales of police equipment to China’s internal security force, expanded military ties and encouraged loans and investment, despite serious human rights abuses by the Chinese government. The brutalization of Tibet and the relent­less suppression of dissent in China were off the press agenda until late in Reagan’s second term. Meanwhile, according to Amnesty International, thousands of Chi­nese prisoners were being tortured, while others faced illegal arrests, unwarranted search and seizure, and other forms of har­assment.</span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1073" instrument_node="">Journalists were outraged when Deng &amp; Company imposed harsh press restric­tions during the crackdown in June, but US reporters appear to have practiced a form of self-censorship with respect to Chinese human rights violations for nearly a decade. “American administrations yawned at reports of repression of basic freedoms in China…. So, much too often, did American journalism,” A.M. Rosen­thal wrote in the </span><strong data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">New York Times</span></strong><span data-dcnode-id="1070" instrument_node=""> (6/13/89) shortly after the massacre at Tiananmen Square. Rosenthal’s complaint rings hol­low, for it was during his tenure as </span><strong data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Times</span></strong><span data-dcnode-id="1067" instrument_node=""> executive editor that reporting on Chinese abuses virtually ceased. No news stories on China and human rights are listed in the </span><strong data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">New York Times</span></strong><span data-dcnode-id="1064" instrument_node=""> index from 1984 through 1986. Ditto for </span><strong data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Time</span></strong><span data-dcnode-id="1061" instrument_node=""> magazine, which se­lected Deng Xiaoping as ‘Man of the Year’ in 1985. </span><strong data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Newsweek</span></strong><span data-dcnode-id="1058" instrument_node=""> managed only one story on the subject for these three years.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1055" instrument_node="">The media silence was all the more deafening in light of what transpired in China during this period. Vice-President Bush visited the People’s Republic in 1985, but this provoked none of the concern for political prisoners that journalists displayed when US officials met with Soviet leaders. And another round of student protests was put down in December 1986 by Deng Xiaoping, who stated at the time: “When necessary one must deal severely with those who defy orders. We can afford to shed some blood” </span><i data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">(</span></i><strong data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">The Progressive</span></strong><i data-dcnode-id="1047"><strong data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">,</span></strong><span data-dcnode-id="1048" instrument_node=""> </span></i><span data-dcnode-id="1046" instrument_node="">3/87). This is the man Bush hailed as a “forward-look­ing” leader.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1043" instrument_node="">When Bush visited Beijing again in February of this year, Chinese authorities prevented Fang Lizhi , a prominent human rights advocate, from attending a banquet at the US embassy, even though he had received a highly publicized invitation. President Bush subsequently failed to raise the human rights issue with Chinese offi­cials. The best he could muster was a state­ment of regret channeled through his press spokesperson Marlin Fitzwater. In a case of too little too late, editorials in major dailies chided Bush for not taking a tougher stand in Beijing </span><i data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">(</span></i><strong data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Miami Herald</span></strong><i data-dcnode-id="1035"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">,</span></strong><span data-dcnode-id="1036" instrument_node=""> </span></i><span data-dcnode-id="1034" instrument_node="">2/28/89; </span><strong data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">New York Times</span></strong><i data-dcnode-id="1028"><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">,</span></strong><span data-dcnode-id="1029" instrument_node=""> </span></i><span data-dcnode-id="1027" instrument_node="">3/1/89).</span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Fang Lizhi, who now resides in the American embassy, went a step further, accusing the US government of practicing a double standard with respect to human rights. Why, he wondered, were US offi­cials reluctant to criticize human rights abuses in China, when the Soviet Union was never treated with such deference? Lizhi might have added other questions: Was it because China had sided with the US in various regional conflicts, supplying arms to the Afghan mujahidin, the Khmer Rouge in Cambodia, UNITA in Angola, and the Nicaraguan contras? Did human rights take a back seat while US intelli­gence operated electronic listening posts along the Sino-Soviet border?</span></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">The soft treatment of China prior to the Tiananmen massacre raises broader ques­tions about reporting on human rights. Are US strategic interests paramount in deter­mining whether abuses are scrutinized? What other factors influence coverage of human rights issues? Why does the US press remain a quiet spectator in some countries, while violations in other parts of the world receive prominent attention?</span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">In an effort to explore these questions, FAIR undertook an extensive research project on the media and human rights. We interviewed over fifty people, includ­ing representatives from ten human rights organizations. We also spoke with report­ers, editors, scholars, United Nations offi­cials and former State Department person­nel. Most were eager to share their thoughts on the strengths and weaknesses of human rights coverage; some preferred to talk on a not-for-attribution basis. Although opin­ions varied on how well the media have per­formed, there was general agreement on at least one point: If the gravity of human rights violations were the sole factor in determining the amount of coverage that a country received, reporting on human rights would be substantially different.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><h3 align="center" data-dcnode-id="1012" style="text-align: left;"><span data-dcnode-id="1013" style="font-size: large;"><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">The Universal Declaration of Human Rights</span></strong></span></h3><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">We began our investigation in the fall of 1988, shortly after the United Nations General Assembly launched a World Public Information Campaign on Human Rights. The campaign was coordinated by the Human Rights Commission, the prin­cipal UN body on human rights. The Human Rights Commission has attracted some press attention in recent years, par­ticularly for its report on Cuba, which the US government instigated. However, as a general rule, little news about the UN’s hu­man rights work reaches the outside world.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">But last year offered a </span><i data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">great </span></i><span data-dcnode-id="1004" instrument_node="">news hook: the 40th anniversary of the UN’s Universal Declaration of Human Rights. Born in response to the appalling carnage wrought by the Nazis during World War II, this document is the seminal statement of rights to which every person on earth is entitled. Adopted unanimously by the UN General Assembly on December 10, 1948, the Universal Declaration (reprinted in full on pages 38 &amp; 39) affirms that a government’s behavior toward its citizens is a legitimate matter of concern to the international community. It consists of a preamble and 30 articles that set forth fundamental po­litical and civil rights, such as protection from torture, arbitrary arrest, detention or exile; freedom of expression and worship; the right to a fair trial; and the right of peaceful assembly and association. A number of articles address a range of social and economic entitlements, including the right to work; the right to an education; the right to food, clothing, housing and an adequate standard of living.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">The Universal Declaration was envi­sioned not as a binding legal agreement, but as a “standard of achievement” to which all nations should aspire. Over the years it has spawned more than 50 multilateral treaties on a range of subjects, including the rights of refugees, indigenous peoples, minorities, women and, most recently, children. It also formed the basis for the International Covenant on Civil and Politi­cal Rights and a separate Covenant on Eco­nomic, Social and Cultural Rights, both of which are legally binding for signatory countries.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">The 40th anniversary provided a golden opportunity for the UN to spread the word about the Universal Declaration and make the text, which has been published in 80 languages, available to the widest possible audience. In areas where illiteracy is high, the UN broadcast short-wave radio pro­grams in local dialects to inform people of their rights which nearly every country has pledged to respect. “Implementation of this declaration largely depends on the mass media,” explained Jan Martenson, UN Undersecretary-General for Human Rights.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="995" instrument_node="">How did the US media report on the 40th anniversary? Among network news programs, ABC’s</span><strong data-dcnode-id="993"><span data-dcnode-id="994" instrument_node=""> Nightline</span></strong><span data-dcnode-id="992" instrument_node=""> (12/9/88) pro­vided the most extensive coverage. Host Ted Koppel interviewed former President Jimmy Carter and Max Sisulu, brother of Zwelakhe Sisulu, editor of the banned anti­-apartheid publication, </span><strong data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">New Nation</span></strong><i data-dcnode-id="986"><strong data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">,</span></strong><span data-dcnode-id="987" instrument_node=""> </span></i><span data-dcnode-id="985" instrument_node="">who had just been released from a South African prison. But in his summary of the contents of the Universal Declaration, Koppel made no mention of social, economic and cul­tural rights—an omission in keeping with the dominant tendency in the US to define human rights primarily in civil-political terms.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="982" instrument_node="">This pattern of selective reporting on the Universal Declaration was evident in 32 news stories and editorials on the 40th anniversary surveyed by FAIR. Only five newspapers referred explicitly to social and economic rights; two reprinted the decla­ration in its entirety </span><i data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">(</span></i><strong data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">St. Louis Post-Dis­patch</span></strong><i data-dcnode-id="974"><strong data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">,</span></strong><span data-dcnode-id="975" instrument_node=""> </span></i><span data-dcnode-id="973" instrument_node="">12/4/88; Palo Alto’s </span><strong data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Peninsula Times Tribune</span></strong><i data-dcnode-id="967"><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">,</span></strong><span data-dcnode-id="968" instrument_node=""> </span></i><span data-dcnode-id="966" instrument_node="">12/9/88). Among our sample, the </span><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Boston Globe</span></strong><span data-dcnode-id="963" instrument_node=""> (12/11/88) was the only daily that mentioned the fact that the US gov­ernment has yet to ratify either the Civil- Political Covenant or Socio-Economic Covenant, which have been adopted by 87 and 91 nations, respectively (including the Soviet Union in both cases).</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="960" instrument_node="">A </span><strong data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">New York Times</span></strong><span data-dcnode-id="957" instrument_node=""> editorial (12/10/88) marking the 40th anniversary spoke of President Reagan’s human rights “conver­sion” in the waning days of his administra­tion. The editorial praised the State De­partment for issuing “candid annual re­ports on human rights.” Said the </span><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Times</span></strong><span data-dcnode-id="954" instrument_node="">: “There is now an American consensus that a plausible human rights policy has to strive for a single standard of judgment.”</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="951" instrument_node="">Unfortunately, US media—the </span><strong data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Times</span></strong><span data-dcnode-id="948" instrument_node=""> included—have not applied a single stan­dard of newsworthiness to human rights violations around the world. Instead, cov­erage has often reflected the geopolitical priorities of the State Department, which is obliged to provide yearly reports on the human rights situation in every UN member state. If these assessments were as “candid” as the </span><strong data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Times</span></strong><span data-dcnode-id="945" instrument_node=""> claimed, it would not be necessary for Human Rights Watch and the Lawyers Committee for Human Rights to publish a detailed critique of the numer­ous omissions, errors and distortions con­tained in the State Department’s </span><i data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Country Reports </span></i><span data-dcnode-id="942" instrument_node="">(see sidebar). These annual critiques underscore the difference between the US government’s rhetorical support for hu­man rights and the realities of its foreign policy.</span></p><span data-dcnode-id="940" instrument_node="">
</span><h3 align="center" data-dcnode-id="936" style="text-align: left;"><span data-dcnode-id="937" style="font-size: large;"><strong data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">The Human Rights Community</span></strong></span></h3><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Governments generally are not forth­coming about the status of human rights in their countries. This is not surprising, given that almost every government is guilty of human rights violations of some kind. “Good investigative journalism may occa­sionally bring abuses to light. But media coverage of human rights tends to be epi­sodic and crisis-oriented,” says Laurie Wiseberg, director of Human Rights In­ternet at Harvard, an information clearing­house for some 2000 human rights groups. “Thus it has been the nongovernmental or­ganizations which have assumed the task of providing accurate, timely and non-parti­san information about ongoing human rights abuses.”</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">The best known international human rights organization is Amnesty Interna­tional. Headquartered in London with 800,000 members worldwide, Amnesty focuses on torture, prisoners of conscience and the death penalty. Its letter-writing campaigns have succeeded in winning the release of people incarcerated because of their ethnicity, religious beliefs or ideological persuasion. “It’s not up to us to analyze the causes of human rights abuse or the ways in which they will ultimately be reversed,” explained Josh Rubenstein, director of Amnesty’s Northeast regional office in the U.S. “It’s for us simply to expose that they exist.”</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="928" instrument_node="">Media coverage of Amnesty International has increased steadily since 1977, when it was awarded the Nobel Peace Prize. Amnesty was mentioned more frequently in the </span><strong data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">New York Times</span></strong><span data-dcnode-id="925" instrument_node=""> and the </span><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Boston Globe</span></strong><span data-dcnode-id="922" instrument_node=""> during the past four years than in the previous five. (Between 1980 and 1984, the </span><strong data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Times</span></strong><span data-dcnode-id="919" instrument_node=""> referred to Amnesty 349 times, while the </span><strong data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Globe</span></strong><span data-dcnode-id="916" instrument_node=""> had 388 citations; from 1985 through 1988, the figures were 429 and 413, respectively.) Last year, a lot of publicity was generated by Amnesty’s rock concert tour. Ironically, the </span><strong data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">New York Times</span></strong><span data-dcnode-id="913" instrument_node=""> and </span><strong data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Wall Street Journal</span></strong><span data-dcnode-id="910" instrument_node=""> devoted more coverage to the concert tour than to Amnesty’s annual report on human rights violations around the world.</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Human Rights Watch—the umbrella organization of Helsinki Watch, Americas Watch, Asia Watch, Africa Watch and the newly formed Middle East Watch—has a broader mandate than Amnesty International. In addition to the core group of rights that guarantee the physical integrity of persons, the Watch Committees are concerned with freedom of speech and press, freedom of assembly and association (including labor organizing), and freedom of movement. They also monitor violations by government and opposition forces in situations of armed conflict. And they work closely with the Lawyers Committee for Human Rights, which deals primarily with the administration of justice, the right to due process and a fair trial, the rights of refugees and other judicial issues.</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="904" instrument_node="">Compared to most human rights groups, the Watch Committees have a high media profile in the U.S. Their publications are often cited by the press; reports by Helsinki Watch, which monitors the Soviet Union and Eastern Europe, probably get less attention because so many U.S. journalists have been covering that turf thoroughly. Although Watch Committee analysts are generally pleased with the press they get, their findings are sometimes misreprese</span><i data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">n</span></i><span data-dcnode-id="901" instrument_node="">ted, as in </span><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">New York Times</span></strong><span data-dcnode-id="898" instrument_node=""> correspondent Steven Erlanger’s overly optimistic account of an Asia Watch report on Indonesia, headlined “Jakarta’s Human Rights Record is Said to Improve” (11/21/88). Actually the situation in Indonesia remained extremely grim, as Aryeh Neier, executive director of Human Rights Watch, noted in a letter to the </span><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Times</span></strong><span data-dcnode-id="895" instrument_node=""> (12/28/88).</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="892" instrument_node="">The Watch Committees maintain an ongoing dialogue with reporters and editors. After representatives of Americas Watch met with members of the </span><strong data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">New York Times</span></strong><span data-dcnode-id="889" instrument_node=""> editorial board, the </span><strong data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Times</span></strong><span data-dcnode-id="886" instrument_node=""> ran an editorial, titled “Peru’s Disappearing Democracy” (12/29/88), which drew attention to the plight of Carlos Escobar Pineda, a special prosecutor who had been investigating disappearances in an area of Peru where human rights violations by the military are prevalent. Escobar had been abruptly relieved of his duties by the government and had reason to fear for his safety. The international attention generated by the </span><strong data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Times</span></strong><span data-dcnode-id="883" instrument_node=""> editorial may have saved his life. An incident like this underscores the importance of media for human rights activists.</span></p><span data-dcnode-id="881" instrument_node="">
</span><h3 data-dcnode-id="877"><span data-dcnode-id="878" style="font-size: large;"><strong data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">At Odds With Uncle Sam</span></strong></span></h3><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="875" instrument_node="">Watch Committee representatives occasionally appear on television and their op-ed columns are picked up by major newspapers. The </span><strong data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">New York Times</span></strong><span data-dcnode-id="872" instrument_node=""> has been particularly receptive, publishing 19 op­-eds by Helsinki Watch, 19 by Americas Watch, and 6 by Asia Watch between November 1985 and April 1989. But human rights groups complain that things have gotten a lot tighter since Leslie Gelb, formerly a State Department official, took over as op-ed page editor last year.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="848"><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Washington Post</span></strong><span data-dcnode-id="867" instrument_node=""> op-ed editors have not been as kindly disposed toward the Watch Committees. Over the years they have published articles by Helsinki Watch, but as a matter of policy the </span><strong data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Post</span></strong><span data-dcnode-id="864" instrument_node=""> rejected submissions by Americas Watch. The </span><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Post</span></strong><span data-dcnode-id="861" instrument_node="">‘s op-ed editors felt Americas Watch was politically biased. This is a dubious notion, given that Americas Watch is part of the same organization, and employs the same methodology, as Helsinki Watch, which isn’t viewed as biased by the </span><strong data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Post</span></strong><span data-dcnode-id="858" instrument_node="">. The difference, of course, is that Helsinki Watch scrutinizes Eastern Europe, while Americas Watch criticizes U.S.-backed regimes in Central America. The </span><strong data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Post</span></strong><span data-dcnode-id="855" instrument_node="">‘s refusal to publish their columns says more about that newspaper’s bias than it does about Americas Watch. Indeed, the only time Americas Watch made it into a </span><strong data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Washington Post</span></strong><span data-dcnode-id="852" instrument_node=""> op-ed column was when Jeane Kirkpatrick, a regular </span><strong data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Post</span></strong><span data-dcnode-id="849" instrument_node=""> columnist, attacked the group (“The Strange Viewpoint of Americas Watch,” 3/14/88).</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="846" instrument_node="">Kirkpatrick’s antipathy toward Americas Watch was shared by Reagan administration officials and certain journalists who sought to discredit the findings of human rights groups when they undermined U.S. policy. The </span><strong data-dcnode-id="842"><span data-dcnode-id="845" instrument_node="">New York Times</span><i data-dcnode-id="843"><span data-dcnode-id="844" instrument_node=""> </span></i></strong><span data-dcnode-id="841" instrument_node="">(9/24/85) quoted a State Department source saying that Americas Watch is “less a human rights organization than it is a political one.” </span><strong data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Time</span></strong><span data-dcnode-id="838" instrument_node=""> magazine (2/27/84) denigrated Americas Watch by describing it as “a controversial group that is often accused of being too sympathetic to the left.”</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="835" instrument_node="">Morton Kondracke, writing in the </span><strong data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">New Republic</span></strong><span data-dcnode-id="832" instrument_node=""> (“Broken Watch,” 8/23/88), acknowledged that Helsinki Watch and Asia Watch generally did good work, and so did Americas Watch when it focused on South America. But Central America somehow was a different matter. According to the avowedly pro-Contra Kondracke, Americas Watch favored the Nicaraguan government and the Salvadoran guerrillas. He tried to bolster his argument by quoting from an unnamed “top human rights official” in the State Department, who accused Americas Watch of “intellectual dishonesty” for “exaggerating abuses of the elected government of El Salvador and the Contras.” Similar charges were hurled at Amnesty International, the Washington Office on Latin America and other groups when they drew attention to human rights violations in Central America.</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="829" instrument_node="">Frictions between the human rights community and the Reagan administration came to full boil when Human Rights Watch director Aryeh Neier and Elliott Abrams of the State Department squared off on </span><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Nightline</span></strong><span data-dcnode-id="826" instrument_node=""> (2/13/85) to discuss U.S. immigration policy. Neier blasted the Salvadoran government and condemned the Reagan administration for acting as a systematic apologist for its abuses. His criticism of aid to the Salvadoran security forces was based on rigorously documented evidence which showed that U.S. policy was in violation of domestic and international law.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="823" instrument_node="">Neier’s prodigious staff are consummate professionals, and they have earned the respect of many journalists despite slurs by Kirkpatrick, Abrams and others. But human rights organizations were at a dis­tinct disadvantage in their feud with the U.S. government. Despite their best efforts, Washington continued to set the news agenda on human rights in Central America. </span><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">New York Times</span></strong><span data-dcnode-id="820" instrument_node=""> correspondent James LeMoyne, who covered El Salvador and the Contras during the mid-1980s, admitted as much when he told a Hunter College audi­ence in New York City last November that human rights reporting was “policy-driven.”</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">In this respect, reporting on human rights is similar to foreign policy coverage in general. But “policy-driven” took on a special meaning during the Reagan years. Drawing upon the expertise of US Army psychological warfare specialists, the State Department’s Office of Public Diplomacy launched an aggressive propaganda cam­paign designed to focus scrutiny on Nica­ragua while deflecting attention from far worse abuses in neighboring countries (see Kornbluh, page 20). Although the State Department couldn’t refute the specific findings of organizations like Americas Watch, Witness for Peace and the Wash­ington Office on Latin America, the public diplomacy offensive was nonetheless suc­cessful in shifting the focus of media dis­cussion.</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="814" instrument_node="">Case in point: </span><strong data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">ABC</span></strong><span data-dcnode-id="811" instrument_node="">‘s </span><strong data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Nightline</span></strong><span data-dcnode-id="808" instrument_node=""> ran 27 programs on Central America between January 1985 and April 1988. A FAIR study by sociologists William Hoynes and David Croteau disclosed that 22 of these programs dealt principally with problems or conflict in Nicaragua; not one focused on Honduras, El Salvador or Guatemala </span><i data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">(</span></i><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Ex­tra!</span></strong><i data-dcnode-id="800"><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">,</span></strong><span data-dcnode-id="801" instrument_node=""> </span></i><span data-dcnode-id="799" instrument_node="">1-2/89). FAIR’s study prompted Ted Koppel to concede that </span><strong data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Nightline</span></strong><span data-dcnode-id="796" instrument_node=""> had been covering Central Amer­ica too narrowly, with not “as many programs as we ought to on state terrorism,” like that practiced by Salvadoran death squads (</span><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Los Angeles Times</span></strong><span data-dcnode-id="793" instrument_node="">, 2/6/89).</span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="790" instrument_node="">A similar slant was evident&nbsp; in </span><strong data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">New York Times</span></strong><span data-dcnode-id="787" instrument_node=""> coverage during the 90-day period following the signing of the Central American peace plan on August 7, 1987. FAIR tallied the column inches of 215 articles in the </span><strong data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Times</span></strong><span data-dcnode-id="784" instrument_node=""> and found a clear pattern. There </span><strong data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Times</span></strong><span data-dcnode-id="781" instrument_node=""> devoted 3.6 times more column inches to Nicaragua than to three of its neighbors combined. The ration of Nicaragua coverage to that of El Salvador was 5 to 1; Honduras 22 to 1; and Guatemala 26 to 1. This was a period of assassination and human rights reversals in El Salvador, rejection of the peace accord in Honduras and intensified warfare in Guatemala. Consider the cover­age in a single week: the brief detetentions of oppositionists in Nicaragua were re­ported far more prominently in the </span><strong data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Times</span></strong><span data-dcnode-id="778" instrument_node=""> </span><i data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">(</span></i><span data-dcnode-id="775" instrument_node="">1-16 through 1-20-88) than the murder of human rights monitors in Honduras.</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">“Journalists often take their lead from the way government officials frame issues,” said Rev. William Wipfler, formerly the human rights director for the National Council of Churches and now with the Episcopal Church Center in New York. “By emphasizing Nicaragua, the media conveyed a misleading impression about human rights problems in the region.”</span></p><span data-dcnode-id="770" instrument_node="">
</span><h3 align="center" data-dcnode-id="766" style="text-align: left;"><span data-dcnode-id="767" style="font-size: large;"><strong data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">The Presidential Factor</span></strong></span></h3><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Editors don’t make any bones about “the presidential factor.” “We’ve got to cover what the president says and does,” is the common refrain. But what happens when all the president’s men “intentionally mislead,” as Elliott Abrams confessed with­out remorse, in an effort to sell their poli­cies to the American public? What hap­pens when a president doesn’t back up his human rights rhetoric with deeds, as was often the case with Jimmy Carter as well as Reagan? Then “the presidential factor” is a recipe for distortion. There’s nothing nec­essarily conspiratorial about that, but it adds to the sense in which human rights reporting is policy-driven.</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="761" instrument_node="">Thus, when Carter took office and started to talk about making human rights the centerpiece of his foreign policy, the issue received a dramatic boost in media attention—even though a coherent human rights policy never emerged during his administration. The </span><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Los Angeles Times</span></strong><span data-dcnode-id="758" instrument_node=""> in­dex shows a sharp increase in the number of articles listed under “human rights,” with 16 references in 1976 compared to 230 in 1977, Carter’s first year in office. From then on it was downhill, as Reagan posted a much lower human rights average than Carter. Data from </span><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">CBS Evening News</span></strong><span data-dcnode-id="755" instrument_node=""> shows a similar trend: 6 segments indexed under “human rights” in 1976 compared to 93 segments in 1977, and it drops off from there.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Right from the start, Reagan showed his disregard for human rights by nominating Ernest W. Lefever to be his first Assistant Secretary of State for Human Rights. A Congressional inquiry disclosed that Lefever ran an institute that received money from the South African government to circulate view favorable to the apartheid state.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">So Elliott Abrams got the job in­stead, and human rights became a potent weapon in a full-fledged ideological war. The Reagan administration loudly decried abuses in the USSR and other “enemy” states, while pursuing a quiet policy of “constructive engagement” with South Africa, Guatemala, China and other “friendly” authoritarian regimes whose lapses were often overlooked.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="746" instrument_node="">This cold war bias was reflected in media coverage of human rights, both qualitatively and quantitatively, as Ed­ward S. Herman and Noam Chomsky have shown in </span><i data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Manufacturing Consent </span></i><span data-dcnode-id="743" instrument_node="">(Pantheon). The authors compare repression in Poland and Guatemala, and note a significant dis­parity in press attention. Example: For months the US media doggedly followed the case of Jerzy Popieluszko, the activist priest killed in 1984 by Poland’s security forces. Yet in the early 1980s more than a dozen priests were assassinated by govern­ment-sponsored death squads in Guate­mala and this was virtually ignored by the major media. Americas Watch called Guatemala “a nation of prisoners,” but it never got admitted into the pantheon of “captive nations” by the papers of record, which reserved such appellations for Po­land and Hungary. Moreover, human rights abuses in Eastern Europe were regularly traced back to Soviet occupation, while US media rarely explained Guatemalan state terror as a product of continuous US inter­vention since 1954, when a CIA-sponsored coup overthrew a democratically elected government.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="740" instrument_node="">A recent exception was the two-part series on </span><strong data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">PBS</span></strong><span data-dcnode-id="737" instrument_node="">‘s </span><strong data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Kwitny Report</span></strong><span data-dcnode-id="734" instrument_node=""> (</span><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">WNYC-TV</span></strong><span data-dcnode-id="731" instrument_node="">, 2/15/89 &amp; 2/22/89), which examined the U.S. role in Guatemalan human rights abuses. Kwitny provided historical context as he interviewed Americas Watch and exiled Guatemalan opposition leaders, as well as U.S. officials, in a hard-hitting expose that linked U.S. business interests to death squad activity. Fred Sherwood, former president of the U.S. Chamber of Commerce in Guatemala, was heard telling journalist Allan Nairn: “Why should we do anything about the death squads? They’re killing com­mies. I’d give them more power! I’d give them cartridges if I could…”</span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Guatemala has one of the worst human rights records in the Western hemisphere, yet it receives far less media attention than Nicaragua or, for that matter, El Salvador, where the Reagan administration announced early on its intention to draw the line against communism. This underscores another key point about the way in which human rights reporting is policy-driven. As Michael Posner, executive director of the Lawyers Committee for Human Rights, explained: “Countries that loom large in East/West regional conflicts get a lot more press than countries that aren’t perceived in the same geopolitical terms.” El Salva­dor and Nicaragua loomed during the Reagan administration, while Guatemala faded into hellish obscurity.</span></p><span data-dcnode-id="726" instrument_node="">
</span><h3 align="center" data-dcnode-id="722" style="text-align: left;"><span data-dcnode-id="723" style="font-size: large;"><strong data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Democracy and Human Rights</span></strong></span></h3><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">El Salvador presented U.S. strategists with their toughest job in years. Somehow they had to put a democratic smile on a government drenched in blood from carry­ing out a U.S.-financed massacre. This was achieved through a highly effective public relations campaign, whereby human rights became equated with elections, as if the latter automatically changed things for the better. Few U.S. journalists featured the protests of Maria Julia Hernandez, a lead­ing rights monitor in El Salvador, the week before Salvador’s March 1984 elections: “These elections have been imposed by the U.S. State Department to legitimize the government so it can get more U.S. military aid. All this will mean is more deaths, more violations of human rights.”</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">U.S. officials invariably called elections in friendly countries “a step toward democ­racy,” even when fraud was blatant, as in the 1984 Panamanian election of Nicolas Ardito Barletta and last year’s presidential election in Mexico. And mass media have played along, undaunted by the obvious fact that elections don’t guarantee civilian control over the military. The mere promise of elections and return to civilian rule was enough to justify renewed military aid to Haiti in 1986 and 1987, despite horrific human rights violations by successive military juntas.</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="714" instrument_node="">Some of the world’s worst human rights abuses are committed in the killing fields of Haiti, Cambodia, the Philippines, El Salvador and Guatemala. Yet these countries are all sanctified as “burgeoning democracies” by the U.S. media. In a recent Newsweek essay, “Welcome to Democracy” (5/29/89), </span><strong data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Washington Post</span></strong><span data-dcnode-id="711" instrument_node=""> op-ed editor Meg Greenfield rhapsodized over “the worldwide democratic surge,” going so far as to describe El Salvador as a “democracy, or at least a pretty good approximation of it.”</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">At this point reporting on human rights becomes unintentionally Kafkaesque. Basic questions are avoided such as what does democracy mean in countries where death squads routinely carve up people (including human rights monitors) and no military officer is ever punished for a human rights offense. “Elections are certainly a crucial step toward democracy,” said Ken Roth, deputy director of Human Rights Watch, “but you can’t talk about authentic democracy unless there is also the rule of law. This apparently hasn’t sunk in with much of the press.”</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Although Congress requires the State Department to certify human rights performance before releasing security and economic assistance, this legislative ritual is often little more than a pro-forma exercise. Improvements always seem to be found at money-crunch time, and the U.S. government continues to directly foster the commission of grave abuses abroad–all in the name of “democracy.” But it’s seemingly taboo for the press to question whether promoting democracy and human rights is the true objective of U.S. foreign policy. While some reporters and editors may challenge this or that tactic (mining Nicaraguan harbors, covertly funding political candidates in El Salvador, etc.), the premise of democratic intentions is rarely examined.</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">“There is kind of an unconscious constraint among journalists that’s related to the official American definition of the situation,” says Cynthia Brown, associate director of Americas Watch. “Some influential reporters and editors have not made the distinction between elections and democracy. Instead they adopted the Reagan administration’s jargon, which has become the general parlance. It’s dangerous because the subtext is that we don’t have to worry about Latin America any more. They are electing civilian governments and therefore everything must be fine.”</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="699" instrument_node="">Many Latin American observers take Washington’s proclamations about democracy and human rights with a grain of salt. As Adolfo Perez Esquivel, the Argentine winner of the 1980 Nobel Peace Prize, told </span><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Extra!</span></strong><span data-dcnode-id="696" instrument_node="">, “Elections don’t by themselves guarantee the resolution of the problems we inherited from the U.S.-backed military dictatorships of the 1970s.” According to Perez Esquivel, who headed for over a decade the Peace and Justice Service in Latin America, a leading human rights organization on the continent: “True democracy must assure not just political liberties, but also social justice and participation of the poor. No reform will succeed in consolidating the democratic process unless it involves the participation of the workers and the unemployed, the landless, the Indians, the malnourished, the uneducated, the homeless. Only when people are organized in a range of spontaneous and free forms will they be capable of defending their rights.”</span></p><span data-dcnode-id="694" instrument_node="">
</span><h3 data-dcnode-id="690"><span data-dcnode-id="691" style="font-size: large;"><strong data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Editorial Flack</span></strong></span></h3><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="688" instrument_node="">Foreign correspondents operate under various constraints, not all of which are explicitly geopolitical in nature. The prac­tical aspects of newsgathering can be a significant factor, especially when a re­porter has a lot of territory to cover. As skillful as journalists like Alan Riding and James Brooke of the </span><strong data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">New York Times</span></strong><span data-dcnode-id="685" instrument_node=""> may be, they can do only so much when they are expected to cover much of Africa or most of South America. Oftentimes when report­ers file human rights stories they have to struggle with their editors to get them published.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Overseas news bureaus tend to be con­centrated in countries deemed most impor­tant to the U.S. This may result in more comprehensive coverage of human rights abuses in the area where a correspondent is based. It also could have the opposite impact, if journalists tone down their reporting for fear of losing access to official sources. They may not want to foul their own nests,” said Aryeh Neier. Moreover, it’s not easy to get information in certain coun­tries, and government officials may not be cooperative. Journalists who antagonize their hosts run the risk of expulsion, or worse. Sixty-four journalists have been killed or “disappeared” since January 1987, according to the New York-based Com­mittee to Protect Journalists.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">The entire Australian press corps was banned from Indonesia, a nation where political and civil rights have been system­atically suppressed during President Suharto’s 24-year dictatorial rule. Although Indonesia is the world’s fifth most popu­lous country, it receives scant attention in the US media—partly because of tight re­strictions on journalists, but also because Indonesia is not a focal point of East/West conflict. Press coverage was minimal even when the US-backed Indonesian army massacred an estimated half-million people in 1965. And the blackout continued when Indonesia—armed by the US—invaded East Timor and killed another 100,000 in the 1970s. Despite a continuing record of torture, disappearances, summary execu­tions and thousands of political incarcera­tions, Suharto got a free ride in the press when he visited Washington last June to discuss economic matters. “Talk about a teflon president—Indonesia is a teflon country,” says Asia Watch director Sydney Jones.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="676" instrument_node="">While a lack of access can be an inhib­iting factor, the quality of reporting on human rights, like foreign coverage in general, depends largely on the initiative of individual journalists. Some reporters ag­gressively pursue human rights stories with exceptional results. This was the case with </span><strong data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">New York Times</span></strong><span data-dcnode-id="673" instrument_node=""> correspondent Raymond Bonner, who dared to visit the dumping grounds near San Salvador where govern­ment-sponsored death squads left their mutilated victims in the early 1980s, just when the White House was proclaiming that country a “fledgling democracy.” But Bonner ran into certain institutional con­straints—in particular editors like A.M. Rosenthal, who respond to pressure from Washington—and after several months of aggressive reporting he was yanked out of El Salvador.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="670" instrument_node="">“Oftentimes there are significant dis­crepancies between stories filed by beat reporters and editorials in the same newspaper,” notes Paula Newberg, a consultant to the Lawyers Committee for Human Rights. This was the case when a </span><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">New York Times</span></strong><span data-dcnode-id="667" instrument_node=""> editorial, “Not So Regressive in Korea” (3/25/89), praised President Roh Tae Woo, after he postponed a plebiscite promised during his election campaign. “Friends of South Korean democracy shouldn’t be alarmed,” said the </span><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Times</span></strong><i data-dcnode-id="661"><strong data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">.</span></strong><span data-dcnode-id="662" instrument_node=""> </span></i><span data-dcnode-id="660" instrument_node="">“In his first year in office, President Roh has already laid to rest doubts about his demo­cratic convictions.. ..He has let workers struggle for long-denied union rights and kept the powerful security forces leashed.” A few days later the </span><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Times</span></strong><span data-dcnode-id="657" instrument_node=""> ran a brief </span><strong data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Reuters</span></strong><span data-dcnode-id="654" instrument_node=""> dispatch (3/31/89) that stated: “More than 10,000 riot police, firing tear gas and in full battle gear, stormed [South Korea’s] biggest shipyard early today and arrested workers….Strikers fought back with stones, gasoline bombs and clubs. About 700 people were arrested and 20 wounded…” So much for keeping the security forces “leashed” and letting workers “struggle for long-denied union rights.”</span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="651" instrument_node="">Another example of discontinuity be­tween editorials and news stories can be found in the </span><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Washington Post</span></strong><span data-dcnode-id="648" instrument_node="">‘s coverage of human rights violations in the Israeli-oc­cupied West Bank and Gaza Strip. Corre­spondent Glenn Frankel has often brought abuses to the fore, quoting human rights groups, Palestinian detainees and US State Department sources in his articles. Mean­while the </span><strong data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Post</span></strong><span data-dcnode-id="645" instrument_node="">‘s editorial page (2/8/89) offered palliatives with this ideological two-step: “What counts most is the nature of the system…That Israel is at heart a democratic country remains its core strength”.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="642" instrument_node="">John Healey, executive director of Amnesty International USA, responded to these remarks in a letter to the </span><strong data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Post</span></strong><span data-dcnode-id="639" instrument_node=""> (2/17/89). “Visualize the arm of a teenager held out by soldiers and broken at midshaft,” said Healey, “a rock-thrower lying dead with a bullet in his back or an infant in her cradle asphyxiated by tear gas</span><i data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">. </span></i><span data-dcnode-id="636" instrument_node="">Next, rec­ord the name and age of each person who has been abused—and chronicle dozens of deaths as a result of plastic bullets and many thousands of wounded people. Fi­nally, count the thousands imprisoned without trial and the scores tortured. Now, turn to an editorial by the </span><strong data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Post</span></strong><span data-dcnode-id="633" instrument_node=""> and read, ‘What counts most, however, is the nature of the system.'”</span></p><span data-dcnode-id="631" instrument_node="">
</span><h3 align="center" data-dcnode-id="627" style="text-align: left;"><span data-dcnode-id="628" style="font-size: large;"><strong data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Under the Volcano</span></strong></span></h3><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Coverage of human rights violations in the Occupied Territories has become re­petitive, almost numbing, as every week a few more Palestinian youths die, their bod­ies embalmed in cold statistics and buried in two-paragraph graves. Ongoing repres­sion quickly becomes old news, and old news doesn’t make good copy. How many times can a journalist file a story about another human rights monitor murdered in the Philippines? Or another boatload of refugees forced to return to Haiti?</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="622" instrument_node="">Human rights violations in many coun­tries are ignored until the situation erupts in a major crisis. This was the case in the Occupied Territories, where serious abuses had long been neglected by US journalists prior to the </span><i data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">intifada. </span></i><span data-dcnode-id="619" instrument_node="">Likewise, the press did little to inform us about the anger and discontent seething in places like Nigeria, Egypt and Venezuela until food riots broke out in recent months. Numerous other examples fit the same pattern.</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="616" instrument_node="">The news value of a particular country is enhanced if a local lobby in the US draws attention to what is happening back home. Thus, Cuba will get more coverage in the </span><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Miami Herald</span></strong><span data-dcnode-id="613" instrument_node=""> than in most newspapers. Many US citizens have roots in Eastern Europe, and these historical ties undoubt­edly contribute to public concern about human rights abuses in countries like Po­land and Czechoslavakia. It also helps to have a hero such as Andrei Sakharov or Lech Walesa for a news peg.</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="610" instrument_node="">To much of the mass media, the plight of another hero, Nelson Mandela, embodies the struggle for human rights in South Africa. But where are the heros in the rest of sub-Saharan Africa? U.S. press coverage of Africa is minimal, even though terrible human rights violations are rampant across the continent. An Amnesty International survey conducted by Anne Geyer showed that Africa is the most consistently under-reported region in the world. Only two news stories on Africa indexed under “human rights” and “political prisoners” ran in </span><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Time</span></strong><span data-dcnode-id="607" instrument_node=""> magazine between 1980 and 1986; </span><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">CBS Evening News</span></strong><span data-dcnode-id="604" instrument_node=""> aired three stories on the subject during the same period. (Soviet human rights prob­lems received the most coverage, according to Amnesty’s survey.)</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="601" instrument_node="">It barely entered public consciousness in the US when 400,000 Somalis fled their war-torn East African country last sum­mer. Initially backed by Moscow in its conflict with Ethiopia, Somalia’s principal military supplier is now the US. It has committed many atrocities against unarmed civilians. (Ironically, Libya also supplies weapons to Somalia.) Similarly, the mas­sacre in Burundi last year came and went with hardly any follow-up in the press. Such incidents in obscure places are </span><i data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">ig­</span></i><i data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">nored </span></i><span data-dcnode-id="596" instrument_node="">in large part because they have only minor impact on US economic interests or East/West relations. Racial bias is also a factor. As one media professional told Am­nesty International: “Perhaps small, dark people being tortured is not considered as relevant as big, white people being tor­tured.”</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="593" instrument_node="">Journalists quip that you have to add a few zeros to the number of casualties in Africa before it is deemed newsworthy. One could say the same for parts of Asia and the Middle East. It’s difficult to get information about human rights in many Arab countries partly because of a lack of indigenous human rights monitors. Saudi Arabia, often praised in the U.S. as a “moderate” Arab state, was cited in a Human Rights Watch study as a country where “as far as we know, no one is able to engage in human rights monitoring, or, if anyone does this, no information about the efforts has penetrated the country’s borders.” Torture and floggings of prisoners are common in Saudi Arabia, according to Amnesty International, but such abuses weren’t mentioned in an upbeat series on Saudi modernization by Youssef Ibrahim in the </span><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">New York Times</span></strong><span data-dcnode-id="590" instrument_node=""> (4/7/89, 4/26/89 &amp; 4/29/89).</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Among the 35 signatory nations of the 1975 Helsinki Accord, Turkey is one of the most egregious human rights violators, yet is a low priority for US media. When the Turkish government figures in human rights stories, they are usually about the brutal mistreatment of the Kurdish ethnic minority (see page 58). Occasional articles discuss the Bulgarian government’s perse­cution of its Turkish minority. But very little is said about the Turkish govern­ment’s ongoing oppression of its own people.</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">“The coverage of Turkey is terrible,” says Helsinki Watch director Jeri Laber. “It’s amazing how little gets into the press.” Laber has spoken with US journalists who have filed human rights stories from Tur­key (the fourth largest recipient of US aid), only to have them killed by editors more interested in travel articles. Ironically, free­dom of movement is a right many Turks cannot exercise. Since the military coup in 1980, as many as 300,000 Turkish citizens have been denied passports, and, according to Amnesty International, 250,000 politi­cal prisoners were detained and nearly all were tortured; 200 Turks died while in custody because of torture.</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Turkey gets far more coverage in West­ern European countries with large commu­nities of Turkish immigrants and guest workers. Even so, one might think that US news organizations would show more inter­est when their own employees are brutal­ized by Turkish authorities. But the US media didn’t publicize the case of Ismet Imset, a UPI reporter who was beaten and imprisoned on trumped-up charges in 1984. (Imset was fired by UPI after he criticized how it responded to the incident.)Nor have US media shown much concern for the 2000 reporters and editors who’ve been tried in Turkish courts since a civilian government was installed in 1983, or the 41 journalists currently in jail.</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Labor unions have also been a prime target of Turkish government repression. Martial law in Turkey in the early 1980s put an end to collective bargaining, and the trade union movement was decimated by mass arrests, torture and executions. This occurred at a time when the fledgling Solidarity movement in Poland was receiving a great deal of U.S. press attention. Driven more by U.S. policy interests than by a concern for human rights, many in the mass media averted their eyes from the nightmare in Turkey, and thereby helped to perpetuate it.</span></p><span data-dcnode-id="576" instrument_node="">
</span><h3 data-dcnode-id="572"><span data-dcnode-id="573" style="font-size: large;"><strong data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">“The Cold War is Over…Long Live the Cold War!”</span></strong></span></h3><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Throughout the Reagan administration, human rights groups keep producing reports and publicizing their findings, even when they cut against the grain of U.S. foreign policy. The work of Amnesty Inter­national, the Watch Committees and other monitors was often an irritant to govern­ments around the world, including the U.S. This constant prodding was partly respon­sible for a reassessment of strategic think­ing on human rights by US officials.</span></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Perhaps more importantly, events of­ten outpaced U.S. foreign policy, forcing the U.S. government, in last-minute policy shifts, to engineer the departures of Jean Claude Duvalier from Haiti and Ferdinand Marcos from the Philippines. Prompted by the realization that governments which systematically abuse human rights aren’t always the most dependable surrogates, the State Department even started to criticize General Augusto Pinochet, the Chilean dictator, who came to power in a U.S.- supported coup.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="564" instrument_node="">Reagan’s human rights “conversion,” as the </span><strong data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">New York Times</span></strong><span data-dcnode-id="561" instrument_node=""> (12/10/88) would later describe it, was mostly a matter of expediency, as US strategists scrambled to keep up with momentous changes around the globe, particularly in Gorbachev’s Soviet Union. Concurrent with the release of hundreds of political prisoners and the emergence of thousands of grassroots or­ganizations, Soviet television showed pho­tos of skeletons dug up from mass graves in an effort to exorcise long-suppressed de­mons from the Stalin era. This national soul-searching had significant implications for human rights throughout Eastern Eu­rope and beyond. But as new reforms were being implemented in the USSR, old myths were kept alive by the U.S. media.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="558" instrument_node="">Earlier this year, 35 nations, including the U.S. and the Soviet Union, issued a groundbreaking East/West pact on human rights. The Vienna agreement, according to </span><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">New York Times</span></strong><span data-dcnode-id="555" instrument_node=""> correspondent Robert Pear, “provides new legal standards by which to judge the conduct of Soviet-bloc countries” (1/17/89). Presumably the con­duct of the U.S. and Western European nations will also be judged by these new legal standards, but Pear didn’t say so. He was too caught up in outmoded constructs such as the “Soviet-bloc.”</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">By now it should be apparent that the topography of human rights in Eastern Europe is far too complex and variegated to fit neatly into a single “bloc.” Yet the image still resounds throughout U.S. news coverage. Romania, once Washington’s favorite communist country in Eastern Europe, is now a pariah state denounced by its socialist neighbors. “A disaster…the worst in Eastern Europe,” is how Helsinki Watch summed up human rights in Romania. Yet for years it got off easy in the US press, which appeared smitten by Romania’s mav­erick foreign policy of maintaining rela­tions with China and Israel.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="549" instrument_node="">Of Poland, Helsinki Watch now says: “No serious problems”—a remarkable de­velopment in a country scarred by a history of human rights defeats. All eyes were on Poland in July, when President Bush pulled into Warsaw for some </span><i data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">ostpoliticking. </span></i><span data-dcnode-id="546" instrument_node="">U.S. media often seem ready to put the best face on Bush’s lackluster outings. This time, however, they had to go the extra distance for a positive spin.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="543" instrument_node="">Bush got a distinctly cool reception in Poland, a country deeply in hock to U.S. and Western banks. How this debt may have contributed to Poland’s economic woes was never discussed, just as journalists did not examine what role foreign (including U.S.) capital played in exacerbating conditions that led to the recent uprising in China. Manifesting a selective concern for work­ers’ rights, </span><strong data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">New York Times</span></strong><span data-dcnode-id="540" instrument_node=""> correspondent Fox Butterfield worried that the formation of independent trade unions in China on the Solidarity model might doom economic modernization in that country (</span><strong data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">ABC</span></strong><span data-dcnode-id="537" instrument_node=""> </span><strong data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Night</span></strong><strong data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">line</span></strong><i data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">, </span></i><span data-dcnode-id="530" instrument_node="">5/25/89).</span></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">The tumultuous events in China and Solidarity’s electoral triumph in Poland ended up being more grist for the media’s anti-communist mill. The Reds are going down for the count, we were told. The cold war is over, and the U.S. has won! But amidst all the brouhaha about the collapse of communism, an ironic twist went unnoticed by most media. For years journalists had depicted communist societies as hopelessly totalitarian, completely immune to reform. Yet in almost every communist country people are asserting themselves in ways that shame our own passivity and refute the eternal Red Devil myth that Americans were raised on.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="524" instrument_node="">Pronouncements about winning the cold war are a sure sign the media haven’t given up the fight. This was evident when Dan Rather and Leslie Stahl did a stand-up on </span><strong data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">CBS Evening News</span></strong><span data-dcnode-id="521" instrument_node=""> (7-12-89) as Bush arrived in the Hungarian capital of Budapest. Rather noted that Bush had refrained from criticizing Gorbachev on his own turf. “Does this mean George Bush is going to give Gorbachev a free-fire zone and never answer back?” he asked Stahl. They bantered about the “competition” between Bush and Gorbachev, musing over who had the upper hand in the PR battle. Disarmament was now part of the “compe­tition,” according to Stahl, as the super­power chiefs played a game of weapons reduction one-upsmanship. Bush would “stay on the offensive,” she stated, by making some new proposals when he goes to Paris to meet with Western leaders.</span></p><span data-dcnode-id="519" instrument_node="">
