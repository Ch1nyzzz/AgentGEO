</span><li class="graylink" data-dcnode-id="3570"><a data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//es.gatestoneinstitute.org/13344/migracion-derecho-humano"><span data-dcnode-id="3572" instrument_node="">Spanish</span></a></li><span data-dcnode-id="3569" instrument_node="">
</span><li class="graylink" data-dcnode-id="3566"><a data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sv.gatestoneinstitute.org/13284/fn-migration-mansklig-rattighet"><span data-dcnode-id="3568" instrument_node="">Swedish</span></a></li><span data-dcnode-id="3565" instrument_node="">

</span><div data-dcnode-id="3253" id="print_content_3"><div data-dcnode-id="3541" itemprop="description"><span data-dcnode-id="3555" instrument_node="">
</span><ul class="content_preface_bullets" data-dcnode-id="3543"><li data-dcnode-id="3552"><p data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">It cannot be stressed enough that this agreement is not about refugees fleeing persecution, or their rights to protection under international law. Instead, the agreement propagates the radical idea that migration -- for any reason -- is something that needs to be promoted, enabled and protected.</span></p></li><span data-dcnode-id="3551" instrument_node="">
</span><li data-dcnode-id="3548"><p data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">The UN has no interest in admitting that its agreement promotes migration as a human right; until recently, there has been little debate about it. More debate might risk jeopardizing the entire project.</span></p></li><span data-dcnode-id="3547" instrument_node="">
</span><li data-dcnode-id="3544"><p data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">UN member states are not only supposed to open their borders for the migrants of the world, but should also help them pick and choose their future country by providing them with comprehensive information about each country they may wish to settle in.</span></p></li></ul><span data-dcnode-id="3542" instrument_node="">
</span></div><span data-dcnode-id="3540" instrument_node="">
</span><div class="article_body itemprop_articlebody" data-dcnode-id="3339" itemprop="articleBody"><span data-dcnode-id="3539" instrument_node="">
</span><p data-dcnode-id="3538"></p><span data-dcnode-id="3537" instrument_node="">
</span><span data-dcnode-id="3536" instrument_node="">
</span><span data-dcnode-id="3529" instrument_node="">
</span><span data-dcnode-id="3527" instrument_node="">
</span><table align="center" border="0" cellpadding="0" cellspacing="0" data-dcnode-id="3525" style="margin-bottom:5px; max-width:600px;"><tbody data-dcnode-id="3526"><tr data-dcnode-id="3528"><td data-dcnode-id="3530" style="max-width:600px; border:1px solid black;"><img border="0" data-dcnode-id="3535" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gatestoneinstitute.org/pics/3595.jpg&amp;raw" style="max-width:100%;"><p data-dcnode-id="3532" style="font-size:82%; margin:4px 6px;"><span data-dcnode-id="3533" instrument_node="">A new UN agreement, which almost all member states plan to sign in December, propagates the radical idea that migration -- for any reason -- is something that needs to be promoted, enabled and protected. Pictured: Migrants walk through fields towards a holding camp in the village of Dobova, Slovenia on October 26, 2015. (Photo by Jeff J Mitchell/Getty Images)</span></p></td></tr></tbody></table><p data-dcnode-id="3524"></p><span data-dcnode-id="3523" instrument_node="">
</span><p data-dcnode-id="3518"><span data-dcnode-id="3522" instrument_node="">The United Nations, in a non-binding agreement that almost all UN member states will </span><a data-dcnode-id="3520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.un.org/en/conf/migration/"><span data-dcnode-id="3521" instrument_node="">sign at a ceremony</span></a><span data-dcnode-id="3519" instrument_node=""> in Morocco in early December, is making migration a human right.</span></p><span data-dcnode-id="3517" instrument_node="">
</span><p data-dcnode-id="3509"><span data-dcnode-id="3516" instrument_node="">The finalized text of the agreement, the </span><a data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.un.org/pga/72/wp-content/uploads/sites/51/2018/07/migration.pdf"><span data-dcnode-id="3515" instrument_node="">Global Compact for Safe, Orderly and Regular Migration</span></a><span data-dcnode-id="3513" instrument_node="">, although officially non-binding, "puts migration firmly on the global agenda. It will be a point of reference for years to come and induce real change on the ground..." </span><a data-dcnode-id="3511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.un.org/development/desa/en/news/nocat-uncategorized/un-finalizes-first-ever-global-compact-for-migration.html"><span data-dcnode-id="3512" instrument_node="">according</span></a><span data-dcnode-id="3510" instrument_node=""> to Jürg Lauber, the representative of Switzerland to the UN -- who led the work on the agreement together with the representative of Mexico.</span></p><span data-dcnode-id="3508" instrument_node="">
</span><p data-dcnode-id="3503"><span data-dcnode-id="3507" instrument_node="">One immediate irony, of course, is that few countries have entry requirements as restrictive as Switzerland's. If one wishes to stay more than three months, not only is a </span><a data-dcnode-id="3505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.internations.org/switzerland-expats/guide/moving-to-switzerland-15502/residence-permits-for-switzerland-3"><span data-dcnode-id="3506" instrument_node="">"residence permit" required</span></a><span data-dcnode-id="3504" instrument_node="">, but, "In an effort to limit immigration from non-EU/EFTA countries, Swiss authorities impose strict annual limitations on the number of residence and work permits granted to foreigners."</span></p><span data-dcnode-id="3502" instrument_node="">
</span><p data-dcnode-id="3497"><span data-dcnode-id="3501" instrument_node="">These hard-to-come-by-residencies have, unsurprisingly, </span><a data-dcnode-id="3499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.swissinfo.ch/eng/society/hundreds-of-rich-foreigners-buy-swiss-residency-thanks-to-derogation/42951460"><span data-dcnode-id="3500" instrument_node="">become</span></a><span data-dcnode-id="3498" instrument_node=""> a source of income as "[r]ich foreigners 'buy' Swiss residency."</span></p><span data-dcnode-id="3496" instrument_node="">
</span><p data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">The UN agreement, on the other hand, notes:</span></p><span data-dcnode-id="3493" instrument_node="">
</span><blockquote data-dcnode-id="3489"><p data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">"Refugees and migrants are entitled to the same universal human rights and fundamental freedoms, which must be respected, protected and fulfilled at all times." (Preamble, section 4)</span></p><span data-dcnode-id="3490" instrument_node="">
</span></blockquote><span data-dcnode-id="3488" instrument_node="">
</span><p data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">It cannot be stressed enough that this agreement is not about refugees fleeing persecution, or their rights to protection under international law. Instead, the agreement propagates the radical idea that migration -- for any reason -- is something that needs to be promoted, enabled and protected. Almost all UN member states, except for the United States, Austria, Australia, Croatia, Hungary and possibly also the Czech Republic and Poland, are expected to sign it.</span></p><span data-dcnode-id="3485" instrument_node="">
</span><p data-dcnode-id="3480"><span data-dcnode-id="3484" instrument_node="">The UN has denied that migration is being made into a human right. "The question of whether this is an invidious way to start promoting a 'human right to migrate' is not correct. It's not in the text; there's no sinister project to advance that," Louise Arbour, the UN special representative for international migration, recently </span><a data-dcnode-id="3482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2018/nov/01/austria-criticised-not-signing-un-global-migration-compact-european-commission"><span data-dcnode-id="3483" instrument_node="">said</span></a><span data-dcnode-id="3481" instrument_node="">.</span></p><span data-dcnode-id="3479" instrument_node="">
</span><p data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">The UN has no interest in admitting that the agreement promotes migration as a human right; until recently there has been little debate about it. More debate might risk jeopardizing the entire project. The wording of the agreement, as documented below, leaves little doubt, however, that with the signing of the agreement, migration will indeed become a human right.</span></p><span data-dcnode-id="3476" instrument_node="">
</span><p data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">The agreement is divided into 23 objectives toward which the signatories apparently wish to work. Objective number three, for instance, envisions the promotion and enabling of migration through a number of means. Signatory states commit to:</span></p><span data-dcnode-id="3473" instrument_node="">
</span><blockquote data-dcnode-id="3469"><p data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">"Launch and publicize a centralized and publicly accessible national website to make information available on regular migration options, such as on country-specific immigration laws and policies, visa requirements, application formalities, fees and conversion criteria, employment permit requirements, professional qualification requirements, credential assessment and equivalences, training and study opportunities, and living costs and conditions, in order to inform the decisions of migrants."</span></p><span data-dcnode-id="3470" instrument_node="">
</span></blockquote><span data-dcnode-id="3468" instrument_node="">
</span><p data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">States, in other words, are not only supposed to open their borders for the migrants of the world, but should also help them pick and choose their future country by providing them with comprehensive information about each country they may wish to settle in.</span></p><span data-dcnode-id="3465" instrument_node="">
</span><p data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">The service level envisioned to facilitate more migration is also high. Countries are called upon to:</span></p><span data-dcnode-id="3462" instrument_node="">
</span><blockquote data-dcnode-id="3458"><p data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">"Establish open and accessible information points along relevant migration routes that can refer migrants to child-sensitive and gender-responsive support and counselling, offer opportunities to communicate with consular representatives of the country of origin, and make available relevant information, including on human rights and fundamental freedoms, appropriate protection and assistance, options and pathways for regular migration, and possibilities for return, in a language the person concerned understands."</span></p><span data-dcnode-id="3459" instrument_node="">
</span></blockquote><span data-dcnode-id="3457" instrument_node="">
</span><p data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">Once migrants have arrived at their chosen destination, the signatory countries commit to:</span></p><span data-dcnode-id="3454" instrument_node="">
</span><blockquote data-dcnode-id="3450"><p data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">"Provide newly arrived migrants with targeted, gender-responsive, child-sensitive, accessible and comprehensive information and legal guidance on their rights and obligations, including on compliance with national and local laws, obtaining of work and resident permits, status adjustments, registration with authorities, access to justice to file complaints about rights violations, as well as on access to basic services."</span></p><span data-dcnode-id="3451" instrument_node="">
</span></blockquote><span data-dcnode-id="3449" instrument_node="">
</span><p data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">Migrants are, evidently, citizens of a new world, in which all countries must spring to the assistance of anyone who has chosen to travel and reside there for whatever reason. Borders may exist in theory, but the UN -- comprising nearly all governments of the world -- is working hard at making them disappear in practice.</span></p><span data-dcnode-id="3446" instrument_node="">
</span><p data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">Migrants, according to the agreement, must also be "empowered to realize full inclusion and social cohesion" in their new countries (objective 16). This means, among other things, that countries must:</span></p><span data-dcnode-id="3443" instrument_node="">
</span><blockquote data-dcnode-id="3439"><p data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">"Promote mutual respect for the cultures, traditions and customs of communities of destination and of migrants by exchanging and implementing best practices on integration policies, programmes and activities, including on ways to promote acceptance of diversity and facilitate social cohesion and inclusion."</span></p><span data-dcnode-id="3440" instrument_node="">
</span></blockquote><span data-dcnode-id="3438" instrument_node="">
</span><p data-dcnode-id="3433"><span data-dcnode-id="3437" instrument_node="">All cultures are equal and must be equally respected. Presumably, this means that, for example, the tradition of female genital mutilation (FGM), which </span><a data-dcnode-id="3435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/news/worldviews/wp/2018/07/20/most-girls-in-somalia-experience-genital-mutilation-the-ritual-just-killed-a-10-year-old/%3Fnoredirect%3Don%26utm_term%3D.ed16056a52e2"><span data-dcnode-id="3436" instrument_node="">almost all Somali women experience</span></a><span data-dcnode-id="3434" instrument_node=""> in Somalia, must be acknowledged in London and Paris as deserving of "mutual respect" in the same way that it would back in Mogadishu.</span></p><span data-dcnode-id="3432" instrument_node="">
</span><p data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">The agreement goes on to enumerate the work that states must initiate to accommodate migrants. "National... policy goals regarding the inclusion of migrants in societies, including on labour market integration, family reunification, education, non-discrimination and health" should be developed. In addition, the host country should facilitate "access to decent work and employment for which they are most qualified, in accordance with local and national labour market demands and skills supply."</span></p><span data-dcnode-id="3429" instrument_node="">
</span><p data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">In other words, newly arrived migrants in, say, Europe, should have the same, or at least very similar, rights to education, the labor market and health care, as Europeans, who have worked hard and paid taxes for half a century to gain access to those very same things. Europeans, of course, will have to pay for all of this out of their tax money.</span></p><span data-dcnode-id="3426" instrument_node="">
</span><p data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">The authors of the agreement evidently do not expect it to go down all that well with their populations. An agreement to facilitate mass migration into primarily Western countries from the rest of the world (there is no migration to speak of in the opposite direction) may prove a bit much for people in the West. The agreement therefore clearly signals that any disagreement with the agenda will not be accepted and that the signatory states will work to dispel "misleading narratives that generate negative perceptions of migrants."</span></p><span data-dcnode-id="3423" instrument_node="">
</span><p data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">To make this objective a reality, the signatory states first commit to:</span></p><span data-dcnode-id="3420" instrument_node="">
</span><blockquote data-dcnode-id="3416"><p data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">"Promote independent, objective and quality reporting of media outlets, including internet-based information, including by sensitizing and educating media professionals on migration-related issues and terminology, investing in ethical reporting standards and advertising, and stopping allocation of public funding or material support to media outlets that systematically promote intolerance, xenophobia, racism and other forms of discrimination towards migrants, in full respect for the freedom of the media." (Objective 17)</span></p><span data-dcnode-id="3417" instrument_node="">
</span></blockquote><span data-dcnode-id="3415" instrument_node="">
</span><p data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">This is Orwell on steroids. Almost all UN member states will sign an agreement that says media outlets that disagree with government policies will not be eligible for public funding? On top of this, the agreement claims, bizarrely, that it is being written "in full respect for the freedom of the media", as if that is going to make anyone actually believe it.</span></p><span data-dcnode-id="3412" instrument_node="">
</span><p data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">Second, the signatory states commit to:</span></p><span data-dcnode-id="3409" instrument_node="">
</span><blockquote data-dcnode-id="3405"><p data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">"... eliminate all forms of discrimination, condemn and counter expressions, acts and manifestations of racism, racial discrimination, violence, xenophobia and related intolerance against all migrants in conformity with international human rights law." (Objective 17)</span></p><span data-dcnode-id="3406" instrument_node="">
</span></blockquote><span data-dcnode-id="3404" instrument_node="">
</span><p data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">The agreement, conveniently, offers no definitions of what constitutes "racism" or "xenophobia" in this context. What, for example, is "related intolerance"? Is criticism of UN migration policies, for instance, "intolerance"?</span></p><span data-dcnode-id="3401" instrument_node="">
</span><p data-dcnode-id="3396"><span data-dcnode-id="3400" instrument_node="">Originally, all UN member states, minus the United States, had </span><a data-dcnode-id="3398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-global-migration-pact/u-n-countries-agree-on-pact-to-manage-mass-global-migration-idUSKBN1K32YW"><span data-dcnode-id="3399" instrument_node="">approved</span></a><span data-dcnode-id="3397" instrument_node=""> the finalized text of the agreement and appeared ready to sign it in December. Recently, however, more states have announced that they are withdrawing from the agreement.</span></p><span data-dcnode-id="3395" instrument_node="">
</span><p data-dcnode-id="3390"><span data-dcnode-id="3394" instrument_node="">In July, Hungary withdrew from the agreement. Hungarian Foreign Minister Peter Szijjarto </span><a data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dw.com/en/hungary-joins-us-in-refusing-uns-safe-global-migration-compact/a-44733306"><span data-dcnode-id="3393" instrument_node="">described</span></a><span data-dcnode-id="3391" instrument_node=""> it as "entirely against Hungary's security interests," and added:</span></p><span data-dcnode-id="3389" instrument_node="">
</span><blockquote data-dcnode-id="3385"><p data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">"This pact poses a threat to the world from the aspect that it could inspire millions [of migrants]. Its main premise is that migration is a good and inevitable phenomenon. We consider migration a bad process, which has extremely serious security implications."</span></p><span data-dcnode-id="3386" instrument_node="">
</span></blockquote><span data-dcnode-id="3384" instrument_node="">
</span><p data-dcnode-id="3379"><span data-dcnode-id="3383" instrument_node="">In July, Australia also indicated that it would withdraw from the agreement, at least in its present form. </span><a data-dcnode-id="3381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.theguardian.com/australia-news/2018/jul/25/dutton-says-australia-wont-surrender-our-sovereignty-by-signing-un-migration-deal"><span data-dcnode-id="3382" instrument_node="">According</span></a><span data-dcnode-id="3380" instrument_node=""> to Minister for Home Affairs Peter Dutton:</span></p><span data-dcnode-id="3378" instrument_node="">
</span><blockquote data-dcnode-id="3374"><p data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">"We're not going to sign a deal that sacrifices anything in terms of our border protection policies... We're not going to surrender our sovereignty – I'm not going to allow unelected bodies dictate to us, to the Australian people."</span></p><span data-dcnode-id="3375" instrument_node="">
</span></blockquote><span data-dcnode-id="3373" instrument_node="">
</span><p data-dcnode-id="3365"><span data-dcnode-id="3372" instrument_node="">In November, both the Czech Republic, and Poland </span><a data-dcnode-id="3370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.express.co.uk/news/world/1040349/poland-un-global-compact-for-migration-united-nations"><span data-dcnode-id="3371" instrument_node="">announced</span></a><span data-dcnode-id="3369" instrument_node=""> that they were very likely to withdraw from the agreement and Croatian President Kolinda Grabar-Kitarovic wrote in a statement that she would not be signing the agreement. "Our sovereign principles on securing our borders and controlling migration flows are absolutely the priority for us", </span><a data-dcnode-id="3367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irishtimes.com/news/world/europe/poles-and-czechs-follow-austria-and-hungary-in-rejecting-un-migration-pact-1.3684210"><span data-dcnode-id="3368" instrument_node="">said</span></a><span data-dcnode-id="3366" instrument_node=""> Polish Prime Minister Mateusz Morawiecki.</span></p><span data-dcnode-id="3364" instrument_node="">
</span><p data-dcnode-id="3359"><span data-dcnode-id="3363" instrument_node="">Also just this month, Austria </span><a data-dcnode-id="3361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/news/world/europe/austria-un-migration-global-pact-agreement-us-hungary-sebastian-kurz-freedom-party-a8610161.html"><span data-dcnode-id="3362" instrument_node="">announced</span></a><span data-dcnode-id="3360" instrument_node=""> that it also would not be signing the agreement. "We view some points of the migration pact very critically, such as the mixing up of seeking protection with labour migration," Austrian Chancellor Sebastian Kurz said.</span></p><span data-dcnode-id="3358" instrument_node="">
</span><p data-dcnode-id="3353"><span data-dcnode-id="3357" instrument_node="">The European Union immediately criticized Austria's decision. "We regret the decision that the Austrian government has taken. We continue to believe that migration is a global challenge where only global solutions and global responsibility sharing will bring results" </span><a data-dcnode-id="3355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2018/nov/01/austria-criticised-not-signing-un-global-migration-compact-european-commission"><span data-dcnode-id="3356" instrument_node="">said</span></a><span data-dcnode-id="3354" instrument_node=""> an unnamed spokeswoman from the European Commission.</span></p><span data-dcnode-id="3352" instrument_node="">
</span><p data-dcnode-id="3347"><span data-dcnode-id="3351" instrument_node="">This is, by the way, the same EU that is </span><a data-dcnode-id="3349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.express.co.uk/news/world/1015529/EU-news-migrant-crisis-juncker-state-of-union-speec"><span data-dcnode-id="3350" instrument_node="">supposedly</span></a><span data-dcnode-id="3348" instrument_node=""> going to be "cracking down" on migration. If you are "cracking down" on migration, why are you signing agreements that will facilitate and exponentiate it as a human right?</span></p><span data-dcnode-id="3346" instrument_node="">
</span><blockquote data-dcnode-id="3341"><p data-dcnode-id="3343"><i data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">Judith Bergman, a columnist, lawyer and political analyst, is a Distinguished Senior Fellow at Gatestone Institute.</span></i></p><span data-dcnode-id="3342" instrument_node="">
</span></blockquote><span data-dcnode-id="3340" instrument_node="">
</span></div><span data-dcnode-id="3338" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="3076"><p data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">As a sovereign nation, my country reserves the right to choose its citizenry. Every country should have this right. The United States is a great nation. Its young men have fought to guarantee the safety and freedom of its people as well as for many other nations in wartime. Inalienable rights are sacred in America. If not in the United Nations then be damned to them.</span></p></div><span data-dcnode-id="3075" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="3055"><p data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Why would any nation in their right mind sign over supreme authority on immigration to the UN. The UN judgment is very faulty. They appointed Saudi Arabia to champion woman's rights and the Saudis just chopped off a woman's head for standing up for woman's rights. Great logic. Our very stupid prime minister Trudeau is willing to hand over our sovereignty to the UN on the sly. The main stream media is not reporting it. Very few people are aware of what he is doing.</span></p></div><span data-dcnode-id="3054" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="2988"><p data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">What is frightening about this whole thing is the fact that the majority of the populace of these member states won't even know about this agreement, They will not have been informed of it because if they were to have been informed, then I'm sure the vast majority would not have anything to do with it, they would not want this. This is the problem in this day and age, governments act without authority, pushing through agreements and bills that the common individual in the street knows nothing about. The EU is a perfect example of this and now we have the UN. United Nations, what a bloody joke! I'd like to do a poll in the UK right now as to how many people would support this at this time. This is criminal and we need more leaders like those now coming forward in both Poland and Italy, or we are all lost.</span></p></div><span data-dcnode-id="2987" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="2958"><p data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">The UN is an organization whose only constituents are the countries who support its activities on a voluntary basis. As such it has no taxing ability or binding authority. To garner these, it must create constituents who owe it. Immigrants are a perfect group. Through its lack of effectiveness, the UN can generate plenty of them.</span></p><span data-dcnode-id="2967" instrument_node="">
</span><p data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">This seemingly innocuous ploy is at the expense of the countries it allegedly serves. Immigration involves taking rights of citizens from one country and giving them to citizens of another country at a cost to both.</span></p><span data-dcnode-id="2964" instrument_node="">
</span><p data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">Redistributing rights is a form of theft.</span></p><span data-dcnode-id="2961" instrument_node="">
</span><p data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">A true right is something that does not take rights from others.</span></p></div><span data-dcnode-id="2957" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="2937"><p data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">Geez, I wonder how many people would 'migrate' to Saudi Arabia and Pakistan to name a few, and get this 'welcome' of 'human rights'? Oh, and please, don't lock your doors because after all 'mi casa es su casa'! The push for the NWO continues!</span></p></div><span data-dcnode-id="2936" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="2913"><p data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">It is definitely not a level playing field. You come from Africa and do not need to have a job offer nor health insurance. In 2011 I knew students from poor European countries--Spain, Greece and Italy, who could not afford to move to Germany without a job offer, as they could not pay for housing and for health insurance. Young men without educations from Africa and other areas do not need to meet this requirement.</span></p><span data-dcnode-id="2916" instrument_node="">
</span><p data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">The right to migrate is only for some. Also, who cares about asylum? England, Germany and Sweden hand it out like Halloween candy, except not to Asia Bibi nor to Edward Snowden. Asia is Christian. That isn't good. Snowden would upset America. However, he certainly has skills and he brings a girlfriend, so he wouldn't upset the sex ration further. However, unerwünscht. Not diverse enough, apparently. Really needing asylum, and not just saying so. This upsets governments.</span></p></div><span data-dcnode-id="2912" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="2892"><p data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">I truly am amazed that the UN would draft such a resolution and expect the United States to sign it or support it in any way. As an American citizen sick of being forced to expend vast amounts of resources that belong to Americans on migrants. It has to stop. No other nation or peoples apart from our citizenry should dictate any such thing.</span></p></div><span data-dcnode-id="2891" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="2670"><p data-dcnode-id="2811"><span data-dcnode-id="2828" instrument_node="">I bought a bird feeder. I hung it</span><br data-dcnode-id="2827"><span data-dcnode-id="2826" instrument_node="">on my back porch and filled it</span><br data-dcnode-id="2825"><span data-dcnode-id="2824" instrument_node="">with seed. What a beauty of</span><br data-dcnode-id="2823"><span data-dcnode-id="2822" instrument_node="">a bird feeder it was, as I filled it</span><br data-dcnode-id="2821"><span data-dcnode-id="2820" instrument_node="">lovingly with seed.</span><br data-dcnode-id="2819"><span data-dcnode-id="2818" instrument_node="">Within a week we had hundreds of birds</span><br data-dcnode-id="2817"><span data-dcnode-id="2816" instrument_node="">taking advantage of the</span><br data-dcnode-id="2815"><span data-dcnode-id="2814" instrument_node="">continuous flow of free and</span><br data-dcnode-id="2813"><span data-dcnode-id="2812" instrument_node="">easily accessible food.</span></p><span data-dcnode-id="2810" instrument_node="">
</span><p data-dcnode-id="2802"><span data-dcnode-id="2809" instrument_node="">But then the birds started</span><br data-dcnode-id="2808"><span data-dcnode-id="2807" instrument_node="">building nests in the boards</span><br data-dcnode-id="2806"><span data-dcnode-id="2805" instrument_node="">of the patio, above the table,</span><br data-dcnode-id="2804"><span data-dcnode-id="2803" instrument_node="">and next to the barbecue.</span></p><span data-dcnode-id="2801" instrument_node="">
</span><p data-dcnode-id="2793"><span data-dcnode-id="2800" instrument_node="">Then came the crap. It was</span><br data-dcnode-id="2799"><span data-dcnode-id="2798" instrument_node="">everywhere: on the patio tile,</span><br data-dcnode-id="2797"><span data-dcnode-id="2796" instrument_node="">the chairs, the table ...</span><br data-dcnode-id="2795"><span data-dcnode-id="2794" instrument_node="">everywhere!</span></p><span data-dcnode-id="2792" instrument_node="">
</span><p data-dcnode-id="2780"><span data-dcnode-id="2791" instrument_node="">Then some of the birds</span><br data-dcnode-id="2790"><span data-dcnode-id="2789" instrument_node="">turned mean. They would</span><br data-dcnode-id="2788"><span data-dcnode-id="2787" instrument_node="">dive bomb me and try to</span><br data-dcnode-id="2786"><span data-dcnode-id="2785" instrument_node="">peck me even though I had</span><br data-dcnode-id="2784"><span data-dcnode-id="2783" instrument_node="">fed them out of my own</span><br data-dcnode-id="2782"><span data-dcnode-id="2781" instrument_node="">pocket.</span></p><span data-dcnode-id="2779" instrument_node="">
</span><p data-dcnode-id="2765"><span data-dcnode-id="2778" instrument_node="">And other birds were</span><br data-dcnode-id="2777"><span data-dcnode-id="2776" instrument_node="">boisterous and loud. They</span><br data-dcnode-id="2775"><span data-dcnode-id="2774" instrument_node="">sat on the feeder and</span><br data-dcnode-id="2773"><span data-dcnode-id="2772" instrument_node="">squawked and screamed at</span><br data-dcnode-id="2771"><span data-dcnode-id="2770" instrument_node="">all hours of the day and night</span><br data-dcnode-id="2769"><span data-dcnode-id="2768" instrument_node="">and demanded that I fill it</span><br data-dcnode-id="2767"><span data-dcnode-id="2766" instrument_node="">when it got low on food.</span></p><span data-dcnode-id="2764" instrument_node="">
</span><p data-dcnode-id="2748"><span data-dcnode-id="2763" instrument_node="">After a while, I couldn't even</span><br data-dcnode-id="2762"><span data-dcnode-id="2761" instrument_node="">sit on my own back porch</span><br data-dcnode-id="2760"><span data-dcnode-id="2759" instrument_node="">anymore. So I took down the</span><br data-dcnode-id="2758"><span data-dcnode-id="2757" instrument_node="">bird feeder and in three days</span><br data-dcnode-id="2756"><span data-dcnode-id="2755" instrument_node="">the birds were gone. I cleaned</span><br data-dcnode-id="2754"><span data-dcnode-id="2753" instrument_node="">up their mess and took down</span><br data-dcnode-id="2752"><span data-dcnode-id="2751" instrument_node="">the many nests they had built</span><br data-dcnode-id="2750"><span data-dcnode-id="2749" instrument_node="">all over the patio.</span></p><span data-dcnode-id="2747" instrument_node="">
