</span><div class="article-content-offset" data-dcnode-id="842"><span data-dcnode-id="1188" instrument_node="">
</span><div class="article-dropcap ls-0 f-serif" data-dcnode-id="884"><span data-dcnode-id="1187" instrument_node="">
</span><div class="article-dropcap--inner paywall-content" data-dcnode-id="918"><p data-dcnode-id="1173"><span data-dcnode-id="1186" instrument_node="">In the decade following the Cold War, democracy flourished around the world as never before. In recent years, however, much of this progress has steadily eroded. Between 2000 and 2015, democracy broke down in 27 countries, among them </span><a data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foreignaffairs.com/search%3Fqs%3Dkenya"><span data-dcnode-id="1185" instrument_node="">Kenya</span></a><span data-dcnode-id="1183" instrument_node="">, </span><a data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foreignaffairs.com/search%3Fqs%3Drussia"><span data-dcnode-id="1182" instrument_node="">Russia</span></a><span data-dcnode-id="1180" instrument_node="">, </span><a data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foreignaffairs.com/search%3Fqs%3Dthailand"><span data-dcnode-id="1179" instrument_node="">Thailand</span></a><span data-dcnode-id="1177" instrument_node="">, and </span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foreignaffairs.com/search%3Fqs%3Dturkey"><span data-dcnode-id="1176" instrument_node="">Turkey</span></a><span data-dcnode-id="1174" instrument_node="">. Around the same time, several other global “swing states”—countries that, thanks to their large populations and economies, could have an outsize impact on the future of global democracy—also took a turn for the worse. In nearly half of them, political liberties, as measured by the U.S. nonprofit Freedom House, contracted.</span></p><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Meanwhile, many existing authoritarian regimes have become even less open, transparent, and responsive to their citizens. They are silencing online dissent by censoring, regulating, and arresting those they perceive as threats. Many of them are attempting to control the Internet by passing laws, for example, that require foreign companies to store citizens’ data within the home country’s borders. Offline, states are also constraining civil society by restricting the ability of organizations to operate, communicate, and fundraise. Since 2012, governments across the globe have proposed or enacted more than 90 laws restricting freedom of association or assembly.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1168" instrument_node="">Adding to the problem, democracy itself seems to have lost its appeal. Many emerging democracies have failed to meet their citizens’ hopes for freedom, security, and economic growth, just as the world’s established democracies, including the United States, have grown increasingly dysfunctional. In </span><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foreignaffairs.com/search%3Fqs%3Dchina"><span data-dcnode-id="1167" instrument_node="">China</span></a><span data-dcnode-id="1165" instrument_node="">, meanwhile, decades of economic growth have proved that a state need not liberalize to generate prosperity.</span></p><div class="article-newsletter-signup--container _repositioned" data-dcnode-id="1106"><span data-dcnode-id="1163" instrument_node="">
</span><div class="row align-items-center py-4 g-0 sign-up-container" data-dcnode-id="1146" id="newsletter-sign-up-message"><span data-dcnode-id="1162" instrument_node="">

</span><h4 class="f-serif fw-normal signup-success-message ls-0" data-dcnode-id="1112"><span data-dcnode-id="1118" instrument_node="">Thank you for signing up.</span><br data-dcnode-id="1117"><span data-dcnode-id="1116" instrument_node="">Stay tuned for the latest from </span><em data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Foreign Affairs</span></em><span data-dcnode-id="1113" instrument_node="">.</span></h4><span data-dcnode-id="1111" instrument_node="">
</span></div><span data-dcnode-id="1109" instrument_node="">
</span></div><span data-dcnode-id="1107" instrument_node="">
</span></div><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1104" instrument_node="">Not all the trends are bad. Optimists can point to </span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foreignaffairs.com/search%3Fqs%3Dnigeria"><span data-dcnode-id="1103" instrument_node="">Nigeria</span></a><span data-dcnode-id="1101" instrument_node="">, which in May 2015 experienced the first truly democratic transfer of power—from a defeated ruling party to the opposition—in its history, or to </span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foreignaffairs.com/search%3Fqs%3Dsri%2Blanka"><span data-dcnode-id="1100" instrument_node="">Sri Lanka</span></a><span data-dcnode-id="1098" instrument_node="">, which returned to electoral democracy in January 2015 after five years of electoral autocracy. The first Arab democracy in decades has emerged in </span><a data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foreignaffairs.com/search%3Fqs%3Dtunisia"><span data-dcnode-id="1097" instrument_node="">Tunisia</span></a><span data-dcnode-id="1095" instrument_node="">, and in </span><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foreignaffairs.com/search%3Fqs%3Dmyanmar"><span data-dcnode-id="1094" instrument_node="">Myanmar</span></a><span data-dcnode-id="1092" instrument_node=""> (also called Burma), a democratically elected government now shares significant power with the military. The authoritarian model of capitalism has also lost some of its shine, as China’s growth has slowed markedly and the plunge in oil prices has weakened Russia and other petrostates.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Proponents of democracy should act energetically to capitalize on these and other opportunities. The right kind of support from the United States and its allies could unleash a new wave of freedom across the globe, particularly in Asia’s swing states. Without that support, however, autocracies will continue to proliferate, leading to more instability and less freedom.</span></p><span data-dcnode-id="1087" instrument_node="">
</span><h3 data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">TURNING INWARD</span></h3><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1083" instrument_node="">One of the biggest challenges facing democracy today is that its biggest champion—the United States—has lost interest in promoting it. In a </span><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.people-press.org/2013/12/03/public-sees-u-s-power-declining-as-support-for-global-engagement-slips"><span data-dcnode-id="1082" instrument_node="">2013 Pew survey</span></a><span data-dcnode-id="1080" instrument_node="">, 80 percent of Americans polled agreed with the idea that their country should “not think so much in international terms” and instead “concentrate more on [its] national problems.” Just 18 percent expressed the belief that democracy promotion should be a top foreign policy priority. It should thus come as no surprise that none of the current presidential candidates has made democracy promotion a cornerstone of his or her campaign.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><div class="dfp-tag-wrapper my-3 text-center" data-dcnode-id="1071"><div data-dcnode-id="1073" id="js-dfp-tag-speedbump-mobile--2"><span data-dcnode-id="1077" instrument_node="">
</span><span data-dcnode-id="1074" instrument_node="">
</span></div><span data-dcnode-id="1072" instrument_node="">
</span></div><p data-dcnode-id="1070"></p><blockquote class="internal-blockquote offset ls-narrow" data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">
  Between 2000 and 2015, democracy broke down in 27 countries.
</span></blockquote><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Washington has continued to support some nongovernmental efforts. Congress increased its appropriation for the National Endowment for Democracy, a nonprofit that funds pro-democracy groups abroad, from $115 million in 2009 to $170 million in 2016. For the most part, however, as public support for democracy promotion has declined, funding for it has stagnated. During this same period, U.S. government spending on democracy, human rights, and governance programs (mainly through the U.S. Agency for International Development, or USAID) fell by nearly $400 million. Even excluding the decline in funding for Afghanistan and Iraq, funding for such programs in other countries stayed flat.</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1063"></p><figure class="article-inline-img-block print-hidden" data-dcnode-id="1050"><span data-dcnode-id="1062" instrument_node="">
</span><img alt="Supporters of presidential candidate Muhammadu Buhari and his All Progressive Congress party celebrate in Kano, March 2015. Three decades after seizing power in a military coup, Buhari became the first Nigerian to oust a president through the ballot box." class="no-ratio b-lazy w-100" data-dcnode-id="1061" data-src="https://cdn-live.foreignaffairs.com/sites/default/files/styles/large_1x/public/public-assets/images/articles/2016/05/26/rtr4vnbf.jpg?itok=O5Zxi2jG|https://cdn-live.foreignaffairs.com/sites/default/files/styles/large_2x/public/public-assets/images/articles/2016/05/26/rtr4vnbf.jpg?itok=taEpKgDw" data-src-md="https://cdn-live.foreignaffairs.com/sites/default/files/styles/large_1x/public/public-assets/images/articles/2016/05/26/rtr4vnbf.jpg?itok=O5Zxi2jG|https://cdn-live.foreignaffairs.com/sites/default/files/styles/large_2x/public/public-assets/images/articles/2016/05/26/rtr4vnbf.jpg?itok=taEpKgDw" data-src-sm="https://cdn-live.foreignaffairs.com/sites/default/files/styles/large_1x/public/public-assets/images/articles/2016/05/26/rtr4vnbf.jpg?itok=O5Zxi2jG" height="380" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-live.foreignaffairs.com/sites/default/files/styles/large_1x/public/public-assets/images/articles/2016/05/26/rtr4vnbf.jpg%3Fitok%3DO5Zxi2jG&amp;raw" width="570"><span data-dcnode-id="1060" instrument_node="">
</span><figcaption class="article-inline-img-block--figcaption ls-narrow f-sans mt-2 print-hidden" data-dcnode-id="1052"><span data-dcnode-id="1059" instrument_node="">
</span><div class="article-inline-img-block--caption" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Supporters of presidential candidate Muhammadu Buhari and his All Progressive Congress party celebrate in Kano, March 2015. Three decades after seizing power in a military coup, Buhari became the first Nigerian to oust a president through the ballot box.</span></div><span data-dcnode-id="1056" instrument_node="">
</span><address class="article-inline-img-block--photo-credit" data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Goran Tomasevic / Reuters</span></address><span data-dcnode-id="1053" instrument_node="">
</span></figcaption><span data-dcnode-id="1051" instrument_node="">
</span></figure><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1048"></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">As the United States has lagged behind, few other countries have stepped in. The most ambitious intergovernmental attempt to promote democracy—the Community of Democracies, a coalition established in 2000—lacks the resources and visibility to have much impact. Regional organizations are not doing much better. The EU, for example, has largely stood by as Hungarian Prime Minister Viktor Orban has flouted democratic norms. And the union was so desperate to secure Turkey’s help in stemming the flow of Syrian refugees that it agreed to revive membership talks with Ankara, even as Turkish President Recep Tayyip Erdogan has accelerated his efforts to suppress dissent.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Although some European countries, such as Sweden and the United Kingdom, have continued to support significant bilateral programs to promote democracy and improve governance, the budget of the European Endowment for Democracy, established in 2013, reached just over $11 million last year. The United Kingdom’s Westminster Foundation for Democracy currently has a public budget of just $5 mil­lion. Canada’s International Centre for Human Rights and Democratic Development shut down in 2012. And developing democracies such as Brazil, India, and Indonesia have hesitated to contribute much, focusing instead on their own many problems.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1040" instrument_node="">Authoritarian leaders have capitalized on this vacuum by exporting their illiberal values and repressive technologies. Iran has been using its financial, political, and military influence to shape or destabilize govern­ments in Iraq, Lebanon, Syria, and Yemen. Russia has used violence and intimidation and has funneled money to support separatist move­ments and to prop up pro-Russian, antireform political forces in Georgia and Ukraine. Moreover, Russia has built what the Internet freedom organization Access Now has termed a “commonwealth of surveillance states,” </span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freedomhouse.org/blog/exporting-repression%23.VVuF65NVikp%2520"><span data-dcnode-id="1039" instrument_node="">exporting sophisticated electronic surveillance technologies</span></a><span data-dcnode-id="1037" instrument_node=""> throughout Central Asia. China, too, has reportedly supplied Ethiopia, Iran, and several Central Asian dictatorships—Tajikistan, Turkmenistan, and Uzbekistan—with Internet and telecommunications surveillance technology to help them repress and spy on their citizens.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><h3 data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">THE BEST FORM OF GOVERNMENT</span></h3><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Although democracy promotion may have fallen out of favor with the U.S. public, such efforts very much remain in the national interest. Democracies are less violent toward their citizens and more protective of human rights. They do not go to war with one another. They are more likely to develop market economies, and those economies are more likely to be stable and prosperous. Their citizens enjoy higher life expectancies and lower levels of infant and maternal mortality than people living under other forms of government. Democracies also make good allies. As Michael McFaul, the former U.S. ambassador to Russia, has written, “Not every democracy in the world was or is a close ally of the United States, but no democracy in the world has been or is an American enemy. And all of America’s most enduring allies have been and remain democracies.”</span></p><span data-dcnode-id="1029" instrument_node="">
</span><div class="dfp-tag-wrapper my-3 text-center" data-dcnode-id="1022"><div data-dcnode-id="1024" id="js-dfp-tag-speedbump-mobile--3"><span data-dcnode-id="1028" instrument_node="">
</span><span data-dcnode-id="1025" instrument_node="">
</span></div><span data-dcnode-id="1023" instrument_node="">
</span></div><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Authoritarian regimes, by contrast, are inherently unstable, since they face a central dilemma. If an autocracy is successful—if it produces a wealthy and educated population—that population will construct a civil society that will sooner or later demand political change. But if an autocracy is unsuccessful—if it fails to generate economic growth and raise living standards—it is liable to collapse.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">The United States still has the tools to promote democracy, even if it lacks the will. As Thomas Carothers, a vice president at the Carnegie Endowment for International Peace, has shown, over the past quarter century, U.S. electoral assistance has evolved from superficial, in-and-out jobs to deeper partnerships with domestic organizations. Support for civil society has spread beyond simply aiding elites in national capitals. Efforts to promote the rule of law have expanded beyond the short-term technical training of judges and lawyers to focus on broader issues of accountability and human rights.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1015" instrument_node="">These efforts appear to have paid off. A </span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www2.pitt.edu/~politics/democracy/downloads/USAID_Democracy_Assistance_and_its_Impact_on_Democratization_v34.pdf%2520"><span data-dcnode-id="1014" instrument_node="">2006 study</span></a><span data-dcnode-id="1012" instrument_node=""> of the effects of U.S. foreign assistance on democracy found that $10 million of additional USAID spending produced a roughly fivefold increase in the amount of democratic change a country could be expected to achieve based on the Freedom House scale.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><h3 data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">LET FREEDOM RING</span></h3><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">But the United States can and should do more. The next president should make democracy promotion a pillar of his or her foreign policy. Washington could do so peacefully, multilaterally, and without signifi­cant new spending.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Pursuing such a policy requires, first of all, taking care to avoid legitimizing authoritarian rule. President Barack Obama did just the opposite during a July 2015 visit to Ethiopia, when he twice called its government “democratically elected,” even though it had held sham elections earlier that same year. When he visited Kenya on the same trip, Obama expressed the hope that its corrupt and semiauthoritarian regime would keep “continuing down the path of a strong, more inclusive, more accountable and transparent democracy.” Regimes pounce on such language, using implicit U.S. endorsements to stifle free speech and activism at home. In 1981, George H. W. Bush, then vice president, visited Manila and said to the country’s dictator, Ferdinand Marcos, “We love your adherence to democratic principle.” Within the next few years, Marcos’ abuses intensified, and his principal rival in the democratic opposition, Benigno Aquino, Jr., was assassinated.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Washington should also seize opportunities to reaffirm the country’s commitment to democracy abroad. In 2015, the United States assumed leadership of the Community of Democracies, which will hold its next biennial meeting in Washington in 2017, a few months after the next president is inaugurated. He or she should speak at the meeting to emphasize the organization’s importance and to endorse the values for which it stands.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">The next president should also increase financial support to fragile democracies. States undergoing political transitions—such as Myanmar, Tunisia, and Ukraine—are particularly vulnerable to outside influence. So U.S. support can have an outsize impact in such places. Congress has already increased assistance to Tunisia, from $61 million in 2015 to $142 million this year, and to Ukraine, from $88 million in 2014 to $659 million today. It could and should do still more for these countries, and for other emerging and fragile democracies both small (Senegal, for example) and large (such as Indonesia). But part of the bargain for increased economic aid has to be a serious commitment by the leaders of those countries to fight corruption and improve the quality of governance.</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Countries bordered by democracies tend to evolve in a democratic direction, while those bordered by authoritarian regimes tend toward autocracy. Washington should thus develop a comprehensive strategy for targeting states where democratic progress could affect the entire region. Populous countries tend to be more influential, so the next president should find ways to nudge states such as Bangladesh, Indonesia, Myanmar, Nigeria, Pakistan, the Philippines, and South Africa toward more effective, accountable, and democratic governance. At the same time, he or she should not neglect smaller democracies such as Georgia, Senegal, and Tunisia. In the post-Soviet sphere, in West Africa, and in the Arab world, civic and political actors are closely watching these three high-profile experiments. In each case, success could generate significant spillover effects. The United States should also focus on places on the cusp of a breakthrough. Venezuela, for instance, has been poised for a democratic transition since late 2015, when the opposition trounced the governing party in legislative elections, undermining roughly two decades of socialist rule. And Vietnam represents an intriguing opportunity, due to its emerging civil society, membership in the Trans-Pacific Partnership, and clear desire to draw closer to the United States in order to counter the threat from China.</span></p><span data-dcnode-id="992" instrument_node="">
</span><div class="dfp-tag-wrapper my-3 text-center" data-dcnode-id="985"><div data-dcnode-id="987" id="js-dfp-tag-speedbump-mobile--4"><span data-dcnode-id="991" instrument_node="">
</span><span data-dcnode-id="988" instrument_node="">
</span></div><span data-dcnode-id="986" instrument_node="">
</span></div><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Any policy to promote democracy must include bolder, smarter efforts to fight corruption, which sustains most authoritarian regimes. In the past decade, Washington has made progress in identifying, tracking, and seizing ill-gotten wealth—a crucial step in the wars against terrorism and drug trafficking that can also advance democracy and human rights. But the United States must do more to identify the international assets of venal dictators and their cronies, prosecute them for money laundering, and return their vast fortunes to their neglected citizens. The next administration should direct USAID to prioritize programs that help countries build professional bureaucracies and autonomous agencies capable of auditing government accounts and prosecuting corruption. And it should aid civil society groups and the media in their efforts to track stolen funds and hold public servants accountable.</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">As part of a push to discourage corruption, the next president should accelerate the use of legal strategies and tools to seize the U.S.-based assets of venal dictators. Since the United States launched the Kleptocracy Asset Recovery Initiative in 2010, lawyers and investigators from the Justice Department, the Department of Homeland Security, and the FBI have brought 25 legal cases against 20 foreign officials, seeking to recover $1.5 billion in ill-gotten gains, including from the estate of the late Nigerian dictator Sani Abacha and from Gulnara Karimova, daughter of the Uzbek president. Washington has also been stepping up efforts to halt the flow of illicit money into U.S. banks. The next president should dramatically increase the resources and political capital for such efforts, both nationally and globally, to ensure that kleptocrats can find no safe haven.</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="978"></p><blockquote class="internal-blockquote offset ls-narrow" data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">
  Democracy itself seems to have lost its appeal. 
</span></blockquote><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">He or she should also encourage U.S. diplomats to make support for democracy a major priority in their work on the ground. These envoys can use their diplomatic immunity to shield activists from arrest or to make it more difficult for a regime to target them, as has been the case with U.S. and European diplomatic support for Las Damas de Blanco (the Ladies in White), the opposition movement that wives of jailed dissidents and other women founded in Cuba. In extreme circumstances, they can and should shelter dissidents in their embassies and consulates, as the U.S. embassy did for the Chinese scientist and dissident Fang Lizhi after the 1989 crackdown on the Tiananmen Square protesters. Diplomats also have unparalleled access to local leaders, which gives them a unique opportunity to nudge autocrats toward reform. In a country transitioning to democracy, such as South Africa in the late 1980s and early 1990s, or Myanmar today, such engagement can help foster and sustain the resolve for democratic change. Where an authoritarian regime is powerful, confident, and sitting tight, as in China today, it may seem as though such efforts are hopeless. But most authoritarian regimes have moderate and pragmatic elements who may see the need for political opening. China is no different. The marginal moderates of today could well become the rulers of tomorrow.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="971"></p><figure class="article-inline-img-block print-hidden" data-dcnode-id="958"><span data-dcnode-id="970" instrument_node="">
</span><img alt="Obama talks about presidential term limits during remarks at the African Union in Addis Ababa, Ethiopia, July 2015." class="no-ratio b-lazy w-100" data-dcnode-id="969" data-src="https://cdn-live.foreignaffairs.com/sites/default/files/styles/large_1x/public/public-assets/images/articles/2016/05/26/rtx1m3y0.jpg?itok=hf6bjz1A|https://cdn-live.foreignaffairs.com/sites/default/files/styles/large_2x/public/public-assets/images/articles/2016/05/26/rtx1m3y0.jpg?itok=VQEefiRq" data-src-md="https://cdn-live.foreignaffairs.com/sites/default/files/styles/large_1x/public/public-assets/images/articles/2016/05/26/rtx1m3y0.jpg?itok=hf6bjz1A|https://cdn-live.foreignaffairs.com/sites/default/files/styles/large_2x/public/public-assets/images/articles/2016/05/26/rtx1m3y0.jpg?itok=VQEefiRq" data-src-sm="https://cdn-live.foreignaffairs.com/sites/default/files/styles/large_1x/public/public-assets/images/articles/2016/05/26/rtx1m3y0.jpg?itok=hf6bjz1A" height="380" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-live.foreignaffairs.com/sites/default/files/styles/large_1x/public/public-assets/images/articles/2016/05/26/rtx1m3y0.jpg%3Fitok%3Dhf6bjz1A&amp;raw" width="570"><span data-dcnode-id="968" instrument_node="">
</span><figcaption class="article-inline-img-block--figcaption ls-narrow f-sans mt-2 print-hidden" data-dcnode-id="960"><span data-dcnode-id="967" instrument_node="">
</span><div class="article-inline-img-block--caption" data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Obama talks about presidential term limits during remarks at the African Union in Addis Ababa, Ethiopia, July 2015.</span></div><span data-dcnode-id="964" instrument_node="">
</span><address class="article-inline-img-block--photo-credit" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Jonathan Ernst / Reuters</span></address><span data-dcnode-id="961" instrument_node="">
</span></figcaption><span data-dcnode-id="959" instrument_node="">
</span></figure><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="956"></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Meanwhile, the next administration ought to support Internet freedom and digital rights—an especially important effort in light of what the Edward Snowden leaks revealing U.S. government surveillance of Internet and phone communications did to U.S. credibility. In this vein, the government should start by refining its economic sanctions. In 2014, Washington exempted the export of software for “personal communications over the Internet, such as instant messaging, chat and email, social networking, sharing of photos and movies, web browsing, and blogging” from its sanctions against Iran. Such exemptions, as well as the free distribution of software to circumvent Internet censorship and allow dissidents to communicate securely, should become a standard part of any U.S. sanctions effort, including that against North Korea. Authoritarian regimes need to filter information and control communications to sustain their rule, and undermining that control is one of the best ways the United States can foster democratic change.</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">The next president can also use trade agreements to advance democracy. Academic studies confirm that when free-trade agreements are conditional on governments taking specific measures to protect human rights, meaningful improvements follow. The White House has reported that the mere process of negotiating the Trans-Pacific Partnership induced Brunei to sign and Vietnam to ratify the UN Convention Against Torture, while also encouraging other human rights improvements in these two countries and in Malaysia. Embedding strong guarantees for human rights (including labor rights) into future trade agreements offers a dual benefit: it can nurture democratic reform in partner countries and help undermine the charge that U.S. trade pacts establish an unfair playing field for American workers and companies. Needless to say, the success of such provisions will depend on whether Washington is willing to bring legal action against member states that violate them.</span></p><span data-dcnode-id="949" instrument_node="">
</span><h3 data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">YES WE CAN</span></h3><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Above all, any push for democracy abroad should begin at home. The sad fact is that American democracy no longer inspires admiration or emulation. The U.S. presidential election has revealed deep currents of alienation and anger among the public—currents Washington appears unable to calm. The gerrymandering of congressional districts, the flood of so-called dark money into election campaigns, and the ever-growing power of special-interest lobbies have polarized politics to an unprecedented degree, resulting in the passing of fewer bills, a breakdown in bipartisan foreign-policy making, and regular govern­ment shutdowns.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">These political failings have given ammunition to democracy’s enemies. Russian President Vladimir Putin, for instance, has claimed that “there is no true democracy” in the United States, and Mahmoud Ahmadinejad, the former president of Iran, has criticized U.S. elections as “a battleground for capitalists.”</span></p><span data-dcnode-id="940" instrument_node="">
</span><div class="dfp-tag-wrapper my-3 text-center" data-dcnode-id="933"><div data-dcnode-id="935" id="js-dfp-tag-speedbump-mobile--5"><span data-dcnode-id="939" instrument_node="">
</span><span data-dcnode-id="936" instrument_node="">
</span></div><span data-dcnode-id="934" instrument_node="">
</span></div><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">The next administration could take a number of steps to counter such charges and restore people’s confidence in American democracy. Working with Congress, it should reform campaign finance laws and require the rapid and full disclosure of all campaign contri­butions, even to so-called independent committees. It should also encourage state governments to invigorate political competition—for example, by ending gerrymandering, introducing ranked-choice voting for Congress and state offices, and removing sore-loser laws, which prevent defeated primary candidates from running as indepen­dents in the general election.</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Together, these steps could improve democracy in the United States and abroad at little to no financial cost. They could help restore the United States’ leadership role in the world. And they could tip the world out of its persistent democratic recession and into a new period of progress.</span></p><span data-dcnode-id="927" instrument_node="">
