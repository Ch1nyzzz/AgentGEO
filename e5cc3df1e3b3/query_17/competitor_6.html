></a></li><li class="share-facebook" data-dcnode-id="2920"><a class="share-facebook sd-button share-icon no-text" data-dcnode-id="2921" data-shared="sharing-facebook-71263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/71263/suing-foreign-states-in-us-courts/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="2924"></span><span class="sharing-screen-reader-text" data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">Click to share on Facebook (Opens in new window)</span></span></a></li><li class="share-linkedin" data-dcnode-id="2915"><a class="share-linkedin sd-button share-icon no-text" data-dcnode-id="2916" data-shared="sharing-linkedin-71263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/71263/suing-foreign-states-in-us-courts/%3Fshare%3Dlinkedin%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on LinkedIn"><span data-dcnode-id="2919"></span><span class="sharing-screen-reader-text" data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">Click to share on LinkedIn (Opens in new window)</span></span></a></li><li class="share-reddit" data-dcnode-id="2910"><a class="share-reddit sd-button share-icon no-text" data-dcnode-id="2911" data-shared="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/71263/suing-foreign-states-in-us-courts/%3Fshare%3Dreddit%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Reddit"><span data-dcnode-id="2914"></span><span class="sharing-screen-reader-text" data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Click to share on Reddit (Opens in new window)</span></span></a></li><li class="share-print" data-dcnode-id="2905"><a class="share-print sd-button share-icon no-text" data-dcnode-id="2906" data-shared="" href="#print" rel="nofollow noopener noreferrer" target="_blank" title="Click to print"><span data-dcnode-id="2909"></span><span class="sharing-screen-reader-text" data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">Click to print (Opens in new window)</span></span></a></li><li class="share-end" data-dcnode-id="2904"></li></ul></div></div></div><div class="post-tags" data-dcnode-id="2882"><h3 data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">Filed under:</span></h3><p data-dcnode-id="2883"><a data-dcnode-id="2896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/tag/state-department/" rel="tag"><span data-dcnode-id="2897" instrument_node="">Department of State</span></a><span data-dcnode-id="2895" instrument_node="">, </span><a data-dcnode-id="2893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/tag/federal-courts/" rel="tag"><span data-dcnode-id="2894" instrument_node="">Federal Courts</span></a><span data-dcnode-id="2892" instrument_node="">, </span><a data-dcnode-id="2890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/tag/foreign-sovereign-immunities-act-fsia/" rel="tag"><span data-dcnode-id="2891" instrument_node="">Foreign Sovereign Immunities Act (FSIA)</span></a><span data-dcnode-id="2889" instrument_node="">, </span><a data-dcnode-id="2887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/tag/foreign-sovereign-immunity/" rel="tag"><span data-dcnode-id="2888" instrument_node="">foreign sovereign immunity</span></a><span data-dcnode-id="2886" instrument_node="">, </span><a data-dcnode-id="2884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/tag/second-circuit/" rel="tag"><span data-dcnode-id="2885" instrument_node="">Second Circuit</span></a></p></div></div><main class="content-body clearfix" data-dcnode-id="2406" id="primary" role="main" tabindex="-1"><article class="client-ui clearfix" data-dcnode-id="2661"><div class="print-authors" data-dcnode-id="2871"><p class="authors" data-dcnode-id="2874"><span data-dcnode-id="2880" instrument_node="">by </span><a class="author url fn" data-dcnode-id="2878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/author/kleinersam/" rel="author" title="Profile and articles by Sam Kleiner"><span data-dcnode-id="2879" instrument_node="">Sam Kleiner</span></a><span data-dcnode-id="2877" instrument_node=""> and </span><a class="author url fn" data-dcnode-id="2875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/author/beachjulian/" rel="author" title="Profile and articles by Julian Beach"><span data-dcnode-id="2876" instrument_node="">Julian Beach</span></a></p><p class="date" data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">July 16, 2020</span></p></div><p data-dcnode-id="2866"><span data-dcnode-id="2870" instrument_node="">For most of U.S. history, federal courts afforded absolute immunity to foreign sovereigns out of respect for the equality and independence of states. This “absolute immunity” doctrine recognized that, as a matter of comity, one nation’s courts should not sit in judgment of another. However, since the enactment of the </span><a data-dcnode-id="2868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/28/part-IV/chapter-97"><span data-dcnode-id="2869" instrument_node="">Foreign Sovereign Immunities Act</span></a><span data-dcnode-id="2867" instrument_node=""> (FSIA) in 1976, foreign sovereigns have become subject to a number of statutory exceptions to immunity in U.S. courts. The most significant exception is for when the foreign nation conducts “commercial activity” with a U.S. nexus. This has raised a difficult question: how should courts delineate between the “commercial” acts of a foreign state and its sovereign activity?</span></p><span data-dcnode-id="2865" instrument_node="">
</span><p data-dcnode-id="2860"><span data-dcnode-id="2864" instrument_node="">The courts tasked with drawing this distinction under the FSIA will inevitably make decisions with consequences for U.S. relations with foreign states. Indeed, Congress enacted the FSIA to </span><a data-dcnode-id="2862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//columbialawreview.org/content/international-comity-in-american-law/"><span data-dcnode-id="2863" instrument_node="">shift</span></a><span data-dcnode-id="2861" instrument_node=""> decision-making regarding foreign sovereign immunity from the executive branch to the judiciary. The State Department endorsed this new paradigm at least in part to relieve itself of the burden of making these decisions, as it could then tell foreign nations that “the question of immunity is entirely one for the courts.”</span></p><span data-dcnode-id="2859" instrument_node="">
</span><p data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">While this complex and delicate task has fallen to the federal courts for over 40 years, the FSIA remains a deeply unsettled area of law. Two recent decisions by the Second Circuit Court of Appeals expose the difficulty in defining the nature of “commercial” activity, but also offer some useful guidance on how the exception is applied.</span></p><span data-dcnode-id="2856" instrument_node="">
</span><p data-dcnode-id="2853"><strong data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">The History of Foreign Sovereign Immunity and the Commercial Activities Exception</span></strong></p><span data-dcnode-id="2852" instrument_node="">
</span><p data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">Courts faced with claims against foreign states approach the commercial activity exception as a matter of statutory interpretation, yet there is a broader history and context to how the exception arose that is worthy of examination. The FSIA sought to balance two competing interests — the foreign relations concerns that stem from challenging the sovereign acts of foreign states in U.S. courts, and the rights of Americans to vindicate their rights in the judicial system.</span></p><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2840"><span data-dcnode-id="2848" instrument_node="">Though the U.S. Constitution empowers federal courts to hear claims involving “foreign states” (Art. III, Sec. 2), in its 1812 </span><a data-dcnode-id="2845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//supreme.justia.com/cases/federal/us/11/116/"><em data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">The Schooner Exchange v. McFaddon</span></em></a><span data-dcnode-id="2844" instrument_node=""> decision, the Supreme Court declared a mandate of foreign sovereign immunity derived from the “perfect equality and absolute independence of sovereigns.” Emperor Napoleon’s navy had seized an American vessel in international waters and recommissioned it as a warship. The </span><em data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">Schooner Exchange</span></em><span data-dcnode-id="2841" instrument_node=""> later docked in Philadelphia to escape a storm, prompting the original owners to sue the French Empire to reclaim it. Chief Justice Marshall held that France and its warships lay outside the Court’s jurisdiction: “the sovereign power of the nation is alone competent to avenge wrongs committed by a sovereign,” a matter “for diplomatic rather than legal discussion.”</span></p><span data-dcnode-id="2839" instrument_node="">
</span><p data-dcnode-id="2834"><span data-dcnode-id="2838" instrument_node="">This position of absolute foreign sovereign immunity remained in effect until the latter half of the twentieth century. Considering sovereign immunity’s origins in international and foreign relations law, courts deferred to the executive branch on whether a particular defendant should be entitled to immunity from suit. Then, in 1952, State Department Legal Adviser Jack Tate </span><a data-dcnode-id="2836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//heinonline.org/HOL/LandingPage%3Fhandle%3Dhein.journals/amhist55%26div%3D27%26id%3D%26page%3D"><span data-dcnode-id="2837" instrument_node="">announced</span></a><span data-dcnode-id="2835" instrument_node=""> the State Department’s adoption of a “restrictive” theory of sovereign immunity. Under this approach, the State Department would only request immunity for a foreign state’s public acts while permitting cases to proceed for claims based on the state’s commercial acts. However, State Department officials soon realized that they did not want to stay in the business of making these determinations, and supported the FSIA as an escape hatch to avoid the “pressures by foreign states to suggest immun­ity and from any adverse consequences resulting from the un­willingness of the Department to suggest immunity.”</span></p><span data-dcnode-id="2833" instrument_node="">
</span><p data-dcnode-id="2822"><span data-dcnode-id="2832" instrument_node="">The FSIA was enacted in 1976 to codify this restrictive view of sovereign immunity. Specifically, it laid out the circumstances under which U.S. courts could exercise jurisdiction over foreign states. The most important exception to immunity — the “</span><a data-dcnode-id="2830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fjc.gov/sites/default/files/2014/FSIAGuide2013.pdf%23page%3D52"><span data-dcnode-id="2831" instrument_node="">heart</span></a><span data-dcnode-id="2829" instrument_node="">” of the restrictive theory embodied in the FSIA — is that foreign states (and their agencies and instrumentalities) do not enjoy immunity from suits arising from commercial activities with a nexus to the United States (see </span><a data-dcnode-id="2827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/28/1605"><span data-dcnode-id="2828" instrument_node="">section 1605(a)(2)</span></a><span data-dcnode-id="2826" instrument_node="">). Congress </span><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books%3Fid%3D-SIgAAAAMAAJ%26pg%3DPA320%26lpg%3DPA320%26dq%3D%2527American%2Bcitizens%2Bare%2Bincreasingly%2Bcoming%2Binto%2Bcontact%2Bwith%2Bforeign%2Bstates%2Band%2Bentities%2Bowned%2Bby%2Bforeign%2Bstates%2522%26source%3Dbl%26ots%3DXvPZ6lrpJ5%26sig%3DACfU3U2tRz7RdSfnJ1Lw1WZgZrgUBlE1LA%26hl%3Den%26sa%3DX%26ved%3D2ahUKEwiu-KiGkqfqAhVQn-AKHTXGCdMQ6AEwCXoECAgQAQ%23v%3Donepage%26q%3D%27American%2520citizens%2520are%2520increasingly%2520coming%2520into%2520contact%2520with%2520foreign%2520states%2520and%2520entities%2520owned%2520by%2520foreign%2520states%2522%26f%3Dfalse"><span data-dcnode-id="2825" instrument_node="">viewed</span></a><span data-dcnode-id="2823" instrument_node=""> the FSIA as “urgently needed legislation” precisely because “American citizens are increasingly coming into contact with foreign states and entities owned by foreign states” in commercial contexts.</span></p><span data-dcnode-id="2821" instrument_node="">
</span><p data-dcnode-id="2807"><span data-dcnode-id="2820" instrument_node="">The enactment of the FSIA meant that federal judges, not State Department officials, would be responsible for determining whether a foreign sovereign was engaged in “commercial” activity. At the same time, the statute gave limited guidance on what precisely this meant. The statute </span><a data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/28/1603"><span data-dcnode-id="2819" instrument_node="">defines</span></a><span data-dcnode-id="2817" instrument_node=""> “commercial activity” in circular terms: “a regular course of commercial conduct or a particular commercial transaction or act.” The FSIA explains that the “commercial character of an activity shall be determined by reference to the </span><em data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">nature</span></em><span data-dcnode-id="2814" instrument_node=""> of the course of conduct or particular transaction or act, rather than by reference to its </span><em data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">purpose</span></em><span data-dcnode-id="2811" instrument_node="">” (emphasis added). This opaque distinction between “nature” and “purpose” unsurprisingly produced a series of early cases that, as one scholar </span><a data-dcnode-id="2809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholarship.law.umn.edu/cgi/viewcontent.cgi%3Farticle%3D1075%26context%3Dmjil"><span data-dcnode-id="2810" instrument_node="">notes</span></a><span data-dcnode-id="2808" instrument_node="">, “lacked consistency and led to unpredictable outcomes.”</span></p><span data-dcnode-id="2806" instrument_node="">
</span><p data-dcnode-id="2787"><span data-dcnode-id="2805" instrument_node="">The Supreme Court weighed in on the definition of “commercial activity” with two canonical decisions in 1992 and 1993. In </span><a data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//supreme.justia.com/cases/federal/us/504/607/"><em data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Republic of Argentina v. Weltover</span></em></a><span data-dcnode-id="2801" instrument_node=""> (1992), the Court determined that Argentina’s issuance of bonds — and its default on them — were “commercial activities” because Argentina was acting “not as regulator of a market, but in the manner of a private player within it.” Notwithstanding that the </span><em data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">purpose </span></em><span data-dcnode-id="2798" instrument_node="">of the bond program was to address the “public” issue of Argentina’s sovereign debt crisis, the Court concluded that the </span><em data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">nature </span></em><span data-dcnode-id="2795" instrument_node="">of the activity was “commercial” because these are “the&nbsp;</span><em data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">type</span></em><span data-dcnode-id="2792" instrument_node="">&nbsp;of actions by which a private party engages in trade and traffic or commerce.” In 1993, the Supreme Court in </span><a data-dcnode-id="2789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//supreme.justia.com/cases/federal/us/507/349/"><em data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">Saudi Arabia v. Nelson</span></em></a><span data-dcnode-id="2788" instrument_node=""> came out the other way, holding that a plaintiff’s wrongful imprisonment and torture by Saudi police did not fall under the exception. As the Court explained, “a foreign state’s exercise of the power of its police has long been understood for purposes of the restrictive theory as peculiarly sovereign in nature” and the “commercial activity” inquiry poses “a question of behavior, not motivation.”</span></p><span data-dcnode-id="2786" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2785" instrument_node="">Despite the guidance from&nbsp;</span><em data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">Weltover</span></em><span data-dcnode-id="2782" instrument_node="">&nbsp;and&nbsp;</span><em data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">Nelson</span></em><span data-dcnode-id="2779" instrument_node="">, the distinction between the sovereign or commercial “nature” of a foreign state’s activity remains difficult to parse. This analysis frequently presents in “</span><a data-dcnode-id="2777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//papers.ssrn.com/sol3/papers.cfm%3Fabstract_id%3D2456443"><span data-dcnode-id="2778" instrument_node="">cross-over</span></a><span data-dcnode-id="2776" instrument_node="">” cases, as one scholar has termed them, where the challenged conduct involves a mix of sovereign and commercial functions.&nbsp;For example, where the state abuses its “police powers” — as in&nbsp;</span><em data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">Nelson</span></em><em data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">&nbsp;</span></em><span data-dcnode-id="2771" instrument_node="">— the activity is generally treated as sovereign in nature. But that rule is not uniformly followed, and courts recognize exceptions where the factual context renders the challenged activity more akin to private conduct.&nbsp;Thus in&nbsp;</span><a data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//law.justia.com/cases/federal/district-courts/florida/flsdce/1%3A2004cv23223/109417/307/"><em data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">Guevara v. Republic of Peru</span></em></a><span data-dcnode-id="2767" instrument_node="">, the Eleventh Circuit found that Peru’s offer of a monetary reward for information leading to the capture of a fugitive was “‘commercial activity”’ because “the underlying activity at issue—the exchange of money for information—is commercial in nature and of the type negotiable among private parties.” Similarly, while courts have held that the expropriation of private property is a quintessentially sovereign act, in </span><a data-dcnode-id="2764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ihl-databases.icrc.org/ihl-nat/0/752434334A8A7D0EC1256D180031C242"><em data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">Siderman v. de Blake</span></em></a><span data-dcnode-id="2763" instrument_node=""> the Ninth Circuit treated the seizure and continued operation of a private hotel by Argentina’s military </span><em data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">junta</span></em><span data-dcnode-id="2760" instrument_node=""> as a commercial act because Argentina’s “continuing management” of the hotel and “its receipt of profits from the company’s operations” were “clearly activities of a kind in which a private party might engage.” These decisions, which underscore the difficult task courts face in interpreting the FSIA, ultimately turn on the specific factual context of the state acts and whether the legal challenge invoked their commercial or sovereign character.</span></p><span data-dcnode-id="2758" instrument_node="">
</span><p data-dcnode-id="2755"><strong data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">The Second Circuit’s Recent Decisions</span></strong></p><span data-dcnode-id="2754" instrument_node="">
</span><p data-dcnode-id="2749"><span data-dcnode-id="2753" instrument_node="">Against this backdrop, the two Second Circuit decisions — one finding that the exception applied and the other finding that it did not — offer some clarification on the fault lines between commercial and sovereign activity. As one observer </span><a data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law360.com/articles/1283971/2nd-circ-rulings-clarify-fsia-s-commercial-activity-exception"><span data-dcnode-id="2752" instrument_node="">noted</span></a><span data-dcnode-id="2750" instrument_node="">, though the divergent outcomes “might seem only to add to the confusion,” they actually “can be harmonized in a way that offers guidance to litigants.” While the cases are only binding authority for the federal courts in the Second Circuit, they offer some insight into how the exception has been interpreted.</span></p><span data-dcnode-id="2748" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2747" instrument_node="">The relevant activity in both cases had commercial aspects. </span><a data-dcnode-id="2744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//law.justia.com/cases/federal/appellate-courts/ca2/19-1262/19-1262-2020-06-08.html"><em data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">Pablo Star Ltd. v. Welsh Government</span></em></a><span data-dcnode-id="2743" instrument_node=""> involved a copyright dispute over the Welsh Government’s use of the likeness of the poet Dylan Thomas in promotional materials for Welsh culture. </span><a data-dcnode-id="2740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govinfo.gov/content/pkg/USCOURTS-ca2-19-02171/pdf/USCOURTS-ca2-19-02171-0.pdf"><em data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">Barnet v. Ministry of Culture and Sports of the Hellenic Republic</span></em></a><span data-dcnode-id="2739" instrument_node=""> arose out of Greece’s demand that Sotheby’s repatriate an ancient bronze figurine (a trust that claimed ownership of the figurine brought a claim against a Greek ministry, arguing that Greece had </span><a data-dcnode-id="2737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.artnet.com/art-world/barnet-case-sothebys-1883349"><span data-dcnode-id="2738" instrument_node="">acted</span></a><span data-dcnode-id="2736" instrument_node=""> “without lawful justification” and seeking a declaration that the trust was the true owner).</span></p><span data-dcnode-id="2734" instrument_node="">
</span><p data-dcnode-id="2726"><span data-dcnode-id="2733" instrument_node="">Applying the nature-purpose distinction, the Second Circuit in </span><em data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">Pablo Star</span></em><span data-dcnode-id="2730" instrument_node=""> focused not on the “purpose” of the promotional materials, but instead on the “means” employed by the state actor. The Welsh Government’s use of the photograph was therefore commercial activity because “there is nothing quintessentially governmental about using a photograph in a printed brochure or on a web page or distributing the photograph to newspaper outlets to advertise or promote travel and tourism,” acts regularly undertaken by “private-sector businesses.” By contrast, in </span><em data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">Barnet</span></em><span data-dcnode-id="2727" instrument_node="">, the Second Circuit upheld Greece’s immunity even though, as the district court had noted, sending a demand letter “to intervene in the market to assert and enforce [] purported property rights … is clearly the type of activity that private person can, and often do, engage in.” Here, however, because Greece’s Ministry of Culture “undertook the act of sending the letter … pursuant to its patrimony laws,” the ministry’s claim to the figurine was of a “sovereign nature.”</span></p><span data-dcnode-id="2725" instrument_node="">
</span><p data-dcnode-id="2717"><span data-dcnode-id="2724" instrument_node="">The distinction between the facts of these cases is subtle but important. The Second Circuit’s approach highlights that the “nature” of the act cannot be viewed in a vacuum (which the district court had done in </span><em data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">Barnet</span></em><span data-dcnode-id="2721" instrument_node="">). Rather, as the court instructs in </span><em data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">Pablo Star</span></em><span data-dcnode-id="2718" instrument_node="">, “[s]eparating the ‘nature’ from the ‘purpose’ of an activity may require a nuanced examination of the context of the acts involved.” That context is necessarily informed by “the level of generality at which the conduct is viewed,” or in other words, what features of the act matter to the claim. The fact that Greece’s claim to ownership derived from national legislation made Greece’s demand letter to the auction house a sovereign activity, whereas the Welsh Government’s use of the copyrighted photograph in a brochure, even in service of the state’s objectives, lacked a sovereign basis.</span></p><span data-dcnode-id="2716" instrument_node="">
</span><p data-dcnode-id="2708"><span data-dcnode-id="2715" instrument_node="">Ultimately, as the Second Circuit observed in </span><em data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">Pablo Star</span></em><span data-dcnode-id="2712" instrument_node="">, the nature-purpose distinction is a “standard more easily stated than applied,” and will result in divergent decisions. Congress left the courts with little guidance but, as Justice Souter noted in </span><em data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">Nelson</span></em><span data-dcnode-id="2709" instrument_node="">, courts do not “have the option to throw up our hands,” and the term “has to be given some interpretation.”</span></p><span data-dcnode-id="2707" instrument_node="">
</span><p data-dcnode-id="2699"><span data-dcnode-id="2706" instrument_node="">Of course, cases against foreign states can give rise to foreign relations concerns. Many foreign states simply </span><a data-dcnode-id="2704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2016/10/08/497164736/how-do-you-go-about-suing-a-country"><span data-dcnode-id="2705" instrument_node="">refuse to show up</span></a><span data-dcnode-id="2703" instrument_node=""> when they are sued in U.S. courts. If the plaintiffs do receive a judgment (whether by default judgment or after trial), they can then try to seize the foreign sovereign’s assets around the globe — a chase that, </span><a data-dcnode-id="2701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/sections/money/2012/10/22/163384810/why-a-hedge-fund-seized-an-argentine-navy-ship-in-ghana"><span data-dcnode-id="2702" instrument_node="">in one famous instance</span></a><span data-dcnode-id="2700" instrument_node="">, involved the attempted seizure of an Argentine warship. However, the objective of the FSIA was that the courts, not the State Department, would make the determinations regarding foreign sovereign immunity.</span></p><span data-dcnode-id="2698" instrument_node="">
</span><p data-dcnode-id="2687"><span data-dcnode-id="2697" instrument_node="">Given the complexity of interpreting the statute and the stakes involved, it may be time for the Supreme Court to accept </span><em data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">certiorari</span></em><span data-dcnode-id="2694" instrument_node=""> on a new case that would lead to the development of the law concerning what constitutes commercial activity. Barring that, litigants and other courts would be well-served to consider the Second Circuit’s the careful application of the standard in </span><em data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">Pablo Star </span></em><span data-dcnode-id="2691" instrument_node="">and </span><em data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">Barnet </span></em><span data-dcnode-id="2688" instrument_node="">for determining when foreign state actors may find themselves subject to the jurisdiction of American courts.</span></p><span data-dcnode-id="2686" instrument_node="">
</span><h6 data-dcnode-id="2683"><em data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">Image: Looking up at Thurgood Marshal Courthouse where the Second Circuit and the U.S. District Court for the Southern District of New York hear cases. (Photo TJ Bickerton, via Wikimedia Commons)</span></em></h6><span data-dcnode-id="2682" instrument_node="">
