</span><div class="card-participant__title" data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">
          Michael Abramowitz
      </span></div><span data-dcnode-id="1010" instrument_node="">
</span><div class="card-participant__description" data-dcnode-id="1002"><p data-dcnode-id="1004"><em data-dcnode-id="1008" style="-webkit-text-size-adjust:auto; -webkit-text-stroke-width:0px; color:#000000; font-family:Georgia,serif; font-size:17px; font-variant-caps:normal; font-weight:normal; letter-spacing:normal; orphans:auto; text-align:-webkit-left; text-transform:none; white-space:normal; widows:auto; word-spacing:0px"><span data-dcnode-id="1009" instrument_node="">President, Freedom House;&nbsp;</span></em><em data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Former White House Correspondent,&nbsp;</span></em><span data-dcnode-id="1005" instrument_node="">Washington Post</span></p><span data-dcnode-id="1003" instrument_node="">
</span></div><span data-dcnode-id="1001" instrument_node="">
</span></div><span data-dcnode-id="999" instrument_node="">
</span></div><span data-dcnode-id="997" instrument_node="">
</span><div class="msp-event-participants-group__participant" data-dcnode-id="983"><span data-dcnode-id="996" instrument_node="">
</span><div class="card-participant" data-dcnode-id="985"><span data-dcnode-id="995" instrument_node="">
</span><div class="card-participant__title" data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">
          Nicole M. Bibbins Sedaca
      </span></div><span data-dcnode-id="992" instrument_node="">
</span><div class="card-participant__description" data-dcnode-id="987"><p data-dcnode-id="989"><em data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Chair, Global Politics and Security Concentration and Professor in the Practice of International Affairs, Walsh School of Foreign Service, Georgetown University; Former Senior Advisor to the Undersecretary of State for Democracy and Global Affairs, U.S. Department of State</span></em></p><span data-dcnode-id="988" instrument_node="">
</span></div><span data-dcnode-id="986" instrument_node="">
</span></div><span data-dcnode-id="984" instrument_node="">
</span></div><span data-dcnode-id="982" instrument_node="">
</span><div class="msp-event-participants-group__participant" data-dcnode-id="967"><span data-dcnode-id="981" instrument_node="">
</span><div class="card-participant" data-dcnode-id="969"><span data-dcnode-id="980" instrument_node="">
</span><div class="card-participant__title" data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">
          Timothy Snyder
      </span></div><span data-dcnode-id="977" instrument_node="">
</span><div class="card-participant__description" data-dcnode-id="971"><p data-dcnode-id="973"><em data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Richard C. Levin Professor of History, Yale University; Author,&nbsp;</span></em><span data-dcnode-id="974" instrument_node="">The Road to Unfreedom: Russia, Europe, America</span></p><span data-dcnode-id="972" instrument_node="">
</span></div><span data-dcnode-id="970" instrument_node="">
</span></div><span data-dcnode-id="968" instrument_node="">
</span></div><span data-dcnode-id="966" instrument_node="">
</span></div><span data-dcnode-id="964" instrument_node="">
</span><div class="msp-event-participants-group" data-dcnode-id="944"><span data-dcnode-id="963" instrument_node="">
</span><div class="msp-event-participants-group__title" data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Presider</span></div><span data-dcnode-id="960" instrument_node="">
</span><div class="msp-event-participants-group__participant" data-dcnode-id="946"><span data-dcnode-id="959" instrument_node="">
</span><div class="card-participant" data-dcnode-id="948"><span data-dcnode-id="958" instrument_node="">
</span><div class="card-participant__title" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">
          Kati I. Marton
      </span></div><span data-dcnode-id="955" instrument_node="">
</span><div class="card-participant__description" data-dcnode-id="950"><p data-dcnode-id="952"><em data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Author and Human Rights Activist</span></em></p><span data-dcnode-id="951" instrument_node="">
</span></div><span data-dcnode-id="949" instrument_node="">
</span></div><span data-dcnode-id="947" instrument_node="">
</span></div><span data-dcnode-id="945" instrument_node="">
</span></div><span data-dcnode-id="943" instrument_node="">
</span></div><span data-dcnode-id="941" instrument_node="">
</span></div><span data-dcnode-id="939" instrument_node="">
</span><div class="body-content" data-dcnode-id="551"><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Speakers discuss the growing trend toward populism around the world and the current global state of democracy.</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">MARTON: Good afternoon, ladies and gentlemen, and welcome to this incredibly relevant—I would say urgently relevant program that we’ve gathered some of the most brilliant specialists in the field of illiberal democracy, populism, and all the problems that current beset I would say the globe. This is a global problem. And we can’t escape its reaches. We see red lights flashing all over the place, from Venezuela, to Russia, Turkey, Poland, Hungary. We have first time an extremist right-wing party in the Bundestag, with the AfD. And we—did I—did I mention President Trump—(laughter)—who, of course, gives courage to these authoritarian regimes.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">I was in Brussels making an intervention at the European Union last week on behalf of journalists in Poland and Hungary. And I can tell you that in meeting with the ambassadors of both Poland and Hungary, they both expressed high hopes for our midterm elections, and not in the way that most Democrats have high hopes. So it’s—these movements are definitely—they draw strength from each other and they represent in some ways the first real challenge for the high hopes of the European Union, which simply lacks the mechanism to fight back against the forces of illiberal democracy—if one can even call—if one can even call a democracy illiberal.</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">The European Union was meant to be a gentleman’s club. And when these nations joined in the ’90s, the nations of the East, the former so-called captive nations, we in the West, many of us, assumed, wrongly as it turned out, that that was that. That Europe was now well on its way to a democratic future. And that has not come to pass. And I am—I am very, very pleased to have Mike Abramowitz, who is the president of Freedom House. I am not going to list either Mike or Nicole Bibbins Sedaca or Tim Snyder’s bios, because that would take up our entire time. And as Tim just pointed out, introductions shorten one’s life. (Laughter.) So I’m doing you all a favor. Check their illustrious careers on your—on your brochure.</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Mike, your—Freedom House has dome some excellent work on this—on this issue, and on this incredible moment that we’re all facing, and which seem to have caught so many of us by surprise. Were we—did we overestimate the power, the allure of democracy? And if so, why?</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">ABRAMOWITZ: Right. Well, thank you, Kati, for—and thank you to the Council for hosting us here. It’s great to be with three friends. I thought what I—I think—I don’t think we overestimated the allure of democracy. I think we might have underestimated the determination of the bad guys to fight back. And that’s, I think, what you’ve seen over the last 20 years. I thought maybe I could just take two minutes or three minutes to kind of just kind of set the stage with a couple of the key findings that we’ve had from Freedom House over the last—we’ve out two important reports in the last two months. One on the state of freedom in the world, in which we track political rights and civil liberties. And the other on the state of democracy actually in the region we’re talking about, the 30 countries of Central and Eastern Europe, the Balkans and Eurasia.</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">And I think if I could say three or four key points. I’m always asked: Is democracy in crisis? And I—or in peril? I think I can—I think I can make the case. Part of it is the numbers. If you look at Freedom House scores, we’re in the middle of what has been—we’ve been tracking the state of democracy in the world for almost 50 years. And we’re in the middle of what some have called a democracy recession. So 12 consecutive years in which democracy, political rights, and civil liberties are declining around the world. This past year 70 countries experienced declines in our scores, compared to less than half that experienced improvements. What’s also kind of important to say is that really important and influential countries are actually backsliding in serious ways.</span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">The country that has probably done—deteriorated the worst over the last 10 years, according to Freedom House scores, is Turkey, which is sort of a perfect example of this concept of illiberal democracy. So Turkey was on its way 15 years ago to become part of the EU. You know, not a perfect democracy, but moving in the right direction. Now you’ve got it being the leading jailer of journalists in the world—150 journalists in jail, thousands of people in—thousands of civil society in jail as well, and really a terrible situation. I think—and you could add to that Poland and Hungary. Still free, according to our standards, but really slipping very dramatically. And other countries like Venezuela and the Philippines.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">The other thing I would just close with saying is that I think—I’m very concerned that there’s a powerful counternarrative that is being shaped by countries like Russia I particular—and Tim has written brilliantly about this in his most recent book—but also China, in which—you know, when I was growing up in the shadow of the Cold War people just assumed that democracy was the way to go, that this was the best system. And I can in my first year as being the president of Freedom House, I find that I have to really make a case that the democratic values and democratic standards. And that’s something that’s really surprising to me.</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">And so there’s really a strong counternarrative that’s being fostered by these countries that is really, I think, been very influential in parts of Central and Eastern Europe, Asia, and other places, that actually democratic—that democracy does not have to—you can have success in society without, you know, having democratic—democracy and democratic values. And that’s something that’s quite concerning.</span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">MARTON: Indeed, it is. And on that topic, and to underscore the global nature of the populist wave, recent polls shows that whereas two-thirds of Baby Boomers—American Baby Boomers value democracy, only one-third of Millennials do. So somewhere we’ve slipped.</span></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Nicole Bibbins Sedaca is a distinguished professor at Georgetown University and deals with these issues, and also has real-life diplomatic experience as a former State Department official. So I’m very glad to welcome you, Nicole.</span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">So how did—how did those of us who upheld the values of the European Union, NATO, indeed, democracy—how did we become the bad guys? And how did—how did—how was the narrative captured by the likes of authoritarians, with Putin leading the charge, and Orbán and Kaczyński, and Erdogan following his lead? How did—how did we get to this pass?</span></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">BIBBINS SEDACA: Yeah. Thank you, Kati. It’s a great question.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">I mean, I’d like to pick up on Mike’s point, which is do think this narrative plays a really huge part in this, which is many of these leaders— Orbán and others—you see redefining what happened in 1989, and redefining it as the West takeover of what was going on in Hungary and other countries, as opposed to how it was characterized at the time, which is a liberation from communism. And I think that is one thing which has contributed to this, which is the really effective way that these leaders have been able to redefine that narrative.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">I think many of us also were overly exuberant. We assumed that those countries which have had far more years as democracies and have been able to consolidate their institutions, have well-developed civil societies, well-developed media—we assumed that our exuberance was shared by everyone else. And so we, to some extent, I think, underestimated some demographic shifts which were going on, which is in 1989 and the years after there was a significant emigration of people who were externally looking who left the country. There was also now in 2018 we see a significant portion of the population, as you’re talking about, who didn’t experience the fall of the wall. And so for them, this concept of democratization is something which is far more distant to them in their minds.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">And so when these populations, which have less consolidated institutions and demographic shifts internally that experience some of these external shocks—economic shocks, immigration, technology and the ability of leaders to use that—they weather it differently than those countries that have more consolidated, established democracies—which are also experiencing these shocks, but are a little bit more stable with a different dynamic internally to weather those.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">MARTON: One of—one of the things that all these countries that are heading in this direction have in common is that the first institution to go is the press. The way that both Orbán and Putin have been able to sell this false narrative is because their populations—and equally so of Turkey, Mike—get really one source of news. And it’s all—and it’s all the ruling party’s source of—source of news. And if you cut the people off from the many voices—the many imperfect voices of a free press, it is far easier to manipulate them. And this is—this is a real problem.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="884" instrument_node="">So Tim Snyder, you’ve—you’re kind of a triple threat. Not only a great and popular sterling professor, I believe, at Yale of history, but you’ve written some of the most original and brilliant works, starting with—well, the first one I read was </span><em data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Bloodlands</span></em><span data-dcnode-id="881" instrument_node="">. But you kept me awake the last couple of nights reading </span><em data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">The Road to Unfreedom</span></em><span data-dcnode-id="878" instrument_node="">, which is an absolutely devastating account of, well, how Russian elected Trump for us. So it’s great to have you. Thank you.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">How did we get here? And how do we get out of this mess? (Laughter.) You have 30 seconds. (Laughter.)</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">SNYDER: So let me try to bring together some of the points that Mike and Nicole have made, and think back a little bit to 1989, and ask about what some of the other trend lines were that we might follow as correlates of decline of democracy. Because, of course, one of the most important things about the Freedom House work is that Mike is not just making a dramatic announcement about 2017. He’s talking about a trend that goes back now 12 years in a row, I believe. And it’s interesting to ask what else has been happening in those last 12 years.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">I think Nicole made a very important point which I’m going to make in slightly different language. In the book, that Kati was nice enough to mention, I call it the politics of inevitability, the idea that there is no alternative to democracy, that if you have the market you’re going to have democracy, that the history of ideas is over, that there are no alternatives. How often have we heard that idea from the right or from the left, that there are no alternatives? But of course, there were alternatives the whole time. And as Mike correctly said, there are determined people. And I would also add, interesting thinkers who, in the last decade, have been trying to push those alternatives. So that’s—our notion that history was over I think made it easier in this way for history to come back.</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">A second thing which I think is worth stressing is wealth inequality. If we look at the two countries that are doing the most to push these kinds of regimes abroad, which in my view are the Russian Federation actively and the United States of America by its absence and by the occasional tyrannical cheerleading of its president, these are the two countries which, according to Credit Suisse are—have the highest levels of wealth inequality in the world. The U.S. is the only country which really competes with the Russian Federation. And wealth inequality makes it very difficult for people to think about a future.</span></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">It’s no coincidence that the Millennials don’t believe in democracy, because they quite rightly believe that they’re not going to live as well as their parents. This is a trend which has been accelerating here in the last decade. And I think one way that Russia foretells what can happen in the U.S. is that what Russia does, is that it shows how an oligarchical clan can govern from a position of permanent wealth inequality by way of spectacle and by way of a constant promotion of a story about us and them.</span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Which is a third thing I wanted to mention, which is the internet. I can’t help but notice that the trend that, again, that Freedom House’s reports short coincides in times with a period when world internet penetration went from about 20 percent to about 60 percent. So whatever else one says about the spread of the internet, we cannot say that it is associated with the spread of democracy. Really, on the contrary. I think if you want to say that the internet spreads freedom, you have to have a very specific account of what freedom is.</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">And I think we might want to start thinking about the possibility that the internet actually is fundamentally authoritarian rather than fundamentally liberatory. The internet has a tendency to give people what they already want to hear, and it has a tendency to separate them out into their own atomized internet worlds. And it also has a tendency to push these narratives of us and them. So although I quite agree with Kati that the government is very good at capturing a narrative about who’s innocent and who’s guilty, it’s also very striking how the internet allows this to happen. And it’s also very striking how it allows it to happen in a globalized way, such that a country very far away from you—in Nebraska, or Ohio, wherever you are—can help you decide that another political party in your own country is the enemy, right? So this comes back to what happened in ’89. Yes, there was a globalization. But that globalization was dark in ways that I think are only beginning to become clear to us.</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">MARTON: So we haven’t yet mentioned one of the most powerful motives for the rise of populism, which is the fear of refugees, migrants. Most graphically on display in Hungary, where you can’t go a block without seeing a billboard showing George Soros’ smiling face, and the headline over that face is: Don’t let him have the last laugh. Now, six months ago, George Soros was known to a very small handful of Budapest literati. Now he is probably the second-best known person in Hungary, after Victor Orbán.</span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">And this manipulation of the fear of migrants, of which by the way there are virtually none in Hungary and very few in Poland as opposed to over a million in Germany where this problem doesn’t exist, is something that we haven’t really dealt with sufficiently. We seem to, step by step, accept that this is the way of the world now. And I think that I frequently ask myself: What didn’t my Hungarian grandparents, whose lives did not end well—what didn’t they do in the ’30s that we should be doing today, rather than sleepwalking through this extraordinarily dangerous passage?</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">So, Mike, the migration problem and how it relates to the rise of populism—I mean, the party in the Bundestag that represents—the Alternative fur Deutschland—is entirely about fear of outsiders.</span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">ABRAMOWITZ: Yes. Well, I certainly think that Tim’s three or four points that he made, kind of explaining these trends, were spot on. There’s not one silver bullet to this issue. But I would agree with you that you have to add in immigration to this mix, that we have probably the greatest number of refugees since World War II in the world, or displaced people. I think, what—even greater. And so it’s clear that even in countries that don’t have migrants, that populist or scaremongering politics have taken advantage of that.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">I always sort of look at it from a slightly different perspective, which is that this would be, to me, an example of how, you know, consolidated democracies have not done a good job of, you know, delivering on what people expect. I think that, you know, just to take our own country for example, it’s not unreasonable, it strikes me, for people to expect, you know, rules to be followed, that there be an orderly, you know, system of migration. And people feel threatened by what they perceive to be disorderly. And so the failure of the country and our politicians to really kind of come to some kind of agreement over the last 25 years around the immigration policy strikes me as a major driver of what’s happening here. And I think that’s also happened in Europe as well.</span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="839" instrument_node="">The other thing that I would also add to the issue about America, which is that I think while one can be critical of Trump, I don’t think that this problem started on January 20</span><sup data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">th</span></sup><span data-dcnode-id="836" instrument_node="">, 2017. And I certainly think, you know, one issue that I certainly feel needs to be sort of put on the table is kind of the global impact of the Iraq War. So that, you know, it’s interesting, when we do—when you look at polls, focus groups, you know, people really associate democracy and democracy promotion with the U.S. military intervention. And that war was not a war—sort of after the fact it was talked about as something that was justified in the name of democracy. But it was really taken for other purposes.</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">But I think that the hangover of that has made Americans and the rest of the world very hostile to the idea of democracy, and democracy promotion. It has handed a propaganda tool to people like Putin in particular. So I think that that would just be two things that I would add to the mix in terms of saying what’s going on here.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">MARTON: Nicole, we haven’t yet gotten to the other piece of it, which also erodes the European Union, which is—which is Brexit, and how the combination of Trump in the White House, and Brexit, and Putin ascendant have really kind of left the burden on Merkel and Macron to hold back the tide. Talk to us a little bit about whether Germany and France together in partnership are capable of doing that without the support of the United States, which was meant to be an essential part of that transatlantic alliance which—upon which the post-World War II order was built. Can they do this on their own?</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">BIBBINS SEDACA: Yeah. It’s a great question. Let me just add two points on the refugee issue, and then talk about whether they can handle that.</span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">MARTON: Yeah.</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">BIBBINS SEDACA: I echo all of Mike’s points, and then add to it if you look at the struggle that we’re having in the United States, in Germany and other countries, which have been multicultural for a very long time and have grown into the liberal world order since it was founded, we expected countries that didn’t grow into the liberal world order since 1945, and have largely—largely—been relatively homogeneous to react similarly to this call to be liberal and open to responding to your international commitment to refugees. And I think that was a pretty significant ask. Or, we underestimated how states would react to that.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">The United States has been at the forefront of pushing democracy for generations. And the United States has not made that the priority under this administration and is looking inward. The same thing with Brexit. I think it will be really a challenge for Merkel and Macron at this time, when they are also looking inwardly into their own countries and inwardly into keeping the EU defined, for them to take a leadership role, which they’ve never even done in better times. So I—the responsibility is with them and other actors, including the United States. But I am somewhat skeptical if they’ll be able to play as forceful a role as they need to in this situation.</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">MARTON: Tim, do you have a stronger sense of the power of the European Union without American support to counter all these various movements and pressures, without Washington standing for what it traditionally stood for, which is basic democratic values, human rights, free press? Who stands for them now?</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">SNYDER: Well, let’s hope so. I mean, I think in some sense this may be a good thing for the Europeans because even if we sitting in New York can’t figure out how they’re going to do, there’s not really much choice, right? If they want—the European Union is—the European Union, as we all know, is the largest economy in the history of the world. As we all know, it’s the most important zone of contiguous democracies. If they want to be these things, they’re going to have to figure out how to do it.</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">This connects this issue of migration, which I’d like to spin a slightly different way because I think it might make more sense for us to think about the politics of migration rather than speak of a migration problem as such. Because one can’t help but notice that both in Europe and in the states it’s the places which don’t have any migrants where it’s a political issue. You know, our vice president wanted to ban Syrian migrants to Indiana. You can just ask yourselves how many there actually are. The Syrian refugee crisis is politically resonant in Russia, Hungary, Poland, Slovakia and the Czech Republic. The total number of Syrian refugees in those countries is about the as the number of people in this room. And in some countries it’s actually, as Kati said, zero.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">So there’s actually inverse correlation between the number of migrants and refugees and the resonance of the politics. This was also true in Brexit, where the regions in Britain which were most likely to vote for Brexit were the ones where people had the least contact with actual people who were not white Christians. So I would speak—I’d be careful to speak about a politics of this, which isn’t to say that any country can take unlimited amounts of migrants with no consequences. I think German policy was mistaken. But I think we have to think of it as a politics if we want to get handle on it, because if I can be a country that has zero migrants and win elections on migration, that can’t be answered by there being fewer migrants, right?</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">So I think, though, I would echo Mike’s point about the functional state. I think people feel—people are vulnerable to the politics of migration when they feel like the state isn’t working, and when they feel like it’s not clear what’s going to happen in their—in their children’s futures. The final thing I wanted to say, though, about democracy in the U.S., one of the things—I wonder if the rest of you feel the same way—one of the things I’ve noticed or I’ve felt in the last couple of years is that you can’t stand still, that one of the problems—I mean, there are many—but one of problems with the idea of America first is that you can’t actually withdraw from the world and call time out and say we’re just going to do things at home for a while. That it’s always—a democracy is always either going forward or backward. There’s no pause button to push. So I think what we do, whether we realize it or not, is always having consequences.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">MARTON: So before we open up to your questions, your new book spends a great deal of time and extraordinary detail delineating how Russia, with precious few resources other than gas, has been able to, without firing a shot, win the cyber war. And this is—this is incredibly relevant for our future, never mind our past. How was Russia able to do that? And why have we not been more skilled at countering that cyber war?</span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">SNYDER: Mmm hmm. Thank you for calling it a war. I think it’s very—because countries only really learn when they lose wars and when the realize they’ve lost a war. Those are the two preconditions which, as Mike suggested with a reference to the Iraq War, aren’t always fulfilled. So in the case of 2016, we lost a cyber war. I’m pretty confident that’s the way historians are going to remember it. We got our hats handed to us in a cyber war. Another country—it’s not just that they elected the guy, they chose him a long time before the process even began. Without a foreign power, he’s not even plausible, let alone a candidate, let alone the president.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">How can this be possible? Well, first, on this word “war.” War, according to Clausewitz, is breaking the will of the enemy. It’s altering the will of the enemy. It doesn’t have to involve combat. Clausewitz makes clear—this is very important—combat is a means to an end. You can win a war without traditional combat. And so you can lose a war without traditional combat. You can have as many tanks as you want and you can put as many of them as you want on Pennsylvania Avenue. That will not save you from having your will broken by cyber war. That’s the first thing.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="791" instrument_node="">The second thing, how can this happen? Well, Russia, as you quite rightly say, in traditional 20</span><sup data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">th</span></sup><span data-dcnode-id="788" instrument_node=""> century geoeconomic terms is weak. However, if you can change the way international relations work from the objective of the economics and the technology to the subjective of the fears and the divisions, then you can win by playing a very—a hand that’s very weak in traditional terms. If you can get Americans not to think about the rest of the world and get them to think of one another as enemies, then you can win. And just—I mean, I’ll give you just one example of a thousand that on Election Day 2016 in the United States the hashtag that Russian bots were firing under was #WarAgainstDemocrats. And I would—I would venture to say that at that moment very few Americans, Democrats or Republicans, were thinking about the rest of the world. We’re thinking about ourselves, our preoccupations, our enemies, right?</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">If you can change the way world politics works from the objective to the subjective, from the tanks to the psychological, then you can win as Russia. And that’s what they have done. Their whole cyber budget is less than one F-35. Ask yourself honestly, which would you rather have? Russia’s cyber capability or one F-35?</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">MARTON: So I promise we’re going to come to you in one second, but I don’t want to leave all of us here in despair at the state of the world. And so, Mike, I would like for a minute to dwell on the positive—yes, there is a positive side to all this—and that is that we are not Hungary. That’s a good thing at the moment, even though I am a proud Hungarian. We are—we have been jolted, I believe, out of our complacency. Our civil society has never been more actively engaged. Ditto for the media. We have the #MeToo movement, which is a vibrant form of dissent, and a very effective one. We have students marching for—against lax gun laws. So these are positive—our system has been shocked into action, I believe. Do you agree with that?</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">ABRAMOWITZ: I do. And just to pick up on Tim’s point, asking, like, about America. I mean, I do believe that fundamentally the future of democracy around the globe depends on America, both as—not just exporting democracy, but also being a strong exemplar of democratic practice. And so I think that is something, in fact, Richard has talked about that in terms of the important role of, like, our own domestic politics in this international movement for democracy.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">But I do think, you know, it’s interesting, Kati. I think you have to have a little bit of a sense of perspective. And I was struck. I read an article recently that concerned a meeting of kind of American democracy activists who were sort of doing a woe is us about the state of democracy. And at the meeting was Vladimir Kara-Murza, who’s, like, a great Russian dissident who’s been poisoned twice but Putin, but he’s been trying to really fight hard with Mr. Khodorkovsky and others to—you know, to try to restore democracy to Russia. And he said: Look, guys—(laughs)—I wish I had your problem, you know? You guys can—you guys have still the free press, you still have civil society, you guys have, you know, tools to fight. So we have to have a little bit of a sense of perspective.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">But I do think it is important to say that what happens in America really matters. You know, at Freedom House, we do a lot of work around the globe with individual human rights defenders and activists, all over the world. It’s really some of the most inspiring work we do, and it’s really—for me, it’s great meeting these folks. And one of my colleagues was in Kenya in the fall for helping advise some of the groups there on making sure the Kenyan elections were free and fair, involved in some consultations with them. And he came back and he told me: You know, one of the leading activists said there, you know, we don’t—you know, we don’t really feel America has our back anymore. And that really stayed with me, because it says that what we do, what matters here does matter in places all over the world. So I think what happens here is really important.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">MARTON: Absolutely. Yes. Nicole, you have something to add to that?</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">BIBBINS SEDACA: Yeah. I’ll just add, I just remember in my later days at the State Department and then working with a civil society organization, I heard many times people saying: What does it matter if the United States doesn’t lead? Why do we have to be the ones out there all the time? And I think we’re now seeing. We’re seeing that. And I think that has, as you’ve said, rejuvenated an interest both domestically on doubling down on the strength of our institutions, but also on rethinking what the United States’ role should be in the world. And when countries that have been allies that are emerging democracies that are making progress don’t feel that we have their back, then it’s a wakeup call. And I think that is the positive story, I think, to take away, which is a lot of people who have been a little bit complacent are now making the argument that Freedom House has been making for a long time.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">MARTON: So on that bright note, I know that we have many questions. And please state your name, and please do make it a question not a speech. (Laughter.) So we have mics to go around. This gentleman I believe had his hand up first. Just identify yourself, please.</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Q: Thank you. Stephen Blank.</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="758" instrument_node="">History counts. Do we have any right to be so surprised—and I’m talking to Timothy mainly—be surprised at the illiberal turn of the countries we’re dealing with? These are really new countries in a way, though the peoples are old. And with very lousy histories in terms of democratic development, institutional stability, since they—since they became independent countries after the—well, I guess in the early 20</span><sup data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">th</span></sup><span data-dcnode-id="755" instrument_node=""> century. So should we be surprised at what’s happened?</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">SNYDER: OK. I’m going to—I’m going to try to follow Kati’s guidance and not be gloomy about everything. (Laughter.)</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">MARTON: Good. Thank you.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">SNYDER: You might have noticed how she didn’t let me get the last word on that last one. (Laughter.)</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">MARTON: There was method to my madness.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">SNYDER: Out of sheer—out of sheer prudence. So I’m going to—I’m going to make your question sharper, and then I’m going to try to answer it. I don’t think it’s just the case that these countries have weak records with democracy. The whole history of democracy is one of waves that crash. So for every wave of democratization, there’s been a wave of de-democratization. And it’s actually rather hard to find examples of countries that would meet the standards, our standards, of democracy, say, circa 2016, including the United States of America.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">If you look at the United States of America in 1930-35, you have a country which won’t take any refugees, where the reasons against taking Jewish refugees that are argued in the halls of Congress are basically the same as other people are giving. That’s just to take one example. You’re looking at a country where a huge percentage of the population is disenfranchised legally. So the United States—this in a way continues the argument that we were having at the end, or the discussion. The United States has to democratize itself. We can’t promote something that we don’t have. And, I mean, if we take a tough look at ourselves—again, to pull on something Mike said—it’s not just Mr. Trump. I mean, the Citizens versus United, whatever you think about it, that does not democratize the country, right?</span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">When the Supreme Court decides in 2013 that racism is no longer a problem 22 American states then pass voter suppression laws. That’s not democratization. Whatever you think of the legality of it, that’s not democratization. And wealth inequality itself, I mean, that’s—it’s very hard to have a democratic discussion when, you know, you have a dollar and I have a billion—or, it’s more likely, the other way around. (Laughter.) Well, I’m an academic and you’re the Council on Foreign Relations. (Laughter.) But because if you have a billion dollars, the truth is not enough for you. And if I have a dollar, the truth is too much for me. And without communication, it’s very hard to have democracy.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">So, I mean, I would extend the point and just say that in general it’s been very hard. And I would send it further and say, for the West European countries—I mean, when was Britain a democracy? If you’re governing three quarters of the world and treating people as not citizens but subjects, you’re not a democracy. If you’re France and you have second-class citizens in Algeria, you’re not a democracy. And so on and so forth. It’s very hard to find that moment when everybody was a democracy because it never happened. So, I mean, what I would stress is that we can turn the question around and ask about the things which make democracy possible. Which, for me, precisely have to do with integration.</span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">And it’s very hard for Europeans to be democracies without one another. They’ve never done it. And this is why the European Union, whatever its chances are, is the hope for democracy in Europe. And, in my view, this applies to the British as much as it applies to the Poles. I’m worried about British democracy. I’m worried about the future of Great Britain as a state, honestly, if Brexit actually comes to pass.</span></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">So I would push the point further. I don’t think there’s anything particularly wrong about Poland in the ’30s. There are plenty of things particularly wrong about Poland in the ’30s, but nothing that one doesn’t find in Portugal, and few things that one doesn’t find in the U.S., to be frank. So I think the point—your question is actually much sharper. And it reminds us how much we all need to keep democracy going. There isn’t a thing in the world called democracy that just goes on by its own.</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">MARTON: And can I just add to that, that the most vibrant democracy in Europe at the moment, namely Germany, did not have a very good decade in the ’30s either. So these countries are not destined to be undemocratic. There are a whole bunch of other factors. And one of them, frankly, is the luck of leaders, the luck of drawing good leaders as opposed to demagogues.</span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Anne.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Q: My name’s Anne Nelson.</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">And I’d like you to address the role of organizations in Middle America, outside the coastal areas, that have had a growing influence on elections, especially in swing states, and the role of dark money that comes through organizations such as ALEC and others, where an organization like the NRA may be receiving this money, engage in electoral politics, and also receive money from Russian elements at the same time. Thank you.</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">MARTON: Wow. Wow, that’s a—who would like to—(laughter)—it’s such an important question. We can devote a whole other session to that. I think, Tim, this is on you.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">SNYDER: I mean, the—so the thing that I call in the book the politics of inevitability, the idea that you know the rules of history, you know how progress is going to happen, one American version of that is the idea that capitalism brings democracy, from which—which isn’t true, by the way—but the idea that capital—that would mean that more capitalism means more democracy—the freer the market, the better chances you would have to—which just is not true. I mean, the places where the market is freest, where the state is absent, are offshore companies. The places where the market is freest are anonymous companies in Delaware, you know, where 200,000 companies are registered at a single building, believe it or not.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">So the places where the market is freest, where it’s totally unregulated, are the places which attract what you’re calling dark money, and which also have an effect on politics. So the Russian government as we know it cannot exist without this. And also, its connections with American politics function through this. It would be very hard for someone like Mr. Trump to exist in our consciousness, let alone be president of the United States, without precisely that unregulated gray zone of capitalism. So our own story about how more capitalism means more democracy has, in a way, come back to bite us. And I think one has to try to extend the rule of law, to use a conservative term, to extend the rule of law to these places so we can’t have a situation like this.</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">The NRA is one example of a larger trend. I mean, it is odd that the National Rifle Association would send its representatives to Moscow in 2015, and then shortly thereafter give the Trump campaign $30 million. It’s odd that that there’s an organization in the Russian Federation whose sole purpose is to support gun rights in the United States, because of course there will never be gun rights in Russia, right? That’s not going to happen. But they nevertheless have—they have an organization whose sole purpose is take part in the American gun rights discussion.</span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">So, I mean, one of the things that one has to get straight to have a democracy in one country I think is sovereignty, right? You have to have a notion of what the rule of law is. Without a rule of law which somehow controls, it’s very hard to have democracy in a country.</span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">MARTON: Mike, you have something to say.</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">ABRAMOWITZ: Can I just make one other point in response to your question? I do feel that—and I’m speaking here as someone who was actually a political reporter before I worked at Freedom House. So I was at The Washington Post for 20 years—25 years. And what I would just say—I’d be a little bit cautious about—I mean, American democracy has been fraying before 2016 for reasons that don’t have to do with the Russians. I mean, they did not have to bring—they exploited political polarization, but political polarization has been—has been, you know, been accelerating for the last 30 years. And both parties are—in my view, are to blame for it. It’s kind of an arms race you have going. And now it’s been fertile territory for the Russians to exploit in the way that Tim talks about in his book. But I would not say—I just would be a little bit cautious about it.</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">SNYDER: Can I—</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">MARTON: Yeah. Sure. Can we hear from Tim and then Nicole?</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">SNYDER: Just I forgot the second part of your question. So, I mean, Mike’s absolutely right. But the dark version of that it’s not just the Russian oligarch. It’s also our own oligarchs, right? And so the agenda of the Kremlin is not the same as the agenda of, say, the Koch brothers. But they—but, you know, this is nevertheless oligarchical pluralism, as opposed to the nicer kind of pluralism. So it does—I think it does matter hugely when your point of view on American democracy is that of Kansas, right?</span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">I mean, when I think of—when I think about U.S. national security and our current nominee for secretary of state, I think, you know, does the point of view on national security from Kansas, right, is that the right one—I mean, just to make a—because when you’re in Kansas you’re not worried that much about the naval base in Norfolk, Virginia, from which America, right, runs the world—the fact that global warming makes that naval base unviable in a matter of a few years. If you’re in Kansas, you may not see that, right? And if you’re—if the way you see the whole world is let’s deny global warming from Kansas, you know, that’s—that may not be in the interest of the entire country. OK, I was just trying to get the other side of your question. I’m sure Nicole will now say something—</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">BIBBINS SEDACA: No, not at all. No. I’m not—</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">MARTON: Go ahead, Nicole.</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">BIBBINS SEDACA: I would just pick up on the point about sovereignty, which I think is absolutely crucial. But I also think we need to recognize, sovereignty will not get better. It will only get weaker in the global system as it stands right now because the ease with which different forces, through technology, through financial transfers and others, can have impact on other places. And so I think the key thing then for those who care about liberal democracy at home and abroad is to identify what those forces are and see how there can be a shift to counter those forces.</span></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">And I think to some extent, we spend a lot of time in our country particularly debating left and right, Republican and Democrat, on various issues—which is absolutely important—but there also needs to be a debate about liberal versus illiberal democracy in our country and otherwise. Which means some people who have different policy views may need to come together periodically to say: This is what you think of Syria. This is what I think of Syria. But I respect that it’s important there is diversity of views and let us therefore oppose those who would degrade the institutions that would not allow us to debate. And so to some extent we as a society need to take on not just the left-right debate, but also say that there need to be a debate in the other direction as well.</span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">MARTON: And I’d just like to point out that some of these countries that we’re talking about, some of these authoritarian demagogic rulers, were democratically elected. And so that raises a whole other question about democracy that, OK, Orbán has just swept back into power by a thundering majority, which enables him to change what’s left of the Hungarian constitution. But what does that do for—to protect the rights of minorities and those who didn’t vote for him? So, you know, he can call himself a democracy, but is it?</span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Yes.</span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Q: Yeah. Christopher Dickey with The Daily Beast.</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">I feel as if we may have missed one key element here. Nothing is more anti-democratic or more easily exploited by demagogues than fear. And we haven’t talked about terrorism at all. But if we want to talk about the de-democratization of the United States and Europe, terrorism obviously had a huge role. And in fact, I’m surprised that the decline in democracy only goes back 12 years. I would have thought it would go back maybe 2001 or 2002. The Iraq War was a direct result of terrorist action, not because Saddam was behind it but because terrorism was used as the pretext for it. And while the Russians certainly helped Donald Trump get elected, the terrorist attacks in Paris, in San Bernardino, and elsewhere, at the end of 2015, essentially launched his campaign. He was able to play on this fear that somehow Mexicans crossing the border were in league with people in ISIS and bombing in Paris. And I’m just surprised that we haven’t addressed that at all in this discussion.</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">MARTON: That’s a good point, Chris. Thank you so much.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Interestingly enough, the terrorist attack in Paris did not result in the National Front being elected, however. We got Macron.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Q: (Off mic.)</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">MARTON: Yeah. (Laughs.) So how do you—how do you explain that? So what is it about our country, our society that proved more vulnerable to Russian intervention than—same can be said about Germany. OK, so the Alternative fur Deutschland is in the Bundestag, but it has only 13 percent support. And Merkel was reelected, having welcomed 1 million mostly Middle Eastern refugees to Germany. So how do you explain that?</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">BIBBINS SEDACA: I would say—I mean, most of these leaders have to use fear in order to gain votes, but also redefine this narrative of who is us, right? Because you have to have that in order to have support. And that fear could be fear of immigration, fear of refugees, fear of changing culture, fear of terrorism—however you want to define it—fear of people who look different than I do. But you have to have that fear element. I think to the extent which we’ve seen other politicians capture a narrative more effectively, to take those same true facts—immigration is a reality, terrorism is a reality, refugee flows are a reality. To the extent that they’re able to capture that and change it into a narrative that fits into a cohesive understanding of who we are as a society, they’ve been more effective.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">I think in the United States that wasn’t the case, that there wasn’t this recognition that there was a valid concern or a valid fear that could then be co-opted and brought into a different narrative. And so the narrative here, and I think in some other countries, and I think it is in Hungary, was able to be created that we are us. We are this culture. And anything coming into it, whether it’s terrorists or immigrants, is a threat to the us.</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">MARTON: Yes, sir.</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Q: Ralph Buultjens, New York University.</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">I was struck by the fact that you did not mention one word about religion, and your discussion was largely Western-centric. In many non-Western democracies, religion is the major force against liberal democracy. Not only in the Middle East. Look at India. Look at Sri Lanka. Look at Myanmar, OK? I’d like your comments on that.</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">MARTON: Well, let me just say, in defense of our topic which was fairly focused, that I wish we could—I wish we could attack all the problems in the world, because there are—there are many. And you cite, of course, one of the most crucial ones. And I hope they’ll ask us back to discuss the problem of religion in other parts of the world outside Europe. In Europe, it’s not at the forefront of the debate, or I don’t believe that in the United States it is to the extent that it’s responsible for our current political situation. But of course, it’s a very real problem. Anybody want to add anything to that?</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">SNYDER: Just one word. We were supposed to be talking about Eastern Europe. So we’ve already gone way beyond our mandate. (Laughter.) But I mean, I think your question, sir, connects interestingly with the previous question about terrorism. I mean, a white person of Christian background is going to be shot in the U.S. or die violently, most likely the perpetrator is going to be someone else of white Christian background. But people of white Christian background in the United States are more likely to think of Muslim terrorists and African-Americans when they think of violent death. And that’s a very good example of how really existing things in the world can be changed, can be turned to specific fear. So when the president, for example, changes an office of terrorism to office of Islamic terrorism, he’s doing something which is significant. I mean, there is terrorism in the United States. Most of it is Christian and white and right-wing. But if you relabel it another way, you’re pointing—you’re directing fear.</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">And the interesting thing is that it’s not actually fear. I mean, fear has an object. It’s anxiety. I think much of the way the new authoritarianism works is that it finds fears that no one can really resolve, and it just harps on them over and over again. If it’s not a fear you’re going to resolve, it’s anxiety rather than fear. I think they govern from anxiety. And we’re a little bit more vulnerable, because levels of anxiety are higher here than elsewhere. And that’s because our state, in many ways, is less functional than European states.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">MARTON: Next question. Yes, you. Yeah, and then you. Can you give us your name?</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Q: Matthew Hurlock. I’m a lawyer.</span></p><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">And, again, I understand the narrowness of the topic. The question to me is that also in 1989 was Tiananmen Square, where the democracy movement was crushed by China. And in my conversations with people here—by the government of China. What one discovers, what is becoming clearer to thinkers about China in particular is the virulence of the Chinese Communist Party, and their—the idea was post 1989, if we trade with them, they’ll liberalize. It’ll be fine. And we’re discovering very clearly that that’s not the case. It is in fact the case, I think, that China is focused on returning to being the Middle Kingdom, the dominant power in the world. And in order to do that, they need to supersede the United States as the dominant power in the world. And they are clearly, having just named Xi Jinping dictator for life, anti-democratic.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">MARTON: Is there a question?</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Q: The question is coming now. (Laughter.) Now they’re building to Europe with, you know, the Silk Road, et cetera, indebting all the countries on the way. Aren’t they the threat? Aren’t we not talking about the material global threat to the democratic movement worldwide? And what is your perception of that? And what would you do to counter that?</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">MARTON: Thank you. OK, Mike.</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">ABRAMOWITZ: Well, first of all, we have five minutes left it looks like.</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">MARTON: (Laughs.) And we’ve got a couple more questions.</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">ABRAMOWITZ: And we could be going on for hours and hours. But I’m glad you raised that question, because I do think that in the long term, you know, the rise of China, it poses more of a challenge to democracy in the end than Russia. I don’t know if Tim or Nicole believe that, but basically because China is a dynamic, prosperous, growing country. It’s lifted hundreds of millions of people out of poverty over the last 30 or 40 years. And clearly Xi Jinping is positioning himself and saying: Hey, look, we can—we can be a model for the developing world. You can have capitalism in an authoritarian context.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">And so I think in the long run that’s going to really be a challenge for us at places like Freedom House, or Yale, or Georgetown. Like, how do you, you know, combat that thinking. Because in the long term, I do think that societies can’t be prosperous unless people are given thought, freedom, freedom to speak, and all the kind of freedoms that, you know, make things possible like Silicon Valley. But I do worry about that. And I do—so I think that’s a valid point.</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">BIBBINS SEDACA: Very valid one.</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">MARTON: Thank you. Yes, sir. I think we have time for—</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Q: John Du (sp). I’m a lawyer too. I also work in the space of cross-border transactions between China and the U.S.</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">So to follow on that question, if in the, you know, future is that China will provide alternative example to other countries, is democracy itself, you know, a definitive value in itself, whether there are other systems or value which can be beneficial to broad development?</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">MARTON: OK. Tim.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">SNYDER: You want to go first, Nicole?</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">BIBBINS SEDACA: Yeah. I’ll just—quickly on that. I mean, I think China is just trying to, as Mike has said, present this alternative of economic growth. And it’s been successful domestically. It also has been because it has a massive economy of scale. But it’s certainly been able to export that to Africa and to other places in the world. And African countries are finding that short-term investment to be beneficial for their own economic growth. I think we can’t—we can’t underestimate the fact that calls for democratic rights and calls for many of the liberal values are things which come from societies themselves. They’re not this imposition that comes externally. So I think that sense, that longing is not something which is only because governments are trying different things out. I think that is a response to what is coming from the grassroots anyway.</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">MARTON: Tim, do you want to add something?</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">SNYDER: Yeah. I like the way you posed the question, because I think you’re absolutely right. People who are in favor of democracy have to make the case for democracy, just as people who are against democracy I think should openly make their case against democracy. As for me, my case for democracy wouldn’t have to do with the idea that it’s the best form of development. I would rather have 100,000 a year and be free than have $105,000 a year and not be free, because—and I’m happy to make the case at length as to why I think freedom is inherently a good thing. And I think your question sets the debate very nicely, because I think those of us who think that democracy is good ought to be able to explain why it’s good, rather than just saying it’s inevitable or everyone’s always going to have it. We know it’s not inevitable. We know not everyone’s going to have it. But perhaps it is—perhaps it’s good.</span></p><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">MARTON: And I think that, if anything, we learned in recent times that democracy is not guaranteed. It’s not a given. And the Athenian democracy lasted only 200 years. We’ve already passed that. But I think if we’re going to improve on that record, we do have to be vigilant. And I want to close on that—on that plea, that let’s keep asking ourselves what it is that prior generations didn’t do to protect and preserve values that we too, I think, took for granted at the end of the Cold War. And I can’t think of a better panel than these three people who have begun this conversation. And I hope we have many more.</span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">So thank you for your participation. And Tim, Nichole, and Mike, thank you for yours. (Applause.)</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">(END)</span></p><span data-dcnode-id="552" instrument_node="">
</span></div><span data-dcnode-id="550" instrument_node="">

</span><h3 class="card-group__title" data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">
              Explore More on United States
          </span></h3><span data-dcnode-id="532" instrument_node="">
</span><div class="card-group__container" data-dcnode-id="375"><span data-dcnode-id="531" instrument_node="">
</span><section class="card-article article card-article--with-thumbnail" data-dcnode-id="475"><span data-dcnode-id="530" instrument_node="">
