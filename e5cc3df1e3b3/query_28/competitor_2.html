cnode-id="1876" data-v-b33947ae=""><ul data-dcnode-id="1881" data-v-b33947ae=""><li data-dcnode-id="1882" data-v-b33947ae=""><a class="nav-item" data-dcnode-id="1883" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mts.intechopen.com/account/login" target="_blank"><span data-dcnode-id="1884" instrument_node="">Author Panel Sign in</span></a></li></ul><form class="search-term" data-dcnode-id="1877" data-v-36b4823c="" data-v-b33947ae=""><input data-dcnode-id="1880" data-v-36b4823c="" placeholder="Search" required="required"><button class="icr iconSearch" data-dcnode-id="1878" data-v-36b4823c="" type="submit"><span data-dcnode-id="1879" instrument_node="">Submit</span></button></form></aside><div class="nav-dropdown collapsed" data-dcnode-id="1844" data-v-b33947ae=""><div class="inner" data-dcnode-id="1845" data-v-b33947ae=""><div class="drop-box" data-dcnode-id="1871" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="1874" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/how-open-access-publishing-with-intechopen-works"><span data-dcnode-id="1875" instrument_node="">What is Open Access?</span></a><p data-dcnode-id="1872" data-v-b33947ae=""><span data-dcnode-id="1873" instrument_node="">Open Access is an initiative that aims to make scientific research freely available to all. To date our community has made over 100 million downloads. It’s based on principles of collaboration, unobstructed discovery, and, most importantly, scientific progression. As PhD students, we found it difficult to access the research we needed, so we decided to create a new Open Access publisher that levels the playing field for scientists across the world. How? By making research easy to access, and puts the academic needs of the researchers before the business interests of publishers.</span></p></div><div class="drop-box" data-dcnode-id="1866" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="1869" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/authors-and-editors"><span data-dcnode-id="1870" instrument_node="">Our authors and editors</span></a><p data-dcnode-id="1867" data-v-b33947ae=""><span data-dcnode-id="1868" instrument_node="">We are a community of more than 103,000 authors and editors from 3,291 institutions spanning 160 countries, including Nobel Prize winners and some of the world’s most-cited researchers. Publishing on IntechOpen allows authors to earn citations and find new collaborators, meaning more people see your work not only from your own field of study, but from other related fields too.</span></p></div><div class="drop-box" data-dcnode-id="1857" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="1864" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/page/content-alerts"><span data-dcnode-id="1865" instrument_node="">Content Alerts</span></a><p data-dcnode-id="1862" data-v-b33947ae=""><span data-dcnode-id="1863" instrument_node="">Brief introduction to this section that descibes Open Access especially from an IntechOpen perspective</span></p><a class="nav-item" data-dcnode-id="1860" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/how-open-access-publishing-with-intechopen-works"><span data-dcnode-id="1861" instrument_node="">How it works</span></a><a class="nav-item" data-dcnode-id="1858" data-v-b33947ae="" href="#"><span data-dcnode-id="1859" instrument_node="">Manage preferences</span></a></div><div class="drop-box" data-dcnode-id="1846" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="1855" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/page/contact-us"><span data-dcnode-id="1856" instrument_node="">Contact</span></a><p data-dcnode-id="1851" data-v-b33947ae=""><span data-dcnode-id="1854" instrument_node="">Want to get in touch? Contact our London head office or </span><a data-dcnode-id="1852" data-v-b33947ae="" href="#"><span data-dcnode-id="1853" instrument_node="">media team here</span></a></p><a class="drop-item" data-dcnode-id="1849" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/page/careers-at-intechopen"><span data-dcnode-id="1850" instrument_node="">Careers</span></a><p data-dcnode-id="1847" data-v-b33947ae=""><span data-dcnode-id="1848" instrument_node="">Our team is growing all the time, so we’re always on the lookout for smart people who want to help us reshape the world of scientific publishing.</span></p></div></div></div></div></header><section data-dcnode-id="97" data-v-87be0136="" data-v-e85dd3ce=""><div class="container" data-dcnode-id="1830" data-v-e85dd3ce=""><div class="breadcrumbs" data-dcnode-id="1831" data-v-80d35b96="" data-v-e85dd3ce=""><div class="wrap" data-dcnode-id="1832" data-v-80d35b96=""><p data-dcnode-id="1833" data-v-80d35b96=""><a class="router-link-active" data-dcnode-id="1840" data-v-80d35b96="" data-v-e85dd3ce="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/"><span data-dcnode-id="1841" instrument_node="">Home</span></a><span data-dcnode-id="1839" instrument_node=""> &gt;

                        </span></a><div class="ads-link" data-dcnode-id="1583" data-v-e85dd3ce="" id="intechopen-intechopen-5" style="padding-bottom: 4.5rem;"></div></div></div></aside><div class="middle-col" data-dcnode-id="428" data-v-e85dd3ce=""><div class="intro" data-dcnode-id="1572" data-v-46823712="" data-v-e85dd3ce=""><h2 class="title" data-dcnode-id="1576" data-v-46823712=""><span data-dcnode-id="1577" instrument_node="">Abstract</span></h2><div class="body" data-dcnode-id="1573" data-v-46823712=""><p data-dcnode-id="1574" data-v-46823712=""><span data-dcnode-id="1575" instrument_node="">Based on the promising democratic changes around the world during the late twentieth century, what are the favorable factors for building democracy? In the 1990s, research on democratization mushroomed, exploring how to explain reasons for democracy around the world. The global spread of democracy resulted in numerous conclusions about national and international favorable factors for democracy. More recently, the global democratic upsurge seems to have halted with worrying tendencies toward new forms of authoritarianism, hybrid regimes of both democratic and authoritarian institutions and fragile democracies. Recent studies have argued how authoritarianism has gone global and challenge the previous global spread of democracy. Based on a literature review of the bulk of studies on democracy building, this chapter identifies the main national and international favorable factors for democracy. It is argued that research has had a domestic focus up until the 1990s, but how international factors have come to play an important role in explaining democracy. Today, research must focus on the interplay between national and international factors to democracy building embedding both an actor and a structural dimension.</span></p></div></div><div class="keywords keywords-chapters" data-dcnode-id="1558" data-v-260fc791="" data-v-e85dd3ce=""><h3 class="subTitle" data-dcnode-id="1570" data-v-260fc791=""><span data-dcnode-id="1571" instrument_node="">Keywords</span></h3><ul data-dcnode-id="1559" data-v-260fc791=""><li class="item" data-dcnode-id="1568" data-v-260fc791=""><span data-dcnode-id="1569" instrument_node="">building democracy</span></li><li class="item" data-dcnode-id="1566" data-v-260fc791=""><span data-dcnode-id="1567" instrument_node=""> authoritarianism</span></li><li class="item" data-dcnode-id="1564" data-v-260fc791=""><span data-dcnode-id="1565" instrument_node=""> transition</span></li><li class="item" data-dcnode-id="1562" data-v-260fc791=""><span data-dcnode-id="1563" instrument_node=""> national factors</span></li><li class="item" data-dcnode-id="1560" data-v-260fc791=""><span data-dcnode-id="1561" instrument_node=""> international factors</span></li></ul></div><div class="info collapsed" data-dcnode-id="1539" data-v-7ab7a970="" data-v-e85dd3ce="" id="section-chapter-and-author"><div class="toggle-header" data-dcnode-id="1553" data-v-7ab7a970=""><h2 class="title" data-dcnode-id="1556" data-v-7ab7a970=""><span data-dcnode-id="1557" instrument_node="">Author Information</span></h2><a class="title" data-dcnode-id="1554" data-v-7ab7a970=""><span data-dcnode-id="1555" instrument_node="">Show +</span></a></div><div class="wrap" data-dcnode-id="1540" data-v-7ab7a970=""><ul data-dcnode-id="1543" data-v-7ab7a970=""><li class="authorsItem" data-dcnode-id="1544" data-v-7ab7a970=""><h4 class="author" data-dcnode-id="1549" data-v-7ab7a970=""><span data-dcnode-id="1552" instrument_node="">Daniel Silander</span><span data-dcnode-id="1550" data-v-7ab7a970=""><span data-dcnode-id="1551" instrument_node="">*</span></span></h4><span class="position" data-dcnode-id="1545" data-v-7ab7a970=""><ul class="list" data-dcnode-id="1546"><li data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Linnaeus University, Vaxjo, Sweden</span></li></ul></span></li></ul><p class="title" data-dcnode-id="1541" data-v-7ab7a970=""><span data-dcnode-id="1542" instrument_node="">*Address all correspondence to: Daniel.Silander@lnu.se</span></p></div></div><div class="reader-body reader-body" data-dcnode-id="873" data-v-2206b564="" data-v-e85dd3ce=""><div class="section" data-dcnode-id="1510" data-lvl="1" id="sec_1"><h2 class="heading main-title" data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">1. Introduction</span></h2><p data-dcnode-id="1519" id="p2"><span data-dcnode-id="1535" instrument_node="">There is an agreement in research about democracy building (democratization) that the previous century consisted of major ideological battles. Scholars on democracy building have argued that the last decades of the twentieth century consisted of a spirit of democracy with a growing number of democratic states around the world. From the 1970s to the mid-1990s, a global spread of new democracies occurred in most regions of the world—except the Middle East—and challenged post-totalitarian and authoritarian states, military regimes and despotic leaders in Southern Europe, Latin America, Asia, Africa and Central and Eastern Europe. These political changes made scholars portray the global changes in terms of “the triumph of democracy,” [</span><a class="ref-link" data-dcnode-id="1533" data-ref-style="bibr" href="#B1"><span data-dcnode-id="1534" instrument_node="">1</span></a><span data-dcnode-id="1532" instrument_node="">] “the end of history,” [</span><a class="ref-link" data-dcnode-id="1530" data-ref-style="bibr" href="#B2"><span data-dcnode-id="1531" instrument_node="">2</span></a><span data-dcnode-id="1529" instrument_node="">] “the democratic revolution” [</span><a class="ref-link" data-dcnode-id="1527" data-ref-style="bibr" href="#B3"><span data-dcnode-id="1528" instrument_node="">3</span></a><span data-dcnode-id="1526" instrument_node="">] and how democracy had become “globalized” [</span><a class="ref-link" data-dcnode-id="1524" data-ref-style="bibr" href="#B4"><span data-dcnode-id="1525" instrument_node="">4</span></a><span data-dcnode-id="1523" instrument_node="">] as a third “universal language” aside from money and the Internet [</span><a class="ref-link" data-dcnode-id="1521" data-ref-style="bibr" href="#B5"><span data-dcnode-id="1522" instrument_node="">5</span></a><span data-dcnode-id="1520" instrument_node="">].</span></p><p data-dcnode-id="1511" id="p3"><span data-dcnode-id="1518" instrument_node="">At the beginning of the twenty-first century, however, authoritarianism has gone global and is challenging democratic regimes and the notions of political rights and civil liberties around the world. Recent studies from the early 2000s and forward have pointed at a potentially worrisome trend in new types of authoritarianism and hybrid regimes [</span><a class="ref-link" data-dcnode-id="1516" data-ref-style="bibr" href="#B6"><span data-dcnode-id="1517" instrument_node="">6</span></a><span data-dcnode-id="1515" instrument_node="">] comprising both authoritarian and democratic institutions. This trend may have left the world community at a crossroads of democracy and authoritarianism. The global spread of democracies during the late twentieth century and the rise of authoritarianism in the early twenty-first century have raised an interest in understanding and explaining how to build democratic states around the world [</span><a class="ref-link" data-dcnode-id="1513" data-ref-style="bibr" href="#B7"><span data-dcnode-id="1514" instrument_node="">7</span></a><span data-dcnode-id="1512" instrument_node="">]. This study chapter sets out to understand how to build a democracy by identifying national and international favorable factors for democracy building. Section 2 after this introduction illustrates the global patterns of democracy building over time and is followed by Section 3 on the theoretical foundation of democracy. Sections 4 and 5 explain the favorable national and international factors for building democracy. Section 6 concludes this study.</span></p></d
