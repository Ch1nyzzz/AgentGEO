</span><div class="card-article-large__dek clamp-js" data-clamp-lines="4" data-dcnode-id="809"><span data-dcnode-id="810" style="display: -webkit-box; overflow: hidden; text-overflow: ellipsis; -webkit-box-orient: vertical; -webkit-line-clamp: 4;"><span data-dcnode-id="829" instrument_node="">Travis L. Adkins, deputy assistant administrator for Africa at USAID and lecturer of African and security studies at the Walsh School of Foreign Service and in the Prisons and Justice Initiative at Georgetown University, and Brenda Gayle Plummer, professor of history at the University of Wisconsin–Madison, led a conversation on race in America and international relations.

FASKIANOS: Welcome to the first session of the CFR Fall 2021 Academic Webinar Series. I’m Irina Faskianos, vice president of the National Program and Outreach at CFR. Today’s meeting is on the record, and the video and transcript will be available on our website CFR.org/academic if you would like to share it with your colleagues or classmates. As always, CFR takes no institutional positions on matters of policy.

We’re delighted to have Travis Adkins and Brenda Gayle Plummer with us to discuss race in America and international relations.

Travis Adkins is deputy assistant administrator in the Bureau of Africa at USAID, and lecturer of African and security studies at the Walsh School of Foreign Service, and in the Prisons and Justice Initiative at Georgetown University. As an international development leader, he has two decades of experience working in governance, civil society, and refugee and migration affairs in over fifty nations throughout Africa and the Middle East. Mr. Adkins was a CFR international affairs fellow and is a CFR member.

Dr. Brenda Gayle Plummer is a professor of history at the University of Wisconsin-Madison. Her research includes race and gender, international relations, and civil rights. Dr. Plummer has taught Afro-American history throughout her twenty years of experience in higher education. Previously she taught at Fisk University, the University of California, Santa Barbara, and the University of Minnesota. And from 2001 to 2005, Dr. Plummer served on the Historical Advisory Committee of the U.S. Department of State.

So, thank you both for being with us today. We appreciate you taking the time to share your thoughts with us.

Travis, I thought we could begin with you to talk about the ways in which you’ve seen race relations in America influence U.S. foreign policy.

ADKINS: Sure. Thank you so much, Irina. 

And welcome to everyone. Thank you for joining.

The first thing I would say is that America’s long history of violence, exclusion, and barbarism towards Black people and indigenous people and Asian communities and immigrant communities in the United States have worked to give the lie to the notion of who we say we are in terms of freedom, in terms of democracy, in terms of the respect for human rights. And these are the core messages that we seek to project in our foreign policy. And we’ve not been able to resolve those contradictions because we have refused to face this history, right? And we can’t countenance a historical narrative in which we are not the heroes, not the good guys, not on the right side of history. And the challenge that we’ve had is that we’ve seen that play out in so many ugly ways domestically. But it also has resonance and relevance in our foreign policy, because what it ends up doing is essentially producing a foreign policy of platitudes and contradictory posturing on the issues of human rights, on the issues of racial justice, on the issues of democratic governance when the world can see not only this history but this present reality of racial discrimination, of police brutality, of efforts to suppress the political participation of specific groups of people inside of America. They can see children in cages at the Southern border. They can see anti-Asian hate taking place in our nation, and they can hear those messages resounding, sometimes from our White House, sometimes from our Senate, sometimes from our Congress and other halls of power throughout the United States. And that works against the message of who we say we are, which is really who we want to be. But the thing that we, I think, lose out on is pretending that where we want to be is actually where we are. 

And I think back a couple weeks ago Secretary Blinken came out saying to diplomats in the State&nbsp;Department that it was okay for them to admit America’s flaws and failings in their diplomatic engagements with other countries. But I would—I do applaud that. But I also think that saying that we would admit it to the rest of the world—the rest of the world already knows. And who we would have to need to focus on admitting it to is ourselves, because we have not faced this national shame of ours as it relates to the historical and the present reality of White supremacy, of racialized violence and hatred and exclusion in our immigration policy, in our education policy, in our law and customs and cultural mores that have helped to produce ongoing violence and hatred of this nature in which our history is steeped. 

I think the other part of that is that we lose the opportunity to then share that message with the rest of the world. And so, what I like to say is that our real history is better than the story that we tell. So instead of us framing ourselves and our foreign policy as a nation who fell from the heavens to the top of a mountain, it’s a more powerful story to say that we climbed up out of a valley and are still climbing up out of a valley of trying to create and produce and cultivate a multiracial, multiethnic democracy with respect for all, and that that is and has been a struggle. And I think that that message is much more powerful. And what it does is it creates healing for us at home, but it also begins to take away this kind of Achilles’ heel that many of our adversaries have used historically—the Soviet Union, now Russia, China, Iran—this notion that democracy and freedom and the moral posturing of America is all for naught if you just look at what they do at home. Who are they to preach to you about these things when they themselves have the same challenges? And so I think that we would strengthen ourselves if we could look at this in that way.

And I would just close by saying that we often speak of the civil rights movement and the movement for decolonization in the world, and specifically in Africa where I mostly work, speak of them in the past tense. But I would argue that both of them are movements and histories that are continuously unfolding, that are not resolved, and that haven’t brought themselves to peaceful kinds of conclusions. And this is why when George Floyd is killed on camera, choked for nine minutes and loses his life, that you see reverberations all over the world, people pushing back because they are suffering from the same in their countries, and they are following after anti-Asian hate protestors and advocates, Black Lives Matter advocates and protestors, people who are saying to the world this is unacceptable. And so even in that way, you see the linked fates that people share. And so I think that the more we begin to face who we are at home, the more we begin to heal these wounds and relate better in the foreign policy arena, because I think that it is a long held fallacy that these things are separate, right? A nation’s foreign policy is only an extension of its beliefs, its policies and its aspirations and its desires from home going out into the world. So I will stop there. And thank you for the question.

FASKIANOS: Thank you very much.

Dr. Plummer, over to you.

PLUMMER: Well, your question is a very good one. It is also a very book-length question. I’ll try to address that.

First of all, I would like to say that I find Mr. Adkins’ statement quite eloquent and can’t think of anything I disagree with in what he has said. There are a couple of things that we might consider as well. I think there are several issues embedded in this question of the relationship between race relations in the United States and it’s policies toward other countries. One of them is, I think there’s a difference between what policymakers intend and how American policy is perceived. 

There is also the question of precisely who is making and carrying out U.S. foreign policy. Now there was a time when that question I think could be very readily answered. But we’re now in an age where we have enhanced roles for the military and the intelligence community. We have private contractors executing American objectives overseas. And this really places a different spin on things, somewhat different from what we observe when we look at this only through a strictly historical lens. 

I think we also need to spend some time thinking about the precise relationship between race and racism and what we might call colonial, more of imperialist practices. You might look, for example, at what is the relationship between the essentially colonial status of places like Puerto Rico and the Marianas and the—how those particular people from those places are perceived and treated within both the insular context and the domestic context. Clearly, everybody on the planet is shaped to a large degree by the culture and the society that they live in, that they grew up in, right? And so it is probably no mystery from the standpoint of attitudes that certain kinds of people domestically may translate into similar views of people overseas. But I think one of the things we might want to think about is how our institutions, as well as prejudices, influence what takes place. People like to talk, for example, about the similarities between the evacuation of Saigon and the evacuation of Kabul and wonder what is it called when you do the same thing over and over again and expect different results? We might want to think about what is it, institutionally, which creates these kinds of repetitions, creates situations in which diplomats are forced to apologize and explain continually about race and other conflictual issues in American society.

We might also think about what you perhaps could call a racialization process. Do we create categories of pariahs in response to national emergencies? Do we create immigrants from countries south of the United States as enemies because we don’t have a comprehensive and logical way of dealing with immigration? Do we create enemies out of Muslims because of our roles in the Middle East and, you know, the activities and actions of other states? There’s some historical presence for this—the internment of Japanese Americans during World War II, for example. So it seems to me that in addressing I think, you know, some of this very rich question, there are a number of ways and facets that we might want to look at and discuss more fully.

FASKIANOS: Great. Thank you very much.

And now we’re going to go to all of you for questions and comments. So you can either ask your question by raising your hand, click on the raised hand icon and I will call on you, or else you can write your question in the Q&amp;A box. And if you choose to write your question—although we’d prefer to hear your voice—please include your affiliation. And when I call on you, please let us know who you are and your institution. 

So the first question, the first raised hand I see is from Stanley Gacek.

Q: Yes, thank you very much. Thank you very much, Professor Plummer and Mr. Adkins, for a very, very compelling presentation.

My name is Stanley Gacek. I’m the senior advisor for global strategies at the United Food and Commercial Workers International Union, representing 1.3 million working women and men in the United States and Canada in the retail, wholesale, food production, healthcare, and services industries. Practically all of our members are on the frontlines of the pandemic. I also served as deputy director and interim director of the ILO mission in Brazil in 2011 to 2016. 

And my question is this. I wonder if the speakers would also acknowledge that an issue for the United States in terms of its credibility with regard to racial justice, human rights, and of course labor rights, is a rather paltry record of the United States in terms of ratifying international instruments and adhering to international fora with regard to all of these issues. One example which comes to mind in my area is ILO Convention 111 against discrimination in employment and profession, which could—actually has gone through a certain due diligence process in former administrations and was agreed to by business and labor in the United States but still the United States has failed to ratify. I just wondered if you might comment more generally about how that affects our credibility in terms of advocating for racial justice, human rights, and labor rights throughout the world.

Thank you very much.

FASKIANOS: Who can address that, would like to address that?

PLUMMER: Well, I have very little immediate knowledge of this, and I have to say that labor issues and labor rights have been kind of a missing element in terms of being heavily publicized and addressed. I think it has something to do with the fact that over the course of the decades the United States has been less responsive to the United Nations, to international organizations in general. But in terms of the specifics, you know, precisely what has fallen by the wayside, I, you know, personally don’t have, you know, knowledge about that.

ADKINS: And I would just say more generally, not to speak specifically in terms of labor, where I’m also not an expert, but there is, of course, a long history of the U.S. seeking to avoid these kinds of issues in the international arena writ large as Dr. Plummer was just referring to. I just finished a book by Carol Anderson called </span><em data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Eyes Off the Prize</span></em><span data-dcnode-id="826" instrument_node="">, which is a whole study of this and the ways in which the U.S. government worked through the United Nations to prevent the internationalization of the civil rights movement which many—Malcom X and Martin Luther King, Fannie Lou Hamer, and others—sought to frame it in the context of human rights and raise it into an international specter, and that was something that the U.S. government did not want to happen. And of course, we know that part of the genius of the civil rights movement writ large was this tactic of civil disobedience, not just to push against a law that we didn’t like to see in effect but actually to create a scene that would create international media attention which would show to the world what these various communities were suffering inside of America, to try to create pressure outside of our borders for the cause of freedom and justice and democracy. And so there is that long history there which you’ve touched on with your question. Thank you for that.

FASKIANOS: Thank you. I’m going to go next to Mojubaolu Olufunke Okome.

Q: Good afternoon and thank you for your presentation.

I just wonder about U.S. foreign policy, how it lines up with the domestic politics, you know, in terms of race relations, because if one was to believe U.S. propaganda, you know, this country is doing good in the world, it’s the country to emulate. But you know, the events of—well, I guess the George Floyd case brought into graphic relief what most astute observers of the U.S. know, that race relations of the U.S. do not line up very well with the constitutional aspirations of the U.S. So what’s going to change now, you know? And then there’s also this pandemic and the way which race and class is showing us about the real serious inequalities in the U.S. So what’s going to change in terms of lessons learned? 

And then moving forward, is also multilateralism going to come back into U.S. foreign policy in some way? That’s it. 

PLUMMER: I think—I’m getting kind of an echo here. I don’t know if other people are. 

I don’t think anyone is—you know, who is thinking about this seriously doubts that the United States is in a crisis at the moment—a crisis of legitimacy not only abroad but also domestically. We have a situation in which an ostensibly developed country has large pockets, geographic pockets where there are, you know, 30, 40, 50 percent poverty rates. We have people who are essentially mired in superstition, you know, with regard to, you know, matters of health and science. And you know, I don’t think anyone is, you know—is, you know—who is, you know, thinking about this with any degree of gravity is not concerned about the situation. Once again, I think we’re talking here about institutions, about how we can avoid this sort of repetitive and cyclical behavior.

But one thing I want to say about George Floyd is that this is a phenomenon that is not only unique to the United States. One of the reasons why George Floyd became an international cause célèbre is because people in other countries also were experiencing racism. There—other countries had issues with regard to immigration. And so really looking at a situation in which I think is—you know, transcends the domestic, but it also transcends, you know, simply looking at the United States as, you know, the sort of target of criticism. 

FASKIANOS: Do you want to add anything, Travis, or do you want to—should we go to the next question?

ADKINS: Go on to the next question. Thank you.

FASKIANOS: OK, thank you.

Let’s go to Shaarik Zafar with Georgetown, and our prior questioner was with Brooklyn—teachers at Brooklyn College.

Q: Hey, there. This is Shaarik Zafar. I was formerly the special counsel for post-9/11 national origin discrimination in the Department of Justice Civil Rights Division—sorry, that’s a mouthful—and then most recently during the Obama years I was a special representative to Muslim communities. So this—I first applaud the presentation. These issues are very near and dear to me.

I think it’s clear, you know, we have to own up and acknowledge our shortcomings. And I think, you know, I was really sad to hear that we actually worked against highlighting what I think is really an example of American exceptionalism, which is our civil rights movement and our civil rights community. When I was at State during the Obama years, we had a very modest program where we brought together U.S. civil rights leaders and connected them with European civil rights leaders. And the idea wasn’t that we had it all figured out but rather that, you know, in some respects the United States has made some advances when it comes to civil rights organizing and civil society development in that respect—and perhaps more so than other countries. I was just thinking, I would love to get the panelists’ thoughts on ways that we can continue to collaborate and—you know, on a civil society level between civil rights organizations in the United States and abroad and the way the U.S. government should actually support that—even if it means highlighting our shortcomings—but as a way to, you know, invest in these types of linkages and partnerships to not only highlight our shortcomings but look for ways that we could, you know, actually come to solutions that need to be, I think, fostered globally. Thanks so much.

ADKINS: You know, the first thing I would say, Shaarik—thanks for your question—I thought it was interesting, this idea of framing the civil rights movement as a kind of example of American exceptionalism. And I think there’s a way in which I would relate to that in the sense that folks did, at least nominally or notionally, have certain kinds of freedom of speech, certain kinds of rights to assembly. But even those were challenged, of course, when we see the violence and the assassinations and all of the machinations of the government against those who were leaders or participants in that movement. And so in that sense, perhaps I would agree. 

I might push back, though, in terms of American exceptionalism as it relates to civil rights, because these people were actually advocating against the U.S. government, who actually did not want them to have the rights that they were promised under the Constitution. Of course, many of us would not be free or able to speak up without the 13th and 14th and 15th Amendments. And so there’s a sense in which we celebrate them, but there’s also a sense in which they are actually indictments of the original Constitution which did not consider any of those things to be necessary elements of our society. 

In terms of civil society and where the U.S. government is engaged, I think that, you know, sometimes when we deal with these problems that are foreign policy related, you know, sometimes the answer is at home. Sometimes the answer is not, you know, a white paper from some high-level think tank. It’s not something that starts ten thousand miles away from where we are, because I don’t think that we would have the kind of standing and credibility that we would need to say that we believe in and support and give voice and our backing to civil society movements abroad if we don’t do the same thing at home. 

And so everything that we want to do somewhere else, we ought to ask ourselves the question of whether or not we’ve thought about doing it at home. And I don’t mean to suggest—because certainly no nation is perfect, and every nation has its flaws. But certainly, we would be called to the mat for the ways in which we are either acknowledging or refusing to acknowledge that we have, you know, these same—these same challenges. And so I think there still remains a lot of work to be done there in terms of how we engage on this. And you have seen the State Department come out and be more outspoken. You’ve seen the Biden administration putting these issues more out front. You have now seen the Black Lives Matter flag flying over U.S. embassies in different parts of the world. And some people might view that as co-optation of a movement that is actually advocating against the government for those rights and those respects and that safety and security that people believe that they are not receiving. And others might see it as a way to say, look, our nation is embracing civil society and civic protests in our nation as an example that the countries in which those embassies are in should be more open to doing the same kinds of things. And so it’s a great question. I think it remains to be seen how we move forward on that—on that score.

FASKIANOS: Thank you.

I’m going to go next to Molly Cole.

Q: Hi. My name is Molly Cole. I am a grad student of global affairs at New York University.

I was just curious sort of what y’all thought about what the consequences of foreign policy on punishment systems and institutions as it pertains to race relations in the United States would be, also in tandem with sort of this strive for global inclusivity and equity and just sort of, I guess, hitting those two ideas against each other.

ADKINS: Can you clarify the ideals for us, Molly? So one sounded like it was about maybe mass incarceration or the death penalty or things of that nature? You’re talking about punitive systems of justice? And then the other seemed to be more about diversity, equity, and inclusion in the foreign policy space? But I don’t want to put words in your mouth. I just want to make sure I understand the question.

Q: You hit the nail on the head.

ADKINS: OK. Do you want to go ahead, Dr. Plummer?

PLUMMER: Oh. Well, again, a great question but, you know, one of, you know, it’s—could write a book to answer. (Laughs.) Well, if you’re talking about the sort of international regime of incarceration—is that what you were referring to?

Q: Yes, essentially. So when we’re—when we’re considering, you know, these punitive systems, I’m thinking in terms of, you know, the death penalty, mass incarceration, private prisons, sort of this culmination of us trying to come up with these ideals, but doing it sort of on our own, while also combatting, you know, what the nation is calling for, what the globe is calling for.

PLUMMER: Yeah. I think this sort of pertains to what I had mentioned earlier about just, you know, who is making and carrying out U.S. foreign policy, or domestic policy for that matter. There’s a whole question of the state and, you know, what parts of the state are involved in this whole question of incarceration and are involved in the whole question of the death penalty. One of the things that we are aware of is that prisons have—some of the prisons are actually not being operated by civil authorities. They’re operated by private entities. 

We saw this again in—you know, particularly in Afghanistan, where a lot of functions which normally, you know, are carried out by civil authorities are carried out by private authorities. And so this really puts a whole different perspective on the question or the relationship of citizens to the state and, you know, to any other particular group of citizens to the state. So I think that, you know, one of the problem areas then is to tease out what in fact are the obligations and privileges of government, and how do they differ from and how are they distinguished from the private sector. 

Q: Thank you.

ADKINS: And I would just add quickly on this notion of hypocrisy and saying one thing and doing another, there was an interesting anecdote around this when President Obama visited Senegal. And he was delivering a fairly tough message about the treatment of members of the LGBT+ community in Senegal. And President Macky Sall got up essentially after President Obama and was essentially saying that, you know, we kind of appreciate this tough love lecture, but I would remind you, you know, that Senegal doesn’t have the death penalty, right? And so on one hand we’re actually saying something that has a grounding. Of course, people of all human stripes can have dignity, and have respect and be protected. But he is then hitting back and saying, hey, wait a minute, you kill people who break laws in your own country. And we don’t have the death penalty. So who should actually be the arbiter of how is the correct way – or, what is the correct way to be?

On the second part of your question, quickly, Molly, especially as it relates to the kind of diversity, equity, and inclusion piece, this is why also there has been a big push to look in our State Department, to look at USAID, to look at the face that America presents to the world. And all too often that face has been male, that face has been White. And that gives a certain perception of America, but it also means that we lose the tremendous treasure and talent of people who have language skills, who come from communities in which their own perspective on the world actually is a talent that they have. Specifically, because many of those communities—whether they’ve immigrated or come to America by different means—are also from groups who’ve been marginalized, who’ve been oppressed, who have a certain frame and a lens with which to engage with other nations in the world, either in terms of partnership, either in terms of deterrence. And so we lose out in many ways because we haven’t done a great job in that—in that matter. 

FASKIANOS: I’m going to take a written question from Morton Holbrook, who’s at Kentucky Wesleyan College.

His question is: How should the United States respond to international criticism to the U.S.’s racial discrimination? And how will that affect the relationship between the U.S. and the international community?

PLUMMER: Well, the United States, I think, has—(laughs)—no choice but to acknowledge this. Historically this has been a problem that when pressed on this issue in the past the response was always, well, you know, we know this is a problem and we’re working on it. And the most egregious examples of racism are the responsibility of people who are either at the margins of society or who represent some sort of relic past that is rapidly disappearing, right? That was the message about the South, right? OK, the South is, you know, rapidly developing and so soon these vestiges of violent racism will be over. 

Well, again, the reason why that doesn’t work anymore—(laughs)—is because we’re always projecting this future, right, that—you know, it’s always being projected further and further into the future. And we’re never there yet. And it seems to me, again, that this is a problem of institutions. This is a problem of the embeddedness of racism in American life, and a refusal on the part of so many Americans to acknowledge that racism is real, and that it exists. And you know, I think we see many examples of this. I’m thinking of one instance where a George Floyd commemorative mural was painted on a sidewalk and some folks came along with some paint and painted over it, because they said it wasn’t a racism corner, you know, while engaged in a racist act.

So, you know, there really needs to be, I think, on a very fundamental level, some education—(laughs)—you know, in this country on the issue of race and racism. The question is, you know, who is—who will be leaders, right? Who will undertake this kind of mission?

ADKINS: One thing I would say, quickly, on that, Irina, just an anecdote as well that also relates to really in some ways the last question about who our representatives are and what perspective they bring. Several years ago, I was on a trip—a congressional delegation to Egypt. And I was with several members of the CBC. And we met with President Sisi. And they were giving him a fairly rough go of it over his treatment of protesters who were protesting at that time in Tahrir Square, many of whom had been killed, maimed, abused, jailed. And he listened to them kind of haranguing him. And at the end of that speech that they were giving to him he said basically: I understand your points. And I hear your perspective. But he said, can I ask you a question? They said, sure, Mr. President. We welcome you to ask questions. 

And he said, what about Ferguson? And the day that he said that Ferguson was on fire with surplus military equipment in the streets of America, with, you know, tear gas and armed military-appearing soldiers in the streets of America who were seen, at least optically, to be doing the same thing, right? Not as many people were killed, certainly, but the point is you have this same problem. However, if that had been a different delegation, he might have scored a point in their verbal jousting. But President Sisi had the misfortune of saying this to two-dozen 70-plus-year-old Black people. And no one in America would know better than they what that is like.

And so what they ended up replying to him by saying, exactly. No one knows this better than we do. And this is exactly why we’re telling you that you shouldn’t do it. Not because our country doesn’t have that history, but because we do have that history and it has damaged us, and it will damage you. Which takes on a completely different tone in our foreign relations than if it was simply a lecture, and that we were placing ourselves above the nations of the world rather than among them.

FASKIANOS: Thank you. I’m going to go to Ashantee Smith.

Q: Hello. Can you guys hear me?

ADKINS: We can.

FASKIANOS: Yes.

Q: OK, perfect. Hi. My name is Ashantee Smith. I am a grad student at Winston-Salem State University.

In regards to some of the responses that you guys gave earlier, it gave me a question. And I wanted to know how you guys were putting the correlation between racism and immigration.

PLUMMER: Well, yeah. The United States has a history of racialized responses to immigrants, including historically to White immigrants. Back in the day the Irish, for example, were considered to be, you know, something less than White. We know, however, that society—American society has since, you know, incorporated Europeans into the category of Whiteness, and not done so for immigrants from Latin America, Asia, and Africa, who remain racialized, who are perceived as being, in some respects by some people, unassimilable. We also have a phenomenon of the racialization of Muslims, the creation of outcast groups that are subjected to, you know, extremes of surveillance or exclusion or discrimination. 

So immigration is very much embedded in this, is a question of an original vision of the United States, you know, and you can see this in the writings of many of the founding fathers, as essentially a White country in which others, you know, are in varying degrees of second-class citizens or not citizens at all. So this is, I think, an example of something that we have inherited historically that continues to, you know, be an issue for us in the present. Yeah.

FASKIANOS: Thank you. I’m going to go next to Pearl Robinson.

Q: Hello. I am just so thrilled to see the two panelists here.

I want—I actually raised my hand when you were talking about the labor rights issue. And I’m at Tufts University. And I’m currently working on an intellectual biography about Ralph Bunche. And I actually ran over here from the U.N. archives where I was actually reading about these issues. (Laughs.) And I wanted to just say that the discussion we’re having now, it’s sort of disjointed because we’re dealing with lots of erasures, things that are overlooked, and they are not enough Carol Andersons and Brenda Gayle Plummer professors out there putting these things in press. But even more importantly, they are not sufficiently in our curriculum. So people who study international relations and people who do international relations don’t know most of these things.

So my quick point I just wanted to say was during World War II when Ralph Bunche was working for the OSS military intelligence, his archives are full of it, he went and he was interviewing our allies at their missions and embassies in the U.S.—the French, the British—asking them: What are your labor relations policies in your colonial territories? And this was considered important military information for the United States, as we were going to be—as Africa was an important field of operation. When you get to actually setting up the U.N., I was struck in a way I hadn’t, because I hadn’t read archives this way. (Laughs.) But I’m looking at conversations between Bunche and Hammarskjöld, and they’re restructuring the organization of the United States—of the United Nations.

And there are two big issues that are determining their response to the restructuring—the Cold War as well as decolonization. And I actually think that those two issues remain—they’re structuring that conversation we’re having right now. And they—we say the Cold War is over, but I love this phrase, of the racialization of the current enemies or people we think of as enemies. So I actually do think that this is a really good program we’re having where we’re trying to have the conversation. But the dis-junctures, and the silences, and the difficulties of responding I think speak volumes.

The last thing I will say, very quickly, that incident about the discussion with President Sisi that Mr. Adkins—that needs to be canned. That needs to be somehow made available as an example that can be replicated and expanded and broadened for people to use in teaching.

ADKINS: Well, I always listen when my teacher is talking to me, Dr. Robinson. Thank you for sharing that. And I’m working on it, I promise you. (Laughter.)

FASKIANOS: Thank you. I’m going to go next to—we have lots of questions and raised hands, and we’re not going to get to all of you. So I apologize right now. (Laughs.) We’ll do the best we can.

Jill Humphries.

Q: Hello. My name is Jill Humphries. And I’m an adjunct assistant professor in the Africa Studies Program at the University of Toledo, and have been doing Africa-based work, I’m proud to say, for about thirty-three years, starting at the age twenty-two, and have used Dr. Plummer’s work in my dissertation. And hello, fellow ICAPer (sp).

So my question is this: There’s an assumption that I believe we’re operating in. And that is race and racism is somehow aberrant to the founding of this country, right? So we know that Saidiya Hartman and Frank Wilderson, the Afropessimist, make the argument that it is clearly key that it is fundamental to the development of our institutions. And so my question is this: You know, the—in the domestic scene the sort of abolitions clearly state that unless we fundamentally transform our norms and values, which impact, of course, our institutions, then we will continue to have the exact outcomes that are expected. The killing of George Floyd and the continuing, I think, need to kill Black bodies is essential to this country.

And so my question is, in the context of foreign relations, international relations, are we also looking at the way in which, number one, it is not aberrant that racism is a constituent element in the development of our foreign policy and our institutions? And that unless we fundamentally first state it, acknowledge it, and then perhaps explore the way in which we dismantle, right—dismantle those norms and values that then impact these institutions, that we’re going to continue to have the same outcomes, right? So for example, when Samantha Powers visited Ethiopia, if you’ve been following that whole narrative, there was a major backlash by the Ethiopian diaspora—major. My colleagues and friends, like, I’ve had intense conversations, right, around that. Same thing about the belief about Susan, former—Susan Rice’s role, right, in continuing to influence our foreign policy, particularly towards the Horn of Africa.

So my question is: What does that look like, both theoretically, conceptually? But more importantly for me, because I’m a practitioner on the ground, what does that look like in practice? And that’s where I think Professor Adkins, working for USAID, could really kind of talk about. Thank you.

ADKINS: Thank you. Yeah, you know, I think it goes back to Dr. Robinson’s question a moment ago. And that is the first the acknowledgement and the calling out and the putting into relief and contrast the context in which we’re operating, especially when we think about not even USAID specifically, but the industry of development—aid and development assistance kind of writ large. Because essentially what we have is a historical continuum that starts with the colonial masters and the colonial subjects. 

And then that because what is called, or framed, as the first world and the third world, right? And then that becomes the developing world and the developed world. Then that becomes the global north and the global south. All of which suggests that one is above, and one is below. That one is a kind of earthly heaven, the other kind of earthly hell. That one possessed the knowledge and enlightenment to lead people into civilization, and the other needs redemption, needs to be saved, needs to be taught the way to govern themselves, right? That this kind of Western notion of remaking yourself in the world, that your language, that your system of government, that your way of thinking and religious and belief and economics should be the predominant one in the world.

And so I think, to me, what you’re saying suggests the ways in which we should question that. And this is where you start to hear conversations about decolonizing aid, about questioning how we presume to be leaders in the world in various aspects, of which we may not actually be producing sound results ourselves. And thinking again about this notion of placing ourselves among nations rather than above nations in the ways in which we relate and engage. And I think that it’s one of the reasons that we continue to have challenges in the realm of development assistance, in the realm of our diplomacy and foreign policy. 

Because, again, there is a pushback against that kind of thinking, which is rooted in a deep history that contains much violence and many types of economic and diplomatic pressures to create and sustain the set of power relations which keeps one group of people in one condition and one in another. And so it’s a huge question. And how to bring that kind of lofty thinking down to the granular level I think is something that we will have to continue to work on every day. I certainly don’t have the answer, but I’m certainly answering—asking, I should say—the questions.

PLUMMER: I think I might also think about how is in charge. And this is—you know, it goes back to something we talked about before, when U.S. foreign policy is no longer exclusively rooted in the State Department? So in terms of, you know, who represents the United States abroad and in what ways, and how is that representation perceived, we’re really looking at, you know, a lot of different actors. And we’re also looking at, you know, changes in the way that the U.S. government itself is perceiving its role, both at home and abroad. 

And one of the questions was previously asked about the system of incarceration speaks to that, because we have to ask ourselves what are—what are—what are the proper roles and responsibilities and burdens of the state, the government and, you know, what is leased out—(laughs)—in some ways, for profit to private concerns? So I think that, you know, some of this is about, you know, a sense of mission that I don’t see out there, that I think will in some respects have to be restored and reinvented.

FASKIANOS: Thank you. I’m going to go next to Erez Manela.

Q: Thank you very much for this really terrific and important panel. My name is Erez Manela. I teach the history of U.S. foreign relations at Harvard. 

And my question actually—I don’t know if Irina planned this—but it follows on directly from the previous question. Because I kept on wondering during this panel what—I mean, the focus that we’ve had here, the topic that’s been defined, is the way in which domestic race relations, domestic racism, have shaped U.S. foreign policy. But of course, U.S. foreign policy has been shaped—as the previous questioner noted—has been shaped directly by racism and perceptions of racial hierarchy for—well, since the very beginning. And Professor Adkins spoke very eloquently about it. And of course, Professor Plummer has written eloquently about that, including in her books on Haiti and international relations.

But I guess I’m wondering if you could speak more about the specifics about the history that needs to be recognized in that realm, and then—and this is maybe self-interested—whether you have any recommendations, in the way that you recommended Carol Anderson’s really terrific book—for reading that we can read ourselves or give our students to read, that would really drive that point home, the influence of racism, race perceptions, race hierarchies themselves on—directly on the conduct of U.S. foreign relations historically.

PLUMMER: Well, Professor Manela, I appreciate your own work on Wilson. And you know, that in some respects—that would be a book that I’d recommend. (Laughs.) Might also think about Mary Dudziak’s work on Cold War civil rights, and her law review article, </span><em data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Desegregation as a Cold War Imperative</span></em><span data-dcnode-id="823" instrument_node="">, which, you know, directly addresses these questions.

Again, what I would like to see is some work that will—perhaps not necessarily a historical perspective—but will address this whole question of the sort of growing, I don’t know what you’d call it, multiplicity or multivariant character of American policymaking, you know, as we—as we go forward, you know, past the Cold War era. There’s an interesting item by a man named Andrew Friedman, who wrote a book called </span><em data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Covert Capital</span></em><span data-dcnode-id="820" instrument_node="">. I think the subtitle is something like </span><em data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Landscapes of Power</span></em><span data-dcnode-id="817" instrument_node="">, in which we discussed the rise of Northern Virginia as what he sees as the true capital of, you know, parts of the U.S. government, in being a center for the military and for intelligence community. And their shaping of that environment at home, as well as their influence in shaping U.S. policy abroad. So, you know, there’s a lot of room for work on these—on these issues.

ADKINS: And I would also just follow up—and thank you for the question—and add another book that I just finished. Daniel Immerwahr, from Northwestern University, </span><em data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">How to Hide an Empire</span></em><span data-dcnode-id="814" instrument_node="">, which deals in many ways with U.S. foreign policy and the way in which it is explicitly racialized and ways in which that goes understudied in our—in our policy circles, and certainly in the world of education.

FASKIANOS: I’m going to try to squeeze in one last question. And I apologize again for not getting to everybody’s question. We’ll go to Garvey Goulbourne as our final question.

Q: Yes. Hi. Can you hear me?

FASKIANOS: We can.

Q: Yeah. My name’s Garvey Goulbourne. I’m a student at the University of Virginia, actually studying abroad this semester in Rabat, Morocco. 

And my question to you both is: What mechanisms do we have to orient the narratives that our foreign policy leaders are brought up with? Thinking particularly of American exceptionalism and how we kind of place ourselves on a pedestal, whether they be foreign affairs schools or various institutions at different levels of American education, what tools do we have to address the foundations of American perspectives of themselves and our nation in relation to the rest of the world, particularly the global south?

FASKIANOS: Who wants to go first? An easy question, of course, to close with.

PLUMMER: Go ahead, Mr. Adkins.

ADKINS: Sure, sure. Thank you for your question, Garvey. And congratulations on the move out to Morocco. Great to see you there.

I think the first thing I would say, of course, is our tools, as far as I am concerned, relate certainly to education. And it’s one of the reasons that I am in the classroom. But I know what that fight is like, because even education is taken over by these notions of White supremacy, by these notions of singular historical narratives. And this is why there’s been such a push against the 1619 Project of the</span><em data-dcnode-id="812"><span data-dcnode-id="813" instrument_node=""> New York Times</span></em><span data-dcnode-id="811" instrument_node="">, why there is this kind of silly season around the misunderstood origins and contexts of critical race theory. There is this battle over who gets to tell the story of what America is, because it is more than—but it is more than one thing, obviously, to a multiplicity of people. 

And so I am kind of remiss—or, not remiss. There’s no way for me to elucidate for you now a series of tools that will resolve these problems, because these are challenges that people have been wrestling with before our mothers’ mothers were born. And so we only are continuing that fight from where we sit. And certainly, in the classrooms that I am in, whether they are in prisons or on campuses, we are always digging into the origin of these themes. And the main frame through which I teach is not just for students to understand this history for their health, but for them to understand this history as a lens through which to view the current world and all of the events and challenges that we find ourselves facing, to see if we can come up with new ways to address them.

PLUMMER: Well, one of the things that Mr. Goulbourne could do, since he is in Morocco, is to make use of his own insights in his conversations with Moroccans. So, you know, there is still a role, you know, for individual actors to play some part in attempting to make some changes.

FASKIANOS: Well, with that we unfortunately have to close this conversation. It was very rich. Thank you, Travis Adkins and Brenda Gayle Plummer or sharing your insights and analysis with us. We really appreciate it. To all of you, for your questions and comments. Again, I’m sorry we couldn’t get to all of you. You can follow Travis Adkins @travisladkins, and that’s on Twitter. And our next Academic Webinar will be on Wednesday September 29, at 1:00 p.m. (ET) with Thomas Graham, who is a fellow at CFR. And we’ll talk about Putin’s Russia.

So in the meantime, I encourage you to follow us at @CFR_Academic, visit CFR.org, Thinkglobalhealth.org, and ForeignAffairs.com for new research and analysis on global issues. So thank you all again and we look forward to continuing the conversation.

ADKINS: Take care, everyone. Thank you.

</span><div class="card-article-large__dek clamp-js" data-clamp-lines="4" data-dcnode-id="632"><span data-dcnode-id="633" style="display: -webkit-box; overflow: hidden; text-overflow: ellipsis; -webkit-box-orient: vertical; -webkit-line-clamp: 4;"><span data-dcnode-id="748" instrument_node="">Adam Julian, director of international student and scholar services at University of Maryland, Baltimore County, and 2021 chair of the international student and scholar regulatory practice committee at NAFSA, discusses visa challenges for foreign students and international student enrollment with the return to in-person learning this fall.&nbsp;

&nbsp;

</span><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">IRINA FASKIANOS:</span></strong><span data-dcnode-id="745" instrument_node=""> Good afternoon and welcome to CFR’s Higher Education Webinar. I'm Irina Faskianos, vice president of the National Program and Outreach at the Council on Foreign Relations. Today's discussion is on the record and the video and transcript will be available on our website, CFR.org/academic. As always, CFR takes no institutional positions on matters of policy. We're delighted to have Adam Julian with us to talk about visa challenges for foreign students and fall international student enrollment. We've shared his bio with you, but I'll just give you a few highlights. Mr. Julian is the director of international student and scholar services at the University of Maryland, Baltimore County, and the 2021 to 2022 chair of the International Student and Scholar Regulatory Practice Committee at NAFSA: Association of International Educators. From 2015 to 2020, he was the director of international student and scholar services and outreach at Appalachian State University in North Carolina. 

Adam, thanks very much for being with us today. Obviously, we are coming off this pandemic. I thought we could start by looking at the primary visa challenges foreign students are facing now and what this means for international student enrollment, as schools return to in-person learning this fall.

</span><strong data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">ADAM JULIAN:</span></strong><span data-dcnode-id="742" instrument_node=""> Yeah, thanks so much for having me, Irina. And I appreciate the invitation and all the work that the Council on Foreign Relations does in this sphere. And it's an honor to be here today. So I wanted to start today with just discussing a few points. And a lot of this I know is information that will not be new to anyone, but hopefully it will spur some good conversation and some good dialogue amongst the group. And so today, I'll touch largely on some visa challenges for foreign students who want to study in the U.S., not necessarily only in the moment, sort of in the COVID sense, but also just in general some of the challenges for foreign students. Also, I want to touch a little bit about my experience, as the chair of the International Student and Scholar Regulatory Practice Committee with NAFSA, and how liaising with federal agencies and our partner agencies, how that's really changed, in particular under the Biden administration, in the last couple of years. And then finally I want to talk a little bit about some international enrollment challenges and tensions for the fall semester, really things in the moment. 

And so, what I want to say about visa challenges for foreign students, and really, of all of the English-speaking destination countries for higher education, so think the UK, think Australia, New Zealand, and elsewhere, the U.S. visa, I would argue, is more expensive and difficult to obtain and comes with fewer benefits in terms of post-graduation work opportunities, in terms of paths to citizenship or permanent residency, than any of its competitors. But despite this, I think the U.S. is still largely seen as one of the best systems of higher education in the world, and U.S. education is still highly sought after by international students. So, when I say it's challenging and difficult for students to obtain a visa, when you think about it just in terms of cost alone, right, if you take into consideration the SEVIS fee, which is the immigration database the Department of Homeland Security and others use, the application fee for the visa itself. That alone is $510. And that's not to mention the cost of travel to a different city. Most of the time, U.S. consulates, depending on the country, as you all know, are either in the capital city or regional city, an applicant may have to provide or may have to travel and stay overnight, take time away from work, all these different things just simply for the opportunity to apply for an interview. This gets especially complicated in other geopolitical complications, think of the case of an Iranian student who has no U.S. Embassy in their home country to apply to and has to go to a third-party country, typically Yerevan or Ankara third-party consulate and it adds an additional cost. 

So, there's that piece, which is the cost of the visa itself, within even simply to receive an invitation letter or what's known as a Form I-20, from an institution of higher education or any type of institution authorized to issue those in the United States, students have to provide proof of financial solvency for twelve calendar months, just to be eligible to receive this. So, in addition to the cost of the actual application process and applying itself, this system of having to establish twelve months or greater of financial solvency, really, I would argue, creates some real inequity in who is able to access higher education in the U.S., and it's largely only available to the wealthy, since mobility to the U.S., is really, for the most part, only accessible to those who happen to have the means. 

So, once you've applied for the visa, and you show up to the embassy, you've gone through all these steps, then the way the U.S. immigration law and regulations are structured, is the burden of proof to overcome this idea of immigrant intent, or the idea that you the applicant, are intending to immigrate to the United States and the consular officers are trained to make that assumption, the burden of overcoming that is on the applicant. And most of the times, those of you who I'm sure have been to many U.S. embassies abroad, they're perhaps not the most welcoming and friendly places. Oftentimes, these interviews take place under very stressful conditions, they must be in person in a language that is not an applicant's native language, the majority of the time. And so, if the goal is for the applicant to overcome nonimmigrant intent, to prove to the consular officer that they do plan to return to their home country, they have to establish what's known as home country ties. If you're a 17-year-old or 18-year-old student who's going to study in the United States and is applying for a visa, how do you own property? How do you articulate what your plan for the future is, when you may not even know what you're going to study in the U.S.? Another, I think, aspect of this that makes it very difficult, particularly on the visa acquisition side, it’s really just, frankly speaking, it's more difficult to get a visa from “sample” state university than from Harvard, or an Ivy or a university that has international name recognition, right? So having to overcome that bias that may be there from a consular officer is also a significant challenge. So, in summary, for the visa acquisition process, and some of the challenges in general, it really is, it's the most arduous process for any, in my opinion, for any student visa, with the least beneficial results—no path to citizenship, really strict regulations, really strict vetting, very limited work opportunities for students in the U.S.

So I want to turn now to my role at NAFSA and the International Student and Scholar Regulatory Practice Committee and how things have been different under the Biden administration. And as Irina mentioned, I've been a member of ISSRP in some capacity since 2016. I've been chairing the group since 2020. And the difference between the last six months versus the previous five years is truly night and day, I sort of like to describe it as this administration is really less deliberately obstinate, or we've gone back to having a partner and not an adversary. Life is more predictable, more steady for people who have jobs such as mine working with international students and scholars and doing a lot of regulatory work. And I'll give you a few examples just of how that's changed in the first couple of months of this administration.

A lot of people on the call may know that the Department of Homeland Security issued some temporary relief or some extra guidance or exceptions for international students during the COVID pandemic. And that has been a process that's been continuing to be updated and extended, sort of piecemeal and it's been a very much a piece of concern for administrators and in higher education for the students and scholars that impact it, but within several months, the new administration issued guidance all the way through the entire academic year. And I think a lot of us really view that as a statement of solidarity and support that we're in this together and we're not going to continue to create a situation that's in flux and unstable and unreliable and subject to change rapidly. The administration also did away with the Trump administration's plan to create an OPT Compliance Enforcement Unit. Under ICE—this was one of the last few months of the Trump administration—there was an announcement that the Department of Homeland Security and ICE were going to create an OPT, Optional Practical Training, form of work authorization for international students, they were going to create an enforcement unit. That was cancelled within the first several weeks of the administration. Other things, the idea of making some significant changes that are less student friendly to OPT, Optional Practical Training, to duration of status, or the length of which a student or scholar can remain in the U.S., we're always on the regulatory horizon, or the agenda, of the past administration. And those things are no longer on the chopping block, so to speak. 

And so really, it's been a different sense of having a partner, having an adversary in our direct liaison work, we just completed our annual conference at NAFSA. And my group is responsible for facilitating the sessions where we invite government representatives to come and discuss trends and topics and questions around international students and scholars and regulations. The past four years, just frankly speaking, organizing these events were very challenging because there was a fear among our agency partners, I think, what they may say, or what they may be not allowed to say, don't want to be seen as saying something on the record. This was a fundamentally different experience, this year, more collegial, more positive in nature. For the first time in many, many years, we were able to have some liaison with Citizenship and Immigration Services. And just in general, this has really helped the, I would say, perception, and overall sense of optimism among international educators and international students and scholars who are looking to come and study in the U.S.

So, finally, where are things right now, with international enrollment? What are the tensions? I think anybody's guess is as good as mine. I think right now, the biggest challenge that a lot of us are dealing with is simply the impact of the COVID-19 pandemic on consular operations, it's very, very difficult, if not impossible, to get an appointment, to get a visa. Many posts simply aren't operating. That's often case-by-case, country-by-country, post-by-post specific depending on the public health situation. Those that are operating are experiencing significant backlogs. Speaking for a little bit about the experiences of students at UMBC, we had a lot of students who had originally intended to arrive in August of 2020, but because of the pandemic, had deferred until January, and had deferred again until August. And so that's created a significant backlog. And the U.S. Department of State has very graciously, I think, announced their intention to really prioritize student and scholar mobility. But, we can only do so much with the resources that we have. I think other challenges that we're facing, aside from just lack of visa availability or just navigating travel restrictions, at the top, I mentioned the case of an Iranian student who may have to travel to Armenia or to Azerbaijan to apply for a U.S. student visa, how does that student or scholar navigate the travel restrictions that are in place because of COVID? Whether or not they're at the national level, whether or not they're airline specific, based at the specific console, it's a lot to keep track of and to navigate and very difficult and case-specific. 

One of the things I think that's kind of interesting is, say what you will about how the U.S. handled the COVID situation, but in a sense, where we are now has in a way turned into a bit of a competitive advantage, it is easier to come to the U.S. than to a lot of our competitor English-speaking higher education receiving countries. And I think, for a particular example, the UK is requiring a mandatory ten-day quarantine stay in a hotel when they arrive, and that's to the cost of the traveler. Australia and New Zealand have other stricter measures in place to prevent mobility of international visitors and travelers. And so, in a sense, that's turned into a bit of a competitive advantage. But it's really all about are students and scholars going to be able to get the visas? Right now, a lot of us are dealing with tensions and questions around vaccinations. It's a balance between personal safety. We want students to have that campus experience, we recognize the importance of the campus economy. And, just frankly speaking, I think that's what keeps a lot of U.S. higher education institutions afloat. And so for those of us who are requiring vaccines on our campuses, and if you're a student from X country who may not have access to a WHO-approved vaccine or a FDA-approved vaccine, how will that be dealt with when you arrive? Will we consider you vaccinated, will we provide you with a vaccine, do you risk your own personal health and safety and not get a vaccine, perhaps, the Russian-produced Sputnik vaccine or a vaccine that's not WHO-approved and then come to the U.S. and be required by a university to get a FDA-approved vaccine? There's really no, to my knowledge, understanding of the science of the effect of vaccine layering. And so students are making these difficult decisions right now. Do I get the vaccine that I have access to, and then take a risk of getting vaccinated again when I get to the U.S.? Do I not? 

I think that the last thing I would really want to say, I guess two final points about sort of tensions and maybe how we should be thinking about this right now. To me, the pandemic has really highlighted the importance of having a more strategic international enrollment plan. And by strategic, I mean, diversifying sources of enrollment. For students, a lot of institutions are one geopolitical issue or one pandemic or one natural disaster away from having a significant decrease in enrollment. I think the recent surge in COVID vaccine in India is a good example of that. Certainly, there are other cases throughout recent history, relations with China, the currency situation in South Korea several years ago, different types of things that have occurred. And so, I think the second point to that is we, I think, in the United States, really, we live in the moment, we don't think about the future, right? We are, to my knowledge, the only of our competitors, who don't have a national policy on international education. We don't have a whole of government approach, we don't have a strategic plan for how we will maintain ourselves as a preferred destination for higher education for students and scholars from around the world. And I think that's a short sighted and, in my opinion, I think there's lots of reasons for that. And with that, I'll leave my remarks and open it up to questions and hopefully some nice conversation.

</span><strong data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">FASKIANOS:</span></strong><span data-dcnode-id="739" instrument_node=""> Great, thank you, Adam, for that. It's so complicated, and there's so much to navigate, as you described. We're going to go now to all of you for your questions, comments. So you can either raise your hand by clicking on the raised hand, or you can also write your question in the Q&amp;A box, if you prefer to do it that way. But of course, we'd love to hear from you and hear your voice. So I'm going to go first to Katherine Moore, who has raised her hand. Please tell us what institution you're with, it will give us context.
