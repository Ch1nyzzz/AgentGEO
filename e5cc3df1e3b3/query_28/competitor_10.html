I'm going to go next to going next to a written question Mojubaolu Olufunke Okome, who is a professor of political science at Brooklyn College. She has two questions: “Are there any estimates of how much the U.S. lost in enrollments as the consequence of onerous student visa regulations, in terms of international students studying here?” And then her second question is, “One would have expected COVID-19 to increase barriers to international students’ access to U.S. education. But from your presentation, the U.S. is more accessible than other English-speaking countries. Hopefully, we won't have another wave of infections as most campuses reopened, but if we do how would that complicate the situation?” So that's a twofer.

</span><strong data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">JULIAN:</span></strong><span data-dcnode-id="724" instrument_node=""> I'll start with the first question. I am not aware of any specific surveys or studies that have been done to really get at how immigration policy affects student mobility. I know that Institute of International Education publishes their Open Doors report every year, and that is essentially a census or an accounting of international student mobility. You can find that readily accessible and that will show you year over year comparisons. I also know that U.S. Department of State publishes their visa issuance rates. And so, those are also publicly available.

And the second part of the question—Irina help me here—I think was we would assume that the COVID-19 pandemic would increase burdens, but that hasn't necessarily been the case, or increased obstacles for students. 

</span><strong data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">FASKIANOS: </span></strong><span data-dcnode-id="721" instrument_node="">Right.

</span><strong data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">JULIAN:</span></strong><span data-dcnode-id="718" instrument_node=""> I would say it certainly has increased obstacles. All of last year, most of U.S. universities were operating in fundamentally different circumstances in terms of in person or virtual, etc. And consulates were largely closed. And so, I would say during that time, absolutely, there were fundamentally more challenges. But I think, I guess the point I'm trying to make now, is that because we in the United States have, just being frank, have taken a much more laissez faire approach to public health, that now there are no national restrictions on entry as there are to other competitors. So, if I'm a student, particularly, who for the last two years has tried to think about I want to come to the United States, I want to study abroad for an advanced degree, you've got this pent up demand, and right now, really the only supply that's readily and easily accessible is the United States, in a sense. I mean, certainly there are ways to go to other competitor countries, but with fewer restrictions. I hope that gets at the question.

</span><strong data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">FASKIANOS: </span></strong><span data-dcnode-id="715" instrument_node="">Great. Let's go next to Susan Briziarelli, who is the assistant provost for global affairs at Adelphi University, “We've heard about plans to allow visa interviews to be conducted in the consoles virtually, is this still a possibility?”

</span><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">JULIAN: </span></strong><span data-dcnode-id="712" instrument_node="">That is a great question. I've seen many, many rumors, and I know there's efforts afoot through AIEA and others to try to advocate for that. I have not heard anything from the Department of State or any of my colleagues that leads me to believe that is in the near future.</span><strong data-dcnode-id="710"><span data-dcnode-id="711" instrument_node=""> </span></strong><span data-dcnode-id="709" instrument_node="">I simply—this is my, Adam Julian, my personal opinion, not that University of Maryland, Baltimore County or NAFSA—that I simply just don't think that's in the cards anytime in the near future. I know a lot of people want that. And I know that would seemingly save a lot of problems, remove a lot of obstacles, rather, that we're facing. But I just don't see that happening. I hope I'm wrong.

</span><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">FASKIANOS: </span></strong><span data-dcnode-id="706" instrument_node="">Next question from Martin Edwards, associate professor at Seton Hall University, “Are you aware of any conversations at the higher level to better coordinate communication between CBP DOS and USCIS?”

</span><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">JULIAN: </span></strong><span data-dcnode-id="703" instrument_node="">Another great question. And I think about that. And the reason I say it's a great question is it's one that we're constantly asking and constantly getting different answers to, and it's really important. Think back to the early days of the Trump administration with the Muslim ban, if you remember when that executive order was signed and went into action, there were literally people in the air who, when they were in the air, the U.S. Customs Border Protection had no understanding that this was happening and only received this information as they came. And so I think that sort of interagency communication is absolutely critical, particularly in a situation live we’ve found ourselves in the last four or five years where you're having such rapidly changing regulations and things like that. Every time we ask this question, we get varying degrees, in particular, I think with CBP, you get a lot more communication amongst the Department of Homeland Security agencies, and not necessarily the Department of State's Consular Affairs or the Exchange Visitor program, because if you remember, CBP is part of the Department of Homeland Security and the Department of State is separate, in that sense. So, there's much more interagency cooperation. I know the couple of times that we asked that question at the most recent NAFSA annual conference of our agency partners, to a person, each one expressed the importance of that and that they take great strides to do it. But I'm not aware of any sort of specific actions or plans that are being made to facilitate better interagency communication, other than just to think right now, in this current climate, that's easier to happen naturally, particularly among the core career diplomats and career bureaucrats who are there administration to administration who perhaps no longer fear stepping out of line.

</span><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">FASKIANOS: </span></strong><span data-dcnode-id="700" instrument_node="">Thank you. I'm going to go next to Hamdi Elnuzahi, who's raised their hand, assistant director for sponsored students at Minnesota State University, Mankato. So, if you could unmute yourself.

</span><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Q:</span></strong><span data-dcnode-id="697" instrument_node=""> Hello. Thank you, Adam and you, for bringing this up here. I think it is a very important topic right now. And many of the schools are looking for how to strategically manage this issue to get more enrollment in the fall. It is not a question, but I just want to share something that is very important that may reduce or decrease the number of enrollments in the fall is the visa waiting time in many countries. Based on the information that I have, in more than eighty-six countries, the visa wait time could exceed sixty-five calendar days, up to maybe two hundred-something days, and most of the U.S. embassies in these countries maybe have only one option—emergency appointment. I think these applicants from these eighty-six countries, they don't have hope even to get a visa appointment, and they will not be able to come even if they get accepted. Second, if they want to enroll, they have to just to take the one option, to enroll online from the countries until they get an appointment. Mr. Adam, can you give us some insights about that, and how we can help these students in these countries?

</span><strong data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">JULIAN: </span></strong><span data-dcnode-id="694" instrument_node="">Thank you, those are some great points and I would be very happy to address them. I think the point about the significant delays and visa appointments, the time between when you can actually schedule an appointment, that's, I think, what most of us are dealing with right now, that's the most critical piece. And I think all I would say to that, I guess, would be in a positive sense, I know that back to this idea of feeling like we have a colleague, and not an adversary anymore. The Department of State has indicated that they will prioritize student visas as soon as public health conditions allow. And so, if the optimist in me is looking and hoping that will mean more resources, more appointments will be available, things will be coming up and we will be able to have some students who get more visas and get more appointments quickly. Obviously, that's not a given. But it is the situation as it is right now. 

Your point about enrolling online is a really interesting one. And so at least from my perspective, here at the University of Maryland, Baltimore County, a lot of our students—we did offer our students the option throughout the last year to enroll entirely online, if they chose, from outside of the U.S. But because of—back to these limited work authorizations, there's a program known as Curricular Practical Training, which is essentially a work authorization, off campus work or internship or authorization for a student to gain practical experience in his or her field. And for the most part, by and large, you must be physically present in the United States for a year, before you can be eligible for CPT. And so we found I think, in the past year that a lot of our students just simply didn't want to, particularly our masters students, or applied masters students for whom that CPT is such an important piece of what they're coming for, just simply didn't want to enroll online, simply wanted to wait so that they could start that eligibility for CPT, which can only begin when they're in the United States. And so that's a critical piece. 

And then I also think—back to the online piece—one of the things that I know a lot of colleagues around the country are grappling with is as we open up, and as we go back to more in person learning on our campuses, perhaps those available online options may go away, perhaps there are fewer options. And so, what we're trying to do is to find a happy medium where we can still have, still be able to offer a student a full array of online or hybrid courses that they can enroll in from abroad, if that situation comes to that, but also not do so in a limiting fashion. And I think time will tell, I think the next month, six weeks will be really, really critical for what fall enrollment is going to look like from an international perspective. And I'm hoping for the best, I think like everyone else. 

</span><strong data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">FASKIANOS: </span></strong><span data-dcnode-id="691" instrument_node="">Yeah, thank you very much. I'm going to go next to Jennifer Tishler, who is associate director at the University of Wisconsin, Madison. Our center has several international PhD students on hold but also several international nonstudent postdoctoral scholars. The postdocs would have employment status at our university, not student status. They would be entering as F-1 students and/or J-1 scholars. As things start to open up this summer, do you know if one visa classification will get priority over another?

</span><strong data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">JULIAN: </span></strong><span data-dcnode-id="688" instrument_node="">Short answer is I don’t. I know so much of the conversation when we facilitated our conference session with Consular Affairs and NAFSA was around F-1 students, but I do know that they are also prioritizing—and as we've seen through the past in these national interest exemptions for “academics,” and so I think there's been a lot of manipulation is not the word, a lot of negotiation, rather, around what academic means. Does that mean anyone with a J-1 visa, does that mean an H1B who is coming to teach and that sort of thing. So, I don't know the answer to that, but I think what I would say is just in general, I know Consular Affairs is understanding to higher education’s need in this regard. And I think there's an understanding that it encompasses not just the F-1 category students. So yeah, not really a great answer, but it is what it is, as the saying goes.

</span><strong data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">FASKIANOS: </span></strong><span data-dcnode-id="685" instrument_node="">Right. I mean, there is so much still to sort out as states are now reopening and just so much navigate through this summer as we see how things unfold in this country. So, the next question comes from Devi Potluri, who is dean of the graduate school at Chicago State University. If you could unmute yourself, that would be terrific.

</span><strong data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Q:</span></strong><span data-dcnode-id="682" instrument_node=""> Thank you. Good afternoon, Adam. You did mention the difficulties those of us in the smaller state universities have in our student visas. Before COVID, we used to hear the news that because we don't require GRE, consular officers would look at as a negative thing rather than a positive thing. Do you think that COVID has changed that because most universities now waive the GRE requirement? We had some students telling us, they used to ask a question does your university have a GRE, what kind of university doesn’t, even though we are a state university, fully accurate and everything else. I don't know if you heard anything like that, or any other ideas.

</span><strong data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">JULIAN: </span></strong><span data-dcnode-id="679" instrument_node="">In general, that idea is something that anecdotally I've heard people, colleagues like you from around the country, and colleagues I've worked with in my capacity at NAFSA, say for years things from “Oh, you don't require the GRE” to “Oh, your [inaudible] requirements are very low. These are the types of questions that we've asked consular officers in the past, and certainly, I would admit that these practices have happened. I would suggest that they are a little more isolated than I think the belief is, I think we, human nature just sort of grasp on to these ideas that when there's a perceived sort of injustice or unfairness, I think there's human nature to really think of it as a trend rather than a few isolated incidents. But that's not to say that it absolutely does not occur, I certainly think it does occur. And, in my experience working in the past at a public state university without much international name recognition, I've encountered some of those things myself. I think there are some things that you can do to ameliorate that situation. I think, one of the things that we really focus on at UMBC, and in other places, throughout my career, where I’ve worked, is really on, I don't want to say coaching, it's not coaching students on the visa application process, but helping them understand what they have to articulate. And part of that process is explaining to a consular officer, why Chicago State? Where is Chicago State? What you're studying, what your future goals are, why you chose that specific university? I think you raise a really interesting point with the—particularly as a lot of us are going test optional, even not only with GRE and for undergraduate admissions, SAT and ACT and those sorts of things, but in the English language testing area. Duolingo, I think is making a lot of significant headway in English language. And so, consular officers provide—they have bias for TOEFL or Duolingo, or the type of testing that it is, is it a public university, is it a community college, those sorts of things. I haven't heard any anything specific, but what I guess my strategy would be or what sort of what my team tries to do is to really educate our students and our applicants on really how that burden of proof is on them. And not necessarily just burden of proof that they're not going to immigrate, but burden of helping to articulate what their future plan is and why your specific university or school or institution fits into those plans and what it is. And I think that will go a long way.

</span><strong data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">FASKIANOS: </span></strong><span data-dcnode-id="676" instrument_node="">Thank you. We have another question from Martin Edwards, “Many universities have decreased their staff and resources to international students on campuses over the past year in order to offset difficulties of the pandemic and lower enrollment of international students. Could you offer any data resources that we could point to, to make a case for an increase of staff and resources to support an expected increase of international students?”

</span><strong data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">JULIAN: </span></strong><span data-dcnode-id="673" instrument_node="">So trying to wrack my brain here for any sort of specific data, I'm aware of some benchmarking surveys that some of my colleagues, particularly people in my role as a director of international student scholar services have done with NAFSA to talk really about what ideal staffing looks like, based on enrollment. 

Outside of that, if you could send me a message, I could follow up with you on that. I could share that information; I'd have to locate it. I don't know where it is, and how easily or readily available it is. I'd say, one point that we might bring into this conversation is how do you go about creating additional staffing and supporting increases in students? I know there are many, many different models that people employ, whether that's an international student fee charged per semester, or whether the fee for services you charge for OPT applications that you process or H-1B applications that you process. Obviously, we all have our own political and cultural context to work within what's possible at our campuses and institutions. But I would say one place where I would want to kind of put some focus would be on how could we creatively increase those resources. But I'd be happy to share that benchmarking survey if we can connect offline somehow.

</span><strong data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">FASKIANOS: </span></strong><span data-dcnode-id="670" instrument_node="">Sure, we can make sure that happens. Next question from Danielle McMartin, who is director of global education at California State University, San Marcos. “We do anticipate a change in F-1 regulations regarding allowance to online classes, as many institutions and faculty have become more online friendly within their curriculum planning. You might have touched upon this, but I want to just break surface it again.”

</span><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">JULIAN: </span></strong><span data-dcnode-id="667" instrument_node="">That's a great question. And for those of you who work closely with F-1 student regulations, you will remember that much of the language that revolves around hybrid or distance or virtual education is antiquated at best, I think there's a reference to closed circuit television in the regulations that we have to use to sort of navigate this. So, I would hope that there are some changes, I think there are a lot of things that have occurred this last year that are not going away. 

I think one of the things that I think about when I hear that question is what exactly does hybrid mean? How do you define hybrid? Right? That was the guidance we had to work with throughout most of the pandemic with our F-1 student populations, how do you define hybrid? Is it one minute of in-person instruction? Is it one activity? Is it a majority? There's no, like so much of our work, there's no black and white, this is what it is. And so I think that piece of sort of virtual learning, hybrid versus online versus in person, is one of the single greatest areas of need, I think, for clarity in the F-1 student regulations in the U.S. Code of Federal Regulations. So hopefully something will come with this. I hope we learn our lesson from this and prioritize it moving forward.

</span><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">FASKIANOS: </span></strong><span data-dcnode-id="664" instrument_node="">Thank you. I’m going to take the next written question from Katy Crossley-Frolick, who is an assistant professor at Denison University, “You discussed the need for longer term strategic thinking regarding international enrollment and mobility. Are you sensing a shift in the Biden administration in terms of pivoting in that direction? And what should be tackled first?” If you were going to give them, 1, 2, 3, what would you advise, Adam?

</span><strong data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">JULIAN: </span></strong><span data-dcnode-id="661" instrument_node="">Oh, yeah, I love that, I've suddenly been given some power. This is a great. Am I sensing his shift? Yeah, I think in general, I think it's just a more friendly administration, you see it in not just international education, but more friendly to higher education. You've seen it in some recent Title Nine actions, you've seen it in some other things. I know this idea of a national policy is something that other associations and other groups have brought up and advocated for. 

For me, the number one—I don't know if I can come up with three—but the number one thing I would fix or would address as part of this policy is to increase opportunities for work for international students and increase the ease by which an international student has a path to permanent residency or citizenship. I know I'm preaching to the choir or so to speak here. But the value of international students to this country and to the world is really immeasurable. 

Right, how many of our Nobel laureates and others and Fortune 500 company founders and CEOs are former international students, right. Making the U.S. more attractive destination for the world's best and brightest minds to come, making it easier for them to work, to gain practical experience, to invest in this country in this economy, and if they so ultimately choose to have a path to permanent residency, should be the number one piece of any strategy, in my opinion. International students create jobs, international students innovate, international students who are responsible for some of the greatest accomplishments of this country, in my opinion. 

I’d also focus on opportunities for study abroad or study away. I think the value of mutual understanding, particularly thinking of my experience coming from smaller state schools or growing up in rural Southwestern Indiana like I did, the value of interacting with people with differing perspectives and experiences is immeasurable, so I would try to find some way to create support for international study or travel for U.S.-based students. I think that's only two, but those are the first two that come to mind.

</span><strong data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">FASKIANOS: </span></strong><span data-dcnode-id="658" instrument_node="">Great, and Adam, speaking from your position at UMBC, what have you done over the course of the pandemic to foster a sense of community for your international student population? And what are the strategies that you're putting into place for returning this fall, especially if some of them aren't going to make it onto campus if they are trying to get those interviews, and they're not going to be there in the fall, or make it to the fall, are you offering the online option? How are you thinking about all that?

</span><strong data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">JULIAN: </span></strong><span data-dcnode-id="655" instrument_node="">Well, that is, I think, the number one question that we think about every day. So, the first part: what did we do over the fall, we actually established a new program—I'm sure most the people on the call with universities have similar programs—our Global Ambassadors Program. And it really is designed to do two things simultaneously: provide funding and support for international students who already have limited opportunities for employment in the U.S. who may have lost their job because that on campus employment isn't available due to COVID. And so, we employ them to really serve as ambassadors for new students and admitted students to help them connect, build a sense of community online, virtual, different types of platforms, different types of activities that they participate in together. And really, that was sort of as a substitute to try to, during the COVID times, build a sense of community and try to replicate those bonds and the importance of mutual understanding and trust that comes with the campus experience. 

But the campus experience, the experience of studying in a U.S. university of vibrant campus life is really in some ways what differentiates the U.S. system of higher education from other systems of higher education in the world. And I think we would all be naive to say that's not extremely valuable. And so, we're looking at ways that we can do that safely, just like I'm sure everyone else are, that is something that we think should be critical, it's a priority. And to add to that, we've got a whole group of students, they're not many, but who came in the fall or spring during COVID, who have never visited campus. So, there's this real kind of pent up need for that. And so, we are planning things for the fall semester, we're doing some sort of hybrid orientations and meet and greets and a sort of welcome reception with our senior administration for international students to recognize the significant obstacles they've overcome to join us. And we really want to celebrate that and recognize that at the most senior levels, and so we're planning some things like that for the fall.

</span><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">FASKIANOS: </span></strong><span data-dcnode-id="652" instrument_node="">Thank you, and then putting on your NAFSA, or your role at NAFSA. What are you doing—obviously, so much of this is dependent on our U.S. immigration policy and reforming that—what are you doing to talk to Congress to advocate for some of these changes that you've mentioned here, and that need to be put in place in order to decrease the barriers to come to this country to study?

</span><strong data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">JULIAN: </span></strong><span data-dcnode-id="649" instrument_node="">Yeah, NAFSA has a great advocacy wing, a group of professional staff members who are really dedicated to advocating on behalf of the Association and its members. They do several things that you can imagine, from an advocacy day to specific calls to action. One of the things, in particular, that the regulatory practice group that I've been involved with has done over the past is when there were these proposed changes to immigration regulations, the way the process works, typically, there's a public comment period where anyone can comment on how this rule will impact them, or impact their state, their university, their institution, their family. And so we've really worked with NAFSA to sort of muster the energy amongst people to write these comment letters and to have our voice be heard. There have certainly been successes, I think, through this. I think back to [inaudible]. I know at some point the duration of status was on the chopping block, so to say, so to speak, there were, it was up for public comment, and received thousands and thousands of comments. And ultimately, that was dropped by the next administration, that's no longer in danger. So, I would say, really kind of summary, two things. NAFSA’s advocacy arm works really closely with other associations and really sort of daily on the Hill for our means. And then also, we as association members, I think, really need to be actively engaged in public comment periods and things like that.

</span><strong data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">FASKIANOS: </span></strong><span data-dcnode-id="646" instrument_node="">Fantastic, I'm just looking to see—we're almost at the end of our time. So, I'm just wanting to see if there's anything—we covered a lot of ground. So, I think I can just turn to you for any closing remarks that you want to make before we finish up our session.

</span><strong data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">JULIAN: </span></strong><span data-dcnode-id="643" instrument_node="">Thanks. Well, I just want to say, I really appreciate everybody attending, and I appreciate a lot of the great questions and comments that I know were—for those of us who are in the weeds, so to speak, in this room right now, it's a very stressful time. But I think back to last summer, and then I'm reminded that it's not nearly as stressful as it was, then. So, have hope, keep the faith, we'll see, I think as things improve, appointments will open up and we'll get back to sort of establishing whatever our new sense of normal is, and we'll do it like we do all things, that's together. And I look forward to that, if I can ever help in any way and to anyone on the call, please don't ever hesitate to reach out. I'm always happy to share ways that you can get involved with NAFSA, with international students, calling regulatory practice committee, or just trying to share resources that I may have come across in my work with that group that would be helpful. And I guess that's all I have to say. 

</span><strong data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">FASKIANOS: </span></strong><span data-dcnode-id="640" instrument_node="">Adam, I do have one final question, just as your people are navigating over the course of the summer, is there one source or a couple, a handful, that you would say should be the touch point go to reading or go to check, like every other day or daily or once a week, just sort of see where things are?

</span><strong data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">JULIAN: </span></strong><span data-dcnode-id="637" instrument_node="">Yeah, I would say so if you're looking at that from a sense of what's changing on a regulatory perspective, I think NAFSA, at least for student and scholar pieces, is the definitive source. And so, I would put in a plug for NAFSA.org/reginfo, that's the landing page where any recent changes and updates occur. On the consular front, it is really post specific. And so, if you're working with a student, or you have a population, have a heavy population of students from one country or another, I would really refer you to that particular embassy or consulate itself and their social media feeds. They do a great job with their public outreach. And they're a great source of information.

</span><strong data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">FASKIANOS: </span></strong><span data-dcnode-id="634" instrument_node="">Fantastic. And we will circulate the link to this webinar, some of the resources that were mentioned, as well as the benchmark study that Adam is going to dig out for us. So, appreciate that. So, Adam Julian, thank you very much for being with us and to all of you. I hope that people can take a little bit of a break. It has been a grueling year for educators. The summer probably won't give you much respite. But hopefully, you'll be able to take a few days off to try to reenergize and do some self-care, which is so important. So, we really appreciate it. So, thank you. You can follow Adam on Twitter @Adam_l_Julian. So I hope you will follow him there. We appreciate your expertise. And again, follow us on @CFR_Academic, and you can visit CFR.org and ForeignAffairs.com for more resources. We look forward to seeing you all again for our next webinars, so stay well and stay safe and take care. 

(END)
