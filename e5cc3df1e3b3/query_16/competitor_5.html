</span><meta content="Throughout most of the 20th Century, China had suffered tremendous economic and human losses due to political instability. It is in the most recent decades that the Chinese people have managed to live with political stability. The economic benefits of political stability can hardly be overstated. Yet, China’s political stability is by no means assured. Is China stable or unstable? Is the Chinese regime strong or fragile? To answer these questions, this study has selected a total of 12 sets of publically available indices to measure political instability and placed China on a global scale of comparisons with all the others, both advanced and developing, in the world. It also makes specific comparisons between China and the other four countries of the so-called BRICS (Brazil, Russia, India, China, and South Africa). The findings of our global comparisons give China no reasons for celebration. However, China has no reasons for paranoia either. China has indeed faced many threats or challenges to political stability, but, as our study demonstrates, China is no more politically unstable or fragile than many others. Ignoring or underestimating the ripple effect of any destabilizing world event will do China no good, but overreactions also serve China’s interests poorly as fear or paranoia can be highly contagious." data-dcnode-id="1740" name="dc.description"><span data-dcnode-id="1739" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="1186" data-gtm-vis-first-on-screen-50443292_562="737" data-gtm-vis-first-on-screen-50443292_563="738" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="737" data-gtm-vis-recent-on-screen-50443292_563="738" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="1187" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1191" id="Abs1"><span data-dcnode-id="1192" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="1188" id="Abs1-content"><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Throughout most of the 20th Century, China had suffered tremendous economic and human losses due to political instability. It is in the most recent decades that the Chinese people have managed to live with political stability. The economic benefits of political stability can hardly be overstated. Yet, China’s political stability is by no means assured. Is China stable or unstable? Is the Chinese regime strong or fragile? To answer these questions, this study has selected a total of 12 sets of publically available indices to measure political instability and placed China on a global scale of comparisons with all the others, both advanced and developing, in the world. It also makes specific comparisons between China and the other four countries of the so-called BRICS (Brazil, Russia, India, China, and South Africa). The findings of our global comparisons give China no reasons for celebration. However, China has no reasons for paranoia either. China has indeed faced many threats or challenges to political stability, but, as our study demonstrates, China is no more politically unstable or fragile than many others. Ignoring or underestimating the ripple effect of any destabilizing world event will do China no good, but overreactions also serve China’s interests poorly as fear or paranoia can be highly contagious.</span></p></div></div></section><span data-dcnode-id="1185" instrument_node="">
</span><section data-dcnode-id="1140" data-gtm-vis-first-on-screen-50443292_562="738" data-gtm-vis-first-on-screen-50443292_563="738" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="738" data-gtm-vis-recent-on-screen-50443292_563="738" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="1141" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1183" id="Sec1"><span data-dcnode-id="1184" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="1142" id="Sec1-content"><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Throughout most of the 20th Century, China had suffered tremendous economic and human losses due to political instability. Many decades of social rebellions, political divisions, civil wars and foreign invasions had kept China poor, weak and underdeveloped. It is in the most recent decades that the Chinese people have managed to live with political stability. The economic benefits of political stability can hardly be overstated. Only if China could manage to maintain political stability for another 20&nbsp;years, the impact would be beyond anyone’s imagination.</span></p><p data-dcnode-id="1173"><span data-dcnode-id="1180" instrument_node="">Yet, China’s political stability is by no means assured. A careful, or even a casual, reading of the news about China gives one many reasons to worry. Inflation and unemployment are on the rise. China’s Gini coefficient which measures the income gap between the rich and poor, now reaches 0.47, well above the warning level of 0.40 set by the World Bank.</span><sup data-dcnode-id="1175"><a data-dcnode-id="1176" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Footnote </span></span><span data-dcnode-id="1177" instrument_node="">1</span></a></sup><span data-dcnode-id="1174" instrument_node=""> There have been pockets of social unrest in many parts of China. As a rising power and the largest emerging economy, China also faces many challenges or threats from an increasingly unstable global system. Thanks to globalization and information and communication technologies, what is happening outside China almost inevitably creates ripple effect of varying degree on domestic political stability inside China.</span></p><p data-dcnode-id="1147"><span data-dcnode-id="1172" instrument_node="">Journalists, scholars and policy analysts have focused on China’s political stability for many years. Until the recent decades, China’s political stability was an issue because there had not been much of it. Recently, however, China’s political stability has attracted a lot of attention despite the fact that there has been a lot of it. Many remember Gordon Chang’s 2001 prediction of China’s “Coming Collapse”,</span><sup data-dcnode-id="1167"><a data-dcnode-id="1168" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Footnote </span></span><span data-dcnode-id="1169" instrument_node="">2</span></a></sup><span data-dcnode-id="1166" instrument_node=""> but more serious analysts have been pondering China’s political stability question for years when the Chinese people have been enjoying their most stable regime in recent Chinese history. Ten years ago, David Shambaugh and others asked, “Is China Unstable?” [</span><a aria-label="Reference 1" data-dcnode-id="1164" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d239176853e297" title="Shambaugh, D.L. (ed.). 2000. Is China unstable? Assessing the factors. Armonk: M.E. Sharpe."><span data-dcnode-id="1165" instrument_node="">1</span></a><span data-dcnode-id="1163" instrument_node="">] Ian Bremmer and Fareed Zakaria have advised foreign companies on how to hedge against political risk in China [</span><a aria-label="Reference 2" data-dcnode-id="1161" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d239176853e300" title="Bremmer, I., and F. Zakaria. 2006. Hedging political risk in China, Harvard Business Review 84, no. 11."><span data-dcnode-id="1162" instrument_node="">2</span></a><span data-dcnode-id="1160" instrument_node="">]. In addition to such key words as “instability”, “crisis” and “risk”, “fragility” has also found increasing popularity in references to China. For instance, some have argued that China may become a superpower, but it is only a fragile one [</span><a aria-label="Reference 3" data-dcnode-id="1158" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d239176853e303" title="Shirk, S.L. 2007. China: fragile superpower: how China’s internal politics could derail its peaceful rise. New York: Oxford University Press."><span data-dcnode-id="1159" instrument_node="">3</span></a><span data-dcnode-id="1157" instrument_node="">]. Others have suggested that after the Japanese miracle in the 1960s–70s and the miracle of the four East Asian economies in the 1980s–90s, now comes the “Chinese miracle” but only with high fragility [</span><a aria-label="Reference 4" data-dcnode-id="1155" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d239176853e306" title="Jha, P.S. 2009. Managed chaos: the fragility of the Chinese miracle. Thousand Oaks: Sage Publications."><span data-dcnode-id="1156" instrument_node="">4</span></a><span data-dcnode-id="1154" instrument_node="">]. There are still others who have concluded that China’s economic development in the recent decades is extraordinary, but its financial foundation is fragile [</span><a aria-label="Reference 5" data-dcnode-id="1152" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d239176853e310" title="Walter, C.E., and F.J.T. Howie. 2011. Red capitalism: the fragile financial foundation of China’s extraordinary rise. Hoboken: Wiley."><span data-dcnode-id="1153" instrument_node="">5</span></a><span data-dcnode-id="1151" instrument_node="">]. China therefore is an “awakening giant with clay feet [</span><a aria-label="Reference 6" data-dcnode-id="1149" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d239176853e313" title="Bardhan, P. 2010. Awakening giants, feet of clay: assessing the economic rise of China and India. Princeton: Princeton University Press."><span data-dcnode-id="1150" instrument_node="">6</span></a><span data-dcnode-id="1148" instrument_node="">].”</span></p><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">As serious as these studies can be, analyzing China’s political instability during a time of China’s political stability inevitably risks being speculative. One can carefully and consciously identify major social and economic problems that would threaten political stability or point to serious institutional weaknesses that would destabilize the regime, but no one can be certain when or if social and economic instability would necessarily turn into political stability or when or if the regime in question would inevitably fall. Analyzing regime instability is indeed nothing like a rocket science.</span></p><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">It is now a cliché that because China is so complex and diverse, anything you say about China bears some elements of truth. It is also a cliché that because China is so complex and diverse, any bold predictions about China’s future are likely to turn out to be not true. Cliché or not, studying, assessing and understanding China’s political stability is of great significance not only because China is now the world’s second largest economy, but also because whatever is happening in China affects almost 1.4 billion people directly and, indirectly, many more in the Asia-Pacific region and the rest of the world.</span></p></div></div></section><section data-dcnode-id="1084" data-gtm-vis-first-on-screen-50443292_562="738" data-gtm-vis-first-on-screen-50443292_563="738" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="738" data-gtm-vis-recent-on-screen-50443292_563="738" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Global Scale of Comparisons"><div class="c-article-section" data-dcnode-id="1085" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1138" id="Sec2"><span data-dcnode-id="1139" instrument_node="">Global Scale of Comparisons</span></h2><div class="c-article-section__content" data-dcnode-id="1086" id="Sec2-content"><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">This study places China on a global scale of comparisons. The assumption (or perhaps even a foregone conclusion) is that if China is compared only with advanced industrial democracies, China would look unstable and fragile. On the other hand, if China is compared only with the poorest nations in the developing world, China would look stable and strong. It is therefore more meaningful to compare China with all the others, both advanced and developing, in the world. Moreover, since China is still in many ways a developing country, even though it is now the second largest economy, it makes sense to compare China particularly with all the other countries in the developing world. Finally, we believe that it also make sense to compare China with the other four countries of the so-called BRICS (Brazil, Russia, India, China, and South Africa). The term, “BRICS”, is somehow an arbitrary one, but to the extent that these five countries are the largest emerging economies, covering four different continents (Asia, South America, Euroasia and Africa) and that these countries appear to have more in common when it comes to opportunities, challenges and risks in their development, comparisons among the BRICS countries may shed more light on how China has been doing.</span></p><p data-dcnode-id="1119"><span data-dcnode-id="1135" instrument_node="">In this study, we have selected and focused on a total of 12 sets of publically available indices to measure political instability (see Table&nbsp;</span><a data-dcnode-id="1133" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1134" instrument_node="">1</span></a><span data-dcnode-id="1132" instrument_node="">). Put together, these indices represent the most systemic measurements up-to-date.</span><sup data-dcnode-id="1127"><a data-dcnode-id="1128" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Footnote </span></span><span data-dcnode-id="1129" instrument_node="">3</span></a></sup><span data-dcnode-id="1126" instrument_node=""> In terms of content, five of the 12 indices directly focus on political instability/state fragility, two focus on assessing political risks, one focuses on the weakness of the countries in the developing world only, one index measures the perceptions of corruption and another measures degree of peacefulness, both of which are closely related to political instability.</span><sup data-dcnode-id="1121"><a data-dcnode-id="1122" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Footnote </span></span><span data-dcnode-id="1123" instrument_node="">4</span></a></sup><span data-dcnode-id="1120" instrument_node=""> Moreover, two indices measure the status of reform and political leadership’s will and ability respectively. Finally, there is the World Bank’s Worldwide Governance Indicator and specifically the indicator of Political Stability and Absence of Violence.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1104" data-test="inline-table" id="table-1"><figure data-dcnode-id="1105"><figcaption class="c-article-table__figcaption" data-dcnode-id="1116"><b data-dcnode-id="1117" data-test="table-caption" id="Tab1"><span data-dcnode-id="1118" instrument_node="">Table 1 List of fragility/instability indices</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1106"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="1107" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11366-011-9175-x/tables/1" rel="nofollow"><span data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1108" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1109" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1110" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1113" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1112" fill-rule="evenodd"></path><span data-dcnode-id="1111" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1102" instrument_node="">Although the main content is political instability/state fragility, the publishers or sponsoring organizations of these indices are reasonably diverse. They include three universities (Carlton University, University of Maryland and George Mason University), one think tank (The Brookings Institution), one independent research institute (The Institute for Economics and Peace), two foundations (The Bertelsmann Stiftung Foundation and the Fund for Peace), two magazines (</span><i data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">The Economist</span></i><span data-dcnode-id="1099" instrument_node=""> and </span><i data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">The Foreign Policy</span></i><span data-dcnode-id="1096" instrument_node="">), one business consulting firm (Euroasia Group), one international governmental organization (The World Bank), and one international non-governmental organization (Transparency International).</span></p><p data-dcnode-id="1087"><span data-dcnode-id="1094" instrument_node="">All the indices here represent aggregate data which incorporate hundreds of individual indicators. Designers of these 12 sets of indices sometimes create them on the basis of secondary sources, which may, at times, overlap. Nevertheless, owing to their creators’ different ways of adopting and weighing individual indicators, no two indices are the same either in their systems of scores or rankings. Moreover, we take the rankings and scores by these indices as they are because questioning and challenging the research or survey methodologies of each and every set of the indices is simply beyond the scope of this study.</span><sup data-dcnode-id="1089"><a data-dcnode-id="1090" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Footnote </span></span><span data-dcnode-id="1091" instrument_node="">5</span></a></sup><span data-dcnode-id="1088" instrument_node=""> Needless to say, each index has its own weaknesses, flaws or bias. Our hope is, by combining as many as 12 sets of indices, we may be able to minimize the effect of those weaknesses, flaws or bias and come up with a more balanced picture that is closer to reality than any one of the 12 sets of indices depicts.</span></p></div></div></section><section data-dcnode-id="938" data-gtm-vis-first-on-screen-50443292_562="738" data-gtm-vis-first-on-screen-50443292_563="738" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="738" data-gtm-vis-recent-on-screen-50443292_563="738" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="How Does China Measure Up?"><div class="c-article-section" data-dcnode-id="939" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1082" id="Sec3"><span data-dcnode-id="1083" instrument_node="">How Does China Measure Up?</span></h2><div class="c-article-section__content" data-dcnode-id="940" id="Sec3-content"><p data-dcnode-id="1077"><span data-dcnode-id="1081" instrument_node="">Stability is, of course, a relative term. Granted, some countries are more stable than others, but few can claim to be absolutely stable. Moreover, no countries, especially emerging economies and rising powers, are free of concerns about threats both international and domestic. Nevertheless, more stable countries do have something in common. For instance, according to the Brookings Institution, highly stable countries possess all or most of such characteristics as: efficient state institutions; government effectiveness (high degree of political institutionalization); high degree of political legitimacy among the population; sound economic performance and policies; absence of significant anti-state opposition; rare instances of political violence; low level of social, ethnic, or religious tensions; and infrequent occurrence of humanitarian emergencies and capacity to mitigate natural disasters [</span><a aria-label="Reference 7" data-dcnode-id="1079" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d239176853e717" title="
                  Index of State Weakness in the Developing World. 2008. Washington, D.C.: The Brookings Institution."><span data-dcnode-id="1080" instrument_node="">7</span></a><span data-dcnode-id="1078" instrument_node="">].</span></p><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Is China stable or unstable? Is the Chinese regime strong or fragile? How does China fare on a global scale of measurements? The following are the results from the 12 sets of indices:</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1070" id="Sec4"><span data-dcnode-id="1074" instrument_node="">Political Instability Index (PII) [</span><a aria-label="Reference 10" data-dcnode-id="1072" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d239176853e727" title="
                  Economist Intelligence Unit, Political Instability Index 2009/10.
                "><span data-dcnode-id="1073" instrument_node="">10</span></a><span data-dcnode-id="1071" instrument_node="">]</span></h3><p data-dcnode-id="1059"><span data-dcnode-id="1069" instrument_node="">This index based on a survey of a total of 165 countries</span><sup data-dcnode-id="1064"><a data-dcnode-id="1065" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Footnote </span></span><span data-dcnode-id="1066" instrument_node="">6</span></a></sup><span data-dcnode-id="1063" instrument_node=""> by the </span><i data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Economist</span></i><span data-dcnode-id="1060" instrument_node=""> Intelligence Unit assesses the likelihood of political unrest threat posed to governments by social protest. The overall index has two component indices, rating each country for its economic distress and underlying vulnerability to unrest. The index of “Economic Stress” includes three indicators: growth in incomes, unemployment and level of income per head. The index of “Underlying Vulnerability” includes 12 indicators: inequality, state history, corruption, ethnic fragmentation, trust in institutions, status of minorities, history of political instability, proclivity to labor unrest, level of social provision, a country’s neighborhood, regime type, and regime type and factionalism.</span></p><p data-dcnode-id="1051"><span data-dcnode-id="1058" instrument_node="">Among the 165 countries covered in the index, China is ranked the 41st which suggests that China is politically more vulnerable than 40 other countries but less vulnerable than another 125 countries. All things considered, this better-than-average ranking on a global scale of comparison puts China in a favorable position.</span><sup data-dcnode-id="1053"><a data-dcnode-id="1054" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Footnote </span></span><span data-dcnode-id="1055" instrument_node="">7</span></a></sup><span data-dcnode-id="1052" instrument_node=""> Among the BRICS, China is considered by this index as politically less vulnerable than South Africa, Russia and Brazil, but more vulnerable than India.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1046" id="Sec5"><span data-dcnode-id="1050" instrument_node="">Worldwide Governance Indicators (WGI) [</span><a aria-label="Reference 11" data-dcnode-id="1048" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d239176853e759" title="World Bank. 2009. Worldwide governance indicators-political stability &amp; absence of violence. Washington, DC."><span data-dcnode-id="1049" instrument_node="">11</span></a><span data-dcnode-id="1047" instrument_node="">]</span></h3><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">The World Bank’s WGI covers a total of 213 economies over the period 1996–2009. According to the World Bank, the aggregate indicators of governance represent the views of a large number of enterprise, citizen and expert survey respondents in industrial and developing countries. The individual data sources underlying the aggregate indicators are drawn from a diverse variety of survey institutes, think tanks, non-governmental organizations, and international organizations. WGI has six aggregate indicators of governance: Voice and Accountability, Political Stability and Absence of Violence, Government Effectiveness, Regulatory Quality, Rule of Law, and Control of Corruption. We have selected only the “Political Stability” indicator which measures the perceptions of the likelihood that the government will be destabilized or overthrown by unconstitutional or violent means, including domestic violence and terrorism.</span></p><p data-dcnode-id="1039"><span data-dcnode-id="1043" instrument_node="">Among the all the economies covered by the World Bank’s “Political Stability” indicator, China is in the 25th–50th Percentile. Contrary to its best score (low vulnerability) among the BRICS on the </span><i data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Economist</span></i><span data-dcnode-id="1040" instrument_node="">’s Political Instability Index, India has received the lowest score (13.2) among the BRICS on WGI. On a scale of 0 (least stable) to 100 (most stable), China’s WGI score of 29.7 is not only higher than India’s, but also higher than Russia’s 21.7, although much lower than South Africa’s 44.3 and Brazil’s 54.2, which suggests that China is politically less stable than Brazil and South Africa, but more stable than Russia and India.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1034" id="Sec6"><span data-dcnode-id="1038" instrument_node="">State Fragility Index (SFI) [</span><a aria-label="Reference 12" data-dcnode-id="1036" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d239176853e777" title="Marshall, M.G., and B. R. Cole. 2009. Global Report 2009: Conflict, Governance, and State Fragility (Severn, MD: Center for Systemic Peace; Arlington: Center for Global Policy School of Public Policy, George Mason University."><span data-dcnode-id="1037" instrument_node="">12</span></a><span data-dcnode-id="1035" instrument_node="">]</span></h3><p data-dcnode-id="1029"><span data-dcnode-id="1033" instrument_node="">The SFI compiled by the researchers at the Center for Systemic Peace and the Center for Global Policy at George Mason University is published in the </span><i data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Global Report</span></i><span data-dcnode-id="1030" instrument_node=""> series. The 2009 SFI has two components: effectiveness score and legitimacy score. The first one measures “security effectiveness”, “political effectiveness”, “economic effectiveness” and “social effectiveness”. The second one measures “security legitimacy”, “political legitimacy”, “economic legitimacy,” and “social legitimacy”.</span></p><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Among the 162 countries covered by the “State Fragility Index”, China is ranked the 86th, below the mid-point of 81. On a scale of 1 (least fragile) to 25 (most fragile), India has again received the highest score of state fragility among the BRICS while China, with a score of 8, is tied with Russia in terms of state fragility, both considered to be more fragile than Brazil (with a score of 5), but slightly less fragile than South Africa (with a score of 9) and much less fragile than India (with a score of 13).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1022" id="Sec7"><span data-dcnode-id="1026" instrument_node="">Country Indicators for Foreign Policy (CIFP) [</span><a aria-label="Reference 13" data-dcnode-id="1024" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d239176853e794" title="Carleton University 2007. Country Indicators for Foreign Policy (CIFP) Country Ranking Table 2007-Fragility Index.Ottawa, Canada."><span data-dcnode-id="1025" instrument_node="">13</span></a><span data-dcnode-id="1023" instrument_node="">]</span></h3><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">The CIFP fragility index developed by the researchers at Carleton University aims at measuring weaknesses in one or more of the three areas: authority, legitimacy and capacity. It includes indicators grouped in six categories: governance, economics, security and crime, human development, demography, and environment.</span></p><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Among the 192 countries covered by the CIFP, China is ranked the 103rd, a very low and unfavorable ranking. Among the BRICS, CIFP scores rank Brazil as the least fragile, followed by South Africa. India is ranked the most fragile, followed by China and Russia.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1013" id="Sec8"><span data-dcnode-id="1017" instrument_node="">Failed State Index (FSI) [</span><a aria-label="Reference 14" data-dcnode-id="1015" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d239176853e807" title="
                  Foreign Policy and the Fund for Peace, The Failed States Index 2010."><span data-dcnode-id="1016" instrument_node="">14</span></a><span data-dcnode-id="1014" instrument_node="">]</span></h3><p data-dcnode-id="1008"><span data-dcnode-id="1012" instrument_node="">The FSI developed by the </span><i data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="1009" instrument_node=""> magazine and the Fund for Peace measures a country’s risk for internal conflict. It is based on a total of 14 indicators of vulnerability: six are social, two are economic and six are political. “Social Vulnerability” indicators include mounting demographic pressures; massive movement of refugees or internally displaced persons creating complex humanitarian emergencies; legacy of vengeance-seeking group grievance or group paranoia; and chronic and sustained human flight. “Economic Vulnerability” indicators include uneven economic development along group lines; sharp and/or severe economic decline. “Political Vulnerability” indicators include criminalization and/or delegitimization of the state; progressive deterioration of public services; suspension or arbitrary application of the rule of law and widespread violation of human rights; security apparatus operate as a “state within a state”; rise of factionalized elites; and intervention of other states or external political actors</span></p><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Among the 177 countries covered by the “Failed States Index”, China is ranked the 115th, again a very low and unfavorable ranking, indicating that China is more vulnerable than 114 other countries in the world and less vulnerable than only 61 other countries. Not surprisingly, among the BRICS, China is also viewed as the most vulnerable. The FSI score is by the far the most negative assessment China has received out of all the 12 sets of indices. On a scale of 20 (being most stable) to 114 (failed states), China’s FSI score stands at 83.0 in comparisons to India’s 79.2, Russia’s 79.0, South Africa’s 67.9 and Brazil’s 67.4.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1001" id="Sec9"><span data-dcnode-id="1005" instrument_node="">Peace and Conflict Instability Ledger (PCIL) [</span><a aria-label="Reference 15" data-dcnode-id="1003" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d239176853e824" title="Hewitt, J.J., Wilkenfeld, J., and T. Robert Gurr (Center for International Development and Conflict Management, University of Maryland) 2010. Peace and conflict 2010 (The Peace and Conflict Instability Ledger) Boulder: Paradigm Publishers."><span data-dcnode-id="1004" instrument_node="">15</span></a><span data-dcnode-id="1002" instrument_node="">]</span></h3><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">The Forecasted Risk of Future Instability Index of the Peace and Conflict Instability Ledger is developed by the researchers at the University of Maryland. It aims to forecast, within three years, the risk of future state instability. It assessed a total of 160 countries in five indicator areas: regime consistency, infant mortality, economic openness, militarization, and neighborhood war.</span></p><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Among the 162 countries, China is ranked the 47th, a favorable assessment. Among the BRICS, China is ranked the best. Contrary to the worst assessment it has received from the Failed States Index, China has received the most positive assessment from the Forecasted Risk of Future Instability Index of the Peace and Conflict Instability Ledger. On a scale of 0 (low risk) to 40 (highest risk), China’s risk score stands at 1.2, which puts China in the same “Low Risk” group as the U.S., Canada and other Western democracies. Brazil (6.6), Russia (6.7) and South Africa (8.1) are placed in the “Some Risk” Group while India (12.0) is placed in the “High Risk” Group.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="992" id="Sec10"><span data-dcnode-id="996" instrument_node="">Index of State Weakness in the Developing World [</span><a aria-label="Reference 16" data-dcnode-id="994" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d239176853e837" title="Rice, S.E., and P. Stewart. 2008. Index of state weakness in the developing world. Washington, DC: The Brookings Institution."><span data-dcnode-id="995" instrument_node="">16</span></a><span data-dcnode-id="993" instrument_node="">]</span></h3><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">This index developed by The Brookings Institution uses 20 indicators to rank 141 developing countries according to their relative performance in four critical spheres: economic, political, security, and social welfare. Among the 141 countries covered by the index, China is ranked the 68th, a much better than average ranking. Among the BRICS, China is ranked the third, performing slightly better than India and Russia, but not as well as South Africa and Brazil.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="985" id="Sec11"><span data-dcnode-id="989" instrument_node="">Global Political Risk Index (GPRI) [</span><a aria-label="Reference 17" data-dcnode-id="987" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d239176853e848" title="Euroasia Group 2010. Global political risk index. New York."><span data-dcnode-id="988" instrument_node="">17</span></a><span data-dcnode-id="986" instrument_node="">]</span></h3><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">The GPRI, which is developed by the Euroasia Group, focuses on 24 emerging market economies. They are: Algeria, Argentina, Brazil, Bulgaria, China, Colombia, Egypt, Hungary, India, Indonesia, Iran, Mexico, Nigeria, Pakistan, Philippines, Poland, Russia, Saudi Arabia, South Africa, South Korea, Thailand, Turkey, Ukraine, and Venezuela. Composed of 20 indicators in four subcategories: government, society, security, and economy, GPRI measures a country’s ability to absorb political shocks.</span></p><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Among the 24 countries, China is ranked the 12th, exactly in the middle. Among the BRICS, however, China is ranked the lowest, indicating that China is perhaps less able to absorb political shocks than all the other four members (Brazil, South Africa, India, and Russia). But the difference between China and India or Russia is perhaps insignificant. Between an index score of 43 as being highly unstable and an index score of 80+ as being highly stable, China’s score is 62 versus the score of 63 for both India and Russia.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="976" id="Sec12"><span data-dcnode-id="980" instrument_node="">Bertelsmann Transformation Index (BTI)-“Status Index” [</span><a aria-label="Reference 18" data-dcnode-id="978" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d239176853e862" title="Bertelsmann Stiftung Foundation 2010. Bertelsmann Transformation Index (BTI) State Weakness Index. Berlin, Germany."><span data-dcnode-id="979" instrument_node="">18</span></a><span data-dcnode-id="977" instrument_node="">]</span></h3><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">The BTI compiled by the researchers at Bertelsmann Stiftung Foundation based in Germany has two component indices: the “Status Index” and the “Management Index”. The “Status Index” measures the current status of both political and economic transformation in 128 countries in the world. The criteria for measuring political transformation includes: stateness, political participation, rule of law, stability of democratic institutions, and political and social integration. The criteria for measuring economic transformation includes: level of socioeconomic development, organization of the market and competition, currency and price stability, private property, welfare regime, economic performance, and sustainability.</span></p><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Among all the 128 countries surveyed by BTI “Status Index”, China is ranked the 88th, below the mid-point of 64, which indicates that political and economic transformation in China legs behind most other countries in the world. Among the BRICS, China is also behind all the other four members, receiving an index score of 4.79 versus the score of 5.70 for Russia, 7.16 for South Africa, 7.33 for India, and 8.05 for Brazil on a scale of 1.0 to 10: 1.0 indicating that transformation failed or being blocked and 10 indicating that transformation being highly advanced.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="967" id="Sec13"><span data-dcnode-id="971" instrument_node="">Bertelsmann Transformation Index (BTI)-“Management Index” [</span><a aria-label="Reference 18" data-dcnode-id="969" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d239176853e875" title="Bertelsmann Stiftung Foundation 2010. Bertelsmann Transformation Index (BTI) State Weakness Index. Berlin, Germany."><span data-dcnode-id="970" instrument_node="">18</span></a><span data-dcnode-id="968" instrument_node="">]</span></h3><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">The BTI-“Management Index” covers four indicators: steering capability, resource efficiency, consensus building, and international cooperation. Among all the 128 countries surveyed by this index, China is ranked the 64th, exactly in the middle. Among the BRICS, again China is behind Brazil, India and South Africa, but is ahead of Russia. It seems to suggest that although the current status of political and economic transformation in China legs behind many other countries in the world, the Chinese leaders have both the capacity and resources to perform better.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="960" id="Sec14"><span data-dcnode-id="964" instrument_node="">Corruption Perceptions Index (CPI) [</span><a aria-label="Reference 19" data-dcnode-id="962" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d239176853e886" title="Transparency International, Corruption Perceptions Index 2010."><span data-dcnode-id="963" instrument_node="">19</span></a><span data-dcnode-id="961" instrument_node="">]</span></h3><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">The CPI by Transparency International is the most widely adopted measurement of corruption. Based on assessments and business opinion surveys, it ranks countries according to perception of corruption in the public sector. According to Transparency International, the opinion surveys include questions relating to bribery of public officials, kickbacks in public procurement, embezzlement of public funds, and questions that probe the strength and effectiveness of public sector anti-corruption efforts.</span></p><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Among all the 178 countries surveyed by this index, China is ranked the 78th, above the mid-point of 89. Among the BRICS, China’s corruption problem is more serious than it is in South Africa and Brazil, but less serious than in India and Russia. On a scale of 0–0.9 (highly corrupt) to 9.0–10 (highly clean), China’s score is 3.5 versus 2.1 for Russia, 3.3 for India, 3.7 for Brazil and 4.5 for South Africa.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="951" id="Sec15"><span data-dcnode-id="955" instrument_node="">Global Peace Index (GPI) [</span><a aria-label="Reference 20" data-dcnode-id="953" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d239176853e899" title="Institute for Economics and Peace. 2011. Global Peace Index 2011. London and Washington, DC."><span data-dcnode-id="954" instrument_node="">20</span></a><span data-dcnode-id="952" instrument_node="">]</span></h3><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">The GPI, produced by the Institute for Economics and Peace, is the world’s leading measurement of global peacefulness. The GPI is calculated on the basis of 23 separate indicators divided into three broad categories: measures of ongoing domestic and international conflict, measures of safety and security in society and measures of militarization.</span></p><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Five indicators of ongoing domestic and international conflict include: number of external and internal conflicts fought: 2004–09, estimated number of deaths from organized conflict (external), number of deaths from organized conflict (internal), level of organized conflict (internal), and relations with neighboring countries.</span></p><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Ten indicators of societal safety and security include: perceptions of criminality in society, number of displaced people as a percentage of the population, political instability, level of disrespect for human rights, potential for terrorist acts, number of homicides per 100,000 people, level of violent crime, likelihood of violent demonstrations, number of jailed population per 100,000 people, and number of internal security officers and police per 100,000 people.</span></p><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Eight indicators of militarization include: military expenditure as a percentage of GDP, number of armed services personnel per 100,000 people, volume of transfers (imports) of major conventional weapons per 100,000 people, volume of transfers (exports) of major conventional weapons per 100,000 people, funding for UN peacekeeping missions: outstanding contributions versus annual assessment to the budget of the current peacekeeping missions, aggregate number of heavy weapons per 100,000 people, ease of access to small arms and light weapons, and military capability/sophistication.</span></p><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Among all the 153 countries surveyed by this index, China is ranked the 80th. China’s GPI score of 2.05 in 2011 indicates some reduction of peacefulness compared to its score of 1.98 in 2007. On the other hand, China’s 2011 GPI score is better than that of South Africa, India and Russia, though not as good as that of Brazil. China’s 2.05 GPI score is also the average score for all the countries covered by the 2011 Global Peace Index.</span></p></div></div></section><section data-dcnode-id="860" data-title="Findings"><div class="c-article-section" data-dcnode-id="861" id="Sec16-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="936" id="Sec16"><span data-dcnode-id="937" instrument_node="">Findings</span></h2><div class="c-article-section__content" data-dcnode-id="862" id="Sec16-content"><p data-dcnode-id="931"><span data-dcnode-id="935" instrument_node="">On a global scale of comparisons, our study has shown that China is ranked better than average on four instability/fragility indices (the Political Instability Index by the </span><i data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Economist</span></i><span data-dcnode-id="932" instrument_node=""> Intelligence Unit, the Peace and Conflict Instability Ledger-Instability Index by the University of Maryland, the Index of State Weakness in the Developing World by the Brookings Institution, and the Corruption Perceptions Index by Transparency International).</span></p><p data-dcnode-id="923"><span data-dcnode-id="930" instrument_node="">China is ranked worse than average on six instability/fragility indices (The World Bank’s Worldwide Governance Indicators-Political Stability and Absence of Violence, the State Fragility Index by George Mason University, the Country Indicator for Foreign Policy-Fragility Index by Carlton University, the Failed States Index by the </span><i data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="927" instrument_node=""> and the Fund for Peace, The Bertelsmann Transformation Index-Status Index by the Bertelsmann Stiftung Foundation, and the Global Peace Index by Transparency International). China has achieved an average performance according to two indices (The Global Political Risk Index by Euroasia Group and The Bertelsmann Transformation Index-Management Index by the Bertelsmann Stiftung Foundation) (see Table&nbsp;</span><a data-dcnode-id="925" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="926" instrument_node="">2</span></a><span data-dcnode-id="924" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="908" data-test="inline-table" id="table-2"><figure data-dcnode-id="909"><figcaption class="c-article-table__figcaption" data-dcnode-id="920"><b data-dcnode-id="921" data-test="table-caption" id="Tab2"><span data-dcnode-id="922" instrument_node="">Table 2 Rankings of China in the world</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="910"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="911" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11366-011-9175-x/tables/2" rel="nofollow"><span data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="912" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="913" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="914" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="917" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="916" fill-rule="evenodd"></path><span data-dcnode-id="915" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="906" instrument_node="">When we compare China with the other four members of the BRICS on the 12 indices of instability/fragility, China is ranked the best on one index (Peace and Conflict Instability Ledger-Risk of Future Instability) and the worst on three indices (Failed States Index, Global Political Risk Index, and BTI-Status Index). On the rest of the indices, China is placed the second on three indices, the third on three indices and the fourth on two indices (see Table&nbsp;</span><a data-dcnode-id="904" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="905" instrument_node="">3</span></a><span data-dcnode-id="903" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="887" data-test="inline-table" id="table-3"><figure data-dcnode-id="888"><figcaption class="c-article-table__figcaption" data-dcnode-id="899"><b data-dcnode-id="900" data-test="table-caption" id="Tab3"><span data-dcnode-id="901" instrument_node="">Table 3 Rankings and risk scores of BRICS</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="889"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="890" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11366-011-9175-x/tables/3" rel="nofollow"><span data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="891" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="892" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="893" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="896" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="895" fill-rule="evenodd"></path><span data-dcnode-id="894" instrument_node="">

</span><p data-dcnode-id="881"><span data-dcnode-id="885" instrument_node="">When we put the rankings and scores of BRICS on the 12 indices together, China is ranked the third, behind Brazil and South Africa, but ahead of Russia and India (see Table&nbsp;</span><a data-dcnode-id="883" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="884" instrument_node="">4</span></a><span data-dcnode-id="882" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="866" data-test="inline-table" id="table-4"><figure data-dcnode-id="867"><figcaption class="c-article-table__figcaption" data-dcnode-id="878"><b data-dcnode-id="879" data-test="table-caption" id="Tab4"><span data-dcnode-id="880" instrument_node="">Table 4 Rankings of China among BRICS</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="868"><a aria-label="Full size table 4" class="c-article__pill-button" data-dcnode-id="869" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11366-011-9175-x/tables/4" rel="nofollow"><span data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="870" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="871" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="872" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="875" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="874" fill-rule="evenodd"></path><span data-dcnode-id="873" instrument_node="">

</span><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">These global comparisons as well as the select comparisons among the BRICS countries do not give China the reasons for celebration, nor, however, the reasons for paranoia. China has indeed faced many threats or challenges to political stability, but as our study demonstrates, China is no more politically unstable or fragile than Russia and India. Ignoring or underestimating the ripple effect of any destabilizing world event will do China no good, but overreactions also serve China’s interests poorly as fear or paranoia can be highly contagious.</span></p></div></div></section><span data-dcnode-id="859" instrument_node="">
</span><section data-dcnode-id="807" data-title="Notes"><div class="c-article-section" data-dcnode-id="808" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="857" id="notes"><span data-dcnode-id="858" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="809" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="810"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="850" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="851"><p data-dcnode-id="852"><span data-dcnode-id="856" instrument_node="">Chen Jia, “Country’s wealth divide past warning level,” </span><i data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">China Daily</span></i><span data-dcnode-id="853" instrument_node="">, May 12, 2010.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="840" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="841"><p data-dcnode-id="842"><span data-dcnode-id="849" instrument_node="">In June 2006 [</span><a aria-label="Reference 9" data-dcnode-id="847" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d239176853e289" title="Gordon, C. 2001. The coming collapse of China. New York: Random House."><span data-dcnode-id="848" instrument_node="">9</span></a><span data-dcnode-id="846" instrument_node="">], Chang had concluded that the Chinese economy was already halfway to its collapse, thus literally making the end of 2011 the final day for the Chinese economy to totally collapse. Gordon G. Chang, “Halfway to China’s Collapse,” </span><i data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">The Far Eastern Economic Review</span></i><span data-dcnode-id="843" instrument_node="">, June 2006.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="833" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="834"><p data-dcnode-id="835"><span data-dcnode-id="839" instrument_node="">There are several other indices measuring political stability/governance in areas excluding China, such as, the </span><i data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Economist</span></i><span data-dcnode-id="836" instrument_node="">’s “Arab League’s Index of Unrest”, more commonly known as “The Shoe-Thrower’s Index”, the World Bank’s Country Policy and Institutional Assessment (CPIA), Harvard Kennedy School’s Index of African Governance and Mo Ibrahim Foundation’s Ibrahim Index of African Governance. Because these indices are not directly relevant to China, they are not included in our study.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="4." data-dcnode-id="829" id="Fn4"><div class="c-article-footnote--listed__content" data-dcnode-id="830"><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Our study does not include sovereign financial rating agencies such as Moody’s and Standard &amp; Poor’s or global commercial rating services such as Global Insight’s Global Risk Service, iJET’s Country Security Risk Ratings and the PRS Group’s International Country Risk Guide because the main focus of our study is the overall political instability/state fragility, not financial instability or fragility of any sovereign fund.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="5." data-dcnode-id="822" id="Fn5"><div class="c-article-footnote--listed__content" data-dcnode-id="823"><p data-dcnode-id="824"><span data-dcnode-id="828" instrument_node="">Readers who are interested in the methodologies of some of these indices may want to consult the following guide: [</span><a aria-label="Reference 8" data-dcnode-id="826" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d239176853e704" title="Mata, J.F., and S. Ziaja. 2009. User’s guide on measuring fragility. Oslo: United Nations Development Programme Oslo Governance Centre and German Development Institute."><span data-dcnode-id="827" instrument_node="">8</span></a><span data-dcnode-id="825" instrument_node="">].</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="6." data-dcnode-id="815" id="Fn6"><div class="c-article-footnote--listed__content" data-dcnode-id="816"><p data-dcnode-id="817"><span data-dcnode-id="821" instrument_node="">It is important to note that the Political Instability Index (PII) by the </span><i data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Economist</span></i><span data-dcnode-id="818" instrument_node=""> magazine’s intelligence unit, as well as some other indices, have listed Taiwan or Hong Kong as a “country” separate from China. We have interpreted “country” referred to in such cases simply as a unit of measurement. It does not necessarily imply sovereignty or independence.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="7." data-dcnode-id="811" id="Fn7"><div class="c-article-footnote--listed__content" data-dcnode-id="812"><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">“Average” in our study simply means 50% of the countries in comparison in each index.</span></p></div></li></ol></div></div></section><div data-dcnode-id="631" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="632" data-title="References"><div class="c-article-section" data-dcnode-id="633" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="805" id="Bib1"><span data-dcnode-id="806" instrument_node="">References</span></h2><div class="c-article-section__content
