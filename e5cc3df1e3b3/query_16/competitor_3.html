</span><div class="source" data-dcnode-id="2688"><h4 data-dcnode-id="2689"><span data-dcnode-id="2693" instrument_node="">Data Source: </span><a class="source" data-customlink="nl:http://www.govindicators.org/" data-dcnode-id="2690" data-text="Worldwide Governance Indicators" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.govindicators.org/" style="padding: 0" target="_blank"><span data-dcnode-id="2691" id="modal-datasource"><span data-dcnode-id="2692" instrument_node="">Worldwide Governance Indicators</span></span></a></h4></div><span data-dcnode-id="2687" instrument_node="">
</span><div class="long-text" data-dcnode-id="2679" id="modal-dataset-description"><span data-dcnode-id="2686" instrument_node="">The Worldwide Governance Indicators (WGI) project reports aggregate and individual governance indicators for over 200 countries and territories over the period 1996-2016, for six dimensions of governance: Voice and Accou</span><span class="ellipsis" data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">... </span></span><a class="read_more" data-dcnode-id="2682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//govdata360.worldbank.org/indicators/hb0673e03%3Fcountry%3DBRA%26indicator%3D376%26viz%3Dline_chart%26years%3D1996%2C2020"><span data-dcnode-id="2683" instrument_node="">Read More</span></a><span class="more_text" data-dcnode-id="2680" style="display:none;"><span data-dcnode-id="2681" instrument_node="">ntability, Political Stability and Absence of Violence, Government Effectiveness, Regulatory Quality, Rule of Law and Control of Corruption.</span></span></div><span data-dcnode-id="2678" instrument_node="">
</span><div class="methodology header" data-dcnode-id="2673"><h4 data-dcnode-id="2674"><a class="source" data-customlink="nl:http://www.govindicators.org/" data-dcnode-id="2675" data-text="Worldwide Governance Indicators" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.govindicators.org/" style="padding: 0" target="_blank"><span data-dcnode-id="2676" id="modal-methodology-header"><span data-dcnode-id="2677" instrument_node="">Methodology</span></span></a></h4></div><span data-dcnode-id="2672" instrument_node="">
</span><div class="long-text" data-dcnode-id="2655" id="modal-methodology"><span data-dcnode-id="2671" instrument_node="">These aggregated indicators combine the views of a large number of enterprise, citizen and expert survey respondents in industrial and developing countries.  The WGI compile and summarize information from over 30 existin</span><span class="ellipsis" data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">... </span></span><a class="read_more" data-dcnode-id="2667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//govdata360.worldbank.org/indicators/hb0673e03%3Fcountry%3DBRA%26indicator%3D376%26viz%3Dline_chart%26years%3D1996%2C2020"><span data-dcnode-id="2668" instrument_node="">Read More</span></a><span class="more_text" data-dcnode-id="2656" style="display:none;"><span data-dcnode-id="2666" instrument_node="">g data sources that report the views and experiences of citizens, entrepreneurs, and experts in the public, private and NGO sectors from around the world, on the quality of various aspects of governance.</span><br data-dcnode-id="2665"><br data-dcnode-id="2664"><span data-dcnode-id="2663" instrument_node="">The WGI draw on four different types of source data: Surveys of households and firms, Commercial business information providers, Non-governmental organizations, and public sector organizations. It is built under six dimensions of governance: Voice and Accountability, Political Stability and Absence of Violence, Government Effectiveness, Regulatory Quality, Rule of Law and Control of Corruption. Each of the six dimensions aggregate WGI measures are constructed by averaging together data from the underlying sources that correspond to the concept of governance being measured. Read more about the methodology in </span><a data-dcnode-id="2661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//info.worldbank.org/governance/wgi/index.aspx%23doc-sources" target="_blank"><span data-dcnode-id="2662" instrument_node="">http://info.worldbank.org/governance/wgi/index.aspx#doc-sources</span></a><span data-dcnode-id="2660" instrument_node=""> </span><br data-dcnode-id="2659"><a data-dcnode-id="2657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//info.worldbank.org/governance/wgi/index.aspx%23doc-methodology" target="_blank"><span data-dcnode-id="2658" instrument_node="">http://info.worldbank.org/governance/wgi/index.aspx#doc-methodology</span></a></span></div><span data-dcnode-id="2654" instrument_node="">
</span><div class="termsofuse header" data-dcnode-id="2649"><h4 data-dcnode-id="2650"><a class="source" data-customlink="nl:http://www.worldbank.org/en/about/legal/terms-of-use-for-datasets" data-dcnode-id="2651" data-text="Worldwide Governance Indicators" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.worldbank.org/en/about/legal/terms-of-use-for-datasets" style="padding: 0" target="_blank"><span data-dcnode-id="2652" id="modal-terms-of-use-header"><span data-dcnode-id="2653" instrument_node="">Terms of Use</span></span></a></h4></div><span data-dcnode-id="2648" instrument_node="">
