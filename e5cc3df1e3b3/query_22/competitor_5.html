ode="">Kopstein and Reilly, 1999</span></a><span data-dcnode-id="4997" instrument_node="">, 614). The factors that serve as proximate explanatory variables may be seen as “intervening links in a causal chain that leads from the deep attributes to the political outcome” (</span><a class="workspace-trigger" data-dcnode-id="4995" href="#bib64" name="bbib64"><span data-dcnode-id="4996" instrument_node="">Møller and Skaaning, 2009</span></a><span data-dcnode-id="4994" instrument_node="">, 316). Herbert Kitschelt has commented, “Shallow explanations provide … high statistical explanatory yields but little insight into the&nbsp;causal genealogy of a phenomenon” (</span><a class="workspace-trigger" data-dcnode-id="4992" href="#bib51" name="bbib51"><span data-dcnode-id="4993" instrument_node="">Kitschelt, 2003</span></a><span data-dcnode-id="4991" instrument_node="">, 68). Deeper causes may account for what is happening with&nbsp;both the proximate independent variable and the dependent variable in an apparent empirical relationship. Grigore Pop-Eleches suggests that the results of initial competitive elections “may be </span><em data-dcnode-id="4989"><span data-dcnode-id="4990" instrument_node="">signals</span></em><span data-dcnode-id="4988" instrument_node=""> about the nature of historical legacies, which drive the long-term prospects of democracy” for post-communist states (</span><a class="workspace-trigger" data-dcnode-id="4986" href="#bib69" name="bbib69"><span data-dcnode-id="4987" instrument_node="">Pop-Eleches, 2007</span></a><span data-dcnode-id="4985" instrument_node="">, 921).</span></p><p data-dcnode-id="4953" id="p0110"><span data-dcnode-id="4979"><span data-dcnode-id="4983" instrument_node="">A growing number of studies have attempted to identify the influence of crucial differences in the historical experiences of nations that formerly were under communist rule. Pop-Eleches argues persuasively that “historical legacies have to constitute the starting point for any systematic analysis of </span><a class="topic-link" data-dcnode-id="4981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/democratization" title="Learn more about democratization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4982" instrument_node="">democratization</span></a><span data-dcnode-id="4980" instrument_node=""> in the post-communist context” (</span></span><a class="workspace-trigger" data-dcnode-id="4977" href="#bib69" name="bbib69"><span data-dcnode-id="4978" instrument_node="">Pop-Eleches, 2007</span></a><span data-dcnode-id="4976" instrument_node="">, 909). Similarly, Grzegorz Ekiert contends that “historical legacies determine the available alternatives and make some institutional choices more likely” in post-communist countries (</span><a class="workspace-trigger" data-dcnode-id="4974" href="#bib31" name="bbib31"><span data-dcnode-id="4975" instrument_node="">Ekiert, 2003</span></a><span data-dcnode-id="4973" instrument_node="">, 93). Among those who examine historical backgrounds, some scholars attach primary importance to the experiences of the period of communist rule in various countries (</span><a class="workspace-trigger" data-dcnode-id="4971" href="#bib31" name="bbib31"><span data-dcnode-id="4972" instrument_node="">Ekiert, 2003</span></a><span data-dcnode-id="4970" instrument_node="">, 92–93; </span><a class="workspace-trigger" data-dcnode-id="4968" href="#bib52" name="bbib52"><span data-dcnode-id="4969" instrument_node="">Kopstein, 2003</span></a><span data-dcnode-id="4967" instrument_node="">, 233), while others trace the sources of post-communist differences back to the historical legacies of those countries before the creation of communist regimes (</span><a class="workspace-trigger" data-dcnode-id="4965" href="#bib52" name="bbib52"><span data-dcnode-id="4966" instrument_node="">Kopstein, 2003</span></a><span data-dcnode-id="4964" instrument_node="">, 239; </span><a class="workspace-trigger" data-dcnode-id="4962" href="#bib68" name="bbib68"><span data-dcnode-id="4963" instrument_node="">Pop-Eleches, 2005</span></a><span data-dcnode-id="4957"><span data-dcnode-id="4961" instrument_node="">, 15, 25). All of those scholars would agree that historical, cultural, and </span><a class="topic-link" data-dcnode-id="4959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/geographical-factors" title="Learn more about geographical factors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4960" instrument_node="">geographical factors</span></a><span data-dcnode-id="4958" instrument_node=""> play a large role&nbsp;in accounting for the divergence in the political and economic paths of post-communist nations, which has become more pronounced from the early 1990s to the present (</span></span><a class="workspace-trigger" data-dcnode-id="4955" href="#bib69" name="bbib69"><span data-dcnode-id="4956" instrument_node="">Pop-Eleches, 2007</span></a><span data-dcnode-id="4954" instrument_node="">, 914).</span></p><p data-dcnode-id="4922" id="p0115"><span data-dcnode-id="4952" instrument_node="">Among post-communist nations, those in which a consensus of most segments of the elite and the public was committed to a radical break with the old system have&nbsp;been much more successful in carrying out marketization and democratization (</span><a class="workspace-trigger" data-dcnode-id="4950" href="#bib66" name="bbib66"><span data-dcnode-id="4951" instrument_node="">Orenstein, 2001</span></a><span data-dcnode-id="4949" instrument_node="">, 43). </span><a class="workspace-trigger" data-dcnode-id="4947" href="#bib13" name="bbib13"><span data-dcnode-id="4948" instrument_node="">Valerie Bunce (2006</span></a><span data-dcnode-id="4946" instrument_node="">, 607) points out that in some countries in Eastern Europe “democratic breakthroughs” were based on&nbsp;a “widespread societal consensus that produced early and sustained economic reforms and democratic deepening.” Such an overwhelming consensus among social groups in favor of fundamental change was not present in Russia in the early 1990s. That crucial contrast between Russia and the countries in Eastern Europe that have gone farther in institutionalizing democratic processes can be explained primarily by differences in historical legacies. As Bunce puts it, in the countries in Eastern Europe that have made successful transitions to democracy, “a liberal agenda combined with a nationalist agenda” (</span><a class="workspace-trigger" data-dcnode-id="4944" href="#bib10" name="bbib10"><span data-dcnode-id="4945" instrument_node="">Bunce, 2003</span></a><span data-dcnode-id="4943" instrument_node="">, 178). In some countries in Eastern Europe, such as Poland and Hungary, there was the historical memory of intervention by Tsarist Russia to block their striving for national liberation. In most of the region, the imposition of communist regimes after the Second World War ensured that in the minds of the local population those systems would be associated indelibly with Soviet domination. As a result, the&nbsp;people of Eastern European countries felt closer to the&nbsp;West, and to Europe in particular, than ever before (</span><a class="workspace-trigger" data-dcnode-id="4941" href="#bib5" name="bbib5"><span data-dcnode-id="4942" instrument_node="">Brown, 1991</span></a><span data-dcnode-id="4940" instrument_node="">, 262). Bunce observes that “state socialism had created in some countries a popular consensus around democratization, if only because democracy represented the polar opposite of the authoritarian regime” (</span><a class="workspace-trigger" data-dcnode-id="4938" href="#bib9" name="bbib9"><span data-dcnode-id="4939" instrument_node="">Bunce, 2001</span></a><span data-dcnode-id="4929"><span data-dcnode-id="4933"><span data-dcnode-id="4937" instrument_node="">, 57). In the post-communist period, democracy and a </span><a class="topic-link" data-dcnode-id="4935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/market-economy" title="Learn more about market economy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4936" instrument_node="">market economy</span></a><span data-dcnode-id="4934" instrument_node=""> represented not only a different way of&nbsp;life, but also the promise of integration with the West and independence from Russia, creating a fusion of liberal ideology and </span></span><a class="topic-link" data-dcnode-id="4931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/nationalism" title="Learn more about nationalism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4932" instrument_node="">nationalism</span></a><span data-dcnode-id="4930" instrument_node="">. In several countries in Eastern Europe after 1989–1991, the replacement of the old order&nbsp;was simultaneously “a process of national liberation” (</span></span><a class="workspace-trigger" data-dcnode-id="4927" href="#bib7" name="bbib7"><span data-dcnode-id="4928" instrument_node="">Bunce, 1995</span></a><span data-dcnode-id="4926" instrument_node="">, 120), which generated more determined support for a course of radical change (</span><a class="workspace-trigger" data-dcnode-id="4924" href="#bib8" name="bbib8"><span data-dcnode-id="4925" instrument_node="">Bunce, 2000</span></a><span data-dcnode-id="4923" instrument_node="">, 719).</span></p><p data-dcnode-id="4888" id="p0120"><span data-dcnode-id="4921" instrument_node="">In Russia, however, there was a lack of a consensus at the elite and popular levels about the desired character of political and economic transformation (</span><a class="workspace-trigger" data-dcnode-id="4919" href="#bib11" name="bbib11"><span data-dcnode-id="4920" instrument_node="">Bunce, 2004</span></a><span data-dcnode-id="4918" instrument_node="">, 229; </span><a class="workspace-trigger" data-dcnode-id="4916" href="#bib29" name="bbib29"><span data-dcnode-id="4917" instrument_node="">Easter, 2008</span></a><span data-dcnode-id="4915" instrument_node="">, 225; </span><a class="workspace-trigger" data-dcnode-id="4913" href="#bib43" name="bbib43"><span data-dcnode-id="4914" instrument_node="">Goldman, 2003</span></a><span data-dcnode-id="4912" instrument_node="">, 68). The combination of historical conditions that had created a strong anti-communist consensus in most of Eastern Europe had not taken shape in Russia. The Russians did not have a reason to&nbsp;believe that the Soviet system had been forced on them by a foreign power, or to see that system as blocking aspirations for national independence. In Russia, the predominant attitude toward a rapprochement with the West was&nbsp;much more ambivalent (</span><a class="workspace-trigger" data-dcnode-id="4910" href="#bib2" name="bbib2"><span data-dcnode-id="4911" instrument_node="">Appel, 2004</span></a><span data-dcnode-id="4909" instrument_node="">, 170), and the majority of citizens had no desire to cast their future with Europe.</span><a class="workspace-trigger" data-dcnode-id="4906" href="#fn9" name="bfn9"><sup data-dcnode-id="4907"><span data-dcnode-id="4908" instrument_node="">9</span></sup></a><span data-dcnode-id="4905" instrument_node=""> That is not surprising, because for centuries Russians had viewed Europe with deep ambivalence (</span><a class="workspace-trigger" data-dcnode-id="4903" href="#bib86" name="bbib86"><span data-dcnode-id="4904" instrument_node="">Stent, 2007</span></a><span data-dcnode-id="4902" instrument_node="">, 398–399, 435). As Hillary Appel remarks, “the rejection of the communist past in favor of a Western liberal regime has often been interpreted in post-Soviet Russia as a repudiation of Russia’s past and national character,” and as even demeaning to aspects of one’s own personal history (</span><a class="workspace-trigger" data-dcnode-id="4900" href="#bib2" name="bbib2"><span data-dcnode-id="4901" instrument_node="">Appel, 2004</span></a><span data-dcnode-id="4895"><span data-dcnode-id="4899" instrument_node="">, 170, 173). Appel notes that in&nbsp;the Czech Republic in the 1990s, the </span><a class="topic-link" data-dcnode-id="4897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/privatization" title="Learn more about privatization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4898" instrument_node="">privatization</span></a><span data-dcnode-id="4896" instrument_node=""> of industry could be portrayed as anti-communist, pro-European, and therefore essentially in accordance with Czech character (</span></span><a class="workspace-trigger" data-dcnode-id="4893" href="#bib2" name="bbib2"><span data-dcnode-id="4894" instrument_node="">Appel, 2004</span></a><span data-dcnode-id="4892" instrument_node="">, 20, 173). In Poland, the consensus based on nationalism lengthened the time horizon of the&nbsp;public in favor of economic transformation, producing persistence of support for the main direction of change (</span><a class="workspace-trigger" data-dcnode-id="4890" href="#bib12" name="bbib12"><span data-dcnode-id="4891" instrument_node="">Bunce, 2005</span></a><span data-dcnode-id="4889" instrument_node="">, 436).</span></p><p data-dcnode-id="4861" id="p0125"><span data-dcnode-id="4887" instrument_node="">In post-communist Russia, on the other hand, there was&nbsp;no consensus among the public in favor of the movement to a market system (</span><a class="workspace-trigger" data-dcnode-id="4885" href="#bib83" name="bbib83"><span data-dcnode-id="4886" instrument_node="">Simes, 1999</span></a><span data-dcnode-id="4884" instrument_node="">, 152; </span><a class="workspace-trigger" data-dcnode-id="4882" href="#bib43" name="bbib43"><span data-dcnode-id="4883" instrument_node="">Goldman, 2003</span></a><span data-dcnode-id="4881" instrument_node="">, 65–66). Alexander Lukin reports that the substantial degree of disillusionment with the Soviet system among the population of Russia “was caused not by a desire to live in a Western-type society, but rather by a desire to live in a system that was different from the Stalinist system” (</span><a class="workspace-trigger" data-dcnode-id="4879" href="#bib55" name="bbib55"><span data-dcnode-id="4880" instrument_node="">Lukin, 2009</span></a><span data-dcnode-id="4878" instrument_node="">, 67). Surveys of the Russians showed not only&nbsp;that there was no overwhelming rejection of the old political and economic system, but also that there was a lack of general agreement in favor of a new set of institutions.</span><a class="workspace-trigger" data-dcnode-id="4875" href="#fn10" name="bfn10"><sup data-dcnode-id="4876"><span data-dcnode-id="4877" instrument_node="">10</span></sup></a><span data-dcnode-id="4874" instrument_node=""> In that country, the “deep popular ambivalence” toward radical change in the economy (</span><a class="workspace-trigger" data-dcnode-id="4872" href="#bib44" name="bbib44"><span data-dcnode-id="4873" instrument_node="">Gustafson, 1999</span></a><span data-dcnode-id="4871" instrument_node="">, 21) led the Yeltsin leadership to buy the support of interests in&nbsp;the elite by making concessions that undermined the realization of some of the key goals of privatization, as we have seen (</span><a class="workspace-trigger" data-dcnode-id="4869" href="#bib2" name="bbib2"><span data-dcnode-id="4870" instrument_node="">Appel, 2004</span></a><span data-dcnode-id="4868" instrument_node="">, 81, 175; </span><a class="workspace-trigger" data-dcnode-id="4866" href="#bib11" name="bbib11"><span data-dcnode-id="4867" instrument_node="">Bunce, 2004</span></a><span data-dcnode-id="4865" instrument_node="">, 224; </span><a class="workspace-trigger" data-dcnode-id="4863" href="#bib79" name="bbib79"><span data-dcnode-id="4864" instrument_node="">Rutland, 2006</span></a><span data-dcnode-id="4862" instrument_node="">, 78). Those compromises institutionalized partial and&nbsp;distorted reform, with political and economic consequences that became fully evident only after the 1990s, but were of the sort that Joel Hellman had predicted. The absence of a fusion of democratization and national liberation in Russia was a major reason for the lack of a clear national consensus in favor of political and economic transformation, with profound implications for the course of reform in that country.</span></p></section><section data-dcnode-id="4772" id="sec6"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4856"><span data-dcnode-id="4859" instrument_node="">6</span><span data-dcnode-id="4858" instrument_node="">. </span><span data-dcnode-id="4857" instrument_node="">Conclusions</span></h2><p data-dcnode-id="4847" id="p0130"><span data-dcnode-id="4855" instrument_node="">The evidence presented in this article makes it clear that&nbsp;the model of transition derived from changes that had occurred in a number of countries in Southern Europe and South America in the 1970s and 1980s did not hold up well when it traveled to Russia and the other post-communist states. Perhaps the one point made by transitologists that has proved to have the most general applicability is that in&nbsp;a period of instability, the actions of political elites are of&nbsp;particular importance. Instability enhances the opportunity for political leaders to engage in the restructuring of&nbsp;political institutions and policies. Having acknowledged that insight from the transitologists, we must add that their point of view was limited by distinctive historical conditions and geographical boundaries much more than they realized. Almost all the transitions that were the basis of&nbsp;their model took place in nations that had been ruled by the military (</span><a class="workspace-trigger" data-dcnode-id="4853" href="#bib41" name="bbib41"><span data-dcnode-id="4854" instrument_node="">Geddes, 1999</span></a><span data-dcnode-id="4848"><span data-dcnode-id="4852" instrument_node="">, 131); none took place in a country that had been under a single-party regime that subdued the state and the military as thoroughly as in the Soviet Union. In each of the nations where those earlier transitions took place, the basic institutions of a </span><a class="topic-link" data-dcnode-id="4850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/market-economy" title="Learn more about market economy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4851" instrument_node="">market economy</span></a><span data-dcnode-id="4849" instrument_node=""> had already developed before a political transition began. In no country in Southern Europe or South America that moved toward democracy had social organizations been as thoroughly controlled by a single ruling party as in most of the nations under communist rule, and in none of those countries that had gone through&nbsp;earlier transitions had the growth of civil society been blocked as firmly as in the Soviet Union. The key thesis of&nbsp;the transitological literature, that of the positive effects&nbsp;of pacts between moderate reformers and moderate defenders of the old order, has proved inapplicable in relation to the post-communist states.</span></span></p><p data-dcnode-id="4842" id="p0135"><span data-dcnode-id="4846" instrument_node="">One of the main lessons from the course of events in Russia from the early 1990s to the present is that the change away from one form of authoritarian rule, which usually has been labeled as a transition to democracy, is not&nbsp;irreversible. Some democratic transitions may prove to&nbsp;be shallow (</span><a class="workspace-trigger" data-dcnode-id="4844" href="#bib67" name="bbib67"><span data-dcnode-id="4845" instrument_node="">Ottaway, 2003</span></a><span data-dcnode-id="4843" instrument_node="">, 165), and the changes in post-communist Russia have provided a good example of a shallow transition. The introduction of democratic institutions of government and competing political parties may not prove to be a breakthrough to democracy. The metaphor of a breakthrough implies a decisive change with lasting results, even if that is not asserted explicitly. Stable democracy depends on the existence of a multi-layered infrastructure, including not only competing political parties, independent mass media, and protection for individual rights, but also—on a deeper level—supportive economic and social institutions. In most countries that have made successful transitions from authoritarianism to democracy in recent decades, large&nbsp;parts of that infrastructure had come into being as a result of&nbsp;gradual economic and social changes before the&nbsp;old authoritarian regime entered its last years.</span></p><p data-dcnode-id="4822" id="p0140"><span data-dcnode-id="4837"><span data-dcnode-id="4841" instrument_node="">As was mentioned earlier in this article, the scholarly literature on transitions to democracy that appeared after the early 1980s departed from the emphasis of the writings of the previous decades, which had focused on the growth of social, economic, and cultural conditions for the institutionalization of democracy in the political system. In recent years the limitations built into the approach of the transition paradigm have become apparent. The experience of Russia, which leaders in Western Europe and North America had regarded as the most important test case for </span><a class="topic-link" data-dcnode-id="4839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/democratization" title="Learn more about democratization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4840" instrument_node="">democratization</span></a><span data-dcnode-id="4838" instrument_node=""> in the 1990s, may prompt us to return to the study of the long-term trends facilitating or inhibiting the growth of democratic institutions. Thomas Carothers has urged that we do so: “As the third wave has aged, … and many ‘transitional countries’ have fallen short of early hopes, the importance of underlying conditions and structures for democratic success has become increasingly apparent” (</span></span><a class="workspace-trigger" data-dcnode-id="4835" href="#bib19" name="bbib19"><span data-dcnode-id="4836" instrument_node="">Carothers, 2007</span></a><span data-dcnode-id="4834" instrument_node="">, 24).</span><a class="workspace-trigger" data-dcnode-id="4831" href="#fn11" name="bfn11"><sup data-dcnode-id="4832"><span data-dcnode-id="4833" instrument_node="">11</span></sup></a><span data-dcnode-id="4830" instrument_node=""> A return to the study of the conditions favorable for successful democratization might help to overcome the excessive optimism that has been exhibited by many scholars and political leaders in the West in recent decades. For some years, as Peter Rutland says, “building democracy and building a market economy were assumed to be compatible and complementary processes which could be introduced to any country on the planet” (</span><a class="workspace-trigger" data-dcnode-id="4828" href="#bib77" name="bbib77"><span data-dcnode-id="4829" instrument_node="">Rutland, 2000</span></a><span data-dcnode-id="4827" instrument_node="">, 244). That optimism produced a tendency to believe that a country had entered a transition to democracy if its old authoritarian leadership had been replaced and the new leadership of the country claimed that it was devoted to the values of democracy. Western leaders were slow to admit that they had been naïve in their assessment of Russia’s executive leadership in&nbsp;the 1990s. After a few years of supporting the Yeltsin administration, the Clinton administration in the United States had too much of a stake in Yeltsin to admit the depth of the problems that he had created. After Putin replaced Yeltsin, President George W. Bush continued to praise Russia’s executive leadership as democratically oriented even as late as 2003.</span><a class="workspace-trigger" data-dcnode-id="4824" href="#fn12" name="bfn12"><sup data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node="">12</span></sup></a><span data-dcnode-id="4823" instrument_node=""> The leaders who undermined the success of a democratic transition in Russia in the 1990s and those who introduced more authoritarian rule in the next decade were the same ones whom Western leaders had regarded as the main agents of democratization in that&nbsp;nation.</span></p><p data-dcnode-id="4805" id="p0145"><span data-dcnode-id="4821" instrument_node="">In the 1990s the transition paradigm that had been created in the 1980s seized the imagination of the leaders and the public in some Western countries, and especially in&nbsp;the USA. Now it is time for that model to lose its grip on our consciousness. That is one of the main lessons to be learned from the disappointment of earlier expectations for a transition to democracy in post-communist Russia. In light of the course of recent change in that country, one might expect that the illusions encouraged by that model would have been left behind by scholars who specialize in&nbsp;the study of the politics of Russia, but there are signs that some prominent scholars who write about Russia are still thinking within the frame of reference of the transition paradigm. It was understandable that as late as 2000, Michael McFaul and Sarah Mendelson could assert that Russia was “midstream” in a radical transformation as it moved toward democracy and a market economy (</span><a class="workspace-trigger" data-dcnode-id="4819" href="#bib62" name="bbib62"><span data-dcnode-id="4820" instrument_node="">McFaul and Mendelson, 2000</span></a><span data-dcnode-id="4818" instrument_node="">, 348). It was surprising, however, that in 2005, after Vladimir Putin had been in power for several years, McFaul urged that the United States should try to strengthen “those reformers still fighting for democracy” in Russia, because “over the long run, strengthening those forces will help to democratize Russia” (</span><a class="workspace-trigger" data-dcnode-id="4816" href="#bib61" name="bbib61"><span data-dcnode-id="4817" instrument_node="">McFaul, 2005</span></a><span data-dcnode-id="4815" instrument_node="">, 400). His words provide an example of a scholar who was promoting an illusion by trying to persuade his audience that Russia was still in a transition to democracy and that support for the pro-Western segment of the Russian intelligentsia offered a realistic prospect for the successful completion of that transition. In reality, the liberal intelligentsia constitute a small minority in their own society, and their ideas have not won widespread support among the majority of Russians (</span><a class="workspace-trigger" data-dcnode-id="4813" href="#bib35" name="bbib35"><span data-dcnode-id="4814" instrument_node="">Fish, 1996</span></a><span data-dcnode-id="4812" instrument_node="">, 107; </span><a class="workspace-trigger" data-dcnode-id="4810" href="#bib42" name="bbib42"><span data-dcnode-id="4811" instrument_node="">Gill and Markwick, 2000</span></a><span data-dcnode-id="4809" instrument_node="">, 255; </span><a class="workspace-trigger" data-dcnode-id="4807" href="#bib74" name="bbib74"><span data-dcnode-id="4808" instrument_node="">Rose, Munro, and Mishler, 2004</span></a><span data-dcnode-id="4806" instrument_node="">, 213). Relying primarily on that section of society to bring political change in Russia has brought disappointment in the past, and it is sure to bring disappointment in the future if Western leaders persist in that habit. That approach is not received well by the majority of Russians. It makes Westerners appear to be either naive (well-meaning but clueless) or cynical (disguising ulterior motives), and neither reading of our actions is likely to inspire much trust.</span></p><p data-dcnode-id="4773" id="p0150"><span data-dcnode-id="4804" instrument_node="">It is time to stop looking at Russia as if it were in the middle of an incomplete transition. There was a transition in Russia, but it did not go where many Western scholars had hoped. We should heed the advice that the late James Millar sagely offered several years ago: “The transition is over. Get over it” (</span><a class="workspace-trigger" data-dcnode-id="4802" href="#bib63" name="bbib63"><span data-dcnode-id="4803" instrument_node="">Millar, 2000</span></a><span data-dcnode-id="4801" instrument_node="">). A growing body of scholarly literature in the field of comparative politics seeks to&nbsp;delineate the dynamics of semi-authoritarian regimes (</span><a class="workspace-trigger" data-dcnode-id="4799" href="#bib6" name="bbib6"><span data-dcnode-id="4800" instrument_node="">Brownlee, 2007</span></a><span data-dcnode-id="4798" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4796" href="#bib67" name="bbib67"><span data-dcnode-id="4797" instrument_node="">Ottaway, 2003</span></a><span data-dcnode-id="4795" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4793" href="#bib84" name="bbib84"><span data-dcnode-id="4794" instrument_node="">Smith and Zeigler, 2008</span></a><span data-dcnode-id="4792" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4790" href="#bib95" name="bbib95"><span data-dcnode-id="4791" instrument_node="">Zakaria, 1997</span></a><span data-dcnode-id="4789" instrument_node="">). That trend reflects the fact that many of the&nbsp;supposed transitions to democracy proved to be shallow, like that in Russia. Increasingly, scholars writing about semi-authoritarian or “hybrid” regimes recognize that many of those regimes are likely to persist for a long time (</span><a class="workspace-trigger" data-dcnode-id="4787" href="#bib75" name="bbib75"><span data-dcnode-id="4788" instrument_node="">Rose and Shin, 2001</span></a><span data-dcnode-id="4786" instrument_node="">, 333; </span><a class="workspace-trigger" data-dcnode-id="4784" href="#bib26" name="bbib26"><span data-dcnode-id="4785" instrument_node="">Diamond, 2002</span></a><span data-dcnode-id="4783" instrument_node="">, 23). It is worth noting, however, that during the last few years there&nbsp;has been an increase in research on the factors affecting stability and instability in semi-authoritarian states. The study of contemporary Russian politics should draw insights from that literature and add to our knowledge of the character of semi-authoritarian political systems. Some recent writings on the regime that was crafted by Vladimir Putin have begun to do that (</span><a class="workspace-trigger" data-dcnode-id="4781" href="#bib57" name="bbib57"><span data-dcnode-id="4782" instrument_node="">March, 2009</span></a><span data-dcnode-id="4780" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4778" href="#bib70" name="bbib70"><span data-dcnode-id="4779" instrument_node="">Robertson, 2009</span></a><span data-dcnode-id="4777" instrument_node="">). An approach to Russia that is informed by “historically grounded realism”(</span><a class="workspace-trigger" data-dcnode-id="4775" href="#bib69" name="bbib69"><span data-dcnode-id="4776" instrument_node="">Pop-Eleches, 2007</span></a><span data-dcnode-id="4774" instrument_node="">, 925) is likely to yield information that is more useful for scholars, the public, and political leaders.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="4766"><button class="button button-anchor" data-dcnode-id="4767" type="button"><span class="button-text" data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="4765"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="460" id="cebib0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="461" id="cebibsec0010"><dl class="references" data-dcnode-id="462" id="reference-links-cebibsec0010"><dt class="label" data-dcnode-id="4760"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="4761" href="#bbib1" id="ref-id-bib1"><span data-dcnode-id="4762" instrument_node="">Appel, 1997</span></a></dt><dd class="reference" data-dcnode-id="4710"><div class="contribution" data-dcnode-id="4751"><span data-dcnode-id="4759" instrument_node="">H.</span><span data-dcnode-id="4757" instrument_node=""> </span><span data-dcnode-id="4755" instrument_node="">Appel</span><div data-dcnode-id="4752"><strong class="title" data-dcnode-id="4753"><span data-dcnode-id="4754" instrument_node="">Voucher privatisation in Russia: structural consequences and mass response in the second period of reform</span></strong></div></div><div class="host" data-dcnode-id="4725"><span data-dcnode-id="4750" instrument_node="">Europe-Asia Studies</span><span data-dcnode-id="4748" instrument_node="">, </span><span data-dcnode-id="4746" instrument_node="">49</span><span data-dcnode-id="4744" instrument_node=""> (</span><span data-dcnode-id="4742" instrument_node="">8</span><span data-dcnode-id="4740" instrument_node="">)</span><span data-dcnode-id="4738" instrument_node=""> (</span><span data-dcnode-id="4736" instrument_node="">1997</span><span data-dcnode-id="4734" instrument_node="">)</span><span data-dcnode-id="4732" instr ode="">Model forests in Russia as landscape approach: Demonstration projects or initiatives for learning towards sustainable forest management?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">2019, Forest Policy and Economics</span></div></div><div class="buttons" data-dcnode-id="444"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="445" type="button"><span class="button-link-text" data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="446" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="447"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="439"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="440" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="441"><p data-dcnode-id="442" id="sp0025"><span data-dcnode-id="443" instrument_node="">Implementing sustainable forest management (SFM) policy on the ground is not straightforward, and depends on the social-ecological context. To meet the need for place-based stakeholder collaboration towards regionally adapted knowledge production and learning in support of SFM an integrated landscape approach can assist. Hosting most of the circumboreal forest Russia is a key global player. To transition boreal forestry in the Russian Federation from wood mining towards SFM after the collapse of USSR several initiatives were initiated. Our aim is to review the outcomes and consequences of the initiatives employing the international Model Forest concepts' six principles in Russia. To identify candidates for the study we identified 12 local initiatives using this term, all in Russia's boreal forest biome. However, while seven demonstration forests focused on improving wood production practices, five were long-term stakeholder-driven development processes aimed at SFM, and were approved members of the International Model Forest Network. The five latter were selected for a detailed study to understand their temporal dynamic in the circumboreal Model Forest context, and the extent to which they complied with the six principles of the Model Forest concept as an example of a landscape approach. The sources, amounts and durations of these initiatives' funding affected both outcomes and consequences on the ground. All five had developed a partnership that formally shared a commitment to SFM. However, not all areas were large enough to represent all dimensions of SFM. Not all Model Forests developed a representative, participative, transparent, and accountable governance structure, which affected the programs of their activities. Finally, knowledge-sharing, capacity-building and networking at multiple levels was variable. In spite of Russia hosting most of the circumboreal forest the Model Forest concept was not sustained in Russia due to ending of foreign project funding, to limited continuity of committed local capacity, and poor support from national-level decision makers. The exception is the Komi Model Forest's transition to a successful consulting company focusing on SFM. To develop regionally adapted approaches to implement SFM policy we stress the importance of sharing experiences from Model Forests as well as other landscape approach concepts among countries and regions with different landscape histories and governance arrangements. To enhance this, we propose a general analytic framework for learning through evaluation about place-based long-term initiatives that integrate evidence-based knowledge about states and trends of sustainability and cross-sector multi-level governance.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="427"><div class="sub-heading" data-dcnode-id="432"><a data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1017/slr.2018.292" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="436" id="citing-articles-article1-title"><span data-dcnode-id="437" instrument_node="">Pluralism without Democracy, Vertical without Power: From Gor'kii to Nizhnii Novgorod ⋯ and Back?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">2018, Slavic Review</span></div></div><div class="buttons" data-dcnode-id="431"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="428"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="429" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="430"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="416"><div class="sub-heading" data-dcnode-id="421"><a data-dcnode-id="424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/14705958211051551" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="425" id="citing-articles-article2-title"><span data-dcnode-id="426" instrument_node="">Perspectives on leadership development in post-Soviet Eurasia</span></h3></a><div class="article-source ellipsis" data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">2021, International Journal of Cross Cultural Management</span></div></div><div class="buttons" data-dcnode-id="420"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="417"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="418" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcn ode-id="370"><a data-dcnode-id="371" href="#bfn1"><span data-dcnode-id="372" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="366"><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">The author would like to thank Valerie Sperling and Andrei Tsygankov for their comments on an earlier version of this essay.</span></p></dd></dl><dl class="footnote" data-dcnode-id="357"><dt class="footnote-label" data-dcnode-id="361"><sup data-dcnode-id="362"><a data-dcnode-id="363" href="#bfn2"><span data-dcnode-id="364" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="358"><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">It is worth noting that the subtitle of that volume, the single most widely quoted book about democratization by “transitologists,” is “Tentative Conclusions About Uncertain Democracies.”</span></p></dd></dl><dl class="footnote" data-dcnode-id="349"><dt class="footnote-label" data-dcnode-id="353"><sup data-dcnode-id="354"><a data-dcnode-id="355" href="#bfn3"><span data-dcnode-id="356" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="350"><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">The interpretation that sees political change in Russia from the early 1990s to the present in terms of a failed transition to democracy is not the only possible framework for perceiving change in that country during that period, of course. The writings of many Russian scholars and the speeches of a number of Russian politicians would frame change in other perspectives. One interpretation that is popular in Russia depicts a breakdown of order in the late 1980s and early 1990s, leading to a “time of troubles” under Boris Yeltsin, followed by a restoration of order and the revival of national pride under Vladimir Putin after 2000.</span></p></dd></dl><dl class="footnote" data-dcnode-id="338"><dt class="footnote-label" data-dcnode-id="345"><sup data-dcnode-id="346"><a data-dcnode-id="347" href="#bfn4"><span data-dcnode-id="348" instrument_node="">4</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="339"><p data-dcnode-id="340"><span data-dcnode-id="344" instrument_node="">One question that this article will not address is that of the impact of the efforts of outside actors, such as foreign governments, international organizations, foundations, and transnational NGOs, on the results of attempted democratization in Russia. A good analysis of democracy promotion in Russia by the Clinton administration of the USA is that of </span><a class="workspace-trigger" data-dcnode-id="342" href="#bib56" name="bbib56"><span data-dcnode-id="343" instrument_node="">Marsden (2005)</span></a><span data-dcnode-id="341" instrument_node="">. This author is preparing an essay evaluating the United States government’s policies affecting democratization in Russia.</span></p></dd></dl><dl class="footnote" data-dcnode-id="330"><dt class="footnote-label" data-dcnode-id="334"><sup data-dcnode-id="335"><a data-dcnode-id="336" href="#bfn5"><span data-dcnode-id="337" instrument_node="">5</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="331"><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">It also is true that, in addition to public relations gimmicks and illegal actions, a genuinely high level of approval from the Russian public has been a very important asset for Putin and his associates.</span></p></dd></dl><dl class="footnote" data-dcnode-id="320"><dt class="footnote-label" data-dcnode-id="326"><sup data-dcnode-id="327"><a data-dcnode-id="328" href="#bfn6"><span data-dcnode-id="329" instrument_node="">6</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="321"><p data-dcnode-id="322"><a class="workspace-trigger" data-dcnode-id="324" href="#bib65" name="bbib65"><span data-dcnode-id="325" instrument_node="">O’Donnell and Schmitter (1986</span></a><span data-dcnode-id="323" instrument_node="">, 48, 54) did acknowledge that in some countries, once a movement toward democratization had become evident, there had been a surge of activism by social groups that had exerted “strong pressures to expand the limits of mere liberalization and partial democratization.” They did not see popular pressures as a major factor behind the initial decisions that had created an opening for democratization.</span></p></dd></dl><dl class="footnote" data-dcnode-id="309"><dt class="footnote-label" data-dcnode-id="316"><sup data-dcnode-id="317"><a data-dcnode-id="318" href="#bfn7"><span data-dcnode-id="319" instrument_node="">7</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="310"><p data-dcnode-id="311"><span data-dcnode-id="315" instrument_node="">Similarly, </span><a class="workspace-trigger" data-dcnode-id="313" href="#bib94" name="bbib94"><span data-dcnode-id="314" instrument_node="">Wood (2000</span></a><span data-dcnode-id="312" instrument_node="">, 17) says of democratization that “nearly all transitions combine elements ‘from above’ with elements ‘from below.’”</span></p></dd></dl><dl class="footnote" data-dcnode-id="299"><dt class="footnote-label" data-dcnode-id="305"><sup data-dcnode-id="306"><a data-dcnode-id="307" href="#bfn8"><span data-dcnode-id="308" instrument_node="">8</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="300"><p data-dcnode-id="301"><a class="workspace-trigger" data-dcnode-id="303" href="#bib14" name="bbib14"><span data-dcnode-id="304" instrument_node="">Valerie Bunce (2008</span></a><span data-dcnode-id="302" instrument_node="">, 30) also emphasizes the importance of a “robust and pluralist civil society” for a successful post-communist transition to democracy.</span></p></dd></dl><dl class="footnote" data-dcnode-id="285"><dt class="footnote-label" data-dcnode-id="295"><sup data-dcnode-id="296"><a data-dcnode-id="297" href="#bfn9"><span data-dcnode-id="298" instrument_node="">9</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="286"><p data-dcnode-id="287"><span data-dcnode-id="294" instrument_node="">In 2000, a survey by the Levada Center asked a representative sample of Russians, “Which historic road should Russia follow?” Only 15 percent of the respondents opted for the “European road,” and 18 percent favored a return to the Soviet model, while 60 percent said that Russia should follow “its own unique road” (</span><a class="workspace-trigger" data-dcnode-id="292" href="#bib55" name="bbib55"><span data-dcnode-id="293" instrument_node="">Lukin, 2009</span></a><span data-dcnode-id="291" instrument_node="">, 83). A survey that was taken in 2005 found that 31 percent of Russians thought that Russia’s future lies with the countries of Western Europe, while 69 percent said that their country’s future lies with “countries in the CIS,” meaning other states that formerly were part of the Soviet Union (</span><a class="workspace-trigger" data-dcnode-id="289" href="#bib72" name="bbib72"><span data-dcnode-id="290" instrument_node="">Rose and Munro, 2008</span></a><span data-dcnode-id="288" instrument_node="">, 53).</span></p></dd></dl><dl class="footnote" data-dcnode-id="262"><dt class="footnote-label" data-dcnode-id="281"><sup data-dcnode-id="282"><a data-dcnode-id="283" href="#bfn10"><span data-dcnode-id="284" instrument_node="">10</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="263"><p data-dcnode-id="264"><span data-dcnode-id="280" instrument_node="">In 1992, when major economic reform began under Yeltsin, 50 percent of Russians gave a positive evaluation of the political system that had existed “before the start of perestroika” (before the Gorbachev period), and 62 percent gave a positive assessment of the economic system that had been in place at the same time. In sharp contrast, only 14 percent approved the political system that was operating in 1992, and only 10 percent positively evaluated the “current economic system” of that year (</span><a class="workspace-trigger" data-dcnode-id="278" href="#bib71" name="bbib71"><span data-dcnode-id="279" instrument_node="">Rose and Munro, 2002</span></a><span data-dcnode-id="277" instrument_node="">, 63; </span><a class="workspace-trigger" data-dcnode-id="275" href="#bib74" name="bbib74"><span data-dcnode-id="276" instrument_node="">Rose et&nbsp;al., 2004</span></a><span data-dcnode-id="274" instrument_node="">, 203; </span><a class="workspace-trigger" data-dcnode-id="272" href="#bib73" name="bbib73"><span data-dcnode-id="273" instrument_node="">Rose, Mishler, and Munro, 2006</span></a><span data-dcnode-id="271" instrument_node="">, 154). The percentage of respondents giving a positive evaluation of the old (Soviet) political and economic system increased steadily during the 1990s, which says something about the population’s reaction to the changes that took place in that decade. In each year from 1992 on, “the percentage of Russians [who were] positive about the former communist regime has always been greater than that endorsing the current regime” (</span><a class="workspace-trigger" data-dcnode-id="269" href="#bib73" name="bbib73"><span data-dcnode-id="270" instrument_node="">Rose et&nbsp;al., 2006</span></a><span data-dcnode-id="268" instrument_node="">, 132). On public opinion in Russia about the communist regime and the new regime, as expressed when radical economic reform began under Yeltsin, see also (</span><a class="workspace-trigger" data-dcnode-id="266" href="#bib91" name="bbib91"><span data-dcnode-id="267" instrument_node="">White, Rose, and McAllister 1997</span></a><span data-dcnode-id="265" instrument_node="">, 181–182).</span></p></dd></dl><dl class="footnote" data-dcnode-id="251"><dt class="footnote-label" data-dcnode-id="258"><sup data-dcnode-id="259"><a data-dcnode-id="260" href="#bfn11"><span data-dcnode-id="261" instrument_node="">11</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="252"><p data-dcnode-id="253"><span data-dcnode-id="257" instrument_node="">Thomas Carothers had offered a similar warning earlier: “Recent events highlight the folly of ignoring the broad set of social, political, and economic factors bearing on democratization” (</span><a class="workspace-trigger" data-dcnode-id="255" href="#bib15" name="bbib15"><span data-dcnode-id="256" instrument_node="">Carothers, 1997</span></a><span data-dcnode-id="254" instrument_node="">, 93). A number of scholars continued to ignore his warning, however.</span></p></dd></dl><dl class="footnote" data-dcnode-id="240"><dt class="footnote-label" data-dcnode-id="247"><sup data-dcnode-id="248"><a data-dcnode-id="249" href="#bfn12"><span data-dcnode-id="250" instrument_node="">12</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="241"><p data-dcnode-id="242"><span data-dcnode-id="246" instrument_node="">President George W. Bush said in September 2003, “I respect President Putin’s vision for Russia: a country at peace with its neighbors and with the world, a country in which democracy and freedom and rule of law thrive” (</span><a class="workspace-trigger" data-dcnode-id="244" href="#bib61" name="bbib61"><span data-dcnode-id="245" instrument_node="">McFaul, 2005</span></a><span data-dcnode-id="243" instrument_node="">, 33).</span></p></dd></dl></div><div class="Copyright" data-dcnode-id="236"><span class="copyright-line" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Copyright © 2010 Production and hosting by Elsevier B.V.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="126"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="127"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="139"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="228" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up but
