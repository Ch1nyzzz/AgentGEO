</span><meta content="During the 1990s American leaders and many others in the West viewed Russia as the most important test case for a transition to democracy. Today the c…" data-dcnode-id="5983" property="og:description"><span data-dcnode-id="5982" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id2&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id3&quot;><p id=&quot;abspara0010&quot;>During the 1990s American leaders and many others in the West viewed Russia as the most important test case for a transition to democracy. Today the consensus of scholarly analyses in the West concludes that, if Russia did enter a transition to democracy, that transition was not successful. This article attempts to suggest some of the main lessons about democratization that may be derived from the study of the experience of post-communist Russia, seen in a comparative perspective.</p><p id=&quot;abspara0015&quot;>The thesis that the first competitive national election after the downfall of an authoritarian regime marks a decisive breakthrough for forces striving for democratization has not proved true for Russia. Yet the withering of democracy and the consolidation of a semi-authoritarian regime followed the period of competitive elections in Russia.</p><p id=&quot;abspara0020&quot;>In the early and mid-1990s scholars who had specialized in the study of communist regimes warned that the post-communist states would need to carry out radical economic and social changes as well as sweeping political transformation. In Russia, however, the consequences of a corrupted process of privatization of state assets were enormously damaging for the institutionalization of democracy.</p><p id=&quot;abspara0025&quot;>As was shown in a number of countries in the 1970s and 1980s, a strong civil society can play an important role in a nation&amp;#x27;s transition to democracy. The barriers to the development of civil society within the Soviet system and the conditions causing weakness in social organizations in post-communist Russia made it easier for members of the elite to subvert reform and guaranteed that there would be fewer restraints on the tendency toward more authoritarian control after 2000.</p><p id=&quot;abspara0030&quot;>Among post-communist nations, those in which a consensus of most segments of the elite and the public was committed to a radical break with the old system have been much more successful in carrying out marketization and democratization. The combination of historical conditions that had created a strong anti-communist consensus in most of Eastern Europe had not taken shape in Russia. The absence of a fusion of democratization and national liberation in Russia explained the lack of a clear national consensus in favor of political and economic transformation.</p><p id=&quot;abspara0035&quot;>One of the main lessons from the course of events in Russia from the early 1990s to the present is that change away from one form of authoritarian rule, which usually has been labeled as a transition to democracy, is not irreversible. Some democratic transitions may prove to be shallow, and the changes in post-communist Russia have provided a good example of a shallow transition. The scholarly literature on transitions to democracy that appeared after the early 1980s departed from earlier writings&amp;#x27; emphasis on the growth of social, economic, and cultural conditions for the institutionalization of democracy in the political system. The experience of Russia may encourage us to return to the study of the long-term trends facilitating or inhibiting the growth of democratic institutions.</p></div></div></div>" data-dcnode-id="5981" lang="en" name="citation_abstract"><span data-dcnode-id="5980" instrument_node="">

l28.42-15.28c4.04 4.58 9.92 7.48 16.48 7.48 12.14 0 22-9.86 22-22s-9.86-22-22-22-22 9.86-22 22c0 1.98 0.28 3.9 0.78 5.72l-28.64 15.38c-4.02-4.34-9.76-7.1-16.14-7.1-12.14 0-22 9.86-22 22s9.86 22 22 22c6.38 0 12.12-2.76 16.14-7.12l28.64 15.38c-0.5 1.84-0.78 3.76-0.78 5.74 0 12.14 9.86 22 22 22s22-9.86 22-22-9.86-22-22-22z" data-dcnode-id="5514"></path></svg><span class="button-text" data-dcnode-id="5511"><span data-dcnode-id="5512" instrument_node="">Share</span></span></button></div></div></div><div class="ExportCitation u-display-inline-block" data-dcnode-id="5499" id="export-citation"><div class="popover export-citation-popover" data-dcnode-id="5500" id="export-citation-popover"><div data-dcnode-id="5501" id="popover-trigger-export-citation-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="5502" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="5505" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="5506" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="5503"><span data-dcnode-id="5504" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="5492" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="5495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.euras.2010.10.001" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="5496" instrument_node="">https://doi.org/10.1016/j.euras.2010.10.001</span></a><a class="rights-and-content" data-dcnode-id="5493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS1879366510000345%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5494" instrument_node="">Get rights and content</span></a></div><div class="LicenseInfo" data-dcnode-id="5483"><div class="License" data-dcnode-id="5487"><span data-dcnode-id="5490"><span data-dcnode-id="5491" instrument_node="">Under a Creative Commons </span></span><a data-dcnode-id="5488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc-nd/3.0/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5489" instrument_node="">license</span></a></div><div class="OpenAccessLabel" data-dcnode-id="5484"><span class="access-indicator" data-dcnode-id="5486"></span><span data-dcnode-id="5485" instrument_node="">Open access</span></div></div><section class="ReferencedArticles" data-dcnode-id="5482"></section><section class="ReferencedArticles" data-dcnode-id="5481"></section><div class="PageDivider" data-dcnode-id="5480"></div><div class="Abstracts u-font-serif" data-dcnode-id="5457" id="abstracts"><div class="abstract author" data-dcnode-id="5458" id="aep-abstract-id2" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5478"><span data-dcnode-id="5479" instrument_node="">Abstract</span></h2><div data-dcnode-id="5459" id="aep-abstract-sec-id3"><p data-dcnode-id="5473" id="abspara0010"><span data-dcnode-id="5477" instrument_node="">During the 1990s American leaders and many others in the West viewed Russia as the most important test case for a transition to democracy. Today the consensus of scholarly analyses in the West concludes that, if Russia did enter a transition to democracy, that transition was not successful. This article attempts to suggest some of the main lessons about </span><a class="topic-link" data-dcnode-id="5475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/democratization" title="Learn more about democratization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5476" instrument_node="">democratization</span></a><span data-dcnode-id="5474" instrument_node=""> that may be derived from the study of the experience of post-communist Russia, seen in a comparative perspective.</span></p><p data-dcnode-id="5471" id="abspara0015"><span data-dcnode-id="5472" instrument_node="">The thesis that the first competitive national election after the downfall of an authoritarian regime marks a decisive breakthrough for forces striving for democratization has not proved true for Russia. Yet the withering of democracy and the consolidation of a semi-authoritarian regime followed the period of competitive elections in Russia.</span></p><p data-dcnode-id="5466" id="abspara0020"><span data-dcnode-id="5470" instrument_node="">In the early and mid-1990s scholars who had specialized in the study of communist regimes warned that the post-communist states would need to carry out radical economic and social changes as well as sweeping political transformation. In Russia, however, the consequences of a corrupted process of </span><a class="topic-link" data-dcnode-id="5468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/privatization" title="Learn more about privatization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5469" instrument_node="">privatization</span></a><span data-dcnode-id="5467" instrument_node=""> of state assets were enormously damaging for the institutionalization of democracy.</span></p><p data-dcnode-id="5464" id="abspara0025"><span data-dcnode-id="5465" instrument_node="">As was shown in a number of countries in the 1970s and 1980s, a strong civil society can play an important role in a nation's transition to democracy. The barriers to the development of civil society within the Soviet system and the conditions causing weakness in social organizations in post-communist Russia made it easier for members of the elite to subvert reform and guaranteed that there would be fewer restraints on the tendency toward more authoritarian control after 2000.</span></p><p data-dcnode-id="5462" id="abspara0030"><span data-dcnode-id="5463" instrument_node="">Among post-communist nations, those in which a consensus of most segments of the elite and the public was committed to a radical break with the old system have been much more successful in carrying out marketization and democratization. The combination of historical conditions that had created a strong anti-communist consensus in most of Eastern Europe had not taken shape in Russia. The absence of a fusion of democratization and national liberation in Russia explained the lack of a clear national consensus in favor of political and economic transformation.</span></p><p data-dcnode-id="5460" id="abspara0035"><span data-dcnode-id="5461" instrument_node="">One of the main lessons from the course of events in Russia from the early 1990s to the present is that change away from one form of authoritarian rule, which usually has been labeled as a transition to democracy, is not irreversible. Some democratic transitions may prove to be shallow, and the changes in post-communist Russia have provided a good example of a shallow transition. The scholarly literature on transitions to democracy that appeared after the early 1980s departed from earlier writings' emphasis on the growth of social, economic, and cultural conditions for the institutionalization of democracy in the political system. The experience of Russia may encourage us to return to the study of the long-term trends facilitating or inhibiting the growth of democratic institutions.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="5434" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="5446"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1879366510000357"><svg class="icon icon-navigate-left" data-dcnode-id="5455" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="5456"></path></svg><span class="button-alternative-text" data-dcnode-id="5448"><strong data-dcnode-id="5453"><span data-dcnode-id="5454" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="5451"><span data-dcnode-id="5452" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5449"><span data-dcnode-id="5450" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="5435"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1879366510000412"><span class="button-alternative-text" data-dcnode-id="5439"><strong data-dcnode-id="5444"><span data-dcnode-id="5445" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="5442"><span data-dcnode-id="5443" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5440"><span data-dcnode-id="5441" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="5437" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="5438"></path></svg></a></li></ul><span data-dcnode-id="5433" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="4770" id="body"><div data-dcnode-id="4771"><section data-dcnode-id="5323" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5426"><span data-dcnode-id="5432" instrument_node="">1</span><span data-dcnode-id="5431" instrument_node="">. </span><span data-dcnode-id="5430" instrument_node="">Introduction</span><a class="workspace-trigger" data-dcnode-id="5427" href="#fn1" name="bfn1"><sup data-dcnode-id="5428"><span data-dcnode-id="5429" instrument_node="">1</span></sup></a></h2><p data-dcnode-id="5405" id="p0010"><span data-dcnode-id="5425" instrument_node="">After the middle of the 1970s authoritarian regimes were replaced in many countries, and the political systems in a number of those countries showed signs of becoming more democratic, in some cases experiencing changes of apparently fundamental importance. Most of the nations that experienced the dramatic growth of democratic features in their governmental institutions and political processes in the 1970s and 1980s were in Southern Europe (Spain, Portugal, and Greece) and South America (Brazil, Chile, and others). A large number of scholarly writings attempted to develop comparative generalizations about transitions to democracy based on the evidence gleaned from the transformations that had taken place in those countries. Then in the late 1980s startling changes began in&nbsp;the Soviet Union and Eastern Europe. In the 1990s, after the Soviet bloc disappeared and the Soviet Union itself fragmented, the leaders of many states that had been under&nbsp;communist rule announced that they were determined to institutionalize the principles of democracy. As a result there was a burst of unbounded optimism concerning the prospects for the triumph of democracy in most&nbsp;of the nations of the world. As Martin Dimitrov has reported, “When the Berlin Wall fell, political scientists were wildly optimistic about the global spread of democracy” (</span><a class="workspace-trigger" data-dcnode-id="5423" href="#bib27" name="bbib27"><span data-dcnode-id="5424" instrument_node="">Dimitrov, 2008</span></a><span data-dcnode-id="5418"><span data-dcnode-id="5422" instrument_node="">, 24). Samuel Huntington believed that scores of countries in different regions of the world had&nbsp;been swept up in a “third wave” of </span><a class="topic-link" data-dcnode-id="5420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/democratization" title="Learn more about democratization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5421" instrument_node="">democratization</span></a><span data-dcnode-id="5419" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="5416" href="#bib48" name="bbib48"><span data-dcnode-id="5417" instrument_node="">Huntington, 1991</span></a><span data-dcnode-id="5415" instrument_node="">). Francis Fukuyama argued that there was no longer any viable alternative to the liberal democratic model for political and economic institutions (</span><a class="workspace-trigger" data-dcnode-id="5413" href="#bib40" name="bbib40"><span data-dcnode-id="5414" instrument_node="">Fukuyama, 1992</span></a><span data-dcnode-id="5412" instrument_node="">). Larry Diamond published an article titled, </span><a class="workspace-trigger" data-dcnode-id="5410" href="#bib24" name="bbib24"><span data-dcnode-id="5411" instrument_node="">“The Global Imperative: Building a Democratic World Order” (1994)</span></a><span data-dcnode-id="5409" instrument_node="">, and some scholars envisioned a world in which all major states would be liberal democracies (</span><a class="workspace-trigger" data-dcnode-id="5407" href="#bib85" name="bbib85"><span data-dcnode-id="5408" instrument_node="">Smith, 2007</span></a><span data-dcnode-id="5406" instrument_node="">, 116).</span></p><p data-dcnode-id="5387" id="p0015"><span data-dcnode-id="5404" instrument_node="">Such optimism proved infectious, and political leaders in the USA were receptive to the influence of superficial interpretations of the writings of academic specialists. It should be noted that the scholars in the field of political science who produced the most influential writings on transitions to democracy (the so-called “transitologists”) hedged their generalizations with qualifications that often were disregarded by journalists and politicians. For example, Guillermo O’Donnell and Philippe Schmitter said that a volume they authored dealt with “transitions from certain authoritarian regimes toward an uncertain ‘something else,’” which could consist of democracy or “a new, and possibly more severe, form of authoritarian rule” (</span><a class="workspace-trigger" data-dcnode-id="5402" href="#bib65" name="bbib65"><span data-dcnode-id="5403" instrument_node="">O’Donnell and Schmitter, 1986</span></a><span data-dcnode-id="5401" instrument_node="">, 3).</span><a class="workspace-trigger" data-dcnode-id="5398" href="#fn2" name="bfn2"><sup data-dcnode-id="5399"><span data-dcnode-id="5400" instrument_node="">2</span></sup></a><span data-dcnode-id="5397" instrument_node=""> Perhaps those scholars should not be held responsible for the policy decisions of the political leaders who chose to interpret the nuanced findings of academic research in an oversimplified manner. Nevertheless, as Thomas Carothers attests, at the height of&nbsp;enthusiasm for democratization in the 1980s and 1990s, Western advocates of democracy promotion “embraced the&nbsp;view that democracy could succeed anywhere, and could do so quickly” (</span><a class="workspace-trigger" data-dcnode-id="5395" href="#bib19" name="bbib19"><span data-dcnode-id="5396" instrument_node="">Carothers, 2007</span></a><span data-dcnode-id="5394" instrument_node="">, 24), and were willing to believe that any country whose leaders offered any political opening was in a “transition to democracy” (</span><a class="workspace-trigger" data-dcnode-id="5392" href="#bib15" name="bbib15"><span data-dcnode-id="5393" instrument_node="">Carothers, 1997</span></a><span data-dcnode-id="5391" instrument_node="">, 92). We should recognize that optimism about the potential (if not the inevitability) of imitation of&nbsp;the values of American democracy by other nations had been a traditional theme in the political culture of the United States (</span><a class="workspace-trigger" data-dcnode-id="5389" href="#bib49" name="bbib49"><span data-dcnode-id="5390" instrument_node="">Kagan, 2008</span></a><span data-dcnode-id="5388" instrument_node="">) since the late eighteenth century. It is obvious that the discussion of transitions to democracy by political scientists had not created such hopes, but it did help to heighten expectations among politicians and the public for the rapid spread of democracy&nbsp;until it would be overwhelmingly dominant in the world.</span></p><p data-dcnode-id="5368" id="p0020"><span data-dcnode-id="5378"><span data-dcnode-id="5382"><span data-dcnode-id="5386" instrument_node="">During the 1990s the country that was viewed by American leaders and many others in the West as the most important test case for a transition to democracy was Russia. The Clinton administration emphasized that one of&nbsp;its highest priorities in </span><a class="topic-link" data-dcnode-id="5384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/foreign-policy" title="Learn more about foreign policy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5385" instrument_node="">foreign policy</span></a><span data-dcnode-id="5383" instrument_node=""> was the success of the movement to democracy and a </span></span><a class="topic-link" data-dcnode-id="5380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/market-economy" title="Learn more about market economy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5381" instrument_node="">market economy</span></a><span data-dcnode-id="5379" instrument_node=""> in the&nbsp;states of the former Soviet Union (</span></span><a class="workspace-trigger" data-dcnode-id="5376" href="#bib20" name="bbib20"><span data-dcnode-id="5377" instrument_node="">Christopher, 1993</span></a><span data-dcnode-id="5375" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5373" href="#bib88" name="bbib88"><span data-dcnode-id="5374" instrument_node="">Talbott, 1993a</span></a><span data-dcnode-id="5372" instrument_node="">). US Secretary of State Warren Christopher asserted that “helping the Russian people to build a free society and market economy is the greatest strategic challenge of our time,” and that “Russia was the single most important foreign policy priority” of the Clinton administration (</span><a class="workspace-trigger" data-dcnode-id="5370" href="#bib56" name="bbib56"><span data-dcnode-id="5371" instrument_node="">Marsden, 2005</span></a><span data-dcnode-id="5369" instrument_node="">, 47). Russia is by far the largest of the former republics of the USSR in both population and land area; indeed, it is the largest country in the world in terms of territory. In addition, its geographical location gives it influence on issues in several regions in which the USA is interested, and it has greater strategic military capability than any other country except the United States. On a deeper level, psychologically, as the main successor of&nbsp;Soviet Union, Russia represents the core of the former superpower that had been the main geopolitical and ideological rival of the USA from the late 1940s until the early 1990s. If the state that had been the core of the superpower that was the main adversary of democracy could, within a relatively short time, be changed into an ideological soul mate of our country, the symbolic implications would be profound.</span></p><p data-dcnode-id="5347" id="p0025"><span data-dcnode-id="5367" instrument_node="">And yet, as the current decade nears its end, the consensus of scholarly analyses and popular perceptions in the West indicates that, if Russia did enter a transition to democracy, that transition was not successful. From the point of view of those in the United States and Western Europe who had high hopes for the spread of democracy, the most important test case for democratization was largely a disappointment.</span><a class="workspace-trigger" data-dcnode-id="5364" href="#fn3" name="bfn3"><sup data-dcnode-id="5365"><span data-dcnode-id="5366" instrument_node="">3</span></sup></a><span data-dcnode-id="5363" instrument_node=""> During the 1990s, while Boris Yeltsin was the president of Russia, most Western academic specialists regarded that country as a democracy that was in an early stage of transition, with some imperfections that&nbsp;did not negate the fundamentally democratic character of the political regime. Within a few years after Vladimir Putin became the president of that country, however, the assessment of that regime by most political scientists specializing in the study Russia changed. Between 2000 and 2005 the outlook of Russia watchers in the West shifted, so that many began to refer to the political system of that country as authoritarian (</span><a class="workspace-trigger" data-dcnode-id="5361" href="#bib45" name="bbib45"><span data-dcnode-id="5362" instrument_node="">Hahn, 2004</span></a><span data-dcnode-id="5360" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5358" href="#bib60" name="bbib60"><span data-dcnode-id="5359" instrument_node="">McFaul, 2004</span></a><span data-dcnode-id="5357" instrument_node="">). Stephen Whitefield has noted that during Putin’s time as president of Russia, there was an “increasing consensus among scholars, journalists, and policy-makers in the West” that Russian politics had moved “significantly off a democratic pathway” (</span><a class="workspace-trigger" data-dcnode-id="5355" href="#bib92" name="bbib92"><span data-dcnode-id="5356" instrument_node="">Whitefield, 2009</span></a><span data-dcnode-id="5354" instrument_node="">, 93). Considering both the undemocratic features and the elements of pluralism remaining in Russian politics, however, it would seem justifiable to apply Marina Ottaway’s category of “semi-authoritarian” (</span><a class="workspace-trigger" data-dcnode-id="5352" href="#bib67" name="bbib67"><span data-dcnode-id="5353" instrument_node="">Ottaway, 2003</span></a><span data-dcnode-id="5351" instrument_node="">) to the Russian political system. Most Western scholars who focus on that country would seem to agree with Steven Fish’s assertion that “democratization has failed in Russia” (</span><a class="workspace-trigger" data-dcnode-id="5349" href="#bib39" name="bbib39"><span data-dcnode-id="5350" instrument_node="">Fish, 2005</span></a><span data-dcnode-id="5348" instrument_node="">, 81).</span></p><p data-dcnode-id="5324" id="p0030"><span data-dcnode-id="5346" instrument_node="">What lessons about the conditions affecting transitions to democracy can be learned from the study of Russia’s experience of apparently unsuccessful democratization in the post-Soviet period? We may ask how much the model for a successful transition to democracy that was created by some scholars in the 1980s has proved applicable to Russia. That model was developed in response to dramatic changes in the political systems of countries in Southern Europe and South America. By the middle of the 1990s there was a debate in scholarly circles about the degree to which generalizations derived from the study of political transformation in those countries might be proved valid with respect to nations that formerly were under communist rule (</span><a class="workspace-trigger" data-dcnode-id="5344" href="#bib7" name="bbib7"><span data-dcnode-id="5345" instrument_node="">Bunce, 1995</span></a><span data-dcnode-id="5343" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5341" href="#bib81" name="bbib81"><span data-dcnode-id="5342" instrument_node="">Schmitter and Karl, 1994</span></a><span data-dcnode-id="5340" instrument_node="">). Perhaps enough time has passed to make it possible to shed more light on that question. Also, there is now a substantial scholarly literature on post-communist political trends, which permits us to compare Russia’s experience after the&nbsp;disintegration of the Soviet system with that of other nations that formerly were under communist rule. A number of scholars have remarked on the high degree of diversity in the trajectories of change among the post-communist countries, which in the political sphere have produced results ranging from thoroughly authoritarian states to democracies that function much like those of Western Europe (</span><a class="workspace-trigger" data-dcnode-id="5338" href="#bib32" name="bbib32"><span data-dcnode-id="5339" instrument_node="">Ekiert and Hanson, 2003</span></a><span data-dcnode-id="5337" instrument_node="">, 29, 31; </span><a class="workspace-trigger" data-dcnode-id="5335" href="#bib31" name="bbib31"><span data-dcnode-id="5336" instrument_node="">Ekiert, 2003</span></a><span data-dcnode-id="5334" instrument_node="">, 91, 94; </span><a class="workspace-trigger" data-dcnode-id="5332" href="#bib68" name="bbib68"><span data-dcnode-id="5333" instrument_node="">Pop-Eleches, 2005</span></a><span data-dcnode-id="5331" instrument_node="">, 2). In fact, Herbert Kitschelt has concluded that “there is no region or set of countries on earth with a currently larger diversity of political regimes” than is found in the post-communist segment of the world (</span><a class="workspace-trigger" data-dcnode-id="5329" href="#bib51" name="bbib51"><span data-dcnode-id="5330" instrument_node="">Kitschelt, 2003</span></a><span data-dcnode-id="5328" instrument_node="">, 49). We may expect that revealing insights will emerge from the contrast between political change in Russia and that in other post-communist nations. We should admit, however, that in this article, space does not permit us to attempt an exhaustive discussion of the factors conditioning the results of democratization in Russia in comparative perspective. This&nbsp;article will attempt to contribute to an ongoing discussion by suggesting some of the main lessons about democratization that may be derived from the study of the experience of post-communist Russia, seen in a comparative perspective.</span><a class="workspace-trigger" data-dcnode-id="5325" href="#fn4" name="bfn4"><sup data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">4</span></sup></a></p></section><section data-dcnode-id="5267" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5319"><span data-dcnode-id="5322" instrument_node="">2</span><span data-dcnode-id="5321" instrument_node="">. </span><span data-dcnode-id="5320" instrument_node="">The electoral fallacy</span></h2><p data-dcnode-id="5295" id="p0035"><span data-dcnode-id="5318" instrument_node="">By the early 1990s those in the West who enthusiastically supported the promotion of democracy attached great importance to the “founding election” in a new democracy. They assumed that in a country that had been under an authoritarian regime, the first election in which different parties competed would be a breakthrough of change, an important starting point in the transition to democracy (</span><a class="workspace-trigger" data-dcnode-id="5316" href="#bib82" name="bbib82"><span data-dcnode-id="5317" instrument_node="">Schraeder, 2002</span></a><span data-dcnode-id="5315" instrument_node="">, 229), and “the primary indicator of democratic progress” (</span><a class="workspace-trigger" data-dcnode-id="5313" href="#bib56" name="bbib56"><span data-dcnode-id="5314" instrument_node="">Marsden, 2005</span></a><span data-dcnode-id="5312" instrument_node="">, 135). The institutionalization of electoral competition in a series of elections was thought to&nbsp;be “sufficient to consolidate democracy” (</span><a class="workspace-trigger" data-dcnode-id="5310" href="#bib75" name="bbib75"><span data-dcnode-id="5311" instrument_node="">Rose and Shin, 2001</span></a><span data-dcnode-id="5309" instrument_node="">, 332). Thomas Carothers has observed that democracy promoters tended “to overestimate the power of elections to&nbsp;produce fundamental political change” (</span><a class="workspace-trigger" data-dcnode-id="5307" href="#bib19" name="bbib19"><span data-dcnode-id="5308" instrument_node="">Carothers, 2007</span></a><span data-dcnode-id="5302"><span data-dcnode-id="5306" instrument_node="">, 24). The dominant school of thought in the USA during the&nbsp;1990s (and to a lesser extent in Western Europe) believed that Russia had gone through a breakthrough toward </span><a class="topic-link" data-dcnode-id="5304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/democratization" title="Learn more about democratization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5305" instrument_node="">democratization</span></a><span data-dcnode-id="5303" instrument_node=""> during the early 1990s, and that Russia subsequently faced the task of consolidating the features of its&nbsp;infant democracy (</span></span><a class="workspace-trigger" data-dcnode-id="5300" href="#bib58" name="bbib58"><span data-dcnode-id="5301" instrument_node="">McFaul, 1999</span></a><span data-dcnode-id="5299" instrument_node="">, 117). Michael McFaul and Sarah Mendelson took comfort in the fact that elections had become “the only legitimate means to power in post-Soviet Russia,” and added, “the emergence of electoral democracy, however fragile and flawed, must be recognized as a revolutionary achievement” (</span><a class="workspace-trigger" data-dcnode-id="5297" href="#bib62" name="bbib62"><span data-dcnode-id="5298" instrument_node="">McFaul and Mendelson, 2000</span></a><span data-dcnode-id="5296" instrument_node="">, 332). After all, post-Soviet Russia had held its first competitive election for its national parliament in December 1993, in which a large number of parties supported candidates.</span></p><p data-dcnode-id="5290" id="p0040"><span data-dcnode-id="5294" instrument_node="">If one competitive national election is a sign of a breakthrough to democracy, then Russia should have made a good start on the road to democracy by the time the votes from its&nbsp;first multiparty election were counted. And yet, even though various parties competed in </span><a class="topic-link" data-dcnode-id="5292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/parliamentary-election" title="Learn more about parliamentary elections from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5293" instrument_node="">parliamentary elections</span></a><span data-dcnode-id="5291" instrument_node=""> in Russia in 1993, 1995, 1999, 2003, and 2007, and&nbsp;elections for the presidency took place in the post-communist period in 1996, 2000, 2004, and 2008 (with real competition in 1996 and some competition in 2000), Russia has moved toward greater authoritarianism during the last several years. The decline in political pluralism is reflected in the fact that in election results the ruling United Russia Party has steadily increased its dominance, as it won more than 64 percent of the vote for the lower house of the national parliament (the Duma) in December 2007, and has received over 70 percent of the vote in each of the last two presidential elections. The transfer of presidential power from Vladimir Putin to Dmitrii Medvedev during 2007–2008 was managed smoothly within the highest level of&nbsp;the political elite, so that the results of the presidential election in 2008 were carefully predetermined. The stage of&nbsp;the first competitive elections was followed by the withering of democracy and the consolidation of a semi-authoritarian regime.</span></p><p data-dcnode-id="5268" id="p0045"><span data-dcnode-id="5285"><span data-dcnode-id="5289" instrument_node="">Earlier writings about transitions to democracy assumed that during the period of a breakthrough, the main threat to&nbsp;greater pluralism would be the potential of&nbsp;a coup by forces seeking to restore the old </span><a class="topic-link" data-dcnode-id="5287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/authoritarian-system" title="Learn more about authoritarian system from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5288" instrument_node="">authoritarian system</span></a><span data-dcnode-id="5286" instrument_node=""> who&nbsp;would eliminate competitive elections if they were successful in seizing power. The assumption that the&nbsp;danger of such a coup “hangs like a sword of Damocles over&nbsp;the possible outcome” of a transition to democracy (</span></span><a class="workspace-trigger" data-dcnode-id="5283" href="#bib65" name="bbib65"><span data-dcnode-id="5284" instrument_node="">O’Donnell and Schmitter, 1986</span></a><span data-dcnode-id="5282" instrument_node="">, 23) reflected the fact that in&nbsp;Southern Europe and South America the prevalent form of an authoritarian regime had been one in which the military held power. In sharp contrast, in post-communist Russia a group from the ruling circles, consisting of Vladimir Putin and his closest supporters, has concentrated almost unchecked power in its hands, and has continued parliamentary and presidential elections, but has mastered techniques that make it possible for the ruling faction to manipulate the mass media, political parties, and public opinion so thoroughly that the outcome of a national election is always a foregone conclusion. Andrew Wilson’s highly insightful work, </span><em data-dcnode-id="5280"><span data-dcnode-id="5281" instrument_node="">Virtual Politics</span></em><span data-dcnode-id="5279" instrument_node="">, describes those techniques in vivid detail (</span><a class="workspace-trigger" data-dcnode-id="5277" href="#bib93" name="bbib93"><span data-dcnode-id="5278" instrument_node="">Wilson, 2005</span></a><span data-dcnode-id="5276" instrument_node="">), and that book has&nbsp;enriched our knowledge of the means that are used to&nbsp;substitute the appearance of competition for real pluralism in Russian politics. Wilson shows that Putin did not invent the techniques of manipulating the voters to predetermine the results of elections; Boris Yeltsin and others, including regional chief executives and the leaders of some other post-Soviet states, began to develop those techniques in the&nbsp;1990s. As Wilson puts it, “the Putin era has only perfected techniques that were already common under Yeltsin, and already common elsewhere in the former USSR” (2005, 39), and “the Yeltsin and Putin eras can be plotted at different points on the same learning curve” (266). Wilson adds that under Putin, “the Kremlin has simply got better at fixing elections” (ibid.). Alexander Lukin agrees that during the post-Soviet years, “elections became more and more fraudulent and subject to manipulation” (</span><a class="workspace-trigger" data-dcnode-id="5274" href="#bib55" name="bbib55"><span data-dcnode-id="5275" instrument_node="">Lukin, 2009</span></a><span data-dcnode-id="5273" instrument_node="">, 87).</span><a class="workspace-trigger" data-dcnode-id="5270" href="#fn5" name="bfn5"><sup data-dcnode-id="5271"><span data-dcnode-id="5272" instrument_node="">5</span></sup></a><span data-dcnode-id="5269" instrument_node=""> In summary, the idea that the first competitive national election after the downfall of an authoritarian regime marks a decisive breakthrough for forces striving for democratization (a notion that undoubtedly was valid in some earlier cases) has not proved true of Russia at all.</span></p></section><section data-dcnode-id="5105" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5263"><span data-dcnode-id="5266" instrument_node="">3</span><span data-dcnode-id="5265" instrument_node="">. </span><span data-dcnode-id="5264" instrument_node="">The legacy of economic reform under Yeltsin</span></h2><p data-dcnode-id="5239" id="p0050"><span data-dcnode-id="5262" instrument_node="">The model of change offered by those who had examined the experience of countries that had carried out transitions to democracy in the 1970s and 1980s in Southern Europe and South America focused primarily on the goals and actions of groups in each nation’s political elite (</span><a class="workspace-trigger" data-dcnode-id="5260" href="#bib85" name="bbib85"><span data-dcnode-id="5261" instrument_node="">Smith, 2007</span></a><span data-dcnode-id="5259" instrument_node="">, 130; </span><a class="workspace-trigger" data-dcnode-id="5257" href="#bib96" name="bbib96"><span data-dcnode-id="5258" instrument_node="">Schmitz, 2004</span></a><span data-dcnode-id="5256" instrument_node="">, 406). That approach contrasted sharply with decades of previous research that&nbsp;had emphasized the importance of building up the economic and social prerequisites for democracy (</span><a class="workspace-trigger" data-dcnode-id="5254" href="#bib15" name="bbib15"><span data-dcnode-id="5255" instrument_node="">Carothers, 1997</span></a><span data-dcnode-id="5253" instrument_node="">, 92; </span><a class="workspace-trigger" data-dcnode-id="5251" href="#bib85" name="bbib85"><span data-dcnode-id="5252" instrument_node="">Smith, 2007</span></a><span data-dcnode-id="5250" instrument_node="">, 126–127). Thomas Carothers summarizes the outlook embodied in the new model: “So long as the elites in a country embraced the democratic ideal—something elites everywhere seemed to be doing—democracy would spring into being” (</span><a class="workspace-trigger" data-dcnode-id="5248" href="#bib15" name="bbib15"><span data-dcnode-id="5249" instrument_node="">Carothers, 1997</span></a><span data-dcnode-id="5247" instrument_node="">, 92). Political leaders in the USA focused intently on interactions within the national political elite when they looked at political events in post-Soviet Russia. The pronouncements of high-ranking officials in the Clinton administration who played the principal role in shaping policy toward Russia revealed a strong tendency to dichotomize factions in the political elite of that country between those who were seen as favoring democracy and those who were on the side opposed to democracy. President Clinton and others typically depicted the struggle going on in Russia as if it were a confrontation between the forces of light and the forces of darkness. Strobe Talbott, the main official in the administration specializing on policy toward Russia, spoke of a Manichean struggle between supporters and opponents of democracy in that country: “On the one side … were the forces of the past, of the old Soviet Union and the old Soviet system … On&nbsp;the other side were the forces of the new Russia, personified by President Yeltsin, committed to democracy, reform, respect for human life, and civic pride” (</span><a class="workspace-trigger" data-dcnode-id="5245" href="#bib89" name="bbib89"><span data-dcnode-id="5246" instrument_node="">Talbott, 1993b</span></a><span data-dcnode-id="5240"><span data-dcnode-id="5244" instrument_node="">). A similar perspective was found in the writings of some scholars, although in a bit more sophisticated and complex form. The Clinton administration asserted repeatedly that Boris Yeltsin was committed to democracy and a </span><a class="topic-link" data-dcnode-id="5242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/market-economy" title="Learn more about market economy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5243" instrument_node="">market economy</span></a><span data-dcnode-id="5241" instrument_node=""> and placed its bet on him as the person who would lead Russia into the community of democratic nations. That administration saw the Communist Party of the Russian Federation and extreme nationalists like Vladimir Zhirinovsky as posing the main potential threat to reverse the changes introduced by Yeltsin.</span></span></p><p data-dcnode-id="5237" id="p0055"><span data-dcnode-id="5238" instrument_node="">With the wisdom of hindsight we can realize that the actual character of the changes that were generated by the&nbsp;Yeltsin leadership was highly mixed. On the one hand,&nbsp;Yeltsin was determined to prevent the Communists from&nbsp;returning to power; he did allow greater freedom of expression than Russia had known before (though in that area he continued changes that Mikhail Gorbachev had initiated in the Soviet Union); he did permit rapid growth in the number of political parties legally operating in Russia; and he did make a commitment to abandoning major parts of the Soviet economic model. In their totality, though, the changes that occurred under the Yeltsin administration presented a very mixed picture. In many areas there was a wide gap between Yeltsin’s statements on&nbsp;fundamental principles and the changes that took place in practice while he was president of Russia. To borrow from the language of the Soviet Marxists, in Yeltsin's legacy there was a lack of unity of theory and practice. We have already mentioned the beginning of techniques of manipulation of voters and elections under Yeltsin’s leadership in the 1990s.</span></p><p data-dcnode-id="5225" id="p0060"><span data-dcnode-id="5236" instrument_node="">This section of the article will concentrate on the character of the transformation of Russia’s economy that was guided by Yeltsin’s policies. In the early and mid-1990s, when some scholars were debating the possible differences between earlier transitions to democracy and the path that&nbsp;lay ahead for the post-communist states of Eastern Europe and the former Soviet Union, those who had specialized in the study of communist regimes warned that the post-communist states would need to carry out radical economic and social changes as well as sweeping political transformation (</span><a class="workspace-trigger" data-dcnode-id="5234" href="#bib7" name="bbib7"><span data-dcnode-id="5235" instrument_node="">Bunce, 1995</span></a><span data-dcnode-id="5233" instrument_node="">, 121). In the countries that had&nbsp;embarked on transitions to democracy in the 1970s and 1980s, the institutions of capitalist market economies had already been in place before dramatic political change had begun, but the post-communist states that wanted democracy and a market economy would attempt to move toward both at the same time. That observation has proved to be particularly pertinent. The central thesis of the literature of the 1980s on transitions to democracy was that pacts between factions in the elite were of crucial significance in bringing the end of authoritarian rule and the breakthrough to democracy (</span><a class="workspace-trigger" data-dcnode-id="5231" href="#bib11" name="bbib11"><span data-dcnode-id="5232" instrument_node="">Bunce, 2004</span></a><span data-dcnode-id="5226"><span data-dcnode-id="5230" instrument_node="">, 220). A pact based on compromise, “bridging” the differences between moderate defenders of authoritarianism and moderate leaders of the democratic opposition, was thought to be most favorable for a successful transition from authoritarian to democratic </span><a class="topic-link" data-dcnode-id="5228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/governance" title="Learn more about governance from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5229" instrument_node="">governance</span></a><span data-dcnode-id="5227" instrument_node="">.</span></span></p><p data-dcnode-id="5195" id="p0065"><span data-dcnode-id="5220"><span data-dcnode-id="5224" instrument_node="">As the record of experience of post-communist change accumulated, however, empirically grounded works by Joel&nbsp;Hellman and Michael McFaul demonstrated that the thesis of the importance of pacted transitions for ushering in successful </span><a class="topic-link" data-dcnode-id="5222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/democratization" title="Learn more about democratization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5223" instrument_node="">democratization</span></a><span data-dcnode-id="5221" instrument_node=""> was inapplicable to the post-communist countries (</span></span><a class="workspace-trigger" data-dcnode-id="5218" href="#bib46" name="bbib46"><span data-dcnode-id="5219" instrument_node="">Hellman, 1998</span></a><span data-dcnode-id="5217" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5215" href="#bib59" name="bbib59"><span data-dcnode-id="5216" instrument_node="">McFaul, 2002</span></a><span data-dcnode-id="5214" instrument_node="">). Valerie Bunce remarks that what we discover among post-communist states is “that the opposite strategy—that is, breakage, not bridging—emerges as the most successful approach to political and economic transformation” (</span><a class="workspace-trigger" data-dcnode-id="5212" href="#bib11" name="bbib11"><span data-dcnode-id="5213" instrument_node="">Bunce, 2004</span></a><span data-dcnode-id="5211" instrument_node="">, 222). Steven Fish has shown a strong relationship between the degree of economic transformation and the degree of political transformation among countries formerly under communist rule (</span><a class="workspace-trigger" data-dcnode-id="5209" href="#bib36" name="bbib36"><span data-dcnode-id="5210" instrument_node="">Fish, 1998</span></a><span data-dcnode-id="5208" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5206" href="#bib37" name="bbib37"><span data-dcnode-id="5207" instrument_node="">Fish, 1999</span></a><span data-dcnode-id="5205" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5203" href="#bib39" name="bbib39"><span data-dcnode-id="5204" instrument_node="">Fish, 2005</span></a><span data-dcnode-id="5202" instrument_node="">). Post-communist countries in which reformers committed to radical political and economic changes gained control usually made successful transitions to democracy, while the&nbsp;nations in which there were pacts between moderate reformers and members of the old ruling elite typically got&nbsp;bogged down in incomplete change, stalemating the movement toward democracy (and creating greater potential for movement back toward more authoritarian rule). Bunce has observed that “in the post-communist world, there is a very high correlation between democratization and economic reform” (</span><a class="workspace-trigger" data-dcnode-id="5200" href="#bib11" name="bbib11"><span data-dcnode-id="5201" instrument_node="">Bunce, 2004</span></a><span data-dcnode-id="5199" instrument_node="">, 223), and that among post-communist countries, the relationship between democratization and successful market reform is “robust and positive” (</span><a class="workspace-trigger" data-dcnode-id="5197" href="#bib9" name="bbib9"><span data-dcnode-id="5198" instrument_node="">Bunce, 2001</span></a><span data-dcnode-id="5196" instrument_node="">, 54, 59).</span></p><p data-dcnode-id="5165" id="p0070"><span data-dcnode-id="5190"><span data-dcnode-id="5194" instrument_node="">In the political sphere, as we have seen, Russia falls in&nbsp;the category of the cases of compromised and incomplete democratic transitions. The relationship between economic transformation and democratization in post-communist countries that has been identified in comparative perspective by scholars such as Hellman, McFaul, Bunce, and Fish can help us understand the political consequences of the form of economic reform in Russia in the 1990s. Though Boris Yeltsin made an emphatic commitment to fundamental economic transformation on the level of theory, he made a series of compromises in practice that prevented his economic reforms from reaching some of their central goals. Most importantly, the integrity of the </span><a class="topic-link" data-dcnode-id="5192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/privatization" title="Learn more about privatization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5193" instrument_node="">privatization</span></a><span data-dcnode-id="5191" instrument_node=""> of state economic enterprises was undermined when the Yeltsin administration, under political pressure, allowed people with political skills and&nbsp;connections to exploit the process of distribution of shares in those enterprises to amass assets for their own purposes (</span></span><a class="workspace-trigger" data-dcnode-id="5188" href="#bib42" name="bbib42"><span data-dcnode-id="5189" instrument_node="">Gill and Markwick, 2000</span></a><span data-dcnode-id="5187" instrument_node="">, 213). In the first major stage of privatization during 1992 and 1993, factory directors were able to gain control of most of the shares that were supposed to belong to the workers in their enterprises (</span><a class="workspace-trigger" data-dcnode-id="5185" href="#bib76" name="bbib76"><span data-dcnode-id="5186" instrument_node="">Rutland, 1994</span></a><span data-dcnode-id="5184" instrument_node="">, 1109, 1113, 1124; </span><a class="workspace-trigger" data-dcnode-id="5182" href="#bib1" name="bbib1"><span data-dcnode-id="5183" instrument_node="">Appel, 1997</span></a><span data-dcnode-id="5181" instrument_node="">, 1427; </span><a class="workspace-trigger" data-dcnode-id="5179" href="#bib43" name="bbib43"><span data-dcnode-id="5180" instrument_node="">Goldman, 2003</span></a><span data-dcnode-id="5178" instrument_node="">, 81–82). As Dimitri Simes says, “the principal beneficiaries of privatization were the remnants of the&nbsp;old </span><em data-dcnode-id="5176"><span data-dcnode-id="5177" instrument_node="">nomenklatura</span></em><span data-dcnode-id="5175" instrument_node=""> and speculators out to make a quick ruble” (</span><a class="workspace-trigger" data-dcnode-id="5173" href="#bib83" name="bbib83"><span data-dcnode-id="5174" instrument_node="">Simes, 1999</span></a><span data-dcnode-id="5172" instrument_node="">, 146–147). During the next few years the transfer of massive state assets to bankers and industrialists who were close to the government accelerated, aided by scams such as the “loans for shares” program (</span><a class="workspace-trigger" data-dcnode-id="5170" href="#bib2" name="bbib2"><span data-dcnode-id="5171" instrument_node="">Appel, 2004</span></a><span data-dcnode-id="5169" instrument_node="">, 97). Thus within a short time, privatization “created a powerful small circle of fabulously wealthy business elites—the so-called ‘oligarchs’” (</span><a class="workspace-trigger" data-dcnode-id="5167" href="#bib2" name="bbib2"><span data-dcnode-id="5168" instrument_node="">Appel, 2004</span></a><span data-dcnode-id="5166" instrument_node="">, 104).</span></p><p data-dcnode-id="5132" id="p0075"><span data-dcnode-id="5164" instrument_node="">As it had been envisioned by US Secretary of State Warren Christopher, privatization in Russia was supposed to create millions of independent property owners and foster the growth of a middle class with a commitment to continued reform, (</span><a class="workspace-trigger" data-dcnode-id="5162" href="#bib56" name="bbib56"><span data-dcnode-id="5163" instrument_node="">Marsden, 2005</span></a><span data-dcnode-id="5161" instrument_node="">, 75). In reality, however, the manner in which privatization took place insured that the new economic elite of Russia was created by the state and remained closely tied to the state (</span><a class="workspace-trigger" data-dcnode-id="5159" href="#bib29" name="bbib29"><span data-dcnode-id="5160" instrument_node="">Easter, 2008</span></a><span data-dcnode-id="5158" instrument_node="">, 212; </span><a class="workspace-trigger" data-dcnode-id="5156" href="#bib44" name="bbib44"><span data-dcnode-id="5157" instrument_node="">Gustafson, 1999</span></a><span data-dcnode-id="5155" instrument_node="">, 111–112; </span><a class="workspace-trigger" data-dcnode-id="5153" href="#bib78" name="bbib78"><span data-dcnode-id="5154" instrument_node="">Rutland, 2001</span></a><span data-dcnode-id="5152" instrument_node="">, 19). Not only did the oligarchs depend on the state for their status; they also had great influence in the national and regional governments (</span><a class="workspace-trigger" data-dcnode-id="5150" href="#bib79" name="bbib79"><span data-dcnode-id="5151" instrument_node="">Rutland, 2006</span></a><span data-dcnode-id="5149" instrument_node="">, 77), as signified in part by the fact that some of them periodically occupied high-ranking posts in the national government (</span><a class="workspace-trigger" data-dcnode-id="5147" href="#bib42" name="bbib42"><span data-dcnode-id="5148" instrument_node="">Gill and Markwick, 2000</span></a><span data-dcnode-id="5146" instrument_node="">, 219), and played a role in decisions about the choice of executive leaders (</span><a class="workspace-trigger" data-dcnode-id="5144" href="#bib43" name="bbib43"><span data-dcnode-id="5145" instrument_node="">Goldman, 2003</span></a><span data-dcnode-id="5143" instrument_node="">, 139). Olga Kryshtanovskaya and Stephen White affirm, “it began to appear as if the state itself had been ‘privatized,’ and that all important decisions were being made by a small group of financial magnates” (</span><a class="workspace-trigger" data-dcnode-id="5141" href="#bib54" name="bbib54"><span data-dcnode-id="5142" instrument_node="">Kryshtanovskaya and White, 2005</span></a><span data-dcnode-id="5136"><span data-dcnode-id="5140" instrument_node="">, 294). The oligarchs, some of whom controlled media outlets, became an indispensable part of Yeltsin’s base of support. Their financial contributions and their manipulation of television coverage helped to deliver victory for Yeltsin in the Russia presidential election of 1996 even though his popularity had fallen drastically. The oligarchs were also a source of funding for political parties and the governors of the regions. In short, “the </span><a class="topic-link" data-dcnode-id="5138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/oligarchy" title="Learn more about oligarchy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5139" instrument_node="">oligarchy</span></a><span data-dcnode-id="5137" instrument_node=""> and its allies represented a fusion of financial and industrial capital with direct access to government” (</span></span><a class="workspace-trigger" data-dcnode-id="5134" href="#bib80" name="bbib80"><span data-dcnode-id="5135" instrument_node="">Sakwa, 2008</span></a><span data-dcnode-id="5133" instrument_node="">, 468).</span></p><p data-dcnode-id="5106" id="p0080"><span data-dcnode-id="5131" instrument_node="">The consequences of the corrupted process of privatization of state assets were enormously damaging for the institutionalization of democracy in Russia. After the end of&nbsp;the 1990s, Joseph Stiglitz observed that “privatization, as it was imposed in Russia … undermined confidence in government, in democracy, and in reform” (</span><a class="workspace-trigger" data-dcnode-id="5129" href="#bib87" name="bbib87"><span data-dcnode-id="5130" instrument_node="">Stiglitz, 2002</span></a><span data-dcnode-id="5128" instrument_node="">, 159). The majority of Russians felt that they had been deceived by a process of privatization that had failed to produce the benefits that had been promised to them (</span><a class="workspace-trigger" data-dcnode-id="5126" href="#bib2" name="bbib2"><span data-dcnode-id="5127" instrument_node="">Appel, 2004</span></a><span data-dcnode-id="5125" instrument_node="">, 90). As a result of insider privatization, the broad majority of Russians did not feel themselves to be stakeholders in the new economic system, while they saw a class of “new Russians” flaunting their newfound wealth (</span><a class="workspace-trigger" data-dcnode-id="5123" href="#bib1" name="bbib1"><span data-dcnode-id="5124" instrument_node="">Appel, 1997</span></a><span data-dcnode-id="5122" instrument_node="">, 1434). Most Russians found that their living standards were declining sharply, while a small minority became conspicuously better off (</span><a class="workspace-trigger" data-dcnode-id="5120" href="#bib2" name="bbib2"><span data-dcnode-id="5121" instrument_node="">Appel, 2004</span></a><span data-dcnode-id="5119" instrument_node="">, 98; </span><a class="workspace-trigger" data-dcnode-id="5117" href="#bib43" name="bbib43"><span data-dcnode-id="5118" instrument_node="">Goldman, 2003</span></a><span data-dcnode-id="5116" instrument_node="">, 3). Surveys that were taken several years after the Yeltsin government had launched economic transformation revealed that most Russians believed that privatization had mainly benefited members of the old </span><em data-dcnode-id="5114"><span data-dcnode-id="5115" instrument_node="">nomenklatura</span></em><span data-dcnode-id="5113" instrument_node=""> class and organized crime groups (</span><a class="workspace-trigger" data-dcnode-id="5111" href="#bib44" name="bbib44"><span data-dcnode-id="5112" instrument_node="">Gustafson, 1999</span></a><span data-dcnode-id="5110" instrument_node="">, 42). Opinion surveys demonstrated that the course of&nbsp;privatization had been accompanied by “declining hopes&nbsp;and skepticism toward the overall direction of the&nbsp;economic transformation” (</span><a class="workspace-trigger" data-dcnode-id="5108" href="#bib23" name="bbib23"><span data-dcnode-id="5109" instrument_node="">DeBardeleben, 1999</span></a><span data-dcnode-id="5107" instrument_node="">, 456). The&nbsp;power and privileges of the oligarchs, along with the growth of organized crime and corruption in the 1990s, undermined the legitimacy of the political regime headed by Boris Yeltsin, and made most Russians skeptical about the merits of democracy in the style in which it was presented in Russia. Western leaders, particularly in the Clinton administration, had portrayed Yeltsin as leading the drive for democracy and a market economy, but in balance Yeltsin’s legacy damaged the potential for successful democratization in Russia and helped to set the stage for the consolidation of more authoritarian control under Putin.</span></p></section><section data-dcnode-id="5008" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5101"><span data-dcnode-id="5104" instrument_node="">4</span><span data-dcnode-id="5103" instrument_node="">. </span><span data-dcnode-id="5102" instrument_node="">The weakness of Russian civil society</span></h2><p data-dcnode-id="5057" id="p0085"><span data-dcnode-id="5100" instrument_node="">The most influential Western scholars who wrote about transitions to democracy in the 1980s focused primarily on maneuvering and agreements at the level of political elites (</span><a class="workspace-trigger" data-dcnode-id="5098" href="#bib3" name="bbib3"><span data-dcnode-id="5099" instrument_node="">Bermeo, 1990</span></a><span data-dcnode-id="5097" instrument_node="">, 361). The generalizations offered by those scholars on the basis of changes that had taken place in some countries in Southern Europe and South America placed little emphasis on pressures from the masses and activity by popular organizations, such as&nbsp;labor unions, in democratic transitions (</span><a class="workspace-trigger" data-dcnode-id="5095" href="#bib21" name="bbib21"><span data-dcnode-id="5096" instrument_node="">Collier, 1999</span></a><span data-dcnode-id="5094" instrument_node="">, 5, 5, 110; </span><a class="workspace-trigger" data-dcnode-id="5092" href="#bib30" name="bbib30"><span data-dcnode-id="5093" instrument_node="">Edles, 1995</span></a><span data-dcnode-id="5087"><span data-dcnode-id="5091" instrument_node="">, 362). Some of the literature on </span><a class="topic-link" data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/democratization" title="Learn more about democratization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5090" instrument_node="">democratization</span></a><span data-dcnode-id="5088" instrument_node=""> suggested that too much mass mobilization and&nbsp;pressure from below could endanger the success of a democratic transition (</span></span><a class="workspace-trigger" data-dcnode-id="5085" href="#bib4" name="bbib4"><span data-dcnode-id="5086" instrument_node="">Bermeo, 1997</span></a><span data-dcnode-id="5084" instrument_node="">, 305).</span><a class="workspace-trigger" data-dcnode-id="5081" href="#fn6" name="bfn6"><sup data-dcnode-id="5082"><span data-dcnode-id="5083" instrument_node="">6</span></sup></a><span data-dcnode-id="5080" instrument_node=""> We must note, however, that other scholars have carried out research that has called into question the accuracy of those assumptions even with regard to some of the countries that made successful transitions to democracy in the 1970s and 1980s. Several researchers have argued that forces in civil society played a much larger role in such transitions in some countries in Southern Europe and Latin America than was originally supposed (</span><a class="workspace-trigger" data-dcnode-id="5078" href="#bib4" name="bbib4"><span data-dcnode-id="5079" instrument_node="">Bermeo, 1997</span></a><span data-dcnode-id="5077" instrument_node="">, 309). Recently Monica Threlfall has argued that organized groups in civil society in Spain exerted strong pressure to replace authoritarian political institutions (</span><a class="workspace-trigger" data-dcnode-id="5075" href="#bib90" name="bbib90"><span data-dcnode-id="5076" instrument_node="">Threlfall, 2008</span></a><span data-dcnode-id="5074" instrument_node="">), a factor in the dynamic of change that earlier writings on Spain’s widely admired transition had neglected. Several scholars have presented evidence that in some cases of successful democratization, the labor movement exerted a crucial influence on the calculations of factions in the political elite by creating pressures that were potentially destabilizing (</span><a class="workspace-trigger" data-dcnode-id="5072" href="#bib22" name="bbib22"><span data-dcnode-id="5073" instrument_node="">Collier and Mahoney, 1997</span></a><span data-dcnode-id="5071" instrument_node="">, 285–286; </span><a class="workspace-trigger" data-dcnode-id="5069" href="#bib21" name="bbib21"><span data-dcnode-id="5070" instrument_node="">Collier, 1999</span></a><span data-dcnode-id="5068" instrument_node="">, 127). Elisabeth Jean Wood has documented the way in which political mobilization in the working class in South Africa and El Salvador forced elite figures in the political regime of each country to negotiate a transition to democracy (</span><a class="workspace-trigger" data-dcnode-id="5066" href="#bib94" name="bbib94"><span data-dcnode-id="5067" instrument_node="">Wood, 2000</span></a><span data-dcnode-id="5065" instrument_node="">, 10). Ruth Berins Collier concludes, “in most cases the politics of democratization is a combination of processes from above and below” (</span><a class="workspace-trigger" data-dcnode-id="5063" href="#bib21" name="bbib21"><span data-dcnode-id="5064" instrument_node="">Collier, 1999</span></a><span data-dcnode-id="5062" instrument_node="">, 20).</span><a class="workspace-trigger" data-dcnode-id="5059" href="#fn7" name="bfn7"><sup data-dcnode-id="5060"><span data-dcnode-id="5061" instrument_node="">7</span></sup></a><span data-dcnode-id="5058" instrument_node=""> So the scholarly literature on transitions to democracy has increasingly recognized the importance of the influence of social groups and mass organizations in democratic transitions outside the sphere of post-communist countries.</span></p><p data-dcnode-id="5043" id="p0090"><span data-dcnode-id="5056" instrument_node="">The trend should encourage us to reexamine the assumptions, common in earlier writings, that organizations in civil society would not play much of a role in a transition to democracy, and that the strength of civil society was not particularly relevant to the chances for successful democratization. The Western conception of civil society refers to the sphere of the largely independent and self-directed organizational activity of citizens (</span><a class="workspace-trigger" data-dcnode-id="5054" href="#bib25" name="bbib25"><span data-dcnode-id="5055" instrument_node="">Diamond, 1999</span></a><span data-dcnode-id="5053" instrument_node="">, 249). It has been described as “a space of citizen-directed collective action, located between the family and the state, and not directed solely toward private profit” (</span><a class="workspace-trigger" data-dcnode-id="5051" href="#bib47" name="bbib47"><span data-dcnode-id="5052" instrument_node="">Henry and Sundstrom, 2006</span></a><span data-dcnode-id="5050" instrument_node="">, 5). With the wisdom that comes from broader comparative experience that has&nbsp;accumulated since the 1980s, we now can see how much the authors of democratic transition theory took for granted the relatively high level of development of the organizations of civil society in the countries from which their generalizations had been derived. In general the growth of independent social organizations under states controlled by communist parties was far more limited than in the nations of Southern Europe and South America that&nbsp;moved toward democracy. In Russia, where the Soviet&nbsp;model had been invented and where it had been in place longer than anywhere else in the world, the ruling party and state had created a network of organizations that&nbsp;permeated the entire society and was directed in detail by the Communist Party of the Soviet Union (</span><a class="workspace-trigger" data-dcnode-id="5048" href="#bib34" name="bbib34"><span data-dcnode-id="5049" instrument_node="">Evans, 2006</span></a><span data-dcnode-id="5047" instrument_node="">). Since no legal, independent, organized groups were permitted, there was no civil society in the Soviet Union, according to the usual Western conception. Nevertheless, there was a burst of optimism concerning the possibility for&nbsp;the rise of civil society in the&nbsp;Soviet Union in the late 1980s when, as a part of reforms introduced by Mikhail Gorbachev, “informal” groups appeared and proliferated quickly. That phenomenon was followed by the emergence of the Democratic Russia political movement, a quasi-party that supplied active assistance for Boris Yeltsin’s victory in&nbsp;the presidential election in the Russian republic of the USSR in 1991 (</span><a class="workspace-trigger" data-dcnode-id="5045" href="#bib80" name="bbib80"><span data-dcnode-id="5046" instrument_node="">Sakwa, 2008</span></a><span data-dcnode-id="5044" instrument_node="">, 130). The base of support for most of the informal groups proved to be shallow, however, and the Democratic Russia movement fragmented and disappeared within a short time.</span></p><p data-dcnode-id="5034" id="p0095"><span data-dcnode-id="5038"><span data-dcnode-id="5042" instrument_node="">As was shown in a number of countries in the 1970s and 1980s, a strong civil society can play an important role in a nation’s transition to democracy. Pressure from the bottom up can interact with initiatives from the top down to build momentum for institutional change. Once such a transition has begun, independent social organizations with substantial numbers of loyal members can be valuable assets to members of the political elite who encounter opposition to further change. Also, vigilance by vigorous organizations outside the state can help to keep the leaders of the transition on track if they begin to betray their ideals. That did not happen in Russia when the Yeltsin administration allowed the </span><a class="topic-link" data-dcnode-id="5040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/privatization" title="Learn more about privatization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5041" instrument_node="">privatization</span></a><span data-dcnode-id="5039" instrument_node=""> of state assets to be hijacked by avaricious insiders, and when the oligarchs achieved dominance of political parties, the media, and the&nbsp;government. Perhaps surprisingly, in the face of sharply declining economic security during the 1990s, most of the&nbsp;population of Russia withdrew from political life and became cynical about parties and politicians (</span></span><a class="workspace-trigger" data-dcnode-id="5036" href="#bib42" name="bbib42"><span data-dcnode-id="5037" instrument_node="">Gill and Markwick, 2000</span></a><span data-dcnode-id="5035" instrument_node="">, 249). During that decade most citizens of Russia immersed themselves in the struggle for survival as individuals or families, and had little hope for positive political changes.</span></p><p data-dcnode-id="5009" id="p0100"><span data-dcnode-id="5033" instrument_node="">Despite the increase in the freedom to form nongovernmental organizations in Russia after the fall of the Communist Party and the Soviet state, civil society in Russia was weak after the end of the old regime, as almost all independent organizations were marginal in terms of their social base, their financial assets, their impact on society, and their influence in politics (</span><a class="workspace-trigger" data-dcnode-id="5031" href="#bib33" name="bbib33"><span data-dcnode-id="5032" instrument_node="">Evans, 2002</span></a><span data-dcnode-id="5030" instrument_node="">). On the level of&nbsp;popular attitudes, part of the cultural legacy of the Soviet system was pervasive distrust of social organizations and even of the whole public sphere. In addition, the deep decline in the economy made it impossible for most citizens to give financial support to such organizations even if&nbsp;they had been willing to. Finally, the evolution of the political system placed a premium on exploiting personal connections with individuals in positions of power, rather than the&nbsp;drawing support from sizable groups in society (</span><a class="workspace-trigger" data-dcnode-id="5028" href="#bib38" name="bbib38"><span data-dcnode-id="5029" instrument_node="">Fish, 2001</span></a><span data-dcnode-id="5023"><span data-dcnode-id="5027" instrument_node="">, 22). After 1991 the Yeltsin leadership deliberately discouraged the mobilization of Russian citizens for organized political actions other than voting in elections—and Yeltsin’s lieutenants were not very successful in&nbsp;gaining support from citizens in </span><a class="topic-link" data-dcnode-id="5025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/parliamentary-election" title="Learn more about parliamentary elections from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5026" instrument_node="">parliamentary elections</span></a><span data-dcnode-id="5024" instrument_node="">.&nbsp;Relying heavily on dominance by the institution of the presidency and making deals with the oligarchs and governors, Yeltsin sought to introduce change almost exclusively from the top&nbsp;down. And yet, as Steven Fish has pointed out, in every post-communist state “where democratization did not happen or was initiated and then reversed, a top-down dynamic has been at work” (</span></span><a class="workspace-trigger" data-dcnode-id="5021" href="#bib39" name="bbib39"><span data-dcnode-id="5022" instrument_node="">Fish, 2005</span></a><span data-dcnode-id="5020" instrument_node="">, 186). Fish adds that “strong, autonomous societal organizations and networks may not always be democracy’s allies, but their absence is almost always democracy’s enemy” (</span><a class="workspace-trigger" data-dcnode-id="5018" href="#bib39" name="bbib39"><span data-dcnode-id="5019" instrument_node="">Fish, 2005</span></a><span data-dcnode-id="5017" instrument_node="">, 187).</span><a class="workspace-trigger" data-dcnode-id="5014" href="#fn8" name="bfn8"><sup data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">8</span></sup></a><span data-dcnode-id="5013" instrument_node=""> The barriers to the development of civil society in Russia within the Soviet system and the conditions causing weakness in&nbsp;social organizations in post-communist Russia made it easier for members of the elite to subvert reform and guaranteed that there would be fewer restraints on the tendency toward more authoritarian control after 2000. In the words of Graeme Gill and Roger Markwick, “It has been the weakness of such civil society forces in the Soviet Union and Russia which has left excessive power in the hands of&nbsp;political elites and undercut the emergence of a stable and robust democracy” (</span><a class="workspace-trigger" data-dcnode-id="5011" href="#bib42" name="bbib42"><span data-dcnode-id="5012" instrument_node="">Gill and Markwick, 2000</span></a><span data-dcnode-id="5010" instrument_node="">, 251).</span></p></section><section data-dcnode-id="4860" id="sec5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5004"><span data-dcnode-id="5007" instrument_node="">5</span><span data-dcnode-id="5006" instrument_node="">. </span><span data-dcnode-id="5005" instrument_node="">The influence of historical factors</span></h2><p data-dcnode-id="4984" id="p0105"><span data-dcnode-id="5003" instrument_node="">In recent years a number of scholars writing about post-communist states have begun to search for the historical roots of the patterns of change and continuity that have been evident during the past two decades. That trend in scholarly works reflects dissatisfaction with earlier writings which had attempted to explain the divergence in the trajectories of post-communist states in terms of statistical relationships between potential independent and dependent variables, all of which had been measured by various organizations, offering information that was readily available. When researchers found that the countries in which noncommunist parties won clear victories over communist parties in the first competitive elections were likely to achieve the most thorough political and economic transformation, their finding was interesting, though not surprising, and it was dismissed by one scholar as “not much of an insight” (</span><a class="workspace-trigger" data-dcnode-id="5001" href="#bib51" name="bbib51"><span data-dcnode-id="5002" instrument_node="">Kitschelt, 2003</span></a><span data-dcnode-id="5000" instrument_node="">, 72). The disclosure of such statistical relationships left unexplained “the why of the why”—the more fundamental question of “why some countries managed to remove their communists from power and why others did not” (</span><a class="workspace-trigger" data-dcnode-id="4998" href="#bib53" name="bbib53"><span data-dcnode-id="4999" instrument_n
