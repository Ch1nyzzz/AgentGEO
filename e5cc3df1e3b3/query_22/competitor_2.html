</span></p><p data-dcnode-id="7739"><span data-dcnode-id="7744" instrument_node="">It is commonly claimed that democracy and democratization were important drivers of the expansion of primary education around the world. However, new evidence from historical education trends challenges this assertion. An analysis of historical student enrollment rates for 109 countries from 1820 to 2010 finds no support for the claim that democratization increased access to primary education around the world. It is true that transitions to democracy often coincided with an acceleration in the expansion of primary education, but the same acceleration was observed in countries that remained non-democratic.</span><sup class="reference" data-dcnode-id="7741" id="cite_ref-86"><a data-dcnode-id="7742" href="#cite_note-86"><span data-dcnode-id="7743" instrument_node="">[86]</span></a></sup><span data-dcnode-id="7740" instrument_node="">
</span></p><span data-dcnode-id="7738" instrument_node="">
</span><h3 data-dcnode-id="7728"><span class="mw-headline" data-dcnode-id="7736" id="Natural_resources"><span data-dcnode-id="7737" instrument_node="">Natural resources</span></span><span class="mw-editsection" data-dcnode-id="7729"><span class="mw-editsection-bracket" data-dcnode-id="7734"><span data-dcnode-id="7735" instrument_node="">[</span></span><a data-dcnode-id="7732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D13" title="Edit section: Natural resources"><span data-dcnode-id="7733" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7730"><span data-dcnode-id="7731" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7727" instrument_node="">
</span><p data-dcnode-id="7680"><span data-dcnode-id="7726" instrument_node="">Research shows that oil wealth lowers levels of democracy and strengthens autocratic rule.</span><sup class="reference" data-dcnode-id="7723" id="cite_ref-Ross_2001_87-0"><a data-dcnode-id="7724" href="#cite_note-Ross_2001-87"><span data-dcnode-id="7725" instrument_node="">[87]</span></a></sup><sup class="reference" data-dcnode-id="7720" id="cite_ref-88"><a data-dcnode-id="7721" href="#cite_note-88"><span data-dcnode-id="7722" instrument_node="">[88]</span></a></sup><sup class="reference" data-dcnode-id="7717" id="cite_ref-89"><a data-dcnode-id="7718" href="#cite_note-89"><span data-dcnode-id="7719" instrument_node="">[89]</span></a></sup><sup class="reference" data-dcnode-id="7714" id="cite_ref-90"><a data-dcnode-id="7715" href="#cite_note-90"><span data-dcnode-id="7716" instrument_node="">[90]</span></a></sup><sup class="reference" data-dcnode-id="7711" id="cite_ref-91"><a data-dcnode-id="7712" href="#cite_note-91"><span data-dcnode-id="7713" instrument_node="">[91]</span></a></sup><sup class="reference" data-dcnode-id="7708" id="cite_ref-92"><a data-dcnode-id="7709" href="#cite_note-92"><span data-dcnode-id="7710" instrument_node="">[92]</span></a></sup><sup class="reference" data-dcnode-id="7705" id="cite_ref-93"><a data-dcnode-id="7706" href="#cite_note-93"><span data-dcnode-id="7707" instrument_node="">[93]</span></a></sup><sup class="reference" data-dcnode-id="7702" id="cite_ref-94"><a data-dcnode-id="7703" href="#cite_note-94"><span data-dcnode-id="7704" instrument_node="">[94]</span></a></sup><sup class="reference" data-dcnode-id="7699" id="cite_ref-:10_95-0"><a data-dcnode-id="7700" href="#cite_note-:10-95"><span data-dcnode-id="7701" instrument_node="">[95]</span></a></sup><sup class="reference" data-dcnode-id="7696" id="cite_ref-96"><a data-dcnode-id="7697" href="#cite_note-96"><span data-dcnode-id="7698" instrument_node="">[96]</span></a></sup><span data-dcnode-id="7695" instrument_node=""> According to Michael Ross, </span><a data-dcnode-id="7693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petroleum" title="Petroleum"><span data-dcnode-id="7694" instrument_node="">petroleum</span></a><span data-dcnode-id="7692" instrument_node=""> is the sole resource that has "been consistently correlated with less democracy and worse institutions" and is the "key variable in the vast majority of the studies" identifying some type of </span><a data-dcnode-id="7690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Resource_curse" title="Resource curse"><span data-dcnode-id="7691" instrument_node="">resource curse</span></a><span data-dcnode-id="7689" instrument_node=""> effect.</span><sup class="reference" data-dcnode-id="7686" id="cite_ref-:2_97-0"><a data-dcnode-id="7687" href="#cite_note-:2-97"><span data-dcnode-id="7688" instrument_node="">[97]</span></a></sup><span data-dcnode-id="7685" instrument_node=""> A 2014 meta-analysis confirms the negative impact of oil wealth on democratization.</span><sup class="reference" data-dcnode-id="7682" id="cite_ref-98"><a data-dcnode-id="7683" href="#cite_note-98"><span data-dcnode-id="7684" instrument_node="">[98]</span></a></sup><span data-dcnode-id="7681" instrument_node="">
</span></p><p data-dcnode-id="7650"><span data-dcnode-id="7679" instrument_node="">University of California, Berkeley political scientist Thad Dunning proposes a plausible explanation for Ecuador's return to democracy that contradicts the conventional wisdom that natural resource rents encourage authoritarian governments. Dunning proposes that there are situations where natural resource rents, such as those acquired through oil, reduce the risk of distributive or social policies to the elite because the state has other sources of revenue to finance this kind of policies that is not the elite wealth or income.</span><sup class="reference" data-dcnode-id="7676" id="cite_ref-99"><a data-dcnode-id="7677" href="#cite_note-99"><span data-dcnode-id="7678" instrument_node="">[99]</span></a></sup><span data-dcnode-id="7675" instrument_node=""> And in countries plagued with high inequality, which was the case of Ecuador in the 1970s, the result would be a higher likelihood of democratization.</span><sup class="reference" data-dcnode-id="7672" id="cite_ref-100"><a data-dcnode-id="7673" href="#cite_note-100"><span data-dcnode-id="7674" instrument_node="">[100]</span></a></sup><span data-dcnode-id="7671" instrument_node=""> In 1972, the military coup had overthrown the government in large part because of the fears of elites that redistribution would take place.</span><sup class="reference" data-dcnode-id="7668" id="cite_ref-Thad_Dunning_2008._Pp._34_101-0"><a data-dcnode-id="7669" href="#cite_note-Thad_Dunning_2008._Pp._34-101"><span data-dcnode-id="7670" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7667" instrument_node=""> That same year oil became an increasing financial source for the country.</span><sup class="reference" data-dcnode-id="7664" id="cite_ref-Thad_Dunning_2008._Pp._34_101-1"><a data-dcnode-id="7665" href="#cite_note-Thad_Dunning_2008._Pp._34-101"><span data-dcnode-id="7666" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7663" instrument_node=""> Although the rents were used to finance the military, the eventual second oil boom of 1979 ran parallel to the country's re-democratization.</span><sup class="reference" data-dcnode-id="7660" id="cite_ref-Thad_Dunning_2008._Pp._34_101-2"><a data-dcnode-id="7661" href="#cite_note-Thad_Dunning_2008._Pp._34-101"><span data-dcnode-id="7662" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7659" instrument_node=""> Ecuador's re-democratization can then be attributed, as argued by Dunning, to the large increase of oil rents, which enabled not only a surge in public spending but placated the fears of redistribution that had grappled the elite circles.</span><sup class="reference" data-dcnode-id="7656" id="cite_ref-Thad_Dunning_2008._Pp._34_101-3"><a data-dcnode-id="7657" href="#cite_note-Thad_Dunning_2008._Pp._34-101"><span data-dcnode-id="7658" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7655" instrument_node=""> The exploitation of Ecuador's resource rent enabled the government to implement price and wage policies that benefited citizens at no cost to the elite and allowed for a smooth transition and growth of democratic institutions.</span><sup class="reference" data-dcnode-id="7652" id="cite_ref-Thad_Dunning_2008._Pp._34_101-4"><a data-dcnode-id="7653" href="#cite_note-Thad_Dunning_2008._Pp._34-101"><span data-dcnode-id="7654" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7651" instrument_node="">
</span></p><p data-dcnode-id="7641"><span data-dcnode-id="7649" instrument_node="">The thesis that oil and other natural resources have a negative impact on democracy has been challenged by historian Stephen Haber and political scientist Victor Menaldo in a widely cited article in the </span><i data-dcnode-id="7647"><span data-dcnode-id="7648" instrument_node="">American Political Science Review</span></i><span data-dcnode-id="7646" instrument_node=""> (2011).
Haber and Menaldo argue that "natural resource reliance is not an exogenous variable" and find that when tests of the relationship between natural resources and democracy take this point into account "increases in resource reliance are not associated with authoritarianism."</span><sup class="reference" data-dcnode-id="7643" id="cite_ref-102"><a data-dcnode-id="7644" href="#cite_note-102"><span data-dcnode-id="7645" instrument_node="">[102]</span></a></sup><span data-dcnode-id="7642" instrument_node="">
</span></p><span data-dcnode-id="7640" instrument_node="">
</span><h3 data-dcnode-id="7630"><span class="mw-headline" data-dcnode-id="7638" id="Death_or_ouster_of_dictator"><span data-dcnode-id="7639" instrument_node="">Death or ouster of dictator</span></span><span class="mw-editsection" data-dcnode-id="7631"><span class="mw-editsection-bracket" data-dcnode-id="7636"><span data-dcnode-id="7637" instrument_node="">[</span></span><a data-dcnode-id="7634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D14" title="Edit section: Death or ouster of dictator"><span data-dcnode-id="7635" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7632"><span data-dcnode-id="7633" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7629" instrument_node="">
</span><p data-dcnode-id="7623"><span data-dcnode-id="7628" instrument_node="">One analysis found that "Compared with other forms of leadership turnover in autocracies—such as coups, elections, or term limits—which lead to regime collapse about half of the time, the death of a dictator is remarkably inconsequential. ...  of the 79 dictators who have died in office (1946–2014)... in the vast majority (92%) of cases, the regime persists after the autocrat's death."</span><sup class="reference" data-dcnode-id="7625" id="cite_ref-103"><a data-dcnode-id="7626" href="#cite_note-103"><span data-dcnode-id="7627" instrument_node="">[103]</span></a></sup><span data-dcnode-id="7624" instrument_node="">
</span></p><span data-dcnode-id="7622" instrument_node="">
</span><h3 data-dcnode-id="7612"><span class="mw-headline" data-dcnode-id="7620" id="War_and_national_security"><span data-dcnode-id="7621" instrument_node="">War and national security</span></span><span class="mw-editsection" data-dcnode-id="7613"><span class="mw-editsection-bracket" data-dcnode-id="7618"><span data-dcnode-id="7619" instrument_node="">[</span></span><a data-dcnode-id="7616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D15" title="Edit section: War and national security"><span data-dcnode-id="7617" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7614"><span data-dcnode-id="7615" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7611" instrument_node="">
</span><p data-dcnode-id="7582"><a data-dcnode-id="7609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeffrey_Herbst" title="Jeffrey Herbst"><span data-dcnode-id="7610" instrument_node="">Jeffrey Herbst</span></a><span data-dcnode-id="7608" instrument_node="">, in his paper "War and the State in Africa" (1990), explains how democratization in European states was achieved through political development fostered by war-making and these "lessons from the case of Europe show that war is an important cause of </span><a data-dcnode-id="7606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_formation" title="State formation"><span data-dcnode-id="7607" instrument_node="">state formation</span></a><span data-dcnode-id="7605" instrument_node=""> that is missing in Africa today."</span><sup class="reference" data-dcnode-id="7602" id="cite_ref-Herbst_104-0"><a data-dcnode-id="7603" href="#cite_note-Herbst-104"><span data-dcnode-id="7604" instrument_node="">[104]</span></a></sup><span data-dcnode-id="7601" instrument_node=""> Herbst writes that war and the threat of invasion by neighbors caused European state to more efficiently collect revenue, forced leaders to improve administrative capabilities, and fostered state unification and a sense of national identity (a common, powerful association between the state and its citizens).</span><sup class="reference" data-dcnode-id="7598" id="cite_ref-Herbst_104-1"><a data-dcnode-id="7599" href="#cite_note-Herbst-104"><span data-dcnode-id="7600" instrument_node="">[104]</span></a></sup><span data-dcnode-id="7597" instrument_node=""> Herbst writes that in Africa and elsewhere in the non-European world "states are developing in a fundamentally new environment" because they mostly "gained Independence without having to resort to combat and have not faced a security threat since independence."</span><sup class="reference" data-dcnode-id="7594" id="cite_ref-Herbst_104-2"><a data-dcnode-id="7595" href="#cite_note-Herbst-104"><span data-dcnode-id="7596" instrument_node="">[104]</span></a></sup><span data-dcnode-id="7593" instrument_node=""> Herbst notes that the strongest non-European states, </span><a data-dcnode-id="7591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Korea" title="South Korea"><span data-dcnode-id="7592" instrument_node="">South Korea</span></a><span data-dcnode-id="7590" instrument_node=""> and </span><a data-dcnode-id="7588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taiwan" title="Taiwan"><span data-dcnode-id="7589" instrument_node="">Taiwan</span></a><span data-dcnode-id="7587" instrument_node="">, are "largely 'warfare' states that have been molded, in part, by the near constant threat of external aggression."</span><sup class="reference" data-dcnode-id="7584" id="cite_ref-Herbst_104-3"><a data-dcnode-id="7585" href="#cite_note-Herbst-104"><span data-dcnode-id="7586" instrument_node="">[104]</span></a></sup><span data-dcnode-id="7583" instrument_node="">
</span></p><p data-dcnode-id="7576"><span data-dcnode-id="7581" instrument_node="">Elizabeth Kier has challenged claims that total war prompts democratization, showing in the cases of the UK and Italy during World War I that the policies adopted by the Italian government during World War I prompted a fascist backlash whereas UK government policies towards labor undermined broader democratization.</span><sup class="reference" data-dcnode-id="7578" id="cite_ref-105"><a data-dcnode-id="7579" href="#cite_note-105"><span data-dcnode-id="7580" instrument_node="">[105]</span></a></sup><span data-dcnode-id="7577" instrument_node="">
</span></p><span data-dcnode-id="7575" instrument_node="">
</span><h3 data-dcnode-id="7565"><span class="mw-headline" data-dcnode-id="7573" id="Peace"><span data-dcnode-id="7574" instrument_node="">Peace</span></span><span class="mw-editsection" data-dcnode-id="7566"><span class="mw-editsection-bracket" data-dcnode-id="7571"><span data-dcnode-id="7572" instrument_node="">[</span></span><a data-dcnode-id="7569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D16" title="Edit section: Peace"><span data-dcnode-id="7570" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7567"><span data-dcnode-id="7568" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7564" instrument_node="">
</span><link data-dcnode-id="7563" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7559" role="note"><span data-dcnode-id="7562" instrument_node="">Main article: </span><a data-dcnode-id="7560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Territorial_peace_theory" title="Territorial peace theory"><span data-dcnode-id="7561" instrument_node="">Territorial peace theory</span></a></div><span data-dcnode-id="7558" instrument_node="">
</span><p data-dcnode-id="7537"><span data-dcnode-id="7557" instrument_node="">Wars may contribute to the </span><a data-dcnode-id="7555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State-building" title="State-building"><span data-dcnode-id="7556" instrument_node="">state-building</span></a><span data-dcnode-id="7554" instrument_node=""> that precedes a transition to democracy, but war is mainly a serious obstacle to democratization. While adherents of the </span><a data-dcnode-id="7552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_peace_theory" title="Democratic peace theory"><span data-dcnode-id="7553" instrument_node="">democratic peace theory</span></a><span data-dcnode-id="7551" instrument_node=""> believe that democracy causes peace, the </span><a data-dcnode-id="7549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Territorial_peace_theory" title="Territorial peace theory"><span data-dcnode-id="7550" instrument_node="">territorial peace theory</span></a><span data-dcnode-id="7548" instrument_node=""> makes the opposite claim that peace causes democracy. In fact, war and territorial threats to a country are likely to increase </span><a data-dcnode-id="7546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authoritarianism" title="Authoritarianism"><span data-dcnode-id="7547" instrument_node="">authoritarianism</span></a><span data-dcnode-id="7545" instrument_node=""> and lead to autocracy. 
This is supported by historical evidence showing that in almost all cases, peace has come before democracy. A number of scholars have argued that there is little support for the hypothesis that democracy causes peace, but strong evidence for the opposite hypothesis that peace leads to democracy.</span><sup class="reference" data-dcnode-id="7542" id="cite_ref-106"><a data-dcnode-id="7543" href="#cite_note-106"><span data-dcnode-id="7544" instrument_node="">[106]</span></a></sup><sup class="reference" data-dcnode-id="7539" id="cite_ref-107"><a data-dcnode-id="7540" href="#cite_note-107"><span data-dcnode-id="7541" instrument_node="">[107]</span></a></sup><span data-dcnode-id="7538" instrument_node="">
</span></p><p data-dcnode-id="7507"><a data-dcnode-id="7535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_Welzel" title="Christian Welzel"><span data-dcnode-id="7536" instrument_node="">Christian Welzel's</span></a><span data-dcnode-id="7534" instrument_node=""> </span><a data-dcnode-id="7532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_Rising" title="Freedom Rising"><span data-dcnode-id="7533" instrument_node="">human empowerment theory</span></a><span data-dcnode-id="7531" instrument_node=""> posits that existential security leads to emancipative cultural values and support for a democratic political organization.</span><sup class="reference" data-dcnode-id="7528" id="cite_ref-108"><a data-dcnode-id="7529" href="#cite_note-108"><span data-dcnode-id="7530" instrument_node="">[108]</span></a></sup><span data-dcnode-id="7527" instrument_node=""> This is in agreement with theories based on </span><a data-dcnode-id="7525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evolutionary_psychology" title="Evolutionary psychology"><span data-dcnode-id="7526" instrument_node="">evolutionary psychology</span></a><span data-dcnode-id="7524" instrument_node="">. The so-called </span><a data-dcnode-id="7522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theory_of_Regal_and_Kungic_Societal_Structures" title="Theory of Regal and Kungic Societal Structures"><span data-dcnode-id="7523" instrument_node="">regality theory</span></a><span data-dcnode-id="7521" instrument_node=""> finds that people develop a psychological preference for a strong leader and an </span><a data-dcnode-id="7519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authoritarianism" title="Authoritarianism"><span data-dcnode-id="7520" instrument_node="">authoritarian</span></a><span data-dcnode-id="7518" instrument_node=""> form of government in situations of war or perceived collective danger. On the other hand, people will support </span><a data-dcnode-id="7516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Egalitarianism" title="Egalitarianism"><span data-dcnode-id="7517" instrument_node="">egalitarian</span></a><span data-dcnode-id="7515" instrument_node=""> values and a preference for democracy in situations of peace and safety. The consequence of this is that a society will develop in the direction of </span><a data-dcnode-id="7513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autocracy" title="Autocracy"><span data-dcnode-id="7514" instrument_node="">autocracy</span></a><span data-dcnode-id="7512" instrument_node=""> and an authoritarian government when people perceive collective danger, while the development in the democratic direction requires collective safety.</span><sup class="reference" data-dcnode-id="7509" id="cite_ref-Fog2017_109-0"><a data-dcnode-id="7510" href="#cite_note-Fog2017-109"><span data-dcnode-id="7511" instrument_node="">[109]</span></a></sup><span data-dcnode-id="7508" instrument_node="">
</span></p><span data-dcnode-id="7506" instrument_node="">
</span><h3 data-dcnode-id="7496"><span class="mw-headline" data-dcnode-id="7504" id="Contingency_and_negotiations"><span data-dcnode-id="7505" instrument_node="">Contingency and negotiations</span></span><span class="mw-editsection" data-dcnode-id="7497"><span class="mw-editsection-bracket" data-dcnode-id="7502"><span data-dcnode-id="7503" instrument_node="">[</span></span><a data-dcnode-id="7500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D17" title="Edit section: Contingency and negotiations"><span data-dcnode-id="7501" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7498"><span data-dcnode-id="7499" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7495" instrument_node="">
</span><p data-dcnode-id="7474"><span data-dcnode-id="7494" instrument_node="">Scholars, such as </span><a data-dcnode-id="7492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guillermo_O%2527Donnell" title="Guillermo O'Donnell"><span data-dcnode-id="7493" instrument_node="">Guillermo O'Donnell</span></a><span data-dcnode-id="7491" instrument_node="">, </span><a data-dcnode-id="7489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philippe_C._Schmitter" title="Philippe C. Schmitter"><span data-dcnode-id="7490" instrument_node="">Philippe C. Schmitter</span></a><span data-dcnode-id="7488" instrument_node=""> and </span><a data-dcnode-id="7486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dankwart_Rustow" title="Dankwart Rustow"><span data-dcnode-id="7487" instrument_node="">Dankwart A. Rustow</span></a><span data-dcnode-id="7485" instrument_node=""> have argued against the notion that there are structural "big" causes of democratization. These scholars instead emphasize how the democratization process occurs in a flukey  manner which depends on the unique characteristics and circumstances of the elites who ultimately oversee the shift from authoritarianism to democracy.</span><sup class="reference" data-dcnode-id="7482" id="cite_ref-110"><a data-dcnode-id="7483" href="#cite_note-110"><span data-dcnode-id="7484" instrument_node="">[110]</span></a></sup><sup class="reference" data-dcnode-id="7479" id="cite_ref-111"><a data-dcnode-id="7480" href="#cite_note-111"><span data-dcnode-id="7481" instrument_node="">[111]</span></a></sup><sup class="reference" data-dcnode-id="7476" id="cite_ref-112"><a data-dcnode-id="7477" href="#cite_note-112"><span data-dcnode-id="7478" instrument_node="">[112]</span></a></sup><span data-dcnode-id="7475" instrument_node="">
</span></p><span data-dcnode-id="7473" instrument_node="">
</span><h3 data-dcnode-id="7463"><span class="mw-headline" data-dcnode-id="7471" id="International_institutions"><span data-dcnode-id="7472" instrument_node="">International institutions</span></span><span class="mw-editsection" data-dcnode-id="7464"><span class="mw-editsection-bracket" data-dcnode-id="7469"><span data-dcnode-id="7470" instrument_node="">[</span></span><a data-dcnode-id="7467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D18" title="Edit section: International institutions"><span data-dcnode-id="7468" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7465"><span data-dcnode-id="7466" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7462" instrument_node="">
</span><p data-dcnode-id="7426"><span data-dcnode-id="7461" instrument_node="">A number of studies have found that institutional institutions have helped facilitate democratization.</span><sup class="reference" data-dcnode-id="7458" id="cite_ref-113"><a data-dcnode-id="7459" href="#cite_note-113"><span data-dcnode-id="7460" instrument_node="">[113]</span></a></sup><sup class="reference" data-dcnode-id="7455" id="cite_ref-114"><a data-dcnode-id="7456" href="#cite_note-114"><span data-dcnode-id="7457" instrument_node="">[114]</span></a></sup><sup class="reference" data-dcnode-id="7452" id="cite_ref-115"><a data-dcnode-id="7453" href="#cite_note-115"><span data-dcnode-id="7454" instrument_node="">[115]</span></a></sup><span data-dcnode-id="7451" instrument_node=""> </span><a data-dcnode-id="7449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Risse" title="Thomas Risse"><span data-dcnode-id="7450" instrument_node="">Thomas Risse</span></a><span data-dcnode-id="7448" instrument_node=""> wrote in 2009, "there is a consensus in the literature on Eastern Europe that the </span><a data-dcnode-id="7446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Member_state_of_the_European_Union" title="Member state of the European Union"><span data-dcnode-id="7447" instrument_node="">EU membership</span></a><span data-dcnode-id="7445" instrument_node=""> perspective had a huge anchoring effects for </span><a data-dcnode-id="7443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enlargement_of_the_European_Union" title="Enlargement of the European Union"><span data-dcnode-id="7444" instrument_node="">the new democracies</span></a><span data-dcnode-id="7442" instrument_node="">."</span><sup class="reference" data-dcnode-id="7439" id="cite_ref-:22_116-0"><a data-dcnode-id="7440" href="#cite_note-:22-116"><span data-dcnode-id="7441" instrument_node="">[116]</span></a></sup><span data-dcnode-id="7438" instrument_node=""> Scholars have also linked </span><a class="mw-redirect" data-dcnode-id="7436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_expansion" title="NATO expansion"><span data-dcnode-id="7437" instrument_node="">NATO expansion</span></a><span data-dcnode-id="7435" instrument_node=""> with playing a role in democratization.</span><sup class="reference" data-dcnode-id="7432" id="cite_ref-117"><a data-dcnode-id="7433" href="#cite_note-117"><span data-dcnode-id="7434" instrument_node="">[117]</span></a></sup><span data-dcnode-id="7431" instrument_node=""> international forces can significantly affect democratization. Global forces like the diffusion of democratic ideas and pressure from international financial institutions to democratize have led o democratization.</span><sup class="reference" data-dcnode-id="7428" id="cite_ref-118"><a data-dcnode-id="7429" href="#cite_note-118"><span data-dcnode-id="7430" instrument_node="">[118]</span></a></sup><span data-dcnode-id="7427" instrument_node="">
</span></p><span data-dcnode-id="7425" instrument_node="">
</span><h2 data-dcnode-id="7415"><span class="mw-headline" data-dcnode-id="7423" id="Transitions"><span data-dcnode-id="7424" instrument_node="">Transitions</span></span><span class="mw-editsection" data-dcnode-id="7416"><span class="mw-editsection-bracket" data-dcnode-id="7421"><span data-dcnode-id="7422" instrument_node="">[</span></span><a data-dcnode-id="7419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D19" title="Edit section: Transitions"><span data-dcnode-id="7420" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7417"><span data-dcnode-id="7418" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7414" instrument_node="">
</span><p data-dcnode-id="7402"><span data-dcnode-id="7413" instrument_node="">Democracy development has often been slow, violent, and marked by frequent reversals.</span><sup class="reference" data-dcnode-id="7410" id="cite_ref-119"><a data-dcnode-id="7411" href="#cite_note-119"><span data-dcnode-id="7412" instrument_node="">[119]</span></a></sup><sup class="reference" data-dcnode-id="7407" id="cite_ref-120"><a data-dcnode-id="7408" href="#cite_note-120"><span data-dcnode-id="7409" instrument_node="">[120]</span></a></sup><sup class="reference" data-dcnode-id="7404" id="cite_ref-121"><a data-dcnode-id="7405" href="#cite_note-121"><span data-dcnode-id="7406" instrument_node="">[121]</span></a></sup><span data-dcnode-id="7403" instrument_node="">
</span></p><span data-dcnode-id="7401" instrument_node="">
</span><h3 data-dcnode-id="7391"><span class="mw-headline" data-dcnode-id="7399" id="Historical_cases"><span data-dcnode-id="7400" instrument_node="">Historical cases</span></span><span class="mw-editsection" data-dcnode-id="7392"><span class="mw-editsection-bracket" data-dcnode-id="7397"><span data-dcnode-id="7398" instrument_node="">[</span></span><a data-dcnode-id="7395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D20" title="Edit section: Historical cases"><span data-dcnode-id="7396" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7393"><span data-dcnode-id="7394" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7390" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7381"><div class="thumbinner" data-dcnode-id="7382" style="width:222px;"><a class="image" data-dcnode-id="7388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMagna_Carta_%28British_Library_Cotton_MS_Augustus_II.106%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="7389" data-file-height="4800" data-file-width="7200" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Magna_Carta_%2528British_Library_Cotton_MS_Augustus_II.106%2529.jpg/220px-Magna_Carta_%2528British_Library_Cotton_MS_Augustus_II.106%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Magna_Carta_%28British_Library_Cotton_MS_Augustus_II.106%29.jpg/330px-Magna_Carta_%28British_Library_Cotton_MS_Augustus_II.106%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Magna_Carta_%28British_Library_Cotton_MS_Augustus_II.106%29.jpg/440px-Magna_Carta_%28British_Library_Cotton_MS_Augustus_II.106%29.jpg 2x" width="220"></a><span data-dcnode-id="7387" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7383"><div class="magnify" data-dcnode-id="7385"><a class="internal" data-dcnode-id="7386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMagna_Carta_%28British_Library_Cotton_MS_Augustus_II.106%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="7384" instrument_node="">Magna Carta in the British Library. The document was described as "the chief cause of Democracy in England".</span></div></div></div><span data-dcnode-id="7380" instrument_node="">
</span><p data-dcnode-id="7319"><span data-dcnode-id="7379" instrument_node="">In Great Britain, there was </span><a data-dcnode-id="7377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magna_Carta%2317th%25E2%2580%259318th_centuries" title="Magna Carta"><span data-dcnode-id="7378" instrument_node="">renewed interest in Magna Carta</span></a><span data-dcnode-id="7376" instrument_node=""> in the 17th century.</span><sup class="reference" data-dcnode-id="7373" id="cite_ref-122"><a data-dcnode-id="7374" href="#cite_note-122"><span data-dcnode-id="7375" instrument_node="">[122]</span></a></sup><span data-dcnode-id="7372" instrument_node=""> The </span><a data-dcnode-id="7370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliament_of_England" title="Parliament of England"><span data-dcnode-id="7371" instrument_node="">Parliament of England</span></a><span data-dcnode-id="7369" instrument_node=""> enacted the </span><a data-dcnode-id="7367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petition_of_Right" title="Petition of Right"><span data-dcnode-id="7368" instrument_node="">Petition of Right</span></a><span data-dcnode-id="7366" instrument_node=""> in 1628 which established certain liberties for subjects. The </span><a data-dcnode-id="7364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/English_Civil_War" title="English Civil War"><span data-dcnode-id="7365" instrument_node="">English Civil War</span></a><span data-dcnode-id="7363" instrument_node=""> (1642–1651) was fought between the King and an oligarchic but elected Parliament,</span><sup class="reference" data-dcnode-id="7360" id="cite_ref-123"><a data-dcnode-id="7361" href="#cite_note-123"><span data-dcnode-id="7362" instrument_node="">[123]</span></a></sup><span data-dcnode-id="7359" instrument_node=""> during which the idea of a political party took form with groups debating rights to political representation during the </span><a data-dcnode-id="7357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Putney_Debates" title="Putney Debates"><span data-dcnode-id="7358" instrument_node="">Putney Debates</span></a><span data-dcnode-id="7356" instrument_node=""> of 1647.</span><sup class="reference" data-dcnode-id="7353" id="cite_ref-124"><a data-dcnode-id="7354" href="#cite_note-124"><span data-dcnode-id="7355" instrument_node="">[124]</span></a></sup><span data-dcnode-id="7352" instrument_node=""> Subsequently, </span><a data-dcnode-id="7350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Protectorate" title="The Protectorate"><span data-dcnode-id="7351" instrument_node="">the Protectorate</span></a><span data-dcnode-id="7349" instrument_node=""> (1653–59) and the </span><a data-dcnode-id="7347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stuart_Restoration" title="Stuart Restoration"><span data-dcnode-id="7348" instrument_node="">English Restoration</span></a><span data-dcnode-id="7346" instrument_node=""> (1660) restored more autocratic rule although Parliament passed the </span><a data-dcnode-id="7344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Habeas_Corpus_Act_1679" title="Habeas Corpus Act 1679"><span data-dcnode-id="7345" instrument_node="">Habeas Corpus Act</span></a><span data-dcnode-id="7343" instrument_node=""> in 1679, which strengthened the convention that forbade detention lacking sufficient cause or evidence. The </span><a data-dcnode-id="7341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glorious_Revolution" title="Glorious Revolution"><span data-dcnode-id="7342" instrument_node="">Glorious Revolution</span></a><span data-dcnode-id="7340" instrument_node=""> in 1688 established a strong Parliament that passed the </span><a data-dcnode-id="7338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bill_of_Rights_1689" title="Bill of Rights 1689"><span data-dcnode-id="7339" instrument_node="">Bill of Rights 1689</span></a><span data-dcnode-id="7337" instrument_node="">, which codified certain rights and liberties for individuals.</span><sup class="reference" data-dcnode-id="7334" id="cite_ref-125"><a data-dcnode-id="7335" href="#cite_note-125"><span data-dcnode-id="7336" instrument_node="">[125]</span></a></sup><span data-dcnode-id="7333" instrument_node=""> It set out the requirement for regular parliaments, free elections, rules for freedom of speech in Parliament and limited the power of the monarch, ensuring that, unlike much of the rest of Europe, </span><a data-dcnode-id="7331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Absolute_monarchy" title="Absolute monarchy"><span data-dcnode-id="7332" instrument_node="">royal absolutism</span></a><span data-dcnode-id="7330" instrument_node=""> would not prevail.</span><sup class="reference" data-dcnode-id="7327" id="cite_ref-126"><a data-dcnode-id="7328" href="#cite_note-126"><span data-dcnode-id="7329" instrument_node="">[126]</span></a></sup><sup class="reference" data-dcnode-id="7324" id="cite_ref-127"><a data-dcnode-id="7325" href="#cite_note-127"><span data-dcnode-id="7326" instrument_node="">[127]</span></a></sup><span data-dcnode-id="7323" instrument_node=""> Only with the </span><a data-dcnode-id="7321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Representation_of_the_People_Act_1884" title="Representation of the People Act 1884"><span data-dcnode-id="7322" instrument_node="">Representation of the People Act 1884</span></a><span data-dcnode-id="7320" instrument_node=""> did a majority of the males get the vote.
</span></p><p data-dcnode-id="7267"><span data-dcnode-id="7318" instrument_node="">The </span><a data-dcnode-id="7316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Revolution" title="American Revolution"><span data-dcnode-id="7317" instrument_node="">American Revolution</span></a><span data-dcnode-id="7315" instrument_node=""> (1775–1783) created the United States. The new </span><a data-dcnode-id="7313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_the_United_States" title="Constitution of the United States"><span data-dcnode-id="7314" instrument_node="">Constitution</span></a><span data-dcnode-id="7312" instrument_node=""> established a relatively strong federal national government that included an </span><a data-dcnode-id="7310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_United_States" title="President of the United States"><span data-dcnode-id="7311" instrument_node="">executive</span></a><span data-dcnode-id="7309" instrument_node="">, a </span><a data-dcnode-id="7307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_the_United_States" title="Supreme Court of the United States"><span data-dcnode-id="7308" instrument_node="">national judiciary</span></a><span data-dcnode-id="7306" instrument_node="">, and a bicameral </span><a data-dcnode-id="7304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Congress" title="United States Congress"><span data-dcnode-id="7305" instrument_node="">Congress</span></a><span data-dcnode-id="7303" instrument_node=""> that represented states in the </span><a data-dcnode-id="7301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Senate" title="United States Senate"><span data-dcnode-id="7302" instrument_node="">Senate</span></a><span data-dcnode-id="7300" instrument_node=""> and the population in the </span><a data-dcnode-id="7298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="7299" instrument_node="">House of Representatives</span></a><span data-dcnode-id="7297" instrument_node="">.</span><sup class="reference" data-dcnode-id="7294" id="cite_ref-Wood,_1992_128-0"><a data-dcnode-id="7295" href="#cite_note-Wood,_1992-128"><span data-dcnode-id="7296" instrument_node="">[128]</span></a></sup><sup class="reference" data-dcnode-id="7291" id="cite_ref-129"><a data-dcnode-id="7292" href="#cite_note-129"><span data-dcnode-id="7293" instrument_node="">[129]</span></a></sup><span data-dcnode-id="7290" instrument_node=""> In many fields, it was a success ideologically in the sense that a relatively true republic was established that never had a single dictator, but </span><a data-dcnode-id="7288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_rights_in_the_United_States" title="Voting rights in the United States"><span data-dcnode-id="7289" instrument_node="">voting rights</span></a><span data-dcnode-id="7287" instrument_node=""> were initially restricted to </span><a data-dcnode-id="7285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_Americans" title="White Americans"><span data-dcnode-id="7286" instrument_node="">white</span></a><span data-dcnode-id="7284" instrument_node=""> male property owners (about 6% of the population).</span><sup class="reference" data-dcnode-id="7281" id="cite_ref-130"><a data-dcnode-id="7282" href="#cite_note-130"><span data-dcnode-id="7283" instrument_node="">[130]</span></a></sup><span data-dcnode-id="7280" instrument_node=""> Slavery was not abolished in the southern states until the constitutional </span><a data-dcnode-id="7278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reconstruction_Amendments" title="Reconstruction Amendments"><span data-dcnode-id="7279" instrument_node="">Amendments</span></a><span data-dcnode-id="7277" instrument_node=""> of the </span><a data-dcnode-id="7275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reconstruction_era" title="Reconstruction era"><span data-dcnode-id="7276" instrument_node="">Reconstruction era</span></a><span data-dcnode-id="7274" instrument_node=""> following the </span><a data-dcnode-id="7272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Civil_War" title="American Civil War"><span data-dcnode-id="7273" instrument_node="">American Civil War</span></a><span data-dcnode-id="7271" instrument_node=""> (1861–1865) and the </span><a data-dcnode-id="7269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_rights_movement" title="Civil rights movement"><span data-dcnode-id="7270" instrument_node="">Civil Rights</span></a><span data-dcnode-id="7268" instrument_node=""> given to African-Americans were only achieved in the 1960s.
</span></p><p data-dcnode-id="7235"><span data-dcnode-id="7266" instrument_node="">The </span><a data-dcnode-id="7264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Revolution" title="French Revolution"><span data-dcnode-id="7265" instrument_node="">French Revolution</span></a><span data-dcnode-id="7263" instrument_node=""> (1789) briefly allowed a wide franchise. The </span><a data-dcnode-id="7261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Revolutionary_Wars" title="French Revolutionary Wars"><span data-dcnode-id="7262" instrument_node="">French Revolutionary Wars</span></a><span data-dcnode-id="7260" instrument_node=""> and the </span><a data-dcnode-id="7258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleonic_Wars" title="Napoleonic Wars"><span data-dcnode-id="7259" instrument_node="">Napoleonic Wars</span></a><span data-dcnode-id="7257" instrument_node=""> lasted for more than twenty years. The </span><a data-dcnode-id="7255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Directory" title="French Directory"><span data-dcnode-id="7256" instrument_node="">French Directory</span></a><span data-dcnode-id="7254" instrument_node=""> was more oligarchic. The </span><a data-dcnode-id="7252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_French_Empire" title="First French Empire"><span data-dcnode-id="7253" instrument_node="">First French Empire</span></a><span data-dcnode-id="7251" instrument_node=""> and the </span><a data-dcnode-id="7249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bourbon_Restoration_in_France" title="Bourbon Restoration in France"><span data-dcnode-id="7250" instrument_node="">Bourbon Restoration</span></a><span data-dcnode-id="7248" instrument_node=""> restored more autocratic rule. The </span><a data-dcnode-id="7246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Second_Republic" title="French Second Republic"><span data-dcnode-id="7247" instrument_node="">French Second Republic</span></a><span data-dcnode-id="7245" instrument_node=""> had universal male suffrage but was followed by the </span><a data-dcnode-id="7243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_French_Empire" title="Second French Empire"><span data-dcnode-id="7244" instrument_node="">Second French Empire</span></a><span data-dcnode-id="7242" instrument_node="">. The </span><a data-dcnode-id="7240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franco-Prussian_War" title="Franco-Prussian War"><span data-dcnode-id="7241" instrument_node="">Franco-Prussian War</span></a><span data-dcnode-id="7239" instrument_node=""> (1870–71) resulted in the </span><a data-dcnode-id="7237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Third_Republic" title="French Third Republic"><span data-dcnode-id="7238" instrument_node="">French Third Republic</span></a><span data-dcnode-id="7236" instrument_node="">.
</span></p><p data-dcnode-id="7194"><span data-dcnode-id="7234" instrument_node="">Germany established its first democracy in 1919 with the creation of the </span><a data-dcnode-id="7232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Weimar_Republic" title="Weimar Republic"><span data-dcnode-id="7233" instrument_node="">Weimar Republic</span></a><span data-dcnode-id="7231" instrument_node="">, a parliamentary republic created following the </span><a data-dcnode-id="7229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Empire" title="German Empire"><span data-dcnode-id="7230" instrument_node="">German Empire</span></a><span data-dcnode-id="7228" instrument_node="">'s defeat in </span><a data-dcnode-id="7226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="7227" instrument_node="">World War I</span></a><span data-dcnode-id="7225" instrument_node="">. The Weimar Republic lasted only 14 years before it collapsed and </span><a data-dcnode-id="7223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adolf_Hitler%2527s_rise_to_power" title="Adolf Hitler's rise to power"><span data-dcnode-id="7224" instrument_node="">was replaced</span></a><span data-dcnode-id="7222" instrument_node=""> by </span><a data-dcnode-id="7220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Germany" title="Nazi Germany"><span data-dcnode-id="7221" instrument_node="">Nazi dictatorship</span></a><span data-dcnode-id="7219" instrument_node="">.</span><sup class="reference" data-dcnode-id="7216" id="cite_ref-Berger_131-0"><a data-dcnode-id="7217" href="#cite_note-Berger-131"><span data-dcnode-id="7218" instrument_node="">[131]</span></a></sup><span data-dcnode-id="7215" instrument_node=""> Historians continue to debate the reasons why the Weimar Republic's attempt at democratization failed.</span><sup class="reference" data-dcnode-id="7212" id="cite_ref-Berger_131-1"><a data-dcnode-id="7213" href="#cite_note-Berger-131"><span data-dcnode-id="7214" instrument_node="">[131]</span></a></sup><span data-dcnode-id="7211" instrument_node=""> After Germany </span><a data-dcnode-id="7209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/End_of_World_War_II_in_Europe" title="End of World War II in Europe"><span data-dcnode-id="7210" instrument_node="">was militarily defeated in World War II</span></a><span data-dcnode-id="7208" instrument_node="">, democracy was reestablished in </span><a data-dcnode-id="7206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Germany" title="West Germany"><span data-dcnode-id="7207" instrument_node="">West Germany</span></a><span data-dcnode-id="7205" instrument_node=""> during the </span><a data-dcnode-id="7203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied-occupied_Germany" title="Allied-occupied Germany"><span data-dcnode-id="7204" instrument_node="">U.S.-led occupation</span></a><span data-dcnode-id="7202" instrument_node=""> which undertook the </span><a data-dcnode-id="7200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Denazification" title="Denazification"><span data-dcnode-id="7201" instrument_node="">denazification</span></a><span data-dcnode-id="7199" instrument_node=""> of society.</span><sup class="reference" data-dcnode-id="7196" id="cite_ref-132"><a data-dcnode-id="7197" href="#cite_note-132"><span data-dcnode-id="7198" instrument_node="">[132]</span></a></sup><span data-dcnode-id="7195" instrument_node="">
</span></p><p data-dcnode-id="7180"><span data-dcnode-id="7193" instrument_node="">The </span><a data-dcnode-id="7191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Italy" title="Kingdom of Italy"><span data-dcnode-id="7192" instrument_node="">Kingdom of Italy</span></a><span data-dcnode-id="7190" instrument_node="">, after the unification of Italy in 1861, was a </span><a data-dcnode-id="7188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitutional_monarchy" title="Constitutional monarchy"><span data-dcnode-id="7189" instrument_node="">constitutional monarchy</span></a><span data-dcnode-id="7187" instrument_node=""> with the King having considerable powers. </span><a class="mw-redirect" data-dcnode-id="7185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Italian_Fascism" title="Italian Fascism"><span data-dcnode-id="7186" instrument_node="">Italian Fascism</span></a><span data-dcnode-id="7184" instrument_node=""> created a dictatorship after the World War I. World War II resulted in the </span><a data-dcnode-id="7182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Italy" title="Italy"><span data-dcnode-id="7183" instrument_node="">Italian Republic</span></a><span data-dcnode-id="7181" instrument_node="">.
</span></p><p data-dcnode-id="7126"><span data-dcnode-id="7179" instrument_node="">In </span><a data-dcnode-id="7177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="7178" instrument_node="">Japan</span></a><span data-dcnode-id="7176" instrument_node="">, limited democratic reforms were introduced during the </span><a data-dcnode-id="7174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meiji_%28era%29" title="Meiji (era)"><span data-dcnode-id="7175" instrument_node="">Meiji</span></a><span data-dcnode-id="7173" instrument_node=""> period (when the industrial modernization of Japan began), the </span><a data-dcnode-id="7171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taish%25C5%258D" title="Taishō"><span data-dcnode-id="7172" instrument_node="">Taishō</span></a><span data-dcnode-id="7170" instrument_node=""> period (1912–1926), and the early </span><a data-dcnode-id="7168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sh%25C5%258Dwa_%281926%25E2%2580%25931989%29" title="Shōwa (1926–1989)"><span data-dcnode-id="7169" instrument_node="">Shōwa</span></a><span data-dcnode-id="7167" instrument_node=""> period.</span><sup class="reference" data-dcnode-id="7164" id="cite_ref-Calder_133-0"><a data-dcnode-id="7165" href="#cite_note-Calder-133"><span data-dcnode-id="7166" instrument_node="">[133]</span></a></sup><span data-dcnode-id="7163" instrument_node=""> Despite pro-democracy movements such as the </span><a data-dcnode-id="7161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_and_People%2527s_Rights_Movement" title="Freedom and People's Rights Movement"><span data-dcnode-id="7162" instrument_node="">Freedom and People's Rights Movement</span></a><span data-dcnode-id="7160" instrument_node=""> (1870s and 1880s) and some proto-democratic institutions, Japanese society remained constrained by a highly conservative society and bureaucracy.</span><sup class="reference" data-dcnode-id="7157" id="cite_ref-Calder_133-1"><a data-dcnode-id="7158" href="#cite_note-Calder-133"><span data-dcnode-id="7159" instrument_node="">[133]</span></a></sup><span data-dcnode-id="7156" instrument_node=""> Historian </span><a data-dcnode-id="7154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kent_E._Calder" title="Kent E. Calder"><span data-dcnode-id="7155" instrument_node="">Kent E. Calder</span></a><span data-dcnode-id="7153" instrument_node=""> notes that writers that "Meiji leadership embraced constitutional government with some pluralist features for essentially tactical reasons" and that pre-World war II Japanese society was dominated by a "loose coalition" of "landed rural elites, big business, and the military" that was averse to pluralism and reformism.</span><sup class="reference" data-dcnode-id="7150" id="cite_ref-Calder_133-2"><a data-dcnode-id="7151" href="#cite_note-Calder-133"><span data-dcnode-id="7152" instrument_node="">[133]</span></a></sup><span data-dcnode-id="7149" instrument_node=""> While the </span><a data-dcnode-id="7147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Diet%23History" title="National Diet"><span data-dcnode-id="7148" instrument_node="">Imperial Diet</span></a><span data-dcnode-id="7146" instrument_node=""> survived the impacts of </span><a data-dcnode-id="7144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japanese_militarism" title="Japanese militarism"><span data-dcnode-id="7145" instrument_node="">Japanese militarism</span></a><span data-dcnode-id="7143" instrument_node="">, the </span><a data-dcnode-id="7141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Depression" title="Great Depression"><span data-dcnode-id="7142" instrument_node="">Great Depression</span></a><span data-dcnode-id="7140" instrument_node="">, and the </span><a data-dcnode-id="7138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacific_War" title="Pacific War"><span data-dcnode-id="7139" instrument_node="">Pacific War</span></a><span data-dcnode-id="7137" instrument_node="">, other pluralistic institutions, such as </span><a data-dcnode-id="7135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_parties_of_the_Empire_of_Japan" title="Political parties of the Empire of Japan"><span data-dcnode-id="7136" instrument_node="">political parties</span></a><span data-dcnode-id="7134" instrument_node="">, did not. After World War II, during the </span><a data-dcnode-id="7132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Occupation_of_Japan" title="Occupation of Japan"><span data-dcnode-id="7133" instrument_node="">Allied occupation</span></a><span data-dcnode-id="7131" instrument_node="">, Japan adopted a much more vigorous, pluralistic democracy.</span><sup class="reference" data-dcnode-id="7128" id="cite_ref-Calder_133-3"><a data-dcnode-id="7129" href="#cite_note-Calder-133"><span data-dcnode-id="7130" instrument_node="">[133]</span></a></sup><span data-dcnode-id="7127" instrument_node="">
</span></p><span data-dcnode-id="7125" instrument_node="">
</span><h3 data-dcnode-id="7115"><span class="mw-headline" data-dcnode-id="7123" id="Since_1972"><span data-dcnode-id="7124" instrument_node="">Since 1972</span></span><span class="mw-editsection" data-dcnode-id="7116"><span class="mw-editsection-bracket" data-dcnode-id="7121"><span data-dcnode-id="7122" instrument_node="">[</span></span><a data-dcnode-id="7119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D21" title="Edit section: Since 1972"><span data-dcnode-id="7120" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7117"><span data-dcnode-id="7118" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7114" instrument_node="">
</span><p data-dcnode-id="7105"><span data-dcnode-id="7113" instrument_node="">According to a study by </span><a data-dcnode-id="7111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_House" title="Freedom House"><span data-dcnode-id="7112" instrument_node="">Freedom House</span></a><span data-dcnode-id="7110" instrument_node="">, in 67 countries where dictatorships have fallen since 1972, nonviolent civic resistance was a strong influence over 70 percent of the time. In these transitions, changes were catalyzed not through foreign invasion, and only rarely through armed revolt or voluntary elite-driven reforms, but overwhelmingly by democratic civil society organizations utilizing nonviolent action and other forms of civil resistance, such as strikes, boycotts, civil disobedience, and mass protests.</span><sup class="reference" data-dcnode-id="7107" id="cite_ref-134"><a data-dcnode-id="7108" href="#cite_note-134"><span data-dcnode-id="7109" instrument_node="">[134]</span></a></sup><span data-dcnode-id="7106" instrument_node="">
</span></p><span data-dcnode-id="7104" instrument_node="">
</span><h2 data-dcnode-id="7094"><span class="mw-headline" data-dcnode-id="7102" id="Indicators"><span data-dcnode-id="7103" instrument_node="">Indicators</span></span><span class="mw-editsection" data-dcnode-id="7095"><span class="mw-editsection-bracket" data-dcnode-id="7100"><span data-dcnode-id="7101" instrument_node="">[</span></span><a data-dcnode-id="7098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D22" title="Edit section: Indicators"><span data-dcnode-id="7099" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7096"><span data-dcnode-id="7097" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7093" instrument_node="">
</span><p data-dcnode-id="7088"><span data-dcnode-id="7092" instrument_node="">One influential survey in democratization is that of </span><a data-dcnode-id="7090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_House" title="Freedom House"><span data-dcnode-id="7091" instrument_node="">Freedom House</span></a><span data-dcnode-id="7089" instrument_node="">, which arose during the Cold War. Freedom House, today an institution and a think tank, produces one of the most comprehensive "freedom measures" nationally and internationally and by extension a measure of democratization. Freedom House categorizes all countries of the world according to a seven-point value system with over 200 questions on the survey and multiple survey representatives in various parts of every nation. The total raw points of every country places the country in one of three categories: Free, Partly Free, or not Free.
</span></p><p data-dcnode-id="7076"><span data-dcnode-id="7087" instrument_node="">One study simultaneously examining the relationship between market economy (measured with one </span><a data-dcnode-id="7085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Index_of_Economic_Freedom" title="Index of Economic Freedom"><span data-dcnode-id="7086" instrument_node="">Index of Economic Freedom</span></a><span data-dcnode-id="7084" instrument_node="">), economic development (measured with GDP/capita), and political freedom (measured with the Freedom House index) found that high </span><a data-dcnode-id="7082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_freedom" title="Economic freedom"><span data-dcnode-id="7083" instrument_node="">economic freedom</span></a><span data-dcnode-id="7081" instrument_node=""> increases GDP/capita and a high GDP/capita increases economic freedom. A high GDP/capita also increases political freedom but political freedom did not increase GDP/capita. There was no direct relationship either way between economic freedom and political freedom if keeping GDP/capita constant.</span><sup class="reference" data-dcnode-id="7078" id="cite_ref-135"><a data-dcnode-id="7079" href="#cite_note-135"><span data-dcnode-id="7080" instrument_node="">[135]</span></a></sup><span data-dcnode-id="7077" instrument_node="">
</span></p><span data-dcnode-id="7075" instrument_node="">
</span><h2 data-dcnode-id="7065"><span class="mw-headline" data-dcnode-id="7073" id="In_other_contexts"><span data-dcnode-id="7074" instrument_node="">In other contexts</span></span><span class="mw-editsection" data-dcnode-id="7066"><span class="mw-editsection-bracket" data-dcnode-id="7071"><span data-dcnode-id="7072" instrument_node="">[</span></span><a data-dcnode-id="7069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D23" title="Edit section: In other contexts"><span data-dcnode-id="7070" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7067"><span data-dcnode-id="7068" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7064" instrument_node="">
</span><p data-dcnode-id="7062"><span data-dcnode-id="7063" instrument_node="">Although democratization is most often thought of in the context of national or regional politics, the term can also be applied to:
</span></p><span data-dcnode-id="7061" instrument_node="">
</span><h3 data-dcnode-id="7051"><span class="mw-headline" data-dcnode-id="7059" id="International_bodies"><span data-dcnode-id="7060" instrument_node="">International bodies</span></span><span class="mw-editsection" data-dcnode-id="7052"><span class="mw-editsection-bracket" data-dcnode-id="7057"><span data-dcnode-id="7058" instrument_node="">[</span></span><a data-dcnode-id="7055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D24" title="Edit section: International bodies"><span data-dcnode-id="7056" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7053"><span data-dcnode-id="7054" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7050" instrument_node="">
</span><ul data-dcnode-id="7041"><li data-dcnode-id="7042"><span data-dcnode-id="7049" instrument_node="">International bodies (e.g. the </span><a data-dcnode-id="7047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="7048" instrument_node="">United Nations</span></a><span data-dcnode-id="7046" instrument_node="">) where there is an ongoing call for reform and altered voting structures and </span><a data-dcnode-id="7044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_system" title="Electoral system"><span data-dcnode-id="7045" instrument_node="">voting systems</span></a><span data-dcnode-id="7043" instrument_node="">.</span></li></ul><span data-dcnode-id="7040" instrument_node="">
</span><h3 data-dcnode-id="7030"><span class="mw-headline" data-dcnode-id="7038" id="Corporations"><span data-dcnode-id="7039" instrument_node="">Corporations</span></span><span class="mw-editsection" data-dcnode-id="7031"><span class="mw-editsection-bracket" data-dcnode-id="7036"><span data-dcnode-id="7037" instrument_node="">[</span></span><a data-dcnode-id="7034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D25" title="Edit section: Corporations"><span data-dcnode-id="7035" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7032"><span data-dcnode-id="7033" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7029" instrument_node="">
</span><p data-dcnode-id="7012"><span data-dcnode-id="7028" instrument_node="">The concept of democratization can also be applied in </span><a data-dcnode-id="7026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corporation" title="Corporation"><span data-dcnode-id="7027" instrument_node="">corporations</span></a><span data-dcnode-id="7025" instrument_node=""> where the traditional power structure was top-down direction and the boss-knows-best (even a "</span><a data-dcnode-id="7023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pointy-haired_Boss" title="Pointy-haired Boss"><span data-dcnode-id="7024" instrument_node="">Pointy-haired Boss</span></a><span data-dcnode-id="7022" instrument_node="">");   This is quite different from consultation, </span><a data-dcnode-id="7020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empowerment" title="Empowerment"><span data-dcnode-id="7021" instrument_node="">empowerment</span></a><span data-dcnode-id="7019" instrument_node=""> (of lower levels) and a diffusion of </span><a data-dcnode-id="7017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decision-making" title="Decision-making"><span data-dcnode-id="7018" instrument_node="">decision-making</span></a><span data-dcnode-id="7016" instrument_node=""> (power) throughout the firm, as advocated by </span><a data-dcnode-id="7014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Workplace_democracy" title="Workplace democracy"><span data-dcnode-id="7015" instrument_node="">workplace democracy</span></a><span data-dcnode-id="7013" instrument_node=""> movements.
</span></p><span data-dcnode-id="7011" instrument_node="">
</span><h3 data-dcnode-id="7001"><span class="mw-headline" data-dcnode-id="7009" id="The_Internet"><span data-dcnode-id="7010" instrument_node="">The Internet</span></span><span class="mw-editsection" data-dcnode-id="7002"><span class="mw-editsection-bracket" data-dcnode-id="7007"><span data-dcnode-id="7008" instrument_node="">[</span></span><a data-dcnode-id="7005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D26" title="Edit section: The Internet"><span data-dcnode-id="7006" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7003"><span data-dcnode-id="7004" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7000" instrument_node="">
</span><p data-dcnode-id="6980"><span data-dcnode-id="6999" instrument_node="">The loose anarchistic structure of the </span><a data-dcnode-id="6997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet_Engineering_Task_Force" title="Internet Engineering Task Force"><span data-dcnode-id="6998" instrument_node="">Internet Engineering Task Force</span></a><span data-dcnode-id="6996" instrument_node=""> and the </span><a data-dcnode-id="6994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet" title="Internet"><span data-dcnode-id="6995" instrument_node="">Internet</span></a><span data-dcnode-id="6993" instrument_node=""> itself have inspired some groups to call for more democratization of how </span><a data-dcnode-id="6991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Domain_name" title="Domain name"><span data-dcnode-id="6992" instrument_node="">domain names</span></a><span data-dcnode-id="6990" instrument_node=""> are held, upheld, and lost.  They note that the </span><a data-dcnode-id="6988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Domain_Name_System" title="Domain Name System"><span data-dcnode-id="6989" instrument_node="">Domain Name System</span></a><span data-dcnode-id="6987" instrument_node=""> under </span><a data-dcnode-id="6985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ICANN" title="ICANN"><span data-dcnode-id="6986" instrument_node="">ICANN</span></a><span data-dcnode-id="6984" instrument_node=""> is the least democratic and most centralized part of the Internet, using a simple model of first-come-first-served to the names of things. </span><a data-dcnode-id="6982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ralph_Nader" title="Ralph Nader"><span data-dcnode-id="6983" instrument_node="">Ralph Nader</span></a><span data-dcnode-id="6981" instrument_node=""> called this "corporatization of the dictionary."
</span></p><span data-dcnode-id="6979" instrument_node="">
</span><h3 data-dcnode-id="6969"><span class="mw-headline" data-dcnode-id="6977" id="Knowledge"><span data-dcnode-id="6978" instrument_node="">Knowledge</span></span><span class="mw-editsection" data-dcnode-id="6970"><span class="mw-editsection-bracket" data-dcnode-id="6975"><span data-dcnode-id="6976" instrument_node="">[</span></span><a data-dcnode-id="6973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D27" title="Edit section: Knowledge"><span data-dcnode-id="6974" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6971"><span data-dcnode-id="6972" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6968" instrument_node="">
</span><p data-dcnode-id="6963"><span data-dcnode-id="6967" instrument_node="">The </span><a data-dcnode-id="6965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratization_of_knowledge" title="Democratization of knowledge"><span data-dcnode-id="6966" instrument_node="">democratization of knowledge</span></a><span data-dcnode-id="6964" instrument_node=""> is the spread of ability to create and legitimise knowledge among common people, in contrast to knowledge being controlled by elite groups.
</span></p><span data-dcnode-id="6962" instrument_node="">
</span><h3 data-dcnode-id="6951"><span data-dcnode-id="6961" id="Design.2C_products_and_services"></span><span class="mw-headline" data-dcnode-id="6959" id="Design,_products_and_services"><span data-dcnode-id="6960" instrument_node="">Design, products and services</span></span><span class="mw-editsection" data-dcnode-id="6952"><span class="mw-editsection-bracket" data-dcnode-id="6957"><span data-dcnode-id="6958" instrument_node="">[</span></span><a data-dcnode-id="6955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D28" title="Edit section: Design, products and services"><span data-dcnode-id="6956" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6953"><span data-dcnode-id="6954" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6950" instrument_node="">
</span><p data-dcnode-id="6928"><span data-dcnode-id="6949" instrument_node="">The term </span><i data-dcnode-id="6947"><span data-dcnode-id="6948" instrument_node="">democratization of innovation</span></i><span data-dcnode-id="6946" instrument_node=""> is defined by </span><a data-dcnode-id="6944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eric_von_Hippel" title="Eric von Hippel"><span data-dcnode-id="6945" instrument_node="">Eric von Hippel</span></a><span data-dcnode-id="6943" instrument_node=""> as the process by which "users of products and services—both firms and individual consumers--are increasingly able to innovate for themselves"—rather than rely on "the manufacturer-centric innovation development systems that have been the mainstay of commerce for hundreds of years."</span><sup class="reference" data-dcnode-id="6940" id="cite_ref-VonHippel_136-0"><a data-dcnode-id="6941" href="#cite_note-VonHippel-136"><span data-dcnode-id="6942" instrument_node="">[136]</span></a></sup><span data-dcnode-id="6939" instrument_node=""> Innovation may be democratized with respect to both physical </span><a data-dcnode-id="6937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Goods" title="Goods"><span data-dcnode-id="6938" instrument_node="">goods</span></a><span data-dcnode-id="6936" instrument_node=""> and to non-physical goods, like </span><a data-dcnode-id="6934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Software" title="Software"><span data-dcnode-id="6935" instrument_node="">software</span></a><span data-dcnode-id="6933" instrument_node="">.</span><sup class="reference" data-dcnode-id="6930" id="cite_ref-VonHippel_136-1"><a data-dcnode-id="6931" href="#cite_note-VonHippel-136"><span data-dcnode-id="6932" instrument_node="">[136]</span></a></sup><span data-dcnode-id="6929" instrument_node="">
</span></p><p data-dcnode-id="6914"><i data-dcnode-id="6926"><span data-dcnode-id="6927" instrument_node="">Design democratization</span></i><span data-dcnode-id="6925" instrument_node=""> refers to the process by which non-designers engage in </span><a data-dcnode-id="6923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Design" title="Design"><span data-dcnode-id="6924" instrument_node="">design</span></a><span data-dcnode-id="6922" instrument_node="">, often through </span><a data-dcnode-id="6920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mass_customization" title="Mass customization"><span data-dcnode-id="6921" instrument_node="">mass customization</span></a><span data-dcnode-id="6919" instrument_node="">.</span><sup class="reference" data-dcnode-id="6916" id="cite_ref-137"><a data-dcnode-id="6917" href="#cite_note-137"><span data-dcnode-id="6918" instrument_node="">[137]</span></a></sup><span data-dcnode-id="6915" instrument_node="">
</span></p><span data-dcnode-id="6913" instrument_node="">
