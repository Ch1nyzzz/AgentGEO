node-id="8873"><a class="external text" data-dcnode-id="8874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3ADemocracy_sidebar%26action%3Dedit"><abbr data-dcnode-id="8875" title="Edit this template"><span data-dcnode-id="8876" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="8866" instrument_node="">
</span><p data-dcnode-id="8847"><b data-dcnode-id="8864"><span data-dcnode-id="8865" instrument_node="">Democratization</span></b><span data-dcnode-id="8863" instrument_node="">, or </span><b data-dcnode-id="8861"><span data-dcnode-id="8862" instrument_node="">democratisation</span></b><span data-dcnode-id="8860" instrument_node="">, is the transition to a more democratic </span><a data-dcnode-id="8858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regime" title="Regime"><span data-dcnode-id="8859" instrument_node="">political regime</span></a><span data-dcnode-id="8857" instrument_node="">, including substantive political changes moving in a democratic direction. It may be the transition from an </span><a data-dcnode-id="8855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authoritarianism" title="Authoritarianism"><span data-dcnode-id="8856" instrument_node="">authoritarian</span></a><span data-dcnode-id="8854" instrument_node=""> regime to a full </span><a data-dcnode-id="8852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy" title="Democracy"><span data-dcnode-id="8853" instrument_node="">democracy</span></a><span data-dcnode-id="8851" instrument_node="">, a transition from an authoritarian political system to a </span><a data-dcnode-id="8849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anocracy" title="Anocracy"><span data-dcnode-id="8850" instrument_node="">semi-democracy</span></a><span data-dcnode-id="8848" instrument_node=""> or transition from a semi-authoritarian political system to a democratic political system.
</span></p><p data-dcnode-id="8836"><span data-dcnode-id="8846" instrument_node="">The outcome may be </span><a data-dcnode-id="8844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_consolidation" title="Democratic consolidation"><span data-dcnode-id="8845" instrument_node="">consolidated</span></a><span data-dcnode-id="8843" instrument_node=""> (as it was for example in the </span><a data-dcnode-id="8841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="8842" instrument_node="">United Kingdom</span></a><span data-dcnode-id="8840" instrument_node="">) or democratization may face frequent reversals (as happened in </span><a data-dcnode-id="8838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chile" title="Chile"><span data-dcnode-id="8839" instrument_node="">Chile</span></a><span data-dcnode-id="8837" instrument_node="">). Different patterns of democratization are often used to explain other political phenomena, such as whether a country goes to a war or whether its economy grows.
</span></p><p data-dcnode-id="8834"><span data-dcnode-id="8835" instrument_node="">Whether and to what extent democratization occurs has been attributed to various factors, including economic development, historical legacies, civil society, and international processes. Some accounts of democratization emphasize how elites drove democratization, whereas other accounts emphasize grassroots bottom-up processes.
</span></p><span data-dcnode-id="8833" instrument_node="">

</span><h2 data-dcnode-id="8535"><span class="mw-headline" data-dcnode-id="8543" id="Causes"><span data-dcnode-id="8544" instrument_node="">Causes</span></span><span class="mw-editsection" data-dcnode-id="8536"><span class="mw-editsection-bracket" data-dcnode-id="8541"><span data-dcnode-id="8542" instrument_node="">[</span></span><a data-dcnode-id="8539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D1" title="Edit section: Causes"><span data-dcnode-id="8540" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8537"><span data-dcnode-id="8538" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8534" instrument_node="">
</span><p data-dcnode-id="8532"><span data-dcnode-id="8533" instrument_node="">There is considerable debate about the factors which affect (e.g., promote or limit) democratization. Economic, cultural, and historical factors have been cited as impacting on the process.
</span></p><span data-dcnode-id="8531" instrument_node="">
</span><h3 data-dcnode-id="8521"><span class="mw-headline" data-dcnode-id="8529" id="Economic_development_and_modernization"><span data-dcnode-id="8530" instrument_node="">Economic development and modernization</span></span><span class="mw-editsection" data-dcnode-id="8522"><span class="mw-editsection-bracket" data-dcnode-id="8527"><span data-dcnode-id="8528" instrument_node="">[</span></span><a data-dcnode-id="8525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D2" title="Edit section: Economic development and modernization"><span data-dcnode-id="8526" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8523"><span data-dcnode-id="8524" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8520" instrument_node="">
</span><p data-dcnode-id="8485"><span data-dcnode-id="8519" instrument_node="">Scholars such as </span><a data-dcnode-id="8517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seymour_Martin_Lipset" title="Seymour Martin Lipset"><span data-dcnode-id="8518" instrument_node="">Seymour Martin Lipset</span></a><span data-dcnode-id="8516" instrument_node="">,</span><sup class="reference" data-dcnode-id="8513" id="cite_ref-2"><a data-dcnode-id="8514" href="#cite_note-2"><span data-dcnode-id="8515" instrument_node="">[2]</span></a></sup><span data-dcnode-id="8512" instrument_node=""> Carles Boix, Susan Stokes,</span><sup class="reference" data-dcnode-id="8509" id="cite_ref-3"><a data-dcnode-id="8510" href="#cite_note-3"><span data-dcnode-id="8511" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8508" instrument_node=""> Dietrich Rueschemeyer, Evelyne Stephens, and John Stephens</span><sup class="reference" data-dcnode-id="8505" id="cite_ref-4"><a data-dcnode-id="8506" href="#cite_note-4"><span data-dcnode-id="8507" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8504" instrument_node=""> argue that </span><a data-dcnode-id="8502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_development" title="Economic development"><span data-dcnode-id="8503" instrument_node="">economic development</span></a><span data-dcnode-id="8501" instrument_node=""> increases the likelihood of democratization. Initially argued by Lipset in 1959, this subsequently been referred to as modernization theory.</span><sup class="reference" data-dcnode-id="8498" id="cite_ref-5"><a data-dcnode-id="8499" href="#cite_note-5"><span data-dcnode-id="8500" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="8495" id="cite_ref-6"><a data-dcnode-id="8496" href="#cite_note-6"><span data-dcnode-id="8497" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8494" instrument_node=""> According to Daniel Treisman, there is "a strong and consistent relationship between higher income and both democratization and democratic survival in the medium term (10–20 years), but not necessarily in shorter time windows."</span><sup class="reference" data-dcnode-id="8491" id="cite_ref-7"><a data-dcnode-id="8492" href="#cite_note-7"><span data-dcnode-id="8493" instrument_node="">[7]</span></a></sup><span data-dcnode-id="8490" instrument_node=""> Robert Dahl argued that market economies provided favorable conditions for democratic institutions.</span><sup class="reference" data-dcnode-id="8487" id="cite_ref-:4_8-0"><a data-dcnode-id="8488" href="#cite_note-:4-8"><span data-dcnode-id="8489" instrument_node="">[8]</span></a></sup><span data-dcnode-id="8486" instrument_node="">
</span></p><p data-dcnode-id="8434"><span data-dcnode-id="8484" instrument_node="">A higher </span><a data-dcnode-id="8482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_countries_by_GDP_%28nominal%29_per_capita" title="List of countries by GDP (nominal) per capita"><span data-dcnode-id="8483" instrument_node="">GDP/capita</span></a><span data-dcnode-id="8481" instrument_node=""> correlates with democracy and some claim the wealthiest democracies have never been observed to fall into authoritarianism.</span><sup class="reference" data-dcnode-id="8478" id="cite_ref-przeworski_9-0"><a data-dcnode-id="8479" href="#cite_note-przeworski-9"><span data-dcnode-id="8480" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8477" instrument_node=""> The rise of Hitler and of the Nazis in Weimar Germany can be seen as an obvious counter-example, but although in early 1930s Germany was already an advanced economy, by that time, the country was also living in a state of economic crisis virtually since the first World War (in the 1910s), a crisis which was eventually worsened by the effects of the Great Depression. There is also the general observation that democracy was very rare before the industrial revolution. Empirical research thus led many to believe that economic development either increases chances for a transition to democracy (</span><a data-dcnode-id="8475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modernization_theory" title="Modernization theory"><span data-dcnode-id="8476" instrument_node="">modernization theory</span></a><span data-dcnode-id="8474" instrument_node="">), or helps newly established democracies consolidate.</span><sup class="reference" data-dcnode-id="8471" id="cite_ref-przeworski_9-1"><a data-dcnode-id="8472" href="#cite_note-przeworski-9"><span data-dcnode-id="8473" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="8468" id="cite_ref-10"><a data-dcnode-id="8469" href="#cite_note-10"><span data-dcnode-id="8470" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8467" instrument_node=""> One study finds that economic development prompts democratization but only in the medium run (10–20 years). This is because development may entrench the incumbent leader but make it more difficult for him deliver the state to a son or trusted aide when he exits.</span><sup class="reference" data-dcnode-id="8464" id="cite_ref-11"><a data-dcnode-id="8465" href="#cite_note-11"><span data-dcnode-id="8466" instrument_node="">[11]</span></a></sup><span data-dcnode-id="8463" instrument_node=""> However, the debate about whether democracy is a consequence of wealth, a cause of it, or both processes are unrelated, is far from conclusive.</span><sup class="reference" data-dcnode-id="8460" id="cite_ref-12"><a data-dcnode-id="8461" href="#cite_note-12"><span data-dcnode-id="8462" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8459" instrument_node=""> Another study suggests that economic development depends on the political stability of a country to promote democracy.</span><sup class="reference" data-dcnode-id="8456" id="cite_ref-13"><a data-dcnode-id="8457" href="#cite_note-13"><span data-dcnode-id="8458" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8455" instrument_node=""> Clark, Robert and Golder, in their reformulation of Albert Hirschman's model of </span><i data-dcnode-id="8453"><span data-dcnode-id="8454" instrument_node="">Exit, Voice and Loyalty</span></i><span data-dcnode-id="8452" instrument_node="">, explain how it is not the increase of wealth in a country </span><i data-dcnode-id="8450"><span data-dcnode-id="8451" instrument_node="">per se</span></i><span data-dcnode-id="8449" instrument_node=""> which influences a democratization process, but rather the changes in the socio-economic structures that come together with the increase of wealth. They explain how these structure changes have been called out to be one of the main reasons several European countries became democratic. When their socioeconomic structures shifted because modernization made the agriculture sector more efficient, bigger investments of time and resources were used for the manufacture and service sectors. In England, for example, members of the gentry began investing more on commercial activities that allowed them to become economically more important for the state. This new kind of productive activities came with new economic power were assets became more difficult for the state to count and hence more difficult to tax. Because of this, predation was no longer possible and the state had to negotiate with the new economic elites to extract revenue. A sustainable bargain had to be reached because the state became more dependent of its citizens remaining loyal and, with this, citizens had now leverage to be taken into account in the decision making process for the country.</span><sup class="reference" data-dcnode-id="8446" id="cite_ref-14"><a data-dcnode-id="8447" href="#cite_note-14"><span data-dcnode-id="8448" instrument_node="">[14]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="8439" style="white-space:nowrap;"><span data-dcnode-id="8445" instrument_node="">[</span><i data-dcnode-id="8441"><a data-dcnode-id="8442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AReliable_sources" title="Wikipedia:Reliable sources"><span data-dcnode-id="8443" title="The material near this tag may rely on an unreliable source. (April 2018)"><span data-dcnode-id="8444" instrument_node="">unreliable source?</span></span></a></i><span data-dcnode-id="8440" instrument_node="">]</span></sup><sup class="reference" data-dcnode-id="8436" id="cite_ref-15"><a data-dcnode-id="8437" href="#cite_note-15"><span data-dcnode-id="8438" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8435" instrument_node="">
</span></p><p data-dcnode-id="8407"><a data-dcnode-id="8432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adam_Przeworski" title="Adam Przeworski"><span data-dcnode-id="8433" instrument_node="">Adam Przeworski</span></a><span data-dcnode-id="8431" instrument_node=""> and </span><a data-dcnode-id="8429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fernando_Limongi" title="Fernando Limongi"><span data-dcnode-id="8430" instrument_node="">Fernando Limongi</span></a><span data-dcnode-id="8428" instrument_node=""> argue that while economic development makes democracies less likely to turn authoritarian, there is insufficient evidence to conclude that development causes democratization (turning an authoritarian state into a democracy).</span><sup class="reference" data-dcnode-id="8425" id="cite_ref-16"><a data-dcnode-id="8426" href="#cite_note-16"><span data-dcnode-id="8427" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8424" instrument_node=""> Eva Bellin argues that under certain circumstances, the bourgeoise and labor are more likely to favor democratization, but less so under other circumstances.</span><sup class="reference" data-dcnode-id="8421" id="cite_ref-17"><a data-dcnode-id="8422" href="#cite_note-17"><span data-dcnode-id="8423" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8420" instrument_node=""> Economic development can boost public support for authoritarian regimes in the short-to-medium term.</span><sup class="reference" data-dcnode-id="8417" id="cite_ref-18"><a data-dcnode-id="8418" href="#cite_note-18"><span data-dcnode-id="8419" instrument_node="">[18]</span></a></sup><span data-dcnode-id="8416" instrument_node=""> Andrew Nathan argues that China is a problematic case for the thesis that economic development causes democratization.</span><sup class="reference" data-dcnode-id="8413" id="cite_ref-19"><a data-dcnode-id="8414" href="#cite_note-19"><span data-dcnode-id="8415" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8412" instrument_node=""> Michael Miller finds that development increases the likelihood of "democratization in regimes that are fragile and unstable, but makes this fragility less likely to begin with."</span><sup class="reference" data-dcnode-id="8409" id="cite_ref-20"><a data-dcnode-id="8410" href="#cite_note-20"><span data-dcnode-id="8411" instrument_node="">[20]</span></a></sup><span data-dcnode-id="8408" instrument_node="">
</span></p><p data-dcnode-id="8394"><span data-dcnode-id="8406" instrument_node="">There is research to suggest that greater urbanization, through various pathways, contributes to democratization.</span><sup class="reference" data-dcnode-id="8403" id="cite_ref-21"><a data-dcnode-id="8404" href="#cite_note-21"><span data-dcnode-id="8405" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="8400" id="cite_ref-22"><a data-dcnode-id="8401" href="#cite_note-22"><span data-dcnode-id="8402" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8399" instrument_node=""> A 2016 study found that preferential trade agreements "encourage the democratization of a country, in particular if the PTA partners are themselves democracies."</span><sup class="reference" data-dcnode-id="8396" id="cite_ref-23"><a data-dcnode-id="8397" href="#cite_note-23"><span data-dcnode-id="8398" instrument_node="">[23]</span></a></sup><span data-dcnode-id="8395" instrument_node="">
</span></p><p data-dcnode-id="8382"><span data-dcnode-id="8393" instrument_node="">Liberalization in autocracies was more likely to succeed in countries that had the advantage of a better starting point concerning political institutions, </span><a data-dcnode-id="8391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gross_domestic_product" title="Gross domestic product"><span data-dcnode-id="8392" instrument_node="">GDP</span></a><span data-dcnode-id="8390" instrument_node="">, and education. These more privileged countries could also carry out key reforms more rapidly, and were able to do so even in areas in which they had no initial advantage. This indicates the presence of a “</span><a data-dcnode-id="8388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matthew_effect" title="Matthew effect"><span data-dcnode-id="8389" instrument_node="">Matthew effect</span></a><span data-dcnode-id="8387" instrument_node="">” in political science: to countries that already have, more is given.</span><sup class="reference" data-dcnode-id="8384" id="cite_ref-24"><a data-dcnode-id="8385" href="#cite_note-24"><span data-dcnode-id="8386" instrument_node="">[24]</span></a></sup><span data-dcnode-id="8383" instrument_node="">
</span></p><p data-dcnode-id="8373"><span data-dcnode-id="8381" instrument_node="">A meta-analysis by </span><a data-dcnode-id="8379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerardo_L._Munck" title="Gerardo L. Munck"><span data-dcnode-id="8380" instrument_node="">Gerardo L. Munck</span></a><span data-dcnode-id="8378" instrument_node=""> of research on Lipset's argument shows that a majority of studies do not support the thesis that higher levels of economic development leads to more democracy.</span><sup class="reference" data-dcnode-id="8375" id="cite_ref-25"><a data-dcnode-id="8376" href="#cite_note-25"><span data-dcnode-id="8377" instrument_node="">[25]</span></a></sup><span data-dcnode-id="8374" instrument_node="">
</span></p><span data-dcnode-id="8372" instrument_node="">
</span><h3 data-dcnode-id="8362"><span class="mw-headline" data-dcnode-id="8370" id="Equality_and_inclusive_institutions"><span data-dcnode-id="8371" instrument_node="">Equality and inclusive institutions</span></span><span class="mw-editsection" data-dcnode-id="8363"><span class="mw-editsection-bracket" data-dcnode-id="8368"><span data-dcnode-id="8369" instrument_node="">[</span></span><a data-dcnode-id="8366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D3" title="Edit section: Equality and inclusive institutions"><span data-dcnode-id="8367" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8364"><span data-dcnode-id="8365" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8361" instrument_node="">
</span><p data-dcnode-id="8339"><span data-dcnode-id="8360" instrument_node="">Acemoglu and Robinson argued that the relationship between </span><a data-dcnode-id="8358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_equality" title="Social equality"><span data-dcnode-id="8359" instrument_node="">social equality</span></a><span data-dcnode-id="8357" instrument_node=""> and democratic transition is complicated: People have less incentive to revolt in an egalitarian society (for example, </span><a data-dcnode-id="8355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Singapore" title="Singapore"><span data-dcnode-id="8356" instrument_node="">Singapore</span></a><span data-dcnode-id="8354" instrument_node="">), so the likelihood of democratization is lower. In a highly unequal society (for example, </span><a data-dcnode-id="8352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Africa" title="South Africa"><span data-dcnode-id="8353" instrument_node="">South Africa</span></a><span data-dcnode-id="8351" instrument_node=""> under </span><a data-dcnode-id="8349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apartheid" title="Apartheid"><span data-dcnode-id="8350" instrument_node="">Apartheid</span></a><span data-dcnode-id="8348" instrument_node="">), the redistribution of wealth and power in a democracy would be so harmful to elites that these would do everything to prevent democratization. Democratization is more likely to emerge somewhere in the middle, in the countries, whose elites offer concessions because (1) they consider the threat of a revolution credible and (2) the cost of the concessions is not too high.</span><sup class="reference" data-dcnode-id="8345" id="cite_ref-acemoglu_26-0"><a data-dcnode-id="8346" href="#cite_note-acemoglu-26"><span data-dcnode-id="8347" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8344" instrument_node=""> This expectation is in line with the empirical research showing that democracy is more stable in egalitarian societies.</span><sup class="reference" data-dcnode-id="8341" id="cite_ref-przeworski_9-2"><a data-dcnode-id="8342" href="#cite_note-przeworski-9"><span data-dcnode-id="8343" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8340" instrument_node="">
</span></p><span data-dcnode-id="8338" instrument_node="">
</span><h3 data-dcnode-id="8328"><span class="mw-headline" data-dcnode-id="8336" id="Culture"><span data-dcnode-id="8337" instrument_node="">Culture</span></span><span class="mw-editsection" data-dcnode-id="8329"><span class="mw-editsection-bracket" data-dcnode-id="8334"><span data-dcnode-id="8335" instrument_node="">[</span></span><a data-dcnode-id="8332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D4" title="Edit section: Culture"><span data-dcnode-id="8333" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8330"><span data-dcnode-id="8331" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8327" instrument_node="">
</span><p data-dcnode-id="8315"><span data-dcnode-id="8326" instrument_node="">It is claimed by some that certain cultures are simply more conducive to democratic values than others. This view is likely to be </span><a data-dcnode-id="8324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnocentrism" title="Ethnocentrism"><span data-dcnode-id="8325" instrument_node="">ethnocentric</span></a><span data-dcnode-id="8323" instrument_node="">. Typically, it is </span><a data-dcnode-id="8321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_culture" title="Western culture"><span data-dcnode-id="8322" instrument_node="">Western culture</span></a><span data-dcnode-id="8320" instrument_node=""> which is cited as "best suited" to democracy, with other cultures portrayed as containing values which make democracy difficult or undesirable. This argument is sometimes used by undemocratic regimes to justify their failure to implement democratic reforms. Today, however, there are many non-Western democracies. Examples include: India, Japan, Indonesia, Namibia, Botswana, Taiwan, and South Korea. Research finds that "Western-educated leaders significantly and substantively improve a country's democratization prospects".</span><sup class="reference" data-dcnode-id="8317" id="cite_ref-27"><a data-dcnode-id="8318" href="#cite_note-27"><span data-dcnode-id="8319" instrument_node="">[27]</span></a></sup><span data-dcnode-id="8316" instrument_node="">
</span></p><p data-dcnode-id="8292"><span data-dcnode-id="8314" instrument_node="">Steven Fish and </span><a data-dcnode-id="8312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Barro" title="Robert Barro"><span data-dcnode-id="8313" instrument_node="">Robert Barro</span></a><span data-dcnode-id="8311" instrument_node=""> have linked Islam to undemocratic outcomes.</span><sup class="reference" data-dcnode-id="8308" id="cite_ref-28"><a data-dcnode-id="8309" href="#cite_note-28"><span data-dcnode-id="8310" instrument_node="">[28]</span></a></sup><sup class="reference" data-dcnode-id="8305" id="cite_ref-29"><a data-dcnode-id="8306" href="#cite_note-29"><span data-dcnode-id="8307" instrument_node="">[29]</span></a></sup><span data-dcnode-id="8304" instrument_node=""> However, Michael Ross argues that the lack of democracies in some parts of the Muslim world has more to do with the adverse effects of the resource curse than Islam.</span><sup class="reference" data-dcnode-id="8301" id="cite_ref-30"><a data-dcnode-id="8302" href="#cite_note-30"><span data-dcnode-id="8303" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8300" instrument_node=""> Lisa Blaydes and Eric Chaney have linked the democratic divergence between the West and the Middle-East to the reliance on </span><a data-dcnode-id="8298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mamluk" title="Mamluk"><span data-dcnode-id="8299" instrument_node="">mamluks</span></a><span data-dcnode-id="8297" instrument_node=""> (slave soldiers) by Muslim rulers whereas European rulers had to rely on local elites for military forces, thus giving those elites bargaining power to push for representative government.</span><sup class="reference" data-dcnode-id="8294" id="cite_ref-31"><a data-dcnode-id="8295" href="#cite_note-31"><span data-dcnode-id="8296" instrument_node="">[31]</span></a></sup><span data-dcnode-id="8293" instrument_node="">
</span></p><p data-dcnode-id="8272"><span data-dcnode-id="8291" instrument_node="">Robert Dahl argued in </span><i data-dcnode-id="8289"><span data-dcnode-id="8290" instrument_node="">On Democracy</span></i><span data-dcnode-id="8288" instrument_node=""> that countries with a "democratic political culture" were more prone for democratization and democratic survival.</span><sup class="reference" data-dcnode-id="8285" id="cite_ref-:4_8-1"><a data-dcnode-id="8286" href="#cite_note-:4-8"><span data-dcnode-id="8287" instrument_node="">[8]</span></a></sup><span data-dcnode-id="8284" instrument_node=""> He also argued that cultural homogeneity and smallness contribute to democratic survival.</span><sup class="reference" data-dcnode-id="8281" id="cite_ref-:4_8-2"><a data-dcnode-id="8282" href="#cite_note-:4-8"><span data-dcnode-id="8283" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="8278" id="cite_ref-32"><a data-dcnode-id="8279" href="#cite_note-32"><span data-dcnode-id="8280" instrument_node="">[32]</span></a></sup><span data-dcnode-id="8277" instrument_node=""> Other scholars have however challenged the notion that small states and homogeneity strengthen democracy.</span><sup class="reference" data-dcnode-id="8274" id="cite_ref-33"><a data-dcnode-id="8275" href="#cite_note-33"><span data-dcnode-id="8276" instrument_node="">[33]</span></a></sup><span data-dcnode-id="8273" instrument_node="">
</span></p><p data-dcnode-id="8262"><span data-dcnode-id="8271" instrument_node="">A 2012 study found that areas in Africa with Protestant missionaries were more likely to become stable democracies.</span><sup class="reference" data-dcnode-id="8268" id="cite_ref-34"><a data-dcnode-id="8269" href="#cite_note-34"><span data-dcnode-id="8270" instrument_node="">[34]</span></a></sup><span data-dcnode-id="8267" instrument_node=""> A 2020 study failed to replicate those findings.</span><sup class="reference" data-dcnode-id="8264" id="cite_ref-35"><a data-dcnode-id="8265" href="#cite_note-35"><span data-dcnode-id="8266" instrument_node="">[35]</span></a></sup><span data-dcnode-id="8263" instrument_node="">
</span></p><span data-dcnode-id="8261" instrument_node="">
</span><h3 data-dcnode-id="8251"><span class="mw-headline" data-dcnode-id="8259" id="Social_capital_and_civil_society"><span data-dcnode-id="8260" instrument_node="">Social capital and civil society</span></span><span class="mw-editsection" data-dcnode-id="8252"><span class="mw-editsection-bracket" data-dcnode-id="8257"><span data-dcnode-id="8258" instrument_node="">[</span></span><a data-dcnode-id="8255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D5" title="Edit section: Social capital and civil society"><span data-dcnode-id="8256" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8253"><span data-dcnode-id="8254" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8250" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8233"><div class="thumbinner" data-dcnode-id="8234" style="width:222px;"><a class="image" data-dcnode-id="8248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACI_boardwalk_Sandy_sweepers_jeh.jpg"><img alt="" class="thumbimage" data-dcnode-id="8249" data-file-height="2596" data-file-width="3300" decoding="async" height="173" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/62/CI_boardwalk_Sandy_sweepers_jeh.jpg/220px-CI_boardwalk_Sandy_sweepers_jeh.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/62/CI_boardwalk_Sandy_sweepers_jeh.jpg/330px-CI_boardwalk_Sandy_sweepers_jeh.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/62/CI_boardwalk_Sandy_sweepers_jeh.jpg/440px-CI_boardwalk_Sandy_sweepers_jeh.jpg 2x" width="220"></a><span data-dcnode-id="8247" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8235"><div class="magnify" data-dcnode-id="8245"><a class="internal" data-dcnode-id="8246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACI_boardwalk_Sandy_sweepers_jeh.jpg" title="Enlarge"></a></div><a data-dcnode-id="8243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civic_engagement" title="Civic engagement"><span data-dcnode-id="8244" instrument_node="">Civic engagement</span></a><span data-dcnode-id="8242" instrument_node="">, including </span><a data-dcnode-id="8240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volunteering" title="Volunteering"><span data-dcnode-id="8241" instrument_node="">volunteering</span></a><span data-dcnode-id="8239" instrument_node="">, is conducive to democratization. These volunteers are cleaning up after the 2012 </span><a data-dcnode-id="8237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hurricane_Sandy" title="Hurricane Sandy"><span data-dcnode-id="8238" instrument_node="">Hurricane Sandy</span></a><span data-dcnode-id="8236" instrument_node="">.</span></div></div></div><span data-dcnode-id="8232" instrument_node="">
</span><p data-dcnode-id="8218"><a data-dcnode-id="8230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_D._Putnam" title="Robert D. Putnam"><span data-dcnode-id="8231" instrument_node="">Robert Putnam</span></a><span data-dcnode-id="8229" instrument_node=""> argues that certain characteristics make societies more likely to have cultures of civic engagement that lead to more participatory democracies.  Putnam argues that communities with denser horizontal networks of </span><a data-dcnode-id="8227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civic_engagement" title="Civic engagement"><span data-dcnode-id="8228" instrument_node="">civic association</span></a><span data-dcnode-id="8226" instrument_node=""> are able to better build the "norms of trust, reciprocity, and civic engagement" that lead to democratization and well-functioning participatory democracies. Putnam contrasts communities with dense horizontal networks to communities with vertical networks and </span><a data-dcnode-id="8224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clientelism" title="Clientelism"><span data-dcnode-id="8225" instrument_node="">patron-client relations</span></a><span data-dcnode-id="8223" instrument_node="">, and asserts that the latter are unlikely to build the culture of civic engagement necessary for democratization.</span><sup class="reference" data-dcnode-id="8220" id="cite_ref-36"><a data-dcnode-id="8221" href="#cite_note-36"><span data-dcnode-id="8222" instrument_node="">[36]</span></a></sup><span data-dcnode-id="8219" instrument_node="">
</span></p><p data-dcnode-id="8202"><a data-dcnode-id="8216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sheri_Berman" title="Sheri Berman"><span data-dcnode-id="8217" instrument_node="">Sheri Berman</span></a><span data-dcnode-id="8215" instrument_node=""> has rebutted Putnam's theory that civil society contributes to democratization, writing that in the case of the Weimar Republic, civil society facilitated the rise of the Nazi Party.</span><sup class="reference" data-dcnode-id="8212" id="cite_ref-37"><a data-dcnode-id="8213" href="#cite_note-37"><span data-dcnode-id="8214" instrument_node="">[37]</span></a></sup><span data-dcnode-id="8211" instrument_node=""> Subsequent empirical research has lent support for Berman's argument.</span><sup class="reference" data-dcnode-id="8208" id="cite_ref-38"><a data-dcnode-id="8209" href="#cite_note-38"><span data-dcnode-id="8210" instrument_node="">[38]</span></a></sup><span data-dcnode-id="8207" instrument_node=""> Yale University political scientist Daniel Mattingly argues civil society in China helps the authoritarian regime in China to cement control.</span><sup class="reference" data-dcnode-id="8204" id="cite_ref-39"><a data-dcnode-id="8205" href="#cite_note-39"><span data-dcnode-id="8206" instrument_node="">[39]</span></a></sup><span data-dcnode-id="8203" instrument_node="">
</span></p><p data-dcnode-id="8196"><span data-dcnode-id="8201" instrument_node="">Research indicates that democracy protests are associated with democratization. A 2016 study found that about a quarter of all cases of democracy protests between 1989 and 2011 lead to democratization.</span><sup class="reference" data-dcnode-id="8198" id="cite_ref-brancati_40-0"><a data-dcnode-id="8199" href="#cite_note-brancati-40"><span data-dcnode-id="8200" instrument_node="">[40]</span></a></sup><span data-dcnode-id="8197" instrument_node="">
</span></p><span data-dcnode-id="8195" instrument_node="">
</span><h3 data-dcnode-id="8185"><span class="mw-headline" data-dcnode-id="8193" id="Elite-driven_democratization"><span data-dcnode-id="8194" instrument_node="">Elite-driven democratization</span></span><span class="mw-editsection" data-dcnode-id="8186"><span class="mw-editsection-bracket" data-dcnode-id="8191"><span data-dcnode-id="8192" instrument_node="">[</span></span><a data-dcnode-id="8189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D6" title="Edit section: Elite-driven democratization"><span data-dcnode-id="8190" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8187"><span data-dcnode-id="8188" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8184" instrument_node="">
</span><p data-dcnode-id="8143"><span data-dcnode-id="8183" instrument_node="">Scholars have argued that processes of democratization may be elite-driven or driven by the authoritarian incumbents as a way for those elites to retain power amid popular demands for representative government.</span><sup class="reference" data-dcnode-id="8180" id="cite_ref-41"><a data-dcnode-id="8181" href="#cite_note-41"><span data-dcnode-id="8182" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="8177" id="cite_ref-42"><a data-dcnode-id="8178" href="#cite_note-42"><span data-dcnode-id="8179" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="8174" id="cite_ref-43"><a data-dcnode-id="8175" href="#cite_note-43"><span data-dcnode-id="8176" instrument_node="">[43]</span></a></sup><sup class="reference" data-dcnode-id="8171" id="cite_ref-:8_44-0"><a data-dcnode-id="8172" href="#cite_note-:8-44"><span data-dcnode-id="8173" instrument_node="">[44]</span></a></sup><span data-dcnode-id="8170" instrument_node=""> If the costs of repression are higher than the costs of giving away power, authoritarians may opt for democratization and inclusive institutions.</span><sup class="reference" data-dcnode-id="8167" id="cite_ref-45"><a data-dcnode-id="8168" href="#cite_note-45"><span data-dcnode-id="8169" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="8164" id="cite_ref-46"><a data-dcnode-id="8165" href="#cite_note-46"><span data-dcnode-id="8166" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="8161" id="cite_ref-:7_47-0"><a data-dcnode-id="8162" href="#cite_note-:7-47"><span data-dcnode-id="8163" instrument_node="">[47]</span></a></sup><span data-dcnode-id="8160" instrument_node=""> According to a 2020 study, authoritarian-led democratization is more likely to lead to lasting democracy in cases when the party strength of the authoritarian incumbent is high.</span><sup class="reference" data-dcnode-id="8157" id="cite_ref-48"><a data-dcnode-id="8158" href="#cite_note-48"><span data-dcnode-id="8159" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8156" instrument_node=""> However,  Michael Albertus and Victor Menaldo argue that democratizing rules implemented by outgoing authoritarians may distort democracy in favor of the outgoing authoritarian regime and its supporters, resulting in "bad" institutions that are hard to get rid of.</span><sup class="reference" data-dcnode-id="8153" id="cite_ref-49"><a data-dcnode-id="8154" href="#cite_note-49"><span data-dcnode-id="8155" instrument_node="">[49]</span></a></sup><span data-dcnode-id="8152" instrument_node=""> According to Michael K. Miller, elite-driven democratization is particularly likely in the wake of major violent shocks (either domestic or international) which provide openings to opposition actors to the authoritarian regime.</span><sup class="reference" data-dcnode-id="8149" id="cite_ref-:7_47-1"><a data-dcnode-id="8150" href="#cite_note-:7-47"><span data-dcnode-id="8151" instrument_node="">[47]</span></a></sup><span data-dcnode-id="8148" instrument_node=""> Dan Slater and Joseph Wrong argue that dictators in Asia chose to implement democratic reforms when they were in positions of strength in order to retain and revitalize their power.</span><sup class="reference" data-dcnode-id="8145" id="cite_ref-:8_44-1"><a data-dcnode-id="8146" href="#cite_note-:8-44"><span data-dcnode-id="8147" instrument_node="">[44]</span></a></sup><span data-dcnode-id="8144" instrument_node="">
</span></p><p data-dcnode-id="8128"><span data-dcnode-id="8142" instrument_node="">According to a study by political scientist Daniel Treisman, influential theories of democratization posit that autocrats "deliberately choose to share or surrender power. They do so to prevent revolution, motivate citizens to fight wars, incentivize governments to provide </span><a data-dcnode-id="8140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_good_%28economics%29" title="Public good (economics)"><span data-dcnode-id="8141" instrument_node="">public goods</span></a><span data-dcnode-id="8139" instrument_node="">, outbid elite rivals, or limit factional violence." His study shows that in many cases, "democratization occurred not because incumbent elites chose it but because, in trying to prevent it, they made mistakes that weakened their hold on power. Common mistakes include: calling elections or starting military conflicts, only to lose them; ignoring popular unrest and being overthrown; initiating limited reforms that get out of hand; and selecting a covert democrat as leader. These mistakes reflect well-known cognitive biases such as </span><a data-dcnode-id="8137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Overconfidence_effect" title="Overconfidence effect"><span data-dcnode-id="8138" instrument_node="">overconfidence</span></a><span data-dcnode-id="8136" instrument_node=""> and the </span><a data-dcnode-id="8134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illusion_of_control" title="Illusion of control"><span data-dcnode-id="8135" instrument_node="">illusion of control</span></a><span data-dcnode-id="8133" instrument_node="">."</span><sup class="reference" data-dcnode-id="8130" id="cite_ref-50"><a data-dcnode-id="8131" href="#cite_note-50"><span data-dcnode-id="8132" instrument_node="">[50]</span></a></sup><span data-dcnode-id="8129" instrument_node="">
</span></p><p data-dcnode-id="8118"><span data-dcnode-id="8127" instrument_node="">Sharun Mukand and Dani Rodrik dispute that elite-driven democratization produce liberal democracy. They argue that low levels of inequality and weak identity cleavages are necessary for liberal democracy to emerge.</span><sup class="reference" data-dcnode-id="8124" id="cite_ref-51"><a data-dcnode-id="8125" href="#cite_note-51"><span data-dcnode-id="8126" instrument_node="">[51]</span></a></sup><span data-dcnode-id="8123" instrument_node=""> A 2020 study by several political scientists from German universities found that democratization through bottom-up peaceful protests led to higher levels of democracy and democratic stability than democratization prompted by elites.</span><sup class="reference" data-dcnode-id="8120" id="cite_ref-52"><a data-dcnode-id="8121" href="#cite_note-52"><span data-dcnode-id="8122" instrument_node="">[52]</span></a></sup><span data-dcnode-id="8119" instrument_node="">
</span></p><p data-dcnode-id="8106"><span data-dcnode-id="8117" instrument_node="">The three dictatorship types, monarchy, civilian and military have different approaches to democratization as a result of their individual goals. Monarchic and civilian dictatorships seek to remain in power indefinitely through hereditary rule in the case of monarchs or through oppression in the case of civilian dictators. A military dictatorship seizes power to act as a caretaker government to replace what they consider a flawed civilian government. Military dictatorships are more likely to transition to democracy because at the onset, they are meant to be stop-gap solutions while a new acceptable government forms.</span><sup class="reference" data-dcnode-id="8114" id="cite_ref-53"><a data-dcnode-id="8115" href="#cite_note-53"><span data-dcnode-id="8116" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="8111" id="cite_ref-54"><a data-dcnode-id="8112" href="#cite_note-54"><span data-dcnode-id="8113" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="8108" id="cite_ref-55"><a data-dcnode-id="8109" href="#cite_note-55"><span data-dcnode-id="8110" instrument_node="">[55]</span></a></sup><span data-dcnode-id="8107" instrument_node="">
</span></p><p data-dcnode-id="8100"><span data-dcnode-id="8105" instrument_node="">Research suggests that the threat of civil conflict encourages regimes to make democratic concessions. A 2016 study found that drought-induced riots in Sub-Saharan Africa lead regimes, fearing conflict, to make democratic concessions.</span><sup class="reference" data-dcnode-id="8102" id="cite_ref-56"><a data-dcnode-id="8103" href="#cite_note-56"><span data-dcnode-id="8104" instrument_node="">[56]</span></a></sup><span data-dcnode-id="8101" instrument_node="">
</span></p><span data-dcnode-id="8099" instrument_node="">
</span><h3 data-dcnode-id="8089"><span class="mw-headline" data-dcnode-id="8097" id="Waves_of_democracy"><span data-dcnode-id="8098" instrument_node="">Waves of democracy</span></span><span class="mw-editsection" data-dcnode-id="8090"><span class="mw-editsection-bracket" data-dcnode-id="8095"><span data-dcnode-id="8096" instrument_node="">[</span></span><a data-dcnode-id="8093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D7" title="Edit section: Waves of democracy"><span data-dcnode-id="8094" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8091"><span data-dcnode-id="8092" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8088" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8079"><div class="thumbinner" data-dcnode-id="8080" style="width:222px;"><a class="image" data-dcnode-id="8086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWaves_of_democracy.png"><img alt="" class="thumbimage" data-dcnode-id="8087" data-file-height="539" data-file-width="910" decoding="async" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Waves_of_democracy.png/220px-Waves_of_democracy.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Waves_of_democracy.png/330px-Waves_of_democracy.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Waves_of_democracy.png/440px-Waves_of_democracy.png 2x" width="220"></a><span data-dcnode-id="8085" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8081"><div class="magnify" data-dcnode-id="8083"><a class="internal" data-dcnode-id="8084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWaves_of_democracy.png" title="Enlarge"></a></div><span data-dcnode-id="8082" instrument_node="">The three waves of democracy identified by Samuel P. Huntington</span></div></div></div><span data-dcnode-id="8078" instrument_node="">
</span><p data-dcnode-id="8056"><span data-dcnode-id="8077" instrument_node="">A </span><a data-dcnode-id="8075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waves_of_democracy" title="Waves of democracy"><span data-dcnode-id="8076" instrument_node="">wave of democracy</span></a><span data-dcnode-id="8074" instrument_node=""> refers to a major surge of democracy in history. According to </span><a data-dcnode-id="8072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seva_Gunitsky" title="Seva Gunitsky"><span data-dcnode-id="8073" instrument_node="">Seva Gunitsky</span></a><span data-dcnode-id="8071" instrument_node="">, these waves are caused by "abrupt shifts in the distribution of power among leading states create unique and powerful incentives for sweeping domestic reforms."</span><sup class="reference" data-dcnode-id="8068" id="cite_ref-57"><a data-dcnode-id="8069" href="#cite_note-57"><span data-dcnode-id="8070" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="8065" id="cite_ref-58"><a data-dcnode-id="8066" href="#cite_note-58"><span data-dcnode-id="8067" instrument_node="">[58]</span></a></sup><span data-dcnode-id="8064" instrument_node=""> Seva Gunitsky has referred to 13 waves from the 18th century to the </span><a data-dcnode-id="8062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab_Spring" title="Arab Spring"><span data-dcnode-id="8063" instrument_node="">Arab Spring</span></a><span data-dcnode-id="8061" instrument_node=""> (2011–2012).</span><sup class="reference" data-dcnode-id="8058" id="cite_ref-:02_59-0"><a data-dcnode-id="8059" href="#cite_note-:02-59"><span data-dcnode-id="8060" instrument_node="">[59]</span></a></sup><span data-dcnode-id="8057" instrument_node="">
</span></p><p data-dcnode-id="8033"><a data-dcnode-id="8054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_P._Huntington" title="Samuel P. Huntington"><span data-dcnode-id="8055" instrument_node="">Samuel P. Huntington</span></a><span data-dcnode-id="8053" instrument_node=""> defined three waves of democratization that have taken place in history.</span><sup class="reference" data-dcnode-id="8050" id="cite_ref-huntington_60-0"><a data-dcnode-id="8051" href="#cite_note-huntington-60"><span data-dcnode-id="8052" instrument_node="">[60]</span></a></sup><span data-dcnode-id="8049" instrument_node=""> The first one brought democracy to Western Europe and Northern America in the 19th century. It was followed by a rise of dictatorships during the </span><a data-dcnode-id="8047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interwar_period" title="Interwar period"><span data-dcnode-id="8048" instrument_node="">Interwar period</span></a><span data-dcnode-id="8046" instrument_node="">. The second wave began after </span><a data-dcnode-id="8044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="8045" instrument_node="">World War II</span></a><span data-dcnode-id="8043" instrument_node="">, but lost steam between 1962 and the mid-1970s. The latest wave began in 1974 and is still ongoing. Democratization of </span><a data-dcnode-id="8041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latin_America" title="Latin America"><span data-dcnode-id="8042" instrument_node="">Latin America</span></a><span data-dcnode-id="8040" instrument_node=""> and the former </span><a data-dcnode-id="8038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Bloc" title="Eastern Bloc"><span data-dcnode-id="8039" instrument_node="">Eastern Bloc</span></a><span data-dcnode-id="8037" instrument_node=""> is part of this </span><a data-dcnode-id="8035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waves_of_democracy%23Third_wave" title="Waves of democracy"><span data-dcnode-id="8036" instrument_node="">third wave</span></a><span data-dcnode-id="8034" instrument_node="">.
</span></p><p data-dcnode-id="8023"><span data-dcnode-id="8032" instrument_node="">An example of a region which passed through all the three waves of democratization is the Middle East. During the 15th century it was a part of the Ottoman Empire. In the 19th century, "when the empire finally collapsed [...] towards the end of the First World War, the Western armies finally moved in and occupied the region".</span><sup class="reference" data-dcnode-id="8029" id="cite_ref-61"><a data-dcnode-id="8030" href="#cite_note-61"><span data-dcnode-id="8031" instrument_node="">[61]</span></a></sup><span data-dcnode-id="8028" instrument_node=""> This was an act of both European expansion and state-building in order to democratize the region.  However, what Posusney and Angrist argue is that, "the ethnic divisions [...] are [those that are] complicating the U.S. effort to democratize Iraq". This raises interesting questions about the role of combined foreign and domestic factors in the process of democratization. In addition, Edward Said labels as 'orientalist' the predominantly Western perception of "intrinsic incompatibility between democratic values and Islam". Moreover, he states that "the Middle East and North Africa lack the prerequisites of democratization".</span><sup class="reference" data-dcnode-id="8025" id="cite_ref-62"><a data-dcnode-id="8026" href="#cite_note-62"><span data-dcnode-id="8027" instrument_node="">[62]</span></a></sup><span data-dcnode-id="8024" instrument_node="">
</span></p><span data-dcnode-id="8022" instrument_node="">
</span><h3 data-dcnode-id="8012"><span class="mw-headline" data-dcnode-id="8020" id="Class_alliances_and_cleavages"><span data-dcnode-id="8021" instrument_node="">Class alliances and cleavages</span></span><span class="mw-editsection" data-dcnode-id="8013"><span class="mw-editsection-bracket" data-dcnode-id="8018"><span data-dcnode-id="8019" instrument_node="">[</span></span><a data-dcnode-id="8016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D8" title="Edit section: Class alliances and cleavages"><span data-dcnode-id="8017" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8014"><span data-dcnode-id="8015" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8011" instrument_node="">
</span><p data-dcnode-id="7992"><span data-dcnode-id="8010" instrument_node="">In his influential </span><i data-dcnode-id="8008"><span data-dcnode-id="8009" instrument_node="">Social Origins of Dictatorship and Democracy</span></i><span data-dcnode-id="8007" instrument_node="">, Harvard University political scientist </span><a data-dcnode-id="8005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barrington_Moore_Jr." title="Barrington Moore Jr."><span data-dcnode-id="8006" instrument_node="">Barrington Moore Jr.</span></a><span data-dcnode-id="8004" instrument_node=""> argues that the distribution of power among classes – the peasantry, the bourgeoise and the landed aristocracy – and the nature of alliances between classes determined whether democratic, authoritarian or communist revolutions occurred.</span><sup class="reference" data-dcnode-id="8001" id="cite_ref-63"><a data-dcnode-id="8002" href="#cite_note-63"><span data-dcnode-id="8003" instrument_node="">[63]</span></a></sup><span data-dcnode-id="8000" instrument_node=""> A 2020 study linked democratization to the </span><a data-dcnode-id="7998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mechanised_agriculture" title="Mechanised agriculture"><span data-dcnode-id="7999" instrument_node="">mechanization of agriculture</span></a><span data-dcnode-id="7997" instrument_node="">: as landed elites became less reliant on the repression of agricultural workers, they became less hostile to democracy.</span><sup class="reference" data-dcnode-id="7994" id="cite_ref-64"><a data-dcnode-id="7995" href="#cite_note-64"><span data-dcnode-id="7996" instrument_node="">[64]</span></a></sup><span data-dcnode-id="7993" instrument_node="">
</span></p><p data-dcnode-id="7979"><span data-dcnode-id="7991" instrument_node="">According to political scientist </span><a data-dcnode-id="7989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Stasavage" title="David Stasavage"><span data-dcnode-id="7990" instrument_node="">David Stasavage</span></a><span data-dcnode-id="7988" instrument_node="">, representative government is "more likely to occur when a society is divided across multiple political cleavages."</span><sup class="reference" data-dcnode-id="7985" id="cite_ref-65"><a data-dcnode-id="7986" href="#cite_note-65"><span data-dcnode-id="7987" instrument_node="">[65]</span></a></sup><span data-dcnode-id="7984" instrument_node=""> A 2021 study found that constitutions that emerge through pluralism (reflecting distinct segments of society) are more likely to induce liberal democracy (at least, in the short term).</span><sup class="reference" data-dcnode-id="7981" id="cite_ref-66"><a data-dcnode-id="7982" href="#cite_note-66"><span data-dcnode-id="7983" instrument_node="">[66]</span></a></sup><span data-dcnode-id="7980" instrument_node="">
</span></p><p data-dcnode-id="7963"><span data-dcnode-id="7978" instrument_node="">Numerous scholars and political thinkers have linked a large </span><a data-dcnode-id="7976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_class" title="Middle class"><span data-dcnode-id="7977" instrument_node="">middle class</span></a><span data-dcnode-id="7975" instrument_node=""> to the emergence and sustenance of democracy,</span><sup class="reference" data-dcnode-id="7972" id="cite_ref-:4_8-3"><a data-dcnode-id="7973" href="#cite_note-:4-8"><span data-dcnode-id="7974" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="7969" id="cite_ref-67"><a data-dcnode-id="7970" href="#cite_note-67"><span data-dcnode-id="7971" instrument_node="">[67]</span></a></sup><span data-dcnode-id="7968" instrument_node=""> whereas others have challenged this relationship.</span><sup class="reference" data-dcnode-id="7965" id="cite_ref-68"><a data-dcnode-id="7966" href="#cite_note-68"><span data-dcnode-id="7967" instrument_node="">[68]</span></a></sup><span data-dcnode-id="7964" instrument_node="">
</span></p><span data-dcnode-id="7962" instrument_node="">
</span><h3 data-dcnode-id="7951"><span data-dcnode-id="7961" id="Rulers.27_need_for_taxation"></span><span class="mw-headline" data-dcnode-id="7959" id="Rulers'_need_for_taxation"><span data-dcnode-id="7960" instrument_node="">Rulers' need for taxation</span></span><span class="mw-editsection" data-dcnode-id="7952"><span class="mw-editsection-bracket" data-dcnode-id="7957"><span data-dcnode-id="7958" instrument_node="">[</span></span><a data-dcnode-id="7955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D9" title="Edit section: Rulers' need for taxation"><span data-dcnode-id="7956" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7953"><span data-dcnode-id="7954" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7950" instrument_node="">
</span><p data-dcnode-id="7919"><a data-dcnode-id="7948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Bates_%28political_scientist%29" title="Robert Bates (political scientist)"><span data-dcnode-id="7949" instrument_node="">Robert Bates</span></a><span data-dcnode-id="7947" instrument_node=""> and Donald Lien, as well as David Stasavage, have argued that rulers' need for taxes gave asset-owning elites the bargaining power to demand a say on public policy, thus giving rise to democratic institutions.</span><sup class="reference" data-dcnode-id="7944" id="cite_ref-:3_69-0"><a data-dcnode-id="7945" href="#cite_note-:3-69"><span data-dcnode-id="7946" instrument_node="">[69]</span></a></sup><sup class="reference" data-dcnode-id="7941" id="cite_ref-:5_70-0"><a data-dcnode-id="7942" href="#cite_note-:5-70"><span data-dcnode-id="7943" instrument_node="">[70]</span></a></sup><sup class="reference" data-dcnode-id="7938" id="cite_ref-:6_71-0"><a data-dcnode-id="7939" href="#cite_note-:6-71"><span data-dcnode-id="7940" instrument_node="">[71]</span></a></sup><span data-dcnode-id="7937" instrument_node=""> </span><a data-dcnode-id="7935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Montesquieu" title="Montesquieu"><span data-dcnode-id="7936" instrument_node="">Montesquieu</span></a><span data-dcnode-id="7934" instrument_node=""> argued that the mobility of commerce meant that rulers had to bargain with merchants in order to tax them, otherwise they would lead the country or hide their commercial activities.</span><sup class="reference" data-dcnode-id="7931" id="cite_ref-72"><a data-dcnode-id="7932" href="#cite_note-72"><span data-dcnode-id="7933" instrument_node="">[72]</span></a></sup><sup class="reference" data-dcnode-id="7928" id="cite_ref-:3_69-1"><a data-dcnode-id="7929" href="#cite_note-:3-69"><span data-dcnode-id="7930" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7927" instrument_node=""> Stasavage argues that the small size and backwardness of European states, as well as the weakness of European rulers, after the fall of the Roman Empire meant that European rulers had to obtain consent from their population to Govern effectively.</span><sup class="reference" data-dcnode-id="7924" id="cite_ref-:6_71-1"><a data-dcnode-id="7925" href="#cite_note-:6-71"><span data-dcnode-id="7926" instrument_node="">[71]</span></a></sup><sup class="reference" data-dcnode-id="7921" id="cite_ref-:5_70-1"><a data-dcnode-id="7922" href="#cite_note-:5-70"><span data-dcnode-id="7923" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7920" instrument_node="">
</span></p><p data-dcnode-id="7895"><span data-dcnode-id="7918" instrument_node="">According to Clark, Golder, and Golder, an application of  </span><a data-dcnode-id="7916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albert_O._Hirschman" title="Albert O. Hirschman"><span data-dcnode-id="7917" instrument_node="">Albert O. Hirschman</span></a><span data-dcnode-id="7915" instrument_node="">'s exit, voice, and loyalty model is that if individuals have plausible exit options, then a government may be more likely to democratize. </span><a data-dcnode-id="7913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_C._Scott" title="James C. Scott"><span data-dcnode-id="7914" instrument_node="">James C. Scott</span></a><span data-dcnode-id="7912" instrument_node=""> argues that governments may find it difficult to claim a sovereignty over a population when that population is in motion.</span><sup class="reference" data-dcnode-id="7909" id="cite_ref-C._2010_7_73-0"><a data-dcnode-id="7910" href="#cite_note-C._2010_7-73"><span data-dcnode-id="7911" instrument_node="">[73]</span></a></sup><span data-dcnode-id="7908" instrument_node=""> Scott additionally asserts that exit may not solely include physical exit from the territory of a coercive state, but can include a number of adaptive responses to coercion that make it more difficult for states to claim sovereignty over a population. These responses can include planting crops that are more difficult for states to count, or tending livestock that are more mobile. In fact, the entire political arrangement of a state is a result of individuals adapting to the environment, and making a choice as to whether or not to stay in a territory.</span><sup class="reference" data-dcnode-id="7905" id="cite_ref-C._2010_7_73-1"><a data-dcnode-id="7906" href="#cite_note-C._2010_7-73"><span data-dcnode-id="7907" instrument_node="">[73]</span></a></sup><span data-dcnode-id="7904" instrument_node=""> If people are free to move, then the exit, voice, and loyalty model predicts that a state will have to be of that population representative, and appease the populous in order to prevent them from leaving.</span><sup class="reference" data-dcnode-id="7901" id="cite_ref-:1_74-0"><a data-dcnode-id="7902" href="#cite_note-:1-74"><span data-dcnode-id="7903" instrument_node="">[74]</span></a></sup><span data-dcnode-id="7900" instrument_node=""> If individuals have plausible exit options then they are better able to constrain a government's arbitrary behaviour through threat of exit.</span><sup class="reference" data-dcnode-id="7897" id="cite_ref-:1_74-1"><a data-dcnode-id="7898" href="#cite_note-:1-74"><span data-dcnode-id="7899" instrument_node="">[74]</span></a></sup><span data-dcnode-id="7896" instrument_node="">
</span></p><span data-dcnode-id="7894" instrument_node="">
</span><h3 data-dcnode-id="7883"><span data-dcnode-id="7893" id="Promotion.2C_and_foreign_influence_and_intervention"></span><span class="mw-headline" data-dcnode-id="7891" id="Promotion,_and_foreign_influence_and_intervention"><span data-dcnode-id="7892" instrument_node="">Promotion, and foreign influence and intervention</span></span><span class="mw-editsection" data-dcnode-id="7884"><span class="mw-editsection-bracket" data-dcnode-id="7889"><span data-dcnode-id="7890" instrument_node="">[</span></span><a data-dcnode-id="7887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D10" title="Edit section: Promotion, and foreign influence and intervention"><span data-dcnode-id="7888" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7885"><span data-dcnode-id="7886" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7882" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="7876" role="note"><span data-dcnode-id="7879" instrument_node="">Main article: </span><a data-dcnode-id="7877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy_promotion" title="Democracy promotion"><span data-dcnode-id="7878" instrument_node="">Democracy promotion</span></a></div><span data-dcnode-id="7875" instrument_node="">
</span><p data-dcnode-id="7866"><span data-dcnode-id="7874" instrument_node="">The European Union has contributed to the spread of democracy, in particular by encouraging democratic reforms in aspiring member states. </span><a data-dcnode-id="7872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Risse" title="Thomas Risse"><span data-dcnode-id="7873" instrument_node="">Thomas Risse</span></a><span data-dcnode-id="7871" instrument_node=""> wrote in 2009, "there is a consensus in the literature on Eastern Europe that the EU membership perspective had a huge anchoring effects for the new democracies."</span><sup class="reference" data-dcnode-id="7868" id="cite_ref-75"><a data-dcnode-id="7869" href="#cite_note-75"><span data-dcnode-id="7870" instrument_node="">[75]</span></a></sup><span data-dcnode-id="7867" instrument_node="">
</span></p><p data-dcnode-id="7854"><span data-dcnode-id="7865" instrument_node="">Steven Levitsky and Lucan Way have argued that close ties to the West increased the likelihood of democratization after the end of the Cold War, whereas states with weak ties to the West adopted </span><a data-dcnode-id="7863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illiberal_democracy" title="Illiberal democracy"><span data-dcnode-id="7864" instrument_node="">competitive authoritarian</span></a><span data-dcnode-id="7862" instrument_node=""> regimes.</span><sup class="reference" data-dcnode-id="7859" id="cite_ref-76"><a data-dcnode-id="7860" href="#cite_note-76"><span data-dcnode-id="7861" instrument_node="">[76]</span></a></sup><sup class="reference" data-dcnode-id="7856" id="cite_ref-77"><a data-dcnode-id="7857" href="#cite_note-77"><span data-dcnode-id="7858" instrument_node="">[77]</span></a></sup><span data-dcnode-id="7855" instrument_node="">
</span></p><p data-dcnode-id="7845"><span data-dcnode-id="7853" instrument_node="">A 2002 study found that membership in </span><a data-dcnode-id="7851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regional_organization" title="Regional organization"><span data-dcnode-id="7852" instrument_node="">regional organizations</span></a><span data-dcnode-id="7850" instrument_node=""> "is correlated with transitions to democracy during the period from 1950 to 1992."</span><sup class="reference" data-dcnode-id="7847" id="cite_ref-78"><a data-dcnode-id="7848" href="#cite_note-78"><span data-dcnode-id="7849" instrument_node="">[78]</span></a></sup><span data-dcnode-id="7846" instrument_node="">
</span></p><p data-dcnode-id="7839"><span data-dcnode-id="7844" instrument_node="">A 2004 study found no evidence that foreign aid led to democratization.</span><sup class="reference" data-dcnode-id="7841" id="cite_ref-79"><a data-dcnode-id="7842" href="#cite_note-79"><span data-dcnode-id="7843" instrument_node="">[79]</span></a></sup><span data-dcnode-id="7840" instrument_node="">
</span></p><p data-dcnode-id="7802"><span data-dcnode-id="7838" instrument_node="">Democracies have often been imposed by military intervention, for example in </span><a data-dcnode-id="7836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Occupation_of_Japan" title="Occupation of Japan"><span data-dcnode-id="7837" instrument_node="">Japan</span></a><span data-dcnode-id="7835" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="7833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Occupation_of_Germany" title="Occupation of Germany"><span data-dcnode-id="7834" instrument_node="">Germany</span></a><span data-dcnode-id="7832" instrument_node=""> </span><a data-dcnode-id="7830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aftermath_of_World_War_II" title="Aftermath of World War II"><span data-dcnode-id="7831" instrument_node="">after World War II</span></a><span data-dcnode-id="7829" instrument_node="">.</span><sup class="reference" data-dcnode-id="7826" id="cite_ref-GT_80-0"><a data-dcnode-id="7827" href="#cite_note-GT-80"><span data-dcnode-id="7828" instrument_node="">[80]</span></a></sup><sup class="reference" data-dcnode-id="7823" id="cite_ref-81"><a data-dcnode-id="7824" href="#cite_note-81"><span data-dcnode-id="7825" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7822" instrument_node=""> In other cases, </span><a data-dcnode-id="7820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decolonization" title="Decolonization"><span data-dcnode-id="7821" instrument_node="">decolonization</span></a><span data-dcnode-id="7819" instrument_node=""> sometimes facilitated the establishment of democracies that were soon replaced by authoritarian regimes. For example, Syria, after gaining independence from </span><a class="mw-redirect" data-dcnode-id="7817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mandate_for_Syria_and_the_Lebanon" title="Mandate for Syria and the Lebanon"><span data-dcnode-id="7818" instrument_node="">French mandatory control</span></a><span data-dcnode-id="7816" instrument_node=""> at the beginning of the </span><a data-dcnode-id="7814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="7815" instrument_node="">Cold War</span></a><span data-dcnode-id="7813" instrument_node="">, failed to </span><a data-dcnode-id="7811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_consolidation" title="Democratic consolidation"><span data-dcnode-id="7812" instrument_node="">consolidate</span></a><span data-dcnode-id="7810" instrument_node=""> its democracy, so it eventually collapsed and was replaced by a </span><a data-dcnode-id="7808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab_Socialist_Ba%27ath_Party_%25E2%2580%2593_Syria_Region" title="Arab Socialist Ba'ath Party – Syria Region"><span data-dcnode-id="7809" instrument_node="">Ba'athist dictatorship</span></a><span data-dcnode-id="7807" instrument_node="">.</span><sup class="reference" data-dcnode-id="7804" id="cite_ref-82"><a data-dcnode-id="7805" href="#cite_note-82"><span data-dcnode-id="7806" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7803" instrument_node="">
</span></p><p data-dcnode-id="7789"><span data-dcnode-id="7801" instrument_node="">Robert Dahl argued in </span><i data-dcnode-id="7799"><span data-dcnode-id="7800" instrument_node="">On Democracy</span></i><span data-dcnode-id="7798" instrument_node=""> that foreign interventions contributed to democratic failures, citing Soviet interventions in Central and Eastern Europe and U.S. interventions in Latin America.</span><sup class="reference" data-dcnode-id="7795" id="cite_ref-:4_8-4"><a data-dcnode-id="7796" href="#cite_note-:4-8"><span data-dcnode-id="7797" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7794" instrument_node=""> However, the delegitimization of empires contributed to the emergence of democracy as former colonies gained independence and implemented democracy.</span><sup class="reference" data-dcnode-id="7791" id="cite_ref-:4_8-5"><a data-dcnode-id="7792" href="#cite_note-:4-8"><span data-dcnode-id="7793" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7790" instrument_node="">
</span></p><span data-dcnode-id="7788" instrument_node="">
</span><h3 data-dcnode-id="7778"><span class="mw-headline" data-dcnode-id="7786" id="Scrambled_constituencies"><span data-dcnode-id="7787" instrument_node="">Scrambled constituencies</span></span><span class="mw-editsection" data-dcnode-id="7779"><span class="mw-editsection-bracket" data-dcnode-id="7784"><span data-dcnode-id="7785" instrument_node="">[</span></span><a data-dcnode-id="7782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D11" title="Edit section: Scrambled constituencies"><span data-dcnode-id="7783" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7780"><span data-dcnode-id="7781" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7777" instrument_node="">
</span><p data-dcnode-id="7771"><span data-dcnode-id="7776" instrument_node="">Mancur Olson theorizes that the process of democratization occurs when elites are unable to reconstitute an autocracy.  Olson suggests that this occurs when constituencies or identity groups are mixed within a geographic region. He asserts that this mixed geographic constituencies requires elites to for democratic and representative institutions to control the region, and to limit the power of competing elite groups.</span><sup class="reference" data-dcnode-id="7773" id="cite_ref-83"><a data-dcnode-id="7774" href="#cite_note-83"><span data-dcnode-id="7775" instrument_node="">[83]</span></a></sup><span data-dcnode-id="7772" instrument_node="">
</span></p><span data-dcnode-id="7770" instrument_node="">
</span><h3 data-dcnode-id="7760"><span class="mw-headline" data-dcnode-id="7768" id="Education"><span data-dcnode-id="7769" instrument_node="">Education</span></span><span class="mw-editsection" data-dcnode-id="7761"><span class="mw-editsection-bracket" data-dcnode-id="7766"><span data-dcnode-id="7767" instrument_node="">[</span></span><a data-dcnode-id="7764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratization%26action%3Dedit%26section%3D12" title="Edit section: Education"><span data-dcnode-id="7765" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7762"><span data-dcnode-id="7763" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7759" instrument_node="">
</span><p data-dcnode-id="7745"><span data-dcnode-id="7758" instrument_node="">It has long been theorized that education promotes stable and democratic societies.</span><sup class="reference" data-dcnode-id="7755" id="cite_ref-84"><a data-dcnode-id="7756" href="#cite_note-84"><span data-dcnode-id="7757" instrument_node="">[84]</span></a></sup><span data-dcnode-id="7754" instrument_node=""> Research shows that education leads to greater political tolerance, increases the likelihood of political participation and reduces inequality.</span><sup class="reference" data-dcnode-id="7751" id="cite_ref-:0_85-0"><a data-dcnode-id="7752" href="#cite_note-:0-85"><span data-dcnode-id="7753" instrument_node="">[85]</span></a></sup><span data-dcnode-id="7750" instrument_node=""> One study finds "that increases in levels of education improve levels of democracy and that the democratizing effect of education is more intense in poor countries".</span><sup class="reference" data-dcnode-id="7747" id="cite_ref-:0_85-1"><a data-dcnode-id="7748" href="#cite_note-:0-85"><span data-dcnode-id="7749" instrument_node="">[85]</span></a></sup><span data-dcnode-id="7746" instrument_node="">
