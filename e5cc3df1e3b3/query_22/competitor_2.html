</span><li data-dcnode-id="2747" id="cite_note-125"><span class="mw-cite-backlink" data-dcnode-id="2765"><b data-dcnode-id="2766"><a aria-label="Jump up" data-dcnode-id="2767" href="#cite_ref-125" title="Jump up"><span data-dcnode-id="2768" instrument_node="">^</span></a></b></span><span data-dcnode-id="2764" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2749"><link data-dcnode-id="2763" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation web cs1" data-dcnode-id="2751"><a class="external text" data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bl.uk/magna-carta/articles/britains-unwritten-constitution" rel="nofollow"><span data-dcnode-id="2762" instrument_node="">"Britain's unwritten constitution"</span></a><span data-dcnode-id="2760" instrument_node="">. British Library</span><span class="reference-accessdate" data-dcnode-id="2755"><span data-dcnode-id="2759" instrument_node="">. Retrieved </span><span class="nowrap" data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">27 November</span></span><span data-dcnode-id="2756" instrument_node=""> 2015</span></span><span data-dcnode-id="2754" instrument_node="">. </span><q data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">The key landmark is the Bill of Rights (1689), which established the supremacy of Parliament over the Crown.... The Bill of Rights (1689) then settled the primacy of Parliament over the monarch's prerogatives, providing for the regular meeting of Parliament, free elections to the Commons, free speech in parliamentary debates, and some basic human rights, most famously freedom from 'cruel or unusual punishment'.</span></q></cite><span class="Z3988" data-dcnode-id="2750" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=unknown&amp;rft.btitle=Britain%27s+unwritten+constitution&amp;rft.pub=British+Library&amp;rft_id=http%3A%2F%2Fwww.bl.uk%2Fmagna-carta%2Farticles%2Fbritains-unwritten-constitution&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ADemocratization"></span></span><span data-dcnode-id="2748" instrument_node="">
</span></li><span data-dcnode-id="2746" instrument_node="">
</span><li data-dcnode-id="2721" id="cite_note-126"><span class="mw-cite-backlink" data-dcnode-id="2742"><b data-dcnode-id="2743"><a aria-label="Jump up" data-dcnode-id="2744" href="#cite_ref-126" title="Jump up"><span data-dcnode-id="2745" instrument_node="">^</span></a></b></span><span data-dcnode-id="2741" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2723"><link data-dcnode-id="2740" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation web cs1" data-dcnode-id="2725"><a class="external text" data-dcnode-id="2738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20141024130317/http%3A//www.ait.org.tw/infousa/zhtw/DOCS/Demopaper/dmpaper2.html" rel="nofollow"><span data-dcnode-id="2739" instrument_node="">"Constitutionalism: America &amp; Beyond"</span></a><span data-dcnode-id="2737" instrument_node="">. Bureau of International Information Programs (IIP), U.S. Department of State. Archived from </span><a class="external text" data-dcnode-id="2735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ait.org.tw/infousa/zhtw/DOCS/Demopaper/dmpaper2.html" rel="nofollow"><span data-dcnode-id="2736" instrument_node="">the original</span></a><span data-dcnode-id="2734" instrument_node=""> on 24 October 2014</span><span class="reference-accessdate" data-dcnode-id="2729"><span data-dcnode-id="2733" instrument_node="">. Retrieved </span><span class="nowrap" data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">30 October</span></span><span data-dcnode-id="2730" instrument_node=""> 2014</span></span><span data-dcnode-id="2728" instrument_node="">. </span><q data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">The earliest, and perhaps greatest, victory for liberalism was achieved in England. The rising commercial class that had supported the Tudor monarchy in the 16th century led the revolutionary battle in the 17th, and succeeded in establishing the supremacy of Parliament and, eventually, of the House of Commons. What emerged as the distinctive feature of modern constitutionalism was not the insistence on the idea that the king is subject to law (although this concept is an essential attribute of all constitutionalism). This notion was already well established in the Middle Ages. What was distinctive was the establishment of effective means of political control whereby the rule of law might be enforced. Modern constitutionalism was born with the political requirement that representative government depended upon the consent of citizen subjects.... However, as can be seen through provisions in the 1689 Bill of Rights, the English Revolution was fought not just to protect the rights of property (in the narrow sense) but to establish those liberties which liberals believed essential to human dignity and moral worth. The "rights of man" enumerated in the English Bill of Rights gradually were proclaimed beyond the boundaries of England, notably in the American Declaration of Independence of 1776 and in the French Declaration of the Rights of Man in 1789.</span></q></cite><span class="Z3988" data-dcnode-id="2724" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=unknown&amp;rft.btitle=Constitutionalism%3A+America+%26+Beyond&amp;rft.pub=Bureau+of+International+Information+Programs+%28IIP%29%2C+U.S.+Department+of+State&amp;rft_id=http%3A%2F%2Fwww.ait.org.tw%2Finfousa%2Fzhtw%2FDOCS%2FDemopaper%2Fdmpaper2.html&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ADemocratization"></span></span><span data-dcnode-id="2722" instrument_node="">
</span></li><span data-dcnode-id="2720" instrument_node="">
