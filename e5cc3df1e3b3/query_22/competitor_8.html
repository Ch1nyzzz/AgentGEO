</span><p class="texte" data-dcnode-id="2165"><span class="paranumber" data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">28</span></span><em data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Ekaterina Vikulina</span></em><span data-dcnode-id="2166" instrument_node="">’s article resonates with Lucento’s in that it examines photography’s transformation in the 1950s and ‘60s as a result of the medium’s appropriation by amateurs and the influx of western imagery. Both the amateur and the western photo influenced the shooting technique of Soviet professionals, who strove to introduce greater intimacy with the subjects they photographed for the press, including party and state leaders, Nikita Khrushchev in the first instance. In press photographs, Soviet leaders now looked as if they had been taken off guard, and this worked to increase the emotional impact of the shots —a phenomenon we have already encountered in the studies of television and cartoons. Unlike photographs from the Stalin era, which were carefully staged and retouched prior to publication, Thaw‑era shots were valued for their presumed spontaneity, sincerity, and truthfulness. Technological innovation remained a central concern because to achieve these effects required modernizing typographical equipment and cameras.</span></p><span data-dcnode-id="2164" instrument_node="">
</span><p class="texte" data-dcnode-id="2157"><span class="paranumber" data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">29</span></span><span data-dcnode-id="2161" instrument_node="">According to Vikulina, photographs of Khrushchev talking on the telephone symbolized the connection between Soviet power and the people. The article by </span><em data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Larissa Zakharova</span></em><span data-dcnode-id="2158" instrument_node=""> considers the functions of telecommunications in the Soviet Union at the end of the Second World War. The decision of Soviet leaders to modernize telecommunications technologies in the Soviet Union with the help of western companies dated to the mid‑1920s. Their determination stemmed from both a desire for confidentiality and the need to rule an immense territory spanning two continents. In their view, communications technologies were tools of governance and of territorial, social, and economic control. The stakes attributed to local telephone service evolved over time&nbsp;: in the 1920s, the urban telephone was associated with technological progress and claimed social significance&nbsp;; as of the beginning of the 1930s, this communications tool was supposed to lead the campaigns for the organization and management of the kolkhoz. In this way, although the historiographical cliché maintains that authoritarian regimes never encourage the development of the democratizing tool that is the telephone because it involves reciprocal exchange (unlike the telegraph, which is a first‑rate tool of command), the Soviet leadership did, in fact, encourage the development of the telephone in its social uses. </span></p><span data-dcnode-id="2156" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2137"><span data-dcnode-id="2155" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2146"><span data-dcnode-id="2154" instrument_node="">
</span><li data-dcnode-id="2148"><span class="num" data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">46</span></span><span data-dcnode-id="2151" instrument_node=""> Larissa Zakharova, “‘Le socialisme sans poste, télégraphe et machine est un mot vide de sens.’ Les  </span><a data-dcnode-id="2149" href="#ftn46"><span data-dcnode-id="2150" instrument_node="">(...)</span></a></li><span data-dcnode-id="2147" instrument_node="">
</span></ul><span data-dcnode-id="2145" instrument_node="">
</span><p class="texte" data-dcnode-id="2139"><span class="paranumber" data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">30</span></span><span data-dcnode-id="2142" instrument_node="">We can discern a specific chronology in conceptions of the telephone’s purpose in the Soviet period. In the first period, from the revolution until 1925, telecommunications are considered primarily as instruments of government. During a period of territorial conquest, telecommunication tools must respond above all to political needs. The phone is a public tool insofar as it contributes to the management of the public sphere, which itself pertains to the state. By a decree of May 6, 1920, individual telephones could be expropriated for the use of state and party leaders and institutions. Private telephone use was now limited to free public devices available only if the lines were not in use by party‑state institutions. The number of subscribers in the country declined from 232,337 in 1917 to 126,870 in 1921 (an average, then, of one telephone per one thousand people).</span><a class="footnotecall" data-dcnode-id="2140" href="#ftn46" id="bodyftn46"><span data-dcnode-id="2141" instrument_node="">46</span></a></p><span data-dcnode-id="2138" instrument_node="">
</span></div><span data-dcnode-id="2136" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2119"><span data-dcnode-id="2135" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2128"><span data-dcnode-id="2134" instrument_node="">
</span><li data-dcnode-id="2130"><span class="num" data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">47</span></span><span data-dcnode-id="2131" instrument_node=""> RGAE, f.&nbsp;3527, op.&nbsp;4, d.&nbsp;166, l.&nbsp;23.</span></li><span data-dcnode-id="2129" instrument_node="">
</span></ul><span data-dcnode-id="2127" instrument_node="">
</span><p class="texte" data-dcnode-id="2121"><span class="paranumber" data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">31</span></span><span data-dcnode-id="2124" instrument_node="">The signing of a technical assistance contract with Ericsson in 1926 marked the beginning of the second period, when the great Soviet cities were supposed to be transformed into showcases of socialism thanks to the democratization of automatic telephony. Social‑ and thus private‑telephone usage came to the fore. In 1926‑27, the bulk of urban lines was located in large cities&nbsp;: Moscow (48,000 subscribers), Leningrad (41,000), Khar´kov and Kiev (almost 5000), Baku (4600) and Rostov‑on‑Don (3600). Altogether, subscribers in these cities represented 51&nbsp;% of subscribers nationwide.</span><a class="footnotecall" data-dcnode-id="2122" href="#ftn47" id="bodyftn47"><span data-dcnode-id="2123" instrument_node="">47</span></a></p><span data-dcnode-id="2120" instrument_node="">
</span></div><span data-dcnode-id="2118" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2099"><span data-dcnode-id="2117" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2108"><span data-dcnode-id="2116" instrument_node="">
</span><li data-dcnode-id="2110"><span class="num" data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">48</span></span><span data-dcnode-id="2113" instrument_node=""> Larissa Zakharova, “Quand la politique se mêle de technologie, ou le progrès technique en contexte  </span><a data-dcnode-id="2111" href="#ftn48"><span data-dcnode-id="2112" instrument_node="">(...)</span></a></li><span data-dcnode-id="2109" instrument_node="">
</span></ul><span data-dcnode-id="2107" instrument_node="">
</span><p class="texte" data-dcnode-id="2101"><span class="paranumber" data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">32</span></span><span data-dcnode-id="2104" instrument_node="">In 1934, collectivization and the rise of National Socialism in Germany brought another shift in goals&nbsp;: connecting kolhozes and defense institutions to telephone networks was the new priority. Thus, once again, the telephone was a public tool. What is remarkable in this third period is that the technical choice made in favor of an innovative technology, Ericsson, was suddenly questioned. After a series of trials and of controversy, punctuated by the repression of engineers and technicians, a new choice was made in favor of an automatic, step‑by‑step Siemens telephone system (which was actually an older technology than the Ericsson rotary mechanical system.) In other words, in the USSR, where political power applied pressure and intervened violently, technological developments could not proceed in a linear fashion. Reversals were possible, following changes of benchmarks and reorientations in policy about priorities in usage.</span><a class="footnotecall" data-dcnode-id="2102" href="#ftn48" id="bodyftn48"><span data-dcnode-id="2103" instrument_node="">48</span></a></p><span data-dcnode-id="2100" instrument_node="">
</span></div><span data-dcnode-id="2098" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2078"><span data-dcnode-id="2097" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2088"><span data-dcnode-id="2096" instrument_node="">
</span><li data-dcnode-id="2090"><span class="num" data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">49</span></span><span data-dcnode-id="2093" instrument_node=""> Larissa Zakharova, “Des techniques authentiquement socialistes&nbsp;? Transferts et circulations dans le </span><a data-dcnode-id="2091" href="#ftn49"><span data-dcnode-id="2092" instrument_node="">(...)</span></a></li><span data-dcnode-id="2089" instrument_node="">
</span></ul><span data-dcnode-id="2087" instrument_node="">
</span><p class="texte" data-dcnode-id="2080"><span class="paranumber" data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">33</span></span><span data-dcnode-id="2084" instrument_node="">The Second World War highlighted the problem of innovation in the realm of telecommunications in the USSR. The direct transfer of interwar German telephone and telegraph equipment as war booty actually hindered progress in the postwar Soviet Union&nbsp;: it created a ten‑year gap with western countries, which had begun to deploy much more advanced technologies.</span><a class="footnotecall" data-dcnode-id="2082" href="#ftn49" id="bodyftn49"><span data-dcnode-id="2083" instrument_node="">49</span></a><span data-dcnode-id="2081" instrument_node=""> These postwar transfers primarily benefitted the country’s administrative apparatus, as Larissa Zakharova demonstrates in her article about the inclusion of western Ukraine in the Soviet communication networks. Direct telephone lines between the capital of the USSR and major Ukrainian cities offered a means of control that bypassed the republic‑level authorities. This control imperative, coupled with the goal of political education in the annexed territories, ensured that the western regions received “privileged treatment” in the provision of technology and equipment. The seizure of goods and equipment that accompanied the inclusion of Central and Eastern Europe in the Soviet bloc did not occur in Western Ukraine. Telecommunications technologies were expected to establish Soviet political authority in these areas, while preserving their image as “prosperous regions” in the eyes of their residents.</span></p><span data-dcnode-id="2079" instrument_node="">
</span></div><span data-dcnode-id="2077" instrument_node="">
</span><p class="texte" data-dcnode-id="2073"><span class="paranumber" data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">34</span></span><span data-dcnode-id="2074" instrument_node="">In the Soviet Union, telephony was again officially understood in social, relational terms in the 1970s, the fourth developmental period. Until that time, the telephone was conceived of as an administrative tool above all, available in cities, in elites homes, in communal housing or in public phone booths. The authorities strove to increase the number of booths, thereby confirming their utilitarian vision of the medium. However, individuals often subverted this goal and turned every available telephone into a tool of private sociability. </span></p><span data-dcnode-id="2072" instrument_node="">
</span><p class="texte" data-dcnode-id="2065"><span class="paranumber" data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">35</span></span><span data-dcnode-id="2069" instrument_node="">Negotiations on the purpose of communication tools also emerge in </span><em data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Patryk Wasiak</span></em><span data-dcnode-id="2066" instrument_node="">’s work. Using a social construction of technology approach, this author is interested in the research, design, and development of computer networks in socialist Poland rather than in the social implications of technological innovations. The existence of several, parallel networks projects (intended for economic management and control, the transmission of data among researchers in nuclear science, and social communication) challenges the Western conception of early IT networks as a “closed worlds” closely tied to the paradigm of the Cold War. It was the imagination of technical progress under socialism that helped to encourage horizontal communications.</span></p><span data-dcnode-id="2064" instrument_node="">
</span><p class="texte" data-dcnode-id="2060"><span class="paranumber" data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">36</span></span><span data-dcnode-id="2061" instrument_node="">The history of communications and their technologies can open up new avenues for thinking about the social, the political, and the cultural in the Soviet Union and Eastern Europe. New research on the worlds of both media professionals and ordinary media consumers directs our attention to the emotional experiences at the heart of the communications phenomenon, and thus to a far more complex relationship between the private and the public, the personal and the political than is often considered. The seeming social consensus associated with socialist regimes covered many forms of engagement with socialism’s common places. The superficially static and obtuse propaganda state belied a diverse, dynamic public.</span></p><span data-dcnode-id="2059" instrument_node="">
</span></div><a class="go-top" data-dcnode-id="2055" href="#editorial-8182"><span data-dcnode-id="2056" instrument_node="">Haut de page</span></a></div><span data-dcnode-id="2052" instrument_node="">

</span><h2 class="section" data-dcnode-id="2048"><span class="text" data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Notes</span></span></h2><span data-dcnode-id="2047" instrument_node="">
</span><p class="notesbaspage" data-dcnode-id="2043"><a class="FootnoteSymbol" data-dcnode-id="2045" href="#bodyftn1" id="ftn1"><span data-dcnode-id="2046" instrument_node="">1</span></a><span data-dcnode-id="2044" instrument_node=""> Peter Kenez, The Birth of the Propaganda State&nbsp;: Soviet Methods of Mass Mobilization, 1917‑1929 (Cambridge, Cambridge University Press, 1985), 4.</span></p><span data-dcnode-id="2042" instrument_node="">
</span><p class="notesbaspage" data-dcnode-id="2038"><a class="FootnoteSymbol" data-dcnode-id="2040" href="#bodyftn2" id="ftn2"><span data-dcnode-id="2041" instrument_node="">2</span></a><span data-dcnode-id="2039" instrument_node=""> The literature on Soviet culture, though vast and accomplished, has infrequently engaged with issues of media and communications as such—technologies and institutions, psychologies and social practices. One goal of this special issue is to bring these two strands together. </span></p><span data-dcnode-id="2037" instrument_node="">
</span><p class="notesbaspage" data-dcnode-id="2033"><a class="FootnoteSymbol" data-dcnode-id="2035" href="#bodyftn3" id="ftn3"><span data-dcnode-id="2036" instrument_node="">3</span></a><span data-dcnode-id="2034" instrument_node=""> “Popular opinion” is the term preferred by some scholars in an effort to avoid the idea of civil society underpinning the concept of “public opinion” as defined by Jürgen Habermas. Jürgen Habermas, The Structural Transformation of the Public Sphere&nbsp;: An Inquiry into a Category of Bourgeois Society (MIT Press, 1991&nbsp;; original German publication in 1962).</span></p><span data-dcnode-id="2032" instrument_node="">
</span><p class="notesbaspage" data-dcnode-id="2028"><a class="FootnoteSymbol" data-dcnode-id="2030" href="#bodyftn4" id="ftn4"><span data-dcnode-id="2031" instrument_node="">4</span></a><span data-dcnode-id="2029" instrument_node=""> Sophie Coeuré, La grande lueur à l’Est&nbsp;: Les Français et l’Union soviétique (1917‑1939) (P.&nbsp;: Seuil, 1999)&nbsp;; Rachel Mazuy, Croire plutôt que voir&nbsp;? Voyages en Russie soviétique (1919‑1939) (P.&nbsp;: Odile Jacob, 2002)&nbsp;; Sophie Coeuré, Rachel Mazuy, Cousu de fil rouge&nbsp;: Voyages des intellectuels français en Union soviétique. 150 documents inédits des archives russes (P.&nbsp;: CNRS Editions, 2012)&nbsp;; Michael David‑Fox, Showcasing the Great Experiment&nbsp;: Cultural Diplomacy and Western Visitors to the Soviet Union, 1921‑1941 (New York&nbsp;: Oxford University Press, 2015).</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p class="notesbaspage" data-dcnode-id="2023"><a class="FootnoteSymbol" data-dcnode-id="2025" href="#bodyftn5" id="ftn5"><span data-dcnode-id="2026" instrument_node="">5</span></a><span data-dcnode-id="2024" instrument_node=""> For a good overview of the literature on the US side of this dynamic (as of 2002), see Kenneth A.&nbsp;Osgood, “Hearts and Minds&nbsp;: the Unconventional Cold War,”&nbsp;Journal of Cold War Studies, 4, 2 (2002)&nbsp;: 85‑107&nbsp;; and his Total Cold War&nbsp;: Eisenhower’s Secret Propaganda Battle at Home and Abroad (Lawrence, University Press of Kansas, 2008).</span></p><span data-dcnode-id="2022" instrument_node="">
</span><p class="notesbaspage" data-dcnode-id="2018"><a class="FootnoteSymbol" data-dcnode-id="2020" href="#bodyftn6" id="ftn6"><span data-dcnode-id="2021" instrument_node="">6</span></a><span data-dcnode-id="2019" instrument_node=""> Alex Inkeles, Raymond Bauer, The Soviet Citizen&nbsp;: Daily Life in a Totalitarian Society (Cambridge&nbsp;: Harvard University Press, 1959), 7&nbsp;; See also Alex Inkeles,&nbsp;Public Opinion in Soviet Russia&nbsp;: a Study in Mass Persuasion, vol.&nbsp;1 (Harvard University Press, 1958).</span></p><span data-dcnode-id="2017" instrument_node="">

</span><p class="notesbaspage" data-dcnode-id="2006"><a class="FootnoteSymbol" data-dcnode-id="2008" href="#bodyftn8" id="ftn8"><span data-dcnode-id="2009" instrument_node="">8</span></a><span data-dcnode-id="2007" instrument_node=""> Ellen Mickiewicz, Media and the Russian Public (New York, Praeger, 1981)&nbsp;; Idem, Split Signals&nbsp;: Television and Politics in the Soviet Union (Oxford&nbsp;: Oxford University Press, 1988)&nbsp;; See also the work associated with the MIT Center for International Studies (est.&nbsp;1952) on media and modernization led by Ithiel de Sola Pool, e.g. Ithiel de Sola Pool, “The Mass Media and Politics in the Modernization Process,” in Lucian W.&nbsp;Pye, ed. Communications and Political Development (Princeton&nbsp;: Princeton University Press, 1963)&nbsp;; Gayle Durham Hollander, Soviet Political Indoctrination&nbsp;: Developments in Mass Media and Propaganda Since Stalin (New York&nbsp;: Praeger Publishers, 1972)&nbsp;; Rosemarie Rodgers, “Soviet Mass Media in the Sixties&nbsp;: Patterns of Access and Consumption,” Journal of Broadcasting, XV, 2 (Spring 1971)&nbsp;; Z.&nbsp;Katz, The Communications System in the USSR (Cambridge, MA&nbsp;: Center for International Studies, Massachusetts Institute of Technology, 1977).</span></p><span data-dcnode-id="2005" instrument_node="">
</span><p class="notesbaspage" data-dcnode-id="2001"><a class="FootnoteSymbol" data-dcnode-id="2003" href="#bodyftn9" id="ftn9"><span data-dcnode-id="2004" instrument_node="">9</span></a><span data-dcnode-id="2002" instrument_node=""> S.&nbsp;Frederick Starr, “New Communications Technologies and Civil Society,” Loren R.&nbsp;Graham, ed., Science and the Soviet Social Order (Cambridge — London&nbsp;: Harvard University Press, 1990), 19‑50.</span></p><span data-dcnode-id="2000" instrument_node="">
</span><p class="notesbaspage" data-dcnode-id="1996"><a class="FootnoteSymbol" data-dcnode-id="1998" href="#bodyftn10" id="ftn10"><span data-dcnode-id="1999" instrument_node="">10</span></a><span data-dcnode-id="1997" instrument_node=""> See, for example, Sheila Fitzpatrick, “Supplicants and Citizens&nbsp;: Public Letter‑Writing in Soviet Russia in the 1930s,” Slavic Review, 55, 1 (Spring 1996)&nbsp;: 78‑105&nbsp;; Matthew E.&nbsp;Lenoe, “Letter‑Writing and the State&nbsp;: Reader Correspondence with Newspapers as a Source for Early Soviet History,” Cahiers du Monde russe, 40, 1‑2 (1999)&nbsp;: 139‑170&nbsp;; François‑Xavier Nérard, Cinq pour cent de vérité&nbsp;: La dénonciation dans l’URSS de Staline, 1928‑1941 (P.&nbsp;: Tallandier, 2004). Alexey Tikhomirov, “The Regime of Forced Trust&nbsp;: Making and Breaking Emotional Bonds between People and State in Soviet Russia, 1917‑1941,”Slavonic &amp; East European Review, 91, 1 (2013)&nbsp;: 78‑118. Several edited collections of letters culled from the archives have also been published under the title Pis´ma vo vlast´.</span></p><span data-dcnode-id="1995" instrument_node="">
</span><p class="notesbaspage" data-dcnode-id="1991"><a class="FootnoteSymbol" data-dcnode-id="1993" href="#bodyftn11" id="ftn11"><span data-dcnode-id="1994" instrument_node="">11</span></a><span data-dcnode-id="1992" instrument_node=""> Scholarly work on the literary and cinematic intelligentsia (with their enduring epistolary practices) form something of an exception to this rule, to be sure. We might also note that the showcase example in the discussion of learning to “speak Bolshevik” in Stephen Kotkin’s highly influential Magnetic Mountain is, in fact, a personal letter from the wife of one locomotive driver to another. Stephen Kotkin, Magnetic Mountain&nbsp;: Stalinism as a Civilization (Berkeley, 1995), 219‑219. For recent notable discussions of interpersonal communications, see Malte Griesse, Communiquer, juger et agir sous Staline&nbsp;: La personne prise entre ses liens avec les proches et son rapport au système politico‑idéologique (Frankfurt am Main, et al.&nbsp;: Peter Lang, 2011) et Véronique Jobert, Russkaia sem´ia v vodovorote velikogo pereloma. 155 pisem iz SSSR v Man´chzhuriiu, 1927‑29 gg. (SPb.&nbsp;: Nestor‑Istorija, 2005&nbsp;; Russkaia sem´ia “dans la tourmente déchaïnée…”&nbsp;: Pis´ma O.A.&nbsp;Tolstoj‑Voejkovoj, 1927‑1930 gg. (SPb.&nbsp;: Nestor‑Istorija, 2009).</span></p><span data-dcnode-id="1990" instrument_node="">
</span><p class="notesbaspage" data-dcnode-id="1986"><a class="FootnoteSymbol" data-dcnode-id="1988" href="#bodyftn12" id="ftn12"><span data-dcnode-id="1989" instrument_node="">12</span></a><span data-dcnode-id="1987" instrument_node=""> Emile Durkheim, De la Division du travail social (P.&nbsp;: Puf, 2013 (1930)).</span></p><span data-dcnode-id="1985" instrument_node="">

niversity Press, 2015).</span></p><span data-dcnode-id="1980" instrument_node="">
