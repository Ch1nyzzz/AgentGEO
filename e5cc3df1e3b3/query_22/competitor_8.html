</span><div class="withTextSize" data-dcnode-id="2960" id="widgets"><a class="pdf available" data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/monderusse/pdf/8182" id="wDownload" title="Télécharger au format PDF"><span class="fileinfo" data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">PDF</span></span></a><span data-dcnode-id="2967" instrument_node=""> </span><a data-dcnode-id="2965" href="mailto:?subject=Communications%20and%20media%20in%20the%20USSR%20and%20Eastern%20Europe&amp;body=Communications%20and%20media%20in%20the%20USSR%20and%20Eastern%20Europe%20%0ACahiers%20du%20monde%20russe%20%0Ahttp:%2F%2Fjournals.openedition.org%2Fmonderusse%2F8182%20%0A%0ACommunications%20in%20socialist%20Europe%20have%20long%20been%20associated%20first%20and%20foremost%20with%20propaganda.%20The%20USSR%E2%80%94the%20world%E2%80%99s%20first%20%E2%80%9Cpropaganda%20state%2C%E2%80%9D%20to%20use%20Peter%20Kenez%E2%80%99s%20term%E2%80%94%20established%20a%20radical%20new%20communications%20order%20that%20would%20be%20widely%20emulated.%20%E2%80%9CThe%20Bolshevik%20regime%2C%E2%80%9D%20wrote%20Kenez%20in%20an%20influential%201985%20study%2C%20%E2%80%9Cwas%20the%20first%20not%20merely%20to%20set%20itself%20propaganda%20goals%20but%20also%20through%20political%20education%20to%20aim%20to%20create%20a%20new%20humanity%20suitable%20for%20living%20in%20a%20new%20society.%E2%80%9D%20Propaganda%2C%20in%20th...%20%0A%0AKristin%20Roth%E2%80%91Ey%20et%20Larissa%20Zakharova%2C%20%C2%AB%20Communications%20and%20media%20in%20the%20USSR%20and%20Eastern%20Europe%20%C2%BB%2C%20%20Cahiers%20du%20monde%20russe%20%5BEn%20ligne%5D%2C%2056%2F2-3%20%7C%202015%2C%20mis%20en%20ligne%20le%2017%20novembre%202019%2C%20consult%C3%A9%20le%2030%20avril%202022.%20URL%20:%20http:%2F%2Fjournals.openedition.org%2Fmonderusse%2F8182%20%0A%0A" id="wSend" title="Signaler ce document"><span data-dcnode-id="2966" instrument_node="">Signaler ce document</span></a><a data-dcnode-id="2964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/monderusse/8182" id="wPrint" title="Imprimer ce document"></a><a data-dcnode-id="2963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/monderusse/8182" id="wTextSize-largest" title="Taille du texte : très grande"></a><a data-dcnode-id="2962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/monderusse/8182" id="wTextSize-large" title="Taille du texte : grande"></a><a class="current" data-dcnode-id="2961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/monderusse/8182" id="wTextSize-medium" title="Taille du texte : normale"></a></div><span data-dcnode-id="2958" instrument_node="">

</span><li data-dcnode-id="2946"><span class="num" data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">1</span></span><span data-dcnode-id="2949" instrument_node=""> Peter Kenez, The Birth of the Propaganda State&nbsp;: Soviet Methods of Mass Mobilization, 1917‑1929 (Ca </span><a data-dcnode-id="2947" href="#ftn1"><span data-dcnode-id="2948" instrument_node="">(...)</span></a></li><span data-dcnode-id="2945" instrument_node="">
</span><li data-dcnode-id="2939"><span class="num" data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">2</span></span><span data-dcnode-id="2942" instrument_node=""> The literature on Soviet culture, though vast and accomplished, has infrequently engaged with issue </span><a data-dcnode-id="2940" href="#ftn2"><span data-dcnode-id="2941" instrument_node="">(...)</span></a></li><span data-dcnode-id="2938" instrument_node="">
</span></ul><span data-dcnode-id="2936" instrument_node="">
</span><p class="texte" data-dcnode-id="2924"><span class="paranumber" data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">1</span></span><span data-dcnode-id="2933" instrument_node="">Communications in socialist Europe have long been associated first and foremost with propaganda. The USSR—the world’s first “propaganda state,” to use Peter Kenez’s term— established a radical new communications order that would be widely emulated. “The Bolshevik regime,” wrote Kenez in an influential 1985 study, “was the first not merely to set itself propaganda goals but also through political education to aim to create a new humanity suitable for living in a new society.”</span><a class="footnotecall" data-dcnode-id="2931" href="#ftn1" id="bodyftn1"><span data-dcnode-id="2932" instrument_node="">1</span></a><span data-dcnode-id="2930" instrument_node=""> Propaganda, in this sense, had no strictly delimited “political” sphere of operation in the Soviet/socialist context&nbsp;; on the contrary, it was embedded in all aspects of cultural, social, and economic life. Propaganda was also, it bears emphasizing, devoid of dismissive (“mere propaganda”) and negative (propaganda‑as‑brainwashing) connotations in the new lexicon—at least when applied to the socialist context. Propaganda in socialist hands was celebrated as an essential, progressive tool of socialist modernity. Communications in support of propaganda diffusion—from the early </span><em data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">agitpoezdy</span></em><span data-dcnode-id="2927" instrument_node=""> and posters to publishing and broadcasting, film, theater, and so on—received major support from the hard‑pressed “propaganda state.”</span><a class="footnotecall" data-dcnode-id="2925" href="#ftn2" id="bodyftn2"><span data-dcnode-id="2926" instrument_node="">2</span></a></p><span data-dcnode-id="2923" instrument_node="">
</span></div><span data-dcnode-id="2921" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2871"><span data-dcnode-id="2920" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2890"><span data-dcnode-id="2919" instrument_node="">
</span><li data-dcnode-id="2913"><span class="num" data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">3</span></span><span data-dcnode-id="2916" instrument_node=""> “Popular opinion” is the term preferred by some scholars in an effort to avoid the idea of civil so </span><a data-dcnode-id="2914" href="#ftn3"><span data-dcnode-id="2915" instrument_node="">(...)</span></a></li><span data-dcnode-id="2912" instrument_node="">
</span><li data-dcnode-id="2906"><span class="num" data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">4</span></span><span data-dcnode-id="2909" instrument_node=""> Sophie Coeuré, La grande lueur à l’Est&nbsp;: Les Français et l’Union soviétique (1917‑1939) (P.&nbsp;: Seuil </span><a data-dcnode-id="2907" href="#ftn4"><span data-dcnode-id="2908" instrument_node="">(...)</span></a></li><span data-dcnode-id="2905" instrument_node="">
</span><li data-dcnode-id="2899"><span class="num" data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">5</span></span><span data-dcnode-id="2902" instrument_node=""> For a good overview of the literature on the US side of this dynamic (as of 2002), see Kenneth A.&nbsp;O </span><a data-dcnode-id="2900" href="#ftn5"><span data-dcnode-id="2901" instrument_node="">(...)</span></a></li><span data-dcnode-id="2898" instrument_node="">
</span><li data-dcnode-id="2892"><span class="num" data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">6</span></span><span data-dcnode-id="2895" instrument_node=""> Alex Inkeles, Raymond Bauer, The Soviet Citizen&nbsp;: Daily Life in a Totalitarian Society (Cambridge&nbsp;: </span><a data-dcnode-id="2893" href="#ftn6"><span data-dcnode-id="2894" instrument_node="">(...)</span></a></li><span data-dcnode-id="2891" instrument_node="">
</span></ul><span data-dcnode-id="2889" instrument_node="">
</span><p class="texte" data-dcnode-id="2873"><span class="paranumber" data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">2</span></span><span data-dcnode-id="2886" instrument_node="">Beyond the Soviet Union, the relationship between propaganda and public, or popular, opinion</span><a class="footnotecall" data-dcnode-id="2884" href="#ftn3" id="bodyftn3"><span data-dcnode-id="2885" instrument_node="">3</span></a><span data-dcnode-id="2883" instrument_node=""> has preoccupied observers since at least the1920s, when thousands of foreigners travelled East to learn what made the socialist state and society tick, and when the Soviets themselves began an expansive and, in many regards, innovative program of cultural diplomacy.</span><a class="footnotecall" data-dcnode-id="2881" href="#ftn4" id="bodyftn4"><span data-dcnode-id="2882" instrument_node="">4</span></a><span data-dcnode-id="2880" instrument_node=""> The question of whether Soviet propaganda “worked” was thus a foundational one in the West, invested with hopes and fears alike. As the cold war heated up in the late 1940s, the problem of propaganda— now often discussed in terms of state‑sponsored “psychological” (or “political”) warfare— gained even greater force.</span><a class="footnotecall" data-dcnode-id="2878" href="#ftn5" id="bodyftn5"><span data-dcnode-id="2879" instrument_node="">5</span></a><span data-dcnode-id="2877" instrument_node=""> The main lines of what would later be dubbed a “totalitarian” school in Soviet studies presented a model of the Soviet regime as resting on the dual pillars of propaganda and repression or, in Lenin’s terms, “on a balance between coercion and persuasion.”</span><a class="footnotecall" data-dcnode-id="2875" href="#ftn6" id="bodyftn6"><span data-dcnode-id="2876" instrument_node="">6</span></a><span data-dcnode-id="2874" instrument_node=""> The growing atomization of society—the suppression of horizontal ties of communication and enforced dependence upon vertical ones—was said to guarantee the persuasive power of Soviet propaganda. In this way, a tool initially designed to promote social cohesion corroded social bonds, an instrument of enlightenment was in fact a weapon of manipulation, immobilization, and pacification.</span></p><span data-dcnode-id="2872" instrument_node="">
</span></div><span data-dcnode-id="2870" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2838"><span data-dcnode-id="2869" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2858" style="top: 4px;"><span data-dcnode-id="2868" instrument_node="">
</span><li data-dcnode-id="2860"><span class="num" data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">7</span></span><span data-dcnode-id="2865" instrument_node=""> For the Harvard Project on the Soviet Social System, see </span><a data-dcnode-id="2863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hcl.harvard.edu/collections/hpsss/about.html."><span data-dcnode-id="2864" instrument_node="">http://hcl.harvard.edu/collections/hpsss/a </span></a><a data-dcnode-id="2861" href="#ftn7"><span data-dcnode-id="2862" instrument_node="">(...)</span></a></li><span data-dcnode-id="2859" instrument_node="">
</span></ul><span data-dcnode-id="2857" instrument_node="">
</span><p class="texte" data-dcnode-id="2840"><span class="paranumber" data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">3</span></span><span data-dcnode-id="2854" instrument_node="">The opening of the archives in the 1990s shattered whatever image of a Soviet society utterly pacified and atomized had endured. But in truth, the so‑called “totalitarian” school was always far less one‑dimensional than its contemporary reputation implies. The work of social scientists Alex Inkeles and Raymond Bauer (from the Harvard Project on the Soviet Social System), to take one example, makes liberal use of terms like “indoctrination,” “conformity,” and “control”&nbsp;; indeed, the title of their best‑known study, </span><em data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">The Soviet Citizen&nbsp;: Daily Life in a Totalitarian Society</span></em><span data-dcnode-id="2851" instrument_node="">, puts the offending term “totalitarian” front and center</span><em data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">.</span></em><a class="footnotecall" data-dcnode-id="2847" href="#ftn7" id="bodyftn7"><span data-dcnode-id="2848" instrument_node="">7</span></a><em data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node=""> </span></em><span data-dcnode-id="2844" instrument_node="">Yet for all that, to read Inkeles and Bauer is not to get the sense of a brutalized and brainwashed Soviet mass, but rather of a dynamic, even demanding population. (Their use of the term “citizen” is worth emphasizing.) Inkeles and Bauer note repeatedly the extent to which Soviet citizens support core socialist ideas (such as a welfare state) and illiberal values (restrictions on freedom of expression, for example). These Soviet orientations are broadly attributed to the impact of the “communications&nbsp;system”&nbsp;: their answer to the perennial question “does Soviet propaganda work&nbsp;?”&nbsp;was in this sense “yes,” and they made it clear that they did not approve. We may, if we wish, judge them for their judgment. But Inkeles and Bauer, however partisan, were also able to detect and report on the many ways in which Soviet communications did </span><em data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">not</span></em><span data-dcnode-id="2841" instrument_node=""> work—or at least not in any simplistic, “transmission belt” model of Leninist theory. Soviet citizens were, they said, capable of evaluating media messages and sizing up their leaders’ commitment to them. </span></p><span data-dcnode-id="2839" instrument_node="">
</span></div><span data-dcnode-id="2837" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2804"><span data-dcnode-id="2836" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2820"><span data-dcnode-id="2835" instrument_node="">
</span><li data-dcnode-id="2829"><span class="num" data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">8</span></span><span data-dcnode-id="2832" instrument_node=""> Ellen Mickiewicz, Media and the Russian Public (New York, Praeger, 1981)&nbsp;; Idem, Split Signals&nbsp;: Te </span><a data-dcnode-id="2830" href="#ftn8"><span data-dcnode-id="2831" instrument_node="">(...)</span></a></li><span data-dcnode-id="2828" instrument_node="">
</span><li data-dcnode-id="2822"><span class="num" data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">9</span></span><span data-dcnode-id="2825" instrument_node=""> S.&nbsp;Frederick Starr, “New Communications Technologies and Civil Society,” Loren R.&nbsp;Graham, ed., Scie </span><a data-dcnode-id="2823" href="#ftn9"><span data-dcnode-id="2824" instrument_node="">(...)</span></a></li><span data-dcnode-id="2821" instrument_node="">
</span></ul><span data-dcnode-id="2819" instrument_node="">
</span><p class="texte" data-dcnode-id="2806"><span class="paranumber" data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">4</span></span><span data-dcnode-id="2816" instrument_node="">What Inkeles and Bauer thought they saw in the Soviet Union was a modern&nbsp;and modernizing society that had much in common with other modern societies, meaning institutions like mass higher education and mass media, but also values—an emphasis on personal well‑being and peer‑orientation. It was a theme picked up and developed by other social scientists in the 1960s, 70s, and ‘80s, mostly importantly, Ellen Mickiewicz, whose pioneering studies of Soviet media portrayed a complex and sometimes contradictory communications system in relation to an equally complex and restive audience.</span><a class="footnotecall" data-dcnode-id="2814" href="#ftn8" id="bodyftn8"><span data-dcnode-id="2815" instrument_node="">8</span></a><span data-dcnode-id="2813" instrument_node=""> The terms of reference may have remained the same—“indoctrination,” “malleability” and so on—but the image of Soviet society was anything but static, as was that of communications and media. In 1990, S.&nbsp;Frederick Starr, a historian, analyzed the Soviet communications system in the tradition of the centralizing autocratic Russian state, using the familiar horizontal/vertical framework&nbsp;: Soviet leaders, like their tsarist predecessors, promoted vertical ties and suppressed horizontal ones. But critically, Starr also showed how wide of the mark Soviet communications had been—how </span><em data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">ineffective</span></em><span data-dcnode-id="2810" instrument_node="">, that is, at both tasks and, above all, the suppression of horizontal ties, which, he noted, grew increasingly difficult with the political, sociological, and technological shifts of the post‑Stalinist era.</span><a class="footnotecall" data-dcnode-id="2808" href="#ftn9" id="bodyftn9"><span data-dcnode-id="2809" instrument_node="">9</span></a><span data-dcnode-id="2807" instrument_node=""> In this way, studies ostensibly focussed on propaganda opened avenues to research on the complexity of communications practices and the plurality of media publics in the USSR. </span></p><span data-dcnode-id="2805" instrument_node="">
</span></div><span data-dcnode-id="2803" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2773"><span data-dcnode-id="2802" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2786"><span data-dcnode-id="2801" instrument_node="">
</span><li data-dcnode-id="2795"><span class="num" data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">10</span></span><span data-dcnode-id="2798" instrument_node=""> See, for example, Sheila Fitzpatrick, “Supplicants and Citizens&nbsp;: Public Letter‑Writing in Soviet R </span><a data-dcnode-id="2796" href="#ftn10"><span data-dcnode-id="2797" instrument_node="">(...)</span></a></li><span data-dcnode-id="2794" instrument_node="">
</span><li data-dcnode-id="2788"><span class="num" data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">11</span></span><span data-dcnode-id="2791" instrument_node=""> Scholarly work on the literary and cinematic intelligentsia (with their enduring epistolary practic </span><a data-dcnode-id="2789" href="#ftn11"><span data-dcnode-id="2790" instrument_node="">(...)</span></a></li><span data-dcnode-id="2787" instrument_node="">
</span></ul><span data-dcnode-id="2785" instrument_node="">
</span><p class="texte" data-dcnode-id="2775"><span class="paranumber" data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">5</span></span><span data-dcnode-id="2782" instrument_node="">The opening of the archives helped to further develop the idea of the vitality of Soviet society, including its communications practices, long before 1953. Studies of letters written to the authorities and to the press have demonstrated that, even under Stalin, vertical communications operated not only from top to bottom, from regime to mass, but also in the opposite direction.</span><a class="footnotecall" data-dcnode-id="2780" href="#ftn10" id="bodyftn10"><span data-dcnode-id="2781" instrument_node="">10</span></a><span data-dcnode-id="2779" instrument_node=""> Horizontal, or interpersonal, communication, however, has attracted less scholarly interest.</span><a class="footnotecall" data-dcnode-id="2777" href="#ftn11" id="bodyftn11"><span data-dcnode-id="2778" instrument_node="">11</span></a><span data-dcnode-id="2776" instrument_node=""> This special issue seeks to fill this gap and to address the variety of different forms of communication in the USSR and socialist Europe. </span></p><span data-dcnode-id="2774" instrument_node="">
</span></div><span data-dcnode-id="2772" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2754"><span data-dcnode-id="2771" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2764" style="top: 11px;"><span data-dcnode-id="2770" instrument_node="">
</span><li data-dcnode-id="2766"><span class="num" data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">12</span></span><span data-dcnode-id="2767" instrument_node=""> Emile Durkheim, De la Division du travail social (P.&nbsp;: Puf, 2013 (1930)).</span></li><span data-dcnode-id="2765" instrument_node="">
</span></ul><span data-dcnode-id="2763" instrument_node="">
</span><p class="texte" data-dcnode-id="2756"><span class="paranumber" data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">6</span></span><span data-dcnode-id="2760" instrument_node="">With the new material and approaches now available, historians can question anew the fundamentals of social life in the USSR and Eastern Europe. Above all, we are interested in examining the nature and characteristics of social bonds, defined as forms of solidarity and cohesion that exist in every society, with or without the mediation of state structures.</span><a class="footnotecall" data-dcnode-id="2758" href="#ftn12" id="bodyftn12"><span data-dcnode-id="2759" instrument_node="">12</span></a><span data-dcnode-id="2757" instrument_node=""> Communications practices (both direct and mediated) can offer a prism through which to evaluate the strength of social ties and understanding. And to do this, we need to take account of what our historical actors tell us and consider their words as forms of engagement, rather than dissimulation. </span></p><span data-dcnode-id="2755" instrument_node="">
</span></div><span data-dcnode-id="2753" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2713"><span data-dcnode-id="2752" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2729"><span data-dcnode-id="2751" instrument_node="">
</span><li data-dcnode-id="2745"><span class="num" data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">13</span></span><span data-dcnode-id="2748" instrument_node=""> Historians, with their lust for archival dust, were more likely to veer in this direction, though m </span><a data-dcnode-id="2746" href="#ftn13"><span data-dcnode-id="2747" instrument_node="">(...)</span></a></li><span data-dcnode-id="2744" instrument_node="">
</span><li data-dcnode-id="2738"><span class="num" data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">14</span></span><span data-dcnode-id="2741" instrument_node=""> Sarah Davies, Popular Opinion in Stalin’s Russia&nbsp;: Terror, Propaganda and Dissent, 1934‑1941 (Cambr </span><a data-dcnode-id="2739" href="#ftn14"><span data-dcnode-id="2740" instrument_node="">(...)</span></a></li><span data-dcnode-id="2737" instrument_node="">
</span><li data-dcnode-id="2731"><span class="num" data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">15</span></span><span data-dcnode-id="2734" instrument_node=""> Jochen Hellbeck, Revolution on My Mind&nbsp;: Writing a Diary Under Stalin (Cambridge&nbsp;: Harvard Universi </span><a data-dcnode-id="2732" href="#ftn15"><span data-dcnode-id="2733" instrument_node="">(...)</span></a></li><span data-dcnode-id="2730" instrument_node="">
</span></ul><span data-dcnode-id="2728" instrument_node="">
</span><p class="texte" data-dcnode-id="2715"><span class="paranumber" data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">7</span></span><span data-dcnode-id="2725" instrument_node="">To be sure, the very fact of the Bolsheviks’ monopoly on communications has had a powerful and, some might say, distorting effect on the way scholars have conceived of Soviet society and public opinion. For one, the orchestrated, didactic nature of Soviet media (what Jeffrey Brooks called a “performative” public culture) meant that many scholars long wrinkled their noses at media sources as unreal and unreliable—void of valid information about society, particularly for the Stalin period.</span><a class="footnotecall" data-dcnode-id="2723" href="#ftn13" id="bodyftn13"><span data-dcnode-id="2724" instrument_node="">13</span></a><span data-dcnode-id="2722" instrument_node=""> It is the authoritarian regime itself, with its aim to present a wholly unified society, that put historians in this bind. And as a result, the historiography has tended to cluster around two poles&nbsp;: the first, a mirror image of the regime’s own ideal of unity, but with the values reversed (yes, there was unity&nbsp;: everyone secretly resisted, as in Sarah Davies’s work)</span><a class="footnotecall" data-dcnode-id="2720" href="#ftn14" id="bodyftn14"><span data-dcnode-id="2721" instrument_node="">14</span></a><span data-dcnode-id="2719" instrument_node=""> and the second, a portrait of the regime as having been largely successful in its efforts to construct a unified Soviet worldview (as in the work of Jochen Hellbeck, Jeffrey Brooks and, in their way, “modernization” school social scientists like Inkeles and Bauer).</span><a class="footnotecall" data-dcnode-id="2717" href="#ftn15" id="bodyftn15"><span data-dcnode-id="2718" instrument_node="">15</span></a><span data-dcnode-id="2716" instrument_node=""> Yet the categories of “resistance” and “support,” or “belief” and “disbelief,” are in themselves inadequate to the task of analyzing authoritarian socialist societies. The majority of people made their lives between the poles and occupied varied positions in relation to them over the course of a lifetime.</span></p><span data-dcnode-id="2714" instrument_node="">
</span></div><span data-dcnode-id="2712" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2682"><span data-dcnode-id="2711" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2695"><span data-dcnode-id="2710" instrument_node="">
</span><li data-dcnode-id="2704"><span class="num" data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">16</span></span><span data-dcnode-id="2707" instrument_node=""> Anne E.&nbsp;Gorsuch, Diane P.&nbsp;Koenker, eds., The Socialist Sixties&nbsp;: Crossing Borders in the Second Wor </span><a data-dcnode-id="2705" href="#ftn16"><span data-dcnode-id="2706" instrument_node="">(...)</span></a></li><span data-dcnode-id="2703" instrument_node="">
</span><li data-dcnode-id="2697"><span class="num" data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">17</span></span><span data-dcnode-id="2700" instrument_node=""> Alexei Yurchak, Everything Was Forever, Until It Was No More&nbsp;: The Last Soviet Generation (Princeto </span><a data-dcnode-id="2698" href="#ftn17"><span data-dcnode-id="2699" instrument_node="">(...)</span></a></li><span data-dcnode-id="2696" instrument_node="">
</span></ul><span data-dcnode-id="2694" instrument_node="">
</span><p class="texte" data-dcnode-id="2684"><span class="paranumber" data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">8</span></span><span data-dcnode-id="2691" instrument_node="">In recent years, the burgeoning literature on the Khrushchev and Brezhnev eras has had the diversity of the socialist experience, the multiplicity of its social milieux, and the ambiguity of its public culture as guiding themes.</span><a class="footnotecall" data-dcnode-id="2689" href="#ftn16" id="bodyftn16"><span data-dcnode-id="2690" instrument_node="">16</span></a><span data-dcnode-id="2688" instrument_node=""> It is true that the major sociological shifts of the post‑Stalinist era (urbanization and rising living standards chief among them) played a critical role here. But diversity of experience and opinion was not limited to the post‑Stalinist era. By the same token, the loss of the constative dimension of official discourse with Stalin’s death did not signal the end to all popular engagement with the values of the regime&nbsp;: as Alexei Yurchak has demonstrated, it was possible to be at once a Komsomol member and a heavy metal fan.</span><a class="footnotecall" data-dcnode-id="2686" href="#ftn17" id="bodyftn17"><span data-dcnode-id="2687" instrument_node="">17</span></a><span data-dcnode-id="2685" instrument_node=""> We need to confront the epistemological challenge of seeing unanimity everywhere and understand that a multiplicity of opinions is not only to be found in democratic regimes, but also authoritarian ones. The difference is in the modes of expression for this multiplicity and in their legibility. </span></p><span data-dcnode-id="2683" instrument_node="">
</span></div><span data-dcnode-id="2681" instrument_node="">
</span><h1 class="texte" data-dcnode-id="2678"><a data-dcnode-id="2679" href="#tocfrom1n1" id="tocto1n1"><span data-dcnode-id="2680" instrument_node="">From the sociology of public spheres to the grammar of common places</span></a></h1><span data-dcnode-id="2677" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2611"><span data-dcnode-id="2676" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2639"><span data-dcnode-id="2675" instrument_node="">
</span><li data-dcnode-id="2669"><span class="num" data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">18</span></span><span data-dcnode-id="2672" instrument_node=""> Jürgen Habermas, L’espace public&nbsp;: Archéologie de la publicité comme dimension constitutive de la s </span><a data-dcnode-id="2670" href="#ftn18"><span data-dcnode-id="2671" instrument_node="">(...)</span></a></li><span data-dcnode-id="2668" instrument_node="">
</span><li data-dcnode-id="2662"><span class="num" data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">19</span></span><span data-dcnode-id="2665" instrument_node=""> Michel Christian et Sandrine Kott, “Introduction. Sphère publique et sphère privée dans les société </span><a data-dcnode-id="2663" href="#ftn19"><span data-dcnode-id="2664" instrument_node="">(...)</span></a></li><span data-dcnode-id="2661" instrument_node="">
</span><li data-dcnode-id="2655"><span class="num" data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">20</span></span><span data-dcnode-id="2658" instrument_node=""> Gabor T.&nbsp;Rittersporn, Jan C.&nbsp;Behrends, Malte Rolf, «&nbsp;Exploring Public Spheres in Regimes of the Sov </span><a data-dcnode-id="2656" href="#ftn20"><span data-dcnode-id="2657" instrument_node="">(...)</span></a></li><span data-dcnode-id="2654" instrument_node="">
</span><li data-dcnode-id="2648"><span class="num" data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">21</span></span><span data-dcnode-id="2651" instrument_node=""> Michel Christian et Sandrine Kott, “Introduction. Sphère publique et sphère privée dans les société </span><a data-dcnode-id="2649" href="#ftn21"><span data-dcnode-id="2650" instrument_node="">(...)</span></a></li><span data-dcnode-id="2647" instrument_node="">
</span><li data-dcnode-id="2641"><span class="num" data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">22</span></span><span data-dcnode-id="2644" instrument_node=""> Gabor T.&nbsp;Rittersporn, Malte Rolf, Jan C.&nbsp;Behrends, “Open Spaces and Public Realm. Thoughts on the P </span><a data-dcnode-id="2642" href="#ftn22"><span data-dcnode-id="2643" instrument_node="">(...)</span></a></li><span data-dcnode-id="2640" instrument_node="">
</span></ul><span data-dcnode-id="2638" instrument_node="">
</span><p class="texte" data-dcnode-id="2613"><span class="paranumber" data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">9</span></span><span data-dcnode-id="2635" instrument_node="">A diversity of opinion is one part of the classical definition of the public sphere as formulated by Jürgen Habermas</span><a class="footnotecall" data-dcnode-id="2633" href="#ftn18" id="bodyftn18"><span data-dcnode-id="2634" instrument_node="">18</span></a><span data-dcnode-id="2632" instrument_node="">. The applicability of this concept to socialist societies has been the subject of controversy. At first glance, it seems paradoxical to speak of a public sphere—or even to draw a separation between the private and the public—in societies of the Soviet type.</span><a class="footnotecall" data-dcnode-id="2630" href="#ftn19" id="bodyftn19"><span data-dcnode-id="2631" instrument_node="">19</span></a><span data-dcnode-id="2629" instrument_node=""> The very first thing to note when thinking about the binary public/private in the Soviet Union and Eastern Europe is the state’s interference in all areas of life. From the point of view of the Bolsheviks, the private sphere deserved no autonomy&nbsp;; everything, including intimacy, should be placed under the vigilant control of the collective.</span><a class="footnotecall" data-dcnode-id="2627" href="#ftn20" id="bodyftn20"><span data-dcnode-id="2628" instrument_node="">20</span></a><span data-dcnode-id="2626" instrument_node=""> The term “private,” associated, as it was, with bourgeois society, was replaced by “personal.” (One spoke of “personal” rather than “private” property in Soviet society.) The “public” was identified with the “common” or “communal.” And on this basis, at least in theory, in place of opposition, the public versus the private, stood complementarity, the communal and the personal.</span><a class="footnotecall" data-dcnode-id="2624" href="#ftn21" id="bodyftn21"><span data-dcnode-id="2625" instrument_node="">21</span></a><span data-dcnode-id="2623" instrument_node=""> Some scholars have thus proposed terms such as </span><em data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">“</span></em><span data-dcnode-id="2620" instrument_node="">quasi public sphere</span><em data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">” </span></em><span data-dcnode-id="2617" instrument_node="">or “public privacy” for Soviet‑type societies where, in their view, all the typical traits of the public sphere‑ freedom of expression, open debate, and the opportunity to influence politics—were absent.</span><a class="footnotecall" data-dcnode-id="2615" href="#ftn22" id="bodyftn22"><span data-dcnode-id="2616" instrument_node="">22</span></a><span data-dcnode-id="2614" instrument_node=""> </span></p><span data-dcnode-id="2612" instrument_node="">
</span></div><span data-dcnode-id="2610" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2567"><span data-dcnode-id="2609" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2588" style="top: 88px;"><span data-dcnode-id="2608" instrument_node="">
</span><li data-dcnode-id="2604"><span class="num" data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">23</span></span><span data-dcnode-id="2605" instrument_node=""> Brooks, Thank You, Comrade Stalin&nbsp;!, 247.</span></li><span data-dcnode-id="2603" instrument_node="">
</span><li data-dcnode-id="2597"><span class="num" data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">24</span></span><span data-dcnode-id="2600" instrument_node=""> Polly McMichaels, “Translation, authorship and authenticity in Soviet rock songwriting,” Translator </span><a data-dcnode-id="2598" href="#ftn24"><span data-dcnode-id="2599" instrument_node="">(...)</span></a></li><span data-dcnode-id="2596" instrument_node="">
</span><li data-dcnode-id="2590"><span class="num" data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">25</span></span><span data-dcnode-id="2593" instrument_node=""> Lewis Siegelbaum, ed. Borders of Socialism&nbsp;: Private Spheres of Soviet Russia (New York&nbsp;: Palgrave  </span><a data-dcnode-id="2591" href="#ftn25"><span data-dcnode-id="2592" instrument_node="">(...)</span></a></li><span data-dcnode-id="2589" instrument_node="">
</span></ul><span data-dcnode-id="2587" instrument_node="">
</span><p class="texte" data-dcnode-id="2569"><span class="paranumber" data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">10</span></span><span data-dcnode-id="2584" instrument_node="">A related tendency in the historiography relevant to our interest in communications has been to insist upon the distinction between “official” and “unofficial” cultures in socialist states. In the Soviet context, Jeffrey Brooks offered a sweeping analytical study of </span><em data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">Pravda </span></em><span data-dcnode-id="2581" instrument_node="">as the best example of what he called “official public culture” implicitly distinguished from, and opposed to, an unofficial, private culture. Brooks described this “official public culture” as “eclectic” but so “constricting” in its content, and so false as to be damaging to the development of Soviet consciousness. The press created “a stylized, ritualistic, and internally consistent public culture that became its own reality and supplanted other forms of public reflection and expression.”</span><a class="footnotecall" data-dcnode-id="2579" href="#ftn23" id="bodyftn23"><span data-dcnode-id="2580" instrument_node="">23</span></a><span data-dcnode-id="2578" instrument_node=""> Much of what we might call the “first wave” of work on the rock music and youth culture under socialism also relied on a distinction between an authentic unofficial sphere and a false official one, as of course have many analyses of samizdat and dissent. These concepts are in fact native to a Soviet/socialist context&nbsp;: the valorization of the “authentic” (the “sincere”) and, by association, the equation of the unofficial with the real, was a central operation of the post‑Stalinist Thaw. But a rallying cry, however compelling, is no proof of analytical validity. As more recent studies of, in particular, Brezhnev‑era culture, have shown, the borders between official and unofficial socialist cultures could be porous indeed.</span><a class="footnotecall" data-dcnode-id="2576" href="#ftn24" id="bodyftn24"><span data-dcnode-id="2577" instrument_node="">24</span></a><span data-dcnode-id="2575" instrument_node=""> Lewis Siegelbaum, in his introduction to the recent collection </span><em data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">Borders of Socialism&nbsp;: Private Spheres of Soviet Russia, </span></em><span data-dcnode-id="2572" instrument_node="">identifies a similar interplay in the categories of public and private themselves&nbsp;; in place of two, separate spheres, “hermetically sealed” off from one another and perforce in opposition, Siegelbaum proposes the private “in dynamic, interactive tension with the public, itself understood as a complex, multi‑layered category.”</span><a class="footnotecall" data-dcnode-id="2570" href="#ftn25" id="bodyftn25"><span data-dcnode-id="2571" instrument_node="">25</span></a></p><span data-dcnode-id="2568" instrument_node="">
</span></div><span data-dcnode-id="2566" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2538"><span data-dcnode-id="2565" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2551"><span data-dcnode-id="2564" instrument_node="">
</span><li data-dcnode-id="2558"><span class="num" data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">26</span></span><span data-dcnode-id="2561" instrument_node=""> Gabor Rittersporn, “Reflexes, Folkways, Networks&nbsp;: Social Spaces in the Pre‑war USSR,” in Philip R. </span><a data-dcnode-id="2559" href="#ftn26"><span data-dcnode-id="2560" instrument_node="">(...)</span></a></li><span data-dcnode-id="2557" instrument_node="">
</span><li data-dcnode-id="2553"><span class="num" data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">27</span></span><span data-dcnode-id="2554" instrument_node=""> Habermas, L’espace public, 9‑11.</span></li><span data-dcnode-id="2552" instrument_node="">
</span></ul><span data-dcnode-id="2550" instrument_node="">
</span><p class="texte" data-dcnode-id="2540"><span class="paranumber" data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">11</span></span><span data-dcnode-id="2547" instrument_node="">References to the bourgeois public sphere in work on socialist societies point to the fact that many scholars see the concept in normative terms, as an ahistorical ideal‑type.</span><a class="footnotecall" data-dcnode-id="2545" href="#ftn26" id="bodyftn26"><span data-dcnode-id="2546" instrument_node="">26</span></a><span data-dcnode-id="2544" instrument_node=""> Yet Habermas himself warns against this in the introduction to his book on the public sphere, cautioning readers that it is impossible to construct an ideal‑type from the public sphere as it manifested itself in the high middle ages. He distinguishes four types of public sphere corresponding to four different historical moments&nbsp;: 1) the representative public sphere of the high middle ages)&nbsp;; 2) the bourgeois liberal sphere, which was literary in nature, referring to a public of individuals who operated by reason, tightly related to the reading practices and sociability of the Enlightenment&nbsp;; 3) the illiterate, plebeian sphere that rose as a consequence of the bourgeois revolutions of nineteenth century, and&nbsp;; 4) the condition of plebiscitary acclamation, applicable to twentieth‑century societies, which is post‑literary, meaning dominated by opinion in the absence of public discussion.</span><a class="footnotecall" data-dcnode-id="2542" href="#ftn27" id="bodyftn27"><span data-dcnode-id="2543" instrument_node="">27</span></a><span data-dcnode-id="2541" instrument_node=""> </span></p><span data-dcnode-id="2539" instrument_node="">
</span></div><span data-dcnode-id="2537" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2483"><span data-dcnode-id="2536" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2508"><span data-dcnode-id="2535" instrument_node="">
</span><li data-dcnode-id="2529"><span class="num" data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">28</span></span><span data-dcnode-id="2532" instrument_node=""> Lorenz Erren, “Stalinist Rule and Its Communication Practices. An Overview,” in Kirill Postoutenko, </span><a data-dcnode-id="2530" href="#ftn28"><span data-dcnode-id="2531" instrument_node="">(...)</span></a></li><span data-dcnode-id="2528" instrument_node="">
</span><li data-dcnode-id="2524"><span class="num" data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">29</span></span><span data-dcnode-id="2525" instrument_node=""> Rittersporn, Rolf, Behrends, “Open Spaces and Public Realm…”</span></li><span data-dcnode-id="2523" instrument_node="">
</span><li data-dcnode-id="2517"><span class="num" data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">30</span></span><span data-dcnode-id="2520" instrument_node=""> Bella Ostromoukhova, “Jouer et déjouer. Construction sociale d’une jeunesse active à travers le th </span><a data-dcnode-id="2518" href="#ftn30"><span data-dcnode-id="2519" instrument_node="">(...)</span></a></li><span data-dcnode-id="2516" instrument_node="">
</span><li data-dcnode-id="2510"><span class="num" data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">31</span></span><span data-dcnode-id="2513" instrument_node=""> Here we might refer to the vast literature on dissidence. For political dissidents, see Cécile Vais </span><a data-dcnode-id="2511" href="#ftn31"><span data-dcnode-id="2512" instrument_node="">(...)</span></a></li><span data-dcnode-id="2509" instrument_node="">
</span></ul><span data-dcnode-id="2507" instrument_node="">
</span><p class="texte" data-dcnode-id="2485"><span class="paranumber" data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">12</span></span><span data-dcnode-id="2504" instrument_node="">Historians of the USSR have sought to confront Soviet sources and empirical evidence with the concept of the bourgeois public sphere, and as a result, two definitions of the public sphere, narrow and broad, have been put forward. In the first, narrow definition, the public sphere is equated with the Soviet concept of </span><em data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">obshchestvennost´ </span></em><span data-dcnode-id="2501" instrument_node="">(regime activists or militants meant to represent “orthodox” public opinion).</span><a class="footnotecall" data-dcnode-id="2499" href="#ftn28" id="bodyftn28"><span data-dcnode-id="2500" instrument_node="">28</span></a><span data-dcnode-id="2498" instrument_node=""> The second, broad definition concerns a multitude of practices and formal and informal social spaces (including corners of resistance and dissidence.)</span><a class="footnotecall" data-dcnode-id="2496" href="#ftn29" id="bodyftn29"><span data-dcnode-id="2497" instrument_node="">29</span></a><span data-dcnode-id="2495" instrument_node=""> By addressing ourselves to the last part of Habermas’s argument devoted to the decline of the bourgeois public sphere, we can reconcile these two definitions and distinguish three types of public sphere in socialist societies&nbsp;: 1) a public sphere of plebiscitary acclamation, purely official in nature, corresponding to Soviet </span><em data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">obshchestvennost´</span></em><span data-dcnode-id="2492" instrument_node="">&nbsp;; 2) a semi‑controlled public sphere that provided opportunities to outmaneuver control through the formal frameworks that ensured its existence.</span><a class="footnotecall" data-dcnode-id="2490" href="#ftn30" id="bodyftn30"><span data-dcnode-id="2491" instrument_node="">30</span></a><span data-dcnode-id="2489" instrument_node=""> (It was these semi‑controlled spheres that underwrote the regime’s longevity. This was the realm of camouflaged critique, using coded language and references accessible only to insiders.) 3) Pockets of opposition to the state that were openly critical and illegal.</span><a class="footnotecall" data-dcnode-id="2487" href="#ftn31" id="bodyftn31"><span data-dcnode-id="2488" instrument_node="">31</span></a><span data-dcnode-id="2486" instrument_node=""> </span></p><span data-dcnode-id="2484" instrument_node="">
</span></div><span data-dcnode-id="2482" instrument_node="">
</span><p class="texte" data-dcnode-id="2469"><span class="paranumber" data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">13</span></span><span data-dcnode-id="2479" instrument_node="">This issue of </span><em data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Cahiers </span></em><span data-dcnode-id="2476" instrument_node="">presents three articles that utilize the concept of the public sphere.</span><em data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node=""> Stephen Lovell</span></em><span data-dcnode-id="2473" instrument_node=""> associates it with the introduction of shorthand in Russia in the 1860s in the context of the emergence of new institutions under Alexander II—</span><em data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">zemstva</span></em><span data-dcnode-id="2470" instrument_node=""> and open courts—that enlisted individual participation in political life. To document the spoken word in print form was something that resonated with contemporary demands for publicity. Subsequently, the Bolsheviks themselves came to rely heavily on stenographic reports, which they considered important mediating instruments in public life. However, economic considerations worked in favour of minutes rather than complete stenographic records, as did the growing practices of secrecy. Increasingly corrected and censored, stenograms were transformed as a communications tool and marginalized from central decision‑making practices, notably in the Politburo. Ultimately, shorthand can be seen as a technology that put Bolshevik democracy to the test.</span></p><span data-dcnode-id="2468" instrument_node="">
</span><p class="texte" data-dcnode-id="2462"><span class="paranumber" data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">14</span></span><em data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">Roman Krakovský</span></em><span data-dcnode-id="2463" instrument_node=""> interrogates the specificity of the socialist public sphere by studying the functions of the local council in a small Czechoslovak city on the outskirts of Prague. In particular, he is interested in understanding whether this institution succeeded in conceptualizing and defending an idea of the common good. His conclusion is that it did not. Krakovsky shows that, despite the common practice of writing to the authorities to resolve personal problems or denounce community members, public participation in council meetings grew increasingly formal&nbsp;; the individual was subordinated to the collective, and the meetings served above all to transmit information in one direction and to mobilize the population. As a result, individuals grew ever more isolated from one another, and though alternative spaces for discussion and sociability did exist, they never managed to define the common good. Fundamentally, as defined by the Czechoslovak communist party, the common good was a mechanism for increased social control enacted via denunciations and shrinking individual autonomy.</span></p><span data-dcnode-id="2461" instrument_node="">
</span><p class="texte" data-dcnode-id="2455"><span class="paranumber" data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">15</span></span><em data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">Kirsten Bönker</span></em><span data-dcnode-id="2456" instrument_node=""> reaches very different conclusions in her study of television in the Soviet Union. By examining the summaries of viewer mail produced by Central Television professionals under late socialism, Bönker demonstrates the ways in which television transformed political communication. Even if only 3&nbsp;% of viewers wrote to the television administration, their correspondence worked to justify the medium’s social function in the eyes of the authorities. The author argues that television contributed to the connection between the private and public spheres in so far as the public, via programming, entered into the private realm and nurtured interpersonal communications&nbsp;; at the same time, media coverage of viewer letters to Central Television made private concerns public. According to Bönker, television contributed to a sense of belonging and was for this reason a factor in the regime’s stability.</span></p><span data-dcnode-id="2454" instrument_node="">
</span><p class="texte" data-dcnode-id="2450"><span class="paranumber" data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">16</span></span><span data-dcnode-id="2451" instrument_node="">The difference in these two interpretations relates in part to the nature of the evidence they use. Which sources can we access to study the diversity of public opinion&nbsp;? Which tools can we use to generate a sociology of the Soviet public(s)&nbsp;? The plebiscitary acclamative sphere (as defined above) is the simplest to access because it is the best documented in minutes and stenographic reports of official meetings. The semi‑controlled sphere demands greater ingenuity of the researcher&nbsp;; here we must cross‑reference official sources related to the supervision of this sphere by party and state organs with less formal documents often located in personal archives. The oppositional sphere is accessible via official documents relating to the persecution of dissidents, on the one hand, and samizdat materials and collections of personal documents, on the other.</span></p><span data-dcnode-id="2449" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2401"><span data-dcnode-id="2448" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2422"><span data-dcnode-id="2447" instrument_node="">
</span><li data-dcnode-id="2441"><span class="num" data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">32</span></span><span data-dcnode-id="2444" instrument_node=""> Sheila Fitzpatrick, Stalin’s Peasants&nbsp;: Resistance and Survival in the Russian Collective after Col </span><a data-dcnode-id="2442" href="#ftn32"><span data-dcnode-id="2443" instrument_node="">(...)</span></a></li><span data-dcnode-id="2440" instrument_node="">
</span><li data-dcnode-id="2436"><span class="num" data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">33</span></span><span data-dcnode-id="2437" instrument_node=""> John Urry, Mobilities (Cambridge, Polity Press, 2007).</span></li><span data-dcnode-id="2435" instrument_node="">
</span><li data-dcnode-id="2431"><span class="num" data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">34</span></span><span data-dcnode-id="2432" instrument_node=""> Marc Granovetter, Sociologie économique (P.&nbsp;: Seuil, 2008), 53‑54.</span></li><span data-dcnode-id="2430" instrument_node="">
</span><li data-dcnode-id="2424"><span class="num" data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">35</span></span><span data-dcnode-id="2427" instrument_node=""> The interrogration process required agents of the political police to classify every opinion as eit </span><a data-dcnode-id="2425" href="#ftn35"><span data-dcnode-id="2426" instrument_node="">(...)</span></a></li><span data-dcnode-id="2423" instrument_node="">
</span></ul><span data-dcnode-id="2421" instrument_node="">
</span><p class="texte" data-dcnode-id="2403"><span class="paranumber" data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">17</span></span><span data-dcnode-id="2418" instrument_node="">A number of Soviet historians have approached the problem of public opinion by looking at rumors.</span><a class="footnotecall" data-dcnode-id="2416" href="#ftn32" id="bodyftn32"><span data-dcnode-id="2417" instrument_node="">32</span></a><span data-dcnode-id="2415" instrument_node=""> Because rumors can only spread widely where people are not subdivided into separate enclaves, their dissemination offers a window on the nature of any given society. At a macroscopic level, it is weak ties linking different communities together that promote social cohesion. Individual social mobility helps build bridges between different communities provided that the society also has tools for communication across distances&nbsp;:</span><a class="footnotecall" data-dcnode-id="2413" href="#ftn33" id="bodyftn33"><span data-dcnode-id="2414" instrument_node="">33</span></a><span data-dcnode-id="2412" instrument_node=""> “any message can reach a greater number of people and cover a larger social distance (that is, route length) if it is transmitted via weak links rather than strong ones.”</span><a class="footnotecall" data-dcnode-id="2410" href="#ftn34" id="bodyftn34"><span data-dcnode-id="2411" instrument_node="">34</span></a><span data-dcnode-id="2409" instrument_node=""> But most works about rumor in the Soviet context rely primarily on reports from the secret police (</span><em data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">svodki</span></em><span data-dcnode-id="2406" instrument_node="">) on the mood of the population—a source with well‑documented analytical weaknesses.</span><a class="footnotecall" data-dcnode-id="2404" href="#ftn35" id="bodyftn35"><span data-dcnode-id="2405" instrument_node="">35</span></a></p><span data-dcnode-id="2402" instrument_node="">
</span></div><span data-dcnode-id="2400" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2374"><span data-dcnode-id="2399" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2390" style="top: 56px;"><span data-dcnode-id="2398" instrument_node="">
</span><li data-dcnode-id="2392"><span class="num" data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">36</span></span><span data-dcnode-id="2395" instrument_node=""> Miriam Dobson, Khrushchev’s Cold Summer&nbsp;: Gulag Returnees, Crime, and the Fate of Reform after Stal </span><a data-dcnode-id="2393" href="#ftn36"><span data-dcnode-id="2394" instrument_node="">(...)</span></a></li><span data-dcnode-id="2391" instrument_node="">
</span></ul><span data-dcnode-id="2389" instrument_node="">
</span><p class="texte" data-dcnode-id="2376"><span class="paranumber" data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">18</span></span><span data-dcnode-id="2386" instrument_node="">Other Soviet historians have utilized letters to the regime (</span><em data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">pis´ma vo vlast´</span></em><span data-dcnode-id="2383" instrument_node="">) as a means to investigate popular moods. However, given that denunciations and complaint letters were used by the authorities for repressive ends, enabling them to target supposed enemies, the use of these letters as a source on public opinion has also been a subject of historiographical debate. To be sure, although letters allow us to form some idea of the variety of opinions in the population, they can only offer a restricted and partial view. It was unusual for someone to feel so involved in the life of the country as to send a letter to the authorities.</span><a class="footnotecall" data-dcnode-id="2381" href="#ftn36" id="bodyftn36"><span data-dcnode-id="2382" instrument_node="">36</span></a><span data-dcnode-id="2380" instrument_node=""> </span><em data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">Oleg Khlevniuk</span></em><span data-dcnode-id="2377" instrument_node=""> takes up the question of communication with the regime by examining Stalin’s responses to the letters addressed to him personally. His study reveals the bias of Stalin’s interests, which were, he finds, limited to theoretical problems in Marxist‑Leninist ideology, expressions of political loyalty, and messages from former acquaintances. Other types of letters were not put forward by Stalin’s office for the General Secretary’s attention, and at best were used to compile reports on the situation in the country and mood of the population. </span></p><span data-dcnode-id="2375" instrument_node="">
</span></div><span data-dcnode-id="2373" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2340"><span data-dcnode-id="2372" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2356"><span data-dcnode-id="2371" instrument_node="">
</span><li data-dcnode-id="2365"><span class="num" data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">37</span></span><span data-dcnode-id="2368" instrument_node=""> See, for example, Boris A.&nbsp;Grushin, Chetyre zhizni Rossii v zerkale oprosov obshchestvennogo mnenii </span><a data-dcnode-id="2366" href="#ftn37"><span data-dcnode-id="2367" instrument_node="">(...)</span></a></li><span data-dcnode-id="2364" instrument_node="">
</span><li data-dcnode-id="2358"><span class="num" data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">38</span></span><span data-dcnode-id="2361" instrument_node=""> Vladlen Izmozik, Glaza i ushi rezhima&nbsp;: gosudarstvennyi politicheskii kontrol´ za naseleniem Sovets </span><a data-dcnode-id="2359" href="#ftn38"><span data-dcnode-id="2360" instrument_node="">(...)</span></a></li><span data-dcnode-id="2357" instrument_node="">
</span></ul><span data-dcnode-id="2355" instrument_node="">
</span><p class="texte" data-dcnode-id="2342"><span class="paranumber" data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">19</span></span><span data-dcnode-id="2352" instrument_node="">Opinion polls conducted in the late Soviet Union and comments books at exhibitions have also been used to approach the problem of public opinion, though the sincerity of the responses recorded remains something of an open question.</span><a class="footnotecall" data-dcnode-id="2350" href="#ftn37" id="bodyftn37"><span data-dcnode-id="2351" instrument_node="">37</span></a><span data-dcnode-id="2349" instrument_node=""> Personal correspondence—above all, correspondence between intimates—was less subject to the need to conform to the conventions of official discourse, even in light of perlustration practices&nbsp;: censorship could motivate letter writers to adopt Aesopian language and express themselves cautiously.</span><a class="footnotecall" data-dcnode-id="2347" href="#ftn38" id="bodyftn38"><span data-dcnode-id="2348" instrument_node="">38</span></a><span data-dcnode-id="2346" instrument_node=""> In this issue, </span><em data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Kirill Feferman</span></em><span data-dcnode-id="2343" instrument_node="">’s article shows how one Jewish family, the Ginzburgs of Rostov‑on‑Don, struggled to come to terms with the contradictory information available in the press and the realm of rumor in 1941. He brings out the impact of censorship on their correspondence in their use of formulaic language about the enemy and hope in imminent victory. The repeated use of the official discourse in the beginning and the end of letters, he suggests, was a technique for mollifying the censors. </span></p><span data-dcnode-id="2341" instrument_node="">
</span></div><span data-dcnode-id="2339" instrument_node="">
</span><p class="texte" data-dcnode-id="2335"><span class="paranumber" data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">20</span></span><span data-dcnode-id="2336" instrument_node="">It is possible to approach the problem of sources and public opinion differently if we first question the Habermasian definition of the public sphere. According to Antoine Lilti, the definition of the public sphere as something requiring the operation of critical reason is</span></p><span data-dcnode-id="2334" instrument_node="">
</span><blockquote data-dcnode-id="2315"><span data-dcnode-id="2333" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2317"><span data-dcnode-id="2332" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2325"><span data-dcnode-id="2331" instrument_node="">
</span><li data-dcnode-id="2327"><span class="num" data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">39</span></span><span data-dcnode-id="2328" instrument_node=""> Antoine Lilti, Figures publiques&nbsp;: L’invention de la célébrité, 1750‑1850 (P.&nbsp;: Fayard), 17.</span></li><span data-dcnode-id="2326" instrument_node="">
</span></ul><span data-dcnode-id="2324" instrument_node="">
</span><p class="citation" data-dcnode-id="2319"><span data-dcnode-id="2323" instrument_node="">grounded entirely in a political ideal, that of public debate projected onto the Age of Enlightenment, in order to better critique everything which takes its distance from that ideal in our contemporary world.</span><a class="footnotecall" data-dcnode-id="2321" href="#ftn39" id="bodyftn39"><span data-dcnode-id="2322" instrument_node="">39</span></a><span data-dcnode-id="2320" instrument_node=""> </span></p><span data-dcnode-id="2318" instrument_node="">
</span></div><span data-dcnode-id="2316" instrument_node="">
</span></blockquote><span data-dcnode-id="2314" instrument_node="">
</span><p class="paragraphesansretrait" data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">In its idealization of the eighteenth century, this concept of public sphere leads us astray in our thinking of what a public could be. In his study of celebrity, Lilti demonstrated that the public&nbsp;:</span></p><span data-dcnode-id="2311" instrument_node="">
</span><blockquote data-dcnode-id="2293"><span data-dcnode-id="2310" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2295"><span data-dcnode-id="2309" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2302"><span data-dcnode-id="2308" instrument_node="">
</span><li data-dcnode-id="2304"><span class="num" data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">40</span></span><span data-dcnode-id="2305" instrument_node=""> Ibid., 17.</span></li><span data-dcnode-id="2303" instrument_node="">
</span></ul><span data-dcnode-id="2301" instrument_node="">
</span><p class="citation" data-dcnode-id="2297"><span data-dcnode-id="2300" instrument_node="">is not only a case of literary, artistic, or political judgment&nbsp;; rather, it is a set of anonymous readers who read the same books and, increasingly in the eighteenth century, the same periodicals. The public is not formed by the exchange of rational arguments, but rather by sharing the same curiosities and beliefs, by being interested in the same things at the same time and by being conscious of that simultaneity.</span><a class="footnotecall" data-dcnode-id="2298" href="#ftn40" id="bodyftn40"><span data-dcnode-id="2299" instrument_node="">40</span></a></p><span data-dcnode-id="2296" instrument_node="">
</span></div><span data-dcnode-id="2294" instrument_node="">
</span></blockquote><span data-dcnode-id="2292" instrument_node="">
</span><p class="texte" data-dcnode-id="2288"><span class="paranumber" data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">21</span></span><span data-dcnode-id="2289" instrument_node="">This conceptual shift proves critical to overcoming the dichotomy between public and private in socialist states. Considered from this angle, the public becomes a body capable of exercising collective criticism (for or against the regime), but it is also a province of mass culture, with its diversity of opinions. Individuals’ consciousness of constituting a public—that is, of sharing the same interests at the same time—stimulates mutual imitation and opens the door to mutual influence at a distance. The role of mass media here is crucial because media circulate the messages and images that contribute to constituting the public.</span></p><span data-dcnode-id="2287" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2257"><span data-dcnode-id="2286" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2270"><span data-dcnode-id="2285" instrument_node="">
</span><li data-dcnode-id="2279"><span class="num" data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">41</span></span><span data-dcnode-id="2282" instrument_node=""> Larissa Zakharova, “Concevoir l’efficacité des communications en Union soviétique (fin des années 1 </span><a data-dcnode-id="2280" href="#ftn41"><span data-dcnode-id="2281" instrument_node="">(...)</span></a></li><span data-dcnode-id="2278" instrument_node="">
</span><li data-dcnode-id="2272"><span class="num" data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">42</span></span><span data-dcnode-id="2275" instrument_node=""> Kristin Roth‑Ey, Moscow Prime Time&nbsp;: How the Soviet Union Built the Media Empire That Lost the Cult </span><a data-dcnode-id="2273" href="#ftn42"><span data-dcnode-id="2274" instrument_node="">(...)</span></a></li><span data-dcnode-id="2271" instrument_node="">
</span></ul><span data-dcnode-id="2269" instrument_node="">
</span><p class="texte" data-dcnode-id="2259"><span class="paranumber" data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">22</span></span><span data-dcnode-id="2266" instrument_node="">Soviet leaders were highly aware of the importance of the media. Regime change in 1917 was accompanied by a communications revolution that manifested itself first in the distribution of the press throughout the country and, in time, in mass radio and television broadcasting. The Bolsheviks considered it essential to provide everyone access to the official discourse, particularly with the aim of political education. To that end, they put in place a variety of mechanisms, including extremely low pricing for periodicals (in relation to production costs). In the end of the 1920s, the rates were four times lower than their pre‑war equivalents, while distribution volume was two and half times higher.</span><a class="footnotecall" data-dcnode-id="2264" href="#ftn41" id="bodyftn41"><span data-dcnode-id="2265" instrument_node="">41</span></a><span data-dcnode-id="2263" instrument_node=""> Nevertheless, the history of the first half of the twentieth century demonstrates how difficult the regime found it to cover the country with communication networks. In 1947, 65&nbsp;% of the Soviet population lived in rural areas that held less than 20&nbsp;% of radio equipment. Some collective farms had no (wired) radio speaker at all. Similarly, the majority of Soviet villages were located more than ten kilometres from a post office, complicating the distribution of newspapers. Even if political educators were doing their jobs, the fact is that regime discourse was far from omnipresent in the countryside, which remained governed by mechanical solidarity (in Durkheim’s definition) at least until the end of the Stalin’s rule. By contrast, as of the 1950s, we begin to see dynamics strongly favoring the consolidation of media publics, most importantly, the shift from wired to wireless broadcasting, the influx of foreign radio broadcasting in the USSR, and the arrival of transistor radio and then of television, both of which enabled users to choose among programs to listen to and watch. Urbanization allowed ever increasing numbers of people to access mediated mass culture. By 1970, radio had entered every Soviet home, with 95 million radio sets across the country. While in 1950, the total number of television sets averaged out to one per twelve thousand people, in 1970, the ratio was one per fifteen, and in 1980, one per four</span><a class="footnotecall" data-dcnode-id="2261" href="#ftn42" id="bodyftn42"><span data-dcnode-id="2262" instrument_node="">42</span></a><span data-dcnode-id="2260" instrument_node="">.</span></p><span data-dcnode-id="2258" instrument_node="">
</span></div><span data-dcnode-id="2256" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2223"><span data-dcnode-id="2255" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2239"><span data-dcnode-id="2254" instrument_node="">
</span><li data-dcnode-id="2248"><span class="num" data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">43</span></span><span data-dcnode-id="2251" instrument_node=""> Laurent Thévenot, “Voicing concern and difference&nbsp;: from public spaces to common‑places,” European  </span><a data-dcnode-id="2249" href="#ftn43"><span data-dcnode-id="2250" instrument_node="">(...)</span></a></li><span data-dcnode-id="2247" instrument_node="">
</span><li data-dcnode-id="2241"><span class="num" data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">44</span></span><span data-dcnode-id="2244" instrument_node=""> David Brandenberger, National Bolshevism&nbsp;: Stalinist Mass Culture and the Formation of Modern Russi </span><a data-dcnode-id="2242" href="#ftn44"><span data-dcnode-id="2243" instrument_node="">(...)</span></a></li><span data-dcnode-id="2240" instrument_node="">
</span></ul><span data-dcnode-id="2238" instrument_node="">
</span><p class="texte" data-dcnode-id="2225"><span class="paranumber" data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">23</span></span><span data-dcnode-id="2235" instrument_node="">Mass culture is tightly linked to the creation of celebrities, which socialist media mastered perfectly. We need only think of the media campaigns around Aleksei Stakhanov, Iurii Gagarin and the other cosmonauts, or indeed Nikita Khrushchev, whose press photographs from the 1950s and ‘60s are analysed in this issue by </span><em data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">Ekaterina Vikulina</span></em><span data-dcnode-id="2232" instrument_node="">. Communication via celebrities is at the heart of the phenomenon of the media public in socialist countries. Laurent Thévenot’s conceptualization of the grammar of common places and regimes of engagement allows us to better understand how individuals come to understandings while maintaining their different opinions. Common places are not obvious, and they are definitely not clichés&nbsp;; they are instead intermediate objects—hero figures, emotionally‑charged objects, emblematic scenes from literature, poetry or theater—to which we can all refer, albeit differently according to personal affinities.</span><a class="footnotecall" data-dcnode-id="2230" href="#ftn43" id="bodyftn43"><span data-dcnode-id="2231" instrument_node="">43</span></a><span data-dcnode-id="2229" instrument_node=""> Celebrities are the common places to which, while maintaining our differences, we can attach ourselves, basically because these common places are never opened up to critical evaluation and are never questioned. The success of Soviet propaganda in the first half of the 1930s, as analysed by David Brandenberger and Jeffrey Brooks, was directly related to the abandonment of an abstract Marxist discourse about anonymous social forces and the appearance in its stead of “ordinary heroes” (Stakhanovites, pilots, etc.) in literature and film, which increased its impact on individuals.</span><a class="footnotecall" data-dcnode-id="2227" href="#ftn44" id="bodyftn44"><span data-dcnode-id="2228" instrument_node="">44</span></a><span data-dcnode-id="2226" instrument_node=""> People’s engagement with and personal investment in these common places lent a personalized, emotional character to communications. This theoretical prism can thus help resolve the conflict between support and resistance. In order the understand the diversity of opinion at play within a single individual, we need to think in terms of situated emotional engagements rather than duplicity. </span></p><span data-dcnode-id="2224" instrument_node="">
</span></div><span data-dcnode-id="2222" instrument_node="">
</span><p class="texte" data-dcnode-id="2212"><span class="paranumber" data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">24</span></span><span data-dcnode-id="2219" instrument_node="">The articles by </span><em data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Christine Evans</span></em><span data-dcnode-id="2216" instrument_node=""> and </span><em data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Anna Fishzon</span></em><span data-dcnode-id="2213" instrument_node=""> in this issue can both be read through this lens of socialist common places. Fishzon examines the subversive power of Soviet children’s cartoons in the Brezhnev era. Censorship in this area was less stringent&nbsp;; artists found a niche where certain forms of criticism of Soviet reality could be allowed. The cultural implications were important. Fishzon argues that cartoons deployed the values of the official ideology in such a way as to transform concepts of time and affect. A “queer temporality” focussed on the present and on desire was communicated through the medium of cartoons, whose heroes became genuine common places for Soviet viewers. </span></p><span data-dcnode-id="2211" instrument_node="">
</span><p class="texte" data-dcnode-id="2204"><span class="paranumber" data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">25</span></span><span data-dcnode-id="2208" instrument_node="">As for Fishzon, the emotions elicited by the experience of cultural consumption are central to Christine Evans’s work. Soviet television programs of the Brezhnev period—in particular, the program </span><em data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Ot vsei dushi</span></em><span data-dcnode-id="2205" instrument_node=""> analysed here—were designed to engage every viewer on a personal level by appealing to what mattered to and moved her. The portraits of ordinary heroes and heroines on screen were supposed to convey “the Soviet way of life”—the slogan of the era. Veterans of the Great Patriotic War, “honest Soviet workers,” and sovkhoz tractor drivers were all emotionally charged common places that created a sense of belonging to the same community. Soviet television’s emotions were critical, argues Evans, because they “offered a way to mobilize and unify in the absence of a convincing, overarching ideology.” </span></p><span data-dcnode-id="2203" instrument_node="">
</span><h1 class="texte" data-dcnode-id="2200"><a data-dcnode-id="2201" href="#tocfrom1n2" id="tocto1n2"><span data-dcnode-id="2202" instrument_node="">Communications and the challenges of technological innovation</span></a></h1><span data-dcnode-id="2199" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="2180"><span data-dcnode-id="2198" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="2189"><span data-dcnode-id="2197" instrument_node="">
</span><li data-dcnode-id="2191"><span class="num" data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">45</span></span><span data-dcnode-id="2194" instrument_node=""> David Edgerton, The Shock of the Old&nbsp;: Technology and Global History Since 1900 (Profile books, 201 </span><a data-dcnode-id="2192" href="#ftn45"><span data-dcnode-id="2193" instrument_node="">(...)</span></a></li><span data-dcnode-id="2190" instrument_node="">
</span></ul><span data-dcnode-id="2188" instrument_node="">
</span><p class="texte" data-dcnode-id="2182"><span class="paranumber" data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">26</span></span><span data-dcnode-id="2185" instrument_node="">Technological innovation was inseparable from the evolution of communications practices and related diversification of audiences. The symbolic power of modern media technologies, in particular, as interfaces between the self and the social, and between the organic body and the machine, should not be underestimated. The Soviet Union and the socialist states of Eastern Europe lauded technological progress as a domain where socialism held the advantage. In practice, the introduction of new technologies was not always straightforward and was the subject of debate between specialists and the authorities. New technologies never entirely replaced old ones, and this engendered an overlap in technological generations, or what David Edgerton has called “the shock of the old.”</span><a class="footnotecall" data-dcnode-id="2183" href="#ftn45" id="bodyftn45"><span data-dcnode-id="2184" instrument_node="">45</span></a></p><span data-dcnode-id="2181" instrument_node="">
</span></div><span data-dcnode-id="2179" instrument_node="">
</span><p class="texte" data-dcnode-id="2172"><span class="paranumber" data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">27</span></span><span data-dcnode-id="2176" instrument_node="">Several articles in the issue address the question of communications and technological innovation. </span><em data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">Angelina Lucento</span></em><span data-dcnode-id="2173" instrument_node=""> shows how figurative painting was able to preserve its status as a premier visual medium under socialism in the face of the rising prominence of photography in the late 1920s and early 1930s. Painting’s presumed emotional impact on viewers was in producing collectivist feelings—“an ocean of feeling” connecting different members of society, which photography was thought not to match. These critiques of photography stimulated its evolution. The new developed thanks to the old, in a kind of permanent competition. The reproduction of paintings by mechanical means developed in reaction to the rapid spread of photographic technology.</span></p><span data-dcnode-id="2171" instrument_node="">
