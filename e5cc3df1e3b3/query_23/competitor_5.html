</span><h2 data-dcnode-id="1771" style="text-align: justify;"><span data-dcnode-id="1772" style="font-weight: 400;"><span data-dcnode-id="1773" instrument_node="">What is the Commonwealth of Independent States (CIS)?</span></span></h2><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1767" style="text-align: justify;"><span data-dcnode-id="1768" style="font-weight: 400;"><span data-dcnode-id="1769" instrument_node="">The Commonwealth of Independent States (CIS) is a regional intergovernmental organization of the former Soviet Republics which is focused on cooperation in the following aspects:</span></span></p><span data-dcnode-id="1766" instrument_node="">
</span><ul data-dcnode-id="1744" style="text-align: justify;"><span data-dcnode-id="1765" instrument_node="">
</span><li data-dcnode-id="1762" style="font-weight: 400;"><span data-dcnode-id="1763" style="font-weight: 400;"><span data-dcnode-id="1764" instrument_node="">Political,&nbsp;</span></span></li><span data-dcnode-id="1761" instrument_node="">
</span><li data-dcnode-id="1758" style="font-weight: 400;"><span data-dcnode-id="1759" style="font-weight: 400;"><span data-dcnode-id="1760" instrument_node="">Economic,&nbsp;</span></span></li><span data-dcnode-id="1757" instrument_node="">
</span><li data-dcnode-id="1754" style="font-weight: 400;"><span data-dcnode-id="1755" style="font-weight: 400;"><span data-dcnode-id="1756" instrument_node="">Environmental,&nbsp;</span></span></li><span data-dcnode-id="1753" instrument_node="">
</span><li data-dcnode-id="1750" style="font-weight: 400;"><span data-dcnode-id="1751" style="font-weight: 400;"><span data-dcnode-id="1752" instrument_node="">Humanitarian,&nbsp;</span></span></li><span data-dcnode-id="1749" instrument_node="">
</span><li data-dcnode-id="1746" style="font-weight: 400;"><span data-dcnode-id="1747" style="font-weight: 400;"><span data-dcnode-id="1748" instrument_node="">Cultural and Other Issues</span></span></li><span data-dcnode-id="1745" instrument_node="">
</span></ul><span data-dcnode-id="1743" instrument_node="">
</span><h2 data-dcnode-id="1740" style="text-align: justify;"><span data-dcnode-id="1741" style="font-weight: 400;"><span data-dcnode-id="1742" instrument_node="">History of Commonwealth of Independent States (CIS)</span></span></h2><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1736" style="text-align: justify;"><span data-dcnode-id="1737" style="font-weight: 400;"><span data-dcnode-id="1738" instrument_node="">The Soviet Union was dissolved in 1991 leading to the foundation of the Commonwealth of Independent States (CIS).&nbsp;</span></span></p><span data-dcnode-id="1735" instrument_node="">
</span><p data-dcnode-id="1732" style="text-align: justify;"><span data-dcnode-id="1733" style="font-weight: 400;"><span data-dcnode-id="1734" instrument_node="">The founding states of the CIS include Belarus, Russia and Ukraine.&nbsp;</span></span></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1728" style="text-align: justify;"><span data-dcnode-id="1729" style="font-weight: 400;"><span data-dcnode-id="1730" instrument_node="">The remaining republics of the Soviet Union joined the Commonwealth of Independent States after signing the Alma-Ata Protocol. Now, the Commonwealth of Independent States (CIS) has the following countries as its members:</span></span></p><span data-dcnode-id="1727" instrument_node="">
</span><ul data-dcnode-id="1717" style="text-align: justify;"><span data-dcnode-id="1726" instrument_node="">
</span><li data-dcnode-id="1723" style="font-weight: 400;"><span data-dcnode-id="1724" style="font-weight: 400;"><span data-dcnode-id="1725" instrument_node="">Russia, Belarus &amp; Ukraine</span></span></li><span data-dcnode-id="1722" instrument_node="">
</span><li data-dcnode-id="1719" style="font-weight: 400;"><span data-dcnode-id="1720" style="font-weight: 400;"><span data-dcnode-id="1721" instrument_node="">Armenia, Kazakhstan, Azerbaijan, Turkmenistan, Tajikistan, Uzbekistan, Moldova and Kyrgyzstan.</span></span></li><span data-dcnode-id="1718" instrument_node="">
</span></ul><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1713" style="text-align: justify;"><span data-dcnode-id="1714" style="font-weight: 400;"><span data-dcnode-id="1715" instrument_node="">Meetings are held periodically on a rotating basis at the CIS countries’ capitals. Forums include the Council of Heads of State, the Council of Prime Ministers, and the Council of Foreign Ministers.</span></span></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1711" instrument_node="">To know what are the factors that led to the </span><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/dissolution-of-the-soviet-union-1991/"><span data-dcnode-id="1710" instrument_node="">dissolution of the Soviet Union</span></a><span data-dcnode-id="1708" instrument_node="">, visit the linked article</span></p><span data-dcnode-id="1706" instrument_node="">
</span><h2 data-dcnode-id="1703" style="text-align: justify;"><span data-dcnode-id="1704" style="font-weight: 400;"><span data-dcnode-id="1705" instrument_node="">What is the role of CIS?</span></span></h2><span data-dcnode-id="1702" instrument_node="">
</span><ul data-dcnode-id="1676" style="text-align: justify;"><span data-dcnode-id="1701" instrument_node="">
</span><li data-dcnode-id="1698" style="font-weight: 400;"><span data-dcnode-id="1699" style="font-weight: 400;"><span data-dcnode-id="1700" instrument_node="">The Commonwealth of Independent States (CIS) meets periodically on a rotating basis at the capitals of the Member Countries.</span></span></li><span data-dcnode-id="1697" instrument_node="">
</span><li data-dcnode-id="1694" style="font-weight: 400;"><span data-dcnode-id="1695" style="font-weight: 400;"><span data-dcnode-id="1696" instrument_node="">The Council of Heads of State, Council of Prime Ministers and Council of Foreign Ministers are included in the forums.&nbsp;</span></span></li><span data-dcnode-id="1693" instrument_node="">
</span><li data-dcnode-id="1690" style="font-weight: 400;"><span data-dcnode-id="1691" style="font-weight: 400;"><span data-dcnode-id="1692" instrument_node="">The CIS performs its activities based on the CIS Charter which was signed in 1993 in order to set up various institutions of the CIS and their rules and functions.</span></span></li><span data-dcnode-id="1689" instrument_node="">
</span><li data-dcnode-id="1686" style="font-weight: 400;"><span data-dcnode-id="1687" style="font-weight: 400;"><span data-dcnode-id="1688" instrument_node="">This Charter incorporates the rights and obligations of the member countries along with the goals and principles of the Commonwealth.</span></span></li><span data-dcnode-id="1685" instrument_node="">
</span><li data-dcnode-id="1682" style="font-weight: 400;"><span data-dcnode-id="1683" style="font-weight: 400;"><span data-dcnode-id="1684" instrument_node="">The Charter states that the Commonwealth was formed on the basis of sovereign equality of all its members and that the Member States were independent and equal subjects under international law.&nbsp;</span></span></li><span data-dcnode-id="1681" instrument_node="">
</span><li data-dcnode-id="1678" style="font-weight: 400;"><span data-dcnode-id="1679" style="font-weight: 400;"><span data-dcnode-id="1680" instrument_node="">It also mentions that the Commonwealth of Independent States shall serve in developing and strengthening trust, mutual understanding, friendship, Inter-ethnic accord and cooperation between the member states.</span></span></li><span data-dcnode-id="1677" instrument_node="">
</span></ul><span data-dcnode-id="1675" instrument_node="">
</span><h2 data-dcnode-id="1672" style="text-align: justify;"><span data-dcnode-id="1673" style="font-weight: 400;"><span data-dcnode-id="1674" instrument_node="">Members of Commonwealth of Independent States</span></span></h2><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1668" style="text-align: justify;"><span data-dcnode-id="1669" style="font-weight: 400;"><span data-dcnode-id="1670" instrument_node="">12 States — Armenia, Azerbaijan, Belarus, Georgia, Kazakhstan, Kyrgyzstan, Moldova, Russia, Tajikistan, Turkmenistan, Ukraine, and Uzbekistan.</span></span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><img alt="CIS Member Countries " class="aligncenter wp-image-1273140 size-large" data-dcnode-id="1666" height="422" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn1.byjus.com/wp-content/uploads/2020/03/CIS-700x422.png&amp;raw" srcset="https://cdn1.byjus.com/wp-content/uploads/2020/03/CIS-700x422.png 700w, https://cdn1.byjus.com/wp-content/uploads/2020/03/CIS-250x151.png 250w, https://cdn1.byjus.com/wp-content/uploads/2020/03/CIS-768x463.png 768w, https://cdn1.byjus.com/wp-content/uploads/2020/03/CIS-120x72.png 120w, https://cdn1.byjus.com/wp-content/uploads/2020/03/CIS.png 973w" width="700"></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1661" style="text-align: justify;"><span data-dcnode-id="1662" style="font-weight: 400;"><span data-dcnode-id="1663" instrument_node="">The Commonwealth of Independent States has its headquarters located in Minsk, Belarus. Another important department of CIS i.e., CIS Executive Committee which looks after the economic affairs is situated in Moscow, Russia.</span></span></p><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1653" style="text-align: justify;"><span data-dcnode-id="1656" style="font-weight: 400;"><span data-dcnode-id="1659" instrument_node="">Kickstart your </span><a data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/upsc-2022/"><span data-dcnode-id="1658" instrument_node="">UPSC 2022</span></a></span><span data-dcnode-id="1654" style="font-weight: 400;"><span data-dcnode-id="1655" instrument_node="">&nbsp;Preparation today!</span></span></p><span data-dcnode-id="1652" instrument_node="">
</span><p class="pdf-download-snippet" data-dcnode-id="1647"><b data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Commonwealth of Independent States – UPSC IR Notes:-</span></b><a class="btn btn-default" data-dcnode-id="1648" href="javascript:void(0)" id="bplrtdbrsp-0" oncontextmenu="return false"><span data-dcnode-id="1649" instrument_node=""> Download PDF Here</span></a></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1645"></p><div class="faq-section mb30" data-dcnode-id="1627" id="Frequently-Asked-Questions-about-Commonwealth-of-Independent-States-(CIS)"><h2 data-dcnode-id="1642"><span data-dcnode-id="1643" style="color: #800080;"><span data-dcnode-id="1644" instrument_node="">Frequently Asked Questions about Commonwealth of Independent States (CIS)</span></span></h2><div class="faq-schema" data-dcnode-id="1628"><div data-dcnode-id="1629" itemscope="" itemtype="https://schema.org/FAQPage"><section data-dcnode-id="1636" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><h3 data-dcnode-id="1640" itemprop="name text"><span data-dcnode-id="1641" instrument_node="">What is the aim of Commonwealth of Independent States?</span></h3><div data-dcnode-id="1637" itemprop="suggestedAnswer acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="1638" itemprop="text"><span data-dcnode-id="1639" instrument_node="">The CIS’s functions are to coordinate its members’ policies regarding their economies, foreign relations, defense, immigration policies, environmental protection, and law enforcement.</span></div></div></section><section data-dcnode-id="1630" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><h3 data-dcnode-id="1634" itemprop="name text"><span data-dcnode-id="1635" instrument_node="">How many countries are there in the CIS?</span></h3><div data-dcnode-id="1631" itemprop="suggestedAnswer acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="1632" itemprop="text"><span data-dcnode-id="1633" instrument_node="">There are nine full member states of the Commonwealth of Independent States. The Creation Agreement remained the main constituent document of the CIS until January 1993, when the CIS Charter was adopted.</span></div></div></section></div></div></div><p data-dcnode-id="1626"></p><span data-dcnode-id="1625" instrument_node="">
