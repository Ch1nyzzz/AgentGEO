plate talk:History of the Soviet Union"><abbr data-dcnode-id="7758" title="Discuss this template"><span data-dcnode-id="7759" instrument_node="">t</span></abbr></a></li><li class="nv-edit" data-dcnode-id="7752"><a class="external text" data-dcnode-id="7753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3AHistory_of_the_Soviet_Union%26action%3Dedit"><abbr data-dcnode-id="7754" title="Edit this template"><span data-dcnode-id="7755" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table></div></div><span data-dcnode-id="7743" instrument_node="">
</span><p data-dcnode-id="7720"><span data-dcnode-id="7742" instrument_node="">The </span><b data-dcnode-id="7740"><span data-dcnode-id="7741" instrument_node="">Soviet economic blockade of Lithuania</span></b><span data-dcnode-id="7739" instrument_node=""> (</span><a data-dcnode-id="7737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuanian_language" title="Lithuanian language"><span data-dcnode-id="7738" instrument_node="">Lithuanian</span></a><span data-dcnode-id="7736" instrument_node="">: </span><i data-dcnode-id="7734" lang="lt"><span data-dcnode-id="7735" instrument_node="">Lietuvos ekonominė blokada</span></i><span data-dcnode-id="7733" instrument_node="">, </span><a data-dcnode-id="7731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_language" title="Russian language"><span data-dcnode-id="7732" instrument_node="">Russian</span></a><span data-dcnode-id="7730" instrument_node="">: </span><span data-dcnode-id="7728" lang="ru"><span data-dcnode-id="7729" instrument_node="">экономическая блокада Литвы</span></span><span data-dcnode-id="7727" instrument_node="">) was imposed by the </span><a data-dcnode-id="7725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="7726" instrument_node="">Soviet Union</span></a><span data-dcnode-id="7724" instrument_node=""> on </span><a data-dcnode-id="7722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuania" title="Lithuania"><span data-dcnode-id="7723" instrument_node="">Lithuania</span></a><span data-dcnode-id="7721" instrument_node=""> between 18 April and 2 July 1990.
</span></p><p data-dcnode-id="7697"><span data-dcnode-id="7719" instrument_node="">By late 1980s, </span><a data-dcnode-id="7717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="7718" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="7716" instrument_node="">, leader of the Soviet Union, embarked on a course of liberalisation of the political system of the country, and as a result, movements appeared that advocated for autonomy or independence within the Soviet Union. The </span><a class="mw-redirect" data-dcnode-id="7714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuanian_Supreme_Council" title="Lithuanian Supreme Council"><span data-dcnode-id="7715" instrument_node="">Lithuanian Supreme Council</span></a><span data-dcnode-id="7713" instrument_node=""> then adopted the </span><a data-dcnode-id="7711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Act_of_the_Re-Establishment_of_the_State_of_Lithuania" title="Act of the Re-Establishment of the State of Lithuania"><span data-dcnode-id="7712" instrument_node="">Act of the Re-Establishment of the State of Lithuania</span></a><span data-dcnode-id="7710" instrument_node=""> (Act) on 11 March 1990. </span><a data-dcnode-id="7708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kremlin" title="Kremlin"><span data-dcnode-id="7709" instrument_node="">Kremlin</span></a><span data-dcnode-id="7707" instrument_node=""> officials demanded that the Act be annulled, interpreting it as a secessionist affair, but Lithuania ignored them, arguing that they were </span><a data-dcnode-id="7705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_occupation_of_the_Baltic_states_%281940%29" title="Soviet occupation of the Baltic states (1940)"><span data-dcnode-id="7706" instrument_node="">coerced to join USSR back in 1940</span></a><span data-dcnode-id="7704" instrument_node="">. Gorbachev then ordered to reinforce troops in Lithuania. The Lithuanians did not back down, however, so Gorbachev sent an ultimatum on 13 April, requiring Lithuanians to renounce the act under the threat of economic sanctions. As the Soviet officials were not satisfied with the answer from Lithuania, the </span><a data-dcnode-id="7702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blockade" title="Blockade"><span data-dcnode-id="7703" instrument_node="">blockade</span></a><span data-dcnode-id="7701" instrument_node=""> started on 18 April at 21:25 (</span><a class="mw-redirect" data-dcnode-id="7699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/EEST" title="EEST"><span data-dcnode-id="7700" instrument_node="">EEST</span></a><span data-dcnode-id="7698" instrument_node="">).
</span></p><p data-dcnode-id="7683"><span data-dcnode-id="7696" instrument_node="">The economic blockade restricted or cancelled the centralised supply of energy resources, on which Lithuania was extremely dependent from USSR, as well as electricity, foodstuffs, and pharmaceuticals. To a much lesser extent, the embargo also impacted </span><a data-dcnode-id="7694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kaliningrad_Oblast" title="Kaliningrad Oblast"><span data-dcnode-id="7695" instrument_node="">Kaliningrad Oblast</span></a><span data-dcnode-id="7693" instrument_node="">. The Soviet Union also sealed the republic's borders and blocked Lithuania's bank accounts. As the rebel republic felt crippling shortages of essential items, </span><a data-dcnode-id="7691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_world" title="Western world"><span data-dcnode-id="7692" instrument_node="">Western countries</span></a><span data-dcnode-id="7690" instrument_node=""> pressured Lithuania and the Soviet Union to reach a compromise and due to the intensification of </span><a data-dcnode-id="7688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parade_of_sovereignties" title="Parade of sovereignties"><span data-dcnode-id="7689" instrument_node="">internal sovereigntist movements</span></a><span data-dcnode-id="7687" instrument_node=""> within the other fourteen republics of the Soviet Union, particularly within the </span><a data-dcnode-id="7685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Soviet_Federative_Socialist_Republic" title="Russian Soviet Federative Socialist Republic"><span data-dcnode-id="7686" instrument_node="">Russian Soviet Federative Socialist Republic</span></a><span data-dcnode-id="7684" instrument_node=""> (RSFSR), the blockade was eased in mid-June. The sanctions were lifted on 2 July, after the Lithuanian parliament agreed to suspend the effects of the Act and to begin talks with the Soviet side. The long-awaited negotiations, however, did not yield any results.
</span></p><p data-dcnode-id="7656"><span data-dcnode-id="7682" instrument_node="">Despite its short duration, the blockade had profound effects on the country. Total losses from the blockade on the Lithuanian side exceeded 500 million </span><a data-dcnode-id="7680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_ruble" title="Soviet ruble"><span data-dcnode-id="7681" instrument_node="">rubles</span></a><span data-dcnode-id="7679" instrument_node="">, or 1.5% of the </span><a class="mw-redirect" data-dcnode-id="7677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gross_national_product" title="Gross national product"><span data-dcnode-id="7678" instrument_node="">gross national product</span></a><span data-dcnode-id="7676" instrument_node=""> (GNP).</span><sup class="reference" data-dcnode-id="7673" id="cite_ref-:28_2-0"><a data-dcnode-id="7674" href="#cite_note-:28-2"><span data-dcnode-id="7675" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="7670" id="cite_ref-:19_3-0"><a data-dcnode-id="7671" href="#cite_note-:19-3"><span data-dcnode-id="7672" instrument_node="">[3]</span></a></sup><span data-dcnode-id="7669" instrument_node=""> Thousands of workers lost their jobs or were idling at their factories as supplies were lacking. Effects on market transition were mixed. The embargo forced Lithuania to centralise its governance and strengthen regulation of resource usage. Enterprises created partnerships with fellow companies and Lithuania negotiated trade agreements with other republics, marking a transition to capitalist economics. It also made the country look for other ways to import oil and start industrial exploitation of its resources. The economic blockade also slowed the pace of separation of the other two </span><a data-dcnode-id="7667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_states" title="Baltic states"><span data-dcnode-id="7668" instrument_node="">Baltic states</span></a><span data-dcnode-id="7666" instrument_node="">, </span><a data-dcnode-id="7664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latvia" title="Latvia"><span data-dcnode-id="7665" instrument_node="">Latvia</span></a><span data-dcnode-id="7663" instrument_node=""> and </span><a data-dcnode-id="7661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estonia" title="Estonia"><span data-dcnode-id="7662" instrument_node="">Estonia</span></a><span data-dcnode-id="7660" instrument_node="">, from the Soviet Union. The role of the minorities (particularly </span><a data-dcnode-id="7658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poles_in_Lithuania" title="Poles in Lithuania"><span data-dcnode-id="7659" instrument_node="">Poles</span></a><span data-dcnode-id="7657" instrument_node="">) in the blockade is unclear but some speculate that the Polish minority, which was dominated by pro-Soviet politicians, was treated preferentially during the blockade by the Soviet Union.
</span></p><span data-dcnode-id="7655" instrument_node="">

</span><h2 data-dcnode-id="7521"><span class="mw-headline" data-dcnode-id="7529" id="Background"><span data-dcnode-id="7530" instrument_node="">Background</span></span><span class="mw-editsection" data-dcnode-id="7522"><span class="mw-editsection-bracket" data-dcnode-id="7527"><span data-dcnode-id="7528" instrument_node="">[</span></span><a data-dcnode-id="7525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_economic_blockade_of_Lithuania%26action%3Dedit%26section%3D1" title="Edit section: Background"><span data-dcnode-id="7526" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7523"><span data-dcnode-id="7524" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7520" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="7514" role="note"><span data-dcnode-id="7517" instrument_node="">Main article: </span><a data-dcnode-id="7515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Singing_Revolution" title="Singing Revolution"><span data-dcnode-id="7516" instrument_node="">Singing Revolution</span></a></div><span data-dcnode-id="7513" instrument_node="">
</span><link data-dcnode-id="7512" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7505" role="note"><span data-dcnode-id="7511" instrument_node="">See also: </span><a data-dcnode-id="7509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parade_of_sovereignties" title="Parade of sovereignties"><span data-dcnode-id="7510" instrument_node="">Parade of sovereignties</span></a><span data-dcnode-id="7508" instrument_node=""> and </span><a data-dcnode-id="7506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molotov%25E2%2580%2593Ribbentrop_Pact" title="Molotov–Ribbentrop Pact"><span data-dcnode-id="7507" instrument_node="">Molotov–Ribbentrop Pact</span></a></div><span data-dcnode-id="7504" instrument_node="">
</span><p data-dcnode-id="7480"><span data-dcnode-id="7503" instrument_node="">Shortly after Germany and the Soviet Union signed of the Molotov–Ribbentrop Pact in 1939, the </span><a data-dcnode-id="7501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_states" title="Baltic states"><span data-dcnode-id="7502" instrument_node="">Baltic states</span></a><span data-dcnode-id="7500" instrument_node=""> were </span><a data-dcnode-id="7498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Occupation_of_the_Baltic_states" title="Occupation of the Baltic states"><span data-dcnode-id="7499" instrument_node="">occupied and illegally incorporated</span></a><span data-dcnode-id="7497" instrument_node=""> into the </span><a data-dcnode-id="7495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="7496" instrument_node="">Soviet Union</span></a><span data-dcnode-id="7494" instrument_node="">; the territories, including Lithuania, </span><a class="mw-redirect" data-dcnode-id="7492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_occupation_of_the_Baltic_states_%281944%29" title="Soviet occupation of the Baltic states (1944)"><span data-dcnode-id="7493" instrument_node="">fell under control of USSR</span></a><span data-dcnode-id="7491" instrument_node=""> after </span><a data-dcnode-id="7489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="7490" instrument_node="">World War II</span></a><span data-dcnode-id="7488" instrument_node="">. Despite being part of the Soviet Union for more than 40 years, in the 1980s the Baltic states were still seen as somewhat different from the rest of the USSR.</span><sup class="reference" data-dcnode-id="7485" id="cite_ref-4"><a data-dcnode-id="7486" href="#cite_note-4"><span data-dcnode-id="7487" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="7482" id="cite_ref-5"><a data-dcnode-id="7483" href="#cite_note-5"><span data-dcnode-id="7484" instrument_node="">[5]</span></a></sup><span data-dcnode-id="7481" instrument_node="">
</span></p><p data-dcnode-id="7447"><span data-dcnode-id="7479" instrument_node="">After </span><a data-dcnode-id="7477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="7478" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="7476" instrument_node=""> was elected leader of the </span><a data-dcnode-id="7474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_the_Soviet_Union" title="Communist Party of the Soviet Union"><span data-dcnode-id="7475" instrument_node="">Communist Party of the Soviet Union</span></a><span data-dcnode-id="7473" instrument_node=""> (CPSU) in 1985, the Soviet government gradually introduced some liberalisation measures, including </span><a data-dcnode-id="7471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perestroika" title="Perestroika"><span data-dcnode-id="7472" instrument_node="">perestroika</span></a><span data-dcnode-id="7470" instrument_node=""> and </span><a data-dcnode-id="7468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glasnost" title="Glasnost"><span data-dcnode-id="7469" instrument_node="">glasnost</span></a><span data-dcnode-id="7467" instrument_node="">. These policies enabled massive demonstrations in most </span><a data-dcnode-id="7465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republics_of_the_Soviet_Union" title="Republics of the Soviet Union"><span data-dcnode-id="7466" instrument_node="">Soviet republics</span></a><span data-dcnode-id="7464" instrument_node="">. In the Baltic states, the gatherings, which initially protested the environmentally-unfriendly projects of the central government, turned more and more political. By late summer 1988, </span><a data-dcnode-id="7462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S%25C4%2585j%25C5%25ABdis" title="Sąjūdis"><span data-dcnode-id="7463" instrument_node="">Sąjūdis</span></a><span data-dcnode-id="7461" instrument_node="">, the movement which was initially in favour of perestroika, started to demand legalisation of the </span><a data-dcnode-id="7459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flag_of_Lithuania" title="Flag of Lithuania"><span data-dcnode-id="7460" instrument_node="">Lithuanian interwar flag</span></a><span data-dcnode-id="7458" instrument_node="">, resignation of the republic's government and </span><a data-dcnode-id="7456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sovereignty" title="Sovereignty"><span data-dcnode-id="7457" instrument_node="">sovereignty</span></a><span data-dcnode-id="7455" instrument_node=""> for Lithuania. By early 1989, the movement already protested for independence from USSR.</span><sup class="reference" data-dcnode-id="7452" id="cite_ref-Beissinger_6-0"><a data-dcnode-id="7453" href="#cite_note-Beissinger-6"><span data-dcnode-id="7454" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="7449" id="cite_ref-:22_7-0"><a data-dcnode-id="7450" href="#cite_note-:22-7"><span data-dcnode-id="7451" instrument_node="">[7]</span></a></sup><span data-dcnode-id="7448" instrument_node="">
</span></p><p data-dcnode-id="7418"><span data-dcnode-id="7446" instrument_node="">These demands were eventually implemented. In November 1988, the </span><a data-dcnode-id="7444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Soviet_of_the_Lithuanian_Soviet_Socialist_Republic" title="Supreme Soviet of the Lithuanian Soviet Socialist Republic"><span data-dcnode-id="7445" instrument_node="">Supreme Soviet of the Lithuanian Soviet Socialist Republic</span></a><span data-dcnode-id="7443" instrument_node=""> established the tricolored flag as the flag of the republic.</span><sup class="reference" data-dcnode-id="7440" id="cite_ref-8"><a data-dcnode-id="7441" href="#cite_note-8"><span data-dcnode-id="7442" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7439" instrument_node=""> Later on, in May 1989, the republic issued a declaration of sovereignty. It asserted the primacy of Lithuanian law, though still in the framework of the Soviet Union.</span><sup class="reference" data-dcnode-id="7436" id="cite_ref-9"><a data-dcnode-id="7437" href="#cite_note-9"><span data-dcnode-id="7438" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="7433" id="cite_ref-:0_10-0"><a data-dcnode-id="7434" href="#cite_note-:0-10"><span data-dcnode-id="7435" instrument_node="">[10]</span></a></sup><span data-dcnode-id="7432" instrument_node=""> While the declaration expressly violated Article 74 of the </span><a data-dcnode-id="7430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1977_Constitution_of_the_Soviet_Union" title="1977 Constitution of the Soviet Union"><span data-dcnode-id="7431" instrument_node="">1977 Constitution</span></a><span data-dcnode-id="7429" instrument_node="">, which said that Soviet law should prevail in case of conflicting legislation, no actions were undertaken by the officials in the </span><a data-dcnode-id="7427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kremlin" title="Kremlin"><span data-dcnode-id="7428" instrument_node="">Kremlin</span></a><sup class="reference" data-dcnode-id="7424" id="cite_ref-11"><a data-dcnode-id="7425" href="#cite_note-11"><span data-dcnode-id="7426" instrument_node="">[11]</span></a></sup><span data-dcnode-id="7423" instrument_node=""> - to the contrary, in November 1989 the Soviet Union made some concessions by approving a plan of financial and economical autonomy for the Baltic republics.</span><sup class="reference" data-dcnode-id="7420" id="cite_ref-:1_12-0"><a data-dcnode-id="7421" href="#cite_note-:1-12"><span data-dcnode-id="7422" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7419" instrument_node="">
</span></p><p data-dcnode-id="7389"><span data-dcnode-id="7417" instrument_node="">
At the same time, revelations in Lithuania concerning the secret protocols of the Molotov-Ribbentrop pact (whose existence USSR had denied) further angered the opposition, which demanded their disclosure and condemnation.</span><sup class="reference" data-dcnode-id="7414" id="cite_ref-13"><a data-dcnode-id="7415" href="#cite_note-13"><span data-dcnode-id="7416" instrument_node="">[13]</span></a></sup><span data-dcnode-id="7413" instrument_node=""> The Soviet Union formally acknowledged their existence in December 1989, following deliberations of a select committee in the </span><a data-dcnode-id="7411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Congress_of_People%2527s_Deputies_of_the_Soviet_Union" title="Congress of People's Deputies of the Soviet Union"><span data-dcnode-id="7412" instrument_node="">Congress of People's Deputies</span></a><span data-dcnode-id="7410" instrument_node="">, and declared them "legally untenable and invalid from the moment they were signed".</span><sup class="reference" data-dcnode-id="7407" id="cite_ref-14"><a data-dcnode-id="7408" href="#cite_note-14"><span data-dcnode-id="7409" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7406" instrument_node=""> Finally, Gorbachev had problems inside his party. In December 1989, </span><a data-dcnode-id="7404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Algirdas_Brazauskas" title="Algirdas Brazauskas"><span data-dcnode-id="7405" instrument_node="">Algirdas Brazauskas</span></a><span data-dcnode-id="7403" instrument_node="">, the leader of the </span><a data-dcnode-id="7401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_Lithuania" title="Communist Party of Lithuania"><span data-dcnode-id="7402" instrument_node="">Communist Party of Lithuania</span></a><span data-dcnode-id="7400" instrument_node=""> (CPL), announced that CPL was independent from CPSU, despite pleas not to do so by Gorbachev.</span><sup class="reference" data-dcnode-id="7397" id="cite_ref-15"><a data-dcnode-id="7398" href="#cite_note-15"><span data-dcnode-id="7399" instrument_node="">[15]</span></a></sup><span data-dcnode-id="7396" instrument_node=""> Angry, the </span><a class="mw-redirect" data-dcnode-id="7394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Committee_of_CPSU" title="Central Committee of CPSU"><span data-dcnode-id="7395" instrument_node="">Central Committee of CPSU</span></a><span data-dcnode-id="7393" instrument_node=""> sent Gorbachev to Vilnius to quell the party revolt. However, the First Secretary failed to subordinate party rebels and his trip only made Lithuanians press harder for independence.</span><sup class="reference" data-dcnode-id="7390" id="cite_ref-16"><a data-dcnode-id="7391" href="#cite_note-16"><span data-dcnode-id="7392" instrument_node="">[16]</span></a></sup></p><div class="thumb tright" data-dcnode-id="7374"><div class="thumbinner" data-dcnode-id="7375" style="width:222px;"><a class="image" data-dcnode-id="7387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_rally_in_Lithuania_commemorate_and_condemn_the_Molotov-Ribbentrop_Pact%2C_August_23%2C_1988%2C_Vilnius%2C_Vingis_Park.jpg"><img alt="A large meeting of people assembled in a park in front of an arch-like structure, on which the Columns of Gediminas, a XIV-century Lithuanian symbol, appear" class="thumbimage" data-dcnode-id="7388" data-file-height="3412" data-file-width="4928" decoding="async" height="152" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e5/A_rally_in_Lithuania_commemorate_and_condemn_the_Molotov-Ribbentrop_Pact%252C_August_23%252C_1988%252C_Vilnius%252C_Vingis_Park.jpg/220px-A_rally_in_Lithuania_commemorate_and_condemn_the_Molotov-Ribbentrop_Pact%252C_August_23%252C_1988%252C_Vilnius%252C_Vingis_Park.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e5/A_rally_in_Lithuania_commemorate_and_condemn_the_Molotov-Ribbentrop_Pact%2C_August_23%2C_1988%2C_Vilnius%2C_Vingis_Park.jpg/330px-A_rally_in_Lithuania_commemorate_and_condemn_the_Molotov-Ribbentrop_Pact%2C_August_23%2C_1988%2C_Vilnius%2C_Vingis_Park.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e5/A_rally_in_Lithuania_commemorate_and_condemn_the_Molotov-Ribbentrop_Pact%2C_August_23%2C_1988%2C_Vilnius%2C_Vingis_Park.jpg/440px-A_rally_in_Lithuania_commemorate_and_condemn_the_Molotov-Ribbentrop_Pact%2C_August_23%2C_1988%2C_Vilnius%2C_Vingis_Park.jpg 2x" width="220"></a><span data-dcnode-id="7386" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7376"><div class="magnify" data-dcnode-id="7384"><a class="internal" data-dcnode-id="7385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_rally_in_Lithuania_commemorate_and_condemn_the_Molotov-Ribbentrop_Pact%2C_August_23%2C_1988%2C_Vilnius%2C_Vingis_Park.jpg" title="Enlarge"></a></div><span data-dcnode-id="7383" instrument_node="">An August 1988 rally in commemoration and condemnation of the Molotov-Ribbentrop Pact in </span><a data-dcnode-id="7381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vingis_Park" title="Vingis Park"><span data-dcnode-id="7382" instrument_node="">Vingis Park</span></a><span data-dcnode-id="7380" instrument_node="">, Vilnius, organised by Sąjūdis. Participation is estimated to have reached 150,000-200,000 people.</span><sup class="reference" data-dcnode-id="7377" id="cite_ref-17"><a data-dcnode-id="7378" href="#cite_note-17"><span data-dcnode-id="7379" instrument_node="">[17]</span></a></sup></div></div></div><span data-dcnode-id="7373" instrument_node="">
</span><h2 data-dcnode-id="7363"><span class="mw-headline" data-dcnode-id="7371" id="Restoration_of_independence"><span data-dcnode-id="7372" instrument_node="">Restoration of independence</span></span><span class="mw-editsection" data-dcnode-id="7364"><span class="mw-editsection-bracket" data-dcnode-id="7369"><span data-dcnode-id="7370" instrument_node="">[</span></span><a data-dcnode-id="7367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_economic_blockade_of_Lithuania%26action%3Dedit%26section%3D2" title="Edit section: Restoration of independence"><span data-dcnode-id="7368" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7365"><span data-dcnode-id="7366" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7362" instrument_node="">
</span><link data-dcnode-id="7361" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7357" role="note"><span data-dcnode-id="7360" instrument_node="">Further information: </span><a data-dcnode-id="7358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Act_of_the_Re-Establishment_of_the_State_of_Lithuania" title="Act of the Re-Establishment of the State of Lithuania"><span data-dcnode-id="7359" instrument_node="">Act of the Re-Establishment of the State of Lithuania</span></a></div><div class="thumb tright" data-dcnode-id="7338"><div class="thumbinner" data-dcnode-id="7339" style="width:222px;"><a class="image" data-dcnode-id="7355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1990_01_12_Gorba%25C4%258Diovas%25C5%25A0iauliuose18plakatas1.jpg"><img alt="A meeting of protesters during Gorbachev's visit to Lithuania in January 1990. One of the pro-independence protesters carries a poster saying, in Russian, &quot;НЕМЕШАЙТЕ [sic] НАМ ИДТИ СВОИМ ПУТЕМ&quot; (&quot;Let us go our way&quot;)" class="thumbimage" data-dcnode-id="7356" data-file-height="1428" data-file-width="2160" decoding="async" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b6/1990_01_12_Gorba%25C4%258Diovas%25C5%25A0iauliuose18plakatas1.jpg/220px-1990_01_12_Gorba%25C4%258Diovas%25C5%25A0iauliuose18plakatas1.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b6/1990_01_12_Gorba%C4%8Diovas%C5%A0iauliuose18plakatas1.jpg/330px-1990_01_12_Gorba%C4%8Diovas%C5%A0iauliuose18plakatas1.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b6/1990_01_12_Gorba%C4%8Diovas%C5%A0iauliuose18plakatas1.jpg/440px-1990_01_12_Gorba%C4%8Diovas%C5%A0iauliuose18plakatas1.jpg 2x" width="220"></a><span data-dcnode-id="7354" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7340"><div class="magnify" data-dcnode-id="7352"><a class="internal" data-dcnode-id="7353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1990_01_12_Gorba%25C4%258Diovas%25C5%25A0iauliuose18plakatas1.jpg" title="Enlarge"></a></div><span data-dcnode-id="7351" instrument_node="">A meeting of protesters in </span><a class="new" data-dcnode-id="7349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBridai%26action%3Dedit%26redlink%3D1" title="Bridai (page does not exist)"><span data-dcnode-id="7350" instrument_node="">Bridai</span></a><span data-dcnode-id="7348" instrument_node="">, </span><a data-dcnode-id="7346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C5%25A0iauliai_District_Municipality" title="Šiauliai District Municipality"><span data-dcnode-id="7347" instrument_node="">Šiauliai district</span></a><span data-dcnode-id="7345" instrument_node="">, during Gorbachev's visit to Lithuania in January 1990. The poster in Russian reads "Letus [</span><i data-dcnode-id="7342"><a data-dcnode-id="7343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sic" title="Sic"><span data-dcnode-id="7344" instrument_node="">sic</span></a></i><span data-dcnode-id="7341" instrument_node="">] go our way!"</span></div></div></div><span data-dcnode-id="7337" instrument_node="">
</span><p data-dcnode-id="7280"><span data-dcnode-id="7336" instrument_node="">On 7 February 1990, following the Soviet parliament's findings on the Molotov-Ribbentrop pact, Lithuania announced that the declaration that had Lithuania join USSR did not represent the will of Lithuanians and was therefore void.</span><sup class="reference" data-dcnode-id="7333" id="cite_ref-:0_10-1"><a data-dcnode-id="7334" href="#cite_note-:0-10"><span data-dcnode-id="7335" instrument_node="">[10]</span></a></sup><span data-dcnode-id="7332" instrument_node=""> A month later, on 11 March, Lithuania became the first republic to </span><a data-dcnode-id="7330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Act_of_the_Re-Establishment_of_the_State_of_Lithuania" title="Act of the Re-Establishment of the State of Lithuania"><span data-dcnode-id="7331" instrument_node="">restore its independence</span></a><span data-dcnode-id="7329" instrument_node=""> from the USSR. The timing aimed to preempt the election of the </span><a data-dcnode-id="7327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_Soviet_Union" title="President of the Soviet Union"><span data-dcnode-id="7328" instrument_node="">president of the Soviet Union</span></a><span data-dcnode-id="7326" instrument_node="">, scheduled on 15 March.</span><sup class="reference" data-dcnode-id="7323" id="cite_ref-:2_18-0"><a data-dcnode-id="7324" href="#cite_note-:2-18"><span data-dcnode-id="7325" instrument_node="">[18]</span></a></sup><span data-dcnode-id="7322" instrument_node=""> When Vilnius sent an invitation to the Kremlin to begin negotiations related to the restoration of independence the next day, the Soviet leadership was infuriated.</span><sup class="reference" data-dcnode-id="7319" id="cite_ref-:1_12-1"><a data-dcnode-id="7320" href="#cite_note-:1-12"><span data-dcnode-id="7321" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="7316" id="cite_ref-:8_19-0"><a data-dcnode-id="7317" href="#cite_note-:8-19"><span data-dcnode-id="7318" instrument_node="">[19]</span></a></sup><span data-dcnode-id="7315" instrument_node=""> It demanded that the </span><a class="mw-redirect" data-dcnode-id="7313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuanian_Supreme_Council" title="Lithuanian Supreme Council"><span data-dcnode-id="7314" instrument_node="">Lithuanian Supreme Council</span></a><span data-dcnode-id="7312" instrument_node=""> repeal the Act of the Re-Establishment of the State of Lithuania, but Lithuania rejected the request and its leader, </span><a data-dcnode-id="7310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vytautas_Landsbergis" title="Vytautas Landsbergis"><span data-dcnode-id="7311" instrument_node="">Vytautas Landsbergis</span></a><span data-dcnode-id="7309" instrument_node="">, appealed to the "democratic nations" to recognise the country's independence.</span><sup class="reference" data-dcnode-id="7306" id="cite_ref-20"><a data-dcnode-id="7307" href="#cite_note-20"><span data-dcnode-id="7308" instrument_node="">[20]</span></a></sup><span data-dcnode-id="7305" instrument_node=""> Gorbachev later warned, in an attempt to dissuade Lithuania from secession, that if Lithuania were to do so, the Soviet Union would claim </span><a data-dcnode-id="7303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vilnius" title="Vilnius"><span data-dcnode-id="7304" instrument_node="">Vilnius</span></a><span data-dcnode-id="7302" instrument_node=""> and </span><a data-dcnode-id="7300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Klaip%25C4%2597da" title="Klaipėda"><span data-dcnode-id="7301" instrument_node="">Klaipėda</span></a><span data-dcnode-id="7299" instrument_node="">, which were not part of Lithuania prior to the Molotov-Ribbentrop pact.</span><sup class="reference" data-dcnode-id="7296" id="cite_ref-:3_21-0"><a data-dcnode-id="7297" href="#cite_note-:3-21"><span data-dcnode-id="7298" instrument_node="">[21]</span></a></sup><span data-dcnode-id="7295" instrument_node=""> The theme would recur in Gorbachev's later speeches</span><sup class="reference" data-dcnode-id="7292" id="cite_ref-:16_22-0"><a data-dcnode-id="7293" href="#cite_note-:16-22"><span data-dcnode-id="7294" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="7289" id="cite_ref-:6_23-0"><a data-dcnode-id="7290" href="#cite_note-:6-23"><span data-dcnode-id="7291" instrument_node="">[23]</span></a></sup><span data-dcnode-id="7288" instrument_node=""> and in maps circulated among </span><a data-dcnode-id="7286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Byelorussian_Soviet_Socialist_Republic" title="Byelorussian Soviet Socialist Republic"><span data-dcnode-id="7287" instrument_node="">Byelorussian</span></a><span data-dcnode-id="7285" instrument_node=""> officials.</span><sup class="reference" data-dcnode-id="7282" id="cite_ref-:5_24-0"><a data-dcnode-id="7283" href="#cite_note-:5-24"><span data-dcnode-id="7284" instrument_node="">[24]</span></a></sup><span data-dcnode-id="7281" instrument_node="">
</span></p><p data-dcnode-id="7237"><span data-dcnode-id="7279" instrument_node="">Lithuanians argued that since Lithuania was independent due to the restoration act, negotiations could only happen based on </span><a data-dcnode-id="7277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_law" title="International law"><span data-dcnode-id="7278" instrument_node="">international law</span></a><span data-dcnode-id="7276" instrument_node="">, but the Soviets saw it as an attempt to secede, which they said was only subject to Union's regulations.</span><sup class="reference" data-dcnode-id="7273" id="cite_ref-:3_21-1"><a data-dcnode-id="7274" href="#cite_note-:3-21"><span data-dcnode-id="7275" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="7270" id="cite_ref-25"><a data-dcnode-id="7271" href="#cite_note-25"><span data-dcnode-id="7272" instrument_node="">[25]</span></a></sup><span data-dcnode-id="7269" instrument_node=""> As a result, the 3rd session of the Congress of People's Deputies ruled the act to be unconstitutional and declared any unilateral declarations of independence void until a law regulating secession was adopted.</span><sup class="reference" data-dcnode-id="7266" id="cite_ref-26"><a data-dcnode-id="7267" href="#cite_note-26"><span data-dcnode-id="7268" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="7263" id="cite_ref-27"><a data-dcnode-id="7264" href="#cite_note-27"><span data-dcnode-id="7265" instrument_node="">[27]</span></a></sup><span data-dcnode-id="7262" instrument_node=""> When it was passed on 3 April, the terms set in the document proved virtually impossible to implement.</span><sup class="reference" data-dcnode-id="7259" id="cite_ref-28"><a data-dcnode-id="7260" href="#cite_note-28"><span data-dcnode-id="7261" instrument_node="">[28]</span></a></sup><sup class="reference" data-dcnode-id="7256" id="cite_ref-29"><a data-dcnode-id="7257" href="#cite_note-29"><span data-dcnode-id="7258" instrument_node="">[a]</span></a></sup><span data-dcnode-id="7255" instrument_node=""> Landsbergis government promptly responded with a letter which asserted that the resolution of the Congress of People's Deputies was illegal and insisted on talks on equal footing between USSR and Lithuania.</span><sup class="reference" data-dcnode-id="7252" id="cite_ref-:9_30-0"><a data-dcnode-id="7253" href="#cite_note-:9-30"><span data-dcnode-id="7254" instrument_node="">[29]</span></a></sup><span data-dcnode-id="7251" instrument_node=""> In addition to that, a proposal by </span><a class="mw-redirect" data-dcnode-id="7249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/US_President" title="US President"><span data-dcnode-id="7250" instrument_node="">President</span></a><span data-dcnode-id="7248" instrument_node=""> </span><a data-dcnode-id="7246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_H._W._Bush" title="George H. W. Bush"><span data-dcnode-id="7247" instrument_node="">George H. W. Bush</span></a><span data-dcnode-id="7245" instrument_node=""> to calm the situation by organising an independence </span><a data-dcnode-id="7243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Referendum" title="Referendum"><span data-dcnode-id="7244" instrument_node="">referendum</span></a><span data-dcnode-id="7242" instrument_node=""> was firmly rejected by the Soviets.</span><sup class="reference" data-dcnode-id="7239" id="cite_ref-:4_31-0"><a data-dcnode-id="7240" href="#cite_note-:4-31"><span data-dcnode-id="7241" instrument_node="">[30]</span></a></sup><span data-dcnode-id="7238" instrument_node="">
</span></p><p data-dcnode-id="7201"><span data-dcnode-id="7236" instrument_node="">In late March, the Soviet government ordered to reinforce troops in Lithuania, introduced about 100 tanks and 1,500 soldiers to the streets of Vilnius and captured some strategic buildings, including the prosecutor's office, the </span><a data-dcnode-id="7234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vilnius_Airport" title="Vilnius Airport"><span data-dcnode-id="7235" instrument_node="">Vilnius airport</span></a><span data-dcnode-id="7233" instrument_node="">, the Party Historical Institute, the headquarters of the Communist Party of Lithuania, and printing offices of the main newspapers and journals of the republic.</span><sup class="reference" data-dcnode-id="7230" id="cite_ref-:1_12-2"><a data-dcnode-id="7231" href="#cite_note-:1-12"><span data-dcnode-id="7232" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="7227" id="cite_ref-32"><a data-dcnode-id="7228" href="#cite_note-32"><span data-dcnode-id="7229" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="7224" id="cite_ref-:27_33-0"><a data-dcnode-id="7225" href="#cite_note-:27-33"><span data-dcnode-id="7226" instrument_node="">[32]</span></a></sup><span data-dcnode-id="7223" instrument_node=""> Additionally, Gorbachev issued a decree ordering </span><a data-dcnode-id="7221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/KGB" title="KGB"><span data-dcnode-id="7222" instrument_node="">KGB</span></a><span data-dcnode-id="7220" instrument_node=""> officers to enhance surveillance of Lithuania's borders (which also involved closing the only border crossing with </span><a data-dcnode-id="7218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poland" title="Poland"><span data-dcnode-id="7219" instrument_node="">Poland</span></a><span data-dcnode-id="7217" instrument_node=""> on 3 April),</span><sup class="reference" data-dcnode-id="7214" id="cite_ref-34"><a data-dcnode-id="7215" href="#cite_note-34"><span data-dcnode-id="7216" instrument_node="">[33]</span></a></sup><span data-dcnode-id="7213" instrument_node=""> mandated surrender of hunting rifles by the population and ordered all foreigners (including diplomats and journalists) to leave the region.</span><sup class="reference" data-dcnode-id="7210" id="cite_ref-:19_3-1"><a data-dcnode-id="7211" href="#cite_note-:19-3"><span data-dcnode-id="7212" instrument_node="">[3]</span></a></sup><span data-dcnode-id="7209" instrument_node=""> Gorbachev still sought to reach a compromise with Lithuanians by secretly negotiating with Algirdas Brazauskas, who by then has become deputy </span><a data-dcnode-id="7207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prime_Minister_of_Lithuania" title="Prime Minister of Lithuania"><span data-dcnode-id="7208" instrument_node="">prime minister of Lithuania</span></a><span data-dcnode-id="7206" instrument_node="">; however, the Soviet leader backtracked after Brazauskas demanded an exorbitant sum in reparations.</span><sup class="reference" data-dcnode-id="7203" id="cite_ref-:10_35-0"><a data-dcnode-id="7204" href="#cite_note-:10-35"><span data-dcnode-id="7205" instrument_node="">[34]</span></a></sup><span data-dcnode-id="7202" instrument_node="">
</span></p><span data-dcnode-id="7200" instrument_node="">
</span><h2 data-dcnode-id="7190"><span class="mw-headline" data-dcnode-id="7198" id="Blockade"><span data-dcnode-id="7199" instrument_node="">Blockade</span></span><span class="mw-editsection" data-dcnode-id="7191"><span class="mw-editsection-bracket" data-dcnode-id="7196"><span data-dcnode-id="7197" instrument_node="">[</span></span><a data-dcnode-id="7194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_economic_blockade_of_Lithuania%26action%3Dedit%26section%3D3" title="Edit section: Blockade"><span data-dcnode-id="7195" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7192"><span data-dcnode-id="7193" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7189" instrument_node="">
</span><p data-dcnode-id="7116"><span data-dcnode-id="7188" instrument_node="">On 13 April 1990, </span><a data-dcnode-id="7186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="7187" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="7185" instrument_node="">, President of the Soviet Union, and </span><a data-dcnode-id="7183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolai_Ryzhkov" title="Nikolai Ryzhkov"><span data-dcnode-id="7184" instrument_node="">Nikolai Ryzhkov</span></a><span data-dcnode-id="7182" instrument_node="">, </span><a data-dcnode-id="7180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Premier_of_the_Soviet_Union" title="Premier of the Soviet Union"><span data-dcnode-id="7181" instrument_node="">Chairman</span></a><span data-dcnode-id="7179" instrument_node=""> of the USSR's </span><a data-dcnode-id="7177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_of_Ministers_of_the_Soviet_Union" title="Council of Ministers of the Soviet Union"><span data-dcnode-id="7178" instrument_node="">Council of Ministers</span></a><span data-dcnode-id="7176" instrument_node="">, issued an </span><a data-dcnode-id="7174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ultimatum" title="Ultimatum"><span data-dcnode-id="7175" instrument_node="">ultimatum</span></a><span data-dcnode-id="7173" instrument_node=""> to Lithuania, which demanded to revoke the Act and to restore the supremacy of the Soviet laws within two days, lest an </span><a class="mw-redirect" data-dcnode-id="7171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Embargo" title="Embargo"><span data-dcnode-id="7172" instrument_node="">embargo</span></a><span data-dcnode-id="7170" instrument_node=""> on produce paid for by freely convertible currency is imposed.</span><sup class="reference" data-dcnode-id="7167" id="cite_ref-lrs_36-0"><a data-dcnode-id="7168" href="#cite_note-lrs-36"><span data-dcnode-id="7169" instrument_node="">[35]</span></a></sup><span data-dcnode-id="7166" instrument_node=""> Hardliners within CPSU were nudging towards a </span><a data-dcnode-id="7164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coup_d%27%25C3%25A9tat" title="Coup d'état"><span data-dcnode-id="7165" instrument_node="">coup d'état</span></a><span data-dcnode-id="7163" instrument_node="">, and initially Gorbachev was open to consider such a scenario,</span><sup class="reference" data-dcnode-id="7160" id="cite_ref-:4_31-1"><a data-dcnode-id="7161" href="#cite_note-:4-31"><span data-dcnode-id="7162" instrument_node="">[30]</span></a></sup><span data-dcnode-id="7159" instrument_node=""> but later he dismissed such calls.</span><sup class="reference" data-dcnode-id="7156" id="cite_ref-37"><a data-dcnode-id="7157" href="#cite_note-37"><span data-dcnode-id="7158" instrument_node="">[36]</span></a></sup><span data-dcnode-id="7155" instrument_node=""> Gorbachev also reportedly thought about a full-scale military invasion</span><sup class="reference" data-dcnode-id="7152" id="cite_ref-:2_18-1"><a data-dcnode-id="7153" href="#cite_note-:2-18"><span data-dcnode-id="7154" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="7149" id="cite_ref-exit-cold-war_38-0"><a data-dcnode-id="7150" href="#cite_note-exit-cold-war-38"><span data-dcnode-id="7151" instrument_node="">[37]</span></a></sup><span data-dcnode-id="7148" instrument_node=""> or assumption of direct control of Lithuania from Moscow,</span><sup class="reference" data-dcnode-id="7145" id="cite_ref-39"><a data-dcnode-id="7146" href="#cite_note-39"><span data-dcnode-id="7147" instrument_node="">[38]</span></a></sup><span data-dcnode-id="7144" instrument_node=""> but ultimately also resigned from these ideas. Therefore, Gorbachev decided to try an economic blockade instead, hoping to instigate a popular revolt against the Lithuanian leadership and to force it to rescind the independence declaration.</span><sup class="reference" data-dcnode-id="7141" id="cite_ref-:8_19-1"><a data-dcnode-id="7142" href="#cite_note-:8-19"><span data-dcnode-id="7143" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="7138" id="cite_ref-:5_24-1"><a data-dcnode-id="7139" href="#cite_note-:5-24"><span data-dcnode-id="7140" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="7135" id="cite_ref-exit-cold-war_38-1"><a data-dcnode-id="7136" href="#cite_note-exit-cold-war-38"><span data-dcnode-id="7137" instrument_node="">[37]</span></a></sup><span data-dcnode-id="7134" instrument_node=""> This solution was chosen despite the fact that the previous month, </span><a data-dcnode-id="7132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yuri_Maslyukov" title="Yuri Maslyukov"><span data-dcnode-id="7133" instrument_node="">Yuri Maslyukov</span></a><span data-dcnode-id="7131" instrument_node="">, the director of </span><a data-dcnode-id="7129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gosplan" title="Gosplan"><span data-dcnode-id="7130" instrument_node="">Gosplan</span></a><span data-dcnode-id="7128" instrument_node="">, the Soviet central planning committee, was assuring that an embargo would not happen as he thought it would be detrimental to both sides of the conflict.</span><sup class="reference" data-dcnode-id="7125" id="cite_ref-:11_40-0"><a data-dcnode-id="7126" href="#cite_note-:11-40"><span data-dcnode-id="7127" instrument_node="">[39]</span></a></sup><sup class="reference" data-dcnode-id="7122" id="cite_ref-41"><a data-dcnode-id="7123" href="#cite_note-41"><span data-dcnode-id="7124" instrument_node="">[40]</span></a></sup><span data-dcnode-id="7121" instrument_node=""> The solution was formalised in an order of the USSR Council of Ministers on 17 April.</span><sup class="reference" data-dcnode-id="7118" id="cite_ref-:11_40-1"><a data-dcnode-id="7119" href="#cite_note-:11-40"><span data-dcnode-id="7120" instrument_node="">[39]</span></a></sup><span data-dcnode-id="7117" instrument_node="">
</span></p><span data-dcnode-id="7115" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="7101"><div class="thumbinner" data-dcnode-id="7102" style="width:222px;"><a class="image" data-dcnode-id="7113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVytautas_Landsbergis_speaks_at_Ribbentrop-Molotov_Pact_50th_Anniversary_Rally_in_Kaln%25C5%25B3_park%2C_Vilnius%2C_Lithuania%2C_1989.jpg"><img alt="A middle-aged man speaking in front of a crowd" class="thumbimage" data-dcnode-id="7114" data-file-height="4385" data-file-width="6757" decoding="async" height="143" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/90/Vytautas_Landsbergis_speaks_at_Ribbentrop-Molotov_Pact_50th_Anniversary_Rally_in_Kaln%25C5%25B3_park%252C_Vilnius%252C_Lithuania%252C_1989.jpg/220px-Vytautas_Landsbergis_speaks_at_Ribbentrop-Molotov_Pact_50th_Anniversary_Rally_in_Kaln%25C5%25B3_park%252C_Vilnius%252C_Lithuania%252C_1989.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/90/Vytautas_Landsbergis_speaks_at_Ribbentrop-Molotov_Pact_50th_Anniversary_Rally_in_Kaln%C5%B3_park%2C_Vilnius%2C_Lithuania%2C_1989.jpg/330px-Vytautas_Landsbergis_speaks_at_Ribbentrop-Molotov_Pact_50th_Anniversary_Rally_in_Kaln%C5%B3_park%2C_Vilnius%2C_Lithuania%2C_1989.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/90/Vytautas_Landsbergis_speaks_at_Ribbentrop-Molotov_Pact_50th_Anniversary_Rally_in_Kaln%C5%B3_park%2C_Vilnius%2C_Lithuania%2C_1989.jpg/440px-Vytautas_Landsbergis_speaks_at_Ribbentrop-Molotov_Pact_50th_Anniversary_Rally_in_Kaln%C5%B3_park%2C_Vilnius%2C_Lithuania%2C_1989.jpg 2x" width="220"></a><span data-dcnode-id="7112" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7103"><div class="magnify" data-dcnode-id="7110"><a class="internal" data-dcnode-id="7111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVytautas_Landsbergis_speaks_at_Ribbentrop-Molotov_Pact_50th_Anniversary_Rally_in_Kaln%25C5%25B3_park%2C_Vilnius%2C_Lithuania%2C_1989.jpg" title="Enlarge"></a></div><a data-dcnode-id="7108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vytautas_Landsbergis" title="Vytautas Landsbergis"><span data-dcnode-id="7109" instrument_node="">Vytautas Landsbergis</span></a><span data-dcnode-id="7107" instrument_node="">, chair of the </span><a class="mw-redirect" data-dcnode-id="7105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Council_of_Lithuania" title="Supreme Council of Lithuania"><span data-dcnode-id="7106" instrument_node="">Supreme Council of Lithuania</span></a><span data-dcnode-id="7104" instrument_node=""> (Reconstituent Seimas) in 1990-92 and leader of Lithuania</span></div></div></div><span data-dcnode-id="7100" instrument_node="">
</span><p data-dcnode-id="7084"><span data-dcnode-id="7099" instrument_node="">Lithuania did not respond in the time allocated, but on 18 April, the Supreme Council of Lithuania tried to prevent the embargo from happening by making a declaration whereby it voluntarily refrained from adopting new laws pending what Lithuanian officials called "preliminary consultations" between Lithuania and the Soviet Union.</span><sup class="reference" data-dcnode-id="7096" id="cite_ref-:1_12-3"><a data-dcnode-id="7097" href="#cite_note-:1-12"><span data-dcnode-id="7098" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7095" instrument_node=""> The Soviets were unimpressed, and on 18 April, at 21:25 (</span><a class="mw-redirect" data-dcnode-id="7093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/EEST" title="EEST"><span data-dcnode-id="7094" instrument_node="">EEST</span></a><span data-dcnode-id="7092" instrument_node="">), the Kremlin launched the blockade by stopping supplies to the </span><a class="mw-redirect" data-dcnode-id="7090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ma%25C5%25BEeiki%25C5%25B3_oil_refinery" title="Mažeikių oil refinery"><span data-dcnode-id="7091" instrument_node="">Mažeikiai oil refinery</span></a><span data-dcnode-id="7089" instrument_node="">.</span><sup class="reference" data-dcnode-id="7086" id="cite_ref-lrs_36-1"><a data-dcnode-id="7087" href="#cite_note-lrs-36"><span data-dcnode-id="7088" instrument_node="">[35]</span></a></sup><span data-dcnode-id="7085" instrument_node="">
</span></p><p data-dcnode-id="7048"><span data-dcnode-id="7083" instrument_node="">Initially, the supply of 40-60 types of raw materials and other products were cut off.</span><sup class="reference" data-dcnode-id="7080" id="cite_ref-vl_42-0"><a data-dcnode-id="7081" href="#cite_note-vl-42"><span data-dcnode-id="7082" instrument_node="">[41]</span></a></sup><span data-dcnode-id="7079" instrument_node=""> Notably, the supply of oil was halted and gas deliveries decreased by 84%.</span><sup class="reference" data-dcnode-id="7076" id="cite_ref-:1_12-4"><a data-dcnode-id="7077" href="#cite_note-:1-12"><span data-dcnode-id="7078" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7075" instrument_node=""> USSR also suspended the movement of goods and restricted sales of fuel. The blockade worsened a few days later, when USSR stopped supplying coal, electricity, paper, foodstuffs and pharmaceuticals, including the most essential drugs and vaccines for hospitals.</span><sup class="reference" data-dcnode-id="7072" id="cite_ref-43"><a data-dcnode-id="7073" href="#cite_note-43"><span data-dcnode-id="7074" instrument_node="">[42]</span></a></sup><span data-dcnode-id="7071" instrument_node=""> Additionally, the Soviet Union also limited access to the port in Klaipėda</span><sup class="reference" data-dcnode-id="7068" id="cite_ref-:6_23-1"><a data-dcnode-id="7069" href="#cite_note-:6-23"><span data-dcnode-id="7070" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="7065" id="cite_ref-:10_35-1"><a data-dcnode-id="7066" href="#cite_note-:10-35"><span data-dcnode-id="7067" instrument_node="">[34]</span></a></sup><span data-dcnode-id="7064" instrument_node=""> and blocked Lithuania's bank accounts.</span><sup class="reference" data-dcnode-id="7061" id="cite_ref-:17_44-0"><a data-dcnode-id="7062" href="#cite_note-:17-44"><span data-dcnode-id="7063" instrument_node="">[43]</span></a></sup><span data-dcnode-id="7060" instrument_node=""> Lithuania, whose borders were closed due to the sanctions, was also declared to be off-bounds for foreigners.</span><sup class="reference" data-dcnode-id="7057" id="cite_ref-:19_3-2"><a data-dcnode-id="7058" href="#cite_note-:19-3"><span data-dcnode-id="7059" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="7054" id="cite_ref-FOOTNOTEDobbs1990_45-0"><a data-dcnode-id="7055" href="#cite_note-FOOTNOTEDobbs1990-45"><span data-dcnode-id="7056" instrument_node="">[44]</span></a></sup><span data-dcnode-id="7053" instrument_node=""> The military also took control of some of the printing offices.</span><sup class="reference" data-dcnode-id="7050" id="cite_ref-:27_33-1"><a data-dcnode-id="7051" href="#cite_note-:27-33"><span data-dcnode-id="7052" instrument_node="">[32]</span></a></sup><span data-dcnode-id="7049" instrument_node="">
</span></p><p data-dcnode-id="7005"><span data-dcnode-id="7047" instrument_node="">Almost immediately, the embargo impacted the everyday lives of citizens. Prices in the shops jumped around threefold, that assuming there was anything to buy at all.</span><sup class="reference" data-dcnode-id="7044" id="cite_ref-46"><a data-dcnode-id="7045" href="#cite_note-46"><span data-dcnode-id="7046" instrument_node="">[45]</span></a></sup><span data-dcnode-id="7043" instrument_node=""> This was exacerbated by delays in paying salaries</span><sup class="reference" data-dcnode-id="7040" id="cite_ref-:7_47-0"><a data-dcnode-id="7041" href="#cite_note-:7-47"><span data-dcnode-id="7042" instrument_node="">[46]</span></a></sup><span data-dcnode-id="7039" instrument_node=""> and rationing of basic foodstuffs.</span><sup class="reference" data-dcnode-id="7036" id="cite_ref-:11_40-2"><a data-dcnode-id="7037" href="#cite_note-:11-40"><span data-dcnode-id="7038" instrument_node="">[39]</span></a></sup><span data-dcnode-id="7035" instrument_node=""> A canister of </span><a class="mw-redirect" data-dcnode-id="7033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petrol" title="Petrol"><span data-dcnode-id="7034" instrument_node="">petrol</span></a><span data-dcnode-id="7032" instrument_node="">, which would cost 8 </span><a data-dcnode-id="7030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_ruble" title="Soviet ruble"><span data-dcnode-id="7031" instrument_node="">rubles</span></a><span data-dcnode-id="7029" instrument_node=""> in normal times, spiked to 50 rubles in less than a week;</span><sup class="reference" data-dcnode-id="7026" id="cite_ref-:6_23-2"><a data-dcnode-id="7027" href="#cite_note-:6-23"><span data-dcnode-id="7028" instrument_node="">[23]</span></a></sup><span data-dcnode-id="7025" instrument_node=""> and even then gasoline was rationed to 20 litres per person (though some Lithuanians say petrol prices stayed at the usual rate of 20-30 kopecks per litre).</span><sup class="reference" data-dcnode-id="7022" id="cite_ref-lrt-med_48-0"><a data-dcnode-id="7023" href="#cite_note-lrt-med-48"><span data-dcnode-id="7024" instrument_node="">[47]</span></a></sup><span data-dcnode-id="7021" instrument_node=""> Queues to petrol stations reached several kilometres in length.</span><sup class="reference" data-dcnode-id="7018" id="cite_ref-lrt-med_48-1"><a data-dcnode-id="7019" href="#cite_note-lrt-med-48"><span data-dcnode-id="7020" instrument_node="">[47]</span></a></sup><span data-dcnode-id="7017" instrument_node=""> Public transport was forced to reduce the frequency of service.</span><sup class="reference" data-dcnode-id="7014" id="cite_ref-:7_47-1"><a data-dcnode-id="7015" href="#cite_note-:7-47"><span data-dcnode-id="7016" instrument_node="">[46]</span></a></sup><span data-dcnode-id="7013" instrument_node=""> As electricity and paper were lacking, broadcasting and newspaper printing were also limited.</span><sup class="reference" data-dcnode-id="7010" id="cite_ref-:6_23-3"><a data-dcnode-id="7011" href="#cite_note-:6-23"><span data-dcnode-id="7012" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="7007" id="cite_ref-:24_49-0"><a data-dcnode-id="7008" href="#cite_note-:24-49"><span data-dcnode-id="7009" instrument_node="">[48]</span></a></sup><span data-dcnode-id="7006" instrument_node="">
</span></p><p data-dcnode-id="6973"><span data-dcnode-id="7004" instrument_node="">According to M. Gaškienė, who was responsible for coordination of food supply chains within Lithuania, the only factories which were not impacted by the effects of embargo were the ones that still were under direct control of the Soviet Union.</span><sup class="reference" data-dcnode-id="7001" id="cite_ref-:16_22-1"><a data-dcnode-id="7002" href="#cite_note-:16-22"><span data-dcnode-id="7003" instrument_node="">[22]</span></a></sup><span data-dcnode-id="7000" instrument_node=""> That said, the embargo also damaged the Soviets, as hundreds of Soviet-owned enterprises had difficulties to operate in blockade conditions.</span><sup class="reference" data-dcnode-id="6997" id="cite_ref-:10_35-2"><a data-dcnode-id="6998" href="#cite_note-:10-35"><span data-dcnode-id="6999" instrument_node="">[34]</span></a></sup><span data-dcnode-id="6996" instrument_node=""> In particular, some of the exports that were primarily produced in Lithuania (such as vacuum cleaner parts, pneumatic brakes, TV tubes and black boxes) could not be brought back to the Soviet Union.</span><sup class="reference" data-dcnode-id="6993" id="cite_ref-:5_24-2"><a data-dcnode-id="6994" href="#cite_note-:5-24"><span data-dcnode-id="6995" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="6990" id="cite_ref-:12_50-0"><a data-dcnode-id="6991" href="#cite_note-:12-50"><span data-dcnode-id="6992" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6989" instrument_node=""> Also, as the Mažeikiai oil refinery, which has not received any loads of oil, had to stop its operations, not only could the Soviet Union not extract profits from oil products</span><sup class="reference" data-dcnode-id="6986" id="cite_ref-:19_3-3"><a data-dcnode-id="6987" href="#cite_note-:19-3"><span data-dcnode-id="6988" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6985" instrument_node=""> but also oil supply was cut for </span><a data-dcnode-id="6983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kaliningrad_Oblast" title="Kaliningrad Oblast"><span data-dcnode-id="6984" instrument_node="">Kaliningrad Oblast</span></a><span data-dcnode-id="6982" instrument_node="">, which effectively became an exclave of USSR between Lithuania and Poland.</span><sup class="reference" data-dcnode-id="6979" id="cite_ref-lrt-med_48-2"><a data-dcnode-id="6980" href="#cite_note-lrt-med-48"><span data-dcnode-id="6981" instrument_node="">[47]</span></a></sup><span data-dcnode-id="6978" instrument_node=""> Electricity supply that would normally flow through Lithuania was also severed.</span><sup class="reference" data-dcnode-id="6975" id="cite_ref-:10_35-3"><a data-dcnode-id="6976" href="#cite_note-:10-35"><span data-dcnode-id="6977" instrument_node="">[34]</span></a></sup><span data-dcnode-id="6974" instrument_node="">
</span></p><span data-dcnode-id="6972" instrument_node="">
</span><h3 data-dcnode-id="6962"><span class="mw-headline" data-dcnode-id="6970" id="Political_negotiations"><span data-dcnode-id="6971" instrument_node="">Political negotiations</span></span><span class="mw-editsection" data-dcnode-id="6963"><span class="mw-editsection-bracket" data-dcnode-id="6968"><span data-dcnode-id="6969" instrument_node="">[</span></span><a data-dcnode-id="6966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_economic_blockade_of_Lithuania%26action%3Dedit%26section%3D4" title="Edit section: Political negotiations"><span data-dcnode-id="6967" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6964"><span data-dcnode-id="6965" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6961" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6947"><div class="thumbinner" data-dcnode-id="6948" style="width:222px;"><a class="image" data-dcnode-id="6959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_First_Lithuanian_Prime_Minsiter_Kazimira_Prunskiene%25E2%2580%2599s_visit_to_the_United_States._Meeting_with_the_U.S._President_George_Bush._Washington%2C_U.S.%2C_1990.jpg"><img alt="A man and a woman in official suits shaking hands" class="thumbimage" data-dcnode-id="6960" data-file-height="397" data-file-width="640" decoding="async" height="136" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f2/The_First_Lithuanian_Prime_Minsiter_Kazimira_Prunskiene%25E2%2580%2599s_visit_to_the_United_States._Meeting_with_the_U.S._President_George_Bush._Washington%252C_U.S.%252C_1990.jpg/220px-The_First_Lithuanian_Prime_Minsiter_Kazimira_Prunskiene%25E2%2580%2599s_visit_to_the_United_States._Meeting_with_the_U.S._President_George_Bush._Washington%252C_U.S.%252C_1990.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f2/The_First_Lithuanian_Prime_Minsiter_Kazimira_Prunskiene%E2%80%99s_visit_to_the_United_States._Meeting_with_the_U.S._President_George_Bush._Washington%2C_U.S.%2C_1990.jpg/330px-The_First_Lithuanian_Prime_Minsiter_Kazimira_Prunskiene%E2%80%99s_visit_to_the_United_States._Meeting_with_the_U.S._President_George_Bush._Washington%2C_U.S.%2C_1990.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f2/The_First_Lithuanian_Prime_Minsiter_Kazimira_Prunskiene%E2%80%99s_visit_to_the_United_States._Meeting_with_the_U.S._President_George_Bush._Washington%2C_U.S.%2C_1990.jpg/440px-The_First_Lithuanian_Prime_Minsiter_Kazimira_Prunskiene%E2%80%99s_visit_to_the_United_States._Meeting_with_the_U.S._President_George_Bush._Washington%2C_U.S.%2C_1990.jpg 2x" width="220"></a><span data-dcnode-id="6958" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6949"><div class="magnify" data-dcnode-id="6956"><a class="internal" data-dcnode-id="6957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_First_Lithuanian_Prime_Minsiter_Kazimira_Prunskiene%25E2%2580%2599s_visit_to_the_United_States._Meeting_with_the_U.S._President_George_Bush._Washington%2C_U.S.%2C_1990.jpg" title="Enlarge"></a></div><a data-dcnode-id="6954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kazimira_Prunskien%25C4%2597" title="Kazimira Prunskienė"><span data-dcnode-id="6955" instrument_node="">Kazimira Prunskienė</span></a><span data-dcnode-id="6953" instrument_node="">, prime minister of Lithuania (right), meeting President George H. W. Bush (left) in the </span><a data-dcnode-id="6951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_House" title="White House"><span data-dcnode-id="6952" instrument_node="">White House</span></a><span data-dcnode-id="6950" instrument_node=""> on 3 May</span></div></div></div><span data-dcnode-id="6946" instrument_node="">
</span><p data-dcnode-id="6916"><span data-dcnode-id="6945" instrument_node="">Despite efforts of the Soviet Union to isolate Lithuania's problem from the world and to undermine confidence in the cause for independence, they largely backfired.</span><sup class="reference" data-dcnode-id="6942" id="cite_ref-:4_31-2"><a data-dcnode-id="6943" href="#cite_note-:4-31"><span data-dcnode-id="6944" instrument_node="">[30]</span></a></sup><span data-dcnode-id="6941" instrument_node=""> Support for Landsbergis dropped from 45% to 28% during the months of the blockade,</span><sup class="reference" data-dcnode-id="6938" id="cite_ref-:1_12-5"><a data-dcnode-id="6939" href="#cite_note-:1-12"><span data-dcnode-id="6940" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6937" instrument_node=""> but people became even more united in opposition to the Soviet Union.</span><sup class="reference" data-dcnode-id="6934" id="cite_ref-:14_51-0"><a data-dcnode-id="6935" href="#cite_note-:14-51"><span data-dcnode-id="6936" instrument_node="">[50]</span></a></sup><sup class="reference" data-dcnode-id="6931" id="cite_ref-:23_52-0"><a data-dcnode-id="6932" href="#cite_note-:23-52"><span data-dcnode-id="6933" instrument_node="">[51]</span></a></sup><span data-dcnode-id="6930" instrument_node=""> Stasis Žemaitis, a worker from </span><a data-dcnode-id="6928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marijampol%25C4%2597" title="Marijampolė"><span data-dcnode-id="6929" instrument_node="">Marijampolė</span></a><span data-dcnode-id="6927" instrument_node="">, committed </span><a data-dcnode-id="6925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-immolation" title="Self-immolation"><span data-dcnode-id="6926" instrument_node="">self-immolation</span></a><span data-dcnode-id="6924" instrument_node=""> in protest of the embargo.</span><sup class="reference" data-dcnode-id="6921" id="cite_ref-:6_23-4"><a data-dcnode-id="6922" href="#cite_note-:6-23"><span data-dcnode-id="6923" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="6918" id="cite_ref-:18_53-0"><a data-dcnode-id="6919" href="#cite_note-:18-53"><span data-dcnode-id="6920" instrument_node="">[52]</span></a></sup><span data-dcnode-id="6917" instrument_node="">
</span></p><p data-dcnode-id="6849"><span data-dcnode-id="6915" instrument_node="">Western countries' reaction, however, was rather cool. On 20 April, </span><a data-dcnode-id="6913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fran%25C3%25A7ois_Mitterrand" title="François Mitterrand"><span data-dcnode-id="6914" instrument_node="">François Mitterrand</span></a><span data-dcnode-id="6912" instrument_node="">, </span><a data-dcnode-id="6910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_France" title="President of France"><span data-dcnode-id="6911" instrument_node="">President of France</span></a><span data-dcnode-id="6909" instrument_node="">, and </span><a data-dcnode-id="6907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Helmut_Kohl" title="Helmut Kohl"><span data-dcnode-id="6908" instrument_node="">Helmut Kohl</span></a><span data-dcnode-id="6906" instrument_node="">, </span><a data-dcnode-id="6904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chancellor_of_Germany" title="Chancellor of Germany"><span data-dcnode-id="6905" instrument_node="">Chancellor of Germany</span></a><span data-dcnode-id="6903" instrument_node="">, urged Lithuania to temporarily suspend the independence restoration process and asked to negotiate with </span><a data-dcnode-id="6901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moscow" title="Moscow"><span data-dcnode-id="6902" instrument_node="">Moscow</span></a><span data-dcnode-id="6900" instrument_node="">.</span><sup class="reference" data-dcnode-id="6897" id="cite_ref-wp-bush_54-0"><a data-dcnode-id="6898" href="#cite_note-wp-bush-54"><span data-dcnode-id="6899" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="6894" id="cite_ref-nyt-thatcher_55-0"><a data-dcnode-id="6895" href="#cite_note-nyt-thatcher-55"><span data-dcnode-id="6896" instrument_node="">[54]</span></a></sup><span data-dcnode-id="6893" instrument_node=""> Meanwhile, the then Prime Minister Kazimira Prunskienė visited </span><a data-dcnode-id="6891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oslo" title="Oslo"><span data-dcnode-id="6892" instrument_node="">Oslo</span></a><span data-dcnode-id="6890" instrument_node="">, </span><a data-dcnode-id="6888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Copenhagen" title="Copenhagen"><span data-dcnode-id="6889" instrument_node="">Copenhagen</span></a><span data-dcnode-id="6887" instrument_node="">, </span><a data-dcnode-id="6885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stockholm" title="Stockholm"><span data-dcnode-id="6886" instrument_node="">Stockholm</span></a><span data-dcnode-id="6884" instrument_node="">, and </span><a data-dcnode-id="6882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottawa" title="Ottawa"><span data-dcnode-id="6883" instrument_node="">Ottawa</span></a><span data-dcnode-id="6881" instrument_node="">, seeking economic and political support.</span><sup class="reference" data-dcnode-id="6878" id="cite_ref-56"><a data-dcnode-id="6879" href="#cite_note-56"><span data-dcnode-id="6880" instrument_node="">[55]</span></a></sup><span data-dcnode-id="6877" instrument_node=""> On 3 May, she met </span><a data-dcnode-id="6875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_United_States" title="President of the United States"><span data-dcnode-id="6876" instrument_node="">President</span></a><span data-dcnode-id="6874" instrument_node=""> </span><a data-dcnode-id="6872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_H._W._Bush" title="George H. W. Bush"><span data-dcnode-id="6873" instrument_node="">George H. W. Bush</span></a><span data-dcnode-id="6871" instrument_node=""> and then, from 9–11 May, she talked to </span><a data-dcnode-id="6869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_Thatcher" title="Margaret Thatcher"><span data-dcnode-id="6870" instrument_node="">Margaret Thatcher</span></a><span data-dcnode-id="6868" instrument_node="">, </span><a data-dcnode-id="6866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prime_Minister_of_the_United_Kingdom" title="Prime Minister of the United Kingdom"><span data-dcnode-id="6867" instrument_node="">Prime Minister of the United Kingdom</span></a><span data-dcnode-id="6865" instrument_node="">, Mitterrand and Kohl.</span><sup class="reference" data-dcnode-id="6862" id="cite_ref-:4_31-3"><a data-dcnode-id="6863" href="#cite_note-:4-31"><span data-dcnode-id="6864" instrument_node="">[30]</span></a></sup><span data-dcnode-id="6861" instrument_node=""> The American and British leaders expressed only limited support for Lithuanians and urged to look for a compromise with the Soviets.</span><sup class="reference" data-dcnode-id="6858" id="cite_ref-wp-bush_54-1"><a data-dcnode-id="6859" href="#cite_note-wp-bush-54"><span data-dcnode-id="6860" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="6855" id="cite_ref-nyt-thatcher_55-1"><a data-dcnode-id="6856" href="#cite_note-nyt-thatcher-55"><span data-dcnode-id="6857" instrument_node="">[54]</span></a></sup><span data-dcnode-id="6854" instrument_node=""> Lithuanian officials were accepted warmly, but only as private guests.</span><sup class="reference" data-dcnode-id="6851" id="cite_ref-:1_12-6"><a data-dcnode-id="6852" href="#cite_note-:1-12"><span data-dcnode-id="6853" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6850" instrument_node="">
