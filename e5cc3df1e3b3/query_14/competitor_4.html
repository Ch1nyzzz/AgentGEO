</span></p><p data-dcnode-id="6820"><span data-dcnode-id="6848" instrument_node="">Such reticence to openly support Lithuania in its independence movements was explained by several factors. Western leaders generally feared destabilisation of the situation in the Soviet Union and wanted Gorbachev in office, as the West perceived him as a friendly ruler and a guarantor for democratic transition in Eastern Europe.</span><sup class="reference" data-dcnode-id="6845" id="cite_ref-:1_12-7"><a data-dcnode-id="6846" href="#cite_note-:1-12"><span data-dcnode-id="6847" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="6842" id="cite_ref-:4_31-4"><a data-dcnode-id="6843" href="#cite_note-:4-31"><span data-dcnode-id="6844" instrument_node="">[30]</span></a></sup><sup class="reference" data-dcnode-id="6839" id="cite_ref-:14_51-1"><a data-dcnode-id="6840" href="#cite_note-:14-51"><span data-dcnode-id="6841" instrument_node="">[50]</span></a></sup><span data-dcnode-id="6838" instrument_node=""> The West also felt that Gorbachev was the key person in negotiations of arms control treaties and trade agreements, on which Gorbachev has put strong emphasis.</span><sup class="reference" data-dcnode-id="6835" id="cite_ref-:12_50-1"><a data-dcnode-id="6836" href="#cite_note-:12-50"><span data-dcnode-id="6837" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6834" instrument_node=""> In addition to that, particular interests of European rulers of the Western world also distracted from the Lithuanian problem. Chancellor Kohl wanted to successfully </span><a data-dcnode-id="6832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_reunification" title="German reunification"><span data-dcnode-id="6833" instrument_node="">reunify Germany</span></a><span data-dcnode-id="6831" instrument_node="">, which needed good relations with the Soviet Union, while President Mitterrand aimed to maintain friendly relations with Germany to facilitate negotiations over reforming the </span><a data-dcnode-id="6829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Economic_Community" title="European Economic Community"><span data-dcnode-id="6830" instrument_node="">European Economic Community</span></a><span data-dcnode-id="6828" instrument_node="">, which would eventually become the </span><a data-dcnode-id="6826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="6827" instrument_node="">European Union</span></a><span data-dcnode-id="6825" instrument_node="">. Thatcher did not seem particularly interested in this event. Ultimately these countries distanced themselves from the Lithuanian crisis.</span><sup class="reference" data-dcnode-id="6822" id="cite_ref-:4_31-5"><a data-dcnode-id="6823" href="#cite_note-:4-31"><span data-dcnode-id="6824" instrument_node="">[30]</span></a></sup><span data-dcnode-id="6821" instrument_node="">
</span></p><p data-dcnode-id="6791"><span data-dcnode-id="6819" instrument_node="">As for the United States, the </span><a data-dcnode-id="6817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="6818" instrument_node="">United States House of Representatives</span></a><span data-dcnode-id="6816" instrument_node=""> urged Bush to recognise Lithuania's independence and a group of nine </span><a data-dcnode-id="6814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Senate" title="United States Senate"><span data-dcnode-id="6815" instrument_node="">senators</span></a><span data-dcnode-id="6813" instrument_node=""> accused him of applying double standards when treating the Lithuanian issue, but President Bush suggested there was no constructive role the United States could have in the process and refused to mediate the conflict.</span><sup class="reference" data-dcnode-id="6810" id="cite_ref-:27_33-2"><a data-dcnode-id="6811" href="#cite_note-:27-33"><span data-dcnode-id="6812" instrument_node="">[32]</span></a></sup><sup class="reference" data-dcnode-id="6807" id="cite_ref-57"><a data-dcnode-id="6808" href="#cite_note-57"><span data-dcnode-id="6809" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6806" instrument_node=""> All of that happened despite the longstanding policy of non-recognition of occupation of Baltic states and amid several violations of international and Soviet law.</span><sup class="reference" data-dcnode-id="6803" id="cite_ref-58"><a data-dcnode-id="6804" href="#cite_note-58"><span data-dcnode-id="6805" instrument_node="">[57]</span></a></sup><span data-dcnode-id="6802" instrument_node=""> Internally, however, the </span><a data-dcnode-id="6800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Presidency_of_George_H._W._Bush" title="Presidency of George H. W. Bush"><span data-dcnode-id="6801" instrument_node="">Bush administration</span></a><span data-dcnode-id="6799" instrument_node=""> decided to postpone trade normalisation with the Soviet Union until Gorbachev lifted the blockade of Lithuania.</span><sup class="reference" data-dcnode-id="6796" id="cite_ref-:4_31-6"><a data-dcnode-id="6797" href="#cite_note-:4-31"><span data-dcnode-id="6798" instrument_node="">[30]</span></a></sup><sup class="reference" data-dcnode-id="6793" id="cite_ref-exit-cold-war_38-2"><a data-dcnode-id="6794" href="#cite_note-exit-cold-war-38"><span data-dcnode-id="6795" instrument_node="">[37]</span></a></sup><span data-dcnode-id="6792" instrument_node="">
</span></p><p data-dcnode-id="6785"><span data-dcnode-id="6790" instrument_node="">More friendly attitudes were exhibited in Poland, with government delegations being accepted according to the official protocol for foreign dignitaries. Poland offered mediation in the conflict that started since 11 March and even signed an economic agreement with Lithuania on 30 May, but that country still fell short of recognising Lithuania's restoration of independence, fearing retribution from USSR.</span><sup class="reference" data-dcnode-id="6787" id="cite_ref-Burant_59-0"><a data-dcnode-id="6788" href="#cite_note-Burant-59"><span data-dcnode-id="6789" instrument_node="">[58]</span></a></sup><span data-dcnode-id="6786" instrument_node="">
</span></p><p data-dcnode-id="6762"><span data-dcnode-id="6784" instrument_node="">The Landsbergis government initially insisted that the independence restoration act could not be subject to negotiations, while the Soviet side demanded that it be annulled before any discussion could occur.</span><sup class="reference" data-dcnode-id="6781" id="cite_ref-:9_30-1"><a data-dcnode-id="6782" href="#cite_note-:9-30"><span data-dcnode-id="6783" instrument_node="">[29]</span></a></sup><span data-dcnode-id="6780" instrument_node=""> However, on </span><a data-dcnode-id="6778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Germany" title="West Germany"><span data-dcnode-id="6779" instrument_node="">German</span></a><span data-dcnode-id="6777" instrument_node=""> and </span><a data-dcnode-id="6775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/France" title="France"><span data-dcnode-id="6776" instrument_node="">French</span></a><span data-dcnode-id="6774" instrument_node=""> advice, when Prunskienė met with Gorbachev on May 17, she announced that the independence restoration process could be suspended, which </span><a data-dcnode-id="6772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/TASS" title="TASS"><span data-dcnode-id="6773" instrument_node="">TASS</span></a><span data-dcnode-id="6771" instrument_node="">, the Soviet state news agency, suggested was the minimum requirement for the negotiations to start.</span><sup class="reference" data-dcnode-id="6768" id="cite_ref-wp-on-meeting_60-0"><a data-dcnode-id="6769" href="#cite_note-wp-on-meeting-60"><span data-dcnode-id="6770" instrument_node="">[59]</span></a></sup><span data-dcnode-id="6767" instrument_node=""> Six days later, the Lithuanian parliament adopted a resolution which suspended all laws adopted after 11 March which were related to the subject of negotiations, but the Soviets were not content with the concessions and the blockade continued.</span><sup class="reference" data-dcnode-id="6764" id="cite_ref-:15_61-0"><a data-dcnode-id="6765" href="#cite_note-:15-61"><span data-dcnode-id="6766" instrument_node="">[60]</span></a></sup><span data-dcnode-id="6763" instrument_node="">
</span></p><span data-dcnode-id="6761" instrument_node="">
</span><h3 data-dcnode-id="6751"><span class="mw-headline" data-dcnode-id="6759" id="Lifting_the_embargo"><span data-dcnode-id="6760" instrument_node="">Lifting the embargo</span></span><span class="mw-editsection" data-dcnode-id="6752"><span class="mw-editsection-bracket" data-dcnode-id="6757"><span data-dcnode-id="6758" instrument_node="">[</span></span><a data-dcnode-id="6755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_economic_blockade_of_Lithuania%26action%3Dedit%26section%3D5" title="Edit section: Lifting the embargo"><span data-dcnode-id="6756" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6753"><span data-dcnode-id="6754" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6750" instrument_node="">
</span><p data-dcnode-id="6744"><span data-dcnode-id="6749" instrument_node="">By June, the situation started to tilt towards setting some compromise. Lithuania was exhausted by the blockade, which forced factories to close. The general populace to deal with food and energy shortages. Moreover, regular visits of the Lithuania's Prime Minister gradually led the Lithuanian leadership to believe that temporary suspension of the restoration act was inevitable to reduce tensions.</span><sup class="reference" data-dcnode-id="6746" id="cite_ref-:15_61-1"><a data-dcnode-id="6747" href="#cite_note-:15-61"><span data-dcnode-id="6748" instrument_node="">[60]</span></a></sup><span data-dcnode-id="6745" instrument_node="">
</span></p><p data-dcnode-id="6704"><span data-dcnode-id="6743" instrument_node="">Problems were also appearing in the Soviet Union. On 30 May, the </span><a class="mw-redirect" data-dcnode-id="6741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leningrad" title="Leningrad"><span data-dcnode-id="6742" instrument_node="">Leningrad</span></a><span data-dcnode-id="6740" instrument_node=""> city council urged the central government to begin negotiations with the republic under blockade,</span><sup class="reference" data-dcnode-id="6737" id="cite_ref-:17_44-1"><a data-dcnode-id="6738" href="#cite_note-:17-44"><span data-dcnode-id="6739" instrument_node="">[43]</span></a></sup><span data-dcnode-id="6736" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moldavian_SSR" title="Moldavian SSR"><span data-dcnode-id="6735" instrument_node="">Moldavian SSR</span></a><span data-dcnode-id="6733" instrument_node=""> voted to recognise the independence of Lithuania the following day.</span><sup class="reference" data-dcnode-id="6730" id="cite_ref-62"><a data-dcnode-id="6731" href="#cite_note-62"><span data-dcnode-id="6732" instrument_node="">[61]</span></a></sup><span data-dcnode-id="6729" instrument_node=""> However, it was </span><a data-dcnode-id="6727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Yeltsin" title="Boris Yeltsin"><span data-dcnode-id="6728" instrument_node="">Boris Yeltsin</span></a><span data-dcnode-id="6726" instrument_node=""> who made the largest impact. Two days after his election as chairman of the </span><a class="mw-redirect" data-dcnode-id="6724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Soviet_of_RSFSR" title="Supreme Soviet of RSFSR"><span data-dcnode-id="6725" instrument_node="">Supreme Soviet of RSFSR</span></a><span data-dcnode-id="6723" instrument_node="">, the main constituent republic of the Soviet Union and the one that included Kaliningrad Oblast, Yeltsin met with representatives of the Baltic republics, including Landsbergis, pledging support for their independence cause.</span><sup class="reference" data-dcnode-id="6720" id="cite_ref-63"><a data-dcnode-id="6721" href="#cite_note-63"><span data-dcnode-id="6722" instrument_node="">[62]</span></a></sup><span data-dcnode-id="6719" instrument_node=""> Then, on 12 June, RSFSR </span><a class="mw-redirect" data-dcnode-id="6717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Declaration_of_State_Sovereignty_of_the_RSFSR" title="Declaration of State Sovereignty of the RSFSR"><span data-dcnode-id="6718" instrument_node="">declared itself a sovereign state within USSR</span></a><span data-dcnode-id="6716" instrument_node="">, and, in its declared capacity as a sovereign republic, announced it would not enforce the blockade.</span><sup class="reference" data-dcnode-id="6713" id="cite_ref-64"><a data-dcnode-id="6714" href="#cite_note-64"><span data-dcnode-id="6715" instrument_node="">[63]</span></a></sup><span data-dcnode-id="6712" instrument_node=""> Meanwhile, the </span><a data-dcnode-id="6710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Congress" title="United States Congress"><span data-dcnode-id="6711" instrument_node="">United States Congress</span></a><span data-dcnode-id="6709" instrument_node=""> tied the trade normalisation to the resolution of the blockade in Lithuania, which created further pressure to resolve the issue.</span><sup class="reference" data-dcnode-id="6706" id="cite_ref-65"><a data-dcnode-id="6707" href="#cite_note-65"><span data-dcnode-id="6708" instrument_node="">[64]</span></a></sup><span data-dcnode-id="6705" instrument_node="">
</span></p><p data-dcnode-id="6681"><span data-dcnode-id="6703" instrument_node="">On 16 June, the Soviets increased the flow of gas from 15% to 30% of the level before the blockade and let some deliveries of raw materials in, which enabled partial reopening of some industrial plants, including </span><a data-dcnode-id="6701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jonava" title="Jonava"><span data-dcnode-id="6702" instrument_node="">Jonava</span></a><span data-dcnode-id="6700" instrument_node="">'s </span><a data-dcnode-id="6698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fertilizer" title="Fertilizer"><span data-dcnode-id="6699" instrument_node="">fertilizer</span></a><span data-dcnode-id="6697" instrument_node=""> facility.</span><sup class="reference" data-dcnode-id="6694" id="cite_ref-:20_66-0"><a data-dcnode-id="6695" href="#cite_note-:20-66"><span data-dcnode-id="6696" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="6691" id="cite_ref-67"><a data-dcnode-id="6692" href="#cite_note-67"><span data-dcnode-id="6693" instrument_node="">[66]</span></a></sup><span data-dcnode-id="6690" instrument_node=""> They also pledged to grant statehood to Lithuania 2–3 years after they freezed the declaration of independence.</span><sup class="reference" data-dcnode-id="6687" id="cite_ref-68"><a data-dcnode-id="6688" href="#cite_note-68"><span data-dcnode-id="6689" instrument_node="">[67]</span></a></sup><span data-dcnode-id="6686" instrument_node=""> From the Lithuanian side, Landsbergis, who had insisted that the Act of Restoration of Independence was non-negotiable, now recommended a motion to the Seimas to suspend the effects of the Act.</span><sup class="reference" data-dcnode-id="6683" id="cite_ref-:15_61-2"><a data-dcnode-id="6684" href="#cite_note-:15-61"><span data-dcnode-id="6685" instrument_node="">[60]</span></a></sup><span data-dcnode-id="6682" instrument_node="">
</span></p><p data-dcnode-id="6639"><span data-dcnode-id="6680" instrument_node="">After two weeks of discussions, on 29 June, the Supreme Council of Lithuania declared a 100-day </span><a data-dcnode-id="6678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moratorium_%28law%29" title="Moratorium (law)"><span data-dcnode-id="6679" instrument_node="">moratorium</span></a><span data-dcnode-id="6677" instrument_node=""> on the "legal actions arising from" (</span><a data-dcnode-id="6675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuanian_language" title="Lithuanian language"><span data-dcnode-id="6676" instrument_node="">Lithuanian</span></a><span data-dcnode-id="6674" instrument_node="">: </span><i data-dcnode-id="6672" lang="lt"><span data-dcnode-id="6673" instrument_node="">iš jo kylančius teisinius veiksmus</span></i><span data-dcnode-id="6671" instrument_node="">) the 11 March declaration of restoration of Lithuania, which was to take effect once the negotiations with the Soviet Union started.</span><sup class="reference" data-dcnode-id="6668" id="cite_ref-:15_61-3"><a data-dcnode-id="6669" href="#cite_note-:15-61"><span data-dcnode-id="6670" instrument_node="">[60]</span></a></sup><sup class="reference" data-dcnode-id="6665" id="cite_ref-69"><a data-dcnode-id="6666" href="#cite_note-69"><span data-dcnode-id="6667" instrument_node="">[68]</span></a></sup><span data-dcnode-id="6664" instrument_node=""> The declaration did not constitute the moratorium on independence itself,</span><sup class="reference" data-dcnode-id="6661" id="cite_ref-70"><a data-dcnode-id="6662" href="#cite_note-70"><span data-dcnode-id="6663" instrument_node="">[69]</span></a></sup><span data-dcnode-id="6660" instrument_node=""> but this time, the Kremlin decided to enter into negotiations with Lithuania.</span><sup class="reference" data-dcnode-id="6657" id="cite_ref-lrs_36-2"><a data-dcnode-id="6658" href="#cite_note-lrs-36"><span data-dcnode-id="6659" instrument_node="">[35]</span></a></sup><span data-dcnode-id="6656" instrument_node=""> Oil deliveries were resumed by the evening of 30 June,</span><sup class="reference" data-dcnode-id="6653" id="cite_ref-71"><a data-dcnode-id="6654" href="#cite_note-71"><span data-dcnode-id="6655" instrument_node="">[70]</span></a></sup><span data-dcnode-id="6652" instrument_node=""> while on 2 July, the blockade was lifted,</span><sup class="reference" data-dcnode-id="6649" id="cite_ref-:10_35-4"><a data-dcnode-id="6650" href="#cite_note-:10-35"><span data-dcnode-id="6651" instrument_node="">[34]</span></a></sup><span data-dcnode-id="6648" instrument_node=""> which Nikolai Ryzhkov, Chairman of USSR's Council of Ministers, confirmed the following day.</span><sup class="reference" data-dcnode-id="6645" id="cite_ref-:21_72-0"><a data-dcnode-id="6646" href="#cite_note-:21-72"><span data-dcnode-id="6647" instrument_node="">[71]</span></a></sup><span data-dcnode-id="6644" instrument_node=""> Finally, on 6 July, Soviet diplomatic agencies could grant visas to foreigners travelling to Lithuania again, and on 7 July, the rail connections between USSR and Lithuania were fully restored.</span><sup class="reference" data-dcnode-id="6641" id="cite_ref-:18_53-1"><a data-dcnode-id="6642" href="#cite_note-:18-53"><span data-dcnode-id="6643" instrument_node="">[52]</span></a></sup><span data-dcnode-id="6640" instrument_node="">
</span></p><span data-dcnode-id="6638" instrument_node="">
</span><h2 data-dcnode-id="6628"><span class="mw-headline" data-dcnode-id="6636" id="Impacts"><span data-dcnode-id="6637" instrument_node="">Impacts</span></span><span class="mw-editsection" data-dcnode-id="6629"><span class="mw-editsection-bracket" data-dcnode-id="6634"><span data-dcnode-id="6635" instrument_node="">[</span></span><a data-dcnode-id="6632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_economic_blockade_of_Lithuania%26action%3Dedit%26section%3D6" title="Edit section: Impacts"><span data-dcnode-id="6633" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6630"><span data-dcnode-id="6631" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6627" instrument_node="">
</span><h3 data-dcnode-id="6617"><span class="mw-headline" data-dcnode-id="6625" id="Economic"><span data-dcnode-id="6626" instrument_node="">Economic</span></span><span class="mw-editsection" data-dcnode-id="6618"><span class="mw-editsection-bracket" data-dcnode-id="6623"><span data-dcnode-id="6624" instrument_node="">[</span></span><a data-dcnode-id="6621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_economic_blockade_of_Lithuania%26action%3Dedit%26section%3D7" title="Edit section: Economic"><span data-dcnode-id="6622" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6619"><span data-dcnode-id="6620" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6616" instrument_node="">
</span><p data-dcnode-id="6585"><span data-dcnode-id="6615" instrument_node="">The introduction of the blockade stunned Lithuanians, who were not expecting such a strong reaction from the Soviet Union.</span><sup class="reference" data-dcnode-id="6612" id="cite_ref-:9_30-2"><a data-dcnode-id="6613" href="#cite_note-:9-30"><span data-dcnode-id="6614" instrument_node="">[29]</span></a></sup><span data-dcnode-id="6611" instrument_node=""> According to </span><a data-dcnode-id="6609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martha_Brill_Olcott" title="Martha Brill Olcott"><span data-dcnode-id="6610" instrument_node="">Martha Olcott</span></a><span data-dcnode-id="6608" instrument_node="">, who was writing for the </span><i data-dcnode-id="6605"><a data-dcnode-id="6606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_Affairs" title="Foreign Affairs"><span data-dcnode-id="6607" instrument_node="">Foreign Affairs</span></a></i><span data-dcnode-id="6604" instrument_node=""> on the topic, of all the scenarios that Gorbachev was considering, it was the economic blockade that </span><a data-dcnode-id="6602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S%25C4%2585j%25C5%25ABdis" title="Sąjūdis"><span data-dcnode-id="6603" instrument_node="">Sąjūdis</span></a><span data-dcnode-id="6601" instrument_node=""> was afraid of the most.</span><sup class="reference" data-dcnode-id="6598" id="cite_ref-:2_18-2"><a data-dcnode-id="6599" href="#cite_note-:2-18"><span data-dcnode-id="6600" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6597" instrument_node=""> Lithuania's economy was tightly integrated in USSR and, while relatively developed, was still subordinated to the needs of the Soviet Union and was using little local input as a result.</span><sup class="reference" data-dcnode-id="6594" id="cite_ref-73"><a data-dcnode-id="6595" href="#cite_note-73"><span data-dcnode-id="6596" instrument_node="">[72]</span></a></sup><sup class="reference" data-dcnode-id="6591" id="cite_ref-:13_74-0"><a data-dcnode-id="6592" href="#cite_note-:13-74"><span data-dcnode-id="6593" instrument_node="">[73]</span></a></sup><span data-dcnode-id="6590" instrument_node=""> The other 14 republics were the destination of most exports (94.3% in 1990) and the origin of most imports (87.7% in 1990). Lithuania was even more dependent on energy resources, with total dependence on gas from the Soviet Union and only minuscule internal production of oil.</span><sup class="reference" data-dcnode-id="6587" id="cite_ref-75"><a data-dcnode-id="6588" href="#cite_note-75"><span data-dcnode-id="6589" instrument_node="">[74]</span></a></sup><span data-dcnode-id="6586" instrument_node="">
</span></p><p data-dcnode-id="6553"><span data-dcnode-id="6584" instrument_node="">According to Lithuanian estimates, by the end of the blockade, 415.5 million </span><a data-dcnode-id="6582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_ruble" title="Soviet ruble"><span data-dcnode-id="6583" instrument_node="">rubles</span></a><span data-dcnode-id="6581" instrument_node=""> worth of production were lost, and the Lithuanian budget suffered a shortfall of 125 million rubles.</span><sup class="reference" data-dcnode-id="6578" id="cite_ref-:19_3-4"><a data-dcnode-id="6579" href="#cite_note-:19-3"><span data-dcnode-id="6580" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6577" instrument_node=""> (For comparison, the annual budgetary expenditures of the Lithuanian SSR in 1989 reached 4,626 million rubles).</span><sup class="reference" data-dcnode-id="6574" id="cite_ref-76"><a data-dcnode-id="6575" href="#cite_note-76"><span data-dcnode-id="6576" instrument_node="">[75]</span></a></sup><span data-dcnode-id="6573" instrument_node=""> Hufbauer et al., who wrote a book evaluating the success of economic blockades, estimated the direct consequences of the blockade to cost Lithuania 1.5% of </span><a data-dcnode-id="6571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gross_national_income" title="Gross national income"><span data-dcnode-id="6572" instrument_node="">GNP</span></a><span data-dcnode-id="6570" instrument_node="">.</span><sup class="reference" data-dcnode-id="6567" id="cite_ref-:28_2-1"><a data-dcnode-id="6568" href="#cite_note-:28-2"><span data-dcnode-id="6569" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6566" instrument_node=""> The exact number of laid-off workers is unknown but estimates vary from 26,000</span><sup class="reference" data-dcnode-id="6563" id="cite_ref-:20_66-1"><a data-dcnode-id="6564" href="#cite_note-:20-66"><span data-dcnode-id="6565" instrument_node="">[65]</span></a></sup><span data-dcnode-id="6562" instrument_node=""> to 50,000</span><sup class="reference" data-dcnode-id="6559" id="cite_ref-:21_72-1"><a data-dcnode-id="6560" href="#cite_note-:21-72"><span data-dcnode-id="6561" instrument_node="">[71]</span></a></sup><span data-dcnode-id="6558" instrument_node=""> people; Stanley Vardys, a researcher of 20th-century Lithuania, says that 35,000 lost their jobs, while idle workers were paid salaries from the Lithuanian government, which widened its budget deficit.</span><sup class="reference" data-dcnode-id="6555" id="cite_ref-:19_3-5"><a data-dcnode-id="6556" href="#cite_note-:19-3"><span data-dcnode-id="6557" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6554" instrument_node="">
</span></p><p data-dcnode-id="6504"><span data-dcnode-id="6552" instrument_node="">
As the blockade meant a scarcity of important resources, Lithuania, which was transitioning to a market-oriented economy, was forced to centralise its management and to strongly regulate its economy in order to avoid exhausting supplies and to shield the consumers from price increases. This postponed some market-oriented reforms, particularly in comparison to Latvia and Estonia.</span><sup class="reference" data-dcnode-id="6549" id="cite_ref-:8_19-2"><a data-dcnode-id="6550" href="#cite_note-:8-19"><span data-dcnode-id="6551" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="6546" id="cite_ref-77"><a data-dcnode-id="6547" href="#cite_note-77"><span data-dcnode-id="6548" instrument_node="">[76]</span></a></sup><span data-dcnode-id="6545" instrument_node=""> On the long term, however, it helped the country prioritise trade deals with other countries and made the enterprises seek cooperation from other entities than the government, thereby realigning the economy towards the Western model.</span><sup class="reference" data-dcnode-id="6542" id="cite_ref-Samonis_78-0"><a data-dcnode-id="6543" href="#cite_note-Samonis-78"><span data-dcnode-id="6544" instrument_node="">[77]</span></a></sup><span data-dcnode-id="6541" instrument_node=""> For example, the then-</span><a data-dcnode-id="6539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Health_%28Lithuania%29" title="Ministry of Health (Lithuania)"><span data-dcnode-id="6540" instrument_node="">Health Minister</span></a><span data-dcnode-id="6538" instrument_node=""> of Lithuania </span><a data-dcnode-id="6536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Juozas_Olekas" title="Juozas Olekas"><span data-dcnode-id="6537" instrument_node="">Juozas Olekas</span></a><span data-dcnode-id="6535" instrument_node=""> noted that the country lacked medical supplies, but managed to establish a good relationship with </span><a data-dcnode-id="6533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Denmark" title="Denmark"><span data-dcnode-id="6534" instrument_node="">Denmark</span></a><span data-dcnode-id="6532" instrument_node="">, thanks to which the shortage of vaccines for hospitals was largely alleviated.</span><sup class="reference" data-dcnode-id="6529" id="cite_ref-lrt-med_48-3"><a data-dcnode-id="6530" href="#cite_note-lrt-med-48"><span data-dcnode-id="6531" instrument_node="">[47]</span></a></sup><span data-dcnode-id="6528" instrument_node=""> The government of Lithuania and local industries started to actively search for direct relations with the enterprises (which were not subject to embargo),</span><sup class="reference" data-dcnode-id="6525" id="cite_ref-Samonis_78-1"><a data-dcnode-id="6526" href="#cite_note-Samonis-78"><span data-dcnode-id="6527" instrument_node="">[77]</span></a></sup><span data-dcnode-id="6524" instrument_node=""> often engaging in </span><a class="mw-redirect" data-dcnode-id="6522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barter_trade" title="Barter trade"><span data-dcnode-id="6523" instrument_node="">barter trade</span></a><span data-dcnode-id="6521" instrument_node=""> with oil-rich republics (e.g. oil for butter or meat), such as RSFSR and </span><a class="mw-redirect" data-dcnode-id="6519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kazakh_SSR" title="Kazakh SSR"><span data-dcnode-id="6520" instrument_node="">Kazakh SSR</span></a><span data-dcnode-id="6518" instrument_node="">.</span><sup class="reference" data-dcnode-id="6515" id="cite_ref-79"><a data-dcnode-id="6516" href="#cite_note-79"><span data-dcnode-id="6517" instrument_node="">[78]</span></a></sup><span data-dcnode-id="6514" instrument_node=""> The blockade's effects were also somewhat mitigated by smugglers operating on Lithuania's borders, as well as by the regiments of the Soviet Army stationing in the country, which were clandestinely selling the reserves of oil products they had in the garrisons.</span><sup class="reference" data-dcnode-id="6511" id="cite_ref-:22_7-1"><a data-dcnode-id="6512" href="#cite_note-:22-7"><span data-dcnode-id="6513" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="6508" id="cite_ref-:7_47-2"><a data-dcnode-id="6509" href="#cite_note-:7-47"><span data-dcnode-id="6510" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="6505" id="cite_ref-:26_80-0"><a data-dcnode-id="6506" href="#cite_note-:26-80"><span data-dcnode-id="6507" instrument_node="">[79]</span></a></sup></p><div class="thumb tleft" data-dcnode-id="6487"><div class="thumbinner" data-dcnode-id="6488" style="width:222px;"><a class="image" data-dcnode-id="6502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKvitas_blokados_fondui.jpg"><img alt="A receipt confirming that 100 Soviet rubles were donated to the Blockade Fund of Lithuania on 25 April 1990" class="thumbimage" data-dcnode-id="6503" data-file-height="816" data-file-width="1136" decoding="async" height="158" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/25/Kvitas_blokados_fondui.jpg/220px-Kvitas_blokados_fondui.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/25/Kvitas_blokados_fondui.jpg/330px-Kvitas_blokados_fondui.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/25/Kvitas_blokados_fondui.jpg/440px-Kvitas_blokados_fondui.jpg 2x" width="220"></a><span data-dcnode-id="6501" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6489"><div class="magnify" data-dcnode-id="6499"><a class="internal" data-dcnode-id="6500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKvitas_blokados_fondui.jpg" title="Enlarge"></a></div><span data-dcnode-id="6498" instrument_node="">A 100-ruble donation to the </span><a class="new" data-dcnode-id="6496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBlokados_fondas%26action%3Dedit%26redlink%3D1" title="Blokados fondas (page does not exist)"><span data-dcnode-id="6497" instrument_node="">Blockade Fund of Lithuania</span></a><span class="noprint" data-dcnode-id="6491" style="font-size:85%; font-style: normal;"><span data-dcnode-id="6495" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="6493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lt.wikipedia.org/wiki/Blokados_fondas" title="lt:Blokados fondas"><span data-dcnode-id="6494" instrument_node="">lt</span></a><span data-dcnode-id="6492" instrument_node="">]</span></span><span data-dcnode-id="6490" instrument_node="">, 25 April 1990</span></div></div></div><p data-dcnode-id="6456"><span data-dcnode-id="6486" instrument_node="">In response to the blockade, the government created a so-called </span><a class="new" data-dcnode-id="6484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBlokados_fondas%26action%3Dedit%26redlink%3D1" title="Blokados fondas (page does not exist)"><span data-dcnode-id="6485" instrument_node="">Blockade Fund</span></a><span class="noprint" data-dcnode-id="6479" style="font-size:85%; font-style: normal;"><span data-dcnode-id="6483" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="6481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lt.wikipedia.org/wiki/Blokados_fondas" title="lt:Blokados fondas"><span data-dcnode-id="6482" instrument_node="">lt</span></a><span data-dcnode-id="6480" instrument_node="">]</span></span><span data-dcnode-id="6478" instrument_node="">, which operated on voluntary donations of Lithuanians.</span><sup class="reference" data-dcnode-id="6475" id="cite_ref-lrs_36-3"><a data-dcnode-id="6476" href="#cite_note-lrs-36"><span data-dcnode-id="6477" instrument_node="">[35]</span></a></sup><span data-dcnode-id="6474" instrument_node=""> By the time the blockade ended, 7.6 million rubles were collected by the government, which it promptly invested in jewellery and gold to avoid depreciation of the rubles they received.</span><sup class="reference" data-dcnode-id="6471" id="cite_ref-81"><a data-dcnode-id="6472" href="#cite_note-81"><span data-dcnode-id="6473" instrument_node="">[80]</span></a></sup><sup class="reference" data-dcnode-id="6468" id="cite_ref-82"><a data-dcnode-id="6469" href="#cite_note-82"><span data-dcnode-id="6470" instrument_node="">[81]</span></a></sup><span data-dcnode-id="6467" instrument_node=""> In </span><a data-dcnode-id="6465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suwa%25C5%2582ki_Voivodeship" title="Suwałki Voivodeship"><span data-dcnode-id="6466" instrument_node="">Suwałki voivodeship</span></a><span data-dcnode-id="6464" instrument_node="">, the Lithuanians, who are a </span><a data-dcnode-id="6462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuanian_minority_in_Poland" title="Lithuanian minority in Poland"><span data-dcnode-id="6463" instrument_node="">sizeable minority</span></a><span data-dcnode-id="6461" instrument_node=""> in the border area, have also contributed to the effort.</span><sup class="reference" data-dcnode-id="6458" id="cite_ref-83"><a data-dcnode-id="6459" href="#cite_note-83"><span data-dcnode-id="6460" instrument_node="">[82]</span></a></sup><span data-dcnode-id="6457" instrument_node="">
</span></p><p data-dcnode-id="6437"><span data-dcnode-id="6455" instrument_node="">The embargo had profound effects on the energy sector of Lithuania. In Soviet times, geologists drilled the ground for the search of oil in Latvia and Lithuania, but the economic blockade forced Lithuania to extract it for the first time on an industrial scale - in 1990, Lithuanians have pumped out 12,000 tons of the fossil fuel.</span><sup class="reference" data-dcnode-id="6452" id="cite_ref-84"><a data-dcnode-id="6453" href="#cite_note-84"><span data-dcnode-id="6454" instrument_node="">[83]</span></a></sup><span data-dcnode-id="6451" instrument_node=""> Moreover, the Baltic country could not import oil by the sea not only because of the naval blockade, but also because Klaipėda's oil terminal was far too small for the needs of Lithuania. That prompted the government to build a </span><a data-dcnode-id="6449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/B%25C5%25ABting%25C4%2597_oil_terminal" title="Būtingė oil terminal"><span data-dcnode-id="6450" instrument_node="">new oil terminal</span></a><span data-dcnode-id="6448" instrument_node=""> in </span><a data-dcnode-id="6446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/B%25C5%25ABting%25C4%2597" title="Būtingė"><span data-dcnode-id="6447" instrument_node="">Būtingė</span></a><span data-dcnode-id="6445" instrument_node="">, which was commissioned in 1998, along with continuation of the oil pipe to the new sea port.</span><sup class="reference" data-dcnode-id="6442" id="cite_ref-85"><a data-dcnode-id="6443" href="#cite_note-85"><span data-dcnode-id="6444" instrument_node="">[84]</span></a></sup><sup class="reference" data-dcnode-id="6439" id="cite_ref-86"><a data-dcnode-id="6440" href="#cite_note-86"><span data-dcnode-id="6441" instrument_node="">[85]</span></a></sup><span data-dcnode-id="6438" instrument_node="">
</span></p><span data-dcnode-id="6436" instrument_node="">
</span><h3 data-dcnode-id="6426"><span class="mw-headline" data-dcnode-id="6434" id="Latvia_and_Estonia"><span data-dcnode-id="6435" instrument_node="">Latvia and Estonia</span></span><span class="mw-editsection" data-dcnode-id="6427"><span class="mw-editsection-bracket" data-dcnode-id="6432"><span data-dcnode-id="6433" instrument_node="">[</span></span><a data-dcnode-id="6430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_economic_blockade_of_Lithuania%26action%3Dedit%26section%3D8" title="Edit section: Latvia and Estonia"><span data-dcnode-id="6431" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6428"><span data-dcnode-id="6429" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6425" instrument_node="">
</span><link data-dcnode-id="6424" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6420" role="note"><span data-dcnode-id="6423" instrument_node="">Further information: </span><a data-dcnode-id="6421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_states_under_Soviet_rule_%281944%25E2%2580%25931991%29%23Restorations_of_independence" title="Baltic states under Soviet rule (1944–1991)"><span data-dcnode-id="6422" instrument_node="">Baltic states under Soviet rule (1944–1991) §&nbsp;Restorations of independence</span></a></div><span data-dcnode-id="6419" instrument_node="">
</span><p data-dcnode-id="6403"><span data-dcnode-id="6418" instrument_node="">The Soviet crackdown on Lithuania accelerated integration of three Baltic states and created a form of solidarity between the pro-independence parties in the three republics. A series of high-profile meetings occurred between the leaders of Lithuania, Latvia and Estonia. Already in May, the three states signed an agreement which renewed the so-called </span><a data-dcnode-id="6416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_Entente" title="Baltic Entente"><span data-dcnode-id="6417" instrument_node="">Baltic Entente</span></a><span data-dcnode-id="6415" instrument_node="">, an interwar treaty which sought political coordination, and established a Council of Baltic States, essentially having the same purpose.</span><sup class="reference" data-dcnode-id="6412" id="cite_ref-87"><a data-dcnode-id="6413" href="#cite_note-87"><span data-dcnode-id="6414" instrument_node="">[86]</span></a></sup><span data-dcnode-id="6411" instrument_node=""> On the other hand, the economic sanctions had a chilling effect on the independence cause of the two other Baltic states, which, because of the tough reaction of the Kremlin and their larger share of ethnic minorities, particularly Russians, decided to water down their declarations of independence and generally sought less confrontational attitudes towards Moscow.</span><sup class="reference" data-dcnode-id="6408" id="cite_ref-:1_12-8"><a data-dcnode-id="6409" href="#cite_note-:1-12"><span data-dcnode-id="6410" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="6405" id="cite_ref-:26_80-1"><a data-dcnode-id="6406" href="#cite_note-:26-80"><span data-dcnode-id="6407" instrument_node="">[79]</span></a></sup><span data-dcnode-id="6404" instrument_node="">
</span></p><span data-dcnode-id="6402" instrument_node="">
</span><h3 data-dcnode-id="6392"><span class="mw-headline" data-dcnode-id="6400" id="Rising_tensions_with_the_minorities"><span data-dcnode-id="6401" instrument_node="">Rising tensions with the minorities</span></span><span class="mw-editsection" data-dcnode-id="6393"><span class="mw-editsection-bracket" data-dcnode-id="6398"><span data-dcnode-id="6399" instrument_node="">[</span></span><a data-dcnode-id="6396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_economic_blockade_of_Lithuania%26action%3Dedit%26section%3D9" title="Edit section: Rising tensions with the minorities"><span data-dcnode-id="6397" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6394"><span data-dcnode-id="6395" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6391" instrument_node="">
</span><link data-dcnode-id="6390" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6383" role="note"><span data-dcnode-id="6389" instrument_node="">Further information: </span><a data-dcnode-id="6387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poles_in_Lithuania" title="Poles in Lithuania"><span data-dcnode-id="6388" instrument_node="">Poles in Lithuania</span></a><span data-dcnode-id="6386" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polish_National-Territorial_Region" title="Polish National-Territorial Region"><span data-dcnode-id="6385" instrument_node="">Polish National-Territorial Region</span></a></div><span data-dcnode-id="6382" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6373"><div class="thumbinner" data-dcnode-id="6374" style="width:222px;"><a class="image" data-dcnode-id="6380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APolski_Kraj_Narodowo-Terytorialny.png"><img alt="Map of the Polish National-Territorial Region, as proclaimed by Lithuanian Poles in October 1990. It included the districts of Vilnius (Wilno), Šalcininkai (Soleczniki), as well as parts of Trakai (Troki), Švenčionys (Święciany) and Širvintos (Szyrwinty) districts. The capital was established at Naujoji Vilnia (Nowa Wilejka). The city of Vilnius was not part of the region, thus becoming an enclave within the proposed autonomy." class="thumbimage" data-dcnode-id="6381" data-file-height="3164" data-file-width="3650" decoding="async" height="191" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/da/Polski_Kraj_Narodowo-Terytorialny.png/220px-Polski_Kraj_Narodowo-Terytorialny.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/da/Polski_Kraj_Narodowo-Terytorialny.png/330px-Polski_Kraj_Narodowo-Terytorialny.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/da/Polski_Kraj_Narodowo-Terytorialny.png/440px-Polski_Kraj_Narodowo-Terytorialny.png 2x" width="220"></a><span data-dcnode-id="6379" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6375"><div class="magnify" data-dcnode-id="6377"><a class="internal" data-dcnode-id="6378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APolski_Kraj_Narodowo-Terytorialny.png" title="Enlarge"></a></div><span data-dcnode-id="6376" instrument_node="">Polish National-Territorial Region, as proclaimed by Lithuanian Poles in October 1990 (names of cities in Polish)</span></div></div></div><span data-dcnode-id="6372" instrument_node="">
</span><p data-dcnode-id="6360"><span data-dcnode-id="6371" instrument_node="">At the same time as the relations with the Soviet Union deteriorated, the conflict was brewing between the Lithuanian majority and the Polish minority in the south-eastern part of Lithuania and the Russians in </span><a data-dcnode-id="6369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visaginas" title="Visaginas"><span data-dcnode-id="6370" instrument_node="">Sniečkus</span></a><span data-dcnode-id="6368" instrument_node="">, where the </span><a data-dcnode-id="6366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ignalina_Nuclear_Power_Plant" title="Ignalina Nuclear Power Plant"><span data-dcnode-id="6367" instrument_node="">Ignalina Nuclear Power Plant</span></a><span data-dcnode-id="6365" instrument_node=""> was located. Several times in 1990 and 1991, the local governments of these areas have sought autonomy and/or tried to assert that Lithuania's laws did not extend to their respective territories.</span><sup class="reference" data-dcnode-id="6362" id="cite_ref-:23_52-1"><a data-dcnode-id="6363" href="#cite_note-:23-52"><span data-dcnode-id="6364" instrument_node="">[51]</span></a></sup><span data-dcnode-id="6361" instrument_node="">
</span></p><p data-dcnode-id="6321"><span data-dcnode-id="6359" instrument_node="">The tensions were particularly strong with the Polish minority, which felt discriminated by Lithuanians, not least due to few educational and economical opportunities in the area and the official language policy of Lithuania, which mandated the use of Lithuanian in state buildings without exceptions for minorities.</span><sup class="reference" data-dcnode-id="6356" id="cite_ref-:25_88-0"><a data-dcnode-id="6357" href="#cite_note-:25-88"><span data-dcnode-id="6358" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6355" instrument_node=""> While the first attempts to introduce Polish self-government (or autonomy) started in late 1988 and early 1989, the movement gained significant momentum after the Act of 11 March, and its escalation happened during the blockade.</span><sup class="reference" data-dcnode-id="6352" id="cite_ref-:24_49-1"><a data-dcnode-id="6353" href="#cite_note-:24-49"><span data-dcnode-id="6354" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6351" instrument_node=""> On 15 May, the </span><a data-dcnode-id="6349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C5%25A0al%25C4%258Dininkai_District_Municipality" title="Šalčininkai District Municipality"><span data-dcnode-id="6350" instrument_node="">Šalcininkai (Soleczniki) district</span></a><span data-dcnode-id="6348" instrument_node=""> council voted to disregard the independence declaration and to recognise the Soviet Constitution and Soviet laws only; </span><a data-dcnode-id="6346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vilnius_District_Municipality" title="Vilnius District Municipality"><span data-dcnode-id="6347" instrument_node="">Vilnius (Wilno) district</span></a><span data-dcnode-id="6345" instrument_node=""> council was less radical, but on 24 May it still voted to create a Polish national district and to condemn Lithuania for what the council saw as a violation of human rights and ignoring national minorities' interests.</span><sup class="reference" data-dcnode-id="6342" id="cite_ref-lrs_36-4"><a data-dcnode-id="6343" href="#cite_note-lrs-36"><span data-dcnode-id="6344" instrument_node="">[35]</span></a></sup><sup class="reference" data-dcnode-id="6339" id="cite_ref-:24_49-2"><a data-dcnode-id="6340" href="#cite_note-:24-49"><span data-dcnode-id="6341" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6338" instrument_node=""> Czesław Wysocki, head of the Soleczniki district council, would explain that the CPSU, unlike Lithuania, endorsed creation of such entities;</span><sup class="reference" data-dcnode-id="6335" id="cite_ref-:24_49-3"><a data-dcnode-id="6336" href="#cite_note-:24-49"><span data-dcnode-id="6337" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6334" instrument_node=""> he went on to claim that the only way to alleviate tensions was to cancel the Act of the Re-Establishment of the State of Lithuania.</span><sup class="reference" data-dcnode-id="6331" id="cite_ref-89"><a data-dcnode-id="6332" href="#cite_note-89"><span data-dcnode-id="6333" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6330" instrument_node=""> Both decisions were eventually cancelled by the Supreme Council of Lithuania as unconstitutional. However, on 1 June, delegates from majority-Polish regions appealed to the Lithuanian government, not the Soviet Union, to create a self-governing entity, which they argued was the only way to ensure that the rights of Poles are respected.</span><sup class="reference" data-dcnode-id="6327" id="cite_ref-:24_49-4"><a data-dcnode-id="6328" href="#cite_note-:24-49"><span data-dcnode-id="6329" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6326" instrument_node=""> Further preparations eventually led to the announcement of the Polish National-Territorial Region in October 1990, which the politicians wanted to be part of Lithuania.</span><sup class="reference" data-dcnode-id="6323" id="cite_ref-90"><a data-dcnode-id="6324" href="#cite_note-90"><span data-dcnode-id="6325" instrument_node="">[89]</span></a></sup><span data-dcnode-id="6322" instrument_node="">
</span></p><p data-dcnode-id="6266"><span data-dcnode-id="6320" instrument_node="">Opinions differ on the role of Poles in the process of Lithuanian struggle for independence and in the blockade. Lithuanian,</span><sup class="reference" data-dcnode-id="6317" id="cite_ref-91"><a data-dcnode-id="6318" href="#cite_note-91"><span data-dcnode-id="6319" instrument_node="">[90]</span></a></sup><sup class="reference" data-dcnode-id="6314" id="cite_ref-92"><a data-dcnode-id="6315" href="#cite_note-92"><span data-dcnode-id="6316" instrument_node="">[91]</span></a></sup><span data-dcnode-id="6313" instrument_node=""> Russian</span><sup class="reference" data-dcnode-id="6310" id="cite_ref-:1_12-9"><a data-dcnode-id="6311" href="#cite_note-:1-12"><span data-dcnode-id="6312" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6309" instrument_node=""> and Western</span><sup class="reference" data-dcnode-id="6306" id="cite_ref-:25_88-1"><a data-dcnode-id="6307" href="#cite_note-:25-88"><span data-dcnode-id="6308" instrument_node="">[87]</span></a></sup><sup class="reference" data-dcnode-id="6303" id="cite_ref-93"><a data-dcnode-id="6304" href="#cite_note-93"><span data-dcnode-id="6305" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6302" instrument_node=""> scholars state that Poles were tacitly or directly supported by Moscow and were dominated by pro-Moscow politicians, such as </span><a data-dcnode-id="6300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jan_Ciechanowicz" title="Jan Ciechanowicz"><span data-dcnode-id="6301" instrument_node="">Jan Ciechanowicz</span></a><span data-dcnode-id="6299" instrument_node=""> and Wysocki (or, as Sąjūdis claimed, that Poles have been manipulated by Moscow communists), which eventually led to the increase of anti-Polish rhetoric by Sąjūdis.</span><sup class="reference" data-dcnode-id="6296" id="cite_ref-94"><a data-dcnode-id="6297" href="#cite_note-94"><span data-dcnode-id="6298" instrument_node="">[93]</span></a></sup><span data-dcnode-id="6295" instrument_node=""> Winston A. Van Horne and </span><a class="mw-redirect" data-dcnode-id="6293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Erich_Senn" title="Alfred Erich Senn"><span data-dcnode-id="6294" instrument_node="">Alfred Erich Senn</span></a><span data-dcnode-id="6292" instrument_node=""> suggest that Moscow helped the Polish regions weather the blockade</span><sup class="reference" data-dcnode-id="6289" id="cite_ref-95"><a data-dcnode-id="6290" href="#cite_note-95"><span data-dcnode-id="6291" instrument_node="">[94]</span></a></sup><sup class="reference" data-dcnode-id="6286" id="cite_ref-96"><a data-dcnode-id="6287" href="#cite_note-96"><span data-dcnode-id="6288" instrument_node="">[95]</span></a></sup><span data-dcnode-id="6285" instrument_node=""> (though M. Gaškienė, a senior government official, wrote to Algimantas Gureckas that the blockade was applied uniformly across Lithuania),</span><sup class="reference" data-dcnode-id="6282" id="cite_ref-:16_22-2"><a data-dcnode-id="6283" href="#cite_note-:16-22"><span data-dcnode-id="6284" instrument_node="">[22]</span></a></sup><span data-dcnode-id="6281" instrument_node=""> while </span><a data-dcnode-id="6279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anatol_Lieven" title="Anatol Lieven"><span data-dcnode-id="6280" instrument_node="">Anatol Lieven</span></a><span data-dcnode-id="6278" instrument_node=""> underlines that the </span><a data-dcnode-id="6276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Association_of_Poles_in_Lithuania" title="Association of Poles in Lithuania"><span data-dcnode-id="6277" instrument_node="">Association of Poles in Lithuania</span></a><span data-dcnode-id="6275" instrument_node=""> actually supported independence, but faced stiff competition from Polish anti-independence candidates.</span><sup class="reference" data-dcnode-id="6272" id="cite_ref-:26_80-2"><a data-dcnode-id="6273" href="#cite_note-:26-80"><span data-dcnode-id="6274" instrument_node="">[79]</span></a></sup><span data-dcnode-id="6271" instrument_node=""> On the other hand, Polish scholars and members of the Polish community say the Polish-Communist ties are either an exaggeration or Lithuanian propaganda.</span><sup class="reference" data-dcnode-id="6268" id="cite_ref-97"><a data-dcnode-id="6269" href="#cite_note-97"><span data-dcnode-id="6270" instrument_node="">[96]</span></a></sup><span data-dcnode-id="6267" instrument_node="">
</span></p><span data-dcnode-id="6265" instrument_node="">
</span><h2 data-dcnode-id="6255"><span class="mw-headline" data-dcnode-id="6263" id="Aftermath"><span data-dcnode-id="6264" instrument_node="">Aftermath</span></span><span class="mw-editsection" data-dcnode-id="6256"><span class="mw-editsection-bracket" data-dcnode-id="6261"><span data-dcnode-id="6262" instrument_node="">[</span></span><a data-dcnode-id="6259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_economic_blockade_of_Lithuania%26action%3Dedit%26section%3D10" title="Edit section: Aftermath"><span data-dcnode-id="6260" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6257"><span data-dcnode-id="6258" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6254" instrument_node="">
</span><p data-dcnode-id="6227"><span data-dcnode-id="6253" instrument_node="">As Lithuania and the Soviet Union found a compromise upon which negotiations could start, commissions on both sides were set up to agree on the terms of further co-existence of Lithuania. Landsbergis, who was considered less reconciliatory than Prunskienė, was head of the Lithuanian delegation and Ryzhkov led the Soviet one. Even though the commissions were set in July, the negotiations were not agreed upon until October.</span><sup class="reference" data-dcnode-id="6250" id="cite_ref-:1_12-10"><a data-dcnode-id="6251" href="#cite_note-:1-12"><span data-dcnode-id="6252" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6249" instrument_node=""> When the groups were supposed to meet on 30 November 1990, the Soviet delegation refused to attend, citing preparations to the 4th session of the Congress of People's Deputies, and no new date for the meeting was set.</span><sup class="reference" data-dcnode-id="6246" id="cite_ref-:27_33-3"><a data-dcnode-id="6247" href="#cite_note-:27-33"><span data-dcnode-id="6248" instrument_node="">[32]</span></a></sup><span data-dcnode-id="6245" instrument_node=""> The Lithuanians then cancelled the moratorium, restoring the effects of the Act of 11 March, which served as a catalyst to the </span><a data-dcnode-id="6243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/January_Events_%28Lithuania%29" title="January Events (Lithuania)"><span data-dcnode-id="6244" instrument_node="">January Events</span></a><span data-dcnode-id="6242" instrument_node=""> of 1991.</span><sup class="reference" data-dcnode-id="6239" id="cite_ref-:10_35-5"><a data-dcnode-id="6240" href="#cite_note-:10-35"><span data-dcnode-id="6241" instrument_node="">[34]</span></a></sup><span data-dcnode-id="6238" instrument_node=""> </span><a data-dcnode-id="6236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_OMON_assaults_on_Lithuanian_border_posts" title="Soviet OMON assaults on Lithuanian border posts"><span data-dcnode-id="6237" instrument_node="">Soviet aggression against Lithuania's border posts</span></a><span data-dcnode-id="6235" instrument_node=""> continued further until the </span><a data-dcnode-id="6233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1991_Soviet_coup_d%27%25C3%25A9tat_attempt" title="1991 Soviet coup d'état attempt"><span data-dcnode-id="6234" instrument_node="">1991 Soviet coup d'état attempt</span></a><span data-dcnode-id="6232" instrument_node="">, when Lithuanian independence was recognised by the Russian SFSR, most of countries in the world as well as the Soviet Union itself.</span><sup class="reference" data-dcnode-id="6229" id="cite_ref-hrw529_98-0"><a data-dcnode-id="6230" href="#cite_note-hrw529-98"><span data-dcnode-id="6231" instrument_node="">[97]</span></a></sup><span data-dcnode-id="6228" instrument_node="">
</span></p><span data-dcnode-id="6226" instrument_node="">
</span><h2 data-dcnode-id="6216"><span class="mw-headline" data-dcnode-id="6224" id="Notes"><span data-dcnode-id="6225" instrument_node="">Notes</span></span><span class="mw-editsection" data-dcnode-id="6217"><span class="mw-editsection-bracket" data-dcnode-id="6222"><span data-dcnode-id="6223" instrument_node="">[</span></span><a data-dcnode-id="6220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_economic_blockade_of_Lithuania%26action%3Dedit%26section%3D11" title="Edit section: Notes"><span data-dcnode-id="6221" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6218"><span data-dcnode-id="6219" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6215" instrument_node="">

</span><li data-dcnode-id="6193" id="cite_note-29"><span class="mw-cite-backlink" data-dcnode-id="6207"><b data-dcnode-id="6208"><a aria-label="Jump up" data-dcnode-id="6209" href="#cite_ref-29" title="Jump up"><span data-dcnode-id="6210" instrument_node="">^</span></a></b></span><span data-dcnode-id="6206" instrument_node=""> </span><span class="reference-text" data-dcnode-id="6195"><span data-dcnode-id="6205" instrument_node="">According to the </span><a class="external text" data-dcnode-id="6203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru.wikisource.org/wiki/%25D0%2597%25D0%25B0%25D0%25BA%25D0%25BE%25D0%25BD_%25D0%25A1%25D0%25A1%25D0%25A1%25D0%25A0_%25D0%25BE%25D1%2582_03.04.1990_%25E2%2584%2596_1409-I"><span data-dcnode-id="6204" instrument_node="">law (in Russian)</span></a><span data-dcnode-id="6202" instrument_node="">, a </span><a data-dcnode-id="6200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republics_of_the_Soviet_Union" title="Republics of the Soviet Union"><span data-dcnode-id="6201" instrument_node="">Union</span></a><span data-dcnode-id="6199" instrument_node=""> or </span><a data-dcnode-id="6197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autonomous_Soviet_Socialist_Republics" title="Autonomous Soviet Socialist Republics"><span data-dcnode-id="6198" instrument_node="">autonomous republic</span></a><span data-dcnode-id="6196" instrument_node=""> could only secede if (a) it achieved a two-thirds majority in a referendum six to nine months after the signatures were collected, (b) it got consent from the USSR's Congress of People's Deputies to begin transition, (c) it waited for up to five years, during which period it transferred the Union's property to the Soviet Union, unless the sides agreed otherwise, (d) it survived a confirmatory referendum (2/3 majority needed) if it was called in the last year of transition and (e) the Congress of People's Deputies voted to confirm that interests of all sides had been satisfied during the transitionary period and ratified the secession. No republic has ultimately undergone such procedure before breaking away from USSR.</span></span><span data-dcnode-id="6194" instrument_node="">
