</span></div><span data-dcnode-id="772" instrument_node="">
</span><p class="paragraph-15 normalpara" data-dcnode-id="767"><span data-dcnode-id="771" instrument_node="">Interested
            in understanding post-Soviet transformation? Look no further! Since 1992, </span><em data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Demokratizatsiya</span></em><span data-dcnode-id="768" instrument_node=""> contributors have been
            providing scholarly insights into the forces that shape the region, from
            perestroika to Putin.</span></p><span data-dcnode-id="766" instrument_node="">
</span><p class="paragraph-16 normal-para" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">In each quarterly
            issue, distinguished and emerging scholars from around the world address
            politics, economics, social issues, legal systems, nationalities, international
            relations, and human rights. Recent articles have covered blogging in Runet,
            the Donbass War, and the portrayal of female heroes in Kyrgyz nation-building.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p class="paragraph-16 normal-para" data-dcnode-id="756"><em data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Demokratizatsiya</span></em><span data-dcnode-id="760" instrument_node=""> is </span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scopus.com/sourceid/15561%3Forigin%3Dsbrowse" target="_blank"><span data-dcnode-id="759" instrument_node="">ranked in Scopus</span></a><span data-dcnode-id="757" instrument_node="">. As of January 2020, the journal is in the 68th percentile of social science journals, with a CiteScore of 0.92.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p class="paragraph-16 normal-para" data-dcnode-id="748"><em data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Demokratizatsiya</span></em><span data-dcnode-id="752" instrument_node="">&nbsp;appears in the European Reference Index for the Humanities. Learn more </span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dbh.nsd.uib.no/publiseringskanaler/erihplus/periodical/info.action%3Fid%3D480904" target="_blank"><span data-dcnode-id="751" instrument_node="">here</span></a><span data-dcnode-id="749" instrument_node="">.</span></p><span data-dcnode-id="747" instrument_node="">

</span><h2 class="section-heading centered contribute" data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">Interested in Contributing?</span></h2><span data-dcnode-id="148" instrument_node="">
</span><p class="normal-para" data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">The
        journal covers politics, economics, social issues, crime, legal systems,
        nationalities, international relations, human rights, and other topics, with a
        focus on developments since the end of the Soviet Union.</span></p><span data-dcnode-id="145" instrument_node="">
</span><p class="normal-para" data-dcnode-id="140"><span data-dcnode-id="144" instrument_node="">We welcome submissions of articles by recognized and emerging academics, journalists, practitioners and other specialists. We are especially interested in scholarly articles that have policy relevance. Historically, </span><em data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">Demokratizatsiya</span></em><span data-dcnode-id="141" instrument_node=""> has published English
        language articles ranging between 6,000 and 10,000 words in length.</span></p><span data-dcnode-id="139" instrument_node="">
</span><p class="normal-para" data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">Additionally,
        as part of our commitment to develop and publish new voices, we have recently
        added a new section, “Perspectives:
        Concise Analyses of Current Events.” The section will include short pieces (about 2,000 – 3,000 words) from
        undergraduates, graduate students, and early-career scholars who have something
        to say on a range of contemporary topics in post-Soviet space. We’re looking
        for the same policy relevance and focus on democratization as we seek in our
        longer articles, but in a more concise, timely package. Once authors submit an
        article, our editorial team will work with each one individually to develop
        their work, providing extensive editorial feedback.</span></p><span data-dcnode-id="136" instrument_node="">
</span><p class="normal-para" data-dcnode-id="131"><span data-dcnode-id="135" instrument_node="">There are
        no costs associated with submitting a manuscript to </span><em data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">Demokratizatsiya</span></em><span data-dcnode-id="132" instrument_node=""> or having
        it published. Each manuscript submitted will be evaluated by double blind peer
        review by at least two reviewers with published scholarship on related topics.
        We hope to respond to each submission within four months.&nbsp;We will only
        accept a manuscript for peer review if the manuscript is not being considered
        for publication by any other journal. You are welcome to publish the pre-prints online after the text has been accepted for publication.</span></p><span data-dcnode-id="130" instrument_node="">
</span><p class="normal-para" data-dcnode-id="122"><span data-dcnode-id="129" instrument_node="">Our submission guidelines are available&nbsp;</span><a data-dcnode-id="127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//platform.twitter.com/contents/DemokratizatsiyaStyleGuide2021Onwards.pdf" target="_blank"><span data-dcnode-id="128" instrument_node="">here</span></a><span data-dcnode-id="126" instrument_node="">. For more information or to submit a manuscript, please contact Robert Orttung, executive editor, and Ellen Powell, managing editor, at&nbsp;</span><a data-dcnode-id="124" href="mailto:demjournal@gwu.edu"><span data-dcnode-id="125" instrument_node="">demjournal@gwu.edu</span></a><span data-dcnode-id="123" instrument_node="">.</span></p><span data-dcnode-id="121" instrument_node="">
