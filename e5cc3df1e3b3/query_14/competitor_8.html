</span><div class="c-article-body" data-article-body="true" data-dcnode-id="648" data-track-component="article body"><span data-dcnode-id="1410" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="1403" data-gtm-vis-first-on-screen-50443292_562="578" data-gtm-vis-first-on-screen-50443292_563="578" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="578" data-gtm-vis-recent-on-screen-50443292_563="577" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="1404" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1408" id="Abs1"><span data-dcnode-id="1409" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="1405" id="Abs1-content"><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">The role of elites and their policies in the process of regime transformation are not as simple as “rule by the people” implies, once it is recognized that all “real-existing democracies” depend crucially on the role of representatives who act as intermediaries between the citizens and their rulers. Instead of rule by a few vs. rule by all, we have “rule by some politicians” as the outcome. These newly empowered representatives inevitably form an elite institutionally separate from the electorate that has chosen them competitively or the selectorate that has chosen them for their reputation.</span></p></div></div></section><span data-dcnode-id="1402" instrument_node="">
</span><section data-dcnode-id="1355" data-gtm-vis-first-on-screen-50443292_562="578" data-gtm-vis-first-on-screen-50443292_563="578" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="578" data-gtm-vis-recent-on-screen-50443292_563="578" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="1356" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1400" id="Sec1"><span data-dcnode-id="1401" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="1357" id="Sec1-content"><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">I am invited by JCPS Editor to write a piece for a special issue on the prospects for democratization in China. However, I am not a China expert, but a comparativist. I would like to contribute a piece that may serve as a useful reference for those who are thinking about democratic transition in China or some global lessons for China, and particularly the role of elites in the process of democratization.</span></p><p data-dcnode-id="1393"><span data-dcnode-id="1397" instrument_node="">From a strictly etymological perspective, the transition from autocracy to democracy should involve moving from “the rule of one person (or small group of persons)” to “the rule of the people (or to that segment of the people possessing equal political rights as citizens)" [</span><a aria-label="Reference 17" data-dcnode-id="1395" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d188043821e282" title="Mosca, G. 1896. Elementi di Scienza Politica. Roma: Bocca."><span data-dcnode-id="1396" instrument_node="">17</span></a><span data-dcnode-id="1394" instrument_node="">]. In the former, the government consists of a political elite clearly demarcated from and not accountable to the population; in the latter, either there is no elite and citizens govern directly or they govern indirectly through agents chosen by them, but who only rule pro tempore and depend periodically on their explicit consent. As the result of such a change in regime, there should be a complete change of elite personnel and structure. Moreover, the ensuing governing elite (or non-elite) is expected to pursue different policies benefitting different segments of the population.</span></p><p data-dcnode-id="1382"><span data-dcnode-id="1392" instrument_node="">From a realistic perspective, the role of elites and their policies in the process of regime transformation are not so simple. Once it is recognized that all “real-existing democracies” (REDs) [</span><a aria-label="Reference 25" data-dcnode-id="1390" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d188043821e288" title="Schmitter, P.C. 1994. Dangers and dilemmas of democracy. Journal of Democracy 5 (2): 57–74."><span data-dcnode-id="1391" instrument_node="">25</span></a><span data-dcnode-id="1389" instrument_node="">, </span><a aria-label="Reference 26" data-dcnode-id="1387" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d188043821e291" title="Schmitter, P.C. 2001. Parties are not what they once were. In Political parties and democracy, ed. L. Diamond and R. Gunther, 67–89. Baltimore: The Johns Hopkins University Press."><span data-dcnode-id="1388" instrument_node="">26</span></a><span data-dcnode-id="1386" instrument_node="">] depend crucially on the role of representatives who act as intermediaries between the citizens and their rulers – some of whom, either directly in presidential regimes or indirectly in parliamentary ones, become the rulers – then, the difference between autocracy and democracy is bound to be less dramatic. Instead of rule by a few versus rule by all, we have “rule by some politicians” or “polito-cracy” as the outcome. These newly empowered representatives inevitably form an elite institutionally separate from the electorate that has chosen them competitively or the selectorate that has chosen them for their reputation [</span><a aria-label="Reference 16" data-dcnode-id="1384" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d188043821e294" title="Michels, R. (1962) Political Parties: A Sociological Study of Oligarchic Tendencies of Modern democracy. New York: Crowell-collier (original German version 1911)."><span data-dcnode-id="1385" instrument_node="">16</span></a><span data-dcnode-id="1383" instrument_node="">]. For, in REDs, not all representatives are elected and act in the name of political parties. Many, probably most of them, are selected by various publics and act through civil society, i.e. a myriad of interest associations, social movements and advocacy groups – which only very rarely hold competitive elections to choose their leaders.</span></p><p data-dcnode-id="1371"><span data-dcnode-id="1381" instrument_node="">Moreover, not uncommonly and especially through the latter channels of interest and ideational representation, many actors in the “new” democratic elite will be inherited from the </span><i data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">ancien régime.</span></i><span data-dcnode-id="1378" instrument_node=""> If this were not enough, as we have been reminded by numerous theorists and empirical researchers, these elected or selected politicians may form a </span><i data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">class</span></i><span data-dcnode-id="1375" instrument_node=""> to which there are formidable barriers to entry by competition or a </span><i data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">caste</span></i><span data-dcnode-id="1372" instrument_node=""> whose members collude to avoid competition from outsiders and/or succeed in invoking conformity by convincing the people of their unique and hegemonic “right to rule.”</span></p><p data-dcnode-id="1363"><span data-dcnode-id="1370" instrument_node="">More recently, another factor has intervened to complicate this mediated relation between citizens and rulers, namely, the trend toward the professionalization of the nature of representation and, hence, the status of politicians – in both political parties and civil society [</span><a aria-label="Reference 2" data-dcnode-id="1368" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d188043821e313" title="Borchert, J., and J. Zeiss, eds. 2003. The political class in advanced democracies. Oxford: Oxford University Press."><span data-dcnode-id="1369" instrument_node="">2</span></a><span data-dcnode-id="1367" instrument_node="">, </span><a aria-label="Reference 4" data-dcnode-id="1365" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d188043821e316" title="Cotta, M., and H. Best. 2000. Between professionalization and democratization: A synoptic view of the making of the European representative. In Parliamentary representation in Europe 1848–2000, ed. H. Best and M. Cotta, 493–526. Oxford: Oxford University Press."><span data-dcnode-id="1366" instrument_node="">4</span></a><span data-dcnode-id="1364" instrument_node="">]. Initially in liberal democratic theory, it was presumed that the tenure of politicians was limited in time and commitment, either by the outcome of competition between political parties or by personal choice when the winners (elected or non-elected) decided to return to their original life situations. In short, politicians were presumed to live “for politics,” not “from politics.” In well-established democracies, this trend toward the latter has already been extensively documented; in newly-created democracies, it seems to set in very quickly as the amateurs at the beginning of regime transformation become professionals by its end.</span></p><p data-dcnode-id="1358"><span data-dcnode-id="1362" instrument_node="">If this were not enough, all REDs depend on non-democratic elites that are embedded in the so-called “guardian institutions” of the state – agencies, commissions, directorates, boards, central banks, courts, administrative staffs and so forth – that may be delegated certain powers by democratic elites, but are expected to take their binding decisions based on their expertise –civilian or military – and, therefore, deliberately protected from the vicissitudes of political competition [</span><a aria-label="Reference 5" data-dcnode-id="1360" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d188043821e322" title="Dahl, R. 1971. Polyarchy. New Haven: Yale University Press."><span data-dcnode-id="1361" instrument_node="">5</span></a><span data-dcnode-id="1359" instrument_node="">]. Needless to say, the continuity of these elites is likely to be even greater during and after the transition from autocracy to democracy than that of elected or selected political representatives.</span></p></div></div></section><section data-dcnode-id="1308" data-gtm-vis-first-on-screen-50443292_562="579" data-gtm-vis-first-on-screen-50443292_563="578" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="579" data-gtm-vis-recent-on-screen-50443292_563="578" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="The Mode of Transition"><div class="c-article-section" data-dcnode-id="1309" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1353" id="Sec2"><span data-dcnode-id="1354" instrument_node="">The Mode of Transition</span></h2><div class="c-article-section__content" data-dcnode-id="1310" id="Sec2-content"><p data-dcnode-id="1336"><span data-dcnode-id="1352" instrument_node="">What is crucial to explaining the outcome in this ambiguous process of elite transformation is the mode of transition – how a given polity changes from autocracy to democracy. Ever since Machiavelli, students of politics have known that this interim between regime-types constitutes a very distinctive moment – one that he argued even required a distinctive science of politics [</span><a aria-label="Reference 13" data-dcnode-id="1350" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d188043821e333" title="Machiavelli, N. 1532 Il Principe. Einaudi, Einaudi: Tascabili 1995"><span data-dcnode-id="1351" instrument_node="">13</span></a><span data-dcnode-id="1349" instrument_node="">]. Its most salient characteristic was the much greater degree of uncertainty (he called it </span><i data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">fortuna</span></i><span data-dcnode-id="1346" instrument_node="">) during which not only the actions of actors were much more difficult to predict, but also the rules of the game were unknown. Although in his case, the transition went in the opposite direction – from republican to princely government – the generic situation is similar when moving from autocracy to democracy. And the implication is identical. During the period when one regime is in demise or transforming itself, what becomes much more important than during “normal times” - when </span><i data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">necessità</span></i><span data-dcnode-id="1343" instrument_node=""> was embedded predictably in a pre-established and hegemonic set of rules - are the autonomous choices of actors (he called it </span><i data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">virtù</span></i><span data-dcnode-id="1340" instrument_node="">) in choosing and institutionalizing a new set of rules. </span><i data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Ergo,</span></i><span data-dcnode-id="1337" instrument_node=""> not only may the period of transition result in a change of the ruling elite (or for Machiavelli, the single ruler), it also provides the agents involved with an unusual degree of discretion in making these choices.</span></p><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">The literature on regime transition prior to the recent wave of democratizations that began in the mid-1970s was scarce, but it conveyed a simple message. There were two possible modes of transition, conveniently exemplified by Great Britain and France respectively. In the former, RED came about over a long period of time through a series of reforms as the result of which the previous monarchic autocracy gradually and incrementally changed its rules to incorporate successive groups of the population that had been denied the full rights of citizenship. This involved a dual process of relatively peaceful mobilizations by those excluded and relatively flexible responses from those already included in the political process. In the latter, RED only came about – again over a lengthy and tumultuous period – as the result of successive revolutions when the previous autocratic regimes refused to respond to or even to recognize the demands for inclusion coming from below and as a result of the accumulated frustration of these demands the excluded groups resorted to collective violence which periodically was successful in deposing the ruling autocracy. The implication of this ambidextrous literature for elites was clear. In reformed transitions, there would be a considerable continuity in their composition; in revolutionary ones, the previous elites would be deposed – killed, imprisoned or driven into exile – and a new elite would emerge from the struggle itself. Needless to say, in practice, the contrast between the two was not so dramatic – but still significant. In the former, elites circulated; in the latter, they jumped.</span></p><p data-dcnode-id="1311"><span data-dcnode-id="1333" instrument_node="">Since the mid-1970s (at least until the “Arab Spring” of 2008), most of the attempted transitions did not conform to either of the two historical alternatives ([</span><a aria-label="Reference 11" data-dcnode-id="1331" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d188043821e354" title="Huntington, S.P. 1991. The third wave. Democratization in the late twentieth century. Norman: University of Oklahoma Press."><span data-dcnode-id="1332" instrument_node="">11</span></a><span data-dcnode-id="1330" instrument_node="">, </span><a aria-label="Reference 18" data-dcnode-id="1328" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d188043821e357" title="O'Donnell, G., P.C. Schmitter, and L. Whitehead, eds. 1986. Transitions from authoritarian rule: Prospects for democracy. Baltimore/London: The Johns Hopkins University Press."><span data-dcnode-id="1329" instrument_node="">18</span></a><span data-dcnode-id="1327" instrument_node="">], pp. 85–108; [</span><a aria-label="Reference 12" data-dcnode-id="1325" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d188043821e360" title="Linz, J.J., and A. Stepan. 1996. Problems of democratic transition and consolidation Southern Europe, South America and post-communist Europe. Baltimore: Johns Hopkins University Press."><span data-dcnode-id="1326" instrument_node="">12</span></a><span data-dcnode-id="1324" instrument_node="">]). Revolutions became rarer (and did not result in a regime resembling a RED such as Iran) or illusory (when the accompanying violence was confined and did not produce an irreversible change in the entire composition of elites such as Romania). Reformist transitions faded in significance due either to the effective resistance of entrenched elites or their improved capacity for co-opting the forces of opposition. What emerged were two other types: the </span><i data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">pacted transition</span></i><span data-dcnode-id="1321" instrument_node=""> and the </span><i data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">imposed transition</span></i><span data-dcnode-id="1318" instrument_node=""> [</span><a aria-label="Reference 27" data-dcnode-id="1316" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d188043821e370" title="Schmitter, P. C. &amp; Karl, T. L. (1991a) What Democracy is...and Is Not. Journal of Democracy, vol. 2, issue 3, pp. 75–88."><span data-dcnode-id="1317" instrument_node="">27</span></a><span data-dcnode-id="1315" instrument_node="">, </span><a aria-label="Reference 28" data-dcnode-id="1313" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d188043821e373" title="Schmitter, P.C., and T.L. Karl. 1991b. Modes of transition in Latin America, Southern and Eastern Europe. International Social Science Journal 128: 269–284."><span data-dcnode-id="1314" instrument_node="">28</span></a><span data-dcnode-id="1312" instrument_node="">]. Neither was completely novel. The former had characterized the transition to democracy in Venezuela after 1958; the latter could be said to have been the case in West Germany and Japan even if the imposing power was exogenous and took the form of military occupation by a victorious democracy.</span></p></div></div></section><section data-dcnode-id="1269" data-gtm-vis-first-on-screen-50443292_562="579" data-gtm-vis-first-on-screen-50443292_563="578" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="579" data-gtm-vis-recent-on-screen-50443292_563="578" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="The Change in Modes"><div class="c-article-section" data-dcnode-id="1270" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1306" id="Sec3"><span data-dcnode-id="1307" instrument_node="">The Change in Modes</span></h2><div class="c-article-section__content" data-dcnode-id="1271" id="Sec3-content"><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">The common distinguishing feature of these more recent transitions is that they come from above – in contrast to the two “classic” modes which were driven from below by excluded, non-elite actors. Both imposed and pacted cases are initiated, monitored and controlled (to differing degrees) by pre-existing elites – either in the government or jointly with the opposition.</span></p><p data-dcnode-id="1293"><span data-dcnode-id="1303" instrument_node="">In the case of imposed transitions, the process usually starts from an internal division within the ruling class or caste in which the “soft-line” faction becomes dominant and chooses to initiate changes in the rules by liberalizing public policies – for example, by tolerating greater press freedom or diminishing arbitrary imprisonment – and by introducing some democratic procedures – for example, by convoking elections with limited participation and candidates or allowing the formation of civil society organizations [</span><a aria-label="Reference 29" data-dcnode-id="1301" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d188043821e387" title="Schneider, C.Q., and P.C. Schmitter. 2004. Liberalization, transition and consolidation. Measuring the components of democratization. Democratization 11 (5): 59–90."><span data-dcnode-id="1302" instrument_node="">29</span></a><span data-dcnode-id="1300" instrument_node="">]. The objective is usually some sort of hybrid regime that has many of the surface manifestations of an RED, but not the accountability to citizens that lies at its core. Its minimal version has been baptized a </span><i data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">dictablanda;</span></i><span data-dcnode-id="1297" instrument_node=""> its more extensive one, a </span><i data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">democradura</span></i><span data-dcnode-id="1294" instrument_node="">. Such a limited change in regime will be successful under two conditions: (1) the soft-liners remain capable of containing or marginalizing their hard-line opponents; (2) the opponents to the regime are unsuccessful either in mobilizing their own supporters or outsiders in civil society.</span></p><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Many of the post-1974 transitions fall into this category. In Latin America, Brazil was the most notable example. The military dictatorships of Bolivia, Ecuador, and Peru shared many of its characteristics, although all experienced much more significant mobilization and violence from below making them decidedly mixed cases. In Asia, Taiwan and later Indonesia had predominantly top-down transitions. But it was the post-1989 cases of transition from Soviet-style autocracies, e.g. Albania, Belorussia, Bulgaria, Croatia, Romania, Russia, Slovakia, Slovenia, Ukraine, the Baltic republics, where this mode was most prevalent. The leading actors initiating and attempting to control the change in regime came from within the previous regime, i.e. from a fraction within its ruling party or its security apparatus. Some of these post-communist transitions were quickly aborted when the new rulers simply changed their rhetoric to one of nationalism and democracy while perpetuating autocracy, e. g. Armenia, Azerbaijan, Kirgizstan, Tajikistan, Turkmenistan and Uzbekistan.</span></p><p data-dcnode-id="1283"><span data-dcnode-id="1290" instrument_node="">In the case of pacted transitions, the process again is contingent upon internal elite divisions – this time not only among rulers, but also among their opponents. Whatever the reason (and they are not uniform), the soft-liners within the government and the moderates in the opposition form an alliance by agreeing upon a common set of rules designed to reduce the intrinsic uncertainty of the transition in regime – and to prevent its being captured by either of their more extreme factions. The content of this foundational pact varies according to the specifics of each case – for example, whether the autocracy is military or not – but usually includes at least the following items: a mutual commitment not to resort to violence or to encourage intervention by outsiders, an agreement to share offices and to make (or not make) policies according to some pre-established and usually proportional arrangement, and an amnesty with regard to crimes committed under the previous autocracy [</span><a aria-label="Reference 10" data-dcnode-id="1288" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d188043821e402" title="Higley, J.C., and R. Gunther. 1992. Elites and democratic consolidation in Latin America and Southern Europe. Cambridge: Cambridge University Press."><span data-dcnode-id="1289" instrument_node="">10</span></a><span data-dcnode-id="1287" instrument_node="">, </span><a aria-label="Reference 18" data-dcnode-id="1285" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d188043821e405" title="O'Donnell, G., P.C. Schmitter, and L. Whitehead, eds. 1986. Transitions from authoritarian rule: Prospects for democracy. Baltimore/London: The Johns Hopkins University Press."><span data-dcnode-id="1286" instrument_node="">18</span></a><span data-dcnode-id="1284" instrument_node="">]. For this to happen, it is essential that the elites involved – inside and outside the previous autocracy – are successful in delivering the continued compliance of their members/followers to the restrictions agreed upon.</span></p><p data-dcnode-id="1272"><span data-dcnode-id="1282" instrument_node="">Both of these elite-dominated modes of transition have their potential perverse effects and critical moments. The </span><i data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">imposition of democracy</span></i><span data-dcnode-id="1279" instrument_node=""> depends ultimately on the perception of legitimacy of the ensuing regime by its citizens. The fact that it is intended to protect the status and power of specified components of the </span><i data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">ancien régime</span></i><span data-dcnode-id="1276" instrument_node=""> by selectively inserting non-democratic rules and reservoirs of power renders it vulnerable once the uncertainty of the transition itself has been overcome and actors have settled into the trenches of normal political behavior. Moreover, with the increasingly globalized nature of political discourse, the diffusion of universalistic norms regarding human and civil rights will undermine national level arguments of political exception or cultural difference. At some point in time, imposed democracies will have to reform themselves to conform to more general expectations concerning democracy – and this may prove difficult depending on ensuing changes in the power of those elites protected by such enclaves of autocracy. The </span><i data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">negotiation of democracy</span></i><span data-dcnode-id="1273" instrument_node=""> by pacts is less likely to be challenged eventually on grounds of legitimacy, since compromise among elites is almost as legitimate as majority rule in many conceptions of democratic practice. These cases – usually the most successful in institutionalizing rules for political competition and accountability – risk the opposite. The politicians who draft these rules and consent to them during the transition will soon discover that they are congenial to protecting their tenure in power by discouraging challenges from those outside the initial deal and by encouraging collusion among insiders. They will therefore be tempted to prolong the pact beyond its immediate utility during the transition and convert it into an enduring feature of the ensuing regime. Such an institutionalized oligarchy not only runs the greater risk of corruption and mismanagement due to the absence of ‘free and fair’ competition and reliable mechanisms of accountability, but it should also be less capable of responding to internal transformations and/or to external shocks.</span></p></div></div></section><section data-dcnode-id="1247" data-title="Some Empirical Observations"><div class="c-article-section" data-dcnode-id="1248" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1267" id="Sec4"><span data-dcnode-id="1268" instrument_node="">Some Empirical Observations</span></h2><div class="c-article-section__content" data-dcnode-id="1249" id="Sec4-content"><p data-dcnode-id="1250"><span data-dcnode-id="1266" instrument_node="">As a purely empirical matter, it should be noted that most historical attempts at democratization – regardless of the mode of transition – have been unsuccessful and resulted in a return to some form of autocracy [</span><a aria-label="Reference 1" data-dcnode-id="1264" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d188043821e429" title="
                    BTI Report 2003 et seq., Gütersloh: Bertelsmann Stiftung."><span data-dcnode-id="1265" instrument_node="">1</span></a><span data-dcnode-id="1263" instrument_node="">, </span><a aria-label="Reference 7" data-dcnode-id="1261" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d188043821e432" title="Freedom House. 2003. Nations in Transit 2003: Democratization in East Central Europe and Eurasia. Freedom House. Lanham, MD: Rowman &amp; Littlefield."><span data-dcnode-id="1262" instrument_node="">7</span></a><span data-dcnode-id="1260" instrument_node="">]. Very few polities have made it to democracy the first time they tried. Since 1974, however, when over 70 countries have made such an attempt beginning in Southern Europe and Latin America and extending to Eastern Europe, Asia and Sub-Saharan Africa, very few have reverted overtly to autocracy&nbsp;[</span><a aria-label="Reference 20" data-dcnode-id="1258" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d188043821e435" title="Pridham, Geoffrey, ed. 1991. Encouraging democracy: The international context of regime transition in Southern Europe. Leicester: Leicester University Press."><span data-dcnode-id="1259" instrument_node="">20</span></a><span data-dcnode-id="1257" instrument_node="">]. And several of those that did (usually by military coup) subsequently returned to some form of democracy – however imperfect. Guinee-Bissau, Nepal, Bangladesh, Georgia, Philippines, Honduras, Niger, Nigeria, Mali, Slovakia, Croatia, Serbia, and Ukraine would seem to be cases-in-point. Many more have made it to some form of RED. This has especially been the case in Latin America where from being virtually completely autocratic at the end of the 1960s (with the lonely exceptions of Costa Rica and Colombia), the entire continent (except for Cuba) now relies on political elites chosen by reasonably honest, competitive elections for their top executives. Asia has experienced several successful regime transitions with significant (and peaceful) changes in ruling elites since the 1970s: South Korea, Taiwan and, so far, the Philippines, Sri Lanka and Indonesia. Malaysia and Singapore have yet to cross this critical threshold. Elsewhere, the outcome remains uncertain – presumably, because entrenched oligarchies have been reluctant to give up or even to share power: e.g. Bangladesh, Pakistan, Myanmar, and Cambodia. And, of course, the region has some of the most obvious out-right autocracies in North Korea, China, Laos and Vietnam. The African picture is one of proportionately fewer attempts at democratization and less success; hence, of greater elite continuity. But even there some transitions have produced consensual turnovers in ruling elites: e.g. Senegal, Ghana, Kenya and, most recently, Nigeria. Many of the others have managed to create some kind of hybrid regime, e.g. Angola, Ethiopia, Cameroon, Togo, Ruanda, Burundi, Ivory Coast, Guinea and Sudan, with frequent elections, predictable results and entrenched ruling elites. Two (South Sudan and Somalia) simply remain “unconsolidated” without having produced any predictable set of rules, rulers or even state structures. The recent experiences in the region of the Middle East and North Africa (MENA) where the modes of transition were more violent and mass-driven seem to have inverted this generally favorable trend. Either these attempts reverted to autocracy very soon, </span><i data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">vide</span></i><span data-dcnode-id="1254" instrument_node=""> Egypt, or they degenerated into protracted civil war and unconsolidated autocracy, </span><i data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">vide</span></i><span data-dcnode-id="1251" instrument_node=""> Syria and Yemen. Only in Tunisia, which followed the reform path more than the revolutionary one (and which was later supplemented by some pacting) has the outcome been a fledgling RED.</span></p></div></div></section><section data-dcnode-id="1188" data-title="Some Speculative Hypotheses"><div class="c-article-section" data-dcnode-id="1189" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1245" id="Sec5"><span data-dcnode-id="1246" instrument_node="">Some Speculative Hypotheses</span></h2><div class="c-article-section__content" data-dcnode-id="1190" id="Sec5-content"><p data-dcnode-id="1231"><span data-dcnode-id="1244" instrument_node="">One intriguing hypothesis is that this change in the odds of success trends is due to ensuing changes in the identity and composition of political elites. First and foremost, this may reflect developments in their respective military elites since their response is almost always crucial to the outcome of whatever strategy is adopted [</span><a aria-label="Reference 9" data-dcnode-id="1242" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d188043821e452" title="Goodman, L., J.S.R. Mendelson, and J. Rial, eds. 1990. The military and democracy. Lexington, MA: Lexington Books."><span data-dcnode-id="1243" instrument_node="">9</span></a><span data-dcnode-id="1241" instrument_node="">, </span><a aria-label="Reference 19" data-dcnode-id="1239" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d188043821e455" title="Peceny, M. 1999. Democracy at the point of bayonets. University Park, PA: Penn State University Press."><span data-dcnode-id="1240" instrument_node="">19</span></a><span data-dcnode-id="1238" instrument_node="">, </span><a aria-label="Reference 24" data-dcnode-id="1236" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d188043821e458" title="Schmitter, P.C. 1985. Potere Militare e Teoria Democratica. In Il potere militare nelle società contemporanee, ed. G. Pasquino and F. Zannino, 203–222. Il Mulino: Bologna."><span data-dcnode-id="1237" instrument_node="">24</span></a><span data-dcnode-id="1235" instrument_node="">]. Not only have the military become more professionalized, but more importantly they can no longer be assured of external support for their intervention, especially since the end of Cold War rivalry between the two super-powers, the United States and the Soviet Union, made their international allegiance much less significant [</span><a aria-label="Reference 3" data-dcnode-id="1233" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d188043821e461" title="Bruneau, T.C., and F.C. Matei. 2008. Towards a new conceptualization of democratization and civil-military relations. Democratization 15 (5): 909–929."><span data-dcnode-id="1234" instrument_node="">3</span></a><span data-dcnode-id="1232" instrument_node="">]. In several cases in both Southern and Eastern Europe, membership in NATO and participation in UN and EU peace-keeping missions seem to have played a significant role in discouraging their intervention in domestic politics. The military as individuals or as institution are no longer as likely to intervene or even to threaten the advent of real-existing democracy as it was only a few decades ago.</span></p><p data-dcnode-id="1223"><span data-dcnode-id="1230" instrument_node="">But even more significant may be the changing role of economic elites [</span><a aria-label="Reference 6" data-dcnode-id="1228" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d188043821e467" title="Etzioni-Halvey, Eva, ed. 1997. Classes and elites in democracy and democratization. London: Routledge."><span data-dcnode-id="1229" instrument_node="">6</span></a><span data-dcnode-id="1227" instrument_node="">]. In the early transitional modes of reform and revolution, the bourgeoisie played a crucial role by preferring the former to the latter and, therefore, by promoting democracy. Subsequently, however, when reform meant the redistribution of their income and wealth and revolution meant their elimination as a class, they more frequently intervened in favor of autocratic rule, sometimes even in collaboration with military or civilian elites in other countries. This was particularly the case in peripheral settings such as Latin America where capitalism was delayed and dependent in its emergence and, hence, more vulnerable to internal disruption and external threat. As capitalism became increasingly globalized and embedded in international and regional organizations, business elites – even in the periphery -- became less and less national in calculating their interests and exercising their power and influence. The nature of domestic regimes became less a source of physical threat and more a resource for profitable return. In this context, liberal, constitutional, representative democracies, i.e., REDs, that guaranteed the protection of property rights and ensured that political conflicts would be channeled through predicable channels of resolution were clearly preferable to autocratic ones – no matter how momentarily advantageous the repressive actions of the latter might be [</span><a aria-label="Reference 21" data-dcnode-id="1225" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d188043821e470" title="Rueschemeyer, D., E.H. Stephens, and J.D. Stephens. 1993. Capitalist development and democracy. Chicago: University of Chicago Press."><span data-dcnode-id="1226" instrument_node="">21</span></a><span data-dcnode-id="1224" instrument_node="">].</span></p><p data-dcnode-id="1206"><span data-dcnode-id="1222" instrument_node="">The most serious elite challenges to contemporary democratization may come not from military or economic elites. They may come from elites representing religious or ethno-linguistic minorities – often concentrated in sub-national political units dominated by majorities ruling at the national level [</span><a aria-label="Reference 15" data-dcnode-id="1220" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d188043821e476" title="Mansfield, E.D., and J. Snyder. 2007. Electing to fight: Why emerging democracies go to war. Cambridge, MA: MIT Press."><span data-dcnode-id="1221" instrument_node="">15</span></a><span data-dcnode-id="1219" instrument_node="">, </span><a aria-label="Reference 31" data-dcnode-id="1217" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d188043821e479" title="Wimmer, A., et al. 2004. Facing ethnic conflict: Towards a new realism. Oxford: Rowman &amp; Littlefield."><span data-dcnode-id="1218" instrument_node="">31</span></a><span data-dcnode-id="1216" instrument_node="">]. One of the most notorious weaknesses of democratic theory has always been that it has no explanation for the existence of the unit within which it is practiced: the (allegedly) sovereign and (allegedly) national state [</span><a aria-label="Reference 22" data-dcnode-id="1214" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d188043821e482" title="Rustow, D. 1970. Rustow. Dankwart (1970): Transitions to democracy: toward a dynamic model. Comparative Politics 2: 337–363."><span data-dcnode-id="1215" instrument_node="">22</span></a><span data-dcnode-id="1213" instrument_node="">]. And, even worse, there are no legitimate mechanisms for filling this lacuna. Plebiscites are irrelevant since the pre-established conditions of eligibility to participate in them almost invariably determine their outcome. When there exists no consensus among elites representing the interests and passions of groups located within a given territory concerning its boundaries and identity </span><i data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">prior</span></i><span data-dcnode-id="1210" instrument_node=""> to the attempt at democratization, then the only solutions to the choice of unit are conquest or compromise – and the former is rarely compatible with eventual democracy [</span><a aria-label="Reference 12" data-dcnode-id="1208" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d188043821e488" title="Linz, J.J., and A. Stepan. 1996. Problems of democratic transition and consolidation Southern Europe, South America and post-communist Europe. Baltimore: Johns Hopkins University Press."><span data-dcnode-id="1209" instrument_node="">12</span></a><span data-dcnode-id="1207" instrument_node="">]. Reaching a compromise during this period is, however, difficult since, suddenly, numbers count much more than under autocracy and so does location since an embryonic democracy must not only decide on voter eligibility (presumably without restrictions based on class, gender, religion, ethnicity, or wealth), but also must decide on the constituencies within which these votes are tabulated. Elites representing numerical minorities may have reason to feel threatened, especially if the decision rules are strictly majoritarian, but even more so if they are concentrated territorially in sub-units that are under-represented or dispersed across several sub-units where they are permanently minoritarian. At the extreme, elections become “ethnic, linguistic or religious censuses” that are destined to produce contested results, not infrequently, accompanied by violence.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1204" id="Sec6"><span data-dcnode-id="1205" instrument_node="">Rotation in Power</span></h3><p data-dcnode-id="1196"><span data-dcnode-id="1203" instrument_node="">The recent attempts at transition to democracy have not only been more successful, they have also been more eventful for the elites that participated in them. The previously successful cases of regime transformation in the Twentieth Century – most of them after or around World War I and World War II – resulted in a winning party or coalition that remained consistently in power for eight to twelve years, e.g. Norway, Finland, Ireland, Sri Lanka, Jamaica, India, as well as the Western and Southern European countries liberated from Nazi occupation. The hegemony of these founding elites was even longer in the cases of the defeated countries: West Germany, Japan and Italy. In the post-1974 transitions the pattern has been dramatically different. Instead of having a protracted electoral advantage rooted in their image as the founders of democracy (or, in some case, of the nation-state itself), the opposite has become the norm. The party winning the founding election is most often defeated in the subsequent one [</span><a aria-label="Reference 14" data-dcnode-id="1201" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d188043821e498" title="Mainwaring, S., and E. Zoco. 2007. Political sequences and the stabilization of interparty competition. Party Politics 13 (2): 155–178."><span data-dcnode-id="1202" instrument_node="">14</span></a><span data-dcnode-id="1200" instrument_node="">, </span><a aria-label="Reference 26" data-dcnode-id="1198" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d188043821e501" title="Schmitter, P.C. 2001. Parties are not what they once were. In Political parties and democracy, ed. L. Diamond and R. Gunther, 67–89. Baltimore: The Johns Hopkins University Press."><span data-dcnode-id="1199" instrument_node="">26</span></a><span data-dcnode-id="1197" instrument_node="">]. Spain became the paradigm case when the initial winner, Adolfo Suarez and his UDC party, lost by a large margin in the second election and never recuperated. The only two cases that come to mind when there was continuity in the initial ruling party were the Czech Republic and Chile. The most astonishing cases occurred in Eastern Europe when the former ruling Communist Party elite re-named and reformed itself and succeeded in winning several of the subsequent elections – despite what seemed to be the thorough public discredit of their previous performance.</span></p><p data-dcnode-id="1191"><span data-dcnode-id="1195" instrument_node="">The reasons for this reversal in the fortune of founding elites are obscure. At the top of the list one should probably put the intervening increase in citizen information and expectations. Not only are today’s newly empowered citizens better informed about the performance of their own institutions and those of other comparable countries, but they also expect more from their newly founded institutions and the elites that run them. When it quickly becomes apparent that democratization as such does not lead to a greater volume or better distribution of benefits, and even that it comes with considerable “start-up costs” and “initial disruption,” they shift their attention (and vote) to some alternative elite – that also turns out to be disappointing. The Spaniards, as forerunners in this process, have coined a term for it: </span><i data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">desencanto.</span></i><span data-dcnode-id="1192" instrument_node=""> What is important to retain, however, is that contrary to past experiences, this disenchantment with what the transformation to democracy has produced does not translate into support for some autocratic replacement for it. Something called “democracy” remains the preferred regime for almost all citizens – “the only game in town” – but its pursuit results in a much accelerated circulation in the elites running it. Revolutions are said “to eat their children;” transitions seem “to wear out their elites.”</span></p></div></div></section><section data-dcnode-id="1118" data-title="Some Tentative Conclusions"><div class="c-article-section" data-dcnode-id="1119" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1186" id="Sec7"><span data-dcnode-id="1187" instrument_node="">Some Tentative Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="1120" id="Sec7-content"><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">1) During the transition from some form of autocracy to some form of ‘real-existing democracy’, the nature of politics and, therefore, the role of political elites is “abnormal,” i.e. intrinsically uncertain and not just risky as in normal times. Given the absence of accepted rules and predictable behaviors during such an interval, actors have unusually greater autonomy in making their decisions, especially with regard to choosing the rules of the game that will determine the nature of the emerging, but not yet established regime.</span></p><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">2) Therefore, political elites have even greater importance than during the usual lengthy periods of “normal” politics within established regimes, whether autocratic or democratic. However, these transitional elites are also more likely to be internally divided in their preference for the emerging rules and, hence, which elite or coalition of elites will eventually dominate and impose its rules is itself uncertain.</span></p><p data-dcnode-id="1171"><span data-dcnode-id="1181" instrument_node="">3) The mode of transition, how the regime transformation is made, has a distinct impact on political elites. The two “classical” modes: peaceful reform and violent revolution come from below and involve a substantial change in the composition of subsequent ruling elites, even a complete substitution in the latter case. The seventy or more attempted transitions since the mid-1970s have more often come from above, either by </span><i data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">pacts</span></i><span data-dcnode-id="1178" instrument_node=""> between factions within the previous autocracy and its opposition or by </span><i data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">imposition</span></i><span data-dcnode-id="1175" instrument_node=""> from a victorious faction within that </span><i data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">ancien régime.</span></i><span data-dcnode-id="1172" instrument_node=""> Under these conditions, there is likely to be a much greater continuity in the composition of political elites.</span></p><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">4) The uncertain dynamics of transition mean that the power resources that determine elite status are also likely to change. In particular, once founding elections are held and freedom of association secured, the sheer numbers and identities of citizens and their location in specific constituencies becomes more significant, not only in determining the outcome of elections or of competition for influence, but even more in influencing the nature and configuration of the very unit within which politics is conducted, i.e. the national-state and its sub-units.</span></p><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">5) For there is no democratic way in which the borders and identity of this unit can be determined. At best, these elements of stateness will have been established prior to the transition, virtually always by non-democratic and controversial means, and elites in and out of power will have adjusted to its existence. However, once the attempt at democratization is initiated, it may become apparent that there is not just one, more or less coherent, political elite emerging from within the previous national unit, but several distinctive elites laying claim to different territories or identities along lines of cleavage relating to ethnicity, language, religion or previous patterns of discrimination. Needless to say, if and when this occurs, the eventual formation of a political class willing to play according to rules of democratic competition becomes much more difficult. Compromise and power-sharing between elites (and them and their followers) is one solution, as is the rarer one of peaceful secession into separate national units. Unfortunately, the more frequent outcome is an effort at conquest by one elite and violent resistance by another – which makes democratization impossible until the armed conflict is resolved.</span></p><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">6) The transition is over when political elites have reached a mutual agreement on the rules concerning their competition for office and influence, and managed to convince their followers or the citizenry as a whole that these rules embody a form of democracy that is appropriate for their society and legitimate for their polity. Needless to say, these rules vary considerably (and serve to create different types of democracy), but they are all rooted in what have become fairly common rules of citizenship without discrimination by gender, race, religion, ethnicity, language or wealth. Age discrimination has persisted, although it has tended to decline from 18 to 16. The most serious unresolved problem concerns the status of legally resident or “un-documented” foreigners, who have reached a considerable proportion of the resident population in many national societies. Most of the transitional democracies after the mid-1970s have tended to be net exporters rather than importers of these “denizens”; hence, they have ignored the issue – except for extending citizenship rights to their own nationals living abroad – which creates a new dimension to their elite structure since many of its members may not longer be subject to national obligations.</span></p><p data-dcnode-id="1157"><span data-dcnode-id="1164" instrument_node="">7) As we have argued, democratization is a dynamic process that can (and usually does) alter the resources available to actors in their competition for elite position and status. In the case of “top-down” transitions, the key initial resource is usually the capacity to deliver the compliance of members and followers during an otherwise highly uncertain period. Once the elementary freedoms intrinsic to the practice of RED - even in the </span><i data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">dictablandas</span></i><span data-dcnode-id="1161" instrument_node=""> imposed by a faction of the previous autocracy or the </span><i data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">democraduras</span></i><span data-dcnode-id="1158" instrument_node=""> negotiated by the regime and part of its opposition - become tolerated practice, the newly empowered citizenry will inevitably test their limits and seek to extend them. The result is often a loss of control from above by founding elites and a mobilization of civil society from below that introduces new elites into the political process. This, combined with the increase in expectations triggered by even the most limited type of transition, may help to explain a ‘peculiar’ feature of recent democratizations, namely, the rapidity and frequency with which turnover in power via elections takes place.</span></p><p data-dcnode-id="1146"><span data-dcnode-id="1156" instrument_node="">8) On a purely probabilistic and historical basis, most attempted transitions to democracy have failed – usually due to the intervention of military elites (admittedly, often with civilian allies). This has become a much less likely occurrence since the mid-1970s. The reluctance or unwillingness of the military elite to intervene goes a long way to explaining why so few overt reversions to autocracy have occurred. This cannot be attributed simply to a decline in their capacity to displace civilian elites. On the contrary, with the greater professionalization of armed forces and the continuous introduction of new and more efficacious weapons almost everywhere, the objective disparity between military and civilian elites to wield violence has increased. Nor does it seem attributable to increased divisions between branches of the armed forces. One factor of substantial importance would seem to be a shift in the international context since the end of the Cold War whereby </span><i data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">golpistas</span></i><span data-dcnode-id="1153" instrument_node=""> know that they not only cannot rely on the same explicit or implicit support of outside powers, but that various international, especially regional, organizations are capable of mobilizing sanctions against such actions [</span><a aria-label="Reference 30" data-dcnode-id="1151" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d188043821e560" title="Whitehead, L., ed. 1996. The international dimensions of democratization: Europe and the Americas. Oxford: Oxford University Press."><span data-dcnode-id="1152" instrument_node="">30</span></a><span data-dcnode-id="1150" instrument_node="">] . This does not mean that the specter of armed intervention has disappeared, </span><i data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">vide</span></i><span data-dcnode-id="1147" instrument_node=""> Thailand, Honduras, Egypt and several African polities, but it no longer haunts the process as much as in the past.</span></p><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">9) The role of economic elites has also shifted. Now that they can no longer rely on the military to “liberate” them from threats generated by democratic competition and now they have lost their strategic significance for outsiders due to the collapse of the (real or imagined) threat of communism, capitalists seem to have discovered that they can live with and even compete effectively within democracy, as long as it remains liberal in its restriction of the role of the state and constitutional in its protection of property rights. Given the imposed or pacted nature of most recent transitions, these conditions seem to be assured from the beginning. Moreover, very few bourgeoisies are any longer strictly national, depending only upon the labor and purchasing power of their fellow citizens. For reasons that seem more fortuitous than causal, the wave of democratizations that began in the 1970s coincided with the raising hegemony of neo-liberal economic ideology and the emergence of a globalized system of market exchanges, especially financial ones. This provided capitalists with additional degrees of freedom, both economic and political. They can secure their capital in a variety of sites outside their own democracy; they can use the threat of out-sourcing abroad to weaken the demands of labor; they can ally themselves with powerful multi-national firms which have direct access to their own and other polities; they can rely on appeals for support from regional and global inter-governmental organizations and arbitration systems. Even when Left-oriented parties come to power, they have proven cautious in wielding their powers of expropriation, redistribution and promotion of the rights of workers and labor unions – in the interest of reducing the risk of capital flight or decline in foreign investment. The “dirty secret” of most neo-democracies is that their economic and social policies have been much less consequential that in the past and expected in the present. In short, liberal or ‘real-existing’ democracy has once again become “the best cover for the bourgeoisie.”</span></p><p data-dcnode-id="1139"><span data-dcnode-id="1143" instrument_node="">10) Another challenge to democracy has come from oligarchy, the tendency for ruling elites to perpetuate themselves in power. The classic scenario is for them to use the resources of incumbency to skew the results of competition in their favor – all the more so, if those resources come from within the state and not just private parties, associations, movements or firms. However, as we have noted above, it has become more and more rare that the party or coalition winning the initial election is capable of winning the second or third one. It would seem either that incumbency resources are scarce in such neo-democracies or that the relevant publics have become less trusting or more demanding or both. The proliferation of constitutionally embedded term limits – usually two consecutive ones – has also contributed to the more frequent rate of turnovers in power. Efforts by incumbents in neo-democracies to falsify voter registration and electoral results have frequently been tried, but have often been frustrated by citizen rebellions, sometimes aided by the growing role of international observers. The second scenario is for those entrenched in office to simply call off elections, dismiss parliaments and unilaterally augment their executive powers, sometimes by declaring a state of national emergency. These so-called </span><i data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">auto-golpes</span></i><span data-dcnode-id="1140" instrument_node=""> by elected civilian rulers have been tried repeatedly, especially in Latin America and Africa, but many of them failed due to mass public reaction at the national level and pressures from international or regional organizations.</span></p><p data-dcnode-id="1134"><span data-dcnode-id="1138" instrument_node="">11) In all regimes, political elites interact with and become dependent upon each other and upon other elites. In Western Europe and, to a lesser extent, North America, the extension and consolidation of democracy was rooted to a considerable extent in the interpenetration of political parties and interest associations&nbsp;[</span><a aria-label="Reference 23" data-dcnode-id="1136" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d188043821e579" title="Schedler, Andreas. 1998. What is democratic consolidation? Journal of Democracy 9 (2): 91–107."><span data-dcnode-id="1137" instrument_node="">23</span></a><span data-dcnode-id="1135" instrument_node="">]. Left-wing parties had their “sister” labor unions and cooperatives; right-wing parties had a somewhat looser relation with business and professional associations, as well as private firms. Thanks to this cooperation between political and civil society, these polities developed a particularly strong infra-structure of organized intermediaries – which proved subsequently resilient in most of them to the challenges of economic depression and international war. Contemporary neo-democracies are characterized by a much deeper separation of these two generic forms of representation and, hence, a weaker role for both of them. Their parties not only have much fewer members or even loyal followers than in the past, but the same is true for most associations representing class, sectoral or professional interests (if membership in them is not obligatory). So-called non-governmental organizations (NGOs) that focus on the advocacy of various causes: gender equality, environmental sustainability, human rights, child welfare and so forth self-consciously describe themselves as not affiliated to any political party and their donors (often foreigners) insist that this divide be respected. The result is a structural weakness within the emerging political elite in what used to be one of the major elements of its strength and resilience.</span></p><p data-dcnode-id="1129"><span data-dcnode-id="1133" instrument_node="">12) But the greatest difference in elite identity and structure between past and present democracies lies in the emergence and spread of “selectorates” that have far outstripped in number and often in influence the “electorates” that have long presumed to exclusively recruit, certify and control the members of the political elite. These “selected leaders” come from a multitude of sources, but they all have in common that they were not elected competitively to fill their positions and are not subjected to being “un-elected” as a constraint on their behavior. By far the most powerful of them inhabit and govern so-called “guardian institutions,” – institutions that have been delegated to perform important governing tasks and deliberately designed to be protected from the vagaries of democratic political competition [</span><a aria-label="Reference 5" data-dcnode-id="1131" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d188043821e585" title="Dahl, R. 1971. Polyarchy. New Haven: Yale University Press."><span data-dcnode-id="1132" instrument_node="">5</span></a><span data-dcnode-id="1130" instrument_node="">]. Historically, the earliest and most significant of these were the armed forces and, especially, their General Staffs. Elected elites might set the general “strategic” guidelines and periodically review their budgets, but for most purposes military elites were expected to select their personnel and make operational decisions “without political interference.” Supreme or constitutional courts are another form of guardianship that has spread rapidly through old and new liberal democracies. But the most rapidly expanding component of guardianship in contemporary democracies has been the proliferation of “independent central banks” and “independent regulatory agencies.” Presumed to be staffed by technocratic experts in their respective fields, they have usurped a wide range of policy areas that were previously within the domain of elected officials, or not politically regulated at all. And they are virtually un-removable – regardless of changes in government or regime. If that were not enough, many of these agencies are closely affiliated with and supported by international and regional organizations that establish many of the rules that they are subsequently charged with enforcing at the national or sub-national level. A second source of “selectorate elites” comes from within civil society. Virtually none of the leaders of its myriad associations, movements and foundations have been elected competitively. Most have selected themselves and, by personal reputation or organizational performance, gained the support of consenting members or financial contributors. Needless to say, this is an elite that is much more likely to be affected by regime transformation; indeed, it is its mobilization that frequently drives the transition process further than originally intended. In other words, their external impact upon the political process may be democratic, but their internal status is not.</span></p><p data-dcnode-id="1121"><span data-dcnode-id="1128" instrument_node="">13) Notwithstanding the previous discussion, democratization is not just a product of political elites. Their initiatives, interventions, defections, compromises, reassurances, agreements and disagreements may be less predictable and more consequential than in times of ‘normal’ politics, but they are all ultimately connected to the actions and reactions of ordinary citizens who are rapidly learning to exploit their greater access to diverse sources of information and to wield their newly acquired civic rights [</span><a aria-label="Reference 8" data-dcnode-id="1126" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d188043821e591" title="Gill, G. 2000. The dynamics of democratization: Elites, civil society and the transition process. New York: St. Martin’s Press."><span data-dcnode-id="1127" instrument_node="">8</span></a><span data-dcnode-id="1125" instrument_node="">]. During the transition, there may emerge some elites driven by purely idealistic or altruistic motives, but most of them tend to respond only when promised some benefit or threatened with some cost – and it is the mobilization of previously sub-ordinate masses that tends to change their respective incentive structures and action repertoires. </span><i data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Virtù</span></i><span data-dcnode-id="1122" instrument_node=""> in the Machiavellian sense involves precisely being able to understand this uncertain and rapidly changing set of rewards and threats, and to act accordingly in order to achieve the desired goal of political order. In his day, this meant a stable ‘princely’ autocracy; today, in more than seventy locations since 1974, this has meant an institutionalized democracy. Not all aspiring democratic leaders are capable of capturing and interpreting the signals sent from below and, needless to say, those who can do not always make ‘virtuous’ decisions. On the front end of the process of democratization, success depends on converting this complex and fleeting set of rewards and threats into rules that political and other elites are willing to respect; on the back end, however, the viability of these compromises among elites will depend on whether citizens regard these institutions as legitimate, i.e. are willing to comply voluntarily with the constraints they place on their political behavior because they regard them as appropriate – materially and normatively.</span></p></div></div></section><span data-dcnode-id="1117" instrument_node="">
