</span><p class="chapter-para" data-dcnode-id="2562"><span data-dcnode-id="2575" instrument_node="">Another flaw of the simplistic theory of transition lies in its over-simplification of how constitutionalism </span><em data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">actually</span></em><span data-dcnode-id="2572" instrument_node=""> works in Western democracies. Under the strong influence of the Washington consensus, a court-centered, rights-based, and depoliticized account of constitutional democracy prevailed during the early stages of the transition.</span><span class="xrefLink" data-dcnode-id="2571" id="jumplink-fn0062"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2568" data-google-interstitial="false" data-open="fn0062" href="javascript:;" reveal-id="fn0062"><sup data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">62</span></sup></a><span data-dcnode-id="2567" instrument_node=""> Accordingly, constitutional courts and other non-political bodies, such as independent agencies, central banks, etc., emerged as the key agents of the constitutional transformation in Central and Eastern Europe. However, as Sheri Berman has argued, the history of democracy in the West shows a different pattern: “The idea that a gradual, liberal path to democracy exists and that it makes sense to discourage countries that do not follow it from democratizing is a chimera based on a misreading or misinterpretation of history. . . . Indeed, the political backstory of most democracies is one of struggle, conflict and even violence.”</span><span class="xrefLink" data-dcnode-id="2566" id="jumplink-fn0063"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2563" data-google-interstitial="false" data-open="fn0063" href="javascript:;" reveal-id="fn0063"><sup data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">63</span></sup></a></p><p class="chapter-para" data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">In other words, the history of democracy in the West clearly reveals the import ance of continuous civic and political struggle for successful democratization. This aspect of democracy building was almost “lost in translation” in the CEE context, where the process of democracy building was often portrayed and perceived as an elitist project based on the assumption that political elites knew exactly how to get from the point A (failed Communism) to point B (idealized Western democracy). As Mungiu-Pippidi notes:</span></p><blockquote data-dcnode-id="2553"><p class="chapter-para" data-dcnode-id="2554"><span data-dcnode-id="2559" instrument_node="">In Western Europe and North America, the historical process of building accountable government and creating a politically neutral and professional service was generally lengthy and time-consuming. Depending on the historical context, various actors, from Swedish aristocrats to British financiers and American intellectuals, put forward assertive demands for professional and accountable government. These demands led to changes in both formal and informal institutions.</span><span class="xrefLink" data-dcnode-id="2558" id="jumplink-fn0064"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2555" data-google-interstitial="false" data-open="fn0064" href="javascript:;" reveal-id="fn0064"><sup data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">64</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">She further argues that the development of good governance institutions was a struggle fought and won primarily by the political opposition, civil society or even enlightened despots. The role of the political dimension of the process of generating democracy and rule of law has been profoundly underplayed by the “new constitutionalism” in Central and Eastern Europe.</span></p><p class="chapter-para" data-dcnode-id="2540"><span data-dcnode-id="2550" instrument_node="">According to Paul Blokker, the “new constitutionalism” represents a species of a more general genus, “legal constitutionalism,” and can be juxtaposed to another type of constitutionalism: “political” or “democratic constitutionalism.”</span><span class="xrefLink" data-dcnode-id="2549" id="jumplink-fn0065"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2546" data-google-interstitial="false" data-open="fn0065" href="javascript:;" reveal-id="fn0065"><sup data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">65</span></sup></a><span data-dcnode-id="2545" instrument_node=""> Applied to the CEE context, legal constitutionalism led to “a one-sided emphasis on formal institutions of the rule of law and the entrenchment of democracy . . .” which, in turn, contributed to “. . . a neglect of substantive, participatory and legitimatory dimensions.”</span><span class="xrefLink" data-dcnode-id="2544" id="jumplink-fn0066"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2541" data-google-interstitial="false" data-open="fn0066" href="javascript:;" reveal-id="fn0066"><sup data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">66</span></sup></a></p><p class="chapter-para" data-dcnode-id="2530"><span data-dcnode-id="2539" instrument_node="">The almost exclusive focus of the new constitutionalism on courts and rights-based democracy is part of a larger worldwide trend towards the judicialization of politics.</span><span class="xrefLink" data-dcnode-id="2538" id="jumplink-fn0067"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2535" data-google-interstitial="false" data-open="fn0067" href="javascript:;" reveal-id="fn0067"><sup data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">67</span></sup></a><span data-dcnode-id="2534" instrument_node=""> Needless to say, the role of courts in democratic society is always problematic. Aggressive judicial activism inevitably raises issues of counter-majoritarian difficulty and the democratic accountability of independent institutions like courts. My concern here, however, is not with the anti-majoritarian dilemma and its obsession with the </span><em data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">gouvernement des juges</span></em><span data-dcnode-id="2531" instrument_node="">. I argue that the very different political context in Central and Eastern Europe requires a different approach to the role of courts in society. The region has a weak, or sometimes non-existent, tradition of protection of human rights, particularly the rights of minorities. Almost the entire region has a strong history of ethnic nationalism aimed at the suppression, rather than accommodation, of ethnic minorities, such as Roma, homosexuals, or Jews. Central and Eastern Europe needs liberal democracy to tame these horrible and violent excesses. Majoritarian rule, therefore, needs the limitations that are imposed in liberal democracy by independent political institutions and constitutionally codified rights and freedoms. I thus share the view of those who see strong constitutional courts as one of the key democratic players in this region.</span></p><p class="chapter-para" data-dcnode-id="2514"><span data-dcnode-id="2529" instrument_node="">The problem, therefore, is not that the courts are too strong, but rather that the new constitutionalism has a subversive effect on a more inclusive, republican version of constitutionalism and, paradoxically, a negative effect on the quality of rule-of-law institutions. As numerous examples show, rule-of-law institutions in Central and Eastern Europe were all too often created from above, without the support of various political groups and civil society associations.</span><span class="xrefLink" data-dcnode-id="2528" id="jumplink-fn0068"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2525" data-google-interstitial="false" data-open="fn0068" href="javascript:;" reveal-id="fn0068"><sup data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">68</span></sup></a><span data-dcnode-id="2524" instrument_node=""> Yet it is precisely this political element, in the form of political demands and pressure for such institutions, that ultimately determines the success or failure of any attempts at good governance building. As Venelin Ganev succinctly points out, “the Rule of Law cannot live by judicial review alone.”</span><span class="xrefLink" data-dcnode-id="2523" id="jumplink-fn0069"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2520" data-google-interstitial="false" data-open="fn0069" href="javascript:;" reveal-id="fn0069"><sup data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">69</span></sup></a><span data-dcnode-id="2519" instrument_node=""> Referring specifically to Central and Eastern Europe, Paul Blokker argues that “participatory dimensions, popular democracy, and civil society promotion, even if certainly not wholly absent from constitutions in the region, seem then to ultimately have an only secondary priority in constitutional hierarchies.”</span><span class="xrefLink" data-dcnode-id="2518" id="jumplink-fn0070"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2515" data-google-interstitial="false" data-open="fn0070" href="javascript:;" reveal-id="fn0070"><sup data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">70</span></sup></a></p><p class="chapter-para" data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">That such a depoliticized approach to rule-of-law building can lead only to formal routines with surprisingly limited effect on society is made abundantly clear by the example of anti-corruption campaigns in Central and Eastern Europe. An excessive focus on rules and legislation disassociated from policy goals and social context has largely contributed to the creation of “formal structures without substance” in the field of combating corruption, structures which look similar to their Western counterparts, but fail to produce the expected results. Slovenia and Hungary invested too many resources in the formal transplantation of various transparency and anticorruption codes without paying sufficient attention to incentive structures likely to render such codes workable.</span></p><p class="chapter-para" data-dcnode-id="2505"><span data-dcnode-id="2511" instrument_node="">In Slovenia, as in many other CEE countries, one can discern a cognitive dissonance between politicians’ symbolic support for anti-corruption strategies and their political support for a real fight against corruption. As Mungiu-Pippidi argues, one of the major reasons why so many anti-corruption initiatives fail is that they are non-political in nature, unlike the corruption they are designed to fight, which is largely political. Instead of creating institutions and legislation that would mimic Western models, these countries should focus on the “institutional triggers” which led to the creation of institutions of this kind in “clean countries.”</span><span class="xrefLink" data-dcnode-id="2510" id="jumplink-fn0071"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2507" data-google-interstitial="false" data-open="fn0071" href="javascript:;" reveal-id="fn0071"><sup data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">71</span></sup></a><span data-dcnode-id="2506" instrument_node=""> Best practices should include not only legislation, but also anti-corruption initiatives which lead to the creation of anti-corruption legislation.</span></p><p class="chapter-para" data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Mungiu-Pippidi also argues that a formalistic approach to anti-corruption campaigns faces severe limitations. It is not surprising that, due to a lack of political support, the largely symbolic work of anti-corruption agencies is not followed by actual work on anti-corruption. She urges these countries to find a mechanism that would solicit the support of the political opposition and civil society for anti-corruption initiatives. At the same time, such campaigns cannot be successful without the cooperation of the government. The current design in Slovenia, as in many other CEE countries, creates a gap between the government and the anticorruption agency. Recently, pressure from civil society has effectively begun to make a mark on anti-corruption efforts, but more concrete results still seem a ways off.</span></p><p class="chapter-para" data-dcnode-id="2486"><span data-dcnode-id="2502" instrument_node="">The Hungarian anti-corruption campaign suffers from similar problems. As Agnes Batori notes, anti-corruption laws fail in Hungary “at least in part because they can be expected to elicit only limited support from the citizens whose behavior they seek to change.”</span><span class="xrefLink" data-dcnode-id="2501" id="jumplink-fn0072"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2498" data-google-interstitial="false" data-open="fn0072" href="javascript:;" reveal-id="fn0072"><sup data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">72</span></sup></a><span data-dcnode-id="2497" instrument_node=""> Hungary therefore presents a clear example of “the paradox . . . [that] although its legislative framework against corruption is rather well-developed, neither perception-based indicators such as CPI nor survey data on citizens’s experiences with various forms of bribery in daily life show any significant improvement in the last decade.”</span><span class="xrefLink" data-dcnode-id="2496" id="jumplink-fn0073"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2493" data-google-interstitial="false" data-open="fn0073" href="javascript:;" reveal-id="fn0073"><sup data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">73</span></sup></a><span data-dcnode-id="2492" instrument_node=""> The best recipe for compliance in anti-corruption campaigns is the normative commitment of citizens to the declared goals of such campaigns. At the moment, 70 percent of respondents in Hungary said that “bribery and corruption are commonplace.”</span><span class="xrefLink" data-dcnode-id="2491" id="jumplink-fn0074"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2488" data-google-interstitial="false" data-open="fn0074" href="javascript:;" reveal-id="fn0074"><sup data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">74</span></sup></a><span data-dcnode-id="2487" instrument_node=""> The government responded with a series of new anti-corruption measures. Without stronger support and participation from Hungarian citizens, such measures are not likely to change the current state of affairs in Hungary.</span></p><p class="chapter-para" data-dcnode-id="2479"><span data-dcnode-id="2485" instrument_node="">Legal constitutionalism, as practiced in Central and Eastern Europe, thus has a built-in paradox: while it tried to build the rule-of-law institutions needed to curb the excesses of the majoritarian will, it simultaneously weakened these institutions by neglecting to elicit broader political support for their actions. Today it is commonly acknowledged that the whole process of accession systematically favored executives over parliaments and civil society.</span><span class="xrefLink" data-dcnode-id="2484" id="jumplink-fn0075"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2481" data-google-interstitial="false" data-open="fn0075" href="javascript:;" reveal-id="fn0075"><sup data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">75</span></sup></a><span data-dcnode-id="2480" instrument_node=""> As I argue in Section 4, this paradox further highlights the limits of legal constitutionalism and the need to complement—not replace—it with political/democratic constitutionalism.</span></p><span data-dcnode-id="2478" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2476" data-legacy-id="s10" id="27243717" scrollto-destination="27243717"><span data-dcnode-id="2477" instrument_node="">3.3. History as context: a historical turn in transitional constitutionalism</span></h3><span data-dcnode-id="2475" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">A third problem inherent in “simplistic” theories of transition is their almost complete neglect of history. And it is a rather fascinating problem. Not only were the repres entations of Western models in these theories inaccurate; they also expose an almost reckless ignorance of the importance of history in understanding the transition. Of the many theoretical objections to these theories, perhaps the most fundamental is that they confuse description with prescription. There was little theoretical argument or empirical evidence to back up the notion that the particular features of simplistic theories of transition were necessary, let alone sufficient, for development, or to support the ahistorical universalist assumption that all countries could or should follow the same road to riches as Western Europe and the US.</span></p><p class="chapter-para" data-dcnode-id="2463"><span data-dcnode-id="2472" instrument_node="">One of the most fascinating aspects of these theories is that they have totally disregarded the importance of one crucial historical difference between Western models and CEE reality: the rule of law in Western Europe pre-dated the development of democracy by many centuries. As Fukuyama notes, Western Europe was quite exceptional in this respect: “the rule of law became embedded in European society even before the advent not just of democracy and accountable government, but of the modern state-building process itself.”</span><span class="xrefLink" data-dcnode-id="2471" id="jumplink-fn0076"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2468" data-google-interstitial="false" data-open="fn0076" href="javascript:;" reveal-id="fn0076"><sup data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">76</span></sup></a><span data-dcnode-id="2467" instrument_node=""> The best example is probably the </span><em data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Rechtsstaat</span></em><span data-dcnode-id="2464" instrument_node=""> in nineteenth-century Prussia, which established constitutional checks on the executive authority well before democracy emerged in Prussia.</span></p><p class="chapter-para" data-dcnode-id="2446"><span data-dcnode-id="2462" instrument_node="">Such a tradition was almost completely absent in the CEE countries, with the exception of Poland and the Austro-Hungarian provinces, which enjoyed limited but nonetheless important exposure to the rule of law as it existed in the Polish-Lithuanian Commonwealth and the Habsburg Monarchy.</span><span class="xrefLink" data-dcnode-id="2461" id="jumplink-fn0077"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2458" data-google-interstitial="false" data-open="fn0077" href="javascript:;" reveal-id="fn0077"><sup data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">77</span></sup></a><span data-dcnode-id="2457" instrument_node=""> However, as Ivan Berend argues, these countries never fully modernized their legal and political institutions and remained on the periphery of the advanced Western world: “Both the states and the governments were traditionally autocratic and remained authoritarian, with an autocratic interpretation and practice of law and civil rights.”</span><span class="xrefLink" data-dcnode-id="2456" id="jumplink-fn0078"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2453" data-google-interstitial="false" data-open="fn0078" href="javascript:;" reveal-id="fn0078"><sup data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">78</span></sup></a><span data-dcnode-id="2452" instrument_node=""> Furthermore, in the 1930s, most of these countries turned into “anti-liberal” dictatorships.</span><span class="xrefLink" data-dcnode-id="2451" id="jumplink-fn0079"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2448" data-google-interstitial="false" data-open="fn0079" href="javascript:;" reveal-id="fn0079"><sup data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">79</span></sup></a><span data-dcnode-id="2447" instrument_node=""> After World War II, Communist rule in these countries almost completely destroyed the last remains of the rule of law tradition and substituted it with the “socialist” concept of legality, which was antithetical to the core elements of the rule of law. Not surprisingly, today only very old people in these countries still remember the pre-Communist rule-of-law tradition. CEE countries therefore had to create, basically from scratch, new legal rules and institutions.</span></p><p class="chapter-para" data-dcnode-id="2426"><span data-dcnode-id="2445" instrument_node="">Thus when the transition started, there were very few vestiges of a rule of law tradition in the CEE countries; several key conditions for a robust, “polyarchic” democracy, such as free media, the rule of law and a vibrant civil society, did not exist in most CEE countries prior to 1989. It is therefore quite astonishing that the rule of law ideology of the time (the Washington Consensus) often paid no attention to such structural differences between Western democracies and CEE countries and opted for a largely ahistorical approach to building constitutional democracy. This aspect of transitional constitutionalism is brilliantly problematized by Grażyna Skapska in her contrast between “institutional optimism” on the one hand, which was largely based on an ahistorical understanding of the rule of law, and “sociological realism” on the other, which exposed many fundamental weaknesses of the post-Communist governments and their lack of resources for the efficient implementation of law and protection of the rule of law.</span><span class="xrefLink" data-dcnode-id="2444" id="jumplink-fn0080"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2441" data-google-interstitial="false" data-open="fn0080" href="javascript:;" reveal-id="fn0080"><sup data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">80</span></sup></a><span data-dcnode-id="2440" instrument_node=""> Using the case of the privatization of state-owned property in the CEE countries, Skapska shows how a neglect of such contextual features led, rather than to a wide distribution of property rights and a smooth transition to capitalism, to corruption, nepotism, and clientelism as key mechanisms of privatization.</span><span class="xrefLink" data-dcnode-id="2439" id="jumplink-fn0081"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2436" data-google-interstitial="false" data-open="fn0081" href="javascript:;" reveal-id="fn0081"><sup data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">81</span></sup></a><span data-dcnode-id="2435" instrument_node=""> The Russian example of “</span><em data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">prikhvatizatsiya</span></em><span data-dcnode-id="2432" instrument_node="">”</span><span class="xrefLink" data-dcnode-id="2431" id="jumplink-fn0082"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2428" data-google-interstitial="false" data-open="fn0082" href="javascript:;" reveal-id="fn0082"><sup data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">82</span></sup></a><span data-dcnode-id="2427" instrument_node=""> which led to the creation of a group of oligarchs who controlled vast sectors of Russian economy, is only the most extreme manifestation of this problem.</span></p><p class="chapter-para" data-dcnode-id="2419"><span data-dcnode-id="2425" instrument_node="">At the same time, the argument about the importance of historical differences should not be understood as yet another argument for “sequentialism,” that is, that CEE countries need a strong state and the rule of law first, and democracy second. As clearly stated in Section 1 above, the arguments presented in this article reject such a view and favor simultaneous processes of democratization and the development of the rule of law. In this context, the notion of a more historically oriented approach to institution building has a completely different meaning. The historical turn in transitional constitutionalism should not be understood as a search to identify a “deep past,” as this could lead to historical determinism. Paradoxically, the more we search for the historical origins of legal institutions, the more we come to realize the path-dependent and context specific nature of these institutions:</span><span class="xrefLink" data-dcnode-id="2424" id="jumplink-fn0083"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2421" data-google-interstitial="false" data-open="fn0083" href="javascript:;" reveal-id="fn0083"><sup data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">83</span></sup></a><span data-dcnode-id="2420" instrument_node=""> the relationship between institutions and development changes over time. What might be good for one country in a certain period is not necessarily good for another country facing different circumstances. This insight was completely neglected during the transition process; if nothing else, it could have helped CEE elites avoid the mistakes of their early nineteenth-century predecessors, who, like them, attempted to emulate Western institutions and ended up with shell institutions that had little impact on their respective societies.</span></p><p class="chapter-para" data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Fukuyama notes that this historical excursus into the origins of the rule of law has important implications for the promotion of rule of law:</span></p><blockquote data-dcnode-id="2410"><p class="chapter-para" data-dcnode-id="2411"><span data-dcnode-id="2416" instrument_node="">In purely technical terms, legal systems are among the most difficult and costly governmental systems to construct because they have huge infrastructure needs and require both human and physical capital. Historical experience with law suggest that more targeted programs may set important precedents that will eventually bear fruit as the society develops the capacity to spread them more broadly. There may be lower-cost alternatives based on customary or hybrid rules that will work better in the meantime.</span><span class="xrefLink" data-dcnode-id="2415" id="jumplink-fn0084"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2412" data-google-interstitial="false" data-open="fn0084" href="javascript:;" reveal-id="fn0084"><sup data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">84</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">And it is no surprise that Fukuyama concludes his observation on transitions to the rule of law with a call for humility among rule-of-law promoters:</span></p><blockquote data-dcnode-id="2401"><p class="chapter-para" data-dcnode-id="2402"><span data-dcnode-id="2407" instrument_node="">We should admit to ourselves that we have very little historical experience in successfully constructing a rule of law in societies where this pattern is reversed and where a strong state precedes law.</span><span class="xrefLink" data-dcnode-id="2406" id="jumplink-fn0085"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2403" data-google-interstitial="false" data-open="fn0085" href="javascript:;" reveal-id="fn0085"><sup data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">85</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">The first two decades of the transition clearly show that establishing “electoral democracy” is easier than creating constitutional democracy based on the rule of law. Organizing free and democratic elections, though a formidable task, is much less demanding than building an independent judiciary or civil service. It should therefore not be surprising that most CEE countries did well as far as “electoral democracy” is concerned: today, elections in the region are free and fair, and quite frequently lead to turnovers of power. Rule-of-law institutions are a different story. As I argue in this article, these institutions are often weak or underdeveloped, and thus fail to fulfill their essential function, i.e., to limit the abuse of uncontrolled state power. In order to improve rule-of-law institutions, we must not start from some idealized “best model,” but from the existing context in which these institutions function. In the next section, I will discuss possible solutions to the current crisis.</span></p><span data-dcnode-id="2398" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="2396" data-legacy-id="s11" id="27243728" scrollto-destination="27243728"><span data-dcnode-id="2397" instrument_node="">4. Ways out of the crisis</span></h2><span data-dcnode-id="2395" instrument_node="">
</span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2393" data-legacy-id="s12" id="27243729" scrollto-destination="27243729"><span data-dcnode-id="2394" instrument_node="">4.1. From a one-size-fits-all approach to democratic experimentalism</span></h3><span data-dcnode-id="2392" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2373"><span data-dcnode-id="2391" instrument_node="">In trying to get the law right, legal reformers in Central and Eastern Europe too often overlooked “that the life of the law, even in the well-appointed homes of the exporters of the rule of law, lies outside official institutions as much as, arguably more than, it does within them.”</span><span class="xrefLink" data-dcnode-id="2390" id="jumplink-fn0086"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2387" data-google-interstitial="false" data-open="fn0086" href="javascript:;" reveal-id="fn0086"><sup data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">86</span></sup></a><span data-dcnode-id="2386" instrument_node=""> The promotion of the rule of law in Central and Eastern Europe should therefore adopt a new strategy: reforms in the region should now turn to previously marginalized “exceptionalist” versions of transitional constitutionalism. According to Sadurski, in response to the fact that the conditions for the first-best solutions are missing,</span><span class="xrefLink" data-dcnode-id="2385" id="jumplink-fn0087"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2382" data-google-interstitial="false" data-open="fn0087" href="javascript:;" reveal-id="fn0087"><sup data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">87</span></sup></a><em data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">exceptionalist constitutionalism</span></em><span data-dcnode-id="2379" instrument_node=""> argues for the adoption of second-best institutions.</span><span class="xrefLink" data-dcnode-id="2378" id="jumplink-fn0088"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2375" data-google-interstitial="false" data-open="fn0088" href="javascript:;" reveal-id="fn0088"><sup data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">88</span></sup></a><span data-dcnode-id="2374" instrument_node=""> As mentioned above, such alternative institutional configurations do not represent a full-fledged alternative to liberal democracy. They merely show that (a) institutions of liberal democracy can assume many forms and (b) there are a number of different ways to construct these institutions.</span></p><p class="chapter-para" data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">One of the most flawed views of the Washington consensus was that a single set of most appropriate institutions—the rule of law being one of them—is required for successful development. Such a “one-size-fits-all” model prevailed in the transition thinking of the last two decades. As noted above, this model confused description with prescription. The real life of institutions such as parliamentary democracy, corporate governance, civil service, or judicial review shows that they can assume many different forms. Only when discussed in highly abstract terms do these institutions appear to be uniform, core institutional structures (“independent judiciary,” “accountable government,” etc.) which every democracy based on the rule of law must contain. With further qualification and specification, it becomes clear that these institutional structures can assume a number of forms.</span></p><p class="chapter-para" data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">The “one-size-fits-all” model of appropriate legal and political institutions therefore has to be replaced with a plurality of different models, each suitable for a particular country or group of countries. Instead of being told to transplant legal elements from rich industrial economies, the CEE countries should be encouraged to experiment with various forms of institutional configurations in order to find out which are most likely to advance and promote their own development.</span></p><p class="chapter-para" data-dcnode-id="2359"><span data-dcnode-id="2368" instrument_node="">Today’s wealthy countries acquired most of the institutions that, according to the dominant view, are a prerequisite of economic development, after and not before they had developed economically. Such institutions were in many ways a result rather than the cause of their economic development. Mungiu-Pippidi arrives at nearly the same conclusion: “The explanation for the performance of historical achievers is not to be found in their present organization (legislation, political institutions), which should not be viewed as a cause, since it acts for the maintenance, rather than the creation, of good governance.”</span><span class="xrefLink" data-dcnode-id="2367" id="jumplink-fn0089"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2364" data-google-interstitial="false" data-open="fn0089" href="javascript:;" reveal-id="fn0089"><sup data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">89</span></sup></a><span data-dcnode-id="2363" instrument_node=""> This is particularly important for the CEE countries, which </span><em data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">should avoid institutional fetishism</span></em><span data-dcnode-id="2360" instrument_node=""> as promoted by the advocates of the Washington consensus. These countries should invest more in economic policies likely to promote economic development and approach institution building more pragmatically than they have in the previous two decades.</span></p><p class="chapter-para" data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">New institutions in Central and Eastern Europe could ultimately resemble their Western models. But it is more important that they actually work well for these countries, even if they look different from their Western counterparts.</span></p><span data-dcnode-id="2356" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2354" data-legacy-id="s13" id="27243735" scrollto-destination="27243735"><span data-dcnode-id="2355" instrument_node="">4.2 Building political support for liberal democracy</span></h3><span data-dcnode-id="2353" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">One of the key problems of transitional constitutionalism in Central and Eastern Europe has been relatively weak support for rule-of-law institutions from citizens of the new democracies. Without appropriate “owners,” new institutions are of little use. For example, the privatization experience in Central and Eastern Europe shows that clearly protected constitutional rights could not perform their function since there were few owners of this new property who could use these rights. A new approach to institution building must create institutions that are products of homegrown democratic engineering and as such more likely to avoid becoming empty façades. To take another example, anti-corruption strategies are doomed to fail unless they are based on a broad political consensus in all segments of society. One important lesson of the first two decades of the transition is that changes in constitutional rules and political institutions alone are insufficient and more democracy and broader political support for legal and political institutions are also needed. A crucial task currently facing CEE democracies is therefore the formulation of policies and strategies that could help sustain the more thorough democratization of these societies.</span></p><p class="chapter-para" data-dcnode-id="2344"><span data-dcnode-id="2350" instrument_node="">Citizens in Central and Eastern Europe have a low degree of trust in politics in general and in political parties in particular, and these countries need to invest more time and energy in reversing this trend. As the Slovenian and Hungarian cases reveal, establishing new, non-corrupt parties that can promote non-corrupt candidates seems to be a promising strategy. At present, voters in these two countries can choose among more-or-less corrupt party candidates. Only new democratic parties would offer a realistic chance of political change in the direction of greater democracy. In modern liberal democracies, it is the political parties that connect governance to the people. It is therefore essential to reestablish political trust in political parties and politicians. Needless to say, these new parties could hope to elicit broader support only by offering new candidates, untainted by and independent of existing ruling elites.</span><span class="xrefLink" data-dcnode-id="2349" id="jumplink-fn0090"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2346" data-google-interstitial="false" data-open="fn0090" href="javascript:;" reveal-id="fn0090"><sup data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">90</span></sup></a><span data-dcnode-id="2345" instrument_node=""> The democratization of political life is probably the single most important objective to be achieved if CEE countries wish to consolidate their democracies. This democratization of political life would provide a departure from the existing practice of elite-driven democracy building processes. Such a change would also create many new possibilities for democratic constitution making, which was largely sidelined in the past two decades of the transition. New citizens’ initiatives, programs, and policies would become institutionalized, thus opening up new channels for democratic policy making in these societies.</span></p><p class="chapter-para" data-dcnode-id="2337"><span data-dcnode-id="2343" instrument_node="">But it is not only political parties that require democratization and new personnel. Modern liberal democracies are heavily dependent upon capable and professional public sectors for both the creation and implementation of public policies. The anti-statist bias of the early stages of the transition almost totally neglected the importance of efficient public sectors for the sound functioning of democracy. As numerous examples from Slovenia and Hungary show, the credibility and quality of judges, civil servants and other employees of various state agencies is crucial for the proper design of liberal democracy. Estonia presents an interesting case. It practically replaced all judges who had served under Communism. As Mungiu-Pippidi reports, by 1994, the judicial body had undergone a 67-percent renewal.</span><span class="xrefLink" data-dcnode-id="2342" id="jumplink-fn0091"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2339" data-google-interstitial="false" data-open="fn0091" href="javascript:;" reveal-id="fn0091"><sup data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">91</span></sup></a><span data-dcnode-id="2338" instrument_node=""> The judiciary was evaluated and purged. The fast and deep democratization produced by these purges was essential for the subsequent successful development of an independent judiciary in Estonia. However, a word of caution is in order: what was possible in the immediate aftermath of 1989 might not be possible today. More than twenty years after the fall of Communism, such radical purges might not enjoy a broad political support. Alternative strategies should therefore be used, including pre-tenure trial periods for judges. Slovenia, for example, made a big mistake when it almost unconditionally granted tenure to all judges serving in 1991. In retrospect, unconditional tenure weakened, not strengthened, the independence of the judiciary in Slovenia. Since many CEE countries are small economies, they might not have an unlimited reservoir of new cadres at their disposal. The example of the Baltic public sector reform shows that investing in the adequate education and training of civil servants turned out be a very good policy. As a result, these countries now have the most independent civil service personnel in the region.</span></p><p class="chapter-para" data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">That the choice of the people who hold power may matter more than the rules governing the work of institutions is made abundantly clear by several examples from Central and Eastern Europe. This is not to say that rules are unimportant; but it is only to emphasize that in the current context they often have only a secondary importance. CEE countries should therefore invest more time in educating and selecting the right candidates for various governmental posts instead of constantly changing the legislation governing their work. The best way to guarantee independent judges, professional civil servants, and vigorous ombudsmen is by providing the potential holders of these posts with the best possible liberal education and training, and by adopting strict selection criteria that give jobs only to the best candidates. In other words, there is an enormous demand for meritocracy, especially after two decades of a policy of party favoritism that saw jobs go to the members or friends of the political parties in power. Modernized and credible public sectors would thus represent a key precondition for the effective implementation of the new ideas and policies of newly created political parties.</span></p><p class="chapter-para" data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">And last but not least, it is citizens who are essential to boosting the process of democratization, as representatives of civil society who support, and are involved in, various political initiatives, groups, and activities, the scope of which extends beyond political parties and parliamentary elections to encompass a number of other bottom-up associations and groups. As political parties and other public institutions gain greater trust and popularity, it is to be expected that citizens, in various forms of civil society, will reclaim the public political space, thereby providing a new impetus to the democratization process. Ultimately, support for democracy depends on citizens. It is only citizens who can create and sustain democracy in life.</span></p><span data-dcnode-id="2332" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="2330" data-legacy-id="s14" id="27243741" scrollto-destination="27243741"><span data-dcnode-id="2331" instrument_node="">5. Conclusion</span></h2><span data-dcnode-id="2329" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Just ten years after their triumphant “return to Europe” in 2004, CEE countries are facing a very serious crisis of constitutional democracy. The crisis of constitutional democracy in Central and Eastern Europe, which coincides with the Eurozone crisis, has a specific origin. As I have tried to show in this article, rule-of-law institutions in these countries are less robust than in Western countries. In other words, Western democracies can cope more successfully with various attacks on their liberal institutions because their courts, media, human rights organizations, and ombudsmen have a longer and better-developed tradition of independence and professionalism. Conversely, where such institutions are weak and underdeveloped, as is the case in Central and Eastern Europe, there is always the potential danger of a drift towards authoritarianism and “illiberal democracy.” As the examples of Hungary and Slovenia show, even the most advanced CEE democracies are not immune to backsliding. In a relatively short period of time, both countries regressed from consolidated democracies into two distinct forms of semi-authoritarian and diminished democratic regimes. Particular worrying is the ease with which this regression occurred.</span></p><p class="chapter-para" data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">Many liberal institutions created during the enlargement process need further reforms. During enlargement of the EU, the speed and the conditionality of reforms left little room for the involvement of various groups and forms of civil society. Now that these states are full members of the EU, they should have more time for their own, domestically driven, reforms. It is time for real democratic deliberation and experimentation, which could usher in much needed institutional reforms in the region. Only a climate marked by strong political consensus and a broader involvement of civil society can help bring about the much-needed reform of liberal democracies in the region.</span></p><p class="chapter-para" data-dcnode-id="2315"><span data-dcnode-id="2324" instrument_node="">In his book </span><em data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">Dark Continent</span></em><span data-dcnode-id="2321" instrument_node="">, Mark Mazower shows that liberal democracy was not universally accepted as the normal and natural form of government in twentieth century Europe.</span><span class="xrefLink" data-dcnode-id="2320" id="jumplink-fn0092"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2317" data-google-interstitial="false" data-open="fn0092" href="javascript:;" reveal-id="fn0092"><sup data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">92</span></sup></a><span data-dcnode-id="2316" instrument_node=""> He explains that fascism and Nazism were not simply aberrant deviations in the otherwise steady growth of democracy in Europe, but deeply rooted and accepted ideologies which were able to compete with liberalism and socialism for political dominance in the European political landscape of the time. The rise of authoritar ianism in Central and Eastern Europe is reminiscent of the dramatic events of Europe’s most nightmarish century. Even if it is true that CEE democracies are not about to collapse, and even if the existence of the EU makes the danger of rising authoritarianism less dramatic, there are still reasons to be worried about authoritarian leaders’ attack on liberal democracy. It is essential to liberal democracy that constitutional liberalism enjoys the same prestige and importance as “electoral democracy.” Only when both elements of liberal democracy are working in unison can we speak of mature and consolidated liberal democracies.</span></p><div class="footnote" content-id="fn0001" data-dcnode-id="2298"><span class="fn" data-dcnode-id="2299"><span class="label fn-label" data-dcnode-id="2312"><span class="end-note-link" data-dcnode-id="2313" data-fn-id="fn0001" rel="nofollow"><span data-dcnode-id="2314" instrument_node="">1</span></span></span><div class="footnote-content" data-dcnode-id="2300"><p class="footnote-compatibility" data-dcnode-id="2301"><span data-dcnode-id="2311" instrument_node="">Freedom House, </span><em data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Nations in Transit 2013: Authoritarian Aggression and the Pressures of Austerity</span></em><span data-dcnode-id="2308" instrument_node=""> (2013), </span><em data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">available at</span></em><span data-dcnode-id="2305" instrument_node="">: </span><a class="link link-uri" data-dcnode-id="2303" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.freedomhouse.org/report/nations-transit/nations-transit-2013"><span data-dcnode-id="2304" instrument_node="">http://www.freedomhouse.org/report/nations-transit/nations-transit-2013</span></a><span data-dcnode-id="2302" instrument_node="">.</span></p></div></span></div><div class="footnote" content-id="fn0002" data-dcnode-id="2288"><span class="fn" data-dcnode-id="2289"><span class="label fn-label" data-dcnode-id="2295"><span class="end-note-link" data-dcnode-id="2296" data-fn-id="fn0002" rel="nofollow"><span data-dcnode-id="2297" instrument_node="">2</span></span></span><div class="footnote-content" data-dcnode-id="2290"><p class="footnote-compatibility" data-dcnode-id="2291"><span class="small-caps" data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Jan Zielonka, Europe as Empire: The Nature of the Enlarged European Union </span></span><span data-dcnode-id="2292" instrument_node="">43 (2006).</span></p></div></span></div><div class="footnote" content-id="fn0003" data-dcnode-id="2274"><span class="fn" data-dcnode-id="2275"><span class="label fn-label" data-dcnode-id="2285"><span class="end-note-link" data-dcnode-id="2286" data-fn-id="fn0003" rel="nofollow"><span data-dcnode-id="2287" instrument_node="">3</span></span></span><div class="footnote-content" data-dcnode-id="2276"><p class="footnote-compatibility" data-dcnode-id="2277"><span data-dcnode-id="2284" instrument_node="">Jacques Rupnik &amp; Jan Zielonka, </span><em data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Introduction: The State of Democracy 20 Years on: Domestic and External Factors</span></em><span data-dcnode-id="2281" instrument_node="">, 27(1) </span><span class="small-caps" data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">E. Eur. Pol. &amp; Societies &amp; Cultures</span></span><span data-dcnode-id="2278" instrument_node=""> 3, 21 (2013).</span></p></div></span></div><div class="footnote" content-id="fn0004" data-dcnode-id="2258"><span class="fn" data-dcnode-id="2259"><span class="label fn-label" data-dcnode-id="2271"><span class="end-note-link" data-dcnode-id="2272" data-fn-id="fn0004" rel="nofollow"><span data-dcnode-id="2273" instrument_node="">4</span></span></span><div class="footnote-content" data-dcnode-id="2260"><p class="footnote-compatibility" data-dcnode-id="2261"><span data-dcnode-id="2270" instrument_node="">Freedom House, </span><em data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Nations in Transit 2012: Fragile Frontier: Democracy’s Growing Vulnerability in Central and Southeastern Europe</span></em><span data-dcnode-id="2267" instrument_node=""> (2012), </span><em data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">available at</span></em><a class="link link-uri" data-dcnode-id="2263" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.freedomhouse.org/report/nations-transit/nations-transit-2012"><span data-dcnode-id="2264" instrument_node="">http://www.freedomhouse.org/report/nations-transit/nations-transit-2012</span></a><span data-dcnode-id="2262" instrument_node="">.</span></p></div></span></div><div class="footnote" content-id="fn0005" data-dcnode-id="2247"><span class="fn" data-dcnode-id="2248"><span class="label fn-label" data-dcnode-id="2255"><span class="end-note-link" data-dcnode-id="2256" data-fn-id="fn0005" rel="nofollow"><span data-dcnode-id="2257" instrument_node="">5</span></span></span><div class="footnote-content" data-dcnode-id="2249"><p class="footnote-compatibility" data-dcnode-id="2250"><span data-dcnode-id="2254" instrument_node="">Rupnik &amp; Zielonka, </span><em data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">supra</span></em><span data-dcnode-id="2251" instrument_node=""> note 3, at 3.</span></p></div></span></div><div class="footnote" content-id="fn0006" data-dcnode-id="2233"><span class="fn" data-dcnode-id="2234"><span class="label fn-label" data-dcnode-id="2244"><span class="end-note-link" data-dcnode-id="2245" data-fn-id="fn0006" rel="nofollow"><span data-dcnode-id="2246" instrument_node="">6</span></span></span><div class="footnote-content" data-dcnode-id="2235"><p class="footnote-compatibility" data-dcnode-id="2236"><span data-dcnode-id="2243" instrument_node="">Jan Werner Müller, </span><em data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">Defending Democracy Within the EU</span></em><span data-dcnode-id="2240" instrument_node="">, 24(2) </span><span class="small-caps" data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">J. Democracy</span></span><span data-dcnode-id="2237" instrument_node=""> 138, 139–140 (2013).</span></p></div></span></div><div class="footnote" content-id="fn0007" data-dcnode-id="2217"><span class="fn" data-dcnode-id="2218"><span class="label fn-label" data-dcnode-id="2230"><span class="end-note-link" data-dcnode-id="2231" data-fn-id="fn0007" rel="nofollow"><span data-dcnode-id="2232" instrument_node="">7</span></span></span><div class="footno el fn-label" data-dcnode-id="1108"><span class="end-note-link" data-dcnode-id="1109" data-fn-id="fn0084" rel="nofollow"><span data-dcnode-id="1110" instrument_node="">84</span></span></span><div class="footnote-content" data-dcnode-id="1102"><p class="footnote-compatibility" data-dcnode-id="1103"><span data-dcnode-id="1107" instrument_node="">Fukuyama, </span><em data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">supra</span></em><span data-dcnode-id="1104" instrument_node=""> note 76, at 41.</span></p></div></span></div><div class="footnote" content-id="fn0085" data-dcnode-id="1090"><span class="fn" data-dcnode-id="1091"><span class="label fn-label" data-dcnode-id="1097"><span class="end-note-link" data-dcnode-id="1098" data-fn-id="fn0085" rel="nofollow"><span data-dcnode-id="1099" instrument_node="">85</span></span></span><div class="footnote-content" data-dcnode-id="1092"><p class="footnote-compatibility" data-dcnode-id="1093"><em data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Id</span></em><span data-dcnode-id="1094" instrument_node="">. at 43.</span></p></div></span></div><div class="footnote" content-id="fn0086" data-dcnode-id="1076"><span class="fn" data-dcnode-id="1077"><span class="label fn-label" data-dcnode-id="1087"><span class="end-note-link" data-dcnode-id="1088" data-fn-id="fn0086" rel="nofollow"><span data-dcnode-id="1089" instrument_node="">86</span></span></span><div class="footnote-content" data-dcnode-id="1078"><p class="footnote-compatibility" data-dcnode-id="1079"><span data-dcnode-id="1086" instrument_node="">Martin Krygier, </span><em data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">The Rule of Law and the “The Three Integrations”</span></em><span data-dcnode-id="1083" instrument_node="">, vol. 1 (1) </span><span class="small-caps" data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Hague J. Rule of Law</span></span><span data-dcnode-id="1080" instrument_node=""> 21, 24 (2009).</span></p></div></span></div><div class="footnote" content-id="fn0087" data-dcnode-id="1065"><span class="fn" data-dcnode-id="1066"><span class="label fn-label" data-dcnode-id="1073"><span class="end-note-link" data-dcnode-id="1074" data-fn-id="fn0087" rel="nofollow"><span data-dcnode-id="1075" instrument_node="">87</span></span></span><div class="footnote-content" data-dcnode-id="1067"><p class="footnote-compatibility" data-dcnode-id="1068"><span data-dcnode-id="1072" instrument_node="">Sadurski, </span><em data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">supra</span></em><span data-dcnode-id="1069" instrument_node=""> note 54, at 12.</span></p></div></span></div><div class="footnote" content-id="fn0088" data-dcnode-id="1048"><span class="fn" data-dcnode-id="1049"><span class="label fn-label" data-dcnode-id="1062"><span class="end-note-link" data-dcnode-id="1063" data-fn-id="fn0088" rel="nofollow"><span data-dcnode-id="1064" instrument_node="">88</span></span></span><div class="footnote-content" data-dcnode-id="1050"><p class="footnote-compatibility" data-dcnode-id="1051"><span data-dcnode-id="1061" instrument_node="">The notion of the best and second-best institutions comes from economics. </span><em data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">See</span></em><span data-dcnode-id="1058" instrument_node=""> Dani Rodrik, </span><em data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Second-Best Institutions</span></em><span data-dcnode-id="1055" instrument_node="">, 98(2) </span><span class="small-caps" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Am. Econ. Rev.: Papers &amp; Proceedings</span></span><span data-dcnode-id="1052" instrument_node=""> 100 (2008).</span></p></div></span></div><div class="footnote" content-id="fn0089" data-dcnode-id="1027"><span class="fn" data-dcnode-id="1028"><span class="label fn-label" data-dcnode-id="1045"><span class="end-note-link" data-dcnode-id="1046" data-fn-id="fn0089" rel="nofollow"><span data-dcnode-id="1047" instrument_node="">89</span></span></span><div class="footnote-content" data-dcnode-id="1029"><p class="footnote-compatibility" data-dcnode-id="1030"><span data-dcnode-id="1044" instrument_node="">Alina Mungiu-Pippidi, </span><em data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Becoming Denmark: Understanding Good Governance Historical Achievers</span></em><span data-dcnode-id="1041" instrument_node="">, </span><em data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">in</span></em><span class="small-caps" data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">The Development of Good Governance</span></span><span data-dcnode-id="1036" instrument_node="">, </span><em data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">available at</span></em><a class="link link-uri" data-dcnode-id="1032" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.againstcorruption.eu/uploads/norad/Becoming-Denmark-Historical-Lessons-Learned.pdf"><span data-dcnode-id="1033" instrument_node="">http://www.againstcorruption.eu/uploads/norad/Becoming-Denmark-Historical-Lessons-Learned.pdf</span></a><span data-dcnode-id="1031" instrument_node="">.</span></p></div></span></div><div class="footnote" content-id="fn0090" data-dcnode-id="1019"><span class="fn" data-dcnode-id="1020"><span class="label fn-label" data-dcnode-id="1024"><span class="end-note-link" data-dcnode-id="1025" data-fn-id="fn0090" rel="nofollow"><span data-dcnode-id="1026" instrument_node="">90</span></span></span><div class="footnote-content" data-dcnode-id="1021"><p class="footnote-compatibility" data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">I would like to thank Kim Lane Scheppele for bringing up this point. As she explains, the (Communist) Party was so discredited after 1989 that no one thought that parties were worth building. So the money and the attention, as well as the focus on the rules of the EU accession process, went into governing institutions rather than into parties. Personal e-mail correspondence with Kim L. Scheppele (Nov. 10, 2013).</span></p></div></span></div><div class="footnote" content-id="fn0091" data-dcnode-id="1003"><span class="fn" data-dcnode-id="1004"><span class="label fn-label" data-dcnode-id="1016"><span class="end-note-link" data-dcnode-id="1017" data-fn-id="fn0091" rel="nofollow"><span data-dcnode-id="1018" instrument_node="">91</span></span></span><div class="footnote-content" data-dcnode-id="1005"><p class="footnote-compatibility" data-dcnode-id="1006"><span data-dcnode-id="1015" instrument_node="">Alina Mungiu-Pippidi, </span><em data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">A House of Cards? Building the Rule of Law in East Central Europe</span></em><span data-dcnode-id="1012" instrument_node=""> (2010), </span><em data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">available at</span></em><a class="link link-uri" data-dcnode-id="1008" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ssrn.com/abstract%3D1686644"><span data-dcnode-id="1009" instrument_node="">http://ssrn.com/abstract=1686644</span></a><span data-dcnode-id="1007" instrument_node="">.</span></p></div></span></div><div class="footnote" content-id="fn0092" data-dcnode-id="993"><span class="fn" data-dcnode-id="994"><span class="label fn-label" data-dcnode-id="1000"><span class="end-note-link" data-dcnode-id="1001" data-fn-id="fn0092" rel="nofollow"><span data-dcnode-id="1002" instrument_node="">92</span></span></span><div class="footnote-content" data-dcnode-id="995"><p class="footnote-compatibility" data-dcnode-id="996"><span class="small-caps" data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Mark Mazower, Dark Continent: Europe’s Twentieth Century</spa
