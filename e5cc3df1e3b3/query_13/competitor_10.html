</span><h2 class="abstract-title js-splitscreen-abstract-title" data-dcnode-id="3052" id="27243642" scrollto-destination="27243642"><span data-dcnode-id="3053" instrument_node="">Abstract</span></h2><span data-dcnode-id="3051" instrument_node="">
</span><section class="abstract" data-dcnode-id="3048"><p class="chapter-para" data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">Just ten years after their triumphant “return to Europe” in 2004, Central and Eastern European (CEE) countries are facing a very serious crisis of constitutional democracy. This crisis—which coincides with the Eurozone crisis—has a specific origin. This article will show that the rule-of-law institutions in these countries are less robust than in Western countries. In other words, Western democracies can cope more successfully with various attacks on their liberal institutions because their courts, media, human rights organizations, and ombudsmen have a longer and better-developed tradition of independence and professionalism. Conversely, where such institutions are weak and underdeveloped, as is the case in CEE, there is always the potential danger of a drift towards authoritarianism and “illiberal democracy.” As examples from Hungary and Slovenia show, even the most advanced CEE democracies are not immune to this backsliding. In a relatively short period of time, both countries regressed from consolidated democracies into two distinct forms of semi-authoritarian and diminished democratic regimes. Particular worrying is the ease with which this regression occurred.</span></p></section><span data-dcnode-id="3047" instrument_node=""> </span><div class="article-metadata-panel clearfix at-ArticleMetadata" data-dcnode-id="3038"><div class="article-metadata-tocSections" data-dcnode-id="3039"><span data-dcnode-id="3046" instrument_node="">
</span><div class="article-metadata-tocSections-title" data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">Issue Section:</span></div><span data-dcnode-id="3043" instrument_node="">
</span><a data-dcnode-id="3041" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/icon/search-results%3Ff_TocHeadingTitle%3DOriginal%2BArticle"><span data-dcnode-id="3042" instrument_node="">Original Article</span></a><span data-dcnode-id="3040" instrument_node="">
</span></div></div><span data-dcnode-id="3037" instrument_node="">
</span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="3035" data-legacy-id="s1" id="27243643" scrollto-destination="27243643"><span data-dcnode-id="3036" instrument_node="">1. Introduction</span></h2><span data-dcnode-id="3034" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3017"><span data-dcnode-id="3033" instrument_node="">After the fall of the Berlin Wall and the collapse of Communism, many Central and Eastern European (CEE) countries managed to “return to Europe.” According to Freedom House’s </span><em data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">Nations in Transit</span></em><span data-dcnode-id="3030" instrument_node=""> 2013 report, eight of these countries are “consolidated democracies.” Only three of the eleven EU member states from the region (Bulgaria, Romania, and Croatia) are not a part of this group and, together with three other ex-Yugoslav republics, form a second group of “semi-consolidated democracies.”</span><span class="xrefLink" data-dcnode-id="3029" id="jumplink-fn0001"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3026" data-google-interstitial="false" data-open="fn0001" href="javascript:;" reveal-id="fn0001"><sup data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">1</span></sup></a><span data-dcnode-id="3025" instrument_node=""> For many observers, the “return to Europe” signaled the ultimate victory of democracy and rule of law over the legacy of totalitarianism in these countries. As Jan Zielonka argues in his work </span><em data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Europe as Empire</span></em><span data-dcnode-id="3022" instrument_node="">, the new EU member states may not exactly look like the old ones, but they nonetheless belong to the same broad category of democratic and liberal states and societies.</span><span class="xrefLink" data-dcnode-id="3021" id="jumplink-fn0002"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3018" data-google-interstitial="false" data-open="fn0002" href="javascript:;" reveal-id="fn0002"><sup data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">2</span></sup></a></p><p class="chapter-para" data-dcnode-id="2996"><span data-dcnode-id="3016" instrument_node="">In contrast to this optimistic view, more cautious scholars argue that “democracies by their very nature are never definitely established.”</span><span class="xrefLink" data-dcnode-id="3015" id="jumplink-fn0003"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3012" data-google-interstitial="false" data-open="fn0003" href="javascript:;" reveal-id="fn0003"><sup data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">3</span></sup></a><span data-dcnode-id="3011" instrument_node=""> History is not over yet, and the </span><em data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">Nations in Transit</span></em><span data-dcnode-id="3008" instrument_node=""> 2012 report, </span><em data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">Fragile Frontier: Democracy’s Growing Vulnerability in Central and Southeastern Europe</span></em><span data-dcnode-id="3005" instrument_node="">, came to some alarming conclusions. The findings of the report show a clear backsliding in key governance institutions across the region in the last five years. Six of the ten EU member states in the region (Hungary, Bulgaria, the Czech Republic, Lithuania, Romania, and Slovakia) have experienced net declines over the past five years. As far as other countries in the region are concerned, the </span><em data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">Nations in Transit</span></em><span data-dcnode-id="3002" instrument_node=""> report documented “an antidemocratic trend,” a “democratic decline,” “which raises real doubts about the prospects for widening the circle of democratic states in Europe.”</span><span class="xrefLink" data-dcnode-id="3001" id="jumplink-fn0004"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2998" data-google-interstitial="false" data-open="fn0004" href="javascript:;" reveal-id="fn0004"><sup data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">4</span></sup></a><span data-dcnode-id="2997" instrument_node=""> Equally alarming is the Introduction to a special issue of a leading academic journal:</span></p><blockquote data-dcnode-id="2989"><p class="chapter-para" data-dcnode-id="2990"><span data-dcnode-id="2995" instrument_node="">The countries of Central and Eastern Europe were proclaimed to be consolidated democracies when they joined the European Union (EU) in 2004–2007. At that time, they seemed to have workable constitutions, administrations, and markets. However, history is moving fast, and new democracies are seen as particularly vulnerable and susceptible to a dictatorial turn.</span><span class="xrefLink" data-dcnode-id="2994" id="jumplink-fn0005"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2991" data-google-interstitial="false" data-open="fn0005" href="javascript:;" reveal-id="fn0005"><sup data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">5</span></sup></a></p></blockquote><p class="chapter-para" data-dcnode-id="2937"><span data-dcnode-id="2988" instrument_node="">Hungary recently adopted a new Constitution that directly dismantles basic checks and balances, entrenches a deeply problematic illiberal political order, and undermines some of the basic principles of the EU political constitution.</span><span class="xrefLink" data-dcnode-id="2987" id="jumplink-fn0006"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2984" data-google-interstitial="false" data-open="fn0006" href="javascript:;" reveal-id="fn0006"><sup data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">6</span></sup></a><span data-dcnode-id="2983" instrument_node=""> For the first time in the history of the EU, the EU Commission is contemplating the use of sanctions against Hungary.</span><span class="xrefLink" data-dcnode-id="2982" id="jumplink-fn0007"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2979" data-google-interstitial="false" data-open="fn0007" href="javascript:;" reveal-id="fn0007"><sup data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">7</span></sup></a><span data-dcnode-id="2978" instrument_node=""> A new government in Romania took rapid steps to consolidate its power over state institutions, triggering a constitutional crisis which was labeled a “quiet coup d’état” by the international press.</span><span class="xrefLink" data-dcnode-id="2977" id="jumplink-fn0008"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2974" data-google-interstitial="false" data-open="fn0008" href="javascript:;" reveal-id="fn0008"><sup data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">8</span></sup></a><span data-dcnode-id="2973" instrument_node=""> Only after a resolute response from the EU did the Romanian government back down on several crucial issues that threatened to unravel the rule of law in the country.</span><span class="xrefLink" data-dcnode-id="2972" id="jumplink-fn0009"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2969" data-google-interstitial="false" data-open="fn0009" href="javascript:;" reveal-id="fn0009"><sup data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">9</span></sup></a><span data-dcnode-id="2968" instrument_node=""> In Bulgaria, the institutionalization of cronyism, the subversion of stable normative frameworks, and stalled state-building are all leading to “post accession hooliganism,”</span><span class="xrefLink" data-dcnode-id="2967" id="jumplink-fn0010"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2964" data-google-interstitial="false" data-open="fn0010" href="javascript:;" reveal-id="fn0010"><sup data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">10</span></sup></a><span data-dcnode-id="2963" instrument_node=""> which is further weakening an already “frustrated and disillusioned democracy.”</span><span class="xrefLink" data-dcnode-id="2962" id="jumplink-fn0011"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2959" data-google-interstitial="false" data-open="fn0011" href="javascript:;" reveal-id="fn0011"><sup data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">11</span></sup></a><span data-dcnode-id="2958" instrument_node=""> Slovenia, one of the “success stories” of the transition, is experiencing its biggest constitutional and political crisis since its independence in 1991. The Slovenian constitutional model, which is best described as a gradual and homegrown transformation from Communism to a “neo-corporatist” democracy, and has been hailed as the most “balanced and inclusive” form of transition,</span><span class="xrefLink" data-dcnode-id="2957" id="jumplink-fn0012"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2954" data-google-interstitial="false" data-open="fn0012" href="javascript:;" reveal-id="fn0012"><sup data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">12</span></sup></a><span data-dcnode-id="2953" instrument_node=""> is currently facing a simultaneous economic and political crisis.</span><span class="xrefLink" data-dcnode-id="2952" id="jumplink-fn0013"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2949" data-google-interstitial="false" data-open="fn0013" href="javascript:;" reveal-id="fn0013"><sup data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">13</span></sup></a><span data-dcnode-id="2948" instrument_node=""> The capture of the state by various political and informal groups has progressed to such a dramatic extent that it is undermining the independence and credibility of almost all rule-of-law institutions in the country, with the exception of the Constitutional Court. Even the Czech Republic is not completely exempt from this trend.</span><span class="xrefLink" data-dcnode-id="2947" id="jumplink-fn0014"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2944" data-google-interstitial="false" data-open="fn0014" href="javascript:;" reveal-id="fn0014"><sup data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">14</span></sup></a><span data-dcnode-id="2943" instrument_node=""> It seems that only Poland</span><span class="xrefLink" data-dcnode-id="2942" id="jumplink-fn0015"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2939" data-google-interstitial="false" data-open="fn0015" href="javascript:;" reveal-id="fn0015"><sup data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">15</span></sup></a><span data-dcnode-id="2938" instrument_node=""> has so far been able to resist the lure of authoritarianism.</span></p><p class="chapter-para" data-dcnode-id="2921"><span data-dcnode-id="2936" instrument_node="">As these examples of democratic fatigue, regression, and backsliding into various forms of constitutional authoritarianism in Central and Eastern Europe show, the “return to Europe” is not yet complete. Jacques Rupnik and Jan Zielonka offer the poignant observation that “the disturbing question is the ease with which consolidated democracies such as Hungary can experience ‘democratic regression’, reminding us that democracies by their very nature are never ‘definitely established’.”</span><span class="xrefLink" data-dcnode-id="2935" id="jumplink-fn0016"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2932" data-google-interstitial="false" data-open="fn0016" href="javascript:;" reveal-id="fn0016"><sup data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">16</span></sup></a><span data-dcnode-id="2931" instrument_node=""> While there has been significant progress in the development of “electoral democracy” in the region, “liberal democracy” still remains fragile and weak. Here, liberal democracy is understood as a political system marked not only by free and fair elections, but also by the rule of law, the separation of powers and the protection of basic freedoms.</span><span class="xrefLink" data-dcnode-id="2930" id="jumplink-fn0017"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2927" data-google-interstitial="false" data-open="fn0017" href="javascript:;" reveal-id="fn0017"><sup data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">17</span></sup></a><span data-dcnode-id="2926" instrument_node=""> Moreover, the legal institutions of liberal democracy in the CEE countries significantly differ from those of their Western European counterparts. In the façade of harmonized legal rules transposed from various EU legal sources, there have begun to appear cracks, exposing the fragility of constitutional democracy in the CEE countries. Several recent studies emphasize this aspect and argue that formal democratic institutions operate “in the shadow of informal networks” which undermine formal law and institutions. Such “hybrid” forms of constitutionalism have also significantly contributed to the crisis of constitutional democracy in the region.</span><span class="xrefLink" data-dcnode-id="2925" id="jumplink-fn0018"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2922" data-google-interstitial="false" data-open="fn0018" href="javascript:;" reveal-id="fn0018"><sup data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">18</span></sup></a></p><p class="chapter-para" data-dcnode-id="2897"><span data-dcnode-id="2920" instrument_node="">As a consequence, CEE countries are once again displaying certain features of the “lands in between” which call attention to their constantly precarious and indeterminate location on the political map of Europe. </span><em data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">Zwischen-Europa</span></em><span data-dcnode-id="2917" instrument_node="">, as some interwar German writers referred to this part of Europe, lies in the territory between the West and the Russian East and is said to have been the “unfinished part of Europe” for most of the twentieth century.</span><span class="xrefLink" data-dcnode-id="2916" id="jumplink-fn0019"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2913" data-google-interstitial="false" data-open="fn0019" href="javascript:;" reveal-id="fn0019"><sup data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">19</span></sup></a><span data-dcnode-id="2912" instrument_node=""> Its political and legal institutions were similarly “caught” between the democratic West and the authoritarian East. As such, the “lands in between” should be an interesting case study for new literature on “competitive authoritarianism,” which argues that between constitutional democracy and authoritarian rule there are many intermediate and hybrid forms of “constitutional authoritarianism.”</span><span class="xrefLink" data-dcnode-id="2911" id="jumplink-fn0020"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2908" data-google-interstitial="false" data-open="fn0020" href="javascript:;" reveal-id="fn0020"><sup data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">20</span></sup></a><span data-dcnode-id="2907" instrument_node=""> Where do CEE models of constitutionalism lie on this continuum? In this article, I argue that some of these models represent a distinct form of constitutional democracy that is neither pure democracy nor full-fledged authoritarianism, but rather a “diminished” form of democracy,</span><span class="xrefLink" data-dcnode-id="2906" id="jumplink-fn0021"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2903" data-google-interstitial="false" data-open="fn0021" href="javascript:;" reveal-id="fn0021"><sup data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">21</span></sup></a><span data-dcnode-id="2902" instrument_node=""> pervaded by strong authoritarian elements. Although they are still considered to be “consolidated” or semi-consolidated democracies, many CEE countries exhibit strong features of authoritarian constitutionalism; they thus represent, in the words of Mark Tushnet, “a promising candidate” for the examination of a potentially distinctive form of constitutionalism.</span><span class="xrefLink" data-dcnode-id="2901" id="jumplink-fn0022"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2898" data-google-interstitial="false" data-open="fn0022" href="javascript:;" reveal-id="fn0022"><sup data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">22</span></sup></a></p><p class="chapter-para" data-dcnode-id="2890"><span data-dcnode-id="2896" instrument_node="">The discrepancy between the form and substance of liberal democracy in this part of the world should come as no surprise. Ivan Berend, a leading historian of the region, argues that Central and Eastern Europe is home to a continuing pattern of “forms without substance,”</span><span class="xrefLink" data-dcnode-id="2895" id="jumplink-fn0023"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2892" data-google-interstitial="false" data-open="fn0023" href="javascript:;" reveal-id="fn0023"><sup data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">23</span></sup></a><span data-dcnode-id="2891" instrument_node=""> and has pointed out a series of unsuccessful attempts to emulate Western European democratic institutions which often resulted in legal forms devoid of real substance. Those who expected that a decade of “EU accession” would lead to an irreversible break with the totalitarian past were simply naïve. They forgot that institutions of liberal democracy cannot be created overnight. Developing liberal democracy requires not only a longer time frame, but also continuous support from citizens. This last aspect has proven to be particularly troublesome, and has, to a large extent, been responsible for the “partial” democratic consolidation in the region.</span></p><p class="chapter-para" data-dcnode-id="2878"><span data-dcnode-id="2889" instrument_node="">Following Thomas Carothers’s influential critique of “sequentialism”</span><span class="xrefLink" data-dcnode-id="2888" id="jumplink-fn0024"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2885" data-google-interstitial="false" data-open="fn0024" href="javascript:;" reveal-id="fn0024"><sup data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">24</span></sup></a><span data-dcnode-id="2884" instrument_node=""> and more recent work on the relationship between democratization and state consolidation,</span><span class="xrefLink" data-dcnode-id="2883" id="jumplink-fn0025"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2880" data-google-interstitial="false" data-open="fn0025" href="javascript:;" reveal-id="fn0025"><sup data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">25</span></sup></a><span data-dcnode-id="2879" instrument_node=""> I argue that only greater democratization offers real hope for the further development of liberal democracy in the region. Even if it is true that some authoritarian regimes based on the rule of law have proven capable of generating economic growth and prosperity, I argue that for a variety of reasons the CEE countries cannot follow this East-Asian approach to development. On the contrary, their problems can be solved only by achieving stronger democratic support for liberal institutions.</span></p><p class="chapter-para" data-dcnode-id="2859"><span data-dcnode-id="2877" instrument_node="">Section 2 traces the origins and patterns of democratic and constitutional regression in the region. It focuses on the two “front-runners” in the transition process, Hungary and Slovenia, countries already considered by many to be “consolidated democracies.” The ease with which democratic regression has occurred in these two countries in many ways calls into question the supposed sharp divide between the Central European “success stories” and other, more problematic countries from the Balkans and further east.</span><span class="xrefLink" data-dcnode-id="2876" id="jumplink-fn0026"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2873" data-google-interstitial="false" data-open="fn0026" href="javascript:;" reveal-id="fn0026"><sup data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">26</span></sup></a><span data-dcnode-id="2872" instrument_node=""> Section 3 looks at the causes of the crisis of constitutional democracy in these countries. It tries to determine whether these crises are only “temporary” and primarily caused by so-called post-enlargement fatigue intensified by the negative effects of the Eurozone economic crisis, or more “structural” and likely to endure. Furthermore, it examines whether they represent a specific CEE pattern of democratic backsliding or belong to a worldwide trend of “democratic recession.”</span><span class="xrefLink" data-dcnode-id="2871" id="jumplink-fn0027"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2868" data-google-interstitial="false" data-open="fn0027" href="javascript:;" reveal-id="fn0027"><sup data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">27</span></sup></a><span data-dcnode-id="2867" instrument_node=""> Section 4 considers possible solutions to the current constitutional crises in post-Communist Europe by situating the constitutional crises in the broader context of contemporary debates about the proper role of legal institutions in political and economic development, i.e., in the field of law and development. A central argument here is that an elitist, court-centered, and executive-driven process of democratization has to be complemented by more inclusive forms of democratic constitutionalism. The article concludes with a simple but often neglected insight about the relationship between democracy, liberalism, and the rule of law: Liberalism and democracy coexist in contemporary liberal democracies. Modern political thinkers have always debated whether there is a tension—some would call it a contradiction—between the two. Nevertheless, as Norberto Bobbio argues in </span><em data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">Liberalism and Democracy</span></em><span data-dcnode-id="2864" instrument_node="">, “the development of democracy has over time become the principal tool for the defence of rights to liberty.”</span><span class="xrefLink" data-dcnode-id="2863" id="jumplink-fn0028"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2860" data-google-interstitial="false" data-open="fn0028" href="javascript:;" reveal-id="fn0028"><sup data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">28</span></sup></a></p><span data-dcnode-id="2858" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="2856" data-legacy-id="s2" id="27243653" scrollto-destination="27243653"><span data-dcnode-id="2857" instrument_node="">2. Backsliding into constitutional authoritarianism or diminished forms of democracy in Central and Eastern Europe?</span></h2><span data-dcnode-id="2855" instrument_node="">
</span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2853" data-legacy-id="s3" id="27243654" scrollto-destination="27243654"><span data-dcnode-id="2854" instrument_node="">2.1. Central European “success stories”</span></h3><span data-dcnode-id="2852" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">Hungary and Slovenia were until very recently among the most successful transition countries in the region. As such, a number of common features can be found in the transition processes in these two countries. With relatively open economies during the final years of socialism, these two countries had a much better starting position than other transition economies. Moreover, the brutality of the Communist regime in these two countries, particularly after the mid-1950s, was much less pronounced than in East Germany or Czechoslovakia, for example, and greatly contributed to the gradualism in political reforms. In a relatively short period of time, both countries became known as Central European “success stories.” During the past two decades, they have improved both their economic growth and the quality of their institutions. As far as the rule of law is concerned, Slovenia and Hungary were top performers among CEE countries, together with the Czech Republic and Estonia. In Slovenia and Hungary, the constitutional courts emerged quite early as the most powerful institutions, along with Parliament and the executive. The activism and vigilance shown by both courts in the protection of constitutional rights were unparalleled in the region. Similarities can even be found in the design of the parliamentary systems in the two countries. Both countries opted for a strong parliamentary model with a formally ceremonial role for the president. Furthermore, the removal of the executive requires a “constructive vote of no confidence” in both countries. This was borrowed from the German Constitution and is intended to stabilize the executive.</span></p><p class="chapter-para" data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">However, there are also many crucial differences between the two countries. After the collapse of Communism, they opted for two quite different economic paradigms. While Slovenia followed a path of gradual economic reforms, in Hungary, privatization and the opening of the economy were more radical. From the perspective of the West, Slovenia, although a political front-runner, has always been an economic laggard. Whereas Hungary was the main recipient of international foreign investment in the region, Slovenia remained quite closed to foreign investment. Hungarian banks and enterprises, which were formerly state-owned, were almost completely privatized. In contrast, the share of state ownership in the Slovenian economy still remains among the largest in Europe. Another difference is that, whereas Slovenia was ruled by the same political bloc of left-centrist parties for most of the transition, there were regular political turnovers in Hungary. Nevertheless, both countries successfully joined the EU in 2004 and also became respected member states of international organizations such as the Council of Europe, the North Atlantic Treaty Organization (NATO), and the Organization for Economic Co-operation and Development (OECD).</span></p><p class="chapter-para" data-dcnode-id="2841"><span data-dcnode-id="2847" instrument_node="">Two different patterns of democratic regression emerged in Hungary and Slovenia. Although both are successful transition countries, in a relatively short period of time they have regressed into two different forms of authoritarian rule. While Hungary is an example of a “constitutional revolution” leading to the semi-authoritarian rule of a single party (the Fidesz party), Slovenia provides an example of “state capture,”</span><span class="xrefLink" data-dcnode-id="2846" id="jumplink-fn0029"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2843" data-google-interstitial="false" data-open="fn0029" href="javascript:;" reveal-id="fn0029"><sup data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">29</span></sup></a><span data-dcnode-id="2842" instrument_node=""> meaning that political elites indirectly control the country through various informal networks and practices.</span></p><span data-dcnode-id="2840" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2838" data-legacy-id="s4" id="27243658" scrollto-destination="27243658"><span data-dcnode-id="2839" instrument_node="">2.2. The Hungarian constitutional revolution</span></h3><span data-dcnode-id="2837" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2811"><span data-dcnode-id="2836" instrument_node="">The Fidesz government achieved a fundamental revision of the rules of the constitutional and political order in Hungary. In only five years (from 2010 to 2015) it managed to transform Hungary from one of the success stories of the transition from socialism to democracy into a semi-authoritarian regime based on an illiberal constitutional order by systematically dismantling checks and balances and thereby undermining the rule of law. The novelty and irony of the Hungarian slide into authoritarianism is that it was achieved entirely through legal means. Due to its two-thirds majority in the Hungarian unicameral parliament (the Diet), Fidesz faced few obstacles in achieving this “constitutional revolution.”</span><span class="xrefLink" data-dcnode-id="2835" id="jumplink-fn0030"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2832" data-google-interstitial="false" data-open="fn0030" href="javascript:;" reveal-id="fn0030"><sup data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">30</span></sup></a><span data-dcnode-id="2831" instrument_node=""> As Erin Jenne and Cass Mudde argue,</span><span class="xrefLink" data-dcnode-id="2830" id="jumplink-fn0031"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2827" data-google-interstitial="false" data-open="fn0031" href="javascript:;" reveal-id="fn0031"><sup data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">31</span></sup></a><span data-dcnode-id="2826" instrument_node=""> Hungary thus represents a politically distinctive case of authoritarianism. Generally, authoritarian leaders undermine democratic institutions by not respecting the rule of law; Hungary, on the other hand, has managed to undermine the rule of law by changing the legal rules, i.e., the Constitution. Such a “constitutional revolution” produced a nominally democratic constitution; as Bánkuti, Halmai, and Scheppele argue, Hungary “can no longer be described substantively as a republican state governed by the rule of law.”</span><span class="xrefLink" data-dcnode-id="2825" id="jumplink-fn0032"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2822" data-google-interstitial="false" data-open="fn0032" href="javascript:;" reveal-id="fn0032"><sup data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">32</span></sup></a><span data-dcnode-id="2821" instrument_node=""> The major “deficiency” of the new constitutional structure is that it vests so much power in the centralized executive that there exist no real checks and balances to restrain this power.</span><span class="xrefLink" data-dcnode-id="2820" id="jumplink-fn0033"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2817" data-google-interstitial="false" data-open="fn0033" href="javascript:;" reveal-id="fn0033"><sup data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">33</span></sup></a><span data-dcnode-id="2816" instrument_node=""> Moreover, because the new Hungarian Constitution properly guarantees “neither fundamental rights nor checks and balances,” which is the core function of modern constitutions, it is also “unconstitutional.”</span><span class="xrefLink" data-dcnode-id="2815" id="jumplink-fn0034"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2812" data-google-interstitial="false" data-open="fn0034" href="javascript:;" reveal-id="fn0034"><sup data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">34</span></sup></a></p><p class="chapter-para" data-dcnode-id="2800"><span data-dcnode-id="2810" instrument_node="">As Scheppele has shown, the Fidesz government strategically changed the rules of the game as set by the old Hungarian Constitution of 1949, which was still in force, although its content had been changed completely in 1989.</span><span class="xrefLink" data-dcnode-id="2809" id="jumplink-fn0035"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2806" data-google-interstitial="false" data-open="fn0035" href="javascript:;" reveal-id="fn0035"><sup data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">35</span></sup></a><span data-dcnode-id="2805" instrument_node=""> In one of its first constitutional amendments, the new government removed Article 24(5) of the old Constitution, which required a four-fifths vote in Parliament to approve the rules for drafting a new constitution. What followed was a series of constitutional amendments that changed the rules regulating the Constitutional Court, the referendum process, and the authority in charge of media control. The most important of these was the amendment which changed the rules for nominating Constitutional Court judges so that Fidesz could use its two-thirds majority to nominate its own candidates. As Bánkuti et al. argue, these actions “effectively created an opening through which the Fidesz government could then push a new constitution without challenge.”</span><span class="xrefLink" data-dcnode-id="2804" id="jumplink-fn0036"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2801" data-google-interstitial="false" data-open="fn0036" href="javascript:;" reveal-id="fn0036"><sup data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">36</span></sup></a></p><p class="chapter-para" data-dcnode-id="2792"><span data-dcnode-id="2799" instrument_node="">In less than a year, the Parliament adopted a new constitution, which became valid on January 1, 2012. The new constitution, called the “Szájer Constitution” after a Fidesz European Parliament member who headed the committee that had proposed the new constitution, contains several provisions that radically undermine basic checks and balances of the old constitution. Access to the Constitutional Court was radically limited, and the old system of </span><em data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">actio popularis</span></em><span data-dcnode-id="2796" instrument_node="">, which allowed anyone to bring a case before the Court, was replaced with the German model of constitutional complaint (</span><em data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">Verfassungsbeschwerde</span></em><span data-dcnode-id="2793" instrument_node="">). By lowering the retirement age for ordinary judges from 70 to 62, the government managed to remove almost all of the courts’ presidents. The legislation on the judiciary established a new National Judicial Office with the power to replace the retiring judges and name new ones.</span></p><p class="chapter-para" data-dcnode-id="2786"><span data-dcnode-id="2791" instrument_node="">In its next step, the government weakened the independence and autonomy of other important bodies with controlling functions. The former system of four separate and independent ombudsmen was replaced with a “parliamentary commissioner for human rights,” and the former data protection ombudsman was transformed from an independent institution into a quasi-governmental office. </span><span class="xrefLink" data-dcnode-id="2790" id="jumplink-fn0037"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2787" data-google-interstitial="false" data-open="fn0037" href="javascript:;" reveal-id="fn0037"><sup data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">37</span></sup></a></p><p class="chapter-para" data-dcnode-id="2779"><span data-dcnode-id="2785" instrument_node="">Last but not least, on March 11, 2013, the Hungarian Parliament adopted the so-called “Fourth Amendment,”</span><span class="xrefLink" data-dcnode-id="2784" id="jumplink-fn0038"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2781" data-google-interstitial="false" data-open="fn0038" href="javascript:;" reveal-id="fn0038"><sup data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">38</span></sup></a><span data-dcnode-id="2780" instrument_node=""> an amalgam of various constitutional provisions that sought to limit the independence of the judiciary, bring universities under even greater governmental control, open the door to political prosecution, criminalize homelessness, make the recognition of religious groups dependent on their cooperation with the government, and weaken human rights guarantees across the board. However, the most problematic amendments are those found in Articles 12 and 19, which drastically limit the jurisdiction of the Constitutional Court, one of the last bastions of the rule of law in Hungary.</span></p><p class="chapter-para" data-dcnode-id="2763"><span data-dcnode-id="2778" instrument_node="">While several authors agree that the new constitutional order undermines the rule of law by displacing an independent judiciary and other independent institutions, and that it removes most of the checks and balances needed in a system of liberal democracy, there is less agreement on how to define such a new constitutional order.</span><span class="xrefLink" data-dcnode-id="2777" id="jumplink-fn0039"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2774" data-google-interstitial="false" data-open="fn0039" href="javascript:;" reveal-id="fn0039"><sup data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">39</span></sup></a><span data-dcnode-id="2773" instrument_node=""> Whether it should be called a new illiberal regime, new authoritarianism, a Putin-style guided democracy, etc., is perhaps less important. Rupnik, for example, argues that Hungary is not a full-blown authoritarian regime like Lukashenko’s Belarus, and that it is not clear whether it represents a “diminished form of authoritarianism” or a “diminished form of democracy.”</span><span class="xrefLink" data-dcnode-id="2772" id="jumplink-fn0040"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2769" data-google-interstitial="false" data-open="fn0040" href="javascript:;" reveal-id="fn0040"><sup data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">40</span></sup></a><span data-dcnode-id="2768" instrument_node=""> Rupnik also sees a worrisome resemblance between Orbán’s rhetoric and the pre-Communist authoritarian regime of Miklós Horthy. Key features of these pre-Communist traditions include strong anti-Semitism, anti-Bolshevism, and an obsession with the Trianon trauma—a result of the Treaty of Trianon of 1920, which formally ended World War I for Hungary and cost it more than two-thirds of its territory and a third of its population. Imre Kertész, a Nobel laureate, thinks that there are many parallels between the 1930s and the present situation. Kim Lane Scheppele offers another poignant observation on the current Hungarian political situation: the Fidesz government does not jail its opponents, it does not ban free travel, but it does punish political dissent, fire members of the political opposition from state-sector jobs, and intimidate the families of critical journalists. Even if it is not yet a full-blown authoritarian regime, the negative effects of the new constitutional order are real and show strong signs of a slide into authoritarianism.</span><span class="xrefLink" data-dcnode-id="2767" id="jumplink-fn0041"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2764" data-google-interstitial="false" data-open="fn0041" href="javascript:;" reveal-id="fn0041"><sup data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">41</span></sup></a></p><span data-dcnode-id="2762" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2760" data-legacy-id="s5" id="27243665" scrollto-destination="27243665"><span data-dcnode-id="2761" instrument_node="">2.3. Slovenia: from success story to state capture</span></h3><span data-dcnode-id="2759" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">During the accession process (1998–2004) Slovenia gained the reputation of a “good pupil.” It was known for its deference to suggestions by international organizations and for its largely uncritical adoption of their reform templates. Here, the EU played the most prominent role, particularly during the accession period. Hundreds of pieces of legislation were introduced or changed during this period under the rubric of the harmonization of Slovenian law with the “acquis.” This was largely, though not exclusively, done to placate the EU, but after the accession (2004), it significantly contributed to the shallow “Europeanization” of EU norms. It created a Slovenian version of “Potemkin” harmonization, characterized by the coexistence of Europeanized formal rules on the one hand and informal practices on the other, with the latter often subverting and substituting ad hoc informal arrangements for the rule of law.</span></p><p class="chapter-para" data-dcnode-id="2740"><span data-dcnode-id="2756" instrument_node="">This contrasts sharply with the gradualism in economic reforms and corporatism in the political structures which had earned Slovenia a distinctive status during the early transition period. In political science accounts of the transition, Slovenia was recognized as the only country in the region not following the neoliberal reform pattern advocated by the World Bank and International Monetary Fund (IMF).</span><span class="xrefLink" data-dcnode-id="2755" id="jumplink-fn0042"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2752" data-google-interstitial="false" data-open="fn0042" href="javascript:;" reveal-id="fn0042"><sup data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">42</span></sup></a><span data-dcnode-id="2751" instrument_node=""> However, this gradualism and consequent “soft” transition had a strong negative side effect. The chosen path of soft transition or gradualism “was strongly connected with the high reproduction of elites, which means that the majority of the old—partially already ‘modernized and reformed’—communist elites managed to retain their positions in the new social circumstances.”</span><span class="xrefLink" data-dcnode-id="2750" id="jumplink-fn0043"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2747" data-google-interstitial="false" data-open="fn0043" href="javascript:;" reveal-id="fn0043"><sup data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">43</span></sup></a><span data-dcnode-id="2746" instrument_node=""> This in turn led to “long-term malignant effects, including the establishment of monopolies and rent-seeking behavior.”</span><span class="xrefLink" data-dcnode-id="2745" id="jumplink-fn0044"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2742" data-google-interstitial="false" data-open="fn0044" href="javascript:;" reveal-id="fn0044"><sup data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">44</span></sup></a><span data-dcnode-id="2741" instrument_node=""> This aspect, which had previously been masked, became apparent to the public after the eruption of the economic crisis in Slovenia in 2010.</span></p><p class="chapter-para" data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">Until recently, Slovenia had traditionally received very high scores on the Freedom House index of democracy and rule of law. In the press, it had been portrayed as a “success story” among the transition countries. According to the latest World Bank data, Slovenia, a high-income country (HIC) by World Bank standards, is economic ally the most developed country in the region.</span></p><p class="chapter-para" data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Taking into account the facts presented above, the reversal of this trend is, quite unsurprisingly, difficult to understand. Although the crisis primarily emerged as an economic one, i.e., a crisis of the banking sector, it also exacerbated the political crisis. Once one considers the Potemkin nature of institution building in combination with the negative effects of gradualism as exposed by the banking crisis, the backsliding taking place in Slovenia begins to make sense.</span></p><p class="chapter-para" data-dcnode-id="2729"><span data-dcnode-id="2735" instrument_node="">Three factors merit emphasis. First, the institutional reforms in Slovenia were too much about “copying and pasting” formal rules instead of creating adequate institutions with the right incentive structures. The role of the EU during the accession period substantially contributed to this pattern of “shallow institutionalization.” The evaluation of formal compliance with the Copenhagen criteria was based on the adoption of laws rather than on implementation and compliance.</span><span class="xrefLink" data-dcnode-id="2734" id="jumplink-fn0045"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2731" data-google-interstitial="false" data-open="fn0045" href="javascript:;" reveal-id="fn0045"><sup data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">45</span></sup></a><span data-dcnode-id="2730" instrument_node=""> It comes as no surprise that the Slovenian judiciary, civil service, and many other “independent” agencies look very similar to their European counterparts. However, behind this deceitful similarity there lies a completely different reality, one which until recently had gone largely unnoticed by foreign observers.</span></p><p class="chapter-para" data-dcnode-id="2723"><span data-dcnode-id="2728" instrument_node="">For example, the judiciary enjoys full statutory independence and life tenure. However, looking at its performance, one finds a frustrating picture of excessive length of judicial proceedings (which generally exceeds three years) and ineffectiveness in prosecuting corruption and clientelism. As a result, the Slovenian judiciary, with the exception of the Constitutional Court, is among the least trusted institutions in Slovenia, with only the executive, the political parties and Parliament garnering less respect from the public.</span><span class="xrefLink" data-dcnode-id="2727" id="jumplink-fn0046"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2724" data-google-interstitial="false" data-open="fn0046" href="javascript:;" reveal-id="fn0046"><sup data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">46</span></sup></a></p><p class="chapter-para" data-dcnode-id="2717"><span data-dcnode-id="2722" instrument_node="">The Slovenian civil service offers another telling example of the discrepancy between the form and the substance of legal institutions. With the adoption of the Civil Servants Act in 2002, Slovenia received the approval of the European Commission. The Civil Servants Act formally introduced a career-based system of public service, with open competition for positions in the civil service and a politically neutral system of recruitment headed by a new body, the Civil Service Council. But the reality was quite different. Instead of a modern career-based and politically neutral civil service, Slovenia ended up with one of the most politicized civil service systems in the region. According to the first comparative study on the politicization of senior civil services in Central and Eastern Europe, Slovenia belongs to the group of countries with the highest score in the category of politicization. </span><span class="xrefLink" data-dcnode-id="2721" id="jumplink-fn0047"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2718" data-google-interstitial="false" data-open="fn0047" href="javascript:;" reveal-id="fn0047"><sup data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">47</span></sup></a></p><p class="chapter-para" data-dcnode-id="2710"><span data-dcnode-id="2716" instrument_node="">Second, many “rule of law” institutions (courts, the civil service, and the media) have been deeply politicized by the former “nomenclature officials.” Instead of defending the rule of law, these institutions, unable to withstand the strong political pressure of their “principals,” were engaged in legal enforcement favoring partisan political interests. Since the left-liberal political bloc (former communists (Social Democrats, SD) and the reformed Communist Youth Organization (Liberal Democracy of Slovenia, LDS)) had dominated the political space for almost fourteen years, this strongly impacted the formation of the Slovenian elite in general. Consequently, the majority of Slovenian elites gravitated towards the “retention” elite, represented by the LDS and SD political parties.</span><span class="xrefLink" data-dcnode-id="2715" id="jumplink-fn0048"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2712" data-google-interstitial="false" data-open="fn0048" href="javascript:;" reveal-id="fn0048"><sup data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">48</span></sup></a><span data-dcnode-id="2711" instrument_node=""> This elite managed to create better contacts with the business sector, media, academia and, most importantly, with a substantial part of the public sector, including the judiciary, civil service, state-owned companies, etc.</span></p><p class="chapter-para" data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">Third, formal democratic rules and institutions often operate in the shadow of informal networks and practices. As explained above, the entire public sector is governed by informal practices and networks which exist in parallel to formal rules. Numerous interest groups, political parties, and individuals use these networks and practices to extract state resources. One of the most troubling aspects revealed by the banking crisis is the ease with which the politically installed managers of public enterprises, banks, insurance companies, public universities, and the national broadcasting service distribute money and other non-pecuniary advantages (jobs, perks) to their political friends, relatives, etc. Moreover, the political distribution of jobs and money in the public sector skillfully abuses the weaknesses of the formal system described above. With weak, underdeveloped, and politically controlled rule-of-law institutions, it was not that difficult to subvert and abuse formally prescribed rules and procedures. Quite often, this extraction of public resources was carried out according to the letter of the law, but in sharp contrast to its spirit. In other words, public procurement, state aid, loans, and employment practices usually adhere to formal rules, but the factual meaning of these rules is informally reinterpreted in the shadow of informal practices. As a result, cronyism and “state capture” have become so widespread and “internalized” that informal rules and habits are more important than formal rules.</span></p><p class="chapter-para" data-dcnode-id="2696"><span data-dcnode-id="2707" instrument_node="">Shallow institutionalization, pervasive politicization, and informal subversion of rule-of-law institutions have shed a completely new light on the Slovenian “success story.” The reality behind Slovenia’s “smooth transition”</span><span class="xrefLink" data-dcnode-id="2706" id="jumplink-fn0049"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2703" data-google-interstitial="false" data-open="fn0049" href="javascript:;" reveal-id="fn0049"><sup data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">49</span></sup></a><span data-dcnode-id="2702" instrument_node=""> reveals many “structural weaknesses of Slovenian model of socio-economic regulation that led to development of its version of ‘crony-capitalism’ characterized by entanglement of the political and business elite.”</span><span class="xrefLink" data-dcnode-id="2701" id="jumplink-fn0050"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2698" data-google-interstitial="false" data-open="fn0050" href="javascript:;" reveal-id="fn0050"><sup data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">50</span></sup></a><span data-dcnode-id="2697" instrument_node=""> As shown above, Slovenia is caught in a downward spiral of the disintegration of key rule-of-law institutions. The thorough politicization and informal subversion of these institutions leaves constitutional democracy in Slovenia incomplete and vulnerable at a time of democratic recession and financial crisis in the Eurozone. At the very moment the rule of law is most needed as a legal “immune system” to protect constitutional democracy, it is either unavailable or under strain.</span></p><p class="chapter-para" data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">The story of democratic “regression” in Slovenia would be incomplete without noting some rare exceptions to the trend. Namely, contrary to the low prestige of regular courts, the Constitutional Court has evolved into a powerful and respected judicial body. Despite the Court’s occasional judicial activism, its decisions have very rarely been challenged or questioned. It enjoys the prestige of being the most respected juridical institution in the country. Furthermore, the case law of the Constitutional Court has been crucial in improving the protection of human rights in the country.</span></p><span data-dcnode-id="2693" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2691" data-legacy-id="s6" id="27243677" scrollto-destination="27243677"><span data-dcnode-id="2692" instrument_node="">2.4. Differences and similarities: two forms of backsliding</span></h3><span data-dcnode-id="2690" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">The first big difference between the two “paths” to democratic backsliding is that Hungary’s “constitutional revolution” was achieved directly by changing the country’s constitution, whereas the Slovenian case did not involve any changes of formal constitutional rules. It was precisely the fact that Orbán was able to change the constitution to his own advantage that made it possible for him to acquire the almost unprecedented concentration of power in the hands of his government.</span></p><p class="chapter-para" data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">In Hungary, the new Constitution vests so much power in the centralized executive that no real checks and balances exist to restrain this power. In the Slovenian case, on the other hand, formal constitutional rules remain intact and do not even remotely show signs of authoritarian elements. As described above, state capture in Slovenia was achieved by informal parallel structures and practices coexisting alongside formal democratic rules. This parallel network of power and control, though ubiquitous, is much more dispersed in comparison with the Hungarian “model.” While the old “retention” elites exert the most power, they still have to share it with other political elites in the country: though only in power for a short time, the center-right political elite continued the old pattern of governing the economy and filled positions in the public sector with party candidates and friends.</span></p><p class="chapter-para" data-dcnode-id="2680"><span data-dcnode-id="2685" instrument_node="">Another factor which also helps explain the Slovenian pattern is the electoral system. In Slovenia, a proportional system combined with a low electoral threshold leads to multiparty coalitions usually composed of more than three parties. The mixed proportional (PR)/majoritarian system in Hungary, on the other hand, translated Fidesz’s electoral victory in 2010 into one-party rule. The Slovenian elites were “forced” to share their power with other members of the coalition, which largely prevented an absolute concentration of power in the hands of only one party.</span><span class="xrefLink" data-dcnode-id="2684" id="jumplink-fn0051"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2681" data-google-interstitial="false" data-open="fn0051" href="javascript:;" reveal-id="fn0051"><sup data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">51</span></sup></a></p><p class="chapter-para" data-dcnode-id="2674"><span data-dcnode-id="2679" instrument_node="">Democratic backsliding in Slovenia can be hardly described as just another version of authoritarian constitutionalism. There are regular and free elections which usually lead to a change of power, all of which are minimum prerequisites of “electoral democracy.” Moreover, there are a few institutions (the Constitutional Court, the Human Rights Ombudsman) that still try to ensure a minimum protection of constitutional rights. Nevertheless, other essential rule-of-law institutions are politicized and weak. As a consequence, the political elites use the parallel network of informal rules and practices to achieve near “control” of the democracy in Slovenia. With their extensive network of informal political power, these elites first captured the state and are now distributing the spoils to their cronies. The Slovenian case can therefore be said to resemble other cases of state capture to be found in the region.</span><span class="xrefLink" data-dcnode-id="2678" id="jumplink-fn0052"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2675" data-google-interstitial="false" data-open="fn0052" href="javascript:;" reveal-id="fn0052"><sup data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">52</span></sup></a></p><p class="chapter-para" data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">I would therefore argue that the Slovenian case represents a very subtle form of democratic regression, where competitive political elites control democracy in a non-transparent manner. Since the rule of law and political competition still are in place, albeit in a quite rudimentary form, Slovenia would be better described as a “diminished form of democracy” rather than a “diminished version of authoritarianism.”</span></p><p class="chapter-para" data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">The Hungarian pattern of democratic backsliding appears much more “transparent” than the messy, opaque, and informal Slovenian model. In Hungary, it is more than abundantly clear who is running the government. One could therefore be tempted to think that, because of this supposed transparency, the Hungarian brand of authoritarianism presents less of a puzzle than Slovenia. All that is needed are new elections and the victory of the opposition, and the Fidesz government will be replaced. The situation, however, is much more complex, and it is here that differences between the two models end and similarities begin.</span></p><p class="chapter-para" data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">Although firmly entrenched in the Constitution, Orbán’s authoritarian rule needs to be translated into practice to become effective. Yet between the formal entrenchment and practical implementation of the new rules, there lie a number of mediating factors that could either prevent or help the transformation of the nature of the Hungarian constitutional system. As in Slovenia, in order to change the Hungarian authoritarian regime, it is not enough to change the formal rules. Consolidation of constitutional democracy in both countries requires much more, although changing the rules is a prerequisite for change in the Hungarian case.</span></p><p class="chapter-para" data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">The first similarity that should be pointed out is that political opposition and civil society remain weak and disorganized in both countries. It is not entirely clear that either the opposition or civil society groups actually want to change the nature of the political system in either country. This is especially true of the opposition parties which, while in power, resorted to practices very similar to those now being used by the government.</span></p><p class="chapter-para" data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">The role of both the Slovenian and Hungarian Constitutional Courts in controlling the excesses of the executive will be of utmost importance for the quality of constitutional democracy. Despite the fact that both courts emerged as some of the strongest courts in the region, their importance is currently being undermined.</span></p><p class="chapter-para" data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">The role of regular courts and other rule-of-law institutions will also crucially affect the implementation of rules in both countries. The regular courts, which have been a major disappointment in Slovenia, are showing some important signs of consolidation and independence in Hungary. How the new authoritarian regime is going to affect their jurisprudence is yet to be seen. Needless to say, the effectiveness of anti-corruption campaigns needs to be significantly strengthened in both countries.</span></p><p class="chapter-para" data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">While rule-of-law institutions can represent a decisive check on the arbitrariness of the executive power, they alone cannot prevent authoritarianism. Only democracy has this power. In other words, if citizens continue to vote for autocrats, rule-of-law institutions alone are not enough to stop the rise of dictators.</span></p><p class="chapter-para" data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">Notwithstanding the fact that these two forms of democratic regression in Central Europe reveal many differences, I would argue that the similarities are even more important: the differences as such do not predetermine which of the two models will be more or less resistant to further transformation of both regimes.</span></p><p class="chapter-para" data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Section 3 will examine these similarities and try to explain their role in bringing about the crises of constitutional democracy in Central Europe.</span></p><span data-dcnode-id="2655" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="2653" data-legacy-id="s7" id="27243691" scrollto-destination="27243691"><span data-dcnode-id="2654" instrument_node="">3. The origin and the causes of the crisis</span></h2><span data-dcnode-id="2652" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2645"><span data-dcnode-id="2651" instrument_node="">The constitutional crisis in Central and Eastern Europe largely coincides with a worldwide trend of democratic recession and fatigue</span><span class="xrefLink" data-dcnode-id="2650" id="jumplink-fn0053"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2647" data-google-interstitial="false" data-open="fn0053" href="javascript:;" reveal-id="fn0053"><sup data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">53</span></sup></a><span data-dcnode-id="2646" instrument_node=""> and with the biggest crisis the EU has faced since its inception. One of the key questions is whether backsliding and democratic regression in Central and Eastern Europe partakes of the more general trend or represents a specific crisis. Using the cases of Hungary and Slovenia, I argue that the current constitutional crisis in both countries and in the region as a whole represents a specific crisis the origins of which derive from certain “deep-structure” features of the transition in Central and Eastern Europe. The constitutional crisis is, of course, related to the implications of the global and EU economic and financial crisis, but its real roots lie elsewhere. My claim is that while the EU economic crisis accelerated and deepened the constitutional crisis, it was not its primary cause. In order to understand the current crisis, we need to return to 1989 and look at how institutional actors in the region approached the transition from socialism to democracy.</span></p><p class="chapter-para" data-dcnode-id="2633"><span data-dcnode-id="2644" instrument_node="">My core argument is that the simplistic/linear theory of transitional constitutionalism made a profound impression on the actual transition process in Central and Eastern Europe. The basic idea was that the transition is “an intermediary stage” between points A and B, “where A is the old, sham, communist constitutionalism . . .,” and B “is identified with Western, liberal-democratic, ‘actually existing’ constitutionalism.”</span><span class="xrefLink" data-dcnode-id="2643" id="jumplink-fn0054"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2640" data-google-interstitial="false" data-open="fn0054" href="javascript:;" reveal-id="fn0054"><sup data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">54</span></sup></a><span data-dcnode-id="2639" instrument_node=""> Although alternative, “fancy” or “exceptional” theories were present, they were overshadowed by this simplistic approach. These theories claimed that “post-communist constitutionalism is ‘transitional’, but not in the sense of being an interim space between the two reasonably identifiable points of departure and arrival. Rather, this type has some characteristics of its own which do not collapse into the exigencies of passage from A to B.”</span><span class="xrefLink" data-dcnode-id="2638" id="jumplink-fn0055"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2635" data-google-interstitial="false" data-open="fn0055" href="javascript:;" reveal-id="fn0055"><sup data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">55</span></sup></a><span data-dcnode-id="2634" instrument_node=""> It should also be noted that the simplistic theories of transition were also deeply ingrained in the doctrine of the so-called Washington consensus, which strongly shaped the process of institution building during the transition period.</span></p><p class="chapter-para" data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">I would argue that there are deep structural reasons behind the crisis in Central and Eastern Europe, the absence of a tradition of rule of law in this part of the world prior to 1989 being one of the key reasons for the current malaise. Other key reasons include the shallow institutionalization of the rule-of-law institutions, the adverse effects of legal constitutionalism on the quality of democracy and rule of law in CEE countries and the ahistorical approach of the one-size-fits-all ideology of transitional constitutionalism.</span></p><span data-dcnode-id="2630" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2628" data-legacy-id="s8" id="27243695" scrollto-destination="27243695"><span data-dcnode-id="2629" instrument_node="">3.1. “Forms without substance”: shallow institutionalization of the rule of law</span></h3><span data-dcnode-id="2627" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2618"><span data-dcnode-id="2626" instrument_node="">The simplistic theory of transition contributed to a </span><em data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">“shallow institutionalization” of rule-of-law norms and practices in CEE countries.</span></em><span data-dcnode-id="2623" instrument_node=""> While policy strongly emphasized “getting institutions right” and required the formal compliance of the newly introduced institutions with idealized Western models, much less attention was paid to the actual implementation and enforcement of the new rules. As a result, many rule-of-law institutions mostly took the form of “façade” institutions, devoid of importance or real substance. As already mentioned, they resemble “forms without substance” from the late-nineteenth-century modernization experiences, when CEE countries unsuccessfully attempted to emulate Western European democratic institutions.</span><span class="xrefLink" data-dcnode-id="2622" id="jumplink-fn0056"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2619" data-google-interstitial="false" data-open="fn0056" href="javascript:;" reveal-id="fn0056"><sup data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">56</span></sup></a></p><p class="chapter-para" data-dcnode-id="2611"><span data-dcnode-id="2617" instrument_node="">A major part of the rule-of-law structures in contemporary Central and Eastern Europe was built during the age of the Washington consensus. The term Washington consensus usually refers to a set of policies advocating economic liberalization, privatization and fiscal austerity initially designed in the 1980s and 1990s by the IMF, the World Bank, and the US Treasury to respond to the economic crisis in Latin America.</span><span class="xrefLink" data-dcnode-id="2616" id="jumplink-fn0057"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2613" data-google-interstitial="false" data-open="fn0057" href="javascript:;" reveal-id="fn0057"><sup data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">57</span></sup></a><span data-dcnode-id="2612" instrument_node=""> Later, a similar set of policies was applied to the former Communist countries in Central and Eastern Europe. The Washington consensus is now known to have had a strong anti-statist bias. More attention was paid to courts, judges, property law, and contracts than to the administrative agencies, civil servants, and regulatory policies needed to implement various developmental policies of the state. The neoliberal ideology underpinning the Washington consensus was anti-statist in the sense that it did not provide much room for the state as a regulator of economic activity. The only role left for the state was to protect property rights, enforce contracts and protect against the arbitrary use of governmental power.</span></p><p class="chapter-para" data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">It is therefore hardly a surprise that during the initial stage of the transition, the process of building public law institutions was less important than the process of economic reform.</span></p><p class="chapter-para" data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">It was only during the period of EU enlargement that reforms of public law institutions came to the top of the agendas of both the CEE governments and the Commission. But given the prevalent mentality of the time, even EU-initiated reforms of public law institutions could not escape the dogmatic formalism of neo-liberal development experts. In other words, civil service reforms, anti-corruption campaigns, transparency initiatives, and, more recently, the creation of new developmental agencies mainly involved creating more and more new rules; if the new rules did not function, they were replaced with yet another set of rules.</span></p><p class="chapter-para" data-dcnode-id="2596"><span data-dcnode-id="2606" instrument_node="">While the initial effects of Europeanization in Central and Eastern Europe were immediately felt, they led to more “shallow” institutionalization of European prin ciples and ideas.</span><span class="xrefLink" data-dcnode-id="2605" id="jumplink-fn0058"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2602" data-google-interstitial="false" data-open="fn0058" href="javascript:;" reveal-id="fn0058"><sup data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">58</span></sup></a><span data-dcnode-id="2601" instrument_node=""> Reformers in CEE countries were under strong pressure to adopt adequate institutions post-haste in order to satisfy various conditionality requirements. Unlike in the old member states, the process of institution building was a short one with very limited sets of institutional and policy choices.</span><span class="xrefLink" data-dcnode-id="2600" id="jumplink-fn0059"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2597" data-google-interstitial="false" data-open="fn0059" href="javascript:;" reveal-id="fn0059"><sup data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">59</span></sup></a></p><p class="chapter-para" data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">The desire of reformers to create institutions that “look” European had an import ant legitimizing effect during the accession negotiations. The rhetoric of “a return to Europe” was an important political and ideological device used by the CEE elites during the enlargement process. The question of whether the return to Europe helped to create the robust and well-working institutions sorely needed by the nascent democracies in Central and Eastern Europe or led to “Potemkin” harmonization resulting in formal structures designed to please the EU, but having little impact on actual domestic outcomes, has become a fundamental part of transition literature.</span></p><p class="chapter-para" data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">Many examples from Section 2 of this paper clearly illustrate the shallowness of the institutionalization of rule-of-law institutions in Hungary in Slovenia. Both countries adopted Western-style civil service laws, statutes declaring the independence of the judiciary and modern anticorruption strategies, but these new formal rules neither created professional, politically independent judiciaries or civil services nor provided effective tools for fighting corruption.</span></p><p class="chapter-para" data-dcnode-id="2580"><span data-dcnode-id="2591" instrument_node="">As a consequence, rule-of-law institutions like the judiciary, the civil service, anti-corruption commissions, the media, etc., which are essential for constitutional democracy, have very superficial roots in these post-communist societies.</span><span class="xrefLink" data-dcnode-id="2590" id="jumplink-fn0060"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2587" data-google-interstitial="false" data-open="fn0060" href="javascript:;" reveal-id="fn0060"><sup data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">60</span></sup></a><span data-dcnode-id="2586" instrument_node=""> Vladimir Tismaneanu’s nearly prophetic argument that “political reform in all these post-communist societies has not gone far enough in strengthening counter-majoritarian institutions (including media and the market economy) that would diminish the threat of new authoritarian experiments catering to powerful egalitarian-populist sentiments” therefore is not surprising.</span><span class="xrefLink" data-dcnode-id="2585" id="jumplink-fn0061"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2582" data-google-interstitial="false" data-open="fn0061" href="javascript:;" reveal-id="fn0061"><sup data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">61</span></sup></a><span data-dcnode-id="2581" instrument_node=""> As I argue below, a key focus of the institutional reforms of the next few years must be on strengthening rule-of-law institutions. In Section 4, I will address the interesting and important question of whether a stronger judiciary, a more independent civil service and more efficient anti-corruption agencies will be able to change the authoritarian nature of the new Hungarian constitutional order or help to prevent a further slide towards state capture in Slovenia.</span></p><span data-dcnode-id="2579" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2577" data-legacy-id="s9" id="27243704" scrollto-destination="27243704"><span data-dcnode-id="2578" instrument_node="">3.2. Legal versus political constitutionalism</span></h3><span data-dcnode-id="2576" instrument_node="">
