</span><meta content="This paper discusses the current prospects of democracy in Europe from four perspectives: the birdʼs-eye view of long-term trends; the perspective of citizens’ support of democratic principles and their dissatisfaction with the way democracy works in their own countries; the voters’ perspective, which points to the rise of populist challengers in reaction to rising democratic dissatisfaction; and the elites’ perspective of populists in power. Overall, there is reason for concern, but no reason to dramatize. The long-term trends point to the expansion of democracy; the citizens’ support for democracy is still massive in Europe. At the same time, democratic dissatisfaction is widespread, giving rise to the surge of populist challengers from the left and the right. However, even if they gain power, populists meet with a&amp;nbsp;large number of constraints that stabilize democracy." data-dcnode-id="3661" name="dc.description"><span data-dcnode-id="3660" instrument_node="">

</span><meta content="This paper discusses the current prospects of democracy in Europe from four perspectives: the birdʼs-eye view of long-term trends; the perspective of citizens’ support of democratic principles and their dissatisfaction with the way democracy works in their own countries; the voters’ perspective, which points to the rise of populist challengers in reaction to rising democratic dissatisfaction; and the elites’ perspective of populists in power. Overall, there is reason for concern, but no reason to dramatize. The long-term trends point to the expansion of democracy; the citizens’ support for democracy is still massive in Europe. At the same time, democratic dissatisfaction is widespread, giving rise to the surge of populist challengers from the left and the right. However, even if they gain power, populists meet with a large number of constraints that stabilize democracy." data-dcnode-id="3405" property="og:description"><span data-dcnode-id="3404" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1214" data-track-component="article body"><span data-dcnode-id="2968" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="2961" data-gtm-vis-first-on-screen-50443292_562="1582" data-gtm-vis-first-on-screen-50443292_563="1581" data-gtm-vis-polling-id-50443292_562="104" data-gtm-vis-polling-id-50443292_563="98" data-gtm-vis-recent-on-screen-50443292_562="1582" data-gtm-vis-recent-on-screen-50443292_563="1581" data-gtm-vis-total-visible-time-50443292_562="9300" data-gtm-vis-total-visible-time-50443292_563="9500" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2962" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2966" id="Abs1"><span data-dcnode-id="2967" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2963" id="Abs1-content"><p data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">This paper discusses the current prospects of democracy in Europe from four perspectives: the birdʼs-eye view of long-term trends; the perspective of citizens’ support of democratic principles and their dissatisfaction with the way democracy works in their own countries; the voters’ perspective, which points to the rise of populist challengers in reaction to rising democratic dissatisfaction; and the elites’ perspective of populists in power. Overall, there is reason for concern, but no reason to dramatize. The long-term trends point to the expansion of democracy; the citizens’ support for democracy is still massive in Europe. At the same time, democratic dissatisfaction is widespread, giving rise to the surge of populist challengers from the left and the right. However, even if they gain power, populists meet with a&nbsp;large number of constraints that stabilize democracy.</span></p></div></div></section><section aria-labelledby="Abs2" data-dcnode-id="2954" data-gtm-vis-first-on-screen-50443292_562="1583" data-gtm-vis-first-on-screen-50443292_563="1581" data-gtm-vis-polling-id-50443292_562="105" data-gtm-vis-polling-id-50443292_563="99" data-gtm-vis-recent-on-screen-50443292_562="1583" data-gtm-vis-recent-on-screen-50443292_563="1581" data-gtm-vis-total-visible-time-50443292_562="9200" data-gtm-vis-total-visible-time-50443292_563="9500" data-title="Zusammenfassung" lang="de"><div class="c-article-section" data-dcnode-id="2955" id="Abs2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2959" id="Abs2"><span data-dcnode-id="2960" instrument_node="">Zusammenfassung</span></h2><div class="c-article-section__content" data-dcnode-id="2956" id="Abs2-content"><p data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">Dieser Artikel diskutiert die gegenwärtige Lage der Demokratie in Europa aus vier verschiedenen Perspektiven: aus der Vogelperspektive der langfristigen Trends, aus der Perspektive der Unterstützung demokratischer Prinzipien durch die Bürgerinnen und Bürger sowie ihrer Unzufriedenheit mit der Art und Weise, wie die Demokratie in ihrem Land tatsächlich funktioniert, aus der Perspektive der Wählerinnen und Wähler, die sich als Reaktion auf ihre demokratische Unzufriedenheit in zunehmendem Maße für populistische Herausforderer entscheiden, und aus der Perspektive der Eliten, welche Bezug nimmt auf Populisten an der Macht. Insgesamt besteht Grund zur Besorgnis, aber kein Grund zu dramatisieren. Die langfristigen Trends stehen im Zeichen einer Ausweitung der Demokratie, und die Unterstützung der Demokratie in Europa ist noch immer massiv. Allerdings ist auch die demokratische Unzufriedenheit weit verbreitet und bildet die Treibkraft für den Aufstieg populistischer Herausforderer von links und von rechts. Selbst wenn sie an die Macht gelangen, unterliegen diese aber einer Reihe von Einschränkungen, welche zur Stabilisierung der Demokratie beitragen.</span></p></div></div></section><span data-dcnode-id="2953" instrument_node="">
</span><section data-dcnode-id="2863" data-gtm-vis-first-on-screen-50443292_562="1583" data-gtm-vis-first-on-screen-50443292_563="1581" data-gtm-vis-polling-id-50443292_562="106" data-gtm-vis-polling-id-50443292_563="100" data-gtm-vis-recent-on-screen-50443292_562="1583" data-gtm-vis-recent-on-screen-50443292_563="1581" data-gtm-vis-total-visible-time-50443292_562="9200" data-gtm-vis-total-visible-time-50443292_563="9500" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2864" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2951" id="Sec1"><span data-dcnode-id="2952" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2865" id="Sec1-content"><p data-dcnode-id="2943"><span data-dcnode-id="2950" instrument_node="">From the vantage point of the Chinese elites, not only free market capitalism but also Western-style democracy has lost its attraction, and they suggest that “90&nbsp;percent of democracies created after the fall of the Soviet Union have now failed” (Wolf </span><a aria-label="Reference 2018" data-dcnode-id="2948" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d189959617e431" title="Wolf, Martin. 2018. How the Beijing elite sees the world. Financial Times: May&nbsp;1, 2018."><span data-dcnode-id="2949" instrument_node="">2018</span></a><span data-dcnode-id="2947" instrument_node="">). There might be some wishful thinking involved in their assessment of the state of democracy across the globe. But in Europe, too, the democratic “Zeitgeist” has become more pessimistic (Brunkert et&nbsp;al. </span><a aria-label="Reference 2018" data-dcnode-id="2945" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d189959617e434" title="Brunkert, Lennart, Stefan Kruse, and Christian Welzel. 2018. A tale of culture-bound regime revolution: the centennial democratic trend and its recent reversal. Democratization 25:1–23. 
https://doi.org/10.1080/13510347.2018.1542430

."><span data-dcnode-id="2946" instrument_node="">2018</span></a><span data-dcnode-id="2944" instrument_node="">), and the current public debate about democracy suggests that liberal democracy is in crisis. In Europe, the rise of populism from the right and the left; the imposition of austerity on southern European countries by the Troika; Brexit; and the illiberal measures taken by governments in Hungary and Poland are interpreted by pundits—academics as well as public intellectuals—as so many signs of a&nbsp;crisis of democracy.</span></p><p data-dcnode-id="2920"><span data-dcnode-id="2942" instrument_node="">The current situation in Europe reminds me of the early 1970s, when preoccupied observers identified “a&nbsp;breakdown in consensus,” “a&nbsp;political and economic decline,” and “a&nbsp;crisis of democracy.” This crisis talk came in two versions (Held </span><a aria-label="Reference 2006" data-dcnode-id="2940" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d189959617e440" title="Held, David. 2006. Models of democracy, 3rd&nbsp;edn., Cambridge: Polity Press."><span data-dcnode-id="2941" instrument_node="">2006</span></a><span data-dcnode-id="2939" instrument_node="">): those arguing from the premises of a&nbsp;pluralist theory of politics and those arguing from Marxist theory. According to the doomsayers from left and right, the liberal democratic state had become increasingly hamstrung or ineffective in the face of growing demands that were either “excessive” (Crozier et&nbsp;al. </span><a aria-label="Reference 1975" data-dcnode-id="2937" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d189959617e443" title="Crozier, Michel, Samuel P.&nbsp;Huntington, and Joji Watanuki. 1975. The crisis of democracy. Report on the governability of democracies to the Trilateral Commission. New York: University Press."><span data-dcnode-id="2938" instrument_node="">1975</span></a><span data-dcnode-id="2936" instrument_node="">) or the “inevitable result of the contradictions within which the state is enmeshed” (Offe </span><a aria-label="Reference 1984" data-dcnode-id="2934" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d189959617e446" title="Offe, Claus. 1984. Contradictions of the Welfare State. London: Hutchinson."><span data-dcnode-id="2935" instrument_node="">1984</span></a><span data-dcnode-id="2933" instrument_node="">; Habermas </span><a aria-label="Reference 1973" data-dcnode-id="2931" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d189959617e449" title="Habermas, Jürgen. 1973. Legitimationsprobleme im Spätkapitalismus. Frankfurt am Main: Suhrkamp."><span data-dcnode-id="2932" instrument_node="">1973</span></a><span data-dcnode-id="2930" instrument_node="">). The crisis talk of these theories was later disconfirmed by a&nbsp;large comparative research program—the “Beliefs in Government” program (Klingemann and Fuchs </span><a aria-label="Reference 1995" data-dcnode-id="2928" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d189959617e452" title="Klingemann, Hans-Dieter, and Dieter Fuchs (eds.). 1995. Citizens and the State. Oxford: U Press."><span data-dcnode-id="2929" instrument_node="">1995</span></a><span data-dcnode-id="2927" instrument_node="">)—that was triggered by the very preoccupations with the alleged democratic crisis. The results of this program showed that Western representative democracies proved to be perfectly capable of absorbing and assimilating growing pressure from societal problems, and the forms of political expression taken by such pressure could be understood as the normal manifestations of democracy in complex societies. By the time these results were published, however, nobody cared anymore about the crisis of democracy. In the meantime, the Berlin Wall had fallen, democracy had triumphed, pundits had declared the “end of history,” and the public had moved on. But the dominant mood soon changed again, and the crisis talk did return in new garb. In 2000, a&nbsp;follow-up study under the title of “Disaffected Democracies” was newly preoccupied by the lack of public confidence in leaders and institutions of democratic governance (Pharr and Putnam </span><a aria-label="Reference 2000" data-dcnode-id="2925" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d189959617e456" title="Pharr, Susan J., and Robert D.&nbsp;Putnam (eds.). 2000. Disaffected democracies. What’s troubling the trilateral countries? Princeton: U Press."><span data-dcnode-id="2926" instrument_node="">2000</span></a><span data-dcnode-id="2924" instrument_node="">). The study argued that the causes for the decline of confidence did not lie in the social fabric, nor were they the result of general economic conditions. The problem, it suggested, was with government and politics themselves. Similarly, the contributors of yet another study on political disaffection in contemporary democracies (Torcal and Montero </span><a aria-label="Reference 2006" data-dcnode-id="2922" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d189959617e459" title="Torcal, Mariano, and José Ramón Montero. 2006. Political disaffection in contemporary democracies. London: Routledge."><span data-dcnode-id="2923" instrument_node="">2006</span></a><span data-dcnode-id="2921" instrument_node="">) highlighted the decisive role of politics and institutions in shaping political disaffection.</span></p><p data-dcnode-id="2897"><span data-dcnode-id="2919" instrument_node="">In the more recent past, pessimism about the state of Western democracy has again increased. Larry Diamond (</span><a aria-label="Reference 2015" data-dcnode-id="2917" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d189959617e465" title="Diamond, Larry. 2015. Facing up to the democratic recession. Journal of Democracy 26(1):141–155."><span data-dcnode-id="2918" instrument_node="">2015</span></a><span data-dcnode-id="2916" instrument_node="">) writes about “a&nbsp;democratic recession,” and Marc Plattner (</span><a aria-label="Reference 2017" data-dcnode-id="2914" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d189959617e468" title="Plattner, Marc F. 2017. Liberal democracy’s fading allure. Journal of Democracy 28(4):5–14."><span data-dcnode-id="2915" instrument_node="">2017</span></a><span data-dcnode-id="2913" instrument_node="">) sees democracies “on the defensive.” In 2018, the academic observers’ tone became more alarmist still. Sasha Mounk (</span><a aria-label="Reference 2018" data-dcnode-id="2911" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d189959617e471" title="Mounk, Yascha. 2018. The people vs. democracy. Why our freedom is in danger and how to save it. Harvard: U Press."><span data-dcnode-id="2912" instrument_node="">2018</span></a><span data-dcnode-id="2910" instrument_node="">) published a&nbsp;treatise entitled </span><i data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">The People vs Democracy</span></i><span data-dcnode-id="2907" instrument_node="">, Steven Levitsky and Daniel Ziblatt (</span><a aria-label="Reference 2018" data-dcnode-id="2905" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d189959617e477" title="Levitsky, Steven, and Daniel Ziblatt. 2018. How democracies die. N.Y.: Crown."><span data-dcnode-id="2906" instrument_node="">2018</span></a><span data-dcnode-id="2904" instrument_node="">) discussed “how democracies die,” and David Runciman (</span><a aria-label="Reference 2018" data-dcnode-id="2902" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d189959617e481" title="Runciman, David. 2018. How democracy ends. London: Profile Books."><span data-dcnode-id="2903" instrument_node="">2018</span></a><span data-dcnode-id="2901" instrument_node="">) similarly wrote about “how democracy ends.” Is this time different? Are we heading for a&nbsp;truly transformative crisis of western democracy? Although I&nbsp;share some of the concerns of the more alarmist colleagues, I&nbsp;do not think we should dramatize the current situation. I&nbsp;side with </span><i data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">The Economist</span></i><span data-dcnode-id="2898" instrument_node="">, which, in its June 16,&nbsp;2018, issue suggested that “reports on the death of democracy are greatly exaggerated.” But, it added, “the least bad system of government ever devised is in trouble. It needs defenders.” And I&nbsp;think one way to defend it is to get the facts right and to base our expectations about the future of democracy on the best available empirical evidence.</span></p><p data-dcnode-id="2883"><span data-dcnode-id="2896" instrument_node="">I&nbsp;shall discuss the current situation of democracy from four perspectives. With the exception of the first perspective, I&nbsp;shall focus on the situation of democracy in Europe. First, I&nbsp;briefly adopt the </span><i data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">bird’s-eye perspective</span></i><span data-dcnode-id="2893" instrument_node=""> of the long-term trends to reassure us where we ought to situate the argument in the grand scheme of things. Next, I&nbsp;adopt </span><i data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">the perspective of the citizens</span></i><span data-dcnode-id="2890" instrument_node=""> and ask whether they adhere to the principles of democracy and how they evaluate democracy in their own countries. Although I&nbsp;agree with Levitsky and Ziblatt (</span><a aria-label="Reference 2018" data-dcnode-id="2888" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d189959617e496" title="Levitsky, Steven, and Daniel Ziblatt. 2018. How democracies die. N.Y.: Crown."><span data-dcnode-id="2889" instrument_node="">2018</span></a><span data-dcnode-id="2887" instrument_node="">, p.&nbsp;19) that the citizens’ democratic values do not provide a&nbsp;guarantee for the survival of democracy, following Almond and Verba (</span><a aria-label="Reference 1965" data-dcnode-id="2885" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d189959617e499" title="Almond, Gabriel, and Sidney Verba. 1965. The civic culture. Princeton, NJ: Princeton University Press."><span data-dcnode-id="2886" instrument_node="">1965</span></a><span data-dcnode-id="2884" instrument_node="">) I&nbsp;believe that such values constitute a&nbsp;necessary condition for democracy’s survival, as well as a&nbsp;key constraint of possible relapses into authoritarianism. While people cannot shape at will the government they possess, the governments cannot ignore the will of the people in the long run. I&nbsp;shall compare the citizens’ values with their evaluation of democracy and show that there is widespread dissatisfaction with the way democracy works, even if citizens across Europe essentially share democratic principles.</span></p><p data-dcnode-id="2866"><span data-dcnode-id="2882" instrument_node="">Third, I&nbsp;adopt the </span><i data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">perspective of the voters</span></i><span data-dcnode-id="2879" instrument_node=""> and discuss their reaction to the widespread dissatisfaction—the decline of mainstream parties and the rise of populist challengers. The “Zeitgeist” is not only pessimistic about democracy, it is also heavily populist (Mudde </span><a aria-label="Reference 2004" data-dcnode-id="2877" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d189959617e509" title="Mudde, Cas. 2004. The Populist Zeitgeist. Government and Opposition 39(4):542–563."><span data-dcnode-id="2878" instrument_node="">2004</span></a><span data-dcnode-id="2876" instrument_node="">). According to a&nbsp;common view, populists in particular constitute an increasing threat to liberal democracy (Müller </span><a aria-label="Reference 2016" data-dcnode-id="2874" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d189959617e512" title="Müller, Jan-Werner. 2016. What is populism? Philadelphia: University of Pennsylvania Press."><span data-dcnode-id="2875" instrument_node="">2016</span></a><span data-dcnode-id="2873" instrument_node="">). While acknowledging the rise of populism, I&nbsp;shall suggest that we need to be careful about how to interpret it. In particular, we need to distinguish between the two forces on which it builds—on the one hand, the substantive demands of citizens, which are rooted in long-term structural transformations of society, and on the other hand, democratic dissatisfaction. Finally, I&nbsp;shall turn to </span><i data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">the perspective of the elites</span></i><span data-dcnode-id="2870" instrument_node="">, i.e., to the question of what happens when populists get into power. As Norris (</span><a aria-label="Reference 2017" data-dcnode-id="2868" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d189959617e518" title="Norris, Pippa. 2017. Is Western democracy backsliding? Diagnosing the risks. Journal of Democracy Web Exchange. 
https://www.journalofdemocracy.org/online-exchange-democratic-deconsolidation/

."><span data-dcnode-id="2869" instrument_node="">2017</span></a><span data-dcnode-id="2867" instrument_node="">) has usefully pointed out, consolidation of democracy not only means that the overwhelming majority of people believe that democracy is the best form of government, it also means that all major actors and organs of the state reflect democratic norms and practices and no significant group actively seeks to overthrow the regime or secede from the state. The question is to what extent this second condition is currently guaranteed in Europe. I&nbsp;shall discuss five factors that serve to constrain the threat posed by populists in power—institutional constraints, partisan constraints, international constraints, and market constraints, as well as the already mentioned citizens’ constraints. My overall assessment of the state of democracy in Europe is that there is reason for concern, but no reason to dramatize.</span></p></div></div></section><section data-dcnode-id="2803" data-gtm-vis-first-on-screen-50443292_562="1584" data-gtm-vis-first-on-screen-50443292_563="1581" data-gtm-vis-polling-id-50443292_562="107" data-gtm-vis-polling-id-50443292_563="101" data-gtm-vis-recent-on-screen-50443292_562="1584" data-gtm-vis-recent-on-screen-50443292_563="1581" data-gtm-vis-total-visible-time-50443292_562="9200" data-gtm-vis-total-visible-time-50443292_563="9500" data-title="The Bird’s-eye Perspective: The Centennial Trends"><div class="c-article-section" data-dcnode-id="2804" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2861" id="Sec2"><span data-dcnode-id="2862" instrument_node="">The Bird’s-eye Perspective: The Centennial Trends</span></h2><div class="c-article-section__content" data-dcnode-id="2805" id="Sec2-content"><p data-dcnode-id="2847"><span data-dcnode-id="2860" instrument_node="">The bird’s-eye perspective is the view of modernization theory and that of Steven Pinker (</span><a aria-label="Reference 2018" data-dcnode-id="2858" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d189959617e529" title="Pinker, Seven. 2018. Enlightenment now. The case for reason, science, humanism and progress. London: Penguin Books."><span data-dcnode-id="2859" instrument_node="">2018</span></a><span data-dcnode-id="2857" instrument_node="">, p.&nbsp;199–213). The latter presents evidence based on Polity&nbsp;IV data that show a&nbsp;long-term spread of democracy across the world. He also suggests that the spread of democracy across the globe has contributed to the spread of human rights. A&nbsp;recent survey of the state of democracy across the globe (Van Beek et&nbsp;al. </span><a aria-label="Reference 2018" data-dcnode-id="2855" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d189959617e532" title="Van Beek, Ursula, Dieter Fuchs, and Hans-Dieter Klingemann. 2018. Conclusions. The question of legitimacy in contemporary democracies. In Democracy under threat: A crisis of legitimacy?, ed. Ursula Van Beek. Berlin Heidelberg: Springer."><span data-dcnode-id="2856" instrument_node="">2018</span></a><span data-dcnode-id="2854" instrument_node="">) could not find any signs of democratic backsliding for the established democracies of the West, even if there were various problems in other parts of the world. Based on Varieties of Democracy (V-Dem) data, the best data currently available, Brunkert et&nbsp;al. (</span><a aria-label="Reference 2018" data-dcnode-id="2852" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d189959617e535" title="Brunkert, Lennart, Stefan Kruse, and Christian Welzel. 2018. A tale of culture-bound regime revolution: the centennial democratic trend and its recent reversal. Democratization 25:1–23. 
https://doi.org/10.1080/13510347.2018.1542430

."><span data-dcnode-id="2853" instrument_node="">2018</span></a><span data-dcnode-id="2851" instrument_node="">) present the centennial democratic trends for democracy overall as well as for its participatory, liberal, and electoral components, which all have been rising in the long run (see Fig.&nbsp;</span><a data-dcnode-id="2849" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2850" instrument_node="">1</span></a><span data-dcnode-id="2848" instrument_node="">). According to these data, there is evidence that the long-term trend has stalled since the turn of the millennium and shows some signs of a&nbsp;reversal, almost all over the globe. We should note, however, that this setback has been limited so far and that it is occurring at an unprecedented level of democratization across the globe.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2820" data-gtm-vis-first-on-screen-50443292_561="1581" data-gtm-vis-polling-id-50443292_561="103" data-gtm-vis-recent-on-screen-50443292_561="1581" data-gtm-vis-total-visible-time-50443292_561="9300" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="2821"><figcaption data-dcnode-id="2844"><b class="c-article-section__figure-caption" data-dcnode-id="2845" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="2846" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2832"><div class="c-article-section__figure-item" data-dcnode-id="2839"><a class="c-article-section__figure-link" data-dcnode-id="2840" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11615-020-00231-9/figures/1" rel="nofollow"><picture data-dcnode-id="2841"><source data-dcnode-id="2843" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11615-020-00231-9/MediaObjects/11615_2020_231_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="2842" height="418" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11615-020-00231-9/MediaObjects/11615_2020_231_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2833" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="2834"><span data-dcnode-id="2838" instrument_node="">The centennial democratic trend (global democracy averages). Data are from the Varieties of Democracy (V-Dem) project (www.v-dem.net) and cover between 85 (in 1900) and 175 countries (in 2016). To calculate yearly global averages, we weighted countries for the size of their population. Comprehensive democracy is the product of V‑Dem’s electoral, participatory, and liberal components. Source: Brunkert et&nbsp;al. (</span><a aria-label="Reference 2018" data-dcnode-id="2836" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d189959617e547" title="Brunkert, Lennart, Stefan Kruse, and Christian Welzel. 2018. A tale of culture-bound regime revolution: the centennial democratic trend and its recent reversal. Democratization 25:1–23. 
https://doi.org/10.1080/13510347.2018.1542430

."><span data-dcnode-id="2837" instrument_node="">2018</span></a><span data-dcnode-id="2835" instrument_node="">, p.&nbsp;6)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2822"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="2823" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11615-020-00231-9/figures/1" rel="nofollow"><span data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2824" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2825" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2826" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2829" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2828" fill-rule="evenodd"></path><span data-dcnode-id="2827" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2806"><span data-dcnode-id="2819" instrument_node="">Modernization theorists such as Christian Welzel and Ronald Inglehart believe that, despite all trending patterns, democracy always has been and continues to be a&nbsp;</span><i data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">strongly culture-bound phenomenon</span></i><span data-dcnode-id="2816" instrument_node=""> and that democracy, in the long run, will impose itself. Thus, Inglehart (</span><a aria-label="Reference 2016" data-dcnode-id="2814" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d189959617e558" title="Inglehart, Ronald F. 2016. The danger of deconsolidation. How much should we worry? Journal of Democracy 27(3):18–23."><span data-dcnode-id="2815" instrument_node="">2016</span></a><span data-dcnode-id="2813" instrument_node="">) suggests that modernization helps to generate conditions conducive to democracy: Cultural change is a&nbsp;major factor in the emergence and survival of democracy, and cultural change goes in the direction of more democracy. Similarly, while acknowledging that there have been reversals in the trends of democratization, Brunkert et&nbsp;al. (</span><a aria-label="Reference 2018" data-dcnode-id="2811" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d189959617e561" title="Brunkert, Lennart, Stefan Kruse, and Christian Welzel. 2018. A tale of culture-bound regime revolution: the centennial democratic trend and its recent reversal. Democratization 25:1–23. 
https://doi.org/10.1080/13510347.2018.1542430

."><span data-dcnode-id="2812" instrument_node="">2018</span></a><span data-dcnode-id="2810" instrument_node="">) emphasize that they have been only temporary. Like Inglehart, they provide reasons for optimism by pointing out that democracy’s cultural seeds—emancipative values—have been rising over the generations and are doing so in most parts of the world, including such seeming strongholds of authoritarianism as China, Russia, Singapore, and Turkey. According to Brunkert et&nbsp;al. (</span><a aria-label="Reference 2018" data-dcnode-id="2808" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d189959617e564" title="Brunkert, Lennart, Stefan Kruse, and Christian Welzel. 2018. A tale of culture-bound regime revolution: the centennial democratic trend and its recent reversal. Democratization 25:1–23. 
https://doi.org/10.1080/13510347.2018.1542430

."><span data-dcnode-id="2809" instrument_node="">2018</span></a><span data-dcnode-id="2807" instrument_node="">), what really matters is the extent to which people’s support for democracy is inspired by emancipative values. And this kind of emancipatory support for democracy is neither in temporal nor generational decline in the most mature democracies, among which we find the western European democracies.</span></p></div></div></section><section data-dcnode-id="2527" data-title="The Citizens’ Perspective: Support of Democratic Principles and Dissatisfaction with the Way Democracy Works"><div class="c-article-section" data-dcnode-id="2528" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2801" id="Sec3"><span data-dcnode-id="2802" instrument_node="">The Citizens’ Perspective: Support of Democratic Principles and Dissatisfaction with the Way Democracy Works</span></h2><div class="c-article-section__content" data-dcnode-id="2529" id="Sec3-content"><h3 class="c-article__sub-heading" data-dcnode-id="2799" id="Sec4"><span data-dcnode-id="2800" instrument_node="">Support of Democratic Principles</span></h3><p data-dcnode-id="2791"><span data-dcnode-id="2798" instrument_node="">Ever since Almond and Verba (</span><a aria-label="Reference 1965" data-dcnode-id="2796" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d189959617e579" title="Almond, Gabriel, and Sidney Verba. 1965. The civic culture. Princeton, NJ: Princeton University Press."><span data-dcnode-id="2797" instrument_node="">1965</span></a><span data-dcnode-id="2795" instrument_node="">), and in line with the notion that democracies are ultimately rooted in a&nbsp;supportive culture, political scientists have argued that stable democracies require supportive attitudes and norms: If citizens hold democratic values, democracy will be safe. In search of empirical support for this argument, Claassen (</span><a aria-label="Reference 2020" data-dcnode-id="2793" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d189959617e582" title="Claassen, Christopher. 2020. Does public support help democracy survive? American Journal of Political Science 64(1):118–134."><span data-dcnode-id="2794" instrument_node="">2020</span></a><span data-dcnode-id="2792" instrument_node="">) has recently built a&nbsp;unique dataset based on 3765 national opinions about democracy, obtained from 1390 nationally representative public opinion surveys in 150 countries. His analysis confirms that the citizens’ support for democracy is robustly linked to the stability of democracy, once it has been established. In adopting the perspective of the European citizens, the pertinent question then becomes whether and to what extent they support liberal democracy today.</span></p><p data-dcnode-id="2786"><span data-dcnode-id="2790" instrument_node="">There are voices that have some doubts about the solidity of the citizens’ support for democracy today. Thus, in a&nbsp;widely cited recent paper, Foa and Mounk (</span><a aria-label="Reference 2016" data-dcnode-id="2788" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d189959617e588" title="Foa, Roberto Stefan, and Yasha Mounk. 2016. The dangers of deconsolidation. Journal of Democracy 27:5–17."><span data-dcnode-id="2789" instrument_node="">2016</span></a><span data-dcnode-id="2787" instrument_node="">) claim that citizens in Western democracies in general are increasingly turning away from democracy. Based on World Values Survey data, they maintain (p.&nbsp;7) that citizens “have become more cynical about the value of democracy as a&nbsp;political system, less hopeful that anything they do might influence public policy, and more willing to express support for authoritarian alternatives.” Moreover, they claim that younger cohorts are particularly affected by the decline in support for democracy.</span></p><p data-dcnode-id="2772"><span data-dcnode-id="2785" instrument_node="">Now, the first thing to note about their dramatic message is that even according to their own data, we need to distinguish between the United States and Europe. While there is a&nbsp;clear decline of support of democracy among younger age groups in the United States, the same does not apply to Europe. Thus, in a&nbsp;reaction to their paper, Inglehart (</span><a aria-label="Reference 2016" data-dcnode-id="2783" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d189959617e594" title="Inglehart, Ronald F. 2016. The danger of deconsolidation. How much should we worry? Journal of Democracy 27(3):18–23."><span data-dcnode-id="2784" instrument_node="">2016</span></a><span data-dcnode-id="2782" instrument_node="">, p.&nbsp;18) interprets their results largely as “a&nbsp;specifically American period effect.” He invokes three points that account for this American effect: the virtual paralysis at the top of the American democracy, massive increases in income inequality, and the disproportionate and growing political influence of billionaires as a&nbsp;result of the extraordinary role played by money in U.S. politics. He points out that existential insecurity undermines democracy, and that existential insecurity has been on the rise among most of the population in the United States—especially among the young. The second point to note is that one has to guard against basic errors when analyzing data such as those used by Foa and Mounk. These errors include exaggerating by cherry-picking cases and by using improper visual presentations of the survey data (Norris </span><a aria-label="Reference 2017" data-dcnode-id="2780" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d189959617e597" title="Norris, Pippa. 2017. Is Western democracy backsliding? Diagnosing the risks. Journal of Democracy Web Exchange. 
https://www.journalofdemocracy.org/online-exchange-democratic-deconsolidation/

."><span data-dcnode-id="2781" instrument_node="">2017</span></a><span data-dcnode-id="2779" instrument_node="">), failing to distinguish generational from life-cycle effects, neglecting the variable composition of the countries in the aggregate European data from one survey to the other (Voeten </span><a aria-label="Reference 2017" data-dcnode-id="2777" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d189959617e600" title="Voeten, Erik. 2017. Are people really turning away from democracy? Journal of Democracy Web Exchange. 
https://www.journalofdemocracy.org/online-exchange-democratic-deconsolidation/

."><span data-dcnode-id="2778" instrument_node="">2017</span></a><span data-dcnode-id="2776" instrument_node="">), and interpreting the data superficially. Using the same World Values Survey data, Voeten (</span><a aria-label="Reference 2017" data-dcnode-id="2774" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d189959617e603" title="Voeten, Erik. 2017. Are people really turning away from democracy? Journal of Democracy Web Exchange. 
https://www.journalofdemocracy.org/online-exchange-democratic-deconsolidation/

."><span data-dcnode-id="2775" instrument_node="">2017</span></a><span data-dcnode-id="2773" instrument_node="">) finds some evidence that U.S. millennials have grown somewhat more accepting of nondemocratic alternatives, but he finds no evidence that people in consolidated democracies in general (Western democracies—EU15&nbsp;members, as well as Canada, the USA, Norway, Switzerland, Australia, and New Zealand, and also Costa Rica, Cyprus, Japan, Lithuania, Mauritius, Slovenia, and Uruguay) have soured on democracy or have become more likely to accept authoritarian institutions as a&nbsp;way to run their countries.</span></p><p data-dcnode-id="2764"><span data-dcnode-id="2771" instrument_node="">Using data from the European Social Survey&nbsp;6 (ESS6), which includes an exceptional set of questions on democracy, I&nbsp;would like to show that </span><i data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">support for the democratic ideal</span></i><span data-dcnode-id="2768" instrument_node=""> is alive and well in Europe, even if there are some regional variations. In the ESS6, which presents the situation in 2012, Europeans were asked how important it was for them “to live in a&nbsp;country that was governed democratically.” They could answer on an 11-point scale, where 0&nbsp;meant not important at all and 10&nbsp;meant “extremely important.” Table&nbsp;</span><a data-dcnode-id="2766" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2767" instrument_node="">1</span></a><span data-dcnode-id="2765" instrument_node=""> presents the average responses in five European regions as well as the percentages of respondents who said that it was extremely important for them to live in a&nbsp;democracy. The five regions include the Nordic countries, continental Europe (including the UK and Ireland), southern Europe, central and eastern Europe, and a&nbsp;group of three countries (Russia, Ukraine, and Kosovo) that are best characterized as “hybrid democracies.” The latter constitute a&nbsp;benchmark for comparative purposes. As the table shows, averages are very high in all the regions. Even in hybrid regimes, they reach appreciable levels. On average, Europeans think that it is very important to live in a&nbsp;country that is governed democratically. In Nordic countries, a&nbsp;two-thirds majority even thinks that it is extremely important to do so. This share is much lower in the other regions, but it is still appreciable in hybrid regimes, where it reaches a&nbsp;bit less than one-third (29%).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2749" data-test="inline-table" id="table-1"><figure data-dcnode-id="2750"><figcaption class="c-article-table__figcaption" data-dcnode-id="2761"><b data-dcnode-id="2762" data-test="table-caption" id="Tab1"><span data-dcnode-id="2763" instrument_node="">Table 1 Importance of living in a&nbsp;country that is a&nbsp;democracy</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2751"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="2752" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11615-020-00231-9/tables/1" rel="nofollow"><span data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2753" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2754" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2755" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2758" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2757" fill-rule="evenodd"></path><span data-dcnode-id="2756" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2738"><span data-dcnode-id="2748" instrument_node="">Based on the ESS6, we can also probe Europeans’ detailed understanding of democracy, i.e., the extent to which they support the </span><i data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">specific principles of liberal democracy</span></i><span data-dcnode-id="2745" instrument_node="">. By way of illustration, Table&nbsp;</span><a data-dcnode-id="2743" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2744" instrument_node="">2</span></a><span data-dcnode-id="2742" instrument_node=""> presents the average importance and the percentage of extremely important responses for two liberal principles of liberal democracy—equality before the law and media freedom. As one can see, the average importance and the shares of citizens who consider the principle of equality before the law extremely important are even higher than the corresponding values for democracy in general, and they are also rather high for media freedom. Strikingly, once we consider specific principles of liberal democracy, there is hardly any variation between the regions anymore. Even in the hybrid democracies, citizens know what it means to live in a&nbsp;democracy. If anything, the exception is now continental Europe, where the corresponding values are lower than in the other regions. In other words, there is a&nbsp;similar understanding of democracy across Europe. This does not only hold for the aspects I&nbsp;have presented here, but it holds more generally across a&nbsp;larger set of specific principles which, together, form a&nbsp;scale for liberal democracy (see Kriesi et&nbsp;al. </span><a aria-label="Reference 2016" data-dcnode-id="2740" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d189959617e685" title="Kriesi, Hanspeter, Willem Saris, and Paolo Moncagatta. 2016. The structure of Europeans’ views of democracy: citizens’ models of democracy. In How Europeans view and evaluate democracy, ed. Monica Ferrin, Hanspeter Kriesi, 64–89. Oxford: U Press."><span data-dcnode-id="2741" instrument_node="">2016</span></a><span data-dcnode-id="2739" instrument_node="">). The fact that in some regions specific democratic principles are rated as more (or less) important than democracy overall may refer to region-specific attitudinal differences: Possibly, citizens in the Nordic countries and in continental Europe are very supportive of the ideals of democracy in general but may take some specific principles of democracy (such as media freedom) for granted. By contrast, citizens from the other regions, where the quality of democracy is typically lower, may be somewhat less supportive of democracy in the abstract, but when asked about specific principles of democracy, they may be very sensitive to the importance of the specific rights and obligations implied by them, given their past (or current) experiences with authoritarian regimes.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2723" data-test="inline-table" id="table-2"><figure data-dcnode-id="2724"><figcaption class="c-article-table__figcaption" data-dcnode-id="2735"><b data-dcnode-id="2736" data-test="table-caption" id="Tab2"><span data-dcnode-id="2737" instrument_node="">Table 2 Importance for democracy that courts treat everyone the same/that media are free to criticize the government</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2725"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="2726" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11615-020-00231-9/tables/2" rel="nofollow"><span data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2727" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2728" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2729" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2732" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2731" fill-rule="evenodd"></path><span data-dcnode-id="2730" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2718"><span data-dcnode-id="2722" instrument_node="">Now, if the overall support of democracy is still guaranteed, there might still be some lack of support among younger generations, as claimed by Foa and Mounk. In an attempt to replicate their results, I&nbsp;rely on the same general question about the importance of living in a&nbsp;country that is governed democratically, and I&nbsp;also follow their choice to consider only the shares of citizens who believe that it is extremely important to live in a&nbsp;democracy. Figure&nbsp;</span><a data-dcnode-id="2720" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2721" instrument_node="">2</span></a><span data-dcnode-id="2719" instrument_node=""> presents the shares of the age cohorts in four out of the five regions (I&nbsp;drop hybrid regimes in this analysis) who believe that it is extremely important to live in a&nbsp;democratic country. As we can see, Foa and Mounk are not entirely wrong: In all four regions, younger cohorts are less enthusiastically embracing the democratic ideal than middle-aged cohorts are. However, the relationship is nowhere as strong as in the United States, and it is somewhat curvilinear in all regions, i.e., not only the youngest, but also the oldest cohorts are less enthusiastic about democracy than are the middle-aged. Moreover, the curvilinear relationship between age groups and democratic support is clearly more pronounced in some regions than in others. It is quite strong in the Nordic countries, at a&nbsp;comparatively high level of overall support for democratic ideals, and in southern Europe, at a&nbsp;lower level of overall support. By contrast, the curvilinear relationship of democratic support with age is less pronounced in continental and central and eastern Europe.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2688" data-test="figure" data-title="Fig. 2" id="figure-2"><figure data-dcnode-id="2689"><figcaption data-dcnode-id="2715"><b class="c-article-section__figure-caption" data-dcnode-id="2716" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="2717" instrument_node="">Fig. 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2700"><div class="c-article-section__figure-item" data-dcnode-id="2710"><a class="c-article-section__figure-link" data-dcnode-id="2711" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11615-020-00231-9/figures/2" rel="nofollow"><picture data-dcnode-id="2712"><source data-dcnode-id="2714" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11615-020-00231-9/MediaObjects/11615_2020_231_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="2713" height="438" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11615-020-00231-9/MediaObjects/11615_2020_231_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2701" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="2702"><span data-dcnode-id="2709" instrument_node="">“Extremely important” to live in a&nbsp;democratic country, by age cohort and region. </span><b data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">a</span></b><span data-dcnode-id="2706" instrument_node="">&nbsp;Northern vs Continental Europe. </span><b data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">b</span></b><span data-dcnode-id="2703" instrument_node="">&nbsp;Southern vs Central–Eastern Europe</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2690"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="2691" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11615-020-00231-9/figures/2" rel="nofollow"><span data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2692" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2693" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2694" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2697" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2696" fill-rule="evenodd"></path><span data-dcnode-id="2695" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2686" id="Sec5"><span data-dcnode-id="2687" instrument_node="">Democratic Dissatisfaction</span></h3><p data-dcnode-id="2663"><span data-dcnode-id="2685" instrument_node="">The strong support for democratic principles across Europe contrasts with widespread democratic dissatisfaction among European citizens. The most frequently used indicator for democratic evaluations is based on another general, straightforward question: On the whole, how satisfied are you with the way democracy works in your country? The answers vary from 0&nbsp;(extremely dissatisfied) to 10&nbsp;(extremely satisfied). Although this indicator has its problems, it is a&nbsp;rather good measure of citizens’ assessment of democracy (Ferrin </span><a aria-label="Reference 2016" data-dcnode-id="2683" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d189959617e812" title="Ferrin, Monica. 2016. An empirical assessment of satisfaction with democracy. In How Europeans view and evaluate democracy, ed. Monica Ferrin, Hanspeter Kriesi, 283–306. Oxford: U Press."><span data-dcnode-id="2684" instrument_node="">2016</span></a><span data-dcnode-id="2682" instrument_node="">). We can now compare the average support for democracy and the average satisfaction with the way democracy works in the five regions. The resulting discrepancy between satisfaction and support has been called the </span><i data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">“democratic paradox”</span></i><span data-dcnode-id="2679" instrument_node=""> (Blühdorn </span><a aria-label="Reference 2013" data-dcnode-id="2677" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d189959617e818" title="Blühdorn, Ingolfur. 2013. Simulative Demokratie. Neue Politik nach der postdemokratischen Wende. Frankfurt am Main: Suhrkamp."><span data-dcnode-id="2678" instrument_node="">2013</span></a><span data-dcnode-id="2676" instrument_node="">, p.&nbsp;36, 111; Dahl </span><a aria-label="Reference 2000" data-dcnode-id="2674" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d189959617e821" title="Dahl, Robert A. 2000. A democratic paradox? Political Science Quarterly 115(1):35–40."><span data-dcnode-id="2675" instrument_node="">2000</span></a><span data-dcnode-id="2673" instrument_node="">). But there is nothing paradoxical about this discrepancy: In the real world, ideals are difficult to implement, and we are used to getting less than we expect. Citizens tend to be aware of the shortcomings of the democracy they are living in and, accordingly, they are dissatisfied with the quality of democracy they get in their own country (see Kriesi and Saris </span><a aria-label="Reference 2016" data-dcnode-id="2671" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d189959617e824" title="Kriesi, Hanspeter, and Willem Saris. 2016. The Structure of the Evaluations of Democracy. In How Europeans view and evaluate democracy, ed. Monica Ferrin, Hanspeter Kriesi, 178–205. Oxford: U Press."><span data-dcnode-id="2672" instrument_node="">2016</span></a><span data-dcnode-id="2670" instrument_node="">). Table&nbsp;</span><a data-dcnode-id="2668" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="2669" instrument_node="">3</span></a><span data-dcnode-id="2667" instrument_node=""> presents the average expectations (importance) and evaluations (satisfaction) as well as the discrepancy between the two for the same five regions introduced above. On the left-hand side, the table presents the results for the two questions about democracy in general. On the right-hand side, it includes corresponding results for liberal democracy in particular. These results are based on similar questions about expectations and evaluations that have been asked for 12&nbsp;specific aspects of liberal democracy in the ESS6, two of which I&nbsp;have already used for illustrative purposes in the discussion of support of democratic principles. The answers to the two sets of questions about these 12&nbsp;aspects have been summarized in an index for support of liberal democracy and a&nbsp;corresponding index for satisfaction with liberal democracy (see Ferrin and Kriesi </span><a aria-label="Reference 2016" data-dcnode-id="2665" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d189959617e831" title="Ferrin, Monica. 2016. An empirical assessment of satisfaction with democracy. In How Europeans view and evaluate democracy, ed. Monica Ferrin, Hanspeter Kriesi, 283–306. Oxford: U Press."><span data-dcnode-id="2666" instrument_node="">2016</span></a><span data-dcnode-id="2664" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2648" data-test="inline-table" id="table-3"><figure data-dcnode-id="2649"><figcaption class="c-article-table__figcaption" data-dcnode-id="2660"><b data-dcnode-id="2661" data-test="table-caption" id="Tab3"><span data-dcnode-id="2662" instrument_node="">Table 3 Average expectations (importance) of democracy and evaluations (satisfaction) of democracy, and the discrepancy between the two, by European region</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2650"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="2651" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11615-020-00231-9/tables/3" rel="nofollow"><span data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2652" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2653" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2654" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2657" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2656" fill-rule="evenodd"></path><span data-dcnode-id="2655" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2643"><span data-dcnode-id="2647" instrument_node="">As we can immediately see from Table&nbsp;</span><a data-dcnode-id="2645" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="2646" instrument_node="">3</span></a><span data-dcnode-id="2644" instrument_node="">, on average, not only expectations but also satisfactions with democracy in general and liberal democracy in particular are higher in the Nordic countries than in the rest of Europe, and both are particularly low in hybrid democracies. But even in the Nordic countries, reality falls short of expectations. Even in the Nordic countries there is room for improvement in terms of democracy in general and of liberal democracy in particular. But it is striking to observe that democratic satisfaction is on average much lower in southern and central–eastern Europe than in northern or continental Europe.</span></p><p data-dcnode-id="2638"><span data-dcnode-id="2642" instrument_node="">Returning to the differences between the age groups, Zilinsky (</span><a aria-label="Reference 2019" data-dcnode-id="2640" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d189959617e968" title="Zilinsky, Jan. 2019. Democratic deconsolidation revisited: Young Europeans are not dissatisfied with democracy. Research and Politics: January-March: 1–7."><span data-dcnode-id="2641" instrument_node="">2019</span></a><span data-dcnode-id="2639" instrument_node="">) has shown that, across Europe, there are no age differences in terms of democratic satisfaction. Evidence from the ESS cumulative file covering the period from 2000 to 2016 does not reveal any “patterns consistent with the notion that young citizens are less satisfied with democracy than middle-aged or older citizens” (p.&nbsp;6).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2636" id="Sec6"><span data-dcnode-id="2637" instrument_node="">The Origins of Democratic Dissatisfaction</span></h3><p data-dcnode-id="2583"><span data-dcnode-id="2635" instrument_node="">Where does the widespread democratic dissatisfaction come from? Arguably it is the consequence of a&nbsp;</span><i data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">crisis of representation</span></i><span data-dcnode-id="2632" instrument_node="">, i.e., of an inadequate representation of the citizens’ demands in the political system. The crisis of representation, in turn, may result from two sets of factors. On the one hand, it is the result of a&nbsp;</span><i data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">lack of responsiveness</span></i><span data-dcnode-id="2629" instrument_node=""> of the political system, most importantly of the party system, to new demands of the citizens. The citizens’ demands are linked to broad societal conflicts. In Western Europe, these conflicts were traditionally based on religion and class, and to some extent also on regional differences. More recently, however, we have seen the rise of new structural conflicts linked to processes of globalization, which can be broadly understood as the opening up of national borders in varying ways. Thus, the increasing international economic competition, the increasing influx of migrants from ever more distant and culturally more different shores, and the increasing political integration in the European Union have created conflicts between “winners” and “losers” of globalization, i.e., between people whose life chances were traditionally protected by national boundaries and who perceive the weakening of these boundaries as a&nbsp;threat to their social status and their social security, and people whose life chances are enhanced by the opening up of national borders. Scholars have used different labels to refer to the new structuring conflict—from “GAL–TAN” (Hooghe et&nbsp;al. </span><a aria-label="Reference 2002" data-dcnode-id="2627" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d189959617e985" title="Hooghe, Liesbeth, Gary Marks, and Carole J.&nbsp;Wilson. 2002. Does left/right structure party positions on European integration? Comparative Political Studies 35(8):956–989."><span data-dcnode-id="2628" instrument_node="">2002</span></a><span data-dcnode-id="2626" instrument_node="">), “integration–demarcation” (Kriesi et&nbsp;al. </span><a aria-label="Reference 2008" data-dcnode-id="2624" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d189959617e988" title="Kriesi, Hanspeter, Edgar Grande, Romain Lachat, Martin Dolezal, Simon Bornschier, and Timotheos Frey. 2008. West European politics in the age of globalization. Cambridge: Cambridge University Press."><span data-dcnode-id="2625" instrument_node="">2008</span></a><span data-dcnode-id="2623" instrument_node="">), “universalism–communitarianism” (Bornschier </span><a aria-label="Reference 2010" data-dcnode-id="2621" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR333" id="ref-link-section-d189959617e991" title="Bornschier, and Simon. 2010. Cleavage Politics and the Populist Right. Temple University Press."><span data-dcnode-id="2622" instrument_node="">2010</span></a><span data-dcnode-id="2620" instrument_node="">), “cosmopolitanism–communitarianism” (Zürn and de Wilde </span><a aria-label="Reference 2016" data-dcnode-id="2618" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d189959617e995" title="Zürn, Michael, and Pieter de Wilde. 2016. Debating globalization: cosmopolitanism and communitarianism as political ideologies. Journal of Political Ideologies 21(3):280–301."><span data-dcnode-id="2619" instrument_node="">2016</span></a><span data-dcnode-id="2617" instrument_node="">; de Wilde et&nbsp;al. </span><a aria-label="Reference 2019" data-dcnode-id="2615" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d189959617e998" title="de Wilde, Pieter, Ruud Koopmans, Wolfgang Merkel, Oliver Strijbis, and Michael Zürn (eds.). 2019. The struggle over borders: cosmopolitanism and communitarianism. Cambridge: University Press."><span data-dcnode-id="2616" instrument_node="">2019</span></a><span data-dcnode-id="2614" instrument_node="">), and “cosmopolitanism–parochialism” (de Vries </span><a aria-label="Reference 2017" data-dcnode-id="2612" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d189959617e1001" title="de Vries, Catherine. 2017. The cosmopolitan-parochial divide: changing patterns of party and electoral competition in the Netherlands and beyond. Journal of European Public Policy 25(11):1541–1565. 
https://doi.org/10.1080/13501763.2017.1339730

."><span data-dcnode-id="2613" instrument_node="">2017</span></a><span data-dcnode-id="2611" instrument_node="">) to the “transnational cleavage” (Hooghe and Marks </span><a aria-label="Reference 2018" data-dcnode-id="2609" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR555" id="ref-link-section-d189959617e1004" title="Hooghe, Liesbeth and Gary Marks. 2018. Cleavage theory meets Europe’s crises: Lipset, Rokkan, and the transnational cleavage. Journal of European Public Policy 25(1):109–135."><span data-dcnode-id="2610" instrument_node="">2018</span></a><span data-dcnode-id="2608" instrument_node="">). They agree, however, that the new divide is above all articulated in terms of two types of issues: immigration and European integration. For multiple reasons—programmatic constraints, internal divisions, cartelization, systemic imperatives, and the requirements of responsible government—mainstream parties have avoided these (and other hot) issues and have failed to respond to the demands of the globalization losers in particular (Blühdorn </span><a aria-label="Reference 2013" data-dcnode-id="2606" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d189959617e1007" title="Blühdorn, Ingolfur. 2013. Simulative Demokratie. Neue Politik nach der postdemokratischen Wende. Frankfurt am Main: Suhrkamp."><span data-dcnode-id="2607" instrument_node="">2013</span></a><span data-dcnode-id="2605" instrument_node="">; Green-Pedersen </span><a aria-label="Reference 2012" data-dcnode-id="2603" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d189959617e1010" title="Green-Pedersen, Christoffer. 2012. A giant fast asleep? Party incentives and the politicization of European integration. Political Studies 60(1):115–130."><span data-dcnode-id="2604" instrument_node="">2012</span></a><span data-dcnode-id="2602" instrument_node="">; Hooghe and Marks </span><a aria-label="Reference 2018" data-dcnode-id="2600" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR555" id="ref-link-section-d189959617e1014" title="Hooghe, Liesbeth and Gary Marks. 2018. Cleavage theory meets Europe’s crises: Lipset, Rokkan, and the transnational cleavage. Journal of European Public Policy 25(1):109–135."><span data-dcnode-id="2601" instrument_node="">2018</span></a><span data-dcnode-id="2599" instrument_node="">; Katz and Mair </span><a aria-label="Reference 2018" data-dcnode-id="2597" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d189959617e1017" title="Katz, Richard S., and Peter Mair. 2018. Democracy and the cartelization of political parties. Oxford: U Press."><span data-dcnode-id="2598" instrument_node="">2018</span></a><span data-dcnode-id="2596" instrument_node="">; Netjes and Binnema </span><a aria-label="Reference 2007" data-dcnode-id="2594" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d189959617e1020" title="Netjes, Catherine E., and Harmen A.&nbsp;Binnema. 2007. The salience of the European integration issue: three data sources compared. Electoral Studies 26(1):39–49."><span data-dcnode-id="2595" instrument_node="">2007</span></a><span data-dcnode-id="2593" instrument_node="">; Sitter </span><a aria-label="Reference 2001" data-dcnode-id="2591" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d189959617e1023" title="Sitter, Nick. 2001. The politics of opposition and European integration in Scandinavia. West European Politics 24(4):22–39."><span data-dcnode-id="2592" instrument_node="">2001</span></a><span data-dcnode-id="2590" instrument_node="">; Steenbergen and Scott </span><a aria-label="Reference 2004" data-dcnode-id="2588" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d189959617e1026" title="Steenbergen, Marco, and Daniel J.&nbsp;Scott. 2004. Contesting Europe? The salience of European integration as a&nbsp;party issue. In European integration and political conflict, ed. G.&nbsp;Marks, M.&nbsp;Steenbergen, 165–192. Cambridge: Cambridge University Press."><span data-dcnode-id="2589" instrument_node="">2004</span></a><span data-dcnode-id="2587" instrument_node="">; de Vries and van de Wardt </span><a aria-label="Reference 2011" data-dcnode-id="2585" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d189959617e1029" title="de Vries, Catherine, and Marc van de Wardt. 2011. EU issue salience and domestic party competition. In Issue Salience in International Politics, ed. K.&nbsp;Oppermann, H.&nbsp;Viehrig, 173–187. London: Routledge."><span data-dcnode-id="2586" instrument_node="">2011</span></a><span data-dcnode-id="2584" instrument_node="">). Those who have been “left behind” by the mainstream parties, i.e., the increasing number of citizens whose demands have not been adequately represented by the established parties, have become dissatisfied with the way democracy works in their own country. Arguably, this version of the crisis of representation is most characteristic of northwestern Europe, where it has increasingly contributed to democratic satisfaction over the last decades.</span></p><p data-dcnode-id="2560"><span data-dcnode-id="2582" instrument_node="">On the other hand, the crisis of representation also results from more traditional </span><i data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">performance failures</span></i><span data-dcnode-id="2579" instrument_node=""> of party governments. Thus, the perceived poor performance of the economy and of the government in the course of the Great Recession led citizens across Europe to become more critical of the way their national democracy works—especially in the hard-hit regions of southern and central–eastern Europe and in hybrid democracies. In the Great Recession, the southern European countries suffered the consequences of a&nbsp;double crisis that combined economic and political factors (Hutter et&nbsp;al. </span><a aria-label="Reference 2018" data-dcnode-id="2577" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d189959617e1038" title="Hutter, Swen, Hanspeter Kriesi, and Guillem Vidal. 2018. Old versus new politics: the political spaces in Southern Europe in times of crises. Party Politics 24(1):10–22."><span data-dcnode-id="2578" instrument_node="">2018</span></a><span data-dcnode-id="2576" instrument_node="">). All southern European countries experienced a&nbsp;sharp relative decline in economic performance, insufficient government responsiveness, a&nbsp;surge in economic grievances, and a&nbsp;downright collapse of satisfaction with democracy. The crisis quickly disclosed the inability of the political elites to implement effective countermeasures against growing economic grievances (Beramendi et&nbsp;al. </span><a aria-label="Reference 2015" data-dcnode-id="2574" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d189959617e1041" title="Beramendi, Pablo, Silja Häusermann, Herbert Kitschelt, and Hanspeter Kriesi. 2015. The politics of advanced capitalism. New York: Cambridge University Press."><span data-dcnode-id="2575" instrument_node="">2015</span></a><span data-dcnode-id="2573" instrument_node="">, p.&nbsp;13), fueling a&nbsp;politi
