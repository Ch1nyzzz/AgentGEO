cal crisis that erupted in massive protest waves (Kriesi et&nbsp;al. </span><a aria-label="Reference forthcoming" data-dcnode-id="2571" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d189959617e1044" title="Kriesi, Hanspeter, Jasmine Lorenzini, Bruno Wüest, and Silja Häusermann (eds.). forthcoming. Contention in times of crises. Comparing political protest in 30 European countries, 2000–2015. Cambridge: U Press."><span data-dcnode-id="2572" instrument_node="">forthcoming</span></a><span data-dcnode-id="2570" instrument_node="">). In central–eastern Europe, the low level of political and administrative performance and the corresponding high level of corruption had contributed to widespread dissatisfaction with the way democracy works in these countries long before the great economic crisis set in (Pop-Eleches </span><a aria-label="Reference 2010" data-dcnode-id="2568" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d189959617e1047" title="Pop-Eleches, Grigore. 2010. Throwing out the bums. Protest voting and unorthodox parties after communism. World Politics 62(2):221–260."><span data-dcnode-id="2569" instrument_node="">2010</span></a><span data-dcnode-id="2567" instrument_node="">, p.&nbsp;232). In times of economic crisis, however, the tolerance for corruption that previously benefited from the good economic performance diminishes considerably, as is illustrated by the Klasnja and Tucker (</span><a aria-label="Reference 2013" data-dcnode-id="2565" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d189959617e1051" title="Klasnja, Marko, and Joshua A.&nbsp;Tucker. 2013. The economy, corruption, and the vote: evidence from experiments in Sweden and Moldova. Electoral Studies 32:536–543."><span data-dcnode-id="2566" instrument_node="">2013</span></a><span data-dcnode-id="2564" instrument_node="">) experiments in Moldavia. Figure&nbsp;</span><a data-dcnode-id="2562" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2563" instrument_node="">3</span></a><span data-dcnode-id="2561" instrument_node="">, which shows the development of satisfaction with national and European democracy from 2000 to 2015 for four of the five regions, documents the chronic dissatisfaction with national (but not European) democracy in central–eastern Europe and the precipitous fall of satisfaction with both national and European democracy in southern Europe during the Great Recession.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2530" data-test="figure" data-title="Fig. 3" id="figure-3"><figure data-dcnode-id="2531"><figcaption data-dcnode-id="2557"><b class="c-article-section__figure-caption" data-dcnode-id="2558" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="2559" instrument_node="">Fig. 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2542"><div class="c-article-section__figure-item" data-dcnode-id="2552"><a class="c-article-section__figure-link" data-dcnode-id="2553" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11615-020-00231-9/figures/3" rel="nofollow"><picture data-dcnode-id="2554"><source data-dcnode-id="2556" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11615-020-00231-9/MediaObjects/11615_2020_231_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="2555" height="452" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11615-020-00231-9/MediaObjects/11615_2020_231_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2543" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="2544"><span data-dcnode-id="2551" instrument_node="">Satisfaction with the way democracy works in one’s own country/at the European level: shares of very/fairly satisfied citizens in four European regions, 2000–2015. </span><b data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">a</span></b><span data-dcnode-id="2548" instrument_node="">&nbsp;SWD—national. </span><b data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">b</span></b><span data-dcnode-id="2545" instrument_node="">&nbsp;SWD(satisfaction with democracy)—European</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2532"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="2533" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11615-020-00231-9/figures/3" rel="nofollow"><span data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2534" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2535" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2536" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2539" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2538" fill-rule="evenodd"></path><span data-dcnode-id="2537" instrument_node="">
</span></a></div></figure></div></div></div></section><section data-dcnode-id="2369" data-title="The Voters’ Perspective: The Rise of Challenger Parties"><div class="c-article-section" data-dcnode-id="2370" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2525" id="Sec7"><span data-dcnode-id="2526" instrument_node="">The Voters’ Perspective: The Rise of Challenger Parties</span></h2><div class="c-article-section__content" data-dcnode-id="2371" id="Sec7-content"><p data-dcnode-id="2493"><span data-dcnode-id="2524" instrument_node="">It is now the moment to adopt the third perspective, the perspective of the voters, in order to document the consequences of democratic dissatisfaction in electoral terms. As a&nbsp;reaction to both versions of the crisis of representation, voters abandon mainstream parties and turn to new challengers. Thus, the decline of the mainstream parties’ capacity to represent the key societal conflicts and their performance failure has made room for </span><i data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">the rise of new challengers in the party system</span></i><span data-dcnode-id="2521" instrument_node="">. Mair (</span><a aria-label="Reference 2002" data-dcnode-id="2519" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d189959617e1083" title="Mair, Peter. 2002. Populist democracy vs party democracy. In Democracies and the populist challenge, ed. Yves Mény, Yves Surel, 81–98. Basingstoke: Palgrave."><span data-dcnode-id="2520" instrument_node="">2002</span></a><span data-dcnode-id="2518" instrument_node="">, p.&nbsp;88) has already pointed to the link between, on the one hand, the weakening of party democracy as we knew it and, on the other hand, the rise of such new challengers. These new challengers not only articulate the new conflicts, but they also turn more explicitly against the established political elites who constitute their direct adversaries in the electoral competition. In other words, they express both the </span><i data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">substantive</span></i><span data-dcnode-id="2515" instrument_node=""> demands of voters who have not been taken into account by the mainstream parties and their </span><i data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">political dissatisfaction</span></i><span data-dcnode-id="2512" instrument_node="">. While their “host” ideology connects these parties to the fundamental structural conflicts in society, the “thin” populist “ideology” connects them to the more narrowly political sphere and to the political discontent of their constituencies. More specifically, the populist “ideology” refers to the tension between “the elites” and “the people.” This “ideology” puts the emphasis on the fundamental role of “the people” in politics, claims that “the people” have been betrayed by “the elites” in charge who are abusing their position of power, and demands that the sovereignty of the people be restored (Mudde </span><a aria-label="Reference 2004" data-dcnode-id="2510" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d189959617e1092" title="Mudde, Cas. 2004. The Populist Zeitgeist. Government and Opposition 39(4):542–563."><span data-dcnode-id="2511" instrument_node="">2004</span></a><span data-dcnode-id="2509" instrument_node="">; Mény and Surel </span><a aria-label="Reference 2002" data-dcnode-id="2507" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d189959617e1096" title="Mény, Yves, and Yves Surel. 2002. The constitutive ambiguity of populism. In Democracies and the populist challenge, ed. Yves Mény, Yves Surel, 1–21. Basingstoke: Palgrave."><span data-dcnode-id="2508" instrument_node="">2002</span></a><span data-dcnode-id="2506" instrument_node="">, p.&nbsp;11 f.). In their analysis of the vote for radical right parties in 16&nbsp;western European countries in the 1990s, Lubbers et&nbsp;al. (</span><a aria-label="Reference 2002" data-dcnode-id="2504" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d189959617e1099" title="Lubbers, Marcel, M.&nbsp;Gijsberts, and P.&nbsp;Scheepers. 2002. Extreme right-wing voting in Western Europe. European Journal of Political Research 41:345–378."><span data-dcnode-id="2505" instrument_node="">2002</span></a><span data-dcnode-id="2503" instrument_node="">) have shown that this vote is enhanced by political dissatisfaction. More recently, Akkerman et&nbsp;al. (</span><a aria-label="Reference 2014" data-dcnode-id="2501" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d189959617e1102" title="Akkerman, Agnes, Cas Mudde, and Andrej Zaslove. 2014. How populist are the people? Measuring populist attitudes in voters. Comparative political studies 47(9):1324–1353."><span data-dcnode-id="2502" instrument_node="">2014</span></a><span data-dcnode-id="2500" instrument_node="">, </span><a aria-label="Reference 2017" data-dcnode-id="2498" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d189959617e1105" title="Akkerman, Agnes, Andrej Zaslove, and Bram Spruyt. 2017. “We the people” or “We the peoples”? A Comparison of support for the populist radical right and populist radical left in the Netherlands. Swiss Political Science Review 23(4):377–403."><span data-dcnode-id="2499" instrument_node="">2017</span></a><span data-dcnode-id="2497" instrument_node="">) have shown for the Netherlands that individuals with pronounced populist attitudes are more likely to vote for populist parties from the right (PVV) and the left (SP), a&nbsp;result that has been confirmed by the cross-national study in nine European countries of van Hauwaert and van Kessel (</span><a aria-label="Reference 2018" data-dcnode-id="2495" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d189959617e1108" title="Van Hauwaert, Steven M., and Stijn van Kessel. 2018. Beyond protest and discontent: A cross-national analysis of the effect of populist attitudes and issue positions on populist party support. European Journal of Political Research 57(1):68–92."><span data-dcnode-id="2496" instrument_node="">2018</span></a><span data-dcnode-id="2494" instrument_node="">).</span></p><p data-dcnode-id="2482"><span data-dcnode-id="2492" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="2490" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="2491" instrument_node="">4</span></a><span data-dcnode-id="2489" instrument_node=""> presents the development of mainstream parties and of electoral volatility for four selected countries from each of three regions of Europe—central–eastern, continental, and southern Europe—during the Great Recession</span><sup data-dcnode-id="2484"><a data-dcnode-id="2485" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">Footnote </span></span><span data-dcnode-id="2486" instrument_node="">1</span></a></sup><span data-dcnode-id="2483" instrument_node="">. The results presented refer to the average differences in vote shares of mainstream parties in pre-crisis and post-crisis elections (averaged across countries) and to the corresponding change in overall volatility. As the figure shows, the mainstream parties lost vote shares in all three regions during the Great Recession, but their losses were by far the greatest in southern Europe, where (with the exception of Portugal) they lost massively. The increase in the overall electoral volatility tells much the same story: As the mainstream parties lost, volatility shot up in southern Europe, and it also increased in continental Europe. In central–eastern Europe, however, volatility decreased slightly. While the western European party systems increasingly fragmented, the central–eastern European party systems started to consolidate, albeit at a&nbsp;very high level of overall volatility.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2455" data-test="figure" data-title="Fig. 4" id="figure-4"><figure data-dcnode-id="2456"><figcaption data-dcnode-id="2479"><b class="c-article-section__figure-caption" data-dcnode-id="2480" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="2481" instrument_node="">Fig. 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2467"><div class="c-article-section__figure-item" data-dcnode-id="2474"><a class="c-article-section__figure-link" data-dcnode-id="2475" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11615-020-00231-9/figures/4" rel="nofollow"><picture data-dcnode-id="2476"><source data-dcnode-id="2478" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11615-020-00231-9/MediaObjects/11615_2020_231_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="2477" height="395" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11615-020-00231-9/MediaObjects/11615_2020_231_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2468" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="2469"><span data-dcnode-id="2473" instrument_node="">Punishment of mainstream parties and electoral volatility in selected countries of three European regions during the Great Recession. Source: Hutter and Kriesi (</span><a aria-label="Reference 2019" data-dcnode-id="2471" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2019" id="ref-link-section-d189959617e1126" title="Hutter, Swen and Hanspeter Kriesi (eds). 2019. European party politics in times of crisis. Cambridge U Press."><span data-dcnode-id="2472" instrument_node="">2019</span></a><span data-dcnode-id="2470" instrument_node="">, chap.&nbsp;15)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2457"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="2458" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11615-020-00231-9/figures/4" rel="nofollow"><span data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2459" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2460" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2461" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2464" instrument_node="">

</span></a></div></figure></div><p data-dcnode-id="2450"><span data-dcnode-id="2454" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="2452" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="2453" instrument_node="">5</span></a><span data-dcnode-id="2451" instrument_node=""> presents the trends for the rise of radical left and radical right parties in western Europe (given the lack of institutionalization of central–eastern European party systems, corresponding trends are less informative). It presents the respective regional averages for four 5‑year periods—two preceding the onset of the Great Recession and two following the fall of Lehman Brothers in September 2008. This deceptively simple graph makes two assumptions, which need to be pointed out. First of all, it excludes all countries where the radical right or the radical left has not participated in any significant way in the national elections (this excludes Iceland, Ireland, and Luxemburg in northwestern Europe and all but two countries (Italy and Greece) in southern Europe for the calculations of the averages for the radical right, and Switzerland, the UK, and Malta for those of the radical left). Including these countries would heavily reduce the trends indicated. The second assumption is that the Italian Movimento 5&nbsp;Stelle (M5S; Five Star Movement) can be considered a&nbsp;radical left party. Of course, M5S considers itself “neither left nor right,” and most observers would not rank it among the radical left. However, even if it is not a&nbsp;party on the radical left, it is nevertheless the functional equivalent of the new radical left in Italy. Keeping these two points in mind, the graph has a&nbsp;very clear message: It is above all in southern Europe that the great economic crisis boosted the rise of radical challengers—mainly from the left, but also from the right in Italy and Greece. In northwestern Europe, the radical left stagnated throughout the more recent past, while the radical right benefited from the economic crisis and also from the more recent refugee crisis.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2420" data-test="figure" data-title="Fig. 5" id="figure-5"><figure data-dcnode-id="2421"><figcaption data-dcnode-id="2447"><b class="c-article-section__figure-caption" data-dcnode-id="2448" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="2449" instrument_node="">Fig. 5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2432"><div class="c-article-section__figure-item" data-dcnode-id="2442"><a class="c-article-section__figure-link" data-dcnode-id="2443" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11615-020-00231-9/figures/5" rel="nofollow"><picture data-dcnode-id="2444"><source data-dcnode-id="2446" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11615-020-00231-9/MediaObjects/11615_2020_231_Fig5_HTML.png?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="2445" height="748" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11615-020-00231-9/MediaObjects/11615_2020_231_Fig5_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2433" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="2434"><span data-dcnode-id="2441" instrument_node="">Development of vote share of radical right/radical left in northwestern (</span><i data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">-nwe</span></i><span data-dcnode-id="2438" instrument_node="">) and southern (</span><i data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">-se</span></i><span data-dcnode-id="2435" instrument_node="">) Europe</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2422"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="2423" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11615-020-00231-9/figures/5" rel="nofollow"><span data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2424" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2425" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2426" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2429" instrument_node="">

</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2418" id="Sec8"><span data-dcnode-id="2419" instrument_node="">The Double Logic of the Rising Challengers</span></h3><p data-dcnode-id="2410"><span data-dcnode-id="2417" instrument_node="">As already pointed out, the rising challengers pursue </span><i data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">a&nbsp;double logic</span></i><span data-dcnode-id="2414" instrument_node="">: They not only express and fuel their voters’ democratic dissatisfaction, but they also express and fuel their voters’ substantive concerns. Based on an analysis of the cumulative file of the European Social Survey (ESS) that includes the first eight rounds (2002–2016), it is possible to show that political dissatisfaction and substantive concerns each have had an independent effect on the electoral success of radical right and radical left challengers (Kriesi and Schulte-Cloos </span><a aria-label="Reference forthcoming" data-dcnode-id="2412" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d189959617e1161" title="Kriesi, Hanspeter and Julia Schulte-Cloos. forthcoming. Support for radical parties in Western Europe: structural conflicts and political dynamcis, Electoral Studies."><span data-dcnode-id="2413" instrument_node="">forthcoming</span></a><span data-dcnode-id="2411" instrument_node="">): In substantive terms, the radical right vote is mostly driven by the voters’ critical attitude toward immigration but also to a&nbsp;smaller extent by their Euroscepticism, while, strikingly, both cultural liberalism (opposition to gay rights) and egalitarian economic attitudes have no effect on the radical right vote net of individuals’ opposition to immigration and Euroscepticism. By contrast, the radical left vote is mainly driven by egalitarian economic attitudes. Euroscepticism also contributes to the radical left vote, as do culturally liberal and pro-immigration attitudes. In addition to the substantive concerns, political dissatisfaction substantially contributes to the vote for both types of radical parties. While the substantive effect of anti-immigration attitudes is even stronger than the effect of political dissatisfaction for the radical right vote, political dissatisfaction has the largest effect on the radical left vote. In the case of M5S, a&nbsp;“pure” case of a&nbsp;populist party, which at the time of its breakthrough in 2013 hardly campaigned on substantive grounds but almost exclusively focused on its anti-elitist message, political dissatisfaction even became the overpowering factor in determining the vote.</span></p><p data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">On the one hand, this means that the factors related to long-term social change contribute to the determination of the vote for the radical challenger parties from both left and right, independently of the political dynamics, i.e., independently of their populist rhetoric and independently of other types of short-term political considerations. In the final analysis, these parties are driven by the structural conflicts of society, and as long as these conflicts exist, the electoral fortune of these parties will be a&nbsp;function of the substantive concerns linked to these conflicts. On the other hand, this also means that the impact of political dissatisfaction is independent of these long-term structural factors of change. In other words, if the political dynamics change, the populist rhetoric of these parties is likely to change as well, and political discontent may no longer fuel their electoral success. Given the independence of the impact of political dissatisfaction  from structural conflicts, it is important to highlight that the role of the populist appeal to political dissatisfaction varies depending on the political context.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2406" id="Sec9"><span data-dcnode-id="2407" instrument_node="">Is the Rise of Populist Challengers Dangerous?</span></h3><p data-dcnode-id="2389"><span data-dcnode-id="2405" instrument_node="">Does the rise of populist challengers undermine democracy in Europe? Whatever their faults, and there are many as is well known, the populist parties’ “professed aim is to cash in democracy’s promise of power to the people” (Canovan </span><a aria-label="Reference 1999" data-dcnode-id="2403" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d189959617e1175" title="Canovan, Margaret. 1999. Trust the people! Populism and the two faces of democracy. Political Studies 47(1):2–16."><span data-dcnode-id="2404" instrument_node="">1999</span></a><span data-dcnode-id="2402" instrument_node="">, p.&nbsp;2). As Canovan has pointed out, it is this promise of the “redemptive face” of democracy that creates the tension with its pragmatic face and with liberalism. Populism is both a&nbsp;“politics of resentment” (Betz </span><a aria-label="Reference 1993" data-dcnode-id="2400" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d189959617e1178" title="Betz, Hans-Georg. 1993. The new politics of resentment: radical right-wing populist parties in western Europe. Comparative Politics 25(4):413–427."><span data-dcnode-id="2401" instrument_node="">1993</span></a><span data-dcnode-id="2399" instrument_node="">)—a&nbsp;response of the weak to the wrongdoing of the powerful—and a&nbsp;“politics of hope” (Akkerman et&nbsp;al. </span><a aria-label="Reference 2017" data-dcnode-id="2397" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d189959617e1181" title="Akkerman, Agnes, Andrej Zaslove, and Bram Spruyt. 2017. “We the people” or “We the peoples”? A Comparison of support for the populist radical right and populist radical left in the Netherlands. Swiss Political Science Review 23(4):377–403."><span data-dcnode-id="2398" instrument_node="">2017</span></a><span data-dcnode-id="2396" instrument_node="">, p.&nbsp;380) that “yearns for a&nbsp;more direct and unmediated relationship between citizens and their political representatives.” Mair (</span><a aria-label="Reference 2013" data-dcnode-id="2394" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d189959617e1184" title="Mair, Peter. 2013. Ruling the void. London: Verso."><span data-dcnode-id="2395" instrument_node="">2013</span></a><span data-dcnode-id="2393" instrument_node="">) has conceptualized the discrepancy between the “pragmatic” and the “redemptive” face of democracy as the tension between “responsibility” and “responsiveness”: While the mainstream parties emphasize responsibility to a&nbsp;complex set of stakeholders, the challenger parties from left and right emphasize responsiveness to the voters. Distrust of the political elites and dissatisfaction with the lack of responsiveness, and the lack of unmediated direct democracy, contribute, as we have seen, to the surge of these challengers. Although critical of these parties, Mounk (</span><a aria-label="Reference 2018" data-dcnode-id="2391" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d189959617e1187" title="Mounk, Yascha. 2018. The people vs. democracy. Why our freedom is in danger and how to save it. Harvard: U Press."><span data-dcnode-id="2392" instrument_node="">2018</span></a><span data-dcnode-id="2390" instrument_node="">, p.&nbsp;52) does acknowledge the democratic energy of populism, and he suggests that the refusal to do so will stop us from understanding the nature of their appeal.</span></p><p data-dcnode-id="2372"><span data-dcnode-id="2388" instrument_node="">We can go even one step further: As Rovira-Kaltwasser (</span><a aria-label="Reference 2012" data-dcnode-id="2386" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d189959617e1193" title="Rovira-Kaltwasser, Cristóbal. 2012. The ambivalence of populism: threat and corrective for democracy. Democratization 19(2):184–208."><span data-dcnode-id="2387" instrument_node="">2012</span></a><span data-dcnode-id="2385" instrument_node="">) as well as Taggart and Rovira-Kaltwasser (</span><a aria-label="Reference 2016" data-dcnode-id="2383" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d189959617e1196" title="Taggart, Paul, and Cristóbal Rovira-Kaltwasser. 2016. Dealing with populists in government: some comparative conclusions. Democratization 23(2):345–365."><span data-dcnode-id="2384" instrument_node="">2016</span></a><span data-dcnode-id="2382" instrument_node="">, p.&nbsp;346) have argued, populism can work as a&nbsp;</span><i data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">democratic corrective</span></i><span data-dcnode-id="2379" instrument_node="">. Populists may develop a&nbsp;corrective force, especially when they represent demands and claims of structurally important groups that have been neglected or “depoliticized” by the established mainstream parties, i.e., if they hold out the promise of “salvation through politics” for unrepresented sectors of society. They expand the political agenda and debate by putting issues and conflicts on the agenda of democratic politics that have been neglected by the mainstream parties. They increase the electoral options and belie the mainstream parties’ claim that “there is no alternative” (TINA). They may increase electoral participation by bringing back into democratic politics groups of the population that were left unrepresented by the mainstream parties in the past. Thus, as a&nbsp;result of their mobilization, electoral participation may increase, as has happened in German regional and national elections as a&nbsp;result of the rise of the AfD (Alternative for Germany) party, and as happened in the British Brexit referendum  (Evans et al. </span><a aria-label="Reference 2017" data-dcnode-id="2377" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d189959617e1202" title="Kriesi, Hanspeter, Edgar Grande, Romain Lachat, Martin Dolezal, Simon Bornschier, and Timotheos Frey. 2008. West European politics in the age of globalization. Cambridge: Cambridge University Press."><span data-dcnode-id="2378" instrument_node="">2017</span></a><span data-dcnode-id="2376" instrument_node="">). If these examples are suggestive, a&nbsp;more systematic analysis of the impact of populist parties on voter turnout by Leininger and Meijers (</span><a aria-label="Reference 2017" data-dcnode-id="2374" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d189959617e1205" title="Leininger, Arndt and Maurits Meijers. 2017. Do populist parties increase turnout? Evidence from over 40 years of electoral history in 31 European democracies, unpubl. Paper."><span data-dcnode-id="2375" instrument_node="">2017</span></a><span data-dcnode-id="2373" instrument_node="">) does, however, not confirm that populist parties systematically spur turnout.</span></p></div></div></section><section data-dcnode-id="2231" data-title="The Elite’s Perspective: Populists in Power"><div class="c-article-section" data-dcnode-id="2232" id="Sec10-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2367" id="Sec10"><span data-dcnode-id="2368" instrument_node="">The Elite’s Perspective: Populists in Power</span></h2><div class="c-article-section__content" data-dcnode-id="2233" id="Sec10-content"><p data-dcnode-id="2359"><span data-dcnode-id="2366" instrument_node="">The final perspective is the elite’s perspective. It deals with populism in power. Populism is, of course, not only a&nbsp;corrective of democracy, but it is also a&nbsp;potential danger for democracy. The danger, however, emanates less from the citizens who vote for the populist parties than from the political elites. On the one hand, it stems from the populist leaders, and on the other hand from the way the other members of the political elite react to successful populists. Let us first&nbsp;look at the populists themselves. As Urbinati (</span><a aria-label="Reference 2014" data-dcnode-id="2364" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d189959617e1217" title="Urbinati, Nadia. 2014. Democracy disfigured. Opinion, truth, and the people. Harvard: U Press."><span data-dcnode-id="2365" instrument_node="">2014</span></a><span data-dcnode-id="2363" instrument_node="">) suggests, populism is ultimately more than a&nbsp;“thin” ideology. It requires both an “organic polarizing ideology” and a&nbsp;leader who mobilizes the masses in order to govern in the name of “the people.” Combined, the two elements amount to a&nbsp;</span><i data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">project of political renewal</span></i><span data-dcnode-id="2360" instrument_node=""> that seeks “to redress democracy by taking it back to its ‘natural’ roots” (p.&nbsp;151). Although it starts as a&nbsp;phenomenon of mass discontent and participation, populism is at the same time also “strategic politics of elite transformation and authority creation” (p.&nbsp;157). The populist leader uses polarization between “the people” and the elite in order to create the unity of the people that is at the core of populist beliefs, and in order to implement the specific populist, illiberal vision of democracy.</span></p><p data-dcnode-id="2333"><span data-dcnode-id="2358" instrument_node="">When populists are in opposition, they have to forge an electoral majority that will enable them to rise to power. But as Pappas (</span><a aria-label="Reference 2019" data-dcnode-id="2356" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d189959617e1226" title="Pappas, Takis S.&nbsp;2019. Populism and liberal democracy. A comparative and theoretical analysis. Oxord: U Press."><span data-dcnode-id="2357" instrument_node="">2019</span></a><span data-dcnode-id="2355" instrument_node="">) observes, once they pass from opposition to power, they face an altogether different task—“they have to serve their people, lest the populist electoral alliance be shattered.” Pappas summarizes the inner logic of their rule as “state seizure and institution bending,” “political patronage,” and “uncompromising polarization.” Based on the experience of two Latin American countries (Peron’s Argentina and Chavez’s Venezuela) as well as of two European countries (Pasok’s Greece and Orbán’s Hungary), Pappas observes that </span><i data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">state seizure</span></i><span data-dcnode-id="2352" instrument_node=""> consists of state colonization by loyalists; empowerment of the executive at the expense of the other branches of state power; emasculation of checks and balances; control over the media, the judiciary, and the educational system; and, ultimately, regime change. The populists’ </span><i data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">political economy</span></i><span data-dcnode-id="2349" instrument_node=""> has been analyzed by Dornbusch and Edwards (</span><a aria-label="Reference 1991" data-dcnode-id="2347" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d189959617e1235" title="Dornbusch, Rudiger, and Sebastian Edwards. 1991. The macroeconomics of populism. In The macroeconomics of populism in Latin America, ed. Rudiger Dornbusch, Sebastian Edwards, 7–13. Chicago: U Press."><span data-dcnode-id="2348" instrument_node="">1991</span></a><span data-dcnode-id="2346" instrument_node="">) based on Latin American cases. Pappas concludes that the main ingredients of populist economics are expansive macroeconomic measures, nationalization of chunks of the economy, and radical redistribution of income in favor of the populists’ own constituents, which in turn creates patron–client networks. This explosive mixture is bound to lead to economic difficulties, and even to economic collapse. The uncompromising </span><i data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">polarization</span></i><span data-dcnode-id="2343" instrument_node=""> in words and deeds is illustrated by the example of Trump, which indicates how unrelenting norm-breaking contributes to polarization. As Levitsky and Ziblatt (</span><a aria-label="Reference 2018" data-dcnode-id="2341" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d189959617e1242" title="Levitsky, Steven, and Daniel Ziblatt. 2018. How democracies die. N.Y.: Crown."><span data-dcnode-id="2342" instrument_node="">2018</span></a><span data-dcnode-id="2340" instrument_node="">, p.&nbsp;193) have observed, even if Trump does not directly dismantle democratic institutions, his norm-breaking is almost certain to corrode them. Schedler (</span><a aria-label="Reference 2018" data-dcnode-id="2338" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d189959617e1245" title="Schedler, Andreas 2018. A Threat to Democracy? Donald Trump in Comparative Perspective, unpubl. Ms."><span data-dcnode-id="2339" instrument_node="">2018</span></a><span data-dcnode-id="2337" instrument_node="">) suggests that the central lesson of Trump concerns the weight of political language. Trump’s most severe democratic norm violations have been discursive, and, Schedler argues, Trump’s public discourse is what is dangerous about him. From in-depth case studies, we know that discursive transgressions tend to spill over into behavioral transgressions and that both tend to unfold in vicious spirals (Bermeo </span><a aria-label="Reference 2003" data-dcnode-id="2335" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d189959617e1248" title="Bermeo, Nancy. 2003. Ordinary people in extraordinary times: the citizenry and the breakdown of democracy. Princeton, Oxford: Princeton University Press."><span data-dcnode-id="2336" instrument_node="">2003</span></a><span data-dcnode-id="2334" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2331" id="Sec11"><span data-dcnode-id="2332" instrument_node="">Constraints On the Populists’ Project of Power</span></h3><p data-dcnode-id="2320"><span data-dcnode-id="2330" instrument_node="">How far populists in power will get in implementing anything like the agenda sketched by Pappas depends very much on a&nbsp;set of constraints that I&nbsp;would like to classify into five categories. First, there are the </span><i data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">constitutional constraints</span></i><span data-dcnode-id="2327" instrument_node="">. In the United States, Donald Trump has (to some extent) been checked by the courts and by Congress. The institutional arrangements in the United States and also in the democracies of western Europe are likely to inhibit the more extreme forms of populist autocracies that we know from the presidential systems of Latin America (Roberts </span><a aria-label="Reference 2017" data-dcnode-id="2325" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d189959617e1261" title="Roberts, Kenneth M. 2017. Party politics in hard times: Comparative perspectives on the European and Latin American economic crises. European Journal of Political Research 56:218–233."><span data-dcnode-id="2326" instrument_node="">2017</span></a><span data-dcnode-id="2324" instrument_node="">). In the less established democracies of central–eastern Europe, however, populists in power meet with less institutional resistance and use their power to implement illiberal institutional reforms, as is illustrated by the Polish and Hungarian populists in power. The same has applied to Berlusconi’s governments in Italy, which have often adopted illiberal measures regarding the checks and balances of Italian democracy (such as media freedom, the judiciary, the constitution, and the president of the republic; Bobba and McDonnell </span><a aria-label="Reference 2015" data-dcnode-id="2322" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d189959617e1264" title="Bobba, Giuliano, and Duncan McDonnell. 2015. Italy: a&nbsp;strong and enduring market for populism. In European populism in the shadow of the Great Recession, ed. Hanspeter Kriesi, Takis S.&nbsp;Pappas, 159–174. Colchester: ECPR Press."><span data-dcnode-id="2323" instrument_node="">2015</span></a><span data-dcnode-id="2321" instrument_node="">).</span></p><p data-dcnode-id="2300"><span data-dcnode-id="2319" instrument_node="">The </span><i data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">electoral system</span></i><span data-dcnode-id="2316" instrument_node=""> provides a&nbsp;little noticed but crucial institutional constraint. While </span><i data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">majoritarian</span></i><span data-dcnode-id="2313" instrument_node=""> (or nearly majoritarian) systems allow populists to gain power undivided, </span><i data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">proportional</span></i><span data-dcnode-id="2310" instrument_node=""> systems are likely to force populists to share power with coalition partners who are likely to be mainstream parties. This kind of power sharing goes a&nbsp;long way to moderate both populist parties and their voters. Thus, when the Austrian FPÖ entered the government dominated by Wolfgang Schüssel’s ÖVP in 2000, it was seriously weakened by the experience. Its cabinet members adopted more moderate positions, which led to an eventual split between the moderates and the radicals, with the moderates creating a&nbsp;new party, the BZÖ (Luther </span><a aria-label="Reference 2015" data-dcnode-id="2308" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d189959617e1279" title="Luther, Kurt R. 2015. The primacy of politics: Austria in the Not-so-Great Recession. In European populism in the shadow of the Great Recession, ed. Hanspeter Kriesi, Takis S.&nbsp;Pappas, 140–159. Colchester: ECPR Press."><span data-dcnode-id="2309" instrument_node="">2015</span></a><span data-dcnode-id="2307" instrument_node="">, p.&nbsp;143–5). Similarly, the Swiss SVP moderated its populist discourse once its leader was co-opted into the government in 2003, and it also split over the government experience of its leader (Bernhard et&nbsp;al. </span><a aria-label="Reference 2015" data-dcnode-id="2305" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d189959617e1282" title="Bernhard, Laurent, Hanspeter Kriesi, and Edward Weber. 2015. The populist discourse of the Swiss people’s party. In European populism in the shadow of the great recession, ed. Hanspeter Kriesi, Takis S.&nbsp;Pappas, 125–140. Colchester: ECPR Press."><span data-dcnode-id="2306" instrument_node="">2015</span></a><span data-dcnode-id="2304" instrument_node="">). Rooduijn et&nbsp;al. (</span><a aria-label="Reference 2014" data-dcnode-id="2302" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d189959617e1286" title="Rodujin, Matthijs, Sarah L. de Lange, and Wouter van der Brug. 2014. A populist Zeitgeist? Programmatic contagion by populist parties in Western Europe. Party Politics 20(4):563–575."><span data-dcnode-id="2303" instrument_node="">2014</span></a><span data-dcnode-id="2301" instrument_node="">) show that, after an electoral success, populist parties generally become less populist in their party programs.</span></p><p data-dcnode-id="2292"><span data-dcnode-id="2299" instrument_node="">It is when populists gain power undivided and get an opportunity to implement their project of political renewal that they may become a&nbsp;major threat to democracy. In such less favorable institutional circumstances, the strategies of the populists’ own </span><i data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">parties</span></i><span data-dcnode-id="2296" instrument_node=""> and of related parties in their own camp become particularly important. Thus, for Levitsky and Ziblatt (</span><a aria-label="Reference 2018" data-dcnode-id="2294" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d189959617e1295" title="Levitsky, Steven, and Daniel Ziblatt. 2018. How democracies die. N.Y.: Crown."><span data-dcnode-id="2295" instrument_node="">2018</span></a><span data-dcnode-id="2293" instrument_node="">, p.&nbsp;7), an essential test for democracies is not whether such populist leaders emerge but “whether political leaders, and especially political parties, work to prevent them from gaining power in the first place.” They are afraid that institutions—written constitutions and norms of mutual toleration and forbearance (i.e., patient self-restraint)—are not enough to rein in elected autocrats. For them (p.&nbsp;19), parties are the essential gatekeepers. Successful gatekeeping requires that mainstream parties isolate and defeat extremist forces. It is “the abdication of political responsibility by existing leaders” that often marks a&nbsp;nation’s first step toward authoritarianism.</span></p><p data-dcnode-id="2281"><span data-dcnode-id="2291" instrument_node="">In this respect, it is worthwhile to remind ourselves of Linz’s (</span><a aria-label="Reference 1978" data-dcnode-id="2289" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d189959617e1301" title="Linz, Juan. 1978. The breakdown of democratic regimes. Crisis, breakdown, and reequilibration. Baltimore: The Johns Hopkins University Press."><span data-dcnode-id="2290" instrument_node="">1978</span></a><span data-dcnode-id="2288" instrument_node="">) analysis of the breakdown of democracy in the interwar period: He distinguished between loyal, semiloyal, and disloyal oppositions in democratic regimes. Fascists and communists were the disloyal oppositions, but most interesting from the contemporary point of view are the </span><i data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">semiloyal opponents</span></i><span data-dcnode-id="2285" instrument_node=""> from less radical parties: Linz characterized them as willing to encourage, tolerate, cover up, treat leniently, excuse, or justify actions of other participants in the political process that go beyond the limits of peaceful, legitimate patterns of politics in democracy. Ultimately, he identified semiloyalty by its greater affinity for radicals on its own side of the political spectrum than for the supporters of the democratic principles. Thus, in the Weimar Republic, the semiloyal opposition contributed to the breakdown of the system by seeking the support of the disloyal opposition and by helping it into power. Building on Linz’s analysis, I&nbsp;would like to suggest that the politicians of the populist leaders’ own party and of related parties in their own camp become critical for his or her maneuvering space. To the extent that they condone the excesses of the maverick in power, they crucially contribute to the danger he or she poses for democracy. This is what has happened, tragically, in the United States, where most Republican leaders closed ranks behind Trump, and the election became a&nbsp;standard two-party race (Levitsky and Ziblatt </span><a aria-label="Reference 2018" data-dcnode-id="2283" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d189959617e1307" title="Levitsky, Steven, and Daniel Ziblatt. 2018. How democracies die. N.Y.: Crown."><span data-dcnode-id="2284" instrument_node="">2018</span></a><span data-dcnode-id="2282" instrument_node="">, p.&nbsp;70, 201). Trump’s deviance has been tolerated by the Republican party, which has helped make it acceptable to much of the Republican electorate. And by spring 2018, Trump’s takeover of the party’s institutions has been largely complete. Another instance of this mechanism is the toleration of Victor Orbán within the ranks of the European People’s Party. By contrast, after many years of toleration, to be sure, the South African ANC has succeeded in ousting its maverick leader Jacob Zuma and replacing him with a&nbsp;democratic leader, Cyril Ramaphosa.</span></p><p data-dcnode-id="2264"><span data-dcnode-id="2280" instrument_node="">The third constraint is the </span><i data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">international</span></i><span data-dcnode-id="2277" instrument_node=""> constraint. Following Levitsky and Way (</span><a aria-label="Reference 2010" data-dcnode-id="2275" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d189959617e1317" title="Levitsky, Steven, and Lucan A.&nbsp;Way. 2010. Competitive authoritarianism. Hybrid regimes after the cold war. Cambridge: U Press."><span data-dcnode-id="2276" instrument_node="">2010</span></a><span data-dcnode-id="2274" instrument_node="">), external leverage and linkage may be key factors for keeping populists in power in check. However, the recent survey of a&nbsp;number of key cases of populists in power suggests that “international actors do have a&nbsp;difficult time when it comes to dealing with populists in power” (Taggart and Rovira-Kaltwasser </span><a aria-label="Reference 2016" data-dcnode-id="2272" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d189959617e1320" title="Taggart, Paul, and Cristóbal Rovira-Kaltwasser. 2016. Dealing with populists in government: some comparative conclusions. Democratization 23(2):345–365."><span data-dcnode-id="2273" instrument_node="">2016</span></a><span data-dcnode-id="2271" instrument_node="">, p.&nbsp;356). This is related to the fact that international institutions such as the EU or the Organization of American States have a&nbsp;limited tool kit for defending democracy. In the case of the EU, membership is conditional on meeting several democratic conditions. However, once a&nbsp;country has become a&nbsp;member, the EU has limited capacity to impose compliance with democratic rules and procedures. This has been illustrated by the so-called Haider affair, which deeply traumatized the EU (Müller </span><a aria-label="Reference 2013" data-dcnode-id="2269" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d189959617e1323" title="Müller, Jan-Werner. 2013. Defending democracy within the EU. Journal of Democracy 24(2):138–149."><span data-dcnode-id="2270" instrument_node="">2013</span></a><span data-dcnode-id="2268" instrument_node="">, p.&nbsp;139). It is equally illustrated by the way the EU has been dealing with Orbán’s Hungary and Kaczyński’s Poland. Moreover, as Taggart and Rovira-Kaltwasser (</span><a aria-label="Reference 2016" data-dcnode-id="2266" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d189959617e1326" title="Taggart, Paul, and Cristóbal Rovira-Kaltwasser. 2016. Dealing with populists in government: some comparative conclusions. Democratization 23(2):345–365."><span data-dcnode-id="2267" instrument_node="">2016</span></a><span data-dcnode-id="2265" instrument_node="">, p.&nbsp;356) suggest, outside interventions may backfire, as they give populists in government the opportunity to denounce coalitions between domestic and foreign actors that undermine the will of the people. This is perfectly illustrated by the Greek referendum in 2015, when the Greek voters turned down the austerity package offered by the international actors, although they were under great pressure to accept it.</span></p><p data-dcnode-id="2259"><span data-dcnode-id="2263" instrument_node="">A&nbsp;fourth constraint is the constraint imposed by the </span><i data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">markets</span></i><span data-dcnode-id="2260" instrument_node="">. Thus, during the final phase of the protracted Italian government formation in 2018, the markets reacted sharply when the leaders of the two populist parties submitted a&nbsp;list of prospective ministers to the president that included a&nbsp;finance minister who was an explicit opponent of Italy’s membership in the Eurozone. When the populists backed down and were prepared to compromise, the markets calmed down to some extent, too. The sanctioning potential of the markets seems to be much bigger than that of international political actors.</span></p><p data-dcnode-id="2242"><span data-dcnode-id="2258" instrument_node="">Finally, the most important constraint is constituted by the </span><i data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">voters</span></i><span data-dcnode-id="2255" instrument_node="">. Aspiring despots may be beaten at the polls. Of course, it is by no means certain that voters will vote against populists in power. As Schedler (</span><a aria-label="Reference 2018" data-dcnode-id="2253" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d189959617e1341" title="Schedler, Andreas 2018. A Threat to Democracy? Donald Trump in Comparative Perspective, unpubl. Ms."><span data-dcnode-id="2254" instrument_node="">2018</span></a><span data-dcnode-id="2252" instrument_node="">) points out, it has been quite puzzling and disturbing “to see majorities (or at least pluralities) of voters supporting, once and again, illiberal governments who have been, step by step, dismantling their democratic rights and liberties.” Schedler suggests that voters might care more about other values (such as social justice, religious piety, security, or the national soul) than democracy; they may fail to see that democracy is being taken apart before their eyes; or they may have competing conceptions of democracy. However, let us not forget that liberal democracy is strong, because, as Galston (</span><a aria-label="Reference 2018" data-dcnode-id="2250" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d189959617e1344" title="Galston, William A. 2018. The populist challenge to liberal democracy. Journal of Democracy 29(2):5–19."><span data-dcnode-id="2251" instrument_node="">2018</span></a><span data-dcnode-id="2249" instrument_node="">) suggests, to a&nbsp;greater extent than any other political form, it harbors </span><i data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">the power of self-correction</span></i><span data-dcnode-id="2246" instrument_node="">. It is possible that voters will unseat aspiring autocrats. Armenia, Malaysia, the Maldives, Turkey, and Ukraine provide recent examples from outside Europe of the voters’ power. In April 2018, a&nbsp;protest movement succeeded in ousting Serzh Sargsyan, who had ruled Armenia for the past decade, replacing him with Nikol Pashinyan, a&nbsp;journalist turned lawmaker. Meanwhile, in Malaysia’s general elections in early May 2018, a&nbsp;broad coalition of voters ousted Prime Minister Najib in spite of his shameless attempts to rig the elections and hold on to power. Malaysia’s citizens have finally been able to reassert their right to change the way the country is run. In the case of Malaysia, the sentiments reflect “less a&nbsp;revolution than a&nbsp;restoration”—a&nbsp;return to an earlier era of settled law, fair judges, and democratic accountability that has survived in the national imagination (</span><i data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">The Economist</span></i><span data-dcnode-id="2243" instrument_node="">, May&nbsp;17, 2018). In September 2018, the opposition leader Ibrahim Mohamed Solih was elected to replace the authoritarian incumbent in the Maldives. The Turkish local elections that were equally held in spring 2019 indicate that voters are able to impose limits on the autocratic ambitions of President Erdoğan.</span></p><p data-dcnode-id="2234"><span data-dcnode-id="2241" instrument_node="">In Europe, we need to distinguish between regions. In northwestern Europe, where the radical right has been the main populist force, its illiberal potential has been curbed so far by institutional and partisan constraints—the division of power by proportional electoral systems and the need to form coalitions when getting into power. Moreover, the radical right constituency became less dissatisfied in all the cases where these parties got into power (see Kriesi and Schulte-Cloos </span><a aria-label="Reference forthcoming" data-dcnode-id="2239" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d189959617e1356" title="Kriesi, Hanspeter and Julia Schulte-Cloos. forthcoming. Support for radical parties in Western Europe: structural conflicts and political dynamcis, Electoral Studies."><span data-dcnode-id="2240" instrument_node="">forthcoming</span></a><span data-dcnode-id="2238" instrument_node="">; Haugsgjerd </span><a aria-label="Reference 2019" data-dcnode-id="2236" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d189959617e1359" title="Haugsgjerd, Atle. 2019. Moderation or radicalization? How executive power affects right-wing populists’ satisfaction with democracy. Electoral Studies 57:31–45. 
https://doi.org/10.1016/j.electstud.2018.09.008

."><span data-dcnode-id="2237" instrument_node="">2019</span></a><span data-dcnode-id="2235" instrument_node="">). In southern Europe, where the radical left has been the main populist force, its illiberal potential has also been limited so far by institutional and partisan constraints—proportional electoral systems and the need to enter into coalition with other parties, as well as by market constraints. The partisan constraints worked even in the case of the coalition of populists who governed Italy in 2018/2019: Because of their incompatible programs, the coalition partners imposed limits on each other. In central–eastern Europe, there are fewer constraints on populists in power because the electoral systems allow them to get undivided power in countries like Hungary and Poland. The market constraints as well as the international constraints have also proved to be weak so far. However, democracy’s power of self-correction may also assert itself in this part of Europe. Thus, Zuzana Čaputová’s victory in the presidential elections in Slovakia in March 2019 provides a&nbsp;signal that liberal democracy is recovering central-eastern Europe. And the Ukrainian presidential elections in April 2019, which were won by a&nbsp;complete outsider, confirm the power of self-correction that voters wield even in hybrid democracies.</span></p></div></div></section><section data-dcnode-id="2216" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="2217" id="Sec12-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2229" id="Sec12"><span data-dcnode-id="2230" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="2218" id="Sec12-content"><p data-dcnode-id="2221"><span data-dcnode-id="2228" instrument_node="">There clearly are dangers for democracy, but let us underscore with Galston (</span><a aria-label="Reference 2018" data-dcnode-id="2226" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d189959617e1372" title="Galston, William A. 2018. The populist challenge to liberal democracy. Journal of Democracy 29(2):5–19."><span data-dcnode-id="2227" instrument_node="">2018</span></a><span data-dcnode-id="2225" instrument_node="">) a&nbsp;less fashionable point: This is no time for panic. As we have seen, modernization theorists concur. They believe that democracy, in the long run, will impose itself as a&nbsp;result of the spread of fundamental values that underpin it, even if we find some short-term limited reversal of the long-term progress of democracy. In Europe in particular, there is no reason to dramatize. Among the European citizens, the principles of democracy are widely supported, even if dissatisfaction with democracy is widespread—especially in the European south and the European east. To be sure, there is widespread indifference and alienation in different parts of Europe, in particular among the youngest generations, which is indeed preoccupying. However, there are also large groups of critical citizens who combine support of democratic ideals with dissatisfaction with the existing democracies of their own countries, especially in southern and central–eastern Europe (see Kriesi and Vidal </span><a aria-label="Reference 2020" data-dcnode-id="2223" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d189959617e1375" title="Kriesi, Hanspeter and Guillem Vidal. 2020. Types of democrats. Unpubl. Paper, Florence: EUI."><span data-dcnode-id="2224" instrument_node="">2020</span></a><span data-dcnode-id="2222" instrument_node="">). It is these critical citizens who may reassert themselves and exercise the self-corrective power of democracy.</span></p><p data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Democratic dissatisfaction contributes to the rise of radical challenger parties, especially on the radical left in southern Europe but also on the radical right across western Europe. These parties express widespread dissatisfaction with democracy and contribute to it by their populist discourse. The good news is that across western Europe, once these parties are in government, democratic dissatisfaction seems to evaporate among their voters, and they arguably become parties like any other mainstream party, provided they do not gain power undivided. Most dangerous are situations where populist challengers do not have to share power in government. In western Europe, parliamentary democracies and proportional electoral systems tend to guard against populists gaining undivided power. The Italian case shows that populists of different persuasions may join forces to govern, but it also suggests that they may not be able to govern effectively. The institutional context is less favorable for democracy in central–eastern Europe, where semipresidential systems (Poland, Romania) and electoral systems heavily skewed in favor of the largest party (Hungary) provide the possibility for populists to gain undivided power. Other safeguards—partisan, international, and market constraints—may be less reliable than often hoped for. In the final analysis, it is the voters who may resort to sanctioning aspiring autocrats in this part of Europe as well.</span></p></div></div></section><span data-dcnode-id="2215" instrument_node="">
</span><section data-dcnode-id="2205" data-title="Notes"><div class="c-article-section" data-dcnode-id="2206" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2213" id="notes"><span data-dcnode-id="2214" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="2207" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="2208"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="2209" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="2210"><p data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">The four countries for each region are France, Germany, Ireland, and the UK for continental Europe; Greece, Italy, Portugal, and Spain for southern Europe; and Hungary, Latvia, Poland, and Romania for central–eastern Europe.</span></p></div></li></ol></div></div></section><div data-dcnode-id="1418" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="1419" data-title="References"><div class="c-article-section" data-dcnode-id="1420" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2203" id="Bib1"><span data-dcnode-id="2204" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="1421" id="Bib1-content"><div data-container-section="references" data-dcnode-id="1422"><ul class="c-article-references" data-dcnode-id="1432"><li class="c-article-references__item js-c-reading-companion-references-item" data-dcnode-id="2193"><p class="c-article-references__text" data-dcnode-id="2198" id="ref-CR2"><span data-dcnode-id="2202" instrument_node="">Akkerman, Agnes, Cas Mudde, and Andrej Zaslove. 2014. How populist are the people? Measuring populist attitudes in voters. </span><i data-dcnode-id="2200"><span data-dcnode-id="2201" inst
