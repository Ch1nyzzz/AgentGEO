</span><li data-dcnode-id="1454"><a data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globsec.org/publication-tag/voices-of-cee/"><span data-dcnode-id="1456" instrument_node="">Voices of CEE</span></a></li><span data-dcnode-id="1453" instrument_node="">
</span><li data-dcnode-id="1450"><a data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globsec.org/publication-tag/voices-of-cee-2021/"><span data-dcnode-id="1452" instrument_node="">Voices of CEE 2021</span></a></li><span data-dcnode-id="1449" instrument_node="">

By
</span><a data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globsec.org/people/dominika-hajdu/"><span data-dcnode-id="1440" instrument_node="">Dominika Hajdu, </span></a><span data-dcnode-id="1438" instrument_node="">
</span><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globsec.org/people/katarina-klingova/"><span data-dcnode-id="1437" instrument_node="">Katarína Klingová.</span></a><span data-dcnode-id="1435" instrument_node="">
</span></div><span data-dcnode-id="1433" instrument_node="">
</span></div><span data-dcnode-id="1431" instrument_node="">
</span><div class="post-content" data-dcnode-id="1343"><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1421"><span data-contrast="none" data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">At times of instability and insecurity reinforced by the COVID-19 pandemic,</span></span><span data-contrast="none" data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">&nbsp;</span></span><span data-contrast="none" data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">democracies can become particularly fragile. A belief in good governance, trustworthy media and institutions, and active civil society are now crucial for the democratic societies to get back on feet, move forward and overcome societal and economic challenges of the near future. But what if the societies lack these components?  </span></span><span data-ccp-props="{&quot;134233117&quot;:true,&quot;134233118&quot;:true,&quot;201341983&quot;:2,&quot;335559740&quot;:405}" data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1406"><span data-contrast="none" data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">GLOBSEC’s new report&nbsp;</span></span><b data-dcnode-id="1415"><span data-contrast="none" data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Voices of Central and Eastern Europe: Perceptions of democracy &amp; governance in 10 EU countries</span></span></b><span data-contrast="none" data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">,&nbsp;</span></span><span data-contrast="none" data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">provides a unique insight into satisfaction with democracy and current governance systems in 10 Central and Eastern European countries</span></span><span data-contrast="none" data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">: Austria, Bulgaria, Czechia, Estonia, Hungary, Latvia, Lithuania, Poland, Romania and Slovakia.</span></span><span data-ccp-props="{&quot;134233117&quot;:true,&quot;134233118&quot;:true,&quot;201341983&quot;:2,&quot;335559740&quot;:405}" data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1400"><span data-contrast="none" data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">By observing links between the support for liberal democracy over autocracy, satisfaction with the governance and life, or inclination to believe in conspiracy and misinformation narratives, the report reveals fragile spots that require further discussion on multiple levels. </span></span><span data-ccp-props="{&quot;134233117&quot;:true,&quot;134233118&quot;:true,&quot;201341983&quot;:2,&quot;335559740&quot;:405}" data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1396"><strong data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Here are our key findings:&nbsp;</span></strong></p><span data-dcnode-id="1395" instrument_node="">
</span><ul data-dcnode-id="1345"><span data-dcnode-id="1394" instrument_node="">
</span><li aria-setsize="-1" data-aria-level="1" data-aria-posinset="1" data-dcnode-id="1389" data-font="Symbol" data-leveltext="" data-listid="1"><span data-contrast="none" data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">In countries with higher rankings in democracy quality indexes, respondents are more satisfied with their current governance system.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="1388" instrument_node="">
</span><li aria-setsize="-1" data-aria-level="1" data-aria-posinset="2" data-dcnode-id="1383" data-font="Symbol" data-leveltext="" data-listid="1"><span data-contrast="none" data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Support for liberal democracy is not straightforward in the region. Only in 5 of 10 countries, more than 50% of the respondents would choose liberal democracy over an autocratic leader.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="1382" instrument_node="">
</span><li aria-setsize="-1" data-aria-level="1" data-aria-posinset="3" data-dcnode-id="1377" data-font="Symbol" data-leveltext="" data-listid="1"><span data-contrast="none" data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Only Austrians, Estonians and Czechs are more satisfied with their governance system than dissatisfied.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="1376" instrument_node="">
</span><li aria-setsize="-1" data-aria-level="1" data-aria-posinset="4" data-dcnode-id="1371" data-font="Symbol" data-leveltext="" data-listid="1"><span data-contrast="none" data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">There is a strong recognition of income inequality and systemic favouritism for those with contacts to elites and higher incomes – on average, 70% in the region believe that those with contacts to political elites are favoured in society.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="1370" instrument_node="">
</span><li aria-setsize="-1" data-aria-level="1" data-aria-posinset="4" data-dcnode-id="1363" data-font="Symbol" data-leveltext="" data-listid="1"><span data-contrast="none" data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">The majority of</span></span><span data-contrast="none" data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">&nbsp;CEE respondents does not believe the narrative that their values are under threat due to the “West” – only 28% on average believe so.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="1362" instrument_node="">
</span><li aria-setsize="-1" data-aria-level="1" data-aria-posinset="4" data-dcnode-id="1357" data-font="Symbol" data-leveltext="" data-listid="1"><span data-contrast="none" data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">On average, only 44% in the region trust the media. But at the same time, in Austria, Czechia, Romania and Slovakia, more than 70% believe that media is rather or completely free of influence.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="1356" instrument_node="">
</span><li aria-setsize="-1" data-aria-level="1" data-aria-posinset="4" data-dcnode-id="1353" data-font="Symbol" data-leveltext="" data-listid="1"><span data-contrast="none" data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Those who believe in conspiracy theories and disinformation narratives are very likely to prefer a strong leader over liberal democracy and would trade their democratic freedoms for other social and financial benefits.</span></span></li><span data-dcnode-id="1352" instrument_node="">
</span><li aria-setsize="-1" data-aria-level="1" data-aria-posinset="4" data-dcnode-id="1347" data-font="Symbol" data-leveltext="" data-listid="1"><span data-contrast="none" data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Slovakia and Bulgaria are the most conspiracy theory- and misinformation-prone in the region. On average, around a half of respondents agreed with the narratives articulated.</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335559739&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="1346" instrument_node="">
</span></ul><span data-dcnode-id="1344" instrument_node="">
</span></div><span data-dcnode-id="1342" instrument_node="">

</span><table class="cookielawinfo-row-cat-table cookielawinfo-winter" data-dcnode-id="346"><thead data-dcnode-id="425"><tr data-dcnode-id="426"><th class="cookielawinfo-column-1" data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Cookie</span></th><th class="cookielawinfo-column-3" data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Duration</span></th><th class="cookielawinfo-column-4" data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Description</span></th></tr></thead><tbody data-dcnode-id="347"><tr class="cookielawinfo-row" data-dcnode-id="418"><td class="cookielawinfo-column-1" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">__gads</span></td><td class="cookielawinfo-column-3" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">1 year 24 days</span></td><td class="cookielawinfo-column-4" data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">The __gads cookie, set by Google, is stored under DoubleClick domain and tracks the number of times users see an advert, measures the success of the campaign and calculates its revenue. This cookie can only be read from the domain they are set on and will not track any data while browsing through other sites.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="411"><td class="cookielawinfo-column-1" data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">_ga</span></td><td class="cookielawinfo-column-3" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">2 years</span></td><td class="cookielawinfo-column-4" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">The _ga cookie, installed by Google Analytics, calculates visitor, session and campaign data and also keeps track of site usage for the site's analytics report. The cookie stores information anonymously and assigns a randomly generated number to recognize unique visitors.</span></td></tr><tr class="cookielawinfo-row" data-dcno
