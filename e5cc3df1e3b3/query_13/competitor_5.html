</span><h3 class="heading" data-dcnode-id="2967"><span data-dcnode-id="2971" instrument_node="">
</span><slot data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">The Crisis of Social Democracy in Europe
        </span></slot><span data-dcnode-id="2968" instrument_node="">
</span></h3><span data-dcnode-id="2966" instrument_node="">
</span></book-view-pharos-heading><span data-dcnode-id="2963" instrument_node="">
</span><div data-dcnode-id="2953" data-qa="book-description"><strong data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">Book Description:</span></strong><span data-dcnode-id="2960" instrument_node=""> </span><p data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node=""> Is social democracy in a terminal condition in Europe? </span></p><p data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">Social democracy is in office almost nowhere and appears bereft of ideas in the face of the economic crisis that might have given it a historic opportunity. So is social democracy dead?  </span></p><p data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">The contributors to this book take a stand against those who claim that social democracy has reached its end. By arguing that social democracy is not a single set of ideas or practices but a way of reconciling market capitalism with social inclusion and equality, they show that it has actually been remarkably successful during the 20th century. Its key principles are still relevant but must be adapted to new conditions. This book examines the fortunes of social democracy in western and east-central Europe and the policy challenges in economic policy, labour markets, social welfare, public services, European integration and decentralisation.  </span></p></div><span data-dcnode-id="2952" instrument_node="">
</span><div data-dcnode-id="2948" data-qa="book-eisbn"><strong data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">eISBN:</span></strong><span data-dcnode-id="2949" instrument_node=""> 978-0-7486-6583-9</span></div><span data-dcnode-id="2947" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="2120"><p data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">On the face of it, social democracy is in crisis. At the time of writing, there are very few left-of-centre parties in power in Western Europe. Norway, Denmark and Belgium have social democrat heads of government but in coalition, while the French Socialists govern thanks to divisions on the right and the electoral system. In Central and Eastern Europe, social democratic parties – whether new parties or former communist parties – have failed to fulfil their early promise.</span></p><p data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Why should this be? One might take the view that it is all part of the electoral cycle, and that sooner or...</span></p></div><span data-dcnode-id="2119" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1623"><p data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">This chapter addresses the following question: can the weakening of the social democratic political project in Europe be explained by the fact the social democratic model of society no longer performs? In other words, can the recent electoral crisis in social democratic parties be seen as a rational response from an electorate saying goodbye to a socio-economic model? If you want to compare social democratic policies with some kind of utopian political programme, you will certainly be disappointed. As pointed out in the introductory chapter to this volume, social democracy was never a utopian political project and its earlier success...</span></p></div><span data-dcnode-id="1622" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1525"><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">This chapter begins with a contention dating back more than twenty years (see Milner 1989): in Sweden, social democracy is not merely the programme of a party, but constitutes a way of life incorporated into the institutions of society. Despite some overreaching in the 1970s, and the ensuing backlash in the early 1980s, the social democratic way of life had become entrenched in what had come to be known as the ‘Swedish model’. The model consisted of a logically coherent set of policies and institutions instituted over half a century by the Swedish Social Democratic Party (SAP) and its allies...</span></p></div><span data-dcnode-id="1524" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1128"><p data-dcnode-id="1129"><span data-dcnode-id="1133" instrument_node="">Between 1945 and the 1980s, successful social democratic economic policy was facilitated by Keynesian demand management policies, fostering full employment, increasing employees’ incomes, and built on a close relationship between government and trade unions. This was seen most clearly in the Nordic countries and in Germany under Willi Brandt. However, elements could also be seen, for example, in British ‘Labourism’ and French </span><em data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">dirigisme</span></em><span data-dcnode-id="1130" instrument_node="">. During the last thirty years globalisation has posed profound challenges for the economies of Western Europe in general and for social democratic ideology and economic management in particular. Mass-produced goods are largely manufactured in Newly Industrialising Countries...</span></p></div><span data-dcnode-id="1127" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1036"><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Each political season calls for new discourses and novel rhetoric. The Europe of Monnet was the Europe of peace and economic growth. The continued transformation of the European project over the past fifty years has required new narratives. The Lisbon Treaty rallied to the post-1945 German motto of committing Europe to ‘the social market economy’. It was a useful reminder of the ongoing challenge that advanced capitalist economies have had to face over the past 150 years: how to reconcile market iron rules with the imperatives of (social) democracy. Over the past century this historical compromise has taken on national...</span></p></div><span data-dcnode-id="1035" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="942"><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">The main aim of this chapter is to account for and assess the dilemmas and difficulties a social democratic approach to crime and security faces in the context of the modern state. It examines the historical approach to these difficulties and identifies some of the new challenges to have emerged over the past thirty years or so. The chapter concludes by assessing the prospects of a new wave of social democratic policy on crime and security in the face of the combination of new and old challenges.</span></p><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Historically the attitude of social democrats to crime and insecurity has displayed a...</span></p></div><span data-dcnode-id="941" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="850"><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Social democracy emerged within the nation-state at a time when states were consolidating institutionally and deepening their penetration of society. During the first half of the twentieth century, social democrats increasingly saw the state as the vehicle for realising their ambitions of social progress and popular control of the economy. Yet there are competing traditions within social democracy about the nature of the state, its unity and the degree of centralisation or decentralisation most compatible with social democratic aims. I am not concerned here with the debate between supporters of national vs international socialism, although the European question raises very...</span></p></div><span data-dcnode-id="849" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="758"><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Is social democracy dead? Or, rather, as Neal Ascherson formulates it, is ‘the regulated, social democratic welfare order’ dead? Readers will possibly have reached their own conclusion, as well as their assessment as to whether it is the more troubling death, if death it is. Our own view is that it is possibly more complicated than that, dependent, as it is, on what we mean by ‘social democracy’ and, crucially, the health or otherwise of its political carriers. History should make us wary of jumping to a conclusion. In this concluding chapter, we will focus on the following key issues:...</span></p></div><span data-dcnode-id="757" instrument_node="">
