</span><h3 data-dcnode-id="5934"><span class="mw-headline" data-dcnode-id="5942" id="Aftermath"><span data-dcnode-id="5943" instrument_node="">Aftermath</span></span><span class="mw-editsection" data-dcnode-id="5935"><span class="mw-editsection-bracket" data-dcnode-id="5940"><span data-dcnode-id="5941" instrument_node="">[</span></span><a data-dcnode-id="5938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_espionage_in_the_United_States%26action%3Dedit%26section%3D8" title="Edit section: Aftermath"><span data-dcnode-id="5939" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5936"><span data-dcnode-id="5937" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5933" instrument_node="">
</span><p data-dcnode-id="5915"><span data-dcnode-id="5932" instrument_node="">President </span><a data-dcnode-id="5930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harry_S._Truman" title="Harry S. Truman"><span data-dcnode-id="5931" instrument_node="">Harry S. Truman</span></a><span data-dcnode-id="5929" instrument_node="">'s </span><a data-dcnode-id="5927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Executive_Order_9835" title="Executive Order 9835"><span data-dcnode-id="5928" instrument_node="">Executive Order 9835</span></a><span data-dcnode-id="5926" instrument_node=""> of 22 March 1947 tightened protections against subversive infiltration of the US Government, defining disloyalty as membership on a list of subversive organizations maintained by the </span><a data-dcnode-id="5924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Attorney_General" title="United States Attorney General"><span data-dcnode-id="5925" instrument_node="">Attorney General</span></a><span data-dcnode-id="5923" instrument_node="">. Truman, however, was opposed to the </span><a data-dcnode-id="5921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/McCarran_Internal_Security_Act" title="McCarran Internal Security Act"><span data-dcnode-id="5922" instrument_node="">McCarran Internal Security Act</span></a><span data-dcnode-id="5920" instrument_node=""> of 1950, calling it a "Mockery of the Bill of Rights" and a "long step towards totalitarianism".</span><sup class="reference" data-dcnode-id="5917" id="cite_ref-spartacus_37-0"><a data-dcnode-id="5918" href="#cite_note-spartacus-37"><span data-dcnode-id="5919" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5916" instrument_node="">
</span></p><span data-dcnode-id="5914" instrument_node="">
</span><h2 data-dcnode-id="5904"><span class="mw-headline" data-dcnode-id="5912" id="Cold_War_espionage"><span data-dcnode-id="5913" instrument_node="">Cold War espionage</span></span><span class="mw-editsection" data-dcnode-id="5905"><span class="mw-editsection-bracket" data-dcnode-id="5910"><span data-dcnode-id="5911" instrument_node="">[</span></span><a data-dcnode-id="5908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_espionage_in_the_United_States%26action%3Dedit%26section%3D9" title="Edit section: Cold War espionage"><span data-dcnode-id="5909" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5906"><span data-dcnode-id="5907" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5903" instrument_node="">
</span><link data-dcnode-id="5902" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5898" role="note"><span data-dcnode-id="5901" instrument_node="">See also: </span><a data-dcnode-id="5899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War_espionage" title="Cold War espionage"><span data-dcnode-id="5900" instrument_node="">Cold War espionage</span></a></div><table class="box-Expand_section plainlinks metadata ambox mbox-small-left ambox-content" data-dcnode-id="5877" role="presentation"><tbody data-dcnode-id="5878"><tr data-dcnode-id="5879"><td class="mbox-image" data-dcnode-id="5895"><a class="image" data-dcnode-id="5896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWiki_letter_w_cropped.svg"><img alt="[icon]" data-dcnode-id="5897" data-file-height="31" data-file-width="44" decoding="async" height="14" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Wiki_letter_w_cropped.svg/20px-Wiki_letter_w_cropped.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Wiki_letter_w_cropped.svg/30px-Wiki_letter_w_cropped.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Wiki_letter_w_cropped.svg/40px-Wiki_letter_w_cropped.svg.png 2x" width="20"></a></td><td class="mbox-text" data-dcnode-id="5880"><div class="mbox-text-span" data-dcnode-id="5881"><span data-dcnode-id="5894" instrument_node="">This section </span><b data-dcnode-id="5892"><span data-dcnode-id="5893" instrument_node="">needs expansion</span></b><span data-dcnode-id="5891" instrument_node="">. You can help by </span><a class="external text" data-dcnode-id="5889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_espionage_in_the_United_States%26action%3Dedit%26section%3D"><span data-dcnode-id="5890" instrument_node="">adding to it</span></a><span data-dcnode-id="5888" instrument_node="">.  </span><span class="date-container" data-dcnode-id="5882"><i data-dcnode-id="5883"><span data-dcnode-id="5887" instrument_node="">(</span><span class="date" data-dcnode-id="5885"><span data-dcnode-id="5886" instrument_node="">April 2021</span></span><span data-dcnode-id="5884" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="5876" instrument_node="">
</span><p data-dcnode-id="5864"><span data-dcnode-id="5875" instrument_node="">Soviet espionage operations continued during the Cold War. The </span><a data-dcnode-id="5873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venona_project" title="Venona project"><span data-dcnode-id="5874" instrument_node="">Venona project</span></a><span data-dcnode-id="5872" instrument_node="">, declassified in 1995 by the </span><a data-dcnode-id="5870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moynihan_Commission_on_Government_Secrecy" title="Moynihan Commission on Government Secrecy"><span data-dcnode-id="5871" instrument_node="">Moynihan Commission</span></a><span data-dcnode-id="5869" instrument_node="">, contained extensive evidence of the activities of Soviet spy networks in America.</span><sup class="reference" data-dcnode-id="5866" id="cite_ref-:4_38-0"><a data-dcnode-id="5867" href="#cite_note-:4-38"><span data-dcnode-id="5868" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5865" instrument_node="">
</span></p><p data-dcnode-id="5849"><span data-dcnode-id="5863" instrument_node="">The </span><a data-dcnode-id="5861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mitrokhin_Archive" title="Mitrokhin Archive"><span data-dcnode-id="5862" instrument_node="">Mitrokhin Archive</span></a><span data-dcnode-id="5860" instrument_node=""> showed that the Soviets did not just perform espionage in terms of gathering intelligence, but also used its intelligence agencies for "</span><a data-dcnode-id="5858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Active_measures" title="Active measures"><span data-dcnode-id="5859" instrument_node="">active measures</span></a><span data-dcnode-id="5857" instrument_node="">" a form of political warfare involving forgeries and </span><a data-dcnode-id="5855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disinformation" title="Disinformation"><span data-dcnode-id="5856" instrument_node="">disinformation</span></a><span data-dcnode-id="5854" instrument_node="">.</span><sup class="reference" data-dcnode-id="5851" id="cite_ref-:0_39-0"><a data-dcnode-id="5852" href="#cite_note-:0-39"><span data-dcnode-id="5853" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5850" instrument_node="">
</span></p><span data-dcnode-id="5848" instrument_node="">
</span><h3 data-dcnode-id="5838"><span class="mw-headline" data-dcnode-id="5846" id="Communist_Party_USA"><span data-dcnode-id="5847" instrument_node="">Communist Party USA</span></span><span class="mw-editsection" data-dcnode-id="5839"><span class="mw-editsection-bracket" data-dcnode-id="5844"><span data-dcnode-id="5845" instrument_node="">[</span></span><a data-dcnode-id="5842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_espionage_in_the_United_States%26action%3Dedit%26section%3D10" title="Edit section: Communist Party USA"><span data-dcnode-id="5843" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5840"><span data-dcnode-id="5841" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5837" instrument_node="">
</span><p data-dcnode-id="5822"><span data-dcnode-id="5836" instrument_node="">During the Second World War, the </span><a data-dcnode-id="5834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_USA" title="Communist Party USA"><span data-dcnode-id="5835" instrument_node="">Communist Party USA</span></a><span data-dcnode-id="5833" instrument_node=""> was a center of Soviet espionage in the United States. After the war, this continued. Espionage historian </span><a data-dcnode-id="5831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Earl_Haynes" title="John Earl Haynes"><span data-dcnode-id="5832" instrument_node="">John Earl Haynes</span></a><span data-dcnode-id="5830" instrument_node=""> states that the CPUSA was essentially a Soviet "</span><a data-dcnode-id="5828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fifth_column" title="Fifth column"><span data-dcnode-id="5829" instrument_node="">fifth column</span></a><span data-dcnode-id="5827" instrument_node="">", though "dried up as a base for Soviet espionage once the administration got serious about internal security".</span><sup class="reference" data-dcnode-id="5824" id="cite_ref-:42_40-0"><a data-dcnode-id="5825" href="#cite_note-:42-40"><span data-dcnode-id="5826" instrument_node="">[40]</span></a></sup><span data-dcnode-id="5823" instrument_node="">
</span></p><p data-dcnode-id="5804"><span data-dcnode-id="5821" instrument_node="">The Communist Party USA received a substantial subsidy from the USSR from 1959 until 1989. Because the CPUSA consistently maintained a pro-Moscow line, many members left over time dissatisfied with events of Soviet repression, such as in </span><a data-dcnode-id="5819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungarian_Revolution_of_1956" title="Hungarian Revolution of 1956"><span data-dcnode-id="5820" instrument_node="">Hungary in 1956</span></a><span data-dcnode-id="5818" instrument_node=""> and in </span><a data-dcnode-id="5816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact_invasion_of_Czechoslovakia" title="Warsaw Pact invasion of Czechoslovakia"><span data-dcnode-id="5817" instrument_node="">Czechoslovakia in 1968</span></a><span data-dcnode-id="5815" instrument_node="">. The Soviet funding ended in 1989 when </span><a data-dcnode-id="5813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gus_Hall" title="Gus Hall"><span data-dcnode-id="5814" instrument_node="">Gus Hall</span></a><span data-dcnode-id="5812" instrument_node=""> condemned the initiatives taken by </span><a data-dcnode-id="5810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="5811" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="5809" instrument_node="">.</span><sup class="reference" data-dcnode-id="5806" id="cite_ref-41"><a data-dcnode-id="5807" href="#cite_note-41"><span data-dcnode-id="5808" instrument_node="">[41]</span></a></sup><span data-dcnode-id="5805" instrument_node="">
</span></p><p data-dcnode-id="5792"><span data-dcnode-id="5803" instrument_node="">In 1952, Jack and </span><a data-dcnode-id="5801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morris_Childs" title="Morris Childs"><span data-dcnode-id="5802" instrument_node="">Morris Childs</span></a><span data-dcnode-id="5800" instrument_node="">—both American-born ex-Soviet spies—became FBI double agents, and informed on the CPUSA for the rest of the Cold War, monitoring the Soviet funding and communications with Moscow.</span><sup class="reference" data-dcnode-id="5797" id="cite_ref-42"><a data-dcnode-id="5798" href="#cite_note-42"><span data-dcnode-id="5799" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="5794" id="cite_ref-43"><a data-dcnode-id="5795" href="#cite_note-43"><span data-dcnode-id="5796" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5793" instrument_node="">
</span></p><span data-dcnode-id="5791" instrument_node="">
</span><h3 data-dcnode-id="5781"><span class="mw-headline" data-dcnode-id="5789" id="Spy_motivations_and_Soviet_recruitment_techniques"><span data-dcnode-id="5790" instrument_node="">Spy motivations and Soviet recruitment techniques</span></span><span class="mw-editsection" data-dcnode-id="5782"><span class="mw-editsection-bracket" data-dcnode-id="5787"><span data-dcnode-id="5788" instrument_node="">[</span></span><a data-dcnode-id="5785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_espionage_in_the_United_States%26action%3Dedit%26section%3D11" title="Edit section: Spy motivations and Soviet recruitment techniques"><span data-dcnode-id="5786" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5783"><span data-dcnode-id="5784" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5780" instrument_node="">
</span><p data-dcnode-id="5768"><span data-dcnode-id="5779" instrument_node="">According to longtime CIA officer Frederick Wettering, many turncoats to the Soviets were not ideologically communist, such as </span><a data-dcnode-id="5777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aldrich_Ames" title="Aldrich Ames"><span data-dcnode-id="5778" instrument_node="">Aldrich Ames</span></a><span data-dcnode-id="5776" instrument_node=""> and </span><a data-dcnode-id="5774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Anthony_Walker" title="John Anthony Walker"><span data-dcnode-id="5775" instrument_node="">John Walker</span></a><span data-dcnode-id="5773" instrument_node=""> who "did it strictly for the money." Wettering summarized the motivations as "MIRE -- money, ideology, revenge and ego."</span><sup class="reference" data-dcnode-id="5770" id="cite_ref-44"><a data-dcnode-id="5771" href="#cite_note-44"><span data-dcnode-id="5772" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5769" instrument_node="">
</span></p><p data-dcnode-id="5760"><span data-dcnode-id="5767" instrument_node="">
According to Russian investigative writer, </span><a data-dcnode-id="5765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrei_Soldatov" title="Andrei Soldatov"><span data-dcnode-id="5766" instrument_node="">Andrei Soldatov</span></a><span data-dcnode-id="5764" instrument_node="">:</span><sup class="reference" data-dcnode-id="5761" id="cite_ref-45"><a data-dcnode-id="5762" href="#cite_note-45"><span data-dcnode-id="5763" instrument_node="">[45]</span></a></sup></p><blockquote data-dcnode-id="5757"><p data-dcnode-id="5758"><span data-dcnode-id="5759" instrument_node="">In Soviet times, intelligence and counterintelligence branches of the KGB were closely interconnected. In addition to its espionage abroad, the KGB was always busy collecting “intelligence from the territory,” a euphemism for recruiting foreign nationals in the Soviet Union, with an eye to subsequently running them as agents in their home countries. Regional departments of the KGB were tasked with recruiting foreigners traveling throughout the country.</span></p></blockquote><p data-dcnode-id="5748"><span data-dcnode-id="5756" instrument_node="">Former KGB defector </span><a data-dcnode-id="5754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jack_Barsky" title="Jack Barsky"><span data-dcnode-id="5755" instrument_node="">Jack Barsky</span></a><span data-dcnode-id="5753" instrument_node=""> stated, "Many a right-wing radical had given information to the Soviets under a 'false flag', thinking they were working with a Western ally, such as Israel, when in fact their contact was a KGB operative."</span><sup class="reference" data-dcnode-id="5750" id="cite_ref-46"><a data-dcnode-id="5751" href="#cite_note-46"><span data-dcnode-id="5752" instrument_node="">[46]</span></a></sup><span data-dcnode-id="5749" instrument_node="">
</span></p><h3 data-dcnode-id="5738"><span class="mw-headline" data-dcnode-id="5746" id="Cambridge_Five"><span data-dcnode-id="5747" instrument_node="">Cambridge Five</span></span><span class="mw-editsection" data-dcnode-id="5739"><span class="mw-editsection-bracket" data-dcnode-id="5744"><span data-dcnode-id="5745" instrument_node="">[</span></span><a data-dcnode-id="5742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_espionage_in_the_United_States%26action%3Dedit%26section%3D12" title="Edit section: Cambridge Five"><span data-dcnode-id="5743" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5740"><span data-dcnode-id="5741" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5737" instrument_node="">
</span><p data-dcnode-id="5702"><span data-dcnode-id="5736" instrument_node="">Notable cases of Cold War Soviet espionage included </span><a data-dcnode-id="5734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kim_Philby" title="Kim Philby"><span data-dcnode-id="5735" instrument_node="">Kim Philby</span></a><span data-dcnode-id="5733" instrument_node="">, a Soviet double agent and British intelligence liaison to American intelligence, who was revealed to be a member of the "</span><a data-dcnode-id="5731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cambridge_Five" title="Cambridge Five"><span data-dcnode-id="5732" instrument_node="">Cambridge Five</span></a><span data-dcnode-id="5730" instrument_node="">" spy ring in 1963.</span><sup class="reference" data-dcnode-id="5727" id="cite_ref-:4_38-1"><a data-dcnode-id="5728" href="#cite_note-:4-38"><span data-dcnode-id="5729" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5726" instrument_node=""> The other four members of the "Cambridge Five" spy ring included </span><a data-dcnode-id="5724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Maclean_%28spy%29" title="Donald Maclean (spy)"><span data-dcnode-id="5725" instrument_node="">Donald Maclean</span></a><span data-dcnode-id="5723" instrument_node="">, </span><a data-dcnode-id="5721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guy_Burgess" title="Guy Burgess"><span data-dcnode-id="5722" instrument_node="">Guy Burgess</span></a><span data-dcnode-id="5720" instrument_node="">, </span><a data-dcnode-id="5718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthony_Blunt" title="Anthony Blunt"><span data-dcnode-id="5719" instrument_node="">Anthony Blunt</span></a><span data-dcnode-id="5717" instrument_node="">, and </span><a data-dcnode-id="5715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Cairncross" title="John Cairncross"><span data-dcnode-id="5716" instrument_node="">John Cairncross</span></a><span data-dcnode-id="5714" instrument_node="">, although </span><a data-dcnode-id="5712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Straight" title="Michael Straight"><span data-dcnode-id="5713" instrument_node="">Michael Straight</span></a><span data-dcnode-id="5711" instrument_node=""> was also involved with the Soviet spy ring and there were possibly other alleged members.</span><sup class="reference" data-dcnode-id="5708" id="cite_ref-:5_47-0"><a data-dcnode-id="5709" href="#cite_note-:5-47"><span data-dcnode-id="5710" instrument_node="">[47]</span></a></sup><span data-dcnode-id="5707" instrument_node=""> The Cambridge Spy Ring focused on serving the Soviet Union in the Cold War by infiltrating British intelligence and providing secret information to the Soviet top leaders, and causing mistrust in British intelligence in the United States.</span><sup class="reference" data-dcnode-id="5704" id="cite_ref-:5_47-1"><a data-dcnode-id="5705" href="#cite_note-:5-47"><span data-dcnode-id="5706" instrument_node="">[47]</span></a></sup><span data-dcnode-id="5703" instrument_node="">
</span></p><p data-dcnode-id="5690"><span data-dcnode-id="5701" instrument_node="">Kim Philby, along with </span><a data-dcnode-id="5699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bill_Weisband" title="Bill Weisband"><span data-dcnode-id="5700" instrument_node="">Bill Weisband</span></a><span data-dcnode-id="5698" instrument_node="">, would end up betraying the existence of the Venona project to the Soviets, between 1945 and 1948.</span><sup class="reference" data-dcnode-id="5695" id="cite_ref-:4_38-2"><a data-dcnode-id="5696" href="#cite_note-:4-38"><span data-dcnode-id="5697" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="5692" id="cite_ref-48"><a data-dcnode-id="5693" href="#cite_note-48"><span data-dcnode-id="5694" instrument_node="">[48]</span></a></sup><span data-dcnode-id="5691" instrument_node="">
</span></p><span data-dcnode-id="5689" instrument_node="">
</span><h3 data-dcnode-id="5679"><span class="mw-headline" data-dcnode-id="5687" id="Active_measures"><span data-dcnode-id="5688" instrument_node="">Active measures</span></span><span class="mw-editsection" data-dcnode-id="5680"><span class="mw-editsection-bracket" data-dcnode-id="5685"><span data-dcnode-id="5686" instrument_node="">[</span></span><a data-dcnode-id="5683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_espionage_in_the_United_States%26action%3Dedit%26section%3D13" title="Edit section: Active measures"><span data-dcnode-id="5684" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5681"><span data-dcnode-id="5682" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5678" instrument_node="">
</span><p data-dcnode-id="5643"><a data-dcnode-id="5676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Active_measures" title="Active measures"><span data-dcnode-id="5677" instrument_node="">Active measures</span></a><span data-dcnode-id="5675" instrument_node=""> (</span><a data-dcnode-id="5673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_language" title="Russian language"><span data-dcnode-id="5674" instrument_node="">Russian</span></a><span data-dcnode-id="5672" instrument_node="">: </span><span data-dcnode-id="5670" lang="ru"><span data-dcnode-id="5671" instrument_node="">активные мероприятия</span></span><span data-dcnode-id="5669" instrument_node="">, </span><small data-dcnode-id="5665"><a data-dcnode-id="5667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanization_of_Russian" title="Romanization of Russian"><span data-dcnode-id="5668" instrument_node="">romanized</span></a><span data-dcnode-id="5666" instrument_node="">:&nbsp;</span></small><span data-dcnode-id="5662" title="Russian-language romanization"><i data-dcnode-id="5663" lang="ru-Latn"><span data-dcnode-id="5664" instrument_node="">aktivnye meropriyatiya</span></i></span><span data-dcnode-id="5661" instrument_node="">) are a form of </span><a data-dcnode-id="5659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_warfare" title="Political warfare"><span data-dcnode-id="5660" instrument_node="">political warfare</span></a><span data-dcnode-id="5658" instrument_node=""> that was conducted by the Soviet Union. These ranged from simple propaganda and forgery of documents, to assassination, terrorist acts and planned sabotage operations.</span><sup class="reference" data-dcnode-id="5655" id="cite_ref-:7_4-1"><a data-dcnode-id="5656" href="#cite_note-:7-4"><span data-dcnode-id="5657" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5654" instrument_node=""> In the US the KGB's main active measures were </span><a data-dcnode-id="5652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disinformation" title="Disinformation"><span data-dcnode-id="5653" instrument_node="">disinformation</span></a><span data-dcnode-id="5651" instrument_node=""> and the spread of conspiracy theories.</span><sup class="reference" data-dcnode-id="5648" id="cite_ref-:0_39-1"><a data-dcnode-id="5649" href="#cite_note-:0-39"><span data-dcnode-id="5650" instrument_node="">[39]</span></a></sup><sup class="reference" data-dcnode-id="5645" id="cite_ref-:7_4-2"><a data-dcnode-id="5646" href="#cite_note-:7-4"><span data-dcnode-id="5647" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5644" instrument_node="">
</span></p><p data-dcnode-id="5631"><span data-dcnode-id="5642" instrument_node="">Retired KGB Major General </span><a data-dcnode-id="5640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oleg_Kalugin" title="Oleg Kalugin"><span data-dcnode-id="5641" instrument_node="">Oleg Kalugin</span></a><span data-dcnode-id="5639" instrument_node="">, former Head of Foreign Counter Intelligence for the KGB (1973-1979), described active measures as "the heart and soul of </span><a class="mw-redirect" data-dcnode-id="5637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_intelligence" title="Soviet intelligence"><span data-dcnode-id="5638" instrument_node="">Soviet intelligence</span></a><span data-dcnode-id="5636" instrument_node="">":</span><sup class="reference" data-dcnode-id="5633" id="cite_ref-:1_5-1"><a data-dcnode-id="5634" href="#cite_note-:1-5"><span data-dcnode-id="5635" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5632" instrument_node="">
</span></p><span data-dcnode-id="5630" instrument_node="">
</span><dl data-dcnode-id="5621"><dd data-dcnode-id="5622"><span data-dcnode-id="5629" instrument_node="">"Not intelligence collection, but subversion: active measures to weaken the West, to drive wedges in the Western community alliances of all sorts, particularly </span><a data-dcnode-id="5627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="5628" instrument_node="">NATO</span></a><span data-dcnode-id="5626" instrument_node="">, to sow discord among allies, to weaken the United States in the eyes of the people of Europe, Asia, Africa, Latin America, and thus to prepare ground in case the war really occurs. To make America more vulnerable to the anger and distrust of other peoples."</span><sup class="reference" data-dcnode-id="5623" id="cite_ref-Kalugin_49-0"><a data-dcnode-id="5624" href="#cite_note-Kalugin-49"><span data-dcnode-id="5625" instrument_node="">[49]</span></a></sup></dd></dl><span data-dcnode-id="5620" instrument_node="">
</span><p data-dcnode-id="5593"><span data-dcnode-id="5619" instrument_node="">The doctrine of active measures was taught in the </span><a data-dcnode-id="5617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Academy_of_Foreign_Intelligence" title="Academy of Foreign Intelligence"><span data-dcnode-id="5618" instrument_node="">Andropov Institute</span></a><span data-dcnode-id="5616" instrument_node=""> of the </span><a data-dcnode-id="5614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/KGB" title="KGB"><span data-dcnode-id="5615" instrument_node="">KGB</span></a><span data-dcnode-id="5613" instrument_node=""> situated at </span><a data-dcnode-id="5611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_Intelligence_Service_%28Russia%29" title="Foreign Intelligence Service (Russia)"><span data-dcnode-id="5612" instrument_node="">Foreign Intelligence Service</span></a><span data-dcnode-id="5610" instrument_node=""> (SVR) headquarters in </span><a data-dcnode-id="5608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yasenevo_District" title="Yasenevo District"><span data-dcnode-id="5609" instrument_node="">Yasenevo District</span></a><span data-dcnode-id="5607" instrument_node=""> of Moscow. The head of the "active measures department" was </span><a data-dcnode-id="5605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yuri_Modin" title="Yuri Modin"><span data-dcnode-id="5606" instrument_node="">Yuri Modin</span></a><span data-dcnode-id="5604" instrument_node="">, former controller of the </span><a data-dcnode-id="5602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cambridge_Five" title="Cambridge Five"><span data-dcnode-id="5603" instrument_node="">Cambridge Five</span></a><span data-dcnode-id="5601" instrument_node=""> spy ring.</span><sup class="reference" data-dcnode-id="5598" id="cite_ref-Mitrokhin_50-0"><a data-dcnode-id="5599" href="#cite_note-Mitrokhin-50"><span data-dcnode-id="5600" instrument_node="">[50]</span></a></sup><sup class="reference" data-dcnode-id="5595" id="cite_ref-:0_39-2"><a data-dcnode-id="5596" href="#cite_note-:0-39"><span data-dcnode-id="5597" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5594" instrument_node="">
</span></p><p data-dcnode-id="5528"><span data-dcnode-id="5592" instrument_node="">One example of active measures by the KGB was </span><a data-dcnode-id="5590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_INFEKTION" title="Operation INFEKTION"><span data-dcnode-id="5591" instrument_node="">Operation "Denver"</span></a><span data-dcnode-id="5589" instrument_node=""> (also nicknamed Operation INFEKTION), a propaganda campaign which fabricated and spread the idea HIV/AIDS was invented by the US as a biological weapon from </span><a data-dcnode-id="5587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fort_Detrick" title="Fort Detrick"><span data-dcnode-id="5588" instrument_node="">Fort Detrick</span></a><span data-dcnode-id="5586" instrument_node="">, Maryland.</span><sup class="reference" data-dcnode-id="5583" id="cite_ref-:0_39-3"><a data-dcnode-id="5584" href="#cite_note-:0-39"><span data-dcnode-id="5585" instrument_node="">[39]</span></a></sup><sup class="reference" data-dcnode-id="5580" id="cite_ref-:2_51-0"><a data-dcnode-id="5581" href="#cite_note-:2-51"><span data-dcnode-id="5582" instrument_node="">[51]</span></a></sup><span data-dcnode-id="5579" instrument_node=""> As part of the disinformation campaign the KGB, through affiliated Soviet press and Soviet bloc intelligence agencies, disseminated publications that claimed to be independent investigative work, such as the "Segal report" by </span><a data-dcnode-id="5577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jakob_Segal" title="Jakob Segal"><span data-dcnode-id="5578" instrument_node="">Jakob Segal</span></a><span data-dcnode-id="5576" instrument_node="">.</span><sup class="reference" data-dcnode-id="5573" id="cite_ref-:1_5-2"><a data-dcnode-id="5574" href="#cite_note-:1-5"><span data-dcnode-id="5575" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="5570" id="cite_ref-:2_51-1"><a data-dcnode-id="5571" href="#cite_note-:2-51"><span data-dcnode-id="5572" instrument_node="">[51]</span></a></sup><span data-dcnode-id="5569" instrument_node=""> Part of the goal was to shift attention away from the Soviets' own </span><a data-dcnode-id="5567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_biological_weapons_program" title="Soviet biological weapons program"><span data-dcnode-id="5568" instrument_node="">biological weapons program</span></a><span data-dcnode-id="5566" instrument_node="">. In 1992, SVR head </span><a data-dcnode-id="5564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yevgeny_Primakov" title="Yevgeny Primakov"><span data-dcnode-id="5565" instrument_node="">Yevgeny Primakov</span></a><span data-dcnode-id="5563" instrument_node=""> admitted that the KGB had instigated and perpetuated the myth of a manmade AIDS.</span><sup class="reference" data-dcnode-id="5560" id="cite_ref-:1_5-3"><a data-dcnode-id="5561" href="#cite_note-:1-5"><span data-dcnode-id="5562" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5559" instrument_node=""> The conspiracy theories fed into </span><a data-dcnode-id="5557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HIV/AIDS_denialism" title="HIV/AIDS denialism"><span data-dcnode-id="5558" instrument_node="">AIDS denialism</span></a><span data-dcnode-id="5556" instrument_node=""> and may have led to preventable deaths across the United States, and South Africa.</span><sup class="reference" data-dcnode-id="5553" id="cite_ref-:1_5-4"><a data-dcnode-id="5554" href="#cite_note-:1-5"><span data-dcnode-id="5555" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="5550" id="cite_ref-:2_51-2"><a data-dcnode-id="5551" href="#cite_note-:2-51"><span data-dcnode-id="5552" instrument_node="">[51]</span></a></sup><span data-dcnode-id="5549" instrument_node=""> According to the </span><a class="mw-redirect" data-dcnode-id="5547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._State_Department" title="U.S. State Department"><span data-dcnode-id="5548" instrument_node="">U.S. State Department</span></a><span data-dcnode-id="5546" instrument_node="">, the </span><a data-dcnode-id="5544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="5545" instrument_node="">Soviet Union</span></a><span data-dcnode-id="5543" instrument_node=""> used the campaign to undermine the United States' credibility, foster </span><a data-dcnode-id="5541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-Americanism" title="Anti-Americanism"><span data-dcnode-id="5542" instrument_node="">anti-Americanism</span></a><span data-dcnode-id="5540" instrument_node="">, isolate America abroad, and create tensions between host countries and the U.S. over the presence of American military bases.</span><sup class="reference" data-dcnode-id="5537" id="cite_ref-statereport_52-0"><a data-dcnode-id="5538" href="#cite_note-statereport-52"><span data-dcnode-id="5539" instrument_node="">[52]</span></a></sup><span data-dcnode-id="5536" instrument_node=""> A cycle of misinformation and disinformation revolved between Kremlin-based and U.S.-based conspiracy theorists (such as </span><a data-dcnode-id="5534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lyndon_LaRouche" title="Lyndon LaRouche"><span data-dcnode-id="5535" instrument_node="">Lyndon LaRouche</span></a><span data-dcnode-id="5533" instrument_node="">).</span><sup class="reference" data-dcnode-id="5530" id="cite_ref-53"><a data-dcnode-id="5531" href="#cite_note-53"><span data-dcnode-id="5532" instrument_node="">[53]</span></a></sup><span data-dcnode-id="5529" instrument_node="">
</span></p><p data-dcnode-id="5487"><span data-dcnode-id="5527" instrument_node="">A series of Soviet active measures focused on exacerbating racial divisions in the United States. According to intelligence historian </span><a data-dcnode-id="5525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christopher_Andrew_%28historian%29" title="Christopher Andrew (historian)"><span data-dcnode-id="5526" instrument_node="">Christopher Andrew</span></a><span data-dcnode-id="5524" instrument_node="">, "</span><a data-dcnode-id="5522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Luther_King_Jr." title="Martin Luther King Jr."><span data-dcnode-id="5523" instrument_node="">Martin Luther King</span></a><span data-dcnode-id="5521" instrument_node=""> was probably the only prominent American to be the target of active measures by both the FBI and the KGB." The FBI surveilled King and also tried to publicize adultery accusations against him, while posing as a former supporter. Meanwhile, the KGB tried but failed to influence MLK, Jr. through the CPUSA. Finding King not radical enough, the KGB sought to discredit him by portraying him as a supposed "Uncle Tom". After </span><a data-dcnode-id="5519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assassination_of_Martin_Luther_King_Jr." title="Assassination of Martin Luther King Jr."><span data-dcnode-id="5520" instrument_node="">King's assassination</span></a><span data-dcnode-id="5518" instrument_node="">, the KGB spread conspiracy theories about the government being involved in his murder.</span><sup class="reference" data-dcnode-id="5515" id="cite_ref-:11_54-0"><a data-dcnode-id="5516" href="#cite_note-:11-54"><span data-dcnode-id="5517" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="5512" id="cite_ref-:12_55-0"><a data-dcnode-id="5513" href="#cite_note-:12-55"><span data-dcnode-id="5514" instrument_node="">[55]</span></a></sup><span data-dcnode-id="5511" instrument_node=""> Following this, Yuri Andropov approved the forgery of anti-black pamphlets claiming to be from the </span><a data-dcnode-id="5509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jewish_Defense_League" title="Jewish Defense League"><span data-dcnode-id="5510" instrument_node="">Jewish Defense League</span></a><span data-dcnode-id="5508" instrument_node="">. A more extensive sabotage plot was planned as "</span><a data-dcnode-id="5506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_PANDORA" title="Operation PANDORA"><span data-dcnode-id="5507" instrument_node="">Operation PANDORA</span></a><span data-dcnode-id="5505" instrument_node="">" but never implemented.</span><sup class="reference" data-dcnode-id="5502" id="cite_ref-:11_54-1"><a data-dcnode-id="5503" href="#cite_note-:11-54"><span data-dcnode-id="5504" instrument_node="">[54]</span></a></sup><span data-dcnode-id="5501" instrument_node=""> The KGB later penned racist letters to appear as a </span><a data-dcnode-id="5499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ku_Klux_Klan" title="Ku Klux Klan"><span data-dcnode-id="5500" instrument_node="">Ku Klux Klan</span></a><span data-dcnode-id="5498" instrument_node=""> campaign against Olympic athletes from African and Asian countries to scare them from participating, ahead of the Soviets' </span><a data-dcnode-id="5496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1984_Summer_Olympics_boycott" title="1984 Summer Olympics boycott"><span data-dcnode-id="5497" instrument_node="">1984 Summer Olympics boycott</span></a><span data-dcnode-id="5495" instrument_node="">.</span><sup class="reference" data-dcnode-id="5492" id="cite_ref-:11_54-2"><a data-dcnode-id="5493" href="#cite_note-:11-54"><span data-dcnode-id="5494" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="5489" id="cite_ref-:12_55-1"><a data-dcnode-id="5490" href="#cite_note-:12-55"><span data-dcnode-id="5491" instrument_node="">[55]</span></a></sup><span data-dcnode-id="5488" instrument_node="">
</span></p><p data-dcnode-id="5475"><span data-dcnode-id="5486" instrument_node="">According to </span><a data-dcnode-id="5484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yuri_Bezmenov" title="Yuri Bezmenov"><span data-dcnode-id="5485" instrument_node="">Yuri Bezmenov</span></a><span data-dcnode-id="5483" instrument_node="">, a defector from the Soviet KGB, </span><a data-dcnode-id="5481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychological_warfare" title="Psychological warfare"><span data-dcnode-id="5482" instrument_node="">psychological warfare</span></a><span data-dcnode-id="5480" instrument_node=""> activities accounted for 85% of all KGB efforts (the other 15% being direct espionage and intelligence gathering). Bezmenov put the process into the four stages "destabilize, demoralize, crisis, normalization" where an enemy country would be undermined over several decades, and pointed out that once the Soviet Union took control of a country, such as Czechoslovakia, they disposed of actual revolution and radicalism.</span><sup class="reference" data-dcnode-id="5477" id="cite_ref-56"><a data-dcnode-id="5478" href="#cite_note-56"><span data-dcnode-id="5479" instrument_node="">[56]</span></a></sup><span data-dcnode-id="5476" instrument_node="">
</span></p><span data-dcnode-id="5474" instrument_node="">
</span><h3 data-dcnode-id="5464"><span class="mw-headline" data-dcnode-id="5472" id="Spy_ring_discoveries"><span data-dcnode-id="5473" instrument_node="">Spy ring discoveries</span></span><span class="mw-editsection" data-dcnode-id="5465"><span class="mw-editsection-bracket" data-dcnode-id="5470"><span data-dcnode-id="5471" instrument_node="">[</span></span><a data-dcnode-id="5468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_espionage_in_the_United_States%26action%3Dedit%26section%3D14" title="Edit section: Spy ring discoveries"><span data-dcnode-id="5469" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5466"><span data-dcnode-id="5467" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5463" instrument_node="">
</span><p data-dcnode-id="5416"><span data-dcnode-id="5462" instrument_node="">Major spy discoveries occurred in the 1980s despite the looming end of the Cold War. The press dubbed 1985 the "Year of the Spy" due to the discovery of multiple spies and spy rings,</span><sup class="reference" data-dcnode-id="5459" id="cite_ref-:3_57-0"><a data-dcnode-id="5460" href="#cite_note-:3-57"><span data-dcnode-id="5461" instrument_node="">[57]</span></a></sup><span data-dcnode-id="5458" instrument_node=""> many of them passing information to the Soviet Union, such as </span><a data-dcnode-id="5456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Anthony_Walker" title="John Anthony Walker"><span data-dcnode-id="5457" instrument_node="">John Anthony Walker</span></a><span data-dcnode-id="5455" instrument_node=""> and </span><a data-dcnode-id="5453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Pelton" title="Ronald Pelton"><span data-dcnode-id="5454" instrument_node="">Ronald Pelton</span></a><span data-dcnode-id="5452" instrument_node="">.</span><sup class="reference" data-dcnode-id="5449" id="cite_ref-:3_57-1"><a data-dcnode-id="5450" href="#cite_note-:3-57"><span data-dcnode-id="5451" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="5446" id="cite_ref-CNN_58-0"><a data-dcnode-id="5447" href="#cite_note-CNN-58"><span data-dcnode-id="5448" instrument_node="">[58]</span></a></sup><span data-dcnode-id="5445" instrument_node=""> </span><i data-dcnode-id="5442"><a data-dcnode-id="5443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_New_York_Times" title="The New York Times"><span data-dcnode-id="5444" instrument_node="">The New York Times</span></a></i><span data-dcnode-id="5441" instrument_node=""> reported in 1987 that the Walker spy ring was "described as the most damaging Soviet spy ring in history."</span><sup class="reference" data-dcnode-id="5438" id="cite_ref-59"><a data-dcnode-id="5439" href="#cite_note-59"><span data-dcnode-id="5440" instrument_node="">[59]</span></a></sup><span data-dcnode-id="5437" instrument_node=""> During his time as a Soviet spy (1967-1985), Walker stole and sold codes that assisted the Soviets in deciphering encrypted Navy messages, which allowed them to monitor American naval assets. The Walker spy ring also compromised information about weapons, sensor data, and related naval tactics.</span><sup class="reference" data-dcnode-id="5434" id="cite_ref-60"><a data-dcnode-id="5435" href="#cite_note-60"><span data-dcnode-id="5436" instrument_node="">[60]</span></a></sup><span data-dcnode-id="5433" instrument_node=""> Other 1980s spies included </span><a data-dcnode-id="5431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aldrich_Ames" title="Aldrich Ames"><span data-dcnode-id="5432" instrument_node="">Aldrich Ames</span></a><span data-dcnode-id="5430" instrument_node=""> a KGB </span><a data-dcnode-id="5428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mole_%28espionage%29" title="Mole (espionage)"><span data-dcnode-id="5429" instrument_node="">mole</span></a><span data-dcnode-id="5427" instrument_node="">, investigation of Ames activities led to the </span><a data-dcnode-id="5425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1995_CIA_disinformation_controversy" title="1995 CIA disinformation controversy"><span data-dcnode-id="5426" instrument_node="">1995 CIA disinformation controversy</span></a><span data-dcnode-id="5424" instrument_node=""> revealing that false reports were fed to the United States through Soviet double agents.</span><sup class="reference" data-dcnode-id="5421" id="cite_ref-CNN_58-1"><a data-dcnode-id="5422" href="#cite_note-CNN-58"><span data-dcnode-id="5423" instrument_node="">[58]</span></a></sup><sup class="reference" data-dcnode-id="5418" id="cite_ref-61"><a data-dcnode-id="5419" href="#cite_note-61"><span data-dcnode-id="5420" instrument_node="">[61]</span></a></sup><span data-dcnode-id="5417" instrument_node="">
</span></p><span data-dcnode-id="5415" instrument_node="">
