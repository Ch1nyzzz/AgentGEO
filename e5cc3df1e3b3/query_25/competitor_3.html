</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="6918" id="firstHeading"><span data-dcnode-id="6919" instrument_node="">Soviet espionage in the United States</span></h1><span data-dcnode-id="6917" instrument_node="">
</span><div class="vector-body" data-dcnode-id="434" id="bodyContent"><span data-dcnode-id="6916" instrument_node="">
</span><div class="noprint" data-dcnode-id="6914" id="siteSub"><span data-dcnode-id="6915" instrument_node="">From Wikipedia, the free encyclopedia</span></div><span data-dcnode-id="6913" instrument_node="">

</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="512" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="521"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="6899" style="display:none"><span data-dcnode-id="6900" instrument_node="">Aspect of history</span></div><span data-dcnode-id="6898" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="6891" role="note"><span data-dcnode-id="6895" instrument_node="">For events after 1991, see </span><a data-dcnode-id="6893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_espionage_in_the_United_States" title="Russian espionage in the United States"><span data-dcnode-id="6894" instrument_node="">Russian espionage in the United States</span></a><span data-dcnode-id="6892" instrument_node="">.</span></div><span data-dcnode-id="6890" instrument_node="">
</span><link data-dcnode-id="6889" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6885" role="note"><span data-dcnode-id="6888" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="6886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Soviet_agents_in_the_United_States" title="List of Soviet agents in the United States"><span data-dcnode-id="6887" instrument_node="">List of Soviet agents in the United States</span></a></div><span data-dcnode-id="6884" instrument_node="">
</span><p data-dcnode-id="6819"><span data-dcnode-id="6883" instrument_node="">As early as the 1920s, the </span><a data-dcnode-id="6881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="6882" instrument_node="">Soviet Union</span></a><span data-dcnode-id="6880" instrument_node="">, through its </span><a data-dcnode-id="6878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GRU_%28Soviet_Union%29" title="GRU (Soviet Union)"><span data-dcnode-id="6879" instrument_node="">GRU</span></a><span data-dcnode-id="6877" instrument_node="">, </span><a data-dcnode-id="6875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joint_State_Political_Directorate" title="Joint State Political Directorate"><span data-dcnode-id="6876" instrument_node="">OGPU</span></a><span data-dcnode-id="6874" instrument_node="">, </span><a data-dcnode-id="6872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NKVD" title="NKVD"><span data-dcnode-id="6873" instrument_node="">NKVD</span></a><span data-dcnode-id="6871" instrument_node="">, and </span><a data-dcnode-id="6869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/KGB" title="KGB"><span data-dcnode-id="6870" instrument_node="">KGB</span></a><span data-dcnode-id="6868" instrument_node=""> intelligence agencies, used Russian and foreign-born nationals, as well as </span><a class="mw-redirect" data-dcnode-id="6866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist" title="Communist"><span data-dcnode-id="6867" instrument_node="">Communists</span></a><span data-dcnode-id="6865" instrument_node=""> of American origin to perform </span><a data-dcnode-id="6863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Espionage" title="Espionage"><span data-dcnode-id="6864" instrument_node="">espionage</span></a><span data-dcnode-id="6862" instrument_node=""> activities in the </span><a data-dcnode-id="6860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="6861" instrument_node="">United States</span></a><span data-dcnode-id="6859" instrument_node="">, forming various spy rings.</span><sup class="reference" data-dcnode-id="6856" id="cite_ref-Haynes_1-0"><a data-dcnode-id="6857" href="#cite_note-Haynes-1"><span data-dcnode-id="6858" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="6853" id="cite_ref-Weinstein_2-0"><a data-dcnode-id="6854" href="#cite_note-Weinstein-2"><span data-dcnode-id="6855" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="6850" id="cite_ref-AP_3-0"><a data-dcnode-id="6851" href="#cite_note-AP-3"><span data-dcnode-id="6852" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6849" instrument_node=""> Particularly during the 1940s, some of these espionage networks had contact with various U.S. government agencies. These Soviet espionage networks illegally transmitted confidential information to </span><a data-dcnode-id="6847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moscow" title="Moscow"><span data-dcnode-id="6848" instrument_node="">Moscow</span></a><span data-dcnode-id="6846" instrument_node="">, such as information on the development of the atomic bomb (see </span><a data-dcnode-id="6844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atomic_spies" title="Atomic spies"><span data-dcnode-id="6845" instrument_node="">atomic spies</span></a><span data-dcnode-id="6843" instrument_node="">).</span><sup class="reference" data-dcnode-id="6840" id="cite_ref-Haynes_1-1"><a data-dcnode-id="6841" href="#cite_note-Haynes-1"><span data-dcnode-id="6842" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="6837" id="cite_ref-Weinstein_2-1"><a data-dcnode-id="6838" href="#cite_note-Weinstein-2"><span data-dcnode-id="6839" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="6834" id="cite_ref-AP_3-1"><a data-dcnode-id="6835" href="#cite_note-AP-3"><span data-dcnode-id="6836" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6833" instrument_node=""> Soviet spies also participated in propaganda and </span><a data-dcnode-id="6831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disinformation" title="Disinformation"><span data-dcnode-id="6832" instrument_node="">disinformation</span></a><span data-dcnode-id="6830" instrument_node=""> operations, known as </span><a data-dcnode-id="6828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Active_measures" title="Active measures"><span data-dcnode-id="6829" instrument_node="">active measures</span></a><span data-dcnode-id="6827" instrument_node="">, and attempted to sabotage diplomatic relationships between the U.S. and its allies.</span><sup class="reference" data-dcnode-id="6824" id="cite_ref-:7_4-0"><a data-dcnode-id="6825" href="#cite_note-:7-4"><span data-dcnode-id="6826" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="6821" id="cite_ref-:1_5-0"><a data-dcnode-id="6822" href="#cite_note-:1-5"><span data-dcnode-id="6823" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6820" instrument_node="">
</span></p><span data-dcnode-id="6818" instrument_node="">

</span><h2 data-dcnode-id="6644"><span class="mw-headline" data-dcnode-id="6652" id="First_efforts"><span data-dcnode-id="6653" instrument_node="">First efforts</span></span><span class="mw-editsection" data-dcnode-id="6645"><span class="mw-editsection-bracket" data-dcnode-id="6650"><span data-dcnode-id="6651" instrument_node="">[</span></span><a data-dcnode-id="6648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_espionage_in_the_United_States%26action%3Dedit%26section%3D1" title="Edit section: First efforts"><span data-dcnode-id="6649" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6646"><span data-dcnode-id="6647" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6643" instrument_node="">
</span><p data-dcnode-id="6613"><span data-dcnode-id="6642" instrument_node="">During the 1920s </span><a data-dcnode-id="6640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chronology_of_Soviet_secret_police_agencies" title="Chronology of Soviet secret police agencies"><span data-dcnode-id="6641" instrument_node="">Soviet intelligence</span></a><span data-dcnode-id="6639" instrument_node=""> focused on military and industrial espionage in Britain, France, Germany, and the United States, specifically in the aircraft and munitions industries, in order to industrialize and compete with Western powers, as well as strengthening the </span><a class="mw-redirect" data-dcnode-id="6637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_armed_forces" title="Soviet armed forces"><span data-dcnode-id="6638" instrument_node="">Soviet armed forces</span></a><span data-dcnode-id="6636" instrument_node="">.</span><sup class="reference" data-dcnode-id="6633" id="cite_ref-6"><a data-dcnode-id="6634" href="#cite_note-6"><span data-dcnode-id="6635" instrument_node="">[6]</span></a></sup><span data-dcnode-id="6632" instrument_node=""> The United States opened diplomatic ties to the Soviet Union in 1933, normalizing relations, but also opening the door to a number of spies which initially focused on technological espionage.</span><sup class="reference" data-dcnode-id="6629" id="cite_ref-7"><a data-dcnode-id="6630" href="#cite_note-7"><span data-dcnode-id="6631" instrument_node="">[7]</span></a></sup><span data-dcnode-id="6628" instrument_node=""> One early Soviet spy was </span><a data-dcnode-id="6626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jones_Orin_York" title="Jones Orin York"><span data-dcnode-id="6627" instrument_node="">Jones Orin York</span></a><span data-dcnode-id="6625" instrument_node=""> who was recruited by the KGB's predecessors in 1935.</span><sup class="reference" data-dcnode-id="6622" id="cite_ref-:13_8-0"><a data-dcnode-id="6623" href="#cite_note-:13-8"><span data-dcnode-id="6624" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6621" instrument_node=""> The Soviets' </span><a data-dcnode-id="6619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amtorg_Trading_Corporation" title="Amtorg Trading Corporation"><span data-dcnode-id="6620" instrument_node="">Amtorg Trading Corporation</span></a><span data-dcnode-id="6618" instrument_node=""> established in 1924 would become a nexus of espionage.</span><sup class="reference" data-dcnode-id="6615" id="cite_ref-:13_8-1"><a data-dcnode-id="6616" href="#cite_note-:13-8"><span data-dcnode-id="6617" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6614" instrument_node="">
</span></p><p data-dcnode-id="6590"><span data-dcnode-id="6612" instrument_node="">Historian </span><a data-dcnode-id="6610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harvey_Klehr" title="Harvey Klehr"><span data-dcnode-id="6611" instrument_node="">Harvey Klehr</span></a><span data-dcnode-id="6609" instrument_node=""> describes that the American businessman </span><a data-dcnode-id="6607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armand_Hammer" title="Armand Hammer"><span data-dcnode-id="6608" instrument_node="">Armand Hammer</span></a><span data-dcnode-id="6606" instrument_node=""> "met Lenin in 1921 and, in return for a concession to manufacture pencils, agreed to launder Soviet money to benefit communist parties in Europe and America."</span><sup class="reference" data-dcnode-id="6603" id="cite_ref-9"><a data-dcnode-id="6604" href="#cite_note-9"><span data-dcnode-id="6605" instrument_node="">[9]</span></a></sup><span data-dcnode-id="6602" instrument_node=""> Historian </span><a data-dcnode-id="6600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Jay_Epstein" title="Edward Jay Epstein"><span data-dcnode-id="6601" instrument_node="">Edward Jay Epstein</span></a><span data-dcnode-id="6599" instrument_node=""> noted that "Hammer received extraordinary treatment from Moscow in many ways. He was permitted by the Soviet Government to take millions of dollars worth of czarist art out of the country when he returned to the United States in 1932."</span><sup class="reference" data-dcnode-id="6596" id="cite_ref-10"><a data-dcnode-id="6597" href="#cite_note-10"><span data-dcnode-id="6598" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6595" instrument_node=""> According to journalist Alan Farnham, "Over the decades Hammer continued traveling to Russia, hobnobbing with its leaders to the point that both the CIA and the FBI suspected him of being a full-fledged agent."</span><sup class="reference" data-dcnode-id="6592" id="cite_ref-11"><a data-dcnode-id="6593" href="#cite_note-11"><span data-dcnode-id="6594" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6591" instrument_node="">
</span></p><span data-dcnode-id="6589" instrument_node="">
</span><h2 data-dcnode-id="6579"><span class="mw-headline" data-dcnode-id="6587" id="Browder_and_Golos_networks"><span data-dcnode-id="6588" instrument_node="">Browder and Golos networks</span></span><span class="mw-editsection" data-dcnode-id="6580"><span class="mw-editsection-bracket" data-dcnode-id="6585"><span data-dcnode-id="6586" instrument_node="">[</span></span><a data-dcnode-id="6583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_espionage_in_the_United_States%26action%3Dedit%26section%3D2" title="Edit section: Browder and Golos networks"><span data-dcnode-id="6584" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6581"><span data-dcnode-id="6582" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6578" instrument_node="">
</span><p data-dcnode-id="6532"><a data-dcnode-id="6576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Earl_Browder" title="Earl Browder"><span data-dcnode-id="6577" instrument_node="">Earl Browder</span></a><span data-dcnode-id="6575" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Secretary" title="General Secretary"><span data-dcnode-id="6574" instrument_node="">General Secretary</span></a><span data-dcnode-id="6572" instrument_node=""> of the </span><a class="mw-redirect" data-dcnode-id="6570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_the_United_States" title="Communist Party of the United States"><span data-dcnode-id="6571" instrument_node="">Communist Party of the United States</span></a><span data-dcnode-id="6569" instrument_node=""> (CPUSA), served as an agent recruiter himself on behalf of Soviet intelligence.</span><sup class="reference" data-dcnode-id="6566" id="cite_ref-12"><a data-dcnode-id="6567" href="#cite_note-12"><span data-dcnode-id="6568" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="6563" id="cite_ref-Sudoplatov_13-0"><a data-dcnode-id="6564" href="#cite_note-Sudoplatov-13"><span data-dcnode-id="6565" instrument_node="">[13]</span></a></sup><span data-dcnode-id="6562" instrument_node=""> Browder later stated that "by the mid-thirties, the Party was not putting its principal emphasis on recruiting members." Left unstated was his intent to use party members for espionage work, where suitable. Browder advocated the use of a </span><i data-dcnode-id="6560"><span data-dcnode-id="6561" instrument_node="">United Front</span></i><span data-dcnode-id="6559" instrument_node=""> involving other members of the left, both to strengthen advocacy of pro-Soviet policy and to enlarge the pool of potential recruits for espionage work.  The illegal residency of </span><a data-dcnode-id="6557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NKVD" title="NKVD"><span data-dcnode-id="6558" instrument_node="">NKVD</span></a><span data-dcnode-id="6556" instrument_node=""> in the US was established in 1934 by the former </span><a data-dcnode-id="6554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berlin" title="Berlin"><span data-dcnode-id="6555" instrument_node="">Berlin</span></a><span data-dcnode-id="6553" instrument_node=""> resident </span><a data-dcnode-id="6551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Bazarov" title="Boris Bazarov"><span data-dcnode-id="6552" instrument_node="">Boris Bazarov</span></a><span data-dcnode-id="6550" instrument_node="">.</span><sup class="reference" data-dcnode-id="6547" id="cite_ref-Andrew_14-0"><a data-dcnode-id="6548" href="#cite_note-Andrew-14"><span data-dcnode-id="6549" instrument_node="">[14]</span></a></sup><span data-dcnode-id="6546" instrument_node=""> In 1935, </span><a data-dcnode-id="6544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NKVD" title="NKVD"><span data-dcnode-id="6545" instrument_node="">NKVD</span></a><span data-dcnode-id="6543" instrument_node=""> agent </span><a data-dcnode-id="6541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iskhak_Akhmerov" title="Iskhak Akhmerov"><span data-dcnode-id="6542" instrument_node="">Iskhak Akhmerov</span></a><span data-dcnode-id="6540" instrument_node=""> entered the US with false identity papers to assist Bazarov in the collection of useful intelligence, and operated without interruption until 1939, when he left the US. Akhmerov's wife, an American who worked for Soviet intelligence, was </span><a data-dcnode-id="6538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Helen_Lowry" title="Helen Lowry"><span data-dcnode-id="6539" instrument_node="">Helen Lowry</span></a><span data-dcnode-id="6537" instrument_node=""> (Elza Akhmerova), the niece of CPUSA General Secretary Earl Browder. Recent information from Soviet archives has revealed that Browder's younger sister Marguerite worked until 1938 as an NKVD operative in Europe.  She discontinued this work only when Browder himself requested her release from duty, fearful that her work would compromise his position as General Secretary.</span><sup class="reference" data-dcnode-id="6534" id="cite_ref-Haynes_1-2"><a data-dcnode-id="6535" href="#cite_note-Haynes-1"><span data-dcnode-id="6536" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6533" instrument_node="">
</span></p><p data-dcnode-id="6494"><span data-dcnode-id="6531" instrument_node="">In the 1930s, the chief Soviet espionage organization operating in the U.S. became the </span><a data-dcnode-id="6529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GRU_%28Soviet_Union%29" title="GRU (Soviet Union)"><span data-dcnode-id="6530" instrument_node="">GRU</span></a><span data-dcnode-id="6528" instrument_node="">. </span><a data-dcnode-id="6526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J._Peters" title="J. Peters"><span data-dcnode-id="6527" instrument_node="">J. Peters</span></a><span data-dcnode-id="6525" instrument_node=""> headed the secret apparatus that supplied internal government documents from the </span><a class="mw-redirect" data-dcnode-id="6523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ware_group" title="Ware group"><span data-dcnode-id="6524" instrument_node="">Ware group</span></a><span data-dcnode-id="6522" instrument_node=""> to the GRU. Browder assisted Peters in building a network of operatives in the administration of President </span><a data-dcnode-id="6520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franklin_D._Roosevelt" title="Franklin D. Roosevelt"><span data-dcnode-id="6521" instrument_node="">Franklin D. Roosevelt</span></a><span data-dcnode-id="6519" instrument_node="">. This group allegedly included </span><a data-dcnode-id="6517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alger_Hiss" title="Alger Hiss"><span data-dcnode-id="6518" instrument_node="">Alger Hiss</span></a><span data-dcnode-id="6516" instrument_node="">, </span><a data-dcnode-id="6514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Abt" title="John Abt"><span data-dcnode-id="6515" instrument_node="">John Abt</span></a><span data-dcnode-id="6513" instrument_node="">, and </span><a data-dcnode-id="6511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lee_Pressman" title="Lee Pressman"><span data-dcnode-id="6512" instrument_node="">Lee Pressman</span></a><span data-dcnode-id="6510" instrument_node=""> (Pressman admitted participation in the group, but denied it was involved in espionage). Courier for the group at the time was </span><a data-dcnode-id="6508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whittaker_Chambers" title="Whittaker Chambers"><span data-dcnode-id="6509" instrument_node="">Whittaker Chambers</span></a><span data-dcnode-id="6507" instrument_node="">. Browder oversaw the efforts of </span><a data-dcnode-id="6505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacob_Golos" title="Jacob Golos"><span data-dcnode-id="6506" instrument_node="">Jacob Golos</span></a><span data-dcnode-id="6504" instrument_node=""> and his girlfriend, </span><a data-dcnode-id="6502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elizabeth_Bentley" title="Elizabeth Bentley"><span data-dcnode-id="6503" instrument_node="">Elizabeth Bentley</span></a><span data-dcnode-id="6501" instrument_node="">, whose network of agents and sources included two key figures at the Department of Treasury, </span><a class="mw-redirect" data-dcnode-id="6499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greg_Silvermaster" title="Greg Silvermaster"><span data-dcnode-id="6500" instrument_node="">Nathan Gregory Silvermaster</span></a><span data-dcnode-id="6498" instrument_node=""> and </span><a data-dcnode-id="6496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harry_Dexter_White" title="Harry Dexter White"><span data-dcnode-id="6497" instrument_node="">Harry Dexter White</span></a><span data-dcnode-id="6495" instrument_node="">.
</span></p><p data-dcnode-id="6464"><span data-dcnode-id="6493" instrument_node="">One early Soviet spy ring was headed by </span><a data-dcnode-id="6491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacob_Golos" title="Jacob Golos"><span data-dcnode-id="6492" instrument_node="">Jacob Golos</span></a><span data-dcnode-id="6490" instrument_node="">. Jake Golos (birth name Jacob Golosenko, Tasin, Rasin or Raisen) was a </span><a data-dcnode-id="6488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainians" title="Ukrainians"><span data-dcnode-id="6489" instrument_node="">Ukrainian</span></a><span data-dcnode-id="6487" instrument_node="">-born </span><a class="mw-redirect" data-dcnode-id="6485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolshevik" title="Bolshevik"><span data-dcnode-id="6486" instrument_node="">Bolshevik</span></a><span data-dcnode-id="6484" instrument_node=""> revolutionary and Soviet </span><a data-dcnode-id="6482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secret_police" title="Secret police"><span data-dcnode-id="6483" instrument_node="">secret police</span></a><span data-dcnode-id="6481" instrument_node=""> (NKVD) operative in the USSR. He was also a longtime senior official of the CPUSA involved in covert work and cooperation with Soviet intelligence agencies.  He took over an existing network of agents and intelligence sources from Earl Browder.  Golos' controller was the head of the NKVD's American desk, </span><a data-dcnode-id="6479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gaik_Ovakimian" title="Gaik Ovakimian"><span data-dcnode-id="6480" instrument_node="">Gaik Ovakimian</span></a><span data-dcnode-id="6478" instrument_node="">, also known as "The Puppetmaster", who would later serve a key role in the </span><a data-dcnode-id="6476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assassination" title="Assassination"><span data-dcnode-id="6477" instrument_node="">assassination</span></a><span data-dcnode-id="6475" instrument_node=""> of </span><a data-dcnode-id="6473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leon_Trotsky" title="Leon Trotsky"><span data-dcnode-id="6474" instrument_node="">Leon Trotsky</span></a><span data-dcnode-id="6472" instrument_node="">.</span><sup class="reference" data-dcnode-id="6469" id="cite_ref-15"><a data-dcnode-id="6470" href="#cite_note-15"><span data-dcnode-id="6471" instrument_node="">[15]</span></a></sup><span data-dcnode-id="6468" instrument_node=""> Golos was the "main pillar" of the NKVD intelligence network. He had worked with Soviet intelligence from the mid-1930s, and probably earlier. He was not merely a CPUSA official assisting the NKVD (an agent or "probationer" in Soviet intelligence parlance) but held official rank in the NKVD, and claimed to be an oldtime </span><a data-dcnode-id="6466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chekism" title="Chekism"><span data-dcnode-id="6467" instrument_node="">Chekist</span></a><span data-dcnode-id="6465" instrument_node="">.
</span></p><p data-dcnode-id="6436"><span data-dcnode-id="6463" instrument_node="">Golos established a company called </span><i data-dcnode-id="6461"><span data-dcnode-id="6462" instrument_node="">World Tourists</span></i><span data-dcnode-id="6460" instrument_node=""> with money from Earl Browder, the General Secretary. The firm, which posed as a travel agency, was used to facilitate international travel to and from the United States by Soviet agents and CPUSA members. World Tourists was also involved in manufacturing fake passports, as Browder used such a false passport on covert trips to the Soviet Union in 1936.</span><sup class="reference" data-dcnode-id="6457" id="cite_ref-Weinstein_2-2"><a data-dcnode-id="6458" href="#cite_note-Weinstein-2"><span data-dcnode-id="6459" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6456" instrument_node=""> At World Tourist, Golos frequently met </span><a class="new" data-dcnode-id="6454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBernard_Schuster%26action%3Dedit%26redlink%3D1" title="Bernard Schuster (page does not exist)"><span data-dcnode-id="6455" instrument_node="">Bernard Schuster</span></a><span data-dcnode-id="6453" instrument_node="">, an NKVD agent (code name </span><i data-dcnode-id="6451"><span data-dcnode-id="6452" instrument_node="">ECHO</span></i><span data-dcnode-id="6450" instrument_node=""> and </span><i data-dcnode-id="6448"><span data-dcnode-id="6449" instrument_node="">DICK</span></i><span data-dcnode-id="6447" instrument_node="">) and Communist Party functionary who carried out background investigations for Golos as part of the </span><a data-dcnode-id="6445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vetting" title="Vetting"><span data-dcnode-id="6446" instrument_node="">vetting</span></a><span data-dcnode-id="6444" instrument_node=""> process of agent candidates.</span><sup class="reference" data-dcnode-id="6441" id="cite_ref-16"><a data-dcnode-id="6442" href="#cite_note-16"><span data-dcnode-id="6443" instrument_node="">[16]</span></a></sup><span data-dcnode-id="6440" instrument_node=""> In March 1940, Golos pleaded guilty to being an unregistered </span><a data-dcnode-id="6438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_Agents_Registration_Act" title="Foreign Agents Registration Act"><span data-dcnode-id="6439" instrument_node="">foreign agent</span></a><span data-dcnode-id="6437" instrument_node="">, paid a $500 fine (equivalent to $10,000 today), and served probation in lieu of a four-month prison sentence.
</span></p><p data-dcnode-id="6421"><span data-dcnode-id="6435" instrument_node="">Soviet intelligence did not like Golos' refusal to allow Soviet contact with his sources (a measure implemented by Golos to protect himself and to ensure his continued retention by the NKVD). The NKVD suspected Golos of </span><a data-dcnode-id="6433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trotskyism" title="Trotskyism"><span data-dcnode-id="6434" instrument_node="">Trotskyism</span></a><span data-dcnode-id="6432" instrument_node=""> and tried to lure him to Moscow, where he could be arrested, but the US government got to him first. But even then, he did not reveal his agent network. After Browder went to prison in 1940, Golos took over running Browder's agents. In 1941, Golos set up a commercial forwarding enterprise, called the US Shipping and Service Corporation, with </span><a data-dcnode-id="6430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elizabeth_Bentley" title="Elizabeth Bentley"><span data-dcnode-id="6431" instrument_node="">Elizabeth Bentley</span></a><span data-dcnode-id="6429" instrument_node="">, his lover, as one of its officers.</span><sup class="reference" data-dcnode-id="6426" id="cite_ref-Haynes_1-3"><a data-dcnode-id="6427" href="#cite_note-Haynes-1"><span data-dcnode-id="6428" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="6423" id="cite_ref-Weinstein_2-3"><a data-dcnode-id="6424" href="#cite_note-Weinstein-2"><span data-dcnode-id="6425" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6422" instrument_node="">
</span></p><p data-dcnode-id="6402"><span data-dcnode-id="6420" instrument_node="">Sometime in November 1943, Golos met in </span><a data-dcnode-id="6418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_City" title="New York City"><span data-dcnode-id="6419" instrument_node="">New York City</span></a><span data-dcnode-id="6417" instrument_node=""> with key figures of the </span><a data-dcnode-id="6415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perlo_group" title="Perlo group"><span data-dcnode-id="6416" instrument_node="">Perlo group</span></a><span data-dcnode-id="6414" instrument_node="">, a group working in several government departments and agencies in </span><a data-dcnode-id="6412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington%2C_D.C." title="Washington, D.C."><span data-dcnode-id="6413" instrument_node="">Washington, D.C.</span></a><span data-dcnode-id="6411" instrument_node=""> The group was already in the service of Browder. Later that same month, after a series of heart attacks over the previous two years, Golos died in bed in Bentley's arms. Bentley then took over his operations (thus the reference in the decrypts to him as a "former" colleague).</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6404" style="white-space:nowrap;"><span data-dcnode-id="6410" instrument_node="">[</span><i data-dcnode-id="6406"><a data-dcnode-id="6407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6408" title="This claim needs references to reliable sources. (February 2007)"><span data-dcnode-id="6409" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6405" instrument_node="">]</span></sup><span data-dcnode-id="6403" instrument_node="">
</span></p><span data-dcnode-id="6401" instrument_node="">
</span><h2 data-dcnode-id="6391"><span class="mw-headline" data-dcnode-id="6399" id="Secret_apparatus"><span data-dcnode-id="6400" instrument_node="">Secret apparatus</span></span><span class="mw-editsection" data-dcnode-id="6392"><span class="mw-editsection-bracket" data-dcnode-id="6397"><span data-dcnode-id="6398" instrument_node="">[</span></span><a data-dcnode-id="6395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_espionage_in_the_United_States%26action%3Dedit%26section%3D3" title="Edit section: Secret apparatus"><span data-dcnode-id="6396" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6393"><span data-dcnode-id="6394" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6390" instrument_node="">
</span><p data-dcnode-id="6348"><span data-dcnode-id="6389" instrument_node="">By the end of 1936 at least four mid-level </span><a class="mw-redirect" data-dcnode-id="6387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_Department" title="State Department"><span data-dcnode-id="6388" instrument_node="">State Department</span></a><span data-dcnode-id="6386" instrument_node=""> officials were delivering information to Soviet intelligence: </span><a data-dcnode-id="6384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alger_Hiss" title="Alger Hiss"><span data-dcnode-id="6385" instrument_node="">Alger Hiss</span></a><span data-dcnode-id="6383" instrument_node="">, assistant to Assistant Secretary of State </span><a data-dcnode-id="6381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francis_Bowes_Sayre_Sr." title="Francis Bowes Sayre Sr."><span data-dcnode-id="6382" instrument_node="">Francis Sayre</span></a><span data-dcnode-id="6380" instrument_node="">; </span><a data-dcnode-id="6378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julian_Wadleigh" title="Julian Wadleigh"><span data-dcnode-id="6379" instrument_node="">Julian Wadleigh</span></a><span data-dcnode-id="6377" instrument_node="">, economist in the Trade Agreements Section; </span><a data-dcnode-id="6375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laurence_Duggan" title="Laurence Duggan"><span data-dcnode-id="6376" instrument_node="">Laurence Duggan</span></a><span data-dcnode-id="6374" instrument_node="">, Latin American division; and </span><a data-dcnode-id="6372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noel_Field" title="Noel Field"><span data-dcnode-id="6373" instrument_node="">Noel Field</span></a><span data-dcnode-id="6371" instrument_node="">, West European division. </span><a data-dcnode-id="6369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whittaker_Chambers" title="Whittaker Chambers"><span data-dcnode-id="6370" instrument_node="">Whittaker Chambers</span></a><span data-dcnode-id="6368" instrument_node=""> later testified that the plans for a tank design with a revolutionary new </span><a data-dcnode-id="6366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christie_suspension" title="Christie suspension"><span data-dcnode-id="6367" instrument_node="">suspension</span></a><span data-dcnode-id="6365" instrument_node=""> invented by </span><a data-dcnode-id="6363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J._Walter_Christie" title="J. Walter Christie"><span data-dcnode-id="6364" instrument_node="">J. Walter Christie</span></a><span data-dcnode-id="6362" instrument_node=""> (then being tested in the U.S.A.) were procured and put into production in the Soviet Union as the Mark BT, later developed into the famous Soviet </span><a data-dcnode-id="6360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/T-34" title="T-34"><span data-dcnode-id="6361" instrument_node="">T-34</span></a><span data-dcnode-id="6359" instrument_node=""> tank.</span><sup class="reference" data-dcnode-id="6356" id="cite_ref-17"><a data-dcnode-id="6357" href="#cite_note-17"><span data-dcnode-id="6358" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="6353" id="cite_ref-18"><a data-dcnode-id="6354" href="#cite_note-18"><span data-dcnode-id="6355" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="6350" id="cite_ref-19"><a data-dcnode-id="6351" href="#cite_note-19"><span data-dcnode-id="6352" instrument_node="">[19]</span></a></sup><span data-dcnode-id="6349" instrument_node="">
</span></p><p data-dcnode-id="6333"><span data-dcnode-id="6347" instrument_node="">In 1993, experts from the Library of Congress traveled to Moscow to copy previously secret archives of Communist Party USA (</span><a class="mw-redirect" data-dcnode-id="6345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CPUSA" title="CPUSA"><span data-dcnode-id="6346" instrument_node="">CPUSA</span></a><span data-dcnode-id="6344" instrument_node="">) records, sent to the Soviet Union for safekeeping by party organizers. The records provide an irrefutable record of Soviet intelligence and cooperation provided by those in the radical left in the United States from the 1920s through the 1940s.  Some documents revealed that the CPUSA was actively involved in secretly recruiting party members from African-American groups and rural farm workers. The records contained further evidence that Soviet sympathizers had indeed infiltrated the State Department, beginning in the 1930s. Included were letters from two U.S. ambassadors in Europe to </span><a data-dcnode-id="6342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_United_States" title="President of the United States"><span data-dcnode-id="6343" instrument_node="">President</span></a><span data-dcnode-id="6341" instrument_node=""> </span><a data-dcnode-id="6339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franklin_D._Roosevelt" title="Franklin D. Roosevelt"><span data-dcnode-id="6340" instrument_node="">Franklin D. Roosevelt</span></a><span data-dcnode-id="6338" instrument_node=""> and a senior State Department official. Thanks to an official in the State department sympathetic to the Party, the confidential correspondence, concerning political and economic matters in Europe, ended up in the hands of Soviet intelligence.</span><sup class="reference" data-dcnode-id="6335" id="cite_ref-20"><a data-dcnode-id="6336" href="#cite_note-20"><span data-dcnode-id="6337" instrument_node="">[20]</span></a></sup><span data-dcnode-id="6334" instrument_node="">
</span></p><p data-dcnode-id="6292"><span data-dcnode-id="6332" instrument_node="">In the late 1930s and 1940, Soviet intelligence had multiple staging areas for plots to murder exiled Russian revolutionary </span><a data-dcnode-id="6330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leon_Trotsky" title="Leon Trotsky"><span data-dcnode-id="6331" instrument_node="">Leon Trotsky</span></a><span data-dcnode-id="6329" instrument_node="">, then living in </span><a data-dcnode-id="6327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mexico_City" title="Mexico City"><span data-dcnode-id="6328" instrument_node="">Mexico City</span></a><span data-dcnode-id="6326" instrument_node="">. </span><a data-dcnode-id="6324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iosif_Grigulevich" title="Iosif Grigulevich"><span data-dcnode-id="6325" instrument_node="">Josef Grigulevich</span></a><span data-dcnode-id="6323" instrument_node="">, an NKVD agent who had direct orders from Stalin to kill Trotsky, had a safe house in Zook's Drugstore in </span><a data-dcnode-id="6321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Santa_Fe%2C_New_Mexico" title="Santa Fe, New Mexico"><span data-dcnode-id="6322" instrument_node="">Santa Fe, New Mexico</span></a><span data-dcnode-id="6320" instrument_node="">.</span><sup class="reference" data-dcnode-id="6317" id="cite_ref-:10_21-0"><a data-dcnode-id="6318" href="#cite_note-:10-21"><span data-dcnode-id="6319" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="6314" id="cite_ref-22"><a data-dcnode-id="6315" href="#cite_note-22"><span data-dcnode-id="6316" instrument_node="">[22]</span></a></sup><span data-dcnode-id="6313" instrument_node=""> The Soviets had two plans to assassinate Trotsky, one involving the Mexican Stalinist </span><a data-dcnode-id="6311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Alfaro_Siqueiros" title="David Alfaro Siqueiros"><span data-dcnode-id="6312" instrument_node="">David Siqueiros</span></a><span data-dcnode-id="6310" instrument_node="">, and the other the Spanish </span><a data-dcnode-id="6308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ram%25C3%25B3n_Mercader" title="Ramón Mercader"><span data-dcnode-id="6309" instrument_node="">Ramón Mercader</span></a><span data-dcnode-id="6307" instrument_node="">. One account of the first, failed raid on Trotsky's home states that Grigulevich tricked </span><a data-dcnode-id="6305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Sheldon_Harte" title="Robert Sheldon Harte"><span data-dcnode-id="6306" instrument_node="">Robert Sheldon Harte</span></a><span data-dcnode-id="6304" instrument_node="">, an American Communist who was Trotsky's bodyguard, into opening the gate. The Soviets failed to kill Trotsky during this attempt, but betrayed Harte, and they killed him for being a witness. Siqueiros then escaped to Chile with the help of </span><a data-dcnode-id="6302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pablo_Neruda" title="Pablo Neruda"><span data-dcnode-id="6303" instrument_node="">Pablo Neruda</span></a><span data-dcnode-id="6301" instrument_node="">.</span><sup class="reference" data-dcnode-id="6298" id="cite_ref-:10_21-1"><a data-dcnode-id="6299" href="#cite_note-:10-21"><span data-dcnode-id="6300" instrument_node="">[21]</span></a></sup><span data-dcnode-id="6297" instrument_node=""> Grigulevich likely then crossed the border north and took refuge at Zook's Pharmacy. The second later attempt by Mercader was successful and Trotsky was murdered in Mexico.</span><sup class="reference" data-dcnode-id="6294" id="cite_ref-:10_21-2"><a data-dcnode-id="6295" href="#cite_note-:10-21"><span data-dcnode-id="6296" instrument_node="">[21]</span></a></sup><span data-dcnode-id="6293" instrument_node="">
</span></p><span data-dcnode-id="6291" instrument_node="">
</span><h2 data-dcnode-id="6281"><span class="mw-headline" data-dcnode-id="6289" id="Soble_spy_ring"><span data-dcnode-id="6290" instrument_node="">Soble spy ring</span></span><span class="mw-editsection" data-dcnode-id="6282"><span class="mw-editsection-bracket" data-dcnode-id="6287"><span data-dcnode-id="6288" instrument_node="">[</span></span><a data-dcnode-id="6285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_espionage_in_the_United_States%26action%3Dedit%26section%3D4" title="Edit section: Soble spy ring"><span data-dcnode-id="6286" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6283"><span data-dcnode-id="6284" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6280" instrument_node="">
</span><p data-dcnode-id="6241"><span data-dcnode-id="6279" instrument_node="">Jacob Albam and the Sobles (</span><a data-dcnode-id="6277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jack_Soble" title="Jack Soble"><span data-dcnode-id="6278" instrument_node="">Jack</span></a><span data-dcnode-id="6276" instrument_node=""> and </span><a data-dcnode-id="6274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Myra_Soble" title="Myra Soble"><span data-dcnode-id="6275" instrument_node="">Myra</span></a><span data-dcnode-id="6273" instrument_node="">) were indicted on espionage charges by the FBI in 1957; all three were later convicted and served prison terms. Alleged members of their spy ring, the </span><a data-dcnode-id="6271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jane_Foster_Zlatovski" title="Jane Foster Zlatovski"><span data-dcnode-id="6272" instrument_node="">Zlatovskis</span></a><span data-dcnode-id="6270" instrument_node="">, remained in </span><a data-dcnode-id="6268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris" title="Paris"><span data-dcnode-id="6269" instrument_node="">Paris</span></a><span data-dcnode-id="6267" instrument_node="">, </span><a data-dcnode-id="6265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/France" title="France"><span data-dcnode-id="6266" instrument_node="">France</span></a><span data-dcnode-id="6264" instrument_node="">, where the laws did not allow their extradition to the United States for espionage. </span><a data-dcnode-id="6262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Soblen" title="Robert Soblen"><span data-dcnode-id="6263" instrument_node="">Robert Soblen</span></a><span data-dcnode-id="6261" instrument_node=""> was sentenced to life in prison for his espionage work at </span><a data-dcnode-id="6259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sandia_National_Laboratories" title="Sandia National Laboratories"><span data-dcnode-id="6260" instrument_node="">Sandia National Laboratories</span></a><span data-dcnode-id="6258" instrument_node="">, but jumped bail and escaped to </span><a data-dcnode-id="6256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel" title="Israel"><span data-dcnode-id="6257" instrument_node="">Israel</span></a><span data-dcnode-id="6255" instrument_node="">. After being expelled from that country, he later committed </span><a data-dcnode-id="6253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suicide" title="Suicide"><span data-dcnode-id="6254" instrument_node="">suicide</span></a><span data-dcnode-id="6252" instrument_node=""> in </span><a data-dcnode-id="6250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Britain" title="Great Britain"><span data-dcnode-id="6251" instrument_node="">Great Britain</span></a><span data-dcnode-id="6249" instrument_node=""> while awaiting extradition back to the United States.</span><sup class="reference" data-dcnode-id="6246" id="cite_ref-Haynes_1-4"><a data-dcnode-id="6247" href="#cite_note-Haynes-1"><span data-dcnode-id="6248" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="6243" id="cite_ref-Cooperation_23-0"><a data-dcnode-id="6244" href="#cite_note-Cooperation-23"><span data-dcnode-id="6245" instrument_node="">[23]</span></a></sup><span data-dcnode-id="6242" instrument_node="">
</span></p><p data-dcnode-id="6233"><a data-dcnode-id="6239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Morros" title="Boris Morros"><span data-dcnode-id="6240" instrument_node="">Boris Morros</span></a><span data-dcnode-id="6238" instrument_node="">, formerly a Soviet spy, became an FBI counterspy and reported on the Soble spy ring.</span><sup class="reference" data-dcnode-id="6235" id="cite_ref-24"><a data-dcnode-id="6236" href="#cite_note-24"><span data-dcnode-id="6237" instrument_node="">[24]</span></a></sup><span data-dcnode-id="6234" instrument_node="">
</span></p><span data-dcnode-id="6232" instrument_node="">
</span><h2 data-dcnode-id="6222"><span class="mw-headline" data-dcnode-id="6230" id="Wartime_espionage"><span data-dcnode-id="6231" instrument_node="">Wartime espionage</span></span><span class="mw-editsection" data-dcnode-id="6223"><span class="mw-editsection-bracket" data-dcnode-id="6228"><span data-dcnode-id="6229" instrument_node="">[</span></span><a data-dcnode-id="6226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_espionage_in_the_United_States%26action%3Dedit%26section%3D5" title="Edit section: Wartime espionage"><span data-dcnode-id="6227" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6224"><span data-dcnode-id="6225" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6221" instrument_node="">
</span><p data-dcnode-id="6187"><span data-dcnode-id="6220" instrument_node="">During </span><a data-dcnode-id="6218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="6219" instrument_node="">the Second World War</span></a><span data-dcnode-id="6217" instrument_node="">, Soviet espionage agents obtained classified reports on electronic advances in radio-beacon artillery </span><a data-dcnode-id="6215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fuse_%28explosives%29" title="Fuse (explosives)"><span data-dcnode-id="6216" instrument_node="">fuses</span></a><span data-dcnode-id="6214" instrument_node=""> by </span><a data-dcnode-id="6212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emerson_Radio" title="Emerson Radio"><span data-dcnode-id="6213" instrument_node="">Emerson Radio</span></a><span data-dcnode-id="6211" instrument_node="">, including a complete proximity fuse (reportedly the same fuse design that was later installed on Soviet anti-aircraft missiles to shoot down </span><a data-dcnode-id="6209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francis_Gary_Powers" title="Francis Gary Powers"><span data-dcnode-id="6210" instrument_node="">Francis Gary Powers</span></a><span data-dcnode-id="6208" instrument_node="">'s </span><a data-dcnode-id="6206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lockheed_U-2" title="Lockheed U-2"><span data-dcnode-id="6207" instrument_node="">U-2</span></a><span data-dcnode-id="6205" instrument_node=""> in 1960).</span><sup class="reference" data-dcnode-id="6202" id="cite_ref-25"><a data-dcnode-id="6203" href="#cite_note-25"><span data-dcnode-id="6204" instrument_node="">[25]</span></a></sup><span data-dcnode-id="6201" instrument_node=""> Thousands of documents from the </span><a data-dcnode-id="6199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Advisory_Committee_for_Aeronautics" title="National Advisory Committee for Aeronautics"><span data-dcnode-id="6200" instrument_node="">National Advisory Committee for Aeronautics</span></a><span data-dcnode-id="6198" instrument_node=""> (NACA) were photocopied or stolen, including a complete set of design and production drawings for </span><a class="mw-redirect" data-dcnode-id="6196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lockheed_Aircraft" title="Lockheed Aircraft"><span data-dcnode-id="6197" instrument_node="">Lockheed Aircraft</span></a><span data-dcnode-id="6195" instrument_node="">'s new </span><a class="mw-redirect" data-dcnode-id="6193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/P-80_Shooting_Star" title="P-80 Shooting Star"><span data-dcnode-id="6194" instrument_node="">P-80 Shooting Star</span></a><span data-dcnode-id="6192" instrument_node=""> fighter jet.</span><sup class="reference" data-dcnode-id="6189" id="cite_ref-Feklisov_26-0"><a data-dcnode-id="6190" href="#cite_note-Feklisov-26"><span data-dcnode-id="6191" instrument_node="">[26]</span></a></sup><span data-dcnode-id="6188" instrument_node="">
</span></p><p data-dcnode-id="6148"><span data-dcnode-id="6186" instrument_node="">According to Soviet agent </span><a data-dcnode-id="6184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pavel_Sudoplatov" title="Pavel Sudoplatov"><span data-dcnode-id="6185" instrument_node="">Pavel Sudoplatov</span></a><span data-dcnode-id="6183" instrument_node="">, five spy rings for the Soviet Union were targeting the United States during World War II: one was based in </span><a data-dcnode-id="6181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amtorg_Trading_Corporation" title="Amtorg Trading Corporation"><span data-dcnode-id="6182" instrument_node="">Amtorg</span></a><span data-dcnode-id="6180" instrument_node=""> in </span><a data-dcnode-id="6178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_City" title="New York City"><span data-dcnode-id="6179" instrument_node="">New York City</span></a><span data-dcnode-id="6177" instrument_node="">, another spy ring was based in the </span><a class="mw-redirect" data-dcnode-id="6175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Embassy_of_Russia_in_Washington%2C_D.C." title="Embassy of Russia in Washington, D.C."><span data-dcnode-id="6176" instrument_node="">Soviet Embassy in the United States</span></a><span data-dcnode-id="6174" instrument_node=""> at </span><a data-dcnode-id="6172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington%2C_D.C." title="Washington, D.C."><span data-dcnode-id="6173" instrument_node="">Washington, D.C.</span></a><span data-dcnode-id="6171" instrument_node="">, another was based in the Soviet </span><a data-dcnode-id="6169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consul_%28representative%29" title="Consul (representative)"><span data-dcnode-id="6170" instrument_node="">Consulate General</span></a><span data-dcnode-id="6168" instrument_node=""> in </span><a data-dcnode-id="6166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Francisco" title="San Francisco"><span data-dcnode-id="6167" instrument_node="">San Francisco</span></a><span data-dcnode-id="6165" instrument_node="">, another was based out of </span><a data-dcnode-id="6163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mexico_City" title="Mexico City"><span data-dcnode-id="6164" instrument_node="">Mexico City</span></a><span data-dcnode-id="6162" instrument_node=""> and ran by </span><a data-dcnode-id="6160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lev_Vasilevsky" title="Lev Vasilevsky"><span data-dcnode-id="6161" instrument_node="">Vasilevsky</span></a><span data-dcnode-id="6159" instrument_node="">, and the fifth was the </span><a data-dcnode-id="6157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iskhak_Akhmerov" title="Iskhak Akhmerov"><span data-dcnode-id="6158" instrument_node="">Akhmerov</span></a><span data-dcnode-id="6156" instrument_node=""> led ring which targeted </span><a data-dcnode-id="6154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_USA" title="Communist Party USA"><span data-dcnode-id="6155" instrument_node="">United States Communist Party members</span></a><span data-dcnode-id="6153" instrument_node=""> for the Kremlin's needs.</span><sup class="reference" data-dcnode-id="6150" id="cite_ref-FOOTNOTESudoplatov1994217_27-0"><a data-dcnode-id="6151" href="#cite_note-FOOTNOTESudoplatov1994217-27"><span data-dcnode-id="6152" instrument_node="">[27]</span></a></sup><span data-dcnode-id="6149" instrument_node="">
</span></p><span data-dcnode-id="6147" instrument_node="">
</span><h3 data-dcnode-id="6137"><span class="mw-headline" data-dcnode-id="6145" id="Atomic_bomb_secrets"><span data-dcnode-id="6146" instrument_node="">Atomic bomb secrets</span></span><span class="mw-editsection" data-dcnode-id="6138"><span class="mw-editsection-bracket" data-dcnode-id="6143"><span data-dcnode-id="6144" instrument_node="">[</span></span><a data-dcnode-id="6141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_espionage_in_the_United_States%26action%3Dedit%26section%3D6" title="Edit section: Atomic bomb secrets"><span data-dcnode-id="6142" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6139"><span data-dcnode-id="6140" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6136" instrument_node="">
</span><p data-dcnode-id="6103"><a data-dcnode-id="6134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Stalin" title="Joseph Stalin"><span data-dcnode-id="6135" instrument_node="">Joseph Stalin</span></a><span data-dcnode-id="6133" instrument_node=""> directed Soviet intelligence officers to collect information in four main areas. </span><a data-dcnode-id="6131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pavel_Fitin" title="Pavel Fitin"><span data-dcnode-id="6132" instrument_node="">Pavel Fitin</span></a><span data-dcnode-id="6130" instrument_node="">, the 34-year-old chief of the KGB First Directorate, was directed to seek American intelligence concerning Hitler's plans for the war in Russia; secret war aims of London and Washington, particularly with regard to planning for </span><a data-dcnode-id="6128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Overlord" title="Operation Overlord"><span data-dcnode-id="6129" instrument_node="">Operation Overlord</span></a><span data-dcnode-id="6127" instrument_node="">, the second front in Europe; any indications the Western Allies might be willing to make a separate peace with Hitler; and American scientific and technological progress, particularly in the development of an </span><a class="mw-redirect" data-dcnode-id="6125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atomic_weapon" title="Atomic weapon"><span data-dcnode-id="6126" instrument_node="">atomic weapon</span></a><span data-dcnode-id="6124" instrument_node="">.</span><sup class="reference" data-dcnode-id="6121" id="cite_ref-:13_8-2"><a data-dcnode-id="6122" href="#cite_note-:13-8"><span data-dcnode-id="6123" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6120" instrument_node=""> </span><a data-dcnode-id="6118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pavel_Sudoplatov" title="Pavel Sudoplatov"><span data-dcnode-id="6119" instrument_node="">Pavel Sudoplatov</span></a><span data-dcnode-id="6117" instrument_node=""> claimed to have led the efforts to obtain information about the </span><a data-dcnode-id="6115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manhattan_Project" title="Manhattan Project"><span data-dcnode-id="6116" instrument_node="">Manhattan Project</span></a><sup class="reference" data-dcnode-id="6112" id="cite_ref-FOOTNOTESudoplatov1994_28-0"><a data-dcnode-id="6113" href="#cite_note-FOOTNOTESudoplatov1994-28"><span data-dcnode-id="6114" instrument_node="">[28]</span></a></sup><span data-dcnode-id="6111" instrument_node=""> in an alleged "Department S" but this has been questioned because Sudoplatov placed false accusations on </span><a data-dcnode-id="6109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J._Robert_Oppenheimer" title="J. Robert Oppenheimer"><span data-dcnode-id="6110" instrument_node="">Oppenheimer</span></a><span data-dcnode-id="6108" instrument_node=""> and others.</span><sup class="reference" data-dcnode-id="6105" id="cite_ref-29"><a data-dcnode-id="6106" href="#cite_note-29"><span data-dcnode-id="6107" instrument_node="">[29]</span></a></sup><span data-dcnode-id="6104" instrument_node="">
</span></p><p data-dcnode-id="6085"><span data-dcnode-id="6102" instrument_node="">A well-known Soviet case was of </span><a data-dcnode-id="6100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julius_and_Ethel_Rosenberg" title="Julius and Ethel Rosenberg"><span data-dcnode-id="6101" instrument_node="">Julius and Ethel Rosenberg</span></a><span data-dcnode-id="6099" instrument_node="">, the first US citizens convicted and executed for espionage during peacetime. The married couple lived in New York City and were accused of spying for the Soviet Union and sending information regarding radar, sonar, jet propulsion engines, and sending nuclear weapon designs. Following the </span><a data-dcnode-id="6097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moynihan_Commission_on_Government_Secrecy" title="Moynihan Commission on Government Secrecy"><span data-dcnode-id="6098" instrument_node="">Moynihan Commission</span></a><span data-dcnode-id="6096" instrument_node="">, the declassification of the </span><a data-dcnode-id="6094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venona_project" title="Venona project"><span data-dcnode-id="6095" instrument_node="">Venona project</span></a><span data-dcnode-id="6093" instrument_node=""> in 1995 revealed more information about the Julius and Ethel Rosenberg case, and confirmed that a widespread Soviet spy network did exist during the Cold War. However, many agents were never prosecuted or publicly implicated, for instance </span><a data-dcnode-id="6091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theodore_Hall" title="Theodore Hall"><span data-dcnode-id="6092" instrument_node="">Theodore Hall</span></a><span data-dcnode-id="6090" instrument_node="">, because much Venona evidence was withheld until 1995.</span><sup class="reference" data-dcnode-id="6087" id="cite_ref-30"><a data-dcnode-id="6088" href="#cite_note-30"><span data-dcnode-id="6089" instrument_node="">[30]</span></a></sup><span data-dcnode-id="6086" instrument_node="">
</span></p><p data-dcnode-id="6059"><span data-dcnode-id="6084" instrument_node="">During this time, </span><a data-dcnode-id="6082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Koval" title="George Koval"><span data-dcnode-id="6083" instrument_node="">George Koval</span></a><span data-dcnode-id="6081" instrument_node=""> who infiltrated the Manhattan Project as a member of the </span><a data-dcnode-id="6079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GRU_%28Soviet_Union%29" title="GRU (Soviet Union)"><span data-dcnode-id="6080" instrument_node="">GRU</span></a><span data-dcnode-id="6078" instrument_node="">, also passed stolen atomic secrets to the Soviet Union.</span><sup class="reference" data-dcnode-id="6075" id="cite_ref-31"><a data-dcnode-id="6076" href="#cite_note-31"><span data-dcnode-id="6077" instrument_node="">[31]</span></a></sup><span data-dcnode-id="6074" instrument_node=""> </span><a data-dcnode-id="6072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harry_Gold" title="Harry Gold"><span data-dcnode-id="6073" instrument_node="">Harry Gold</span></a><span data-dcnode-id="6071" instrument_node=""> and </span><a data-dcnode-id="6069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Klaus_Fuchs" title="Klaus Fuchs"><span data-dcnode-id="6070" instrument_node="">Klaus Fuchs</span></a><span data-dcnode-id="6068" instrument_node=""> were also Soviet spies.</span><sup class="reference" data-dcnode-id="6065" id="cite_ref-:10_21-3"><a data-dcnode-id="6066" href="#cite_note-:10-21"><span data-dcnode-id="6067" instrument_node="">[21]</span></a></sup><span data-dcnode-id="6064" instrument_node=""> Harry Gold was a courier for other Soviet spies such as Klaus Fuchs.</span><sup class="reference" data-dcnode-id="6061" id="cite_ref-32"><a data-dcnode-id="6062" href="#cite_note-32"><span data-dcnode-id="6063" instrument_node="">[32]</span></a></sup><span data-dcnode-id="6060" instrument_node="">
</span></p><span data-dcnode-id="6058" instrument_node="">
</span><h3 data-dcnode-id="6048"><span class="mw-headline" data-dcnode-id="6056" id="The_Silvermaster_spy_ring"><span data-dcnode-id="6057" instrument_node="">The Silvermaster spy ring</span></span><span class="mw-editsection" data-dcnode-id="6049"><span class="mw-editsection-bracket" data-dcnode-id="6054"><span data-dcnode-id="6055" instrument_node="">[</span></span><a data-dcnode-id="6052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_espionage_in_the_United_States%26action%3Dedit%26section%3D7" title="Edit section: The Silvermaster spy ring"><span data-dcnode-id="6053" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6050"><span data-dcnode-id="6051" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6047" instrument_node="">
</span><p data-dcnode-id="6009"><span data-dcnode-id="6046" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="6044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Treasury" title="United States Treasury"><span data-dcnode-id="6045" instrument_node="">United States Treasury</span></a><span data-dcnode-id="6043" instrument_node=""> Department was successfully penetrated by nearly a dozen Soviet agents or information sources, including </span><a data-dcnode-id="6041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harold_Glasser" title="Harold Glasser"><span data-dcnode-id="6042" instrument_node="">Harold Glasser</span></a><span data-dcnode-id="6040" instrument_node=""> and his superior, </span><a data-dcnode-id="6038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harry_Dexter_White" title="Harry Dexter White"><span data-dcnode-id="6039" instrument_node="">Harry Dexter White</span></a><span data-dcnode-id="6037" instrument_node="">, assistant secretary of the treasury and the second most influential official in the department.</span><sup class="reference" data-dcnode-id="6034" id="cite_ref-Haynes_1-5"><a data-dcnode-id="6035" href="#cite_note-Haynes-1"><span data-dcnode-id="6036" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="6031" id="cite_ref-Weinstein_2-4"><a data-dcnode-id="6032" href="#cite_note-Weinstein-2"><span data-dcnode-id="6033" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6030" instrument_node="">  In late May 1941, Vitali Pavlov, a 25-year-old NKVD officer, approached White and attempted to secure his assistance to influence U.S. policy towards </span><a data-dcnode-id="6028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empire_of_Japan" title="Empire of Japan"><span data-dcnode-id="6029" instrument_node="">Japan</span></a><span data-dcnode-id="6027" instrument_node="">. Pavlov's memoirs after decades of being in the KGB, alleged that White agreed to assist Soviet intelligence in any way he could. According to </span><a data-dcnode-id="6025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whittaker_Chambers" title="Whittaker Chambers"><span data-dcnode-id="6026" instrument_node="">Whittaker Chambers</span></a><span data-dcnode-id="6024" instrument_node="">, the principal function of White was to aid in the infiltration and placement of Soviet operatives within the government, and protecting sources.</span><sup class="reference" data-dcnode-id="6021" id="cite_ref-:6_33-0"><a data-dcnode-id="6022" href="#cite_note-:6-33"><span data-dcnode-id="6023" instrument_node="">[33]</span></a></sup><span data-dcnode-id="6020" instrument_node=""> When security concerns arose around </span><a data-dcnode-id="6018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nathan_Gregory_Silvermaster" title="Nathan Gregory Silvermaster"><span data-dcnode-id="6019" instrument_node="">Nathan Gregory Silvermaster</span></a><span data-dcnode-id="6017" instrument_node="">, White protected him in his sensitive position at the </span><a data-dcnode-id="6015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Board_of_Economic_Warfare" title="Board of Economic Warfare"><span data-dcnode-id="6016" instrument_node="">Board of Economic Warfare</span></a><span data-dcnode-id="6014" instrument_node="">. White likewise was a purveyor of information and resources to assist Soviet aims, and agreed to press for the release of German occupation currency plates to the Soviet Union. The Soviets later used the plates to print unrestricted sums of money to exchange for U.S. and Allied hard goods.</span><sup class="reference" data-dcnode-id="6011" id="cite_ref-Schecter_34-0"><a data-dcnode-id="6012" href="#cite_note-Schecter-34"><span data-dcnode-id="6013" instrument_node="">[34]</span></a></sup><span data-dcnode-id="6010" instrument_node="">
</span></p><p data-dcnode-id="5978"><span data-dcnode-id="6008" instrument_node="">In August 1945, </span><a data-dcnode-id="6006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elizabeth_Bentley" title="Elizabeth Bentley"><span data-dcnode-id="6007" instrument_node="">Elizabeth Bentley</span></a><span data-dcnode-id="6005" instrument_node="">, fearful of assassination by the Soviet </span><a data-dcnode-id="6003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_State_Security_%28Soviet_Union%29" title="Ministry of State Security (Soviet Union)"><span data-dcnode-id="6004" instrument_node="">MGB</span></a><span data-dcnode-id="6002" instrument_node="">, turned herself in to the government. She implicated many agents and sources in the </span><a data-dcnode-id="6000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacob_Golos" title="Jacob Golos"><span data-dcnode-id="6001" instrument_node="">Golos</span></a><span data-dcnode-id="5999" instrument_node=""> and </span><a data-dcnode-id="5997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/FBI_Silvermaster_File" title="FBI Silvermaster File"><span data-dcnode-id="5998" instrument_node="">Silvermaster</span></a><span data-dcnode-id="5996" instrument_node=""> spy networks, and was the first to accuse </span><a data-dcnode-id="5994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harry_Dexter_White" title="Harry Dexter White"><span data-dcnode-id="5995" instrument_node="">Harry Dexter White</span></a><span data-dcnode-id="5993" instrument_node=""> of acting on behalf of Soviet interests in releasing occupation plates to Moscow, later confirmed by Soviet archives and former KGB officers.</span><sup class="reference" data-dcnode-id="5990" id="cite_ref-Sudoplatov_13-1"><a data-dcnode-id="5991" href="#cite_note-Sudoplatov-13"><span data-dcnode-id="5992" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="5987" id="cite_ref-Schecter_34-1"><a data-dcnode-id="5988" href="#cite_note-Schecter-34"><span data-dcnode-id="5989" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5986" instrument_node=""> U.S. counterintelligence archives in the </span><a data-dcnode-id="5984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venona_project" title="Venona project"><span data-dcnode-id="5985" instrument_node="">Venona project</span></a><span data-dcnode-id="5983" instrument_node=""> contain "damning evidence" against White—showing evidence for his inappropriate contacts with Soviet agents.</span><sup class="reference" data-dcnode-id="5980" id="cite_ref-:8_35-0"><a data-dcnode-id="5981" href="#cite_note-:8-35"><span data-dcnode-id="5982" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5979" instrument_node="">
</span></p><p data-dcnode-id="5945"><span data-dcnode-id="5977" instrument_node="">In a twist of history, Harry Dexter White would participate in the </span><a data-dcnode-id="5975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bretton_Woods_Conference" title="Bretton Woods Conference"><span data-dcnode-id="5976" instrument_node="">Bretton Woods Conference</span></a><span data-dcnode-id="5974" instrument_node="">, which created the American-led, post-war financial and economic order.</span><sup class="reference" data-dcnode-id="5971" id="cite_ref-:9_36-0"><a data-dcnode-id="5972" href="#cite_note-:9-36"><span data-dcnode-id="5973" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5970" instrument_node=""> Although White was sympathetic to the Soviet Union, he was still capitalist in his economic thinking, and there was only so much he could do to benefit the Soviet Union at a conference for liberal internationalism, an idea the Soviets opposed.</span><sup class="reference" data-dcnode-id="5967" id="cite_ref-:8_35-1"><a data-dcnode-id="5968" href="#cite_note-:8-35"><span data-dcnode-id="5969" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5966" instrument_node=""> Ultimately, the main result was that President Truman would nominate a European to Managing Director of the </span><a data-dcnode-id="5964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Monetary_Fund" title="International Monetary Fund"><span data-dcnode-id="5965" instrument_node="">IMF</span></a><span data-dcnode-id="5963" instrument_node=""> instead of Harry Dexter White.</span><sup class="reference" data-dcnode-id="5960" id="cite_ref-:9_36-1"><a data-dcnode-id="5961" href="#cite_note-:9-36"><span data-dcnode-id="5962" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5959" instrument_node=""> Dr. James C. Van Hook, joint historian of the </span><a data-dcnode-id="5957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_State" title="United States Department of State"><span data-dcnode-id="5958" instrument_node="">U.S. Department of State</span></a><span data-dcnode-id="5956" instrument_node=""> and the </span><a data-dcnode-id="5954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Intelligence_Agency" title="Central Intelligence Agency"><span data-dcnode-id="5955" instrument_node="">Central Intelligence Agency</span></a><span data-dcnode-id="5953" instrument_node="">., says "It is difficult to understand how White's detractors could characterize Bretton Woods, a fundamental institution of liberal capitalism, as inherently pro-Soviet."</span><sup class="reference" data-dcnode-id="5950" id="cite_ref-:8_35-2"><a data-dcnode-id="5951" href="#cite_note-:8-35"><span data-dcnode-id="5952" instrument_node="">[35]</span></a></sup><sup class="reference" data-dcnode-id="5947" id="cite_ref-:6_33-1"><a data-dcnode-id="5948" href="#cite_note-:6-33"><span data-dcnode-id="5949" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5946" instrument_node="">
</span></p><span data-dcnode-id="5944" instrument_node="">
