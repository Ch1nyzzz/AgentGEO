</span><p class="mb15" data-dcnode-id="2811"><span data-dcnode-id="2815" instrument_node="">The abridged version of </span><a data-dcnode-id="2813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B72"><span data-dcnode-id="2814" instrument_node="">Lerner and Miller (1978)</span></a><span data-dcnode-id="2812" instrument_node=""> scale was used to measure global just world beliefs (GBJW) and personal just world beliefs (PBJW). The three GBJW items were: (1) I think basically the world is a just place, (2) I believe that, by and large, people get what they deserve, and (3) I am confident that justice always prevails over injustice. Alphas were 0.67 and 0.74 in 2010 and in 2018, respectively.</span></p><span data-dcnode-id="2810" instrument_node="">
</span><p class="mb0" data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">The four PBJW items were: (1) I think that important decisions that are made concerning me are usually just, (2) I believe that I usually get what I deserve, (3) In my life injustice is the exception rather than the rule, and (4) I believe that most of the things that happen in my life are fair. Alphas were 0.80 and 0.85 in 2010 and in 2018, respectively.</span></p><span data-dcnode-id="2807" instrument_node="">
</span><h4 data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">System Justification Beliefs</span></h4><span data-dcnode-id="2804" instrument_node="">
</span><p class="mb0" data-dcnode-id="2799"><span data-dcnode-id="2803" instrument_node="">System justification was measured with </span><a data-dcnode-id="2801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B62"><span data-dcnode-id="2802" instrument_node="">Kay and Jost (2003)</span></a><span data-dcnode-id="2800" instrument_node=""> system justifying belief (SJB) measure. The five SJB items were (1) In general, I find society to be fair, (2) Hungarian society needs to be radically restructured (R), (3) Most policies serve the greater good, (4) Everyone has a fair shot at wealth and happiness, and (5) Our society is getting worse every year (R). Alphas were 0.67 and 0.78 in 2010 and in 2018, respectively.</span></p><span data-dcnode-id="2798" instrument_node="">
</span><h4 data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">Anti-immigration Attitudes</span></h4><span data-dcnode-id="2795" instrument_node="">
</span><p class="mb0" data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">The six items assessing anti-immigration attitudes were: (1) We should defend our way of life from outside (foreign) influence, (2) Life is enriched by lots of different people living next to each other (R), (3) We should be stricter regarding the rights of people who want to live here, (4) It is good that the countries of the world are increasingly more connected (R), (5) The presence of foreigners increases the crime rate, and (6) Greater freedom in movement and settlement is beneficial for everyone (R). Alphas were 0.80 and 0.78 in 2010 and in 2018, respectively.</span></p><span data-dcnode-id="2792" instrument_node="">
</span><h4 data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">Party Affiliation</span></h4><span data-dcnode-id="2789" instrument_node="">
</span><p class="mb0" data-dcnode-id="2781"><span data-dcnode-id="2788" instrument_node="">Regarding party affiliation, participants were asked which party they would vote for in case there were elections “next Sunday.” We formed five groups according to voting intentions (see </span><a data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="2787" instrument_node="">Table 1</span></a><span data-dcnode-id="2785" instrument_node="">). In 2010, the group socialists consisted of the MSZP (Hungarian Socialist Party), whereas it in 2018 consisted of 46 MSZP and 43 Democratic Coalition (DK) voters. The latter was formed in 2010 as a fraction of the MSZP by the then leader of the MSZP, current leader of the DK, under whose leadership it split away in 2011 to form a separate party, taking many of the MSZP voters with him. Voters of small political parties (</span><i data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">N</span></i><span data-dcnode-id="2782" instrument_node=""> &lt; 50) were not considered.</span></p><span data-dcnode-id="2780" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="2779"></div><span data-dcnode-id="2778" instrument_node="">
</span><div class="Imageheaders" data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">TABLE 1</span></div><span data-dcnode-id="2775" instrument_node="">
</span><div class="FigureDesc" data-dcnode-id="2764"><span data-dcnode-id="2774" instrument_node="">
</span><a data-dcnode-id="2771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/703280/fpsyg-12-703280-HTML/image_m/fpsyg-12-703280-t001.jpg" name="table1" target="_blank"><span data-dcnode-id="2773" instrument_node="">
</span><img alt="www.frontiersin.org" data-dcnode-id="2772" id="T1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/703280/fpsyg-12-703280-HTML/image_t/fpsyg-12-703280-t001.gif&amp;raw"></a><span data-dcnode-id="2770" instrument_node="">
</span><p data-dcnode-id="2766"><strong data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Table 1.</span></strong><span data-dcnode-id="2767" instrument_node=""> Descriptive statistics and effect sizes for comparison between 2010 and 2018 means according to voting intention.</span></p><span data-dcnode-id="2765" instrument_node="">

</span><div class="DottedLine" data-dcnode-id="2760"></div><span data-dcnode-id="2759" instrument_node="">
</span><h4 data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">Subjective Socioeconomic Status</span></h4><span data-dcnode-id="2756" instrument_node="">
</span><p class="mb0" data-dcnode-id="2742"><span data-dcnode-id="2755" instrument_node="">Subjective socioeconomic status was measured with one question: “Which of the following statement characterizes your financial status the best?” The four options were: “I do not have any financial problems,” “I do not have financial problems, but I have to live within my means,” “I can’t buy everything I want, and usually run out of money before the end of the month,” and “I have serious financial troubles.” SES was collapsed to form two categories by combining the “I have serious financial problems” (</span><i data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">N</span></i><span data-dcnode-id="2752" instrument_node=""> = 103 in 2010 and 31 in 2018) and the “I can’t buy everything I want, and usually run out of money before the end of month” (</span><i data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">N</span></i><span data-dcnode-id="2749" instrument_node=""> = 421 in 2010 and 262 in 2018) categories to equal “low SES” with the other two options (“I do not have any financial problems,” </span><i data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">N</span></i><span data-dcnode-id="2746" instrument_node=""> = 19 in 2010 and 52 in 2018; “I do not have financial problems, but I have to live within my means,” </span><i data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">N</span></i><span data-dcnode-id="2743" instrument_node=""> = 457 in 2010 and 652 in 2018) classified as “high SES.”</span></p><span data-dcnode-id="2741" instrument_node="">
</span><h3 data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">Data Analysis</span></h3><span data-dcnode-id="2738" instrument_node="">
</span><p class="mb0" data-dcnode-id="2730"><span data-dcnode-id="2737" instrument_node="">To address our hypotheses (H1–H3), two-way ANOVAs were conducted that examined the effect of measurement time (2010 vs. 2018) and voting intentions (Fidesz vs. Jobbik vs. Social democrats vs. Undecided vs. No response) on the outcome variables (authoritarianism, global just world beliefs, personal just world beliefs, and anti-immigrant attitudes). To test our research question (RQ1), a three-way ANOVA was conducted that examined the effect of measurement time, voting intentions, and socioeconomic status on system justification beliefs. For pairwise comparisons, we used Bonferroni correction </span><i data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">post hoc</span></i><span data-dcnode-id="2734" instrument_node=""> tests. Cohen’s </span><i data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">d</span></i><span data-dcnode-id="2731" instrument_node=""> was calculated using the pooled standard deviation across groups.</span></p><span data-dcnode-id="2729" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2728" id="h4" name="h4"></a><h2 data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">Results</span></h2><span data-dcnode-id="2725" instrument_node="">
</span><p class="mb15" data-dcnode-id="2698"><span data-dcnode-id="2724" instrument_node="">A two-way ANOVA with authoritarianism as dependent variable, revealed a statistically significant interaction between the effects of measurement time and voting intentions on authoritarianism, </span><i data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">F</span></i><span data-dcnode-id="2721" instrument_node="">(4,1849) = 3.01, </span><i data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">p</span></i><span data-dcnode-id="2718" instrument_node=""> = 0.017, η</span><i data-dcnode-id="2714"><sub data-dcnode-id="2715"><i data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">p</span></i></sub></i><sup data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">2</span></sup><span data-dcnode-id="2711" instrument_node=""> = 0.006. Simple main effects analysis showed that Jobbik voters were significantly more authoritarian in 2010 than in 2018, but the authoritarianism of other voters did not change between 2010 and 2018 (</span><i data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">p</span></i><span data-dcnode-id="2708" instrument_node="">s &gt; 0.05). In fact, Jobbik supporters had plummeted from being highest in authoritarianism in 2010 to being lowest in 2018. </span><a data-dcnode-id="2706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="2707" instrument_node="">Table 1</span></a><span data-dcnode-id="2705" instrument_node=""> reports the standard error associated with the estimated marginal means, the relative </span><i data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">p</span></i><span data-dcnode-id="2702" instrument_node="">s, the confidence intervals, and Cohen’s </span><i data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">d</span></i><span data-dcnode-id="2699" instrument_node="">.</span></p><span data-dcnode-id="2697" instrument_node="">
</span><p class="mb15" data-dcnode-id="2673"><span data-dcnode-id="2696" instrument_node="">A similar two-way ANOVA with global just world beliefs as dependent variable, revealed a statistically significant interaction between the effects of measurement time and voting intentions on global just world beliefs, </span><i data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">F</span></i><span data-dcnode-id="2693" instrument_node="">(4,1849) = 1.813, </span><i data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">p</span></i><span data-dcnode-id="2690" instrument_node=""> = 0.003, η</span><i data-dcnode-id="2686"><sub data-dcnode-id="2687"><i data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">p</span></i></sub></i><sup data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">2</span></sup><span data-dcnode-id="2683" instrument_node=""> = 0.009. Simple main effects analysis showed that all groups in 2018 thought the world generally was more just than in 2010, and this effect was the strongest among Fidesz and Jobbik voters. </span><a data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="2682" instrument_node="">Table 1</span></a><span data-dcnode-id="2680" instrument_node=""> reports the standard error associated with the estimated marginal means, the relative </span><i data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">p</span></i><span data-dcnode-id="2677" instrument_node="">s, the confidence intervals, and Cohen’s </span><i data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">d</span></i><span data-dcnode-id="2674" instrument_node="">.</span></p><span data-dcnode-id="2672" instrument_node="">
</span><p class="mb15" data-dcnode-id="2632"><span data-dcnode-id="2671" instrument_node="">A two-way ANOVA with personal just world beliefs as dependent variable revealed a statistically non-significant interaction between the effects of measurement time and voting intentions on personal just world beliefs, </span><i data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">p</span></i><span data-dcnode-id="2668" instrument_node=""> = 0.102. The main effects of measurement time, </span><i data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">F</span></i><span data-dcnode-id="2665" instrument_node="">(1,1849) = 26.624, </span><i data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">p</span></i><span data-dcnode-id="2662" instrument_node=""> &lt; 0.001, η</span><i data-dcnode-id="2658"><sub data-dcnode-id="2659"><i data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">p</span></i></sub></i><sup data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">2</span></sup><span data-dcnode-id="2655" instrument_node=""> = 0.014, and voting intentions, </span><i data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">F</span></i><span data-dcnode-id="2652" instrument_node="">(4,1849) = 3.628, </span><i data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">p</span></i><span data-dcnode-id="2649" instrument_node=""> = 0.006, η</span><i data-dcnode-id="2645"><sub data-dcnode-id="2646"><i data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">p</span></i></sub></i><sup data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">2</span></sup><span data-dcnode-id="2642" instrument_node=""> = 0.008, were significant. Personal just world beliefs were lower in 2010 compared to 2018, and Fidesz voters had higher scores than the no response group and the undecided group. </span><a data-dcnode-id="2640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="2641" instrument_node="">Table 1</span></a><span data-dcnode-id="2639" instrument_node=""> reports the standard error associated with the estimated marginal means, the relative </span><i data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">p</span></i><span data-dcnode-id="2636" instrument_node="">s, the confidence intervals, and Cohen’s </span><i data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">d</span></i><span data-dcnode-id="2633" instrument_node="">.</span></p><span data-dcnode-id="2631" instrument_node="">
</span><p class="mb15" data-dcnode-id="2607"><span data-dcnode-id="2630" instrument_node="">A two-way ANOVA with anti-immigrant attitudes as dependent variable revealed a statistically significant interaction between the effects of measurement time and voting intentions on anti-immigrant attitudes, </span><i data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">F</span></i><span data-dcnode-id="2627" instrument_node="">(4,1849) = 15.623, </span><i data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">p</span></i><span data-dcnode-id="2624" instrument_node=""> &lt; 0.001, η</span><i data-dcnode-id="2620"><sub data-dcnode-id="2621"><i data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">p</span></i></sub></i><sup data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">2</span></sup><span data-dcnode-id="2617" instrument_node=""> = 0.018. Simple main effects analysis showed that all groups became more anti-immigrant, except Jobbik voters, who in 2010 were already very anti-immigrant, much more so than any other group. However, now Fidesz voters, showing a large increase in anti-immigrant attitudes, were as anti-immigrant as Jobbik voters. Other groups showed only small increases in anti-immigrant attitudes. </span><a data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="2616" instrument_node="">Table 1</span></a><span data-dcnode-id="2614" instrument_node=""> reports the standard error associated with the estimated marginal means, the relative </span><i data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">p</span></i><span data-dcnode-id="2611" instrument_node="">s, the confidence intervals, and Cohen’s </span><i data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">d</span></i><span data-dcnode-id="2608" instrument_node="">.</span></p><span data-dcnode-id="2606" instrument_node="">
</span><p class="mb0" data-dcnode-id="2569"><span data-dcnode-id="2605" instrument_node="">A three-way ANOVA with system-justification beliefs as dependent variable revealed a statistically significant three-way interaction between measurement time, voting intentions and socioeconomic status, </span><i data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">F</span></i><span data-dcnode-id="2602" instrument_node="">(4,1836) = 2.770, </span><i data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">p</span></i><span data-dcnode-id="2599" instrument_node=""> = 0.26, η</span><i data-dcnode-id="2595"><sub data-dcnode-id="2596"><i data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">p</span></i></sub></i><sup data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">2</span></sup><span data-dcnode-id="2592" instrument_node=""> = 0.006. Simple main effects analysis showed that both low SES and high SES Fidesz voters judge the system as more just in 2018 than in 2010. A similar pattern emerged for the No response (both low and high SES), the Undecided groups (both low and high SES), and the low SES Social democrat voters. High SES Jobbik voters also judged the system as more just in 2018 than in 2010. This was not the case for low SES Jobbik voters and high SES Social democrat voters. Largest differences were found among Fidesz voters. The main effect of SES was significant, </span><i data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">F</span></i><span data-dcnode-id="2589" instrument_node="">(1,1836) = 48.987, </span><i data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">p</span></i><span data-dcnode-id="2586" instrument_node=""> &lt; 0.001, η</span><i data-dcnode-id="2582"><sub data-dcnode-id="2583"><i data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">p</span></i></sub></i><sup data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">2</span></sup><span data-dcnode-id="2579" instrument_node=""> = 0.026. Higher SES was generally associated with higher system justification scores both in 2010 and 2018. However, low SES Fidesz voters had higher SJB scores in 2018 than high SES other voters in 2018. </span><a data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T2"><span data-dcnode-id="2578" instrument_node="">Table 2</span></a><span data-dcnode-id="2576" instrument_node=""> reports the standard error associated with the estimated marginal means, the relative </span><i data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">p</span></i><span data-dcnode-id="2573" instrument_node="">s, the confidence intervals, and Cohen’s </span><i data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">d</span></i><span data-dcnode-id="2570" instrument_node="">.</span></p><span data-dcnode-id="2568" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="2567"></div><span data-dcnode-id="2566" instrument_node="">

</span><a class="reset-hash-position" data-dcnode-id="2546" id="h5" name="h5"></a><h2 data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Discussion</span></h2><span data-dcnode-id="2543" instrument_node="">
</span><p class="mb15" data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">We investigated the extent to which the Hungarian public had changed in terms of characteristics associated with authoritarianism and system justification after 8 years of Fidesz’s rule. Mean scores on our measures of authoritarianism were generally stable over time. These results do not support H1a and H1b.</span></p><span data-dcnode-id="2540" instrument_node="">
</span><p class="mb15" data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">The results were different for system-justifying belief and belief in a just world. Fidesz supporters, in particular, believed the world to be more just in 2018 compared with 2010, but also others believed the world to be more just. Fidesz supporters also stood out in terms of starkly increased belief in the system. However, everyone else, except supporters of the social democrats and low SES Jobbik voters, also thought the system was more just in 2018 than in 2010. These results support both H2a and H2b.</span></p><span data-dcnode-id="2537" instrument_node="">
</span><p class="mb15" data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">Regarding anti-immigrant attitudes in 2018, Fidesz supporters were much more anti-immigrant than in 2010, with other groups showing much smaller increases in anti-immigrant sentiment, supporting H3a and H3b.</span></p><span data-dcnode-id="2534" instrument_node="">
</span><p class="mb0" data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">Our results do not generally support the strong version of system justification theory: system justification was positively associated with socioeconomic status both in 2010 and 2018. However, in 2018, low status Fidesz voters were more prone to justify the system than were voters of other parties, including even high status voters of other parties. This lends some support for the strong version of SJT (RQ1).</span></p><span data-dcnode-id="2531" instrument_node="">
</span><h3 data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">Stable Values and Changing Attitudes</span></h3><span data-dcnode-id="2528" instrument_node="">
</span><p class="mb15" data-dcnode-id="2511"><span data-dcnode-id="2527" instrument_node="">In terms of contemporary personality research, our measures of authoritarianism could be argued to resemble personal values. Personal values are general conceptions of what is desirable; they are more abstract than attitudes since they transcend specific actions and situations (e.g., </span><a data-dcnode-id="2525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B96"><span data-dcnode-id="2526" instrument_node="">Schwartz, 1992</span></a><span data-dcnode-id="2524" instrument_node="">). Our measures of authoritarianism could be argued to tap into valuing hierarchy over egalitarianism and submission over criticism, respectively. Although values are often thought to be malleable to culture and life events, they have, in fact, been shown to be remarkably stable in adulthood. For instance, vocational training or education in a certain discipline does little to influence such fundamental values (</span><a data-dcnode-id="2522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="2523" instrument_node="">Bardi et al., 2014</span></a><span data-dcnode-id="2521" instrument_node="">). Two longitudinal studies to have investigated value change in migration have suggested that values do change in response to such major life transitions (</span><a data-dcnode-id="2519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B74"><span data-dcnode-id="2520" instrument_node="">Lönnqvist et al., 2011</span></a><span data-dcnode-id="2518" instrument_node="">; </span><a data-dcnode-id="2516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="2517" instrument_node="">Bardi et al., 2014</span></a><span data-dcnode-id="2515" instrument_node="">). However, it seems that these changes may be temporary; one of the studies included a 2-year follow-up, at which stage values had reverted back to their initial pre-migration levels (</span><a data-dcnode-id="2513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="2514" instrument_node="">Lönnqvist et al., 2013</span></a><span data-dcnode-id="2512" instrument_node="">).</span></p><span data-dcnode-id="2510" instrument_node="">
</span><p class="mb15" data-dcnode-id="2496"><span data-dcnode-id="2509" instrument_node="">Regarding the more direct question of whether the political system in a country influences personal value priorities, the empirical evidence is mixed. For more than four decades, the populace of Eastern Europe was subject to communist regime. However, these regimes and their symbols remained alien to the populace and were not generally accepted (</span><a data-dcnode-id="2507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B94"><span data-dcnode-id="2508" instrument_node="">Rupnik, 1988</span></a><span data-dcnode-id="2506" instrument_node="">). For the period preceding communist rule, data on value priorities is scant. One study conducted in the early 1990s, after the fall of the communist regimes suggested that Eastern Europeans did not differ as a group from their Western counterparts in most values related to politics, religion, and primary relations (</span><a data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B102"><span data-dcnode-id="2505" instrument_node="">van den Broek and de Moor, 1994</span></a><span data-dcnode-id="2503" instrument_node="">). By contrast, another study based on data from the same time period suggests that the communist system did move personal values toward higher hierarchy and conservatism and lower autonomy (</span><a data-dcnode-id="2501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B97"><span data-dcnode-id="2502" instrument_node="">Schwartz et al., 2000</span></a><span data-dcnode-id="2500" instrument_node="">). Such cross-cultural comparisons are, however, hampered by lack of scalar invariance across countries (</span><a data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="2499" instrument_node="">Davidov, 2010</span></a><span data-dcnode-id="2497" instrument_node="">). This means that comparisons of mean importance across countries are likely to be highly misleading. Our results are generally consistent with the above literature; values, at least in the short run, do not seem to change in response to the political system.</span></p><span data-dcnode-id="2495" instrument_node="">
</span><p class="mb0" data-dcnode-id="2469"><span data-dcnode-id="2494" instrument_node="">Our results revealed increased anti-immigrant attitudes and system-justifying beliefs. This is consistent with a large body of research suggesting that the populace tends to adjust its attitudes to leadership cues (</span><a data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B109"><span data-dcnode-id="2493" instrument_node="">Zaller, 1992</span></a><span data-dcnode-id="2491" instrument_node="">; </span><a data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="2490" instrument_node="">Gabel and Scheve, 2007</span></a><span data-dcnode-id="2488" instrument_node="">). Also consistent with previous research is that both beliefs and attitudes changed the most among Fidesz supporters. Since the 1960s, an impressive amount of literature on “the role of enduring partisan commitments in shaping attitudes toward political objects” (</span><a data-dcnode-id="2486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="2487" instrument_node="">Campbell et al., 1960</span></a><span data-dcnode-id="2485" instrument_node="">, p. 135; for a review, see </span><a data-dcnode-id="2483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="2484" instrument_node="">Bartels, 2002</span></a><span data-dcnode-id="2482" instrument_node="">) has accumulated. Those who identify with a party tend to modify their issue stances to conform to their party (</span><a data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B24"><span data-dcnode-id="2481" instrument_node="">Carsey and Layman, 2006</span></a><span data-dcnode-id="2479" instrument_node="">; </span><a data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="2478" instrument_node="">Dancey and Goren, 2010</span></a><span data-dcnode-id="2476" instrument_node="">; see also </span><a data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B76"><span data-dcnode-id="2475" instrument_node="">Lönnqvist et al., 2019a</span></a><span data-dcnode-id="2473" instrument_node="">). Other groups of voters showed only small increases in anti-immigrant sentiment. Nevertheless, although attitudes have in the last decades generally become more liberal, our results suggest that there is nothing inevitable about this (cf., </span><a data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B100"><span data-dcnode-id="2472" instrument_node="">Strimling et al., 2019</span></a><span data-dcnode-id="2470" instrument_node="">). The process can be reversed, and political leadership may play a crucial role in such a reversal.</span></p><span data-dcnode-id="2468" instrument_node="">
</span><h3 data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">Worldviews Changed, but Why?</span></h3><span data-dcnode-id="2465" instrument_node="">
</span><p class="mb15" data-dcnode-id="2439"><span data-dcnode-id="2464" instrument_node="">There was, overall, a moderate increase in both global and personal belief in a just world, and a large increase in belief a just system. Belief in a just world and belief in a just system have been argued to be caused by factors such as insecurity (</span><a data-dcnode-id="2462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B60"><span data-dcnode-id="2463" instrument_node="">Jost et al., 2008</span></a><span data-dcnode-id="2461" instrument_node="">), threats to the system and consequent instability (</span><a data-dcnode-id="2459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="2460" instrument_node="">Jost and Hunyady, 2005</span></a><span data-dcnode-id="2458" instrument_node="">), perceptions of a dangerous world (</span><a data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="2457" instrument_node="">Jost and Hunyady, 2005</span></a><span data-dcnode-id="2455" instrument_node="">), and needs for order, structure, closure, and control (</span><a data-dcnode-id="2453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="2454" instrument_node="">Jost et al., 2003</span></a><span data-dcnode-id="2452" instrument_node="">, </span><a data-dcnode-id="2450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="2451" instrument_node="">2017</span></a><span data-dcnode-id="2449" instrument_node="">; </span><a data-dcnode-id="2447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="2448" instrument_node="">Jost and Hunyady, 2005</span></a><span data-dcnode-id="2446" instrument_node="">). It is conceivable that the fear mongering Fidesz’s leadership and of the state dominated media led people to experience heightened insecurity and threat, and that that heightened belief in the system and in a just world served a palliative function. Indeed, there is ample evidence that system justifying beliefs are associated with lower levels of anxiety, discomfort, and uncertainty (see </span><a data-dcnode-id="2444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B51"><span data-dcnode-id="2445" instrument_node="">Jost and Hunyady, 2003</span></a><span data-dcnode-id="2443" instrument_node="">). Recently, </span><a data-dcnode-id="2441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B103"><span data-dcnode-id="2442" instrument_node="">Vargas-Salfate et al. (2018)</span></a><span data-dcnode-id="2440" instrument_node=""> showed, in a longitudinal 18-country study, that endorsing system-justifying beliefs is positively related to general psychological well-being.</span></p><span data-dcnode-id="2438" instrument_node="">
</span><p class="mb15" data-dcnode-id="2415"><span data-dcnode-id="2437" instrument_node="">On the other hand, other explanations than those referring to the palliative function of system justifying beliefs are possible. There was real moral outrage at the societal </span><i data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">status quo</span></i><span data-dcnode-id="2434" instrument_node=""> in the run-up to the 2010 elections. After all, the then prime minister had been caught on tape admitting to having lied for years about the economy and Hungary’s economy had collapsed (</span><a data-dcnode-id="2432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B71"><span data-dcnode-id="2433" instrument_node="">Lendvai, 2012</span></a><span data-dcnode-id="2431" instrument_node="">). Moral outrage at the </span><i data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">status quo</span></i><span data-dcnode-id="2428" instrument_node=""> has been negatively associated with belief in just system (e.g., </span><a data-dcnode-id="2426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B106"><span data-dcnode-id="2427" instrument_node="">Wakslak et al., 2007</span></a><span data-dcnode-id="2425" instrument_node="">; </span><a data-dcnode-id="2423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="2424" instrument_node="">Becker and Wright, 2011</span></a><span data-dcnode-id="2422" instrument_node="">; </span><a data-dcnode-id="2420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="2421" instrument_node="">Jost et al., 2012</span></a><span data-dcnode-id="2419" instrument_node="">), and moral conviction can overpower system-justifying beliefs (</span><a data-dcnode-id="2417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="2418" instrument_node="">De Cristofaro et al., 2021</span></a><span data-dcnode-id="2416" instrument_node="">). It is feasible that moral outrage targeted at the previous government served to strengthen system justification after Fidesz was voted into power. People’s belief in a just world and a just system may have hit a low-point in 2010, and the mere return to a more-or-less stable and normal way of life, allowed by strongly increasing levels of income, may have been enough to raise belief in a just world and a just system. Future research could try to disentangle the possible effects of state fear mongering from the effects of increased wealth as underlying increased just world and just system beliefs.</span></p><span data-dcnode-id="2414" instrument_node="">
</span><p class="mb0" data-dcnode-id="2394"><span data-dcnode-id="2413" instrument_node="">Belief in a just world, and even more so system-justifying belief, showed strong party-bias. It was primarily Fidesz supporters whose belief in a just world and a just system grew stronger. This result is consistent with a large body of research showing that partisan bias shapes not only more value-laden judgments (</span><a data-dcnode-id="2411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="2412" instrument_node="">Bartels, 2002</span></a><span data-dcnode-id="2410" instrument_node="">; </span><a data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B24"><span data-dcnode-id="2409" instrument_node="">Carsey and Layman, 2006</span></a><span data-dcnode-id="2407" instrument_node="">; </span><a data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="2406" instrument_node="">Dancey and Goren, 2010</span></a><span data-dcnode-id="2404" instrument_node="">), but also more factual beliefs about the world; e.g., economic conditions (both current and future) are described as being better when the supported political party is in office (e.g., </span><a data-dcnode-id="2402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="2403" instrument_node="">Gerber and Huber, 2010</span></a><span data-dcnode-id="2401" instrument_node="">; </span><a data-dcnode-id="2399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B14"><span data-dcnode-id="2400" instrument_node="">Benhabib and Spiegel, 2019</span></a><span data-dcnode-id="2398" instrument_node="">) or has just won an election (</span><a data-dcnode-id="2396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="2397" instrument_node="">Gillitzer and Prasad, 2018</span></a><span data-dcnode-id="2395" instrument_node="">). Given that even such, in some sense “objective” and factual beliefs are biased by partisanship, our results according to which more abstract beliefs regarding the world and the system are similarly biased cannot be considered surprising.</span></p><span data-dcnode-id="2393" instrument_node="">
</span><h3 data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">Conflicting Evidence for the Strong Version of System Justification Theory</span></h3><span data-dcnode-id="2390" instrument_node="">
</span><p class="mb15" data-dcnode-id="2382"><span data-dcnode-id="2389" instrument_node="">Our results do not generally support the strong version of system justification theory: system justification was positively associated with socioeconomic status. However, some findings deserve particular attention in terms of the strong version of system justification theory. Voters for the ruling party Fidesz included individuals who reported low SES (i.e., serious financial difficulties), and these low SES Fidesz voters showed a higher mean level of system justification than did opposition voters with high SES. That individuals struggling with serious or mild financial difficulties in a period of intense economic progress still support the system would seem to support the notion that “some of the ideas we hold are quite simply not good for us, and in that sense, they do not serve our interests or the interests of our ingroups”’ (</span><a data-dcnode-id="2387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="2388" instrument_node="">Jost et al., 2019</span></a><span data-dcnode-id="2386" instrument_node="">, p. 384). In this sense, our results do support the notion that disadvantaged-group members legitimize the </span><i data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">status quo</span></i><span data-dcnode-id="2383" instrument_node=""> under certain conditions.</span></p><span data-dcnode-id="2381" instrument_node="">
</span><p class="mb0" data-dcnode-id="2361"><span data-dcnode-id="2380" instrument_node="">One explanation for even low SES Fidesz voters belief in the system could be the perception of immigrants as threatening. Our results show that anti-immigrant attitudes were positively correlated with system justification. </span><a data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="2379" instrument_node="">Kay and Zanna (2009)</span></a><span data-dcnode-id="2377" instrument_node=""> argued that increasing terror alert in the United States after 09/11 could be viewed as a natural manipulation of system threat, and something similar could have happened in Europe with the so called “refugee crisis” of 2015. Supporting the idea that it was this external threat that could have contributed to low SES Fidesz’ voters endorsement of the system, both low and high SES Fidesz voters were harsher in their attitudes toward migrants than were other voters. The threat that immigrants imposed could be perceived as a controllable threat (by contrast to for instance the 2008 financial crisis, after which system derogation was commonplace in Hungary; see </span><a data-dcnode-id="2375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2376" instrument_node="">Kelemen et al., 2014</span></a><span data-dcnode-id="2374" instrument_node="">; </span><a data-dcnode-id="2372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B101"><span data-dcnode-id="2373" instrument_node="">Szabó and Lönnqvist, 2021</span></a><span data-dcnode-id="2371" instrument_node="">), and this perception may have been further supported by the continuous decrease in the number of those illegally entering Hungary over recent years, a pattern that Fidesz claimed credit for </span><a data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="2370" instrument_node="">Bíró-Nagy (2021)</span></a><span data-dcnode-id="2368" instrument_node="">. Problematically, increased system justification among the disadvantaged can undermine system-changing collective action intentions (</span><a data-dcnode-id="2366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B85"><span data-dcnode-id="2367" instrument_node="">Osborne et al., 2019</span></a><span data-dcnode-id="2365" instrument_node="">; </span><a data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="2364" instrument_node="">De Cristofaro et al., 2021</span></a><span data-dcnode-id="2362" instrument_node="">).</span></p><span data-dcnode-id="2360" instrument_node="">
</span><h3 data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">Limitations and Conclusion</span></h3><span data-dcnode-id="2357" instrument_node="">
</span><p class="mb15" data-dcnode-id="2352"><span data-dcnode-id="2356" instrument_node="">An obvious limitation of the present research is that the design was cross-sectional. A longitudinal design would have allowed us to assess to what extent between-party changes in attitudes were due to people changing their beliefs and attitudes or people changing party. For instance, we cannot tell whether 2010 Fidesz supporters became more anti-immigrant during the following years, or whether more anti-immigrant people became Fidesz supporters. However, Hungary has, after the volatility in the years leading up to the 2010 election, been characterized by stability of party politics (</span><a data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="2355" instrument_node="">Enyedi, 2016</span></a><span data-dcnode-id="2353" instrument_node="">). We thus believe that the changes that we observed, particularly in Fidesz supporters, were due to those supporters changing, and not due to old supporters being replaced by new supporters.</span></p><span data-dcnode-id="2351" instrument_node="">
</span><p class="mb0" data-dcnode-id="2325"><span data-dcnode-id="2350" instrument_node="">We acknowledge that our paper is descriptive and has many limitations. An obvious limitation is the unreliable measure of authoritarianism. Additionally, we measured voting intention and not actual voting; these can sometimes differ, especially given the face-to-face nature of our data collection as compared to the secrecy of actual voting. We acknowledge that we cannot really be certain of what the most powerful underlying causal factors driving increasing anti-immigrant sentiment are. An alternative explanation for increased anti-immigrant sentiment could be the increasing spread of political misinformation and propaganda in online settings; partisan communities of like-minded individuals could be exciting themselves into adopting more and more extreme positions (</span><a data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B88"><span data-dcnode-id="2349" instrument_node="">Pariser, 2011</span></a><span data-dcnode-id="2347" instrument_node="">). However, recent results challenge this narrative; at least in Western contexts, exposure to political disagreement on social media is high (</span><a data-dcnode-id="2345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="2346" instrument_node="">Bakshy et al., 2015</span></a><span data-dcnode-id="2344" instrument_node="">; </span><a data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B91"><span data-dcnode-id="2343" instrument_node="">Pew Research Center, 2016</span></a><span data-dcnode-id="2341" instrument_node="">) and social media does not polarize people’s views (</span><a data-dcnode-id="2339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B18"><span data-dcnode-id="2340" instrument_node="">Boxell et al., 2017</span></a><span data-dcnode-id="2338" instrument_node="">). Furthermore, if social media echo chambers and political disinformation had, by themselves, increased anti-immigrant sentiment in Hungary, then something similar could have been expected to happen in Western Europe. However, European Social Survey data suggest that overall public attitudes toward refugees (</span><a data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="2337" instrument_node="">Hatton, 2016</span></a><span data-dcnode-id="2335" instrument_node="">) and immigrants (</span><a data-dcnode-id="2333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="2334" instrument_node="">Heath and Richards, 2016</span></a><span data-dcnode-id="2332" instrument_node="">) have remained relatively stable in wake of the so-called refugee crisis in 2015. The effects of online propaganda on attitudes, are, naturally, difficult to completely disentangle from the effects of political leadership. This is especially true if the political leadership is responsible for much of the propaganda. Nevertheless, we believe that it is, as in the West (</span><a data-dcnode-id="2330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="2331" instrument_node="">Arceneaux and Johnson, 2015</span></a><span data-dcnode-id="2329" instrument_node="">), the behavior of the political elite that changes people’s attitudes, not media communication </span><i data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">per se</span></i><span data-dcnode-id="2326" instrument_node="">.</span></p><span data-dcnode-id="2324" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2323" id="h6" name="h6"></a><h2 data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">Data Availability Statement</span></h2><span data-dcnode-id="2320" instrument_node="">
