</span><meta content="The Authoritarian Personality, published in 1950 introduces the authoritarian personality, which is characterized by unquestioning obedience and respect for authority. System justification theory (SJT) argues that people are motivated to defend, bolster, and justify aspects of existing social, economic, and political systems. Commitment to the status quo is also a key characteristic of the authoritarian personality. Adorno et al. (1950) argued that the social context matters for how an underlying latent authoritarian character is expressed. This means that authoritarian regimes could be expected to lead to increased authoritarianism and stronger system-justification. We investigated this hypothesis in two representative samples of Hungarians, collected before (2010) and after (2018) eight years of Fidesz’ rule (N = 1000 in both samples). Moreover, the strong version of SJT argues that members of disadvantaged groups are likely to experience the most cognitive dissonance and that the need to reduce this dissonance makes them the most supportive of the status quo. This argument dovetails nicely with claims made by the political opposition to Fidesz, according to which Fidesz is especially popular among low-status members of society. We found that measures assessing authoritarian tendencies did not change between 2010 and 2018. However, more specific beliefs and attitudes did change, and these effects were especially pronounced among Fidesz supporters. Their belief in a just world and a just system has grown stronger, while their attitudes towards migrants had hardened. Low status was associated with lower levels of system-justifying ideologies. However, low status Fidesz voters justified the system more than high status opposition voters in 2018, lending some support for the strong version of SJT. Our results suggest that beliefs and attitudes of Hungarians have changed between 2010 and 2018, and that political leadership played a crucial role in this." data-dcnode-id="4270" name="citation_abstract"><span data-dcnode-id="4269" instrument_node="">

</span><div class="atButton" data-dcnode-id="3474"><span data-dcnode-id="3483" instrument_node="">
</span><a addthis:description="The authoritarian personality is characterized by unquestionining obedience and respect to authority. System justification theory (SJT) argues that people are motivated to defend, bolster, and justify aspects of existing social, economic, and political systems. Commitment to the status quo is also a key characteristic of the authoritarian personality. It can be argued that the social context matters for how an underlying latent authoritarian character is expressed. This means that authoritarian regimes could be expected to lead to increased authoritarianism and stronger system-justification. We investigated this hypothesis in two representative samples of Hungarians, collected before (2010) and after (2018) 8 years of Fidesz’ rule (N = 1,000 in both samples). Moreover, the strong version of SJT argues that members of disadvantaged groups are likely to experience the most cognitive dissonance and that the need to reduce this dissonance makes them the most supportive of the status quo. This argument dovetails nicely with claims made by the political opposition to Fidesz, according to which Fidesz is especially popular among low-status members of society. We found that measures assessing authoritarian tendencies did not change between 2010 and 2018. However, more specific beliefs and attitudes did change, and these effects were especially pronounced among Fidesz supporters. Their belief in a just world and a just system has grown stronger, while their attitudes toward migrant..." addthis:title="“The New State That We Are Building”: Authoritarianism and System-Justification in an Illiberal Democracy" addthis:url="https://www.frontiersin.org/article/10.3389/fpsyg.2021.703280" class="addthis_button_facebook at300b" data-dcnode-id="3476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html" title="Facebook"><span class="at-icon-wrapper" data-dcnode-id="3477" style="                              | </span><a data-dcnode-id="3372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3389/fpsyg.2021.703280"><span data-dcnode-id="3373" instrument_node="">https://doi.org/10.3389/fpsyg.2021.703280</span></a><span data-dcnode-id="3371" instrument_node="">

</span><a class="reset-hash-position" data-dcnode-id="3365" id="h1" name="h1"></a><h1 data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">“The New State That We Are Building”: Authoritarianism and System-Justification in an Illiberal Democracy</span></h1><span data-dcnode-id="3362" instrument_node="">
</span><div class="authors" data-dcnode-id="3343"><span data-dcnode-id="3361" instrument_node="">
</span><a class="user-id-533248" data-dcnode-id="3358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/533248"><img alt="" class="pr5" data-dcnode-id="3360" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg&amp;raw"><span data-dcnode-id="3359" instrument_node="">Jan-Erik Lönnqvist</span></a><sup data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">1*</span></sup><span data-dcnode-id="3355" instrument_node="">, </span><a class="user-id-1230041" data-dcnode-id="3352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/1230041"><img alt="" class="pr5" data-dcnode-id="3354" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg&amp;raw"><span data-dcnode-id="3353" instrument_node="">Zsolt Péter Szabó</span></a><sup data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">2</span></sup><span data-dcnode-id="3349" instrument_node=""> and </span><a class="user-id-1409149" data-dcnode-id="3346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/1409149"><img alt="" class="pr5" data-dcnode-id="3348" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg&amp;raw"><span data-dcnode-id="3347" instrument_node="">László Kelemen</span></a><sup data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">3</span></sup></div><span data-dcnode-id="3342" instrument_node="">
</span><ul class="notes" data-dcnode-id="3322"><span data-dcnode-id="3341" instrument_node="">
</span><li data-dcnode-id="3336"><span data-dcnode-id="3338"><sup data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">1</span></sup></span><span data-dcnode-id="3337" instrument_node="">Swedish School of Social Science, University of Helsinki, Helsinki, Finland</span></li><span data-dcnode-id="3335" instrument_node="">
</span><li data-dcnode-id="3330"><span data-dcnode-id="3332"><sup data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">2</span></sup></span><span data-dcnode-id="3331" instrument_node="">Department of Ergonomics and Psychology, Budapest University of Technology and Economics, Budapest, Hungary</span></li><span data-dcnode-id="3329" instrument_node="">
</span><li data-dcnode-id="3324"><span data-dcnode-id="3326"><sup data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">3</span></sup></span><span data-dcnode-id="3325" instrument_node="">Department of Social and Organizational Psychology, University of Pécs, Pécs, Hungary</span></li><span data-dcnode-id="3323" instrument_node="">
</span></ul><span data-dcnode-id="3321" instrument_node="">
</span><p class="mb0" data-dcnode-id="3310"><span data-dcnode-id="3320" instrument_node="">The authoritarian personality is characterized by unquestionining obedience and respect to authority. System justification theory (SJT) argues that people are motivated to defend, bolster, and justify aspects of existing social, economic, and political systems. Commitment to the </span><i data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">status quo</span></i><span data-dcnode-id="3317" instrument_node=""> is also a key characteristic of the authoritarian personality. It can be argued that the social context matters for how an underlying latent authoritarian character is expressed. This means that authoritarian regimes could be expected to lead to increased authoritarianism and stronger system-justification. We investigated this hypothesis in two representative samples of Hungarians, collected before (2010) and after (2018) 8 years of Fidesz’ rule (</span><i data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">N</span></i><span data-dcnode-id="3314" instrument_node=""> = 1,000 in both samples). Moreover, the strong version of SJT argues that members of disadvantaged groups are likely to experience the most cognitive dissonance and that the need to reduce this dissonance makes them the most supportive of the </span><i data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">status quo</span></i><span data-dcnode-id="3311" instrument_node="">. This argument dovetails nicely with claims made by the political opposition to Fidesz, according to which Fidesz is especially popular among low-status members of society. We found that measures assessing authoritarian tendencies did not change between 2010 and 2018. However, more specific beliefs and attitudes did change, and these effects were especially pronounced among Fidesz supporters. Their belief in a just world and a just system has grown stronger, while their attitudes toward migrants had hardened. Low status was associated with lower levels of system-justifying ideologies. However, low status Fidesz voters justified the system more than high status opposition voters in 2018, lending some support for the strong version of SJT. Our results suggest that beliefs and attitudes of Hungarians have changed between 2010 and 2018, and that political leadership played a crucial role in this.</span></p><span data-dcnode-id="3309" instrument_node="">
</span><div class="clear" data-dcnode-id="3308"></div><span data-dcnode-id="3307" instrument_node="">
</span></div><span data-dcnode-id="3305" instrument_node="">
</span><div class="JournalFullText" data-dcnode-id="425"><span data-dcnode-id="3304" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="3303" id="h2" name="h2"></a><h2 data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">Introduction</span></h2><span data-dcnode-id="3300" instrument_node="">
</span><p class="mb15" data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">“… The defining aspect of today’s world can be articulated as a race to figure out a way of organizing communities, a state that is most capable of making a nation competitive. This is why, honorable ladies and gentlemen, a trending topic in thinking is understanding systems that are not Western, not liberal, not liberal democracies, maybe not even democracies, and yet making nations successful” (Viktor Orbán, Hungary’s Prime Minister, speech at the XXV. Bálványos Free Summer University and Youth Camp, 26th July, 2014).</span></p><span data-dcnode-id="3297" instrument_node="">
</span><p class="mb15" data-dcnode-id="3292"><span data-dcnode-id="3296" instrument_node="">One of the most influential social science books of the 20th century was the Authoritarian Personality by </span><a data-dcnode-id="3294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="3295" instrument_node="">Adorno et al. (1950)</span></a><span data-dcnode-id="3293" instrument_node="">. They attempted to explain fascism, the Second World War and the Holocaust with psychological factors as active forces in the social process. Their conceptualization of the authoritarian personality built on Fromm’s definition of the authoritarian character as a type of personality that loves authority – a personality type that simultaneously wishes to be in authority and to be subject to the will of the authority. They argued that this type of personality, which itself was partly a result of hierarchical and authoritarian parent-child relationships, made a person easily susceptible to anti-democratic propaganda and a potential fascist.</span></p><span data-dcnode-id="3291" instrument_node="">
</span><p class="mb15" data-dcnode-id="3268"><span data-dcnode-id="3290" instrument_node="">The current global rise of autocratization and retreat of democracy (</span><a data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B78"><span data-dcnode-id="3289" instrument_node="">Lührmann and Lindberg, 2019</span></a><span data-dcnode-id="3287" instrument_node="">) has spurred research interest and led to new approaches and new measures of the authoritarian personality. The authors of the </span><i data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">Authoritarian Personality</span></i><span data-dcnode-id="3284" instrument_node=""> argued that the social context matters for how an underlying latent authoritarian character is expressed in authoritarian attitudes and authoritarian behavior. More recent theoretical work has suggested an explanatory role for social learning (</span><a data-dcnode-id="3282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B3"><span data-dcnode-id="3283" instrument_node="">Altemeyer, 1981</span></a><span data-dcnode-id="3281" instrument_node="">, </span><a data-dcnode-id="3279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="3280" instrument_node="">1988</span></a><span data-dcnode-id="3278" instrument_node="">, </span><a data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="3277" instrument_node="">1996</span></a><span data-dcnode-id="3275" instrument_node="">). However, very little is known about the role of institutions in the psychology of the individual. More specifically, very few empirical studies have investigated changes in authoritarianism in response to antidemocratic shifts in the political system. In the present study, we address this gap in the literature by investigating authoritarian characteristics, including right-wing authoritarianism (RWA; </span><a data-dcnode-id="3273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="3274" instrument_node="">Duckitt and Sibley, 2007</span></a><span data-dcnode-id="3272" instrument_node="">) and system-justifying beliefs (</span><a data-dcnode-id="3270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B62"><span data-dcnode-id="3271" instrument_node="">Kay and Jost, 2003</span></a><span data-dcnode-id="3269" instrument_node="">), in two representative samples of Hungarians, collected before and after 8 years of an “illiberal democracy.”</span></p><span data-dcnode-id="3267" instrument_node="">
</span><p class="mb15" data-dcnode-id="3259"><span data-dcnode-id="3266" instrument_node="">An important rationale underlying the generation of the new illiberal state was the establishment of a national economic elite and protection of the middle class. However, the opposition to Fidesz has argued that Fidesz is especially popular among those low in social status (</span><a data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="3265" instrument_node="">Csekõ, 2020</span></a><span data-dcnode-id="3263" instrument_node="">). This makes it a particular interesting context in which to investigate whether those low in social status will engage in system justification, apparently against their own interests, but as suggested by the strong version of system justification theory, according, to which “people who are the most disadvantaged by a given social system should paradoxically be the most likely to provide ideological support for it, insofar as they have the greatest need to justify their suffering” (</span><a data-dcnode-id="3261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B55"><span data-dcnode-id="3262" instrument_node="">Jost et al., 2004</span></a><span data-dcnode-id="3260" instrument_node="">, p. 267).</span></p><span data-dcnode-id="3258" instrument_node="">
</span><p class="mb0" data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">In the following introduction, we first sketch the major developments in the Hungarian political system over the past decade, then we introduce the two theoretical frameworks upon which we rely, namely, the authoritarian personality and system justification theory. Finally, we present our research questions.</span></p><span data-dcnode-id="3255" instrument_node="">
</span><h3 data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">The Rise of the Illiberal Democracy: The Hungarian Context</span></h3><span data-dcnode-id="3252" instrument_node="">
</span><p class="mb15" data-dcnode-id="3244"><span data-dcnode-id="3251" instrument_node="">Following the collapse of the Soviet Union in 1989, Hungary was a leader in the region’s liberal transition and among the first post-communist nations to join the European Union in 2004 (</span><a data-dcnode-id="3249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B71"><span data-dcnode-id="3250" instrument_node="">Lendvai, 2012</span></a><span data-dcnode-id="3248" instrument_node="">). However, the transition to a marker-based economy was a far more protracted and difficult process than many observers initially expected. Hungary suffered badly in the 2008 financial crisis and was on the verge of defaulting until the International Monetary Fund, demanding stringent austerity measures, provided a bailout package. In 2006, a social democrat party speech was leaked, in which the then prime minister, Ferenc Gyurcány, admitted having lied repeatedly about the condition of Hungary’s public finances, and said that the economy could no longer sustain his party (MSZP)’s promises. This led to several weeks of mass demonstrations, calls for resignation, and violent clashes with the police (</span><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B71"><span data-dcnode-id="3247" instrument_node="">Lendvai, 2012</span></a><span data-dcnode-id="3245" instrument_node="">).</span></p><span data-dcnode-id="3243" instrument_node="">
</span><p class="mb15" data-dcnode-id="3238"><span data-dcnode-id="3242" instrument_node="">The public spending crisis and a growing constituency of socioeconomically harassed voters allowed Fidesz, the largest opposition party, to run a notably blank electoral campaign in 2010 in terms of economic issues. Instead, they ran on a culturally conservative and nationalist platform. In their election program, the charismatic party leader Viktor Orbán pledged to increase police presence, raise prison sentences, assist families to have more children, protect marriage as the union between a man and a woman, protect life from the moment of conception, and honor the elderly (</span><a data-dcnode-id="3240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="3241" instrument_node="">Batory, 2010</span></a><span data-dcnode-id="3239" instrument_node="">).</span></p><span data-dcnode-id="3237" instrument_node="">
</span><p class="mb15" data-dcnode-id="3232"><span data-dcnode-id="3236" instrument_node="">In the 2010 elections, Fidesz won 53% of the popular vote. Due to the strong majoritarian element of the electoral system, this was enough to give it a 68% majority in parliament. The two-thirds majority of parliament allowed Fidesz to make major institutional changes. They employed this legislative dominance by changing the constitution and by replacing key officials in every politically relevant institution. Fidesz’s illiberalism was reflected in both the nature of the institutional reforms and the practices through which the party governed (</span><a data-dcnode-id="3234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B92"><span data-dcnode-id="3235" instrument_node="">Pogány, 2013</span></a><span data-dcnode-id="3233" instrument_node="">). Public broadcasting and the national news agency were subsumed under the authority of a new government-dominated body. Fidesz also used its dominant legislative position to pave the way for gerrymandering and for making the electoral system even more majoritarian. Consequently, Fidesz secured a two-thirds parliamentary majority in both the 2014 and the 2018 national elections.</span></p><span data-dcnode-id="3231" instrument_node="">
</span><p class="mb15" data-dcnode-id="3214"><span data-dcnode-id="3230" instrument_node="">In terms of economic policy, Fidesz has advocated a “bourgeoisification” of the country with the aim of creating a middle- and upper-class who would regard Fidesz as their natural political party (</span><a data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B107"><span data-dcnode-id="3229" instrument_node="">Wilkin, 2018</span></a><span data-dcnode-id="3227" instrument_node="">). A raft of policies sometimes referred to as “Orbanomics” included redistributive strategies to shield middle-class Hungarian voters from the pressures of unrestrained capitalism. It also contained numerous illiberal elements, such as increasing state ownership of enterprises in the banking, advertising, and transportation industries. This was not “state capture” carried out by a small group of oligarchs in order to establish regulations and pass measures in their own interests. Rather, the process ran in the other direction: Orbán decided who should become an oligarch and how powerful he should be (</span><a data-dcnode-id="3225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B68"><span data-dcnode-id="3226" instrument_node="">Kornai, 2015</span></a><span data-dcnode-id="3224" instrument_node="">). András Lánczi, president of the Fidesz-leaning think-tank Századvég, famously said that “What (the critics of Orbán regime) call corruption in practical terms is the most important policy goal of Fidesz. What do I mean? The government puts forth such goals as the creation of a domestic entrepreneurial class, or the building of the pillars of a strong Hungary in agriculture and industry” (</span><a data-dcnode-id="3222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="3223" instrument_node="">Antal, 2019</span></a><span data-dcnode-id="3221" instrument_node="">). As a result of these economic measures (including the introduction of a flat tax and curbs to social benefits) and external factors (e.g., funding from the European Union, global economic revival; </span><a data-dcnode-id="3219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B67"><span data-dcnode-id="3220" instrument_node="">Kingsley and Novak, 2018</span></a><span data-dcnode-id="3218" instrument_node="">), Hungary has, since 2012, enjoyed one of the highest rates of economic growth in the EU, accompanied by the highest increase in the risk of in-work poverty (</span><a data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="3217" instrument_node="">Albert, 2019</span></a><span data-dcnode-id="3215" instrument_node="">).</span></p><span data-dcnode-id="3213" instrument_node="">
</span><p class="mb15" data-dcnode-id="3202"><span data-dcnode-id="3212" instrument_node="">Despite the economic crisis in the run-up to the 2010 elections, the deeper causes of Fidesz success may have been more due to social than economic issues (</span><a data-dcnode-id="3210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B81"><span data-dcnode-id="3211" instrument_node="">Mudde, 2014</span></a><span data-dcnode-id="3209" instrument_node="">). The ethnically exclusive and intolerant form of Hungarian national identity on which Fidesz has campaigned since 2010 (</span><a data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B79"><span data-dcnode-id="3208" instrument_node="">Marsovszky, 2010</span></a><span data-dcnode-id="3206" instrument_node="">) has manifested itself in Orbán’s pronouncements on Hungary as part of a Central European migrant-free zone, which has successfully thwarted both cultural globalization and an influx of foreigners (</span><a data-dcnode-id="3204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B107"><span data-dcnode-id="3205" instrument_node="">Wilkin, 2018</span></a><span data-dcnode-id="3203" instrument_node="">). The fight against “illegal immigration” has become a key element of Fidesz’s program since 2015. In a 2017 speech, Orbán said that “The truth is that now (…) everything that we think about Hungary and the order of life in Hungary is once again under threat. The truth is that after we regained our freedom in 1990, we have once again arrived at a crossroads in our history. (…) And now here we are, astonished to see that the forces of globalism are trying to force our doors open (…) We alone resist them now. We have reached the point at which Central Europe is the last migrant-free region in Europe.” His message could not be clearer: the traditional Hungarian way of life is in danger and must be defended.</span></p><span data-dcnode-id="3201" instrument_node="">
</span><p class="mb15" data-dcnode-id="3184"><span data-dcnode-id="3200" instrument_node="">The political changes of the last decade have resulted in a political system in which the degree of power concentration is exceptional. According to rating agencies, such as Freedom House, the Bertelsmann Foundation, the World Bank, and the Economist Intelligence Unit, Orbán has successfully hollowed out Hungary’s democracy. Since Fidesz won the elections in 2010, Hungary has become the clearest example of a relatively stable democracy turning into an authoritarian regime (</span><a data-dcnode-id="3198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B73"><span data-dcnode-id="3199" instrument_node="">Levitsky and Way, 2020</span></a><span data-dcnode-id="3197" instrument_node="">; for similar observations, see </span><a data-dcnode-id="3195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="3196" instrument_node="">Bogaards, 2018</span></a><span data-dcnode-id="3194" instrument_node="">; </span><a data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B65"><span data-dcnode-id="3193" instrument_node="">Kelemen, 2019</span></a><span data-dcnode-id="3191" instrument_node="">), and to have decayed from democracy into competitive authoritarianism, defined as “a type of regime in which the coexistence of meaningful democratic institutions and serious incumbent abuse yields electoral competition that is real but unfair” (</span><a data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B73"><span data-dcnode-id="3190" instrument_node="">Levitsky and Way, 2020</span></a><span data-dcnode-id="3188" instrument_node="">, p. 51). Orbán openly stated his preference for an illiberal state in a July 2014 speech, in which he encouraged his Hungarian audience to understand systems that are “not Western, not liberal, not liberal democracies, maybe not even democracies, and yet making nations successful” (</span><a data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B95"><span data-dcnode-id="3187" instrument_node="">Rupnik, 2016</span></a><span data-dcnode-id="3185" instrument_node="">).</span></p><span data-dcnode-id="3183" instrument_node="">
</span><p class="mb0" data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">In summary, since 2010, the Hungarian political and economic context has been characterized by: (1) strong economic growth; (2) economic measures that favor the middle- and the upper-class at the cost of the lower or working classes; (3) an authoritarian turn; i.e., a move from democracy into competitive authoritarianism; and (4) system threat induced by “illegal immigration.”</span></p><span data-dcnode-id="3180" instrument_node="">
</span><h3 data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">The Authoritarian Personality</span></h3><span data-dcnode-id="3177" instrument_node="">
</span><p class="mb15" data-dcnode-id="3169"><span data-dcnode-id="3176" instrument_node="">Some of the many attempts to explain the rise of fascism drew on the psychology of the individual. Most notable was </span><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="3175" instrument_node="">Adorno et al.’s (1950)</span></a><span data-dcnode-id="3173" instrument_node=""> </span><i data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">The Authoritarian Personality</span></i><span data-dcnode-id="3170" instrument_node="">. Seeking to discover the psychological roots of social intolerance, the authors argued that the fascistic individual was psychologically susceptible to the ideology of anti-Semitism and to the emotional appeal of anti-democratic politics. They identified a personality syndrome that supported conventional values and authoritarian submission, as well as authoritarian aggression toward “inferior” minority groups, who were thought of judgmentally, harshly, and rigidly.</span></p><span data-dcnode-id="3168" instrument_node="">
</span><p class="mb15" data-dcnode-id="3142"><span data-dcnode-id="3167" instrument_node="">Although the psychoanalytic basis on which </span><a data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="3166" instrument_node="">Adorno et al. (1950)</span></a><span data-dcnode-id="3164" instrument_node=""> constructed their theory has been highly criticized and tends to be ignored, the general tenet that right-wing political orientation can be correlated with certain underlying psychological dispositions has held up well and continues to attract attention. Subsequent research has confirmed that the social psychological and behavioral processes thought to constitute the authoritarian personality syndrome, conventionalism, conformity, cynicism, moral absolutism, intolerance and prejudice, tend to bundle together (e.g., </span><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="3163" instrument_node="">Jost et al., 2003</span></a><span data-dcnode-id="3161" instrument_node="">). One of the most prominent contemporary theories of authoritarianism was developed by </span><a data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B3"><span data-dcnode-id="3160" instrument_node="">Altemeyer (1981</span></a><span data-dcnode-id="3158" instrument_node="">; (</span><a data-dcnode-id="3156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="3157" instrument_node="">1988</span></a><span data-dcnode-id="3155" instrument_node="">; (</span><a data-dcnode-id="3153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="3154" instrument_node="">1996</span></a><span data-dcnode-id="3152" instrument_node="">), who coined the term right-wing authoritarianism, to refer to aggression, submission, and conventionalism. The conceptual and methodological narrowing down of the original aspects of authoritarianism allowed Altemeyer to develop the RWA scale, which measured a strong unitary social attitude dimension, making it psychometrically superior to the original F-scale developed by </span><a data-dcnode-id="3150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="3151" instrument_node="">Adorno et al. (1950)</span></a><span data-dcnode-id="3149" instrument_node="">. However, as </span><a data-dcnode-id="3147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="3148" instrument_node="">Feldman (2003)</span></a><span data-dcnode-id="3146" instrument_node=""> argued the concept still lacked secure theoretical grounding and he went on to suggest a new conceptualization in which authoritarian predispositions originated in the conflict between the values of social conformity and personal autonomy. An overarching theme across conceptualizations is that authoritarianism underlies prejudice (e.g., </span><a data-dcnode-id="3144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="3145" instrument_node="">Duckitt and Sibley, 2007</span></a><span data-dcnode-id="3143" instrument_node="">).</span></p><span data-dcnode-id="3141" instrument_node="">
</span><p class="mb0" data-dcnode-id="3121"><span data-dcnode-id="3140" instrument_node="">Although authoritarianism is a complex attribute, most definitions of the concept seem to agree that it comprises simultaneous dominance of inferiors and submissiveness to superiors. It is remarkable how well such a core definition dovetails with the political program of Fidesz. On one hand, Fidesz stirs up hatred toward disadvantaged minorities, such as refugees (</span><a data-dcnode-id="3138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B69"><span data-dcnode-id="3139" instrument_node="">Krekó and Enyedi, 2018</span></a><span data-dcnode-id="3137" instrument_node="">), Muslims (</span><a data-dcnode-id="3135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B66"><span data-dcnode-id="3136" instrument_node="">Kende et al., 2019</span></a><span data-dcnode-id="3134" instrument_node="">), and sexual minorities (</span><a data-dcnode-id="3132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B13"><span data-dcnode-id="3133" instrument_node="">Bene and Boda, 2021</span></a><span data-dcnode-id="3131" instrument_node="">). On the other hand, Fidesz propagates submission to those in power, emphasizing, e.g., traditional gender roles, which place women in inferior positions to men (</span><a data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B104"><span data-dcnode-id="3130" instrument_node="">Vida, 2019</span></a><span data-dcnode-id="3128" instrument_node="">). Most importantly, they require total political submission to the “homeland” and its “people,” crushing subnational capacity for institutional resilience, destroying the independent judiciary, and taking full control of the media landscape (</span><a data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B50"><span data-dcnode-id="3127" instrument_node="">Jakli and Stenberg, 2021</span></a><span data-dcnode-id="3125" instrument_node="">; </span><a data-dcnode-id="3123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B98"><span data-dcnode-id="3124" instrument_node="">Seongcheol, 2021</span></a><span data-dcnode-id="3122" instrument_node="">).</span></p><span data-dcnode-id="3120" instrument_node="">
</span><h3 data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">The Role of Institutions in Authoritarianism</span></h3><span data-dcnode-id="3117" instrument_node="">
</span><p class="mb15" data-dcnode-id="3091"><span data-dcnode-id="3116" instrument_node="">The rise of the European populist radical right and the 2016 United States election of Donald Trump has resulted in a resurgence of research into authoritarianism (</span><a data-dcnode-id="3114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B84"><span data-dcnode-id="3115" instrument_node="">Nilsson and Jost, 2020</span></a><span data-dcnode-id="3113" instrument_node="">). Much of this research has, however, been confined to predicting political orientation and voting behavior from authoritarian personality characteristics, with far less attention given to the causes of authoritarianism (e.g., </span><a data-dcnode-id="3111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="3112" instrument_node="">Dunn, 2015</span></a><span data-dcnode-id="3110" instrument_node="">). One approach to “explaining” authoritarianism has been to show that individual differences in authoritarianism are genetically or biologically based (e.g., </span><a data-dcnode-id="3108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B80"><span data-dcnode-id="3109" instrument_node="">McCourt et al., 1999</span></a><span data-dcnode-id="3107" instrument_node="">). Few would probably dispute this altogether, as the development of most characteristics is likely to involve genes and the interaction between genes and environment. Yet, asserting that authoritarianism is simply inborn does little to explain large cross-national and across time differences in authoritarianism. Another prominent approach has been to explain authoritarianism as the product of social learning, or more specifically, the result of one’s individual experiences with authority (e.g., </span><a data-dcnode-id="3105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B3"><span data-dcnode-id="3106" instrument_node="">Altemeyer, 1981</span></a><span data-dcnode-id="3104" instrument_node="">, </span><a data-dcnode-id="3102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="3103" instrument_node="">1988</span></a><span data-dcnode-id="3101" instrument_node="">, </span><a data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="3100" instrument_node="">1996</span></a><span data-dcnode-id="3098" instrument_node="">). These perspectives are of course not mutually exclusive. As already argued by </span><a data-dcnode-id="3096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="3097" instrument_node="">Frenkel-Brunswik et al. (1947)</span></a><span data-dcnode-id="3095" instrument_node="">, authoritarian characteristics portray a latent capacity or “degree of readiness to behave antidemocratically should social conditions change in such a way as to remove or reduce the restraint upon this kind of behavior” (</span><a data-dcnode-id="3093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="3094" instrument_node="">Frenkel-Brunswik et al., 1947</span></a><span data-dcnode-id="3092" instrument_node="">, p. 40).</span></p><span data-dcnode-id="3090" instrument_node="">
</span><p class="mb15" data-dcnode-id="3073"><span data-dcnode-id="3089" instrument_node="">Consistent with the notion that changing social conditions may unleash antidemocratic behaviors, some recent electoral outcomes have been claimed to have loosened moral and ethical restraints and normalized violent lawlessness. It has been argued that the election of Trump returned “the scourge of authoritarianism (…) not only in the toxic language of hate, humiliation and bigotry, but also in the emergence of a culture of war and violence that looms over society like a plague” (</span><a data-dcnode-id="3087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="3088" instrument_node="">Giroux, 2017</span></a><span data-dcnode-id="3086" instrument_node="">, p. 887). There is, indeed, some empirical evidence suggesting that Trump’s popularity on the campaign trail and subsequent election win increased people’s willingness to publicly express xenophobic views (</span><a data-dcnode-id="3084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="3085" instrument_node="">Bursztyn et al., 2017</span></a><span data-dcnode-id="3083" instrument_node="">), and the acceptability of prejudice toward groups Trump targeted (e.g., </span><a data-dcnode-id="3081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B28"><span data-dcnode-id="3082" instrument_node="">Crandall et al., 2018</span></a><span data-dcnode-id="3080" instrument_node="">; </span><a data-dcnode-id="3078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="3079" instrument_node="">Hobbs and Lajevardi, 2019</span></a><span data-dcnode-id="3077" instrument_node="">). Anti-Muslim crimes have doubled since Trump’s presidential campaign, with some analysis suggesting that Trump’s tweets about Islam-related topics (</span><a data-dcnode-id="3075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B83"><span data-dcnode-id="3076" instrument_node="">Müller and Schwarz, 2020</span></a><span data-dcnode-id="3074" instrument_node="">) were directly responsible for certain crimes. One of the main aims of our study was to investigate whether, in a similar vein, Hungary’s authoritarian descent has been accompanied by an authoritarian slide in the populace.</span></p><span data-dcnode-id="3072" instrument_node="">
</span><p class="mb15" data-dcnode-id="3052"><span data-dcnode-id="3071" instrument_node="">Besides studies investigating how the outcomes of specific elections may unleash authoritarian behaviors, there have been some cross-cultural studies that have sought to determine the influences that different types of regimes may have on the individual’s psychology. Some of these studies have suggested that commitment to democratic principles and rejection of authoritarian alternatives is higher in democratic than in authoritarian political regimes (</span><a data-dcnode-id="3069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="3070" instrument_node="">Chu et al., 2008</span></a><span data-dcnode-id="3068" instrument_node="">; </span><a data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B82"><span data-dcnode-id="3067" instrument_node="">Mujani and Liddle, 2013</span></a><span data-dcnode-id="3065" instrument_node="">), although such studies (and others) also expose substantial variations within both democratic and authoritarian regimes (e.g., </span><a data-dcnode-id="3063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B49"><span data-dcnode-id="3064" instrument_node="">Inglehart et al., 2003</span></a><span data-dcnode-id="3062" instrument_node="">; </span><a data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B25"><span data-dcnode-id="3061" instrument_node="">Chang et al., 2013</span></a><span data-dcnode-id="3059" instrument_node="">; </span><a data-dcnode-id="3057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B99"><span data-dcnode-id="3058" instrument_node="">Shin, 2015</span></a><span data-dcnode-id="3056" instrument_node="">; </span><a data-dcnode-id="3054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B89"><span data-dcnode-id="3055" instrument_node="">Park, 2017</span></a><span data-dcnode-id="3053" instrument_node="">), thereby leaving open the question of whether there is a consistent impact of regime on particular citizens’ political value orientations.</span></p><span data-dcnode-id="3051" instrument_node="">
</span><p class="mb15" data-dcnode-id="3043"><span data-dcnode-id="3050" instrument_node="">One reasons for these inconsistent results regarding political preferences in different political systems could be that this research has to large extent relied on country level-comparisons. Unfortunately, these comparisons tend to be tainted by measurement problems. For instance, language systematically affects the meaning and interpretation of survey items, and different responses will be given depending on the language of the item (</span><a data-dcnode-id="3048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B90"><span data-dcnode-id="3049" instrument_node="">Pérez, 2011</span></a><span data-dcnode-id="3047" instrument_node="">). There are also other country-biases than language (e.g., popular conceptions of the meaning of the word “democracy” vary between countries; </span><a data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="3046" instrument_node="">Chu and Huang, 2010</span></a><span data-dcnode-id="3044" instrument_node="">), meaning that comparisons between countries will generally be grossly misleading.</span></p><span data-dcnode-id="3042" instrument_node="">
</span><p class="mb0" data-dcnode-id="3028"><span data-dcnode-id="3041" instrument_node="">Some studies that have looked at socialization within a given culture suggested that citizens socialized under authoritarian rule are less supportive of democracy than those socialized under democratic rule (</span><a data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B93"><span data-dcnode-id="3040" instrument_node="">Pop-Eleches and Tucker, 2014</span></a><span data-dcnode-id="3038" instrument_node="">; </span><a data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B105"><span data-dcnode-id="3037" instrument_node="">Voicu and Bartolome Peral, 2014</span></a><span data-dcnode-id="3035" instrument_node="">). One study, focusing on the individual, found that preferences for democracy increase as individuals experience more time living under democratic rule (</span><a data-dcnode-id="3033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="3034" instrument_node="">Fuchs-Schündeln and Schündeln, 2015</span></a><span data-dcnode-id="3032" instrument_node="">), although single culture studies have given mixed results (e.g., </span><a data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B43"><span data-dcnode-id="3031" instrument_node="">Haerpfer and Kizilova, 2014</span></a><span data-dcnode-id="3029" instrument_node="">). Besides being scant, an important limitation of the present literature connecting changes in political regimes with the political preferences of the individual is that it very much focuses on the shift from authoritarian forms of government toward democracy. There is very little research on what happens when the direction of change is the opposite; that is, from democracy toward authoritarianism.</span></p><span data-dcnode-id="3027" instrument_node="">
</span><h3 data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">System Justification in an Authoritarian State</span></h3><span data-dcnode-id="3024" instrument_node="">
</span><p class="mb15" data-dcnode-id="3019"><span data-dcnode-id="3023" instrument_node="">The central tenet of system justification theory is that people have a basic motivation to legitimize the social system (</span><a data-dcnode-id="3021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="3022" instrument_node="">Jost and Hunyady, 2005</span></a><span data-dcnode-id="3020" instrument_node="">). System justification meets epistemic, existential, and relational needs, providing individuals with a sense of security and enables them to maintain a shared reality with others while alleviating their sense of external threat.</span></p><span data-dcnode-id="3018" instrument_node="">
</span><p class="mb15" data-dcnode-id="2983"><span data-dcnode-id="3017" instrument_node="">Authoritarianism and system justification are closely associated constructs (</span><a data-dcnode-id="3015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B108"><span data-dcnode-id="3016" instrument_node="">Wilson and Sibley, 2013</span></a><span data-dcnode-id="3014" instrument_node="">; </span><a data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B86"><span data-dcnode-id="3013" instrument_node="">Osborne and Sibley, 2014</span></a><span data-dcnode-id="3011" instrument_node="">) – they share an attachment to “things as they are,” a resistance to social change, and an ideological commitment to the </span><i data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">status quo</span></i><span data-dcnode-id="3008" instrument_node="">, religion, and tradition (see also </span><a data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="3007" instrument_node="">Jost and Kende, 2020</span></a><span data-dcnode-id="3005" instrument_node="">). </span><a data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="3004" instrument_node="">Jost and Hunyady (2005)</span></a><span data-dcnode-id="3002" instrument_node=""> used the umbrella term system-justifying ideologies to describe a set of worldviews (e.g., just world beliefs, Protestant work ethic, meritocratic ideology, fair market ideology) of which one specific type is right-wing authoritarianism. The authors argued that these ideologies serve to legitimize the prevailing social order. Importantly, however, previous empirical studies have found only zero or very low correlations between individual difference measures of RWA and of system justification. For example, </span><a data-dcnode-id="3000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B86"><span data-dcnode-id="3001" instrument_node="">Osborne and Sibley (2014)</span></a><span data-dcnode-id="2999" instrument_node=""> observed a low positive correlation in an American sample, while </span><a data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2998" instrument_node="">Kelemen et al. (2014)</span></a><span data-dcnode-id="2996" instrument_node=""> obtained a low negative correlation in a Hungarian sample surveyed during a period of left-wing government in Hungary (for a similar result in France, see </span><a data-dcnode-id="2994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B70"><span data-dcnode-id="2995" instrument_node="">Langer et al., 2020</span></a><span data-dcnode-id="2993" instrument_node="">). In a cross-cultural study, </span><a data-dcnode-id="2991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B103"><span data-dcnode-id="2992" instrument_node="">Vargas-Salfate et al. (2018)</span></a><span data-dcnode-id="2990" instrument_node=""> found a low within-country individual level positive association between RWA and system justification (</span><i data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">r</span></i><span data-dcnode-id="2987" instrument_node=""> = 0.169), but nothing at the country level (</span><i data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">r</span></i><span data-dcnode-id="2984" instrument_node=""> = 0.106).</span></p><span data-dcnode-id="2982" instrument_node="">
</span><p class="mb15" data-dcnode-id="2968"><span data-dcnode-id="2981" instrument_node="">Besides direct measures of authoritarianism and system justification, we also measured belief in a just world (BJW; </span><a data-dcnode-id="2979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B72"><span data-dcnode-id="2980" instrument_node="">Lerner and Miller, 1978</span></a><span data-dcnode-id="2978" instrument_node="">) and immigration attitudes. We now explain our reasons for doing so. BJW refers to the belief that everyone gets what they deserve (</span><a data-dcnode-id="2976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B72"><span data-dcnode-id="2977" instrument_node="">Lerner and Miller, 1978</span></a><span data-dcnode-id="2975" instrument_node="">), and can be considered a system justifying ideology. Those who believe the world to be just will perceive the </span><i data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">status quo</span></i><span data-dcnode-id="2972" instrument_node=""> as legitimate and believe that there is no need for social action or for social change (</span><a data-dcnode-id="2970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="2971" instrument_node="">Hafer and Choma, 2009</span></a><span data-dcnode-id="2969" instrument_node="">).</span></p><span data-dcnode-id="2967" instrument_node="">
</span><p class="mb0" data-dcnode-id="2953"><span data-dcnode-id="2966" instrument_node="">Regarding immigrant attitudes, immigrants have, by Fidesz and the Fidesz dominated state media, been consistently portrayed as a danger to Europe and the greatest threat to the Hungarian nation (</span><a data-dcnode-id="2964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B16"><span data-dcnode-id="2965" instrument_node="">Bocskor, 2018</span></a><span data-dcnode-id="2963" instrument_node="">). A sense of perceived threat is at the very core of both the authoritarian personality and of system justifying ideology. Indeed, increased authoritarianism and system-justification go hand in hand with increasing levels of perceived symbolic or material threats to the </span><i data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">status quo</span></i><span data-dcnode-id="2960" instrument_node=""> (</span><a data-dcnode-id="2958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="2959" instrument_node="">Kay and Zanna, 2009</span></a><span data-dcnode-id="2957" instrument_node="">; </span><a data-dcnode-id="2955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B61"><span data-dcnode-id="2956" instrument_node="">Kay and Friesen, 2011</span></a><span data-dcnode-id="2954" instrument_node="">). In the Hungarian context, in which migrants have been portrayed as the greatest threat, increases in authoritarianism and system justification would be expected to tally with hardened attitudes toward migrants. Moreover, the perceived threat imposed by migrants could, as explained below, help explain why low social status Fidesz voters may support a system that has made them worse off.</span></p><span data-dcnode-id="2952" instrument_node="">
</span><h3 data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">The Strong Version of System Justification</span></h3><span data-dcnode-id="2949" instrument_node="">
</span><p class="mb0" data-dcnode-id="2893"><span data-dcnode-id="2948" instrument_node="">One key strength of system justification theory is that it plausibly explains why people show support for social systems that oppose their personal or group-based interests. The strong or dissonancy-based version of system justification theory (also referred to as the status-legitimacy hypothesis; see </span><a data-dcnode-id="2946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="2947" instrument_node="">Brandt, 2013</span></a><span data-dcnode-id="2945" instrument_node="">, p. 2) can also explain why members of disadvantaged groups legitimize the </span><i data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">status quo</span></i><span data-dcnode-id="2942" instrument_node="">, and why they do not engage in system-challenging collective action (e.g., </span><a data-dcnode-id="2940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B85"><span data-dcnode-id="2941" instrument_node="">Osborne et al., 2019</span></a><span data-dcnode-id="2939" instrument_node="">; </span><a data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="2938" instrument_node="">De Cristofaro et al., 2021</span></a><span data-dcnode-id="2936" instrument_node="">). </span><a data-dcnode-id="2934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B87"><span data-dcnode-id="2935" instrument_node="">Owuamalam et al. (2019)</span></a><span data-dcnode-id="2933" instrument_node="">, although acknowledging that system justification theory is more than the system justification motive, argue that providing empirical evidence for the dissonance-based strong version serves as the “litmus test” of system justification theory. Such evidence is needed to support an independent motive for system justification and distinguished the theory from interest-based theories such as social identity theory (SIT) or self-categorization theory (SCT). Indeed, as </span><a data-dcnode-id="2931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B87"><span data-dcnode-id="2932" instrument_node="">Owuamalam et al. (2019)</span></a><span data-dcnode-id="2930" instrument_node=""> noted, several studies to test the strong version have been run, including studies striving to explain such paradoxical phenomena as working-class conservatism, low-income groups’ relatively strong preference for meritocratic ideologies, and their idealization of capitalism (</span><a data-dcnode-id="2928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="2929" instrument_node="">Jost et al., 2003</span></a><span data-dcnode-id="2927" instrument_node="">). The findings obtained in these studies are mixed in terms of the support they afford the strong version of the theory. </span><a data-dcnode-id="2925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="2926" instrument_node="">Jost et al. (2003)</span></a><span data-dcnode-id="2924" instrument_node=""> showed that several low-status groups engage in system justification against their own personal and group-based interests, as reflected in their endorsement of income inequalities and meritocratic ideologies. </span><a data-dcnode-id="2922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="2923" instrument_node="">Henry and Saul (2006)</span></a><span data-dcnode-id="2921" instrument_node=""> found evidence for the strong version of the theory in Bolivia, which is one of the poorest countries in the world. They found that children from low-SES Bolivian families strongly believed in the effectiveness of the government in meeting the people’s needs. These results are consistent with </span><a data-dcnode-id="2919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B55"><span data-dcnode-id="2920" instrument_node="">Jost et al. (2004)</span></a><span data-dcnode-id="2918" instrument_node=""> notion that the people who are the most disadvantaged by a given social system have the greatest need to decrease dissonance by justifying their suffering, and should, paradoxically, thus be the most likely to ideologically support the system (</span><a data-dcnode-id="2916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="2917" instrument_node="">Henry and Saul, 2006</span></a><span data-dcnode-id="2915" instrument_node="">, p. 267). Although there are many findings that do not support the strong version (e.g., </span><a data-dcnode-id="2913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="2914" instrument_node="">Caricati and Lorenzi-Cioldi, 2012</span></a><span data-dcnode-id="2912" instrument_node="">; </span><a data-dcnode-id="2910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="2911" instrument_node="">Brandt, 2013</span></a><span data-dcnode-id="2909" instrument_node="">; </span><a data-dcnode-id="2907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2908" instrument_node="">Kelemen et al., 2014</span></a><span data-dcnode-id="2906" instrument_node="">; </span><a data-dcnode-id="2904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B22"><span data-dcnode-id="2905" instrument_node="">Caricati, 2017</span></a><span data-dcnode-id="2903" instrument_node="">; </span><a data-dcnode-id="2901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B103"><span data-dcnode-id="2902" instrument_node="">Vargas-Salfate et al., 2018</span></a><span data-dcnode-id="2900" instrument_node="">), </span><a data-dcnode-id="2898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="2899" instrument_node="">Jost (2019)</span></a><span data-dcnode-id="2897" instrument_node=""> points out that also null results beg the question of why the lower classes are as likely or almost as likely to opt for the </span><i data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">status quo</span></i><span data-dcnode-id="2894" instrument_node=""> as are the higher classes?</span></p><span data-dcnode-id="2892" instrument_node="">
</span><h3 data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">The Present Research</span></h3><span data-dcnode-id="2889" instrument_node="">
</span><p class="mb15" data-dcnode-id="2884"><span data-dcnode-id="2888" instrument_node="">In the 2010 parliamentary elections, Hungary witnessed political upheaval. MSZP, the ruling socialist party plummeted from 48% of the vote in 2006 to 15%, handing over victory to the two opposition parties, Fidesz and Jobbik. In the 2 months leading up to the elections, we assessed authoritarianism and system-justification in a nationally representative sample of 1,000 Hungarian adults (</span><a data-dcnode-id="2886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B77"><span data-dcnode-id="2887" instrument_node="">Lönnqvist et al., 2019b</span></a><span data-dcnode-id="2885" instrument_node="">).</span></p><span data-dcnode-id="2883" instrument_node="">
</span><p class="mb15" data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">In 2018, we sought to rerun the same survey with new participants after 8 years of Fidesz rule. More specifically, using the same methodology as in 2010, we again surveyed a representative sample of 1,000 Hungarians. This was done 2 months after the 2018 elections. The state apparatus and the governing party had campaigned in tandem to give Fidesz 49% of the vote with an impressive 70% turn-out, thereby setting up its third straight two-thirds majority. Jobbik held onto its base with 19% of the vote. The divided leftist and liberal parties were unable to increase their share of votes. The central question of the current study was whether the authoritarian turn had been accompanied by changes in attitudes and beliefs as measured at the individual level. Authoritarianism of the populace could be expected to increase under 8 years of an illiberal democracy. This could be expected to be especially true among those who support the illiberal democracy. Our first hypothesis is therefore that this political turn would have strengthened authoritarianism (H1a), and especially among the voters of the ruling party (H1b).</span></p><span data-dcnode-id="2880" instrument_node="">
</span><p class="mb15" data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">As right-wing authoritarianism shares common features with system justification and just world beliefs, we also expected that system justification and personal and global just world beliefs would have also increased in the past 8 years (H2a), and especially among the voters of the ruling party (H2b).</span></p><span data-dcnode-id="2877" instrument_node="">
</span><p class="mb15" data-dcnode-id="2860"><span data-dcnode-id="2876" instrument_node="">The masses tends to adjust their attitudes to leadership cues (</span><a data-dcnode-id="2874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B109"><span data-dcnode-id="2875" instrument_node="">Zaller, 1992</span></a><span data-dcnode-id="2873" instrument_node="">; </span><a data-dcnode-id="2871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="2872" instrument_node="">Gabel and Scheve, 2007</span></a><span data-dcnode-id="2870" instrument_node="">), and especially those who identify with a party tend to modify their issue stances to conform to their party (</span><a data-dcnode-id="2868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B24"><span data-dcnode-id="2869" instrument_node="">Carsey and Layman, 2006</span></a><span data-dcnode-id="2867" instrument_node="">; </span><a data-dcnode-id="2865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="2866" instrument_node="">Dancey and Goren, 2010</span></a><span data-dcnode-id="2864" instrument_node="">; see also </span><a data-dcnode-id="2862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B76"><span data-dcnode-id="2863" instrument_node="">Lönnqvist et al., 2019a</span></a><span data-dcnode-id="2861" instrument_node="">). This means that that Fidesz’s ever-increasing hostility toward immigrants, in part fueled by the so called “refugee crisis” in 2015, could have moved the populace’s attitudes in a more anti-immigrant direction. Our third hypothesis is that Fidesz’s hostility toward immigrants would have hardened attitudes toward migrants (H3a), and especially among the voters of the ruling party (H3b).</span></p><span data-dcnode-id="2859" instrument_node="">
</span><p class="mb0" data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">This context, in which intense economic progress is associated with aggravated inequalities and an increased risk of marginalization. provided a unique context in which to test the strong version of system justification theory. Would disadvantaged group members justify a new social system that perpetuated their disadvantages? Did even low SES Fidesz supporters believe in the system? (RQ1).</span></p><span data-dcnode-id="2856" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2855" id="h3" name="h3"></a><h2 data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">Materials and Methods</span></h2><span data-dcnode-id="2852" instrument_node="">
</span><h3 class="pt0" data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">Participants and Procedure</span></h3><span data-dcnode-id="2849" instrument_node="">
</span><p class="mb0" data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">The 2018 study was designed as an exact replication of the 2010 study. Both were run with nationally representative sample of 1,000 Hungarian adults. The quotas (i.e., age, sex, education, and place of residence), were based on the most recent Hungarian Statistical Office data and the data was collected applying the random walking method. Overall, 3,980 Hungarian adults were approached by trained market researchers in 2010 and 4,095 in 2018. One thousand face-to-face interviews were successfully conducted both in 2010 (25%) and 2018 (24%). 1,229 people refused to participate in 2010 (31%) and 1,427 in 2018 (35%). 1,751 people did not conform to the quotas employed in 2010 (44%) and 1,668 in 2018 (41%). The participants, who did not receive any material compensation, were informed that the data collection was voluntary and anonymous. The 2010 and 2018 final samples both consisted of 1,000 Hungarian adults (527 females in 2010 and 526 females in 2018) with a mean age of 45.4 (SD = 16.5) in 2010 and 45.7 (SD = 16.9) in 2018. Regarding highest attained education, 47 participants had not finished elementary school in the 2010 sample and 23 in the 2018 sample, 436 had finished elementary school in the 2010 sample and 435 in the 2018 sample, 380 had finished high school in the 2010 sample and 435 in the 2018 sample, and 137 had finished higher education (BA or MA) in the 2010 sample and 134 in the 2018 sample. Two participants in 2018 did not answer this question. Data were collected in early 2010, some months before the April elections in which Fidesz came to power, and late in 2018, around half a year after Fidesz had won its third consecutive super-majority in parliament. In general, the two samples look essentially identical in terms of response rate, sex, age, and education. We conducted the research with the IRB approval of Eötvös Loránd University.</span></p><span data-dcnode-id="2846" instrument_node="">
</span><h3 data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">Measures</span></h3><span data-dcnode-id="2843" instrument_node="">
</span><p class="mb0" data-dcnode-id="2838"><span data-dcnode-id="2842" instrument_node="">All scales in the studies were abridged Hungarian adaptations (see </span><a data-dcnode-id="2840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2841" instrument_node="">Kelemen et al., 2014</span></a><span data-dcnode-id="2839" instrument_node="">), and all items were responded to on a scale ranging from 1 (absolutely disagree) to 4 (absolutely agree).</span></p><span data-dcnode-id="2837" instrument_node="">
</span><h4 data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">Authoritarian Personality</span></h4><span data-dcnode-id="2834" instrument_node="">
</span><p class="mb0" data-dcnode-id="2820"><span data-dcnode-id="2833" instrument_node="">Characteristics reflecting authoritarian personality were measured with scales assessing Authoritarianism [two items from the original F-scale (</span><a data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="2832" instrument_node="">Adorno et al., 1950</span></a><span data-dcnode-id="2830" instrument_node="">)] and two items added by </span><a data-dcnode-id="2828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2829" instrument_node="">Kelemen et al. (2014)</span></a><span data-dcnode-id="2827" instrument_node="">. The two Authoritarianism items from the original F-scale by </span><a data-dcnode-id="2825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="2826" instrument_node="">Adorno et al. (1950)</span></a><span data-dcnode-id="2824" instrument_node=""> were (1) People can be divided into two distinct classes: the weak and the strong, (2) Human nature being what it is, there will always be war and conflict. The two items added by </span><a data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2823" instrument_node="">Kelemen et al. (2014)</span></a><span data-dcnode-id="2821" instrument_node=""> were (3) Everybody has to know his or her place in life in terms of both superiority and inferiority, and (4) It is both important to know how to obey and how to command. Cronbach’s alpha internal consistency reliabilities were 0.57 and 0.62 in 2010 and 2018, respectively.</span></p><span data-dcnode-id="2819" instrument_node="">
</span><h4 data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">Just World Beliefs</span></h4><span data-dcnode-id="2816" instrument_node="">
