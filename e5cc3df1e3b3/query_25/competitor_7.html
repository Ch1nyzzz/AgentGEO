</span><div class="article-body-text" data-dcnode-id="1576"><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1607"><font data-dcnode-id="1608" size="2"><em data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Mr. Hultman assisted with the 1981 Summer Seminar program at FEE, He is a senior at the University of Nebraska at Omaha.</span></em><span data-dcnode-id="1609" instrument_node="">
</span></font></p><p data-dcnode-id="1604"><font data-dcnode-id="1605" size="2"><span data-dcnode-id="1606" instrument_node="">Free trade affords benefits often overlooked. At the heart of free trade lies the law of comparative cost: an individual stands to gain by concentrating his efforts and exchanging with others rather than trying to produce all types of goods. This is why individuals of various abilities are able to trade peacefully for mutual gain. </span></font></p><font data-dcnode-id="1579" size="2"><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">For example, Jones lives next door to Smith. They have similar lawns and gardens. Jones mows his lawn in two hours and hoes his garden in one. Smith mows his lawn in three hours and hoes his garden in four. Thus, each Saturday Jones spends three hours working in his yard while Smith spends seven hours. </span></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">One Saturday Jones, observing these differences, offers to hoe Smith’s garden if Smith will mow Jones’ lawn. Smith agrees and both find they benefit from this exchange. Jones now works only two hours instead of three, while Smith works only six instead of seven. The same results are accomplished, but each man gains one hour of free time. </span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">When Smith and Jones each focuses on his more productive skills, they are able to cooperate peacefully for mutual benefit. Each receives a free hour in his day he would not otherwise have had. Depending on their time preferences, the men may consume their extra time in enjoyment or use it to engage in further production and exchange. Smith may go for a walk, enjoy his family, or watch television while Jones may hoe another garden for more benefits. The goal is not necessarily to accumulate goods and services, but to enlarge the opportunity to engage in the peaceful activities of their choice (which often requires goods and services). </span></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">This example of comparative cost also shows that the unskilled, as well as the skilled, can benefit from free trade. Jones was the more skillful at both mowing and hoeing, yet Smith could still offer his aid to Jones for mutual benefit. Smith’s lack of skill as a mower and hoer didn’t make him subservient to Jones; both were dependent on the other to get the work done and acquire their free time. It is true that Smith would be working several hours after Jones was done, but both were better off after the exchange than before. Any attempt to force Jones to help Smith would have destroyed the basis for future exchange. This would have made it more beneficial for Jones to return to his self-sufficient lifestyle, leaving Smith once again with his long workday. Let the exchange take place free from coercion and both parties will gain. </span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Free trade also promotes a greater awareness of the needs of others. When Smith and Jones were self-sufficient, there was no need for communication or understanding; each was an island unto himself. However, that first Saturday when Jones was looking for a way to help himself by trading with Smith, he had to make a conscious effort to understand Smith’s needs. As Jones continues to enrich himself by trading with others in society, he will become more useful to others, enhancing his cooperative ability. Smith, likewise, will grow. </span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">As they become more aware of the needs of others and more dependent on trade for their higher standard of living, they will also tend to behave more peacefully toward their fellow men. When Smith and Jones were self-sufficient, it was of little concern to either of them what hap pened to the other. Now that they are exchanging labor and thus enjoying a higher standard of living, injuring one would also hurt the other. Just as peaceful exchange brought benefits to both, violence would bring injury to both. Thus free trade encourages peaceful cooperation and discourages violence. </span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">The final lesson to be gleaned from this example is the importance of freedom for the increase and enjoyment of wealth. Obviously, had Smith and Jones been prevented from exchanging their services there would have been no resulting benefits. Nor can anyone else make exchanges for them. Only they know if an exchange will be beneficial since value and wealth are matters of personal judgment. What if Smith had enjoyed hoeing his garden more than anything else? It would have been wrong to force him into the exchange “for his own good.” Both his freedom and his satisfaction would have been diminished, resulting in loss rather than gain. Mutual benefits can only occur when individuals are left free to exchange according to their own values. </span></p><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">These often overlooked benefits of free trade remind us: individuals can cooperate for their mutual gain; the unskilled, as well as the skilled, havethe opportunity to advance; free trade promotes greater awareness of the needs of others; and freedom is necessary for this whole process of trading for mutual benefit . . . the ends of man not necessarily being in the pile of goods and services he accumulates, but in the opportunity to engage in the peaceful activity of his choice.</span></p></font><p data-dcnode-id="1578"></p><span data-dcnode-id="1577" instrument_node="">
</span></div><span data-dcnode-id="1575" instrument_node="">

<a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/learning-center/guided-course-economic-principles/gains-from-trade/introduction/%3Fitm_source%3Dparsely-api"><span data-dcnode-id="1242" instrument_node="">Gains from Trade</span></a></h2><div class="meta" data-dcnode-id="1229"><div class="author-info float-none" data-dcnode-id="1235"><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/people/null"><span data-dcnode-id="1239" instrument_node="">Staff</span></a><span data-dcnode-id="1237" instrument_node=""> - </span><span data-dcnode-id="1236" instrument_node="">3/18/2020</span></div><div class="share-comment float-none addthis_toolbox" data-dcnode-id="1230"><a class="addthis_button_more first at300b" data-addthis-title="Gains from Trade" data-addthis-url="https://fee.org/learning-center/guided-course-economic-principles/gains-from-trade/introduction/?itm_source=parsely-api" data-dcnode-id="1233" href="#" target="_blank" title="More"><img alt="" data-dcnode-id="1234" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/images/ico-share.png&amp;raw" title="Share"></a><a class="disqus_thread" data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/learning-center/guided-course-economic-principles/gains-from-trade/introduction/%3Fitm_source%3Dparsely-api%23disqus_thread"></a><div class="atclear" data-dcnode-id="1231"></div></div></div></div></div></div></div></div></section></section><span data-dcnode-id="1221" instrument_node="">

</span><section data-article-id="109298" data-dcnode-id="282" id="infinite-scroll"><div class="article-container" data-dcnode-id="286"><div data-dcnode-id="1034" style="position: relative;"><section class="text-left infinite-article-detail-container print75" data-dcnode-id="1036"><div class="container" data-dcnode-id="1037"><div class="row" data-dcnode-id="1038"><div class="offset-lg-2 col-lg-8" data-dcnode-id="1039"><div class="single-article" data-dcnode-id="1040"><div class="article-about" data-dcnode-id="1213"><a class="article-link" data-dcnode-id="1216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/why-china-is-surpassing-the-united-states-economically/"><h1 class="article-republish-title" data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Why China Is Surpassing the United States Economically</span></h1></a><h6 class="sub-heading article-date" data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Sunday, April 24, 2022</span></h6></div><div class="article-body-cont infinite-article-body more-articles" data-dcnode-id="1046" responsive-videos="true"><div class="article-body-text" data-dcnode-id="1119"><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Outwardly, everyone condemns the Chinese government, run by the Chinese Communist Party (CCP). Their society is authoritarian and “anti-democratic” while in America, as the song goes, “at least I know I’m free.”</span></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Yet, no one seems to believe freedom leads to greater economic prosperity or human happiness. Inherent in every political discussion about China is the idea that authoritarianism produces better results and the United States is handicapped by its devotion to freedom. Americans enviously note that when China’s central government decides to do something, they are not encumbered by adversarial processes inherent in the US Constitution.</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">This is also the assumption underlying the trade wars. China has “taken advantage of” the United States by being more economically mercantilist while the United States has foolishly allowed its industry to migrate to China and other countries because of relatively freer trade policies.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1203" instrument_node="">That is demonstrably false. Manufacturing still comprises about the </span><a data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stlouisfed.org/on-the-economy/2017/april/us-manufacturing-really-declining" rel="nofollow"><span data-dcnode-id="1202" instrument_node="">same percentage</span></a><span data-dcnode-id="1200" instrument_node=""> of </span><em data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">real</span></em><span data-dcnode-id="1197" instrument_node=""> GDP as it has throughout the post-WWII period. The problem with American manufacturing isn’t the amount produced but </span><em data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">what</span></em><span data-dcnode-id="1194" instrument_node=""> is produced. American manufacturing is far too skewed towards producing weapons and other items without utility, misdirected by a monetary system that allows resources to be directed towards unproductive ends.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1191" instrument_node="">The emergence of China as an economic power certainly provides the United States new competition, but that emergence is not a result of China’s authoritarianism. On the contrary, China’s economy has grown exponentially in the past thirty years because it is </span><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/chinas-triumph-over-poverty-was-spearheaded-by-privatization/"><span data-dcnode-id="1190" instrument_node="">significantly </span><em data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">less</span></em><span data-dcnode-id="1187" instrument_node=""> authoritarian</span></a><span data-dcnode-id="1185" instrument_node="">, especially in the economic sphere, than it was previously.</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Americans never seem to ask themselves why a country with four times the population didn’t have a much larger economy than the United States during the twentieth century. The answer is simple: communism. China had as authoritarian an economic system as has ever existed in human history. While they are by no means laissez faire now, they are far more “capitalist” in relative terms. This is the key to their success, not the authoritarianism that remains from the communist years.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">The United States, on the other hand, is relatively less free than it was at almost any time in its history, with the exception perhaps of the 1930s and 40s. And its trajectory is towards more and more government intervention into the economy and life in general.</span></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">The United States became the most powerful economy in the world for the same reason the United Kingdom, comprised of two tiny islands with relatively small populations, was the most powerful before the United States. It had the freest markets. It was the most “capitalist,” for lack of a better single word.</span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">The United Kingdom squandered its wealth trying to maintain a vast global empire that gave its government prestige but drained its wealth and led it to debauch its currency. Sound familiar? Empire may be made possible by capitalism, but it is not an inherent part of capitalism. Empire is anti-capitalist. Capitalism is about property rights and voluntary exchange. Empire demands taxes and misdirection of capital into production of arms and other imperial necessities that do not add to the happiness of the taxpayers.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Weapons, soldiers, and military infrastructure beyond what is needed for defense have no utility. Sooner or later, the productive part of the imperial economy can no longer afford to subsidize the unproductive part.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">This has been the end of every empire in history. It is also the reason the USSR had a much more painful transition from communism to capitalism than China—it had an empire of other communist republics draining its already misdirected resources.</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">While the global standing army the United States maintains is a significant reason for its economic decline, it is not the only reason. In all areas of economic and social life, America has become less free with each passing year.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Americans have become accustomed to its government surveilling its phone calls, e-mails, and financial transactions. The New Deal regulatory structure, under which bureaucrats in executive branch agencies make most of the laws by fiat, rather than Congress in an adversarial process, continues to metastasize. Its entitlement programs, designed to cover the last few years of life, now demand the resources to cover decades of life beyond retirement.</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1156"><span class="rte-quote" data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Democracy was not the key to American freedom; it was limited government.</span></span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">The privilege of printing the world’s reserve currency has done the most damage to the dynamism of the American economy. All inflation leads to malinvestment, but the inflation made possible by the global dollar standard has led to bubbles that very well may comprise half of U.S. GDP.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Certainly, there are millions of people employed in the cartoonishly bureaucratic education and healthcare industries who are adding no value to consumers. As guaranteed student loans have redirected trillions towards the education industry, millions of administrative jobs have been added to the system that aren’t necessary to teach reading, writing, and arithmetic. Meanwhile, the education results continue to decline.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1148" instrument_node="">Healthcare is in much the same shape. That part of the industry on the cutting edge, where profits </span><em data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">and losses</span></em><span data-dcnode-id="1145" instrument_node=""> are still available, which operates under the most capitalist circumstances, continues to produce miracles of innovation. But the rest, the heavily subsidized, increasingly bureaucratic part, is sclerotic and in decline.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">In many ways, routine American medicine is still practiced the way it was in 1970. Why? Because it has no reason to improve. It’s on the dole, with half of all healthcare spending comprised of government spending. There is no reason to improve medical or business practices when your income is guaranteed by taxpayers. See the DMV.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Just ask yourself why you’re still asked to fill out multiple forms capturing your insurance information when the office already has it. In fact, they wouldn’t even give you the appointment until they not only got your insurance info but verified your eligibility with the insurer. But they still ask you to write it down on two different forms when you get to your appointment. Non-subsidized industries cannot afford inefficiencies like this.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1134"><span class="rte-quote" data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">If America wants to regain its economic power in a post-dollar dominated world, it must stop imagining China’s success to be a product of its remaining authoritarianism.</span></span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">What made America richer and more powerful in the past was being significantly freer than any other country in the world. And by “freer,” I do not mean more “democratic.” Democracy was not the key to American freedom; it was limited government. It was the fact that the vast majority of American economic and social life was not up for a vote. Rather, most decisions were left to the discretion of the private sector and the individual.</span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">What made China destitute during the same period was its complete lack of freedom. There was nothing else keeping China from building the economy it has today. But since the late twentieth century, America has headed in one direction on the freedom scale and China in the other. It is not unreasonable to ask whether they haven’t now met at a point far lower than America’s freer past.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">There is no reason for Americans to fear China eventually having a larger economy than the United States. That would be the natural result of having so much larger a population. But if America wants to regain its economic power in a post-dollar dominated world, it must stop imagining China’s success to be a product of its remaining authoritarianism and get back to what created America’s wealth in the first place: far more limited government, freer markets, and maximum individual liberty.</span></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1120" style="text-align: right;"><a data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tommullen.net/featured/china-is-surpassing-the-u-s-economically-because-it-is-freer-than-it-was-america-is-less-free/"><span data-dcnode-id="1122" style="font-weight: 400;"><span data-dcnode-id="1123" instrument_node="">This article was reprinted with permission from tommullen.net.</span></span></a></p></div><section data-dcnode-id="1084"><div class="author-group" data-dcnode-id="1085"><div class="article-author row" data-dcnode-id="1086"><div class="col-sm-2 col-xs-3" data-dcnode-id="1116"><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/people/tom-mullen/"><img alt="" data-dcnode-id="1118" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/media/15175/tom-mullen.png%3Fcenter%3D0.44268774703557312%2C0.44444444444444442%26mode%3Dcrop%26height%3D300%26widthratio%3D1%26rnd%3D131317337790000000&amp;raw"></a></div><div class="col-sm-10 col-xs-9" data-dcnode-id="1087"><h5 data-dcnode-id="1113"><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/people/tom-mullen/"><span data-dcnode-id="1115" instrument_node="">Tom Mullen</span></a></h5><div class="brief-bio" data-dcnode-id="1088"><p data-dcnode-id="1095"><span data-dcnode-id="1096"><span data-dcnode-id="1112" instrument_node="">Tom Mullen hosts the</span><strong data-dcnode-id="1108"><span data-dcnode-id="1111" instrument_node="">&nbsp;</span><em data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Tom Mullen Talks Freedom</span></em></strong><span data-dcnode-id="1107" instrument_node="">&nbsp;podcast and is the author of&nbsp;</span><em data-dcnode-id="1103"><a data-dcnode-id="1104" data-saferedirecturl="https://www.google.com/url?q=http://www.amazon.com/gp/product/1517679419/ref%3Das_li_tl?ie%3DUTF8 </span><p data-dcnode-id="1089"><span data-dcnode-id="1093" instrument_node="">His podcast episodes and writing can be found at&nbsp;</span><a data-dcnode-id="1091" data-saferedirecturl="https://www.google.com/url?q=http://www.tommullentalksfreedom.com/&amp;source=gmail&amp;ust=1636489459810000&amp;usg=AOvVaw3hc0Vop91t6GKNKDP49LwU" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tommullentalksfreedom.com/"><span data-dcnode-id="1092" instrument_node="">www.tommullentalksfreedom.com</span></a><span data-dcnode-id="1090" instrument_node="">.</span></p></div></div></div></div></section><div class="article-share" data-dcnode-id="1052"><div class="row" data-dcnode-id="1053"><div class="col-sm-8" data-dcnode-id="1063"><ul class="social-links addthis_toolbox" data-dcnode-id="1064"><li data-dcnode-id="1081"><a class="fb-button" data-dcnode-id="1082" title="facebook"><i aria-hidden="true" class="fa fa-facebook" data-dcnode-id="1083"></i></a></li><li data-dcnode-id="1078"><a class="addthis_button_flipboard at300b" data-addthis-title="Why China Is Surpassing the United States Economically" data-addthis-url="https://fee.org/articles/why-china-is-surpassing-the-united-states-economically/" data-dcnode-id="1079" href="#" target="_blank" title="flipboard"><i aria-hidden="true" class="fa fa-flipboard" data-dcnode-id="1080"></i></a></li><li data-dcnode-id="1075"><a class="addthis_button_twitter at300b" data-addthis-title="Why China Is Surpassing the United States Economically" data-addthis-url="https://fee.org/articles/why-china-is-surpassing-the-united-states-economically/" data-dcnode-id="1076" href="#" title="twitter"><i aria-hidden="true" class="fa fa-twitter" data-dcnode-id="1077"></i></a></li><li data-dcnode-id="1072"><a class="addthis_button_linkedin at300b" data-addthis-title="Why China Is Surpassing the United States Economically" data-addthis-url="https://fee.org/articles/why-china-is-surpassing-the-united-states-economically/" data-dcnode-id ="atclear" data-dcnode-id="1056"></div></span></div></div></div><div class="article-comments" data-dcnode-id="1047"><button class="show-comments button" data-dcnode-id="1050" disqus-url="https://fee.org/articles/why-china-is-surpassing-the-united-states-economically/"><span data-dcnode-id="1051" instrument_node="">Open Comments</span></button><div class="disqus_thread" data-dcnode-id="1049" id="disqus_thread"></div><div class="count-comments" data-dcnode-id="1048" data-disqus-url="https://fee.org/articles/why-china-is-surpassing-the-united-states-economically/" style="display: none;"></div></div></div><div class="continue-reading align-center" data-dcnode-id="1041"><div data-dcnode-id="1042" id="continue-reading-id"><a class="cursor-pointer" data-dcnode-id="1043" id="continue-reading-button"><span data-dcnode-id="1045" instrument_node="">Continue Reading</span><span class="fa fa-angle-down" data-dcnode-id="1044"></span></a></div></div></div></div></div></div></section><hr class="hr" data-dcnode-id="1035"></div><div data-dcnode-id="287" style="position: relative;"><section class="text-left infinite-article-detail-container print75" data-dcnode-id="289"><div class="container" data-dcnode-id="290"><div class="row" data-dcnode-id="291"><div class="offset-lg-2 col-lg-8" data-dcnode-id="292"><div class="single-article" data-dcnode-id="293"><div class="article-about" data-dcnode-id="1028"><a class="article-link" data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/celebrating-freedom-in-prague-three-decades-after-its-liberation-from-soviet-socialism/"><h1 class="article-republish-title" data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Celebrating Freedom in Prague—Three Decades After Its Liberation from Soviet Socialism</span></h1></a><h6 class="sub-heading article-date" data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Saturday, April 23, 2022</span></h6></div><div class="article-body-cont infinite-article-body more-articles" data-dcnode-id="299" responsive-videos="true"><div class="article-body-text" data-dcnode-id="388"><p data-dcnode-id="1020"><span data-dcnode-id="1027" instrument_node="">PRAGUE, CZECH REPUBLIC—I am in one of my favorite cities this weekend to deliver a speech at </span><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studentsforliberty.org/europe/" rel="nofollow"><span data-dcnode-id="1026" instrument_node="">European Students for Liberty’s</span></a><span data-dcnode-id="1024" instrument_node=""> big </span><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//libertycon.net/" rel="nofollow"><span data-dcnode-id="1023" instrument_node="">LibertyCon</span></a><span data-dcnode-id="1021" instrument_node=""> conference. Hundreds of students have gathered here in the Czech Republic from all over Europe. As a venue to celebrate liberty, few cities can compare to beautiful Prague.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1018" instrument_node="">This is one of the countries of Eastern Europe that suffered under decades of Soviet-imposed socialism. When new leadership began inching away from that hellish nightmare in 1968, Soviet and Warsaw Pact forces rolled in with tanks and guns. As I’ve written before (</span><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/remembering-prague-spring/" rel="nofollow"><span data-dcnode-id="1017" instrument_node="">here</span></a><span data-dcnode-id="1015" instrument_node=""> and </span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/the-sound-of-freedom/" rel="nofollow"><span data-dcnode-id="1014" instrument_node="">here</span></a><span data-dcnode-id="1012" instrument_node="">), that despicable invasion prompted a 14-year-old from Beaver Falls, Pennsylvania, to get involved in the cause of liberty. (His name rhymes with “Seed.”)</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1009" instrument_node="">This is the country that was sacrificed to Adolf Hitler at the 1938 Munich Conference. Neville Chamberlain of Britain brandished the worthless agreement back home as producing “peace in our time.” Less than a year later, World War II began in Europe and in the months in between, </span><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/resources/the-story-of-nicholas-winton/" rel="nofollow"><span data-dcnode-id="1008" instrument_node="">a young stockbroker named Nicholas Winton</span></a><span data-dcnode-id="1006" instrument_node=""> labored feverishly to help hundreds of Jewish children escape before the conflict started.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1003" instrument_node="">Czechoslovakia (now two countries, the Czech Republic and Slovakia) is where a courageous student, </span><a data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rferl.org/a/29714035.html" rel="nofollow"><span data-dcnode-id="1002" instrument_node="">Jan Palach</span></a><span data-dcnode-id="1000" instrument_node="">, gave his life by self-immolation to protest the Soviet invasion.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="997" instrument_node="">In November 1989, I was in Warsaw, Poland, for the first time since the communist regime </span><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/a-tribute-to-the-polish-people/" rel="nofollow"><span data-dcnode-id="996" instrument_node="">threw me out</span></a><span data-dcnode-id="994" instrument_node=""> just three years earlier. Soviet satellites were falling like dominoes that year. The Berlin Wall had come down just days before Polish friends and I assembled for dinner at Wierzynek Restaurant in Krakow. During our meal, another friend arrived and announced, “A million people are demonstrating in Wenceslaus Square in Prague right now, demanding the resignation of the communist government!”</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">We all raised a glass to the imminently successful Velvet Revolution.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="988" instrument_node="">This is the country that produced a famous playwright who later became a famous president of a free Czechoslovakia, </span><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pen.org/vaclav-havel-constant-champion-for-freedom-of-expression/" rel="nofollow"><span data-dcnode-id="987" instrument_node="">Vaclav Havel</span></a><span data-dcnode-id="985" instrument_node="">. Another recent Czech president with the same first name, </span><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klaus.cz/clanky/3634" rel="nofollow"><span data-dcnode-id="984" instrument_node="">Vaclav Klaus</span></a><span data-dcnode-id="982" instrument_node="">, warned the world about such dangers as global warming extremism and the centralizing tendencies of the European Union.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">Prague is where you can visit a terrific museum that documents the stupidity and </span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elamerican.com/every-country-needs-museum-communism/" rel="nofollow"><span data-dcnode-id="978" instrument_node="">brutality of communism</span></a><span data-dcnode-id="976" instrument_node="">. Located near the foot of Wenceslaus Square, don’t miss it if you’re ever in town.</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="973" instrument_node="">One spot in Prague is almost magical. It’s the Charles Bridge over the Vltava River in the center of the city. Completed in 1402 after 45 years of construction, it’s the oldest bridge in town and one of the most famous on the continent. Fortified by medieval Gothic towers at both ends of its 1,700-foot span, it is now an exclusively-pedestrian walkway lined with artists, musicians, and souvenir vendors. Thirty sculptures adorn the bridge, 15 on each side. On every occasion, including this visit, I requested one of the local violinists play “Amazing Grace” as I gazed uphill at </span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prague_Castle" rel="nofollow"><span data-dcnode-id="972" instrument_node="">Prague Castle</span></a><span data-dcnode-id="970" instrument_node="">, the largest ancient castle in the world (dating from the 8th Century). Instant goosebumps!</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Prague was a delightful, peaceful city of history, music, and freedom before 1939. It would be 50 years before it would be free and vibrant again. More than 30 years now since its liberation from Soviet socialism, its charm is greater than ever.</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="964" instrument_node="">According to the Heritage Foundation’s </span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heritage.org/index/country/czechrepublic" rel="nofollow"><span data-dcnode-id="963" instrument_node="">Index of Economic Freedom</span></a><span data-dcnode-id="961" instrument_node="">, the Czech Republic is the world’s 21st freest nation (Slovakia ranks nearly as high, at #36). A few hundred miles to the east, Moscow is terrorizing yet another nation, Ukraine. But here in Prague, I can only marvel at the stunning changes from the pain and stagnation this country endured under the Soviet thumb.</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Thank you, European Students for Liberty, for hosting this year’s LibertyCon in such a wonderful place!</span></p><span data-dcnode-id="956" instrument_node="">
