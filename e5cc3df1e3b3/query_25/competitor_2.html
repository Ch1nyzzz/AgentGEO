</span><p data-dcnode-id="5846"><span data-dcnode-id="5871" instrument_node="">In his book, </span><i data-dcnode-id="5869"><span data-dcnode-id="5870" instrument_node="">The Political Struggle for the 21st century</span></i><span data-dcnode-id="5868" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J._W._Smith" title="J. W. Smith"><span data-dcnode-id="5867" instrument_node="">J.W. Smith</span></a><span data-dcnode-id="5865" instrument_node=""> examines the economic basis for the history of imperial civilization. On a global scale, he says developed nations tended to impede or prohibit the economic and technological advancement of weaker developing countries through the military force, martial law, and inequitable practices of trade that typically characterize </span><a data-dcnode-id="5863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colonialism" title="Colonialism"><span data-dcnode-id="5864" instrument_node="">colonialism</span></a><span data-dcnode-id="5862" instrument_node="">. Rhetorically termed as "</span><a data-dcnode-id="5860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Survival_of_the_fittest" title="Survival of the fittest"><span data-dcnode-id="5861" instrument_node="">survival of the fittest</span></a><span data-dcnode-id="5859" instrument_node="">", or "</span><a data-dcnode-id="5857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Might_makes_right" title="Might makes right"><span data-dcnode-id="5858" instrument_node="">might makes right</span></a><span data-dcnode-id="5856" instrument_node="">", such economic crises stem from the imbalances imposed by </span><a class="mw-redirect" data-dcnode-id="5854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corporate_imperialism" title="Corporate imperialism"><span data-dcnode-id="5855" instrument_node="">corporate imperialism</span></a><span data-dcnode-id="5853" instrument_node="">. Just as cities in the </span><a data-dcnode-id="5851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_Ages" title="Middle Ages"><span data-dcnode-id="5852" instrument_node="">Middle Ages</span></a><span data-dcnode-id="5850" instrument_node=""> monopolized the </span><a data-dcnode-id="5848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Means_of_production" title="Means of production"><span data-dcnode-id="5849" instrument_node="">means of production</span></a><span data-dcnode-id="5847" instrument_node=""> by conquering and controlling the sources of raw materials and countryside markets, Smith claims that contemporary centers of capital now control our present world through private monopoly of public resources sometimes known as "the commons". Through inequalities of trade, developing countries are overcharged for import of manufactured goods and underpaid for raw material exports, as wealth is siphoned from the periphery of empire and hoarded at the imperial-centers-of-capital:
</span></p><span data-dcnode-id="5845" instrument_node="">
</span><link data-dcnode-id="5844" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="5838"><p data-dcnode-id="5839"><span data-dcnode-id="5843" instrument_node="">Over eight-hundred years ago the powerful of the city-states of Europe learned to control the resources and markets of the countryside by raiding and destroying others’ primitive industrial capital, thus openly monopolizing that capital and establishing and maintaining extreme inequality of pay. This low pay siphoned the wealth of the countryside to the imperial-centers-of-capital. The powerful had learned to plunder-by-trade and have been refining those skills ever since.</span><sup class="reference" data-dcnode-id="5840" id="cite_ref-FOOTNOTESmith2005_1-2"><a data-dcnode-id="5841" href="#cite_note-FOOTNOTESmith2005-1"><span data-dcnode-id="5842" instrument_node="">[1]</span></a></sup></p></blockquote><span data-dcnode-id="5837" instrument_node="">
</span><p data-dcnode-id="5828"><span data-dcnode-id="5836" instrument_node="">Smith goes on to say that, like other financial empires in history, the contemporary model forms alliances necessary to develop and control wealth, keeping peripheral nations impoverished providers of cheap resources for the imperial capital centers. Belloc estimated that, during the British Enclosures, "perhaps half of the whole population was </span><a data-dcnode-id="5834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proletariat" title="Proletariat"><span data-dcnode-id="5835" instrument_node="">proletarian</span></a><span data-dcnode-id="5833" instrument_node="">", while roughly the other "half" owned and controlled the means of production. Under modern Capitalism, J.W. Smith claimed that fewer than 500 individuals possess more wealth than half of the earth's population. The wealth of 1/2 of 1-percent of the United States population roughly equals that of the lower 90-percent. </span><sup class="reference" data-dcnode-id="5830" id="cite_ref-FOOTNOTESmith2005[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_13-1"><a data-dcnode-id="5831" href="#cite_note-FOOTNOTESmith2005%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-13"><span data-dcnode-id="5832" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5829" instrument_node="">
</span></p><span data-dcnode-id="5827" instrument_node="">
</span><h2 data-dcnode-id="5817"><span class="mw-headline" data-dcnode-id="5825" id="Alternative_models"><span data-dcnode-id="5826" instrument_node="">Alternative models</span></span><span class="mw-editsection" data-dcnode-id="5818"><span class="mw-editsection-bracket" data-dcnode-id="5823"><span data-dcnode-id="5824" instrument_node="">[</span></span><a data-dcnode-id="5821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D7" title="Edit section: Alternative models"><span data-dcnode-id="5822" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5819"><span data-dcnode-id="5820" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5816" instrument_node="">
</span><p data-dcnode-id="5810"><span data-dcnode-id="5815" instrument_node="">Advocating for an "alternative economic system free of capitalism's structural flaws",</span><sup class="reference" data-dcnode-id="5812" id="cite_ref-36"><a data-dcnode-id="5813" href="#cite_note-36"><span data-dcnode-id="5814" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5811" instrument_node=""> economist Richard D. Wolff says reform agendas are fundamentally inadequate, given that capitalist corporations, the dominant institutions of the existing system, retain the incentives and the resources to undo any sort of reform policy. For example, Wolff goes on to say:
</span></p><span data-dcnode-id="5809" instrument_node="">
</span><link data-dcnode-id="5808" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="5781"><p data-dcnode-id="5782"><span data-dcnode-id="5807" instrument_node="">The </span><a data-dcnode-id="5805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Deal" title="New Deal"><span data-dcnode-id="5806" instrument_node="">New Deal</span></a><span data-dcnode-id="5804" instrument_node="">–era taxes on business and the rich and </span><a data-dcnode-id="5802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regulation" title="Regulation"><span data-dcnode-id="5803" instrument_node="">regulations</span></a><span data-dcnode-id="5801" instrument_node=""> of </span><a data-dcnode-id="5799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Entrepreneurship" title="Entrepreneurship"><span data-dcnode-id="5800" instrument_node="">enterprise</span></a><span data-dcnode-id="5798" instrument_node=""> behavior proved vulnerable and unsustainable. The enemies of the New Deal had the incentives (</span><a data-dcnode-id="5796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Profit_maximization" title="Profit maximization"><span data-dcnode-id="5797" instrument_node="">profit maximization</span></a><span data-dcnode-id="5795" instrument_node="">) and the resources (their returns on investments) to undo many of its reforms after </span><a data-dcnode-id="5793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="5794" instrument_node="">World War II</span></a><span data-dcnode-id="5792" instrument_node="">, with ever-greater effect in the period since the 1970s. They systematically evaded, then weakened, the taxes and regulations of the New Deal, and eventually, when politically possible, eliminated them altogether. Business profits funded the parties, politicians, public relations campaigns, and professional think tanks that together shaped the real social effects and historical decline of government economic regulation. Examples include the destruction of the </span><a class="mw-redirect" data-dcnode-id="5790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glass-Steagall_Act" title="Glass-Steagall Act"><span data-dcnode-id="5791" instrument_node="">Glass-Steagall Act</span></a><span data-dcnode-id="5789" instrument_node="">, the current assault on </span><a data-dcnode-id="5787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_Security_%28United_States%29" title="Social Security (United States)"><span data-dcnode-id="5788" instrument_node="">Social Security</span></a><span data-dcnode-id="5786" instrument_node="">, the shift in the federal tax burden from business to individuals and from upper- to middle-income individuals, and so on.</span><sup class="reference" data-dcnode-id="5783" id="cite_ref-37"><a data-dcnode-id="5784" href="#cite_note-37"><span data-dcnode-id="5785" instrument_node="">[37]</span></a></sup></p></blockquote><span data-dcnode-id="5780" instrument_node="">
</span><p data-dcnode-id="5756"><span data-dcnode-id="5779" instrument_node="">According to David Schweickart, a serious critique of any problem cannot be content to merely note the negative features of the existing </span><a data-dcnode-id="5777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scientific_modelling" title="Scientific modelling"><span data-dcnode-id="5778" instrument_node="">model</span></a><span data-dcnode-id="5776" instrument_node="">. Instead, we must specify precisely the structural features of an alternative: "But if we want to do more than simply denounce the evils of capitalism, we must confront the claim that 'there is no alternative'—by proposing one."</span><sup class="reference" data-dcnode-id="5773" id="cite_ref-FOOTNOTESchweickart200245_38-0"><a data-dcnode-id="5774" href="#cite_note-FOOTNOTESchweickart200245-38"><span data-dcnode-id="5775" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5772" instrument_node=""> Schweickart argued that both full employment and guaranteed basic income are impossible under the restrictions of the U.S. economic system for two primary reasons: a) unemployment is an essential feature of capitalism, not an indication of systemic failure;</span><sup class="reference" data-dcnode-id="5769" id="cite_ref-FOOTNOTESchweickart200297_12-1"><a data-dcnode-id="5770" href="#cite_note-FOOTNOTESchweickart200297-12"><span data-dcnode-id="5771" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5768" instrument_node=""> and b) while capitalism thrives under </span><a data-dcnode-id="5766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polyarchy" title="Polyarchy"><span data-dcnode-id="5767" instrument_node="">polyarchy</span></a><span data-dcnode-id="5765" instrument_node="">, it is not compatible with genuine democracy.</span><sup class="reference" data-dcnode-id="5762" id="cite_ref-FOOTNOTESchweickart2002151_39-0"><a data-dcnode-id="5763" href="#cite_note-FOOTNOTESchweickart2002151-39"><span data-dcnode-id="5764" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5761" instrument_node=""> Assuming these "democratic deficits" significantly impact the management of both the workplace and new investment,</span><sup class="reference" data-dcnode-id="5758" id="cite_ref-FOOTNOTESchweickart200246_40-0"><a data-dcnode-id="5759" href="#cite_note-FOOTNOTESchweickart200246-40"><span data-dcnode-id="5760" instrument_node="">[40]</span></a></sup><span data-dcnode-id="5757" instrument_node=""> many proponents of economic democracy tend to favor the creation and implementation of a new economic model over reform of the existing one.
</span></p><p data-dcnode-id="5747"><span data-dcnode-id="5755" instrument_node="">For example, </span><a class="mw-redirect" data-dcnode-id="5753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Luther_King%2C_Jr." title="Martin Luther King, Jr."><span data-dcnode-id="5754" instrument_node="">Dr. Martin Luther King Jr.</span></a><span data-dcnode-id="5752" instrument_node=""> claimed "Communism forgets that life is individual. Capitalism forgets that life is social, and the Kingdom of Brotherhood is found neither in the thesis of Communism nor the antithesis of Capitalism but in a higher synthesis. It is found in a higher synthesis that combines the truths of both".</span><sup class="reference" data-dcnode-id="5749" id="cite_ref-41"><a data-dcnode-id="5750" href="#cite_note-41"><span data-dcnode-id="5751" instrument_node="">[41]</span></a></sup><span data-dcnode-id="5748" instrument_node=""> Regarding the gap between productivity and purchasing power, Dr. King maintained:
</span></p><span data-dcnode-id="5746" instrument_node="">
</span><link data-dcnode-id="5745" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="5739"><p data-dcnode-id="5740"><span data-dcnode-id="5744" instrument_node="">The problem indicates that our emphasis must be two-fold. We must create full employment or we must create incomes. People must be made consumers by one method or the other. Once they are placed in this position, we need to be concerned that the potential of the individual is not wasted. New forms of work that enhance the social good will have to be devised for those for whom traditional jobs are not available.</span><sup class="reference" data-dcnode-id="5741" id="cite_ref-FOOTNOTEKing1968163_42-0"><a data-dcnode-id="5742" href="#cite_note-FOOTNOTEKing1968163-42"><span data-dcnode-id="5743" instrument_node="">[42]</span></a></sup></p></blockquote><span data-dcnode-id="5738" instrument_node="">
</span><p data-dcnode-id="5729"><span data-dcnode-id="5737" instrument_node="">According to historian and political economist, </span><a data-dcnode-id="5735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gar_Alperovitz" title="Gar Alperovitz"><span data-dcnode-id="5736" instrument_node="">Gar Alperovitz</span></a><span data-dcnode-id="5734" instrument_node="">: "King’s final judgment stands as instructive evidence of his understanding of the nature of systemic challenge — and also as a reminder that given the failures of both traditional socialism and corporate capitalism, it is time to get serious about clarifying not only the question of strategy, but what, in fact, the meaning of changing the system in a truly democratic direction might one day entail."</span><sup class="reference" data-dcnode-id="5731" id="cite_ref-43"><a data-dcnode-id="5732" href="#cite_note-43"><span data-dcnode-id="5733" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5730" instrument_node="">
</span></p><p data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">Trade unionist and social activist Allan Engler argued further that economic democracy was the working-class alternative to capitalism. In his book, "Economic Democracy", Engler stated:
</span></p><span data-dcnode-id="5726" instrument_node="">
</span><link data-dcnode-id="5725" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="5719"><p data-dcnode-id="5720"><span data-dcnode-id="5724" instrument_node="">When economic democracy – a world of human equality, democracy and cooperation – is the alternative, capitalism will no longer be seen as a lesser evil. When the working class, not a revolutionary party, is the agency of social transformation, change will be based on workplace organization, community mobilizations and democratic political action. The goal will be to transform capitalism into economic democracy through gains and reforms that improve living conditions while methodically replacing wealth-holders' entitlement with human entitlement, capitalist ownership with community ownership and master-servant relations with workplace democracy.</span><sup class="reference" data-dcnode-id="5721" id="cite_ref-FOOTNOTEEngler20108_44-0"><a data-dcnode-id="5722" href="#cite_note-FOOTNOTEEngler20108-44"><span data-dcnode-id="5723" instrument_node="">[44]</span></a></sup></p></blockquote><span data-dcnode-id="5718" instrument_node="">
</span><p data-dcnode-id="5706"><span data-dcnode-id="5717" instrument_node="">Assuming that "democracy is not just a political value, but one with profound economic implications, the problem is not to choose between </span><a data-dcnode-id="5715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planned_economy" title="Planned economy"><span data-dcnode-id="5716" instrument_node="">plan</span></a><span data-dcnode-id="5714" instrument_node=""> and </span><a data-dcnode-id="5712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Market_economy" title="Market economy"><span data-dcnode-id="5713" instrument_node="">market</span></a><span data-dcnode-id="5711" instrument_node="">, but to integrate these institutions into a democratic framework".</span><sup class="reference" data-dcnode-id="5708" id="cite_ref-Schweickart_Essay_45-0"><a data-dcnode-id="5709" href="#cite_note-Schweickart_Essay-45"><span data-dcnode-id="5710" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5707" instrument_node=""> Like capitalism, economic democracy can be defined in terms of three basic features:
</span></p><span data-dcnode-id="5705" instrument_node="">
</span><ul data-dcnode-id="5693"><li data-dcnode-id="5703"><span data-dcnode-id="5704" instrument_node="">Worker self-management: each productive enterprise is controlled democratically by its workers.</span></li><span data-dcnode-id="5702" instrument_node="">
</span><li data-dcnode-id="5697"><span data-dcnode-id="5701" instrument_node="">Social control of investment: funds for new investment are returned to the economy through a network of public investment banks.</span><sup class="reference" data-dcnode-id="5698" id="cite_ref-FOOTNOTESchweickart2002[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_10-4"><a data-dcnode-id="5699" href="#cite_note-FOOTNOTESchweickart2002%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-10"><span data-dcnode-id="5700" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="5696" instrument_node="">
</span><li data-dcnode-id="5694"><span data-dcnode-id="5695" instrument_node="">The market: enterprises interact with one another and with consumers in an environment largely free of governmental price controls. Raw materials, instruments of production and consumer goods are all bought and sold at prices largely determined by the forces of supply and demand.</span></li></ul><span data-dcnode-id="5692" instrument_node="">
</span><p data-dcnode-id="5686"><span data-dcnode-id="5691" instrument_node="">In real-world practice, Schweickart concedes economic democracy will be more complicated and less "pure" than his model. However, to grasp the nature of the system and to understand its essential dynamic, it is important to have a clear picture of the basic structure. Capitalism is characterized by private ownership of productive resources, the market, and wage labor. The Soviet economic model subordinated private ownership of productive resources to public ownership by collectivizing farms and factories. It further subordinated the market to central planning—but retained the institution of wage labor.</span><sup class="reference" data-dcnode-id="5688" id="cite_ref-FOOTNOTESchweickart200247_46-0"><a data-dcnode-id="5689" href="#cite_note-FOOTNOTESchweickart200247-46"><span data-dcnode-id="5690" instrument_node="">[46]</span></a></sup><span data-dcnode-id="5687" instrument_node="">
</span></p><p data-dcnode-id="5684"><span data-dcnode-id="5685" instrument_node="">Most proposed models for economic democracy generally begin with democratizing the workplace and the ownership of capital. Other proposals advocate replacing the market with some form of planning, as well.
</span></p><span data-dcnode-id="5683" instrument_node="">
</span><h3 data-dcnode-id="5673"><span class="mw-headline" data-dcnode-id="5681" id="Worker_self-management"><span data-dcnode-id="5682" instrument_node="">Worker self-management</span></span><span class="mw-editsection" data-dcnode-id="5674"><span class="mw-editsection-bracket" data-dcnode-id="5679"><span data-dcnode-id="5680" instrument_node="">[</span></span><a data-dcnode-id="5677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D8" title="Edit section: Worker self-management"><span data-dcnode-id="5678" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5675"><span data-dcnode-id="5676" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5672" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="5666" role="note"><span data-dcnode-id="5669" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="5667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Worker_self-management" title="Worker self-management"><span data-dcnode-id="5668" instrument_node="">Worker self-management</span></a></div><p data-dcnode-id="5657"><span data-dcnode-id="5665" instrument_node="">In worker self-management, each productive enterprise is controlled by those who work there. Workers are responsible for the operation of the facility, including organization, discipline, production techniques, and the nature, price, and distribution of products. Decisions concerning distribution are made democratically. Problems of authority delegation are solved by democratic representation. Management is chosen by the worker, not appointed by the State, not elected by the community at large and not selected by a board of directors elected by </span><a class="mw-redirect" data-dcnode-id="5663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stockholder" title="Stockholder"><span data-dcnode-id="5664" instrument_node="">stockholders</span></a><span data-dcnode-id="5662" instrument_node="">. Ultimate authority rests with the enterprise's workers, following the one-person, one-vote principle.</span><sup class="reference" data-dcnode-id="5659" id="cite_ref-FOOTNOTESchweickart200247–48_47-0"><a data-dcnode-id="5660" href="#cite_note-FOOTNOTESchweickart200247%E2%80%9348-47"><span data-dcnode-id="5661" instrument_node="">[47]</span></a></sup><span data-dcnode-id="5658" instrument_node="">
</span></p><p data-dcnode-id="5642"><span data-dcnode-id="5656" instrument_node="">According to veteran </span><a data-dcnode-id="5654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Bank" title="World Bank"><span data-dcnode-id="5655" instrument_node="">World Bank</span></a><span data-dcnode-id="5653" instrument_node=""> economic adviser </span><a data-dcnode-id="5651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Ellerman" title="David Ellerman"><span data-dcnode-id="5652" instrument_node="">David P. Ellerman</span></a><span data-dcnode-id="5650" instrument_node=""> it's the </span><a data-dcnode-id="5648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Employment_contract" title="Employment contract"><span data-dcnode-id="5649" instrument_node="">employment contract</span></a><span data-dcnode-id="5647" instrument_node=""> that needs to be abolished, not private property. In other words, "a firm can be socialized and yet remain 'private' in the sense of not being government-owned."</span><sup class="reference" data-dcnode-id="5644" id="cite_ref-FOOTNOTEEllerman199056_48-0"><a data-dcnode-id="5645" href="#cite_note-FOOTNOTEEllerman199056-48"><span data-dcnode-id="5646" instrument_node="">[48]</span></a></sup><span data-dcnode-id="5643" instrument_node=""> In his book, "The Democratic Firm", Ellerman stated:
</span></p><span data-dcnode-id="5641" instrument_node="">
</span><link data-dcnode-id="5640" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="5625"><p data-dcnode-id="5626"><span data-dcnode-id="5639" instrument_node="">In the world today, the main form of enterprise is based on renting human beings (</span><a class="mw-redirect" data-dcnode-id="5637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Private_company" title="Private company"><span data-dcnode-id="5638" instrument_node="">privately</span></a><span data-dcnode-id="5636" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="5634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_enterprise" title="Public enterprise"><span data-dcnode-id="5635" instrument_node="">publicly</span></a><span data-dcnode-id="5633" instrument_node="">). Our task is to construct the alternative. In the alternative type of firm, employment by the firm is replaced with membership in the firm. Economic democracy requires the abolition of the employment relation, not the abolition of </span><a data-dcnode-id="5631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Private_property" title="Private property"><span data-dcnode-id="5632" instrument_node="">private property</span></a><span data-dcnode-id="5630" instrument_node="">. Democracy can be married with private property in the workplace; the result of the union is the democratic worker-owned firm.</span><sup class="reference" data-dcnode-id="5627" id="cite_ref-FOOTNOTEEllerman199044–49_49-0"><a data-dcnode-id="5628" href="#cite_note-FOOTNOTEEllerman199044%E2%80%9349-49"><span data-dcnode-id="5629" instrument_node="">[49]</span></a></sup></p></blockquote><span data-dcnode-id="5624" instrument_node="">
</span><p data-dcnode-id="5609"><span data-dcnode-id="5623" instrument_node="">Alternately, in Schweickart's model, workers control the workplace, but they do not "own" the means of production. Productive resources are regarded as the collective property of the society. Workers run the enterprise, use its capital assets as they see fit, and distribute the profits among themselves. Here, societal "ownership" of the enterprise manifests itself in two ways: 1) All firms pay tax on their </span><a data-dcnode-id="5621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_asset" title="Capital asset"><span data-dcnode-id="5622" instrument_node="">capital assets</span></a><span data-dcnode-id="5620" instrument_node="">, which goes into society's investment fund. In effect, workers rent capital assets from society. 2) Firms are required to preserve the value of the </span><a class="mw-redirect" data-dcnode-id="5618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_stock" title="Capital stock"><span data-dcnode-id="5619" instrument_node="">capital stock</span></a><span data-dcnode-id="5617" instrument_node=""> entrusted to them. This means that a </span><a data-dcnode-id="5615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Depreciation" title="Depreciation"><span data-dcnode-id="5616" instrument_node="">depreciation</span></a><span data-dcnode-id="5614" instrument_node=""> fund must be maintained to repair or replace existing capital stock. This money may be spent on capital replacements or improvements, but not to supplement workers' incomes. </span><sup class="reference" data-dcnode-id="5611" id="cite_ref-FOOTNOTESchweickart200247–49_50-0"><a data-dcnode-id="5612" href="#cite_note-FOOTNOTESchweickart200247%E2%80%9349-50"><span data-dcnode-id="5613" instrument_node="">[50]</span></a></sup><span data-dcnode-id="5610" instrument_node="">
</span></p><p data-dcnode-id="5594"><span data-dcnode-id="5608" instrument_node="">Italy's </span><a data-dcnode-id="5606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Legacoop" title="Legacoop"><span data-dcnode-id="5607" instrument_node="">Legacoop</span></a><span data-dcnode-id="5605" instrument_node=""> and Spain's </span><a data-dcnode-id="5603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mondragon_Corporation" title="Mondragon Corporation"><span data-dcnode-id="5604" instrument_node="">Mondragon</span></a><span data-dcnode-id="5602" instrument_node=""> multi-sectoral worker-cooperatives have both been able to reach significant scale and demonstrate long-term sustainability. According to a study conducted by </span><a data-dcnode-id="5600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Massachusetts_Institute_of_Technology" title="Massachusetts Institute of Technology"><span data-dcnode-id="5601" instrument_node="">Massachusetts Institute of Technology</span></a><span data-dcnode-id="5599" instrument_node="">, the greatest lesson to be learned from these European experiences is the importance of developing an economically integrated network of cooperatives rather than a single cooperative.</span><sup class="reference" data-dcnode-id="5596" id="cite_ref-51"><a data-dcnode-id="5597" href="#cite_note-51"><span data-dcnode-id="5598" instrument_node="">[51]</span></a></sup><span data-dcnode-id="5595" instrument_node=""> The report goes on to say:
</span></p><span data-dcnode-id="5593" instrument_node="">
</span><link data-dcnode-id="5592" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="5589"><p data-dcnode-id="5590"><span data-dcnode-id="5591" instrument_node="">In a market based economy the cooperative business form suffers from several strategic challenges when operating independently. One worker cooperative on its own is most likely doomed to fail in a highly competitive global economy. However, an ecosystem of several worker cooperatives and support organizations can create an infrastructure that leads to sustained growth and expansion. In Mondragon the cooperative network expanded from a single cooperative polytechnic school to a network of 256 industrial, retail, finance, educational, and research and development firms.</span></p></blockquote><span data-dcnode-id="5588" instrument_node="">
</span><h3 data-dcnode-id="5578"><span class="mw-headline" data-dcnode-id="5586" id="Social_control_of_investment"><span data-dcnode-id="5587" instrument_node="">Social control of investment</span></span><span class="mw-editsection" data-dcnode-id="5579"><span class="mw-editsection-bracket" data-dcnode-id="5584"><span data-dcnode-id="5585" instrument_node="">[</span></span><a data-dcnode-id="5582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D9" title="Edit section: Social control of investment"><span data-dcnode-id="5583" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5580"><span data-dcnode-id="5581" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5577" instrument_node="">
</span><p data-dcnode-id="5556"><span data-dcnode-id="5576" instrument_node="">While there is no single approach or 'blueprint' for social control of investment, many strategies have been proposed. For example, </span><a data-dcnode-id="5574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gar_Alperovitz" title="Gar Alperovitz"><span data-dcnode-id="5575" instrument_node="">Gar Alperovitz</span></a><span data-dcnode-id="5573" instrument_node=""> claims many real-world strategies have already emerged to democratize and decentralize the ownership of wealth and capital. In addition to worker cooperatives, Alperovitz highlights ESOPs, </span><a data-dcnode-id="5571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Credit_union" title="Credit union"><span data-dcnode-id="5572" instrument_node="">credit unions</span></a><span data-dcnode-id="5570" instrument_node=""> and other cooperative forms, </span><a data-dcnode-id="5568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_enterprise" title="Social enterprise"><span data-dcnode-id="5569" instrument_node="">social enterprises</span></a><span data-dcnode-id="5567" instrument_node="">, municipally owned utilities and </span><a data-dcnode-id="5565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_bank" title="Public bank"><span data-dcnode-id="5566" instrument_node="">public banks</span></a><span data-dcnode-id="5564" instrument_node=""> as starting points for what he has termed a "</span><a data-dcnode-id="5562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pluralist_commonwealth" title="Pluralist commonwealth"><span data-dcnode-id="5563" instrument_node="">Pluralist Commonwealth</span></a><span data-dcnode-id="5561" instrument_node="">".</span><sup class="reference" data-dcnode-id="5558" id="cite_ref-52"><a data-dcnode-id="5559" href="#cite_note-52"><span data-dcnode-id="5560" instrument_node="">[52]</span></a></sup><span data-dcnode-id="5557" instrument_node="">
</span></p><p data-dcnode-id="5548"><span data-dcnode-id="5555" instrument_node="">Alternately, David Schweickart proposes a </span><a data-dcnode-id="5553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flat_tax" title="Flat tax"><span data-dcnode-id="5554" instrument_node="">flat-rate tax</span></a><span data-dcnode-id="5552" instrument_node=""> on capital assets to replace all other business taxes. This "capital assets tax" is collected and invested by the central government. Funds are dispersed throughout society, first to regions and communities on a per capita basis, then to public banks in accordance with past performance, then to those firms with profitable </span><a data-dcnode-id="5550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Project" title="Project"><span data-dcnode-id="5551" instrument_node="">project</span></a><span data-dcnode-id="5549" instrument_node=""> proposals. Profitable projects that promise increased employment are favored over those that do not. At each level, national, regional and local, legislatures decide what portion of their funds is to be used for public capital expenditures, then send the remainder to the next lower level. Associated with most banks are entrepreneurial divisions, which promote firm expansion and new firm creation. For large (regional or national) enterprises, local investment banks are complemented by regional and national investment banks. These too would be public institutions that receive their funds from the national investment fund.
</span></p><p data-dcnode-id="5533"><span data-dcnode-id="5547" instrument_node="">Banks are public, not private, institutions that make </span><a data-dcnode-id="5545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grant_%28money%29" title="Grant (money)"><span data-dcnode-id="5546" instrument_node="">grants</span></a><span data-dcnode-id="5544" instrument_node="">, not loans, to business enterprises. According to Schweickart, these grants do not represent "free money", since an investment grant counts as an addition to the capital assets of the enterprise, upon which the capital-asset tax must be paid. Thus the capital assets tax functions as an interest rate. A bank grant is essentially a loan requiring </span><a data-dcnode-id="5542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interest" title="Interest"><span data-dcnode-id="5543" instrument_node="">interest</span></a><span data-dcnode-id="5541" instrument_node=""> payments but no repayment of </span><a data-dcnode-id="5539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Debt" title="Debt"><span data-dcnode-id="5540" instrument_node="">principal</span></a><span data-dcnode-id="5538" instrument_node="">.</span><sup class="reference" data-dcnode-id="5535" id="cite_ref-FOOTNOTESchweickart200256_53-0"><a data-dcnode-id="5536" href="#cite_note-FOOTNOTESchweickart200256-53"><span data-dcnode-id="5537" instrument_node="">[53]</span></a></sup><span data-dcnode-id="5534" instrument_node="">
</span></p><p data-dcnode-id="5518"><span data-dcnode-id="5532" instrument_node="">While an economy of worker-self-managed enterprises might tend toward lower unemployment than under capitalism - because banks are mandated to consistently prioritize investment projects that would increase employment - Schweickart notes that it does not guarantee </span><a data-dcnode-id="5530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Full_employment" title="Full employment"><span data-dcnode-id="5531" instrument_node="">full employment</span></a><span data-dcnode-id="5529" instrument_node="">. Social control of investment serves to increase employment. If the market provides insufficient employment, the public sector becomes the </span><a data-dcnode-id="5527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Employer_of_last_resort" title="Employer of last resort"><span data-dcnode-id="5528" instrument_node="">employer of last resort</span></a><span data-dcnode-id="5526" instrument_node="">. The original formulation of the </span><a class="mw-redirect" data-dcnode-id="5524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Humphrey-Hawkins_Full_Employment_Act" title="Humphrey-Hawkins Full Employment Act"><span data-dcnode-id="5525" instrument_node="">U.S. Humphrey-Hawkins Act of 1978</span></a><span data-dcnode-id="5523" instrument_node=""> assumed that only in this way could full employment be assured in a market economy. Economic Democracy adopts this approach. Social control of investment then blocks the cyclical unemployment typical of capitalism.</span><sup class="reference" data-dcnode-id="5520" id="cite_ref-FOOTNOTESchweickart2002135,_136_54-0"><a data-dcnode-id="5521" href="#cite_note-FOOTNOTESchweickart2002135,_136-54"><span data-dcnode-id="5522" instrument_node="">[54]</span></a></sup><span data-dcnode-id="5519" instrument_node="">
</span></p><span data-dcnode-id="5517" instrument_node="">
</span><h3 data-dcnode-id="5507"><span class="mw-headline" data-dcnode-id="5515" id="The_market"><span data-dcnode-id="5516" instrument_node="">The market</span></span><span class="mw-editsection" data-dcnode-id="5508"><span class="mw-editsection-bracket" data-dcnode-id="5513"><span data-dcnode-id="5514" instrument_node="">[</span></span><a data-dcnode-id="5511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D10" title="Edit section: The market"><span data-dcnode-id="5512" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5509"><span data-dcnode-id="5510" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5506" instrument_node="">
</span><p data-dcnode-id="5482"><span data-dcnode-id="5505" instrument_node="">Hungarian historian </span><a data-dcnode-id="5503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Polanyi" title="Karl Polanyi"><span data-dcnode-id="5504" instrument_node="">Karl Polanyi</span></a><span data-dcnode-id="5502" instrument_node=""> suggested that market economies should subordinate themselves to larger societal needs. He states that human-beings, the source of </span><a class="mw-redirect" data-dcnode-id="5500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_%28economics%29" title="Labour (economics)"><span data-dcnode-id="5501" instrument_node="">labor</span></a><span data-dcnode-id="5499" instrument_node="">, do not reproduce for the sole purpose of providing the market with workers. In </span><i data-dcnode-id="5496"><a data-dcnode-id="5497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Great_Transformation_%28book%29" title="The Great Transformation (book)"><span data-dcnode-id="5498" instrument_node="">The Great Transformation</span></a></i><span data-dcnode-id="5495" instrument_node="">, Polanyi says that while modern states and market economies tend to grow under capitalism, both are mutually interdependent for functional development. In order for market economies to be truly prosperous, he claims social constructs must play an essential role. Polanyi claimed that </span><a data-dcnode-id="5493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Land_%28economics%29" title="Land (economics)"><span data-dcnode-id="5494" instrument_node="">land</span></a><span data-dcnode-id="5492" instrument_node="">, labor, and money are all </span><a class="mw-redirect" data-dcnode-id="5490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commodities" title="Commodities"><span data-dcnode-id="5491" instrument_node="">commodified</span></a><span data-dcnode-id="5489" instrument_node=""> under capitalism, though the inherent purpose of these items was never intended "for sale"—what he labels "</span><a data-dcnode-id="5487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fictitious_commodities" title="Fictitious commodities"><span data-dcnode-id="5488" instrument_node="">fictitious commodities</span></a><span data-dcnode-id="5486" instrument_node="">." He says </span><a class="mw-redirect" data-dcnode-id="5484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_resources" title="Natural resources"><span data-dcnode-id="5485" instrument_node="">natural resources</span></a><span data-dcnode-id="5483" instrument_node=""> are "God-given", money is a bookkeeping entry validated by law, and labor is a human prerogative, not a personal obligation to market economies.
</span></p><p data-dcnode-id="5458"><span data-dcnode-id="5481" instrument_node="">Schweickart's economic democracy is a form of </span><a data-dcnode-id="5479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Market_economy" title="Market economy"><span data-dcnode-id="5480" instrument_node="">market economy</span></a><span data-dcnode-id="5478" instrument_node="">, at least insofar as the allocation of </span><a class="mw-redirect" data-dcnode-id="5476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consumer_goods" title="Consumer goods"><span data-dcnode-id="5477" instrument_node="">consumer</span></a><span data-dcnode-id="5475" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_goods" title="Capital goods"><span data-dcnode-id="5474" instrument_node="">capital goods</span></a><span data-dcnode-id="5472" instrument_node=""> is concerned. </span><a class="mw-redirect" data-dcnode-id="5470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Business_entity" title="Business entity"><span data-dcnode-id="5471" instrument_node="">Firms</span></a><span data-dcnode-id="5469" instrument_node=""> buy </span><a class="mw-redirect" data-dcnode-id="5467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raw_materials" title="Raw materials"><span data-dcnode-id="5468" instrument_node="">raw materials</span></a><span data-dcnode-id="5466" instrument_node=""> and machinery from other firms and sell their products to other enterprises or consumers. "Prices are largely </span><a data-dcnode-id="5464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regulation" title="Regulation"><span data-dcnode-id="5465" instrument_node="">unregulated</span></a><span data-dcnode-id="5463" instrument_node=""> except by supply and demand, although in some cases price controls or price supports might be in order – as they are deemed in order in most real-world forms of capitalism."</span><sup class="reference" data-dcnode-id="5460" id="cite_ref-FOOTNOTESchweickart2002[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_10-5"><a data-dcnode-id="5461" href="#cite_note-FOOTNOTESchweickart2002%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-10"><span data-dcnode-id="5462" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5459" instrument_node="">
</span></p><p data-dcnode-id="5441"><span data-dcnode-id="5457" instrument_node="">Without a </span><a data-dcnode-id="5455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Price_mechanism" title="Price mechanism"><span data-dcnode-id="5456" instrument_node="">price mechanism</span></a><span data-dcnode-id="5454" instrument_node=""> sensitive to supply and demand, it is extremely difficult for a producer or planner to know what and how much to produce, and which production and marketing methods are the most efficient. Otherwise, it is difficult to motivate producers to be both efficient and </span><a data-dcnode-id="5452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Innovation" title="Innovation"><span data-dcnode-id="5453" instrument_node="">innovative</span></a><span data-dcnode-id="5451" instrument_node="">. </span><a data-dcnode-id="5449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Competition_%28economics%29" title="Competition (economics)"><span data-dcnode-id="5450" instrument_node="">Market competition</span></a><span data-dcnode-id="5448" instrument_node=""> resolves these problems, to a significant if incomplete degree, in a </span><a data-dcnode-id="5446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authoritarianism" title="Authoritarianism"><span data-dcnode-id="5447" instrument_node="">non-authoritarian</span></a><span data-dcnode-id="5445" instrument_node="">, </span><a data-dcnode-id="5443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bureaucracy" title="Bureaucracy"><span data-dcnode-id="5444" instrument_node="">non-bureaucratic</span></a><span data-dcnode-id="5442" instrument_node=""> fashion.
</span></p><p data-dcnode-id="5435"><span data-dcnode-id="5440" instrument_node="">Enterprises still strive to make a profit. However, "profit" in a worker-run firm is calculated differently than under capitalism. For a capitalist firm, labor is counted as a cost. For a worker-run enterprise it is not. Labor is not another "factor of production" on par with land and capital. Labor is the residual claimant. Workers get all that remains, once other costs, including depreciation set asides and the capital assets tax, have been paid.</span><sup class="reference" data-dcnode-id="5437" id="cite_ref-FOOTNOTESchweickart200249_55-0"><a data-dcnode-id="5438" href="#cite_note-FOOTNOTESchweickart200249-55"><span data-dcnode-id="5439" instrument_node="">[55]</span></a></sup><span data-dcnode-id="5436" instrument_node="">
</span></p><p data-dcnode-id="5414"><span data-dcnode-id="5434" instrument_node="">Because of the way workplaces and the investment mechanism are structured, Schweickart's model aims to facilitate </span><a data-dcnode-id="5432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fair_trade" title="Fair trade"><span data-dcnode-id="5433" instrument_node="">fair trade</span></a><span data-dcnode-id="5431" instrument_node="">, not </span><a data-dcnode-id="5429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_trade" title="Free trade"><span data-dcnode-id="5430" instrument_node="">free trade</span></a><span data-dcnode-id="5428" instrument_node="">, between nations. Under Economic Democracy, there would be virtually no cross-border capital flows. Enterprises themselves would not relocate abroad, since they are democratically controlled by their own workers. </span><a data-dcnode-id="5426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_capital" title="Financial capital"><span data-dcnode-id="5427" instrument_node="">Finance capital</span></a><span data-dcnode-id="5425" instrument_node=""> stays mostly at home, since funds for investment are publicly generated and are mandated by law to be reinvested domestically. "Capital doesn't flow into the country, either, since there are no </span><a data-dcnode-id="5423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stock" title="Stock"><span data-dcnode-id="5424" instrument_node="">stocks</span></a><span data-dcnode-id="5422" instrument_node=""> nor </span><a data-dcnode-id="5420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bond_%28finance%29" title="Bond (finance)"><span data-dcnode-id="5421" instrument_node="">corporate bonds</span></a><span data-dcnode-id="5419" instrument_node=""> nor businesses to buy. The capital assets of the country are collectively owned – and hence not for sale."</span><sup class="reference" data-dcnode-id="5416" id="cite_ref-FOOTNOTESchweickart200263_56-0"><a data-dcnode-id="5417" href="#cite_note-FOOTNOTESchweickart200263-56"><span data-dcnode-id="5418" instrument_node="">[56]</span></a></sup><span data-dcnode-id="5415" instrument_node="">
</span></p><p data-dcnode-id="5405"><span data-dcnode-id="5413" instrument_node="">According to Michael Howard, "in preserving commodity exchange, a </span><a data-dcnode-id="5411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Market_socialism" title="Market socialism"><span data-dcnode-id="5412" instrument_node="">market socialism</span></a><span data-dcnode-id="5410" instrument_node=""> has greater continuity with the society it displaces than does nonmarket socialism, and thus it is more likely to emerge from capitalism as a result of tendencies generated within it." But Howard also suggested, "one argument against the market in socialist society has been that it blocks progress toward full communism or even leads back to capitalism".</span><sup class="reference" data-dcnode-id="5407" id="cite_ref-Rose_In_The_Fist_57-0"><a data-dcnode-id="5408" href="#cite_note-Rose_In_The_Fist-57"><span data-dcnode-id="5409" instrument_node="">[57]</span></a></sup><span data-dcnode-id="5406" instrument_node=""> From this perspective, nonmarket models of economic democracy have also been proposed.
</span></p><span data-dcnode-id="5404" instrument_node="">
</span><h3 data-dcnode-id="5394"><span class="mw-headline" data-dcnode-id="5402" id="Economic_democracy_as_part_of_an_inclusive_democracy"><span data-dcnode-id="5403" instrument_node="">Economic democracy as part of an inclusive democracy</span></span><span class="mw-editsection" data-dcnode-id="5395"><span class="mw-editsection-bracket" data-dcnode-id="5400"><span data-dcnode-id="5401" instrument_node="">[</span></span><a data-dcnode-id="5398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D11" title="Edit section: Economic democracy as part of an inclusive democracy"><span data-dcnode-id="5399" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5396"><span data-dcnode-id="5397" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5393" instrument_node="">
</span><link data-dcnode-id="5392" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5388" role="note"><span data-dcnode-id="5391" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="5389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inclusive_democracy" title="Inclusive democracy"><span data-dcnode-id="5390" instrument_node="">Inclusive democracy</span></a></div><span data-dcnode-id="5387" instrument_node="">
</span><p data-dcnode-id="5379"><span data-dcnode-id="5386" instrument_node="">Economic democracy is described as an integral component of an </span><a class="mw-redirect" data-dcnode-id="5384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inclusive_democracy" title="Inclusive democracy"><span data-dcnode-id="5385" instrument_node="">inclusive democracy</span></a><span data-dcnode-id="5383" instrument_node=""> in Takis Fotopoulos' </span><i data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">Towards An Inclusive Democracy</span></i><span data-dcnode-id="5380" instrument_node=""> as a stateless, moneyless and marketless economy that precludes private accumulation of wealth and the institutionalization of privileges for some sections of society, without relying on a mythical post-scarcity state of abundance, or sacrificing freedom of choice.
</span></p><p data-dcnode-id="5353"><span data-dcnode-id="5378" instrument_node="">The proposed system aims to meet the basic needs of all citizens (</span><a class="mw-redirect" data-dcnode-id="5376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Macroeconomic" title="Macroeconomic"><span data-dcnode-id="5377" instrument_node="">macroeconomic</span></a><span data-dcnode-id="5375" instrument_node=""> decisions), and secure freedom of choice (</span><a class="mw-redirect" data-dcnode-id="5373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microeconomic" title="Microeconomic"><span data-dcnode-id="5374" instrument_node="">microeconomic</span></a><span data-dcnode-id="5372" instrument_node=""> decisions). Therefore, the system consists of two basic elements: (1) democratic planning, which involves a feedback process between workplace assemblies, demotic assemblies and a confederal assembly, and (2) an artificial market using </span><a data-dcnode-id="5370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_voucher" title="Labour voucher"><span data-dcnode-id="5371" instrument_node="">personal vouchers</span></a><span data-dcnode-id="5369" instrument_node="">, which ensures </span><a data-dcnode-id="5367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Choice" title="Choice"><span data-dcnode-id="5368" instrument_node="">freedom of choice</span></a><span data-dcnode-id="5366" instrument_node=""> but avoids the adverse effects of real markets. Although David Pepper called this system "a form of money based on the labour theory of value",</span><sup class="reference" data-dcnode-id="5363" id="cite_ref-58"><a data-dcnode-id="5364" href="#cite_note-58"><span data-dcnode-id="5365" instrument_node="">[58]</span></a></sup><span data-dcnode-id="5362" instrument_node=""> it is not a money model since vouchers cannot be used as a general medium of exchange and store of wealth.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5355" style="white-space:nowrap;"><span data-dcnode-id="5361" instrument_node="">[</span><i data-dcnode-id="5357"><a data-dcnode-id="5358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5359" title="This claim needs references to reliable sources. (January 2012)"><span data-dcnode-id="5360" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5356" instrument_node="">]</span></sup><span data-dcnode-id="5354" instrument_node="">
</span></p><p data-dcnode-id="5336"><span data-dcnode-id="5352" instrument_node="">Another distinguishing feature of inclusive democracy is its distinction between basic and non-basic needs. Remuneration is determined separately according to the cost of basic needs, and according to degree of effort for non-basic needs. Inclusive democracy is based on the principle that meeting basic needs is a fundamental human right which is guaranteed to all who are in a physical condition to offer a minimal amount of work. By contrast, </span><a data-dcnode-id="5350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Participatory_economics" title="Participatory economics"><span data-dcnode-id="5351" instrument_node="">participatory economics</span></a><span data-dcnode-id="5349" instrument_node=""> guarantees that basic needs are satisfied only for public goods or are covered by compassion and by a guaranteed basic income for the unemployed and those who cannot work.</span><sup class="reference" data-dcnode-id="5346" id="cite_ref-59"><a data-dcnode-id="5347" href="#cite_note-59"><span data-dcnode-id="5348" instrument_node="">[59]</span></a></sup><span data-dcnode-id="5345" instrument_node=""> Many advocates of participatory economics and Participism have contested this.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5338" style="white-space:nowrap;"><span data-dcnode-id="5344" instrument_node="">[</span><i data-dcnode-id="5340"><a data-dcnode-id="5341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5342" title="This claim needs references to reliable sources. (January 2012)"><span data-dcnode-id="5343" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5339" instrument_node="">]</span></sup><span data-dcnode-id="5337" instrument_node="">
</span></p><p data-dcnode-id="5326"><span data-dcnode-id="5335" instrument_node="">As part of inclusive democracy, economic democracy is the authority of demos (community) in the economic sphere—which requires equal distribution of economic power. Therefore, all macroeconomic decisions (overall level of production, consumption and investment, amounts of work and leisure implied, technologies to be used and so on) are made collectively and without representation. However, microeconomic decisions are made by the individual production or consumption unit through a proposed system of vouchers.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5328" style="white-space:nowrap;"><span data-dcnode-id="5334" instrument_node="">[</span><i data-dcnode-id="5330"><a data-dcnode-id="5331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5332" title="This claim needs references to reliable sources. (January 2012)"><span data-dcnode-id="5333" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5329" instrument_node="">]</span></sup><span data-dcnode-id="5327" instrument_node="">
</span></p><p data-dcnode-id="5324"><span data-dcnode-id="5325" instrument_node="">As with the case of direct democracy, economic democracy is only feasible if the participants can easily cooperate.
</span></p><span data-dcnode-id="5323" instrument_node="">
</span><h2 data-dcnode-id="5313"><span class="mw-headline" data-dcnode-id="5321" id="Reform_agendas"><span data-dcnode-id="5322" instrument_node="">Reform agendas</span></span><span class="mw-editsection" data-dcnode-id="5314"><span class="mw-editsection-bracket" data-dcnode-id="5319"><span data-dcnode-id="5320" instrument_node="">[</span></span><a data-dcnode-id="5317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D12" title="Edit section: Reform agendas"><span data-dcnode-id="5318" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5315"><span data-dcnode-id="5316" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5312" instrument_node="">
</span><p data-dcnode-id="5307"><span data-dcnode-id="5311" instrument_node="">While </span><a data-dcnode-id="5309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reform_movement" title="Reform movement"><span data-dcnode-id="5310" instrument_node="">reform agendas</span></a><span data-dcnode-id="5308" instrument_node=""> tend to critique the existing system and recommend corrective measures, they do not necessarily suggest alternative models to replace the fundamental structures of capitalism; private ownership of productive resources, the market and wage labor.
</span></p><span data-dcnode-id="5306" instrument_node="">
</span><h3 data-dcnode-id="5296"><span class="mw-headline" data-dcnode-id="5304" id="Social_credit"><span data-dcnode-id="5305" instrument_node="">Social credit</span></span><span class="mw-editsection" data-dcnode-id="5297"><span class="mw-editsection-bracket" data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">[</span></span><a data-dcnode-id="5300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D13" title="Edit section: Social credit"><span data-dcnode-id="5301" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5298"><span data-dcnode-id="5299" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5295" instrument_node="">
</span><link data-dcnode-id="5294" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5290" role="note"><span data-dcnode-id="5293" instrument_node="">Main article: </span><a data-dcnode-id="5291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_credit" title="Social credit"><span data-dcnode-id="5292" instrument_node="">Social credit</span></a></div><span data-dcnode-id="5289" instrument_node="">
</span><p data-dcnode-id="5256"><span data-dcnode-id="5288" instrument_node="">Rather than an economic shortfall, many analysts</span><sup class="noprint Inline-Template" data-dcnode-id="5281" style="white-space:nowrap;"><span data-dcnode-id="5287" instrument_node="">[</span><i data-dcnode-id="5283"><a data-dcnode-id="5284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Words_to_watch%23Unsupported_attributions" title="Wikipedia:Manual of Style/Words to watch"><span data-dcnode-id="5285" title="The material near this tag possibly uses too-vague attribution or weasel words. (January 2012)"><span data-dcnode-id="5286" instrument_node="">who?</span></span></a></i><span data-dcnode-id="5282" instrument_node="">]</span></sup><span data-dcnode-id="5280" instrument_node=""> consider the gap between production and purchasing power a social dividend. In this view, credit is a </span><a data-dcnode-id="5278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_utility" title="Public utility"><span data-dcnode-id="5279" instrument_node="">public utility</span></a><span data-dcnode-id="5277" instrument_node=""> rather than debt to financial centers. Once reinvested in human productive potential, the </span><a data-dcnode-id="5275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_surplus" title="Economic surplus"><span data-dcnode-id="5276" instrument_node="">surplus</span></a><span data-dcnode-id="5274" instrument_node=""> of societal output could actually increase Gross Domestic Product rather than throttling it, resulting in a more efficient economy, overall.</span><sup class="reference" data-dcnode-id="5271" id="cite_ref-FOOTNOTECook,_&quot;Monetary_Reform&quot;_Part_12007_60-0"><a data-dcnode-id="5272" href="#cite_note-FOOTNOTECook,_%22Monetary_Reform%22_Part_12007-60"><span data-dcnode-id="5273" instrument_node="">[60]</span></a></sup><span data-dcnode-id="5270" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="5268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_Credit" title="Social Credit"><span data-dcnode-id="5269" instrument_node="">Social Credit</span></a><span data-dcnode-id="5267" instrument_node=""> is an economic reform movement that originates from theories developed by Scottish engineer Major </span><a data-dcnode-id="5265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/C._H._Douglas" title="C. H. Douglas"><span data-dcnode-id="5266" instrument_node="">C. H. Douglas</span></a><span data-dcnode-id="5264" instrument_node="">. His aim to make societal improvement the goal of economic systems is reflected in the term "Social Credit", and published in his book, entitled </span><i data-dcnode-id="5262"><span data-dcnode-id="5263" instrument_node="">Economic Democracy</span></i><span data-dcnode-id="5261" instrument_node="">. In this view, the term "economic democracy" does not mean worker control of industry.</span><sup class="reference" data-dcnode-id="5258" id="cite_ref-Douglas_CP&amp;D_61-0"><a data-dcnode-id="5259" href="#cite_note-Douglas_CP&amp;D-61"><span data-dcnode-id="5260" instrument_node="">[61]</span></a></sup><span data-dcnode-id="5257" instrument_node="">
</span></p><p data-dcnode-id="5254"><span data-dcnode-id="5255" instrument_node="">A national dividend and a compensated price mechanism are the two most essential components of the Social Credit program. While these measures have never been implemented in their purest form, they have provided a foundation for Social Credit political parties in many countries and for reform agendas that retain the title, "economic democracy".
</span></p><span data-dcnode-id="5253" instrument_node="">
</span><h4 data-dcnode-id="5243"><span class="mw-headline" data-dcnode-id="5251" id="National_dividend"><span data-dcnode-id="5252" instrument_node="">National dividend</span></span><span class="mw-editsection" data-dcnode-id="5244"><span class="mw-editsection-bracket" data-dcnode-id="5249"><span data-dcnode-id="5250" instrument_node="">[</span></span><a data-dcnode-id="5247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D14" title="Edit section: National dividend"><span data-dcnode-id="5248" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5245"><span data-dcnode-id="5246" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5242" instrument_node="">
</span><p data-dcnode-id="5231"><span data-dcnode-id="5241" instrument_node="">In his book, </span><i data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">Capitalism 3.0</span></i><span data-dcnode-id="5238" instrument_node="">, Peter Barnes likens a "National Dividend" to the game of </span><a data-dcnode-id="5236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monopoly_%28game%29" title="Monopoly (game)"><span data-dcnode-id="5237" instrument_node="">Monopoly</span></a><span data-dcnode-id="5235" instrument_node="">, where all players start with a fair distribution of financial opportunity to succeed, and try to privatize as much as they can as they move around "the commons". Distinguishing the board game from real-world business, Barnes claims that "the top 5 percent of the population owns more </span><a data-dcnode-id="5233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Property" title="Property"><span data-dcnode-id="5234" instrument_node="">property</span></a><span data-dcnode-id="5232" instrument_node=""> than the remaining 95 percent", providing the smaller minority with an unfair advantage of approximately "$5-trillion" annually, at the beginning of the game. Contrasting "redistribution" of income (or property) with "predistribution", Barnes argues for "propertizing" (without corporately privatizing) "the commons" to spread ownership universally, without taking wealth from some and giving it to others. His suggested mechanism to this end is the establishment of a "Commons Sector", ensuring payment from the Corporate Sector for "the commons" they utilize, and equitably distributing the proceeds for the benefit of contemporary and future generations of society.
</span></p><p data-dcnode-id="5219"><span data-dcnode-id="5230" instrument_node="">One real-world example of such reform is in the U.S. State of </span><a data-dcnode-id="5228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alaska" title="Alaska"><span data-dcnode-id="5229" instrument_node="">Alaska</span></a><span data-dcnode-id="5227" instrument_node="">, where each citizen receives an annual share of the part of the state's oil revenues via the "</span><a class="mw-redirect" data-dcnode-id="5225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alaska_Permanent_Fund_Dividend" title="Alaska Permanent Fund Dividend"><span data-dcnode-id="5226" instrument_node="">Alaska Permanent Fund Dividend</span></a><span data-dcnode-id="5224" instrument_node="">". Barnes suggests this model could extend to other states and nations because "we jointly own many valuable assets". As corporate pollution of common assets increased, the permits for such pollution would become more scarce, driving prices for those permits up. "Less pollution would equal more revenue", and over time, "trillions of dollars could flow into an American Permanent Fund".</span><sup class="reference" data-dcnode-id="5221" id="cite_ref-FOOTNOTEBarnes2006[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_62-0"><a data-dcnode-id="5222" href="#cite_note-FOOTNOTEBarnes2006%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-62"><span data-dcnode-id="5223" instrument_node="">[62]</span></a></sup><span data-dcnode-id="5220" instrument_node="">
</span></p><p data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">However, none of these proposals aspire to the mandates recommended by Dr. Martin Luther King Jr.:
</span></p><span data-dcnode-id="5216" instrument_node="">
</span><link data-dcnode-id="5215" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="5209"><p data-dcnode-id="5210"><span data-dcnode-id="5214" instrument_node="">Two conditions are indispensable if we are to ensure that the guaranteed income operates as a consistently progressive measure. First, it must be pegged to the median income of society, not the lowest levels of income. To guarantee an income at the floor would simply perpetuate welfare standards and freeze into the society poverty conditions. Second, the guaranteed income must be dynamic; it must automatically increase as the total social income grows. Were it permitted to remain static under growth conditions, the recipients would suffer a relative decline. If periodic reviews disclose that the whole national income has risen, then the guaranteed income would have to be adjusted upward by the same percentage. Without these safeguards a creeping retrogression would occur, nullifying the gains of security and stability.</span><sup class="reference" data-dcnode-id="5211" id="cite_ref-FOOTNOTEKing1968164_63-0"><a data-dcnode-id="5212" href="#cite_note-FOOTNOTEKing1968164-63"><span data-dcnode-id="5213" instrument_node="">[63]</span></a></sup></p></blockquote><span data-dcnode-id="5208" instrument_node="">
</span><p data-dcnode-id="5202"><span data-dcnode-id="5207" instrument_node="">Barnes deemed any such reform unlikely. Thomas Paine originally recommended a National Dividend to compensate for the brutality of British Enclosures, but his idea was never adopted.</span><sup class="reference" data-dcnode-id="5204" id="cite_ref-FOOTNOTEBarnes2006[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_62-1"><a data-dcnode-id="5205" href="#cite_note-FOOTNOTEBarnes2006%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-62"><span data-dcnode-id="5206" instrument_node="">[62]</span></a></sup><span data-dcnode-id="5203" instrument_node="">
</span></p><span data-dcnode-id="5201" instrument_node="">
