</span><h3 data-dcnode-id="5191"><span class="mw-headline" data-dcnode-id="5199" id="Monopoly_power_versus_public_utility"><span data-dcnode-id="5200" instrument_node="">Monopoly power versus public utility</span></span><span class="mw-editsection" data-dcnode-id="5192"><span class="mw-editsection-bracket" data-dcnode-id="5197"><span data-dcnode-id="5198" instrument_node="">[</span></span><a data-dcnode-id="5195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D15" title="Edit section: Monopoly power versus public utility"><span data-dcnode-id="5196" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5193"><span data-dcnode-id="5194" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5190" instrument_node="">
</span><link data-dcnode-id="5189" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5185" role="note"><span data-dcnode-id="5188" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="5186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J._W._Smith" title="J. W. Smith"><span data-dcnode-id="5187" instrument_node="">J. W. Smith</span></a></div><span data-dcnode-id="5184" instrument_node="">
</span><p data-dcnode-id="5151"><span data-dcnode-id="5183" instrument_node="">Rather than superficially compensating for legalized inequities, Smith recommends abolishing or redefining property rights laws with particular respect for "the commons".</span><sup class="reference" data-dcnode-id="5180" id="cite_ref-FOOTNOTESmith2005[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_13-2"><a data-dcnode-id="5181" href="#cite_note-FOOTNOTESmith2005%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-13"><span data-dcnode-id="5182" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5179" instrument_node=""> According to Smith </span><a data-dcnode-id="5177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Entitlement" title="Entitlement"><span data-dcnode-id="5178" instrument_node="">exclusive title</span></a><span data-dcnode-id="5176" instrument_node=""> to natural resources and technologies should be converted to inclusive conditional titles—the condition being that society should collect rental values on all natural resources.</span><sup class="reference" data-dcnode-id="5173" id="cite_ref-FOOTNOTESmith20072_64-0"><a data-dcnode-id="5174" href="#cite_note-FOOTNOTESmith20072-64"><span data-dcnode-id="5175" instrument_node="">[64]</span></a></sup><span data-dcnode-id="5172" instrument_node=""> Smith suggests the basic principles of monopolization under feudalism were never abandoned, and residues of exclusive feudal property rights restrict the potential efficiency of capitalism in </span><a data-dcnode-id="5170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_culture" title="Western culture"><span data-dcnode-id="5171" instrument_node="">Western cultures</span></a><span data-dcnode-id="5169" instrument_node="">.</span><sup class="reference" data-dcnode-id="5166" id="cite_ref-FOOTNOTESmith2007[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_21-2"><a data-dcnode-id="5167" href="#cite_note-FOOTNOTESmith2007%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-21"><span data-dcnode-id="5168" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5165" instrument_node=""> He estimated that roughly 60 percent of American capital is little more than capitalized values of unearned wealth. He proposed that elimination of these monopoly values would double </span><a data-dcnode-id="5163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_efficiency" title="Economic efficiency"><span data-dcnode-id="5164" instrument_node="">economic efficiency</span></a><span data-dcnode-id="5162" instrument_node="">, maintain </span><a data-dcnode-id="5160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quality_of_life" title="Quality of life"><span data-dcnode-id="5161" instrument_node="">quality of life</span></a><span data-dcnode-id="5159" instrument_node="">, and reduce </span><a data-dcnode-id="5157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Working_time" title="Working time"><span data-dcnode-id="5158" instrument_node="">working hours</span></a><span data-dcnode-id="5156" instrument_node=""> by half. Wasteful monetary flows could be stopped only by eliminating all methods of monopolization typical in Western economies.</span><sup class="reference" data-dcnode-id="5153" id="cite_ref-FOOTNOTESmith2007xiv_65-0"><a data-dcnode-id="5154" href="#cite_note-FOOTNOTESmith2007xiv-65"><span data-dcnode-id="5155" instrument_node="">[65]</span></a></sup><span data-dcnode-id="5152" instrument_node="">
</span></p><p data-dcnode-id="5135"><span data-dcnode-id="5150" instrument_node="">Smith divided "primary (feudal) monopoly" into four general categories: banking; land; technology and </span><a class="mw-redirect" data-dcnode-id="5148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telecommunication" title="Telecommunication"><span data-dcnode-id="5149" instrument_node="">communications</span></a><span data-dcnode-id="5147" instrument_node="">. He listed three general categories of "secondary (modern) monopoly"; insurance, law, health care.</span><sup class="reference" data-dcnode-id="5144" id="cite_ref-FOOTNOTESmith200714_66-0"><a data-dcnode-id="5145" href="#cite_note-FOOTNOTESmith200714-66"><span data-dcnode-id="5146" instrument_node="">[66]</span></a></sup><span data-dcnode-id="5143" instrument_node=""> Smith further claimed that converting these exclusive entitlements to inclusive human rights would minimize battles for </span><a data-dcnode-id="5141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Market_share" title="Market share"><span data-dcnode-id="5142" instrument_node="">market share</span></a><span data-dcnode-id="5140" instrument_node="">, thereby eliminating most offices and staff needed to maintain monopoly structures, and stop the wars generated to protect them. Dissolving roughly half the economic activity of a monopoly system would reduce the costs of common resources by roughly half, and significantly minimize the most influential factors of poverty.</span><sup class="reference" data-dcnode-id="5137" id="cite_ref-FOOTNOTESmith2007[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_21-3"><a data-dcnode-id="5138" href="#cite_note-FOOTNOTESmith2007%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-21"><span data-dcnode-id="5139" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5136" instrument_node="">
</span></p><p data-dcnode-id="5122"><span data-dcnode-id="5134" instrument_node="">In Smith's view, most taxes should be eliminated, and productive enterprise should be privately owned and managed.</span><sup class="reference" data-dcnode-id="5131" id="cite_ref-FOOTNOTESmith20072,_187_67-0"><a data-dcnode-id="5132" href="#cite_note-FOOTNOTESmith20072,_187-67"><span data-dcnode-id="5133" instrument_node="">[67]</span></a></sup><span data-dcnode-id="5130" instrument_node=""> Inventors should be paid well and all technology placed in the public domain. Crucial services currently monopolized through </span><a data-dcnode-id="5128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/License" title="License"><span data-dcnode-id="5129" instrument_node="">licensing</span></a><span data-dcnode-id="5127" instrument_node=""> should be legislated as human rights.</span><sup class="reference" data-dcnode-id="5124" id="cite_ref-FOOTNOTESmith20072,_13,_22,_90,_102,_113,_124,_220_68-0"><a data-dcnode-id="5125" href="#cite_note-FOOTNOTESmith20072,_13,_22,_90,_102,_113,_124,_220-68"><span data-dcnode-id="5126" instrument_node="">[68]</span></a></sup><span data-dcnode-id="5123" instrument_node="">
</span></p><p data-dcnode-id="5091"><span data-dcnode-id="5121" instrument_node="">Smith envisioned a balanced economy under a socially owned banking commons within an inclusive society with full and </span><a data-dcnode-id="5119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_equality" title="Social equality"><span data-dcnode-id="5120" instrument_node="">equal rights</span></a><span data-dcnode-id="5118" instrument_node=""> for all.</span><sup class="reference" data-dcnode-id="5115" id="cite_ref-FOOTNOTESmith20073_69-0"><a data-dcnode-id="5116" href="#cite_note-FOOTNOTESmith20073-69"><span data-dcnode-id="5117" instrument_node="">[69]</span></a></sup><span data-dcnode-id="5114" instrument_node=""> Federated regions collect </span><a data-dcnode-id="5112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Resource_rent" title="Resource rent"><span data-dcnode-id="5113" instrument_node="">resource rents</span></a><span data-dcnode-id="5111" instrument_node=""> on land and technology to a </span><a data-dcnode-id="5109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_fund" title="Social fund"><span data-dcnode-id="5110" instrument_node="">social fund</span></a><span data-dcnode-id="5108" instrument_node=""> to operate governments and care for social needs.</span><sup class="reference" data-dcnode-id="5105" id="cite_ref-FOOTNOTESmith200717,_54_70-0"><a data-dcnode-id="5106" href="#cite_note-FOOTNOTESmith200717,_54-70"><span data-dcnode-id="5107" instrument_node="">[70]</span></a></sup><span data-dcnode-id="5104" instrument_node=""> Socially owned banks provide finance capital by creating debt-free money for social infrastructure and industry.</span><sup class="reference" data-dcnode-id="5101" id="cite_ref-FOOTNOTESmith2007xv_71-0"><a data-dcnode-id="5102" href="#cite_note-FOOTNOTESmith2007xv-71"><span data-dcnode-id="5103" instrument_node="">[71]</span></a></sup><span data-dcnode-id="5100" instrument_node=""> Rental values return to society through expenditure on public infrastructures. Local labor is trained and employed to build and maintain water systems, sewers, roads, communication systems, railroads, ports, airports, post offices, and education systems.</span><sup class="reference" data-dcnode-id="5097" id="cite_ref-FOOTNOTESmith20072,_84_72-0"><a data-dcnode-id="5098" href="#cite_note-FOOTNOTESmith20072,_84-72"><span data-dcnode-id="5099" instrument_node="">[72]</span></a></sup><span data-dcnode-id="5096" instrument_node=""> Purchasing power circulates regionally, as labor spends wages in consumption and governments spend resource rent and banking profits to maintain essential services.</span><sup class="reference" data-dcnode-id="5093" id="cite_ref-FOOTNOTESmith200716–17_73-0"><a data-dcnode-id="5094" href="#cite_note-FOOTNOTESmith200716%E2%80%9317-73"><span data-dcnode-id="5095" instrument_node="">[73]</span></a></sup><span data-dcnode-id="5092" instrument_node="">
</span></p><p data-dcnode-id="5071"><span data-dcnode-id="5090" instrument_node="">According to Smith, all monetary systems, including </span><a data-dcnode-id="5088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Money_market" title="Money market"><span data-dcnode-id="5089" instrument_node="">money markets</span></a><span data-dcnode-id="5087" instrument_node="">, should function within </span><a data-dcnode-id="5085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fractional-reserve_banking" title="Fractional-reserve banking"><span data-dcnode-id="5086" instrument_node="">fractional-reserve banking</span></a><span data-dcnode-id="5084" instrument_node="">.</span><sup class="reference" data-dcnode-id="5081" id="cite_ref-FOOTNOTESmith200715_74-0"><a data-dcnode-id="5082" href="#cite_note-FOOTNOTESmith200715-74"><span data-dcnode-id="5083" instrument_node="">[74]</span></a></sup><span data-dcnode-id="5080" instrument_node=""> Financial capital should be the total savings of all citizens, balanced by primary-created money to fill any shortfall, or its destruction through increased reserve requirements to eliminate any surplus.</span><sup class="reference" data-dcnode-id="5077" id="cite_ref-FOOTNOTESmith200716_75-0"><a data-dcnode-id="5078" href="#cite_note-FOOTNOTESmith200716-75"><span data-dcnode-id="5079" instrument_node="">[75]</span></a></sup><span data-dcnode-id="5076" instrument_node=""> Adjustments of required reserves should facilitate the balance between building with socially created money or savings. Any shortage of savings within a socially owned banking system should be alleviated by simply printing it.</span><sup class="reference" data-dcnode-id="5073" id="cite_ref-FOOTNOTESmith200713_76-0"><a data-dcnode-id="5074" href="#cite_note-FOOTNOTESmith200713-76"><span data-dcnode-id="5075" instrument_node="">[76]</span></a></sup><span data-dcnode-id="5072" instrument_node="">
</span></p><span data-dcnode-id="5070" instrument_node="">
</span><h3 data-dcnode-id="5060"><span class="mw-headline" data-dcnode-id="5068" id="Cooperatives"><span data-dcnode-id="5069" instrument_node="">Cooperatives</span></span><span class="mw-editsection" data-dcnode-id="5061"><span class="mw-editsection-bracket" data-dcnode-id="5066"><span data-dcnode-id="5067" instrument_node="">[</span></span><a data-dcnode-id="5064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D16" title="Edit section: Cooperatives"><span data-dcnode-id="5065" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5062"><span data-dcnode-id="5063" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5059" instrument_node="">
</span><link data-dcnode-id="5058" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5054" role="note"><span data-dcnode-id="5057" instrument_node="">Main article: </span><a data-dcnode-id="5055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cooperative" title="Cooperative"><span data-dcnode-id="5056" instrument_node="">Cooperative</span></a></div><span data-dcnode-id="5053" instrument_node="">
</span><p data-dcnode-id="5042"><span data-dcnode-id="5052" instrument_node="">A </span><a data-dcnode-id="5050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cooperative" title="Cooperative"><span data-dcnode-id="5051" instrument_node="">cooperative</span></a><span data-dcnode-id="5049" instrument_node=""> is an autonomous association of persons united voluntarily to meet their common economic, social, and cultural needs and aspirations through a jointly owned and democratically controlled enterprise. By various names, cooperatives play an essential role in all forms of Economic Democracy. Classified as either </span><a class="mw-redirect" data-dcnode-id="5047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consumer_cooperative" title="Consumer cooperative"><span data-dcnode-id="5048" instrument_node="">consumer cooperatives</span></a><span data-dcnode-id="5046" instrument_node=""> or </span><a data-dcnode-id="5044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Worker_cooperative" title="Worker cooperative"><span data-dcnode-id="5045" instrument_node="">worker cooperatives</span></a><span data-dcnode-id="5043" instrument_node="">, the cooperative business model is fundamental to the interests of economic democracy.
</span></p><p data-dcnode-id="5034"><span data-dcnode-id="5041" instrument_node="">According to the </span><a class="mw-redirect" data-dcnode-id="5039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Cooperative_Alliance" title="International Cooperative Alliance"><span data-dcnode-id="5040" instrument_node="">International Cooperative Alliance</span></a><span data-dcnode-id="5038" instrument_node="">'s </span><a class="mw-redirect" data-dcnode-id="5036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statement_on_the_Cooperative_Identity" title="Statement on the Cooperative Identity"><span data-dcnode-id="5037" instrument_node="">Statement on the Cooperative Identity</span></a><span data-dcnode-id="5035" instrument_node="">, "cooperatives are democratic organizations controlled by their members, who actively participate in setting policies and making decisions. Men and women serving as elected representatives are accountable to the membership. In primary cooperatives members have equal voting rights (one member, one vote) and cooperatives at other levels are also organized in a democratic manner."
</span></p><span data-dcnode-id="5033" instrument_node="">
</span><h4 data-dcnode-id="5023"><span class="mw-headline" data-dcnode-id="5031" id="Worker_cooperatives"><span data-dcnode-id="5032" instrument_node="">Worker cooperatives</span></span><span class="mw-editsection" data-dcnode-id="5024"><span class="mw-editsection-bracket" data-dcnode-id="5029"><span data-dcnode-id="5030" instrument_node="">[</span></span><a data-dcnode-id="5027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D17" title="Edit section: Worker cooperatives"><span data-dcnode-id="5028" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5025"><span data-dcnode-id="5026" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5022" instrument_node="">
</span><link data-dcnode-id="5021" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5017" role="note"><span data-dcnode-id="5020" instrument_node="">Main article: </span><a data-dcnode-id="5018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Worker_cooperative" title="Worker cooperative"><span data-dcnode-id="5019" instrument_node="">Worker cooperative</span></a></div><span data-dcnode-id="5016" instrument_node="">
</span><p data-dcnode-id="5007"><span data-dcnode-id="5015" instrument_node="">According to the </span><a data-dcnode-id="5013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Federation_of_Worker_Cooperatives" title="United States Federation of Worker Cooperatives"><span data-dcnode-id="5014" instrument_node="">United States Federation of Worker Cooperatives</span></a><span data-dcnode-id="5012" instrument_node="">: "Worker cooperatives are business entities that are owned and controlled by their members, the people who work in them. The two central characteristics of worker cooperatives are: 1) workers invest in and own the business and (2) decision-making is democratic, generally adhering to the principle of one worker-one vote." Worker cooperatives occupy multiple sectors and industries in the United States, mostly in the Northeast, the West Coast and the Upper Midwest, totaling 300 democratic workplaces in the United States, employing over 3,500 people and generating over $400 million in annual revenues. While a few are larger enterprises, most are small. Growing steadily between 1990 and 2010, technology and home health care experienced most of the recent increase.</span><sup class="reference" data-dcnode-id="5009" id="cite_ref-77"><a data-dcnode-id="5010" href="#cite_note-77"><span data-dcnode-id="5011" instrument_node="">[77]</span></a></sup><span data-dcnode-id="5008" instrument_node="">
</span></p><p data-dcnode-id="4994"><span data-dcnode-id="5006" instrument_node="">Worker cooperatives generally employ an industrial model called </span><a data-dcnode-id="5004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Workplace_democracy" title="Workplace democracy"><span data-dcnode-id="5005" instrument_node="">workplace democracy</span></a><span data-dcnode-id="5003" instrument_node="">, which rejects the "master-servant relationship" implicit in the traditional employment contract.</span><sup class="reference" data-dcnode-id="5000" id="cite_ref-FOOTNOTEEllerman1990_78-0"><a data-dcnode-id="5001" href="#cite_note-FOOTNOTEEllerman1990-78"><span data-dcnode-id="5002" instrument_node="">[78]</span></a></sup><span data-dcnode-id="4999" instrument_node=""> According to Wilkinson and Pickett, neither ownership or participation alone are sufficient to establish democracy in the workplace. "[M]any share-ownership schemes amount to little more than incentive schemes, intended to make employees more compliant with management and sometimes to provide a nest-egg for retirement... To make a reliable difference to company performance, share-ownership has to be combined with more participative management methods."</span><sup class="reference" data-dcnode-id="4996" id="cite_ref-79"><a data-dcnode-id="4997" href="#cite_note-79"><span data-dcnode-id="4998" instrument_node="">[79]</span></a></sup><span data-dcnode-id="4995" instrument_node=""> Dahl further argued that self-governing enterprises should not be confused with other systems they might resemble:
</span></p><span data-dcnode-id="4993" instrument_node="">
</span><link data-dcnode-id="4992" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="4986"><p data-dcnode-id="4987"><span data-dcnode-id="4991" instrument_node="">Self-governing enterprises only remotely resemble pseudodemocratic schemes of employee consultation by management; schemes of limited employee participation that leave all critical decisions with a management elected by stockholders; or Employee Stock Ownership Plans (ESOPs) that are created only or primarily to provide corporations with low-interest loans, lower corporate income taxes, greater cash flow, employee pension plans, or a market for their stock, without, however, any significant changes in control.</span><sup class="reference" data-dcnode-id="4988" id="cite_ref-FOOTNOTEDahl198592–93_80-0"><a data-dcnode-id="4989" href="#cite_note-FOOTNOTEDahl198592%E2%80%9393-80"><span data-dcnode-id="4990" instrument_node="">[80]</span></a></sup></p></blockquote><span data-dcnode-id="4985" instrument_node="">
</span><p data-dcnode-id="4970"><span data-dcnode-id="4984" instrument_node="">In worker cooperatives, </span><a data-dcnode-id="4982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Net_income" title="Net income"><span data-dcnode-id="4983" instrument_node="">net income</span></a><span data-dcnode-id="4981" instrument_node=""> is called </span><a data-dcnode-id="4979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_surplus" title="Economic surplus"><span data-dcnode-id="4980" instrument_node="">surplus</span></a><span data-dcnode-id="4978" instrument_node=""> instead of </span><a data-dcnode-id="4976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Profit_%28accounting%29" title="Profit (accounting)"><span data-dcnode-id="4977" instrument_node="">profit</span></a><span data-dcnode-id="4975" instrument_node=""> and is distributed among the members based on hours worked, seniority, or other criteria. In a worker cooperative, workers own their jobs, and therefore have a direct stake in the local environment and the power to conduct business in ways that benefit the community rather than destroying it. Some worker cooperatives maintain what is known as a “multiple bottom line”, evaluating success not merely in terms of net income, but also by factors like their sustainability as a business, their contribution to the community, and the happiness and longevity of their workers.</span><sup class="reference" data-dcnode-id="4972" id="cite_ref-usworker_81-0"><a data-dcnode-id="4973" href="#cite_note-usworker-81"><span data-dcnode-id="4974" instrument_node="">[81]</span></a></sup><span data-dcnode-id="4971" instrument_node="">
</span></p><p data-dcnode-id="4952"><span data-dcnode-id="4969" instrument_node="">Worker-control can take many forms depending on the size and type of the business. Approaches to decision-making include: an elected board of directors, elected managers, management job roles, no management at all, consensus, majority vote, or combinations of the above.</span><sup class="reference" data-dcnode-id="4966" id="cite_ref-usworker_81-1"><a data-dcnode-id="4967" href="#cite_note-usworker-81"><span data-dcnode-id="4968" instrument_node="">[81]</span></a></sup><span data-dcnode-id="4965" instrument_node=""> Participation in decision-making becomes the responsibility and privilege of each member.</span><sup class="reference" data-dcnode-id="4962" id="cite_ref-FOOTNOTEDeNies2003_82-0"><a data-dcnode-id="4963" href="#cite_note-FOOTNOTEDeNies2003-82"><span data-dcnode-id="4964" instrument_node="">[82]</span></a></sup><span data-dcnode-id="4961" instrument_node=""> In one variation, workers usually invest money when they begin working.</span><sup class="reference" data-dcnode-id="4958" id="cite_ref-usworker_81-2"><a data-dcnode-id="4959" href="#cite_note-usworker-81"><span data-dcnode-id="4960" instrument_node="">[81]</span></a></sup><span data-dcnode-id="4957" instrument_node=""> Each member owns one share, which provides its owner with one vote in company decision-making. While membership is not a requirement of employment, only employees can become members.</span><sup class="reference" data-dcnode-id="4954" id="cite_ref-83"><a data-dcnode-id="4955" href="#cite_note-83"><span data-dcnode-id="4956" instrument_node="">[83]</span></a></sup><span data-dcnode-id="4953" instrument_node="">
</span></p><p data-dcnode-id="4926"><span data-dcnode-id="4951" instrument_node="">According to Kenneth W. Stikkers, the </span><a data-dcnode-id="4949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mondragon_Corporation" title="Mondragon Corporation"><span data-dcnode-id="4950" instrument_node="">Mondragon cooperatives</span></a><span data-dcnode-id="4948" instrument_node=""> in the </span><a data-dcnode-id="4946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basque_Country_%28greater_region%29" title="Basque Country (greater region)"><span data-dcnode-id="4947" instrument_node="">Basque region</span></a><span data-dcnode-id="4945" instrument_node=""> of </span><a data-dcnode-id="4943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spain" title="Spain"><span data-dcnode-id="4944" instrument_node="">Spain</span></a><span data-dcnode-id="4942" instrument_node=""> have achieved a previously unknown level of economic democracy. Established in 1956, Mondragon has since become an economic model that transcends the capitalist-socialist dichotomy and thereby helps us to imagine creative solutions to current economic problems.</span><sup class="reference" data-dcnode-id="4939" id="cite_ref-84"><a data-dcnode-id="4940" href="#cite_note-84"><span data-dcnode-id="4941" instrument_node="">[84]</span></a></sup><span data-dcnode-id="4938" instrument_node=""> Economist </span><a data-dcnode-id="4936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_D._Wolff" title="Richard D. Wolff"><span data-dcnode-id="4937" instrument_node="">Richard D. Wolff</span></a><span data-dcnode-id="4935" instrument_node=""> argues that Mondragon is an example of "a stunningly successful alternative to the capitalist organization of production."</span><sup class="reference" data-dcnode-id="4932" id="cite_ref-85"><a data-dcnode-id="4933" href="#cite_note-85"><span data-dcnode-id="4934" instrument_node="">[85]</span></a></sup><span data-dcnode-id="4931" instrument_node=""> The idea of economic democracy through worker ownership on a national scale has been argued by economist Tom Winters, who states that "building a cooperative economy is one small step on the journey to reclaiming the wealth we all collectively create."</span><sup class="reference" data-dcnode-id="4928" id="cite_ref-86"><a data-dcnode-id="4929" href="#cite_note-86"><span data-dcnode-id="4930" instrument_node="">[86]</span></a></sup><span data-dcnode-id="4927" instrument_node="">
</span></p><span data-dcnode-id="4925" instrument_node="">
</span><h4 data-dcnode-id="4915"><span class="mw-headline" data-dcnode-id="4923" id="Consumer_cooperatives"><span data-dcnode-id="4924" instrument_node="">Consumer cooperatives</span></span><span class="mw-editsection" data-dcnode-id="4916"><span class="mw-editsection-bracket" data-dcnode-id="4921"><span data-dcnode-id="4922" instrument_node="">[</span></span><a data-dcnode-id="4919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D18" title="Edit section: Consumer cooperatives"><span data-dcnode-id="4920" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4917"><span data-dcnode-id="4918" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4914" instrument_node="">
</span><link data-dcnode-id="4913" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4909" role="note"><span data-dcnode-id="4912" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="4910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consumer_cooperative" title="Consumer cooperative"><span data-dcnode-id="4911" instrument_node="">Consumer cooperative</span></a></div><span data-dcnode-id="4908" instrument_node="">
</span><p data-dcnode-id="4900"><span data-dcnode-id="4907" instrument_node="">A </span><a class="mw-redirect" data-dcnode-id="4905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consumers%2527_cooperative" title="Consumers' cooperative"><span data-dcnode-id="4906" instrument_node="">consumers' cooperative</span></a><span data-dcnode-id="4904" instrument_node=""> is owned by its customers for their </span><a class="mw-redirect" data-dcnode-id="4902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mutual_aid_%28organization%29" title="Mutual aid (organization)"><span data-dcnode-id="4903" instrument_node="">mutual benefit</span></a><span data-dcnode-id="4901" instrument_node="">. Oriented towards service rather than profit, consumers often provide capital to launch or purchase the enterprise. In practice, consumer cooperatives price goods and services at competitive market rates. The co-op returns profits to the consumer/owner according to a formula instead of paying a separate investor group.
</span></p><p data-dcnode-id="4895"><span data-dcnode-id="4899" instrument_node="">In his book, </span><i data-dcnode-id="4897"><span data-dcnode-id="4898" instrument_node="">From Mondragon To America</span></i><span data-dcnode-id="4896" instrument_node="">, Greg MacLeod argues that "in consumer cooperatives where the customer-members own the capital and the employees are subject to capital, the normal dynamic is the adversarial relationship of labor to capital. Sometimes the result is strikes of labor against management." In some cooperatives, however, consumer/owners are workers as well. For example, Mondragon has developed a large "hybrid" cooperative which sells groceries and furniture in Spain.
</span></p><p data-dcnode-id="4878"><span data-dcnode-id="4894" instrument_node="">Consumer cooperatives vary in organization and operations, but typically follow the </span><a data-dcnode-id="4892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rochdale_Principles" title="Rochdale Principles"><span data-dcnode-id="4893" instrument_node="">Rochdale Principles</span></a><span data-dcnode-id="4891" instrument_node="">. Consumer cooperatives may also form </span><a class="mw-redirect" data-dcnode-id="4889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Co-operative_Federation" title="Co-operative Federation"><span data-dcnode-id="4890" instrument_node="">Co-operative Federations</span></a><span data-dcnode-id="4888" instrument_node="">. These may take the form of </span><a class="mw-redirect" data-dcnode-id="4886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Co-operative_Wholesale_Society" title="Co-operative Wholesale Society"><span data-dcnode-id="4887" instrument_node="">co-operative wholesale societies</span></a><span data-dcnode-id="4885" instrument_node="">, through which they collectively purchase goods at </span><a class="mw-redirect" data-dcnode-id="4883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wholesale" title="Wholesale"><span data-dcnode-id="4884" instrument_node="">wholesale</span></a><span data-dcnode-id="4882" instrument_node=""> prices and, in some cases, cooperatively own factories. Alternatively, they may be members of </span><a class="mw-redirect" data-dcnode-id="4880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Co-operative_union" title="Co-operative union"><span data-dcnode-id="4881" instrument_node="">Co-operative unions</span></a><span data-dcnode-id="4879" instrument_node="">.
</span></p><p data-dcnode-id="4872"><span data-dcnode-id="4877" instrument_node="">Consumer cooperatives are very different from "discount clubs," which charge annual fees in exchange for a discount on purchases. The club is not owned or governed by the members and profits go to investors, not to members.</span><sup class="reference" data-dcnode-id="4874" id="cite_ref-CooperativeGrocer_87-0"><a data-dcnode-id="4875" href="#cite_note-CooperativeGrocer-87"><span data-dcnode-id="4876" instrument_node="">[87]</span></a></sup><span data-dcnode-id="4873" instrument_node="">
</span></p><span data-dcnode-id="4871" instrument_node="">
</span><h5 data-dcnode-id="4861"><span class="mw-headline" data-dcnode-id="4869" id="Food_cooperatives"><span data-dcnode-id="4870" instrument_node="">Food cooperatives</span></span><span class="mw-editsection" data-dcnode-id="4862"><span class="mw-editsection-bracket" data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">[</span></span><a data-dcnode-id="4865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D19" title="Edit section: Food cooperatives"><span data-dcnode-id="4866" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4863"><span data-dcnode-id="4864" instrument_node="">]</span></span></span></h5><span data-dcnode-id="4860" instrument_node="">
</span><link data-dcnode-id="4859" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4855" role="note"><span data-dcnode-id="4858" instrument_node="">Main article: </span><a data-dcnode-id="4856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_cooperative" title="Food cooperative"><span data-dcnode-id="4857" instrument_node="">Food cooperative</span></a></div><p data-dcnode-id="4836"><span data-dcnode-id="4854" instrument_node="">Most food co-ops are consumer cooperatives that specialize in grocery products. Members patronize the store and vote in elections. The members elect a board of directors to make high-level decisions and recruit managers.</span><sup class="reference" data-dcnode-id="4851" id="cite_ref-CooperativeGrocer_87-1"><a data-dcnode-id="4852" href="#cite_note-CooperativeGrocer-87"><span data-dcnode-id="4853" instrument_node="">[87]</span></a></sup><span data-dcnode-id="4850" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_cooperatives" title="Food cooperatives"><span data-dcnode-id="4849" instrument_node="">Food cooperatives</span></a><span data-dcnode-id="4847" instrument_node=""> were originally established to provide fresh, </span><a data-dcnode-id="4845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organic_food" title="Organic food"><span data-dcnode-id="4846" instrument_node="">organic produce</span></a><span data-dcnode-id="4844" instrument_node=""> as a viable alternative to packaged imports. The ideas of local and </span><a class="mw-redirect" data-dcnode-id="4842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slow_food" title="Slow food"><span data-dcnode-id="4843" instrument_node="">slow food</span></a><span data-dcnode-id="4841" instrument_node=""> production can help local farmers prosper, in addition to providing consumers with fresher products. But the growing ubiquity of organic food products in corporate stores testifies to broadening consumer awareness, and to the dynamics of global marketing.</span><sup class="reference" data-dcnode-id="4838" id="cite_ref-FOOTNOTEDeNies2003_82-1"><a data-dcnode-id="4839" href="#cite_note-FOOTNOTEDeNies2003-82"><span data-dcnode-id="4840" instrument_node="">[82]</span></a></sup><span data-dcnode-id="4837" instrument_node="">
</span></p><p data-dcnode-id="4830"><span data-dcnode-id="4835" instrument_node="">For example, associated with national and international cooperative communities, Portland Oregon cooperatives manage to survive market competition with corporate franchise. As Lee Lancaster, financial manager for Food Front, states, "cooperatives are potentially one democratic economic model that could help guide business decisions toward meeting human needs while honoring the needs of society and nature". He admits, however, it is difficult to maintain collaboration among cooperatives while also avoiding integration that typically results in centralized authority.</span><sup class="reference" data-dcnode-id="4832" id="cite_ref-FOOTNOTEDeNies2003_82-2"><a data-dcnode-id="4833" href="#cite_note-FOOTNOTEDeNies2003-82"><span data-dcnode-id="4834" instrument_node="">[82]</span></a></sup><span data-dcnode-id="4831" instrument_node="">
</span></p><span data-dcnode-id="4829" instrument_node="">
</span><h3 data-dcnode-id="4819"><span class="mw-headline" data-dcnode-id="4827" id="Regional_trading_currencies"><span data-dcnode-id="4828" instrument_node="">Regional trading currencies</span></span><span class="mw-editsection" data-dcnode-id="4820"><span class="mw-editsection-bracket" data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node="">[</span></span><a data-dcnode-id="4823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D20" title="Edit section: Regional trading currencies"><span data-dcnode-id="4824" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4821"><span data-dcnode-id="4822" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4818" instrument_node="">
</span><p data-dcnode-id="4816"><span data-dcnode-id="4817" instrument_node="">According to Smith, "Currency is only the representation of wealth produced by combining land (resources), labor, and industrial capital". He claimed that no country was free when another country has such leverage over its entire economy. But by combining their resources, Smith claimed that developing nations have all three of these foundations of wealth:
</span></p><span data-dcnode-id="4815" instrument_node="">
</span><link data-dcnode-id="4814" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="4804"><p data-dcnode-id="4805"><span data-dcnode-id="4813" instrument_node="">By peripheral nations using the currency of an imperial center as its trading currency, the imperial center can actually print money to own industry within those periphery countries. By forming regional trading blocs and printing their own trading currency, the developing world has all four requirements for production, resources, labor, industrial capital, and finance capital. The wealth produced provides the value to back the created and circulating money.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4806" style="white-space:nowrap;"><span data-dcnode-id="4812" instrument_node="">[</span><i data-dcnode-id="4808"><a data-dcnode-id="4809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4810" title="This claim needs references to reliable sources. (January 2012)"><span data-dcnode-id="4811" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4807" instrument_node="">]</span></sup></p></blockquote><span data-dcnode-id="4803" instrument_node="">
</span><p data-dcnode-id="4789"><span data-dcnode-id="4802" instrument_node="">Smith further explained that developed countries need resources from the developing world as much as developing countries need finance capital and technology from the developed world. Aside from the superior military power of the imperial centers, the undeveloped world actually has superior bargaining leverage. With independent trading currencies, developing countries could barter their resources to the developed world for the latest industrial technologies. Barter avoids "hard money monopolization"</span><sup class="noprint Inline-Template" data-dcnode-id="4795" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="4801" instrument_node="">[</span><i data-dcnode-id="4797"><a data-dcnode-id="4798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="4799" title="The text near this tag may need clarification or removal of jargon. (January 2012)"><span data-dcnode-id="4800" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="4796" instrument_node="">]</span></sup><span data-dcnode-id="4794" instrument_node=""> and the unequal trade between weak and strong nations that result. Smith suggested that barter was how Germany resolved many financial difficulties "put in place to strangle her", and that "World Wars I and II settled that trade dispute". He claimed that their intentions of exclusive entitlement were clearly exposed when the imperial centers resorted to military force to prevent such barter and maintain monopoly control of others' resources.</span><sup class="reference" data-dcnode-id="4791" id="cite_ref-FOOTNOTESmith2005[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_13-3"><a data-dcnode-id="4792" href="#cite_note-FOOTNOTESmith2005%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-13"><span data-dcnode-id="4793" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4790" instrument_node="">
</span></p><span data-dcnode-id="4788" instrument_node="">
</span><h3 data-dcnode-id="4778"><span class="mw-headline" data-dcnode-id="4786" id="Democratizing_workplaces_and_distributing_productive_assets"><span data-dcnode-id="4787" instrument_node="">Democratizing workplaces and distributing productive assets</span></span><span class="mw-editsection" data-dcnode-id="4779"><span class="mw-editsection-bracket" data-dcnode-id="4784"><span data-dcnode-id="4785" instrument_node="">[</span></span><a data-dcnode-id="4782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D21" title="Edit section: Democratizing workplaces and distributing productive assets"><span data-dcnode-id="4783" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4777" instrument_node="">
</span><table class="box-More_citations_needed_section plainlinks metadata ambox ambox-content ambox-Refimprove" data-dcnode-id="4740" role="presentation"><tbody data-dcnode-id="4741"><tr data-dcnode-id="4742"><td class="mbox-image" data-dcnode-id="4773"><div data-dcnode-id="4774" style="width:52px"><a class="image" data-dcnode-id="4775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="4776" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="4743"><div class="mbox-text-span" data-dcnode-id="4744"><span data-dcnode-id="4772" instrument_node="">This section </span><b data-dcnode-id="4768"><span data-dcnode-id="4771" instrument_node="">needs additional citations for </span><a data-dcnode-id="4769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="4770" instrument_node="">verification</span></a></b><span data-dcnode-id="4767" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="4759"><span data-dcnode-id="4766" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="4764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit"><span data-dcnode-id="4765" instrument_node="">improve this article</span></a><span data-dcnode-id="4763" instrument_node=""> by </span><a data-dcnode-id="4761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="4762" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="4760" instrument_node="">. Unsourced material may be challenged and removed.</span></span><span data-dcnode-id="4758" instrument_node=""> </span><span class="date-container" data-dcnode-id="4752"><i data-dcnode-id="4753"><span data-dcnode-id="4757" instrument_node="">(</span><span class="date" data-dcnode-id="4755"><span data-dcnode-id="4756" instrument_node="">June 2018</span></span><span data-dcnode-id="4754" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="4745"><i data-dcnode-id="4746"><span data-dcnode-id="4751" instrument_node=""> (</span><small data-dcnode-id="4748"><a data-dcnode-id="4749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="4750" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="4747" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="4739" instrument_node="">
</span><h4 data-dcnode-id="4729"><span class="mw-headline" data-dcnode-id="4737" id="The_Workplace_as_a_political_entity_to_be_democratized"><span data-dcnode-id="4738" instrument_node="">The Workplace as a political entity to be democratized</span></span><span class="mw-editsection" data-dcnode-id="4730"><span class="mw-editsection-bracket" data-dcnode-id="4735"><span data-dcnode-id="4736" instrument_node="">[</span></span><a data-dcnode-id="4733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D22" title="Edit section: The Workplace as a political entity to be democratized"><span data-dcnode-id="4734" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4731"><span data-dcnode-id="4732" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4728" instrument_node="">
</span><p data-dcnode-id="4722"><span data-dcnode-id="4727" instrument_node="">Workplace democracy has been cited as a possible solution to the problems that arise from excluding employees from decision-making such as low-employee morale, employee alienation, and low employee engagement.</span><sup class="reference" data-dcnode-id="4724" id="cite_ref-88"><a data-dcnode-id="4725" href="#cite_note-88"><span data-dcnode-id="4726" instrument_node="">[88]</span></a></sup><span data-dcnode-id="4723" instrument_node="">
</span></p><p data-dcnode-id="4709"><span data-dcnode-id="4721" instrument_node="">Political theorist </span><a data-dcnode-id="4719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isabelle_Ferreras" title="Isabelle Ferreras"><span data-dcnode-id="4720" instrument_node="">Isabelle Ferreras</span></a><span data-dcnode-id="4718" instrument_node=""> argues that there exists “a great contradiction between the democratic nature of our times and the reality of the work experience.”</span><sup class="reference" data-dcnode-id="4715" id="cite_ref-:0_89-0"><a data-dcnode-id="4716" href="#cite_note-:0-89"><span data-dcnode-id="4717" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4714" instrument_node=""> She argues that the modern corporation's two basic inputs, capital and labor, are treated in radically different ways. Capital owners of a firm wield power within a system of shareholder democracy that allocates voice democratically according to how much capital investment they place in the firm. Labor, on the other hand, rarely benefits from a system to voice their concerns within the firm. She argues that firms are more than just economic organizations especially given the power that they wield over people's livelihoods, environment, and rights. Rather, Ferreras holds that firms are best understood as political entities. And as political entities “it is crucial that firms be made compatible with the democratic commitments of our nations.”</span><sup class="reference" data-dcnode-id="4711" id="cite_ref-:0_89-1"><a data-dcnode-id="4712" href="#cite_note-:0-89"><span data-dcnode-id="4713" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4710" instrument_node="">
</span></p><p data-dcnode-id="4707"><span data-dcnode-id="4708" instrument_node="">Germany and to a lesser extent the broader European Union have experimented with a way of workplace democracy known as Co-determination, a system that allows workers to elect representatives that sit on the board of directors of a company. Common criticisms of workplace democracy include that democratic workplaces are less efficient than hierarchical workplace, that managers are best equipped to make company decisions since they are better educated and aware of the broader business context.
</span></p><span data-dcnode-id="4706" instrument_node="">
</span><h4 data-dcnode-id="4696"><span class="mw-headline" data-dcnode-id="4704" id="Creating_a_widespread_distribution_of_productive_assets"><span data-dcnode-id="4705" instrument_node="">Creating a widespread distribution of productive assets</span></span><span class="mw-editsection" data-dcnode-id="4697"><span class="mw-editsection-bracket" data-dcnode-id="4702"><span data-dcnode-id="4703" instrument_node="">[</span></span><a data-dcnode-id="4700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D23" title="Edit section: Creating a widespread distribution of productive assets"><span data-dcnode-id="4701" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4698"><span data-dcnode-id="4699" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4695" instrument_node="">
</span><p data-dcnode-id="4666"><span data-dcnode-id="4694" instrument_node="">One of the biggest criticisms against capitalism is that it concentrates economic and, as a result, </span><a class="mw-redirect" data-dcnode-id="4692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_power" title="Political power"><span data-dcnode-id="4693" instrument_node="">political power</span></a><span data-dcnode-id="4691" instrument_node=""> in a few hands. Theorists of economic democracy have argued that one solution to this unequal concentration of power is to create mechanisms that distribute ownership of productive assets across the entire population. In </span><i data-dcnode-id="4688"><a data-dcnode-id="4689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Justice_as_Fairness%3A_A_Restatement" title="Justice as Fairness: A Restatement"><span data-dcnode-id="4690" instrument_node="">Justice as Fairness: A Restatement</span></a></i><span data-dcnode-id="4687" instrument_node="">, </span><a data-dcnode-id="4685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Rawls" title="John Rawls"><span data-dcnode-id="4686" instrument_node="">John Rawls</span></a><span data-dcnode-id="4684" instrument_node=""> argued that only two systems could embody the main features of his principles of justice: </span><a data-dcnode-id="4682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_socialism" title="Liberal socialism"><span data-dcnode-id="4683" instrument_node="">liberal socialism</span></a><span data-dcnode-id="4681" instrument_node=""> or a </span><a data-dcnode-id="4679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Property-owning_democracy" title="Property-owning democracy"><span data-dcnode-id="4680" instrument_node="">property-owning democracy</span></a><span data-dcnode-id="4678" instrument_node="">.</span><sup class="reference" data-dcnode-id="4675" id="cite_ref-90"><a data-dcnode-id="4676" href="#cite_note-90"><span data-dcnode-id="4677" instrument_node="">[90]</span></a></sup><span data-dcnode-id="4674" instrument_node=""> Within a property-owning democracy, Rawls envisioned widespread use of </span><a data-dcnode-id="4672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Worker_cooperative" title="Worker cooperative"><span data-dcnode-id="4673" instrument_node="">worker-owned cooperatives</span></a><span data-dcnode-id="4671" instrument_node="">, partial-employee ownership of firms, systems to redistribute one's assets after death to prevent the accumulation of wealth, as well as a strong system of asset-based redistribution that encourages workers to own productive assets.</span><sup class="reference" data-dcnode-id="4668" id="cite_ref-91"><a data-dcnode-id="4669" href="#cite_note-91"><span data-dcnode-id="4670" instrument_node="">[91]</span></a></sup><span data-dcnode-id="4667" instrument_node="">
</span></p><p data-dcnode-id="4652"><span data-dcnode-id="4665" instrument_node="">Operating under the idea that making ownership more widespread leads to more equitable outcomes various proposals of asset-based welfare and asset-redistribution have been conceived. Individualistic and liberal asset-based welfare strategies such as the </span><a data-dcnode-id="4663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_Trust_Funds_Act_2004" title="Child Trust Funds Act 2004"><span data-dcnode-id="4664" instrument_node="">United Kingdom's Child Trust Fund</span></a><span data-dcnode-id="4662" instrument_node=""> or the </span><a data-dcnode-id="4660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Individual_development_account" title="Individual development account"><span data-dcnode-id="4661" instrument_node="">United States Individual Development Account</span></a><span data-dcnode-id="4659" instrument_node=""> aimed to help people save money so that it could be invested on education, home-ownership, or entrepreneurship. More experimental and left-leaning proposals include worker owned cooperatives, </span><a data-dcnode-id="4657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Employee_stock_ownership" title="Employee stock ownership"><span data-dcnode-id="4658" instrument_node="">ESOPS</span></a><span data-dcnode-id="4656" instrument_node="">, or </span><a data-dcnode-id="4654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Roemer" title="John Roemer"><span data-dcnode-id="4655" instrument_node="">Roemer</span></a><span data-dcnode-id="4653" instrument_node="">'s coupon socialism.
</span></p><span data-dcnode-id="4651" instrument_node="">
</span><h2 data-dcnode-id="4641"><span class="mw-headline" data-dcnode-id="4649" id="Critiques"><span data-dcnode-id="4650" instrument_node="">Critiques</span></span><span class="mw-editsection" data-dcnode-id="4642"><span class="mw-editsection-bracket" data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">[</span></span><a data-dcnode-id="4645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D24" title="Edit section: Critiques"><span data-dcnode-id="4646" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4643"><span data-dcnode-id="4644" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4640" instrument_node="">
</span><p data-dcnode-id="4625"><a data-dcnode-id="4638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ludwig_von_Mises" title="Ludwig von Mises"><span data-dcnode-id="4639" instrument_node="">Ludwig von Mises</span></a><span data-dcnode-id="4637" instrument_node=""> argued that ownership and control over the </span><a data-dcnode-id="4635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Means_of_production" title="Means of production"><span data-dcnode-id="4636" instrument_node="">means of production</span></a><span data-dcnode-id="4634" instrument_node=""> belongs to private firms and can only be sustained by means of consumer choice, exercised daily in the marketplace.</span><sup class="reference" data-dcnode-id="4631" id="cite_ref-FOOTNOTEMises1953preface;_p._443_92-0"><a data-dcnode-id="4632" href="#cite_note-FOOTNOTEMises1953preface;_p._443-92"><span data-dcnode-id="4633" instrument_node="">[92]</span></a></sup><span data-dcnode-id="4630" instrument_node=""> "The capitalistic social order", he claimed, therefore "is an economic democracy in the strictest sense of the word".</span><sup class="reference" data-dcnode-id="4627" id="cite_ref-FOOTNOTEMises2006158_93-0"><a data-dcnode-id="4628" href="#cite_note-FOOTNOTEMises2006158-93"><span data-dcnode-id="4629" instrument_node="">[93]</span></a></sup><span data-dcnode-id="4626" instrument_node=""> Critics of Von Mises claim that consumers only vote on the value of the product when they make a purchase—they are not participating in the management of firms, or voting on how the profits are to be used.
</span></p><span data-dcnode-id="4624" instrument_node="">
