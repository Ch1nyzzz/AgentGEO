</span><p data-dcnode-id="6769"><b data-dcnode-id="6800"><span data-dcnode-id="6801" instrument_node="">Economic democracy</span></b><span data-dcnode-id="6799" instrument_node=""> is a </span><a data-dcnode-id="6797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socioeconomics" title="Socioeconomics"><span data-dcnode-id="6798" instrument_node="">socioeconomic</span></a><span data-dcnode-id="6796" instrument_node=""> philosophy that proposes to shift decision-making power from </span><a data-dcnode-id="6794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Management" title="Management"><span data-dcnode-id="6795" instrument_node="">corporate managers</span></a><span data-dcnode-id="6793" instrument_node=""> and </span><a data-dcnode-id="6791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shareholder" title="Shareholder"><span data-dcnode-id="6792" instrument_node="">corporate shareholders</span></a><span data-dcnode-id="6790" instrument_node=""> to a larger group of </span><a data-dcnode-id="6788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stakeholder_theory" title="Stakeholder theory"><span data-dcnode-id="6789" instrument_node="">public stakeholders</span></a><span data-dcnode-id="6787" instrument_node=""> that includes workers, customers, suppliers, neighbours and the broader public. No single definition or approach encompasses economic democracy, but most proponents claim that modern property relations </span><a data-dcnode-id="6785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Externality" title="Externality"><span data-dcnode-id="6786" instrument_node="">externalize</span></a><span data-dcnode-id="6784" instrument_node=""> costs, subordinate the general well-being to private profit and deny the polity a democratic voice in economic policy decisions.</span><sup class="reference" data-dcnode-id="6781" id="cite_ref-FOOTNOTESmith2005_1-0"><a data-dcnode-id="6782" href="#cite_note-FOOTNOTESmith2005-1"><span data-dcnode-id="6783" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6780" instrument_node=""> In addition to these moral concerns, economic democracy makes practical claims, such as that it can compensate for </span><a data-dcnode-id="6778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capitalism" title="Capitalism"><span data-dcnode-id="6779" instrument_node="">capitalism</span></a><span data-dcnode-id="6777" instrument_node="">'s inherent </span><a data-dcnode-id="6775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Effective_demand" title="Effective demand"><span data-dcnode-id="6776" instrument_node="">effective demand</span></a><span data-dcnode-id="6774" instrument_node=""> gap.</span><sup class="reference" data-dcnode-id="6771" id="cite_ref-FOOTNOTEHarvey2010107_2-0"><a data-dcnode-id="6772" href="#cite_note-FOOTNOTEHarvey2010107-2"><span data-dcnode-id="6773" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6770" instrument_node="">
</span></p><p data-dcnode-id="6717"><span data-dcnode-id="6768" instrument_node="">Proponents of economic democracy generally argue that modern capitalism periodically results in economic crises characterized by deficiency of effective demand as society is unable to earn enough income to buy its output production. </span><a data-dcnode-id="6766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corporation" title="Corporation"><span data-dcnode-id="6767" instrument_node="">Corporate</span></a><span data-dcnode-id="6765" instrument_node=""> </span><a data-dcnode-id="6763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monopoly" title="Monopoly"><span data-dcnode-id="6764" instrument_node="">monopoly</span></a><span data-dcnode-id="6762" instrument_node=""> of </span><a data-dcnode-id="6760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Common-pool_resource" title="Common-pool resource"><span data-dcnode-id="6761" instrument_node="">common resources</span></a><span data-dcnode-id="6759" instrument_node=""> typically creates </span><a data-dcnode-id="6757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artificial_scarcity" title="Artificial scarcity"><span data-dcnode-id="6758" instrument_node="">artificial scarcity</span></a><span data-dcnode-id="6756" instrument_node="">, resulting in socio-economic imbalances that restrict workers from access to economic opportunity and diminish consumer </span><a data-dcnode-id="6754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Purchasing_power" title="Purchasing power"><span data-dcnode-id="6755" instrument_node="">purchasing power</span></a><span data-dcnode-id="6753" instrument_node="">.</span><sup class="reference" data-dcnode-id="6750" id="cite_ref-FOOTNOTEGeorge1912_3-0"><a data-dcnode-id="6751" href="#cite_note-FOOTNOTEGeorge1912-3"><span data-dcnode-id="6752" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6749" instrument_node=""> Economic democracy has been proposed as a component of larger socioeconomic ideologies, as a stand-alone theory and as a variety of reform agendas. For example, as a means to securing full </span><a data-dcnode-id="6747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic%2C_social_and_cultural_rights" title="Economic, social and cultural rights"><span data-dcnode-id="6748" instrument_node="">economic rights</span></a><span data-dcnode-id="6746" instrument_node="">, it opens a path to full </span><a class="mw-redirect" data-dcnode-id="6744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_Rights" title="Civil Rights"><span data-dcnode-id="6745" instrument_node="">political rights</span></a><span data-dcnode-id="6743" instrument_node="">, defined as including the former.</span><sup class="reference" data-dcnode-id="6740" id="cite_ref-FOOTNOTESmith2005_1-1"><a data-dcnode-id="6741" href="#cite_note-FOOTNOTESmith2005-1"><span data-dcnode-id="6742" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6739" instrument_node=""> Both market and non-market theories of economic democracy have been proposed. As a reform agenda, supporting theories and real-world examples can include </span><a data-dcnode-id="6737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decentralization" title="Decentralization"><span data-dcnode-id="6738" instrument_node="">decentralization</span></a><span data-dcnode-id="6736" instrument_node="">, </span><a data-dcnode-id="6734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cooperative" title="Cooperative"><span data-dcnode-id="6735" instrument_node="">democratic cooperatives</span></a><span data-dcnode-id="6733" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_banking" title="Public banking"><span data-dcnode-id="6732" instrument_node="">public banking</span></a><span data-dcnode-id="6730" instrument_node="">, </span><a data-dcnode-id="6728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fair_trade" title="Fair trade"><span data-dcnode-id="6729" instrument_node="">fair trade</span></a><span data-dcnode-id="6727" instrument_node=""> and the </span><a data-dcnode-id="6725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regionalism_%28politics%29" title="Regionalism (politics)"><span data-dcnode-id="6726" instrument_node="">regionalization</span></a><span data-dcnode-id="6724" instrument_node=""> of </span><a data-dcnode-id="6722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Local_food" title="Local food"><span data-dcnode-id="6723" instrument_node="">food production</span></a><span data-dcnode-id="6721" instrument_node=""> and </span><a data-dcnode-id="6719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Local_currency" title="Local currency"><span data-dcnode-id="6720" instrument_node="">currency</span></a><span data-dcnode-id="6718" instrument_node="">.

</span><li class="toclevel-1 tocsection-27" data-dcnode-id="6463"><a data-dcnode-id="6464" href="#References"><span class="tocnumber" data-dcnode-id="6468"><span data-dcnode-id="6469" instrument_node="">7</span></span><span data-dcnode-id="6467" instrument_node=""> </span><span class="toctext" data-dcnode-id="6465"><span data-dcnode-id="6466" instrument_node="">References</span></span></a></li><span data-dcnode-id="6462" instrument_node="">

</span><h2 data-dcnode-id="6438"><span class="mw-headline" data-dcnode-id="6446" id="Deficiency_of_effective_demand"><span data-dcnode-id="6447" instrument_node="">Deficiency of effective demand</span></span><span class="mw-editsection" data-dcnode-id="6439"><span class="mw-editsection-bracket" data-dcnode-id="6444"><span data-dcnode-id="6445" instrument_node="">[</span></span><a data-dcnode-id="6442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D1" title="Edit section: Deficiency of effective demand"><span data-dcnode-id="6443" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6440"><span data-dcnode-id="6441" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6437" instrument_node="">
</span><p data-dcnode-id="6425"><span data-dcnode-id="6436" instrument_node="">According to many analysts, deficiency of effective demand is the most fundamental economic problem. That is, modern society does not earn enough income to purchase its output. For example, </span><a data-dcnode-id="6434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_geography" title="Economic geography"><span data-dcnode-id="6435" instrument_node="">economic geographer</span></a><span data-dcnode-id="6433" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="6431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Harvey_%28geographer%29" title="David Harvey (geographer)"><span data-dcnode-id="6432" instrument_node="">David Harvey</span></a><span data-dcnode-id="6430" instrument_node=""> claims, "Workers spending their wages is one source of effective demand, but the total wage bill is always less than the total capital in circulation (otherwise there would be no profit), so the purchase of wage goods that sustain daily life (even with a suburban lifestyle) is never sufficient for the profitable sale of the total output".</span><sup class="reference" data-dcnode-id="6427" id="cite_ref-FOOTNOTEHarvey2010107_2-1"><a data-dcnode-id="6428" href="#cite_note-FOOTNOTEHarvey2010107-2"><span data-dcnode-id="6429" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6426" instrument_node="">
</span></p><p data-dcnode-id="6395"><span data-dcnode-id="6424" instrument_node="">In the </span><a class="mw-redirect" data-dcnode-id="6422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgist" title="Georgist"><span data-dcnode-id="6423" instrument_node="">Georgist</span></a><span data-dcnode-id="6421" instrument_node=""> view of any </span><a data-dcnode-id="6419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economics" title="Economics"><span data-dcnode-id="6420" instrument_node="">economic system</span></a><span data-dcnode-id="6418" instrument_node="">, "wealth" includes all material things produced by labor for the satisfaction of human desires and having </span><a data-dcnode-id="6416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exchange_value" title="Exchange value"><span data-dcnode-id="6417" instrument_node="">exchange value</span></a><span data-dcnode-id="6415" instrument_node="">. </span><a data-dcnode-id="6413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Land_%28economics%29" title="Land (economics)"><span data-dcnode-id="6414" instrument_node="">Land</span></a><span data-dcnode-id="6412" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_%28economics%29" title="Labour (economics)"><span data-dcnode-id="6411" instrument_node="">labor</span></a><span data-dcnode-id="6409" instrument_node=""> and capital are generally considered the essential factors in producing wealth. Land includes all natural opportunities and forces. Labor includes all human exertion. </span><a data-dcnode-id="6407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_%28economics%29" title="Capital (economics)"><span data-dcnode-id="6408" instrument_node="">Capital</span></a><span data-dcnode-id="6406" instrument_node=""> includes the portion of wealth devoted to producing more wealth. While the income of any individual might include proceeds from any combination of these three sources—land, labor and capital are generally considered mutually exclusive factors in economic models of the production and distribution of wealth. According to </span><a data-dcnode-id="6404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_George" title="Henry George"><span data-dcnode-id="6405" instrument_node="">Henry George</span></a><span data-dcnode-id="6403" instrument_node="">: "People seek to satisfy their desires with the least exertion".</span><sup class="reference" data-dcnode-id="6400" id="cite_ref-FOOTNOTEGeorge1912_3-1"><a data-dcnode-id="6401" href="#cite_note-FOOTNOTEGeorge1912-3"><span data-dcnode-id="6402" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6399" instrument_node=""> Human beings interact with nature to produce goods and services that other human beings need or desire. The laws and </span><a class="mw-redirect" data-dcnode-id="6397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Custom_%28law%29" title="Custom (law)"><span data-dcnode-id="6398" instrument_node="">customs</span></a><span data-dcnode-id="6396" instrument_node=""> that govern the relationships among these entities constitute the economic structure of a given society.
</span></p><p data-dcnode-id="6387"><span data-dcnode-id="6394" instrument_node="">Alternately, </span><a data-dcnode-id="6392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Schweickart" title="David Schweickart"><span data-dcnode-id="6393" instrument_node="">David Schweickart</span></a><span data-dcnode-id="6391" instrument_node=""> asserts in his book, </span><i data-dcnode-id="6389"><span data-dcnode-id="6390" instrument_node="">After Capitalism</span></i><span data-dcnode-id="6388" instrument_node="">: "The structure of a capitalist society consists of three basic components:
</span></p><span data-dcnode-id="6386" instrument_node="">
</span><ul data-dcnode-id="6368"><li data-dcnode-id="6381"><span data-dcnode-id="6385" instrument_node="">"The bulk of the </span><a data-dcnode-id="6383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Means_of_production" title="Means of production"><span data-dcnode-id="6384" instrument_node="">means of production</span></a><span data-dcnode-id="6382" instrument_node=""> are privately owned, either directly by individuals or by corporations that are themselves owned by private individuals.</span></li><span data-dcnode-id="6380" instrument_node="">
</span><li data-dcnode-id="6378"><span data-dcnode-id="6379" instrument_node="">"Products are exchanged in a market -- that is to say, goods and services are bought and sold at prices determined for the most part by competition and not by some governmental pricing authority. Individual enterprises compete with one another in providing goods and services to consumers, each enterprise trying to make a profit. This competition is the primary determinant of prices.</span></li><span data-dcnode-id="6377" instrument_node="">
</span><li data-dcnode-id="6369"><span data-dcnode-id="6376" instrument_node="">"Most of the people who work for pay in this society work for other people, who own the means of production. Most working people are '</span><a data-dcnode-id="6374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wage_labour" title="Wage labour"><span data-dcnode-id="6375" instrument_node="">wage labourers</span></a><span data-dcnode-id="6373" instrument_node="">'".</span><sup class="reference" data-dcnode-id="6370" id="cite_ref-FOOTNOTESchweickart200222–23_4-0"><a data-dcnode-id="6371" href="#cite_note-FOOTNOTESchweickart200222%E2%80%9323-4"><span data-dcnode-id="6372" instrument_node="">[4]</span></a></sup></li></ul><span data-dcnode-id="6367" instrument_node="">
</span><p data-dcnode-id="6350"><a data-dcnode-id="6365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supply_and_demand" title="Supply and demand"><span data-dcnode-id="6366" instrument_node="">Supply and demand</span></a><span data-dcnode-id="6364" instrument_node=""> are generally accepted as market functions for establishing </span><a data-dcnode-id="6362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Price" title="Price"><span data-dcnode-id="6363" instrument_node="">prices</span></a><span data-dcnode-id="6361" instrument_node="">. Organisations typically endeavor to 1) minimize the </span><a data-dcnode-id="6359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cost-of-production_theory_of_value" title="Cost-of-production theory of value"><span data-dcnode-id="6360" instrument_node="">cost of production</span></a><span data-dcnode-id="6358" instrument_node="">; 2) increase sales; in order to 3) maximize profits. But, according to David Schweickart, if "those who produce the goods and services of society are paid less than their productive contribution", then as consumers they cannot buy all the goods produced, and investor confidence tends to decline, triggering declines in production and employment. Such economic instability stems from a central contradiction: Wages are both a cost of production and an essential source of </span><a data-dcnode-id="6356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Effective_demand" title="Effective demand"><span data-dcnode-id="6357" instrument_node="">effective demand</span></a><span data-dcnode-id="6355" instrument_node=""> (needs or desires backed with purchasing power), </span><sup class="reference" data-dcnode-id="6352" id="cite_ref-FOOTNOTESchweickart200236,_40–43,_95_5-0"><a data-dcnode-id="6353" href="#cite_note-FOOTNOTESchweickart200236,_40%E2%80%9343,_95-5"><span data-dcnode-id="6354" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6351" instrument_node=""> resulting in deficiency of effective demand along with a growing interest in economic democracy.
</span></p><p data-dcnode-id="6345"><span data-dcnode-id="6349" instrument_node="">In chapter 3 of his book, "Community Organizing: Theory and Practice", </span><a data-dcnode-id="6347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Douglas_Biklen" title="Douglas Biklen"><span data-dcnode-id="6348" instrument_node="">Douglas P. Biklen</span></a><span data-dcnode-id="6346" instrument_node=""> discusses a variety of perspectives on "The Making of Social Problems". One of those views suggests that "writers and organizers who define social problems in terms of social and economic democracy see problems not as the experiences of poor people, but as the relationship of poverty to wealth and exploitation". Biklen states that according to this viewpoint:
</span></p><span data-dcnode-id="6344" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="6336"><p data-dcnode-id="6337"><span data-dcnode-id="6341" instrument_node="">[C]orporate power, upper class power, uneven distribution of wealth and prejudice cause social problems... [T]he problem is not one of poverty, but of enormous wealth. The problem is not one of gaps or cracks in an otherwise fine system but of a system which perpetuates prejudicial views concerning race, sex, age, and disability. The problem is not one of incompetence but of barriers to education, jobs, and power. Accordingly, as long as there is a deep gulf between social classes, both in terms of wealth, power, and outlook, traditional social programs will act merely as palliatives to oppression and not as a way of ending large scale human misery. This perspective is, above all, eclectic. It embraces Marx's criticism of social class inequality but is not only a social class analysis. It is anti-racist, but it is not only a theory of race equality. It favors democratic distribution of power but is also an economic theory. It can be called a social and economic democracy perspective.</span><sup class="reference" data-dcnode-id="6338" id="cite_ref-6"><a data-dcnode-id="6339" href="#cite_note-6"><span data-dcnode-id="6340" instrument_node="">[6]</span></a></sup></p></blockquote><span data-dcnode-id="6335" instrument_node="">
</span><h3 data-dcnode-id="6324"><span data-dcnode-id="6334" id="Savings.2C_investment_and_unemployment"></span><span class="mw-headline" data-dcnode-id="6332" id="Savings,_investment_and_unemployment"><span data-dcnode-id="6333" instrument_node="">Savings, investment and unemployment</span></span><span class="mw-editsection" data-dcnode-id="6325"><span class="mw-editsection-bracket" data-dcnode-id="6330"><span data-dcnode-id="6331" instrument_node="">[</span></span><a data-dcnode-id="6328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D2" title="Edit section: Savings, investment and unemployment"><span data-dcnode-id="6329" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6326"><span data-dcnode-id="6327" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6323" instrument_node="">
</span><p data-dcnode-id="6297"><span data-dcnode-id="6322" instrument_node="">In his 1879 book </span><i data-dcnode-id="6320"><span data-dcnode-id="6321" instrument_node="">Progress and Poverty</span></i><span data-dcnode-id="6319" instrument_node="">, Henry George argued that a majority of wealth created in a "free market" economy was appropriated by land owners and </span><a data-dcnode-id="6317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monopoly" title="Monopoly"><span data-dcnode-id="6318" instrument_node="">monopolists</span></a><span data-dcnode-id="6316" instrument_node=""> through </span><a data-dcnode-id="6314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_rent" title="Economic rent"><span data-dcnode-id="6315" instrument_node="">economic rents</span></a><span data-dcnode-id="6313" instrument_node="">, and that concentration of such </span><a data-dcnode-id="6311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unearned_income" title="Unearned income"><span data-dcnode-id="6312" instrument_node="">unearned wealth</span></a><span data-dcnode-id="6310" instrument_node=""> was the root cause of poverty.</span><sup class="reference" data-dcnode-id="6307" id="cite_ref-FOOTNOTEGeorge1912[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_7-0"><a data-dcnode-id="6308" href="#cite_note-FOOTNOTEGeorge1912%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-7"><span data-dcnode-id="6309" instrument_node="">[7]</span></a></sup><span data-dcnode-id="6306" instrument_node=""> "Behind the abstraction known as 'the market' lurks a set of institutions designed to maximize the wealth and power of the most privileged group of people in the world—the creditor-rentier class of the first world and their junior partners in the third".</span><sup class="reference" data-dcnode-id="6303" id="cite_ref-8"><a data-dcnode-id="6304" href="#cite_note-8"><span data-dcnode-id="6305" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6302" instrument_node=""> Schweickart claimed that private savings are not only unnecessary for economic growth, they are often harmful to the overall economy.</span><sup class="reference" data-dcnode-id="6299" id="cite_ref-FOOTNOTESchweickart200217_9-0"><a data-dcnode-id="6300" href="#cite_note-FOOTNOTESchweickart200217-9"><span data-dcnode-id="6301" instrument_node="">[9]</span></a></sup><span data-dcnode-id="6298" instrument_node="">
</span></p><p data-dcnode-id="6291"><span data-dcnode-id="6296" instrument_node="">In an advanced industrial society, business credit is necessary for a healthy economy. A business that wants to expand production needs to command the labor of others, and money is the default mechanism for exercising this authority.</span><sup class="reference" data-dcnode-id="6293" id="cite_ref-FOOTNOTESchweickart2002[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_10-0"><a data-dcnode-id="6294" href="#cite_note-FOOTNOTESchweickart2002%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-10"><span data-dcnode-id="6295" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6292" instrument_node=""> It is often cheaper for a business to borrow capital from a bank than to stockpile cash.
</span></p><p data-dcnode-id="6281"><span data-dcnode-id="6290" instrument_node="">If private savings are loaned out to entrepreneurs who use them to buy raw materials and hire workers, then aggregate demand is not reduced.</span><sup class="reference" data-dcnode-id="6287" id="cite_ref-FOOTNOTESchweickart2002[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_10-1"><a data-dcnode-id="6288" href="#cite_note-FOOTNOTESchweickart2002%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-10"><span data-dcnode-id="6289" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6286" instrument_node=""> However, when private savings are not reinvested, the whole economy suffers recession, unemployment, and disappearance of savings </span><sup class="reference" data-dcnode-id="6283" id="cite_ref-FOOTNOTESchweickart200242–43_11-0"><a data-dcnode-id="6284" href="#cite_note-FOOTNOTESchweickart200242%E2%80%9343-11"><span data-dcnode-id="6285" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6282" instrument_node=""> which characterize deficiency of effective demand.
</span></p><p data-dcnode-id="6265"><span data-dcnode-id="6280" instrument_node="">In this view, unemployment is not an aberration, indicating any sort of systemic malfunction. Rather, unemployment is a necessary structural feature of capitalism, intended to discipline the workforce. If unemployment is too low, workers make wage demands that either cut into profits to an extent that jeopardizes future investment, or are passed on to consumers, thus generating inflationary instability. Schweickart suggested, "Capitalism cannot be a full-employment economy, except in the very short term. For unemployment is the "</span><a data-dcnode-id="6278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Invisible_hand" title="Invisible hand"><span data-dcnode-id="6279" instrument_node="">invisible hand</span></a><span data-dcnode-id="6277" instrument_node="">"—carrying a stick—that keeps the workforce in line."</span><sup class="reference" data-dcnode-id="6274" id="cite_ref-FOOTNOTESchweickart200297_12-0"><a data-dcnode-id="6275" href="#cite_note-FOOTNOTESchweickart200297-12"><span data-dcnode-id="6276" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6273" instrument_node=""> In this view, </span><a data-dcnode-id="6271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adam_Smith" title="Adam Smith"><span data-dcnode-id="6272" instrument_node="">Adam Smith's</span></a><span data-dcnode-id="6270" instrument_node=""> "invisible hand" does not seem reliable to guide economic forces on a large scale.</span><sup class="reference" data-dcnode-id="6267" id="cite_ref-FOOTNOTESmith2005[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_13-0"><a data-dcnode-id="6268" href="#cite_note-FOOTNOTESmith2005%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-13"><span data-dcnode-id="6269" instrument_node="">[13]</span></a></sup><span data-dcnode-id="6266" instrument_node="">
</span></p><p data-dcnode-id="6251"><span data-dcnode-id="6264" instrument_node="">Assuming business credit could come from public sources rather than from private savers, Schweickart and other analysts consider interest payments to private savers both undeserved and unnecessary for economic growth. Moreover, the personal decision to save rather than consume decreases aggregate demand, increases the likelihood of unemployment, and exacerbates the tendency toward economic stagnation. Since wealthy people tend to save more than poor people, the propensity of an economy to slump because of excess saving becomes ever more acute as a society becomes more affluent.</span><sup class="reference" data-dcnode-id="6261" id="cite_ref-FOOTNOTESchweickart2002[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_10-2"><a data-dcnode-id="6262" href="#cite_note-FOOTNOTESchweickart2002%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-10"><span data-dcnode-id="6263" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6260" instrument_node=""> Richard Wilkinson and Kate Pickett suggested that health and social problems are significantly worse in more unequal wealthy nations.</span><sup class="reference" data-dcnode-id="6257" id="cite_ref-14"><a data-dcnode-id="6258" href="#cite_note-14"><span data-dcnode-id="6259" instrument_node="">[14]</span></a></sup><span data-dcnode-id="6256" instrument_node=""> They argue that there are "pernicious effects that inequality has on societies: eroding trust, increasing anxiety and illness, (and) encouraging excessive consumption"</span><sup class="reference" data-dcnode-id="6253" id="cite_ref-15"><a data-dcnode-id="6254" href="#cite_note-15"><span data-dcnode-id="6255" instrument_node="">[15]</span></a></sup><span data-dcnode-id="6252" instrument_node="">
</span></p><span data-dcnode-id="6250" instrument_node="">
</span><h3 data-dcnode-id="6240"><span class="mw-headline" data-dcnode-id="6248" id="Monopoly_power_versus_purchasing_power"><span data-dcnode-id="6249" instrument_node="">Monopoly power versus purchasing power</span></span><span class="mw-editsection" data-dcnode-id="6241"><span class="mw-editsection-bracket" data-dcnode-id="6246"><span data-dcnode-id="6247" instrument_node="">[</span></span><a data-dcnode-id="6244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D3" title="Edit section: Monopoly power versus purchasing power"><span data-dcnode-id="6245" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6242"><span data-dcnode-id="6243" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6239" instrument_node="">
</span><p data-dcnode-id="6237"><span data-dcnode-id="6238" instrument_node="">Regarding a social and economic democracy perspective on social problems, Douglas P. Biklen states:
</span></p><span data-dcnode-id="6236" instrument_node="">
</span><link data-dcnode-id="6235" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="6229"><p data-dcnode-id="6230"><span data-dcnode-id="6234" instrument_node="">The theme of profit superseding individual well-being flows through this antimonopoly view of social problems. On the one hand, poor and middle income people find their lives deformed by their meager or nonexistent ability to pay for goods and services. Wealthy people, on the other hand, find that their relative position, in terms of wealth and power, grows with their ability to maintain the gulf between social classes. Thus monopolies or concentrated wealth plays a large part in creating social problems. Indeed, one might say, monopolies and policies which promote the former or concentrations of wealth are the problem.</span><sup class="reference" data-dcnode-id="6231" id="cite_ref-16"><a data-dcnode-id="6232" href="#cite_note-16"><span data-dcnode-id="6233" instrument_node="">[16]</span></a></sup></p></blockquote><span data-dcnode-id="6228" instrument_node="">
</span><p data-dcnode-id="6210"><span data-dcnode-id="6227" instrument_node="">The discipline of economics is largely a study of </span><a data-dcnode-id="6225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scarcity" title="Scarcity"><span data-dcnode-id="6226" instrument_node="">scarcity</span></a><span data-dcnode-id="6224" instrument_node=""> management; "the science which studies human behavior as a relationship between ends and scarce means which have alternative uses".</span><sup class="reference" data-dcnode-id="6221" id="cite_ref-17"><a data-dcnode-id="6222" href="#cite_note-17"><span data-dcnode-id="6223" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6220" instrument_node=""> Absent scarcity and alternative uses of available resources, many analysts claim there is no </span><a data-dcnode-id="6218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_problem" title="Economic problem"><span data-dcnode-id="6219" instrument_node="">economic problem</span></a><span data-dcnode-id="6217" instrument_node="">".
While he considers these functions a public wrong, Kellogg also asserted the responsibility of the public to find and implement a remedy. Generally considered </span><a data-dcnode-id="6215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monopoly" title="Monopoly"><span data-dcnode-id="6216" instrument_node="">monopoly power</span></a><span data-dcnode-id="6214" instrument_node="">, some view this "public wrong" as the most influential factor in </span><a data-dcnode-id="6212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artificial_scarcity" title="Artificial scarcity"><span data-dcnode-id="6213" instrument_node="">artificial scarcity</span></a><span data-dcnode-id="6211" instrument_node="">. For example, Henry George further suggested:
</span></p><span data-dcnode-id="6209" instrument_node="">
</span><link data-dcnode-id="6208" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="6202"><p data-dcnode-id="6203"><span data-dcnode-id="6207" instrument_node="">There is in reality no conflict between labor and capital; the true conflict is between labor and monopoly... Abolish the monopoly that forbids men to employ themselves and capital could not possibly oppress labor... [R]emove the cause of that injustice which deprives the laborer of the capital his toil creates and the sharp distinction between capitalist and laborer would, in fact, cease to exist.</span><sup class="reference" data-dcnode-id="6204" id="cite_ref-18"><a data-dcnode-id="6205" href="#cite_note-18"><span data-dcnode-id="6206" instrument_node="">[18]</span></a></sup></p></blockquote><span data-dcnode-id="6201" instrument_node="">
</span><p data-dcnode-id="6182"><span data-dcnode-id="6200" instrument_node="">For example, many analysts consider </span><a data-dcnode-id="6198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Invention" title="Invention"><span data-dcnode-id="6199" instrument_node="">invention</span></a><span data-dcnode-id="6197" instrument_node=""> a "more or less costless store of knowledge, captured by monopoly capital and protected in order to make it secret and a 'rare and scarce commodity', for sale at monopoly prices. So far as invention is concerned, a price is put on them not because they are scarce but in order to make them scarce to those who want to use them."</span><sup class="reference" data-dcnode-id="6194" id="cite_ref-19"><a data-dcnode-id="6195" href="#cite_note-19"><span data-dcnode-id="6196" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="6191" id="cite_ref-20"><a data-dcnode-id="6192" href="#cite_note-20"><span data-dcnode-id="6193" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="6188" id="cite_ref-FOOTNOTESmith2007[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_21-0"><a data-dcnode-id="6189" href="#cite_note-FOOTNOTESmith2007%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-21"><span data-dcnode-id="6190" instrument_node="">[21]</span></a></sup><span data-dcnode-id="6187" instrument_node=""> Patent monopolies raise share prices above tangible labor value. The difference between labor-value and monopoly-value raises goods prices, and is collected as "profit" by intermediaries who have contributed nothing to earn it.</span><sup class="reference" data-dcnode-id="6184" id="cite_ref-FOOTNOTESmith2007[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_21-1"><a data-dcnode-id="6185" href="#cite_note-FOOTNOTESmith2007%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-21"><span data-dcnode-id="6186" instrument_node="">[21]</span></a></sup><span data-dcnode-id="6183" instrument_node="">
</span></p><p data-dcnode-id="6170"><span data-dcnode-id="6181" instrument_node="">Analysts generally agree that such conditions typically result in a deficiency of effective demand. Labor does not earn enough to buy what enterprises produce. According to </span><a class="new" data-dcnode-id="6179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DJack_Rasmus%26action%3Dedit%26redlink%3D1" title="Jack Rasmus (page does not exist)"><span data-dcnode-id="6180" instrument_node="">Jack Rasmus</span></a><span data-dcnode-id="6178" instrument_node="">, author of </span><i data-dcnode-id="6176"><span data-dcnode-id="6177" instrument_node="">The Trillion Dollar Income Shift</span></i><span data-dcnode-id="6175" instrument_node="">, in June 2006, investment bank Goldman Sachs reported: "The most important contribution to the higher profit margins over the past five years has been a decline in Labor's share of national income."</span><sup class="reference" data-dcnode-id="6172" id="cite_ref-22"><a data-dcnode-id="6173" href="#cite_note-22"><span data-dcnode-id="6174" instrument_node="">[22]</span></a></sup><span data-dcnode-id="6171" instrument_node="">
</span></p><span data-dcnode-id="6169" instrument_node="">
</span><h3 data-dcnode-id="6159"><span class="mw-headline" data-dcnode-id="6167" id="Enclosure_of_the_commons"><span data-dcnode-id="6168" instrument_node="">Enclosure of the commons</span></span><span class="mw-editsection" data-dcnode-id="6160"><span class="mw-editsection-bracket" data-dcnode-id="6165"><span data-dcnode-id="6166" instrument_node="">[</span></span><a data-dcnode-id="6163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D4" title="Edit section: Enclosure of the commons"><span data-dcnode-id="6164" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6161"><span data-dcnode-id="6162" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6158" instrument_node="">
</span><p data-dcnode-id="6149"><span data-dcnode-id="6157" instrument_node="">Artificially restricted access of labor to common resources is generally considered monopoly or </span><a data-dcnode-id="6155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enclosure" title="Enclosure"><span data-dcnode-id="6156" instrument_node="">enclosure of the commons</span></a><span data-dcnode-id="6154" instrument_node="">. Due to the economic imbalance inherently imposed, such monopoly structures tend to be centrally dictated by law, and must be maintained by military force, trade agreements, or both.</span><sup class="reference" data-dcnode-id="6151" id="cite_ref-FOOTNOTEGeorge1912[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_7-1"><a data-dcnode-id="6152" href="#cite_note-FOOTNOTEGeorge1912%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-7"><span data-dcnode-id="6153" instrument_node="">[7]</span></a></sup><span data-dcnode-id="6150" instrument_node="">
</span></p><p data-dcnode-id="6144"><span data-dcnode-id="6148" instrument_node="">In 1911, American journalist </span><a data-dcnode-id="6146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ambrose_Bierce" title="Ambrose Bierce"><span data-dcnode-id="6147" instrument_node="">Ambrose Bierce</span></a><span data-dcnode-id="6145" instrument_node=""> defined "land" as:
</span></p><span data-dcnode-id="6143" instrument_node="">
</span><link data-dcnode-id="6142" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="6136"><p data-dcnode-id="6137"><span data-dcnode-id="6141" instrument_node="">A part of the earth's surface, considered as property. The theory that land is property subject to private ownership and control is the foundation of modern society.... Carried to its logical conclusion, it means that some have the right to prevent others from living; for the right to own implies the right exclusively to occupy; and in fact laws of trespass are enacted wherever property in land is recognized. It follows that if the whole area of terra firma is owned by A, B and C, there will be no place for D, E, F and G to be born, or, born as trespassers, to exist.</span><sup class="reference" data-dcnode-id="6138" id="cite_ref-23"><a data-dcnode-id="6139" href="#cite_note-23"><span data-dcnode-id="6140" instrument_node="">[23]</span></a></sup></p></blockquote><span data-dcnode-id="6135" instrument_node="">
</span><p data-dcnode-id="6114"><span data-dcnode-id="6134" instrument_node="">In </span><i data-dcnode-id="6132"><span data-dcnode-id="6133" instrument_node="">The Servile State</span></i><span data-dcnode-id="6131" instrument_node=""> (1912), </span><a data-dcnode-id="6129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hilaire_Belloc" title="Hilaire Belloc"><span data-dcnode-id="6130" instrument_node="">Hilaire Belloc</span></a><span data-dcnode-id="6128" instrument_node=""> referred to the </span><a data-dcnode-id="6126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enclosure" title="Enclosure"><span data-dcnode-id="6127" instrument_node="">Enclosures Movement</span></a><span data-dcnode-id="6125" instrument_node=""> when he said, "England was already captured by a wealthy </span><a data-dcnode-id="6123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oligarchy" title="Oligarchy"><span data-dcnode-id="6124" instrument_node="">oligarchy</span></a><span data-dcnode-id="6122" instrument_node=""> before the series of great </span><a data-dcnode-id="6120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_Revolution" title="Industrial Revolution"><span data-dcnode-id="6121" instrument_node="">industrial</span></a><span data-dcnode-id="6119" instrument_node=""> discoveries began". If you sought the accumulated wealth preliminary to launching new industry, "you had to turn to the class which had already monopolized the bulk of the means of production in England. The rich men alone could furnish you with those supplies".</span><sup class="reference" data-dcnode-id="6116" id="cite_ref-24"><a data-dcnode-id="6117" href="#cite_note-24"><span data-dcnode-id="6118" instrument_node="">[24]</span></a></sup><span data-dcnode-id="6115" instrument_node="">
</span></p><p data-dcnode-id="6096"><span data-dcnode-id="6113" instrument_node="">According to </span><a data-dcnode-id="6111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Barnes_%28entrepreneur%29" title="Peter Barnes (entrepreneur)"><span data-dcnode-id="6112" instrument_node="">Peter Barnes</span></a><span data-dcnode-id="6110" instrument_node="">, author of </span><i data-dcnode-id="6108"><span data-dcnode-id="6109" instrument_node="">Capitalism 3.0</span></i><span data-dcnode-id="6107" instrument_node="">, when Adam Smith wrote </span><i data-dcnode-id="6105"><span data-dcnode-id="6106" instrument_node="">The Wealth of Nations</span></i><span data-dcnode-id="6104" instrument_node=""> in 1776, the dominant form of business was partnership, in which regional groups of co-workers ran co-owned businesses. From this perspective, many considered the corporate model—stock sold to strangers—inherently prone to fraud. While numerous scandals historically support this dim view of corporate policy, small partnerships could not possibly compete with the aggregate capital generated by corporate </span><a data-dcnode-id="6102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economies_of_scale" title="Economies of scale"><span data-dcnode-id="6103" instrument_node="">economies of scale</span></a><span data-dcnode-id="6101" instrument_node="">. The greatest advantage of corporations over any other business model is their ability to raise capital from strangers. The corporate model benefits from laws that limit stockholders' liability to the amounts they have invested.</span><sup class="reference" data-dcnode-id="6098" id="cite_ref-FOOTNOTEBarnes2006_25-0"><a data-dcnode-id="6099" href="#cite_note-FOOTNOTEBarnes2006-25"><span data-dcnode-id="6100" instrument_node="">[25]</span></a></sup><span data-dcnode-id="6097" instrument_node="">
</span></p><p data-dcnode-id="6060"><span data-dcnode-id="6095" instrument_node="">In </span><i data-dcnode-id="6093"><span data-dcnode-id="6094" instrument_node="">A Preface To Economic Democracy</span></i><span data-dcnode-id="6092" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_A._Dahl" title="Robert A. Dahl"><span data-dcnode-id="6091" instrument_node="">Robert A. Dahl</span></a><span data-dcnode-id="6089" instrument_node=""> suggests that </span><a data-dcnode-id="6087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agriculture" title="Agriculture"><span data-dcnode-id="6088" instrument_node="">agrarian</span></a><span data-dcnode-id="6086" instrument_node=""> economy and society in the early United States "underwent a </span><a data-dcnode-id="6084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_Revolution" title="Industrial Revolution"><span data-dcnode-id="6085" instrument_node="">revolutionary</span></a><span data-dcnode-id="6083" instrument_node=""> transformation into a new system of commercial and industrial capitalism that automatically generated vast </span><a data-dcnode-id="6081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_inequality" title="Economic inequality"><span data-dcnode-id="6082" instrument_node="">inequalities</span></a><span data-dcnode-id="6080" instrument_node=""> of wealth, income, </span><a data-dcnode-id="6078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_status" title="Social status"><span data-dcnode-id="6079" instrument_node="">status</span></a><span data-dcnode-id="6077" instrument_node="">, and </span><a data-dcnode-id="6075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_power" title="Economic power"><span data-dcnode-id="6076" instrument_node="">power</span></a><span data-dcnode-id="6074" instrument_node="">." Dahl claims that such inequalities result from the "</span><a data-dcnode-id="6072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberty" title="Liberty"><span data-dcnode-id="6073" instrument_node="">liberty</span></a><span data-dcnode-id="6071" instrument_node=""> to accumulate unlimited </span><a data-dcnode-id="6069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Factors_of_production" title="Factors of production"><span data-dcnode-id="6070" instrument_node="">economic resources</span></a><span data-dcnode-id="6068" instrument_node=""> and to organize economic activity into </span><a data-dcnode-id="6066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hierarchy" title="Hierarchy"><span data-dcnode-id="6067" instrument_node="">hierarchically</span></a><span data-dcnode-id="6065" instrument_node=""> governed enterprises."</span><sup class="reference" data-dcnode-id="6062" id="cite_ref-FOOTNOTEDahl198550_26-0"><a data-dcnode-id="6063" href="#cite_note-FOOTNOTEDahl198550-26"><span data-dcnode-id="6064" instrument_node="">[26]</span></a></sup><span data-dcnode-id="6061" instrument_node="">
</span></p><span data-dcnode-id="6059" instrument_node="">
</span><h3 data-dcnode-id="6049"><span class="mw-headline" data-dcnode-id="6057" id="The_rise_of_corporations_and_ending_labor_shortage"><span data-dcnode-id="6058" instrument_node="">The rise of corporations and ending labor shortage</span></span><span class="mw-editsection" data-dcnode-id="6050"><span class="mw-editsection-bracket" data-dcnode-id="6055"><span data-dcnode-id="6056" instrument_node="">[</span></span><a data-dcnode-id="6053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D5" title="Edit section: The rise of corporations and ending labor shortage"><span data-dcnode-id="6054" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6051"><span data-dcnode-id="6052" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6048" instrument_node="">
</span><p data-dcnode-id="6040"><span data-dcnode-id="6047" instrument_node="">According to author Greg MacLeod, the concept of the corporation originated in Roman times. However, "the modern business corporation evolved radically from its ancient roots into a form with little relation to the purpose as understood by historians of law." John Davis, a legal historian, noted that the precursor of the business corporation was the first </span><a data-dcnode-id="6045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monastery" title="Monastery"><span data-dcnode-id="6046" instrument_node="">monastery</span></a><span data-dcnode-id="6044" instrument_node="">, established in the sixth century, the purpose of which was to serve society. Most business corporations before 1900 developed in Great Britain, where they were established by </span><a data-dcnode-id="6042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_charter" title="Royal charter"><span data-dcnode-id="6043" instrument_node="">royal charter</span></a><span data-dcnode-id="6041" instrument_node="">, with the expectation of contributions to society. Incorporation was a privilege granted in return for service to the crown or the nation. MacLeod goes on to say:
</span></p><span data-dcnode-id="6039" instrument_node="">
</span><link data-dcnode-id="6038" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="6026"><p data-dcnode-id="6027"><span data-dcnode-id="6037" instrument_node="">A corporation is considered by the law to exist as a legal person. In the </span><a data-dcnode-id="6035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_Ages" title="Middle Ages"><span data-dcnode-id="6036" instrument_node="">Middle Ages</span></a><span data-dcnode-id="6034" instrument_node=""> it was called a "persona ficta". This is a very useful way of looking at a business corporation, because it suggests correctly that the </span><a data-dcnode-id="6032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corporate_personhood" title="Corporate personhood"><span data-dcnode-id="6033" instrument_node="">corporate person</span></a><span data-dcnode-id="6031" instrument_node=""> has a certain personality. It has duties and responsibilities vested unto it by the legitimate government or society that fostered it. The corporate person receives great benefits from society – and, in return, it must exercise great responsibilities. One of the most basic responsibilities is job creation, a fundamental need in any society.</span><sup class="reference" data-dcnode-id="6028" id="cite_ref-27"><a data-dcnode-id="6029" href="#cite_note-27"><span data-dcnode-id="6030" instrument_node="">[27]</span></a></sup></p></blockquote><span data-dcnode-id="6025" instrument_node="">
</span><p data-dcnode-id="6008"><span data-dcnode-id="6024" instrument_node="">By the mid-nineteenth century, corporations could live forever, engage in any legal activity, and merge with or acquire other corporations. In 1886, the </span><a data-dcnode-id="6022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_the_United_States" title="Supreme Court of the United States"><span data-dcnode-id="6023" instrument_node="">U.S. Supreme Court</span></a><span data-dcnode-id="6021" instrument_node=""> legally recognized corporations as “persons”, entitled under the </span><a data-dcnode-id="6019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fourteenth_Amendment_to_the_United_States_Constitution" title="Fourteenth Amendment to the United States Constitution"><span data-dcnode-id="6020" instrument_node="">Fourteenth Amendment</span></a><span data-dcnode-id="6018" instrument_node=""> to the same protections as living </span><a data-dcnode-id="6016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Citizenship" title="Citizenship"><span data-dcnode-id="6017" instrument_node="">citizens</span></a><span data-dcnode-id="6015" instrument_node="">. Unlike average citizens, large corporations had large flows of money at their disposal. With this money they can hire </span><a data-dcnode-id="6013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lobbying" title="Lobbying"><span data-dcnode-id="6014" instrument_node="">lobbyists</span></a><span data-dcnode-id="6012" instrument_node="">, donate copiously to politicians, and sway </span><a data-dcnode-id="6010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_opinion" title="Public opinion"><span data-dcnode-id="6011" instrument_node="">public opinion</span></a><span data-dcnode-id="6009" instrument_node="">.
</span></p><p data-dcnode-id="5972"><span data-dcnode-id="6007" instrument_node="">But, despite </span><a data-dcnode-id="6005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_the_United_States" title="Supreme Court of the United States"><span data-dcnode-id="6006" instrument_node="">Supreme Court</span></a><span data-dcnode-id="6004" instrument_node=""> rulings, the modern corporation is not a real person. Rather, the publicly traded stock corporation is what Barnes terms an "</span><a data-dcnode-id="6002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Automaton" title="Automaton"><span data-dcnode-id="6003" instrument_node="">automaton</span></a><span data-dcnode-id="6001" instrument_node="">", explicitly designed to maximize return to its owners. A corporation never sleeps or slows down. It externalizes as many costs as possible, and never reaches an upper limit of profitability, because no such limit has yet been established. As a result, corporations keep getting larger. In 1955, sales of the </span><a data-dcnode-id="5999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fortune_500" title="Fortune 500"><span data-dcnode-id="6000" instrument_node="">Fortune 500</span></a><span data-dcnode-id="5998" instrument_node=""> accounted for one-third of U.S. gross domestic product. By 2004 they commanded two-thirds. In other words, these few hundred corporations replaced smaller firms organized as partnerships or </span><a data-dcnode-id="5996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sole_proprietorship" title="Sole proprietorship"><span data-dcnode-id="5997" instrument_node="">proprietorships</span></a><span data-dcnode-id="5995" instrument_node="">. Corporations have established a homogeneous global playing field around which they can freely move raw materials, labor, capital, finished products, tax-paying obligations, and profits. Thus, corporate franchise has become a perpetual grant of </span><a data-dcnode-id="5993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sovereignty" title="Sovereignty"><span data-dcnode-id="5994" instrument_node="">sovereignty</span></a><span data-dcnode-id="5992" instrument_node="">, including </span><a data-dcnode-id="5990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immortality" title="Immortality"><span data-dcnode-id="5991" instrument_node="">immortality</span></a><span data-dcnode-id="5989" instrument_node="">, </span><a data-dcnode-id="5987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-governance" title="Self-governance"><span data-dcnode-id="5988" instrument_node="">self-government</span></a><span data-dcnode-id="5986" instrument_node="">, and </span><a data-dcnode-id="5984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Limited_liability" title="Limited liability"><span data-dcnode-id="5985" instrument_node="">limited liability</span></a><span data-dcnode-id="5983" instrument_node="">. By the end of the twentieth century, corporate power—both economic and political—stretched worldwide. International agreements not only lowered </span><a data-dcnode-id="5981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tariff" title="Tariff"><span data-dcnode-id="5982" instrument_node="">tariffs</span></a><span data-dcnode-id="5980" instrument_node=""> but extended corporate </span><a data-dcnode-id="5978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Property" title="Property"><span data-dcnode-id="5979" instrument_node="">property rights</span></a><span data-dcnode-id="5977" instrument_node=""> and reduced the ability of sovereign nations to regulate corporations.</span><sup class="reference" data-dcnode-id="5974" id="cite_ref-FOOTNOTEBarnes2006_25-1"><a data-dcnode-id="5975" href="#cite_note-FOOTNOTEBarnes2006-25"><span data-dcnode-id="5976" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5973" instrument_node="">
</span></p><p data-dcnode-id="5941"><span data-dcnode-id="5971" instrument_node="">David Schweickart submits that such "hypermobility of capital" generates economic and political insecurity.</span><sup class="reference" data-dcnode-id="5968" id="cite_ref-FOOTNOTESchweickart2002[[Category:Wikipedia_articles_needing_page_number_citations_from_January_2012]]<sup_class=&quot;noprint_Inline-Template_&quot;_style=&quot;white-space:nowrap;&quot;>&amp;#91;<i>[[Wikipedia:Citing_sources|<span_title=&quot;This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;#32;(January_2012)&quot;>page&amp;nbsp;needed</span>]]</i>&amp;#93;</sup>_10-3"><a data-dcnode-id="5969" href="#cite_note-FOOTNOTESchweickart2002%5B%5BCategory:Wikipedia_articles_needing_page_number_citations_from_January_2012%5D%5D%3Csup_class=%22noprint_Inline-Template_%22_style=%22white-space:nowrap;%22%3E&amp;%2391;%3Ci%3E%5B%5BWikipedia:Citing_sources%7C%3Cspan_title=%22This_citation_requires_a_reference_to_the_specific_page_or_range_of_pages_in_which_the_material_appears.&amp;%2332;(January_2012)%22%3Epage&amp;nbsp;needed%3C/span%3E%5D%5D%3C/i%3E&amp;%2393;%3C/sup%3E-10"><span data-dcnode-id="5970" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5967" instrument_node=""> "If the search for lower wages comes to dominate the movement of capital, the result will be not only a lowering of worldwide wage disparities (the good to which some economists point) but also a lowering of total global income (a straight-out utilitarian bad)."</span><sup class="reference" data-dcnode-id="5964" id="cite_ref-FOOTNOTESchweickart200296_28-0"><a data-dcnode-id="5965" href="#cite_note-FOOTNOTESchweickart200296-28"><span data-dcnode-id="5966" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5963" instrument_node=""> Jack Rasmus, author of </span><i data-dcnode-id="5961"><span data-dcnode-id="5962" instrument_node="">The War At Home</span></i><span data-dcnode-id="5960" instrument_node=""> and </span><i data-dcnode-id="5958"><span data-dcnode-id="5959" instrument_node="">The Trillion Dollar Income Shift</span></i><span data-dcnode-id="5957" instrument_node="">, argues that the increasing concentration of corporate power is a cause of the large-scale debt, unemployment, and poverty characteristic of economic </span><a data-dcnode-id="5955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recession" title="Recession"><span data-dcnode-id="5956" instrument_node="">recession</span></a><span data-dcnode-id="5954" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Depression_%28economics%29" title="Depression (economics)"><span data-dcnode-id="5953" instrument_node="">depression</span></a><span data-dcnode-id="5951" instrument_node="">. According to Rasmus, income inequality in contemporary America increased as the relative share of income for corporations and the wealthiest one percent of households rose while income shares declined for 80-percent of the United States workforce. After rising steadily for three decades after World War II, the standard of living for most American workers has sharply declined between the mid-1970s to the present. Rasmus likens the widening income gap in contemporary American society to the decade leading up to the </span><a data-dcnode-id="5949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Depression" title="Great Depression"><span data-dcnode-id="5950" instrument_node="">Great Depression</span></a><span data-dcnode-id="5948" instrument_node="">, estimating "well over $1 trillion in income is transferred annually from the roughly 90 million working class families in America to corporations and the wealthiest non-working-class households. While a hundred new billionaires were created since 2001, </span><a data-dcnode-id="5946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real_wages" title="Real wages"><span data-dcnode-id="5947" instrument_node="">real weekly earnings</span></a><span data-dcnode-id="5945" instrument_node=""> for 100 million workers are less in 2007 than in 1980 when </span><a data-dcnode-id="5943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Reagan" title="Ronald Reagan"><span data-dcnode-id="5944" instrument_node="">Ronald Reagan</span></a><span data-dcnode-id="5942" instrument_node=""> took office".
</span></p><p data-dcnode-id="5922"><span data-dcnode-id="5940" instrument_node="">According to economist </span><a data-dcnode-id="5938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_D._Wolff" title="Richard D. Wolff"><span data-dcnode-id="5939" instrument_node="">Richard D. Wolff</span></a><span data-dcnode-id="5937" instrument_node="">, the 1970s brought an end to the labor shortage which had facilitated more than a century of rising average </span><a class="mw-redirect" data-dcnode-id="5935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real_wage" title="Real wage"><span data-dcnode-id="5936" instrument_node="">real wages</span></a><span data-dcnode-id="5934" instrument_node=""> in the United States.</span><sup class="reference" data-dcnode-id="5931" id="cite_ref-29"><a data-dcnode-id="5932" href="#cite_note-29"><span data-dcnode-id="5933" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5930" instrument_node=""> Wolff says Americans responded to the resulting deficiency of effective demand by working more hours and excessive borrowing; the latter paving the way for the </span><a class="mw-redirect" data-dcnode-id="5928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_crisis_of_2007%25E2%2580%259308" title="Financial crisis of 2007–08"><span data-dcnode-id="5929" instrument_node="">financial crisis of 2007–08</span></a><span data-dcnode-id="5927" instrument_node="">.</span><sup class="reference" data-dcnode-id="5924" id="cite_ref-Wolff_2012_46_30-0"><a data-dcnode-id="5925" href="#cite_note-Wolff_2012_46-30"><span data-dcnode-id="5926" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5923" instrument_node="">
</span></p><span data-dcnode-id="5921" instrument_node="">
</span><h3 data-dcnode-id="5911"><span class="mw-headline" data-dcnode-id="5919" id="Imperialism"><span data-dcnode-id="5920" instrument_node="">Imperialism</span></span><span class="mw-editsection" data-dcnode-id="5912"><span class="mw-editsection-bracket" data-dcnode-id="5917"><span data-dcnode-id="5918" instrument_node="">[</span></span><a data-dcnode-id="5915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_democracy%26action%3Dedit%26section%3D6" title="Edit section: Imperialism"><span data-dcnode-id="5916" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5913"><span data-dcnode-id="5914" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5910" instrument_node="">
</span><p data-dcnode-id="5893"><span data-dcnode-id="5909" instrument_node="">According to David Harvey, "the export of capital and the cultivation of new markets around the world" is a solution "as old as capitalism itself" for the deficiency of effective demand.</span><sup class="reference" data-dcnode-id="5906" id="cite_ref-31"><a data-dcnode-id="5907" href="#cite_note-31"><span data-dcnode-id="5908" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5905" instrument_node=""> Imperialism, as defined by </span><i data-dcnode-id="5903"><span data-dcnode-id="5904" instrument_node="">Dictionary of Human Geography</span></i><span data-dcnode-id="5902" instrument_node="">, is "the creation and/or maintenance of an unequal economic, cultural, and territorial relationship, usually between states and often in the form of an empire, based on domination and subordination."</span><sup class="reference" data-dcnode-id="5899" id="cite_ref-32"><a data-dcnode-id="5900" href="#cite_note-32"><span data-dcnode-id="5901" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5898" instrument_node=""> "These geographic shifts", according to David Harvey, "are the heart of uneven geographic development".</span><sup class="reference" data-dcnode-id="5895" id="cite_ref-33"><a data-dcnode-id="5896" href="#cite_note-33"><span data-dcnode-id="5897" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5894" instrument_node="">
</span></p><p data-dcnode-id="5881"><a data-dcnode-id="5891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Lenin" title="Vladimir Lenin"><span data-dcnode-id="5892" instrument_node="">Vladimir Lenin</span></a><span data-dcnode-id="5890" instrument_node=""> viewed imperialism as the highest stage of capitalism. He asserted that the merging of banks and industrial cartels gave rise to finance capital, which was then exported (rather than goods) in pursuit of greater profits than the home market could offer. Political and financial power became divided among international monopolist firms and European states, colonizing large parts of the world in support of their businesses.</span><sup class="reference" data-dcnode-id="5887" id="cite_ref-34"><a data-dcnode-id="5888" href="#cite_note-34"><span data-dcnode-id="5889" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5886" instrument_node=""> According to analyst Michael Parenti, imperialism is "the process whereby the dominant politico-economic interests of one nation expropriate for their own enrichment the land, labor, raw materials, and markets of another people."</span><sup class="reference" data-dcnode-id="5883" id="cite_ref-Parenti_1995_3_35-0"><a data-dcnode-id="5884" href="#cite_note-Parenti_1995_3-35"><span data-dcnode-id="5885" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5882" instrument_node=""> Parenti says imperialism is older than capitalism. Given its expansionist nature, capitalism has little inclination to stay home. While he conceded imperialism is not typically recognized as a legitimate allegation about the United States, Parenti argued:
</span></p><span data-dcnode-id="5880" instrument_node="">
</span><link data-dcnode-id="5879" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="5873"><p data-dcnode-id="5874"><span data-dcnode-id="5878" instrument_node="">Emperors and conquistadors were interested mostly in plunder and tribute, gold and glory. Capitalist imperialism differs from these earlier forms in the way it systematically accumulates capital through the organized exploitation of labor and the penetration of overseas markets. Capitalist imperialism invests in other countries, transforming and dominating their economies, cultures, and political life, integrating their financial and productive structures into an international system of capital accumulation.</span><sup class="reference" data-dcnode-id="5875" id="cite_ref-Parenti_1995_3_35-1"><a data-dcnode-id="5876" href="#cite_note-Parenti_1995_3-35"><span data-dcnode-id="5877" instrument_node="">[35]</span></a></sup></p></blockquote><span data-dcnode-id="5872" instrument_node="">
