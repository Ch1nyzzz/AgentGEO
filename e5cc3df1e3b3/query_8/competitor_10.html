</span><p data-dcnode-id="1487"><span data-dcnode-id="1494" instrument_node="">The Bangladesh War of Independence or the Bangladesh Liberation War refers to an armed conflict between West Pakistan (now </span><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Pakistan" title="Pakistan"><span data-dcnode-id="1493" instrument_node="">Pakistan</span></a><span data-dcnode-id="1491" instrument_node="">) and East Pakistan (now </span><a data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Bangladesh" title="Bangladesh"><span data-dcnode-id="1490" instrument_node="">Bangladesh</span></a><span data-dcnode-id="1488" instrument_node="">) that lasted for roughly nine months in 1971. The war resulted in Bangladesh's independence from Pakistan.
</span></p><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Pakistan's partition from India in 1947 had arisen from the 'two-nation' thesis that Muslims and Hindus in India were both 'nations' whose people could not live together. Pakistan was the first modern-state founded solely on the basis of religion, since although India had a Hindu majority its population, with Muslims, Sikhs, Jains and Christians was multi-religious and its constitution was secular. When East Bengal was included in the partition, many thought this mistaken because of the cultural differences between Bengal and the peoples of what became West Pakistan. When the West tried to impose Urdu as the official language in the East, a linguistic-cultural opposition movement began.
</span></p><span data-dcnode-id="1484" instrument_node="">

</span><div class="thumb tright" data-dcnode-id="1178"><div class="thumbinner" data-dcnode-id="1179" style="width:302px;"><a class="image" data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/File%3APAK1971.JPG"><img alt="" class="thumbimage" data-dcnode-id="1186" decoding="async" height="292" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/d/images/thumb/5/59/PAK1971.JPG/300px-PAK1971.JPG&amp;raw" srcset="/d/images/thumb/5/59/PAK1971.JPG/450px-PAK1971.JPG 1.5x, /d/images/5/59/PAK1971.JPG 2x" width="300"></a><span data-dcnode-id="1184" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1180"><div class="magnify" data-dcnode-id="1182"><a class="internal" data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/File%3APAK1971.JPG" title="Enlarge"></a></div><span data-dcnode-id="1181" instrument_node="">East and West Pakistan before 1971</span></div></div></div><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1176" instrument_node="">Bangladesh would be founded on the basis of cultural and linguistic identity. Muslims, Hindus, Christians, Buddhists and animists, united by a common language and a common culture, struggled for their freedom. Few families were unaffected by the war. Most lost relatives. Bengali have been conquered by others but have not had a history of aggression. They have traded, written poetry, sung songs and have developed a rich cultural tradition of which they are proud. However, denied equal rights with West Pakistan and the right to form a government even though the largest number of seats in Pakistan's Parliament were held by East Pakistani members, they bravely asserted their right to self-determination. The atrocities committed by Pakistani soldiers during this war are regarded by some as </span><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Genocide" title="Genocide"><span data-dcnode-id="1175" instrument_node="">genocide</span></a><span data-dcnode-id="1173" instrument_node="">.
</span></p><span data-dcnode-id="1171" instrument_node="">
</span><h2 data-dcnode-id="1168"><span class="mw-headline" data-dcnode-id="1169" id="Reasons_for_war"><span data-dcnode-id="1170" instrument_node="">Reasons for war</span></span></h2><span data-dcnode-id="1167" instrument_node="">
</span><h3 data-dcnode-id="1164"><span class="mw-headline" data-dcnode-id="1165" id="Years_before_the_war"><span data-dcnode-id="1166" instrument_node="">Years before the war</span></span></h3><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1162" instrument_node="">During the Partition of India, Pakistan, as a country, gained independence on August 14, 1947 following the end of British rule over South Asian countries. The division was made based on </span><a data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Religion" title="Religion"><span data-dcnode-id="1161" instrument_node="">religion</span></a><span data-dcnode-id="1159" instrument_node="">. Pakistan was created out of </span><a class="mw-redirect" data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Muslim" title="Muslim"><span data-dcnode-id="1158" instrument_node="">Muslim</span></a><span data-dcnode-id="1156" instrument_node=""> majority territories in the West and East, and India was created out of the vast </span><a class="mw-redirect" data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Hindu" title="Hindu"><span data-dcnode-id="1155" instrument_node="">Hindu</span></a><span data-dcnode-id="1153" instrument_node=""> majority regions in the center. The Western zone was popularly (and for a period of time, also officially) called West Pakistan and the Eastern zone (modern-day Bangladesh) was called East Bengal and later, East Pakistan. The capital of Pakistan was established in </span><a data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Karachi" title="Karachi"><span data-dcnode-id="1152" instrument_node="">Karachi</span></a><span data-dcnode-id="1150" instrument_node=""> in West Pakistan and then moved to Islamabad in 1958.
</span></p><span data-dcnode-id="1148" instrument_node="">
</span><h3 data-dcnode-id="1145"><span class="mw-headline" data-dcnode-id="1146" id="Economic_exploitation"><span data-dcnode-id="1147" instrument_node="">Economic exploitation</span></span></h3><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">West Pakistan (consisting of four provinces: Punjab, Sindh, Balochistan and North-West Frontier Province) dominated the divided country and received more money than the more populous East.
</span></p><span data-dcnode-id="1141" instrument_node="">
</span><span data-dcnode-id="1140" instrument_node="">
</span><span data-dcnode-id="1137" instrument_node=""> </span><span data-dcnode-id="1134" instrument_node=""> </span><span data-dcnode-id="1131" instrument_node=""> </span><span data-dcnode-id="1127" instrument_node="">
</span><span data-dcnode-id="1124" instrument_node=""> </span><span data-dcnode-id="1121" instrument_node=""> </span><span data-dcnode-id="1118" instrument_node=""> </span><span data-dcnode-id="1114" instrument_node="">
</span><span data-dcnode-id="1111" instrument_node=""> </span><span data-dcnode-id="1108" instrument_node=""> </span><span data-dcnode-id="1105" instrument_node=""> </span><span data-dcnode-id="1101" instrument_node="">
</span><span data-dcnode-id="1098" instrument_node=""> </span><span data-dcnode-id="1095" instrument_node=""> </span><span data-dcnode-id="1092" instrument_node=""> </span><span data-dcnode-id="1088" instrument_node="">
</span><span data-dcnode-id="1085" instrument_node=""> </span><span data-dcnode-id="1082" instrument_node=""> </span><span data-dcnode-id="1079" instrument_node=""> </span><span data-dcnode-id="1076" instrument_node="">
</span><span data-dcnode-id="1072" instrument_node=""> </span><span data-dcnode-id="1069" instrument_node=""> </span><span data-dcnode-id="1066" instrument_node=""> </span><span data-dcnode-id="1062" instrument_node="">
</span><table border="1" cellpadding="2" cellspacing="0" class="infobox" data-dcnode-id="1056" style="background:#efefef; border: 1px solid #aaa; border-collapse: collapse;" width="100%"><tbody data-dcnode-id="1057"><tr data-dcnode-id="1128"><td data-dcnode-id="1138" width="25%"><span data-dcnode-id="1139" instrument_node="">Year</span></td><td data-dcnode-id="1135" width="25%"><span data-dcnode-id="1136" instrument_node="">Spending on West Pakistan (in crore Rupees)</span></td><td data-dcnode-id="1132" width="25%"><span data-dcnode-id="1133" instrument_node="">Spending on East Pakistan (in crore Rupees)</span></td><td data-dcnode-id="1129" width="25%"><span data-dcnode-id="1130" instrument_node="">Percentage Spent on East</span></td></tr><tr data-dcnode-id="1115"><td data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">1950/51-54/55</span></td><td data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">1129</span></td><td data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">524</span></td><td data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">46</span></td></tr><tr data-dcnode-id="1102"><td data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">1955/56-59/60</span></td><td data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">1655</span></td><td data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">524</span></td><td data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">32</span></td></tr><tr data-dcnode-id="1089"><td data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">1960/61-64/65</span></td><td data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">3355</span></td><td data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">1404</span></td><td data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">42</span></td></tr><tr data-dcnode-id="1075"><td data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">1965/66-69/70</span></td><td data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">5195</span></td><td data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">2141</span></td><td data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">41</span></td></tr><tr data-dcnode-id="1063"><td data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Total</span></td><td data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">12834</span></td><td data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">4300</span></td><td data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">34</span></td></tr><tr data-dcnode-id="1058"><td colspan="4" data-dcnode-id="1059"><i data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Source: Reports of the Advisory Panels for the Fourth Five Year Plan 1970-75, Vol. I, published by the planning commission of Pakistan</span></i></td></tr></tbody></table><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1054" instrument_node="">Between 1948 and 1960, East Pakistan's export earnings had been 70 percent while it only received 25 percent of import earning. In 1948 (shortly after independence from the UK), East Pakistan had 11 textile mills while West had 9. In 1971, the number of textile mills in the West had grown to 150 while that in the East had only gone up to 26. A transfer of 2.6 billion dollars (in 1971 exchange rates) worth resources was also done over time from East Pakistan to West Pakistan. Moreover it was felt that much of the income generated by the east was primarily diverted towards fighting wars in </span><a class="mw-redirect" data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Kashmir" title="Kashmir"><span data-dcnode-id="1053" instrument_node="">Kashmir</span></a><span data-dcnode-id="1051" instrument_node="">.
</span></p><span data-dcnode-id="1049" instrument_node="">
</span><h3 data-dcnode-id="1046"><span class="mw-headline" data-dcnode-id="1047" id="Difference_in_religious_standpoints"><span data-dcnode-id="1048" instrument_node="">Difference in religious standpoints</span></span></h3><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1044" instrument_node="">One of the key issue was the extent to which </span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Islam" title="Islam"><span data-dcnode-id="1043" instrument_node="">Islam</span></a><span data-dcnode-id="1041" instrument_node=""> was followed. West Pakistan with an overwhelming 97 percent Muslim population was less liberal (in religious terms) than East Pakistan which was at least 15 percent non-Muslim (mainly Hindus). Bengalis' are proud of their common literary and cultural heritage in which Muslim, Hindu and Christian writers are held in high esteem across the religious divide. The difference was made further clear after Bangladeshi independence, when Bangladesh was established as a secular country under the name "People's Republic of Bangladesh" rather than as the Islamic Republic of Bangladesh. This was in tribute to all those, Muslim and non-Muslim, who had taken part in the independence struggle.
</span></p><span data-dcnode-id="1039" instrument_node="">
</span><h3 data-dcnode-id="1036"><span class="mw-headline" data-dcnode-id="1037" id="Other_factors_including_language"><span data-dcnode-id="1038" instrument_node="">Other factors including language</span></span></h3><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Close ties existed between East Pakistan and West Bengal, one of the Indian states bordering Bangladesh, as both were composed mostly of Bengalis. West Pakistan viewed East Pakistani links with India unfavorably as relations between India and Pakistan had been very poor since independence.
</span></p><p data-dcnode-id="1025"><span data-dcnode-id="1032" instrument_node="">In 1948, Mohammad Ali Jinnah declared in Dhaka, capital of East Pakistan, that "Urdu, and only Urdu," a language that was only spoken in the West by Muhajirs and in the East by Biharis, would be the sole official language for all of Pakistan, while Bangla was spoken by the majority of people. East Pakistan revolted and several students and civilians lost their lives on February 21, 1952. The day is revered in </span><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Bangladesh" title="Bangladesh"><span data-dcnode-id="1031" instrument_node="">Bangladesh</span></a><span data-dcnode-id="1029" instrument_node=""> and in West Bengal as the Language Martyrs' Day. Bitter feelings among East Pakistanis never ceased to grow, especially with repeated arrivals of military rulers. Later, in remembrance of the 1952 killings, </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/UNESCO" title="UNESCO"><span data-dcnode-id="1028" instrument_node="">UNESCO</span></a><span data-dcnode-id="1026" instrument_node=""> declared February 21 as International Mother Language Day.
</span></p><span data-dcnode-id="1024" instrument_node="">
</span><h3 data-dcnode-id="1021"><span class="mw-headline" data-dcnode-id="1022" id="Impact_of_the_cyclone"><span data-dcnode-id="1023" instrument_node="">Impact of the cyclone</span></span></h3><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">The already tense situation was further aggravated by a tropical cyclone that struck East Pakistan in 1970. It was a particularly devastating year as the deadliest cyclone on record—the Bhola cyclone—struck Bangladesh claiming nearly half a million lives. The apathy of West Pakistan leadership and its failure in responding quickly was a further platform for the Awami League, that capitalized on this tragedy. The Pakistan Army failed to do relief work of any significance to alleviate the problem, which further antagonized the already estranged Bengali populace.
</span></p><span data-dcnode-id="1017" instrument_node="">
</span><h3 data-dcnode-id="1014"><span class="mw-headline" data-dcnode-id="1015" id="Political_climax"><span data-dcnode-id="1016" instrument_node="">Political climax</span></span></h3><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1012" instrument_node="">The political prelude to the war included several factors. Due to the differences between the two states, a nascent separatist movement developed in East Pakistan. Any such movements were sharply limited, especially when martial law was in force between 1958 and 1962 (under General </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Ayub_Khan" title="Ayub Khan"><span data-dcnode-id="1011" instrument_node="">Ayub Khan</span></a><span data-dcnode-id="1009" instrument_node="">) and between 1969 and 1972 (under General Yahya Khan). These military rulers were of West Pakistani origin and continued to favor West Pakistan in terms of economic advantages.
</span></p><p data-dcnode-id="997"><span data-dcnode-id="1007" instrument_node="">The situation reached a climax when in 1970 the Awami League, the largest East Pakistani political party, led by </span><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Sheikh_Mujibur_Rahman" title="Sheikh Mujibur Rahman"><span data-dcnode-id="1006" instrument_node="">Sheikh Mujibur Rahman</span></a><span data-dcnode-id="1004" instrument_node="">, won a landslide victory in the national elections winning 167 of the 169 seats allotted for East Pakistan, and a majority of the 313 total seats in the National Assembly. This gave the Awami League the right to form a government. However, the leader of Pakistan People's Party, </span><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Zulfikar_Ali_Bhutto" title="Zulfikar Ali Bhutto"><span data-dcnode-id="1003" instrument_node="">Zulfikar Ali Bhutto</span></a><span data-dcnode-id="1001" instrument_node="">, refused to allow Rahman to become the Prime Minister of Pakistan. Instead, he proposed a notion of two Prime Ministers. Bhutto also refused to accept Rahman's Six Points which would result in autonomy for East Pakistan. On March 3, 1971, the two leaders of the two wings along with the President General Yahya Khan met in Dhaka to decide the fate of the country. Talks failed. Sheikh Mujibur Rahman called for a nation-wide </span><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Strike" title="Strike"><span data-dcnode-id="1000" instrument_node="">strike</span></a><span data-dcnode-id="998" instrument_node="">.
</span></p><span data-dcnode-id="996" instrument_node="">
</span><h3 data-dcnode-id="993"><span class="mw-headline" data-dcnode-id="994" id="Military_preparation_in_West_Pakistan"><span data-dcnode-id="995" instrument_node="">Military preparation in West Pakistan</span></span></h3><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">General Tikka Khan was flown in to Dhaka to become Governor of East Bengal. East-Pakistani judges, including Justice Siddique, refused to swear him in.
</span></p><p data-dcnode-id="985"><span data-dcnode-id="989" instrument_node="">MV </span><i data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Swat,</span></i><span data-dcnode-id="986" instrument_node=""> a ship of the Pakistani Navy, carrying ammunition and soldiers, was harbored in Chittagong Port and the Bengali workers and sailors at the port refused to unload the ship. A unit of East Pakistan Rifles refused to obey commands to fire on Bengali demonstrators, beginning a mutiny of Bengali soldiers.
</span></p><p data-dcnode-id="980"><span data-dcnode-id="984" instrument_node="">Between March 10 and 13, Pakistan International Airlines canceled all their international routes to urgently fly "Government Passengers" to </span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Dhaka" title="Dhaka"><span data-dcnode-id="983" instrument_node="">Dhaka</span></a><span data-dcnode-id="981" instrument_node="">. These so-called "Government Passengers" were almost exclusively Pakistani soldiers in civil uniform.
</span></p><span data-dcnode-id="979" instrument_node="">
</span><h3 data-dcnode-id="975"><span data-dcnode-id="978" id="Bangobondhu's_speech_of_March_7"></span><span class="mw-headline" data-dcnode-id="976" id="Bangobondhu.27s_speech_of_March_7"><span data-dcnode-id="977" instrument_node="">Bangobondhu's speech of March 7</span></span></h3><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="973" instrument_node="">On March 7, 1971, Bangobondhu (friend of the Bengalis) (</span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Sheikh_Mujibur_Rahman" title="Sheikh Mujibur Rahman"><span data-dcnode-id="972" instrument_node="">Sheikh Mujibur Rahman</span></a><span data-dcnode-id="970" instrument_node="">) gave a speech at the Racecourse Ground (now called the Suhrawardy Udyan). In this speech he mentioned a further four-point condition to consider the National Assembly Meeting on March 25:
</span></p><span data-dcnode-id="968" instrument_node="">
</span><ol data-dcnode-id="956"><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">The immediate lifting of martial law.</span></li><span data-dcnode-id="965" instrument_node="">
</span><li data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Immediate withdrawal of all military personnel to their barracks.</span></li><span data-dcnode-id="962" instrument_node="">
</span><li data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">An inquiry into the loss of life.</span></li><span data-dcnode-id="959" instrument_node="">
</span><li data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Immediate transfer of power to the elected representative of the people before the assembly meeting March 25.</span></li></ol><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="954" instrument_node="">He urged "his people" to turn every house into a fort of resistance. He closed his speech saying, </span><i data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">"The struggle this time is for our freedom. The struggle this time is for our independence."</span></i><span data-dcnode-id="951" instrument_node="">
</span></p><span data-dcnode-id="949" instrument_node="">
</span><h3 data-dcnode-id="946"><span class="mw-headline" data-dcnode-id="947" id="Violence_of_March_25"><span data-dcnode-id="948" instrument_node="">Violence of March 25</span></span></h3><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="944" instrument_node="">On the night of March 25, Pakistan Army began a violent effort to suppress the Bengali opposition. In Bangladesh, and elsewhere, the Pakistani actions are referred to as </span><a data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Genocide" title="Genocide"><span data-dcnode-id="943" instrument_node="">genocide</span></a><span data-dcnode-id="941" instrument_node="">. Before carrying out these acts, all foreign journalists were systematically deported from Bangladesh. Bengali members of military services were disarmed. The operation was called </span><i data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Operation Searchlight</span></i><span data-dcnode-id="938" instrument_node=""> by Pakistani Army and was carefully devised by several top-ranked army generals to "crush" Bengalis.
</span></p><p data-dcnode-id="932"><span data-dcnode-id="936" instrument_node="">Although the violence focused on the provincial capital, </span><a data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Dhaka" title="Dhaka"><span data-dcnode-id="935" instrument_node="">Dhaka</span></a><span data-dcnode-id="933" instrument_node="">, the process of ethnic elimination was also carried out all around Bangladesh. Residential halls of University of Dhaka were particularly targeted. The only Hindu residential hall—the Jagannath Hall—was destroyed by the Pakistani armed forces, and an estimated 600 to 700 of its residents were murdered. The Pakistani army denies any cold blooded killings at the university, though the Hamood-ur-Rehman commission in Pakistan states that overwhelming force was used at the university. This fact and the massacre at Jagannath Hall and nearby student dormitories of Dhaka University are corroborated by a videotape secretly filmed by Prof. Nur Ullah of the East Pakistan Engineering University, whose residence was directly opposite to the student dormitories.
</span></p><p data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">Hindu areas all over Bangladesh suffered particularly heavy blows. By midnight, Dhaka was literally burning, especially the Hindu dominated eastern part of the city. Time magazine reported on August 2, 1971, "The Hindus, who account for three-fourths of the </span><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Refugee" title="Refugee"><span data-dcnode-id="930" instrument_node="">refugees</span></a><span data-dcnode-id="928" instrument_node=""> and a majority of the dead, have borne the brunt of the Muslim military hatred."
</span></p><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Sheikh Mujibur Rahman was considered dangerous and, hence, arrested by Pakistan Army. Awami League was banned by General Yahya Khan. Some other Awami League leaders were arrested as well, while few escaped Dhaka to avoid arrest.
</span></p><span data-dcnode-id="924" instrument_node="">
</span><h3 data-dcnode-id="921"><span class="mw-headline" data-dcnode-id="922" id="Declaration_of_independence"><span data-dcnode-id="923" instrument_node="">Declaration of independence</span></span></h3><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="919" instrument_node="">On March 26, the nation waged an armed struggle against the Pakistani occupation forces following the killings of the night of 25 March. The Pakistani forces arrested Sheikh Mujib, who, through a wireless message, had called upon the people to resist the occupation forces [source: </span><i data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">The Daily Star,</span></i><span data-dcnode-id="916" instrument_node=""> March 26 2005]. Mujib was arrested on the night of March 25-26, 1971 at about 1:30 </span><small data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">A.M.</span></small><span data-dcnode-id="913" instrument_node=""> (per Radio Pakistan’s news on March 29, 1971) which means effectively on March 26, 1971.
</span></p><span data-dcnode-id="911" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="902"><div class="thumbinner" data-dcnode-id="903" style="width:302px;"><a class="image" data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/File%3ABangladesh_map.gif"><img alt="" class="thumbimage" data-dcnode-id="910" decoding="async" height="322" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/d/images/thumb/4/42/Bangladesh_map.gif/300px-Bangladesh_map.gif&amp;raw" srcset="/d/images/4/42/Bangladesh_map.gif 1.5x" width="300"></a><span data-dcnode-id="908" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="904"><div class="magnify" data-dcnode-id="906"><a class="internal" data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/File%3ABangladesh_map.gif" title="Enlarge"></a></div><span data-dcnode-id="905" instrument_node="">Map of Bangladesh</span></div></div></div><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">On March 26, 1971, M. A. Hannan, an Awami League leader from Chittagong, is said to have made the first announcement of the declaration of independence over radio,
</span></p><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Sheikh Mujibur Rahman signed an official declaration on March 25, 1971 that read:
</span></p><span data-dcnode-id="896" instrument_node="">
</span><blockquote data-dcnode-id="890"><p data-dcnode-id="891"><span data-dcnode-id="895" instrument_node="">Today Bangladesh is a sovereign and independent country. On Thursday night West Pakistani armed forces suddenly attacked the police barracks at Razarbagh and the EPR headquarters at Pilkhana in Dhaka. Many innocent and unarmed have been killed in Dhaka city and other places of Bangladesh. Violent clashes between EPR and Police on the one hand and the armed forces of Pakistan on the other, are going on. The Bengalis are fighting the enemy with great courage for an independent Bangladesh. May God aid us in our fight for freedom. Joy Bangla.</span><sup class="reference" data-dcnode-id="892" id="cite_ref-history_1-0"><a data-dcnode-id="893" href="#cite_note-history-1"><span data-dcnode-id="894" instrument_node="">[1]</span></a></sup></p></blockquote><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="888" instrument_node="">A </span><a class="mw-redirect" data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Telegram" title="Telegram"><span data-dcnode-id="887" instrument_node="">telegram</span></a><span data-dcnode-id="885" instrument_node=""> reached some students in Chittagong. They realized the message could be broadcast from Agrabad Station of Radio Pakistan. The message was translated to Bangla by Dr Manjula Anwar. They failed to secure permission from higher authorities to broadcast the message. They crossed Kalurghat Bridge into an area controlled by East Bengal Regiment under Major Ziaur Rahman. Bengali soldiers guarded the station as engineers prepared for transmission. At 19:45 on March 26, 1971, Major Ziaur Rahman broadcast another announcement of the declaration of independence on behalf of Sheikh Mujibur which is as follows.
</span></p><span data-dcnode-id="883" instrument_node="">
</span><blockquote data-dcnode-id="877"><p data-dcnode-id="878"><span data-dcnode-id="882" instrument_node="">This is Shadhin Bangla Betar Kendro. I, Major Ziaur Rahman, at the direction of Bangobondhu Mujibur Rahman, hereby declare that the independent People's Republic of Bangladesh has been established. At his direction, I have taken command as the temporary Head of the Republic. In the name of Sheikh Mujibur Rahman, I call upon all Bengalis to rise against the attack by the West Pakistani Army. We shall fight to the last to free our Motherland. By the grace of Allah, victory is ours. Joy Bangla.</span><sup class="reference" data-dcnode-id="879" id="cite_ref-history_1-1"><a data-dcnode-id="880" href="#cite_note-history-1"><span data-dcnode-id="881" instrument_node="">[1]</span></a></sup></p></blockquote><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Kalurghat Radio Station's transmission capability was limited. The message was picked up by a Japanese ship in Bay of Bengal and then re-transmitted by Radio Australia and later the British Broadcasting Corporation.
</span></p><p data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">March 26, 1971 is hence considered the official </span><b data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Independence Day</span></b><span data-dcnode-id="870" instrument_node=""> and according to all Bangladeshi sources, the name Bangladesh was in effect henceforth. Certain sources, especially of Indian and Pakistani origin, continued to use the name "East Pakistan" until the following December 16.
</span></p><span data-dcnode-id="868" instrument_node="">
</span><h2 data-dcnode-id="865"><span class="mw-headline" data-dcnode-id="866" id="The_main_war"><span data-dcnode-id="867" instrument_node="">The main war</span></span></h2><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">As political events gathered momentum, the stage was set for a clash between the Pakistan Army and the insurgents. Though smaller Maoist style paramilitary bands started emerging, the Mukti Bahini (freedom fighters) emerged increasingly visible. Headed by Colonel Muhammad Ataul Gani Osmani, a retired Pakistan Army officer, this band was raised as Mujib's action arm and security force before assuming the character of a conventional guerrilla force. After the declaration of Independence, the Pakistan military sought to quell them, but increasing numbers of Bengali soldiers defected to the underground "Bangladesh army." These Bengali units slowly merged into the Mukti Bahini and bolstered their weaponry. They then jointly launched operations against the Pakistan Army killing many in the process. This setback prompted the Pakistan Army to induct Razakars, a paramilitary force, from the local populace to bolster their numbers. These people were essentially viewed as traitors and with suspicion by local Bengalis, as a vast majority of these recruits were Bihari Muslims who had settled during the time of partition. This helped Pakistan stem the tide somewhat as the monsoon approached in the months of June and July.
</span></p><p data-dcnode-id="854"><span data-dcnode-id="861" instrument_node="">Undeterred by this setback, Mukti Bahini regrouped as they gained in strength and capability. Aided by the Indian government in West Bengal, they were equipped and trained to counter the Pakistan Army. As there was no action during the monsoon, it was seen by the Pakistan military brass as a weakening of the Bangladesh cause. However it was merely the lull before the storm. After sensing the enormity of the issue, the army was beefed up as the troop strength was increased to more than 80,000. This caused a rise in tensions across the border as </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/India" title="India"><span data-dcnode-id="860" instrument_node="">India</span></a><span data-dcnode-id="858" instrument_node=""> realized the gravity of the situation. The Indian military were preparing for the eventual onslaught with the aid of the separatists and waited for the end of the monsoon season to enable easy passage. The Indians aimed to bypass the villages and towns and instead concentrate on the cities and the highways which ultimately would lead to the capture of </span><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Dhaka" title="Dhaka"><span data-dcnode-id="857" instrument_node="">Dhaka</span></a><span data-dcnode-id="855" instrument_node="">.
</span></p><p data-dcnode-id="849"><span data-dcnode-id="853" instrument_node="">Pakistan decided to nullify such an attack and on December 3 and launched a series of preemptive air strikes. The attack was modeled on the Operation Focus employed by Israel Air Force during the </span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Six-Day_War" title="Six-Day War"><span data-dcnode-id="852" instrument_node="">Six-Day War</span></a><span data-dcnode-id="850" instrument_node="">. However the plan failed to achieve the desired success and was seen as an open act of unprovoked aggression by the Indians. Indira Gandhi then ordered the immediate mobilization of troops and launched the full scale invasion. This marked the official start of the Indo-Pakistani War of 1971 with fighting commencing in West Pakistan. The Indian Army, far superior in numbers and equipment to that of Pakistan, executed a three-pronged pincer movement on Dhaka launched from the Indian states of West Bengal, Assam, and Tripura. In all these places the Mukti Bahini and the local Bengalis played a vital role in aiding the Indian Army. Many soldiers were ferried in the night by the locals across rivers and valuable information on the location and whereabouts of different military strongholds were gleaned. It was backed up by the Indian Air Force which achieved near air supremacy towards the end of the war as the entire East Pakistan airbase with all the flights were destroyed. The Indian Navy, also annihilated the eastern wing of the Pakistan Navy and blockaded the East Pakistan ports, thereby cutting off any escape routes for the stranded Pakistani warriors. The fledgling Bangladesh Navy (comprising officers and sailors who defected from Pakistan Navy) aided the Indians in the marine warfare, carrying out attacks, most notably Operation Jackpot.
</span></p><p data-dcnode-id="835"><span data-dcnode-id="848" instrument_node="">Meanwhile, on the ground, nearly three brigades of Mukti Bahini along with the Indian forces fought in a conventional formation. This was supplemented by </span><a class="mw-redirect" data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Guerrilla" title="Guerrilla"><span data-dcnode-id="847" instrument_node="">guerrilla</span></a><span data-dcnode-id="845" instrument_node=""> style attacks on Pakistanis who were facing hostilities on land, air, water in both covert and overt ways. Undeterred, Pakistan tried to fight back and boost the sagging morale by incorporating the Special Services Group commandos in sabotage and rescue missions. This however could not stop the juggernaut of the invading columns whose speed and power were too much to contain for the Pakistan Army. On December 16, within just 12 days, the capital </span><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Dhaka" title="Dhaka"><span data-dcnode-id="844" instrument_node="">Dhaka</span></a><span data-dcnode-id="842" instrument_node=""> fell to the </span><i data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Mitro Bahini</span></i><span data-dcnode-id="839" instrument_node="">—the allied forces. Lt. Gen. Niazi surrendered to the combined forces headed by its commander Lt. Gen. Jagjit Singh Aurora by signing the </span><i data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Instrument of Surrender</span></i><span data-dcnode-id="836" instrument_node=""> at Ramna Racecourse, 16:31 Indian Standard Time. Bangladesh became liberated.
</span></p><span data-dcnode-id="834" instrument_node="">
</span><h2 data-dcnode-id="831"><span class="mw-headline" data-dcnode-id="832" id="Formation_of_the_First_Republic"><span data-dcnode-id="833" instrument_node="">Formation of the First Republic</span></span></h2><span data-dcnode-id="830" instrument_node="">
</span><h3 data-dcnode-id="827"><span class="mw-headline" data-dcnode-id="828" id="USA_and_USSR"><span data-dcnode-id="829" instrument_node="">USA and USSR</span></span></h3><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="825" instrument_node="">The United States supported Pakistan both politically and materially. U.S. President </span><a data-dcnode-id="823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Richard_Nixon" title="Richard Nixon"><span data-dcnode-id="824" instrument_node="">Richard Nixon</span></a><span data-dcnode-id="822" instrument_node=""> denied getting involved in the situation, saying that it was an internal matter of Pakistan. But when Pakistan's defeat seemed certain, Nixon sent the USS Enterprise (CVN-65) to the Bay of Bengal and threatened </span><a data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/India" title="India"><span data-dcnode-id="821" instrument_node="">India</span></a><span data-dcnode-id="819" instrument_node=""> with a nuclear strike. Enterprise arrived on station on December 11 1971.
</span></p><p data-dcnode-id="796"><span data-dcnode-id="817" instrument_node="">Several documents released from the </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Richard_Nixon" title="Richard Nixon"><span data-dcnode-id="816" instrument_node="">Nixon</span></a><span data-dcnode-id="814" instrument_node=""> Presidential Archives show the extent of the tilt that the Nixon Administration demonstrated in favor of Pakistan.</span><sup class="reference" data-dcnode-id="811" id="cite_ref-2"><a data-dcnode-id="812" href="#cite_note-2"><span data-dcnode-id="813" instrument_node="">[2]</span></a></sup><span data-dcnode-id="810" instrument_node=""> Among them, the infamous Blood telegram from the US embassy in </span><a class="mw-redirect" data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Dacca" title="Dacca"><span data-dcnode-id="809" instrument_node="">Dacca</span></a><span data-dcnode-id="807" instrument_node="">, East Pakistan, stated the horrors of genocide taking place in East Pakistan.</span><sup class="reference" data-dcnode-id="804" id="cite_ref-3"><a data-dcnode-id="805" href="#cite_note-3"><span data-dcnode-id="806" instrument_node="">[3]</span></a></sup><span data-dcnode-id="803" instrument_node=""> Notwithstanding this, Nixon, backed by </span><a data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Henry_Kissinger" title="Henry Kissinger"><span data-dcnode-id="802" instrument_node="">Henry Kissinger</span></a><span data-dcnode-id="800" instrument_node="">, wanted to protect the interests of Pakistan as they were apprehensive of </span><a data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/India" title="India"><span data-dcnode-id="799" instrument_node="">India</span></a><span data-dcnode-id="797" instrument_node="">. In fact, even after the war ended USA wanted to blame India. This propaganda apparently failed in the face of world opinion.
</span></p><p data-dcnode-id="785"><span data-dcnode-id="795" instrument_node="">The </span><a data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Soviet_Union" title="Soviet Union"><span data-dcnode-id="794" instrument_node="">Soviet Union</span></a><span data-dcnode-id="792" instrument_node=""> had sympathized with the Bangladeshis, and supported the Indian Army and Mukti Bahini during the war. It gave assurance to India that if a confrontation with United States evolved, the USSR would provide all necessary support to India. The Soviets also sent in a nuclear </span><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Submarine" title="Submarine"><span data-dcnode-id="791" instrument_node="">submarine</span></a><span data-dcnode-id="789" instrument_node=""> to ward off the threat posed by USS </span><i data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Enterprise</span></i><span data-dcnode-id="786" instrument_node=""> in the Indian Ocean.
</span></p><span data-dcnode-id="784" instrument_node="">
</span><h3 data-dcnode-id="781"><span class="mw-headline" data-dcnode-id="782" id="China"><span data-dcnode-id="783" instrument_node="">China</span></span></h3><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="779" instrument_node="">After the USA had failed to act decisively in a manner that would not draw world condemnation to itself, it sought to rope the </span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/People%2527s_Republic_of_China" title="People's Republic of China"><span data-dcnode-id="778" instrument_node="">People's Republic of China</span></a><span data-dcnode-id="776" instrument_node=""> into the conflict. The plan was to attack India on two sides with the help of China and thus stopping the attack on East Pakistan. Kissinger's meeting with the Chinese was with this intention. In fact, China was the only permanent member of the UN Security Council that was supportive of such an attack, and even provided economic and military assistance. But the support was limited to protecting West Pakistan in the face of a threat from India, and not aimed directly at the internal conflict. It was also suspicious that the U.S. did not want to dirty its hands. The Chinese government wanted a strongly worded UN Security Council resolution after which the PRC would help Pakistan. It however did not materialize due to the Soviet veto and China did not intervene in the war.
</span></p><span data-dcnode-id="774" instrument_node="">
</span><h3 data-dcnode-id="771"><span class="mw-headline" data-dcnode-id="772" id="United_Nations"><span data-dcnode-id="773" instrument_node="">United Nations</span></span></h3><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="769" instrument_node="">Though the </span><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/United_Nations" title="United Nations"><span data-dcnode-id="768" instrument_node="">United Nations</span></a><span data-dcnode-id="766" instrument_node=""> condemned the human rights violations, it failed to defuse the situation politically before the start of the war. The Security Council assembled on December 4 to discuss the volatile situation in the South Asia. USSR vetoed the resolution twice. After lengthy discussions on December 7, the General Assembly promptly adopted by a majority resolution calling for an "immediate cease-fire and withdrawal of troops." The United States on December 12 requested that the Security Council be reconvened. However by the time it was reconvened, and proposals were finalized, the war ended, making the measures merely academic.
</span></p><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">The inaction of the United Nations in face of the East Pakistan crisis was widely criticized. The conflict also exposed the delay in decision making that failed to address the underlying issues in time.
</span></p><span data-dcnode-id="762" instrument_node="">
</span><h3 data-dcnode-id="759"><span class="mw-headline" data-dcnode-id="760" id="India"><span data-dcnode-id="761" instrument_node="">India</span></span></h3><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="757" instrument_node="">The majority of the </span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Refugee" title="Refugee"><span data-dcnode-id="756" instrument_node="">refugees</span></a><span data-dcnode-id="754" instrument_node=""> from </span><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Bangladesh" title="Bangladesh"><span data-dcnode-id="753" instrument_node="">Bangladesh</span></a><span data-dcnode-id="751" instrument_node=""> fled to the Indian state of West Bengal forcing then Prime Minister of India </span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Indira_Gandhi" title="Indira Gandhi"><span data-dcnode-id="750" instrument_node="">Indira Gandhi</span></a><span data-dcnode-id="748" instrument_node=""> to declare war on West Pakistan. The Pakistan Air Force also attacked many Indian air fields in hot pursuit of rebels. The Pakistani Army tried to force Indian troops away from East Pakistan by attacking in the western sectors. Many battles were fought on the western front which ensured Indian victories. Backed by the air force and the Navy, India and the Mukti Bahini finally defeated </span><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Pakistan" title="Pakistan"><span data-dcnode-id="747" instrument_node="">Pakistan</span></a><span data-dcnode-id="745" instrument_node="">. More than 93,000 Pakistani soldiers and their abettors surrendered to the joined forces and were taken prisoner of war by the Indian Army, the largest surrender since </span><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/World_War_II" title="World War II"><span data-dcnode-id="744" instrument_node="">World War II</span></a><span data-dcnode-id="742" instrument_node="">.
</span></p><span data-dcnode-id="740" instrument_node="">
</span><h2 data-dcnode-id="737"><span class="mw-headline" data-dcnode-id="738" id="End_of_the_war"><span data-dcnode-id="739" instrument_node="">End of the war</span></span></h2><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="735" instrument_node="">After Pakistan's surrender late in 1971, people in Bangladesh rejoiced at their liberation. This was followed by the need for international acceptance for Bangladesh, as only a few countries recognized the new nation. Bangladesh sought admission into the </span><a class="mw-redirect" data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/UN" title="UN"><span data-dcnode-id="734" instrument_node="">UN</span></a><span data-dcnode-id="732" instrument_node="">, Most members voting in its favor but China vetoed recognition, as Pakistan was its key ally. However the United States grudgingly recognized it. To ensure a smooth transition, in 1972 the </span><i data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Shimla Agreement</span></i><span data-dcnode-id="729" instrument_node=""> was signed between India and Pakistan. The treaty was a watershed in the history of the South Asian region as it ensured that </span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Bangladesh" title="Bangladesh"><span data-dcnode-id="728" instrument_node="">Bangladesh</span></a><span data-dcnode-id="726" instrument_node=""> would be officially recognized by Pakistan and its principal allies in exchange for the return of the Pakistani POWs. As a gesture of goodwill, the nearly 200 soldiers who were wanted for war crimes by Bengalis were also pardoned by India. The accord also gave back more than 13,000 sq. km of land that Indian troops had won in West Pakistan during the war, holding on to a few strategic places; most notably Kargil (which would in turn again be the focal point for a war between the two nations in 1999). However, the agreement was acknowledged by many observers as a sign of India's maturity. Some in India felt that the treaty had been too lenient towards </span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Zulfikar_Ali_Bhutto" title="Zulfikar Ali Bhutto"><span data-dcnode-id="725" instrument_node="">Zulfikar Ali Bhutto</span></a><span data-dcnode-id="723" instrument_node="">, who had pleaded for more leeway as he felt that the fragile democracy in </span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Pakistan" title="Pakistan"><span data-dcnode-id="722" instrument_node="">Pakistan</span></a><span data-dcnode-id="720" instrument_node=""> would crumble if the accord was perceived as being too harsh in Pakistan.
</span></p><span data-dcnode-id="718" instrument_node="">
</span><h2 data-dcnode-id="715"><span class="mw-headline" data-dcnode-id="716" id="Reaction_in_West_Pakistan_to_the_war"><span data-dcnode-id="717" instrument_node="">Reaction in West Pakistan to the war</span></span></h2><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="713" instrument_node="">Reaction to the defeat and dismemberment of half the nation was a shocking loss to top military and layman alike. No one had expected that they would lose the formal war in under a fortnight and were also very angry at the meek surrender of the army in East Pakistan. The myth of the Pakistan Army's might was shattered and the leadership stood exposed. </span><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Yahya_Khan" title="Yahya Khan"><span data-dcnode-id="712" instrument_node="">Yahya Khan</span></a><span data-dcnode-id="710" instrument_node="">'s dictatorship collapsed and gave way to Bhutto who took the opportunity to rise to power. General A. A. K. Niazi, who surrendered along with 93,000 troops, was viewed with suspicion and hatred upon his return to </span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Pakistan" title="Pakistan"><span data-dcnode-id="709" instrument_node="">Pakistan</span></a><span data-dcnode-id="707" instrument_node="">. He was shunned and branded a traitor. Pakistan also failed to gather international support and were found fighting a lone battle with only the USA providing any external help. This further embittered the Pakistanis who had faced the worst military defeat of an army in decades.
</span></p><p data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">The debacle immediately prompted an inquiry headed by Justice Hamdoor Rahman. Called the Hamoodur Rahman Commission, it was initially suppressed by </span><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Zulfikar_Ali_Bhutto" title="Zulfikar Ali Bhutto"><span data-dcnode-id="704" instrument_node="">Zulfikar Ali Bhutto</span></a><span data-dcnode-id="702" instrument_node=""> as it put the military in poor light. When it was declassified, it showed many failings from the strategic to the tactical levels. It also condemned the atrocities and the crimes committed by the armed forces. It confirmed the rapes and the killings by the Pakistan Army and its supporters though the figures are far lower than the one quoted by Bangladesh. However, the army’s role in splintering Pakistan after its greatest military debacle was largely ignored by successive Pakistani governments.
</span></p><span data-dcnode-id="700" instrument_node="">
</span><h2 data-dcnode-id="697"><span class="mw-headline" data-dcnode-id="698" id="Nomenclature_justifications"><span data-dcnode-id="699" instrument_node="">Nomenclature justifications</span></span></h2><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Three names are frequently used to refer to the exact same warfare.
</span></p><span data-dcnode-id="693" instrument_node="">
</span><h3 data-dcnode-id="690"><span class="mw-headline" data-dcnode-id="691" id="Pakistani_Civil_War"><span data-dcnode-id="692" instrument_node="">Pakistani Civil War</span></span></h3><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">This name is mainly used by current day Pakistan Army and by certain unofficial Indian sources. The name describes either the period 26 March 1971 to 16 December 1971 or the period March 26, 1971 to December 03, 1971. The main issue arises from the validity of the declaration of independence on 26 March. This is entirely a matter of political technicality.
</span></p><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">There is a certain logic used by proponents of this nomenclature. According to them no country accepted Bangladesh's independence declaration and hence the region contemplated continued to be East Pakistan. So, the war was a civil war in effect.
</span></p><span data-dcnode-id="684" instrument_node="">
</span><h3 data-dcnode-id="681"><span class="mw-headline" data-dcnode-id="682" id="Indo-Pakistani_War_of_1971"><span data-dcnode-id="683" instrument_node="">Indo-Pakistani War of 1971</span></span></h3><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">This name is used by armies of all three countries to describe the period between December 03, 1971 and December 16, 1971. The Indian Army does not explicitly use the term to describe the war in their (India's) Eastern Front at any point. Instead, India only refers to the war on the Western Front as the Indo-Pakistani War. The Indian Parliament]] recognized the People's Republic of Bangladesh as an independent country on the December 6, 1971. There is no verifiable definite claim from the Pakistan Army or Government. Bangladesh clearly uses only the terminology Liberation War of Bangladesh for the war on Bangladeshi territory.
</span></p><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">The proponents of this terminology also question validity of declaration of independence of Bangladesh since there was no foreign government that acknowledged the independence. So, according to them, the war was effectively between Indian Army and Pakistan Army.
</span></p><span data-dcnode-id="675" instrument_node="">
</span><h3 data-dcnode-id="672"><span class="mw-headline" data-dcnode-id="673" id="Liberation_War_of_Bangladesh"><span data-dcnode-id="674" instrument_node="">Liberation War of Bangladesh</span></span></h3><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">This terminology is officially used in Bangladesh by all sources and by Indian official sources. The proponents claim that having won 167 out of 169 seats of East Pakistan, Awami League had people's mandate to form a democratic government. This gave Sheikh Mujibur Rahman as the leader of the party the right to declare independence of the country. Since Major Ziaur Rahman claimed independence on behalf of Sheikh Mujibur Rahman, a Bangladesh government was in existence as early as 26 March 1971. Hence Bangladesh was in existence. There was also a Bangladesh Army which effectively meant the war was not between India and Pakistan but between Pakistan and Bangladesh backed by India.
</span></p><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">The terminology is politically preferred by both India and Bangladesh for a few reasons.
</span></p><span data-dcnode-id="666" instrument_node="">
</span><ul data-dcnode-id="657"><li data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">It gave India the right to enter the war in support of Bangladesh without breaching United Nations laws that prevent countries from interfering with other countries' internal affairs.</span></li><span data-dcnode-id="663" instrument_node="">
</span><li data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Members of East Pakistan Regiment were able to fight Pakistan Army without being treated as mutineers since they were fighting under command of a Bangladeshi Government.</span></li><span data-dcnode-id="660" instrument_node="">
</span><li data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">It made it easier for Indian diplomatic efforts to gain support for the recognition of Bangladesh as a country.</span></li></ul><span data-dcnode-id="656" instrument_node="">
</span><h2 data-dcnode-id="653"><span class="mw-headline" data-dcnode-id="654" id="Atrocities"><span data-dcnode-id="655" instrument_node="">Atrocities</span></span></h2><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="651" instrument_node="">The Bangladesh liberation war witnessed widespread atrocities committed mainly on the Bengali population of East Pakistan, at a level that Bangladeshis maintain is one of the worst </span><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Genocide" title="Genocide"><span data-dcnode-id="650" instrument_node="">genocides</span></a><span data-dcnode-id="648" instrument_node=""> in history. The actual extent of the atrocities committed is not clearly known, and opinions vary, as the next section discusses. However, there is little doubt that numerous civilians were tortured and killed during the war. There are many mass graves in Bangladesh, and newer ones are always being discovered, such as a recent one in a mosque in </span><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Dhaka" title="Dhaka"><span data-dcnode-id="647" instrument_node="">Dhaka</span></a><span data-dcnode-id="645" instrument_node=""> located in the non-Bengali region of the city. The first night of war on Bengalis, which is very well documented, saw indiscriminate killings of students of Dhaka University and other civilians.
</span></p><span data-dcnode-id="643" instrument_node="">
</span><h3 data-dcnode-id="639"><span data-dcnode-id="642" id="How_many_people_died?"></span><span class="mw-headline" data-dcnode-id="640" id="How_many_people_died.3F"><span data-dcnode-id="641" instrument_node="">How many people died?</span></span></h3><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="637" instrument_node="">The number of people that died in the liberation war of Bangladesh is not known in any reliable accuracy. There has been a great disparity in the casualty figures put forth by Pakistan on one hand (26,000) and India and Bangladesh on the other hand (3 million). International media has also had different views.</span><sup class="reference" data-dcnode-id="634" id="cite_ref-4"><a data-dcnode-id="635" href="#cite_note-4"><span data-dcnode-id="636" instrument_node="">[4]</span></a></sup><span data-dcnode-id="633" instrument_node=""> Due to the lack of records and the long time that has since passed, an accurate number is hard to get, though various arguments for and against certain numbers have been put forward. Most guesses fall somewhere between a few hundred thousand and two million.
</span></p><p data-dcnode-id="626"><span data-dcnode-id="631" instrument_node="">Pakistan has maintained that only 26,000 people died in the war. Though most researchers do not support such a small number, many are inclined to believe that the real number was still a far cry from the 3 million put forward by Bangladesh and other sources. Some maintain that the real number of casualties was closer to 300,000 and was wrongly translated.</span><sup class="reference" data-dcnode-id="628" id="cite_ref-5"><a data-dcnode-id="629" href="#cite_note-5"><span data-dcnode-id="630" instrument_node="">[5]</span></a></sup><span data-dcnode-id="627" instrument_node="">
</span></p><p data-dcnode-id="609"><span data-dcnode-id="625" instrument_node="">On the other hand, though the figure of 3 million is unsubstantiated, many believe that the real number is still exceedingly high (more than 1 million) and the killing can clearly be termed a </span><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Genocide" title="Genocide"><span data-dcnode-id="624" instrument_node="">genocide</span></a><span data-dcnode-id="622" instrument_node="">. This view gets support from the aforementioned reports in international media, which were reported during the war before the 3 million figure was put forward. Supporters of this view would also point out to the enormous influx of </span><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Refugee" title="Refugee"><span data-dcnode-id="621" instrument_node="">refugees</span></a><span data-dcnode-id="619" instrument_node=""> into </span><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/India" title="India"><span data-dcnode-id="618" instrument_node="">India</span></a><span data-dcnode-id="616" instrument_node=""> (8 million seems to be a widely accepted number), and reason that killings numbering as low as the Pakistanis would like to claim would not have caused such a large number of people to leave their homes. Some say that the Bangladesh claim might have had roots in a statement by </span><a data-dcnode-id="614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Yahya_Khan" title="Yahya Khan"><span data-dcnode-id="615" instrument_node="">Yahya Khan</span></a><span data-dcnode-id="613" instrument_node="">. According to Robert Payne in </span><i data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Massacre</span></i><span data-dcnode-id="610" instrument_node=""> [1973], on February 22, 1971 Yahya Khan told a group of generals, "Kill three million of them, and the rest will eat out of our hands."
</span></p><span data-dcnode-id="608" instrument_node="">
</span><h3 data-dcnode-id="605"><span class="mw-headline" data-dcnode-id="606" id="Atrocities_on_women_and_minorities"><span data-dcnode-id="607" instrument_node="">Atrocities on women and minorities</span></span></h3><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="603" instrument_node="">Numerous women were </span><a data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Torture" title="Torture"><span data-dcnode-id="602" instrument_node="">tortured</span></a><span data-dcnode-id="600" instrument_node="">, </span><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Rape" title="Rape"><span data-dcnode-id="599" instrument_node="">raped</span></a><span data-dcnode-id="597" instrument_node=""> and killed during the war. Again, exact numbers are not known and are a subject of debate. Bangladeshi sources cite a staggering figure of 200,000 women raped. Some other sources, for example Susan Brownmiller, refer to an even higher number of 400,000. Pakistani sources claim the number is much lower, though having not completely denied rape incidents.
</span></p><p data-dcnode-id="588"><span data-dcnode-id="595" instrument_node="">There has been evidence of not only rape (and usually subsequent murder) of women, but of sex slaves kept captive by the Pakistan army. During the last periods of war, when the Pakistani army was retreating, the Mukti Bahini and Indian forces reported freeing numerous such women. Apart from Brownmiller's, another work that has included direct experiences from the women raped is </span><i data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Ami Virangana Bolchhi</span></i><span data-dcnode-id="592" instrument_node=""> ("I, the heroine, speak") by Nilima Ibrahim. The work includes in its name from the word </span><i data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Virangana</span></i><span data-dcnode-id="589" instrument_node=""> (Heroine), given by Sheikh Mujibur Rahman after the war, to the raped and tortured women during the war. This was a conscious effort to alleviate any social stigma the women might face in the society. How successful this effort was is doubtful, though.
</span></p><p data-dcnode-id="580"><span data-dcnode-id="587" instrument_node="">The minorities of Bangladesh, specially the </span><a class="mw-redirect" data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Hindu" title="Hindu"><span data-dcnode-id="586" instrument_node="">Hindus</span></a><span data-dcnode-id="584" instrument_node="">, were the biggest targets of the Pakistan army. There was widespread killing of Hindu males, and rapes of women. In public places, men were often made to undress to prove that they have been circumcised and hence were Muslim. More than 60 percent of the Bengali refugees that had fled to India were Hindus, and many never returned. It is not exactly known what percentage of the people killed by the </span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Pakistan" title="Pakistan"><span data-dcnode-id="583" instrument_node="">Pakistan</span></a><span data-dcnode-id="581" instrument_node=""> army were Hindus, but it is safe to say it was disproportionately high. This widespread violence against Hindus was motivated by a policy to purge East Pakistan of what was seen as Indian influence. The West Pakistani rulers identified the Bengali culture with Hindu and Indian culture, and thought that the eradication of Hindus would remove such influences from the majority Muslims in East Pakistan.
</span></p><span data-dcnode-id="579" instrument_node="">
</span><h3 data-dcnode-id="576"><span class="mw-headline" data-dcnode-id="577" id="Killing_of_intellectuals"><span data-dcnode-id="578" instrument_node="">Killing of intellectuals</span></span></h3><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="574" instrument_node="">The Pakistani ruling class had long formed a distaste for Bengali intelligista and students. They viewed them, correctly, as one of the main proponents of the rise of Bengali nationalism in East Pakistan. This group had been instrumental in the 1952 uprising called the Language movement, which ended in Pakistan accepting Bangla as one of its national languages. The famed six-point demand put forward by Mujib, which became the rallying point for Awami League in the years before the war, was derived from the earlier 11-point program penned by the students. In an attempt to undermine the rising Bengali identity, Pakistan had variously tried to have Bangla written in roman letters, ban singing the songs of </span><a data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Rabindranath_Tagore" title="Rabindranath Tagore"><span data-dcnode-id="573" instrument_node="">Rabindranath Tagore</span></a><span data-dcnode-id="571" instrument_node="">, mostly in vain. The rulers, again correctly, also found a growing leftist sentiment in the intelligista and student bodies which they vowed to crush. Hence during the war, a planned effort was made to void Bangladesh of its most enlightened people. In addition to the killings committed at the beginning and all throughout the war, a meticulously planned execution was carried out on December 14, 1971. Professors, journalists, doctors, artists, writers of unknown numbers were rounded up in Dhaka, blindfolded, taken to Rajarbag in the middle section of the city, and executed en masse. This day is now honored in Bangladesh as </span><i data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Buddhijibi Hotta Dibosh</span></i><span data-dcnode-id="568" instrument_node=""> ("Day of Martyred Intellectuals").
</span></p><span data-dcnode-id="566" instrument_node="">
</span><h2 data-dcnode-id="563"><span class="mw-headline" data-dcnode-id="564" id="Recipients_of_Military_Awards"><span data-dcnode-id="565" instrument_node="">Recipients of Military Awards</span></span></h2><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Four categories of gallantry awards were created after the war in Bangladesh to honor those who had demonstrated outstanding bravery in the war. These were: Bir Sreshţho, Bir Uttom, Bir Bikrôm, and Bir Protik. Seven soldiers were awarded the ultimate award for gallantry, Bir Sreshţho. All seven had given their lives in the war. They were:
</span></p><span data-dcnode-id="559" instrument_node="">
</span><ul data-dcnode-id="538"><li data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Amin, Ruhul</span></li><span data-dcnode-id="556" instrument_node="">
</span><li data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Jahangir, Mohiuddin (Captain)</span></li><span data-dcnode-id="553" instrument_node="">
</span><li data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Kamal, Mostafa (Sepoy)</span></li><span data-dcnode-id="550" instrument_node="">
</span><li data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Rahman, Hamidur (Sepoy)</span></li><span data-dcnode-id="547" instrument_node="">
</span><li data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Rahman, Matiur (Flight Lieutenant)</span></li><span data-dcnode-id="544" instrument_node="">
</span><li data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Rouf, Munshi Abdur (Naik)</span></li><span data-dcnode-id="541" instrument_node="">
</span><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Sheikh, Nur Mohammad (Lance Naik)</span></li></ul><span data-dcnode-id="537" instrument_node="">
</span><h2 data-dcnode-id="534"><span class="mw-headline" data-dcnode-id="535" id="Current_day_influence_of_the_War"><span data-dcnode-id="536" instrument_node="">Current day influence of the War</span></span></h2><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Naturally, the liberation war on 1971 has been a source of inspiration for a wide body of artistic work in Bangladesh, as well as some work by international artists. Follows a incomplete list of some of the major works done on the war:
</span></p><span data-dcnode-id="530" instrument_node="">
</span><ul data-dcnode-id="484"><li data-dcnode-id="485"><span data-dcnode-id="529" instrument_node="">Films
</span><ul data-dcnode-id="486"><li data-dcnode-id="525"><i data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Stop Genocide</span></i><span data-dcnode-id="526" instrument_node=""> – documentary by Zahir Raihan, (1971)</span></li><span data-dcnode-id="524" instrument_node="">
</span><li data-dcnode-id="520"><i data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Nine Months to Freedom: The Story of Bangladesh</span></i><span data-dcnode-id="521" instrument_node=""> – documentary by S. Sukhdev (1972)</span></li><span data-dcnode-id="519" instrument_node="">
</span><li data-dcnode-id="515"><i data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Shei Rater Kotha Bolte Eshechi</span></i><span data-dcnode-id="516" instrument_node=""> ("Tale of the Darkest Night") – documentary by Kawsar Chowdhury, (2001).</span></li><span data-dcnode-id="514" instrument_node="">
</span><li data-dcnode-id="507"><i data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Muktir Gaan, Muktir Katha</span></i><span data-dcnode-id="511" instrument_node=""> and </span><i data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Narir Katha</span></i><span data-dcnode-id="508" instrument_node=""> – three different Bangla documentaries by Tareque Masud and Catherine Masud</span></li><span data-dcnode-id="506" instrument_node="">
</span><li data-dcnode-id="502"><i data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Border</span></i><span data-dcnode-id="503" instrument_node=""> – a movie on the India Pakistan side of the war.</span></li><span data-dcnode-id="501" instrument_node="">
