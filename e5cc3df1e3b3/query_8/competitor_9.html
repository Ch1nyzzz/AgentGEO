</span></a><span data-dcnode-id="3696" instrument_node="">|&nbsp;</span><a data-dcnode-id="3694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dhr.ny.gov/statistics"><span data-dcnode-id="3695" instrument_node="">Statistics</span></a><span data-dcnode-id="3693" instrument_node="">&nbsp;|&nbsp;</span><a data-dcnode-id="3691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dhr.ny.gov/videos"><span data-dcnode-id="3692" instrument_node="">Videos</span></a></strong></p><span data-dcnode-id="3688" instrument_node="">
</span><h2 data-dcnode-id="3685"><strong data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">Disability Rights: The Americans with Disabilities Act and the Human Rights Law</span></strong></h2><span data-dcnode-id="3684" instrument_node="">
</span><strong data-dcnode-id="3664"><span data-dcnode-id="3683" instrument_node="">
</span><a data-dcnode-id="3681" href="#disability1"><span data-dcnode-id="3682" instrument_node="">Social Media Campaign</span></a><br data-dcnode-id="3680"><span data-dcnode-id="3679" instrument_node="">
</span><a data-dcnode-id="3677" href="#disability2"><span data-dcnode-id="3678" instrument_node="">Reasonable Accommodation and Disability Rights under the NYS Human Rights Law (Handbook)</span></a><br data-dcnode-id="3676"><span data-dcnode-id="3675" instrument_node="">
</span><a data-dcnode-id="3673" href="#disability3"><span data-dcnode-id="3674" instrument_node="">Resources</span></a><br data-dcnode-id="3672"><span data-dcnode-id="3671" instrument_node="">
</span><a data-dcnode-id="3669" href="#disability4"><span data-dcnode-id="3670" instrument_node="">Questions &amp; Answers</span></a><br data-dcnode-id="3668"><span data-dcnode-id="3667" instrument_node="">
</span><a data-dcnode-id="3665" href="#disability5"><span data-dcnode-id="3666" instrument_node="">Video from Presentation - 7/30/2020</span></a></strong><br data-dcnode-id="3663"><span data-dcnode-id="3662" instrument_node="">
</span><br data-dcnode-id="3661"><span data-dcnode-id="3660" instrument_node="">
</span><br data-dcnode-id="3659"><span data-dcnode-id="3658" instrument_node="">
</span><p data-dcnode-id="3644"><span data-dcnode-id="3657" instrument_node="">July 2020 marked the 30th anniversary of the Americans with Disabilities Act (ADA), the landmark federal legislation that prohibits discrimination against individuals with disabilities in all aspects of public life.  Since the passage of the ADA, governments around the world have sanctioned similar laws that ensure people with disabilities have rights and accessibility to resources that support personal growth, independence, and expanded opportunities.</span><br data-dcnode-id="3656"><span data-dcnode-id="3655" instrument_node="">
</span><br data-dcnode-id="3654"><span data-dcnode-id="3653" instrument_node="">
The New York State Division of Human Rights (DHR) enforces the New York State Human Rights Law. DHR protects New Yorkers against discrimination based on disability in employment, housing accommodations, nonreligious educational institutions, places of public accommodation, commercial spaces, and credit transactions.   DHR takes legal action in response to complaints about discrimination, initiates investigations of individual and systemic cases of discrimination, and conducts outreach to communities throughout the State of New York.</span><br data-dcnode-id="3652"><span data-dcnode-id="3651" instrument_node="">
</span><br data-dcnode-id="3650"><span data-dcnode-id="3649" instrument_node="">
The definition of “disability” under the NYSHRL has been broadly construed. The definition requires, in part, a physical, mental, or medical impairment which prevents the exercise of a normal bodily function. There are no qualifiers as to the severity of the disability.</span><br data-dcnode-id="3648"><span data-dcnode-id="3647" instrument_node="">
</span><br data-dcnode-id="3646"><span data-dcnode-id="3645" instrument_node="">
On July 30, 2020, the Division hosted a virtual panel discussion that reflected on the thirty years of progress and challenges since the passage of the ADA. The program highlighted the legal protections for people with disabilities under the ADA as well as comparable sections of the New York State Human Rights Law, and how these laws apply to the COVID-19 pandemic.  Video from the event will available on this page shortly.</span></p><span data-dcnode-id="3643" instrument_node="">
</span><br data-dcnode-id="3642"><span data-dcnode-id="3641" instrument_node="">

</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">We appreciate our audience’s questions and contributions during the Zoom session. The following responds to the questions that we did not have a chance to address live:</span></p><span data-dcnode-id="830" instrument_node="">
</span><strong data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Where do you see the ADA decades from now?  What issues will we be facing in the future?</span></strong><br data-dcnode-id="827"><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">As the panelists discussed, while many accomplishments have been realized for persons with disabilities there remains much to be done. This is especially for persons with “invisible disabilities” such as cognitive disabilities.  There also remains much to be done to improve employment for persons with disabilities.  The unemployment rate for persons with disabilities remains much higher than for persons without disabilities. </span></p><span data-dcnode-id="823" instrument_node="">
</span><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Have the legal standards that define disability evolved to match experience of persons with disabilities?</span></strong><br data-dcnode-id="820"><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">The New York State Human Rights Law definition of disability is a generous one and protects more individuals with disabilities then the federal law does.</span></p><span data-dcnode-id="816" instrument_node="">
</span><strong data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">How do I become involved in advocacy or get involved in volunteer work for civil rights?</span></strong><br data-dcnode-id="813"><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="811" instrument_node="">The NYS Division of Human Rights has a volunteer and internship program.  For more information on these programs you can visit: </span><img alt="Opens in a new window" data-dcnode-id="810" id="Picture_x0020_1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dhr.ny.gov/sites/default/files/img/new_window.gif&amp;raw" style="margin:5px" title=""><a data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dhr.ny.gov/internship-opportunities" target="_blank"><span data-dcnode-id="809" instrument_node="">https://dhr.ny.gov/internship-opportunities.</span></a><span data-dcnode-id="807" instrument_node=""> There are also Independent Living Centers (ILCs) located across New York State which are an excellent resource for persons with disabilities in their communities.  For information regarding ILCs and their locations, please visit: </span><img alt="Opens in a new window" data-dcnode-id="806" id="Picture_x0020_1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dhr.ny.gov/sites/default/files/img/new_window.gif&amp;raw" style="margin:5px" title=""><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilny.us/" target="_blank"><span data-dcnode-id="805" instrument_node="">https://ilny.us/.</span></a><span data-dcnode-id="803" instrument_node=""> </span></p><span data-dcnode-id="801" instrument_node="">
