l is that the branched plasmodesmata are functionally narrower than those at many other interfaces, with a MEL that allows sucrose to enter the cell but does not permit diffusion of the larger sugars, raffinose and stachyose, in the opposite direction. Raffinose and stachyose are tri- and tetrasaccharides, respectively. Small amounts of the pentasaccharide verbascose are also transported in some plants. The concentration of raffinose and stachyose in the phloem is approximately 400 to 600 milli-molar as measured by microdissection of minor veins (</span><span class="xrefLink" data-dcnode-id="5868" id="jumplink-I0006-3568-56-1-15-HARITATOS1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5866" data-google-interstitial="false" data-open="I0006-3568-56-1-15-HARITATOS1" href="javascript:;" reveal-id="I0006-3568-56-1-15-HARITATOS1"><span data-dcnode-id="5867" instrument_node="">Haritatos et al. 1996</span></a><span data-dcnode-id="5865" instrument_node="">) and analysis of aphid stylet exudate from the stem (</span><span class="xrefLink" data-dcnode-id="5864" id="jumplink-I0006-3568-56-1-15-KNOP1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5862" data-google-interstitial="false" data-open="I0006-3568-56-1-15-KNOP1" href="javascript:;" reveal-id="I0006-3568-56-1-15-KNOP1"><span data-dcnode-id="5863" instrument_node="">Knop et al. 2001</span></a><span data-dcnode-id="5861" instrument_node="">). The total solute concentration in the intermediary cells is far above that in the adjacent bundle sheath cell, as visualized by plasmolysis </span><span class="xrefLink" data-dcnode-id="5860" id="jumplink-I0006-3568-56-1-15-F05"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="5858" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F05" href="javascript:;" reveal-id="I0006-3568-56-1-15-F05"><span data-dcnode-id="5859" instrument_node="">(figure 5)</span></a><span data-dcnode-id="5857" instrument_node="">.</span></p><p class="chapter-para" data-dcnode-id="5847"><span data-dcnode-id="5855" instrument_node="">As predicted by the model, the RFO pathway in the leaves of cucurbits is localized in intermediary cells. In some species, such as </span><em data-dcnode-id="5853"><span data-dcnode-id="5854" instrument_node="">Ajuga,</span></em><span data-dcnode-id="5852" instrument_node=""> RFOs are also produced in the mesophyll, but the two pools are separate; export occurs from the intermediary cell pool (</span><span class="xrefLink" data-dcnode-id="5851" id="jumplink-I0006-3568-56-1-15-SPRENGER1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5849" data-google-interstitial="false" data-open="I0006-3568-56-1-15-SPRENGER1" href="javascript:;" reveal-id="I0006-3568-56-1-15-SPRENGER1"><span data-dcnode-id="5850" instrument_node="">Sprenger and Keller 2000</span></a><span data-dcnode-id="5848" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="5822"><span data-dcnode-id="5846" instrument_node="">All plants with intermediary cells have standard (“ordinary”) companion cells in the minor vein phloem as well. This has led to the suggestion of mixed loading: concurrent introduction of sucrose and RFOs to the phloem stream by apoplastic and symplastic pathways, respectively (</span><span class="xrefLink" data-dcnode-id="5845" id="jumplink-I0006-3568-56-1-15-VANBEL1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5843" data-google-interstitial="false" data-open="I0006-3568-56-1-15-VANBEL1" href="javascript:;" reveal-id="I0006-3568-56-1-15-VANBEL1"><span data-dcnode-id="5844" instrument_node="">van Bel and Gamalei 1991</span></a><span data-dcnode-id="5842" instrument_node="">). If this occurred, one would predict that treating leaves with PCMBS would alter the ratio of sugars transported, decreasing the proportion of sucrose. Experiments to test this hypothesis have met with varied results (</span><span class="xrefLink" data-dcnode-id="5841" id="jumplink-I0006-3568-56-1-15-FLORA1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5839" data-google-interstitial="false" data-open="I0006-3568-56-1-15-FLORA1" href="javascript:;" reveal-id="I0006-3568-56-1-15-FLORA1"><span data-dcnode-id="5840" instrument_node="">Flora and Madore 1996</span></a><span data-dcnode-id="5838" instrument_node="">, </span><span class="xrefLink" data-dcnode-id="5837" id="jumplink-I0006-3568-56-1-15-KNOP2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5835" data-google-interstitial="false" data-open="I0006-3568-56-1-15-KNOP2" href="javascript:;" reveal-id="I0006-3568-56-1-15-KNOP2"><span data-dcnode-id="5836" instrument_node="">Knop et al. 2004</span></a><span data-dcnode-id="5834" instrument_node="">) and have been confounded by systemic problems in determining the exact composition of the phloem sap. Workers have relied heavily on a simple technique in which leaves are excised and phloem exudate from the cut ends of the petioles is collected in a vial containing an EDTA solution (</span><span class="xrefLink" data-dcnode-id="5833" id="jumplink-I0006-3568-56-1-15-KING1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5831" data-google-interstitial="false" data-open="I0006-3568-56-1-15-KING1" href="javascript:;" reveal-id="I0006-3568-56-1-15-KING1"><span data-dcnode-id="5832" instrument_node="">King and Zeevaart 1974</span></a><span data-dcnode-id="5830" instrument_node="">). EDTA presumably prevents callose from forming at the sieve plates. While this technique can sometimes provide a reasonable picture of transported solute, this is not always true. For example, in </span><em data-dcnode-id="5828"><span data-dcnode-id="5829" instrument_node="">Lolium perenne</span></em><span data-dcnode-id="5827" instrument_node="">, phloem exudate obtained by the EDTA method contains monosaccharides and loliose, although these sugars are not detected in aphid stylet exudate (</span><span class="xrefLink" data-dcnode-id="5826" id="jumplink-I0006-3568-56-1-15-AMIARD1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5824" data-google-interstitial="false" data-open="I0006-3568-56-1-15-AMIARD1" href="javascript:;" reveal-id="I0006-3568-56-1-15-AMIARD1"><span data-dcnode-id="5825" instrument_node="">Amiard et al. 2004</span></a><span data-dcnode-id="5823" instrument_node="">). It is possible that under some circumstances EDTA extracts nonmobile compounds from cells surrounding the SE/CC complex. Mixed loading is an intriguing possibility, and it opens the possibility that different loading strategies could be used by the same plant under various conditions, but it has not yet been rigorously proved.</span></p><p class="chapter-para" data-dcnode-id="5804"><span data-dcnode-id="5821" instrument_node="">Now, how is unidirectional transport enforced in the darkened leaves of plants with intermediary cells? It is unlikely that the plasmodesmata of intermediary cells are pressure regulated, because, if they were, they would always be closed and loading would not occur. Instead, according to the polymer trap model, they are constitutively too narrow to allow the RFO sugars in the phloem to escape into the mesophyll </span><span class="xrefLink" data-dcnode-id="5820" id="jumplink-I0006-3568-56-1-15-F04"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="5818" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F04" href="javascript:;" reveal-id="I0006-3568-56-1-15-F04"><span data-dcnode-id="5819" instrument_node="">(figure 4b)</span></a><span data-dcnode-id="5817" instrument_node="">. Therefore, leakage through the symplast should be minimal. As in apoplastic loaders, some sugar will cross the RFO sugars in the phloem to escape into the mesophyll </span><span class="xrefLink" data-dcnode-id="5816" id="jumplink-I0006-3568-56-1-15-F04"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="5814" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F04" href="javascript:;" reveal-id="I0006-3568-56-1-15-F04"><span data-dcnode-id="5815" instrument_node="">(figure 4b)</span></a><span data-dcnode-id="5813" instrument_node="">. Therefore, leakage through the symplast should be minimal. As in apoplastic loaders, some sugar will cross the plasma membrane into the apoplast, but it will be retrieved by transporters that appear to be ubiquitous in the phloem, and are present in species that load symplastically (</span><span class="xrefLink" data-dcnode-id="5812" id="jumplink-I0006-3568-56-1-15-KNOP1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5810" data-google-interstitial="false" data-open="I0006-3568-56-1-15-KNOP1" href="javascript:;" reveal-id="I0006-3568-56-1-15-KNOP1"><span data-dcnode-id="5811" instrument_node="">Knop et al. 2001</span></a><span data-dcnode-id="5809" instrument_node="">). Note also that RFOs do not leak out of cells to the same extent as sucrose (</span><span class="xrefLink" data-dcnode-id="5808" id="jumplink-I0006-3568-56-1-15-AYRE1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5806" data-google-interstitial="false" data-open="I0006-3568-56-1-15-AYRE1" href="javascript:;" reveal-id="I0006-3568-56-1-15-AYRE1"><span data-dcnode-id="5807" instrument_node="">Ayre et al. 2003</span></a><span data-dcnode-id="5805" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="5802"><span data-dcnode-id="5803" instrument_node="">Where to go from here</span></p><p class="chapter-para" data-dcnode-id="5792"><span data-dcnode-id="5801" instrument_node="">The hypotheses put forward in this article are, of course, hypotheses only and require testing. Some aspects of this subject are better supported by data than others. The apoplastic model of phloem loading seems secure in its broad outlines, although researchers are only beginning to understand how this mechanism is regulated. Although available data support the polymer trap model, they are limited and much more needs to be done. In particular, the MELs of plasmodesmata in the minor vein phloem are not known for any species. Pressure regulation of plasmodesmata in minor vein phloem could be important in terms of how they operate, but that has not been experimentally verified. I have made only passing reference here to sugar alcohol loading and transport, which is an area of study in its infancy. It is far from clear how widespread passive entry of photoassimilate into the phloem will prove to be. Last but not least, the ecological advantages conferred by different loading mechanisms are still obscure, and the phylogenetic distribution of the loading types is only partially understood. Although comparative studies indicate that different plants use different loading strategies, only a few model species are used in most transport experiments. Even the large data sets of </span><span class="xrefLink" data-dcnode-id="5800" id="jumplink-I0006-3568-56-1-15-GAMALEI1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5798" data-google-interstitial="false" data-open="I0006-3568-56-1-15-GAMALEI1" href="javascript:;" reveal-id="I0006-3568-56-1-15-GAMALEI1"><span data-dcnode-id="5799" instrument_node="">Gamalei (1989)</span></a><span data-dcnode-id="5797" instrument_node=""> and </span><span class="xrefLink" data-dcnode-id="5796" id="jumplink-I0006-3568-56-1-15-ZIMMERMANN1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5794" data-google-interstitial="false" data-open="I0006-3568-56-1-15-ZIMMERMANN1" href="javascript:;" reveal-id="I0006-3568-56-1-15-ZIMMERMANN1"><span data-dcnode-id="5795" instrument_node="">Zimmermann and Ziegler (1975)</span></a><span data-dcnode-id="5793" instrument_node=""> include only a limited number of plant families. Sadly, information on phloem loading in non-angiosperms is almost entirely lacking.</span></p><span data-dcnode-id="5791" instrument_node=""> </span><h2 class="backacknowledgements-title js-splitscreen-backacknowledgements-title" data-dcnode-id="5789" id="126064930" scrollto-destination="126064930"><span data-dcnode-id="5790" instrument_node="">Acknowledgements</span></h2><span data-dcnode-id="5788" instrument_node="">

</span><div class="fig fig-section js-fig-section" data-dcnode-id="1056" data-id="I0006-3568-56-1-15-F04"><div class="label fig-label" data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Figure 4.</span></div><div class="graphic-wrap" data-dcnode-id="1064"><img alt="Schematic diagrams of photoassimilate entry into the minor vein phloem of leaves. (a) Passive entry. Sucrose (double circles) in mesophyll cells (m) passes through plasmodesmata to the bundle sheath (bs) and phloem parenchyma (pp) cells and by the same routes into the companion cells (cc) and sieve elements (se). Sucrose concentrations in all cell types is approximately the same. Continued delivery to the phloem depends on removal of sucrose by export. Sucrose concentrations in non-phloem cells may be higher than in other species. This is the process envisioned by Münch (1930), exemplified by willow. (b) Symplastic loading by the polymer trap. Sucrose enters intermediary cells (ic) (a specialized form of companion cells) passively from the bundle sheath through the numerous plasmodesmata that connect these two cell types. Inside the intermediary cell, raffinose (triple circles) and stachyose (quadruple circles) are synthesized from sucrose, keeping the concentration low. Raffinose and stachyose do not diffuse back to the bundle sheath because they are apparently larger than the mass exclusion limit of the branched plasmodesmata. These sugars enter the sieve elements through the large plasmodesmata that typically join these two cell types. (c and d) Apoplastic phloem loading. Sucrose enters the cell wall space and is pumped, against a concentration gradient, into the companion cells, or in some cases the sieve elements (tandem arrows). Plasmodesmata are always present between the companion cells and both the phloem parenchyma and the bundle sheath, in numbers that range from sparse to abundant, but they are apparently too narrow to accommodate flux of sucrose. (c) Some species have transfer cells (tc), that is, companion cells with wall ingrowths that increase uptake capacity from the apoplast. (d) Other plants have ordinary companion cells (occ), with smooth walls." class="content-image" data-dcnode-id="1070" data-path-from-xml="i0006-3568-56-1-15-f04.gif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/bioscience/56/1/10.1641_0006-3568%282006%29056%255B0015_PLHLGT%255D2.0.CO%3B2/5/m_i0006-3568-56-1-15-f04.gif%3FExpires%3D1653542392%26Signature%3DX71u6F4wZgmKo1HosKn3lFJNekUitFHrezhUJHvT488lTtKMSa4AwCsC8SFNI~2ER~dmjk~xogtSA8UEVlfYWJ2c7OX7yt~1FGqyT~-~jFo0DU2KMFzTI8Clu3oXRDfjhLKhNJwNs-oeNve9l71ZggZtAGu6rr0Rs-zG~2AO5UQYafqAJ~ONW3xB3N97rgkc8soTFVoxPvVCPBi6NcESwUgYFQkBrddONhYf-IuAU3gpUmRPpjX4JlRu0BmGDW84ZJ5tulTt8uNOHQbh43iHnRzRUpY26XAPOwdyaFDc9WgjoRuMVBHNGv7pgV-w4-Is8SLy653M1UR6NqJMjc6gzw__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA&amp;raw"><div class="fig-orig original-slide" data-dcnode-id="1065"><a class="fig-view-orig js-view-large openInAnotherWindow" data-dcnode-id="1068" data-google-interstitial="false" data-path-from-xml="i0006-3568-56-1-15-f04.gif" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/figure/126064937/i0006-3568-56-1-15-f04.gif" target="_blank"><span data-dcnode-id="1069" instrument_node="">Open in new tab</span></a><a class="download-slide" data-dcnode-id="1066" data-google-interstitial="false" data-path-from-xml="i0006-3568-56-1-15-f04.gif" data-section="126064937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/DownloadFile/DownloadImage.aspx%3Fimage%3Dhttps%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/bioscience/56/1/10.1641_0006-3568%282006%29056%255B0015_PLHLGT%255D2.0.CO%3B2/5/i0006-3568-56-1-15-f04.gif%3FExpires%3D1653542392%26Signature%3DakBlQC7NJOy8wsysXfYWIUsYdYjEdoMKKA51sevMeV6WDX8QuT~DThI9ucPjwhh9t0Reu59y7E8OLHDo58YDZbih37j
