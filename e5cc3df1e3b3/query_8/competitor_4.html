</span><h2 class="abstract-title js-splitscreen-abstract-title" data-dcnode-id="6402" id="126064863" scrollto-destination="126064863"><span data-dcnode-id="6403" instrument_node="">Abstract</span></h2><span data-dcnode-id="6401" instrument_node="">
</span><section class="abstract" data-dcnode-id="6398"><p class="chapter-para" data-dcnode-id="6399"><span data-dcnode-id="6400" instrument_node="">The transition from sink to source status is one of the key events in leaf development. When a leaf is about half grown, it stops importing phloem-mobile nutrients from the rest of the plant and begins to export its own products of photosynthesis. This shift in transport direction, which is largely irreversible, involves major changes in the way metabolites are transported to and from the mesophyll through plasmodesmata and via transporters. The import of nutrients ceases when plasmodesmata in large veins are lost or narrowed, preventing phloem unloading. Export begins when the minor veins mature and begin to load sugars and other compounds into the phloem. The unidirectional nature of loading is a consequence of sucrose transporter orientation in the plasma membrane of phloem cells, or of the trapping of raffinose-family sugars in those species that load through plasmodesmata.</span></p></section><span data-dcnode-id="6397" instrument_node=""> </span><span data-dcnode-id="6396" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6392"><strong data-dcnode-id="6394"><span data-dcnode-id="6395" instrument_node="">When adolescent people, or leaves,make the transition</span></strong><span data-dcnode-id="6393" instrument_node=""> to independence and adulthood, they lose the security of a steady food supply and start fending for themselves. Leaves begin their development as entirely heterotrophic organs at the shoot apex, relying on the rest of the plant for carbohydrate and other nutrients that they unload from the long-distance transport tissue, the phloem. But as the leaves expand, their photosynthetic capacity develops. By the time a leaf of a dicotyledonous plant is approximately half grown, it has reached positive carbon balance and is, in this sense at least, independent. Thereafter, it acts as a nutrient source, more than repaying its debt over the rest of its lifetime by exporting photoassimilate (the products of photosynthesis) to sink tissues, including roots, fruits, and newly emerging leaves.</span></p><p class="chapter-para" data-dcnode-id="6386"><span data-dcnode-id="6391" instrument_node="">Although a young human who has left home might ask for help from parents at some point, development imposes stricter constraints on a leaf. A large body of evidence indicates that mature leaves that are no longer productive, as a result of shading, age, or nitrogen deficiency, do not become a burden on the rest of the plant; rather, they retranslocate mobile nutrients and senesce (</span><span class="xrefLink" data-dcnode-id="6390" id="jumplink-I0006-3568-56-1-15-HIKOSAKA1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6388" data-google-interstitial="false" data-open="I0006-3568-56-1-15-HIKOSAKA1" href="javascript:;" reveal-id="I0006-3568-56-1-15-HIKOSAKA1"><span data-dcnode-id="6389" instrument_node="">Hikosaka 2005</span></a><span data-dcnode-id="6387" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6380"><span data-dcnode-id="6385" instrument_node="">How is such independence enforced? An important constraint on phloem transport to and from leaves is that it is essentially unidirectional. Once the source phase has begun, there is no going back. This is like locking the door behind a young adult who has just left home. If mature leaves are darkened for long enough, a small amount of photoassimilate from other leaves will enter the veins, but little, if any, will unload and reach the mesophyll (</span><span class="xrefLink" data-dcnode-id="6384" id="jumplink-I0006-3568-56-1-15-TURGEON3"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6382" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TURGEON3" href="javascript:;" reveal-id="I0006-3568-56-1-15-TURGEON3"><span data-dcnode-id="6383" instrument_node="">Turgeon 1989</span></a><span data-dcnode-id="6381" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6374"><span data-dcnode-id="6379" instrument_node="">The irrevocability of this dissociation is evident in experiments in which the shoot of a nonphotosynthetic (albino) tobacco plant is grafted to a wild-type stock (</span><span class="xrefLink" data-dcnode-id="6378" id="jumplink-I0006-3568-56-1-15-TURGEON1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6376" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TURGEON1" href="javascript:;" reveal-id="I0006-3568-56-1-15-TURGEON1"><span data-dcnode-id="6377" instrument_node="">Turgeon 1984</span></a><span data-dcnode-id="6375" instrument_node="">). Once the graft takes, emerging albino leaves thrive on nutrients they import from the stock plant. However, when these albino leaves reach the stage of development at which green leaves stop importing carbohydrate, they do, too. Unfortunately for albino leaves, they cannot make their own food, and they starve. Clearly, transport is under developmental control and is not simply a mass-action response to the relative availability of sugars at one end of the network or the other. A valve of some sort prevents backflow. To understand how unidirectionality of phloem transport is imposed on leaves at the physiological level, we must consider the mechanisms of intercellular transport, and the way these mechanisms are employed in different vein orders to determine transport direction and mediate phloem loading and unloading.</span></p><p class="chapter-para" data-dcnode-id="6372"><span data-dcnode-id="6373" instrument_node="">From one cell to another</span></p><p class="chapter-para" data-dcnode-id="6370"><span data-dcnode-id="6371" instrument_node="">Two routes are available for the passage of metabolites between plant cells: across the cell wall space (apoplastic transport) and through plasmodesmata (symplastic transport). Apoplastic transport requires passage of the transported molecular species across two plasma membranes. Little is known about the efflux step into the apoplast, but considerable progress has been made in studying transporters that mediate uptake from the apoplast.</span></p><p class="chapter-para" data-dcnode-id="6351"><span data-dcnode-id="6369" instrument_node="">Sucrose transporters fall into three subfamilies, on the basis of phylogenetic analysis: </span><em data-dcnode-id="6367"><span data-dcnode-id="6368" instrument_node="">SUT1, SUT2,</span></em><span data-dcnode-id="6366" instrument_node=""> and </span><em data-dcnode-id="6364"><span data-dcnode-id="6365" instrument_node="">SUT4</span></em><span data-dcnode-id="6363" instrument_node=""> (</span><span class="xrefLink" data-dcnode-id="6362" id="jumplink-I0006-3568-56-1-15-KUHN1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6360" data-google-interstitial="false" data-open="I0006-3568-56-1-15-KUHN1" href="javascript:;" reveal-id="I0006-3568-56-1-15-KUHN1"><span data-dcnode-id="6361" instrument_node="">Kühn 2003</span></a><span data-dcnode-id="6359" instrument_node="">). Seven functional genes code for active sucrose transporters in </span><em data-dcnode-id="6357"><span data-dcnode-id="6358" instrument_node="">Arabidopsis</span></em><span data-dcnode-id="6356" instrument_node=""> (</span><span class="xrefLink" data-dcnode-id="6355" id="jumplink-I0006-3568-56-1-15-SAUER1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6353" data-google-interstitial="false" data-open="I0006-3568-56-1-15-SAUER1" href="javascript:;" reveal-id="I0006-3568-56-1-15-SAUER1"><span data-dcnode-id="6354" instrument_node="">Sauer et al. 2004</span></a><span data-dcnode-id="6352" instrument_node="">). Within subfamilies, the expression patterns of the genes differ, as do the kinetic properties, substrate specificities, and amounts of protein produced. Most sucrose transporter genes are expressed in the phloem, but some of the proteins are found in sink tissues such as anthers, pollen, and root tip.</span></p><p class="chapter-para" data-dcnode-id="6329"><span data-dcnode-id="6350" instrument_node="">Sugar alcohol transporters have also been discovered (</span><span class="xrefLink" data-dcnode-id="6349" id="jumplink-I0006-3568-56-1-15-NOIRAUD1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6347" data-google-interstitial="false" data-open="I0006-3568-56-1-15-NOIRAUD1" href="javascript:;" reveal-id="I0006-3568-56-1-15-NOIRAUD1"><span data-dcnode-id="6348" instrument_node="">Noiraud et al. 2001</span></a><span data-dcnode-id="6346" instrument_node="">, </span><span class="xrefLink" data-dcnode-id="6345" id="jumplink-I0006-3568-56-1-15-RAMSPERGER-GLEIXNER1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6343" data-google-interstitial="false" data-open="I0006-3568-56-1-15-RAMSPERGER-GLEIXNER1" href="javascript:;" reveal-id="I0006-3568-56-1-15-RAMSPERGER-GLEIXNER1"><span data-dcnode-id="6344" instrument_node="">Ramsperger-Gleixner et al. 2004</span></a><span data-dcnode-id="6342" instrument_node="">, </span><span class="xrefLink" data-dcnode-id="6341" id="jumplink-I0006-3568-56-1-15-WATARI1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6339" data-google-interstitial="false" data-open="I0006-3568-56-1-15-WATARI1" href="javascript:;" reveal-id="I0006-3568-56-1-15-WATARI1"><span data-dcnode-id="6340" instrument_node="">Watari et al. 2004</span></a><span data-dcnode-id="6338" instrument_node="">). Three sugar alcohols are transported in large quantities in phloem sap, although only in specific plant families (</span><span class="xrefLink" data-dcnode-id="6337" id="jumplink-I0006-3568-56-1-15-ZIMMERMANN1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6335" data-google-interstitial="false" data-open="I0006-3568-56-1-15-ZIMMERMANN1" href="javascript:;" reveal-id="I0006-3568-56-1-15-ZIMMERMANN1"><span data-dcnode-id="6336" instrument_node="">Zimmermann and Ziegler 1975</span></a><span data-dcnode-id="6334" instrument_node="">). These are mannitol in the Apiaceae and Oleaceae, glucitol (sorbitol) in the Plantaginaceae and Rosaceae, and galactitol (dulcitol) in the Celastraceae. Two sorbitol transporters have been localized to companion cells of minor veins in the leaves of common plantain (</span><span class="xrefLink" data-dcnode-id="6333" id="jumplink-I0006-3568-56-1-15-RAMSPERGER-GLEIXNER1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6331" data-google-interstitial="false" data-open="I0006-3568-56-1-15-RAMSPERGER-GLEIXNER1" href="javascript:;" reveal-id="I0006-3568-56-1-15-RAMSPERGER-GLEIXNER1"><span data-dcnode-id="6332" instrument_node="">Ramsperger-Gleixner et al. 2004</span></a><span data-dcnode-id="6330" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6315"><span data-dcnode-id="6328" instrument_node="">Symplastic transport is mediated by plasmodesmata </span><span class="xrefLink" data-dcnode-id="6327" id="jumplink-I0006-3568-56-1-15-F01"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="6325" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F01" href="javascript:;" reveal-id="I0006-3568-56-1-15-F01"><span data-dcnode-id="6326" instrument_node="">(figure 1)</span></a><span data-dcnode-id="6324" instrument_node="">. These narrow, cylindrical structures penetrate the common walls between plant cells, and are lined by continuous plasma membrane (</span><span class="xrefLink" data-dcnode-id="6323" id="jumplink-I0006-3568-56-1-15-CILIA1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6321" data-google-interstitial="false" data-open="I0006-3568-56-1-15-CILIA1" href="javascript:;" reveal-id="I0006-3568-56-1-15-CILIA1"><span data-dcnode-id="6322" instrument_node="">Cilia and Jackson 2004</span></a><span data-dcnode-id="6320" instrument_node="">, </span><span class="xrefLink" data-dcnode-id="6319" id="jumplink-I0006-3568-56-1-15-SCHULZ1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6317" data-google-interstitial="false" data-open="I0006-3568-56-1-15-SCHULZ1" href="javascript:;" reveal-id="I0006-3568-56-1-15-SCHULZ1"><span data-dcnode-id="6318" instrument_node="">Schulz 2005</span></a><span data-dcnode-id="6316" instrument_node="">). A fine tube, the desmotubule, runs through the center of each plasmodesma and is continuous with the endoplasmic reticulum of the two cells. In favorable sections, an apparently proteinaceous rod can be seen in the middle of the desmotubule, and “spokes” of protein cross the space, known as the cytoplasmic annulus, between the desmotubule and the plasma membrane. Most investigators believe that the cytoplasmic annulus is the space that is open to the flux of solute molecules. There are no membranes across the cytoplasmic annulus. Therefore, active transport through this space, in the usual sense of requiring membrane-based transporters, is not possible. Instead, metabolite movement through the cytoplasmic annulus is passive.</span></p><p class="chapter-para" data-dcnode-id="6301"><span data-dcnode-id="6314" instrument_node="">Plasmodesmata constitute the path of least resistance for intercellular transport of ions and small organic molecules, such as sucrose, at most cellular interfaces. Their functional size is usually measured by monitoring the movement of fluorescent dyes of various dimensions that have been injected into cells. This function is best expressed as the Stokes radius of the penetrating molecule, but is more often defined by its mass. The mass exclusion limit (MEL) for solute in many plasmodesmata is in the range of 1 kilodalton (kDa), which corresponds to a pore diameter of approximately 4 nanometers (nm) (</span><span class="xrefLink" data-dcnode-id="6313" id="jumplink-I0006-3568-56-1-15-FISHER1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6311" data-google-interstitial="false" data-open="I0006-3568-56-1-15-FISHER1" href="javascript:;" reveal-id="I0006-3568-56-1-15-FISHER1"><span data-dcnode-id="6312" instrument_node="">Fisher 1999</span></a><span data-dcnode-id="6310" instrument_node="">). In </span><span class="xrefLink" data-dcnode-id="6309" id="jumplink-I0006-3568-56-1-15-F01"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="6307" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F01" href="javascript:;" reveal-id="I0006-3568-56-1-15-F01"><span data-dcnode-id="6308" instrument_node="">figure 1</span></a><span data-dcnode-id="6306" instrument_node="">, the diameter of the open spaces in the cytoplasmic annulus is approximately 2.5 nm (</span><span class="xrefLink" data-dcnode-id="6305" id="jumplink-I0006-3568-56-1-15-DING2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6303" data-google-interstitial="false" data-open="I0006-3568-56-1-15-DING2" href="javascript:;" reveal-id="I0006-3568-56-1-15-DING2"><span data-dcnode-id="6304" instrument_node="">Ding et al. 1992</span></a><span data-dcnode-id="6302" instrument_node="">). The discrepancy between the calculated and measured pore sizes in electron micrographs may be due to the limitations of microscopy when viewing such complex structures. It could also be due to an oversimplification of pore structure in mathematical treatments. For example, to calculate pore diameter from the MEL, the cytoplasmic annulus is treated as a ring of ideal, cylindrical tubes, approximately nine in number. However, this is not the physical reality. The structure appears to be more like a sieve, providing a tortuous pathway for solute travel around and between protein particles.</span></p><p class="chapter-para" data-dcnode-id="6291"><span data-dcnode-id="6300" instrument_node="">Although a MEL of 1 kDa would seem to limit the passage of all but small molecules, green fluorescent protein (GFP, with a mass of 27 kDa) that has been introduced to the phloem unloads in sink leaves and passes from cell to cell through the mesophyll (</span><span class="xrefLink" data-dcnode-id="6299" id="jumplink-I0006-3568-56-1-15-IMLAU1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6297" data-google-interstitial="false" data-open="I0006-3568-56-1-15-IMLAU1" href="javascript:;" reveal-id="I0006-3568-56-1-15-IMLAU1"><span data-dcnode-id="6298" instrument_node="">Imlau et al. 1999</span></a><span data-dcnode-id="6296" instrument_node="">). More surprisingly, certain endogenous macromolecules, including transcription factors and RNA, can move between cells through plasmodesmata (</span><span class="xrefLink" data-dcnode-id="6295" id="jumplink-I0006-3568-56-1-15-CILIA1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6293" data-google-interstitial="false" data-open="I0006-3568-56-1-15-CILIA1" href="javascript:;" reveal-id="I0006-3568-56-1-15-CILIA1"><span data-dcnode-id="6294" instrument_node="">Cilia and Jackson 2004</span></a><span data-dcnode-id="6292" instrument_node="">). This discovery, which is creating a sea change in researchers' understanding of the principles of plant development, followed from the study of virus movement. Viruses apparently hijack the mechanisms used to carry endogenous macromolecular signals from one cell to another.</span></p><p class="chapter-para" data-dcnode-id="6281"><span data-dcnode-id="6290" instrument_node="">How do such large molecules pass through plasmodesmata? The measured MEL of plasmodesmata at some interfaces is considerably larger than the standard 1 kDa (</span><span class="xrefLink" data-dcnode-id="6289" id="jumplink-I0006-3568-56-1-15-FISHER2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6287" data-google-interstitial="false" data-open="I0006-3568-56-1-15-FISHER2" href="javascript:;" reveal-id="I0006-3568-56-1-15-FISHER2"><span data-dcnode-id="6288" instrument_node="">Fisher and Oparka 1996</span></a><span data-dcnode-id="6286" instrument_node="">). One such interface is the common wall between sieve elements and companion cells. Another explanation is that some endogenous macromolecules, and viral genomes, are targeted to plasmodesmata and are drawn through them by an active mechanism separate from the passive movement of metabolites (</span><span class="xrefLink" data-dcnode-id="6285" id="jumplink-I0006-3568-56-1-15-ITAYA1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6283" data-google-interstitial="false" data-open="I0006-3568-56-1-15-ITAYA1" href="javascript:;" reveal-id="I0006-3568-56-1-15-ITAYA1"><span data-dcnode-id="6284" instrument_node="">Itaya et al. 2002</span></a><span data-dcnode-id="6282" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6279"><span data-dcnode-id="6280" instrument_node="">Closing the door in sink leaves</span></p><p class="chapter-para" data-dcnode-id="6269"><span data-dcnode-id="6278" instrument_node="">To determine how the door is closed on the import of photoassimilate during the sink–source transition in developing leaves, we need to know which pathway these compounds take as they arrive in the leaf and unload into the mesophyll. Early studies indicated that the unloading pathway is through plasmodesmata in sink leaves (</span><span class="xrefLink" data-dcnode-id="6277" id="jumplink-I0006-3568-56-1-15-SCHMALSTIG1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6275" data-google-interstitial="false" data-open="I0006-3568-56-1-15-SCHMALSTIG1" href="javascript:;" reveal-id="I0006-3568-56-1-15-SCHMALSTIG1"><span data-dcnode-id="6276" instrument_node="">Schmalstig and Geiger 1985</span></a><span data-dcnode-id="6274" instrument_node="">, </span><span class="xrefLink" data-dcnode-id="6273" id="jumplink-I0006-3568-56-1-15-TURGEON2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6271" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TURGEON2" href="javascript:;" reveal-id="I0006-3568-56-1-15-TURGEON2"><span data-dcnode-id="6272" instrument_node="">Turgeon 1987</span></a><span data-dcnode-id="6270" instrument_node="">), and the GFP experiments described above substantiate this conclusion. Clearly, the plasmodesmata provide an open avenue into the mesophyll. This suggests that termination of import during the sink–source transition in leaves involves the developmentally regulated closure or loss of these pores, or both.</span></p><p class="chapter-para" data-dcnode-id="6222"><span data-dcnode-id="6268" instrument_node="">However, we must be careful to ask which veins are involved, since there is no reason to assume a priori that photoassimilates unload from all veins. The veins in question can be visualized by following the movement of radiolabeled phloem-mobile sugar. In these experiments, mature leaves are provided with </span><sup data-dcnode-id="6266"><span data-dcnode-id="6267" instrument_node="">14</span></sup><span data-dcnode-id="6265" instrument_node="">CO</span><sub data-dcnode-id="6263"><span data-dcnode-id="6264" instrument_node="">2</span></sub><span data-dcnode-id="6262" instrument_node="">, and the radiolabeled molecules entering the sink leaf are identified by autoradiography (</span><span class="xrefLink" data-dcnode-id="6261" id="jumplink-I0006-3568-56-1-15-TURGEON2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6259" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TURGEON2" href="javascript:;" reveal-id="I0006-3568-56-1-15-TURGEON2"><span data-dcnode-id="6260" instrument_node="">Turgeon 1987</span></a><span data-dcnode-id="6258" instrument_node="">). Phloem-mobile fluorescent dyes can be used for the same purpose (</span><span class="xrefLink" data-dcnode-id="6257" id="jumplink-I0006-3568-56-1-15-ROBERTS1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6255" data-google-interstitial="false" data-open="I0006-3568-56-1-15-ROBERTS1" href="javascript:;" reveal-id="I0006-3568-56-1-15-ROBERTS1"><span data-dcnode-id="6256" instrument_node="">Roberts et al. 1997</span></a><span data-dcnode-id="6254" instrument_node="">). These experiments indicate that only large (major) veins in tobacco leaves are used for the distribution and unloading of imported photoassimilate (</span><span class="xrefLink" data-dcnode-id="6253" id="jumplink-I0006-3568-56-1-15-F02"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="6251" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F02" href="javascript:;" reveal-id="I0006-3568-56-1-15-F02"><span data-dcnode-id="6252" instrument_node="">figures 2</span></a><span data-dcnode-id="6250" instrument_node="">, </span><span class="xrefLink" data-dcnode-id="6249" id="jumplink-I0006-3568-56-1-15-F03"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="6247" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F03" href="javascript:;" reveal-id="I0006-3568-56-1-15-F03"><span data-dcnode-id="6248" instrument_node="">3</span></a><span data-dcnode-id="6246" instrument_node="">). The major veins block off the lamina into discrete islands, inside which an extensive set of minor veins can be seen when the tissue is cleared (</span><span class="xrefLink" data-dcnode-id="6245" id="jumplink-I0006-3568-56-1-15-F02"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="6243" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F02" href="javascript:;" reveal-id="I0006-3568-56-1-15-F02"><span data-dcnode-id="6244" instrument_node="">figures 2c</span></a><span data-dcnode-id="6242" instrument_node="">, </span><span class="xrefLink" data-dcnode-id="6241" id="jumplink-I0006-3568-56-1-15-F03"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="6239" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F03" href="javascript:;" reveal-id="I0006-3568-56-1-15-F03"><span data-dcnode-id="6240" instrument_node="">3b</span></a><span data-dcnode-id="6238" instrument_node="">). The major veins are generally referred to as first-order (midrib), second-order, and third-order; however, a close examination of </span><span class="xrefLink" data-dcnode-id="6237" id="jumplink-I0006-3568-56-1-15-F02"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="6235" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F02" href="javascript:;" reveal-id="I0006-3568-56-1-15-F02"><span data-dcnode-id="6236" instrument_node="">figure 2b</span></a><span data-dcnode-id="6234" instrument_node=""> reveals that some are fourth- or even fifth-order. This illustrates the limitations of describing the size and function of veins on the basis of how they branch. Consider, for example, that the fine terminations of second-order veins near the leaf margins are smaller than the third-order veins near the midrib. Although branching order serves as a convenient reference point, in the context of nutrient transport it is more important to focus on function. In this respect, there is a clear distinction between the major veins that import nutrients, no matter what their branching order, and the minor veins that are used later as the primary collecting veins for export. Minor veins are still immature during the import phase (</span><span class="xrefLink" data-dcnode-id="6233" id="jumplink-I0006-3568-56-1-15-TURGEON9"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6231" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TURGEON9" href="javascript:;" reveal-id="I0006-3568-56-1-15-TURGEON9"><span data-dcnode-id="6232" instrument_node="">Turgeon and Webb 1976</span></a><span data-dcnode-id="6230" instrument_node="">). Another important consideration is that veins of the same size or the same branching order may not have the same functions in all plants. In </span><em data-dcnode-id="6228"><span data-dcnode-id="6229" instrument_node="">Arabidopsis thaliana</span></em><span data-dcnode-id="6227" instrument_node="">, for example, there are fewer vein orders than in most other species (</span><span class="xrefLink" data-dcnode-id="6226" id="jumplink-I0006-3568-56-1-15-HARITATOS2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6224" data-google-interstitial="false" data-open="I0006-3568-56-1-15-HARITATOS2" href="javascript:;" reveal-id="I0006-3568-56-1-15-HARITATOS2"><span data-dcnode-id="6225" instrument_node="">Haritatos et al. 2000a</span></a><span data-dcnode-id="6223" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6208"><span data-dcnode-id="6221" instrument_node="">Does symplastic continuity decline in the major veins at the sink–source transition, as predicted by the arguments above? Yes. In tobacco, plasmodesmata at the critical interface between companion cells and phloem parenchyma cells are much less frequent after the sink–source transition than they are when the tissue is still in the sink phase (</span><span class="xrefLink" data-dcnode-id="6220" id="jumplink-I0006-3568-56-1-15-DING1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6218" data-google-interstitial="false" data-open="I0006-3568-56-1-15-DING1" href="javascript:;" reveal-id="I0006-3568-56-1-15-DING1"><span data-dcnode-id="6219" instrument_node="">Ding et al. 1988</span></a><span data-dcnode-id="6217" instrument_node="">). This loss is accompanied by an overall decline in plasmodesmatal frequencies in the mesophyll and epidermal cells and, at the same time, by the appearance of branched plasmodesmata (</span><span class="xrefLink" data-dcnode-id="6216" id="jumplink-I0006-3568-56-1-15-ROBERTS2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6214" data-google-interstitial="false" data-open="I0006-3568-56-1-15-ROBERTS2" href="javascript:;" reveal-id="I0006-3568-56-1-15-ROBERTS2"><span data-dcnode-id="6215" instrument_node="">Roberts et al. 2001</span></a><span data-dcnode-id="6213" instrument_node="">). The MEL of original, unbranched plasmodesmata is much higher than that of branched plasmodesmata (</span><span class="xrefLink" data-dcnode-id="6212" id="jumplink-I0006-3568-56-1-15-OPARKA2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6210" data-google-interstitial="false" data-open="I0006-3568-56-1-15-OPARKA2" href="javascript:;" reveal-id="I0006-3568-56-1-15-OPARKA2"><span data-dcnode-id="6211" instrument_node="">Oparka et al. 1999</span></a><span data-dcnode-id="6209" instrument_node="">). This means that symplastic continuity is reduced during the sink–source transition, not only because many plasmodesmata are eliminated but also because the channels are narrowed.</span></p><p class="chapter-para" data-dcnode-id="6198"><span data-dcnode-id="6207" instrument_node="">It is important to note that termination of import does not occur all at once throughout the leaf blade (</span><span class="xrefLink" data-dcnode-id="6206" id="jumplink-I0006-3568-56-1-15-TURGEON3"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6204" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TURGEON3" href="javascript:;" reveal-id="I0006-3568-56-1-15-TURGEON3"><span data-dcnode-id="6205" instrument_node="">Turgeon 1989</span></a><span data-dcnode-id="6203" instrument_node="">). Although initial leaf development in dicotyledonous species occurs acropetally (from leaf base to tip), this is followed by a basipetal (tip-to-base) wave of leaf maturation—including loss of import capacity, development of minor venation, and changes in growth rate and photosynthetic capacity—that establishes source status. As a result, the sink–source transition occurs basipetally as leaves mature </span><span class="xrefLink" data-dcnode-id="6202" id="jumplink-I0006-3568-56-1-15-F02"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="6200" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F02" href="javascript:;" reveal-id="I0006-3568-56-1-15-F02"><span data-dcnode-id="6201" instrument_node="">(figure 2a)</span></a><span data-dcnode-id="6199" instrument_node="">. There is a brief period of bidirectional transport in dicotyledonous leaves; the relatively immature base continues to import nutrients for a period after the tip has begun to export. Note, however, that transport is unidirectional at the local level in the lamina.</span></p><p class="chapter-para" data-dcnode-id="6196"><span data-dcnode-id="6197" instrument_node="">Opening the door in mature leaves: The role of minor veins</span></p><p class="chapter-para" data-dcnode-id="6194"><span data-dcnode-id="6195" instrument_node="">Once the door has been locked behind the young adult, another door must be opened to allow communication with the outside world. Although that communication is essential, it could provide an opportunity for a freeloader to become a burden on the household again. In the case of a green leaf, an avenue must be established for photoassimilate export without providing an unloading route through the same cells in prolonged darkness. Where is the valve, and how does it work?</span></p><p class="chapter-para" data-dcnode-id="6185"><span data-dcnode-id="6193" instrument_node="">The valve must be located wherever photoassimilate enters the phloem from the mesophyll. It is possible that some photoassimilate enters in the major veins, but minor vein phloem has more intimate contact with the mesophyll, and the minor veins are far more extensive. In sugar beet leaves, they measure 70 centimeters (cm) per cm</span><sup data-dcnode-id="6191"><span data-dcnode-id="6192" instrument_node="">2</span></sup><span data-dcnode-id="6190" instrument_node=""> of leaf lamina (</span><span class="xrefLink" data-dcnode-id="6189" id="jumplink-I0006-3568-56-1-15-GEIGER1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6187" data-google-interstitial="false" data-open="I0006-3568-56-1-15-GEIGER1" href="javascript:;" reveal-id="I0006-3568-56-1-15-GEIGER1"><span data-dcnode-id="6188" instrument_node="">Geiger and Cataldo 1969</span></a><span data-dcnode-id="6186" instrument_node="">). No mesophyll cell is more than six or seven cells away from a minor vein.</span></p><p class="chapter-para" data-dcnode-id="6183"><span data-dcnode-id="6184" instrument_node="">Up to this point, we have used the term “minor vein” loosely. It is worth asking more specifically how this term is defined. Are the minor veins a distinct class of vascular bundle, or just a subjective construct, the arbitrarily defined terminals of a continuous transport network?</span></p><p class="chapter-para" data-dcnode-id="6181"><span data-dcnode-id="6182" instrument_node="">In anatomical texts, minor veins are often described as being embedded in the mesophyll, while major veins are surrounded by a layer of parenchyma that sometimes forms a visible ridge (rib) on the abaxial side of the lamina. Although this definition is convenient, it is arbitrary, and it ignores the fact that vein ribs are more prominent in some species than in others. Furthermore, it begs the question of function.</span></p><p class="chapter-para" data-dcnode-id="6175"><span data-dcnode-id="6180" instrument_node="">One may also ask if vein classes have distinct molecular genetic regulatory systems. Indeed, this is the case. For example, galactinol synthase gene expression is specifically localized to the minor vein companion cells of mature leaves. Galactinol synthase catalyzes the first committed step in the raffinose and stachyose synthetic pathway. These sugars are synthesized in specialized companion cells of certain plants, such as melon, as part of the loading mechanism. The galactinol synthase promoter from melon drives reporter gene function in transgenic tobacco only in the small veins within the islands formed by major veins (</span><span class="xrefLink" data-dcnode-id="6179" id="jumplink-I0006-3568-56-1-15-HARITATOS3"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6177" data-google-interstitial="false" data-open="I0006-3568-56-1-15-HARITATOS3" href="javascript:;" reveal-id="I0006-3568-56-1-15-HARITATOS3"><span data-dcnode-id="6178" instrument_node="">Haritatos et al. 2000b</span></a><span data-dcnode-id="6176" instrument_node="">). Thus, the function of the galactinol synthase gene is loading related, and the promoter responds to a regulatory system that defines minor veins on a physiological and genetic basis.</span></p><p class="chapter-para" data-dcnode-id="6169"><span data-dcnode-id="6174" instrument_node="">The sucrose transporter SUT1, from potato, is also localized preferentially, though not exclusively, in the minor veins. The lack of complete specificity is not surprising given that transporters also serve the general function of retrieving sucrose that has leaked into the apoplast. Indeed, SUT1 is also found in sink tissues (</span><span class="xrefLink" data-dcnode-id="6173" id="jumplink-I0006-3568-56-1-15-TRUERNIT1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6171" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TRUERNIT1" href="javascript:;" reveal-id="I0006-3568-56-1-15-TRUERNIT1"><span data-dcnode-id="6172" instrument_node="">Truernit 2001</span></a><span data-dcnode-id="6170" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6157"><span data-dcnode-id="6168" instrument_node="">It is interesting that the galactinol synthase promoter is active in minor veins of tobacco even though tobacco does not synthesize raffinose and stachyose in these cells. The melon galactinol synthase promoter must be responding to an evolutionarily conserved regulatory system that controls other minor vein functions. This conclusion is supported by experiments in which the activity of the </span><em data-dcnode-id="6166"><span data-dcnode-id="6167" instrument_node="">SUC2</span></em><span data-dcnode-id="6165" instrument_node=""> promoter is visualized by GFP expression (</span><span class="xrefLink" data-dcnode-id="6164" id="jumplink-I0006-3568-56-1-15-WRIGHT1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6162" data-google-interstitial="false" data-open="I0006-3568-56-1-15-WRIGHT1" href="javascript:;" reveal-id="I0006-3568-56-1-15-WRIGHT1"><span data-dcnode-id="6163" instrument_node="">Wright et al. 2003</span></a><span data-dcnode-id="6161" instrument_node="">). When the leaf tissue of these plants is kept shaded during the sink–source transition, GFP synthesis is activated in major, but not minor, veins, even though the minor veins mature structurally. Evidently, the signals that activate the </span><em data-dcnode-id="6159"><span data-dcnode-id="6160" instrument_node="">SUC2</span></em><span data-dcnode-id="6158" instrument_node=""> promoter differ in the different vein classes.</span></p><p class="chapter-para" data-dcnode-id="6155"><span data-dcnode-id="6156" instrument_node="">Is phloem loading necessary?</span></p><p class="chapter-para" data-dcnode-id="6133"><span data-dcnode-id="6154" instrument_node="">The minor vein valve (or valves) that keeps transport unidirectional can be understood only by carefully detailing how photoassimilate enters the phloem. The route that sucrose takes from one mesophyll cell to another on its way to the veins is not well understood, but is thought by most investigators to be largely, or entirely, symplastic (</span><span class="xrefLink" data-dcnode-id="6153" id="jumplink-I0006-3568-56-1-15-STITT1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6151" data-google-interstitial="false" data-open="I0006-3568-56-1-15-STITT1" href="javascript:;" reveal-id="I0006-3568-56-1-15-STITT1"><span data-dcnode-id="6152" instrument_node="">Stitt 1996</span></a><span data-dcnode-id="6150" instrument_node="">, </span><span class="xrefLink" data-dcnode-id="6149" id="jumplink-I0006-3568-56-1-15-LALONDE1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6147" data-google-interstitial="false" data-open="I0006-3568-56-1-15-LALONDE1" href="javascript:;" reveal-id="I0006-3568-56-1-15-LALONDE1"><span data-dcnode-id="6148" instrument_node="">Lalonde et al. 2003</span></a><span data-dcnode-id="6146" instrument_node="">, </span><span class="xrefLink" data-dcnode-id="6145" id="jumplink-I0006-3568-56-1-15-SCHULZ1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6143" data-google-interstitial="false" data-open="I0006-3568-56-1-15-SCHULZ1" href="javascript:;" reveal-id="I0006-3568-56-1-15-SCHULZ1"><span data-dcnode-id="6144" instrument_node="">Schulz 2005</span></a><span data-dcnode-id="6142" instrument_node="">, </span><span class="xrefLink" data-dcnode-id="6141" id="jumplink-I0006-3568-56-1-15-TURGEON5"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6139" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TURGEON5" href="javascript:;" reveal-id="I0006-3568-56-1-15-TURGEON5"><span data-dcnode-id="6140" instrument_node="">Turgeon and Ayre 2005</span></a><span data-dcnode-id="6138" instrument_node="">, </span><span class="xrefLink" data-dcnode-id="6137" id="jumplink-I0006-3568-56-1-15-VANBEL2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6135" data-google-interstitial="false" data-open="I0006-3568-56-1-15-VANBEL2" href="javascript:;" reveal-id="I0006-3568-56-1-15-VANBEL2"><span data-dcnode-id="6136" instrument_node="">van Bel and Hafke 2005</span></a><span data-dcnode-id="6134" instrument_node="">). Given a symplastic pathway, is it possible that sucrose simply continues along the same route and diffuses into the minor vein phloem, with no increase in concentration?</span></p><p class="chapter-para" data-dcnode-id="6123"><span data-dcnode-id="6132" instrument_node="">This is an unorthodox proposition, because it would mean that there is no true phloem-loading step. However, such a step may not be needed. Ernst </span><span class="xrefLink" data-dcnode-id="6131" id="jumplink-I0006-3568-56-1-15-MUNCH1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6129" data-google-interstitial="false" data-open="I0006-3568-56-1-15-MUNCH1" href="javascript:;" reveal-id="I0006-3568-56-1-15-MUNCH1"><span data-dcnode-id="6130" instrument_node="">Münch (1930)</span></a><span data-dcnode-id="6128" instrument_node=""> did not postulate phloem loading in his classic, and widely accepted, model of long-distance transport. Münch reasoned that, as a result of photosynthesis, the carbohydrate concentration in mature leaves is higher than it is in sink tissues, such as immature leaves, fruits, and roots. In his scheme, the mesophyll cell (actually the chloroplast) is the source, and not the minor vein phloem. He did not envision any additional pressure in the leaf phloem above that generated by the accumulation of photosynthate, itself an active process </span><span class="xrefLink" data-dcnode-id="6127" id="jumplink-I0006-3568-56-1-15-F04"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="6125" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F04" href="javascript:;" reveal-id="I0006-3568-56-1-15-F04"><span data-dcnode-id="6126" instrument_node="">(figure 4a)</span></a><span data-dcnode-id="6124" instrument_node="">.</span></p><p class="chapter-para" data-dcnode-id="6121"><span data-dcnode-id="6122" instrument_node="">On an even more fundamental level, the common assumption that mass transport of solution through the phloem is driven by a pressure differential between source and sink is misleading. The phloem acts as a rigid-walled manifold that accumulates and loses solute in response to source and sink activities. The pressure differential is a manifestation of resistance to flow, not a cause; in an ideal system without resistance, flow would occur without a pressure differential.</span></p><p class="chapter-para" data-dcnode-id="6115"><span data-dcnode-id="6120" instrument_node="">It may also be misleading to think of the pressure differential as controlling flow. It is probable that control is exercised instead by the local solute exchange activities of sources and sinks (</span><span class="xrefLink" data-dcnode-id="6119" id="jumplink-I0006-3568-56-1-15-THOMPSON1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6117" data-google-interstitial="false" data-open="I0006-3568-56-1-15-THOMPSON1" href="javascript:;" reveal-id="I0006-3568-56-1-15-THOMPSON1"><span data-dcnode-id="6118" instrument_node="">Thompson and Holbrook 2003a</span></a><span data-dcnode-id="6116" instrument_node="">). This makes sense from an engineering perspective and helps us understand the benefits a plant enjoys by maintaining high phloem pressure. Operating the phloem “manifold” at high pressure permits fine regulation of unloading throughout the plant, regardless of position.</span></p><p class="chapter-para" data-dcnode-id="6109"><span data-dcnode-id="6114" instrument_node="">For a familiar illustration of this principle, consider water distribution in a house. If the pressure in the pipes is high, the faucets in various locations behave similarly, even those on different floors. This is because the difference in pressure between the pipes and the atmosphere is greater than the relatively minor differences in pressure within the pipes themselves, and is therefore approximately the same in all locations. In the same way, high pressure in the phloem facilitates controlled unloading of solutes into sink cells all over the plant. Furthermore, there are reasons to believe that phloem transport is more easily regulated if the pressure drop along the pathway is small, since a large pressure differential may slow the rate of communication of local disturbances in pressure and concentration between source and sink (</span><span class="xrefLink" data-dcnode-id="6113" id="jumplink-I0006-3568-56-1-15-THOMPSON2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6111" data-google-interstitial="false" data-open="I0006-3568-56-1-15-THOMPSON2" href="javascript:;" reveal-id="I0006-3568-56-1-15-THOMPSON2"><span data-dcnode-id="6112" instrument_node="">Thompson and Holbrook 2003b</span></a><span data-dcnode-id="6110" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6099"><span data-dcnode-id="6108" instrument_node="">In keeping with Münch's description, the entry of photo-assimilate into the phloem of willow leaves apparently follows a downhill gradient in sucrose concentration (</span><span class="xrefLink" data-dcnode-id="6107" id="jumplink-I0006-3568-56-1-15-TURGEON7"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6105" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TURGEON7" href="javascript:;" reveal-id="I0006-3568-56-1-15-TURGEON7"><span data-dcnode-id="6106" instrument_node="">Turgeon and Medville 1998</span></a><span data-dcnode-id="6104" instrument_node="">). Thus, there is no loading, in the sense that this term implies a thermodynamically active step. The mesophyll and minor vein phloem plasmolyze at approximately the same concentration of osmoticum, and the turgor in both is greater than it is in the phloem of the stem, which is lower than in other species that have been analyzed. Since plasmodesmata are common between minor vein companion cells and surrounding cells in willow (</span><span class="xrefLink" data-dcnode-id="6103" id="jumplink-I0006-3568-56-1-15-GAMALEI1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6101" data-google-interstitial="false" data-open="I0006-3568-56-1-15-GAMALEI1" href="javascript:;" reveal-id="I0006-3568-56-1-15-GAMALEI1"><span data-dcnode-id="6102" instrument_node="">Gamalei 1989</span></a><span data-dcnode-id="6100" instrument_node="">), it is reasonable to assume that photoassimilate migrates passively through these plasmodesmata and into the sieve element/companion cell (SE/CC) complexes of the veins. It is not yet clear how widespread the passive access of photoassimilate to the phloem will prove to be in angiosperms and other plants.</span></p><p class="chapter-para" data-dcnode-id="6093"><span data-dcnode-id="6098" instrument_node="">How might a valve work to prevent import of photo-assimilate in a mature leaf if the process is passive? There is no direct information available, but one possibility is that the plasmodesmata joining minor vein companion cells to adjacent phloem parenchyma and bundle sheath cells are pressure regulated. Pressure regulation of plasmodesmatal transport has been documented in trichomes (</span><span class="xrefLink" data-dcnode-id="6097" id="jumplink-I0006-3568-56-1-15-OPARKA1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6095" data-google-interstitial="false" data-open="I0006-3568-56-1-15-OPARKA1" href="javascript:;" reveal-id="I0006-3568-56-1-15-OPARKA1"><span data-dcnode-id="6096" instrument_node="">Oparka and Prior 1992</span></a><span data-dcnode-id="6094" instrument_node="">). According to this scenario, if the leaf is darkened or for some other reason cannot maintain positive carbon balance, and the sugar concentration of the leaf drops, the plasmodesmata will sense the pressure difference between the phloem (higher) and adjacent cells (lower) and close.</span></p><p class="chapter-para" data-dcnode-id="6091"><span data-dcnode-id="6092" instrument_node="">Phloem loading of sucrose via the apoplast</span></p><p class="chapter-para" data-dcnode-id="6078"><span data-dcnode-id="6090" instrument_node="">In the 1940s, workers began to realize that, at least in the plants they were studying, the solute content of the phloem was too high to be accounted for by passive accumulation (see </span><span class="xrefLink" data-dcnode-id="6089" id="jumplink-I0006-3568-56-1-15-GRUSAK1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6087" data-google-interstitial="false" data-open="I0006-3568-56-1-15-GRUSAK1" href="javascript:;" reveal-id="I0006-3568-56-1-15-GRUSAK1"><span data-dcnode-id="6088" instrument_node="">Grusak et al. 1996</span></a><span data-dcnode-id="6086" instrument_node=""> for a review of the older literature). In one elegant and critically important experiment, Brunhild </span><span class="xrefLink" data-dcnode-id="6085" id="jumplink-I0006-3568-56-1-15-ROECKL1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6083" data-google-interstitial="false" data-open="I0006-3568-56-1-15-ROECKL1" href="javascript:;" reveal-id="I0006-3568-56-1-15-ROECKL1"><span data-dcnode-id="6084" instrument_node="">Roeckl (1949)</span></a><span data-dcnode-id="6082" instrument_node=""> demonstrated that phloem exudate from </span><em data-dcnode-id="6080"><span data-dcnode-id="6081" instrument_node="">Robinia pseudoacacia</span></em><span data-dcnode-id="6079" instrument_node=""> will plasmolyze mesophyll cells in leaves of the same plant. By this simple test, Roeckl added significantly to the accumulating evidence that the concentration of metabolites is higher in the phloem than in the mesophyll cells, where photosynthesis occurs. A thermodynamically active pump must be involved. In the 1950s, the term “phloem loading” was coined to describe this phenomenon.</span></p><p class="chapter-para" data-dcnode-id="6068"><span data-dcnode-id="6077" instrument_node="">Apoplastic loading </span><span class="xrefLink" data-dcnode-id="6076" id="jumplink-I0006-3568-56-1-15-F04"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="6074" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F04" href="javascript:;" reveal-id="I0006-3568-56-1-15-F04"><span data-dcnode-id="6075" instrument_node="">(figure 4c, 4d)</span></a><span data-dcnode-id="6073" instrument_node=""> was first proposed in the 1970s (</span><span class="xrefLink" data-dcnode-id="6072" id="jumplink-I0006-3568-56-1-15-GEIGER2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6070" data-google-interstitial="false" data-open="I0006-3568-56-1-15-GEIGER2" href="javascript:;" reveal-id="I0006-3568-56-1-15-GEIGER2"><span data-dcnode-id="6071" instrument_node="">Geiger et al. 1973</span></a><span data-dcnode-id="6069" instrument_node="">). Physiologists focused on this hypothesis because an extracellular step, with retrieval into the SE/CC complex via transporters situated on the plasma membrane, was the simplest way to envision active accumulation of solute.</span></p><p class="chapter-para" data-dcnode-id="6062"><span data-dcnode-id="6067" instrument_node="">One way to test this model is to determine whether sucrose is present in the apoplast (see </span><span class="xrefLink" data-dcnode-id="6066" id="jumplink-I0006-3568-56-1-15-GRUSAK1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6064" data-google-interstitial="false" data-open="I0006-3568-56-1-15-GRUSAK1" href="javascript:;" reveal-id="I0006-3568-56-1-15-GRUSAK1"><span data-dcnode-id="6065" instrument_node="">Grusak et al. 1996</span></a><span data-dcnode-id="6063" instrument_node=""> for a review). Although this has consistently been shown to be the case, the proof is not secure, because the sampling methods extract sucrose from the entire extracellular space of the lamina, whereas the apoplastic step in phloem loading may be limited to the interface between the SE/CC complex and surrounding cells. Most of the sucrose detected in the apoplast may not be on its way to the phloem.</span></p><p class="chapter-para" data-dcnode-id="6048"><span data-dcnode-id="6061" instrument_node="">A more compelling experimental strategy has been to localize and study the function of transporters. However, the presence of transport proteins in the minor vein phloem does not provide unequivocal proof of apoplastic loading either. It has long been recognized that various compounds leak from plant cells and are actively retrieved from the apoplast (</span><span class="xrefLink" data-dcnode-id="6060" id="jumplink-I0006-3568-56-1-15-AYRE1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6058" data-google-interstitial="false" data-open="I0006-3568-56-1-15-AYRE1" href="javascript:;" reveal-id="I0006-3568-56-1-15-AYRE1"><span data-dcnode-id="6059" instrument_node="">Ayre et al. 2003</span></a><span data-dcnode-id="6057" instrument_node="">, </span><span class="xrefLink" data-dcnode-id="6056" id="jumplink-I0006-3568-56-1-15-VANBEL2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6054" data-google-interstitial="false" data-open="I0006-3568-56-1-15-VANBEL2" href="javascript:;" reveal-id="I0006-3568-56-1-15-VANBEL2"><span data-dcnode-id="6055" instrument_node="">van Bel and Hafke 2005</span></a><span data-dcnode-id="6053" instrument_node="">). Therefore, transporters act as bilge pumps and are widespread in different tissues. Apoplastic loading may have evolved by the up-regulation of a general retrieval mechanism in the phloem. Sucrose transporters are found throughout the phloem (</span><span class="xrefLink" data-dcnode-id="6052" id="jumplink-I0006-3568-56-1-15-LALONDE1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6050" data-google-interstitial="false" data-open="I0006-3568-56-1-15-LALONDE1" href="javascript:;" reveal-id="I0006-3568-56-1-15-LALONDE1"><span data-dcnode-id="6051" instrument_node="">Lalonde et al. 2003</span></a><span data-dcnode-id="6049" instrument_node="">), where continual retrieval of leaked sugar is needed to maintain effective transport rates.</span></p><p class="chapter-para" data-dcnode-id="6031"><span data-dcnode-id="6047" instrument_node="">To prove that transporters are used for loading, it is necessary to experimentally inhibit, or genetically down-regulate, them and observe the effects on loading and long-distance transport. Inhibition of loading was first accomplished by exogenous application of the sulfhydryl-modifying compound </span><em data-dcnode-id="6045"><span data-dcnode-id="6046" instrument_node="">p</span></em><span data-dcnode-id="6044" instrument_node="">-chloromercuribenzenesulfonic acid (PCMBS). PCMBS effectively inhibits sucrose transporters. Unfortunately, mercury inhibits most (</span><span class="xrefLink" data-dcnode-id="6043" id="jumplink-I0006-3568-56-1-15-TYERMAN1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6041" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TYERMAN1" href="javascript:;" reveal-id="I0006-3568-56-1-15-TYERMAN1"><span data-dcnode-id="6042" instrument_node="">Tyerman et al. 1999</span></a><span data-dcnode-id="6040" instrument_node="">), although not all (</span><span class="xrefLink" data-dcnode-id="6039" id="jumplink-I0006-3568-56-1-15-DANIELS1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6037" data-google-interstitial="false" data-open="I0006-3568-56-1-15-DANIELS1" href="javascript:;" reveal-id="I0006-3568-56-1-15-DANIELS1"><span data-dcnode-id="6038" instrument_node="">Daniels et al. 1994</span></a><span data-dcnode-id="6036" instrument_node="">), aquaporins. This complicates interpretation of the experiments, since water must accompany sucrose into the phloem. Also, this approach does not work with sugar alcohol transporters, since, with the exception of PmPLT1 (</span><span class="xrefLink" data-dcnode-id="6035" id="jumplink-I0006-3568-56-1-15-RAMSPERGER-GLEIXNER1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6033" data-google-interstitial="false" data-open="I0006-3568-56-1-15-RAMSPERGER-GLEIXNER1" href="javascript:;" reveal-id="I0006-3568-56-1-15-RAMSPERGER-GLEIXNER1"><span data-dcnode-id="6034" instrument_node="">Ramsperger-Gleixner et al. 2004</span></a><span data-dcnode-id="6032" instrument_node="">), they are not sensitive to PCMBS.</span></p><p class="chapter-para" data-dcnode-id="6018"><span data-dcnode-id="6030" instrument_node="">Several successful attempts have been made to genetically down-regulate transporters. Antisense inhibition (</span><span class="xrefLink" data-dcnode-id="6029" id="jumplink-I0006-3568-56-1-15-RIESMEIER1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6027" data-google-interstitial="false" data-open="I0006-3568-56-1-15-RIESMEIER1" href="javascript:;" reveal-id="I0006-3568-56-1-15-RIESMEIER1"><span data-dcnode-id="6028" instrument_node="">Riesmeier et al. 1994</span></a><span data-dcnode-id="6026" instrument_node="">) and insertional mutagenesis (</span><span class="xrefLink" data-dcnode-id="6025" id="jumplink-I0006-3568-56-1-15-GOTTWALD1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6023" data-google-interstitial="false" data-open="I0006-3568-56-1-15-GOTTWALD1" href="javascript:;" reveal-id="I0006-3568-56-1-15-GOTTWALD1"><span data-dcnode-id="6024" instrument_node="">Gottwald et al. 2000</span></a><span data-dcnode-id="6022" instrument_node="">) of </span><em data-dcnode-id="6020"><span data-dcnode-id="6021" instrument_node="">SUT1</span></em><span data-dcnode-id="6019" instrument_node=""> lead to severe symptoms of chlorosis due to inhibition of export and the resulting accumulation of large amounts of carbohydrate in the mesophyll cells.</span></p><p class="chapter-para" data-dcnode-id="6012"><span data-dcnode-id="6017" instrument_node="">Another way to inhibit apoplastic loading is to target yeast invertase to the apoplast (</span><span class="xrefLink" data-dcnode-id="6016" id="jumplink-I0006-3568-56-1-15-VONSCHAEWEN1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6014" data-google-interstitial="false" data-open="I0006-3568-56-1-15-VONSCHAEWEN1" href="javascript:;" reveal-id="I0006-3568-56-1-15-VONSCHAEWEN1"><span data-dcnode-id="6015" instrument_node="">Von Schaewen et al. 1990</span></a><span data-dcnode-id="6013" instrument_node="">). Indeed, these were the first transgenic experiments that tested the apoplastic model of phloem loading. Since invertase hydrolyzes sucrose to glucose and fructose, neither of which is recognized by sucrose transporters, loading should be, and is, severely curtailed in these plants. Transgenic plants exhibit the usual symptoms associated with export inhibition: leaf curling, diminished photosynthesis, chlorosis, slow growth, and accumulation of large amounts of soluble carbohydrate and starch.</span></p><p class="chapter-para" data-dcnode-id="6002"><span data-dcnode-id="6011" instrument_node="">Examination of </span><span class="xrefLink" data-dcnode-id="6010" id="jumplink-I0006-3568-56-1-15-F04"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="6008" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F04" href="javascript:;" reveal-id="I0006-3568-56-1-15-F04"><span data-dcnode-id="6009" instrument_node="">figure 4c and 4d</span></a><span data-dcnode-id="6007" instrument_node=""> makes it clear why export is unidirectional in species that load via the apoplast. If a leaf is darkened for a prolonged period, even small amounts of stored photoassimilate in the mesophyll can still be pumped into the SE/CC complex to maintain the source–sink pressure gradient. With further light deprivation, the blade as a whole might become a sink, but an ineffective one, since the entering photoassimilate will be confined to the veins. If sucrose leaks out of the phloem across the plasma membranes of sieve elements or companion cells, it will be retrieved immediately by transporters and returned to the phloem. Leaf tissue that has been maintained in the dark for long periods is still capable of sucrose uptake from the apoplast into the phloem (</span><span class="xrefLink" data-dcnode-id="6006" id="jumplink-I0006-3568-56-1-15-WRIGHT1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6004" data-google-interstitial="false" data-open="I0006-3568-56-1-15-WRIGHT1" href="javascript:;" reveal-id="I0006-3568-56-1-15-WRIGHT1"><span data-dcnode-id="6005" instrument_node="">Wright et al. 2003</span></a><span data-dcnode-id="6003" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="5965"><span data-dcnode-id="6001" instrument_node="">An assumption in this analysis is that leakage cannot occur through the plasmodesmata that link the minor vein phloem to surrounding cells and the mesophyll. Leakage from sieve elements is not an issue, since they have only rare symplastic contact with any cell except their associated companion cell. One might also expect that plasmodesmata are uncommon between companion cells and phloem parenchyma cells or bundle sheath cells; otherwise, sucrose would leak back toward the mesophyll while loading is going on, setting up a futile transport cycle. However, contrary to these expectations, there is a range of plasmodesmata frequencies at these locations (</span><span class="xrefLink" data-dcnode-id="6000" id="jumplink-I0006-3568-56-1-15-GAMALEI1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5998" data-google-interstitial="false" data-open="I0006-3568-56-1-15-GAMALEI1" href="javascript:;" reveal-id="I0006-3568-56-1-15-GAMALEI1"><span data-dcnode-id="5999" instrument_node="">Gamalei 1989</span></a><span data-dcnode-id="5997" instrument_node="">). Originally, it was thought that the spectrum from abundant (type 1) to sparse (type 2) companion cell plasmodesmata reflected a spectrum of loading mechanisms, from symplastic to apoplastic. One observation consistent with this interpretation is that species with very few such plasmodesmata often appear specialized for apoplastic loading. The specialization referred to here is the presence of elaborate wall thickenings that increase the surface area of the plasma membrane and the uptake capacity from the apoplast (</span><span class="xrefLink" data-dcnode-id="5996" id="jumplink-I0006-3568-56-1-15-AMIARD1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5994" data-google-interstitial="false" data-open="I0006-3568-56-1-15-AMIARD1" href="javascript:;" reveal-id="I0006-3568-56-1-15-AMIARD1"><span data-dcnode-id="5995" instrument_node="">Amiard et al. 2004</span></a><span data-dcnode-id="5993" instrument_node="">). These specialized companion cells are called </span><em data-dcnode-id="5991"><span data-dcnode-id="5992" instrument_node="">transfer cells</span></em><span class="xrefLink" data-dcnode-id="5990" id="jumplink-I0006-3568-56-1-15-F04"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="5988" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F04" href="javascript:;" reveal-id="I0006-3568-56-1-15-F04"><span data-dcnode-id="5989" instrument_node="">(figure 4c)</span></a><span data-dcnode-id="5987" instrument_node="">. On the other hand, many species of apoplastic loaders have no such wall elaborations. Their companion cells are often referred to as “ordinary” </span><span class="xrefLink" data-dcnode-id="5986" id="jumplink-I0006-3568-56-1-15-F04"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="5984" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F04" href="javascript:;" reveal-id="I0006-3568-56-1-15-F04"><span data-dcnode-id="5985" instrument_node="">(figure 4d)</span></a><span data-dcnode-id="5983" instrument_node="">. Why some apoplastic loaders have transfer cells (e.g., </span><em data-dcnode-id="5981"><span data-dcnode-id="5982" instrument_node="">Pisum sativum</span></em><span data-dcnode-id="5980" instrument_node="">), while others have ordinary minor vein companion cells (e.g., </span><em data-dcnode-id="5978"><span data-dcnode-id="5979" instrument_node="">Nicotiana tabacum</span></em><span data-dcnode-id="5977" instrument_node=""> and </span><em data-dcnode-id="5975"><span data-dcnode-id="5976" instrument_node="">A. thaliana</span></em><span data-dcnode-id="5974" instrument_node="">), is unclear. Confusing the issue even more is the fact that several type 1 species load apoplastically (</span><span class="xrefLink" data-dcnode-id="5973" id="jumplink-I0006-3568-56-1-15-GOGGIN1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5971" data-google-interstitial="false" data-open="I0006-3568-56-1-15-GOGGIN1" href="javascript:;" reveal-id="I0006-3568-56-1-15-GOGGIN1"><span data-dcnode-id="5972" instrument_node="">Goggin et al. 2001</span></a><span data-dcnode-id="5970" instrument_node="">, </span><span class="xrefLink" data-dcnode-id="5969" id="jumplink-I0006-3568-56-1-15-TURGEON8"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5967" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TURGEON8" href="javascript:;" reveal-id="I0006-3568-56-1-15-TURGEON8"><span data-dcnode-id="5968" instrument_node="">Turgeon and Medville 2004</span></a><span data-dcnode-id="5966" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="5948"><span data-dcnode-id="5964" instrument_node="">Why does sucrose not leak out of the phloem in these apoplastic loaders, especially the ones that have abundant plasmodesmata in the companion cells? It seems probable that the plasmodesmata are especially narrow, if not sealed. This is the case in phloem along the long-distance transport pathway, where microinjection studies with fluorescent dyes indicate that the SE/CC complexes are symplastically isolated (</span><span class="xrefLink" data-dcnode-id="5963" id="jumplink-I0006-3568-56-1-15-VANBEL1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5961" data-google-interstitial="false" data-open="I0006-3568-56-1-15-VANBEL1" href="javascript:;" reveal-id="I0006-3568-56-1-15-VANBEL1"><span data-dcnode-id="5962" instrument_node="">van Bel and Kempers 1991</span></a><span data-dcnode-id="5960" instrument_node="">). Several attempts have been made to measure the MEL of plasmodesmata between the minor vein companion cells and either the adjacent phloem parenchyma or the bundle sheath cells. However, these efforts have been thwarted by the secluded location of the veins, which makes microinjections taxing, and by the difficulty of distinguishing minor vein companion cells from phloem parenchyma cells in fresh tissue (see discussion in </span><span class="xrefLink" data-dcnode-id="5959" id="jumplink-I0006-3568-56-1-15-BEEBE2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5957" data-google-interstitial="false" data-open="I0006-3568-56-1-15-BEEBE2" href="javascript:;" reveal-id="I0006-3568-56-1-15-BEEBE2"><span data-dcnode-id="5958" instrument_node="">Beebe and Russin 1999</span></a><span data-dcnode-id="5956" instrument_node="">). In </span><em data-dcnode-id="5954"><span data-dcnode-id="5955" instrument_node="">Moricandia</span></em><span data-dcnode-id="5953" instrument_node="">, plasmodesmata at this interface appear to be actually plugged with amorphous material (</span><span class="xrefLink" data-dcnode-id="5952" id="jumplink-I0006-3568-56-1-15-BEEBE1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5950" data-google-interstitial="false" data-open="I0006-3568-56-1-15-BEEBE1" href="javascript:;" reveal-id="I0006-3568-56-1-15-BEEBE1"><span data-dcnode-id="5951" instrument_node="">Beebe and Evert 1992</span></a><span data-dcnode-id="5949" instrument_node="">), but in other cases there is no visible alteration in plasmodesmatal structure. Perhaps the plasmodesmata close when they sense a pressure difference between the phloem and surrounding cells, as described above in the section on passive photoassimilate accumulation.</span></p><p class="chapter-para" data-dcnode-id="5946"><span data-dcnode-id="5947" instrument_node="">Finessing the second law: Symplastic phloem loading</span></p><p class="chapter-para" data-dcnode-id="5940"><span data-dcnode-id="5945" instrument_node="">Yet another explanation for abundant plasmodesmata in the phloem of minor veins is that the plasmodesmata provide an avenue for phloem loading, leading to the accumulation of photoassimilate in the SE/CC complex against a concentration gradient </span><span class="xrefLink" data-dcnode-id="5944" id="jumplink-I0006-3568-56-1-15-F04"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="5942" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F04" href="javascript:;" reveal-id="I0006-3568-56-1-15-F04"><span data-dcnode-id="5943" instrument_node="">(figure 4b)</span></a><span data-dcnode-id="5941" instrument_node="">. Early suggestions to this effect met with skepticism, for the obvious reason that energetic loading of molecules through open pores appears to violate the second law of thermodynamics. However, a solution to this problem was found when it became apparent that the plants with the most numerous plasmodesmata in the minor vein phloem have a specialized form of minor vein companion cell, called the intermediary cell.</span></p><p class="chapter-para" data-dcnode-id="5926"><span data-dcnode-id="5939" instrument_node="">Intermediary cells have dense cytoplasm, small vacuoles, and proplastids rather than chloroplasts. The plasmodesmata that link them to the bundle sheath are not only plentiful but highly branched, more so on the intermediary cell side. In members of the Lamiales, the plasmodesmatal branches on the intermediary cell side are narrow (</span><span class="xrefLink" data-dcnode-id="5938" id="jumplink-I0006-3568-56-1-15-FISHER3"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5936" data-google-interstitial="false" data-open="I0006-3568-56-1-15-FISHER3" href="javascript:;" reveal-id="I0006-3568-56-1-15-FISHER3"><span data-dcnode-id="5937" instrument_node="">Fisher 1986</span></a><span data-dcnode-id="5935" instrument_node="">, </span><span class="xrefLink" data-dcnode-id="5934" id="jumplink-I0006-3568-56-1-15-TURGEON10"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5932" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TURGEON10" href="javascript:;" reveal-id="I0006-3568-56-1-15-TURGEON10"><span data-dcnode-id="5933" instrument_node="">Turgeon et al. 1993</span></a><span data-dcnode-id="5931" instrument_node="">). Plasmodesmatal branching occurs just before the sink–source transition, strengthening the argument that the plasmodesmata are involved in phloem loading (</span><span class="xrefLink" data-dcnode-id="5930" id="jumplink-I0006-3568-56-1-15-VOLK1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5928" data-google-interstitial="false" data-open="I0006-3568-56-1-15-VOLK1" href="javascript:;" reveal-id="I0006-3568-56-1-15-VOLK1"><span data-dcnode-id="5929" instrument_node="">Volk et al. 1996</span></a><span data-dcnode-id="5927" instrument_node="">). Intermediary cells have been found in many families of angiosperms (Acanthaceae, Bignoniaceae, Buddlejaceae, Celastraceae, Cucurbitaceae, Hydrangiaceae, Juglandaceae, Lamiaceae, Oleaceae, Scrophulariaceae, and Verbenaceae), and this list will undoubtedly grow.</span></p><p class="chapter-para" data-dcnode-id="5916"><span data-dcnode-id="5925" instrument_node="">Although an extensive electron microscopy analysis has not been undertaken, it appears that the trait is widespread, and perhaps even uniform, in the families in which it is found. Intermediary cells are not present in all of the Scrophulariaceae (figworts), but this is a polyphyletic family. When the figworts are analyzed by more recent phylogenetic criteria (</span><span class="xrefLink" data-dcnode-id="5924" id="jumplink-I0006-3568-56-1-15-OLMSTEAD1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5922" data-google-interstitial="false" data-open="I0006-3568-56-1-15-OLMSTEAD1" href="javascript:;" reveal-id="I0006-3568-56-1-15-OLMSTEAD1"><span data-dcnode-id="5923" instrument_node="">Olmstead et al. 2001</span></a><span data-dcnode-id="5921" instrument_node="">), the presence of intermediary cells is found to be uniform within monophyletic groups. Symplastic loading has evolved independently at least four times (</span><span class="xrefLink" data-dcnode-id="5920" id="jumplink-I0006-3568-56-1-15-TURGEON11"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5918" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TURGEON11" href="javascript:;" reveal-id="I0006-3568-56-1-15-TURGEON11"><span data-dcnode-id="5919" instrument_node="">Turgeon et al. 2001</span></a><span data-dcnode-id="5917" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="5903"><span data-dcnode-id="5915" instrument_node="">The other distinguishing characteristic of species with intermediary cells is that they translocate high concentrations of raffinose-family oligosaccharides (RFOs; raffinose and stachyose). Some plants that load apoplastically also translocate RFOs, especially raffinose (</span><span class="xrefLink" data-dcnode-id="5914" id="jumplink-I0006-3568-56-1-15-ZIMMERMANN1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5912" data-google-interstitial="false" data-open="I0006-3568-56-1-15-ZIMMERMANN1" href="javascript:;" reveal-id="I0006-3568-56-1-15-ZIMMERMANN1"><span data-dcnode-id="5913" instrument_node="">Zimmermann and Ziegler 1975</span></a><span data-dcnode-id="5911" instrument_node="">), but only in small, and in some cases trace, amounts. For example, </span><em data-dcnode-id="5909"><span data-dcnode-id="5910" instrument_node="">A. thaliana</span></em><span data-dcnode-id="5908" instrument_node=""> transports sucrose predominately, with a much smaller amount of raffinose (</span><span class="xrefLink" data-dcnode-id="5907" id="jumplink-I0006-3568-56-1-15-HARITATOS2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5905" data-google-interstitial="false" data-open="I0006-3568-56-1-15-HARITATOS2" href="javascript:;" reveal-id="I0006-3568-56-1-15-HARITATOS2"><span data-dcnode-id="5906" instrument_node="">Haritatos et al. 2000a</span></a><span data-dcnode-id="5904" instrument_node="">). In contrast, plants with intermediary cells transport most of their sugar as RFOs, with stachyose dominating. Indeed, all species known to have intermediary cells use RFOs as their primary transport sugars, and all species known to use RFOs as their primary transport sugars have intermediary cells. Clearly, this is not a coincidence; it is a mechanistic association.</span></p><p class="chapter-para" data-dcnode-id="5889"><span data-dcnode-id="5902" instrument_node="">The clearest experimental evidence that RFO species load through the symplast is that loading is not inhibited by PCMBS. Several complementary techniques have been used to verify these results, including macroautoradiography, exudation into EDTA (ethylenediaminetetraacetic acid) solutions, and plasmolysis (</span><span class="xrefLink" data-dcnode-id="5901" id="jumplink-I0006-3568-56-1-15-TURGEON8"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5899" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TURGEON8" href="javascript:;" reveal-id="I0006-3568-56-1-15-TURGEON8"><span data-dcnode-id="5900" instrument_node="">Turgeon and Medville 2004</span></a><span data-dcnode-id="5898" instrument_node="">). Of these, plasmolysis has the advantage that it directly visualizes loading. Plasmolysis is the retraction of the plasma membrane and cytoplasm away from the wall that occurs when plant cells are placed in a hypertonic solution </span><span class="xrefLink" data-dcnode-id="5897" id="jumplink-I0006-3568-56-1-15-F05"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="5895" data-google-interstitial="false" data-open="I0006-3568-56-1-15-F05" href="javascript:;" reveal-id="I0006-3568-56-1-15-F05"><span data-dcnode-id="5896" instrument_node="">(figure 5)</span></a><span data-dcnode-id="5894" instrument_node="">. It is the most direct way of providing evidence for the presence or absence of a solute concentration gradient between specific cell types (</span><span class="xrefLink" data-dcnode-id="5893" id="jumplink-I0006-3568-56-1-15-GEIGER2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5891" data-google-interstitial="false" data-open="I0006-3568-56-1-15-GEIGER2" href="javascript:;" reveal-id="I0006-3568-56-1-15-GEIGER2"><span data-dcnode-id="5892" instrument_node="">Geiger et al. 1973</span></a><span data-dcnode-id="5890" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="5877"><span data-dcnode-id="5888" instrument_node="">In experiments with </span><em data-dcnode-id="5886"><span data-dcnode-id="5887" instrument_node="">Coleus blumei</span></em><span data-dcnode-id="5885" instrument_node=""> (</span><em data-dcnode-id="5883"><span data-dcnode-id="5884" instrument_node="">Solenostemon scutellarioides</span></em><span data-dcnode-id="5882" instrument_node="">), an RFO-transporting species, plants were placed in the dark until the contents of the phloem were depleted, and then fragments of leaf tissue were exposed to light. As measured by plasmolysis, the solute content of the phloem rose dramatically, even when the tissue had been pretreated with PCMBS (</span><span class="xrefLink" data-dcnode-id="5881" id="jumplink-I0006-3568-56-1-15-TURGEON6"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5879" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TURGEON6" href="javascript:;" reveal-id="I0006-3568-56-1-15-TURGEON6"><span data-dcnode-id="5880" instrument_node="">Turgeon and Gowan 1990</span></a><span data-dcnode-id="5878" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="5856"><span data-dcnode-id="5876" instrument_node="">The strict association between intermediary cells and the translocation of RFOs led to the development of a thermodynamically feasible model of symplastic loading, termed the “polymer trap” (</span><span class="xrefLink" data-dcnode-id="5875" id="jumplink-I0006-3568-56-1-15-TURGEON4"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="5873" data-google-interstitial="false" data-open="I0006-3568-56-1-15-TURGEON4" href="javascript:;" reveal-id="I0006-3568-56-1-15-TURGEON4"><span data-dcnode-id="5874" instrument_node="">Turgeon 1991</span></a><span data-dcnode-id="5872" instrument_node="">). According to this model, sucrose diffuses into intermediary cells </span><em data-dcnode-id="5870"><span data-dcnode-id="5871" instrument_node="">down</span></em><span data-dcnode-id="5869" instrument_node=""> its concentration gradient and is converted to the larger oligosaccharides, raffinose and stachyose. Synthesis of these sugars reduces the concentration of sucrose to permit continued diffusion. A fundamental assumption of the mode
