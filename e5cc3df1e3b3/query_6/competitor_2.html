ng: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4768" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4769" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4763" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4764"><svg data-dcnode-id="4765" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4766" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4710" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4711" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4712"><span class="q-box qu-userSelect--text" data-dcnode-id="4713" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4750" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4751" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4752" instrument_node="">The transmission lines that MCC hopes to construct are based on priorities proposed by the Nepal Electricity Authority- hence the 300 KMs transmission lines that connect the most important hydropower projects across Nepal. If these crucial transmission lines are not built, Nepal's energy security is in jeopardy for another couple of decades. Since 2012-13, numerous Governments have documented the processes of how these projects were chosen. MCC has engaged itself since 2005 in 30 plus countries (including in Europe, South East Asia, South Asia and Africa).</span></span></p><span data-dcnode-id="4749" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4746" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4747" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4748" instrument_node="">Nepal is not as helpless as some of the so-called radical nationalists tend to portray. In the context of MCC I think it is useful for all of us to think the following two things:</span></span></p><span data-dcnode-id="4745" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4742" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4743" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4744" instrument_node="">1. We can be assured of one simple fact: neither China or India will tolerate the US's military presence in Nepal. I don't think this can be argued against.</span></span></p><span data-dcnode-id="4741" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4738" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4739" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4740" instrument_node="">2. Is Nepal better off without having energy security for the next 2-3 decades? This includes the failure of dozens of mega hydro projects in which investments were made because private parties (national and international) felt that the electricity generated could be transmitted across the country as well as beyond- through transmission lines made with MCC money). It is plausible to think that if these hydropower projects are left high and dry, we can expect no foreign investor to come into Nepal (especially after the post-COVID19 scenario when FDI will be very tricky to bring.)</span></span></p><span data-dcnode-id="4737" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4734" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4735" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4736" instrument_node="">I think it is a calculated risk we must take when dealing with big powers. But Nepal earning billions of dollars in the next few decades will only make Nepal stronger. I am not saying I know any better than other people, it is just that I have followed how MCC has worked in other countries and how the project reached this point after so many years of homework from expert teams who were not foreigners but fellow Nepalis. Cheers!</span></span></p><span data-dcnode-id="4733" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4730" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4731" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4732" instrument_node="">The transmission lines that MCC hopes to construct are based on priorities proposed by the Nepal Electricity Authority- hence the 300 KMs transmission lines that connect the most important hydropower projects across Nepal. If these crucial transmission lines are not built, Nepal's energy security is in jeopardy for another couple of decades. Since 2012-13, numerous Governments have documented the processes of how these projects were chosen. MCC has engaged itself since 2005 in 30 plus countries (including in Europe, South East Asia, South Asia and Africa).</span></span></p><span data-dcnode-id="4729" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4726" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4727" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4728" instrument_node="">Nepal is not as helpless as some of the so-called radical nationalists tend to portray. In the context of MCC I think it is useful for all of us to think the following two things:</span></span></p><span data-dcnode-id="4725" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4722" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4723" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4724" instrument_node="">1. We can be assured of one simple fact: neither China or India will tolerate the US's military presence in Nepal. I don't think this can be argued against.</span></span></p><span data-dcnode-id="4721" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4718" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4719" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4720" instrument_node="">2. Is Nepal better off without having energy security for the next 2-3 decades? This includes the failure of dozens of mega hydro projects in which investments were made because private parties (national and international) felt that the electricity generated could be transmitted across the country as well as beyond- through transmission lines made with MCC money). It is plausible to think that if these hydropower projects are left high and dry, we can expect no foreign investor to come into Nepal (especially after the post-COVID19 scenario when FDI will be very tricky to bring.)</span></span></p><span data-dcnode-id="4717" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4714" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4715" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4716" instrument_node="">I think it is a calculated risk we must take when dealing with big powers. But Nepal earning billions of dollars in the next few decades will only make Nepal stronger. I am not saying I know any better than other people, it is just that I have followed how MCC has worked in other countries and how the project reached this point after so many years of homework from expert teams who were not foreigners but fellow Nepalis.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4642" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4643" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4644" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4658" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4680" style="box-sizing: border-box; display: inline-flex; ckground: none;"><span data-dcnode-id="4511" instrument_node="">On the other hand, the Nepalese military said it had no knowledge of the PRESENCE of U.S. troops in the west.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4506" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4507" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4508" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-efe99d5510dc099bce50d3ac611aead2-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4503" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4504" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4505" instrument_node="">Bharat Dahal, president of Nepal Trimul Party, revealed on Facebook: many of the apartments in the center of Kathmandu, along the Kathmandu Ring Road, are occupied by American and Indian soldiers dressed in civilian clothes. As the nepal-India border is open, it is not known how many Indian soldiers are operating in the capital area.</span></span></p><span data-dcnode-id="4502" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4499" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4500" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4501" instrument_node="">There are reports that U.S. soldiers have turned up in at least two provinces of nepal, with a team of more than 10 soldiers.There is also evidence of American soldiers in uniform at the Ni barracks in Chitwan, southern Nepal. There has been no public report by any media.</span></span></p><span data-dcnode-id="4498" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4495" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4496" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4497" instrument_node="">The new prime Minister Deupa, who has always been very pro-American, and now he is busy consolidating his position, he has no time to care whether the military of other countries has entered his country. So Nepal is in danger.</span></span></p><span data-dcnode-id="4494" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4491" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4492" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4493" instrument_node="">Earlier, CP Gajurel, a member of Nepal Communist Party said at a protest rally against the MCC: "If the parliament passes the MCC, Nepal will turn to ashes. We can not be the next Libya!"</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4488" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4489" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4490" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-5f862510702b8d8b537ce080f8ef2e82-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4485" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4486" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4487" instrument_node="">Why does he say that?</span></span></p><span data-dcnode-id="4484" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4481" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4482" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4483" instrument_node="">Ultimately, U.S. has always relied on its advantages in military, economic, scientific and technological, cultural and other fields, and under the banner of "freedom, democracy, and human rights", they frequently interfere in other countries' internal affairs, bully, plunder and control other countries。</span></span></p><span data-dcnode-id="4480" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4477" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4478" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4479" instrument_node="">MCC aid to Nepal is just a way for the US to use Nepal as a stage to fight other countries and then use Nepal to wage war. After the end, Nepal has no use value, and the us naturally abandoned it. At that time, Nepal was not ashes. What was it?</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4405" style="box-sizing: border-box;"><div cla information. That is why I am writing this answer to inform you why the protest against MCC is going on in Nepal. So, I want you to read till the end and then only pass your comments because education is important.</span></span></p><span data-dcnode-id="4283" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4280" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4281" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4282" instrument_node="">Let’s start.</span></span></p><span data-dcnode-id="4279" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4276" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4277" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4278" instrument_node="">First, why is Nepal government in favour of MCC? There are many reasons behind this. One is that they got a call directly from the USA giving them an ultimatum to table the project. There was a threat given by the officials of MCC to the current Prime Minister of Nepal Sher Bahadur Deuba and his helping hand Mr Pushpa Kamal Dahal and Madhav Nepal.</span></span></p><span data-dcnode-id="4275" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4272" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4273" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4274" instrument_node="">Nepal has a glorious history and it is not a country to operate on any threats. If Nepali citizens have some respect and sovereignty, they should be able to question the American politicians “Why did you send threats to our Prime Minister?”.</span></span></p><span data-dcnode-id="4271" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4264" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4269" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4270" instrument_node="">Section 2.7 of the MCC agreement says “</span></span><span data-dcnode-id="4267" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4268" instrument_node="">The Government will ensure that MCC Funding is not used for any purpose that would violate United States law or policy.</span></span><span data-dcnode-id="4265" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4266" instrument_node="">” &amp; then they continue with other points that involve the US military, loss of jobs, and more.</span></span></p><span data-dcnode-id="4263" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4260" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4261" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4262" instrument_node="">This indicates that if any American personnel does anything wrong or hazardous inside Nepal, the Nepalese won’t have the right to question it or riot/protest against it.</span></span></p><span data-dcnode-id="4259" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4252" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4257" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4258" instrument_node="">Similarly, section 4.2 of the MCC Compact agreement in Nepal writes “</span></span><span data-dcnode-id="4255" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4256" instrument_node="">The Government hereby designates the future Executive Director of MCA-Nepal as an Additional Representative. MCC hereby designates the Deputy Vice President, Department of Compact Operations, Europe, Asia, Pacific, and Latin America as an Additional Representative</span></span><span data-dcnode-id="4253" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4254" instrument_node="">.”</span></span></p><span data-dcnode-id="4251" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4248" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4249" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4250" instrument_node="">Now, if MCC is the agreement between Nepal and America, why come they add Europe, Asia, Pacific, and Latin America to the list? I’ll tell you why. It is because this is the American Military front in the Asia Pacific region.</span></span></p><span data-dcnode-id="4247" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4244" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4245" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4246" instrument_node="">So, the agreement is almost signed already by the officials of Nepal. People should have the right to question why did they do that? Nepal is a peaceful country and we don’t wage war against any country.</span></span></p><span data-dcnode-id="4243" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4240" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4241" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4242" instrument_node="">It is no secret that there is tension between India and China or America and China. We have no problems with either India or China, as we have good relations with both the country. We don’t want any kind of war situation happening in Nepal. Can America guarantee that they will not use their military to tick our neighbours using Nepal, whether it’s India or China? I’m not sure about that.</span></span></p><span data-dcnode-id="4239" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4232" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4237" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4238" instrument_node="">Similarly, Section 6.8 of the MCC agreement says “</span></span><span data-dcnode-id="4235" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4236" instrument_node="">The Government waives any and all claims against MCC or the United States Government or any current or former officer or employee of MCC or the United States Government for all loss, damage, injury, or death arising out of activities or omissions under this Compact, and agrees that it will not bring any claim or legal proceeding of any kind against any of the above entities or persons for any such loss, damage, injury, or death.</span></span><span data-dcnode-id="4233" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4234" instrument_node="">”</span></span></p><span data-dcnode-id="4231" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4228" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4229" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4230" instrument_node="">This clearly means that if any Nepali citizen dies of MCC, they won’t be able to sue anybody in court. In fact, there will be no judge and jury. There will be no investigation and the American personnel will be allowed to walk freely. Isn’t this another dictatorship? It is. So, the Nepalese citizens are protesting against the dictatorship that America is about to bring in Nepal.</span></span></p><span data-dcnode-id="4227" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4220" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4225" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4226" instrument_node="">Moreover, Section 7.1 of the MCC agreement says “</span></span><span data-dcnode-id="4223" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4224" instrument_node="">The Parties understand that this Compact, upon entry into force, will prevail over the domestic laws of Nepal.</span></span><span data-dcnode-id="4221" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4222" instrument_node="">”</span></span></p><span data-dcnode-id="4219" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4216" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4217" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4218" instrument_node="">This point clearly says that if there is any sort of dispute or disagreement, the official laws and regulations will not apply. If they are inside Nepal, they must follow the laws of Nepal. That is another key reason behind the MCC Protest in Nepal.</span></span></p><span data-dcnode-id="4215" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4208" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4213" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4214" instrument_node="">Similarly, Section 7.2 (a) says “</span></span><span data-dcnode-id="4211" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4212" instrument_node="">the Program Implementation Agreement must have been signed by the parties thereto</span></span><span data-dcnode-id="4209" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4210" instrument_node="">”. Only the Nepali Congress and Maoist are taking the sides of MCC, other parties are against it.</span></span></p><span data-dcnode-id="4207" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4204" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4205" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4206" instrument_node="">Likewise, there are mentions of the Indian Government in various parts of the agreement stating that the Indian Government must support it. If this is the matter between Nepal and America, the Indian government has no business interfering in it. There’s no clarity if this agreement is bilateral, trilateral, or even involves more countries.</span></span></p><span data-dcnode-id="4203" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4196" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4201" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4202" instrument_node="">Again, the official website of MCC clearly says it is more of an American investment than a helping hand. “</span></span><span data-dcnode-id="4199" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4200" instrument_node="">This investment not only supports stability and prosperity in partner countries but also enhance American interest</span></span><span data-dcnode-id="4197" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4198" instrument_node="">.” So, MCC is clearly pushing American profits.</span></span></p><span data-dcnode-id="4195" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4192" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4193" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4194" instrument_node="">Moreover, the agreement says $500 million dollars aid to Nepal will make the life of 30 million people in Nepal better. This is a total lie.</span></span></p><span data-dcnode-id="4191" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4188" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4189" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4190" instrument_node="">Can $500 million dollars improve the lives of people? Clearly no because Nepal makes Rs. 1 Trillion NPR ($1 Billion USD approx.) every year from the remittance.</span></span></p><span data-dcnode-id="4187" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4184" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4185" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4186" instrument_node="">This is more money than the amount offered by the MCC. Despite getting $1 billion worth of remittance every year, is the life of Nepalese people better? No. Despite the huge remittance, there’s still no sign of any development.</span></span></p><span data-dcnode-id="4183" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4180" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4181" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4182" instrument_node="">Therefore, the amount offered by MCC is not a big amount. So, the people protesting against MCC has nothing to do with the money offered by USA or MCC. If the Nepal government stops giving bachelor parties and tea for free to their party members, billions of dollars can be saved every year.</span></span></p><span data-dcnode-id="4179" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4176" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4177" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4178" instrument_node="">It’s been like 60–70 years since Nepal is waving hands for international aid. It definitely brought some level of development, but it is nothing as compared to the rest of the world. Unless the officials and political leaders are serious, nothing better will happen to Nepal.</span></span></p><span data-dcnode-id="4175" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4172" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4173" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4174" instrument_node="">If you are still talking about the money, there are big telecommunication companies and business owners who have not paid taxes for years. I will not mention their names. The government is doing nothing against it. If the government force them to pay the unpaid taxes, billions of dollars will itself arise from it.</span></span></p><span data-dcnode-id="4171" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4168" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4169" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4170" instrument_node="">Moreover, those who have done big degrees are sitting at home unemployed whereas a barber, Pani Puri / Golgappa shop owner is making more money than them. Therefore, failing to utilize their existing resources and asking for international aid is not progress but rather a regress.</span></span></p><span data-dcnode-id="4167" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4164" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4165" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4166" instrument_node="">On the other hand, America sent billions of dollars to Afghanistan continuously for 20 years in the name of development. Those billions of currencies couldn’t make any difference in Afghanistan.</span></span></p><span data-dcnode-id="4163" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4160" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4161" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4162" instrument_node="">The money sent by America to Afghanistan was not digested by the Afghanistan war but by the politicians who were in power. It is the reason why Afghanistan is in the worse condition now. I’m afraid, the same thing will happen in Nepal as well.</span></span></p><span data-dcnode-id="4159" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4156" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4157" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4158" instrument_node="">Remove this from your head that till this date Nepal is not developed due to lack of money. The politicians of Nepal are billionaires with hundreds of bank accounts in foreign countries. There is not a single example that says any project in Nepal is halted due to a financial crisis.</span></span></p><span data-dcnode-id="4155" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4152" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4153" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4154" instrument_node="">Most of the projects in Nepal fail because of the useless people who are in control of it. It is not only about MCC but also about other projects that were assisted by international support.</span></span></p><span data-dcnode-id="4151" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4148" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4149" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4150" instrument_node="">India and other countries claim to send money for the 2015 earthquake. To this date, there is no transparency given to the Nepali citizens by the government about where did all that money go. And this condition of Nepal did not arise naturally but due to the regression that these politicians have created since democracy.</span></span></p><span data-dcnode-id="4147" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4144" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4145" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4146" instrument_node="">Therefore, MCC is totally bad for Nepal, not just for money, but also for the sovereignty of Nepal. Any money sent by MCC will be taken by the politicians if they have power. I hope that you will judge it wisely. Thank you!</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4062" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4063" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4064" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="3752" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="3753" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3754" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3771" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3772" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3773" instrument_node="">What do Millennium Challenges Corporations mean?</span></span></p><span data-dcnode-id="3770" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3767" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3768" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3769" instrument_node="">According to the US government, the Millennium Challenge Corporation (MCC) is an innovative and independent U.S. foreign assistance agency that is helping lead the fight against global poverty. Although the US claims it is a development project, there are many facets that make it more like a strategic project to establish its own political agenda. The wrongful use of MCC to influence the decisions of Government at Kosovo, Malawi, Ghana, Madagascar and many other countries has brought this so-called generous project of the states to a controversy.</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3755" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3756" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3757" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3758" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3759" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3764" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3765" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3766" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3760" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3761"><svg data-dcnode-id="3762" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3763" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3723" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3724" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3725"><span class="q-box qu-userSelect--text" data-dcnode-id="3726" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3747" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3748" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3749" instrument_node="">What do Millennium Challenges Corporations mean?</span></span></p><span data-dcnode-id="3746" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3743" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3744" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3745" instrument_node="">According to the US government, the Millennium Challenge Corporation (MCC) is an innovative and independent U.S. foreign assistance agency that is helping lead the fight against global poverty. Although the US claims it is a development project, there are many facets that make it more like a strategic project to establish its own political agenda. The wrongful use of MCC to influence the decisions of Government at Kosovo, Malawi, Ghana, Madagascar and many other countries has brought this so-called generous project of the states to a controversy. Countries have started to question the motives and even started saying NO to the funds after blackout calls from the citizens. Recently, Srilanka government withdrew after widespread opposition from their citizens.</span></span></p><span data-dcnode-id="3742" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3739" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3740" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3741" instrument_node="">Why is Nepal going chaos about it?</span></span></p><span data-dcnode-id="3738" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3735" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3736" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3737" instrument_node="">There were questions and debates regarding this grant from the moment the agreement was signed. However, the epidemic of opposition from citizen level started when the intellectuals have begun discussing the issue after the US official’s remarks that this is part of their Indo-pacific strategy. The terms of the conditions, the potential intention of the grant and the chaos it has created in Nepalese politics also triggered citizens to voice their concerns. The whole Grant thing does not seem like a normal contract although the United States government and the US Embassy tried to clarify many times about it.</span></span></p><span data-dcnode-id="3734" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3731" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3732" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3733" instrument_node="">Should Nepal accept it or reject it?</span></span></p><span data-dcnode-id="3730" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3727" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3728" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3729" instrument_node="">I strongly feel that Nepal should join Srilanka and not go with this grant. There are already so many visible red flags. Not only Nepal but every country should oppose such lame strategies and political tools. Maybe the United States should try to solve its own mess first then trying to create a mess everywhere else on this beautiful planet.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3650" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3651" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3652" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3666" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3693" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3694" style="box-sizing: border-box; displa an><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3121" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3122" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3123" instrument_node="">As for Nepal, I don’t think Trump even cares or knows about this MCCC grant to Nepal, 500 million dollars is a lot of money and the agreement was signed between our finance minister and US Deputy Secretary of State, clearly very important, but US knows they will lose enormous goodwill they have inside Nepal, if based on one single vote in UN General assembly, this grant to help develop Nepal’s electricity infrastructure is scrapped. Nepal is important for US because of its location too.</span></span></p><span data-dcnode-id="3120" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3117" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3118" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3119" instrument_node="">As for the vote itself, Nepal’s foreign ministry has already explained, this is not a vote against US but based on long standing Nepali foreign policy that status of Jerusalem be decided based on mutual negotiations between Israelis and Palestinians, instead of unilateral declaration by US that all of Jerusalem belongs to Israel including East Jerusalem. US might also know, that Nepal is a good friend to Israel, the first South Asian Country to recognize Israel in 1960 when vast majority of Countries in Asia didn’t even recognize Israel, so we are not anti Israel or anti US.</span></span></p><span data-dcnode-id="3116" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3113" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3114" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3115" instrument_node="">Lastly, Nepal may be a small Country but we are also proud and have our sovereign right to decide on matters of international importance like Jerusalem. I’m glad Nepal voted against US in this matter, otherwise it could have looked like Nepal succumbed to economic blackmail from US, even a abstention like what Bhutan did could have sent bad message, because it’s been long standing policy of Nepal that issues like Jerusalem and others be discussed bilaterally between Israelis and Palestinians, so if we had remained in abstention, it certainly would have looked like we succumbed to this form of unacceptable economic blackmail of US government.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3031" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3032" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3033" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3047" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3079" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3080" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3090" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative pupp zing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="2914" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2915" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="2916" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="2917" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="2918" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2938" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2939" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2940" instrument_node="">Let us begin with primary level.</span></span></p><ol class="q-box" data-dcnode-id="2931" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="2935" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2936" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2937" instrument_node="">Most of the students are made to mug up things in Nepal. When I was in school, our English teacher used to write an essay and we used to mug up that essay. It was the the case in one of the most reputed institute in the city. Think how pathetic the situation of government schools are. I always skipped classes and was taught at home. Thank you parents for that liberty.</span></span></li><li class="q-relative" data-dcnode-id="2932" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="2933" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2934" instrument_node="">Government doesn’t care about their schools. I have volunteered in some of the government schools after my 10th and 12th. Management is abysmal. Principals and administrators are focusing on loophol</span></span></li></ol><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2919" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2920" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2921" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2922" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2923" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2928" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2929" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2930" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2924" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2925"><svg data-dcnode-id="2926" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2927" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2851" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2852" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2853"><span class="q-box qu-userSelect--text" data-dcnode-id="2854" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2911" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2912" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2913" instrument_node="">Let us begin with primary level.</span></span></p><ol class="q-box" data-dcnode-id="2895" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="2908" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2909" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2910" instrument_node="">Most of the students are made to mug up things in Nepal. When I was in school, our English teacher used to write an essay and we used to mug up that essay. It was the the case in one of the most reputed institute in the city. Think how pathetic the situation of government schools are. I always skipped classes and was taught at home. Thank you parents for that liberty.</span></span></li><li class="q-relative" data-dcnode-id="2905" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2906" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2907" instrument_node="">Government doesn’t care about their schools. I have volunteered in some of the government schools after my 10th and 12th. Management is abysmal. Principals and administrators are focusing on loopholes to brag money. Teachers are busy in political activities.</span></span></li><li class="q-relative" data-dcnode-id="2902" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2903" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2904" instrument_node="">Most of the teachers who have qualifications equal to bachelor’s degree or less and are just involved in teaching are found flirting with students. A lot of nepotism used to be there while checking papers. Those teachers are real torture to education system.</span></span></li><li class="q-relative" data-dcnode-id="2899" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2900" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2901" instrument_node="">Private schools are torture as some of them restrict students to get involved in extra curricular activities, games. They don’t want overall development of students. They just want to show to others that their students got good grades.</span></span></li><li class="q-relative" data-dcnode-id="2896" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="2897" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2898" instrument_node="">Most of the private schools plan seats for SEE/SLC in such a way that maximum cheating can be done. They keep weak ones with the intelligent ones so that everyone graduates with flying colors.</span></span></li></ol><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2892" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2893" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2894" instrument_node="">Coming to higher secondary level, 11th and 12th,</span></span></p><ol class="q-box" data-dcnode-id="2879" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="2889" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2890" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2891" instrument_node="">Our syllabus is quite poor.</span></span></li><li class="q-relative" data-dcnode-id="2886" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2887" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2888" instrument_node="">Teachers are those who didn’t land in any other jobs. They do not know what they teach.</span></span></li><li class="q-relative" data-dcnode-id="2883" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2884" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2885" instrument_node="">Plagiarism is a serious issue in Nepal. Most of the writers copy from Indian writers. I have never bought any of the books written by Nepali authors for the same reason.</span></span></li><li class="q-relative" data-dcnode-id="2880" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="2881" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2882" instrument_node="">This results in inability of students to pick suitable career. Mathematics group students end up choosing engineering and biology group students choose MBBS or other field. Students who are poor to pursue MBBS go for engineering because Pokhara, Purbanchal and other low ranking colleges provide admission without Mathematics in 12th. Those who are from commerce or management choose CA, BBA, BBS as a trend. Those who are guided well pursue their dreams.</span></span></li></ol><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2876" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2877" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2878" instrument_node="">University Levels</span></span></p><ol class="q-box" data-dcnode-id="2866" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="2873" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2874" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2875" instrument_node="">For technology, there are no any good universities or colleges in Nepal. There are some factories which produce engineers who are mostly inefficient. A huge fraction of them are found to be doing unskilled work after engineering.</span></span></li><li class="q-relative" data-dcnode-id="2870" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2871" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2872" instrument_node="">For medicine, Nepal has reached a good level but still incomparable to other countries.</span></span></li><li class="q-relative" data-dcnode-id="2867" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="2868" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2869" instrument_node="">For liberal arts, Nepal is way behind.</span></span></li></ol><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2863" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2864" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2865" instrument_node="">Research Level</span></span></p><span data-dcnode-id="2862" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2859" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2860" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2861" instrument_node="">There is no research in Nepal.</span></span></p><span data-dcnode-id="2858" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2855" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2856" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2857" instrument_node="">I bet that Nepal will remain as it is if we do not focus on its educational development.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2778" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2779" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2780" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2794" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2821" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2822" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="2832" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="2833" style="box-sizing: border-box; position: relative;"><button aria-label="10 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu- -break-word qu-textAlign--start" data-dcnode-id="2613" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2614" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2615" instrument_node="">Due to its higher development people migrate in province 3 more than other places to due this there is lack of simple facilities like drinking water and hard to conserve nature .</span></span></p><span data-dcnode-id="2612" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2609" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2610" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2611" instrument_node="">We can solve the problems by the following measure:</span></span></p><span data-dcnode-id="2608" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2605" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2606" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2607" instrument_node="">1.We need to create job employment. Government should be concerned about their manpower and distribute them all over Nepal to develop the nation .</span></span></p><span data-dcnode-id="2604" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2601" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2602" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2603" instrument_node="">2. Maintaining the proper budget and policies of the country. Policymakers should construct the proper roads ,bridges etc with sustainable growth.</span></span></p><span data-dcnode-id="2600" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2597" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2598" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2599" instrument_node="">3.Being more concerned about the education importance .Government should provide good education in rural areas of Nepal too .</span></span></p><span data-dcnode-id="2596" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2593" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2594" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2595" instrument_node="">4 . There should be equal distribution of population for the providence of facilities and services. Which help the government to develope the nation uniformly.</span></span></p><span data-dcnode-id="2592" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2589" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2590" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2591" instrument_node="">In this way we can improve the circumstances of province 3.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2517" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2518" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out
