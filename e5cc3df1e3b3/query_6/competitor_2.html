 op</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2232" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2233" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2234" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2235" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2236" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2241" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2242" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2243" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2237" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2238"><svg data-dcnode-id="2239" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2240" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2189" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2190" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2191"><span class="q-box qu-userSelect--text" data-dcnode-id="2192" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2224" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2225" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2226" instrument_node="">Nepal under pressure from the United States has fallen into the abyss of social unrest</span></span></p><span data-dcnode-id="2223" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2220" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2221" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2222" instrument_node="">On February 20, 2022, the Nepalese government has submitted a US$500 million aid allocation from the United States to parliament for approval, sparking a new round of violent clashes between protesters and police outside parliament.</span></span></p><span data-dcnode-id="2219" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2216" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2217" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2218" instrument_node="">Hundreds of demonstrators tried to rush through the barbed wire barricades to express their dissatisfaction and disapproval, and threw stones at riot police, who were then dispersed by Nepalese police with tear gas and water cannons, and beaten with bamboo sticks. The people who oppose the MCC insist that the essence of the MCC agreement is a "traitorous agreement" and an "unequal treaty", which does not comply with Nepalese law and directly threatens Nepal's sovereignty. Moreover, the MCC agreement is actually a plan of the "Indo-Pacific strategy" concocted by the United States, and Nepal cannot be reduced to a tool of the United States.</span></span></p><span data-dcnode-id="2215" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2212" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2213" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2214" instrument_node="">On the same day, the Nepalese government submitted the controversial MCC agreement signed with the US government in 2017 to the House of Representatives for final confirmation through the legislative process.</span></span></p><span data-dcnode-id="2211" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2208" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2209" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2210" instrument_node="">The agreement was presented by Gyanendra Bahadur Karki, Nigerian government spokesman and minister of communications and information, at the House of Representatives meeting. The MCC agreement was signed in 2017 when Karki was the finance minister of Nepal.</span></span></p><span data-dcnode-id="2207" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2204" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2205" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2206" instrument_node="">However, the Communist Party of Nepal (Maoist center) in the ruling party coalition has been divided over the agreement, repeatedly stressed repeatedly against the conditions in the grant agreement, saying it would override Nepal's laws and threaten Nepal's sovereignty. The MCC agreement was not passed on the agenda of the day, and the Speaker of the House of Representatives Agni Prasad Sapkota announced that the meeting would be postponed to February 24.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="2200" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="2201"><div class="q-box unzoomed" data-dcnode-id="2202" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="2203" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-9cc6a94f09dc7b07c1f4b3b48fe1f02d-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2197" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2198" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2199" instrument_node="">This time, the Nepalese government ignored the protests and objections of the opponents and the people and forcibly submitted the MCC agreement to the parliament for discussion. It should have been pressured by the United States and forced to make a statement before the "last moment". This is the first time the US has sent such a strongly worded message to Nepal since Nepal and the US established diplomatic relations in 1947.</span></span></p><span data-dcnode-id="2196" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2193" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2194" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2195" instrument_node="">The MCC has always been controversial. In fact, consensus can be reached through democratic procedures and national discussions to find a solution that best serves the national interests of Nepal--However, under the extreme pressure of external forces, the contradiction has been intensified, and Nepal is falling into the abyss of social unrest.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2116" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2117" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-functio asked our political leaders and government emergency approval for its Nepal contract, So that Nepal could obtain the "benefits" that the implementation of the compact might bring to the country.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1980" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1981" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1982" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-d8c0df0822b73b21c91c41c55cbe07ad-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1975" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1978" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1979" instrument_node="">The MILLENNIUM Challenge Corporation is a U.S. government foreign aid agency established by Congress. Ostensibly designed to fight global poverty by supporting economic growth, the agency has made agreements that go beyond our national sovereignty, such as giving priority to its project staff and not even being managed by our government. </span></span><span data-dcnode-id="1976" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1977" instrument_node="">Clearly the agreement is "unequal" and is a tool for the US to maintain its influence in the Asia-Pacific region.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1972" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1973" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1974" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-19c035ab4c3347e7481d67ae41c475bf-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1967" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1970" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1971" instrument_node="">Similarly, Sri Lanka is also considered key to the U.S. government's plans in addition to ours. However, the United States wants to give aid to Sri Lanka, but they have been "blocked". </span></span><span data-dcnode-id="1968" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1969" instrument_node="">On 1 November 2020, the Sri Lankan government officially announced that it would never sign the MILLENNIUM Challenge Corporation (MCC) aid agreement.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1964" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1965" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1966" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-42ef9b34709d46fa61a349978273858b-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu ht: normal; font-style: normal; background: none;"><span data-dcnode-id="1955" instrument_node="">If we don't refuse to sign this "friendly" agreement in time, we'll end up with an enemy. </span></span><span data-dcnode-id="1952" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1953" instrument_node="">We cannot be infiltrated by the hegemony of the Jackals and tigers, nor can our sovereignty and dignity be trampled upon. The territory under the administration of the United States has already surpassed that of North America. We must expose the United States' unilateralism in all aspects, its habit of "pointing fingers" at the highest point and its plot to build a "unipolar world".</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1879" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1880" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1881" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1895" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1917" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1918" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1928" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1929" style="box-sizing: border-box; position: relative;"><button aria-label="2 upvotes" class="q-click-wrapper Click ta-dcnode-id="1809" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="1810" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="1811" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="1812" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="1813" style="box-sizing: border-box;"><span data-dcnode-id="1814" style="background: none;"><span data-dcnode-id="1815" instrument_node="">How has India helped Nepal?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="1724" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="1725" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="1726" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="1801" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="1727" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="1777" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="1778" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="1779" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="1780" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="1781" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1798" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1799" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1800" instrument_node="">As part of the Nation’s overall relief effort for Nepal, IA has launched Operation Maitri. Soon after the devastating earthquake, Gen Dalbir Singh, COAS, who besides himself being an officer of the Gurkha Rifles Regiment is also the Honorary Chief of the Nepalese Army, spoke to his counterpart, General SJB Rana, Chief of the Nepalese Army. Gen Dalbir Singh immediately detailed two senior officers to proceed to Kathmandu and coordinate IA’s relief efforts in synergy and hand in hand with Nepalese Army. They are presently carrying out reconnaissance of affected areas and road conditions. </span></span></p><span data-dcnode-id="1797" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1794" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1795" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1796" instrument_node="">A Multi</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1782" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1783" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1784" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1785" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1786" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1791" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1792" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1793" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1787" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1788"><svg data-dcnode-id="1789" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1790" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1728" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1729" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1730"><span class="q-box qu-userSelect--text" data-dcnode-id="1731" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1774" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1775" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1776" instrument_node="">As part of the Nation’s overall relief effort for Nepal, IA has launched Operation Maitri. Soon after the devastating earthquake, Gen Dalbir Singh, COAS, who besides himself being an officer of the Gurkha Rifles Regiment is also the Honorary Chief of the Nepalese Army, spoke to his counterpart, General SJB Rana, Chief of the Nepalese Army. Gen Dalbir Singh immediately detailed two senior officers to proceed to Kathmandu and coordinate IA’s relief efforts in synergy and hand in hand with Nepalese Army. They are presently carrying out reconnaissance of affected areas and road conditions. </span></span></p><span data-dcnode-id="1773" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1770" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1771" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1772" instrument_node="">A Multi National Coordination Centre has been set up. In addition, in PPO Pokhra, Head quarters are being established for relief operations.</span></span></p><span data-dcnode-id="1769" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1766" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1767" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1768" instrument_node="">The following resources have been allocated so far as part of Operation Maitri, in support of the Nepalese Army’s relief effort:-</span></span></p><span data-dcnode-id="1765" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1762" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1763" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1764" instrument_node="">(a) 18 Medical Teams earmarked. Six Medical Teams have reached and have been deployed while the rest are on standby.</span></span></p><span data-dcnode-id="1761" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1758" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1759" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1760" instrument_node="">(b) 10 Engineer Task Forces(ETFs) consisting of manpower, skid steers and JCBs (One partial ETF has landed with stores. Balance are on standby in India).</span></span></p><span data-dcnode-id="1757" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1754" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1755" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1756" instrument_node="">(c) 10,000 blankets and 1,000 tents are on standby.</span></span></p><span data-dcnode-id="1753" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1750" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1751" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1752" instrument_node="">(d) 10 INMARSATs for satellite communications have reached Nepal.</span></span></p><span data-dcnode-id="1749" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1746" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1747" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1748" instrument_node="">Aviation assets of five ALH helicopters and two Cheetah helicopters have been staged forward to Gorakhpur. Further, taking cognizance of the request of the Nepalese Government for Oxygen on account of problems in the Kathmandu Oxygen plant, additional cylinders are being dispatched (300 located at Bengdubi for dispatch to Nepal).</span></span></p><span data-dcnode-id="1745" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1740" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1741" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1744" instrument_node="">Indian Army Everest Expedition was training at Base Camp when the Earthquake struck. Their equipment was buried in the avalanche, however the team is safe and help ent_node="">Website ….. </span></span><span class="q-inline" data-dcnode-id="1294" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mcc.gov/" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.mcc.gov"><span data-dcnode-id="1300" instrument_node="">www.mcc.gov</span></a><span class="q-inlineBlock" data-dcnode-id="1295" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1296"><svg data-dcnode-id="1297" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1298" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="1292" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1289" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1290" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1291" instrument_node="">Partner countries as of May 2011. Countries in green have active compacts; countries in orange have active threshold compacts.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1285" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="1286"><div class="q-box unzoomed" data-dcnode-id="1287" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="1288" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-77923e639cbdb3e0e913689818d6f0ff-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1282" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1283" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1284" instrument_node="">MCC was authorized in 2004 with bipartisan support. Its guiding principles are:</span></span></p><ul class="q-box" data-dcnode-id="1260" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="1279" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1280" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1281" instrument_node="">Competitive selection: Before a country can become eligible to receive assistance, MCC's Board examines its performance on 17 independent and transparent policy indicators and selects compact-eligible countries based on policy performance.</span></span></li><li class="q-relative" data-dcnode-id="1276" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1277" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1278" instrument_node="">Country-led solutions: MCC requires selected countries to identify their priorities for achieving sustainable economic growth and poverty reduction. Countries develop their MCC proposals in broad consultation within their society. MCC teams then work in close partnership to help countries refine a program.</span></span></li><li class="q-relative" data-dcnode-id="1261" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="1274" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1275" instrument_node="">Country-led implementation: MCC administers the </span></span><span data-dcnode-id="1272" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1273" instrument_node="">M</span></span><span data-dcnode-id="1270" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1271" instrument_node="">illennium </span></span><span data-dcnode-id="1268" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1269" instrument_node="">C</span></span><span data-dcnode-id="1266" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1267" instrument_node="">hallenge</span></span><span data-dcnode-id="1264" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1265" instrument_node=""> A</span></span><span data-dcnode-id="1262" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1263" instrument_node="">ccount (MCA). When a country is awarded a compact, it sets up its own local MCA accountable entity to manage and oversee all aspects of implementation. Monitoring of funds is rigorous and transparent, often through independent fiscal agents.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1257" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1258" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="1259" instrument_node="">“Why is it bad for the third world countries?”</span></span></p><span data-dcnode-id="1256" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1253" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1254" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1255" instrument_node="">It’s not … It helps countries.</span></span></p><span data-dcnode-id="1252" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1242" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1250" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1251" instrument_node="">For more information visit the MCC website listed above or </span></span><span class="q-inline" data-dcnode-id="1243" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Millennium_Challenge_Corporation" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="1249" instrument_node="">Millennium Challenge Corporation - Wikipedia</span></a><span class="q-inlineBlock" data-dcnode-id="1244" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponen o "arrest MCC opponents". </span></span><span data-dcnode-id="1043" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1044" instrument_node="">According to the sources, Deuba 's move was is to give the MCC treaty into Nepal escort.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1039" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1040" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1041" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-49b942fb22ce3090ed68f7142d2bdb75-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><span data-dcnode-id="1038" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="1035" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1036" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1037" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-73cda9024b9ac4019a9b971b7f6d2bc8-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1032" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1033" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1034" instrument_node="">As you all know, Deuba was born five times and was seen as Pro-india PRIME Minister. Unbeknownst to everyone, Deupa actually had better relations with the US.</span></span></p><span data-dcnode-id="1031" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1028" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1029" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1030" instrument_node="">During the 2017 elections, the Nepali Congress did not have a clear agenda as such.</span></span></p><span data-dcnode-id="1027" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1015" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1025" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1026" instrument_node="">Congress President Sher Bahadur Deuba mostly spent his time vilifying the communist alliance of the CPN-UML and the Communist Party of Nepal (Maoist Centre). One of the common refrains he made from the hustings was—if communists were voted to power, people </span></span><span class="q-inline" data-dcnode-id="1018" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehimalayantimes.com/nepal/economic-prosperity-possible-democracy-pm-deuba" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="thehimalayantimes.com"><span data-dcnode-id="1024" instrument_node="">may not even get a chance to cry</span></a><span class="q-inlineBlock" data-dcnode-id="1019" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1020"><svg data-dcnode-id="1021" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1022" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1016" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1017" instrument_node=""> properly, indicating at the possible threat that citizens’ rights would be heavily curtailed.</span></span></p><span data-dcnode-id="1014" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1011" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1012" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1013" instrument_node="">But recently, because of the MCC, thousands of protesters marched through the country,the Deupa government issued nearly a dozen measures within a week that came close to the gag order, and ordered arrest MCC opponents who participated in the parade, and ostensibly for people travel good.</span></span></p><span data-dcnode-id="1010" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="989" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1008" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1009" instrument_node="">On Friday also, the Home </span></span><span class="q-inline" data-dcnode-id="1001" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moha.gov.np/post/va-ja-niapa-ta-33" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.moha.gov.np"><span data-dcnode-id="1007" instrument_node="">Ministry in a statement warned</span></a><span class="q-inlineBlock" data-dcnode-id="1002" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1003"><svg data-dcnode-id="1004" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1005" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="999" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1000" instrument_node=""> people against making any negative comments about development projects supported by friendly nations, employees working in such projects, foreign nationals and their properties. The statement came just as controversy over the Millennium Challenge Corporation (MCC) Nepal compact grew: The MCC compact is an American programme, which </span></span><span class="q-inline" data-dcnode-id="992" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mcc.gov/news-and-events/release/release-091417-nepal-signing-event" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.mcc.gov"><span data-dcnode-id="998" instrument_node="">was signed by Nepal</span></a><span class="q-inlineBlock" data-dcnode-id="993" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="994"><svg data-dcnode-id="995" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="996" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="990" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="991" instrument_node=""> and the United States in 2017, under which Nepal would receive $500 million in grants to be used in the electricity transmission and road projects.</span></span></p><span data-dcnode-id="988" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="985" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="986" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="987" instrument_node="">It is clear that the Deuba government has resorted to threatening the people to cover up the fact that Deuba is American stooges and American forces have fully infiltrated Nepal's political life .</span></span></p><span data-dcnode-id="984" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="981" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="982" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="983" instrument_node="">Nepal is sovereign state, we cherish our independence and sovereignty and we can't let some greedy leaders wantonly sell our country! We can't let our national sovereignty and dignity be trampled on. We don't want to be the next Syria! Oppose signing the MCC treaty! Oppose hegemonic forces!</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="909" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="910" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="911" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="925" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="947" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="948" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="958" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="959" style="box-sizing: border-box; position: relative;"><button aria-label=" ion--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="810" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="811" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="816" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="817" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="818" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="812" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="813"><svg data-dcnode-id="814" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="815" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="723" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="724" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="725"><span class="q-box qu-userSelect--text" data-dcnode-id="726" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="799" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="800" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="801" instrument_node="">During the recently concluded Standing Committee meeting of the ruling Nepal Communist Party, leaders appeared sharply divided over whether the federal parliament should ratify the United States’ Millennium Challenge Corporation’s Nepal Compact. A section of party leaders strongly stood against parliamentary ratification of the compact, arguing that the MCC is part of Washington’s Indo-Pacific Strategy, which has military components that are aimed at countering China, a friendly neighbour. They have opposed the compact’s requirement of House approval, as the compact says that it would prevail over Nepal’s existing laws in case of conflicts.</span></span></p><span data-dcnode-id="798" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="795" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="796" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="797" instrument_node="">However, another section of the ruling party, led by Prime Minister KP Sharma Oli, has lobbied in favour for the compact and wants the ongoing session of the House of Representatives to ratify it. The primary opposition Nepali Congress too has argued that the agreement be approved without any delay.</span></span></p><span data-dcnode-id="794" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="791" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="792" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="793" instrument_node="">What is the MCC?</span></span></p><span data-dcnode-id="790" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="787" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="788" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="789" instrument_node="">The US Congress, in 2004, approved legislation for the establishment of the MCC as an independent bilateral foreign aid agency. The MCC was formed following dissatisfaction with the US’ other foreign aid programmes, with an objective to reduce poverty through economic growth. Assistance under the MCC is given to low-income and lower-middle-income countries selected through competition. A report by the Congressional Research Centre says that the MCC is based on the premise that economic development cannot succeed unless it is linked to free market policies and democratic principles. Since its inception, the MCC Board has approved 37 compacts worth $13 billion for 29 countries, as of 2019.</span></span></p><span data-dcnode-id="786" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="783" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="784" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="785" instrument_node="">Only countries that demonstrate commitments to good governance have positive development returns and take ownership of the programme are eligible for MCC grants. Any country willing to receive the grant must have 10 of 20 indicators, ranging from proper business conditions for start-ups and environments conducive to child health and civil liberties to the status of political rights and funding for education. The grant is allotted for agriculture and irrigation, education, anti-corruption measures, power and energy, enterprise development, health, transportation, land rights and sanitation, and water supply.</span></span></p><span data-dcnode-id="782" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="779" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="780" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="781" instrument_node="">When was the MCC Nepal compact signed?</span></span></p><span data-dcnode-id="778" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="775" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="776" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="777" instrument_node="">Nepal was the first country in South Asia to qualify for the compact after it met 16 out of the 20 policy indicators. Then joint-secretary Baikuntha Aryal and Jonathan Nash, acting chief executive officer of the MCC, in September 2017 signed an agreement in the presence of then-minister for finance Gyandera Bahadur Karki and US Deputy Secretary of State John J Sullivan in Washington. The US government agreed to provide $500 million in grants while Nepal would put in $130 million for the project that prioritises energy and roadways. This is the largest grant Nepal has ever received.</span></span></p><span data-dcnode-id="774" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="771" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="772" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="773" instrument_node="">As per the deal, the funds will be spent on setting up a 400KV transmission line running 400 kilometres on the Lapsiphedi-Galchhi-Damauli-Sunawal power corridor. The funds will also be used to set up three substations en route to infrastructure that will connect to the cross-border transmission line with India in Rupandehi. Some $130 million under the MCC compact will go towards the maintenance of around 300 kilometres of roads on the East-West Highway.</span></span></p><span data-dcnode-id="770" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="767" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="768" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="769" instrument_node="">What is the dispute all about?</span></span></p><span data-dcnode-id="766" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="763" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="764" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="765" instrument_node="">Finance Minister Yubaraj Khatiwada, in July last year, registered the compact at the federal parliament for ratification. However, it was never presented before the House for approval. Though the dispute has only surfaced recently, a section of the Nepal Communist Party, including its chief whip Dev Gurung, had been lobbying former Speaker Krishna Bahadur Mahara to not prioritise the compact for ratification.</span></span></p><span data-dcnode-id="762" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="759" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="760" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="761" instrument_node="">Oli and his ministers, however, claim that the compact will be ratified by the ongoing winter session of Parliament. In an interview with Kantipur daily, the Post’s sister publication, on October 19, Oli had blamed Mahara for delaying the ratification process.</span></span></p><span data-dcnode-id="758" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="755" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="756" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="757" instrument_node="">There wasn’t much dispute over the compact until David J Ranz, assistant secretary for South Asia at the US State Department, during his Nepal visit in May last year said that the MCC was a crucial part of the Indo-Pacific Strategy. Dissenting leaders within the ruling party have demanded that the government clarify if the MCC is a part of the US strategy. Referring to statements from US officials, politicians have said that Foreign Minister Pradeep Gyawali lied to them when he said, on December 26, that the deal was not a part of the IPS. The Standing Committee meeting of the ruling party last month was unable to decide on ratification following sharp criticism from its members.</span></span></p><span data-dcnode-id="754" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="751" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="752" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="753" instrument_node="">What is the Nepal government’s position?</span></span></p><span data-dcnode-id="750" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="747" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="748" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="749" instrument_node="">Foreign Minister Gyawali has repeatedly denied that the MCC Nepal compact talks about the IPS. He said there was nothing to worry about as the implementation of projects under the MCC would be guided solely by the compact. The Nepali Congress, under whose leadership the compact was first signed, holds the same position. The Congress maintains that the government has to abide by the agreement, which doesn’t talk about the IPS, regardless of what officials, even from the US, say. The Congress has asked the government to prioritise the compact for ratification this House session, extending its cooperation in the process. Opposition leaders have even warned that it would be “suicidal” for Nepal if the House rejects the compact as it would have lasting consequences for the Nepal-US diplomatic relationship. There are several instances of the US partially or fully terminating compacts for various reasons. The compacts for Madagascar and Mali were terminated fully while those in Nicaragua and Honduras were partially withdrawn. In Mali, the termination followed the late-March military coup.</span></span></p><span data-dcnode-id="746" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="743" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="744" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="745" instrument_node="">Is MCC a part of the Indo-Pacific Strategy?</span></span></p><span data-dcnode-id="742" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="739" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="740" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="741" instrument_node="">The Indo-Pacific Strategy Report, published in June last year, says that the strategy broadly envisions linkages between security, governance and economics. Though it doesn’t talk about the MCC, another report that came out two months ago clearly says that support under the compact is a part of the IPS. According to an expert who has worked for the Millenium Challenge Account, the Nepal office of the MCC, Nepal should consider the MCC as an economic part of the IPS. Ratifying the MCC doesn’t necessarily mean being a part of a “military alliance”. Economists suggest that Nepal should accept any economic support and there is no harm for the country in endorsing the MCC. Even Chinese Ambassador to Nepal Hou Yanqi has said that Beijing welcomes any international assistance to Nepal if it is for economic cooperation.</span></span></p><span data-dcnode-id="738" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="735" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="736" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="737" instrument_node="">Why should a foreign assistance programme require parliamentary ratification?</span></span></p><span data-dcnode-id="734" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="731" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="732" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="733" instrument_node="">The MCC compact doesn’t say it needs to be ratified by Nepal’s parliament. However, the text of the agreement says that provisions in the compact will prevail over Nepal’s existing laws in case of conflicts, which requires parliamentary ratification, according to the Nepal Treaty Act. The MCC is the first grant agreement that requires parliamentary approval. However, it is also the largest grant agreement Nepal has ever signed.</span></span></p><span data-dcnode-id="730" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="727" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="728" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="729" instrument_node="">As the grant assistance under the MCC has to be approved by the US Congress, the United States government looks for the same level of commitment from receiving countries. Therefore, most countries ratify the MCC compact through their parliament. However, their agreements don't say the provisions in the compact would prevail over the domestic laws in case of contraction, according to the expert who formerly worked for the MCA.</span></span></p></span></span></div></div></di ont-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="532" instrument_node="">Few major challenges that the e-commerce startup are likely to face in Nepal.</span></span></p><span data-dcnode-id="529" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="526" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="527" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="528" instrument_node="">Traditional Shopping Habit:</span></span></p><span data-dcnode-id="525" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="522" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="523" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="524" instrument_node="">To go to the bazaar, chat with vendors, bargain to the fullest and get things done. Guess what, e-commerce isn’t for them. Ordering something they can’t touch, feel or bargain doesn’t appeal to them despite many of the youngsters love doing so.</span></span></p><span data-dcnode-id="521" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="518" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="519" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="520" instrument_node="">Lack of trust:</span></span></p><span data-dcnode-id="517" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="514" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="515" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="516" instrument_node="">Imagine buying shoes which look awesome in the photo but real douche when delivered, it will certainly not give a good feeling. And once the trust is broken, it takes an awful lot of time to regain it.</span></span></p><span data-dcnode-id="513" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="510" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="511" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="512" instrument_node="">Lack of Investment:</span></span></p><span data-dcnode-id="509" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="506" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="507" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="508" instrument_node="">Unlike in most of the countries, hedge fund and Venture capital fund are very few in Nepal or are non-existent. When it comes to investment in the e-commerce sector it is practically non-existent with some exceptions. Also, the startup culture hasn’t gained much momentum which has resulted in the insolvency of the startup in the e-commerce sector.</span></span></p><span data-dcnode-id="505" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="502" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="503" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="504" instrument_node="">Lack of an effective payment gateway:</span></span></p><span data-dcnode-id="501" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="498" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="499" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="500" instrument_node="">Even though various online payment services like esewa, Khalti, ipay are prevalent in Kathmandu and few cities, they have not been effective since most of the people are still skeptical about them. Also, most of the Nepali still do not possess bank accounts and are ignorant about e-banking.</span></span></p><span data-dcnode-id="497" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="494" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="495" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="496" instrument_node="">Lack of e-commerce friendly rules:</span></span></p><span data-dcnode-id="493" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="490" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="491" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="492" instrument_node="">An e-commerce business based on Nepal cannot open a PayPal account until it has a dollar account abroad. Also, the lengthy bureaucratic process and unstable economic policy of Nepal Rastra Bank are the major hurdles.</span></span></p><span data-dcnode-id="489" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="482" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="487" style="font-weight: normal; font
