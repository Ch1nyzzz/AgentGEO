</span><div class="textwp-box-inside" data-dcnode-id="1650"><span data-dcnode-id="1980" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1940"><span data-dcnode-id="1979" instrument_node="">
</span><div class="entry-header-inside" data-dcnode-id="1942"><span data-dcnode-id="1978" instrument_node="">
</span><div class="textwp-entry-meta-single textwp-entry-meta-single-top" data-dcnode-id="1970"><span class="textwp-entry-meta-single-cats" data-dcnode-id="1971"><i aria-hidden="true" class="far fa-folder-open" data-dcnode-id="1977"></i><span data-dcnode-id="1976" instrument_node="">&nbsp;</span><span class="textwp-sr-only" data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Posted in </span></span><a data-dcnode-id="1972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quezon.ph/category/daily/" rel="category tag"><span data-dcnode-id="1973" instrument_node="">Daily Dose</span></a></span></div><span data-dcnode-id="1969" instrument_node="">
</span><h1 class="post-title entry-title" data-dcnode-id="1966"><a data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quezon.ph/2007/07/18/partyless-democracy-redux/" rel="bookmark"><span data-dcnode-id="1968" instrument_node="">Partyless Democracy redux</span></a></h1><span data-dcnode-id="1965" instrument_node="">
</span><div class="textwp-entry-meta-single" data-dcnode-id="1944"><span data-dcnode-id="1964" instrument_node="">
</span><span class="textwp-entry-meta-single-author" data-dcnode-id="1958"><i aria-hidden="true" class="far fa-user-circle" data-dcnode-id="1963"></i><span data-dcnode-id="1962" instrument_node="">&nbsp;</span><span class="author vcard" data-dcnode-id="1959" itemprop="author" itemscope="itemscope" itemtype="http://schema.org/Person"><a class="url fn n" data-dcnode-id="1960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quezon.ph/author/mlq3/"><span data-dcnode-id="1961" instrument_node="">Manuel L. Quezon III</span></a></span></span><span data-dcnode-id="1957" instrument_node=""> </span><span class="textwp-entry-meta-single-date" data-dcnode-id="1954"><i aria-hidden="true" class="far fa-clock" data-dcnode-id="1956"></i><span data-dcnode-id="1955" instrument_node="">&nbsp;July 18, 2007</span></span><span data-dcnode-id="1953" instrument_node=""> </span><span class="textwp-entry-meta-single-comments" data-dcnode-id="1946"><i aria-hidden="true" class="far fa-comments" data-dcnode-id="1952"></i><span data-dcnode-id="1951" instrument_node="">&nbsp;</span><a data-dcnode-id="1947" href="#comments"><span data-dcnode-id="1950" instrument_node="">22 Comments</span><span class="screen-reader-text" data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node=""> on Partyless Democracy redux</span></span></a></span><span data-dcnode-id="1945" instrument_node="">
</span></div><span data-dcnode-id="1943" instrument_node="">
</span></div><span data-dcnode-id="1941" instrument_node="">
</span></header><span data-dcnode-id="1938" instrument_node="">
</span><div class="entry-content textwp-textwp-clearfix" data-dcnode-id="1682"><span data-dcnode-id="1937" instrument_node="">
</span><div data-dcnode-id="1934" style="float: right; margin-left: 10px;"><a class="twitter-share-button" data-count="vertical" data-dcnode-id="1935" data-url="https://www.quezon.ph/2007/07/18/partyless-democracy-redux/" data-via="mlq3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share"><span data-dcnode-id="1936" instrument_node="">Tweet</span></a></div><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1925" style="text-align: justify;"><span data-dcnode-id="1932" instrument_node="">In today’s issue of </span><a data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bworldonline.com/"><span data-dcnode-id="1931" instrument_node="">BusinessWorld</span></a><span data-dcnode-id="1929" instrument_node="">, which keeps its op-ed pages secreted away, free from the prying eyes of the online reading public, there’s a spirited reaction by a certain Ken Fuller to my column, </span><a data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//opinion.inquirer.net/inquireropinion/columns/view_article.php%3Farticle_id%3D76145"><span data-dcnode-id="1928" instrument_node="">You get what you wish for</span></a><span data-dcnode-id="1926" instrument_node="">.</span></p><span data-dcnode-id="1924" instrument_node="">
</span><p data-dcnode-id="1922" style="text-align: justify;"><span data-dcnode-id="1923" instrument_node="">I’ve taken the liberty of reproducing his piece, first of all:</span></p><span data-dcnode-id="1921" instrument_node="">
</span><blockquote data-dcnode-id="1850"><p data-dcnode-id="1915"><span data-dcnode-id="1920" instrument_node="">‘Partyless democracy?’</span><br data-dcnode-id="1919"><span data-dcnode-id="1918" instrument_node="">
COMMENTARY</span><br data-dcnode-id="1917"><span data-dcnode-id="1916" instrument_node="">
KEN FULLER</span></p><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1912" style="text-align: justify;"><span data-dcnode-id="1913" instrument_node="">In his bad-tempered Inquirer column of July 12 (“You get what you wish for”), Manuel L. Quezon III seems, like his grandfather almost 70 years ago, to be toying with the concept of a “partyless democracy.” Mr. Quezon writes, “I have never been for party government, because strong parties make for a weak citizenry.”</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1909" style="text-align: justify;"><span data-dcnode-id="1910" instrument_node="">Possibly, this view is born of a cynicism contracted by too close a contact with the mainstream parties. The role of parties, he laments, is to get power and then hold it, and dispense patronage. Well, yes, one can see what he means.</span></p><span data-dcnode-id="1908" instrument_node="">
</span><p data-dcnode-id="1906" style="text-align: justify;"><span data-dcnode-id="1907" instrument_node="">But Mr. Quezon has an aversion to all parties, regardless of ideology or country. The British Labour Party, the Christian Democratic parties of Europe, the US Republican Party, various communist parties –&nbsp;all are dismissed due to disgraced leaders and because they “end up invoking the police power against the people….”</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1899" style="text-align: justify;"><span data-dcnode-id="1904" instrument_node="">It emerges that Mr. Quezon has a curious idea of what constitutes a party. Alan Peter Cayetano should not, he says, be criticized for joining the</span><br data-dcnode-id="1903"><span data-dcnode-id="1902" instrument_node="">
emerging Villar coalition, as the latter is “party chief” and so Cayetano “must go in the direction his party leader points to.” So is that what a party is? An organization, if that is not too strong a word, in which lesser mortals merely follow the instructions</span><br data-dcnode-id="1901"><span data-dcnode-id="1900" instrument_node="">
of the leader?</span></p><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1896" style="text-align: justify;"><span data-dcnode-id="1897" instrument_node="">Mr. Quezon says that Jose de Venecia took his cha-cha initiative as a party leader, supported by loyal party members, only to meet public opposition, “because the public is not the party.” Yes, but it is also an indisputable fact that only an infinitesimal proportion of the public is in the party - any party. Party membership in the Philippines appears to be largely confined to those who hold, or aspire to hold, office.</span></p><span data-dcnode-id="1895" instrument_node="">
</span><p data-dcnode-id="1893" style="text-align: justify;"><span data-dcnode-id="1894" instrument_node="">Here, surely, is a major reason why parties (or their leading lights) behave in the manner that Mr. Quezon finds so offensive. Unless there is a strong membership base with no interest in holding office but a firm commitment to the party program (of which, more later), leaders motivated by self-interest will be able to act with impunity.</span></p><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1888" style="text-align: justify;"><span data-dcnode-id="1891" instrument_node="">Mr. Quezon argues that the Philippines has real parties, that they do fight over the issues, and that the “only people who don’t believe issues are</span><br data-dcnode-id="1890"><span data-dcnode-id="1889" instrument_node="">
represented by the candidates and voted upon by the public are people who hate elections and don”t want the public to choose our officials.” One suspects that he has specific individuals in mind when he casts this slur, but he retains a tantalizing silence regarding their identity. It seems perfectly clear, though, that one or more of them have recently upset him.</span></p><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1885" style="text-align: justify;"><span data-dcnode-id="1886" instrument_node="">Do mainstream parties really fight on the issues? According to Mr. Quezon, after 1946 the defining issue at elections was graft and corruption, and today “it’s poverty and social justice. Every election has been fought on one of these issues.” This is disputable.</span></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1878" style="text-align: justify;"><span data-dcnode-id="1883" instrument_node="">Yes, corruption was certainly a major issue in 1953, when the Americans had plans for Ramon Magsaysay (who, of course, had switched parties), and in 1961, when there were objections to Carlos Garcia’s “Filipino First” pronouncements. As long as corruption is around, it is available to be used as</span><br data-dcnode-id="1882"><span data-dcnode-id="1881" instrument_node="">
an “issue” by the party or personality aspiring to power. If parties had seriously fought on this issue for the past half-century, though, would it not have</span><br data-dcnode-id="1880"><span data-dcnode-id="1879" instrument_node="">
been tamed by now? Anyway, was this the major issue facing the Filipino people throughout these years? This, too, is disputable.</span></p><span data-dcnode-id="1877" instrument_node="">
</span><p data-dcnode-id="1875" style="text-align: justify;"><span data-dcnode-id="1876" instrument_node="">Were the recent elections really fought on the issues of poverty and social justice? Of course, all politicians will take a stand against poverty, but which mainstream party put forward a legislative agenda (as opposed to empty slogans) dedicated to its dramatic reduction? Which mainstream party nailed its colors to the mast on the issue of social justice (another slogan of Mr. Quezon’s grandfather)?</span></p><span data-dcnode-id="1874" instrument_node="">
</span><p data-dcnode-id="1872" style="text-align: justify;"><span data-dcnode-id="1873" instrument_node="">Hasn’t the main issue facing the people in the last half-century, and the root cause of so many other problems, poverty and insurgencies included, been the inability of the Philippines to take control of its own economy, to reorient it toward the satisfaction of the needs of its people, and to follow the path blazed by the “tigers”?</span></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1869" style="text-align: justify;"><span data-dcnode-id="1870" instrument_node="">Mr. Quezon may argue that the tigers achieved their goals by authoritarian means (in fact, he mentions Lee Kuan Yew as a negative role model). He would, of course, be correct, but there is another way –&nbsp;and it involves parties.</span></p><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1866" style="text-align: justify;"><span data-dcnode-id="1867" instrument_node="">Genuine national development, as opposed to the quack formula dispensed by the International Monetary Fund and the World Bank, would be, if it were also to be democratic, a process demanding the participation of millions. For this, a party or movement dedicated to this end would be required, first of all to formulate a program.</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1861" style="text-align: justify;"><span data-dcnode-id="1864" instrument_node="">Is it not possible to see how this might be achieved with the widest possible democracy? To envision a party based on a combination of individual membership (presumably organized geographically) and organizational affiliation (labor unions, sectoral organizations, business groups</span><br data-dcnode-id="1863"><span data-dcnode-id="1862" instrument_node="">
committed to nationalist industrialization, etc.)? To conceive of this party’s democratically elected leadership formulating the program of national development and then submitting it in draft form to the members and affiliates for amendment, followed by a process in which, with every constituency and affiliate fully represented, the suggested amendments were debated and the final document adopted?</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858" style="text-align: justify;"><span data-dcnode-id="1859" instrument_node="">Is it not possible to envisage the members and affiliates of such a party, as elections approached, democratically selecting the candidates most committed to the program of national development, so that in every electoral district the real candidate would be the program, not the personality representing it?</span></p><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1855" style="text-align: justify;"><span data-dcnode-id="1856" instrument_node="">A partyless government (a “partyless democracy” is surely an oxymoron), not a party government, would “make for a weak citizenry.” A citizenry can be empowered by strong parties, but only if a sizeable proportion of it is in such parties.</span></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1852" style="text-align: justify;"><span data-dcnode-id="1853" instrument_node="">By the same token, no party will be strong - or disciplined - without an active, engaged mass membership.</span></p><span data-dcnode-id="1851" instrument_node="">
</span></blockquote><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1841" style="text-align: justify;"><span data-dcnode-id="1848" instrument_node="">In response to Fuller, perhaps he should have read my column, </span><a data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//opinion.inquirer.net/inquireropinion/columns/view_article.php%3Farticle_id%3D61861"><span data-dcnode-id="1847" instrument_node="">Making political parties obsolete</span></a><span data-dcnode-id="1845" instrument_node=""> first. Our views aren’t perhaps, so divergent. Or are they? See my blog entry, </span><a data-dcnode-id="1843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quezon.ph/%3Fp%3D1158"><span data-dcnode-id="1844" instrument_node="">Politics is a continuum</span></a><span data-dcnode-id="1842" instrument_node="">.</span></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1829" style="text-align: justify;"><span data-dcnode-id="1839" instrument_node="">I first revisited the idea of “partyless democracy” a decade or more ago, </span><a data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quezon.ph/columns.php%3Fview%3Darticle%26id%3D37"><span data-dcnode-id="1838" instrument_node="">in a column by that title in Today Newspaper</span></a><span data-dcnode-id="1836" instrument_node="">. I did so, in turn, in response to a reexamination of the idea by Rolando Gripaldo back in the 1990s. Gripaldo was just the latest in a line of scholars who periodically revisit the idea; in</span><a data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/view/00434078/ap020066/02a00040/0"><span data-dcnode-id="1835" instrument_node=""> New Concepts of Democracy in Southern Asia by Marguerite J. Fisher </span></a><span data-dcnode-id="1833" instrument_node="">( </span><em data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">The Western Political Quarterly</span></em><span data-dcnode-id="1830" instrument_node="">, Vol. 15, No. 4.,Dec., 1962), she places the idea of Partyless Democracy between Mahatma Gandhi’s “Shriman Narayan Agarwal,” Ayub Kan’s “basic democracies” and Sukarno’s criticisms of Western democracy.</span></p><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1826" style="text-align: justify;"><span data-dcnode-id="1827" instrument_node="">As far as what Partyless Democracy means, there’s this extended discussion of the whole concept:</span></p><span data-dcnode-id="1825" instrument_node="">
</span><blockquote data-dcnode-id="1782"><p data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">THE PHILIPPINES</span></p><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1820" style="text-align: justify;"><span data-dcnode-id="1821" instrument_node="">As early as 1940 President Manuel Quezon of the Philippines challenged his countrymen to discard one of the “fetishes” of democracy, “the discarded theory that democracy cannot exist without political parties.”41 In a speech delivered by Quezon to the students of the University of the Philippines on July 16, 1940, there was recurring stress on unity, cooperation, and strong national leadership, and denunciation of partisan strife and obstructionism as inimical to true democracy and the economic and social development of the Philippines. Quezon declared:</span></p><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1817" style="text-align: justify;"><span data-dcnode-id="1818" instrument_node="">In the very nature of things the struggle for power between contending political parties creates partisan spirit, and partisan spirit is incompatible with good government. . . . Ir is party politics that causes inefficiency in government; it is party opposition that causes delay in the execution of needed reforms; it is party spirit that weakens the government and makes it incapable of facing difficult situations. . . . This concept of the need of a majority and minority party is as wrong as saying that, in order that a home may be governed well, it is necessary that there should be a division, that there should be fighting all the time in the family; A nation is like a family, multiplied a thousandfold, and just as it is impossible for a family to be happy or to make progress when there is division among its members . . . so it is impossible for a nation to grow strong and accomplish great ends if the people are always divided, if they are taught to believe that patriotism means division?*</span></p><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1814" style="text-align: justify;"><span data-dcnode-id="1815" instrument_node="">Impressed by Manuel Quezon’s plea for a different system of democracy, Dr. Ricardo Pascual, head of the Department of Philosophy at the University of the Philippines, devoted his time to an amplification of the theories presented by President Quezon. In a book entitled Partyless Democracy, Dr. Pascual advanced a thesis holding that the “next stage in the development of democratic concepts and ideas is inevitably the ‘partyless democracy.’ “43 Dr. Pascual begins his argument with a warning that democracy is on trial, not only in the Philippines but in the other new nations of Asia. Much is expected of democracy in the creation of a better way of life for millions of Asian peoples. But the failure to bridge this “wide gap between promise and accomplishment is the source of disgust and reckless swerving to the opposite extreme in the form of reaction.”” Before popular disillusionment becomes too deep, warns Dr. Pascual, the processes of democratic government must be made more efficient. In this matter the Filipinos must “do their own thinking” and should not blindly copy the great democracies of the West.</span></p><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1811" style="text-align: justify;"><span data-dcnode-id="1812" instrument_node="">Dr. Pascual then proceeds to challenge the Western thesis that political parties are necessary to a liberal political regime. His point of view will encounter strong resistance, he warns, because it runs contrary to the classical line of thought on denlocracy. He examines various Western arguments for the necessity of the party system and rejects them as inappropriate for the needs and conditions of Filipino society. A scheme of democracy must be constructed, he asserts, in which:</span></p><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1808" style="text-align: justify;"><span data-dcnode-id="1809" instrument_node="">The opinion of the genuine public, that is, the genuine public opinion, is a compromise opinion of the different elements of a Democracy, not a triumphant opinion of the majority at the vanquishment of the minority. The scheme of Democracy which will carry out this ideal will be one which is not different from the type of organic unity, harmony, and process of a living organism. Biologists tell us that a living organism is the example of composite organization, of mutual participation, of synthetic harmony, of unity in diversity to speak in paradox. But this kind of ideal Democracy .. .is really impractical in the politics of the party system.</span></p><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1805" style="text-align: justify;"><span data-dcnode-id="1806" instrument_node="">Partyless democracy, maintains Dr. Pascual, would be an “organic social polity.” In general, the various qualities of a partyless democracy will depend upon the “peculiar necessities of the country in which it is intended to be practiced; but all of them will do away with division, dissension, schism, competition, narrow vested interest, partisan~hip.”~In~ the Western party system, on the other hand, “political parties are still in conflict, in competition, in struggle with one another in much the same way that in the pre-party era the indviduals were in conflict, in competition, in struggle with one another.</span></p><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1802" style="text-align: justify;"><span data-dcnode-id="1803" instrument_node="">. . . When will Democracy learn to substitute cooperation, organization and mutual help for competition, group struggle, and selfish e~ploitation?”~~</span></p><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799" style="text-align: justify;"><span data-dcnode-id="1800" instrument_node="">Furthermore, contends Dr. Pascual, the greatest need of the Philippines as well as other Asian nations is social justice. “The promotion of the social interest requires cooperation, not division, mutual cooperative mass action, not individual, competitive intrigues, the mustering of all forces toward the production of the social good, not the pitting of individuals against their fellow men. In this sense the partyless system . .. is the means for consummating the ideal of social justice.”</span></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796" style="text-align: justify;"><span data-dcnode-id="1797" instrument_node="">But how will partyless denlocracy work in practice? What structural design and organizational pattern will it assume? Dr. Pascual advocates a legislature based upon functional or occupational representation. First of all, the representatives in the Congress must</span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1793" style="text-align: justify;"><span data-dcnode-id="1794" instrument_node="">. . . come from groups of people but let these groups be determined not by geographical division but by occupations or professions. . . . Let not any geographical division interfere in this occupational grouping. This means that the delegates, let us say, of the farmers, are delegates of all the farmers in the Philippines. In this way we shall practice unity among the members of the group of farmers and not simply dream about it. This practice shall hold with all occupational groups. Each group shall be bound by the common interest inherent among the members of such group.’* The different groups are to be represented in Congress in proportion to their actual members in the nation, but with a stated maximum number of representatives.</span></p><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1790" style="text-align: justify;"><span data-dcnode-id="1791" instrument_node="">Whereas proportional representation should be followed in the lower house of Congress, in the Senate each occupational group should have an equal representation. Because the welfare of each occupation is mutually dependent upon the welfare of every other occupation, maintains Dr. Pascual, there would be less reason for competition. The representatives of each group will be elected at large, and only by members of their own group. Thus farmers would not be competing against fishermen because “their candidates are not competing for the same votes.”50 In this system there will be “greater unity amoag people pursuing the same trade or occupation. …The feeling of self-sufficiency within a group which will contribute to the seclusion and aloofness of that group, and hence to the creation of sectionalism, will not be found in each of the occupational groups .. . since each occupation is not independent of others in the scheme of social life.”</span></p><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1787" style="text-align: justify;"><span data-dcnode-id="1788" instrument_node="">Furthermore, the division of the electorate into occupational groups, according to Dr. Pascual, would encourage and accelerate long-range programs of social legislation, one of the greatest needs of Asian societies. National planning, too, would be facilitated. Under the new system “each occupational group would naturally endeavor to make lasting plans regarding its future.”</span></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1784" style="text-align: justify;"><span data-dcnode-id="1785" instrument_node="">The author’s arguments on behalf of functional representation are reminiscent of those advanced by various European writers of the late nineteenth and early twentieth centuries. But they assume new significance in that they are aimed in Dr. Pascual’s book at the solution of problems felt to be characteristic of the new Asian nations.</span></p><span data-dcnode-id="1783" instrument_node="">
</span></blockquote><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1770" style="text-align: justify;"><span data-dcnode-id="1780" instrument_node="">For a more recent exploration of the concept, see </span><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//panl.multiply.com/journal/item/2"><span data-dcnode-id="1779" instrument_node="">Philippine Politics and Partyless Democracy by Bartman I. Gacrama</span></a><span data-dcnode-id="1777" instrument_node=""> of the University of LaSalette. Also, as</span><a data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quezon.ph/%3Fp%3D612"><span data-dcnode-id="1776" instrument_node=""> I pointed out in 2005</span></a><span data-dcnode-id="1774" instrument_node="">, there’s this article, </span><a data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiatogether.org/2003/jul/gov-civilsoc3.htm"><span data-dcnode-id="1773" instrument_node="">Civil society and political parties</span></a><span data-dcnode-id="1771" instrument_node="">, which asks similar questions in India.</span></p><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1755" style="text-align: justify;"><span data-dcnode-id="1768" instrument_node="">As far as what Fuller has to say, the background for the views I’ve explored can be found in three essays I wrote for the PCIJ: </span><a data-dcnode-id="1766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//kyotoreview.cseas.kyoto-u.ac.jp/issue/issue5/article_408.html"><span data-dcnode-id="1767" instrument_node="">Elections are like Water</span></a><span data-dcnode-id="1765" instrument_node="">, and </span><a data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pcij.org/i-report/2007/2007-polls-postmortem.html"><span data-dcnode-id="1764" instrument_node="">An Abnormal Return to Reality</span></a><span data-dcnode-id="1762" instrument_node="">. Also,&nbsp;</span><a data-dcnode-id="1760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//opinion.inquirer.net/inquireropinion/columns/view_article.php%3Farticle_id%3D50854"><span data-dcnode-id="1761" instrument_node="">An Assessment</span></a><span data-dcnode-id="1759" instrument_node="">, originally written for </span><em data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Katipunan</span></em><span data-dcnode-id="1756" instrument_node=""> Magazine.</span></p><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1746" style="text-align: justify;"><span data-dcnode-id="1753" instrument_node="">And in the following columns I’ve written for the Inquirer: </span><a data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eleksyon2007n.inquirer.net/view.php%3Farticle%3D20070614-71184"><span data-dcnode-id="1752" instrument_node="">Pig in a poke</span></a><span data-dcnode-id="1750" instrument_node=""> , </span><a data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//opinion.inquirer.net/inquireropinion/columns/view_article.php%3Farticle_id%3D21533"><span data-dcnode-id="1749" instrument_node="">Party Assessments</span></a><span data-dcnode-id="1747" instrument_node="">, and “Democracy in the Philippines” (Nov. 11, 2004). The last two disappeared from online, so it is:</span></p><span data-dcnode-id="1745" instrument_node="">
</span><blockquote data-dcnode-id="1714"><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Democracy in the Philippines</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1740" style="text-align: justify;"><span data-dcnode-id="1741" instrument_node="">DEMOCRACY generally evolves from the limited to the universal. Among Western democracies, the development of democracy took centuries. In former colonies like ours, what took centuries in the West has taken decades. In the case of the Philippines, democracy has developed at a faster rate than our neighbors, particularly if you measure democracy in terms of suffrage, the ability to vote. Under the Spaniards, we had elections in terms comparable to the American colonies and Europe in the 18th century. Landed individuals who possessed social prominence voted. Our First Republic envisioned a limited franchise for a national parliament on the Spanish model, which means if our Republic had survived, we would have had democracy on the oligarchic model as practiced in Britain throught the 18th and up to the late 19th century, and in the early years of the American Republic.</span></p><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1737" style="text-align: justify;"><span data-dcnode-id="1738" instrument_node="">The Americans attempted to boil down in a few decades what took them over a century to develop. First, voting limited to those with property and education, and then a gradual extension of suffrage to all taxpayers with a certain level of education. When the Philippines became autonomous in 1935, the extension of suffrage was extended to women by 1937 -almost a decade ahead of France! And property and tax qualifications were dropped. Democracy, as measured by elections was dramatically extended in the 1950s when the great number of local officials subject to presidential appointment became elected officials, which is why Arsenio Lacson became the first elected, and not appointed, Mayor of Manila. By the present constitution, even literacy requirements for suffrage were dropped, making our democracy, in theory, anyway, universal. The breathtaking pace of the development of our democracy can be measured in the lifetimes of Filipinos who are old enough to remember when women couldn’t vote, when property and literacy qualifications existed, and when many mayors and local officials weren’t elected but appointed instead by Malacanang.</span></p><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1734" style="text-align: justify;"><span data-dcnode-id="1735" instrument_node="">However, faster, as Filipinos increasingly complain, as they envy the economic development of our neighbors, isn’t necessarily better. I always used to think it was an aberration limited to conservative mestizos in the upper class wen they would grumble that the problem with Quezon was that he wanted independence too soon; but I have heard thoroughly un-mestizo intellectuals from the Ateneo de Manila also assert that the problem with out democracy is that we achieved independence too soon. Then again, there is the far more prevalent belief among intellectuals from other schools, that the development of democracy in the Philippines was warped by the American attempt to impose their particular brand of democracy.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1731" style="text-align: justify;"><span data-dcnode-id="1732" instrument_node="">As the Chinese might put it, can there be a “democracy with Philippine characteristics”? A democracy that is genuine and not, for example, the “constitutional authoritarianism” of the Marcos years? I would answer the question by suggesting that an answer lies in the examination of three things. First, the clash between what the Americans purported to be doing and what they actually did. Second, the clash between what the Americans claimed to be attempting and the reaction of the Filipino leadership to those efforts. And third, the requirements of democracy and the inability of Philippine society to meet those requirements.</span></p><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728" style="text-align: justify;"><span data-dcnode-id="1729" instrument_node="">The Americans ended up proving incapable -and unwilling- to prevent the emergence of a system quite comparable to what Malaysia has today: a one-party state, itself composed of factions, under a strong leader, which maintained power through patronage. A French historian remarked to me recently that at the height of its power, the Nacionalista Party government of the Philippines in 1941 was by no means a democracy in the Western sense. And that American officials in the Philippines knew it, and warned Washington. But Washington then, as now, put its strategic and larger political interests ahead of fostering democracy, and as long as the local leadership got along with Washington, it didn’t care what sort of government was in place. This was at a time when America was winding down its colonial experiment, and it had its attention on other things. America then had another chance to intervene in favor of the democracy it claimed to espouse, by mounting a purge after World War II. But again, wanting to maintain influence without the mess of direct responsibility, it only made a half-hearted effort to intervene in the collaboration issue. The result was the first serious division between the political factions that reasserted their political dominance, and the Western-oriented younger generation that began to see the dichotomy between American rhetoric and practice. Even the 1935 Constitution was American-approved and influenced, but the Americans failed to see, or declined to comment on, the Filipino characteristics of that constitution, with its vastly powerful presidency (and the constitition would further be amended in 1941 to reflect Filipino political considerations; it would again be amended in 1947 to reflect American interests, which further alienated Filipinos from the Americans).</span></p><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1725" style="text-align: justify;"><span data-dcnode-id="1726" instrument_node="">The second thread lies in the reaction of the Filipino leadership to what the Americans set out to do. The reaction was generational, and can be observed in the four generations intimately involved: the first being the generation already intellectually mature when the Americans arrived; the second and third being the generations that grew to political and intellectual maturity at the beginning and middle of the American period, and thus were still influenced by the revolutionary generation; and fourth, those who reached maturity during the tail end of actual American rule, and who observed their elders during the Japanese Occupation. In broad strokes, the first generation mastered American rhetoric but set about adapting the actual practice of that democracy in the unitary and authoritarian manner advocated by Mabini, who laid out the blueprint for the restoration of independence. This was a generation whose inclinations would be very familiar to Mahathir of Malaysia, with its concept of “partyless democracy” and distrust of foreign commercial interests: this generation can be exemplified by Quezon and Osmena. The second generation also mastered American idioms but displayed a more critical attitude towards the Americans and democracy, and can be exemplified by Laurel and Recto. The third generation represented the full flowering of American efforts, and can be exemplified by Magsaysay. The fourth generation saw the generation of Magsaysay in conflict with the generation of Laurel and Recto (particularly in the collaboration issue), suffered from the cynicism and desperation of the war, and most clearly, perhaps, saw the limitations of the system because of the way it broke down during World War II. This generation was exemplified by Macapagal, Marcos, and Manglapus. Macapagal and Manglapus preferred parliamentary democracy; Marcos, of whom I am convinced was a student of Laurel’s political philosophy and yearned for the partyless democracy of prewar Philippines, created a parliamentary-fascist hodgepodge because his preeminent concern was wealth and power.</span></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1722" style="text-align: justify;"><span data-dcnode-id="1723" instrument_node="">In a sense, the experience of the First Republic points to the division in thinking about how our governments should be: a strong, unitary state as advocated by Mabini, who was primarily concerned with nation-building, and a strong, locally-based parliament at the expense of the presidency as was desired by the landed and wealthy, primarily concerned with the protection of local turf. The strong presidential system worked from 1935 to Magsaysay from a combination of the charisma enjoyed by some leaders (Quezon, Roxas, Magsaysay), and built-in advantages such as bloc voting that fostered the development of a two-party system. With the elimination of bloc-voting, presidents after Magsaysay began to find the party system becoming irrelevant. Combined with the increasing number of popularly-elected local officials no longer directly beholden to Malacanang, the presidency began to founder on the shocks to the system caused by a return to increasing local influence in politics. By the time Marcos came along, the system was clearly out of whack, but the attempt to change it was nipped in the bud by martial law.</span></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1719" style="text-align: justify;"><span data-dcnode-id="1720" instrument_node="">But what of the people, those upon whom democracy depends? An American writer once denounced Cory Aquino as believing in “plebiscatory democracy,” something he felt Aquino had in common with Quezon. As far as the American writer was concerned, this was not, by any means, American-style democracy. Besides the economic benefits of elections, which the public likes, and which makes them demand regular elections, the view that Filipinos view elections as plebiscites is a valid one. Before 1935, elections were all local, and yet particular local elections became viewed as referendums on the national leadership. National elections began in 1935, and each presidential election became either a referendum on the incumbent, or a one-issue election; senatorial elections became mid-term referendums on the administration, too.</span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716" style="text-align: justify;"><span data-dcnode-id="1717" instrument_node="">At the same time, as democracy spread, the ability of the electorate to discern issues from personalities declined, because of the declining level of education. The rot in the Philippine educational system can be traced back to the late 1950s and early 1960s; it sped up in the 1970s. Its fullest effects began to be felt in the late 1980s, and we are feeling it strongly now. The corrosive combination of the removal of bloc voting and the resulting decline of political parties in the 1950s, the diffusion of power to local kingpins that also began in the 1950s (the warlords), the ensuing inability of a presidency strong in theory but deprived of its traditional means for exercising that strength in actual practice, and the erosion of popular confidence in the ability of the system to work because of all these, has brought our democracy to the universal but essentially meaningless exercise it has become today. The power of media is now eroding the power of local warlords and dynasties on a national level, which is why they are demanding an end to national elections.</span></p><span data-dcnode-id="1715" instrument_node="">
</span></blockquote><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1711"></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1691" style="text-align: right; font-size: 10px;"><span data-dcnode-id="1709" instrument_node="">Technorati Tags: </span><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.technorati.com/tag/ideas" rel="tag"><span data-dcnode-id="1708" instrument_node="">ideas</span></a><span data-dcnode-id="1706" instrument_node="">, </span><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.technorati.com/tag/philippines" rel="tag"><span data-dcnode-id="1705" instrument_node="">philippines</span></a><span data-dcnode-id="1703" instrument_node="">, </span><a data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.technorati.com/tag/politics" rel="tag"><span data-dcnode-id="1702" instrument_node="">politics</span></a><span data-dcnode-id="1700" instrument_node="">, </span><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.technorati.com/tag/president" rel="tag"><span data-dcnode-id="1699" instrument_node="">president</span></a><span data-dcnode-id="1697" instrument_node="">, </span><a data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.technorati.com/tag/Quezon" rel="tag"><span data-dcnode-id="1696" instrument_node="">Quezon</span></a><span data-dcnode-id="1694" instrument_node="">, </span><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.technorati.com/tag/society" rel="tag"><span data-dcnode-id="1693" instrument_node="">society</span></a></p><span data-dcnode-id="1690" instrument_node="">

</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">When Western Democracies Started (i.e. U.S. Canada) parties were defined by there ideologies.  Conservatives were easily identified with conservative ideas and Democrats were liberals… </span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1549" instrument_node="">Presently, there is no dividing lines between these two main parties, except the up and coming</span><br data-dcnode-id="1548"><span data-dcnode-id="1547" instrument_node="">
Socialist and the Greenhorn Green (environmentalist).  But still, each party try to outdo one another to come up with better programs, sometimes stealing oneÃ¢â‚¬â„¢s idea and improving on them, akin to corporate stealing of technologies and improving on the product and presenting as their own…</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">There is always patronage in a party system democracy, but that can be minimized and to the extent entirely avoided and eliminated thru gradual improvement of the process of public service sectors and eventually become the standard. There are still positions reserve at the pleasure of Public Officials, but with proper accountability, abuses are avoided. </span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">I still canÃ¢â‚¬â„¢t figure out how could there be a representative democracy without Political Parties?  Local government may not need political parties, as their functions are more of Managers of Local Services, but National Government, still have to see a working democracy, a good working one, without strong political parties, where most voters identify themselves with one of them..</span></p><span data-dcnode-id="1539" instrument_node="">

</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">“I guess the idea was to have a president for the people and not for a political party.”</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Elected officials, I think, must cease to be members of political parties.  When public interests start colliding with those of the party, these officials are duty-bound to uphold those of the public’s.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">In previous elections, we saw how aspirants went out of their usual ways just to get parties to endorse their candidacies.  Would it have worked better if it were the other way around – parties throwing their support behind candidates who espouse advocacies similar to theirs?  Would it serve the public better if party leaders remain just party leaders never morphing into party candidates, and elected officials later?  Political parties had been useless in advancing the interests of the public anyway.  What with a system and an electorate that does not even care about turncoatism?  </span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">A politician who finds it as easy to change party affiliations as changing coats may not find it too difficult to disown promises he swore by during the campaign period.  </span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">A candidate’s loyalty to the electorate ends when his proclamation ceremonies begin.  Then, it’s payback (to the Party) time.</span></p><span data-dcnode-id="1488" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1398"><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1404" instrument_node="">mlq3, i’m not sure how much you agree with Dr. Pascual’s “</span><i data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">legislature based upon functional or occupational representation.</span></i><span data-dcnode-id="1401" instrument_node="">”  Sassy Lawyer proposed that same idea sometime back.   The problem i see with such a system is that it makes rigid what is by nature a fluid concept.  While we’ve always had lawyers and doctors, the IT profession is relatively recent.  More recent is the blogger (if it can be called a profession).  Then you get into the problem of defining and categorizing professions which means that gerrymandering can get out of hand.  Constituencies can solidify around professions that do get a legislative seat allocation which could then hinder our economic development as the natural process of creative destruction will be inhibited.   Or have you arrived at another way of operationalizing partyless democracy?</span></p><span data-dcnode-id="1399" instrument_node="">

</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Party-less democracy sounds too much like classless society.</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Also, there are two ways for the system to be “party-less” if by that we mean that there is competition among political partIES as such:</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">(1) There are zero parties. (obvious)</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">(2) There is ONE Party.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">This is less obvious but such a totalitarian state, whether overtly declared or not would qualify as a “partyless democracy.”</span></p><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Perhaps it is the simple fact that our democracy is REPRESENTATIVE democracy that Parties are a necessity.  The losers need them to keep hope alive, while the victors need to part-eh!</span></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Hehe!</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">I think however that such numerological arguments are not worthy of the effort you have expended on this issue.</span></p><span data-dcnode-id="1338" instrument_node="">

</span><a data-dcnode-id="1192" href="#comment-539802"><time data-dcnode-id="1193" datetime="2007-07-19T11:49:39+08:00"><span data-dcnode-id="1194" instrument_node="">July 19, 2007 at 11:49 am</span></time></a><span data-dcnode-id="1191" instrument_node=""> </span></div><span data-dcnode-id="1188" instrument_node="">
</span></footer><span data-dcnode-id="1185" instrument_node="">
</span><div class="comment-content" data-dcnode-id="1178"><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1183" instrument_node="">The one thing that sets party politics apart is the high degree of collective accountability, that if a party fails to deliver its promises, it will not be allowed to rule and booted out in subsequent elections. What delineates political parties from each other is its ideologies and platforms. A political party is eventually embraced and accepted by the voting public not because of its colorful, high-profile members but by its ideology. Case in point – the GREEN Party – whose main agenda is environment protection can sooner or later become a threat to any political party in any country it runs. We must</span><br data-dcnode-id="1182"><span data-dcnode-id="1181" instrument_node="">
not dismiss party politics as some sinister, unholy alliance or self serving politicians. In the real world, the voter needs to understand what politicians need to change and party politics provides a much simpler way of reducing the complexity of making a choice. It is much easier for a voter to identify a party for what it stands for in relation to his personal political /social agenda, in giving it a mandate to rule rather than worrying about the performances of individual politicians.</span></p><span data-dcnode-id="1179" instrument_node="">

</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">“However, the credibility of NGOs, after they get access to those in power, sink, because they try to come to grips with officials who operate according to an entirely different set of values, and who use methods with very different goals and measures of success. I’ve often heard, this results in a kind of political schizophrenia which drives civil society and politicians alike either mad or cynical and corrupt. But that’s because the old political world won’t die, and the new political world is still too weak to realize it holds the key to the future.”</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">and as Randy David pointed out, institutionalizing NGOs or their driving principles morphs these same NGOs into what political parties are today.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">parties or not, this debate boils down to one conundrum: how can a president implement meaningful reforms w/o an effective base of power and how can one president who has no opposition be prevented from taking us down the path Marcos took us before?</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">it’s like saying: 6 years is too short for a good president and too long for a bad president.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">it all then depends, on who’s leading us. parties or none, leaders who are good people, will do what’s good for the people.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">otherwise, with all that free rein he had, Marcos really could’ve transformed this country into something else. Yet why didn’t he? so that whining abt not having enough power to effect good change is jz a lot of bull. it’s what’s inside the politician that dictates what he’ll do.</span></p><span data-dcnode-id="1045" instrument_node="">

</span><img alt="Avatar" class="avatar avatar-32wp-user-avatar wp-user-avatar-32 alignnone photo avatar-default" data-dcnode-id="1031" height="32" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/a734b6f8d61033e7aee2d3cbb2491290%3Fs%3D32%26d%3Dmm%26r%3Dg&amp;raw" width="32"><span data-dcnode-id="1030" instrument_node=""> </span><b class="fn" data-dcnode-id="1027"><a class="url" data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.manilaprop.com/" rel="external nofollow ugc"><span data-dcnode-id="1029" instrument_node="">hvrds</span></a></b><span data-dcnode-id="1026" instrument_node=""> </span><span class="says" data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">says:</span></span><span data-dcnode-id="1023" instrument_node=""> </span></div><span data-dcnode-id="1020" instrument_node="">
</span><div class="comment-metadata" data-dcnode-id="1014"><span data-dcnode-id="1019" instrument_node="">
</span><a data-dcnode-id="1016" href="#comment-539884"><time data-dcnode-id="1017" datetime="2007-07-19T14:52:02+08:00"><span data-dcnode-id="1018" instrument_node="">July 19, 2007 at 2:52 pm</span></time></a><span data-dcnode-id="1015" instrument_node=""> </span></div><span data-dcnode-id="1012" instrument_node="">

</span><div class="comment-content" data-dcnode-id="960"><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">It is interesting to note that the term liberal and conservative in the U.SA. can sometimes be mixed up. Conservatives are those that believe that economic systems should be left alone with limited governments. They are mostly libertarians and free marketers. Liberals in the States believe that government interference is vital to equalize society. </span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">However the history of the dichotomy in U.S. politics however was inverted.  Jefferson favored free trade and free markets. Jefferson saw America as a land of farmers and traders. While Alexander Hamilton was the father of dirigism. Being a banker he was more forward looking and is considered the father of U.S. capitalism. He foresaw the power of fiat currency. Lincoln later, a Republican used the power of centralized government to bring the basically agricultural south into line. During their developmental process government frequently intervened. </span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Basic economic ideals serve as the basis for political parties. </span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">It is sad that the two predominant poles of economic thought free-markets (laissez fairer) and no-markets (command economies) (Smith and Marx)are still being debated in this country when both ideas have already been thrashed by the history of the last two hundred years. Sadly it has become a religion for people on both sides. </span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">The rise of nation states and the rise of national ideas on macroeconomics (national financial systems) (Keynes) saved capitalism. His theories gave the impetus to government to intervene in the market place during a period where there were disastrous failures of markets.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Unfortunately the abuse of these new ideas (techniques) when applied to still developing markets can be disastrous. A chicken and egg question comes up. Markets require deep and sound state institutions. But markets by themselves do not create these institutions. Drucker himself postulated that markets presuppose that they exist.</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">In the Philippines the dearth of awareness lies in the historical fact that this country was established and constructed by two empires. Now in the midst of tremendous change in the global economy for some there is nostalgia for being under the aegis of the U.S. empire.  Filipinos would rather remain to be a colony of the U.S. rather than China or Japan. </span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Hamilton reminds us that neutrality requires some power and despicable weakness makes us well, beggars.  </span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">How can one talk about political parties in the Philippine context. Even the feudal system in the Philippines was an export dependent system with no attachments to domestic requirements. Once again a product of empire. Hence the normal evolution of productive human skills was not allowed to bloom. </span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">The American only needed administrators, hence they educated a management class entirely. Accountants, lawyers clerks. My grandfather was an accountant for Smith Bell before the war. They became the nucleus for the still underdeveloped and micro middle class. </span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">The Quezon’s, Laurels, Osmenas, etc remain the landlord class almost solely dependent on the Americans then and now on rents on their landholdings and their rent seeking hold on the state.  The rise of the Chinese merchant/commercial class today is simply an extension of that system. They will simply take over from the first group. </span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">The entire political system is dependent on these people and this guarantees the continuation of this system. The state is simply spinning its wheels in one place. </span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="971" instrument_node="">They breed a narrow and superficial brand of nationalism.</span><br data-dcnode-id="970"><span data-dcnode-id="969" instrument_node="">
The majority of people in the country are not vested in the country. The normal evolutionary process was distorted and debased and it will take a long time to correct. (If ever)</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">The word national and people are alien to Filipino consciousness. We should all push for Cebuano nationhood, Ilocano nationhood, Bicolano nationhood and maybe integrate later on. A. Mukerjee, Boomberg columnist, in one of his columns suggest that Mumbai in India should follow the one country two systems of HK and the PRC and perhaps secede. It’s economy would be larger or almost as large than the Philippines.  Maybe it would be time for the United States of whatever to replace the Republic.  That way the total debt which was directed plainly for the NCR would be theirs solely. If Checkoslovakia disappeared together with Yugoslavia and now Iraq will probably disappear into three states let us free the NCR from the Republic and let Cebu and the rest go free. </span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">It would be a hoot to have all those local officials be forced to work rather than wait for their daily bread from the central government. They would all have to take crash courses in governance and political economy. It is clear the ship of state of the Philippines has not built up compartments for safety. It is simply the military and church that is keeping the ship afloat.</span></p><span data-dcnode-id="961" instrument_node="">
</span></div><span data-dcnode-id="958" instrument_node="">

</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">and jz to point it out, in our current political system, the president is already powerful enough to go about implementing reforms even with heavy opposition. (if only he/she is determined to see it through) he/she has the bureaucracy and all govt offices behind him/her. the opposition a president may face is puny compared to the powers he/she wields.</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="920" instrument_node="">look at it closely, jz appointing really CAPABLE and HONEST individuals to the different appointive posts in the govt would virtually shape up this govt of ours. any well-meaning president can employ all the powers of the presidency at their disposal to combat corruption w/being tyrannical or approaching authoritarianism. w/all this govt (GMA) has done to subvert the law into their favor, just think of how much good could have been accomplish with that kind of determination. it isn’t that GMA doesn’t have political will, it’s jz that she’s using it for all the wrong ends.</span><br data-dcnode-id="919"><span data-dcnode-id="918" instrument_node="">
one could argue that she’s become so much beholden to those who’ve supported her that she can’t risk alienating them now that she’s alienated everyone else. that is exactly the case. if only she would repudiate them now, she can gain back everyone else she’s alienated. throw the sycophants out and enlist the public’s aid. if you are being blackmailed into a corner, hide behind the public’s protection.</span><br data-dcnode-id="917"><span data-dcnode-id="916" instrument_node="">
but no one really thinks GMA has any well-meaning intentions in her actions. well no one except her merry band of sycophants and those benefiting her rule.</span></p><span data-dcnode-id="914" instrument_node="">

</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">“It would be a hoot to have all those local officials be forced to work rather than wait for their daily bread from the central government. They would all have to take crash courses in governance and political economy. It is clear the ship of state of the Philippines has not built up compartments for safety. It is simply the military and church that is keeping the ship afloat.”</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">that would be funny only in the context of those who don’t live here, but would be disastrous for those who do. law and order on those not economically self-sufficient would collapse. strongholds of the NPA and muslim extremists would emerge as tiny states of these groups. they would then gain a foothold in which to wage their wars to conquer more territory.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">and where would you disperse the AFP and PNP? divide them piecemeal to all regions? as it is, their strength is hardly enough to push back the extremists in the south. further dividing them would leave them at the mercy of armed groups.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">a more logical approach would be to require cities to “produce” rather than jz rely on the IRA, and failure to reach a certain income, would mean dissolution of the city along with all of the officials ruling it. the rule and all of the responsibilities of governing it would then be integrated into the nearest city govt w/a large enough income to support it.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">not only will this force local officials to work for the betterment of their city’s economies, it would also curb the trend of creating new cities and voting territories just to get a piece of action at that IRA.</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">efficient local govts then, would swallow inefficient ones which would push into extinction all those parasitic local officials we have. only the best would remain, and from thereon, perhaps that’s where we should choose our next president. the duties of a president after all, reflect more those of a mayor than those of a senator or a congressman. so a successful mayor would be more likely to succeed in governing the whole country than a prolific lawmaker ever can.</span></p><span data-dcnode-id="812" instrument_node="">

</span><div class="comment-content" data-dcnode-id="631"><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">PARTY LESS GOVERENANCE SYSTEM</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Dear friends</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node=""> Do you believe  that partyless  system of governance  can run  in India ? In our constitution no where party system is mentioned. Constitution of India says that ‘The people of India are to exercise their sovereignty through a Parliament at the centre and a Legislature in each state, which is to be elected on adult franchise and to which the Real Executive, namely councilof Ministers , shall be responsible . The election of the house of the people being direct,requires that the territory of India should be divided into suitable territorial constituencies, for the purpose of holding such election. It means that a person who elected from constituency is representing only the people of his territory and not the party who has given  him  ticket.Party is no where in picture in constitution. It is  irony that beyond  any provision in constitution party system become inevitable for goverenance. It is  political parties who used muscle and money power in election campaign and for this  huge money has came from foul means and  corruption. Politicians whoever are in power misuse goverenance and do coruption to meet out election expenditure . So election process in itself become cause of corruption and of bad goverenance.Party agenda and hiddden  interest of party come on surface in house and real problem beneath under carpet. Representive of constituency always behave as party worker and always save interest of party although it may be against that territorial interest to whome he is representing in House. Naxal problem is one of example of this syndrome. </span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">My view is this that no one in house should have any affiliation to any party ,instead he will simply represent his area and people of that area. Than situation would come that good peoplewill sit in House and will  serve people interest in real sense . Please send your comment and keep this debate on.  ajay</span></p><span data-dcnode-id="640" instrument_node="">
