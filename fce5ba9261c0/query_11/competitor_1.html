ntent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/who-were-the-viennese-secessionists-artists/"><span data-dcnode-id="1204" instrument_node="">Who Were the Viennese Secessionists? 6 Key Artists</span></a></div></div><div class="container" data-dcnode-id="226"><div data-dcnode-id="227"><div class="article-head" data-dcnode-id="228"><div data-dcnode-id="229"><div class="row pt-4 pb-4" data-dcnode-id="230"><div class="col article-col" data-dcnode-id="288"><div class="row" data-dcnode-id="1181"><div class="col-md-12 pb-3 align-self-center" data-dcnode-id="1183"><h1 class="display-4 secondfont mb-3" data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Who Were the Viennese Secessionists? 6 Key Artists</span></h1><p class="mb-3" data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">The Viennese Secession overthrew tradition for a new age of radical modernity. These are 6 of the artists who defined the style.</span></p><div class="author-top" data-dcnode-id="1184"><span data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Sep 9, 2021</span></span><span data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node=""> • </span></span><span data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">By </span></span><a data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/author/rosie-lesso/"><span data-dcnode-id="1190" instrument_node="">Rosie Lesso</span></a><span class="education" data-dcnode-id="1185"><span data-dcnode-id="1188" instrument_node="">, </span><span data-dcnode-id="1186" instrument_node="">Managing Editor &amp; Curator</span></span></div></div><div class="col-md-12 d-md-block" data-dcnode-id="1182"></div></div><article class="article-post" data-dcnode-id="421"><center data-dcnode-id="1177"><span data-dcnode-id="1178" style="box-sizing:border-box;display:block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative"><span data-dcnode-id="1180" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;padding-top:57.49999999999999%"></span><img alt="vienna secessionists paintings artists" class="figure-img img-fluid" data-dcnode-id="1179" data-nimg="responsive" decoding="async" sizes="(max-width: 992px) 100vw, 66vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thecollector.com/wp-content/uploads/2021/09/vienna-secessionists-paintings-artists.jpg%3Fwidth%3D1400%26quality%3D70&amp;raw" srcset="https://cdn.thecollector.com/wp-content/uploads/2021/09/vienna-secessionists-paintings-artists.jpg?width=480&amp;quality=70 480w, https://cdn.thecollector.com/wp-content/uploads/2021/09/vienna-secessionists-paintings-artists.jpg?width=600&amp;quality=70 600w, https://cdn.thecollector.com/wp-content/uploads/2021/09/vienna-secessionists-paintings-artists.jpg?width=640&amp;quality=70 640w, https://cdn.thecollector.com/wp-content/uploads/2021/09/vienna-secessionists-paintings-artists.jpg?width=750&amp;quality=70 750w, https://cdn.thecollector.com/wp-content/uploads/2021/09/vienna-secessionists-paintings-artists.jpg?width=828&amp;quality=70 828w, https://cdn.thecollector.com/wp-content/uploads/2021/09/vienna-secessionists-paintings-artists.jpg?width=1080&amp;quality=70 1080w, https://cdn.thecollector.com/wp-content/uploads/2021/09/vienna-secessionists-paintings-artists.jpg?width=1200&amp;quality=70 1200w, https://cdn.thecollector.com/wp-content/uploads/2021/09/vienna-secessionists-paintings-artists.jpg?width=1400&amp;quality=70 1400w" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"></span></center><span data-dcnode-id="1176" instrument_node="">
</span><p class="firstL" data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1173" instrument_node="">
</span><p class="firstL" data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">The Viennese Secession was a rebellious band of artists, designers, and thinkers who charged through turn-of-the-century Vienna with the booming voice of modernity. Breaking away from Vienna’s traditional past, they ushered in a new era with the bold, striking languages of Post-Impressionism, Japonisme, and Art Nouveau. Even more outrageous was their dissolution of the boundaries between fine and applied arts, allowing the realms of architecture, illustration, typography, and painting to seamlessly blend into one another and sit harmoniously side-by-side. This generous egalitarian attitude redefined art’s relationship to society, helping to bring it down from its pedestal and out into the streets of ordinary life. Art critic of the era Ludwig Hevesi observed the momentous changes this art movement would bring about, noting: “The art city of Vienna, this gigantic small town, will now finally become a Big-Vienna, a true New-Vienna.”</span></p><span data-dcnode-id="1170" instrument_node="">

</span><div data-dcnode-id="869"><center data-dcnode-id="873"><div class="collector-adthrive-contentads" data-dcnode-id="874"></div></center><h2 data-dcnode-id="870" style="padding-top:20px;padding-bottom:30px"><b data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">A Brief History Of The Viennese Secession Art Movement</span></b></h2></div><span data-dcnode-id="868" instrument_node="">
</span><figure aria-describedby="caption-attachment-44405" class="figure" data-dcnode-id="852" id="attachment_44405" style="margin:0 0 1rem 0"><center data-dcnode-id="861"><span data-dcnode-id="862" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="866" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="867" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTQwMCIgaGVpZ2h0PSI3MDQiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="viennese secession klimt beethoven frieze" class="figure-img img-fluid" data-dcnode-id="865" data-nimg="intrinsic" decoding="async" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-klimt-beethoven-frieze.jpg%3Fwidth%3D1400%26quality%3D55&amp;raw" srcset="https://cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-klimt-beethoven-frieze.jpg?width=1400&amp;quality=55 1x" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">&lt;img alt="viennese secession klimt beethoven frieze" srcSet="https://cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-klimt-beethoven-frieze.jpg?width=1400&amp;amp;quality=55 1x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-klimt-beethoven-frieze.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="853" id="caption-attachment-44405"><a data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.huffingtonpost.co.uk/entry/klimt-restitution_n_4122826%3Fri18n%3Dtrue" rel="noopener" target="_blank"><i data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Beethoven Frieze</span></i><span data-dcnode-id="858" instrument_node=""> by Gustav Klimt</span></a><i data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">,</span></i><span data-dcnode-id="854" instrument_node=""> for the Viennese Secession’s Beethoven Exhibition, 1902, via Huffington Post</span></figcaption></figure><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">&nbsp;</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="847" instrument_node="">The Viennese Secession was founded in 1897 as a reaction against the </span><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/culture/article/20180221-klimt-and-schiele-the-artists-who-shocked-europe" rel="noopener" target="_blank"><span data-dcnode-id="846" instrument_node="">Viennese Artists’ Society,</span></a><span data-dcnode-id="844" instrument_node=""> which was still steeped in the traditions of the past. This breakaway “secession” was a band of radical forward-looking artists led by the painter Gustav Klimt, along with other members including artists Josef Engelhart, Carl Moll, Koloman Moser, and Alfred Roller, as well as architects such as Josef Hoffmann, Otto Wagner, and Josef Maria Olbrich. Together they were strongly influenced by avant-garde styles from Paris and Berlin, including </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/post-impressionist-beginners-guide/"><span data-dcnode-id="843" instrument_node="">Post-Impressionism,</span></a><span data-dcnode-id="841" instrument_node=""> Japonisme, and </span><a data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/many-faces-art-nouveaus-themes-and-influences/"><span data-dcnode-id="840" instrument_node="">Art Nouveau,</span></a><span data-dcnode-id="838" instrument_node=""> working with flat bold color, graphic prints, intricate ornamentation, and sinuously flowing lines. Wagner claimed the ambition of the Viennese Secession was to “show the modern man his true face.”</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">&nbsp;</span></p><span data-dcnode-id="833" instrument_node="">
</span><figure aria-describedby="caption-attachment-44400" class="figure" data-dcnode-id="821" id="attachment_44400" style="margin:0 0 1rem 0"><center data-dcnode-id="826"><span data-dcnode-id="827" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="831" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="832" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTE5OCIgaGVpZ2h0PSI4MDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="Vienna secession building" class="figure-img img-fluid" data-dcnode-id="830" data-nimg="intrinsic" decoding="async" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thecollector.com/wp-content/uploads/2021/09/Vienna-secession-building.jpg%3Fwidth%3D1400%26quality%3D55&amp;raw" srcset="https://cdn.thecollector.com/wp-content/uploads/2021/09/Vienna-secession-building.jpg?width=1200&amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2021/09/Vienna-secession-building.jpg?width=1400&amp;quality=55 2x" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">&lt;img alt="Vienna secession building" srcSet="https://cdn.thecollector.com/wp-content/uploads/2021/09/Vienna-secession-building.jpg?width=1200&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2021/09/Vienna-secession-building.jpg?width=1400&amp;amp;quality=55 2x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2021/09/Vienna-secession-building.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="822" id="caption-attachment-44400"><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discovergermany.com/vienna-secession/" rel="noopener" target="_blank"><span data-dcnode-id="825" instrument_node="">Vienna Secession Building by Josef Maria Olbrich</span></a><span data-dcnode-id="823" instrument_node="">, 1898, via Discover Germany</span></figcaption></figure><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">&nbsp;</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="816" instrument_node="">One of the group’s most radical breakthroughs was its approach to exhibition design. The Viennese Secessionists adopted the German concept of the </span><i data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Gesamtkunstwerk,</span></i><span data-dcnode-id="813" instrument_node=""> or “total work of art,” where objects made by individual artists came together into a unified, collective whole. They also broke down barriers between fine and applied arts by displaying artworks and utilitarian objects side-by-side. In 1898, the architect Josef Maria Olbrich designed The </span><i data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Wiener Secessionsgebäude</span></i><span data-dcnode-id="810" instrument_node=""> </span><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.secession.at/" rel="noopener" target="_blank"><span data-dcnode-id="809" instrument_node="">(</span><i data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Vienna Secession Building)</span></i></a><i data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">, </span></i><span data-dcnode-id="803" instrument_node="">a purpose-built pavilion, to house the group’s monumental exhibitions. In the eight years that followed, the group held 23 exhibitions in Olbrich’s Secession Building. Perhaps the most famous was the </span><i data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Beethoven Exhibition</span></i><span data-dcnode-id="800" instrument_node=""> in 1902, dedicated to the great composer Ludwig van Beethoven. At the center of the display was </span><a class="broken_link" data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tate.org.uk/whats-on/tate-liverpool/exhibition/gustav-klimt-painting-design-and-modern-life-vienna-1900/gustav-0" rel="noopener" target="_blank"><span data-dcnode-id="799" instrument_node="">Klimt’s now world-renowned</span><i data-dcnode-id="797"><span data-dcnode-id="798" instrument_node=""> Beethoven Frieze</span></i></a><span data-dcnode-id="795" instrument_node="">, which paid tribute to Beethoven’s Ninth Symphony with a complex narrative sequence in the Art Nouveau style.</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">&nbsp;</span></p><span data-dcnode-id="790" instrument_node="">
</span><figure aria-describedby="caption-attachment-44399" class="figure" data-dcnode-id="774" id="attachment_44399" style="margin:0 0 1rem 0"><center data-dcnode-id="783"><span data-dcnode-id="784" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="788" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="789" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTMxOSIgaGVpZ2h0PSI4MDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="ver sacrum viennese secession images" class="figure-img img-fluid" data-dcnode-id="787" data-nimg="intrinsic" decoding="async" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thecollector.com/wp-content/uploads/2021/09/ver-sacrum-viennese-secession-images.jpg%3Fwidth%3D1400%26quality%3D55&amp;raw" srcset="https://cdn.thecollector.com/wp-content/uploads/2021/09/ver-sacrum-viennese-secession-images.jpg?width=1400&amp;quality=55 1x" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">&lt;img alt="ver sacrum viennese secession images" srcSet="https://cdn.thecollector.com/wp-content/uploads/2021/09/ver-sacrum-viennese-secession-images.jpg?width=1400&amp;amp;quality=55 1x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2021/09/ver-sacrum-viennese-secession-images.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="775" id="caption-attachment-44399"><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.christies.com/en/lot/lot-5611166" rel="noopener" target="_blank"><span data-dcnode-id="782" instrument_node="">Page excerpts from </span><i data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Ver Sacrum</span></i></a><i data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">,</span></i><span data-dcnode-id="776" instrument_node=""> the Viennese Secessionists’ monthly publication that ran from 1889-1903, via Christie’s</span></figcaption></figure><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">&nbsp;</span></p><span data-dcnode-id="770" instrument_node="">

ta-dcnode-id="757" instrument_node=""> </span><div class="ml-form-embedSubmitLoad" data-dcnode-id="756"></div><span data-dcnode-id="755" instrument_node=""> </span><span class="sr-only" data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Loading...</span></span><span data-dcnode-id="752" instrument_node=""> </span></button></div></div></div><input aria-invalid="false" data-dcnode-id="747" name="ml-submit" type="hidden" value="1"><div class="ml-mobileButton-horizontal" data-dcnode-id="737"><button class="primary" data-dcnode-id="745" type="submit"><span data-dcnode-id="746" instrument_node="">Join!</span></button><button class="loading" data-dcnode-id="738" disabled="" style="display:none" type="button"><span data-dcnode-id="744" instrument_node=""> </span><div class="ml-form-embedSubmitLoad" data-dcnode-id="743"></div><span data-dcnode-id="742" instrument_node=""> </span><span class="sr-only" data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Loading...</span></span><span data-dcnode-id="739" instrument_node=""> </span></button></div><input aria-invalid="false" data-dcnode-id="736" name="anticsrf" type="hidden" value="true"></form></div></div></div></div></div></div><div class="ml-form-successBody row-success col-md-12 text-center" data-dcnode-id="723" style="display:none"><div class="ml-form-successContent" data-dcnode-id="724"><h3 data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Please check your inbox to activate your subscription</span></h3><span data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Thank you!</span></span></div></div></div></div></div><p data-dcnode-id="711"><span data-dcnode-id="719" instrument_node="">The Viennese Secessionists’ monthly journal </span><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theviennasecession.com/ver-sacrum/" rel="noopener" target="_blank"><i data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Ver Sacrum</span></i><span data-dcnode-id="716" instrument_node=""> </span><i data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">(Sacred Spring)</span></i></a><span data-dcnode-id="712" instrument_node=""> was another ground-breaking platform filled with experimental graphics, illustration, printmaking, typography, and literature related to the art movement. The first cover of the journal, published in 1889, aptly summarised the group’s aims – featuring a young tree blossoming out of a wooden vessel into the sky overhead, the image was a potent metaphor for the artists themselves, bursting out of the constraints of the past into a bright new future. Let’s take a closer look at the creative visionaries who founded this incredible, ground-breaking art movement of the 20th century.</span></p></div><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">&nbsp;</span></p><span data-dcnode-id="706" instrument_node="">
</span><div data-dcnode-id="700"><center data-dcnode-id="704"><div class="collector-adthrive-contentads" data-dcnode-id="705"></div></center><h2 data-dcnode-id="701" style="padding-top:20px;padding-bottom:30px"><b data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">1. Gustav Klimt’s Role in the Viennese Secession</span></b></h2></div><span data-dcnode-id="699" instrument_node="">
</span><figure aria-describedby="caption-attachment-44403" class="figure" data-dcnode-id="683" id="attachment_44403" style="margin:0 0 1rem 0"><center data-dcnode-id="692"><span data-dcnode-id="693" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="697" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="698" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzkxIiBoZWlnaHQ9IjgwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIiB2ZXJzaW9uPSIxLjEiLz4=" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="viennese secession gustav klimt judith painting" class="figure-img img-fluid" data-dcnode-id="696" data-nimg="intrinsic" decoding="async" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-gustav-klimt-judith-painting.jpg%3Fwidth%3D828%26quality%3D55&amp;raw" srcset="https://cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-gustav-klimt-judith-painting.jpg?width=480&amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-gustav-klimt-judith-painting.jpg?width=828&amp;quality=55 2x" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">&lt;img alt="viennese secession gustav klimt judith painting" srcSet="https://cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-gustav-klimt-judith-painting.jpg?width=480&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-gustav-klimt-judith-painting.jpg?width=828&amp;amp;quality=55 2x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-gustav-klimt-judith-painting.jpg?width=828&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="684" id="caption-attachment-44403"><a class="broken_link" data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sothebys.com/en/articles/21-facts-gustav-klimt" rel="noopener" target="_blank"><i data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Judith I</span></i><span data-dcnode-id="689" instrument_node=""> by Gustav Klimt</span></a><i data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">,</span></i><span data-dcnode-id="685" instrument_node=""> 1901, Collection of the Upper Belvedere Gallery, Vienna, via Sotheby’s, New York</span></figcaption></figure><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">&nbsp;</span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="669"><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/6-little-known-facts-about-gustav-klimt/"><span data-dcnode-id="678" instrument_node="">Gustav Klimt</span></a><span data-dcnode-id="676" instrument_node=""> was the undisputed founder of the Viennese Secession; not only was he the group’s first elected president, but he also led the way with his radical visual art, blending striking Art Nouveau ornamentation with the flat, graphic patterns and flowing lines of Japanese art. Klimt adored women throughout his long and prolific career, and his paintings were defined by powerful, enigmatic </span><i data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">femme-fatales</span></i><span data-dcnode-id="673" instrument_node=""> taken from history, mythology, and real life. His famous portrayal of </span><i data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Judith I,</span></i><span data-dcnode-id="670" instrument_node=""> 1901, conveys the Biblical character drenched in indulgent layers of gold, with her head tilted back in seductive, triumphant defiance.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">&nbsp;</span></p><span data-dcnode-id="665" instrument_node="">
</span><h2 data-dcnode-id="662"><b data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">2. Carl Moll: An Influential Leader in the Viennese Secession</span></b></h2><span data-dcnode-id="661" instrument_node="">
</span><figure aria-describedby="caption-attachment-44402" class="figure" data-dcnode-id="645" id="attachment_44402" style="margin:0 0 1rem 0"><center data-dcnode-id="654"><span data-dcnode-id="655" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="659" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="660" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTA5NSIgaGVpZ2h0PSI4MDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="viennese secession carl moll schonbrun" class="figure-img img-fluid" data-dcnode-id="658" data-nimg="intrinsic" decoding="async" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">&lt;img alt="viennese secession carl moll schonbrun" srcSet="https://cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-carl-moll-schonbrun.jpg?width=1200&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-carl-moll-schonbrun.jpg?width=1400&amp;amp;quality=55 2x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-carl-moll-schonbrun.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="646" id="caption-attachment-44402"><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dorotheum.com/en/l/1370059/" rel="noopener" target="_blank"><i data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Schonbrun</span></i><span data-dcnode-id="651" instrument_node=""> by Carl Moll</span></a><i data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">,</span></i><span data-dcnode-id="647" instrument_node=""> around 1910, via Dorotheum Auction House, London</span></figcaption></figure><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">&nbsp;</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="640" instrument_node="">Like Klimt, Austrian artist Carl Moll was an influential leader within the Viennese Secession art movement, and he became the group’s president in 1901. He cycled through a variety of different styles throughout his career, working with graphic art, printmaking, illustration, and painting. However, much of his practice was defined by subdued colors and a quietly muted atmosphere influenced by the meditative tranquillity of Johannes Vermeer and the diffused, dappled light of Pointillism. The enigmatic print </span><i data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Schonbrun,</span></i><span data-dcnode-id="637" instrument_node=""> made around 1910, encapsulates this spiritual, contemplative, and ever-so-slightly eerie quality with soft shadows, naturalistic tones, and still, reflective water.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">&nbsp;</span></p><span data-dcnode-id="632" instrument_node="">
</span><h2 data-dcnode-id="629"><b data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">3. Koloman Moser</span></b></h2><span data-dcnode-id="628" instrument_node="">
</span><figure aria-describedby="caption-attachment-44397" class="figure" data-dcnode-id="612" id="attachment_44397" style="margin:0 0 1rem 0"><center data-dcnode-id="621"><span data-dcnode-id="622" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="626" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="627" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iOTc1IiBoZWlnaHQ9IjgwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIiB2ZXJzaW9uPSIxLjEiLz4=" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="koloman moser illustration art" class="figure-img img-fluid" data-dcnode-id="625" data-nimg="intrinsic" decoding="async" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">&lt;img alt="koloman moser illustration art" srcSet="https://cdn.thecollector.com/wp-content/uploads/2021/09/koloman-moser-illustration-art.jpg?width=1080&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2021/09/koloman-moser-illustration-art.jpg?width=1400&amp;amp;quality=55 2x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2021/09/koloman-moser-illustration-art.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="613" id="caption-attachment-44397"><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artvee.com/artist/koloman-moser/page/2/" rel="noopener" target="_blank"><i data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Die Quelle Flächen Schmuck</span></i><span data-dcnode-id="618" instrument_node=""> by Koloman Moser</span></a><i data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">, </span></i><span data-dcnode-id="614" instrument_node="">1901, via ArtVee Archive</span></figcaption></figure><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">&nbsp;</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="607" instrument_node="">Austrian artist Koloman Moser made a long-lasting contribution to the Viennese Secession, working across an impressively wide range of media including graphic design, stained-glass windows, ceramics, jewelry, and furniture – he even designed a suite of postage stamps. Moser was particularly instrumental in the design of the </span><i data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Ver Sacrum</span></i><span data-dcnode-id="604" instrument_node=""> journal’s front covers, creating striking Art Nouveau graphics with loosely flowing, sensuous lines and a distinctively stylized form of typography that is now synonymous with the Viennese Secession’s house style. Along with the architect and designer Josef Hoffman, Moser founded the pioneering </span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitingvienna.com/culture/wiener-werkstatte/" rel="noopener" target="_blank"><span data-dcnode-id="603" instrument_node="">Wiener Werkstätte</span></a><span data-dcnode-id="601" instrument_node=""> in 1903, a cooperative of Secession artisans working in ceramics, fashion, silver, furniture, and the graphic arts. Such was the radicalism of the Wiener Werkstätte group that they are now credited with shaping the development of the </span><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tate.org.uk/art/art-terms/b/bauhaus" rel="noopener" target="_blank"><span data-dcnode-id="600" instrument_node="">German Bauhaus School</span></a><span data-dcnode-id="598" instrument_node=""> in 1919.</span></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">&nbsp;</span></p><span data-dcnode-id="593" instrument_node="">
</span><div data-dcnode-id="587"><center data-dcnode-id="591"><div class="collector-adthrive-contentads" data-dcnode-id="592"></div></center><h2 data-dcnode-id="588" style="padding-top:20px;padding-bottom:30px"><b data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">4. Josef Engelhart&nbsp;</span></b></h2></div><span data-dcnode-id="586" instrument_node="">
</span><figure aria-describedby="caption-attachment-44404" class="figure" data-dcnode-id="570" id="attachment_44404" style="margin:0 0 1rem 0"><center data-dcnode-id="579"><span data-dcnode-id="580" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="584" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="585" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjU5IiBoZWlnaHQ9IjgwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIiB2ZXJzaW9uPSIxLjEiLz4=" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="viennese secession josef engelhart painting" class="figure-img img-fluid" data-dcnode-id="583" data-nimg="intrinsic" decoding="async" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">&lt;img alt="viennese secession josef engelhart painting" srcSet="https://cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-josef-engelhart-painting.jpg?width=384&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-josef-engelhart-painting.jpg?width=600&amp;amp;quality=55 2x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2021/09/viennese-secession-josef-engelhart-painting.jpg?width=600&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="571" id="caption-attachment-44404"><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dorotheum.com/en/l/1292203/" rel="noopener" target="_blank"><i data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Merlinsage</span></i><span data-dcnode-id="576" instrument_node=""> by Josef Engelhart</span></a><i data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">,</span></i><span data-dcnode-id="572" instrument_node=""> study for frieze at the World Art Fair of St Louis, 1904, via Dorotheum Auction House, London</span></figcaption></figure><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">&nbsp;</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Leading Austrian painter Josef Engelhart played an instrumental role in the Viennese Secession art movement – along with Klimt and Moll, he was one of the group’s founding members and took on the position of group president on two occasions, from 1899-1900 and 1910-11. Like many members of the group, Engelhart experimented with a range of different techniques and styles, including painting, illustration, and sculpture. As a result, his subjects were incredibly varied, including historical and literary figures as well as society and celebrity portraits. One of his most famous artworks was a frieze for the World Art Fair of St Louis in 1904, depicting a series of historical figures in a flat, decorative Art Deco style with intersecting lines, patterns, and colors.</span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">&nbsp;</span></p><span data-dcnode-id="560" instrument_node="">
</span><h2 data-dcnode-id="557"><b data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">5. Josef Maria Auchentaller</span></b></h2><span data-dcnode-id="556" instrument_node="">
</span><figure aria-describedby="caption-attachment-44396" class="figure" data-dcnode-id="540" id="attachment_44396" style="margin:0 0 1rem 0"><center data-dcnode-id="549"><span data-dcnode-id="550" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="554" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="555" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTA4MCIgaGVpZ2h0PSI4MDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="josef maria auchentaller poster design" class="figure-img img-fluid" data-dcnode-id="553" data-nimg="intrinsic" decoding="async" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">&lt;img alt="josef maria auchentaller poster design" srcSet="https://cdn.thecollector.com/wp-content/uploads/2021/09/josef-maria-auchentaller-poster-design.jpg?width=1080&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2021/09/josef-maria-auchentaller-poster-design.jpg?width=1400&amp;amp;quality=55 2x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2021/09/josef-maria-auchentaller-poster-design.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="541" id="caption-attachment-44396"><a data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theviennasecession.com/auchentaller-josef-maria/%23jp-carousel-7106" rel="noopener" target="_blank"><i data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Grosser Fest Corso und Fruhlingsfest</span></i><span data-dcnode-id="546" instrument_node=""> by Josef Maria Auchentaller</span></a><i data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">,</span></i><span data-dcnode-id="542" instrument_node=""> 1899, via The Vienna Secession</span></figcaption></figure><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">&nbsp;</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="535" instrument_node="">Josef Maria Auchentaller was an incredibly prolific and highly respected member of the Viennese Secession, producing a treasure trove of over 400 paintings, drawings, illustrations, posters, and designs for textiles and jewelry. Working across such a wide range of media allowed Auchentaller to break down the barriers between fine and decorative arts, proving just how unified the two genres could be. Auchentaller’s striking Art Nouveau graphics are among the most memorable elements of his career, blending the flowing, feminine sensuality of Art Nouveau pattern with playful typography and the floral motifs of Japanese art, as seen in the stunning poster for </span><i data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Grosser Fest Corso und Fruhlingsfest, (The Grand Fruhlingfest Festival),</span></i><span data-dcnode-id="532" instrument_node=""> 1899. Such was the arresting power of his work that the group once dedicated an entire issue of</span><i data-dcnode-id="530"><span data-dcnode-id="531" instrument_node=""> Ver Sacrum</span></i><span data-dcnode-id="529" instrument_node=""> to his prints.</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">&nbsp;</span></p><span data-dcnode-id="524" instrument_node="">
</span><div data-dcnode-id="518"><center data-dcnode-id="522"><div class="collector-adthrive-contentads" data-dcnode-id="523"></div></center><h2 data-dcnode-id="519" style="padding-top:20px;padding-bottom:30px"><b data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">6. Emil Orlik</span></b></h2></div><span data-dcnode-id="517" instrument_node="">
</span><figure aria-describedby="caption-attachment-44394" class="figure" data-dcnode-id="501" id="attachment_44394" style="margin:0 0 1rem 0"><center data-dcnode-id="510"><span data-dcnode-id="511" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="515" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="516" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTE3IiBoZWlnaHQ9IjgwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIiB2ZXJzaW9uPSIxLjEiLz4=" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="art movement emil orlik poster design" class="figure-img img-fluid" data-dcnode-id="514" data-nimg="intrinsic" decoding="async" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">&lt;img alt="art movement emil orlik poster design" srcSet="https://cdn.thecollector.com/wp-content/uploads/2021/09/art-movement-emil-orlik-poster-design.jpg?width=600&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2021/09/art-movement-emil-orlik-poster-design.jpg?width=1080&amp;amp;quality=55 2x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2021/09/art-movement-emil-orlik-poster-design.jpg?width=1080&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="502" id="caption-attachment-44394"><a data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dorotheum.com/en/l/5200933/" rel="noopener" target="_blank"><i data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Plakat Miniaturenausstellung</span></i><span data-dcnode-id="507" instrument_node=""> by Emil Orlik</span></a><i data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">,</span></i><span data-dcnode-id="503" instrument_node=""> 1906, via Dorotheum Auction House, London</span></figcaption></figure><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">&nbsp;</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="496" instrument_node="">Painter, etcher, and lithographer, Austrian artist Emil Orlik was among the most prolific and inventive artists of the 20th century. Although he made many paintings, his most outstanding contribution to the group’s legacy was as a draughtsman and printmaker, demonstrating his excellence in woodcuts, etchings, and lithographs. Travels through East Asia and Japan profoundly influenced the nature of Orlik’s prints, as seen in his linear calligraphic detail and intricate floral patterns. In addition, much like Auchentaller, Orlik often took on commissions to produce posters for public events, demonstrating how the style of his art could be translated into an everyday life context and allowing him to experiment with various decorative styles of typography. A prime example is the stunning </span><i data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Plakat Miniaturenausstellung,</span></i><span data-dcnode-id="493" instrument_node=""> 1906, featuring curling paisley motifs and angular, Art Deco style lettering.</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">&nbsp;</span></p><span data-dcnode-id="488" instrument_node="">
</span><h2 data-dcnode-id="485"><b data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">The Ongoing Legacy Of The Viennese Secession</span></b></h2><span data-dcnode-id="484" instrument_node="">
</span><figure aria-describedby="caption-attachment-44395" class="figure" data-dcnode-id="468" id="attachment_44395" style="margin:0 0 1rem 0"><center data-dcnode-id="477"><span data-dcnode-id="478" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="482" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="483" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTEzNCIgaGVpZ2h0PSI4MDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="egon schiele portrait eva freund drawing" class="figure-img img-fluid" data-dcnode-id="481" data-nimg="intrinsic" decoding="async" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">&lt;img alt="egon schiele portrait eva freund drawing" srcSet="https://cdn.thecollector.com/wp-content/uploads/2021/09/egon-schiele-portrait-eva-freund-drawing.jpg?width=1200&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2021/09/egon-schiele-portrait-eva-freund-drawing.jpg?width=1400&amp;amp;quality=55 2x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2021/09/egon-schiele-portrait-eva-freund-drawing.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="469" id="caption-attachment-44395"><a class="broken_link" data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sothebys.com/en/auctions/ecatalogue/2010/impressionist-modern-art-evening-sale-l10006/lot.16.html" rel="noopener" target="_blank"><i data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Portrait of Eva Freund</span></i><span data-dcnode-id="474" instrument_node=""> by Egon Schiele</span></a><i data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">,</span></i><span data-dcnode-id="470" instrument_node=""> 1910, via Sotheby’s, London</span></figcaption></figure><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">&nbsp;</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="463" instrument_node="">By 1905, Gustav Klimt and his many followers had left the Viennese Secession. Although the group continued for several more decades, it had lost the driving agency of its earlier years. Even so, the art movement continued to shape the development of art that followed. In Vienna, both </span><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/oskar-kokoschka-degenerate-artist-or-a-genius-of-expressionism/"><span data-dcnode-id="462" instrument_node="">Oskar Kokoschka</span></a><span data-dcnode-id="460" instrument_node=""> and </span><a data-dcnode-id="458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/5-things-you-need-to-know-about-egon-schiele/"><span data-dcnode-id="459" instrument_node="">Egon Schiele</span></a><span data-dcnode-id="457" instrument_node=""> were direct descendants of the Secessionists, exploring further the abstract, decorative approaches to color and ornamentation in visual art.</span></p><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">&nbsp;</span></p><span data-dcnode-id="452" instrument_node="">
</span><figure aria-describedby="caption-attachment-44398" class="figure" data-dcnode-id="435" id="attachment_44398" style="margin:0 0 1rem 0"><center data-dcnode-id="445"><span data-dcnode-id="446" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="450" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="451" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTE1NSIgaGVpZ2h0PSI4MDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="sol lewitt vienna secession wall drawing" class="figure-img img-fluid" data-dcnode-id="449" data-nimg="intrinsic" decoding="async" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">&lt;img alt="sol lewitt vienna secession wall drawing" srcSet="https://cdn.thecollector.com/wp-content/uploads/2021/09/sol-lewitt-vienna-secession-wall-drawing.jpg?width=1200&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2021/09/sol-lewitt-vienna-secession-wall-drawing.jpg?width=1400&amp;amp;quality=55 2x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2021/09/sol-lewitt-vienna-secession-wall-drawing.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="436" id="caption-attachment-44398"><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.secession.at/podcast-nr-3/" rel="noopener" target="_blank"><i data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Wall drawings, Continuous Forms with Colour and Gouache Superimposed</span></i><span data-dcnode-id="442" instrument_node=""> by Sol LeWitt</span><i data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">, </span></i><span data-dcnode-id="439" instrument_node="">Ausstellungsansicht, 1988, photo by Margherita Spiluttini</span></a><span data-dcnode-id="437" instrument_node="">, via Secession Gallery, Vienna</span></figcaption></figure><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">&nbsp;</span></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="430" instrument_node="">Although the </span><a data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/vienna-secession-the-beautiful-buildings-of-austrian-art-nouveau/"><span data-dcnode-id="429" instrument_node="">Secession Building</span></a><span data-dcnode-id="427" instrument_node=""> was severely damaged by Nazis during World War II, the building went under a dramatic restoration program in 1984, bringing Klimt’s Frieze and the surrounding gallery back to life. Since then, various contemporary artists have made stirring responses to the building and the Viennese Secession group’s legacy. These include action paintings by Hermann Nitsch, which echoed the spirit of the</span><i data-dcnode-id="425"><span data-dcnode-id="426" instrument_node=""> Gesamtkunstwerk</span></i><span data-dcnode-id="424" instrument_node="">, wall paintings by Sol LeWitt in a decorative, geometric style, and a dramatic intervention by the Austrian artist Peter Kogler, who adorned the gallery walls, hall, and ceiling with an all-encompassing environment. As a result, the Secession Building is now recognized as an inimitable icon of Austrian culture, marking a monumental period in the city’s path towards modernity.</span></p><span data-dcnode-id="422" instrument_node="">
</span></article><div class="collector-adthrive-contentads" data-dcnode-id="420"></div><div class="readnext-card" data-dcnode-id="414"><a class="text-dark" data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/post-impressionist-beginners-guide/"><h2 class="font-weight-bold" data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">READ NEXT:</span></h2><p class="font-italic" data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Post-Impressionist Art: A Beginner’s Guide</span></p></a></div><div class="share1Container" data-dcnode-id="410"><hr data-dcnode-id="413"><div class="addthis_inline_share_toolbox" data-dcnode-id="412"></div><hr data-dcnode-id="411"></div><div class="author-details author-article" data-dcnode-id="395"><div class="d-flex" data-dcnode-id="396"><img alt="Author Image" class="profile-img" data-dcnode-id="409" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thecollector.com/wp-content/uploads/2021/08/rosie-lesso-author-150x150.jpg&amp;raw"><p data-dcnode-id="397"><a class="name" data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/author/rosie-lesso/"><span data-dcnode-id="408" instrument_node=""> </span><span class="text-muted" data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">By </span></span><span data-dcnode-id="405" instrument_node=""> </span><span data-dcnode-id="403" instrument_node="">Rosie Lesso</span></a><span class="education" data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Managing Editor &amp; Curator</span></span><small data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Rosie has produced writing for a wide range of arts organizations including Tate Modern, The National Galleries of Scotland, Art Monthly and Scottish Art News. She holds an MA in Contemporary Art Theory from the University of Edinburgh an
