</span></p><div data-dcnode-id="1953" id="TFN4"><sup data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">†</span></sup><em data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">p</span></em><span data-dcnode-id="1954" instrument_node=""> &lt; .10.</span></div><div data-dcnode-id="1947" id="TFN5"><sup data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">*</span></sup><em data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">p</span></em><span data-dcnode-id="1948" instrument_node=""> &lt; .05.</span></div><div data-dcnode-id="1941" id="TFN6"><sup data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">**</span></sup><em data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">p</span></em><span data-dcnode-id="1942" instrument_node=""> &lt; .01.</span></div></div></div><p class="p p-last" data-dcnode-id="1929" id="P32"><span data-dcnode-id="1938" instrument_node="">Executive-functioning measures collapsed across country formed a reliable scale (Cronbach's α = .73). Thus, we averaged the standardized scores from the seven measures to form a single executive-functioning aggregate. An Age × Country ANCOVA with the aggregate as the dependent measure powerfully captured the principal findings from the tests involving the single tasks (see </span><a class="fig-table-link figpopup" co-legend-rid="lgnd_F1" data-dcnode-id="1935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/figure/F1/" rid-figpopup="F1" rid-ob="ob-F1" target="figure"><span data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Fig. 1</span></span></a><span data-dcnode-id="1934" instrument_node=""> and </span><a class="fig-table-link figpopup" co-legend-rid="" data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/table/T2/" rid-figpopup="T2" rid-ob="ob-T2" target="table"><span data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Table 2</span></span></a><span data-dcnode-id="1930" instrument_node="">). Perhaps most striking was that in the aggregate, Chinese children's performance was consistently on par with that of U.S. children who were on average 6 months older.</span></p></div><div class="sec" data-dcnode-id="1872" id="S23"><h3 data-dcnode-id="1926" id="S23title"><span data-dcnode-id="1927" instrument_node="">Theory-of-Mind Analysis</span></h3><p class="p p-first" data-dcnode-id="1904" id="P33"><span data-dcnode-id="1925" instrument_node="">A 3 (age) × 2 (country) MANCOVA with standardized performance on the five false-belief tasks as dependent measures and sex as a covariate showed a significant main effect of age, </span><em data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">F</span></em><span data-dcnode-id="1922" instrument_node="">(8, 412) = 10.34, </span><em data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">p</span></em><span data-dcnode-id="1919" instrument_node=""> &lt; .01, η</span><sup data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">2</span></sup><span data-dcnode-id="1916" instrument_node=""> = .31, but no significant main effect of country, </span><em data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">F</span></em><span data-dcnode-id="1913" instrument_node="">(4, 205) = 1.02, n.s. The Age × Country interaction was also not significant. The effects for each theory-of-mind task are summarized in </span><a class="fig-table-link figpopup" co-legend-rid="lgnd_F2" data-dcnode-id="1910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/figure/F2/" rid-figpopup="F2" rid-ob="ob-F2" target="figure"><span data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Figure 2</span></span></a><span data-dcnode-id="1909" instrument_node="">. Follow-up univariate Age × Country ANCOVAs (see </span><a class="fig-table-link figpopup" co-legend-rid="" data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/table/T2/" rid-figpopup="T2" rid-ob="ob-T2" target="table"><span data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Table 2</span></span></a><span data-dcnode-id="1905" instrument_node="">) showed a uniformly robust age effect, and no task showed a significant main effect of country. Thus, despite the Chinese preschoolers' advantage in executive functioning, we found no evidence that they were different from their U.S. counterparts in theory-of-mind reasoning.</span></p><div class="fig iconblock whole_rhythm" co-legend-rid="lgnd_F2" data-dcnode-id="1883" id="F2"><a data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/figure/F2/" rid-figpopup="F2" rid-ob="ob-F2" target="figure"></a><div class="figure" data-dcnode-id="1895" data-largeobj="" data-largeobj-link-rid="largeobj_idm140062965634800"><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/figure/F2/" rid-figpopup="F2" rid-ob="ob-F2" target="figure"></a><a class="inline_block ts_canvas" data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/core/lw/2.0/html/tileshop_pmc/tileshop_pmc_inline.html%3Ftitle%3DClick%2520on%2520image%2520to%2520zoom%26p%3DPMC3%26id%3D2567057_nihms-69302-f0002.jpg" rel="noopener" target="tileshopwindow"><div class="ts_bar small" data-dcnode-id="1898" title="Click on image to zoom"></div><img alt="An external file that holds a picture, illustration, etc.
Object name is nihms-69302-f0002.jpg" class="tileshop" data-dcnode-id="1897" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/bin/nihms-69302-f0002.jpg&amp;raw" title="Click on image to zoom"></a></div><div class="largeobj-link align_right" data-dcnode-id="1892" id="largeobj_idm140062965634800" style="display: none;"><a data-dcnode-id="1893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/figure/F2/%3Freport%3Dobjectonly" rel="noopener" target="object"><span data-dcnode-id="1894" instrument_node="">Open in a separate window</span></a></div><div class="icnblk_cntnt" data-dcnode-id="1884" id="lgnd_F2"><div data-dcnode-id="1889"><a class="figpopup" data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/figure/F2/" rid-figpopup="F2" rid-ob="ob-F2" target="figure"><span data-dcnode-id="1891" instrument_node="">Fig. 2</span></a></div><div class="caption" data-dcnode-id="1885"><p data-dcnode-id="1886" id="__p3"><span data-dcnode-id="1887" instrument_node="">Chinese and U.S. preschoolers' standardized performance on the theory-of-mind tasks, by age. Performance is graphed separately for each of the four kinds of tasks, as well as the aggregate theory-of-mind score.</span></p></div></div></div><p class="p p-last" data-dcnode-id="1873" id="P34"><span data-dcnode-id="1882" instrument_node="">The theory-of-mind measures formed a reliable scale (Cronbach's α = .74), and the standardized measures were averaged to form one aggregate. An Age × Country ANCOVA corroborated the findings from the MANCOVA and the individual-task ANCOVAs (see </span><a class="fig-table-link figpopup" co-legend-rid="lgnd_F2" data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/figure/F2/" rid-figpopup="F2" rid-ob="ob-F2" target="figure"><span data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Fig. 2</span></span></a><span data-dcnode-id="1878" instrument_node=""> and </span><a class="fig-table-link figpopup" co-legend-rid="" data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/table/T2/" rid-figpopup="T2" rid-ob="ob-T2" target="table"><span data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">Table 2</span></span></a><span data-dcnode-id="1874" instrument_node="">). Even with the potentially more sensitive aggregate measure, we found no evidence for a Chinese advantage in theory-of-mind reasoning.</span></p></div><div class="sec sec-last" data-dcnode-id="1839" id="S24"><h3 data-dcnode-id="1870" id="S24title"><span data-dcnode-id="1871" instrument_node="">Relations Between Executive Functioning and Theory of Mind</span></h3><p class="p p-first-last" data-dcnode-id="1840" id="P35"><span data-dcnode-id="1869" instrument_node="">Our final question concerned whether the relation between theory-of-mind reasoning and executive function would hold for Chinese preschoolers, as well as U.S. preschoolers. We found that both in raw correlations and in partial correlations controlling for age, sex, and verbal ability, the executive-function aggregate measure was related to the theory-of-mind measure in the U.S. sample, </span><em data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">r</span></em><span data-dcnode-id="1866" instrument_node="">(99) = .63, </span><em data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">p</span></em><span data-dcnode-id="1863" instrument_node=""> &lt; .001, and </span><em data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">r</span></em><sub data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">partial</span></sub><span data-dcnode-id="1858" instrument_node="">(96) = .386, </span><em data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">p</span></em><span data-dcnode-id="1855" instrument_node=""> &lt; .001, and in the Chinese sample, </span><em data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">r</span></em><span data-dcnode-id="1852" instrument_node=""> (103) = .59, </span><em data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">p</span></em><span data-dcnode-id="1849" instrument_node=""> &lt; .001, and </span><em data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">r</span></em><sub data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">partial</span></sub><span data-dcnode-id="1844" instrument_node="">(99) = .393, </span><em data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">p</span></em><span data-dcnode-id="1841" instrument_node=""> &lt; .001. Thus, despite the cross-cultural differences in the development of executive functioning, the ontogenetic relation between executive functioning and theory of mind was robust and virtually identical across the two cultures.</span></p></div></div><div class="tsec sec" data-dcnode-id="1786" id="S25"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="1835"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="1836" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="1837" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="1833" id="S25title"><span data-dcnode-id="1834" instrument_node="">DISCUSSION</span></h2><p class="p p-first" data-dcnode-id="1831" id="P36"><span data-dcnode-id="1832" instrument_node="">Earlier studies have consistently found a relation between executive functioning and theory of mind in Western cultures. The findings from the current study clearly demonstrate for the first time that this ontogenetic link is also present in Chinese preschoolers. This generalization is particularly striking given that the Chinese children demonstrated more mature levels of executive functioning than their U.S. counterparts. This finding suggests that some of the underlying processes that contribute to the development of preschoolers' theory of mind are similar across cultures.</span></p><div class="sec" data-dcnode-id="1821" id="S26"><h3 data-dcnode-id="1829" id="S26title"><span data-dcnode-id="1830" instrument_node="">Cross-Cultural Differences in Executive Functioning</span></h3><p class="p p-first" data-dcnode-id="1827" id="P37"><span data-dcnode-id="1828" instrument_node="">Chinese preschoolers' performance on executive-functioning tasks was clearly advanced relative to that of their age-matched U.S. counterparts. Given that the Chinese and U.S. preschoolers showed no differences in their verbal ability or their theory-of-mind scores, these findings suggest that Chinese children may be specifically advanced in executive functioning. As noted previously, this advantage may stem from both sociocultural and genetic factors.</span></p><p class="p p-last" data-dcnode-id="1822" id="P38"><span data-dcnode-id="1826" instrument_node="">Before drawing a strong conclusion on Chinese-U.S. differences in executive functioning, it is important to consider whether the tasks used truly imposed the same executive demands across the two cultures. Our battery measured executive functioning by requiring children to inhibit prepotent or dominant responses (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1824" href="#R3" id="__tag_220782308" rid="R3" role="button"><span data-dcnode-id="1825" instrument_node="">Carlson &amp; Moses, 2001</span></a><span data-dcnode-id="1823" instrument_node="">). Of course, we cannot be entirely sure that the prepotency of the responses required in these tasks was psychometrically equivalent across cultures. However, it seems likely that most of the executive demands—including inhibiting the prepotent associations tested in the Stroop-like tasks (e.g., the association between sun and day in the day/night Stroop task), inhibiting the use of one rule to follow a different one in the card-sort task, and inhibiting the tendency to do what one is told in the bear/dragon task—would be applicable across cultures. Moreover, the fact that all the tasks showed a significant main effect of culture gives us some reason to believe that the observed advantage in executive functioning is not an artifact of task bias somehow providing an advantage to the Chinese preschoolers.</span></p></div><div class="sec" data-dcnode-id="1807" id="S27"><h3 data-dcnode-id="1819" id="S27title"><span data-dcnode-id="1820" instrument_node="">No Cross-Cultural Differences in Theory of Mind</span></h3><p class="p p-first-last" data-dcnode-id="1808" id="P39"><span data-dcnode-id="1818" instrument_node="">The second clear finding was that there were no cross-cultural differences in performance on the battery of theory-of-mind tasks. This finding is consistent with the results of previous research comparing Mainland Chinese with U.S. preschoolers in theory-of-mind development (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1816" href="#R18" id="__tag_220782321" rid="R18" role="button"><span data-dcnode-id="1817" instrument_node="">Lee et al., 1999</span></a><span data-dcnode-id="1815" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="1813" href="#R19" rid="R19" role="button"><span data-dcnode-id="1814" instrument_node="">Liu et al., 2004</span></a><span data-dcnode-id="1812" instrument_node="">). More generally, these findings are consistent with those showing that children from multiple cultures typically show more similarities than differences when tested with appropriately designed theory-of-mind tasks (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1810" href="#R2" id="__tag_220782294" rid="R2" role="button"><span data-dcnode-id="1811" instrument_node="">Callaghan et al., 2005</span></a><span data-dcnode-id="1809" instrument_node="">). Indeed, the present study provides added weight to these findings through the use of a large sample size and a relatively large battery of tasks. Given these improvements over previous research, and the similar findings, it seems unlikely that the failure to find a cross-cultural difference in theory-of-mind development can be attributed to problems of tasks, measurement, or statistical power.</span></p></div><div class="sec sec-last" data-dcnode-id="1787" id="S28"><h3 data-dcnode-id="1805" id="S28title"><span data-dcnode-id="1806" instrument_node="">Relation Between Executive Functioning and Theory of Mind</span></h3><p class="p p-first" data-dcnode-id="1803" id="P40"><span data-dcnode-id="1804" instrument_node="">The finding that Chinese children's advances in executive functioning were not mirrored by similar advances in theory of mind has important implications for explaining the relation between executive function and theory of mind. In particular, the expression account predicts that as children's executive skills become sufficient to enable them to negotiate the executive demands inherent in theory-of-mind tasks, children should be able to express their latent knowledge. However, this was clearly not the case for the Chinese children in the present study, who showed advanced abilities at inhibiting prepotent responses in the executive-function tasks, but no similar advantage on theory-of-mind tasks.</span></p><p data-dcnode-id="1798" id="P41"><span data-dcnode-id="1802" instrument_node="">Perhaps the most compelling demonstration of this general point comes from a cross-cultural comparison of the performance of the two younger age groups. Four-year-old U.S. preschoolers showed strong performance on theory-of-mind tasks, thereby demonstrating that they had the executive skills necessary to express their theory-of-mind concepts. However, 3.5-year-old Chinese preschoolers had executive skills on par with the U.S. 4-year-olds, and yet still showed poor theory-of-mind performance. Clearly, attaining a particular level of executive functioning was not by itself sufficient to yield strong theory-of-mind performance. These findings join others in showing that the relation between executive functioning and theory-of-mind development is unlikely attributable to the executive demands posed by theory-of-mind tasks (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1800" href="#R24" id="__tag_220782322" rid="R24" role="button"><span data-dcnode-id="1801" instrument_node="">Perner, Lang, &amp; Kloo, 2002</span></a><span data-dcnode-id="1799" instrument_node="">).</span></p><p data-dcnode-id="1796" id="P42"><span data-dcnode-id="1797" instrument_node="">Nonetheless, the robust cross-cultural correlations suggest that there is an integral ontogenetic relation between executive functioning and theory of mind. This finding poses a puzzle: Why does advanced executive functioning predict advanced theory of mind within a culture, but not between cultures? We believe that one possible answer lies in the emergence hypothesis outlined earlier. According to this hypothesis, domain-general executive-functioning skills enable children to more fully capitalize on domain-specific experiential factors to foster the conceptual developments necessary for theory of mind. Accordingly, it may be that despite their superior executive skills relative to U.S. children, Chinese children did not show an advance in theory of mind because they have less exposure to the kinds of experiential factors that have been shown to be important for theory-of-mind development. Nonetheless, because the domain-general executive factors interact with domain-specific experiential factors within each culture, individual differences in executive functioning predict individual differences in theory of mind.</span></p><p class="p p-last" data-dcnode-id="1788" id="P43"><span data-dcnode-id="1795" instrument_node="">One relevant experiential factor known to differ between the United States and China is number of siblings. Studies have shown that preschoolers' theory-of-mind performance can be predicted by the number of older siblings living in their household (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1793" href="#R26" id="__tag_220782310" rid="R26" role="button"><span data-dcnode-id="1794" instrument_node="">Ruffman, Perner, Naito, Parkin, &amp; Clements, 1998</span></a><span data-dcnode-id="1792" instrument_node="">). Although the precise mechanism by which this effect occurs is not fully understood, most researchers believe that siblings provide an opportunity for young children to discuss other individuals' mental states (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="1790" href="#R1" id="__tag_220782317" rid="R1" role="button"><span data-dcnode-id="1791" instrument_node="">Brown et al., 1996</span></a><span data-dcnode-id="1789" instrument_node="">). If so, Chinese preschoolers, who by law have no siblings, may have fewer opportunities to have discussions about mental states than their U.S. counterparts. Unfortunately, a comparison of Chinese preschoolers with U.S. singletons was not possible in the current study because there were only 12 U.S. singletons in our sample. Nonetheless, this potential experiential difference may explain, at least in part, why Chinese children are not advanced in theory of mind even though they have superior executive skills. More generally, answering the question of how executive functioning interacts with experience in determining the course of theory-of-mind development is a crucial next step in understanding the ontogeny of this foundational social skill.</span></p></div></div><div class="tsec sec" data-dcnode-id="1777" id="S29"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="1783"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="1784" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="1785" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="1781" id="S29title"><span data-dcnode-id="1782" instrument_node="">Acknowledgments</span></h2><div class="sec" data-dcnode-id="1778"><p data-dcnode-id="1779" id="__p1"><span data-dcnode-id="1780" instrument_node="">This research was supported by a Discovery Grant from the Natural Sciences and Engineering Research Council of Canada to M. Sabbagh and by Social Sciences and Humanities Research Council of Canada grants to Mark Sabbagh and to Kang Lee and Fen Xu. We thank Wenjin Zhang and Wenxing Wang for assistance with data coding and collection, and Stanka Fitneva, Kate Harkness, and Valerie Kuhlmeier for helpful feedback on a previous draft.</span></p></div></div><div class="tsec sec" data-dcnode-id="1194" id="ref-list-1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="1774"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="1775" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="1776" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="1772" id="ref-list-1title"><span data-dcnode-id="1773" instrument_node="">REFERENCES</span></h2><div class="ref-list-sec sec" data-dcnode-id="1195" id="reference-list"><ul class="back-ref-list" data-dcnode-id="1196" style="list-style-type:decimal;"><li data-dcnode-id="1753" id="R1"><span class="citation" data-dcnode-id="1754"><span data-dcnode-id="1771" instrument_node="">Brown JR, Donelan-McCall N, Dunn J. Why talk about mental states? The significance of children's conversations with friends, siblings, and mothers. </span><span data-dcnode-id="1764"><span class="ref-journal" data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Child Development. </span></span><span data-dcnode-id="1768" instrument_node="">1996;</span><span class="ref-vol" data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">67</span></span><span data-dcnode-id="1765" instrument_node="">:836–849.</span></span><span data-dcnode-id="1763" instrument_node=""> [</span><a data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/8706529" ref="reftype=pubmed&amp;article-id=2567057&amp;issue-id=173075&amp;journal-id=319&amp;FROM=Article%7CCitationRef&amp;TO=Entrez%7CPubMed%7CRecord"><span data-dcnode-id="1762" instrument_node="">PubMed</span></a><span data-dcnode-id="1760" instrument_node="">] </span><span class="nowrap" data-dcnode-id="1755"><span data-dcnode-id="1759" instrument_node="">[</span><a aria-expanded="false" aria-haspopup="true" data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Fjournal%3DChild%2BDevelopment%26title%3DWhy%2Btalk%2Babout%2Bmental%2Bstates%3F%2BThe%2Bsignificance%2Bof%2Bchildren%27s%2Bconversations%2Bwith%2Bfriends%2C%2Bsiblings%2C%2Band%2Bmothers%26author%3DJR%2BBrown%26author%3DN%2BDonelan-McCall%26author%3DJ%2BDunn%26volume%3D67%26publication_year%3D1996%26pages%3D836-849%26pmid%3D8706529%26" ref="reftype=other&amp;article-id=2567057&amp;issue-id=173075&amp;journal-id=319&amp;FROM=Article%7CCitationRef&amp;TO=Content%20Provider%7CLink
