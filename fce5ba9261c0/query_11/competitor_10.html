"en"><sup data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">4</span></sup><span data-dcnode-id="2745" instrument_node="">University of Oregon</span></div><div class="fm-affl" data-dcnode-id="2740" id="A5" lang="en"><sup data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">5</span></sup><span data-dcnode-id="2741" instrument_node="">University of Toronto, Toronto, Ontario, Canada</span></div><div data-dcnode-id="2736" id="CR1"><span data-dcnode-id="2739" instrument_node="">Address correspondence to Mark A. Sabbagh, Department of Psychology, Queen's University at Kingston, Kingston, Ontario, Canada K7L 3N6, e-mail: </span><a class="oemail" data-dcnode-id="2737" data-email=".ac.usneeuq.tsop@hgabbas" href="mailto:dev@null"><span data-dcnode-id="2738" instrument_node="">.ac.usneeuq.tsop@hgabbas</span></a></div></div><div class="fm-article-notes half_rhythm" data-dcnode-id="2734"></div><div class="permissions half_rhythm hide" data-dcnode-id="2729" id="idm140062971894992_cpl" style="display:none"><div class="fm-copyright half_rhythm" data-dcnode-id="2730"><a data-dcnode-id="2732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/about/copyright/"><span data-dcnode-id="2733" instrument_node="">Copyright notice</span></a><span data-dcnode-id="2731" instrument_node=""> </span></div></div></div><div aria-label="Related or updated information about this article." class="links-box whole_rhythm" data-dcnode-id="2718" id="pmclinksbox" role="complementary"><div data-dcnode-id="2724"><span data-dcnode-id="2727" instrument_node="">The publisher's final edited version of this article is available  at </span><a data-dcnode-id="2725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/entrez/eutils/elink.fcgi%3Fdbfrom%3Dpubmed%26retmode%3Dref%26cmd%3Dprlinks%26id%3D16371147" ref="reftype=publisher&amp;article-id=2567057&amp;issue-id=173075&amp;journal-id=319&amp;FROM=Article%7CFront%20Matter&amp;TO=Content%20Provider%7CArticle%7CRestricted%20Access" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2726" instrument_node="">Psychol Sci</span></a></div><div data-dcnode-id="2719"><span data-dcnode-id="2723" instrument_node="">See other articles in PMC that </span><a data-dcnode-id="2721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/citedby/"><span data-dcnode-id="2722" instrument_node="">cite</span></a><span data-dcnode-id="2720" instrument_node=""> the published article.</span></div></div></div><div class="sec" data-dcnode-id="2716"></div><div class="tsec sec" data-dcnode-id="2705" id="abstract-1" lang="en"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="2712"><span data-dcnode-id="2713" role="menubar"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="2714" href="#" role="menuitem" title="Go to other sections in this page"><span data-dcnode-id="2715" instrument_node="">Go to:</span></a></span></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="2710" id="abstract-1title"><span data-dcnode-id="2711" instrument_node="">Abstract</span></h2><div data-dcnode-id="2706"><p class="p p-first-last" data-dcnode-id="2707" id="P1"><span data-dcnode-id="2708" instrument_node="">Preschoolers' theory-of-mind development follows a similar age trajectory across many cultures. To determine whether these similarities are related to similar underlying ontogenetic processes, we examined whether the relation between theory of mind and executive function commonly found among U.S. preschoolers is also present among Chinese preschoolers. Preschoolers from Beijing, China (N = 109), were administered theory-of-mind and executive-functioning tasks, and their performance was compared with that of a previously studied sample of U.S. preschoolers (N = 107). The Chinese preschoolers out-performed their U.S. counterparts on all measures of executive functioning, but were not similarly advanced in theory-of-mind reasoning. Nonetheless, individual differences in executive functioning predicted theory of mind for children in both cultures. Thus, the relation between executive functioning and theory of mind is robust across two disparate cultures. These findings shed light on why executive functioning is important for theory-of-mind development.</span></p></div></div><div class="tsec sec" data-dcnode-id="2607" id="body-1"><h2 class="headless nomenu" data-dcnode-id="2704"></h2><p class="p p-first" data-dcnode-id="2693" id="P2"><span data-dcnode-id="2703" instrument_node="">Over the preschool years, children's understanding of their own and other individuals' mental states—that is, their </span><em data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">theory of mind</span></em><span data-dcnode-id="2700" instrument_node="">—goes though an important transition that is often indexed by their emerging understanding of false belief (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2698" href="#R32" id="__tag_220782298" rid="R32" role="button"><span data-dcnode-id="2699" instrument_node="">Wellman, Cross, &amp; Watson, 2001</span></a><span data-dcnode-id="2697" instrument_node="">). Recent findings show considerable cross-cultural synchrony in the age at which children gain facility with false-belief reasoning (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2695" href="#R2" id="__tag_220782309" rid="R2" role="button"><span data-dcnode-id="2696" instrument_node="">Callaghan et al., 2005</span></a><span data-dcnode-id="2694" instrument_node="">). It is not clear, however, whether this cross-cultural developmental synchrony can be attributed to universal developmental processes.</span></p><p data-dcnode-id="2667" id="P3"><span data-dcnode-id="2692" instrument_node="">Within Western cultures, several factors have been shown to affect the developmental timetable of false-belief and related theory-of-mind concepts. One factor believed to be particularly important is executive functioning (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2690" href="#R3" id="__tag_220782299" rid="R3" role="button"><span data-dcnode-id="2691" instrument_node="">Carlson &amp; Moses, 2001</span></a><span data-dcnode-id="2689" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2687" href="#R20" id="__tag_220782307" rid="R20" role="button"><span data-dcnode-id="2688" instrument_node="">Moses, 2001</span></a><span data-dcnode-id="2686" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2684" href="#R22" id="__tag_220782296" rid="R22" role="button"><span data-dcnode-id="2685" instrument_node="">Perner &amp; Lang, 1999</span></a><span data-dcnode-id="2683" instrument_node="">). Several studies of Western children have shown that their performance on false-belief and other theory-of-mind tasks can be predicted from tasks that tap executive-functioning skills such as response inhibition, cognitive conflict resolution, and working memory (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2681" href="#R4" id="__tag_220782306" rid="R4" role="button"><span data-dcnode-id="2682" instrument_node="">Carlson, Moses, &amp; Hix, 1998</span></a><span data-dcnode-id="2680" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2678" href="#R7" rid="R7" role="button"><span data-dcnode-id="2679" instrument_node="">Davis &amp; Pratt, 1995</span></a><span data-dcnode-id="2677" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2675" href="#R11" rid="R11" role="button"><span data-dcnode-id="2676" instrument_node="">Frye, Zelazo, &amp; Palfai, 1995</span></a><span data-dcnode-id="2674" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2672" href="#R16" rid="R16" role="button"><span data-dcnode-id="2673" instrument_node="">Hughes, 1998</span></a><span data-dcnode-id="2671" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2669" href="#R23" rid="R23" role="button"><span data-dcnode-id="2670" instrument_node="">Perner &amp; Lang, 2000</span></a><span data-dcnode-id="2668" instrument_node="">). These relations typically persist even when factors such as age and verbal ability are controlled. To begin to assess whether this developmental pathway might be universal, we examined whether the relation between executive function and theory of mind also holds in children from Beijing, China.</span></p><p data-dcnode-id="2641" id="P4"><span data-dcnode-id="2666" instrument_node="">This population is of theoretical interest because there are reasons to believe that Chinese preschoolers may show more mature patterns of executive functioning than U.S. preschoolers. First, cultural psychologists have noted that Chinese parents expect children as young as 2 years old to master impulse control, whereas U.S. parents do not expect such mastery until the preschool years (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2664" href="#R6" id="__tag_220782315" rid="R6" role="button"><span data-dcnode-id="2665" instrument_node="">Chen et al., 1998</span></a><span data-dcnode-id="2663" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2661" href="#R14" rid="R14" role="button"><span data-dcnode-id="2662" instrument_node="">Ho, 1994</span></a><span data-dcnode-id="2660" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2658" href="#R35" rid="R35" role="button"><span data-dcnode-id="2659" instrument_node="">Wu, 1996</span></a><span data-dcnode-id="2657" instrument_node="">). Impulse control is also more highly valued and encouraged in Chinese preschool settings than in U.S. preschool settings (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2655" href="#R29" rid="R29" role="button"><span data-dcnode-id="2656" instrument_node="">Tobin, Wu, &amp; Davidson, 1989</span></a><span data-dcnode-id="2654" instrument_node="">). Thus, Chinese children may have many culturally defined opportunities to exercise and practice executive-functioning skills. A second line of evidence comes from the fields of genetic medicine and population genetics. The 7-repeat allele of the dopamine receptor gene (DRD4) has been associated with attention-deficit hyperactivity disorder (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2652" href="#R9" id="__tag_220782320" rid="R9" role="button"><span data-dcnode-id="2653" instrument_node="">ADHD; Faraone, Doyle, Mick, &amp; Biederman, 2001</span></a><span data-dcnode-id="2651" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2649" href="#R28" id="__tag_220782316" rid="R28" role="button"><span data-dcnode-id="2650" instrument_node="">Swanson et al., 1998</span></a><span data-dcnode-id="2648" instrument_node="">). Phenotypically, ADHD is associated with poor performance on executive-function tasks (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2646" href="#R27" id="__tag_220782314" rid="R27" role="button"><span data-dcnode-id="2647" instrument_node="">Schachar, Tannock, Marriott, &amp; Logan, 1995</span></a><span data-dcnode-id="2645" instrument_node="">). Intriguingly, the 7-repeat allele is very rare in East and South Asia (including China), having a population prevalence of just 1.9%, compared with 48.3% in the Americas (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2643" href="#R5" id="__tag_220782323" rid="R5" role="button"><span data-dcnode-id="2644" instrument_node="">Chang, Kidd, Kivak, Pakstis, &amp; Kidd, 1996</span></a><span data-dcnode-id="2642" instrument_node="">). For these reasons, then, Chinese children may have an advantage in executive functioning.</span></p><p data-dcnode-id="2639" id="P5"><span data-dcnode-id="2640" instrument_node="">We are aware of no studies in which Chinese and U.S. preschoolers' executive-functioning skills have been compared directly. Thus, an important question addressed in the present study is whether executive functioning is indeed advanced in Chinese relative to U.S. preschoolers, and, if so, whether a relation between executive functioning and theory of mind exists for Chinese preschoolers despite this difference.</span></p><p data-dcnode-id="2628" id="P6"><span data-dcnode-id="2638" instrument_node="">A Chinese-U.S. comparison may also help resolve the debate concerning two competing explanations of the relation between theory of mind and executive functioning (see </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2636" href="#R20" id="__tag_220782305" rid="R20" role="button"><span data-dcnode-id="2637" instrument_node="">Moses, 2001</span></a><span data-dcnode-id="2635" instrument_node="">). According to the </span><em data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">expression</span></em><span data-dcnode-id="2632" instrument_node=""> account, children who fail false-belief tasks do so not because they lack an understanding of false belief, but because of the peripheral executive demands that these tasks pose. For instance, to answer a false-belief test question correctly, children have to inhibit a prepotent tendency to report the true state of affairs and instead focus on an abstract, nonobvious mental state, all the while holding in mind the events that have transpired. According to this account, as children's executive skills develop sufficiently to negotiate these critical task demands, they are able to express their otherwise latent theory-of-mind understanding (see, e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2630" href="#R4" id="__tag_220782325" rid="R4" role="button"><span data-dcnode-id="2631" instrument_node="">Carlson et al., 1998</span></a><span data-dcnode-id="2629" instrument_node="">).</span></p><p data-dcnode-id="2620" id="P7"><span data-dcnode-id="2627" instrument_node="">An alternative account is that executive functioning may be necessary for the very emergence of children's theory-of-mind concepts. Mental states are abstract entities whose relations to the world are not immediately transparent, particularly when the mental states do not correspond with reality (as in false-belief tasks). Research has suggested that exposure to opportunities for reflecting on the discrepancy between mental states and reality is important for theory-of-mind development (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2625" href="#R1" id="__tag_220782303" rid="R1" role="button"><span data-dcnode-id="2626" instrument_node="">Brown, Donelan-McCall, &amp; Dunn, 1996</span></a><span data-dcnode-id="2624" instrument_node="">). Developmental gains in executive functioning may provide children with improved abilities to both engage in and capitalize on these everyday experiences. Note that this account holds that domain-general executive skills might be necessary but not sufficient for the emergence of theory-of-mind concepts; exposure to relevant experiences is also crucial (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2622" href="#R21" rid="R21" role="button"><span data-dcnode-id="2623" instrument_node="">Moses, Carlson, &amp; Sabbagh, 2004</span></a><span data-dcnode-id="2621" instrument_node="">).</span></p><p data-dcnode-id="2612" id="P8"><span data-dcnode-id="2619" instrument_node="">According to the expression hypothesis, as children's executive-functioning skills increase, so too should their ability to negotiate the peripheral cognitive demands associated with theory-of-mind tasks. If Chinese children are advanced in executive functioning relative to U.S. children, the expression account predicts that these advances would lead to a similar cross-cultural advantage in theory-of-mind development. Although previous research has shown a similar trajectory of theory-of-mind development in mainland Chinese and U.S. preschoolers (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2617" href="#R18" id="__tag_220782292" rid="R18" role="button"><span data-dcnode-id="2618" instrument_node="">Lee, Olson, &amp; Torrance, 1999</span></a><span data-dcnode-id="2616" instrument_node="">; see </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2614" href="#R19" rid="R19" role="button"><span data-dcnode-id="2615" instrument_node="">Liu, Wellman, Tardif, &amp; Sabbagh, 2004</span></a><span data-dcnode-id="2613" instrument_node="">, for a review), most of these studies have relied on limited sample sizes and a restricted battery of measures. These limitations may have obscured small but significant cross-cultural differences.</span></p><p class="p" data-dcnode-id="2608" id="P9"><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2610" href="#R3" id="__tag_220782301" rid="R3" role="button"><span data-dcnode-id="2611" instrument_node="">Carlson and Moses (2001)</span></a><span data-dcnode-id="2609" instrument_node=""> conducted one of the most definitive studies establishing the relation between executive skills and theory-of-mind development in U.S. children. To meet the goals of our study, we collected data from a sample of Chinese preschoolers using the same relevant tasks as Carlson and Moses, administering the tasks in the same manner. These Chinese data were then compared with the U.S. data collected by Carlson and Moses to determine (a) if the ontogenetic relation between executive functioning and theory of mind found in the United States also holds in China, and (b) whether possible cross-cultural differences in performance on executive-functioning tasks predict cross-cultural differences in theory-of-mind development. Answering these questions will help inform a cross-culturally valid theoretical account of the relation between executive functioning and theory of mind.</span></p></div><div class="tsec sec" data-dcnode-id="2290" id="S1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="2604"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="2605" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="2606" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="2602" id="S1title"><span data-dcnode-id="2603" instrument_node="">METHOD</span></h2><div class="sec sec-first" data-dcnode-id="2554" id="S2"><h3 data-dcnode-id="2600" id="S2title"><span data-dcnode-id="2601" instrument_node="">Participants</span></h3><p class="p p-first" data-dcnode-id="2592" id="P10"><span data-dcnode-id="2599" instrument_node="">Participants were 109 preschoolers (59 boys) from Beijing, China, ages 36 to 59 months (</span><em data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">M</span></em><span data-dcnode-id="2596" instrument_node=""> = 48.28 months, </span><em data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">SD</span></em><span data-dcnode-id="2593" instrument_node=""> = 6.78). Children's ages were calculated to the day from birth records provided to the preschool where the children were tested. Because of the “one child” policy in China, all the Chinese children had no siblings. Although no systematic demographic data were collected, the preschool serviced a middle-class urban neighborhood in Beijing.</span></p><p data-dcnode-id="2575" id="P11"><span data-dcnode-id="2591" instrument_node="">The U.S. comparison group (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2589" href="#R3" id="__tag_220782318" rid="R3" role="button"><span data-dcnode-id="2590" instrument_node="">Carlson &amp; Moses, 2001</span></a><span data-dcnode-id="2588" instrument_node="">) consisted of 107 children (51 boys) ages 36 to 59 months (</span><em data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">M</span></em><span data-dcnode-id="2585" instrument_node=""> = 47.36 months, </span><em data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">SD</span></em><span data-dcnode-id="2582" instrument_node=""> = 5.34). The slight differences between the two samples in age and sex distribution were not statistically significant. The U.S. participants had zero to five siblings (</span><em data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">M</span></em><span data-dcnode-id="2579" instrument_node=""> = 1.32, </span><em data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">SD</span></em><span data-dcnode-id="2576" instrument_node=""> = 0.94) and were drawn from a predominantly White, middle-class university community in the Pacific Northwest.</span></p><p class="p p-last" data-dcnode-id="2555" id="P12"><span data-dcnode-id="2574" instrument_node="">For many analyses, the combined samples were split into three roughly equal-sized age groups: (a) 3.5-year-olds (</span><em data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">n</span></em><span data-dcnode-id="2571" instrument_node=""> = 72; range: 36–44 months, </span><em data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">M</span></em><span data-dcnode-id="2568" instrument_node=""> = 41.15), (b) 4-year-olds (</span><em data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">n</span></em><span data-dcnode-id="2565" instrument_node=""> = 76; range = 45–51 months, </span><em data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">M</span></em><span data-dcnode-id="2562" instrument_node=""> = 47.38), and (c) 4.5-year-olds (</span><em data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">n</span></em><span data-dcnode-id="2559" instrument_node=""> = 68; range = 52–59 months, </span><em data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">M</span></em><span data-dcnode-id="2556" instrument_node=""> = 55.38). All the children were monolingual in either Mandarin Chinese or English.</span></p></div><div class="sec" data-dcnode-id="2437" id="S3"><h3 data-dcnode-id="2552" id="S3title"><span data-dcnode-id="2553" instrument_node="">Procedure</span></h3><p class="p p-first" data-dcnode-id="2547" id="P13"><span data-dcnode-id="2551" instrument_node="">Full details of the procedure can be found in </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2549" href="#R3" id="__tag_220782291" rid="R3" role="button"><span data-dcnode-id="2550" instrument_node="">Carlson and Moses (2001)</span></a><span data-dcnode-id="2548" instrument_node="">. Here, we provide a brief description of each task and how it was scored.</span></p><p class="p p-last" data-dcnode-id="2541" id="P14"><span data-dcnode-id="2546" instrument_node="">Children in both countries were tested individually in two videotaped sessions that lasted approximately 45 min and were about a week apart. U.S. children were tested in a playroom in an on-campus laboratory, and Chinese children were tested in a quiet room in their preschool. The measures consisted of a test of verbal ability, five theory-of-mind tasks, and seven executive-functioning tasks. The order of tasks in each session was fixed and the same for both samples (see </span><a class="fig-table-link figpopup" co-legend-rid="" data-dcnode-id="2543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/table/T1/" rid-figpopup="T1" rid-ob="ob-T1" target="table"><span data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Table 1</span></span></a><span data-dcnode-id="2542" instrument_node="">).</span></p><div class="table-wrap anchored whole_rhythm" data-dcnode-id="2438" id="T1"><h3 data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">TABLE 1</span></h3><div class="caption" data-dcnode-id="2533"><p data-dcnode-id="2534" id="__p4"><span data-dcnode-id="2535" instrument_node="">Order of the Tasks in Each Testing Session</span></p></div><div class="xtable" data-dcnode-id="2458"><table class="rendered small default_table" data-dcnode-id="2459" frame="hsides" rules="groups"><thead data-dcnode-id="2527"><tr data-dcnode-id="2528"><th align="left" colspan="1" data-dcnode-id="2531" rowspan="1" valign="top"><span data-dcnode-id="2532" instrument_node="">Session 1</span></th><th align="left" colspan="1" data-dcnode-id="2529" rowspan="1" valign="top"><span data-dcnode-id="2530" instrument_node="">Session 2</span></th></tr></thead><tbody data-dcnode-id="2460"><tr data-dcnode-id="2522"><td align="left" colspan="1" data-dcnode-id="2525" rowspan="1" valign="top"><span data-dcnode-id="2526" instrument_node="">Language measure</span></td><td align="left" colspan="1" data-dcnode-id="2523" rowspan="1" valign="top"><span data-dcnode-id="2524" instrument_node="">Contents false belief</span></td></tr><tr data-dcnode-id="2517"><td align="left" colspan="1" data-dcnode-id="2520" rowspan="1" valign="top"><span data-dcnode-id="2521" instrument_node="">Day/night Stroop</span></td><td align="left" colspan="1" data-dcnode-id="2518" rowspan="1" valign="top"><span data-dcnode-id="2519" instrument_node="">Kansas Reflection-Impulsivity</span></td></tr><tr data-dcnode-id="2512"><td align="left" colspan="1" data-dcnode-id="2515" rowspan="2" valign="top"><span data-dcnode-id="2516" instrument_node="">Location false belief (standard)</span></td><td align="left" colspan="1" data-dcnode-id="2513" rowspan="1" valign="top"><span data-dcnode-id="2514" instrument_node=""> Scale for Preschoolers</span></td></tr><tr data-dcnode-id="2507"><td align="left" colspan="1" data-dcnode-id="2508" rowspan="1" valign="top"><span data-dcnode-id="2511" instrument_node="">Mental-state control (location)</span><sup data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">b</span></sup></td></tr><tr data-dcnode-id="2500"><td align="left" colspan="1" data-dcnode-id="2503" rowspan="1" valign="top"><span data-dcnode-id="2506" instrument_node="">Pinball</span><sup data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">a</span></sup></td><td align="left" colspan="1" data-dcnode-id="2501" rowspan="1" valign="top"><span data-dcnode-id="2502" instrument_node="">Bear/dragon</span></td></tr><tr data-dcnode-id="2493"><td align="left" colspan="1" data-dcnode-id="2496" rowspan="2" valign="top"><span data-dcnode-id="2499" instrument_node="">Mental-state control (contents)</span><sup data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">b</span></sup></td><td align="left" colspan="1" data-dcnode-id="2494" rowspan="1" valign="top"><span data-dcnode-id="2495" instrument_node="">Deceptive pointing</span></td></tr><tr data-dcnode-id="2490"><td align="left" colspan="1" data-dcnode-id="2491" rowspan="1" valign="top"><span data-dcnode-id="2492" instrument_node="">Tower building</span></td></tr><tr data-dcnode-id="2483"><td align="left" colspan="1" data-dcnode-id="2488" rowspan="1" valign="top"><span data-dcnode-id="2489" instrument_node="">Card sort</span></td><td align="left" colspan="1" data-dcnode-id="2484" rowspan="1" valign="top"><span data-dcnode-id="2487" instrument_node="">Motor sequencing</span><sup data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">b</span></sup></td></tr><tr data-dcnode-id="2478"><td align="left" colspan="1" data-dcnode-id="2481" rowspan="1" valign="top"><span data-dcnode-id="2482" instrument_node="">Appearance-reality</span></td><td align="left" colspan="1" data-dcnode-id="2479" rowspan="1" valign="top"><span data-dcnode-id="2480" instrument_node="">Whisper</span></td></tr><tr data-dcnode-id="2471"><td align="left" colspan="1" data-dcnode-id="2474" rowspan="1" valign="top"><span data-dcnode-id="2477" instrument_node="">Gift delay</span><sup data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">c</span></sup></td><td align="left" colspan="1" data-dcnode-id="2472" rowspan="1" valign="top"><span data-dcnode-id="2473" instrument_node="">Location false belief (explicit)</span></td></tr><tr data-dcnode-id="2465"><td align="left" colspan="1" data-dcnode-id="2467" rowspan="1" valign="top"><span data-dcnode-id="2470" instrument_node="">Pretend actions</span><sup data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">b</span></sup></td><td align="left" colspan="1" data-dcnode-id="2466" rowspan="1" valign="top"></td></tr><tr data-dcnode-id="2461"><td align="left" colspan="1" data-dcnode-id="2463" rowspan="1" valign="top"><span data-dcnode-id="2464" instrument_node="">Grass/snow Stroop</span></td><td align="left" colspan="1" data-dcnode-id="2462" rowspan="1" valign="top"></td></tr></tbody></table></div><div class="largeobj-link align_right" data-dcnode-id="2455" id="largeobj_idm140062966418160"><a data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/table/T1/%3Freport%3Dobjectonly" rel="noopener" target="object"><span data-dcnode-id="2457" instrument_node="">Open in a separate window</span></a></div><div class="tblwrap-foot" data-dcnode-id="2439"><div data-dcnode-id="2451" id="TFN1"><sup data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">a</span></sup><span data-dcnode-id="2452" instrument_node="">The pinball task was administered but excluded from analyses because a digital timer installed in the apparatus was damaged in transit from the United States to China.</span></div><div data-dcnode-id="2447" id="TFN2"><sup data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">b</span></sup><span data-dcnode-id="2448" instrument_node="">The mental-state-control tasks, pretend-actions task, and motor-sequencing task (all control tasks) were administered to the Chinese children to ensure cross-cultural procedural similarities, but analyses involving these tasks are not presented here.</span></div><div data-dcnode-id="2440" id="TFN3"><sup data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">c</span></sup><span data-dcnode-id="2444" instrument_node="">For the gift-delay task, children sat with their back turned to an experimenter, who was noisily wrapping a gift. The children were told not to peek. Because of cross-cultural differences surrounding the pragmatics and custom of gift giving (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2442" href="#R15" rid="R15" role="button"><span data-dcnode-id="2443" instrument_node="">Hua, Wei, &amp; Yuan, 2000</span></a><span data-dcnode-id="2441" instrument_node="">), it seemed likely that the executive-functioning demands of this task were not well matched across cultures. Thus, the data from this task were not included.</span></div></div></div></div><div class="sec sec-last" data-dcnode-id="2291" id="S4"><h3 data-dcnode-id="2435" id="S4title"><span data-dcnode-id="2436" instrument_node="">Measures</span></h3><div class="sec sec-first" data-dcnode-id="2423" id="S5"><p data-dcnode-id="2434"></p><h4 class="inline" data-dcnode-id="2432" id="S5title"><span data-dcnode-id="2433" instrument_node="">Verbal Ability </span></h4><p class="p p-first-last" data-dcnode-id="2424" id="P15"><span data-dcnode-id="2431" instrument_node="">Verbal ability was measured with the Peabody Picture Vocabulary Test–Revised (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2429" href="#R8" rid="R8" role="button"><span data-dcnode-id="2430" instrument_node="">Dunn &amp; Dunn, 1981</span></a><span data-dcnode-id="2428" instrument_node="">) in the U.S. group and with the core vocabulary scale of the Wechsler Preschool and Primary Scale of Intelligence–Revised (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2426" href="#R30" rid="R30" role="button"><span data-dcnode-id="2427" instrument_node="">Wechsler, 1989</span></a><span data-dcnode-id="2425" instrument_node="">) in the Chinese group. Because different measures were used for the two groups, raw scores from each measure were converted to age equivalents using U.S. norms. We used a single standard to ensure that potential population differences in verbal ability would not be muted by using culturally defined age equivalents.</span></p></div><div class="sec" data-dcnode-id="2380" id="S6"><p data-dcnode-id="2422"></p><h4 class="inline" data-dcnode-id="2420" id="S6title"><span data-dcnode-id="2421" instrument_node="">False-Belief Battery </span></h4><div class="sec sec-first" data-dcnode-id="2408" id="S7"><p data-dcnode-id="2419"></p><h5 class="inline" data-dcnode-id="2417" id="S7title"><span data-dcnode-id="2418" instrument_node="">Location False-Belief Tasks </span></h5><p class="p p-first-last" data-dcnode-id="2409" id="P16"><span data-dcnode-id="2416" instrument_node="">In one task (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2414" href="#R33" id="__tag_220782297" rid="R33" role="button"><span data-dcnode-id="2415" instrument_node="">Wimmer &amp; Perner, 1983</span></a><span data-dcnode-id="2413" instrument_node="">), children were asked where a puppet thought his ball was, after it was moved in his absence. The second task was an “explicit” version (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2411" href="#R31" id="__tag_220782312" rid="R31" role="button"><span data-dcnode-id="2412" instrument_node="">Wellman &amp; Bartsch, 1988</span></a><span data-dcnode-id="2410" instrument_node="">) in which children were told that a boy thought a cat was in one place although it was really in another and were then asked where the boy would look for the cat. The score for location false belief was the total correct from both tasks (0–2).</span></p></div><div class="sec" data-dcnode-id="2399" id="S8"><p data-dcnode-id="2407"></p><h5 class="inline" data-dcnode-id="2405" id="S8title"><span data-dcnode-id="2406" instrument_node="">Contents False-Belief Task </span></h5><p class="p p-first-last" data-dcnode-id="2400" id="P17"><span data-dcnode-id="2404" instrument_node="">For this task (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2402" href="#R13" id="__tag_220782293" rid="R13" role="button"><span data-dcnode-id="2403" instrument_node="">Gopnik &amp; Astington, 1988</span></a><span data-dcnode-id="2401" instrument_node="">), the children were shown that a familiar box had unfamiliar contents and then were asked (a) what they had thought was inside before the box was opened and (b) what someone else who had not seen the contents would think was inside (score: 0–2).</span></p></div><div class="sec" data-dcnode-id="2390" id="S9"><p data-dcnode-id="2398"></p><h5 class="inline" data-dcnode-id="2396" id="S9title"><span data-dcnode-id="2397" instrument_node="">Deceptive-Pointing Task </span></h5><p class="p p-first-last" data-dcnode-id="2391" id="P18"><span data-dcnode-id="2395" instrument_node="">For this task (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2393" href="#R4" id="__tag_220782304" rid="R4" role="button"><span data-dcnode-id="2394" instrument_node="">Carlson et al., 1998</span></a><span data-dcnode-id="2392" instrument_node="">), children were instructed to trick an experimenter about an object's location by pointing to an alternative location. Two trials were administered (score: 0–2).</span></p></div><div class="sec sec-last" data-dcnode-id="2381" id="S10"><p data-dcnode-id="2389"></p><h5 class="inline" data-dcnode-id="2387" id="S10title"><span data-dcnode-id="2388" instrument_node="">Appearance-Reality Task </span></h5><p class="p p-first-last" data-dcnode-id="2382" id="P19"><span data-dcnode-id="2386" instrument_node="">On each trial of the appearance-reality task (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2384" href="#R10" id="__tag_335951051" rid="R10" role="button"><span data-dcnode-id="2385" instrument_node="">Flavell, Green, &amp; Flavell, 1986</span></a><span data-dcnode-id="2383" instrument_node="">), the children were shown an object that looked like one thing but was revealed to be another (e.g., a sponge that looked like a rock). They were then asked again what the object looked like and what it really was. Two trials were administered (score: 0–2).</span></p></div></div><div class="sec" data-dcnode-id="2313" id="S11"><p data-dcnode-id="2379"></p><h4 class="inline" data-dcnode-id="2377" id="S11title"><span data-dcnode-id="2378" instrument_node="">Executive-Function Battery </span></h4><div class="sec sec-first" data-dcnode-id="2368" id="S12"><p data-dcnode-id="2376"></p><h5 class="inline" data-dcnode-id="2374" id="S12title"><span data-dcnode-id="2375" instrument_node="">Day/Night Stroop Task </span></h5><p class="p p-first-last" data-dcnode-id="2369" id="P20"><span data-dcnode-id="2373" instrument_node="">For 16 trials of the day/night Stroop task (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2371" href="#R12" id="__tag_220782295" rid="R12" role="button"><span data-dcnode-id="2372" instrument_node="">Gerstadt, Hong, &amp; Diamond, 1994</span></a><span data-dcnode-id="2370" instrument_node="">), the children were instructed to say “day” when they saw a picture of a moon and “night” when they saw a picture of a sun. The score was the proportion correct.</span></p></div><div class="sec" data-dcnode-id="2359" id="S13"><p data-dcnode-id="2367"></p><h5 class="inline" data-dcnode-id="2365" id="S13title"><span data-dcnode-id="2366" instrument_node="">Grass/Snow Stroop Task </span></h5><p class="p p-first-last" data-dcnode-id="2360" id="P21"><span data-dcnode-id="2364" instrument_node="">For 16 trials of the grass/snow Stroop task (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2362" href="#R3" id="__tag_220782300" rid="R3" role="button"><span data-dcnode-id="2363" instrument_node="">Carlson &amp; Moses, 2001</span></a><span data-dcnode-id="2361" instrument_node="">), the children were instructed to point to a green color chip when the experimenter said the word “snow” and to a white color chip when the experimenter said “grass.” The score was the proportion correct.</span></p></div><div class="sec" data-dcnode-id="2350" id="S14"><p data-dcnode-id="2358"></p><h5 class="inline" data-dcnode-id="2356" id="S14title"><span data-dcnode-id="2357" instrument_node="">Bear/Dragon Task </span></h5><p class="p p-first-last" data-dcnode-id="2351" id="P22"><span data-dcnode-id="2355" instrument_node="">For this task (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2353" href="#R25" rid="R25" role="button"><span data-dcnode-id="2354" instrument_node="">Reed, Pien, &amp; Rothbart, 1984</span></a><span data-dcnode-id="2352" instrument_node="">), the children were instructed to do what they were told by the nice bear (e.g., “touch your nose”), but not to do what they were told by the mean dragon. In China, this task was recast as the panda/lion task because of positive cultural associations with dragons. Children were scored for extent of compliance (0–3) on five dragon (or lion) trials (range: 0–15).</span></p></div><div class="sec" data-dcnode-id="2341" id="S15"><p data-dcnode-id="2349"></p><h5 class="inline" data-dcnode-id="2347" id="S15title"><span data-dcnode-id="2348" instrument_node="">Dimensional-Change Card Sort </span></h5><p class="p p-first-last" data-dcnode-id="2342" id="P23"><span data-dcnode-id="2346" instrument_node="">For this task (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2344" href="#R11" rid="R11" role="button"><span data-dcnode-id="2345" instrument_node="">Frye et al., 1995</span></a><span data-dcnode-id="2343" instrument_node="">), the children were instructed to sort cards that varied on two dimensions. First they were asked to sort according to one criterion (shape), and then they were asked to sort by a different criterion (color). The score was the number of correct postswitch sorts that clearly indicated the child was following the new rule (range: 0–3).</span></p></div><div class="sec" data-dcnode-id="2332" id="S16"><p data-dcnode-id="2340"></p><h5 class="inline" data-dcnode-id="2338" id="S16title"><span data-dcnode-id="2339" instrument_node="">Tower-Building Tas </span></h5><p class="p p-first-last" data-dcnode-id="2333" id="P24"><span data-dcnode-id="2337" instrument_node="">For this task (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2335" href="#R17" id="__tag_220782324" rid="R17" role="button"><span data-dcnode-id="2336" instrument_node="">Kochanska, Murray, Jacques, Koenig, &amp; Vandegeest, 1996</span></a><span data-dcnode-id="2334" instrument_node="">), the children were asked to help the experimenter build a tower with cubic wooden blocks by alternating turns in placing the blocks. There were two trials, and the children were scored on the average proportion of blocks placed by the experimenter (range: 0–.5).</span></p></div><div class="sec" data-dcnode-id="2323" id="S17"><p data-dcnode-id="2331"></p><h5 class="inline" data-dcnode-id="2329" id="S17title"><span data-dcnode-id="2330" instrument_node="">KRISP (Kansas Reflection-Impulsivity Scale for Preschoolers) </span></h5><p class="p p-first-last" data-dcnode-id="2324" id="P25"><span data-dcnode-id="2328" instrument_node="">On each trial of this measure (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="2326" href="#R34" rid="R34" role="button"><span data-dcnode-id="2327" instrument_node="">Wright, 1971</span></a><span data-dcnode-id="2325" instrument_node="">), the children were shown a target picture and then asked to identify an exact match to the target from an array of four to six similar pictures. Ten trials were administered, and the children were scored on the number of correct responses (range: 0–10).</span></p></div><div class="sec sec-last" data-dcnode-id="2314" id="S18"><p data-dcnode-id="2322"></p><h5 class="inline" data-dcnode-id="2320" id="S18title"><span data-dcnode-id="2321" instrument_node="">Whisper Task </span></h5><p class="p p-first-last" data-dcnode-id="2315" id="P26"><span data-dcnode-id="2319" instrument_node="">For this task (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2317" href="#R17" id="__tag_220782302" rid="R17" role="button"><span data-dcnode-id="2318" instrument_node="">Kochanska et al., 1996</span></a><span data-dcnode-id="2316" instrument_node="">), the children were sequentially shown pictures of familiar and unfamiliar cartoon characters and asked to whisper the characters' names. The score was the average quality of whisper (0 = regular speaking, 1 = mixed voice, 2 = whisper) in response to known characters (range: 0–2).</span></p></div></div><div class="sec sec-last" data-dcnode-id="2292" id="S19"><p data-dcnode-id="2312"></p><h4 class="inline" data-dcnode-id="2310" id="S19title"><span data-dcnode-id="2311" instrument_node="">Task Translation </span></h4><p class="p p-first-last" data-dcnode-id="2293" id="P27"><span data-dcnode-id="2309" instrument_node="">Cross-cultural comparisons are most valid when the protocols are as similar as possible (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2307" href="#R2" id="__tag_220782313" rid="R2" role="button"><span data-dcnode-id="2308" instrument_node="">Callaghan et al., 2005</span></a><span data-dcnode-id="2306" instrument_node="">). The English-language scripts used by </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2304" href="#R3" id="__tag_220782319" rid="R3" role="button"><span data-dcnode-id="2305" instrument_node="">Carlson and Moses (2001)</span></a><span data-dcnode-id="2303" instrument_node=""> were first translated into Mandarin Chinese by two native Mandarin speakers who were certified by the Chinese government as fluent and literate in English as a second language. The translations were then back-translated to English by another Chinese-English bilingual speaker. Two native English speakers unfamiliar with Mandarin then compared the back-translations with the original English-language scripts, to check for accuracy. Substantive differences (i.e., true changes in meaning) were rectified through discussion, and the resulting translated scripts were used to administer the tasks. For all translations of false-belief tasks, the Mandarin term </span><em data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">yiwei</span></em><span data-dcnode-id="2300" instrument_node=""> was used for the English term </span><em data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">think</span></em><span data-dcnode-id="2297" instrument_node="">, because it is most often used to denote a belief that might be false (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="2295" href="#R18" id="__tag_220782311" rid="R18" role="button"><span data-dcnode-id="2296" instrument_node="">Lee et al., 1999</span></a><span data-dcnode-id="2294" instrument_node="">).</span></p></div></div></div><div class="tsec sec" data-dcnode-id="1838" id="S20"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="2287"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="2288" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="2289" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="2285" id="S20title"><span data-dcnode-id="2286" instrument_node="">RESULTS</span></h2><p class="p p-first" data-dcnode-id="2283" id="P28"><span data-dcnode-id="2284" instrument_node="">Dependent measures from all tasks were standardized across the entire data set, collapsing across country and age. All analyses were performed on the standardized data.</span></p><div class="sec" data-dcnode-id="2264" id="S21"><h3 data-dcnode-id="2281" id="S21title"><span data-dcnode-id="2282" instrument_node="">Preliminary Analyses</span></h3><p class="p p-first" data-dcnode-id="2267" id="P29"><span data-dcnode-id="2280" instrument_node="">The verbal mental ages of the Chinese and U.S. samples were nearly identical (U.S.: </span><em data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">M</span></em><span data-dcnode-id="2277" instrument_node=""> = 54.02 months, </span><em data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">SD</span></em><span data-dcnode-id="2274" instrument_node=""> = 11.74; Chinese: </span><em data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">M</span></em><span data-dcnode-id="2271" instrument_node=""> = 53.47 months, </span><em data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">SD</span></em><span data-dcnode-id="2268" instrument_node=""> = 11.74). Thus, verbal ability was not included in analyses that involved cross-cultural comparisons. However, verbal ability was retained as a control in the within-culture analyses investigating the relation between executive functioning and theory of mind.</span></p><p class="p p-last" data-dcnode-id="2265" id="P30"><span data-dcnode-id="2266" instrument_node="">Preliminary Age × Country × Sex analyses of variance (ANOVAs) showed that sex was a significant or near-significant predictor of performance on many of the tasks. Girls tended to outperform boys on the theory-of-mind and executive-functioning tasks. Sex did not interact with age or country in any of these analyses. Nonetheless, we included sex as a covariate in our analyses to ensure that main effects of country or age could not be attributed to, or obscured by, effects of sex.</span></p></div><div class="sec" data-dcnode-id="1928" id="S22"><h3 data-dcnode-id="2262" id="S22title"><span data-dcnode-id="2263" instrument_node="">Executive-Functioning Analysis</span></h3><p class="p p-first" data-dcnode-id="2234" id="P31"><span data-dcnode-id="2261" instrument_node="">A 3 (age) × 2 (country) multivariate analysis of covariance (MANCOVA) with the standardized scores from the executive-functioning tasks as the dependent measures and sex as a covariate revealed a significant main effect of age, </span><em data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">F</span></em><span data-dcnode-id="2258" instrument_node="">(14, 388) = 5.65, </span><em data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">p</span></em><span data-dcnode-id="2255" instrument_node=""> &lt; .01, η</span><sup data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">2</span></sup><span data-dcnode-id="2252" instrument_node=""> = .34, and a significant main effect of country, </span><em data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">F</span></em><span data-dcnode-id="2249" instrument_node="">(7, 193) = 4.32, </span><em data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">p</span></em><span data-dcnode-id="2246" instrument_node=""> &lt; .01, η</span><sup data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">2</span></sup><span data-dcnode-id="2243" instrument_node=""> = .14. The Age × Country interaction was not significant. The main effects of age and country for each of the executive-functioning tasks are illustrated in </span><a class="fig-table-link figpopup" co-legend-rid="lgnd_F1" data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/figure/F1/" rid-figpopup="F1" rid-ob="ob-F1" target="figure"><span data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">Figure 1</span></span></a><span data-dcnode-id="2239" instrument_node="">. Follow-up univariate Age × Country analyses of covariance (ANCOVAs; see </span><a class="fig-table-link figpopup" co-legend-rid="" data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/table/T2/" rid-figpopup="T2" rid-ob="ob-T2" target="table"><span data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Table 2</span></span></a><span data-dcnode-id="2235" instrument_node="">) showed that children's performance improved significantly with age in all tasks except the whisper and day/night Stroop tasks, and Chinese children significantly outperformed U.S. children on all seven of the executive-functioning tasks.</span></p><div class="fig iconblock whole_rhythm" co-legend-rid="lgnd_F1" data-dcnode-id="2213" id="F1"><a data-dcnode-id="2230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/figure/F1/" rid-figpopup="F1" rid-ob="ob-F1" target="figure"></a><div class="figure" data-dcnode-id="2225" data-largeobj="" data-largeobj-link-rid="largeobj_idm140062965637600"><a data-dcnode-id="2229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/figure/F1/" rid-figpopup="F1" rid-ob="ob-F1" target="figure"></a><a class="inline_block ts_canvas" data-dcnode-id="2226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/core/lw/2.0/html/tileshop_pmc/tileshop_pmc_inline.html%3Ftitle%3DClick%2520on%2520image%2520to%2520zoom%26p%3DPMC3%26id%3D2567057_nihms-69302-f0001.jpg" rel="noopener" target="tileshopwindow"><div class="ts_bar small" data-dcnode-id="2228" title="Click on image to zoom"></div><img alt="An external file that holds a picture, illustration, etc.
Object name is nihms-69302-f0001.jpg" class="tileshop" data-dcnode-id="2227" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/bin/nihms-69302-f0001.jpg&amp;raw" title="Click on image to zoom"></a></div><div class="largeobj-link align_right" data-dcnode-id="2222" id="largeobj_idm140062965637600" style="display: none;"><a data-dcnode-id="2223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/figure/F1/%3Freport%3Dobjectonly" rel="noopener" target="object"><span data-dcnode-id="2224" instrument_node="">Open in a separate window</span></a></div><div class="icnblk_cntnt" data-dcnode-id="2214" id="lgnd_F1"><div data-dcnode-id="2219"><a class="figpopup" data-dcnode-id="2220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2567057/figure/F1/" rid-figpopup="F1" rid-ob="ob-F1" target="figure"><span data-dcnode-id="2221" instrument_node="">Fig. 1</span></a></div><div class="caption" data-dcnode-id="2215"><p data-dcnode-id="2216" id="__p2"><span data-dcnode-id="2217" instrument_node="">Chinese and U.S. preschoolers' standardized performance on the executive-function tasks, by age. Performance is graphed separately for each of the seven tasks, as well as the aggregate executive-function score. KRISP = Kansas Reflection-Impulsivity Scale for Preschoolers.</span></p></div></div></div><div class="table-wrap anchored whole_rhythm" data-dcnode-id="1939" id="T2"><h3 data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">TABLE 2</span></h3><div class="caption" data-dcnode-id="2205"><p data-dcnode-id="2206" id="__p5"><span data-dcnode-id="2207" instrument_node="">Summary of Age × Country Analyses of Covariance for the Executive-Function and Theory-of-Mind Tasks</span></p></div><div class="xtable" data-dcnode-id="1964"><table class="rendered small default
