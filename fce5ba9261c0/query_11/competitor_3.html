</span><h1 class="title" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Development of the Spine</span></h1><span data-dcnode-id="844" instrument_node="">
</span></div><span data-dcnode-id="842" instrument_node=""> </span><span data-dcnode-id="840" instrument_node="">
</span><div data-dcnode-id="120" id="left"><span data-dcnode-id="839" instrument_node="">
</span><article class="post-144607 post type-post status-publish format-standard has-post-thumbnail hentry category-orthopedic tag-rothman-simeone-the-spine-expert-consult pmpro-has-access" data-dcnode-id="153" id="post-144607"><span data-dcnode-id="838" instrument_node="">
</span><div class="post-full single" data-dcnode-id="276"><span data-dcnode-id="837" instrument_node="">
</span><article class="post-144607 post type-post status-publish format-standard has-post-thumbnail hentry category-orthopedic tag-rothman-simeone-the-spine-expert-consult pmpro-has-access" data-dcnode-id="277" id="post-144607"><span data-dcnode-id="836" instrument_node="">
</span><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="833"></p><p class="title_document" data-dcnode-id="829"><span class="document_number" data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">CHAPTER 1</span></span><span data-dcnode-id="830" instrument_node=""> Development of the Spine</span></p><span data-dcnode-id="828" instrument_node="">
</span><div class="author_group" data-dcnode-id="819"><span data-dcnode-id="827" instrument_node="">
</span><p class="title_author" data-dcnode-id="820"><a data-dcnode-id="825" id="au0010"><span data-dcnode-id="826" instrument_node="">Christopher M. Bono, MD, </span></a><a data-dcnode-id="823" id="au0015"><span data-dcnode-id="824" instrument_node="">Wesley W. Parke, PhD, </span></a><a data-dcnode-id="821" id="au0020"><span data-dcnode-id="822" instrument_node="">Steven R. Garfin, MD</span></a></p></div><a data-dcnode-id="817" id="au0020"><span data-dcnode-id="818" instrument_node="">
</span></a><p class="para_indented" data-dcnode-id="787"><a data-dcnode-id="816" id="au0020"></a><a data-dcnode-id="814" id="p0010"><span data-dcnode-id="815" instrument_node="">The embryologic development of the human spine is an enormously complex process that is only partially understood. Differentiation of the pluripotent tissues of the embryo leads to early formation of a repetitive segmented vertebral structure. Because the embryo is exquisitely susceptible to malformation and developmental error, each step of formation is critical.</span></a><a data-dcnode-id="811" href="#bib1"><sup data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">1</span></sup></a><sup data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">–</span></sup><a data-dcnode-id="806" href="#bib4"><sup data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">4</span></sup></a><span data-dcnode-id="805" instrument_node=""> Familiarity with these various steps can be helpful in understanding not only congenital syndromes, but also the possible developmental role concerning predisposition to some degenerative spinal processes, typically considered “wear and tear” conditions.</span><a data-dcnode-id="802" href="#bib5"><sup data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">5</span></sup></a><sup data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">,</span></sup><a data-dcnode-id="797" href="#bib6"><sup data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">6</span></sup></a><span data-dcnode-id="796" instrument_node=""> The continuously expanding understanding of the genetic basis of life, with the genetics of spinal development no exception, has aided the understanding of these syndromes.</span><a data-dcnode-id="793" href="#bib7"><sup data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">7</span></sup></a><sup data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">–</span></sup><a data-dcnode-id="788" href="#bib13"><sup data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">13</span></sup></a></p><span data-dcnode-id="786" instrument_node="">
</span><p class="para_indented" data-dcnode-id="780"><a data-dcnode-id="781" id="p0015"><span data-dcnode-id="785" instrument_node="">Fundamental to understanding spinal embryology is the concept of metamerism. In principle, </span><em data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">metamerism</span></em><span data-dcnode-id="782" instrument_node=""> is the development of a highly specialized organism, with multifunctional organ systems, from many anatomically similar segments arranged in a linear fashion. This is particularly easy to conceptualize in the spine because the fully developed spine comprises numerous units with similar shape, arrangement, and function. Metamerism also pertains to the development of the appendages from the metameres, however, which do not have such repetitive arrangement of consecutive units.</span></a></p><a data-dcnode-id="778" id="p0015"><span data-dcnode-id="779" instrument_node="">
</span></a><p class="para_indented" data-dcnode-id="765"><a data-dcnode-id="777" id="p0015"></a><a data-dcnode-id="766" id="p0020"><span data-dcnode-id="776" instrument_node="">In embryonic development, the metameric segments are called </span><em data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">somites</span></em><span data-dcnode-id="773" instrument_node="">. Primitively, all somites have the same developmental potential. Genetic signaling, specific to the species, determines the degree of regional specialization, such as limbs in mammals versus fins in fish or the lack thereof in snakes. Using these comparative examples, one can also understand the concepts of isomerism and anisomerism. </span><em data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Isomerism</span></em><span data-dcnode-id="770" instrument_node=""> is characteristic of more primitive animals, in which the number of somites is greater but more uniform and not so highly specialized. This is akin to the snake, which has a great number of vertebral units sustaining its long body, but no limbs. In contrast, </span><em data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">anisomerism</span></em><span data-dcnode-id="767" instrument_node=""> is present in more developed species, such as mammals, in which many of the somites have been deleted (resulting in a lesser number of vertebrae), whereas the remaining somites are more highly specialized so that complex, specialized appendages can be developed.</span></a></p><a data-dcnode-id="763" id="p0020"><span data-dcnode-id="764" instrument_node="">
</span></a><p class="para_indented" data-dcnode-id="759"><a data-dcnode-id="762" id="p0020"></a><a data-dcnode-id="760" id="p0025"><span data-dcnode-id="761" instrument_node="">Although the mature vertebral column is composed of numerous similar units, the tissues within each of those units are highly specialized. The vertebrae, discs, nerves, and blood vessels have embryologic precursors that form according to rapidly dynamic interstructural relationships. This chapter provides the essentials of human spinal development as they relate to the fully developed structure to understand its form, function, and various pathologic possibilities better.</span></a></p><a data-dcnode-id="757" id="p0025"><span data-dcnode-id="758" instrument_node="">
</span></a><div class="sc1" data-dcnode-id="607"><a data-dcnode-id="756" id="p0025"></a><a data-dcnode-id="754" id="s0010"><span data-dcnode-id="755" instrument_node="">
</span></a><h1 class="head1" data-dcnode-id="750"><a data-dcnode-id="753" id="s0010"></a><a data-dcnode-id="751" id="st0010"><span data-dcnode-id="752" instrument_node="">Early Embryologic Spine Precursors: Day 17 to Week 4</span></a></h1><a data-dcnode-id="748" id="st0010"><span data-dcnode-id="749" instrument_node="">
</span></a><p class="para_fl" data-dcnode-id="738"><a data-dcnode-id="747" id="st0010"></a><a data-dcnode-id="745" id="p0030"><span data-dcnode-id="746" instrument_node="">The development of the human spine begins on the 17th day of gestation. This is within the triploblastic stage of the embryo, during which it is shaped as a disc (Figs. 1–1 and </span></a><a data-dcnode-id="743" href="#f0015"><span data-dcnode-id="744" instrument_node="">1–2</span></a><span data-dcnode-id="742" instrument_node="">). On one side of the disc is the amnion cavity, and on the other is the yolk sac. On the dorsal layer (which is in contact with the amnion) of the disc, there are epiblastic cells that converge and invaginate into the disc to form the primitive pit or node. When embedded within the tissue, it forms a tubelike structure that extends craniad, “burrowing” deep to the embryonic disc along its ventral surface. The tube cavity is in continuity with the amniotic fluid. This extension is known as the </span><em data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">notochordal tube</span></em><span data-dcnode-id="739" instrument_node="">.</span></p><span data-dcnode-id="737" instrument_node="">
</span><div class="figure" data-dcnode-id="722"><a data-dcnode-id="734" id="f0010"><img alt="image" data-dcnode-id="736" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/wp-content/uploads/2016/07/B9781416067269000018_f001-001-9781416067269.jpg&amp;raw"><span data-dcnode-id="735" instrument_node="">
</span></a><p class="figure_legend" data-dcnode-id="727"><a data-dcnode-id="730" id="f0010"><span class="fig_num" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">FIGURE 1–1</span></span><span data-dcnode-id="731" instrument_node=""> </span></a><a data-dcnode-id="728" id="sp0010"><span data-dcnode-id="729" instrument_node="">During triploblastic stage (17th day of gestation), the embryo is shaped as a disc. EEC, extraembryonic coelom.</span></a></p><a data-dcnode-id="723" id="sp0010"><span data-dcnode-id="726" instrument_node="">
</span><p class="source" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">(From Brooks M, Zietman AL: Clinical Embryology: A Color Atlas and Text. Boca Raton, FL, CRC Press, 1998, p 57.)</span></p></a></div><a data-dcnode-id="720" id="sp0010"><span data-dcnode-id="721" instrument_node="">
</span></a><div class="figure" data-dcnode-id="696"><a data-dcnode-id="719" id="sp0010"></a><a data-dcnode-id="716" id="f0015"><img alt="image" data-dcnode-id="718" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/wp-content/uploads/2016/07/B9781416067269000018_f001-002ac-9781416067269.jpg&amp;raw"><span data-dcnode-id="717" instrument_node="">
</span></a><p class="figure_legend" data-dcnode-id="701"><a data-dcnode-id="712" id="f0015"><span class="fig_num" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">FIGURE 1–2</span></span><span data-dcnode-id="713" instrument_node=""> </span></a><a data-dcnode-id="702" id="sp0015"><strong data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">A,</span></strong><span data-dcnode-id="709" instrument_node=""> On one side of the disc is the amniotic cavity, and on the other is the yolk sac. The notochordal tube “burrows” deep into the embryonic disc. </span><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">B,</span></strong><span data-dcnode-id="706" instrument_node=""> When the ventral wall of the notochordal tube contacts the yolk sac, it disintegrates. </span><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">C,</span></strong><span data-dcnode-id="703" instrument_node=""> Remaining dorsal wall cells thicken to form the notochordal plate; this matures and thickens to become the notochord.</span></a></p><a data-dcnode-id="697" id="sp0015"><span data-dcnode-id="700" instrument_node="">
</span><p class="source" data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">(From Brooks M, Zietman AL: Clinical Embryology: A Color Atlas and Text. Boca Raton, FL, CRC Press, 1998, p 57.)</span></p></a></div><a data-dcnode-id="694" id="sp0015"><span data-dcnode-id="695" instrument_node="">
</span></a><p class="para_indented" data-dcnode-id="681"><a data-dcnode-id="693" id="sp0015"></a><a data-dcnode-id="682" id="p0035"><span data-dcnode-id="692" instrument_node="">At this point, the ventral wall of the notochordal tube is in contact with the yolk sac, which causes disintegration of these cells. A flat remnant of dorsal wall cells from the notochordal tube form the notochordal plate on the 19th day. This plate matures and thickens to form a solid round structure known as the </span><em data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">notochord</span></em><span data-dcnode-id="689" instrument_node="">. The yolk sac reforms, which obliterates the temporary communication between the amnion and the yolk sac (</span><em data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">note</span></em><span data-dcnode-id="686" instrument_node="">: persistence of this yolk sac/amnion communication is lethal). The presence of the notochord induces a thickening in the overlying ectodermal cells, which are fated to become neuroectodermal cells. The thickening forms the neural plate. At this time, the neural plate is in continuity with the amniotic cavity. On the 18th day, the sides of the plate begin to curl up to form a tube. When the edges have fused together, it is known as the </span><em data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">neural tube</span></em><span data-dcnode-id="683" instrument_node="">. The amniotic fluid trapped inside is the precursor to spinal fluid.</span></a></p><a data-dcnode-id="679" id="p0035"><span data-dcnode-id="680" instrument_node="">
</span></a><p class="para_indented" data-dcnode-id="672"><a data-dcnode-id="678" id="p0035"></a><a data-dcnode-id="676" id="p0040"><span data-dcnode-id="677" instrument_node="">The notochord lies ventral to the neural tube in the midline. Mesodermal tissues on either side of these structures condense to form longitudinal columns. By the 19th day, there are three distinct columns on either side of the midline: (1) medial paraxial columns, which give rise to the somites; (2) intermediate mesodermal columns, which form the urogenital organs; and (3) lateral mesodermal plates, which form the gut cavities. In considering the development of the spine, attention is focused on the medial paraxial columns. The juxtaposition to the intermediate columns may help explain, however, why abnormalities of the urogenital tract are frequently associated with vertebral anomalies.</span></a><a data-dcnode-id="673" href="#bib1"><sup data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">1</span></sup></a></p><span data-dcnode-id="671" instrument_node="">
</span><p class="para_indented" data-dcnode-id="668"><a data-dcnode-id="669" id="p0045"><span data-dcnode-id="670" instrument_node="">The somites are arranged in consecutive fashion along the dorsal aspect of the embryo. They are first formed in the rostral (or cranial) aspect of the embryo, continuing caudad to form 42 to 44 individual segments over a period of days where the medial paraxial columns previously existed. Because they are close to the dorsal surface, they are visibly apparent as a series of beaded elevations (Fig. 1–3).</span></a></p><a data-dcnode-id="666" id="p0045"><span data-dcnode-id="667" instrument_node="">
</span></a><div class="figure" data-dcnode-id="654"><a data-dcnode-id="665" id="p0045"></a><a data-dcnode-id="662" id="f0020"><img alt="image" data-dcnode-id="664" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/wp-content/uploads/2016/07/B9781416067269000018_f001-003-9781416067269.jpg&amp;raw"><span data-dcnode-id="663" instrument_node="">
</span></a><p class="figure_legend" data-dcnode-id="655"><a data-dcnode-id="658" id="f0020"><span class="fig_num" data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">FIGURE 1–3</span></span><span data-dcnode-id="659" instrument_node=""> </span></a><a data-dcnode-id="656" id="sp0020"><span data-dcnode-id="657" instrument_node="">Somites of the human embryo are externally represented as a series of dorsolateral swellings.</span></a></p></div><a data-dcnode-id="652" id="sp0020"><span data-dcnode-id="653" instrument_node="">
</span></a><p class="para_indented" data-dcnode-id="645"><a data-dcnode-id="651" id="sp0020"></a><a data-dcnode-id="649" id="p0050"><span data-dcnode-id="650" instrument_node="">Within the somite different regions have specialized fates (Figs. 1–4 and </span></a><a data-dcnode-id="647" href="#f0030"><span data-dcnode-id="648" instrument_node="">1–5</span></a><span data-dcnode-id="646" instrument_node="">). The dorsolateral cells become the dermomyotomes. These eventually give rise to the skin (lateral) and muscle (medial) overlying the spine. The ventromedial cells within the somite become the sclerotomes. These are the precursors of the skeletal components (vertebrae) of the spine. The neural tube is fated to become the spinal cord.</span></p><span data-dcnode-id="644" instrument_node="">
</span><div class="figure" data-dcnode-id="633"><a data-dcnode-id="641" id="f0025"><img alt="image" data-dcnode-id="643" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/wp-content/uploads/2016/07/B9781416067269000018_f001-004-9781416067269.jpg&amp;raw"><span data-dcnode-id="642" instrument_node="">
</span></a><p class="figure_legend" data-dcnode-id="634"><a data-dcnode-id="637" id="f0025"><span class="fig_num" data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">FIGURE 1–4</span></span><span data-dcnode-id="638" instrument_node=""> </span></a><a data-dcnode-id="635" id="sp0025"><span data-dcnode-id="636" instrument_node="">Cross section of thoracic somite in a chick embryo. The notochord (n) underlies the neural tube (nt). The somite is divided into dermatome (d), myotome (m), and sclerotome (s). Lateral to this, the somatic mesoderm (sm), endoderm (end), and ectoderm (ect) are shown. Ventral to the sclerotomes lie the paired dorsal aortae (da).</span></a></p></div><a data-dcnode-id="631" id="sp0025"><span data-dcnode-id="632" instrument_node="">
</span></a><div class="figure" data-dcnode-id="608"><a data-dcnode-id="630" id="sp0025"></a><a data-dcnode-id="627" id="f0030"><img alt="image" data-dcnode-id="629" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/wp-content/uploads/2016/07/B9781416067269000018_f001-005ab-9781416067269.jpg&amp;raw"><span data-dcnode-id="628" instrument_node="">
</span></a><p class="figure_legend" data-dcnode-id="609"><a data-dcnode-id="623" id="f0030"><span class="fig_num" data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">FIGURE 1–5</span></span><span data-dcnode-id="624" instrument_node=""> </span></a><a data-dcnode-id="610" id="sp0030"><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">A,</span></strong><span data-dcnode-id="620" instrument_node=""> Cross section of pig embryo. </span><em data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Arrows</span></em><span data-dcnode-id="617" instrument_node=""> indicate the direction of somite cell migration to form the vertebral process (vp), costal process (cp), and centrum (cent). The neural tube shows the anterior horn masses and the dorsal root ganglia. </span><strong data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">B,</span></strong><span data-dcnode-id="614" instrument_node=""> Cartilaginous vertebral arch (va) and costal process (cost) are evident, as is the myotomic precursor to the spinal muscles (myo). </span><em data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Arrow</span></em><span data-dcnode-id="611" instrument_node=""> indicates the intracentral vestige of the notochord, called the mucoid streak.</span></a></p></div></div><a data-dcnode-id="605" id="sp0030"><span data-dcnode-id="606" instrument_node="">
</span></a><div class="sc1" data-dcnode-id="349"><a data-dcnode-id="604" id="sp0030"></a><a data-dcnode-id="602" id="s0015"><span data-dcnode-id="603" instrument_node="">
</span></a><h1 class="head1" data-dcnode-id="598"><a data-dcnode-id="601" id="s0015"></a><a data-dcnode-id="599" id="st0015"><span data-dcnode-id="600" instrument_node="">From Somites to Spinal Column</span></a></h1><a data-dcnode-id="596" id="st0015"><span data-dcnode-id="597" instrument_node="">
</span></a><p class="para_fl" data-dcnode-id="592"><a data-dcnode-id="595" id="st0015"></a><a data-dcnode-id="593" id="p0055"><span data-dcnode-id="594" instrument_node="">The sclerotomes, myotomes, notochord, and neural tube eventually develop into the discoligamentous vertebral complex, paraspinal musculature, nucleus pulposus, and neural elements. This development is achieved through numerous sequential steps and stages.</span></a></p><a data-dcnode-id="590" id="p0055"><span data-dcnode-id="591" instrument_node="">
</span></a><div class="sc2" data-dcnode-id="515"><a data-dcnode-id="589" id="p0055"></a><a data-dcnode-id="587" id="s0020"><span data-dcnode-id="588" instrument_node="">
</span></a><h2 class="head2" data-dcnode-id="583"><a data-dcnode-id="586" id="s0020"></a><a data-dcnode-id="584" id="st0020"><span data-dcnode-id="585" instrument_node="">Precartilaginous (Mesenchymal) Stage: Weeks 4 and 5</span></a></h2><a data-dcnode-id="581" id="st0020"><span data-dcnode-id="582" instrument_node="">
</span></a><p class="para_fl" data-dcnode-id="577"><a data-dcnode-id="580" id="st0020"></a><a data-dcnode-id="578" id="p0060"><span data-dcnode-id="579" instrument_node="">The mesenchymal cells within the sclerotome divide into three main regions. One immediately surrounds the notochord. This region is the precursor for the vertebral bodies and the anulus fibrosus portion of the intervertebral discs. A second region surrounds the neural tube; this is destined to develop into the posterior arch of the vertebra. The third region of cells is within the body wall and is related to extraspinal tissue.</span></a></p><a data-dcnode-id="575" id="p0060"><span data-dcnode-id="576" instrument_node="">
</span></a><p class="para_indented" data-dcnode-id="559"><a data-dcnode-id="574" id="p0060"></a><a data-dcnode-id="572" id="p0065"><span data-dcnode-id="573" instrument_node="">In metameric fashion, the sclerotomes are organized into a consecutively stacked arrangement. The next step in spinal development has been explained by the “resegmentation” theory.</span></a><a data-dcnode-id="569" href="#bib14"><sup data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">14</span></sup></a><sup data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">–</span></sup><a data-dcnode-id="564" href="#bib18"><sup data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">18</span></sup></a><span data-dcnode-id="563" instrument_node=""> </span><em data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Resegmentation</span></em><span data-dcnode-id="560" instrument_node=""> describes the division of each sclerotome into a cranial and caudal half. The cranial half is loosely arranged, whereas the caudal half is composed of densely packed cells. A small portion of the densely packed cells migrate superiorly to form the annular portion of the intervertebral disc, surrounding the notochord. Most of the densely packed cells fuse with the loosely packed cells of the adjacent caudal sclerotome. This fusion creates the centrum, the precursor of the vertebral body. The centrum develops from portions of two neighboring sclerotomes. This has significance on the anatomy of the fully developed spinal column. Initially, the segmental nerve precursors are located at the midportion of each sclerotome, whereas the segmental artery lies at the junction between two adjacent levels. After resegmentation, the nerve lies at the level of the disc and the artery lies at the mid-centrum, where one would expect to find them in the fully developed specimen.</span></p><span data-dcnode-id="558" instrument_node="">
</span><p class="para_indented" data-dcnode-id="543"><a data-dcnode-id="556" id="p0070"><span data-dcnode-id="557" instrument_node="">Experimental data support the resegmentation theory.</span></a><a data-dcnode-id="553" href="#bib8"><sup data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">8,</span></sup></a><a data-dcnode-id="550" href="#bib19"><sup data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">19</span></sup></a><sup data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">–</span></sup><a data-dcnode-id="545" href="#bib22"><sup data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">22</span></sup></a><span data-dcnode-id="544" instrument_node=""> The crux of these experiments includes implanting a quail somite (from a quail embryo) within a chick embryo’s native somites. The quail somite is juxtaposed to a chick somite, and they develop together as the embryo grows. The quail tissue can be differentiated from the chick tissue using special staining techniques. Eventually, the somites give rise to sclerotomes that develop into centra. With the use of this model, it has been shown that the centrum does arise from the caudal and cranial halves of adjacent sclerotomes. The posterior arches (i.e., laminae) appear to follow this same pattern of growth.</span></p><span data-dcnode-id="542" instrument_node="">
</span><p class="para_indented" data-dcnode-id="516"><a data-dcnode-id="534" id="p0075"><span data-dcnode-id="541" instrument_node="">This process seems to be highly influenced by the </span><em data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Pax1</span></em><span data-dcnode-id="538" instrument_node=""> and </span><em data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Pax9</span></em><span data-dcnode-id="535" instrument_node=""> genes.</span></a><a data-dcnode-id="531" href="#bib22"><sup data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">22</span></sup></a><span data-dcnode-id="530" instrument_node=""> It is unclear whether the spinous process develops from one sclerotome or two adjacent levels.</span><a data-dcnode-id="527" href="#bib8"><sup data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">8</span></sup></a><sup data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">,</span></sup><a data-dcnode-id="522" href="#bib22"><sup data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">22</span></sup></a><span data-dcnode-id="521" instrument_node=""> Other investigators have produced evidence of resegmentation using genetic labeling techniques.</span><a data-dcnode-id="518" href="#bib20"><sup data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">20</span></sup></a><span data-dcnode-id="517" instrument_node=""> These studies involved injection of retroviral particles containing the lacZ transducing vector BAG into a single somite of a chick embryo. In other words, a single somite was genetically altered so that its cells would produce the lacZ gene product—the protein β-galactosidase. When the investigators evaluated the developed embryo, they detected β-galactosidase in the caudal and cranial halves of two adjacent vertebrae, suggesting that cells from the labeled somite were incorporated into two neighboring vertebrae.</span></p></div><span data-dcnode-id="514" instrument_node="">
</span><div class="sc2" data-dcnode-id="485"><a data-dcnode-id="512" id="s0025"><span data-dcnode-id="513" instrument_node="">
</span></a><h2 class="head2" data-dcnode-id="508"><a data-dcnode-id="511" id="s0025"></a><a data-dcnode-id="509" id="st0025"><span data-dcnode-id="510" instrument_node="">Cartilaginous Stage: Weeks 6 and 7</span></a></h2><a data-dcnode-id="506" id="st0025"><span data-dcnode-id="507" instrument_node="">
</span></a><p class="para_fl" data-dcnode-id="498"><a data-dcnode-id="505" id="st0025"></a><a data-dcnode-id="503" id="p0080"><span data-dcnode-id="504" instrument_node="">Before the 6th week, the embryonic spinal precursor is composed of mesenchymal cells. Starting in the 6th week, cartilage-producing centers, or chondrification centers, form within each developing vertebra. Although type II collagen production within the extracellular matrix has been detected in the 5th week, it is most active during the cartilaginous stage; it tapers off during the ossification stage, but its production persists within the notochordal remnants of the nucleus pulposus.</span></a><a data-dcnode-id="500" href="#bib12"><sup data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">12</span></sup></a><span data-dcnode-id="499" instrument_node=""> Two chondrification centers form in each half of the centrum, which eventually fuse into a solid block of cartilage. A hemivertebra is formed because of a failure of chondrification in one half of the vertebral body. The segmental arteries from either side of the centrum fuse at its middle aspect. Chondrification centers also form within each half of the vertebral arch and eventually fuse with each other in the midline and to the posterior aspect of the centrum.</span></p><span data-dcnode-id="497" instrument_node="">
</span><p class="para_indented" data-dcnode-id="490"><a data-dcnode-id="495" id="p0085"><span data-dcnode-id="496" instrument_node="">Next, primitive cartilaginous transverse processes and spinous processes develop from the vertebral arch. More recent evidence has shown that the cartilaginous spinous process is formed from Msx1 and Msx2 (two embryologic proteins), producing mesenchymal cells, which require BMP4 to differentiate.</span></a><a data-dcnode-id="492" href="#bib23"><sup data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">23</span></sup></a><span data-dcnode-id="491" instrument_node=""> These relationships highlight the important interactions of primordial proteins in governing further development of the spine.</span></p><span data-dcnode-id="489" instrument_node="">
</span><p class="para_indented" data-dcnode-id="486"><a data-dcnode-id="487" id="p0090"><span data-dcnode-id="488" instrument_node="">The developing centrum and vertebra have the notochord as a central axis. Intervening segments of loosely packed cells are present between the regions of densely packed cells. The outer disc is formed by these loosely packed cells of the sclerotome, which are fated to become the anulus fibrosus. The notochord disintegrates within the centrum during resegmentation and chondrification except in the region of the intervertebral disc, where some of its cells remain. The nucleus fibrosus is the replacement of the embryologic notochord.</span></a></p></div><a data-dcnode-id="483" id="p0090"><span data-dcnode-id="484" instrument_node="">
</span></a><div class="sc2" data-dcnode-id="350"><a data-dcnode-id="482" id="p0090"></a><a data-dcnode-id="480" id="s0030"><span data-dcnode-id="481" instrument_node="">
</span></a><h2 class="head2" data-dcnode-id="476"><a data-dcnode-id="479" id="s0030"></a><a data-dcnode-id="477" id="st0030"><span data-dcnode-id="478" instrument_node="">Ossification Stage: Week 8 and Beyond</span></a></h2><a data-dcnode-id="474" id="st0030"><span data-dcnode-id="475" instrument_node="">
</span></a><p class="para_fl" data-dcnode-id="460"><a data-dcnode-id="473" id="st0030"></a><a data-dcnode-id="471" id="p0095"><span data-dcnode-id="472" instrument_node="">Primary ossification centers develop in utero. In the spine, ossification centers form within the cartilaginous template. There are three primary ossification centers in the typical embryonic vertebra: one in the center of the centrum and one in each of the vertebra arch halves. At about the 9th week, the preparation for ossification of the centrum is heralded by anterior and posterior excavations of the cartilaginous centrum produced by the invasion of pericostal vessels.</span></a><a data-dcnode-id="468" href="#bib24"><sup data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">24</span></sup></a><span data-dcnode-id="467" instrument_node=""> These vessels produce ventral and dorsal vascular lacunae, which support the initial ossification (</span><a data-dcnode-id="465" href="#f0035"><span data-dcnode-id="466" instrument_node="">Fig. 1–6</span></a><span data-dcnode-id="464" instrument_node="">). Ossification of the centra starts first at the lower thoracic spine working craniad and caudad from that point.</span><a data-dcnode-id="461" href="#bib25"><sup data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">25</span></sup></a></p><span data-dcnode-id="459" instrument_node="">
</span><div class="figure" data-dcnode-id="448"><a data-dcnode-id="456" id="f0035"><img alt="image" data-dcnode-id="458" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/wp-content/uploads/2016/07/B9781416067269000018_f001-006-9781416067269.jpg&amp;raw"><span data-dcnode-id="457" instrument_node="">
</span></a><p class="figure_legend" data-dcnode-id="449"><a data-dcnode-id="452" id="f0035"><span class="fig_num" data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">FIGURE 1–6</span></span><span data-dcnode-id="453" instrument_node=""> </span></a><a data-dcnode-id="450" id="sp0035"><span data-dcnode-id="451" instrument_node="">Lateral radiograph of a 34-week spine. Ossification of the centra starts first at the lower thoracic spine working craniad and caudad from that point.</span></a></p></div><a data-dcnode-id="446" id="sp0035"><span data-dcnode-id="447" instrument_node="">
</span></a><p class="para_indented" data-dcnode-id="438"><a data-dcnode-id="445" id="sp0035"></a><a data-dcnode-id="443" id="p0100"><span data-dcnode-id="444" instrument_node="">Secondary ossification centers develop after birth. In the spine, these appear after puberty. There are five centers: one in the tip of the spinous process, one in each transverse process tip, and one ring epiphysis in the superior and inferior endplates of the vertebral bodies. This development occurs at about 15 or 16 years of age, but eventually these ossification centers fuse in the middle of the 3rd decade (Fig. 1–7).</span></a><a data-dcnode-id="440" href="#bib26"><sup data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">26</span></sup></a><span data-dcnode-id="439" instrument_node=""> The transverse processes of the lower cervical vertebrae, particularly C7, may show an additional costal center of ossification that produces the troublesome cervical rib; this reinforces the concept that all vertebrae primitively had the potential of forming ribs.</span></p><span data-dcnode-id="437" instrument_node="">
</span><div class="figure" data-dcnode-id="426"><a data-dcnode-id="434" id="f0040"><img alt="image" data-dcnode-id="436" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/wp-content/uploads/2016/07/B9781416067269000018_f001-007-9781416067269.jpg&amp;raw"><span data-dcnode-id="435" instrument_node="">
</span></a><p class="figure_legend" data-dcnode-id="427"><a data-dcnode-id="430" id="f0040"><span class="fig_num" data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">FIGURE 1–7</span></span><span data-dcnode-id="431" instrument_node=""> </span></a><a data-dcnode-id="428" id="sp0040"><span data-dcnode-id="429" instrument_node="">Secondary centers of ossification of a thoracic vertebra. The centers at the tips of the spinous and transverse processes appear at 16 years and fuse at approximately 25 years. The ring apophysis of the centrum ossifies at around 14 years and fuses at about 25 years.</span></a></p></div><a data-dcnode-id="424" id="sp0040"><span data-dcnode-id="425" instrument_node="">
</span></a><p class="para_indented" data-dcnode-id="397"><a data-dcnode-id="423" id="sp0040"></a><a data-dcnode-id="418" id="p0105"><span data-dcnode-id="422" instrument_node="">A pair of embryologic joints, known as </span><em data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">neurocentral joints,</span></em><span data-dcnode-id="419" instrument_node=""> is not present in the fully developed spine. These are located at the junction of the vertebral arches and the centrum but are anterior to the site of the future pedicle. Although not true “joints,” they allow expansion of the vertebral arch and spinal canal along with growth of the vertebral body. This expansion is most rapid between 18 and 36 weeks of gestation.</span></a><a data-dcnode-id="415" href="#bib2"><sup data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">2</span></sup></a><span data-dcnode-id="414" instrument_node=""> At birth, the spinal canal diameter at L1 through L4 is approximately 70% of adult size, whereas at L5 it is only 50%.</span><a data-dcnode-id="411" href="#bib2"><sup data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">2</span></sup></a><span data-dcnode-id="410" instrument_node=""> This indicates differential growth within regions of the vertebral column during fetal development. Full adult dimensions are reached by 1 year of life at L3 and L4 levels. The neurocentral joints persist until 3 to 6 years of age. The fusion of the fetal vertebral arches to the centra occurs well anterior to the pedicles, at the site of the neurocentral joints. The definitive vertebral body includes more than just the bone derived from the ossification center of the centrum, so the terms </span><em data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">body</span></em><span data-dcnode-id="407" instrument_node=""> and </span><em data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">centrum</span></em><span data-dcnode-id="404" instrument_node=""> are not accurately interchangeable (</span><a data-dcnode-id="402" href="#f0045"><span data-dcnode-id="403" instrument_node="">Figs. 1–8</span></a><span data-dcnode-id="401" instrument_node=""> and </span><a data-dcnode-id="399" href="#f0050"><span data-dcnode-id="400" instrument_node="">1–9</span></a><span data-dcnode-id="398" instrument_node="">).</span></p><span data-dcnode-id="396" instrument_node="">
</span><div class="figure" data-dcnode-id="379"><a data-dcnode-id="393" id="f0045"><img alt="image" data-dcnode-id="395" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/wp-content/uploads/2016/07/B9781416067269000018_f001-008-9781416067269.jpg&amp;raw"><span data-dcnode-id="394" instrument_node="">
</span></a><p class="figure_legend" data-dcnode-id="380"><a data-dcnode-id="389" id="f0045"><span class="fig_num" data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">FIGURE 1–8</span></span><span data-dcnode-id="390" instrument_node=""> </span></a><a data-dcnode-id="381" id="sp0045"><span data-dcnode-id="388" instrument_node="">Fusion of the fetal vertebral arches to the centra occurs well anterior to the pedicles, at the site of the neurocentral joints. The contributions of the vertebral arches to the dorsolateral parts of the bodies are apparent. The definitive vertebral body includes more than just the bone derived from the ossification center of the centrum, so that the terms </span><em data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">body</span></em><span data-dcnode-id="385" instrument_node=""> and </span><em data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">centrum</span></em><span data-dcnode-id="382" instrument_node=""> are not accurately interchangeable.</span></a></p></div><a data-dcnode-id="377" id="sp0045"><span data-dcnode-id="378" instrument_node="">
</span></a><div class="figure" data-dcnode-id="365"><a data-dcnode-id="376" id="sp0045"></a><a data-dcnode-id="373" id="f0050"><img alt="image" data-dcnode-id="375" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/wp-content/uploads/2016/07/B9781416067269000018_f001-009-9781416067269.jpg&amp;raw"><span data-dcnode-id="374" instrument_node="">
</span></a><p class="figure_legend" data-dcnode-id="366"><a data-dcnode-id="369" id="f0050"><span class="fig_num" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">FIGURE 1–9</span></span><span data-dcnode-id="370" instrument_node=""> </span></a><a data-dcnode-id="367" id="sp0050"><span data-dcnode-id="368" instrument_node="">Neurocentral synchondroses lie well within the vertebral body in all cases. Normally, costovertebral synchondroses develop a true diarthrodial joint only in the thoracic region.</span></a></p></div><a data-dcnode-id="363" id="sp0050"><span data-dcnode-id="364" instrument_node="">
</span></a><p class="para_indented" data-dcnode-id="351"><a data-dcnode-id="362" id="sp0050"></a><a data-dcnode-id="360" id="p0110"><span data-dcnode-id="361" instrument_node="">It is commonly thought that isthmic spondylolysis occurs because of a stress-type fracture within the pars interarticularis of the lower lumbar vertebrae, most commonly L5. Specific anatomic features of the adult lumbar spine, such as variation of the dimensions of the “lateral buttress” within the lumbar spine, have been described. Prenatal factors have been sought, but with limited success. Sagi and colleagues</span></a><a data-dcnode-id="357" href="#bib5"><sup data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">5</span></sup></a><span data-dcnode-id="356" instrument_node=""> analyzed histomorphologically the lumbar spines of fetal spines aged 8 to 20 weeks to determine the sequence and location of ossification of the pars interarticularis of the various levels. They reported several findings: First, the pars begins to ossify in the 12th to 13th week of gestation. In the upper lumbar levels, ossification begins at the posterior portion of the pedicle and continues caudad, creating uniform ossification and trabeculation of the pars interarticularis. In contrast, the pars of the lower lumbar levels begins within the center of the pars itself, extending from this point to connect to the neighboring structures. Sagi and colleagues</span><a data-dcnode-id="353" href="#bib5"><sup data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">5</span></sup></a><span data-dcnode-id="352" instrument_node=""> found that this resulted in uneven ossification. This finding may help explain areas of weakness within the pars interarticularis of the lower lumbar levels and may suggest that there is a prenatal predilection for a stress fracture in most individuals.</span></p></div></div><span data-dcnode-id="348" instrument_node="">
</span><div class="sc1" data-dcnode-id="292"><a data-dcnode-id="346" id="s0035"><span data-dcnode-id="347" instrument_node="">
</span></a><h1 class="head1" data-dcnode-id="342"><a data-dcnode-id="345" id="s0035"></a><a data-dcnode-id="343" id="st0035"><span data-dcnode-id="344" instrument_node="">Fate of the Notochord</span></a></h1><a data-dcnode-id="340" id="st0035"><span data-dcnode-id="341" instrument_node="">
</span></a><p class="para_fl" data-dcnode-id="329"><a data-dcnode-id="339" id="st0035"></a><a data-dcnode-id="337" id="p0115"><span data-dcnode-id="338" instrument_node="">In the early embryo, the notochord serves as a rigid template around which the future vertebral column develops. It is a uniform structure that is present throughout the entire length of the primordial spinal column. A sheath exists around the notochord in its early stages. Immunohistochemical staining studies of 4- and 5-week embryos identified that a complex of extracellular matrix molecules is already present within this sheath, including sulfated glycosaminoglycans, hyaluronic acid, fibronectin, laminin, tenascin, and collagen II.</span></a><a data-dcnode-id="334" href="#bib27"><sup data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">27</span></sup></a><span data-dcnode-id="333" instrument_node=""> Aggrecan, keratan sulfate, and other large aggregating proteoglycans (present in the mature spine) were not detected at this stage, suggesting that these appear later in development. The notochordal cells themselves showed reactivity to transforming growth factor-β, suggesting an early influence of this growth factor on the developing extracellular matrix milieu.</span><a data-dcnode-id="330" href="#bib27"><sup data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">27</span></sup></a></p><span data-dcnode-id="328" instrument_node="">
</span><p class="para_indented" data-dcnode-id="325"><a data-dcnode-id="326" id="p0120"><span data-dcnode-id="327" instrument_node="">In the 20-mm embryo, the notochord becomes an intrinsically segmented structure in the thoracic and lumbar region; in the 30-mm embryo, this structure is evident in the cervical region as well. Segmentation leads to areas of fusiform enlargements in the region of the intervertebral disc, while the notochord is slowly obliterated in the region of the developing vertebral bodies. Within the developing vertebral body, the notochord is stretched into a “mucoid streak” (see Fig. 1–5B). With continued growth, the mucoid streak disappears, leaving behind only bone.</span></a></p><a data-dcnode-id="323" id="p0120"><span data-dcnode-id="324" instrument_node="">
</span></a><p class="para_indented" data-dcnode-id="307"><a data-dcnode-id="322" id="p0120"></a><a data-dcnode-id="320" id="p0125"><span data-dcnode-id="321" instrument_node="">The notochord expands in the region of the intervertebral disc to form the nucleus pulposus. This was originally described in detail by Luschka.</span></a><a data-dcnode-id="317" href="#bib28"><sup data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">28</span></sup></a><span data-dcnode-id="316" instrument_node=""> The notochord is a major source of the nucleus pulposus, and it has been shown histochemically and autoradiographically that notochordal cells proliferate and remain vital several years after birth.</span><a data-dcnode-id="313" href="#bib29"><sup data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">29</span></sup></a><span data-dcnode-id="312" instrument_node=""> Although notochordal cells generally do not seem to be demonstrable in the human nucleus pulposus of individuals older than 5 years of age, Schwabe</span><a data-dcnode-id="309" href="#bib30"><sup data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">30</span></sup></a><span data-dcnode-id="308" instrument_node=""> reported their survival in the incarcerated discs of the sacrum in a series of specimens ranging from 22 to 45 years in age. A chordoma is abnormal neoplastic growth of notochord cells that remain within the spine in adult life. This suggests that notochordal rest cells can persist well into middle age in some individuals. These neoplasms may develop at any point along the original notochordal track but are usually in the rostral (basisphenoid or basiocciput) and caudal (sacral) regions.</span></p><span data-dcnode-id="306" instrument_node="">
</span><p class="para_indented" data-dcnode-id="293"><a data-dcnode-id="304" id="p0130"><span data-dcnode-id="305" instrument_node="">As a theme of development of the spine, the region of the previous notochord lies anterior to the center of the fully developed vertebral body. This has been verified by Nolting and colleagues,</span></a><a data-dcnode-id="301" href="#bib25"><sup data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">25</span></sup></a><span data-dcnode-id="300" instrument_node=""> who detected remnants of notochordal tissue anterior to the cartilaginous body center in 13 fetal spines aged 10 to 24 weeks. This finding further reinforces that using the terms </span><em data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">centrum</span></em><span data-dcnode-id="297" instrument_node=""> and </span><em data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">vertebral body</span></em><span data-dcnode-id="294" instrument_node=""> interchangeably is inaccurate.</span></p></div><div class="tao-gold-member" data-dcnode-id="278"><p data-dcnode-id="291"></p><span data-dcnode-id="290" instrument_node="">
</span><div data-dcnode-id="281"><span data-dcnode-id="289" instrument_node="">Only gold members can continue reading. </span><a data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/login"><span data-dcnode-id="288" instrument_node=""> Log In</span></a><span data-dcnode-id="286" instrument_node=""> or</span><a data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/register"><span data-dcnode-id="285" instrument_node=""> Register </span><span data-dcnode-id="283" instrument_node=""> to continue</span></a></div><a data-dcnode-id="279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/register"><span data-dcnode-id="280" instrument_node="">
</span></a></div></article></div><a data-dcnode-id="272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/register"><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="274"></p><span data-dcnode-id="273" instrument_node="">
</span></a><div class="wp_rp_wrap wp_rp_pinterest" data-dcnode-id="210" id="wp_rp_first"><a data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/register"></a><div class="wp_rp_content" data-dcnode-id="211"><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/register"><h3 class="related_post_title" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">You may also need</span></h3></a><ul class="related_post wp_rp" data-dcnode-id="212"><a data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/register"></a><li class="wp_rp_related_post_column wp_rp_special" data-dcnode-id="254"><ul data-dcnode-id="255"><li class="undefined" data-dcnode-id="261" data-poid="in-145535" data-position="0" data-post-type="none"><a data-dcnode-id="266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/register"></a><a class="wp_rp_thumbnail" data-dcnode-id="264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musculoskeletalkey.com/applied-anatomy-of-the-spine/"><img alt="" class="attachment-150x0 size-150x0 wp-post-image" data-attachment-id="145519" data-comments-opened="0" data-dcnode-id="265" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="B978141606726900002X_f002-043-9781416067269.jpg" data-large-file="https://i1.wp.com/musculoskeletalkey.com/wp-content/uploads/2016/07/B978141606726900002X_f002-043-97
