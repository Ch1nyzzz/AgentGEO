</span><section class="longform-article__sidebar-meta authorship-section" data-dcnode-id="1125"><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1131"><span class="Apple-style-span" data-dcnode-id="1132"><strong data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Rachel Mustalish</span></strong><br data-dcnode-id="1136"><span data-dcnode-id="1135" instrument_node="">
Sherman Fairchild Center for Works on Paper and Photograph Conservation, The Metropolitan Museum of Art</span><br data-dcnode-id="1134"><span data-dcnode-id="1133" instrument_node="">
</span></span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1127"><span class="Apple-style-span" data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">October 2004</span></span></p><span data-dcnode-id="1126" instrument_node="">
</span></section><span data-dcnode-id="1124" instrument_node="">
</span></div><span data-dcnode-id="1122" instrument_node="">
</span><div class="longform-article__main-text" data-dcnode-id="922"><span data-dcnode-id="1121" instrument_node="">
</span><section class="js-insert-tooltips" data-dcnode-id="963"><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">The development of plastics from the mid-nineteenth century to the present has profoundly changed the materials of our physical world. As plastics inundated the home, workplace, and every industry and profession, they also found their place as a material for the creation of art.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Plastic has become a general term for synthetic materials that, as their name connotes, can be bent, molded, or formed into any shape, be it rigid, flexible, or liquid. The earliest plastics were actually modifications of natural materials. Horn, amber, shellac, and tortoiseshell can all be manipulated into forms by heating. In the nineteenth century, the world of synthetic chemistry began to boom, resulting in the new technologies of the chemical, dye, paper, and textile industries.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1105"><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Cellulose Plastics</span></strong><br data-dcnode-id="1111"><span data-dcnode-id="1110" instrument_node="">
One of the first plastics manufactured, discovered in 1856 and refined in 1877, was cellulose nitrate, also known as Celluloid. It was made from chemically treated cotton and was easily molded into a myriad of shapes, from billiard balls to false teeth. Cellulose nitrate was so versatile that it also became a material for replicating tortoiseshell, ivory, and horn for the numerous mass-produced items that were being offered to the public through new institutions such as the department store and the mail-order catalogue. Additionally, cellulose nitrate was the first flexible transparent sheet for </span><a data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/hd/kodk/hd_kodk.htm"><span data-dcnode-id="1109" instrument_node="">photographic negatives</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="1108"></span></a><span data-dcnode-id="1106" instrument_node=""> and movie film. This wonderfully adaptable material did have some problems: it yellowed, cracked, and soon after creation became highly flammable.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1103" instrument_node="">The demand for mass-produced items at an affordable price drove plastics industry innovations and the invention of a plethora of new materials and uses. One such material is cellulose acetate, a cotton-based synthetic plastic that was marketed as Secoid in the early twentieth century. It was tough and had a rich gloss, high transparence, and good hand feel. For these reasons, it was often used to make items that were frequently handled or had a preciousness about them, such as a&nbsp;lustrous red box by Lalique (</span><a data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/works-of-art/24.145.3ab"><span data-dcnode-id="1102" instrument_node="">24.145.3ab</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="1101"></span></a><span data-dcnode-id="1099" instrument_node="">) Cellulose acetate was also adopted by the burgeoning movie industry as a film that did not “ignite” and therefore was called “safety film.” Another important solid plastic was Bakelite (phenolic resin), introduced into popular use in the 1920s for radios (</span><a data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/works-of-art/2000.600.14"><span data-dcnode-id="1098" instrument_node="">2000.600.14</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="1097"></span></a><span data-dcnode-id="1095" instrument_node="">), handbags, and jewelry and other small objects. The twentieth century, particularly from 1935 on, saw the invention of Styrofoam, PVC (polyvinyl chloride), acrylic, polyurethane, epoxy, cellophane, nylon, and synthetic rubber and textile fibers.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1081"><strong data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Solid Plastic as a “Drawing” Medium</span></strong><br data-dcnode-id="1090"><span data-dcnode-id="1089" instrument_node="">
As early as 1938, artist Charles Biederman used plastic sheeting to create the planar forms of his work </span><em data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">New York, Number 18</span></em><span data-dcnode-id="1086" instrument_node=""> (</span><a data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/works-of-art/1980.419"><span data-dcnode-id="1085" instrument_node="">1980.419</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="1084"></span></a><span data-dcnode-id="1082" instrument_node="">). This shallow relief uses plastic as the main medium. The shot of yellow from the dyed plastic illustrates the capacity of plastics to have bright intense colors even when transparent.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1079" instrument_node="">British artist Richard Hamilton (1922–2011) and the Independent Group advocated the use of modern media to create modern art. This group was formed in 1952, not coincidentally around the time when synthetic paints began to replace traditional household paints in the United Kingdom. Hamilton expanded his use of synthetic media in his subsequent prints, drawings, and paintings. In </span><em data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Palindrome</span></em><span data-dcnode-id="1076" instrument_node=""> (</span><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/works-of-art/2000.382"><span data-dcnode-id="1075" instrument_node="">2000.382</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="1074"></span></a><span data-dcnode-id="1072" instrument_node="">), however, he used plastic as plastic (not as a paint coating or substitute for a natural material) as the principal “medium.” </span><em data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Palindrome</span></em><span data-dcnode-id="1069" instrument_node=""> is made from a sheet of lenticular plastic laminated onto a </span><a data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/hd/prnt/hd_prnt.htm"><span data-dcnode-id="1068" instrument_node="">print</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="1067"></span></a><span data-dcnode-id="1065" instrument_node="">. Lenticular plastic is designed with a precise parallel array of lenticules or lenses. Each lens is capable of magnifying the image aligned below it. This allows a viewer, by a slight shift in position, to see another image. You see the artist, you see the artist looking in a mirror; he uses the technology of the plastic to amplify the idea of simultaneous seeing. Plastics are also used in the work of Agnes Denes (</span><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/works-of-art/1983.501.3"><span data-dcnode-id="1064" instrument_node="">1983.501.3</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="1063"></span></a><span data-dcnode-id="1061" instrument_node="">), where the clear and glossy properties of the overlaid sheet become integral to the multilayered drawing.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1046"><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Plastics as Paint</span></strong><br data-dcnode-id="1056"><span data-dcnode-id="1055" instrument_node="">
In the early twentieth century, hard plastic materials were also chemically manipulated to create paints and coatings. The industrial demand was great and the scarcity of raw materials made synthetic alternatives very attractive. Early synthetic paints were made from either cellulose nitrate or by adding alkyds to traditional oil paints. These new paints are often called lacquer or enamel. Ripolin was one of the first brands of these synthetic paints and was used by </span><a data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/hd/pica/hd_pica.htm"><span data-dcnode-id="1054" instrument_node="">Pablo Picasso</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="1053"></span></a><span data-dcnode-id="1051" instrument_node=""> (</span><a data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/works-of-art/1996.403.1"><span data-dcnode-id="1050" instrument_node="">1996.403.1</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="1049"></span></a><span data-dcnode-id="1047" instrument_node="">). These paints had faster drying times than traditional oil paint and could be used with oil and oil mixtures. At the time, this was important to the paint industry and artists alike. Painters knew how to work with oil paints and could predict their behavior. A synthetic paint that could simulate oil was a selling point during the early development of plastic paints.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1032"><strong data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Industrial Paints</span></strong><br data-dcnode-id="1042"><span data-dcnode-id="1041" instrument_node="">
In the United States, synthetic paints began to replace natural materials in household paints in the 1930s. Artists at this time also migrated toward these materials. They were cheaper and more readily available, especially during World War II, when natural raw materials were difficult to obtain. They also appealed to artists who wanted to experiment with nontraditional materials to create nontraditional art. David Alfaro Siqueiros, Franz Kline, and Willem de Kooning (</span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/works-of-art/1984.613.7"><span data-dcnode-id="1040" instrument_node="">1984.613.7</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="1039"></span></a><span data-dcnode-id="1037" instrument_node="">) were some of the artists who turned to industrial paints in the creation of their works. In Jackson Pollock’s ink and enamel drawing of about&nbsp;1948–49 (</span><a data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/works-of-art/1982.147.27"><span data-dcnode-id="1036" instrument_node="">1982.147.27</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="1035"></span></a><span data-dcnode-id="1033" instrument_node="">), the red synthetic paint has a raised body and shiny appearance. The physical characteristics of this synthetic paint, which allow it to flow and drip, are integral to Pollock’s unconventional methods. This paint can capture movement and gesture, from the finest line to the largest blobs, reflecting the speed and angle of application.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1030" instrument_node="">Cellulose nitrate-based paints were particularly well suited to spray application. In David Smith’s </span><em data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">DS 1958</span></em><span data-dcnode-id="1027" instrument_node=""> of 1958 (</span><a data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/works-of-art/1994.399"><span data-dcnode-id="1026" instrument_node="">1994.399</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="1025"></span></a><span data-dcnode-id="1023" instrument_node="">), a preparatory drawing for a sculpture, the artist sprayed several colors, including a metallic copper paint, over partially masked paper to delineate the forms of the sculpture. The cellulose nitrate paint is rich in color, both transparent and opaque, and also relates to the type of paint Smith sometimes used to coat his large metal structures.</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1005"><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Acrylics for Artists</span></strong><br data-dcnode-id="1018"><span data-dcnode-id="1017" instrument_node="">
The development of acrylic paints specifically for artists by Bocour Colors in the late 1940s and early ’50s was one of the most significant innovations in artists’ materials. These first paints were acrylic resin solutions. Marketed as Magna, these highly pigmented paints, which could be thinned with turpentine and used with oils, made them immediately attractive to modern artists such as Morris Louis, Kenneth Noland, Jules Olitski, and Roy Lichtenstein. Louis, a close collaborator in the development of Magna color, used it to create the strong colored stripes of his painting </span><em data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Alpha-Pi</span></em><span data-dcnode-id="1014" instrument_node=""> (</span><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/works-of-art/67.232"><span data-dcnode-id="1013" instrument_node="">67.232</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="1012"></span></a><span data-dcnode-id="1010" instrument_node="">). The complete saturation of the unprimed canvas with the pure, high-tone color in thin transparent washes was only achievable with the new synthetic paint, an acrylic resin solution. Mark Rothko also used these paints. Like Louis, he experimented with this medium and was able to achieve matte, near-powdery surfaces with very strong saturated color (</span><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/works-of-art/1985.63.5"><span data-dcnode-id="1009" instrument_node="">1985.63.5</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="1008"></span></a><span data-dcnode-id="1006" instrument_node="">).</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">In the mid-1950s, acrylic emulsion paints, often referred to as “acrylics,” were also being developed and marketed to contemporary artists. Andy Warhol and Helen Frankenthaler were among the first artists to use this new medium. Like other successful synthetic media, acrylics are highly versatile in terms of texture, gloss, and thickness. They can be diluted in water instead of turpentine or paint thinner, they dry very quickly, and, unlike Magna color, they do not resolublize with the addition of other layers of acrylic. This allows the artist to paint layer upon layer without disturbing the previously applied paint. Acrylics also cause less change to paper and textiles, giving the artist more freedom in choosing supports for the work of art.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="1000" instrument_node="">Acrylic paint can be diluted or used in a highly viscous form to create heavy amounts of impasto. Lee Krasner’s drawing </span><em data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Night Creatures</span></em><span data-dcnode-id="997" instrument_node=""> from 1965 (</span><a data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/works-of-art/1995.595"><span data-dcnode-id="996" instrument_node="">1995.595</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="995"></span></a><span data-dcnode-id="993" instrument_node="">) illustrates the rich color and thick impasto obtained with acrylic paints. Anselm Kiefer also explored the structural quality achievable with acrylics by using a synthetic gesso (a layer put down on canvas before painting, often called primer) to make the large, high-peaked mountain in the center of his 1975 work </span><em data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Wild Emperor</span></em><span data-dcnode-id="990" instrument_node=""> (</span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/works-of-art/1995.14.11"><span data-dcnode-id="989" instrument_node="">1995.14.11</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="988"></span></a><span data-dcnode-id="986" instrument_node="">). This gessoed area in high relief is chalky rather than glossy, holds its peaks, and remains compatible with the </span><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/hd/bwtr/hd_bwtr.htm"><span data-dcnode-id="985" instrument_node="">watercolor</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="984"></span></a><span data-dcnode-id="982" instrument_node="">.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="968"><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/hd/most/hd_most.htm"><span data-dcnode-id="979" instrument_node="">Faith Ringgold’s</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="978"></span></a><span data-dcnode-id="976" instrument_node=""> 1990 drawing </span><em data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Freedom of Speech</span></em><span data-dcnode-id="973" instrument_node=""> (</span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metmuseum.org/toah/works-of-art/2001.288"><span data-dcnode-id="972" instrument_node="">2001.288</span><span class="marble-inline-tooltip fixed-width tooltip-empty" data-dcnode-id="971"></span></a><span data-dcnode-id="969" instrument_node="">) shows a variety of effects in a single work. Some of the lettering is raised and shiny, while other areas are a pale wash of matte color. The degree of gloss varies from section to section. The layered colors retain their vividness and purity. Ringgold’s work illustrates the adaptability of acrylic paints as she used them to create her paintings, drawings, and textile quilts.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Although developed in the mid-nineteenth century for commercial purposes, it is the twentieth-century artist who has adopted plastics as an art material. Plastics in all forms are being developed and will continue to find their way into works of art in unique and varied methods.</span></p><span data-dcnode-id="964" instrument_node="">
</span></section><span data-dcnode-id="962" instrument_node="">
