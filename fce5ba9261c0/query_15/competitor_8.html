ails</span></div></button></div></div></div><div class="pub-header-sticky-component" data-dcnode-id="1093"><div class="sticky-title" data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Age of Entanglement</span></div><div class="sticky-buttons" data-dcnode-id="1094"><button aria-controls="id-15" aria-expanded="false" aria-haspopup="menu" aria-label="Table of contents" class="bp3-button bp3-minimal" data-dcnode-id="1101" style="display:inline-flex;-webkit-appearance:unset" type="button"><span class="bp3-button-text" data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Contents</span></span></button><span class="dot" data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">·</span></span><button class="bp3-button bp3-minimal" data-dcnode-id="1095" type="button"><span class="bp3-icon bp3-icon-double-chevron-up" data-dcnode-id="1096" icon="double-chevron-up"><svg data-dcnode-id="1097" data-icon="double-chevron-up" height="16" viewBox="0 0 16 16" width="16"><path d="M4 8c.28 0 .53-.11.71-.29L8 4.41l3.29 3.29c.18.19.43.3.71.3a1.003 1.003 0 00.71-1.71l-4-4C8.53 2.11 8.28 2 8 2s-.53.11-.71.29l-4 4A1.003 1.003 0 004 8zm4.71-.71C8.53 7.11 8.28 7 8 7s-.53.11-.71.29l-4 4a1.003 1.003 0 001.42 1.42L8 9.41l3.29 3.29c.18.19.43.3.71.3a1.003 1.003 0 00.71-1.71l-4-4z" data-dcnode-id="1098" fill-rule="evenodd"></path></svg></span></button></div></div></div><div class="pub-document-component" data-dcnode-id="387"><div class="pub-grid" data-dcnode-id="759"><div class="main-content" data-dcnode-id="761"><main class="pub-body-component" data-dcnode-id="762"><div class="editor read-only ProseMirror" contenteditable="false" data-dcnode-id="763"><p data-dcnode-id="1052" id="r7298111119"><span data-dcnode-id="1089" instrument_node="">To every age, a relic: a loom, an automobile, the PC, a 3D printer.&nbsp;L’Encyclopédie</span><span aria-describedby="r272378179-note-popover" class="footnote" contenteditable="false" data-dcnode-id="1087" data-node-type="footnote" data-value="Developing Musical Intuitions: A Project-Based Introduction to Making and Understanding Music." date-structured-value="" id="r272378179" role="link" tabindex="0"><span data-dcnode-id="1088" instrument_node="">1</span></span><span data-dcnode-id="1086" instrument_node=""> was its period’s signpost, cataloguing and concretizing the boundaries between the disciplines, which emerged from the “long eighteenth century” of the Enlightenment. For the next quarter of a millennium, we remained indoctrinated to the shibboleths of this relic, operating within discrete silos-of-thought. At the dawn of the new millennium, the meme “</span><span class="discussion-range d-24eccfe4-c82f-4a8e-a58e-d5ce74f477db" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">antidisciplinary</span></span><span class="discussion-mount dm-24eccfe4-c82f-4a8e-a58e-d5ce74f477db ProseMirror-widget" contenteditable="false" data-dcnode-id="1077" style="display: inline;"><span class="discussion-group-component" data-dcnode-id="1078" style="left: 667.094px; width: 275px;" tabindex="-1"><span class="discussion-nav-component" data-dcnode-id="1079" style="color: rgb(0, 0, 0); border-bottom: 1px solid transparent;"></span></span></span><span data-dcnode-id="1076" instrument_node="">” appeared, yanking us out of Aristotle’s shadow and into a new ‘Age of </span><span class="discussion-range d-5a360d34-57de-4ba9-a7f9-7385c2135ecb" data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Entanglement</span></span><span class="discussion-mount dm-5a360d34-57de-4ba9-a7f9-7385c2135ecb ProseMirror-widget" contenteditable="false" data-dcnode-id="1062" style="display: inline;"><span class="discussion-group-component" data-dcnode-id="1063" style="left: 667.094px; width: 275px;" tabindex="-1"><span class="discussion-nav-component" data-dcnode-id="1064" style="color: rgb(0, 0, 0); border-bottom: 1px solid transparent;"><span class="discussion-bubble-component" data-dcnode-id="1065" role="button" tabindex="0"><span class="bubble" data-dcnode-id="1068" style="border: 1px solid rgb(0, 0, 0);"><span data-dcnode-id="1069" instrument_node="">1</span></span><span class="label" data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Paul T. Kidd</span></span></span></span></span></span><span data-dcnode-id="1061" instrument_node="">.’ </span><span aria-describedby="r6856269940-note-popover" class="footnote" contenteditable="false" data-dcnode-id="1059" data-node-type="footnote" data-value="The Age of Digital Entanglement. Scientific American. 303, 93." date-structured-value="" id="r6856269940" role="link" tabindex="0"><span data-dcnode-id="1060" instrument_node="">2</span></span><sup data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">,</span></sup><span data-dcnode-id="1056" instrument_node=""> </span><span aria-describedby="r2512944830-note-popover" class="footnote" contenteditable="false" data-dcnode-id="1054" data-node-type="footnote" data-value="The Age of Digital Entanglement. Scientific American. 303, 93." date-structured-value="" id="r2512944830" role="link" tabindex="0"><span data-dcnode-id="1055" instrument_node="">3</span></span><br data-dcnode-id="1053"></p><p data-dcnode-id="1050" id="r7559793270"><span data-dcnode-id="1051" instrument_node="">This essay proposes a map for four domains of creative exploration—Science, Engineering, Design and Art—in an attempt to represent the antidisciplinary hypothesis: that knowledge can no longer be ascribed to, or produced within, disciplinary boundaries, but is entirely entangled. The goal is to establish a tentative, yet holistic, cartography of the interrelation between these domains, where one realm can incite (r)evolution inside another; and where a single individual or project can reside in multiple dominions. Mostly, this is an invitation to question and to amend what is being proposed.</span></p><h1 data-dcnode-id="1048" id="r7670895751"><span data-dcnode-id="1049" instrument_node="">Maeda finds Gold</span></h1><p data-dcnode-id="1028" id="r9086548069"><span data-dcnode-id="1047" instrument_node="">All roads lead to the “Bermuda Quadrilateral.”</span><span aria-describedby="r8411446598-note-popover" class="footnote" contenteditable="false" data-dcnode-id="1045" data-node-type="footnote" data-value="The Art Instinct: Beauty, Pleasure, and Human Evolution." date-structured-value="" id="r8411446598" role="link" tabindex="0"><span data-dcnode-id="1046" instrument_node="">4</span></span><span data-dcnode-id="1044" instrument_node=""> In 2007, John Maeda proposed a diagram under this name, based on the “Rich Gold matrix.”&nbsp;The map—a rectangular plot—was parceled into four quadrants, each devoted to a unique view by which to read, and act upon, the world: Science, Engineering, Design and Art. According to Maeda, to each plot a designated mission: to Science, exploration; to Engineering, invention; to Design, communication; to Art, expression. Describing the four “hats” of creativity, Rich Gold had originally drawn the matrix-as-cartoon to communicate four discrete embodiments of creativity and innovation.&nbsp;Mark your mindset, conquer its little acre, and settle in. Gold’s view represents four ways-of-being that are distinctly different from one another, separated by clear intellectual boundaries and mental dispositions. Like the Four Humors, each is regarded as its own substance, to each its content and its countenance. Stated differently, </span><span class="discussion-range d-4576bc41-0906-44f0-a3a9-e376fd525ebe" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">if you’re a citizen in one, you’re a tourist in another</span></span><span class="discussion-mount dm-4576bc41-0906-44f0-a3a9-e376fd525ebe ProseMirror-widget" contenteditable="false" data-dcnode-id="1030" style="display: inline;"><span class="discussion-group-component" data-dcnode-id="1031" style="left: 667.094px; width: 275px;" tabindex="-1"><span class="discussion-nav-component" data-dcnode-id="1032" style="color: rgb(0, 0, 0); border-bottom: 1px solid transparent;"><span class="discussion-bubble-component" data-dcnode-id="1033" role="button" tabindex="0"><span class="bubble" data-dcnode-id="1036" style="border: 1px solid rgb(0, 0, 0);"><span data-dcnode-id="1037" instrument_node="">1</span></span><span class="label" data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Paul T. Kidd</span></span></span></span></span></span><span data-dcnode-id="1029" instrument_node="">.</span></p><p data-dcnode-id="996" id="r6203895365"><span data-dcnode-id="1027" instrument_node="">But how can we become constant travelers within a border-free, and lingo-legible ‘intellectual Pangea?' How can we traverse a cerebral supercontinent, where the analog of world citizenship governs </span><span class="discussion-range d-2684367c-471e-409d-855f-2a44bf0cd927" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">our identity as thinking—and creating—beings</span></span><span class="discussion-mount dm-2684367c-471e-409d-855f-2a44bf0cd927 ProseMirror-widget" contenteditable="false" data-dcnode-id="1013" style="display: inline;"><span class="discussion-group-component" data-dcnode-id="1014" style="left: 667.094px; width: 275px;" tabindex="-1"><span class="discussion-nav-component" data-dcnode-id="1015" style="color: rgb(0, 0, 0); border-bottom: 1px solid transparent;"><span class="discussion-bubble-component" data-dcnode-id="1016" role="button" tabindex="0"><span class="bubble" data-dcnode-id="1019" style="border: 1px solid rgb(0, 0, 0);"><span data-dcnode-id="1020" instrument_node="">1</span></span><span class="label" data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Matt Nish-Lapidus</span></span></span></span></span></span><span data-dcnode-id="1012" instrument_node="">? How can we navigate an atlas that is charted not for four hats, but for one pair of shoes, and with which we can—including some luck and a quantum leap-of-faith—inhabit multiple places at once? Can a scientist invent better solutions than an engineer? </span><span class="discussion-range d-27a422eb-3000-458f-bde2-a3f06b77c474" data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Is an artist’s mindset really all that different from a scientist’s? Are they simply two ways of operating in the world that are complementary and intertwined? </span></span><span class="discussion-mount dm-27a422eb-3000-458f-bde2-a3f06b77c474 ProseMirror-widget" contenteditable="false" data-dcnode-id="998" style="display: inline;"><span class="discussion-group-component" data-dcnode-id="999" style="left: 667.094px; width: 275px;" tabindex="-1"><span class="discussion-nav-component" data-dcnode-id="1000" style="color: rgb(0, 0, 0); border-bottom: 1px solid transparent;"><span class="discussion-bubble-component" data-dcnode-id="1001" role="button" tabindex="0"><span class="bubble" data-dcnode-id="1004" style="border: 1px solid rgb(0, 0, 0);"><span data-dcnode-id="1005" instrument_node="">2</span></span><span class="label" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Iain Perkin</span></span></span></span></span></span><span data-dcnode-id="997" instrument_node="">Or, when practicing art, is perhaps what truly counts less the art form and more one’s (way of) being? Ultimately: is there a way to understand the culture of making which transcends a two-dimensional Euclidean geometry—four plots to match four hats—to a more holistic, integrative and globe-like approach?</span></p><h1 data-dcnode-id="994" id="r5153328132"><span data-dcnode-id="995" instrument_node="">Caving</span></h1><p data-dcnode-id="977" id="r1295993608"><span data-dcnode-id="993" instrument_node="">In his recent film,&nbsp;Particle Fever&nbsp;(2014), Mark Levinson documents the first round of experiments at the Large Hadron Collider (LHC), investigating the origins of matter. The film opens with the initial firings of the LHC, designed to recreate the conditions associated with the Big Bang. It closes with prehistoric cave paintings, and an intriguing assertion by Savas Dimopoulos on the connection between Art and Science: “The things that are least important for our survival are the very things that make us human.” Both Art and Science can be understood as human needs to express the world around us. Both require suspension of disbelief, offering speculations about our physical and immaterial reality prior to proof. And both—as has been the case since the painting of the Chauvet Cave some 40,000 years ago—have no rules and no boundaries. The artists who produced these paintings did so in order to first face, then make sense of, their reality. We do Science with precisely the same motivation. Similarly nebulous are the boundaries between Design and both Art and Engineering. Design, in its critical embodiment (Critical Design), operates through speculation, devising unforeseen strategies that challenge preconceived assumptions about how we use, and live within, the built environment. In its affirmative embodiment (Affirmative Design), Design operates by offering practical, and often utilitarian, solutions that can be rapidly deployed. The former carries the mentality of Art, while the borders between the latter and Engineering are at best difficult to parse. Similar vagaries exist, too, between Science/Design, Engineering/Art, and Science/Engineering. </span><span class="discussion-range d-b2bea1eb-ee24-42ab-b3a6-a94b0cb6c1e7" data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">It is likely to assume that if what you are designing carries meaning and relevance, you are not operating within a single, distinct domain.</span></span><span class="discussion-mount dm-b2bea1eb-ee24-42ab-b3a6-a94b0cb6c1e7 ProseMirror-widget" contenteditable="false" data-dcnode-id="979" style="display: inline;"><span class="discussion-group-component" data-dcnode-id="980" style="left: 667.094px; width: 275px;" tabindex="-1"><span class="discussion-nav-component" data-dcnode-id="981" style="color: rgb(0, 0, 0); border-bottom: 1px solid transparent;"><span class="discussion-bubble-component" data-dcnode-id="982" role="button" tabindex="0"><span class="bubble" data-dcnode-id="985" style="border: 1px solid rgb(0, 0, 0);"><span data-dcnode-id="986" instrument_node="">1</span></span><span class="label" data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Matt Nish-Lapidus</span></span></span></span></span></span><br data-dcnode-id="978"></p><p data-dcnode-id="975" id="r4835047540"><span data-dcnode-id="976" instrument_node="">How can we re-occupy the four corners of the “Bermuda Quadrilateral” as transitory embodiments of creativity and innovation? Better yet, how can we travel them, or even co-exist within them, in a way that is at once meaningful and productive? Can operating within one domain generate a kind of ‘creative energy’ that enables the easy transition to another?</span></p><h1 data-dcnode-id="973" id="r7605620140"><span data-dcnode-id="974" instrument_node="">Creative Energy (CreATP)</span></h1><p data-dcnode-id="954" id="r6631323177"><span data-dcnode-id="972" instrument_node="">The Krebs Cycle is a metabolic pathway made up of chemical reactions. One of the earliest established components of cellular metabolism, all breathing organisms could not exist without it. Its outcome, through the oxidation of nutrients, is the production of chemical energy, carried throughout the cell in the form of Adenosine Triphosphate (ATP). ATP can therefore be considered a&nbsp;molecular unit of currency&nbsp;for energy transfer. The Krebs Cycle is akin to a metabolic clock that first generates, then consumes, then regenerates currency in the form of ATP over time. Crudely expressed: good metabolism will make you constantly rich. By the same token</span><span class="discussion-range d-0803b7f1-2360-4be2-8562-ee9879532bd9" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">, </span></span><span class="discussion-range d-0803b7f1-2360-4be2-8562-ee9879532bd9 d-4be2d9ee-0eb6-4425-aea4-236dfdb971a7" data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">can intellectual digestion—the kind that demands you shift views and perspectives—make you constantly intellectually rich?</span></span><span class="discussion-mount dm-4be2d9ee-0eb6-4425-aea4-236dfdb971a7 ProseMirror-widget" contenteditable="false" data-dcnode-id="956" style="display: inline;"><span class="discussion-group-component" data-dcnode-id="957" style="left: 667.094px; width: 275px;" tabindex="-1"><span class="discussion-nav-component" data-dcnode-id="958" style="color: rgb(0, 0, 0); border-bottom: 1px solid transparent;"><span class="discussion-bubble-component" data-dcnode-id="959" role="button" tabindex="0"><span class="bubble" data-dcnode-id="962" style="border: 1px solid rgb(0, 0, 0);"><span data-dcnode-id="963" instrument_node="">2</span></span><span class="label" data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Michael Dila, Jon Leach</span></span></span></span></span></span><br data-dcnode-id="955"></p><p data-dcnode-id="940" id="r3194251334"><span class="discussion-mount dm-0803b7f1-2360-4be2-8562-ee9879532bd9 ProseMirror-widget" contenteditable="false" data-dcnode-id="942" style="display: inline;"><span class="discussion-group-component" data-dcnode-id="943" style="left: 667.094px; width: 275px;" tabindex="-1"><span class="discussion-nav-component" data-dcnode-id="944" style="color: rgb(0, 0, 0); border-bottom: 1px solid transparent;"><span class="discussion-bubble-component" data-dcnode-id="945" role="button" tabindex="0"><span class="bubble" data-dcnode-id="948" style="border: 1px solid rgb(0, 0, 0);"><span data-dcnode-id="949" instrument_node="">1</span></span><span class="label" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Paul T. Kidd</span></span></span></span></span></span><span data-dcnode-id="941" instrument_node="">The Krebs Cycle of Creativity (KCC) is a map that describes the perpetuation of creative energy (creative ATP or ‘CreATP’), analogous to the Krebs Cycle proper. In this analogy, the four modalities of human creativity—Science, Engineering, Design and Art—replace the Krebs Cycle’s carbon compounds. Each of the modalities (or ‘compounds‘) produces ‘currency’ by transforming into another:</span></p><figure contenteditable="false" data-align="center" data-alt-text="" data-caption="" data-dcnode-id="935" data-node-type="image" data-size="100" data-url="https://assets.pubpub.org/93uq1idg/21508273276775.png" id="r3335840317"><img alt="" data-dcnode-id="939" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resize-v3.pubpub.org/eyJidWNrZXQiOiJhc3NldHMucHVicHViLm9yZyIsImtleSI6IjkzdXExaWRnLzIxNTA4MjczMjc2Nzc1LnBuZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6ODAwLCJmaXQiOiJpbnNpZGUiLCJ3aXRob3V0RW5sYXJnZW1lbnQiOnRydWV9fX0%3D&amp;raw" srcset="https://resize-v3.pubpub.org/eyJidWNrZXQiOiJhc3NldHMucHVicHViLm9yZyIsImtleSI6IjkzdXExaWRnLzIxNTA4MjczMjc2Nzc1LnBuZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6ODAwLCJmaXQiOiJpbnNpZGUiLCJ3aXRob3V0RW5sYXJnZW1lbnQiOnRydWV9fX0= 1x,https://resize-v3.pubpub.org/eyJidWNrZXQiOiJhc3NldHMucHVicHViLm9yZyIsImtleSI6IjkzdXExaWRnLzIxNTA4MjczMjc2Nzc1LnBuZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6MTYwMCwiZml0IjoiaW5zaWRlIiwid2l0aG91dEVubGFyZ2VtZW50Ijp0cnVlfX19 2x,https://resize-v3.pubpub.org/eyJidWNrZXQiOiJhc3NldHMucHVicHViLm9yZyIsImtleSI6IjkzdXExaWRnLzIxNTA4MjczMjc2Nzc1LnBuZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6MjQwMCwiZml0IjoiaW5zaWRlIiwid2l0aG91dEVubGFyZ2VtZW50Ijp0cnVlfX19 3x"><figcaption data-dcnode-id="936" id="r3335840317-figure-caption"><div data-dcnode-id="937"><div data-dcnode-id="938"></div></div></figcaption></figure><p data-dcnode-id="918" id="r1756172368"><span data-dcnode-id="934" instrument_node="">The role of&nbsp;Science&nbsp;is to explain and predict the world around us; it ‘converts’ information into knowledge. The role of&nbsp;Engineering&nbsp;is to apply scientific knowledge to the development of solutions for empirical problems; it ‘converts’ knowledge into utility. The role of&nbsp;Design&nbsp;is to produce embodiments of solutions that maximize function and augment human experience; it ‘converts’ utility into behavior. The role of&nbsp;Art&nbsp;is to question human behavior and create awareness of the world around us; it ‘converts’ behavior into new perceptions of information, re-presenting the data that initiated the KCC in Science. At this ‘Cinderella moment’—when the hands of the KCC strike midnight—new perception inspires new scientific exploration. </span><span class="discussion-range d-ac5d256f-baf3-43b5-a84a-9c4aab4782b6" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">For example, in&nbsp;As Slow as Possible, John Cage transports the listener into a state where space and time are stretched, offering a personal interpretation of time dilation and questioning the nature of space-time itself.</span></span><span class="discussion-mount dm-ac5d256f-baf3-43b5-a84a-9c4aab4782b6 ProseMirror-widget" contenteditable="false" data-dcnode-id="920" style="display: inline;"><span class="discussion-group-component" data-dcnode-id="921" style="left: 667.094px; width: 275px;" tabindex="-1"><span class="discussion-nav-component" data-dcnode-id="922" style="color: rgb(0, 0, 0); border-bottom: 1px solid transparent;"><span class="discussion-bubble-component" data-dcnode-id="923" role="button" tabindex="0"><span class="bubble" data-dcnode-id="926" style="border: 1px solid rgb(0, 0, 0);"><span data-dcnode-id="927" instrument_node="">1</span></span><span class="label" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Sérgio Lutav</span></span></span></span></span></span><br data-dcnode-id="919"></p><p data-dcnode-id="916" id="r6566744826"><span data-dcnode-id="917" instrument_node="">The KCC is designed as a circle with the four modalities of creativity preserved in their original location from the “Rich Gold matrix.” As you transition from one into the other, you generate and spend currency in the form of intellectual energy, or CreATP. Science produces knowledge that is used by engineers. Engineering produces utility that is used by designers. Designers produce changes in behavior that are perceived by artists. Art produces new perceptions of the world, thereby granting access to new information in and about it, and inspiring new scientific inquiry. As in the cumulative Aramaic song,&nbsp;Chad Gadya, there is repetition, continuity and change. Some content is generated, other content is consumed, some is released and new content is formed.</span></p><h1 data-dcnode-id="914" id="r2343400414"><span data-dcnode-id="915" instrument_node="">The Clock, the Microscope, the Compass and the Gyroscope</span></h1><p data-dcnode-id="912" id="r708596119"><span data-dcnode-id="913" instrument_node="">As a speculative map, the KCC is intentionally abstract. In hopes of eliciting debate and revision, its many meanings can be read through a multiplicity of lenses.</span></p><h2 data-dcnode-id="910" id="r4069054434"><span data-dcnode-id="911" instrument_node="">KCC as Clock</span></h2><p data-dcnode-id="898" id="r7273952664"><span data-dcnode-id="909" instrument_node="">The KCC can be read as a clock like the Krebs Cycle itself. But unlike the Krebs Cycle, the CreATP pathway is bidirectional. In this clock, direction can be reversed. Time can also stand still (by remaining in the same location on the circle), it can ‘bend’ (by introducing geometrical changes, e.g. from a circle to an ellipse), or it can be foreshortened (by introducing topological changes, e.g. from a circle to a figure eight or a spiral). Furthermore, if you generate excess energy, you can skip domains—from Science to Design, bypassing Engineering—and thereby ‘time travel.’ We get boosts of CreATP for free when we are good at what we do, when we excel in integration. </span><span class="discussion-range d-68a62a7a-7518-4246-b294-3c6f31e176d6" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Good Design, for example, is good exploration</span></span><span class="discussion-mount dm-68a62a7a-7518-4246-b294-3c6f31e176d6 ProseMirror-widget" contenteditable="false" data-dcnode-id="900" style="display: inline;"><span class="discussion-group-component" data-dcnode-id="901" style="left: 667.094px; width: 275px;" tabindex="-1"><span class="discussion-nav-component" data-dcnode-id="902" style="color: rgb(0, 0, 0); border-bottom: 1px solid transparent;"></span></span></span><span data-dcnode-id="899" instrument_node="">: it questions certain belief systems—physical and immaterial—about the world. Then it releases some embodiments of these speculations into the world, contributing to the build-up of what we know as culture. If done well, good Design can establish new basic Science without going through Art. By example, Buckminster Fuller’s geodesic domes (“buckyballs”) helped scientists visualize the molecule with the formula C60, whose related class of molecules were named “fullerenes.”</span></p><h2 data-dcnode-id="896" id="r1160752548"><span data-dcnode-id="897" instrument_node="">KCC as Microscope</span></h2><p data-dcnode-id="879" id="r7125564897"><span data-dcnode-id="895" instrument_node="">The KCC, in its current form, does not yet express </span><span class="discussion-range d-91710ee4-4825-4998-997e-77c6dd8e7183" data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">transitions in physical scale</span></span><span class="discussion-mount dm-91710ee4-4825-4998-997e-77c6dd8e7183 ProseMirror-widget" contenteditable="false" data-dcnode-id="881" style="display: inline;"><span class="discussion-group-component" data-dcnode-id="882" style="left: 667.094px; width: 275px;" tabindex="-1"><span class="discussion-nav-component" data-dcnode-id="883" style="color: rgb(0, 0, 0); border-bottom: 1px solid transparent;"><span class="discussion-bubble-component" data-dcnode-id="884" role="button" tabindex="0"><span class="bubble" data-dcnode-id="887" style="border: 1px solid rgb(0, 0, 0);"><span data-dcnode-id="888" instrument_node="">1</span></span><span class="label" data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Tyler Miller</span></span></span></span></span></span><span data-dcnode-id="880" instrument_node="">. But, of course, you can consider the four domains as four objective lenses of an imaginary microscope through which to view, and act upon, the world. The way we view our environment, and interact within it, is ultimately dependent on the lens through which we choose to see it. Choosing is no innocent act. A material scientist will generally explore the physical composition of matter through the lens of properties. A biologist, however, looks at the world not through the lens of properties, but rather through the lens of function. Both live in the same reality, but experience it altogether differently, and therefore act upon it in a singular way. If they could see both views simultaneously, they would link properties and behaviors.</span></p><h2 data-dcnode-id="877" id="r8886812070"><span data-dcnode-id="878" instrument_node="">KCC as Compass</span></h2><p data-dcnode-id="875" id="r9490876976"><span data-dcnode-id="876" instrument_node="">The KCC can be read as a compass rose, north-to-south and east-to-west. The north-to-south axis leads from sky to earth: from ‘information’ produced by Science and Art in the hemisphere of ‘perception,’ to ‘utility’ produced by Design and Engineering in the hemisphere of ‘production.’ The farther north, the more theoretical (or philosophical) the regime. The farther south, the more applied (or economic) the regime. The north marks the climax of human exploration into the unknown. The south marks the products and outcomes associated with new creative solutions and deployments based on exploration. The east-to-west axis leads from nature to culture: from ‘knowledge’ produced by Science and Engineering in the hemisphere of ‘nature,’ to ‘behaviors’ produced by Art and Design in the hemisphere of ‘culture.’ Along this axis, one travels from understanding—describing and predicting phenomena within the physical world—to creating new ways of using and experiencing it.</span></p><h2 data-dcnode-id="873" id="r9958159847"><span data-dcnode-id="874" instrument_node="">KCC as Gyroscope</span></h2><p data-dcnode-id="871" id="r2804149742"><span data-dcnode-id="872" instrument_node="">Most provocatively, the KCC can be understood as a plan-projection of a gyroscope, measuring or maintaining creative orientation. This analogy imagines a three-dimensional globe transcending ‘flatland,’ where at the very top(s)—the poles of the diagram—all modalities collide into one, big nebula. A Big Bang where all of this actually begins. Complete entanglement.</span></p><h1 data-dcnode-id="869" id="r532626754"><span data-dcnode-id="870" instrument_node="">Holes and Hacks</span></h1><p data-dcnode-id="867" id="r5799094281"><span data-dcnode-id="868" instrument_node="">As with any speculative proposition, particularly when expressed graphically, there are many intellectual holes and cracks.</span></p><h2 data-dcnode-id="865" id="r131755595"><span data-dcnode-id="866" instrument_node="">From Art to Science: a Cinderella Moment</span></h2><p data-dcnode-id="863" id="r1416014075"><span data-dcnode-id="864" instrument_node="">Some claim—and even tittle-tattle the point—that the passage from Art to Science is far-fetched at best, and forced at worst. After all, Picasso and Einstein didn’t know each other (the myth of an impromptu meeting in 1904 at Montmartre’s&nbsp;Le Lapin Agile&nbsp;aside). But does it matter? Both questioned the relationship between space and time, arriving at expressions speculating on their relationship in deep and meaningful ways. Both were archetypes of Modernism, co-existing in an age that questioned the culture of nature…and the nature of culture. Granted, my determination to posit the completed circle—to assert the continuity of the KCC—may be seen as naïve, or even sophomoric. Please assume the former, and suspend disbelief. After all, only through faith (will) we leap. That is to say: the ability to create sufficient leverage to leap from Art to Science is the ultimate force multiplier. It’s where potential energy is converted to kinetic energy, a posse ad esse.</span></p><h2 data-dcnode-id="861" id="r8824801177"><span data-dcnode-id="862" instrument_node="">Culture is Nature is Culture</span></h2><p data-dcnode-id="856" id="r7935466430"><span data-dcnode-id="860" instrument_node="">The nature-culture divide is every anthropologist’s bread-and-butter. And the question whether these two entities can be perceived, expressed and acted upon in coalescence carries tension in the KCC’s extrapolated poles. If “nature” is described as “anything that supports life,” and if life “cannot be sustained without culture,”</span><span aria-describedby="r6135901626-note-popover" class="footnote" contenteditable="false" data-dcnode-id="858" data-node-type="footnote" data-value="The Dawn of the Entanglement. Is the Internet Changing the Way You Think?: The Net’s Impact on Our Minds and Future (Edge Question Series)." date-structured-value="" id="r6135901626" role="link" tabindex="0"><span data-dcnode-id="859" instrument_node="">5</span></span><span data-dcnode-id="857" instrument_node=""> the two belief systems collapse into singularity. In this singularity, Nature claims the infrastructure of civilization and, equally so, culture now enables the design of Nature herself.</span></p><h2 data-dcnode-id="854" id="r954467423"><span data-dcnode-id="855" instrument_node="">Global Citizenship at the Cost of Intellectual Vernacular</span></h2><p data-dcnode-id="837" id="r9110893283"><span data-dcnode-id="853" instrument_node="">Is intellectual flexibility more worthy than it is profitable? Is global intellectual citizenship a road to perdition? Might simultaneously inhabiting all four domains, or all the silos of enlightenment, entail a loss in disciplinary expertise and research proficiency? Perhaps. Still, you can’t have one without the other: central (disciplinary) vision will get you far, but peripheral (antidisciplinary) vision will get you farther. </span><span class="discussion-range d-7f795af9-70aa-4448-baf9-03fc5bdea2c7" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">So while the ability to occupy all four domains simultaneously requires the kind of expertise that sacrifices expertise, it is a sine qua non for a worthy spin.</span></span><span class="discussion-mount dm-7f795af9-70aa-4448-baf9-03fc5bdea2c7 ProseMirror-widget" contenteditable="false" data-dcnode-id="839" style="display: inline;"><span class="discussion-group-component" data-dcnode-id="840" style="left: 667.094px; width: 275px;" tabindex="-1"><span class="discussion-nav-component" data-dcnode-id="841" style="color: rgb(0, 0, 0); border-bottom: 1px solid transparent;"><span class="discussion-bubble-component" data-dcnode-id="842" role="button" tabindex="0"><span class="bubble" data-dcnode-id="845" style="border: 1px solid rgb(0, 0, 0);"><span data-dcnode-id="846" instrument_node="">2</span></span><span class="label" data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Paul T. Kidd, Danny Chambers</span></span></span></span></span></span><br data-dcnode-id="838"></p><h1 data-dcnode-id="835" id="r9101188302"><span data-dcnode-id="836" instrument_node="">Antonelli gets ‘Knotty’</span></h1><p data-dcnode-id="833" id="r45393710"><span data-dcnode-id="834" instrument_node="">A mathematical knot is not what you think. It is not the kind of knot you would use to yoke your shoes or tie a tie. In knot theory, knots are closed loops: they have no ends at which they can be unknotted. It is this very concept that inspired Paola Antonelli to coin the term “Knotty Objects.”</span></p><p data-dcnode-id="831" id="r1215655761"><span data-dcnode-id="832" instrument_node="">So what is a Knotty Object?</span></p><p data-dcnode-id="829" id="r232278238"><span data-dcnode-id="830" instrument_node="">One can perceive the world as a singularity, i.e., top down through the lens of a particular profession or plot on the “Rich Gold matrix.” But one can also view the world bottom up,&nbsp;object first. Knotty objects are bigger than the sum of their parts. Viewing them fuses multiple perspectives, thereby generating an expanded, more profound, vision of the world. Knotty objects are so knotty that one can no longer disentangle the disciplines or the disciplinary knowledge that contributed to their creation. If in the Age of Entanglement, we understand objects from a manifold of vantages, Knotty Objects force awareness of their condition through a multivalent approach.</span></p><p data-dcnode-id="812" id="r1887618502"><span data-dcnode-id="828" instrument_node="">During the Knotty Objects summit at the MIT Media Lab (July 2015), Paola Antonelli, Kevin Slavin and I focused on four knotty objects-as-archetypes: a phone, a brick, a bitcoin and a steak. </span><span class="discussion-range d-6efa6636-f976-4983-91a7-4002234d2af6" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Each posed a particular context for their knotting: communication, the built environment, commerce and gastronomy. But each also begged to be explored through many realms.</span></span><span class="discussion-mount dm-6efa6636-f976-4983-91a7-4002234d2af6 ProseMirror-widget" contenteditable="false" data-dcnode-id="814" style="display: inline;"><span class="discussion-group-component" data-dcnode-id="815" style="left: 667.094px; width: 275px;" tabindex="-1"><span class="discussion-nav-component" data-dcnode-id="816" style="color: rgb(0, 0, 0); border-bottom: 1px solid transparent;"><span class="discussion-bubble-component" data-dcnode-id="817" role="button" tabindex="0"><span class="bubble" data-dcnode-id="820" style="border: 1px solid rgb(0, 0, 0);"><span data-dcnode-id="821" instrument_node="">1</span></span><span class="label" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Paola Antonelli</span></span></span></span></span></span><br data-dcnode-id="813"></p><p data-dcnode-id="810" id="r5105608362"><span data-dcnode-id="811" instrument_node="">Take the steak for example. Its ‘design’—whether it is prepared using the animal as source, or is produced from scratch in a lab—embodies a difficult assortment of technical skill and moral contradiction. While bullfighting beef is ironically considered the most ecological meat in the world, its synthetic equivalent is just as ethically troubling: engineering&nbsp;in vitro&nbsp;meat requires market-driven environmental sacrifices that are just as Homeric as the killing of a sacred bull. Whichever way you look at it, there is no escaping guilt. In this knotty universe, we are still cavemen, controlled by our pre-established moral code and views.</span></p><p data-dcnode-id="794" id="r8291405917"><span class="discussion-range d-55f3b85c-30a7-469e-9b29-71e4099f4442" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">The creation of knotty objects is just as knotty. </span></span><span class="discussion-mount dm-55f3b85c-30a7-469e-9b29-71e4099f4442 ProseMirror-widget" contenteditable="false" data-dcnode-id="796" style="display: inline;"><span class="discussion-group-component" data-dcnode-id="797" style="left: 667.094px; width: 275px;" tabindex="-1"><span class="discussion-nav-component" data-dcnode-id="798" style="color: rgb(0, 0, 0); border-bottom: 1px solid transparent;"><span class="discussion-bubble-component" data-dcnode-id="799" role="button" tabindex="0"><span class="bubble" data-dcnode-id="802" style="border: 1px solid rgb(0, 0, 0);"><span data-dcnode-id="803" instrument_node="">2</span></span><span class="label" data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Max Shen, Marina Tsaplina</span></span></span></span></span></span><span data-dcnode-id="795" instrument_node="">In fact, the techniques to create them, as well as their ultimate physical expression, are intellectual mirror images of each other: the process reflects the knottiness of their related products. Bluntly, a knotty creator must simultaneously occupy all four domains of the KCC, and bring together insights that are as profoundly scientific as they are artistically insightful.</span></p><p data-dcnode-id="792" id="r8270242835"><span data-dcnode-id="793" instrument_node="">What is so special about these objects is that their creation—their science, their engineering, their design and their projected location in culture—is not a discrete process; it is nonlinear and cannot be unknotted. When it is considered successful, a knotty object has the power not only to question the way we live, but also to change material practice, to question manufacturing protocols and to completely redefine social constructs. This is a very exciting time for creators of the built environment, a time when the disciplines are knotted within contexts that are at once technologically savvy and culturally sensitive. The knot then becomes the ultimate form of entanglement.</span></p><p data-dcnode-id="790" id="r2629654727"><span data-dcnode-id="791" instrument_node="">Knotty Objects are antidisciplinary. Q.E.D.</span></p><h1 data-dcnode-id="788" id="r6023281863"><span data-dcnode-id="789" instrument_node="">Ito’s Pangea</span></h1><p data-dcnode-id="786" id="r9591309041"><span data-dcnode-id="787" instrument_node="">Since the Age of Enlightenment, the realms of human exploration and expression have been coddled into silos that are self-reliant and often self-referential, both in means and in mindset. But if you can smash protons down a seventeen-mile straw at nearly the speed of light, you’ve earned the right to question the category of gravity. Theoretical physics alone just isn’t enough: it’s an entangled proposition to a truly BIG question, spawned by an entangled state (literally and metaphorically).</span></p><p data-dcnode-id="784" id="r3294253628"><span data-dcnode-id="785" instrument_node="">“Quantum entanglement” denotes the moment a few or more particles interrelate such that the quantum state of any particle cannot be described alone, only all the particles&nbsp;en masse. If Enlightenment was the salad, Entanglement is the soup. In the Age of Entanglement it becomes impossible to discern one ingredient from another. Taxonomies are defunct; disciplinary walls dissolve. At the extrapolated summit of the&nbsp;KCC as Gyroscope, all silos coalesce (back) into the Pangea of information.</span></p><p data-dcnode-id="779" id="r4922027655"><span data-dcnode-id="783" instrument_node="">Due to the boon of new fabrication technologies, the scales of synthesis are approaching the already micro scales of analysis, and ‘writing’ the world is thereby becoming as granular as ‘reading’ it. Consider for example the transition of information from an MRI scan to a 3D print in the production of a prosthetic limb with graded properties that match and respond to a particular person’s physiology. Or a wearable micro-biome, designed at a scale that can filter your gut. Just like the cave painters, it is through creative expression that we can re-enter (or re-read) the same view from a different perspective. Communication protocols between and across such perspectives become explicit because, as in the Krebs Cycle, synthesis and degradation are interchangeable. The instant when units of work and units of perception coalesce becomes a thrilling creative moment</span><span aria-describedby="r1406702427-note-popover" class="footnote" contenteditable="false" data-dcnode-id="781" data-node-type="footnote" data-value="The Dawn of the Entanglement. Is the Internet Changing the Way You Think?: The Net’s Impact on Our Minds and Future (Edge Question Series)." date-structured-value="" id="r1406702427" role="link" tabindex="0"><span data-dcnode-id="782" instrument_node="">6</span></span><span data-dcnode-id="780" instrument_node=""> for the free souls and the free soloists in the Age of Entanglement.</span></p><p data-dcnode-id="777" id="r2444502584"><span data-dcnode-id="778" instrument_node="">The MIT Media Lab — ‘Ito’s Pangea,’ or the ‘Negroponte supercontinent’ — can entangle precisely because it makes the stuff that makes the KCC spin: media. And I don’t mean news, or electronics, or digital media, not even social media. But that which possesses one world: “each hath one, and is one.”</span></p><h1 data-dcnode-id="775" id="r4655514023"><span data-dcnode-id="776" instrument_node="">Acknowledgements</span></h1><p data-dcnode-id="770" id="r4097268202"><span data-dcnode-id="774" instrument_node="">The phrase “Age of Entanglement” is attributed to my good friend and colleague Danny Hillis, who has explored similar phrasing in.</span><span aria-describedby="r6931115356-note-popover" class="footnote" contenteditable="false" data-dcnode-id="772" data-node-type="footnote" data-value="Thinking in Indian. A John Mohawk Reader." date-structured-value="" id="r6931115356" role="link" tabindex="0"><span data-dcnode-id="773" instrument_node="">7</span></span><br data-dcnode-id="771"></p><p data-dcnode-id="768" id="r967048841"><br data-dcnode-id="769"></p><p data-dcnode-id="766" id="r3619058946"><br data-dcnode-id="767"></p><p data-dcnode-id="764" id="r4935667786"><br data-dcnode-id="765"></p></div></main></div><div class="side-content" data-dcnode-id="760"></div></div><div class="pub-bottom-component" data-dcnode-id="389"><div class="inner" data-dcnode-id="390"><div class="pub-bottom-section-component" data-dcnode-id="745"><div class="top-row" data-dcnode-id="746" role="button" style="cursor: pointer;"> er-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%"><div data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">?</span></div></div></div><a class="bp3-button bp3-small discussion-primary-button" data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jods.mitpress.mit.edu/login%3Fredirect%3D/pub/ageofentanglement/release/1" role="button" tabindex="0"><span class="bp3-button-text" data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Login to discuss</span></span></a></div><div class="discussion-component preview" data-dcnode-id="675" id="discussion-ac5d256f-baf3-43b5-a84a-9c4aab4782b6" role="button" tabindex="-1"><div class="thread-comment-component is-preview" data-dcnode-id="676"><div class="avatar-wrapper" data-dcnode-id="686"><div class="avatar-component" data-dcnode-id="687" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://resize-v3.pubpub.org/eyJidWNrZXQiOiJhc3NldHMucHVicHViLm9yZyIsImtleSI6ImRoemZ2MjI2LzUxNTgwNjc3MTg4MDczLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6NTAsImhlaWdodCI6NTAsImZpdCI6ImNvdmVyIiwid2l0aG91dEVubGFyZ2VtZW50Ijp0cnVlfX19&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="677"><div class="item-header" data-dcnode-id="678"><span class="name" data-dcnode-id="682"><span data-dcnode-id="685" instrument_node="">Sérgio Lutav</span><span data-dcnode-id="683" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">This relationship — art as a catalyst to new science discovery — seems justified, and the disclaimer made later in the text, heartwarming. To be fair, there seems to be a much stronger connection between science and the previous stage — mass scale, continuously evolving, chaotic, wildly mutant, random behavior of people toward the various novelties recently designed into the world. But considering the suspension of disbelief, what can salvage the art-science continuum is a broader perspective on what is art.
Both examples — Cage and Picasso — do raise certain inconveniences: they empower the solitary genius, the archetypical artist, to enable creativity — a model of influence opposed to the contemporary times, where the wild force is the internet’s collective power (such as this journal itself). To focus the importance on singular artists seems dated.
My argument can be exemplified, for example, by blogs, YouTube or memes. Blogs were born as easy to publish platforms to write your journal; YouTube was for grandkids and grannies living apart. Now, you may have already solved the riddle: the massive collective artistry caused engineers to build faster servers, better video compression, higher streaming capacity, and designers started better UX for such platforms… and there we have it. 
Ps. I love this article. </span></span><span class="actions" data-dcnode-id="679"></span></div></div></div></div><div class="discussion-component preview" data-dcnode-id="662" id="discussion-ef04e0de-36a0-4ed0-a90e-b5e32a51a2a9" role="button" tabindex="-1"><div class="thread-comment-component is-preview" data-dcnode-id="663"><div class="avatar-wrapper" data-dcnode-id="673"><div class="avatar-component" data-dcnode-id="674" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://resize-v3.pubpub.org/eyJidWNrZXQiOiJhc3NldHMucHVicHViLm9yZyIsImtleSI6IjN6N2Y1MDhoLzQxNTI4NjM1OTQzMzc0LmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6NTAsImhlaWdodCI6NTAsImZpdCI6ImNvdmVyIiwid2l0aG91dEVubGFyZ2VtZW50Ijp0cnVlfX19&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="664"><div class="item-header" data-dcnode-id="665"><span class="name" data-dcnode-id="669"><span data-dcnode-id="672" instrument_node="">Fabiano Caruso</span><span data-dcnode-id="670" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Thank you very much. This essay helped me to organize the contents of my research on the future of libraries in the post-digital age, and it was necessary to create a new concept that was not limited to libraries and the need to think about a new field of action research in socioexpography at extralibris.org. I only change information &gt; knowledge to abstraction &gt; performance. </span></span><span class="actions" data-dcnode-id="666"></span></div></div></div></div><div class="discussion-component preview" data-dcnode-id="647" id="discussion-58b1b14c-29a3-4196-9e30-db472f1a3c16" role="button" tabindex="-1"><div class="thread-comment-component is-preview" data-dcnode-id="648"><div class="avatar-wrapper" data-dcnode-id="658"><div class="avatar-component" data-dcnode-id="659" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%"><div data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">BE</span></div></div></div><div class="content-wrapper" data-dcnode-id="649"><div class="item-header" data-dcnode-id="650"><span class="name" data-dcnode-id="654"><span data-dcnode-id="657" instrument_node="">Baden Eunson</span><span data-dcnode-id="655" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">The Cinderella Moment - Art &gt; Science- is the only section that doesn’t work. At times this reads like a parody, another Sokal moment https://en.wikipedia.org/wiki/Sokal_affair or something from the Postmodern Generator http://www.elsewhere.org/journal/pomo/ . As CP Snow pointed out many decades ago, there are two cultures- art and science- and they are most unlikely to meet https://www.amazon.com/Two-Cultures-Canto-Classics/dp/1107606144/ref=sr_1_2?keywords=two+cultures&amp;qid=1569040749&amp;s=gateway&amp;sr=8-2 .   However, it’s got enormous potential as a unifying construct.  Please do a version 2.0, and I will seek permission to reproduce in a new edition of my soft skills text https://www.wileydirect.com.au/buy/c21-communicating-in-the-21st-century-4th-edition/</span></span><span class="actions" data-dcnode-id="651"></span></div></div></div></div><div class="discussion-component preview" data-dcnode-id="634" id="discussion-fceb75f0-b274-4a69-a19c-834ff4345c39" role="button" tabindex="-1"><div class="thread-comment-component is-preview" data-dcnode-id="635"><div class="avatar-wrapper" data-dcnode-id="645"><div class="avatar-component" data-dcnode-id="646" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://s3.amazonaws.com/pubpub-upload/users/1463693986035.jpg&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="636"><div class="item-header" data-dcnode-id="637"><span class="name" data-dcnode-id="641"><span data-dcnode-id="644" instrument_node="">Jim Williams</span><span data-dcnode-id="642" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Welcome to the Metaverse.  You will learn your way here eventually.  You need to start by realizing that a lowly dress designer in the Metaverse understands the armature of the human body and the topological mesh of the human form better than you do.  Entanglement might describe a moment, but not an Age.</span></span><span class="actions" data-dcnode-id="638"></span></div></div></div></div><div class="discussion-component preview" data-dcnode-id="621" id="discussion-5cb4efde-73d4-4770-b56e-1da3b8070414" role="button" tabindex="-1"><div class="thread-comment-component is-preview" data-dcnode-id="622"><div class="avatar-wrapper" data-dcnode-id="632"><div class="avatar-component" data-dcnode-id="633" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://resize-v3.pubpub.org/eyJidWNrZXQiOiJhc3NldHMucHVicHViLm9yZyIsImtleSI6Il9zaXRlL2hhcHB5UHViLnBuZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6NTAsImhlaWdodCI6NTAsImZpdCI6ImNvdmVyIiwid2l0aG91dEVubGFyZ2VtZW50Ijp0cnVlfX19&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="623"><div class="item-header" data-dcnode-id="624"><span class="name" data-dcnode-id="628"><span data-dcnode-id="631" instrument_node="">Salomon Saachz</span><span data-dcnode-id="629" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Very well crafted paper, this is great to see this ideas pushed forward, thank you. As an alternative cardinality we can took the main aspirations behind these archetypes and discover that each lies on two realms : Spiritual (north), Intellectual (east), Physical (south), and Emotional (west). The North is quintessentially abstract &amp; pure in its search, the South is concrete &amp; materialist; The East advantages its left brain, thinking in numbers (logical, analytic), whether the West prefers its right side and thinks in shapes (intuitional, synthetic). I first seen the Maeda-Gold concept a few years ago on a Ken Perlin's presentation and really dig the idea. It is both powerful as a cooperative scheme as it can be for an individual creative process, and in a way is akin to a 'creative individuation' where one detaches itself to a defining label put by the natural conditioning of education. In a way this theoretical frame came close to the Renaissance Man culture, quite similar to the Hacker Scene of our age, where creation is seen as a borderless land, neither to be narrowed by a vernacular nor the seal of approval of a society. The interesting question is : can it be teached as a natural process for future generation ? (Or does this will solely emerges from adversity ?) To quote from my experience I was driven to enter the field of Computer Graphics to blend this concepts together : Art / Science, Research / Application, but has yet to see anyone detaching themself from the studies or subculture they came from. Many times in the industry you will see this inevitable clivage between "artist" vs "engineer" and trying to begin to discuss about the eventuality and potential interests of a merging is just not something that compute (yet). It surely possible, and might need an overall change in our education model by questionning what outputs do we value more in people (self-reliance and self-efficacy might be a good start). Oh I'm still young, I have hope. PS : we should totally call this the OMG diagram, because frack yeah three letters acronym.</span></span><span class="actions" data-dcnode-id="625"></span></div></div></div></div><div clas  data-dcnode-id="580" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="578"></span><span class="actions" data-dcnode-id="577"></span></div></div></div></div><div class="discussion-component preview" data-dcnode-id="560" id="discussion-91710ee4-4825-4998-997e-77c6dd8e7183" role="button" tabindex="-1"><div class="thread-comment-component is-preview" data-dcnode-id="561"><div class="avatar-wrapper" data-dcnode-id="571"><div class="avatar-component" data-dcnode-id="572" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://s3.amazonaws.com/pubpub-upload/users/1457768878781.jpg&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="562"><div class="item-header" data-dcnode-id="563"><span class="name" data-dcnode-id="567"><span data-dcnode-id="570" instrument_node="">Tyler Miller</span><span data-dcnode-id="568" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Can you elaborate on a reason that the KCC should address scale?</span></span><span class="actions" data-dcnode-id="564"></span></div></div></div></div><div class="discussion-component preview" data-dcnode-id="535" id="discussion-ff6858c0-2778-4fe9-b0a6-86ba4dcaae0c" role="button" tabindex="-1"><div class="thread-comment-component is-preview" data-dcnode-id="548"><div class="avatar-wrapper" data-dcnode-id="558"><div class="avatar-component" data-dcnode-id="559" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://s3.amazonaws.com/pubpub-upload/users/1458062640259.jpg&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="549"><div class="item-header" data-dcnode-id="550"><span class="name" data-dcnode-id="554"><span data-dcnode-id="557" instrument_node="">Rayna Jhaveri</span><span data-dcnode-id="555" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Design and Science</span></span><span class="actions" data-dcnode-id="551"></span></div></div></div><div class="thread-comment-component is-preview" data-dcnode-id="536"><div class="avatar-wrapper" data-dcnode-id="546"><div class="avatar-component" data-dcnode-id="547" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://s3.amazonaws.com/pubpub-upload/users/1458062640259.jpg&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="537"><div class="item-header" data-dcnode-id="538"><span class="name" data-dcnode-id="542"><span data-dcnode-id="545" instrument_node="">Rayna Jhaveri</span><span data-dcnode-id="543" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">^ How do I make a highlighted comment? I wanted to suggest the subtitle be corrected from "An inaugural essay for the Journal of Design of Science (JoDS)" to "An inaugural essay for the Journal of Design and Science (JoDS)" [emphasis mine]</span></span><span class="actions" data-dcnode-id="539"></span></div></div></div></div><div class="discussion-component preview" data-dcnode-id="522" id="discussion-5a360d34-57de-4ba9-a7f9-7385c2135ecb" role="button" tabindex="-1"><div class="thread-comment-component is-preview" data-dcnode-id="523"><div class="avatar-wrapper" data-dcnode-id="533"><div class="avatar-component" data-dcnode-id="534" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://s3.amazonaws.com/pubpub-upload/users/1457982597494.jpg&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="524"><div class="item-header" data-dcnode-id="525"><span class="name" data-dcnode-id="529"><span data-dcnode-id="532" instrument_node="">Paul T. Kidd</span><span data-dcnode-id="530" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">This I think is the right word. In my artistic practice I have been working on entangling all of my work as a way of exploring this idea symbolically by entangling plastic and descriptive expression. Part of the motivation is to demonstrate also the power of art as a means of thinking about complex issues. Also I would say that entanglement opens up a better way to unify knowledge than the old science “reductive” approach of Edward O Wilson (Consilience) which just seems to reduce everything to the matter of genes, which is not much use if one is trying to unify knowledge to achieve a different view or address complex challenges. If one is designing mirco-electronics for computers, then electrons are appropriate, but if one is interested in using computers for solving problems, then programming is more useful.</span></span><span class="actions" data-dcnode-id="526"></span></div></div></div></div><div class="discussion-component preview" data-dcnode-id="497" id="discussion-7f795af9-70aa-4448-baf9-03fc5bdea2c7" role="button" tabindex="-1"><div class="thread-comment-component is-preview" data-dcnode-id="510"><div class="avatar-wrapper" data-dcnode-id="520"><div class="avatar-component" data-dcnode-id="521" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://s3.amazonaws.com/pubpub-upload/users/1457982597494.jpg&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="511"><div class="item-header" data-dcnode-id="512"><span class="name" data-dcnode-id="516"><span data-dcnode-id="519" instrument_node="">Paul T. Kidd</span><span data-dcnode-id="517" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">We need people who can do this - I coined the term Life Systems Architect to cover this. Architects need specialists, and specialists need the Architect. Without the Architect the specialists are lost, fragmented, caught in their reductive view. The Architect brings to the activity that which the specialists cannot, sees the whole, and looks towards costs, utility, as well as aesthetics.</span></span><span class="actions" data-dcnode-id="513"></span></div></div></div><div class="thread-comment-component is-preview" data-dcnode-id="498"><div class="avatar-wrapper" data-dcnode-id="508"><div class="avatar-component" data-dcnode-id="509" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://s3.amazonaws.com/pubpub-upload/users/1458615881516.jpg&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="499"><div class="item-header" data-dcnode-id="500"><span class="name" data-dcnode-id="504"><span data-dcnode-id="507" instrument_node="">Danny Chambers</span><span data-dcnode-id="505" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">I am glad this was highlighted, and addressed as a counter point. To this point in the development of technology (read: tools) we have made the tasks of the single dicipline expert much more effcient. Consider adobe suite for creatives and matlab for engineers and scientists. While new tools for communication certainly enable the "life systems architect" to do a better job, I see technology first and foremost addressing the needs of concise tasks. Fortunetely, this increased efficiency and automation frees up the humans who would other wise be working in strict silos to consider the entire landscape and focus on creating connections.</span></span><span class="actions" data-dcnode-id="501"></span></div></div></div></div><div class="discussion-component preview" data-dcnode-id="484" id="discussion-0803b7f1-2360-4be2-8562-ee9879532bd9" role="button" tabindex="-1"><div class="thread-comment-component is-preview" data-dcnode-id="485"><div class="avatar-wrapper" data-dcnode-id="495"><div class="avatar-component" data-dcnode-id="496" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://s3.amazonaws.com/pubpub-upload/users/1457982597494.jpg&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="486"><div class="item-header" data-dcnode-id="487"><span class="name" data-dcnode-id="491"><span data-dcnode-id="494" instrument_node="">Paul T. Kidd</span><span data-dcnode-id="492" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Yes! When one has within one mind both art and, say engineering, one can see the world in a different way from the artist, or the engineer, and there is no communication problem of the kind that can exist between artists and engineers. The communication problem shifts to one of trying to explain your weird view of the world to others, be they artists, engineers, scientist, ...</span></span><span class="actions" data-dcnode-id="488"></span></div></div></div></div><div class="discussion-component preview" data-dcnode-id="471" id="discussion-4576bc41-0906-44f0-a3a9-e376fd525ebe" role="button" tabindex="-1"><div class="thread-comment-component is-preview" data-dcnode-id="472"><div class="avatar-wrapper" data-dcnode-id="482"><div class="avatar-component" data-dcnode-id="483" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://s3.amazonaws.com/pubpub-upload/users/1457982597494.jpg&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="473"><div class="item-header" data-dcnode-id="474"><span class="name" data-dcnode-id="478"><span data-dcnode-id="481" instrument_node="">Paul T. Kidd</span><span data-dcnode-id="479" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">I know the feeling - in fact if you try to operate in two areas, those in one area will say that "you are not one of us, you are one of them", while in the other area they will say "you are not one of us, you are one of them." And so you learn that this is indeed the case and that you are in fact a person from the 'spaces between spaces', and few if any will be able to understand you.</span></span><span class="actions" data-dcnode-id="475"></span></div></div></div></div><div class="discussion-component preview" data-dcnode-id="446" id="discussion-55f3b85c-30a7-469e-9b29-71e4099f4442" role="button" tabindex="-1"><div class="thread-comment-component is-preview" data-dcnode-id="459"><div class="avatar-wrapper" data-dcnode-id="469"><div class="avatar-component" data-dcnode-id="470" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://resize-v3.pubpub.org/eyJidWNrZXQiOiJhc3NldHMucHVicHViLm9yZyIsImtleSI6Il9zaXRlL2hhcHB5UHViLnBuZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6NTAsImhlaWdodCI6NTAsImZpdCI6ImNvdmVyIiwid2l0aG91dEVubGFyZ2VtZW50Ijp0cnVlfX19&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="460"><div class="item-header" data-dcnode-id="461"><span class="name" data-dcnode-id="465"><span data-dcnode-id="468" instrument_node="">Max Shen</span><span data-dcnode-id="466" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">This does not strike me as true. It is known that Satoshi Nakamoto had a decent idea about the potential social impact that Bitcoin would have, and perhaps smartphone manufacturers had dreams of the kind of global influence they could have, but I don't think the ancient invention of the brick requires a "knotty creator". As defined, all objects are knotty. That is fundamental beauty and truth of our reality. It doesn't require a "knotty creator" to create knotty objects - one may mindlessly produce trash, but it may be a knotty piece of gold to others.</span></span><span class="actions" data-dcnode-id="462"></span></div></div></div><div class="thread-comment-component is-preview" data-dcnode-id="447"><div class="avatar-wrapper" data-dcnode-id="457"><div class="avatar-component" data-dcnode-id="458" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://resize-v3.pubpub.org/eyJidWNrZXQiOiJhc3NldHMucHVicHViLm9yZyIsImtleSI6ImczZXk3NXd2LzIxNTQ3MzQ5Njk2MDU5LmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6NTAsImhlaWdodCI6NTAsImZpdCI6ImNvdmVyIiwid2l0aG91dEVubGFyZ2VtZW50Ijp0cnVlfX19&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="448"><div class="item-header" data-dcnode-id="449"><span class="name" data-dcnode-id="453"><span data-dcnode-id="456" instrument_node="">Marina Tsaplina</span><span data-dcnode-id="454" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">I enjoy the idea of “knotty objects” very much, and agree fully that all of reality- and its many forms- is knotty. This is a fundamental spiritual teaching of “inter-being”: I am because you are. This is, because that is… expressed differently as a deeply interwoven fabric of interdependence. Fall deeply into one object, and emerge on the other side of the world… (“object” understood in its most expansive sense of person, space, story, history, form, etc.)</span></span><span class="actions" data-dcnode-id="450"></span></div></div></div></div><div class="discussion-component preview" data-dcnode-id="433" id="discussion-aeac7cbd-3e0a-47fb-8837-88ade3135687" role="button" tabindex="-1"><div class="thread-comment-component is-preview" data-dcnode-id="434"><div class="avatar-wrapper" data-dcnode-id="444"><div class="avatar-component" data-dcnode-id="445" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://resize-v3.pubpub.org/eyJidWNrZXQiOiJhc3NldHMucHVicHViLm9yZyIsImtleSI6Il9zaXRlL2hhcHB5UHViLnBuZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6NTAsImhlaWdodCI6NTAsImZpdCI6ImNvdmVyIiwid2l0aG91dEVubGFyZ2VtZW50Ijp0cnVlfX19&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="435"><div class="item-header" data-dcnode-id="436"><span class="name" data-dcnode-id="440"><span data-dcnode-id="443" instrument_node="">Mike McCartin</span><span data-dcnode-id="441" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Interesting to tie "entanglement" to quantum entanglement. Additionally, the Krebs Cycle reminds me of the diagram of a quantum bit or Qubit.</span></span><span class="actions" data-dcnode-id="437"></span></div></div></div></div><div class="discussion-component preview" data-dcnode-id="420" id="discussion-6efa6636-f976-4983-91a7-4002234d2af6" role="button" tabindex="-1"><div class="thread-comment-component is-preview" data-dcnode-id="421"><div class="avatar-wrapper" data-dcnode-id="431"><div class="avatar-component" data-dcnode-id="432" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://resize-v3.pubpub.org/eyJidWNrZXQiOiJhc3NldHMucHVicHViLm9yZyIsImtleSI6Il9zaXRlL2hhcHB5UHViLnBuZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6NTAsImhlaWdodCI6NTAsImZpdCI6ImNvdmVyIiwid2l0aG91dEVubGFyZ2VtZW50Ijp0cnVlfX19&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="422"><div class="item-header" data-dcnode-id="423"><span class="name" data-dcnode-id="427"><span data-dcnode-id="430" instrument_node="">Paola Antonelli</span><span data-dcnode-id="428" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Behind the scenes, Knotty Objects was a great opportunity to test the "bottom-up world-reading" approach. In Neri, Kevin, and my hands, the steak, the bitcoin, the brick, and the phone certainly implied sterotypical contexts, but also stood in as doors into entangled universes of meaning and questioning. This was shown in particular in four videos, each starring one of the objects. In two short minutes and a half, the phone led us to ponder issues related to manufacturing; market share and control of the product vs customization; the relationship between China factories and worldwide distribution; good design vs bad design, and much more (https://vimeo.com/134128443). The brick connected masonry (with a small 'm') to biology, moving through a connection between play, assemblage, and thinkering in fields ranging from toy design to electronic circuitry (https://vimeo.com/134128442).</span></span><span class="actions" data-dcnode-id="424"></span></div></div></div></div><div class="discussion-component preview" data-dcnode-id="395" id="discussion-4be2d9ee-0eb6-4425-aea4-236dfdb971a7" role="button" tabindex="-1"><div class="thread-comment-component is-preview" data-dcnode-id="408"><div class="avatar-wrapper" data-dcnode-id="418"><div class="avatar-component" data-dcnode-id="419" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://s3.amazonaws.com/pubpub-upload/users/1453297727490.jpg&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="409"><div class="item-header" data-dcnode-id="410"><span class="name" data-dcnode-id="414"><span data-dcnode-id="417" instrument_node="">Michael Dila</span><span data-dcnode-id="415" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">The CreATP hypothesis is an interesting one. As important as a theory of digestion is, it is equally important to advance a theory of ingestion, or diet. In fact, we need a theory of diet and exercise to complement the theory of metabolism you propose here. Metabolism is a mechanism in energy production, as you point out, but what kinds of energy are produced by feeding the mechanism different "foods" (ideas, observations, experiences) and how is the mechanism affected by "exercise" like argument, conversation and reflection?</span></span><span class="actions" data-dcnode-id="411"></span></div></div></div><div class="thread-comment-component is-preview" data-dcnode-id="396"><div class="avatar-wrapper" data-dcnode-id="406"><div class="avatar-component" data-dcnode-id="407" style="width:18px;min-width:18px;height:18px;border-width:0;font-size:7px;background-color:#000000;z-index:initial;border-radius:50%;background-image:url(&quot;https://resize-v3.pubpub.org/eyJidWNrZXQiOiJhc3NldHMucHVicHViLm9yZyIsImtleSI6Il9zaXRlL2hhcHB5UHViLnBuZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6NTAsImhlaWdodCI6NTAsImZpdCI6ImNvdmVyIiwid2l0aG91dEVubGFyZ2VtZW50Ijp0cnVlfX19&quot;)"></div></div><div class="content-wrapper" data-dcnode-id="397"><div class="item-header" data-dcnode-id="398"><span class="name" data-dcnode-id="402"><span data-dcnode-id="405" instrument_node="">Jon Leach</span><span data-dcnode-id="403" instrument_node="">: </span></span><span class="preview-text" data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">I think this is a truly great piece of work. As someone who went to university as a prospective biochemist but ended up graduating in "HPS" (the History and Philsopy of Science") i love the scheme I have a career in advertising where, to use your language, i bring the science and the engineering to the designers and artisists. And what we do is intensely utilitarian ("sell or else", David Ogilvy) but has an effect on popular culture. Finally, i have found myself needing to sharpen my design skills and even my artistic skills as my trade become more entangled. I need to this to help make the knotty objects today. While i like the model and the energy (inc. gyroscope) analogy i see it (also) as a carousel.  You can feel the energy at any point and - crucially - you can add energy to it at any point. Arguably, you must add it at several points. I think  Krebs is actually a circular but ultimately linea  "factory" where acetyl choline (from sugar, fats etc.) is fed in at one end to spit out ATP (the universal energy chemical) at the other, and then by a circular path the factory resets.  i.e. it has  in and an out doors. I think the beauty of your system is that there is no prescribed in or out. Any of the four domains could be (should be) the input or the output.  It really is a Circle of Life. Great stuff.....</span></span><span class="actions" data-dcnode-id="399"></span></div></div></div></div></div></div></div></div></div></div><div class="pub-mouse-events-component" data-dcnode-id="388"></div></div></div></div><div class="footer-component accent-background accent-color" data-dcnode-id="365"><div class="container" data-dcnode-id="370"><div class="row" data-dcnode-id="371"><div class="col-12" data-dcnode-id="372"><div class="left" data-dcnode-id="384"></div><div class="right" data-dcnode-id="373"><div class="footer-title" data-dcnode-id="381"><a data-dcnode-id="382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jods.mitpress.mit.edu/"><span data-dcnode-id="383" instrument_node="">Journal of Design and Science</span></a></div><ul class="separated" data-dcnode-id="374"><li data-dcnode-id="378"><
