</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0010&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract:</h2><div id=&quot;as0010&quot;><p id=&quot;sp0075&quot;><span id=&quot;p105&quot;></span>The importance we attach to our perception of light and colour and its emotional effects is discussed with reference to experimental work. The question of whether red is a more activating colour than blue is discussed by reference to two opposing schools of thought. One is based on colour light and measured by physiological changes in the central and autonomic nervous system and the other is based on colour pigment applied in interior and exterior spaces. The question whether colour affects the subjective estimation of time and warmth is also discussed with reference to experimental work. The ongoing debate of colour aesthetics and, in particular colour preferences is discussed on a longitudinal basis for the past 40 years of teaching the subject in the Oxford School of Architecture.</p></div></div></div>" data-dcnode-id="4354" lang="en" name="citation_abstract"><span data-dcnode-id="4353" instrument_node="">

l object identifier" class="doi" data-dcnode-id="4001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1533/9780857095534.1.105" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="4002" instrument_node="">https://doi.org/10.1533/9780857095534.1.105</span></a><a class="rights-and-content" data-dcnode-id="3999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DB9781845699727500047%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4000" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="3997"></section><section class="ReferencedArticles" data-dcnode-id="3996"></section><div class="PageDivider" data-dcnode-id="3995"></div><div class="Abstracts u-font-serif" data-dcnode-id="3987" id="abstracts"><div class="abstract author" data-dcnode-id="3988" id="ab0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">Abstract:</span></h2><div data-dcnode-id="3989" id="as0010"><p data-dcnode-id="3990" id="sp0075"><span data-dcnode-id="3992" id="p105"></span><span data-dcnode-id="3991" instrument_node="">The importance we attach to our perception of light and colour and its emotional effects is discussed with reference to experimental work. The question of whether red is a more activating colour than blue is discussed by reference to two opposing schools of thought. One is based on colour light and measured by physiological changes in the central and autonomic nervous system and the other is based on colour pigment applied in interior and exterior spaces. The question whether colour affects the subjective estimation of time and warmth is also discussed with reference to experimental work. The ongoing debate of colour aesthetics and, in particular colour preferences is discussed on a longitudinal basis for the past 40 years of teaching the subject in the Oxford School of Architecture.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="3964" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="3976"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="3977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781845699727500035"><svg class="icon icon-navigate-left" data-dcnode-id="3985" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="3986"></path></svg><span class="button-alternative-text" data-dcnode-id="3978"><strong data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">chapter</span></span><span class="extra-detail-2" data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node=""> in book</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="3965"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="3966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781845699727500059"><span class="button-alternative-text" data-dcnode-id="3969"><strong data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="3972"><span data-dcnode-id="3973" instrument_node="">chapter</span></span><span class="extra-detail-2" data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node=""> in book</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="3967" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="3968"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="3945"><div class="keywords-section" data-dcnode-id="3946" id="aep-keywords-id1"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">Key words</span></h2><div class="keyword" data-dcnode-id="3959"><span data-dcnode-id="3960" id="tx0010"><span data-dcnode-id="3961" instrument_node="">longitudinal colour preference</span></span></div><div class="keyword" data-dcnode-id="3956"><span data-dcnode-id="3957" id="tx0015"><span data-dcnode-id="3958" instrument_node="">psycho-physiological arousal</span></span></div><div class="keyword" data-dcnode-id="3953"><span data-dcnode-id="3954" id="tx0020"><span data-dcnode-id="3955" instrument_node="">subjective time estimation and warmth</span></span></div><div class="keyword" data-dcnode-id="3950"><span data-dcnode-id="3951" id="tx0025"><span data-dcnode-id="3952" instrument_node="">light and seasonal affective disorder</span></span></div><div class="keyword" data-dcnode-id="3947"><span data-dcnode-id="3948" id="tx0030"><span data-dcnode-id="3949" instrument_node="">architectural context</span></span></div></div></div><span data-dcnode-id="3944" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3072" id="body"><div data-dcnode-id="3073"><section data-dcnode-id="3849" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3940" id="st0020"><span data-dcnode-id="3943" instrument_node="">4.1</span><span data-dcnode-id="3942" instrument_node="">. </span><span data-dcnode-id="3941" instrument_node="">Introduction</span></h2><p data-dcnode-id="3938" id="p0010"><span data-dcnode-id="3939" instrument_node="">The importance we attach to our perception of light and colour and its emotional effects upon us is not only celebrated by artists, poets and architects, but arouses life-long passions amongst different scientists trying to understand and measure its effects upon human beings and life itself. This chapter addresses some of these issues.</span></p><p data-dcnode-id="3913" id="p0015"><span data-dcnode-id="3937" instrument_node="">We need light to see the world around us and colour to add beauty to our aesthetic sensibility. The effects of light and colour on man, however, go beyond our common-sense assumptions and expectations; writers from poets to evolutionary biologists have praised man’s good fortune. Indeed, Nicholas Humphrey, a theoretical psychologist known for his work on the evolution of human intelligence and consciousness, put forward the proposition that our ability to see colour could have evolved only because it contributes to our biological survival. Rikard Küller, the most distinguished environmental psychologist in Scandinavia, in his comprehensive annotated bibliography of over 1700 references (</span><a class="workspace-trigger" data-dcnode-id="3935" href="#bb0180" name="bbb0180"><span data-dcnode-id="3936" instrument_node="">Küller, 1981</span></a><span data-dcnode-id="3934" instrument_node="">), commissioned by the Commission Internationale de l’Eclairage (CIE), summarised the psychophysiological literature on activation, and firmly established the importance of three systems, mediating the non-visual effects of light and colour:</span></p><dl class="list" data-dcnode-id="3914"><dt class="list-label" data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="3928"><p data-dcnode-id="3929" id="p0020"><span data-dcnode-id="3931" id="p106"></span><span data-dcnode-id="3930" instrument_node="">The cutaneous system activated when ultraviolet and infrared radiation reaches the skin. Skin pigmentation and the development of vitamin D are some of the main effects.</span></p></dd><dt class="list-label" data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="3923"><p data-dcnode-id="3924" id="p0025"><span data-dcnode-id="3925" instrument_node="">The pineal–hypothalamic–pituitary system. Light affects the pineal gland where it blocks the sleep hormone melatonin, which in turn influences the hypothalamus which is involved in our emotions, and the pituitary gland which regulates other hormones.</span></p></dd><dt class="list-label" data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="3915"><p data-dcnode-id="3916" id="p0030"><span data-dcnode-id="3920" instrument_node="">The reticular activation system. Visual stimulation passing through the reticular formation activates the central nervous system as a whole. Both </span><a class="topic-link" data-dcnode-id="3918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/external-stimulation" title="Learn more about external stimulation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3919" instrument_node="">external stimulation</span></a><span data-dcnode-id="3917" instrument_node=""> through the ascending reticular activation system (ARAS) and internal activation such as thinking and personal experiences through the descending reticular activation system (DRAS) affect our state of arousal.</span></p></dd></dl><p></p><p data-dcnode-id="3905" id="p0035"><span data-dcnode-id="3912" instrument_node="">The impact of light on our mood and emotions is well illustrated in a recent cross-cultural study involving 1000 people in Sweden, England, Saudi Arabia and Argentina (</span><a class="workspace-trigger" data-dcnode-id="3907" href="#bb0195" name="bbb0195"><span data-dcnode-id="3911" instrument_node="">Küller </span><em data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">et al.</span></em><span data-dcnode-id="3908" instrument_node="">, 2006</span></a><span data-dcnode-id="3906" instrument_node="">). The results show that both England (52 °N) and Sweden (56 °N) exhibited serious symptoms of seasonal affective disorder, commonly known as SAD, during the winter, compared to Argentina (27 °S) and Saudi Arabia (26 °S). These symptoms indicated extreme tiredness, insomnia, lack of concentration, inactivity, social withdrawal and poor mood. Almost half of the population of the two northern countries exhibited some degree of seasonal disorder.</span></p><p data-dcnode-id="3900" id="p0040"><span data-dcnode-id="3904" instrument_node="">The question of whether red is a more activating colour than blue is discussed by reference to two opposing schools of thought. One is based on colour light and measured by physiological changes in the central and autonomic nervous system and the other is based on colour pigment applied in interior and exterior spaces while varying the dimensions of hue, chromatic strength and lightness. Two experiments are discussed where subjects experience realistic full-scale red and blue spaces (and rooms) and where both physiological and affective measures are taken. This is followed by looking at whether differences in hue affect our perception and feeling of warmth at the cognitive as well as the </span><a class="topic-link" data-dcnode-id="3902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/physiological-level" title="Learn more about physiological level from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3903" instrument_node="">physiological level</span></a><span data-dcnode-id="3901" instrument_node="">. The third area considers the hypothesis that red accelerates the subjective experience of time. These two experiments are discussed in the context of other published work over the past 80 years (1926–2009). The ongoing debate of colour aesthetics and, in particular, colour preferences is discussed on a longitudinal basis, not on the basis of a single experiment and also in relation to the context of colour applied to buildings.</span></p><div data-dcnode-id="3864"><p data-dcnode-id="3883" id="p0045"><span data-dcnode-id="3899" instrument_node="">Colour psychology is an area increasingly involving interdisciplinary research towards our better understanding of the influence of light and colour on our emotions (</span><a class="workspace-trigger" data-dcnode-id="3897" href="#bb0245" name="bbb0245"><span data-dcnode-id="3898" instrument_node="">Porter and Mikellides, 2009</span></a><span data-dcnode-id="3896" instrument_node="">). It is not surprising to observe that the International Association of Colour (AIC) world </span><span data-dcnode-id="3895" id="p107"></span><span data-dcnode-id="3890"><span data-dcnode-id="3894" instrument_node="">conference held in Sydney 2009 attracted over 100 papers submitted on this subject. Sir Hugh Casson (1976), British interior designer, artist, influential writer and </span><a class="topic-link" data-dcnode-id="3892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/broadcaster" title="Learn more about broadcaster from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3893" instrument_node="">broadcaster</span></a><span data-dcnode-id="3891" instrument_node=""> on 20th century design and particularly noted for his role as director of architecture at the 1951 Festival of Britain on London’s South Bank, wrote ‘there is no truer colour responsive instrument to be found than man in all his variety, and that the best way to study colour is to use it’. If we keep on using colour and, at the same time, observe, measure and study its effects on people, we might be better for it. Antonio Gaudi, architect and designer, the most internationally prestigious figure in Spanish architecture, wrote on the 23</span></span><sup data-dcnode-id="3888"><span data-dcnode-id="3889" instrument_node="">rd</span></sup><span data-dcnode-id="3887" instrument_node=""> January 1915 that ‘Colour is life, we should not scorn this means of instilling life in our works’. If designers need any excuses for any inspiration to know more about colour while reading the learned journals and books, they might as well go out and learn how colour is used in nature; as Nicholas Humphrey put it: ‘Nature has, after all been in the design business for over one hundred million years’. For over 30 years, first-year architectural students at the Oxford School of Architecture have been going out to Westonbirt Arboretum in Gloucestershire, England, during the third week of October in search of synchronic and diachronic rhyme (see </span><a class="workspace-trigger" data-dcnode-id="3885" href="#f0010" name="bf0010"><span data-dcnode-id="3886" instrument_node="">Fig.&nbsp;4.1</span></a><span data-dcnode-id="3884" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="3865" id="f0010"><span data-dcnode-id="3873"><img alt="" aria-describedby="ca0010" data-dcnode-id="3882" height="202" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-01-9781845699727.jpg&amp;raw"><span data-dcnode-id="3881" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3874"><li data-dcnode-id="3875"><a class="anchor download-link u-font-sans" data-dcnode-id="3876" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-01-9781845699727.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3877"><span data-dcnode-id="3880" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3866"><span data-dcnode-id="3867" id="ca0010"><p data-dcnode-id="3868" id="sp0010"><span class="label" data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">Fig&nbsp;4.1</span></span><span data-dcnode-id="3870" instrument_node="">. </span><span data-dcnode-id="3869" instrument_node="">Westonbirt Arboretum, third week of October.</span></p></span></span></figure></div><p data-dcnode-id="3850" id="p0050"><span data-dcnode-id="3863" instrument_node="">This trip coincides with the spectacular changes of autumn colours and, based on the theoretical work of Nicholas </span><a class="workspace-trigger" data-dcnode-id="3861" href="#bb0125" name="bbb0125"><span data-dcnode-id="3862" instrument_node="">Humphrey, 1976</span></a><span data-dcnode-id="3860" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3858" href="#bb0130" name="bbb0130"><span data-dcnode-id="3859" instrument_node="">Humphrey, 2006</span></a><span data-dcnode-id="3857" instrument_node="">, the students then visit the historic town of Bath in search of the same principles in the urban environment, before completing their project. This part of their project is based on </span><a class="workspace-trigger" data-dcnode-id="3852" href="#bb0270" name="bbb0270"><span data-dcnode-id="3856" instrument_node="">Peter Smith’s ‘</span><em data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">The Dynamics of Delight</span></em><span data-dcnode-id="3853" instrument_node=""> (2003)</span></a><span data-dcnode-id="3851" instrument_node="">. This introduction to colour has been a memorable and a delightful part over the years in the students educational experience on colour theory and practice.</span></p></section><section data-dcnode-id="3639" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3845" id="st0025"><span data-dcnode-id="3848" instrument_node="">4.2</span><span data-dcnode-id="3847" instrument_node="">. </span><span data-dcnode-id="3846" instrument_node="">Colour preference: the longitudinal perspective 1970–2009</span></h2><p data-dcnode-id="3808" id="p0055"><span data-dcnode-id="3844" id="p108"></span><span data-dcnode-id="3839"><span data-dcnode-id="3843" instrument_node="">Colour preference is a topic which has attracted the ‘attention’ of nearly every researcher or writer on colour and light psychology over the past 100 years or so, from Cohn’s first empirical study in 1894 to the latest reports on the subject in colour conferences and books. Nicholas Humphrey, in the early 1970s, suggested that </span><a class="topic-link" data-dcnode-id="3841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/rhesus-monkey" title="Learn more about rhesus monkeys from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3842" instrument_node="">rhesus monkeys</span></a><span data-dcnode-id="3840" instrument_node=""> found blue light more pleasant than red light. In later experiments, however, he suggested that this interpretation of the behavioural results in terms ‘pleasantness’ as improbable; instead he proposed that monkeys ‘do things faster in red than blue light’. The distinguished British psychologist, Hans Eysenck, 30 years earlier obtained his PhD on the subject and proposed a ‘universal order’ of preference, possibly rooted in biology and related to our aesthetic appreciation (</span></span><a class="workspace-trigger" data-dcnode-id="3837" href="#bb0095" name="bbb0095"><span data-dcnode-id="3838" instrument_node="">Eysenck, 1941</span></a><span data-dcnode-id="3836" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="3834" href="#bb0060" name="bbb0060"><span data-dcnode-id="3835" instrument_node="">Acking and Küller (1976)</span></a><span data-dcnode-id="3833" instrument_node=""> in their classic ‘</span><em data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">Interior Colour Space</span></em><span data-dcnode-id="3830" instrument_node="">’ study ‘found differences in preference within hues far greater than between hues’ when they controlled for lightness and chromatic strength. In the AIC 1996 conference on colour psychology, five papers dealt with different aspects of colour preference. The first examined the relationship between colour chips and colour objects (</span><a class="workspace-trigger" data-dcnode-id="3828" href="#bb0275" name="bbb0275"><span data-dcnode-id="3829" instrument_node="">Taft and Sivik, 1997</span></a><span data-dcnode-id="3827" instrument_node="">); the second examined different theories of colour preference in relation to urban places (</span><a class="workspace-trigger" data-dcnode-id="3825" href="#bb0185" name="bbb0185"><span data-dcnode-id="3826" instrument_node="">Küller, 1997</span></a><span data-dcnode-id="3824" instrument_node="">); the third examined the validity of colour preference as a measure of personality (</span><a class="workspace-trigger" data-dcnode-id="3822" href="#bb0230" name="bbb0230"><span data-dcnode-id="3823" instrument_node="">Oberascher, 1997</span></a><span data-dcnode-id="3821" instrument_node="">); the fourth examined colour preferences in architectural studios (</span><a class="workspace-trigger" data-dcnode-id="3819" href="#bb0160" name="bbb0160"><span data-dcnode-id="3820" instrument_node="">Kiran, 1996</span></a><span data-dcnode-id="3818" instrument_node="">), and the fifth looked at cross-cultural differences in Japan, China and Indonesia (</span><a class="workspace-trigger" data-dcnode-id="3816" href="#bb0250" name="bbb0250"><span data-dcnode-id="3817" instrument_node="">Sato, 1996</span></a><span data-dcnode-id="3815" instrument_node="">). In AIC 2008a total of eight papers on colour preference were presented (</span><a class="workspace-trigger" data-dcnode-id="3810" href="#bb0165" name="bbb0165"><span data-dcnode-id="3814" instrument_node="">Kortbawi </span><em data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node="">et al.</span></em><span data-dcnode-id="3811" instrument_node="">, 2008</span></a><span data-dcnode-id="3809" instrument_node="">).</span></p><p data-dcnode-id="3806" id="p0060"><span data-dcnode-id="3807" instrument_node="">Why such interest? What is the practical use of these studies for the design professional? Do they raise any theoretical issues for the psychologist? What can we learn from the various measuring techniques, ranging across observational, qualitative and quantitative methods? Are these techniques valid? Some of these questions will be examined in the light of the findings of an ongoing longitudinal study of colour preferences (1970–2009) amongst architectural students at the Oxford School of Architecture. When lightness and chromatic strength are controlled within a homogenous population, in terms of age, aspirations and interests, do colour preferences change as a result of fashion, marketing and time, or are they stable over time and between the genders?</span></p><div data-dcnode-id="3778"><p data-dcnode-id="3798" id="p0065"><span data-dcnode-id="3805" instrument_node="">The findings of this study provide evidence for the strong popularity of and dislike for specific colours, the general order of preference proposed by Eysenck, and the influence of fashion, politics and attitudes over time. When </span><a class="workspace-trigger" data-dcnode-id="3803" href="#bb0095" name="bbb0095"><span data-dcnode-id="3804" instrument_node="">Eysenck (1941)</span></a><span data-dcnode-id="3802" instrument_node=""> collected together all the published research he could find on the subject and calculated the average ranking of colour preference in 21 060 subjects of different cultures, the general order of preference was found to be: 1, blue; 2, red; 3, green; 4, violet; 5, orange; 6, yellow. The order was highly significant and was the same for both genders. However, the actual colours have not been specified other than having been ‘saturated colours’. In the Oxford longitudinal study, the colours used were matched to the same lightness and chromatic strength (2070 R90B, 2070 Y90R, 2070 B90G, 2070 R50B, 2070 Y50R, 2070 G90Y). Students took the rank-ordering preference tests during the first week of their architectural studies, before reading anything on the subject other than their interest in design. The size of the sample was 1340. The results are illustrated in </span><a class="workspace-trigger" data-dcnode-id="3800" href="#f0015" name="bf0015"><span data-dcnode-id="3801" instrument_node="">Fig.&nbsp;4.2</span></a><span data-dcnode-id="3799" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="3779" id="f0015"><span data-dcnode-id="3788"><img alt="" aria-describedby="ca0015" data-dcnode-id="3797" height="205" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-02-9781845699727.jpg&amp;raw"><span data-dcnode-id="3796" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3789"><li data-dcnode-id="3790"><a class="anchor download-link u-font-sans" data-dcnode-id="3791" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-02-9781845699727.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3792"><span data-dcnode-id="3795" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3780"><span data-dcnode-id="3781" id="ca0015"><p data-dcnode-id="3782" id="sp0015"><span class="label" data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">Fig&nbsp;4.2</span></span><span data-dcnode-id="3785" instrument_node="">. </span><span data-dcnode-id="3784" id="p109"></span><span data-dcnode-id="3783" instrument_node="">Longitudinal colour preference.</span></p></span></span></figure></div><p data-dcnode-id="3726" id="p0070"><span data-dcnode-id="3777" instrument_node="">The main results are summarised briefly below, followed by a discussion related to previous studies on the subject.</span></p><dl class="list" data-dcnode-id="3727"><dt class="list-label" data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="3769"><p data-dcnode-id="3770" id="p0075"><span data-dcnode-id="3774" instrument_node="">The order of preference for the six colours amongst architectural students remains the same as that identified by Eysenck in 1941. However, as can be seen from </span><a class="workspace-trigger" data-dcnode-id="3772" href="#f0015" name="bf0015"><span data-dcnode-id="3773" instrument_node="">Fig.&nbsp;4.2</span></a><span data-dcnode-id="3771" instrument_node="">, while the order is the same, the strengths of the most popular and least popular colours are not so strong.</span></p></dd><dt class="list-label" data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="3764"><p data-dcnode-id="3765" id="p0080"><span data-dcnode-id="3766" instrument_node="">Blue is by far the most popular colour chosen by both genders, while yellow is the least popular colour.</span></p></dd><dt class="list-label" data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="3759"><p data-dcnode-id="3760" id="p0085"><span data-dcnode-id="3761" instrument_node="">Red and green compete in popularity for second place. For male subjects, red is their overall second preference, compared to green for females.</span></p></dd><dt class="list-label" data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="3754"><p data-dcnode-id="3755" id="p0090"><span data-dcnode-id="3756" instrument_node="">Orange is the second least popular colour by both genders.</span></p></dd><dt class="list-label" data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="3749"><p data-dcnode-id="3750" id="p0095"><span data-dcnode-id="3751" instrument_node="">Violet is middling and more popular with the females.</span></p></dd><dt class="list-label" data-dcnode-id="3747"><span data-dcnode-id="3748" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="3744"><p data-dcnode-id="3745" id="p0100"><span data-dcnode-id="3746" instrument_node="">Females dislike orange and yellow more than males.</span></p></dd><dt class="list-label" data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">7.</span></dt><dd class="list-description" data-dcnode-id="3738"><p data-dcnode-id="3739" id="p0105"><span data-dcnode-id="3741" id="p110"></span><span data-dcnode-id="3740" instrument_node="">With regard to colour preference changes due to fashion, marketing, political attitudes and symbolism, the results of this longitudinal study provide interesting and contrasting changes in colour popularity over the four decades. For example, while orange is the overall second least popular colour over the whole period it was the most popular colour in 1970 and the second most popular colour in the 1970s, after blue.</span></p></dd><dt class="list-label" data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">8.</span></dt><dd class="list-description" data-dcnode-id="3733"><p data-dcnode-id="3734" id="p0110"><span data-dcnode-id="3735" instrument_node="">Violet, on the other hand, was most popular in the 1990s, though it did not reach the popularity of orange in the 1970s.</span></p></dd><dt class="list-label" data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">9.</span></dt><dd class="list-description" data-dcnode-id="3728"><p data-dcnode-id="3729" id="p0115"><span data-dcnode-id="3730" instrument_node="">Another interesting case was the increasing popularity of green since the 1970s. However, it took 20 years to displace blue as the most preferred colour, especially in the early 1990s. This can be related to the increasing popularity of green politics, the Green Party at the time and rising ecological awareness, particularly amongst the younger generation.</span></p></dd></dl><p></p><p data-dcnode-id="3700" id="p0120"><span data-dcnode-id="3725" instrument_node="">It is interesting to note in this context that cultural background and age have an influence on colour preference, as the same green sample (B90G 2070), while being unpopular with architectural students in the 1970s, was the most popular colour in Botswana and Kenya (</span><a class="workspace-trigger" data-dcnode-id="3723" href="#bb0235" name="bbb0235"><span data-dcnode-id="3724" instrument_node="">Porter, 1973</span></a><span data-dcnode-id="3722" instrument_node="">). Tom Porter also remarked that the same green was also the most liked colour amongst 60–90 year-olds in Oxford. It is clear therefore that while age, culture and other factors influence colour preference, there are certain stable relationships regarding the popularity of some colours over time. Support for some of the above findings comes from an unexpected area of study where colour-preference tests are used as personality tests aiming to provide a more unconscious personality profile of a person. While this analysis is beyond the scope of their paper, architecture students during the same period ranked the set of eight colours used by Dr Max Lüscher – chosen specifically for the emotional value of each colour (</span><a class="workspace-trigger" data-dcnode-id="3720" href="#bb0210" name="bbb0210"><span data-dcnode-id="3721" instrument_node="">Lüscher, 1970</span></a><span data-dcnode-id="3719" instrument_node="">). The overall order of preference based on 960 students over the years 1970–2007 was 1. blue, 2. green, 3. yellow, 4. red, 5. violet, 6. grey, 7. black and 8. brown. Though these colours were not controlled in terms of the chromatic strength and lightness dimension, blue was still the most preferred colour though it was a much darker colour (R90B 6070). Another interesting result was that the Lüscher’s vibrant yellow was the third most popular colour chosen. While colour researcher Dr Leon Oberascher considers that ‘a meaningful interpretation of colour preference seems to be more promising within the framework of research on everyday life-styles than personality diagnosis’ (</span><a class="workspace-trigger" data-dcnode-id="3717" href="#bb0230" name="bbb0230"><span data-dcnode-id="3718" instrument_node="">Oberascher, 1997</span></a><span data-dcnode-id="3716" instrument_node="">), one must consider studies on experiments which attempted to relate abstract preferences based on aesthetic judgements to preferences related to colour in context. Every researcher is aware of the influence of age, gender, culture and fashion in generalising from colour preferences, but there are very few contextual studies that can help the </span><span data-dcnode-id="3715" id="p111"></span><span data-dcnode-id="3714" instrument_node="">designer in practice. The early experiments by Carl-Axel Acking and Rikard </span><a class="workspace-trigger" data-dcnode-id="3712" href="#bb0170" name="bbb0170"><span data-dcnode-id="3713" instrument_node="">Küller (1976)</span></a><span data-dcnode-id="3711" instrument_node=""> on interior colour and Lars </span><a class="workspace-trigger" data-dcnode-id="3709" href="#bb0255" name="bbb0255"><span data-dcnode-id="3710" instrument_node="">Sivik, 1974</span></a><span data-dcnode-id="3708" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3706" href="#bb0260" name="bbb0260"><span data-dcnode-id="3707" instrument_node="">Sivik, 1976</span></a><span data-dcnode-id="3701"><span data-dcnode-id="3705" instrument_node=""> on exterior colour, where colour has been systematically varied in its three dimensions of hue, chromaticness and lightness (whiteness and blackness), found lack of general results from the evaluation of the ‘pleasantness factor’. They found no simple dependence either upon chromatic strength, lightness or hue. The differences found within each hue were much greater than between different hues. These studies were based on simulated colour designs of perspective interior drawings and exterior </span><a class="topic-link" data-dcnode-id="3703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/facades" title="Learn more about facades from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3704" instrument_node="">facades</span></a><span data-dcnode-id="3702" instrument_node="">.</span></span></p><p data-dcnode-id="3695" id="p0125"><span data-dcnode-id="3699" instrument_node="">Another important issue is whether the preferred colour in abstract colour preference studies involving small colour chips is the same as when colour is part of an object. Very few studies have been published on the subject. </span><a class="workspace-trigger" data-dcnode-id="3697" href="#bb0280" name="bbb0280"><span data-dcnode-id="3698" instrument_node="">Whitfield and Slatten (1979)</span></a><span data-dcnode-id="3696" instrument_node=""> consider ‘prototypicality’ – where certain products are identified with certain colours – as a key factor, i.e. blue potatoes or blue cheese will not be preferred as they signify something different.</span></p><p data-dcnode-id="3687" id="p0130"><span data-dcnode-id="3694" instrument_node="">Charles Taft and Lars </span><a class="workspace-trigger" data-dcnode-id="3692" href="#bb0050" name="bbb0050"><span data-dcnode-id="3693" instrument_node="">Sivik (1997)</span></a><span data-dcnode-id="3691" instrument_node=""> challenged this view of the reported poor correspondence between colour chips and colour objects. Subjects rated 10 colour chips and six digital photos of objects in the same colours as the chips on semantic differential scales. The results show a good correspondence between ratings of colour chips and objects. Out of a total of 390 comparisons between ratings of chips, in only 16 cases (4%) was the colour of the chip judged qualitatively different from the colour of the object. These were on antique chairs and computers and involved red, green and purple where the inappropriateness of colour becomes important. So prototypicality is important for certain objects which are strongly associated with certain colours. In the same way, lime green and lilac chromatic colours were not so popular in urban restoration work in Lund, Sweden (</span><a class="workspace-trigger" data-dcnode-id="3689" href="#bb0150" name="bbb0150"><span data-dcnode-id="3690" instrument_node="">Janssens, 2001</span></a><span data-dcnode-id="3688" instrument_node="">).</span></p><p data-dcnode-id="3679" id="p0135"><span data-dcnode-id="3686" instrument_node="">In another study by </span><a class="workspace-trigger" data-dcnode-id="3684" href="#bb0260" name="bbb0260"><span data-dcnode-id="3685" instrument_node="">Sivik (1976)</span></a><span data-dcnode-id="3683" instrument_node=""> where deep blue and pale-lilac colours, both unusual colours in Sweden, have been used in Gothenburg, people disliked them when evaluating them in a simulation study. However, when people were asked to evaluate them in the real environment, while their evaluation of the lilac remained unchanged, their evaluation of the blue building became significantly more positive. Occupants of the building liked it even more. In another study in the old part of Stockholm involving the colour restoration of the 18</span><sup data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">th</span></sup><span data-dcnode-id="3680" instrument_node=""> century building of Maria Ostra, colours of medium chromaticness in the yellow–red sector of the colour circle were evaluated highly in both the laboratory simulated study and in the real environment.</span></p><p data-dcnode-id="3647" id="p0140"><a class="workspace-trigger" data-dcnode-id="3677" href="#bb0175" name="bbb0175"><span data-dcnode-id="3678" instrument_node="">Küller (1980)</span></a><span data-dcnode-id="3676" instrument_node=""> suggests that the key factor for increased pleasantness in the built environment may lie in the balance between complexity and unity. In a restoration experiment, where two storey buildings of concrete and </span><span data-dcnode-id="3675" id="p112"></span><span data-dcnode-id="3674" instrument_node="">wood were repainted in dark red with a black cornice, and the doors a strong green and red, when the scheme was evaluated </span><em data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node="">in situ</span></em><span data-dcnode-id="3671" instrument_node="">, there was an increase in both pleasantness evaluation as well as perceived complexity. In their latest experiments </span><a class="workspace-trigger" data-dcnode-id="3669" href="#bb0040" name="bbb0040"><span data-dcnode-id="3670" instrument_node="">Jan Janssens and Rikard Küller (2009)</span></a><span data-dcnode-id="3664"><span data-dcnode-id="3668" instrument_node=""> looked at colour preferences of </span><a class="topic-link" data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/building-facade" title="Learn more about building facades from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3667" instrument_node="">building facades</span></a><span data-dcnode-id="3665" instrument_node=""> in both real settings and the laboratory. The buildings included traditional houses, apartment blocks, office buildings and industrial premises. The results showed different factors influencing peoples’ preferences.</span></span></p><dl class="list" data-dcnode-id="3648"><dt class="list-label" data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="3659"><p data-dcnode-id="3660" id="p0145"><span data-dcnode-id="3661" instrument_node="">The most preferred colours were the softer yellows and white, while the least liked colours were the light and darker greens. Pink was the second least liked colour.</span></p></dd><dt class="list-label" data-dcnode-id="3657"><span data-dcnode-id="3658" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="3654"><p data-dcnode-id="3655" id="p0150"><span data-dcnode-id="3656" instrument_node="">Blue was the most popular colour when judged as a sample but was ranked fifth when judged as the colour of a building</span></p></dd><dt class="list-label" data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="3649"><p data-dcnode-id="3650" id="p0155"><span data-dcnode-id="3651" instrument_node="">The strong yellow was fairly well liked in general both as a sample and in buildings except on the industrial building</span></p></dd></dl><p></p><p data-dcnode-id="3642" id="p0160"><span data-dcnode-id="3646" instrument_node="">These results show that when colours are judged on buildings the preferences do not match the preferences on samples alone. For example, while the darker blue was the most preferred colour it was not liked in buildings. They also found the relationship between the colour of the building itself and its surrounding to be highly relevant. For example, if a colour deviates a little but not too much from its surroundings it will be found attractive. Furthermore, in traditional environments the colour expectations of people are important while in modern buildings involving new technologies and new materials, unusual </span><a class="topic-link" data-dcnode-id="3644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/colouration" title="Learn more about colorations from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3645" instrument_node="">colorations</span></a><span data-dcnode-id="3643" instrument_node=""> will be more easily accepted and liked.</span></p><p data-dcnode-id="3640" id="p0165"><span data-dcnode-id="3641" instrument_node="">Colour preference studies, both experimental and contextual, will no doubt continue to interest researchers in field of colour psychology and experimental aesthetics. Theories ranging from biological and wavelength profiles to ‘prototypically’ or ‘arousal’ will be put forward to explain colour preferences and aesthetic judgments on colour and light. However, we are not yet in a position to put forward a simple theory which will account for all the empirical studies reported above.</span></p></section><section data-dcnode-id="3245" id="s0020"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3635" id="st0030"><span data-dcnode-id="3638" instrument_node="">4.3</span><span data-dcnode-id="3637" instrument_node="">. </span><span data-dcnode-id="3636" instrument_node="">Colour and psycho-physiological arousal</span></h2><p data-dcnode-id="3622" id="p0170"><span data-dcnode-id="3634" instrument_node="">In both scientific and introspective accounts, colours have been classified and grouped in various ways depending upon the hypothesised influence or effects of such groupings (</span><a class="workspace-trigger" data-dcnode-id="3629" href="#bb0165" name="bbb0165"><span data-dcnode-id="3633" instrument_node="">Kortbawi </span><em data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">et al.</span></em><span data-dcnode-id="3630" instrument_node="">, 2008</span></a><span data-dcnode-id="3628" instrument_node="">). One of the most widely held groupings is that of ‘warm’ and ‘cool’ colours. Hues such as red, orange and yellow are seen, in addition to their warmth, as exciting and stimulating, whereas hues such as blue, turquoise and green are seen, in addition to their induced coolness, as calming and relaxing. Applications based on these properties of colours are not confined to the work of architects and artists </span><span data-dcnode-id="3627" id="p113"></span><span data-dcnode-id="3626" instrument_node="">but are also used by clinicians in an attempt to pacify or calm down aggressive and anxious patients by using blue and green colours. They are also used to stimulate depressed patients by using red and orange colours (</span><a class="workspace-trigger" data-dcnode-id="3624" href="#bb0070" name="bbb0070"><span data-dcnode-id="3625" instrument_node="">Bayes, 1970</span></a><span data-dcnode-id="3623" instrument_node="">).</span></p><p data-dcnode-id="3609" id="p0175"><span data-dcnode-id="3621" instrument_node="">Some researchers have criticised these studies and suggested that the effect of hue on warmth and excitement is an intellectual one, involving cognitive processes, and not based on physiological processes which affect the whole organism. In an attempt to answer this type of criticism, namely, that the effects of these colours are not only just based on stereotyped verbal associations, but that different colours actually evoke different feeling and emotions affecting the entire organism, Robert Gerard, in his classic study (</span><a class="workspace-trigger" data-dcnode-id="3619" href="#bb0105" name="bbb0105"><span data-dcnode-id="3620" instrument_node="">Gerard, 1958</span></a><span data-dcnode-id="3610"><span data-dcnode-id="3614"><span data-dcnode-id="3618" instrument_node="">), concluded that the two wavebands of </span><a class="topic-link" data-dcnode-id="3616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/radiant-energy" title="Learn more about radiant energy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3617" instrument_node="">radiant energy</span></a><span data-dcnode-id="3615" instrument_node=""> at the opposite ends of the visible spectrum, i.e. blue and red, exert a differential biological influence on the organism as measured by general activation in the central and </span></span><a class="topic-link" data-dcnode-id="3612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/autonomics" title="Learn more about autonomic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3613" instrument_node="">autonomic</span></a><span data-dcnode-id="3611" instrument_node=""> nervous system (EEG, blood pressure, palmar conductance level, respiration and heart rate).</span></span></p><p data-dcnode-id="3600" id="p0180"><span data-dcnode-id="3608" instrument_node="">Further support is given to Gerard’s work by an experiment carried out by </span><a class="workspace-trigger" data-dcnode-id="3606" href="#bb0065" name="bbb0065"><span data-dcnode-id="3607" instrument_node="">Ali (1972)</span></a><span data-dcnode-id="3601"><span data-dcnode-id="3605" instrument_node="">. </span><a class="topic-link" data-dcnode-id="3603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/coloured-light" title="Learn more about Coloured lights from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3604" instrument_node="">Coloured lights</span></a><span data-dcnode-id="3602" instrument_node=""> (blue and red) were projected directly on the eyes of 10 normal subjects for six minutes and EEGs were recorded throughout the period. The results of this study showed greater cortical arousal following the presentation of red light and lower cortical arousal following a blue light.</span></span></p><p data-dcnode-id="3587" id="p0185"><span data-dcnode-id="3599" instrument_node="">Parallel to these attempts to validate the reported effects of the warm and cold colours through physiological measures, there has been a different approach to establish the meanings people associate with different colours. This approach differs significantly from the above in that:</span></p><dl class="list" data-dcnode-id="3588"><dt class="list-label" data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="3594"><p data-dcnode-id="3595" id="p0190"><span data-dcnode-id="3596" instrument_node="">The three dimensions of colours (hue, chromatic strength and lightness) have been systematically manipulated in an attempt to ascertain their relationship to the dimensions of colour meaning.</span></p></dd><dt class="list-label" data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="3589"><p data-dcnode-id="3590" id="p0195"><span data-dcnode-id="3591" instrument_node="">The obtained data were treated by more powerful methods of statistical analysis, such as factor and cluster analysis, which were not available to the early researchers.</span></p></dd></dl><p></p><div data-dcnode-id="3553"><p data-dcnode-id="3576" id="p0200"><span data-dcnode-id="3586" instrument_node="">Lars </span><a class="workspace-trigger" data-dcnode-id="3584" href="#bb0255" name="bbb0255"><span data-dcnode-id="3585" instrument_node="">Sivik (1974)</span></a><span data-dcnode-id="3583" instrument_node=""> was the first to demonstrate, with a technique of photosimulation, that it was not hue which affects how exciting or calming a colour is but the chromatic strength of each hue (see </span><a class="workspace-trigger" data-dcnode-id="3581" href="#f0020" name="bf0020"><span data-dcnode-id="3582" instrument_node="">Fig.&nbsp;4.3</span></a><span data-dcnode-id="3580" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="3578" href="#bb0060" name="bbb0060"><span data-dcnode-id="3579" instrument_node="">Acking and Küller (1976)</span></a><span data-dcnode-id="3577" instrument_node=""> showed with the use of perspective drawings of interior spaces, and later on in full-scale spaces, that weak colours give a room an impression of calmness while strong colours create an impression of excitement.</span></p><figure class="figure text-xs" data-dcnode-id="3554" id="f0020"><span data-dcnode-id="3566"><img alt="" aria-describedby="ca0020" data-dcnode-id="3575" height="500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-03-9781845699727.gif&amp;raw"><span data-dcnode-id="3574" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3567"><li data-dcnode-id="3568"><a class="anchor download-link u-font-sans" data-dcnode-id="3569" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-03-9781845699727.gif" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3570"><span data-dcnode-id="3573" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3555"><span data-dcnode-id="3556" id="ca0020"><p data-dcnode-id="3557" id="sp0020"><span class="label" data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">Fig&nbsp;4.3</span></span><span data-dcnode-id="3563" instrument_node="">. </span><span data-dcnode-id="3562" id="p114"></span><span data-dcnode-id="3561" instrument_node="">Sivik study of isosemantic graphs. The reader can compare the points marked X and O in the four colour triangles to see that perceptual excitement increases as chromatic strength increases (after </span><a class="workspace-trigger" data-dcnode-id="3559" href="#bb0260" name="bbb0260"><span data-dcnode-id="3560" instrument_node="">Sivik, 1976</span></a><span data-dcnode-id="3558" instrument_node="">).</span></p></span></span></figure></div><p data-dcnode-id="3551" id="p0205"><span data-dcnode-id="3552" instrument_node="">The four studies referred to above were well designed by serious researchers in the field of colour psychology. Within their own parameters, they show systematic relationships between colour and ‘arousal’ through physiological measures (Ali, Gerard) and through semantic differential analysis (Acking and Küller, Sivik). There are, however, some fundamental differences between the two sets of studies. In the first two studies the content of colour stimulation was coloured light while in the last two studies the content was colour pigment. Furthermore, in the first two studies, subjects experienced the colour light stimulation in an abstract form in the laboratory, while the last two studies were carried out in the context of real interior and exterior spaces.</span></p><div data-dcnode-id="3522"><p data-dcnode-id="3542" id="p0210"><span data-dcnode-id="3546"><span data-dcnode-id="3550" instrument_node="">The two experiments described below were intended to bridge the gap between these sets of experimental approaches. Why not measure both physiological as well as affective reactions of people? Why use patches of coloured light projected on the retina, colour slides or even small drawings and simulated spaces when we can use </span><a class="topic-link" data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/surface-pigment" title="Learn more about surface pigments from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3549" instrument_node="">surface pigments</span></a><span data-dcnode-id="3547" instrument_node=""> in real-life spaces – the sort of spaces we actually experience? Test exposure not only at 60 seconds intervals but over longer periods when subjects could be experiencing real environments. The main technique used in this experiment to measure activation is through EEG (see </span></span><a class="workspace-trigger" data-dcnode-id="3544" href="#f0025" name="bf0025"><span data-dcnode-id="3545" instrument_node="">Fig.&nbsp;4.4</span></a><span data-dcnode-id="3543" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="3523" id="f0025"><span data-dcnode-id="3532"><img alt="" aria-describedby="ca0025" data-dcnode-id="3541" height="53" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-04-9781845699727.jpg&amp;raw"><span data-dcnode-id="3540" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3533"><li data-dcnode-id="3534"><a class="anchor download-link u-font-sans" data-dcnode-id="3535" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-04-9781845699727.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3536"><span data-dcnode-id="3539" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3524"><span data-dcnode-id="3525" id="ca0025"><p data-dcnode-id="3526" id="sp0025"><span class="label" data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">Fig&nbsp;4.4</span></span><span data-dcnode-id="3529" instrument_node="">. </span><span data-dcnode-id="3528" id="p115"></span><span data-dcnode-id="3527" instrument_node="">Typical EEG recording.</span></p></span></span></figure></div><p data-dcnode-id="3517" id="p0215"><span data-dcnode-id="3521" instrument_node="">When a person is awake but relaxed, </span><a class="topic-link" data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/alpha-rhythm" title="Learn more about alpha rhythm from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3520" instrument_node="">alpha rhythm</span></a><span data-dcnode-id="3518" instrument_node=""> abounds. This rather slow, high-amplitude rhythm has a tendency to disappear when the person is stimulated, but returns when the person is relaxed. Too much stimulation results in continuous blocking of alpha, involving the whole nervous system, a state generally referred to as stress. Thus, by measuring the proportion of alpha in EEG, it is possible to find out whether an environment is under-stimulating or over-stimulating. Changes in pulse rate can also be used as an indicator of activation and stress, albeit more difficult to interpret.</span></p><div data-dcnode-id="3464"><p data-dcnode-id="3505" id="p0220"><span data-dcnode-id="3516" instrument_node="">At the Environmental Psychology Unit, School of Architecture of the Lund Institute of Technology, a room measuring 3.5 × 4.5 m, with an adjoining control room where the monitoring equipment was placed, was used for the experiment. One half of the room was painted red (NCS 1674-Y90R), the other half was painted blue (NCS 1859 B04G). Paint covered the walls, floor, ceiling and fittings (see </span><a class="workspace-trigger" data-dcnode-id="3514" href="#f0030" name="bf0030"><span data-dcnode-id="3515" instrument_node="">Fig.&nbsp;4.5</span></a><span data-dcnode-id="3509"><span data-dcnode-id="3513" instrument_node="">). Blue was chosen instead of green because the </span><a class="topic-link" data-dcnode-id="3511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/spectral-sensitivity" title="Learn more about spectral sensitivity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3512" instrument_node="">spectral sensitivity</span></a><span data-dcnode-id="3510" instrument_node=""> of the eye is about the same in the blue and the red regions, while the sensitivity is different in the green region (see </span></span><a class="workspace-trigger" data-dcnode-id="3507" href="#f0035" name="bf0035"><span data-dcnode-id="3508" instrument_node="">Fig.&nbsp;4.6</span></a><span data-dcnode-id="3506" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="3486" id="f0030"><span data-dcnode-id="3495"><img alt="" aria-describedby="ca0030" data-dcnode-id="3504" height="231" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-05-9781845699727.jpg&amp;raw"><span data-dcnode-id="3503" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3496"><li data-dcnode-id="3497"><a class="anchor download-link u-font-sans" data-dcnode-id="3498" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-05-9781845699727.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3499"><span data-dcnode-id="3502" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3487"><span data-dcnode-id="3488" id="ca0030"><p data-dcnode-id="3489" id="sp0030"><span class="label" data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">Fig&nbsp;4.5</span></span><span data-dcnode-id="3492" instrument_node="">. </span><span data-dcnode-id="3491" id="p116"></span><span data-dcnode-id="3490" instrument_node="">NCS red and blue room experiment colours.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="3465" id="f0035"><span data-dcnode-id="3476"><img alt="" aria-describedby="ca0035" data-dcnode-id="3485" height="224" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-06-9781845699727.gif&amp;raw"><span data-dcnode-id="3484" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3477"><li data-dcnode-id="3478"><a class="anchor download-link u-font-sans" data-dcnode-id="3479" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-06-9781845699727.gif" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3480"><span data-dcnode-id="3483" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3466"><span data-dcnode-id="3467" id="ca0035"><p data-dcnode-id="3468" id="sp0035"><span class="label" data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">Fig&nbsp;4.6</span></span><span data-dcnode-id="3473" instrument_node="">. </span><span data-dcnode-id="3472" instrument_node="">The photobic sensitivity of the eye. The photopic sensitivity curve is the measure of the relative effectiveness of the different wavelengths in exciting the light sense at levels well above threshold. At these levels, the lights excite the sensation of colour mediated by the cones (after </span><a class="workspace-trigger" data-dcnode-id="3470" href="#bb0090" name="bbb0090"><span data-dcnode-id="3471" instrument_node="">Davson 1980</span></a><span data-dcnode-id="3469" instrument_node="">).</span></p></span></span></figure></div><p data-dcnode-id="3451" id="p0225"><span data-dcnode-id="3459"><span data-dcnode-id="3463" instrument_node="">The general lighting of the room was provided by Luma Colorette, a </span><a class="topic-link" data-dcnode-id="3461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/fluorescent-tube" title="Learn more about fluorescent tube from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3462" instrument_node="">fluorescent tube</span></a><span data-dcnode-id="3460" instrument_node=""> which has an even </span></span><a class="topic-link" data-dcnode-id="3457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/spectral-emission" title="Learn more about spectral emission from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3458" instrument_node="">spectral emission</span></a><span data-dcnode-id="3452"><span data-dcnode-id="3456" instrument_node=""> and good colour rendering (5400 Kelvin, CRI-91). It is worth noting that the colour rendering index (CRI) and colour temperature are the two most commonly used measures for the different light sources and their appearance. The CRI describes how well the light reproduces the colours of various objects faithfully in comparison with an ideal or natural source. (Rating scale is from 1–100: 0–60 poor, 60–76 good and 76–100 excellent.) Colour temperature, in Kelvin (K), describes the colour appearance of the </span><a class="topic-link" data-dcnode-id="3454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/emitted-light" title="Learn more about light emitted from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3455" instrument_node="">light emitted</span></a><span data-dcnode-id="3453" instrument_node=""> from it. (It varies from 1500 K, for example candlelight, appearing red, 2000 K, sunrise, appearing orange, 2500 K appearing yellow, 3000–6000 K, general daylight, and 7500–10 000 appearing different shades of blue).</span></span></p><div data-dcnode-id="3426"><p data-dcnode-id="3446" id="p0230"><span data-dcnode-id="3450" instrument_node="">It was important in this study to use colour samples which would satisfy not only the Natural Colour System (NCS) parameters and colorimetric measurements, but also the correct subjective evaluation of colour appearance. This test was satisfactory and the two colour samples conformed with the mapping of colour names in Sweden by Lars Sivik and the late Anders Hard – the inventor of the current system of NCS. NCS is a visually descriptive, scientifically based, fully documented colour notation system with supporting colour samples (see </span><a class="workspace-trigger" data-dcnode-id="3448" href="#f0040" name="bf0040"><span data-dcnode-id="3449" instrument_node="">Fig.&nbsp;4.7</span></a><span data-dcnode-id="3447" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="3427" id="f0040"><span data-dcnode-id="3436"><img alt="" aria-describedby="ca0040" data-dcnode-id="3445" height="309" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-07-9781845699727.jpg&amp;raw"><span data-dcnode-id="3444" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3437"><li data-dcnode-id="3438"><a class="anchor download-link u-font-sans" data-dcnode-id="3439" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-07-9781845699727.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3440"><span data-dcnode-id="3443" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3428"><span data-dcnode-id="3429" id="ca0040"><p data-dcnode-id="3430" id="sp0040"><span class="label" data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">Fig&nbsp;4.7</span></span><span data-dcnode-id="3433" instrument_node="">. </span><span data-dcnode-id="3432" id="p117"></span><span data-dcnode-id="3431" instrument_node="">NCS colour notation for red and blue experiment colours (W, white; S, black).</span></p></span></span></figure></div><div data-dcnode-id="3396"><p data-dcnode-id="3416" id="p0235"><span data-dcnode-id="3425" instrument_node="">Temperature was maintained at a constant level through the automatic sensor at 22 °C. The participants wore lightweight garments throughout the experiment. In order to measure the EEG, electrodes were placed centrally and parientally, over the left and right hemispheres. A pair of electrodes was also used to record the pulse. The frequencies for the EEG analyses were in accordance with clinical classification (see </span><a class="workspace-trigger" data-dcnode-id="3418" href="#f0045" name="bf0045"><span data-dcnode-id="3424" instrument_node="">Fig. </span><em data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">4</span></em><span data-dcnode-id="3421" instrument_node="">.</span><em data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">8</span></em></a><span data-dcnode-id="3417" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="3397" id="f0045"><span data-dcnode-id="3406"><img alt="" aria-describedby="ca0045" data-dcnode-id="3415" height="236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-08-9781845699727.jpg&amp;raw"><span data-dcnode-id="3414" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3407"><li data-dcnode-id="3408"><a class="anchor download-link u-font-sans" data-dcnode-id="3409" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-08-9781845699727.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3410"><span data-dcnode-id="3413" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3398"><span data-dcnode-id="3399" id="ca0045"><p data-dcnode-id="3400" id="sp0045"><span class="label" data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">Fig&nbsp;4.8</span></span><span data-dcnode-id="3403" instrument_node="">. </span><span data-dcnode-id="3402" id="p118"></span><span data-dcnode-id="3401" instrument_node="">EEG body electrodes positions.</span></p></span></span></figure></div><p data-dcnode-id="3394" id="p0240"><span data-dcnode-id="3395" instrument_node="">Twenty-four subjects took part in this study. Each subject spent 20 minutes in each colour. Each condition was divided into three parts: ‘reading, fixating and closing eyes’. After the experiment, electrodes were removed and the participants’ introspection was recorded. Time estimation and galvanic skin response measures were taken during this period. It was hypothesised that the red visual field should be more activating, which should be indicated by attenuation of the alpha rhythm, and possibly the delta and theta rhythms.</span></p><p data-dcnode-id="3389" id="p0245"><span data-dcnode-id="3393" instrument_node="">The data were treated by means of several analyses of variance for both EEG and EKG recordings. The most important result of this study was, paradoxically, that there were no </span><a class="topic-link" data-dcnode-id="3391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/statistically-significant-difference" title="Learn more about statistically significant differences from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3392" instrument_node="">statistically significant differences</span></a><span data-dcnode-id="3390" instrument_node=""> in the experience of a red or blue space at the central nervous system. Arousal at the cortical level was the same for both red and blue. Arousal as measured by reduced alpha was, in fact, in the opposite direction from the predicted one: there was more alpha and theta in the red visual field than in the blue one. There was also more delta activity (a brain activity indicative of relaxed and sleepy condition) in the red visual field than in the blue one.</span></p><p data-dcnode-id="3387" id="p0250"><span data-dcnode-id="3388" instrument_node="">At the autonomic nervous system level, there were no differences in EKG (pulse rate, arrhythmia) and galvanic skin response. Although autonomic measures are not accurate indicators of arousal and are often more susceptible to individual variation, they produced almost identical mean scores for the two conditions. There were differences in all EEG frequencies between the male and female groups, but these were not the differences we were looking for. There were no differences between either the male subjects or the female subjects with regard to the red and blue spaces.</span></p><p data-dcnode-id="3376" id="p0255"><span data-dcnode-id="3386" instrument_node="">The results of this experiment support the findings of </span><a class="workspace-trigger" data-dcnode-id="3384" href="#bb0255" name="bbb0255"><span data-dcnode-id="3385" instrument_node="">Sivik (1974)</span></a><span data-dcnode-id="3383" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="3381" href="#bb0060" name="bbb0060"><span data-dcnode-id="3382" instrument_node="">Acking and Küller (1976)</span></a><span data-dcnode-id="3380" instrument_node="">: provided we control chromatic strength and lightness, there are no differences between the two hues as far as excitement is concerned. In another study involving two seminar spaces, one painted red (BSI 04E53) and the other turquoise (BSI 16E53), both high in chromatic strength, two groups of subjects (architecture students and laymen) evaluated the two spaces as equally stimulating (</span><a class="workspace-trigger" data-dcnode-id="3378" href="#bb0215" name="bbb0215"><span data-dcnode-id="3379" instrument_node="">Mikellides, 1979</span></a><span data-dcnode-id="3377" instrument_node="">).</span></p><p data-dcnode-id="3374" id="p0260"><span data-dcnode-id="3375" instrument_node="">In this experiment, the strongest red paint on the market was tested. Its actual specified strength was 15% more than the blue sample under standardised conditions. The two colours used were judged to be subjectively equal in chromatic strength and lightness. Yet no differences were found. The implications of this research for design are clear. For colour exposure of up to 20 minutes, they support Sivik’s affective–connotative studies that chromatic strength (saturation) is the key dimension affecting how exciting or calming a colour is perceived to be and not the dimension of hue as was previously thought by colour design manuals.</span></p><div data-dcnode-id="3327"><p data-dcnode-id="3366" id="p0265"><span data-dcnode-id="3373" instrument_node="">In the second experiment, two identical spaces, measuring 2.8 × 2.9 m, were painted red and blue respectively in the lighting laboratory at Lund University (NCS 1958Y90R and NCS 2158B09G) (</span><a class="workspace-trigger" data-dcnode-id="3371" href="#f0050" name="bf0050"><span data-dcnode-id="3372" instrument_node="">Figs&nbsp;4.9</span></a><span data-dcnode-id="3370" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="3368" href="#f0055" name="bf0055"><span data-dcnode-id="3369" instrument_node="">4.10</span></a><span data-dcnode-id="3367" instrument_node="">). Appointments were individually made with 24 male and female subjects for two three-hour sessions per subject on two different occasions within a two-week period. During the two periods, EEG and EKG recordings were taken and the subjects completed various forms measuring a variety of subjective reactions, including temperature and time estimation as well as environmental description by means of semantic differential scales and story writing.</span></p><figure class="figure text-xs" data-dcnode-id="3347" id="f0050"><span data-dcnode-id="3356"><img alt="" aria-describedby="ca0050" data-dcnode-id="3365" height="195" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-09-9781845699727.jpg&amp;raw"><span data-dcnode-id="3364" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3357"><li data-dcnode-id="3358"><a class="anchor download-link u-font-sans" data-dcnode-id="3359" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-09-9781845699727.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3360"><span data-dcnode-id="3363" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3348"><span data-dcnode-id="3349" id="ca0050"><p data-dcnode-id="3350" id="sp0050"><span class="label" data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">Fig&nbsp;4.9</span></span><span data-dcnode-id="3353" instrument_node="">. </span><span data-dcnode-id="3352" id="p119"></span><span data-dcnode-id="3351" instrument_node="">Experimental blue room.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="3328" id="f0055"><span data-dcnode-id="3337"><img alt="" aria-describedby="ca0055" data-dcnode-id="3346" height="414" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-10-9781845699727.jpg&amp;raw"><span data-dcnode-id="3345" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3338"><li data-dcnode-id="3339"><a class="anchor download-link u-font-sans" data-dcnode-id="3340" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-10-9781845699727.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3341"><span data-dcnode-id="3344" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3329"><span data-dcnode-id="3330" id="ca0055"><p data-dcnode-id="3331" id="sp0055"><span class="label" data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">Fig&nbsp;4.10</span></span><span data-dcnode-id="3334" instrument_node="">. </span><span data-dcnode-id="3333" id="p120"></span><span data-dcnode-id="3332" instrument_node="">Experimental red room.</span></p></span></span></figure></div><p data-dcnode-id="3322" id="p0270"><span data-dcnode-id="3326" instrument_node="">Special attention was given to the design of the interior spaces. The aim was to make each room feel as normal as possible without losing the distinct feeling of immersion in blueness or redness. Two special abstract oil paintings were commissioned from the Swedish art
