ist Gunnar Sandin, to add some character to each room. The floor was covered with matt grey linoleum. The curtains were drawn so that the subject was not tempted to watch the outside world, yet offering an unmistakable feeling of a homely window. The curtains were white with a faint floral pattern of either red or blue of low chromatic strength (NCS, C = 20%). The entrance to each experimental room was covered with a full drape instead of a door to add a little more interest to the space. Temperature was maintained at around 22 °C by means of </span><a class="topic-link" data-dcnode-id="3324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/thermostats" title="Learn more about thermostats from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3325" instrument_node="">thermostats</span></a><span data-dcnode-id="3323" instrument_node="">.</span></p><p data-dcnode-id="3308" id="p0275"><span data-dcnode-id="3321" instrument_node="">The most important result of this study is that as far as cortical arousal is concerned there is positive support to the hypothesis that red is a more activating colour than blue as indicated by difference in delta frequency (</span><em data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">P</span></em><span data-dcnode-id="3318" instrument_node=""> = 0.018) and the strong tendency in alpha (</span><em data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">P</span></em><span data-dcnode-id="3315" instrument_node=""> = 0.161). Delta rhythm is indicative of a drowsy state and characterised by high-amplitude, low-frequency waves; the difference between the two colours in delta was observed in both hemispheres and in both stages when measurements were made, i.e., during the first and second hour of colour exposure. During the second period of exposure, subjects were more relaxed (as indicated by an increase in delta activity) for both colours. As far as alpha activity is concerned, there was a strong trend in support of the main hypothesis. This tendency, however, did not reach statistical significance. This suggests that after the subjects have been in a room for nearly two hours the effect of colour is even stronger than during the first hour. There were no differences in the theta and beta frequencies between the colours. All the anovas reported here were also carried out with room illumination as a covariate; this did not alter the results presented here. As far as cortical activity is concerned, the results of this experiment support, in a qualified way, the previous results of </span><a class="workspace-trigger" data-dcnode-id="3313" href="#bb0065" name="bbb0065"><span data-dcnode-id="3314" instrument_node="">Ali (1972)</span></a><span data-dcnode-id="3312" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="3310" href="#bb0105" name="bbb0105"><span data-dcnode-id="3311" instrument_node="">Gerard (1958)</span></a><span data-dcnode-id="3309" instrument_node=""> with coloured light.</span></p><div data-dcnode-id="3259"><p data-dcnode-id="3279" id="p0280"><span data-dcnode-id="3307" instrument_node="">In the autonomic nervous system, however, the picture is very different. In this experiment, pulse rate was higher in the blue room at 71.5 beats per minute and lower in the red room at 68.4 beats per minute (</span><em data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">P</span></em><span data-dcnode-id="3304" instrument_node=""> = 0.03) (</span><a class="workspace-trigger" data-dcnode-id="3302" href="#f0060" name="bf0060"><span data-dcnode-id="3303" instrument_node="">Fig.&nbsp;4.11</span></a><span data-dcnode-id="3301" instrument_node="">). These results are in the opposite direction to the hypothesis stated by </span><a class="workspace-trigger" data-dcnode-id="3299" href="#bb0105" name="bbb0105"><span data-dcnode-id="3300" instrument_node="">Gerard (1958)</span></a><span data-dcnode-id="3298" instrument_node="">. They are also in the opposite direction to the hypothesis formulated by all other researchers (</span><a class="workspace-trigger" data-dcnode-id="3296" href="#bb0285" name="bbb0285"><span data-dcnode-id="3297" instrument_node="">Wilson, 1966</span></a><span data-dcnode-id="3295" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3293" href="#bb0145" name="bbb0145"><span data-dcnode-id="3294" instrument_node="">Jacobs and Hustmyer, 1974</span></a><span data-dcnode-id="3292" instrument_node="">). Paradoxically, all researchers who stated that there will be higher heart rate in the red condition (whether light or pigment) did not provide any support for their hypothesis (Gerard, Jacobs and Hustmyer). The only other colour study which offered an alternative hypothesis to heart rate was that of </span><a class="workspace-trigger" data-dcnode-id="3290" href="#bb0170" name="bbb0170"><span data-dcnode-id="3291" instrument_node="">Küller (1976)</span></a><span data-dcnode-id="3289" instrument_node="">. In observing that the heart rate was slower in a colourful room than in a grey one at one-hour, two-hour and three-hour intervals, he put forward the hypothesis that cortical arousal is accompanied by cardiac deceleration. This line of theorising is also in accordance with work by </span><a class="workspace-trigger" data-dcnode-id="3287" href="#bb0200" name="bbb0200"><span data-dcnode-id="3288" instrument_node="">Lacey (1956)</span></a><span data-dcnode-id="3286" instrument_node="">, and </span><a class="workspace-trigger" data-dcnode-id="3281" href="#bb0205" name="bbb0205"><span data-dcnode-id="3285" instrument_node="">Lacey </span><em data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">et al.</span></em><span data-dcnode-id="3282" instrument_node=""> (1963)</span></a><span data-dcnode-id="3280" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="3260" id="f0060"><span data-dcnode-id="3269"><img alt="" aria-describedby="ca0060" data-dcnode-id="3278" height="232" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-11-9781845699727.gif&amp;raw"><span data-dcnode-id="3277" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3270"><li data-dcnode-id="3271"><a class="anchor download-link u-font-sans" data-dcnode-id="3272" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-11-9781845699727.gif" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3273"><span data-dcnode-id="3276" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3261"><span data-dcnode-id="3262" id="ca0060"><p data-dcnode-id="3263" id="sp0060"><span class="label" data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">Fig&nbsp;4.11</span></span><span data-dcnode-id="3266" instrument_node="">. </span><span data-dcnode-id="3265" id="p121"></span><span data-dcnode-id="3264" instrument_node="">Mean heart rate in blue room and red room after 1 = 40 min (fix 1) and 2 = 110 min (fix 2).</span></p></span></span></figure></div><p data-dcnode-id="3257" id="p0285"><span data-dcnode-id="3258" instrument_node="">Another interesting finding is in the case of arrhythmia which was higher in response to red than blue. Is this negative relationship between heart rate and variability of heart rhythms another case where a compensatory homeostatic mechanism is working within the autonomic nervous system? The combined use of variability and level of heart rhythms is certainly a novel way of evaluating the autonomic balance, which merits further investigation.</span></p><p data-dcnode-id="3246" id="p0290"><span data-dcnode-id="3256" instrument_node="">There are several theoretical implications and practical applications of this research. At the theoretical level, the validity and reliability of the various cortical and autonomic measures is brought into question. The link between EEG and EKG, as well as their relationship to affective measures, is also of theoretical interest. The hypothesis regarding cortical arousal and cardiac deceleration also deserves more experimental work. At the practical level, chromatic strength was shown to be important at the </span><span data-dcnode-id="3255" id="p122"></span><span data-dcnode-id="3254" instrument_node="">cognitive–affective level through a variety of subjective studies. First impressions could be important to the designer and there appear to be no differences in the most saturated red and blue colours available commercially in affecting visual excitement (</span><a class="workspace-trigger" data-dcnode-id="3252" href="#bb0220" name="bbb0220"><span data-dcnode-id="3253" instrument_node="">Mikellides, 1990</span></a><span data-dcnode-id="3247"><span data-dcnode-id="3251" instrument_node="">). However, longer periods of up to two hours show differences in hue affecting our organism at the </span><a class="topic-link" data-dcnode-id="3249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/physiological-level" title="Learn more about physiological level from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3250" instrument_node="">physiological level</span></a><span data-dcnode-id="3248" instrument_node="">, provided the colours used are not too overpowering and when colour constancy is controlled by leaving enough reference points unpainted.</span></span></p></section><section data-dcnode-id="3164" id="s0025"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3241" id="st0035"><span data-dcnode-id="3244" instrument_node="">4.4</span><span data-dcnode-id="3243" instrument_node="">. </span><span data-dcnode-id="3242" instrument_node="">Colour and subjective time estimation</span></h2><div data-dcnode-id="3176"><p data-dcnode-id="3214" id="p0295"><span data-dcnode-id="3240" instrument_node="">The review of the literature on colour and time estimation (</span><a class="workspace-trigger" data-dcnode-id="3238" href="#bb0190" name="bbb0190"><span data-dcnode-id="3239" instrument_node="">Küller and Mikellides, 1993</span></a><span data-dcnode-id="3233"><span data-dcnode-id="3237" instrument_node="">) does not resolve the conflicting reports regarding the hypothesis that red accelerates the subjective passage of time. The experimental evidence from all published studies to date using both </span><a class="topic-link" data-dcnode-id="3235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/coloured-light" title="Learn more about coloured light from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3236" instrument_node="">coloured light</span></a><span data-dcnode-id="3234" instrument_node=""> and colour pigment at various exposure times has shown no consistent differences in the estimation of time intervals. Neither is the hypothesis that greater physiological arousal causes the acceleration of subjective time supported by </span></span><a class="workspace-trigger" data-dcnode-id="3231" href="#bb0085" name="bbb0085"><span data-dcnode-id="3232" instrument_node="">Caldwell and Jones (1985)</span></a><span data-dcnode-id="3230" instrument_node=""> using 30- and 45-second intervals (coloured light) or </span><a class="workspace-trigger" data-dcnode-id="3228" href="#bb0220" name="bbb0220"><span data-dcnode-id="3229" instrument_node="">Mikellides (1990)</span></a><span data-dcnode-id="3227" instrument_node=""> using 25- and 95-minute intervals (surface pigment). The various direct implications of this work reported in books and design manuals are not therefore borne out by our knowledge of the subject based on perceptual and laboratory studies. Whereas there are consistent differences between perceptual and laboratory studies in the subjective feeling of warmth (see </span><a class="workspace-trigger" data-dcnode-id="3225" href="#st0040" name="bst0040"><span data-dcnode-id="3226" instrument_node="">Section 4.5</span></a><span data-dcnode-id="3224" instrument_node="">), for time estimation there are conflicting reports within the perceptual studies, as well as within laboratory studies. The likelihood is that other variables, such as individual differences, arousal, preferences and context, mediate in these findings. The interaction between and interdependence among these variables may create a formidable task for future research. This is illustrated in the experiment by </span><a class="workspace-trigger" data-dcnode-id="3222" href="#bb0135" name="bbb0135"><span data-dcnode-id="3223" instrument_node="">Humphrey and Keeble (1977)</span></a><span data-dcnode-id="3221" instrument_node=""> who found that background noise decreased the time monkeys spent in red compared to white lights, but this applied only to those monkeys who find the noise aversive in the first place! In another study using a specially designed acoustic chamber – The Merrett Chamber – at the Oxford School of Architecture (</span><a class="workspace-trigger" data-dcnode-id="3219" href="#f0065" name="bf0065"><span data-dcnode-id="3220" instrument_node="">Figs&nbsp;4.12</span></a><span data-dcnode-id="3218" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="3216" href="#f0070" name="bf0070"><span data-dcnode-id="3217" instrument_node="">4.13</span></a><span data-dcnode-id="3215" instrument_node="">), subjects spent periods of five or eight minutes in red and blue coloured light conditions. Although subjective time was over-estimated, no significant differences were found between the two colours.</span></p><figure class="figure text-xs" data-dcnode-id="3195" id="f0065"><span data-dcnode-id="3204"><img alt="" aria-describedby="ca0065" data-dcnode-id="3213" height="243" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-12-9781845699727.jpg&amp;raw"><span data-dcnode-id="3212" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3205"><li data-dcnode-id="3206"><a class="anchor download-link u-font-sans" data-dcnode-id="3207" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-12-9781845699727.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3208"><span data-dcnode-id="3211" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3196"><span data-dcnode-id="3197" id="ca0065"><p data-dcnode-id="3198" id="sp0065"><span class="label" data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">Fig&nbsp;4.12</span></span><span data-dcnode-id="3201" instrument_node="">. </span><span data-dcnode-id="3200" id="p123"></span><span data-dcnode-id="3199" instrument_node="">Merrett chamber.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="3177" id="f0070"><span data-dcnode-id="3185"><img alt="" aria-describedby="ca0070" data-dcnode-id="3194" height="199" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-13-9781845699727.jpg&amp;raw"><span data-dcnode-id="3193" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3186"><li data-dcnode-id="3187"><a class="anchor download-link u-font-sans" data-dcnode-id="3188" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/3-s2.0-B9781845699727500047-f04-13-9781845699727.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3189"><span data-dcnode-id="3192" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3178"><span data-dcnode-id="3179" id="ca0070"><p data-dcnode-id="3180" id="sp0070"><span class="label" data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">Fig&nbsp;4.13</span></span><span data-dcnode-id="3182" instrument_node="">. </span><span data-dcnode-id="3181" instrument_node="">Inside the Merrett chamber.</span></p></span></span></figure></div><p data-dcnode-id="3165" id="p0300"><span data-dcnode-id="3175" instrument_node="">All that may be tentatively said at this stage is that if exposure to red accelerates the subjective passage of time for short intervals (</span><a class="workspace-trigger" data-dcnode-id="3173" href="#bb0265" name="bbb0265"><span data-dcnode-id="3174" instrument_node="">Smets, 1969</span></a><span data-dcnode-id="3172" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3170" href="#bb0135" name="bbb0135"><span data-dcnode-id="3171" instrument_node="">Humphrey and Keeble, 1977</span></a><span data-dcnode-id="3169" instrument_node="">), then the observation cited in </span><a class="workspace-trigger" data-dcnode-id="3167" href="#bb0240" name="bbb0240"><span data-dcnode-id="3168" instrument_node="">Porter and Mikellides (1976)</span></a><span data-dcnode-id="3166" instrument_node=""> that factory workers spent less time in toilets painted red than blue may be explained by the faster subjective time clock hypotheses and may be said to have some repercussions for spaces involving short stay intervals! However, the studies involving longer time intervals at Lund and Oxford do not lend themselves to this hypothesis. Therefore, the case for the direct effects of colour on time estimation is not made.</span></p></section><section data-dcnode-id="3087" id="s0030"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3160" id="st0040"><span data-dcnode-id="3163" instrument_node="">4.5</span><span data-dcnode-id="3162" instrument_node="">. </span><span data-dcnode-id="3161" instrument_node="">Colour and the subjective feeling of warmth</span></h2><p data-dcnode-id="3152" id="p0305"><span data-dcnode-id="3155"><span data-dcnode-id="3159" instrument_node="">Just as in the review of the psychological literature on colour and </span><a class="topic-link" data-dcnode-id="3157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/emotional-arousal" title="Learn more about emotional arousal from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3158" instrument_node="">emotional arousal</span></a><span data-dcnode-id="3156" instrument_node="">, there are conflicting directives between colour connotation studies and laboratory experiments with regard to the importance of the hue </span></span><span data-dcnode-id="3154" id="p124"></span><span data-dcnode-id="3153" instrument_node="">dimension on the subjective feeling of warmth and heat. Furthermore, there is the observation by artists and scientists that although blue is considered cold and cool, the blue part of a gas flame is hotter than the orange or red part! Indeed, when James Turrell, the renowned artist and psychologist, gave the keynote address to the Oslo International Colour Conference ‘Colour Between Art and Science’, in October 1998, he made the impassionate plea to ‘stop teaching the colour wheel unless you are going to teach the spectrum’. He went on to say, ‘Stop teaching colour symbology. Red is not warm and cool is not blue, it is just the opposite’.</span></p><p data-dcnode-id="3119" id="p0310"><span data-dcnode-id="3151" instrument_node="">The problem is that all the anecdotal reports that red is considered a warm colour and blue a cold colour are strongly supported by the vast majority of the published perceptual and cognitive studies (</span><a class="workspace-trigger" data-dcnode-id="3149" href="#bb0225" name="bbb0225"><span data-dcnode-id="3150" instrument_node="">Morgan and English, 1926</span></a><span data-dcnode-id="3148" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3146" href="#bb0255" name="bbb0255"><span data-dcnode-id="3147" instrument_node="">Sivik, 1974</span></a><span data-dcnode-id="3145" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3143" href="#bb0120" name="bbb0120"><span data-dcnode-id="3144" instrument_node="">Hogg et al., 1979</span></a><span data-dcnode-id="3142" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3140" href="#bb0140" name="bbb0140"><span data-dcnode-id="3141" instrument_node="">Hutchings, 2004</span></a><span data-dcnode-id="3135"><span data-dcnode-id="3139" instrument_node="">).These studies used colour samples, simulated colour spaces in the form of colour slides and drawings, and </span><a class="topic-link" data-dcnode-id="3137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/coloured-light" title="Learn more about coloured light from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3138" instrument_node="">coloured light</span></a><span data-dcnode-id="3136" instrument_node=""> in a variety of contexts on a longitudinal basis. This shows that time, taste, culture or other intervening variables could not have been responsible for the consistency of their findings. However, none of the five laboratory studies to date (</span></span><a class="workspace-trigger" data-dcnode-id="3133" href="#bb0080" name="bbb0080"><span data-dcnode-id="3134" instrument_node="">Berry, 1961</span></a><span data-dcnode-id="3132" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3130" href="#bb0075" name="bbb0075"><span data-dcnode-id="3131" instrument_node="">Bennett and Ray, 1972</span></a><span data-dcnode-id="3129" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3127" href="#bb0100" name="bbb0100"><span data-dcnode-id="3128" instrument_node="">Fanger et al., 1977</span></a><span data-dcnode-id="3126" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3124" href="#bb0110" name="bbb0110"><span data-dcnode-id="3125" instrument_node="">Green and Bell, 1980</span></a><span data-dcnode-id="3123" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3121" href="#bb0220" name="bbb0220"><span data-dcnode-id="3122" instrument_node="">Mikellides, 1990</span></a><span data-dcnode-id="3120" instrument_node="">), which attempted to measure the difference by means of behavioural, physiological and temperature estimation techniques, succeeded in finding a measurable difference of any practical importance.</span></p><p data-dcnode-id="3117" id="p0315"><span data-dcnode-id="3118" instrument_node="">What are the implications of these studies for the designer? There is no doubt that the inducement of visual warmth by exposure to red light or red paint is elicited in a variety of contexts. Men and women from various cultures and various ages report this apparent warmth consistently and, as such, it has direct design implications for the professional. Architects are involved not only in designing buildings but in creating spaces with certain perceived qualities and atmosphere. By manipulating the hue dimension, they can create a space which people will perceive as warm or cold at the cognitive level. Whether designers want to provide an immediate impression of warmth or coldness as people pass through a space or spend some time in it, the impression of apparent warmth is real in the sense of being consistently reported as such.</span></p><p data-dcnode-id="3093" id="p0320"><span data-dcnode-id="3116" instrument_node="">The hue–heat hypothesis has in fact been given support by </span><a class="workspace-trigger" data-dcnode-id="3111" href="#bb0100" name="bbb0100"><span data-dcnode-id="3115" instrument_node="">Fanger </span><em data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">et al.</span></em><span data-dcnode-id="3112" instrument_node=""> (1977)</span></a><span data-dcnode-id="3106"><span data-dcnode-id="3110" instrument_node="">, although the difference in perceived temperature associated with colour was small at 0.4 °C, and was argued by the three experimenters to be of no practical significance. This study, however, supports the notion that the direction of apparent warmth along the line of the perceptual studies may have some basis at the </span><a class="topic-link" data-dcnode-id="3108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/physiological-level" title="Learn more about physiological level from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3109" instrument_node="">physiological level</span></a><span data-dcnode-id="3107" instrument_node="">, which could be detected by the development of more refined techniques in the future. However, the implication of the hue–heat hypothesis for the practising engineer, as compared to the architect who is interested in direct measurable difference in </span></span><span data-dcnode-id="3105" id="p125"></span><span data-dcnode-id="3104" instrument_node="">comfort rating, is not there. As such, it cannot be used for energy conservation in any serious way, and the scepticism of heating engineers is understandable. In fact, regarding the only study where participants spent long periods of time (</span><a class="workspace-trigger" data-dcnode-id="3102" href="#bb0220" name="bbb0220"><span data-dcnode-id="3103" instrument_node="">Mikellides, 1990</span></a><span data-dcnode-id="3097"><span data-dcnode-id="3101" instrument_node="">), there were </span><a class="topic-link" data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/statistically-significant-difference" title="Learn more about statistically significant differences from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3100" instrument_node="">statistically significant differences</span></a><span data-dcnode-id="3098" instrument_node=""> between the first and second hour temperature evaluations; that is, the perceived temperature was estimated colder in the second period (after 90 minutes) by a magnitude of 0.8 °C in a red room and 0.7 °C in a blue room, – while real temperature went up by 0.5 °C. At the same time, no statistically significant differences between the two rooms were found as far as colour was concerned. This experiment epitomises the existing state of knowledge as far as the conflicting conclusions between the perceptual and laboratory studies are concerned; for while the same subjects reported no differences between the two rooms in temperature estimation, highly significant differences (</span></span><em data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">P</span></em><span data-dcnode-id="3094" instrument_node=""> &lt; 0.001) were obtained in the subjective evaluation of apparent warmth based on the semantic scale of warmth (1), cold (7) – mean score for red = 1.8 and mean score for blue = 4.7. This observation was also supported by the participants’ comments in the open-ended question regarding the atmosphere of the room, as well as their story writing. Clearly the validity of the hue–heat hypothesis depends upon whether the design implications concerned are considered at the cognitive level or at the physiological level.</span></p><p data-dcnode-id="3088" id="p0325"><span data-dcnode-id="3092" instrument_node="">James Turrell’s passionate plea to stop teaching the colour wheel and colour symbology adds another dimension to the debate. Perhaps the lack of support of the laboratory experiments to date is a testimony to his plea above supporting the blue-flame hypothesis. Perhaps also </span><a class="workspace-trigger" data-dcnode-id="3090" href="#bb0115" name="bbb0115"><span data-dcnode-id="3091" instrument_node="">Richard Gregory’s conclusion (1997)</span></a><span data-dcnode-id="3089" instrument_node=""> is appropriate here in that ‘there is a conflict between designing experiments simple enough for analysis and sufficiently complex to reveal the full richness of phenomena. So science is an art. Like art it is not completely mastered.’</span></p></section><section data-dcnode-id="3074" id="s0035"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3083" id="st0045"><span data-dcnode-id="3086" instrument_node="">4.6</span><span data-dcnode-id="3085" instrument_node="">. </span><span data-dcnode-id="3084" instrument_node="">Conclusions and further reading</span></h2><p data-dcnode-id="3075" id="p0330"><span data-dcnode-id="3078"><span data-dcnode-id="3082" instrument_node="">Readers can see the various practical as well as theoretical conclusions at the end of each section covered in this review. With regard to further reading, the references which follow will provide a comprehensive coverage of the literature on the subject. Readers are asked to use their own judgement in evaluating the validity of the specific experiments and in deciding whether they consider the physiological experiments to be of more value more than the cognitive/affective approaches. Furthermore, they should consider whether the colour stimulation is from </span><a class="topic-link" data-dcnode-id="3080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/coloured-light" title="Learn more about coloured light from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3081" instrument_node="">coloured light</span></a><span data-dcnode-id="3079" instrument_node=""> or pigment, and whether this research is published in reputable journals. At least designers will be aware of the limitations of our knowledge, where conflicting results are found, and base their creative designs on what we do know. The </span></span><span data-dcnode-id="3077" id="p126"></span><span data-dcnode-id="3076" instrument_node="">author also hopes that future research will include both physiological as well as affective measures, not one as opposed to the other. Wherever possible, the diachronic and longitudinal dimension should be encouraged. New technologies and materials have now made it possible to introduce innovative ways of bringing colour into our homes, offices and urban spaces. The current fascination with colour change and colour animation is constantly changing our responses and attitudes to colour and light to a much greater degree than ever before. It is important to rethink the traditional role of the architect/designer in this ever-changing world by focusing on both the context and content of colour stimulation.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="3068"><button class="button button-anchor" data-dcnode-id="3069" type="button"><span class="button-text" data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="319"><section class="bibliography u-font-serif text-s" data-dcnode-id="2535" id="bi0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">4.7 Sources of further information and advice</span></h2><section class="bibliography-sec" data-dcnode-id="2536" id="bs0010"><dl class="references" data-dcnode-id="2537" id="reference-links-bs0010"><dt class="label" data-dcnode-id="3063"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="3064" href="#bbb0010" id="ref-id-bb0010"><span data-dcnode-id="3065" instrument_node="">Empson, 1986</span></a></dt><dd class="reference" data-dcnode-id="3036" id="rf0010"><div class="contribution" data-dcnode-id="3057"><span data-dcnode-id="3062" instrument_node="">J.</span><span data-dcnode-id="3060" instrument_node=""> </span><span data-dcnode-id="3058" instrument_node="">Empson</span></div><div class="host" data-dcnode-id="3041" id="ref-id-rf0010"><span data-dcnode-id="3056" instrument_node="">Human Brainwaves</span><span data-dcnode-id="3054" instrument_node="">, </span><span data-dcnode-id="3052" instrument_node="">Macmillan</span><span data-dcnode-id="3050" instrument_node="">, </span><span data-dcnode-id="3048" instrument_node="">London</span><span data-dcnode-id="3046" instrument_node=""> (</span><span data-dcnode-id="3044" instrument_node="">1986</span><span data-dcnode-id="3042" instrument_node="">)</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="3037"><span data-dcnode-id="3040" instrument_node=""></span><a aria-describedby="ref-id-rf0010" class="link" data-dcnode-id="3038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DHuman%2520Brainwaves%26publication_year%3D1986%26author%3DJ.%2520Empson" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3039" instrument_node="">Google Scholar</span></a></div></dd><dt class="label" data-dcnode-id="3033"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="3034" href="#bbb0015" id="ref-id-bb0015"><span data-dcnode-id="3035" instrument_node="">Küller, 2002</span></a></dt><dd class="reference" data-dcnode-id="2991" id="rf0015"><div class="contribution" data-dcnode-id="3024"><span data-dcnode-id="3032" instrument_node="">R.</span><span data-dcnode-id="3030" instrument_node=""> </span><span data-dcnode-id="3028" instrument_node="">Küller</span><div data-dcnode-id="3025" id="ref-id-rf0015"><strong class="title" data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">The influence of light on circarhythms in humans</span></strong></div></div><div class="host" data-dcnode-id="3004"><span data-dcnode-id="3023" instrument_node="">Journal of Physiological Anthropology and Applied Human Science</span><span data-dcnode-id="3021" instrument_node="">, </span><span data-dcnode-id="3019" instrument_node="">21</span><span data-dcnode-id="3017" instrument_node=""> (</span><span data-dcnode-id="3015" instrument_node="">2002</span><span data-dcnode-id="3013" instrument_node="">)</span><span data-dcnode-id="3011" instrument_node="">, pp. </span><span data-dcnode-id="3009" instrument_node="">87</span><span data-dcnode-id="3007" instrument_node="">-</span><span data-dcnode-id="3005" instrument_node="">91</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="2992"><div class="u-margin-m-right u-display-inline" data-dcnode-id="2999"><els-view-pdf-element class="pending" data-dcnode-id="3000" disabled="" doc-id="10.2114/jpa.21.87" doc-type="doi" onclick="({
