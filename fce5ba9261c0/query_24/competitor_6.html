tps%3A//www.sciencedirect.com/science/article/pii/S0950329322000143" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="637" id="citing-articles-article0-title"><span data-dcnode-id="638" instrument_node="">Cross-modal correspondence between visual information and taste perception of bitter foods and drinks</span></h3></a><div class="article-source ellipsis" data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">2022, Food Quality and Preference</span></div></div><div class="buttons" data-dcnode-id="627"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="628" type="button"><span class="button-link-text" data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="629" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="630"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="622"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="623" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="624"><p data-dcnode-id="625" id="sp0010"><span data-dcnode-id="626" instrument_node="">People are sensitive to bitter taste because bitterness serves as a warning sign of poisons. Previous research reported that taste receptors in the oral cavity are more sensitive to bitter taste than to sweet taste. Other sensory systems, i.e., auditory, olfactory, tactile and visual, have also been shown to be involved in the sense of taste, a phenomenon known as cross-modal correspondence. It has been shown that the color of food or its packaging influences taste expectation and perception. However, it remains unknown whether cross-modal correspondence between visual information and taste depends on the degree of bitterness. Here, we investigated the effect of background color on taste using chocolate and green tea with varying bitterness levels. Undergraduate students were asked to evaluate how bitter and how sweet milk chocolate (Experiment 1) or less bitter and bitter chocolate (Experiment 2) tasted when served from black or pink wrapping paper. In Experiment 3, undergraduate students were ask to evaluate how bitter and how sweet less bitter and bitter green tea tasted when served from a clear blue or a clear cup. The experiments showed that when chocolate and green tea were bitter, visual information influenced taste evaluation. In contrast, no visual effect on taste was seen for less bitter chocolate, milk chocolate or less bitter green tea. The results suggest the possibility that cross-modal correspondence of visual information to taste changes depending on the degree of bitterness.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="603"><div class="sub-heading" data-dcnode-id="615"><a data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0950329321003621" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="619" id="citing-articles-article1-title"><span data-dcnode-id="620" instrument_node="">Influence of the crossmodal congruency between color and flavor on product evaluations: Evidence from behavioral and oscillatory brain responses</span></h3></a><div class="article-source ellipsis" data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">2022, Food Quality and Preference</span></div></div><div class="buttons" data-dcnode-id="609"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="610" type="button"><span class="button-link-text" data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="611" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="612"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="604"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="605" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="606"><p data-dcnode-id="607" id="sp0010"><span data-dcnode-id="608" instrument_node="">People often associate features or stimuli across senses, and these crossmodal correspondences also function as criteria for judging whether a pair of features or stimuli is crossmodally congruent or incongruent. We conducted two studies to examine whether the crossmodal congruency between a drink color and a flavor could also elicit more positive ratings of this drink. In Study 1, the experimental task was to simultaneously view a photo of a colored drink and to taste a beverage whose flavor was either congruent or incongruent with the color. Consequently, the color-flavor congruent drinks received more positive ratings than the color-flavor incongruent ones. In Study 2, we conducted an EEG experiment to investigate both behavioral and oscillatory brain responses to the crossmodal congruency between the successively presented color and flavor. The results of subjective ratings did not reveal any significant difference between the color-flavor congruent and incongruent stimuli. However, the time–frequency analyses on the EEG data revealed that rating the color-flavor incongruent beverages elicited greater alpha band power in the parietal region, compared to the color-flavor congruent stimuli. Collectively, these findings revealed the influence of color-flavor congruency on the subjective ratings of beverages, and demonstrated how this effect was modulated by the temporal synchrony of the color and flavor cues.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="585"><div class="sub-heading" data-dcnode-id="597"><a data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0950329321003542" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="601" id="citing-articles-article2-title"><span data-dcnode-id="602" instrument_node="">Impact of context in visual evaluation of design pastry: Comparison of real and virtual</span></h3></a><div class="article-source ellipsis" data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">2022, Food Quality and Preference</span></div></div><div class="buttons" data-dcnode-id="591"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="592" type="button"><span class="button-link-text" data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="593" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="594"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="586"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="587" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="588"><p data-dcnode-id="589" id="sp0010"><span data-dcnode-id="590" instrument_node="">Virtual reality is becoming an opportunity for multidisciplinary collaboration, including sensory science. The main objective of this work was to compare visual expectations generated by five real cakes evaluated in a laboratory testing booth with their virtual versions in a virtualized sensory booth. Real cakes were designed following the current pastries trends, and virtualization was made using a photogrammetric process. The virtual sensory booth was designed using Unity3D software. The participants were immersed in the 3D virtual environment through a head-mounted display (HMD). Data were analyzed using ANOVA mixed model, internal preference mapping and cluster analysis. The effects of context (real and virtual), the order in test session (crossover design), and socio-demographic factors were studied. The results showed no statistically significant differences within real and virtual studied cakes. These results create new perspectives of the potential of this methodology to be used to rate virtual foods in an immersive environment at the same level as real foods. Regarding the impact of the socio-demographic factors on the acceptance of the cakes, only the effects of gender and sweet-tooth were statistically significant. Males assessed all variables associated with the cakes significantly higher (p&nbsp;&lt;&nbsp;0.05) than females. In the same way, all variables in all cakes were better evaluated by participants with a self-declared sweet-tooth (p&nbsp;&lt;&nbsp;0.05). In the internal preference map, participants were segmented into three clusters that could be identified with the different trends in the pastries market. These results may help companies build tailor-made marketing strategies using Immersive technologies to evaluate new food products to satisfy different consumer segments.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="567"><div class="sub-heading" data-dcnode-id="579"><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S095032932100330X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="583" id="citing-articles-article3-title"><span data-dcnode-id="584" instrument_node="">Influence of container color on food ratings and choices: Evidence from a desktop VR study</span></h3></a><div class="article-source ellipsis" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">2022, Food Quality and Preference</span></div></div><div class="buttons" data-dcnode-id="573"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="574" type="button"><span class="button-link-text" data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="575" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="576"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="568"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="569" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="570"><p data-dcnode-id="571" id="sp0010"><span data-dcnode-id="572" instrument_node="">Considering the benefits of a large-scale shift towards a more plant-based diet, we conducted an experimental study to investigate how people’s food ratings and choices might be influenced by the color of the container in which foods were served. Fifty healthy Chinese young adults were asked to choose a more desirable dish from a two-dish choice set in a virtual restaurant, followed by an online food rating task. The results revealed that the meat dishes were chosen more often and rated as being more likable and desirable than the vegetable dishes. Despite such preference for the meat dishes over the vegetable dishes, the participants chose more vegetable dishes served in the blue containers when the meat dishes were served in the red containers. These findings provide novel empirical evidence regarding how a combination of red- and blue-colored containers can influence people’s food choices, which has implications in the practice of nudging consumers towards more plant-based diets via skillfully designing contextual cues.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="540"><div class="sub-heading" data-dcnode-id="561"><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2211926421001806" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="565" id="citing-articles-article4-title"><span data-dcnode-id="566" instrument_node="">Utilisation of the marine microalgae Nannochloropsis sp. and Tetraselmis sp. as innovative ingredients in the formulation of wheat tortillas</span></h3></a><div class="article-source ellipsis" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">2021, Algal Research</span></div></div><div class="buttons" data-dcnode-id="555"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="556" type="button"><span class="button-link-text" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="557" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="558"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="541"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="542" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="543"><p data-dcnode-id="544" id="sp0070"><span data-dcnode-id="554" instrument_node="">Powdered biomass of </span><em data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Nannochloropsis</span></em><span data-dcnode-id="551" instrument_node=""> sp. and </span><em data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Tetraselmis</span></em><span data-dcnode-id="548" instrument_node=""> sp. were used as innovative ingredients in wheat tortillas at flour substitution levels of 0.5–3.0%. Incorporation of microalgae into the tortilla formulations led to increased protein and fat content. The content of phenolic and carotenoids was also higher in microalgae-enriched tortillas, especially for those enriched in </span><em data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Nannochloropsis</span></em><span data-dcnode-id="545" instrument_node=""> sp. at a flour substitution level of 3.0%. Not only the phenolic content but also the antioxidant capacity of the tortillas was higher after microalgae incorporation. Bioaccessible polyphenols were also higher in microalgae-containing tortillas as well as the antioxidant capacity of the enzymatic digestive extracts. No major differences in physical parameters (besides colour) were observed, and the overall acceptance of the microalgae-enriched tortillas assessed after a sensorial analysis was comparable to that of the wheat-only controls. Moreover, the purchase intention of the products as well as the acceptability index suggested that the tortillas would have a good acceptance. Several reports highlighted the nutritional value of microalgae. The production of microalgae and their utilisation as novel ingredients in innovative foods will increase the sustainability of the food industry and promote health.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="522"><div class="sub-heading" data-dcnode-id="534"><a data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0148296321003891" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="538" id="citing-articles-article5-title"><span data-dcnode-id="539" instrument_node="">Food packaging and the color red: How negative cognitive associations influence feelings of guilt</span></h3></a><div class="article-source ellipsis" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">2021, Journal of Business Research</span></div></div><div class="buttons" data-dcnode-id="528"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="529" type="button"><span class="button-link-text" data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="530" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="531"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="523"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="524" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="525"><p data-dcnode-id="526" id="sp0005"><span data-dcnode-id="527" instrument_node="">The color red widely appears on food packages. However, understanding of the effects of this color on consumers in the context of food packages remains limited. In particular, the literature stresses the need for a better grasp of the underlying mechanisms that explain the effects of this color when used on food packages. Building on the psychological literature on colors and emotions, this research argues that because the color red carries negative meanings related to transgression, it may prompt consumers to feel some guilt about their consumption. Three studies demonstrate the indirect effect of the color red (versus green or blue) on guilt and eventually on choice through the mediating role of negative cognitive associations. The results also highlight the moderating role of perception of the food product as unhealthy, with the color red leading to stronger negative associations and guilt for unhealthy (vs. healthy) products.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85042942580%26md5%3D67fae9ed9171228e9f869241c03822e7" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="519" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="520"></path></svg><span class="button-alternative-text" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="243"><dl class="footnote" data-dcnode-id="498"><dt class="footnote-label" data-dcnode-id="508"><sup data-dcnode-id="509"><a data-dcnode-id="510" href="#bfn1"><span data-dcnode-id="511" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="499"><p data-dcnode-id="500" id="np005"><span data-dcnode-id="507" instrument_node="">As one commentator noted almost half a century ago: </span><em data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">“A red light makes everything look red; a green light makes meat look grey and spoiled.</span></em><span data-dcnode-id="504" instrument_node="">” (</span><a class="workspace-trigger" data-dcnode-id="502" href="#b0215" name="bb0215"><span data-dcnode-id="503" instrument_node="">Lampi, 1973, p. 59</span></a><span data-dcnode-id="501" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="487"><dt class="footnote-label" data-dcnode-id="494"><sup data-dcnode-id="495"><a data-dcnode-id="496" href="#bfn2"><span data-dcnode-id="497" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="488"><p data-dcnode-id="489" id="np010"><span data-dcnode-id="493" instrument_node="">The spare stock of white cans was apparently then distributed to the airlines (see </span><a class="workspace-trigger" data-dcnode-id="491" href="#b0390" name="bb0390"><span data-dcnode-id="492" instrument_node="">Spence, 2017a</span></a><span data-dcnode-id="490" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="476"><dt class="footnote-label" data-dcnode-id="483"><sup data-dcnode-id="484"><a data-dcnode-id="485" href="#bfn3"><span data-dcnode-id="486" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="477"><p data-dcnode-id="478" id="np015"><span data-dcnode-id="482" instrument_node="">The importance of packaging colour is brought home by </span><a class="workspace-trigger" data-dcnode-id="480" href="#b0365" name="bb0365"><span data-dcnode-id="481" instrument_node="">Singh’s (2006)</span></a><span data-dcnode-id="479" instrument_node=""> suggestion that colour drives 62–90% of consumer purchasing decisions.</span></p></dd></dl><dl class="footnote" data-dcnode-id="468"><dt class="footnote-label" data-dcnode-id="472"><sup data-dcnode-id="473"><a data-dcnode-id="474" href="#bfn4"><span data-dcnode-id="475" instrument_node="">4</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="469"><p data-dcnode-id="470" id="np020"><span data-dcnode-id="471" instrument_node="">Note here also the 7-Up and Coke examples are also confounded with the impact of branding, since the iconic colour scheme that is associated with the brand changed.</span></p></dd></dl><dl class="footnote" data-dcnode-id="457"><dt class="footnote-label" data-dcnode-id="464"><sup data-dcnode-id="465"><a data-dcnode-id="466" href="#bfn5"><span data-dcnode-id="467" instrument_node="">5</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="458"><p data-dcnode-id="459" id="np025"><span data-dcnode-id="463" instrument_node="">Note that packaging colour also influences people’s expectations of drug efficacy (e.g., see </span><a class="workspace-trigger" data-dcnode-id="461" href="#b0335" name="bb0335"><span data-dcnode-id="462" instrument_node="">Roullet &amp; Droulers, 2005</span></a><span data-dcnode-id="460" instrument_node="">), although a full discussion of this topic falls beyond the scope of the present review.</span></p></dd></dl><dl class="footnote" data-dcnode-id="440"><dt class="footnote-label" data-dcnode-id="453"><sup data-dcnode-id="454"><a data-dcnode-id="455" href="#bfn6"><span data-dcnode-id="456" instrument_node="">6</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="441"><p data-dcnode-id="442" id="np030"><span data-dcnode-id="452" instrument_node="">While beyond the scope of this review, the colour of product packaging against which a product image is seen, or through which the product itself is seen (e.g., in the case of the increasingly popular transparent windows in product packaging), is also important in terms of optimizing product perception (see </span><a class="workspace-trigger" data-dcnode-id="450" href="#b0355" name="bb0355"><span data-dcnode-id="451" instrument_node="">Simmonds and Spence, 2017</span></a><span data-dcnode-id="449" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="447" href="#b0360" name="bb0360"><span data-dcnode-id="448" instrument_node="">Simmonds et al., 2018</span></a><span data-dcnode-id="446" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="444" href="#b0385" name="bb0385"><span data-dcnode-id="445" instrument_node="">Spence, 2016</span></a><span data-dcnode-id="443" instrument_node="">, for reviews).</span></p></dd></dl><dl class="footnote" data-dcnode-id="430"><dt class="footnote-label" data-dcnode-id="436"><sup data-dcnode-id="437"><a data-dcnode-id="438" href="#bfn7"><span data-dcnode-id="439" instrument_node="">7</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="431"><p data-dcnode-id="432" id="np035"><span data-dcnode-id="435" instrument_node="">Schifferstein’s (2009, p. 273) suggestion was that: </span><em data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">“participants may have combined the sweetness of the drink with the ‘experienced’ sweetness’ induced by the pinkness of the cups in their judgments.”</span></em></p></dd></dl><dl class="footnote" data-dcnode-id="422"><dt class="footnote-label" data-dcnode-id="426"><sup data-dcnode-id="427"><a data-dcnode-id="428" href="#bfn8"><span data-dcnode-id="429" instrument_node="">8</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="423"><p data-dcnode-id="424" id="np040"><span data-dcnode-id="425" instrument_node="">In this study, the trends for the colour of the cup to influence sweetness and chocolate aroma failed to reach statistical significance.</span></p></dd></dl><dl class="footnote" data-dcnode-id="411"><dt class="footnote-label" data-dcnode-id="418"><sup data-dcnode-id="419"><a data-dcnode-id="420" href="#bfn9"><span data-dcnode-id="421" instrument_node="">9</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="412"><p data-dcnode-id="413" id="np045"><span data-dcnode-id="417" instrument_node="">Such results are certainly consistent with other findings highlighting the existence of crossmodal correspondences between colour and temperature (e.g., </span><a class="workspace-trigger" data-dcnode-id="415" href="#b0155" name="bb0155"><span data-dcnode-id="416" instrument_node="">Ho, Van Doorn, Kawabe, Watanabe, &amp; Spence, 2014</span></a><span data-dcnode-id="414" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="403"><dt class="footnote-label" data-dcnode-id="407"><sup data-dcnode-id="408"><a data-dcnode-id="409" href="#bfn10"><span data-dcnode-id="410" instrument_node="">10</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="404"><p data-dcnode-id="405" id="np050"><span data-dcnode-id="406" instrument_node="">Note also that the dominant taste of each popcorn was not influenced by the colour of the bowl.</span></p></dd></dl><dl class="footnote" data-dcnode-id="389"><dt class="footnote-label" data-dcnode-id="399"><sup data-dcnode-id="400"><a data-dcnode-id="401" href="#bfn11"><span data-dcnode-id="402" instrument_node="">11</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="390"><p data-dcnode-id="391" id="np055"><span data-dcnode-id="398" instrument_node="">Moving forward, it is interesting to note that the foreground/background colour combinations that were rated as sweetest in a recent online study of the taste that people associated with various pairs of colours (see </span><a class="workspace-trigger" data-dcnode-id="396" href="#b0490" name="bb0490"><span data-dcnode-id="397" instrument_node="">Woods, Marmolejo-Ramos, Velasco, &amp; Spence, 2016</span></a><span data-dcnode-id="395" instrument_node="">), match-up pretty well with the food/plate colour combination (i.e., a pink dessert on a white plate) that gave rise to the higher sweetness ratings in </span><a class="workspace-trigger" data-dcnode-id="393" href="#b0260" name="bb0260"><span data-dcnode-id="394" instrument_node="">Piqueras-Fiszman et al.’s (2012)</span></a><span data-dcnode-id="392" instrument_node=""> study. Further research will, though, be needed in order to determine whether this reflects anything more than mere coincidence.</span></p></dd></dl><dl class="footnote" data-dcnode-id="372"><dt class="footnote-label" data-dcnode-id="385"><sup data-dcnode-id="386"><a data-dcnode-id="387" href="#bfn12"><span data-dcnode-id="388" instrument_node="">12</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="373"><p data-dcnode-id="374" id="np060"><span data-dcnode-id="384" instrument_node="">Anecdotally, I have heard from my colleagues working in the pet food industry that much the same thing happens when, for examples, pets are served from red bowls. Apparently, they too eat less than when their food is served from a bowl of another colour (see also </span><a class="workspace-trigger" data-dcnode-id="382" href="#b0180" name="bb0180"><span data-dcnode-id="383" instrument_node="">Humphrey and Keeble, 1978a</span></a><span data-dcnode-id="381" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="379" href="#b0185" name="bb0185"><span data-dcnode-id="380" instrument_node="">Humphrey and Keeble, 1978b</span></a><span data-dcnode-id="378" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="376" href="#b0370" name="bb0370"><span data-dcnode-id="377" instrument_node="">Siniscalchi et al., 2017</span></a><span data-dcnode-id="375" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="364"><dt class="footnote-label" data-dcnode-id="368"><sup data-dcnode-id="369"><a data-dcnode-id="370" href="#bfn13"><span data-dcnode-id="371" instrument_node="">13</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="365"><p data-dcnode-id="366" id="np065"><span data-dcnode-id="367" instrument_node="">The story around avoidance motivation and the colour red obviously becomes somewhat more complicated, when the colour happens to be associated with a brand: Just think of the distinctive Coca-Cola red that we came across earlier.</span></p></dd></dl><dl class="footnote" data-dcnode-id="356"><dt class="footnote-label" data-dcnode-id="360"><sup data-dcnode-id="361"><a data-dcnode-id="362" href="#bfn14"><span data-dcnode-id="363" instrument_node="">14</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="357"><p data-dcnode-id="358" id="np070"><span data-dcnode-id="359" instrument_node="">Given that the lightness and chroma of the plates was fixed, only the hue (red or green) varied.</span></p></dd></dl><dl class="footnote" data-dcnode-id="339"><dt class="footnote-label" data-dcnode-id="352"><sup data-dcnode-id="353"><a data-dcnode-id="354" href="#bfn15"><span data-dcnode-id="355" instrument_node="">15</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="340"><p data-dcnode-id="341" id="np075"><span data-dcnode-id="351" instrument_node="">Note that all of the studies that have assessed the effect of background red colour on consumption behaviour reported so far (e.g., </span><a class="workspace-trigger" data-dcnode-id="349" href="#b0045" name="bb0045"><span data-dcnode-id="350" instrument_node="">Bruno et al., 2013</span></a><span data-dcnode-id="348" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="346" href="#b0115" name="bb0115"><span data-dcnode-id="347" instrument_node="">Genschow et al., 2012</span></a><span data-dcnode-id="345" instrument_node="">; Study 1; </span><a class="workspace-trigger" data-dcnode-id="343" href="#b0305" name="bb0305"><span data-dcnode-id="344" instrument_node="">Reutner et al., 2015</span></a><span data-dcnode-id="342" instrument_node="">, Study 1) have been based on between-participants comparisons.</span></p></dd></dl><dl class="footnote" data-dcnode-id="328"><dt class="footnote-label" data-dcnode-id="335"><sup data-dcnode-id="336"><a data-dcnode-id="337" href="#bfn16"><span data-dcnode-id="338" instrument_node="">16</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="329"><p data-dcnode-id="330" id="np080"><span data-dcnode-id="334" instrument_node="">It should, of course, be noted here that the notion of an “unhealthy” food is not itself unproblematic. Though, in </span><a class="workspace-trigger" data-dcnode-id="332" href="#b0305" name="bb0305"><span data-dcnode-id="333" instrument_node="">Reutner et al.’s (2015)</span></a><span data-dcnode-id="331" instrument_node=""> study, pre-tests were carried out to ensure that people did indeed perceive the foods as either healthy, neutral, or unhealthy.</span></p></dd></dl><dl class="footnote" data-dcnode-id="314"><dt class="footnote-label" data-dcnode-id="324"><sup data-dcnode-id="325"><a data-dcnode-id="326" href="#bfn17"><span data-dcnode-id="327" instrument_node="">17</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="315"><p data-dcnode-id="316" id="np085"><span data-dcnode-id="323" instrument_node="">Here, it is interesting to note that a number of companies have started-up in recent years offering high-contrast plateware and cutlery for such older individuals (e.g., https://www.indiegogo.com/projects/eatwell-tableware-for-people-with-special-needs#/; </span><a class="workspace-trigger" data-dcnode-id="321" href="#b0315" name="bb0315"><span data-dcnode-id="322" instrument_node="">Robbins, 2015</span></a><span data-dcnode-id="320" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="318" href="#b0375" name="bb0375"><span data-dcnode-id="319" instrument_node="">Smyth, 2016</span></a><span data-dcnode-id="317" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="300"><dt class="footnote-label" data-dcnode-id="310"><sup data-dcnode-id="311"><a data-dcnode-id="312" href="#bfn18"><span data-dcnode-id="313" instrument_node="">18</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="301"><p data-dcnode-id="302" id="np090"><span data-dcnode-id="309" instrument_node="">And, at the other extreme, of course, one might wonder how the food experience of those mostly female tetrachromats who have a fourth cone type might differ from that of regular trichromats (</span><a class="workspace-trigger" data-dcnode-id="307" href="#b0210" name="bb0210"><span data-dcnode-id="308" instrument_node="">Jameson et al., 2001</span></a><span data-dcnode-id="306" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="304" href="#b0240" name="bb0240"><span data-dcnode-id="305" instrument_node="">McCrone, 2002</span></a><span data-dcnode-id="303" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="289"><dt class="footnote-label" data-dcnode-id="296"><sup data-dcnode-id="297"><a data-dcnode-id="298" href="#bfn19"><span data-dcnode-id="299" instrument_node="">19</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="290"><p data-dcnode-id="291" id="np095"><span data-dcnode-id="295" instrument_node="">According to </span><a class="workspace-trigger" data-dcnode-id="293" href="#b0230" name="bb0230"><span data-dcnode-id="294" instrument_node="">Lightner and Rand (2014)</span></a><span data-dcnode-id="292" instrument_node="">, natural colours can also be used to promote thoughts of seasonality in a meal.</span></p></dd></dl><dl class="footnote" data-dcnode-id="269"><dt class="footnote-label" data-dcnode-id="285"><sup data-dcnode-id="286"><a data-dcnode-id="287" href="#bfn20"><span data-dcnode-id="288" instrument_node="">20</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="270"><p data-dcnode-id="271" id="np100"><span data-dcnode-id="284" instrument_node="">One other point to bear in mind here is that when the food or beverage product is familiar, say, people may well have colour memory of what the product </span><em data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">should</span></em><span data-dcnode-id="281" instrument_node=""> look like and this might give rise to some sort of perceptual constancy for the colour of the product itself (</span><a class="workspace-trigger" data-dcnode-id="279" href="#b0445" name="bb0445"><span data-dcnode-id="280" instrument_node="">Troost, 1998</span></a><span data-dcnode-id="278" instrument_node="">). The prediction here, then, would be that the less familiar the food or beverage product under consideration, the more likely its apparent colour is to be influenced by the specifics of the background colour (e.g., </span><a class="workspace-trigger" data-dcnode-id="276" href="#b0165" name="bb0165"><span data-dcnode-id="277" instrument_node="">Huang &amp; Lu, 2015</span></a><span data-dcnode-id="275" instrument_node="">; see also </span><a class="workspace-trigger" data-dcnode-id="273" href="#b0075" name="bb0075"><span data-dcnode-id="274" instrument_node="">Deliza &amp; MacFie, 2001</span></a><span data-dcnode-id="272" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="255"><dt class="footnote-label" data-dcnode-id="265"><sup data-dcnode-id="266"><a data-dcnode-id="267" href="#bfn21"><span data-dcnode-id="268" instrument_node="">21</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="256"><p data-dcnode-id="257" id="np105"><span data-dcnode-id="264" instrument_node="">Given the ‘file drawer problem’ (</span><a class="workspace-trigger" data-dcnode-id="262" href="#b0325" name="bb0325"><span data-dcnode-id="263" instrument_node="">Rosenthal, 1979</span></a><span data-dcnode-id="261" instrument_node="">), it is always going to be hard (in this area as in any other) to determine quite how many </span><em data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">null</span></em><span data-dcnode-id="258" instrument_node=""> results that there may be out there, sitting in the back of someone’s file drawer.</span></p></dd></dl><dl class="footnote" data-dcnode-id="244"><dt class="footnote-label" data-dcnode-id="251"><sup data-dcnode-id="252"><a data-dcnode-id="253" href="#bfn22"><span data-dcnode-id="254" instrument_node="">22</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="245"><p data-dcnode-id="246" id="np110"><span data-dcnode-id="250" instrument_node="">Given that increased variety has been shown to increase consumption, and given that colour variety (e.g., of sugar-coated candies) has been suggested as a relevant and salient dimension here (see </span><a class="workspace-trigger" data-dcnode-id="248" href="#b0280" name="bb0280"><span data-dcnode-id="249" instrument_node="">Piqueras-Fiszman &amp; Spence, 2014</span></a><span data-dcnode-id="247" instrument_node="">, for a review), it is at least possible to imagine that varying the background colour of the plateware might serve much the same purpose over the course of a multi-course restaurant meal, say. However, empirical support for such a suggestion will need to await empirical confirmation.</span></p></dd></dl></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0950329318301678"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2018 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journa
