ta-dcnode-id="6272" instrument_node="">In another within-participants study, which this time took place at Ferran Adrià’s Alícia Foundation (a culinary school and research institute just outside Barcelona, Spain), </span><a class="workspace-trigger" data-dcnode-id="6270" href="#b0260" name="bb0260"><span data-dcnode-id="6271" instrument_node="">Piqueras-Fiszman, Alcaide, Roura, and Spence (2012)</span></a><span data-dcnode-id="6269" instrument_node=""> had 53 participants rate the sweetness, flavour intensity, liking, and quality of a homogenously-coloured and textured pinkish-red strawberry mousse. The dessert was first evaluated on either a round black or white plate, and then on the plate of the other colour (though, strictly-speaking, of course, it should be remembered that black and white are achromatic colours). The order of presentation of the plated desserts was counterbalanced across participants. The latter were tested in groups of four and had a single taste of each mousse. Serving the dessert on the white plate resulted in participants rating it, on average, as 7% sweeter, as having a flavour that was 13% more intense. The participants also gave the mousse a 9% higher liking rating on the white plate than when the same dessert was served from the black plate instead. (All of these differences were significant.)</span><a class="workspace-trigger" data-dcnode-id="6266" href="#fn11" name="bfn11"><sup data-dcnode-id="6267"><span data-dcnode-id="6268" instrument_node="">11</span></sup></a></p><p data-dcnode-id="6252" id="p0150"><a class="workspace-trigger" data-dcnode-id="6263" href="#b0265" name="bb0265"><span data-dcnode-id="6264" instrument_node="">Piqueras-Fiszman, Giboreau, and Spence (2013)</span></a><span data-dcnode-id="6262" instrument_node=""> went on to test the extent to which the colour of the plateware (again, black and white plates were used) influenced the gustatory and hedonic experiences of a more complex food; Specifically, desserts with layers and decorations having different colours, textures, tastes, and flavours. The latter between-participants study was performed in a naturalistic setting, namely at one of the restaurants at the Institut Paul Bocuse, in Lyon, France, under conditions that were as ecologically valid as possible. A between-participants experimental design was used, in which the diners (N = 253) were served a three-course meal. Over the course of the two weeks during which the study was conducted, three different desserts were offered in the dining room (a </span><em data-dcnode-id="6260"><span data-dcnode-id="6261" instrument_node="">fraisier</span></em><span data-dcnode-id="6259" instrument_node="">, a </span><em data-dcnode-id="6257"><span data-dcnode-id="6258" instrument_node="">fraicheur</span></em><span data-dcnode-id="6256" instrument_node=""> of raspberry and vanilla, and a </span><em data-dcnode-id="6254"><span data-dcnode-id="6255" instrument_node="">vacherin glacé</span></em><span data-dcnode-id="6253" instrument_node=""> with vanilla, raspberry and basil). Once again, the colour of the plateware was found to exert a significant influence over people’s rating of the foods that they were served. In this case, the effect of the background colour of the plate varied as a function of the particular dessert being served.</span></p><p data-dcnode-id="6244" id="p0155"><span data-dcnode-id="6251" instrument_node="">The </span><em data-dcnode-id="6249"><span data-dcnode-id="6250" instrument_node="">fraisier</span></em><span data-dcnode-id="6248" instrument_node=""> was rated as significantly more appetizing and liked significantly more when served from the white plate than from the black plate. Taken together, the desserts were rated as having a more intense colour on the white than on the black plate (a 7% difference was observed). Meanwhile, the </span><em data-dcnode-id="6246"><span data-dcnode-id="6247" instrument_node="">fraicheur</span></em><span data-dcnode-id="6245" instrument_node=""> was liked significantly more on the black than on the white plate (a 12% change in ratings was observed). Importantly, however, these results could not easily be accounted for solely in terms of contrast effects, since it was the dessert that had a somewhat darker brownish hue that participants rated more highly when served from the black plate. The other two desserts, which were red and creamy in colour, were rated as looking more delicious when served from the white plate instead. Once again, these results demonstrate a significant impact of plate colour. That said, though, it is a little harder to extract a simple message for those who might be wanting to apply the results in a commercial setting.</span></p><p data-dcnode-id="6240" id="p0160"><a class="workspace-trigger" data-dcnode-id="6242" href="#b0430" name="bb0430"><span data-dcnode-id="6243" instrument_node="">Stewart and Goss (2013)</span></a><span data-dcnode-id="6241" instrument_node=""> conducted a between-participants study in which their Canadian participants (based in Newfoundland) rated a sample of cheesecake in terms of its sweetness, flavour intensity, quality, and liking. The dessert was served on a white or black plate (some of the participants were served on a round plate, others on a more angular squared plate instead). Sweetness and flavour intensity were both rated significantly higher by those who tasted the dessert from the round white plate than from any of the other three plates (i.e., there were significant main effects of plate colour on both response measures). Meanwhile, higher quality and liking ratings were given for the desserts tasted from the round white and squared black plates than from the squared white or round black plates. No main effects of plate colour were observed in either case. It is, though, worth bearing in mind here that the sample size was quite small in each of the conditions in this between-participants study, and so these results should perhaps be treated with some caution.</span></p><p data-dcnode-id="6232" id="p0165"><a class="workspace-trigger" data-dcnode-id="6238" href="#b0250" name="bb0250"><span data-dcnode-id="6239" instrument_node="">Michel, Velasco, and Spence (2015)</span></a><span data-dcnode-id="6233"><span data-dcnode-id="6237" instrument_node=""> conducted a study in a hotel restaurant in Scotland as part of an experimental three-course lunch in which 121 international diners completed questionnaires concerning their meal. For dessert, a </span><a class="topic-link" data-dcnode-id="6235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/molasses" title="Learn more about treacle from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6236" instrument_node="">treacle</span></a><span data-dcnode-id="6234" instrument_node=""> tart with clotted cream ice-cream was served to half of the diners on a squared black plate versus on a round white plate for the diners sitting at the other tables. The conference delegates were asked about their liking of the dessert, and about its sweetness and flavour intensity. Those sitting at a table with squared black plates liked their dessert significantly more than those given a round white plate instead. No significant differences were detected on the other measures. Once again, the main point to emerge from this study was that changing the colour of the plate (black vs. white) influenced people’s ratings.</span></span></p><p data-dcnode-id="6227" id="p0170"><span data-dcnode-id="6231" instrument_node="">In what is perhaps the only study of the impact of background colour on the perception of piquancy to have been published to date, </span><a class="workspace-trigger" data-dcnode-id="6229" href="#b0450" name="bb0450"><span data-dcnode-id="6230" instrument_node="">Tu, Yang, and Ma (2016)</span></a><span data-dcnode-id="6228" instrument_node=""> conducted three experiments in which Chinese participants evaluated the expected/tasted piquancy of a sample of aromatic spicy bean curd. When presented on the red or yellow plate, the participants expected the bean curd to be significantly spicier (by around 10%) than when presented on a green or white plate instead (Experiment 1). The results of a second experiment revealed that the background plate colour exerted a significant impact over perceived spiciness as well, with participants rating the bean curd as tasting almost 20% spicier when tasted from a red plate than from a white plate. Finally, in a third experiment, Yu and colleagues assessed both expected and then tasted spiciness within the same group of participants with the spicy bean curd sampled from a red or white plate. (The testing sessions were separated by a week in this case). Analysis of the results revealed that spiciness expectations (for the bean curd) set by the background colour of the plate mediated the impact on actual spiciness ratings. Interestingly, though, people’s visual expectations did not appear to tell the whole story.</span></p><p data-dcnode-id="6216" id="p0175"><span data-dcnode-id="6226" instrument_node="">It is interesting to note that one aspect of background colour that may be peculiar to plateware is the fact that the majority of the plates sold are round and white. Hence, as such, this definitely becomes the norm as far as background colour is concerned. Hence, as soon as food is served off plateware of a different colour (or for that matter shape) the diner may perceive that a statement is being made. As to why white should have become the dominant plate colour, one can only imagine that it serves to make a wider range of foods look appealing than any other colour. Indeed, this intuition is captured by the following quote from 20 years ago: “</span><em data-dcnode-id="6224"><span data-dcnode-id="6225" instrument_node="">[Each dish was] photographed on pure white crockery</span></em><span data-dcnode-id="6223" instrument_node="">… </span><em data-dcnode-id="6221"><span data-dcnode-id="6222" instrument_node="">In this way, we have ensured that the food looks both as delicious and natural as possible</span></em><span data-dcnode-id="6220" instrument_node="">” (</span><a class="workspace-trigger" data-dcnode-id="6218" href="#b0020" name="bb0020"><span data-dcnode-id="6219" instrument_node="">Anonymous, 1962</span></a><span data-dcnode-id="6217" instrument_node="">, p. 11). White may also be associated with cleanliness, as in the case of fridges.</span></p><p data-dcnode-id="6211" id="p0180"><span data-dcnode-id="6215" instrument_node="">Colour contrast between the plateware and food may also be important here. Relevant to this suggestion, </span><a class="workspace-trigger" data-dcnode-id="6213" href="#b0465" name="bb0465"><span data-dcnode-id="6214" instrument_node="">van Ittersum and Wansink (2012</span></a><span data-dcnode-id="6212" instrument_node="">; Study 5) tested the effect of colour contrast between the food and the plate on serving sizes in a realistic situation. The North American participants in the low colour contrast condition (white pasta sauce on a white plate or red pasta sauce on a red plate) served themselves significantly more pasta than those participants in the high colour contrast condition (e.g., white pasta sauce on a red plate or red pasta sauce on a white plate; though see also http://www.timvanderzee.com/the-wansink-dossier-an-overview/ for concerns concerning a number of the second author’s published findings).</span></p></section><section data-dcnode-id="6161" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6206" id="st050"><span data-dcnode-id="6209" instrument_node="">2.5</span><span data-dcnode-id="6208" instrument_node="">. </span><span data-dcnode-id="6207" instrument_node="">Colour aversion/avoidance motivation</span></h3><p data-dcnode-id="6194" id="p0185"><span data-dcnode-id="6205" instrument_node="">Red plateware has been the subject of several studies focusing specifically on this colour’s role in triggering avoidance motivation (apparently due to its association with danger). In fact, three separate studies published over the last five years have all demonstrated that serving food from a red plate can lead people to consume less than when the same food is served off a plate of another colour, at least for those foods that are perceived to be somewhat unhealthy.</span><a class="workspace-trigger" data-dcnode-id="6202" href="#fn12" name="bfn12"><sup data-dcnode-id="6203"><span data-dcnode-id="6204" instrument_node="">12</span></sup></a><span data-dcnode-id="6201" instrument_node=""> For instance, the Swiss participants in one study reported that people ate nearly twice as many pretzels when placed on a white (or blue) as opposed to a red plate, this despite the fact that a control study showed that plate colour exerted no influence over people’s ratings of the tastiness of the food (</span><a class="workspace-trigger" data-dcnode-id="6199" href="#b0115" name="bb0115"><span data-dcnode-id="6200" instrument_node="">Genschow, Reutner, &amp; Wänke, 2012</span></a><span data-dcnode-id="6198" instrument_node="">; Experiment 2). Similarly, the 41 males tested in the entrance hall of a university consumed less of a soft drink (white tea, lemon, or green tea – all slightly yellowish in appearance) from a clear plastic cup with a red label (M = 34 ml) as compared to a cup with a blue label (M = 57 ml), once again without any concomitant changes in liking (</span><a class="workspace-trigger" data-dcnode-id="6196" href="#b0115" name="bb0115"><span data-dcnode-id="6197" instrument_node="">Genschow et al., 2012</span></a><span data-dcnode-id="6195" instrument_node="">, Experiment 1).</span></p><p data-dcnode-id="6186" id="p0190"><span data-dcnode-id="6193" instrument_node="">Meanwhile, the following year, Italian researchers (</span><a class="workspace-trigger" data-dcnode-id="6191" href="#b0045" name="bb0045"><span data-dcnode-id="6192" instrument_node="">Bruno, Martani, Corsini, &amp; Oleari, 2013</span></a><span data-dcnode-id="6190" instrument_node="">) extended these results to popcorn, chocolate, and skin cream. Across all three experiments, consumption was reduced without any significant impact on how appealing the products were rated as looking. Bruno et al. argued that the avoidance motivation seemingly elicited by red plateware was not simply attributable to any difference in achromatic (luminance) contrast. Instead, the suggestion was that red associated with danger and ‘stop’. However, it is worth noting that all of the foods investigated in the two studies mentioned so far in this section (pretzels, popcorn, chocolate, and soft drinks) would not generally count as being especially healthy.</span><a class="workspace-trigger" data-dcnode-id="6187" href="#fn13" name="bfn13"><sup data-dcnode-id="6188"><span data-dcnode-id="6189" instrument_node="">13</span></sup></a></p><p data-dcnode-id="6164" id="p0195"><span data-dcnode-id="6185" instrument_node="">Reutner, Genschow, and Wänke (2015) conducted a study in Switzerland showing that people consumed less dark chocolate from a red plate than from a white plate. Intriguingly, however, no such asymmetry was observed in the case of dark grapes. Specifically, in this between-participants study, the participants had to fill-out a questionnaire while being provided with either a red or white ‘snacking plate’ containing either 10 pieces of dark chocolate or 10 dark grapes. Yet, on average, the participants consumed a little over twice as much chocolate from the white plate than from the red one. Once again, no effect of plate colour was reported on tastiness ratings, thus suggesting that </span><em data-dcnode-id="6183"><span data-dcnode-id="6184" instrument_node="">“colour directly cues behaviour without affecting evaluations.”</span></em><span data-dcnode-id="6182" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="6180" href="#b0305" name="bb0305"><span data-dcnode-id="6181" instrument_node="">Reutner et al., 2015, p. 175</span></a><span data-dcnode-id="6179" instrument_node="">). One explanation for the different impact of background colour on the two foods was that grapes are perceived as healthier than chocolate. In order to address the healthiness issue directly, </span><a class="workspace-trigger" data-dcnode-id="6177" href="#b0305" name="bb0305"><span data-dcnode-id="6178" instrument_node="">Reutner et al. (2015</span></a><span data-dcnode-id="6176" instrument_node="">; Study 2) went on to conduct a second study in front of a Swiss supermarket. Members of the general public were approached and asked to pick a piece of bread from a plate containing 16 small pieces of bread, each having either a red or green flag planted in them (mounted at the end of a canapé-style cocktail stick– the idea behind the flags was, in some sense, to try and draw people’s attention to the ‘background’ colour).</span><a class="workspace-trigger" data-dcnode-id="6173" href="#fn14" name="bfn14"><sup data-dcnode-id="6174"><span data-dcnode-id="6175" instrument_node="">14</span></sup></a><span data-dcnode-id="6172" instrument_node=""> The results revealed that when the plate was filled with white bread (considered unhealthy in Switzerland), fewer people chose a red- than a green-flagged piece (28% vs. 72%, respectively).</span><a class="workspace-trigger" data-dcnode-id="6169" href="#fn15" name="bfn15"><sup data-dcnode-id="6170"><span data-dcnode-id="6171" instrument_node="">15</span></sup></a><span data-dcnode-id="6168" instrument_node=""> Crucially, this colour bias in food choice was reduced significantly when the plate was filled with pieces of half-white bread, and eliminated when the plate was filled with brown bread instead. Reutner et al. took these results to suggest that background red acts as an avoidance motivation (specifically, a consumption-stopping) cue only when people are presented with foods that they perceive to be unhealthy.</span><a class="workspace-trigger" data-dcnode-id="6165" href="#fn16" name="bfn16"><sup data-dcnode-id="6166"><span data-dcnode-id="6167" instrument_node="">16</span></sup></a></p><p data-dcnode-id="6162" id="p0200"><span data-dcnode-id="6163" instrument_node="">Taken together, then, the literature in this area would appear to suggest that the avoidance motivation properties of background colour are specific to the colour red, and specific to those foods that are deemed unhealthy. What is more, the avoidance motivation properties of red only occur under those conditions in which the colour has no specific meaning attached (e.g., as in the case of red for Coca-Cola).</span></p></section><section data-dcnode-id="6146" id="s0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6157" id="st055"><span data-dcnode-id="6160" instrument_node="">2.6</span><span data-dcnode-id="6159" instrument_node="">. </span><span data-dcnode-id="6158" instrument_node="">Cutlery &amp; coffee pots</span></h3><p data-dcnode-id="6152" id="p0205"><span data-dcnode-id="6156" instrument_node="">Dichter (1964) reported a study in which the impact of the colour of the pot from which coffee was served on people’s perception of the taste/aroma was assessed. Two hundred North Americans were given four cups of coffee to compare and evaluate (see </span><a class="workspace-trigger" data-dcnode-id="6154" href="#b0100" name="bb0100"><span data-dcnode-id="6155" instrument_node="">Favre &amp; November, 1979, p. 64</span></a><span data-dcnode-id="6153" instrument_node="">, for a summary of the results). Each cup of coffee was served from a pot having a different colour (brown, red, blue, and yellow). The results apparently revealed that 73% of those tested reported that the coffee served from the brown container was ‘too strong’; 84% of the female participants suggested the coffee served from the red pot to be rich and full-bodied; The aroma of the coffee from the blue jar was rated as having a milder aroma; And the coffee in the yellower container seemed to come from a weaker blend. The coffee was the same in all the pots. Once again, therefore, these results add to the growing literature illustrating the widespread impact of colour on taste/flavour perception.</span></p><p data-dcnode-id="6147" id="p0210"><span data-dcnode-id="6151" instrument_node="">Harrar and Spence (2013) reported a laboratory-based within-participants study in which the UK-based participants tasted one of two yoghurts (a regular white Greek yoghurt and the same yoghurt coloured a pinkish-red) from one of five coloured spoons (black, blue, green, red, and white). The participants rated the pink yoghurt sampled from the blue spoon as tasting significantly saltier than the white yoghurt served from the same spoon (cf. </span><a class="workspace-trigger" data-dcnode-id="6149" href="#b0145" name="bb0145"><span data-dcnode-id="6150" instrument_node="">Harrar et al., 2011</span></a><span data-dcnode-id="6148" instrument_node="">, for similar results showing that blue plateware is often associated with saltiness).</span></p></section></section><section data-dcnode-id="6113" id="s0045"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6141" id="st060"><span data-dcnode-id="6144" instrument_node="">3</span><span data-dcnode-id="6143" instrument_node="">. </span><span data-dcnode-id="6142" instrument_node="">Background room colour</span></h2><p data-dcnode-id="6133" id="p0215"><span data-dcnode-id="6140" instrument_node="">Relevant to the discussion here, a few studies have assessed the impact of the background colour of the environment against/in which a food is seen (e.g., </span><a class="workspace-trigger" data-dcnode-id="6138" href="#b0245" name="bb0245"><span data-dcnode-id="6139" instrument_node="">Meléndez-Martínez et al., 2005</span></a><span data-dcnode-id="6137" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6135" href="#b0350" name="bb0350"><span data-dcnode-id="6136" instrument_node="">Schifferstein et al., 2016</span></a><span data-dcnode-id="6134" instrument_node="">). So, for instance, Meléndez-Martínez et al. assessed the ability of trained panellists to arrange orange juice samples in terms of their concentration (various amounts of water had been added to generate samples having one of 8 concentrations varying from 10 to 100% juice). The 12 panellists who took part in this study performed this task against either a white or a black background. The panellists did a significantly better job of arranging the samples correctly when viewing them against a black background in the black-walled cabin.</span></p><p data-dcnode-id="6122" id="p0220"><span data-dcnode-id="6132" instrument_node="">Meanwhile, in another study, </span><a class="workspace-trigger" data-dcnode-id="6130" href="#b0350" name="bb0350"><span data-dcnode-id="6131" instrument_node="">Schifferstein et al. (2016)</span></a><span data-dcnode-id="6129" instrument_node=""> had 44 participants (mostly North American students) rate the attractiveness of five differently-coloured vegetables (tomato, carrot, yellow bell pepper, cucumber, and eggplant) when viewed against one of four different backgrounds (either light or dark orange or light or dark blue). While the colour of the background did not affect the perceived colour of the vegetables themselves (as shown by the results of a colour matching task) it did affect the perceived attractiveness of the vegetables. However, once again, the optimal background, in terms of making the vegetables look most attractive depended on the vegetable under consideration. So, as the authors put it: </span><em data-dcnode-id="6127"><span data-dcnode-id="6128" instrument_node="">“we did find differences in the perceived attractiveness of the various vegetables. Each vegetable seems to have its own optimal background colour(s), which typically involves a contrast in hue, blackness, and/or chromaticness. The optimal colour is light orange for the cucumber (strong hue and blackness contrast), light blue for the eggplant (strong blackness contrast), light or dark blue for the yellow bell pepper (strong hue and chromaticness contrast), light or dark orange for the carrot (strong chromaticness contrast for both backgrounds and a strong blackness contrast for the dark orange background), and dark blue or dark orange for the tomato (strong hue, blackness and chromaticness contrasts).”</span></em><span data-dcnode-id="6126" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="6124" href="#b0350" name="bb0350"><span data-dcnode-id="6125" instrument_node="">Schifferstein et al., 2016, p. 178</span></a><span data-dcnode-id="6123" instrument_node="">).</span></p><p data-dcnode-id="6114" id="p0225"><span data-dcnode-id="6121" instrument_node="">Elsewhere, a number of researchers have investigated the impact of changes in ambient colour of environment in which people taste wine (</span><a class="workspace-trigger" data-dcnode-id="6119" href="#b0255" name="bb0255"><span data-dcnode-id="6120" instrument_node="">Oberfeld et al., 2009</span></a><span data-dcnode-id="6118" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6116" href="#b0420" name="bb0420"><span data-dcnode-id="6117" instrument_node="">Spence et al., 2014</span></a><span data-dcnode-id="6115" instrument_node="">). So, for instance, Spence et al. investigated the impact of regular white lighting versus red or green lighting on people’s rating of a glass of red wine tasted in a black tasting glass (so that the changes in the ambient lighting did not impact the appearance properties of the wine itself. The results revealed that people’s ratings of the fruitiness/freshness of the wine were changed by approximately 15% simply as a function of switching between red and green lighting. Note that responses were collected from more than 3000 people in this UK study. Intriguingly, many people reported that the taste/flavour of the wine changed as soon as the colour of the lighting changed, thus arguing against the colour affecting the participants’ emotions and that, in turn, affecting their ratings of the wine.</span></p></section><section data-dcnode-id="6051" id="s0050"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6109" id="st065"><span data-dcnode-id="6112" instrument_node="">4</span><span data-dcnode-id="6111" instrument_node="">. </span><span data-dcnode-id="6110" instrument_node="">Assessing the impact of background colour in special populations</span></h2><p data-dcnode-id="6092" id="p0230"><span data-dcnode-id="6108" instrument_node="">Although a detailed review of this topic lies beyond the scope of the present review, it is worth noting, in passing, that enhancing the contrast between the food and the plateware has a beneficial effect on the consumption behaviour of the elderly and/or those who find themselves in hospital (e.g., Alzheimer’s patients). It has been noted that such individuals often do not end up eating enough (see </span><a class="workspace-trigger" data-dcnode-id="6106" href="#b0010" name="bb0010"><span data-dcnode-id="6107" instrument_node="">Adams, 2013</span></a><span data-dcnode-id="6105" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6103" href="#b0015" name="bb0015"><span data-dcnode-id="6104" instrument_node="">AgeUK report, 2010</span></a><span data-dcnode-id="6102" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6100" href="#b0395" name="bb0395"><span data-dcnode-id="6101" instrument_node="">Spence, 2017b</span></a><span data-dcnode-id="6099" instrument_node="">, for a review). In one study conducted at a long-term care facility in Boston, USA, for example, enhancing the visual contrast of the plateware led to a substantial increase in food and liquid intake in those individuals with severe Alzheimer’s disease (</span><a class="workspace-trigger" data-dcnode-id="6097" href="#b0085" name="bb0085"><span data-dcnode-id="6098" instrument_node="">Dunne, Neargarder, Cipolloni, &amp; Cronin-Golomb, 2004</span></a><span data-dcnode-id="6096" instrument_node="">) – such patients are known to have deficient contrast sensitivity. Specifically, switching to high contrast red plates (from white), and introducing red cutlery, led to a 25% increase in food consumption (amongst 9 male patients, over the 10 days tested). Even more impressively, switching from white to red glassware resulted in the patients increasing their liquid intake by as much as 84%. Interestingly, the use of pale blue or red plates didn’t change consumption relative to that seen with white tableware in the baseline condition. Given that follow-up research revealed that high contrast blue plates were just as effective in increasing consumption as high contrast red plates, it would appear that it is high contrast that is key to enhancing consumption amongst this particular group of patients (see </span><a class="workspace-trigger" data-dcnode-id="6094" href="#b0085" name="bb0085"><span data-dcnode-id="6095" instrument_node="">Dunne et al., 2004, p. 538</span></a><span data-dcnode-id="6093" instrument_node="">, on this point).</span></p><p data-dcnode-id="6065" id="p0235"><span data-dcnode-id="6091" instrument_node="">Elsewhere, in another Swedish study, older individuals ate more white fish when it was served from a blue (rather than white) plate (see </span><a class="workspace-trigger" data-dcnode-id="6089" href="#b0175" name="bb0175"><span data-dcnode-id="6090" instrument_node="">Hultén, Broweus, &amp; van Dijk, 2009, p. 119</span></a><span data-dcnode-id="6088" instrument_node="">; see also </span><a class="workspace-trigger" data-dcnode-id="6086" href="#b0190" name="bb0190"><span data-dcnode-id="6087" instrument_node="">Hutchings, 1999</span></a><span data-dcnode-id="6085" instrument_node="">). Intriguingly, the above-mentioned results, suggesting that eating from blue plateware can be used to enhance consumption would seem to contradict earlier anecdotal reports concerning the ‘blue plate special’ in the USA. Specifically, according to </span><a class="workspace-trigger" data-dcnode-id="6083" href="#b0060" name="bb0060"><span data-dcnode-id="6084" instrument_node="">Crumpacker (2006, p. 143)</span></a><span data-dcnode-id="6082" instrument_node="">: </span><em data-dcnode-id="6080"><span data-dcnode-id="6081" instrument_node="">‘the term blue plate special became popular during the Great Depression because restaurant owners found that diners were satisfied with smaller portions of food if it was served on blue plates.’</span></em><span data-dcnode-id="6079" instrument_node=""> However, as has hopefully become clear from this review of the literature, background colour can be used both to reduce and to increase consumption (e.g., </span><a class="workspace-trigger" data-dcnode-id="6077" href="#b0045" name="bb0045"><span data-dcnode-id="6078" instrument_node="">Bruno et al., 2013</span></a><span data-dcnode-id="6076" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6074" href="#b0085" name="bb0085"><span data-dcnode-id="6075" instrument_node="">Dunne et al., 2004</span></a><span data-dcnode-id="6073" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6071" href="#b0115" name="bb0115"><span data-dcnode-id="6072" instrument_node="">Genschow et al., 2012</span></a><span data-dcnode-id="6070" instrument_node="">). Quite what effect will be observed in any given situation would appear to depend both on the properties of the food being eaten (e.g., “Is it healthy or not?”; “What colour is it?”) and who exactly is doing the eating (e.g., “Is it an older individual who may have problems discriminating the pale food from the background of a traditional white plate?”).</span><a class="workspace-trigger" data-dcnode-id="6067" href="#fn17" name="bfn17"><sup data-dcnode-id="6068"><span data-dcnode-id="6069" instrument_node="">17</span></sup></a><span data-dcnode-id="6066" instrument_node=""> The contrast between the food and the plateware seemingly also plays an important role (see below).</span></p><p data-dcnode-id="6052" id="p0240"><span data-dcnode-id="6064" instrument_node="">Before closing this section, it is perhaps also worth considering the unusual perceptual experience of those individuals (primarily males) who happen to have been born colour blind (see </span><a class="workspace-trigger" data-dcnode-id="6062" href="#b0040" name="bb0040"><span data-dcnode-id="6063" instrument_node="">Broackes, 2010</span></a><span data-dcnode-id="6057"><span data-dcnode-id="6061" instrument_node="">; http://www.colourblindawareness.org/colour-blindness/living-with-colour-vision-deficiency/food/). According to estimates, roughly 6% of the population suffer from some form of </span><a class="topic-link" data-dcnode-id="6059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/color-blindness" title="Learn more about colour blindness from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6060" instrument_node="">colour blindness</span></a><span data-dcnode-id="6058" instrument_node="">. That said, there is surprisingly little published research on the question of how this visual deficit might affect the perception of food, and/or the modulatory role of background colour, in those who are affected.</span></span><a class="workspace-trigger" data-dcnode-id="6054" href="#fn18" name="bfn18"><sup data-dcnode-id="6055"><span data-dcnode-id="6056" instrument_node="">18</span></sup></a><span data-dcnode-id="6053" instrument_node=""> In fact, colour blindness is rarely taken into account in studies of food colouring’s impact on peoples taste/flavour expectations/perception either.</span></p></section><section data-dcnode-id="5879" id="s0055"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6047" id="st070"><span data-dcnode-id="6050" instrument_node="">5</span><span data-dcnode-id="6049" instrument_node="">. </span><span data-dcnode-id="6048" instrument_node="">Conclusions</span></h2><p data-dcnode-id="6045" id="p0245"><span data-dcnode-id="6046" instrument_node="">As this review of the literature has hopefully made clear, background colour exerts more of an influence over our taste/flavour perception than any of us might expect (at least initially). Thus, while people obviously cannot literally ‘taste the plate’, the colour of the plate, bowl, glass, cup, cutlery, pot, and package in/against which a product is seen can certainly influence how appealing a food looks, what it tastes like, and even how much we end-up consuming (and/or serving ourselves). And although explanations for the fact that the background colour (e.g., of the plate, cup, pot, etc.) impacts taste/flavour perception are not yet fully worked out, the results of a growing number of empirical studies now support the view that product-extrinsic colour really does matter, no matter where that colour is embodied (e.g., be it the colour of the plateware, the cutlery, and/or of the environment in which a food happened to be tasted).</span></p><p data-dcnode-id="6025" id="p0250"><span data-dcnode-id="6044" instrument_node="">A number of generalizations are supported by the research reviewed here. For instance, desserts taste sweeter when served off of a white plate while black plates may be more appropriate for savoury dishes (e.g., </span><a class="workspace-trigger" data-dcnode-id="6042" href="#b0260" name="bb0260"><span data-dcnode-id="6043" instrument_node="">Piqueras-Fiszman et al., 2012</span></a><span data-dcnode-id="6041" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6039" href="#b0265" name="bb0265"><span data-dcnode-id="6040" instrument_node="">Piqueras-Fiszman et al., 2013</span></a><span data-dcnode-id="6038" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6036" href="#b0430" name="bb0430"><span data-dcnode-id="6037" instrument_node="">Stewart and Goss, 2013</span></a><span data-dcnode-id="6035" instrument_node="">). Meanwhile, red plateware reduces people’s consumption of those foods that are considered to be less healthy (</span><a class="workspace-trigger" data-dcnode-id="6033" href="#b0045" name="bb0045"><span data-dcnode-id="6034" instrument_node="">Bruno et al., 2013</span></a><span data-dcnode-id="6032" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6030" href="#b0115" name="bb0115"><span data-dcnode-id="6031" instrument_node="">Genschow et al., 2012</span></a><span data-dcnode-id="6029" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6027" href="#b0305" name="bb0305"><span data-dcnode-id="6028" instrument_node="">Reutner et al., 2015</span></a><span data-dcnode-id="6026" instrument_node="">). That said, while a number of studies now concur in demonstrating that the colour of the plate (cutlery, glassware, etc.) can affect people’s ratings of the taste and quality, not to mention their consumption, of the food that is placed upon it, the direction of that change, and whether or not it is preferred, appears to depend both on the nature of the food being served as well as on the characteristics of the diner. So, for instance, a dessert that is already ‘too sweet’ may be preferred when served from a black plate, whereas a dessert that, in isolation, is judged as not quite sweet enough, will likely be preferred from a white plate instead.</span></p><p data-dcnode-id="6023" id="p0255"><span data-dcnode-id="6024" instrument_node="">Given the range of findings concerning background colour that have been reported to date, it would seem highly unlikely that any single account could explain all of the published data. In fact, a number of different suggested explanations have been put forward by the researchers working in the field over the years; Several of these suggestions have already been mentioned in the preceding sections. It is important to note here, though, that these various accounts should not be treated as mutually exclusive. In fact, each one of them may help to explain some proportion of the empirical data.</span></p><p data-dcnode-id="5990" id="p0260"><span data-dcnode-id="6022" instrument_node="">To begin with, the colours present on product packaging may exert their effect due to their association with a specific brand or product attribute (think only of the use of packaging colour to denote whether a milk is low-fat or not). In these cases, it is what is signified by the colour, rather than the colour itself, that may be doing the work. In those cases where background colour has no such specific meaning (e.g., in the case of plateware colour), people’s flavour expectations, their flavour perception, and even their food behaviours may be affected because of the associations that exist between particular colours and specific product attributes (e.g., blue with salty as well as with cold/refreshing; pinkish-red with sweetness; red with spicy and hot, but also with danger, etc.; </span><a class="workspace-trigger" data-dcnode-id="6020" href="#b0155" name="bb0155"><span data-dcnode-id="6021" instrument_node="">Ho et al., 2014</span></a><span data-dcnode-id="6019" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6017" href="#b0435" name="bb0435"><span data-dcnode-id="6018" instrument_node="">Suzuki et al., 2017</span></a><span data-dcnode-id="6016" instrument_node="">; see also </span><a class="workspace-trigger" data-dcnode-id="6014" href="#b0495" name="bb0495"><span data-dcnode-id="6015" instrument_node="">Zellner and Durlach, 2002</span></a><span data-dcnode-id="6013" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6011" href="#b0500" name="bb0500"><span data-dcnode-id="6012" instrument_node="">Zellner and Durlach, 2003</span></a><span data-dcnode-id="6010" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="6007" href="#fn19" name="bfn19"><sup data-dcnode-id="6008"><span data-dcnode-id="6009" instrument_node="">19</span></sup></a><span data-dcnode-id="6006" instrument_node=""> These associations (or crossmodal correspondences) are primed by the background colour and end-up anchoring, or biasing, the ratings that an individual subsequently makes. Another possible explanation for the impact of background colour is that it may influence our emotions and, by so doing, indirectly affect the taste of the food (see </span><a class="workspace-trigger" data-dcnode-id="6004" href="#b0195" name="bb0195"><span data-dcnode-id="6005" instrument_node="">Jacquier and Giboreau, 2012a</span></a><span data-dcnode-id="6003" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6001" href="#b0420" name="bb0420"><span data-dcnode-id="6002" instrument_node="">Spence et al., 2014</span></a><span data-dcnode-id="6000" instrument_node="">). As </span><a class="workspace-trigger" data-dcnode-id="5998" href="#b0255" name="bb0255"><span data-dcnode-id="5999" instrument_node="">Oberfeld et al. (2009, p. 807)</span></a><span data-dcnode-id="5997" instrument_node=""> put it: </span><em data-dcnode-id="5995"><span data-dcnode-id="5996" instrument_node="">‘if a colour induces a positive mood or emotion [</span></em><span data-dcnode-id="5994" instrument_node="">…</span><em data-dcnode-id="5992"><span data-dcnode-id="5993" instrument_node="">] then the same wine tasted in this positive mood is liked better than when in a negative mood’.</span></em><span data-dcnode-id="5991" instrument_node=""> The emotional mediation account has typically been put forward by those attempting to explain the effect of ambient colour (e.g., of an entire environment). However, there would seem no good reason why such an explanation should not also have some value when considering the effect of some more circumscribed patch of colour (e.g., the background colour of a plate or bowl).</span></p><p data-dcnode-id="5948" id="p0265"><span data-dcnode-id="5989" instrument_node="">Some researchers have argued for the existence of direct perceptual effects of background colour on simultaneous contrast (e.g., </span><a class="workspace-trigger" data-dcnode-id="5987" href="#b0150" name="bb0150"><span data-dcnode-id="5988" instrument_node="">Harrar and Spence, 2013</span></a><span data-dcnode-id="5986" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5984" href="#b0460" name="bb0460"><span data-dcnode-id="5985" instrument_node="">Van Doorn et al., 2014</span></a><span data-dcnode-id="5983" instrument_node="">) and perceptual fluency (e.g., </span><a class="workspace-trigger" data-dcnode-id="5981" href="#b0295" name="bb0295"><span data-dcnode-id="5982" instrument_node="">Reber and Schwarz, 2001</span></a><span data-dcnode-id="5980" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5978" href="#b0300" name="bb0300"><span data-dcnode-id="5979" instrument_node="">Reber et al., 2004</span></a><span data-dcnode-id="5977" instrument_node="">). Simultaneous contrast (be it colour or brightness contrast) between any background colour (e.g., from the receptacle) and any food and drink items can make the latter appear more vivid, and hence possibly more appealing (e.g., </span><a class="workspace-trigger" data-dcnode-id="5975" href="#b0090" name="bb0090"><span data-dcnode-id="5976" instrument_node="">Ekroll et al., 2004</span></a><span data-dcnode-id="5974" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5972" href="#b0130" name="bb0130"><span data-dcnode-id="5973" instrument_node="">Grether, 1942</span></a><span data-dcnode-id="5971" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5969" href="#b0190" name="bb0190"><span data-dcnode-id="5970" instrument_node="">Hutchings, 1999</span></a><span data-dcnode-id="5968" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5966" href="#b0205" name="bb0205"><span data-dcnode-id="5967" instrument_node="">Jameson and Hurvich, 1959</span></a><span data-dcnode-id="5965" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5963" href="#b0220" name="bb0220"><span data-dcnode-id="5964" instrument_node="">Leibowitz et al., 1955</span></a><span data-dcnode-id="5962" instrument_node="">; though see also </span><a class="workspace-trigger" data-dcnode-id="5960" href="#b0045" name="bb0045"><span data-dcnode-id="5961" instrument_node="">Bruno et al., 2013</span></a><span data-dcnode-id="5959" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="5956" href="#fn20" name="bfn20"><sup data-dcnode-id="5957"><span data-dcnode-id="5958" instrument_node="">20</span></sup></a><span data-dcnode-id="5955" instrument_node=""> Colour contrast results in a food that is situated on another background colour taking on some of the hue of the complementary colour to that of the background (e.g., the plate). For example, a grey circle on a green plate with likely seem a little pinker than it otherwise might. Meanwhile, according to Reber and his colleagues, increasing the contrast between the background and foreground colours (e.g., figure-ground contrast) may increase people’s liking for a briefly-presented stimulus (e.g., a food or beverage item) due to enhanced perceptual fluency in terms of the processing of the stimulus (see also </span><a class="workspace-trigger" data-dcnode-id="5953" href="#b0115" name="bb0115"><span data-dcnode-id="5954" instrument_node="">Genschow et al., 2012</span></a><span data-dcnode-id="5952" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5950" href="#b0120" name="bb0120"><span data-dcnode-id="5951" instrument_node="">Gerard, 1958</span></a><span data-dcnode-id="5949" instrument_node="">).</span></p><p data-dcnode-id="5925" id="p0270"><span data-dcnode-id="5947" instrument_node="">That being said, one of the limitations with much of the research assessing the impact of background colour that has been published to date is a lack of precise physical measurement (though see </span><a class="workspace-trigger" data-dcnode-id="5945" href="#b0045" name="bb0045"><span data-dcnode-id="5946" instrument_node="">Bruno et al., 2013</span></a><span data-dcnode-id="5944" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5942" href="#b0115" name="bb0115"><span data-dcnode-id="5943" instrument_node="">Genschow et al., 2012</span></a><span data-dcnode-id="5941" instrument_node="">, for exceptions); That is, most of the researchers working in this area tend to refer only to a rough colour category (or hue), such as light red, rather than providing an objective measure of the background, never mind the foreground, colour (e.g., by measuring the hue, saturation, and brightness). Future research will likely be aided by providing more objective measures of the stimulus characteristics. Another important direction for future research will be to assess the nature of any interactions taking place between the shape and colour of the background colour stimulus (e.g., the plate), as this has also been shown to influence perception (e.g., </span><a class="workspace-trigger" data-dcnode-id="5939" href="#b0025" name="bb0025"><span data-dcnode-id="5940" instrument_node="">Ares and Deliza, 2010</span></a><span data-dcnode-id="5938" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5936" href="#b0430" name="bb0430"><span data-dcnode-id="5937" instrument_node="">Stewart and Goss, 2013</span></a><span data-dcnode-id="5935" instrument_node="">). Stewart and Goss, for example, found that the impact of the achromatic colour of the plate (black or white) or people’s ratings of the taste of a dessert (a slice of cheesecake) was modulated by the shape of the plate (round vs. angular; though see also </span><a class="workspace-trigger" data-dcnode-id="5933" href="#b0260" name="bb0260"><span data-dcnode-id="5934" instrument_node="">Piqueras-Fiszman et al., 2012</span></a><span data-dcnode-id="5932" instrument_node="">). Finally here, it is worth noting that the impact of the background colour (e.g., of the plate or bowl) may itself be modulated by the broader colour of the background (e.g., think here only of a red plate been seen against a red versus white tablecloth; see </span><a class="workspace-trigger" data-dcnode-id="5930" href="#b0465" name="bb0465"><span data-dcnode-id="5931" instrument_node="">van Ittersum and Wansink, 2012</span></a><span data-dcnode-id="5929" instrument_node="">, Study 2, for one study along these lines; though again see http://www.timvanderzee.com/the-wansink-dossier-an-overview/; cf. </span><a class="workspace-trigger" data-dcnode-id="5927" href="#b0200" name="bb0200"><span data-dcnode-id="5928" instrument_node="">Jacquier &amp; Giboreau, 2012b</span></a><span data-dcnode-id="5926" instrument_node="">).</span></p><p data-dcnode-id="5920" id="p0275"><span data-dcnode-id="5924" instrument_node="">It is worth noting that most of the research that has been published to date has focused on the role of background colour on expected/perceived taste/flavour, and to a lesser extent piquancy. Future research should therefore investigate whether background colour cues might also modulate the expected and/or perceived textural and/or mouthfeel properties of food (see </span><a class="workspace-trigger" data-dcnode-id="5922" href="#b0415" name="bb0415"><span data-dcnode-id="5923" instrument_node="">Spence &amp; Piqueras-Fiszman, 2016</span></a><span data-dcnode-id="5921" instrument_node="">). And, having summarized the behavioural data on the influence of background colour, it would, in the future, be interesting to investigate whether neuroimaging techniques might help identify the various different mechanisms suggested here.</span></p><p data-dcnode-id="5880" id="p0280"><span data-dcnode-id="5919" instrument_node="">Given the impact of background colour on the perception of, and behaviour toward, food and drink, as summarized here, these results should be of great interest to those working in a number of sectors. For instance, marketers and packaging designers should all be able to use such insights in order to optimize the appearance of their food and beverage products as seen on or through (transparent) the packaging (e.g., </span><a class="workspace-trigger" data-dcnode-id="5917" href="#b0355" name="bb0355"><span data-dcnode-id="5918" instrument_node="">Simmonds and Spence, 2017</span></a><span data-dcnode-id="5916" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5914" href="#b0360" name="bb0360"><span data-dcnode-id="5915" instrument_node="">Simmonds et al., 2018</span></a><span data-dcnode-id="5913" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5911" href="#b0455" name="bb0455"><span data-dcnode-id="5912" instrument_node="">Tu and Yang, 2013</span></a><span data-dcnode-id="5910" instrument_node="">). Meanwhile, gaining a better understanding of the impact of background colour on the perception of food and drink should obviously also be very relevant to chefs, restaurateurs, caterers, and the growing army of food bloggers out there. Indeed, assuming that the colour of the plateware does exert as much of an influence over the expected and perceived taste and flavour of food as this review of the literature would appear to suggest,</span><a class="workspace-trigger" data-dcnode-id="5907" href="#fn21" name="bfn21"><sup data-dcnode-id="5908"><span data-dcnode-id="5909" instrument_node="">21</span></sup></a><span data-dcnode-id="5906" instrument_node=""> one has to question the approach of some restaurants (such as, for example, Denis Martin’s namesake restaurant in Vevey, Switzerland) where each diner is given a charger plate of a different colour.</span><a class="workspace-trigger" data-dcnode-id="5903" href="#fn22" name="bfn22"><sup data-dcnode-id="5904"><span data-dcnode-id="5905" instrument_node="">22</span></sup></a><span data-dcnode-id="5902" instrument_node=""> Evidence suggesting that the colour of the plateware affects the amount consumed should be of interest both to those wanting to nudge (e.g., elderly hospital patients) to eat a little more as well as to those wanting ways to help nudge others (e.g., those who are obese, or else dieting) to eat a little less (</span><a class="workspace-trigger" data-dcnode-id="5900" href="#b0045" name="bb0045"><span data-dcnode-id="5901" instrument_node="">Bruno et al., 2013</span></a><span data-dcnode-id="5899" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5897" href="#b0060" name="bb0060"><span data-dcnode-id="5898" instrument_node="">Crumpacker, 2006</span></a><span data-dcnode-id="5896" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5894" href="#b0115" name="bb0115"><span data-dcnode-id="5895" instrument_node="">Genschow et al., 2012</span></a><span data-dcnode-id="5893" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5891" href="#b0305" name="bb0305"><span data-dcnode-id="5892" instrument_node="">Reutner et al., 2015</span></a><span data-dcnode-id="5890" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5888" href="#b0465" name="bb0465"><span data-dcnode-id="5889" instrument_node="">Van Ittersum and Wansink, 2012</span></a><span data-dcnode-id="5887" instrument_node="">). Looking a little further into the future, it is interesting to consider whether technology (such as augmented reality, projection mapping, and possibly even serving food direct from a tablet computer screen), will one day soon let practitioners optimize
