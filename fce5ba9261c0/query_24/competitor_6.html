</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as010&quot;><p id=&quot;sp0010&quot;>Colour affects many aspects of our lives. One area of particular interest in recent years has been the role of colour cues in the perception of food and drink. While the majority of this research has tended to focus on the impact of changing the colour of the product itself, there is now a growing body of scientifically-credible research (building on earlier anecdotal claims) that the colour of the background against which food and drink is served affects both people’s perception of it, and also their serving and consumption behaviour as well. In this review, the empirical evidence on this topic is summarized and the various mechanisms that have been put forward to account for such results outlined. Gaining a better understanding of when, and why, background colour impacts our food preferences, perception, and ultimately our behaviour, is likely to be important to chefs, food bloggers, restaurateurs, packaging designers, and those working on encouraging various special needs populations to consume more (or less).</p></div></div></div>" data-dcnode-id="7549" lang="en" name="citation_abstract"><span data-dcnode-id="7548" instrument_node="">

.38 12 12-5.38 12-12 12zm66-6e1c6.62 0 12 5.38 12 12s-5.38 12-12 12-12-5.38-12-12 5.38-12 12-12zm0 62c-6.56 0-12.44 2.9-16.48 7.48l-28.42-15.28c0.58-1.98 0.9-4.04 0.9-6.2s-0.32-4.22-0.9-6.2l28.42-15.28c4.04 4.58 9.92 7.48 16.48 7.48 12.14 0 22-9.86 22-22s-9.86-22-22-22-22 9.86-22 22c0 1.98 0.28 3.9 0.78 5.72l-28.64 15.38c-4.02-4.34-9.76-7.1-16.14-7.1-12.14 0-22 9.86-22 22s9.86 22 22 22c6.38 0 12.12-2.76 16.14-7.12l28.64 15.38c-0.5 1.84-0.78 3.76-0.78 5.74 0 12.14 9.86 22 22 22s22-9.86 22-22-9.86-22-22-22z" data-dcnode-id="7044"></path></svg><span class="button-text" data-dcnode-id="7041"><span data-dcnode-id="7042" instrument_node="">Share</span></span></button></div></div></div><div class="ExportCitation u-display-inline-block" data-dcnode-id="7029" id="export-citation"><div class="popover export-citation-popover" data-dcnode-id="7030" id="export-citation-popover"><div data-dcnode-id="7031" id="popover-trigger-export-citation-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="7032" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="7035" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="7036" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="7033"><span data-dcnode-id="7034" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="7022" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="7025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.foodqual.2018.02.012" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="7026" instrument_node="">https://doi.org/10.1016/j.foodqual.2018.02.012</span></a><a class="rights-and-content" data-dcnode-id="7023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0950329318301678%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7024" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="7021"></section><section class="ReferencedArticles" data-dcnode-id="7020"></section><div class="PageDivider" data-dcnode-id="7019"></div><div class="Abstracts u-font-serif" data-dcnode-id="6986" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="6993" id="ab005" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7017"><span data-dcnode-id="7018" instrument_node="">Highlights</span></h2><div data-dcnode-id="6994" id="as005"><p data-dcnode-id="6995" id="sp0005"></p><dl class="list" data-dcnode-id="6996"><dt class="list-label" data-dcnode-id="7015"><span data-dcnode-id="7016" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7012"><p data-dcnode-id="7013" id="p0005"><span data-dcnode-id="7014" instrument_node="">Changing the colour of food &amp; drink changes people's expectations and also their taste/flavour perception.</span></p></dd><dt class="list-label" data-dcnode-id="7010"><span data-dcnode-id="7011" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7007"><p data-dcnode-id="7008" id="p0010"><span data-dcnode-id="7009" instrument_node="">Changing the background colour can also have much the same effect on taste/flavour expectations/perception.</span></p></dd><dt class="list-label" data-dcnode-id="7005"><span data-dcnode-id="7006" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7002"><p data-dcnode-id="7003" id="p0015"><span data-dcnode-id="7004" instrument_node="">The literature on packaging, plateware, cutlery, glasses, cups, mugs, pots and ambient colour is reviewed.</span></p></dd><dt class="list-label" data-dcnode-id="7000"><span data-dcnode-id="7001" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6997"><p data-dcnode-id="6998" id="p0020"><span data-dcnode-id="6999" instrument_node="">Several explanations for the impact of background colour are discussed.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="6987" id="ab010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6991"><span data-dcnode-id="6992" instrument_node="">Abstract</span></h2><div data-dcnode-id="6988" id="as010"><p data-dcnode-id="6989" id="sp0010"><span data-dcnode-id="6990" instrument_node="">Colour affects many aspects of our lives. One area of particular interest in recent years has been the role of colour cues in the perception of food and drink. While the majority of this research has tended to focus on the impact of changing the colour of the product itself, there is now a growing body of scientifically-credible research (building on earlier anecdotal claims) that the colour of the background against which food and drink is served affects both people’s perception of it, and also their serving and consumption behaviour as well. In this review, the empirical evidence on this topic is summarized and the various mechanisms that have been put forward to account for such results outlined. Gaining a better understanding of when, and why, background colour impacts our food preferences, perception, and ultimately our behaviour, is likely to be important to chefs, food bloggers, restaurateurs, packaging designers, and those working on encouraging various special needs populations to consume more (or less).</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="6963" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="6975"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="6976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0950329318301617"><svg class="icon icon-navigate-left" data-dcnode-id="6984" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="6985"></path></svg><span class="button-alternative-text" data-dcnode-id="6977"><strong data-dcnode-id="6982"><span data-dcnode-id="6983" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="6980"><span data-dcnode-id="6981" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="6978"><span data-dcnode-id="6979" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="6964"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="6965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0950329318301794"><span class="button-alternative-text" data-dcnode-id="6968"><strong data-dcnode-id="6973"><span data-dcnode-id="6974" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="6971"><span data-dcnode-id="6972" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="6969"><span data-dcnode-id="6970" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="6966" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="6967"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="6938"><div class="keywords-section" data-dcnode-id="6939" id="kg005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6961"><span data-dcnode-id="6962" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="6958" id="k0005"><span data-dcnode-id="6959"><span data-dcnode-id="6960" instrument_node="">Colour</span></span></div><div class="keyword" data-dcnode-id="6955" id="k0010"><span data-dcnode-id="6956"><span data-dcnode-id="6957" instrument_node="">Taste</span></span></div><div class="keyword" data-dcnode-id="6952" id="k0015"><span data-dcnode-id="6953"><span data-dcnode-id="6954" instrument_node="">Flavour</span></span></div><div class="keyword" data-dcnode-id="6949" id="k0020"><span data-dcnode-id="6950"><span data-dcnode-id="6951" instrument_node="">Plateware</span></span></div><div class="keyword" data-dcnode-id="6946" id="k0025"><span data-dcnode-id="6947"><span data-dcnode-id="6948" instrument_node="">Contrast</span></span></div><div class="keyword" data-dcnode-id="6943" id="k0030"><span data-dcnode-id="6944"><span data-dcnode-id="6945" instrument_node="">Sensation transference</span></span></div><div class="keyword" data-dcnode-id="6940" id="k0035"><span data-dcnode-id="6941"><span data-dcnode-id="6942" instrument_node="">Expectations</span></span></div></div></div><span data-dcnode-id="6937" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="5877" id="body"><div data-dcnode-id="5878"><section data-dcnode-id="6896" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6933" id="st020"><span data-dcnode-id="6936" instrument_node="">1</span><span data-dcnode-id="6935" instrument_node="">. </span><span data-dcnode-id="6934" instrument_node="">Introduction</span></h2><p data-dcnode-id="6909" id="p0025"><span data-dcnode-id="6932" instrument_node="">Colour affects our perception of food and drink in various ways. The most obvious of which relates to the colour of the product itself. Simply change the colour (e.g., hue and/or saturation) of a variety of different items and, very often, it will change the perceived taste/flavour too (see </span><a class="workspace-trigger" data-dcnode-id="6930" href="#b0380" name="bb0380"><span data-dcnode-id="6931" instrument_node="">Spence, 2015</span></a><span data-dcnode-id="6929" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6927" href="#b0410" name="bb0410"><span data-dcnode-id="6928" instrument_node="">Spence et al., 2010</span></a><span data-dcnode-id="6926" instrument_node="">, for reviews). Changing the colour of the ambient lighting can even influence people’s perception of a drink when it is presented in a black tasting glass (thus ensuring that the ambient colour doesn’t affect the perceived colour of the food itself; e.g., see </span><a class="workspace-trigger" data-dcnode-id="6924" href="#b0255" name="bb0255"><span data-dcnode-id="6925" instrument_node="">Oberfeld et al., 2009</span></a><span data-dcnode-id="6923" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6921" href="#b0420" name="bb0420"><span data-dcnode-id="6922" instrument_node="">Spence et al., 2014</span></a><span data-dcnode-id="6920" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="6917" href="#fn1" name="bfn1"><sup data-dcnode-id="6918"><span data-dcnode-id="6919" instrument_node="">1</span></sup></a><span data-dcnode-id="6916" instrument_node=""> Changes in the colour (not to mention brightness) of the ambient lighting have even been shown to affect how much people consume (e.g., see </span><a class="workspace-trigger" data-dcnode-id="6914" href="#b0055" name="bb0055"><span data-dcnode-id="6915" instrument_node="">Cho et al., 2015</span></a><span data-dcnode-id="6913" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6911" href="#b0105" name="bb0105"><span data-dcnode-id="6912" instrument_node="">Gal et al., 2007</span></a><span data-dcnode-id="6910" instrument_node="">).</span></p><p data-dcnode-id="6907" id="p0030"><span data-dcnode-id="6908" instrument_node="">Packaging colour is important too, of course, for those products that are consumed direct from the packaging. However, after reviewing this literature, this review will shift to look at the growing body of empirical research showing that the background colour of the plates, bowls, mugs, cups, pots, and cutlery against which food and drink are often seen both prior to, and during, consumption also modulate various aspects of our food perception and behaviour. Such effects have been demonstrated in a variety of different situations and with a wide variety of different products (both those that are familiar and those that are not). I highlight the seemingly contradictory claims that have sometimes been made over the decades, e.g., with some claiming that eating from a blue tray reduces consumption, whereas others have suggested that eating from a blue plate leads to increased consumption (at least in those who may find it difficult to see the food in the first place).</span></p><p data-dcnode-id="6905" id="p0035"><span data-dcnode-id="6906" instrument_node="">The various perceptual/psychological accounts that have been put forward over the years in order to explain such behavioural effects are also reviewed briefly. To start with, though, I summarize the literature on packaging colour. At the outset here, it is important to note that the psychological/perceptual mechanisms underlying colour’s influence in the case of flatware vs. product packaging may well be, at least to some extent, qualitatively different. In particular, packaging colour normally conveys some meaning about the contents in a way that the colour of flatware etc. simply does not – these areas will be addressed separately in the sections that follow.</span></p><p data-dcnode-id="6897" id="p0040"><span data-dcnode-id="6904" instrument_node="">In terms of the experimental designs that have been used to date, while some researchers have focused simply on assessing taste and flavour expectations on viewing a particular image, or object (product package or plate of food, say) – based on the view that our taste/flavour/hedonic expectations very often anchor our actual experiences on tasting (see </span><a class="workspace-trigger" data-dcnode-id="6902" href="#b0285" name="bb0285"><span data-dcnode-id="6903" instrument_node="">Piqueras-Fiszman &amp; Spence, 2015</span></a><span data-dcnode-id="6901" instrument_node="">, for a review) – others have assessed actual ratings on tasting the food or drink product itself. As will be seen below, in terms of the context in which such studies have been conducted, this ranges from well-controlled (but possibly limited ecological validity) laboratory studies, through online tests of consumers’ expectations, experiments conducted at science fairs, all the way to a small but growing number of in-restaurant studies. The latter, while perhaps scoring higher in terms of ecological validity, inevitably lack some of the experimental control that one can more easily achieve in the laboratory setting. Understanding the effects of background colour, not to mention the mechanism(s) that may underlie such effects, is a topic of growing importance for everyone from packaging designers, through to chefs, restaurateurs, and food bloggers. And, as we will see later, these findings may well turn out to be especially important for those providing sustenance for the growing number of elderly people being fed in the setting of the hospital/care home, and whose vision may well be impaired (see </span><a class="workspace-trigger" data-dcnode-id="6899" href="#b0395" name="bb0395"><span data-dcnode-id="6900" instrument_node="">Spence, 2017b</span></a><span data-dcnode-id="6898" instrument_node="">, for a review).</span></p></section><section data-dcnode-id="6145" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6892" id="st025"><span data-dcnode-id="6895" instrument_node="">2</span><span data-dcnode-id="6894" instrument_node="">. </span><span data-dcnode-id="6893" instrument_node="">Background colour’s effect on taste and flavour perception</span></h2><p data-dcnode-id="6890" id="p0045"><span data-dcnode-id="6891" instrument_node="">There have been reports of the influence/effect of background colour floating around in the literature for decades. In recent years, though, these anecdotal claims have increasingly been backed-up by more robust empirical research. In the sections that follow, I take a chronological look through the evidence concerning the impact of background colour, starting with the earliest reports emerging from research on the impact of changing the colour of the packaging. I will start with those products that are very often consumed direct from the packaging.</span></p><section data-dcnode-id="6788" id="s0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6886" id="st030"><span data-dcnode-id="6889" instrument_node="">2.1</span><span data-dcnode-id="6888" instrument_node="">. </span><span data-dcnode-id="6887" instrument_node="">Packaging colour</span></h3><p data-dcnode-id="6868" id="p0050"><span data-dcnode-id="6885" instrument_node="">Louis Cheskin was one of the first to suggest that changing the colour of product packaging influenced what people had to say about the taste/flavour of the contents (e.g., see </span><a class="workspace-trigger" data-dcnode-id="6883" href="#b0050" name="bb0050"><span data-dcnode-id="6884" instrument_node="">Cheskin, 1957</span></a><span data-dcnode-id="6882" instrument_node="">). In particular, the émigré marketer (</span><a class="workspace-trigger" data-dcnode-id="6880" href="#b0340" name="bb0340"><span data-dcnode-id="6881" instrument_node="">Samuel, 2010</span></a><span data-dcnode-id="6879" instrument_node="">) noted that when 15% more yellow colour was added to the outside of cans of 7-Up, the consumers who had been brought into the office to take part in a taste test reported that the flavour of the contents were more lemony. Much more recently, a similar situation occurred when Coke launched a white Christmas Coke can. Once again, this marketing intervention appears to have changed what many consumers had to say about the taste of the ubiquitous drink (</span><a class="workspace-trigger" data-dcnode-id="6877" href="#b0095" name="bb0095"><span data-dcnode-id="6878" instrument_node="">Esterl, 2011</span></a><span data-dcnode-id="6876" instrument_node="">; see also </span><a class="workspace-trigger" data-dcnode-id="6874" href="#b0005" name="bb0005"><span data-dcnode-id="6875" instrument_node="">Abad-Santos, 2011</span></a><span data-dcnode-id="6873" instrument_node="">). In fact, so vociferous were the complaints from consumers about the perceived change in taste, that the company soon withdrew the white cans from the shelves.</span><a class="workspace-trigger" data-dcnode-id="6870" href="#fn2" name="bfn2"><sup data-dcnode-id="6871"><span data-dcnode-id="6872" instrument_node="">2</span></sup></a><span data-dcnode-id="6869" instrument_node=""> Of course, it is worth noting here that when drinking direct from the can, the only visual cue that consumers have to go on is, in fact, the colour of the packaging (i.e., they may well not even see the colour of the drink itself). Hence, packaging colour might, if anything, be expected to have a more pronounced influence under such conditions than in many other cases, where the consumer can see both the colour of the product and the packaging.</span></p><p data-dcnode-id="6857" id="p0055"><span data-dcnode-id="6867" instrument_node="">In terms of more rigorous scientific research on the topic of packaging colour, </span><a class="workspace-trigger" data-dcnode-id="6865" href="#b0075" name="bb0075"><span data-dcnode-id="6866" instrument_node="">Deliza and MacFie (2001)</span></a><span data-dcnode-id="6864" instrument_node=""> summarized an unpublished study by </span><a class="workspace-trigger" data-dcnode-id="6862" href="#b0070" name="bb0070"><span data-dcnode-id="6863" instrument_node="">Deliza (1996)</span></a><span data-dcnode-id="6861" instrument_node=""> in which the appearance of the packaging of a carton of passion fruit juice was manipulated. The results apparently revealed that people (94 British participants) expected the juice in the orange background-coloured packaging to taste sweeter than the juice served in the packaging with a white background instead. The participants were also asked about their expectations concerning how pure, sharp, refreshing, fresh, natural, the drink would be, and their expected liking. The white packaging scored significantly higher on all these other measures. Deliza also conducted a second study with 96 participants in which their expectations in response to viewing packaging were assessed, followed by labelled and blind product tasting. A complex pattern of results was obtained with the participants clustering into three different groups. That said, one conclusion that emerged was that the expectations elicited by the background packaging colour did indeed influence people’s taste ratings, in line with the other results reported in this section.</span><a class="workspace-trigger" data-dcnode-id="6858" href="#fn3" name="bfn3"><sup data-dcnode-id="6859"><span data-dcnode-id="6860" instrument_node="">3</span></sup></a></p><p data-dcnode-id="6849" id="p0060"><span data-dcnode-id="6856" instrument_node="">Subsequently, </span><a class="workspace-trigger" data-dcnode-id="6854" href="#b0025" name="bb0025"><span data-dcnode-id="6855" instrument_node="">Ares and Deliza (2010)</span></a><span data-dcnode-id="6853" instrument_node=""> reported an experiment in which they studied the combined influence of packaging shape and colour on consumer expectations concerning milk desserts using the word association and conjoint analysis techniques. 105 Uruguayan participants viewed 6 containers, varying in terms of their shape (rounded vs. more angular) and colour (black, white, and yellow). Expected liking and willingness to pay were both influenced by the colour of the pack. Yellow was the colour that came out top on both measures, being associated with sweet-tasting, delicious, vanilla and </span><em data-dcnode-id="6851"><span data-dcnode-id="6852" instrument_node="">dulce de leche</span></em><span data-dcnode-id="6850" instrument_node=""> type desserts. By contrast, the desserts presented in white packaging were liked less and were associated with plain, sour, tasteless, and fruity milk desserts instead. Finally, black packaging was associated (in the minds of the Uruguayan participants) with bitter, dark-coloured, chocolate desserts. Some associated the latter packaging with a ‘disgusting taste’, while another segment of those who were quizzed thought that it looked ‘premium’ instead. It is worth bearing in mind here that the participants in this study only saw the colour of the packaging (that is, they did not see the product itself). Nevertheless, the results clearly suggest that the colour of the packaging led to robust predictions/expectations concerning the taste/flavour of the (unseen) contents.</span></p><p data-dcnode-id="6844" id="p0065"><span data-dcnode-id="6848" instrument_node="">Elsewhere, </span><a class="workspace-trigger" data-dcnode-id="6846" href="#b0270" name="bb0270"><span data-dcnode-id="6847" instrument_node="">Piqueras-Fiszman and Spence (2011)</span></a><span data-dcnode-id="6845" instrument_node=""> gave the UK-based participants in one of their laboratory-based studies crisps (potato chips) to try, direct from the packaging. The participants were presented with a series of already-opened ‘salt and vinegar’ and ‘cheese and onion’ coloured crisps packets (commercial packaging was used). The participants had to try and identify the flavour of the contents. In total, they evaluated four packets, two of which were congruently colour-coded, while the contents of the other two packets had been switched surreptitiously. Piqueras-Fiszman and Spence reported that their participants sometimes found it hard to identify the correct flavour of the crisps when presented in the incongruently-coloured packaging. By contrast, no such problems were observed in those trials in which the participants sampled from the congruently-coloured packaging instead.</span></p><p data-dcnode-id="6817" id="p0070"><span data-dcnode-id="6839"><span data-dcnode-id="6843" instrument_node="">In another study, 40 North American students evaluated the apparent healthiness and sweetness of four different food packages (consisting of </span><a class="topic-link" data-dcnode-id="6841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/breakfast-cereal" title="Learn more about breakfast cereal from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6842" instrument_node="">breakfast cereal</span></a><span data-dcnode-id="6840" instrument_node="">, ice-cream, iced tea, and yoghurt) presented in three colours (blue, green, or red; </span></span><a class="workspace-trigger" data-dcnode-id="6837" href="#b0165" name="bb0165"><span data-dcnode-id="6838" instrument_node="">Huang &amp; Lu, 2015</span></a><span data-dcnode-id="6836" instrument_node="">). Each participant made a total of 24 ratings in this within-participants laboratory-based study. The results revealed that the participants reported expecting the product contained within the red packaging to be sweeter. The red-packaged products were also rated as less healthy. Of particular interest, these colour-induced expectations were particularly pronounced amongst those participants classed as ‘high-external eaters’ (see </span><a class="workspace-trigger" data-dcnode-id="6834" href="#b0035" name="bb0035"><span data-dcnode-id="6835" instrument_node="">Brignell et al., 2009</span></a><span data-dcnode-id="6833" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6831" href="#b0320" name="bb0320"><span data-dcnode-id="6832" instrument_node="">Rodin and Slochower, 1976</span></a><span data-dcnode-id="6830" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6828" href="#b0470" name="bb0470"><span data-dcnode-id="6829" instrument_node="">van Strien et al., 1986</span></a><span data-dcnode-id="6827" instrument_node="">). However, one limitation with this study is that it was based solely on taste expectations (see also </span><a class="workspace-trigger" data-dcnode-id="6825" href="#b0160" name="bb0160"><span data-dcnode-id="6826" instrument_node="">Huang &amp; Lu, 2013</span></a><span data-dcnode-id="6824" instrument_node="">). While the results of such studies are undoubtedly useful, it is always important to remember that expectations may have more of an influence on product perception when the experience of the product itself (i.e., the taste in this case) turns out to be reasonably close to the expectations (see </span><a class="workspace-trigger" data-dcnode-id="6822" href="#b0285" name="bb0285"><span data-dcnode-id="6823" instrument_node="">Piqueras-Fiszman &amp; Spence, 2015</span></a><span data-dcnode-id="6821" instrument_node="">; cf. </span><a class="workspace-trigger" data-dcnode-id="6819" href="#b0485" name="bb0485"><span data-dcnode-id="6820" instrument_node="">Wang, Keller, &amp; Spence, 2017</span></a><span data-dcnode-id="6818" instrument_node="">). In other words, in-and-of-themselves, product expectations are only one, albeit important, factor contributing to the total product experience.</span></p><p data-dcnode-id="6812" id="p0075"><span data-dcnode-id="6816" instrument_node="">Finally, in this section, </span><a class="workspace-trigger" data-dcnode-id="6814" href="#b0030" name="bb0030"><span data-dcnode-id="6815" instrument_node="">Barnett and Spence (2016)</span></a><span data-dcnode-id="6813" instrument_node=""> documented a significant change in people’s rating of the citrus/fruity note in a craft beer as a function of the changing colour of the label. In this particular between-participants study, 142 members of the general public who visited the Edinburgh Science Festival (in Scotland) were given a small glass of beer to taste and rate. For one group of participants, the beer was poured from a plain (i.e., unlabelled) brown glass bottle. In the other two conditions, it was poured from a brown glass bottle with either a brown or greenish-yellow label (the latter designed to accentuate the citrus notes in the beer). The participants were invited to inspect the bottle before tasting. They then had to rate their experience of several of the attributes, including the beer’s taste, quality, and citrus flavour, as well as estimate their purchase intent, and willingness-to-pay. Interestingly, the results revealed a significant change as a function of the colour of the label. In particular, the citrus/fruity notes were rated roughly 10% higher when tasting the beer that had been poured from the bottle with the yellowy-green label than for those participants who evaluated the beer from either the unlabelled or brown labelled bottles instead. The participants shown the yellowy-green label also scored the beer highest in terms of taste, quality, and their purchase intent. (There was no significant difference in terms of what people would have been willing to pay for the beer as a function of the label though.)</span></p><p data-dcnode-id="6789" id="p0080"><span data-dcnode-id="6811" instrument_node="">Barnett and Spence (2016) used commercially tenable label designs in their study. As such, the wording on the label, and not only the colour palate used, changed. Hence, given the evidence showing that written descriptions also influence taste and flavour perception (</span><a class="workspace-trigger" data-dcnode-id="6809" href="#b0020" name="bb0020"><span data-dcnode-id="6810" instrument_node="">Anonymous, 1962</span></a><span data-dcnode-id="6808" instrument_node="">; see </span><a class="workspace-trigger" data-dcnode-id="6806" href="#b9000" name="bb9000"><span data-dcnode-id="6807" instrument_node="">Spence &amp; Piqueras-Fiszman, 2014</span></a><span data-dcnode-id="6805" instrument_node="">, for a review), the latter study cannot stand alone as a pure assessment of the impact of label colour on flavour perception. Nevertheless, these results undoubtedly do fit in with those reported more than half a century earlier by Louis </span><a class="workspace-trigger" data-dcnode-id="6803" href="#b0050" name="bb0050"><span data-dcnode-id="6804" instrument_node="">Cheskin (1957</span></a><span data-dcnode-id="6802" instrument_node="">; see also </span><a class="workspace-trigger" data-dcnode-id="6800" href="#b0095" name="bb0095"><span data-dcnode-id="6801" instrument_node="">Esterl, 2011</span></a><span data-dcnode-id="6799" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6797" href="#b0100" name="bb0100"><span data-dcnode-id="6798" instrument_node="">Favre and November, 1979</span></a><span data-dcnode-id="6796" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6794" href="#b0225" name="bb0225"><span data-dcnode-id="6795" instrument_node="">Lick et al., 2017</span></a><span data-dcnode-id="6793" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="6790" href="#fn4" name="bfn4"><sup data-dcnode-id="6791"><span data-dcnode-id="6792" instrument_node="">4</span></sup></a></p></section><section data-dcnode-id="6721" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6784" id="st035"><span data-dcnode-id="6787" instrument_node="">2.2</span><span data-dcnode-id="6786" instrument_node="">. </span><span data-dcnode-id="6785" instrument_node="">Packaging colour: Interim conclusions</span></h3><p data-dcnode-id="6760" id="p0085"><span data-dcnode-id="6783" instrument_node="">Summarizing what we have seen thus far, the limited available evidence, spanning over half a century of research, clearly suggests that changes in packaging colour can indeed give rise to reports of a change in the taste of the product contained within, even for familiar brands such as Coca-Cola and 7-Up. The basic idea here is that packaging colour automatically sets expectations in the mind of the consumer about the likely taste/flavour properties of the contents (see </span><a class="workspace-trigger" data-dcnode-id="6781" href="#b0165" name="bb0165"><span data-dcnode-id="6782" instrument_node="">Huang &amp; Lu, 2015</span></a><span data-dcnode-id="6780" instrument_node="">; and see </span><a class="workspace-trigger" data-dcnode-id="6778" href="#b0285" name="bb0285"><span data-dcnode-id="6779" instrument_node="">Piqueras-Fiszman &amp; Spence, 2015</span></a><span data-dcnode-id="6777" instrument_node="">, for a review).</span><a class="workspace-trigger" data-dcnode-id="6774" href="#fn5" name="bfn5"><sup data-dcnode-id="6775"><span data-dcnode-id="6776" instrument_node="">5</span></sup></a><span data-dcnode-id="6773" instrument_node=""> Such expectations may be driven both by the hue and by the lightness of the packaging colour (see </span><a class="workspace-trigger" data-dcnode-id="6771" href="#b0440" name="bb0440"><span data-dcnode-id="6772" instrument_node="">Tijssen, Zandstra, de Graaf, &amp; Jager, 2017</span></a><span data-dcnode-id="6770" instrument_node="">). These colour-based expectations then anchor, and possibly also influence, the subsequent tasting experience depending on, amongst other things, how far the actual experience is from the expectation (see </span><a class="workspace-trigger" data-dcnode-id="6768" href="#b0025" name="bb0025"><span data-dcnode-id="6769" instrument_node="">Ares and Deliza, 2010</span></a><span data-dcnode-id="6767" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6765" href="#b0075" name="bb0075"><span data-dcnode-id="6766" instrument_node="">Deliza and MacFie, 2001</span></a><span data-dcnode-id="6764" instrument_node="">; cf. </span><a class="workspace-trigger" data-dcnode-id="6762" href="#b0485" name="bb0485"><span data-dcnode-id="6763" instrument_node="">Wang, Keller, &amp; Spence, 2017</span></a><span data-dcnode-id="6761" instrument_node="">).</span></p><p data-dcnode-id="6730" id="p0090"><span data-dcnode-id="6759" instrument_node="">At this point, it is important to highlight the fact that the influence of packaging colour may be different in kind from the impact of the colour of the flatware. This is because the former is normally taken by the consumer to convey some meaning/information. That is, packaging colour often has specific brand connotations (think of the distinctive Coke red), or is used to signal the flavour, or else some other attribute: Think of how salt and vinegar/cheese and onion crisps are signalled by brand-specific colour schemes; </span><a class="workspace-trigger" data-dcnode-id="6757" href="#b0290" name="bb0290"><span data-dcnode-id="6758" instrument_node="">Piqueras-Fiszman et al., 2012</span></a><span data-dcnode-id="6756" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6754" href="#b0475" name="bb0475"><span data-dcnode-id="6755" instrument_node="">Velasco et al., 2014</span></a><span data-dcnode-id="6753" instrument_node="">). The fat content of milk is also signalled by a meaningful, if seemingly arbitrary, colour code that varies by country. In fact, packaging colour is used by the majority of food and beverage brands in order to indicate the type/flavour of product that can be found within (e.g., </span><a class="workspace-trigger" data-dcnode-id="6751" href="#b0065" name="bb0065"><span data-dcnode-id="6752" instrument_node="">Danger, 1987</span></a><span data-dcnode-id="6750" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6748" href="#b0125" name="bb0125"><span data-dcnode-id="6749" instrument_node="">Gimba, 1998</span></a><span data-dcnode-id="6747" instrument_node="">). Indeed, according to an informal store audit conducted some years ago by </span><a class="workspace-trigger" data-dcnode-id="6745" href="#b0110" name="bb0110"><span data-dcnode-id="6746" instrument_node="">Garber, Hyatt, &amp; Starr, 2001</span></a><span data-dcnode-id="6740"><span data-dcnode-id="6744" instrument_node="">), more than 90% of brands on the supermarket shelf used packaging colour to convey relevant information about the contents. What is clear, then, is that in everything from </span><a class="topic-link" data-dcnode-id="6742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/carbonated-beverage" title="Learn more about carbonated beverages from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6743" instrument_node="">carbonated beverages</span></a><span data-dcnode-id="6741" instrument_node=""> through to over-the-counter pharmaceuticals (</span></span><a class="workspace-trigger" data-dcnode-id="6738" href="#b0335" name="bb0335"><span data-dcnode-id="6739" instrument_node="">Roullet and Droulers, 2005</span></a><span data-dcnode-id="6737" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6735" href="#b0480" name="bb0480"><span data-dcnode-id="6736" instrument_node="">Wan et al., 2015</span></a><span data-dcnode-id="6734" instrument_node="">), the colour of the packaging sets expectations about the properties of the contents. As such, it can sometimes be hard to disentangle how much of the effect of colour in the case of product packaging should be attributed to such semiotic/semantic/symbolic associations (</span><a class="workspace-trigger" data-dcnode-id="6732" href="#b0025" name="bb0025"><span data-dcnode-id="6733" instrument_node="">Ares &amp; Deliza, 2010</span></a><span data-dcnode-id="6731" instrument_node="">), and how much reflects the more intrinsic/direct impact of colour on perception/behaviour.</span></p><p data-dcnode-id="6724" id="p0095"><span data-dcnode-id="6729" instrument_node="">In terms of directions for future research in this area, one question to which we do not yet have a clear answer to is whether packaging colour has a more pronounced impact on product perception when the product itself is consumed direct from the packaging versus when it is removed from the packaging prior to consumption. Note here that according to estimates, roughly a third of the food and drink we consume is, in fact, consumed direct from the packaging. It is also unclear, based on the evidence collected to date, whether packaging colour has a more pronounced effect when the consumer doesn’t get to see the colour of the product itself (as when drinking from a can, say).</span><a class="workspace-trigger" data-dcnode-id="6726" href="#fn6" name="bfn6"><sup data-dcnode-id="6727"><span data-dcnode-id="6728" instrument_node="">6</span></sup></a><span data-dcnode-id="6725" instrument_node=""> Again, it would be good to know the answer to this question.</span></p><p data-dcnode-id="6722" id="p0100"><span data-dcnode-id="6723" instrument_node="">Having selectively reviewed the literature on background colour in the case of product packaging, I now want to switch to looking at the impact of background colour in the case of drinking vessels such as cups and mugs.</span></p></section><section data-dcnode-id="6303" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6717" id="st040"><span data-dcnode-id="6720" instrument_node="">2.3</span><span data-dcnode-id="6719" instrument_node="">. </span><span data-dcnode-id="6718" instrument_node="">Cups &amp; mugs</span></h3><div data-dcnode-id="6337"><p data-dcnode-id="6703" id="p0105"><span data-dcnode-id="6716" instrument_node="">In what is perhaps the first published study of the importance of colour in glassware, </span><a class="workspace-trigger" data-dcnode-id="6714" href="#b0135" name="bb0135"><span data-dcnode-id="6715" instrument_node="">Guéguen (2003)</span></a><span data-dcnode-id="6713" instrument_node=""> reported that people (40 French students tested in a laboratory setting) were more likely to pick the opaque blue glass (than an opaque green, red, or yellow glass) as containing the most thirst-quenching unnamed new soda drink (see </span><a class="workspace-trigger" data-dcnode-id="6711" href="#t0005" name="bt0005"><span data-dcnode-id="6712" instrument_node="">Table 1</span></a><span data-dcnode-id="6710" instrument_node=""> for a summary of the results). Meanwhile, </span><a class="workspace-trigger" data-dcnode-id="6708" href="#b0330" name="bb0330"><span data-dcnode-id="6709" instrument_node="">Ross, Bohlscheid, and Weller (2008)</span></a><span data-dcnode-id="6707" instrument_node=""> reported that the colour of the wine glass influenced rating of two red wines (a Syrah and a Pinot Noir) by a group of 10 trained panellists and 80 consumers. Those tested in this study had to evaluate the wines on a series of 7 sensory/descriptive attribute scales, as well as rate their liking. The wines were tasted in blue wine glasses under white light, in clear glasses under red illumination, and in a clear glass under white lighting. (Note that these researchers were primarily interested in masking rather than the effect of glass colour </span><em data-dcnode-id="6705"><span data-dcnode-id="6706" instrument_node="">per se</span></em><span data-dcnode-id="6704" instrument_node="">.) Nevertheless, Ross et al. found that the trained panellists evaluated the wines served in a blue glass as having a more astringent taste, while the consumer panellists liked the wines more when sampling them from the blue glasses instead.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="6338" id="t0005"><span class="captions" data-dcnode-id="6696"><span data-dcnode-id="6697" id="cn0005"><p data-dcnode-id="6698" id="sp0015"><span class="label" data-dcnode-id="6701"><span data-dcnode-id="6702" instrument_node="">Table 1</span></span><span data-dcnode-id="6700" instrument_node="">. </span><span data-dcnode-id="6699" instrument_node="">Summary of previous studies that have investigated the impact of background colour on food perception and behaviour.</span></p></span></span><div class="groups" data-dcnode-id="6342"><table data-dcnode-id="6343"><thead data-dcnode-id="6678"><tr class="rowsep-1 valign-top" data-dcnode-id="6679"><th class="align-left" data-dcnode-id="6694" scope="col"><span data-dcnode-id="6695" instrument_node="">Author(s) (year)</span></th><th class="align-left" data-dcnode-id="6692" scope="col"><span data-dcnode-id="6693" instrument_node="">Receptacle</span></th><th class="align-left" data-dcnode-id="6690" scope="col"><span data-dcnode-id="6691" instrument_node="">Product</span></th><th class="align-left" data-dcnode-id="6688" scope="col"><span data-dcnode-id="6689" instrument_node="">Background colour(s)</span></th><th class="align-left" data-dcnode-id="6686" scope="col"><span data-dcnode-id="6687" instrument_node="">Study location</span></th><th class="align-left" data-dcnode-id="6684" scope="col"><span data-dcnode-id="6685" instrument_node="">N</span></th><th class="align-left" data-dcnode-id="6682" scope="col"><span data-dcnode-id="6683" instrument_node="">Design</span></th><th class="align-left" data-dcnode-id="6680" scope="col"><span data-dcnode-id="6681" instrument_node="">Main findings</span></th></tr></thead><tbody data-dcnode-id="6344"><tr class="valign-top" data-dcnode-id="6660"><td class="align-left" data-dcnode-id="6675"><a class="workspace-trigger" data-dcnode-id="6676" href="#b0080" name="bb0080"><span data-dcnode-id="6677" instrument_node="">Dichter (1964)</span></a></td><td class="align-left" data-dcnode-id="6673"><span data-dcnode-id="6674" instrument_node="">Coffee pot</span></td><td class="align-left" data-dcnode-id="6671"><span data-dcnode-id="6672" instrument_node="">Coffee</span></td><td class="align-left" data-dcnode-id="6669"><span data-dcnode-id="6670" instrument_node="">Brown, red, blue, &amp; yellow</span></td><td class="align-left" data-dcnode-id="6667"><span data-dcnode-id="6668" instrument_node="">Office</span></td><td class="align-left" data-dcnode-id="6665"><span data-dcnode-id="6666" instrument_node="">200</span></td><td class="align-left" data-dcnode-id="6663"><span data-dcnode-id="6664" instrument_node="">W</span></td><td class="align-left" data-dcnode-id="6661"><span data-dcnode-id="6662" instrument_node="">The majority of respondents said that the coffee from the brown container was too strong, 84% of ladies said that the coffee from the red pot was rich and full-bodied. The coffee from the blue pot was rated as having a mild aroma while the coffee served from the yellow coffee pot were judged to have come from a weaker blend.</span></td></tr><tr class="valign-top" data-dcnode-id="6642"><td class="align-left" data-dcnode-id="6657"><a class="workspace-trigger" data-dcnode-id="6658" href="#b0135" name="bb0135"><span data-dcnode-id="6659" instrument_node="">Guéguen (2003)</span></a></td><td class="align-left" data-dcnode-id="6655"><span data-dcnode-id="6656" instrument_node="">Glasses</span></td><td class="align-left" data-dcnode-id="6653"><span data-dcnode-id="6654" instrument_node="">Unnamed soda drink</span></td><td class="align-left" data-dcnode-id="6651"><span data-dcnode-id="6652" instrument_node="">Blue, green, red, &amp; yellow</span></td><td class="align-left" data-dcnode-id="6649"><span data-dcnode-id="6650" instrument_node="">Lab.</span></td><td class="align-left" data-dcnode-id="6647"><span data-dcnode-id="6648" instrument_node="">40</span></td><td class="align-left" data-dcnode-id="6645"><span data-dcnode-id="6646" instrument_node="">W</span></td><td class="align-left" data-dcnode-id="6643"><span data-dcnode-id="6644" instrument_node="">Drink judged as most thirst-quenching when served from blue glass (47.5%), followed by green (25%), red (15%), &amp; yellow (12.5%).</span></td></tr><tr class="valign-top" data-dcnode-id="6624"><td class="align-left" data-dcnode-id="6639"><a class="workspace-trigger" data-dcnode-id="6640" href="#b0345" name="bb0345"><span data-dcnode-id="6641" instrument_node="">Schifferstein (2009)</span></a></td><td class="align-left" data-dcnode-id="6637"><span data-dcnode-id="6638" instrument_node="">Cups</span></td><td class="align-left" data-dcnode-id="6635"><span data-dcnode-id="6636" instrument_node="">Soft drink (7-Up) &amp; tea</span></td><td class="align-left" data-dcnode-id="6633"><span data-dcnode-id="6634" instrument_node="">Pinkish &amp; clear glass</span></td><td class="align-left" data-dcnode-id="6631"><span data-dcnode-id="6632" instrument_node="">Lab</span></td><td class="align-left" data-dcnode-id="6629"><span data-dcnode-id="6630" instrument_node="">60</span></td><td class="align-left" data-dcnode-id="6627"><span data-dcnode-id="6628" instrument_node="">W/B</span></td><td class="align-left" data-dcnode-id="6625"><span data-dcnode-id="6626" instrument_node="">Empty clear glass cup rated as looking less sweet than pink cups made of different materials. When glasses part-filled with tea or 7-Up, no obvious receptacle colour effects observed.</span></td></tr><tr class="valign-top" data-dcnode-id="6606"><td class="align-left" data-dcnode-id="6621"><a class="workspace-trigger" data-dcnode-id="6622" href="#b0145" name="bb0145"><span data-dcnode-id="6623" instrument_node="">Harrar et al. (2011)</span></a></td><td class="align-left" data-dcnode-id="6619"><span data-dcnode-id="6620" instrument_node="">Plastic bowls</span></td><td class="align-left" data-dcnode-id="6617"><span data-dcnode-id="6618" instrument_node="">Popcorn</span></td><td class="align-left" data-dcnode-id="6615"><span data-dcnode-id="6616" instrument_node="">Blue, white, red, &amp; green</span></td><td class="align-left" data-dcnode-id="6613"><span data-dcnode-id="6614" instrument_node="">Lab.</span></td><td class="align-left" data-dcnode-id="6611"><span data-dcnode-id="6612" instrument_node="">60</span></td><td class="align-left" data-dcnode-id="6609"><span data-dcnode-id="6610" instrument_node="">W</span></td><td class="align-left" data-dcnode-id="6607"><span data-dcnode-id="6608" instrument_node="">The sweet popcorn was given a higher saltiness rating (c. 4%) when taken from the blue bowl than when taken from the white bowl. By contrast, the salty popcorn was rated as 3.7% sweeter when taken from the red bowl than from the white bowl. A borderline-significant effect on sweetness was also documented when the blue bowl ratings were compared to those given from the white bowl. There was no effect on liking.</span></td></tr><tr class="valign-top" data-dcnode-id="6577"><td class="align-left" data-dcnode-id="6602"><a class="workspace-trigger" data-dcnode-id="6604" href="#b0115" name="bb0115"><span data-dcnode-id="6605" instrument_node="">Genschrow et al. (2012)</span></a><br data-dcnode-id="6603"></td><td class="align-left" data-dcnode-id="6598"><span data-dcnode-id="6601" instrument_node="">Plastic cups</span><br data-dcnode-id="6600"><span data-dcnode-id="6599" instrument_node="">Plates</span></td><td class="align-left" data-dcnode-id="6596"><span data-dcnode-id="6597" instrument_node="">Soft drink: Tea (white, green), or lemon flavour</span></td><td class="align-left" data-dcnode-id="6592"><span data-dcnode-id="6595" instrument_node="">Red or blue labelled cup</span><br data-dcnode-id="6594"><span data-dcnode-id="6593" instrument_node="">Red, white, &amp; blue</span></td><td class="align-left" data-dcnode-id="6590"><span data-dcnode-id="6591" instrument_node="">University entrance hall</span></td><td class="align-left" data-dcnode-id="6586"><span data-dcnode-id="6589" instrument_node="">E1 = 41</span><br data-dcnode-id="6588"><span data-dcnode-id="6587" instrument_node="">E2 = 109</span></td><td class="align-left" data-dcnode-id="6582"><span data-dcnode-id="6585" instrument_node="">W</span><br data-dcnode-id="6584"><span data-dcnode-id="6583" instrument_node="">W</span></td><td class="align-left" data-dcnode-id="6578"><span data-dcnode-id="6581" instrument_node="">People drink less from cup with red label than from cup with blue label.</span><br data-dcnode-id="6580"><span data-dcnode-id="6579" instrument_node="">People eat less pretzels off red plate than off blue or white plate.</span></td></tr><tr data-dcnode-id="6557"><td class="align-left" data-dcnode-id="6574"><a class="workspace-trigger" data-dcnode-id="6575" href="#b0260" name="bb0260"><span data-dcnode-id="6576" instrument_node="">Piqueras-Fiszman et al. (2012)</span></a></td><td class="align-left" data-dcnode-id="6572"><span data-dcnode-id="6573" instrument_node="">Plates</span></td><td class="align-left" data-dcnode-id="6568"><span data-dcnode-id="6571" instrument_node="">Pretzels</span><br data-dcnode-id="6570"><span data-dcnode-id="6569" instrument_node="">Pink strawberry mousse</span></td><td class="align-left" data-dcnode-id="6566"><span data-dcnode-id="6567" instrument_node="">Black &amp; white</span></td><td class="align-left" data-dcnode-id="6564"><span data-dcnode-id="6565" instrument_node="">Alicia-elBulli Foundation</span></td><td class="align-left" data-dcnode-id="6562"><span data-dcnode-id="6563" instrument_node="">53</span></td><td class="align-left" data-dcnode-id="6560"><span data-dcnode-id="6561" instrument_node="">W</span></td><td class="align-left" data-dcnode-id="6558"><span data-dcnode-id="6559" instrument_node="">Serving the mousse on a round white plate resulted in it being rated as 7% sweeter, as having a flavour that was 13% more intense, and significantly more liked (9%) than when exactly the same dessert was served from a round black plate instead.</span></td></tr><tr class="valign-top" data-dcnode-id="6533"><td class="align-left" data-dcnode-id="6554"><a class="workspace-trigger" data-dcnode-id="6555" href="#b0275" name="bb0275"><span data-dcnode-id="6556" instrument_node="">Piqueras-Fiszman &amp; Spence (2012)</span></a></td><td class="align-left" data-dcnode-id="6552"><span data-dcnode-id="6553" instrument_node="">Plastic vending cups</span></td><td class="align-left" data-dcnode-id="6550"><span data-dcnode-id="6551" instrument_node="">Hot chocolate</span></td><td class="align-left" data-dcnode-id="6548"><span data-dcnode-id="6549" instrument_node="">White, dark cream, red, &amp; reddish-orange outside with a white inside</span></td><td class="align-left" data-dcnode-id="6546"><span data-dcnode-id="6547" instrument_node="">Workshop</span></td><td class="align-left" data-dcnode-id="6544"><span data-dcnode-id="6545" instrument_node="">57</span></td><td class="align-left" data-dcnode-id="6542"><span data-dcnode-id="6543" instrument_node="">W/B</span></td><td class="align-left" data-dcnode-id="6534"><span data-dcnode-id="6541" instrument_node="">Hot chocolate liked significantly more from reddish-orange cup than from white cup. Chocolate </span><u data-dcnode-id="6539"><span data-dcnode-id="6540" instrument_node="">flavour</span></u><span data-dcnode-id="6538" instrument_node=""> rated as more intense from reddish-orange cup than from red or white cups. No significant effects on sweetness, chocolate </span><u data-dcnode-id="6536"><span data-dcnode-id="6537" instrument_node="">aroma</span></u><span data-dcnode-id="6535" instrument_node="">, bitterness, or creaminess.</span></td></tr><tr class="valign-top" data-dcnode-id="6507"><td class="align-left" data-dcnode-id="6530"><a class="workspace-trigger" data-dcnode-id="6531" href="#b0045" name="bb0045"><span data-dcnode-id="6532" instrument_node="">Bruno et al. (2013)</span></a></td><td class="align-left" data-dcnode-id="6528"><span data-dcnode-id="6529" instrument_node="">Plastic plates</span></td><td class="align-left" data-dcnode-id="6522"><span data-dcnode-id="6527" instrument_node="">Popcorn</span><br data-dcnode-id="6526"><span data-dcnode-id="6525" instrument_node="">Yoghurt</span><br data-dcnode-id="6524"><span data-dcnode-id="6523" instrument_node="">Skin cream</span></td><td class="align-left" data-dcnode-id="6520"><span data-dcnode-id="6521" instrument_node="">Red, blue &amp; white</span></td><td class="align-left" data-dcnode-id="6518"><span data-dcnode-id="6519" instrument_node="">Lab.</span></td><td class="align-left" data-dcnode-id="6512"><span data-dcnode-id="6517" instrument_node="">E1 = 90</span><br data-dcnode-id="6516"><span data-dcnode-id="6515" instrument_node="">E2 = 75</span><br data-dcnode-id="6514"><span data-dcnode-id="6513" instrument_node="">E3 = 75</span></td><td class="align-left" data-dcnode-id="6510"><span data-dcnode-id="6511" instrument_node="">B</span></td><td class="align-left" data-dcnode-id="6508"><span data-dcnode-id="6509" instrument_node="">Red plateware reduced consumption/amount used; Results not attributable to achromatic contrast.</span></td></tr><tr data-dcnode-id="6489"><td class="align-left" data-dcnode-id="6504"><a class="workspace-trigger" data-dcnode-id="6505" href="#b0150" name="bb0150"><span data-dcnode-id="6506" instrument_node="">Harrar &amp; Spence (2013)</span></a></td><td class="align-left" data-dcnode-id="6502"><span data-dcnode-id="6503" instrument_node="">Plastic spoons</span></td><td class="align-left" data-dcnode-id="6500"><span data-dcnode-id="6501" instrument_node="">Greek yoghurt (white or dyed pink)</span></td><td class="align-left" data-dcnode-id="6498"><span data-dcnode-id="6499" instrument_node="">Black, blue, green, red, &amp; white</span></td><td class="align-left" data-dcnode-id="6496"><span data-dcnode-id="6497" instrument_node="">Lab.</span></td><td class="align-left" data-dcnode-id="6494"><span data-dcnode-id="6495" instrument_node="">40</span></td><td class="align-left" data-dcnode-id="6492"><span data-dcnode-id="6493" instrument_node="">W</span></td><td class="align-left" data-dcnode-id="6490"><span data-dcnode-id="6491" instrument_node="">Perceived expense, sweetness, saltiness and overall liking of yogurt rated. Yoghurts (both white and pink) rated from black spoon were rated as significantly less sweet than when tasted from a white spoon instead. The white yoghurt was rated as tasting more expensive when sampled from the white spoon than when tasted from the black spoon. There were also several other borderline-significant effects.</span></td></tr><tr class="valign-top" data-dcnode-id="6471"><td class="align-left" data-dcnode-id="6486"><a class="workspace-trigger" data-dcnode-id="6487" href="#b0265" name="bb0265"><span data-dcnode-id="6488" instrument_node="">Piqueras-Fiszman et al. (2013)</span></a></td><td class="align-left" data-dcnode-id="6484"><span data-dcnode-id="6485" instrument_node="">Plates</span></td><td class="align-left" data-dcnode-id="6482"><span data-dcnode-id="6483" instrument_node="">3 Desserts (fraisier, fraicheur, &amp; vacherin glacé)</span></td><td class="align-left" data-dcnode-id="6480"><span data-dcnode-id="6481" instrument_node="">Black &amp; white</span></td><td class="align-left" data-dcnode-id="6478"><span data-dcnode-id="6479" instrument_node="">Restaurant</span></td><td class="align-left" data-dcnode-id="6476"><span data-dcnode-id="6477" instrument_node="">253</span></td><td class="align-left" data-dcnode-id="6474"><span data-dcnode-id="6475" instrument_node="">W/B</span></td><td class="align-left" data-dcnode-id="6472"><span data-dcnode-id="6473" instrument_node="">Prior to consumption, plate colour influenced judgments of how appetizing one of desserts looked, and how much diners liked the visual presentation. After consumption, plate colour influenced liking for the other two desserts (though results marginal, p = 0.09 in one case). No effect on sweetness perception, and a significant effect on flavour intensity.</span></td></tr><tr class="valign-top" data-dcnode-id="6453"><td class="align-left" data-dcnode-id="6468"><a class="workspace-trigger" data-dcnode-id="6469" href="#b0430" name="bb0430"><span data-dcnode-id="6470" instrument_node="">Stewart &amp; Goss (2013)</span></a></td><td class="align-left" data-dcnode-id="6466"><span data-dcnode-id="6467" instrument_node="">Round &amp; square plates</span></td><td class="align-left" data-dcnode-id="6464"><span data-dcnode-id="6465" instrument_node="">Cheesecake</span></td><td class="align-left" data-dcnode-id="6462"><span data-dcnode-id="6463" instrument_node="">Black &amp; white</span></td><td class="align-left" data-dcnode-id="6460"><span data-dcnode-id="6461" instrument_node="">Lab.</span></td><td class="align-left" data-dcnode-id="6458"><span data-dcnode-id="6459" instrument_node="">48</span></td><td class="align-left" data-dcnode-id="6456"><span data-dcnode-id="6457" instrument_node="">B</span></td><td class="align-left" data-dcnode-id="6454"><span data-dcnode-id="6455" instrument_node="">Dessert rated as significantly sweeter when served on white plate.</span></td></tr><tr class="valign-top" data-dcnode-id="6433"><td class="align-left" data-dcnode-id="6450"><a class="workspace-trigger" data-dcnode-id="6451" href="#b0460" name="bb0460"><span data-dcnode-id="6452" instrument_node="">Van Doorn et al. (2014)</span></a></td><td class="align-left" data-dcnode-id="6448"><span data-dcnode-id="6449" instrument_node="">E1 – Mug E2 – Clear mug with coloured sleeve</span></td><td class="align-left" data-dcnode-id="6446"><span data-dcnode-id="6447" instrument_node="">Café latté</span></td><td class="align-left" data-dcnode-id="6444"><span data-dcnode-id="6445" instrument_node="">White, transparent, &amp; light-blue</span></td><td class="align-left" data-dcnode-id="6442"><span data-dcnode-id="6443" instrument_node="">Lab.</span></td><td class="align-left" data-dcnode-id="6438"><span data-dcnode-id="6441" instrument_node="">E1 = 18</span><br data-dcnode-id="6440"><span data-dcnode-id="6439" instrument_node="">E2 = 36</span></td><td class="align-left" data-dcnode-id="6436"><span data-dcnode-id="6437" instrument_node="">B</span></td><td class="align-left" data-dcnode-id="6434"><span data-dcnode-id="6435" instrument_node="">Serving coffee in white mug resulted in enhanced ratings of flavour intensity (E1) and reduced sweetness (E2) as compared to the transparent or blue mug.</span></td></tr><tr class="valign-top" data-dcnode-id="6415"><td class="align-left" data-dcnode-id="6430"><a class="workspace-trigger" data-dcnode-id="6431" href="#b0250" name="bb0250"><span data-dcnode-id="6432" instrument_node="">Michel et al. (2015)</span></a></td><td class="align-left" data-dcnode-id="6428"><span data-dcnode-id="6429" instrument_node="">Plates</span></td><td class="align-left" data-dcnode-id="6426"><span data-dcnode-id="6427" instrument_node="">Dessert: Treacle tart with clotted cream ice cream</span></td><td class="align-left" data-dcnode-id="6424"><span data-dcnode-id="6425" instrument_node="">Square black &amp; round white</span></td><td class="align-left" data-dcnode-id="6422"><span data-dcnode-id="6423" instrument_node="">Hotel restaurant dining room</span></td><td class="align-left" data-dcnode-id="6420"><span data-dcnode-id="6421" instrument_node="">121 (62/59)</span></td><td class="align-left" data-dcnode-id="6418"><span data-dcnode-id="6419" instrument_node="">B</span></td><td class="align-left" data-dcnode-id="6416"><span data-dcnode-id="6417" instrument_node="">The dessert was liked significantly more when served from the square black plate than from the round white plate. No significant effect of plateware on sweetness of flavour intensity.</span></td></tr><tr class="valign-top" data-dcnode-id="6380"><td class="align-left" data-dcnode-id="6412"><a class="workspace-trigger" data-dcnode-id="6413" href="#b0305" name="bb0305"><span data-dcnode-id="6414" instrument_node="">Reutner et al. (2015)</span></a></td><td class="align-left" data-dcnode-id="6406"><span data-dcnode-id="6411" instrument_node="">Plates</span><br data-dcnode-id="6410"><span data-dcnode-id="6409" instrument_node="">Plates w. flags</span><br data-dcnode-id="6408"><span data-dcnode-id="6407" instrument_node="">Plastic cups</span></td><td class="align-left" data-dcnode-id="6402"><span data-dcnode-id="6405" instrument_node="">Chocolate &amp; grapes</span><br data-dcnode-id="6404"><span data-dcnode-id="6403" instrument_node="">White, mixed, &amp; brown bread</span></td><td class="align-left" data-dcnode-id="6398"><span data-dcnode-id="6401" instrument_node="">Red &amp; white</span><br data-dcnode-id="6400"><span data-dcnode-id="6399" instrument_node="">Red &amp; green</span></td><td class="align-left" data-dcnode-id="6392"><span data-dcnode-id="6397" instrument_node="">Lab</span><br data-dcnode-id="6396"><span data-dcnode-id="6395" instrument_node="">On-street</span><br data-dcnode-id="6394"><span data-dcnode-id="6393" instrument_node="">At supermarket</span></td><td class="align-left" data-dcnode-id="6388"><span data-dcnode-id="6391" instrument_node="">E1 = 82</span><br data-dcnode-id="6390"><span data-dcnode-id="6389" instrument_node="">E2 = 111</span></td><td class="align-left" data-dcnode-id="6387"></td><td class="align-left" data-dcnode-id="6381"><span data-dcnode-id="6386" instrument_node="">People eat less chocolate from red plate, no effect for grapes</span><br data-dcnode-id="6385"><span data-dcnode-id="6384" instrument_node="">Red flags reduced choice of unhealthy white bread, and colour of flag had less of an</span><br data-dcnode-id="6383"><span data-dcnode-id="6382" instrument_node="">Impact on mixed grain bread, and least effect on healthier brown bread</span></td></tr><tr data-dcnode-id="6363"><td class="align-left" data-dcnode-id="6377"><a class="workspace-trigger" data-dcnode-id="6378" href="#b0310" name="bb0310"><span data-dcnode-id="6379" instrument_node="">Risso et al. (2015)</span></a></td><td class="align-left" data-dcnode-id="6376"></td><td class="align-left" data-dcnode-id="6374"><span data-dcnode-id="6375" instrument_node="">Still/sparkling mineral water</span></td><td class="align-left" data-dcnode-id="6372"><span data-dcnode-id="6373" instrument_node="">Blue, red, &amp; white</span></td><td class="align-left" data-dcnode-id="6370"><span data-dcnode-id="6371" instrument_node="">Lab.</span></td><td class="align-left" data-dcnode-id="6368"><span data-dcnode-id="6369" instrument_node="">E1 = 27 E2 = 22 E3 = 36</span></td><td class="align-left" data-dcnode-id="6366"><span data-dcnode-id="6367" instrument_node="">W</span></td><td class="align-left" data-dcnode-id="6364"><span data-dcnode-id="6365" instrument_node="">E1 – water tasted from red or blue cups rated more carbonated than water tasted from white cup; E2 – people expected water from blue cup to be less carbonated, and expected water from white cup to be fresher; E3 – people showed drinking preference for still water from white cup, and for slightly sparkling from blue or red cup.</span></td></tr><tr class="valign-top" data-dcnode-id="6345"><td class="align-left" data-dcnode-id="6360"><a class="workspace-trigger" data-dcnode-id="6361" href="#b0450" name="bb0450"><span data-dcnode-id="6362" instrument_node="">Tu et al. (2016)</span></a></td><td class="align-left" data-dcnode-id="6358"><span data-dcnode-id="6359" instrument_node="">Plates</span></td><td class="align-left" data-dcnode-id="6356"><span data-dcnode-id="6357" instrument_node="">Spicy bean curd</span></td><td class="align-left" data-dcnode-id="6354"><span data-dcnode-id="6355" instrument_node="">Green, red, white, or yellow</span></td><td class="align-left" data-dcnode-id="6352"><span data-dcnode-id="6353" instrument_node="">Lab.</span></td><td class="align-left" data-dcnode-id="6350"><span data-dcnode-id="6351" instrument_node="">E1 = 40; E2 = 48; E3 = 39;</span></td><td class="align-left" data-dcnode-id="6348"><span data-dcnode-id="6349" instrument_node="">W</span></td><td class="align-left" data-dcnode-id="6346"><span data-dcnode-id="6347" instrument_node="">E1 – spiciness expectations; E2 – spiciness perception; E3 – effect of spiciness expectations on spiciness perception</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="6339"></p><p data-dcnode-id="6340" id="sp0020"><span data-dcnode-id="6341" instrument_node="">Design: E – Experiment; W – Within participants; B – Between participants.</span></p><p></p></div></div><p data-dcnode-id="6328" id="p0110"><span data-dcnode-id="6336" instrument_node="">Schifferstein (2009; Experiment 2) had his Dutch participants evaluate the experience of various drinking receptacles, either empty, or when part-filled with warm tea or a chilled soft drink (7-Up; there were 20 participants in each condition). All had a pinkish hue except for one receptacle which was transparent. While the material of the receptacles also varied, the key point to note for present purposes is that the participants’ ratings of the sweetness that they associated with the transparent receptacle was significantly lower than for any of the pinkish cups (when empty). Importantly, however, once the receptacles had been filled, no obvious colour-based differences in sweetness, or any other attribute, remained. Results such as these might be taken to suggest that the participants may have transferred the experience of the pinkness of the cups (or rather, their intuitions about pink foodstuffs being sweet; see </span><a class="workspace-trigger" data-dcnode-id="6334" href="#b0425" name="bb0425"><span data-dcnode-id="6335" instrument_node="">Spence et al., 2015</span></a><span data-dcnode-id="6333" instrument_node="">) to their judgments of the drinking vessels themselves.</span><a class="workspace-trigger" data-dcnode-id="6330" href="#fn7" name="bfn7"><sup data-dcnode-id="6331"><span data-dcnode-id="6332" instrument_node="">7</span></sup></a><span data-dcnode-id="6329" instrument_node=""> Interestingly, though, in this case, the expectations elicited by the colour of the cup did not carry over to influence perception once the cup had been filled. This is perhaps because the drinks – tea and a lemon drink, were not necessarily associated with sweetness in the first place.</span></p><p data-dcnode-id="6316" id="p0115"><span data-dcnode-id="6327" instrument_node="">Piqueras-Fiszman and Spence (2012) conducted a study in which their UK-based participants tasted hot chocolate from four different plastic vending cups. Two of the chocolate samples had been sweetened whereas the other two cups contained unsweetened samples. The 57 participants rated their liking of the drink, the chocolate aroma, chocolate flavour, and sweetness using line scales. The results revealed that the hot chocolate drink served from the reddish-orange (outside) and white (inside) cup was liked significantly more than when served from the plain white cup. The participants also rated the chocolate flavour as more intense from this cup than from either the white or red cup.</span><a class="workspace-trigger" data-dcnode-id="6324" href="#fn8" name="bfn8"><sup data-dcnode-id="6325"><span data-dcnode-id="6326" instrument_node="">8</span></sup></a><span data-dcnode-id="6323" instrument_node=""> In the same year, </span><a class="workspace-trigger" data-dcnode-id="6321" href="#b0140" name="bb0140"><span data-dcnode-id="6322" instrument_node="">Guéguen and Jacob (2012)</span></a><span data-dcnode-id="6320" instrument_node=""> had 120 French people taste coffee from four different coloured cups (blue, green, red, and yellow). In this case, though, the participants had to indicate which coffee was warmest (in terms of its temperature). 38% of the participants reported that the coffee served in the red cup was the warmest, followed by the yellow (28.3%), green (20.0%) and, finally, the blue cup (13.3%).</span><a class="workspace-trigger" data-dcnode-id="6317" href="#fn9" name="bfn9"><sup data-dcnode-id="6318"><span data-dcnode-id="6319" instrument_node="">9</span></sup></a></p><p data-dcnode-id="6314" id="p0120"><span data-dcnode-id="6315" instrument_node="">In 2014, Van Doorn, Wuillemin, and Spence conducted a couple of experiments in Australia showing that a hot milky coffee drink (i.e., a cafè latte) was rated as having a more intense flavour when served in a white ceramic mug as compared to in a clear glass beaker or blue mug (Experiment 1). In a second experiment, the hot beverage served in a glass with a white rubber sleeve was rated as tasting less sweet than when the same drink was served in a clear glass or a glass with a blue-sleeve instead. By contrast, no significant influence of the colour of the drinking vessel was reported on any of the other measures (e.g., sweetness, aroma, bitterness, quality, or acceptability). Van Doorn et al. suggested that their results might therefore be accounted for in terms of colour (rather than simultaneous) contrast (see below).</span></p><p data-dcnode-id="6309" id="p0125"><span data-dcnode-id="6313" instrument_node="">A year later, </span><a class="workspace-trigger" data-dcnode-id="6311" href="#b0310" name="bb0310"><span data-dcnode-id="6312" instrument_node="">Risso, Maggioni, Olivero, and Gallace (2015)</span></a><span data-dcnode-id="6310" instrument_node=""> conducted three experiments designed to assess the taste expectations/experience of their Italian participants in response to samples of mineral water served in a white, red, or blue plastic cup. In their first study, the participants evaluated samples of mineral water (natural, slightly carbonated, and carbonated) from the three coloured cups in terms of their expected freshness (as in thirst-quenching/refreshing), pleasantness, level of carbonation, and lightness using visual analog scales. Each of the participants in this laboratory-based study evaluated a total of 27 cups (3 cup colours × 3 mineral water samples × 3 repetitions). In a second experiment, these researchers went on to assess the expectations of a new group of participants (i.e., who looked at, but did not taste, the mineral waters). Finally, in a third experiment, Risso and her colleagues evaluated people’s choice behaviour, assessing whether they would be more likely to choose water from a cup of a particular colour.</span></p><p data-dcnode-id="6304" id="p0130"><span data-dcnode-id="6308" instrument_node="">The results of </span><a class="workspace-trigger" data-dcnode-id="6306" href="#b0310" name="bb0310"><span data-dcnode-id="6307" instrument_node="">Risso et al.’s (2015)</span></a><span data-dcnode-id="6305" instrument_node=""> first study revealed that people rated water as tasting slightly more carbonated when sampled from the red or blue cup, than when sampled from the white cup. The results of their second study showed that people expected the sparkling water in the blue cup to be less carbonated than the water in the white or red cup. The participants also expected that the lightly carbonated water would be more carbonated when served in either the white or red cup; They also expected the water samples to be fresher when served in the white cup than when served in a red cup. Risso et al.’s final experiment demonstrated that people preferentially chose the white cup for still water (69%; 25% blue; 6% red); the red or blue cups (42% and 44%, respectively) for semi-sparling water (14% white); and the blue plastic cup for the carbonated sample (M = 56%; vs. 28% red; 17% white). In summary, the results of this Italian study therefore clearly illustrate that people’s expectations, perception, and choice behaviour in response to mineral water were all affected by the colour of cup. That said, it is a little harder to draw a coherent message/conclusion concerning the relative impact/importance of people’s expectations on their actual tasting experience.</span></p></section><section data-dcnode-id="6210" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6299" id="st045"><span data-dcnode-id="6302" instrument_node="">2.4</span><span data-dcnode-id="6301" instrument_node="">. </span><span data-dcnode-id="6300" instrument_node="">Flatware</span></h3><p data-dcnode-id="6282" id="p0135"><span data-dcnode-id="6298" instrument_node="">As was the case with packaging colour, there have been anecdotal reports circulating for decades that plate colour matters. Just take the following quote from </span><a class="workspace-trigger" data-dcnode-id="6296" href="#b0215" name="bb0215"><span data-dcnode-id="6297" instrument_node="">Lampi (1973, p. 60)</span></a><span data-dcnode-id="6295" instrument_node="">: </span><em data-dcnode-id="6293"><span data-dcnode-id="6294" instrument_node="">“A brown table and brown plates are not the best way of serving a brown steak. Food is not shown to advantage in monotone, because comparison becomes dependent on intellect and memory alone. The appetizing appearance of a well-browned roast is brought out against colourful green and red vegetables. On a black plate, food nearly always looks more appetizing than on a white one. This is because the food reflects more light towards the viewer than the black plate.”</span></em><span data-dcnode-id="6292" instrument_node=""> Or this from </span><a class="workspace-trigger" data-dcnode-id="6290" href="#b0235" name="bb0235"><span data-dcnode-id="6291" instrument_node="">Lyman (1989, p. 112)</span></a><span data-dcnode-id="6289" instrument_node="">: “</span><em data-dcnode-id="6287"><span data-dcnode-id="6288" instrument_node="">Simultaneous colour contrast suggests that foods can be arranged in combinations so that their colours are subtly enhanced, subdued, or otherwise modified. Yellow scrambled eggs on a yellow plate will look paler because of contrast. Purple grapes will look less purple on a purple plate and will look redder on a blue plate. A green salad will look less green on a green plate than on a plate that has no green in it. Red food on a blue plate will look more orange. Broccoli served with red fish will make the fish look redder, and slices of lime surrounding a grape mousse will enhance the colour of both</span></em><span data-dcnode-id="6286" instrument_node="">.” The focus of Lyman’s suggestion here is very much on simultaneous colour contrast between the food and the plate as the underlying mechanism (see also </span><a class="workspace-trigger" data-dcnode-id="6284" href="#b0190" name="bb0190"><span data-dcnode-id="6285" instrument_node="">Hutchings, 1999</span></a><span data-dcnode-id="6283" instrument_node="">). However, before thinking more carefully about this as the most likely explanation, let us first take a look at what the evidence concerning the colour of plateware actually shows.</span></p><p data-dcnode-id="6273" id="p0140"><span data-dcnode-id="6281" instrument_node="">The UK-based participants in an early laboratory-based study reported by </span><a class="workspace-trigger" data-dcnode-id="6279" href="#b0145" name="bb0145"><span data-dcnode-id="6280" instrument_node="">Harrar, Piqueras-Fiszman, and Spence (2011)</span></a><span data-dcnode-id="6278" instrument_node=""> sampled sweet or salty popcorn from four differently coloured bowls (blue, green, red, and white). The salty popcorn was rated as tasting significantly sweeter when taken from a blue or red bowl, while the sweet popcorn was rated as tasting saltier when taken from the blue bowl. Although the magnitude of these effects was pretty small (averaging only a 4% change in people’s responses for the food taken from the coloured bowl as compared to from the white bowl),</span><a class="workspace-trigger" data-dcnode-id="6275" href="#fn10" name="bfn10"><sup data-dcnode-id="6276"><span data-dcnode-id="6277" instrument_node="">10</span></sup></a><span data-dcnode-id="6274" instrument_node=""> they were nevertheless statistically reliable.</span></p><p data-dcnode-id="6265" id="p0145"><span da
