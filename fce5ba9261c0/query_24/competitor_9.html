</span><meta content="Many languages express ‘blue’ and ‘green’ under an umbrella term ‘grue’. To explain this variation, it has been suggested that changes in eye physiology, due to UV-light incidence, can lead to abnormalities in blue-green color perception which causes the color lexicon to adapt. Here, we apply advanced statistics on a set of 142 populations to model how different factors shape the presence of a specific term for blue. In addition, we examined if the ontogenetic effect of UV-light on color perception generates a negative selection pressure against inherited abnormal red-green perception. We found the presence of a specific term for blue was influenced by UV incidence as well as several additional factors, including cultural complexity. Moreover, there was evidence that UV incidence was negatively related to abnormal red-green color perception. These results demonstrate that variation in languages can only be understood in the context of their cultural, biological, and physical environments." data-dcnode-id="5903" name="dc.description"><span data-dcnode-id="5902" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="4888" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="4889" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4893" id="Abs1"><span data-dcnode-id="4894" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="4890" id="Abs1-content"><p data-dcnode-id="4891"><span data-dcnode-id="4892" instrument_node="">Many languages express ‘blue’ and ‘green’ under an umbrella term ‘grue’. To explain this variation, it has been suggested that changes in eye physiology, due to UV-light incidence, can lead to abnormalities in blue-green color perception which causes the color lexicon to adapt. Here, we apply advanced statistics on a set of 142 populations to model how different factors shape the presence of a specific term for blue. In addition, we examined if the ontogenetic effect of UV-light on color perception generates a negative selection pressure against inherited abnormal red-green perception. We found the presence of a specific term for blue was influenced by UV incidence as well as several additional factors, including cultural complexity. Moreover, there was evidence that UV incidence was negatively related to abnormal red-green color perception. These results demonstrate that variation in languages can only be understood in the context of their cultural, biological, and physical environments.</span></p></div></div></section><span data-dcnode-id="4887" instrument_node="">
</span><noscript data-dcnode-id="4885"><span data-dcnode-id="4886" instrument_node="">
</span></noscript><span data-dcnode-id="4884" instrument_node="">
</span><section data-dcnode-id="4575" data-title="Introduction"><div class="c-article-section" data-dcnode-id="4576" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4882" id="Sec1"><span data-dcnode-id="4883" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="4577" id="Sec1-content"><p data-dcnode-id="4858"><span data-dcnode-id="4881" instrument_node="">One of the major puzzles facing the language sciences is how to best account for the factors and processes shaping the observed patterns of linguistic diversity today. The color lexicon is particularly interesting from this perspective. The long-standing emphasis has been on establishing universals</span><sup data-dcnode-id="4878"><a aria-label="Reference 1" data-dcnode-id="4879" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d231533968e395" title="Berlin, B. &amp; Kay, P. Basic Color Terms: Their Universality and Evolution (University of California Press, 1969)."><span data-dcnode-id="4880" instrument_node="">1</span></a></sup><span data-dcnode-id="4877" instrument_node="">. Recent work shows that universal tendencies in color naming systems arise from perceptual structure</span><sup data-dcnode-id="4874"><a aria-label="Reference 2" data-dcnode-id="4875" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d231533968e399" title="Regier, T., Kay, P. &amp; Khetarpal, N. Color naming reflects optimal partitions of color space. Proc. Natl. Acad. Sci. 104, 1436–1441. 
                  https://doi.org/10.1073/pnas.0610341104
                  
                 (2007)."><span data-dcnode-id="4876" instrument_node="">2</span></a></sup><span data-dcnode-id="4873" instrument_node=""> and communicative needs</span><sup data-dcnode-id="4864"><a data-dcnode-id="4871" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d231533968e403" title="Gibson, E. et al. Color naming across languages reflects color use. Proc. Natl. Acad. Sci. 114, 10785–10790. 
                  https://doi.org/10.1073/pnas.1619666114
                  
                 (2017)."><span data-dcnode-id="4872" instrument_node="">3</span></a><span data-dcnode-id="4870" instrument_node="">,</span><a data-dcnode-id="4868" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d231533968e403_1" title="Zaslavsky, N., Kemp, C., Tishby, N. &amp; Regier, T. Color naming reflects both perceptual structure and communicative need. Top. Cogn. Sci. 11, 207–219. 
                  https://doi.org/10.1111/tops.12395
                  
                 (2019)."><span data-dcnode-id="4869" instrument_node="">4</span></a><span data-dcnode-id="4867" instrument_node="">,</span><a aria-label="Reference 5" data-dcnode-id="4865" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d231533968e406" title="Conway, B. R., Ratnasingam, S., Jara-Ettinger, J., Futrell, R. &amp; Gibson, E. Communication efficiency of color naming across languages provides a new framework for the evolution of color terms. Cognition 195, 104086. 
                  https://doi.org/10.1016/j.cognition.2019.104086
                  
                 (2020)."><span data-dcnode-id="4866" instrument_node="">5</span></a></sup><span data-dcnode-id="4863" instrument_node="">. At the same time, it is just as important to be able to characterize and explain variation found in color terminologies</span><sup data-dcnode-id="4860"><a aria-label="Reference 6" data-dcnode-id="4861" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d231533968e410" title="Malt, B. C. &amp; Majid, A. How thought is mapped into words. Wiley Interdiscip. Rev. Cognit. Sci. 4, 583–597. 
                  https://doi.org/10.1002/wcs.1251
                  
                 (2013)."><span data-dcnode-id="4862" instrument_node="">6</span></a></sup><span data-dcnode-id="4859" instrument_node="">. Languages differ in the number of basic color terms and which distinctions exactly are recognized for naming. Some languages only lexicalize ‘black’, ‘white’, and ‘red’; while others make many more distinctions, including ‘green’ and ‘blue’.</span></p><p data-dcnode-id="4819"><span data-dcnode-id="4857" instrument_node="">Blue is a particularly interesting color term to study since there are competing explanations for why it would emerge as a word. According to one class of theories, color terms emerge from salient features of the environment: for blue this would include water bodies, such as the sea, lakes, or rivers, as well as visibility of a blue sky which is affected by climate and humidity. That is, the ecological environment (such as the presence of lakes) may be a factor relevant in shaping the color lexicon</span><sup data-dcnode-id="4845"><a data-dcnode-id="4855" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d231533968e417" title="Wierzbicka, A. The meaning of color terms: Semantics, culture, and cognition. Cognit. Linguist. 1, 99–150. 
                  https://doi.org/10.1515/cogl.1990.1.1.99
                  
                 (1990)."><span data-dcnode-id="4856" instrument_node="">7</span></a><span data-dcnode-id="4854" instrument_node="">,</span><a data-dcnode-id="4852" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d231533968e417_1" title="Rivers, W. H. R. Primitive Color Vision Vol. 59 (Popular Science Monthly, 1901)."><span data-dcnode-id="4853" instrument_node="">8</span></a><span data-dcnode-id="4851" instrument_node="">,</span><a data-dcnode-id="4849" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d231533968e417_2" title="Brown, A. M. &amp; Lindsey, D. T. Color and language: Worldwide distribution of Daltonism and distinct words for “blue”. Visual Neurosci. 21, 409–412. 
                  https://doi.org/10.1017/S0952523804213098
                  
                 (2004)."><span data-dcnode-id="4850" instrument_node="">9</span></a><span data-dcnode-id="4848" instrument_node="">,</span><a aria-label="Reference 10" data-dcnode-id="4846" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d231533968e420" title="Webster, M. A., Mizokami, Y. &amp; Webster, S. M. Seasonal variations in the color statistics of natural images. Network 18, 213–233. 
                  https://doi.org/10.1080/09548980701654405
                  
                 (2007)."><span data-dcnode-id="4847" instrument_node="">10</span></a></sup><span data-dcnode-id="4844" instrument_node="">, suggesting that languages spoken in different environments may categorize the color continuum in different ways. An alternative account appeals to cultural practices, such as the presence of dyeing technologies</span><sup data-dcnode-id="4835"><a aria-label="Reference 1" data-dcnode-id="4842" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d231533968e424" title="Berlin, B. &amp; Kay, P. Basic Color Terms: Their Universality and Evolution (University of California Press, 1969)."><span data-dcnode-id="4843" instrument_node="">1</span></a><span data-dcnode-id="4841" instrument_node="">,</span><a aria-label="Reference 11" data-dcnode-id="4839" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d231533968e427" title="Conklin, H. C. Color categorization. Am. Anthropol. 75, 931–942 (1973)."><span data-dcnode-id="4840" instrument_node="">11</span></a><span data-dcnode-id="4838" instrument_node="">,</span><a aria-label="Reference 12" data-dcnode-id="4836" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d231533968e430" title="Levinson, S. C. Yeli Dnye and the theory of basic color terms. J. Linguist. Anthropol. 10, 3–55. 
                  https://doi.org/10.1525/jlin.2000.10.1.3
                  
                 (2000)."><span data-dcnode-id="4837" instrument_node="">12</span></a></sup><span data-dcnode-id="4834" instrument_node=""> and industrialization</span><sup data-dcnode-id="4831"><a aria-label="Reference 3" data-dcnode-id="4832" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d231533968e434" title="Gibson, E. et al. Color naming across languages reflects color use. Proc. Natl. Acad. Sci. 114, 10785–10790. 
                  https://doi.org/10.1073/pnas.1619666114
                  
                 (2017)."><span data-dcnode-id="4833" instrument_node="">3</span></a></sup><span data-dcnode-id="4830" instrument_node="">. On this account, the emergence of blue comes about in those societies where blue dyes are used to color artifacts. More generally, it has been predicted that complex color terminologies (including the presence of blue) emerge in more complex societies</span><sup data-dcnode-id="4821"><a data-dcnode-id="4828" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d231533968e438" title="Levinson, S. C. Yeli Dnye and the theory of basic color terms. J. Linguist. Anthropol. 10, 3–55. 
                  https://doi.org/10.1525/jlin.2000.10.1.3
                  
                 (2000)."><span data-dcnode-id="4829" instrument_node="">12</span></a><span data-dcnode-id="4827" instrument_node="">,</span><a data-dcnode-id="4825" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d231533968e438_1" title="Naroll, R. What have we learned from cross-cultural surveys?. Am. Anthropol. 72, 1227–1288. 
                  https://doi.org/10.1525/aa.1970.72.6.02a00030
                  
                 (1970)."><span data-dcnode-id="4826" instrument_node="">13</span></a><span data-dcnode-id="4824" instrument_node="">,</span><a aria-label="Reference 14" data-dcnode-id="4822" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d231533968e441" title="Ember, M. Size of color lexicon: Interaction of cultural and biological factors. Am. Anthropol. 80, 364–367. 
                  https://doi.org/10.1525/aa.1978.80.2.02a00100
                  
                 (1978)."><span data-dcnode-id="4823" instrument_node="">14</span></a></sup><span data-dcnode-id="4820" instrument_node="">.</span></p><p data-dcnode-id="4736"><span data-dcnode-id="4818" instrument_node="">A third explanation for the emergence of blue is grounded in physiology</span><sup data-dcnode-id="4812"><a aria-label="Reference 15" data-dcnode-id="4816" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d231533968e448" title="Bornstein, M. H. Color vision and color naming: A psychophysiological hypothesis of cultural difference. Psychol. Bull. 80, 257–285. 
                  https://doi.org/10.1037/h0034837
                  
                 (1973)."><span data-dcnode-id="4817" instrument_node="">15</span></a><span data-dcnode-id="4815" instrument_node="">,</span><a aria-label="Reference 16" data-dcnode-id="4813" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d231533968e451" title="Lindsey, D. T. &amp; Brown, A. M. Color naming and the phototoxic effects of sunlight on the eye. Psychol. Sci. 13, 506–512. 
                  https://doi.org/10.1111/1467-9280.00489
                  
                 (2002)."><span data-dcnode-id="4814" instrument_node="">16</span></a></sup><span data-dcnode-id="4811" instrument_node="">. It has been suggested that increased exposure to ultraviolet light, specifically to UV-B, affects the physiology of the lens of the eye</span><sup data-dcnode-id="4793"><a data-dcnode-id="4809" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d231533968e455" title="Hammond, B. R. The visual effects of intraocular colored filters. Scientifica 1–18, 2012. 
                  https://doi.org/10.6064/2012/424965

                  https://doi.org/10.1007/BF01203684
                  
                 (1995)."><span data-dcnode-id="4804" instrument_node="">19</span></a><span data-dcnode-id="4802" instrument_node="">,</span><a data-dcnode-id="4800" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d231533968e455_3" title="Werner, J. S., Peterzell, D. H. &amp; Scheetz, A. J. Light, vision, and aging. Optomet. Vis. Sci. 67, 214–229. 
                  https://doi.org/10.1097/00006324-199003000-00013
                  
                 (1990)."><span data-dcnode-id="4801" instrument_node="">20</span></a><span data-dcnode-id="4799" instrument_node="">,</span><a data-dcnode-id="4797" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d231533968e455_4" title="Young, R. W. Age-Related Cataract (Oxford University Press Inc, 1990)."><span data-dcnode-id="4798" instrument_node="">21</span></a><span data-dcnode-id="4796" instrument_node="">,</span><a aria-label="Reference 22" data-dcnode-id="4794" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d231533968e458" title="Pokorny, J., Smith, V. C. &amp; Lutze, M. Aging of the human lens. Appl. Opt. 26, 1437. 
                  https://doi.org/10.1364/AO.26.001437
                  
                 (1987)."><span data-dcnode-id="4795" instrument_node="">22</span></a></sup><span data-dcnode-id="4792" instrument_node="">, increasing, in the long term, lens opacity</span><sup data-dcnode-id="4786"><a aria-label="Reference 23" data-dcnode-id="4790" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d231533968e462" title="Hightower, K. R. The role of the lens epithelium in development of UV cataract. Curr. Eye Res. 14, 71–78. 
                  https://doi.org/10.3109/02713689508999916
                  
                 (1995)."><span data-dcnode-id="4791" instrument_node="">23</span></a><span data-dcnode-id="4789" instrument_node="">,</span><a aria-label="Reference 24" data-dcnode-id="4787" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d231533968e465" title="West, S. K. et al. Sunlight exposure and risk of lens opacities in a population-based study: The salisbury eye evaluation project. JAMA 280, 714–718. 
                  https://doi.org/10.1001/jama.280.8.714
                  
                 (1998)."><span data-dcnode-id="4788" instrument_node="">24</span></a></sup><span data-dcnode-id="4785" instrument_node=""> and yellow pigmentation density inside the lens</span><sup data-dcnode-id="4782"><a aria-label="Reference 25" data-dcnode-id="4783" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d231533968e469" title="Young, R. W. The family of sunlight-related eye diseases. Optom. Vis. Sci. 71, 125–144. 
                  https://doi.org/10.1097/00006324-199402000-00013
                  
                 (1994)."><span data-dcnode-id="4784" instrument_node="">25</span></a></sup><span data-dcnode-id="4781" instrument_node="">, which affects in turn how light reaches the retina (Fig.&nbsp;</span><a data-dcnode-id="4779" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4780" instrument_node="">1</span></a><span data-dcnode-id="4778" instrument_node=""> Panel D). This process of lens brunescence, where yellow pigments absorb short-wavelength (blue) before reaching the retina, may reduce the ability to perceive the blue part of the color spectrum</span><sup data-dcnode-id="4766"><a data-dcnode-id="4776" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d231533968e477" title="Werner, J.&nbsp;S., Schefrin, B.&nbsp;E. &amp; Bradley, A. Optics and vision of the aging eye. In Handbook of Optics, Vol.&nbsp;3, 20–30 (McGraw-Hill, 2010)."><span data-dcnode-id="4777" instrument_node="">26</span></a><span data-dcnode-id="4775" instrument_node="">,</span><a data-dcnode-id="4773" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d231533968e477_1" title="Delahunt, P. B., Webster, M. A., Ma, L. &amp; Werner, J. S. Long-term renormalization of chromatic mechanisms following cataract surgery. Vis. Neurosci. 21, 301–307. 
                  https://doi.org/10.1017/S0952523804213025
                  
                 (2004)."><span data-dcnode-id="4774" instrument_node="">27</span></a><span data-dcnode-id="4772" instrument_node="">,</span><a data-dcnode-id="4770" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d231533968e477_2" title="Tregillus, K. E. M., Werner, J. S. &amp; Webster, M. A. Adjusting to a sudden “aging” of the lens. J. Opt. Soc. Am. A33, 129.

                  https://doi.org/10.1113/jphysiol.1988.sp016935
                  
                 (1988)."><span data-dcnode-id="4768" instrument_node="">29</span></a></sup><span data-dcnode-id="4765" instrument_node=""> (Fig.&nbsp;</span><a data-dcnode-id="4763" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4764" instrument_node="">1</span></a><span data-dcnode-id="4762" instrument_node=""> Panel E), increasing the probability that a single ‘grue’ term combining ’blue’ and ’green’ is used instead. That is, there is no distinct lexicalization of ‘blue’</span><sup data-dcnode-id="4756"><a aria-label="Reference 16" data-dcnode-id="4760" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d231533968e487" title="Lindsey, D. T. &amp; Brown, A. M. Color naming and the phototoxic effects of sunlight on the eye. Psychol. Sci. 13, 506–512. 
                  https://doi.org/10.1111/1467-9280.00489
                  
                 (2002)."><span data-dcnode-id="4761" instrument_node="">16</span></a><span data-dcnode-id="4759" instrument_node="">,</span><a aria-label="Reference 30" data-dcnode-id="4757" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d231533968e490" title="Walter, S. Perceiving “grue”: filter simulations of aged lenses support the lens-brunescence hypothesis and reveal individual categorization types. In Biggam, C.&nbsp;P., Hough, C., Kay, C. &amp; Simmons, D.&nbsp;R. (eds.) New Directions in Colour Studies, 329–342. 
                  https://doi.org/10.1075/z.167.37wal
                  
                 (John Benjamins Publishing Company, 2011)."><span data-dcnode-id="4758" instrument_node="">30</span></a></sup><span data-dcnode-id="4755" instrument_node="">. Lens brunescence is driven by environmental exposure to UV-B radiation which is related to </span><i data-dcnode-id="4753"><span data-dcnode-id="4754" instrument_node="">latitude</span></i><span data-dcnode-id="4752" instrument_node=""> (locations closer to the equator receive more sunlight than those closer to the poles), </span><i data-dcnode-id="4750"><span data-dcnode-id="4751" instrument_node="">altitude</span></i><span data-dcnode-id="4749" instrument_node=""> (higher elevations have less ozone filtering), </span><i data-dcnode-id="4747"><span data-dcnode-id="4748" instrument_node="">climate</span></i><span data-dcnode-id="4746" instrument_node=""> and </span><i data-dcnode-id="4744"><span data-dcnode-id="4745" instrument_node="">humidity</span></i><span data-dcnode-id="4743" instrument_node=""> (cloud coverage), </span><i data-dcnode-id="4741"><span data-dcnode-id="4742" instrument_node="">vegetation</span></i><span data-dcnode-id="4740" instrument_node=""> (close versus open environments), and </span><i data-dcnode-id="4738"><span data-dcnode-id="4739" instrument_node="">culture</span></i><span data-dcnode-id="4737" instrument_node=""> (amount and type of outdoor activity). This predicts that in populations with high exposure to UV-B radiation, the persistent loss of sensitivity to blue in adults across generations should generate negative pressure against the development of a ‘blue’ category or a tendency to lose it, while in populations with low exposure to UV-B incidence, other processes may proceed unhindered enabling the emergence and retention of ‘blue’. If true, we should observe a statistical tendency for fewer languages with a dedicated word for blue at high UV-B incidence (particularly close to the equator).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4624" data-test="figure" data-title="Figure 1" id="figure-1"><figure data-dcnode-id="4625"><figcaption data-dcnode-id="4733"><b class="c-article-section__figure-caption" data-dcnode-id="4734" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="4735" instrument_node="">Figure 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4636"><div class="c-article-section__figure-item" data-dcnode-id="4728"><a class="c-article-section__figure-link" data-dcnode-id="4729" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-98550-3/figures/1" rel="nofollow"><picture data-dcnode-id="4730"><source data-dcnode-id="4732" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-98550-3/MediaObjects/41598_2021_98550_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="4731" height="601" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-98550-3/MediaObjects/41598_2021_98550_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4637" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="4638"><span data-dcnode-id="4727" instrument_node="">(Panel </span><b data-dcnode-id="4725"><span data-dcnode-id="4726" instrument_node="">A</span></b><span data-dcnode-id="4724" instrument_node="">): Map of languages and populations in our data. Each circle represents one language and corresponding population, with the presence (blue) or absence (yellow) for a specific term for ’blue’. The circle radius is proportional to the population frequency of red/green abnormal color perception. The intensity of the background magenta is proportional to the incidence of UV-B radiation as given by the NASA </span><i data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">Total Ozone Mapping Spectrometer</span></i><span data-dcnode-id="4721" instrument_node=""> (TOMS) for the year 1998. This map was generated with the package </span><span class="u-monospace" data-dcnode-id="4719"><span data-dcnode-id="4720" instrument_node="">maps</span></span><span data-dcnode-id="4718" instrument_node=""> in </span><span class="u-monospace" data-dcnode-id="4716"><span data-dcnode-id="4717" instrument_node="">R</span></span><span data-dcnode-id="4715" instrument_node=""> version </span><span class="u-monospace" data-dcnode-id="4713"><span data-dcnode-id="4714" instrument_node="">4.0.5</span></span><sup data-dcnode-id="4710"><a aria-label="Reference 59" data-dcnode-id="4711" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d231533968e537" title="R Core Team. R: A Language and Environment for Statistical Computing (R Foundation for Statistical Computing, 2021)."><span data-dcnode-id="4712" instrument_node="">59</span></a></sup><span data-dcnode-id="4709" instrument_node="">, which uses public domain data from the </span><i data-dcnode-id="4707"><span data-dcnode-id="4708" instrument_node="">Natural Earth</span></i><span data-dcnode-id="4706" instrument_node=""> project </span><a data-dcnode-id="4704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.naturalearthdata.com/"><span data-dcnode-id="4705" instrument_node="">https://www.naturalearthdata.com</span></a><span data-dcnode-id="4703" instrument_node="">. (Panel </span><b data-dcnode-id="4701"><span data-dcnode-id="4702" instrument_node="">B</span></b><span data-dcnode-id="4700" instrument_node="">): Posterior density plots of the best predictors of the presence of a word for blue across Bayesian regression models. (Panel </span><b data-dcnode-id="4698"><span data-dcnode-id="4699" instrument_node="">C</span></b><span data-dcnode-id="4697" instrument_node="">): Posterior density plots of the best predictors of the frequency of red-green abnormal color perception across Bayesian regression models. The plots in panels (</span><b data-dcnode-id="4695"><span data-dcnode-id="4696" instrument_node="">B</span></b><span data-dcnode-id="4694" instrument_node="">) and (</span><b data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">C</span></b><span data-dcnode-id="4691" instrument_node="">) are based on the analyses detailed in the “</span><a data-dcnode-id="4689" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="4690" instrument_node="">Results</span></a><span data-dcnode-id="4688" instrument_node="">” section and were generated using </span><span class="u-monospace" data-dcnode-id="4686"><span data-dcnode-id="4687" instrument_node="">R</span></span><sup data-dcnode-id="4683"><a aria-label="Reference 59" data-dcnode-id="4684" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d231533968e570" title="R Core Team. R: A Language and Environment for Statistical Computing (R Foundation for Statistical Computing, 2021)."><span data-dcnode-id="4685" instrument_node="">59</span></a></sup><span data-dcnode-id="4682" instrument_node="">. (Panel </span><b data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node="">D</span></b><span data-dcnode-id="4679" instrument_node="">): The lens brunescence hypothesis, as detailed in this paper. UV rays cause the lens to opacify and become yellower (top), filtering blue light, so that the perceived spectrum (on the right) contains less blue and more green, compared to the non-affected eye (bottom). (Panel </span><b data-dcnode-id="4677"><span data-dcnode-id="4678" instrument_node="">E</span></b><span data-dcnode-id="4676" instrument_node="">): A simulation of different types of color perception abnormalities. From left to right: normal vision; one type of red-green abnormal color perception (deuteranopia); strong lens brunescence (yellow filter and darkening of the image); both lens brunescence and deuteranopia, hypothesized to result in decreased biological fitness relative to other color vision types. Background image cropped from a photo by Joydeep Pal on </span><i data-dcnode-id="4674"><span data-dcnode-id="4675" instrument_node="">Unspalsh</span></i><span data-dcnode-id="4673" instrument_node=""> (</span><a data-dcnode-id="4671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/photos/i6kccimZz_8"><span data-dcnode-id="4672" instrument_node="">https://unsplash.com/photos/i6kccimZz_8</span></a><span data-dcnode-id="4670" instrument_node="">) under a free-to-use license (</span><a data-dcnode-id="4668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/license"><span data-dcnode-id="4669" instrument_node="">https://unsplash.com/license</span></a><span data-dcnode-id="4667" instrument_node="">). For deuteranopia we used </span><i data-dcnode-id="4665"><span data-dcnode-id="4666" instrument_node="">Coblis—The Color BLIndness Simulator</span></i><span data-dcnode-id="4664" instrument_node=""> (</span><a data-dcnode-id="4662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.color-blindness.com/coblis-color-blindness-simulator/"><span data-dcnode-id="4663" instrument_node="">https://www.color-blindness.com/coblis-color-blindness-simulator/</span></a><span data-dcnode-id="4661" instrument_node="">) and checked the results with the </span><i data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">Colorblind Web Page Filter</span></i><span data-dcnode-id="4658" instrument_node=""> (</span><a data-dcnode-id="4656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toptal.com/designers/colorfilter"><span data-dcnode-id="4657" instrument_node="">https://www.toptal.com/designers/colorfilter</span></a><span data-dcnode-id="4655" instrument_node="">). The lens brunescence filter is inspired by</span><sup data-dcnode-id="4652"><a aria-label="Reference 30" data-dcnode-id="4653" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d231533968e619" title="Walter, S. Perceiving “grue”: filter simulations of aged lenses support the lens-brunescence hypothesis and reveal individual categorization types. In Biggam, C.&nbsp;P., Hough, C., Kay, C. &amp; Simmons, D.&nbsp;R. (eds.) New Directions in Colour Studies, 329–342. 
                  https://doi.org/10.1075/z.167.37wal
                  
                 (John Benjamins Publishing Company, 2011)."><span data-dcnode-id="4654" instrument_node="">30</span></a></sup><span data-dcnode-id="4651" instrument_node="">: we used </span><span class="u-monospace" data-dcnode-id="4649"><span data-dcnode-id="4650" instrument_node="">Adobe Lightroom</span></span><span data-dcnode-id="4648" instrument_node=""> classic version </span><span class="u-monospace" data-dcnode-id="4646"><span data-dcnode-id="4647" instrument_node="">10.0</span></span><span data-dcnode-id="4645" instrument_node=""> with a yellow filter and darkening to simulate a Kodak yellow filter. For more details, see the “</span><a data-dcnode-id="4643" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="4644" instrument_node="">Results</span></a><span data-dcnode-id="4642" instrument_node="">”, “</span><a data-dcnode-id="4640" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec6"><span data-dcnode-id="4641" instrument_node="">Materials and Methods</span></a><span data-dcnode-id="4639" instrument_node="">” and Supplementary Materials.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4626"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="4627" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-98550-3/figures/1" rel="nofollow"><span data-dcnode-id="4634"><span data-dcnode-id="4635" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4628" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4629" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4630" id="global-i </span></a></div></figure></div><p data-dcnode-id="4607"><span data-dcnode-id="4623" instrument_node="">Previous cross-cultural analyses linking UV-B incidence and the presence of ‘blue’</span><sup data-dcnode-id="4620"><a aria-label="Reference 16" data-dcnode-id="4621" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d231533968e646" title="Lindsey, D. T. &amp; Brown, A. M. Color naming and the phototoxic effects of sunlight on the eye. Psychol. Sci. 13, 506–512. 
                  https://doi.org/10.1111/1467-9280.00489
                  
                 (2002)."><span data-dcnode-id="4622" instrument_node="">16</span></a></sup><span data-dcnode-id="4619" instrument_node=""> may have been biased by the lack of control for various confounds (especially language contact and inheritance from a shared proto-language</span><sup data-dcnode-id="4616"><a aria-label="Reference 31" data-dcnode-id="4617" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d231533968e650" title="Ladd, D. R., Roberts, S. G. &amp; Dediu, D. Correlational studies in typological and historical linguistics. Ann. Rev. Linguist. 1, 221–241. 
                  https://doi.org/10.1146/annurev-linguist-030514-124819
                  
                 (2015)."><span data-dcnode-id="4618" instrument_node="">31</span></a></sup><span data-dcnode-id="4615" instrument_node="">), exclusion of possible alternative explanatory factors (such as cultural complexity, environmental influences), lack of modeling of causal pathways, and the statistical methods used. Therefore, we combine multiple explanatory factors and potential confounds, including language contact generally (since specific data about the borrowing of words for blue is not available for most languages under consideration) and language family, subsistence strategy and population size (as proxies for cultural complexity</span><sup data-dcnode-id="4609"><a aria-label="Reference 32" data-dcnode-id="4613" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d231533968e654" title="Henrich, J. Demography and cultural evolution: How adaptive cultural processes can produce maladaptive losses: The Tasmanian case. Am. Antiq. 69, 197–214. 
                  https://doi.org/10.2307/4128416
                  
                 (2004)."><span data-dcnode-id="4614" instrument_node="">32</span></a><span data-dcnode-id="4612" instrument_node="">,</span><a aria-label="Reference 33" data-dcnode-id="4610" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d231533968e657" title="Powell, A., Shennan, S. &amp; Thomas, M. G. Late Pleistocene demography and the appearance of modern human behavior. Science 324, 1298–1301. 
                  https://doi.org/10.1126/science.1170165
                  
                 (2009)."><span data-dcnode-id="4611" instrument_node="">33</span></a></sup><span data-dcnode-id="4608" instrument_node=""> as systematic, quantitative data about cultural artefacts and dyeing techniques across cultures does not exist), latitude (which partly determines UV-B incidence), climate, ecology and distance to large bodies of water (as proxies for various environmental influences) using a comprehensive database and advanced statistical methods. In doing so, we not only test the role of UV-B light on the development of the color lexicon, but also explicate the extent to which additional hypothesized factors shape the presence of a specific term for blue, and where relevant through which causal pathways specifically.</span></p><p data-dcnode-id="4595"><span data-dcnode-id="4606" instrument_node="">Environmentally-induced (or acquired) abnormal color perception is not the only type of color deficiency. Notably, inherited red-green color-blindness has a relatively simple genetic basis where certain alleles at the opsin genes on the X chromosome encode for abnormal pigments, resulting in a higher incidence of abnormal color perception in males specifically affecting the low (red) and mid (green) frequencies of the visual spectrum (Fig.&nbsp;</span><a data-dcnode-id="4604" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4605" instrument_node="">1</span></a><span data-dcnode-id="4603" instrument_node=""> Panel E). It has previously been suggested that a subsistence strategy based on hunting and gathering might generate selective pressures against red-green abnormal color perception due to the high survival relevance of these colors in the wild, while the transition to agriculture and, in particular the industrial revolution, may have greatly relaxed these pressures</span><sup data-dcnode-id="4597"><a aria-label="Reference 34" data-dcnode-id="4601" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d231533968e668" title="Stark, A. E. On random and systematic variation in the prevalence of defective color vision. Twin Res. Hum. Genet.
                  https://doi.org/10.1017/thg.2020.74
                  
                 (2020)."><span data-dcnode-id="4602" instrument_node="">34</span></a><span data-dcnode-id="4600" instrument_node="">,</span><a aria-label="Reference 35" data-dcnode-id="4598" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d231533968e671" title="Adam, A. A further query on color blindness and natural selection. Soc. Biol. 16, 197–208. 
                  https://doi.org/10.1080/19485565.1969.9987819
                  
                 (1969)."><span data-dcnode-id="4599" instrument_node="">35</span></a></sup><span data-dcnode-id="4596" instrument_node="">.</span></p><p data-dcnode-id="4586"><span data-dcnode-id="4594" instrument_node="">Moreover, these two broad types of abnormal color perception could interact with each other. At the individual level, for somebody already affected by a relatively profound red-green deficiency, also acquiring lens brunescence would have devastating effects on the ability to use color (Fig.&nbsp;</span><a data-dcnode-id="4592" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4593" instrument_node="">1</span></a><span data-dcnode-id="4591" instrument_node=""> Panel E), and may affect survival and possibly the ability to produce and raise offspring. This predicts that, despite their different and a priori independent causal mechanisms (environmental exposure vs genetic), a negative correlation between the two could emerge across evolutionary time, in that there may be stronger selective pressure against the alleles responsible for red-green abnormal color perception in populations with high UV-B exposure, leading across generations to an overall lower frequency of such inherited abnormalities in these populations</span><sup data-dcnode-id="4588"><a aria-label="Reference 9" data-dcnode-id="4589" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d231533968e681" title="Brown, A. M. &amp; Lindsey, D. T. Color and language: Worldwide distribution of Daltonism and distinct words for “blue”. Visual Neurosci. 21, 409–412. 
                  https://doi.org/10.1017/S0952523804213098
                  
                 (2004)."><span data-dcnode-id="4590" instrument_node="">9</span></a></sup><span data-dcnode-id="4587" instrument_node="">. Here, we not only test the hypothesis that there is a negative relationship between UV-B incidence and the population frequency of red-green color deficiency using advanced methods and controls, we also include the potential influence of subsistence strategy.</span></p><p data-dcnode-id="4578"><span data-dcnode-id="4585" instrument_node="">In summary, we test two main hypotheses, one linking the existence of a dedicated word for blue to UV-B incidence while simultaneously controlling for other factors, and a second concerning the selective pressures against abnormal red-green vision in different environments. We do so on a large dataset of 142 populations (Fig.&nbsp;</span><a data-dcnode-id="4583" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4584" instrument_node="">1</span></a><span data-dcnode-id="4582" instrument_node=""> Panel A) speaking languages from 32 families across the world, for which we collected information about the existence of a dedicated word for blue, the incidence of ultraviolet light, and the frequency of red-green color deficiency, as well as data on elevation, population size, subsistence strategy, climate, ecology, distance to large bodies of water, and several additional variables concerning the populations and physical environments they inhabit (see Methods and Supplementary Materials). We used Bayesian hierarchical regression, mediation and path analysis, and various machine learning techniques, informed by previous research and causal modeling, to specifically test these hypotheses in a comprehensive manner. We found that both hypotheses were by and large supported, but importantly they only captured part of the overall picture (Fig.&nbsp;</span><a data-dcnode-id="4580" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4581" instrument_node="">1</span></a><span data-dcnode-id="4579" instrument_node=""> Panels B and C). While variation in UV-B incidence (ultimately due to variation in latitude) was the most important predictor of ‘blue’, population size and distance to large bodies of standing water also played a role, with their effects mediated by climate and subsistence strategy. Likewise, there was a lower frequency of people with red-green color deficiency in populations closer to the equator (i.e., with more lens brunescence), and whose languages lacked a dedicated word for blue.</span></p></div></div></section><section data-dcnode-id="3972" data-title="Results"><div class="c-article-section" data-dcnode-id="3973" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4573" id="Sec2"><span data-dcnode-id="4574" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="3974" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="4571" id="Sec3"><span data-dcnode-id="4572" instrument_node="">UV-B incidence predicts the existence of a specific word for blue</span></h3><p data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">Here we tested the hypothesis that the incidence of UV (in particular, UV-B) predicts the existence of a specific word for blue, taking into consideration various potential confounds and causal pathways.</span></p><p data-dcnode-id="4437"><span data-dcnode-id="4568" instrument_node="">Both UV-A and UV-B affected </span><i data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">blue</span></i><span data-dcnode-id="4565" instrument_node=""> negatively (here, </span><i data-dcnode-id="4563"><span data-dcnode-id="4564" instrument_node="">blue</span></i><span data-dcnode-id="4562" instrument_node=""> is the dichotomous variable ‘is there a specific term for blue in the language?’, italics indicate variable names; for more information about the variables, see Methods): UV-A: </span><span class="mathjax-tex" data-dcnode-id="4560"><span data-dcnode-id="4561" instrument_node="">\(\beta = -1.03\)</span></span><span data-dcnode-id="4559" instrument_node="">, 95%HDI = </span><span class="mathjax-tex" data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">\([-1.65, -0.38]\)</span></span><span data-dcnode-id="4556" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">\(p(\beta =0) = 0.0154\)</span></span><span data-dcnode-id="4553" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">\(p(\beta &lt;0) = 1\)</span></span><span data-dcnode-id="4550" instrument_node="">; UV-B:</span><span class="mathjax-tex" data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">\(\beta = -1.12 [-1.75, -0.55]\)</span></span><span data-dcnode-id="4547" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">\(p(\beta =0) = 0.0128\)</span></span><span data-dcnode-id="4544" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">\(p(\beta &lt;0) = 1\)</span></span><span data-dcnode-id="4541" instrument_node="">. Please note that for such Bayesian regression results we report the slope, </span><span class="mathjax-tex" data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">\(\beta\)</span></span><span data-dcnode-id="4538" instrument_node="">, of the fixed effect(s) of interest in terms of their mean and 95% HDI (Highest Density Interval), as well as specific tests that capture the posterior probability that the hypothesis is true (i.e., they should be interpreted directly, and not as frequentist </span><i data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">p</span></i><span data-dcnode-id="4535" instrument_node="">-values in terms of the probability of seeing such a result were the null hypothesis true); also, while directional hypotheses should be </span><i data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">a priori</span></i><span data-dcnode-id="4532" instrument_node=""> motivated, point hypothesis do not have the same requirement. However, as UV-A and UV-B were highly multicollinear (</span><span class="mathjax-tex" data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">\(VIF_{mean UVA} = 36.3\)</span></span><span data-dcnode-id="4529" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4527"><span data-dcnode-id="4528" instrument_node="">\(VIF_{mean UVB} = 36.3\)</span></span><span data-dcnode-id="4526" instrument_node="">) and UV-A fitted the data worse than UV-B (</span><span class="mathjax-tex" data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">\(BF = 0.31\)</span></span><span data-dcnode-id="4523" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">\(LOO = -1.29\pm 0.77\)</span></span><span data-dcnode-id="4520" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">\(WAIC = -1.13\pm 0.77\)</span></span><span data-dcnode-id="4517" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">\(KFOLD = -1.20\pm 1.63\)</span></span><span data-dcnode-id="4514" instrument_node="">; for such comparisons between two models, </span><span class="mathjax-tex" data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">\(m_{1}\)</span></span><span data-dcnode-id="4511" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">\(m_{2}\)</span></span><span data-dcnode-id="4508" instrument_node="">, we report the Bayes Factor, BF, ideally &lt; 0.033 or &gt; 10, as well as the LOO, WAIC and KFOLD as the difference in the Expected Log pointwise Predictive Density, ELPD, between the two models and its standard error, for which the absolute difference should be larger than the standard error; ideally, all these criteria should agree, but they capture </span><i data-dcnode-id="4506"><span data-dcnode-id="4507" instrument_node="">a priori</span></i><span data-dcnode-id="4505" instrument_node=""> different aspects of model comparison</span><sup data-dcnode-id="4502"><a aria-label="Reference 36" data-dcnode-id="4503" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d231533968e1251" title="McElreath, R. Statistical Rethinking: A Bayesian Course with Examples in R and Stan. CRC Texts in Statistical Science, 2 edn. (Taylor and Francis, 2020)."><span data-dcnode-id="4504" instrument_node="">36</span></a></sup><span data-dcnode-id="4501" instrument_node="">), we retained only UV-B in the following analyses. The variable </span><i data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">blue</span></i><span data-dcnode-id="4498" instrument_node=""> was positively affected by </span><i data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">latitude</span></i><span data-dcnode-id="4495" instrument_node=""> (</span><span class="mathjax-tex" data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">\(\beta = 4.39 [0.82, 8.01]\)</span></span><span data-dcnode-id="4492" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4490"><span data-dcnode-id="4491" instrument_node="">\(p(\beta =0) = 0.068\)</span></span><span data-dcnode-id="4489" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4487"><span data-dcnode-id="4488" instrument_node="">\(p(\beta &lt;0) = 0.99\)</span></span><span data-dcnode-id="4486" instrument_node="">), </span><i data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">population size</span></i><span data-dcnode-id="4483" instrument_node=""> (</span><span class="mathjax-tex" data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">\(\beta = 0.31 [0.16, 0.48]\)</span></span><span data-dcnode-id="4480" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">\(p(\beta =0) = 3.8 \times 10^{-7})\)</span></span><span data-dcnode-id="4477" instrument_node=""> and </span><i data-dcnode-id="4475"><span data-dcnode-id="4476" instrument_node="">climate PC1</span></i><span data-dcnode-id="4474" instrument_node=""> (</span><span class="mathjax-tex" data-dcnode-id="4472"><span data-dcnode-id="4473" instrument_node="">\(\beta = 0.99 [0.40, 1.57]\)</span></span><span data-dcnode-id="4471" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node="">\(p(\beta =0) = 0.035\)</span></span><span data-dcnode-id="4468" instrument_node="">), and negatively by </span><i data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">distance to lakes</span></i><span data-dcnode-id="4465" instrument_node=""> (</span><span class="mathjax-tex" data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">\(\beta = -0.56 [-0.87, -0.27]\)</span></span><span data-dcnode-id="4462" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">\(p(\beta =0) = 0.0074\)</span></span><span data-dcnode-id="4459" instrument_node="">). Furthermore, 4 of the 10 dimensions, resulting from the multidimensional scaling (MDS) of the matrix of genetic distances (</span><span class="mathjax-tex" data-dcnode-id="4457"><span data-dcnode-id="4458" instrument_node="">\(F_{ST}\)</span></span><sup data-dcnode-id="4454"><a aria-label="Reference 37" data-dcnode-id="4455" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d231533968e1660" title="Holsinger, K. E. &amp; Weir, B. S. Genetics in geographically structured populations: Defining, estimating and interpreting FST. Nat. Rev. Genet. 10, 639–650. 
                  https://doi.org/10.1038/nrg2611
                  
                 (2009)."><span data-dcnode-id="4456" instrument_node="">37</span></a></sup><span data-dcnode-id="4453" instrument_node="">) between all pairs of populations, also affected </span><i data-dcnode-id="4451"><span data-dcnode-id="4452" instrument_node="">blue</span></i><span data-dcnode-id="4450" instrument_node=""> (positively for </span><i data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">genetic D7</span></i><span data-dcnode-id="4447" instrument_node="">, and negatively for </span><i data-dcnode-id="4445"><span data-dcnode-id="4446" instrument_node="">genetic D1</span></i><span data-dcnode-id="4444" instrument_node="">, </span><i data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">genetic D4</span></i><span data-dcnode-id="4441" instrument_node=""> and </span><i data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">genetic D6</span></i><span data-dcnode-id="4438" instrument_node="">; see Supplementary Materials).</span></p><p data-dcnode-id="4318"><span data-dcnode-id="4436" instrument_node="">The mediation analysis (Fig.&nbsp;</span><a data-dcnode-id="4434" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4435" instrument_node="">2</span></a><span data-dcnode-id="4433" instrument_node=""> Panel B) shows that </span><i data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">latitude</span></i><span data-dcnode-id="4430" instrument_node=""> has a positive </span><i data-dcnode-id="4428"><span data-dcnode-id="4429" instrument_node="">total effect</span></i><span data-dcnode-id="4427" instrument_node=""> (</span><i data-dcnode-id="4425"><span data-dcnode-id="4426" instrument_node="">TE</span></i><span data-dcnode-id="4424" instrument_node=""> = 5.7, 95%HDI [2.3,&nbsp;9.6]) on the presence of a distinct word for </span><i data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">blue</span></i><span data-dcnode-id="4421" instrument_node="">. There was a negative </span><i data-dcnode-id="4419"><span data-dcnode-id="4420" instrument_node="">direct effect</span></i><span data-dcnode-id="4418" instrument_node=""> (</span><i data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">DE</span></i><span data-dcnode-id="4415" instrument_node=""> = </span><span class="mathjax-tex" data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">\(-7.4 [-17.9, 2.4]\)</span></span><span data-dcnode-id="4412" instrument_node="">), as well as a positive </span><i data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">indirect effect</span></i><span data-dcnode-id="4409" instrument_node=""> mediated by </span><i data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">UV-B</span></i><span data-dcnode-id="4406" instrument_node=""> (</span><i data-dcnode-id="4404"><span data-dcnode-id="4405" instrument_node="">IE</span></i><span data-dcnode-id="4403" instrument_node=""> = 13.0[3.6,&nbsp;23.1]; </span><span class="mathjax-tex" data-dcnode-id="4401"><span data-dcnode-id="4402" instrument_node="">\(\beta _{latitude \rightarrow UVB} = -5.8 [-6.2, -5.3]\)</span></span><span data-dcnode-id="4400" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">\(\beta _{UVB \rightarrow blue | latitude} = -2.3 [-4.0, -0.6]\)</span></span><span data-dcnode-id="4397" instrument_node="">). We explored other mediation models (see Supplementary Materials) which, taken together, suggest that </span><i data-dcnode-id="4395"><span data-dcnode-id="4396" instrument_node="">distance to lakes</span></i><span data-dcnode-id="4394" instrument_node=""> also mediates between </span><i data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">latitude</span></i><span data-dcnode-id="4391" instrument_node=""> and </span><i data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">blue</span></i><span data-dcnode-id="4388" instrument_node="">, and that </span><i data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">subsistence</span></i><span data-dcnode-id="4385" instrument_node=""> is linked to </span><i data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">blue</span></i><span data-dcnode-id="4382" instrument_node=""> through </span><i data-dcnode-id="4380"><span data-dcnode-id="4381" instrument_node="">population size</span></i><span data-dcnode-id="4379" instrument_node="">. We also constructed a complex (but largely theoretically motivated and conservative) path model (Fig.&nbsp;</span><a data-dcnode-id="4377" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4378" instrument_node="">2</span></a><span data-dcnode-id="4376" instrument_node=""> Panel A) linking </span><i data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">latitude</span></i><span data-dcnode-id="4373" instrument_node=""> and </span><i data-dcnode-id="4371"><span data-dcnode-id="4372" instrument_node="">blue</span></i><span data-dcnode-id="4370" instrument_node=""> through </span><i data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">UV-B</span></i><span data-dcnode-id="4367" instrument_node=""> and controlling for potential confounds. This model fitted the data very well (</span><span class="mathjax-tex" data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">\(\chi ^2(1) = 0.4\)</span></span><span data-dcnode-id="4364" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">\(p = 0.53\)</span></span><span data-dcnode-id="4361" instrument_node="">; </span><span class="mathjax-tex" data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">\(CFI = 1.0\)</span></span><span data-dcnode-id="4358" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4356"><span data-dcnode-id="4357" instrument_node="">\(TLI = 1.05\)</span></span><span data-dcnode-id="4355" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4353"><span data-dcnode-id="4354" instrument_node="">\(NNFI = 1.05\)</span></span><span data-dcnode-id="4352" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">\(RMSEA = 0.0\)</span></span><span data-dcnode-id="4349" instrument_node="">) and, importantly, showed that the effect of </span><i data-dcnode-id="4347"><span data-dcnode-id="4348" instrument_node="">latitude</span></i><span data-dcnode-id="4346" instrument_node=""> on </span><i data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">blue</span></i><span data-dcnode-id="4343" instrument_node=""> is fully mediated not only by </span><i data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">UV-B</span></i><span data-dcnode-id="4340" instrument_node=""> (</span><span class="mathjax-tex" data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">\(\beta _{latitude \rightarrow UVB} = -0.96\)</span></span><span data-dcnode-id="4337" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">\(p &lt; 0.001\)</span></span><span data-dcnode-id="4334" instrument_node="">, and </span><span class="mathjax-tex" data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">\(\beta _{UVB \rightarrow blue} = -0.65\)</span></span><span data-dcnode-id="4331" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">\(p = 0.032\)</span></span><span data-dcnode-id="4328" instrument_node="">), but also by </span><i data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">subsistence</span></i><span data-dcnode-id="4325" instrument_node="">, </span><i data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">population size</span></i><span data-dcnode-id="4322" instrument_node=""> and </span><i data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">distance to lakes</span></i><span data-dcnode-id="4319" instrument_node="">.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4261" data-test="figure" data-title="Figure 2" id="figure-2"><figure data-dcnode-id="4262"><figcaption data-dcnode-id="4315"><b class="c-article-section__figure-caption" data-dcnode-id="4316" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="4317" instrument_node="">Figure 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4273"><div class="c-article-section__figure-item" data-dcnode-id="4310"><a class="c-article-section__figure-link" data-dcnode-id="4311" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-98550-3/figures/2" rel="nofollow"><picture data-dcnode-id="4312"><source data-dcnode-id="4314" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-98550-3/MediaObjects/41598_2021_98550_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="4313" height="803" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-98550-3/MediaObjects/41598_2021_98550_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4274" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="4275"><span data-dcnode-id="4309" instrument_node="">Mediation and path analyses for the presence of a distinct word for blue. (Panel </span><b data-dcnode-id="4307"><span data-dcnode-id="4308" instrument_node="">A</span></b><span data-dcnode-id="4306" instrument_node=""> top): Path model with standardized coefficients (line thickness) and </span><i data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">p</span></i><span data-dcnode-id="4303" instrument_node="">-values (stars). Single-headed arrows represent regressions, while double-headed arrows represent covariances. Edges: solid blue = significant negative effects (at alpha-level 0.05), solid red = significant positive effects, and dotted gray = not significant. The thickness of the line indicates effect size, with a thick line indicating an effect size </span><span class="mathjax-tex" data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">\(&gt;= 0.5\)</span></span><span data-dcnode-id="4300" instrument_node=""> and thin effect size </span><span class="mathjax-tex" data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">\(&lt; 0.5\)</span></span><span data-dcnode-id="4297" instrument_node="">; significance stars near each arrow (*** for </span><span class="mathjax-tex" data-dcnode-id="4295"><span data-dcnode-id="4296" instrument_node="">\(p&lt;=0.001\)</span></span><span data-dcnode-id="4294" instrument_node="">; ** for </span><span class="mathjax-tex" data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">\(p&lt;=0.01\)</span></span><span data-dcnode-id="4291" instrument_node=""> and * for </span><span class="mathjax-tex" data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">\(p&lt;=.0.05\)</span></span><span data-dcnode-id="4288" instrument_node="">). (Panel </span><b data-dcnode-id="4286"><span data-dcnode-id="4287" instrument_node="">B</span></b><span data-dcnode-id="4285" instrument_node=""> bottom): Mediation analysis showing the total, direct, and indirect effects (as point estimate with 95% HDI and p-values), as well as regression coefficients (as point estimates with </span><i data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">p</span></i><span data-dcnode-id="4282" instrument_node="">-values in parentheses). Note, because the outcome is binary, the direct and indirect effects may be on different scales. Icons made by Freepik </span><a data-dcnode-id="4280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freepik.com/"><span data-dcnode-id="4281" instrument_node="">https://www.freepik.com</span></a><span data-dcnode-id="4279" instrument_node=""> from Flaticon </span><a data-dcnode-id="4277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flaticon.com/"><span data-dcnode-id="4278" instrument_node="">https://www.flaticon.com/</span></a><span data-dcnode-id="4276" instrument_node="">.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4263"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="4264" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-98550-3/figures/2" rel="nofollow"><span data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4265" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4266" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4267" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4270" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4269" fill-rule="evenodd"></path><span data-dcnode-id="4268" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="4247"><span data-dcnode-id="4260" instrument_node="">The presence of a distinct term for </span><i data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">blue</span></i><span data-dcnode-id="4257" instrument_node=""> was predicted by information in the full dataset using Bayesian mixed-effects logistic regression with family and macroarea as random effects, the conditional random trees, the random and conditional random forests, and the Support Vector Machines, with very little difference between them (accuracy from 76% for random forests to 91% for the Bayesian mixed-effects model). Moreover, all techniques generalized well and had comparable performance (as expected, lower on the testing sets than on the full database), the best being the conditional random forests and conditional trees. Across these, the most important predictors tended to be (not in any particular order): </span><i data-dcnode-id="4255"><span data-dcnode-id="4256" instrument_node="">UV-B, population size, climate/humidity, latitude,</span></i><span data-dcnode-id="4254" instrument_node=""> and </span><i data-dcnode-id="4252"><span data-dcnode-id="4253" instrument_node="">distance to lakes</span></i><span data-dcnode-id="4251" instrument_node=""> (see Fig.&nbsp;</span><a data-dcnode-id="4249" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4250" instrument_node="">3</span></a><span data-dcnode-id="4248" instrument_node=""> Panel A).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4184" data-test="figure" data-title="Figure 3" id="figure-3"><figure data-dcnode-id="4185"><figcaption data-dcnode-id="4244"><b class="c-article-section__figure-caption" data-dcnode-id="4245" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="4246" instrument_node="">Figure 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4196"><div class="c-article-section__figure-item" data-dcnode-id="4239"><a class="c-article-section__figure-link" data-dcnode-id="4240" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-98550-3/figures/3" rel="nofollow"><picture data-dcnode-id="4241"><source data-dcnode-id="4243" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-98550-3/MediaObjects/41598_2021_98550_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="4242" height="912" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-98550-3/MediaObjects/41598_2021_98550_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4197" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="4198"><span data-dcnode-id="4238" instrument_node="">Predicting the existence of a dedicated word for blue (Panel </span><b data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">A</span></b><span data-dcnode-id="4235" instrument_node="">, left) and frequency of abnormal red-green color perception (Panel </span><b data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">B</span></b><span data-dcnode-id="4232" instrument_node="">, right); only the 7 best predictors are presented here (see Methods). 1st row: Using Bayesian mixed-effect models (BRMS), the best predictors’ (according to Bayes Factor, WAIC, LOO and K-Fold methods) slope estimates. 2nd row: specificity-based predictor importance from SVMs. 3rd row: accuracy-based predictor importance from random forests (RF), measuring the amount by which the accuracy decreases when one variable is removed from the model; higher values represent more important predictors. 4th row: Gini-index-based predictor importance from random forests (RF); this measures by how much the Gini impurity decreases when a variable is chosen to split a node (note, only relative values matter, and there is a bias towards using numeric variables to split nodes). 5th row: unconditional predictor importance from conditional random forests (CF); this is similar to the accuracy-based importance from random forests. 6th row: the performance of the four methods (BRMS, SVM, RF and CF) in terms of accuracy (left; as this is a binary classification problem) and </span><span class="mathjax-tex" data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">\(R^2\)</span></span><span data-dcnode-id="4229" instrument_node=""> (right; as this is a regression problem). Variable names have been abbreviated for legibility: </span><i data-dcnode-id="4227"><span data-dcnode-id="4228" instrument_node="">popSize</span></i><span data-dcnode-id="4226" instrument_node=""> is population size, </span><i data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">humid_m</span></i><span data-dcnode-id="4223" instrument_node=""> is median humidity, </span><i data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">dist2lak</span></i><span data-dcnode-id="4220" instrument_node=""> is the distance to the closest lake, lat is latitude, </span><i data-dcnode-id="4218"><span data-dcnode-id="4219" instrument_node="">genD4</span></i><span data-dcnode-id="4217" instrument_node=""> is the 4th dimension of the multidimensional scaling of the between-populations genetic distances, </span><i data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">climPC1</span></i><span data-dcnode-id="4214" instrument_node=""> is the 1st principal component resulting from the Principal Component Analysis (PCA) of the climate variables, </span><i data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">macroar</span></i><span data-dcnode-id="4211" instrument_node=""> is the macroarea, </span><i data-dcnode-id="4209"><span data-dcnode-id="4210" instrument_node="">long</span></i><span data-dcnode-id="4208" instrument_node=""> is the longitude, and </span><i data-dcnode-id="4206"><span data-dcnode-id="4207" instrument_node="">dist2wat</span></i><span data-dcnode-id="4205" instrument_node=""> is the distance to the closest body of water (ocean/sea, lake or river). Plots generated using </span><span class="u-monospace" data-dcnode-id="4203"><span data-dcnode-id="4204" instrument_node="">R</span></span><sup data-dcnode-id="4200"><a aria-label="Reference 59" data-dcnode-id="4201" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d231533968e2566" title="R Core Team. R: A Language and Environment for Statistical Computing (R Foundation for Statistical Computing, 2021)."><span data-dcnode-id="4202" instrument_node="">59</span></a></sup><span data-dcnode-id="4199" instrument_node="">.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4186"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="4187" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-98550-3/figures/3" rel="nofollow"><span data-dcnode-id="4194"><span data-dcnode-id="4195" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4188" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4189" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4190" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4193" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4192" fill-rule="evenodd"></path><span data-dcnode-id="4191" instrument_node="">
