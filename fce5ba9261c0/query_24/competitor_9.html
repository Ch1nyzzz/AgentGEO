</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="4182" id="Sec4"><span data-dcnode-id="4183" instrument_node="">Population frequency of abnormal red-green vision</span></h3><p data-dcnode-id="4135"><span data-dcnode-id="4181" instrument_node="">In a second set of analyses, we tested whether the population frequency of abnormal red-green color perception (here, we designate this variable as </span><i data-dcnode-id="4179"><span data-dcnode-id="4180" instrument_node="">daltonism</span></i><span data-dcnode-id="4178" instrument_node="">) was linked to the incidence of UV light and the presence of a dedicated word for blue (as a proxy for its physiological effects on blue-green color perception; see Fig.&nbsp;</span><a data-dcnode-id="4176" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4177" instrument_node="">4</span></a><span data-dcnode-id="4175" instrument_node=""> Panels A and B). Bayesian mixed-effects regressions showed that </span><i data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">daltonism</span></i><span data-dcnode-id="4172" instrument_node=""> was positively influenced by </span><i data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">blue</span></i><span data-dcnode-id="4169" instrument_node=""> (</span><span class="mathjax-tex" data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">\(\beta = 0.61\)</span></span><span data-dcnode-id="4166" instrument_node=""> [0.33, 0.88], </span><span class="mathjax-tex" data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">\(p(\beta =0) = 0.0004\)</span></span><span data-dcnode-id="4163" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">\(p(\beta &gt;0) = 1\)</span></span><span data-dcnode-id="4160" instrument_node="">) and </span><i data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">latitude</span></i><span data-dcnode-id="4157" instrument_node=""> (</span><span class="mathjax-tex" data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">\(\beta = 1.69\)</span></span><span data-dcnode-id="4154" instrument_node=""> [0.78, 2.64], </span><span class="mathjax-tex" data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">\(p(\beta =0) = 0.0076\)</span></span><span data-dcnode-id="4151" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">\(p(\beta &lt;0) = 0\)</span></span><span data-dcnode-id="4148" instrument_node="">) , and negatively influenced by </span><i data-dcnode-id="4146"><span data-dcnode-id="4147" instrument_node="">UV-B</span></i><span data-dcnode-id="4145" instrument_node=""> (</span><span class="mathjax-tex" data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">\(\beta = -0.3\)</span></span><span data-dcnode-id="4142" instrument_node=""> [−&nbsp;0.45, −&nbsp;0.15], </span><span class="mathjax-tex" data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">\(p(\beta =0) = 0.083\)</span></span><span data-dcnode-id="4139" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">\(p(\beta &lt;0) = 1\)</span></span><span data-dcnode-id="4136" instrument_node="">); it was also affected by 4 genetic distance dimensions (see Supplementary Materials).</span></p><p data-dcnode-id="4025"><span data-dcnode-id="4134" instrument_node="">Taken together, the mediation analyses suggested that the effect of </span><i data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">latitude</span></i><span data-dcnode-id="4131" instrument_node=""> on </span><i data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">daltonism</span></i><span data-dcnode-id="4128" instrument_node=""> was mediated mostly by </span><i data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">UV-B</span></i><span data-dcnode-id="4125" instrument_node=""> and </span><i data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">blue</span></i><span data-dcnode-id="4122" instrument_node="">, and especially the mediation </span><i data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">UV-B</span></i><span data-dcnode-id="4119" instrument_node=""> </span><span class="mathjax-tex" data-dcnode-id="4117"><span data-dcnode-id="4118" instrument_node="">\(\rightarrow\)</span></span><span data-dcnode-id="4116" instrument_node=""> </span><i data-dcnode-id="4114"><span data-dcnode-id="4115" instrument_node="">blue</span></i><span data-dcnode-id="4113" instrument_node=""> </span><span class="mathjax-tex" data-dcnode-id="4111"><span data-dcnode-id="4112" instrument_node="">\(\rightarrow\)</span></span><span data-dcnode-id="4110" instrument_node=""> </span><i data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">daltonism</span></i><span data-dcnode-id="4107" instrument_node=""> was important (</span><i data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">TE</span></i><span data-dcnode-id="4104" instrument_node=""> = −&nbsp;0.74 [−&nbsp;1.21, −&nbsp;0.35], </span><i data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">DE</span></i><span data-dcnode-id="4101" instrument_node=""> = −&nbsp;0.21 [−&nbsp;0.35, −&nbsp;0.06], </span><i data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">IE</span></i><span data-dcnode-id="4098" instrument_node=""> = −&nbsp;0.53 [−&nbsp;1.04, −&nbsp;0.16]; </span><span class="mathjax-tex" data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">\(\beta _{UVB \rightarrow blue} = -1.14\)</span></span><span data-dcnode-id="4095" instrument_node=""> [−&nbsp;1.78, −&nbsp;0.55], </span><span class="mathjax-tex" data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">\(\beta _{blue \rightarrow daltonism | UVB} = 0.49\)</span></span><span data-dcnode-id="4092" instrument_node=""> [0.20, 0.77]). A path model (Fig.&nbsp;</span><a data-dcnode-id="4090" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4091" instrument_node="">4</span></a><span data-dcnode-id="4089" instrument_node=""> Panel C) fits the data well (</span><span class="mathjax-tex" data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">\(\chi ^{2}(1) = 4.0\)</span></span><span data-dcnode-id="4086" instrument_node="">, </span><i data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">p</span></i><span data-dcnode-id="4083" instrument_node=""> = 0.137; CFI = 0.951, TLI = 0.927, NNFI = 0.927, RMSEA = 0.08) and showed that </span><i data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">UV-B</span></i><span data-dcnode-id="4080" instrument_node=""> has both a direct effect on </span><i data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">daltonism</span></i><span data-dcnode-id="4077" instrument_node=""> (</span><span class="mathjax-tex" data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">\(\beta = -0.31\)</span></span><span data-dcnode-id="4074" instrument_node="">, </span><i data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">p</span></i><span data-dcnode-id="4071" instrument_node=""> &lt; 0.001) and one mediated by </span><i data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">blue</span></i><span data-dcnode-id="4068" instrument_node=""> (</span><span class="mathjax-tex" data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">\(\beta _{UVB \rightarrow blue} = -0.55\)</span></span><span data-dcnode-id="4065" instrument_node="">, </span><i data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">p</span></i><span data-dcnode-id="4062" instrument_node=""> &lt; 0.001; </span><span class="mathjax-tex" data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">\(\beta _{blue \rightarrow daltonism} = 0.4\)</span></span><span data-dcnode-id="4059" instrument_node="">, </span><i data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">p</span></i><span data-dcnode-id="4056" instrument_node=""> &lt; 0.001). Adding </span><i data-dcnode-id="4054"><span data-dcnode-id="4055" instrument_node="">subsistence</span></i><span data-dcnode-id="4053" instrument_node=""> to the model improved the fit further (</span><span class="mathjax-tex" data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">\(\chi ^{2}(1) = 1.6\)</span></span><span data-dcnode-id="4050" instrument_node="">, </span><i data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">p</span></i><span data-dcnode-id="4047" instrument_node=""> = 0.45; CFI = 1.000, TLI = 1.011, NNFI = 1.011, RMSEA = 0.0). It added a significant influence of </span><i data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">subsistence</span></i><span data-dcnode-id="4044" instrument_node=""> (</span><span class="mathjax-tex" data-dcnode-id="4042"><span data-dcnode-id="4043" instrument_node="">\(\beta _{subsistence \rightarrow daltonism} = 0.38\)</span></span><span data-dcnode-id="4041" instrument_node="">, </span><i data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">p</span></i><span data-dcnode-id="4038" instrument_node=""> &lt; 0.001), but removed the influence of </span><i data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">blue</span></i><span data-dcnode-id="4035" instrument_node=""> to </span><i data-dcnode-id="4033"><span data-dcnode-id="4034" instrument_node="">daltonism</span></i><span data-dcnode-id="4032" instrument_node=""> (</span><span class="mathjax-tex" data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">\(\beta _{blue \rightarrow daltonism} = 0.11\)</span></span><span data-dcnode-id="4029" instrument_node="">, </span><i data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">p</span></i><span data-dcnode-id="4026" instrument_node=""> = 0.32).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3983" data-test="figure" data-title="Figure 4" id="figure-4"><figure data-dcnode-id="3984"><figcaption data-dcnode-id="4022"><b class="c-article-section__figure-caption" data-dcnode-id="4023" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="4024" instrument_node="">Figure 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3995"><div class="c-article-section__figure-item" data-dcnode-id="4017"><a class="c-article-section__figure-link" data-dcnode-id="4018" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-98550-3/figures/4" rel="nofollow"><picture data-dcnode-id="4019"><source data-dcnode-id="4021" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-98550-3/MediaObjects/41598_2021_98550_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="4020" height="684" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-98550-3/MediaObjects/41598_2021_98550_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3996" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="3997"><span data-dcnode-id="4016" instrument_node="">Derivation of path models for red-green abnormal color perception. (Panel </span><b data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node=""> A</span></b><span data-dcnode-id="4013" instrument_node="">): A direct graphical representation of the hypothesis that UV-B affects the unmeasured physiology of color perception during the lifetime of an individual which, in turn, affects the existence of a dedicated word for blue in the person’s language (</span><i data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">hypothesis 1</span></i><span data-dcnode-id="4010" instrument_node="">). In addition, the physiology of color perception also drives an evolutionary interaction with alleles resulting in abnormal red/green color perception. (Panel </span><b data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">B</span></b><span data-dcnode-id="4007" instrument_node="">): a Structural Equation Modelling diagram representation of Panel A with operationalized variables. (Panel </span><b data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node="">C</span></b><span data-dcnode-id="4004" instrument_node="">): The latent variable ‘abn. blue perc.’, representing the unobserved abnormal color perception of blue, is indirectly measured by two indicators (‘daltonism’ and ‘blue’), while the latent ‘abn. red-green perc.’ (abnormal red/green color perception) is not of interest here. Therefore, we used ‘blue’ as a proxy for ‘abn. blue perc.’ and ignored ‘abn. red-green perc.’, leading to the path model shown here. Icons made by Freepik </span><a data-dcnode-id="4002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freepik.com/"><span data-dcnode-id="4003" instrument_node="">https://www.freepik.com</span></a><span data-dcnode-id="4001" instrument_node=""> from Flaticon </span><a data-dcnode-id="3999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flaticon.com/"><span data-dcnode-id="4000" instrument_node="">https://www.flaticon.com/</span></a><span data-dcnode-id="3998" instrument_node="">.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3985"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="3986" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-98550-3/figures/4" rel="nofollow"><span data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3987" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3988" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3989" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3992" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3991" fill-rule="evenodd"></path><span data-dcnode-id="3990" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3975"><span data-dcnode-id="3982" instrument_node="">Converging evidence across analysis methods predicted daltonism on the full dataset, but this performance did not generalize well. Moreover, the importance of the predictors varied across methods. Nevertheless, </span><i data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">UV-B</span></i><span data-dcnode-id="3979" instrument_node=""> tended to be among the most important predictors, along with blue and some genetic distance measures (see Fig.&nbsp;</span><a data-dcnode-id="3977" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3978" instrument_node="">3</span></a><span data-dcnode-id="3976" instrument_node=""> Panel B).</span></p></div></div></section><section data-dcnode-id="3910" data-title="Discussion"><div class="c-article-section" data-dcnode-id="3911" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3970" id="Sec5"><span data-dcnode-id="3971" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="3912" id="Sec5-content"><p data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">Taken together, these analyses demonstrate that no single explanatory factor explains the color lexicon. This finding resonates with the centuries of debate on this topic with myriad variables being proposed and opposed. Our results show that multiple environmental and cultural factors interact. Specifically, we found that a language is more likely to have a dedicated word for blue when it is spoken by a larger population, which resides at higher latitudes (where the incidence of UV-B radiation is lower), and near large bodies of standing water (in particular, lakes). While number of speakers is an imperfect proxy for the unmeasured and hard-to-define variable, cultural complexity, which in turn is an indirect reflection of the use of complex dyeing techniques and colored artefacts, the environmental influences were more straightforward. For example, large lakes might not always be poster-card blue, but they certainly tend to be a salient feature and reflect the sky more often than not. Importantly, the tendency of languages spoken closer to the equator to have a distinct term for blue, is likely due to the high incidence of UV-B light, and strongly supports the proposal that acquired lens brunescence has a negative effect on the development or maintenance of a lexical distinction between ‘blue’ and ‘green’.</span></p><p data-dcnode-id="3947"><span data-dcnode-id="3967" instrument_node="">Overall, these results suggest that variability in color perception leads to differences in the perceptual representation of color space, which then causes differences in color lexicons. It also raises interesting questions about the mechanisms and time required for language change, given that we are considering acquired color deficiency related to aging. If language does adapt to the color vision of its speakers, then our data suggest that language adapts to the reduced capacities of older adults, despite also being spoken by younger adults and children, who are still able to perceive the distinction between green and blue. Intriguingly, other evidence suggests extreme variation in exposure to direct sunlight during very early development also affects color vision</span><sup data-dcnode-id="3964"><a aria-label="Reference 38" data-dcnode-id="3965" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d231533968e3563" title="Laeng, B. et al. Latitude-of-birth and season-of-birth effects on human color vision in the Arctic. Vision. Res. 47, 1595–1607. 
                  https://doi.org/10.1016/j.visres.2007.03.011
                  
                 (2007)."><span data-dcnode-id="3966" instrument_node="">38</span></a></sup><span data-dcnode-id="3963" instrument_node="">. Nevertheless, our findings show a distinct developmental trajectory. Perhaps older adults change the fitness landscape to which language adapts through cultural evolution at the scale of several generations of language use and transmission</span><sup data-dcnode-id="3960"><a aria-label="Reference 39" data-dcnode-id="3961" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d231533968e3567" title="Richerson, P. J. &amp; Christiansen, M. H. (eds) Cultural Evolution: Society, Technology, Language, and Religion (The MIT Press, 2013)."><span data-dcnode-id="3962" instrument_node="">39</span></a></sup><span data-dcnode-id="3959" instrument_node="">, a process that can be studied using agent-based computer models</span><sup data-dcnode-id="3953"><a aria-label="Reference 40" data-dcnode-id="3957" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d231533968e3571" title="Jameson, K. A. &amp; Komarova, N. L. Evolutionary models of color categorization. I. Population categorization systems based on normal and dichromat observers. J. Opt. Soc. Am. A 26, 1414–1423. 
                  https://doi.org/10.1364/JOSAA.26.001414
                  
                 (2009)."><span data-dcnode-id="3958" instrument_node="">40</span></a><span data-dcnode-id="3956" instrument_node="">,</span><a aria-label="Reference 41" data-dcnode-id="3954" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d231533968e3574" title="Jameson, K. A. &amp; Komarova, N. L. Evolutionary models of color categorization. II. Realistic observer models and population heterogeneity. J. Opt. Soc. Am. Opt. Image Sci. Vis. 26, 1424–1436. 
                  https://doi.org/10.1364/josaa.26.001424
                  
                 (2009)."><span data-dcnode-id="3955" instrument_node="">41</span></a></sup><span data-dcnode-id="3952" instrument_node="">. The fact that we found no influence of environmental conditions at the putative origins of language families suggests that these effects act on timescales shorter than the few thousand years usually needed for language families to differentiate. The present-day languages of the same language family descend from a single ancient proto-language and, due to migrations and language shifts on the scale of a few thousand years</span><sup data-dcnode-id="3949"><a aria-label="Reference 42" data-dcnode-id="3950" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d231533968e3578" title="Bowern, C. &amp; Evans, B. The Routledge Handbook of Historical Linguistics, 1 edn. (Routledge, 2014)."><span data-dcnode-id="3951" instrument_node="">42</span></a></sup><span data-dcnode-id="3948" instrument_node="">, may end up spoken in very different locations and environments to those of their proto-language. If the color lexicon needs several thousand years to adapt to changes in UV-B incidence, then the location of these ancient proto-languages should still have a detectable effect, but the lack of such a signal in our data suggests that this change is much faster.</span></p><p data-dcnode-id="3937"><span data-dcnode-id="3946" instrument_node="">It is striking to note that a similar phenomenon, where language adapts to an altered fitness landscape due to acquired changes in some of the speaker population, has been proposed for several typologically striking properties of Australian Aboriginal languages and the distribution of labiodental sounds. For example, the high frequency of chronic ear infections (chronic otitis media) among Australian Aborigine children can produce partial hearing loss affecting the lower and higher parts of the auditory spectrum, resulting in a loss of fricatives, a centralized vowel system, and a long, thin consonant system in the languages of the Australian continent</span><sup data-dcnode-id="3943"><a aria-label="Reference 43" data-dcnode-id="3944" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d231533968e3585" title="Butcher, A. Australian aboriginal languages: Consonant-salient phonologies and the ‘Place-of-Articulation Imperative’. In Harrington, J. &amp; Tabain, M. (eds.) Speech Production: Models, Phonetic Processes, and Techniques, Macquarie Monographs in Cognitive Science, 187–210 (Psychology Press, 2006)."><span data-dcnode-id="3945" instrument_node="">43</span></a></sup><span data-dcnode-id="3942" instrument_node="">. Similarly, consuming processed and softer foods characteristic of agriculture leads to ontogenetic changes in bite (involving the teeth and lower jaw) such that the overbite/overedge is retained into adulthood, favoring the use of labiodental sounds (such as ‘f’ and ‘v’) by languages of populations practicing agriculture</span><sup data-dcnode-id="3939"><a aria-label="Reference 44" data-dcnode-id="3940" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d231533968e3589" title="Blasi, D. E. et al. Human sound systems are shaped by post-Neolithic changes in bite configuration. Science. 
                  https://doi.org/10.1126/science.aav3218
                  
                 (2019)."><span data-dcnode-id="3941" instrument_node="">44</span></a></sup><span data-dcnode-id="3938" instrument_node="">. Our study adds to this literature by showing that external pressures can shape semantic, as well as phonological aspects of language.</span></p><p data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">Finally, our data also supported an interaction between acquired blue-green and inherited red-green color deficits: populations closer to the equator, more affected by lens brunescence, speaking languages without a dedicated word for blue have a lower frequency of people with red-green color deficiency. The data also suggested that populations of hunter-gatherers tend to have a lower incidence of abnormal red-green color perception. While this hypothesis requires further testing, it would support the idea that certain cultural practices and subsistence strategies might have higher demands on color perception, thereby generating selective pressures against inherited color perception deficits.</span></p><p data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">Some caution is required in interpretation, however, given limitations in the current study. First, our dataset contained only 14 groups classified as hunter-gatherers, which, even if representative of the current distribution of communities, is too small to allow strong conclusions. Second, more refined genetic data—especially including information about the opsin alleles involved in red-green color deficiencies—would be necessary to better test for selection. Third, there is a need for better and, ideally, more direct measures of the exposure to complex dyeing technology and colored artefacts. Finally, populations and languages are reduced to geographic dots in our analyses, but a better approach might instead be to use aggregated measures of UV-B incidence, climate, ecology and proximity to large bodies of water across the whole area they occupy.</span></p><p data-dcnode-id="3913"><span data-dcnode-id="3932" instrument_node="">Nevertheless, our results strongly support the view that the color vocabulary is shaped, at least in part, by environmental factors acting on individual speakers, generating biases that are amplified by the repeated use and transmission of language in communities of similarly affected individuals. This is akin to other cases of individual biases being amplified to shape cross-linguistic diversity</span><sup data-dcnode-id="3929"><a aria-label="Reference 45" data-dcnode-id="3930" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d231533968e3603" title="Dediu, D., Janssen, R. &amp; Moisik, S. R. Language is not isolated from its wider environment: Vocal tract influences on the evolution of speech and language. Lang. Commun. 54, 9–20. 
                  https://doi.org/10.1016/j.langcom.2016.10.002
                  
                 (2017)."><span data-dcnode-id="3931" instrument_node="">45</span></a></sup><span data-dcnode-id="3928" instrument_node="">, biases that can be either rooted in genetics</span><sup data-dcnode-id="3919"><a data-dcnode-id="3926" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d231533968e3607" title="Dediu, D. &amp; Ladd, D. R. Linguistic tone is related to the population frequency of the adaptive haplogroups of two brain size genes, ASPM and Microcephalin. Proc. Natl. Acad. Sci. 104, 10944–10949. 
                  https://doi.org/10.1073/pnas.0610848104
                  
                 (2007)."><span data-dcnode-id="3927" instrument_node="">46</span></a><span data-dcnode-id="3925" instrument_node="">,</span><a data-dcnode-id="3923" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d231533968e3607_1" title="Dediu, D., Janssen, R. &amp; Moisik, S. R. Weak biases emerging from vocal tract anatomy shape the repeated transmission of vowels. Nat. Hum. Behav. 3, 1107–1115. 
                  https://doi.org/10.1038/s41562-019-0663-x
                  
                 (2019)."><span data-dcnode-id="3924" instrument_node="">47</span></a><span data-dcnode-id="3922" instrument_node="">,</span><a aria-label="Reference 48" data-dcnode-id="3920" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d231533968e3610" title="Moisik, S. R. &amp; Dediu, D. Anatomical biasing and clicks: Evidence from biomechanical modeling. J. Lang. Evol. 2, 37–51. 
                  https://doi.org/10.1093/jole/lzx004
                  
                 (2017)."><span data-dcnode-id="3921" instrument_node="">48</span></a></sup><span data-dcnode-id="3918" instrument_node=""> or emerging due to environmental or cultural factors acting during the lifetime of individuals</span><sup data-dcnode-id="3915"><a aria-label="Reference 44" data-dcnode-id="3916" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d231533968e3614" title="Blasi, D. E. et al. Human sound systems are shaped by post-Neolithic changes in bite configuration. Science. 
                  https://doi.org/10.1126/science.aav3218
                  
                 (2019)."><span data-dcnode-id="3917" instrument_node="">44</span></a></sup><span data-dcnode-id="3914" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="3521" data-title="Methods and materials"><div class="c-article-section" data-dcnode-id="3522" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3908" id="Sec6"><span data-dcnode-id="3909" instrument_node="">Methods and materials</span></h2><div class="c-article-section__content" data-dcnode-id="3523" id="Sec6-content"><p data-dcnode-id="3863"><span data-dcnode-id="3907" instrument_node="">We collected data from 142 populations, extending and re-checking earlier databases</span><sup data-dcnode-id="3904"><a aria-label="Reference 9" data-dcnode-id="3905" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d231533968e3626" title="Brown, A. M. &amp; Lindsey, D. T. Color and language: Worldwide distribution of Daltonism and distinct words for “blue”. Visual Neurosci. 21, 409–412. 
                  https://doi.org/10.1017/S0952523804213098
                  
                 (2004)."><span data-dcnode-id="3906" instrument_node="">9</span></a></sup><span data-dcnode-id="3903" instrument_node=""> considerably, especially concerning information about the color lexicon and the incidence of abnormal red-green color perception. Each population was uniquely identified by its </span><i data-dcnode-id="3900"><u data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">Glottolog</span></u></i><span data-dcnode-id="3899" instrument_node=""> code</span><sup data-dcnode-id="3896"><a aria-label="Reference 49" data-dcnode-id="3897" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d231533968e3633" title="Hammarström, H., Bank, S., Forkel, R. &amp; Haspelmath, M. Glottolog 3.2 (Max Planck Institute for the Science of Human History, 2018)."><span data-dcnode-id="3898" instrument_node="">49</span></a></sup><span data-dcnode-id="3895" instrument_node=""> of the primary language spoken and its geographic location. According to </span><i data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">Glottolog</span></i><span data-dcnode-id="3892" instrument_node="">, these languages belong to 32 </span><i data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">language families</span></i><span data-dcnode-id="3889" instrument_node=""> (the most represented being </span><i data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">Indo-European</span></i><span data-dcnode-id="3886" instrument_node=""> (41), </span><i data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">Atlantic-Congo</span></i><span data-dcnode-id="3883" instrument_node=""> (19) and </span><i data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">Afro-Asiatic</span></i><span data-dcnode-id="3880" instrument_node=""> (13)) distributed across 6 </span><i data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">macroareas</span></i><span data-dcnode-id="3877" instrument_node=""> (Africa (31), Australia (2), Eurasia (79), Papunesia (9), North America (9) and South America (12)). We also obtained the geographic location of the putative origins of each family</span><sup data-dcnode-id="3871"><a aria-label="Reference 49" data-dcnode-id="3875" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d231533968e3656" title="Hammarström, H., Bank, S., Forkel, R. &amp; Haspelmath, M. Glottolog 3.2 (Max Planck Institute for the Science of Human History, 2018)."><span data-dcnode-id="3876" instrument_node="">49</span></a><span data-dcnode-id="3874" instrument_node="">,</span><a aria-label="Reference 50" data-dcnode-id="3872" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d231533968e3659" title="Wichmann, S., Müller, A. &amp; Velupillai, V. Homelands of the world’s language families: A quantitative approach. Diachronica 27, 247–276. 
                  https://doi.org/10.1075/dia.27.2.05wic
                  
                 (2010)."><span data-dcnode-id="3873" instrument_node="">50</span></a></sup><span data-dcnode-id="3870" instrument_node="">. The geographic locations were cos-transformed: cos(</span><i data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">longitude</span></i><span data-dcnode-id="3867" instrument_node="">) ranges between −&nbsp;1.0 (−&nbsp;180) and 1.0 (180), and 1.0 − cos(</span><i data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">latitude</span></i><span data-dcnode-id="3864" instrument_node="">) ranges between −&nbsp;1.0 (the South Pole), 0.0 (the equator) and 1.0 (the North Pole).</span></p><p data-dcnode-id="3794"><span data-dcnode-id="3862" instrument_node="">Based on their location, for each population we obtained the following data: the list of its </span><i data-dcnode-id="3860"><span data-dcnode-id="3861" instrument_node="">geographic neighbors</span></i><span data-dcnode-id="3859" instrument_node=""> (derived from the Delaunay triangulation of our geographic locations taking into account large bodies of water</span><sup data-dcnode-id="3856"><a aria-label="Reference 51" data-dcnode-id="3857" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d231533968e3676" title="Cysouw, M., Dediu, D. &amp; Moran, S. Comment on “Phonemic diversity supports a serial founder effect model of language expansion from Africa”. Science 335, 657–657. 
                  https://doi.org/10.1126/science.1208841
                  
                 (2012)."><span data-dcnode-id="3858" instrument_node="">51</span></a></sup><span data-dcnode-id="3855" instrument_node="">); its log(</span><i data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">elevation</span></i><span data-dcnode-id="3852" instrument_node="">+1) using the </span><a data-dcnode-id="3850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aws.amazon.com/public-datasets/terrain/"><span data-dcnode-id="3851" instrument_node="">Mapzen</span></a><span data-dcnode-id="3849" instrument_node=""> data (through </span><span class="u-monospace" data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">R</span></span><span data-dcnode-id="3846" instrument_node="">’s </span><span class="u-monospace" data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">elevatr</span></span><span data-dcnode-id="3843" instrument_node=""> package); the log(</span><i data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">distances</span></i><span data-dcnode-id="3840" instrument_node="">) to the nearest lake, ocean, river, or large body of water in general (using the OpenStreetMap data as per</span><sup data-dcnode-id="3837"><a aria-label="Reference 52" data-dcnode-id="3838" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d231533968e3700" title="Bentz, C., Dediu, D., Verkerk, A. &amp; Jäger, G. The evolution of language families is shaped by the environment beyond neutral drift. Nat. Hum. Behav. 2, 816. 
                  https://doi.org/10.1038/s41562-018-0457-6
                  
                 (2018)."><span data-dcnode-id="3839" instrument_node="">52</span></a></sup><span data-dcnode-id="3836" instrument_node="">); and data about </span><i data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">specific humidity</span></i><span data-dcnode-id="3833" instrument_node=""> (using data from the </span><a data-dcnode-id="3831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//iridl.ldeo.columbia.edu/SOURCES/.NOAA/.NCEP-NCAR/.CDAS-1/.MONTHLY/.Diagnostic/.above_ground/.qa/datafiles.html"><span data-dcnode-id="3832" instrument_node="">NOAA</span></a><span data-dcnode-id="3830" instrument_node="">, as the mean of the yearly medians and interquartile ranges), and </span><i data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">climate</span></i><span data-dcnode-id="3827" instrument_node=""> and </span><i data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">ecology</span></i><span data-dcnode-id="3824" instrument_node=""> (as in</span><sup data-dcnode-id="3821"><a aria-label="Reference 52" data-dcnode-id="3822" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d231533968e3721" title="Bentz, C., Dediu, D., Verkerk, A. &amp; Jäger, G. The evolution of language families is shaped by the environment beyond neutral drift. Nat. Hum. Behav. 2, 816. 
                  https://doi.org/10.1038/s41562-018-0457-6
                  
                 (2018)."><span data-dcnode-id="3823" instrument_node="">52</span></a></sup><span data-dcnode-id="3820" instrument_node="">, we conducted Principal Component Analysis on the 19 variables from </span><a data-dcnode-id="3818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldclim.org/"><span data-dcnode-id="3819" instrument_node="">WorldClim</span></a><span data-dcnode-id="3817" instrument_node=""> for the period 1960–1990, and we retained </span><i data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">PC1</span></i><span data-dcnode-id="3814" instrument_node="">, explaining 49.7% of the variance and reflecting low seasonality, wet and hot climates, </span><i data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node="">PC2</span></i><span data-dcnode-id="3811" instrument_node="">, 24.7%, high seasonality, hot and dry climates, and </span><i data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">PC3</span></i><span data-dcnode-id="3808" instrument_node="">, 8.6%, unclear interpretation). We calculated the </span><i data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">incidence of ultraviolet light (UV)</span></i><span data-dcnode-id="3805" instrument_node=""> using the data from </span><a data-dcnode-id="3803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//toms.gsfc.nasa.gov/ery_uv/new_uv/"><span data-dcnode-id="3804" instrument_node="">NASA Total Ozone Mapping Spectrometer (TOMS)</span></a><span data-dcnode-id="3802" instrument_node=""> for the year 1998 (in order to replicate the procedure in</span><sup data-dcnode-id="3799"><a aria-label="Reference 9" data-dcnode-id="3800" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d231533968e3752" title="Brown, A. M. &amp; Lindsey, D. T. Color and language: Worldwide distribution of Daltonism and distinct words for “blue”. Visual Neurosci. 21, 409–412. 
                  https://doi.org/10.1017/S0952523804213098
                  
                 (2004)."><span data-dcnode-id="3801" instrument_node="">9</span></a></sup><span data-dcnode-id="3798" instrument_node="">): these contain daily measures of UV radiation received by the human body at four wavelengths (305 nm, 310 nm, 320 nm, and 380 nm) in J/m</span><sup data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">2</span></sup><span data-dcnode-id="3795" instrument_node="">, taking into account the thickness of the ozone layer in the stratosphere, the amount of cloud cover, the elevation, and how high the sun is in the sky. Here, we use the whole-year means and standard deviations for UV-A (315 nm to 400 nm), UV-B (280 nm to 315 nm) and the full spectrum.</span></p><p data-dcnode-id="3760"><span data-dcnode-id="3793" instrument_node="">Moreover, we obtained each population’s log(</span><i data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">size</span></i><span data-dcnode-id="3790" instrument_node="">) (from</span><sup data-dcnode-id="3787"><a aria-label="Reference 52" data-dcnode-id="3788" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d231533968e3764" title="Bentz, C., Dediu, D., Verkerk, A. &amp; Jäger, G. The evolution of language families is shaped by the environment beyond neutral drift. Nat. Hum. Behav. 2, 816. 
                  https://doi.org/10.1038/s41562-018-0457-6
                  
                 (2018)."><span data-dcnode-id="3789" instrument_node="">52</span></a></sup><span data-dcnode-id="3786" instrument_node="">) and </span><i data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">subsistence strategy</span></i><span data-dcnode-id="3783" instrument_node="">, dichotomized into populations whose subsistence mode is primarily based on hunting, fishing, gathering and/or foraging (‘HG’) and populations with subsistence modes centered around food production (‘AGR’), using data from</span><sup data-dcnode-id="3771"><a aria-label="Reference 44" data-dcnode-id="3781" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d231533968e3771" title="Blasi, D. E. et al. Human sound systems are shaped by post-Neolithic changes in bite configuration. Science. 
                  https://doi.org/10.1126/science.aav3218
                  
                 (2019)."><span data-dcnode-id="3782" instrument_node="">44</span></a><span data-dcnode-id="3780" instrument_node="">,</span><a data-dcnode-id="3778" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d231533968e3774" title="Bickel, B. et&nbsp;al. The AUTOTYP typological databases (Version 0.1.0) (2017)."><span data-dcnode-id="3779" instrument_node="">53</span></a><span data-dcnode-id="3777" instrument_node="">,</span><a data-dcnode-id="3775" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d231533968e3774_1" title="Kirby, K. et al. D-PLACE: A global database of cultural, linguistic and environmental diversity. PLoS ONE 11, 1–14. 
                  https://doi.org/10.1371/journal.pone.0158391
                  
                 (2016)."><span data-dcnode-id="3776" instrument_node="">54</span></a><span data-dcnode-id="3774" instrument_node="">,</span><a aria-label="Reference 55" data-dcnode-id="3772" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d231533968e3777" title="Turchin, P. et&nbsp;al. Seshat: The global history databank. Cliodynamics. 
                  https://doi.org/10.21237/C7clio6127917
                  
                 (2015)."><span data-dcnode-id="3773" instrument_node="">55</span></a></sup><span data-dcnode-id="3770" instrument_node="">. The information about color vocabulary specifically concerns the existence of a </span><i data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">specific term for blue</span></i><span data-dcnode-id="3767" instrument_node=""> (a dichotomous variable, ‘no’/‘yes’), and we also collected data about the </span><i data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node="">frequency of abnormal red/green color perception</span></i><span data-dcnode-id="3764" instrument_node=""> in males excluding, if specified, tritanopia, and those samples that do not distinguish between males and females, or with fewer than 50 individuals (see Fig. </span><a data-dcnode-id="3762" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3763" instrument_node="">1</span></a><span data-dcnode-id="3761" instrument_node=""> Panel A and Supplementary Materials for details).</span></p><p data-dcnode-id="3731"><span data-dcnode-id="3759" instrument_node="">Finally, to control for past demography and selection (about which we do not have direct information here), we estimated the overall pairwise </span><i data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">genetic distances</span></i><span data-dcnode-id="3756" instrument_node=""> between populations, estimated by the </span><i data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">fixation index</span></i><span data-dcnode-id="3753" instrument_node=""> </span><span class="mathjax-tex" data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">\(F_{ST}\)</span></span><span data-dcnode-id="3750" instrument_node="">. We used a set of genetic markers aimed at forensic applications (</span><a data-dcnode-id="3748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//frog.med.yale.edu/FrogKB/"><span data-dcnode-id="3749" instrument_node="">FROG-kb</span></a><span data-dcnode-id="3747" instrument_node="">) from the </span><i data-dcnode-id="3744"><u data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">ALFRED</span></u></i><span data-dcnode-id="3743" instrument_node=""> database</span><sup data-dcnode-id="3740"><a aria-label="Reference 56" data-dcnode-id="3741" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d231533968e3837" title="Rajeevan, H. ALFRED: The ALelle FREquency database. Nucleic Acids Res. 31, 270–271. 
                  https://doi.org/10.1093/nar/gkg043
                  
                 (2003)."><span data-dcnode-id="3742" instrument_node="">56</span></a></sup><span data-dcnode-id="3739" instrument_node=""> with ultrametric missing value imputation</span><sup data-dcnode-id="3733"><a aria-label="Reference 57" data-dcnode-id="3737" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d231533968e3841" title="De Soete, G. Ultrametric tree representations of incomplete dissimilarity data. J. Classif. 1, 235–242. 
                  https://doi.org/10.1007/BF01890124
                  
                 (1984)."><span data-dcnode-id="3738" instrument_node="">57</span></a><span data-dcnode-id="3736" instrument_node="">,</span><a aria-label="Reference 58" data-dcnode-id="3734" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d231533968e3844" title="Lapointe, F. &amp; Kirsch, J. Estimating phylogenies from lacunose distance matrices, with special reference to DNA hybridization data. Mol. Biol. Evol. 12, 266–266. 
                  https://doi.org/10.1093/oxfordjournals.molbev.a040209
                  
                 (1995)."><span data-dcnode-id="3735" instrument_node="">58</span></a></sup><span data-dcnode-id="3732" instrument_node="">, followed by classic multi-dimensional scaling (MDS), retaining the first 10 dimensions (goodness-of-fit 10.5%).</span></p><p data-dcnode-id="3645"><span data-dcnode-id="3730" instrument_node="">We used the following short variable names: </span><i data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">glottocode</span></i><span data-dcnode-id="3727" instrument_node=""> (Glottolog language code), </span><i data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">family</span></i><span data-dcnode-id="3724" instrument_node=""> (language family), </span><i data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">macroarea</span></i><span data-dcnode-id="3721" instrument_node=""> (the macroarea), </span><i data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">latitude</span></i><span data-dcnode-id="3718" instrument_node=""> and </span><i data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">longitude</span></i><span data-dcnode-id="3715" instrument_node=""> (the transformed geographical coordinates), </span><i data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">elevation</span></i><span data-dcnode-id="3712" instrument_node=""> (transformed elevation), </span><i data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">distance to ocean</span></i><span data-dcnode-id="3709" instrument_node="">, </span><i data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">distance to lakes</span></i><span data-dcnode-id="3706" instrument_node="">, </span><i data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">distance to rivers</span></i><span data-dcnode-id="3703" instrument_node=""> and </span><i data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">distance to water</span></i><span data-dcnode-id="3700" instrument_node=""> (transformed distances to bodies of water), </span><i data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">humidity median</span></i><span data-dcnode-id="3697" instrument_node=""> and </span><i data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">humidity IQR</span></i><span data-dcnode-id="3694" instrument_node=""> (humidity), </span><i data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">climate PC1</span></i><span data-dcnode-id="3691" instrument_node="">, </span><i data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">climate PC2</span></i><span data-dcnode-id="3688" instrument_node="">, </span><i data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">climate PC3</span></i><span data-dcnode-id="3685" instrument_node=""> (the first 3 climate Principal Components, z-scored), </span><i data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">mean UV-A</span></i><span data-dcnode-id="3682" instrument_node="">, </span><i data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">sd UV-A</span></i><span data-dcnode-id="3679" instrument_node="">, </span><i data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">mean UV-B</span></i><span data-dcnode-id="3676" instrument_node="">, </span><i data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">sd UV-B</span></i><span data-dcnode-id="3673" instrument_node="">, </span><i data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">mean UV</span></i><span data-dcnode-id="3670" instrument_node="">, </span><i data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">sd UV</span></i><span data-dcnode-id="3667" instrument_node=""> (UV incidence, z-scored), </span><i data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">population size</span></i><span data-dcnode-id="3664" instrument_node=""> (transformed population size), </span><i data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">subsistence</span></i><span data-dcnode-id="3661" instrument_node=""> (subsistence strategy), </span><i data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">blue</span></i><span data-dcnode-id="3658" instrument_node=""> (is there a specific term for blue?), </span><i data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">daltonism</span></i><span data-dcnode-id="3655" instrument_node=""> (frequency of abnormal red/green color perception), and </span><i data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">genetic D1</span></i><span data-dcnode-id="3652" instrument_node=""> ... </span><i data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">genetic D10</span></i><span data-dcnode-id="3649" instrument_node=""> (first 10 MDS dimensions of the genetic distances matrix); the suffix </span><i data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">_family</span></i><span data-dcnode-id="3646" instrument_node=""> refers to the values at the putative family origins.</span></p><p data-dcnode-id="3524"><span data-dcnode-id="3644" instrument_node="">All analyses were done using R</span><sup data-dcnode-id="3641"><a aria-label="Reference 59" data-dcnode-id="3642" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d231533968e3943" title="R Core Team. R: A Language and Environment for Statistical Computing (R Foundation for Statistical Computing, 2021)."><span data-dcnode-id="3643" instrument_node="">59</span></a></sup><span data-dcnode-id="3640" instrument_node="">. We used five main classes of methods in our analyses (see the Supplementary Materials). First, in order to understand the geographical patterning of our data, we tested it against </span><i data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">complete spatial randomness</span></i><sup data-dcnode-id="3632"><a aria-label="Reference 60" data-dcnode-id="3636" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d231533968e3949" title="Baddeley, A., Rubak, E. &amp; Turner, R. Spatial Point Patterns: Methodology and Applications with R. Champan &amp; Hall/CRC Interdisciplinary Statistics Series (CRC Press, 2016)."><span data-dcnode-id="3637" instrument_node="">60</span></a><span data-dcnode-id="3635" instrument_node="">,</span><a aria-label="Reference 61" data-dcnode-id="3633" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d231533968e3952" title="Spielman, S.&nbsp;E. Point pattern analysis. In International Encyclopedia of Geography, 1–9, 
                  https://doi.org/10.1002/9781118786352.wbieg0849
                  
                 (American Cancer Society, 2017)."><span data-dcnode-id="3634" instrument_node="">61</span></a></sup><span data-dcnode-id="3631" instrument_node=""> using the the </span><span class="mathjax-tex" data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node="">\(\chi ^2\)</span></span><span data-dcnode-id="3628" instrument_node=""> test based on quadrat counts, and the </span><i data-dcnode-id="3626"><span data-dcnode-id="3627" instrument_node="">G</span></i><span data-dcnode-id="3625" instrument_node="">, </span><i data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">F</span></i><span data-dcnode-id="3622" instrument_node=""> and </span><i data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node="">K</span></i><span data-dcnode-id="3619" instrument_node=""> functions, and we also estimated its spatial autocorrelation using Moran’s </span><i data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">I</span></i><span data-dcnode-id="3616" instrument_node=""> (with either the inverse of the shortest geographical distance “as the crow flies”, or the nearest neighbor distance on the Delaunay triangulation). Second, we fitted </span><i data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">Bayesian mixed-effect regression models</span></i><span data-dcnode-id="3613" instrument_node=""> (as implemented by </span><span class="u-monospace" data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">R</span></span><span data-dcnode-id="3610" instrument_node="">’s package </span><span class="u-monospace" data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">brms</span></span><sup data-dcnode-id="3605"><a aria-label="Reference 62" data-dcnode-id="3606" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d231533968e3999" title="Bürkner, P.-C. Advanced Bayesian multilevel modeling with the R package brms. R J. 10, 395–411. 
                  https://doi.org/10.32614/RJ-2018-017
                  
                 (2018)."><span data-dcnode-id="3607" instrument_node="">62</span></a></sup><span data-dcnode-id="3604" instrument_node=""> using </span><span class="u-monospace" data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">Stan</span></span><sup data-dcnode-id="3599"><a aria-label="Reference 63" data-dcnode-id="3600" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d231533968e4006" title="Guo, J. et&nbsp;al. rstan: R Interface to Stan (2020)."><span data-dcnode-id="3601" instrument_node="">63</span></a></sup><span data-dcnode-id="3598" instrument_node="">) with </span><i data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">family</span></i><span data-dcnode-id="3595" instrument_node=""> and </span><i data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">macroarea</span></i><span data-dcnode-id="3592" instrument_node=""> as random effects, and explanatory variables and potential confounds as predictors. For </span><i data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">blue</span></i><span data-dcnode-id="3589" instrument_node=""> we performed logistic regression, and for </span><i data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">daltonism</span></i><span data-dcnode-id="3586" instrument_node=""> we performed beta regression (after replacing the 0.0% values by 0.01%); we used model selection based on Bayes Factors (BF), leave-one-out cross-validation (LOO), the Widely Applicable Information Criterion (WAIC), and K-Fold Cross-Validation (KFOLD, with </span><i data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">K</span></i><span data-dcnode-id="3583" instrument_node=""> = 10). Third, we conducted </span><i data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">mediation analysis</span></i><span data-dcnode-id="3580" instrument_node=""> using a Bayesian mixed effects model (</span><span class="u-monospace" data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">brms</span></span><span data-dcnode-id="3577" instrument_node=""> with </span><span class="u-monospace" data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">Stan</span></span><span data-dcnode-id="3574" instrument_node="">) approach which allowed us to include random effects. Fourth, we used path analysis (as implemented by </span><span class="u-monospace" data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">lavaan</span></span><sup data-dcnode-id="3569"><a aria-label="Reference 64" data-dcnode-id="3570" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d231533968e4037" title="Rosseel, Y. lavaan: An R package for structural equation modeling. J. Stat. Softw. 48, 1–36. 
                  https://doi.org/10.18637/jss.v048.i02
                  
                 (2012)."><span data-dcnode-id="3571" instrument_node="">64</span></a></sup><span data-dcnode-id="3568" instrument_node="">) to test more complex models involving multiple potential predictors (but without controlling for the non-independence due to </span><i data-dcnode-id="3566"><span data-dcnode-id="3567" instrument_node="">family</span></i><span data-dcnode-id="3565" instrument_node=""> and </span><i data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">macroarea</span></i><span data-dcnode-id="3562" instrument_node="">). Finally, we quantified the predictive capacity of a set of variables using Bayesian mixed-effects regression (</span><span class="u-monospace" data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">brms</span></span><span data-dcnode-id="3559" instrument_node=""> with </span><span class="u-monospace" data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">Stan</span></span><span data-dcnode-id="3556" instrument_node="">), conditional inference trees (</span><span class="u-monospace" data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">ctree</span></span><sup data-dcnode-id="3551"><a aria-label="Reference 65" data-dcnode-id="3552" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d231533968e4056" title="Hothorn, T., Hornik, K. &amp; Zeileis, A. Unbiased recursive partitioning: A conditional inference framework. J. Comput. Graph. Stat. 15, 651–674. 
                  https://doi.org/10.1198/106186006X133933
                  
                 (2006)."><span data-dcnode-id="3553" instrument_node="">65</span></a></sup><span data-dcnode-id="3550" instrument_node=""> in package </span><span class="u-monospace" data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">partykit</span></span><sup data-dcnode-id="3545"><a aria-label="Reference 66" data-dcnode-id="3546" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d231533968e4063" title="Hothorn, T. &amp; Zeileis, A. partykit: A modular toolkit for recursive partytioning in R. J. Mach. Learn. Res. 16, 3905–3909 (2015)."><span data-dcnode-id="3547" instrument_node="">66</span></a></sup><span data-dcnode-id="3544" instrument_node="">), random forests (package </span><span class="u-monospace" data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">randomForest</span></span><sup data-dcnode-id="3539"><a aria-label="Reference 67" data-dcnode-id="3540" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d231533968e4069" title="Liaw, A. &amp; Wiener, M. Classification and regression by RandomForest. Forest 23, (2001)."><span data-dcnode-id="3541" instrument_node="">67</span></a></sup><span data-dcnode-id="3538" instrument_node="">) and conditional random forests (</span><span class="u-monospace" data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">cforest</span></span><span data-dcnode-id="3535" instrument_node=""> in package </span><span class="u-monospace" data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">partykit</span></span><span data-dcnode-id="3532" instrument_node="">) and Support Vector Machines (</span><span class="u-monospace" data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">rminer</span></span><span data-dcnode-id="3529" instrument_node=""> package</span><sup data-dcnode-id="3526"><a aria-label="Reference 68" data-dcnode-id="3527" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d231533968e4083" title="Cortez, P. Data mining with neural networks and support vector machines using the R/rminer Tool. In Perner, P. (ed.) Advances in Data Mining. Applications and Theoretical Aspects, Lecture Notes in Computer Science, 572–583,
