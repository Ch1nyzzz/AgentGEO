</span><p data-dcnode-id="3129"><span data-dcnode-id="3196" instrument_node="">Regarding the expectancy-based account of color’s influence on multisensory flavor perception, it is interesting to note that red, one of the colors that have often been shown to generate strong expectations concerning a food’s taste, odor, and flavor (e.g., Koch and Koch </span><a aria-label="Reference 2003" data-dcnode-id="3194" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d280964984e2680" title="Koch C, Koch EC (2003) Preconceptions of taste based on color. J Psychol: Interdisciplinary Applied 137:233–242"><span data-dcnode-id="3195" instrument_node="">2003</span></a><span data-dcnode-id="3193" instrument_node="">; O’Mahony </span><a aria-label="Reference 1983" data-dcnode-id="3191" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d280964984e2683" title="O’Mahony M (1983) Gustatory responses to nongustatory stimuli. Perception 12:627–633"><span data-dcnode-id="3192" instrument_node="">1983</span></a><span data-dcnode-id="3190" instrument_node="">; see also Demattè et al. </span><a aria-label="Reference 2006" data-dcnode-id="3188" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d280964984e2686" title="Demattè ML, Sanabria D, Spence C (2006) Cross-modal associations between odors and colors. Chem Senses 31:531–538"><span data-dcnode-id="3189" instrument_node="">2006</span></a><span data-dcnode-id="3187" instrument_node="">), also happens to be one of the colors that are most often reported as having an effect in terms of influencing flavor, taste, and odor perception (in terms of both identity and intensity judgments; e.g., Hyman </span><a aria-label="Reference 1983" data-dcnode-id="3185" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d280964984e2689" title="Hyman A (1983) The influence of color on the taste perception of carbonated water preparations. Bull Psychon Soc 21:145–148"><span data-dcnode-id="3186" instrument_node="">1983</span></a><span data-dcnode-id="3184" instrument_node="">; Johnson and Clydesdale </span><a aria-label="Reference 1982" data-dcnode-id="3182" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d280964984e2692" title="Johnson J, Clydesdale FM (1982) Perceived sweetness and redness in colored sucrose solutions. J Food Sci 47:747–752"><span data-dcnode-id="3183" instrument_node="">1982</span></a><span data-dcnode-id="3181" instrument_node="">; Maga </span><a aria-label="Reference 1974" data-dcnode-id="3179" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d280964984e2696" title="Maga JA (1974) Influence of color on taste thresholds. Chem Senses Flavor 1:115–119"><span data-dcnode-id="3180" instrument_node="">1974</span></a><span data-dcnode-id="3178" instrument_node="">; Morrot et al. </span><a aria-label="Reference 2001" data-dcnode-id="3176" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d280964984e2699" title="Morrot G, Brochet F, Dubourdieu D (2001) The color of odors. Brain Lang 79:309–320"><span data-dcnode-id="3177" instrument_node="">2001</span></a><span data-dcnode-id="3175" instrument_node="">; Oram et al. </span><a aria-label="Reference 1995" data-dcnode-id="3173" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d280964984e2702" title="Oram N, Laing DG, Hutchinson I, Owen J, Rose G, Freeman M, Newell G (1995) The influence of flavor and color on drink identification by children and adults. Dev Psychobiol 28:239–246"><span data-dcnode-id="3174" instrument_node="">1995</span></a><span data-dcnode-id="3172" instrument_node="">; Stillman </span><a aria-label="Reference 1993" data-dcnode-id="3170" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d280964984e2705" title="Stillman J (1993) Color influences flavor identification in fruit-flavored beverages. J Food Sci 58:810–812"><span data-dcnode-id="3171" instrument_node="">1993</span></a><span data-dcnode-id="3169" instrument_node="">; see Fig.&nbsp;</span><a data-dcnode-id="3167" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3168" instrument_node="">2</span></a><span data-dcnode-id="3166" instrument_node="">). It should, however, also be noted that different colors will likely lead to the generation of different taste/flavor expectations by different people as a function of their background and/or culture (Shankar et al. </span><a aria-label="Reference 2009" data-dcnode-id="3164" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d280964984e2711" title="Shankar MU, Levitan CA, Prescott J, Spence C (2009) The influence of color and label information on flavor perception. Chemosensory Perception 2:53–58"><span data-dcnode-id="3165" instrument_node="">2009</span></a><span data-dcnode-id="3163" instrument_node="">; see also Scanlon </span><a aria-label="Reference 1985" data-dcnode-id="3161" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR107" id="ref-link-section-d280964984e2715" title="Scanlon BA (1985) Race differences in selection of cheese color. Percept Mot Skills 61:314"><span data-dcnode-id="3162" instrument_node="">1985</span></a><span data-dcnode-id="3160" instrument_node="">), expertise/experience with tasting a particular foodstuff (e.g., Pangborn et al. </span><a aria-label="Reference 1963" data-dcnode-id="3158" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d280964984e2718" title="Pangborn RM, Berg HW, Hansen B (1963) The influence of color on discrimination of sweetness in dry table-wine. Am J Psychol 76:492–495"><span data-dcnode-id="3159" instrument_node="">1963</span></a><span data-dcnode-id="3157" instrument_node="">; Parr et al. </span><a aria-label="Reference 2003" data-dcnode-id="3155" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d280964984e2721" title="Parr WV, White KG, Heatherbell D (2003) The nose knows: influence of colour on perception of wine aroma. J Wine Res 14:79–101"><span data-dcnode-id="3156" instrument_node="">2003</span></a><span data-dcnode-id="3154" instrument_node="">; Smith </span><a aria-label="Reference 2007" data-dcnode-id="3152" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR113" id="ref-link-section-d280964984e2724" title="Smith BC (ed) (2007) Questions of taste: the philosophy of wine. Oxford University Press, Oxford"><span data-dcnode-id="3153" instrument_node="">2007</span></a><span data-dcnode-id="3151" instrument_node="">; Urbányi </span><a aria-label="Reference 1982" data-dcnode-id="3149" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR124" id="ref-link-section-d280964984e2727" title="Urbányi G (1982) Investigation into the interaction of different properties in the course of sensory evaluation. I. The effect of colour upon the evaluation of taste in fruit and vegetable products. Acta Aliment 11:233–243"><span data-dcnode-id="3150" instrument_node="">1982</span></a><span data-dcnode-id="3148" instrument_node="">; Williams et al. </span><a aria-label="Reference 1984a" data-dcnode-id="3146" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR128" id="ref-link-section-d280964984e2730" title="Williams AA, Langren SP, Noble AC (1984a) Influence of appearance on the assessment of aroma in Bordeaux wines by trained assessors. J Inst Brew 90:250–253"><span data-dcnode-id="3147" instrument_node="">1984a</span></a><span data-dcnode-id="3145" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="3143" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR129" id="ref-link-section-d280964984e2734" title="Williams AA, Langron SP, Timberlake CF, Bakker J (1984b) Effect of colour on the assessment of ports. Int J Food Sci Technol 19:659–671"><span data-dcnode-id="3144" instrument_node="">b</span></a><span data-dcnode-id="3142" instrument_node="">; though see also Teerling </span><a aria-label="Reference 1992" data-dcnode-id="3140" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d280964984e2737" title="Teerling A (1992) The colour of taste. Chem Senses 17:886"><span data-dcnode-id="3141" instrument_node="">1992</span></a><span data-dcnode-id="3139" instrument_node="">), and age (Oram et al. </span><a aria-label="Reference 1995" data-dcnode-id="3137" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d280964984e2740" title="Oram N, Laing DG, Hutchinson I, Owen J, Rose G, Freeman M, Newell G (1995) The influence of flavor and color on drink identification by children and adults. Dev Psychobiol 28:239–246"><span data-dcnode-id="3138" instrument_node="">1995</span></a><span data-dcnode-id="3136" instrument_node="">; Philipsen et al. </span><a aria-label="Reference 1995" data-dcnode-id="3134" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d280964984e2743" title="Philipsen DH, Clydesdale FM, Griffin RW, Stern P (1995) Consumer age affects response to sensory characteristics of a cherry flavoured beverage. J Food Sci 60:364–368"><span data-dcnode-id="3135" instrument_node="">1995</span></a><span data-dcnode-id="3133" instrument_node="">; see also Lavin and Lawless </span><a aria-label="Reference 1998" data-dcnode-id="3131" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d280964984e2746" title="Lavin J, Lawless H (1998) Effects of color and odor on judgments of sweetness among children and adults. Food Qual Prefer 9:283–289"><span data-dcnode-id="3132" instrument_node="">1998</span></a><span data-dcnode-id="3130" instrument_node="">).</span></p><p data-dcnode-id="3118"><span data-dcnode-id="3128" instrument_node="">Shankar et al. (</span><a aria-label="Reference 2009" data-dcnode-id="3126" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d280964984e2752" title="Shankar MU, Levitan CA, Prescott J, Spence C (2009) The influence of color and label information on flavor perception. Chemosensory Perception 2:53–58"><span data-dcnode-id="3127" instrument_node="">2009</span></a><span data-dcnode-id="3125" instrument_node="">) recently investigated the nature of any cross-cultural differences in color–flavor expectancy effects. The two groups of participants in their study, one from the UK the other from Taiwan, were shown seven colored drinks (brown, blue, yellow, orange, green, clear, and red) and had to report on the flavor that they expected each colored drink to taste of. Just as in the study of Zampini et al. (</span><a aria-label="Reference 2007" data-dcnode-id="3123" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e2755" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="3124" instrument_node="">2007</span></a><span data-dcnode-id="3122" instrument_node="">), the participants in each group were found to generate consistent flavor expectations based on the colors of the drinks. Importantly, however, the flavor expectations generated by the two groups of participants were significantly different for several (but importantly, not all) of the colored drinks (see Table&nbsp;</span><a data-dcnode-id="3120" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab5"><span data-dcnode-id="3121" instrument_node="">5</span></a><span data-dcnode-id="3119" instrument_node="">).
</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3100" data-test="inline-table" id="table-5"><figure data-dcnode-id="3101"><figcaption class="c-article-table__figcaption" data-dcnode-id="3112"><b data-dcnode-id="3113" data-test="table-caption" id="Tab5"><span data-dcnode-id="3117" instrument_node="">Table&nbsp;5 Results of the cross-cultural study of Shankar et al. (</span><a aria-label="Reference 2010" data-dcnode-id="3115" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR109" id="ref-link-section-d280964984e2771" title="Shankar MU, Levitan CA, Spence C (2010) Does higher level knowledge mediate the interpretation of multisensory cues? Conscious Cogn (in press)"><span data-dcnode-id="3116" instrument_node="">2010</span></a><span data-dcnode-id="3114" instrument_node="">) assessing the flavor expectations elicited by differently colored drinks in two groups of participants, one from the UK, the other from Taiwan</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3102"><a aria-label="Full size table 5" class="c-article__pill-button" data-dcnode-id="3103" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12078-010-9067-z/tables/5" rel="nofollow"><span data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3104" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3105" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3106" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3109" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3108" fill-rule="evenodd"></path><span data-dcnode-id="3107" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3099" instrument_node="">
</span><p data-dcnode-id="3088"><span data-dcnode-id="3098" instrument_node="">Given the individual differences in the flavor expectations generated by viewing a food’s coloring, a critical experiment that has yet to be conducted would involve investigating whether the flavor expectations held by an individual do indeed lead to the misidentification of a food or drink’s flavor or aroma. Our prediction is that if one person expects a brown drink to taste of cola while another expects a drink of the same color to taste of grape (see Table&nbsp;</span><a data-dcnode-id="3096" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab5"><span data-dcnode-id="3097" instrument_node="">5</span></a><span data-dcnode-id="3095" instrument_node="">; see also Oram et al. </span><a aria-label="Reference 1995" data-dcnode-id="3093" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d280964984e2794" title="Oram N, Laing DG, Hutchinson I, Owen J, Rose G, Freeman M, Newell G (1995) The influence of flavor and color on drink identification by children and adults. Dev Psychobiol 28:239–246"><span data-dcnode-id="3094" instrument_node="">1995</span></a><span data-dcnode-id="3092" instrument_node="">), then adding a brown color to a drink should result in different flavor (aroma) identification responses for these two individuals. While this experiment sounds (and indeed is) very simple, no one has, as yet, measured their participants’ flavor (or for that matter taste or odor) expectations and then followed through to investigate whether those expectations do indeed predict the subsequent pattern of flavor (taste or odor) misidentification that results when that color is added to a foodstuff (cf. Cardello </span><a aria-label="Reference 2007" data-dcnode-id="3090" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d280964984e2797" title="Cardello AV (2007) Measuring consumer expectations to improve food product development. In: MacFie HJH (ed) Consumer-led food product development. Woodhead Publishing, Cambridge, pp 223–261"><span data-dcnode-id="3091" instrument_node="">2007</span></a><span data-dcnode-id="3089" instrument_node="">; Shankar et al., submitted).</span></p><p data-dcnode-id="3035"><span data-dcnode-id="3087" instrument_node="">While some researchers appear to believe that such cognitive effects of color on flavor will not have any low-level (e.g., physiological/perceptual) consequences (e.g., see Keast et al. </span><a aria-label="Reference 2004" data-dcnode-id="3085" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d280964984e2804" title="Keast RSJ, Dalton PH, Breslin PAS (2004) Flavour interactions at the sensory level. In: Taylor AJ, Roberts DD (eds) Flavour perception. Blackwell Scientific, Oxford, pp 228–255"><span data-dcnode-id="3086" instrument_node="">2004</span></a><span data-dcnode-id="3084" instrument_node="">; Fig.&nbsp;</span><a data-dcnode-id="3082" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3083" instrument_node="">1</span></a><span data-dcnode-id="3081" instrument_node="">), others clearly think that color’s influence on flavor is perceptual in nature (e.g., see Delwiche </span><a aria-label="Reference 2004" data-dcnode-id="3079" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d280964984e2810" title="Delwiche J (2004) The impact of perceptual interactions on perceived flavor. Food Qual Prefer 15:137–146"><span data-dcnode-id="3080" instrument_node="">2004</span></a><span data-dcnode-id="3078" instrument_node="">; Fig.&nbsp;</span><a data-dcnode-id="3076" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3077" instrument_node="">1</span></a><span data-dcnode-id="3075" instrument_node="">). Discussion here though is complicated by the fact that different researchers appear to use the same terms (e.g., “perceptual”) to mean very different things. For example, while Delwiche (</span><a aria-label="Reference 2004" data-dcnode-id="3073" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d280964984e2816" title="Delwiche J (2004) The impact of perceptual interactions on perceived flavor. Food Qual Prefer 15:137–146"><span data-dcnode-id="3074" instrument_node="">2004</span></a><span data-dcnode-id="3072" instrument_node="">) (Fig.&nbsp;</span><a data-dcnode-id="3070" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3071" instrument_node="">1</span></a><span data-dcnode-id="3069" instrument_node="">) draws a clear distinction between cognitive and perceptual effects, others appear to view cognitive/expectation effects as being perceptual (as opposed to physical, sensory, or hedonic; see Cardello </span><a aria-label="Reference 1996" data-dcnode-id="3067" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d280964984e2823" title="Cardello AV (1996) The role of the human senses in food acceptance. In: Meiselman HL, McFie HJH (eds) Food choice, acceptance and consumption. Blackie Academic &amp; Professional, New York, pp 1–82"><span data-dcnode-id="3068" instrument_node="">1996</span></a><span data-dcnode-id="3066" instrument_node="">; Fig.&nbsp;</span><a data-dcnode-id="3064" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3065" instrument_node="">1</span></a><span data-dcnode-id="3063" instrument_node="">). It is therefore important to note that expectancy effects (here one can also think of labeling, pricing, and/or branding as forms of expectancy effect; e.g., Cardello </span><a aria-label="Reference 1994" data-dcnode-id="3061" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d280964984e2829" title="Cardello AV (1994) Consumer expectations and their role in food acceptance. In: MacFie HJH, Thomson DMH (eds) Measurement of food preferences. Blackie Academic &amp; Professional, London, pp 253–297"><span data-dcnode-id="3062" instrument_node="">1994</span></a><span data-dcnode-id="3060" instrument_node="">, </span><a aria-label="Reference 2007" data-dcnode-id="3058" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d280964984e2832" title="Cardello AV (2007) Measuring consumer expectations to improve food product development. In: MacFie HJH (ed) Consumer-led food product development. Woodhead Publishing, Cambridge, pp 223–261"><span data-dcnode-id="3059" instrument_node="">2007</span></a><span data-dcnode-id="3057" instrument_node="">; Hutchings </span><a aria-label="Reference 1977" data-dcnode-id="3055" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d280964984e2835" title="Hutchings JB (1977) The importance of visual appearance of foods to the food processor and the consumer. In: Birch GG, Brennan JG, Parker KJ (eds) Sensory properties of foods. Applied Science Publishers, London, pp 45–57"><span data-dcnode-id="3056" instrument_node="">1977</span></a><span data-dcnode-id="3054" instrument_node="">; Shiv et al. </span><a aria-label="Reference 2005" data-dcnode-id="3052" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d280964984e2839" title="Shiv B, Carmon Z, Ariely D (2005) Placebo effects of marketing actions: consumers may get what they pay for. J Mark Res XLII:383–393"><span data-dcnode-id="3053" instrument_node="">2005</span></a><span data-dcnode-id="3051" instrument_node="">; though see Davis </span><a aria-label="Reference 1981" data-dcnode-id="3049" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d280964984e2842" title="Davis RG (1981) The role of nonolfactory context cues in odor identification. Percept Psychophys 30:83–89"><span data-dcnode-id="3050" instrument_node="">1981</span></a><span data-dcnode-id="3048" instrument_node="">) have been shown in neuroimaging studies to have surprisingly early effects on sensory information processing in humans (e.g., McClure et al. </span><a aria-label="Reference 2004" data-dcnode-id="3046" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d280964984e2845" title="McClure SM, Li J, Tomlin D, Cypert KS, Montague LM, Montague PR (2004) Neural correlates of behavioral preference for culturally familiar drinks. Neuron 44:379–387"><span data-dcnode-id="3047" instrument_node="">2004</span></a><span data-dcnode-id="3045" instrument_node="">; Nitschke et al. </span><a aria-label="Reference 2006" data-dcnode-id="3043" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d280964984e2848" title="Nitschke JB, Dixon GE, Sarinopoulos I, Short SJ, Cohen JD, Smith EE et al (2006) Altering expectancy dampens neural response to aversive taste in primary taste cortex. Nat Neurosci 9:435–442"><span data-dcnode-id="3044" instrument_node="">2006</span></a><span data-dcnode-id="3042" instrument_node="">; Plassmann et al. </span><a aria-label="Reference 2008" data-dcnode-id="3040" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR96" id="ref-link-section-d280964984e2851" title="Plassmann H, O’Doherty J, Shiv B, Rangel A (2008) Marketing actions can modulate neural representations of experienced pleasantness. Proc Natl Acad Sci USA 105:1050–1054"><span data-dcnode-id="3041" instrument_node="">2008</span></a><span data-dcnode-id="3039" instrument_node="">; Sarinopoulos et al. </span><a aria-label="Reference 2006" data-dcnode-id="3037" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d280964984e2854" title="Sarinopoulos I, Dixon GE, Short SJ, Davidson RJ, Nitschke JB (2006) Brain mechanisms of expectation associated with insula and amygdala response to aversive taste: implications for placebo. Brain Behav Immun 20:120–132"><span data-dcnode-id="3038" instrument_node="">2006</span></a><span data-dcnode-id="3036" instrument_node="">). Such results therefore raise the possibility that color-induced expectancy effects might also influence a person’s perceptual representation of flavor information and not just the response that they happen to make.</span></p><p data-dcnode-id="3000"><span data-dcnode-id="3034" instrument_node="">Color-induced expectancy effects might influence flavor perception (in particular, identification) by directing a participant’s </span><i data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">attention</span></i><span data-dcnode-id="3031" instrument_node=""> to a salient component of a flavor stimulus (e.g., Ashkenazi and Marks </span><a aria-label="Reference 2004" data-dcnode-id="3029" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d280964984e2863" title="Ashkenazi A, Marks LE (2004) Effect of endogenous attention on detection of weak gustatory and olfactory flavors. Percept Psychophys 66:596–608"><span data-dcnode-id="3030" instrument_node="">2004</span></a><span data-dcnode-id="3028" instrument_node="">; Marks </span><a aria-label="Reference 2002" data-dcnode-id="3026" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d280964984e2866" title="Marks LE (2002) The role of attention in chemosensation. Food Qual Prefer 14:147–155"><span data-dcnode-id="3027" instrument_node="">2002</span></a><span data-dcnode-id="3025" instrument_node="">; Marks and Wheeler </span><a aria-label="Reference 1998" data-dcnode-id="3023" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d280964984e2869" title="Marks LE, Wheeler ME (1998) Attention and the detectability of weak taste stimuli. Chem Senses 23:19–29"><span data-dcnode-id="3024" instrument_node="">1998</span></a><span data-dcnode-id="3022" instrument_node="">; Marshall et al. </span><a aria-label="Reference 2006" data-dcnode-id="3020" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d280964984e2872" title="Marshall K, Laing DG, Jinks AL, Hutchinson I (2006) The capacity of humans to identify components in complex odor–taste mixtures. Chem Senses 31:539–545"><span data-dcnode-id="3021" instrument_node="">2006</span></a><span data-dcnode-id="3019" instrument_node="">; Oram et al. </span><a aria-label="Reference 1995" data-dcnode-id="3017" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d280964984e2876" title="Oram N, Laing DG, Hutchinson I, Owen J, Rose G, Freeman M, Newell G (1995) The influence of flavor and color on drink identification by children and adults. Dev Psychobiol 28:239–246"><span data-dcnode-id="3018" instrument_node="">1995</span></a><span data-dcnode-id="3016" instrument_node="">). Research elsewhere in psychology has shown that the focusing of a participant’s attention on a particular stimulus or stimulus attribute can enhance the perceptual representation of that stimulus or stimulus attribute (i.e., can have an effect on perceptual sensitivity as measured by a change in </span><i data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">d</span></i><span data-dcnode-id="3013" instrument_node="">′). It is, though, important to bear in mind that color cues can (and do) sometimes lead to decisional effects as well (e.g., by influencing people’s criteria for making various judgments; cf. Engen </span><a aria-label="Reference 1972" data-dcnode-id="3011" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d280964984e2882" title="Engen T (1972) The effect of expectation on judgments of odour. Acta Psychol 36:450–458"><span data-dcnode-id="3012" instrument_node="">1972</span></a><span data-dcnode-id="3010" instrument_node="">; McCullough et al. </span><a aria-label="Reference 1978" data-dcnode-id="3008" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d280964984e2885" title="McCullough JM, Martinsen CS, Moinpour R (1978) Application of multidimensional scaling to the analysis of sensory evaluations of stimuli with known attribute structures. J Appl Psychol 63:103–109"><span data-dcnode-id="3009" instrument_node="">1978</span></a><span data-dcnode-id="3007" instrument_node="">). Such decisional effects are likely to be especially prominent when the stimulus itself is ambiguous (as flavor stimuli often are; cf. Chaiken </span><a aria-label="Reference 1980" data-dcnode-id="3005" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d280964984e2888" title="Chaiken S (1980) Heuristic vs systematic information processing and the use of source versus message cues in persuasion. J Pers Soc Psychol 29:752–766"><span data-dcnode-id="3006" instrument_node="">1980</span></a><span data-dcnode-id="3004" instrument_node="">; Wilson and Klaaren </span><a aria-label="Reference 1992" data-dcnode-id="3002" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR130" id="ref-link-section-d280964984e2891" title="Wilson T, Klaaren K (1992) Expectation whirls me round: the role of affective expectations on affective experiences. In: Clear MS (ed) Review of personality and social psychology: emotion and social behavior. Sage, Newbury Park, pp 1–31"><span data-dcnode-id="3003" instrument_node="">1992</span></a><span data-dcnode-id="3001" instrument_node="">). Taken together, the research reviewed in this section therefore supports the view that “higher level” (or top-down) cognitive beliefs or expectations can (and do) have low-level (early) effects.</span></p></div></div></section><section data-dcnode-id="2963" data-title="The Multisensory Integration of Color/Flavor Cues"><div class="c-article-section" data-dcnode-id="2964" id="Sec8-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2995" id="Sec8"><span data-dcnode-id="2996" instrument_node="">The Multisensory Integration of Color/Flavor Cues</span></h2><div class="c-article-section__content" data-dcnode-id="2965" id="Sec8-content"><p data-dcnode-id="2966"><span data-dcnode-id="2994" instrument_node="">One of the most important issues for future research concerns the question of whether in addition to any top-down cognitive influence (in the form of expectancy effects), food coloring can also influence flavor identification in humans (automatically) in a bottom-up manner via multisensory integration. The multisensory integration of flavor cues in a food or drink with an atypical visual color cue would be expected to lead to a form of sensory (i.e., visual) dominance over flavor perception (see Ernst and Banks </span><a aria-label="Reference 2002" data-dcnode-id="2992" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d280964984e2902" title="Ernst MO, Banks MS (2002) Humans integrate visual and haptic information in a statistically optimal fashion. Nature 415:429–433"><span data-dcnode-id="2993" instrument_node="">2002</span></a><span data-dcnode-id="2991" instrument_node="">; Ernst and Bülthoff </span><a aria-label="Reference 2004" data-dcnode-id="2989" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d280964984e2905" title="Ernst MO, Bülthoff HH (2004) Merging the senses into a robust percept. Trends Cogn Sci 8:162–169"><span data-dcnode-id="2990" instrument_node="">2004</span></a><span data-dcnode-id="2988" instrument_node="">; Posner et al. </span><a aria-label="Reference 1976" data-dcnode-id="2986" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d280964984e2908" title="Posner MI, Nissen MJ, Klein RM (1976) Visual dominance: an information-processing account of its origins and significance. Psychol Rev 83:157–171"><span data-dcnode-id="2987" instrument_node="">1976</span></a><span data-dcnode-id="2985" instrument_node="">; Spence </span><a aria-label="Reference 2008" data-dcnode-id="2983" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR115" id="ref-link-section-d280964984e2911" title="Spence C (2008) Multisensory perception. In: Blumenthal H (ed) The big fat duck cook book. Bloomsbury, London, pp 484–485"><span data-dcnode-id="2984" instrument_node="">2008</span></a><span data-dcnode-id="2982" instrument_node="">). Numerous neurophysiological studies have already demonstrated the integration of olfactory, gustatory, textural, and visual cues in the orbitofrontal cortex of both monkey and man (see Gottfried and Dolan </span><a aria-label="Reference 2003" data-dcnode-id="2980" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d280964984e2914" title="Gottfried JA, Dolan RJ (2003) The nose smells what the eye sees: crossmodal visual facilitation of human olfactory perception. Neuron 39:375–386"><span data-dcnode-id="2981" instrument_node="">2003</span></a><span data-dcnode-id="2979" instrument_node="">; Österbauer et al. </span><a aria-label="Reference 2005" data-dcnode-id="2977" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d280964984e2918" title="Österbauer RA, Matthews PM, Jenkinson M, Beckmann CF, Hansen PC, Calvert GA (2005) Color of scents: chromatic stimuli modulate odor responses in the human brain. J Neurophysiol 93:3434–3441"><span data-dcnode-id="2978" instrument_node="">2005</span></a><span data-dcnode-id="2976" instrument_node="">; Rolls and Baylis </span><a aria-label="Reference 1994" data-dcnode-id="2974" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d280964984e2921" title="Rolls ET, Baylis LL (1994) Gustatory, olfactory, and visual convergence within the primate orbitofrontal cortex. J Neurosci 14:5437–5452"><span data-dcnode-id="2975" instrument_node="">1994</span></a><span data-dcnode-id="2973" instrument_node="">; Rolls et al. </span><a aria-label="Reference 1996" data-dcnode-id="2971" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d280964984e2924" title="Rolls ET, Critchley HD, Mason R, Wakeman EA (1996) Orbitofrontal cortex neurons: role in olfactory and visual association learning. J Neurophysiol 75:1970–1981"><span data-dcnode-id="2972" instrument_node="">1996</span></a><span data-dcnode-id="2970" instrument_node="">). Given that the Bayesian approach is currently proving so successful elsewhere in the study of multisensory integration, one might expect this approach to understanding multisensory perception to have an influence here as well soon. However, the problem that one soon runs into in terms of trying to separate top-down (i.e., cognitive) and bottom-up (i.e., stimulus-driven) influences is that many of the factors that are likely to promote top-down cognitive effects are also likely to increase the likelihood of bottom-up multisensory integration as well (see Spence </span><a aria-label="Reference 2007" data-dcnode-id="2968" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d280964984e2927" title="Spence C (2007) Audiovisual multisensory integration. Acoust Sci Technol 28:61–70"><span data-dcnode-id="2969" instrument_node="">2007</span></a><span data-dcnode-id="2967" instrument_node=""> on this point).</span></p></div></div></section><section data-dcnode-id="2893" data-title="Isolating the Bottom-Up Effects of Color on Flavor Perception"><div class="c-article-section" data-dcnode-id="2894" id="Sec9-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2961" id="Sec9"><span data-dcnode-id="2962" instrument_node="">Isolating the Bottom-Up Effects of Color on Flavor Perception</span></h2><div class="c-article-section__content" data-dcnode-id="2895" id="Sec9-content"><p data-dcnode-id="2950"><span data-dcnode-id="2960" instrument_node="">In the future, though, it may be possible to isolate any bottom-up effects of color on flavor perception by utilizing articulatory suppression to minimize the effect of top-down cognitive factors on participants’ performance. For instance, Stevenson and Oaten (</span><a aria-label="Reference 2008" data-dcnode-id="2958" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR117" id="ref-link-section-d280964984e2938" title="Stevenson RJ, Oaten M (2008) The effect of appropriate and inappropriate stimulus color on odor discrimination. Percept Psychophys 70:640–646"><span data-dcnode-id="2959" instrument_node="">2008</span></a><span data-dcnode-id="2957" instrument_node="">) recently used this technique in order to investigate whether color’s effect on orthonasal olfaction is automatic or not. The cherry and strawberry olfactants used in this study were dissolved in liquids that were colored green, red, or else left colorless. Stevenson and Oaten demonstrated that the crossmodal influence of color (either appropriate or inappropriate) on odor discrimination performance was significantly reduced when their participants engaged in articulatory suppression (saying the word “the” out loud repeatedly) while evaluating the odors. This result suggests that the crossmodal effect of color on odor perception is not mandatory (or, in Stevenson and Oaten’s words, “automatic”). As such, it provides some evidence against color influencing odor perception through a process of bottom-up multisensory integration (perhaps leading to sensory dominance) since research in other areas of psychology has shown that multisensory integration tends to be relatively automatic (i.e., unaffected by the performance of a secondary task; see Navarra et al. </span><a aria-label="Reference 2009" data-dcnode-id="2955" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d280964984e2941" title="Navarra J, Alsius A, Soto-Faraco S, Spence C (2009) Assessing the role of attention in the audiovisual integration of speech. Inf Fusion 11:4–11"><span data-dcnode-id="2956" instrument_node="">2009</span></a><span data-dcnode-id="2954" instrument_node="">; Santangelo and Spence </span><a aria-label="Reference 2008" data-dcnode-id="2952" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d280964984e2944" title="Santangelo V, Spence C (2008) Is the exogenous orienting of spatial attention truly automatic? Evidence from unimodal and multisensory studies. Conscious Cogn 17:989–1015"><span data-dcnode-id="2953" instrument_node="">2008</span></a><span data-dcnode-id="2951" instrument_node=""> for reviews).</span></p><p data-dcnode-id="2930"><span data-dcnode-id="2949" instrument_node="">It would, of course, be ideal to utilize the articulatory suppression technique in order to assess whether one can eliminate (or at least modulate) color’s crossmodal effect on flavor identification.</span><sup data-dcnode-id="2944"><a data-dcnode-id="2945" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">Footnote </span></span><span data-dcnode-id="2946" instrument_node="">7</span></a></sup><span data-dcnode-id="2943" instrument_node=""> If one were to obtain a similar result to that reported by Stevenson and Oaten (</span><a aria-label="Reference 2008" data-dcnode-id="2941" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR117" id="ref-link-section-d280964984e2959" title="Stevenson RJ, Oaten M (2008) The effect of appropriate and inappropriate stimulus color on odor discrimination. Percept Psychophys 70:640–646"><span data-dcnode-id="2942" instrument_node="">2008</span></a><span data-dcnode-id="2940" instrument_node="">), it would provide evidence that color’s influence on flavor perception is mediated primarily by cognitive (or top-down) expectancy factors and not by bottom-up (i.e., automatic) multisensory integration. One might think such a result likely given Stevenson and Oaten’s use of food odors. However, it is important to note that Koza et al. (</span><a aria-label="Reference 2005" data-dcnode-id="2938" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d280964984e2962" title="Koza BJ, Cilmi A, Dolese M, Zellner DA (2005) Color enhances orthonasal olfactory intensity and reduces retronasal olfactory intensity. Chem Senses 30:643–649"><span data-dcnode-id="2939" instrument_node="">2005</span></a><span data-dcnode-id="2937" instrument_node="">) have shown that color can have qualitatively different effects on olfactory perception as a function of whether an odor is delivered orthonasally (as in Stevenson and Oaten’s study) or retronasally (as when actually consuming a food or drink). Alternatively, however, one may also be able to dissociate bottom-up multisensory integration effects from top-down effects resulting from cognitive expectancies by playing with the parameters of stimulus presentation, such as by varying the timing and/or spatial relationship between the color and the flavor (see also Lee et al. </span><a aria-label="Reference 2006" data-dcnode-id="2935" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d280964984e2965" title="Lee L, Frederick S, Ariely D (2006) Try it, you’ll like it: the influence of expectation, consumption, and revelation on preferences for beer. Psychol Sci 17:1054–1058"><span data-dcnode-id="2936" instrument_node="">2006</span></a><span data-dcnode-id="2934" instrument_node="">). Bottom-up integration tends to be more sensitive to spatiotemporal coincidence of the constituent signals than are top-down cognitive effects (see Spence </span><a aria-label="Reference 2007" data-dcnode-id="2932" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d280964984e2968" title="Spence C (2007) Audiovisual multisensory integration. Acoust Sci Technol 28:61–70"><span data-dcnode-id="2933" instrument_node="">2007</span></a><span data-dcnode-id="2931" instrument_node="">).</span></p><p data-dcnode-id="2907"><span data-dcnode-id="2929" instrument_node="">It may, of course, turn out that the crossmodal effect of food coloring on flavor identification operates in both a top-down manner via cognitive expectations and in a bottom-up manner via the sensory dominance resulting from the automatic (i.e., involuntary) multisensory integration of the various unimodal sensory signals. Complicating matters further here though is the fact that the relative contribution of top-down and bottom-up factors might also vary as a function of the specific combinations of color (and other visual appearance cues; Francis </span><a aria-label="Reference 1977" data-dcnode-id="2927" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d280964984e2974" title="Francis FJ (1977) Color and appearance as dominating sensory properties of food. In: Birch GG, Brennan JG, Parker KJ (eds) Sensory properties of foods. Applied Science, Barking, pp 45–47"><span data-dcnode-id="2928" instrument_node="">1977</span></a><span data-dcnode-id="2926" instrument_node="">; Levitan et al. </span><a aria-label="Reference 2008" data-dcnode-id="2924" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d280964984e2977" title="Levitan C, Zampini M, Li R, Spence C (2008) Assessing the role of color cues and people’s beliefs about color–flavor associations on the discrimination of the flavor of sugar-coated chocolates. Chem Senses 33:415–423"><span data-dcnode-id="2925" instrument_node="">2008</span></a><span data-dcnode-id="2923" instrument_node="">) and flavor being investigated. On the one hand, the more that a color is associated with a particular taste or flavor (such as red being associated with sweetness in ripe fruits and green with tartness/sourness in unripe fruits; Maga </span><a aria-label="Reference 1974" data-dcnode-id="2921" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d280964984e2980" title="Maga JA (1974) Influence of color on taste thresholds. Chem Senses Flavor 1:115–119"><span data-dcnode-id="2922" instrument_node="">1974</span></a><span data-dcnode-id="2920" instrument_node="">; Pangborn </span><a aria-label="Reference 1960" data-dcnode-id="2918" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d280964984e2983" title="Pangborn RM (1960) Influence of color on the discrimination of sweetness. Am J Psychol 73:229–238"><span data-dcnode-id="2919" instrument_node="">1960</span></a><span data-dcnode-id="2917" instrument_node="">), the stronger one might expect that both the bottom-up and top-down effects should be. By contrast, the consequences of marketing, for example, the recent introduction of the association between blue coloring and raspberry flavoring (see Garber et al. </span><a aria-label="Reference 2008" data-dcnode-id="2915" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d280964984e2986" title="Garber LL Jr, Hyatt EM, Boya ÜÖ (2008) The mediating effects of the appearance of nondurable consumer goods and their packaging on consumer behavior. In: Schifferstein HNJ, Hekkert P (eds) Product experience. Elsevier, London, pp 581–602"><span data-dcnode-id="2916" instrument_node="">2008</span></a><span data-dcnode-id="2914" instrument_node="">; Shankar et al. </span><a aria-label="Reference 2010" data-dcnode-id="2912" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR109" id="ref-link-section-d280964984e2990" title="Shankar MU, Levitan CA, Spence C (2010) Does higher level knowledge mediate the interpretation of multisensory cues? Conscious Cogn (in press)"><span data-dcnode-id="2913" instrument_node="">2010</span></a><span data-dcnode-id="2911" instrument_node="">; see also Triplett </span><a aria-label="Reference 1994" data-dcnode-id="2909" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR123" id="ref-link-section-d280964984e2993" title="Triplett T (1994) Consumers show little taste for clear beverages. Marketing News 28(11):2, 11"><span data-dcnode-id="2910" instrument_node="">1994</span></a><span data-dcnode-id="2908" instrument_node="">), might, at least initially, be expected to have a primarily cognitive effect.</span></p><p data-dcnode-id="2896"><span data-dcnode-id="2906" instrument_node="">Having demonstrated that food coloring does indeed influence flavor identification, the question of how best to unravel the various mechanism(s), at both a behavioral and neural level, underlying this crossmodal effect clearly represents an important and challenging area for study in the years to come. Part of the challenge here comes from the fact that (as shown in Fig.&nbsp;</span><a data-dcnode-id="2904" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2905" instrument_node="">1</span></a><span data-dcnode-id="2903" instrument_node="">) it is currently unclear whether color’s crossmodal influence on flavor perception in any given situation is being driven by color’s influence on taste, smell (orthonasal or retronasal), or directly on the flavor percept itself. What is, though, certain at the present time is that color plays an integral part in our experience of, and responses toward, food and drink even if, as suggested by the ISO (</span><a aria-label="Reference 1992" data-dcnode-id="2901" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d280964984e3002" title="ISO (1992) Standard 5492: terms relating to sensory analysis. International Organization for Standardization"><span data-dcnode-id="2902" instrument_node="">1992</span></a><span data-dcnode-id="2900" instrument_node="">, </span><a aria-label="Reference 2008" data-dcnode-id="2898" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d280964984e3005" title="ISO (2008) Standard 5492: terms relating to sensory analysis. International Organization for Standardization"><span data-dcnode-id="2899" instrument_node="">2008</span></a><span data-dcnode-id="2897" instrument_node="">), visual cues do not constitute a core attribute of flavor perception.</span></p></div></div></section><span data-dcnode-id="2892" instrument_node="">
</span><section data-dcnode-id="2753" data-title="Notes"><div class="c-article-section" data-dcnode-id="2754" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2890" id="notes"><span data-dcnode-id="2891" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="2755" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="2756"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="2874" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="2875"><p data-dcnode-id="2876"><span data-dcnode-id="2889" instrument_node="">It should be noted that the near absence of research means that, as yet, there is nothing much to say about vision’s influence, if any, on the oral–somatosensory attributes of flavor (see Christensen </span><a aria-label="Reference 1983" data-dcnode-id="2887" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d280964984e1162" title="Christensen C (1983) Effects of color on aroma, flavor and texture judgments of foods. J Food Sci 48:787–790"><span data-dcnode-id="2888" instrument_node="">1983</span></a><span data-dcnode-id="2886" instrument_node="">; de Wijk et al. </span><a aria-label="Reference 2004" data-dcnode-id="2884" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d280964984e1165" title="de Wijk RA, Polet IA, Engelen L et al (2004) Amount of ingested custard dessert as affected by its color, odor, and texture. Physiol Behav 82:397–403"><span data-dcnode-id="2885" instrument_node="">2004</span></a><span data-dcnode-id="2883" instrument_node="">; Frost and Janhoj </span><a aria-label="Reference 2007" data-dcnode-id="2881" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d280964984e1168" title="Frost MB, Janhoj T (2007) Understanding creaminess. Int Dairy J 17:1298–1311"><span data-dcnode-id="2882" instrument_node="">2007</span></a><span data-dcnode-id="2880" instrument_node=""> for exceptions; see Verhagen and Engelen </span><a aria-label="Reference 2006" data-dcnode-id="2878" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d280964984e1171" title="Verhagen JV, Engelen L (2006) The neurocognitive bases of human multimodal food perception: sensory integration. Neurosci Biobehav Rev 30:613–650"><span data-dcnode-id="2879" instrument_node="">2006</span></a><span data-dcnode-id="2877" instrument_node=""> for a review).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="2831" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="2832"><p data-dcnode-id="2833"><span data-dcnode-id="2873" instrument_node="">Over the years, researchers have looked at color’s role in influencing people’s perception of the taste and flavor of many different foods, including jellies (Moir </span><a aria-label="Reference 1936" data-dcnode-id="2871" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d280964984e1298" title="Moir HC (1936) Some observations on the appreciation of flavour in foodstuffs. J Soc Chem Ind: Chemistry Industry Review 14:145–148"><span data-dcnode-id="2872" instrument_node="">1936</span></a><span data-dcnode-id="2870" instrument_node="">), cake (DuBose et al. </span><a aria-label="Reference 1980" data-dcnode-id="2868" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d280964984e1301" title="DuBose CN, Cardello AV, Maller O (1980) Effects of colorants and flavorants on identification, perceived flavor intensity, and hedonic quality of fruit-flavored beverages and cake. J Food Sci 45:1393–1399, 1415"><span data-dcnode-id="2869" instrument_node="">1980</span></a><span data-dcnode-id="2867" instrument_node="">; Moir </span><a aria-label="Reference 1936" data-dcnode-id="2865" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d280964984e1304" title="Moir HC (1936) Some observations on the appreciation of flavour in foodstuffs. J Soc Chem Ind: Chemistry Industry Review 14:145–148"><span data-dcnode-id="2866" instrument_node="">1936</span></a><span data-dcnode-id="2864" instrument_node="">; Tom et al. </span><a aria-label="Reference 1987" data-dcnode-id="2862" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR122" id="ref-link-section-d280964984e1307" title="Tom G, Barnett T, Lew W, Selmants J (1987) Cueing the consumer: the role of salient cues in consumer perception. J Consum Mark 4(2):23–27"><span data-dcnode-id="2863" instrument_node="">1987</span></a><span data-dcnode-id="2861" instrument_node="">), chocolate (Duncker </span><a aria-label="Reference 1939" data-dcnode-id="2859" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d280964984e1310" title="Duncker K (1939) The influence of past experience upon perceptual properties. Am J Psychol 52:255–265"><span data-dcnode-id="2860" instrument_node="">1939</span></a><span data-dcnode-id="2858" instrument_node="">; Levitan et al. </span><a aria-label="Reference 2008" data-dcnode-id="2856" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d280964984e1314" title="Levitan C, Zampini M, Li R, Spence C (2008) Assessing the role of color cues and people’s beliefs about color–flavor associations on the discrimination of the flavor of sugar-coated chocolates. Chem Senses 33:415–423"><span data-dcnode-id="2857" instrument_node="">2008</span></a><span data-dcnode-id="2855" instrument_node="">; Shankar et al. </span><a aria-label="Reference 2009" data-dcnode-id="2853" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d280964984e1317" title="Shankar MU, Levitan CA, Prescott J, Spence C (2009) The influence of color and label information on flavor perception. Chemosensory Perception 2:53–58"><span data-dcnode-id="2854" instrument_node="">2009</span></a><span data-dcnode-id="2852" instrument_node="">), syrups (Kanig </span><a aria-label="Reference 1955" data-dcnode-id="2850" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d280964984e1320" title="Kanig JL (1955) Mental impact of colors in foods studied. Food Field Reporter 23:57"><span data-dcnode-id="2851" instrument_node="">1955</span></a><span data-dcnode-id="2849" instrument_node="">), sherbets (Hall </span><a aria-label="Reference 1958" data-dcnode-id="2847" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d280964984e1323" title="Hall RL (1958) Flavor study approaches at McCormick and Company, Inc. In: A. D. Little Inc. (ed) Flavor research and food acceptance: a survey of the scope of flavor and associated research, compiled from papers presented in a series of symposia given in 1956–1957. Reinhold, New York, pp 224–240"><span data-dcnode-id="2848" instrument_node="">1958</span></a><span data-dcnode-id="2846" instrument_node="">), wine gums (Teerling </span><a aria-label="Reference 1992" data-dcnode-id="2844" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d280964984e1326" title="Teerling A (1992) The colour of taste. Chem Senses 17:886"><span data-dcnode-id="2845" instrument_node="">1992</span></a><span data-dcnode-id="2843" instrument_node="">), and yogurt (Norton and Johnson </span><a aria-label="Reference 1987" data-dcnode-id="2841" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d280964984e1329" title="Norton WE, Johnson FN (1987) The influence of intensity of colour on perceived flavour characteristics. Med Sci Res 15:329–330"><span data-dcnode-id="2842" instrument_node="">1987</span></a><span data-dcnode-id="2840" instrument_node="">). However, more recently, the majority of the research has tended to use various different drinks, beverages, and solutions as the stimuli of choice. Most likely, this research focus on colored drinks (be they carbonated or uncarbonated) reflects both the ease of stimulus control and creation that such experimental materials afford and also the fact that color provides one of the few distinctive non-olfactory features of such stimuli (see Christensen </span><a aria-label="Reference 1985" data-dcnode-id="2838" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d280964984e1333" title="Christensen C (1985) Effect of color on judgments of food aroma and food intensity in young and elderly adults. Perception 14:755–762"><span data-dcnode-id="2839" instrument_node="">1985</span></a><span data-dcnode-id="2837" instrument_node="">; Oram et al. </span><a aria-label="Reference 1995" data-dcnode-id="2835" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d280964984e1336" title="Oram N, Laing DG, Hutchinson I, Owen J, Rose G, Freeman M, Newell G (1995) The influence of flavor and color on drink identification by children and adults. Dev Psychobiol 28:239–246"><span data-dcnode-id="2836" instrument_node="">1995</span></a><span data-dcnode-id="2834" instrument_node="">). Given this bias in the literature, we have also chosen to focus our review primarily on those studies that have investigated the effect of color on taste and flavor perception in various solutions, drinks, and beverages.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="2815" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="2816"><p data-dcnode-id="2817"><span data-dcnode-id="2830" instrument_node="">Perceptual effects are usually defined in terms of a change in perceptual sensitivity, such as a change in the </span><i data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">d</span></i><span data-dcnode-id="2827" instrument_node="">′ measure that can be derived using signal detection theory (e.g., Green and Swets </span><a aria-label="Reference 1966" data-dcnode-id="2825" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d280964984e1729" title="Green DM, Swets JA (1966) Signal detection theory and psychophysics. Wiley, New York"><span data-dcnode-id="2826" instrument_node="">1966</span></a><span data-dcnode-id="2824" instrument_node="">). By contrast, changes in decisional criteria, possibly reflecting a response bias or change in the criteria for responding adopted by participants (such as, for example, participants simply being more likely to respond that a flavor, odor, or taste is present whenever a color is added to a liquid; see Engen </span><a aria-label="Reference 1972" data-dcnode-id="2822" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d280964984e1732" title="Engen T (1972) The effect of expectation on judgments of odour. Acta Psychol 36:450–458"><span data-dcnode-id="2823" instrument_node="">1972</span></a><span data-dcnode-id="2821" instrument_node="">), may show up in one’s measure of bias (</span><i data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">c</span></i><span data-dcnode-id="2818" instrument_node=""> or beta).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="4." data-dcnode-id="2781" id="Fn4"><div class="c-article-footnote--listed__content" data-dcnode-id="2782"><p data-dcnode-id="2783"><span data-dcnode-id="2814" instrument_node="">Note here also that many of the demonstrations of the influence of color on taste and/or flavor in the literature have actually been reported in those studies in which the participants were only given a very small number of stimuli to evaluate (e.g., five or less stimuli in certain of the experiments reported by DuBose et al. </span><a aria-label="Reference 1980" data-dcnode-id="2812" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d280964984e1849" title="DuBose CN, Cardello AV, Maller O (1980) Effects of colorants and flavorants on identification, perceived flavor intensity, and hedonic quality of fruit-flavored beverages and cake. J Food Sci 45:1393–1399, 1415"><span data-dcnode-id="2813" instrument_node="">1980</span></a><span data-dcnode-id="2811" instrument_node="">; Hoegg and Alba </span><a aria-label="Reference 2007b" data-dcnode-id="2809" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d280964984e1852" title="Hoegg J, Alba JW (2007b) Taste perception: more than meets the tongue. J Consum Res 33:490–498"><span data-dcnode-id="2810" instrument_node="">2007b</span></a><span data-dcnode-id="2808" instrument_node="">; Hyman </span><a aria-label="Reference 1983" data-dcnode-id="2806" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d280964984e1855" title="Hyman A (1983) The influence of color on the taste perception of carbonated water preparations. Bull Psychon Soc 21:145–148"><span data-dcnode-id="2807" instrument_node="">1983</span></a><span data-dcnode-id="2805" instrument_node="">; Lavin and Lawless </span><a aria-label="Reference 1998" data-dcnode-id="2803" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d280964984e1858" title="Lavin J, Lawless H (1998) Effects of color and odor on judgments of sweetness among children and adults. Food Qual Prefer 9:283–289"><span data-dcnode-id="2804" instrument_node="">1998</span></a><span data-dcnode-id="2802" instrument_node="">; Morrot et al. </span><a aria-label="Reference 2001" data-dcnode-id="2800" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d280964984e1861" title="Morrot G, Brochet F, Dubourdieu D (2001) The color of odors. Brain Lang 79:309–320"><span data-dcnode-id="2801" instrument_node="">2001</span></a><span data-dcnode-id="2799" instrument_node="">; Oram et al. </span><a aria-label="Reference 1995" data-dcnode-id="2797" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d280964984e1865" title="Oram N, Laing DG, Hutchinson I, Owen J, Rose G, Freeman M, Newell G (1995) The influence of flavor and color on drink identification by children and adults. Dev Psychobiol 28:239–246"><span data-dcnode-id="2798" instrument_node="">1995</span></a><span data-dcnode-id="2796" instrument_node="">; Stillman </span><a aria-label="Reference 1993" data-dcnode-id="2794" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d280964984e1868" title="Stillman J (1993) Color influences flavor identification in fruit-flavored beverages. J Food Sci 58:810–812"><span data-dcnode-id="2795" instrument_node="">1993</span></a><span data-dcnode-id="2793" instrument_node="">; or 6–15 stimuli in the studies reported by Alley and Alley </span><a aria-label="Reference 1998" data-dcnode-id="2791" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d280964984e1871" title="Alley RL, Alley TR (1998) The influence of physical state and color on perceived sweetness. J Psychology: Interdisciplinary Applied 132:561–568"><span data-dcnode-id="2792" instrument_node="">1998</span></a><span data-dcnode-id="2790" instrument_node="">; Shankar et al. </span><a aria-label="Reference 2009" data-dcnode-id="2788" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d280964984e1874" title="Shankar MU, Levitan CA, Prescott J, Spence C (2009) The influence of color and label information on flavor perception. Chemosensory Perception 2:53–58"><span data-dcnode-id="2789" instrument_node="">2009</span></a><span data-dcnode-id="2787" instrument_node="">). This may be particularly important as people appear to quickly learn that the color of a beverage no longer predicts a particular taste (see Stevenson et al. </span><a aria-label="Reference 2000" data-dcnode-id="2785" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d280964984e1877" title="Stevenson RJ, Boakes RA, Wilson JP (2000) Resistance to extinction of conditioned odor perceptions: evaluative conditioning is not unique. J Exp Psychol Learn Mem Cogn 26:423–440"><span data-dcnode-id="2786" instrument_node="">2000</span></a><span data-dcnode-id="2784" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="5." data-dcnode-id="2771" id="Fn5"><div class="c-article-footnote--listed__content" data-dcnode-id="2772"><p data-dcnode-id="2773"><span data-dcnode-id="2780" instrument_node="">Note that we do not wish to argue that decisional biases in the context of food colorings’ influence on multisensory flavor perception are not, in and of themselves, interesting. They most certainly are. Our point here is rather that the decisional biases that are elicited not simply by the color of the foodstuff itself, but rather by the ecologically invalid context in which the participants in these laboratory studies often find themselves, may not be especially informative (see also Garber et al. </span><a aria-label="Reference 2001" data-dcnode-id="2778" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d280964984e2169" title="Garber LL Jr, Hyatt EM, Starr RG Jr (2001) Placing food color experimentation into a valid consumer context. J Food Prod Mark 7(3):3–24"><span data-dcnode-id="2779" instrument_node="">2001</span></a><span data-dcnode-id="2777" instrument_node="">, </span><a aria-label="Reference 2003" data-dcnode-id="2775" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d280964984e2172" title="Garber LL Jr, Hyatt EM, Starr RG Jr (2003) Measuring consumer response to food products. Food Qual Prefer 14:3–15"><span data-dcnode-id="2776" instrument_node="">2003</span></a><span data-dcnode-id="2774" instrument_node=""> for a similar argument). Our concern is that the results of such studies may say more about how participants respond when placed in an ecologically invalid laboratory context than they do about color’s influence on flavor perception in the real world.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="6." data-dcnode-id="2764" id="Fn6"><div class="c-article-footnote--listed__content" data-dcnode-id="2765"><p data-dcnode-id="2766"><span data-dcnode-id="2770" instrument_node="">The one exception to this claim comes from one of the conditions in Zampini et al.’s (</span><a aria-label="Reference 2007" data-dcnode-id="2768" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e2356" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="2769" instrument_node="">2007</span></a><span data-dcnode-id="2767" instrument_node="">, Experiment 2) study in which participants’ flavor identification responses for the strawberry-flavored solutions were not significantly affected by the changes that were introduced into the colors of the drinks. However, given that the numerical trends were in the appropriate direction, this null result may simply reflect a lack of statistical power.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="7." data-dcnode-id="2757" id="Fn7"><div class="c-article-footnote--listed__content" data-dcnode-id="2758"><p data-dcnode-id="2759"><span data-dcnode-id="2763" instrument_node="">Though, of course, there may be some practical challenges associated with trying to taste a colored solution while at the time speaking out loud. One could though instead ask the participant to read out a list of words silently in their head or else to engage in some other highly attention-demanding task, for example, monitoring a rapid serial visual presentation stream for occasionally presented targets (e.g., see Santangelo and Spence </span><a aria-label="Reference 2008" data-dcnode-id="2761" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d280964984e2954" title="Santangelo V, Spence C (2008) Is the exogenous orienting of spatial attention truly automatic? Evidence from unimodal and multisensory studies. Conscious Cogn 17:989–1015"><span data-dcnode-id="2762" instrument_node="">2008</span></a><span data-dcnode-id="2760" instrument_node="">).</span></p></div></li></ol></div></div></section><div data-dcnode-id="1701" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="1702" data-title="References"><div class="c-article-section" data-dcnode-id="1703" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2751" id="Bib1"><span data-dcnode-id="2752" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="1704" id="Bib1-content"><div data-container-section="references" data-dcnode-id="1705"><ul class="c-article-references" data-dcnode-id="1715"><li class="c-article-references__item js-c-reading-companion-references-item" data-dcnode-id="2741"><p class="c-article-references__text" data-dcnode-id="2749" id="ref-CR1"><span data-dcnode-id="2750" instrument_node="">Alley RL, Alley TR (1998) The influence of physical state and color on perceived sweetness. J Psychology: Interdisciplinary Applied 132:561–568</span></p><p class="c-article-references__links u-hide-print" data-dcnode-id="2742"><a aria-label="CAS reference 1" data-dcnode-id="2747" data-track="click" data-track-action="outbound reference" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/articles/cas-redirect/1%3ASTN%3A280%3ADyaK1czpvFGntA%253D%253D"><span data-dcnode-id="2748" instrument_node="">CAS</span></a><span data-dcnode-id="2746" i
