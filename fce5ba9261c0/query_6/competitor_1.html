</span><meta content="In this paper, we review the empirical literature concerning the important question of whether or not food color influences taste and flavor perception in humans. Although a superficial reading of the literature on this topic would appear to give a somewhat mixed answer, we argue that this is, at least in part, due to the fact that many researchers have failed to distinguish between two qualitatively distinct research questions. The first concerns the role that food coloring plays in the perception of the intensity of a particular flavor (e.g., strawberry, banana, etc.) or taste attribute (e.g., sweetness, saltiness, etc.). The second concerns the role that food coloring plays in the perception of flavor identity. The empirical evidence regarding the first question is currently rather ambiguous. While some researchers have reported a significant crossmodal effect of changing the intensity of a food or drink’s coloring on people’s judgments of taste or flavor intensity, many others have failed to demonstrate any such effect. By contrast, the research findings concerning the second question clearly support the view that people’s judgments of flavor identity are often affected by the changing of a food or drink’s color (be it appropriate, inappropriate, or absent). We discuss the possible mechanisms underlying these crossmodal effects and suggest some of the key directions for future research in order to move our understanding in this area forward." data-dcnode-id="5166" name="dc.description"><span data-dcnode-id="5165" instrument_node="">

</span><meta content="Does Food Color Influence Taste and Flavor Perception in Humans? - Chemosensory Perception" data-dcnode-id="4782" property="og:title"><span data-dcnode-id="4781" instrument_node="">
</span><meta content="In this paper, we review the empirical literature concerning the important question of whether or not food color influences taste and flavor perception in humans. Although a superficial reading of the literature on this topic would appear to give a somewhat mixed answer, we argue that this is, at least in part, due to the fact that many researchers have failed to distinguish between two qualitatively distinct research questions. The first concerns the role that food coloring plays in the perception of the intensity of a particular flavor (e.g., strawberry, banana, etc.) or taste attribute (e.g., sweetness, saltiness, etc.). The second concerns the role that food coloring plays in the perception of flavor identity. The empirical evidence regarding the first question is currently rather ambiguous. While some researchers have reported a significant crossmodal effect of changing the intensity of a food or drink’s coloring on people’s judgments of taste or flavor intensity, many others have failed to demonstrate any such effect. By contrast, the research findings concerning the second question clearly support the view that people’s judgments of flavor identity are often affected by the changing of a food or drink’s color (be it appropriate, inappropriate, or absent). We discuss the possible mechanisms underlying these crossmodal effects and suggest some of the key directions for future research in order to move our understanding in this area forward." data-dcnode-id="4780" property="og:description"><span data-dcnode-id="4779" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1469" data-track-component="article body"><span data-dcnode-id="4321" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="4308" data-gtm-vis-first-on-screen-50443292_562="1345" data-gtm-vis-first-on-screen-50443292_563="1351" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1345" data-gtm-vis-recent-on-screen-50443292_563="1351" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="4309" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4319" id="Abs1"><span data-dcnode-id="4320" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="4310" id="Abs1-content"><p data-dcnode-id="4311"><span data-dcnode-id="4318" instrument_node="">In this paper, we review the empirical literature concerning the important question of whether or not food color influences taste and flavor perception in humans. Although a superficial reading of the literature on this topic would appear to give a somewhat mixed answer, we argue that this is, at least in part, due to the fact that many researchers have failed to distinguish between two qualitatively distinct research questions. The first concerns the role that food coloring plays in the perception of the </span><i data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">intensity</span></i><span data-dcnode-id="4315" instrument_node=""> of a particular flavor (e.g., strawberry, banana, etc.) or taste attribute (e.g., sweetness, saltiness, etc.). The second concerns the role that food coloring plays in the perception of flavor </span><i data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">identity</span></i><span data-dcnode-id="4312" instrument_node="">. The empirical evidence regarding the first question is currently rather ambiguous. While some researchers have reported a significant crossmodal effect of changing the intensity of a food or drink’s coloring on people’s judgments of taste or flavor intensity, many others have failed to demonstrate any such effect. By contrast, the research findings concerning the second question clearly support the view that people’s judgments of flavor identity are often affected by the changing of a food or drink’s color (be it appropriate, inappropriate, or absent). We discuss the possible mechanisms underlying these crossmodal effects and suggest some of the key directions for future research in order to move our understanding in this area forward.</span></p></div></div></section><span data-dcnode-id="4307" instrument_node="">
</span><section data-dcnode-id="4222" data-gtm-vis-first-on-screen-50443292_562="1346" data-gtm-vis-first-on-screen-50443292_563="1351" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1346" data-gtm-vis-recent-on-screen-50443292_563="1351" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="4223" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4305" id="Sec1"><span data-dcnode-id="4306" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="4224" id="Sec1-content"><p data-dcnode-id="4279"><span data-dcnode-id="4304" instrument_node="">Does food coloring influence taste and flavor perception in humans? Although researchers have been investigating this important (both on a theoretical and practical level) question for more than 70&nbsp;years now (see Duncker </span><a aria-label="Reference 1939" data-dcnode-id="4302" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d280964984e396" title="Duncker K (1939) The influence of past experience upon perceptual properties. Am J Psychol 52:255–265"><span data-dcnode-id="4303" instrument_node="">1939</span></a><span data-dcnode-id="4301" instrument_node="">; Masurovsky </span><a aria-label="Reference 1939" data-dcnode-id="4299" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d280964984e399" title="Masurovsky BI (1939) How to obtain the right food color. Food Eng 11:13, 55–56"><span data-dcnode-id="4300" instrument_node="">1939</span></a><span data-dcnode-id="4298" instrument_node="">; Moir </span><a aria-label="Reference 1936" data-dcnode-id="4296" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d280964984e402" title="Moir HC (1936) Some observations on the appreciation of flavour in foodstuffs. J Soc Chem Ind: Chemistry Industry Review 14:145–148"><span data-dcnode-id="4297" instrument_node="">1936</span></a><span data-dcnode-id="4295" instrument_node=""> for early research), an unequivocal answer to the question has not, as yet, been reached. That, at least, would seem to be the conclusion drawn by the majority of researchers in the field. Take, for example, Lavin and Lawless’s (</span><a aria-label="Reference 1998" data-dcnode-id="4293" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d280964984e405" title="Lavin J, Lawless H (1998) Effects of color and odor on judgments of sweetness among children and adults. Food Qual Prefer 9:283–289"><span data-dcnode-id="4294" instrument_node="">1998</span></a><span data-dcnode-id="4292" instrument_node="">, p. 284) claim that “The literature on the effects of color on taste and flavor judgments is consistent in its inconsistency” or Koch and Koch’s (</span><a aria-label="Reference 2003" data-dcnode-id="4290" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d280964984e408" title="Koch C, Koch EC (2003) Preconceptions of taste based on color. J Psychol: Interdisciplinary Applied 137:233–242"><span data-dcnode-id="4291" instrument_node="">2003</span></a><span data-dcnode-id="4289" instrument_node="">, p. 240) statement that “In fact, it may be that color has nothing to do with the taste of food or drink.” Meanwhile, Bayarri et al. (</span><a aria-label="Reference 2001" data-dcnode-id="4287" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d280964984e412" title="Bayarri S, Calvo C, Costell E, Duran L (2001) Influence of color on perception of sweetness and fruit flavor of fruit drinks. Food Sci Technol Int 7:399–404"><span data-dcnode-id="4288" instrument_node="">2001</span></a><span data-dcnode-id="4286" instrument_node="">, p. 399) have also suggested that “…the possible influence of color on flavor perception is under discussion and no clear conclusions have been attained yet.” In the present article, we argue that one important reason why our understanding of the nature of any crossmodal effects of food coloring on taste and flavor perception in humans has progressed so slowly relates to the fact that many researchers have failed to distinguish between the evidence pertinent to evaluating two relatively independent research questions: (1) Does the presence versus absence, or change in the intensity, of the color present in a food or drink influence people’s perception of the </span><i data-dcnode-id="4284"><span data-dcnode-id="4285" instrument_node="">intensity</span></i><span data-dcnode-id="4283" instrument_node=""> of a particular flavor (e.g., banana, strawberry, etc.) or taste (such as sweetness, sourness, etc.)? (2) Does food coloring influence the correct </span><i data-dcnode-id="4281"><span data-dcnode-id="4282" instrument_node="">identification</span></i><span data-dcnode-id="4280" instrument_node=""> of a food or drink’s flavor?</span></p><p data-dcnode-id="4241"><span data-dcnode-id="4278" instrument_node="">The evidence concerning the first question is indeed rather mixed (Auvray and Spence </span><a aria-label="Reference 2008" data-dcnode-id="4276" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d280964984e424" title="Auvray M, Spence C (2008) The multisensory perception of flavor. Conscious Cogn 17:1016–1031"><span data-dcnode-id="4277" instrument_node="">2008</span></a><span data-dcnode-id="4275" instrument_node="">; Stevenson </span><a aria-label="Reference 2009" data-dcnode-id="4273" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d280964984e427" title="Stevenson RJ (2009) The psychology of flavour. Oxford University Press, Oxford"><span data-dcnode-id="4274" instrument_node="">2009</span></a><span data-dcnode-id="4272" instrument_node="">; Zampini et al. </span><a aria-label="Reference 2007" data-dcnode-id="4270" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e430" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="4271" instrument_node="">2007</span></a><span data-dcnode-id="4269" instrument_node="">), with some researchers observing a significant effect of changing the intensity of the coloring added to a food on people’s judgments of flavor and/or taste </span><i data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">intensity</span></i><span data-dcnode-id="4266" instrument_node=""> (e.g., Johnson and Clydesdale </span><a aria-label="Reference 1982" data-dcnode-id="4264" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d280964984e436" title="Johnson J, Clydesdale FM (1982) Perceived sweetness and redness in colored sucrose solutions. J Food Sci 47:747–752"><span data-dcnode-id="4265" instrument_node="">1982</span></a><span data-dcnode-id="4263" instrument_node="">; Johnson et al. </span><a aria-label="Reference 1982" data-dcnode-id="4261" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d280964984e440" title="Johnson JL, Dzendolet E, Damon R, Sawyer M, Clydesdale FM (1982) Psychophysical relationships between perceived sweetness and color in cherry-flavored beverages. J Food Prot 45:601–606"><span data-dcnode-id="4262" instrument_node="">1982</span></a><span data-dcnode-id="4260" instrument_node="">, </span><a aria-label="Reference 1983" data-dcnode-id="4258" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d280964984e443" title="Johnson JL, Dzendolet E, Clydesdale FM (1983) Psychophysical relationships between perceived sweetness and redness in strawberry-flavored beverages. J Food Prot 46:21–25, 28"><span data-dcnode-id="4259" instrument_node="">1983</span></a><span data-dcnode-id="4257" instrument_node="">; Roth et al. </span><a aria-label="Reference 1988" data-dcnode-id="4255" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d280964984e446" title="Roth HA, Radle LJ, Gifford SR, Clydesdale FM (1988) Psychophysical relationships between perceived sweetness and color in lemon- and lime-flavored drinks. J Food Sci 53(1116–1119):1162"><span data-dcnode-id="4256" instrument_node="">1988</span></a><span data-dcnode-id="4254" instrument_node="">), while many others have failed to demonstrate any such effect (e.g., Alley and Alley </span><a aria-label="Reference 1998" data-dcnode-id="4252" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d280964984e449" title="Alley RL, Alley TR (1998) The influence of physical state and color on perceived sweetness. J Psychology: Interdisciplinary Applied 132:561–568"><span data-dcnode-id="4253" instrument_node="">1998</span></a><span data-dcnode-id="4251" instrument_node="">; Frank et al. </span><a aria-label="Reference 1989" data-dcnode-id="4249" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d280964984e452" title="Frank R, Ducheny K, Mize S (1989) Strawberry odor, but not red color, enhances the sweetness of sucrose solutions. Chem Senses 14:371–377"><span data-dcnode-id="4250" instrument_node="">1989</span></a><span data-dcnode-id="4248" instrument_node="">; see Table&nbsp;</span><a data-dcnode-id="4246" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="4247" instrument_node="">1</span></a><span data-dcnode-id="4245" instrument_node="">). By contrast, the published evidence unequivocally supports an affirmative answer to the second question, with people’s judgments of a flavor’s </span><i data-dcnode-id="4243"><span data-dcnode-id="4244" instrument_node="">identity</span></i><span data-dcnode-id="4242" instrument_node=""> often being reliably affected by a food’s color, be it appropriate, inappropriate, or absent. Note here that we are not aware of any research having been conducted assessing the effect of color on the identification of basic tastes (e.g., when solutions containing an odorless tastant such as sugar or salt are sampled). Below, we review the evidence relating to these two questions. We discuss several of the possible mechanisms that may underlie these crossmodal effects on taste and flavor identification, such as cognitive expectancy, bottom-up multisensory integration, and attention.
</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4226" data-test="inline-table" id="table-1"><figure data-dcnode-id="4227"><figcaption class="c-article-table__figcaption" data-dcnode-id="4238"><b data-dcnode-id="4239" data-test="table-caption" id="Tab1"><span data-dcnode-id="4240" instrument_node="">Table&nbsp;1 Summary of the studies that have been published to date that have investigated the effect of varying the presence vs. absence, the appropriateness/inappropriateness, or the intensity, of the color added to a solution on participants’ taste and/or flavor (Fl) intensity ratings. The table highlights the fact that the majority of research in this area has focused on the influence of color on sweetness perception. The table also highlights the inconsistency in the pattern of results that has been reported to date across the various studies that have been reported</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4228"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="4229" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12078-010-9067-z/tables/1" rel="nofollow"><span data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4230" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4231" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4232" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4235" instrument_node="">

</span></div></div></section><section data-dcnode-id="4139" data-gtm-vis-first-on-screen-50443292_562="1347" data-gtm-vis-first-on-screen-50443292_563="1352" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1346" data-gtm-vis-recent-on-screen-50443292_563="1352" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Which Senses Contribute to the Perception of Flavor?"><div class="c-article-section" data-dcnode-id="4140" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4220" id="Sec2"><span data-dcnode-id="4221" instrument_node="">Which Senses Contribute to the Perception of Flavor?</span></h2><div class="c-article-section__content" data-dcnode-id="4141" id="Sec2-content"><p data-dcnode-id="4191"><span data-dcnode-id="4219" instrument_node="">Before we proceed, however, it is important to note that gustatory, olfactory, and oral–somatosensory cues (in contrast to visual and auditory cues) all contribute directly to flavor perception. In fact, the International Standards Organization (ISO 5492 </span><a aria-label="Reference 1992" data-dcnode-id="4217" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d280964984e1136" title="ISO (1992) Standard 5492: terms relating to sensory analysis. International Organization for Standardization"><span data-dcnode-id="4218" instrument_node="">1992</span></a><span data-dcnode-id="4216" instrument_node="">) has defined flavor as a “complex combination of the olfactory, gustatory and trigeminal sensations perceived during tasting. The flavor may be influenced by tactile, thermal, painful and/or kinaesthetic effects” (see Delwiche </span><a aria-label="Reference 2004" data-dcnode-id="4214" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d280964984e1139" title="Delwiche J (2004) The impact of perceptual interactions on perceived flavor. Food Qual Prefer 15:137–146"><span data-dcnode-id="4215" instrument_node="">2004</span></a><span data-dcnode-id="4213" instrument_node="">, p. 137; see also ISO 5492 </span><a aria-label="Reference 2008" data-dcnode-id="4211" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d280964984e1142" title="ISO (2008) Standard 5492: terms relating to sensory analysis. International Organization for Standardization"><span data-dcnode-id="4212" instrument_node="">2008</span></a><span data-dcnode-id="4210" instrument_node="">). Visual and auditory cues may modify a food’s flavor, but they are not, at least according to the ISO definition, intrinsic to it (though see also Auvray and Spence </span><a aria-label="Reference 2008" data-dcnode-id="4208" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d280964984e1145" title="Auvray M, Spence C (2008) The multisensory perception of flavor. Conscious Cogn 17:1016–1031"><span data-dcnode-id="4209" instrument_node="">2008</span></a><span data-dcnode-id="4207" instrument_node="">; Stevenson </span><a aria-label="Reference 2009" data-dcnode-id="4205" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d280964984e1148" title="Stevenson RJ (2009) The psychology of flavour. Oxford University Press, Oxford"><span data-dcnode-id="4206" instrument_node="">2009</span></a><span data-dcnode-id="4204" instrument_node=""> for alternative views). Visual cues, such as a food’s color, may then modify the perception of a food’s flavor by influencing the gustatory qualities of the food, by influencing the olfactory attributes of the food (as perceived orthonasally and/or retronasally; Koza et al. </span><a aria-label="Reference 2005" data-dcnode-id="4202" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d280964984e1152" title="Koza BJ, Cilmi A, Dolese M, Zellner DA (2005) Color enhances orthonasal olfactory intensity and reduces retronasal olfactory intensity. Chem Senses 30:643–649"><span data-dcnode-id="4203" instrument_node="">2005</span></a><span data-dcnode-id="4201" instrument_node="">), by influencing the oral–somatosensory qualities of the food, and/or by influencing the overall multisensory flavor percept (or Gestalt; see Fig.&nbsp;</span><a data-dcnode-id="4199" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4200" instrument_node="">1</span></a><span data-dcnode-id="4198" instrument_node="">). In this article, we review the evidence regarding color’s effect on taste and flavor. We also discuss the evidence regarding color’s influence on olfactory judgments where relevant.</span><sup data-dcnode-id="4193"><a data-dcnode-id="4194" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">Footnote </span></span><span data-dcnode-id="4195" instrument_node="">1</span></a></sup><span data-dcnode-id="4192" instrument_node="">
</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4143" data-gtm-vis-first-on-screen-50443292_561="1347" data-gtm-vis-has-fired-50443292_561="1" data-gtm-vis-recent-on-screen-50443292_561="1347" data-gtm-vis-total-visible-time-50443292_561="10000" data-test="figure" data-title="Fig.&nbsp;1" id="figure-1"><figure data-dcnode-id="4144"><figcaption data-dcnode-id="4188"><b class="c-article-section__figure-caption" data-dcnode-id="4189" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="4190" instrument_node="">Fig.&nbsp;1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4155"><div class="c-article-section__figure-item" data-dcnode-id="4183"><a class="c-article-section__figure-link" data-dcnode-id="4184" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12078-010-9067-z/figures/1" rel="nofollow"><picture data-dcnode-id="4185"><source data-dcnode-id="4187" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12078-010-9067-z/MediaObjects/12078_2010_9067_Fig1_HTML.gif?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="4186" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12078-010-9067-z/MediaObjects/12078_2010_9067_Fig1_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4156" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="4157"><span data-dcnode-id="4182" instrument_node="">This figure highlights the multiple ways in which visual cues might influence flavor perception. Visual cues (such as the color of a beverage) may exert a crossmodal influence on olfaction, gustation, and/or on oral somatosensation. Such crossmodal effects, should they exist, might then have a carryover effect on the experienced flavor percept once the various unisensory cues have been integrated. Alternatively, however, visual information might influence flavor perception only once the olfactory, gustatory, and/or oral–somatosensory cues have been integrated into a multisensory flavor percept (so, for example, if you bite into a filled chocolate, then look to see what color the filling of the chocolate has, then color may well influence the integrated flavor percept). Complicating matters still further, the nature of the crossmodal influence of visual cues on flavor perception may well vary with the task at hand. That is, different results may be observed as a function of whether participants are asked to report on the pleasantness or intensity of a flavor versus having to identify or discriminate the flavor. There is robust psychophysical evidence that visual (color) cues can modulate people’s perception of the identity and intensity of both orthonasally and retronasally presented odors (e.g., Blackwell </span><a aria-label="Reference 1995" data-dcnode-id="4180" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d280964984e1186" title="Blackwell L (1995) Visual clues and their effects on odour assessment. Nutr Food Sci 5:24–28"><span data-dcnode-id="4181" instrument_node="">1995</span></a><span data-dcnode-id="4179" instrument_node="">; Davis </span><a aria-label="Reference 1981" data-dcnode-id="4177" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d280964984e1189" title="Davis RG (1981) The role of nonolfactory context cues in odor identification. Percept Psychophys 30:83–89"><span data-dcnode-id="4178" instrument_node="">1981</span></a><span data-dcnode-id="4176" instrument_node="">; Engen </span><a aria-label="Reference 1972" data-dcnode-id="4174" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d280964984e1192" title="Engen T (1972) The effect of expectation on judgments of odour. Acta Psychol 36:450–458"><span data-dcnode-id="4175" instrument_node="">1972</span></a><span data-dcnode-id="4173" instrument_node="">; Morrot et al. </span><a aria-label="Reference 2001" data-dcnode-id="4171" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d280964984e1195" title="Morrot G, Brochet F, Dubourdieu D (2001) The color of odors. Brain Lang 79:309–320"><span data-dcnode-id="4172" instrument_node="">2001</span></a><span data-dcnode-id="4170" instrument_node="">; Zellner et al. </span><a aria-label="Reference 1991" data-dcnode-id="4168" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR137" id="ref-link-section-d280964984e1198" title="Zellner DA, Bartoli AM, Eckard R (1991) Influence of color on odor identification and liking ratings. Am J Psychol 104:547–561"><span data-dcnode-id="4169" instrument_node="">1991</span></a><span data-dcnode-id="4167" instrument_node="">; Zellner and Kautz </span><a aria-label="Reference 1990" data-dcnode-id="4165" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR135" id="ref-link-section-d280964984e1202" title="Zellner DA, Kautz MA (1990) Color affects perceived odor intensity. J Exp Psychol Hum Percept Perform 16:391–397"><span data-dcnode-id="4166" instrument_node="">1990</span></a><span data-dcnode-id="4164" instrument_node="">; Zellner and Whitten 1990). There is also convincing psychophysical evidence that visual (color) cues can influence people’s perception of the intensity of the basic tastants when presented in odorless solutions (Johnson and Clydesdale </span><a aria-label="Reference 1982" data-dcnode-id="4162" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d280964984e1205" title="Johnson J, Clydesdale FM (1982) Perceived sweetness and redness in colored sucrose solutions. J Food Sci 47:747–752"><span data-dcnode-id="4163" instrument_node="">1982</span></a><span data-dcnode-id="4161" instrument_node="">; Maga </span><a aria-label="Reference 1974" data-dcnode-id="4159" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d280964984e1208" title="Maga JA (1974) Influence of color on taste thresholds. Chem Senses Flavor 1:115–119"><span data-dcnode-id="4160" instrument_node="">1974</span></a><span data-dcnode-id="4158" instrument_node="">). Interestingly, however, we are aware of no research that has directly addressed the question of whether color cues can influence a participant’s ability to discriminate (and/or identify) the identity of basic tastants when presented in solution. To date, there is only very limited research detailing any visual contributions to the oral–somatosensory attributes of food. Evidence demonstrating the robust influence of visual cues on flavor identification is discussed in the text, as is the rather more mixed evidence concerning the influence of visual (color) cues on perceived taste and flavor intensity</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4145"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="4146" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12078-010-9067-z/figures/1" rel="nofollow"><span data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4147" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4148" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4149" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4152" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4151" fill-rule="evenodd"></path><span data-dcnode-id="4150" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4142" instrument_node="">
</span></div></div></section><section data-dcnode-id="3704" data-gtm-vis-first-on-screen-50443292_562="1347" data-gtm-vis-first-on-screen-50443292_563="1352" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1347" data-gtm-vis-recent-on-screen-50443292_563="1352" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Does Food Color Influence Perceived Taste or Flavor Intensity?"><div class="c-article-section" data-dcnode-id="3705" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4137" id="Sec3"><span data-dcnode-id="4138" instrument_node="">Does Food Color Influence Perceived Taste or Flavor Intensity?</span></h2><div class="c-article-section__content" data-dcnode-id="3706" id="Sec3-content"><p data-dcnode-id="4066"><span data-dcnode-id="4136" instrument_node="">The evidence pertaining to the question of whether food coloring influences people’s perception (or ratings) of taste or flavor </span><i data-dcnode-id="4134"><span data-dcnode-id="4135" instrument_node="">intensity</span></i><span data-dcnode-id="4133" instrument_node=""> is currently rather ambiguous: that is, while a number of studies have demonstrated a significant effect of increasing the level of food coloring on people’s ratings of taste or flavor intensity across a range of different drinks (Hyman </span><a aria-label="Reference 1983" data-dcnode-id="4131" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d280964984e1231" title="Hyman A (1983) The influence of color on the taste perception of carbonated water preparations. Bull Psychon Soc 21:145–148"><span data-dcnode-id="4132" instrument_node="">1983</span></a><span data-dcnode-id="4130" instrument_node="">; Johnson and Clydesdale </span><a aria-label="Reference 1982" data-dcnode-id="4128" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d280964984e1234" title="Johnson J, Clydesdale FM (1982) Perceived sweetness and redness in colored sucrose solutions. J Food Sci 47:747–752"><span data-dcnode-id="4129" instrument_node="">1982</span></a><span data-dcnode-id="4127" instrument_node="">; Johnson et al. </span><a aria-label="Reference 1982" data-dcnode-id="4125" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d280964984e1237" title="Johnson JL, Dzendolet E, Damon R, Sawyer M, Clydesdale FM (1982) Psychophysical relationships between perceived sweetness and color in cherry-flavored beverages. J Food Prot 45:601–606"><span data-dcnode-id="4126" instrument_node="">1982</span></a><span data-dcnode-id="4124" instrument_node="">, </span><a aria-label="Reference 1983" data-dcnode-id="4122" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d280964984e1240" title="Johnson JL, Dzendolet E, Clydesdale FM (1983) Psychophysical relationships between perceived sweetness and redness in strawberry-flavored beverages. J Food Prot 46:21–25, 28"><span data-dcnode-id="4123" instrument_node="">1983</span></a><span data-dcnode-id="4121" instrument_node="">; Kostyla </span><a aria-label="Reference 1978" data-dcnode-id="4119" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d280964984e1244" title="Kostyla AS (1978) The psychophysical relationships between color and flavor of some fruit flavored beverages. PhD thesis, University of Massachusetts, Amherst"><span data-dcnode-id="4120" instrument_node="">1978</span></a><span data-dcnode-id="4118" instrument_node="">; Romeu and De Vicente </span><a aria-label="Reference 1968" data-dcnode-id="4116" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d280964984e1247" title="Romeu JV, De Vicente MLS (1968) Influyen los colores en el sabor? [Do colours influence flavour?]. Rev Interam Psicologia 2:143–157"><span data-dcnode-id="4117" instrument_node="">1968</span></a><span data-dcnode-id="4115" instrument_node="">; Roth et al. </span><a aria-label="Reference 1988" data-dcnode-id="4113" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d280964984e1250" title="Roth HA, Radle LJ, Gifford SR, Clydesdale FM (1988) Psychophysical relationships between perceived sweetness and color in lemon- and lime-flavored drinks. J Food Sci 53(1116–1119):1162"><span data-dcnode-id="4114" instrument_node="">1988</span></a><span data-dcnode-id="4112" instrument_node="">), many other studies have either failed to demonstrate any such crossmodal effect (e.g., Alley and Alley </span><a aria-label="Reference 1998" data-dcnode-id="4110" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d280964984e1253" title="Alley RL, Alley TR (1998) The influence of physical state and color on perceived sweetness. J Psychology: Interdisciplinary Applied 132:561–568"><span data-dcnode-id="4111" instrument_node="">1998</span></a><span data-dcnode-id="4109" instrument_node="">; Chan and Kane-Martinelli </span><a aria-label="Reference 1997" data-dcnode-id="4107" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d280964984e1256" title="Chan MM, Kane-Martinelli C (1997) The effect of color on perceived flavor intensity and acceptance of foods by young adults and elderly adults. J Am Diet Assoc 97:657–659"><span data-dcnode-id="4108" instrument_node="">1997</span></a><span data-dcnode-id="4106" instrument_node="">; Frank et al. </span><a aria-label="Reference 1989" data-dcnode-id="4104" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d280964984e1259" title="Frank R, Ducheny K, Mize S (1989) Strawberry odor, but not red color, enhances the sweetness of sucrose solutions. Chem Senses 14:371–377"><span data-dcnode-id="4105" instrument_node="">1989</span></a><span data-dcnode-id="4103" instrument_node="">; Gifford and Clydesdale </span><a aria-label="Reference 1986" data-dcnode-id="4101" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d280964984e1263" title="Gifford SR, Clydesdale FM (1986) The psychophysical relationship between color and sodium chloride concentrations in model systems. J Food Prot 49:977–982"><span data-dcnode-id="4102" instrument_node="">1986</span></a><span data-dcnode-id="4100" instrument_node="">; Gifford et al. </span><a aria-label="Reference 1987" data-dcnode-id="4098" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d280964984e1266" title="Gifford SR, Clydesdale FM, Damon RA Jr (1987) The psychophysical relationship between color and salt concentrations in chicken flavored broths. J Sens Stud 2:137–147"><span data-dcnode-id="4099" instrument_node="">1987</span></a><span data-dcnode-id="4097" instrument_node="">), or else have demonstrated complex (and/or unexpected) interactions that have proved rather more difficult to interpret (e.g., Christensen </span><a aria-label="Reference 1985" data-dcnode-id="4095" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d280964984e1269" title="Christensen C (1985) Effect of color on judgments of food aroma and food intensity in young and elderly adults. Perception 14:755–762"><span data-dcnode-id="4096" instrument_node="">1985</span></a><span data-dcnode-id="4094" instrument_node="">; DuBose et al. </span><a aria-label="Reference 1980" data-dcnode-id="4092" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d280964984e1272" title="DuBose CN, Cardello AV, Maller O (1980) Effects of colorants and flavorants on identification, perceived flavor intensity, and hedonic quality of fruit-flavored beverages and cake. J Food Sci 45:1393–1399, 1415"><span data-dcnode-id="4093" instrument_node="">1980</span></a><span data-dcnode-id="4091" instrument_node="">, experiment 1; Fletcher et al. </span><a aria-label="Reference 1991" data-dcnode-id="4089" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d280964984e1275" title="Fletcher L, Heymann H, Ellersieck M (1991) Effects of visual masking techniques on the intensity rating of sweetness of gelatins and lemonades. J Sens Stud 6:179–191"><span data-dcnode-id="4090" instrument_node="">1991</span></a><span data-dcnode-id="4088" instrument_node="">; Lavin and Lawless </span><a aria-label="Reference 1998" data-dcnode-id="4086" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d280964984e1278" title="Lavin J, Lawless H (1998) Effects of color and odor on judgments of sweetness among children and adults. Food Qual Prefer 9:283–289"><span data-dcnode-id="4087" instrument_node="">1998</span></a><span data-dcnode-id="4085" instrument_node="">; McCullough et al. </span><a aria-label="Reference 1978" data-dcnode-id="4083" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d280964984e1282" title="McCullough JM, Martinsen CS, Moinpour R (1978) Application of multidimensional scaling to the analysis of sensory evaluations of stimuli with known attribute structures. J Appl Psychol 63:103–109"><span data-dcnode-id="4084" instrument_node="">1978</span></a><span data-dcnode-id="4082" instrument_node="">; Pangborn </span><a aria-label="Reference 1960" data-dcnode-id="4080" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d280964984e1285" title="Pangborn RM (1960) Influence of color on the discrimination of sweetness. Am J Psychol 73:229–238"><span data-dcnode-id="4081" instrument_node="">1960</span></a><span data-dcnode-id="4079" instrument_node="">; Strugnell </span><a aria-label="Reference 1997" data-dcnode-id="4077" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR120" id="ref-link-section-d280964984e1288" title="Strugnell C (1997) Colour and its role in sweetness perception. Appetite 28:85"><span data-dcnode-id="4078" instrument_node="">1997</span></a><span data-dcnode-id="4076" instrument_node="">; Zampini et al. </span><a aria-label="Reference 2007" data-dcnode-id="4074" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e1291" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="4075" instrument_node="">2007</span></a><span data-dcnode-id="4073" instrument_node="">; experiment 2).</span><sup data-dcnode-id="4068"><a data-dcnode-id="4069" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">Footnote </span></span><span data-dcnode-id="4070" instrument_node="">2</span></a></sup><span data-dcnode-id="4067" instrument_node=""> Given that the evidence regarding color’s influence on taste intensity would appear to be rather more ambiguous than its effect on flavor intensity, the evidence pertaining to each of these is dealt with separately in the following sections.</span></p><p data-dcnode-id="4056"><i data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">Does food color influence taste intensity?</span></i><span data-dcnode-id="4063" instrument_node=""> One of the classic studies to investigate color’s influence on taste sensitivity was conducted by Maga (</span><a aria-label="Reference 1974" data-dcnode-id="4061" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d280964984e1346" title="Maga JA (1974) Influence of color on taste thresholds. Chem Senses Flavor 1:115–119"><span data-dcnode-id="4062" instrument_node="">1974</span></a><span data-dcnode-id="4060" instrument_node="">). He investigated the effects of coloring an aqueous solution red, green, or yellow on perceptual thresholds for four of the basic tastes (salty, sour, sweet, and bitter). Note that each of the basic tastes was tested in a separate part of the experiment, meaning that the participants were presumably never uncertain with regard to the identity of the tastant whose presence they were trying to detect. In many cases, Maga observed that the concentration of the tastant had to be increased in order for his participants to be able to detect its presence in the colored (as compared to the uncolored) solutions. So, for example, the addition of green coloring to a sweet solution significantly increased taste sensitivity, while yellow color decreased taste sensitivity (see Table&nbsp;</span><a data-dcnode-id="4058" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="4059" instrument_node="">2</span></a><span data-dcnode-id="4057" instrument_node="">). Interestingly, red coloring had no significant effect on sensitivity to sweet taste. With respect to sour taste sensitivity, both the yellow and green coloring of solutions decreased participants’ sensitivity, with red coloring again having no effect. Coloring a clear solution red decreased bitter taste sensitivity, while the addition of yellow and green coloring had no such effect. Finally, adding color had no effect on taste detection thresholds for salt solutions.
</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4038" data-test="inline-table" id="table-2"><figure data-dcnode-id="4039"><figcaption class="c-article-table__figcaption" data-dcnode-id="4050"><b data-dcnode-id="4051" data-test="table-caption" id="Tab2"><span data-dcnode-id="4055" instrument_node="">Table&nbsp;2 Summary of the results from Maga’s (</span><a aria-label="Reference 1974" data-dcnode-id="4053" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d280964984e1362" title="Maga JA (1974) Influence of color on taste thresholds. Chem Senses Flavor 1:115–119"><span data-dcnode-id="4054" instrument_node="">1974</span></a><span data-dcnode-id="4052" instrument_node="">) study highlighting the effect of the addition of color on participants’ sensitivity to each of the four traditional basic tastants when dissolved in solution (and compared to performance when the tastants were presented in uncolored solutions)</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4040"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="4041" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12078-010-9067-z/tables/2" rel="nofollow"><span data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4042" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4043" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4044" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4047" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4046" fill-rule="evenodd"></path><span data-dcnode-id="4045" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="4009"><span data-dcnode-id="4037" instrument_node="">Johnson and Clydesdale (</span><a aria-label="Reference 1982" data-dcnode-id="4035" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d280964984e1511" title="Johnson J, Clydesdale FM (1982) Perceived sweetness and redness in colored sucrose solutions. J Food Sci 47:747–752"><span data-dcnode-id="4036" instrument_node="">1982</span></a><span data-dcnode-id="4034" instrument_node="">), in an oft-cited study, demonstrated an effect of food coloring on taste perception in sweetened solutions (that sometimes contained a cherry flavoring). The participants in their study had to perform both a threshold task and a magnitude estimation task. In the threshold task, Johnson and Clydesdale found that on average, when odorless solutions were colored red, participants could more easily detect the presence of sucrose than when they were uncolored (cf. Maga </span><a aria-label="Reference 1974" data-dcnode-id="4032" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d280964984e1514" title="Maga JA (1974) Influence of color on taste thresholds. Chem Senses Flavor 1:115–119"><span data-dcnode-id="4033" instrument_node="">1974</span></a><span data-dcnode-id="4031" instrument_node="">), though the intensity of the color did not have a significant effect on their performance. In the magnitude estimation task, however, Johnson and Clydesdale found that changing the level of food coloring had a significant effect on participants’ perception of the sweetness of both odorless and cherry-flavored solutions, with the darker-colored solutions being rated as 2–10% sweeter than the lighter-colored reference solutions despite the fact that the actual concentration of sucrose was 1% lower. In further studies, Johnson and his colleagues went on to use the same magnitude estimation procedure in order to show that sweetness ratings for both cherry- (Johnson et al. </span><a aria-label="Reference 1982" data-dcnode-id="4029" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d280964984e1517" title="Johnson JL, Dzendolet E, Damon R, Sawyer M, Clydesdale FM (1982) Psychophysical relationships between perceived sweetness and color in cherry-flavored beverages. J Food Prot 45:601–606"><span data-dcnode-id="4030" instrument_node="">1982</span></a><span data-dcnode-id="4028" instrument_node="">) and strawberry-flavored drinks (Johnson et al. </span><a aria-label="Reference 1983" data-dcnode-id="4026" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d280964984e1520" title="Johnson JL, Dzendolet E, Clydesdale FM (1983) Psychophysical relationships between perceived sweetness and redness in strawberry-flavored beverages. J Food Prot 46:21–25, 28"><span data-dcnode-id="4027" instrument_node="">1983</span></a><span data-dcnode-id="4025" instrument_node="">) increased by 2–13% when the intensity of the cherry red coloring was increased. Over the years, several further studies have also documented a significant effect of the addition of (specifically) </span><i data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">red</span></i><span data-dcnode-id="4022" instrument_node=""> food coloring on the perception of </span><i data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">sweetness</span></i><span data-dcnode-id="4019" instrument_node=""> (e.g., see Kostyla </span><a aria-label="Reference 1978" data-dcnode-id="4017" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d280964984e1530" title="Kostyla AS (1978) The psychophysical relationships between color and flavor of some fruit flavored beverages. PhD thesis, University of Massachusetts, Amherst"><span data-dcnode-id="4018" instrument_node="">1978</span></a><span data-dcnode-id="4016" instrument_node="">; Pangborn </span><a aria-label="Reference 1960" data-dcnode-id="4014" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d280964984e1533" title="Pangborn RM (1960) Influence of color on the discrimination of sweetness. Am J Psychol 73:229–238"><span data-dcnode-id="4015" instrument_node="">1960</span></a><span data-dcnode-id="4013" instrument_node="">; Strugnell </span><a aria-label="Reference 1997" data-dcnode-id="4011" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR120" id="ref-link-section-d280964984e1536" title="Strugnell C (1997) Colour and its role in sweetness perception. Appetite 28:85"><span data-dcnode-id="4012" instrument_node="">1997</span></a><span data-dcnode-id="4010" instrument_node="">).</span></p><p data-dcnode-id="3989"><span data-dcnode-id="4008" instrument_node="">Color cues have also been reported to influence participants’ ratings of sourness/tartness (e.g., Kostyla </span><a aria-label="Reference 1978" data-dcnode-id="4006" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d280964984e1542" title="Kostyla AS (1978) The psychophysical relationships between color and flavor of some fruit flavored beverages. PhD thesis, University of Massachusetts, Amherst"><span data-dcnode-id="4007" instrument_node="">1978</span></a><span data-dcnode-id="4005" instrument_node="">; Pangborn </span><a aria-label="Reference 1960" data-dcnode-id="4003" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d280964984e1545" title="Pangborn RM (1960) Influence of color on the discrimination of sweetness. Am J Psychol 73:229–238"><span data-dcnode-id="4004" instrument_node="">1960</span></a><span data-dcnode-id="4002" instrument_node="">). By contrast, the null result of color on the detection threshold for the presence of salt in aqueous solutions reported by Maga (</span><a aria-label="Reference 1974" data-dcnode-id="4000" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d280964984e1548" title="Maga JA (1974) Influence of color on taste thresholds. Chem Senses Flavor 1:115–119"><span data-dcnode-id="4001" instrument_node="">1974</span></a><span data-dcnode-id="3999" instrument_node="">) has been extended in several other well-controlled laboratory studies in which coloring was added to more ecologically valid food substrates, such as chicken broth (see Chan and Kane-Martinelli </span><a aria-label="Reference 1997" data-dcnode-id="3997" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d280964984e1551" title="Chan MM, Kane-Martinelli C (1997) The effect of color on perceived flavor intensity and acceptance of foods by young adults and elderly adults. J Am Diet Assoc 97:657–659"><span data-dcnode-id="3998" instrument_node="">1997</span></a><span data-dcnode-id="3996" instrument_node="">; Gifford and Clydesdale </span><a aria-label="Reference 1986" data-dcnode-id="3994" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d280964984e1554" title="Gifford SR, Clydesdale FM (1986) The psychophysical relationship between color and sodium chloride concentrations in model systems. J Food Prot 49:977–982"><span data-dcnode-id="3995" instrument_node="">1986</span></a><span data-dcnode-id="3993" instrument_node="">; Gifford et al. </span><a aria-label="Reference 1987" data-dcnode-id="3991" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d280964984e1558" title="Gifford SR, Clydesdale FM, Damon RA Jr (1987) The psychophysical relationship between color and salt concentrations in chicken flavored broths. J Sens Stud 2:137–147"><span data-dcnode-id="3992" instrument_node="">1987</span></a><span data-dcnode-id="3990" instrument_node="">). In order to try and explain this seemingly inconsistent effect of the addition of color on salt and sweetness perception, Maga suggested that color might not have any effect on salt perception because salty foods can come in any color, and hence, people have few direct color associations with saltiness.</span></p><p data-dcnode-id="3963"><span data-dcnode-id="3988" instrument_node="">Maga (</span><a aria-label="Reference 1974" data-dcnode-id="3986" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d280964984e1565" title="Maga JA (1974) Influence of color on taste thresholds. Chem Senses Flavor 1:115–119"><span data-dcnode-id="3987" instrument_node="">1974</span></a><span data-dcnode-id="3985" instrument_node="">) argued that there is a natural correlation between redness and sweetness levels as many fruits ripen. That is, many fruits show a transition from colors at the green end of the spectrum, through yellow, to colors at the red end of the spectrum (see also Brice </span><a aria-label="Reference 1954" data-dcnode-id="3983" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d280964984e1568" title="Brice BA (1954) Color and its relationship to food investigations. In Farrell KT, Wagner JR, Peterson MS, MacKinney G (eds) Color in foods: A symposium sponsored by the Quartermaster Food and Container Institute for the Armed Forces Quartermaster Research and Development Command U. S. Army Quartermaster Corps. National Academy of Sciences - National Research Council: Washington, pp. 4–16"><span data-dcnode-id="3984" instrument_node="">1954</span></a><span data-dcnode-id="3982" instrument_node="">; Kostyla </span><a aria-label="Reference 1978" data-dcnode-id="3980" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d280964984e1571" title="Kostyla AS (1978) The psychophysical relationships between color and flavor of some fruit flavored beverages. PhD thesis, University of Massachusetts, Amherst"><span data-dcnode-id="3981" instrument_node="">1978</span></a><span data-dcnode-id="3979" instrument_node="">; Lavin and Lawless </span><a aria-label="Reference 1998" data-dcnode-id="3977" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d280964984e1574" title="Lavin J, Lawless H (1998) Effects of color and odor on judgments of sweetness among children and adults. Food Qual Prefer 9:283–289"><span data-dcnode-id="3978" instrument_node="">1998</span></a><span data-dcnode-id="3976" instrument_node="">; Zampini et al. </span><a aria-label="Reference 2007" data-dcnode-id="3974" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e1577" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="3975" instrument_node="">2007</span></a><span data-dcnode-id="3973" instrument_node=""> on this point). Maga suggested that prior exposure to this natural color–taste correlation (i.e., between increases in redness and sweetness in foods) might help explain why red/green coloring should have such a profound effect on sweetness/sourness perception. Consistent with this suggestion, Pangborn (</span><a aria-label="Reference 1960" data-dcnode-id="3971" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d280964984e1581" title="Pangborn RM (1960) Influence of color on the discrimination of sweetness. Am J Psychol 73:229–238"><span data-dcnode-id="3972" instrument_node="">1960</span></a><span data-dcnode-id="3970" instrument_node="">) demonstrated that the addition of green food coloring reduced sweetness ratings while enhancing sourness ratings in pear nectar, though it should be noted that Pangborn and Hansen (</span><a aria-label="Reference 1963" data-dcnode-id="3968" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d280964984e1584" title="Pangborn RM, Hansen B (1963) The influence of color on discrimination of sweetness and sourness in pear-nectar. Am J Psychol 76:315–317"><span data-dcnode-id="3969" instrument_node="">1963</span></a><span data-dcnode-id="3967" instrument_node="">) subsequently failed to replicate this finding. A consistent pattern of results has been reported more recently in a study by Lavin and Lawless (</span><a aria-label="Reference 1998" data-dcnode-id="3965" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d280964984e1587" title="Lavin J, Lawless H (1998) Effects of color and odor on judgments of sweetness among children and adults. Food Qual Prefer 9:283–289"><span data-dcnode-id="3966" instrument_node="">1998</span></a><span data-dcnode-id="3964" instrument_node="">). The participants in this study were given four strawberry-flavored drinks of different colors (light and dark red and light and dark green) to rate for sweetness using a nine-point categorical scale. The participants rated the dark red solutions as sweeter than light red solutions, but light green solutions as sweeter than dark green solutions.</span></p><p data-dcnode-id="3916"><span data-dcnode-id="3962" instrument_node="">While the results discussed thus far in this section would appear to demonstrate that the addition (vs. absence) of food coloring leads to a significant effect on ratings of the presence (vs. absence; Johnson and Clydesdale </span><a aria-label="Reference 1982" data-dcnode-id="3960" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d280964984e1593" title="Johnson J, Clydesdale FM (1982) Perceived sweetness and redness in colored sucrose solutions. J Food Sci 47:747–752"><span data-dcnode-id="3961" instrument_node="">1982</span></a><span data-dcnode-id="3959" instrument_node="">; Maga </span><a aria-label="Reference 1974" data-dcnode-id="3957" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d280964984e1596" title="Maga JA (1974) Influence of color on taste thresholds. Chem Senses Flavor 1:115–119"><span data-dcnode-id="3958" instrument_node="">1974</span></a><span data-dcnode-id="3956" instrument_node="">) of sweetness and that increasing the intensity of color can increase perceived sweetness intensity ratings (Johnson and Clydesdale </span><a aria-label="Reference 1982" data-dcnode-id="3954" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d280964984e1599" title="Johnson J, Clydesdale FM (1982) Perceived sweetness and redness in colored sucrose solutions. J Food Sci 47:747–752"><span data-dcnode-id="3955" instrument_node="">1982</span></a><span data-dcnode-id="3953" instrument_node="">; Johnson et al. </span><a aria-label="Reference 1982" data-dcnode-id="3951" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d280964984e1602" title="Johnson JL, Dzendolet E, Damon R, Sawyer M, Clydesdale FM (1982) Psychophysical relationships between perceived sweetness and color in cherry-flavored beverages. J Food Prot 45:601–606"><span data-dcnode-id="3952" instrument_node="">1982</span></a><span data-dcnode-id="3950" instrument_node="">, </span><a aria-label="Reference 1983" data-dcnode-id="3948" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d280964984e1605" title="Johnson JL, Dzendolet E, Clydesdale FM (1983) Psychophysical relationships between perceived sweetness and redness in strawberry-flavored beverages. J Food Prot 46:21–25, 28"><span data-dcnode-id="3949" instrument_node="">1983</span></a><span data-dcnode-id="3947" instrument_node="">; Roth et al. </span><a aria-label="Reference 1988" data-dcnode-id="3945" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d280964984e1609" title="Roth HA, Radle LJ, Gifford SR, Clydesdale FM (1988) Psychophysical relationships between perceived sweetness and color in lemon- and lime-flavored drinks. J Food Sci 53(1116–1119):1162"><span data-dcnode-id="3946" instrument_node="">1988</span></a><span data-dcnode-id="3944" instrument_node="">), it is important to note that many other studies have failed to demonstrate any such effect (see Alley and Alley </span><a aria-label="Reference 1998" data-dcnode-id="3942" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d280964984e1612" title="Alley RL, Alley TR (1998) The influence of physical state and color on perceived sweetness. J Psychology: Interdisciplinary Applied 132:561–568"><span data-dcnode-id="3943" instrument_node="">1998</span></a><span data-dcnode-id="3941" instrument_node="">; Christensen </span><a aria-label="Reference 1985" data-dcnode-id="3939" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d280964984e1615" title="Christensen C (1985) Effect of color on judgments of food aroma and food intensity in young and elderly adults. Perception 14:755–762"><span data-dcnode-id="3940" instrument_node="">1985</span></a><span data-dcnode-id="3938" instrument_node="">; Frank et al. </span><a aria-label="Reference 1989" data-dcnode-id="3936" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d280964984e1618" title="Frank R, Ducheny K, Mize S (1989) Strawberry odor, but not red color, enhances the sweetness of sucrose solutions. Chem Senses 14:371–377"><span data-dcnode-id="3937" instrument_node="">1989</span></a><span data-dcnode-id="3935" instrument_node="">; McCullough et al. </span><a aria-label="Reference 1978" data-dcnode-id="3933" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d280964984e1621" title="McCullough JM, Martinsen CS, Moinpour R (1978) Application of multidimensional scaling to the analysis of sensory evaluations of stimuli with known attribute structures. J Appl Psychol 63:103–109"><span data-dcnode-id="3934" instrument_node="">1978</span></a><span data-dcnode-id="3932" instrument_node="">; Pangborn </span><a aria-label="Reference 1960" data-dcnode-id="3930" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d280964984e1624" title="Pangborn RM (1960) Influence of color on the discrimination of sweetness. Am J Psychol 73:229–238"><span data-dcnode-id="3931" instrument_node="">1960</span></a><span data-dcnode-id="3929" instrument_node="">; see also Johnson and Clydesdale </span><a aria-label="Reference 1982" data-dcnode-id="3927" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d280964984e1628" title="Johnson J, Clydesdale FM (1982) Perceived sweetness and redness in colored sucrose solutions. J Food Sci 47:747–752"><span data-dcnode-id="3928" instrument_node="">1982</span></a><span data-dcnode-id="3926" instrument_node="">). For example, Alley and Alley reported no effect of the addition of color (red, blue, yellow, and green) when compared to a clear, no-color-added baseline on participants’ ratings of the sweetness of either sweetened water or gelatine samples. Similarly, Frank et al. (</span><a aria-label="Reference 1989" data-dcnode-id="3924" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d280964984e1631" title="Frank R, Ducheny K, Mize S (1989) Strawberry odor, but not red color, enhances the sweetness of sucrose solutions. Chem Senses 14:371–377"><span data-dcnode-id="3925" instrument_node="">1989</span></a><span data-dcnode-id="3923" instrument_node="">) reported that adding red food coloring to either an odorless or strawberry odor-sweetened aqueous samples failed to increase perceived sweetness ratings of the orange red-looking drinks relative to participants’ assessment of the clear drinks. Note that the participants in this latter study had to rate the intensity of 16 stimuli on a 21-point sweetness scale: the stimuli were generated by crossing the factors of sweetness intensity (four levels), color (present vs. absent), and odorant (present vs. absent). In other words, half of the drinks in this study were uncolored. This raises the possibility that the inclusion of so many sweetened but uncolored solutions might have helped participants to realize that the color was not necessarily predictive of the presence/intensity of the taste. A similar explanation could, of course, also be put forward to account for the null results reported by Alley and Alley (</span><a aria-label="Reference 1998" data-dcnode-id="3921" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d280964984e1634" title="Alley RL, Alley TR (1998) The influence of physical state and color on perceived sweetness. J Psychology: Interdisciplinary Applied 132:561–568"><span data-dcnode-id="3922" instrument_node="">1998</span></a><span data-dcnode-id="3920" instrument_node="">). Zampini et al. (</span><a aria-label="Reference 2007" data-dcnode-id="3918" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e1637" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="3919" instrument_node="">2007</span></a><span data-dcnode-id="3917" instrument_node="">) also failed to demonstrate an easily interpretable effect of variations in color intensity on perceived sweetness intensity using a labeled magnitude scale rating procedure.</span></p><p data-dcnode-id="3860"><span data-dcnode-id="3915" instrument_node="">Thus, with regard to the question of whether or not adding color to an otherwise colorless substrate influences the perceived </span><i data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">intensity</span></i><span data-dcnode-id="3912" instrument_node=""> of different basic tastes, the answer appears to depend on a number of factors including the particular taste under investigation (Maga </span><a aria-label="Reference 1974" data-dcnode-id="3910" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d280964984e1646" title="Maga JA (1974) Influence of color on taste thresholds. Chem Senses Flavor 1:115–119"><span data-dcnode-id="3911" instrument_node="">1974</span></a><span data-dcnode-id="3909" instrument_node="">) and perhaps the precise presentation protocol adopted (such as how many incongruently colored trials the participant may be presented with; see footnote 4). Certainly, magnitude estimation typically gives rise to more pronounced effects than other methods (though see Gifford and Clydesdale </span><a aria-label="Reference 1986" data-dcnode-id="3907" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d280964984e1649" title="Gifford SR, Clydesdale FM (1986) The psychophysical relationship between color and sodium chloride concentrations in model systems. J Food Prot 49:977–982"><span data-dcnode-id="3908" instrument_node="">1986</span></a><span data-dcnode-id="3906" instrument_node=""> for one null effect of color on salt perception reported using the magnitude estimation technique). The consensus view would currently seem to be that color cues do not influence the perception of saltiness (see Chan and Kane-Martinelli </span><a aria-label="Reference 1997" data-dcnode-id="3904" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d280964984e1652" title="Chan MM, Kane-Martinelli C (1997) The effect of color on perceived flavor intensity and acceptance of foods by young adults and elderly adults. J Am Diet Assoc 97:657–659"><span data-dcnode-id="3905" instrument_node="">1997</span></a><span data-dcnode-id="3903" instrument_node="">; Gifford and Clydesdale </span><a aria-label="Reference 1986" data-dcnode-id="3901" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d280964984e1655" title="Gifford SR, Clydesdale FM (1986) The psychophysical relationship between color and sodium chloride concentrations in model systems. J Food Prot 49:977–982"><span data-dcnode-id="3902" instrument_node="">1986</span></a><span data-dcnode-id="3900" instrument_node="">; Gifford et al. </span><a aria-label="Reference 1987" data-dcnode-id="3898" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d280964984e1659" title="Gifford SR, Clydesdale FM, Damon RA Jr (1987) The psychophysical relationship between color and salt concentrations in chicken flavored broths. J Sens Stud 2:137–147"><span data-dcnode-id="3899" instrument_node="">1987</span></a><span data-dcnode-id="3897" instrument_node="">; Maga </span><a aria-label="Reference 1974" data-dcnode-id="3895" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d280964984e1662" title="Maga JA (1974) Influence of color on taste thresholds. Chem Senses Flavor 1:115–119"><span data-dcnode-id="3896" instrument_node="">1974</span></a><span data-dcnode-id="3894" instrument_node="">). By contrast, the perception of sweetness can be modified by the addition of red (or green) food coloring (e.g., see Johnson et al. </span><a aria-label="Reference 1982" data-dcnode-id="3892" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d280964984e1665" title="Johnson JL, Dzendolet E, Damon R, Sawyer M, Clydesdale FM (1982) Psychophysical relationships between perceived sweetness and color in cherry-flavored beverag
