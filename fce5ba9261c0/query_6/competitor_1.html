</span></div></div></section><section data-dcnode-id="3361" data-title="Interim Summary"><div class="c-article-section" data-dcnode-id="3362" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3425" id="Sec5"><span data-dcnode-id="3426" instrument_node="">Interim Summary</span></h2><div class="c-article-section__content" data-dcnode-id="3363" id="Sec5-content"><p data-dcnode-id="3375"><span data-dcnode-id="3424" instrument_node="">In summary, then, many studies over the last 70&nbsp;years or so have provided empirical support for the claim that the color of a food/drink can exert a powerful influence on people’s flavor </span><i data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">identification</span></i><span data-dcnode-id="3421" instrument_node=""> responses (e.g., DuBose et al. </span><a aria-label="Reference 1980" data-dcnode-id="3419" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d280964984e2317" title="DuBose CN, Cardello AV, Maller O (1980) Effects of colorants and flavorants on identification, perceived flavor intensity, and hedonic quality of fruit-flavored beverages and cake. J Food Sci 45:1393–1399, 1415"><span data-dcnode-id="3420" instrument_node="">1980</span></a><span data-dcnode-id="3418" instrument_node="">; Hall </span><a aria-label="Reference 1958" data-dcnode-id="3416" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d280964984e2320" title="Hall RL (1958) Flavor study approaches at McCormick and Company, Inc. In: A. D. Little Inc. (ed) Flavor research and food acceptance: a survey of the scope of flavor and associated research, compiled from papers presented in a series of symposia given in 1956–1957. Reinhold, New York, pp 224–240"><span data-dcnode-id="3417" instrument_node="">1958</span></a><span data-dcnode-id="3415" instrument_node="">; Kanig </span><a aria-label="Reference 1955" data-dcnode-id="3413" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d280964984e2323" title="Kanig JL (1955) Mental impact of colors in foods studied. Food Field Reporter 23:57"><span data-dcnode-id="3414" instrument_node="">1955</span></a><span data-dcnode-id="3412" instrument_node="">; Levitan et al. </span><a aria-label="Reference 2008" data-dcnode-id="3410" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d280964984e2326" title="Levitan C, Zampini M, Li R, Spence C (2008) Assessing the role of color cues and people’s beliefs about color–flavor associations on the discrimination of the flavor of sugar-coated chocolates. Chem Senses 33:415–423"><span data-dcnode-id="3411" instrument_node="">2008</span></a><span data-dcnode-id="3409" instrument_node="">; Moir </span><a aria-label="Reference 1936" data-dcnode-id="3407" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d280964984e2330" title="Moir HC (1936) Some observations on the appreciation of flavour in foodstuffs. J Soc Chem Ind: Chemistry Industry Review 14:145–148"><span data-dcnode-id="3408" instrument_node="">1936</span></a><span data-dcnode-id="3406" instrument_node="">; Oram et al. </span><a aria-label="Reference 1995" data-dcnode-id="3404" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d280964984e2333" title="Oram N, Laing DG, Hutchinson I, Owen J, Rose G, Freeman M, Newell G (1995) The influence of flavor and color on drink identification by children and adults. Dev Psychobiol 28:239–246"><span data-dcnode-id="3405" instrument_node="">1995</span></a><span data-dcnode-id="3403" instrument_node="">; Shankar et al. </span><a aria-label="Reference 2009" data-dcnode-id="3401" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d280964984e2336" title="Shankar MU, Levitan CA, Prescott J, Spence C (2009) The influence of color and label information on flavor perception. Chemosensory Perception 2:53–58"><span data-dcnode-id="3402" instrument_node="">2009</span></a><span data-dcnode-id="3400" instrument_node="">; Stillman </span><a aria-label="Reference 1993" data-dcnode-id="3398" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d280964984e2339" title="Stillman J (1993) Color influences flavor identification in fruit-flavored beverages. J Food Sci 58:810–812"><span data-dcnode-id="3399" instrument_node="">1993</span></a><span data-dcnode-id="3397" instrument_node="">; Zampini et al. </span><a aria-label="Reference 2007" data-dcnode-id="3395" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e2342" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="3396" instrument_node="">2007</span></a><span data-dcnode-id="3394" instrument_node="">, </span><a aria-label="Reference 2008" data-dcnode-id="3392" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR133" id="ref-link-section-d280964984e2345" title="Zampini M, Wantling E, Phillips N, Spence C (2008) Multisensory flavor perception: assessing the influence of fruit acids and color cues on the perception of fruit-flavored beverages. Food Qual Prefer 19:335–343"><span data-dcnode-id="3393" instrument_node="">2008</span></a><span data-dcnode-id="3391" instrument_node="">). What is more, we are </span><i data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">not</span></i><span data-dcnode-id="3388" instrument_node=""> aware of any studies that have reported results that conflict with this claim—i.e., where the color of a food was (noticeably) changed but where this change had no effect on participants’ flavor identification responses.</span><sup data-dcnode-id="3383"><a data-dcnode-id="3384" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">Footnote </span></span><span data-dcnode-id="3385" instrument_node="">6</span></a></sup><span data-dcnode-id="3382" instrument_node=""> As such, we would argue that Lavin and Lawless’s (</span><a aria-label="Reference 1998" data-dcnode-id="3380" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d280964984e2361" title="Lavin J, Lawless H (1998) Effects of color and odor on judgments of sweetness among children and adults. Food Qual Prefer 9:283–289"><span data-dcnode-id="3381" instrument_node="">1998</span></a><span data-dcnode-id="3379" instrument_node="">, p. 284) claim that “the literature on the effects of color on taste and flavour judgments is consistent in its inconsistency” is incorrect for at least as far as the effects of food coloring on people’s flavor </span><i data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">identification</span></i><span data-dcnode-id="3376" instrument_node=""> responses are concerned, the answer appears clear-cut: food coloring most certainly does influence people’s flavor identification responses.</span></p><p data-dcnode-id="3364"><span data-dcnode-id="3374" instrument_node="">Here, though, it is also important to bear in mind that one does not tend to see complete visual dominance (sometimes known as ‘capture’). That is, participants’ flavor identification responses do not always match the color that they see. Instead, researchers typically report a visual biasing of participants’ responses on a certain proportion of the trials, with the exact proportion varying from one study to the next. So, for example, DuBose et al. (</span><a aria-label="Reference 1980" data-dcnode-id="3372" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d280964984e2370" title="DuBose CN, Cardello AV, Maller O (1980) Effects of colorants and flavorants on identification, perceived flavor intensity, and hedonic quality of fruit-flavored beverages and cake. J Food Sci 45:1393–1399, 1415"><span data-dcnode-id="3373" instrument_node="">1980</span></a><span data-dcnode-id="3371" instrument_node="">) showed that atypically colored drinks were identified by their color on 40% of the trials and by their flavor on 28% of the trials. Meanwhile, the participants in Stillman’s (</span><a aria-label="Reference 1993" data-dcnode-id="3369" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d280964984e2373" title="Stillman J (1993) Color influences flavor identification in fruit-flavored beverages. J Food Sci 58:810–812"><span data-dcnode-id="3370" instrument_node="">1993</span></a><span data-dcnode-id="3368" instrument_node="">) study were able to correctly identify the flavor of the drink in 60% of trials. Oram et al. (</span><a aria-label="Reference 1995" data-dcnode-id="3366" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d280964984e2376" title="Oram N, Laing DG, Hutchinson I, Owen J, Rose G, Freeman M, Newell G (1995) The influence of flavor and color on drink identification by children and adults. Dev Psychobiol 28:239–246"><span data-dcnode-id="3367" instrument_node="">1995</span></a><span data-dcnode-id="3365" instrument_node="">) reported that for adults tested in their study, responses were based on color on 13% of trials and on flavor on 79% of trials. We discuss possible reasons for this discrepancy below.</span></p></div></div></section><section data-dcnode-id="3301" data-title="Perceptual vs. Decisional Contributions to Color’s Influence on Flavor Identification"><div class="c-article-section" data-dcnode-id="3302" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3359" id="Sec6"><span data-dcnode-id="3360" instrument_node="">Perceptual vs. Decisional Contributions to Color’s Influence on Flavor Identification</span></h2><div class="c-article-section__content" data-dcnode-id="3303" id="Sec6-content"><p data-dcnode-id="3339"><span data-dcnode-id="3358" instrument_node="">None of the studies reported thus far bear directly (and unequivocally) on the question of whether these crossmodal effects on participants’ flavor identification responses reflect a decisional effect, a perceptual effect, or some unknown combination of the two. One problem here in terms of trying to answer this question is that there are no simple means of assessing perceptual sensitivity (such as the </span><i data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">d</span></i><span data-dcnode-id="3355" instrument_node="">′ measure that is afforded by signal detection theory; Green and Swets </span><a aria-label="Reference 1966" data-dcnode-id="3353" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d280964984e2391" title="Green DM, Swets JA (1966) Signal detection theory and psychophysics. Wiley, New York"><span data-dcnode-id="3354" instrument_node="">1966</span></a><span data-dcnode-id="3352" instrument_node="">) when participants are allowed to make unconstrained flavor identification responses, as often happens when one is trying to identify a food’s flavor in natural settings. While it is certainly true that techniques do exist to try and counteract the contribution of any guessing biases that may be present (see Chen and Spence </span><a aria-label="Reference 2010" data-dcnode-id="3350" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d280964984e2394" title="Chen Y-C, Spence C (2010) When hearing the bark helps to identify the dog: semantically-congruent sounds modulate the identification of masked pictures. Cognition 114:389–404"><span data-dcnode-id="3351" instrument_node="">2010</span></a><span data-dcnode-id="3349" instrument_node="">; Intraub </span><a aria-label="Reference 1984" data-dcnode-id="3347" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d280964984e2397" title="Intraub H (1984) Conceptual masking: the effects of subsequent visual events on memory for pictures. J Exp Psychol Learn Mem Cogn 10:115–125"><span data-dcnode-id="3348" instrument_node="">1984</span></a><span data-dcnode-id="3346" instrument_node="">), no one has as yet used them in order to try and isolate any genuinely perceptual contribution to color’s influence on participants’ flavor </span><i data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">identification</span></i><span data-dcnode-id="3343" instrument_node=""> responses (see also O’Mahony </span><a aria-label="Reference 1992" data-dcnode-id="3341" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d280964984e2404" title="O’Mahony M (1992) Understanding discrimination tests: a user-friendly treatment of response bias, rating and ranking R-index texts and their relationship to signal detection. J Sens Stud 7:1–47"><span data-dcnode-id="3342" instrument_node="">1992</span></a><span data-dcnode-id="3340" instrument_node="">).</span></p><p data-dcnode-id="3304"><span data-dcnode-id="3338" instrument_node="">As such, all that can be said with any confidence at the present time is that </span><i data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">all</span></i><span data-dcnode-id="3335" instrument_node=""> of the studies that have been published to date (no matter whether using a free responding or forced choice discrimination task) have shown a crossmodal effect of color on participants’ flavor identification responses. Whether this reflects a genuine perceptual effect, a predominantly decisional effect, or some unknown combination of the two effects will only be resolved by future research. Progress here will likely come through the use of more sophisticated psychophysical paradigms (e.g., see Odgaard et al. </span><a aria-label="Reference 2003" data-dcnode-id="3333" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d280964984e2413" title="Odgaard EC, Arieh Y, Marks LE (2003) Cross-modal enhancement of perceived brightness: sensory interaction versus response bias. Percept Psychophys 65:123–132"><span data-dcnode-id="3334" instrument_node="">2003</span></a><span data-dcnode-id="3332" instrument_node=""> for such an approach being applied to the auditory modulation of visual brightness judgments; see also Lau et al. </span><a aria-label="Reference 1995" data-dcnode-id="3330" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d280964984e2416" title="Lau K-N, Post G, Kagan A (1995) Using economic incentives to distinguish perception bias from discrimination ability in taste tests. J Mark Res 32:140–151"><span data-dcnode-id="3331" instrument_node="">1995</span></a><span data-dcnode-id="3329" instrument_node="">). It is also possible that a definitive answer to the question of whether or not color’s crossmodal influence on flavor identification occurs at a perceptual level may be assisted by the evidence emerging from cognitive neuroscience research. It would, for example, be interesting to know whether the neural activity in primary (or possibly secondary) gustatory cortex and perhaps more interestingly in orbitofrontal cortex elicited by a gustatory/olfactory/flavor stimulus can be changed simply by changing a food or drink’s color (cf. González et al. </span><a aria-label="Reference 2006" data-dcnode-id="3327" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d280964984e2419" title="González J, Barros-Loscertales A, Pulvermüller F, Meseguer V, Sanjuán A, Belloch V et al (2006) Reading cinnamon activates olfactory brain regions. NeuroImage 32:906–912"><span data-dcnode-id="3328" instrument_node="">2006</span></a><span data-dcnode-id="3326" instrument_node="">; McClure et al. </span><a aria-label="Reference 2004" data-dcnode-id="3324" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d280964984e2422" title="McClure SM, Li J, Tomlin D, Cypert KS, Montague LM, Montague PR (2004) Neural correlates of behavioral preference for culturally familiar drinks. Neuron 44:379–387"><span data-dcnode-id="3325" instrument_node="">2004</span></a><span data-dcnode-id="3323" instrument_node="">; Österbauer et al. </span><a aria-label="Reference 2005" data-dcnode-id="3321" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d280964984e2426" title="Österbauer RA, Matthews PM, Jenkinson M, Beckmann CF, Hansen PC, Calvert GA (2005) Color of scents: chromatic stimuli modulate odor responses in the human brain. J Neurophysiol 93:3434–3441"><span data-dcnode-id="3322" instrument_node="">2005</span></a><span data-dcnode-id="3320" instrument_node="">; Small </span><a aria-label="Reference 2004" data-dcnode-id="3318" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR112" id="ref-link-section-d280964984e2429" title="Small DM (2004) Crossmodal integration—insights from the chemical senses. Trends Neurosci 27:120–123"><span data-dcnode-id="3319" instrument_node="">2004</span></a><span data-dcnode-id="3317" instrument_node="">; Veldhuizen et al. </span><a aria-label="Reference 2009" data-dcnode-id="3315" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR126" id="ref-link-section-d280964984e2432" title="Veldhuizen MG, Nachtigal DJ, Small DM (2009) Taste cortex contributes to odor quality coding. Chem Senses 34:A8"><span data-dcnode-id="3316" instrument_node="">2009</span></a><span data-dcnode-id="3314" instrument_node="">; Verhagen and Engelen </span><a aria-label="Reference 2006" data-dcnode-id="3312" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d280964984e2435" title="Verhagen JV, Engelen L (2006) The neurocognitive bases of human multimodal food perception: sensory integration. Neurosci Biobehav Rev 30:613–650"><span data-dcnode-id="3313" instrument_node="">2006</span></a><span data-dcnode-id="3311" instrument_node="">). Such effects, should they be observed, would certainly be consistent with the existence of at least some perceptual component to the crossmodal effect of color on flavor perception. Given that such top-down effects have recently been observed on the basis of verbal food/taste descriptors (e.g., Nitschke et al. </span><a aria-label="Reference 2006" data-dcnode-id="3309" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d280964984e2438" title="Nitschke JB, Dixon GE, Sarinopoulos I, Short SJ, Cohen JD, Smith EE et al (2006) Altering expectancy dampens neural response to aversive taste in primary taste cortex. Nat Neurosci 9:435–442"><span data-dcnode-id="3310" instrument_node="">2006</span></a><span data-dcnode-id="3308" instrument_node="">; Sarinopoulos et al. </span><a aria-label="Reference 2006" data-dcnode-id="3306" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d280964984e2441" title="Sarinopoulos I, Dixon GE, Short SJ, Davidson RJ, Nitschke JB (2006) Brain mechanisms of expectation associated with insula and amygdala response to aversive taste: implications for placebo. Brain Behav Immun 20:120–132"><span data-dcnode-id="3307" instrument_node="">2006</span></a><span data-dcnode-id="3305" instrument_node="">), we are optimistic that they might also be found here (that is, for the case of visual color cues).</span></p></div></div></section><section data-dcnode-id="2997" data-title="Expectancy-Based Effects of Food Coloring"><div class="c-article-section" data-dcnode-id="2998" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3299" id="Sec7"><span data-dcnode-id="3300" instrument_node="">Expectancy-Based Effects of Food Coloring</span></h2><div class="c-article-section__content" data-dcnode-id="2999" id="Sec7-content"><p data-dcnode-id="3216"><span data-dcnode-id="3298" instrument_node="">It seems likely that whenever we see a food of a certain color, that color, together with any other contextual cues (e.g., is it a food or drink item, hot or cold, transparent or opaque, etc; what Francis </span><a aria-label="Reference 1977" data-dcnode-id="3296" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d280964984e2452" title="Francis FJ (1977) Color and appearance as dominating sensory properties of food. In: Birch GG, Brennan JG, Parker KJ (eds) Sensory properties of foods. Applied Science, Barking, pp 45–47"><span data-dcnode-id="3297" instrument_node="">1977</span></a><span data-dcnode-id="3295" instrument_node="">, describes as “visual appearance” cues), will lead us to generate specific </span><i data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">expectations</span></i><span data-dcnode-id="3292" instrument_node=""> regarding the likely flavor of that food (see Cardello </span><a aria-label="Reference 2007" data-dcnode-id="3290" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d280964984e2458" title="Cardello AV (2007) Measuring consumer expectations to improve food product development. In: MacFie HJH (ed) Consumer-led food product development. Woodhead Publishing, Cambridge, pp 223–261"><span data-dcnode-id="3291" instrument_node="">2007</span></a><span data-dcnode-id="3289" instrument_node="">; Koch and Koch </span><a aria-label="Reference 2003" data-dcnode-id="3287" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d280964984e2461" title="Koch C, Koch EC (2003) Preconceptions of taste based on color. J Psychol: Interdisciplinary Applied 137:233–242"><span data-dcnode-id="3288" instrument_node="">2003</span></a><span data-dcnode-id="3286" instrument_node="">; Lee et al. </span><a aria-label="Reference 2006" data-dcnode-id="3284" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d280964984e2464" title="Lee L, Frederick S, Ariely D (2006) Try it, you’ll like it: the influence of expectation, consumption, and revelation on preferences for beer. Psychol Sci 17:1054–1058"><span data-dcnode-id="3285" instrument_node="">2006</span></a><span data-dcnode-id="3283" instrument_node="">; Levitan et al. </span><a aria-label="Reference 2008" data-dcnode-id="3281" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d280964984e2468" title="Levitan C, Zampini M, Li R, Spence C (2008) Assessing the role of color cues and people’s beliefs about color–flavor associations on the discrimination of the flavor of sugar-coated chocolates. Chem Senses 33:415–423"><span data-dcnode-id="3282" instrument_node="">2008</span></a><span data-dcnode-id="3280" instrument_node="">; Shankar et al. </span><a aria-label="Reference 2009" data-dcnode-id="3278" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d280964984e2471" title="Shankar MU, Levitan CA, Prescott J, Spence C (2009) The influence of color and label information on flavor perception. Chemosensory Perception 2:53–58"><span data-dcnode-id="3279" instrument_node="">2009</span></a><span data-dcnode-id="3277" instrument_node="">; Yeomans et al. </span><a aria-label="Reference 2008" data-dcnode-id="3275" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR131" id="ref-link-section-d280964984e2474" title="Yeomans M, Chambers L, Blumenthal H, Blake A (2008) The role of expectancy in sensory and hedonic evaluation: the case of smoked salmon ice-cream. Food Qual Prefer 19:565–573"><span data-dcnode-id="3276" instrument_node="">2008</span></a><span data-dcnode-id="3274" instrument_node="">; Zellner and Durlach </span><a aria-label="Reference 2003" data-dcnode-id="3272" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR134" id="ref-link-section-d280964984e2477" title="Zellner DA, Durlach P (2003) Effect of color on expected and experienced refreshment, intensity, and liking of beverages. Am J Psychol 116:633–647"><span data-dcnode-id="3273" instrument_node="">2003</span></a><span data-dcnode-id="3271" instrument_node="">). Zampini et al. (</span><a aria-label="Reference 2007" data-dcnode-id="3269" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e2480" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="3270" instrument_node="">2007</span></a><span data-dcnode-id="3268" instrument_node="">) (experiment 1) recently investigated the nature of these crossmodal associations by showing participants (all from the UK and of UK origin) a range of colored drinks (green, orange, yellow, blue, gray, red, and colorless) and asking them to look at each drink in turn and simply report (without tasting) what flavor they would expect it to have. The results (see Table&nbsp;</span><a data-dcnode-id="3266" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="3267" instrument_node="">4</span></a><span data-dcnode-id="3265" instrument_node="">) showed that all of the colored drinks generated systematic expectations regarding a drink’s likely flavor. It is our belief that such color-induced flavor expectations (what Hutchings </span><a aria-label="Reference 1977" data-dcnode-id="3263" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d280964984e2487" title="Hutchings JB (1977) The importance of visual appearance of foods to the food processor and the consumer. In: Birch GG, Brennan JG, Parker KJ (eds) Sensory properties of foods. Applied Science Publishers, London, pp 45–57"><span data-dcnode-id="3264" instrument_node="">1977</span></a><span data-dcnode-id="3262" instrument_node=""> called “anticipatory” effects) may lead to the “misidentification” of flavors when a drink is subsequently tasted (cf. Stevenson and Oaten </span><a aria-label="Reference 2008" data-dcnode-id="3260" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR117" id="ref-link-section-d280964984e2490" title="Stevenson RJ, Oaten M (2008) The effect of appropriate and inappropriate stimulus color on odor discrimination. Percept Psychophys 70:640–646"><span data-dcnode-id="3261" instrument_node="">2008</span></a><span data-dcnode-id="3259" instrument_node="">). Misidentification at this (cognitive) level will presumably also provide access to a wealth of semantic information about the “misidentified” flavor (see Engen </span><a aria-label="Reference 1972" data-dcnode-id="3257" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d280964984e2493" title="Engen T (1972) The effect of expectation on judgments of odour. Acta Psychol 36:450–458"><span data-dcnode-id="3258" instrument_node="">1972</span></a><span data-dcnode-id="3256" instrument_node="">; Gottfried and Dolan </span><a aria-label="Reference 2003" data-dcnode-id="3254" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d280964984e2496" title="Gottfried JA, Dolan RJ (2003) The nose smells what the eye sees: crossmodal visual facilitation of human olfactory perception. Neuron 39:375–386"><span data-dcnode-id="3255" instrument_node="">2003</span></a><span data-dcnode-id="3253" instrument_node="">; Jönsson et al. </span><a aria-label="Reference 2005" data-dcnode-id="3251" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d280964984e2499" title="Jönsson FU, Tchekhova A, Lönner P, Olsson MJ (2005) A metamemory perspective on odor naming and identification. Chem Senses 30:353–365"><span data-dcnode-id="3252" instrument_node="">2005</span></a><span data-dcnode-id="3250" instrument_node="">; Marques </span><a aria-label="Reference 2006" data-dcnode-id="3248" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d280964984e2502" title="Marques JF (2006) Specialization and semantic organization: evidence for multiple semantics linked to sensory modalities. Mem Cogn 34:60–67"><span data-dcnode-id="3249" instrument_node="">2006</span></a><span data-dcnode-id="3247" instrument_node="">; Morrot et al. </span><a aria-label="Reference 2001" data-dcnode-id="3245" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d280964984e2506" title="Morrot G, Brochet F, Dubourdieu D (2001) The color of odors. Brain Lang 79:309–320"><span data-dcnode-id="3246" instrument_node="">2001</span></a><span data-dcnode-id="3244" instrument_node="">; Parr et al. </span><a aria-label="Reference 2002" data-dcnode-id="3242" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d280964984e2509" title="Parr WV, Heatherbell D, White KG (2002) Demystifying wine expertise: olfactory threshold, perceptual skill and semantic memory in expert and novice wine judges. Chem Senses 27:747–755"><span data-dcnode-id="3243" instrument_node="">2002</span></a><span data-dcnode-id="3241" instrument_node="">; Revonsuo </span><a aria-label="Reference 1999" data-dcnode-id="3239" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR98" id="ref-link-section-d280964984e2512" title="Revonsuo A (1999) Binding and the phenomenal unity of consciousness. Conscious Cogn 8:173–185"><span data-dcnode-id="3240" instrument_node="">1999</span></a><span data-dcnode-id="3238" instrument_node="">; Skrandies and Reuther </span><a aria-label="Reference 2008" data-dcnode-id="3236" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR111" id="ref-link-section-d280964984e2515" title="Skrandies W, Reuther N (2008) Match and mismatch of taste, odor, and color is reflected by electrical activity in the human brain. J Psychophysiol 22:175–184"><span data-dcnode-id="3237" instrument_node="">2008</span></a><span data-dcnode-id="3235" instrument_node="">; Zellner et al. </span><a aria-label="Reference 1991" data-dcnode-id="3233" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR137" id="ref-link-section-d280964984e2518" title="Zellner DA, Bartoli AM, Eckard R (1991) Influence of color on odor identification and liking ratings. Am J Psychol 104:547–561"><span data-dcnode-id="3234" instrument_node="">1991</span></a><span data-dcnode-id="3232" instrument_node="">), which in turn might reasonably be expected to influence participants’ judgments/responses. This misidentification may then have perceptual (i.e., as well as decisional) consequences (see also Williams et al. </span><a aria-label="Reference 1984a" data-dcnode-id="3230" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR128" id="ref-link-section-d280964984e2521" title="Williams AA, Langren SP, Noble AC (1984a) Influence of appearance on the assessment of aroma in Bordeaux wines by trained assessors. J Inst Brew 90:250–253"><span data-dcnode-id="3231" instrument_node="">1984a</span></a><span data-dcnode-id="3229" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="3227" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR129" id="ref-link-section-d280964984e2525" title="Williams AA, Langron SP, Timberlake CF, Bakker J (1984b) Effect of colour on the assessment of ports. Int J Food Sci Technol 19:659–671"><span data-dcnode-id="3228" instrument_node="">b</span></a><span data-dcnode-id="3226" instrument_node="">). Here, one need only think of the placebo effect where a person’s beliefs (be they induced by the color of a pill or verbal labeling) have been shown to have surprisingly low-level (i.e., perceptual) effects (de Craen et al. </span><a aria-label="Reference 1996" data-dcnode-id="3224" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d280964984e2528" title="de Craen AJ, Roos PJ, Leonard de Vries A, Kleijnen J (1996) Effect of colour of drugs: systematic review of perceived effect of drugs and of their effectiveness. Br Med J 313:1624–1626"><span data-dcnode-id="3225" instrument_node="">1996</span></a><span data-dcnode-id="3223" instrument_node="">; Plassmann et al. </span><a aria-label="Reference 2008" data-dcnode-id="3221" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR96" id="ref-link-section-d280964984e2531" title="Plassmann H, O’Doherty J, Shiv B, Rangel A (2008) Marketing actions can modulate neural representations of experienced pleasantness. Proc Natl Acad Sci USA 105:1050–1054"><span data-dcnode-id="3222" instrument_node="">2008</span></a><span data-dcnode-id="3220" instrument_node="">; Shiv et al. </span><a aria-label="Reference 2005" data-dcnode-id="3218" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d280964984e2534" title="Shiv B, Carmon Z, Ariely D (2005) Placebo effects of marketing actions: consumers may get what they pay for. J Mark Res XLII:383–393"><span data-dcnode-id="3219" instrument_node="">2005</span></a><span data-dcnode-id="3217" instrument_node="">).
</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3198" data-test="inline-table" id="table-4"><figure data-dcnode-id="3199"><figcaption class="c-article-table__figcaption" data-dcnode-id="3210"><b data-dcnode-id="3211" data-test="table-caption" id="Tab4"><span data-dcnode-id="3215" instrument_node="">Table&nbsp;4 Results of the study of Zampini et al. (</span><a aria-label="Reference 2007" data-dcnode-id="3213" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e2547" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="3214" instrument_node="">2007</span></a><span data-dcnode-id="3212" instrument_node="">) (experiment 1) assessing the flavor expectations generated by a group of UK participants on being presented with clear plastic beakers containing transparent drinks that had been colored green, orange, yellow, blue, gray, red, or left colorless</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3200"><a aria-label="Full size table 4" class="c-article__pill-button" data-dcnode-id="3201" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12078-010-9067-z/tables/4" rel="nofollow"><span data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3202" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3203" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3204" id="global-icon-chevron-right" viewBox="0 0 16 16"></s
