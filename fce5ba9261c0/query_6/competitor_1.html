es. J Food Prot 45:601–606"><span data-dcnode-id="3893" instrument_node="">1982</span></a><span data-dcnode-id="3891" instrument_node="">, </span><a aria-label="Reference 1983" data-dcnode-id="3889" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d280964984e1668" title="Johnson JL, Dzendolet E, Clydesdale FM (1983) Psychophysical relationships between perceived sweetness and redness in strawberry-flavored beverages. J Food Prot 46:21–25, 28"><span data-dcnode-id="3890" instrument_node="">1983</span></a><span data-dcnode-id="3888" instrument_node="">; Kostyla </span><a aria-label="Reference 1978" data-dcnode-id="3886" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d280964984e1671" title="Kostyla AS (1978) The psychophysical relationships between color and flavor of some fruit flavored beverages. PhD thesis, University of Massachusetts, Amherst"><span data-dcnode-id="3887" instrument_node="">1978</span></a><span data-dcnode-id="3885" instrument_node="">; Lavin and Lawless </span><a aria-label="Reference 1998" data-dcnode-id="3883" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d280964984e1674" title="Lavin J, Lawless H (1998) Effects of color and odor on judgments of sweetness among children and adults. Food Qual Prefer 9:283–289"><span data-dcnode-id="3884" instrument_node="">1998</span></a><span data-dcnode-id="3882" instrument_node="">; Pangborn </span><a aria-label="Reference 1960" data-dcnode-id="3880" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d280964984e1678" title="Pangborn RM (1960) Influence of color on the discrimination of sweetness. Am J Psychol 73:229–238"><span data-dcnode-id="3881" instrument_node="">1960</span></a><span data-dcnode-id="3879" instrument_node="">), but importantly, this effect is not always observed (Alley and Alley </span><a aria-label="Reference 1998" data-dcnode-id="3877" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d280964984e1681" title="Alley RL, Alley TR (1998) The influence of physical state and color on perceived sweetness. J Psychology: Interdisciplinary Applied 132:561–568"><span data-dcnode-id="3878" instrument_node="">1998</span></a><span data-dcnode-id="3876" instrument_node="">; Frank et al. </span><a aria-label="Reference 1989" data-dcnode-id="3874" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d280964984e1684" title="Frank R, Ducheny K, Mize S (1989) Strawberry odor, but not red color, enhances the sweetness of sucrose solutions. Chem Senses 14:371–377"><span data-dcnode-id="3875" instrument_node="">1989</span></a><span data-dcnode-id="3873" instrument_node="">; Johnson </span><a aria-label="Reference 1982" data-dcnode-id="3871" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d280964984e1687" title="Johnson J (1982) Psychophysical relationships between colour and sweetness in fruit flavored solutions. Ph.D. thesis. University of Massachusetts at Amherst"><span data-dcnode-id="3872" instrument_node="">1982</span></a><span data-dcnode-id="3870" instrument_node="">; McCullough et al. </span><a aria-label="Reference 1978" data-dcnode-id="3868" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d280964984e1690" title="McCullough JM, Martinsen CS, Moinpour R (1978) Application of multidimensional scaling to the analysis of sensory evaluations of stimuli with known attribute structures. J Appl Psychol 63:103–109"><span data-dcnode-id="3869" instrument_node="">1978</span></a><span data-dcnode-id="3867" instrument_node="">; Pangborn </span><a aria-label="Reference 1960" data-dcnode-id="3865" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d280964984e1693" title="Pangborn RM (1960) Influence of color on the discrimination of sweetness. Am J Psychol 73:229–238"><span data-dcnode-id="3866" instrument_node="">1960</span></a><span data-dcnode-id="3864" instrument_node="">). Null effects are often reported in studies in which colored drinks are compared to clear drinks (though see Zampini et al. </span><a aria-label="Reference 2007" data-dcnode-id="3862" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e1697" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="3863" instrument_node="">2007</span></a><span data-dcnode-id="3861" instrument_node=""> for an exception).</span></p><p data-dcnode-id="3831"><span data-dcnode-id="3859" instrument_node="">Taken at face value, these results would appear to suggest that color does indeed influence people’s perception of taste intensity. However, under closer examination, many of the findings reported above are potentially problematic. For example, in their description of the threshold task, Johnson and Clydesdale (</span><a aria-label="Reference 1982" data-dcnode-id="3857" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d280964984e1703" title="Johnson J, Clydesdale FM (1982) Perceived sweetness and redness in colored sucrose solutions. J Food Sci 47:747–752"><span data-dcnode-id="3858" instrument_node="">1982</span></a><span data-dcnode-id="3856" instrument_node="">) make no reference to interleaving any “catch trials” in which unsweetened solutions were mixed in with the sweetened solutions. This is unfortunate because of the susceptibility to </span><i data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">response bias</span></i><span data-dcnode-id="3853" instrument_node="">; that is, it could be argued that the presence of the coloring in certain solutions simply led the participants in those studies to expect a taste to be present, and thus, they were more willing to respond that they did indeed perceive a taste (cf. Engen </span><a aria-label="Reference 1972" data-dcnode-id="3851" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d280964984e1709" title="Engen T (1972) The effect of expectation on judgments of odour. Acta Psychol 36:450–458"><span data-dcnode-id="3852" instrument_node="">1972</span></a><span data-dcnode-id="3850" instrument_node="">; Odgaard et al. </span><a aria-label="Reference 2003" data-dcnode-id="3848" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d280964984e1712" title="Odgaard EC, Arieh Y, Marks LE (2003) Cross-modal enhancement of perceived brightness: sensory interaction versus response bias. Percept Psychophys 65:123–132"><span data-dcnode-id="3849" instrument_node="">2003</span></a><span data-dcnode-id="3847" instrument_node="">). It is important to note that the magnitude estimation procedure is also vulnerable to </span><i data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">demand characteristics</span></i><span data-dcnode-id="3844" instrument_node="">; that is, participants could easily be influenced by the coloring such that their responses, rather than their actual taste percepts, changed in response to changes in the color intensity of the solutions (indeed, it seems possible that under certain conditions, participants may simply want to please the experimenter). Using signal detection techniques (e.g., see Green and Swets </span><a aria-label="Reference 1966" data-dcnode-id="3842" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d280964984e1719" title="Green DM, Swets JA (1966) Signal detection theory and psychophysics. Wiley, New York"><span data-dcnode-id="3843" instrument_node="">1966</span></a><span data-dcnode-id="3841" instrument_node="">) could help separate out perceptual from decisional effects here.</span><sup data-dcnode-id="3836"><a data-dcnode-id="3837" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">Footnote </span></span><span data-dcnode-id="3838" instrument_node="">3</span></a></sup><span data-dcnode-id="3835" instrument_node=""> Due to space constraints, detailing each of the various factors that might help account for the occurrence of false positive results (if that is what Johnson and colleagues’ results actually reflect) lies beyond the scope of the present paper; for instance, the specific tasks and ranges of stimuli used in each study, as well as the demand characteristics of each experiment and differences in the pools of participant tested, might all be expected to influence participants’ expectations (see Shankar et al. </span><a aria-label="Reference 2009" data-dcnode-id="3833" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d280964984e1740" title="Shankar MU, Levitan CA, Prescott J, Spence C (2009) The influence of color and label information on flavor perception. Chemosensory Perception 2:53–58"><span data-dcnode-id="3834" instrument_node="">2009</span></a><span data-dcnode-id="3832" instrument_node="">), which could, in turn, have influenced the pattern of results that were observed.</span></p><p data-dcnode-id="3803"><i data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">Does food</span></i><span data-dcnode-id="3828" instrument_node=""> color </span><i data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">influence flavor intensity?</span></i><span data-dcnode-id="3825" instrument_node=""> As visual inspection of Table&nbsp;</span><a data-dcnode-id="3823" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3824" instrument_node="">1</span></a><span data-dcnode-id="3822" instrument_node=""> makes clear, there have been far fewer studies of color’s influence on perceived flavor intensity. However, in contrast to the rather mixed picture regarding the effect of color on taste intensity, the story concerning color’s effect on flavor intensity seems much more clear-cut and convincing. In one of the most frequently cited studies in this area, DuBose et al. (</span><a aria-label="Reference 1980" data-dcnode-id="3820" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d280964984e1754" title="DuBose CN, Cardello AV, Maller O (1980) Effects of colorants and flavorants on identification, perceived flavor intensity, and hedonic quality of fruit-flavored beverages and cake. J Food Sci 45:1393–1399, 1415"><span data-dcnode-id="3821" instrument_node="">1980</span></a><span data-dcnode-id="3819" instrument_node="">) reported that overall flavor intensity was affected by color intensity, with higher color intensity solutions giving rise to stronger flavor evaluation responses by participants for orange- (but not for the cherry-) flavored beverages. Meanwhile, Kostyla (</span><a aria-label="Reference 1978" data-dcnode-id="3817" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d280964984e1757" title="Kostyla AS (1978) The psychophysical relationships between color and flavor of some fruit flavored beverages. PhD thesis, University of Massachusetts, Amherst"><span data-dcnode-id="3818" instrument_node="">1978</span></a><span data-dcnode-id="3816" instrument_node="">) reported that the addition of yellow color to sweetened cherry-, raspberry-, and strawberry-flavored beverages decreased flavor ratings by around 4%. Blue color reduced fruit flavor by 20% (and the addition of red coloring increased sweetness by 5–10%). Elsewhere, significant effects of color on flavor intensity have also been reported by Romeu and De Vicente (</span><a aria-label="Reference 1968" data-dcnode-id="3814" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d280964984e1760" title="Romeu JV, De Vicente MLS (1968) Influyen los colores en el sabor? [Do colours influence flavour?]. Rev Interam Psicologia 2:143–157"><span data-dcnode-id="3815" instrument_node="">1968</span></a><span data-dcnode-id="3813" instrument_node="">). More complex results have been reported in other studies where certain color–flavor combinations appear to give rise to bigger effects than others (Bayarri et al. </span><a aria-label="Reference 2001" data-dcnode-id="3811" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d280964984e1764" title="Bayarri S, Calvo C, Costell E, Duran L (2001) Influence of color on perception of sweetness and fruit flavor of fruit drinks. Food Sci Technol Int 7:399–404"><span data-dcnode-id="3812" instrument_node="">2001</span></a><span data-dcnode-id="3810" instrument_node="">), and null results of varying the intensity of the color on flavor intensity are rarer (Zampini et al. </span><a aria-label="Reference 2007" data-dcnode-id="3808" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e1767" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="3809" instrument_node="">2007</span></a><span data-dcnode-id="3807" instrument_node="">, </span><a aria-label="Reference 2008" data-dcnode-id="3805" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR133" id="ref-link-section-d280964984e1770" title="Zampini M, Wantling E, Phillips N, Spence C (2008) Multisensory flavor perception: assessing the influence of fruit acids and color cues on the perception of fruit-flavored beverages. Food Qual Prefer 19:335–343"><span data-dcnode-id="3806" instrument_node="">2008</span></a><span data-dcnode-id="3804" instrument_node="">).</span></p><p data-dcnode-id="3777"><span data-dcnode-id="3802" instrument_node="">It should be noted here that people are very poor at identifying orthonasally presented odors in the absence of any other sensory cues regarding the odor’s identity (e.g., Cain </span><a aria-label="Reference 1979" data-dcnode-id="3800" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d280964984e1776" title="Cain WS (1979) To know with the nose: keys to odor identification. Science 203:467–470"><span data-dcnode-id="3801" instrument_node="">1979</span></a><span data-dcnode-id="3799" instrument_node="">; Desor and Beauchamp </span><a aria-label="Reference 1974" data-dcnode-id="3797" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d280964984e1779" title="Desor J, Beauchamp G (1974) The human capacity to transmit olfactory information. Percept Psychophys 16:551–556"><span data-dcnode-id="3798" instrument_node="">1974</span></a><span data-dcnode-id="3796" instrument_node="">; Engen </span><a aria-label="Reference 1972" data-dcnode-id="3794" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d280964984e1782" title="Engen T (1972) The effect of expectation on judgments of odour. Acta Psychol 36:450–458"><span data-dcnode-id="3795" instrument_node="">1972</span></a><span data-dcnode-id="3793" instrument_node="">; Eskenazi et al. </span><a aria-label="Reference 1986" data-dcnode-id="3791" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d280964984e1785" title="Eskenazi B, Cain WS, Friend K (1986) Exploration of olfactory aptitude. Bull Psychon Soc 24:203–206"><span data-dcnode-id="3792" instrument_node="">1986</span></a><span data-dcnode-id="3790" instrument_node="">; Jönsson et al. </span><a aria-label="Reference 2005" data-dcnode-id="3788" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d280964984e1788" title="Jönsson FU, Tchekhova A, Lönner P, Olsson MJ (2005) A metamemory perspective on odor naming and identification. Chem Senses 30:353–365"><span data-dcnode-id="3789" instrument_node="">2005</span></a><span data-dcnode-id="3787" instrument_node="">; Zellner et al. </span><a aria-label="Reference 1991" data-dcnode-id="3785" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR137" id="ref-link-section-d280964984e1792" title="Zellner DA, Bartoli AM, Eckard R (1991) Influence of color on odor identification and liking ratings. Am J Psychol 104:547–561"><span data-dcnode-id="3786" instrument_node="">1991</span></a><span data-dcnode-id="3784" instrument_node="">). By contrast, people appear to be much better at identifying the presence of the basic tastes (e.g., sweet, sour, salty, and bitter; see Bartoshuk </span><a aria-label="Reference 1975" data-dcnode-id="3782" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d280964984e1795" title="Bartoshuk LM (1975) Taste mixtures: is mixture suppression related to compression? Physiol Behav 14:643–649"><span data-dcnode-id="3783" instrument_node="">1975</span></a><span data-dcnode-id="3781" instrument_node="">; Laing et al. </span><a aria-label="Reference 2002" data-dcnode-id="3779" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d280964984e1798" title="Laing DG, Link C, Jinks AL, Hutchinson I (2002) The limited capacity of humans to identify the components of taste mixtures and taste–odour mixtures. Perception 31:617–635"><span data-dcnode-id="3780" instrument_node="">2002</span></a><span data-dcnode-id="3778" instrument_node="">). A priori, then, it would seem likely that participants’ judgments of odor (and hence of flavor) identity would be much more likely to be influenced by the presentation of an incongruent visual color cue than would their judgments of the identity of a specific tastant.</span></p><p data-dcnode-id="3745"><span data-dcnode-id="3776" instrument_node="">Indeed, robust effects of color cues on judgments of odor intensity have now been reported in numerous studies (e.g., Blackwell </span><a aria-label="Reference 1995" data-dcnode-id="3774" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d280964984e1805" title="Blackwell L (1995) Visual clues and their effects on odour assessment. Nutr Food Sci 5:24–28"><span data-dcnode-id="3775" instrument_node="">1995</span></a><span data-dcnode-id="3773" instrument_node="">; Davis </span><a aria-label="Reference 1981" data-dcnode-id="3771" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d280964984e1808" title="Davis RG (1981) The role of nonolfactory context cues in odor identification. Percept Psychophys 30:83–89"><span data-dcnode-id="3772" instrument_node="">1981</span></a><span data-dcnode-id="3770" instrument_node="">; Engen </span><a aria-label="Reference 1972" data-dcnode-id="3768" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d280964984e1811" title="Engen T (1972) The effect of expectation on judgments of odour. Acta Psychol 36:450–458"><span data-dcnode-id="3769" instrument_node="">1972</span></a><span data-dcnode-id="3767" instrument_node="">; Morrot et al. </span><a aria-label="Reference 2001" data-dcnode-id="3765" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d280964984e1814" title="Morrot G, Brochet F, Dubourdieu D (2001) The color of odors. Brain Lang 79:309–320"><span data-dcnode-id="3766" instrument_node="">2001</span></a><span data-dcnode-id="3764" instrument_node="">; Parr et al. </span><a aria-label="Reference 2003" data-dcnode-id="3762" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d280964984e1817" title="Parr WV, White KG, Heatherbell D (2003) The nose knows: influence of colour on perception of wine aroma. J Wine Res 14:79–101"><span data-dcnode-id="3763" instrument_node="">2003</span></a><span data-dcnode-id="3761" instrument_node="">; Zellner and Kautz </span><a aria-label="Reference 1990" data-dcnode-id="3759" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR135" id="ref-link-section-d280964984e1821" title="Zellner DA, Kautz MA (1990) Color affects perceived odor intensity. J Exp Psychol Hum Percept Perform 16:391–397"><span data-dcnode-id="3760" instrument_node="">1990</span></a><span data-dcnode-id="3758" instrument_node="">; Zellner and Whitten </span><a aria-label="Reference 1999" data-dcnode-id="3756" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR136" id="ref-link-section-d280964984e1824" title="Zellner DA, Whitten LA (1999) The effect of color intensity and appropriateness on color-induced odor enhancement. Am J Psychol 112:585–604"><span data-dcnode-id="3757" instrument_node="">1999</span></a><span data-dcnode-id="3755" instrument_node="">). For example, Zellner and Whitten reported that the addition of color (presented at one of four different color intensity levels) influenced participants’ odor intensity responses when orthonasally sniffing red strawberry and green mint solutions. Interestingly, ratings of the intensity of the strawberry odor peaked at the middle color intensity, while for the mint odor, there was a monotonic increase with increasing color intensity. In a subsequent experiment, Zellner and Whitten showed that while the intensity of the color played a large role in modulating perceived odor intensity, the specific color that was added (be it appropriate or inappropriate) had little effect. Given results such as these, it would seem likely that color should also influence flavor intensity judgments. That said, however, most of these crossmodal studies involved investigating the effect of color on participants’ orthonasal odor judgments. In this regard, the results of a study by Koza et al. (</span><a aria-label="Reference 2005" data-dcnode-id="3753" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d280964984e1827" title="Koza BJ, Cilmi A, Dolese M, Zellner DA (2005) Color enhances orthonasal olfactory intensity and reduces retronasal olfactory intensity. Chem Senses 30:643–649"><span data-dcnode-id="3754" instrument_node="">2005</span></a><span data-dcnode-id="3752" instrument_node="">) are critical. For example, they demonstrated that while the addition of color resulted in an increase in the perceived intensity of orthonasally presented odors, it actually led to a reduction in the perceived intensity of the very same odors when presented retronasally (i.e., as they would be if participants were making flavor judgments; see also Christensen </span><a aria-label="Reference 1983" data-dcnode-id="3750" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d280964984e1830" title="Christensen C (1983) Effects of color on aroma, flavor and texture judgments of foods. J Food Sci 48:787–790"><span data-dcnode-id="3751" instrument_node="">1983</span></a><span data-dcnode-id="3749" instrument_node="">; Zellner and Durlach </span><a aria-label="Reference 2003" data-dcnode-id="3747" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR134" id="ref-link-section-d280964984e1833" title="Zellner DA, Durlach P (2003) Effect of color on expected and experienced refreshment, intensity, and liking of beverages. Am J Psychol 116:633–647"><span data-dcnode-id="3748" instrument_node="">2003</span></a><span data-dcnode-id="3746" instrument_node="">).</span></p><p data-dcnode-id="3707"><span data-dcnode-id="3744" instrument_node="">It is worth noting that researchers who have documented </span><i data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">null</span></i><span data-dcnode-id="3741" instrument_node=""> results of the addition of food coloring on ratings of taste and/or flavor intensity have rarely bothered to conduct any kind of analysis to ensure they had sufficient power in their experimental design to observe a significant effect had one been present (see Frick </span><a aria-label="Reference 1995" data-dcnode-id="3739" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d280964984e1842" title="Frick RW (1995) Accepting the null hypothesis. Mem Cogn 23:132–138"><span data-dcnode-id="3740" instrument_node="">1995</span></a><span data-dcnode-id="3738" instrument_node="">). Because of the nature of flavor research, the number of trials a given participant can complete tends to be rather limited,</span><sup data-dcnode-id="3733"><a data-dcnode-id="3734" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">Footnote </span></span><span data-dcnode-id="3735" instrument_node="">4</span></a></sup><span data-dcnode-id="3732" instrument_node=""> hence constraining the ability of experimenters to detect what may well be a relatively small behavioral effect (see also Lecoutre and Derzko </span><a aria-label="Reference 2001" data-dcnode-id="3730" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d280964984e1882" title="Lecoutre B, Derzko G (2001) Asserting the smallness of effects in ANOVA. Methods Psychological Research 6:1–32"><span data-dcnode-id="3731" instrument_node="">2001</span></a><span data-dcnode-id="3729" instrument_node="">; Rouanet </span><a aria-label="Reference 1996" data-dcnode-id="3727" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR103" id="ref-link-section-d280964984e1885" title="Rouanet H (1996) Bayesian methods for assessing importance of effects. Psychol Bull 119:149–158"><span data-dcnode-id="3728" instrument_node="">1996</span></a><span data-dcnode-id="3726" instrument_node="">). Complicating this issue even further is the fact that the effects of food coloring on ratings of taste and flavor intensity, or on the detection of the presence of a tastant in solution, appear to be rather stimulus-specific (e.g., see Bayarri et al. </span><a aria-label="Reference 2001" data-dcnode-id="3724" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d280964984e1889" title="Bayarri S, Calvo C, Costell E, Duran L (2001) Influence of color on perception of sweetness and fruit flavor of fruit drinks. Food Sci Technol Int 7:399–404"><span data-dcnode-id="3725" instrument_node="">2001</span></a><span data-dcnode-id="3723" instrument_node="">; Maga </span><a aria-label="Reference 1974" data-dcnode-id="3721" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d280964984e1892" title="Maga JA (1974) Influence of color on taste thresholds. Chem Senses Flavor 1:115–119"><span data-dcnode-id="3722" instrument_node="">1974</span></a><span data-dcnode-id="3720" instrument_node="">; Zampini et al. </span><a aria-label="Reference 2007" data-dcnode-id="3718" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e1895" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="3719" instrument_node="">2007</span></a><span data-dcnode-id="3717" instrument_node="">, </span><a aria-label="Reference 2008" data-dcnode-id="3715" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR133" id="ref-link-section-d280964984e1898" title="Zampini M, Wantling E, Phillips N, Spence C (2008) Multisensory flavor perception: assessing the influence of fruit acids and color cues on the perception of fruit-flavored beverages. Food Qual Prefer 19:335–343"><span data-dcnode-id="3716" instrument_node="">2008</span></a><span data-dcnode-id="3714" instrument_node="">). Note that a similar stimulus specificity has also been reported previously for the case of olfactory–gustatory interactions (e.g., see Frank and Byram </span><a aria-label="Reference 1988" data-dcnode-id="3712" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d280964984e1901" title="Frank RA, Byram J (1988) Taste–smell interactions are tastant and odorant dependent. Chem Senses 13:445–455"><span data-dcnode-id="3713" instrument_node="">1988</span></a><span data-dcnode-id="3711" instrument_node="">; though see also Valentin et al. </span><a aria-label="Reference 2006" data-dcnode-id="3709" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d280964984e1904" title="Valentin D, Chrea C, Nguyen DH (2006) Taste–odour interactions in sweet taste perception. In: Spillane W (ed) Optimising sweet taste in foods. Woodhead Publishing Limited, Cambridge, pp 66–84"><span data-dcnode-id="3710" instrument_node="">2006</span></a><span data-dcnode-id="3708" instrument_node="">). It is therefore currently unclear whether the discrepant results of color on taste intensity reported by different groups of researchers over the last 50&nbsp;years are best explained in terms of a failure to properly control for all of the potential confounding variables or by a lack of statistical power in the experimental designs used by certain researchers in the field; plausible arguments can be made in both directions.</span></p></div></div></section><section data-dcnode-id="3427" data-title="Does Food Color Influence Perceived Flavor Identity?"><div class="c-article-section" data-dcnode-id="3428" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3702" id="Sec4"><span data-dcnode-id="3703" instrument_node="">Does Food Color Influence Perceived Flavor Identity?</span></h2><div class="c-article-section__content" data-dcnode-id="3429" id="Sec4-content"><p data-dcnode-id="3655"><span data-dcnode-id="3701" instrument_node="">By contrast, many (and, in fact, we would argue </span><i data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">all</span></i><span data-dcnode-id="3698" instrument_node="">) studies published to date support the claim that judgments of flavor </span><i data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">identity</span></i><span data-dcnode-id="3695" instrument_node=""> are influenced by a food’s color (e.g., DuBose et al. </span><a aria-label="Reference 1980" data-dcnode-id="3693" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d280964984e1921" title="DuBose CN, Cardello AV, Maller O (1980) Effects of colorants and flavorants on identification, perceived flavor intensity, and hedonic quality of fruit-flavored beverages and cake. J Food Sci 45:1393–1399, 1415"><span data-dcnode-id="3694" instrument_node="">1980</span></a><span data-dcnode-id="3692" instrument_node="">; Hall </span><a aria-label="Reference 1958" data-dcnode-id="3690" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d280964984e1924" title="Hall RL (1958) Flavor study approaches at McCormick and Company, Inc. In: A. D. Little Inc. (ed) Flavor research and food acceptance: a survey of the scope of flavor and associated research, compiled from papers presented in a series of symposia given in 1956–1957. Reinhold, New York, pp 224–240"><span data-dcnode-id="3691" instrument_node="">1958</span></a><span data-dcnode-id="3689" instrument_node="">; Institute of Food Technologists </span><a aria-label="Reference 1980" data-dcnode-id="3687" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d280964984e1927" title="Institute of Food Technologists (1980) Food colors. J Food Technol 34(7):77–84"><span data-dcnode-id="3688" instrument_node="">1980</span></a><span data-dcnode-id="3686" instrument_node="">; Kanig </span><a aria-label="Reference 1955" data-dcnode-id="3684" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d280964984e1931" title="Kanig JL (1955) Mental impact of colors in foods studied. Food Field Reporter 23:57"><span data-dcnode-id="3685" instrument_node="">1955</span></a><span data-dcnode-id="3683" instrument_node="">; Levitan et al. </span><a aria-label="Reference 2008" data-dcnode-id="3681" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d280964984e1934" title="Levitan C, Zampini M, Li R, Spence C (2008) Assessing the role of color cues and people’s beliefs about color–flavor associations on the discrimination of the flavor of sugar-coated chocolates. Chem Senses 33:415–423"><span data-dcnode-id="3682" instrument_node="">2008</span></a><span data-dcnode-id="3680" instrument_node="">; Moir </span><a aria-label="Reference 1936" data-dcnode-id="3678" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d280964984e1937" title="Moir HC (1936) Some observations on the appreciation of flavour in foodstuffs. J Soc Chem Ind: Chemistry Industry Review 14:145–148"><span data-dcnode-id="3679" instrument_node="">1936</span></a><span data-dcnode-id="3677" instrument_node="">; Sakai </span><a aria-label="Reference 2004" data-dcnode-id="3675" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR104" id="ref-link-section-d280964984e1940" title="Sakai N (2004) The effect of visual stimuli on perception of flavor. Poster presented at ISOT 2004"><span data-dcnode-id="3676" instrument_node="">2004</span></a><span data-dcnode-id="3674" instrument_node="">; Shankar et al. </span><a aria-label="Reference 2009" data-dcnode-id="3672" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d280964984e1943" title="Shankar MU, Levitan CA, Prescott J, Spence C (2009) The influence of color and label information on flavor perception. Chemosensory Perception 2:53–58"><span data-dcnode-id="3673" instrument_node="">2009</span></a><span data-dcnode-id="3671" instrument_node="">; Stillman </span><a aria-label="Reference 1993" data-dcnode-id="3669" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d280964984e1946" title="Stillman J (1993) Color influences flavor identification in fruit-flavored beverages. J Food Sci 58:810–812"><span data-dcnode-id="3670" instrument_node="">1993</span></a><span data-dcnode-id="3668" instrument_node="">; Zampini et al. </span><a aria-label="Reference 2007" data-dcnode-id="3666" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e1950" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="3667" instrument_node="">2007</span></a><span data-dcnode-id="3665" instrument_node="">, </span><a aria-label="Reference 2008" data-dcnode-id="3663" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR133" id="ref-link-section-d280964984e1953" title="Zampini M, Wantling E, Phillips N, Spence C (2008) Multisensory flavor perception: assessing the influence of fruit acids and color cues on the perception of fruit-flavored beverages. Food Qual Prefer 19:335–343"><span data-dcnode-id="3664" instrument_node="">2008</span></a><span data-dcnode-id="3662" instrument_node="">; see also Dolnick </span><a aria-label="Reference 2008" data-dcnode-id="3660" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d280964984e1956" title="Dolnick E (2008) Fish or foul? The New York Times, September 2. Downloaded from 
                    http://www.nytimes.com/2008/09/02/opinion/02dolnick.html?_r=1&amp;scp=1&amp;sq=chocolate%20strawberry%20yogurt&amp;st=cse
                    
                   on 07/07/09"><span data-dcnode-id="3661" instrument_node="">2008</span></a><span data-dcnode-id="3659" instrument_node="">; note that we are aware of no studies that have examined the effect of food color on taste identification, and hence in this section, we only discuss studies of color’s influence on flavor identification). By contrast, several studies have investigated the effect of color on orthonasal olfactory odor identification judgments. So, for example, Zellner et al. (</span><a aria-label="Reference 1991" data-dcnode-id="3657" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR137" id="ref-link-section-d280964984e1959" title="Zellner DA, Bartoli AM, Eckard R (1991) Influence of color on odor identification and liking ratings. Am J Psychol 104:547–561"><span data-dcnode-id="3658" instrument_node="">1991</span></a><span data-dcnode-id="3656" instrument_node="">) have shown that participants correctly identify odors more rapidly when colored appropriately than when uncolored or else inappropriately colored.</span></p><p data-dcnode-id="3635"><span data-dcnode-id="3654" instrument_node="">In terms of studies looking at color’s effect on flavor identification, DuBose et al. (</span><a aria-label="Reference 1980" data-dcnode-id="3652" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d280964984e1965" title="DuBose CN, Cardello AV, Maller O (1980) Effects of colorants and flavorants on identification, perceived flavor intensity, and hedonic quality of fruit-flavored beverages and cake. J Food Sci 45:1393–1399, 1415"><span data-dcnode-id="3653" instrument_node="">1980</span></a><span data-dcnode-id="3651" instrument_node="">) conducted one frequently cited study addressing this question. The participants in their study attempted to identify the flavors of a variety of differently colored fruit-flavored drinks. Certain color–flavor pairings were deemed “appropriate” (e.g., a cherry-flavored drink colored red), while others were deemed “inappropriate” (e.g., as when the lime-flavored drink was colored red; though see Shankar et al. </span><a aria-label="Reference 2009" data-dcnode-id="3649" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d280964984e1968" title="Shankar MU, Levitan CA, Prescott J, Spence C (2009) The influence of color and label information on flavor perception. Chemosensory Perception 2:53–58"><span data-dcnode-id="3650" instrument_node="">2009</span></a><span data-dcnode-id="3648" instrument_node=""> on the notion of appropriateness). DuBose et al. found that participants misidentified the flavor of a number of the drinks when the coloring was inappropriate. What is more, participants’ incorrect answers often seemed to be driven by the colors of the drinks themselves. That is, the participants often made what could be classed as </span><i data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">visually dominant</span></i><span data-dcnode-id="3645" instrument_node=""> responses (see Partan and Marler </span><a aria-label="Reference 1999" data-dcnode-id="3643" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR94" id="ref-link-section-d280964984e1974" title="Partan S, Marler P (1999) Communication goes multimodal. Science 283:1272–1273"><span data-dcnode-id="3644" instrument_node="">1999</span></a><span data-dcnode-id="3642" instrument_node="">; Posner et al. </span><a aria-label="Reference 1976" data-dcnode-id="3640" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d280964984e1977" title="Posner MI, Nissen MJ, Klein RM (1976) Visual dominance: an information-processing account of its origins and significance. Psychol Rev 83:157–171"><span data-dcnode-id="3641" instrument_node="">1976</span></a><span data-dcnode-id="3639" instrument_node="">). So, for example, 26% of the participants reported that a cherry-flavored drink tasted of lemon/lime when colored green as compared to no-lime-flavor responses when the drink was colored red instead (see Table&nbsp;</span><a data-dcnode-id="3637" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="3638" instrument_node="">3</span></a><span data-dcnode-id="3636" instrument_node=""> for a summary of the results from one of the experiments conducted by DuBose et al.).
</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3617" data-test="inline-table" id="table-3"><figure data-dcnode-id="3618"><figcaption class="c-article-table__figcaption" data-dcnode-id="3629"><b data-dcnode-id="3630" data-test="table-caption" id="Tab3"><span data-dcnode-id="3634" instrument_node="">Table&nbsp;3 Partial summary of the results from DuBose et al. (</span><a aria-label="Reference 1980" data-dcnode-id="3632" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d280964984e1994" title="DuBose CN, Cardello AV, Maller O (1980) Effects of colorants and flavorants on identification, perceived flavor intensity, and hedonic quality of fruit-flavored beverages and cake. J Food Sci 45:1393–1399, 1415"><span data-dcnode-id="3633" instrument_node="">1980</span></a><span data-dcnode-id="3631" instrument_node="">) (experiment 2)</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3619"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="3620" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12078-010-9067-z/tables/3" rel="nofollow"><span data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3621" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3622" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3623" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3626" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3625" fill-rule="evenodd"></path><span data-dcnode-id="3624" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3616" instrument_node="">
</span><p data-dcnode-id="3572"><span data-dcnode-id="3615" instrument_node="">One potentially important limitation with regard to the interpretation of the study of DuBose et al. (</span><a aria-label="Reference 1980" data-dcnode-id="3613" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d280964984e2127" title="DuBose CN, Cardello AV, Maller O (1980) Effects of colorants and flavorants on identification, perceived flavor intensity, and hedonic quality of fruit-flavored beverages and cake. J Food Sci 45:1393–1399, 1415"><span data-dcnode-id="3614" instrument_node="">1980</span></a><span data-dcnode-id="3612" instrument_node="">), and, in fact, with the majority of other studies that have investigated crossmodal influences of food coloring on flavor perception in humans (e.g., Hall </span><a aria-label="Reference 1958" data-dcnode-id="3610" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d280964984e2130" title="Hall RL (1958) Flavor study approaches at McCormick and Company, Inc. In: A. D. Little Inc. (ed) Flavor research and food acceptance: a survey of the scope of flavor and associated research, compiled from papers presented in a series of symposia given in 1956–1957. Reinhold, New York, pp 224–240"><span data-dcnode-id="3611" instrument_node="">1958</span></a><span data-dcnode-id="3609" instrument_node="">; Kanig </span><a aria-label="Reference 1955" data-dcnode-id="3607" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d280964984e2133" title="Kanig JL (1955) Mental impact of colors in foods studied. Food Field Reporter 23:57"><span data-dcnode-id="3608" instrument_node="">1955</span></a><span data-dcnode-id="3606" instrument_node="">; Moir </span><a aria-label="Reference 1936" data-dcnode-id="3604" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d280964984e2136" title="Moir HC (1936) Some observations on the appreciation of flavour in foodstuffs. J Soc Chem Ind: Chemistry Industry Review 14:145–148"><span data-dcnode-id="3605" instrument_node="">1936</span></a><span data-dcnode-id="3603" instrument_node="">; Oram et al. </span><a aria-label="Reference 1995" data-dcnode-id="3601" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d280964984e2139" title="Oram N, Laing DG, Hutchinson I, Owen J, Rose G, Freeman M, Newell G (1995) The influence of flavor and color on drink identification by children and adults. Dev Psychobiol 28:239–246"><span data-dcnode-id="3602" instrument_node="">1995</span></a><span data-dcnode-id="3600" instrument_node="">), is that the participants were not informed of the deception that was taking place (e.g., see Hall </span><a aria-label="Reference 1958" data-dcnode-id="3598" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d280964984e2143" title="Hall RL (1958) Flavor study approaches at McCormick and Company, Inc. In: A. D. Little Inc. (ed) Flavor research and food acceptance: a survey of the scope of flavor and associated research, compiled from papers presented in a series of symposia given in 1956–1957. Reinhold, New York, pp 224–240"><span data-dcnode-id="3599" instrument_node="">1958</span></a><span data-dcnode-id="3597" instrument_node="">, p. 229). This is a particularly important issue given that it means that the participants in the majority of the studies that have investigated the effect of color on flavor identification may simply have assumed that the colors of the drinks were meant to be informative with regard to their likely flavor. In other words, if participants found it difficult to discriminate the identity of the flavor (or taste) on the basis of gustatory, olfactory, and/or flavor cues, then they may simply have decided to respond on the basis of the more easily discriminable color cues instead. Hence, it is entirely possible that the participants in these studies may simply have used the salient visual cues as a cognitive shortcut with regard to the likely flavors of the foods that they were being asked to evaluate (cf. Bertelson and Aschersleben </span><a aria-label="Reference 1998" data-dcnode-id="3595" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d280964984e2146" title="Bertelson P, Aschersleben G (1998) Automatic visual bias of perceived auditory location. Psychon Bull Rev 5:482–489"><span data-dcnode-id="3596" instrument_node="">1998</span></a><span data-dcnode-id="3594" instrument_node=""> for a similar confound that has been identified in the literature documenting the visual capture, or dominance, over perceived auditory localization). That is, the participants in these earlier studies of multisensory flavor perception may have felt some pressure to respond in line with the salient information provided visually (namely, the obviously changing color of the drink from one trial to the next; cf. Orne </span><a aria-label="Reference 1962" data-dcnode-id="3592" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d280964984e2149" title="Orne MT (1962) On the social psychology of the psychological experiment: with particular reference to demand characteristics and their implications. Am Psychol 17:776–783"><span data-dcnode-id="3593" instrument_node="">1962</span></a><span data-dcnode-id="3591" instrument_node="">). As such, it is unclear whether the results reported in many of the early studies demonstrating color’s influence on flavor identification responses reflect a </span><i data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">response bias</span></i><span data-dcnode-id="3588" instrument_node=""> elicited by the clearly visible (and changing) colors of the drinks that were presented to the participants, a genuine crossmodal </span><i data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">perceptual effect</span></i><span data-dcnode-id="3585" instrument_node=""> (i.e., meaning that the color cues actually modulated the flavor percept itself; see Green and Swets </span><a aria-label="Reference 1966" data-dcnode-id="3583" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d280964984e2158" title="Green DM, Swets JA (1966) Signal detection theory and psychophysics. Wiley, New York"><span data-dcnode-id="3584" instrument_node="">1966</span></a><span data-dcnode-id="3582" instrument_node="">; Hoegg and Alba </span><a aria-label="Reference 2007a" data-dcnode-id="3580" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d280964984e2162" title="Hoegg J, Alba JW (2007a) Linguistic framing of sensory experience: there is some accounting for taste. In: Lowrey TM (ed) Psycholinguistic phenomena in marketing communications. Erlbaum, Mahwah, pp 3–21"><span data-dcnode-id="3581" instrument_node="">2007a</span></a><span data-dcnode-id="3579" instrument_node="">), or some unknown combination of these two effects (see below for a fuller discussion of this issue).</span><sup data-dcnode-id="3574"><a data-dcnode-id="3575" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="3577"><span data-dcnode-id="3578" instrument_node="">Footnote </span></span><span data-dcnode-id="3576" instrument_node="">5</span></a></sup><span data-dcnode-id="3573" instrument_node="">
</span></p><p data-dcnode-id="3555"><span data-dcnode-id="3571" instrument_node="">One means by which researchers have attempted to circumvent (or at least reduce) this potential uncertainty regarding the cause of color’s influence on flavor identification responses is by explicitly informing their participants of the potential deception prior to the start of the study (see Stillman </span><a aria-label="Reference 1993" data-dcnode-id="3569" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d280964984e2180" title="Stillman J (1993) Color influences flavor identification in fruit-flavored beverages. J Food Sci 58:810–812"><span data-dcnode-id="3570" instrument_node="">1993</span></a><span data-dcnode-id="3568" instrument_node="">; Zampini et al. </span><a aria-label="Reference 2007" data-dcnode-id="3566" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e2183" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="3567" instrument_node="">2007</span></a><span data-dcnode-id="3565" instrument_node="">, </span><a aria-label="Reference 2008" data-dcnode-id="3563" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR133" id="ref-link-section-d280964984e2186" title="Zampini M, Wantling E, Phillips N, Spence C (2008) Multisensory flavor perception: assessing the influence of fruit acids and color cues on the perception of fruit-flavored beverages. Food Qual Prefer 19:335–343"><span data-dcnode-id="3564" instrument_node="">2008</span></a><span data-dcnode-id="3562" instrument_node="">). Although only a few studies have, to date, taken this precaution, the results nevertheless confirm the suggestion that food coloring can still affect people’s flavor identification responses under such conditions. For example, the 310 untrained observers (visitors to an open day at the University of Auckland) in a study reported by Stillman (</span><a aria-label="Reference 1993" data-dcnode-id="3560" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d280964984e2189" title="Stillman J (1993) Color influences flavor identification in fruit-flavored beverages. J Food Sci 58:810–812"><span data-dcnode-id="3561" instrument_node="">1993</span></a><span data-dcnode-id="3559" instrument_node="">) were each given a beverage to taste and identify and were informed that its color was independent of the flavor. The drinks were either raspberry- or orange-flavored and were either colored red, yellowish orange, green, or else left uncolored. The results (see Fig.&nbsp;</span><a data-dcnode-id="3557" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3558" instrument_node="">2</span></a><span data-dcnode-id="3556" instrument_node="">) showed that participants were significantly better at correctly identifying the raspberry flavor when the drink was colored red than when it was colored green, orange yellow, or else was presented as a colorless solution. The orange-flavored solution was identified significantly more accurately when the drink was colored orange, yellow, or red than when it was presented as a colorless solution.
</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3522" data-test="figure" data-title="Fig.&nbsp;2" id="figure-2"><figure data-dcnode-id="3523"><figcaption data-dcnode-id="3552"><b class="c-article-section__figure-caption" data-dcnode-id="3553" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="3554" instrument_node="">Fig.&nbsp;2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3534"><div class="c-article-section__figure-item" data-dcnode-id="3547"><a class="c-article-section__figure-link" data-dcnode-id="3548" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12078-010-9067-z/figures/2" rel="nofollow"><picture data-dcnode-id="3549"><source data-dcnode-id="3551" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12078-010-9067-z/MediaObjects/12078_2010_9067_Fig2_HTML.gif?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="3550" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12078-010-9067-z/MediaObjects/12078_2010_9067_Fig2_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3535" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="3536"><span data-dcnode-id="3546" instrument_node="">Summary of the results of Stillman’s (</span><a aria-label="Reference 1993" data-dcnode-id="3544" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d280964984e2206" title="Stillman J (1993) Color influences flavor identification in fruit-flavored beverages. J Food Sci 58:810–812"><span data-dcnode-id="3545" instrument_node="">1993</span></a><span data-dcnode-id="3543" instrument_node="">) study in which 310 participants were given a single drink to taste and identify. The </span><i data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">horizontal lines</span></i><span data-dcnode-id="3540" instrument_node=""> indicate those comparisons between conditions that were significant (</span><i data-dcnode-id="3538"><span data-dcnode-id="3539" instrument_node="">asterisk</span></i><span data-dcnode-id="3537" instrument_node="">) using independent samples chi-square tests</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3524"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="3525" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12078-010-9067-z/figures/2" rel="nofollow"><span data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3526" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3527" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3528" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3531" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3530" fill-rule="evenodd"></path><span data-dcnode-id="3529" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3521" instrument_node="">
</span><p data-dcnode-id="3489"><span data-dcnode-id="3520" instrument_node="">The participants in another study reported by Zampini et al. (</span><a aria-label="Reference 2007" data-dcnode-id="3518" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e2228" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="3519" instrument_node="">2007</span></a><span data-dcnode-id="3517" instrument_node="">; experiment 2) were also explicitly informed that there was </span><i data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">no</span></i><span data-dcnode-id="3514" instrument_node=""> relationship between the color and flavor of the drinks that they had to evaluate. That is, they were informed that each of the 124 drinks that they had to sample was just as likely to appear as a colorless solution, or as a red, green, orange, yellow, blue, or gray solution, regardless of its actual flavor. Even though Zampini et al.’s participants were clearly aware that the colors of the drinks that they were tasting were not in any way informative (cf. Engen </span><a aria-label="Reference 1972" data-dcnode-id="3512" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d280964984e2234" title="Engen T (1972) The effect of expectation on judgments of odour. Acta Psychol 36:450–458"><span data-dcnode-id="3513" instrument_node="">1972</span></a><span data-dcnode-id="3511" instrument_node="">), the colors of the drinks nevertheless still exerted a significant influence on participants’ flavor identification responses (see Fig.&nbsp;</span><a data-dcnode-id="3509" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3510" instrument_node="">3</span></a><span data-dcnode-id="3508" instrument_node="">). Similar results were also reported in a follow-up study (Zampini et al. </span><a aria-label="Reference 2008" data-dcnode-id="3506" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR133" id="ref-link-section-d280964984e2240" title="Zampini M, Wantling E, Phillips N, Spence C (2008) Multisensory flavor perception: assessing the influence of fruit acids and color cues on the perception of fruit-flavored beverages. Food Qual Prefer 19:335–343"><span data-dcnode-id="3507" instrument_node="">2008</span></a><span data-dcnode-id="3505" instrument_node="">) in which the participants had to try and identify the flavor of blackcurrant, orange, and flavorless solutions that had been colored yellow, gray, orange, red, or else left colorless (see Fig.&nbsp;</span><a data-dcnode-id="3503" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3504" instrument_node="">4</span></a><span data-dcnode-id="3502" instrument_node="">). Taken together, the results of Zampini et al.’s (</span><a aria-label="Reference 2007" data-dcnode-id="3500" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e2247" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="3501" instrument_node="">2007</span></a><span data-dcnode-id="3499" instrument_node="">, </span><a aria-label="Reference 2008" data-dcnode-id="3497" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR133" id="ref-link-section-d280964984e2250" title="Zampini M, Wantling E, Phillips N, Spence C (2008) Multisensory flavor perception: assessing the influence of fruit acids and color cues on the perception of fruit-flavored beverages. Food Qual Prefer 19:335–343"><span data-dcnode-id="3498" instrument_node="">2008</span></a><span data-dcnode-id="3496" instrument_node="">) studies therefore add weight to the claim that the crossmodal effect of color on multisensory flavor perception in humans does not reflect task demands or any simple form of decisional bias (cf. Delwiche </span><a aria-label="Reference 2004" data-dcnode-id="3494" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d280964984e2253" title="Delwiche J (2004) The impact of perceptual interactions on perceived flavor. Food Qual Prefer 15:137–146"><span data-dcnode-id="3495" instrument_node="">2004</span></a><span data-dcnode-id="3493" instrument_node="">; Hoegg and Alba </span><a aria-label="Reference 2007b" data-dcnode-id="3491" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d280964984e2256" title="Hoegg J, Alba JW (2007b) Taste perception: more than meets the tongue. J Consum Res 33:490–498"><span data-dcnode-id="3492" instrument_node="">2007b</span></a><span data-dcnode-id="3490" instrument_node="">).
</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3459" data-test="figure" data-title="Fig.&nbsp;3" id="figure-3"><figure data-dcnode-id="3460"><figcaption data-dcnode-id="3486"><b class="c-article-section__figure-caption" data-dcnode-id="3487" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="3488" instrument_node="">Fig.&nbsp;3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3471"><div class="c-article-section__figure-item" data-dcnode-id="3478"><a class="c-article-section__figure-link" data-dcnode-id="3479" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12078-010-9067-z/figures/3" rel="nofollow"><picture data-dcnode-id="3483"><source data-dcnode-id="3485" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12078-010-9067-z/MediaObjects/12078_2010_9067_Fig3a_HTML.gif?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="3484" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12078-010-9067-z/MediaObjects/12078_2010_9067_Fig3a_HTML.gif&amp;raw"></picture><picture data-dcnode-id="3480"><source data-dcnode-id="3482" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12078-010-9067-z/MediaObjects/12078_2010_9067_Fig3c_HTML.gif?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="3481" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12078-010-9067-z/MediaObjects/12078_2010_9067_Fig3c_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3472" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="3473"><span data-dcnode-id="3477" instrument_node="">Summary of the results of the study of Zampini et al (</span><a aria-label="Reference 2007" data-dcnode-id="3475" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d280964984e2269" title="Zampini M, Sanabria D, Phillips N, Spence C (2007) The multisensory perception of flavor: assessing the influence of color cues on flavor discrimination responses. Food Qual Prefer 18:975–984"><span data-dcnode-id="3476" instrument_node="">2007</span></a><span data-dcnode-id="3474" instrument_node="">) (experiment 2) documenting the effect of color on flavor identification. Lime, orange, strawberry, and flavorless drinks were presented either colored green, orange, red, or colorless in a fully counterbalanced design. Either a standard or double intensity of the colorant was added to the solutions. The participants had to try and identify the flavor of each drink from a list of 22 alternatives (if the participants indicated the “other” option they were prompted to suggest the specific flavor they had in mind) and also rate the flavor intensity. They were given 124 samples to evaluate in total using a sip-and-spit method. Coloring the solutions congruently (e.g., green for lime, red for strawberry, and orange for orange) led to a modest increase in the number of correct flavor identification responses for the strawberry- and orange-flavored drinks (relative to the performance seen when participants judged the colorless solutions). Incongruent coloring impaired the participants’ ability to identify the orange- (when colored green or red) and lime-flavored solution (when colored orange or red). Overall, color appeared to have less of an impact on the identification of the strawberry solutions. At present, there is no obvious explanation for this particular result. Note also that it is difficult to discern any clear pattern of results from the doubling of the intensity of the food coloring added to the various solutions</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3461"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="3462" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12078-010-9067-z/figures/3" rel="nofollow"><span data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3463" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3464" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3465" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3468" instrument_node="">

ssessing the influence of fruit acids and color cues on the perception of fruit-flavored beverages. Food Qual Prefer 19:335–343"><span data-dcnode-id="3448" instrument_node="">2008</span></a><span data-dcnode-id="3446" instrument_node="">) highlighting the crossmodal effect of color on participants’ flavor identification responses. Once again, a sip-and-spit method was used</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3433"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="3434" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12078-010-9067-z/figures/4" rel="nofollow"><span data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3435" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3436" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3437" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3440" instrument_node="">
