36" instrument_node="">2.7</span><a class="workspace-trigger" data-dcnode-id="3933" href="#tblfn0055" name="btblfn0055"><sup data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">bc</span></sup></a></td></tr><tr data-dcnode-id="3902"><td class="align-left" data-dcnode-id="3928"><span data-dcnode-id="3930" instrument_node="">&nbsp;</span><span data-dcnode-id="3929" instrument_node="">C</span></td><td class="align-char" data-dcnode-id="3923"><span data-dcnode-id="3927" instrument_node="">5.4</span><a class="workspace-trigger" data-dcnode-id="3924" href="#tblfn0055" name="btblfn0055"><sup data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">c</span></sup></a></td><td class="align-char" data-dcnode-id="3918"><span data-dcnode-id="3922" instrument_node="">6.9</span><a class="workspace-trigger" data-dcnode-id="3919" href="#tblfn0055" name="btblfn0055"><sup data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">a</span></sup></a></td><td class="align-char" data-dcnode-id="3913"><span data-dcnode-id="3917" instrument_node="">2.9</span><a class="workspace-trigger" data-dcnode-id="3914" href="#tblfn0055" name="btblfn0055"><sup data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">a</span></sup></a></td><td class="align-char" data-dcnode-id="3908"><span data-dcnode-id="3912" instrument_node="">3.7</span><a class="workspace-trigger" data-dcnode-id="3909" href="#tblfn0055" name="btblfn0055"><sup data-dcnode-id="3910"><span data-dcnode-id="3911" instrument_node="">a</span></sup></a></td><td class="align-char" data-dcnode-id="3903"><span data-dcnode-id="3907" instrument_node="">2.9</span><a class="workspace-trigger" data-dcnode-id="3904" href="#tblfn0055" name="btblfn0055"><sup data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">a</span></sup></a></td></tr><tr data-dcnode-id="3873"><td class="align-left" data-dcnode-id="3899"><span data-dcnode-id="3901" instrument_node="">&nbsp;</span><span data-dcnode-id="3900" instrument_node="">D</span></td><td class="align-char" data-dcnode-id="3894"><span data-dcnode-id="3898" instrument_node="">5.6</span><a class="workspace-trigger" data-dcnode-id="3895" href="#tblfn0055" name="btblfn0055"><sup data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">c</span></sup></a></td><td class="align-char" data-dcnode-id="3889"><span data-dcnode-id="3893" instrument_node="">7.2</span><a class="workspace-trigger" data-dcnode-id="3890" href="#tblfn0055" name="btblfn0055"><sup data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">a</span></sup></a></td><td class="align-char" data-dcnode-id="3884"><span data-dcnode-id="3888" instrument_node="">2.5</span><a class="workspace-trigger" data-dcnode-id="3885" href="#tblfn0055" name="btblfn0055"><sup data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">b</span></sup></a></td><td class="align-char" data-dcnode-id="3879"><span data-dcnode-id="3883" instrument_node="">3.4</span><a class="workspace-trigger" data-dcnode-id="3880" href="#tblfn0055" name="btblfn0055"><sup data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">b</span></sup></a></td><td class="align-char" data-dcnode-id="3874"><span data-dcnode-id="3878" instrument_node="">2.7</span><a class="workspace-trigger" data-dcnode-id="3875" href="#tblfn0055" name="btblfn0055"><sup data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">bc</span></sup></a></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="3814"><dt data-dcnode-id="3868" id="tblfn0055"><span data-dcnode-id="3869" instrument_node="">a–d</span></dt><dd data-dcnode-id="3861"><p data-dcnode-id="3862"><span data-dcnode-id="3867" instrument_node="">Means in the same column with the same letter were not significantly different (α</span><span data-dcnode-id="3866" instrument_node="">&nbsp;</span><span data-dcnode-id="3865" instrument_node="">=</span><span data-dcnode-id="3864" instrument_node="">&nbsp;</span><span data-dcnode-id="3863" instrument_node="">0.05).</span></p></dd><dt data-dcnode-id="3859" id="tblfn0060"><span data-dcnode-id="3860" instrument_node="">1</span></dt><dd data-dcnode-id="3853"><p data-dcnode-id="3854"><span data-dcnode-id="3858" instrument_node="">Retail cheeses of A) Kraft Foods (Glenview, IL), B) Gossner Foods (Logan, UT), and manufactured at Utah State University (Logan) as C) Old Juniper and D) White Pine. These cheeses are described in </span><a class="workspace-trigger" data-dcnode-id="3856" href="#tbl0010" name="btbl0010"><span data-dcnode-id="3857" instrument_node="">Table 2</span></a><span data-dcnode-id="3855" instrument_node="">.</span></p></dd><dt data-dcnode-id="3851" id="tblfn0065"><span data-dcnode-id="3852" instrument_node="">2</span></dt><dd data-dcnode-id="3832"><p data-dcnode-id="3833"><span data-dcnode-id="3846"><span data-dcnode-id="3850" instrument_node="">Evaluated using 9-point </span><a class="topic-link" data-dcnode-id="3848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/hedonic-scales" title="Learn more about hedonic scale from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3849" instrument_node="">hedonic scale</span></a><span data-dcnode-id="3847" instrument_node="">, where 9</span></span><span data-dcnode-id="3845" instrument_node="">&nbsp;</span><span data-dcnode-id="3844" instrument_node="">=</span><span data-dcnode-id="3843" instrument_node="">&nbsp;</span><span data-dcnode-id="3842" instrument_node="">like extremely, 5</span><span data-dcnode-id="3841" instrument_node="">&nbsp;</span><span data-dcnode-id="3840" instrument_node="">=</span><span data-dcnode-id="3839" instrument_node="">&nbsp;</span><span data-dcnode-id="3838" instrument_node="">neither like nor dislike, and 1</span><span data-dcnode-id="3837" instrument_node="">&nbsp;</span><span data-dcnode-id="3836" instrument_node="">=</span><span data-dcnode-id="3835" instrument_node="">&nbsp;</span><span data-dcnode-id="3834" instrument_node="">dislike extremely.</span></p></dd><dt data-dcnode-id="3830" id="tblfn0070"><span data-dcnode-id="3831" instrument_node="">3</span></dt><dd data-dcnode-id="3815"><p data-dcnode-id="3816"><span data-dcnode-id="3829" instrument_node="">Evaluated using a 5-point JAR scale, where 1</span><span data-dcnode-id="3828" instrument_node="">&nbsp;</span><span data-dcnode-id="3827" instrument_node="">=</span><span data-dcnode-id="3826" instrument_node="">&nbsp;</span><span data-dcnode-id="3825" instrument_node="">not enough attribute, 3</span><span data-dcnode-id="3824" instrument_node="">&nbsp;</span><span data-dcnode-id="3823" instrument_node="">=</span><span data-dcnode-id="3822" instrument_node="">&nbsp;</span><span data-dcnode-id="3821" instrument_node="">just about right, and 5</span><span data-dcnode-id="3820" instrument_node="">&nbsp;</span><span data-dcnode-id="3819" instrument_node="">=</span><span data-dcnode-id="3818" instrument_node="">&nbsp;</span><span data-dcnode-id="3817" instrument_node="">too much attribute.</span></p></dd></dl></div></div><p data-dcnode-id="3789" id="par0090"><span data-dcnode-id="3811" instrument_node="">Using the attributes diagnostic test, significant differences (</span><em data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">P</span></em><span data-dcnode-id="3808" instrument_node="">&nbsp;</span><span data-dcnode-id="3807" instrument_node="">&lt;</span><span data-dcnode-id="3806" instrument_node="">&nbsp;</span><span data-dcnode-id="3801"><span data-dcnode-id="3805" instrument_node="">0.001) were found among the cheeses for sharpness, flavor, and </span><a class="topic-link" data-dcnode-id="3803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/chewiness" title="Learn more about chewiness from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3804" instrument_node="">chewiness</span></a><span data-dcnode-id="3802" instrument_node="">. Participants demonstrated they understood the difference between a mild and sharp cheese because when asked to rate sharpness using the JAR scale, mild and medium cheeses received mean scores of 1.5 and 2.4, respectively, and sharp cheeses A, B, and C were considered just about right, with scores of 2.8 to 2.9. Interestingly, sharp cheese D was perceived as lacking sharpness (JAR score</span></span><span data-dcnode-id="3800" instrument_node="">&nbsp;</span><span data-dcnode-id="3799" instrument_node="">=</span><span data-dcnode-id="3798" instrument_node="">&nbsp;</span><span data-dcnode-id="3797" instrument_node="">2.5), even though it was the same age as sharp cheese C. However, there was a difference in how they were aged. Cheese C was made using an adjunct </span><em data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node="">Lb. helveticus</span></em><span data-dcnode-id="3790"><span data-dcnode-id="3794" instrument_node=""> culture and was subject to accelerated </span><a class="topic-link" data-dcnode-id="3792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/cheese-ripening" title="Learn more about cheese ripening from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3793" instrument_node="">cheese ripening</span></a><span data-dcnode-id="3791" instrument_node=""> with 10-wk storage at 10°C, whereas cheese D was maintained continuously at 6°C.</span></span></p><p data-dcnode-id="3784" id="par0095"><span data-dcnode-id="3788" instrument_node="">Overall, the sharp cheeses were considered as having too much flavor with mean JAR scores of 3.4 to 3.8, and the mild cheeses were considered to have too little flavor (JAR scores of 2.3 to 2.6). The full-fat cheeses that were considered closest to being just about right in flavor were the medium cheeses (JAR scores of 2.5 to 3.3). For overall liking (using the hedonic scale), the mean scores decreased with cheese sharpness level and for mild, medium, and sharp cheeses were 6.45, 6.22, and 5.45, respectively (</span><a class="workspace-trigger" data-dcnode-id="3786" href="#tbl0025" name="btbl0025"><span data-dcnode-id="3787" instrument_node="">Table 5</span></a><span data-dcnode-id="3785" instrument_node="">).</span></p></section></section><section data-dcnode-id="2609" id="sec0090"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">Low-Fat Cheese</span></h3><section data-dcnode-id="3775" id="sec0095"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">Composition</span></h4><p data-dcnode-id="3776" id="par0100"><span data-dcnode-id="3777" instrument_node="">All of the low-fat cheeses were made using the same procedure and milk with similar protein-fat ratio and had 5 to 6.5% fat, 52 to 55% moisture, 1.8 to 1.9% salt, and a pH of 5.0 to 5.5. At this moisture level, the low-fat cheeses have a similar initial firmness to full-fat cheeses, achieved by using pre-acidification of milk before renneting and eliminating cooking of the curd.</span></p></section><section data-dcnode-id="3436" id="sec0100"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">Color</span></h4><div data-dcnode-id="3465"><p data-dcnode-id="3740" id="par0105"><span data-dcnode-id="3772" instrument_node="">Orange color intensity of the low-fat cheeses increased with amount of annatto used, as shown by an increase in both red (a*) and yellow (b*; </span><a class="workspace-trigger" data-dcnode-id="3770" href="#tbl0030" name="btbl0030"><span data-dcnode-id="3771" instrument_node="">Table 6</span></a><span data-dcnode-id="3769" instrument_node="">). Cheese made without any annatto (cheeses 1, 2, and 3) had similar low a* (−2.5</span><span data-dcnode-id="3768" instrument_node="">&nbsp;</span><span data-dcnode-id="3767" instrument_node="">±</span><span data-dcnode-id="3766" instrument_node="">&nbsp;</span><span data-dcnode-id="3765" instrument_node="">0.2, indicating a slight green tinge) and b* values (7</span><span data-dcnode-id="3764" instrument_node="">&nbsp;</span><span data-dcnode-id="3763" instrument_node="">±</span><span data-dcnode-id="3762" instrument_node="">&nbsp;</span><span data-dcnode-id="3761" instrument_node="">2), indicating a slight yellow color. Cheeses 7, 8, and 9 with the highest annatto had the highest a* and b* values (15</span><span data-dcnode-id="3760" instrument_node="">&nbsp;</span><span data-dcnode-id="3759" instrument_node="">±</span><span data-dcnode-id="3758" instrument_node="">&nbsp;</span><span data-dcnode-id="3757" instrument_node="">0.5 and 42</span><span data-dcnode-id="3756" instrument_node="">&nbsp;</span><span data-dcnode-id="3755" instrument_node="">±</span><span data-dcnode-id="3754" instrument_node="">&nbsp;</span><span data-dcnode-id="3753" instrument_node="">7, respectively). Cheeses made using 7.34</span><span data-dcnode-id="3752" instrument_node="">&nbsp;</span><span data-dcnode-id="3751" instrument_node="">mL of annatto/100</span><span data-dcnode-id="3750" instrument_node="">&nbsp;</span><span data-dcnode-id="3749" instrument_node="">kg (the level used at USU to manufacture Old Juniper Cheddar cheese) had intermediate a* and b* values (7.2</span><span data-dcnode-id="3748" instrument_node="">&nbsp;</span><span data-dcnode-id="3747" instrument_node="">±</span><span data-dcnode-id="3746" instrument_node="">&nbsp;</span><span data-dcnode-id="3745" instrument_node="">0.3 and 33</span><span data-dcnode-id="3744" instrument_node="">&nbsp;</span><span data-dcnode-id="3743" instrument_node="">±</span><span data-dcnode-id="3742" instrument_node="">&nbsp;</span><span data-dcnode-id="3741" instrument_node="">2, respectively). Interestingly, cheese 8, where annatto was combined with the intermediate level of titanium dioxide, had the highest b* value of 48.7, indicating a synergistic effect of increasing whiteness on enhancing the yellow appearance of low-fat cheese. Cheese 8 was also the low-fat cheese that matched the US Department of Agriculture cheese color specification the best, with L*, a*, and b* values and hue angle of 67.3, 14.9, 48.7, and 73 compared with NCI cheese color 6, with corresponding values of 79.0, 14.8, 50.8, and 73.9, respectively.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3466" id="tbl0030"><span class="captions" data-dcnode-id="3729"><span data-dcnode-id="3730"><p data-dcnode-id="3731" id="spar0045"><span class="label" data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">Table 6</span></span><span data-dcnode-id="3737" instrument_node="">. </span><span data-dcnode-id="3736" instrument_node="">Mean Hunter color (L*, a*, and b*) values</span><a class="workspace-trigger" data-dcnode-id="3733" href="#tblfn0080" name="btblfn0080"><sup data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">1</span></sup></a><span data-dcnode-id="3732" instrument_node=""> and hue angle of experimental low-fat cheeses.</span></p></span></span><div class="groups" data-dcnode-id="3512"><table data-dcnode-id="3513"><thead class="valign-top" data-dcnode-id="3707"><tr data-dcnode-id="3715"><th class="rowsep-1 align-left valign-bottom" data-dcnode-id="3724" rowspan="2" scope="col"><span data-dcnode-id="3728" instrument_node="">Cheese</span><a class="workspace-trigger" data-dcnode-id="3725" href="#tblfn0085" name="btblfn0085"><sup data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">2</span></sup></a></th><th class="rowsep-1 align-center" colspan="3" data-dcnode-id="3722" scope="col"><span data-dcnode-id="3723" instrument_node="">Hunter color</span></th><th class="rowsep-1 align-center valign-bottom" data-dcnode-id="3716" rowspan="2" scope="col"><span data-dcnode-id="3721" instrument_node="">Hue angle</span><a class="workspace-trigger" data-dcnode-id="3718" href="#tblfn0090" name="btblfn0090"><sup data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">3</span></sup></a><span data-dcnode-id="3717" instrument_node=""> (°)</span></th></tr><tr data-dcnode-id="3708"><th class="rowsep-1 align-center" data-dcnode-id="3713" scope="col"><span data-dcnode-id="3714" instrument_node="">L*</span></th><th class="rowsep-1 align-center" data-dcnode-id="3711" scope="col"><span data-dcnode-id="3712" instrument_node="">a*</span></th><th class="rowsep-1 align-center" data-dcnode-id="3709" scope="col"><span data-dcnode-id="3710" instrument_node="">b*</span></th></tr></thead><tbody data-dcnode-id="3514"><tr data-dcnode-id="3687"><td class="align-left" data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">1</span></td><td class="align-char" data-dcnode-id="3700"><span data-dcnode-id="3704" instrument_node="">56.6</span><a class="workspace-trigger" data-dcnode-id="3701" href="#tblfn0075" name="btblfn0075"><sup data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">d</span></sup></a></td><td class="align-char" data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">−2.7</span></td><td class="align-char" data-dcnode-id="3693"><span data-dcnode-id="3697" instrument_node="">4.6</span><a class="workspace-trigger" data-dcnode-id="3694" href="#tblfn0075" name="btblfn0075"><sup data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">d</span></sup></a></td><td class="align-left" data-dcnode-id="3688"><span data-dcnode-id="3692" instrument_node="">—</span><a class="workspace-trigger" data-dcnode-id="3689" href="#tblfn0095" name="btblfn0095"><sup data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">4</span></sup></a></td></tr><tr data-dcnode-id="3670"><td class="align-left" data-dcnode-id="3685"><span data-dcn de="">e</span></sup></a></td><td class="align-char" data-dcnode-id="3572"><span data-dcnode-id="3576" instrument_node="">14.6</span><a class="workspace-trigger" data-dcnode-id="3573" href="#tblfn0075" name="btblfn0075"><sup data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">a</span></sup></a></td><td class="align-char" data-dcnode-id="3567"><span data-dcnode-id="3571" instrument_node="">37.8</span><a class="workspace-trigger" data-dcnode-id="3568" href="#tblfn0075" name="btblfn0075"><sup data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">b</span></sup></a></td><td class="align-char" data-dcnode-id="3562"><span data-dcnode-id="3566" instrument_node="">68.9</span><a class="workspace-trigger" data-dcnode-id="3563" href="#tblfn0075" name="btblfn0075"><sup data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">a</span></sup></a></td></tr><tr data-dcnode-id="3538"><td class="align-left" data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">8</span></td><td class="align-char" data-dcnode-id="3554"><span data-dcnode-id="3558" instrument_node="">67.3</span><a class="workspace-trigger" data-dcnode-id="3555" href="#tblfn0075" name="btblfn0075"><sup data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">c</span></sup></a></td><td class="align-char" data-dcnode-id="3549"><span data-dcnode-id="3553" instrument_node="">14.9</span><a class="workspace-trigger" data-dcnode-id="3550" href="#tblfn0075" name="btblfn0075"><sup data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">a</span></sup></a></td><td class="align-char" data-dcnode-id="3544"><span data-dcnode-id="3548" instrument_node="">48.7</span><a class="workspace-trigger" data-dcnode-id="3545" href="#tblfn0075" name="btblfn0075"><sup data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">a</span></sup></a></td><td class="align-char" data-dcnode-id="3539"><span data-dcnode-id="3543" instrument_node="">73.0</span><a class="workspace-trigger" data-dcnode-id="3540" href="#tblfn0075" name="btblfn0075"><sup data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">a</span></sup></a></td></tr><tr data-dcnode-id="3515"><td class="align-left" data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">9</span></td><td class="align-char" data-dcnode-id="3531"><span data-dcnode-id="3535" instrument_node="">65.0</span><a class="workspace-trigger" data-dcnode-id="3532" href="#tblfn0075" name="btblfn0075"><sup data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">c</span></sup></a></td><td class="align-char" data-dcnode-id="3526"><span data-dcnode-id="3530" instrument_node="">15.4</span><a class="workspace-trigger" data-dcnode-id="3527" href="#tblfn0075" name="btblfn0075"><sup data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">a</span></sup></a></td><td class="align-char" data-dcnode-id="3521"><span data-dcnode-id="3525" instrument_node="">40.7</span><a class="workspace-trigger" data-dcnode-id="3522" href="#tblfn0075" name="btblfn0075"><sup data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">a</span></sup></a></td><td class="align-char" data-dcnode-id="3516"><span data-dcnode-id="3520" instrument_node="">69.3</span><a class="workspace-trigger" data-dcnode-id="3517" href="#tblfn0075" name="btblfn0075"><sup data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">a</span></sup></a></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="3467"><dt data-dcnode-id="3510" id="tblfn0075"><span data-dcnode-id="3511" instrument_node="">a–e</span></dt><dd data-dcnode-id="3503"><p data-dcnode-id="3504"><span data-dcnode-id="3509" instrument_node="">Means in the same column with same letter were not significantly different (α</span><span data-dcnode-id="3508" instrument_node="">&nbsp;</span><span data-dcnode-id="3507" instrument_node="">=</span><span data-dcnode-id="3506" instrument_node="">&nbsp;</span><span data-dcnode-id="3505" instrument_node="">0.05).</span></p></dd><dt data-dcnode-id="3501" id="tblfn0080"><span data-dcnode-id="3502" instrument_node="">1</span></dt><dd data-dcnode-id="3498"><p data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">The L* value is an indicator of luminosity (the degree of lightness from black to white). The a* value is an indicator of green (–) and red (+), whereas b* is an indicator of blue (–) and yellow (+).</span></p></dd><dt data-dcnode-id="3496" id="tblfn0085"><span data-dcnode-id="3497" instrument_node="">2</span></dt><dd data-dcnode-id="3490"><p data-dcnode-id="3491"><span data-dcnode-id="3495" instrument_node="">Low-fat cheeses made with varying levels of </span><a class="topic-link" data-dcnode-id="3493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/annatto" title="Learn more about annatto from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3494" instrument_node="">annatto</span></a><span data-dcnode-id="3492" instrument_node=""> and titanium dioxide.</span></p></dd><dt data-dcnode-id="3488" id="tblfn0090"><span data-dcnode-id="3489" instrument_node="">3</span></dt><dd data-dcnode-id="3485"><p data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">Calculated as arctan(b*/a*).</span></p></dd><dt data-dcnode-id="3483" id="tblfn0095"><span data-dcnode-id="3484" instrument_node="">4</span></dt><dd data-dcnode-id="3468"><p data-dcnode-id="3469"><span data-dcnode-id="3482" instrument_node="">Not appropriate to calculate hue values for neutral colors [i.e., when √(a*</span><sup data-dcnode-id="3480"><span data-dcnode-id="3481" instrument_node="">2</span></sup><span data-dcnode-id="3479" instrument_node="">&nbsp;</span><span data-dcnode-id="3478" instrument_node="">+</span><span data-dcnode-id="3477" instrument_node="">&nbsp;</span><span data-dcnode-id="3476" instrument_node="">b*</span><sup data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">2</span></sup><span data-dcnode-id="3473" instrument_node="">) ∼5 or less (</span><a class="workspace-trigger" data-dcnode-id="3471" href="#bib0085" name="bbib0085"><span data-dcnode-id="3472" instrument_node="">HunterLab, 2011</span></a><span data-dcnode-id="3470" instrument_node="">)].</span></p></dd></dl></div></div><p data-dcnode-id="3442" id="par0110"><span data-dcnode-id="3464" instrument_node="">Addition of titanium dioxide eliminated the translucent appearance characteristic of low-fat and nonfat cheeses (</span><a class="workspace-trigger" data-dcnode-id="3462" href="#bib0140" name="bbib0140"><span data-dcnode-id="3463" instrument_node="">Paulson et al., 1998</span></a><span data-dcnode-id="3461" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3459" href="#bib0025" name="bbib0025"><span data-dcnode-id="3460" instrument_node="">Dave et al., 2001</span></a><span data-dcnode-id="3458" instrument_node="">). The low-fat cheeses with no titanium dioxide added (cheeses 1, 4, and 7) all had low L* values (52</span><span data-dcnode-id="3457" instrument_node="">&nbsp;</span><span data-dcnode-id="3456" instrument_node="">±</span><span data-dcnode-id="3455" instrument_node="">&nbsp;</span><span data-dcnode-id="3454" instrument_node="">5) and among the others, cheese 3 had the highest L* value of 84 (</span><a class="workspace-trigger" data-dcnode-id="3452" href="#tbl0030" name="btbl0030"><span data-dcnode-id="3453" instrument_node="">Table 6</span></a><span data-dcnode-id="3451" instrument_node="">). Cheeses 6 and 9 with the same level of titanium dioxide as cheese 3 were less noticeably white and their L* values decreased with increasing annatto (73.9 and 65.0, respectively). All of the low-fat cheeses made with annatto had similar hue angels (74</span><span data-dcnode-id="3450" instrument_node="">&nbsp;</span><span data-dcnode-id="3449" instrument_node="">±</span><span data-dcnode-id="3448" instrument_node="">&nbsp;</span><span data-dcnode-id="3447" instrument_node="">5°), that was most similar to full-fat cheese A (hue angle</span><span data-dcnode-id="3446" instrument_node="">&nbsp;</span><span data-dcnode-id="3445" instrument_node="">=</span><span data-dcnode-id="3444" instrument_node="">&nbsp;</span><span data-dcnode-id="3443" instrument_node="">71 to 74°). This was the cheese that was the most orange in color and had the highest b* value.</span></p><p data-dcnode-id="3437" id="par0115"><span data-dcnode-id="3441" instrument_node="">When considered on a visual basis (as shown in </span><a class="workspace-trigger" data-dcnode-id="3439" href="#fig0005" name="bfig0005"><span data-dcnode-id="3440" instrument_node="">Figure 1c</span></a><span data-dcnode-id="3438" instrument_node="">), the lack of opaqueness in cheeses 1, 4, and 7 was very apparent, and the annatto-colored cheeses appeared too orange in color and had a rubbery appearance. With the combination of annatto and titanium dioxide, the low-fat cheeses appeared to be closer to what is expected for Cheddar cheese. Although with the highest usage level of titanium dioxide and mid-range usage of annatto (i.e., cheese 6), the cheese appeared pale and more similar to process cheese rather than a natural Cheddar cheese.</span></p></section><section data-dcnode-id="3076" id="sec0105"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">Flavor</span></h4><div data-dcnode-id="3077"><p data-dcnode-id="3415" id="par0120"><span data-dcnode-id="3433" instrument_node="">As the only difference in the low-fat cheeses was the addition of color, they were expected to be similar in flavor. When evaluated by the descriptive panelists, this was the case for all flavor attributes except bitter (</span><a class="workspace-trigger" data-dcnode-id="3431" href="#tbl0035" name="btbl0035"><span data-dcnode-id="3432" instrument_node="">Table 7</span></a><span data-dcnode-id="3430" instrument_node="">). The order of predominance of flavor attributes was salty (3.4 to 4.7), sour (1.9 to 2.9), brothy (1.8 to 2.6), umami (1.4 to 1.8), milky (1.0 to 1.7), bitter (ND to 1.9), buttery (ND to 0.8), nutty (ND to 0.6), and sweet (ND to 0.6). The panelists also detected a slight burnt flavor in these cheeses that is common in low-fat cheeses. The lowest bitter attribute scores were for cheeses 3, 4, and 5 (bitter score</span><span data-dcnode-id="3429" instrument_node="">&nbsp;</span><span data-dcnode-id="3428" instrument_node="">=</span><span data-dcnode-id="3427" instrument_node="">&nbsp;</span><span data-dcnode-id="3426" instrument_node="">ND to 0.8), and these were significantly different (</span><em data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">P</span></em><span data-dcnode-id="3423" instrument_node="">&nbsp;</span><span data-dcnode-id="3422" instrument_node="">&lt;</span><span data-dcnode-id="3421" instrument_node="">&nbsp;</span><span data-dcnode-id="3420" instrument_node="">0.05) from cheeses 1, 2, 6, 7, and 9 (bitter score</span><span data-dcnode-id="3419" instrument_node="">&nbsp;</span><span data-dcnode-id="3418" instrument_node="">=</span><span data-dcnode-id="3417" instrument_node="">&nbsp;</span><span data-dcnode-id="3416" instrument_node="">1.5 to 1.9). No overall trend was apparent based on the level of annatto or level of titanium dioxide.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3078" id="tbl0035"><span class="captions" data-dcnode-id="3405"><span data-dcnode-id="3406"><p data-dcnode-id="3407" id="spar0050"><span class="label" data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">Table 7</span></span><span data-dcnode-id="3412" instrument_node="">. </span><span data-dcnode-id="3411" instrument_node="">Sensory flavor attributes for low-fat cheeses made using different levels of </span><a class="topic-link" data-dcnode-id="3409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/annatto" title="Learn more about annatto from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3410" instrument_node="">annatto</span></a><span data-dcnode-id="3408" instrument_node=""> and titanium dioxide colorants.</span></p></span></span><div class="groups" data-dcnode-id="3114"><table data-dcnode-id="3115"><thead class="valign-top" data-dcnode-id="3377"><tr data-dcnode-id="3397"><th class="rowsep-1 align-left valign-bottom" data-dcnode-id="3403" rowspan="2" scope="col"><span data-dcnode-id="3404" instrument_node="">Item</span></th><th class="rowsep-1 align-center" colspan="9" data-dcnode-id="3398" scope="col"><span data-dcnode-id="3402" instrument_node="">Attribute</span><a class="workspace-trigger" data-dcnode-id="3399" href="#tblfn0105" name="btblfn0105"><sup data-dcnode-id="3400"><span data-dcnode-id="3401" instrument_node="">1</span></sup></a></th></tr><tr data-dcnode-id="3378"><th class="rowsep-1 align-center" data-dcnode-id="3395" scope="col"><span data-dcnode-id="3396" instrument_node="">Milky</span></th><th class="rowsep-1 align-center" data-dcnode-id="3393" scope="col"><span data-dcnode-id="3394" instrument_node="">Buttery</span></th><th class="rowsep-1 align-center" data-dcnode-id="3391" scope="col"><span data-dcnode-id="3392" instrument_node="">Brothy</span></th><th class="rowsep-1 align-center" data-dcnode-id="3389" scope="col"><span data-dcnode-id="3390" instrument_node="">Nutty</span></th><th class="rowsep-1 align-center" data-dcnode-id="3387" scope="col"><span data-dcnode-id="3388" instrument_node="">Sweet</span></th><th class="rowsep-1 align-center" data-dcnode-id="3385" scope="col"><span data-dcnode-id="3386" instrument_node="">Sour</span></th><th class="rowsep-1 align-center" data-dcnode-id="3383" scope="col"><span data-dcnode-id="3384" instrument_node="">Salty</span></th><th class="rowsep- >P</span></em><span data-dcnode-id="3058" instrument_node="">&nbsp;</span><span data-dcnode-id="3057" instrument_node="">&lt;</span><span data-dcnode-id="3056" instrument_node="">&nbsp;</span><span data-dcnode-id="3055" instrument_node="">0.05) overall liking scores (5.9 and 5.6, respectively). A positive correlation (r</span><span data-dcnode-id="3054" instrument_node="">&nbsp;</span><span data-dcnode-id="3053" instrument_node="">=</span><span data-dcnode-id="3052" instrument_node="">&nbsp;</span><span data-dcnode-id="3051" instrument_node="">0.40, </span><em data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">P</span></em><span data-dcnode-id="3048" instrument_node="">&nbsp;</span><span data-dcnode-id="3047" instrument_node="">&lt;</span><span data-dcnode-id="3046" instrument_node="">&nbsp;</span><span data-dcnode-id="3045" instrument_node="">0.05) was observed between overall liking and color liking (data not shown).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="2661" id="tbl0040"><span class="captions" data-dcnode-id="3034"><span data-dcnode-id="3035"><p data-dcnode-id="3036" id="spar0055"><span class="label" data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">Table 8</span></span><span data-dcnode-id="3041" instrument_node="">. </span><span data-dcnode-id="3040" instrument_node="">Mean consumer overall and color liking and just-about-right (JAR) responses for cheese sharpness, flavor, and </span><a class="topic-link" data-dcnode-id="3038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/chewiness" title="Learn more about chewiness from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3039" instrument_node="">chewiness</span></a><span data-dcnode-id="3037" instrument_node=""> for low-fat cheeses with different color profiles.</span></p></span></span><div class="groups" data-dcnode-id="2718">< ="2791" instrument_node="">1.8</span><a class="workspace-trigger" data-dcnode-id="2788" href="#tblfn0120" name="btblfn0120"><sup data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">e</span></sup></a></td></tr><tr data-dcnode-id="2755"><td class="align-left" data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">8</span></td><td class="align-char" data-dcnode-id="2779"><span data-dcnode-id="2783" instrument_node="">6.7</span><a class="workspace-trigger" data-dcnode-id="2780" href="#tblfn0120" name="btblfn0120"><sup data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">a</span></sup></a></td><td class="align-char" data-dcnode-id="2771"><span data-dcnode-id="2778" instrument_node="">6.2</span><a class="workspace-trigger" data-dcnode-id="2775" href="#tblfn0120" name="btblfn0120"><sup data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">a</span></sup></a><a class="workspace-trigger" data-dcnode-id="2772" href="#tblfn0120" name="btblfn0120"><sup data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">b</span></sup></a></td><td class="align-char" data-dcnode-id="2766"><span data-dcnode-id="2770" instrument_node="">1.6</span><a class="workspace-trigger" data-dcnode-id="2767" href="#tblfn0120" name="btblfn0120"><sup data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">ef</span></sup></a></td><td class="align-char" data-dcnode-id="2761"><span data-dcnode-id="2765" instrument_node="">3.3</span><a class="workspace-trigger" data-dcnode-id="2762" href="#tblfn0120" name="btblfn0120"><sup data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">a</span></sup></a></td><td class="align-char" data-dcnode-id="2756"><span data-dcnode-id="2760" instrument_node="">1.9</span><a class="workspace-trigger" data-dcnode-id="2757" href="#tblfn0120" name="btblfn0120"><sup data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">de</span></sup></a></td></tr><tr data-dcnode-id="2721"><td class="align-left" data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">9</span></td><td class="align-char" data-dcnode-id="2745"><span data-dcnode-id="2752" instrument_node="">6.6</span><a class="workspace-trigger" data-dcnode-id="2749" href="#tblfn0120" name="btblfn0120"><sup data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">a</span></sup></a><a class="workspace-trigger" data-dcnode-id="2746" href="#tblfn0120" name="btblfn0120"><sup data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">b</span></sup></a></td><td class="align-char" data-dcnode-id="2740"><span data-dcnode-id="2744" instrument_node="">7.0</span><a class="workspace-trigger" data-dcnode-id="2741" href="#tblfn0120" name="btblfn0120"><sup data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">a</span></sup></a></td><td class="align-char" data-dcnode-id="2735"><span data-dcnode-id="2739" instrument_node="">1.9</span><a class="workspace-trigger" data-dcnode-id="2736" href="#tblfn0120" name="btblfn0120"><sup data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">cd</span></sup></a></td><td class="align-char" data-dcnode-id="2727"><span data-dcnode-id="2734" instrument_node="">2.3</span><a class="workspace-trigger" data-dcnode-id="2731" href="#tblfn0120" name="btblfn0120"><sup data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">a</span></sup></a><a class="workspace-trigger" data-dcnode-id="2728" href="#tblfn0120" name="btblfn0120"><sup data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">b</span></sup></a></td><td class="align-char" data-dcnode-id="2722"><span data-dcnode-id="2726" instrument_node="">3.5</span><a class="workspace-trigger" data-dcnode-id="2723" href="#tblfn0120" name="btblfn0120"><sup data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">a</span></sup></a></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="2662"><dt data-dcnode-id="2716" id="tblfn0120"><span data-dcnode-id="2717" instrument_node="">a–f</span></dt><dd data-dcnode-id="2709"><p data-dcnode-id="2710"><span data-dcnode-id="2715" instrument_node="">Means within the same column with the same letter were not significantly different (α</span><span data-dcnode-id="2714" instrument_node="">&nbsp;</span><span data-dcnode-id="2713" instrument_node="">=</span><span data-dcnode-id="2712" instrument_node="">&nbsp;</span><span data-dcnode-id="2711" instrument_node="">0.05).</span></p></dd><dt data-dcnode-id="2707" id="tblfn0125"><span data-dcnode-id="2708" instrument_node="">1</span></dt><dd data-dcnode-id="2701"><p data-dcnode-id="2702"><span data-dcnode-id="2706" instrument_node="">Cheeses are described in </span><a class="workspace-trigger" data-dcnode-id="2704" href="#tbl0005" name="btbl0005"><span data-dcnode-id="2705" instrument_node="">Table 1</span></a><span data-dcnode-id="2703" instrument_node="">.</span></p></dd><dt data-dcnode-id="2699" id="tblfn0130"><span data-dcnode-id="2700" instrument_node="">2</span></dt><dd data-dcnode-id="2680"><p data-dcnode-id="2681"><span data-dcnode-id="2694"><span data-dcnode-id="2698" instrument_node="">Evaluated using a 9-point </span><a class="topic-link" data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/hedonic-scales" title="Learn more about hedonic scale from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2697" instrument_node="">hedonic scale</span></a><span data-dcnode-id="2695" instrument_node="">, where 9</span></span><span data-dcnode-id="2693" instrument_node="">&nbsp;</span><span data-dcnode-id="2692" instrument_node="">=</span><span data-dcnode-id="2691" instrument_node="">&nbsp;</span><span data-dcnode-id="2690" instrument_node="">like extremely, 5</span><span data-dcnode-id="2689" instrument_node="">&nbsp;</span><span data-dcnode-id="2688" instrument_node="">=</span><span data-dcnode-id="2687" instrument_node="">&nbsp;</span><span data-dcnode-id="2686" instrument_node="">neither like nor dislike, and 1</span><span data-dcnode-id="2685" instrument_node="">&nbsp;</span><span data-dcnode-id="2684" instrument_node="">=</span><span data-dcnode-id="2683" instrument_node="">&nbsp;</span><span data-dcnode-id="2682" instrument_node="">dislike extremely.</span></p></dd><dt data-dcnode-id="2678" id="tblfn0135"><span data-dcnode-id="2679" instrument_node="">3</span></dt><dd data-dcnode-id="2663"><p data-dcnode-id="2664"><span data-dcnode-id="2677" instrument_node="">Evaluated using a 5-point JAR scale, where 1</span><span data-dcnode-id="2676" instrument_node="">&nbsp;</span><span data-dcnode-id="2675" instrument_node="">=</span><span data-dcnode-id="2674" instrument_node="">&nbsp;</span><span data-dcnode-id="2673" instrument_node="">not enough attribute, 3</span><span data-dcnode-id="2672" instrument_node="">&nbsp;</span><span data-dcnode-id="2671" instrument_node="">=</span><span data-dcnode-id="2670" instrument_node="">&nbsp;</span><span data-dcnode-id="2669" instrument_node="">just about right, and 5</span><span data-dcnode-id="2668" instrument_node="">&nbsp;</span><span data-dcnode-id="2667" instrument_node="">=</span><span data-dcnode-id="2666" instrument_node="">&nbsp;</span><span data-dcnode-id="2665" instrument_node="">too much attribute.</span></p></dd></dl></div></div><p data-dcnode-id="2652" id="par0130"><span data-dcnode-id="2659" instrument_node="">Cheese 5 (made using intermediate levels of both annatto and titanium dioxide) received the highest scores for both overall liking and color (7.0 and 7.2, respectively). Interestingly, this is a higher overall liking score than the 6.8 that was given to the full-fat cheese with the highest overall liking score (cheese A mild) and only slightly lower than the highest color-liking score (</span><a class="workspace-trigger" data-dcnode-id="2657" href="#tbl0025" name="btbl0025"><span data-dcnode-id="2658" instrument_node="">Table 5</span></a><span data-dcnode-id="2656" instrument_node="">). Low-fat cheeses 2, 3, 8, and 9 also had high overall liking scores, which were not significantly different from cheese 5. Similarly, cheeses 1, 3, 8, and 9 had high color-liking scores (</span><a class="workspace-trigger" data-dcnode-id="2654" href="#tbl0040" name="btbl0040"><span data-dcnode-id="2655" instrument_node="">Table 8</span></a><span data-dcnode-id="2653" instrument_node="">).</span></p><p data-dcnode-id="2611" id="par0135"><span data-dcnode-id="2651" instrument_node="">Using the attributes diagnostic test, significant differences were found among the low-fat cheeses for sharpness (</span><em data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">P</span></em><span data-dcnode-id="2648" instrument_node="">&nbsp;</span><span data-dcnode-id="2647" instrument_node="">=</span><span data-dcnode-id="2646" instrument_node="">&nbsp;</span><span data-dcnode-id="2645" instrument_node="">0.044), flavor (</span><em data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">P</span></em><span data-dcnode-id="2642" instrument_node="">&nbsp;</span><span data-dcnode-id="2641" instrument_node="">=</span><span data-dcnode-id="2640" instrument_node="">&nbsp;</span><span data-dcnode-id="2639" instrument_node="">0.023), and chewiness (</span><em data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">P</span></em><span data-dcnode-id="2636" instrument_node="">&nbsp;</span><span data-dcnode-id="2635" instrument_node="">=</span><span data-dcnode-id="2634" instrument_node="">&nbsp;</span><span data-dcnode-id="2633" instrument_node="">0.003). When considering the low-fat cheeses using the JAR scale, cheeses made with the intermediate level of titanium dioxide (cheeses 2, 5, and 8) were the closest to being JAR for flavor, with scores of 3.1, 3.1, and 3.3, respectively (</span><a class="workspace-trigger" data-dcnode-id="2631" href="#tbl0040" name="btbl0040"><span data-dcnode-id="2632" instrument_node="">Table 8</span></a><span data-dcnode-id="2630" instrument_node="">). Cheeses 3 and 9 were scored as being slightly not enough flavor (2.1 and 2.3, respectively), although these were not significant from cheeses 2, 5, and 8 at α</span><span data-dcnode-id="2629" instrument_node="">&nbsp;</span><span data-dcnode-id="2628" instrument_node="">=</span><span data-dcnode-id="2627" instrument_node="">&nbsp;</span><span data-dcnode-id="2626" instrument_node="">0.05. The cheese with the lowest JAR flavor score of 1.4 was cheese 7, which corresponds to having the lowest overall liking score. Interestingly, cheese 7 had a JAR sharpness score of 2.8, whereas all of the other cheeses had lower scores. Most of the cheeses were considered JAR for chewiness (scores</span><span data-dcnode-id="2625" instrument_node="">&nbsp;</span><span data-dcnode-id="2624" instrument_node="">=</span><span data-dcnode-id="2623" instrument_node="">&nbsp;</span><span data-dcnode-id="2622" instrument_node="">2.8 to 3.3), whereas cheese 7 and 8 were considered not chewy enough (scores</span><span data-dcnode-id="2621" instrument_node="">&nbsp;</span><span data-dcnode-id="2620" instrument_node="">=</span><span data-dcnode-id="2619" instrument_node="">&nbsp;</span><span data-dcnode-id="2618" instrument_node="">1.8 and 1.9, respectively). Cheese 9 had the most chewiness (</span><em data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">P</span></em><span data-dcnode-id="2615" instrument_node="">&nbsp;</span><span data-dcnode-id="2614" instrument_node="">&lt;</span><span data-dcnode-id="2613" instrument_node="">&nbsp;</span><span data-dcnode-id="2612" instrument_node="">0.05) with a JAR score of 3.5.</span></p></section></section></section><section data-dcnode-id="2509" id="sec0115"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">Discussion</span></h2><section data-dcnode-id="2522" id="sec0120"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Cheese Color</span></h3><p data-dcnode-id="2593" id="par0140"><span data-dcnode-id="2603" instrument_node="">Flavor and texture are well-known issues for low-fat cheeses (</span><a class="workspace-trigger" data-dcnode-id="2601" href="#bib0050" name="bbib0050"><span data-dcnode-id="2602" instrument_node="">Drake and Swanson, 1995</span></a><span data-dcnode-id="2600" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="2598" href="#bib0095" name="bbib0095"><span data-dcnode-id="2599" instrument_node="">Johnson et al., 2010</span></a><span data-dcnode-id="2597" instrument_node="">) and consumers are unwilling to sacrifice the flavor or texture qualities of cheese for the sake of purchasing a cheese with reduced fat content (</span><a class="workspace-trigger" data-dcnode-id="2595" href="#bib0010" name="bbib0010"><span data-dcnode-id="2596" instrument_node="">Childs and Drake, 2009</span></a><span data-dcnode-id="2594" instrument_node="">). From our study, it is apparent that the color of lower-fat cheeses is also important and even affects the consumer perception of flavor. Low-fat cheeses that were translucent (cheeses 1, 4, and 7) were considered unappealing, with the lowest JAR flavor scores (even though their flavors were essentially identical).</span></p><p data-dcnode-id="2581" id="par0145"><span data-dcnode-id="2592" instrument_node="">This translucency comes about because of the lack of light scattering centers in cheese when fat is removed and when the cheese chemistry is adjusted so that the cheese does not become too rubbery (</span><a class="workspace-trigger" data-dcnode-id="2590" href="#bib0135" name="bbib0135"><span data-dcnode-id="2591" instrument_node="">Pastorino et al., 2002</span></a><span data-dcnode-id="2589" instrument_node="">). Consumers have probably come to expect such translucency in cheeses with very low fat content (from their observations of what is available in the retail market) and just like with fluid milk, the perception of fat level (from 0 to 4%) is inversely related to transparency (</span><a class="workspace-trigger" data-dcnode-id="2587" href="#bib0150" name="bbib0150"><span data-dcnode-id="2588" instrument_node="">Phillips et al., 1995</span></a><span data-dcnode-id="2582"><span data-dcnode-id="2586" instrument_node="">). When high levels of </span><a class="topic-link" data-dcnode-id="2584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/annatto" title="Learn more about annatto from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2585" instrument_node="">annatto</span></a><span data-dcnode-id="2583" instrument_node=""> are used in making low-fat cheese so as to impart the typical yellow-orange color, the translucency of the cheese results in a dark orange color that makes the cheese appear very different from full-fat cheese. Such cheeses are not liked by consumers, as shown by cheese 7 receiving the lowest scores for JAR flavor as well as color and overall liking.</span></span></p><p data-dcnode-id="2569" id="par0150"><span data-dcnode-id="2576"><span data-dcnode-id="2580" instrument_node="">In this study, it was apparent that consumers prefer some opaqueness of cheese no matter if the cheese is uncolored or colored with annatto. Cheeses 2 (no annatto) and 5 and 8 (intermediate and high annatto levels) were those considered to be closest to JAR for flavor, with scores of 3.1, 3.1, and 3.3, respectively. This opacity was achieved by addition of titanium dioxide during </span><a class="topic-link" data-dcnode-id="2578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/cheese-making-technology" title="Learn more about cheesemaking from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2579" instrument_node="">cheesemaking</span></a><span data-dcnode-id="2577" instrument_node="">, and for many years, titanium dioxide was used only in non-food applications such as in solar cells, as white pigment in paints and coating, in ceramics, and in electric devices (</span></span><a class="workspace-trigger" data-dcnode-id="2574" href="#bib0035" name="bbib0035"><span data-dcnode-id="2575" instrument_node="">Diebold, 2003</span></a><span data-dcnode-id="2573" instrument_node="">). Its use in the US food industry has increased since it was approved in 1966 for food-contact applications and as a food coloring [21 Code of Federal Regulations (CFR) 73.575; </span><a class="workspace-trigger" data-dcnode-id="2571" href="#bib0145" name="bbib0145"><span data-dcnode-id="2572" instrument_node="">Phillips and Barbano, 1997</span></a><span data-dcnode-id="2570" instrument_node="">].</span></p><p data-dcnode-id="2554" id="par0155"><span data-dcnode-id="2568" instrument_node="">The 3 low-fat cheeses that did not have any added annatto (cheeses 1, 2, and 3) were slightly liked to moderately liked with scores of 5.9, 6.7, and 6.5, respectively. Even though cheese 1 had similar translucency as cheese 7, it was apparently not considered undesirable, as shown by its color liking score of 6.2. Providing the desired opacity to the cheese (cheese 2) increased its overall liking (</span><em data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">P</span></em><span data-dcnode-id="2565" instrument_node="">&nbsp;</span><span data-dcnode-id="2564" instrument_node="">&lt;</span><span data-dcnode-id="2563" instrument_node="">&nbsp;</span><span data-dcnode-id="2562" instrument_node="">0.05) and its flavor perception to being JAR (</span><a class="workspace-trigger" data-dcnode-id="2560" href="#tbl0040" name="btbl0040"><span data-dcnode-id="2561" instrument_node="">Table 8</span></a><span data-dcnode-id="2555"><span data-dcnode-id="2559" instrument_node="">). As the extent of whiteness was further increased (cheese 3), the flavor perception tended to be lower and the cheese was considered as having slightly not enough flavor. We speculate this may be a result of cheese 2 and 3 looking like Feta and low-moisture, part-skim </span><a class="topic-link" data-dcnode-id="2557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/mozzarella-cheese" title="Learn more about Mozzarella cheese from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2558" instrument_node="">Mozzarella cheese</span></a><span data-dcnode-id="2556" instrument_node="">, respectively, and their having mild and strong flavors, respectively. Some consumer panelists did comment that cheese 3 looked like Mozzarella cheese, and we observed that L*, a*, and b* values for cheeses 2 and 3 were very similar to those of Feta and low-moisture, part-skim Mozzarella cheese (data not shown).</span></span></p><p data-dcnode-id="2523" id="par0160"><span data-dcnode-id="2545"><span data-dcnode-id="2549"><span data-dcnode-id="2553" instrument_node="">We had speculated that it may be the bitter attribute of cheese that was causing the difference in consumer perception of flavor and sharpness. However, no consistent trend between cheese bitterness and overall liking scores was apparent. Bitterness in cheese can be caused by accumulation of proline-containing peptides released from the caseins and degradation of these peptides requires the presence of proline-specific </span><a class="topic-link" data-dcnode-id="2551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/peptidases" title="Learn more about peptidases from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2552" instrument_node="">peptidases</span></a><span data-dcnode-id="2550" instrument_node=""> such as post-proline dipeptidyl </span></span><a class="topic-link" data-dcnode-id="2547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/aminopeptidases" title="Learn more about aminopeptidases from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2548" instrument_node="">aminopeptidases</span></a><span data-dcnode-id="2546" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="2543" href="#bib0080" name="bbib0080"><span data-dcnode-id="2544" instrument_node="">Guinee and Kilcawley, 2004</span></a><span data-dcnode-id="2538"><span data-dcnode-id="2542" instrument_node="">). It has recently been observed that titanium dioxide under UV light illumination can catalyze peptide cleavage adjacent to </span><a class="topic-link" data-dcnode-id="2540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/proline" title="Learn more about proline from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2541" instrument_node="">proline</span></a><span data-dcnode-id="2539" instrument_node=""> residues (</span></span><a class="workspace-trigger" data-dcnode-id="2536" href="#bib0100" name="bbib0100"><span data-dcnode-id="2537" instrument_node="">Jones et al., 2007</span></a><span data-dcnode-id="2535" instrument_node="">). The presence of titanium dioxide in low-fat cheese perhaps increases cleavage of such proline-containing peptides with consequently less accumulation of bitter peptides during storage of the cheese. This could explain the significantly lower bitterness in cheese 3 (score</span><span data-dcnode-id="2534" instrument_node="">&nbsp;</span><span data-dcnode-id="2533" instrument_node="">=</span><span data-dcnode-id="2532" instrument_node="">&nbsp;</span><span data-dcnode-id="2531" instrument_node="">0.44) compared with cheese 1 and 2 (score</span><span data-dcnode-id="2530" instrument_node="">&nbsp;</span><span data-dcnode-id="2529" instrument_node="">=</span><span data-dcnode-id="2528" instrument_node="">&nbsp;</span><span data-dcnode-id="2527" instrument_node="">1.50 and 1.69, respectively; </span><a class="workspace-trigger" data-dcnode-id="2525" href="#tbl0035" name="btbl0035"><span data-dcnode-id="2526" instrument_node="">Table 7</span></a><span data-dcnode-id="2524" instrument_node="">). However, the same trend was not observed for cheeses containing both titanium dioxide and annatto.</span></p></section><section data-dcnode-id="2510" id="sec0125"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Cheese Flavor</span></h3><p data-dcnode-id="2511" id="par0165"><span data-dcnode-id="2515"><span data-dcnode-id="2519" instrument_node="">The low-fat cheeses were mild in flavor, as they had only been aged for 2 mo at the time of sensory testing and, based on informal evaluation, lacked </span><a class="topic-link" data-dcnode-id="2517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/cheddar-cheese" title="Learn more about Cheddar cheese from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2518" instrument_node="">Cheddar cheese</span></a><span data-dcnode-id="2516" instrument_node=""> flavor and had uncharacteristic brothy and burnt flavors. In comparison to the full-fat cheeses, whose flavor scores for umami and nutty increased with sharpness level (</span></span><a class="workspace-trigger" data-dcnode-id="2513" href="#tbl0025" name="btbl0025"><span data-dcnode-id="2514" instrument_node="">Table 5</span></a><span data-dcnode-id="2512" instrument_node="">), the low-fat cheeses had scores that would place them in the mild-to-medium category. However, sharpness perception was different among the 9 cheeses. Cheese 7 was considered sharp, presumably because of its dark color, whereas cheeses 3, 5, and 8 were considered the mildest, presumably because of their whitish appearance. Clearly, consumer liking and perception of flavor of low-fat cheese is influenced by cheese color and so color of low-fat cheese should not be neglected when considering consumer preference and acceptance.</span></p></section></section><section data-dcnode-id="2488" id="sec0130"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Conclusions</span></h2><p data-dcnode-id="2489" id="par0170"><span data-dcnode-id="2502"><span data-dcnode-id="2506" instrument_node="">The overall liking of low-fat cheeses is highly dependent on its color and appearance. We observed that using different levels and combinations of </span><a class="topic-link" data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/annatto" title="Learn more about annatto from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2505" instrument_node="">annatto</span></a><span data-dcnode-id="2503" instrument_node=""> and titanium dioxide in low-fat cheeses directly affected consumer overall liking for these cheeses, and even influenced flavor and sharpness perception. Low-fat cheese colored with annatto (at levels similar to that used in full-fat Cheddar cheese) has an atypical translucent, dark orange color that is not well accepted by consumers and received the lowest overall liking score. Adding titanium dioxide increases cheese opacity so it looks more like full-fat cheese. If too much titanium dioxide is added, the low-fat cheese becomes too white in appearance and consumer liking decreases. In our study, low-fat cheese made with an intermediate level of both annatto and titanium dioxide scored the highest on overall liking with a score of 7.0 (on a 9-point hedonic scale), whereas cheese with the higher level of annatto and no titanium dioxide scored the lowest (overall liking</span></span><span data-dcnode-id="2501" instrument_node="">&nbsp;</span><span data-dcnode-id="2500" instrument_node="">=</span><span data-dcnode-id="2499" instrument_node="">&nbsp;</span><span data-dcnode-id="2498" instrument_node="">4.3), presumably because of its undesirably dark orange color and translucent appearance. This difference in appearance also influenced flavor perception. Although the 2 cheeses had the same flavor attributes (as evaluated by a trained sensory descriptive panel), the intermediate cheese was rated as JAR for flavor (JAR score</span><span data-dcnode-id="2497" instrument_node="">&nbsp;</span><span data-dcnode-id="2496" instrument_node="">=</span><span data-dcnode-id="2495" instrument_node="">&nbsp;</span><span data-dcnode-id="2494" instrument_node="">3.1), whereas the dark orange cheese was rated as having not enough flavor. (JAR score</span><span data-dcnode-id="2493" instrument_node="">&nbsp;</span><span data-dcnode-id="2492" instrument_node="">=</span><span data-dcnode-id="2491" instrument_node="">&nbsp;</span><span data-dcnode-id="2490" instrument_node="">1.4). Adding a low level of titanium dioxide to low-fat cheese made with either no annatto or high levels of annatto also resulted in high overall liking scores (6.7 for both) and JAR scores close to consumer expectations for flavor (3.1 and 3.3, respectively). This study demonstrates that for the manufacture of low-fat cheeses that will have good consumer acceptability, having the right level and combination of colorants is important. The low-fat cheeses made with optimum color were liked by the consumers as much as the full-fat mild and medium cheeses (mean overall liking scores of 6.5 to 7.0 compared with 6.1 to 6.8, respectively).</span></p></section></div><section data-dcnode-id="2476" id="aep-acknowledgment-id9"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Acknowledgments</span></h2><p data-dcnode-id="2477" id="par0175"><span data-dcnode-id="2484" instrument_node="">This research was conducted as part of the cheese applications program of the Western Dairy Center with funding provided by </span><span data-dcnode-id="2482" id="gs0005"><span data-dcnode-id="2483" instrument_node="">Dairy Management Inc.</span></span><span data-dcnode-id="2481" instrument_node="">, as administered by the Dairy Research Institute (Rosemont, IL). The authors thank David Irish, Curtis Maughan and Silvana Martini, and Xin Dai (all at Utah State University, Logan) for technical support in cheesemaking, sensory analysis, and statistical analysis, respectively. This research was supported by the </span><span data-dcnode-id="2479" id="gs0010"><span data-dcnode-id="2480" instrument_node="">Utah Agricultural Experiment Station, Utah State University</span></span><span data-dcnode-id="2478" instrument_node=""> and approved as paper no. 8378.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="2471"><button class="button button-anchor" data-dcnode-id="2472" type="button"><span class="button-text" data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="2470"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="408" id="bibl0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="409" id="bibs0005"><dl class="references" data-dcnode-id="410" id="reference-links-bibs0005"><dt class="label" data-dcnode-id="2465"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id= <span data-dcnode-id="2412" instrument_node="">-</span><span data-dcnode-id="2410" instrument_node="">3284</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="2405"><span data-dcnode-id="2408" instrument_node=""></span><a class="link" data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DEnhanced%2520nutty%2520flavor%2520formation%2520in%2520Cheddar%2520cheese%2520made%2520with%2520a%2520malty%2520Lactococcus%2520lactis%2520adjunct%2520culture%26publication_year%3D2006%26author%3DM.E.%2520Carunchia%2520Whetstine%26author%3DM.A.%2520Drake%26author%3DJ.R.%2520Broadbent%26author%3DD.J.%2520McMahon" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2407" instrument_node="">Google Scholar</span></a></div></dd><dt class="label" data-dcnode-id="2401"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="2402" href="#bbib0010" id="ref-id-bib0010"><span data-dcnode-id="2403" instrument_node="">Childs and Drake, 2009</span></a></dt><dd class="reference" data-dcnode-id="2352"><div class="contribution" data-dcnode-id="2384"><span data-dcnode-id="2400" instrument_node="">J.L.</span><span data-dcnode-id="2398" instrument_node=""> </span><span data-dcnode-id="2396" instrument_node="">Childs</span><span data-dcnode-id="2394" instrument_node="">, </span><span data-dcnode-id="2392" instrument_node="">M.A.</span><span data-dcnode-id="2390" instrument_node=""> </span><span data-dcnode-id="2388" instrument_node="">Drake</span><div data-dcnode-id="2385"><strong class="title" data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Consumer perception of fat reduction in cheese</span></strong></div></div><div class="host" data-dcnode-id="2364"><span data-dcnode-id="2383" instrument_node="">J. Sens. Stud.</span><span data-dcnode-id="2381" instrument_node="">, </span><span data-dcnode-id="2379" instrumen
