</span><meta content="The present study examines the effect of color on low-fat cheese flavor perception and consumer acceptability. To understand the flavor preferences of…" data-dcnode-id="6834" property="og:description"><span data-dcnode-id="6833" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id6&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id7&quot;><p id=&quot;spar0005&quot;>The present study examines the effect of color on low-fat cheese flavor perception and consumer acceptability. To understand the flavor preferences of the consumer population participating in the sensory testing, 4 brands of retail full-fat Cheddar cheeses labeled as mild, medium, or sharp were obtained. These cheeses were evaluated by a trained descriptive panel to generate a flavor profile for each cheese and then by consumer sensory panels. Overall and color liking were measured using a 9-point hedonic scale, and flavor, chewiness, level of sharpness measured using a 5-point just-about-right (JAR) scale (with 1 being not enough, 3 being just about right, and 5 being too much of the attribute). Subsequently, 9 low-fat Cheddar cheeses were manufactured using 3 levels of annatto (0, 7.34, and 22&nbsp;g/100&nbsp;kg) and 3 levels of titanium dioxide (0, 7.67, and 40&nbsp;g/100&nbsp;kg) using a randomized block design in duplicate. Cheeses were then evaluated by descriptive and consumer sensory panels. Each consumer testing consisted of 120 panelists who were mainly 18 to 35 yr of age (&amp;gt;90% of total populace) with &amp;gt;60% being frequent cheese consumers. Overall liking preference of the consumer group was for mild to medium cheese. Using the JAR scale, the medium cheeses were considered closest to JAR with a mean score of 3.0, compared with 2.4 for mild cheese and 3.6 for sharp cheese. Among low-fat cheeses, color was shown to be important with consumer liking being negatively influenced when the cheese appearance was too translucent (especially when normal levels of annatto were used) or too white. Matching the level of titanium dioxide with the annatto level gave the highest liking scores and flavor perception closest to JAR. This study established a significant effect of color on overall liking of low-fat versions of Cheddar cheese.</p></div></div></div>" data-dcnode-id="6832" lang="en" name="citation_abstract"><span data-dcnode-id="6831" instrument_node="">

e-id="6350"><span data-dcnode-id="6362"><span data-dcnode-id="6366"><span data-dcnode-id="6370" instrument_node="">The present study examines the effect of color on low-fat cheese flavor perception and consumer acceptability. To understand the flavor preferences of the consumer population participating in the sensory testing, 4 brands of retail full-fat </span><a class="topic-link" data-dcnode-id="6368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/cheddar-cheese" title="Learn more about Cheddar cheeses from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6369" instrument_node="">Cheddar cheeses</span></a><span data-dcnode-id="6367" instrument_node=""> labeled as mild, medium, or sharp were obtained. These cheeses were evaluated by a trained descriptive panel to generate a flavor profile for each cheese and then by consumer </span></span><a class="topic-link" data-dcnode-id="6364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/sensory-panel" title="Learn more about sensory panels from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6365" instrument_node="">sensory panels</span></a><span data-dcnode-id="6363" instrument_node="">. Overall and color liking were measured using a 9-point </span></span><a class="topic-link" data-dcnode-id="6360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/hedonic-scales" title="Learn more about hedonic scale from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6361" instrument_node="">hedonic scale</span></a><span data-dcnode-id="6351"><span data-dcnode-id="6359" instrument_node="">, and flavor, </span><a class="topic-link" data-dcnode-id="6357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/chewiness" title="Learn more about chewiness from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6358" instrument_node="">chewiness</span></a><span data-dcnode-id="6352"><span data-dcnode-id="6356" instrument_node="">, level of sharpness measured using a 5-point just-about-right (JAR) scale (with 1 being not enough, 3 being just about right, and 5 being too much of the attribute). Subsequently, 9 low-fat Cheddar cheeses were manufactured using 3 levels of </span><a class="topic-link" data-dcnode-id="6354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/annatto" title="Learn more about annatto from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6355" instrument_node="">annatto</span></a><span data-dcnode-id="6353" instrument_node=""> (0, 7.34, and 22</span></span></span></span><span data-dcnode-id="6349" instrument_node="">&nbsp;</span><span data-dcnode-id="6347" instrument_node="">g/100</span><span data-dcnode-id="6345" instrument_node="">&nbsp;</span><span data-dcnode-id="6343" instrument_node="">kg) and 3 levels of titanium dioxide (0, 7.67, and 40</span><span data-dcnode-id="6341" instrument_node="">&nbsp;</span><span data-dcnode-id="6339" instrument_node="">g/100</span><span data-dcnode-id="6337" instrument_node="">&nbsp;</span><span data-dcnode-id="6335" instrument_node="">kg) using a randomized block design in duplicate. Cheeses were then evaluated by descriptive and consumer sensory panels. Each consumer testing consisted of 120 panelists who were mainly 18 to 35 yr of age (&gt;90% of total populace) with &gt;60% being frequent cheese consumers. Overall liking preference of the consumer group was for mild to medium cheese. Using the JAR scale, the medium cheeses were considered closest to JAR with a mean score of 3.0, compared with 2.4 for mild cheese and 3.6 for sharp cheese. Among low-fat cheeses, color was shown to be important with consumer liking being negatively influenced when the cheese appearance was too translucent (especially when normal levels of annatto were used) or too white. Matching the level of titanium dioxide with the annatto level gave the highest liking scores and flavor perception closest to JAR. This study established a significant effect of color on overall liking of low-fat versions of Cheddar cheese.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="6308" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="6320"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="6321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0022030212002007"><svg class="icon icon-navigate-left" data-dcnode-id="6329" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="6330"></path></svg><span class="button-alternative-text" data-dcnode-id="6322"><strong data-dcnode-id="6327"><span data-dcnode-id="6328" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="6325"><span data-dcnode-id="6326" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="6323"><span data-dcnode-id="6324" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="6309"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="6310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0022030212002020"><span class="button-alternative-text" data-dcnode-id="6313"><strong data-dcnode-id="6318"><span data-dcnode-id="6319" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="6316"><span data-dcnode-id="6317" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="6314"><span data-dcnode-id="6315" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="6311" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="6312"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="6292"><div class="keywords-section" data-dcnode-id="6293" id="aep-keywords-id8"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6306"><span data-dcnode-id="6307" instrument_node="">Key words</span></h2><div class="keyword" data-dcnode-id="6303"><span data-dcnode-id="6304"><span data-dcnode-id="6305" instrument_node="">cheese</span></span></div><div class="keyword" data-dcnode-id="6300"><span data-dcnode-id="6301"><span data-dcnode-id="6302" instrument_node="">opacity</span></span></div><div class="keyword" data-dcnode-id="6297"><span data-dcnode-id="6298"><span data-dcnode-id="6299" instrument_node="">color</span></span></div><div class="keyword" data-dcnode-id="6294"><span data-dcnode-id="6295"><span data-dcnode-id="6296" instrument_node="">flavor</span></span></div></div></div><span data-dcnode-id="6291" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="2475" id="body"><div data-dcnode-id="2487"><section data-dcnode-id="6191" id="sec0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6289"><span data-dcnode-id="6290" instrument_node="">Introduction</span></h2><p data-dcnode-id="6268" id="par0005"><span data-dcnode-id="6288" instrument_node="">The color of food is an often overlooked sensory attribute that can actually change consumers’ flavor perception. In case of cheese, flavor is an important attribute that affects consumer acceptance and marketing (</span><a class="workspace-trigger" data-dcnode-id="6286" href="#bib0195" name="bbib0195"><span data-dcnode-id="6287" instrument_node="">Young et al., 2004</span></a><span data-dcnode-id="6285" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6283" href="#bib0190" name="bbib0190"><span data-dcnode-id="6284" instrument_node="">Yates and Drake, 2007</span></a><span data-dcnode-id="6282" instrument_node="">). When likeable flavor notes are missing in low-fat cheeses, such as buttery, nutty, and milky attributes, the attention of consumers can be drawn to the cheese color and, thus, become a detriment to sales if the cheese color is outside the norm for cheese. Removing fat from cheese is known to impart a translucent appearance (</span><a class="workspace-trigger" data-dcnode-id="6280" href="#bib0120" name="bbib0120"><span data-dcnode-id="6281" instrument_node="">Merrill et al., 1994</span></a><span data-dcnode-id="6279" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6277" href="#bib0140" name="bbib0140"><span data-dcnode-id="6278" instrument_node="">Paulson et al., 1998</span></a><span data-dcnode-id="6272"><span data-dcnode-id="6276" instrument_node="">) and an increased intensity of color when </span><a class="topic-link" data-dcnode-id="6274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/annatto" title="Learn more about annatto from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6275" instrument_node="">annatto</span></a><span data-dcnode-id="6273" instrument_node=""> is added (</span></span><a class="workspace-trigger" data-dcnode-id="6270" href="#bib0175" name="bbib0175"><span data-dcnode-id="6271" instrument_node="">Sipahioglu, et al., 1999</span></a><span data-dcnode-id="6269" instrument_node="">). However, little information exists about choosing the amount of colorant to use and the effect of the color of cheese on consumer preference and buying decisions.</span></p><p data-dcnode-id="6242" id="par0010"><span data-dcnode-id="6263"><span data-dcnode-id="6267" instrument_node="">In general, coloring has been used in commercial food production to maintain the uniformity of products, and to enhance consumer appeal for the product. Some government agencies have color specifications for foods they purchase, such as for shredded </span><a class="topic-link" data-dcnode-id="6265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/cheddar-cheese" title="Learn more about Cheddar cheese from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6266" instrument_node="">Cheddar cheese</span></a><span data-dcnode-id="6264" instrument_node=""> in the United States: “if it is colored it needs to be medium yellow-orange with a uniform bright color, and an attractive sheen” (</span></span><a class="workspace-trigger" data-dcnode-id="6261" href="#bib0180" name="bbib0180"><span data-dcnode-id="6262" instrument_node="">USDA, 2001</span></a><span data-dcnode-id="6260" instrument_node="">). Likewise, for mandatory price reporting of cheese sales by manufacturers, the color of 40-lb blocks are required to be within the range of 6 to 8 on the National Cheese Institute (</span><strong data-dcnode-id="6258"><span data-dcnode-id="6259" instrument_node="">NCI</span></strong><span data-dcnode-id="6257" instrument_node="">) color chart (</span><a class="workspace-trigger" data-dcnode-id="6255" href="#bib0185" name="bbib0185"><span data-dcnode-id="6256" instrument_node="">USDA, 2011</span></a><span data-dcnode-id="6254" instrument_node="">). Adding color to cheese helps maintain a uniform color irrespective of whether the animals producing the milk are fed green pasture or a TMR of dried feedstuffs. In the United States, annatto extract is the permitted colorant for adding to cheese and is considered as being exempt from certification and is informally considered to be a natural color (</span><a class="workspace-trigger" data-dcnode-id="6252" href="#bib0070" name="bbib0070"><span data-dcnode-id="6253" instrument_node="">FDA, 2011</span></a><span data-dcnode-id="6243"><span data-dcnode-id="6247"><span data-dcnode-id="6251" instrument_node="">). It imparts a yellowish-orange color from its </span><a class="topic-link" data-dcnode-id="6249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/carotenoid" title="Learn more about carotenoid from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6250" instrument_node="">carotenoid</span></a><span data-dcnode-id="6248" instrument_node=""> components, </span></span><a class="topic-link" data-dcnode-id="6245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/bixin" title="Learn more about bixin from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6246" instrument_node="">bixin</span></a><span data-dcnode-id="6244" instrument_node=""> and norbixin.</span></span></p><p data-dcnode-id="6217" id="par0015"><span data-dcnode-id="6241" instrument_node="">It is important for food manufacturers to have the expected color in their food products because consumers associate certain colors with certain flavors. Color and appearance of food create expectations that affect what we feel and behave (</span><a class="workspace-trigger" data-dcnode-id="6239" href="#bib0090" name="bbib0090"><span data-dcnode-id="6240" instrument_node="">Hutchings, 2003</span></a><span data-dcnode-id="6238" instrument_node="">) and influences food identification (</span><a class="workspace-trigger" data-dcnode-id="6236" href="#bib0030" name="bbib0030"><span data-dcnode-id="6237" instrument_node="">Delwiche, 2004</span></a><span data-dcnode-id="6235" instrument_node="">). Judgments created on the basis of color can influence buying decisions and also carry over to cooking and eating decisions. Consequently, when food colors are different from the expected norm, flavor identification is decreased, the color-flavor association becomes stronger, and color has a greater effect on liking of the food (</span><a class="workspace-trigger" data-dcnode-id="6233" href="#bib0160" name="bbib0160"><span data-dcnode-id="6234" instrument_node="">Roth et al., 1988</span></a><span data-dcnode-id="6232" instrument_node="">). This occurs in simple foods and in complex foods in which there are multiple taste stimuli (</span><a class="workspace-trigger" data-dcnode-id="6230" href="#bib0130" name="bbib0130"><span data-dcnode-id="6231" instrument_node="">Pangborn et al., 1963</span></a><span data-dcnode-id="6221"><span data-dcnode-id="6225"><span data-dcnode-id="6229" instrument_node="">). For example, when </span><a class="topic-link" data-dcnode-id="6227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/white-wines" title="Learn more about white wine from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6228" instrument_node="">white wine</span></a><span data-dcnode-id="6226" instrument_node=""> is colored red, the tendency is to describe the wine using </span></span><a class="topic-link" data-dcnode-id="6223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/red-wines" title="Learn more about red wine from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6224" instrument_node="">red wine</span></a><span data-dcnode-id="6222" instrument_node=""> odor terms instead of the white wine odor terms that are instinctively used in uncolored wine (</span></span><a class="workspace-trigger" data-dcnode-id="6219" href="#bib0125" name="bbib0125"><span data-dcnode-id="6220" instrument_node="">Morrot et al., 2001</span></a><span data-dcnode-id="6218" instrument_node="">). However, to our knowledge no similar testing has been done on how cheese flavor is influenced by color.</span></p><p data-dcnode-id="6197" id="par0020"><span data-dcnode-id="6216" instrument_node="">Initial perception of foods occurs within the first 90</span><span data-dcnode-id="6215" instrument_node="">&nbsp;</span><span data-dcnode-id="6214" instrument_node="">s of observation, and approximately 60 to 90% of the assessment is based on color (</span><a class="workspace-trigger" data-dcnode-id="6212" href="#bib0170" name="bbib0170"><span data-dcnode-id="6213" instrument_node="">Singh, 2006</span></a><span data-dcnode-id="6211" instrument_node="">). The color of cheese can be used for differentiating products from competitors, but it is important to be aware that consumer attitude can also be influenced by color (</span><a class="workspace-trigger" data-dcnode-id="6209" href="#bib0170" name="bbib0170"><span data-dcnode-id="6210" instrument_node="">Singh, 2006</span></a><span data-dcnode-id="6208" instrument_node="">). If cheese color is unacceptable, the other 2 important factors for consumer liking, flavor and texture of the cheese, are unlikely to be judged at all (</span><a class="workspace-trigger" data-dcnode-id="6206" href="#bib0075" name="bbib0075"><span data-dcnode-id="6207" instrument_node="">Francis, 1995</span></a><span data-dcnode-id="6201"><span data-dcnode-id="6205" instrument_node="">). This influence of color on </span><a class="topic-link" data-dcnode-id="6203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/food-acceptability" title="Learn more about food acceptability from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6204" instrument_node="">food acceptability</span></a><span data-dcnode-id="6202" instrument_node="">, choice, and preference comes more from learned associations than any inherent psychophysical characteristic (</span></span><a class="workspace-trigger" data-dcnode-id="6199" href="#bib0015" name="bbib0015"><span data-dcnode-id="6200" instrument_node="">Clydesdale, 1993</span></a><span data-dcnode-id="6198" instrument_node="">).</span></p><p data-dcnode-id="6192" id="par0025"><span data-dcnode-id="6196" instrument_node="">The aim of this study was to determine how the translucent appearance (color) of low-fat Cheddar cheese affects consumer acceptability and if increasing cheese opacity alters flavor perception. Different levels of annatto and titanium dioxide colorants were used to make low-fat cheese. Some mild, medium, and sharp full-fat Cheddar cheeses were used to establish the flavor preferences of the pool of consumers who performed </span><a class="topic-link" data-dcnode-id="6194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/sensory-evaluation" title="Learn more about sensory evaluation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6195" instrument_node="">sensory evaluation</span></a><span data-dcnode-id="6193" instrument_node=""> of the low-fat cheeses.</span></p></section><section data-dcnode-id="5837" id="sec0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6189"><span data-dcnode-id="6190" instrument_node="">Materials and Methods</span></h2><section data-dcnode-id="6156" id="sec0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6187"><span data-dcnode-id="6188" instrument_node="">Full-Fat Cheese</span></h3><p data-dcnode-id="6157" id="par0030"><span data-dcnode-id="6182"><span data-dcnode-id="6186" instrument_node="">Two different brands of full fat commercial </span><a class="topic-link" data-dcnode-id="6184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/cheddar-cheese" title="Learn more about Cheddar cheese from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6185" instrument_node="">Cheddar cheese</span></a><span data-dcnode-id="6183" instrument_node=""> (A</span></span><span data-dcnode-id="6181" instrument_node="">&nbsp;</span><span data-dcnode-id="6180" instrument_node="">=</span><span data-dcnode-id="6179" instrument_node="">&nbsp;</span><span data-dcnode-id="6178" instrument_node="">Kraft Foods Inc., Glenview, IL; B</span><span data-dcnode-id="6177" instrument_node="">&nbsp;</span><span data-dcnode-id="6176" instrument_node="">=</span><span data-dcnode-id="6175" instrument_node="">&nbsp;</span><span data-dcnode-id="6174" instrument_node="">Gossner Foods Inc., Logan, UT) labeled as mild, medium, and sharp were purchased from local grocery stores. We also selected mild (2 mo), medium (6 mo), and sharp (12 mo) cheeses from 2 Cheddar cheese types (C, D) manufactured by the Gary Haight Richardson Dairy Products Laboratory at Utah State University (</span><strong data-dcnode-id="6172"><span data-dcnode-id="6173" instrument_node="">USU</span></strong><span data-dcnode-id="6171" instrument_node="">, Logan). Cheese C is made for sale after 6-mo storage (including 2 mo at 10°C) and includes an adjunct </span><span data-dcnode-id="6167"><em data-dcnode-id="6168"><a class="topic-link" data-dcnode-id="6169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/lactobacillus-helveticus" title="Learn more about Lactobacillus helveticus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6170" instrument_node="">Lactobacillus helveticus</span></a></em></span><span data-dcnode-id="6166" instrument_node=""> culture so it develops a sweet umami flavor. Cheese D is made for sale after 2-yr storage at 6°C and is made with an adjunct </span><span data-dcnode-id="6162"><em data-dcnode-id="6163"><a class="topic-link" data-dcnode-id="6164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/lactococcus-lactis" title="Learn more about Lactococcus lactis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6165" instrument_node="">Lactococcus lactis</span></a></em></span><span data-dcnode-id="6161" instrument_node=""> culture that increases levels of 2/3-methyl butanal and 2-methyl propanal in cheese, resulting in increased nutty flavor (</span><a class="workspace-trigger" data-dcnode-id="6159" href="#bib0005" name="bbib0005"><span data-dcnode-id="6160" instrument_node="">Carunchia Whetstine et al., 2006</span></a><span data-dcnode-id="6158" instrument_node="">). After purchase and sampling, all cheeses were stored at 4°C until analyzed to minimize further flavor development.</span></p></section><section data-dcnode-id="6023" id="sec0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6154"><span data-dcnode-id="6155" instrument_node="">Low-Fat Cheese</span></h3><div data-dcnode-id="6024"><p data-dcnode-id="6103" id="par0035"><span data-dcnode-id="6153" instrument_node="">Nine batches of low-fat cheese with different color combinations (</span><a class="workspace-trigger" data-dcnode-id="6151" href="#tbl0005" name="btbl0005"><span data-dcnode-id="6152" instrument_node="">Table 1</span></a><span data-dcnode-id="6150" instrument_node="">) were manufactured using a 3 × 3 randomized block design, with all 9 cheeses being made within 3 consecutive days, in each of 2 separate replicates. Fresh milk was obtained from the George B. Caine Dairy Research and Teaching Center (Wellsville, UT) and then transported to the Gary H. Richardson Dairy Products Laboratory where the milk was standardized to a protein-fat ratio of 5.0 and pasteurized (72°C for 15</span><span data-dcnode-id="6149" instrument_node="">&nbsp;</span><span data-dcnode-id="6148" instrument_node="">s) and brought to 22°C. Milk was acidified to pH 6.2 using </span><span class="small-caps" data-dcnode-id="6146"><span data-dcnode-id="6147" instrument_node="">l</span></span><span data-dcnode-id="6145" instrument_node="">-lactic acid (Nelson-Jameson Inc., Marshfield, WI), diluted (1:16) and titanium dioxide emulsion (Roha USA LLC, St. Louis, MO) added (0, 7.67, or 40</span><span data-dcnode-id="6144" instrument_node="">&nbsp;</span><span data-dcnode-id="6143" instrument_node="">g/100</span><span data-dcnode-id="6142" instrument_node="">&nbsp;</span><span data-dcnode-id="6141" instrument_node="">kg). The milk was warmed to 35°C, and then inoculated with 0.02% </span><em data-dcnode-id="6139"><span data-dcnode-id="6140" instrument_node="">Lc. lactis</span></em><span data-dcnode-id="6138" instrument_node=""> culture as frozen pellets (DVS850; Chr. Hansen Inc., Milwaukee, WI) with continuous stirring. After 20</span><span data-dcnode-id="6137" instrument_node="">&nbsp;</span><span data-dcnode-id="6132"><span data-dcnode-id="6136" instrument_node="">min, single-strength </span><a class="topic-link" data-dcnode-id="6134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/annatto" title="Learn more about annatto from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6135" instrument_node="">annatto</span></a><span data-dcnode-id="6133" instrument_node=""> (DSM Foods Specialty Inc., Parsippany, NJ) was added at 0, 7.34, or 22</span></span><span data-dcnode-id="6131" instrument_node="">&nbsp;</span><span data-dcnode-id="6130" instrument_node="">g/100</span><span data-dcnode-id="6129" instrument_node="">&nbsp;</span><span data-dcnode-id="6128" instrument_node="">kg. Then, after a total of 30</span><span data-dcnode-id="6127" instrument_node="">&nbsp;</span><span data-dcnode-id="6126" instrument_node="">min of ripening, the milk was set using 7.5</span><span data-dcnode-id="6125" instrument_node="">&nbsp;</span><span data-dcnode-id="6124" instrument_node="">g/100</span><span data-dcnode-id="6123" instrument_node="">&nbsp;</span><span data-dcnode-id="6118"><span data-dcnode-id="6122" instrument_node="">kg double-strength </span><a class="topic-link" data-dcnode-id="6120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/chymosin" title="Learn more about chymosin from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6121" instrument_node="">chymosin</span></a><span data-dcnode-id="6119" instrument_node=""> (∼650 international milk clotting U/mL; Chy-Max; Chr. Hansen Inc.). After 20</span></span><span data-dcnode-id="6117" instrument_node="">&nbsp;</span><span data-dcnode-id="6116" instrument_node="">min, the curd was cut using 1.6-cm spaced wire knives, healed for 5</span><span data-dcnode-id="6115" instrument_node="">&nbsp;</span><span data-dcnode-id="6114" instrument_node="">min, and then stirred for 40</span><span data-dcnode-id="6113" instrument_node="">&nbsp;</span><span data-dcnode-id="6112" instrument_node="">min; then, half of the whey was drained. Stirring continued until the curd reached pH 5.95 and then the remaining whey was drained. The curd particles were dry stirred until reaching pH 5.50 and then washed using 4°C cold water [∼50% (wt/wt) of curd] to lower the curd temperature to 22°C. The curd was then weighed and salted using 22</span><span data-dcnode-id="6111" instrument_node="">&nbsp;</span><span data-dcnode-id="6110" instrument_node="">g/kg of curd applied in 3 applications, 5</span><span data-dcnode-id="6109" instrument_node="">&nbsp;</span><span data-dcnode-id="6108" instrument_node="">min apart; then, the curd was filled into plastic hoops and pressed at 60</span><span data-dcnode-id="6107" instrument_node="">&nbsp;</span><span data-dcnode-id="6106" instrument_node="">kPa for 18</span><span data-dcnode-id="6105" instrument_node="">&nbsp;</span><span data-dcnode-id="6104" instrument_node="">h, vacuum packaged, and stored at 3°C.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="6025" id="tbl0005"><span class="captions" data-dcnode-id="6093"><span data-dcnode-id="6094"><p data-dcnode-id="6095" id="spar0020"><span class="label" data-dcnode-id="6101"><span data-dcnode-id="6102" instrument_node="">Table 1</span></span><span data-dcnode-id="6100" instrument_node="">. </span><span data-dcnode-id="6099" instrument_node="">Low-fat cheese code based on amount of </span><a class="topic-link" data-dcnode-id="6097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/annatto" title="Learn more about annatto from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6098" instrument_node="">annatto</span></a><span data-dcnode-id="6096" instrument_node=""> and titanium dioxide added to milk before renneting.</span></p></span></span><div class="groups" data-dcnode-id="6037"><table data-dcnode-id="6038"><thead class="valign-top" data-dcnode-id="6067"><tr data-dcnode-id="6081"><th class="rowsep-1 align-left valign-bottom" data-dcnode-id="6087" rowspan="2" scope="col"><span data-dcnode-id="6092" instrument_node="">Annatto</span><a class="workspace-trigger" data-dcnode-id="6089" href="#tblfn0005" name="btblfn0005"><sup data-dcnode-id="6090"><span data-dcnode-id="6091" instrument_node="">1</span></sup></a><span data-dcnode-id="6088" instrument_node=""> (mg/kg)</span></th><th class="rowsep-1 align-center" colspan="3" data-dcnode-id="6082" scope="col"><span data-dcnode-id="6086" instrument_node="">Titanium dioxide</span><a class="workspace-trigger" data-dcnode-id="6083" href="#tblfn0010" name="btblfn0010"><sup data-dcnode-id="6084"><span data-dcnode-id="6085" instrument_node="">2</span></sup></a></th></tr><tr data-dcnode-id="6068"><th class="rowsep-1 align-center" data-dcnode-id="6077" scope="col"><span data-dcnode-id="6080" instrument_node="">0</span><span data-dcnode-id="6079" instrument_node="">&nbsp;</span><span data-dcnode-id="6078" instrument_node="">mg/kg</span></th><th class="rowsep-1 align-center" data-dcnode-id="6073" scope="col"><span data-dcnode-id="6076" instrument_node="">76.7</span><span data-dcnode-id="6075" instrument_node="">&nbsp;</span><span data-dcnode-id="6074" instrument_node="">mg/kg</span></th><th class="rowsep-1 align-center" data-dcnode-id="6069" scope="col"><span data-dcnode-id="6072" instrument_node="">400</span><span data-dcnode-id="6071" instrument_node="">&nbsp;</span><span data-dcnode-id="6070" instrument_node="">mg/kg</span></th></tr></thead><tbody data-dcnode-id="6039"><tr data-dcnode-id="6058"><td class="align-left" data-dcnode-id="6065"><span data-dcnode-id="6066" instrument_node="">0</span></td><td class="align-center" data-dcnode-id="6063"><span data-dcnode-id="6064" instrument_node="">1</span></td><td class="align-center" data-dcnode-id="6061"><span data-dcnode-id="6062" instrument_node="">2</span></td><td class="align-center" data-dcnode-id="6059"><span data-dcnode-id="6060" instrument_node="">3</span></td></tr><tr data-dcnode-id="6049"><td class="align-left" data-dcnode-id="6056"><span data-dcnode-id="6057" instrument_node="">73.4</span></td><td class="align-center" data-dcnode-id="6054"><span data-dcnode-id="6055" instrument_node="">4</span></td><td class="align-center" data-dcnode-id="6052"><span data-dcnode-id="6053" instrument_node="">5</span></td><td class="align-center" data-dcnode-id="6050"><span data-dcnode-id="6051" instrument_node="">6</span></td></tr><tr data-dcnode-id="6040"><td class="align-left" data-dcnode-id="6047"><span data-dcnode-id="6048" instrument_node="">220</span></td><td class="align-center" data-dcnode-id="6045"><span data-dcnode-id="6046" instrument_node="">7</span></td><td class="align-center" data-dcnode-id="6043"><span data-dcnode-id="6044" instrument_node="">8</span></td><td class="align-center" data-dcnode-id="6041"><span data-dcnode-id="6042" instrument_node="">9</span></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="6026"><dt data-dcnode-id="6035" id="tblfn0005"><span data-dcnode-id="6036" instrument_node="">1</span></dt><dd data-dcnode-id="6032"><p data-dcnode-id="6033"><span data-dcnode-id="6034" instrument_node="">Single strength (DSM Specialties Inc., Parsippany, NJ).</span></p></dd><dt data-dcnode-id="6030" id="tblfn0010"><span data-dcnode-id="6031" instrument_node="">2</span></dt><dd data-dcnode-id="6027"><p data-dcnode-id="6028"><span data-dcnode-id="6029" instrument_node="">Titanium dioxide emulsion (Roha USA LLC, St. Louis, MO).</span></p></dd></dl></div></div></section><section data-dcnode-id="5983" id="sec0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6021"><span data-dcnode-id="6022" instrument_node="">Proximate Analysis</span></h3><p data-dcnode-id="5984" id="par0040"><span data-dcnode-id="6016"><span data-dcnode-id="6020" instrument_node="">Moisture content was determined in triplicate by weight loss using a </span><a class="topic-link" data-dcnode-id="6018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/microwave-ovens" title="Learn more about microwave oven from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6019" instrument_node="">microwave oven</span></a><span data-dcnode-id="6017" instrument_node=""> (CEM Corp., Indian trail, NC) at 100% power with an endpoint setting of &lt;0.4</span></span><span data-dcnode-id="6015" instrument_node="">&nbsp;</span><span data-dcnode-id="6014" instrument_node="">mg weight change over 2</span><span data-dcnode-id="6013" instrument_node="">&nbsp;</span><span data-dcnode-id="6012" instrument_node="">s. Fat content was determined in duplicate using a modified Babcock method (</span><a class="workspace-trigger" data-dcnode-id="6010" href="#bib0155" name="bbib0155"><span data-dcnode-id="6011" instrument_node="">Richardson, 1985</span></a><span data-dcnode-id="6005"><span data-dcnode-id="6009" instrument_node="">). Salt was measured by homogenizing </span><a class="topic-link" data-dcnode-id="6007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/grated-cheese" title="Learn more about grated cheese from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6008" instrument_node="">grated cheese</span></a><span data-dcnode-id="6006" instrument_node=""> with distilled water for 4</span></span><span data-dcnode-id="6004" instrument_node="">&nbsp;</span><span data-dcnode-id="6003" instrument_node="">min at 260</span><span data-dcnode-id="6002" instrument_node="">&nbsp;</span><span data-dcnode-id="5993"><span data-dcnode-id="5997"><span data-dcnode-id="6001" instrument_node="">rpm in a Stomacher 400 (Seward Ltd., Worthing, UK). The </span><a class="topic-link" data-dcnode-id="5999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/slurries" title="Learn more about slurry from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6000" instrument_node="">slurry</span></a><span data-dcnode-id="5998" instrument_node=""> was filtered through Whatman #1 filter paper, and the filtrate was analyzed for sodium chloride using a chloride analyzer (model 926; Corning Inc., Medfield, MA). The pH was measured using a glass </span></span><a class="topic-link" data-dcnode-id="5995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/electrodes" title="Learn more about electrode from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5996" instrument_node="">electrode</span></a><span data-dcnode-id="5994" instrument_node=""> after stomaching 20</span></span><span data-dcnode-id="5992" instrument_node="">&nbsp;</span><span data-dcnode-id="5991" instrument_node="">g of grated cheese with 10</span><span data-dcnode-id="5990" instrument_node="">&nbsp;</span><span data-dcnode-id="5989" instrument_node="">g of distilled water for 1</span><span data-dcnode-id="5988" instrument_node="">&nbsp;</span><span data-dcnode-id="5987" instrument_node="">min at 260</span><span data-dcnode-id="5986" instrument_node="">&nbsp;</span><span data-dcnode-id="5985" instrument_node="">rpm.</span></p></section><section data-dcnode-id="5972" id="sec0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5981"><span data-dcnode-id="5982" instrument_node="">Color Analysis</span></h3><p data-dcnode-id="5973" id="par0045"><span data-dcnode-id="5980" instrument_node="">Cheese color was measured using a MiniScan portable colorimeter (Hunter Associates Laboratory Inc., Reston, VA). Color standardization was performed using white and black standard plates (Hunter Associates Laboratory Inc.) inserted into a plastic bag (QME355 3.5 mil; Vilutis and Co. Inc., Frankfurt, IL) used for cheese packaging. Color measurements were made using Commission Internationale de l’Éclairage (</span><a class="workspace-trigger" data-dcnode-id="5978" href="#bib0020" name="bbib0020"><span data-dcnode-id="5979" instrument_node="">CIE, 1978</span></a><span data-dcnode-id="5977" instrument_node="">) L*, a*, and b* values using illuminant D65. The L* value is an indicator of luminosity (the degree of lightness from black to white). The a* value is an indicator of green (–) and red (+), whereas b* is an indicator of blue (–) and yellow (+). Because combining a* and b* gives a better indication of color than their individual values, we calculated hue angle as the inverse tangent of the ratio b*/a* (</span><a class="workspace-trigger" data-dcnode-id="5975" href="#bib0085" name="bbib0085"><span data-dcnode-id="5976" instrument_node="">HunterLab, 2011</span></a><span data-dcnode-id="5974" instrument_node="">). The NCI cheese color standards were purchased from Nelson-Jameson Inc.</span></p></section><section data-dcnode-id="5915" id="sec0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5970"><span data-dcnode-id="5971" instrument_node="">Sensory Analysis of Flavor</span></h3><p data-dcnode-id="5916" id="par0050"><span data-dcnode-id="5965"><span data-dcnode-id="5969" instrument_node="">All </span><a class="topic-link" data-dcnode-id="5967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/sensory-evaluation" title="Learn more about sensory evaluation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5968" instrument_node="">sensory evaluation</span></a><span data-dcnode-id="5966" instrument_node=""> was conducted in compliance with the USU Institutional Review Board for human subjects’ approval. For descriptive sensory analysis, cheeses were cut into 3.5-cm cubes and then placed into soufflé cups (58</span></span><span data-dcnode-id="5964" instrument_node="">&nbsp;</span><span data-dcnode-id="5963" instrument_node="">mL) covered with lids and numbered with randomly generated 3-digit codes. The cheeses were tempered at 12°C for 1</span><span data-dcnode-id="5962" instrument_node="">&nbsp;</span><span data-dcnode-id="5957"><span data-dcnode-id="5961" instrument_node="">h and were served at this temperature with deionized water and unsalted crackers for palate cleansing. A trained descriptive </span><a class="topic-link" data-dcnode-id="5959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/sensory-panel" title="Learn more about sensory panel from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5960" instrument_node="">sensory panel</span></a><span data-dcnode-id="5958" instrument_node=""> (n</span></span><span data-dcnode-id="5956" instrument_node="">&nbsp;</span><span data-dcnode-id="5955" instrument_node="">=</span><span data-dcnode-id="5954" instrument_node="">&nbsp;</span><span data-dcnode-id="5953" instrument_node="">9: 4 female, 5 male, ages 22 to 50 yr), with &gt;150</span><span data-dcnode-id="5952" instrument_node="">&nbsp;</span><span data-dcnode-id="5947"><span data-dcnode-id="5951" instrument_node="">h of training in </span><a class="topic-link" data-dcnode-id="5949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/descriptive-analysis" title="Learn more about descriptive analysis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5950" instrument_node="">descriptive analysis</span></a><span data-dcnode-id="5948" instrument_node=""> of cheese flavor, evaluated the cheeses. Separate evaluations were performed under red light and white light using a 0- to 15-point universal intensity scale described by </span></span><a class="workspace-trigger" data-dcnode-id="5945" href="#bib0115" name="bbib0115"><span data-dcnode-id="5946" instrument_node="">Meilgaard et al. (2007)</span></a><span data-dcnode-id="5944" instrument_node="">. Cheese flavor lexicon terms of cooked, whey, FFA, rosy/floral, bitter, salty, sweet, sour, and umami were referenced as described by </span><a class="workspace-trigger" data-dcnode-id="5942" href="#bib0045" name="bbib0045"><span data-dcnode-id="5943" instrument_node="">Drake et al. (2001)</span></a><span data-dcnode-id="5941" instrument_node="">. Reference identities for fruity, nutty, brothy and sulfur, and pineappley were modified from </span><a class="workspace-trigger" data-dcnode-id="5939" href="#bib0045" name="bbib0045"><span data-dcnode-id="5940" instrument_node="">Drake et al. (2001)</span></a><span data-dcnode-id="5930"><span data-dcnode-id="5934"><span data-dcnode-id="5938" instrument_node=""> to frozen apple/grape/peach juice concentrate blend, </span><a class="topic-link" data-dcnode-id="5936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/hazelnuts" title="Learn more about hazelnut from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5937" instrument_node="">hazelnut</span></a><span data-dcnode-id="5935" instrument_node=""> extract, low-sodium chicken </span></span><a class="topic-link" data-dcnode-id="5932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/broths" title="Learn more about broth from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5933" instrument_node="">broth</span></a><span data-dcnode-id="5931" instrument_node="">, H</span></span><sub data-dcnode-id="5928"><span data-dcnode-id="5929" instrument_node="">2</span></sub><span data-dcnode-id="5927" instrument_node="">S (400</span><span data-dcnode-id="5926" instrument_node="">&nbsp;</span><span data-dcnode-id="5925" instrument_node="">μg/kg in water or skim milk), and frozen pineapple juice concentrate, respectively. Reference identities for buttery was melted butter homogenized into warm milk, for oxidized was pasteurized non-homogenized milk treated with 2</span><span data-dcnode-id="5924" instrument_node="">&nbsp;</span><span data-dcnode-id="5923" instrument_node="">mg of copper sulfate/kg for 1 wk at 4°C, and milky was referenced based on </span><a class="workspace-trigger" data-dcnode-id="5921" href="#bib0115" name="bbib0115"><span data-dcnode-id="5922" instrument_node="">Meilgaard et al. (2007)</span></a><span data-dcnode-id="5920" instrument_node=""> using whole milk compared with skim milk. Each cheese sample was tasted twice by each panelist in each evaluation on the same day, with a 30-min break between taste sessions. Evaluations were conducted individually using SIMS 2000 (Sensory Computer Systems, Morristown, NJ) in an enclosed room free from external aromas, noise, and distractions. Panelists were instructed to expectorate samples after evaluation. If mean attribute scores were ≤0.5, the attribute was considered not detectable (</span><strong data-dcnode-id="5918"><span data-dcnode-id="5919" instrument_node="">ND</span></strong><span data-dcnode-id="5917" instrument_node="">).</span></p></section><section data-dcnode-id="5867" id="sec0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5913"><span data-dcnode-id="5914" instrument_node="">Consumer Preference Testing</span></h3><p data-dcnode-id="5911" id="par0055"><span data-dcnode-id="5912" instrument_node="">A series of consumer tests were conducted with each panel consisting of approximately 120 participants, 18 to 65 y of age, who were recruited via website, newspaper advertisements, and flyers. The consumer participants were approved on the basis of legal age (18 and above) and absence of food allergies and, in general, included university faculty, staff, and students. Testing by the consumers was in individual booths with standard white lighting and entering their responses using SIMS 2000 software including space for open comments. Cheese blocks were cut into 2.5-cm cubes and served to them on a plate along with water.</span></p><p data-dcnode-id="5878" id="par0060"><span data-dcnode-id="5906"><span data-dcnode-id="5910" instrument_node="">Cheeses were evaluated for color and overall liking using a 9-point </span><a class="topic-link" data-dcnode-id="5908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/hedonic-scales" title="Learn more about hedonic scale from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5909" instrument_node="">hedonic scale</span></a><span data-dcnode-id="5907" instrument_node=""> (with 1</span></span><span data-dcnode-id="5905" instrument_node="">&nbsp;</span><span data-dcnode-id="5904" instrument_node="">=</span><span data-dcnode-id="5903" instrument_node="">&nbsp;</span><span data-dcnode-id="5902" instrument_node="">extremely dislike, 5</span><span data-dcnode-id="5901" instrument_node="">&nbsp;</span><span data-dcnode-id="5900" instrument_node="">=</span><span data-dcnode-id="5899" instrument_node="">&nbsp;</span><span data-dcnode-id="5898" instrument_node="">neither like nor dislike, and 9</span><span data-dcnode-id="5897" instrument_node="">&nbsp;</span><span data-dcnode-id="5896" instrument_node="">=</span><span data-dcnode-id="5895" instrument_node="">&nbsp;</span><span data-dcnode-id="5890"><span data-dcnode-id="5894" instrument_node="">extremely like), and for cheese sharpness, flavor, and </span><a class="topic-link" data-dcnode-id="5892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/chewiness" title="Learn more about chewiness from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5893" instrument_node="">chewiness</span></a><span data-dcnode-id="5891" instrument_node="">, a just-about-right (</span></span><strong data-dcnode-id="5888"><span data-dcnode-id="5889" instrument_node="">JAR</span></strong><span data-dcnode-id="5887" instrument_node="">) 5-point agreement scale was used with the center point being just about right, where 1</span><span data-dcnode-id="5886" instrument_node="">&nbsp;</span><span data-dcnode-id="5885" instrument_node="">=</span><span data-dcnode-id="5884" instrument_node="">&nbsp;</span><span data-dcnode-id="5883" instrument_node="">not enough attribute and 5</span><span data-dcnode-id="5882" instrument_node="">&nbsp;</span><span data-dcnode-id="5881" instrument_node="">=</span><span data-dcnode-id="5880" instrument_node="">&nbsp;</span><span data-dcnode-id="5879" instrument_node="">too much of the attribute. Each participant was rewarded with a coupon for a free ice cream after their complete responses in each panel.</span></p><section data-dcnode-id="5873" id="sec0045"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5876"><span data-dcnode-id="5877" instrument_node="">Full-Fat Cheeses</span></h4><p data-dcnode-id="5874" id="par0065"><span data-dcnode-id="5875" instrument_node="">With 12 cheeses to test, 2 panels were conducted with 6 cheeses presented to each panel. Consumer participants could attend one or both panels held on consecutive days. At the start of each panel, the consumers completed a questionnaire regarding their demographics, cheese consumption, cheese flavor preference (mild, medium, sharp, or extra sharp), frequency and intent of purchase for reduced- or low-fat cheeses, or both, and their willingness to pay more for low-fat cheeses.</span></p></section><section data-dcnode-id="5868" id="sec0050"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5871"><span data-dcnode-id="5872" instrument_node="">Low-Fat Cheese</span></h4><p data-dcnode-id="5869" id="par0070"><span data-dcnode-id="5870" instrument_node="">Consumers were informed that they would be evaluating cheese but not that it was low fat; however, they were asked questions about their consumption and willingness to purchase low- or reduced-fat cheese. Testing was performed using 2 panels of 120 consumers on different days in which they were presented with a plate containing 6 of the 9 low-fat cheeses, randomly organized so that each cheese was evaluated 80 times. Consumers were allowed to attend one or both panels.</span></p></section></section><section data-dcnode-id="5838" id="sec0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5865"><span data-dcnode-id="5866" instrument_node="">Statistical Analysis</span></h3><p data-dcnode-id="5839" id="par0075"><span data-dcnode-id="5864" instrument_node="">Mean scores for cheese consumer liking were analyzed using PROC GLM ANOVA based upon a randomized block design (</span><a class="workspace-trigger" data-dcnode-id="5862" href="#bib0165" name="bbib0165"><span data-dcnode-id="5863" instrument_node="">SAS Institute, 1999</span></a><span data-dcnode-id="5861" instrument_node="">). Evaluation of consumer preferences and full-fat cheeses was conducted once, with the 4 different brands acting as pseudo-replicates. Descriptive analysis of cheese was analyzed using split plot design with the PROC MIXED model of SAS. The 2 replicates of low-fat cheese were considered as blocks (random factor) and judges were considered as whole plot (random factor); annatto and TiO</span><sub data-dcnode-id="5859"><span data-dcnode-id="5860" instrument_node="">2</span></sub><span data-dcnode-id="5858" instrument_node=""> were treated as split plot (fixed factor). Differences were considered significant when resultant </span><em data-dcnode-id="5856"><span data-dcnode-id="5857" instrument_node="">P</span></em><span data-dcnode-id="5855" instrument_node="">-values were &lt;0.05 (</span><a class="workspace-trigger" data-dcnode-id="5853" href="#bib0165" name="bbib0165"><span data-dcnode-id="5854" instrument_node="">SAS Institute, 1999</span></a><span data-dcnode-id="5852" instrument_node="">). The JAR sensory data were analyzed using the non-parametric Kruskal-Wallis test using the chi-squared distribution. The 5-point bipolar JAR scale was transformed to a 3-point ranking scale where 1</span><span data-dcnode-id="5851" instrument_node="">&nbsp;</span><span data-dcnode-id="5850" instrument_node="">=</span><span data-dcnode-id="5849" instrument_node="">&nbsp;</span><span data-dcnode-id="5848" instrument_node="">bad (categories 1 and 5 of JAR scale combined, indicating the unacceptability of cheese attribute), 2</span><span data-dcnode-id="5847" instrument_node="">&nbsp;</span><span data-dcnode-id="5846" instrument_node="">=</span><span data-dcnode-id="5845" instrument_node="">&nbsp;</span><span data-dcnode-id="5844" instrument_node="">fair (categories 2 and 4 combined), and 3</span><span data-dcnode-id="5843" instrument_node="">&nbsp;</span><span data-dcnode-id="5842" instrument_node="">=</span><span data-dcnode-id="5841" instrument_node="">&nbsp;</span><span data-dcnode-id="5840" instrument_node="">good (just right). When treatments were significant, means were compared using the Tukey-Kramer multiple comparisons procedure.</span></p></section></section><section data-dcnode-id="2608" id="sec0060"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5835"><span data-dcnode-id="5836" instrument_node="">Results</span></h2><section data-dcnode-id="3782" id="sec0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5833"><span data-dcnode-id="5834" instrument_node="">Full-Fat Cheese</span></h3><section data-dcnode-id="5336" id="sec0070"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5831"><span data-dcnode-id="5832" instrument_node="">Cheese Composition</span></h4><div data-dcnode-id="5337"><p data-dcnode-id="5822" id="par0080"><span data-dcnode-id="5830" instrument_node="">Mean moisture content of full-fat cheeses ranged from 36.3 to 39.5% (</span><a class="workspace-trigger" data-dcnode-id="5828" href="#tbl0010" name="btbl0010"><span data-dcnode-id="5829" instrument_node="">Table 2</span></a><span data-dcnode-id="5823"><span data-dcnode-id="5827" instrument_node="">), with medium and sharp cheeses typically having lower moisture than mild cheeses. This was expected because long-hold cheeses are manufactured with less moisture to improve flavor development during aging, whereas short-hold cheeses are made with higher moisture to maximize yields. The one exception was cheese C, which was manufactured at USU for sale as an aged cheese and sampled after 2, 4, and 12 mo of storage. Fat content (30.5 to 33.5%), salt (1.9 to 2.1%), and pH (5.0 to 5.3) were all within the normal range for </span><a class="topic-link" data-dcnode-id="5825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/cheddar-cheese" title="Learn more about Cheddar cheese from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5826" instrument_node="">Cheddar cheese</span></a><span data-dcnode-id="5824" instrument_node="">.</span></span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="5338" id="tbl0010"><span class="captions" data-dcnode-id="5805"><span data-dcnode-id="5806"><p data-dcnode-id="5807" id="spar0025"><span class="label" data-dcnode-id="5820"><span data-dcnode-id="5821" instrument_node="">Table 2</span></span><span data-dcnode-id="5819" instrument_node="">. </span><span data-dcnode-id="5818" instrument_node="">Mean composition and Hunter color (L*, a*, and b*) values</span><a class="workspace-trigger" data-dcnode-id="5815" href="#tblfn0020" name="btblfn0020"><sup data-dcnode-id="5816"><span data-dcnode-id="5817" instrument_node="">1</span></sup></a><span data-dcnode-id="5811"><span data-dcnode-id="5814" instrument_node=""> of full-fat </span><a class="topic-link" data-dcnode-id="5812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/cheddar-cheese" title="Learn more about Cheddar cheeses from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5813" instrument_node="">Cheddar cheeses</span></a></span><a class="workspace-trigger" data-dcnode-id="5808" href="#tblfn0025" name="btblfn0025"><sup data-dcnode-id="5809"><span data-dcnode-id="5810" instrument_node="">2</span></sup></a></p></span></span><div class="groups" data-dcnode-id="5364"><table data-dcnode-id="5365"><thead class="valign-top" data-dcnode-id="5778"><tr data-dcnode-id="5786"><th class="rowsep-1 align-center valign-bottom" data-dcnode-id="5803" rowspan="2" scope="col"><span data-dcnode-id="5804" instru ame="btblfn0015"><sup data-dcnode-id="5413"><span data-dcnode-id="5414" instrument_node="">c</span></sup></a></td><td class="align-char" data-dcnode-id="5403"><span data-dcnode-id="5410" instrument_node="">63.1</span><a class="workspace-trigger" data-dcnode-id="5407" href="#tblfn0015" name="btblfn0015"><sup data-dcnode-id="5408"><span data-dcnode-id="5409" instrument_node="">a</span></sup></a><a class="workspace-trigger" data-dcnode-id="5404" href="#tblfn0015" name="btblfn0015"><sup data-dcnode-id="5405"><span data-dcnode-id="5406" instrument_node="">b</span></sup></a></td></tr><tr data-dcnode-id="5367"><td class="align-left" data-dcnode-id="5399"><span data-dcnode-id="5401" instrument_node="">&nbsp;</span><span data-dcnode-id="5400" instrument_node="">D</span></td><td class="align-char" data-dcnode-id="5397"><span data-dcnode-id="5398" instrument_node="">36.6</span></td><td class="align-char" data-dcnode-id="5395"><span data-dcnode-id="5396" instrument_node="">32.5</span></td><td class="align-char" data-dcnode-id="5393"><span data-dcnode-id="5394" instrument_node="">2.1</span></td><td class="align-char" data-dcnode-id="5391"><span data-dcnode-id="5392" instrument_node="">5.1</span></td><td class="align-char" data-dcnode-id="5383"><span data-dcnode-id="5390" instrument_node="">70.9</span><a class="workspace-trigger" data-dcnode-id="5387" href="#tblfn0015" name="btblfn0015"><sup data-dcnode-id="5388"><span data-dcnode-id="5389" instrument_node="">a</span></sup></a><a class="workspace-trigger" data-dcnode-id="5384" href="#tblfn0015" name="btblfn0015"><sup data-dcnode-id="5385"><span data-dcnode-id="5386" instrument_node="">b</span></sup></a></td><td class="align-char" data-dcnode-id="5378"><span data-dcnode-id="5382" instrument_node="">8.3</span><a class="workspace-trigger" data-dcnode-id="5379" href="#tblfn0015" name="btblfn0015"><sup data-dcnode-id="5380"><span data-dcnode-id="5381" instrument_node="">c</span></sup></a></td><td class="align-char" data-dcnode-id="5373"><span data-dcnode-id="5377" instrument_node="">8.3</span><a class="workspace-trigger" data-dcnode-id="5374" href="#tblfn0015" name="btblfn0015"><sup data-dcnode-id="5375"><span data-dcnode-id="5376" instrument_node="">d</span></sup></a></td><td class="align-char" data-dcnode-id="5368"><span data-dcnode-id="5372" instrument_node="">45.9</span><a class="workspace-trigger" data-dcnode-id="5369" href="#tblfn0015" name="btblfn0015"><sup data-dcnode-id="5370"><span data-dcnode-id="5371" instrument_node="">c</span></sup></a></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="5339"><dt data-dcnode-id="5362" id="tblfn0015"><span data-dcnode-id="5363" instrument_node="">a–d</span></dt><dd data-dcnode-id="5355"><p data-dcnode-id="5356"><span data-dcnode-id="5361" instrument_node="">Color means in the same column with same superscript were not significantly different (α</span><span data-dcnode-id="5360" instrument_node="">&nbsp;</span><span data-dcnode-id="5359" instrument_node="">=</span><span data-dcnode-id="5358" instrument_node="">&nbsp;</span><span data-dcnode-id="5357" instrument_node="">0.05).</span></p></dd><dt data-dcnode-id="5353" id="tblfn0020"><span data-dcnode-id="5354" instrument_node="">1</span></dt><dd data-dcnode-id="5350"><p data-dcnode-id="5351"><span data-dcnode-id="5352" instrument_node="">The L* value is an indicator of luminosity (the degree of lightness from black to white). The a* value is an indicator of green (–) and red (+), whereas b* is an indicator of blue (–) and yellow (+).</span></p></dd><dt data-dcnode-id="5348" id="tblfn0025"><span data-dcnode-id="5349" instrument_node="">2</span></dt><dd data-dcnode-id="5345"><p data-dcnode-id="5346"><span data-dcnode-id="5347" instrument_node="">Retail cheeses of A) Kraft Foods (Glenview, IL), B) Gossner Foods (Logan, UT), and manufactured at Utah State University (Logan) as C) Old Juniper and D) White Pine.</span></p></dd><dt data-dcnode-id="5343" id="tblfn0030"><span data-dcnode-id="5344" instrument_node="">3</span></dt><dd data-dcnode-id="5340"><p data-dcnode-id="5341"><span data-dcnode-id="5342" instrument_node="">Calculated as arctan(b*/a*).</span></p></dd></dl></div></div></section><section data-dcnode-id="5248" id="sec0075"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5334"><span data-dcnode-id="5335" instrument_node="">Color</span></h4><div data-dcnode-id="5249"><p data-dcnode-id="5294" id="par0085"><span data-dcnode-id="5333" instrument_node="">The commercial cheeses had a pronounced opaqueness with a matt surface appearance that is typical of full-fat Cheddar cheeses (</span><a class="workspace-trigger" data-dcnode-id="5331" href="#fig0005" name="bfig0005"><span data-dcnode-id="5332" instrument_node="">Figure 1b</span></a><span data-dcnode-id="5330" instrument_node="">). Color intensities of these cheeses varied and could be described as white, pale, and yellow-orange. Among the full-fat cheeses, cheese B and C had the most orange color as shown by having the highest a* value (</span><em data-dcnode-id="5328"><span data-dcnode-id="5329" instrument_node="">P</span></em><span data-dcnode-id="5327" instrument_node="">&nbsp;</span><span data-dcnode-id="5326" instrument_node="">&lt;</span><span data-dcnode-id="5325" instrument_node="">&nbsp;</span><span data-dcnode-id="5320"><span data-dcnode-id="5324" instrument_node="">0.05). Cheese A was more yellow in appearance (i.e., highest b* value) and lacked redness (i.e., low a* value). All of these were made with the addition of </span><a class="topic-link" data-dcnode-id="5322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/annatto" title="Learn more about annatto from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5323" instrument_node="">annatto</span></a><span data-dcnode-id="5321" instrument_node=""> or other colorant. In contrast, cheese D was made without any color being added and was lowest in yellow color intensity (b*</span></span><span data-dcnode-id="5319" instrument_node="">&nbsp;</span><span data-dcnode-id="5318" instrument_node="">=</span><span data-dcnode-id="5317" instrument_node="">&nbsp;</span><span data-dcnode-id="5316" instrument_node="">7 to 9), with a similar degree of redness as cheese A (mean a* value of 8.2 compared with 9.3 for cheese A).As expected, L* values were highest (</span><em data-dcnode-id="5314"><span data-dcnode-id="5315" instrument_node="">P</span></em><span data-dcnode-id="5313" instrument_node="">&nbsp;</span><span data-dcnode-id="5312" instrument_node="">&lt;</span><span data-dcnode-id="5311" instrument_node="">&nbsp;</span><span data-dcnode-id="5310" instrument_node="">0.05) for the uncolored cheese D (</span><a class="workspace-trigger" data-dcnode-id="5308" href="#tbl0010" name="btbl0010"><span data-dcnode-id="5309" instrument_node="">Table 2</span></a><span data-dcnode-id="5307" instrument_node="">). Hue angle values for cheeses A, B, and C were not significantly different and ranged from 63 to 75°, which is within the expected values of 40 to 90° transition from orange to yellow (as shown in </span><a class="workspace-trigger" data-dcnode-id="5305" href="#fig0005" name="bfig0005"><span data-dcnode-id="5306" instrument_node="">Figure 1a</span></a><span data-dcnode-id="5304" instrument_node="">). Cheese D had a lower (</span><em data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">P</span></em><span data-dcnode-id="5301" instrument_node="">&nbsp;</span><span data-dcnode-id="5300" instrument_node="">&lt;</span><span data-dcnode-id="5299" instrument_node="">&nbsp;</span><span data-dcnode-id="5298" instrument_node="">0.05) hue angle of 40 to 52°. Although when colors are close to neutral, small variations can cause a large change in the calculated hue angle (</span><a class="workspace-trigger" data-dcnode-id="5296" href="#bib0085" name="bbib0085"><span data-dcnode-id="5297" instrument_node="">HunterLab, 2011</span></a><span data-dcnode-id="5295" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="5250" id="fig0005"><span data-dcnode-id="5278"><img alt="" data-dcnode-id="5293" height="918" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0022030212002019-gr1.jpg&amp;raw"><span data-dcnode-id="5292" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5279"><li data-dcnode-id="5286"><a class="anchor download-link u-font-sans" data-dcnode-id="5287" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0022030212002019-gr1_lrg.jpg" target="_blank" title="Download high-res image (318KB)"><span class="anchor-text" data-dcnode-id="5288"><span data-dcnode-id="5291" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5289"><span data-dcnode-id="5290" instrument_node="">Download high-res image (318KB)</span></span></span></a></li><li data-dcnode-id="5280"><a class="anchor download-link u-font-sans" data-dcnode-id="5281" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0022030212002019-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5282"><span data-dcnode-id="5285" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5251"><span data-dcnode-id="5252"><p data-dcnode-id="5253" id="spar0010"><span class="label" data-dcnode-id="5276"><span data-dcnode-id="5277" instrument_node="">Figure 1</span></span><span data-dcnode-id="5275" instrument_node="">. </span><span data-dcnode-id="5270"><span data-dcnode-id="5274" instrument_node="">(a) Color representation of hue angle and color comparison of (b) 4 commercial full-fat </span><a class="topic-link" data-dcnode-id="5272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/cheddar-cheese" title="Learn more about Cheddar cheeses from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5273" instrument_node="">Cheddar cheeses</span></a><span data-dcnode-id="5271" instrument_node=""> A, B, C, and D (as described in </span></span><a class="workspace-trigger" data-dcnode-id="5268" href="#tbl0010" name="btbl0010"><span data-dcnode-id="5269" instrument_node="">Table 2</span></a><span data-dcnode-id="5263"><span data-dcnode-id="5267" instrument_node="">), and (c) 9 low-fat cheeses 1 to 9 made using different levels of </span><a class="topic-link" data-dcnode-id="5265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/annatto" title="Learn more about annatto from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5266" instrument_node="">annatto</span></a><span data-dcnode-id="5264" instrument_node=""> and titanium dioxide (as described in </span></span><a class="workspace-trigger" data-dcnode-id="5261" href="#tbl0005" name="btbl0005"><span data-dcnode-id="5262" instrument_node="">Table 1</span></a><span data-dcnode-id="5260" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="5258" href="#fig0005" name="bfig0005"><span data-dcnode-id="5259" instrument_node="">Figure 1a</span></a><span data-dcnode-id="5257" instrument_node=""> reprinted with permission from </span><a class="workspace-trigger" data-dcnode-id="5255" href="#bib0105" name="bbib0105"><span data-dcnode-id="5256" instrument_node="">MacEvoy (2009)</span></a><span data-dcnode-id="5254" instrument_node="">.</span></p></span></span></figure></div></section><section data-dcnode-id="4554" id="sec0080"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5246"><span data-dcnode-id="5247" instrument_node="">Flavor</span></h4><div data-dcnode-id="4555"><p data-dcnode-id="5216" id="par01000"><span data-dcnode-id="5245" instrument_node="">Sensory attributes for full-fat cheeses that scored &gt;0.5 (for at least 1 cheese) by the descriptive flavor panel are presented in </span><a class="workspace-trigger" data-dcnode-id="5243" href="#tbl0015" name="btbl0015"><span data-dcnode-id="5244" instrument_node="">Table 3</span></a><span data-dcnode-id="5242" instrument_node="">. Cooked, whey, oxidized, fruity, pineappley, sulfur, and rosy/floral flavor attributes were ND in all cheeses. Attributes with the highest scores were salty (3.9 to 5.7), sour (1.9 to 4.7), milky (1.1 to 2.2), and umami (0.7 to 2.9). Some flavor attributes (bitter, FFA, brothy, nutty, and umami) all had a trend for increased intensity with advancement of cheese age. However, other attributes, including salty, sour, sweet, sulfur, whey, milky and buttery, did not follow any trend with cheese age. For cheeses A and B, this may be a result of how these manufacturers selected cheeses to be sold as mild, medium, or sharp and we did not have any information on the aging or storage conditions for these cheeses. However, the ages of cheeses C and D were known and were aged for 2, 6, and 12 mo for mild, medium, and sharp, respectively. These cheeses showed a trend (</span><em data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">P</span></em><span data-dcnode-id="5239" instrument_node="">&nbsp;</span><span data-dcnode-id="5238" instrument_node="">=</span><span data-dcnode-id="5237" instrument_node="">&nbsp;</span><span data-dcnode-id="5236" instrument_node="">0.07) for increased bitterness with age (e.g., cheese C: mild</span><span data-dcnode-id="5235" instrument_node="">&nbsp;</span><span data-dcnode-id="5234" instrument_node="">=</span><span data-dcnode
