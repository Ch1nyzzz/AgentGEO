" data-dcnode-id="407"></div><header data-dcnode-id="404" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Cited by (70)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="243"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="244"><ul data-dcnode-id="250"><li class="ListArticleItem" data-dcnode-id="353"><div class="sub-heading" data-dcnode-id="398"><a data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0032579122001018" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="402" id="citing-articles-article0-title"><span data-dcnode-id="403" instrument_node="">Effect of plasma-activated acetic acid on inactivation of Salmonella Typhimurium and quality traits on chicken meats</span></h3></a><div class="article-source ellipsis" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">2022, Poultry Science</span></div></div><div class="buttons" data-dcnode-id="392"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="393" type="button"><span class="button-link-text" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="394" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="395"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="354"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="355" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="356"><p data-dcnode-id="357" id="spara012"><span data-dcnode-id="391" instrument_node="">This study investigated the bactericidal effects of plasma-activated acetic acid (</span><strong data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">PAAA</span></strong><span data-dcnode-id="388" instrument_node="">) on </span><em data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Salmonella</span></em><span data-dcnode-id="385" instrument_node=""> Typhimurium and its impact on the physicochemical traits of chicken meat. Twenty milliliters of 0.8% (v/v) acetic acid (</span><strong data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">AA</span></strong><span data-dcnode-id="382" instrument_node="">) was treated with plasma (2.2 kHz and 8.4 kVpp) for 30 min. The chicken skins, breasts, and drumsticks, inoculated with </span><em data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">S.</span></em><span data-dcnode-id="379" instrument_node=""> Typhimurium</span><em data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">,</span></em><span data-dcnode-id="376" instrument_node=""> were immersed in AA or PAAA and incubated for 10 min. The </span><em data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">S</span></em><span data-dcnode-id="373" instrument_node="">. Typhimurium on the breasts and drumsticks were significantly susceptible to treatment with AA and PAAA, compared to the control group (deionized water treatment), and the population of bacterial cells in PAAA-treated chicken breasts and drumsticks decreased by 0.98 and 1.19 log CFU/g, respectively, compared with AA. The values for pH and 2-thiobarbituric acid reactive substances (</span><strong data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">TBARS</span></strong><span data-dcnode-id="370" instrument_node="">) of PAAA-treated samples decreased significantly compared to the control group. The lightness (</span><em data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">L*</span></em><span data-dcnode-id="367" instrument_node="">) values of the chicken breasts after AA and PAAA treatments increased compared to the control group, whereas the value for yellowness (</span><em data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">b*</span></em><span data-dcnode-id="364" instrument_node="">) decreased. The scanning electron microscopic (</span><strong data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">SEM</span></strong><span data-dcnode-id="361" instrument_node="">) images and the results for volatile compounds in chicken meat revealed similar patterns, with no significant differences between AA and PAAA treatments. In conclusion, we found that PAAA was more effective than AA and synergistic PAAA treatment of chicken caused to the reduction of </span><em data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">S</span></em><span data-dcnode-id="358" instrument_node="">. Typhimurium and improve the meat quality. Therefore, PAAA could be utilized as a promising decontaminant for the chicken meat industry.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="335"><div class="sub-heading" data-dcnode-id="347"><a data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0950329321003542" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="351" id="citing-articles-article1-title"><span data-dcnode-id="352" instrument_node="">Impact of context in visual evaluation of design pastry: Comparison of real and virtual</span></h3></a><div class="article-source ellipsis" data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">2022, Food Quality and Preference</span></div></div><div class="buttons" data-dcnode-id="341"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="342" type="button"><span class="button-link-text" data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="343" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="344"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="336"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="337" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="338"><p data-dcnode-id="339" id="sp0010"><span data-dcnode-id="340" instrument_node="">Virtual reality is becoming an opportunity for multidisciplinary collaboration, including sensory science. The main objective of this work was to compare visual expectations generated by five real cakes evaluated in a laboratory testing booth with their virtual versions in a virtualized sensory booth. Real cakes were designed following the current pastries trends, and virtualization was made using a photogrammetric process. The virtual sensory booth was designed using Unity3D software. The participants were immersed in the 3D virtual environment through a head-mounted display (HMD). Data were analyzed using ANOVA mixed model, internal preference mapping and cluster analysis. The effects of context (real and virtual), the order in test session (crossover design), and socio-demographic factors were studied. The results showed no statistically significant differences within real and virtual studied cakes. These results create new perspectives of the potential of this methodology to be used to rate virtual foods in an immersive environment at the same level as real foods. Regarding the impact of the socio-demographic factors on the acceptance of the cakes, only the effects of gender and sweet-tooth were statistically significant. Males assessed all variables associated with the cakes significantly higher (p&nbsp;&lt;&nbsp;0.05) than females. In the same way, all variables in all cakes were better evaluated by participants with a self-declared sweet-tooth (p&nbsp;&lt;&nbsp;0.05). In the internal preference map, participants were segmented into three clusters that could be identified with the different trends in the pastries market. These results may help companies build tailor-made marketing strategies using Immersive technologies to evaluate new food products to satisfy different consumer segments.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="311"><div class="sub-heading" data-dcnode-id="329"><a data-dcnode-id="332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2212429221003588" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="333" id="citing-articles-article2-title"><span data-dcnode-id="334" instrument_node="">The effect of using microencapsulated pro and prebiotics on the aromatic compounds and sensorial properties of synbiotic goat cheese: Aromatic compounds and sensorial properties of synbiotic goat cheese</span></h3></a><div class="article-source ellipsis" data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">2021, Food Bioscience</span></div></div><div class="buttons" data-dcnode-id="323"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="324" type="button"><span class="button-link-text" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="325" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="326"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="312"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="313" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="314"><p data-dcnode-id="315" id="abspara0010"><span data-dcnode-id="322" instrument_node="">In this study, synbiotic goat cheese was obtained by adding free and microencapsulated probiotic bacteria and prebiotics to goat milk. Three types of microcapsules containing </span><em data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Lacticaseibacillus casei</span></em><span data-dcnode-id="319" instrument_node=""> and </span><em data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Bifidobacterium longum</span></em><span data-dcnode-id="316" instrument_node="">, fructooligosaccharide and inulin were obtained and these microcapsules were added during the cheese production process. In synbiotic microcapsule added goat cheese, changes in volatile aroma substances and sensory properties during storage (180 days at +4&nbsp;°C) and the effect of microencapsulation on these changes were determined. Most of the aroma compounds determined during storage in goat cheeses are alcohols and acids, and it is seen that the use of probiotic supplement culture increases the number of aroma compounds in cheese. It was determined that sensory properties of goat cheese are not affected by the use of probiotic supplements, prebiotics, and microencapsulation and was appreciated by the panelists.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="290"><div class="sub-heading" data-dcnode-id="305"><a data-dcnode-id="308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S002364382100801X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="309" id="citing-articles-article3-title"><span data-dcnode-id="310" instrument_node="">Nix Pro 2 and Color Muse as potential colorimeters for evaluating color in foods</span></h3></a><div class="article-source ellipsis" data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">2021, LWT</span></div></div><div class="buttons" data-dcnode-id="299"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="300" type="button"><span class="button-link-text" data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="301" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="302"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="291"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="292" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="293"><p data-dcnode-id="294" id="abspara0010"><span data-dcnode-id="298" instrument_node="">Our objective was to evaluate the efficacy of Color Muse and Nix Pro 2 colorimeters in measuring food color. To that end, measured color coordinates (L*, a*, b*, C*, and h*) of vegetables, fruits, cheeses, and meats by Color Muse and Nix Pro 2 were compared to values obtained with a Minolta CR-400 colorimeter. In general, color space values obtained with Color Muse were greater than those of CR-400 and Nix Pro 2 (P&nbsp;&lt;&nbsp;0.05). In contrast, Nix Pro 2 color values were consistently lower (P&nbsp;&lt;&nbsp;0.05) than the CR-400. Regardless, all instruments were capable of precisely detecting relative differences in color across multiple food items varying in color and within food items exhibiting a color gradient. In support of this, the majority of values collected with Color Muse and Nix Pro 2 were highly correlated with those of CR-400 (R</span><sup data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">2</span></sup><span data-dcnode-id="295" instrument_node="">&nbsp;&gt;&nbsp;90%). Taken together, our data suggest that Color Muse and Nix Pro 2 are reliable instruments that can be utilized as alternatives to high-cost colorimeters in food color research.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="269"><div class="sub-heading" data-dcnode-id="284"><a data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0023643821006769" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="288" id="citing-articles-article4-title"><span data-dcnode-id="289" instrument_node="">Synergistic effect of pequi waste extract, UV-C radiation and vacuum packaging on the quality characteristics of goat Minas Frescal cheese with sodium reduction</span></h3></a><div class="article-source ellipsis" data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">2021, LWT</span></div></div><div class="buttons" data-dcnode-id="278"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="279" type="button"><span class="button-link-text" data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="280" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="281"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="270"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="271" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="272"><p data-dcnode-id="273" id="abspara0010"><span data-dcnode-id="277" instrument_node="">This study aimed to evaluate the effects of pequi waste extract (PWE), isolated and combined with preservation methods, on the physicochemical and bacteriological quality of goat Minas Frescal cheese with salt replacer (75% NaCl and 25% KCl). After manufactured, the cheeses were packed in aerobic packages, vacuum package (VP) and vacuum package&nbsp;+&nbsp;UV-C radiation, with and without PWE and stored at 4&nbsp;°C for 21 days. Physicochemical properties, proteolysis, lipid oxidation and bacteriological quality were evaluated. No negative influence was observed on starter culture viability after any treatment tested or PWE addition to the cheese. VP and UV-C promoted higher maintenance of chemical composition, color and texture values, and the interaction with PWE was also positive for chemical composition and acidity. However, PWE increases proteolysis and decreases texture parameters. UV-C radiation increased lipid oxidation and affected the acidity, while VP&nbsp;+&nbsp;PWE retard this oxidative process. This combination led to the best growth rate for </span><em data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Lactococcus</span></em><span data-dcnode-id="274" instrument_node="">, besides slight color change. In conclusion, PWE and VP combination can be a promising alternative as a preservative method of nutritional quality without strong changes in the physicochemical quality of cheese. Further studies evaluating the sensory attributes of these cheeses should be performed.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="251"><div class="sub-heading" data-dcnode-id="263"><a data-dcnode-id="266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0963996921001848" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="267" id="citing-articles-article5-title"><span data-dcnode-id="268" instrument_node="">Consumers with high frequency of ‘just about right’ in JAR scales may use lower cognitive effort: Evidence from the concurrent 9-point hedonic scale and CATA question</span></h3></a><div class="article-source ellipsis" data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">2021, Food Research International</span></div></div><div class="buttons" data-dcnode-id="257"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="258" type="button"><span class="button-link-text" data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="259" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="260"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="252"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="253" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="254"><p data-dcnode-id="255" id="sp0015"><span data-dcnode-id="256" instrument_node="">JAR scales are widely used to evaluate the suitability of attributes and guide product optimization. However, the reliability and validity of the results from JAR scales had been widely doubted. In the current research, it was hypothesized that respondents with high just about right (jar) frequency may have more satisficers according to Krosnick’s survey satisficing theory, herein they were more likely to employ low cognitive effort in the tests. To search relevant evidence to prove this, a strategy of indirect method was employed that consumer with different jar frequencies may also perform differently in other concurrent tests such as hedonic scaling and CATA questions. A total of 716 consumers were recruited in four studies with four different sets of products involving coffee and chrysanthemum tea. These consumers were then divided into two groups in each study according to their jar frequency to examine the above hypothesis and their performance on the concurrent tests were compared between the two groups. It was found that consumers with high jar frequency tended to use a narrower range of scales on 9-point hedonic scale, and use terms more narrowly and repeatedly in CATA questions. This confirmed the above hypothesis. Meanwhile, the low cognitive effort could noticeably influence responses in other questions. For instance, it led to lower product discrimination based on hedonic scores when samples were similar and altered results of related to terms discrimination and term configurations in CATA questions. Thereby, survey satisficing problem should be taken seriously in both experimental design and statistical analysis in consumer testings.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-84860257692%26md5%3D513e1da5fa735f4ee3cfc651fbd819cc" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="248" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="249"></path></svg><span class="button-alternative-text" data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Copyright" data-dcnode-id="238"><span class="copyright-line" data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Copyright © 2012 American Dairy Science Association. Published by Elsevier Inc.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="126"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="127"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="139"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="230" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="231" type="button"><span class="button-link-text" data-dcnode-id="234"><h2 class="section-title u-h4" data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="232" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="233"></path></svg></button></header><div aria-describedby="recommended-articles-header" aria-hidden="false" class="" data-dcnode-id="140"><div data-dcnode-id="154" id="recommended-articles"><ul data-dcnode-id="155"><li class="SidePanelItem" data-dcnode-id="204"><div class="sub-heading" data-dcnode-id="220"><a data-dcnode-id="224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0022030212002020"><h3 class="article-title ellipsis text-s" data-dcnode-id="2
