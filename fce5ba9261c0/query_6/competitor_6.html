                  https://doi.org/10.1080/17470919.2018.1564694
                  
                 (2019)."><span data-dcnode-id="2338" instrument_node="">24</span></a></sup><span data-dcnode-id="2335" instrument_node="">, body postures</span><sup data-dcnode-id="2332"><a aria-label="Reference 25" data-dcnode-id="2333" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d73249396e892" title="Schmidt, R. C., Fitzpatrick, P., Caron, R. &amp; Mergeche, J. Understanding social motor coordination. Hum. Mov. Sci. 30, 834–845. 
                  https://doi.org/10.1016/j.humov.2010.05.014
                  
                 (2011)."><span data-dcnode-id="2334" instrument_node="">25</span></a></sup><span data-dcnode-id="2331" instrument_node="">, and vocalizations</span><sup data-dcnode-id="2325"><a aria-label="Reference 26" data-dcnode-id="2329" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d73249396e896" title="Cappella, J. N. &amp; Planalp, S. Talk and silence sequences in informal conversations III: Interspeaker influence. Hum. Commun. Res. 7, 117–132. 
                  https://doi.org/10.1111/j.1468-2958.1981.tb00564.x
                  
                 (1981)."><span data-dcnode-id="2330" instrument_node="">26</span></a><span data-dcnode-id="2328" instrument_node="">,</span><a aria-label="Reference 27" data-dcnode-id="2326" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d73249396e899" title="Fujiwara, K. &amp; Daibo, I. Evaluating interpersonal synchrony: Wavelet transform toward an unstructured conversation. Front. Psychol. 7, 516. 
                  https://doi.org/10.3389/fpsyg.2016.00516
                  
                 (2016)."><span data-dcnode-id="2327" instrument_node="">27</span></a></sup><span data-dcnode-id="2324" instrument_node="">, produced in the receiver an affective convergence supporting the existence of an automatic mechanism selective for the affective contagion. In a recent study carried out by Pinilla and colleagues</span><sup data-dcnode-id="2321"><a aria-label="Reference 28" data-dcnode-id="2322" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d73249396e903" title="Pinilla, A., Tamayo, R. M. &amp; Neira, J. How do induced affective states bias emotional contagion to faces? A three-dimensional model. Front. Psychol. 11, 97. 
                  https://doi.org/10.3389/fpsyg.2020.00097
                  
                 (2020)."><span data-dcnode-id="2323" instrument_node="">28</span></a></sup><span data-dcnode-id="2320" instrument_node=""> indicated that when participants were induced to a positive mood/affective state, they judged both happy and angry faces closer to a positive affective state. In contrast, when participants were induced to a negative mood/affective state, they judged both happy and angry faces closer to a negative affective state.</span></p><p data-dcnode-id="2309"><span data-dcnode-id="2318" instrument_node="">Interestingly vitality forms can be effective also when expressed by non-human agents. Drawing inspiration from human voice and movement, a recent study</span><sup data-dcnode-id="2315"><a aria-label="Reference 29" data-dcnode-id="2316" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d73249396e910" title="Vannucci, F., Di Cesare, G., Rea, F., Sandini, G. &amp; Sciutti, A. A robot with style: Can robotic attitudes influence human actions? In IEEE-RAS 18th International Conference on Humanoid Robots (Humanoids) (2018)."><span data-dcnode-id="2317" instrument_node="">29</span></a></sup><span data-dcnode-id="2314" instrument_node=""> modified a passing action and a voice generated by the humanoid robot iCub, with the aim of transmitting vitality forms. Results showed that the kinematic parameters of the robot's movement and the properties of its voice are adequate to express different attitudes, which are consistently perceived as rude or gentle by human partners. Moreover, the same authors showed that the observation of robotic actions conveying vitality forms (rude and gentle) produced an increase of the BOLD signal in the dorso-central insula, the same sector activated during the perception of vitality forms expressed by humans</span><sup data-dcnode-id="2311"><a aria-label="Reference 30" data-dcnode-id="2312" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d73249396e914" title="Di Cesare, G., Vannucci, F., Rea, F., Sciutti, A. &amp; Sandini, G. How attitudes generated by humanoid robots shape human brain activity. Sci. Rep. 10(1), 16928 (2020)."><span data-dcnode-id="2313" instrument_node="">30</span></a></sup><span data-dcnode-id="2310" instrument_node="">.</span></p><p data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">In conclusion, our data shed new light on the fundamental role of vitality forms in social interactions. We clearly demonstrated how physical and vocal requests conveying different vitality forms modulate the response of the receiver. In particular, when an individual asks us something, his/her positive and negative attitudes, communicated by vitality forms, modulate both our perception and motor behavior. The role of vitality forms in influencing others from an affective state point of view highlights their relevance in social communication. Results and methodology from this study may have implications for social and communicative disorders and other research fields such as robotics.</span></p></div></div></section><span data-dcnode-id="2303" instrument_node="">
