</span><meta content="During the interaction with others, action, speech, and touches can communicate positive, neutral, or negative attitudes. Offering an apple can be gentle or rude, a caress can be kind or rushed. These subtle aspects of social communication have been named vitality forms by Daniel Stern. Although they characterize all human interactions, to date it is not clear whether vitality forms expressed by an agent may affect the action perception and the motor response of the receiver. To this purpose, we carried out a psychophysics study aiming to investigate how perceiving different vitality forms can influence cognitive and motor tasks performed by participants. In particular, participants were stimulated with requests made through a physical contact or vocally and conveying rude or gentle vitality forms, and then they were asked to estimate the end of a passing action observed in a monitor (action estimation task) or to perform an action in front of it (action execution task) with the intention to pass an object to the other person presented in the video. Results of the action estimation task indicated that the perception of a gentle request increased the duration of a rude action subsequently observed, while the perception of a rude request decreased the duration of the same action performed gently. Additionally, during the action execution task, accordingly with the perceived vitality form, participants modulated their motor response." data-dcnode-id="3792" name="dc.description"><span data-dcnode-id="3791" instrument_node="">

</span><div class="c-article-body" data-dcnode-id="1363"><span data-dcnode-id="2833" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="2823" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2824" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2831" id="Abs1"><span data-dcnode-id="2832" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2825" id="Abs1-content"><p data-dcnode-id="2826"><span data-dcnode-id="2830" instrument_node="">During the interaction with others, action, speech, and touches can communicate positive, neutral, or negative attitudes. Offering an apple can be gentle or rude, a caress can be kind or rushed. These subtle aspects of social communication have been named </span><i data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">vitality forms</span></i><span data-dcnode-id="2827" instrument_node=""> by Daniel Stern. Although they characterize all human interactions, to date it is not clear whether vitality forms expressed by an agent may affect the action perception and the motor response of the receiver. To this purpose, we carried out a psychophysics study aiming to investigate how perceiving different vitality forms can influence cognitive and motor tasks performed by participants. In particular, participants were stimulated with requests made through a physical contact or vocally and conveying rude or gentle vitality forms, and then they were asked to estimate the end of a passing action observed in a monitor (action estimation task) or to perform an action in front of it (action execution task) with the intention to pass an object to the other person presented in the video. Results of the action estimation task indicated that the perception of a gentle request increased the duration of a rude action subsequently observed, while the perception of a rude request decreased the duration of the same action performed gently. Additionally, during the action execution task, accordingly with the perceived vitality form, participants modulated their motor response.</span></p></div></div></section><span data-dcnode-id="2822" instrument_node="">
</span><noscript data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">
</span></noscript><span data-dcnode-id="2819" instrument_node="">
</span><section data-dcnode-id="2765" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2766" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2817" id="Sec1"><span data-dcnode-id="2818" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2767" id="Sec1-content"><p data-dcnode-id="2808"><span data-dcnode-id="2816" instrument_node="">Social interactions are characterized by the capacity to communicate our intentions and affective states, and to evaluate those of others. This behavioral exchange is based on actions and speech dynamics of the interactants which have been defined by Daniel Stern with the term “vitality forms”</span><sup data-dcnode-id="2810"><a aria-label="Reference 1" data-dcnode-id="2814" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d73249396e432" title="Stern, D. N. Forms of Vitality Exploring Dynamic Experience in Psychology, Arts, Psychotherapy, and Development (Oxford University Press, 2010)."><span data-dcnode-id="2815" instrument_node="">1</span></a><span data-dcnode-id="2813" instrument_node="">,</span><a aria-label="Reference 2" data-dcnode-id="2811" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d73249396e435" title="Stern, D. N. The Interpersonal World of the Infant (Basic Books, 1985)."><span data-dcnode-id="2812" instrument_node="">2</span></a></sup><span data-dcnode-id="2809" instrument_node="">.</span></p><p data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">Vitality forms represent the way in which actions are performed and words are pronounced (the ‘’how’’) reflecting the agent’s affective state. Indeed, the same action, such as a handshake can be performed kindly or vigorously having a different impact on the receiver. Vitality forms play a fundamental role in social interactions, both from the agent and from the observer point of view. Indeed, these forms of communication provide the observer with essential indications to interact and better understand others. According to Stern (1985, 2010), actions, gestures, words and more generally, human behavior, are always characterized by vitality forms. In the absence of vitality forms, all actions would be similar and devoid of any affective component.</span></p><p data-dcnode-id="2780"><span data-dcnode-id="2805" instrument_node="">In recent years, fMRI studies have investigated the neural bases of these forms of communication, showing that the observation, imagination, and execution of actions conveying vitality forms induce the activity of the dorso-central insula</span><sup data-dcnode-id="2793"><a data-dcnode-id="2803" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d73249396e445" title="Di Cesare, G. et al. The neural correlates of “vitality form” recognition: An fMRI study. Soc. Cogn. Affect. Neurosci. 9, 951–960 (2013)."><span data-dcnode-id="2804" instrument_node="">3</span></a><span data-dcnode-id="2802" instrument_node="">,</span><a data-dcnode-id="2800" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d73249396e445_1" title="Di Cesare, G., Di Dio, C., Marchi, M. &amp; Rizzolatti, G. Expressing and understanding our internal states and those of others. Proc. Natl. Acad. Sci. U. S. A. 112(33), 10331 (2015)."><span data-dcnode-id="2801" instrument_node="">4</span></a><span data-dcnode-id="2799" instrument_node="">,</span><a data-dcnode-id="2797" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d73249396e445_2" title="Di Cesare, G. et al. Vitality form processing in the insula during action observation: A multivoxel pattern analysis. Front. Hum. Neurosci. 10, 267 (2016)."><span data-dcnode-id="2798" instrument_node="">5</span></a><span data-dcnode-id="2796" instrument_node="">,</span><a aria-label="Reference 6" data-dcnode-id="2794" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d73249396e448" title="Di Cesare, G., Marchi, M., Errante, A., Fasano, F. &amp; Rizzolatti, G. Mirroring the social aspects of speech and actions: The role of the insula. Cereb.Cortex 28(4),1348–1357. 
                  https://doi.org/10.1093/cercor/bhx051
                  
                 (2018)."><span data-dcnode-id="2795" instrument_node="">6</span></a></sup><span data-dcnode-id="2792" instrument_node="">. Moreover, the same authors have demonstrated that listening to action verbs pronounced gently or rudely and imaging to pronounce the same verbal material with the same vitality forms activated the parieto-frontal circuit and the dorso-central insula</span><sup data-dcnode-id="2789"><a aria-label="Reference 6" data-dcnode-id="2790" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d73249396e452" title="Di Cesare, G., Marchi, M., Errante, A., Fasano, F. &amp; Rizzolatti, G. Mirroring the social aspects of speech and actions: The role of the insula. Cereb.Cortex 28(4),1348–1357. 
                  https://doi.org/10.1093/cercor/bhx051
                  
                 (2018)."><span data-dcnode-id="2791" instrument_node="">6</span></a></sup><span data-dcnode-id="2788" instrument_node="">. While the activation of the parieto-frontal circuit indicated that individuals internally represented the listening actions communicated by verbs, the activation of insula showed that they also revived the forms of those actions. The activation of the insula during the perception and expression of vitality forms strongly suggests the existence of the mirror mechanism for vitality forms in the dorso-central insula. This mechanism could allow individuals from one side to understand vitality forms communicated by others remapping them on their internal motor schema, from the other to prepare an appropriate motor response</span><sup data-dcnode-id="2782"><a aria-label="Reference 4" data-dcnode-id="2786" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d73249396e456" title="Di Cesare, G., Di Dio, C., Marchi, M. &amp; Rizzolatti, G. Expressing and understanding our internal states and those of others. Proc. Natl. Acad. Sci. U. S. A. 112(33), 10331 (2015)."><span data-dcnode-id="2787" instrument_node="">4</span></a><span data-dcnode-id="2785" instrument_node="">,</span><a aria-label="Reference 6" data-dcnode-id="2783" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d73249396e459" title="Di Cesare, G., Marchi, M., Errante, A., Fasano, F. &amp; Rizzolatti, G. Mirroring the social aspects of speech and actions: The role of the insula. Cereb.Cortex 28(4),1348–1357. 
                  https://doi.org/10.1093/cercor/bhx051
                  
                 (2018)."><span data-dcnode-id="2784" instrument_node="">6</span></a></sup><span data-dcnode-id="2781" instrument_node="">.</span></p><p data-dcnode-id="2774"><span data-dcnode-id="2779" instrument_node="">It is very plausible that, when interacting with others through actions execution and speech production, the gentle or rude vitality forms expressed by the agent may influence the affective state and the motor behavior of the receiver. In order to test this hypothesis, Di Cesare and colleagues (2017) carried out a kinematic study</span><sup data-dcnode-id="2776"><a aria-label="Reference 7" data-dcnode-id="2777" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d73249396e466" title="Di Cesare, G., De Stefani, E., Gentilucci, M. &amp; De Marco, D. Vitality forms expressed by others modulate our own motor response: A kinematic study. Front. Hum. Neurosci. 11(565). 
                  https://doi.org/10.3389/fnhum.2017.00565
                  
                 (2017)."><span data-dcnode-id="2778" instrument_node="">7</span></a></sup><span data-dcnode-id="2775" instrument_node="">. In this study, participants were presented with stimuli showing two requests (take it, give me) expressed gently or rudely and presented in visual, auditory, or mixed modality (visual and auditory). In accordance with the type of request (take it or give me), participants were required to take or give a bottle placed in front of them. Results showed that the gentle or rude vitality forms of the request influenced the individuals’ action execution. In particular, when participants received a rude request they interacted with the object using a higher velocity and a larger trajectory, while when they received a gentle request produced a soft interaction with the object, corresponding to a lower velocity and a smaller trajectory. These data clearly indicate that, during interpersonal interactions, vitality forms expressed by an agent affect the motor behavior of the receiver.</span></p><p data-dcnode-id="2768"><span data-dcnode-id="2773" instrument_node="">Human interactions are based on the capacity to perceive and perform vitality forms. An interesting issue is to understand whether, besides the action execution, vitality forms express by the agent may also affect the perception of the receiver. Indeed, since perception and execution of vitality forms based on the same neural circuit, in the present study we hypothesized that the vitality form of a request (give me) expressed physically and vocally may influence the internal representation of a subsequent action (passing an object), modifying some features such as its time duration. This hypothesis is in line with data provided by another psychophysical study recently carried out by our group</span><sup data-dcnode-id="2770"><a aria-label="Reference 8" data-dcnode-id="2771" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d73249396e474" title="Di Cesare, G., Pelosi, A., Aresta, S., Lombardi, G. &amp; Sciutti, A. Affective contagion: How attitudes expressed by others influence our perception of actions. Front. Hum. Neurosci. 9, 951 (2021)."><span data-dcnode-id="2772" instrument_node="">8</span></a></sup><span data-dcnode-id="2769" instrument_node="">. For this purpose, we carried out a psychophysics experiment consisting of two different tasks. In the first task (Action Estimation Task), participants were presented with video clips showing the initial part of a passing action performed with different vitality forms (rude or gentle) and were asked to continue the action mentally (cognitive task) and estimate the time of its completion by pressing a button. Before the videos’ presentation, participants received two different types of stimulation: a request mediated by a physical contact, during which the robotic manipulandum reproduced a rude or gentle movement on their right arm, or a vocal request (“give me”) pronounced with a rude or gentle voice by two actors (a male and a female). In the second task (Action Execution Task), participants received a request mediated by a physical contact or vocally conveying rude or gentle vitality form and then were required to move actively the handle of the manipulandum with the aim to pass the object to another person showed on the monitor. We hypothesized an effect of gentle and rude vitality forms conveyed through vocal and physical requests (independent variables) on the estimation of action duration (dependent variable of the action estimation task) and on the kinematic parameters (i.e. velocity peak and distance covered) of the passing action performed by participants (dependent variables of the action execution task).</span></p></div></div></section><section data-dcnode-id="2560" data-title="Materials and methods"><div class="c-article-section" data-dcnode-id="2561" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2763" id="Sec2"><span data-dcnode-id="2764" instrument_node="">Materials and methods</span></h2><div class="c-article-section__content" data-dcnode-id="2562" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="2761" id="Sec3"><span data-dcnode-id="2762" instrument_node="">Participants</span></h3><p data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">The experiment was carried out on 18 healthy right-handed volunteers (twelve females and six males; mean age = 24.1&nbsp;years; SD = 2.7&nbsp;years). All participants were native Italian speakers and had normal or corrected-to-normal vision and normal hearing. None reported neurological or cognitive disorders. The study received approval by the ethical committee of Liguria Region (n.222REG2015) and was carried out according to the principles expressed in the Declaration of Helsinki. The participants provided written informed consent.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2757" id="Sec4"><span data-dcnode-id="2758" instrument_node="">Tasks and experimental paradigm</span></h3><p data-dcnode-id="2736"><span data-dcnode-id="2756" instrument_node="">Participants sat in a comfortable chair in front of a monitor, holding the handle of the manipulandum “Braccio di ferro”</span><sup data-dcnode-id="2753"><a aria-label="Reference 9" data-dcnode-id="2754" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d73249396e498" title="Casadio, M., Sanguineti, V., Morasso, P. G. &amp; Arrichiello, V. Braccio di Ferro: A new haptic workstation for neuromotor rehabilitation. Technol. Health Care 13, 1–20 (2006)."><span data-dcnode-id="2755" instrument_node="">9</span></a></sup><span data-dcnode-id="2752" instrument_node=""> with their right hand and wearing a pair of headphones (Fig.&nbsp;</span><a data-dcnode-id="2750" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2751" instrument_node="">1</span></a><span data-dcnode-id="2749" instrument_node="">B1). The monitor was set to a spatial resolution of 1920 × 1080 pixels. The participants were required to perform two main tasks: an </span><i data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">Action Estimation Task</span></i><span data-dcnode-id="2746" instrument_node=""> and an </span><i data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">Action Execution Task</span></i><span data-dcnode-id="2743" instrument_node="">. In the </span><i data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">Action Estimation Task</span></i><span data-dcnode-id="2740" instrument_node=""> participants observed videos in which the right hand of an actor passed an object (a ball, a bottle, a cup or a packet of crackers) to another person represented on the other side of a table (Fig.&nbsp;</span><a data-dcnode-id="2738" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2739" instrument_node="">1</span></a><span data-dcnode-id="2737" instrument_node="">A), with either a gentle or a rude vitality form.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2694" data-test="figure" data-title="Figure 1" id="figure-1"><figure data-dcnode-id="2695"><figcaption data-dcnode-id="2733"><b class="c-article-section__figure-caption" data-dcnode-id="2734" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="2735" instrument_node="">Figure 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2706"><div class="c-article-section__figure-item" data-dcnode-id="2728"><a class="c-article-section__figure-link" data-dcnode-id="2729" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-01924-w/figures/1" rel="nofollow"><picture data-dcnode-id="2730"><source data-dcnode-id="2732" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-01924-w/MediaObjects/41598_2021_1924_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="2731" height="666" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-01924-w/MediaObjects/41598_2021_1924_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2707" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="2708"><span data-dcnode-id="2727" instrument_node="">Visual stimuli (</span><b data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">A</span></b><span data-dcnode-id="2724" instrument_node="">): the total duration was respectively 700&nbsp;ms for rude actions and 1200&nbsp;ms for gentle actions. The stimuli consisted in presenting the 35% of the entire duration: 250&nbsp;ms for rude actions (red color) and 420&nbsp;ms for gentle actions (blue color). Example of a participant during the experiment (</span><b data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">B1</span></b><span data-dcnode-id="2721" instrument_node="">). </span><i data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">Action Estimation Task</span></i><span data-dcnode-id="2718" instrument_node=""> (</span><b data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">B2</span></b><span data-dcnode-id="2715" instrument_node="">): (1) participants observed the initial part of a passing action, (2) the action was obscured, (3) they continued the action mentally estimating the time of its conclusion. </span><i data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">Action Execution Task</span></i><span data-dcnode-id="2712" instrument_node=""> (</span><b data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">B3</span></b><span data-dcnode-id="2709" instrument_node="">): (1) starting position, (2) a static image of an actor appeared, (3) participants performed the passage moving the handle.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2696"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="2697" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-01924-w/figures/1" rel="nofollow"><span data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2698" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2699" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2700" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2703" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2702" fill-rule="evenodd"></path><span data-dcnode-id="2701" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2650"><span data-dcnode-id="2693" instrument_node="">This egocentric perspective allowed participants to get involved in the action. More specifically, video stimuli consisted of showing only an initial part (35%) of the entire passing action, corresponding to 250&nbsp;ms for rude actions (Fig.&nbsp;</span><a data-dcnode-id="2691" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2692" instrument_node="">1</span></a><span data-dcnode-id="2690" instrument_node="">A, red color) and to 420&nbsp;ms for gentle actions (Fig.&nbsp;</span><a data-dcnode-id="2688" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2689" instrument_node="">1</span></a><span data-dcnode-id="2687" instrument_node="">A, blue color). After these durations, actions were obscured and participants were asked to continue them mentally, indicating the time of their conclusion by pressing a button located on the handle of the manipulandum (Fig.&nbsp;</span><a data-dcnode-id="2685" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2686" instrument_node="">1</span></a><span data-dcnode-id="2684" instrument_node="">B2). In the </span><i data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Action Execution Task</span></i><span data-dcnode-id="2681" instrument_node=""> participants were instead presented with a static image of the same actors and were required to move actively the handle in front of them with the intention to pass an object. (Fig.&nbsp;</span><a data-dcnode-id="2679" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2680" instrument_node="">1</span></a><span data-dcnode-id="2678" instrument_node="">B3). The experiment was composed of five runs (Fig.&nbsp;</span><a data-dcnode-id="2676" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2677" instrument_node="">2</span></a><span data-dcnode-id="2675" instrument_node="">). In the Baseline run participants simply estimated the duration of actions. In the Estimation Physical Request run a physical request preceded the action estimation task: first, the manipulandum moved the participants’ arm gently or rudely and subsequently, they observed the initial part of the action and estimated its end. In the Action Physical Request run after receiving the physical request executed gently or rudely by the manipulandum, participants performed the action execution task, moving actively the handle towards the actor/actress. In the remaining runs requests were vocal. In particular, in the Estimation Vocal Request run participants listened to a voice pronouncing “give me” in a gentle or rude way and then they executed the action estimation task. Finally, in the Action Vocal Request run after receiving the vocal request expressed gently or rudely, participants performed the action execution task. With the purpose of avoiding a bias due to the runs order effect, the presentation order of experimental runs was balanced across participants. Nine participants started with the runs presenting a vocal request followed by the runs presenting a physical request. Nine participants started with the runs presenting a physical request followed by the runs presenting a vocal request. The stimuli presented randomly in the Baseline run were 24: 12 rude actions and 12 gentle actions, presented at the beginning of the experiment. In each of the two “Estimation” runs a random presentation of congruent and incongruent conditions was created to evaluate the influence of vitality forms characterizing the request on the action estimation task. This means that the requests (physical or vocal) and the following action stimuli could share the same vitality form (</span><i data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">rude</span></i><span data-dcnode-id="2672" instrument_node=""> request—</span><i data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">rude</span></i><span data-dcnode-id="2669" instrument_node=""> action or </span><i data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">gentle</span></i><span data-dcnode-id="2666" instrument_node=""> request—</span><i data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">gentle</span></i><span data-dcnode-id="2663" instrument_node=""> action) or could have opposite vitality form (</span><i data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">rude</span></i><span data-dcnode-id="2660" instrument_node=""> request—</span><i data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">gentle</span></i><span data-dcnode-id="2657" instrument_node=""> action or </span><i data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">gentle</span></i><span data-dcnode-id="2654" instrument_node=""> request—</span><i data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">rude</span></i><span data-dcnode-id="2651" instrument_node=""> action).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2626" data-test="figure" data-title="Figure 2" id="figure-2"><figure data-dcnode-id="2627"><figcaption data-dcnode-id="2647"><b class="c-article-section__figure-caption" data-dcnode-id="2648" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="2649" instrument_node="">Figure 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2638"><div class="c-article-section__figure-item" data-dcnode-id="2642"><a class="c-article-section__figure-link" data-dcnode-id="2643" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-01924-w/figures/2" rel="nofollow"><picture data-dcnode-id="2644"><source data-dcnode-id="2646" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-01924-w/MediaObjects/41598_2021_1924_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="2645" height="673" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-01924-w/MediaObjects/41598_2021_1924_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2639" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Experimental paradigm. For each run, the green fixation cross (Start, 2000&nbsp;ms) indicated the beginning of a new trial. In the Baseline run and in the two Estimation runs (2nd and 4th rows) participants observed the initial part of the action (Observation), then the monitor turned black (Estimation, 0–2000&nbsp;ms), and when they pressed the button on the handle to estimate the action conclusion a white fixation cross appeared (Rest, 2000&nbsp;ms). In the two Action runs (3rd and 5th rows), when a static image of an actor/actress appeared (Pass the object), participants moved actively the handle in front of them. At the end of the passage, the manipulandum moved passively the arm at the starting position and the white fixation cross appeared (Rest, 2000&nbsp;ms). The panel with the manipulandum icon (Physical Request) indicated that a physical request preceded the subsequent task. The panel with the audio icon indicated that a vocal request preceded the subsequent task. Red color corresponds to rude vitality forms while blue color corresponds to gentle vitality forms.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2628"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="2629" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-01924-w/figures/2" rel="nofollow"><span data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2630" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2631" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2632" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2635" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2634" fill-rule="evenodd"></path><span data-dcnode-id="2633" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">In particular, each of these runs presented 48 stimuli consisting of: 12 rude requests followed by rude actions (congruent condition), 12 rude requests followed by gentle actions (incongruent condition), 12 gentle requests followed by gentle actions (congruent condition), 12 gentle requests followed by rude actions (incongruent condition).</span></p><p data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Finally, each of the two “Action” runs presented in a random order 24 stimuli: 12 rude requests and 12 gentle requests. Thus, we manipulated gentle and rude vitality forms (independent variables) to test their effect on the action estimated duration (dependent variable of the action estimation task) and the kinematic parameters of passing actions performed by participants (dependent variables of the action execution task).</span></p><p data-dcnode-id="2614"><span data-dcnode-id="2621" instrument_node="">For each run, a period of rest of two seconds was inserted between trials and it was marked by a white fixation cross on a black background to keep attention on the screen. Before the beginning of a new trial the white cross turned green. PsychoPy v3.0 software was used to present video stimuli and to record participants’ answers during the action estimation task. Physical requests were instead implemented and controlled through the software environment RT-Lab, integrated with MATLAB/Simulink. RT-Lab included a 100&nbsp;Hz loop for data storage, which permitted to collect the hand trajectories during the action execution task. The kinematic data recorded were analyzed using MATLAB (R2020b). Particularly, action velocity was estimated by using a third order Savitzky–Golay smoothing filter. Action velocity curves were obtained considering the time interval between the end of each request (starting position, Fig.&nbsp;</span><a data-dcnode-id="2619" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2620" instrument_node="">1</span></a><span data-dcnode-id="2618" instrument_node="">B3.1) and the moment in which participants completed their passing action (ending position, Fig.&nbsp;</span><a data-dcnode-id="2616" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2617" instrument_node="">1</span></a><span data-dcnode-id="2615" instrument_node="">B3.3).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2612" id="Sec5"><span data-dcnode-id="2613" instrument_node="">Physical and vocal stimuli</span></h3><p data-dcnode-id="2604"><span data-dcnode-id="2611" instrument_node="">As described in the previous section, participants could be physically or vocally stimulated before performing action duration estimation or action execution tasks. The physical parameters (velocity and trajectory) used to implement the physical request were derived from a previous kinematic recording in which an actor was asked to move the handle in a rude or gentle way. This procedure allowed us to generate a robotic movement that faithfully reproduced human vitality forms (rude and gentle). The stimuli performed through the manipulandum consisted of displacements on the horizontal plane starting from the coordinate (0&nbsp;m, −&nbsp;0.1&nbsp;m) of the workspace. For each physical request, the arm of participants was moved in the right direction and returned to the starting position. This robotic movement was completely different in terms of direction from those observed/executed by participants, avoiding a possible motor imitation effect between physical requests (frontal direction) and participants’ movements (rightward). Rude and gentle requests were presented in a random order and differed for trajectory and velocity. Additionally, in order to exclude a phenomenon of adaptation, for each vitality (rude and gentle) the manipulandum performed three movements with the same velocity (Fig.&nbsp;</span><a data-dcnode-id="2609" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2610" instrument_node="">3</span></a><span data-dcnode-id="2608" instrument_node="">B2), but with a small angular shift among them (−&nbsp;10°, 0°, + 10°; Fig.&nbsp;</span><a data-dcnode-id="2606" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2607" instrument_node="">3</span></a><span data-dcnode-id="2605" instrument_node="">B1).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2568" data-test="figure" data-title="Figure 3" id="figure-3"><figure data-dcnode-id="2569"><figcaption data-dcnode-id="2601"><b class="c-article-section__figure-caption" data-dcnode-id="2602" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="2603" instrument_node="">Figure 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2580"><div class="c-article-section__figure-item" data-dcnode-id="2596"><a class="c-article-section__figure-link" data-dcnode-id="2597" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-01924-w/figures/3" rel="nofollow"><picture data-dcnode-id="2598"><source data-dcnode-id="2600" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-01924-w/MediaObjects/41598_2021_1924_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="2599" height="415" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-01924-w/MediaObjects/41598_2021_1924_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2581" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="2582"><span data-dcnode-id="2595" instrument_node="">Physical properties of stimuli. Wave amplitude (</span><b data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">A1</span></b><span data-dcnode-id="2592" instrument_node="">) and pitch (</span><b data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">A2</span></b><span data-dcnode-id="2589" instrument_node="">) of rude (red) and gentle (blue) vocal requests for the male and the female voice. Spatial trajectories of the motions performed by the manipulandum to provide rude (red lines) or gentle (blue lines) physical requests (</span><b data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">B1</span></b><span data-dcnode-id="2586" instrument_node="">). Velocity module of rude (red line) and gentle (blue line) physical requests (</span><b data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">B2</span></b><span data-dcnode-id="2583" instrument_node="">).</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2570"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="2571" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-01924-w/figures/3" rel="nofollow"><span data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2572" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2573" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2574" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2577" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2576" fill-rule="evenodd"></path><span data-dcnode-id="2575" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2563"><span data-dcnode-id="2567" instrument_node="">The rude request lasted 800&nbsp;ms with a maximum displacement of 22&nbsp;cm in the x-direction (right side). In contrast, the gentle request lasted 3000&nbsp;ms with a maximum displacement of 10&nbsp;cm in the same x-direction. On the other hand, during the vocal request participants listened to a male or a female voice pronouncing the Italian verb “dammi” (“give me”) in either a rude or a gentle way. Each vocal request was recorded using a condenser microphone (RODE NT1) placed 30&nbsp;cm in front of the actors and digitized with a phantom powered A/D converter module (M-AUDIO M-TRACK). After recording, the audio files were processed with COOL EDIT PRO software. Rude and gentle vocal requests differed for parameters such as the wave amplitude and the pitch (Fig.&nbsp;</span><a data-dcnode-id="2565" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2566" instrument_node="">3</span></a><span data-dcnode-id="2564" instrument_node="">A1, A2).</span></p></div></div></section><section data-dcnode-id="2433" data-title="Results"><div class="c-article-section" data-dcnode-id="2434" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2558" id="Sec6"><span data-dcnode-id="2559" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="2435" id="Sec6-content"><h3 class="c-article__sub-heading" data-dcnode-id="2556" id="Sec7"><span data-dcnode-id="2557" instrument_node="">Action estimation task</span></h3><p data-dcnode-id="2533"><span data-dcnode-id="2555" instrument_node="">Considering the participants’ responses (estimated action duration) we measured the presence of possible differences between rude and gentle requests for both physical and vocal modalities. Specifically, the participants’ responses obtained after physical and vocal requests were normalized to the baseline condition (Estimated action duration (%) = estimated action duration after request *100/estimated action duration during baseline condition), obtaining percentage values as shown in Fig.&nbsp;</span><a data-dcnode-id="2553" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="2554" instrument_node="">4</span></a><span data-dcnode-id="2552" instrument_node="">. Then, four paired sample t-tests (two for gentle action estimation and two for rude action estimation) were carried out to assess possible differences between congruent and incongruent conditions, after physical (PHY) or vocal (VOC) requests. The significance level was fixed at </span><i data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">p</span></i><span data-dcnode-id="2549" instrument_node=""> = 0.05. Before performing statistical analysis, the sphericity of data was verified (Mauchly’s test, </span><i data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">p</span></i><span data-dcnode-id="2546" instrument_node=""> &gt; 0.05). All variables were normally distributed (Kolmogorov–Smirnov Test, </span><i data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">p</span></i><span data-dcnode-id="2543" instrument_node=""> &gt; 0.05). Results showed a significant difference between congruent and incongruent conditions, for both gentle and rude vitality forms, regardless of the type of request (</span><i data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">p</span></i><span data-dcnode-id="2540" instrument_node=""> &lt; 0.05, Fig.&nbsp;</span><a data-dcnode-id="2538" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="2539" instrument_node="">4</span></a><span data-dcnode-id="2537" instrument_node="">A, B; for details see also </span><a data-dcnode-id="2535" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2536" instrument_node="">supplementary material</span></a><span data-dcnode-id="2534" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2485" data-test="figure" data-title="Figure 4" id="figure-4"><figure data-dcnode-id="2486"><figcaption data-dcnode-id="2530"><b class="c-article-section__figure-caption" data-dcnode-id="2531" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="2532" instrument_node="">Figure 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2497"><div class="c-article-section__figure-item" data-dcnode-id="2525"><a class="c-article-section__figure-link" data-dcnode-id="2526" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-01924-w/figures/4" rel="nofollow"><picture data-dcnode-id="2527"><source data-dcnode-id="2529" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-01924-w/MediaObjects/41598_2021_1924_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="2528" height="210" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-01924-w/MediaObjects/41598_2021_1924_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2498" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="2499"><span data-dcnode-id="2524" instrument_node="">Results of gentle (</span><b data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">A</span></b><span data-dcnode-id="2521" instrument_node="">) and rude (</span><b data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">B</span></b><span data-dcnode-id="2518" instrument_node="">) action estimation. Estimated action durations normalized to the baseline condition are reported on the y-coordinate. The dotted line in correspondence of 100% refers to the baseline. </span><i data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">PHY</span></i><span data-dcnode-id="2515" instrument_node=""> physical request, </span><i data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">VOC</span></i><span data-dcnode-id="2512" instrument_node=""> vocal request, </span><i data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">GT</span></i><span data-dcnode-id="2509" instrument_node=""> gentle vitality form, </span><i data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">RD</span></i><span data-dcnode-id="2506" instrument_node=""> rude vitality form. Vertical bars represent the standard errors (SE). Horizontal bars indicate statistical significance (**</span><i data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">p</span></i><span data-dcnode-id="2503" instrument_node=""> &lt; 0.01, ***</span><i data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">p</span></i><span data-dcnode-id="2500" instrument_node=""> &lt; 0.001). Effect of rude requests on gentle action estimation.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2487"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="2488" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-01924-w/figures/4" rel="nofollow"><span data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2489" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2490" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2491" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2494" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2493" fill-rule="evenodd"></path><span data-dcnode-id="2492" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2483" id="Sec8"><span data-dcnode-id="2484" instrument_node="">Action execution task</span></h3><p data-dcnode-id="2466"><span data-dcnode-id="2482" instrument_node="">The action parameters characterizing the passage performed by participants after physical and vocal requests were normalized to the baseline condition as described above, obtaining percentage values as shown in Fig.&nbsp;</span><a data-dcnode-id="2480" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="2481" instrument_node="">5</span></a><span data-dcnode-id="2479" instrument_node="">A and B. Then, four paired sample t-tests (two for action velocity peak and two for distance covered after requests) were carried out to assess possible differences between actions performed by participants after physical (PHY) or vocal (VOC) requests. Results showed a significant difference between actions performed after rude and gentle requests, regardless the type of request (</span><i data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">p</span></i><span data-dcnode-id="2476" instrument_node=""> &lt; 0.001 as shown in Fig.&nbsp;</span><a data-dcnode-id="2474" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="2475" instrument_node="">5</span></a><span data-dcnode-id="2473" instrument_node="">A, B; for details see also </span><a data-dcnode-id="2471" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2472" instrument_node="">supplementary material</span></a><span data-dcnode-id="2470" instrument_node="">). This difference is also highlighted in Fig.&nbsp;</span><a data-dcnode-id="2468" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="2469" instrument_node="">5</span></a><span data-dcnode-id="2467" instrument_node="">C and D, which shows the mean action velocity curves of participants in response to gentle and rude requests (physical and vocal).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2436" data-test="figure" data-title="Figure 5" id="figure-5"><figure data-dcnode-id="2437"><figcaption data-dcnode-id="2463"><b class="c-article-section__figure-caption" data-dcnode-id="2464" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="2465" instrument_node="">Figure 5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2448"><div class="c-article-section__figure-item" data-dcnode-id="2458"><a class="c-article-section__figure-link" data-dcnode-id="2459" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-01924-w/figures/5" rel="nofollow"><picture data-dcnode-id="2460"><source data-dcnode-id="2462" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-01924-w/MediaObjects/41598_2021_1924_Fig5_HTML.png?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="2461" height="439" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-01924-w/MediaObjects/41598_2021_1924_Fig5_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2449" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="2450"><span data-dcnode-id="2457" instrument_node="">Action velocity peak (</span><b data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">A</span></b><span data-dcnode-id="2454" instrument_node="">) and distance covered (</span><b data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">B</span></b><span data-dcnode-id="2451" instrument_node="">) after request normalized to the baseline condition. Red color refers to rude requests (RD) and blue color refers to gentle requests (GT), both expressed physically (PHY) or vocally (VOC). Graphs in the middle show the action velocity curve characterizing the passage performed by participants after a physical (C) or a vocal (D) request. Error shading indicate standard error of the mean.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2438"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="2439" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-01924-w/figures/5" rel="nofollow"><span data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2440" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2441" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2442" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2445" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2444" fill-rule="evenodd"></path><span data-dcnode-id="2443" instrument_node="">
</span></a></div></figure></div></div></div></section><section data-dcnode-id="2304" data-title="Discussion"><div class="c-article-section" data-dcnode-id="2305" id="Sec9-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2431" id="Sec9"><span data-dcnode-id="2432" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="2306" id="Sec9-content"><p data-dcnode-id="2426"><span data-dcnode-id="2430" instrument_node="">Vitality forms represent a fundamental aspect of social communication allowing people to express their mood/attitude and to understand immediately those of others. For example, according to a positive or negative mood of the agent, an action can be performed as gentle or rude towards another individual. In spite of their pervasiveness in human interactions, the influence of vitality forms on action perception has never been addressed. In this view, the aim of the present study was twofold: 1) to investigate whether and how vitality forms expressed physically or vocally by an agent may affect the participants’ responses during a cognitive task (action estimation task); 2) to assess how the same requests may modulate the kinematic parameters of a subsequent action (passing an object; action execution task). Results indicated that, during the action estimation task, a gentle request, independently of its modality (through physical contact or vocally) increased the duration of the subsequent action observed by participants. In contrast, a rude request affected the perception of an action subsequently presented, decreasing its perceived duration. More specifically, when participants observed the initial part of a gentle action but were previously stimulated with a rude request (incongruent condition), they anticipated the end of this action compared to the same action presented during the congruent condition (gentle request, gentle action). On the other hand, when they observed the initial part of a rude action but were previously stimulated with a gentle request (incongruent condition</span><b data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">)</span></b><span data-dcnode-id="2427" instrument_node="">, they perceived this action as lasting longer compared to the same action presented in the congruent condition (rude request, rude action). Moreover, results of the action execution task indicated that, for both physical and vocal requests, the perception of vitality forms modulated the kinematic parameters (i.e., velocity and distance covered) of the subsequent action performed by participants. In particular, after a rude request, their action (passing the object) had a higher velocity peak and covered a bigger distance. In contrast, after a gentle request, the same action was performed with a lower velocity peak and covered a smaller distance.</span></p><p data-dcnode-id="2416"><span data-dcnode-id="2425" instrument_node="">Taken together, these findings highlight the important role of vitality forms during social interactions, showing how a simple request expressed gently or rudely influence the perception and the motor behavior of the receiver. Interestingly, this modulation effect played by vitality forms on the receiver also occurred when participants listened to the vocal request, suggesting that this influence cannot be merely ascribed to a motor imitation mechanism. These findings are in line with data provided by two psychophysical studies recently carried out by our group</span><sup data-dcnode-id="2422"><a aria-label="Reference 8" data-dcnode-id="2423" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d73249396e826" title="Di Cesare, G., Pelosi, A., Aresta, S., Lombardi, G. &amp; Sciutti, A. Affective contagion: How attitudes expressed by others influence our perception of actions. Front. Hum. Neurosci. 9, 951 (2021)."><span data-dcnode-id="2424" instrument_node="">8</span></a></sup><span data-dcnode-id="2421" instrument_node=""> where participants listened to gentle/rude vocal requests and then observed the initial part of a passing action consisting in different durations (200&nbsp;ms, 250&nbsp;ms, 300&nbsp;ms, 350&nbsp;ms for rude actions; 340&nbsp;ms, 420&nbsp;ms, 500&nbsp;ms, 600&nbsp;ms for gentle actions). As in the present study, once the action was obscured, participants were required to continue it mentally, indicating its end (action estimation task of the present study)</span><sup data-dcnode-id="2418"><a aria-label="Reference 8" data-dcnode-id="2419" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d73249396e830" title="Di Cesare, G., Pelosi, A., Aresta, S., Lombardi, G. &amp; Sciutti, A. Affective contagion: How attitudes expressed by others influence our perception of actions. Front. Hum. Neurosci. 9, 951 (2021)."><span data-dcnode-id="2420" instrument_node="">8</span></a></sup><span data-dcnode-id="2417" instrument_node="">. Results showed that listening to rude/gentle vocal requests influenced the perception of actions subsequently observed. In addition, the same authors quantified the duration of this effect adding five time delays (0&nbsp;ms, 200&nbsp;ms, 400&nbsp;ms, 800&nbsp;ms, 1200&nbsp;ms, 1600&nbsp;ms) between the vocal request and the video’s presentation, finding that the effect lasted 800&nbsp;ms and then started to decay.</span></p><p data-dcnode-id="2372"><span data-dcnode-id="2415" instrument_node="">All together, these findings suggest that vitality forms expressed by an agent automatically influence the perception of a subsequent action observed by the receiver. An interesting question is to understand how it is possible. When an individual observes an action performed by other individuals, he/she is able to understand their action-goal as well as their intentions. This ability depends on the existence of a brain network named action-observation network (AON) selectively activated during the observation of arm/hand actions. This AON network consists of three bilateral cortical areas that are reciprocally connected: the ventral premotor cortex, inferior parietal lobule and superior temporal sulcus</span><sup data-dcnode-id="2409"><a aria-label="Reference 10" data-dcnode-id="2413" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d73249396e837" title="Kilner, J. M. &amp; Frith, C. D. Action observation: Inferring intentions without mirror neurons. Curr. Biol. 18(1), R32–R33. 
                  https://doi.org/10.1016/j.cub.2007.11.008
                  
                 (2008)."><span data-dcnode-id="2414" instrument_node="">10</span></a><span data-dcnode-id="2412" instrument_node="">,</span><a aria-label="Reference 11" data-dcnode-id="2410" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d73249396e840" title="Kilner, J. M. More than one pathway to action understanding. Trends Cogn. Sci. 15(8), 352–357. 
                  https://doi.org/10.1016/j.tics.2011.06.005
                  
                 (2011)."><span data-dcnode-id="2411" instrument_node="">11</span></a></sup><span data-dcnode-id="2408" instrument_node="">. In the last years, several fMRI studies carried out by our group showed that the observation of hand action performed with different vitality forms (gentle/rude) besides the activation of AON network produced the activation of the dorso-central insula</span><sup data-dcnode-id="2378"><a data-dcnode-id="2406" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d73249396e844" title="Di Cesare, G. et al. The neural correlates of “vitality form” recognition: An fMRI study. Soc. Cogn. Affect. Neurosci. 9, 951–960 (2013)."><span data-dcnode-id="2407" instrument_node="">3</span></a><span data-dcnode-id="2405" instrument_node="">,</span><a data-dcnode-id="2403" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d73249396e844_1" title="Di Cesare, G., Di Dio, C., Marchi, M. &amp; Rizzolatti, G. Expressing and understanding our internal states and those of others. Proc. Natl. Acad. Sci. U. S. A. 112(33), 10331 (2015)."><span data-dcnode-id="2404" instrument_node="">4</span></a><span data-dcnode-id="2402" instrument_node="">,</span><a data-dcnode-id="2400" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d73249396e844_2" title="Di Cesare, G. et al. Vitality form processing in the insula during action observation: A multivoxel pattern analysis. Front. Hum. Neurosci. 10, 267 (2016)."><span data-dcnode-id="2401" instrument_node="">5</span></a><span data-dcnode-id="2399" instrument_node="">,</span><a data-dcnode-id="2397" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d73249396e844_3" title="Di Cesare, G., Marchi, M., Errante, A., Fasano, F. &amp; Rizzolatti, G. Mirroring the social aspects of speech and actions: The role of the insula. Cereb.Cortex 28(4),1348–1357. 
                  https://doi.org/10.1093/cercor/bhx051
                  
                 (2018)."><span data-dcnode-id="2398" instrument_node="">6</span></a><span data-dcnode-id="2396" instrument_node="">,</span><a aria-label="Reference 7" data-dcnode-id="2394" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d73249396e847" title="Di Cesare, G., De Stefani, E., Gentilucci, M. &amp; De Marco, D. Vitality forms expressed by others modulate our own motor response: A kinematic study. Front. Hum. Neurosci. 11(565). 
                  https://doi.org/10.3389/fnhum.2017.00565
                  
                 (2017)."><span data-dcnode-id="2395" instrument_node="">7</span></a><span data-dcnode-id="2393" instrument_node="">,</span><a data-dcnode-id="2391" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d73249396e850" title="Di Cesare, G., Gerbella, M. &amp; Rizzolatti, G. The neural bases of vitality forms. Natl. Sci. Rev. 7(1), 202–213 (2020)."><span data-dcnode-id="2392" instrument_node="">12</span></a><span data-dcnode-id="2390" instrument_node="">,</span><a data-dcnode-id="2388" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d73249396e850_1" title="Di Cesare, G., Fasano, F., Errante, A., Marchi, M. &amp; Rizzolatti, G. Understanding the internal states of others by listening to action verbs. Neuropsychologia 89, 172–179 (2016)."><span data-dcnode-id="2389" instrument_node="">13</span></a><span data-dcnode-id="2387" instrument_node="">,</span><a data-dcnode-id="2385" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d73249396e850_2" title="Di Cesare, G., Marchi, M., Pinardi, C. &amp; Rizzolatti, R. Understanding the attitude of others by hearing action sounds: The role of the insula. Sci. Rep. 9(1), 14430 (2019)."><span data-dcnode-id="2386" instrument_node="">14</span></a><span data-dcnode-id="2384" instrument_node="">,</span><a data-dcnode-id="2382" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d73249396e850_3" title="Rizzolatti, G., D’Alessio, A., Marchi, M. &amp; Di Cesare, G. The neural bases of tactile vitality forms and their modulation by
social context. Sci. Rep.  11(1), 9095. 
                  https://doi.org/10.1038/s41598-021-87919-z
                  
                 (2021)."><span data-dcnode-id="2383" instrument_node="">15</span></a><span data-dcnode-id="2381" instrument_node="">,</span><a aria-label="Reference 16" data-dcnode-id="2379" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d73249396e853" title="Di Cesare, G. et al. The middle cingulate cortex and dorso-central insula: A mirror circuit encoding observation and execution of vitality forms. Proc. Natl. Acad. Sci. U. S. A. 118, e2111358118 (2021)."><span data-dcnode-id="2380" instrument_node="">16</span></a></sup><span data-dcnode-id="2377" instrument_node="">. Notably, this cortical area is involved during both the observation and the execution of different vitality forms. Tract-tracing investigations carried out in monkeys and humans showed that the dorso-central insula is connected with the arm-and-hand control circuit (AON)</span><sup data-dcnode-id="2374"><a aria-label="Reference 12" data-dcnode-id="2375" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d73249396e857" title="Di Cesare, G., Gerbella, M. &amp; Rizzolatti, G. The neural bases of vitality forms. Natl. Sci. Rev. 7(1), 202–213 (2020)."><span data-dcnode-id="2376" instrument_node="">12</span></a></sup><span data-dcnode-id="2373" instrument_node="">. In this view, it is plausible that this area may transforms the vitality form information into a motor domain allowing individuals, from one side to understand vitality forms expressed by the agent, from the other, to prepare an adequate response to a subsequent action.</span></p><p data-dcnode-id="2366"><span data-dcnode-id="2371" instrument_node="">One may hypothesize that the affective contagion of the vocal request on the action perception may be ascribed to a potential arousal effect. Specifically, it is easy to assert that listening to a rude voice conveying a rude request may induce the receiver to assume an alert state, making his response faster. However, this hypothesis is not supported by results obtained during the estimation of gentle actions. Indeed, although participants were required to estimate the duration of rude actions, the gentle request induced them to estimate the actions as lasting longer. This view is also corroborated by recent findings showing that the effect of gentle vocal request on rude action estimation was significantly greater than the effect of rude vocal request on gentle action estimation indicating that the effect of vitality forms on action estimation was not merely due to an arousal effect</span><sup data-dcnode-id="2368"><a aria-label="Reference 8" data-dcnode-id="2369" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d73249396e864" title="Di Cesare, G., Pelosi, A., Aresta, S., Lombardi, G. &amp; Sciutti, A. Affective contagion: How attitudes expressed by others influence our perception of actions. Front. Hum. Neurosci. 9, 951 (2021)."><span data-dcnode-id="2370" instrument_node="">8</span></a></sup><span data-dcnode-id="2367" instrument_node="">.</span></p><p data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">Notably, during social interactions, the agent can communicate his attitude to the receiver in different ways such as facial expressions, body postures and of course the voice tone. In contrast, in the present study participants perceived only a vocal request pronounced gently and rudely. This limitation could have minimized the effect of the vitality forms on the participants. Indeed, in a realistic scenario, it is plausible that the vitality forms effect may have a stronger impact on the receiver than that found in our study. Another important limitation concerns the fact that the experiment was carried out on European individuals. Indeed, it is plausible that people from different cultures may express positive and negative attitudes towards others in different ways. For example, Caucasian, Asian, and African people are characterized by a different tone of voice that could have a different impact on the receiver.</span></p><p data-dcnode-id="2349"><span data-dcnode-id="2363" instrument_node="">A strong point of this research is that it highlights that actions and pronounced words are characterized by two distinct components: the content (goal) and the form (how the goal is achieved). While the most part of previous studies, for the best of our knowledge, aimed to investigate the action goal (what), our study represents the first attempt to assess the ability in encoding the action form (how). Specifically, our results indicate that observing a very small part of an action, the observer is able to capture immediately the vitality form of that action. It is plausible that, during the task, participants processed the action kinematic information and remapped them on their own motor schema. This remapping process have probably permitted to represent internally the vitality forms of the observed action, preparing an adequate response</span><sup data-dcnode-id="2351"><a data-dcnode-id="2361" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d73249396e875" title="Chartrand, T. L. &amp; Bargh, J. A. The chameleon effect: The perception behavior link and social interaction. J. Personal. Soc. Psychol. 76, 893–910 (1999)."><span data-dcnode-id="2362" instrument_node="">17</span></a><span data-dcnode-id="2360" instrument_node="">,</span><a data-dcnode-id="2358" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d73249396e875_1" title="Iacoboni, M. Imitation, empathy, and mirror neurons. Annu. Rev. Psychol. 60, 653–670. 
                  https://doi.org/10.1146/annurev.psych.60.110707.163604
                  
                 (2009)."><span data-dcnode-id="2359" instrument_node="">18</span></a><span data-dcnode-id="2357" instrument_node="">,</span><a data-dcnode-id="2355" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d73249396e875_2" title="Heyes, C. Automatic imitation. Psychol. Bull. 137, 463–483. 
                  https://doi.org/10.1037/a0022288
                  
                 (2011)."><span data-dcnode-id="2356" instrument_node="">19</span></a><span data-dcnode-id="2354" instrument_node="">,</span><a aria-label="Reference 20" data-dcnode-id="2352" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d73249396e878" title="Bisio, A. et al. Motor contagion during human–human and human–robot interaction. PLoS ONE 9, e106172. 
                  https://doi.org/10.1371/journal.pone.0106172
                  
                 (2014)."><span data-dcnode-id="2353" instrument_node="">20</span></a></sup><span data-dcnode-id="2350" instrument_node="">.</span></p><p data-dcnode-id="2319"><span data-dcnode-id="2348" instrument_node="">Findings provided by the present study on the influence of vitality forms on others, extend the knowledge on the role of the affective states on the affective contagion of others. Previous studies showed how the perception of facial mimicry</span><sup data-dcnode-id="2336"><a data-dcnode-id="2346" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d73249396e885" title="Dimberg, U. Facial reactions to facial expressions. Psychophysiology 19, 643–647. 
                  https://doi.org/10.1111/j.1469-8986.1982.tb02516.x
                  
                 (1982)."><span data-dcnode-id="2347" instrument_node="">21</span></a><span data-dcnode-id="2345" instrument_node="">,</span><a data-dcnode-id="2343" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d73249396e885_1" title="Dimberg, U. &amp; Thunberg, M. Empathy, emotional contagion, and rapid facial reactions to angry and happy facial expressions. Psych J. 1, 118–127. 
                  https://doi.org/10.1002/pchj.4
                  
                 (2012)."><span data-dcnode-id="2344" instrument_node="">22</span></a><span data-dcnode-id="2342" instrument_node="">,</span><a data-dcnode-id="2340" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d73249396e885_2" title="Dimberg, U., Thunberg, M. &amp; Elmehed, K. Unconscious facial reactions to emotional facial expressions. Psychol. Sci. 11, 86–89.
