x=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small.jpg"><img alt="FEATURE PERCEPTION  Stock_000025237954Small" class="alignright size-medium wp-image-11232 lazyloaded" data-dcnode-id="469" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small-300x300.jpg" data-srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small-300x300.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small-150x150.jpg 150w, https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small-500x500.jpg 500w, https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small-350x350.jpg 350w, https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small.jpg 693w" height="300" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small-300x300.jpg&amp;raw" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small-300x300.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small-150x150.jpg 150w, https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small-500x500.jpg 500w, https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small-350x350.jpg 350w, https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small.jpg 693w" width="300"><noscript data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">&lt;img class="alignright size-medium wp-image-11232" src="https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small-300x300.jpg" alt="FEATURE PERCEPTION  Stock_000025237954Small" width="300" height="300" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small-300x300.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small-150x150.jpg 150w, https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small-500x500.jpg 500w, https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small-350x350.jpg 350w, https://jonlieffmd.com/wp-content/uploads/2015/04/FEATURE-PERCEPTION-Stock_000025237954Small.jpg 693w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></a><span data-dcnode-id="465" instrument_node="">An extensive literature reveals that expectation determines perceptions, but it is not clear how. </span><a data-dcnode-id="463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/blog/what-color-is-the-dress" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="464" instrument_node="">Previous posts </span></a><span data-dcnode-id="462" instrument_node="">have documented many findings that support this notion and a summary is listed below. But, how does the brain use mental concepts to modulate and determine what we think we see? </span></strong></p><p data-dcnode-id="457"><strong data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">While, it is not yet clear exactly how this occurs, there is increasing research that helps. One important fact is that the brain works in some ways like television transmission, in that it processes stable backgrounds without much attention and moving parts more intensely and differently. Expectations come from the context of the scene, previous experiences and mostly what has happened recently and repetitively. Many brain mechanisms evaluate which of a variety of probable events are actually occurring. When a decision is made as to which expected event is chosen, then the brain will “see” that particular image. But, how does expectation affect perception in the visual system?</span></strong></p><p data-dcnode-id="451"><strong data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Unexpected events have a particularly important role to play and have their own elaborate pathways. The unexpected and the successful expectation pathways interact and can suppress each other. Sometimes errors of expectation occur and sometimes, a completely new event occurs that has to be analyzed, synthesized and compared to our repertoire of past experiences. Recent research in babies shows that they respond most to unexpected events and use these to evaluate the environment and learn. In fact they will perform experiments</span></strong><span data-dcnode-id="454" instrument_node=""> </span><strong data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">with objects to learn about their properties. The unexpected is critical in the adult brain as well.</span></strong></p><p data-dcnode-id="435"><strong data-dcnode-id="436"><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/bigstock-visual-eye-plus-Brain-Anatomy-Internal-parts-47833235.jpg"><img alt="Brain Anatomy - Internal parts" class="alignleft size-medium wp-image-11233 lazyloaded" data-dcnode-id="450" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-visual-eye-plus-Brain-Anatomy-Internal-parts-47833235-300x300.jpg" data-srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-visual-eye-plus-Brain-Anatomy-Internal-parts-47833235-300x300.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-visual-eye-plus-Brain-Anatomy-Internal-parts-47833235-150x150.jpg 150w, https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-visual-eye-plus-Brain-Anatomy-Internal-parts-47833235.jpg 900w" height="300" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/bigstock-visual-eye-plus-Brain-Anatomy-Internal-parts-47833235-300x300.jpg&amp;raw" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-visual-eye-plus-Brain-Anatomy-Internal-parts-47833235-300x300.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-visual-eye-plus-Brain-Anatomy-Internal-parts-47833235-150x150.jpg 150w, https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-visual-eye-plus-Brain-Anatomy-Internal-parts-47833235.jpg 900w" width="300"><noscript data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">&lt;img class="alignleft size-medium wp-image-11233" src="https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-visual-eye-plus-Brain-Anatomy-Internal-parts-47833235-300x300.jpg" alt="Brain Anatomy - Internal parts" width="300" height="300" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-visual-eye-plus-Brain-Anatomy-Internal-parts-47833235-300x300.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-visual-eye-plus-Brain-Anatomy-Internal-parts-47833235-150x150.jpg 150w, https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-visual-eye-plus-Brain-Anatomy-Internal-parts-47833235.jpg 900w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></a><span data-dcnode-id="446" instrument_node="">All types of sensory signals barrage the brain simultaneously. The human brain is specially geared for visual signals using half of the volume for its analysis. It is well known that there are far more neuronal signals coming down (</span><em data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">top-down)</span></em><span data-dcnode-id="443" instrument_node=""> from the higher cortex than incoming (</span><em data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">bottom-up</span></em><span data-dcnode-id="440" instrument_node="">) from sensory signals. These </span><em data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">top-down</span></em><span data-dcnode-id="437" instrument_node=""> signals modulate and massage the incoming signals, ultimately determining what is gleaned from the sensory information.</span></strong></p><p data-dcnode-id="426"><strong data-dcnode-id="427"><span data-dcnode-id="434" instrument_node="">Two different brain processes are making predictions and taking in information over time to make a decision. It is not a simple linear progression of information being analyzed. Rather it is a complex series of loops and feedback that involve a large amount of </span><em data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">top-down</span></em><span data-dcnode-id="431" instrument_node=""> signals—expectations and possibilities—meeting and modulating </span><em data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">bottom-up</span></em><span data-dcnode-id="428" instrument_node=""> sensory information with back and forth communication. The brain signals are&nbsp;both wired neuronal connections and wireless synchronous oscillations between regions.</span></strong></p><p data-dcnode-id="423"><strong data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">When there are competing expectations, a longer process is triggered, with specific neuronal activity. When looking at a stable scene, brain activity occurs in multiple regions related to different possibilities and probabilities. As the decision making process continues, other parts of the brain become involved.</span></strong></p><p data-dcnode-id="420"><strong data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">There is no real accepted definition of words “consciousness” and “attention.” For this discussion, attention means focusing on one particular part of the scene. Later, the complex question arises as to the relationship of “expectation” and “attention”. Attention adds meaning (salience) to the expectation that is being considered to form the perception.</span></strong></p><h2 data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Expectation and Perception</span></h2><p data-dcnode-id="404"><strong data-dcnode-id="405"><a data-dcnode-id="414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/bigstock-Perceptions-Different-ways-of-thinking-43490413.jpg"><img alt="bigstock Perceptions Different   ways-of-thinking-43490413" class="alignright size-medium wp-image-11234 lazyloaded" data-dcnode-id="417" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-Perceptions-Different-ways-of-thinking-43490413-300x206.jpg" data-srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-Perceptions-Different-ways-of-thinking-43490413-300x206.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-Perceptions-Different-ways-of-thinking-43490413-1024x704.jpg 1024w, https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-Perceptions-Different-ways-of-thinking-43490413.jpg 1309w" height="206" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/bigstock-Perceptions-Different-ways-of-thinking-43490413-300x206.jpg&amp;raw" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-Perceptions-Different-ways-of-thinking-43490413-300x206.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-Perceptions-Different-ways-of-thinking-43490413-1024x704.jpg 1024w, https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-Perceptions-Different-ways-of-thinking-43490413.jpg 1309w" width="300"><noscript data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">&lt;img class="alignright size-medium wp-image-11234" src="https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-Perceptions-Different-ways-of-thinking-43490413-300x206.jpg" alt="bigstock Perceptions Different   ways-of-thinking-43490413" width="300" height="206" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-Perceptions-Different-ways-of-thinking-43490413-300x206.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-Perceptions-Different-ways-of-thinking-43490413-1024x704.jpg 1024w, https://jonlieffmd.com/wp-content/uploads/2015/04/bigstock-Perceptions-Different-ways-of-thinking-43490413.jpg 1309w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></a><a data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/blog/what-color-is-the-dress" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="413" instrument_node="">Perceptions are quite different for various individuals.</span></a><span data-dcnode-id="411" instrument_node=""> Some of this variance is due to individual sensory differences, described in the previous post </span><em data-dcnode-id="407"><a data-dcnode-id="409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/blog/what-color-is-the-dress" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="410" instrument_node="">What is the Color of the Dress</span></a><span data-dcnode-id="408" instrument_node="">;</span></em><span data-dcnode-id="406" instrument_node=""> but, also, because expectation determines perceptions.</span></strong></p><p data-dcnode-id="400"><strong data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Color is manipulated by the brain.</span></strong><span data-dcnode-id="401" instrument_node=""> Animals need to know whether a particular food is dangerous or not (is it a tomato or not) and, therefore, the brain constantly adjusts color balance, just like the program Photoshop. It determines that the perception of the color of an object doesn’t change even if the ambient light source changes.</span></p><p data-dcnode-id="393"><strong data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Another filter of the sensory information occurs before the data reaches the cortex.</span></strong><span data-dcnode-id="397" instrument_node=""> </span><strong data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">This emotional filter responds very rapidly to perceived threats, such as someone about to throw a punch.</span></strong><span data-dcnode-id="394" instrument_node=""> The flinch occurs so rapidly there is no time for cortex analysis. These circuits are sent very rapidly to the much closer emotional centers for a rapid reflex.</span></p><p data-dcnode-id="389"><strong data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">But, the over arching analysis of visual signals depends on what is expected.</span></strong><span data-dcnode-id="390" instrument_node=""> A famous experiment has been described where people are told to concentrate on the activity of a group of people on a stage, such as passing a basketball. Then, a man in a gorilla suit walks across the stage. Surprisingly, most people do not “see” this man and don’t remember that it happened. This is because the visual system is focused on a task and didn’t expect a gorilla.</span></p><h2 data-dcnode-id="385"><em data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Top-Down</span></em><span data-dcnode-id="386" instrument_node=""> Influence of the Cortex on Perception</span></h2><p data-dcnode-id="378"><strong data-dcnode-id="379"><a data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/Top-down-bottom-up-crop-.png"><img alt="Top down bottom up crop" class="alignleft size-medium wp-image-11236 lazyloaded" data-dcnode-id="384" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://jonlieffmd.com/wp-content/uploads/2015/04/Top-down-bottom-up-crop--300x182.png" data-srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/Top-down-bottom-up-crop--300x182.png 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/Top-down-bottom-up-crop-.png 778w" height="182" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/Top-down-bottom-up-crop--300x182.png&amp;raw" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/Top-down-bottom-up-crop--300x182.png 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/Top-down-bottom-up-crop-.png 778w" width="300"><noscript data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">&lt;img class="alignleft size-medium wp-image-11236" src="https://jonlieffmd.com/wp-content/uploads/2015/04/Top-down-bottom-up-crop--300x182.png" alt="Top down bottom up crop" width="300" height="182" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/Top-down-bottom-up-crop--300x182.png 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/Top-down-bottom-up-crop-.png 778w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></a><span data-dcnode-id="380" instrument_node="">Recent research shows that there are a large number of neurons that come down from the cortex analyzing, synthesizing and altering the incoming sensory signals. The top down neurons from the cortex far outnumber the incoming sensory neurons. Therefore, the influence of the brain and expectation are far greater than the raw data.</span></strong></p><p data-dcnode-id="375"><strong data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">There are many rarely noticed examples in daily life of top down effects on perceptions:</span></strong></p><ul data-dcnode-id="352"><li data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Picture of bright light causes eye pupils to react, as if a real light.</span></li><li data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Thinking of good deeds makes the room brighter.</span></li><li data-dcnode-id="365"><a data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/WC-normal-eye-.jpg"><img alt="N0021053 Normal eye - close-up" class="alignright size-medium wp-image-11245 lazyloaded" data-dcnode-id="370" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-normal-eye--300x255.jpg" data-srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-normal-eye--300x255.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/WC-normal-eye-.jpg 677w" height="255" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/WC-normal-eye--300x255.jpg&amp;raw" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-normal-eye--300x255.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/WC-normal-eye-.jpg 677w" width="300"><noscript data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">&lt;img class="alignright size-medium wp-image-11245" src="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-normal-eye--300x255.jpg" alt="N0021053 Normal eye - close-up" width="300" height="255" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-normal-eye--300x255.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/WC-normal-eye-.jpg 677w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></a><span data-dcnode-id="366" instrument_node="">Thinking of bad deed room appears darker.</span></li><li data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">If hungry, words related to food appear brighter.</span></li><li data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Good hitters in baseball view the ball as larger.</span></li><li data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Poor children view coins as larger.</span></li><li data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Breathing alters perceptions of emotions and different physical activities—changing fear to relaxation.</span></li><li data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Hunters holding a gun more likely to think others are holding a gun even when they aren’t.</span></li><li data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Large people judge the absolute measurement of a doorway as more narrow than others will.</span></li></ul><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Words and thoughts alter sensory information:</span></p><ul data-dcnode-id="333"><li data-dcnode-id="340"><figure aria-describedby="caption-attachment-11237" class="wp-caption alignright" data-dcnode-id="343" id="attachment_11237" style="width: 300px"><a data-dcnode-id="346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/Conny-wik-Ballet-dancer_01.jpg"><img alt="From Conny" class="wp-image-11237 size-medium lazyloaded" data-dcnode-id="349" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://jonlieffmd.com/wp-content/uploads/2015/04/Conny-wik-Ballet-dancer_01-300x300.jpg" data-srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/Conny-wik-Ballet-dancer_01-300x300.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/Conny-wik-Ballet-dancer_01-150x150.jpg 150w, https://jonlieffmd.com/wp-content/uploads/2015/04/Conny-wik-Ballet-dancer_01.jpg 600w" height="300" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/Conny-wik-Ballet-dancer_01-300x300.jpg&amp;raw" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/Conny-wik-Ballet-dancer_01-300x300.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/Conny-wik-Ballet-dancer_01-150x150.jpg 150w, https://jonlieffmd.com/wp-content/uploads/2015/04/Conny-wik-Ballet-dancer_01.jpg 600w" width="300"><noscript data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">&lt;img class="wp-image-11237 size-medium" src="https://jonlieffmd.com/wp-content/uploads/2015/04/Conny-wik-Ballet-dancer_01-300x300.jpg" alt="From Conny" width="300" height="300" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/Conny-wik-Ballet-dancer_01-300x300.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/Conny-wik-Ballet-dancer_01-150x150.jpg 150w, https://jonlieffmd.com/wp-content/uploads/2015/04/Conny-wik-Ballet-dancer_01.jpg 600w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></a><figcaption class="wp-caption-text" data-dcnode-id="344" id="caption-attachment-11237"><span data-dcnode-id="345" instrument_node="">From Conny</span></figcaption></figure><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">She kicked the ball” or “grasped the subject” stimulates the leg or arm brain regions related to kicking or grasping.</span></p></li><li data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">“Wet behind the ears” triggers brain regions of the sense of wetness and the ears, as well as the language centers.</span></li><li data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Experienced observers of ballet or classical Indian dance who have never danced, when watching a dance stimulate specific muscles of the dance.</span></li><li data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Imagining a scene before looking at it alters the perception. The same occurs when feeling an emotion before looking at the scene alters the perception.</span></li></ul><h2 data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Brain Mechanisms</span></h2><p data-dcnode-id="328"><strong data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">For the brain to make decisions about what will occur next, it forms a bias. This is based on past experience, but especially very recent events and those that are repeated. When just having seen a friend multiple times, if there is a knock on the door, it is assumed to be the friend.</span></strong></p><p data-dcnode-id="320"><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-side-MRI-colorful-with-gyri-.jpg"><img alt="B0005622 Enhanced MRI scan of the head" class="alignleft size-medium wp-image-11239 lazyloaded" data-dcnode-id="327" data-sizes="(max-width: 286px) 100vw, 286px" data-src="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-side-MRI-colorful-with-gyri--286x300.jpg" data-srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-side-MRI-colorful-with-gyri--286x300.jpg 286w, https://jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-side-MRI-colorful-with-gyri-.jpg 550w" height="300" sizes="(max-width: 286px) 100vw, 286px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-side-MRI-colorful-with-gyri--286x300.jpg&amp;raw" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-side-MRI-colorful-with-gyri--286x300.jpg 286w, https://jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-side-MRI-colorful-with-gyri-.jpg 550w" width="286"><noscript data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">&lt;img class="alignleft size-medium wp-image-11239" src="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-side-MRI-colorful-with-gyri--286x300.jpg" alt="B0005622 Enhanced MRI scan of the head" width="286" height="300" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-side-MRI-colorful-with-gyri--286x300.jpg 286w, https://jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-side-MRI-colorful-with-gyri-.jpg 550w" sizes="(max-width: 286px) 100vw, 286px" /&gt;</span></noscript></a><strong data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">It is very difficult to study how the brain accomplishes this. Most studies of the visual system isolate specific stimuli, whereas in life, the visual scene is very complex. </span></strong><span data-dcnode-id="321" instrument_node="">Analysis of context allows expectation to form. The brain will focus on known elements such as trees or buildings to form an impression of what should come next. Movement is especially important in forming expectations. A great surprise, however, such as a desk in the garden, might not even be “seen”. In the brain, the unexpected produces slowing and errors, and often is suppressed.</span></p><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Despite experiments trying to isolate occurrence and change of objects, in real life there are many objects that are common in the scenes of every day life. Hearing a bark usually means we will soon see a dog, not a gorilla. Children learn how to expect certain things from sounds and sights.</span></p><p data-dcnode-id="314"><strong data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">The brain uses the frequent objects, the probability of other objects and the recent scene before searching for answers somewhere else.</span></strong><span data-dcnode-id="315" instrument_node=""> We assume certain colors will maintain throughout a floor or wall. Context will fill in dark areas we don’t fully understand, but not necessarily correctly. And anyone seen multiple times will be suspected for dark corners.</span></p><p data-dcnode-id="311"><strong data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">One type of research studies the relative likelihood of visual evidence from a given stimuli. Another tries to analyze information as it comes in over time, adding each new view to the decision making until there is a threshold of a decision. Research has been consistent that when observing a random dot, a build up in the motor cortex areas occurs over time.</span></strong></p><p data-dcnode-id="308"><strong data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Each alternative is analyzed and given some weight and probability in different brain regions. There are different kinds of errors for fast information and slow information.</span></strong></p><p data-dcnode-id="300"><strong data-dcnode-id="302"><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/PD-Optical_illusion_vase_2.png"><img alt="PD     Optical_illusion_vase_2" class="alignright size-medium wp-image-11247 lazyloaded" data-dcnode-id="307" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://jonlieffmd.com/wp-content/uploads/2015/04/PD-Optical_illusion_vase_2-300x290.png" data-srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/PD-Optical_illusion_vase_2-300x290.png 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/PD-Optical_illusion_vase_2.png 621w" height="290" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/PD-Optical_illusion_vase_2-300x290.png&amp;raw" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/PD-Optical_illusion_vase_2-300x290.png 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/PD-Optical_illusion_vase_2.png 621w" width="300"><noscript data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">&lt;img class="alignright size-medium wp-image-11247" src="https://jonlieffmd.com/wp-content/uploads/2015/04/PD-Optical_illusion_vase_2-300x290.png" alt="PD     Optical_illusion_vase_2" width="300" height="290" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/PD-Optical_illusion_vase_2-300x290.png 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/PD-Optical_illusion_vase_2.png 621w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></a><span data-dcnode-id="303" instrument_node="">If a definite clue is given in the research trials, then there is a bias in that particular direction even before a stimulus is given.</span></strong><span data-dcnode-id="301" instrument_node=""> During a visual learning task, regions of the brain are active before the next stimuli, both where the object is identified and in the entire scene where movement is picked up. This brain activity occurs before the actual scene is given to the subject as a perception. If cues are given that are usually followed by a visual event, there is a buildup of blood flow in the brain region for the expected object to appear or move. If an image is shown that gradually morphs into a face, the region of the brain for faces (fusiform gyrus) is signaling long before it becomes a face.</span></p><p data-dcnode-id="296"><strong data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">There are many regions that alternate between activity and inactivity during the formation of the concept of what is being seen</span></strong><span data-dcnode-id="297" instrument_node="">. When a visual image is missing from a sequence, then the brain region of that missing image is active. In illusions where the visual scene alters between a vase and a face, these brain regions are alternating high and low activity.</span></p><h2 data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Prior Information and the Unexpected</span></h2><p data-dcnode-id="286"><strong data-dcnode-id="288"><a data-dcnode-id="290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/WC-brain-cells-.jpg"><img alt="B0007285 Human brain cells" class="alignleft size-medium wp-image-11249 lazyload" data-dcnode-id="293" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-brain-cells--300x210.jpg" data-srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-brain-cells--300x210.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/WC-brain-cells-.jpg 800w" height="210" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="300"><noscript data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">&lt;img class="alignleft size-medium wp-image-11249" src="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-brain-cells--300x210.jpg" alt="B0007285 Human brain cells" width="300" height="210" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-brain-cells--300x210.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/WC-brain-cells-.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></a><span data-dcnode-id="289" instrument_node="">When a particular object is expected, it dampens the blood flow in many regions of competing possibilities.</span></strong><span data-dcnode-id="287" instrument_node=""> When a sudden unexpected event occurs, it requires a rapid recalculation and decision. These sudden unusual sights rule out previous expectations of the most recent regular scenes.</span></p><p data-dcnode-id="282"><strong data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Neurons that pick up the unexpected signal have the greatest effect on changing the expectation.</span></strong><span data-dcnode-id="283" instrument_node=""> If instead of the face, the image being gradually formed in the experiment is a building, there are strong signals damping the face center, overcoming the bias. When unusual faces were presented, face centers suppress the expectation. This alters the neural signals both before and during the act of seeing. As the signal is processed, there is more elaborate analysis of the signal. This happens especially when there are many possible different interpretations detected.</span></p><p data-dcnode-id="278"><strong data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Different possibilities are presented at different levels in the analysis hierarchy.</span></strong><span data-dcnode-id="279" instrument_node=""> Higher brain regions have more complex answers. The probabilities of different options change over time. These different possibilities are presented and honed over and over and finally one is chosen as the proper interpretation.</span></p><h2 data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Errors Comparing Predictions with Data</span></h2><p data-dcnode-id="265"><strong data-dcnode-id="270"><a data-dcnode-id="272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/WC-_Visualising_neuronal_tracts_larger.jpg"><img alt="WC  _Visualising_neuronal_tracts_larger" class="alignright size-medium wp-image-11250 lazyload" data-dcnode-id="275" data-sizes="(max-width: 270px) 100vw, 270px" data-src="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-_Visualising_neuronal_tracts_larger-270x300.jpg" data-srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-_Visualising_neuronal_tracts_larger-270x300.jpg 270w, https://jonlieffmd.com/wp-content/uploads/2015/04/WC-_Visualising_neuronal_tracts_larger.jpg 283w" height="300" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="270"><noscript data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">&lt;img class="alignright size-medium wp-image-11250" src="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-_Visualising_neuronal_tracts_larger-270x300.jpg" alt="WC  _Visualising_neuronal_tracts_larger" width="270" height="300" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-_Visualising_neuronal_tracts_larger-270x300.jpg 270w, https://jonlieffmd.com/wp-content/uploads/2015/04/WC-_Visualising_neuronal_tracts_larger.jpg 283w" sizes="(max-width: 270px) 100vw, 270px" /&gt;</span></noscript></a><span data-dcnode-id="271" instrument_node="">The visual cortex not only sees, but times its responses. Updating of the expected and observed information occurs over time</span></strong><span data-dcnode-id="269" instrument_node="">.</span><strong data-dcnode-id="267"><span data-dcnode-id="268" instrument_node=""> The repeated refinement eventually picks the winner. But, this choice can be in error.</span></strong><span data-dcnode-id="266" instrument_node=""> When error signals accumulate it triggers a rapid recalculation. Silencing of a particular brain region occurs by retrograde neural signals. This resets the expectation and the level of expectation suppression.</span></p><p data-dcnode-id="261"><strong data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">When expectation of an object doesn’t pan out, then specific regions are inhibited and others are increased</span></strong><span data-dcnode-id="262" instrument_node="">. When a higher level is suppressed, it disrupts the lower processes. When these regions are deactivated by tran-scranial magnetic stimulation, the prediction doesn’t work.</span></p><p data-dcnode-id="243"><strong data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Two separate pathways occur for predictions that are successful, and those that are errors with unexpected events.</span></strong><span data-dcnode-id="258" instrument_node=""> </span><strong data-dcnode-id="250"><span data-dcnode-id="257" instrument_node="">Both have different </span><em data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">top-down</span></em><span data-dcnode-id="254" instrument_node=""> and </span><em data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">bottom-up</span></em><span data-dcnode-id="251" instrument_node=""> neurons. These pathways use multiple neuron types and connections and, also, brain waves to form specific different circuits.</span></strong><span data-dcnode-id="249" instrument_node=""> One region is the medial temporal </span><a data-dcnode-id="245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/WC-Nerve_fibres_in_a_healthy_adult_human_brain_MRI_larger.jpg"><img alt="WC   Nerve_fibres_in_a_healthy_adult_human_brain,_MRI_larger" class="alignleft size-medium wp-image-11251 lazyload" data-dcnode-id="248" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-Nerve_fibres_in_a_healthy_adult_human_brain_MRI_larger-300x260.jpg" data-srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-Nerve_fibres_in_a_healthy_adult_human_brain_MRI_larger-300x260.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/WC-Nerve_fibres_in_a_healthy_adult_human_brain_MRI_larger.jpg 465w" height="260" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="300"><noscript data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">&lt;img class="alignleft size-medium wp-image-11251" src="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-Nerve_fibres_in_a_healthy_adult_human_brain_MRI_larger-300x260.jpg" alt="WC   Nerve_fibres_in_a_healthy_adult_human_brain,_MRI_larger" width="300" height="260" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-Nerve_fibres_in_a_healthy_adult_human_brain_MRI_larger-300x260.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/WC-Nerve_fibres_in_a_healthy_adult_human_brain_MRI_larger.jpg 465w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></a><span data-dcnode-id="244" instrument_node="">lobe, which is active while the perception decisions are made. But, the striatum is, also, critical. The orbital frontal is involved in decisions, and the para-hippocampus is involved in context. In fact, decisions involve massive brain activity throughout the brain in millisecond activity that is not currently measurable.</span></p><p data-dcnode-id="239"><strong data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Most energy goes to calculating the most probable expectations.</span></strong><span data-dcnode-id="240" instrument_node=""> The regions that are active for the expectations can have increased activity, while the systems related to unexpected events can be suppressed. Expectations actually reduce the amount of general activity, but specific regions are heightened. They inhibit competing expectation regions and they repress any new information and therefore, increase only the activity of the expectation.</span></p><h2 data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Attention and Expectation</span></h2><p data-dcnode-id="229"><strong data-dcnode-id="231"><a data-dcnode-id="233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/Focus-and-Neuroplasticity-Diver-.jpg"><img alt="Concentration" class="alignright size-medium wp-image-11252 lazyload" data-dcnode-id="236" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://jonlieffmd.com/wp-content/uploads/2015/04/Focus-and-Neuroplasticity-Diver--300x199.jpg" data-srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/Focus-and-Neuroplasticity-Diver--300x199.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/Focus-and-Neuroplasticity-Diver-.jpg 426w" height="199" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="300"><noscript data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">&lt;img class="alignright size-medium wp-image-11252" src="https://jonlieffmd.com/wp-content/uploads/2015/04/Focus-and-Neuroplasticity-Diver--300x199.jpg" alt="Concentration" width="300" height="199" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/Focus-and-Neuroplasticity-Diver--300x199.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/Focus-and-Neuroplasticity-Diver-.jpg 426w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></a><span data-dcnode-id="232" instrument_node="">Selective attention occurs when the brain finds some parts of a scene more relevant or important and these are selected for special processing. Expectation often is the reason for the selective attention.</span></strong><span data-dcnode-id="230" instrument_node=""> Looking for a lost object (a missing car key) the brain focuses on the usual places for it. It is difficult to think of looking in the unusual locations where the lost object is hiding in plain sight.</span></p><p data-dcnode-id="226"><strong data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Along with the impossible to define word “consciousness”, attention is, also, not definable, except in context. Therefore, the specific brain regions involved in each are not really defined. Definitions of “attention” and “consciousness” and “expectation” are logical definitions in a system of thought, rather than an inherent biological fact. For this discussion, expectation focuses on those aspects of the scene likely to be present. Selective attention further focuses the brain’s search to understand the scene by choosing those sensory inputs that are deemed to be more important.</span></strong></p><p data-dcnode-id="223"><strong data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">Some research teases out those modulations that occur on the probably of specific sensory input occurring versus the importance that the observer places on them.</span></strong></p><p data-dcnode-id="219"><strong data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">When data is vague, then probability operates more. When data is very specific and strong, then the fact that something is meaningful increases the decision-making. </span></strong><span data-dcnode-id="220" instrument_node="">Attention naturally ignores very unexpected or extremely vague information. But, also, attention makes the prediction occur more rapidly.</span></p><p data-dcnode-id="212"><strong data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Attention and expectation interact in many ways.</span></strong><span data-dcnode-id="216" instrument_node=""> </span><strong data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Expectations can be about specific parts of the scene and attention decides how important it is.</span></strong><span data-dcnode-id="213" instrument_node=""> Errors occur in predictions and these are constantly being altered and updated. Attention can alter the amount of errors. Attention affects whether there is more needed information. Expectations and their probabilities are more important for determination of the response. Attention makes more details apparent. Both can increase and alter the perceptual decision.</span></p><p data-dcnode-id="204"><strong data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">In one study expectation limited sensory information and reactions when there was little attention.</span></strong><span data-dcnode-id="209" instrument_node=""> With attention, the opposite occurs and there is more data and reaction. Attention changes the ability of the </span><strong data-dcnode-id="206"><em data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">top-down </span></em></strong><span data-dcnode-id="205" instrument_node="">neurons from suppressing expectations by focusing on errors. Attention makes errors more available for analysis. Research shows that attention strongly affects errors in prediction.</span></p><p data-dcnode-id="197"><a data-dcnode-id="200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-purkinjee-cells-.jpg"><img alt="B0006224 Purkinje cells in the cerebellum" class="alignleft size-medium wp-image-11253 lazyload" data-dcnode-id="203" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-purkinjee-cells--300x296.jpg" data-srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-purkinjee-cells--300x296.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-purkinjee-cells-.jpg 584w" height="296" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="300"><noscript data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">&lt;img class="alignleft size-medium wp-image-11253" src="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-purkinjee-cells--300x296.jpg" alt="B0006224 Purkinje cells in the cerebellum" width="300" height="296" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-purkinjee-cells--300x296.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/WC-beautiful-purkinjee-cells-.jpg 584w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></a><strong data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Repetition of a scene shows movement and change and is highly related to expectation and attention. The default of repetition is stability, not change.</span></strong></p><p data-dcnode-id="193"><span data-dcnode-id="196" instrument_node="">When a neuron fires repetitively, the sensory signal decreases. This could be nerve fatigue. Or it could be the suppression of expectation. </span><strong data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">When the repetitions are more expected, the signals are greater. Repetition supression begins at 50 ms and expectation suppression at 100 ms.</span></strong></p><h2 data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">How Does Expectation Affect Perception</span></h2><p data-dcnode-id="188"><strong data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">The brain gives us a continuous panorama, accompanied by a sound track, by piecing together millions of bits of information in a very narrow range of available light waves and sound waves. The brain never really sees or hears anything. It just responds to and interprets electrical signals.&nbsp; It makes us believe we are seeing what is “really out there” and creates in us an assumption that everyone else sees exactly the same thing.&nbsp;Meaning and emotions are attached to specific electrical and sensory signals.</span></strong></p><p data-dcnode-id="180"><strong data-dcnode-id="181"><span data-dcnode-id="187" instrument_node=""> </span><a data-dcnode-id="183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonlieffmd.com/wp-content/uploads/2015/04/Two-roads-.jpg"><img alt="Two roads" class="alignright size-medium wp-image-11255 lazyload" data-dcnode-id="186" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://jonlieffmd.com/wp-content/uploads/2015/04/Two-roads--300x225.jpg" data-srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/Two-roads--300x225.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/Two-roads-.jpg 400w" height="225" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="300"><noscript data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">&lt;img class="alignright size-medium wp-image-11255" src="https://jonlieffmd.com/wp-content/uploads/2015/04/Two-roads--300x225.jpg" alt="Two roads" width="300" height="225" srcset="https://jonlieffmd.com/wp-content/uploads/2015/04/Two-roads--300x225.jpg 300w, https://jonlieffmd.com/wp-content/uploads/2015/04/Two-roads-.jpg 400w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></a><span data-dcnode-id="182" instrument_node="">The brain has many interacting pathways and loops that create expectations with different probabilities from our previous experiences. The context and movement in the scene stimulate the brain to prioritize possible future events. It gathers information and then at some point guesses on what is happening and creates the visual scene for our perception. This can be correct or an error. The unexpected event is more difficult to process, because of the bias toward what has occurred recently and repetitively. These competing loops can have many different effects.&nbsp;</span></strong></p><p data-dcnode-id="177"><strong data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">The complexity of perception formation is more evidence of the way the brain operates as a whole rather than in modules. Along with the vast array of neuroplasticity mechanisms that occur simultaneously all over the brain for learning, isn’t this perception process best viewed as the brain interacting with mind?</span></strong></p></div></article></div></main></section><section class="post-archive" data-dcnode-id="129" id="post-archive"><div class="post-archive-inner" data-dcnode-id="130"><div class="archive-header" data-dcnode-id="149"><h1 class="page-title" data-dcnode-id="170"><span data-dcnode-id="171" instrument_node=""> All Articles</span></h1><div class="category-description" data-dcnode-id="167"><p data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">Are you aware that the bulk of current scientific knowledge has been discovered in the past ten years? And that many of the most original results have appeared in the last year? Can you imagine where we will be ten years from now? This blog is intended to be an exploration of a paradigm shift I expect to see in the scientific understanding of the connection between mind and the material world. Posts will look at scientific discoveries, as they appear, in the fields of neuroscience, animal behavior, microbiology, molecular biology, evolution and biophysics, and explore their relevance to the emerging view of mind as an integral aspect of nature.</span></p></div><span data-dcnode-id="166" instrument_node="">
