</span><h2 data-dcnode-id="770" style="text-align: center;"><span class="ez-toc-section" data-dcnode-id="773" id="Indigo_A_Color_of_the_Rainbow"></span><span data-dcnode-id="772" instrument_node="">Indigo: A Color of the Rainbow</span><span class="ez-toc-section-end" data-dcnode-id="771"></span></h2><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><img alt="" class="alignnone size-medium wp-image-95474" data-dcnode-id="768" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/mid1-1-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/mid1-1-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/mid1-1-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/mid1-1.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Let’s throw it back to elementary school for a minute. Remember ROY-G-BIV? It’s a clever acronym that stands for the colors of the rainbow in order: red, orange, yellow, green, blue, indigo, and violet. You may find that indigo has disappeared from the rainbow as of late. So, why was indigo in the original rainbow? Experts think that Sir Isaac Newton originally included indigo in the rainbow due to reasons other rather than those that are scientific. In 1655, Newton started experimenting with prisms and explored how light passed through them at different angles to form different colors. The seven colors he named then became the official colors of the rainbow. But, did he actually see indigo? Some say he only saw six colors but decided that there must be one more to make it a total of seven. On a spiritual and mystical level, the number seven had more significance. At the time there were seven planets, seven notes on the musical scale, and seven days in a week. He chose to include indigo as the seventh color. A popular blue dye called the Indigo Dye had been newly imported from the Indies that may have influenced his decision.</span></p><span data-dcnode-id="763" instrument_node="">
</span><h2 data-dcnode-id="759" style="text-align: center;"><span class="ez-toc-section" data-dcnode-id="762" id="Why_Is_It_Called_Indigo"></span><span data-dcnode-id="761" instrument_node="">Why Is It Called Indigo?</span><span class="ez-toc-section-end" data-dcnode-id="760"></span></h2><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><img alt="" class="alignnone size-medium wp-image-95495" data-dcnode-id="757" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/mid4-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/mid4-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/mid4-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/mid4.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Indigo got its name from a plant discovered about 5000 years ago that came from the Indus Valley, where it was called nila, meaning dark blue. By the 7th century B.C, people began using the plant as a dye. The Mesopotamians, for example, carved out recipes for making indigo dye into clay tablets. By the late 1200s, news of the popular dye made its way to Europe by way of Venitian merchant traveler, Marco Polo. By the 1600s, indigo grew in high demand across Europe and America.</span></p><span data-dcnode-id="752" instrument_node="">
</span><h2 data-dcnode-id="748" style="text-align: center;"><span class="ez-toc-section" data-dcnode-id="751" id="History_of_Indigo_Color"></span><span data-dcnode-id="750" instrument_node="">History of Indigo Color</span><span class="ez-toc-section-end" data-dcnode-id="749"></span></h2><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><img alt="" class="alignnone size-medium wp-image-95516" data-dcnode-id="746" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/mid3-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/mid3-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/mid3-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/mid3.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">The story of indigo took an interesting turn in the late 1700s, as British demand started to decline and the American War for Independence began in 1775. The British began trading indigo once again by making the dye in India, and unfortunately heavily exploiting Indian workers throughout the process. The maltreatment of the dye workers sparked revolts and riots in the 1860s, to the point where Mahatma Gandhi’s first act of peaceful civil disobedience was in support of the indigo workers. He even went to court to fight on their behalf for better wages and improved working conditions.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">On the other side of the world, the love for indigo continued to grow. Americans used it to make work shorts with indigo blue collars that showed less dirt and stains than white collars. In 1873, Jacob Davis and Levis Straus used indigo dye to make their now famous denim jeans in San Francisco.</span></p><span data-dcnode-id="738" instrument_node="">
</span><h2 data-dcnode-id="734" style="text-align: center;"><span class="ez-toc-section" data-dcnode-id="737" id="What_Does_Indigo_Color_Represent"></span><span data-dcnode-id="736" instrument_node="">What Does Indigo Color Represent?</span><span class="ez-toc-section-end" data-dcnode-id="735"></span></h2><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><img alt="" class="alignnone size-medium wp-image-95537" data-dcnode-id="732" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/mid2-1-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/mid2-1-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/mid2-1-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/mid2-1.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="729" instrument_node="">Indigo is rich in aesthetics and in meaning. In terms of </span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//picsart.com/blog/post/what-do-colors-mean/"><span data-dcnode-id="728" instrument_node="">color meaning</span></a><span data-dcnode-id="726" instrument_node="">, indigo is quite spiritual and mysterious in its symbolism. It’s the color of devotion, justice, creativity, dignity, and wisdom. Indigo is used in various cultures and celebrations including the vibrant </span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//picsart.com/blog/post/holi-festival"><span data-dcnode-id="725" instrument_node="">Holi festival.&nbsp;</span></a></p><span data-dcnode-id="722" instrument_node="">
</span><h2 data-dcnode-id="718" style="text-align: center;"><span class="ez-toc-section" data-dcnode-id="721" id="Indigo_Color_Codes"></span><span data-dcnode-id="720" instrument_node="">Indigo Color Codes</span><span class="ez-toc-section-end" data-dcnode-id="719"></span></h2><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Let’s take a look at some of the technical color information and color code breakdowns for Indigo:</span></p><span data-dcnode-id="714" instrument_node="">

</span><h2 data-dcnode-id="647" style="text-align: center;"><span class="ez-toc-section" data-dcnode-id="650" id="How_Do_You_Make_Indigo_Color"></span><span data-dcnode-id="649" instrument_node="">How Do You Make Indigo Color?</span><span class="ez-toc-section-end" data-dcnode-id="648"></span></h2><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">If you’re wondering how to make indigo color, it’s quite simple. The primary colors that combine to make indigo are red and blue. To make indigo, blue must be the dominant pigment in the equation. The exact equation to produce indigo is to mix one-third red and two-thirds blue.</span></p><span data-dcnode-id="643" instrument_node="">
</span><h2 data-dcnode-id="639" style="text-align: center;"><span class="ez-toc-section" data-dcnode-id="642" id="Indigo_Compared_to_Other_Colors"></span><span data-dcnode-id="641" instrument_node="">Indigo Compared to Other Colors</span><span class="ez-toc-section-end" data-dcnode-id="640"></span></h2><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Indigo is a deep and rich color in between blue and violet on the color spectrum and can be described as a dark purplish-blue. A Monochromatic color palette includes different shades or tint variations of the same hue. For Indigo color, the monochromatic color palette includes the following:</span></p><span data-dcnode-id="635" instrument_node="">
</span><h4 data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Indigo vs Dark Violet or #6500B0</span></h4><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="631" instrument_node="">Because you can never have too much of a good thing.</span><img alt="" class="alignnone size-medium wp-image-95579" data-dcnode-id="630" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/dark-violet-1-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/dark-violet-1-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/dark-violet-1-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/dark-violet-1.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="628" instrument_node="">
</span><h4 data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Indigo vs Pure (or mostly pure) Violet or #8000DE</span></h4><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="624" instrument_node="">An alluring combination, for sure.</span><br data-dcnode-id="623"><span data-dcnode-id="622" instrument_node="">
</span><img alt="" class="alignnone size-medium wp-image-95600" data-dcnode-id="621" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/pure-violet-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/pure-violet-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/pure-violet-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/pure-violet.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="619" instrument_node="">
</span><h4 data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Indigo vs Vivid Violet or #980DFF</span></h4><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="615" instrument_node="">For when you want to take it up a notch.</span><br data-dcnode-id="614"><span data-dcnode-id="613" instrument_node="">
</span><img alt="" class="alignnone size-medium wp-image-95621" data-dcnode-id="612" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/vivid-violet-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/vivid-violet-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/vivid-violet-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/vivid-violet.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="610" instrument_node="">
</span><h4 data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Indigo vs Light Violet or #AC3BFF</span></h4><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="606" instrument_node="">And if you want to show some restraint.</span><br data-dcnode-id="605"><span data-dcnode-id="604" instrument_node="">
</span><img alt="" class="alignnone size-medium wp-image-95642" data-dcnode-id="603" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/light-violet-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/light-violet-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/light-violet-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/light-violet.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="601" instrument_node="">
</span><h4 data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Indigo vs Very Light Violet or #BF68FF</span></h4><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="597" instrument_node="">Or if your project requires a more deft touch.</span><br data-dcnode-id="596"><span data-dcnode-id="595" instrument_node="">
</span><img alt="" class="alignnone size-medium wp-image-95663" data-dcnode-id="594" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/very-light-violet-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/very-light-violet-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/very-light-violet-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/very-light-violet.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="592" instrument_node="">
</span><h2 data-dcnode-id="588" style="text-align: center;"><span class="ez-toc-section" data-dcnode-id="591" id="What_Colors_Go_With_Indigo"></span><span data-dcnode-id="590" instrument_node="">What Colors Go With Indigo?</span><span class="ez-toc-section-end" data-dcnode-id="589"></span></h2><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="586" instrument_node="">Let’s explore a detailed breakdown of the indigo color, including complementary </span><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.picsart.com/color/palette/"><span data-dcnode-id="585" instrument_node="">color palettes</span></a><span data-dcnode-id="583" instrument_node="">.</span></p><span data-dcnode-id="581" instrument_node="">
</span><h4 data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Complementary:</span></h4><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Indigo compliments best with Siren (hex #82034b).</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><img alt="" class="alignnone size-medium wp-image-95684" data-dcnode-id="574" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/siren-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/siren-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/siren-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/siren.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="572" instrument_node="">
</span><h4 data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Split Complementary:</span></h4><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">A split complementary scheme is composed of three colors. With Indigo, the other two complementing colors are anakiwa (hex #82ffff) and blueberry (hex #824bff).</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><img alt="" class="alignnone size-medium wp-image-95705" data-dcnode-id="565" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/anakiwa-blueberry-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/anakiwa-blueberry-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/anakiwa-blueberry-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/anakiwa-blueberry.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="563" instrument_node="">
</span><h4 data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Triadic:</span></h4><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="559" instrument_node="">Triadic combinations are variants of the split complementary color scheme in which colors are found equally spaced on the </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.picsart.com/color/wheel/"><span data-dcnode-id="558" instrument_node="">color wheel</span></a><span data-dcnode-id="556" instrument_node="">. Indigo’s triadic components include tropical rain forest (hex #00824b) and cinnamon (hex #824b00).</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><img alt="" class="alignnone size-medium wp-image-95726" data-dcnode-id="553" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/tropical-rain-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/tropical-rain-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/tropical-rain-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/tropical-rain.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="551" instrument_node="">
</span><h4 data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Tetradic:</span></h4><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">A tetradic color scheme contains four colors that are equally spaced on the color wheel. Indigo’s tetradic color scheme includes cinnamon (hex #824b00), Japanese laurel (hex #108200), and navy blue (hex #001082).</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><img alt="" class="alignnone size-medium wp-image-95747" data-dcnode-id="544" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/cinnamon-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/cinnamon-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/cinnamon-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/cinnamon.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="542" instrument_node="">
</span><h4 data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Analogous:</span></h4><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">An analogous palette consists of three or more colors that are next to each other on the color wheel. For indigo, those colors are blueberry (hex #824bff) and pixie powder (hex #4b1382).</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><img alt="" class="alignnone size-medium wp-image-95768" data-dcnode-id="535" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/pixie-powder-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/pixie-powder-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/pixie-powder-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/pixie-powder.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="533" instrument_node="">
</span><h4 data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Alternatives:</span></h4><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Alternative colors are a set of related colors that can be useful if you need an alternative to your original color choice. For indigo, alternative colors include pigment indigo (hex #4e0385), kingfisher daisy (hex #510688), Windsor (hex #54098b), pigment indigo (hex #48007f), pigment indigo (hex #45007c), and pigment indigo (hex #420079).</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><img alt="" class="alignnone size-medium wp-image-95789" data-dcnode-id="526" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/indigo-alternatives-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/indigo-alternatives-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/indigo-alternatives-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/indigo-alternatives.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="524" instrument_node="">
</span><h2 data-dcnode-id="520" style="text-align: center;"><span class="ez-toc-section" data-dcnode-id="523" id="Create_Fantastic_Photos_Using_This_Color"></span><span data-dcnode-id="522" instrument_node="">Create Fantastic Photos Using This Color</span><span class="ez-toc-section-end" data-dcnode-id="521"></span></h2><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">From technical color breakdowns and codes to creative color palettes, you should have all the inspiration you need to create a indigo-themed designs of your own. Follow these easy instructions and incorporate indigo into your next design using Picsart.</span></p><span data-dcnode-id="516" instrument_node="">
</span><h4 data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">On the Web</span></h4><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="504"><strong data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">1)</span></strong><span data-dcnode-id="510" instrument_node=""> If you’re looking for an online editing tool, open the </span><a data-dcnode-id="508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//picsart.com/create/"><span data-dcnode-id="509" instrument_node="">Picsart Create page</span></a><span data-dcnode-id="507" instrument_node="">. Start a new design by selecting a template size, such as </span><i data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Instagram Square.&nbsp;</span></i></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><img alt="" class="alignnone size-medium wp-image-95810" data-dcnode-id="502" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/1-23-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/1-23-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/1-23-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/1-23.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="487"><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">2)</span></strong><span data-dcnode-id="497" instrument_node=""> Select the </span><i data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Color</span></i><span data-dcnode-id="494" instrument_node=""> or </span><i data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Gradient</span></i><span data-dcnode-id="491" instrument_node=""> tool above your blank canvas. The </span><i data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Color</span></i><span data-dcnode-id="488" instrument_node=""> tool will provide a solid background color versus a gradient. Type crimson’s hex code 4B0082 in the search box underneath the color box and hit enter.</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><img alt="" class="alignnone size-medium wp-image-95831" data-dcnode-id="485" height="520" loading="lazy" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnblog.picsart.com/2021/12/2-23-780x520.jpg&amp;raw" srcset="https://cdnblog.picsart.com/2021/12/2-23-780x520.jpg?to=max&amp;r=780&amp;q=90 780w, https://cdnblog.picsart.com/2021/12/2-23-1024x683.jpg?to=max&amp;r=780&amp;q=90 1024w, https://cdnblog.picsart.com/2021/12/2-23.jpg?to=max&amp;r=780&amp;q=90 1200w" width="780"></p><span data-dcnode-id="483" instrument_node="">
