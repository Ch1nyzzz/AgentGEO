jb jc jd je jf" data-dcnode-id="1001"><h1 class="lk ll ji bn lm ln lo lp lq lr ls lt lu lv lw lx ly lz ma mb mc md me mf mg mh gc" data-dcnode-id="1028" data-selectable-paragraph="" id="50b3"><span class="l mi mj mk ml mm mn mo mp mq dq" data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">R</span></span><span data-dcnode-id="1029" instrument_node="">ed</span></h1><blockquote class="mr" data-dcnode-id="1025"><p class="ms mt ji bn mu mv mw mx my mz na lc co" data-dcnode-id="1026" data-selectable-paragraph="" id="b953"><span data-dcnode-id="1027" instrument_node="">“Red is the first color of spring. It’s the real color of rebirth. Of beginning.” (Andie Condie)</span></p></blockquote><p class="pw-post-body-paragraph kf kg ji kh b ki nb kk kl km nc ko kp kq nd ks kt ku ne kw kx ky nf la lb lc jb gc" data-dcnode-id="1017" data-selectable-paragraph="" id="d59f"><span data-dcnode-id="1024" instrument_node="">Red is one of the</span><strong class="kh jj" data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node=""> easiest found colors in nature</span></strong><span data-dcnode-id="1021" instrument_node="">. Due to this, it’s one of the </span><strong class="kh jj" data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">earliest</span></strong><span data-dcnode-id="1018" instrument_node=""> used colors in human history.</span></p><figure class="nh ni nj nk gz nl gn go paragraph-image" data-dcnode-id="1012"><div class="gn go ng" data-dcnode-id="1015"><img alt="" class="cf nm nn" data-dcnode-id="1016" height="500" loading="lazy" role="presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miro.medium.com/max/1000/1%2AIAb3Nu3mrMcAzRL6REXd5A.jpeg&amp;raw" width="500"></div><figcaption class="no bm gp gn go np nq bn b bo bp co" data-dcnode-id="1013" data-selectable-paragraph=""><span data-dcnode-id="1014" instrument_node="">Red ochre powder</span></figcaption></figure><p class="pw-post-body-paragraph kf kg ji kh b ki kj kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc jb gc" data-dcnode-id="1007" data-selectable-paragraph="" id="0e4a"><span data-dcnode-id="1011" instrument_node="">One of red’s original variations, </span><strong class="kh jj" data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">red ochre</span></strong><span data-dcnode-id="1008" instrument_node="">, is derived from clay. The first usages of red was by cavemen who smeared the clay on the wall for writing and drawing.</span></p><p class="pw-post-body-paragraph kf kg ji kh b ki kj kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc jb gc" data-dcnode-id="1002" data-selectable-paragraph="" id="6ba8"><span data-dcnode-id="1006" instrument_node="">Red ochre, as well as other popular red pigments like hematite and cinnabar (derived from iron and mercury, respectively), were originally used in </span><strong class="kh jj" data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">cave paintings, makeup, ink, clothing dye, and pottery</span></strong><span data-dcnode-id="1003" instrument_node="">. It’s abundance allowed for it to be used in wide spread production.</span></p></div><div class="o dz ld le ik lf" data-dcnode-id="997" role="separator"><span class="lg fn cj lh li lj" data-dcnode-id="1000"></span><span class="lg fn cj lh li lj" data-dcnode-id="999"></span><span class="lg fn cj lh li" data-dcnode-id="998"></span></div><div class="jb jc jd je jf" data-dcnode-id="969"><h1 class="lk ll ji bn lm ln lo lp lq lr ls lt lu lv lw lx ly lz ma mb mc md me mf mg mh gc" data-dcnode-id="995" data-selectable-paragraph="" id="612b"><span data-dcnode-id="996" instrument_node="">Yellow</span></h1><blockquote class="mr" data-dcnode-id="992"><p class="ms mt ji bn mu mv mw mx my mz na lc co" data-dcnode-id="993" data-selectable-paragraph="" id="7719"><span data-dcnode-id="994" instrument_node="">“How wonderful the colour yellow is. It stands for the sun!” (Vincent Van Gogh)</span></p></blockquote><p class="pw-post-body-paragraph kf kg ji kh b ki nb kk kl km nc ko kp kq nd ks kt ku ne kw kx ky nf la lb lc jb gc" data-dcnode-id="987" data-selectable-paragraph="" id="dff2"><span data-dcnode-id="991" instrument_node="">Yellow pigment has a similar history to that of red. It’s earliest pigment was </span><strong class="kh jj" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">yellow ochre</span></strong><span data-dcnode-id="988" instrument_node="">, also derived from clay and used in it’s earliest times in cave paintings.</span></p><p class="pw-post-body-paragraph kf kg ji kh b ki kj kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc jb gc" data-dcnode-id="976" data-selectable-paragraph="" id="9cde"><span data-dcnode-id="986" instrument_node="">Yellow was popularly used in paintings of the</span><strong class="kh jj" data-dcnode-id="984"><span data-dcnode-id="985" instrument_node=""> natural world</span></strong><span data-dcnode-id="983" instrument_node="">, as it accurately captured the bright tones of nature and of the sun. It was popular in ancient Greece and Rome, and shades like </span><strong class="kh jj" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Naples yellow</span></strong><span data-dcnode-id="980" instrument_node=""> and </span><strong class="kh jj" data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">lead-tin yellow</span></strong><span data-dcnode-id="977" instrument_node=""> were signature colors of the Renaissance era. Yellow was also present in ancient Egyptian art and tombs (as a symbol of sun and eternity) and as a dye.</span></p><figure class="nh ni nj nk gz nl gn go paragraph-image" data-dcnode-id="970"><div class="ns nt dq nu cf nv" data-dcnode-id="973" role="button" tabindex="0"><div class="gn go nr" data-dcnode-id="974"><img alt="" class="cf nm nn" data-dcnode-id="975" height="544" loading="lazy" role="presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miro.medium.com/max/1400/1%2A9BqOmkBRkc17qiSig4sYTA.jpeg&amp;raw" width="700"></div></div><figcaption class="no bm gp gn go np nq bn b bo bp co" data-dcnode-id="971" data-selectable-paragraph=""><span data-dcnode-id="972" instrument_node="">The School of Athens (Raphael)</span></figcaption></figure></div><div class="o dz ld le ik lf" data-dcnode-id="965" role="separator"><span class="lg fn cj lh li lj" data-dcnode-id="968"></span><span class="lg fn cj lh li lj" data-dcnode-id="967"></span><span class="lg fn cj lh li" data-dcnode-id="966"></span></div><div class="jb jc jd je jf" data-dcnode-id="937"><h1 class="lk ll ji bn lm ln lo lp lq lr ls lt lu lv lw lx ly lz ma mb mc md me mf mg mh gc" data-dcnode-id="963" data-selectable-paragraph="" id="1ba5"><span data-dcnode-id="964" instrument_node="">Green</span></h1><blockquote class="mr" data-dcnode-id="960"><p class="ms mt ji bn mu mv mw mx my mz na lc co" data-dcnode-id="961" data-selectable-paragraph="" id="711e"><span data-dcnode-id="962" instrument_node="">“Green is the prime color of the world, and that from which its loveliness arises.” (Pedro Calderon de la Barca)</span></p></blockquote><p class="pw-post-body-paragraph kf kg ji kh b ki nb kk kl km nc ko kp kq nd ks kt ku ne kw kx ky nf la lb lc jb gc" data-dcnode-id="943" data-selectable-paragraph="" id="e625"><span data-dcnode-id="959" instrument_node="">Green is another color that has been a widely used since antiquity, with early shades being</span><strong class="kh jj" data-dcnode-id="957"><span data-dcnode-id="958" instrument_node=""> earth green </span></strong><span data-dcnode-id="956" instrument_node="">and </span><strong class="kh jj" data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">malachite</span></strong><span data-dcnode-id="953" instrument_node="">. While not as ancient as red and yellow, green pigments were made from mixing shades such as yellow ochre and blue azurite until </span><strong class="kh jj" data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">synthetic greens</span></strong><span data-dcnode-id="950" instrument_node=""> began to be made in the </span><strong class="kh jj" data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">18–19th centuries. </span></strong><span data-dcnode-id="947" instrument_node="">Early greens were used for </span><strong class="kh jj" data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">art</span></strong><span data-dcnode-id="944" instrument_node="">, particularly in glazes, blowing glass, statues, religious paintings, and to depict the natural world.</span></p><figure class="nh ni nj nk gz nl gn go paragraph-image" data-dcnode-id="938"><div class="gn go nw" data-dcnode-id="941"><img alt="" class="cf nm nn" data-dcnode-id="942" height="400" loading="lazy" role="presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miro.medium.com/max/816/1%2A99Q3q_5fKhJtwcBFvai9KQ.jpeg&amp;raw" width="408"></div><figcaption class="no bm gp gn go np nq bn b bo bp co" data-dcnode-id="939" data-selectable-paragraph=""><span data-dcnode-id="940" instrument_node="">Ancient Greek bronze vessel</span></figcaption></figure></div><div class="o dz ld le ik lf" data-dcnode-id="933" role="separator"><span class="lg fn cj lh li lj" data-dcnode-id="936"></span><span class="lg fn cj lh li lj" data-dcnode-id="935"></span><span class="lg fn cj lh li" data-dcnode-id="934"></span></div><div class="jb jc jd je jf" data-dcnode-id="900"><h1 class="lk ll ji bn lm ln lo lp lq lr ls lt lu lv lw lx ly lz ma mb mc md me mf mg mh gc" data-dcnode-id="931" data-selectable-paragraph="" id="a887"><span data-dcnode-id="932" instrument_node="">Violet</span></h1><blockquote class="mr" data-dcnode-id="925"><p class="ms mt ji bn mu mv mw mx my mz na lc co" data-dcnode-id="926" data-selectable-paragraph="" id="b76b"><span data-dcnode-id="930" instrument_node="">“I think it pisses God off if you walk by the color purple in a field somewhere and don’t notice it.” (</span><em class="nx" data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">The Color Purple</span></em><span data-dcnode-id="927" instrument_node="">, Alice Walker)</span></p></blockquote><p class="pw-post-body-paragraph kf kg ji kh b ki nb kk kl km nc ko kp kq nd ks kt ku ne kw kx ky nf la lb lc jb gc" data-dcnode-id="920" data-selectable-paragraph="" id="ed29"><span data-dcnode-id="924" instrument_node="">The color purple, or violet, has been long known for its </span><strong class="kh jj" data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">ties to royalty</span></strong><span data-dcnode-id="921" instrument_node="">.</span></p><p class="pw-post-body-paragraph kf kg ji kh b ki kj kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc jb gc" data-dcnode-id="912" data-selectable-paragraph="" id="4457"><span data-dcnode-id="919" instrument_node="">The earliest shade of violet, </span><strong class="kh jj" data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Tyrian purple</span></strong><span data-dcnode-id="916" instrument_node="">, was made made by the Phonecian citizens of </span><strong class="kh jj" data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Tyre and Sidon</span></strong><span data-dcnode-id="913" instrument_node=""> (two cities in ancient Phonecia). The original pigment was derived from the mucus of marine mollusks, most notably from the Murex species.</span></p><figure class="nh ni nj nk gz nl gn go paragraph-image" data-dcnode-id="909"><div class="gn go ny" data-dcnode-id="910"><img alt="" class="cf nm nn" data-dcnode-id="911" height="413" loading="lazy" role="presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miro.medium.com/max/1200/1%2AHzAjjRW6HV6hxtG5NuijxQ.jpeg&amp;raw" width="600"></div></figure><p class="pw-post-body-paragraph kf kg ji kh b ki kj kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc jb gc" data-dcnode-id="901" data-selectable-paragraph="" id="3bac"><span data-dcnode-id="908" instrument_node="">Purple dye was rare and expensive at the time of the Phonecians (1600 BC) due to it’s scarcity. For centuries only the wealthy, particularly </span><strong class="kh jj" data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">royalty</span></strong><span data-dcnode-id="905" instrument_node="">, could afford the pigment, making it a coveted social symbol and </span><strong class="kh jj" data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">treasured </span></strong><span data-dcnode-id="902" instrument_node="">color. It’s cost led to purple mainly being used in just textiles and art.</span></p></div><div class="o dz ld le ik lf" data-dcnode-id="896" role="separator"><span class="lg fn cj lh li lj" data-dcnode-id="899"></span><span class="lg fn cj lh li lj" data-dcnode-id="898"></span><span class="lg fn cj lh li" data-dcnode-id="897"></span></div><div class="jb jc jd je jf" data-dcnode-id="875"><h1 class="lk ll ji bn lm ln lo lp lq lr ls lt lu lv lw lx ly lz ma mb mc md me mf mg mh gc" data-dcnode-id="894" data-selectable-paragraph="" id="cd20"><span data-dcnode-id="895" instrument_node="">Indigo</span></h1><blockquote class="mr" data-dcnode-id="891"><p class="ms mt ji bn mu mv mw mx my mz na lc co" data-dcnode-id="892" data-selectable-paragraph="" id="0172"><span data-dcnode-id="893" instrument_node="">“The sight of an indigo sky was beautiful. It was when darkness allowed light to shine for a while.” (Nimisha Toshniwal)</span></p></blockquote><figure class="oa ob oc od oe nl gn go paragraph-image" data-dcnode-id="886"><div class="gn go nz" data-dcnode-id="889"><img alt="" class="cf nm nn" data-dcnode-id="890" height="679" loading="lazy" role="presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miro.medium.com/max/904/1%2AgfR6YtHQm2UNkU9UB7LPLA.jpeg&amp;raw" width="452"></div><figcaption class="no bm gp gn go np nq bn b bo bp co" data-dcnode-id="887" data-selectable-paragraph=""><span data-dcnode-id="888" instrument_node="">Indigofera Tinctoria plant</span></figcaption></figure><p class="pw-post-body-paragraph kf kg ji kh b ki kj kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc jb gc" data-dcnode-id="881" data-selectable-paragraph="" id="7dfc"><span data-dcnode-id="885" instrument_node="">Indigo is another rare color. The color itself is </span><strong class="kh jj" data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">so close in shade to both blue and violet that it is hardly recognized by the common eye</span></strong><span data-dcnode-id="882" instrument_node="">. It wasn’t until 1671 that Newton declared it an color of the visible color spectrum.</span></p><p class="pw-post-body-paragraph kf kg ji kh b ki kj kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc jb gc" data-dcnode-id="876" data-selectable-paragraph="" id="b060"><span data-dcnode-id="880" instrument_node="">It originates from the plant </span><strong class="kh jj" data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Indigofera</span></strong><span data-dcnode-id="877" instrument_node="">, or indigo, and was one of the earliest colors used for textile dyeing.</span></p></div><div class="o dz ld le ik lf" data-dcnode-id="871" role="separator"><span class="lg fn cj lh li lj" data-dcnode-id="874"></span><span class="lg fn cj lh li lj" data-dcnode-id="873"></span><span class="lg fn cj lh li" data-dcnode-id="872"></span></div><div class="jb jc jd je jf" data-dcnode-id="848"><h1 class="lk ll ji bn lm ln lo lp lq lr ls lt lu lv lw lx ly lz ma mb mc md me mf mg mh gc" data-dcnode-id="869" data-selectable-paragraph="" id="00b7"><span data-dcnode-id="870" instrument_node="">Orange</span></h1><blockquote class="mr" data-dcnode-id="864"><p class="ms mt ji bn mu mv mw mx my mz na lc co" data-dcnode-id="865" data-selectable-paragraph="" id="5abb"><span data-dcnode-id="868" instrument_node="">“</span><strong class="ba" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Orange is red brought nearer to humanity by yellow.” (Wassily Kandinsky)</span></strong></p></blockquote><p class="pw-post-body-paragraph kf kg ji kh b ki nb kk kl km nc ko kp kq nd ks kt ku ne kw kx ky nf la lb lc jb gc" data-dcnode-id="856" data-selectable-paragraph="" id="3cc3"><span data-dcnode-id="863" instrument_node="">Another color that had trouble being fully established was orange. Orange was actually </span><strong class="kh jj" data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">not considered its own color</span></strong><span data-dcnode-id="860" instrument_node=""> until the 16th century, having been previously referred to as</span><strong class="kh jj" data-dcnode-id="858"><span data-dcnode-id="859" instrument_node=""> yellow-red</span></strong><span data-dcnode-id="857" instrument_node="">.</span></p><figure class="nh ni nj nk gz nl gn go paragraph-image" data-dcnode-id="853"><div class="gn go ny" data-dcnode-id="854"><img alt="" class="cf nm nn" data-dcnode-id="855" height="600" loading="lazy" role="presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miro.medium.com/max/1200/1%2AtRxxpA5DJphrQxrFb2VVhg.jpeg&amp;raw" width="600"></div></figure><p class="pw-post-body-paragraph kf kg ji kh b ki kj kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc jb gc" data-dcnode-id="849" data-selectable-paragraph="" id="70de"><span data-dcnode-id="852" instrument_node="">This changed when Portuguese merchants traded oranges — the fruit — with Europe. The fruit, having not been in Europe before, did not bear an English name. As an English name was created for the fruit it was also applied to the color. As a definition of the color orange puts it, orange is </span><strong class="kh jj" data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">“a bright reddish-yellow color like that of the skin of a ripe orange.”</span></strong></p></div><div class="o dz ld le ik lf" data-dcnode-id="844" role="separator"><span class="lg fn cj lh li lj" data-dcnode-id="847"></span><span class="lg fn cj lh li lj" data-dcnode-id="846"></span><span class="lg fn cj lh li" data-dcnode-id="845"></span></div><div class="jb jc jd je jf" data-dcnode-id="809"><h1 class="lk ll ji bn lm ln lo lp lq lr ls lt lu lv lw lx ly lz ma mb mc md me mf mg mh gc" data-dcnode-id="842" data-selectable-paragraph="" id="d349"><span data-dcnode-id="843" instrument_node="">Blue</span></h1><blockquote class="mr" data-dcnode-id="839"><p class="ms mt ji bn mu mv mw mx my mz na lc co" data-dcnode-id="840" data-selectable-paragraph="" id="5329"><span data-dcnode-id="841" instrument_node="">“And what if one of the gods does wreck me out on the wine-dark sea?” (The Odyssey, Homer)</span></p></blockquote><p class="pw-post-body-paragraph kf kg ji kh b ki nb kk kl km nc ko kp kq nd ks kt ku ne kw kx ky nf la lb lc jb gc" data-dcnode-id="831" data-selectable-paragraph="" id="702e"><span data-dcnode-id="838" instrument_node="">Blue is one of the most popular colors in history. However, as a color </span><strong class="kh jj" data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">scarce</span></strong><span data-dcnode-id="835" instrument_node=""> within nature, it was not widely used until it was produced in ancient Egypt using the </span><strong class="kh jj" data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">lapis lazuli</span></strong><span data-dcnode-id="832" instrument_node=""> gemstone.</span></p><p class="pw-post-body-paragraph kf kg ji kh b ki kj kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc jb gc" data-dcnode-id="820" data-selectable-paragraph="" id="a2f6"><span data-dcnode-id="830" instrument_node="">Historians speculate that the color </span><strong class="kh jj" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">could not even be seen</span></strong><span data-dcnode-id="827" instrument_node=""> until then, with early humans having been predicted to be </span><strong class="kh jj" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">colorblind</span></strong><span data-dcnode-id="824" instrument_node="">, seeing only black and white. Later humans evolved to see red, yellow, green, and finally blue. Early science has predicted this, but so has literature. In the quote above from the Odyssey, Homer describes the ocean as a </span><strong class="kh jj" data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">“wine-dark sea”</span></strong><span data-dcnode-id="821" instrument_node=""> instead of a blue. Having descriptions of normally blue items from the time the book was written be similar, it’s suspected the human eye had not yet developed to see the color.</span></p><p class="pw-post-body-paragraph kf kg ji kh b ki kj kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc jb gc" data-dcnode-id="815" data-selectable-paragraph="" id="dd06"><span data-dcnode-id="819" instrument_node="">While the color had a later start than some others, it was </span><strong class="kh jj" data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">widely used</span></strong><span data-dcnode-id="816" instrument_node=""> when it was available. Early uses of blue pigment were as paint, ink, textile dye, and skin dye.</span></p><figure class="nh ni nj nk gz nl gn go paragraph-image" data-dcnode-id="810"><div class="gn go of" data-dcnode-id="813"><img alt="" class="cf nm nn" data-dcnode-id="814" height="300" loading="lazy" role="presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miro.medium.com/max/1180/1%2AF59e6AlZM3ng49Zy95R1JQ.jpeg&amp;raw" width="590"></div><figcaption class="no bm gp gn go np nq bn b bo bp co" data-dcnode-id="811" data-selectable-paragraph=""><span data-dcnode-id="812" instrument_node="">Blue ink in water</span></fi
