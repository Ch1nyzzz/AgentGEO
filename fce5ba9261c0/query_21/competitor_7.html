</span><h1 data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Dog Names by Color:&nbsp; Unique Names for Your Colorful Pooch</span></h1><span data-dcnode-id="811" instrument_node="">
</span><span data-dcnode-id="809" instrument_node="">
</span><div class="" data-dcnode-id="808" style="width: 100%; box-sizing: border-box"></div><span data-dcnode-id="807" instrument_node="">
</span><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">By Janice Jones&nbsp; &nbsp;|Last Updated March 18, 2019</span></p><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Choosing dog names by color is a favorite way to select the perfect name for your new puppy or adult dog. If you are even a bit artistic, shades of color are paramount and picking a puppy based on the color of their hair is more common than you might expect.&nbsp; </span></p><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">This is especially true for those small dog breeds where all colors are acceptable (according to the AKC breed standards for many breeds.&nbsp;&nbsp;</span></p><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Dog Names by color makes perfect sense for dogs that have gorgeous hair coats.&nbsp;&nbsp;</span></p><p data-dcnode-id="793"><span data-dcnode-id="796" instrument_node="">If you'd like to skip the explanations and go directly to the dog names, </span><a data-dcnode-id="794" href="#Color"><span data-dcnode-id="795" instrument_node="">click here.</span></a></p><span data-dcnode-id="792" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="783"><img alt="Dog Names Based on Color" class="ss-lazy error" data-dcnode-id="791" data-pin-media="https://www.smalldogplace.com/images/dog-names-based-on-color.jpg" data-src="https://www.smalldogplace.com/images/dog-names-based-on-color.jpg" data-was-processed="true" height="730" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.smalldogplace.com/images/dog-names-based-on-color.jpg&amp;raw" style="width: 625px; height: auto" title="Dog Names Based on Color" width="625"><div class="pinit" data-dcnode-id="784"><span data-dcnode-id="790" instrument_node="">
</span><a class="PIN_1650917260765_button_pin PIN_1650917260765_beside PIN_1650917260765_save PIN_1650917260765_padded" data-dcnode-id="786" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=eTV3sqi1G1Ah-3&amp;url=https%3A%2F%2Fwww.smalldogplace.com%2Fdog-names-by-color.html&amp;media=https%3A%2F%2Fwww.smalldogplace.com%2Fimages%2Fdog-names-based-on-color.jpg&amp;description=Dog%20Names%20Based%20on%20Hair%20(fur)%20Color." data-pin-log="button_pinit" data-pin-x="149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DeTV3sqi1G1Ah-3%26url%3Dhttps%253A%252F%252Fwww.smalldogplace.com%252Fdog-names-by-color.html%26media%3Dhttps%253A%252F%252Fwww.smalldogplace.com%252Fimages%252Fdog-names-based-on-color.jpg%26description%3DDog%2520Names%2520Based%2520on%2520Hair%2520%28fur%29%2520Color."><span class="PIN_1650917260765_count" data-dcnode-id="788" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=eTV3sqi1G1Ah-3&amp;url=https%3A%2F%2Fwww.smalldogplace.com%2Fdog-names-by-color.html&amp;media=https%3A%2F%2Fwww.smalldogplace.com%2Fimages%2Fdog-names-based-on-color.jpg&amp;description=Dog%20Names%20Based%20on%20Hair%20(fur)%20Color." data-pin-log="button_pinit" data-pin-x="149"><span data-dcnode-id="789" instrument_node="">149</span></span><span data-dcnode-id="787" instrument_node="">Save</span></a><span data-dcnode-id="785" instrument_node="">
</span></div></div><span data-dcnode-id="782" instrument_node="">
</span><h2 data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Dog Hair (Fur) Colors</span></h2><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="778" instrument_node="">Spend even a small amount of time on the </span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//akc.org/" onclick="return FIX.track(this);"><span data-dcnode-id="777" instrument_node="">American Kennel Club website,</span></a><span data-dcnode-id="775" instrument_node=""> and you'll begin to see how many colors and color names are available to describe that beautiful shade that makes your dog the unique individual he is.</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">I thought it might be fun to discover all the color words that kennel clubs use to describe the hair shades that are acceptable.&nbsp; </span></p><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">I was shocked to see how our vocabularies could increase exponentially just by learning a few color names. This list does not include combination colors that are permitted such as black and white.</span></p><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">The colors and breed standards are drawn up by parent clubs.&nbsp; &nbsp;A red in one breed may not look exactly like a red in another hence the number of color words used to describe the coat. </span></p><p data-dcnode-id="764"><span data-dcnode-id="766" instrument_node="">But I was still astonished at the variety of terms used and how so many of them could describe essentially the same color.&nbsp;</span><br data-dcnode-id="765"></p><span data-dcnode-id="763" instrument_node="">
</span><div class="mv-video-target mv-video-id-n5sbkqs4oibzsimzki1m" data-dcnode-id="762" data-ratio="16:9" data-video-id="n5sbkqs4oibzsimzki1m" data-volume="70"></div><span data-dcnode-id="761" instrument_node="">
</span><h2 data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Terms used by the AKC to describe hair color in small breed
dogs</span></h2><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Many breeds contain individuals that have solid colors as well as two or three color combinations.&nbsp; </span></p><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">This list represents solid colors found in many small breed dogs.&nbsp; Wherever possible I have listed the breed(s) that use the particular color word.</span></p><span data-dcnode-id="753" instrument_node="">
</span><h2 data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">How did I create this list of Dog Coat Colors</span></h2><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">All of the color terms used below are listed on the American Kennel Club by breed.&nbsp; The breeds included are only those found and described on Small Dog Place.&nbsp;&nbsp;</span></p><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">There are likely other colors represented by medium, large, and giant breed dogs, but here is the list of colors of small breed dogs recognized by the AKC.</span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="743" style="color: rgb(56, 140, 59);"><span data-dcnode-id="744" instrument_node="">Apricot</span></span><span data-dcnode-id="742" instrument_node=""> (toy poodles and others)</span></p><p data-dcnode-id="737"><span data-dcnode-id="739" style="color: rgb(56, 140, 59);"><span data-dcnode-id="740" instrument_node="">Beaver</span></span><span data-dcnode-id="738" instrument_node=""> (Pomeranian)</span></p><p data-dcnode-id="733"><span data-dcnode-id="735" style="color: rgb(56, 140, 59);"><span data-dcnode-id="736" instrument_node="">Belge</span></span><span data-dcnode-id="734" instrument_node=""> (Affenpinscher)</span></p><p data-dcnode-id="729"><span data-dcnode-id="731" style="color: rgb(56, 140, 59);"><span data-dcnode-id="732" instrument_node="">Black</span></span><span data-dcnode-id="730" instrument_node=""> (Affenpinscher) (Australian Terrier)</span></p><p data-dcnode-id="725"><span data-dcnode-id="727" style="color: rgb(56, 140, 59);"><span data-dcnode-id="728" instrument_node="">Blenheim</span></span><span data-dcnode-id="726" instrument_node=""> (Cavalier King Charles Spaniel)</span></p><p data-dcnode-id="721"><span data-dcnode-id="723" style="color: rgb(56, 140, 59);"><span data-dcnode-id="724" instrument_node="">Blue</span></span><span data-dcnode-id="722" instrument_node=""> (Australian Terrier and many others)</span></p><p data-dcnode-id="717"><span data-dcnode-id="719" style="color: rgb(56, 140, 59);"><span data-dcnode-id="720" instrument_node="">Brindle</span></span><span data-dcnode-id="718" instrument_node=""> (Australian Terrier and many others)</span></p><p data-dcnode-id="713"><span data-dcnode-id="715" style="color: rgb(56, 140, 59);"><span data-dcnode-id="716" instrument_node="">Bronze</span></span><span data-dcnode-id="714" instrument_node=""> (Xoloitzcuintli)</span></p><p data-dcnode-id="709"><span data-dcnode-id="711" style="color: rgb(56, 140, 59);"><span data-dcnode-id="712" instrument_node="">Brown</span></span><span data-dcnode-id="710" instrument_node=""> (Many breeds</span></p><p data-dcnode-id="705"><span data-dcnode-id="707" style="color: rgb(56, 140, 59);"><span data-dcnode-id="708" instrument_node="">Buff</span></span><span data-dcnode-id="706" instrument_node=""> (Cocker Spaniel)</span></p><p data-dcnode-id="701"><span data-dcnode-id="703" style="color: rgb(56, 140, 59);"><span data-dcnode-id="704" instrument_node="">Cafe Au Lait</span></span><span data-dcnode-id="702" instrument_node=""> (Toy Poodle)</span></p><p data-dcnode-id="697"><span data-dcnode-id="699" style="color: rgb(56, 140, 59);"><span data-dcnode-id="700" instrument_node="">Chestnut</span></span><span data-dcnode-id="698" instrument_node=""> (Cirneco dell'Etna)</span></p><p data-dcnode-id="693"><span data-dcnode-id="695" style="color: rgb(56, 140, 59);"><span data-dcnode-id="696" instrument_node="">Chocolate</span></span><span data-dcnode-id="694" instrument_node=""> (Many breeds)</span></p><p data-dcnode-id="689"><span data-dcnode-id="691" style="color: rgb(56, 140, 59);"><span data-dcnode-id="692" instrument_node="">Cream</span></span><span data-dcnode-id="690" instrument_node=""> (Many breeds)</span></p><p data-dcnode-id="685"><span data-dcnode-id="687" style="color: rgb(56, 140, 59);"><span data-dcnode-id="688" instrument_node="">Fawn&nbsp;</span></span><span data-dcnode-id="686" instrument_node="">(Tibetan Terrier and many others)</span></p><p data-dcnode-id="681"><span data-dcnode-id="683" style="color: rgb(56, 140, 59);"><span data-dcnode-id="684" instrument_node="">Gold</span></span><span data-dcnode-id="682" instrument_node=""> (Many breeds)</span></p><p data-dcnode-id="677"><span data-dcnode-id="679" style="color: rgb(56, 140, 59);"><span data-dcnode-id="680" instrument_node="">Gray</span></span><span data-dcnode-id="678" instrument_node=""> (Many breeds)</span></p><p data-dcnode-id="673"><span data-dcnode-id="675" style="color: rgb(56, 140, 59);"><span data-dcnode-id="676" instrument_node="">Grizzle</span></span><span data-dcnode-id="674" instrument_node=""> (Border Terrier)</span></p><p data-dcnode-id="669"><span data-dcnode-id="671" style="color: rgb(56, 140, 59);"><span data-dcnode-id="672" instrument_node="">Isabella</span></span><span data-dcnode-id="670" instrument_node=""> (sometimes called fawn)</span></p><p data-dcnode-id="665"><span data-dcnode-id="667" style="color: rgb(56, 140, 59);"><span data-dcnode-id="668" instrument_node="">Lemon</span></span><span data-dcnode-id="666" instrument_node=""> (American Hairless &amp; others)</span></p><p data-dcnode-id="661"><span data-dcnode-id="663" style="color: rgb(56, 140, 59);"><span data-dcnode-id="664" instrument_node="">Lilac Dilute</span></span><span data-dcnode-id="662" instrument_node=""> (American Hairless Terrier)</span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="658" style="color: rgb(56, 140, 59);"><span data-dcnode-id="659" instrument_node="">Liver</span></span><span data-dcnode-id="657" instrument_node=""> (Shih Tzu and others)</span></p><p data-dcnode-id="652"><span data-dcnode-id="654" style="color: rgb(56, 140, 59);"><span data-dcnode-id="655" instrument_node="">Merle</span></span><span data-dcnode-id="653" instrument_node=""> (Welsh Corgi and others)</span></p><p data-dcnode-id="648"><span data-dcnode-id="650" style="color: rgb(56, 140, 59);"><span data-dcnode-id="651" instrument_node="">Mustard</span></span><span data-dcnode-id="649" instrument_node=""> (Dandie Dinmont Terrier)</span></p><p data-dcnode-id="644"><span data-dcnode-id="646" style="color: rgb(56, 140, 59);"><span data-dcnode-id="647" instrument_node="">Orange</span></span><span data-dcnode-id="645" instrument_node=""> (German Spitz)</span></p><p data-dcnode-id="640"><span data-dcnode-id="642" style="color: rgb(56, 140, 59);"><span data-dcnode-id="643" instrument_node="">Palomino</span></span><span data-dcnode-id="641" instrument_node=""> (Xoloitzcuintli, Chinese Crested,&nbsp; and others)</span></p><p data-dcnode-id="636"><span data-dcnode-id="638" style="color: rgb(56, 140, 59);"><span data-dcnode-id="639" instrument_node="">Pepper</span></span><span data-dcnode-id="637" instrument_node=""> (Dandie Dinmont Terrier)</span></p><p data-dcnode-id="632"><span data-dcnode-id="634" style="color: rgb(56, 140, 59);"><span data-dcnode-id="635" instrument_node="">Pink</span></span><span data-dcnode-id="633" instrument_node=""> (Chinese Crested)</span></p><p data-dcnode-id="628"><span data-dcnode-id="630" style="color: rgb(56, 140, 59);"><span data-dcnode-id="631" instrument_node="">Platinum</span></span><span data-dcnode-id="629" instrument_node=""> (Silky Terrier)</span></p><p data-dcnode-id="624"><span data-dcnode-id="626" style="color: rgb(56, 140, 59);"><span data-dcnode-id="627" instrument_node="">Red</span></span><span data-dcnode-id="625" instrument_node=""> (Affenpinscher) (Australian Terrier and others)</span></p><p data-dcnode-id="620"><span data-dcnode-id="622" style="color: rgb(56, 140, 59);"><span data-dcnode-id="623" instrument_node="">Red Sesame</span></span><span data-dcnode-id="621" instrument_node=""> (Shiba Inu)</span></p><p data-dcnode-id="616"><span data-dcnode-id="618" style="color: rgb(56, 140, 59);"><span data-dcnode-id="619" instrument_node="">Ruby</span></span><span data-dcnode-id="617" instrument_node=""> (Cavalier King Charles Spaniel)</span></p><p data-dcnode-id="612"><span data-dcnode-id="614" style="color: rgb(56, 140, 59);"><span data-dcnode-id="615" instrument_node="">Sable</span></span><span data-dcnode-id="613" instrument_node=""> (Australian Terrier and many others)</span></p><p data-dcnode-id="608"><span data-dcnode-id="610" style="color: rgb(56, 140, 59);"><span data-dcnode-id="611" instrument_node="">Sandy</span></span><span data-dcnode-id="609" instrument_node=""> (Australian Terrier, Bedlington Terrier, and others)</span></p><p data-dcnode-id="604"><span data-dcnode-id="606" style="color: rgb(56, 140, 59);"><span data-dcnode-id="607" instrument_node="">Seal</span></span><span data-dcnode-id="605" instrument_node=""> (Italian Greyhound and others)</span></p><p data-dcnode-id="600"><span data-dcnode-id="602" style="color: rgb(56, 140, 59);"><span data-dcnode-id="603" instrument_node="">Slate</span></span><span data-dcnode-id="601" instrument_node=""> (Chinese Crested)</span></p><p data-dcnode-id="596"><span data-dcnode-id="598" style="color: rgb(56, 140, 59);"><span data-dcnode-id="599" instrument_node="">Tan</span></span><span data-dcnode-id="597" instrument_node=""> (Beagle, and others)</span></p><p data-dcnode-id="592"><span data-dcnode-id="594" style="color: rgb(56, 140, 59);"><span data-dcnode-id="595" instrument_node="">Wheaten</span></span><span data-dcnode-id="593" instrument_node=""> (Many breeds)</span></p><p data-dcnode-id="588"><span data-dcnode-id="590" style="color: rgb(56, 140, 59);"><span data-dcnode-id="591" instrument_node="">White</span></span><span data-dcnode-id="589" instrument_node=""> (American Eskimo Dog and others)</span></p><p data-dcnode-id="584"><span data-dcnode-id="586" style="color: rgb(56, 140, 59);"><span data-dcnode-id="587" instrument_node="">Wild Boar</span></span><span data-dcnode-id="585" instrument_node=""> (Dachshund)</span></p><p data-dcnode-id="580"><span data-dcnode-id="582" style="color: rgb(56, 140, 59);"><span data-dcnode-id="583" instrument_node="">Wolf Grey</span></span><span data-dcnode-id="581" instrument_node=""> (German Spitz)</span></p><p data-dcnode-id="576"><span data-dcnode-id="578" style="color: rgb(56, 140, 59);"><span data-dcnode-id="579" instrument_node="">Yellow</span></span><span data-dcnode-id="577" instrument_node=""> (Several Breeds)</span></p><span data-dcnode-id="575" instrument_node="">
</span><h2 data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Color Definitions</span></h2><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="567"><b data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Brindle:&nbsp;</span></b><span data-dcnode-id="568" style="font-weight: normal;"><span data-dcnode-id="569" instrument_node="">A very distinct color pattern that may appear as stripes on the dog's body.&nbsp; It usually appears as black, tan, brown, or red with some colors more distinct than others.&nbsp;&nbsp;</span></span></p><p data-dcnode-id="563"><b data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Grizzle:</span></b><span data-dcnode-id="564" instrument_node=""> A color pattern that looks like mixed or blend of colors with not distinct pattern, that makes the coat look like one color until you look closely.&nbsp; &nbsp;</span></p><p data-dcnode-id="559"><b data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Isabella:</span></b><span data-dcnode-id="560" instrument_node=""> a pale grey-yellow, pale fawn, pale cream-brown or parchment colour.</span></p><span data-dcnode-id="558" instrument_node="">
</span><h2 data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Dog Names By Color (Groupings)</span></h2><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Now let's put together the list above to create some great dog names based on color.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" style="color: rgb(0, 0, 238);"><b data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Apricot:&nbsp; </span></b><span data-dcnode-id="548" style="font-weight: normal;color: rgb(68, 68, 68);"><span data-dcnode-id="549" instrument_node="">A very pale orange color</span></span></span></p><p data-dcnode-id="541"><span data-dcnode-id="543" style="color: rgb(0, 0, 238);"><b data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Browns:&nbsp;</span></b></span><span data-dcnode-id="542" instrument_node=""> This group
can include mahogany, chocolate, liver, gray browns mixture of black and brown
(brindle), or a mid-tone brown.&nbsp; </span></p><p data-dcnode-id="536"><span data-dcnode-id="538" style="color: rgb(0, 0, 238);"><b data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Gold and Tans:</span></b></span><span data-dcnode-id="537" instrument_node=""> include those breeds that have a reddish yellow
appearance, but also fawn, apricot, wheaten, tawny,
straw, mustard, sandy, honey yellow, lemon, and
buff. </span></p><p data-dcnode-id="531"><span data-dcnode-id="533" style="color: rgb(0, 0, 238);"><b data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Grays:</span></b></span><span data-dcnode-id="532" instrument_node=""> &nbsp;Shade can be
Slate, charcoal, silver, pepper, grizzle, steel.&nbsp; Sometimes blues are called gray. </span></p><p data-dcnode-id="526"><span data-dcnode-id="528" style="color: rgb(0, 0, 238);"><b data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Reds:</span></b></span><span data-dcnode-id="527" instrument_node=""> Color tones range from orange, chestnut, roan, rust,
tan or ruby.&nbsp; Tawny and Blenheim
(Red-brown and white) would fall into this group. Some are much redder in appearance than others.</span></p><p data-dcnode-id="521"><span data-dcnode-id="523" style="color: rgb(0, 0, 238);"><b data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Blues:</span></b></span><span data-dcnode-id="522" instrument_node="">&nbsp; Normally blues
look more like a dark grey, metallic grey, gunpowder
gray, with the nose color being more of a slate gray.</span></p><p data-dcnode-id="516"><span data-dcnode-id="518" style="color: rgb(0, 0, 238);"><b data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Blacks:&nbsp;</span></b></span><span data-dcnode-id="517" instrument_node=""> Pure black is
the most common, but when black is mixed with red, it is often referred to as seal</span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="512" style="color: rgb(0, 0, 238);"><b data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">White:&nbsp;</span></b></span><span data-dcnode-id="511" instrument_node=""> Usually pure
white but can also refer to light cream color or very light lemon coloration</span></p><p data-dcnode-id="501"><span data-dcnode-id="507" style="color: rgb(0, 0, 238);"><b data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Creams:&nbsp;</span></b></span><span data-dcnode-id="506" instrument_node=""> Pale yellow to almost white whereas </span><span data-dcnode-id="503" style="color: rgb(0, 0, 238);"><b data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">fawns</span></b></span><span data-dcnode-id="502" instrument_node=""> are more of a yellow, tan or very light brown that has a black or dark colored face mask.&nbsp; Creams vary among breeds and also can appear as ivory or blond.</span></p><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Choosing a dog name by color is a fun way to name your puppy.&nbsp; Look at your pup's hair color and match it to the colors listed below.</span></p><span data-dcnode-id="498" instrument_node="">
