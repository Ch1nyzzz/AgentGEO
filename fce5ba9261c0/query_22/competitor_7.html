</span><div class="featured-area" data-dcnode-id="1573"><div class="featured-area-inner" data-dcnode-id="1574"><figure class="single-featured-image" data-dcnode-id="1575"><img alt="empirical evidence" class="attachment-jannah-image-post size-jannah-image-post wp-post-image" data-dcnode-id="1582" height="228" is_main_img="1" sizes="(max-width: 350px) 100vw, 350px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemistryrack.com/wp-content/uploads/2020/05/cool-chemistry.jpg&amp;raw" srcset="https://chemistryrack.com/wp-content/uploads/2020/05/cool-chemistry.jpg 350w, https://chemistryrack.com/wp-content/uploads/2020/05/cool-chemistry-300x195.jpg 300w" width="350"><span data-dcnode-id="1581" instrument_node="">
</span><figcaption class="single-caption-text" data-dcnode-id="1577"><span data-dcnode-id="1580" instrument_node="">
</span><span aria-hidden="true" class="tie-icon-camera" data-dcnode-id="1579"></span><span data-dcnode-id="1578" instrument_node=""> empirical evidence

</span><div class="entry-content entry clearfix" data-dcnode-id="1285"><span data-dcnode-id="1571" instrument_node="">
</span><div class="stream-item stream-item-above-post-content" data-dcnode-id="1564"><span data-dcnode-id="1569" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7587536106796918" data-ad-format="auto" data-ad-slot="4064517292" data-dcnode-id="1568" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1567" instrument_node="">
</span></div><span data-dcnode-id="1563" instrument_node="">
</span><p class="amp-wp-article-header" data-dcnode-id="1560" style="text-align: justify;"><img class="i-amphtml-intrinsic-sizer" data-dcnode-id="1562" role="presentation" style="max-width: 100%; display: block !important;" width="768px"><span data-dcnode-id="1561" instrument_node="">Chemical reactions often produce dramatic color changes. The color changing chemistry experiments are interesting, visually appealing and illustrate a wide range of chemical processes. These chemical reactions are visible examples of chemical changes in matter. For example, color change experiments can show redox, pH changes, temperature changes, exothermic and endothermic reactions, stoichiometry, and other important concepts. The colors associated with the holidays are popular, such as red-green for Christmas and orange-black for Halloween. There is a colorful reaction for just about any occasion.</span></p><div class="stream-item stream-item-in-post stream-item-inline-post aligncenter" data-dcnode-id="1553"><span data-dcnode-id="1558" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7587536106796918" data-ad-format="auto" data-ad-slot="4064517292" data-dcnode-id="1557" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1556" instrument_node="">
</span></div><span data-dcnode-id="1552" instrument_node="">
</span><div class="amp-wp-article-content" data-dcnode-id="1297"><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549" style="text-align: justify;"><span data-dcnode-id="1550" instrument_node="">Here is a list of color change chemistry experiments, in all colors of the rainbow.</span></p><span data-dcnode-id="1548" instrument_node="">
</span><h3 data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Try the Briggs-Rauscher oscillatory clock reaction</span></h3><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1542" style="text-align: justify;"><img class="i-amphtml-intrinsic-sizer" data-dcnode-id="1544" role="presentation" style="max-width: 100%; display: block !important;" width="350px"><span data-dcnode-id="1543" instrument_node="">The Briggs-Rauscher reaction changes color from amber to blue.</span></p><div class="stream-item stream-item-in-post stream-item-inline-post aligncenter" data-dcnode-id="1535"><span data-dcnode-id="1540" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7587536106796918" data-ad-format="auto" data-ad-slot="4064517292" data-dcnode-id="1539" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1538" instrument_node="">
</span></div><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1532" style="text-align: justify;"><span data-dcnode-id="1533" instrument_node="">The oscillating Clock or Briggs-Rauscher reaction changes color from clear to orange to blue.&nbsp;The reaction takes place between colors for a few minutes, eventually becoming blue-black.</span></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1529" style="text-align: justify;"><span data-dcnode-id="1530" instrument_node="">Try Briggs-Rauscher’s color change reaction</span></p><span data-dcnode-id="1528" instrument_node="">
</span><h3 data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Fun water in the demonstration of blood or wine</span></h3><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1522" style="text-align: justify;"><img class="i-amphtml-intrinsic-sizer" data-dcnode-id="1524" role="presentation" style="max-width: 100%; display: block !important;" width="768px"><span data-dcnode-id="1523" instrument_node="">A pH indicator can be used to turn water into wine or blood.</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519" style="text-align: justify;"><span data-dcnode-id="1520" instrument_node="">PH indicators are extremely useful for chemical color change reactions.&nbsp;For example, you can use the phenolphthalein indicator to make the water turn into blood or wine and rise back into the water (clear – red – clear).</span></p><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1516" style="text-align: justify;"><span data-dcnode-id="1517" instrument_node="">This simple color change demonstration is perfect for Halloween or Easter.</span></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513" style="text-align: justify;"><span data-dcnode-id="1514" instrument_node="">Turn water into blood or wine</span></p><span data-dcnode-id="1512" instrument_node="">
</span><h3 data-dcnode-id="1510" style="text-align: justify;"><span data-dcnode-id="1511" instrument_node="">Olympic Rings Color Chemistry</span></h3><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1506" style="text-align: justify;"><img class="i-amphtml-intrinsic-sizer" data-dcnode-id="1508" role="presentation" style="max-width: 100%; display: block !important;" width="768px"><span data-dcnode-id="1507" instrument_node="">Use chemistry to transform the solutions to the colors of the Olympic rings.</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503" style="text-align: justify;"><span data-dcnode-id="1504" instrument_node="">Transition metal complexes produce brightly colored chemical solutions.&nbsp;A beautiful demonstration of the effect is called the Olympic rings.&nbsp;Clear solutions change color to make the symbolic colors of the Olympic Games.</span></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1500" style="text-align: justify;"><span data-dcnode-id="1501" instrument_node="">Make Olympic rings with chemistry</span></p><span data-dcnode-id="1499" instrument_node="">
</span><h3 data-dcnode-id="1497" style="text-align: justify;"><span data-dcnode-id="1498" instrument_node="">Turn water into gold with chemistry</span></h3><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1493" style="text-align: justify;"><img class="i-amphtml-intrinsic-sizer" data-dcnode-id="1495" role="presentation" style="max-width: 100%; display: block !important;" width="768px"><span data-dcnode-id="1494" instrument_node="">Alchemy can’t really turn water into gold, but it can simulate appearance.</span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1484" style="text-align: justify;"><span data-dcnode-id="1491" instrument_node="">Alchemists try to transform </span><a data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chemistryrack.com/element-in-chemistry-with-examples/"><span data-dcnode-id="1490" instrument_node="">elements</span></a><span data-dcnode-id="1488" instrument_node=""> and other substances into gold.&nbsp;Modern scientists have accomplished this feat using particle accelerators and nuclear reactions, but the best you can manage in a typical chemistry lab is to&nbsp;</span><em data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">spawn</span></em><span data-dcnode-id="1485" instrument_node="">&nbsp;a chemical that turns into gold.&nbsp;It’s a fascinating color change reaction.</span></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1481" style="text-align: justify;"><span data-dcnode-id="1482" instrument_node="">Turn water into “Liquid Gold”</span></p><span data-dcnode-id="1480" instrument_node="">
</span><h3 data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Water – Wine – Milk – Reaction to change in beer color</span></h3><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1474" style="text-align: justify;"><img class="i-amphtml-intrinsic-sizer" data-dcnode-id="1476" role="presentation" style="max-width: 100%; display: block !important;" width="768px"><span data-dcnode-id="1475" instrument_node="">The wine and beer simulated by this demonstration of chemistry are neither alcoholic nor good to drink.</span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1471" style="text-align: justify;"><span data-dcnode-id="1472" instrument_node="">Here is a fun color change project in which a solution is poured from a glass of water into a wine glass, goblet and beer glass.&nbsp;The pre-treatment of the glassware causes the change of the solution which seems to go from water to wine through milk and beer.&nbsp;This set of reactions is perfect for a magic show as well as a demonstration of chemistry.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468" style="text-align: justify;"><span data-dcnode-id="1469" instrument_node="">Try the Water – Wine – Milk – Beer Beer demo</span></p><span data-dcnode-id="1467" instrument_node="">
</span><h3 data-dcnode-id="1465" style="text-align: justify;"><span data-dcnode-id="1466" instrument_node="">Easy to make red cabbage juice pH indicator</span></h3><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1461" style="text-align: justify;"><img class="i-amphtml-intrinsic-sizer" data-dcnode-id="1463" role="presentation" style="max-width: 100%; display: block !important;" width="768px"><span data-dcnode-id="1462" instrument_node="">These are color changes of red cabbage juice at different pH values. Red (acid, lemon juice), blue (neutral, nothing added), green (basic, soap).</span></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1458" style="text-align: justify;"><span data-dcnode-id="1459" instrument_node="">You can use household ingredients to observe the chemistry of the color change.&nbsp;For example, red cabbage juice changes color in response to changes in pH when mixed with other chemicals.&nbsp;No dangerous chemicals are needed, plus you can use the juice to make homemade pH paper, which will change color when used to test household or laboratory chemicals.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><ul data-dcnode-id="1443" style="text-align: justify;"><span data-dcnode-id="1456" instrument_node="">
</span><li data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">Make the pH indicator of red cabbage</span></li><span data-dcnode-id="1453" instrument_node="">
</span><li data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Make homemade pH paper</span></li><span data-dcnode-id="1450" instrument_node="">
</span><li data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Make a chemical rainbow using cabbage juice</span></li><span data-dcnode-id="1447" instrument_node="">
</span><li data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Use the cabbage juice to make green eggs</span></li><span data-dcnode-id="1444" instrument_node="">
</span></ul><span data-dcnode-id="1442" instrument_node="">
</span><h3 data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Color change of the blue bottle (other colors too)</span></h3><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1436" style="text-align: justify;"><img class="i-amphtml-intrinsic-sizer" data-dcnode-id="1438" role="presentation" style="max-width: 100%; display: block !important;" width="768px"><span data-dcnode-id="1437" instrument_node="">The color change of the classic blue bottle is clear to blue, but there are many other color variations you can try.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433" style="text-align: justify;"><span data-dcnode-id="1434" instrument_node="">The classic “blue bottle” color change reaction uses methylene blue in a color change reaction from clear to blue and from blue to blue.&nbsp;Other indicators also work, so you can change the colors from red to red (resazurin) or from green to red / yellow to green (indigo carmine).</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430" style="text-align: justify;"><span data-dcnode-id="1431" instrument_node="">Try the blue bottle color change demonstration</span></p><span data-dcnode-id="1429" instrument_node="">
</span><h3 data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Rainbow Wand Magic Chemical Reaction – 2 Ways</span></h3><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1423" style="text-align: justify;"><img class="i-amphtml-intrinsic-sizer" data-dcnode-id="1425" role="presentation" style="max-width: 100%; display: block !important;" width="768px"><span data-dcnode-id="1424" instrument_node="">You can configure the demonstration of the rainbow rod to pass through a single glass tube or through a set of test tubes.</span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420" style="text-align: justify;"><span data-dcnode-id="1421" instrument_node="">You can use a pH indicator solution to display a rainbow of colors.&nbsp;All you need is the right indicator and either an indicator solution containing a glass tube and a pH gradient or a series of test tubes with different pH values.&nbsp;Two indicators that work well for this color change are the universal indicator and the red cabbage juice.</span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1417" style="text-align: justify;"><span data-dcnode-id="1418" instrument_node="">Make a pH Rainbow Wand</span></p><span data-dcnode-id="1416" instrument_node="">
</span><h3 data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Spooky Old Nassau or Halloween color change reaction</span></h3><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1410" style="text-align: justify;"><img class="i-amphtml-intrinsic-sizer" data-dcnode-id="1412" role="presentation" style="max-width: 100%; display: block !important;" width="768px"><span data-dcnode-id="1411" instrument_node="">The chemical solution changes from orange to black in the Old Nassau reaction.</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407" style="text-align: justify;"><span data-dcnode-id="1408" instrument_node="">Old Nassau’s reaction is popular as a demonstration of Halloween chemistry because the chemical solution changes from orange to black.&nbsp;The traditional form of the demonstration uses mercury chloride, so this reaction is no longer commonly seen as the solution should not be poured down the drain.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404" style="text-align: justify;"><span data-dcnode-id="1405" instrument_node="">Try Old Nassau Reaction</span></p><span data-dcnode-id="1403" instrument_node="">
</span><h3 data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Valentine’s Day Pink Color Change Demonstrations</span></h3><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1397" style="text-align: justify;"><img class="i-amphtml-intrinsic-sizer" data-dcnode-id="1399" role="presentation" style="max-width: 100%; display: block !important;" width="485px"><span data-dcnode-id="1398" instrument_node="">Pink chemical solutions are ideal for demonstrations of Valentine’s Day chemistry.</span></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394" style="text-align: justify;"><span data-dcnode-id="1395" instrument_node="">Try a demonstration of pink color change chemistry for Valentine’s Day.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391" style="text-align: justify;"><span data-dcnode-id="1392" instrument_node="">The “hot and cold Valentine” is a temperature-dependent color change from pink to colorless and pink.&nbsp;The reaction uses the common indicator phenolphthalein.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388" style="text-align: justify;"><span data-dcnode-id="1389" instrument_node="">The “Vanishing Valentine” uses a resazurin solution which starts in blue.&nbsp;After a few minutes, this solution becomes clear.&nbsp;When the bottle is swirled, the contents turn pink.&nbsp;The liquid becomes colorless again and can be recycled several times through the clear-to-pink cycle.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><ul data-dcnode-id="1379" style="text-align: justify;"><span data-dcnode-id="1386" instrument_node="">
</span><li data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Try the hot and cold Valentine’s Day reaction</span></li><span data-dcnode-id="1383" instrument_node="">
</span><li data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Try the Vanishing Valentine Demonstration</span></li><span data-dcnode-id="1380" instrument_node="">
</span></ul><span data-dcnode-id="1378" instrument_node="">
</span><h3 data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Red and green Christmas chemistry Color change reaction</span></h3><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1372" style="text-align: justify;"><img class="i-amphtml-intrinsic-sizer" data-dcnode-id="1374" role="presentation" style="max-width: 100%; display: block !important;" width="768px"><span data-dcnode-id="1373" instrument_node="">You can use indigo carmine to make a solution that changes color from green to red.</span></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1369" style="text-align: justify;"><span data-dcnode-id="1370" instrument_node="">You can use indigo carmine to make a color-changing solution from green to red, making it a great demonstration of Christmas chemistry.&nbsp;In fact, the initial solution is blue, which becomes green and finally red / yellow.&nbsp;The color of the solution can be cycled between green and red.</span></p><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1366" style="text-align: justify;"><span data-dcnode-id="1367" instrument_node="">Try the Christmas color change reaction</span></p><span data-dcnode-id="1365" instrument_node="">
</span><h3 data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Chemical reactions of colored flames to try</span></h3><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1359" style="text-align: justify;"><img class="i-amphtml-intrinsic-sizer" data-dcnode-id="1361" role="presentation" style="max-width: 100%; display: block !important;" width="768px"><span data-dcnode-id="1360" instrument_node="">Chemical reactions can change the color of the flames.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356" style="text-align: justify;"><span data-dcnode-id="1357" instrument_node="">Color change chemistry is not limited to chemical solutions.&nbsp;Chemical reactions also produce interesting colors in the flames.&nbsp;Colored fire bombs may be the most popular, when a person sprays a solution to a flame, changing its color.&nbsp;Many other interesting projects are available.&nbsp;These reactions are the basis of flame and bead tests, used to identify unknown samples.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><ul data-dcnode-id="1338" style="text-align: justify;"><span data-dcnode-id="1354" instrument_node="">
</span><li data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Make color fire spray bottles</span></li><span data-dcnode-id="1351" instrument_node="">
</span><li data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Colorful rainbow demonstration</span></li><span data-dcnode-id="1348" instrument_node="">
</span><li data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Make colorful candle flames</span></li><span data-dcnode-id="1345" instrument_node="">
</span><li data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">How to do a flame test</span></li><span data-dcnode-id="1342" instrument_node="">
</span><li data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">How to do a pearl test</span></li><span data-dcnode-id="1339" instrument_node="">
</span></ul><span data-dcnode-id="1337" instrument_node="">
</span><h3 data-dcnode-id="1335" style="text-align: justify;"><span data-dcnode-id="1336" instrument_node="">More color change chemistry experiments</span></h3><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1331" style="text-align: justify;"><img class="i-amphtml-intrinsic-sizer" data-dcnode-id="1333" role="presentation" style="max-width: 100%; display: block !important;" width="768px"><span data-dcnode-id="1332" instrument_node="">Many chemical reactions produce color changes.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328" style="text-align: justify;"><span data-dcnode-id="1329" instrument_node="">There are many more chemical color change reactions than you can do as experiments and demonstrations.&nbsp;Here are a few to try:</span></p><span data-dcnode-id="1327" instrument_node="">
