</span></li><span data-dcnode-id="2632" instrument_node="">
</span><li class="popular-desc popular-list" data-dcnode-id="2627"><span data-dcnode-id="2631" instrument_node="">
</span><a class="popular-link" data-dcnode-id="2629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cen.acs.org/safety/consumer-safety/know-enough-safety-quat-disinfectants/98/i30%3Futm_source%3Dmostread%26utm_medium%3Dmostread%26utm_campaign%3DCEN"><span data-dcnode-id="2630" instrument_node="">Do we know enough about the safety of quat disinfectants?</span></a><span data-dcnode-id="2628" instrument_node="">
</span></li><span data-dcnode-id="2626" instrument_node="">

</span><div class="grid-container" data-dcnode-id="1535"><span data-dcnode-id="2603" instrument_node="">

</span><p data-dcnode-id="2598" style="margin-top:-20px;"><span data-dcnode-id="2599" instrument_node="">
</span></p></div><span data-dcnode-id="2596" instrument_node="">
</span><div class="long-form-text-par-1 long-form-text-parsys parsys" data-dcnode-id="2581"><div class="image section" data-dcnode-id="2583"><span data-dcnode-id="2595" instrument_node="">
</span><div class="image-component image-component-full" data-dcnode-id="2585"><span data-dcnode-id="2594" instrument_node="">
</span><img alt="Image of a woman getting tattooed." class="dmm-resize-img-full cq-dd-image" data-dcnode-id="2593" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cen.acs.org/content/dam/cen/94/33/09433-govpol1-openertatoocxd.jpg&amp;raw" title="Image of a woman getting tattooed."><span data-dcnode-id="2592" instrument_node="">
</span><div class="credit" data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">
Credit: Shutterstock
</span></div><span data-dcnode-id="2589" instrument_node="">
</span><div class="caption" data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">
According to current surveys in Italy, Denmark, and the U.S., more women than men have tattoos.
</span></div><span data-dcnode-id="2586" instrument_node="">
</span></div><span data-dcnode-id="2584" instrument_node="">
</span></div><span data-dcnode-id="2582" instrument_node="">
</span></div><span data-dcnode-id="2580" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2574"><span data-dcnode-id="2579" instrument_node="">
</span><p data-dcnode-id="2576"><span class="text-first-letter-old" data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">Humans have been tattooing themselves for millennia, motivated by reasons as diverse as the designs decorating their skin. Crusaders tattooed crosses on their bodies to ensure they’d go to heaven, while for centuries, sailors inked their bodies to boast about where they’d travelled. The 61 tattoos on Ötzi, a 5,300-year-old mummy discovered in the Alps, were all located near his joints, leaving researchers to speculate that the tattoos may have been part of an ancient arthritis treatment.</span></span></p><span data-dcnode-id="2575" instrument_node="">
</span></div><span data-dcnode-id="2573" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2568"><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">These days, however, most of the 120 million tattooed people worldwide have inked themselves for fashion. This trend is on the upswing among young adults, especially women, who now possess more inked body art than men in Italy, Denmark, and the U.S., according to Darren McGarry, who led a panel discussion about tattoo science and policy at the European Science Open Forum (ESOF) conference in Manchester, Eng­land, in late July.</span></p><span data-dcnode-id="2569" instrument_node="">
</span></div><span data-dcnode-id="2567" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2562"><span data-dcnode-id="2566" instrument_node="">
</span><p data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">But if tattoos are now commonplace, knowing the ingredients and provenance of the colorful cocktail injected beneath the skin is not. It’s not widely known by the general public that the pigments found in tattoo inks can be repurposed from the textile, plastics, or car paint industry, said McGarry, who works at Joint Research Centre (JRC), which provides independent scientific advice to the European Commission.</span></p><span data-dcnode-id="2563" instrument_node="">
</span></div><span data-dcnode-id="2561" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2556"><span data-dcnode-id="2560" instrument_node="">
</span><p data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">Members of the ESOF panel voiced concern about patchy regulatory oversight of tattoo inks in the European Union and about a tattooing culture in which consumers rarely question tattoo artists about the origin of the pigments that decorate their bodies. Given these issues, they called for research on the long-term health risks of tattooing and for harmonizing regulations controlling tattoo parlors and inks across the EU.</span></p><span data-dcnode-id="2557" instrument_node="">
</span></div><span data-dcnode-id="2555" instrument_node="">
</span><div class="long-form-text-par-5 long-form-text-parsys parsys" data-dcnode-id="2506"><div class="image section" data-dcnode-id="2508"><span data-dcnode-id="2554" instrument_node="">
</span><div class="image-component image-component-medium pull-right" data-dcnode-id="2510"><span data-dcnode-id="2553" instrument_node="">
</span><div class="image-title" data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">
Inked
</span></div><span data-dcnode-id="2550" instrument_node="">
</span><a data-dcnode-id="2545" onclick="doMediaModal({'modal_div': 'media_modal_cen\u002D09433\u002Dgovpol1\u002Dtab\u002Dgr2', 'mediaPath': '\/content\/dam\/cen\/94\/33\/09433\u002Dgovpol1\u002Dtab\u002D350.png'})"><span data-dcnode-id="2549" instrument_node="">
</span><span class="enlarge_text" data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">[+]Enlarge</span></span><span data-dcnode-id="2546" instrument_node="">
</span></a><span data-dcnode-id="2544" instrument_node="">
</span><div data-dcnode-id="2524"><span data-dcnode-id="2543" instrument_node="">
</span><div class="media_modal_image" data-dcnode-id="2526" id="media_modal_cen-09433-govpol1-tab-gr2"><span data-dcnode-id="2542" instrument_node="">
</span><div class="imagePopup" data-dcnode-id="2528"><span data-dcnode-id="2541" instrument_node="">
</span><img data-dcnode-id="2540" frameborder="0" scrolling="no" width="80%"><span data-dcnode-id="2539" instrument_node="">
</span><div class="credit" data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">
Credit: Joint Research Centre
</span></div><span data-dcnode-id="2536" instrument_node="">
</span><div class="description" data-dcnode-id="2530"><span data-dcnode-id="2535" instrument_node="">
Tattooed inhabitants in these countries and regions compose less than one-quarter of the population.</span><br data-dcnode-id="2534"><b data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">Source:</span></b><span data-dcnode-id="2531" instrument_node=""> Joint Research Centre
</span></div><span data-dcnode-id="2529" instrument_node="">
</span></div><span data-dcnode-id="2527" instrument_node="">
</span></div><span data-dcnode-id="2525" instrument_node="">
</span></div><span data-dcnode-id="2523" instrument_node="">
</span><img alt="Table showing prevalence of tattoos in different regions of the world." class="dmm-resize-img-medium cq-dd-image" data-dcnode-id="2522" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cen.acs.org/content/dam/cen/94/33/09433-govpol1-tab-350.png&amp;raw" title="Table showing prevalence of tattoos in different regions of the world."><span data-dcnode-id="2521" instrument_node="">
</span><div class="credit" data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">
Credit: Joint Research Centre
</span></div><span data-dcnode-id="2518" instrument_node="">
</span><div class="caption" data-dcnode-id="2512"><span data-dcnode-id="2517" instrument_node="">
Tattooed inhabitants in these countries and regions compose less than one-quarter of the population.</span><br data-dcnode-id="2516"><b data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Source:</span></b><span data-dcnode-id="2513" instrument_node=""> Joint Research Centre
</span></div><span data-dcnode-id="2511" instrument_node="">
</span></div><span data-dcnode-id="2509" instrument_node="">
</span></div><span data-dcnode-id="2507" instrument_node="">
</span></div><span data-dcnode-id="2505" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2500"><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">According to a report the JRC released this year, European regulators and others are concerned that “pigments used in the formulation of tattoo and permanent make-up inks are not produced for such purpose and do not undergo any risk assessment that takes into account their injection into the human body for long-term permanence.”</span></p><span data-dcnode-id="2501" instrument_node="">
</span></div><span data-dcnode-id="2499" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2494"><span data-dcnode-id="2498" instrument_node="">
</span><p data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">The report notes that in the U.S. and Canada, policies that govern tattooing are also spotty. In those countries, the procedure is regulated at state or provincial levels, generating “a wide variety of guidelines and hygiene standards.”</span></p><span data-dcnode-id="2495" instrument_node="">
</span></div><span data-dcnode-id="2493" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2485"><span data-dcnode-id="2492" instrument_node="">
</span><p data-dcnode-id="2487"><span data-dcnode-id="2491" instrument_node="">Tattoo artists also have concerns. “There are certainly really good producers of ink. But some of the inks on the market weren’t intended for tattooing. They just put them in a fancy bottle, put a dragon on the bottle, and write ‘tattoo’ on it,” said </span><a data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//heavenlyink.se/" shape="rect" target="_blank" title="Jens Bergström"><span data-dcnode-id="2490" instrument_node="">Jens Bergström</span></a><span data-dcnode-id="2488" instrument_node="">, who has been a tattoo artist for 20 years and owns the Heavenly Ink Tattoo &amp; Piercing studio in Åkersberga, Sweden. “That’s how easy it is, and that’s the danger,” said Bergström, who was a panelist at ESOF.</span></p><span data-dcnode-id="2486" instrument_node="">
</span></div><span data-dcnode-id="2484" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2476"><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2478"><span data-dcnode-id="2482" instrument_node="">The 118-page </span><a data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/jrc/en/publication/eur-scientific-and-technical-research-reports/safety-tattoos-and-permanent-make-final-report" shape="rect" target="_blank" title="Safety report on tattoos and permanent make-up"><span data-dcnode-id="2481" instrument_node="">JRC report</span></a><span data-dcnode-id="2479" instrument_node="">—which compiled surveillance, ingredient analysis, and adverse reaction data—found that tattoo and permanent makeup products containing dangerous substances or contaminated by microbes “are available on the EU market. The main risks identified, in descending order, are the presence of polycyclic aromatic hydrocarbons, primary aromatic amines, microorganisms, heavy metals, and preservatives.”</span></p><span data-dcnode-id="2477" instrument_node="">
</span></div><span data-dcnode-id="2475" instrument_node="">
</span><div class="long-form-text-par-9 long-form-text-parsys parsys" data-dcnode-id="2462"><div class="inArticleRevealAds" data-dcnode-id="2464"><span data-dcnode-id="2474" instrument_node="">
</span><span data-dcnode-id="2471" instrument_node="">
</span><div class="inArticleRevealAd1" data-dcnode-id="2466" id="div-gpt-ad-2894946-1"><span data-dcnode-id="2470" instrument_node="">
</span><span data-dcnode-id="2467" instrument_node="">
</span></div><span data-dcnode-id="2465" instrument_node="">
</span></div><span data-dcnode-id="2463" instrument_node="">
</span></div><span data-dcnode-id="2461" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2450"><span data-dcnode-id="2460" instrument_node="">
</span><p data-dcnode-id="2452"><span data-dcnode-id="2459" instrument_node="">“Most consumers are aware of the infection risks, but few are aware of the chemical risks,” said </span><a data-dcnode-id="2457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.esof.eu/speakers/speakers-details/anke-meisner.html" shape="rect" target="_blank" title="Anke Meisner"><span data-dcnode-id="2458" instrument_node="">Anke Meisner</span></a><span data-dcnode-id="2456" instrument_node="">, a policy officer at the German Federal Ministry of Food &amp; Agriculture and a panel member at the ESOF conference. According to the JRC report, from 2005 to 2015, chemical ingredients were the primary concern in 95% of the 126 tattoo ink cases reported to the EU’s </span><a data-dcnode-id="2454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ec.europa.eu/consumers/consumers_safety/safety_products/rapex/alerts/main/%3Fevent%3Dmain.listNotifications" shape="rect" target="_blank" title="RAPEX"><span data-dcnode-id="2455" instrument_node="">rapid alert system</span></a><span data-dcnode-id="2453" instrument_node=""> for dangerous products.</span></p><span data-dcnode-id="2451" instrument_node="">
</span></div><span data-dcnode-id="2449" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2444"><span data-dcnode-id="2448" instrument_node="">
</span><p data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Inks imported from the U.S. were responsible for two-thirds of the tattoo-related alerts sent to European authorities, the JRC report says. A further one-quarter of these problematic inks came from China, Japan, and some European countries, while the provenance of 9% of products was unknown.</span></p><span data-dcnode-id="2445" instrument_node="">
</span></div><span data-dcnode-id="2443" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2438"><span data-dcnode-id="2442" instrument_node="">
</span><p data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">According to the JRC report, the bulk of tattoo health complications involve allergic reactions and hypersensitivity, mostly in red or black areas of tattoos.</span></p><span data-dcnode-id="2439" instrument_node="">
</span></div><span data-dcnode-id="2437" instrument_node="">
</span><div class="long-form-text-par-12 long-form-text-parsys parsys" data-dcnode-id="2422"><div class="image section" data-dcnode-id="2424"><span data-dcnode-id="2436" instrument_node="">
</span><div class="image-component image-component-full" data-dcnode-id="2426"><span data-dcnode-id="2435" instrument_node="">
</span><img alt="Reaction scheme of a degradation pathway for an azo dye." class="dmm-resize-img-full cq-dd-image" data-dcnode-id="2434" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cen.acs.org/content/dam/cen/94/33/09433-govpol1-reaction-700.png&amp;raw" title="Reaction scheme of a degradation pathway for an azo dye."><span data-dcnode-id="2433" instrument_node="">
</span><div class="caption" data-dcnode-id="2428"><span data-dcnode-id="2432" instrument_node="">
Some azo pigments found in tattoos, such as Solvent Red 1, can degrade into problematic compounds such as </span><i data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">o</span></i><span data-dcnode-id="2429" instrument_node="">-anisidine, a potential carcinogen.
</span></div><span data-dcnode-id="2427" instrument_node="">
</span></div><span data-dcnode-id="2425" instrument_node="">
</span></div><span data-dcnode-id="2423" instrument_node="">
</span></div><span data-dcnode-id="2421" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2413"><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2415"><span data-dcnode-id="2419" instrument_node="">Dermatologist </span><a data-dcnode-id="2417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.esof.eu/speakers/speakers-details/jorgen-vedelskov-serup.html" shape="rect" target="_blank" title="Jørgen Vedelskov Serup"><span data-dcnode-id="2418" instrument_node="">Jørgen Vedelskov Serup</span></a><span data-dcnode-id="2416" instrument_node=""> of Bispebjerg Hospital says he’s cared for 500-plus problem tattoo cases. Serup told ESOF attendees he’s seen lumpy, so-called papulonodular skin elevation from pigment overload, chronic inflammation, long-term light sensitivity and other side effects from tattooing. “As a doctor, if you do a cosmetic procedure, by law, you have to tell the patients the risks. It’s amazing that the same is not [universally] required in tattooing,” Serup said.</span></p><span data-dcnode-id="2414" instrument_node="">
</span></div><span data-dcnode-id="2412" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2407"><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">Tattoo inks can contain a cornucopia of compounds: Some 100 pigments and 100 additives have been found in these products, Maria Pilar Aguar Fernandez told ESOF attendees. She is responsible for the Chemicals Assessment &amp; Testing Unit at the JRC and was involved in writing the organization’s tattoo report.</span></p><span data-dcnode-id="2408" instrument_node="">
</span></div><span data-dcnode-id="2406" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2398"><span data-dcnode-id="2405" instrument_node="">
</span><p data-dcnode-id="2400"><span data-dcnode-id="2404" instrument_node="">The top chemicals of concern found in tattoo inks, according to the report, are polycyclic aromatic hydrocarbons (PAHs), such as benzo[</span><i data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">a</span></i><span data-dcnode-id="2401" instrument_node="">]pyrene, which is listed as a human carcinogen by the International Agency for Research on Cancer (IARC). The report notes PAHs can migrate from the skin to lymph nodes. These problematic chemicals are found mostly in black inks and are most likely impurities from industrial production—in fact, some tattoo formulations are only between 70–90% pure, the report says. Tattoo inks may also contain potentially harmful metal impurities such as chromium, nickel, copper, and cobalt.</span></p><span data-dcnode-id="2399" instrument_node="">
</span></div><span data-dcnode-id="2397" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2392"><span data-dcnode-id="2396" instrument_node="">
</span><p data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">Tattoo pigments themselves can be health hazards. “If the ink is really bright in color, it usually contains dangerous stuff,” tattoo artist Bergström said. Fortunately, cinnabar, a mercury sulfide pigment, which was once a popular bright red in tattoo formulations, has been phased out of use.</span></p><span data-dcnode-id="2393" instrument_node="">
</span></div><span data-dcnode-id="2391" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2386"><span data-dcnode-id="2390" instrument_node="">
</span><p data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">Currently, stakeholders are more concerned about azo pigments, the organic pigments making up about 60% of the colorants in tattoo inks. Although many of these azo pigments are not of health concern while chemically intact, they can degrade with the help of bacteria or ultraviolet light into potentially cancer-causing primary aromatic amines, notes the report.</span></p><span data-dcnode-id="2387" instrument_node="">
</span></div><span data-dcnode-id="2385" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2380"><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Furthermore, during tattoo removal—by some surveys up to 50% of tattoo owners come to regret their ink—lasers are often used to blast apart pigments, sending problematic degradation products into the body.</span></p><span data-dcnode-id="2381" instrument_node="">
</span></div><span data-dcnode-id="2379" instrument_node="">
</span><div class="long-form-text-par-18 long-form-text-parsys parsys" data-dcnode-id="2372"><div class="sponsoredContent" data-dcnode-id="2374"><span data-dcnode-id="2378" instrument_node="">
</span><div class="article-sponsored-component full-width" data-dcnode-id="2376" id="long-article-nativo-1"><span data-dcnode-id="2377" instrument_node="">
</span></div><span data-dcnode-id="2375" instrument_node="">
</span></div><span data-dcnode-id="2373" instrument_node="">
</span></div><span data-dcnode-id="2371" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2366"><span data-dcnode-id="2370" instrument_node="">
</span><p data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Researchers don’t know “how these degradation products are distributed in the body and how they get excreted,” Meisner said. “There’s a knowledge gap about metabolism of ingredients.”</span></p><span data-dcnode-id="2367" instrument_node="">
</span></div><span data-dcnode-id="2365" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2357"><span data-dcnode-id="2364" instrument_node="">
</span><p data-dcnode-id="2359"><span data-dcnode-id="2363" instrument_node="">Another problematic component of tattoo inks is the preservatives that can be added to keep microbes from growing in the often nutrient-rich solutions. In </span><a data-dcnode-id="2361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kantonslabor.bs.ch/dms/kantonslabor/download/berichte/berichte-2014/Tattoo_PMU_2014.pdf" shape="rect" target="_blank" title="(PDF in German) Tinten für Tattoos und Permanent Make-Up / Pigmente, Konservierungsstoffe,&amp;#13;Aromatische Amine, Polyaromatische Kohlenwasserstoffe und Nitrosamine&amp;#13;"><span data-dcnode-id="2362" instrument_node="">one survey of 229 tattoo inks</span></a><span data-dcnode-id="2360" instrument_node=""> by Swiss regulators, nearly a quarter of inks analyzed contained the antiseptic benzo­isothiazolinone, which is a skin irritant. Also, 7% of inks in the study contained the preservative formaldehyde, which is classified as a carcinogen by the IARC.</span></p><span data-dcnode-id="2358" instrument_node="">
</span></div><span data-dcnode-id="2356" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2351"><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">The JRC report highlights the need to fund research on the toxicity of tattoo ingredients and how they degrade in the body as well as to fund the development of analytical techniques to detect and monitor impurities. “Prospective epidemiological studies would be needed to ascertain the risk of carcinogenicity from tattoo inks constituents, including their degradation products,” says the report, which also lists this as a research priority.</span></p><span data-dcnode-id="2352" instrument_node="">
</span></div><span data-dcnode-id="2350" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2345"><span data-dcnode-id="2349" instrument_node="">
</span><p data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">“We are facing a tremendous knowledge gap. This is why it is so difficult to develop regulations,” dermatologist Serup said.</span></p><span data-dcnode-id="2346" instrument_node="">
</span></div><span data-dcnode-id="2344" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2339"><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">Across the EU, tattoo inks are regulated under a blanket consumer product law that dictates only safe products may be placed on the market. The European Chemicals Agency is currently investigating whether tattoo ink ingredients should be subject to region-wide regulatory restrictions.</span></p><span data-dcnode-id="2340" instrument_node="">
</span></div><span data-dcnode-id="2338" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2330"><span data-dcnode-id="2337" instrument_node="">
</span><p data-dcnode-id="2332"><span data-dcnode-id="2336" instrument_node="">In 2008, the Council of Europe, an organization focused on promoting human rights and the integration of regulatory functions in the continent, </span><a data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wcd.coe.int/ViewDoc.jsp%3Fp%3D%26Ref%3DResAP%282008%291%26Language%3DlanEnglish%26Ver%3Doriginal%26direct%3Dtrue" shape="rect" target="_blank" title="Resolution ResAP(2008)1"><span data-dcnode-id="2335" instrument_node="">recommended policies</span></a><span data-dcnode-id="2333" instrument_node=""> to ensure the safety of tattoos and permanent makeup. This document lists 62 chemicals that should not be present in tattoos and permanent makeup products. It also recommends that tattoo ink bottles should list best-before dates, batch numbers, and “the name and address of the manufacturer or the person responsible for placing the product on the market,” among other things.</span></p><span data-dcnode-id="2331" instrument_node="">
</span></div><span data-dcnode-id="2329" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2324"><span data-dcnode-id="2328" instrument_node="">
</span><p data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Motivated by the Council of Europe’s recommendations, about one-third of EU countries, including Germany, Spain, and France, implemented a mishmash of their suggestions through national laws. For example, among other regulations, Germany has made it illegal for tattoo inks in the country to contain any chemicals on the Council of Europe’s list of substances banned in cosmetics. “What is not safe on the skin is not safe in the skin,” Germany’s Meisner said. Other EU countries have instituted licensing requirements for tattoo artists or made it illegal to tattoo without informing clients of potential health risks.</span></p><span data-dcnode-id="2325" instrument_node="">
</span></div><span data-dcnode-id="2323" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2318"><span data-dcnode-id="2322" instrument_node="">
</span><p data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Meanwhile the JRC report points out that no information about tattoo regulations was available for Hungary, Iceland, Lithuania, and the U.K. “We have not done any market surveillance in the U.K.,” said Robert Pinchen, a U.K. market surveillance representative at the ESOF conference. “I’m very concerned about the amount of potential counterfeit inks that are on the marketplace and all these do-it-yourself kits that are available,” Pinchen added.</span></p><span data-dcnode-id="2319" instrument_node="">
</span></div><span data-dcnode-id="2317" instrument_node="">
</span><div class="long-form-text-par-26 long-form-text-parsys parsys" data-dcnode-id="2310"><div class="sponsoredContent" data-dcnode-id="2312"><span data-dcnode-id="2316" instrument_node="">
</span><div class="article-sponsored-component pull-left pull-sponsored-old" data-dcnode-id="2314" id="long-article-nativo-2"><span data-dcnode-id="2315" instrument_node="">
</span></div><span data-dcnode-id="2313" instrument_node="">
</span></div><span data-dcnode-id="2311" instrument_node="">
</span></div><span data-dcnode-id="2309" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2304"><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">It’s frustrating that different countries have different rules, said Bergström, the tattoo artist. “We want harmonized rules in the whole European Union.” Until that happens, Bergström suggests that individuals getting a tattoo make informed decisions.</span></p><span data-dcnode-id="2305" instrument_node="">
</span></div><span data-dcnode-id="2303" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2298"><span data-dcnode-id="2302" instrument_node="">
</span><p data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">“Nobody gets forced to have a tattoo. So it’s in your own interest as a consumer to ask questions. If the tattoo artist can answer your questions and produce some documents regarding the ink, that’s a good thing,” Bergström said. “As a practitioner, it is my responsibility that I produce as [low a] risk as possible.”</span></p><span data-dcnode-id="2299" instrument_node="">
</span></div><span data-dcnode-id="2297" instrument_node="">
</span><div class="text-left article-content" data-dcnode-id="2292"><span data-dcnode-id="2296" instrument_node="">
</span><p data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">But, he added, “Don’t just take for granted that all tattoo artists are good or all inks are good. You are also responsible for your own health.”&nbsp;</span></p><span data-dcnode-id="2293" instrument_node="">
</span></div><span data-dcnode-id="2291" instrument_node="">
</span><div class="long-form-text-par-29 long-form-text-parsys parsys" data-dcnode-id="1541"><div class="htmlComponent section" data-dcnode-id="1752"><span data-dcnode-id="2290" instrument_node="">

</span><div class="name_timestamp" data-dcnode-id="1374"><span data-dcnode-id="1377" instrument_node="">Richard </span><span class="timestamp" data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">(August 10, 2016 2:22 PM)</span></span></div><span data-dcnode-id="1373" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Can the ink in the skin be removed and if so how?</span></div><span data-dcnode-id="1370" instrument_node="">
</span></div><span data-dcnode-id="1368" instrument_node="">
</span></div><span data-dcnode-id="1366" instrument_node="">
</span><div class="comment-thread odd" data-dcnode-id="1353"><span data-dcnode-id="1365" instrument_node="">
</span><div class="comment" data-comment-id="421dad3d-a87e-4a6d-a0db-9d98a9554d49" data-dcnode-id="1355"><span data-dcnode-id="1364" instrument_node="">
</span><div class="name_timestamp" data-dcnode-id="1360"><span data-dcnode-id="1363" instrument_node="">Lisa </span><span class="timestamp" data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">(August 10, 2016 2:36 PM)</span></span></div><span data-dcnode-id="1359" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">As a former tattooist, and now student of chemistry, what this article discusses is one of the reasons why I went back to school. The lack of regulation in tattoo ink is shocking. Many manufacturers decline to reveal all the ingredients of their inks claiming it a trade secret. There is also a knowledge gap amoung some tattooists regarding any of the ingredients of their ink. Here in NYC there is a story about how a group of tattooers in the 1970's ordered pigment directly from a chemical company, they received such a large quantity that it is still being used today. Needless to say they did not differentiate between automotive or cosmetic pigments due to ignorance. In modernity tattooing has largely existed as an outside art form, illegal in many places until recently. With its growth in popularity the rest of the world is paying attention to the practice of tattooing. Lets work to make it as safe as possible so that people will have the freedom to adorn themselves as they wish. </span></div><span data-dcnode-id="1356" instrument_node="">
</span></div><span data-dcnode-id="1354" instrument_node="">
</span></div><span data-dcnode-id="1352" instrument_node="">
</span><div class="comment-thread even" data-dcnode-id="1307"><span data-dcnode-id="1351" instrument_node="">
</span><div class="comment" data-comment-id="30ce68c0-d090-405b-83c1-d8f85a0d4529" data-dcnode-id="1309"><span data-dcnode-id="1350" instrument_node="">
</span><div class="name_timestamp" data-dcnode-id="1346"><span data-dcnode-id="1349" instrument_node="">Joseph DiVerdi </span><span class="timestamp" data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">(August 10, 2016 4:24 PM)</span></span></div><span data-dcnode-id="1345" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1325"><span data-dcnode-id="1344" instrument_node="">Thank you for an interesting, topical and informative article. </span><br data-dcnode-id="1343"><br data-dcnode-id="1342"><span data-dcnode-id="1341" instrument_node="">I am, however, writing to pick at one particular point: the subtitle indicates concerns over repurposing inks from other industries. While the concerns certainly exist I would like to suggest that they (1) do not represent best chemistry thought, (2) should not be reproduced directly in best chemistry literature and (3) ought to be vigorously corrected whenever possible by chemists.</span><br data-dcnode-id="1340"><br data-dcnode-id="1339"><span data-dcnode-id="1338" instrument_node="">I submit that the industry of first or earlier use of a particular chemical is not central when introducing it into a subsequent or latter industry. It is the usability and topical safety in the new application that is important and even crucial. It makes big headlines to report that a substance has been used in some circumstance where it appears "dirty" or "unpleasant" in some way. </span><br data-dcnode-id="1337"><br data-dcnode-id="1336"><span data-dcnode-id="1335" instrument_node="">It is conceivable that some carbon atoms present in a most nutritive and wholesome food product for humans today may have cycled through some other highly toxic defensive molecule created and owned by an earlier squid, mold, jellyfish and so on after being synthesized in the violent explosion of a supernova (shudder). </span><br data-dcnode-id="1334"><br data-dcnode-id="1333"><span data-dcnode-id="1332" instrument_node="">We need to inform the public that chemicals do not, contrary to popular opinion, do not have, give or get the "cooties."</span><br data-dcnode-id="1331"><br data-dcnode-id="1330"><span data-dcnode-id="1329" instrument_node="">It is instructive to note that this very practice has been popular in the anti-fluoride in drinking water movement as an argument against this effective public health policy. Google, for example, "fluoride in water from other industries."</span><br data-dcnode-id="1328"><br data-dcnode-id="1327"><span data-dcnode-id="1326" instrument_node="">I encourage scientists and science writers to strive to guard against logical flaws and fallacies to the best of their ability and help all members of our society understand the best of our human knowledge.</span></div><span data-dcnode-id="1324" instrument_node="">
</span><div class="comment-thread" data-dcnode-id="1311"><span data-dcnode-id="1323" instrument_node="">
</span><div class="comment" data-comment-id="6662ff81-d2fb-4035-9e95-6a3fe21d92be" data-dcnode-id="1313"><span data-dcnode-id="1322" instrument_node="">
</span><div class="name_timestamp" data-dcnode-id="1318"><span data-dcnode-id="1321" instrument_node="">R J Del Vecchio </span><span class="timestamp" data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">(August 14, 2016 1:42 PM)</span></span></div><span data-dcnode-id="1317" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Thank you, Mr. DiVerdi,for this nice reminder that we are all supposed to be scientists, working strictly with facts, data, and cogent, detailed statistics whenever possible. The insertion of emotional terms into articles about science has become somehow acceptable in recent years, also the subtle application of some biases, and none of this is proper or worthy of those who are supposed to be working consciously to present only objective articles. I have been increasingly concerned with the drift of some parts of ACS publications into less than rigorous science.</span></div><span data-dcnode-id="1314" instrument_node="">
</span></div><span data-dcnode-id="1312" instrument_node="">
</span></div><span data-dcnode-id="1310" instrument_node="">
</span></div><span data-dcnode-id="1308" instrument_node="">
</span></div><span data-dcnode-id="1306" instrument_node="">
</span><div class="comment-thread odd" data-dcnode-id="1293"><span data-dcnode-id="1305" instrument_node="">
</span><div class="comment" data-comment-id="5658cf9e-e90e-4c36-96e7-f15b24b60e72" data-dcnode-id="1295"><span data-dcnode-id="1304" instrument_node="">
</span><div class="name_timestamp" data-dcnode-id="1300"><span data-dcnode-id="1303" instrument_node="">J. A. Beck </span><span class="timestamp" data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">(August 10, 2016 4:44 PM)</span></span></div><span data-dcnode-id="1299" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">As someone who is extensively tattooed (1972 to present), I've tried to do at least some research on the safety of the inks and the hygiene of the tattoo parlor. It took me 10 years to feel comfortable with the new fluorescent inks. I've never had a problem and I wouldn't change any of my "decorating" decisions. Tattoos are like potato chips. You can't have just one.</span></div><span data-dcnode-id="1296" instrument_node="">
</span></div><span data-dcnode-id="1294" instrument_node="">
</span></div><span data-dcnode-id="1292" instrument_node="">
</span><div class="comment-thread even" data-dcnode-id="1276"><span data-dcnode-id="1291" instrument_node="">
</span><div class="comment" data-comment-id="41e8ad58-260e-4ff4-be9d-ad51ccdbeb2d" data-dcnode-id="1278"><span data-dcnode-id="1290" instrument_node="">
</span><div class="name_timestamp" data-dcnode-id="1286"><span data-dcnode-id="1289" instrument_node="">grant mckenzie dewar </span><span class="timestamp" data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">(August 10, 2016 9:16 PM)</span></span></div><span data-dcnode-id="1285" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1280"><span data-dcnode-id="1284" instrument_node="">be ideal if components of inks would be actuALLY THERAPUETIC naturally sourced....allergy tested per individual before application</span><br data-dcnode-id="1283"><br data-dcnode-id="1282"><br data-dcnode-id="1281"></div><span data-dcnode-id="1279" instrument_node="">
</span></div><span data-dcnode-id="1277" instrument_node="">
</span></div><span data-dcnode-id="1275" instrument_node="">
</span><div class="comment-thread odd" data-dcnode-id="1262"><span data-dcnode-id="1274" instrument_node="">
</span><div class="comment" data-comment-id="5aaeef81-c432-4693-8f83-cfb37d520e81" data-dcnode-id="1264"><span data-dcnode-id="1273" instrument_node="">
</span><div class="name_timestamp" data-dcnode-id="1269"><span data-dcnode-id="1272" instrument_node="">Jon Cleland Host </span><span class="timestamp" data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">(August 11, 2016 9:47 AM)</span></span></div><span data-dcnode-id="1268" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Several claims here do not appear to be supported. First of all, the article contains a statement about "dangerous stuff" (is that a scientific term?), by what expert? "A tattoo artist". Next, baseline context numbers were often left out. For instance, citing "500" tattoo problem cases would be more meaningful if compared to the number of tattoos applied in his area - thousands? Millions? hundreds of millions? How does this compare to, say, hair removal treatments, or other procedures? Another case of uncritical writing- "some surveys put tattoo regrets at 50%"? What surveys? How controlled were they? Even a poor quality internet survey at yougov put it only at 25%, and estimates based on reliable numbers puts it lower, at 0.1% of people with tattoos getting one removed in 2013 - even adding that across years isn't enough to get to "50%". http://fivethirtyeight.com/datalab/how-many-people-regret-their-tattoos/ For a magazine read by many people able to think critically, compare numbers, and rely on supported arguments, this article leaves a lot to be desired - regardless of whether one likes tattoos or not.</span></div><span data-dcnode-id="1265" instrument_node="">
</span></div><span data-dcnode-id="1263" instrument_node="">
</span></div><span data-dcnode-id="1261" instrument_node="">
</span><div class="comment-thread even" data-dcnode-id="1248"><span data-dcnode-id="1260" instrument_node="">
</span><div class="comment" data-comment-id="b793fb1c-6f67-4b02-ad58-d39b4a679818" data-dcnode-id="1250"><span data-dcnode-id="1259" instrument_node="">
</span><div class="name_timestamp" data-dcnode-id="1255"><span data-dcnode-id="1258" instrument_node="">Michael </span><span class="timestamp" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">(August 11, 2016 2:07 PM)</span></span></div><span data-dcnode-id="1254" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Generally, tattoos are removed by laser treatment. This removal is imperfect. Several types of lasers are used: Nd/YAG at 532nm and 1064nm, Ruby at 690 nm and Alexandrite at 790nm. Black tattoos composed of carbon black are the most common tattoos and can be removed at virtually all of these wavelengths since carbon black is a very broad absorber. These lasers pulse about 1 joule in nanoseconds or picoseconds. Spot size is varied from about 2mm to 7mm and fluences are anywhere from 2-10 joules/cm2. The tattoo pigment must absorb enough of the energy to jump hundreds of degrees C in temperature. This fractures the pigments into smaller particles which are removed by the bodies immune system. It often takes many of these treatments to remove a tattoo and the removal often leaves some kind of image behind. These treatments can be quite painful. It is also common, instead of removal, to cover up the undesired tattoo with a new tattoo which covers/incorporates the old tattoo.</span></div><span data-dcnode-id="1251" instrument_node="">
</span></div><span data-dcnode-id="1249" instrument_node="">
</span></div><span data-dcnode-id="1247" instrument_node="">
</span><div class="comment-thread odd" data-dcnode-id="1234"><span data-dcnode-id="1246" instrument_node="">
</span><div class="comment" data-comment-id="4fb0afcc-b049-4322-96d2-531a6b943491" data-dcnode-id="1236"><span data-dcnode-id="1245" instrument_node="">
</span><div class="name_timestamp" data-dcnode-id="1241"><span data-dcnode-id="1244" instrument_node="">Anna Fuskas </span><span class="timestamp" data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">(August 12, 2016 4:09 AM)</span></span></div><span data-dcnode-id="1240" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Do you know if Li tatoo inks contains formaldehyde or formaldehyde resins? They call themselves "pure and organic " so I am wondering what that means? </span></div><span data-dcnode-id="1237" instrument_node="">
</span></div><span data-dcnode-id="1235" instrument_node="">
</span></div><span data-dcnode-id="1233" instrument_node="">
</span><div class="comment-thread even" data-dcnode-id="1220"><span data-dcnode-id="1232" instrument_node="">
</span><div class="comment" data-comment-id="109ca960-5701-4852-ab62-9f258e0c1ec2" data-dcnode-id="1222"><span data-dcnode-id="1231" instrument_node="">
</span><div class="name_timestamp" data-dcnode-id="1227"><span data-dcnode-id="1230" instrument_node="">Maria Rose </span><span class="timestamp" data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">(August 13, 2016 5:20 PM)</span></span></div><span data-dcnode-id="1226" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">I got my first set of tattoos after I turned 50. I had a bad scar on my left arm on the area from my elbow to shoulder. I checked into cost and pain of both laser removal and covering it with a tattoo design. In doing my research I talked with the 2 oldest tattoo places in my area (both had been doing this for over 30 years). Both had at least one person who specialized in covering scars. As my burn scar was raised at time I was told by both the tattoo places and the place that could do laser surgery, I had to wait anew years for scars to get flat against skin and I was told to use the special cream for reducing scars. So I waited 2 years and continued to research. I found out that laser surgery would not remove all appearance of scar so it would like I had an injury there permanently and would be a more painful procedure (at that time 10 years old).I decided to go with a tattoo to cover the scar area and worked with a tattoo artist who could take my drawing of design and fashion it nicer.I di use some colors but just enough to make it look like like a picture. I din't use any colors that would fade over the years.. All I do to freshen the tattoo is to apply the same cream I use for my face.</span></div><span data-dcnode-id="1223" instrument_node="">
</span></div><span data-dcnode-id="1221" instrument_node="">
</span></div><span data-dcnode-id="1219" instrument_node="">
</span><div class="comment-thread odd" data-dcnode-id="1190"><span data-dcnode-id="1218" instrument_node="">
</span><div class="comment" data-comment-id="c8074174-fde0-48bc-b852-3523404d730c" data-dcnode-id="1192"><span data-dcnode-id="1217" instrument_node="">
</span><div class="name_timestamp" data-dcnode-id="1213"><span data-dcnode-id="1216" instrument_node="">Doug Schoon </span><span class="timestamp" data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">(August 20, 2016 1:21 PM)</span></span></div><span data-dcnode-id="1212" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Lots of silly statements in this article. For instance, formaldehyde is a gas, and only a carcinogen when inhaled at high concentrations for long periods. The article was probably referring to formaldehyde releasing preservatives. They release trace amounts and this use is not a cancer risk, since only brief, trace exposures can occur. I expect more from a science-based magazine. I won't bother pointing out the other sloppy statements made. Both you writer and editor should focus on facts. </span></div><span data-dcnode-id="1209" instrument_node="">
</span><div class="comment-thread" data-dcnode-id="1194"><span data-dcnode-id="1208" instrument_node="">
</span><div class="comment" data-comment-id="01fc1cb9-701d-4917-811a-27e11f07caa8" data-dcnode-id="1196"><span data-dcnode-id="1207" instrument_node="">
</span><div class="name_timestamp" data-dcnode-id="1203"><span data-dcnode-id="1206" instrument_node="">Leanne </span><span class="timestamp" data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">(August 22, 2016 4:54 PM)</span></span></div><span data-dcnode-id="1202" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1198"><span data-dcnode-id="1201" instrument_node="">Formaldehyde is soluble in water (as the hydrate), you can purchase it as a 37% aqueous solution. It's a very common tissue fixative agent, and could be added to inks for its microbial properties. Those solutions tend to be quite corrosive so I definitely would not want any injected into me!</span><br data-dcnode-id="1200"><span data-dcnode-id="1199" instrument_node="">So while I agree that this piece did not have the greatest rigour, the potential of having formaldehyde in unregulated beauty products is a concern. The body modification really needs regulation, even some more respectable practitioners are trying to push for that. </span></div><span data-dcnode-id="1197" instrument_node="">
</span></div><span data-dcnode-id="1195" instrument_node="">
</span></div><span data-dcnode-id="1193" instrument_node="">
</span></div><span data-dcnode-id="1191" instrument_node="">
</span></div><span data-dcnode-id="1189" instrument_node="">

</span><div class="name_timestamp" data-dcnode-id="1183"><span data-dcnode-id="1186" instrument_node="">Nina </span><span class="timestamp" data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">(September 7, 2016 3:03 AM)</span></span></div><span data-dcnode-id="1182" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">The report from the Joint Research Centre - JRC (not Joint Research Council which is a different entity) of the European Commission, from which the statistics are taken, is available on the JRC website: https://ec.europa.eu/jrc/en/news/how-safe-are-our-tattoos-and-permanent-makeup </span></div><span data-dcnode-id="1179" instrument_node="">
