</span><p class="subSC" data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">the same dull orange paint, viewed under higher illuminance, equal illuminance, or lower illuminance than the "white" surround</span></p></td></tr><tr data-dcnode-id="1204"><td colspan="2" data-dcnode-id="1277"></td><td align="left" data-dcnode-id="1222" valign="top"><p data-dcnode-id="1268"><span data-dcnode-id="1275" instrument_node="">As shown in the diagram, lightness is a misnomer, since the characteristic of all surface colors is that they contain a component of </span><b data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">blackness</span></b><span data-dcnode-id="1272" instrument_node=""> (grayness) — they appear to absorb some portion of the light available in the light environment. Lights appear to contain some component of </span><b data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">brightness</span></b><span data-dcnode-id="1269" instrument_node=""> rather than blackness (lights can appear dimmer, but not grayer), so blackness and brightness form opposing dimensions of a single luminance scale, with "white" near the neutral or middle point.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1266" instrument_node="">This is the reason why our visual contrast ratio vastly outstrips the contrast ratio possible in all physical media: </span><b data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">luminance is perceptually mapped into two separate visual codes</span></b><span data-dcnode-id="1263" instrument_node="">, which ambiguously join around the luminance of a pure white to "brilliant" white surface.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1260" instrument_node="">The difference between lightness and brightness is produced by </span><b data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">luminance contrast</span></b><span data-dcnode-id="1257" instrument_node="">. As a simple demonstration, a diffusing light can be presented within either a completely dark surround or a surround at a constant luminance of 300 cd/m</span><sup data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">2</span></sup><span data-dcnode-id="1254" instrument_node=""> (diagram, right top). In darkness, the light appears as "bright" (emitting light) whether its luminance is 10 or 100,000 cd/m</span><sup data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">2</span></sup><span data-dcnode-id="1251" instrument_node="">; but when viewed in the luminous surround, the light begins to darken, and appear as a gray surface, as soon as its luminance is less than the surround luminance (diagram, right bottom). Thus, the "blackness" we see in surface colors is actually a </span><i data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">brightness suppressing response</span></i><span data-dcnode-id="1248" instrument_node=""> in our visual system that is stimulated by luminance contrast.</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node="">The </span><b data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">adaptation level</span></b><span data-dcnode-id="1242" instrument_node=""> can be thought of as the luminance that would produce no change in luminance adaptation if that luminance homogeneously filled the visual field. This is usually said to be a middle gray, or an average reflectance that is about 20% of white — the surface commonly used by photographers to estimate photographic exposures.</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1239" instrument_node="">For the human visual system, adaptation is actually closer to white. This appears in the phenomenon of </span><a class="text" data-dcnode-id="1237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23anchoring"><span data-dcnode-id="1238" instrument_node="">lightness anchoring</span></a><span data-dcnode-id="1236" instrument_node="">, which </span><a class="text" data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23lightdome"><span data-dcnode-id="1235" instrument_node="">shifts achromatic perception</span></a><span data-dcnode-id="1233" instrument_node=""> so that the lightest valued achromatic surface in view appears as "white", even when it is a middle gray or black (as nicely demonstrated in the </span><a class="text" data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23gelbstaircase"><span data-dcnode-id="1232" instrument_node="">Gelb staircase</span></a><span data-dcnode-id="1230" instrument_node=""> effect). Thus, after the adaptation response had stabilized, a middle gray color that completely filled the visual field would appear as white.</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1227" instrument_node="">In addition, this adaptation "white" produces a visual response </span><a class="text" data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23stepcurves"><span data-dcnode-id="1226" instrument_node="">near the middle</span></a><span data-dcnode-id="1224" instrument_node=""> of the luminance response range when luminance is very high (noon daylight). As a result, we experience the maximum lightness contrast and the greatest discimination in small lightness variations, especially in darker values. The adaptation response shifts toward the bottom end of the response range in dim light or darkness, reducing lightness discrimination among light values and making all dark values from middle gray to black indistinguishable.</span></p></td><td colspan="2" data-dcnode-id="1206" valign="top"><span data-dcnode-id="1220" instrument_node="">
</span><p class="imgS" data-dcnode-id="1218"><img data-dcnode-id="1219" height="260" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/areawhite.gif&amp;raw" width="178"></p><span data-dcnode-id="1217" instrument_node="">
</span><br data-dcnode-id="1216"><span data-dcnode-id="1215" instrument_node="">
</span><p class="imgC" data-dcnode-id="1213"><img data-dcnode-id="1214" height="160" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/induction.gif&amp;raw" width="200"></p><span data-dcnode-id="1212" instrument_node="">
</span><p class="SC" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">lightness induction</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p class="subSC" data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">from Wyszecki &amp; Stiles (1982)</span></p></td></tr><tr data-dcnode-id="977"><td colspan="2" data-dcnode-id="1201"></td><td align="left" data-dcnode-id="987" valign="top"><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Despite these dynamic adaptation and anchoring effects, a "white" surface has a qualitatively different appearance in dim or bright light environments — changing from a blazing, creamy white appearance in sunlight to a silvery, silky blue gray in moonlight (transitions suggested by the images, right).</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Luminance perception is thus a very complex color experience, in which our eye and mind adapt to the light environment, anchor "white" in the lightest valued achromatic surfaces, compensate for illuminance differences (cast shadows and spot lights) within the light environment, and present the adaptation level in color experience as changes in the amount of lightness contrast between black and white and in the qualitative appearance of white as grayed or brilliant.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1193" instrument_node="">Painters must wrestle with and consolidate all these effects as they try to render the spectacular color experience of a natural light environment as the color contrasts possible within a physical medium.</span><a data-dcnode-id="1192" name="grayscale"></a></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1171"><b data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">The Artists' Gray Scale</span></b><span data-dcnode-id="1187" instrument_node="">. Artists are universally taught to interpret and think of lightness variations in terms of a </span><b data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">gray scale</span></b><span data-dcnode-id="1184" instrument_node=""> or </span><i data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">value scale,</span></i><span data-dcnode-id="1181" instrument_node=""> which breaks down the maximum lightness discrimination of approximately </span><a class="text" data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color2.html%23graysteps"><span data-dcnode-id="1180" instrument_node="">50 perceptible differences</span></a><span data-dcnode-id="1178" instrument_node=""> into a dozen or fewer categories of lightness contrast. The nine step scheme devised by Denman Ross a century ago is still visually handy and easy to remember; it can also be conveniently collapsed into a five step scale (table, below). (Note that </span><i data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">high light</span></i><span data-dcnode-id="1175" instrument_node=""> is the value step closest to white, while </span><i data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">highlight</span></i><span data-dcnode-id="1172" instrument_node=""> is the image of a light source reflected from a shiny surface.)</span></p><p data-dcnode-id="1170"></p><span data-dcnode-id="1169" instrument_node="">

"">&nbsp;</span></td><td data-dcnode-id="1081" width="25%"><b data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">mid value</span></b></td><td data-dcnode-id="1078" width="12%"><b data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">3</span></b></td><td bgcolor="#7C7C7C" data-dcnode-id="1076" width="13%"><span data-dcnode-id="1077" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1073" width="25%"><b data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">mid value</span></b></td></tr><tr align="center" data-dcnode-id="1062" height="25"><td data-dcnode-id="1068" width="12%"><b data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">6</span></b></td><td bgcolor="#5E5E5E" data-dcnode-id="1066" width="13%"><span data-dcnode-id="1067" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1064" width="25%"><span data-dcnode-id="1065" instrument_node="">high dark</span></td><td colspan="3" data-dcnode-id="1063" width="50%"></td></tr><tr align="center" data-dcnode-id="1046" height="25"><td data-dcnode-id="1058" width="12%"><b data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">7</span></b></td><td bgcolor="#424242" data-dcnode-id="1056" width="13%"><span data-dcnode-id="1057" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1054" width="25%"><span data-dcnode-id="1055" instrument_node="">dark</span></td><td data-dcnode-id="1051" width="12%"><b data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">4</span></b></td><td bgcolor="#424242" data-dcnode-id="1049" width="13%"><span data-dcnode-id="1050" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1047" width="25%"><span data-dcnode-id="1048" instrument_node="">dark</span></td></tr><tr align="center" data-dcnode-id="1036" height="25"><td data-dcnode-id="1042" width="12%"><b data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">8</span></b></td><td bgcolor="#282828" data-dcnode-id="1040" width="13%"><span data-dcnode-id="1041" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1038" width="25%"><span data-dcnode-id="1039" instrument_node="">low dark</span></td><td colspan="3" data-dcnode-id="1037" width="50%"></td></tr><tr align="center" data-dcnode-id="1020" height="25"><td data-dcnode-id="1032" width="12%"><b data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">9</span></b></td><td bgcolor="#0E0E0E" data-dcnode-id="1030" width="13%"><span data-dcnode-id="1031" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1028" width="25%"><span data-dcnode-id="1029" instrument_node="">black</span></td><td data-dcnode-id="1025" width="12%"><b data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">5</span></b></td><td bgcolor="#0E0E0E" data-dcnode-id="1023" width="13%"><span data-dcnode-id="1024" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1021" width="25%"><span data-dcnode-id="1022" instrument_node="">black</span></td></tr></tbody></table></td></tr></tbody></table><span data-dcnode-id="1011" instrument_node="">
</span><br data-dcnode-id="1010"><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1008" instrument_node="">Because value is the dominant element of visual information, it is the most important attribute to consider in visual design. Artists commonly prepare a </span><a class="text" data-dcnode-id="1006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/tech12.html"><span data-dcnode-id="1007" instrument_node="">value sketch</span></a><span data-dcnode-id="1005" instrument_node=""> of a painting or design, often utilizing only a "black", "gray" and "white" value palette. (See also my </span><a class="text" data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23lightnesscategories"><span data-dcnode-id="1004" instrument_node="">Handprint lightness categories</span></a><span data-dcnode-id="1002" instrument_node="">.)</span><a data-dcnode-id="1001" name="valuescales"></a></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="998" instrument_node="">The standard in </span><a class="text" data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html"><span data-dcnode-id="997" instrument_node="">color models</span></a><span data-dcnode-id="995" instrument_node="">, for example in the </span><a class="text" data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23munsell"><span data-dcnode-id="994" instrument_node="">Munsell color order system</span></a><span data-dcnode-id="992" instrument_node="">, is an 11 step value scale ranging from 0 (black) to 10 (white). The </span><a class="text" data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23LAB1"><span data-dcnode-id="991" instrument_node="">CIELAB L* dimension</span></a><span data-dcnode-id="989" instrument_node=""> is a multiple of 10 of the Munsell scale: a 6 on the Munsell value scale corresponds to a 60 on the L* dimension.</span></p></td><td colspan="2" data-dcnode-id="979" valign="top"><span data-dcnode-id="985" instrument_node="">
</span><p class="imgS" data-dcnode-id="983"><img data-dcnode-id="984" height="275" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/whites.jpg&amp;raw" width="200"></p><span data-dcnode-id="982" instrument_node="">
</span><p class="SC" data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">luminance dependent changes in "white" appearance</span></p></td></tr><tr data-dcnode-id="71"><td colspan="2" data-dcnode-id="974"></td><td align="left" data-dcnode-id="75" valign="top"><p data-dcnode-id="968"><span data-dcnode-id="972" instrument_node="">Artists often use a physical gray scale to visually match the lightness of objects they are painting or drawing. A typical example is presented below. Open the scale image in a new window by clicking on the link below it, print the image on a good quality color printer (with print options set to "black ink only"), and you have a serviceable value scale for use in the field or studio. Preprinted value scales are available from online art retailers, and the standard </span><b data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">photographer's grayscale</span></b><span data-dcnode-id="969" instrument_node=""> (manufactured by Kodak) is sold at most camera stores — though the photographer's scale crunches up the range of light values and spreads out the darks.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p class="imgC" data-dcnode-id="965"><img data-dcnode-id="966" height="55" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/valuekey9.gif&amp;raw" width="370"></p><span data-dcnode-id="964" instrument_node="">
</span><p class="CC" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">9 step value scale</span></p><span data-dcnode-id="961" instrument_node="">
</span><p class="subCC" data-dcnode-id="957"><a class="index1" data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/val09.html"><span data-dcnode-id="960" instrument_node="">Click here</span></a><span data-dcnode-id="958" instrument_node=""> to view the full size image on gray background</span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="946"><b data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Lightness interval scales</span></b><span data-dcnode-id="953" instrument_node=""> such as these are calibrated to differences in perceived lightness between black and white so that each value step appears to be equally different from the steps above and below it. This disguises the fact that lightness is equal to a </span><a class="text" data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color2.html%23responsecompression"><span data-dcnode-id="952" instrument_node="">power of the reflectance</span></a><span data-dcnode-id="950" instrument_node="">, proportional to the luminance scaled with an exponent of 0.43. These power scales produce finer gradations of value </span><i data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">in dark values,</span></i><span data-dcnode-id="947" instrument_node=""> and more closely match the logarithmic scaling of light energy relevant to film exposure.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Artists use these value scales by holding the scale so that it visually overlaps an area in the field of view, then finding the lightness match between the object and the scale; this is the value that should be matched in the painting. This assumes that only surfaces under the same illumination — not surfaces under strongly contrasted illumination, or actual lights — are included in the image.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="941" instrument_node="">The important exception to rendering illuminance contrast in a painting is the visual color contrast between illuminated and shadowed surfaces. Here the gray scale can be used to calculate the paint value contrast. In bright daylight the contrast between light and shadow creates up to a 60% reduction in lightness, so a sunlit surface matched by a value of 8 will appear as a value slightly above 3 (8 * 0.4 = </span><b data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">3.2</span></b><span data-dcnode-id="938" instrument_node="">) in shadow.</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="935" instrument_node="">Shadow contrast may only amount to a 40% or less lightness reduction under overcast skies or indirect (window illuminated indoor) light: then 8 * 0.6 = </span><b data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">4.8</span></b><span data-dcnode-id="932" instrument_node=""> or 8 * 0.7 = </span><b data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">5.6</span></b><span data-dcnode-id="929" instrument_node="">.</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="926" instrument_node="">These value contrasts must be reproduced in paint mixtures that maintain the same color saturation between light and dark surfaces (that is, shadows reduce the relative lightness by 60% </span><i data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">and</span></i><span data-dcnode-id="923" instrument_node=""> reduce the color chroma by 60%). If the lightness is reduced more than the chroma, the shadowed surface will appear to be illuminated by a secondary light source. If the chroma is reduced more than the lightness, the surface will appear grayed or blackened rather than shadowed.</span><a data-dcnode-id="922" name="traditionalhuegeometry"></a></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="910"><span class="rubric" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Hue Relationships</span></span><span data-dcnode-id="917" instrument_node="">. Despite the overriding importance of luminance and luminance contrast in color experience, traditional color theory has maintained a long and incredibly disproportionate infatuation with chromaticity — especially, with the relationships among </span><a class="text" data-dcnode-id="915" href="#ctprin25"><span data-dcnode-id="916" instrument_node="">saturated hues</span></a><span data-dcnode-id="914" instrument_node=""> and </span><a class="text" data-dcnode-id="912" href="#complementary"><span data-dcnode-id="913" instrument_node="">complementary colors</span></a><span data-dcnode-id="911" instrument_node="">.</span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="908" instrument_node="">Moses Harris (in around 1760) was the first author after Newton to emphasize complementary color relationships, and the first to identify </span><a class="text" data-dcnode-id="906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23complementary"><span data-dcnode-id="907" instrument_node="">complementary color</span></a><span data-dcnode-id="905" instrument_node=""> contrast as an important factor in visual design:</span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="896"><i data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">"If a contrast is wanting to any colour or teint, look for the colour or teint in the system</span></i><span data-dcnode-id="900" instrument_node=""> [wheel], </span><i data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">and directly opposite you will find the contrast wanted. Suppose it is required what colour is most opposite, or contrary in hue to red, look directly opposite to that colour in the system and it will be found to be green, the most contrary to blue is orange, and opposite to yellow is purple."</span></i><a data-dcnode-id="897" name="newtonhuegeometry"></a></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="885"><b data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Hues in Traditional Color Theory</span></b><span data-dcnode-id="892" instrument_node="">. We can trace this infatuation back to the circular arrangement of spectral hues (the </span><a class="text" data-dcnode-id="890" href="#chromalimits"><span data-dcnode-id="891" instrument_node="">most saturated</span></a><span data-dcnode-id="889" instrument_node=""> color stimuli physically possible) innovated by the English physicist Isaac Newton in 1704. This is the foundation image both for artists' color wheels and for the hue circle in all scientific </span><a class="text" data-dcnode-id="887" href="#colorspace"><span data-dcnode-id="888" instrument_node="">color spaces</span></a><span data-dcnode-id="886" instrument_node="">.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p class="imgC" data-dcnode-id="882"><img data-dcnode-id="883" height="328" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/newcirc.gif&amp;raw" width="328"></p><span data-dcnode-id="881" instrument_node="">
</span><p class="CC" data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">isaac newton's "diatonic" hue circle</span></p><span data-dcnode-id="878" instrument_node="">
</span><p class="subCC" data-dcnode-id="873"><span data-dcnode-id="877" instrument_node="">from </span><i data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Opticks</span></i><span data-dcnode-id="874" instrument_node=""> (1704), Book I, Proposition VI, Problem ii. Newton's division of the hue circle as a diagram (black lines), and as fractional diatonic sections (green lines); the spectral hues in wavenumber spacing are aligned to match the modern perceptual scaling in which extraspectral mixtures (dots) span one fourth of the total circumference</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Newton's hue circle exemplifies three ruling issues in traditional color theory, which it will be enlightening to put in context. The issures were:</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="868" instrument_node="">•&nbsp;</span><b data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">simple geometry</span></b><span data-dcnode-id="865" instrument_node="">. Newton apportioned the hue circle into seven hues — red, orange, yellow, green, blue, indigo and violet — and spaced them by analogy to the </span><a class="text" data-dcnode-id="863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/tech13.html%23newton"><span data-dcnode-id="864" instrument_node="">whole number fractions</span></a><span data-dcnode-id="862" instrument_node=""> used to describe a diatonic musical scale in a vibrating string (the C major scale starts at violet, and orange and indigo represent half tone steps). This abstract geometry was based on the observed or </span><i data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">visual color</span></i><span data-dcnode-id="859" instrument_node=""> sequence and spacing of spectral hues.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="856" instrument_node="">•&nbsp;</span><b data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">measurable mixtures</span></b><span data-dcnode-id="853" instrument_node="">. Newton chose a circular geometry in order to explain </span><a class="text" data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color2.html%23mixingcircle"><span data-dcnode-id="852" instrument_node="">measurable light mixtures</span></a><span data-dcnode-id="850" instrument_node="">, specifically the fact that specific quantities of red, yellow, green and blue colors of light produced an achromatic or "white" mixture, represented by the center of the circle. These relationships therefore describe </span><i data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">additive</span></i><span data-dcnode-id="847" instrument_node=""> mixtures of light.</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="844" instrument_node="">•&nbsp;</span><b data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">primary colors</span></b><span data-dcnode-id="841" instrument_node="">. Newton complicated the idea of "primary" colors, first calling </span><i data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">all seven</span></i><span data-dcnode-id="838" instrument_node=""> colors of light equally "primitive" and irreducible, then dismissing them all as sensations in the mind. Naturalists and painters who adopted Newton's circular geometry and measurable mixture relationships wanted to explain material color mixtures in pigments, and therefore inserted the painter's three primary colors into the hue circle. This made it appear that a hue circle can describe </span><i data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">subtractive</span></i><span data-dcnode-id="835" instrument_node=""> color mixtures, and made it appear that material color and radiant color were the same thing.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="832" instrument_node="">These three issues (and several others), in the context of both scientific and artistic uses of color, made Newton's scheme appear </span><a class="text" data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23confusions"><span data-dcnode-id="831" instrument_node="">arbitrary or inconsistent</span></a><span data-dcnode-id="829" instrument_node=""> to many 18th and 19th century readers. In addition, mixtures of light had no practical application, and were much more difficult to measure or manipulate than mixtures of pigments (paints or inks) and dyes.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">So Newton's hue circle was revised toward more traditional and practical concepts, useful to printers and painters. But quite a lot of uncertainty remained in the way colors would be represented, as suggested by a sampling of historical hue models (diagram, below).</span></p><span data-dcnode-id="824" instrument_node="">
</span><p class="imgC" data-dcnode-id="822"><img data-dcnode-id="823" height="535" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/theogeo.gif&amp;raw" width="372"></p><span data-dcnode-id="821" instrument_node="">
</span><p class="CC" data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">color theory color icons</span></p><span data-dcnode-id="818" instrument_node="">
</span><p class="subCC" data-dcnode-id="787"><b data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">c.1700</span></b><span data-dcnode-id="815" instrument_node="">: additive hue circle after </span><a class="index1" data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color2.html%23newtoncircle"><span data-dcnode-id="814" instrument_node="">Newton</span></a><span data-dcnode-id="812" instrument_node="">, 1704; </span><b data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">c.1750</span></b><span data-dcnode-id="809" instrument_node="">: subtractive color wheel after </span><a class="index1" data-dcnode-id="807" href="#harris"><span data-dcnode-id="808" instrument_node="">Harris</span></a><span data-dcnode-id="806" instrument_node="">, 1766; </span><b data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">c.1800</span></b><span data-dcnode-id="803" instrument_node="">: perceptual color hexagram after </span><a class="index1" data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/goethe.html"><span data-dcnode-id="802" instrument_node="">Goethe</span></a><span data-dcnode-id="800" instrument_node="">, 1807; </span><b data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">c.1850</span></b><span data-dcnode-id="797" instrument_node="">: additive hue circle by Laugel, after Helmholtz, 1856/1869; </span><b data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">c.1900</span></b><span data-dcnode-id="794" instrument_node="">: subtractive color triangle after </span><a class="index1" data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23sloan"><span data-dcnode-id="793" instrument_node="">Sloan</span></a><span data-dcnode-id="791" instrument_node="">, 1923; </span><b data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">c.1950</span></b><span data-dcnode-id="788" instrument_node="">: subtractive color wheel by Famous Artist's School, 1958; Harris, Goethe and Laugel diagrams revised to place yellow at top</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">A long explanation could be provided for the conceptual and substantive differences among these color models, the audiences they were intended to address, the applications they were intended to serve, and the specific advantages or disadvantages each presents as a model of conceptual, visual or material color.</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="782" instrument_node="">But the overarching lesson is the dominant, governing role of the three subtractive primary colors. The fact that these have </span><a class="text" data-dcnode-id="780" href="#cterror03"><span data-dcnode-id="781" instrument_node="">changed over time</span></a><span data-dcnode-id="779" instrument_node=""> only shows that traditional color theory has struggled to reconcile traditional artistic lore with evolving colorant manufacture technologies and continuing scientific advances in color research. This effort has pushed artistic color theory to emphasize conceptual colors, specifically "primary" colors, as a framework in which visual and material colors can coexist, and where any discrepancies between conceptual and material colors can be </span><a class="text" data-dcnode-id="777" href="#cterror09"><span data-dcnode-id="778" instrument_node="">blamed on paint "impurity"</span></a><span data-dcnode-id="776" instrument_node="">.</span><a data-dcnode-id="775" name="modernhuegeometry"></a></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="766"><b data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Hues in Modern Color Theory</span></b><span data-dcnode-id="770" instrument_node="">. Vision science, grappling with the technical difficulties of color measurement and color appearance modeling, and the diverse empirical problems created by color media and color imaging systems, has displaced "primary" colors with a factual description of </span><i data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">visual</span></i><span data-dcnode-id="767" instrument_node=""> hue relationships.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="764" instrument_node="">Why visual? Because visual color addresses most directly the relationship between the color stimulus and the color experience, and because "how a color looks" is the fundamental issue in any color image or color design. We don't care whether a red </span><i data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">is</span></i><span data-dcnode-id="761" instrument_node=""> saturated or yellowish, as material color: we only care whether it </span><i data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">appears</span></i><span data-dcnode-id="758" instrument_node=""> appropriately saturated or yellowish, given the image or visual context in which it is interpreted. And if we want to create that saturated red with a computer monitor, and printing inks, and paints, we do not want "saturated red" to be defined in terms of any specific material medium.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="755" instrument_node="">The visual trichromatic or "retinal" primary colors are not the primary colors of color appearance; they only have a role in bridging or connecting radiant colors to visual color appearance. The visual primary colors have been replaced by the </span><a class="text" data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color2.html%23opponentfunctions"><span data-dcnode-id="754" instrument_node="">opponent functions</span></a><span data-dcnode-id="752" instrument_node=""> that are associated with the hue contrasts </span><i data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">violet red/blue green</span></i><span data-dcnode-id="749" instrument_node=""> (</span><b data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">a+/a–</span></b><span data-dcnode-id="746" instrument_node="">) and </span><i data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">yellow/blue&nbsp;violet</span></i><span data-dcnode-id="743" instrument_node=""> (</span><b data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">b+/b–</span></b><span data-dcnode-id="740" instrument_node="">). These define the hue spacing shown in the diagram (below).

</span></p><p align="center" data-dcnode-id="734"><a data-dcnode-id="738" name="visualhuecircle"></a><br data-dcnode-id="737"><span data-dcnode-id="736" instrument_node="">
</span><img data-dcnode-id="735" height="377" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/modprim.gif&amp;raw" width="380"></p><span data-dcnode-id="733" instrument_node="">
</span><p class="CC" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">the modern primaries: the ab opponent dimensions</span></p><span data-dcnode-id="730" instrument_node="">
</span><p class="subCC" data-dcnode-id="720"><span data-dcnode-id="729" instrument_node="">average hue locations on the CIECAM </span><b data-dcnode-id="722"><span data-dcnode-id="728" instrument_node="">a</span><sub data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">C</span></sub><span data-dcnode-id="725" instrument_node="">b</span><sub data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">C</span></sub></b><span data-dcnode-id="721" instrument_node=""> hue plane at lightness 6; letters R, Y, G, B and P indicate location of Hering unique hues (red, yellow, green, blue) and Munsell purple</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="718" instrument_node="">These two dimensions do not privilege any "primary" hues, or </span><a class="text" data-dcnode-id="716" href="#ctprin19"><span data-dcnode-id="717" instrument_node="">impose a hierarchy</span></a><span data-dcnode-id="715" instrument_node=""> of primary, secondary and tertiary hues. They simply regulate the spacing of visual hues around the hue circle. They reproduce the hue spacing determined through laborious research in the </span><a class="text" data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23MUNSELL"><span data-dcnode-id="714" instrument_node="">Munsell Color System</span></a><span data-dcnode-id="712" instrument_node=""> and as defined by the </span><a class="text" data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23CIECAM"><span data-dcnode-id="711" instrument_node="">CIECAM</span></a><span data-dcnode-id="709" instrument_node=""> color appearance model.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="706" instrument_node="">Literally any hue naming or hue categorization system can be imposed on this hue circle; the labels in the diagram above are based on my </span><a class="text" data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23huecategories"><span data-dcnode-id="705" instrument_node="">Handprint hue categories</span></a><span data-dcnode-id="703" instrument_node="">, adapted from the hue naming system used by Moses Harris and exemplified by the hue circle diagram (</span><a class="text" data-dcnode-id="701" href="#huecategories"><span data-dcnode-id="702" instrument_node="">above</span></a><span data-dcnode-id="700" instrument_node="">).</span><a data-dcnode-id="699" name="hueexemplars"></a></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="693"><b data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Physical Hue Exemplars</span></b><span data-dcnode-id="694" instrument_node="">. As verbal categories are imprecise, it is helpful to have exemplars for color matching.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Below are visual color exemplars for the 18 hue categories as GIF files in standard 8 bit hex codes using the Photoshop color space in Mac OS X 10.5, standard cinema display palette and gamma. (Computer monitors differ in how well they reproduce absolute color samples, and reproduce greens, blue greens and violet reds poorly.) The "extraspectral" hues are titled in italics, and the nearest matching single pigment is suggested.</span></p><span data-dcnode-id="689" instrument_node="">
</span><span data-dcnode-id="688" instrument_node="">

</span><span data-dcnode-id="686" instrument_node="">
</span><span data-dcnode-id="661" instrument_node="">
</span><span data-dcnode-id="638" instrument_node="">
</span><span data-dcnode-id="615" instrument_node="">
</span><span data-dcnode-id="592" instrument_node="">
