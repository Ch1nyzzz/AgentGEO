</span><p data-dcnode-id="3094"><span data-dcnode-id="3101" instrument_node="">We will discover that equivalent </span><i data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">subtractive</span></i><span data-dcnode-id="3098" instrument_node=""> metameric rules </span><a class="text" data-dcnode-id="3096" href="#subprobs"><span data-dcnode-id="3097" instrument_node="">do not exist</span></a><span data-dcnode-id="3095" instrument_node=""> in the many kinds of radiant color mixing, and that lack of predictable consistency in substance mixtures is the most important difference between additive and subtractive color mixing.</span></p><span data-dcnode-id="3093" instrument_node="">
</span><p data-dcnode-id="3071"><span data-dcnode-id="3092" instrument_node="">As you may have guessed by now, the distinction between </span><i data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">conceptual colors</span></i><span data-dcnode-id="3089" instrument_node=""> and </span><i data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">material colors</span></i><span data-dcnode-id="3086" instrument_node=""> also appears in the difference between the invisible and therefore conceptual </span><i data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">visual primaries</span></i><span data-dcnode-id="3083" instrument_node=""> (the </span><b data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">L</span></b><span data-dcnode-id="3080" instrument_node="">, </span><b data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">M</span></b><span data-dcnode-id="3077" instrument_node=""> and </span><b data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">S</span></b><span data-dcnode-id="3074" instrument_node=""> cone responses) and the light mixtures used to demonstrate or measure our color sensations.</span><br data-dcnode-id="3073"><a data-dcnode-id="3072" name="primmix"></a></p></td><td align="right" colspan="2" data-dcnode-id="3068" valign="top"></td></tr><tr data-dcnode-id="2893"><td colspan="2" data-dcnode-id="3063"></td><td align="left" data-dcnode-id="2908" valign="top"><p data-dcnode-id="3055"><b data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">The True Additive Primaries Are Invisible</span></b><span data-dcnode-id="3059" instrument_node="">. The diagram at right shows the location on the </span><a class="text" data-dcnode-id="3057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23CIE1976uv"><span data-dcnode-id="3058" instrument_node="">CIELUV chromaticity diagram</span></a><span data-dcnode-id="3056" instrument_node=""> of three monochromatic lights (at 460nm, 530nm and 650nm) that have frequently been used in color vision research to analyze trichromatic color matches and opponent color mixtures.</span></p><span data-dcnode-id="3054" instrument_node="">
</span><p data-dcnode-id="3043"><span data-dcnode-id="3053" instrument_node="">The focus here is on the white triangle or </span><a class="text" data-dcnode-id="3051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23gamut"><span data-dcnode-id="3052" instrument_node="">gamut</span></a><span data-dcnode-id="3050" instrument_node=""> that connects the three primary lights. This defines the range of actual additive color mixtures it is possible to make with those three primaries. This gamut encloses most, but not all, of the chromaticity area, which defines the area of </span><i data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">all physically possible</span></i><span data-dcnode-id="3047" instrument_node=""> light colors. A significant portion of the chromaticity diagram is outside the gamut. In other words, </span><b data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">the visible RGB primary lights cannot mix all colors</span></b><span data-dcnode-id="3044" instrument_node="">.</span></p><span data-dcnode-id="3042" instrument_node="">
</span><p data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">Thus, the "green primary" gives full mixing coverage along the red to yellow colors, but it cannot mix (with the "blue violet" primary) the most intense greens, blue greens and blues. In addition, the "blue violet" and "red" monochromatic primaries cannot mix the most intense purples and red violets.</span></p><span data-dcnode-id="3039" instrument_node="">
</span><p data-dcnode-id="3028"><span data-dcnode-id="3038" instrument_node="">The true additive primaries, the only "primaries" that can mix all possible colors, are the outputs from the </span><b data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">L</span></b><span data-dcnode-id="3035" instrument_node="">, </span><b data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">M</span></b><span data-dcnode-id="3032" instrument_node=""> and </span><b data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">S</span></b><span data-dcnode-id="3029" instrument_node=""> cones. We are never aware of these outputs directly and therefore they are invisible. We only experience them as the tendency toward a red, green or blue color sensation that results from the combination and interpretation of these outputs in the visual cortex.</span></p><span data-dcnode-id="3027" instrument_node="">
</span><p data-dcnode-id="3011"><b data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">How Do We Choose the RGB Lights?</span></b><span data-dcnode-id="3024" instrument_node=""> Some artists believe that the RGB primary lights are the same hues that most stimulate the three receptor cones. This is false. The cones are actually </span><a class="text" data-dcnode-id="3022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color1.html%23normconesens"><span data-dcnode-id="3023" instrument_node="">most sensitive</span></a><span data-dcnode-id="3021" instrument_node=""> to "green yellow" (</span><b data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">L</span></b><span data-dcnode-id="3018" instrument_node="">) "green" (</span><b data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">M</span></b><span data-dcnode-id="3015" instrument_node="">) and "blue violet" (</span><b data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">S</span></b><span data-dcnode-id="3012" instrument_node="">) wavelengths, as shown below.</span></p><span data-dcnode-id="3010" instrument_node="">
</span><p class="imgC" data-dcnode-id="3008"><img data-dcnode-id="3009" height="231" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/addprim.gif&amp;raw" width="246"></p><span data-dcnode-id="3007" instrument_node="">
</span><p class="CC" data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">additive primary colors are illustrative only</span></p><span data-dcnode-id="3004" instrument_node="">
</span><p class="subCC" data-dcnode-id="2993"><span data-dcnode-id="3003" instrument_node="">the wavelengths of maximum sensitivity for the </span><b data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">L</span></b><span data-dcnode-id="3000" instrument_node="">, </span><b data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node="">M</span></b><span data-dcnode-id="2997" instrument_node="">&nbsp;and </span><b data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">S</span></b><span data-dcnode-id="2994" instrument_node="">&nbsp;cones (top) are unrelated to the colored lights used to simulate the cones in additive color mixing demonstrations (bottom)</span></p><span data-dcnode-id="2992" instrument_node="">
</span><p data-dcnode-id="2987"><span data-dcnode-id="2991" instrument_node="">Red, green and blue violet lights are used by convention and convenience, and it is from these </span><a class="text" data-dcnode-id="2989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23colormatching"><span data-dcnode-id="2990" instrument_node="">color matching lights</span></a><span data-dcnode-id="2988" instrument_node=""> that we get the names red, green and blue assigned to the additive primaries.</span></p><span data-dcnode-id="2986" instrument_node="">
</span><p data-dcnode-id="2968"><span data-dcnode-id="2985" instrument_node="">There's a simple logic for choosing these primary lights. Almost any light wavelength that stimulates one cone will also stimulate one or both of the other cones, because the cone sensitivity curves (especially </span><b data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">L</span></b><span data-dcnode-id="2982" instrument_node="">&nbsp;and </span><b data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">M</span></b><span data-dcnode-id="2979" instrument_node="">) </span><a class="text" data-dcnode-id="2977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color1.html%23logconesens"><span data-dcnode-id="2978" instrument_node="">overlap</span></a><span data-dcnode-id="2976" instrument_node="">. To explain color mixing as the result of three </span><i data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">independent</span></i><span data-dcnode-id="2973" instrument_node=""> types of photoreceptor response, we need three light wavelengths that each stimulate one cone </span><i data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">much more</span></i><span data-dcnode-id="2970" instrument_node=""> than the other two. In other words:</span><a data-dcnode-id="2969" name="ctprin34"></a></p><span data-dcnode-id="2967" instrument_node="">
</span><p data-dcnode-id="2962"><span data-dcnode-id="2966" instrument_node="">
</span><b data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">34. An ideal additive primary color must stimulate only one type of receptor cone (L, M or S) as strongly as possible, and stimulate the other two types of cone as little as possible.</span></b><a data-dcnode-id="2963" name="ctprin35"></a></p><span data-dcnode-id="2961" instrument_node="">
</span><p data-dcnode-id="2958"><b data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">35. The optimal choice of physical lights for additive color media are typically orange red (R), green (G) and violet blue (B).</span></b></p><span data-dcnode-id="2957" instrument_node="">
</span><p data-dcnode-id="2940"><span data-dcnode-id="2956" instrument_node="">So, within each </span><a class="text" data-dcnode-id="2954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color3.html%23howread"><span data-dcnode-id="2955" instrument_node="">section of the spectrum</span></a><span data-dcnode-id="2953" instrument_node=""> where the </span><b data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">L</span></b><span data-dcnode-id="2950" instrument_node="">, </span><b data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">M</span></b><span data-dcnode-id="2947" instrument_node="">&nbsp;or </span><b data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">S</span></b><span data-dcnode-id="2944" instrument_node="">&nbsp;cone is the dominant receptor, we pick a wavelength that creates the </span><i data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">greatest difference in response</span></i><span data-dcnode-id="2941" instrument_node=""> between that cone and the other two.</span></p><span data-dcnode-id="2939" instrument_node="">
</span><p data-dcnode-id="2932"><b data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">Does Additive Mixture Require RGB Lights?</span></b><span data-dcnode-id="2936" instrument_node=""> Many artists believe that red, green and blue violet lights </span><i data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">must</span></i><span data-dcnode-id="2933" instrument_node=""> be used to explain or demonstrate additive color mixing. Again, not true. The choice of lights is arbitrary, and one selection of primaries is better than another only if we require the mixture gamut to be as large or comprehensive as possible.</span></p><span data-dcnode-id="2931" instrument_node="">
</span><p data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">We could just as easily demonstrate additive color mixing with colored lights representing the subtractive primary colors cyan, yellow and magenta, although most of the blues, greens and reds that we could mix with these lights would appear quite whitish or unsaturated.</span></p><span data-dcnode-id="2928" instrument_node="">
</span><p data-dcnode-id="2909"><span data-dcnode-id="2927" instrument_node="">The somewhat arbitrary procedures for choosing the additive primary lights are acceptable because the real lights are not the actual basis of additive color mixing. </span><b data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">The true additive primary colors are the photoreceptor outputs.</span></b><span data-dcnode-id="2924" instrument_node=""> We use </span><b data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">RGB</span></b><span data-dcnode-id="2921" instrument_node=""> colored lights to </span><i data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">symbolize</span></i><span data-dcnode-id="2918" instrument_node=""> the </span><b data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">LMS</span></b><span data-dcnode-id="2915" instrument_node=""> receptor outputs, because they are also the most effective way to </span><i data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">manipulate</span></i><span data-dcnode-id="2912" instrument_node=""> those outputs.
</span><br data-dcnode-id="2911"><a data-dcnode-id="2910" name="scientific"></a></p></td><td colspan="2" data-dcnode-id="2895" valign="top"><span data-dcnode-id="2906" instrument_node="">
</span><p class="imgS" data-dcnode-id="2904"><img data-dcnode-id="2905" height="177" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/CIEprim.jpg&amp;raw" width="200"></p><span data-dcnode-id="2903" instrument_node="">
</span><p class="SC" data-dcnode-id="2899"><span data-dcnode-id="2902" instrument_node="">the gamut of RGB primaries</span><br data-dcnode-id="2901"><span data-dcnode-id="2900" instrument_node="">used in color vision research</span></p><span data-dcnode-id="2898" instrument_node="">
</span><p class="subSC" data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">additive light mixing gamut defined by lights at 460, 530 and 650&nbsp;nm</span></p></td></tr><tr data-dcnode-id="2058"><td colspan="2" data-dcnode-id="2890"></td><td align="left" data-dcnode-id="2062" valign="top"><p data-dcnode-id="2885"><b data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">A Scientific Theory of Color Vision</span></b><span data-dcnode-id="2886" instrument_node="">. For many centuries, the behavior of color mixtures was difficult to explain because material color, which seemed to be anchored in "real" objects of the external world, was conceptually distinguished from the "illusory" colors in rainbows or prisms. The two types of mixtures behaved differently, but the reason for the difference was unknown.</span></p><span data-dcnode-id="2884" instrument_node="">
</span><p data-dcnode-id="2866"><span data-dcnode-id="2883" instrument_node="">The trichromatic theory provided the clarifying explanation and prediction of all color sensations as arising in the behavior of the eye. Because the </span><b data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">L</span></b><span data-dcnode-id="2880" instrument_node="">, </span><b data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">M</span></b><span data-dcnode-id="2877" instrument_node="">&nbsp;and </span><b data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">S</span></b><span data-dcnode-id="2874" instrument_node="">&nbsp;receptor responses can be predicted mathematically from the summed intensity of all wavelengths in a light stimulus, the additive primaries empirically connect a measurable light stimulus to a measurable (matchable) color sensation — at least, in experimentally restricted viewing conditions. This is what makes additive color mixing, in the </span><i data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">scientific</span></i><span data-dcnode-id="2871" instrument_node=""> sense of the word, a </span><i data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">theory</span></i><span data-dcnode-id="2868" instrument_node=""> of color vision.</span><a data-dcnode-id="2867" name="theorysub"></a></p><span data-dcnode-id="2865" instrument_node="">
</span><p data-dcnode-id="2856"><span class="rubric" data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">Subtractive Color Mixture</span></span><span data-dcnode-id="2862" instrument_node="">. Subtractive color mixing is, in comparison to </span><a class="text" data-dcnode-id="2860" href="#theoryadd"><span data-dcnode-id="2861" instrument_node="">additive color mixing</span></a><span data-dcnode-id="2859" instrument_node="">, a flawed and approximate attempt to describe the colors that result </span><i data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">when light absorbing substances are mixed.</span></i></p><span data-dcnode-id="2855" instrument_node="">
</span><p data-dcnode-id="2850"><span data-dcnode-id="2854" instrument_node="">The principles of subtractive color mixture are not a rigorous theory at all. They are a description of the way colors </span><i data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">should mix</span></i><span data-dcnode-id="2851" instrument_node=""> in the ideal case — which never occurs.</span></p><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2846"><span data-dcnode-id="2848" instrument_node="">Subtractive mixing theory imitates the main features of additive color theory, and to understand the problems with subtractive color mixing, we need to unmask these points of imitation one by one.</span><a data-dcnode-id="2847" name="subsubtract"></a></p><span data-dcnode-id="2845" instrument_node="">
</span><p data-dcnode-id="2836"><b data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">Subtractive Mixtures Occur in Substances</span></b><span data-dcnode-id="2842" instrument_node="">. First, let's get clear on what subtractive mixing rules are trying to explain. </span><b data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">All subtractive color mixing occurs in the external world</span></b><span data-dcnode-id="2839" instrument_node="">, in a wide variety of </span><i data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">material colors.</span></i></p><span data-dcnode-id="2835" instrument_node="">
</span><p data-dcnode-id="2824"><span data-dcnode-id="2834" instrument_node="">In principle, subtractive color theory ought to be able to explain the color changes that occur in </span><i data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">any kind of material mixture.</span></i><span data-dcnode-id="2831" instrument_node=""> It also ought to explain the color changes that occur when a surface is illuminated by different </span><a class="text" data-dcnode-id="2829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color10.html%23surfaceshadow"><span data-dcnode-id="2830" instrument_node="">illuminants</span></a><span data-dcnode-id="2828" instrument_node=""> (colors of light). And this is the fundamental difficulty with subtractive mixing theory: </span><b data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">it must explain the behavior of too many different substances</span></b><span data-dcnode-id="2825" instrument_node="">.</span></p><span data-dcnode-id="2823" instrument_node="">
</span><p data-dcnode-id="2818"><span data-dcnode-id="2822" instrument_node="">This problem does not arise in additive color mixture, thanks to </span><a class="text" data-dcnode-id="2820" href="#addmetamerism"><span data-dcnode-id="2821" instrument_node="">additive metamerism</span></a><span data-dcnode-id="2819" instrument_node=""> in lights. Even though two colored lights may be constituted from very different combinations of light wavelengths, so long as the two lights have exactly the same color, they will behave exactly the same in all mixtures with all other lights.</span></p><span data-dcnode-id="2817" instrument_node="">
</span><p data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">In subtractive color mixture, exactly the opposite is true: even when two materials have exactly the same color, they may not behave the same in mixtures with other materials.</span></p><span data-dcnode-id="2814" instrument_node="">
</span><p data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">This problem is minimized, but hardly eliminated, by limiting the application of subtractive mixing principles to manufactured colorants. Even here, the variety of materials includes light reflecting substances (such as powders, paints, dyes or inks) and light transmitting substances (such as photographic filters, stained glass or tinted liquids).</span></p><span data-dcnode-id="2811" instrument_node="">
</span><p data-dcnode-id="2803"><span data-dcnode-id="2810" instrument_node="">I give the name </span><b data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">substance uncertainty</span></b><span data-dcnode-id="2807" instrument_node=""> to this unpredictable connection between a material's physical attributes and color mixing behavior, and I explore the depth of this problem in the </span><a class="text" data-dcnode-id="2805" href="#subprobs"><span data-dcnode-id="2806" instrument_node="">next section</span></a><span data-dcnode-id="2804" instrument_node="">.</span></p><span data-dcnode-id="2802" instrument_node="">
</span><p data-dcnode-id="2792"><span data-dcnode-id="2801" instrument_node="">For now, the essential point is that </span><b data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">we cannot use the measured color of two paints to predict the color of their mixture</span></b><span data-dcnode-id="2798" instrument_node="">. This is the most important point of difference with additive color theory, where the measured color of two lights of moderate brightness </span><i data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">can</span></i><span data-dcnode-id="2795" instrument_node=""> accurately predict the color of their mixture.</span><a data-dcnode-id="2794" name="subtractiveprimaries"></a><span data-dcnode-id="2793" instrument_node="">&nbsp;</span></p><p data-dcnode-id="2775"><span data-dcnode-id="2791" instrument_node="">
</span><b data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">The CYM Subtractive "Primary" Colors</span></b><span data-dcnode-id="2788" instrument_node="">. Subtractive color mixtures have been recognized and used in dyers' and painters' trades since </span><a class="text" data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23aristotle"><span data-dcnode-id="2787" instrument_node="">ancient Greece</span></a><span data-dcnode-id="2785" instrument_node="">. That long trial and error practice fixed on </span><i data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">red, yellow</span></i><span data-dcnode-id="2782" instrument_node=""> and </span><i data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">blue</span></i><span data-dcnode-id="2779" instrument_node=""> as the subtractive primary colors. This attained the status of a commonly accepted "color theory" in the </span><a class="text" data-dcnode-id="2777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23materialtrichromacy"><span data-dcnode-id="2778" instrument_node="">18th century</span></a><span data-dcnode-id="2776" instrument_node="">.</span></p><span data-dcnode-id="2774" instrument_node="">
</span><p data-dcnode-id="2769"><span data-dcnode-id="2773" instrument_node="">In fact, the traditional choice of primary colors was limited by the historical availability of suitable pigments, which until the </span><a class="text" data-dcnode-id="2771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/book2.html"><span data-dcnode-id="2772" instrument_node="">late 19th century</span></a><span data-dcnode-id="2770" instrument_node=""> were comparatively dull and dark. these traditional subtractive primaries are relicts of traditional color theory.</span></p><span data-dcnode-id="2768" instrument_node="">
</span><p data-dcnode-id="2757"><span data-dcnode-id="2767" instrument_node="">Color choices today have been greatly expanded by modern </span><a class="text" data-dcnode-id="2765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/pigmt1d.html"><span data-dcnode-id="2766" instrument_node="">industrial chemistry</span></a><span data-dcnode-id="2764" instrument_node="">, so that the modern </span><b data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">subtractive "primary" colors are cyan, yellow and magenta</span></b><span data-dcnode-id="2761" instrument_node=""> (abbreviated </span><b data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">CYM</span></b><span data-dcnode-id="2758" instrument_node="">)</span></p><span data-dcnode-id="2756" instrument_node="">
</span><p data-dcnode-id="2753"><span data-dcnode-id="2755" instrument_node="">Here are exemplars of the three subtractive primaries in your computer monitor colors.</span><a data-dcnode-id="2754" name="lightabsorbing"></a></p><span data-dcnode-id="2752" instrument_node="">
</span><p class="imgC" data-dcnode-id="2750"><img data-dcnode-id="2751" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/cym.gif&amp;raw" width="380"></p><span data-dcnode-id="2749" instrument_node="">
</span><p data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">There are many different material demonstrations of subtractive mixture, but one of the most common and convenient is to overlap different colored filters on a brightly lit white background or diffusing panel, as illustrated in the figure below.</span></p><span data-dcnode-id="2746" instrument_node="">
</span><p class="imgC" data-dcnode-id="2744"><img data-dcnode-id="2745" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/submix.gif&amp;raw" width="150"></p><span data-dcnode-id="2743" instrument_node="">
</span><p class="CC" data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">subtractive CYM color mixtures</span></p><span data-dcnode-id="2740" instrument_node="">
</span><p class="subCC" data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">as demonstrated in overlapping sheets of transparent colored plastic (transmission or filter mixture)</span></p><span data-dcnode-id="2737" instrument_node="">
</span><p data-dcnode-id="2729"><span data-dcnode-id="2736" instrument_node="">These primaries produce the mixtures familiar to us in paints. When we mix together a </span><a class="text" data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23mixwarm"><span data-dcnode-id="2735" instrument_node="">yellow and magenta</span></a><span data-dcnode-id="2733" instrument_node=""> paint, the resulting mixture is scarlet or orange; the mixture of </span><a class="text" data-dcnode-id="2731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23mixcool"><span data-dcnode-id="2732" instrument_node="">magenta and cyan</span></a><span data-dcnode-id="2730" instrument_node=""> yields purples and blues, and green result from the mixture of yellow and cyan.</span></p><span data-dcnode-id="2728" instrument_node="">
</span><p data-dcnode-id="2720"><span data-dcnode-id="2727" instrument_node="">However these subtractive cyan, yellow and magenta primaries are presented as the basic or elemental </span><i data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">conceptual colors</span></i><span data-dcnode-id="2724" instrument_node=""> in subtractive color mixing, no matter what kinds of </span><i data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">material colors</span></i><span data-dcnode-id="2721" instrument_node=""> — in paints, inks, dyes, pigments or filters — are used to actually mix those colors.</span></p><span data-dcnode-id="2719" instrument_node="">
</span><p data-dcnode-id="2710"><span data-dcnode-id="2718" instrument_node="">So we have to ask: what is the </span><i data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">universal</span></i><span data-dcnode-id="2715" instrument_node=""> visual effect on color that happens when we mix material substances? What is </span><i data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">primary</span></i><span data-dcnode-id="2712" instrument_node=""> about subtractive "primary" colors?</span><a data-dcnode-id="2711" name="subtractivemixture"></a></p><span data-dcnode-id="2709" instrument_node="">
</span><p data-dcnode-id="2703"><b data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">Subtractive Mixtures Always Increase Light Absorptance</span></b><span data-dcnode-id="2706" instrument_node="">. The first step to an answer is this: when we combine paints, dyes or filters, we do not increase their light reflecting (or transmitting) behavior but their </span><i data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">light absorbing behavior.</span></i></p><span data-dcnode-id="2702" instrument_node="">
</span><p data-dcnode-id="2692"><b data-dcnode-id="2697"><span data-dcnode-id="2701" instrument_node="">A subtractive mixture absorbs all light wavelengths that </span><i data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">each</span></i><span data-dcnode-id="2698" instrument_node=""> colorant absorbs by itself</span></b><span data-dcnode-id="2696" instrument_node="">. Subtractive mixture always increases the darkness of material colors; if we mix a white paint with a green paint, the white paint is darkened as a result. If additive mixture is the "white" color theory, then subtractive mixture is </span><b data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">the "black" color theory</span></b><span data-dcnode-id="2693" instrument_node="">.</span></p><span data-dcnode-id="2691" instrument_node="">
</span><p data-dcnode-id="2685"><span data-dcnode-id="2690" instrument_node="">Mixing all three subtractive primaries produces a dark neutral, the opposite of white, because each paint </span><b data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">subtracts or absorbs light</span></b><span data-dcnode-id="2687" instrument_node=""> that might be reflected by the other. Subtractive color mixtures can only be made lighter by diluting the amount of pigment in the mixture with white paint or water; either remedy weakens the color saturation. So subtractive mixture almost always also reduces the hue purity (increases the grayness) in the mixture color.</span><a data-dcnode-id="2686" name="multiplymixture"></a></p><span data-dcnode-id="2684" instrument_node="">
</span><p data-dcnode-id="2671"><b data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Multiplicative Darkness Mixture</span></b><span data-dcnode-id="2681" instrument_node="">. Well, </span><i data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">how</span></i><span data-dcnode-id="2678" instrument_node=""> do colors combine in subtractive mixtures? This is always some form of multiplication or </span><i data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">product</span></i><span data-dcnode-id="2675" instrument_node=""> of the separate </span><a class="text" data-dcnode-id="2673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color3.html%23reflectance"><span data-dcnode-id="2674" instrument_node="">reflectance curves</span></a><span data-dcnode-id="2672" instrument_node=""> (as shown below for two paints labeled magenta and yellow).</span></p><span data-dcnode-id="2670" instrument_node="">
</span><p class="imgC" data-dcnode-id="2668"><img data-dcnode-id="2669" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/RC/reflectxmy.jpg&amp;raw" width="200"></p><span data-dcnode-id="2667" instrument_node="">
</span><p class="CC" data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">subtractive color mixing of yellow and magenta</span></p><span data-dcnode-id="2664" instrument_node="">
</span><p class="subCC" data-dcnode-id="2659"><span data-dcnode-id="2663" instrument_node="">white line shows reflectance curve of subtractive mixture; high reflectance remains only where </span><i data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">both</span></i><span data-dcnode-id="2660" instrument_node=""> paints reflect light</span></p><span data-dcnode-id="2658" instrument_node="">
</span><p data-dcnode-id="2650"><span data-dcnode-id="2657" instrument_node="">In this mixture, the yellow absorbance subtracts light from the "blue" reflectance in magenta, and the magenta absorbance destroys the "green" reflectance in yellow. The common reflectance, the light reflected by </span><i data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">both</span></i><span data-dcnode-id="2654" instrument_node=""> paints, is largely in the "red orange" and "red" part of the spectrum, which is the approximate hue of the mixture. It is specifically this </span><b data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">mutual antagonism among light absorbing substances</span></b><span data-dcnode-id="2651" instrument_node=""> that subtractive color mixing tries to explain.</span></p><span data-dcnode-id="2649" instrument_node="">
</span><p data-dcnode-id="2644"><span data-dcnode-id="2648" instrument_node="">This mutual antagonism depends on many physical attributes of the colorants, in particular (for pigments) on their tinting strength, particle size and hiding power (see this </span><a class="text" data-dcnode-id="2646" href="#paintterms"><span data-dcnode-id="2647" instrument_node="">explanation</span></a><span data-dcnode-id="2645" instrument_node=""> of paint physical attributes). In general, pigments that have a higher tinting strength, smaller particle size and greater hiding power (opacity) will have a "weight" or impact in mixtures that is greater than their physical proportion in the mixture.</span></p><span data-dcnode-id="2643" instrument_node="">
</span><p data-dcnode-id="2635"><span data-dcnode-id="2642" instrument_node="">However, as a general rule for most paints and dyes in most applications, the reflectance resulting from a physical mixture of pigments is usually close to </span><a class="text" data-dcnode-id="2640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color3.html%23mixprofile"><span data-dcnode-id="2641" instrument_node="">the geometric mean</span></a><span data-dcnode-id="2639" instrument_node=""> of the separate paint reflectance curves </span><i data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">across each wavelength in the spectrum.</span></i><span data-dcnode-id="2636" instrument_node=""> (The geometric mean of two numbers is the square root of their product.) For example, if a white paint reflects 98% of the light at 452nm, and a black paint reflects 10% of the light, their mixture (in equal proportions at equal tinting strength) will reflect approximately 31% of the light at that wavelength.</span></p><span data-dcnode-id="2634" instrument_node="">
</span><p data-dcnode-id="2629"><span data-dcnode-id="2633" instrument_node="">We have to use a different mixing rule for filters, where the mixture color is usually equal to the </span><i data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">product</span></i><span data-dcnode-id="2630" instrument_node=""> of the separate transmission profiles. That is, two filters that separately transmit 98% and 10% of a wavelength will transmit about 9.8% of the light when they are combined.</span></p><span data-dcnode-id="2628" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2627" instrument_node="">When we apply these mixing calculations to the reflectance or transmission profiles, we find that the mixture profile is always </span><b data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">closer to the darker profile</span></b><span data-dcnode-id="2624" instrument_node=""> in the combined total reflectance curve, or </span><b data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">darker than the darker profile</span></b><span data-dcnode-id="2621" instrument_node=""> in the combined total transmission curve. Mixing white and black in equal proportions does not reduce the luminance of white by half, but by more than two thirds (in paints) or up to 100% (in filters).</span></p><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2607"><span data-dcnode-id="2618" instrument_node="">One result is that sequentially (transmissively) combining two filters </span><i data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">always</span></i><span data-dcnode-id="2615" instrument_node=""> results in a darker mixture than physically mixing the filter colorants as paints; and physically (subtractively) mixing two colorants </span><i data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">always</span></i><span data-dcnode-id="2612" instrument_node=""> results in a duller, darker color than visually (additively) mixing the same colorants, for example on a </span><a class="text" data-dcnode-id="2610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/colortop.html"><span data-dcnode-id="2611" instrument_node="">color top</span></a><span data-dcnode-id="2609" instrument_node="">.</span><a data-dcnode-id="2608" name="2stim"></a></p><span data-dcnode-id="2606" instrument_node="">
</span><p data-dcnode-id="2596"><b data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Double Cone Stimulation</span></b><span data-dcnode-id="2603" instrument_node="">. We've identified the blackening and multiplicative effects of subtractive color mixtures, but we still haven't identified the attributes that define the subtractive primary </span><i data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">colors</span></i><span data-dcnode-id="2600" instrument_node=""> cyan, yellow and magenta. What is the material attribute of "yellowness" that occurs in all yellow colored </span><i data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">materials</span></i><span data-dcnode-id="2597" instrument_node="">?</span></p><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2582"><span data-dcnode-id="2594" instrument_node="">The answer begins with the fact that subtractive mixtures always destroy ("subtract") the material luminance, making color both darker and duller. To compensate for this, painters should start with </span><b data-dcnode-id="2587"><span data-dcnode-id="2593" instrument_node="">colors that are both </span><i data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">light</span></i><span data-dcnode-id="2590" instrument_node=""> and </span><i data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">bright</span></i></b><span data-dcnode-id="2586" instrument_node=""> — light valued </span><i data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">and</span></i><span data-dcnode-id="2583" instrument_node=""> highly saturated.</span></p><span data-dcnode-id="2581" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2580" instrument_node="">If we experiment with various light valued, high chroma colorants, as the ancient painters and dyers did with their much duller and darker pigments, we discover that some do much better than others as subtractive primary colors. Why? Because the key to subtractive primaries is not in their light value or high chroma alone. It's in how that color intensity affects the eye:</span><a data-dcnode-id="2579" name="ctprin36"></a></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2574"><b data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">36. An ideal subtractive primary color must stimulate two types of receptor cones (L and M, or L and S, or M and S) as strongly and equally as possible, and stimulate the third type of cone as little as possible.</span></b></p><span data-dcnode-id="2573" instrument_node="">
</span><p data-dcnode-id="2559"><span data-dcnode-id="2572" instrument_node="">In other words, the subtractive primaries are only </span><i data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">an indirect way</span></i><span data-dcnode-id="2569" instrument_node=""> to specify the </span><b data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">L</span></b><span data-dcnode-id="2566" instrument_node="">, </span><b data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">M</span></b><span data-dcnode-id="2563" instrument_node="">&nbsp;and </span><b data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">S</span></b><span data-dcnode-id="2560" instrument_node="">&nbsp;cone responses of additive color mixing!</span></p><span data-dcnode-id="2558" instrument_node="">
</span><p data-dcnode-id="2547"><span data-dcnode-id="2557" instrument_node="">Traditional color theory texts often express this point in negative terms, saying that each subtractive primary </span><i data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">absorbs or "subtracts"</span></i><span data-dcnode-id="2554" instrument_node=""> from "white" light the wavelengths representing a single additive primary. This principle is often expressed as four subtractive formulas, including both white (</span><b data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">W</span></b><span data-dcnode-id="2551" instrument_node="">) and black (</span><b data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">K</span></b><span data-dcnode-id="2548" instrument_node="">):</span></p><span data-dcnode-id="2546" instrument_node="">
</span><p class="CC" data-dcnode-id="2538"><span data-dcnode-id="2545" instrument_node="">C = W – R</span><br data-dcnode-id="2544"><span data-dcnode-id="2543" instrument_node="">
Y = W – B</span><br data-dcnode-id="2542"><span data-dcnode-id="2541" instrument_node="">
M = W – G</span><br data-dcnode-id="2540"><span data-dcnode-id="2539" instrument_node="">
K = W – (R + G + B)</span></p><span data-dcnode-id="2537" instrument_node="">
</span><p data-dcnode-id="2511"><span data-dcnode-id="2536" instrument_node="">Thus cyan paint (</span><b data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">C</span></b><span data-dcnode-id="2533" instrument_node="">) subtracts "red" light (</span><b data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">R</span></b><span data-dcnode-id="2530" instrument_node="">) from the total "white" (</span><b data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">W</span></b><span data-dcnode-id="2527" instrument_node="">) light spectrum; magenta paint (</span><b data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">M</span></b><span data-dcnode-id="2524" instrument_node="">) subtracts "green" (</span><b data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">G</span></b><span data-dcnode-id="2521" instrument_node="">) light from the spectrum, yellow paint (</span><b data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">Y</span></b><span data-dcnode-id="2518" instrument_node="">) subtracts "blue" (</span><b data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">B</span></b><span data-dcnode-id="2515" instrument_node="">) light; black paint (</span><b data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">K</span></b><span data-dcnode-id="2512" instrument_node="">) subtracts all light from the spectrum.</span></p><span data-dcnode-id="2510" instrument_node="">
</span><p data-dcnode-id="2504"><span data-dcnode-id="2509" instrument_node="">This way of defining subtractive primaries is inaccurate, both because it implies the wrong complementary hues (yellow is not the complement of blue, and red is not the complement of cyan), and because it allows for dull and dark "primary" colors. Thus, raw umber almost completely absorbs "blue" light, and iron (prussian) blue almost completely absorbs "red" light, so they </span><i data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">can</span></i><span data-dcnode-id="2506" instrument_node=""> be used as a primary yellow and blue, even though they also absorb light from other parts of the spectrum and therefore appear relatively dull or dark.</span><a data-dcnode-id="2505" name="idealsub"></a></p><span data-dcnode-id="2503" instrument_node="">
</span><p data-dcnode-id="2499"><b data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Ideal Subtractive Primaries</span></b><span data-dcnode-id="2500" instrument_node="">. The better way to define subtractive primary colors is to specify the conceptual color that produces the maximum possible stimulation in two types of cones and the minimum possible stimulation to the third type of cone. Then we can simply choose the colorants that achieve those receptor effects as far as possible with a material color.</span></p><span data-dcnode-id="2498" instrument_node="">
</span><p data-dcnode-id="2484"><span data-dcnode-id="2497" instrument_node="">We define the conceptual color by means of an </span><i data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">ideal</span></i><span data-dcnode-id="2494" instrument_node=""> (conceptual) reflectance profile, called an </span><a class="text" data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color3.html%23optimalstimuli"><span data-dcnode-id="2493" instrument_node="">optimal color</span></a><span data-dcnode-id="2491" instrument_node="">. Optimal colors always have the </span><i data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">maximum possible saturation</span></i><span data-dcnode-id="2488" instrument_node=""> or hue purity of any surface color at a given hue and lightness, and the </span><i data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">maximum possible lightness</span></i><span data-dcnode-id="2485" instrument_node=""> of any surface color of a given hue and saturation. So they are the perfect "light, bright" colors we want for our ideal subtractive primaries.</span></p><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2480"><span data-dcnode-id="2482" instrument_node="">The diagram below (top row) shows the spectral reflectance curves and cone responses produced by these three idealized subtractive primaries.</span><a data-dcnode-id="2481" name="patterns"></a></p><span data-dcnode-id="2479" instrument_node="">
</span><p class="imgC" data-dcnode-id="2477"><img data-dcnode-id="2478" height="279" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/subprim.gif&amp;raw" width="328"></p><span data-dcnode-id="2476" instrument_node="">
</span><p class="CC" data-dcnode-id="2472"><span data-dcnode-id="2475" instrument_node="">ideal spectral reflectance curves for subtractive</span><br data-dcnode-id="2474"><span data-dcnode-id="2473" instrument_node="">primary colors</span></p><span data-dcnode-id="2471" instrument_node="">
</span><p class="subCC" data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">each subtractive primary reflects or transmits the light representing two additive primary colors</span></p><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2467" instrument_node="">In the top row of the figure are the </span><i data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">reflectance curves for optimal primary paints.</span></i><span data-dcnode-id="2464" instrument_node=""> The </span><i data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">cone response profiles</span></i><span data-dcnode-id="2461" instrument_node=""> (middle row) show how these optimal subtractive primaries affect the </span><b data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">L</span></b><span data-dcnode-id="2458" instrument_node="">, </span><b data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">M</span></b><span data-dcnode-id="2455" instrument_node=""> and </span><b data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">S</span></b><span data-dcnode-id="2452" instrument_node=""> cone outputs. The bottom row shows the </span><i data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">perceived colors</span></i><span data-dcnode-id="2449" instrument_node=""> that result from the cone responses in additive color mixing.</span></p><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2409"><span data-dcnode-id="2446" instrument_node="">Observe, in the ideal cone response profiles above, that all three </span><i data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">physically ideal</span></i><span data-dcnode-id="2443" instrument_node=""> subtractive primaries stimulate to a significant degree the third or "unwanted" </span><b data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">L</span></b><span data-dcnode-id="2440" instrument_node="">, </span><b data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">M</span></b><span data-dcnode-id="2437" instrument_node="">&nbsp;or </span><b data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">S</span></b><span data-dcnode-id="2434" instrument_node="">&nbsp;cone. (Note in particular the </span><b data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">M</span></b><span data-dcnode-id="2431" instrument_node="">&nbsp;response in magenta.) In each case we cannot achieve a visually pure primary hue of paint, because of a </span><i data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">physiological</span></i><span data-dcnode-id="2428" instrument_node=""> limitation: the overlap between the </span><b data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">M</span></b><span data-dcnode-id="2425" instrument_node="">&nbsp;cone and </span><b data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">L</span></b><span data-dcnode-id="2422" instrument_node="">&nbsp;</span><a class="text" data-dcnode-id="2420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color1.html%23logconesens"><span data-dcnode-id="2421" instrument_node="">cone fundamentals</span></a><span data-dcnode-id="2419" instrument_node="">. We just can't stimulate the </span><b data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">L</span></b><span data-dcnode-id="2416" instrument_node="">&nbsp;cone with "red orange" light, or the </span><b data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">S</span></b><span data-dcnode-id="2413" instrument_node=""> cone with "blue violet" light, without also stimulating the </span><b data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">M</span></b><span data-dcnode-id="2410" instrument_node="">&nbsp;cone, just as if we stimulated it with "green" light.</span></p><span data-dcnode-id="2408" instrument_node="">
</span><p data-dcnode-id="2402"><span data-dcnode-id="2407" instrument_node="">It is instructive to compare the chromaticity of these ideal subtractive primaries with the chromaticity of common pigment choices for subtractive primary colors in watercolor paints or printing inks, as </span><a class="text" data-dcnode-id="2405" href="#pigchoices"><span data-dcnode-id="2406" instrument_node="">shown above</span></a><span data-dcnode-id="2404" instrument_node="">. We see that artists do not use the "ideal" primary colors, and for a variety of practical reasons: a colorant matching the ideal hue is not available, or its physical attributes (lightfastness, chroma, lightness, transparency, tinting strength) are inadequate, or its mixtures with other "primary" colorants lack the saturation desired for the specific printing or painting purpose.</span><a data-dcnode-id="2403" name="submixture"></a></p><span data-dcnode-id="2401" instrument_node="">
</span><p data-dcnode-id="2397"><b data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">Mixing Subtractive Primaries</span></b><span data-dcnode-id="2398" instrument_node="">. Finally, what happens when these ideal primary paints are mixed?</span></p><span data-dcnode-id="2396" instrument_node="">
</span><p data-dcnode-id="2382"><span data-dcnode-id="2395" instrument_node="">Because any two subtractive primaries will share reflectance in either the "red," "green" or "blue" wavelengths associated with a single additive primary color, </span><b data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">any two subtractive primaries share reflectance that stimulates a single photoreceptor</span></b><span data-dcnode-id="2392" instrument_node="">. Yellow and magenta share "red" reflectance that stimulates the </span><b data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">L</span></b><span data-dcnode-id="2389" instrument_node=""> cone, yellow and cyan share "green" reflectance that stimulates the </span><b data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">M</span></b><span data-dcnode-id="2386" instrument_node=""> cone, and magenta and cyan share "blue" reflectance that stimulates the </span><b data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">S</span></b><span data-dcnode-id="2383" instrument_node=""> cone.</span></p><span data-dcnode-id="2381" instrument_node="">
</span><p class="imgC" data-dcnode-id="2379"><img data-dcnode-id="2380" height="279" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/subpmix.gif&amp;raw" width="328"></p><span data-dcnode-id="2378" instrument_node="">
</span><p class="CC" data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">mixing two ideal subtractive primary colors</span></p><span data-dcnode-id="2375" instrument_node="">
</span><p class="subCC" data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">reflectance representing a single additive primary remains high; other parts of the spectrum also reflect light (white line shows cone response to a 50:50 paint mixture), and this flatter cone response profile is perceived as a grayer color</span></p><span data-dcnode-id="2372" instrument_node="">
</span><p data-dcnode-id="2361"><span data-dcnode-id="2371" instrument_node="">However, in any subtractive mixture, </span><b data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">the remaining two additive primaries must compete with each other</span></b><span data-dcnode-id="2368" instrument_node="">. As shown above for the mixture of yellow and cyan, the "red" light that primarily stimulates the </span><b data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">L</span></b><span data-dcnode-id="2365" instrument_node=""> cone is reflected by yellow but absorbed by cyan; the "blue" light that stimulates the </span><b data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">S</span></b><span data-dcnode-id="2362" instrument_node=""> cone is reflected by cyan but absorbed by yellow. So both are substantially darkened. Like a seesaw, as "blue" reflectance goes up, "red" reflectance goes down, and vice versa.</span></p><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2348"><span data-dcnode-id="2359" instrument_node="">These tradeoffs also mean that </span><b data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">mixtures of two subtractive primaries reflect light from all parts of the spectrum</span></b><span data-dcnode-id="2356" instrument_node="">. The result is a flatter cone response profile (shown in the middle diagram of the figure), which creates the perception of a less saturated color mixture — a color closer to gray. This is of course the </span><a class="text" data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color14.html%23satcost"><span data-dcnode-id="2355" instrument_node="">saturation cost</span></a><span data-dcnode-id="2353" instrument_node=""> in subtractive mixtures — the tendency of paint mixtures to be darker </span><i data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">and</span></i><span data-dcnode-id="2350" instrument_node=""> duller than the original paints.</span><a data-dcnode-id="2349" name="ctprin37"></a></p><span data-dcnode-id="2347" instrument_node="">
</span><p data-dcnode-id="2344"><b data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">37. The choice of appropriate subtractive primary pigments depends on the variety of colorants available in a given medium, their price and physical attributes, and the range of colors in the image to be reproduced.</span></b></p><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2334"><span data-dcnode-id="2342" instrument_node="">These saturation costs — the unwanted third cone stimulation in ideal colors and the added "white" reflectance in real colors — are the fundamental reason why </span><b data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">material primary colors are always imperfect</span></b><span data-dcnode-id="2339" instrument_node="">, as </span><a class="text" data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23imaginary"><span data-dcnode-id="2338" instrument_node="">explained here</span></a><span data-dcnode-id="2336" instrument_node="">. There is no combination of three material primary colors in any medium (dyes, paints, phosphors, filters) that can mix every possible color in that medium.</span><a data-dcnode-id="2335" name="mixingdemos"></a></p><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2326"><span class="rubric" data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Don't Confuse Additive &amp; Subtractive Mixtures</span></span><span data-dcnode-id="2330" instrument_node="">. I hope you now understand why </span><i data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">all</span></i><span data-dcnode-id="2327" instrument_node=""> color mixing involves the retinal response to light; the only issue is whether or how we let material substances interfere with our control of the light that reaches the eye.</span></p><span data-dcnode-id="2325" instrument_node="">
</span><p data-dcnode-id="2320"><span data-dcnode-id="2324" instrument_node="">Because subtractive color mixing (in materials) is actually an indirect manipulation of additive color mixing (in cone responses), the two types of color mixture can be </span><b data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">demonstrated in superficially similar ways.</span></b><span data-dcnode-id="2321" instrument_node=""> To avoid confusion, remember that the fundamental difference is whether light wavelengths are excluded by the colored substances before the light reaches the eye (the light mixing occurs in the external world), or light wavelengths are separately able to reach the receptor cones (the light mixing occurs in the eye).</span></p><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2308"><span data-dcnode-id="2318" instrument_node="">With </span><b data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">colored transmission filters</span></b><span data-dcnode-id="2315" instrument_node="">, the additive color mixing demonstration is produced by placing a colored yellow filter over one beam of white light, and a blue filter over a second beam of white light, then overlapping the two colored beams on a reflective surface. Because each filter is placed over a </span><i data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">separate beam of light,</span></i><span data-dcnode-id="2312" instrument_node=""> the blue and yellow lights are both reflected to the eye, where they both affect the receptor cones to create the sensation of "white" light. In contrast, the subtractive color mixing demonstration is produced with the same yellow and blue filters, this time </span><i data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">both placed over a single beam of light.</span></i><span data-dcnode-id="2309" instrument_node=""> The two filters then act in combination to absorb light before it ever reaches the eye; the only wavelengths that can pass through both filters at the same time are in the "green" section of the spectrum, so green is the color we see.</span></p><span data-dcnode-id="2307" instrument_node="">
</span><p data-dcnode-id="2296"><span data-dcnode-id="2306" instrument_node="">With </span><b data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">paints or inks</span></b><span data-dcnode-id="2303" instrument_node="">, the additive color mixing demonstration is produced by spinning the two paints on a </span><a class="text" data-dcnode-id="2301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/colortop.html"><span data-dcnode-id="2302" instrument_node="">color top</span></a><span data-dcnode-id="2300" instrument_node="">, or by printing the two colors as closely spaced dots in halftone color printing. In either case, each color of paint can still separately reflect light to eye, even though they are optically blended through motion blurring or </span><a class="text" data-dcnode-id="2298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color8.html%23visualfusion"><span data-dcnode-id="2299" instrument_node="">visual fusion</span></a><span data-dcnode-id="2297" instrument_node="">. When they are physically mixed as paints or inks, they cancel reflectance in each other to produce a subtractive color mixture.</span></p><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2266"><span data-dcnode-id="2294" instrument_node="">Finally, it should be clear why </span><b data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">red and blue are not subtractive primary colors</span></b><span data-dcnode-id="2291" instrument_node="">. A </span><a class="text" data-dcnode-id="2289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/RC/red.html"><span data-dcnode-id="2290" instrument_node="">red paint</span></a><span data-dcnode-id="2288" instrument_node=""> reflects light only from the "red" end of the spectrum; it stimulates primarily the </span><b data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">L</span></b><span data-dcnode-id="2285" instrument_node="">&nbsp;cones, but not the </span><b data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">M</span></b><span data-dcnode-id="2282" instrument_node="">&nbsp;or </span><b data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">S</span></b><span data-dcnode-id="2279" instrument_node="">. Most </span><a class="text" data-dcnode-id="2277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/RC/blue.html"><span data-dcnode-id="2278" instrument_node="">blue paints</span></a><span data-dcnode-id="2276" instrument_node=""> reflect mostly "blue" and some "green" light, stimulating the </span><b data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">S</span></b><span data-dcnode-id="2273" instrument_node="">&nbsp;and </span><b data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">M</span></b><span data-dcnode-id="2270" instrument_node="">&nbsp;cones, but not the </span><b data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">L</span></b><span data-dcnode-id="2267" instrument_node="">. So their mixture creates a very dull purple, because the two colors have no reflectance in common: most wavelengths reflected by one color are absorbed by the other.</span></p><span data-dcnode-id="2265" instrument_node="">
</span><p data-dcnode-id="2260"><span data-dcnode-id="2264" instrument_node="">The same considerations explain why the </span><b data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">RGB</span></b><span data-dcnode-id="2261" instrument_node=""> additive primaries are effective only in light stimuli, such as televisions or computer monitors, but not in paints or inks. There is no shared reflectance in the reflectance curves of red orange, green and blue violet paints, so these produce very dull, dark colors when mixed subtractively. The additive primaries are only effective when the mixing occurs in the retina.</span></p><span data-dcnode-id="2259" instrument_node="">
</span><p data-dcnode-id="2253"><span data-dcnode-id="2258" instrument_node="">By the same token, the </span><b data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">CYM</span></b><span data-dcnode-id="2255" instrument_node=""> primaries are ineffective in televisions or computer monitors. There is a large overlap in the emittance curves of cyan, yellow and magenta lights, so that their additive light mixtures appear whitened and bright — the equivalent of dark and dull in subtractive mixing. The subtractive primaries are only effective when the mixing occurs in materials.</span><a data-dcnode-id="2254" name="partitive"></a></p><span data-dcnode-id="2252" instrument_node="">
</span><p data-dcnode-id="2248"><b data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Partitive Mixture</span></b><span data-dcnode-id="2249" instrument_node="">. Finally, there is a hybrid case of color mixture that occurs in an image composed of small, separate but closely crowded color dots or pixels that are perceived by the eye as a visually continuous color area. Exploring this technology will clarify further the differences between additive and subtractive color mixture.</span></p><span data-dcnode-id="2247" instrument_node="">
</span><p data-dcnode-id="2239"><span data-dcnode-id="2246" instrument_node="">The text and every image in this web page is generated on your color monitor by thousands of tiny </span><b data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">RGB</span></b><span data-dcnode-id="2243" instrument_node=""> lights that are too small for the eye to resolve optically or retinally: the eye blends them together as a textureless surface. This </span><a class="text" data-dcnode-id="2241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color8.html%23visualfusion"><span data-dcnode-id="2242" instrument_node="">visual fusion</span></a><span data-dcnode-id="2240" instrument_node=""> is also the reason why homogeneous color areas appear from a field of halftone or overlapping colored dots in printed books and magazines, and smooth colors appear from the millions of tiny dye molecules impregnated in color photographic papers.</span></p><span data-dcnode-id="2238" instrument_node="">
</span><p data-dcnode-id="2227"><span data-dcnode-id="2237" instrument_node="">However, computer monitors use </span><b data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">RGB</span></b><span data-dcnode-id="2234" instrument_node=""> primaries to create color mixtures, but all photographs and printed color images use the </span><b data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">CYM</span></b><span data-dcnode-id="2231" instrument_node=""> subtractive primaries instead. So the question arises: why aren't the additive </span><b data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">RGB</span></b><span data-dcnode-id="2228" instrument_node=""> primaries used in printing and photography just as they are in computer monitors?</span></p><span data-dcnode-id="2226" instrument_node="">
</span><p data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">To grasp the answer, it will help first to print the diagram below on your color printer.</span></p><span data-dcnode-id="2223" instrument_node="">
</span><p class="imgC" data-dcnode-id="2221"><img data-dcnode-id="2222" height="205" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/partitive.gif&amp;raw" width="380"></p><span data-dcnode-id="2220" instrument_node="">
</span><p class="CC" data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">the subtractive primary colors as additive RGB lights and as additive RGB pixels</span></p><span data-dcnode-id="2217" instrument_node="">
</span><p data-dcnode-id="2206"><span data-dcnode-id="2216" instrument_node="">In this image, the </span><b data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">CYM</span></b><span data-dcnode-id="2213" instrument_node=""> color areas in the upper row are actually created on the computer monitor by the visual fusion and additive mixture of two of the three </span><b data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">RGB</span></b><span data-dcnode-id="2210" instrument_node=""> </span><i data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">monitor lights.</span></i><span data-dcnode-id="2207" instrument_node=""> These are physically distinct but too small for the eye to resolve into a dot pattern.</span></p><span data-dcnode-id="2205" instrument_node="">
</span><p data-dcnode-id="2197"><span data-dcnode-id="2204" instrument_node="">The color areas in the lower row are created by the visual fusion of alternating </span><b data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">RGB</span></b><span data-dcnode-id="2201" instrument_node=""> </span><i data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">pixels.</span></i><span data-dcnode-id="2198" instrument_node=""> Each pixel contains three monitor lights, so this doubles the amount of black (unilluminated) area within each color. (Examine the two areas with a magnifying glass.) This doubled black spacing between lights coarsens the screen texture enough to make it visible.</span></p><span data-dcnode-id="2196" instrument_node="">
</span><p class="imgC" data-dcnode-id="2194"><img data-dcnode-id="2195" height="199" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/partitive.jpg&amp;raw" width="380"></p><span data-dcnode-id="2193" instrument_node="">
</span><p class="CC" data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">the subtractive primary colors as pure CYM inks and as additive RGB halftone dots</span></p><span data-dcnode-id="2190" instrument_node="">
</span><p data-dcnode-id="2179"><span data-dcnode-id="2189" instrument_node="">The printed copy looks quite different, especially in the yellow (image above). The printer has silently substituted a pure yellow ink for the "yellow" </span><b data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">R</span></b><span data-dcnode-id="2186" instrument_node="">+</span><b data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">G</span></b><span data-dcnode-id="2183" instrument_node=""> monitor light mixture. However your computer screen is fundamentally a light source, despite the illusion (created by the subdued "white" luminance and the slight blackening effect of the monitor light interstices) that it is a surface. The printed paper is a true surface, and therefore the inks printed on it have the absorptive </span><a class="text" data-dcnode-id="2181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color2.html%23grayness"><span data-dcnode-id="2182" instrument_node="">grayness</span></a><span data-dcnode-id="2180" instrument_node=""> that characterizes surface color perception.</span></p><span data-dcnode-id="2178" instrument_node="">
</span><p data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">If you hold the printed diagram next to your computer monitor and illuminate the paper so that it appears as white as the white of your computer screen, you will see that the inks appear to be darker and less saturated than the monitor colors. So the first difficulty is that absorbing inks are inherently a less effective source of luminance than emitting lights.</span></p><span data-dcnode-id="2175" instrument_node="">
</span><p data-dcnode-id="2158"><span data-dcnode-id="2174" instrument_node="">If you next look at the printout by itself, you see that the yellow created from the pure </span><b data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Y</span></b><span data-dcnode-id="2171" instrument_node=""> ink (top row) is much brighter than the yellow created from the visual fusion of alternating, printed </span><b data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">R</span></b><span data-dcnode-id="2168" instrument_node=""> and </span><b data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">G</span></b><span data-dcnode-id="2165" instrument_node=""> dots. Your printer renders the pixels without black space between them, so the darkening is not the same as on your monitor; rather, visual fusion </span><i data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">averages</span></i><span data-dcnode-id="2162" instrument_node=""> the luminance (reflectance) of adjacent dots; it does not </span><i data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">add</span></i><span data-dcnode-id="2159" instrument_node=""> them together as it does in blended light mixtures. The average lightness of red or green inks is far lower than the lightness of a pure yellow ink, so the visually fused and additively interpreted yellow appears much darker and, therefore, closer to a dull ochre or brown. A similar dulling and darkening occurs in the cyan and magenta mixtures.</span></p><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2152"><span data-dcnode-id="2156" instrument_node="">Thus, the </span><b data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">RGB</span></b><span data-dcnode-id="2153" instrument_node=""> primaries suffer from three handicaps when displayed on surfaces: (1) they lose the greater luminance contrast possible in light sources, and (2) as surface colors, the RGB inks are much darker than pure cyan, yellow or magenta inks. This severely compromises their effectiveness in the additive color mixing induced by visual fusion.</span></p><span data-dcnode-id="2151" instrument_node="">
</span><p data-dcnode-id="2146"><span data-dcnode-id="2150" instrument_node="">Because RGB inks make drastically darker subtractive mixtures — think of mixing yellow from a red and green paint! — (3) RGB inks would have to be printed as separate, </span><i data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">nonoverlapping</span></i><span data-dcnode-id="2147" instrument_node=""> dots. This would double the visual texture of a printed image and greatly increase the registration (dot alignment) precision necessary for a clear image.</span></p><span data-dcnode-id="2145" instrument_node="">
</span><p data-dcnode-id="2142"><span data-dcnode-id="2144" instrument_node="">Because subtractive colors can be overprinted in a single dot or pixel location, to produce subtractive mixture with each other and with the white paper, they produce a much finer visual texture with less registration precision. The overprinting also subtractively creates the span of orange, green and violet colors necessary to complete the hue circle. These dots of subtractive mixture are effaced by visual fusion, and averaged together by additive color mixture. This provides an acceptable simulation in printed surfaces and photographic papers of the brightness and contrast experienced in the light images of monitor phosphors, projective transparencies, and the surfaces of the real world.</span><a data-dcnode-id="2143" name="subprobs"></a></p><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2134"><span class="rubric" data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Substance Uncertainty</span></span><span data-dcnode-id="2138" instrument_node="">. In my explanation of additive and subtractive color mixture (</span><a class="text" data-dcnode-id="2136" href="#addsub"><span data-dcnode-id="2137" instrument_node="">above</span></a><span data-dcnode-id="2135" instrument_node="">), I stated that subtractive color mixture is unpredictable and at best approximate, and that this is because of the complexity of material color mixture.</span></p><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2127"><span data-dcnode-id="2132" instrument_node="">Now we look at that problem using specific examples. These highlight the differences between the </span><a class="text" data-dcnode-id="2130" href="#fourcolors"><span data-dcnode-id="2131" instrument_node="">four types of color</span></a><span data-dcnode-id="2129" instrument_node=""> — conceptual color, visual color, radiant color and material color — as we try to understand material color mixtures.</span><a data-dcnode-id="2128" name="metamerism"></a></p><span data-dcnode-id="2126" instrument_node="">
