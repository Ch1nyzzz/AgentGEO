="597"><span data-dcnode-id="596" instrument_node="">PY65</span></span></td></tr><tr align="center" bgcolor="#666666" data-dcnode-id="570"><td data-dcnode-id="585"><img data-dcnode-id="591" height="70" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/RC/exyo.gif&amp;raw" width="70"><br data-dcnode-id="590"><span data-dcnode-id="586" style="font-family:Verdana; font-size:12px; color:#FFFFFF;"><span data-dcnode-id="589" instrument_node="">yellow orange</span><br data-dcnode-id="588"><span data-dcnode-id="587" instrument_node="">PY110</span></span></td><td data-dcnode-id="578"><img data-dcnode-id="584" height="70" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/RC/exo.gif&amp;raw" width="70"><br data-dcnode-id="583"><span data-dcnode-id="579" style="font-family:Verdana; font-size:12px; color:#FFFFFF;"><span data-dcnode-id="582" instrument_node="">orange</span><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node="">PO20</span></span></td><td data-dcnode-id="571"><img data-dcnode-id="577" height="70" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/RC/exro.gif&amp;raw" width="70"><br data-dcnode-id="576"><span data-dcnode-id="572" style="font-family:Verdana; font-size:12px; color:#FFFFFF;"><span data-dcnode-id="575" instrument_node="">red orange</span><br data-dcnode-id="574"><span data-dcnode-id="573" instrument_node="">PO73</span></span></td></tr><tr align="center" bgcolor="#666666" data-dcnode-id="545"><td data-dcnode-id="562"><img data-dcnode-id="568" height="70" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/RC/exor.gif&amp;raw" width="70"><br data-dcnode-id="567"><span data-dcnode-id="563" style="font-family:Verdana; font-size:12px; color:#FFFFFF;"><span data-dcnode-id="566" instrument_node="">orange red</span><br data-dcnode-id="565"><span data-dcnode-id="564" instrument_node="">PR188</span></span></td><td data-dcnode-id="554"><img data-dcnode-id="561" height="70" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/RC/exr.gif&amp;raw" width="70"><br data-dcnode-id="560"><span data-dcnode-id="555" style="font-family:Verdana; font-size:12px; color:#FFFFFF;"><i data-dcnode-id="557"><span data-dcnode-id="559" instrument_node="">red</span><br data-dcnode-id="558"></i><span data-dcnode-id="556" instrument_node="">PR209</span></span></td><td data-dcnode-id="546"><img data-dcnode-id="553" height="70" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/RC/exvr.gif&amp;raw" width="70"><br data-dcnode-id="552"><span data-dcnode-id="547" style="font-family:Verdana; font-size:12px; color:#FFFFFF;"><i data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">violet red</span></i><br data-dcnode-id="549"><span data-dcnode-id="548" instrument_node="">PR122</span></span></td></tr></tbody></table><span data-dcnode-id="541" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="535" instrument_node="">
</span><br data-dcnode-id="534"><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Next, here is how the visual hue circle distributes physical exemplars for the hue categories. The diagram (below) shows the hue circle location of:</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="529" instrument_node="">(1) spectral wavelengths and extraspectral mixtures of "red" and "violet" light (in color science, hues can be identified precisely by the matching hue of spectral light, called the </span><b data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">dominant wavelength</span></b><span data-dcnode-id="526" instrument_node="">).</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">(2) the spacing of hue categories in the Munsell Color System, and</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">(3) the location of the four unique hues (red, yellow, green blue), as averaged across a number of color scaling experiments.</span></p><span data-dcnode-id="518" instrument_node="">
</span><p class="imgC" data-dcnode-id="516"><img data-dcnode-id="517" height="366" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/ctcirc1.gif&amp;raw" width="380"></p><span data-dcnode-id="515" instrument_node="">
</span><p class="CC" data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">spectral wavelength and Munsell visual hue angles</span></p><span data-dcnode-id="512" instrument_node="">
</span><p class="subCC" data-dcnode-id="502"><span data-dcnode-id="511" instrument_node="">average Munsell hue angle for all hues across values /6 to /8 and chromas /6 to /8, on the CIECAM </span><b data-dcnode-id="504"><span data-dcnode-id="510" instrument_node="">a</span><sub data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">C</span></sub><span data-dcnode-id="507" instrument_node="">b</span><sub data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">C</span></sub></b><span data-dcnode-id="503" instrument_node=""> plane</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="500" instrument_node="">The spacing of spectral hues shows the increased wavelength discrimination that appears around "yellow" and "cyan" wavelengths, the decreased discrimination at the spectum ends and in the "green" wavelengths, and the strong tinting effect of "violet" light in the mixture of red and violet hues. It also vindicates Newton's original scaling of hues, which was developed using only the crudest of light manipulation tools.</span><a data-dcnode-id="499" name="pigmentcircle"></a></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">The next diagram shows the spacing of common watercolor pigments on the visual hue circle, with spectral hues repeated for reference. (Note: all yellow hues appear in the spectrum, so the commercial watercolor paint name "spectrum yellow" is meaningless.)</span></p><span data-dcnode-id="494" instrument_node="">
</span><p class="imgC" data-dcnode-id="492"><img data-dcnode-id="493" height="366" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/ctcirc2.gif&amp;raw" width="380"></p><span data-dcnode-id="491" instrument_node="">
</span><p class="CC" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">spectral wavelength and pigment visual hue angles</span></p><span data-dcnode-id="488" instrument_node="">
</span><p class="subCC" data-dcnode-id="478"><span data-dcnode-id="487" instrument_node="">on the CIECAM </span><b data-dcnode-id="480"><span data-dcnode-id="486" instrument_node="">a</span><sub data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">C</span></sub><span data-dcnode-id="483" instrument_node="">b</span><sub data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">C</span></sub></b><span data-dcnode-id="479" instrument_node=""> plane</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="476" instrument_node="">This diagram illustrates very clearly the relative scarcity of green and violet pigments; very often, commercial watercolors in those hues colors must be mixed from green and yellow, or red and blue, pigments.</span><a data-dcnode-id="475" name="complementaryhues"></a></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="463"><b data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Complementary Hue Relationships</span></b><span data-dcnode-id="470" instrument_node="">. By adjusting the distance </span><i data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">between</span></i><span data-dcnode-id="467" instrument_node=""> hues around the circumference, the hue circle also determines which hues will be </span><i data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">directly opposite,</span></i><span data-dcnode-id="464" instrument_node=""> connected by a straight line that passes through the "white" center of the wheel. This again was explicitly noted by Newton:</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="455"><i data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">If only two of the primary Colours which in the circle are opposite to one another be mixed in an equal proportion, the</span></i><span data-dcnode-id="459" instrument_node=""> [mixture] </span><i data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">shall fall upon the center." Opticks,</span></i><span data-dcnode-id="456" instrument_node=""> Book I, Proposition VI, Problem ii.</span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="453" instrument_node="">Newton observed that mixtures made with his seven "primary" colors did not create a pure white, but </span><i data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">"some faint anonymous Colour,"</span></i><span data-dcnode-id="450" instrument_node=""> which was because none of his hue wedges are directly opposite each other: all are skewed slightly to one side of "white". However in 1853 the German scholar </span><a class="text" data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color2.html%23grassmann"><span data-dcnode-id="449" instrument_node="">Hermann Grassmann</span></a><span data-dcnode-id="447" instrument_node=""> proved, and the vision scientist </span><a class="text" data-dcnode-id="445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23helmholtz"><span data-dcnode-id="446" instrument_node="">Hermann von Helmholtz</span></a><span data-dcnode-id="444" instrument_node=""> quickly demonstrated, that the appropriate pair of </span><i data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">individual</span></i><span data-dcnode-id="441" instrument_node=""> light wavelengths must and can mix an achromatic white. These wavelengths define </span><a class="text" data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color16.html%23complement"><span data-dcnode-id="440" instrument_node="">visual complementary hues</span></a><span data-dcnode-id="438" instrument_node="">.</span></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="435" instrument_node="">When artists replaced Newton's light "primaries" with primary colors of paint, they also redefined complementary hues to be those hues of paints that, when mixed in the appropriate proportions, create an achromatic gray or black. These paints define </span><a class="text" data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23compprobs"><span data-dcnode-id="434" instrument_node="">mixing complementary hues</span></a><span data-dcnode-id="432" instrument_node="">.</span><a data-dcnode-id="431" name="visvsmix"></a></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">The difference between radiant and material colors intrudes again in complementary color mixtures: the pairing of complementary hues defined by light mixtures (which produces white light) is significantly different from the complementary pairs defined by paint mixtures (which produce black paint), as summarized in the diagram (below) of the mixing complementary relationships as they appear on a visual chromaticity plane.</span></p><span data-dcnode-id="426" instrument_node="">
</span><p class="imgC" data-dcnode-id="424"><img data-dcnode-id="425" height="380" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/mixround.gif&amp;raw" width="380"></p><span data-dcnode-id="423" instrument_node="">
</span><p class="CC" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">mixing vs. visual complements</span></p><span data-dcnode-id="420" instrument_node="">
</span><p class="subCC" data-dcnode-id="410"><span data-dcnode-id="419" instrument_node="">pigment locations on the CIECAM </span><b data-dcnode-id="412"><span data-dcnode-id="418" instrument_node="">a</span><sub data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">C</span></sub><span data-dcnode-id="415" instrument_node="">b</span><sub data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">C</span></sub></b><span data-dcnode-id="411" instrument_node=""> plane</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="408" instrument_node="">The diagram shows that the visual colors of paints from </span><i data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">blue&nbsp;violet</span></i><span data-dcnode-id="405" instrument_node=""> (ultramarine violet, </span><a class="text" data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterv.html%23PV15"><span data-dcnode-id="404" instrument_node="">PV15</span></a><span data-dcnode-id="402" instrument_node="">) to </span><i data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">green</span></i><span data-dcnode-id="399" instrument_node=""> (phthalo green YS, </span><a class="text" data-dcnode-id="397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterg.html%23PG36"><span data-dcnode-id="398" instrument_node="">PG36</span></a><span data-dcnode-id="396" instrument_node="">) create a span of visual complements that extends from </span><i data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">yellow</span></i><span data-dcnode-id="393" instrument_node=""> to </span><i data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">red violet.</span></i><span data-dcnode-id="390" instrument_node=""> But the mixing complements for these paints cover a much smaller hue span, roughly from </span><i data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">yellow orange</span></i><span data-dcnode-id="387" instrument_node=""> (yellow ochre, </span><a class="text" data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/watere.html%23PY42"><span data-dcnode-id="386" instrument_node="">PY42</span></a><span data-dcnode-id="384" instrument_node="">) to </span><i data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">violet red</span></i><span data-dcnode-id="381" instrument_node=""> (quinacridone rose, </span><a class="text" data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterc.html%23PV19R"><span data-dcnode-id="380" instrument_node="">PV19</span></a><span data-dcnode-id="378" instrument_node="">).</span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="344"><span data-dcnode-id="375" instrument_node="">These differences occur because </span><i data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">violet blue</span></i><span data-dcnode-id="372" instrument_node=""> paints, such as ultramarine blue (</span><a class="text" data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterb.html%23PB29"><span data-dcnode-id="371" instrument_node="">PB29</span></a><span data-dcnode-id="369" instrument_node="">), contain </span><a class="text" data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/RC/rcPB29.jpg"><span data-dcnode-id="368" instrument_node="">more blue+green than red</span></a><span data-dcnode-id="366" instrument_node=""> reflectance, so the visual complement </span><i data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">yellow</span></i><span data-dcnode-id="363" instrument_node=""> must be shifted toward red, to contain </span><a class="text" data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/RC/rcPY43.jpg"><span data-dcnode-id="362" instrument_node="">more red than blue+green</span></a><span data-dcnode-id="360" instrument_node=""> reflectance and create a balance in subtractive mixture. On the other hand </span><i data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">green</span></i><span data-dcnode-id="357" instrument_node=""> paints, such as phthalo green YS (</span><a class="text" data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterg.html%23PG36"><span data-dcnode-id="356" instrument_node="">PG36</span></a><span data-dcnode-id="354" instrument_node="">) contain </span><a class="text" data-dcnode-id="352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/RC/rcPG7.jpg"><span data-dcnode-id="353" instrument_node="">more blue+green than red</span></a><span data-dcnode-id="351" instrument_node=""> reflectance, so the visual complement </span><i data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">red violet</span></i><span data-dcnode-id="348" instrument_node=""> must be shifted toward red, to contain </span><a class="text" data-dcnode-id="346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/RC/rcPV19r.jpg"><span data-dcnode-id="347" instrument_node="">more red than blue+green</span></a><span data-dcnode-id="345" instrument_node=""> reflectance to compensate.</span></p><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="342" instrument_node="">Mixing complements roughly match the visual complements for hues such as </span><i data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">yellow green/violet</span></i><span data-dcnode-id="339" instrument_node=""> and </span><i data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">red orange/green blue,</span></i><span data-dcnode-id="336" instrument_node=""> but we clearly must choose one or the other system, especially for color design work.</span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="333" instrument_node="">Many painters, adhering to 18th century color prejudice, prefer a hue circle or color wheel defined by paint mixtures. But these "mixing color wheels" are plagued with practical shortcomings, summarized on </span><a class="text" data-dcnode-id="331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color16.html%23mixprobs"><span data-dcnode-id="332" instrument_node="">this page</span></a><span data-dcnode-id="330" instrument_node="">. As a point of reference, the diagram (below) shows a typical mixing color wheel, based on my exhaustive table of </span><a class="text" data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/mixtable.html"><span data-dcnode-id="329" instrument_node="">watercolor mixing complements</span></a><span data-dcnode-id="327" instrument_node="">, to illustrate some of the problems.</span><a data-dcnode-id="326" name="mixcomps"></a></p><span data-dcnode-id="324" instrument_node="">
</span><p class="imgC" data-dcnode-id="322"><img data-dcnode-id="323" height="377" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/ctcirc3.gif&amp;raw" width="377"></p><span data-dcnode-id="321" instrument_node="">
</span><p class="CC" data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">a mixing complement hue circle</span></p><span data-dcnode-id="318" instrument_node="">
</span><p class="subCC" data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">saturated paints on the circumference, less saturated paints on the inner circle</span></p><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">
</span></p><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">The main problems with subtractive mixture hue circles are:</span></p><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="310" instrument_node="">•&nbsp;The core problem is the </span><a class="text" data-dcnode-id="308" href="#compmatch"><span data-dcnode-id="309" instrument_node="">wide color difference</span></a><span data-dcnode-id="307" instrument_node=""> between mixing complements: this means that paints with the same mixing complement relations but very different visual hues must be placed in the same hue location, or that paints with the same visual hue but different mixing complement relations must be spaced apart.</span></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="304" instrument_node="">•&nbsp;As indicated in the diagram (above), subtractive hue circles must allot a quarter of the hue circle to hues from </span><i data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">red</span></i><span data-dcnode-id="301" instrument_node=""> to </span><i data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">yellow orange</span></i><span data-dcnode-id="298" instrument_node=""> in order to represent the complement relations with the much larger span of hues from </span><i data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">blue violet</span></i><span data-dcnode-id="295" instrument_node=""> to </span><i data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">blue green</span></i></p><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="265"><span data-dcnode-id="290" instrument_node="">•&nbsp;Subtractive hue circles force an erratic spacing of hues (very large gaps between </span><i data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">yellow green</span></i><span data-dcnode-id="287" instrument_node=""> and </span><i data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">green,</span></i><span data-dcnode-id="284" instrument_node=""> or between </span><i data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">blue</span></i><span data-dcnode-id="281" instrument_node=""> to </span><i data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">green blue,</span></i><span data-dcnode-id="278" instrument_node=""> and a very compressed spacing from </span><i data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">yellow orange</span></i><span data-dcnode-id="275" instrument_node=""> to </span><i data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">green yellow</span></i><span data-dcnode-id="272" instrument_node=""> or from </span><i data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">violet blue</span></i><span data-dcnode-id="269" instrument_node=""> to </span><i data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">blue</span></i><span data-dcnode-id="266" instrument_node="">)</span></p><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">•&nbsp;The spacing of hues that results does not represent the perceptual difference between them (very similar hues are spread far apart, very different hues are pressed close together)</span></p><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="260" instrument_node="">•&nbsp;To reconcile these discrepancies, many arbitrary decisions have to be made about the spacing between hues: different painters, using the same </span><a class="text" data-dcnode-id="258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/mixtable.html"><span data-dcnode-id="259" instrument_node="">mixing complement information</span></a><span data-dcnode-id="257" instrument_node="">, will usually produce different hue spacings around the hue circle.</span><a data-dcnode-id="256" name="chromageometry"></a></p><span data-dcnode-id="254" instrument_node="">
</span><p data-dcnode-id="247"><span class="rubric" data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Chroma Relationships</span></span><span data-dcnode-id="251" instrument_node="">. Chroma has been the most neglected colormaking attribute in traditional color theory. In part this is because the study of color relationships has focused on </span><a class="text" data-dcnode-id="249" href="#cterror12"><span data-dcnode-id="250" instrument_node="">saturated hues</span></a><span data-dcnode-id="248" instrument_node=""> and "pure" primary colors.</span></p><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="243"><span data-dcnode-id="245" instrument_node="">However, another reason chroma has been neglected is that it is a hybrid color attribute that combines aspects of lightness/brightness and hue; separately manipulating lightness and hue limits chroma variations in important ways. To understand these issues it is necessary to view chroma as influenced by three separate factors — relative luminance, changes in lightness across all hues, and changes in lightness within a single hue.</span><a data-dcnode-id="244" name="chromalimits"></a></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="235"><b data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Relative Luminance &amp; Chroma Boundaries</span></b><span data-dcnode-id="239" instrument_node="">. Chroma or saturation inhabits three different realms of color experience, articulated by the </span><a class="text" data-dcnode-id="237" href="#lightnessgeometry"><span data-dcnode-id="238" instrument_node="">luminance contrast</span></a><span data-dcnode-id="236" instrument_node=""> between lights and surfaces, and between ideal and real physical surfaces (diagram, below).</span></p><span data-dcnode-id="234" instrument_node="">
</span><p class="imgC" data-dcnode-id="232"><img data-dcnode-id="233" height="357" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/cbounds.gif&amp;raw" width="380"></p><span data-dcnode-id="231" instrument_node="">
</span><p class="CC" data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">three fundamental chroma boundaries</span></p><span data-dcnode-id="228" instrument_node="">
</span><p class="subCC" data-dcnode-id="218"><span data-dcnode-id="227" instrument_node="">on the CIECAM </span><b data-dcnode-id="220"><span data-dcnode-id="226" instrument_node="">a</span><sub data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">C</span></sub><span data-dcnode-id="223" instrument_node="">b</span><sub data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">C</span></sub></b><span data-dcnode-id="219" instrument_node=""> plane</span></p><span data-dcnode-id="217" instrument_node="">
</span><p data-dcnode-id="209"><span data-dcnode-id="216" instrument_node="">Individual spectral wavelengths, presented at adequate luminance in a dark surround, produce the most saturated visual color sensations possible in a radiant color. They illuminate the </span><i data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">physiological limits</span></i><span data-dcnode-id="213" instrument_node=""> of chroma sensation: the structure of our visual system makes it impossible to perceive a greater or more intense hue purity. We see hues of this intensity, for example, in prismatic colors, lasers, the setting sun, transmissive colors in gems or stained glasses, or saturated surface colors viewed under high </span><a class="text" data-dcnode-id="211" href="#illuminancecontrast"><span data-dcnode-id="212" instrument_node="">illuminance contrast</span></a><span data-dcnode-id="210" instrument_node="">.</span></p><span data-dcnode-id="208" instrument_node="">
</span><p data-dcnode-id="197"><span data-dcnode-id="207" instrument_node="">These color stimuli all appear with the sensation of </span><i data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">brightness,</span></i><span data-dcnode-id="204" instrument_node=""> and part of their hue purity arises because they do not have the </span><i data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">blackness</span></i><span data-dcnode-id="201" instrument_node=""> inherent in surface colors viewed within a single light environment. The theoretical boundary between lightness and brightness is defined by </span><a class="text" data-dcnode-id="199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color3.html%23optimalstimuli"><span data-dcnode-id="200" instrument_node="">optimal colors</span></a><span data-dcnode-id="198" instrument_node="">, which have the highest hue purity possible for a nonfluorescent surface color of a given hue and lightness. We commonly see isolated visual colors comparable to optimal colors in saturated surfaces under moderate illuminance contrast.</span></p><span data-dcnode-id="196" instrument_node="">
</span><p data-dcnode-id="191"><span data-dcnode-id="195" instrument_node="">At still lower levels of chroma are reflective material colors, including all artists' pigments, that present some blackness or grayness under normal viewing conditions. I have defined the color attribute </span><a class="text" data-dcnode-id="193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color3.html%23huepurity"><span data-dcnode-id="194" instrument_node="">hue purity</span></a><span data-dcnode-id="192" instrument_node=""> as the chroma of a material color divided by the chroma of the optimal color of matching hue and lightness, or (in the diagram, above):</span></p><span data-dcnode-id="190" instrument_node="">
</span><p class="CC" data-dcnode-id="183"><span data-dcnode-id="189" instrument_node="">HP = C</span><sub data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">MC</span></sub><span data-dcnode-id="186" instrument_node=""> / C</span><sub data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">OC</span></sub></p><span data-dcnode-id="182" instrument_node="">
</span><p data-dcnode-id="177"><span data-dcnode-id="181" instrument_node="">I have </span><a class="text" data-dcnode-id="179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/huepurity.html"><span data-dcnode-id="180" instrument_node="">tabulated here</span></a><span data-dcnode-id="178" instrument_node=""> the hue purity values of 170 watercolor pigments; in general, hue purity correlates very well with CIECAM chroma.</span></p><span data-dcnode-id="176" instrument_node="">
</span><p data-dcnode-id="173"><span data-dcnode-id="175" instrument_node="">The point here is that visual chroma depends on how a color is illuminated and how that illumination is interpreted. In general, the range of chroma is greater for lights than for material surfaces, and our visual judgments of chroma depend importantly on how we interpret surface illumination. To the extent that we can "see" that the brightness of a color is due to the illuminance it receives, we discount that brightness as an attribute of the material color.</span><a data-dcnode-id="174" name="chromabyhue"></a></p><span data-dcnode-id="172" instrument_node="">
</span><p data-dcnode-id="162"><b data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Chroma &amp; Lightness Across Hues</span></b><span data-dcnode-id="169" instrument_node="">. The lightness or value at which a hue reaches its maximum chroma is different around the hue circle. Hues near </span><i data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">yellow</span></i><span data-dcnode-id="166" instrument_node=""> reach their peak chroma only when they are at a very high lightness, and hues near </span><i data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">blue violet</span></i><span data-dcnode-id="163" instrument_node=""> reach their peak chroma only when they are very dark.</span></p><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="147"><span data-dcnode-id="160" instrument_node="">This relationship roughly matches the relative luminance of the individual hues as they appear in the spectrum, for example as their contribution to a </span><a class="text" data-dcnode-id="158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color1.html%23newpsf"><span data-dcnode-id="159" instrument_node="">photopic sensitivity function</span></a><span data-dcnode-id="157" instrument_node="">. The major exceptions are in </span><i data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">violet</span></i><span data-dcnode-id="154" instrument_node=""> to </span><i data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">violet red</span></i><span data-dcnode-id="151" instrument_node=""> hues, which are spectral mixtures and are brighter than spectral </span><i data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">blue violet.</span></i><span data-dcnode-id="148" instrument_node="">
</span></p><span data-dcnode-id="146" instrument_node="">
</span><p data-dcnode-id="135"><span data-dcnode-id="145" instrument_node="">These variations are very nicely distributed along the </span><b data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">a+/a–</span></b><span data-dcnode-id="142" instrument_node=""> dimension, as displayed in the </span><a class="text" data-dcnode-id="140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/vwheel.html"><span data-dcnode-id="141" instrument_node="">artist's value wheel</span></a><span data-dcnode-id="139" instrument_node=""> for most common watercolor pigments, and as measured in the CIECAM color space using a 70&nbsp;nm optimal circuit, as explained in the </span><a class="text" data-dcnode-id="137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color19.html%2370circuit"><span data-dcnode-id="138" instrument_node="">synthesis of surface colors</span></a><span data-dcnode-id="136" instrument_node=""> (diagram, below).</span></p><span data-dcnode-id="134" instrument_node="">
</span><p class="imgC" data-dcnode-id="132"><img data-dcnode-id="133" height="380" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/valwhl.gif&amp;raw" width="380"></p><span data-dcnode-id="131" instrument_node="">
</span><p class="CC" data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">lightness of peak chroma in 18 hue categories</span></p><span data-dcnode-id="128" instrument_node="">
</span><p class="subCC" data-dcnode-id="120"><span data-dcnode-id="127" instrument_node="">the lightness at which different hues reach their peak chroma in optimal colors, distributed by red/green (</span><b data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">a+/a–</span></b><span data-dcnode-id="124" instrument_node="">) content and mapped into a watercolor pigment gamut (</span><b data-dcnode-id="122"><span data-dcnode-id="123" instrument_node="">L*</span></b><span data-dcnode-id="121" instrument_node=""> = 95)</span></p><span data-dcnode-id="119" instrument_node="">
</span><p data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">The major implication of these relationships is in the mapping of hues into a value design. Dark valued areas of an image simply cannot be rendered as a pure saturated green or orange; the green or orange can be saturated, but at darker values they will appear dull or (in orange) as brown. The clearest mapping of hue to value appears in medieval and certain modernist painting styles (late Van Gogh, Matisse, Derain, Ellsworth Kelly, etc.), where pure pigment colors are used much more than mixed colors or colors darkened with black.</span></p><span data-dcnode-id="116" instrument_node="">
</span><p data-dcnode-id="108"><span data-dcnode-id="115" instrument_node="">This relationship between peak chroma and lightness is the reason traditional color theory claims that </span><a class="text" data-dcnode-id="113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color11.html%23warmeffects"><span data-dcnode-id="114" instrument_node="">"warm" hues advance</span></a><span data-dcnode-id="112" instrument_node=""> and "cool" hues recede. In fact this visual effect has almost nothing to do with hue. It occurs because red, orange and yellow pigments have a </span><a class="text" data-dcnode-id="110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/cwheel06.html"><span data-dcnode-id="111" instrument_node="">higher saturation</span></a><span data-dcnode-id="109" instrument_node=""> than all other pigments (with the exception of some convenience yellow greens), and because at their peak saturation they are much lighter valued than nearly all green, blue and violet pigments.</span></p><span data-dcnode-id="107" instrument_node="">
</span><p class="imgC" data-dcnode-id="105"><img data-dcnode-id="106" height="257" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/warmeff.gif&amp;raw" width="260"></p><span data-dcnode-id="104" instrument_node="">
</span><p class="CC" data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">warm color effects caused by lightness and/or chroma</span></p><span data-dcnode-id="101" instrument_node="">
</span><p class="subCC" data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">cool colors can easily appear "advancing" or "arousing" if they are lighter and/or more intense than the warm colors around them; a white disk appears "closer" than a black disk</span></p><span data-dcnode-id="98" instrument_node="">
</span><p data-dcnode-id="95"><span data-dcnode-id="97" instrument_node="">The diagram (above) shows that we can easily make "cool" greens and blues appear to advance, or to be more "arousing", if we manipulate them to have a higher chroma or lightness than the "warm" hues they are paired with. The fact that a white disk appears to "advance" in relation to a black disk shows that the effect is independent of chromaticity.</span><a data-dcnode-id="96" name="chromainhue"></a></p><span data-dcnode-id="94" instrument_node="">
</span><p data-dcnode-id="90"><b data-dcnode-id="92"><span data-dcnode-id="93" instrument_node="">Chroma &amp; Lightness Within Hues</span></b><span data-dcnode-id="91" instrument_node="">. The modern geometrical color framework implies that we can change one colormaking attribute without changing the other two. This is true only in one sense: we can always reduce the chroma of any color toward gray without changing its hue or its lightness.</span></p><span data-dcnode-id="89" instrument_node="">
</span><p data-dcnode-id="87"><span data-dcnode-id="88" instrument_node="">In practice, the changes possible in one colormaking attribute are limited by the value of the other two attributes. Thus, it is not possible to make a pastel blue paint more chromatic without also making it darker, or to make a saturated yellow darker without reducing its chroma. The diagram (below) contrasts these limitations between two visual complementary hues of yellow and violet blue, as displayed in color samples from the Munsell Color System.</span></p><span data-dcnode-id="86" instrument_node="">
</span><p class="imgC" data-dcnode-id="84"><img data-dcnode-id="85" height="307" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/munsell2.gif&amp;raw" width="360"></p><span data-dcnode-id="83" instrument_node="">
</span><p class="CC" data-dcnode-id="81"><span data-dcnode-id="82" instrument_node="">chroma and lightness boundaries in yellow &amp; blue paints</span></p><span data-dcnode-id="80" instrument_node="">
</span><p class="subCC" data-dcnode-id="76"><span data-dcnode-id="79" instrument_node="">as defined in the </span><a class="index1" data-dcnode-id="77" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color7.html%23MUNSELL"><span data-dcnode-id="78" instrument_node="">Munsell Color System</span></a></p></td><td colspan="2" data-dcnode-id="73"></td></tr><tr data-dcnode-id="11"><td colspan="2" data-dcnode-id="68"></td><td align="left" data-dcnode-id="26" valign="top"><p data-dcnode-id="65"><span data-dcnode-id="66" instrument_node="">Similar diagrams for other hue slices would show the same bulging contour: hues taper to achromatic at extreme white and black lightness, and bulge to their maximum chroma at some middle lightness. The previous diagram showed where that bulge is located on a lightness scale, but the exact shape of the bulge, and the lightness of the peak chroma, vary widely across hues (diagram, right).</span></p><span data-dcnode-id="64" instrument_node="">
</span><p data-dcnode-id="58"><span data-dcnode-id="63" instrument_node="">Obviously, increasing the lightness variation in an image usually forces some hues to have low chroma, and using all hues at high chroma limits the range of lightness values that each hue can represent: light valued figures must be yellow, orange or yellow green; dark valued figures must be blue or violet. The French painter André Derain turned this second limitation into a </span><a class="text" data-dcnode-id="61" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Andr%25C5%25BD_Derain"><span data-dcnode-id="62" instrument_node="">painting style</span></a><span data-dcnode-id="60" instrument_node="">.</span><a data-dcnode-id="59" name="nuancespace"></a></p><span data-dcnode-id="57" instrument_node="">
</span><p data-dcnode-id="49"><span data-dcnode-id="56" instrument_node="">The lightness/chroma interaction comes to the fore when the painter or photographer tackles the problem of </span><a class="text" data-dcnode-id="54" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color11.html%23paintzone"><span data-dcnode-id="55" instrument_node="">gamut mapping</span></a><span data-dcnode-id="53" instrument_node="">. It also has implications for color design. A widely recommended technique for producing color harmony is to render all hues at a very similar lightness and chroma; this is </span><a class="text" data-dcnode-id="51" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color17.html%23nuance"><span data-dcnode-id="52" instrument_node="">nuance matching</span></a><span data-dcnode-id="50" instrument_node="">. But it is not possible to match a light valued, saturated yellow with a light valued, saturated blue. So any combination of hues can be selected to have the same nuance (the same chroma and lightness) only within a spindle shaped core of the color space (diagram, below).</span></p><span data-dcnode-id="48" instrument_node="">
</span><p class="imgC" data-dcnode-id="46"><img data-dcnode-id="47" height="393" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/nusolid.gif&amp;raw" width="380"></p><span data-dcnode-id="45" instrument_node="">
</span><p class="CC" data-dcnode-id="43"><span data-dcnode-id="44" instrument_node="">the nuance space</span></p><span data-dcnode-id="42" instrument_node="">
</span><p class="subCC" data-dcnode-id="40"><span data-dcnode-id="41" instrument_node="">the range of lightness and chroma values common to all optimal color stimuli, expressed in units of Munsell (left) and CIELAB (right) chroma, on a vertical CIE L* scale (grayscale)</span></p><span data-dcnode-id="39" instrument_node="">
</span><p data-dcnode-id="37"><span data-dcnode-id="38" instrument_node="">This diagram was developed using optimal colors; the nuance matching possible with pigments will necessarily be smaller (compare diagrams, above right), though its general form will be the same: the widest variety of nuance matches are possible in the middle lightness values, and in light or dark valued colors only at a very reduced (dull) chroma.</span></p><span data-dcnode-id="36" instrument_node="">
</span><p class="imgC" data-dcnode-id="34"><img border="0" data-dcnode-id="35" height="14" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/nabup.gif&amp;raw" width="10"></p><span data-dcnode-id="33" instrument_node="">
</span><p class="imgC" data-dcnode-id="30"><a class="text" data-dcnode-id="31" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/wcolor.html"><img border="0" data-dcnode-id="32" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/whorlwht.gif&amp;raw" width="48"></a></p><span data-dcnode-id="29" instrument_node="">
