</span><p data-dcnode-id="2113"><b data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Visual Color vs. Material Color</span></b><span data-dcnode-id="2123" instrument_node="">. To begin, let's clarify the distinction between </span><i data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">material</span></i><span data-dcnode-id="2120" instrument_node=""> color, the physical pigment or dye, the </span><i data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">radiant</span></i><span data-dcnode-id="2117" instrument_node=""> color the light wavelengths that a paint, dye or ink reflects to our view, and </span><i data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">visual</span></i><span data-dcnode-id="2114" instrument_node=""> color, the color of paint, dye or ink we perceive in our experience.</span></p><span data-dcnode-id="2112" instrument_node="">
</span><p data-dcnode-id="2099"><span data-dcnode-id="2111" instrument_node="">The </span><i data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">material color </span></i><span data-dcnode-id="2108" instrument_node=""> — the light absorbing and light reflecting attributes of a pigment or dye — are exactly described by its </span><a class="text" data-dcnode-id="2106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color3.html%23reflectance"><span data-dcnode-id="2107" instrument_node="">spectral reflectance curve</span></a><span data-dcnode-id="2105" instrument_node=""> or radiant color. For that reason the </span><a class="text" data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterfs.html"><span data-dcnode-id="2104" instrument_node="">guide to watercolor pigments</span></a><span data-dcnode-id="2102" instrument_node=""> provides the reflectance curve of all major pigments, linked from the spectrum icon </span><img data-dcnode-id="2101" height="10" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/RC/rcicon.gif&amp;raw" width="14"><span data-dcnode-id="2100" instrument_node="">.</span></p><span data-dcnode-id="2098" instrument_node="">
</span><p data-dcnode-id="2093"><span data-dcnode-id="2097" instrument_node="">If we are only interested in the appearance of a pigment or dye in isolation, then the radiant color in turn defines the photoreceptor responses under normal viewing conditions, or the material's </span><b data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">visual color</span></b><span data-dcnode-id="2094" instrument_node="">.</span></p><span data-dcnode-id="2092" instrument_node="">
</span><p data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">So long as we only consider the radiant color only, or the mixture of separate radiant colors that stimulate the eye at the same time (for example, when two beams of filtered light are overlapped on a white surface, or two pigment or ink colors are visually mixed with a color top), then we are in the domain of additive color theory. Predicting these color mixtures using the separate reflectance curves is straightforward and, as perceptual prediction goes, remarkably precise.</span></p><span data-dcnode-id="2089" instrument_node="">
</span><p data-dcnode-id="2081"><span data-dcnode-id="2088" instrument_node="">But when two or more material colors are </span><i data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">physically mixed</span></i><span data-dcnode-id="2085" instrument_node=""> (for example, when a single beam of light is passed through two separate filters, or two pigments are mixed in the same vehicle, or two inks are overprinted on the same substrate), </span><i data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">all</span></i><span data-dcnode-id="2082" instrument_node=""> the physical qualities of the substances interact, which can cause their radiant colors to combine in unexpected ways and produce a very unexpected result in the visual color.</span></p><span data-dcnode-id="2080" instrument_node="">
</span><p data-dcnode-id="2077"><span data-dcnode-id="2079" instrument_node="">The most important of these physical mixture issues are:</span><a data-dcnode-id="2078" name="ctprin38"></a></p><span data-dcnode-id="2076" instrument_node="">
</span><p data-dcnode-id="2073"><b data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">38. Visual color cannot identify a unique material color (physical substance) or radiant color (reflectance or transmittance curve).</span></b></p><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2065"><span data-dcnode-id="2071" instrument_node="">The same green visual color can be produced by many different material colors and/or radiant colors, a perceptual ambiguity known as </span><a class="text" data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color6.html%23metamerism"><span data-dcnode-id="2070" instrument_node="">material metamerism</span></a><span data-dcnode-id="2068" instrument_node="">. Because material color mixtures are highly specific in their effects on radiant color, different material colors can appear to be the same "green color," but will produce different blue colors when each is mixed with the same purple paint. Unfortunately, the paint color appearance (visual color), not the reflectance curve (radiant color), is all that a painter conveniently has to work with.</span><br data-dcnode-id="2067"><a data-dcnode-id="2066" name="ctprin39"></a></p><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2063"></p></td><td colspan="2" data-dcnode-id="2060"></td></tr><tr data-dcnode-id="1987"><td colspan="2" data-dcnode-id="2055"></td><td align="left" data-dcnode-id="2002" valign="top"><p data-dcnode-id="2051"><b data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">39. The radiant color (reflectance or transmittance curve) changes with the physical state of the material color.</span></b></p><span data-dcnode-id="2050" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2049" instrument_node="">A pigment such as quinacridone violet (PV19) does not have fixed radiant color attributes. The reflectance curve, and hence the apparent color under standard viewing conditions, changes with the physical state of the pigment — the pigment may be dry or wet, it may be suspended in water or oil, it may be diluted or concentrated, it may be displayed as a thin or thick layer (diagram, right). In most colorants, each of these physical changes will alter the radiant and the colorant's subtractive mixture behavior.</span><a data-dcnode-id="2048" name="ctprin40"></a></p><span data-dcnode-id="2046" instrument_node="">
</span><p data-dcnode-id="2043"><b data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">40. The separate radiant colors of pigments cannot specify the visual color of their subtractive mixture.</span></b></p><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2039"><span data-dcnode-id="2041" instrument_node="">There are many more physical attributes to a colorant than its reflectance properties. The same reflectance curve can be produced by substances that differ greatly in particle size, refractive index, transparency (hiding power) and tinting strength, and these all can affect how the colorants will appear when dispersed in a vehicle, or which colorant will dominate when used in a mixture with other dyes or pigments.</span><a data-dcnode-id="2040" name="ctprin41"></a></p><span data-dcnode-id="2038" instrument_node="">
</span><p data-dcnode-id="2035"><b data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">41. Subtractive mixing behaves differently in different types of material mixtures.</span></b></p><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2026"><span data-dcnode-id="2033" instrument_node="">The identical pigments or dyes will create different colored mixtures when mixed in different media. Subtractive mixtures of reflecting paints or dyes obey </span><a class="text" data-dcnode-id="2031" href="#multiplymixture"><span data-dcnode-id="2032" instrument_node="">different mixing rules</span></a><span data-dcnode-id="2030" instrument_node=""> than subtractive mixtures of transmitting filters; paints applied to highly absorbent white paper appear duller and whiter than paints applied to heavily sized white paper; pigments applied as watercolor (which does not form </span><a class="text" data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/tech16.html%23papersurface"><span data-dcnode-id="2029" instrument_node="">a paint layer</span></a><span data-dcnode-id="2027" instrument_node="">) appear different from paints applied as oils or acrylics (which do form a paint layer).</span></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">Each of these problems, taken separately, can create formidable problems in describing or "predicting" material color mixtures. In combination, they overcome any generalizations based on visual or conceptual colors.</span></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2013"><span data-dcnode-id="2021" instrument_node="">
Even if we do know all the important physical attributes of the colorants we mix, the prediction of their subtractive mixture from their separate reflectance curves is mathematically complex. As a color chemist in the automotive industry explained to me, </span><i data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">you mix the two pigments and look at what you get.</span></i><span data-dcnode-id="2018" instrument_node=""> Or as I like to say, subtractive color mixing concepts are only useful as a </span><a class="text" data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color14.html%23mixmethod"><span data-dcnode-id="2017" instrument_node="">compass to color improvisation</span></a><span data-dcnode-id="2015" instrument_node="">.</span><a data-dcnode-id="2014" name="filtermix"></a></p><span data-dcnode-id="2012" instrument_node="">
</span><p data-dcnode-id="2007"><b data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Visual Color Can't Predict Material Mixture</span></b><span data-dcnode-id="2009" instrument_node="">. To clarify the extent of these issues, for the moment let's limit the discussion just to material metamerism. This dictates the modern color theory rule that</span><a data-dcnode-id="2008" name="ctprin42"></a></p><span data-dcnode-id="2006" instrument_node="">
</span><p data-dcnode-id="2003"><b data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">42. The visual color of a paint does not predict the visual color of mixtures made with the paint.</span></b></p></td><td colspan="2" data-dcnode-id="1989" valign="top"><span data-dcnode-id="2000" instrument_node="">
</span><p class="imgS" data-dcnode-id="1998"><img data-dcnode-id="1999" height="234" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/matcol.gif&amp;raw" width="195"></p><span data-dcnode-id="1997" instrument_node="">
</span><p class="SC" data-dcnode-id="1993"><span data-dcnode-id="1996" instrument_node="">reflectance curve changes</span><br data-dcnode-id="1995"><span data-dcnode-id="1994" instrument_node="">with physical state</span></p><span data-dcnode-id="1992" instrument_node="">
</span><p class="subSC" data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">the masstone reflectance curve of quinacridone violet (PV19) changes shape, not just overall level, when it is diluted into a tint</span></p></td></tr><tr data-dcnode-id="1904"><td colspan="2" data-dcnode-id="1984"></td><td align="left" data-dcnode-id="1908" valign="top"><p data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">There is a conceptual and a factual way to demonstrate the depth of the metameric problem. Let's start with a conceptual illustration.</span></p><span data-dcnode-id="1980" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Imagine two idealized photographic gel (transparent) filters, designed to pass either 100% or 0% of the light at each wavelength. There are no limits on the combination of specific wavelengths we are able to filter, except that in every case one filter must make a "white" beam of light appear yellow, and the other must make a "white" light appear orange.</span></p><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">We place the two filters in front of a single beam of "white" light. Then the apparent color of the transmitted light is the additive (retinal) mixture of all the wavelengths passed by the subtractive (material) mixture of the separate spectral transmittance profiles.</span></p><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1970"><span data-dcnode-id="1973" instrument_node="">What color results from this mixture of a visual yellow and a visual orange? As the examples below show, the answer is — </span><i data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">it is impossible to say!</span></i></p><span data-dcnode-id="1969" instrument_node="">
</span><p class="imgC" data-dcnode-id="1967"><img data-dcnode-id="1968" height="318" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/filters.gif&amp;raw" width="370"></p><span data-dcnode-id="1966" instrument_node="">
</span><p class="CC" data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">subtractive mixtures of different yellow and orange filters</span></p><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">In the five examples, each pair of ideal filters would appear yellow and orange — they would all have the same hue, though they would differ in lightness or chroma. Yet their mixture would produce very different results depending on the specific overlap in their transmittance profiles. Yellow and orange can combine to make yellow, orange, red or black ... yellow and orange filters could even mix to make green!</span></p><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1954"><span data-dcnode-id="1959" instrument_node="">These conceptual examples demonstrate that there is no logical or necessary connection between the </span><i data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">visual color</span></i><span data-dcnode-id="1956" instrument_node=""> of two substances and the color of their subtractive mixture. There can never be universal or invariable color mixing rules in subtractive color mixing — they simply don't exist.</span><a data-dcnode-id="1955" name="paintuncertainty"></a></p><span data-dcnode-id="1953" instrument_node="">
</span><p data-dcnode-id="1949"><b data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">Material Color Mixture in Paints</span></b><span data-dcnode-id="1950" instrument_node="">. But let's get practical. The extreme, idealized filters I've described are physically implausible. And we certainly can't mix a red color from two gray paints! In fact, very useful regularities or patterns often appear in the way colored substances mix.</span></p><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1947" instrument_node="">Those patterns occur because we live in a real world of atomic substances, and the </span><a class="text" data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color10.html%23colorcauses"><span data-dcnode-id="1946" instrument_node="">atomic causes of color</span></a><span data-dcnode-id="1944" instrument_node=""> follow the organizing patterns of chemistry and physics. These tend to produce transmission or reflectance curves in most substances that follow more regular patterns, such as the </span><a class="text" data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color12.html%23cliff"><span data-dcnode-id="1943" instrument_node="">"warm cliff"</span></a><span data-dcnode-id="1941" instrument_node=""> profile typical of saturated red, orange and yellow paints and filters. In addition, painters work with a very limited range of colored substances — chemically pure and complex colorants, the pigments in their paints — and modern colorants create a fairly predictable domain of reflectance profiles.</span></p><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1938" instrument_node="">So we have to turn to </span><i data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">paint</span></i><span data-dcnode-id="1935" instrument_node=""> color mixtures to evaluate the practical impact of the metameric problem </span><i data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">for painters</span></i><span data-dcnode-id="1932" instrument_node=""> (or anyone else mixing paints, dyes or inks).</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1929" instrument_node="">To do that, let's see what happens with the most explicit paint mixing test possible (and the one most beloved in traditional color theory): making a </span><i data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">pure gray mixture</span></i><span data-dcnode-id="1926" instrument_node=""> from two </span><a class="text" data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html%23compprobs"><span data-dcnode-id="1925" instrument_node="">complementary paint colors</span></a><span data-dcnode-id="1923" instrument_node="">.</span><a data-dcnode-id="1922" name="mixtogray"></a></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1915"><span data-dcnode-id="1919" instrument_node="">The test is simple (though tedious) to do. The results I will show you here are described in detail on </span><a class="text" data-dcnode-id="1917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/mixtable.html"><span data-dcnode-id="1918" instrument_node="">this page</span></a><span data-dcnode-id="1916" instrument_node="">, but the logic behind the test is easy to understand.</span></p><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1909"><span data-dcnode-id="1913" instrument_node="">First, using the visual color only, arrange all the available "warm" colored paints in a series, from green yellow to violet, on one side of a page. Then arrange all the complementary "cool" colored paints, from blue violet to yellow green, on the opposite side. Align the paints up or down on each side until the </span><a class="text" data-dcnode-id="1911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/mixtable.html"><span data-dcnode-id="1912" instrument_node="">mixing complement pairs</span></a><span data-dcnode-id="1910" instrument_node=""> are directly across from each other — violet blue across from yellow, blue across from deep yellow, green blue across from orange, and so on.</span></p></td><td colspan="2" data-dcnode-id="1906"></td></tr><tr data-dcnode-id="1788"><td colspan="2" data-dcnode-id="1901"></td><td align="left" data-dcnode-id="1798" valign="top"><p data-dcnode-id="1895"><span data-dcnode-id="1899" instrument_node="">Then mix </span><i data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">all possible combinations</span></i><span data-dcnode-id="1896" instrument_node=""> of a warm paint with a cool paint, and identify by eye the paint pairs that actually produce a neutral (gray or black) mixture.</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Finally, connect these visually verified mixing complement paints with a dark line.</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1890" instrument_node="">Now, if complementary paint mixtures are exactly determined by the </span><i data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">visual color</span></i><span data-dcnode-id="1887" instrument_node=""> of the paints, and if all the paints have regular, simple reflectance curves, then lines connecting these complementary pairs should be roughly parallel (diagram, right). As the hue of the warm paint changes from deep yellow to violet, the hue of its mixing complement should change from blue violet to green by an equal amount.</span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1884" instrument_node="">This is precisely what </span><i data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">does not</span></i><span data-dcnode-id="1881" instrument_node=""> happen, as shown below.</span></p><span data-dcnode-id="1879" instrument_node="">
</span><p class="imgC" data-dcnode-id="1877"><img data-dcnode-id="1878" height="660" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/mixmatch.gif&amp;raw" width="370"></p><span data-dcnode-id="1876" instrument_node="">
</span><p class="CC" data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">substance uncertainty in watercolor material mixtures</span></p><span data-dcnode-id="1873" instrument_node="">
</span><p class="subCC" data-dcnode-id="1865"><span data-dcnode-id="1872" instrument_node="">mixing complementary colors as measured on the </span><b data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">a*b*</span></b><span data-dcnode-id="1869" instrument_node=""> plane in CIELAB: pigments that make "pure gray" mixtures are joined by dark lines, "near gray" mixtures by light lines (see </span><a class="index1" data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/tech17.html%23mixing"><span data-dcnode-id="1868" instrument_node="">this page</span></a><span data-dcnode-id="1866" instrument_node=""> for more information)</span></p><span data-dcnode-id="1864" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1863" instrument_node="">The mixing lines from each pigment fan apart, or skew up or down haphazardly. And this is not just because there is a greater number of pigments on the warm side, or the warm pigment hues are more similar. Consider the examples (diagram, below) where two pigments with very different visual colors make a perfectly gray mixture with a third paint color. (The two examples at far right show that two visually different pigments can have the same mixing complements.)</span><a data-dcnode-id="1862" name="compmatch"></a></p><span data-dcnode-id="1860" instrument_node="">
</span><p class="imgC" data-dcnode-id="1858"><img data-dcnode-id="1859" height="193" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/mixexamp.gif&amp;raw" width="365"></p><span data-dcnode-id="1857" instrument_node="">
</span><p class="CC" data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">visual color variety among material color complements</span></p><span data-dcnode-id="1854" instrument_node="">
</span><p class="subCC" data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">the same pigment (top row) mixes a pure gray with either of the two pigments enclosed by the box (bottom two rows); diagram matches the pigment color appearance as measured in the CIELAB color space with a spectrophotometer</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1850" instrument_node="">This demonstration clearly shows why a </span><a class="text" data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color16.html%23mixprobs"><span data-dcnode-id="1849" instrument_node="">mixing color wheel</span></a><span data-dcnode-id="1847" instrument_node="">, which arranges paints around the hue circle according to their complementary mixtures, can never accurately define the mixing behavior of pigments or paints. If we align cobalt teal (</span><a class="text" data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterg.html%23PG50"><span data-dcnode-id="1846" instrument_node="">PG50</span></a><span data-dcnode-id="1844" instrument_node="">) directly opposite its mixing complement pyrrole orange (</span><a class="text" data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/watero.html%23PO73"><span data-dcnode-id="1843" instrument_node="">PO73</span></a><span data-dcnode-id="1841" instrument_node="">), then it will not be opposite its other mixing complement, perylene maroon (</span><a class="text" data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterr.html%23PR179"><span data-dcnode-id="1840" instrument_node="">PR179</span></a><span data-dcnode-id="1838" instrument_node="">). If we place cobalt teal at some average position, opposite the middle hue between pyrrole orange and perylene maroon, then we would have to place viridian (</span><a class="text" data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterg.html%23PG18"><span data-dcnode-id="1837" instrument_node="">PG18</span></a><span data-dcnode-id="1835" instrument_node="">) in exactly the same position, because it has exactly the same mixing complements!</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1832" instrument_node="">The diagram also shows the limitations of using conceptual colors, such as the traditional color theory "primary" colors, to explain color mixing. For example, cobalt teal blue (</span><a class="text" data-dcnode-id="1830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterg.html%23PG50"><span data-dcnode-id="1831" instrument_node="">PG50</span></a><span data-dcnode-id="1829" instrument_node="">) mixes a pure gray with both pyrrole orange (</span><a class="text" data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/watero.html%23PO73"><span data-dcnode-id="1828" instrument_node="">PO73</span></a><span data-dcnode-id="1826" instrument_node="">) and cadmium red deep (</span><a class="text" data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/waterr.html%23PR108"><span data-dcnode-id="1825" instrument_node="">PR108</span></a><span data-dcnode-id="1823" instrument_node="">). But pyrrole orange has a distinctly yellow component in its hue, and therefore has substantially more "yellow primary" in it than cadmium deep red. So then how can a paint with more "yellow primary" in it mix the same gray with the same green blue paint? The conceptual "primary" colors have no logical or necessary connection to the visual color of two material colors, or to the color of their physical mixture.</span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">The limiting rules of physics and pigment chemistry do take us out of those idealized transmission filter examples, where subtractive color theory doesn't exist at all. But they don't take us all the way to a perfect world where pigments with the same visual color mix in a consistent way. We end up somewhere in the middle — in a fuzzy, messy real world where subtractive color mixing is a real fuzzy mess.</span></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1799"><b data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Other Factors in Material Mixtures</span></b><span data-dcnode-id="1815" instrument_node="">. Couldn't we avoid substance uncertainty if we were somehow able to use only colorants that had regular and simple reflectance curves? The answer is no: because the substance uncertainty arises from the many invisible differences in pigment </span><i data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">material attributes</span></i><span data-dcnode-id="1812" instrument_node=""> — refractive index, particle size, crystal form, hiding power and tinting strength. Thus, the pigments cadmium yellow medium (</span><a class="text" data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/watery.html%23PY35"><span data-dcnode-id="1811" instrument_node="">PY35</span></a><span data-dcnode-id="1809" instrument_node="">) and hansa yellow medium (</span><a class="text" data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/watery.html%23PY97"><span data-dcnode-id="1808" instrument_node="">PY97</span></a><span data-dcnode-id="1806" instrument_node="">) have almost identical </span><i data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">reflectance curves</span></i><span data-dcnode-id="1803" instrument_node="">, yet they produce visibly different mixtures with other paints because their </span><a class="text" data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/pigmt3.html%23refractiveindex"><span data-dcnode-id="1802" instrument_node="">refractive indices</span></a><span data-dcnode-id="1800" instrument_node=""> (appearance in paint vehicle) are so different.</span></p></td><td colspan="2" data-dcnode-id="1790" valign="top"><span data-dcnode-id="1796" instrument_node="">
</span><p class="imgS" data-dcnode-id="1794"><img data-dcnode-id="1795" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/mixpure.gif&amp;raw"></p><span data-dcnode-id="1793" instrument_node="">
</span><p class="SC" data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">idealized subtractive mixing complements in watercolor paint mixtures</span></p></td></tr><tr data-dcnode-id="1685"><td colspan="2" data-dcnode-id="1785"></td><td align="left" data-dcnode-id="1689" valign="top"><p data-dcnode-id="1779"><span data-dcnode-id="1783" instrument_node="">What if we could somehow make paints so that every apparent color had the same reflectance curve, and made sure every paint had exactly the same material attributes — wouldn't that solve the problem? Again, the answer is no: because </span><i data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">all</span></i><span data-dcnode-id="1780" instrument_node=""> the material attributes of the mixture are involved, and that includes the material attributes of the support and the paint application methods.</span></p><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1777" instrument_node="">The qualities of different paper or canvas supports have a significant impact. A glossy, highly reflective white paper can show up to 24,000 distinct color mixtures using modern CYM process inks. The same inks, printed on ordinary newsprint, generate a much smaller range of perhaps only 2,000 distinct colors — and these are all significantly duller and darker. In watercolors, a highly absorbent paper (which pulls the pigment particles between the cellulose fibers) will produce lighter, duller color mixtures than a heavily sized, hot pressed, nonabsorbent paper. Applying paints to paper effectively mixes </span><i data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">three</span></i><span data-dcnode-id="1774" instrument_node=""> light reflecting substances — the two paints in the mixture and the paper — so the material attributes of all three will determine the apparent color.</span></p><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Color mixtures also depend on how the paints are applied. A familiar example for watercolorists occurs when paints are mixed by glazing or layering one color over another: cadmium yellow over phthalo green is a lighter and less saturated mixture than phthalo green glazed over cadmium yellow, even though we have put the same paints, in the same quantities, on the same paper.
</span></p><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1763"><span data-dcnode-id="1768" instrument_node="">These complications of material metamerism, physical attributes, support attributes and application methods all contribute to the same modern color theory principle: </span><b data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">visual color does not predict material mixture color</span></b><span data-dcnode-id="1765" instrument_node="">. Subtractive color mixing "theory," by trying to imitate additive color mixing theory, bites off much more than it can chew.</span><a data-dcnode-id="1764" name="colorinmixture"></a></p><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1752"><b data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">The Color Is In the Mixture</span></b><span data-dcnode-id="1759" instrument_node="">. Substance uncertainty is such a difficult problem that traditional color theory deals with it the only way it can — by </span><i data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">ignoring it!</span></i><span data-dcnode-id="1756" instrument_node=""> Or, even worse, by </span><i data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">denying it</span></i><span data-dcnode-id="1753" instrument_node=""> and organizing color mixtures within idealized triangles or circles.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1738"><span data-dcnode-id="1750" instrument_node="">The artist tries to mix paints according to these idealized, perfect color theory rules is guided to some degree, but is often also confused by the many mixture exceptions that result. Painters who learn color theory in terms of the </span><i data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">visual</span></i><span data-dcnode-id="1747" instrument_node=""> colors of paints arranged on a </span><a class="text" data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color13.html"><span data-dcnode-id="1746" instrument_node="">color wheel</span></a><span data-dcnode-id="1744" instrument_node=""> learn how to mix </span><i data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">conceptual hues</span></i><span data-dcnode-id="1741" instrument_node=""> — "yellow and blue make green" — rather than </span><i data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">paints.</span></i></p><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1736" instrument_node="">If visual color really is separate from material color, how can we manage color as basic principles? Which form of color should we think about? For now, we seem to have another modern color theory rule:</span><a data-dcnode-id="1735" name="ctprin43"></a></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1730"><b data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">43. The material color of a paint is defined by the visual colors it makes in mixtures with all other paints.</span></b></p><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">But this raises the problem: how do we define the conceptual color of a paint? If two "blue" paints mix differently, or a teal and blue green paint mix similarly, then we need to have a color space, or a color language, that can express those differences.</span></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1725" instrument_node="">To create this kind of conceptual color language, we must examine the </span><i data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">color relationships</span></i><span data-dcnode-id="1722" instrument_node=""> that have, in traditional color theory, been expressed as simple geometries of circle or triangle. And we must learn the concepts of a </span><i data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">colorant gamut</span></i><span data-dcnode-id="1719" instrument_node=""> that help us visualize the behavior of specific paints.</span><a data-dcnode-id="1718" name="geometry"></a></p><span data-dcnode-id="1716" instrument_node="">
</span><p class="floatArrow" data-dcnode-id="1713"><a data-dcnode-id="1714" href="#top"><img border="0" data-dcnode-id="1715" height="14" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/nabup.gif&amp;raw" width="10"></a></p><h3 data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">visual color relationships</span></h3><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1707"><img align="left" data-dcnode-id="1709" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/space.gif&amp;raw" width="60"><span data-dcnode-id="1708" instrument_node="">The previous two sections have used additive and subtractive color mixing, and the problems of substance uncertainty, to illustrate the differences among conceptual, visual and material color.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Now we turn to the issue of color relationships in general, or how the artist can best "think about" color.</span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1702" instrument_node="">It will be clear that the appropriate form of color to use in this area is the visual color. Material color is too unreliable, or too variable, to serve as a basic framework for color relationships, and conceptual color represents ideas that must be developed out of experience.</span><a data-dcnode-id="1701" name="ctprin44"></a></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1695"><b data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">44. Visual color, the domain of color experience, is the foundation for all conceptual color relationships.</span></b><a data-dcnode-id="1696" name="luminancegeometry"></a></p><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1690"><span class="rubric" data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">The Concepts of Illuminance &amp; Luminance</span></span><span data-dcnode-id="1691" instrument_node="">. The fundamental visual color relationship is produced by the appearance of colors under different levels of illuminance or luminance, two concepts that all artists and photographers should understand clearly. Their effects on visual color are profound.</span></p></td><td colspan="2" data-dcnode-id="1687"></td></tr><tr data-dcnode-id="1605"><td colspan="2" data-dcnode-id="1682"></td><td align="left" data-dcnode-id="1621" valign="top"><p data-dcnode-id="1676"><span data-dcnode-id="1680" instrument_node="">The diagram (right) shows the relative relationship between benchmark illuminance and luminance values across the range of </span><a class="text" data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23sensitivity"><span data-dcnode-id="1679" instrument_node="">common light environments</span></a><span data-dcnode-id="1677" instrument_node="">. The chart is designed so that an illuminance level is directly across from the luminance it would create on a white surface.</span></p><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1665"><a class="text" data-dcnode-id="1673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color3.html%23illuminance"><span data-dcnode-id="1674" instrument_node="">Illuminance</span></a><span data-dcnode-id="1672" instrument_node=""> is the </span><i data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">quantity of light incident on (falling on) a surface area.</span></i><span data-dcnode-id="1669" instrument_node=""> In most environments there are many different surfaces in view, and they all receive different amounts of light; the average illuminance across all surfaces that are not in shadow is the </span><b data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">light environment</span></b><span data-dcnode-id="1666" instrument_node="">.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1663" instrument_node="">Illuminance depends on distance. </span><i data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Illuminance decreases by the inverse square of distance</span></i><span data-dcnode-id="1660" instrument_node=""> — if you are 2 times farther from a light then its illuminance decreases to 1 divided by 2 squared, or 1/4; or, if you reduce the distance to a light by 1/2, you increase its illuminance by 1 divided by 1/4, or 4 times (the </span><i data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">inverse square law</span></i><span data-dcnode-id="1657" instrument_node="">). Using the chart at right, we can calculate that a single wax candle at 32 meters provides the same illuminance as a starry night sky.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1654" instrument_node="">Paradoxically, </span><i data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">illuminance is always invisible:</span></i><span data-dcnode-id="1651" instrument_node=""> we cannot, by eye alone, judge illuminance in any light environment. Instead we judge it indirectly, through the </span><i data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">luminance</span></i><span data-dcnode-id="1648" instrument_node=""> that appears in the light reflected from objects and surfaces.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1640"><a class="text" data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color3.html%23luminance"><span data-dcnode-id="1645" instrument_node="">Luminance</span></a><span data-dcnode-id="1643" instrument_node=""> is the </span><i data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">illuminance received from a light source averaged across its visual area.</span></i></p><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Luminance depends on physical size of the light source, not its distance from us. If two light sources provide the same illuminance at the same distance, the physically smaller source will appear more luminous (brighter). If we move away from a light source, the visual size of the source decreases in the same inverse square proportion as the illuminance received from it, so the luminance remains constant.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">The diagram (right) illustrates the relationship between apparent size, luminance and illuminance. But the luminance of the source of the illuminance depends on its size. Because the moon is visually small, it appears much brighter than a sheet of white paper it illuminates. Because the sky is visually very large, it is only as luminous as the paper it illuminates. This is the rationale for large diffusing light panels in modern office spaces: they provide lots of light without the apparent brightness that can cause eyestrain.</span></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1632" instrument_node="">The amount of light that can affect a receptor surface depends on the surface area receiving the light, or the area of its opening to light (</span><i data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">aperture</span></i><span data-dcnode-id="1629" instrument_node="">). Contraction in the size of our pupils makes lights appear less bright, and closing the diaphragm in a camera increases the exposure time of the film; the brightness of lights we see depends in part on the diameter of our pupil.</span></p><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1626" instrument_node="">Across different adaptation levels (day vs. night) and illuminance regimes (a room interior in shadow and, through a window, a landscape exterior viewed in daylight), the human eye can accurately report luminance differences within a relatively constant luminance range of about 5 log units, or a ratio of 1:100,000 (diagram, right). This is its </span><a class="text" data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23charcurve"><span data-dcnode-id="1625" instrument_node="">contrast ratio</span></a><span data-dcnode-id="1623" instrument_node="">. Luminances outside this range appear either as black or undifferentiated dark areas, or as glaringly bright lights.</span></p></td><td colspan="2" data-dcnode-id="1607" valign="top"><span data-dcnode-id="1619" instrument_node="">
</span><p class="imgS" data-dcnode-id="1617"><img data-dcnode-id="1618" height="670" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/litenv.gif&amp;raw" width="200"></p><span data-dcnode-id="1616" instrument_node="">
</span><p class="SC" data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">a comparison of common light environments (log scales)</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p class="subSC" data-dcnode-id="1608"><span data-dcnode-id="1612" instrument_node="">at 1 lux = 0.31 candela/m</span><sup data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">2</span></sup><span data-dcnode-id="1609" instrument_node="">, the luminance of a white sheet of paper matches the illuminance falling on the paper</span></p></td></tr><tr data-dcnode-id="1494"><td colspan="2" data-dcnode-id="1602"></td><td align="left" data-dcnode-id="1504" valign="top"><p data-dcnode-id="1593"><span data-dcnode-id="1600" instrument_node="">All photographic and painting media have similar but much smaller </span><i data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">luminance</span></i><span data-dcnode-id="1597" instrument_node=""> contrast ratios, generally in the range of 1:100. (</span><i data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Media</span></i><span data-dcnode-id="1594" instrument_node=""> contrast ratios, such as dye pigment densities or monitor light steps, are often larger than the visible contrast ratio.) If we want to include the stars in our image, then we cannot accurately render anything much brighter than the moon in the same image. If our brightest white is white surface in sunlight, then our blacks are actually brighter than a white surface under office lights (image, right).</span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1591" instrument_node="">The process of rendering the visual range of luminance and chromaticity values within the smaller contrast range of material (photographic, painting and digital) colorants is called </span><b data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">gamut mapping</span></b><span data-dcnode-id="1588" instrument_node=""> or </span><b data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">tone mapping</span></b><span data-dcnode-id="1585" instrument_node="">, a procedure explained in the page on </span><a class="text" data-dcnode-id="1583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color11.html%23paintzone"><span data-dcnode-id="1584" instrument_node="">tonal value</span></a><span data-dcnode-id="1582" instrument_node="">.</span><a data-dcnode-id="1581" name="adaptationcolor"></a></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1572"><span class="rubric" data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Visual Color &amp; Luminance Adaptation</span></span><span data-dcnode-id="1576" instrument_node="">. As illuminance goes up or down, the luminance of the surfaces goes up or down in exact proportion. The eye adjusts its sensitivity so that the visual response range brackets the average value of surface luminances: this is </span><a class="text" data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23sensitivity"><span data-dcnode-id="1575" instrument_node="">luminance adaptation</span></a><span data-dcnode-id="1573" instrument_node="">. To sustain this adaptation range, we avoid looking directly at luminous light sources.</span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Visual color changes substantially across different levels of luminance adaptation. The three basic adaptation regimes are:</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1567" instrument_node="">•&nbsp;</span><b data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">photopic</span></b><span data-dcnode-id="1564" instrument_node=""> (above ~1000 lux) - color perception is present and lightness, hue and chroma contrast are at their peak; contrast is enhanced in darker values, and the chromaticity of light sources is obscured by their brightness.</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1561" instrument_node="">•&nbsp;</span><b data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">mesopic</span></b><span data-dcnode-id="1558" instrument_node=""> (~0.1 to ~1000 lux) - color perception is present, but lightness and chroma contrast are reduced, especially in darker colors and at lower light levels, hue contrast is reduced in greens and blues; the chromaticity of light sources is accented by their dimness.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1555" instrument_node="">•&nbsp;</span><b data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">scotopic</span></b><span data-dcnode-id="1552" instrument_node=""> (below ~0.1 lux) - color perception is absent, and replaced by gradations of lightness only; lightness contrast is greatly reduced, and disappears across darker values; edge contrast and object details are significantly obscured.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1549" instrument_node="">The transition from mesopic to scotopic (light to dark) illuminance levels produces complex and rapidly changing color effects, described in detail on </span><a class="text" data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23scotopiccolor"><span data-dcnode-id="1548" instrument_node="">this page</span></a><span data-dcnode-id="1546" instrument_node="">.</span></p><span data-dcnode-id="1544" instrument_node="">
</span><p class="imgC" data-dcnode-id="1542"><img data-dcnode-id="1543" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/purkinje2.gif&amp;raw" width="320"></p><span data-dcnode-id="1541" instrument_node="">
</span><p class="CC" data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">change in visual color from mesopic to scotopic vision</span></p><span data-dcnode-id="1538" instrument_node="">
</span><p class="subCC" data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">(left) color samples viewed under ~200 lux; (right) color samples viewed under ~0.2 lux, just before color perception is lost</span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1532"><span data-dcnode-id="1534" instrument_node="">The diagram (above) shows the visual color of 24 watercolor paints viewed under sky illuminances at sunset and 45 minutes after sunset, just before the transition to scotopic vision is complete. The full range of colors has degenerated to a limited range of warm and cool hues, very poorly separated in lightness.</span><a data-dcnode-id="1533" name="ctprin45"></a></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1525"><b data-dcnode-id="1526"><span data-dcnode-id="1530" instrument_node="">45. Illuminance is manifest </span><i data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">inside</span></i><span data-dcnode-id="1527" instrument_node=""> color experience, as a qualitative color attribute or "color consistency".</span></b></p><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1523" instrument_node="">Color experience does not report a white surface under moonlight as merely a visual gray that would be matched by a material gray surface viewed under mesopic illumination. The appearance of the "gray" itself is qualitatively different, so that we </span><i data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">see</span></i><span data-dcnode-id="1520" instrument_node=""> the illuminance level, or our luminance adaptation, in the color experience. This is perhaps the most remote and subtle aspect of color than an artist can observe and attempt to render in an image.</span><a data-dcnode-id="1519" name="illuminancecontrast"></a></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1513"><span class="rubric" data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Visual Color &amp; Illuminance Contrast</span></span><span data-dcnode-id="1514" instrument_node="">. We judge colors under the assumption that all surfaces in view are under the same illuminance, and that shadows all form in the same direction, away from the dominant light source.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">If the spatial relations that create illuminance differences are obscured, then our visual color judgments suffer. Color lightness contrast, apparent white/gray value, chroma and even hue can be badly distorted.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1505"><a class="text" data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color2.html%23whitepigments"><span data-dcnode-id="1508" instrument_node="">Isaac Newton</span></a><span data-dcnode-id="1506" instrument_node=""> recognized the importance of illuminance contrast to visual color over three centuries ago, when he studied luminance dependence in white and gray:</span></p></td><td colspan="2" data-dcnode-id="1496" valign="top"><span data-dcnode-id="1502" instrument_node="">
</span><p class="imgS" data-dcnode-id="1500"><img data-dcnode-id="1501" height="197" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/illcon.jpg&amp;raw" width="200"></p><span data-dcnode-id="1499" instrument_node="">
</span><p class="SC" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">luminance rendering within a 1:25 (~5 photographic stops) imaging contrast ratio</span></p></td></tr><tr data-dcnode-id="1280"><td colspan="2" data-dcnode-id="1491"></td><td align="left" data-dcnode-id="1295" valign="top"><p data-dcnode-id="1483"><i data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Considering that these gray and dun Colours may also be produced by mixing Whites and Blacks, and by consequence differ from perfect Whites, not in Species of Colours, but only in degree of Luminousness, it is manifest that there is nothing more requisite to make them perfectly white than to increase their Light sufficiently. ... And this I tried as follows. I rubbed</span></i><span data-dcnode-id="1487" instrument_node=""> [a mixture of blue, green, yellow and red pigments] </span><i data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">thickly upon the Floor of my Chamber, where the Sun shone upon it through the opened Casement; and by it, in the shadow, I laid a Piece of white Paper of the same Bigness. Then going from them a distance of 12 or 18 Feet, ... the Powder appeared intensely white, so as to transcend even the Paper itself in Whiteness. — Opticks</span></i><span data-dcnode-id="1484" instrument_node=""> (1704), Book I, Part II, Experiment 15.</span></p><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1481" instrument_node="">The images (right) show the same material color (a red iron oxide or "burnt sienna" paint), displayed either as a sunlit area within a shadowed surround, or a shadowed area within a sunlit surround. Illuminance contrast (variations in the radiant color) can make the same material color appear orange, brown or black.</span><a data-dcnode-id="1480" name="ctprin46"></a></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1475"><b data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">46. Luminance contrast produced by illuminance contrast produces a local increase in both lightness contrast and chromaticity contrast, with minimal effects on hue.</span></b></p><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1473" instrument_node="">I have experienced illusory luminance contrast rarely: once when I looked out my bedroom window an early morning to survey the building site of my studio. I was surprised to see an unfamiliar, large brilliant orange box sitting in a sloping field nearby, profiled against a background of dark trees. Only after repeated looking did I realize it was actually the contractor's </span><i data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">dark brown</span></i><span data-dcnode-id="1470" instrument_node=""> safe box, illuminated by a nearly horizontal shaft of sunlight piercing through trees behind my house.</span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1467" instrument_node="">Well, not so rarely ... less reputable art galleries simulate chromaticity contrast when they illuminate paintings hung on a dimly lit wall by means of spotlights with very diffuse boundaries. Because the illuminance boundary is not visible, the illuminance contrast causes the paint colors to appear more saturated and more contrasted than they will appear when both the painting and the wall are viewed under the same light source.</span><a data-dcnode-id="1466" name="spatialcontrast"></a></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1460"><span class="rubric" data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Visual Color &amp; Spatial Factors</span></span><span data-dcnode-id="1461" instrument_node="">. We are typically adept at reconciling the infinite possible permutations of illuminance contrast within light environments in terms of the spatial configuration of surfaces.</span></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1458" instrument_node="">Traditional color theory has almost entirely ignored spatial effects in visual color — the studies of </span><a class="text" data-dcnode-id="1456" href="#transparencyeffects"><span data-dcnode-id="1457" instrument_node="">simulated transparency</span></a><span data-dcnode-id="1455" instrument_node=""> by </span><a class="text" data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/book3.html%23albers"><span data-dcnode-id="1454" instrument_node="">Joseph Albers</span></a><span data-dcnode-id="1452" instrument_node=""> being one of the notable exceptions — but these effects are incredibly large. We can suggest this impact through parallel color contrast examples.</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1449" instrument_node="">First consider the traditional color theory presentation of squares within squares, the favorite device to demonstrate the </span><a class="text" data-dcnode-id="1447" href="#simultaneouscontrast"><span data-dcnode-id="1448" instrument_node="">simultaneous color contrast</span></a><span data-dcnode-id="1446" instrument_node=""> demonstrated at length by Michel-Eugène Chevreul (diagram, below).</span></p><span data-dcnode-id="1444" instrument_node="">
</span><p class="imgC" data-dcnode-id="1442"><img data-dcnode-id="1443" height="380" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/quid.gif&amp;raw" width="251"></p><span data-dcnode-id="1441" instrument_node="">
</span><p class="CC" data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">simultaneous color contrast</span></p><span data-dcnode-id="1438" instrument_node="">
</span><p class="subCC" data-dcnode-id="1433"><span data-dcnode-id="1437" instrument_node="">two different central colors, contrasted in the middle row, against two different background colors, contrasted in the two vertical columns; a single central color appears in the top and bottom rows; lightness (</span><b data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">L*</span></b><span data-dcnode-id="1434" instrument_node="">) values included</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Here we see the traditional simultaneous contrast effects in both the top and bottom rows: the dark central color appears darker on a light surround, and the light central color appears lighter on a dark surround. On this evidence, vision seems designed primarily to make different colored areas appear as different as possible, and the induced shift in the light and dark areas appears about equal.</span></p><span data-dcnode-id="1429" instrument_node="">
</span><p class="imgC" data-dcnode-id="1427"><img data-dcnode-id="1428" height="800" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/quo.jpg&amp;raw" width="380"></p><span data-dcnode-id="1426" instrument_node="">
</span><p class="CC" data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">spatial color contrast</span></p><span data-dcnode-id="1423" instrument_node="">
</span><p class="subCC" data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">a sheet of white paper viewed in direct illumination and partial shadow — (middle row) original photograph; (top row) illuminated paper copied into shadowed area; (bottom row) shadowed paper copied into illuminated area;</span></p><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">When the same average color contrasts are placed in a spatial context, they present a different and much greater impact. The agnostic lightness difference between the two background colors in the previous figure is now a three dimensional illuminance contrast on the same spatial surface, which requires us to interpret the color area contrast — the contrast between the two sheets of paper — in a spatially consistent way. Two effects appear:</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1416" instrument_node="">•&nbsp;</span><b data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">increased contrast</span></b><span data-dcnode-id="1413" instrument_node=""> - the comparative impact of the color differences is drastically increased: we perceive a much greater difference between the illuminated and shadowed surfaces than in the simultaneous contrast demonstration.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1410" instrument_node="">•&nbsp;</span><b data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">nonlinear contrast</span></b><span data-dcnode-id="1407" instrument_node=""> - the contrast produced by copying the shadowed area into light is much greater than that produced by copying the lighted area into shadow: the same visual contrast has a much greater "blackness" impact. The ratio of the lightness contrast is the same, but in the bottom row the color is both lighter and darker than the background.</span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1404" instrument_node="">These enormous visual differences signify that color is not merely a medium through which we can see the qualities of </span><i data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">light absorbing materials,</span></i><span data-dcnode-id="1401" instrument_node=""> but a medium through which we see the reality of </span><i data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">light in three dimensional space.</span></i><a data-dcnode-id="1398" name="ctprin47"></a></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1393"><b data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">47. Vision primarily and preferentially interprets surface luminances (reflectance) in terms of the spatial distribution of light in a three dimensional environment.</span></b></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1391" instrument_node="">We do not have to strain our imaginations to see a building in a photograph or a face in a painting</span><a data-dcnode-id="1390" name="illuminantgeometry"></a></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1387" instrument_node="">
</span><span class="rubric" data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Illuminant &amp; Visual Color</span></span><span data-dcnode-id="1384" instrument_node="">. The spectral composition of a light source (summarized as an </span><a class="text" data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color1.html%23dayphases"><span data-dcnode-id="1383" instrument_node="">illuminant</span></a><span data-dcnode-id="1381" instrument_node="">) determines its chromaticity, and this has a significant effect on color appearance.</span></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1378" instrument_node="">In most natural light environments, </span><i data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">daylight</span></i><span data-dcnode-id="1375" instrument_node=""> (the combination of sunlight and skylight) is quite variable across the time of day and type of weather. However these changes in daylight spectra follow a consistent </span><a class="text" data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color12.html%23daylocus"><span data-dcnode-id="1374" instrument_node="">chromaticity path</span></a><span data-dcnode-id="1372" instrument_node=""> from a slightly blue to strongly yellow chromaticity. These chromaticity changes can be indexed as the </span><a class="text" data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color12.html%23CCT"><span data-dcnode-id="1371" instrument_node="">correlated color temperature</span></a><span data-dcnode-id="1369" instrument_node=""> of the light. Noon daylight has a CCT of about 6500, while sunlight at sunset has a CCT of around 2000. CCTs can also be used to describe artificial light sources; most incandescent lights have a CCT below 3000, which is rather yellow.</span></p><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1366" instrument_node="">Our visual system is adapted to eliminate the effects of moderate chromaticity in lights, especially across daylight spectra, through a process of </span><a class="text" data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color4.html%23chromaadapt"><span data-dcnode-id="1365" instrument_node="">chromatic adaptation</span></a><span data-dcnode-id="1363" instrument_node="">. This is provided the lights contribute to the light environment, as is most apparent at night. When we are indoors after sunset, the illumination from incandescent lights, or a television screen in a dark room, will appear "white"; but if we view these lights from outdoors, as the light falls on a white sheet or window shade, the same illumination will appear distinctly yellow or blue.</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">In more extreme cases, such as the illumination from a heat lamp or "black" light (ultraviolet light), the chromaticity of the light cannot be eliminated by chromatic adaptation. However we may still be able to judge visual color accurately, as if we saw normally illuminated colors through tinted glasses.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">All surface colors are altered by the chromaticity of the illumination. This alteration is effectively a subtractive mixture of the chromaticity of the light with the chromaticity of surface colors. Surface hues close to the hue of the light increase in apparent chroma and appear more similar; hues opposite are grayed or muted; hues perpendicular to the light hue are hue shifted toward the light.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p class="imgC" data-dcnode-id="1353"><img data-dcnode-id="1354" height="170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/corcol.gif&amp;raw" width="374"></p><span data-dcnode-id="1352" instrument_node="">
</span><p class="CC" data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">effect of an orange light source on surface colors</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p class="subCC" data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">analogous surface hues and grays are made more chromatic and more similar to the light hue; complementary surface hues are made less chromatic</span></p><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1345" instrument_node="">As with the </span><a class="text" data-dcnode-id="1343" href="#subprobs"><span data-dcnode-id="1344" instrument_node="">substance uncertainty</span></a><span data-dcnode-id="1342" instrument_node=""> that occurs in the subtractive mixture of two substances, we cannot predict the visual color of surfaces from the visual color of the light source. Low pressure sodium lamps appear yellow, but make both reds and greens appear achromatic. Some fluorescent lamps appear white, but have a concentrated spike of luminance in "green" wavelengths that makes green colors appear unusually saturated or "fresh" (a fact utilized in the lighting of many supermarket produce displays).</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1339" instrument_node="">Lights can be rated on their </span><a class="text" data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color12.html%23colorrendering"><span data-dcnode-id="1338" instrument_node="">color rendering</span></a><span data-dcnode-id="1336" instrument_node=""> properties: incandescent (tungsten or halogen) lights typically match the perfect color rendering properties of noon daylight.</span><a data-dcnode-id="1335" name="lightnessgeometry"></a></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1323"><span class="rubric" data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Luminance &amp; Achromatic Values</span></span><span data-dcnode-id="1330" instrument_node="">. My emphasis on the powerful effect of the light environment and color luminance on visual color leads naturally to the most important dimension of color relationship discussed in traditional color theory: </span><i data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">value,</span></i><span data-dcnode-id="1327" instrument_node=""> or the colormaking attribute of </span><a class="text" data-dcnode-id="1325" href="#colormakinglightness"><span data-dcnode-id="1326" instrument_node="">lightness</span></a><span data-dcnode-id="1324" instrument_node="">.</span></p><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1321" instrument_node="">Variations in lightness provide almost all the structure in an image: this </span><a class="text" data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/color11.html%23dominance"><span data-dcnode-id="1320" instrument_node="">lightness dominance</span></a><span data-dcnode-id="1318" instrument_node=""> is apparent if we remove either the chromaticity contrast or the lightness contrast from an image, and compare the revised versions to the original (images, below).</span></p><span data-dcnode-id="1316" instrument_node="">
</span><p class="imgC" data-dcnode-id="1314"><img data-dcnode-id="1315" height="253" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/val3x.jpg&amp;raw" width="380"></p><span data-dcnode-id="1313" instrument_node="">
</span><p class="CC" data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">the dominance of lightness contrast</span></p><span data-dcnode-id="1310" instrument_node="">
</span><p class="subCC" data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">a painting by Winslow Homer in its original form (top), then as lightness contrast with no chromaticity contrast (left) or as chromaticity contrast with no lightness contrast (right)</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">The diagram below shows our visual response within a luminance range of 1:1000, a conservative estimate of the human contrast ratio. (The contrast ratio is larger in dimmer light environments, but is difficult to measure at the high end due to glare avoidance and the adaptation effect of bright lights.) However, the contrast ratio of surface luminances is more often around 1:20 between perceptual white and black, because most "white" surfaces are materially somewhat gray, and no "black" surface absorbs all light.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p class="imgC" data-dcnode-id="1302"><img data-dcnode-id="1303" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/lumscale.gif&amp;raw" width="364"></p><span data-dcnode-id="1301" instrument_node="">
</span><p class="CC" data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">luminance contrast, lightness and brightness</span></p><span data-dcnode-id="1298" instrument_node="">
</span><p class="subCC" data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">log luminance scale relative to dark threshhold = 1, with an arbitrary 1:1000 luminance contrast ratio</span></p></td><td colspan="2" data-dcnode-id="1282" valign="top"><span data-dcnode-id="1293" instrument_node="">
</span><p class="imgS" data-dcnode-id="1291"><img data-dcnode-id="1292" height="317" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handprint.com/HP/WCL/IMG/illcon2.jpg&amp;raw" width="100"></p><span data-dcnode-id="1290" instrument_node="">
</span><p class="SC" data-dcnode-id="1286"><span data-dcnode-id="1289" instrument_node="">illuminance contrasts</span><br data-dcnode-id="1288"><span data-dcnode-id="1287" instrument_node="">and visual color</span></p><span data-dcnode-id="1285" instrument_node="">
